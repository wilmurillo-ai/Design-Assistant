<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        
        .crab {
            font-size: 180px;
            margin-bottom: 40px;
        }
        
        .message {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .credits {
            font-size: 36px;
            opacity: 0.8;
            text-align: center;
            line-height: 1.6;
        }
        
        .link {
            margin-top: 40px;
            font-size: 42px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            border-radius: 12px;
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="crab">🦀</div>
    <div class="message">Thanks for Watching!</div>
    <div class="credits">
        Powered by OpenClaw automation<br>
        Built with 🇨🇦 in your studio
    </div>
    <div class="link">github.com/openclaw/openclaw</div>
</body>
</html>
