<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pretext — Gatsby</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 32px 16px;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 24px; }
  .controls {
    width: 100%; max-width: 900px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
    font-family: "SF Mono", monospace; font-size: 13px; color: #888;
  }
  .controls input[type=range] { flex: 1; }
  .controls .val { min-width: 48px; text-align: right; }
  .stats {
    font-family: "SF Mono", monospace; font-size: 13px; color: #888;
    margin-bottom: 16px;
  }
  #book {
    font: 16px/26px Georgia, "Times New Roman", serif;
    color: #d4d4d4;
    background: #1a1a1a;
    padding: 40px;
    border-radius: 8px;
    white-space: normal;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
</style>
</head>
<body>
<h1>The Great Gatsby — Resize Demo</h1>
<p class="sub">Pretext vs DOM reflow on a full novel. Drag slider to resize.</p>
<div class="controls">
  <span>Width:</span>
  <input type="range" id="slider" min="300" max="900" value="600">
  <span class="val" id="val">600px</span>
</div>
<div class="stats" id="stats"></div>
<div id="book"></div>
<script type="module" src="./gatsby.ts"></script>
</body>
</html>
