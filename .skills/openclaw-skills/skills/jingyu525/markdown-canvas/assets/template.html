<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
            line-height: 1.8;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 60px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #2d3748;
            font-size: 2.5em;
            margin-bottom: 0.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 0.3em;
        }
        
        h2 {
            color: #667eea;
            font-size: 2em;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        
        h3 {
            color: #4a5568;
            font-size: 1.5em;
            margin-top: 1.2em;
            margin-bottom: 0.5em;
        }
        
        h4 {
            color: #718096;
            font-size: 1.2em;
            margin-top: 1em;
            margin-bottom: 0.5em;
        }
        
        p {
            color: #4a5568;
            margin-bottom: 1em;
        }
        
        strong {
            color: #2d3748;
            font-weight: 600;
        }
        
        em {
            color: #718096;
            font-style: italic;
        }
        
        code {
            background: #f7fafc;
            color: #e53e3e;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: "Courier New", monospace;
            font-size: 0.9em;
        }
        
        pre {
            background: #1a202c;
            color: #48bb78;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.5em 0;
        }
        
        pre code {
            background: none;
            color: inherit;
            padding: 0;
            font-size: 0.95em;
            line-height: 1.6;
        }
        
        ul, ol {
            margin-left: 2em;
            margin-bottom: 1em;
            color: #4a5568;
        }
        
        li {
            margin-bottom: 0.5em;
        }
        
        a {
            color: #667eea;
            text-decoration: none;
            border-bottom: 1px solid #667eea;
            transition: all 0.2s ease;
        }
        
        a:hover {
            color: #764ba2;
            border-bottom-color: #764ba2;
        }
        
        hr {
            border: none;
            border-top: 2px solid #e2e8f0;
            margin: 2em 0;
        }
        
        blockquote {
            border-left: 4px solid #667eea;
            padding-left: 1em;
            margin: 1.5em 0;
            color: #718096;
            font-style: italic;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        {{CONTENT}}
    </div>
</body>
</html>
