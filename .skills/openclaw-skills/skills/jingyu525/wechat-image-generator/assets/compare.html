<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0">
    <title>Comparison</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 675px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 40px;
        }
        .container {
            display: flex;
            align-items: center;
            gap: 60px;
            width: 100%;
        }
        .box {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .content {
            font-size: 24px;
            line-height: 1.6;
            color: #2c3e50;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .arrow {
            flex-shrink: 0;
            text-align: center;
        }
        .arrow-icon {
            font-size: 72px;
            color: #667eea;
        }
        .arrow-label {
            margin-top: 20px;
            font-size: 28px;
            font-weight: 600;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="content">{{LEFT_CONTENT}}</div>
        </div>
        <div class="arrow">
            <div class="arrow-icon">→</div>
            <div class="arrow-label">{{LABEL}}</div>
        </div>
        <div class="box">
            <div class="content">{{RIGHT_CONTENT}}</div>
        </div>
    </div>
</body>
</html>
