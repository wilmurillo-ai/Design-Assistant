<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0">
    <title>Chart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 675px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 60px;
        }
        .container {
            width: 100%;
            height: 100%;
        }
        .chart-group {
            margin-bottom: 60px;
        }
        .chart-title {
            font-size: 32px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .bars {
            display: flex;
            gap: 40px;
            align-items: flex-end;
            height: 200px;
        }
        .bar-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bar {
            width: 100%;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px 8px 0 0;
            transition: all 0.3s;
            position: relative;
            min-height: 60px;
        }
        .bar-container:nth-child(2) .bar {
            background: linear-gradient(180deg, #f093fb 0%, #f5576c 100%);
        }
        .bar-value {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: 700;
            color: #2c3e50;
        }
        .bar-label {
            margin-top: 20px;
            font-size: 24px;
            color: #606266;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="chart-group">
            <div class="chart-title">Token 消耗</div>
            <div class="bars">
                
            <div class="bar-container">
                <div class="bar" style="height: 100.0%;">
                    <div class="bar-value">8,000</div>
                </div>
                <div class="bar-label">AI每次生成</div>
            </div>
            
            <div class="bar-container">
                <div class="bar" style="height: 72.08498568445117%;">
                    <div class="bar-value">650</div>
                </div>
                <div class="bar-label">预制模板</div>
            </div>
            
            </div>
        </div>
        
        <div class="chart-group">
            <div class="chart-title">生成耗时</div>
            <div class="bars">
                
            <div class="bar-container">
                <div class="bar" style="height: 100.0%;">
                    <div class="bar-value">20</div>
                </div>
                <div class="bar-label">AI每次生成</div>
            </div>
            
            <div class="bar-container">
                <div class="bar" style="height: 30%;">
                    <div class="bar-value">1</div>
                </div>
                <div class="bar-label">预制模板</div>
            </div>
            
            </div>
        </div>
        
    </div>
</body>
</html>
