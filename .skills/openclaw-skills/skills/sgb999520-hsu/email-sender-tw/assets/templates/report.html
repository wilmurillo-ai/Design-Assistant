<!-- SUBJECT: 報告通知 -->

<h1>{{report_name}} 報告</h1>

<p>親愛的 {{name}}，</p>

<p>這是你的 {{report_name}} 報告。</p>

<table border="1" cellpadding="10" style="border-collapse: collapse; width: 100%;">
  <tr style="background-color: #f0f0f0;">
    <td><b>項目</b></td>
    <td><b>內容</b></td>
  </tr>
  <tr>
    <td>報告日期</td>
    <td>{{date}}</td>
  </tr>
  <tr>
    <td>摘要</td>
    <td>{{summary}}</td>
  </tr>
</table>

<p>詳細報告請查看附件。</p>

<p>感謝，<br>
{{sender}}</p>
