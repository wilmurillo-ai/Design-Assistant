<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>echosync — sign-in failed</title>
    <style>
      :root {
        --bg-deep: #06080d;
        --bg-glow-a: rgba(248, 113, 113, 0.08);
        --bg-glow-b: rgba(251, 113, 133, 0.05);
        --card-bg: rgba(15, 20, 30, 0.72);
        --card-border: rgba(148, 163, 184, 0.14);
        --text: #f1f5f9;
        --muted: #94a3b8;
        --err: #f87171;
        --err-soft: rgba(248, 113, 113, 0.15);
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Helvetica,
          Arial,
          sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        color: var(--text);
        background-color: var(--bg-deep);
        background-image:
          radial-gradient(
            ellipse 120% 80% at 85% -10%,
            var(--bg-glow-a),
            transparent 55%
          ),
          radial-gradient(
            ellipse 90% 60% at 10% 105%,
            var(--bg-glow-b),
            transparent 45%
          );
      }
      .card {
        width: 100%;
        max-width: 22rem;
        padding: 2.25rem 1.75rem 2rem;
        text-align: center;
        border-radius: 1.25rem;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.2) inset,
          0 1.5rem 3rem -1rem rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(14px);
      }
      .brand {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 1.5rem;
      }
      .err-icon {
        width: 3.25rem;
        height: 3.25rem;
        margin: 0 auto 1.25rem;
        border-radius: 50%;
        background: linear-gradient(
          145deg,
          rgba(248, 113, 113, 0.22),
          rgba(251, 113, 133, 0.08)
        );
        border: 1px solid rgba(248, 113, 113, 0.4);
        color: var(--err);
        font-size: 1.35rem;
        line-height: 3.25rem;
        font-weight: 600;
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        margin: 0;
        line-height: 1.35;
      }
      p {
        margin: 0.65rem 0 0;
        font-size: 0.9rem;
        font-weight: 400;
        color: var(--muted);
        line-height: 1.5;
      }
      .detail {
        margin-top: 1rem;
        padding: 0.75rem 0.85rem;
        text-align: left;
        font-family:
          ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Monaco, Consolas, monospace;
        font-size: 0.72rem;
        line-height: 1.45;
        color: #cbd5e1;
        word-break: break-word;
        background: var(--err-soft);
        border: 1px solid rgba(248, 113, 113, 0.22);
        border-radius: 0.65rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">echosync</div>
      <div class="err-icon" aria-hidden="true">✗</div>
      <h1>Sign-in did not complete</h1>
      <p>Something went wrong while finishing authentication.</p>
      <p class="detail">__DETAIL__</p>
    </div>
  </body>
</html>
