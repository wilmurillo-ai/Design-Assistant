<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d2b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="200" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="650" cy="60" r="120" fill="#4F46E5" opacity="0.07"/>
  <circle cx="150" cy="150" r="100" fill="#06B6D4" opacity="0.05"/>

  <!-- Accent line -->
  <rect x="60" y="165" width="120" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Flow arrows -->
  <g opacity="0.25">
    <text x="520" y="170" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" letter-spacing="3">
      DRAFT → FORMAT → SIGN
    </text>
  </g>

  <!-- Icon: contract/pen -->
  <g transform="translate(60, 40)" opacity="0.9">
    <rect x="0" y="0" width="36" height="44" rx="4" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <line x1="8" y1="12" x2="28" y2="12" stroke="#4F46E5" stroke-width="1.5" opacity="0.6"/>
    <line x1="8" y1="20" x2="24" y2="20" stroke="#4F46E5" stroke-width="1.5" opacity="0.4"/>
    <line x1="8" y1="28" x2="20" y2="28" stroke="#4F46E5" stroke-width="1.5" opacity="0.3"/>
    <path d="M30 30 L38 22 L42 26 L34 34 Z" fill="url(#accent)"/>
    <path d="M29 35 L34 34 L30 30 Z" fill="#06B6D4" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="60" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="-1">
    eSign Contract
  </text>
  <text x="378" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="300" fill="#94a3b8" letter-spacing="-1">
    Skill
  </text>

  <!-- Subtitle -->
  <text x="62" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#64748b" letter-spacing="0.5">
    AI驱动的电子合同全流程Skill
  </text>
</svg>
