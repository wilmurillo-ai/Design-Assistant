name: semgrepll
description: Local semantic code search - 100% offline capable with llama.cpp, ONNX, and Ollama backends
version: 1.3.1
author: Ayre
repository: https://github.com/rizperdana/semgrepll

trigger_keywords:
  - semantic search
  - semantic grep
  - semgrep
  - search code by meaning
  - find code semantically
  - index project for search

commands:
  - semgrep

install:
  - pip install semgrepll
  - pip install semgrepll[onnx]  # Optional: ONNX support

env_vars:
  EMBED_BACKEND: auto
  SEMGREP_BACKEND: auto

examples:
  - intent: Index project
    command: semgrep index ./myproject
  - intent: Search code
    command: semgrep search "authentication"
  - intent: List projects
    command: semgrep ls
