[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "trustmeworking"
version = "1.0.0"
description = "Simulate API token consumption to hit your KPI targets — the smart way."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["llm", "api", "token", "kpi", "automation", "openai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Utilities",
]
dependencies = [
    "openai>=1.0.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "black", "ruff"]

[project.scripts]
tmw = "trustmework.cli:main"

[project.urls]
Homepage = "https://github.com/pengtianhao48-lab/TrustMeImWorking"
Repository = "https://github.com/pengtianhao48-lab/TrustMeImWorking"
"Bug Tracker" = "https://github.com/pengtianhao48-lab/TrustMeImWorking/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["trustmework*"]

[tool.ruff]
line-length = 100
target-version = "py310"
