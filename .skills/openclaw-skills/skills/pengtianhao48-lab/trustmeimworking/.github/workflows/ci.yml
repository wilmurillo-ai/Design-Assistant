name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Check syntax
        run: |
          python -m py_compile tmw.py
          python -m py_compile trustmework/engine.py
          python -m py_compile trustmework/config.py
          python -m py_compile trustmework/state.py
          python -m py_compile trustmework/scheduler.py
          python -m py_compile trustmework/display.py
          python -m py_compile trustmework/platforms.py
          python -m py_compile trustmework/wizard.py
