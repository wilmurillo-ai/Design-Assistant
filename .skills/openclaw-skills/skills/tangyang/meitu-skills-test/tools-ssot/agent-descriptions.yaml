- tool: video-motion-transfer
  name: 视频动作迁移
  description: |
    <summary>将参考视频中的人物动作迁移到目标人物/角色上，驱动目标执行相同动作。</summary>
    <input>video 1个(动作参考视频) + image|video 1张(目标人物/角色)</input>
    <o>video</o>
    <triggers>用户提供动作参考视频，要求目标人物/角色模仿该动作；用户要求"动作迁移"、"动作驱动"、"动作复刻"</triggers>
    <prefer_over tool="image-to-video">核心需求是复刻特定动作，而非从图片生成视频或对口型</prefer_over>
    <not_for>人物说话/对口型 → image-to-video；纯文字生成视频 → text-to-video</not_for>


- tool: image-to-video
  name: 图生视频
  description: |
    <summary>以图片为首帧、语音为驱动信号，生成音画同步视频，支持对口型。</summary>
    <input>image 1张(首帧图片) + text 1个(视频描述 prompt) + audio 0..1个(可选，驱动对口型)</input>
    <o>video（含原生音轨）</o>
    <triggers>用户提供图片 + 要求人物说话/唱歌/对口型；用户提供图片 + 要求声音与画面原生同步（非后期配音）；用户提供图片 + 要求中高动态画面或明显运镜</triggers>
    <prefer_over tool="text-to-video">用户提供了首帧图片，或核心需求是对口型/语音表演</prefer_over>
    <prefer_over tool="video-motion-transfer">不需要复刻特定参考动作，而是从图片自由生成视频</prefer_over>
    <not_for>无首帧图片 → text-to-video；仅需复刻特定参考动作 → video-motion-transfer；仅需轻微动效且无音画同步需求</not_for>


- tool: text-to-video
  name: 文生视频
  description: |
    <summary>纯文字驱动，生成电影氛围感强、运镜丰富的视频片段，可含环境音。</summary>
    <input>text 1个(视频描述 prompt)</input>
    <o>video（可含环境音/氛围音）</o>
    <triggers>用户无首帧图片，用文字描述期望的视频画面；用户强调氛围感、电影感、运镜美感、音乐节奏感；需求是情绪/展示片段，非完整叙事成片</triggers>
    <prefer_over tool="image-to-video">用户未提供首帧图片，且不需要对口型/语音同步</prefer_over>
    <not_for>用户已提供首帧图片 → image-to-video；需对白口播准确 → image-to-video；需所有元素逐条落地或完整广告成片</not_for>


- tool: video-to-gif
  name: 视频转GIF
  description: |
    <summary>将单个视频转换为GIF动图。</summary>
    <input>video 1个</input>
    <o>gif（等比例，长边最大480px）</o>
    <constraints>仅支持单个视频输入；长边最大 480 像素</constraints>
    <not_for>图片序列合成GIF；视频格式转换（非GIF目标）</not_for>


- tool: image-generate
  name: 图片生成
  description: |
    <summary>从文字描述或参考图生成全新图片，擅长主体一致性与风格迁移。</summary>
    <input>text 1个(生成描述 prompt) + image 0+张(可选参考图)</input>
    <o>image</o>
    <triggers>无底图，纯文字从零生图；有参考图，要求保持主体一致 + 风格迁移/元素融合；多张图组合生成新图；新图中需包含指定文字</triggers>
    <prefer_over tool="image-edit">核心意图是生成新图，而非修改现有图片</prefer_over>
    <prefer_over tool="image-poster-generate">目标不是海报/宣传物料</prefer_over>
    <not_for>对已有图片局部修改 → image-edit；海报设计（含排版） → image-poster-generate；换脸 → image-face-swap</not_for>


- tool: image-poster-generate
  name: 海报生成
  description: |
    <summary>生成含文字排版的海报，支持中文与非中文，适用于宣传/广告/活动推广。</summary>
    <input>text 1个(海报内容/设计要求 prompt) + image 0+张(可选素材图)</input>
    <o>image（每次仅1张）</o>
    <triggers>生成海报/宣传图/广告图；基于图片生成海报；修改已有海报文字/色彩/元素/背景/尺寸；生成系列海报</triggers>
    <constraints>每次仅输出1张；中文与非中文自动适配不同模型</constraints>
    <prefer_over tool="image-generate">输出物明确是海报/宣传物料，需文字排版和版式</prefer_over>
    <prefer_over tool="image-edit">目标是完整海报设计或系列延展，非单纯局部修改</prefer_over>
    <not_for>通用图片生成（非海报） → image-generate；非海报图片编辑 → image-edit</not_for>


- tool: image-edit
  name: 图片编辑
  description: |
    <summary>对已有图片进行局部或整体编辑，支持多图参考融合与分析标注。内含三个子模型，需根据编辑目标选择。</summary>
    <input>image 1+张(至少一张底图，可追加参考图) + text 1个(编辑指令 prompt)</input>
    <o>image</o>
    <triggers>修改现有图片局部内容（换背景、改颜色、去除/添加元素）；多张图提取材质/风格/构图融合；在现有图片上渲染文字；图片分析或标注；将人物/宠物照片转为卡通、3D手办、二次元等艺术风格；人像/宠物写真生成、发型调整</triggers>
    <param name="model" values="nougat/gummy/praline" default="praline">
    按优先级从高到低判断，先匹配专科模型，都不命中则走全科默认：
    1. nougat — 编辑目标是将照片转为高度风格化的艺术风格时必选：卡通化、3D手办风、二次元、简笔画、概括性可爱风格等艺术再创作。⚠️ 该模型人脸相似度低，不适用于需要保持人脸真实感的场景（证件照、写实肖像等）。
    2. gummy — 编辑目标是人像写真或宠物写真生成、或发型调整时选：基于用户人像照/宠物照生成写真风格图片，调整发型款式、发丝纹理等。支持多图输入。
    3. praline（默认）— 以上都不符合时选：文字操作（修改/添加/消除/替换图中文字、文字渲染、手写体）、换背景、改颜色、添加/去除元素、构图调整、物体替换、多图材质风格融合、跨图风格统一、图片分析标注等所有通用编辑场景。
    ⚠️ 判断要点：nougat 是"变画风"（输出不像真人），gummy 是"拍写真/换发型"（输出像真人），praline 是"改内容"（通用编辑）。
    </param>
    <constraints>ratio 取值因 model 不同：praline 支持 auto/1:1/2:3/3:2/3:4/4:3/4:5/5:4/9:16/16:9/21:9；nougat 支持 auto/1:1/2:3/3:2；gummy 支持 auto/1:1/4:3/3:4/16:9/9:16/3:2/2:3/21:9</constraints>
    <prefer_over tool="image-generate">用户有明确底图要编辑，非从零生图</prefer_over>
    <prefer_over tool="image-poster-generate">编辑目标不是海报，或仅需局部微调</prefer_over>
    <not_for>无底图纯文字生图 → image-generate；完整海报设计 → image-poster-generate；仅超清 → image-upscale；仅美容 → image-beauty-enhance</not_for>


- tool: image-upscale
  name: 图片超清
  description: |
    <summary>提升图片分辨率和清晰度，消除噪点，增强画质。</summary>
    <input>image 1张</input>
    <o>image（更高清的图片）</o>
    <not_for>修改图片内容 → image-edit；美颜修饰 → image-beauty-enhance</not_for>


- tool: image-beauty-enhance
  name: 图片美容
  description: |
    <summary>对单人人像进行美颜：美肤、减淡瑕疵、提亮肤色、修饰脸型五官。</summary>
    <input>image 1张(仅支持单人图)</input>
    <o>image（保留高清质感和个人面部特征）</o>
    <triggers>美颜/变好看/变漂亮/变美丽；修饰皮肤/减淡瑕疵/提亮肤色；修饰脸型或五官；提到"AI美容"、"一键美容"</triggers>
    <constraints>仅支持单人图，不支持多人</constraints>
    <prefer_over tool="image-edit">需求仅限美颜美肤，不涉及内容修改</prefer_over>
    <prefer_over tool="image-upscale">目标是面部美化而非纯画质提升</prefer_over>
    <not_for>多人合照美颜（不支持）；修改图片内容 → image-edit；纯画质提升 → image-upscale；换脸 → image-face-swap</not_for>


- tool: image-face-swap
  name: AI换头
  description: |
    <summary>将图1人物的头部和肤色替换到图2上，保留图2的姿态、服饰和背景。</summary>
    <input>image 2张(图1=源脸，图2=目标姿态/场景)</input>
    <o>image（图2构图不变，头部肤色换为图1）</o>
    <triggers>提供两张人像图，要求换脸/换头；把A的脸放到B的身体/场景上</triggers>
    <prefer_over tool="image-edit">需求明确是人脸替换，非通用编辑</prefer_over>
    <prefer_over tool="image-try-on">目标是换脸而非换装</prefer_over>
    <not_for>替换背景 → image-edit；仅换发型不换脸 → image-edit；虚拟试衣 → image-try-on</not_for>


- tool: image-try-on
  name: AI换装
  description: |
    <summary>将服装图适配到人像上，生成虚拟试穿效果。</summary>
    <input>image 2张(人像图1张(不要求完整人像) + 服装图1张(平铺或穿着均可))</input>
    <o>image</o>
    <triggers>提供人像+服装图，要求试穿/换装/看上身效果</triggers>
    <constraints>⚠️ 调用前必须先调用 image_analysis 分析用户图片；必须同时提供人像图和服装图</constraints>
    <prefer_over tool="image-face-swap">目标是换装而非换脸</prefer_over>
    <prefer_over tool="image-edit">需求明确是虚拟试衣，非通用编辑</prefer_over>
    <not_for>换脸 → image-face-swap；仅抠出服装 → image-cutout</not_for>


- tool: image-cutout
  name: 抠图
  description: |
    <summary>分离前景与背景，提取主体或人物，输出透明背景图。</summary>
    <input>image 1张</input>
    <o>image（透明背景的主体图）</o>
    <not_for>抠图后换背景 → 先 image-cutout 再 image-edit；宫格拆分 → image-grid-split</not_for>


- tool: image-grid-split
  name: 宫格拆分
  description: |
    <summary>将单张宫格拼接图拆分为多张独立图片。当前支持四宫格(2x2)。</summary>
    <input>image 1张(标准宫格布局的拼接图)</input>
    <o>image（4张独立图片（四宫格模式））</o>
    <triggers>四宫格/九宫格/田字格拼接图要求拆分成单张；将一张图按宫格等分切割</triggers>
    <constraints>当前仅支持四宫格(2x2)；非宫格图片拆分结果可能不符合预期</constraints>
    <prefer_over tool="image-edit">按宫格等分拆图，非任意裁切</prefer_over>
    <prefer_over tool="image-cutout">网格切割整张图，非分离前景主体</prefer_over>
    <not_for>任意比例裁切 → image-edit；提取前景主体 → image-cutout</not_for>