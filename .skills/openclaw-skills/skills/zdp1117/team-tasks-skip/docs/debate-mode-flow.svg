<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="agiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="agentAGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="agentBGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="agentCGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <linearGradient id="phaseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a18cd1"/>
      <stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
    <linearGradient id="synthGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd200"/>
      <stop offset="100%" style="stop-color:#f7971e"/>
    </linearGradient>
    <linearGradient id="jsonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6a11cb33"/>
      <stop offset="100%" style="stop-color:#2575fc33"/>
    </linearGradient>
    <!-- 箭头标记 -->
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff99"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4facfe"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43e97b"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffd200"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00f2fe"/>
    </marker>
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000066"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1100" height="920" fill="url(#bgGrad)" rx="16"/>

  <!-- 标题栏 -->
  <rect x="30" y="20" width="1040" height="56" rx="12" fill="url(#headerGrad)" opacity="0.9" filter="url(#softShadow)"/>
  <text x="550" y="55" text-anchor="middle" fill="white" font-size="22" font-weight="bold">🗣️  Mode C — 多 Agent 辩论模式 · 执行流程与架构图</text>

  <!-- ═══════════ 阶段 0: 初始化 ═══════════ -->
  <rect x="30" y="96" width="1040" height="2" rx="1" fill="url(#phaseGrad)" opacity="0.4"/>
  <text x="50" y="118" fill="#a18cd1" font-size="13" font-weight="bold" letter-spacing="2">阶段 0 ─ 初始化</text>

  <!-- 用户 -->
  <rect x="60" y="132" width="160" height="54" rx="10" fill="#ffffff11" stroke="#ffffff44" stroke-width="1.2"/>
  <text x="140" y="155" text-anchor="middle" fill="white" font-size="14" font-weight="bold">👤 用户 (Master)</text>
  <text x="140" y="173" text-anchor="middle" fill="#aaa" font-size="11">提出辩论问题</text>

  <!-- 箭头: 用户 → AGI -->
  <line x1="220" y1="159" x2="310" y2="159" stroke="#ffffff99" stroke-width="1.5" marker-end="url(#arrowWhite)" stroke-dasharray="6,3"/>
  <text x="265" y="151" text-anchor="middle" fill="#ccc" font-size="10">init</text>

  <!-- AGI 调度中心 -->
  <rect x="315" y="126" width="200" height="66" rx="12" fill="url(#agiGrad)" opacity="0.15" stroke="#f5576c" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="415" y="153" text-anchor="middle" fill="#f5576c" font-size="15" font-weight="bold" filter="url(#glow)">🧠 AGI 调度中心</text>
  <text x="415" y="173" text-anchor="middle" fill="#f5576cbb" font-size="11">中心化编排 · 全流程控制</text>

  <!-- 箭头: AGI → JSON -->
  <line x1="515" y1="159" x2="605" y2="159" stroke="#f5576c" stroke-width="1.5" marker-end="url(#arrowPink)" stroke-dasharray="6,3"/>
  <text x="560" y="151" text-anchor="middle" fill="#f5576caa" font-size="10">创建项目</text>

  <!-- JSON 文件 -->
  <rect x="610" y="130" width="190" height="58" rx="10" fill="url(#jsonGrad)" stroke="#6a11cb66" stroke-width="1.2"/>
  <text x="705" y="153" text-anchor="middle" fill="#d4b0ff" font-size="13" font-weight="bold">📄 project.json</text>
  <text x="705" y="172" text-anchor="middle" fill="#9988cc" font-size="10">mode: "debate" · goal · debaters</text>

  <!-- CLI 命令提示 -->
  <rect x="835" y="132" width="220" height="54" rx="8" fill="#ffffff08" stroke="#ffffff22" stroke-width="1"/>
  <text x="945" y="152" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">init proj --mode debate -g "问题"</text>
  <text x="945" y="167" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">add-debater proj agent-a</text>
  <text x="945" y="182" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">add-debater proj agent-b -r "角色"</text>

  <!-- ═══════════ 阶段 1: 初始立场 ═══════════ -->
  <rect x="30" y="210" width="1040" height="2" rx="1" fill="url(#phaseGrad)" opacity="0.4"/>
  <text x="50" y="232" fill="#a18cd1" font-size="13" font-weight="bold" letter-spacing="2">阶段 1 ─ 初始立场收集 (Round 1: initial)</text>

  <!-- AGI 派发框 -->
  <rect x="120" y="248" width="140" height="44" rx="10" fill="#f5576c22" stroke="#f5576c88" stroke-width="1.2"/>
  <text x="190" y="266" text-anchor="middle" fill="#f5576c" font-size="12" font-weight="bold">🧠 AGI 派发</text>
  <text x="190" y="281" text-anchor="middle" fill="#f5576caa" font-size="10">round start</text>

  <!-- 三条派发箭头 -->
  <path d="M260 260 C320 260, 340 270, 370 270" fill="none" stroke="#4facfe" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <path d="M260 270 C320 270, 340 340, 370 340" fill="none" stroke="#43e97b" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <path d="M260 280 C320 280, 340 410, 370 410" fill="none" stroke="#fa709a" stroke-width="1.5"/>

  <!-- Agent A -->
  <rect x="375" y="248" width="220" height="60" rx="10" fill="url(#agentAGrad)" opacity="0.12" stroke="#4facfe" stroke-width="1.3" filter="url(#softShadow)"/>
  <text x="485" y="270" text-anchor="middle" fill="#4facfe" font-size="13" font-weight="bold">🔧 Agent A (code-agent)</text>
  <text x="485" y="287" text-anchor="middle" fill="#4facfebb" font-size="11">角色: 安全专家</text>
  <text x="485" y="302" text-anchor="middle" fill="#4facfe88" font-size="10">→ 输出初始立场 A</text>

  <!-- Agent B -->
  <rect x="375" y="318" width="220" height="60" rx="10" fill="url(#agentBGrad)" opacity="0.12" stroke="#43e97b" stroke-width="1.3" filter="url(#softShadow)"/>
  <text x="485" y="340" text-anchor="middle" fill="#43e97b" font-size="13" font-weight="bold">🧪 Agent B (test-agent)</text>
  <text x="485" y="357" text-anchor="middle" fill="#43e97bbb" font-size="11">角色: QA 工程师</text>
  <text x="485" y="372" text-anchor="middle" fill="#43e97b88" font-size="10">→ 输出初始立场 B</text>

  <!-- Agent C -->
  <rect x="375" y="388" width="220" height="60" rx="10" fill="url(#agentCGrad)" opacity="0.12" stroke="#fa709a" stroke-width="1.3" filter="url(#softShadow)"/>
  <text x="485" y="410" text-anchor="middle" fill="#fa709a" font-size="13" font-weight="bold">🚨 Agent C (monitor-bot)</text>
  <text x="485" y="427" text-anchor="middle" fill="#fa709abb" font-size="11">角色: 运维工程师</text>
  <text x="485" y="442" text-anchor="middle" fill="#fa709a88" font-size="10">→ 输出初始立场 C</text>

  <!-- 回收箭头: Agent → AGI 收集 -->
  <rect x="700" y="310" width="150" height="50" rx="10" fill="#f5576c22" stroke="#f5576c88" stroke-width="1.2"/>
  <text x="775" y="332" text-anchor="middle" fill="#f5576c" font-size="12" font-weight="bold">🧠 AGI 收集</text>
  <text x="775" y="348" text-anchor="middle" fill="#f5576caa" font-size="10">round collect</text>

  <path d="M595 278 C640 278, 660 325, 700 325" fill="none" stroke="#4facfe88" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <path d="M595 348 C640 348, 660 335, 700 335" fill="none" stroke="#43e97b88" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <path d="M595 418 C640 418, 660 345, 700 345" fill="none" stroke="#fa709a88" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- CLI 命令 -->
  <rect x="880" y="310" width="190" height="50" rx="8" fill="#ffffff08" stroke="#ffffff22" stroke-width="1"/>
  <text x="975" y="330" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">round proj start</text>
  <text x="975" y="345" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">round proj collect A "立场"</text>
  <text x="975" y="358" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">round proj collect B "立场"</text>

  <!-- ═══════════ 阶段 2: 交叉评审 ═══════════ -->
  <rect x="30" y="470" width="1040" height="2" rx="1" fill="url(#phaseGrad)" opacity="0.4"/>
  <text x="50" y="492" fill="#a18cd1" font-size="13" font-weight="bold" letter-spacing="2">阶段 2 ─ 交叉评审 (Round 2: cross-review)</text>

  <!-- AGI 生成交叉评审提示 -->
  <rect x="60" y="508" width="180" height="50" rx="10" fill="#f5576c22" stroke="#f5576c88" stroke-width="1.2"/>
  <text x="150" y="528" text-anchor="middle" fill="#f5576c" font-size="12" font-weight="bold">🧠 AGI 生成提示</text>
  <text x="150" y="544" text-anchor="middle" fill="#f5576caa" font-size="10">round cross-review</text>

  <!-- 交叉评审：Agent A 看到 B+C -->
  <rect x="310" y="505" width="280" height="48" rx="10" fill="url(#agentAGrad)" opacity="0.10" stroke="#4facfe88" stroke-width="1"/>
  <text x="450" y="525" text-anchor="middle" fill="#4facfe" font-size="12" font-weight="bold">🔧 Agent A 评审</text>
  <text x="450" y="543" text-anchor="middle" fill="#4facfe99" font-size="10">看到 B + C 的立场 → 输出评审意见</text>

  <!-- 交叉评审：Agent B 看到 A+C -->
  <rect x="310" y="560" width="280" height="48" rx="10" fill="url(#agentBGrad)" opacity="0.10" stroke="#43e97b88" stroke-width="1"/>
  <text x="450" y="580" text-anchor="middle" fill="#43e97b" font-size="12" font-weight="bold">🧪 Agent B 评审</text>
  <text x="450" y="598" text-anchor="middle" fill="#43e97b99" font-size="10">看到 A + C 的立场 → 输出评审意见</text>

  <!-- 交叉评审：Agent C 看到 A+B -->
  <rect x="310" y="615" width="280" height="48" rx="10" fill="url(#agentCGrad)" opacity="0.10" stroke="#fa709a88" stroke-width="1"/>
  <text x="450" y="635" text-anchor="middle" fill="#fa709a" font-size="12" font-weight="bold">🚨 Agent C 评审</text>
  <text x="450" y="653" text-anchor="middle" fill="#fa709a99" font-size="10">看到 A + B 的立场 → 输出评审意见</text>

  <!-- 派发箭头 -->
  <path d="M240 528 C270 528, 290 525, 310 525" fill="none" stroke="#4facfe88" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <path d="M240 533 C270 540, 290 575, 310 580" fill="none" stroke="#43e97b88" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <path d="M240 538 C270 560, 290 630, 310 635" fill="none" stroke="#fa709a88" stroke-width="1.2"/>

  <!-- 交叉连线示意（谁看谁） -->
  <rect x="660" y="545" width="160" height="55" rx="10" fill="#ffffff08" stroke="#ffffff22" stroke-width="1"/>
  <text x="740" y="562" text-anchor="middle" fill="#ddd" font-size="11" font-weight="bold">🔀 交叉可见性</text>
  <text x="740" y="578" text-anchor="middle" fill="#4facfe" font-size="10">A → 看到 B, C 的立场</text>
  <text x="740" y="591" text-anchor="middle" fill="#43e97b" font-size="10">B → 看到 A, C 的立场</text>
  <!-- C line -->
  <text x="740" y="604" text-anchor="middle" fill="#fa709a" font-size="10" dy="-5">C → 看到 A, B 的立场</text>

  <!-- CLI -->
  <rect x="870" y="548" width="190" height="48" rx="8" fill="#ffffff08" stroke="#ffffff22" stroke-width="1"/>
  <text x="965" y="567" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">round proj cross-review</text>
  <text x="965" y="582" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">round proj collect A "评审"</text>
  <text x="965" y="596" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">...</text>

  <!-- ═══════════ 阶段 3: 综合 ═══════════ -->
  <rect x="30" y="684" width="1040" height="2" rx="1" fill="url(#phaseGrad)" opacity="0.4"/>
  <text x="50" y="706" fill="#a18cd1" font-size="13" font-weight="bold" letter-spacing="2">阶段 3 ─ 综合决策 (Synthesize)</text>

  <!-- 综合输入 -->
  <rect x="100" y="722" width="340" height="80" rx="12" fill="#ffd20011" stroke="#ffd20066" stroke-width="1.2"/>
  <text x="270" y="744" text-anchor="middle" fill="#ffd200" font-size="13" font-weight="bold">📦 综合数据包</text>
  <text x="270" y="764" text-anchor="middle" fill="#ffd200bb" font-size="11">初始立场 (A, B, C) + 交叉评审 (A, B, C)</text>
  <text x="270" y="781" text-anchor="middle" fill="#ffd200aa" font-size="10">所有 Agent 的观点 + 反驳 + 修正意见</text>
  <text x="270" y="796" text-anchor="middle" fill="#88888888" font-size="10" font-family="monospace">round proj synthesize</text>

  <!-- 箭头 -->
  <line x1="440" y1="762" x2="530" y2="762" stroke="#ffd200" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="485" y="754" text-anchor="middle" fill="#ffd200aa" font-size="10">汇总</text>

  <!-- AGI 综合 -->
  <rect x="535" y="725" width="230" height="74" rx="12" fill="url(#synthGrad)" opacity="0.15" stroke="#ffd200" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="650" y="750" text-anchor="middle" fill="#ffd200" font-size="15" font-weight="bold" filter="url(#glow)">🧠 AGI 综合决策</text>
  <text x="650" y="770" text-anchor="middle" fill="#ffd200cc" font-size="11">提取最强论点 · 解决分歧</text>
  <text x="650" y="787" text-anchor="middle" fill="#ffd200aa" font-size="11">产出最终建议</text>

  <!-- 箭头: 综合 → 输出 -->
  <line x1="765" y1="762" x2="835" y2="762" stroke="#ffd200" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- 最终输出 -->
  <rect x="840" y="728" width="210" height="68" rx="12" fill="#ffffff11" stroke="#ffd20088" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="945" y="752" text-anchor="middle" fill="white" font-size="14" font-weight="bold">✅ 最终建议</text>
  <text x="945" y="771" text-anchor="middle" fill="#ccc" font-size="11">综合各方最优观点</text>
  <text x="945" y="788" text-anchor="middle" fill="#999" font-size="10">→ 反馈给用户</text>

  <!-- ═══════════ 底部: 数据流总览 ═══════════ -->
  <rect x="30" y="824" width="1040" height="2" rx="1" fill="url(#phaseGrad)" opacity="0.3"/>

  <!-- 时间线总览 -->
  <rect x="60" y="840" width="980" height="62" rx="10" fill="#ffffff06" stroke="#ffffff15" stroke-width="1"/>

  <!-- 流程节点 -->
  <circle cx="140" cy="865" r="14" fill="#6a11cb44" stroke="#a18cd1" stroke-width="1.5"/>
  <text x="140" y="869" text-anchor="middle" fill="#d4b0ff" font-size="10" font-weight="bold">初始</text>
  <text x="140" y="893" text-anchor="middle" fill="#888" font-size="9">init + add</text>

  <line x1="154" y1="865" x2="256" y2="865" stroke="#ffffff33" stroke-width="1.5"/>

  <circle cx="270" cy="865" r="14" fill="#4facfe33" stroke="#4facfe" stroke-width="1.5"/>
  <text x="270" y="869" text-anchor="middle" fill="#4facfe" font-size="10" font-weight="bold">R1</text>
  <text x="270" y="893" text-anchor="middle" fill="#888" font-size="9">立场收集</text>

  <line x1="284" y1="865" x2="386" y2="865" stroke="#ffffff33" stroke-width="1.5"/>

  <circle cx="400" cy="865" r="14" fill="#43e97b33" stroke="#43e97b" stroke-width="1.5"/>
  <text x="400" y="869" text-anchor="middle" fill="#43e97b" font-size="10" font-weight="bold">R2</text>
  <text x="400" y="893" text-anchor="middle" fill="#888" font-size="9">交叉评审</text>

  <line x1="414" y1="865" x2="516" y2="865" stroke="#ffffff33" stroke-width="1.5"/>

  <circle cx="530" cy="865" r="14" fill="#ffd20044" stroke="#ffd200" stroke-width="1.5"/>
  <text x="530" y="869" text-anchor="middle" fill="#ffd200" font-size="10" font-weight="bold">综合</text>
  <text x="530" y="893" text-anchor="middle" fill="#888" font-size="9">synthesize</text>

  <line x1="544" y1="865" x2="626" y2="865" stroke="#ffffff33" stroke-width="1.5"/>

  <circle cx="640" cy="865" r="14" fill="#ffffff22" stroke="#ffffff88" stroke-width="1.5"/>
  <text x="640" y="869" text-anchor="middle" fill="white" font-size="10" font-weight="bold">✓</text>
  <text x="640" y="893" text-anchor="middle" fill="#888" font-size="9">完成</text>

  <!-- 技术栈说明 -->
  <text x="820" y="856" text-anchor="middle" fill="#666" font-size="10">核心: task_manager.py (Python 3.12+)</text>
  <text x="820" y="872" text-anchor="middle" fill="#666" font-size="10">数据: JSON · 无外部依赖</text>
  <text x="820" y="888" text-anchor="middle" fill="#666" font-size="10">编排: AGI 中心化调度 (sessions_send)</text>

</svg>
