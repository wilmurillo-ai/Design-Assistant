name: red-crawler-ops
version: 1.0.0
runtime: python
entry: src/index.py
description: Portable OpenClaw skill for running the installed red-crawler CLI. It can use a published CLI install by default, or an existing local checkout when explicitly requested.
requirements:
  binaries:
    - red-crawler
  network_access: required for Xiaohongshu pages and optional dependency or browser installation
  sensitive_local_files:
    - Playwright storage state JSON
  remote_repository_clone: false
config:
  workspace_path:
    type: string
    default: .
    description: Working directory for state, database, reports, and outputs.
  storage_state:
    type: string
    default: ./state.json
    description: Playwright storage state file used for authenticated actions.
  db_path:
    type: string
    default: ./data/red_crawler.db
    description: SQLite database path inside the workspace.
  report_dir:
    type: string
    default: ./reports
    description: Directory for generated report artifacts.
  output_dir:
    type: string
    default: ./output
    description: Directory for crawl exports.
  cache_dir:
    type: string
    default: ./.cache/red-crawler
    description: Directory for crawler cache files.
  runner_command:
    type: [string, array]
    default: red-crawler
    description: Command prefix used to launch the red-crawler CLI.
  require_local_checkout:
    type: boolean
    default: false
    description: Require workspace_path to be a red-crawler source checkout.
  default_crawl_budget:
    type: integer
    default: 30
    description: Default crawl budget used when collect_nightly does not receive one.
  default_report_days:
    type: integer
    default: 7
    description: Default report window used when report_weekly does not receive one.
  default_list_limit:
    type: integer
    default: 20
    description: Default list limit used when list_contactable does not receive one.
input_schema:
  type: object
  required:
    - action
  properties:
    action:
      type: string
      enum:
        - bootstrap
        - login
        - crawl_seed
        - collect_nightly
        - report_weekly
        - list_contactable
    workspace_path:
      type: string
    runner_command:
      oneOf:
        - type: string
        - type: array
          items:
            type: string
    require_local_checkout:
      type: boolean
    storage_state:
      type: string
    seed_url:
      type: string
    login_url:
      type: string
    sync_dependencies:
      type: boolean
    install_browser:
      type: boolean
    output_dir:
      type: string
    db_path:
      type: string
    report_dir:
      type: string
    cache_dir:
      type: string
    max_accounts:
      type: integer
    max_depth:
      type: integer
    include_note_recommendations:
      type: boolean
    safe_mode:
      type: boolean
    cache_ttl_days:
      type: integer
    crawl_budget:
      type: integer
    search_term_limit:
      type: integer
    startup_jitter_minutes:
      type: integer
    slot_name:
      type: string
    days:
      type: integer
    lead_type:
      type: string
    creator_segment:
      type: string
    min_relevance_score:
      type: number
    limit:
      type: integer
    format:
      type: string
output_schema:
  type: object
  properties:
    status:
      type: string
      enum: [success, error]
    action:
      type: string
    command:
      type: string
    summary:
      type: string
    artifacts:
      type: object
      additionalProperties:
        type: string
    metrics:
      type: object
      additionalProperties: true
    next_step:
      type: string
    stdout:
      type: string
    stderr:
      type: string
    error_type:
      type: string
    message:
      type: string
    suggested_fix:
      type: string
    error:
      type: object
      properties:
        error_type:
          type: string
        message:
          type: string
        suggested_fix:
          type: string
        command:
          type: string
        stdout:
          type: string
        stderr:
          type: string
