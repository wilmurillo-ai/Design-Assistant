strategy_id: trend_breakout
strategy_name: Trend Breakout
version: v1

inputs:
  timeframe: daily
  breakout_lookback_days: 20
  volume_avg_days: 20
  volume_multiplier: 1.2
  trend_ma_days: 50
  exit_ma_days: 10
  exit_confirm_days: 2

entry:
  conditions:
    - close_above_prior_20_day_high
    - volume_at_least_1.2x_20_day_average
    - close_above_50_day_moving_average

exit:
  stop_loss:
    rule: tighter_of
    options:
      - 5_percent_below_entry
      - below_recent_support
  trend_failure:
    rule: close_below_10_day_ma_for_2_consecutive_days

position_sizing:
  formula: max_risk_per_trade / (entry_price - stop_price)
  use_position_cap: true
