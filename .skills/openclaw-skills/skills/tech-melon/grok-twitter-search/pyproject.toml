[project]
name = "grok-twitter-search"
version = "1.0.0"
description = "使用 xAI Grok 模型的 x_search 工具智能搜索 Twitter 内容"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Tech-Melon", url = "https://github.com/Tech-Melon"}
]
keywords = ["twitter", "grok", "xai", "search", "social-media"]
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.uv]
dev-dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"