<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Noto Sans SC', sans-serif; background: linear-gradient(135deg, #FF6B35 0%, #F7C59F 50%, #EFEFD0 100%); display: flex; justify-content: center; align-items: center; padding: 20px; }
        .slide { width: 210mm; height: 297mm; background: linear-gradient(145deg, #ffffff 0%, #fff8f0 100%); border-radius: 20px; box-shadow: 0 25px 80px rgba(255, 107, 53, 0.3), 0 0 0 8px rgba(255, 107, 53, 0.1); overflow: hidden; position: relative; }
        .decoration { position: absolute; border-radius: 50%; opacity: 0.6; }
        .decoration-1 { width: 300px; height: 300px; background: linear-gradient(135deg, #FF6B35, #FF8C42); top: -100px; right: -80px; opacity: 0.15; }
        .decoration-2 { width: 200px; height: 200px; background: linear-gradient(135deg, #00D4AA, #00B894); bottom: -60px; left: -60px; opacity: 0.2; }
        .slide-content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; padding: 50mm 45mm 40mm 45mm; }
        .tag { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #FF6B35, #FF8C42); color: white; padding: 8px 20px; border-radius: 50px; font-size: 14px; font-weight: 700; letter-spacing: 1px; width: fit-content; margin-bottom: 30px; }
        .title { font-size: 48px; font-weight: 900; color: #1a1a2e; line-height: 1.2; margin-bottom: 12px; }
        .subtitle { font-size: 22px; color: #FF6B35; font-weight: 700; margin-bottom: 35px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: linear-gradient(145deg, #fff, #f8f9fa); border-radius: 16px; padding: 20px 15px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid rgba(255, 107, 53, 0.1); }
        .stat-number { font-size: 36px; font-weight: 900; background: linear-gradient(135deg, #FF6B35, #FF8C42); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 13px; color: #666; font-weight: 500; margin-top: 5px; }
        .points-section { margin-bottom: 30px; }
        .section-title { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 20px; background: linear-gradient(135deg, #FF6B35, #FF8C42); border-radius: 2px; }
        .point-list { list-style: none; }
        .point-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px dashed rgba(255, 107, 53, 0.2); }
        .point-item:last-child { border-bottom: none; }
        .point-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #FF6B35, #FF8C42); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; flex-shrink: 0; }
        .point-text { font-size: 15px; color: #333; line-height: 1.5; flex: 1; }
        .point-text strong { color: #FF6B35; font-weight: 700; }
        .agents-section { margin-top: auto; }
        .agents-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }
        .agents-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .agent-tag { background: linear-gradient(135deg, #f8f9fa, #fff); border: 1px solid rgba(255, 107, 53, 0.2); padding: 8px 14px; border-radius: 20px; font-size: 13px; color: #333; font-weight: 500; }
        .footer { position: absolute; bottom: 25mm; left: 45mm; right: 45mm; display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 2px solid rgba(255, 107, 53, 0.1); }
        .footer-text { font-size: 12px; color: #999; }
        .footer-badge { background: linear-gradient(135deg, #00D4AA, #00B894); color: white; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="slide">
        <div class="decoration decoration-1"></div>
        <div class="decoration decoration-2"></div>
        <div class="slide-content">
            <div class="tag">{{tag}}</div>
            <h1 class="title">{{title}}</h1>
            <p class="subtitle">{{subtitle}}</p>
            <div class="stats-grid" id="stats"></div>
            <div class="points-section">
                <h3 class="section-title">核心亮点</h3>
                <ul class="point-list" id="points"></ul>
            </div>
            <div class="agents-section" id="agents" style="display:none"></div>
        </div>
        <div class="footer">
            <span class="footer-text">{{footer}}</span>
            <span class="footer-badge">{{badge}}</span>
        </div>
    </div>
    <script>
        const stats = {{stats}};
        document.getElementById('stats').innerHTML = stats.map(s => `<div class="stat-card"><div class="stat-number">${s.num}</div><div class="stat-label">${s.label}</div></div>`).join('');
        
        const points = {{points}};
        document.getElementById('points').innerHTML = points.map(p => `<li class="point-item"><span class="point-icon">${p.icon}</span><span class="point-text">${p.text}</span></li>`).join('');
        
        const agents = {{agents}};
        if (agents.length > 0) {
            const agentsDiv = document.getElementById('agents');
            agentsDiv.style.display = 'block';
            agentsDiv.innerHTML = `<div class="agents-title">团队成员</div><div class="agents-list">${agents.map(a => `<span class="agent-tag">${a.emoji}${a.name}</span>`).join('')}</div>`;
        }
    </script>
</body>
</html>
