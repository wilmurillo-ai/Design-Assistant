<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Noto Sans SC', sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .slide { width: 210mm; height: 297mm; background: #ffffff; border-radius: 4px; box-shadow: 0 4px 30px rgba(0,0,0,0.08); overflow: hidden; position: relative; }
        .slide-content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; padding: 55mm 50mm 45mm 50mm; }
        .title { font-size: 40px; font-weight: 700; color: #111; line-height: 1.3; margin-bottom: 8px; letter-spacing: -0.5px; }
        .subtitle { font-size: 18px; color: #666; font-weight: 400; margin-bottom: 40px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 35px; border-bottom: 2px solid #f0f0f0; padding-bottom: 25px; }
        .stat-card { text-align: left; }
        .stat-number { font-size: 32px; font-weight: 700; color: #111; }
        .stat-label { font-size: 13px; color: #888; font-weight: 400; margin-top: 2px; }
        .points-section { flex: 1; }
        .section-title { font-size: 14px; font-weight: 500; color: #111; margin-bottom: 18px; text-transform: uppercase; letter-spacing: 2px; }
        .point-list { list-style: none; }
        .point-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; border-bottom: 1px solid #f5f5f5; }
        .point-item:last-child { border-bottom: none; }
        .point-num { width: 24px; height: 24px; background: #111; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
        .point-text { font-size: 15px; color: #333; line-height: 1.6; flex: 1; }
        .footer { position: absolute; bottom: 30mm; left: 50mm; right: 50mm; display: flex; justify-content: space-between; align-items: center; }
        .footer-text { font-size: 11px; color: #bbb; }
    </style>
</head>
<body>
    <div class="slide">
        <div class="slide-content">
            <h1 class="title">{{title}}</h1>
            <p class="subtitle">{{subtitle}}</p>
            <div class="stats-grid" id="stats"></div>
            <div class="points-section">
                <h3 class="section-title">核心要点</h3>
                <ul class="point-list" id="points"></ul>
            </div>
        </div>
        <div class="footer">
            <span class="footer-text">{{footer}}</span>
        </div>
    </div>
    <script>
        const stats = {{stats}};
        document.getElementById('stats').innerHTML = stats.map(s => `<div class="stat-card"><div class="stat-number">${s.num}</div><div class="stat-label">${s.label}</div></div>`).join('');
        const points = {{points}};
        document.getElementById('points').innerHTML = points.map((p, i) => `<li class="point-item"><span class="point-num">${i+1}</span><span class="point-text">${p.text}</span></li>`).join('');
    </script>
</body>
</html>
