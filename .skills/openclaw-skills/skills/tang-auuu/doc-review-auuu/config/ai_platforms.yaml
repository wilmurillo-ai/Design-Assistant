# AI对话平台检测配置
# 用于审查文档时检测是否包含AI对话链接

# 平台域名映射表
platforms:
  # OpenAI 系列
  chat.openai.com: "ChatGPT"
  chatgpt.com: "ChatGPT"

  # Anthropic 系列
  claude.ai: "Claude"

  # 国产 AI
  kimi.moonshot.cn: "Kimi"
  moonshot.cn: "Kimi"
  tongyi.aliyun.com: "通义千问"
  qwen.aliyun.com: "通义千问"
  qwen.ai: "通义千问"
  doubao.com: "豆包"
