name: Submit to Awesome Lists

on:
  workflow_dispatch:        # 手动触发（首次发布后执行一次）
  push:
    tags:
      - 'v1.0.0'           # 仅在首次 1.0.0 发布时自动触发

jobs:
  submit-to-awesome-claude-skills:
    name: Submit PR to awesome-claude-skills
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git
        run: |
          git config --global user.name "wells1137"
          git config --global user.email "wells1137@users.noreply.github.com"

      - name: Fork and submit PR to ComposioHQ/awesome-claude-skills
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "🔀 Forking awesome-claude-skills..."
          gh repo fork ComposioHQ/awesome-claude-skills --clone --remote
          cd awesome-claude-skills
          
          git checkout -b add-wells1137-skills-gen
          
          # Add entry to the list (find the right section)
          ENTRY="- [skills-gen](https://github.com/wells1137/skills-gen) - Content creation skills: image generation (8 AI models), audio production (TTS/music/SFX/voice clone), video overlay. Zero API key management."
          
          # Append to README if not already present
          if ! grep -q "wells1137/skills-gen" README.md; then
            echo "" >> README.md
            echo "$ENTRY" >> README.md
            git add README.md
            git commit -m "Add wells1137/skills-gen - content creation skills collection"
            git push origin add-wells1137-skills-gen
            
            gh pr create \
              --repo ComposioHQ/awesome-claude-skills \
              --title "Add wells1137/skills-gen: content creation skills (image, audio, video)" \
              --body "Adding skills-gen, a collection of content creation skills for OpenClaw/Claude Code:

- **image-gen**: Generate images with 8 AI models (Midjourney, Flux, Ideogram, etc.) — zero API key setup
- **audiomind**: TTS, music generation, sound effects, and voice cloning — one API key for all
- **overlay-skill**: Professional video packaging (intros, subtitles, watermarks, lower thirds)
- **seedance-prompt-designer**: Expert prompt engineering for Seedance 2.0 video generation

GitHub: https://github.com/wells1137/skills-gen
ClaWHub: https://clawhub.ai/wells1137" \
              || echo "⚠️  PR may already exist"
          else
            echo "ℹ️  Entry already exists in awesome-claude-skills"
          fi
