version: 1
output_contract:
  must_include:
    - assumptions
    - confidence
    - invalidation_conditions
    - risks

roles:
  PM:
    description: "投资总监/组合经理：汇总子agent结果，生成最终审批包；不下单。"
  Data:
    description: "数据与事实：价格/波动率/期权链/日历快照，异常与可信度评分。"
  Regime:
    description: "市场状态：趋势/波动/相关性/流动性；策略加减权建议。"
  EquityAlpha:
    description: "个股研究：波段候选、催化剂、关键价位、流动性与期权可交易性。"
  Options:
    description: "期权结构：CSP/CC具体到期、行权、delta区间、管理与滚动规则。"
  Portfolio:
    description: "组合构建：资金分配、集中度、现金覆盖、组合一致性检查。"
  Risk:
    description: "独立风控：可否决；尾部/跳空/相关性/现金覆盖审核。"
  Execution:
    description: "执行：限价/挂单/成交质量/滑点预估。"
  Postmortem:
    description: "复盘归因：PnL拆解、规则迭代建议、周/月复盘模板。"
