name: LI-mvp-kanban-complete-skill
version: "0.0.2"
description: |
  中文：MVP 看板系统 - 完整的任务管理技能，包含 Docker 镜像和源代码
  English: MVP Kanban Board - Complete task management skill with Docker image and source code
author: 北京老李
license: MIT
homepage: https://github.com/your-username/mvp-kanban

# 类型：完整应用技能
type: application

# Docker 镜像配置
docker:
  build:
    context: docker
    dockerfile: Dockerfile
  image: mvp-kanban:latest
  tag: v0.0.1
  ports:
    - "9999:5000"
  volumes:
    - kanban-data:/app/data
  environment:
    - FLASK_ENV=production
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s

# MCP 配置
mcp:
  enabled: true
  config: mcp.json
  tools: 21
  tool_categories:
    - name: 任务管理
      count: 7
      tools:
        - list_projects
        - get_project_details
        - add_project
        - update_project_status
        - update_project_full
        - move_project
        - delete_project
    - name: 泳道管理
      count: 5
      tools:
        - list_lanes
        - add_lane
        - update_lane
        - delete_lane
        - get_lane_details
    - name: 批量操作
      count: 3
      tools:
        - batch_create_projects
        - batch_update_projects
        - batch_delete_projects
    - name: AI 功能
      count: 4
      tools:
        - analyze_board
        - search_similar_projects
        - nlp_command
        - llm_search
    - name: 辅助功能
      count: 2
      tools:
        - get_board_metrics
        - get_project_history

# 文档
documentation:
  - SKILL.md
  - README.md
  - docs/API.md
  - docs/WEB_UI_GUIDE.md
  - docs/USAGE_METHODS.md
  - docs/QUICK_TEST.md

# 标签
tags:
  - kanban
  - task-management
  - project-management
  - mcp
  - ai
  - devops
  - productivity
  - complete-application

# 分类
category: productivity

# 兼容性
compatibility:
  openclaw: ">=1.0.0"
  python: ">=3.12"
  docker: ">=20.10"

# 安装钩子
hooks:
  pre_install: |
    echo "🔍 检查 Docker..."
    if ! command -v docker &> /dev/null; then
      echo "❌ Docker 未安装，请先安装 Docker"
      exit 1
    fi
    echo "✅ Docker 已安装"

  post_install: |
    echo "✅ MVP Kanban Skill 安装完成!"
    echo ""
    echo "📦 构建 Docker 镜像..."
    cd docker
    docker build -t mvp-kanban:latest .
    cd ..
    
    echo ""
    echo "🚀 启动服务..."
    docker-compose up -d
    
    echo ""
    echo "🌐 访问：http://localhost:9999"
    echo "📖 文档：cat SKILL.md"
    echo ""
    echo "⏳ 等待服务启动..."
    sleep 5
    
    echo ""
    echo "✅ 服务已启动！"
    curl -s http://localhost:9999/api/health | python3 -m json.tool || echo "⚠️ 服务正在启动，请稍后访问"

  pre_uninstall: |
    echo "⚠️ 停止服务..."
    docker-compose down || true
    docker stop mvp-kanban || true
    docker rm mvp-kanban || true
    echo "✅ 服务已停止"

  post_uninstall: |
    echo "⚠️ 数据卷保留：kanban-data"
    echo "如需删除数据卷：docker volume rm kanban-data"

# 配置项
config:
  port:
    type: integer
    default: 9999
    description: Web 界面端口
    env: PORT
  data_volume:
    type: string
    default: kanban-data
    description: 数据卷名称
  workers:
    type: integer
    default: 1
    description: Gunicorn worker 数量
  threads:
    type: integer
    default: 4
    description: Gunicorn 线程数

# 服务管理
services:
  - name: kanban
    type: docker-compose
    config: docker/docker-compose.yml
    auto_start: true
    auto_restart: unless-stopped

# 快捷命令
commands:
  start:
    description: 启动服务
    command: docker-compose up -d
    cwd: docker
    
  stop:
    description: 停止服务
    command: docker-compose down
    cwd: docker
    
  restart:
    description: 重启服务
    command: docker-compose restart
    cwd: docker
    
  logs:
    description: 查看日志
    command: docker-compose logs -f
    cwd: docker
    
  status:
    description: 查看状态
    command: docker-compose ps
    cwd: docker
    
  health:
    description: 健康检查
    command: curl -s http://localhost:9999/api/health | python3 -m json.tool
    
  backup:
    description: 备份数据
    command: |
      echo "备份数据库..."
      docker run --rm -v kanban-data:/source -v $(pwd):/backup alpine tar czf /backup/kanban-backup-$(date +%Y%m%d).tar.gz /source
      echo "✅ 备份完成"
    
  restore:
    description: 恢复数据
    command: |
      echo "恢复数据库..."
      docker run --rm -v kanban-data:/target -v $(pwd):/backup alpine tar xzf /backup/kanban-backup.tar.gz -C /target
      echo "✅ 恢复完成"

# 截图（可选）
screenshots:
  - url: https://example.com/screenshot1.png
    description: Web 界面 - 看板视图
  - url: https://example.com/screenshot2.png
    description: Web 界面 - 编辑任务
  - url: https://example.com/screenshot3.png
    description: MCP 工具调用

