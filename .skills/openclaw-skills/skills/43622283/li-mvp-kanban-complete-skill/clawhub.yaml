changelog:
  v3.0.0:
    date: 2026-03-21
    changes:
      - "🎉 完整应用技能 - 包含 Docker 镜像和源代码"
      - "✅ 完整的增删改查功能"
      - "🎨 Web 界面优化 - 双击编辑、拖拽移动"
      - "🤖 MCP 工具增加到 21 个"
      - "🧠 AI 分析功能 - 瓶颈识别、风险预警"
      - "🔍 向量搜索 - 语义级任务搜索"
      - "📦 一体化打包 - 安装即可用"
