# 依赖检查
requirements:
  - name: Docker
    command: docker --version
    min_version: 0.0.1
  - name: Docker Compose
    command: docker-compose --version
    min_version: 0.0.1
  - name: Python (可选，用于开发)
    command: python3 --version
    min_version: 0.0.1
    optional: true

# 环境变量
env:
  FLASK_ENV: production
  PYTHONPATH: /app
  DATABASE_PATH: /app/data/kanban.db

# 持久化数据
persistence:
  volumes:
    - name: kanban-data
      path: /app/data
      description: SQLite 数据库和数据文件
  backup_recommended: true

# 安全配置
security:
  ports:
    - port: 9999
      protocol: tcp
      description: Web 界面
  firewall:
    recommended: true
    rules:
      - port: 9999
        protocol: tcp
        action: allow

# 性能配置
performance:
  memory_limit: 512M
  cpu_limit: 1.0
  recommended_resources:
    memory: 256M
    cpu: 0.5

# 监控配置
monitoring:
  healthcheck:
    enabled: true
    endpoint: /api/health
    interval: 30s
  metrics:
    enabled: true
    endpoint: /api/metrics

# 通知配置
notifications:
  enabled: false
  channels:
    - feishu
    - dingtalk
  events:
    - task_created
    - task_updated
    - task_deleted

# 集成示例
integrations:
  github:
    enabled: false
    description: GitHub Actions 自动创建任务
  jenkins:
    enabled: false
    description: Jenkins 流水线集成
  ci_cd:
    enabled: false
    description: CI/CD 集成示例

# 常见问题
faq:
  - question: 如何修改端口？
    answer: |
      编辑 docker/docker-compose.yml，修改 ports 配置：
      ```yaml
      ports:
        - "8080:5000"  # 改为 8080
      ```
      然后重启：docker-compose restart

  - question: 数据在哪里？
    answer: |
      数据存储在 Docker 卷 kanban-data 中
      位置：/var/lib/docker/volumes/kanban-data
      数据库文件：kanban.db

  - question: 如何备份数据？
    answer: |
      使用快捷命令：
      ```bash
      clawhub run mvp-kanban backup
      ```
      或手动备份：
      ```bash
      docker run --rm -v kanban-data:/source -v $(pwd):/backup alpine tar czf /backup/kanban-backup.tar.gz /source
      ```

  - question: 忘记密码怎么办？
    answer: |
      当前版本无需密码，所有操作都通过 Web 界面或 API 进行。
      未来版本会添加用户认证功能。

  - question: 支持多用户吗？
    answer: |
      当前版本为单用户设计。
      多用户功能在开发中，预计 v4.0 发布。

---

**安装完成即可使用！**
