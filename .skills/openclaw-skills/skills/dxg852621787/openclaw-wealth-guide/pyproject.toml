[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openclaw-data-harvester"
version = "1.0.0"
description = "智能数据采集器 - OpenClaw生态系统赚钱工具"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "dxg", email = "852621787@qq.com"}
]
keywords = ["openclaw", "data", "collection", "harvesting", "web-scraping", "automation"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "requests>=2.31.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=4.9.0",
    "pandas>=2.0.0",
    "openpyxl>=3.1.0",
    "APScheduler>=3.10.0",
    "pydantic>=2.0.0",
    "pyyaml>=6.0",
    "cryptography>=42.0.0",
    "SQLAlchemy>=2.0.0",
    "python-dateutil>=2.8.0",
    "tzlocal>=5.0.0",
    "pytz>=2023.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "flake8>=6.0.0",
    "mypy>=1.0.0",
    "pre-commit>=3.0.0",
]
test = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-mock>=3.10.0",
]
openclaw = [
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
]

[project.urls]
"Homepage" = "https://github.com/dxg852621787/openclaw-wealth-guide"
"Bug Tracker" = "https://github.com/dxg852621787/openclaw-wealth-guide/issues"
"Documentation" = "https://github.com/dxg852621787/openclaw-wealth-guide/blob/main/README.md"
"OpenClaw Marketplace" = "https://openclaw.ai/marketplace"

[project.scripts]
data-harvester = "data_harvester.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["tests*", "examples*"]

[tool.black]
line-length = 88
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--tb=short",
]
markers = [
    "unit: unit tests",
    "integration: integration tests",
    "slow: slow tests",
]