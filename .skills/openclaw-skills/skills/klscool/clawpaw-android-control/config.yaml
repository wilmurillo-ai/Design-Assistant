# =============================================
# ClawPaw 连接配置
# =============================================

# 网络类型说明：
# - local: SSH 反向隧道模式（手机通过 SSH 隧道连接主机，host 自动使用 127.0.0.1）
# - wifi: 局域网模式（手机和主机在同一 WiFi 网络，host 填写局域网 IP 如 192.168.x.x）
# - tailscale: Tailscale 组网模式（手机和主机通过 Tailscale 组网，host 填写 Tailscale IP 如 100.x.x.x）
network_type: local

# 手机 IP 地址（network_type: local 时不需要，自动使用 127.0.0.1）
host: 127.0.0.1

# HTTP 服务端口（ClawPaw App 默认端口）
port: 8765

# 请求超时时间（秒）
timeout: 10

# =============================================
# 视觉分析配置（可选）
# =============================================

# 视觉分析状态
# uninitialized: 未初始化（不保存截图，提示配置）
# disabled: 禁用（保存截图，可调用 image 工具）
# enabled: 启用（自动调用视觉 API 分析）
vision_status: uninitialized

# 视觉分析 LLM 配置（支持任何兼容 OpenAI 格式的 API）
# 必填：api_base, api_key, model
vision_llm:
  api_base: YOUR_API_BASE_HERE
  api_key: YOUR_API_KEY_HERE
  model: YOUR_MODEL_NAME_HERE

# =============================================
# 使用说明
# =============================================
# 1. 填写你的 API Key（如使用视觉分析功能）
# 2. 根据实际网络环境修改 network_type 和 host
