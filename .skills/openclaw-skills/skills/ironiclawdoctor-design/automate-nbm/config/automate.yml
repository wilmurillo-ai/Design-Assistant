# ---------------------------------------------------------------------------
# Orchestrator Settings
# ---------------------------------------------------------------------------
orchestrator:
  qa_level: 3              # Quality check strictness (1=quick, 5=production)
  max_retries: 3           # Max retries per task before escalation
  timeout_minutes: 60      # Max time per individual task
  auto_advance: true       # Auto-advance to next task on QA pass

# ---------------------------------------------------------------------------
# GitHub Integration
# ---------------------------------------------------------------------------
github:
  issue_labels:
    trigger:
      - task              # Basic task runner
      - agent-task        # Agent-routed task
      - orchestrate       # Multi-agent orchestration
    status:
      - in-progress
      - completed
      - failed
      - escalated
    priority:
      - "priority:high"
      - "priority:medium"
      - "priority:low"
  auto_acknowledge: true   # Post acknowledgment comment on new tasks
  auto_label: true         # Add status labels automatically

# ---------------------------------------------------------------------------
# Task Defaults
# ---------------------------------------------------------------------------
tasks:
  max_concurrent: 3        # Max tasks processing simultaneously
  timeout_minutes: 30      # Default task timeout
  auto_close_completed: false  # Auto-close issues on completion

# ---------------------------------------------------------------------------
# Notifications
# ---------------------------------------------------------------------------
notifications:
  targets:
    - console              # Always log to console
    # - github             # Post to issue comments (requires GITHUB_TOKEN)
    # - webhook            # Send to webhook (requires WEBHOOK_URL)
  on_start: true           # Notify when task starts
  on_complete: true        # Notify when task completes
  on_failure: true         # Notify when task fails
  on_escalation: true      # Notify when task escalates

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
security:
  require_sender_validation: true   # Validate repository_dispatch senders
  # ALLOWED_SENDERS: set via GitHub Secrets
  audit_log: true                   # Log all operations

# ---------------------------------------------------------------------------
# Scheduled Tasks
# ---------------------------------------------------------------------------
schedule:
  health_check:
    cron: "0 */6 * * *"    # Every 6 hours
    enabled: true
  cleanup:
    cron: "0 0 * * 0"      # Weekly, Sunday midnight
    enabled: false
