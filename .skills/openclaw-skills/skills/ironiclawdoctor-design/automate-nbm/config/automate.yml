# =============================================================================
# Automate Configuration
# =============================================================================
# Central configuration for the AI Agent Agency + Task Automation platform.
# Environment-specific values should be set via GitHub Secrets, not here.
# =============================================================================

# ---------------------------------------------------------------------------
# Platform
# ---------------------------------------------------------------------------
platform:
  name: Automate
  version: 2.0.0
  description: AI Agent Agency + GitHub-native task automation

