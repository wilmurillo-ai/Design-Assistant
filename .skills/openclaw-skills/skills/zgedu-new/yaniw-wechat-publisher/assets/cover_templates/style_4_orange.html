<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>封面图 - 橙色活力风</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 900px;
            height: 383px;
            background: linear-gradient(135deg, #ff9a56 0%, #ff6b6b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        
        .title {
            font-size: 52px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.25);
            line-height: 1.3;
        }
        
        .subtitle {
            font-size: 26px;
            opacity: 0.95;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
        }
        
        .decoration {
            position: absolute;
            width: 160px;
            height: 160px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }
        
        .decoration.top-left {
            top: -50px;
            left: -50px;
        }
        
        .decoration.bottom-right {
            bottom: -50px;
            right: -50px;
        }
    </style>
</head>
<body>
    <div class="decoration top-left"></div>
    <div class="decoration bottom-right"></div>
    <div class="container">
        <div class="title">文章标题</div>
        <div class="subtitle">副标题或摘要</div>
    </div>
</body>
</html>
