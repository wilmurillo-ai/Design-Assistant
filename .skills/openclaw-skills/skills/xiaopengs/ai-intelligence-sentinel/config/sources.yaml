# AI前沿哨兵 - 信息源配置
# 配置需要采集的信息源

# GitHub Trending配置
github:
  enabled: true
  language: python
  date_range: daily  # daily / weekly / monthly
  limit: 20
  # 可添加关键词过滤
  keywords:
    - AI
    - machine-learning
    - deep-learning
    - LLM
    - GPT

# arXiv论文配置
arxiv:
  enabled: true
  # 论文类别，常见AI类别:
  # cs.AI - Artificial Intelligence
  # cs.LG - Machine Learning
  # cs.CL - Computation and Language
  # cs.CV - Computer Vision
  # cs.NE - Neural and Evolutionary Computing
  categories:
    - cs.AI
    - cs.LG
    - cs.CL
  max_results: 20
  # 自定义搜索词 (可选)
  search_query: "GPT OR transformer OR diffusion"

# HackerNews配置
hackernews:
  enabled: true
  # 获取类型: top / new / best / ask / show
  item_type: top
  limit: 20
  # 关键词过滤，用于筛选AI相关内容
  keywords:
    - AI
    - ML
    - machine learning
    - neural
    - LLM
    - GPT
    - Claude
    - deep learning
    - language model
    - open source AI

# RSSHub实例配置
# 自部署的RSSHub服务，支持多种信息源
rsshub:
