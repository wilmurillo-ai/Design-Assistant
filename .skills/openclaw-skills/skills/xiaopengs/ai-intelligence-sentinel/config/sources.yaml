# 中国AI公司官网新闻监控 (无RSS，使用网页解析)
# 注意: 这些源需要使用topic_tracking技能或自定义解析器
chinese_ai_companies:
  - name: 智谱AI新品发布
    enabled: true
    url: https://docs.bigmodel.cn/cn/update/new-releases
    company: ZhipuAI (智谱)
    category: AI Company
    parser: web_news  # 使用网页新闻解析器
    update_frequency: daily  # 每日检查更新
    
  - name: MiniMax新闻动态
    enabled: true
    url: https://www.minimaxi.com/news
    company: MiniMax
    category: AI Company
    parser: web_news
    update_frequency: daily
    
  - name: 扣子Coze文档更新
    enabled: true
    url: https://docs.coze.cn
    company: Coze (扣子)
    category: AI Tool
    parser: web_news
    update_frequency: daily

# 自定义RSS源 (可添加更多)
