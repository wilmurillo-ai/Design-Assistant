[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sherpamind"
version = "0.1.6"
description = "Local-first SherpaDesk backend + OpenClaw skill-front system for rich capture and retrieval-preparation"
readme = "README.md"
requires-python = ">=3.10"
authors = []
dependencies = [
  "httpx>=0.27.0",
  "pydantic>=2.8.0",
  "python-dateutil>=2.9.0",
  "tenacity>=8.3.0",
  "typer>=0.12.3",
  "rich>=13.7.1"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0"
]

[project.scripts]
sherpamind = "sherpamind.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
