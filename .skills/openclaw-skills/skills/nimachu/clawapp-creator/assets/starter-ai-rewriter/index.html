<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__APP_NAME__</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel copy-panel">
        <p class="eyebrow">Text AI Starter</p>
        <h1>__APP_NAME__</h1>
        <p class="subtitle">__APP_DESCRIPTION__</p>
        <label class="field">
          <span>原始草稿</span>
          <textarea id="input-text" rows="7" placeholder="输入一句草稿，例如：这个活动挺好的，欢迎来参加。"></textarea>
        </label>
        <div class="actions">
          <button id="generate-button">生成优化版本</button>
          <button id="reset-button" class="ghost">清空</button>
        </div>
      </section>
      <section class="panel result-panel">
        <div class="result-head">
          <span>生成结果</span>
          <small id="status">准备开始</small>
        </div>
        <div id="result-box" class="result-box">生成结果会显示在这里。</div>
      </section>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
  </html>
