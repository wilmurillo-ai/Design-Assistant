<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Landscape SVG cover template</title>
  <desc id="desc">Starter layout with left-aligned text and abstract geometry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1B2A"/>
      <stop offset="100%" stop-color="#132B44"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#56C2FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#56C2FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <g id="motif" opacity="0.9">
    <circle cx="1260" cy="290" r="220" fill="none" stroke="#8FDBFF" stroke-width="2"/>
    <circle cx="1260" cy="290" r="150" fill="none" stroke="#8FDBFF" stroke-width="1.5" opacity="0.7"/>
    <path d="M980 690 L1450 220" stroke="#56C2FF" stroke-width="8" opacity="0.8"/>
    <path d="M1080 760 L1550 290" stroke="#DCE7F3" stroke-width="2" opacity="0.45"/>
  </g>

  <g id="content" fill="#F3F8FC" font-family="'Avenir Next', 'Segoe UI', sans-serif">
    <text x="110" y="250" font-size="28" font-weight="600" letter-spacing="4" opacity="0.75">CATEGORY</text>
    <text x="110" y="390" font-size="110" font-weight="800">Main Title</text>
    <text x="110" y="500" font-size="110" font-weight="800">Second Line</text>
    <text x="110" y="590" font-size="34" font-weight="500" opacity="0.88">Subtitle or supporting line goes here</text>
    <text x="110" y="760" font-size="24" font-weight="600" opacity="0.72">Author or brand</text>
  </g>
</svg>
