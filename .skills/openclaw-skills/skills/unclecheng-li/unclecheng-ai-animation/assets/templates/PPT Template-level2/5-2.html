<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>失败模式② · 过早宣布胜利</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root {
    --dark-bg: #0A0F0A;
    --dark-secondary: #121912;
    --dark-tertiary: #1A241A;
    --accent-green: #00FF88;
    --accent-emerald: #00D26A;
    --accent-purple: #B14EFF;
    --accent-violet: #8B5CF6;
    --accent-lime: #84CC16;
    --text-primary: #F0FAF0;
    --text-secondary: #A3BFA3;
    --text-muted: #6B8A6B;
    --glow-green: rgba(0, 255, 136, 0.35);
    --glow-purple: rgba(177, 78, 255, 0.3);
}

body{font-family:'Noto Sans SC',sans-serif;background:var(--dark-bg);color:var(--text-primary);overflow:hidden;width:100vw;height:100vh}

/* Background effects */
.bg-grid {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: 
        linear-gradient(rgba(0,255,136,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(177,78,255,0.02) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
}

.lc{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle}
.lc-96 svg{width:96px;height:96px}.lc-80 svg{width:80px;height:80px}.lc-64 svg{width:64px;height:64px}
.lc-48 svg{width:48px;height:48px}.lc-40 svg{width:40px;height:40px}.lc-36 svg{width:36px;height:36px}
.lc-32 svg{width:32px;height:32px}.lc-28 svg{width:28px;height:28px}.lc-24 svg{width:24px;height:24px}
.lc-20 svg{width:20px;height:20px}.lc-18 svg{width:18px;height:18px}

.slide-container{width:100vw;height:100vh;position:relative}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:50px 80px;opacity:0;pointer-events:none;transition:opacity .6s ease;background:radial-gradient(ellipse at 50% 30%, var(--dark-secondary) 0%, var(--dark-bg) 100%);overflow:hidden}
.slide.active{opacity:1;pointer-events:auto}
.slide .anim{opacity:0;transform:translateY(45px);transition:none}
.slide.active .anim.show{opacity:1;transform:translateY(0);transition:opacity .7s cubic-bezier(.25,.46,.45,.94),transform .7s cubic-bezier(.25,.46,.45,.94)}

.deco{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px);opacity:0.12;animation:orbFloat 8s ease-in-out infinite alternate}
@keyframes orbFloat {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, -30px) scale(1.1); }
}
.deco-green{background:var(--accent-green)}
.deco-emerald{background:var(--accent-emerald)}
.deco-purple{background:var(--accent-purple)}
.deco-violet{background:var(--accent-violet)}
.deco-lime{background:var(--accent-lime)}

.float-p{position:absolute;border-radius:50%;pointer-events:none;animation:floatP 5s ease-in-out infinite}
@keyframes floatP{0%,100%{transform:translateY(0) scale(1);opacity:.2}50%{transform:translateY(-18px) scale(1.15);opacity:.35}}

.t-hero{font-size:5.5rem;font-weight:900;line-height:1.15;text-align:center}
.t-huge{font-size:4rem;font-weight:900;line-height:1.2;text-align:center}
.t-big{font-size:3rem;font-weight:800;line-height:1.3;text-align:center}
.t-mid{font-size:2.2rem;font-weight:700;line-height:1.4;text-align:center}
.t-body{font-size:1.7rem;font-weight:400;line-height:1.6;text-align:center}
.t-sm{font-size:1.2rem;font-weight:400;line-height:1.5;text-align:center}

.c-green{color:var(--accent-green)}.c-emerald{color:var(--accent-emerald)}.c-purple{color:var(--accent-purple)}
.c-violet{color:var(--accent-violet)}.c-lime{color:var(--accent-lime)}.c-dark{color:var(--text-primary)}
.c-gray{color:var(--text-secondary)}.c-white{color:#fff}.c-muted{color:var(--text-muted)}

.bg-green{background:rgba(0,255,136,0.12);padding:6px 20px;border-radius:10px;border:1px solid rgba(0,255,136,0.2)}
.bg-emerald{background:rgba(0,210,106,0.1);padding:6px 20px;border-radius:10px;border:1px solid rgba(0,210,106,0.2)}
.bg-purple{background:rgba(177,78,255,0.1);padding:6px 20px;border-radius:10px;border:1px solid rgba(177,78,255,0.2)}
.bg-violet{background:rgba(139,92,246,0.08);padding:6px 20px;border-radius:10px;border:1px solid rgba(139,92,246,0.2)}
.bg-lime{background:rgba(132,204,22,0.08);padding:6px 20px;border-radius:10px;border:1px solid rgba(132,204,22,0.2)}

.ul-green{text-decoration:underline;text-decoration-color:var(--accent-green);text-decoration-thickness:4px;text-underline-offset:8px}
.ul-purple{text-decoration:underline;text-decoration-color:var(--accent-purple);text-decoration-thickness:4px;text-underline-offset:8px}
.bold{font-weight:900}.italic{font-style:italic}
.line{width:70px;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--accent-green),var(--accent-purple));margin:18px auto}
.strike{text-decoration:line-through;text-decoration-thickness:3px;color:var(--text-muted)}

.fail-badge{display:inline-flex;align-items:center;gap:10px;padding:12px 32px;border-radius:40px;font-size:2rem;font-weight:900;background:rgba(177,78,255,0.1);color:var(--accent-purple);border:2.5px solid rgba(177,78,255,0.25);box-shadow:0 4px 20px var(--glow-purple)}

.concept-word{font-size:4.5rem;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--accent-green),var(--accent-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.info-card{background:var(--dark-tertiary);border-radius:20px;padding:28px 36px;border:2px solid rgba(0,255,136,0.1);box-shadow:0 6px 24px rgba(0,0,0,0.3), 0 0 40px rgba(0,255,136,0.05);display:flex;align-items:center;gap:22px;max-width:800px;width:85%}
.info-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.result-card{display:flex;align-items:center;gap:24px;background:var(--dark-tertiary);border-radius:20px;padding:28px 36px;border:2px solid rgba(177,78,255,0.15);box-shadow:0 6px 30px rgba(177,78,255,0.08), 0 0 40px rgba(0,255,136,0.05);max-width:800px;width:85%}
.result-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.progress-visual{width:85%;max-width:800px;position:relative}
.pv-track{width:100%;height:60px;background:rgba(255,255,255,0.03);border-radius:16px;overflow:hidden;position:relative}
.pv-fill{height:100%;border-radius:16px;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;font-size:1.5rem;font-weight:900;color:#fff;transition:width 1.2s cubic-bezier(.25,.46,.45,.94)}
.pv-fill-done{background:linear-gradient(90deg,var(--accent-green),var(--accent-emerald))}
.pv-fill-claimed{background:linear-gradient(90deg,var(--accent-purple),var(--accent-violet))}
.pv-label-row{display:flex;justify-content:space-between;margin-top:10px;font-size:1.1rem;font-weight:700}
.pv-flag{position:absolute;top:-36px;font-size:1.3rem;font-weight:900;display:flex;align-items:center;gap:6px;transition:left 1.2s cubic-bezier(.25,.46,.45,.94);z-index:10}

.req-list{display:flex;flex-direction:column;gap:10px;width:85%;max-width:700px}
.req-item{display:flex;align-items:center;gap:16px;padding:16px 24px;border-radius:14px;background:var(--dark-tertiary);border:2px solid rgba(255,255,255,0.05);font-size:1.6rem;font-weight:700}
.req-item.done{border-color:rgba(0,255,136,0.2);color:var(--accent-green)}
.req-item.missing{border-color:rgba(177,78,255,0.2);color:var(--accent-purple);background:rgba(177,78,255,0.05)}

/* Floating particles */
.float-particle {
    position: absolute; border-radius: 50%; opacity: .25;
    background: var(--accent-green);
    animation: floatUp 6s ease-in-out infinite;
    box-shadow: 0 0 20px var(--accent-green);
}
@keyframes floatUp {
    0%,100% { transform: translateY(0) scale(1); opacity:.25; }
    50% { transform: translateY(-20px) scale(1.2); opacity:.4; }
}

@keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(60px) rotate(180deg);opacity:0}}
</style>
</head>
<body>

<div class="bg-grid"></div>

<div class="slide-container">

<!-- ====== Slide 1: 标题 ====== -->
<div class="slide active" id="s0">
  <div class="deco deco-purple" style="width:500px;height:500px;top:-200px;right:-150px"></div>
  <div class="deco deco-green" style="width:400px;height:400px;bottom:-120px;left:-120px;animation-delay:-4s"></div>
  <div class="float-p" style="width:12px;height:12px;background:var(--accent-purple);top:15%;left:12%;animation-delay:0s"></div>
  <div class="float-p" style="width:10px;height:10px;background:var(--accent-green);bottom:20%;right:10%;animation-delay:1.2s"></div>
  <div class="float-particle" style="width:8px;height:8px;top:30%;right:25%;animation-delay:2s;"></div>

  <div class="anim fail-badge">
    <span class="lc lc-28 c-purple"><i data-lucide="flag-off"></i></span>
    失败模式 ② 
  </div>

  <div class="anim" style="margin-top:20px">
    <!-- Trophy with X mark visual -->
    <svg width="260" height="200" viewBox="0 0 260 200">
      <!-- Trophy body -->
      <path d="M80,45 L80,30 L180,30 L180,45" fill="none" stroke="var(--accent-purple)" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M80,45 Q80,120 130,135 Q180,120 180,45" fill="rgba(177,78,255,.08)" stroke="var(--accent-purple)" stroke-width="2.5"/>
      <!-- Trophy handles -->
      <path d="M80,55 Q50,55 50,80 Q50,105 80,105" fill="none" stroke="var(--accent-purple)" stroke-width="2" stroke-linecap="round"/>
      <path d="M180,55 Q210,55 210,80 Q210,105 180,105" fill="none" stroke="var(--accent-purple)" stroke-width="2" stroke-linecap="round"/>
      <!-- Trophy base -->
      <rect x="110" y="135" width="40" height="20" rx="4" fill="rgba(177,78,255,.15)" stroke="var(--accent-purple)" stroke-width="1.5"/>
      <rect x="95" y="155" width="70" height="14" rx="4" fill="rgba(177,78,255,.1)" stroke="var(--accent-purple)" stroke-width="1.5"/>
      <!-- Star on trophy -->
      <polygon points="130,60 136,78 155,78 140,89 145,107 130,96 115,107 120,89 105,78 124,78" fill="rgba(177,78,255,.2)" stroke="var(--accent-purple)" stroke-width="1.5"/>
      <!-- Big X mark over trophy -->
      <g stroke="var(--accent-green)" stroke-width="4" stroke-linecap="round" opacity=".7">
        <line x1="70" y1="25" x2="190" y2="145">
          <animate attributeName="opacity" values="0;.7" dur=".6s" fill="freeze" begin="1.2s"/>
        </line>
        <line x1="190" y1="25" x2="70" y2="145">
          <animate attributeName="opacity" values="0;.7" dur=".6s" fill="freeze" begin="1.5s"/>
        </line>
      </g>
      <!-- Fake confetti particles (premature celebration) -->
      <circle cx="60" cy="20" r="4" fill="var(--accent-green)" opacity="0">
        <animate attributeName="opacity" values="0;.6;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
        <animate attributeName="cy" values="20;50;20" dur="2s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
      <rect x="196" y="15" width="6" height="6" rx="1" fill="var(--accent-purple)" opacity="0" transform="rotate(30 199 18)">
        <animate attributeName="opacity" values="0;.5;0" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
        <animate attributeName="y" values="15;48;15" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
      </rect>
      <polygon points="45,35 48,28 51,35" fill="var(--accent-lime)" opacity="0">
        <animate attributeName="opacity" values="0;.5;0" dur="1.8s" repeatCount="indefinite" begin="1s"/>
        <animate attributeName="transform" values="translate(0,0) rotate(0);translate(5,20) rotate(90);translate(0,0) rotate(0)" dur="1.8s" repeatCount="indefinite" begin="1s"/>
      </polygon>
      <!-- "100%" label with question mark -->
      <text x="130" y="192" text-anchor="middle" fill="var(--accent-purple)" font-size="16" font-weight="900">"100%"  ?</text>
    </svg>
  </div>

  <div class="anim" style="margin-top:8px">
    <span class="concept-word" style="font-size:5.5rem">过早宣布胜利</span>
  </div>

  <div class="anim line" style="background:linear-gradient(90deg,var(--accent-green),var(--accent-purple))"></div>
  <div class="anim t-big c-gray italic">Premature Completion (｡ŏ_ŏ)</div>
</div>

<!-- ====== Slide 2: 什么时候发生 ====== -->
<div class="slide" id="s1">
  <div class="deco deco-green" style="width:450px;height:450px;top:-150px;left:-120px"></div>
  <div class="deco deco-purple" style="width:350px;height:350px;bottom:-100px;right:-80px;animation-delay:-3s"></div>

  <div class="anim t-huge c-dark">
    发生在<span class="bg-lime c-lime bold">开发后期</span> 
  </div>

  <div class="anim line" style="background:linear-gradient(90deg,var(--accent-lime),var(--accent-green))"></div>

  <!-- Visual: timeline showing when it happens -->
  <div class="anim" style="margin-top:16px">
    <svg width="800" height="220" viewBox="0 0 800 220">
      <!-- Timeline base -->
      <line x1="50" y1="110" x2="750" y2="110" stroke="rgba(255,255,255,.08)" stroke-width="4" stroke-linecap="round"/>

      <!-- Phase 1: Start -->
      <circle cx="100" cy="110" r="12" fill="var(--accent-green)" stroke="var(--dark-bg)" stroke-width="3"/>
      <text x="100" y="150" text-anchor="middle" fill="var(--accent-green)" font-size="14" font-weight="700">启动</text>

      <!-- Phase 2: Building -->
      <rect x="170" y="85" width="160" height="50" rx="12" fill="rgba(0,255,136,.06)" stroke="var(--accent-green)" stroke-width="1.5"/>
      <text x="250" y="115" text-anchor="middle" fill="var(--accent-green)" font-size="14" font-weight="700">逐步开发…</text>
      <!-- Progress dots -->
      <circle cx="200" cy="75" r="4" fill="var(--accent-green)" opacity=".3"/>
      <circle cx="220" cy="70" r="4" fill="var(--accent-green)" opacity=".4"/>
      <circle cx="240" cy="68" r="4" fill="var(--accent-green)" opacity=".5"/>
      <circle cx="260" cy="70" r="4" fill="var(--accent-green)" opacity=".6"/>
      <circle cx="280" cy="75" r="4" fill="var(--accent-green)" opacity=".7"/>

      <!-- Phase 3: Core done - DANGER ZONE -->
      <circle cx="400" cy="110" r="16" fill="var(--accent-purple)" stroke="var(--dark-bg)" stroke-width="3">
        <animate attributeName="r" values="14;20;14" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="400" y="75" text-anchor="middle" fill="var(--accent-purple)" font-size="15" font-weight="900">核心功能完成</text>
      <text x="400" y="170" text-anchor="middle" fill="var(--accent-purple)" font-size="14" font-weight="800">有可见产出</text>

      <!-- Danger zone marker -->
      <rect x="370" y="30" width="60" height="22" rx="11" fill="rgba(177,78,255,.1)" stroke="var(--accent-purple)" stroke-width="1.5"/>
      <text x="400" y="45" text-anchor="middle" fill="var(--accent-purple)" font-size="11" font-weight="900">危险区</text>

      <!-- Phase 4: Agent stops here! -->
      <line x1="430" y1="90" x2="430" y2="130" stroke="var(--accent-purple)" stroke-width="3" stroke-dasharray="4,3"/>
      <!-- Stop sign -->
      <g transform="translate(480,90)">
        <polygon points="0,-25 18,-18 25,0 18,18 0,25 -18,18 -25,0 -18,-18" fill="rgba(177,78,255,.1)" stroke="var(--accent-purple)" stroke-width="2"/>
        <text x="0" y="5" text-anchor="middle" fill="var(--accent-purple)" font-size="14" font-weight="900">STOP</text>
      </g>
      <text x="480" y="145" text-anchor="middle" fill="var(--accent-purple)" font-size="13" font-weight="900">Agent 在这里停了</text>

      <!-- Phase 5: Remaining (grayed out, never reached) -->
      <line x1="520" y1="110" x2="700" y2="110" stroke="rgba(255,255,255,.06)" stroke-width="4" stroke-dasharray="8,6"/>
      <rect x="560" y="90" width="120" height="40" rx="10" fill="rgba(107,138,107,.04)" stroke="rgba(107,138,107,.2)" stroke-width="1.5" stroke-dasharray="4,3"/>
      <text x="620" y="115" text-anchor="middle" fill="var(--text-muted)" font-size="13" font-weight="700">剩余功能…</text>
      <circle cx="720" cy="110" r="10" fill="none" stroke="rgba(107,138,107,.2)" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="720" y="150" text-anchor="middle" fill="var(--text-muted)" font-size="13" font-weight="600">真正完成</text>
    </svg>
  </div>

  <div class="anim t-huge c-purple" style="margin-top:16px">
    就<span class="ul-purple bold" style="font-size:4.5rem">主动终止任务</span> (｡･ω･｡)ﾉ
  </div>
</div>

<!-- ====== Slide 3: 进度条可视化 ====== -->
<div class="slide" id="s2">
  <div class="deco deco-purple" style="width:500px;height:500px;bottom:-180px;right:-150px"></div>
  <div class="deco deco-green" style="width:300px;height:300px;top:-100px;left:-80px;animation-delay:-2s"></div>

  <div class="anim t-huge c-dark">Agent 眼中的进度 (｡･ω･｡)</div>
  <div class="anim line"></div>

  <div class="anim progress-visual" style="margin-top:24px">
    <div class="pv-flag c-green" id="flagClaimed" style="left:0%">
      <span class="lc lc-20 c-green"><i data-lucide="flag"></i></span> "任务完成！" 
    </div>
    <div class="pv-track">
      <div class="pv-fill pv-fill-claimed" id="pvClaimed" style="width:0%"></div>
    </div>
    <div class="pv-label-row">
      <span class="c-gray">0%</span>
      <span class="c-gray">100%</span>
    </div>
  </div>

  <!-- Visual comparison: two gauges side by side -->
  <div class="anim" style="margin-top:16px">
    <svg width="700" height="200" viewBox="0 0 700 180">
      <!-- Agent's view: full gauge -->
      <text x="175" y="20" text-anchor="middle" fill="var(--accent-purple)" font-size="16" font-weight="900">Agent 认为</text>
      <circle cx="175" cy="100" r="65" fill="none" stroke="rgba(177,78,255,.08)" stroke-width="14"/>
      <circle cx="175" cy="100" r="65" fill="none" stroke="var(--accent-purple)" stroke-width="14" stroke-linecap="round"
        stroke-dasharray="408" stroke-dashoffset="408" transform="rotate(-90 175 100)">
        <animate attributeName="stroke-dashoffset" values="408;0" dur="1.5s" fill="freeze" begin="0.5s"/>
      </circle>
      <text x="175" y="106" text-anchor="middle" fill="var(--accent-purple)" font-size="28" font-weight="900">100%</text>
      <text x="175" y="185" text-anchor="middle" fill="var(--accent-purple)" font-size="13" font-weight="700">自信满满 (｡･ω･｡)</text>

      <!-- VS -->
      <text x="350" y="105" text-anchor="middle" fill="var(--text-muted)" font-size="28" font-weight="900">VS</text>

      <!-- Reality: partial gauge -->
      <text x="525" y="20" text-anchor="middle" fill="var(--accent-green)" font-size="16" font-weight="900">实际完成</text>
      <circle cx="525" cy="100" r="65" fill="none" stroke="rgba(0,255,136,.06)" stroke-width="14"/>
      <circle cx="525" cy="100" r="65" fill="none" stroke="var(--accent-green)" stroke-width="14" stroke-linecap="round"
        stroke-dasharray="408" stroke-dashoffset="408" transform="rotate(-90 525 100)">
        <animate attributeName="stroke-dashoffset" values="408;265" dur="1.5s" fill="freeze" begin="0.8s"/>
      </circle>
      <!-- Remaining arc in purple -->
      <circle cx="525" cy="100" r="65" fill="none" stroke="rgba(177,78,255,.15)" stroke-width="14" stroke-linecap="round"
        stroke-dasharray="143 265" stroke-dashoffset="-143" transform="rotate(-90 525 100)"/>
      <text x="525" y="98" text-anchor="middle" fill="var(--accent-green)" font-size="24" font-weight="900">35%</text>
      <text x="525" y="118" text-anchor="middle" fill="var(--accent-purple)" font-size="13" font-weight="700">65%未完成</text>
      <text x="525" y="185" text-anchor="middle" fill="var(--accent-purple)" font-size="13" font-weight="700">大量缺失 (´；ω；`)</text>
    </svg>
  </div>

  <div class="anim t-big c-purple bold" style="margin-top:35px">
    <span class="bg-purple" style="font-size:3.4rem">巨大的认知偏差</span> 
  </div>
</div>

<!-- ====== Slide 4: 需求清单对比 ====== -->
<div class="slide" id="s3">
  <div class="deco deco-purple" style="width:500px;height:500px;top:-200px;right:-200px"></div>

<script>
lucide.createIcons();

const slides=document.querySelectorAll('.slide'),
      total=slides.length;
let cur=0;

function animateBars(){
  const pvc=document.getElementById('pvClaimed');
  const flag=document.getElementById('flagClaimed');
  if(pvc) setTimeout(()=>{pvc.style.width='100%'},400);
  if(flag) setTimeout(()=>{flag.style.left='calc(100% - 130px)'},400);
}

function resetBars(){
  const pvc=document.getElementById('pvClaimed');
  const flag=document.getElementById('flagClaimed');
  if(pvc) pvc.style.width='0%';
  if(flag) flag.style.left='0%';
}

function go(n){
  if(n<0||n>=total||n===cur)return;
  if(cur===2) resetBars();
  slides[cur].classList.remove('active');
  slides[cur].querySelectorAll('.anim').forEach(e=>e.classList.remove('show'));
  cur=n;
  slides[cur].classList.add('active');
  slides[cur].querySelectorAll('.anim').forEach((e,i)=>{
    e.classList.remove('show');
    setTimeout(()=>e.classList.add('show'),200+i*300);
  });
  if(cur===2) animateBars();
}

slides[0].querySelectorAll('.anim').forEach((e,i)=>setTimeout(()=>e.classList.add('show'),400+i*350));

document.addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)){e.preventDefault();go(cur+1)}
  else if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();go(cur-1)}
  else if(e.key==='Home'){e.preventDefault();go(0)}
  else if(e.key==='End'){e.preventDefault();go(total-1)}
});

let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;ty=e.changedTouches[0].screenY});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].screenX-tx,dy=e.changedTouches[0].screenY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){dx<0?go(cur+1):go(cur-1)}
});

let wc=false;
document.addEventListener('wheel',e=>{
  if(wc)return;wc=true;setTimeout(()=>wc=false,800);
  e.deltaY>0?go(cur+1):go(cur-1);
});
</script>
