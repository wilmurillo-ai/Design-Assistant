<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 持仓看盘系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --profit-color: #e74c3c;
            --loss-color: #2ecc71;
            --warning-color: #f39c12;
        }

        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .navbar {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }

        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
        }

        .profit {
            color: var(--profit-color) !important;
            font-weight: bold;
        }

        .loss {
            color: var(--loss-color) !important;
            font-weight: bold;
        }

        .table th {
            background-color: #f8f9fa;
            font-weight: 600;
            border-top: none;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #eee;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-label {
            color: #666;
            font-size: 0.95rem;
        }

        .summary-value {
            font-weight: bold;
            font-size: 1.15rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .status-profit {
            background-color: rgba(46, 204, 113, 0.15);
            color: var(--profit-color);
        }

        .status-loss {
            background-color: rgba(231, 76, 60, 0.15);
            color: var(--loss-color);
        }

        .log-item {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #eee;
            font-size: 0.85rem;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .btn-group-sm .btn {
            padding: 0.25rem 0.5rem;
            font-size: 0.85rem;
        }

        .refresh-spinner {
            display: none;
        }

        .refresh-spinner.active {
            display: inline-block;
        }

        @media (max-width: 768px) {
            .summary-value {
                font-size: 1rem;
            }

            .table-responsive {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-graph-up me-2"></i>
                持仓看盘系统
            </a>

            <div class="d-flex align-items-center">
                <span class="text-light me-3 small" id="lastUpdated">
                    <i class="bi bi-clock me-1"></i>
                    加载中...
                </span>
                <button class="btn btn-light btn-sm me-2" onclick="loadData()" title="刷新">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
                <button class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#addModal"
                    title="新增持仓">
                    <i class="bi bi-plus-circle"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container-fluid mt-3">
        <div class="row">
            <!-- 左侧总览 -->
            <div class="col-lg-4 col-md-5">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-pie-chart me-2"></i>持仓总览</span>
                        <div class="d-flex">
                            <button class="btn btn-sm btn-outline-primary me-2" onclick="updatePrices()">
                                <i class="bi bi-arrow-clockwise me-1"></i>更新价格
                            </button>
                            <button class="btn btn-sm btn-outline-primary" onclick="showLlmConfigModal()">
                                <i class="bi bi-gear me-1"></i>AI配置
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="summaryContainer">
                            <div class="text-center p-4">
                                <div class="spinner-border spinner-border-sm text-primary me-2"></div>
                                加载中...
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 操作记录 -->
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-clock-history me-2"></i>最近操作
                    </div>
                    <div class="card-body p-0" style="max-height: 300px; overflow-y: auto;">
                        <div id="logsContainer">
                            <div class="text-center p-4">
                                <div class="spinner-border spinner-border-sm text-primary me-2"></div>
                                加载中...
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧持仓列表 -->
            <div class="col-lg-8 col-md-7">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-list me-2"></i>持仓列表</span>
                        <div class="input-group input-group-sm" style="width: 250px;">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control" placeholder="搜索股票..." id="searchInput"
                                onkeyup="filterHoldings()">
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th onclick="sortTable(0)" id="th-name">股票名称 <i class="bi bi-sort"></i></th>
                                        <th onclick="sortTable(1)" id="th-symbol">代码 <i class="bi bi-sort"></i></th>
                                        <th>持仓</th>
                                        <th>成本价</th>
                                        <th>当前价</th>
                                        <th onclick="sortTable(5)" id="th-market">市值 <i class="bi bi-sort"></i></th>
                                        <th onclick="sortTable(6)" id="th-pnl">盈亏额 <i class="bi bi-sort"></i></th>
                                        <th onclick="sortTable(7)" id="th-pnl-percent">盈亏% <i class="bi bi-sort"></i>
                                        </th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="holdingsBody">
                                    <tr>
                                        <td colspan="8" class="text-center p-4">
                                            <div class="spinner-border spinner-border-sm text-primary me-2"></div>
                                            加载持仓数据...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增持仓模态框 -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>新增持仓记录</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addForm">
                        <div class="mb-3">
                            <label class="form-label">股票代码</label>
                            <input type="text" class="form-control" id="addSymbol" required>
                            <small class="form-text text-muted">例如：600519（贵州茅台）</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">股票名称（可选）</label>
                            <input type="text" class="form-control" id="addName">
                            <small class="form-text text-muted">不填则自动获取</small>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">持仓数量</label>
                                <input type="number" class="form-control" id="addQuantity" required min="1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">成本价（元）</label>
                                <input type="number" class="form-control" id="addCostPrice" required step="0.0001"
                                    min="0">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="addHolding()">
                        <i class="bi bi-check-circle me-1"></i>确认添加
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑持仓模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>编辑持仓记录</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <div class="mb-3">
                            <label class="form-label">股票代码</label>
                            <input type="text" class="form-control" id="editSymbol" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">股票名称</label>
                            <input type="text" class="form-control" id="editName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">持仓数量</label>
                            <input type="number" class="form-control" id="editQuantity" required min="1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">成本价（元）</label>
                            <input type="number" class="form-control" id="editCostPrice" required step="0.0001" min="0">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="submitEdit()">
                        <i class="bi bi-check-circle me-1"></i>确认修改
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="bi bi-exclamation-triangle me-2"></i>确认删除</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>确定要删除持仓 <strong id="deleteStockName"></strong> 吗？</p>
                    <p class="text-danger"><i class="bi bi-exclamation-circle me-1"></i>此操作不可恢复！</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDelete()">
                        <i class="bi bi-trash me-1"></i>确认删除
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 股票详情模态框 -->
    <div class="modal fade" id="stockDetailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white py-2">
                    <h6 class="modal-title"><i class="bi bi-graph-up-arrow me-2"></i><span id="detailStockName"></span>
                        (<span id="detailStockSymbol"></span>)</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-8">
                            <div class="mb-3">
                                <label class="form-label fw-bold small">今日分时图</label>
                                <div class="text-center" id="detailChartContainer" style="height: 200px;">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">加载中...</span>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">成交量</label>
                                <div class="text-center" id="detailVolumeContainer" style="height: 100px;">
                                    <div class="spinner-border text-secondary" role="status">
                                        <span class="visually-hidden">加载中...</span>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="mb-2">
                                        <small class="text-muted fw-bold">当前价格</small>
                                        <div class="fs-5 fw-bold" id="detailCurrentPrice">-</div>
                                    </div>
                                    <div class="mb-2">
                                        <small class="text-muted fw-bold">涨跌额</small>
                                        <div class="fs-6" id="detailChange">-</div>
                                    </div>
                                    <div class="mb-2">
                                        <small class="text-muted fw-bold">涨跌幅</small>
                                        <div class="fs-6" id="detailChangePercent">-</div>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="mb-2">
                                        <small class="text-muted fw-bold">今开</small>
                                        <div class="fs-6" id="detailOpen">-</div>
                                    </div>
                                    <div class="mb-2">
                                        <small class="text-muted fw-bold">最高</small>
                                        <div class="fs-6 text-danger" id="detailHigh">-</div>
                                    </div>
                                    <div class="mb-2">
                                        <small class="text-muted fw-bold">最低</small>
                                        <div class="fs-6 text-success" id="detailLow">-</div>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div id="detailAnalysis">
                                        <small class="text-muted">加载中...</small>
                                    </div>
                                </div>
                            </div>

                        </div>
                        <div class="col-md-4">
                            <div class="card bg-light">
                                <div class="card-body p-3">
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <h6 class="card-title fw-bold mb-0"><i class="bi bi-robot me-1"></i>AI分析建议</h6>
                                        <button class="btn btn-sm btn-primary" onclick="analyzeStock(currentSymbol)"
                                            id="analyzeBtn">
                                            <i class="bi bi-rocket-takeoff me-1"></i>AI分析
                                        </button>
                                    </div>
                                    <div id="llmAnalysisResult"
                                        style="max-height: 500px; min-height:500px;overflow-y: auto; padding-right: 10px;">
                                        <small class="text-muted">点击"AI分析"按钮获取分析结果</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer py-2 d-flex justify-content-between">
                    <div>
                        <button class="btn btn-sm btn-outline-primary me-2" id="prevStockBtn" title="上一个股票">
                            <i class="bi bi-chevron-left me-1"></i>上一个
                        </button>
                        <button class="btn btn-sm btn-outline-primary" id="nextStockBtn" title="下一个股票">
                            下一个<i class="bi bi-chevron-right ms-1"></i>
                        </button>
                    </div>
                    <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 大模型配置模态框 -->
    <div class="modal fade" id="llmConfigModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="bi bi-robot me-2"></i>大模型配置</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="llmConfigForm">
                        <input type="hidden" id="llmConfigId" value="1">

                        <div class="mb-3">
                            <label class="form-label">模型类型</label>
                            <select class="form-select" id="modelType" required>
                                <option value="openai">OpenAI</option>
                                <option value="baichuan">百炼</option>
                                <option value="volcano">火山引擎</option>
                                <option value="minimax">MiniMax</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">模型名称</label>
                            <input type="text" class="form-control" id="modelName" placeholder="如: gpt-3.5-turbo"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">API地址</label>
                            <input type="url" class="form-control" id="apiUrl"
                                placeholder="如: https://api.openai.com/v1/chat/completions" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Access Key</label>
                            <input type="password" class="form-control" id="apiKey" placeholder="输入API密钥">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">API ID (可选)</label>
                            <input type="text" class="form-control" id="apiId" placeholder="如: 火山引擎AK">
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="enabled" checked>
                            <label class="form-check-label" for="enabled">启用此配置</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveLlmConfig()">
                        <i class="bi bi-check-circle me-1"></i>保存配置
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let currentEditSymbol = '';
        let currentDeleteSymbol = '';

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function () {
            loadData();
            loadLogs();
            setInterval(loadData, 30000); // 每30秒自动刷新
        });

        // 显示大模型配置模态框
        function showLlmConfigModal() {
            fetch('/api/llm/config')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success' && data.data.length > 0) {
                        const config = data.data[0];
                        document.getElementById('llmConfigId').value = config.id;
                        document.getElementById('modelType').value = config.model_type;
                        document.getElementById('modelName').value = config.model_name;
                        document.getElementById('apiUrl').value = config.api_url;
                        document.getElementById('apiKey').value = config.api_key;
                        document.getElementById('apiId').value = config.api_id || '';
                        document.getElementById('enabled').checked = config.enabled;
                    }

                    const modal = new bootstrap.Modal(document.getElementById('llmConfigModal'));
                    modal.show();
                })
                .catch(error => {
                    alert('加载配置失败: ' + error.message);
                });
        }

        // 保存大模型配置
        function saveLlmConfig() {
            const config = {
                id: parseInt(document.getElementById('llmConfigId').value),
                model_type: document.getElementById('modelType').value,
                model_name: document.getElementById('modelName').value,
                api_url: document.getElementById('apiUrl').value,
                api_key: document.getElementById('apiKey').value,
                api_id: document.getElementById('apiId').value,
                enabled: document.getElementById('enabled').checked
            };

            fetch('/api/llm/config', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(config)
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('配置保存成功');
                        const modal = bootstrap.Modal.getInstance(document.getElementById('llmConfigModal'));
                        modal.hide();
                    } else {
                        alert('保存失败: ' + data.error);
                    }
                })
                .catch(error => {
                    alert('保存失败: ' + error.message);
                });
        }

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('/api/portfolio');
                const data = await response.json();

                if (data.status === 'success') {
                    updateSummary(data.summary);

                    // 检查是否有排序状态
                    if (sortColumn !== -1) {
                        // 有排序状态，使用排序后的数据
                        loadDataWithSort();
                    } else {
                        // 没有排序状态，直接显示原始数据
                        updateHoldingsTable(data.holdings);
                        updateSortIcons();
                    }
                } else {
                    alert('❌ 加载数据失败: ' + data.error);
                }
            } catch (error) {
                alert('❌ 网络错误: ' + error.message);
            }
        }

        // 更新总览
        function updateSummary(summary) {
            const now = new Date();
            document.getElementById('lastUpdated').innerHTML =
                `<i class="bi bi-clock me-1"></i>更新: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            const container = document.getElementById('summaryContainer');
            container.innerHTML = `
                <div class="summary-item">
                    <span class="summary-label"><i class="bi bi-collection me-2"></i>持仓数量</span>
                    <span class="summary-value">${summary.holding_count} 只</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label"><i class="bi bi-cash-stack me-2"></i>总市值</span>
                    <span class="summary-value">¥${formatNumber(summary.total_value)}</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label"><i class="bi bi-wallet2 me-2"></i>总成本</span>
                    <span class="summary-value">¥${formatNumber(summary.total_cost)}</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label"><i class="bi bi-graph-up-arrow me-2"></i>总盈亏</span>
                    <span class="summary-value ${summary.total_pnl >= 0 ? 'profit' : 'loss'}">
                        ¥${formatNumber(summary.total_pnl)} (${summary.total_pnl_percent.toFixed(4)}%)
                    </span>
                </div>
            `;
        }

        // 更新持仓表格
        function updateHoldingsTable(holdings) {
            const tbody = document.getElementById('holdingsBody');

            // 更新全局持仓列表
            holdingsList = holdings.map(h => ({ symbol: h.symbol, name: h.name }));

            if (holdings.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9" class="text-center py-4 text-muted">

        // 加载数据并排序
        async function loadDataWithSort() {
            try {
                const response = await fetch('/api/portfolio');
                const data = await response.json();

                if (data.status === 'success') {
                    updateSummary(data.summary);

                    // 对持仓数据进行排序
                    let sortedHoldings = [...data.holdings];

                    sortedHoldings.sort((a, b) => {
                        let valueA, valueB;

                        switch (sortColumn) {
                            case 0: // 股票名称
                                valueA = a.name;
                                valueB = b.name;
                                break;
                            case 1: // 股票代码
                                valueA = a.symbol;
                                valueB = b.symbol;
                                break;
                            case 5: // 市值
                                valueA = a.quantity * a.current_price;
                                valueB = b.quantity * b.current_price;
                                break;
                            case 6: // 盈亏额
                                valueA = a.pnl;
                                valueB = b.pnl;
                                break;
                            case 7: // 盈亏%
                                valueA = a.pnl_percent;
                                valueB = b.pnl_percent;
                                break;
                            default:
                                return 0;
                        }

                        if (typeof valueA === 'string' && typeof valueB === 'string') {
                            return valueA.localeCompare(valueB) * sortDirection;
                        } else {
                            return (valueA - valueB) * sortDirection;
                        }
                    });

                    updateHoldingsTable(sortedHoldings);
                    updateSortIcons();
                } else {
                    alert('❌ 加载数据失败: ' + data.error);

        // AI分析股票 - WebSocket流式版本
        function analyzeStock(symbol) {
            const btn = document.getElementById('analyzeBtn');
            const resultDiv = document.getElementById('llmAnalysisResult');
            
            if (!symbol) {
                resultDiv.innerHTML = '<div class="text-warning">请选择股票后再进行分析</div>';
                return;
            }
            
            btn.disabled = true;
            resultDiv.innerHTML = '<div class="text-left">分析中...</div>';
            
            // 构建WebSocket URL
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/api/stock/analyze_websocket/${symbol}`;
            
            try {
                // 创建WebSocket连接
                const ws = new WebSocket(wsUrl);
                
                // 添加一个标志，用于标记连接是否已经正常完成
                let isConnectionCompleted = false;
                
                // 处理连接打开事件
                ws.onopen = function() {
                    console.log('WebSocket连接已建立');
                };
                
                // 处理消息事件
                ws.onmessage = function(event) {
                    try {
                        // 确保收到的是字符串数据
                        if (typeof event.data === 'string') {
                            const data = JSON.parse(event.data);
                            
                            if (data.status === 'success') {
                                // 使用完整转换后的HTML内容，确保Markdown格式正确
                                resultDiv.innerHTML = `<div class="text-left">${data.content}</div>`;
                                
                                // 滚动到底部
                                resultDiv.scrollTop = resultDiv.scrollHeight;
                            } else if (data.status === 'done') {
                                // 分析完成，标记连接已正常完成
                                isConnectionCompleted = true;
                                btn.disabled = false;
                                console.log('分析完成');
                                // 收到完成信号后，前端主动关闭连接
                                if (ws.readyState === WebSocket.OPEN) {
                                    ws.close(1000, '分析完成，正常关闭连接');
                                }
                            } else if (data.status === 'error') {
                                console.error('分析失败:', data.error);
                                // 处理错误
                                // resultDiv.innerHTML += `<div class="text-danger">分析失败: ${data.error}</div>`;
                                btn.disabled = false;
                                // 不要在这里关闭连接，让后端处理关闭
                            }
                        }
                    } catch (error) {
                        console.error('解析WebSocket数据失败:', error);
                    }
                };
                
                // 处理错误事件
                ws.onerror = function(error) {
                    console.error('WebSocket错误:', error);
                    btn.disabled = false;
                    // 只有在连接未正常完成时才显示错误信息
                    if (!isConnectionCompleted) {
                        // resultDiv.innerHTML += '<div class="text-danger">分析失败: WebSocket连接错误</div>';
                    }
                    // 避免重复关闭
                    if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING) {
                        ws.close();
                    }
                };
                
                // 处理连接关闭事件
                ws.onclose = function(event) {
                    console.log('WebSocket连接已关闭');
                    btn.disabled = false;
                    // 如果连接已正常完成，不做任何处理
                    // 否则，如果关闭事件的code不是正常关闭码，则显示错误信息
                    if (!isConnectionCompleted && event.code !== 1000 && event.code !== 1001) {
                        resultDiv.innerHTML = '<div class="text-danger">分析失败: WebSocket连接意外关闭</div>';
                    }
                };
            } catch (error) {
                console.error('创建WebSocket连接失败:', error);
                btn.disabled = false;
                resultDiv.innerHTML = '<div class="text-danger">分析失败: 无法创建WebSocket连接</div>';
            }
        }

        // 创建分时图
        function createMinChart(detail) {
            const container = document.getElementById('detailChartContainer');

            // 清理旧的Chart
            if (stockChart) {
                stockChart.destroy();
            }
            if (volumeChart) {

            }

            // 使用真实数据或生成示例数据
            let times = ['09:30', '10:00', '10:30', '11:00', '11:30', '13:00', '13:30', '14:00', '14:30', '15:00'];
            let prices = [];
            let volumes = [];
            const basePrice = detail.pre_close || detail.current;
            const openPrice = detail.open || basePrice;

            // 尝试使用API返回的真实数据
            if (detail.min_data && detail.min_data.times && detail.min_data.times.length > 0) {
                times = detail.min_data.times;
                prices = detail.min_data.prices;
                volumes = detail.min_data.volumes || [];
            } else {
                // 如果没有真实数据，生成示例数据
                for (let i = 0; i < times.length; i++) {
                    const randomChange = (Math.random() - 0.5) * 0.02 * basePrice;
                    prices.push(basePrice + randomChange);
                    volumes.push(Math.floor(Math.random() * 1000000));
                }
            }

            const chartColor = detail.change >= 0 ? '#e74c3c' : '#2ecc71';
            const volumeColors = prices.map((price, i) => {
                if (i === 0) return chartColor;
                return price >= prices[i - 1] ? '#e74c3c' : '#2ecc71';
            });

            // 创建价格图表
            container.innerHTML = '<canvas id="minChart"></canvas>';
            const ctx = document.getElementById('minChart').getContext('2d');

            stockChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: times,
                    datasets: [{
                        label: '价格',
                        data: prices,
                        borderColor: chartColor,
                        backgroundColor: chartColor + '20',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    onHover: (event, elements) => {
                        if (elements.length > 0) {
                            hoverIndex = elements[0].index;
                            stockChart.update('none');
                            volumeChart.update('none');
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function (context) {
                                    const label = context.dataset.label || '';
                                    const value = context.parsed.y;
                                    const volume = volumes[context.dataIndex] || 0;
                                    return [
                                        `价格: ¥${value.toFixed(4)}`,
                                        `成交量: ${volume.toLocaleString()}`
                                    ];
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(0,0,0,0.1)'
                            }
                        }
                    }
                },
                plugins: [{
                    id: 'openPriceLine',
                    beforeDraw: (chart) => {
                        const { ctx, chartArea } = chart;
                        if (!chartArea) return;

                        const scale = chart.scales.y;
                        const y = scale.getPixelForValue(openPrice);

                        ctx.save();
                        ctx.beginPath();
                        ctx.moveTo(chartArea.left, y);
                        ctx.lineTo(chartArea.right, y);
                        ctx.strokeStyle = '#f39c12';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([5, 5]);
                        ctx.stroke();
                        ctx.restore();

                        // 标注开盘价
                        ctx.save();
                        ctx.fillStyle = '#f39c12';
                        ctx.font = '12px sans-serif';
                        ctx.fillText(`开:¥${openPrice.toFixed(2)}`, chartArea.left + 5, y - 5);
                        ctx.restore();
                    }
                }, {
                    id: 'verticalLine',
                    afterDraw: (chart) => {
                        if (hoverIndex < 0) return;

                        const { ctx, chartArea } = chart;
                        if (!chartArea) return;

                        const scale = chart.scales.x;
                        const x = scale.getPixelForValue(hoverIndex);

                        if (x >= chartArea.left && x <= chartArea.right) {
                            ctx.save();
                            ctx.beginPath();
                            ctx.moveTo(x, chartArea.top);
                            ctx.lineTo(x, chartArea.bottom);
                            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                            ctx.lineWidth = 1;
                            ctx.setLineDash([]);
                            ctx.stroke();
                            ctx.restore();
                        }
                    }
                }]
            });

            // 创建成交量图表
            volumeContainer.innerHTML = '<canvas id="volumeChart"></canvas>';
            const ctx2 = document.getElementById('volumeChart').getContext('2d');

            volumeChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: times,
                    datasets: [{
                        label: '成交量',
                        data: volumes,
                        backgroundColor: volumeColors,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    onHover: (event, elements) => {
                        if (elements.length > 0) {
                            hoverIndex = elements[0].index;
                            stockChart.update('none');
                            volumeChart.update('none');
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function (context) {
                                    const volume = context.parsed.y;
                                    return `成交量: ${volume.toLocaleString()}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                display: false
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(0,0,0,0.1)'
                            },
                            ticks: {
                                callback: function (value) {
                                    if (value >= 1000000) {
                                        return (value / 1000000).toFixed(1) + 'M';
                                    } else if (value >= 1000) {
                                        return (value / 1000).toFixed(0) + 'K';
                                    }
                                    return value;
                                }
                            }
                        }
                    }
                },
                plugins: [{
                    id: 'verticalLineVolume',
                    afterDraw: (chart) => {
                        if (hoverIndex < 0) return;

                        const { ctx, chartArea } = chart;
                        if (!chartArea) return;

                        const scale = chart.scales.x;
                        const x = scale.getPixelForValue(hoverIndex);

                        if (x >= chartArea.left && x <= chartArea.right) {
                            ctx.save();
                            ctx.beginPath();
                            ctx.moveTo(x, chartArea.top);
                            ctx.lineTo(x, chartArea.bottom);
                            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                            ctx.lineWidth = 1;
                            ctx.setLineDash([]);
                            ctx.stroke();
                            ctx.restore();
                        }
                    }
                }]
            });
        }
    </script>
</body>

</html>
