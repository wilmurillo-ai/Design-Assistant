<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44A08D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Phone body -->
  <rect x="28" y="8" width="72" height="112" rx="8" ry="8" fill="url(#grad1)" stroke="#E55A2B" stroke-width="2"/>
  
  <!-- Screen -->
  <rect x="36" y="20" width="56" height="88" rx="4" ry="4" fill="#1a1a2e"/>
  
  <!-- Lobster icon on screen -->
  <g transform="translate(64, 64)">
    <!-- Lobster body -->
    <ellipse cx="0" cy="0" rx="16" ry="20" fill="url(#grad2)"/>
    <!-- Claws -->
    <ellipse cx="-20" cy="-8" rx="8" ry="12" fill="url(#grad2)" transform="rotate(-30 -20 -8)"/>
    <ellipse cx="20" cy="-8" rx="8" ry="12" fill="url(#grad2)" transform="rotate(30 20 -8)"/>
    <!-- Antennae -->
    <line x1="-4" y1="-20" x2="-8" y2="-32" stroke="url(#grad2)" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="-20" x2="8" y2="-32" stroke="url(#grad2)" stroke-width="2" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="-5" cy="-12" r="3" fill="#fff"/>
    <circle cx="5" cy="-12" r="3" fill="#fff"/>
    <circle cx="-5" cy="-12" r="1.5" fill="#1a1a2e"/>
    <circle cx="5" cy="-12" r="1.5" fill="#1a1a2e"/>
  </g>
  
  <!-- Home button -->
  <circle cx="64" cy="114" r="4" fill="#555"/>
  
  <!-- Touch indicator -->
  <circle cx="80" cy="50" r="8" fill="rgba(255,255,255,0.3)">
    <animate attributeName="r" values="4;12;4" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
