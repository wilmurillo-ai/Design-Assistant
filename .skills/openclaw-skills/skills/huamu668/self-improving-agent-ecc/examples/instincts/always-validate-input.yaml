# Always Validate Input

## Action
Validate all user input and external data before processing. Never trust input from external sources.

## Rationale
Unvalidated input is the #1 cause of security vulnerabilities. Always validate type, format, range, and sanitize where necessary.

## Examples

### Positive
```typescript
import { z } from 'zod'

const UserSchema = z.object({
  email: z.string().email(),
  age: z.number().int().min(0).max(150)
})

function createUser(input: unknown) {
  const validated = UserSchema.parse(input)
  // Now safe to use
}
```

### Negative
```typescript
// Never use raw input
function createUser(input: any) {
  await db.users.create(input)  // DANGEROUS
}
```

