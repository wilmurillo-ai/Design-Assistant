# Use React Hooks Pattern

## Action
Prefer functional components with hooks over class components. Use custom hooks for reusable logic.

## Rationale
This project follows modern React patterns using hooks. Class components are legacy and should be avoided for new code.

## Examples

### Positive
```typescript
// Use functional component with hooks
function UserProfile({ userId }: { userId: string }) {
  const { data, loading } = useUser(userId)
  const [isEditing, setIsEditing] = useState(false)

  if (loading) return <Spinner />
  return <ProfileCard user={data} />
}

// Custom hook for reusable logic
function useUser(userId: string) {
  const [data, setData] = useState(null)
  const [loading, setLoading] = useState(true)

  useEffect(() => {
    fetchUser(userId).then(setData).finally(() => setLoading(false))
  }, [userId])

  return { data, loading }
}
```

### Negative
```typescript
// Don't use class components
class UserProfile extends React.Component {
  // Legacy pattern - avoid in this project
}
```

## Evidence
- Observed 15 functional components in codebase
- User prefers hooks pattern (confirmed 2025-01-12)
- All new components follow this pattern
