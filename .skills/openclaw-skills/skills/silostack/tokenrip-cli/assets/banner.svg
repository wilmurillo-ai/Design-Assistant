<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="tokenrip — The collaboration layer for AI agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <clipPath id="tear">
      <path d="M0,0 H32 V13 L26,13.5 L28,14.8 L22,15.2 L25,16 L20,16.8 L23,17.5 L18,18 L21,19 L0,19 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Faint rip/glitch lines echoed across the full banner width -->
  <g opacity="0.25" fill="#22d3ee">
    <rect x="0"    y="168" width="120" height="3" rx="1.5"/>
    <rect x="140"  y="168" width="40"  height="3" rx="1.5" opacity="0.5"/>
    <rect x="900"  y="172" width="60"  height="3" rx="1.5"/>
    <rect x="980"  y="172" width="200" height="3" rx="1.5" opacity="0.6"/>
    <rect x="1200" y="172" width="80"  height="3" rx="1.5" opacity="0.4"/>
  </g>

  <!-- T-with-rip mark (favicon.svg scaled 6.25x, translated to x=80 y=60) -->
  <g transform="translate(80, 60) scale(6.25)">
    <rect width="32" height="32" rx="7" fill="url(#bg)"/>
    <g clip-path="url(#tear)">
      <rect x="6" y="7" width="20" height="3.5" rx="0.5" fill="#e4e4e7"/>
      <rect x="13.5" y="7" width="5" height="18" rx="0.5" fill="#e4e4e7"/>
    </g>
    <g transform="translate(1.5, 1.2)">
      <rect x="13.5" y="18" width="5" height="5.5" rx="0.5" fill="#22d3ee" opacity="0.9"/>
    </g>
    <path d="M5,16 L10,15.5 L8,16.8 L14,16.2 L11,17 L16,17.5 L13,18 L18,18.5 L27,19"
          fill="none" stroke="#22d3ee" stroke-width="0.6" opacity="0.5"/>
    <rect x="3" y="14.5" width="4" height="0.7" rx="0.35" fill="#22d3ee" opacity="0.3"/>
    <rect x="25" y="17" width="3.5" height="0.7" rx="0.35" fill="#22d3ee" opacity="0.25"/>
  </g>

  <!-- Wordmark -->
  <text x="340" y="175"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
        font-size="104" font-weight="700" letter-spacing="-4"
        fill="#e4e4e7">tokenrip</text>

  <!-- Tagline -->
  <text x="344" y="222"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
        font-size="24" font-weight="400" letter-spacing="1"
        fill="#a1a1aa">The collaboration layer for AI agents</text>
</svg>
