<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Second Brain</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #ffffff; --surface: #fafafa; --surface2: #f5f5f4;
  --border: #e8e8e6; --text: #1a1a1a; --text2: #8c8c8c; --text3: #b5b5b5;
  --accent: #1a1a1a; --warm: #c9a87c; --warm-light: #f5efe7;
  --rose: #d4a0a0; --rose-light: #faf0f0;
  --sage: #9caa9c; --sage-light: #f0f5f0;
  --lavender: #a8a0c8; --lavender-light: #f3f0fa;
  --sand: #c4b49a; --sand-light: #f8f5f0;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh; line-height: 1.6;
}

/* Responsive base */
@media (max-width: 600px) {
  :root { --pad: 20px; }
}
@media (min-width: 601px) {
  :root { --pad: 80px; }
}

/* Header */
.header {
  padding: 48px var(--pad) 0;
  max-width: 1200px; margin: 0 auto;
}
.header-greeting {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px; color: var(--text2);
  letter-spacing: 2px; margin-bottom: 12px;
}
.header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(24px, 5vw, 36px); font-weight: 700;
  color: var(--text); letter-spacing: -0.5px;
}
.header-sub {
  font-size: 14px; color: var(--text3);
  margin-top: 8px; font-weight: 300;
}
.header-quote {
  margin-top: 24px; padding: 20px 0;
  border-top: 1px solid var(--border);
  font-family: 'Noto Serif SC', serif;
  font-size: 15px; color: var(--text2);
  font-style: italic; line-height: 1.8;
}

/* Nav */
.nav {
  display: flex; gap: 24px;
  padding: 24px var(--pad) 0;
  max-width: 1200px; margin: 0 auto;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.nav-item {
  padding: 8px 0 12px; font-size: 14px;
  color: var(--text3); cursor: pointer;
  border-bottom: 1.5px solid transparent;
  transition: all .3s; background: none; border-top: none;
  border-left: none; border-right: none; font-family: inherit;
  font-weight: 400; letter-spacing: 0.5px; white-space: nowrap;
}
.nav-item:hover { color: var(--text2); }
.nav-item.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

/* Panels */
.panel { display: none; padding: 32px var(--pad) 60px; max-width: 1200px; margin: 0 auto; }
.panel.active { display: block; animation: fadeUp .5s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* === Thought Cards === */
.cards-section-title { font-family: 'Noto Serif SC', serif; font-size: 13px; color: var(--text3); letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
.cards-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
.filter-chip {
  padding: 6px 16px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text2); font-size: 12px; cursor: pointer;
  transition: all .3s; font-family: inherit; letter-spacing: 0.3px;
}
.filter-chip:hover { border-color: var(--text3); color: var(--text); }
.filter-chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
@media (max-width: 800px) { .cards-grid { grid-template-columns: 1fr; } }
.card {
  background: var(--bg);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 24px;
  transition: all .4s ease; position: relative;
  display: flex; flex-direction: column;
}
.card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.06); transform: translateY(-2px); }
.card-number { font-family: 'Noto Serif SC', serif; font-size: 32px; color: var(--surface2); font-weight: 700; line-height: 1; margin-bottom: 12px; }
.card-insight { font-family: 'Noto Serif SC', serif; font-size: 16px; line-height: 1.8; color: var(--text); flex: 1; }
.card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--surface2); flex-shrink: 0; }
.card-tag { font-size: 11px; padding: 3px 10px; border-radius: 4px; letter-spacing: 0.5px; }
.card-tag.brand { background: var(--rose-light); color: var(--rose); }
.card-tag.product { background: var(--sage-light); color: var(--sage); }
.card-tag.ai { background: var(--lavender-light); color: var(--lavender); }
.card-tag.life { background: var(--sand-light); color: var(--sand); }
.card-tag.invest { background: var(--warm-light); color: var(--warm); }
.card-date { font-size: 11px; color: var(--text3); }

/* === Knowledge Graph (2D Canvas Cards) === */
.graph-canvas-wrap {
  position: relative; width: 100%; height: min(640px, 75vh);
  border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden; background: var(--surface); cursor: grab;
}
.graph-canvas-wrap:active { cursor: grabbing; }
.graph-canvas-wrap canvas { display: block; width: 100%; height: 100%; }
.graph-legend { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
.graph-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.graph-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.graph-hint { font-size: 12px; color: var(--text3); margin-top: 12px; font-style: italic; }
.graph-tooltip {
  position: absolute; display: none; padding: 12px 16px;
  background: white; border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,.08); pointer-events: none;
  max-width: 240px; z-index: 10;
}
.graph-tooltip-title { font-family: 'Noto Serif SC', serif; font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.graph-tooltip-type { font-size: 11px; color: var(--text2); }
.graph-tooltip-connections { font-size: 12px; color: var(--text3); margin-top: 6px; }

/* === Emotion Timeline === */
.timeline-month { margin-bottom: 32px; }
.timeline-month-header {
  font-family: 'Noto Serif SC', serif; font-size: 18px;
  color: var(--text); margin-bottom: 16px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.timeline-month-header span { font-size: 13px; color: var(--text3); font-family: 'Inter', sans-serif; margin-left: 8px; font-weight: 300; }
.timeline-day {
  border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 8px; overflow: hidden; transition: all .3s;
  cursor: pointer;
}
.timeline-day:hover { border-color: var(--text3); }
.timeline-day.expanded { border-color: var(--text3); }
.timeline-day-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; user-select: none;
}
.timeline-day-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.timeline-day-dot.positive { background: var(--sage); }
.timeline-day-dot.neutral { background: var(--lavender); }
.timeline-day-dot.low { background: var(--text3); }
.timeline-day-date { font-size: 14px; font-weight: 500; color: var(--text); min-width: 90px; }
.timeline-day-mood {
  font-size: 12px; color: var(--text2); padding: 2px 10px;
  background: var(--surface2); border-radius: 12px;
}
.timeline-day-preview { font-size: 13px; color: var(--text3); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.timeline-day-count { font-size: 11px; color: var(--text3); flex-shrink: 0; }
.timeline-day-entries { display: none; padding: 0 16px 16px; }
.timeline-day.expanded .timeline-day-entries { display: block; animation: fadeUp .3s; }
.timeline-entry {
  padding: 12px 0; border-top: 1px solid var(--surface2);
  display: flex; gap: 12px;
}
.timeline-entry-time {
  font-size: 12px; color: var(--text3); font-weight: 500;
  min-width: 44px; padding-top: 2px;
}
.timeline-entry-body { flex: 1; }
.timeline-entry-type {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  background: var(--surface2); color: var(--text2); display: inline-block; margin-bottom: 4px;
}
.timeline-entry-content { font-size: 14px; line-height: 1.7; color: var(--text); }
.heatmap-legend { display: flex; gap: 16px; margin-bottom: 20px; font-size: 12px; color: var(--text2); flex-wrap: wrap; }
.heatmap-legend span { display: flex; align-items: center; gap: 6px; }
.heatmap-legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
@media (max-width: 600px) {
  .timeline-day-preview { display: none; }
  .timeline-day-header { padding: 12px 14px; }
}

/* === Radar === */
.radar-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
@media (max-width: 800px) { .radar-wrap { grid-template-columns: 1fr; } }
.radar-chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; }
.radar-controls { display: flex; gap: 8px; margin-bottom: 20px; }
.radar-btn {
  padding: 6px 16px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text2); font-size: 12px; cursor: pointer;
  transition: all .3s; font-family: inherit;
}
.radar-btn:hover { border-color: var(--text3); }
.radar-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.radar-insights { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (max-width: 600px) { .radar-insights { grid-template-columns: 1fr; } }
.radar-stat {
  padding: 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
}
.radar-stat-label { font-size: 12px; color: var(--text2); letter-spacing: 0.5px; }
.radar-stat-value { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 700; margin-top: 4px; }
.radar-stat-change { font-size: 11px; margin-top: 2px; color: var(--text3); }
.radar-stat-change.up { color: var(--sage); }
.radar-stat-change.down { color: var(--rose); }
.radar-story {
  margin-top: 24px; padding: 20px;
  background: var(--warm-light); border-radius: 8px;
  font-family: 'Noto Serif SC', serif;
  font-size: 14px; line-height: 1.8; color: var(--text2);
}
</style>
</head>
<body>

<div class="header">
  <div class="header-greeting">MY SECOND BRAIN</div>
  <h1>Vivi 的思考花园</h1>
  <div class="header-sub">2026 年 1 月 — 3 月 / 18 篇日记 / 12 个洞察 / 6 个成长维度</div>
  <div class="header-quote">「日记不只是记录过去，更是在训练未来的自己。」</div>
</div>

<div class="nav">
  <button class="nav-item active" data-panel="cards">思维卡片</button>
  <button class="nav-item" data-panel="graph">知识图谱</button>
  <button class="nav-item" data-panel="heatmap">情绪日历</button>
  <button class="nav-item" data-panel="radar">成长轨迹</button>
</div>

<div id="cards" class="panel active"></div>
<div id="graph" class="panel"></div>
<div id="heatmap" class="panel"></div>
<div id="radar" class="panel"></div>

<script src="data.js"></script>
<script>
// ===== DATA loaded from data.js =====
// Variables available: thoughtCards, catStyles, diaryEntries, moodPositive, moodNeutral,
//   dimensionScores, nodeData, linkData

// ===== TAB SWITCHING =====
document.querySelectorAll('.nav-item').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    const panel = document.getElementById(tab.dataset.panel);
    panel.classList.add('active');
    if(tab.dataset.panel === 'graph' && !graphRendered) renderGraph();
  });
});

// ===== 1. THOUGHT CARDS =====
function renderCards(filter) {
  const cats = [...new Set(thoughtCards.map(c => c.cat))];
  const filtered = filter ? thoughtCards.filter(c => c.cat === filter) : thoughtCards;
  document.getElementById('cards').innerHTML = `
    <div class="cards-section-title">从日记中提炼的思考碎片</div>
    <div class="cards-filter">
      <button class="filter-chip ${!filter?'active':''}" onclick="renderCards(null)">全部</button>
      ${cats.map(c => `<button class="filter-chip ${filter===c?'active':''}" onclick="renderCards('${c}')">${c}</button>`).join('')}
    </div>
    <div class="cards-grid">
      ${filtered.map((c,i) => `
        <div class="card">
          <div class="card-number">${String(c.id).padStart(2,'0')}</div>
          <div class="card-insight">${c.insight}</div>
          <div class="card-footer">
            <span class="card-tag ${catStyles[c.cat]||'life'}">${c.cat}</span>
            <span class="card-date">${c.date}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}
renderCards(null);

// ===== 2. KNOWLEDGE GRAPH (2D Canvas Cards) =====
let graphRendered = false;
function renderGraph() {
  graphRendered = true;
  const graphEl = document.getElementById('graph');

  // nodeData and linkData loaded from data.js

  const groupColors = {topic:"#1a1a1a",concept:"#9caa9c",person:"#d4a0a0"};
  const groupBg = {topic:"#f5f5f4",concept:"#f0f5f0",person:"#faf0f0"};
  const groupLabels = {topic:"主题领域",concept:"概念 / 框架",person:"人物"};

  graphEl.innerHTML = `
    <div class="cards-section-title">我的知识关联图谱</div>
    <div class="graph-canvas-wrap" id="graphWrap">
      <canvas id="graphCanvas"></canvas>
      <div class="graph-tooltip" id="graphTooltip">
        <div class="graph-tooltip-title"></div>
        <div class="graph-tooltip-type"></div>
        <div class="graph-tooltip-connections"></div>
      </div>
    </div>
    <div class="graph-legend">
      ${Object.entries(groupLabels).map(([k,v]) => `<div class="graph-legend-item"><div class="graph-legend-dot" style="background:${groupColors[k]}"></div>${v}</div>`).join('')}
    </div>
    <div class="graph-hint">拖拽节点重新排列，悬停查看详情</div>
  `;

  const wrap = document.getElementById('graphWrap');
  const canvas = document.getElementById('graphCanvas');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('graphTooltip');
  let W, H, dpr;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = wrap.clientWidth; H = wrap.clientHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', () => { resize(); });

  // Init positions
  const nodes = nodeData.map((n, i) => ({
    ...n,
    x: W/2 + (Math.random() - 0.5) * W * 0.6,
    y: H/2 + (Math.random() - 0.5) * H * 0.6,
    vx: 0, vy: 0
  }));
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  const links = linkData.map(l => ({source: nodeMap[l.s], target: nodeMap[l.t]}));

  // Connection count for tooltip
  const connCount = {};
  links.forEach(l => {
    connCount[l.source.id] = (connCount[l.source.id]||0) + 1;
    connCount[l.target.id] = (connCount[l.target.id]||0) + 1;
  });

  // Force simulation
  function simulate() {
    // Center gravity
    nodes.forEach(n => {
      n.vx += (W/2 - n.x) * 0.001;
      n.vy += (H/2 - n.y) * 0.001;
    });
    // Repulsion
    for(let i=0; i<nodes.length; i++) {
      for(let j=i+1; j<nodes.length; j++) {
        let dx = nodes[j].x - nodes[i].x;
        let dy = nodes[j].y - nodes[i].y;
        let dist = Math.sqrt(dx*dx + dy*dy) || 1;
        let minDist = (nodes[i].size + nodes[j].size) * 3.5;
        if(dist < minDist) {
          let force = (minDist - dist) / dist * 0.05;
          nodes[i].vx -= dx * force; nodes[i].vy -= dy * force;
          nodes[j].vx += dx * force; nodes[j].vy += dy * force;
        }
      }
    }
    // Attraction (links)
    links.forEach(l => {
      let dx = l.target.x - l.source.x;
      let dy = l.target.y - l.source.y;
      let dist = Math.sqrt(dx*dx + dy*dy) || 1;
      let ideal = 120;
      let force = (dist - ideal) / dist * 0.008;
      l.source.vx += dx * force; l.source.vy += dy * force;
      l.target.vx -= dx * force; l.target.vy -= dy * force;
    });
    // Apply velocity
    nodes.forEach(n => {
      if(n === dragNode) return;
      n.vx *= 0.85; n.vy *= 0.85;
      n.x += n.vx; n.y += n.vy;
      n.x = Math.max(60, Math.min(W-60, n.x));
      n.y = Math.max(30, Math.min(H-30, n.y));
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    // Draw links
    links.forEach(l => {
      ctx.beginPath();
      ctx.moveTo(l.source.x, l.source.y);
      ctx.lineTo(l.target.x, l.target.y);
      const isHighlight = hoverNode && (l.source === hoverNode || l.target === hoverNode);
      ctx.strokeStyle = isHighlight ? 'rgba(0,0,0,0.2)' : 'rgba(0,0,0,0.06)';
      ctx.lineWidth = isHighlight ? 1.5 : 1;
      ctx.stroke();
    });
    // Draw nodes as cards
    nodes.forEach(n => {
      const isHover = n === hoverNode;
      const isDim = hoverNode && !isHover && !links.some(l => (l.source===hoverNode&&l.target===n)||(l.target===hoverNode&&l.source===n));
      const alpha = isDim ? 0.3 : 1;
      ctx.globalAlpha = alpha;

      // Card background
      const textW = ctx.measureText(n.id).width;
      const cardW = Math.max(textW + 24, n.size * 3.2);
      const cardH = n.size * 1.6;
      const rx = 6;
      ctx.fillStyle = isHover ? '#fff' : groupBg[n.group];
      ctx.strokeStyle = groupColors[n.group];
      ctx.lineWidth = isHover ? 2 : 1;
      roundRect(ctx, n.x - cardW/2, n.y - cardH/2, cardW, cardH, rx);
      ctx.fill(); ctx.stroke();

      // Shadow on hover
      if(isHover) {
        ctx.shadowColor = 'rgba(0,0,0,0.1)';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#fff';
        roundRect(ctx, n.x - cardW/2, n.y - cardH/2, cardW, cardH, rx);
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Text
      ctx.fillStyle = groupColors[n.group];
      ctx.font = `${isHover?'600':'500'} ${Math.max(11, n.size * 0.48)}px Inter, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(n.id, n.x, n.y);

      ctx.globalAlpha = 1;
    });
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  // Interaction
  let dragNode = null, hoverNode = null;

  function getNode(mx, my) {
    for(let i=nodes.length-1; i>=0; i--) {
      const n = nodes[i];
      const textW = ctx.measureText(n.id).width;
      const cardW = Math.max(textW + 24, n.size * 3.2);
      const cardH = n.size * 1.6;
      if(mx >= n.x-cardW/2 && mx <= n.x+cardW/2 && my >= n.y-cardH/2 && my <= n.y+cardH/2) return n;
    }
    return null;
  }

  function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  canvas.addEventListener('mousemove', e => {
    const pos = getMousePos(e);
    if(dragNode) {
      dragNode.x = pos.x; dragNode.y = pos.y;
      dragNode.vx = 0; dragNode.vy = 0;
      return;
    }
    const n = getNode(pos.x, pos.y);
    hoverNode = n;
    canvas.style.cursor = n ? 'pointer' : 'grab';
    if(n) {
      const connected = links.filter(l => l.source===n || l.target===n).map(l => l.source===n ? l.target.id : l.source.id);
      tooltip.style.display = 'block';
      tooltip.style.left = Math.min(pos.x + 16, W - 260) + 'px';
      tooltip.style.top = (pos.y - 10) + 'px';
      tooltip.querySelector('.graph-tooltip-title').textContent = n.id;
      tooltip.querySelector('.graph-tooltip-type').textContent = groupLabels[n.group];
      tooltip.querySelector('.graph-tooltip-connections').textContent = '关联: ' + connected.join(', ');
    } else {
      tooltip.style.display = 'none';
    }
  });

  canvas.addEventListener('mousedown', e => {
    const pos = getMousePos(e);
    dragNode = getNode(pos.x, pos.y);
  });
  canvas.addEventListener('mouseup', () => { dragNode = null; });
  canvas.addEventListener('mouseleave', () => { dragNode = null; hoverNode = null; tooltip.style.display = 'none'; });

  // Touch support
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const pos = getMousePos(e);
    dragNode = getNode(pos.x, pos.y);
  }, {passive: false});
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if(dragNode) {
      const pos = getMousePos(e);
      dragNode.x = pos.x; dragNode.y = pos.y;
      dragNode.vx = 0; dragNode.vy = 0;
    }
  }, {passive: false});
  canvas.addEventListener('touchend', () => { dragNode = null; });

  function loop() {
    simulate(); draw();
    requestAnimationFrame(loop);
  }
  loop();
}

// ===== 3. EMOTION TIMELINE =====
function renderHeatmap() {
  // Group entries by month
  const monthGroups = {"01":{label:"一月",labelEn:"January",days:[]},"02":{label:"二月",labelEn:"February",days:[]},"03":{label:"三月",labelEn:"March",days:[]}};
  const sortedDates = Object.keys(diaryEntries).sort();
  sortedDates.forEach(dateStr => {
    const m = dateStr.slice(5,7);
    if(monthGroups[m]) monthGroups[m].days.push({date:dateStr, ...diaryEntries[dateStr]});
  });

  function moodType(mood) {
    if(moodPositive.includes(mood)) return 'positive';
    if(moodNeutral.includes(mood)) return 'neutral';
    return 'low';
  }

  let html = `
    <div class="cards-section-title">每一天的情绪色彩</div>
    <div class="heatmap-legend">
      <span><i style="background:var(--sage)"></i>积极 / 充沛</span>
      <span><i style="background:var(--lavender)"></i>平静 / 专注</span>
      <span><i style="background:var(--text3)"></i>低落 / 疲惫</span>
    </div>
  `;

  for(const [key, mg] of Object.entries(monthGroups)) {
    html += `<div class="timeline-month">
      <div class="timeline-month-header">${mg.label}<span>${mg.labelEn} 2026</span></div>`;
    mg.days.forEach(day => {
      const mt = moodType(day.mood);
      const preview = day.entries[0].content.slice(0, 50) + (day.entries[0].content.length > 50 ? '...' : '');
      const dayNum = day.date.slice(8);
      html += `
        <div class="timeline-day" onclick="this.classList.toggle('expanded')">
          <div class="timeline-day-header">
            <div class="timeline-day-dot ${mt}"></div>
            <div class="timeline-day-date">${day.date.slice(5).replace('-','/')}</div>
            <div class="timeline-day-mood">${day.label}</div>
            <div class="timeline-day-preview">${preview}</div>
            <div class="timeline-day-count">${day.entries.length} 条</div>
          </div>
          <div class="timeline-day-entries">
            ${day.entries.map(e => `
              <div class="timeline-entry">
                <div class="timeline-entry-time">${e.time}</div>
                <div class="timeline-entry-body">
                  <div class="timeline-entry-type">${e.type}</div>
                  <div class="timeline-entry-content">${e.content}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>`;
    });
    html += `</div>`;
  }
  document.getElementById('heatmap').innerHTML = html;
}
renderHeatmap();

// ===== 4. GROWTH RADAR =====
let radarChart = null;
let activeMonths = new Set(["一月","二月","三月"]);
const monthColors = {"一月":"rgba(26,26,26,0.1)","二月":"rgba(156,170,156,0.15)","三月":"rgba(212,160,160,0.2)"};
const monthBorders = {"一月":"#1a1a1a","二月":"#9caa9c","三月":"#d4a0a0"};

function renderRadar() {
  const labels = Object.keys(dimensionScores["一月"]);
  const datasets = [...activeMonths].map(m => ({
    label: m, data: labels.map(l => dimensionScores[m][l]),
    backgroundColor: monthColors[m], borderColor: monthBorders[m],
    borderWidth: 2, pointBackgroundColor: monthBorders[m], pointRadius: 4
  }));
  const latest = dimensionScores["三月"];
  const prev = dimensionScores["二月"];
  // Find top growth and area needing attention
  let maxGrowth = '', maxGrowthVal = -Infinity, minDim = '', minVal = Infinity;
  for(const d of labels) {
    const diff = latest[d] - prev[d];
    if(diff > maxGrowthVal) { maxGrowthVal = diff; maxGrowth = d; }
    if(latest[d] < minVal) { minVal = latest[d]; minDim = d; }
  }

  document.getElementById('radar').innerHTML = `
    <div class="cards-section-title">六个维度的成长轨迹</div>
    <div class="radar-controls" id="radarControls">
      ${["一月","二月","三月"].map(m => `<button class="radar-btn ${activeMonths.has(m)?'active':''}" onclick="toggleMonth('${m}')">${m}</button>`).join('')}
    </div>
    <div class="radar-wrap">
      <div class="radar-chart-box"><canvas id="radarCanvas"></canvas></div>
      <div>
        <div class="radar-insights">
          ${labels.map(d => {
            const diff = latest[d] - prev[d];
            return `<div class="radar-stat">
              <div class="radar-stat-label">${d}</div>
              <div class="radar-stat-value">${latest[d]}</div>
              <div class="radar-stat-change ${diff>=0?'up':'down'}">${diff>=0?'↑':'↓'} ${Math.abs(diff)} vs 上月</div>
            </div>`;
          }).join('')}
        </div>
        <div class="radar-story">
          这三个月里，你在「${maxGrowth}」上的进步最为显著（+${maxGrowthVal}），而「${minDim}」是目前最需要关注的维度。
          从一月到三月，你的整体能力雷达在稳步扩展 ── 这就是持续记录和反思的力量。
        </div>
      </div>
    </div>
  `;

  if(radarChart) radarChart.destroy();
  radarChart = new Chart(document.getElementById('radarCanvas'), {
    type: 'radar', data: { labels, datasets },
    options: {
      responsive: true,
      scales: { r: { beginAtZero: true, max: 100,
        grid: { color: 'rgba(0,0,0,0.05)' },
        angleLines: { color: 'rgba(0,0,0,0.05)' },
        pointLabels: { color: '#8c8c8c', font: { size: 12, family: 'Inter' } },
        ticks: { display: false }
      }},
      plugins: { legend: { labels: { color: '#8c8c8c', usePointStyle: true, padding: 20, font: { family: 'Inter' } } } }
    }
  });
}

function toggleMonth(m) {
  if(activeMonths.has(m)) { if(activeMonths.size > 1) activeMonths.delete(m); }
  else activeMonths.add(m);
  renderRadar();
}
renderRadar();
</script>
