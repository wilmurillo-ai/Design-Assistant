[project]
name = "dingtalk-teambition"
version = "1.0.0"
description = "Teambition AI Skill - 项目任务管理"
requires-python = ">=3.8"
dependencies = [
    "requests>=2.31.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["scripts"]

[tool.hatch.build]
include = [
  "scripts/*.py",
  "*.md",
  "pyproject.toml",
]
