# 示例：添加 OpenAI 配置
# Example: Add OpenAI Configuration
#
# 使用方法：
# 1. 复制此配置到 config/models.yaml
# 2. 填写你的 API Key
# 3. 运行：python scripts/provider_manager.py list-models

providers:
  openai:
    name: OpenAI
    type: openai-compatible
    enabled: true
    priority: 2
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    api_key: sk-your-api-key-here  # 替换为你的 API Key
    timeout: 30
    retry_count: 3
    models:
      - id: openai/gpt-4
        name: GPT-4
        context_window: 128000
        max_tokens: 32768
        cost_input: 0.03
        cost_output: 0.06
        capabilities: [text, image, code]
        speed_rating: 3
        quality_rating: 5
        
      - id: openai/gpt-4-turbo
        name: GPT-4 Turbo
        context_window: 128000
        max_tokens: 32768
        cost_input: 0.01
        cost_output: 0.03
        capabilities: [text, image, code]
        speed_rating: 4
        quality_rating: 5
        
      - id: openai/gpt-3.5-turbo
        name: GPT-3.5 Turbo
        context_window: 16385
        max_tokens: 4096
        cost_input: 0.0005
        cost_output: 0.0015
        capabilities: [text]
        speed_rating: 5
        quality_rating: 4

# 智能体使用示例
# ⚠️ 注意：请将 Agent_Coordinator 替换为您自己的智能体名称
agents:
  Agent_Coordinator:  # ⚠️ 请替换为您的智能体名称
    models:
      primary: openai/gpt-4
      fallback: bailian/qwen3.5-plus
