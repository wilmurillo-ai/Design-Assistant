# OpenAI 配置示例
# ⚠️ 注意：请将下面的 API Key 替换为您自己的
# ⚠️ 重要：不要将此文件提交到 Git

providers:
  openai:
    name: OpenAI
    type: openai-compatible
    enabled: true
    priority: 2
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY  # ✅ 推荐使用环境变量
    # api_key: sk-proj-XXXXXXXXXXXXXXXXXXXXXXXX  # ⚠️ 或临时测试用（不要提交）
    timeout: 30
    retry_count: 3
    models:
      - id: openai/gpt-4
        name: GPT-4
        context_window: 128000
        max_tokens: 32768
        cost_input: 0.03
        cost_output: 0.06
        capabilities: [text, image, code]
        speed_rating: 3
        quality_rating: 5
        
      - id: openai/gpt-4-turbo
        name: GPT-4 Turbo
        context_window: 128000
        max_tokens: 32768
        cost_input: 0.01
        cost_output: 0.03
        capabilities: [text, image, code]
        speed_rating: 4
        quality_rating: 5
        
      - id: openai/gpt-3.5-turbo
        name: GPT-3.5 Turbo
        context_window: 16385
        max_tokens: 4096
        cost_input: 0.0005
        cost_output: 0.0015
        capabilities: [text]
        speed_rating: 5
        quality_rating: 4

# 智能体配置示例
# ⚠️ 选择一个子智能体（如 Reactis）更换到 OpenAI
agents:
  Agent_Frontend_Dev:  # Reactis 的新名称
    models:
      primary: openai/gpt-4  # ✅ 使用 OpenAI GPT-4
      fallback: bailian/qwen3-coder-plus  # 云端备用
    preferences:
      code_quality: true
      local_first: false

# 环境变量设置说明
# 在 .env.local 文件中设置（不要提交到 Git）:
# OPENAI_API_KEY=sk-proj-xxxxxxxxxxxxxxxxxxxxxxxx
