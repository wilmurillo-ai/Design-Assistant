# ========== 本地模型自动发现 ==========
local_discovery:
  enabled: true
  scan_interval: 300
  endpoints:
    - name: Ollama
      url: http://localhost:11434/api/tags
      type: ollama
    - name: LM Studio
      url: http://localhost:1234/v1/models
      type: openai-compatible
    - name: vLLM
      url: http://localhost:8000/v1/models
      type: openai-compatible

# ========== 智能体模型配置（示例） ==========
# agents:
#   Agent_Coordinator:  # ⚠️ 请替换为您的智能体名称
#     models:
#       primary: bailian/glm-5
#       fallback: bailian/qwen3.5-plus
#     preferences:
#       cost_optimize: false
#       latency_optimize: true
#
#   Agent_Frontend_Dev:  # ⚠️ 请替换为您的智能体名称
#     models:
#       primary: bailian/qwen3-coder-plus
#       fallback: ollama/codellama
#     preferences:
#       code_quality: true

# ========== 全局路由策略 ==========
routing:
  default_provider: bailian
  fallback_enabled: true
  auto_failover: true
  failover_timeout: 10
  failover_max_retries: 3
  
  cost_optimize: false
  latency_optimize: false
  quality_optimize: false
  local_first: false
  
  task_routing:
    coding: bailian/qwen3-coder-plus
    reasoning: bailian/qwen3-max-2026-01-23
    long_text: bailian/kimi-k2.5
    agent: bailian/glm-5
    daily: bailian/qwen3.5-plus

# ========== 成本统计 ==========
cost_tracking:
  enabled: true
  currency: CNY
  budget_monthly: 100.0
  alert_threshold: 0.8

# ========== 性能监控 ==========
performance_monitoring:
  enabled: true
  track_latency: true
  track_success_rate: true
  track_token_usage: true
