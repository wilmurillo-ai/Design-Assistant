# 用户自定义模型提供商配置
# 创建日期：2026-03-04
# 版本：v3.0 - 完全开放架构
# 
# 说明：
# 1. 用户可以添加任意厂商，不限制预定义
# 2. 支持本地部署的大模型（Ollama、LM Studio、vLLM 等）
# 3. 所有配置通过 YAML 完成，无需修改代码
# 4. ⚠️ 重要：请将此文件添加到 .gitignore，不要提交到 Git！

