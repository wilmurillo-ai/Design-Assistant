<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2ecc71;
            --text-color: #333;
            --text-light: #7f8c8d;
            --bg-color: #fafafa;
            --border-color: #ecf0f1;
            --shadow-light: rgba(0,0,0,0.1);
            --shadow-medium: rgba(0,0,0,0.15);
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.8;
            color: var(--text-color);
            background-color: var(--bg-color);
        }
        
        /* 标题样式 */
        h1 {
            color: #2c3e50;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 15px;
            font-size: 2.2em;
            text-align: center;
            margin-bottom: 30px;
        }
        
        h2 {
            color: #34495e;
            margin-top: 50px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-color);
            padding-left: 15px;
            font-size: 1.5em;
        }
        
        h3 {
            color: #555;
            margin-top: 30px;
            font-size: 1.2em;
        }
        
        /* 日期元数据 */
        blockquote {
            border-left: 4px solid var(--primary-color);
            padding: 15px 20px;
            margin: 25px 0;
            background-color: #f0f8ff;
            border-radius: 0 8px 8px 0;
            color: var(--text-light);
        }
        
        blockquote p {
            margin: 0;
        }
        
        /* 高光时刻 */
        .highlight, blockquote.highlight {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-style: italic;
            border: none;
        }
        
        .highlight strong, blockquote.highlight strong {
            color: #ffd700;
        }
        
        /* 图片样式 */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 12px var(--shadow-light);
            margin: 25px 0;
            display: block;
        }
        
        figure {
            margin: 25px 0;
        }
        
        figcaption {
            color: var(--text-light);
            font-size: 0.9em;
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }
        
        /* 分隔线 */
        hr {
            border: none;
            border-top: 2px solid var(--border-color);
            margin: 50px 0;
        }
        
        /* 段落 */
        p {
            margin: 15px 0;
            text-align: justify;
        }
        
        /* 强调文本 */
        em {
            color: #666;
            font-style: italic;
        }
        
        strong {
            color: #2c3e50;
            font-weight: 600;
        }
        
        /* 列表 */
        ul, ol {
            padding-left: 25px;
            margin: 15px 0;
        }
        
        li {
            margin: 8px 0;
        }
        
        /* 音频和视频标记 */
        .audio-marker {
            display: inline-block;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.95em;
            margin: 15px 0;
            box-shadow: 0 3px 10px var(--shadow-light);
        }
        
        .video-marker {
            display: inline-block;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.95em;
            margin: 15px 0;
            box-shadow: 0 3px 10px var(--shadow-light);
        }
        
        /* 后记样式 */
        h2:last-of-type {
            color: var(--text-light);
            border-left-color: var(--secondary-color);
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            color: var(--text-light);
            font-size: 14px;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 2px solid var(--border-color);
        }
        
        footer p {
            margin: 8px 0;
        }
        
        /* 响应式设计 */
        @media screen and (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            h2 {
                font-size: 1.4em;
            }
            
            img {
                margin: 20px 0;
            }
        }
        
        @media screen and (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            h2 {
                font-size: 1.2em;
                margin-top: 40px;
            }
            
            blockquote {
                padding: 12px 15px;
            }
        }
        
        /* 打印样式 */
        @media print {
            body {
                background-color: white;
                padding: 0;
                max-width: 100%;
            }
            
            h1 {
                page-break-after: avoid;
            }
            
            h2 {
                page-break-after: avoid;
            }
            
            img {
                page-break-inside: avoid;
                box-shadow: none;
            }
            
            blockquote {
                page-break-inside: avoid;
            }
            
            footer {
                page-break-before: always;
            }
        }
        
        /* 动画效果（可选） */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        article {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <article class="travelogue">
        {{ content|safe }}
    </article>
    
    <footer>
        <p>生成时间：{{ generated_at }}</p>
        <p>由 <strong>Travelogue Weaver</strong> 生成</p>
    </footer>
</body>
</html>
