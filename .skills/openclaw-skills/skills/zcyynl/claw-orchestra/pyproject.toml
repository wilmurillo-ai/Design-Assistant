[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "claw-orchestra"
version = "0.1.0"
authors = [
  { name="ClawOrchestra Team", email="claw-orchestra@example.com" },
]
description = "OpenClaw 原生多智能体编排器"
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "pydantic>=2.0",
]

[project.urls]
"Homepage" = "https://github.com/zcyynl/claw-orchestra"
"Bug Tracker" = "https://github.com/zcyynl/claw-orchestra/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["core*", "router*", "learner*"]