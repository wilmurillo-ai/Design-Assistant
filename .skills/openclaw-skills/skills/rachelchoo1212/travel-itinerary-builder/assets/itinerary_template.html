<!DOCTYPE html>
<html lang="{{language}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Noto Sans SC', -apple-system, sans-serif; 
    background: #0f172a; 
    color: #e2e8f0; 
    line-height: 1.7; 
    font-size: 15px;
    position: relative;
  }
  /* 🐾 OpenClaw Watermark - Subtle background pattern */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120"><text x="10" y="60" font-family="Arial" font-size="10" fill="%23334155" opacity="0.3" transform="rotate(-45 60 60)">🐾 OpenClaw</text></svg>');
    background-repeat: repeat;
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }
  .container { 
    max-width: 800px; 
    margin: 0 auto; 
    padding: 20px;
    position: relative;
    z-index: 1;
  }
  .hero { 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
    border-radius: 20px; 
    padding: 40px 30px; 
    text-align: center; 
    margin-bottom: 30px; 
    position: relative; 
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
  }
  .hero::before { 
    content: '🗺️'; 
    position: absolute; 
    font-size: 200px; 
    opacity: 0.12; 
    right: -30px; 
    top: -30px;
    transform: rotate(15deg);
  }
  /* OpenClaw badge in hero */
  .hero::after {
    content: '🐾 OpenClaw';
    position: absolute;
    bottom: 15px;
    right: 20px;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .hero h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .hero .subtitle { font-size: 16px; opacity: 0.9; }
  .hero .dates { 
    display: inline-block; 
    background: rgba(255,255,255,0.2); 
    padding: 8px 20px; 
    border-radius: 30px; 
    margin-top: 15px; 
    font-weight: 500;
    backdrop-filter: blur(10px);
  }
  .section { 
    background: #1e293b; 
    border-radius: 16px; 
    padding: 25px; 
    margin-bottom: 20px; 
    border: 1px solid #334155;
    position: relative;
  }
  .section h2 { 
    font-size: 20px; 
    font-weight: 700; 
    margin-bottom: 15px; 
    padding-bottom: 10px; 
    border-bottom: 2px solid #334155;
  }
  .day-card { 
    background: #1e293b; 
    border-radius: 16px; 
    margin-bottom: 16px; 
    border: 1px solid #334155; 
    overflow: hidden; 
    border-left: 4px solid #60a5fa;
    position: relative;
  }
  .day-header { 
    padding: 15px 25px; 
    font-weight: 700; 
    font-size: 17px; 
    background: linear-gradient(90deg, rgba(96,165,250,0.15), transparent);
  }
  .day-body { padding: 0 25px 20px; }
  .timeline { 
    list-style: none; 
    position: relative; 
    padding-left: 25px; 
    margin-top: 12px;
  }
  .timeline::before { 
    content: ''; 
    position: absolute; 
    left: 6px; 
    top: 5px; 
    bottom: 5px; 
    width: 2px; 
    background: #475569;
  }
  .timeline li { 
    position: relative; 
    margin-bottom: 12px; 
    padding-left: 10px;
  }
  .timeline li::before { 
    content: ''; 
    position: absolute; 
    left: -22px; 
    top: 8px; 
    width: 10px; 
    height: 10px; 
    border-radius: 50%; 
    background: #60a5fa; 
    border: 2px solid #1e293b;
  }
  .weather { 
    background: rgba(251,191,36,0.1); 
    border-left: 3px solid #fbbf24; 
    padding: 12px 16px; 
    border-radius: 0 8px 8px 0; 
    margin: 12px 0; 
    font-size: 14px;
  }
  .booking { 
    background: #0f172a; 
    border-radius: 10px; 
    padding: 14px; 
    border: 1px solid #334155; 
    margin: 8px 0;
  }
  /* Footer with OpenClaw branding */
  .footer {
    text-align: center;
    padding: 40px 20px 20px;
    color: #64748b;
    font-size: 13px;
    margin-top: 40px;
    border-top: 1px solid #334155;
  }
  .footer .brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    color: #93c5fd;
    margin-bottom: 8px;
  }
  .footer .paw {
    font-size: 16px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  .footer .tagline {
    font-size: 11px;
    color: #475569;
    margin-top: 4px;
  }
  @media print {
    body { background: white; color: #1e293b; }
    body::before { display: none; } /* Hide watermark in print */
    .section, .day-card { border-color: #e2e8f0; }
    .hero { background: #667eea !important; -webkit-print-color-adjust: exact; }
    .hero::after { color: rgba(255,255,255,0.7); }
    .footer { border-top-color: #e2e8f0; }
  }
</style>
</head>
<body>
<div class="container">

<div class="hero">
  <h1>{{title}}</h1>
  <div class="subtitle">{{subtitle}}</div>
  <div class="dates">{{dates}}</div>
</div>

<!-- CONTENT GOES HERE -->
{{content}}

<div class="footer">
  <div class="brand">
    <span class="paw">🐾</span>
    <span>Generated by OpenClaw Travel Itinerary Builder</span>
  </div>
  <div style="margin-top:8px;">{{generated_date}}</div>
  <div class="tagline">Intelligent travel planning powered by AI</div>
</div>

</div>
</body>
</html>
