interface:
  display_name: "peter-code-review"
  short_description: "提交前质量闸门；命令：pre-commit-review、review-workspace、review-head"
  default_prompt: "Use $peter-code-review to run pre-commit-review on review-workspace (or review-head when empty). When prisma/api/CI/package changes are detected, run workflow:check + build + gate:db. If gate:db reports GATE_DB_UNREACHABLE/P1001, classify as 可提交（高风险） with mandatory PR-stage ci-gate follow-up."
