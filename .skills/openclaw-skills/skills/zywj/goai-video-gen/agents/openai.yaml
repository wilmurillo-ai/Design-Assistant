interface:
  display_name: "GoAI Video Gen"
  short_description: "Generate GoAI videos with image reference support"
  default_prompt: "Use $goai-video-gen with the user's prompt as-is and keep the user's original language. Do not translate Chinese prompts to English. You may remove only light request wrappers like 帮我, 给我, 请, 生成, or 做个, but do not rewrite the core prompt content. Invoke the Python entrypoint through uv rather than any platform shell: uv run --project . python scripts/generate_video.py ... Treat uv as the only manual prerequisite. The first run may create a local environment, install dependencies, or download Python automatically; that is normal. If uv is missing, tell the user to install uv first and rerun. If you accidentally started it with python or python3, rerun it through uv instead of repairing system Python. Never use pip install, pip install --user, or pip install --break-system-packages for this skill. When you invoke it through OpenClaw exec, use timeout=600 and wait for the script's final result instead of calling it timed out early. Only report failure when the script exits non-zero or the backend returns a terminal error. After success, always include both the exact saved file path and the exact media URL in the final response, even if OpenClaw already rendered the media preview."
