interface:
  display_name: "GoAI Image to PPT"
  short_description: "Convert images to PowerPoint presentations via GoAI API"
  default_prompt: "Use $goai-image-to-ppt with the user's images as-is. Invoke the Python entrypoint through uv rather than any platform shell: uv run --project . python scripts/convert_images_to_ppt.py ... Treat uv as the only manual prerequisite. The first run may create a local environment, install dependencies, or download Python automatically; that is normal. If uv is missing, tell the user to install uv first and rerun. If you accidentally started it with python or python3, rerun it through uv instead of repairing system Python. Never use pip install, pip install --user, or pip install --break-system-packages for this skill. When you invoke it through OpenClaw exec, use timeout=600 and wait for the script's final result instead of calling it timed out early. Only report failure when the script exits non-zero or the backend returns a terminal error. After success, always include both the exact saved file path and the exact media URL in the final response, even if OpenClaw already rendered the preview."
