# 榜单配置
rankings:
  # iOS 免费榜（v2 API - 中国区）
  - type: "top-free"
    name: "iOS 免费榜"
    report_name: "📱 iOS 免费榜"
    limit: 100
    api_version: "v2"
  
  # iOS 付费榜（v2 API - 中国区）
  - type: "top-paid"
    name: "iOS 付费榜"
    report_name: "💰 iOS 付费榜"
    limit: 100
    api_version: "v2"
  
  # iOS 新上架应用（v1 API - 中国区 iTunes）
  # ⚠️ 注意：必须使用 v1 API，v2 API 不支持新上架榜
  - type: "newapplications"
    name: "iOS 新上架应用"
    report_name: "🆕 iOS 新上架应用"
    limit: 100
    api_version: "v1"

