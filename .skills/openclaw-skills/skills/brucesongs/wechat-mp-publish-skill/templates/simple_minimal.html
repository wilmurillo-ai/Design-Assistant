<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #ffffff;">
    
    <!-- 主容器 -->
    <div style="max-width: 677px; margin: 0 auto; background: #ffffff;">
        
        <!-- 正文容器 -->
        <div style="padding: 10px 15px;">
            
            <!-- 内容区域 -->
            <div style="font-size: 15px; line-height: 1.75; color: #333333; text-align: justify; letter-spacing: 0.5px; word-spacing: 0.5px;">
                {{content}}
            </div>
            
        </div>
        
        <!-- 版权信息 -->
        <div style="padding: 15px; margin-top: 20px; background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%); border-top: 2px solid #10b981; border-bottom: 2px solid #10b981; text-align: center;">
            <div style="font-size: 11px; color: #059669; line-height: 1.6;">
                <div style="margin-bottom: 4px; font-weight: 600;">© 2026 711 实验室 版权所有</div>
                <div style="margin-bottom: 4px;">本文内容由 AI 生成，仅供测试和研究使用</div>
                <div style="margin-bottom: 4px;">请勿模仿或用于商业用途</div>
                <div style="font-weight: 600;">AI 技术测试内容</div>
            </div>
        </div>
        
    </div>
    
</body>
</html>
