name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest typeguard
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests (excluding HTTP integration tests)
        run: |
          pytest governed_agents/ \
            --ignore=governed_agents/test_http_spawn.py \
            --ignore=governed_agents/tests \
            -v --tb=short

      - name: Run HTTP smoke test (import only, no server needed)
        run: |
          pytest governed_agents/test_http_spawn.py::test_import -v --tb=short

  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # required for SARIF upload

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy — vulnerabilities + secrets
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          exit-code: 0  # don't fail build, just report

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Run Trivy — summary (table, PR comment friendly)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          format: table
          exit-code: 0
