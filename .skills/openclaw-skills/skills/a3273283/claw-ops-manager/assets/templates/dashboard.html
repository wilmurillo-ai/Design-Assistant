<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Audit Center</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #00ff9f;
            font-size: 24px;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #00ff9f;
            box-shadow: 0 4px 12px rgba(0, 255, 159, 0.1);
        }

        .stat-label {
            color: #8b949e;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #00ff9f;
            font-size: 32px;
            font-weight: 700;
        }

        .stat-value.danger {
            color: #ff6b6b;
        }

        .section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #30363d;
        }

        .section-title {
            color: #c9d1d9;
            font-size: 20px;
            font-weight: 600;
        }

        .btn {
            background: #00ff9f;
            color: #0d1117;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #00cc7f;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #30363d;
            color: #c9d1d9;
        }

        .btn-secondary:hover {
            background: #3d444d;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #e55555;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }

        th {
            color: #8b949e;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        td {
            font-size: 14px;
        }

        tr:hover {
            background: #21262d;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #238636;
            color: white;
        }

        .badge-danger {
            background: #da3633;
            color: white;
        }

        .badge-warning {
            background: #d29922;
            color: white;
        }

        .alert-item {
            background: #21262d;
            border-left: 4px solid #00ff9f;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .alert-item.high {
            border-left-color: #ff6b6b;
        }

        .alert-item.medium {
            border-left-color: #d29922;
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .alert-type {
            font-weight: 600;
            color: #00ff9f;
        }

        .alert-message {
            color: #8b949e;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        #chart {
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <h1>⚡ Claw Audit Center</h1>
                <div>
                    <button class="btn btn-secondary" onclick="refreshAll()">🔄 Refresh</button>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Operations</div>
                <div class="stat-value" id="total-ops">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Failed Operations</div>
                <div class="stat-value danger" id="failed-ops">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Unresolved Alerts</div>
                <div class="stat-value danger" id="unresolved-alerts">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Activity (24h)</div>
                <div class="stat-value" id="recent-activity">-</div>
            </div>
        </div>

        <!-- Activity Chart -->
        <div class="section">
            <div class="section-header">
                <div class="section-title">📊 Activity Chart</div>
            </div>
            <div id="chart"></div>
        </div>

        <!-- Recent Operations -->
        <div class="section">
            <div class="section-header">
                <div class="section-title">🔧 Recent Operations</div>
                <button class="btn btn-secondary" onclick="loadOperations()">Refresh</button>
            </div>
            <div id="operations-table"></div>
        </div>

        <!-- Alerts -->
        <div class="section">
            <div class="section-header">
                <div class="section-title">🚨 Active Alerts</div>
                <button class="btn btn-secondary" onclick="loadAlerts()">Refresh</button>
            </div>
            <div id="alerts-list"></div>
        </div>
    </div>

    <script>
        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();

                document.getElementById('total-ops').textContent = stats.total_operations.toLocaleString();
                document.getElementById('failed-ops').textContent = stats.failed_operations.toLocaleString();
                document.getElementById('unresolved-alerts').textContent = stats.unresolved_alerts.toLocaleString();
                document.getElementById('recent-activity').textContent = stats.recent_24h.toLocaleString();
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load operations
        async function loadOperations() {
            try {
                const response = await fetch('/api/operations?limit=20');
                const operations = await response.json();

                const container = document.getElementById('operations-table');

                if (operations.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No operations recorded yet</p></div>';
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Tool</th>
                                <th>Action</th>
                                <th>Status</th>
                                <th>Duration</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                operations.forEach(op => {
                    const time = new Date(op.timestamp).toLocaleString();
                    const status = op.success ?
                        '<span class="badge badge-success">Success</span>' :
                        '<span class="badge badge-danger">Failed</span>';

                    html += `
                        <tr>
                            <td>${time}</td>
                            <td><code>${op.tool_name}</code></td>
                            <td>${op.action}</td>
                            <td>${status}</td>
                            <td>${op.duration_ms}ms</td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading operations:', error);
            }
        }

        // Load alerts
        async function loadAlerts() {
            try {
                const response = await fetch('/api/alerts?resolved=false');
                const alerts = await response.json();

                const container = document.getElementById('alerts-list');

                if (alerts.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✅</div><p>No active alerts</p></div>';
                    return;
                }

                let html = '';
                alerts.forEach(alert => {
                    const severityClass = alert.severity === 'high' ? 'high' : 'medium';
                    const time = new Date(alert.timestamp).toLocaleString();

                    html += `
                        <div class="alert-item ${severityClass}">
                            <div class="alert-header">
                                <div class="alert-type">${alert.alert_type}</div>
                                <button class="btn btn-secondary" onclick="resolveAlert(${alert.id})">Resolve</button>
                            </div>
                            <div class="alert-message">${alert.message}</div>
                            <div style="margin-top: 8px; font-size: 12px; color: #8b949e;">${time}</div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading alerts:', error);
            }
        }

        // Load chart
        async function loadChart() {
            try {
                const response = await fetch('/api/charts/activity');
                const chartData = await response.json();

                Plotly.newPlot('chart', chartData.data, chartData.layout, {
                    responsive: true,
                    displayModeBar: false
                });
            } catch (error) {
                console.error('Error loading chart:', error);
            }
        }

        // Resolve alert
        async function resolveAlert(alertId) {
            try {
                await fetch(`/api/alerts/${alertId}/resolve`, { method: 'POST' });
                loadAlerts();
                loadStats();
            } catch (error) {
                console.error('Error resolving alert:', error);
            }
        }

        // Refresh all
        function refreshAll() {
            loadStats();
            loadOperations();
            loadAlerts();
            loadChart();
        }

        // Initial load
        refreshAll();

        // Auto-refresh every 30 seconds
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
