<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能出题系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }
    
    .container { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
    
    .hero { text-align: center; margin-bottom: 40px; }
    .hero h1 { font-size: 2.2em; color: #1a73e8; margin-bottom: 12px; }
    .hero p { color: #666; font-size: 1.1em; }
    
    .card { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 24px; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
    input[type="text"], textarea { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1em; transition: border-color 0.2s; }
    input[type="text"]:focus, textarea:focus { outline: none; border-color: #1a73e8; }
    
    .file-upload { 
      border: 2px dashed #c0d0e8; border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .file-upload:hover { border-color: #1a73e8; background: #f8fbff; }
    .file-upload.dragover { border-color: #1a73e8; background: #e8f0fe; }
    .file-upload input { display: none; }
    .file-upload-icon { font-size: 3em; margin-bottom: 12px; }
    .file-upload-text { color: #666; }
    .file-upload-text strong { color: #1a73e8; }
    .file-name { margin-top: 10px; font-weight: 600; color: #1a73e8; }
    
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1557b0; transform: translateY(-1px); }
    .btn-primary:disabled { background: #a0c0f0; cursor: not-allowed; transform: none; }
    
    .tips { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 10px; padding: 16px; margin-top: 16px; font-size: 0.9em; color: #7a6a00; }
    .tips strong { display: block; margin-bottom: 6px; }
    
    .recent { margin-top: 32px; }
    .recent h3 { font-size: 1.1em; color: #333; margin-bottom: 16px; }
    .quiz-item { display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .quiz-item-info h4 { color: #333; font-size: 1em; }
    .quiz-item-info p { color: #999; font-size: 0.85em; margin-top: 4px; }
    .quiz-item-links a { margin-left: 12px; font-size: 0.9em; color: #1a73e8; text-decoration: none; }
    .quiz-item-links a:hover { text-decoration: underline; }
    
    .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .result-card { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; border-radius: 16px; padding: 32px; text-align: center; display: none; }
    .result-card.show { display: block; }
    .result-card h3 { font-size: 1.2em; margin-bottom: 20px; opacity: 0.9; }
    .result-card .url-box { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 16px; margin: 12px 0; word-break: break-all; font-size: 0.95em; }
    .result-card a { color: #fff; text-decoration: underline; }
    .result-card .btn { background: #fff; color: #1a73e8; }
    .result-qr-row { display: flex; gap: 24px; justify-content: center; margin: 16px 0; }
    .result-qr-item { text-align: center; }
    .result-qr-label { font-weight: 700; margin-top: 8px; font-size: 0.9em; }
    .result-qr-desc { color: rgba(255,255,255,0.75); font-size: 0.8em; margin-top: 2px; }
  </style>
<script src="/qrcode.min.js"></script>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>📝 智能出题系统</h1>
    <p>上传文档 → AI生成题目 → 发布答题链接 → 查看成绩统计</p>
  </div>

  <div class="card" id="createCard">
    <h2 style="margin-bottom:20px; color:#333;">创建新答题</h2>
    
    <div class="form-group">
      <label>答题标题</label>
      <input type="text" id="quizTitle" placeholder="例如：第三章数学测验" />
    </div>
    
    <div class="form-group">
      <label>说明（可选）</label>
      <input type="text" id="quizDesc" placeholder="例如：考查学生对知识点的掌握情况" />
    </div>
    
    <div class="form-group">
      <label>上传教材文档</label>
      <div class="file-upload" id="fileUpload">
        <input type="file" id="fileInput" accept=".docx,.md,.pptx" />
        <div class="file-upload-icon">📄</div>
        <div class="file-upload-text">点击或拖拽上传文件<br><strong>支持 .docx .md .pptx</strong></div>
        <div class="file-name" id="fileName" style="display:none;"></div>
      </div>
    </div>
    
    <button class="btn btn-primary" id="createBtn" disabled onclick="createQuiz()">
      <span class="spinner" style="display:none; border-color:rgba(0,0,0,0.3); border-top-color:#fff;" id="spinner"></span>
      <span id="btnText">🚀 开始生成题目</span>
    </button>
    
    <div class="tips">
      <strong>💡 使用提示</strong>
      文档内容越详细、知识点越清晰，生成的题目质量越高。建议上传包含明确知识点的教材、讲义或PPT文件。
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <h3>🎉 答题创建成功！</h3>
    <div style="font-size:0.95em; opacity:0.9; margin-bottom:16px;">题目数量：<span id="qCount">10</span> 道</div>
    <div class="result-qr-row">
      <div class="result-qr-item">
        <div id="res-qr-quiz"></div>
        <div class="result-qr-label">📝 答题二维码</div>
        <div class="result-qr-desc">发给参与者扫码答题</div>
      </div>
      <div class="result-qr-item">
        <div id="res-qr-admin"></div>
        <div class="result-qr-label">📊 统计二维码</div>
        <div class="result-qr-desc">老师查看成绩统计</div>
      </div>
    </div>
    <div style="margin-top:16px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
      <a id="quizUrl" class="btn" style="background:rgba(255,255,255,0.2); color:#fff; text-decoration:none; font-size:0.85em;" href="#" target="_blank">📝 答题链接</a>
      <a id="adminUrl" class="btn" style="background:rgba(255,255,255,0.2); color:#fff; text-decoration:none; font-size:0.85em;" href="#" target="_blank">📊 统计后台</a>
    </div>
    <div style="margin-top:16px;">
      <button class="btn" onclick="resetForm()">+ 再创建一个</button>
    </div>
  </div>

  <div class="recent" id="recentSection" style="display:none;">
    <h3>📋 已创建的答题</h3>
    <div id="quizList"></div>
  </div>
</div>

<script>
const fileUpload = document.getElementById('fileUpload');
const fileInput = document.getElementById('fileInput');
const fileNameEl = document.getElementById('fileName');
const createBtn = document.getElementById('createBtn');
const resultCard = document.getElementById('resultCard');
const createCard = document.getElementById('createCard');

fileUpload.addEventListener('click', () => fileInput.click());
fileUpload.addEventListener('dragover', e => { e.preventDefault(); fileUpload.classList.add('dragover'); });
fileUpload.addEventListener('dragleave', () => fileUpload.classList.remove('dragover'));
fileUpload.addEventListener('drop', e => {
  e.preventDefault();
  fileUpload.classList.remove('dragover');
  if (e.dataTransfer.files.length) fileInput.files = e.dataTransfer.files;
  handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  const ext = '.' + file.name.split('.').pop().toLowerCase();
  if (!['.docx', '.md', '.pptx'].includes(ext)) {
    alert('不支持的文件格式，仅支持 .docx .md .pptx');
    return;
  }
  fileNameEl.textContent = '📎 ' + file.name;
  fileNameEl.style.display = 'block';
  createBtn.disabled = false;
}

async function createQuiz() {
  const file = fileInput.files[0];
  if (!file) return;
  
  const btn = document.getElementById('btnText');
  const spinner = document.getElementById('spinner');
  btn.textContent = 'AI生成中，请稍候...';
  spinner.style.display = 'inline-block';
  createBtn.disabled = true;

  const formData = new FormData();
  formData.append('file', file);
  formData.append('title', document.getElementById('quizTitle').value || '未命名答题');
  formData.append('description', document.getElementById('quizDesc').value);

  try {
    const resp = await fetch('/api/quiz/create', { method: 'POST', body: formData });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || '创建失败');

    document.getElementById('qCount').textContent = data.questionCount;
    const base = window.location.origin;
    const quizFullUrl = base + '/quiz.html?id=' + data.quizId;
    const adminFullUrl = base + '/admin.html?id=' + data.quizId;
    document.getElementById('quizUrl').href = quizFullUrl;
    document.getElementById('quizUrl').textContent = quizFullUrl;
    document.getElementById('adminUrl').href = adminFullUrl;
    document.getElementById('adminUrl').textContent = adminFullUrl;
    
    // Generate QR codes
    const QR = window.QRCode;
    function drawResQR(id, url) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = '';
      new QRCode(el, {
        text: url,
        width: 120,
        height: 120,
        colorDark: '#1a73e8',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    }
    drawResQR('res-qr-quiz', quizFullUrl);
    drawResQR('res-qr-admin', adminFullUrl);
    
    resultCard.classList.add('show');
    createCard.style.display = 'none';
  } catch (err) {
    alert('创建失败: ' + err.message);
    btn.textContent = '🚀 开始生成题目';
    spinner.style.display = 'none';
    createBtn.disabled = false;
  }
}

function resetForm() {
  resultCard.classList.remove('show');
  createCard.style.display = 'block';
  fileInput.value = '';
  fileNameEl.style.display = 'none';
  document.getElementById('quizTitle').value = '';
  document.getElementById('quizDesc').value = '';
  createBtn.disabled = true;
  document.getElementById('btnText').textContent = '🚀 开始生成题目';
  document.getElementById('spinner').style.display = 'none';
  loadRecentQuizzes();
}

async function loadRecentQuizzes() {
  try {
    const resp = await fetch('/api/quizzes');
    const quizzes = await resp.json();
    if (quizzes.length === 0) return;
    document.getElementById('recentSection').style.display = 'block';
    document.getElementById('quizList').innerHTML = quizzes.slice(0, 5).map(q => `
      <div class="quiz-item">
        <div class="quiz-item-info">
          <h4>${q.title}</h4>
          <p>${new Date(q.created_at).toLocaleString('zh-CN')} · ${q.total_participants || 0}人已答</p>
        </div>
        <div class="quiz-item-links">
          <a href="/quiz.html?id=${q.id}" target="_blank">答题</a>
          <a href="/admin.html?id=${q.id}" target="_blank">统计</a>
        </div>
      </div>
    `).join('');
  } catch(e) {}
}

loadRecentQuizzes();
</script>
</body>
</html>
