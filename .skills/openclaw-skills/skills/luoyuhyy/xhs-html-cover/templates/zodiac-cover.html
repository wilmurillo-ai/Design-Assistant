<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>{{title}}</title>
<style>
body { 
  width: 1080px; 
  min-height: 1754px; 
  background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 50%, #FFB347 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 80px 60px;
  font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
  color: #fff;
  box-sizing: border-box;
}
.badge { 
  background: rgba(255,255,255,0.25); 
  backdrop-filter: blur(10px);
  color: #fff; 
  padding: 12px 36px; 
  border-radius: 50px;
  font-size: 24px;
  margin-bottom: 40px;
  border: 2px solid rgba(255,255,255,0.4);
  text-align: center;
}
.zodiac { font-size: 320px; line-height: 1; margin: 30px 0; text-shadow: 0 8px 40px rgba(0,0,0,0.3); }
.title { font-size: 72px; font-weight: 900; text-align: center; margin-bottom: 30px; text-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.subtitle { font-size: 36px; opacity: 0.9; margin-bottom: 50px; text-align: center; }
.tips {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  border-radius: 30px;
  padding: 50px;
  width: 100%;
  max-width: 900px;
  border: 2px solid rgba(255,255,255,0.3);
}
.tip { 
  font-size: 32px; 
  margin: 20px 0; 
  padding-left: 50px;
  position: relative;
  line-height: 1.5;
}
.tip:before {
  content: "✦";
  position: absolute;
  left: 0;
  font-size: 32px;
}
.footer { 
  margin-top: 50px; 
  font-size: 28px; 
  opacity: 0.85;
}
</style>
</head>
<body>
  <div class="badge">{{badge}}</div>
  <div class="zodiac">{{emoji}}</div>
  <div class="title">{{title}}</div>
  <div class="subtitle">{{subtitle}}</div>
  <div class="tips">
    {{content}}
  </div>
  <div class="footer">{{footer}}</div>
</body>
</html>
