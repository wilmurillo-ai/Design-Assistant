<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Scheduler / 个人日程</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #007AFF;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #000000;
            --text-secondary: #8E8E93;
            --border: #E5E5EA;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        
        .container {
            max-width: 430px;
            margin: 0 auto;
            background: var(--card);
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: var(--card);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .header-title {
            font-size: 17px;
            font-weight: 600;
        }
        
        .lang-switch {
            background: var(--bg);
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            color: var(--primary);
        }
        
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 15px;
            cursor: pointer;
            padding: 4px 8px;
        }
        
        .current-date {
            font-size: 16px;
            font-weight: 500;
        }
        
        /* View Tabs */
        .view-tabs {
            display: flex;
            background: var(--card);
            border-bottom: 1px solid var(--border);
        }
        
        .view-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .view-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        
        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
        }
        
        .weekday-header {
            background: var(--card);
            padding: 10px 0;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .calendar-day {
            background: var(--card);
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
        }
        
        .calendar-day:hover {
            background: var(--bg);
        }
        
        .calendar-day.today {
            background: var(--primary);
            color: white;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            margin: auto;
        }
        
        .calendar-day.selected {
            background: var(--bg);
        }
        
        .calendar-day.other-month {
            color: var(--text-secondary);
        }
        
        .day-number {
            font-size: 16px;
            font-weight: 400;
        }
        
        .day-events {
            display: flex;
            gap: 2px;
            margin-top: 2px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 30px;
        }
        
        .day-event-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--primary);
        }
        
        /* Events List */
        .events-section {
            padding: 16px;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        
        .event-item {
            display: flex;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .event-item:hover {
            background: var(--bg);
            margin: 0 -16px;
            padding-left: 16px;
            padding-right: 16px;
        }
        
        .event-color-bar {
            width: 4px;
            height: 40px;
            border-radius: 2px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .event-time {
            width: 60px;
            font-size: 14px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        
        .event-content {
            flex: 1;
        }
        
        .event-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .event-location {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .empty-text {
            font-size: 15px;
        }
        
        /* FAB */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .fab:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(0,122,255,0.4);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--card);
            width: 100%;
            max-width: 430px;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .btn-primary:hover {
            background: #0056b3;
        }
        
        /* Responsive */
        @media (min-width: 768px) {
            .container {
                max-width: 600px;
            }
            .modal-content {
                max-width: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-top">
                <div class="header-title" data-i18n="title">个人日程</div>
                <button class="lang-switch" onclick="toggleLanguage()">
                    <span id="langText">EN</span>
                </button>
            </div>
            <div class="header-nav">
                <button class="nav-btn" onclick="previousMonth()">&lt;</button>
                <span class="current-date" id="currentDate">2026年3月</span>
                <button class="nav-btn" onclick="nextMonth()">&gt;</button>
            </div>
        </div>
        
        <!-- View Tabs -->
        <div class="view-tabs">
            <div class="view-tab active" onclick="switchView('month')" data-i18n="month">月</div>
            <div class="view-tab" onclick="switchView('week')" data-i18n="week">周</div>
            <div class="view-tab" onclick="switchView('day')" data-i18n="day">日</div>
            <div class="view-tab" onclick="switchView('list')" data-i18n="list">列表</div>
        </div>
        
        <!-- Calendar Grid -->
        <div class="calendar-grid" id="calendarGrid">
            <!-- Weekday headers -->
            <div class="weekday-header" data-i18n="sun">日</div>
            <div class="weekday-header" data-i18n="mon">一</div>
            <div class="weekday-header" data-i18n="tue">二</div>
            <div class="weekday-header" data-i18n="wed">三</div>
            <div class="weekday-header" data-i18n="thu">四</div>
            <div class="weekday-header" data-i18n="fri">五</div>
            <div class="weekday-header" data-i18n="sat">六</div>
        </div>
        
        <!-- Events Section -->
        <div class="events-section">
            <div class="section-title" data-i18n="todayEvents">今日日程</div>
            <div id="eventsList">
                <div class="empty-state">
                    <div class="empty-icon">📅</div>
                    <div class="empty-text" data-i18n="noEvents">暂无日程</div>
                </div>
            </div>
        </div>
        
        <!-- FAB -->
        <button class="fab" onclick="openModal()">+</button>
        
        <!-- Add Event Modal -->
        <div class="modal" id="eventModal">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-title" data-i18n="addEvent">添加日程</div>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                
                <form onsubmit="saveEvent(event)">
                    <div class="form-group">
                        <label class="form-label" data-i18n="eventTitle">标题</label>
                        <input type="text" class="form-input" id="eventTitle" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" data-i18n="startTime">开始时间</label>
                            <input type="datetime-local" class="form-input" id="startTime" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" data-i18n="endTime">结束时间</label>
                            <input type="datetime-local" class="form-input" id="endTime" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" data-i18n="location">地点</label>
                        <input type="text" class="form-input" id="eventLocation">
                    </div>
                    
                    <button type="submit" class="btn-primary" data-i18n="save">保存</button>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // 多语言支持
        const i18n = {
            zh: {
                title: '个人日程',
                month: '月',
                week: '周',
                day: '日',
                list: '列表',
                sun: '日',
                mon: '一',
                tue: '二',
                wed: '三',
                thu: '四',
                fri: '五',
                sat: '六',
                todayEvents: '今日日程',
                noEvents: '暂无日程',
                addEvent: '添加日程',
                eventTitle: '标题',
                startTime: '开始时间',
                endTime: '结束时间',
                location: '地点',
                save: '保存'
            },
            en: {
                title: 'Personal Scheduler',
                month: 'Month',
                week: 'Week',
                day: 'Day',
                list: 'List',
                sun: 'Sun',
                mon: 'Mon',
                tue: 'Tue',
                wed: 'Wed',
                thu: 'Thu',
                fri: 'Fri',
                sat: 'Sat',
                todayEvents: "Today's Events",
                noEvents: 'No events',
                addEvent: 'Add Event',
                eventTitle: 'Title',
                startTime: 'Start Time',
                endTime: 'End Time',
                location: 'Location',
                save: 'Save'
            }
        };
        
        let currentLang = 'zh';
        
        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('langText').textContent = currentLang === 'zh' ? 'EN' : '中文';
            updateLanguage();
        }
        
        function updateLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) {
                    el.textContent = i18n[currentLang][key];
                }
            });
        }
        
        // 日历功能
        let currentDate = new Date();
        let currentView = 'month';
        
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('currentDate').textContent = 
                currentLang === 'zh' 
                    ? `${year}年${month + 1}月`
                    : `${year} ${new Date(year, month).toLocaleString('en', {month: 'long'})}`;
            
            const grid = document.getElementById('calendarGrid');
            // 保留星期标题
            const headers = grid.querySelectorAll('.weekday-header');
            grid.innerHTML = '';
            headers.forEach(h => grid.appendChild(h));
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startPadding = firstDay.getDay();
            
            // 上月日期
            const prevMonth = new Date(year, month, 0);
            for (let i = startPadding - 1; i >= 0; i--) {
                const day = prevMonth.getDate() - i;
                const div = createDayElement(day, true);
                grid.appendChild(div);
            }
            
            // 当月日期
            const today = new Date();
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const isToday = year === today.getFullYear() && month === today.getMonth() && day === today.getDate();
                const div = createDayElement(day, false, isToday);
                div.onclick = () => selectDate(day);
                grid.appendChild(div);
            }
            
            // 下月日期
            const remaining = (7 - ((startPadding + lastDay.getDate()) % 7)) % 7;
            for (let day = 1; day <= remaining; day++) {
                const div = createDayElement(day, true);
                grid.appendChild(div);
            }
        }
        
        function createDayElement(day, isOtherMonth, isToday = false) {
            const div = document.createElement('div');
            div.className = 'calendar-day';
            if (isOtherMonth) div.classList.add('other-month');
            if (isToday) div.classList.add('today');
            
            const num = document.createElement('div');
            num.className = 'day-number';
            num.textContent = day;
            div.appendChild(num);
            
            // 示例：添加事件点
            if (!isOtherMonth && Math.random() > 0.7) {
                const dots = document.createElement('div');
                dots.className = 'day-events';
                const dot = document.createElement('div');
                dot.className = 'day-event-dot';
                dots.appendChild(dot);
                div.appendChild(dots);
            }
            
            return div;
        }
        
        function selectDate(day) {
            document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        }
        
        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }
        
        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }
        
        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        // Modal 功能
        function openModal() {
            document.getElementById('eventModal').classList.add('active');
            // 设置默认时间
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('startTime').value = now.toISOString().slice(0, 16);
            now.setHours(now.getHours() + 1);
            document.getElementById('endTime').value = now.toISOString().slice(0, 16);
        }
        
        function closeModal() {
            document.getElementById('eventModal').classList.remove('active');
        }
        
        function saveEvent(e) {
            e.preventDefault();
            const title = document.getElementById('eventTitle').value;
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            const location = document.getElementById('eventLocation').value;
            
            // 这里应该调用 API 保存
            console.log('Saving event:', { title, start, end, location });
            closeModal();
            
            // 刷新事件列表
            loadEvents();
        }
        
        // 加载事件
        function loadEvents() {
            fetch('/api/events')
                .then(r => r.json())
                .then(events => {
                    const list = document.getElementById('eventsList');
                    if (events.length === 0) {
                        list.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-icon">📅</div>
                                <div class="empty-text" data-i18n="noEvents">${i18n[currentLang].noEvents}</div>
                            </div>
                        `;
                    } else {
                        list.innerHTML = events.map(e => `
                            <div class="event-item">
                                <div class="event-color-bar" style="background: #007AFF"></div>
                                <div class="event-time">${new Date(e[2]).toLocaleTimeString('zh', {hour: '2-digit', minute: '2-digit'})}</div>
                                <div class="event-content">
                                    <div class="event-title">${e[1]}</div>
                                    ${e[4] ? `<div class="event-location">📍 ${e[4]}</div>` : ''}
                                </div>
                            </div>
                        `).join('');
                    }
                })
                .catch(err => console.error('Failed to load events:', err));
        }
        
        // 初始化
        renderCalendar();
        loadEvents();
    </script>
</body>
</html>
