[project]
name = "vision-tool"
version = "1.0.0"
description = "Image recognition tool using Ollama + qwen3.5:4b"
readme = "SKILL.md"
authors = [
    {name = "HuRuilizhen", email = "huruilizhen@gmail.com"},
]
maintainers = [
    {name = "HuRuilizhen", email = "huruilizhen@gmail.com"},
]
repository = "https://github.com/HuRuilizhen/vision-tool"
requires-python = ">=3.8,<4.0"
dependencies = [
    "requests>=2.31.0",
]

[project.urls]
Homepage = "https://github.com/HuRuilizhen/vision-tool"
Repository = "https://github.com/HuRuilizhen/vision-tool"
"Bug Tracker" = "https://github.com/HuRuilizhen/vision-tool/issues"

[project.license]
text = "MIT"

[project.classifiers]
"Development Status :: 4 - Beta"
"Intended Audience :: Developers"
"License :: OSI Approved :: MIT License"
"Operating System :: OS Independent"
"Programming Language :: Python :: 3"
"Programming Language :: Python :: 3.8"
"Programming Language :: Python :: 3.9"
"Programming Language :: Python :: 3.10"
"Programming Language :: Python :: 3.11"
"Programming Language :: Python :: 3.12"
"Topic :: Scientific/Engineering :: Artificial Intelligence"
"Topic :: Scientific/Engineering :: Image Recognition"
"Topic :: Software Development :: Libraries :: Python Modules"

[project.scripts]
vision-tool = "main:main"

[project.optional-dependencies]
dev = [
    "ruff>=0.4.0",
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
]

[tool.uv]
dev-dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"