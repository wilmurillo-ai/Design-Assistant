<!DOCTYPE html>
<html lang="en" data-report-mode="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fixture Report</title>
  <style>
    :root {
      --bg: #F8F4EE;
      --primary: #1C1C1E;
      --surface: #fff;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
    }
    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(28, 28, 30, 0.08), transparent 30%),
        linear-gradient(180deg, #F8F4EE 0%, #F2EDE4 100%);
    }

    /* TOC */
    .toc-toggle {
      position: fixed; top: .75rem; left: .75rem; z-index: 200;
      background: var(--primary); color: #fff; border: none; border-radius: 6px;
      padding: .45rem .7rem; cursor: pointer; font-size: 1rem; line-height: 1;
    }
    .toc-toggle.locked { box-shadow: 0 0 0 2px #fff, 0 2px 8px rgba(0,0,0,.2); }
    .toc-sidebar {
      position: fixed; top: 0; left: 0; width: 240px; height: 100vh;
      overflow-y: auto; padding: 3rem 1rem 1.5rem; background: var(--surface);
      border-right: 1px solid var(--border); z-index: 100;
      transform: translateX(-100%); transition: transform .28s ease;
    }
    .toc-sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.18); }
    .toc-sidebar h4 { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin: 0 0 .75rem; }
    .toc-sidebar a { display: block; color: var(--text-muted); text-decoration: none; padding: .28rem .5rem; border-radius: 4px; margin-bottom: 1px; }
    .toc-sidebar a:hover, .toc-sidebar a.active { color: var(--primary); background: rgba(28,28,30,.06); }

    /* Summary card */
    .title-row { display: flex; align-items: flex-end; gap: 1rem; }
    .title-row h1 { flex: 1; font-size: 2rem; }
    .card-mode-btn {
      flex-shrink: 0; margin-bottom: .6rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      padding: .28rem .65rem; font-size: .76rem; cursor: pointer;
    }
    .sc-overlay { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,.4); align-items: center; justify-content: center; }
    body.card-mode .sc-overlay { display: flex; }
    .sc-card { position: relative; display: flex; width: min(600px, 90vw); background: #fff; border-radius: 8px; padding: 2rem; box-shadow: 0 24px 72px rgba(0,0,0,.3); }
    .sc-close { position: absolute; top: .5rem; right: .5rem; background: none; border: 1px solid var(--border); border-radius: 3px; width: 24px; height: 24px; cursor: pointer; }
    .sc-left { flex: 0 0 44%; padding: 1rem; background: var(--primary); color: #fff; border-radius: 6px; margin-right: 1rem; }
    .sc-right { flex: 1; }

    /* Export */
    .export-btn { position: fixed; bottom: 16px; right: 16px; }
    .export-menu { display: none; position: fixed; bottom: 56px; right: 16px; background: #fff; border: 1px solid var(--border); border-radius: 6px; }
    .export-menu.open { display: block; }
    .export-item { display: block; width: 100%; padding: .55rem 1rem; font-size: .84rem; background: none; border: none; cursor: pointer; border-bottom: 1px solid var(--border); }
    .export-item:last-child { border-bottom: none; }

    /* Edit mode */
    .edit-hotzone { position: fixed; bottom: 0; left: 0; width: 80px; height: 80px; z-index: 10000; cursor: pointer; }
    .edit-toggle { position: fixed; bottom: 16px; left: 16px; background: var(--primary); color: #fff; border: none; border-radius: 6px; padding: .45rem .9rem; font-size: .82rem; cursor: pointer; opacity: 0; pointer-events: none; }
    .edit-toggle.show { opacity: 1; pointer-events: auto; }
    .edit-toggle.active { background: #22c55e; }
    body.edit-mode [contenteditable] { outline: 1px dashed var(--border); }

    .report-wrapper { width: 600px; margin: 0 auto; min-height: 1000px; padding: 32px; }
    .fade-in-up { opacity: 0; }
    .fade-in-up.visible { opacity: 1; }
  </style>
</head>
<body>

  <!-- JSON Summary Block -->
  <script type="application/json" id="report-summary">
  {
    "title": "Fixture Report",
    "author": "",
    "date": "2026-04-13",
    "abstract": "Minimal fixture for testing HTML shell structure.",
    "sections": ["Section A", "Section B"],
    "kpis": []
  }
  </script>

  <!-- Edit mode -->
  <div class="edit-hotzone" id="edit-hotzone"></div>
  <button class="edit-toggle" id="edit-toggle">✏ Edit</button>

  <!-- Export -->
  <div class="export-menu" id="export-menu">
    <button class="export-item" id="export-png-desktop">Desktop</button>
    <button class="export-item" id="export-png-mobile">Mobile</button>
    <button class="export-item" id="export-im-share">IM</button>
  </div>
  <button class="export-btn" id="export-btn">↓ Export</button>

  <!-- TOC -->
  <button class="toc-toggle" id="toc-toggle-btn" aria-label="Contents">☰</button>
  <nav class="toc-sidebar" id="toc-sidebar" aria-label="Report Directory">
    <h4>目录</h4>
    <a href="#section-a" data-section="Section A">Section A</a>
    <a href="#section-b" data-section="Section B">Section B</a>
  </nav>

  <div class="main-with-toc">
    <div class="report-wrapper">

      <!-- Title row -->
      <div class="title-row">
        <h1>Fixture Report</h1>
        <button class="card-mode-btn" id="card-mode-btn">⊞ 摘要卡</button>
      </div>

      <!-- Summary card overlay -->
      <div class="sc-overlay" id="sc-overlay">
        <div class="sc-card" id="sc-card">
          <button class="sc-close" id="sc-close">✕</button>
          <div class="sc-left"><div class="sc-label">SUMMARY</div><div class="sc-title">FIXTURE</div></div>
          <div class="sc-right"><p>Minimal fixture report for testing.</p></div>
        </div>
      </div>

      <section class="fade-in-up" id="section-a" data-section="Section A">A</section>
      <section class="fade-in-up" id="section-b" data-section="Section B">B</section>

      <div class="report-footer">By kai-report-creator v1.13.0</div>
    </div>
  </div>

  <script>
    // TOC: hover to open, click to lock, delayed close
    const tocBtn = document.getElementById('toc-toggle-btn');
    const tocSidebar = document.getElementById('toc-sidebar');
    let locked = false, closeTimer;
    function openToc() { clearTimeout(closeTimer); tocSidebar.classList.add('open'); }
    function scheduleClose() { closeTimer = setTimeout(() => { if (!locked) tocSidebar.classList.remove('open'); }, 150); }
    tocBtn.addEventListener('mouseenter', openToc);
    tocSidebar.addEventListener('mouseenter', openToc);
    tocBtn.addEventListener('mouseleave', scheduleClose);
    tocSidebar.addEventListener('mouseleave', scheduleClose);
    tocBtn.addEventListener('click', () => { locked = !locked; tocBtn.classList.toggle('locked', locked); if (locked) openToc(); else scheduleClose(); });

    // Summary card
    const cardBtn = document.getElementById('card-mode-btn');
    const scOverlay = document.getElementById('sc-overlay');
    const scClose = document.getElementById('sc-close');
    if (cardBtn) cardBtn.addEventListener('click', () => document.body.classList.add('card-mode'));
    if (scClose) scClose.addEventListener('click', () => document.body.classList.remove('card-mode'));
    if (scOverlay) scOverlay.addEventListener('click', (e) => { if (e.target === scOverlay) document.body.classList.remove('card-mode'); });

    // Edit mode
    const hotzone = document.getElementById('edit-hotzone');
    const editToggle = document.getElementById('edit-toggle');
    if (hotzone && editToggle) {
      hotzone.addEventListener('mouseenter', () => editToggle.classList.add('show'));
      hotzone.addEventListener('mouseleave', () => editToggle.classList.remove('show'));
      editToggle.addEventListener('click', () => {
        const active = document.body.classList.toggle('edit-mode');
        editToggle.classList.toggle('active', active);
        editToggle.textContent = active ? '✓ Done' : '✏ Edit';
      });
    }
  </script>

  <!-- Export JS (with capture mock for tests) -->
  <script>
    window._captureLog = [];
    window.html2canvas = function (el, cfg) {
      return new Promise(function (resolve) {
        setTimeout(function () {
          window._captureLog.push({
            tocToggleVisibility: document.getElementById('toc-toggle-btn').style.visibility,
            exportBtnVisibility: document.getElementById('export-btn').style.visibility,
            backgroundColor: cfg && Object.prototype.hasOwnProperty.call(cfg, 'backgroundColor') ? cfg.backgroundColor : null,
            width: cfg && cfg.width ? cfg.width : el.scrollWidth,
            height: cfg && cfg.height ? cfg.height : el.scrollHeight,
            scale: cfg && cfg.scale ? cfg.scale : 1
          });
          resolve({ toBlob: function (cb) { cb(new Blob(['fixture'], { type: 'image/png' })); } });
        }, 0);
      });
    };

    (function() {
      const exportBtn  = document.getElementById('export-btn');
      const exportMenu = document.getElementById('export-menu');
      const pngDesktop = document.getElementById('export-png-desktop');
      const pngMobile  = document.getElementById('export-png-mobile');
      const pngIM      = document.getElementById('export-im-share');
      const tocSidebar = document.getElementById('toc-sidebar');
      const tocToggle  = document.getElementById('toc-toggle-btn');
      if (!exportBtn || !exportMenu) return;
      const LABEL = exportBtn.textContent;
      exportBtn.addEventListener('click', e => { e.stopPropagation(); exportMenu.classList.toggle('open'); });
      document.addEventListener('click', e => { if (!exportBtn.contains(e.target) && !exportMenu.contains(e.target)) exportMenu.classList.remove('open'); });
      function loadLib() { return Promise.resolve(); }
      function restore() { exportBtn.style.visibility = ''; exportBtn.textContent = LABEL; }
      function filename(suffix, ext) { return 'fixture' + suffix + '.' + ext; }
      function exportBackgroundColor() { return '#F8F4EE'; }
      function saveBlob(canvas, fname, jpeg) { canvas.toBlob(() => restore(), jpeg ? 'image/jpeg' : 'image/png', jpeg ? 0.92 : 1); }
      function capture(el, cfg, fname, jpeg) {
        exportMenu.classList.remove('open');
        exportBtn.style.visibility = 'hidden';
        exportBtn.textContent = '…';
        const tocIsOpen = tocSidebar && tocSidebar.classList.contains('open');
        if (tocToggle && !tocIsOpen) tocToggle.style.visibility = 'hidden';
        document.querySelectorAll('.fade-in-up').forEach(e => e.classList.add('visible'));
        loadLib().then(() => html2canvas(el, cfg).then(c => {
          if (tocToggle && !tocIsOpen) tocToggle.style.visibility = '';
          saveBlob(c, fname, jpeg);
        }));
      }
      pngDesktop && pngDesktop.addEventListener('click', () => { const H = document.documentElement.scrollHeight; capture(document.documentElement, { scale: H > 4000 ? 2.5 : 3, width: document.documentElement.scrollWidth, height: H, windowWidth: document.documentElement.scrollWidth, windowHeight: H }, filename('', 'png'), false); });
      pngMobile && pngMobile.addEventListener('click', () => { const el = document.querySelector('.report-wrapper') || document.documentElement; capture(el, { scale: (750 / el.offsetWidth) * 2, backgroundColor: exportBackgroundColor(), width: el.scrollWidth, height: el.scrollHeight }, filename('-mobile', 'jpg'), true); });
      pngIM && pngIM.addEventListener('click', () => { const el = document.querySelector('.report-wrapper') || document.documentElement; capture(el, { scale: (800 / el.offsetWidth) * 2, backgroundColor: exportBackgroundColor(), width: el.scrollWidth, height: el.scrollHeight }, filename('-im', 'jpg'), true); });
    })();
  </script>

</body>
</html>
