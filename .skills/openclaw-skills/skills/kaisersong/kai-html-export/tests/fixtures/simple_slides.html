<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; overflow: hidden; }
  .slide {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    overflow: hidden;
  }
  .slide:nth-child(1) { background: #1a1a2e; color: #fff; }
  .slide:nth-child(2) { background: #16213e; color: #e0e0e0; }
  .slide:nth-child(3) { background: #0f3460; color: #fff; }
</style>
</head>
<body>
<section class="slide"><h1>Slide One</h1><p>First slide content</p></section>
<section class="slide"><h2>Slide Two</h2><p>Second slide content</p></section>
<section class="slide"><h2>Slide Three</h2><p>Third slide content</p></section>
</body>
</html>
