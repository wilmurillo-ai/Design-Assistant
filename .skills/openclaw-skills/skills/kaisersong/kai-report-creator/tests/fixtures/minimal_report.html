<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fixture Report</title>
  <style>
    :root {
      --bg: #F8F4EE;
      --primary: #1C1C1E;
    }
    body {
      margin: 0;
      color: #1f2937;
      background:
        radial-gradient(circle at top left, rgba(28, 28, 30, 0.08), transparent 30%),
        linear-gradient(180deg, #F8F4EE 0%, #F2EDE4 100%);
    }
    .toc-toggle {
      position: fixed;
      top: 8px;
      left: 8px;
    }
    .toc-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 220px;
      height: 100vh;
      transform: translateX(-100%);
    }
    .toc-sidebar.open { transform: translateX(0); }
    .report-wrapper {
      width: 600px;
      margin: 0 auto;
      min-height: 1000px;
      padding: 32px;
    }
    .fade-in-up { opacity: 0; }
    .fade-in-up.visible { opacity: 1; }
    .export-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
    }
    .export-menu {
      display: none;
      position: fixed;
      bottom: 56px;
      right: 16px;
    }
    .export-menu.open { display: block; }
  </style>
</head>
<body>
  <button class="toc-toggle" id="toc-toggle-btn">☰</button>
  <nav class="toc-sidebar" id="toc-sidebar"></nav>

  <div class="export-menu" id="export-menu">
    <button id="export-png-desktop">Desktop</button>
    <button id="export-png-mobile">Mobile</button>
    <button id="export-im-share">IM</button>
  </div>
  <button class="export-btn" id="export-btn">Export</button>

  <main class="report-wrapper">
    <section class="fade-in-up">A</section>
    <section class="fade-in-up">B</section>
  </main>

  <script>
    window._captureLog = [];
    window.html2canvas = function (el, cfg) {
      return new Promise(function (resolve) {
        setTimeout(function () {
          window._captureLog.push({
            tocToggleVisibility: document.getElementById('toc-toggle-btn').style.visibility,
            exportBtnVisibility: document.getElementById('export-btn').style.visibility,
            backgroundColor: cfg && Object.prototype.hasOwnProperty.call(cfg, 'backgroundColor') ? cfg.backgroundColor : null,
            width: cfg && cfg.width ? cfg.width : el.scrollWidth,
            height: cfg && cfg.height ? cfg.height : el.scrollHeight,
            scale: cfg && cfg.scale ? cfg.scale : 1
          });
          resolve({
            toBlob: function (cb) {
              cb(new Blob(['fixture'], { type: 'image/png' }));
            }
          });
        }, 0);
      });
    };

    (function() {
      const exportBtn  = document.getElementById('export-btn');
      const exportMenu = document.getElementById('export-menu');
      const pngDesktop = document.getElementById('export-png-desktop');
      const pngMobile  = document.getElementById('export-png-mobile');
      const pngIM      = document.getElementById('export-im-share');
      const tocSidebar = document.getElementById('toc-sidebar');
      const tocToggle  = document.getElementById('toc-toggle-btn');
      if (!exportBtn || !exportMenu) return;
      const LABEL = exportBtn.textContent;

      exportBtn.addEventListener('click', e => { e.stopPropagation(); exportMenu.classList.toggle('open'); });
      document.addEventListener('click', e => {
        if (!exportBtn.contains(e.target) && !exportMenu.contains(e.target))
          exportMenu.classList.remove('open');
      });

      let libPromise = null;
      function loadLib() {
        if (libPromise) return libPromise;
        libPromise = Promise.resolve();
        return libPromise;
      }
      loadLib();

      function restore() { exportBtn.style.visibility = ''; exportBtn.textContent = LABEL; }
      function filename(suffix, ext) {
        return 'fixture' + suffix + '.' + ext;
      }
      function exportBackgroundColor() {
        const rootStyles = getComputedStyle(document.documentElement);
        const cssVar = (rootStyles.getPropertyValue('--bg') || '').trim();
        if (cssVar) return cssVar;
        const bodyColor = getComputedStyle(document.body).backgroundColor;
        if (bodyColor && bodyColor !== 'rgba(0, 0, 0, 0)' && bodyColor !== 'rgba(0,0,0,0)' && bodyColor !== 'transparent') {
          return bodyColor;
        }
        return '#ffffff';
      }
      function saveBlob(canvas, fname, jpeg) {
        canvas.toBlob(() => restore(), jpeg ? 'image/jpeg' : 'image/png', jpeg ? 0.92 : 1);
      }
      function capture(el, cfg, fname, jpeg) {
        exportMenu.classList.remove('open');
        exportBtn.style.visibility = 'hidden';
        exportBtn.textContent = '…';
        const tocIsOpen = tocSidebar && tocSidebar.classList.contains('open');
        if (tocToggle && !tocIsOpen) tocToggle.style.visibility = 'hidden';
        document.querySelectorAll('.fade-in-up').forEach(e => e.classList.add('visible'));
        loadLib().then(() => html2canvas(el, cfg).then(c => {
          if (tocToggle && !tocIsOpen) tocToggle.style.visibility = '';
          saveBlob(c, fname, jpeg);
        }));
      }

      pngDesktop && pngDesktop.addEventListener('click', () => {
        const H = document.documentElement.scrollHeight;
        capture(document.documentElement, {
          scale: H > 4000 ? 2.5 : 3, useCORS: true, allowTaint: true,
          scrollX: 0, scrollY: 0,
          width: document.documentElement.scrollWidth, height: H,
          windowWidth: document.documentElement.scrollWidth, windowHeight: H
        }, filename('', 'png'), false);
      });

      pngMobile && pngMobile.addEventListener('click', () => {
        const el = document.querySelector('.report-wrapper') || document.documentElement;
        capture(el, {
          scale: (750 / el.offsetWidth) * 2, useCORS: true, allowTaint: true,
          backgroundColor: exportBackgroundColor(),
          scrollX: 0, scrollY: 0, width: el.scrollWidth, height: el.scrollHeight
        }, filename('-mobile', 'jpg'), true);
      });

      pngIM && pngIM.addEventListener('click', () => {
        const el = document.querySelector('.report-wrapper') || document.documentElement;
        capture(el, {
          scale: (800 / el.offsetWidth) * 2, useCORS: true, allowTaint: true,
          backgroundColor: exportBackgroundColor(),
          scrollX: 0, scrollY: 0, width: el.scrollWidth, height: el.scrollHeight
        }, filename('-im', 'jpg'), true);
      });
    })();
  </script>
</body>
</html>
