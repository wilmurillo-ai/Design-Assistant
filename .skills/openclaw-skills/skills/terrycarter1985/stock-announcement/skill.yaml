# Stock Announcement Skill v1.1.0

Automated daily stock portfolio announcements with Gmail reports and Sonos voice notifications.

## Features

- 📊 **Portfolio Analysis**: Real-time stock price tracking using Yahoo Finance API
- 📧 **Gmail Reports**: Beautiful HTML email reports sent automatically
- 🔊 **Sonos Announcements**: Voice updates through your Sonos speakers
- 📈 **Performance Metrics**: Total value, daily change, top/bottom performers
- 🔄 **Automatic Retries**: Robust error handling with exponential backoff

## Installation

```bash
clawhub install stock-announcement
```

## Configuration

1. Set up Gmail API credentials in `config/token.json`
2. Configure your environment variables:
   - `SONOS_SPEAKER`: Name of your Sonos speaker (default: "Living Room")
   - `RECIPIENT_EMAIL`: Email address for reports

## Usage

Run manually:
```bash
python3 scripts/daily_stock_announcement.py
```

Schedule daily via cron:
```bash
# Run every weekday at 9:30 AM
30 9 * * 1-5 cd /workspace && python3 scripts/daily_stock_announcement.py >> /var/log/stock-announcement.log 2>&1
```

## Customization

Edit `scripts/daily_stock_announcement.py` to modify:
- Portfolio holdings (tickers and share counts)
- Announcement voice and language
- Email report template
- Sonos speaker configuration
