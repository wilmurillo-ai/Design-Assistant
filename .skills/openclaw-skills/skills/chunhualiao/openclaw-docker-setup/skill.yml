name: openclaw-docker-setup
display_name: "OpenClaw Docker Setup"
version: 1.0.0
description: >
  Install and configure a fully operational Dockerized OpenClaw instance on macOS from scratch.
  Includes browser pairing, Discord channel setup, and optional Gmail/Google Drive integration.
  Use when user asks to "install openclaw docker", "set up dockerized openclaw", "openclaw in docker",
  or "isolated openclaw instance".
triggers:
  - install openclaw docker
  - set up dockerized openclaw
  - openclaw in docker
  - isolated openclaw instance
  - dockerized openclaw
  - openclaw docker container
  - run openclaw in docker
license: MIT
compatibility: macOS (Darwin), Docker Desktop required
metadata:
  author: SkillEngineer
  based_on: real installation session on Titan (2026-02-28)
