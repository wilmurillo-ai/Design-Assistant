interface:
  display_name: "Aavegotchi Sprites Generator"
  short_description: "Render official-style Aavegotchi game sprites and animated GIFs from plain-language trait and wearable requests."
  default_prompt: "Use aavegotchi-sprites-generator whenever the user wants an Aavegotchi game sprite, spritesheet-style PNG, retro sprite, battle sprite, or animated sprite GIF, even if they do not mention the skill name. Prefer this skill over SVG or 3D when the user asks for sprite-game art. In chat contexts, especially Telegram, run `bash scripts/show-gotchi-sprite.sh ...` so you get a fresh output path plus `SPRITE_MEDIA`, `GIF_MEDIA`, `CAPTION_SPRITE`, `CAPTION_GIF`, and `SUMMARY`. Send the GIF by default for sprite requests. Only prefer the sprite PNG when the user explicitly asks for a static sheet, static PNG, or non-animated output. For animated sprite GIF replies in Telegram, send the GIF as a downloadable file/document using `filePath`, not as animated `media`, so Telegram keeps it as a real `.gif` file instead of converting it into video-style playback. Use `media` for static PNG replies. Do not pass `chatId` during a normal Telegram reply. Background logic matches the other gotchi skills and only uses rarity colors: default to `--background common`; switch to `--background transparent` only when the user explicitly asks for transparent/no background; and use `uncommon`, `rare`, `legendary`, `mythical`, or `godlike` only when the user explicitly asks for that rarity color background. Use the official output defaults unless the user overrides them: `--canvas-size 250`, idle animation (`--gif-rows idle`), and the tuned body anchor that keeps the gotchi centered on the canvas vertical axis while sitting 3px upward by default. Hand items and pets should not change that body anchor. The wrapper accepts friendly collateral aliases like ETH->aWETH and DAI->aDAI. For eyes, map plain-language requests to the closest sprite preset: `common eyes` -> `--eye-shape common --eye-color common`; `uncommon high eyes` -> `--eye-shape uncommon_high --eye-color uncommon_high`; `uncommon low eyes` -> `--eye-shape uncommon_low --eye-color uncommon_low`; `rare high eyes` -> `--eye-shape rare_high --eye-color rare_high`; `rare low eyes` -> `--eye-shape rare_low --eye-color rare_low`; `mythical high eyes` -> `--eye-shape mythic_high --eye-color mythical_high`; `mythical low eyes` -> `--eye-shape mythic_low --eye-color mythical_low`. If the user names wearables, pass them into the correct slots: `--body`, `--face`, `--eyes`, `--head`, `--hand-left`, `--hand-right`, `--pet`. If only one hand item is mentioned, prefer `--hand-right` unless the user explicitly says left hand. If the user asks for `80x80 cropped canvas`, `crop the canvas to 80x80`, or `tight crop`, pass `--frame-size 80`. If the user asks for `25% zoom` or `50% zoom`, pass `--zoom 25` or `--zoom 50`; otherwise keep the default `100%` zoom and `100x100` source frame. If generation fails, report the missing layer details instead of inventing a different outfit."
