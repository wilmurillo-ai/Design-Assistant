# MigrateKit 配置文件模板
# 复制此文件到 ~/.openclaw/migratekit.yaml 并根据实际情况修改

# ===========================
# 默认远程源
# ===========================
default_source: "user@hostname:/path/to/workspace"

# ===========================
# 同步设置
# ===========================
sync:
  # 默认同步类型：all | config | memory | learnings | skills
  type: all
  
  # 默认合并策略：smart | append | overwrite
  merge_strategy: smart
  
  # 是否自动备份
  auto_backup: true
  
  # 备份保留数量
  backup_keep_count: 5

# ===========================
# 文件排除规则
# ===========================
exclude:
  - "*.tmp"
  - "*.log"
  - ".git/*"
  - "node_modules/*"
  - ".sync-backup/*"

# ===========================
# 远程连接配置
# ===========================
connections:
  # 家庭服务器
  home:
    host: "home-server.local"
    user: "han"
    path: "/workspace/projects/workspace"
    ssh_key: "~/.ssh/id_rsa"
  
  # 公司电脑
  work:
    host: "work-pc.company.com"
    user: "<username>"
    path: "/home/<username>/openclaw/workspace"
  
  # 云服务器
  cloud:
    host: "123.45.67.89"
    user: "root"
    path: "/opt/openclaw/workspace"
    ssh_port: 22

# ===========================
# 通知配置（可选）
# ===========================
notify:
  # 同步完成后是否通知
  on_complete: false
  
  # 通知方式：feishu | telegram | email
  method: feishu
  
  # 通知目标
  target: "chat_id_or_email"

# ===========================
# 日志配置
# ===========================
logging:
  # 日志级别：debug | info | warn | error
  level: info
  
  # 日志文件路径
  file: "~/.openclaw/logs/migratekit.log"
  
  # 是否输出到控制台
  console: true
