<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc2222"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44ff88"/>
      <stop offset="100%" stop-color="#22cc66"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" font-family="monospace" font-size="52" font-weight="bold" fill="#ffffff">cli2skill</text>
  <text x="600" y="120" text-anchor="middle" font-family="monospace" font-size="18" fill="#888888">Turn any CLI into an Agent Skill — zero MCP overhead</text>

  <!-- LEFT: MCP (red, bad) -->
  <text x="250" y="170" text-anchor="middle" font-family="monospace" font-size="14" fill="#ff4444">MCP Server (persistent)</text>

  <!-- Process tree boxes -->
  <rect x="150" y="185" width="200" height="28" rx="4" fill="#1a0505" stroke="#ff4444" stroke-width="1"/>
  <text x="250" y="204" text-anchor="middle" font-family="monospace" font-size="12" fill="#ff6666">cmd.exe</text>

  <line x1="250" y1="213" x2="250" y2="223" stroke="#ff4444" stroke-width="1"/>

  <rect x="150" y="223" width="200" height="28" rx="4" fill="#1a0505" stroke="#ff4444" stroke-width="1"/>
  <text x="250" y="242" text-anchor="middle" font-family="monospace" font-size="12" fill="#ff6666">uv.exe (launcher)</text>

  <line x1="250" y1="251" x2="250" y2="261" stroke="#ff4444" stroke-width="1"/>

  <rect x="150" y="261" width="200" height="28" rx="4" fill="#1a0505" stroke="#ff4444" stroke-width="1"/>
  <text x="250" y="280" text-anchor="middle" font-family="monospace" font-size="12" fill="#ff6666">python.exe (MCP)</text>

  <!-- x15 multiplier -->
  <text x="250" y="310" text-anchor="middle" font-family="monospace" font-size="13" fill="#ff4444">× 15 servers = 45+ zombie processes</text>
  <text x="250" y="330" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#ff4444">💀 STATUS_COMMITMENT_LIMIT</text>
  <text x="250" y="355" text-anchor="middle" font-family="monospace" font-size="13" fill="#ff4444">fork() fails → system dead</text>

  <!-- VS -->
  <text x="600" y="260" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="#444444">→</text>

  <!-- RIGHT: CLI + Skill (green, good) -->
  <text x="950" y="170" text-anchor="middle" font-family="monospace" font-size="14" fill="#44ff88">CLI + Skill (on-demand)</text>

  <rect x="800" y="200" width="300" height="80" rx="8" fill="#051a0a" stroke="#44ff88" stroke-width="1"/>
  <text x="950" y="228" text-anchor="middle" font-family="monospace" font-size="13" fill="#44ff88">$ mytool search "query"</text>
  <text x="950" y="248" text-anchor="middle" font-family="monospace" font-size="11" fill="#44ff88">→ runs → returns → exits</text>
  <text x="950" y="268" text-anchor="middle" font-family="monospace" font-size="11" fill="#228855">SKILL.md teaches agent when &amp; how</text>

  <text x="950" y="310" text-anchor="middle" font-family="monospace" font-size="13" fill="#44ff88">0 persistent processes</text>
  <text x="950" y="330" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#44ff88">✓ 26+ platforms supported</text>
  <text x="950" y="355" text-anchor="middle" font-family="monospace" font-size="13" fill="#44ff88">Works everywhere Agent Skills work</text>

  <!-- Bottom tagline -->
  <text x="600" y="390" text-anchor="middle" font-family="monospace" font-size="12" fill="#555555">pip install cli2skill · github.com/2233admin/cli2skill</text>
</svg>
