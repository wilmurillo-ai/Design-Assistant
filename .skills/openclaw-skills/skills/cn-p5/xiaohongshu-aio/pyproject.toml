[project]
name = "xiaohongshu-aio"
version = "0.1.6"
description = "Xiaohongshu MCP REST API Client"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.20.0",
    "typer>=0.10.0",
    "pydantic>=2.3.0",
    "pydantic-settings>=2.0.0",
    "rich>=11.0.0"
]

[project.scripts]
xhs = "xiaohongshu_aio.cli:app"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
