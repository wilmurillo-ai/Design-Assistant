[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "olaxbt-nexus-data"
version = "1.0.0"
description = "Official OlaXBT Nexus Data API skill for OpenClaw agents"
readme = "README.md"
authors = [
    {name = "OlaXBT Team", email = "hello@olaxbt.xyz"}
]
license = {text = "MIT"}
keywords = ["olaxbt", "nexus", "crypto", "trading", "api", "blockchain"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Financial",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "web3>=6.0.0",
    "requests>=2.28.0",
    "pydantic>=2.0.0",
    "cryptography>=42.0.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "mypy>=1.0.0",
    "flake8>=6.0.0",
]
docs = [
    "sphinx>=7.0.0",
    "sphinx-rtd-theme>=1.0.0",
]

[project.urls]
Homepage = "https://olaxbt.xyz"
Repository = "https://github.com/olaxbt/olaxbt-skills-hub"
Documentation = "https://olaxbt.xyz/skill.md"
Issues = "https://github.com/olaxbt/olaxbt-nexus-data/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"olaxbt_nexus_data" = ["py.typed"]

[tool.black]
line-length = 88
target-version = ['py38']

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --cov=olaxbt_nexus_data --cov-report=term-missing"