  architecture.md: |
    # System Architecture

    ## Overview
    This is a full-stack web application with separate frontend and backend services.

    ## Service Architecture
    ```
    ┌─────────────────┐     ┌─────────────────┐     ┌─────────────────┐
    │   Frontend      │────▶│   Backend API   │────▶│   Database      │
    │   (React/Vue)   │     │   (Node.js/     │     │   (PostgreSQL/  │
    │   Port 3000     │     │    Python)      │     │    MySQL)       │
    │                 │     │   Port 8000     │     │   Port 5432     │
    └─────────────────┘     └─────────────────┘     └─────────────────┘
              │                       │                       │
              │                       │                       │
              ▼                       ▼                       ▼
    ┌─────────────────┐     ┌─────────────────┐     ┌─────────────────┐
    │   Static Files  │     │   File Storage  │     │   Cache/Session │
    │   (nginx/CDN)   │     │   (Local/S3)    │     │   (Redis)       │
    └─────────────────┘     └─────────────────┘     └─────────────────┘
    ```

    ## Component Details

    ### Frontend
    - **Technology**: React.js/Vue.js/Angular
    - **Port**: 3000 (development), 80/443 (production)
    - **Responsibilities**:
      - User interface rendering
      - Client-side routing
      - State management
      - API communication

    ### Backend API  
    - **Technology**: Node.js/Express, Python/FastAPI, or similar
    - **Port**: 8000 (development), internal (production)
    - **Responsibilities**:
      - Business logic processing
      - Database interactions
      - Authentication & authorization
      - API endpoint serving

    ### Database
    - **Technology**: PostgreSQL, MySQL, or MongoDB
    - **Port**: 5432 (PostgreSQL), 3306 (MySQL), 27017 (MongoDB)
    - **Responsibilities**:
      - Data persistence
      - ACID compliance
      - Backup and recovery

    ## Authentication Flow
    1. User submits credentials to backend `/auth/login`
    2. Backend validates against database
    3. JWT token issued with user claims
    4. Frontend stores token (localStorage/httpOnly cookies)
    5. Subsequent requests include token in Authorization header
    6. Backend validates token and extracts user context

    ## Data Flow
    1. User interaction triggers frontend action
    2. Frontend makes API request to backend
    3. Backend processes request and queries database
    4. Database returns data to backend
    5. Backend formats response and returns to frontend
    6. Frontend updates UI with new data

    ## Security Considerations
    - HTTPS/TLS encryption for all traffic
    - JWT token expiration and refresh
    - Input validation and sanitization
    - SQL injection prevention
    - XSS protection
    - CSRF tokens for state-changing operations

    ## Deployment Architecture
    ```
    Internet → Load Balancer → nginx → Frontend (Static)
                            → nginx → Backend API → Database
    ```

