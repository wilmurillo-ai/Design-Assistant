# Pure Mathematical Audit Configuration
version: "3.6.0"
name: "Pure Mathematical Audit"
description: "Mathematical depth audit tool with read-only file access - Professional Edition"

# Security settings
security:
  read_only: true
  no_network: true
  no_dynamic_execution: true
  no_background_processes: true

# Mathematical analysis settings
analysis:
  complexity_weight: 0.4
  pattern_weight: 0.3
  entropy_weight: 0.2
  structure_weight: 0.1

# Output settings
output:
  format: "json"
  verbose: false
  max_results: 10
