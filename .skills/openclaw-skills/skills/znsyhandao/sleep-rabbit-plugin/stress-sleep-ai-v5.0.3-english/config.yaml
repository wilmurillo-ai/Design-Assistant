# Stress Sleep AI Skill Configuration
# Based on AISleepGen existing features

skill:
  name: "stress-sleep-ai"
  version: "5.0.3"  # Final English version with all security fixes
  description: "Stress and sleep analysis based on AISleepGen features"
  author: "OpenClaw Assistant"
  license: "MIT"

# Security Declaration
security:
  local_only: true
  no_network_access: true
  no_dangerous_functions: true
  path_restriction: true
  privacy_protection: true

# Feature Configuration
features:
  stress_analysis:
    enabled: true
    description: "Stress level analysis and recommendations"
    source: "AISleepGen autonomous meditation AI agent"
  
  sleep_analysis:
    enabled: true
    description: "Sleep quality analysis and optimization"
    source: "AISleepGen sleep analysis system"
  
  audio_therapy:
    enabled: true
    description: "Scientific audio therapy"
    source: "AISleepGen audio therapy engine"
    protocols: ["alpha_wave", "theta_wave", "white_noise", "pink_noise"]
  
  breathing_exercise:
    enabled: true
    description: "Breathing training guidance"
    source: "Scientific breathing regulation techniques"
    techniques: ["box_breathing", "4-7-8_breathing", "diaphragmatic_breathing"]
  
  mindfulness:
    enabled: true
    description: "Mindfulness practice guidance"
    source: "Modern Mindfulness-Based Stress Reduction (MBSR) techniques"
    practices: ["body_scan", "breath_awareness", "loving_kindness"]
  
  autonomous_mode:
    enabled: true
    description: "Autonomous intervention mode"
    source: "AISleepGen autonomous meditation AI agent"
    monitoring_frequency: "Every 30 minutes"

# Scientific Basis Declaration
scientific_basis:
  - "Cognitive Behavioral Therapy (CBT)"
  - "Mindfulness-Based Stress Reduction (MBSR)"
  - "Biofeedback technology"
  - "Progressive muscle relaxation"
  - "Guided imagery"
  - "Breathing regulation techniques"

# Excluded Content Declaration
excluded_content:
  - "Buddhist-related content and terminology"
  - "Religious therapy techniques"
  - "Traditional culture-specific methods"
  - "Non-scientifically validated techniques"

# Performance Configuration
performance:
  command_response_time: "< 100ms"
  analysis_response_time: "< 1000ms"
  memory_usage: "< 50MB"
  cpu_usage: "< 5%"

# Compatibility
compatibility:
  python_versions: ["3.8+"]
  operating_systems: ["Windows", "macOS", "Linux"]
  openclaw_versions: ["2026.3+"]
  architectures: ["x86_64", "arm64"]