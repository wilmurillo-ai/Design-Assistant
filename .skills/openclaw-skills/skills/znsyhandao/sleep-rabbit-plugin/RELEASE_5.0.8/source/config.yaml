# Sleep Rabbit Sleep Health Skill Configuration
# version: "5.0.8"
# Compliant with OpenClaw skill specification
# Implementation: Basic features - 100% Python standard library
#                 Advanced features - Optional external packages (MNE, NumPy, SciPy)
# Security fix version: Resolved ClawHub security scan issues

# Skill basic information
skill:
  name: "sleep-rabbit-plugin"
  version: "5.0.8"
  description: "Professional sleep analysis, stress assessment, and meditation guidance system"
  author: "Sleep Rabbit Team"
  contact:
    email: "handaocqs103@gmail.com"
    mobile: "+86 13571924486"
    github: "https://github.com/AISleepGen"
  license: "MIT"

# Security configuration - Clear and accurate declarations
security:
  # Runtime security (during skill execution)
  runtime_network_access: false  # No network calls during execution
  runtime_shell_commands: false  # No shell commands during execution
  runtime_local_only: true       # 100% local execution during runtime
  local_operation: true          # Explicit local operation declaration
  
  # Installation transparency
  installation_requires_network: "optional"  # Only for advanced features (MNE, NumPy, SciPy)
  basic_features_requirements: "python_standard_library_only"
  advanced_features_requirements: "optional_pip_install_mne_numpy_scipy"
  
  # Path security
  path_restriction:
    enabled: true
    allowed_dirs:
      - "."  # Skill directory
      - "./examples"  # Example data directory
    max_file_size_mb: 100
    allowed_file_types:
      - ".edf"  # Sleep data files
      - ".txt"  # Text data
      - ".csv"  # CSV data
      - ".json"  # JSON data
      - ".yaml"  # YAML config
      - ".yml"   # YAML config
  
  # Security declarations (must match code implementation)
  declarations:
    - "Runtime execution is 100% local - no network calls during skill operation"
    - "Shell commands are disabled - no child_process or subprocess calls"
    - "Path access is restricted to skill directory and allowed subdirectories"
    - "Basic features work with Python standard library only"
    - "Advanced features (EDF analysis) require optional package installation"
    - "Clear separation between local runtime and optional installation steps"

# Plugin configuration
plugins:
  sleep_analyzer:
    enabled: true
    mode: "basic"  # basic or advanced (requires MNE)
    capabilities:
      basic: ["file_validation", "metadata_extraction", "format_checking"]
      advanced: ["sleep_stage_analysis", "eeg_processing", "spectral_analysis"]
    
  stress_assessor:
    enabled: true
    capabilities: ["heart_rate_analysis", "stress_scoring", "hrv_calculation"]
    requirements: "python_standard_library"
    
  meditation_guide:
    enabled: true
    capabilities: ["guided_meditation", "breathing_exercises", "relaxation_techniques"]
    requirements: "python_standard_library"

# Output configuration
output:
  format: "json"  # json, text, markdown
  detail_level: "normal"  # minimal, normal, detailed
  include_timestamp: true
  include_skill_info: true

# Logging configuration
logging:
  level: "info"  # debug, info, warning, error
  file: "sleep_rabbit.log"
  max_size_mb: 10
  backup_count: 3

# Performance configuration
performance:
  max_workers: 2
  timeout_seconds: 300
  memory_limit_mb: 512

# Data validation configuration
validation:
  check_file_existence: true
  validate_file_size: true
  check_file_permissions: true
  verify_file_type: true

# Health check configuration
health_check:
  enabled: true
  interval_minutes: 60
  check_skill_file: true
  check_dependencies: true
  check_permissions: true

# Command aliases (backward compatibility)
aliases:
  sleep-analyze: ["analyze-sleep", "sleep-analysis"]
  stress-check: ["check-stress", "stress-assessment"]
  meditation-guide: ["guide-meditation", "meditation"]
  file-info: ["info-file", "file-analysis"]
  env-check: ["check-env", "environment"]

# Compatibility configuration
compatibility:
  openclaw_min_version: "5.0.8"
  python_min_version: "3.8"
  node_min_version: "5.0.8"
  platforms: ["windows", "linux", "macos"]

# Documentation links
documentation:
  readme: "README.md"
  skill_docs: "SKILL.md"
  integration_guide: "INTEGRATION_GUIDE.md"
  plugin_usage: "PLUGIN_USAGE.md"
  changelog: "CHANGELOG.md"

# Note: This configuration file is only for declaring skill features and limitations
# All security declarations must match code implementation in skill.py
# Skill runs 100% locally during runtime, optional packages require user consent



