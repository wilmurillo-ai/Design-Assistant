# 新股分析工具配置示例
# 复制此文件为 config.yaml 并修改配置

# 数据源配置
data_sources:
  # 东方财富API配置
  eastmoney:
    enabled: true
    api_url: "http://datacenter-web.eastmoney.com/api/data/v1/get"
    timeout: 15
    cache_minutes: 5  # 缓存时间（分钟）
  
  # 中财网配置（用于验证）
  cfi:
    enabled: true
    url: "https://newstock.cfi.cn/"
    timeout: 15

# 分析配置
analysis:
  # 评分权重
  weights:
    valuation: 0.4    # 估值权重
    market: 0.3      # 市场权重
    risk: 0.3        # 风险权重
  
  # 建议阈值
  thresholds:
    excellent: 80    # 优秀（积极申购）
    good: 65        # 良好（建议申购）
    fair: 50        # 一般（谨慎申购）
    poor: 35        # 较差（观望）
  
  # 市场风险系数
  market_risk_factors:
    沪市主板: 1.0
    深市主板: 1.0
    创业板: 1.3
    科创板: 1.5
    北交所: 1.2

# 通知配置
notification:
  # OpenClaw通知
  openclaw:
    enabled: true
    # 通知将通过OpenClaw会话自动发送
    # 无需额外配置
  
  # 通知时间
  schedule:
    daily_time: "10:00"      # 每日分析时间
    weekly_day: "monday"     # 每周分析日
    weekly_time: "10:00"     # 每周分析时间

# 缓存配置
cache:
  enabled: true
  directory: "data/cache"
  cleanup_days: 7           # 清理7天前的缓存

# 日志配置
logging:
  level: "INFO"            # DEBUG, INFO, WARNING, ERROR
  directory: "data/logs"
  max_files: 30            # 最大日志文件数
  max_size_mb: 10          # 单个日志文件最大大小（MB）

# 系统配置
system:
  # 资源限制
  max_memory_mb: 512       # 最大内存使用（MB）
  max_execution_seconds: 300  # 最大执行时间（秒）
  
  # 网络配置
  retry_times: 3           # 网络重试次数
  retry_delay: 2           # 重试延迟（秒）

# 功能开关
features:
  multi_source_validation: true    # 多数据源验证
  detailed_analysis: true          # 详细分析
  risk_assessment: true           # 风险评估
  position_suggestion: true       # 仓位建议
  data_quality_marking: true      # 数据质量标记

# 调试配置（开发用）
debug:
  enabled: false
  save_raw_data: false     # 保存原始数据
  verbose_logging: false   # 详细日志