# ── 系统消息翻译 ──────────────────────────────────────────────────────

messages:
  routing_to:
    zh: "任务已路由至 {title}（{role}），使用模型 {model}"
    en: "Task routed to {title} ({role}), using model {model}"
    ja: "タスクを{title}（{role}）にルーティング、モデル {model} を使用"
    ko: "작업을 {title}({role})로 라우팅, 모델 {model} 사용"
    es: "Tarea enrutada a {title} ({role}), usando modelo {model}"
    fr: "Tâche routée vers {title} ({role}), utilisant le modèle {model}"
    de: "Aufgabe an {title} ({role}) weitergeleitet, Modell {model}"

  fallback_triggered:
    zh: "⚠️ 主模型失败，降级到: {model}"
    en: "⚠️ Primary model failed, falling back to: {model}"
    ja: "⚠️ メインモデル失敗、フォールバック先: {model}"
    ko: "⚠️ 기본 모델 실패, 대체 모델로 전환: {model}"
    es: "⚠️ Modelo principal falló, respaldo: {model}"
    fr: "⚠️ Modèle principal échoué, repli sur: {model}"
    de: "⚠️ Primärmodell fehlgeschlagen, Fallback auf: {model}"

  all_models_failed:
    zh: "❌ 所有 {count} 个模型均失败"
    en: "❌ All {count} models failed"
    ja: "❌ 全 {count} モデルが失敗"
    ko: "❌ 모든 {count}개 모델 실패"
    es: "❌ Los {count} modelos fallaron"
    fr: "❌ Les {count} modèles ont échoué"
    de: "❌ Alle {count} Modelle fehlgeschlagen"

  review_pass:
    zh: "✅ 审核通过"
    en: "✅ Review passed"
    ja: "✅ 審査通過"
    ko: "✅ 검토 통과"
    es: "✅ Revisión aprobada"
    fr: "✅ Revue validée"
    de: "✅ Überprüfung bestanden"

  review_reject:
    zh: "❌ 审核驳回"
    en: "❌ Review rejected"
    ja: "❌ 審査却下"
    ko: "❌ 검토 거부"
    es: "❌ Revisión rechazada"
    fr: "❌ Revue rejetée"
    de: "❌ Überprüfung abgelehnt"

  review_revise:
    zh: "⚠️ 需要修改"
    en: "⚠️ Revision needed"
    ja: "⚠️ 修正が必要"
    ko: "⚠️ 수정 필요"
    es: "⚠️ Revisión necesaria"
    fr: "⚠️ Révision nécessaire"
    de: "⚠️ Überarbeitung nötig"

  no_api_key:
    zh: "未找到 provider '{provider}' 的 API Key"
    en: "No API key found for provider '{provider}'"
    ja: "プロバイダー '{provider}' の API キーが見つかりません"
    ko: "프로바이더 '{provider}'의 API 키를 찾을 수 없습니다"
    es: "No se encontró clave API para el proveedor '{provider}'"
    fr: "Clé API introuvable pour le fournisseur '{provider}'"
    de: "Kein API-Schlüssel für Anbieter '{provider}' gefunden"

  health_summary:
    zh: "探活完成: {healthy}✅ 健康  {auth_dead}🔴 认证失败  {timeout}⏱️ 超时  {down}❌ 宕机  / {total} 总计"
    en: "Probe complete: {healthy}✅ healthy  {auth_dead}🔴 auth dead  {timeout}⏱️ timeout  {down}❌ down  / {total} total"
    ja: "探索完了: {healthy}✅ 正常  {auth_dead}🔴 認証失敗  {timeout}⏱️ タイムアウト  {down}❌ ダウン  / {total} 合計"
    ko: "탐색 완료: {healthy}✅ 정상  {auth_dead}🔴 인증 실패  {timeout}⏱️ 시간 초과  {down}❌ 다운  / {total} 총계"
    es: "Sondeo completo: {healthy}✅ sanos  {auth_dead}🔴 auth muerto  {timeout}⏱️ timeout  {down}❌ caídos  / {total} total"
    fr: "Sondage terminé: {healthy}✅ sains  {auth_dead}🔴 auth mort  {timeout}⏱️ timeout  {down}❌ hors service  / {total} total"
    de: "Prüfung abgeschlossen: {healthy}✅ gesund  {auth_dead}🔴 Auth tot  {timeout}⏱️ Timeout  {down}❌ ausgefallen  / {total} gesamt"

  benchmark_start:
    zh: "🧪 开始基准测试: {models} 模型 × {categories} 类别 = {total} 项测试"
    en: "🧪 Starting benchmark: {models} models × {categories} categories = {total} tests"
    ja: "🧪 ベンチマーク開始: {models} モデル × {categories} カテゴリ = {total} テスト"
    ko: "🧪 벤치마크 시작: {models} 모델 × {categories} 카테고리 = {total} 테스트"
    es: "🧪 Iniciando benchmark: {models} modelos × {categories} categorías = {total} pruebas"
    fr: "🧪 Démarrage du benchmark: {models} modèles × {categories} catégories = {total} tests"
    de: "🧪 Benchmark gestartet: {models} Modelle × {categories} Kategorien = {total} Tests"

  stats_line:
    zh: "📊 {model} | tokens: {tokens} | 成本: ${cost} | 延迟: {latency}ms"
    en: "📊 {model} | tokens: {tokens} | cost: ${cost} | latency: {latency}ms"
    ja: "📊 {model} | トークン: {tokens} | コスト: ${cost} | 遅延: {latency}ms"
    ko: "📊 {model} | 토큰: {tokens} | 비용: ${cost} | 지연: {latency}ms"
    es: "📊 {model} | tokens: {tokens} | costo: ${cost} | latencia: {latency}ms"
    fr: "📊 {model} | tokens: {tokens} | coût: ${cost} | latence: {latency}ms"
    de: "📊 {model} | Tokens: {tokens} | Kosten: ${cost} | Latenz: {latency}ms"

