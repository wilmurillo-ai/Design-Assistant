# ── 执行模式翻译 ──────────────────────────────────────────────────────

modes:
  direct:
    zh: 直接执行
    en: Direct Execution
    ja: 直接実行
    ko: 직접 실행
    es: Ejecución Directa
    fr: Exécution Directe
