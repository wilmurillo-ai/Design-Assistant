  plan_then_execute:
    zh: 先规划后执行
    en: Plan then Execute
    ja: 計画後実行
    ko: 계획 후 실행
    es: Planificar y Ejecutar
    fr: Planifier puis Exécuter
    de: Planen dann Ausführen

  multi_agent:
    zh: 多智能体协同
    en: Multi-Agent Collaboration
    ja: マルチエージェント協調
    ko: 다중 에이전트 협업
