# Imperial Orchestrator · 多语言适配
# 7 国语言：中文(zh)、英语(en)、日语(ja)、韩语(ko)、西班牙语(es)、法语(fr)、德语(de)

languages:
  - zh
  - en
  - ja
  - ko
  - es
  - fr
  - de

default_language: zh

