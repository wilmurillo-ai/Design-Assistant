[project]
name = "gstable-ai-payment"
version = "1.0.0"
description = "GStable AI Payment Protocol Skill for OpenClaw"
readme = "SKILL.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "eth-account>=0.13.0",
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["scripts"]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]
