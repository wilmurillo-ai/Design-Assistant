<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="q1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="q2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="q3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="q4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="5" y="5" width="90" height="90" rx="18" fill="url(#bg)"/>
  
  <!-- Q1: Top Right - Red (Urgent & Important) -->
  <path d="M52 10 L85 10 Q90 10 90 15 L90 48 L52 48 Z" fill="url(#q1)" opacity="0.95"/>
  
  <!-- Q2: Top Left - Blue (Important, Not Urgent) -->
  <path d="M10 15 Q10 10 15 10 L48 10 L48 48 L10 48 L10 15 Z" fill="url(#q2)" opacity="0.95"/>
  
  <!-- Q3: Bottom Right - Orange (Urgent, Not Important) -->
  <path d="M52 52 L90 52 L90 85 Q90 90 85 90 L52 90 Z" fill="url(#q3)" opacity="0.95"/>
  
  <!-- Q4: Bottom Left - Green (Not Urgent, Not Important) -->
  <path d="M15 90 Q10 90 10 85 L10 52 L48 52 L48 90 L15 90 Z" fill="url(#q4)" opacity="0.95"/>
  
  <!-- Center Cross -->
  <rect x="48" y="10" width="4" height="80" fill="#1e293b" opacity="0.3"/>
  <rect x="10" y="48" width="80" height="4" fill="#1e293b" opacity="0.3"/>
  
  <!-- Letter E in center -->
  <text x="50" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">E</text>
</svg>