## 🏆 Sponsor Tiers

### 🥉 Bronze Sponsor ($5/month)
- ✅ Name listed in CONTRIBUTORS.md
- ✅ Access to sponsor-only Discord channel
- ✅ Early access to new features

### 🥈 Silver Sponsor ($15/month)
- ✅ All Bronze benefits
- ✅ Priority issue triage
- ✅ Monthly behind-the-scenes updates
- ✅ Vote on feature priorities

### 🥇 Gold Sponsor ($50/month)
- ✅ All Silver benefits
- ✅ Logo on README (with link)
- ✅ Custom template request (1 per month)
- ✅ Quarterly video call with maintainers

### 💎 Platinum Sponsor ($200/month)
- ✅ All Gold benefits
- ✅ Dedicated support channel
- ✅ Custom template development (2 per month)
- ✅ Co-marketing opportunities
- ✅ Influence project roadmap

## 📊 How Funds Are Used

We're committed to transparency:

| Category | Allocation | Description |
|----------|------------|-------------|
| **Development** | 60% | New features, bug fixes, maintenance |
| **Infrastructure** | 15% | Hosting, CI/CD, tools |
| **Documentation** | 15% | Tutorials, guides, examples |
| **Community** | 10% | Events, swag, support |

