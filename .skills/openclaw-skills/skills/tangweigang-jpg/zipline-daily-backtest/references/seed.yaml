domain_constraints_injected:
- id: SHARED-BT-LAB-001
  statement: '未来函数（Lookahead Bias）：在模拟历史时间点 t 的交易决策时， 不得使用 t 时刻之后才能知道的信息。最常见形式： (1) 使用收盘价计算信号并同日以收盘价成交； (2) 将 T 日收盘后计算的指标标记在同一根
    K 线； (3) 使用当日最高/最低价作为成交假设。 信号计算与成交时间必须对齐：T 日收盘后计算信号，T+1 日开盘成交。

    '
  severity: fatal
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
    - order_execution
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: signals computed from close must be executed on next open, not same close
  evidence_refs:
  - type: community_validated
    ref: 知乎《答应我，在量化策略回测里，避开未来函数这4个坑》（2022，5000+赞）；CSDN《CTA策略回测的隐形杀手：深入解析未来函数与价格偷窥陷阱》（2025）
    url: https://zhuanlan.zhihu.com/p/489853249
  reference_code:
    bad_example: '# BAD: T日收盘价计算信号，同日以收盘价成交

      df[''signal''] = df[''close''] > df[''close''].rolling(20).mean()

      df[''trade_price''] = df[''close'']  # 用了同日收盘价 — lookahead!

      '
    good_example: '# GOOD: T日信号 → T+1日开盘成交

      df[''signal''] = df[''close''] > df[''close''].rolling(20).mean()

      df[''signal''] = df[''signal''].shift(1)         # 信号延迟1日

      df[''trade_price''] = df[''open''].shift(-1)     # T+1日开盘价成交

      # 最终: 今日收盘后信号 → 明日开盘执行

      '
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-LAB-002
  statement: '指标预热期（Warmup Period）处理：滚动窗口指标在前 N 个 bar 时 NaN， 这些 bar 不应参与信号计算和持仓决策。强制要求指标的 warmup_period 与最长 lookback 期等长，且
    warmup 期间持仓应置零。

    '
  severity: high
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
    - backtesting
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: first N bars (=longest lookback) must be excluded from signal generation
  evidence_refs:
  - type: community_validated
    ref: backtrader 文档 Warmup Period；zipline-reloaded 文档 history() warmup；vectorbt 文档 warm_up_period
    url: https://www.backtrader.com/docu/quickstart/quickstart/#warmup-period
  reference_code:
    bad_example: '# BAD: NaN 未处理，策略在 warmup 期行为未定义

      sma_200 = df[''close''].rolling(200).mean()

      signal = (df[''close''] > sma_200).astype(int)  # 前 199 行含 NaN

      '
    good_example: "# GOOD: 显式跳过 warmup 期\nWARMUP = 200\nsma_200 = df['close'].rolling(200).mean()\nsignal = pd.Series(0, index=df.index)\n\
      signal.iloc[WARMUP:] = (df['close'].iloc[WARMUP:] >\n                         sma_200.iloc[WARMUP:]).astype(int)\n"
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-LAB-003
  statement: 'ML/DL 模型时序数据划分必须按时间顺序：TRAIN < VALID < TEST， 不可使用随机 k-fold 分折（会将未来数据混入训练集）。 应使用 TimeSeriesSplit 或 Walk-Forward
    验证。

    '
  severity: fatal
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - backtesting
    - ml_training
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: backtesting
    constraint_context: 'temporal data split must be chronological: train < valid < test'
  evidence_refs:
  - type: community_validated
    ref: sklearn TimeSeriesSplit 文档；qlib 文档数据集划分规范；知乎《时序数据的正确交叉验证》
    url: https://scikit-learn.org/stable/modules/cross_validation.html#time-series-split
  reference_code:
    bad_example: '# BAD: 随机分折导致未来信息泄漏进训练集

      from sklearn.model_selection import KFold

      kf = KFold(n_splits=5, shuffle=True)

      '
    good_example: "# GOOD: 时序分折，严格按时间先后\nfrom sklearn.model_selection import TimeSeriesSplit\ntscv = TimeSeriesSplit(n_splits=5)\n\
      for train_idx, test_idx in tscv.split(X):\n    assert max(train_idx) < min(test_idx)  # 训练集时间全在测试集之前\n"
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-LAB-004
  statement: '开盘价/最高价/最低价成交假设：日线回测中假设每日可以最高价卖出或 最低价买入（如动量策略"最高价止盈"），这是明显的 lookahead， 因为日内最高/最低价只有收盘后才能确认。成交价只能用开盘价或 前一日收盘价（带滑点）。

    '
  severity: fatal
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - order_execution
    - backtesting
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: order_execution
    constraint_context: daily high/low cannot be used as fill price — use open or prev close with slippage
  evidence_refs:
  - type: community_validated
    ref: CSDN《CTA策略回测的隐形杀手：深入解析未来函数与价格偷窥陷阱》（2025）
    url: https://blog.csdn.net/m0_74890406/article/details/143940226
  reference_code:
    bad_example: "# BAD: 用当日最高价作为止盈成交价\nif df.loc[today, 'high'] > stop_profit_price:\n    sell_price = stop_profit_price\
      \  # 当日才能知道有没有触及最高价\n"
    good_example: "# GOOD: 设置止盈单，次日开盘确认触发（简化模拟）\nif df.loc[yesterday, 'close'] > stop_profit_price:\n    sell_price = df.loc[today,\
      \ 'open']  # T+1 开盘成交\n"
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-LAB-005
  statement: '数据对齐偏移（Off-by-one）：pandas rolling/shift 等操作容易引入细微的 1 期偏移错误。应在代码中明确记录每个序列的"观测时间点"， 并通过 assert 验证关键时间对齐关系。

    '
  severity: high
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: document the observation time for each signal series; add alignment assertions
  evidence_refs:
  - type: community_validated
    ref: vectorbt 社区《常见时序对齐陷阱》；知乎《量化策略回测中的 Off-by-one 问题》
  reference_code:
    bad_example: '# BAD: 不清楚 signal 是否已经 shift

      signal = (sma_fast > sma_slow)

      # 后续代码搞不清是否还需要 shift

      position = signal.astype(int)

      '
    good_example: '# GOOD: 明确注释观测时间点

      # signal[t] = 1 means: at close of day t, we decide to buy tomorrow

      signal = (sma_fast > sma_slow)  # observed at close of t

      # position[t] = holdings entering day t = signal from t-1

      position = signal.shift(1).fillna(0).astype(int)

      '
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-LAB-006
  statement: '过度优化（Overfitting）：回测数量越多，过拟合概率越高。 Bailey et al.（2014）证明 Optimal Sharpe Ratio 期望值随回测次数单调递减。 应使用 Walk-Forward
    验证代替 in-sample 参数穷举，并报告 Deflated Sharpe Ratio（DSR）而非峰值 Sharpe。

    '
  severity: high
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - backtesting
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: backtesting
    constraint_context: walk-forward OOS validation required; deflated sharpe must be reported alongside in-sample sharpe
  evidence_refs:
  - type: academic
    ref: 'Bailey, D.H. et al. (2014). ''The Deflated Sharpe Ratio: Correcting for Selection Bias, Backtest Overfitting, and
      Non-Normality.'' Journal of Portfolio Management, 40(5), 94-107.'
    url: https://crm.htsc.com.cn/doc/2018/10750101/9ad0cc55-470a-4dc8-9b27-1e0cec6a1ae2.pdf
  reference_code:
    bad_example: "# BAD: 穷举参数取最优，不做 OOS 验证\nbest_sharpe = 0\nfor sma_short in range(5, 50):\n    for sma_long in range(20,\
      \ 200):\n        sharpe = backtest(sma_short, sma_long)\n        if sharpe > best_sharpe:\n            best_params =\
      \ (sma_short, sma_long)\n"
    good_example: "# GOOD: Walk-Forward 验证，报告 OOS 绩效\nresults = []\nfor train_end, test_start, test_end in walk_forward_windows:\n\
      \    params = optimize_in_sample(train_end)\n    oos_sharpe = backtest_oos(params, test_start, test_end)\n    results.append(oos_sharpe)\n\
      oos_mean_sharpe = np.mean(results)\nprint(f\"OOS Walk-Forward Sharpe: {oos_mean_sharpe:.2f}\")\n"
  provenance:
    source: academic
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-SURV-001
  statement: '幸存者偏差（Survivorship Bias）：使用当前市场成分股作为历史回测股票池， 会遗漏曾经存在但后来退市、摘牌或被合并的股票，系统性高估策略历史收益率。 回测股票池必须使用历史时点快照（point-in-time
    universe）。

    '
  severity: fatal
  capability_tags:
    activities:
    - backtesting
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - data_collection
    - data_filtering
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: data_collection
    constraint_context: universe construction must use point-in-time historical membership, not current
  evidence_refs:
  - type: community_validated
    ref: 雪球《量化回测中的幸存者偏差现象》；BigQuant《科学回测中的大学问》
    url: https://zhuanlan.zhihu.com/p/75909636
  reference_code:
    bad_example: '# BAD: 当前股票池做历史回测（含幸存者偏差）

      universe = get_current_stocks()  # 只有活着的股票

      backtest_result = engine.run(universe, start=''2015-01-01'')

      '
    good_example: "# GOOD: 按历史日期获取时点成员，含已退市股票\nfor date in backtest_dates:\n    universe = db.get_universe_as_of(date)  #\
      \ 历史快照\n    # 包含该时点已上市的全量股票（含后来退市的）\n    signals = factor_model.score(universe, date)\n"
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-SURV-002
  statement: 'In-Sample / Out-of-Sample 划分：策略开发、参数选择必须在样本内完成， 样本外数据仅用于最终验证，不可多次"看"样本外数据后继续调优 （会将样本外变为新的样本内，重蹈过拟合）。

    '
  severity: high
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - backtesting
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: backtesting
    constraint_context: OOS data must be truly held-out; do not use OOS results to tune parameters
  evidence_refs:
  - type: academic
    ref: Bailey et al. (2014) DSR 论文；华泰证券金工深度报告《量化策略过拟合风险分析》（2018）
  reference_code:
    bad_example: "# BAD: 用 OOS 结果继续优化参数（OOS 变成了 IS）\nfor i in range(10):\n    oos_sharpe = backtest_oos(params)\n    if oos_sharpe\
      \ < 1.0:\n        params = retune(params)  # 每次都看 OOS 调参\n"
    good_example: '# GOOD: OOS 数据封存，只在最终验证时解封一次

      # 开发期只使用 IS 数据

      params = optimize_in_sample(data.loc[:IS_END])

      # 最终验证：解封 OOS，只看一次

      final_result = backtest(params, data.loc[OOS_START:])

      print(f"Final OOS Sharpe: {final_result[''sharpe'']:.2f}")

      '
  provenance:
    source: academic
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-SURV-003
  statement: '停牌/缺失数据的填充策略：停牌日价格不可简单用前一日收盘价 forward-fill， 因为这会在复盘时造成"零成交量"日参与了因子计算和信号生成。 应在因子计算层显式过滤缺失交易日，不填充。

    '
  severity: high
  capability_tags:
    activities:
    - backtesting
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - data_filtering
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: data_filtering
    constraint_context: zero-volume days must be excluded from factor computation, not forward-filled
  evidence_refs:
  - type: community_validated
    ref: qlib 文档 Missing Data Handling；alphalens 文档 factor_data 清洗说明
    url: https://qlib.readthedocs.io/en/latest/component/data.html
  reference_code:
    bad_example: '# BAD: forward-fill 停牌日，停牌日参与计算

      df[''close''] = df[''close''].fillna(method=''ffill'')

      df[''momentum''] = df[''close''].pct_change(20)  # 含停牌日

      '
    good_example: '# GOOD: 只在有成交量的日子计算因子

      df = df[df[''volume''] > 0].copy()

      df[''momentum''] = df[''close''].pct_change(20)

      # 因子序列自然跳过停牌日，不含假数据

      '
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-SURV-004
  statement: '异常值（Extreme Value）污染：原始市场数据可能含有数据源错误（如除权未 及时调整、手工录入错误导致的极端价格），不清洗直接进入因子计算会产生 极端信号，污染整个横截面。应在 pipeline 入口处过滤
    3-sigma 异常值。

    '
  severity: high
  capability_tags:
    activities:
    - backtesting
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - data_filtering
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: data_filtering
    constraint_context: extreme return outliers (>3σ) from data errors must be filtered at ingestion
  evidence_refs:
  - type: community_validated
    ref: alphalens 文档 winsorize 说明；知乎《量化因子研究流程：异常值处理》
    url: https://github.com/quantopian/alphalens
  reference_code:
    bad_example: '# BAD: 不清洗异常值，一个错误点污染整列

      returns = df[''close''].pct_change()

      factor = returns.rolling(20).mean()  # 含极端异常值

      '
    good_example: '# GOOD: 3-sigma winsorize 过滤异常值

      returns = df[''close''].pct_change()

      mean, std = returns.mean(), returns.std()

      returns = returns.clip(mean - 3*std, mean + 3*std)

      factor = returns.rolling(20).mean()

      '
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-COST-001
  statement: '交易成本（佣金 + 印花税/转让税 + 过户费）必须在回测初始化时强制配置， 不可使用零成本默认值。忽略成本的回测策略绩效指标具有欺骗性， 高换手率策略尤其严重（单边往返成本往往吞噬 50%+ 的毛收益）。

    '
  severity: fatal
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - backtesting
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: backtesting
    constraint_context: commission + tax must be configured; zero-cost default is forbidden
  evidence_refs:
  - type: community_validated
    ref: backtrader 文档 CommissionScheme；zipline 文档 TradingAlgorithm commission；vectorbt 文档 Portfolio 成本配置
    url: https://www.backtrader.com/docu/commission-schemes/commission-schemes/
  reference_code:
    bad_example: '# BAD: 零成本默认，收益虚高

      cerebro = bt.Cerebro()

      # 没有 addcommissioninfo，默认佣金为 0

      '
    good_example: "# GOOD: 明确配置成本（以 backtrader 为例）\ncomminfo = bt.CommissionScheme(\n    commission=0.001,   # 佣金 0.1% 双向（保守估计）\n\
      \    mult=1.0,\n    margin=None,\n    percabs=False,\n)\ncerebro.broker.addcommissioninfo(comminfo)\n# 注: 印花税等税费需在 Order\
      \ 层额外计算（backtrader 不自带）\n"
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-COST-002
  statement: '滑点（Slippage）建模：回测若无滑点，假设每笔订单以理想价格成交， 高频策略在实盘中会因成交价劣化而产生严重亏损。至少应配置固定点差 或比例滑点；大单应使用成交量比例模型（如不超过日成交量 5%）。

    '
  severity: high
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - order_execution
    - backtesting
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: order_execution
    constraint_context: slippage model must be configured; volume-participation cap required for large orders
  evidence_refs:
  - type: community_validated
    ref: zipline-reloaded 文档 SlippageModel；backtrader Slippage 文档
    url: https://zipline-reloaded.readthedocs.io/en/latest/api-reference.html#zipline.finance.slippage.FixedSlippage
  reference_code:
    bad_example: '# BAD: 无滑点模型，大单零冲击

      algo.set_slippage(slippage.NoSlippage())

      '
    good_example: "# GOOD: 成交量限制 + 固定比例滑点\nalgo.set_slippage(slippage.VolumeShareSlippage(\n    volume_limit=0.05,   # 每笔不超过日成交量的\
      \ 5%\n    price_impact=0.1     # 价格冲击系数\n))\n"
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-COST-003
  statement: '换手率（Turnover）必须在回测绩效报告中展示并与成本关联分析。 月换手率超过 50%（年化 600%+）时，策略净收益对成本假设极度敏感， 每 10bps 成本变化可能改变策略盈亏结论，必须做成本敏感性分析。

    '
  severity: high
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - backtesting
    - portfolio_simulation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: portfolio_simulation
    constraint_context: turnover rate must be reported; cost sensitivity analysis required for high-turnover strategies
  evidence_refs:
  - type: academic
    ref: Barber & Odean (2000) Trading Hazardous to Wealth；pyfolio 文档 show_perf_stats 换手率指标
    url: https://pyfolio.ml4trading.io/
  reference_code:
    bad_example: '# BAD: 只报告 Sharpe 和年化收益，不看换手率

      print(f"Sharpe: {sharpe:.2f}, Ann Return: {ann_ret:.1%}")

      '
    good_example: "# GOOD: 换手率 + 成本敏感性分析\nprint(f\"Sharpe: {sharpe:.2f}, Ann Return: {ann_ret:.1%}\")\nprint(f\"Annual Turnover:\
      \ {annual_turnover:.0%}\")\n# 敏感性分析\nfor cost_bps in [5, 10, 20, 30]:\n    adj_ret = ann_ret - annual_turnover * (cost_bps\
      \ / 10000) * 2\n    print(f\"  @ {cost_bps}bps cost: adj return = {adj_ret:.1%}\")\n"
  provenance:
    source: academic
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-COST-004
  statement: '仓位规模化（Position Sizing）必须纳入资金量约束：回测应模拟固定资金量 下的实际持仓股数（取整），而非假设可以持有小数股。 对小盘股，最小交易单位（A股：100股/手）会导致实际可持仓量与目标权重 产生偏差，应在回测中模拟取整效应。

    '
  severity: medium
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - order_execution
    - portfolio_simulation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: order_execution
    constraint_context: position sizing must respect minimum lot size and round to integers
  evidence_refs:
  - type: community_validated
    ref: backtrader Sizer 文档；zipline-reloaded order() 整数仓位说明
    url: https://www.backtrader.com/docu/sizers/sizers/
  reference_code:
    bad_example: '# BAD: 持有 23.7 股（不可能）

      target_weight = 0.05

      shares = portfolio_value * target_weight / price  # 可能是小数

      '
    good_example: '# GOOD: 取整到最小交易单位（A股：100股/手）

      LOT_SIZE = 100  # A股最小单位

      target_weight = 0.05

      raw_shares = portfolio_value * target_weight / price

      shares = int(raw_shares // LOT_SIZE) * LOT_SIZE

      '
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-TIME-001
  statement: '时间戳时区统一：多数据源合并时，UTC vs 本地时间混用是常见数据腐败源。 所有时间戳必须在 pipeline 入口处统一转换为同一时区（推荐 UTC 存储， 市场本地时区展示），不可在 pipeline 中途混用不同时区。

    '
  severity: high
  capability_tags:
    activities:
    - backtesting
    - data-sourcing
  applicable_conditions:
    blueprint_has_stage:
    - data_collection
    - data_filtering
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: data_collection
    constraint_context: all timestamps must be normalized to UTC at ingestion boundary
  evidence_refs:
  - type: community_validated
    ref: pandas Timestamp 文档时区处理；zipline-reloaded trading_calendar 文档
  reference_code:
    bad_example: '# BAD: 不同数据源时区混用（一个 UTC，一个上海时间）

      df_source_a[''datetime''] = pd.to_datetime(df_source_a[''ts''])    # UTC

      df_source_b[''datetime''] = pd.to_datetime(df_source_b[''time''])  # Asia/Shanghai

      merged = df_source_a.merge(df_source_b, on=''datetime'')  # 时间对齐错误！

      '
    good_example: "# GOOD: 所有数据在入口处统一为 UTC\ndf_source_a['datetime'] = pd.to_datetime(df_source_a['ts'], utc=True)\ndf_source_b['datetime']\
      \ = pd.to_datetime(\n    df_source_b['time']\n).dt.tz_localize('Asia/Shanghai').dt.tz_convert('UTC')\nmerged = df_source_a.merge(df_source_b,\
      \ on='datetime')\n"
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-TIME-002
  statement: '交易日历对齐：合并不同市场或不同频率数据时（如日线价格 + 周频因子）， 必须使用明确的交易日历进行 reindex/merge，不可使用 outer join 后 fillna， 否则会在非交易日（节假日）创建虚假数据行。

    '
  severity: high
  capability_tags:
    activities:
    - backtesting
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - data_filtering
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: data_filtering
    constraint_context: calendar-aligned reindex must be used when merging multi-frequency data
  evidence_refs:
  - type: community_validated
    ref: pandas_market_calendars 文档；exchange_calendars 文档
    url: https://github.com/rsheftel/pandas_market_calendars
  reference_code:
    bad_example: '# BAD: outer join 后 fillna 产生非交易日假数据

      merged = price_df.join(factor_df, how=''outer'').fillna(method=''ffill'')

      '
    good_example: '# GOOD: 用交易日历 reindex，只保留真实交易日

      import exchange_calendars as xcals

      cal = xcals.get_calendar(''XSHG'')

      trading_dates = cal.sessions_in_range(start, end)

      price_aligned = price_df.reindex(trading_dates, method=''ffill'')

      factor_aligned = factor_df.reindex(trading_dates, method=''ffill'')

      merged = price_aligned.join(factor_aligned)

      '
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-TIME-003
  statement: '增量更新边界校验：历史数据增量更新时，必须从数据库查询已存最新日期， 仅下载该日期之后的数据。若重新下载已有数据并追加，会产生时间戳重复行， 导致回测时序错误。更新前后必须校验无重复 (index.duplicated().any()
    == False)。

    '
  severity: high
  capability_tags:
    activities:
    - data-sourcing
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - data_collection
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: data_collection
    constraint_context: incremental update must query last stored date to avoid duplicate rows
  evidence_refs:
  - type: community_validated
    ref: qlib 文档 UpdaterD；akshare 增量更新最佳实践
  reference_code:
    bad_example: '# BAD: 每次全量下载再追加，产生重复行

      df_new = download_all(start=''2015-01-01'')

      db.append(df_new)  # 已有数据被重复追加！

      '
    good_example: "# GOOD: 查询最新日期，仅增量更新\nlast_date = db.get_latest_date(table='daily_prices')\ndf_new = download_since(last_date\
      \ + timedelta(days=1))\nif not df_new.empty:\n    assert not df_new.index.duplicated().any()\n    db.append(df_new)\n"
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-TIME-004
  statement: '回测绩效归因失真：基准（Benchmark）选择不当会使 Alpha/Beta 计算失真。 应选用策略实际可投资的被动基准（如 HS300 ETF），而非不可直接投资的 价格指数（如 HS300 指数）。价格指数不含股息再投资，会低估持仓基准收益。

    '
  severity: medium
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - backtesting
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: backtesting
    constraint_context: performance attribution benchmark must be investable (ETF/total-return index)
  evidence_refs:
  - type: community_validated
    ref: pyfolio-reloaded 文档 benchmark_returns；empyrical 文档 alpha_beta 说明
    url: https://pyfolio.ml4trading.io/
  reference_code:
    bad_example: '# BAD: 用价格指数作为基准（不含分红）

      benchmark = get_index_price(''000300.SH'')  # 沪深300价格指数，无分红

      alpha, beta = calc_alpha_beta(strategy_returns, benchmark)

      '
    good_example: '# GOOD: 用全收益指数或 ETF 作为基准

      # 000300.SH 是价格指数; H00300.SH 是全收益指数

      benchmark = get_index_price(''H00300.SH'')  # 沪深300全收益

      # 或使用 510300.SH (华泰柏瑞沪深300 ETF)

      alpha, beta = calc_alpha_beta(strategy_returns, benchmark)

      '
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-PERF-001
  statement: '最大回撤（Max Drawdown）计算必须使用净值序列（portfolio value）， 不可用累计收益率序列代替。若使用对数收益率累加，会低估回撤深度 （因对数收益率在下跌时会比简单收益率偏小）。

    '
  severity: medium
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - backtesting
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: backtesting
    constraint_context: max drawdown must be computed from portfolio NAV, not log-return cumsum
  evidence_refs:
  - type: community_validated
    ref: empyrical 文档 max_drawdown；pyfolio 文档 drawdown_series
    url: https://github.com/quantopian/empyrical
  reference_code:
    bad_example: '# BAD: 用对数收益率累加计算回撤（低估）

      cum_log_returns = log_returns.cumsum()

      max_dd = (cum_log_returns - cum_log_returns.cummax()).min()

      '
    good_example: '# GOOD: 用净值序列计算回撤

      nav = (1 + returns).cumprod()

      rolling_max = nav.cummax()

      drawdown = (nav - rolling_max) / rolling_max

      max_drawdown = drawdown.min()

      '
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-PERF-002
  statement: 'Sharpe Ratio 年化化约定：年化 Sharpe = 日 Sharpe × sqrt(252)（股票，252 交易日） 或 × sqrt(365)（加密货币，365日）。不同系统默认不同，跨系统对比前必须 确认年化因子，否则
    Sharpe 不可比。

    '
  severity: medium
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - backtesting
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: backtesting
    constraint_context: annualization factor (252 for equities, 365 for crypto) must be documented
  evidence_refs:
  - type: community_validated
    ref: empyrical 文档 sharpe_ratio annualization；backtrader Analyzer sharpe；qlib 绩效分析文档
    url: https://github.com/quantopian/empyrical
  reference_code:
    bad_example: '# BAD: 不注明年化因子，不同系统 Sharpe 不可比

      sharpe = daily_returns.mean() / daily_returns.std()

      '
    good_example: '# GOOD: 明确年化因子

      TRADING_DAYS = 252  # 股票: 252; 加密: 365

      daily_sharpe = daily_returns.mean() / daily_returns.std()

      annual_sharpe = daily_sharpe * np.sqrt(TRADING_DAYS)

      print(f"Annualized Sharpe (×√{TRADING_DAYS}): {annual_sharpe:.2f}")

      '
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-PERF-003
  statement: 'Calmar Ratio / Sortino Ratio 优于 Sharpe Ratio 作为风险调整收益指标： Sharpe 假设收益正态分布，A 股/加密市场的收益分布显著左偏（肥尾）， 会低估下行风险。量化评估应同时报告
    Sortino（仅下行波动）和 Calmar（年化收益/最大回撤），不应单一依赖 Sharpe。

    '
  severity: medium
  capability_tags:
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - backtesting
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: backtesting
    constraint_context: report Sortino and Calmar ratios in addition to Sharpe for non-normal return distributions
  evidence_refs:
  - type: academic
    ref: empyrical 文档 sortino_ratio、calmar_ratio；Sortino & Price (1994) Performance Measurement in a Downside Risk Framework
    url: https://github.com/quantopian/empyrical
  reference_code:
    bad_example: '# BAD: 仅报告 Sharpe

      report = {''sharpe'': calc_sharpe(returns)}

      '
    good_example: "# GOOD: 多维度风险调整收益\nimport empyrical\nreport = {\n    'sharpe':  empyrical.sharpe_ratio(returns, annualization=252),\n\
      \    'sortino': empyrical.sortino_ratio(returns, annualization=252),\n    'calmar':  empyrical.calmar_ratio(returns),\n\
      \    'max_dd':  empyrical.max_drawdown(returns),\n}\n"
  provenance:
    source: academic
  _source_file: backtesting/constraints.yaml
- id: SHARED-BT-PERF-004
  statement: '回测绩效归因应拆解为：alpha（主动收益）、beta（市场收益）、 因子暴露收益（style/sector）和特异性收益（stock selection）。 不做归因的回测无法区分"策略优秀"与"顺风行情恰好 beta
    对了"。

    '
  severity: medium
  capability_tags:
    activities:
    - backtesting
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - backtesting
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: backtesting
    constraint_context: return attribution (alpha vs beta vs factor) is required for strategy validation
  evidence_refs:
  - type: community_validated
    ref: pyfolio-reloaded 文档 performance attribution；empyrical alpha_beta 接口
    url: https://pyfolio.ml4trading.io/
  reference_code:
    bad_example: '# BAD: 只看总收益，不做归因

      print(f"Total Return: {(nav[-1]/nav[0]-1):.1%}")

      '
    good_example: "# GOOD: 简单 alpha/beta 归因\nimport empyrical\nalpha, beta = empyrical.alpha_beta(strategy_returns, benchmark_returns,\n\
      \                                    annualization=252)\ntotal_return = empyrical.annual_return(strategy_returns)\n\
      market_contribution = beta * empyrical.annual_return(benchmark_returns)\nalpha_contribution = total_return - market_contribution\n\
      print(f\"Total: {total_return:.1%}, Market β: {market_contribution:.1%}, α: {alpha_contribution:.1%}\")\n"
  provenance:
    source: community_validated
  _source_file: backtesting/constraints.yaml
- id: SHARED-FR-IC-001
  statement: 'IC（信息系数）是衡量因子预测能力的核心指标，定义为因子值与 下期收益率的 Spearman 秩相关系数（ICIR = IC / std(IC)）。 IC 绝对值 > 0.05 视为有预测能力的初步证据，ICIR >
    0.5 视为稳定。 不计算 IC 直接报告回测绩效是因子有效性证明缺失的典型问题。

    '
  severity: high
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: IC/ICIR must be computed to validate factor predictive power
  evidence_refs:
  - type: community_validated
    ref: alphalens-reloaded 文档 mean_information_coefficient；qlib 因子分析文档 IC 指标
    url: https://alphalens.ml4trading.io/
  reference_code:
    bad_example: '# BAD: 直接进回测，不验证 IC

      backtest_result = engine.run(factor_signal)

      print(f"Sharpe: {backtest_result[''sharpe'']}")  # 不知道 IC 是否显著

      '
    good_example: "# GOOD: 先分析 IC，再决定是否进回测\nimport alphalens\nfactor_data = alphalens.utils.get_clean_factor_and_forward_returns(\n\
      \    factor, prices, periods=[1, 5, 20])\nic = alphalens.performance.factor_information_coefficient(factor_data)\nicir\
      \ = ic.mean() / ic.std()\nprint(f\"Mean IC: {ic.mean():.3f}, ICIR: {icir:.3f}\")\nif abs(ic.mean()) < 0.02:\n    print(\"\
      WARNING: factor IC too weak, consider dropping\")\n"
  provenance:
    source: community_validated
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-IC-002
  statement: 'IC 衰减（IC Decay）分析：因子预测能力通常随持仓期增长而衰减。 应计算 1/5/10/20 日 IC 序列，识别因子的最优持仓期。 IC 在1日高但20日迅速衰减的因子是短期因子，不适合月度换仓策略； 反之亦然。使用错误的持仓期会严重损害因子实盘表现。

    '
  severity: high
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: IC decay curve across holding periods must be computed to determine optimal rebalance frequency
  evidence_refs:
  - type: community_validated
    ref: alphalens 文档 factor_rank_autocorrelation；知乎《因子 IC 衰减分析方法》
    url: https://alphalens.ml4trading.io/
  reference_code:
    bad_example: '# BAD: 只计算单一持仓期 IC，不知道最优期

      ic_1d = spearmanr(factor.values, returns_1d.values).correlation

      '
    good_example: "# GOOD: 多持仓期 IC 衰减曲线\nperiods = [1, 5, 10, 20, 60]\nic_decay = {}\nfor p in periods:\n    ret = prices.pct_change(p).shift(-p)\n\
      \    ic_decay[p] = spearmanr(\n        factor.rank().dropna(), ret.rank().dropna()\n    ).correlation\noptimal_period\
      \ = max(ic_decay, key=lambda k: abs(ic_decay[k]))\nprint(f\"IC decay: {ic_decay}\")\nprint(f\"Optimal holding period:\
      \ {optimal_period} days\")\n"
  provenance:
    source: community_validated
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-IC-003
  statement: 'Harvey, Liu & Zhu (2016) 警告：学术界已发现 300+ 个"显著"因子， 其中大量是多重检验下的误发现（False Discovery）。因子有效性要求： t-stat > 3.0（而非传统的
    1.96）；或在不同时段/市场独立复现； 或有清晰的经济学逻辑。不满足上述条件的因子极可能是数据挖掘产物。

    '
  severity: high
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: factor t-stat must exceed 3.0 to account for multiple testing; economic rationale required
  evidence_refs:
  - type: academic
    ref: Harvey, C.R., Liu, Y. & Zhu, H. (2016). '...and the Cross-Section of Expected Returns.' Review of Financial Studies,
      29(1), 5-68.
    url: https://doi.org/10.1093/rfs/hhv059
  reference_code:
    bad_example: "# BAD: t-stat > 2.0 就认为因子显著（未修正多重检验）\nt_stat = ic.mean() / (ic.std() / np.sqrt(len(ic)))\nif t_stat > 2.0:\n\
      \    print(\"Factor is significant!\")  # 错误标准\n"
    good_example: "# GOOD: 使用更严格的 t-stat 阈值\nt_stat = ic.mean() / (ic.std() / np.sqrt(len(ic)))\nif t_stat > 3.0:\n    print(f\"\
      Factor likely significant (t={t_stat:.2f} > 3.0)\")\nelse:\n    print(f\"Factor may be data-mining artifact (t={t_stat:.2f})\"\
      )\n    print(\"Require: OOS replication or economic rationale\")\n"
  provenance:
    source: academic
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-IC-004
  statement: '因子换手率（Factor Turnover）控制：高 IC 但高换手率的因子，在扣除 交易成本后净 IC 可能为负。应计算换手率调整后的有效 IC： net_IC = IC - turnover × cost_per_turn。目标换手率
    ≤ 50%（月频）。

    '
  severity: high
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
    - portfolio_simulation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: cost-adjusted IC (net IC) must be computed; high-turnover factors may be unprofitable after costs
  evidence_refs:
  - type: community_validated
    ref: alphalens 文档 factor_rank_autocorrelation（换手率代理）；华泰证券金工报告《因子换手率与成本匹配》
    url: https://alphalens.ml4trading.io/
  reference_code:
    bad_example: '# BAD: 高 IC 因子但换手率 200%/月，扣成本后是负的

      print(f"IC: {ic_mean:.3f}")  # 看起来很好

      # 但没有计算换手率调整后的净 IC

      '
    good_example: "# GOOD: 计算成本调整后净 IC\nMONTHLY_COST_PER_TURN = 0.002  # 0.2% per one-way turn\nautocorr = factor_data['factor'].groupby(level='date').apply(\n\
      \    lambda x: x.rank().autocorr()\n).mean()\nmonthly_turnover = 1 - autocorr  # 换手率估算\nnet_ic = ic_mean - monthly_turnover\
      \ * MONTHLY_COST_PER_TURN * 2\nprint(f\"Gross IC: {ic_mean:.3f}, Net IC after costs: {net_ic:.3f}\")\n"
  provenance:
    source: community_validated
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-IC-005
  statement: '因子衰减期（Half-life）是因子信号强度的核心参数，直接决定最优再平衡频率。 半衰期 < 5 日：日频或周频换仓；5-20 日：周频或双周；> 20 日：月频换仓。 错误地对短期因子使用月频换仓，会导致大量 alpha
    在持仓期内消散。

    '
  severity: medium
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: factor half-life determines optimal rebalance frequency; must be computed before deployment
  evidence_refs:
  - type: community_validated
    ref: qlib 文档 information coefficient 分析；mlfinlab 文档 factor decay
    url: https://qlib.readthedocs.io/
  reference_code:
    bad_example: '# BAD: 直接月频换仓，不管因子半衰期

      rebalance_freq = ''monthly''

      # 如果因子半衰期是 3 天，月频换仓 alpha 早消散了

      '
    good_example: "# GOOD: 根据 IC 衰减曲线决定换仓频率\nic_by_period = {1: 0.08, 5: 0.06, 10: 0.04, 20: 0.02}\nhalf_life = next((p for\
      \ p, ic in ic_by_period.items()\n                 if ic < ic_by_period[1] * 0.5), 20)\nif half_life <= 5:\n    rebalance_freq\
      \ = 'weekly'\nelif half_life <= 15:\n    rebalance_freq = 'biweekly'\nelse:\n    rebalance_freq = 'monthly'\nprint(f\"\
      Factor half-life: {half_life} days → rebalance: {rebalance_freq}\")\n"
  provenance:
    source: community_validated
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-NEUT-001
  statement: '行业中性化（Industry Neutralization）：因子值若不对行业均值中性化， 因子收益中会混入行业轮动收益，难以判断是因子本身还是行业暴露驱动了收益。 行业中性化操作：factor_neutral =
    factor - industry_mean(factor)。

    '
  severity: high
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: industry neutralization must be applied before factor IC computation and ranking
  evidence_refs:
  - type: community_validated
    ref: 华泰证券金工《多因子系列研究：因子的行业中性化》；alphalens 文档 groupby sector
    url: https://alphalens.ml4trading.io/
  reference_code:
    bad_example: '# BAD: 未中性化，选股偏向某行业

      df[''factor_rank''] = df.groupby(''date'')[''factor''].rank(pct=True)

      '
    good_example: '# GOOD: 行业中性化后再排名

      df[''industry_mean''] = df.groupby([''date'', ''industry''])[''factor''].transform(''mean'')

      df[''factor_neutral''] = df[''factor''] - df[''industry_mean'']

      df[''factor_rank''] = df.groupby(''date'')[''factor_neutral''].rank(pct=True)

      '
  provenance:
    source: community_validated
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-NEUT-002
  statement: '市值中性化（Market Cap Neutralization）：小盘股效应（小盘跑赢大盘） 是金融史上最持久的 anomaly 之一，会污染几乎所有未中性化的因子。 若因子与市值高度相关，选股会系统性偏向小盘，收益来自市值暴露而非因子本身。
    需同时进行行业和市值中性化（Fama-MacBeth 回归或残差法）。

    '
  severity: high
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: size neutralization (market cap) must be applied together with industry neutralization
  evidence_refs:
  - type: academic
    ref: Fama, E.F. & French, K.R. (1992). 'The Cross-Section of Expected Stock Returns.' Journal of Finance, 47(2), 427-465.
    url: https://doi.org/10.1111/j.1540-6261.1992.tb04398.x
  reference_code:
    bad_example: '# BAD: 只做行业中性化，未做市值中性化

      df[''factor_neutral''] = df[''factor''] - df.groupby([''date'', ''industry''])[''factor''].transform(''mean'')

      '
    good_example: "# GOOD: Fama-MacBeth 式双重中性化（行业 + 市值）\nimport statsmodels.api as sm\n\ndef neutralize(df_date):\n    X =\
      \ pd.get_dummies(df_date['industry'], drop_first=True)\n    X['log_mcap'] = np.log(df_date['market_cap'])\n    X = sm.add_constant(X)\n\
      \    y = df_date['factor']\n    model = sm.OLS(y, X).fit()\n    return model.resid  # 残差即为双重中性化后因子值\n\ndf['factor_neutral']\
      \ = df.groupby('date').apply(neutralize).reset_index(level=0, drop=True)\n"
  provenance:
    source: academic
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-NEUT-003
  statement: '异常值处理（Winsorize/MAD）：因子原始值通常含有极端值，极端值会扭曲 分组分析（如 Q1/Q10 十分位）。应对原始因子值做 Winsorize（截尾至 [1%, 99%] 或 3-sigma）或 MAD（中位数绝对偏差）缩尾，然后再排名/中性化。

    '
  severity: high
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
    - data_filtering
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: factor winsorization must precede ranking and neutralization to handle outliers
  evidence_refs:
  - type: community_validated
    ref: alphalens 文档 winsorize 参数；华泰证券《多因子研究：异常值和极端值处理》
    url: https://alphalens.ml4trading.io/
  reference_code:
    bad_example: '# BAD: 不处理极端值直接排名

      df[''rank''] = df.groupby(''date'')[''factor''].rank(pct=True)

      # 1% 极端值会占据排名两端，扭曲分组

      '
    good_example: "# GOOD: 先 Winsorize 再排名\ndef winsorize_factor(x, limits=(0.01, 0.99)):\n    lo, hi = x.quantile(limits[0]),\
      \ x.quantile(limits[1])\n    return x.clip(lo, hi)\n\ndf['factor_wins'] = df.groupby('date')['factor'].transform(winsorize_factor)\n\
      df['rank'] = df.groupby('date')['factor_wins'].rank(pct=True)\n"
  provenance:
    source: community_validated
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-NEUT-004
  statement: '因子正交化（Factor Orthogonalization）：当多个因子共同用于合成打分时， 高相关因子的合成等效于对单一因子过度权重，稀释信号多样性。 应在合成前对因子做施密特正交化或 PCA，消除因子间的多重共线性。

    '
  severity: medium
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: factor correlation matrix must be checked; highly correlated factors (r>0.7) should be orthogonalized
  evidence_refs:
  - type: community_validated
    ref: mlfinlab 文档 orthogonal_factors；华泰证券金工《多因子合成》；知乎《量化因子正交化原理》
    url: https://mlfinlab.readthedocs.io/
  reference_code:
    bad_example: '# BAD: 直接等权合成高相关因子（等效于单一因子偏重）

      composite = 0.5 * factor_a + 0.5 * factor_b

      # 如果 corr(A, B) = 0.9，合成等效于 1× factor_a

      '
    good_example: "# GOOD: 检查相关性，对高相关因子做正交化\ncorr = factor_matrix.corr()\nprint(f\"Factor correlation:\\n{corr}\")\nif corr.loc['A',\
      \ 'B'] > 0.7:\n    # Gram-Schmidt 正交化: 去掉 B 中 A 的成分\n    beta = np.cov(factor_b, factor_a)[0,1] / np.var(factor_a)\n\
      \    factor_b_ortho = factor_b - beta * factor_a\n    composite = 0.5 * factor_a + 0.5 * factor_b_ortho\nelse:\n   \
      \ composite = 0.5 * factor_a + 0.5 * factor_b\n"
  provenance:
    source: community_validated
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-NEUT-005
  statement: '缺失数据填充策略：因子计算中的 NaN（停牌/新股/数据缺口）若用截面均值填充 会引入 lookahead bias（均值本身含未来信息）；若完全删除会产生幸存者偏差； 正确做法是用截面中位数（当日所有股票的中位数，不依赖未来）或将该股当日排除。

    '
  severity: medium
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
    - data_filtering
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: data_filtering
    constraint_context: NaN imputation in factors must use cross-sectional median (not forward-fill or mean)
  evidence_refs:
  - type: community_validated
    ref: 华泰证券金工《多因子研究：缺失数据处理》；qlib 文档 missing value handling
  reference_code:
    bad_example: '# BAD: 用前向填充或全局均值填 NaN

      df[''factor''] = df[''factor''].fillna(method=''ffill'')  # 含未来信息

      # 或: df[''factor''] = df[''factor''].fillna(df[''factor''].mean())

      '
    good_example: "# GOOD: 用截面中位数填充（仅当日所有股票的中位数）\ndf['factor'] = df.groupby('date')['factor'].transform(\n    lambda x: x.fillna(x.median())\n\
      )\n"
  provenance:
    source: community_validated
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-PORT-001
  statement: '分层分析（Quantile Analysis）：因子评估应使用 Q1/Q5（五分位）或 Q1/Q10（十分位）分组的多空收益差（top minus bottom spread）作为 主要评估指标，而非简单的多头收益。Q1
    多 Q5 空的"单调性"检验是 因子有效性的核心证据：单调递增/递减 > 非单调 >> 仅多头有效。

    '
  severity: high
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: factor analysis must show quantile-by-quantile monotonic returns as the primary validity test
  evidence_refs:
  - type: community_validated
    ref: alphalens 文档 mean_return_by_quantile；华泰证券《多因子量化策略研究》分层测试章节
    url: https://alphalens.ml4trading.io/
  reference_code:
    bad_example: '# BAD: 只看多头（Top 20%）收益，不看空头

      top_20pct = df[df[''factor_rank''] > 0.8]

      print(f"Top 20% return: {top_20pct[''return''].mean():.3f}")

      '
    good_example: "# GOOD: 十分位分组 + 单调性检验\ndf['decile'] = df.groupby('date')['factor_rank'].transform(\n    lambda x: pd.qcut(x,\
      \ 10, labels=False, duplicates='drop'))\nreturns_by_decile = df.groupby('decile')['return'].mean()\nprint(returns_by_decile)\n\
      # 检验单调性: 应从 Q1 到 Q10 单调递增或递减\nmonotone = returns_by_decile.is_monotonic_increasing or \\\n           returns_by_decile.is_monotonic_decreasing\n\
      print(f\"Monotonic: {monotone}\")\n"
  provenance:
    source: community_validated
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-PORT-002
  statement: 'Alpha 衰减测试（Alpha Decay Test）：因子的月度 IC 在不同时段（牛市/熊市/ 震荡市）的稳定性是因子鲁棒性的重要证据。IC 仅在某个特定市场状态下有效 的因子不适合全天候部署；应分段（rolling
    12M）展示 IC 时序， 识别因子失效期。

    '
  severity: medium
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: rolling IC time series must be plotted to identify regime-dependent effectiveness
  evidence_refs:
  - type: community_validated
    ref: alphalens 文档 plot_ic_ts；华泰证券《因子有效性的稳定性研究》
    url: https://alphalens.ml4trading.io/
  reference_code:
    bad_example: '# BAD: 只报告全样本平均 IC

      mean_ic = ic_series.mean()

      print(f"Mean IC: {mean_ic:.3f}")  # 看不出失效期

      '
    good_example: '# GOOD: 滚动 12 个月 IC 时序图

      rolling_ic = ic_series.rolling(12).mean()

      import matplotlib.pyplot as plt

      rolling_ic.plot(title=''Rolling 12M Mean IC'')

      plt.axhline(0, color=''red'', linestyle=''--'')

      # 找出 IC 持续负的区间 → 因子失效期

      failure_periods = rolling_ic[rolling_ic < 0]

      print(f"Factor failure periods: {failure_periods.index.tolist()}")

      '
  provenance:
    source: community_validated
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-PORT-003
  statement: '换仓成本感知（Turnover-Aware Selection）：因子排名靠近中间地带（49-51 分位） 的股票，排名小幅波动就会触发换仓，产生大量无效交易成本。 应在选股时设置换仓缓冲区（buffer zone）：只在排名变化超过阈值时才换仓。

    '
  severity: medium
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
    - portfolio_simulation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: buffer zone around ranking thresholds required to reduce unnecessary turnover
  evidence_refs:
  - type: community_validated
    ref: 知乎《量化选股中的换手率控制》；qlib 文档 TopkDropoutStrategy
    url: https://qlib.readthedocs.io/
  reference_code:
    bad_example: '# BAD: 排名变化 1% 就换仓，换手率极高

      TOPK = 50

      new_picks = factor_rank.nlargest(TOPK).index

      trades = set(new_picks) - set(current_holdings)

      '
    good_example: '# GOOD: 设置 buffer zone，只换出跌出前 60 名的持仓

      TOPK = 50

      BUFFER = 10  # 持仓跌出前 60 才换出，新进必须进前 40

      hold = [s for s in current_holdings if factor_rank[s] <= TOPK + BUFFER]

      add = [s for s in factor_rank.index[:TOPK - BUFFER] if s not in hold]

      new_picks = hold + add

      '
  provenance:
    source: community_validated
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-PORT-004
  statement: '分组收益的统计显著性（Bootstrap 检验）：因子分层收益差（Q1-Q5 spread） 即使在历史数据上很大，也可能是偶然，需要 bootstrap 或 t-test 检验 显著性（p-value < 0.05）。小样本回测期（<
    3年）的分层收益尤其不可靠。

    '
  severity: medium
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: quantile spread statistical significance must be tested; short backtests (<3yr) are unreliable
  evidence_refs:
  - type: academic
    ref: Harvey et al. (2016) Review of Financial Studies；alphalens 文档统计检验
  reference_code:
    bad_example: '# BAD: 只看均值，不检验显著性

      spread = top_quantile_return - bottom_quantile_return

      print(f"Q1-Q5 spread: {spread:.3f}")

      '
    good_example: "# GOOD: t-test 检验均值是否显著异于零\nfrom scipy import stats\nq1_returns = factor_data[factor_data['quantile'] ==\
      \ 1]['forward_return']\nq5_returns = factor_data[factor_data['quantile'] == 5]['forward_return']\nt_stat, p_val = stats.ttest_ind(q1_returns,\
      \ q5_returns)\nprint(f\"Spread t-stat: {t_stat:.2f}, p-value: {p_val:.3f}\")\nif p_val > 0.05:\n    print(\"WARNING:\
      \ spread not statistically significant\")\n"
  provenance:
    source: academic
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-XFER-001
  statement: '因子跨市场可移植性验证：在一个市场有效的因子，不必然在另一个市场有效。 将美股因子直接套用 A 股、或将股票因子套用期货/加密货币，需要独立 IC 验证， 不可假设跨市场通用性。A 股特有异象（如反转效应、ST 价格异常）不存在于美股。

    '
  severity: high
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: factors developed on foreign markets must be independently validated before A-share deployment
  evidence_refs:
  - type: academic
    ref: 知乎《因子研究系列之二：浅析动量策略在中国A股的应用研究》（2020）；东吴证券《求索动量因子系列研究》
    url: https://zhuanlan.zhihu.com/p/200752762
  reference_code:
    bad_example: '# BAD: 直接套用美股 12-1 月动量因子，不验证

      # 直接从美股文献复制：past 12M returns excluding last 1M

      df[''momentum''] = df[''return''].rolling(252).sum() - df[''return''].rolling(21).sum()

      # A 股：这个因子方向可能是反的！

      '
    good_example: "# GOOD: 在目标市场独立验证 IC 方向\nic = spearmanr(df['momentum'].rank(), df['forward_return_21d'].rank()).correlation\n\
      print(f\"A-share momentum IC: {ic:.3f}\")\nif ic < 0:\n    print(\"REVERSAL: A-share momentum factor direction is NEGATIVE\
      \ — use reversal instead\")\n    df['signal'] = -df['momentum']  # 反转\n"
  provenance:
    source: academic
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-XFER-002
  statement: '因子有效性时间稳定性：曾经有效的因子会因市场学习和套利行为逐渐失效 （McLean & Pontiff 2016 证明因子发表后平均衰减 58%）。 应定期（每季度/年）重新评估因子 IC，失效因子应及时替换或降权。

    '
  severity: medium
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: factor effectiveness must be re-evaluated periodically; decay post-discovery is expected
  evidence_refs:
  - type: academic
    ref: McLean, R.D. & Pontiff, J. (2016). 'Does Academic Research Destroy Stock Return Predictability?' Journal of Finance,
      71(1), 5-32.
    url: https://doi.org/10.1111/jofi.12365
  reference_code:
    bad_example: "# BAD: 一次验证，永久使用，不重新评估\nif validate_factor(factor, data_2015_2020):\n    deploy(factor)  # 永远使用，直到亏损才察觉失效\n"
    good_example: "# GOOD: 每季度滚动检验，IC < 0.02 时告警\nimport schedule\ndef quarterly_factor_review():\n    last_quarter_ic = compute_ic(factor,\
      \ last_90_days_data)\n    if abs(last_quarter_ic) < 0.02:\n        alert(f\"Factor {factor.name} may have decayed: IC={last_quarter_ic:.3f}\"\
      )\nschedule.every().quarter.do(quarterly_factor_review)\n"
  provenance:
    source: academic
  _source_file: factor-research/constraints.yaml
- id: SHARED-FR-XFER-003
  statement: '因子与宏观经济环境的交互：利率周期/经济周期/市场情绪对因子有效性影响显著。 价值因子（低 P/B）在利率上升期更有效；动量因子在趋势市更有效，震荡市失效。 部署因子前应评估当前宏观环境与因子最优生存环境的匹配度。

    '
  severity: medium
  capability_tags:
    activities:
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: factor-regime interaction analysis should be included in factor validation
  evidence_refs:
  - type: community_validated
    ref: Fama & French (2020) 'Comparing Cross-Section and Time-Series Factor Models'；华泰证券金工《宏观环境与因子有效性研究》
  reference_code:
    bad_example: '# BAD: 忽略市场状态，全期等权使用同一因子

      signal = factor_model.score(universe)

      '
    good_example: "# GOOD: 根据市场状态（趋势/震荡）调整因子权重\nmarket_regime = detect_regime(market_index)  # 'trending' or 'ranging'\nif\
      \ market_regime == 'trending':\n    w_momentum, w_value = 0.6, 0.4\nelse:\n    w_momentum, w_value = 0.3, 0.7\nsignal\
      \ = w_momentum * momentum_factor + w_value * value_factor\n"
  provenance:
    source: community_validated
  _source_file: factor-research/constraints.yaml
