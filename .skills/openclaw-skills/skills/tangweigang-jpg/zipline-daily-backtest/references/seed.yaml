resources:
  packages:
  - name: numpy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: sqlalchemy
    version_pin: latest
  - name: alembic
    version_pin: latest
  - name: bcolz-zipline
    version_pin: latest
  - name: h5py
    version_pin: latest
  - name: tables
    version_pin: latest
  - name: exchange-calendars
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: statsmodels
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy
    - python3 -m pip install pandas
    - python3 -m pip install sqlalchemy
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When writing daily bar data to bcolz format
    action: verify each asset has exactly one row per trading session with no gaps or duplicates
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The BcolzDailyBarWriter raises an AssertionError if the number of rows per asset does not match the expected
      session count. Missing or extra sessions cause incorrect data alignment during backtesting, leading to wrong price lookups.
    stage_ids:
    - data_ingestion
  - id: finance-C-002
    when: When validating OHLCV price values during ingestion
    action: verify each price and volume values fit within uint32 bounds after scaling
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Price columns are scaled by 1000 and stored as uint32. Values exceeding UINT32_MAX (~4.29 billion) cause
      data corruption, zeroing out prices or causing silent data loss depending on invalid_data_behavior setting.
    stage_ids:
    - data_ingestion
  - id: finance-C-003
    when: When providing start_session or end_session to BcolzDailyBarWriter
    action: verify provided session dates are valid trading days on the specified calendar
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid session dates that are not trading days cause ValueError to be raised, preventing bundle ingestion
      from completing.
    stage_ids:
    - data_ingestion
  - id: finance-C-005
    when: When writing adjustment data to SQLite
    action: verify dataframe columns match expected dtypes for splits, dividends, and mergers
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: SQLiteAdjustmentWriter validates column names and dtypes. Mismatched columns cause ValueError or TypeError,
      preventing correct corporate action adjustments and leading to incorrect historical prices.
    stage_ids:
    - data_ingestion
  - id: finance-C-018
    when: When ingesting quandl bundle data
    action: provide QUANDL_API_KEY environment variable with a valid API key
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Without QUANDL_API_KEY set, quandl_bundle raises ValueError 'Please set your QUANDL_API_KEY environment variable',
      preventing data download from NASDAQ Data Link.
    stage_ids:
    - data_ingestion
  - id: finance-C-021
    when: When implementing symbol ownership mapping for equity assets
    action: create overlapping ownership periods for the same symbol in the same country
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Overlapping symbol ownership periods cause ambiguous asset resolution, leading to incorrect security selection
      during backtesting and potentially trading the wrong asset
    stage_ids:
    - asset_management
  - id: finance-C-041
    when: When implementing the _compute method of ComputableTerm
    action: Return arrays matching the mask shape for 2D terms or (mask.shape[0], 1) for 1D terms
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Pipeline execution will raise assertion errors at engine.py:694-696, causing pipeline computation to fail
    stage_ids:
    - pipeline_computation
  - id: finance-C-042
    when: When building NumericalExpression terms
    action: Use variable names of form 'x_0', 'x_1', ... matching input indices sequentially
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Expression validation fails at expression.py:233-240, raising ValueError with 'Expected [0, 1, ...] for variable
      indices'
    stage_ids:
    - pipeline_computation
  - id: finance-C-048
    when: When adding terms to the ExecutionPlan graph
    action: Create cyclic dependencies between terms
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Graph construction at graph.py:88-90 detects cycles and raises ValueError, preventing unsatisfiable dependency
      resolution
    stage_ids:
    - pipeline_computation
  - id: finance-C-055
    when: When providing initial workspace for pipeline execution
    action: Include root_mask values with shape matching (len(dates), len(assets))
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Chunk computation raises AssertionError at engine.py:781-798 when root_mask shape does not match implied
      shape from dates/assets
    stage_ids:
    - pipeline_computation
  - id: finance-C-059
    when: When creating SimulationParameters with start_session and end_session
    action: Pass pandas.Timestamp objects for start_session and end_session parameters
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Type assertions will fail with cryptic errors if datetime objects or strings are passed instead of pd.Timestamp,
      causing simulation to crash before it starts
    stage_ids:
    - trading_simulation
  - id: finance-C-060
    when: When creating SimulationParameters
    action: Pass a non-None trading_calendar parameter
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Assertion error 'Must pass in trading calendar!' will be raised, preventing simulation from initializing
      the trading calendar required for session management
    stage_ids:
    - trading_simulation
  - id: finance-C-061
    when: When setting start_session and end_session in SimulationParameters
    action: Verify start_session is less than or equal to end_session
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Assertion error 'Period start falls after period end' will be raised, preventing the simulation from defining
      a valid date range
    stage_ids:
    - trading_simulation
  - id: finance-C-062
    when: When initializing TradingAlgorithm
    action: Set capital_base to a value greater than zero
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ZeroCapitalError is raised with message 'initial capital base must be greater than zero', and the simulation
      cannot compute position sizing or returns
    stage_ids:
    - trading_simulation
  - id: finance-C-063
    when: When setting data_frequency in SimulationParameters
    action: Set data_frequency to either 'daily' or 'minute' string values only
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Assertion error will occur in the algorithm, causing the clock creation and emission rate logic to malfunction
      with incorrect frequency settings
    stage_ids:
    - trading_simulation
  - id: finance-C-064
    when: When placing an order through the blotter
    action: Pass an order amount exceeding the maximum share limit of 100 billion shares
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: OverflowError 'Can't order more than %d shares' is raised, and the order is rejected without being placed
      in the system
    stage_ids:
    - trading_simulation
  - id: finance-C-065
    when: When running TradingAlgorithm.run()
    action: Pass a DataPortal instance either to TradingAlgorithm constructor or to run() method
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: RuntimeError 'No data portal in TradingAlgorithm.run()' is raised, and the algorithm cannot access historical
      price data for trading decisions
    stage_ids:
    - trading_simulation
  - id: finance-C-066
    when: When validating order parameters in TradingAlgorithm
    action: Call order() only from within handle_data(), not during initialize() or before_trading_start()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: OrderDuringInitialize error is raised with message 'order() can only be called from within handle_data()',
      preventing orders from being processed
    stage_ids:
    - trading_simulation
  - id: finance-C-067
    when: When placing orders during before_trading_start() callback
    action: Call any order placement methods (order, order_value, order_target, etc.)
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: OrderInBeforeTradingStart error is raised with message 'Cannot place orders inside before_trading_start',
      and the order is rejected
    stage_ids:
    - trading_simulation
  - id: finance-C-071
    when: When generating order identifiers
    action: Use UUID-based order IDs generated via uuid.uuid4().hex
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Transaction processing will fail to lookup orders by ID, causing transactions to be orphaned without proper
      order tracking in the metrics system
    stage_ids:
    - trading_simulation
  - id: finance-C-072
    when: When processing simulation clock events
    action: 'Process clock events in strict order: SESSION_START, BEFORE_TRADING_START_BAR, BAR, MINUTE_END, SESSION_END'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Capital changes, market open/close handling, and performance tracking will execute out of sequence, corrupting
      the simulation state and producing invalid results
    stage_ids:
    - trading_simulation
  - id: finance-C-073
    when: When processing daily performance messages
    action: Include daily_perf and cumulative_risk_metrics in each performance packet
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Performance DataFrame construction will fail when daily_stats are created, as the code expects these fields
      to be present in each performance dictionary
    stage_ids:
    - trading_simulation
  - id: finance-C-080
    when: When creating transactions from fill events
    action: floor transaction amounts to whole integers to prevent non-share fractional fills
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-integer share amounts would corrupt position tracking and produce invalid trade records incompatible
      with exchange requirements for whole share transactions
    stage_ids:
    - order_management
  - id: finance-C-081
    when: When creating transactions from fill events
    action: validate transaction magnitude is at least 1 share before creating a transaction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero-magnitude transactions would corrupt the portfolio ledger and produce incorrect PnL calculations with
      no economic substance
    stage_ids:
    - order_management
  - id: finance-C-083
    when: When placing orders through the blotter
    action: submit orders exceeding 100 billion shares to prevent arithmetic overflow
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Orders exceeding max_shares (100 billion) would cause integer overflow and produce incorrect position quantities
      that corrupt portfolio accounting
    stage_ids:
    - order_management
  - id: finance-C-085
    when: When calculating order direction for buy/sell decisions
    action: derive the order direction from the sign of the amount (positive=buy, negative=sell) using math.copysign
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect direction calculation would cause buy orders to be processed as sells and vice versa, completely
      inverting the trading strategy's intended execution
    stage_ids:
    - order_management
  - id: finance-C-086
    when: When dispatching slippage models for order fills
    action: select the slippage model based on the asset type using type(asset) as the dictionary key
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using an equity slippage model for futures or vice versa would produce incorrect fill prices that do not
      match the liquidity characteristics of the asset class
    stage_ids:
    - order_management
  - id: finance-C-087
    when: When dispatching commission models for transaction costs
    action: select the commission model based on the asset type using type(asset) as the dictionary key
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using a per-share equity commission model for futures would undercharge for trading costs, while using per-contract
      futures model for equities would overcharge, distorting strategy performance attribution
    stage_ids:
    - order_management
  - id: finance-C-089
    when: When tracking order state through the lifecycle
    action: maintain consistency between order.filled and order.open_amount (amount - filled) throughout the order lifecycle
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistency between filled amount and open amount would cause incorrect position calculations and potentially
      allow over-filling beyond the ordered quantity
    stage_ids:
    - order_management
  - id: finance-C-090
    when: When iterating over open orders during fill simulation
    action: check and respect order trigger conditions (stop/limit prices) before processing fills
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Filling orders before their trigger conditions are met would execute trades at incorrect prices, violating
      the order specification and potentially causing significant losses
    stage_ids:
    - order_management
  - id: finance-C-101
    when: When applying slippage to calculate fill prices
    action: verify buy orders fill at higher prices (positive impact) and sell orders fill at lower prices (negative impact)
      relative to the base price
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inverting the slippage direction would make buys cheaper and sells more expensive than in reality, producing
      unrealistic profits that would not be achievable in live trading
    stage_ids:
    - order_management
  - id: finance-C-105
    when: When validating fill price against limit orders
    action: reject fills where the impacted price is worse than the limit price (higher for buys, lower for sells)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Filling limit orders at worse-than-limit prices would violate order specifications and could cause unexpected
      losses exceeding the trader's intended maximum price
    stage_ids:
    - order_management
  - id: finance-C-107
    when: When calculating portfolio_value in update_portfolio
    action: set portfolio_value to cash plus sum of position values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Portfolio value calculation will be incorrect, causing performance metrics to show wrong returns and capital
      usage statistics
    stage_ids:
    - portfolio_accounting
  - id: finance-C-108
    when: When earning dividends for a position
    action: register dividend value based on shares held at ex_date, not pay_date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Dividend payments will be calculated based on incorrect share counts, resulting in wrong cash flow amounts
      that don't match real-world ex-date conventions
    stage_ids:
    - portfolio_accounting
  - id: finance-C-109
    when: When updating position cost_basis for trades
    action: calculate weighted average cost basis across each shares in the position
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Cost basis will not reflect true average purchase price, causing incorrect unrealized P&L and tax reporting
      calculations
    stage_ids:
    - portfolio_accounting
  - id: finance-C-110
    when: When handling stock splits on positions
    action: adjust share count by split ratio and update cost_basis proportionally
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Post-split positions will have incorrect share counts and cost basis, leading to wrong position values and
      P&L calculations
    stage_ids:
    - portfolio_accounting
  - id: finance-C-111
    when: When processing transactions in the ledger
    action: update cash flow for both equity trades and futures payouts
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Cash balance will not reflect actual trade proceeds, causing portfolio value to diverge from expected cash
      + positions calculation
    stage_ids:
    - portfolio_accounting
  - id: finance-C-114
    when: When exposing Portfolio and Account objects to user algorithms
    action: return immutable view objects that prevent direct mutation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Algorithms could modify portfolio state directly, bypassing the ledger's transactional integrity and causing
      inconsistent internal state
    stage_ids:
    - portfolio_accounting
  - id: finance-C-116
    when: When initializing Ledger for simulation
    action: create both immutable Portfolio/Account and MutableView wrappers for internal updates
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Portfolio state will be directly mutable by external code or internal updates will not be properly tracked,
      breaking the immutability contract
    stage_ids:
    - portfolio_accounting
  - id: finance-C-117
    when: When processing futures contracts
    action: apply price_multiplier to both position exposure and cash flow payout calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Futures positions will have incorrect exposure and P&L, as futures value is calculated as price * multiplier
      * quantity
    stage_ids:
    - portfolio_accounting
  - id: finance-C-121
    when: When calculating position exposure for futures
    action: include futures in position value calculation, only use exposure with multiplier
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Futures positions will be double-counted or miscounted in position value, breaking the portfolio value =
      cash + positions calculation
    stage_ids:
    - portfolio_accounting
  - id: finance-C-124
    when: When validating asset mismatch in position operations
    action: raise Exception when asset in operation does not match position asset
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Operations may be applied to wrong assets, corrupting position data and causing incorrect accounting
    stage_ids:
    - portfolio_accounting
  - id: finance-C-125
    when: When processing dividends for next trading session
    action: earn dividends on ex_date by registering owed amounts, then pay dividends on pay_date by adding to cash
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Dividend cash flows will be misaligned with actual market timing, causing discrepancy between simulated and
      real-world cash movements
    stage_ids:
    - portfolio_accounting
  - id: finance-C-133
    when: When implementing adjustment calculation logic in DataPortal
    action: normalize timezone information consistently using tz_localize(dt.tzinfo) when comparing adjustment dates against
      dt and perspective_dt
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Timezone mismatches cause adjustments to be applied at incorrect dates, resulting in incorrect adjusted prices
      that corrupt backtest results and cause wrong trading signals
    stage_ids:
    - data_access
  - id: finance-C-139
    when: When dispatching asset type-specific reads via AssetDispatchBarReader
    action: assert that each underlying readers share the same trading_calendar to prevent data misalignment across asset
      types
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Readers with different calendars will return data at different timestamps, causing mixed-frequency data corruption
      and trading signal timing errors
    stage_ids:
    - data_access
  - id: finance-C-154
    when: When implementing FX rate lookups with dates
    action: verify requested datetime arrays are sorted in ascending UTC order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unsorted dates cause incorrect FX rate lookups via searchsorted, returning wrong currency conversion rates
      that corrupt portfolio valuations across all multi-currency positions
    stage_ids:
    - fx_conversion
  - id: finance-C-155
    when: When validating currency codes for HDF5 storage
    action: verify currency codes are exactly 3-character strings
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid currency codes stored in HDF5 cause KeyError exceptions during FX rate retrieval, preventing portfolio
      valuation for affected currencies
    stage_ids:
    - fx_conversion
  - id: finance-C-156
    when: When defining currency-aware pipeline columns
    action: verify currency_aware columns use float64 dtype only
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-float64 currency-aware columns cause type errors during currency conversion multiplication, producing
      NaN portfolio values for all multi-currency assets
    stage_ids:
    - fx_conversion
  - id: finance-C-157
    when: When implementing FX rate lookup with get_rates_columnar
    action: verify bases and dts arrays have matching lengths
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched array lengths cause ValueError exceptions that halt pipeline execution, preventing portfolio value
      calculation
    stage_ids:
    - fx_conversion
  - id: finance-C-158
    when: When constructing CurrencyConversion for pipeline columns
    action: specify a valid rate field name or use DEFAULT_FX_RATE sentinel
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid rate field names cause KeyError exceptions in FX reader, resulting in NaN values for all currency-converted
      pipeline outputs
    stage_ids:
    - fx_conversion
  - id: finance-C-159
    when: When loading currency-converted equity pricing data
    action: use shift=1 to align FX rates with prior-day prices
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect shift causes look-ahead bias where future FX rates are used, producing misleading portfolio valuations
      that don't reflect actual trading conditions
    stage_ids:
    - fx_conversion
  - id: finance-C-161
    when: When loading FX rates from HDF5 file
    action: validate HDF5_FX_VERSION matches expected version number
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Version mismatch causes ValueError exceptions, preventing loading of FX rate data required for multi-currency
      portfolio valuation
    stage_ids:
    - fx_conversion
  - id: finance-C-165
    when: When loading FX rates for international equity pricing
    action: apply currency conversion using the same rate field as specified in CurrencyConversion spec
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using wrong rate field causes incorrect currency conversions, distorting portfolio valuations across international
      positions
    stage_ids:
    - fx_conversion
  - id: finance-C-168
    when: When representing exchange rates in HDF5 storage
    action: store rates as (currencies x dates) 2D arrays transposed from (dates x currencies)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect array orientation causes row/column index confusion, returning wrong currency conversion rates
      for all lookups
    stage_ids:
    - fx_conversion
  - id: finance-C-169
    when: When performing forward-fill lookup for FX rates
    action: use searchsorted with side='right' and subtract 1 to get previous valid date
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect searchsorted side causes wrong date alignment, using future FX rates that introduce look-ahead
      bias into portfolio valuations
    stage_ids:
    - fx_conversion
  - id: finance-C-174
    when: When writing asset metadata via AssetDBWriter to SQLite asset database
    action: Verify SIDs are unique integer identifiers and symbols have proper country_code association for lookup
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: AssetFinder lookups will fail or return incorrect assets, causing orders to reference wrong securities and
      leading to financial losses or position mismatches
  - id: finance-C-175
    when: When writing bcolz/HDF5 bar data to disk
    action: Store OHLCV data with proper datetime64 timestamps aligned to trading calendar sessions/minutes
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: DataPortal queries will return misaligned or missing price data, causing incorrect execution prices and corrupted
      portfolio valuations
  - id: finance-C-176
    when: When writing SQLite adjustments for splits, dividends, and mergers
    action: Store adjustment ratios as float64 values with correct effective_date timestamps in UTC
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Price adjustments will be incorrectly applied, causing portfolio values to diverge from actual market values
      and leading to inaccurate PnL calculations
  - id: finance-C-177
    when: When providing AssetFinder instance to DataPortal for SID resolution
    action: Verify AssetFinder engine is connected to same SQLite database used during data ingestion
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Asset lifetimes validation will reference different assets than bar data, causing lookups for non-existent
      SIDs and simulation failures
  - id: finance-C-181
    when: When calling DataPortal.get_spot_value for current bar data
    action: Pass asset, field name matching OHLCV schema, datetime, and data_frequency matching simulation mode
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Algorithm receives wrong price data causing incorrect order values and corrupted position tracking
  - id: finance-C-182
    when: When calling DataPortal.get_history_window for historical bar data
    action: Verify bar_count and frequency parameters align with available data range without requesting future data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: History window returns partial data or NaN, causing indicators and signals to be incorrectly calculated with
      look-ahead into future prices
  - id: finance-C-185
    when: When creating Transaction objects from Order execution
    action: Verify transaction amount is floored to positive integer >= 1 and price is positive float
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Fractional share transactions or zero-value trades cause position tracking errors and PnL miscalculations
  - id: finance-C-186
    when: When processing Transaction objects through Ledger.update_positions
    action: Calculate cash_flow as -(price * amount) for equities, using price_multiplier for futures
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Portfolio cash balance diverges from actual holdings, causing margin violations and incorrect equity curve
      calculations
  - id: finance-C-199
    when: When calculating portfolio weights and exposure values across each asset types
    action: Apply price_multiplier from the asset specification; equities use multiplier=1.0 while futures use contract-specific
      multipliers (typically 500 for commodity futures)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Futures position values will be incorrectly calculated, causing severe PnL discrepancies where portfolio
      exposure equals only 1/500th of the true value, leading to massive under-margin and catastrophic liquidation failures
      in live trading
  - id: finance-C-200
    when: When placing orders via the order() API function
    action: Use positive amount values for buy/cover orders and negative amount values for sell/short orders
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Order will execute in the wrong direction — a positive amount when intending to sell will create or increase
      a long position instead of reducing it, causing unintended market exposure and potential margin violations
  - id: finance-C-219
    when: When defining or composing Pipeline terms (Factor, Filter, or Classifier)
    action: 'Enforce strict dtype contracts: Factor outputs must be float64, Filter outputs must be bool, Classifier outputs
      must be categorical or int64; do not mix incompatible dtypes in combined computations'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating dtype contracts causes silent data corruption in downstream pipeline computations; float32 or mixed
      dtypes break NumPy array compatibility and produce incorrect factor values
    derived_from_bd_id: BD-077
  - id: finance-C-235
    when: When implementing position tracking or order size validation in backtesting
    action: Enforce max_shares_per_order limit of 1e11 (100 billion) — reject or warn for orders exceeding this threshold
      to prevent numeric overflow in position tracking calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Orders exceeding 100 billion shares cause integer overflow in position tracking, leading to incorrect share
      counts, corrupted portfolio state, and potentially negative position values in backtest results
    derived_from_bd_id: BD-008
  - id: finance-C-241
    when: When configuring slippage models with quadratic price impact and fixed ADV window
    action: Detect combination of quadratic price impact model (BD-056), fixed 20-day ADV window (BD-059), and price_impact=0.1
      (BD-010) — warn users about regime-dependent execution quality or switch to adaptive parameters
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: The fixed 20-day ADV window causes order-to-volume ratios to spike during volatile markets (quadratic impact),
      leading to 3-5x cost overruns that are invisible in normal conditions but catastrophic during market stress
    derived_from_bd_id: BD-092
  - id: finance-C-244
    when: When implementing RSI momentum strategy position sizing
    action: Use 1/3 allocation per position (leverage = 2x) — each long receives 1/3 of capital, each short receives 1/3;
      changing position size or leverage fundamentally alters strategy return profile and margin requirements
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Changing leverage to 1x or position allocation without corresponding leverage adjustment produces different
      risk-adjusted returns than backtested, and margin calls in live trading may force liquidations not seen in backtest
    derived_from_bd_id: BD-017
  - id: finance-C-247
    when: When implementing order direction logic in backtesting
    action: Use positive order amounts for buy (long) positions and negative amounts for sell (short) positions — maintain
      consistent sign convention throughout order processing and position calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inverting the order sign convention causes buy orders to be interpreted as sells and vice versa, resulting
      in completely opposite trading behavior with catastrophic losses in backtest and live trading
    derived_from_bd_id: BD-020
  - id: finance-C-287
    when: When presenting or marketing zipline-reloaded
    action: Claim real-time trading capability for live production use
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Zipline is explicitly designed as a backtesting framework. Claiming live trading capability misleads users
      and can lead to financial losses when used inappropriately
  - id: finance-C-288
    when: When reporting or comparing backtest results
    action: Present backtest returns as expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Backtest returns do not equal expected live trading returns due to slippage, latency, market impact, and
      other execution realities not captured in simulation
  regular:
  - id: finance-C-004
    when: When storing session timestamps in bcolz format
    action: store dates as timezone-naive values without UTC offset information
    severity: high
    kind: domain_rule
    modality: must
    consequence: The bcolz writer localizes sessions to None (removes timezone), and the reader expects timezone-naive dates.
      Mismatched timezone data causes incorrect date alignment and crashes during backtesting.
    stage_ids:
    - data_ingestion
  - id: finance-C-006
    when: When registering a new data bundle
    action: use the bundles.register() function with a unique name
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bundles not registered via register() do not appear in 'zipline bundles' command output and cannot be used
      for ingestion. The __main__.py:450 only shows registered bundles.
    stage_ids:
    - data_ingestion
  - id: finance-C-007
    when: When implementing a custom ingest function
    action: write data through the provided writer objects rather than directly to files
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct file manipulation bypasses the writer's validation and indexing logic, resulting in unreadable data
      or corrupted bcolz tables that crash the backtest engine.
    stage_ids:
    - data_ingestion
  - id: finance-C-008
    when: When ingesting the quantopian-quandl bundle
    action: expect country_code to be present in the asset database
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: The quantopian-quandl pre-packaged bundle was deprecated because it lacks country_code required by current
      Zipline versions. Asset lookups may fail with KeyError when country_code is accessed.
    stage_ids:
    - data_ingestion
  - id: finance-C-009
    when: When using the quandl bundle for live data
    action: expect WIKI dataset to contain current market data
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Quandl discontinued the WIKI dataset in early 2018. Ingested data will only cover historical periods up to
      2018 and does not reflect current market conditions.
    stage_ids:
    - data_ingestion
  - id: finance-C-010
    when: When ingesting data for backtesting purposes
    action: claim that backtest results predict live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtesting with historical data does not account for slippage, liquidity constraints, market impact, or
      execution delays that occur in live trading. Presenting backtest returns as expected live returns misleads stakeholders.
    stage_ids:
    - data_ingestion
  - id: finance-C-011
    when: When using the csvdir bundle
    action: set the CSVDIR environment variable or provide csvdir path in extension.py
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without CSVDIR environment variable set and no csvdir path provided, csvdir_bundle raises ValueError 'CSVDIR
      environment variable is not set', preventing data ingestion.
    stage_ids:
    - data_ingestion
  - id: finance-C-012
    when: When creating custom CSV bundles
    action: include 'daily' or 'minute' subdirectories with .csv files per symbol
    severity: high
    kind: operational_lesson
    modality: must
    consequence: CSV files must be organized in timeframe subdirectories. Missing directories cause ValueError 'daily and
      minute directories not found', and symbol CSV files must exist or ingestion fails.
    stage_ids:
    - data_ingestion
  - id: finance-C-013
    when: When handling bundle ingestion failures
    action: rely on the cache mechanism to avoid re-downloading data after failures
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: If ingestion crashes partway through, the dataframe_cache preserves raw data. Skipping cache means re-downloading
      all data on each retry, wasting bandwidth and time.
    stage_ids:
    - data_ingestion
  - id: finance-C-014
    when: When loading ingested bundle data
    action: verify the bundle has been ingested before attempting to load it
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Loading a bundle that has never been ingested raises ValueError with message 'no data for bundle X on or
      before Y'. The error suggests running 'zipline ingest'.
    stage_ids:
    - data_ingestion
  - id: finance-C-015
    when: When overriding an existing bundle name during registration
    action: expect a warning to be issued about overwriting the existing bundle
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Registering a bundle with an existing name overwrites the previous registration. A warning is issued but
      no exception is raised, potentially causing confusion about which bundle implementation is active.
    stage_ids:
    - data_ingestion
  - id: finance-C-016
    when: When converting CSV dates to trading sessions
    action: verify CSV dates are parseable as datetime and sorted in ascending order
    severity: high
    kind: domain_rule
    modality: must
    consequence: CSV files with unsorted dates or unparseable date formats cause incorrect sid assignment and session alignment,
      resulting in corrupted historical price data for backtesting.
    stage_ids:
    - data_ingestion
  - id: finance-C-017
    when: When calculating auto_close_date for assets
    action: set auto_close_date to the day after the last trading day in the data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Auto close date determines when an asset is considered delisted. Incorrect calculation causes premature or
      delayed delisting, leading to inability to trade assets that should be tradeable or attempts to trade delisted assets.
    stage_ids:
    - data_ingestion
  - id: finance-C-019
    when: When downloading quandl data with retries
    action: retry failed downloads up to the configured number of attempts before failing
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Network failures during download cause retry attempts (default 5). Exhausting retries without success raises
      ValueError, preventing bundle ingestion from completing.
    stage_ids:
    - data_ingestion
  - id: finance-C-020
    when: When writing CSV pricing data to bcolz
    action: provide DataFrames with 'open', 'high', 'low', 'close', 'volume' columns and datetime index
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing or misspelled OHLCV columns cause KeyError during column access or silent zeroing of prices, resulting
      in incorrect backtest results or crashes.
    stage_ids:
    - data_ingestion
  - id: finance-C-022
    when: When looking up a symbol that has been held by multiple assets
    action: provide as_of_date parameter to disambiguate which historical owner to return
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without as_of_date, lookup_symbol raises MultipleSymbolsFound error, preventing resolution of delisted securities
      whose tickers have been reassigned
    stage_ids:
    - asset_management
  - id: finance-C-023
    when: When creating continuous future contracts
    action: specify adjustment parameter from allowed set {add, mul, None}
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid adjustment style causes ValueError at continuous future creation, breaking futures-based backtests
    stage_ids:
    - asset_management
  - id: finance-C-024
    when: When computing asset lifetimes for a date range
    action: handle NaN start_date as epoch (0) and NaN end_date as INT_MAX
    severity: high
    kind: domain_rule
    modality: must
    consequence: Improper NaN handling causes assets with missing dates to be incorrectly filtered, resulting in missing price
      data during backtesting
    stage_ids:
    - asset_management
  - id: finance-C-025
    when: When querying assets by country code
    action: pass a string instead of an iterable of strings to country_codes parameter
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Passing a string for country_codes causes TypeError when lifetimes DataFrame is constructed, breaking pipeline
      computations
    stage_ids:
    - asset_management
  - id: finance-C-026
    when: When resolving symbols that exist in multiple countries
    action: provide country_code parameter to disambiguate which country's asset to return
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without country_code, ambiguous cross-country symbols raise SameSymbolUsedAcrossCountries error, preventing
      international multi-market backtests
    stage_ids:
    - asset_management
  - id: finance-C-027
    when: When initializing AssetFinder with an asset database
    action: verify database version matches ASSET_DB_VERSION constant
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Version mismatch causes AssetDBVersionError, preventing backtests from running with incompatible asset databases
    stage_ids:
    - asset_management
  - id: finance-C-028
    when: When looking up futures contracts by root symbol
    action: verify root_symbol exists in futures_root_symbols table
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Non-existent root symbol causes SymbolNotFound error during continuous future creation, breaking futures
      trading strategies
    stage_ids:
    - asset_management
  - id: finance-C-029
    when: When configuring future chain predicates
    action: include contracts with start_date >= auto_close_date in the chain
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Including untradeable contracts in chain causes continuous future to reference non-existent price data
    stage_ids:
    - asset_management
  - id: finance-C-030
    when: When retrieving assets by SID during backtesting
    action: reuse cached Asset objects from _asset_cache for repeated lookups
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without caching, millions of SQL queries occur during backtest, causing unacceptable slowdown
    stage_ids:
    - asset_management
  - id: finance-C-031
    when: When implementing symbol lookup for delisted securities
    action: handle ticker reuse through ownership period tracking
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without handling ticker reuse, stale symbol references resolve to wrong asset, causing trading of incorrect
      securities
    stage_ids:
    - asset_management
  - id: finance-C-032
    when: When looking up equity symbols with fuzzy matching enabled
    action: handle multiple fuzzy matches by preferring exact symbol+share_class match
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect fuzzy matching preference causes wrong asset selection when multiple tickers match (e.g., BRK.A
      vs BRK_A)
    stage_ids:
    - asset_management
  - id: finance-C-033
    when: When validating asset data before database write
    action: check for duplicate SID assignments in equities DataFrame
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Duplicate SIDs cause database integrity errors and incorrect asset routing during backtesting
    stage_ids:
    - asset_management
  - id: finance-C-034
    when: When checking if an asset is alive for a given session
    action: use inclusive bounds on start_date and end_date comparison
    severity: high
    kind: domain_rule
    modality: must
    consequence: Exclusive bounds cause off-by-one errors in asset lifetime checks, potentially including inactive assets
      in trading universe
    stage_ids:
    - asset_management
  - id: finance-C-035
    when: When creating continuous futures for backtesting
    action: expect NaN gaps in price series at roll boundaries
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: NaN values at roll dates are expected behavior; treating them as data errors causes premature strategy termination
    stage_ids:
    - asset_management
  - id: finance-C-036
    when: When using symbol lookup for trading decisions
    action: assume that current symbol ownership equals future symbol ownership
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming future symbol ownership based on current lookup causes trading of delisted or renamed securities
      after ticker reassignment
    stage_ids:
    - asset_management
  - id: finance-C-037
    when: When accessing asset data through AssetFinder
    action: use AssetFinder as the sole interface for each asset lookups
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing AssetFinder causes inconsistent caching, missing symbol ownership history, and broken cross-reference
      integrity
    stage_ids:
    - asset_management
  - id: finance-C-038
    when: When retrieving ordered futures contracts
    action: reuse _ordered_contracts cache to avoid repeated database queries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without cache reuse, each get_ordered_contracts call executes SQL queries, causing severe performance degradation
      in futures-heavy backtests
    stage_ids:
    - asset_management
  - id: finance-C-039
    when: When implementing a subclass of ComputableTerm
    action: Call super()._validate() to enable validation enforcement
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pipeline term validation will be silently skipped, causing undefined behavior when terms with invalid configurations
      enter the computation graph
    stage_ids:
    - pipeline_computation
  - id: finance-C-040
    when: When defining a Term with numerical dtype
    action: Use Decimal for monetary calculations to avoid floating-point errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Financial calculations using float will accumulate rounding errors, causing incorrect portfolio valuations
      and trading signals
    stage_ids:
    - pipeline_computation
  - id: finance-C-043
    when: When running pipelines over multi-year date ranges
    action: Use run_chunked_pipeline with specified chunksize to limit peak memory
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Single-pass execution on thousands of assets over multiple years will exhaust memory, causing OOM crashes
    stage_ids:
    - pipeline_computation
  - id: finance-C-044
    when: When defining a CustomFactor requiring historical data
    action: Set window_length >= longest lookback period used in compute method
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Pipeline loader cannot provide sufficient historical rows, causing index errors or NaN values in factor calculations
    stage_ids:
    - pipeline_computation
  - id: finance-C-045
    when: When implementing PositiveWindowLengthMixin subclasses
    action: Set window_length to a positive integer value (>= 1)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Validation at mixins.py:46-49 raises WindowLengthNotPositive exception, blocking pipeline construction
    stage_ids:
    - pipeline_computation
  - id: finance-C-046
    when: When configuring PipelineLoader for currency-aware data
    action: Set currency_aware=True on loader when terms require currency conversion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pipeline execution raises ValueError at engine.py:873-876 when loader cannot handle currency conversion requirements
    stage_ids:
    - pipeline_computation
  - id: finance-C-047
    when: When setting start_date and end_date on pipeline execution
    action: Verify end_date is greater than or equal to start_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Pipeline raises ValueError at engine.py:375-379: ''start_date must be before or equal to end_date'''
    stage_ids:
    - pipeline_computation
  - id: finance-C-049
    when: When mutating Pipeline graph after construction
    action: Modify term inputs or parameters after the Term object is created
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Graph construction raises ValueError at graph.py:83-86 when attempting to mutate frozen ExecutionPlan
    stage_ids:
    - pipeline_computation
  - id: finance-C-050
    when: When resolving Pipeline domain
    action: Pass explicit domain parameter when pipeline contains mixed-domain terms
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pipeline raises AmbiguousDomain exception at domain.py:348-350 when multiple non-generic domains are present
    stage_ids:
    - pipeline_computation
  - id: finance-C-051
    when: When providing initial_workspace terms
    action: Verify LoadableTerm instances are specialized to a concrete domain
    severity: high
    kind: domain_rule
    modality: must
    consequence: Engine raises ValueError at engine.py:834-837 when generic LoadableTerms are populated in initial workspace
    stage_ids:
    - pipeline_computation
  - id: finance-C-052
    when: When using NumExprFactor for expression evaluation
    action: Limit combined input variables to 10 or fewer to avoid numexpr limitations
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Merged expressions with 11+ variables may cause numexpr substitution errors due to substring conflicts (e.g.,
      x_1 vs x_10 vs x_100)
    stage_ids:
    - pipeline_computation
  - id: finance-C-053
    when: When implementing data query cutoff for pipeline domain
    action: Use timezone-aware timestamps for data_query_time parameter
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Domain initialization raises ValueError at domain.py:411-412: ''data_query_time cannot be tz-naive'''
    stage_ids:
    - pipeline_computation
  - id: finance-C-054
    when: When running pipeline backtests
    action: Claim that backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as proof of live trading performance violates financial best practices; execution
      prices, slippage, and market impact differ between backtesting and live trading
    stage_ids:
    - pipeline_computation
  - id: finance-C-056
    when: When implementing CustomFactor.compute method
    action: Write computed values directly into the provided 'out' array parameter
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning a new array instead of writing to 'out' causes incorrect results to propagate through the pipeline
      computation
    stage_ids:
    - pipeline_computation
  - id: finance-C-057
    when: When implementing term dependencies
    action: Return at least min_extra_rows as specified in compute_extra_rows call
    severity: high
    kind: domain_rule
    modality: must
    consequence: Graph construction raises ValueError at graph.py:314-321 when a term returns fewer extra rows than requested
    stage_ids:
    - pipeline_computation
  - id: finance-C-058
    when: When executing term computation in chunked pipeline
    action: Filter out empty chunks before concatenation to preserve dtype information
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Concatenating empty DataFrames loses dtype information, causing pipeline output to fail at categorical_df_concat
    stage_ids:
    - pipeline_computation
  - id: finance-C-068
    when: When implementing trading simulation with Zipline
    action: Accept that Zipline is a pure backtesting framework with no live trading capability
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using Zipline for live trading without additional infrastructure will result in paper trading at best, as
      the framework lacks broker connectivity and real-time order execution
    stage_ids:
    - trading_simulation
  - id: finance-C-069
    when: When using minute emission rate in simulation
    action: Set data_frequency to 'minute' when emission_rate is 'minute'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Minute performance messages will not be emitted correctly, causing incomplete intraday metrics tracking and
      potentially misleading performance analysis
    stage_ids:
    - trading_simulation
  - id: finance-C-070
    when: When customizing order management backend
    action: Extend the Blotter abstract base class to implement custom blotter_class
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without proper Blotter interface implementation, order placement, cancellation, and transaction processing
      will fail or produce incorrect results
    stage_ids:
    - trading_simulation
  - id: finance-C-074
    when: When constructing the simulation clock
    action: Use MinuteSimulationClock with correct sessions, execution times, and before_trading_start_minutes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The simulation will iterate over incorrect time ranges, potentially missing trading days or executing outside
      market hours
    stage_ids:
    - trading_simulation
  - id: finance-C-075
    when: When computing Sharpe ratio in performance metrics
    action: Handle NaN Sharpe ratio values by converting them to 0.0
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Risk report generation will fail or produce incomplete data when Sharpe ratio calculation returns NaN due
      to insufficient trading days or zero returns
    stage_ids:
    - trading_simulation
  - id: finance-C-076
    when: When handling assets during simulation
    action: Process splits and expired assets at the start of each session before trading
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Positions and open orders for delisted or split assets will not be properly adjusted, causing incorrect position
      sizing and potential order execution failures
    stage_ids:
    - trading_simulation
  - id: finance-C-077
    when: When validating trading controls and account constraints
    action: Execute validate_account_controls() at the end of each trading session
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Trading control violations such as max leverage, max position size, or restricted assets will not be detected
      until after the simulation completes, leading to incorrect backtest results
    stage_ids:
    - trading_simulation
  - id: finance-C-078
    when: When presenting backtest results
    action: Claim that simulated backtest returns will match live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results represent ideal execution with no slippage, latency, or market impact; live trading will
      experience fill differences, liquidity constraints, and timing delays not captured in simulation
    stage_ids:
    - trading_simulation
  - id: finance-C-079
    when: When using Zipline's simulation framework
    action: Assume that performance metrics (Sharpe ratio, returns) computed during backtest are guarantees of future trading
      success
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Past performance metrics do not account for changing market conditions, regime shifts, or mean reversion
      of strategy effectiveness, leading to overconfidence in strategy viability
    stage_ids:
    - trading_simulation
  - id: finance-C-082
    when: When placing orders through the blotter
    action: submit orders with zero shares as these represent no economic activity
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Zero-share orders clutter the open_orders tracking structure and may cause downstream processing to fail
      or produce silent errors
    stage_ids:
    - order_management
  - id: finance-C-084
    when: When simulating fills through slippage models
    action: use the current bar close price as the basis for calculating fill prices with slippage adjustment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using any price other than the current bar close would break the backtest's price alignment and produce fill
      prices that do not match the simulation timeline
    stage_ids:
    - order_management
  - id: finance-C-088
    when: When executing cancel operations on the blotter
    action: check order status (order.open) before removing from open_orders to prevent removing already-closed orders
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Removing orders that are not open would cause the order tracking structure to become inconsistent with actual
      order statuses, breaking audit trail integrity
    stage_ids:
    - order_management
  - id: finance-C-091
    when: When managing orders across the simulation blotter
    action: directly modify the open_orders defaultdict while iterating over it, to prevent runtime errors from modifying
      collection during iteration
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Modifying open_orders during iteration would raise RuntimeError or cause elements to be skipped or processed
      multiple times, breaking the fill loop
    stage_ids:
    - order_management
  - id: finance-C-092
    when: When pruning closed orders from the blotter
    action: handle ValueError when removing orders from asset order lists, as orders may have already been removed by other
      operations
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Not handling ValueError would cause the prune loop to crash when an order has already been removed, leaving
      orphaned state in the blotter
    stage_ids:
    - order_management
  - id: finance-C-093
    when: When setting up the simulation blotter
    action: default to FixedBasisPointsSlippage for equities and VolatilityVolumeShare for futures when no slippage model
      is explicitly configured
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using the wrong default slippage model would produce unrealistic fill prices that do not reflect the market
      impact characteristics of each asset class
    stage_ids:
    - order_management
  - id: finance-C-094
    when: When setting up the simulation blotter
    action: default to PerShare commission for equities and PerContract for futures when no commission model is explicitly
      configured
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using the wrong default commission model would produce inaccurate trading cost estimates that misrepresent
      the true cost of executing the strategy
    stage_ids:
    - order_management
  - id: finance-C-095
    when: When configuring equity slippage defaults
    action: use 5 basis points (0.05%) as the default price impact for equity fills
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using a non-standard basis point value would produce fill prices that do not match expected market impact
      for liquid equities, distorting backtest performance
    stage_ids:
    - order_management
  - id: finance-C-096
    when: When configuring equity commission defaults
    action: use $0.001 per share as the default commission rate for equity trades
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using an incorrect default commission rate would miscalculate trading costs, causing backtest performance
      to differ significantly from actual trading costs
    stage_ids:
    - order_management
  - id: finance-C-097
    when: When using EODCancel policy
    action: expect EODCancel to work correctly in daily frequency simulations as it is designed for minutely simulations only
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Using EODCancel in daily simulations would produce unpredictable cancellation behavior that does not match
      the intended end-of-day order expiration semantics
    stage_ids:
    - order_management
  - id: finance-C-098
    when: When handling partially filled orders
    action: check the order.filled attribute to determine how many shares were actually executed before assuming full fills
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Assuming orders are fully filled would cause incorrect position tracking when partial fills occur due to
      volume limits, leading to phantom positions or missing shares
    stage_ids:
    - order_management
  - id: finance-C-099
    when: When implementing custom slippage models
    action: raise LiquidityExceeded exception when no more orders can be processed for the current bar to prevent over-trading
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Not raising LiquidityExceeded would allow orders to exceed the volume limit for a bar, producing unrealistic
      fills that do not respect market liquidity constraints
    stage_ids:
    - order_management
  - id: finance-C-100
    when: When adjusting orders for stock splits
    action: round limit and stop prices to 2 decimal places after applying the split ratio to maintain price precision
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Not rounding split-adjusted prices would cause floating-point precision errors that make order prices inconsistent
      with exchange requirements
    stage_ids:
    - order_management
  - id: finance-C-102
    when: When presenting backtest results to users
    action: claim that simulated fill prices equal actual market execution prices as slippage models are approximations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest fill prices are model outputs, not actual executions; presenting them as real would mislead users
      about the accuracy of backtest results versus live trading performance
    stage_ids:
    - order_management
  - id: finance-C-103
    when: When presenting commission costs from backtests
    action: claim that backtest commission calculations equal actual brokerage fees as models use default rates
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Default commission models ($0.001/share for equities) may differ significantly from actual brokerage fees;
      presenting backtest costs as actual would mislead users about true trading costs
    stage_ids:
    - order_management
  - id: finance-C-104
    when: When evaluating the EODCancel policy
    action: copy the open_orders dictionary before iterating to prevent RuntimeError during modification
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Iterating directly over open_orders while cancelling orders would cause 'dictionary changed size during iteration'
      RuntimeError, crashing the simulation
    stage_ids:
    - order_management
  - id: finance-C-106
    when: When handling futures commission with exchange fees
    action: apply per-contract costs plus exchange-specific fees from FUTURE_EXCHANGE_FEES_BY_SYMBOL dictionary
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Omitting exchange fees would undercount futures trading costs, as exchange fees (ranging from $0.56 to $2.40
      per contract) are significant components of actual futures trading expenses
    stage_ids:
    - order_management
  - id: finance-C-112
    when: When marking portfolio state as dirty
    action: set _dirty_portfolio to True whenever cash, positions, or position values change
    severity: high
    kind: domain_rule
    modality: must
    consequence: Portfolio cache will return stale values, causing algorithms to make decisions based on outdated portfolio
      state
    stage_ids:
    - portfolio_accounting
  - id: finance-C-113
    when: When a transaction changes position direction (long to short or vice versa)
    action: reset cost_basis to the new transaction price when covering or opening opposite direction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cost basis will incorrectly carry over from the opposite position direction, causing unrealized P&L to be
      calculated against the wrong reference price
    stage_ids:
    - portfolio_accounting
  - id: finance-C-115
    when: When calculating returns on portfolio
    action: 'use compound returns formula: (1 + previous_returns) * (1 + current_return) - 1'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cumulative returns will not properly compound, causing reported performance to diverge from true portfolio
      growth
    stage_ids:
    - portfolio_accounting
  - id: finance-C-118
    when: When closing a position with zero shares
    action: reset cost_basis to 0.0 to prevent stale price from affecting future positions
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Closed position will retain old cost_basis, which could contaminate calculations if the same asset is re-traded
    stage_ids:
    - portfolio_accounting
  - id: finance-C-119
    when: When marking portfolio dirty in setter
    action: also mark account dirty when marking portfolio dirty to verify consistency
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Account values may be calculated from stale portfolio state, causing inconsistent leverage and buying power
      calculations
    stage_ids:
    - portfolio_accounting
  - id: finance-C-120
    when: When adjusting cost basis for commissions
    action: increase cost basis for long positions and decrease for short positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Commission-adjusted cost basis will not reflect true break-even prices, causing incorrect P&L calculations
    stage_ids:
    - portfolio_accounting
  - id: finance-C-122
    when: When calculating PnL for the portfolio
    action: use end_value minus start_value, only computing returns when start_value is non-zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero or incorrect returns will occur when portfolio value is zero, causing NaN or infinite returns
    stage_ids:
    - portfolio_accounting
  - id: finance-C-123
    when: When accessing Portfolio or Account properties
    action: call update_portfolio first to verify cached values are refreshed
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Algorithms will read stale portfolio state, leading to incorrect trading decisions based on outdated cash
      and position information
    stage_ids:
    - portfolio_accounting
  - id: finance-C-126
    when: When calculating account cushion (cash/portfolio_value ratio)
    action: handle zero portfolio_value by returning np.nan instead of dividing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero will produce inf/nan values, causing account metrics to be invalid
    stage_ids:
    - portfolio_accounting
  - id: finance-C-127
    when: When calculating leverage with zero portfolio_value
    action: set leverage to np.inf when portfolio_value is zero to avoid division by zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero will produce invalid leverage values, breaking risk calculations
    stage_ids:
    - portfolio_accounting
  - id: finance-C-128
    when: When calculating daily returns series
    action: store partial returns in array during bar processing and final value at session end
    severity: high
    kind: domain_rule
    modality: must
    consequence: Daily returns will be incorrect in minute emission mode, causing performance tracking to diverge from expected
      values
    stage_ids:
    - portfolio_accounting
  - id: finance-C-129
    when: When rounding fractional shares after split
    action: floor the share count to whole shares and return fractional value as cash
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Fractional shares will not be properly converted to cash, causing cash balance to be incorrect after splits
    stage_ids:
    - portfolio_accounting
  - id: finance-C-130
    when: When presenting backtest results as performance proof
    action: claim backtest returns as guaranteed future trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not account for slippage variations, liquidity constraints, and market impact that occur
      in live trading
    stage_ids:
    - portfolio_accounting
  - id: finance-C-131
    when: When processing stock dividends
    action: create new positions for stock dividend payments in the payment_asset
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stock dividend shares will not be tracked as positions, causing portfolio exposure to be incorrect
    stage_ids:
    - portfolio_accounting
  - id: finance-C-132
    when: When updating last_sale_date and last_sale_price
    action: only update when transaction datetime is more recent than existing last_sale_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Position will have incorrect last sale price, causing exposure calculations to use stale prices
    stage_ids:
    - portfolio_accounting
  - id: finance-C-134
    when: When querying spot values or history windows
    action: validate that perspective_dt is greater than dt when retrieving adjustments, as adjustments only apply when dt
      < adjustment_date <= perspective_dt
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper perspective_dt > dt validation, historical prices before the simulation date will receive
      no adjustments, causing systematic underestimation of returns
    stage_ids:
    - data_access
  - id: finance-C-135
    when: When calling get_adjusted_value for different asset types
    action: apply corporate action adjustments only to Equity assets, NOT to Future contracts, as Futures do not have splits/dividends/mergers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attempting to apply equity adjustments to futures will cause incorrect price calculations since futures have
      fundamentally different pricing mechanics
    stage_ids:
    - data_access
  - id: finance-C-136
    when: When requesting history windows via get_history_window
    action: validate that bar_count is >= 1 and field is in OHLCVP_FIELDS or 'sid', raising ValueError for invalid inputs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid bar_count or field values will cause unpredictable behavior or silent failures in the returned history
      DataFrame
    stage_ids:
    - data_access
  - id: finance-C-137
    when: When processing spot value queries for assets outside their trading lifetime
    action: return NaN for OHLCV fields, 0 for volume, None for contract, and NaT for last_traded when dt is outside asset
      start_date/end_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning arbitrary values for delisted or pre-IPO assets causes algorithm logic errors and potential index
      out-of-bounds errors in downstream calculations
    stage_ids:
    - data_access
  - id: finance-C-138
    when: When initializing DataPortal with readers from different calendars
    action: reindex readers to align with the target trading_calendar using ReindexMinuteBarReader or ReindexSessionBarReader
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using unaligned readers causes date indexing errors, missing data for non-trading days, and incorrect session-to-minute
      mappings
    stage_ids:
    - data_access
  - id: finance-C-140
    when: When accessing spot values via get_spot_value
    action: route through DataPortal as the sole data access entry point, not directly accessing bar_reader or adjustment_reader
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct bar_reader access bypasses adjustment logic, forward-filling, and lifetime checks, returning unadjusted
      raw prices
    stage_ids:
    - data_access
  - id: finance-C-141
    when: When creating continuous future price series across roll boundaries
    action: apply gap adjustments using the ratio of back_close to front_close at each roll_date to maintain price continuity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without gap adjustments, continuous futures show price discontinuities at roll dates that corrupt momentum
      indicators and cause false trading signals
    stage_ids:
    - data_access
  - id: finance-C-142
    when: When configuring the DataPortal for history windows
    action: tune prefetch_length parameters to balance I/O efficiency against memory consumption for the target deployment
      environment
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Undersized prefetch causes excessive I/O operations slowing backtests; oversized prefetch exhausts memory
      causing OOM failures
    stage_ids:
    - data_access
  - id: finance-C-143
    when: When working with continuous futures history windows
    action: use the ContinuousFutureAdjustmentReader for futures rather than the equity adjustment reader, as futures use
      different roll-based adjustment mechanics
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Equity-style adjustments (split/dividend) do not apply to futures, and continuous futures require roll-date
      gap adjustments that equity readers cannot provide
    stage_ids:
    - data_access
  - id: finance-C-144
    when: When using continuous future adjustment types
    action: request volume adjustments for continuous futures, as the adjustment model only supports 'mul' and 'add' types
      for OHLC price fields
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Volume field requests on continuous futures with adjustment enabled will receive no adjustment, causing volume
      discontinuity at roll boundaries
    stage_ids:
    - data_access
  - id: finance-C-145
    when: When the adjustment_reader parameter is None
    action: claim that price adjustments are being applied, as no splits/dividends/mergers will modify the returned prices
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without an adjustment reader, backtest results will include price jumps from corporate actions that would
      not affect a live trading account holding the same positions
    stage_ids:
    - data_access
  - id: finance-C-146
    when: When using history windows to calculate indicators
    action: claim that the history window data is real-time, as historical windows only provide end-of-bar data with prefetch
      delays
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Historical backtest data accessed via history windows cannot replicate live trading latency, causing strategy
      performance to differ from backtest results
    stage_ids:
    - data_access
  - id: finance-C-147
    when: When computing dividend adjustment ratios
    action: calculate the ratio as 1.0 - dividend_amount / previous_close, warning if ratio <= 0 or NaN to prevent division
      by zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid dividend ratios (zero or negative) indicate incorrect data and will cause price adjustments to produce
      negative or undefined prices
    stage_ids:
    - data_access
  - id: finance-C-148
    when: When implementing split adjustments for volume vs price fields
    action: apply inverse split ratio (1.0/x) for volume adjustments while applying the direct ratio (x) for price adjustments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inverting the split ratio for prices causes volume explosions or collapses, and inverting for prices causes
      incorrect share counts after stock splits
    stage_ids:
    - data_access
  - id: finance-C-149
    when: When forward-filling prices across trading days
    action: adjust ffill-sourced values using get_adjusted_value when the ffill source date differs from the query date to
      account for corporate actions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Forward-filled prices miss adjustment updates across ex-dates, causing stale pre-split or pre-dividend prices
      to persist beyond corporate action boundaries
    stage_ids:
    - data_access
  - id: finance-C-150
    when: When rolling up minute bars to daily bars in minute mode
    action: aggregate OHLC values using the daily_aggregator for the partial last day while using full daily bars for completed
      days
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using incomplete daily data for the current day causes intraday strategy prices to jump when daily bars are
      written retroactively
    stage_ids:
    - data_access
  - id: finance-C-151
    when: When setting up history windows for newly listed assets
    action: return NaN values for periods before asset.start_date instead of extrapolating historical data for the non-existent
      asset
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Returning non-NaN values for pre-IPO periods causes algorithms to trade on non-existent historical prices,
      corrupting early-window indicator calculations
    stage_ids:
    - data_access
  - id: finance-C-152
    when: When reading bar data for minute frequencies
    action: verify datetime indices are sorted in ascending order before searching, as binary search assumes sorted data
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unsorted datetime indices cause searchsorted to return incorrect indices, leading to wrong bar data being
      returned for the requested timestamps
    stage_ids:
    - data_access
  - id: finance-C-153
    when: When using continuous future readers for session vs minute bars
    action: convert roll dates to session boundaries (session_close for last trade, session_first_minute for new contract)
      to maintain proper temporal alignment
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Mismatched temporal boundaries cause gaps or overlaps in continuous price series, corrupting time-series
      analysis and indicator calculations
    stage_ids:
    - data_access
  - id: finance-C-160
    when: When querying FX rates for a single-currency strategy
    action: use ExplodingFXRateReader as fx_reader to prevent unexpected FX rate requests
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without ExplodingFXRateReader, the pipeline engine may attempt to load FX rates even when not needed, causing
      crashes or unexpected behavior
    stage_ids:
    - fx_conversion
  - id: finance-C-162
    when: When querying FX rates for dates before FX data coverage
    action: return NaN instead of raising errors for pre-coverage dates
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Raising errors for pre-coverage dates causes pipeline failures, preventing valuation of assets in early trading
      periods
    stage_ids:
    - fx_conversion
  - id: finance-C-163
    when: When implementing FX rate loader without currency support
    action: use EquityPricingLoader.without_fx() constructor to get ExplodingFXRateReader
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Passing ExplodingFXRateReader directly without proper initialization may cause unexpected behavior in currency
      conversion pipeline checks
    stage_ids:
    - fx_conversion
  - id: finance-C-164
    when: When running pipeline with currency-converted outputs
    action: provide an fx_reader that supports the required quote currencies
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing FX rates for required quote currencies produce NaN values, causing incorrect portfolio allocation
      and potential financial losses
    stage_ids:
    - fx_conversion
  - id: finance-C-166
    when: When processing currency conversion in pipeline loader
    action: multiply price arrays by FX rates in-place to avoid memory overhead
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Creating new arrays instead of in-place multiplication doubles memory usage during pipeline computation,
      potentially causing OOM errors for large portfolios
    stage_ids:
    - fx_conversion
  - id: finance-C-167
    when: When integrating FX reader with pipeline engine
    action: check currency_aware property returns True only when fx_reader is not ExplodingFXRateReader
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect currency_aware property causes pipeline to skip currency conversion for multi-currency portfolios,
      producing incorrect valuations
    stage_ids:
    - fx_conversion
  - id: finance-C-170
    when: When backtesting multi-currency portfolios
    action: claim that simulated FX conversion rates equal actual execution rates
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtested FX conversions use daily close rates without slippage or market impact, overstating expected returns
      compared to live trading
    stage_ids:
    - fx_conversion
  - id: finance-C-171
    when: When comparing portfolio returns across currencies
    action: present backtested currency-converted returns as guaranteed live performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: FX rate fluctuations between backtest period and live trading can significantly alter realized returns, especially
      for volatile currency pairs
    stage_ids:
    - fx_conversion
  - id: finance-C-172
    when: When documenting FX rate data coverage
    action: specify the exact date range and currencies supported by the FX rate source
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Missing coverage documentation leads to silent NaN values for out-of-range currencies/dates, causing incorrect
      portfolio calculations without obvious errors
    stage_ids:
    - fx_conversion
  - id: finance-C-173
    when: When selecting FX rate field for currency conversion
    action: assume each rate fields (bid/ask/mid/london_close/tokyo_close) are equivalent
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Using incorrect rate field introduces systematic bias - mid rates assume zero spread while bid/ask include
      transaction costs, affecting portfolio performance expectations
    stage_ids:
    - fx_conversion
  - id: finance-C-178
    when: When providing AssetFinder for lifetime validation in pipeline computation
    action: Pass same AssetFinder instance used for asset metadata to SimplePipelineEngine
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Pipeline will compute factors for assets outside their valid lifetimes, causing look-ahead bias and incorrect
      factor values for expired securities
  - id: finance-C-179
    when: When registering BoundColumns (USEquityPricing) for pipeline data access
    action: Register columns with correct DataSet mappings that match bar data field names (open, high, low, close, volume)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pipeline computations will fail or return NaN values for missing columns, causing factor calculations to
      produce invalid results
  - id: finance-C-180
    when: When returning pipeline outputs via TradingAlgorithm.pipeline_output()
    action: Return DataFrame indexed by datetime with asset SIDs as columns, aligned to current simulation date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Algorithm will receive incorrectly indexed data, causing order sizing and asset selection to operate on stale
      or misaligned factor values
  - id: finance-C-183
    when: When creating Order objects via blotter.order() with execution styles
    action: Pass valid Asset object, integer amount, and ExecutionStyle (MarketOrder/LimitOrder/StopOrder) with price constraints
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid orders bypass validation, causing execution failures or fills at incorrect prices with potential
      for infinite orders
  - id: finance-C-184
    when: When passing execution style with order details
    action: Convert ExecutionStyle to stop/limit prices before Order instantiation, preserving direction semantics
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stop/limit orders fill at wrong prices, causing financial losses from overpaying for buys or underselling
      for shorts
  - id: finance-C-187
    when: When retrieving dividend data for accrual calculations
    action: Query dividends using held_sids filtered by asset_finder, with ex_date matching next_session
    severity: high
    kind: domain_rule
    modality: must
    consequence: Dividends are not accrued or paid, causing cash balance errors and violating regulatory reporting requirements
  - id: finance-C-188
    when: When updating position valuations via Ledger.update_positions with price data
    action: Use last_traded_dt-aligned prices for unrealized PnL calculation, not future session prices
    severity: high
    kind: domain_rule
    modality: must
    consequence: Position values reflect future prices, causing misleading equity curve and incorrect risk metrics
  - id: finance-C-189
    when: When injecting FXRateReader into DataPortal for currency conversion
    action: Verify FXRateReader.get_rates returns rates aligned to query datetime index, with quote/base currency codes matching
      asset denominations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Multi-currency positions are valued in wrong currency, causing portfolio value discrepancies and incorrect
      trading decisions
  - id: finance-C-190
    when: When converting spot values using FXRateReader
    action: Apply FX conversion only when asset currency differs from portfolio base currency, preserving native currency
      values
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Double-converted or incorrectly converted prices cause position over/undervaluation and distorted performance
      metrics
  - id: finance-C-191
    when: When yielding performance messages from AlgorithmSimulator
    action: Include daily_perf or minute_perf dicts with portfolio/cumulative/cash_flow data keyed by simulation datetime
    severity: high
    kind: domain_rule
    modality: must
    consequence: Performance aggregation receives malformed packets, causing backtest results to be incomplete or incorrectly
      formatted
  - id: finance-C-192
    when: When processing performance messages for results aggregation
    action: Include recorded_vars, transactions, orders, and positions with correct period_close timestamps
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Backtest output lacks complete audit trail, making it impossible to verify trade executions or debug algorithm
      behavior
  - id: finance-C-193
    when: When representing backtested returns
    action: Present backtest results as equivalent to live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Investors may be misled into expecting live performance matching backtest, leading to financial losses when
      execution differs from simulation
  - id: finance-C-194
    when: When processing dividend data through portfolio accounting
    action: Earn dividends on ex_date but only pay cash on pay_date, maintaining two-phase dividend accounting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cash is prematurely paid before receiving dividend, causing negative cash balances or failed trades
  - id: finance-C-195
    when: When handling asset splits in portfolio accounting
    action: Apply split ratios to position amounts before calculating cost_basis, with fractional shares converted to cash
    severity: high
    kind: domain_rule
    modality: must
    consequence: Position quantity and cost basis become inconsistent, causing PnL miscalculations after corporate actions
  - id: finance-C-196
    when: When validating transaction prices during order execution
    action: Apply slippage model to determine execution price, ensuring fills respect limit/stop price constraints
    severity: high
    kind: domain_rule
    modality: must
    consequence: Orders fill at prices outside acceptable bounds, causing unexpected transaction costs and reduced alpha capture
  - id: finance-C-197
    when: When converting Order to Transaction via blotter.get_transactions
    action: Pass current simulation datetime and BarData to slippage model for price impact calculation
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Slippage calculation uses stale or incorrect price data, causing fill prices to diverge from market conditions
  - id: finance-C-198
    when: When computing asset lifetimes for pipeline root mask
    action: Query AssetFinder.lifetimes with trading calendar dates, including start_date based on extra_rows buffer
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pipeline computes factors for assets before their start_date or after end_date, causing NaN values and incorrect
      screening
  - id: finance-C-201
    when: When tracking positions in the Position class
    action: Represent long positions with positive amount values and short positions with negative amount values; do not use
      a separate is_short flag
    severity: high
    kind: domain_rule
    modality: must
    consequence: Position tracking will be inconsistent — using a separate is_short flag alongside amount would create conflicting
      position state representations, causing incorrect PnL calculations and exposure metrics
  - id: finance-C-202
    when: When running Pipeline computations with start_date and end_date parameters
    action: Pass only trading session dates that exist in the domain calendar; non-session dates will be rejected with ValueError
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pipeline computation will fail with ValueError stating the date is not a trading session, preventing any
      factor or filter evaluation for the requested period
  - id: finance-C-203
    when: When implementing a Pipeline term subclass (Factor, Filter, or Classifier)
    action: 'Return the correct dtype: Factor outputs MUST be float64/int64/datetime64, Filter outputs MUST be bool, Classifier
      outputs MUST be categorical/int64/object'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pipeline computation will raise UnsupportedDataType error because the output dtype violates the type contract
      for that term kind, breaking downstream term dependencies
  - id: finance-C-204
    when: When processing corporate actions (dividends, splits, mergers) in historical price adjustments
    action: Apply adjustment ratios retroactively so adjusted historical prices are less than or equal to raw prices; dividends
      reduce price by the ratio at ex_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtest will use inflated historical prices, causing position valuations to exceed true historical value
      and generating artificial returns that cannot be realized in live trading
  - id: finance-C-205
    when: When querying price or volume data through a BarReader implementation
    action: Implement the last_available_dt abstract property to return the most recent session timestamp for which the reader
      can provide complete data
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Data availability checks will fail, causing NoDataOnDate or data staleness errors; backtest may attempt to
      access future data or fail to detect data gaps
    stage_ids:
    - data_access
  - id: finance-C-206
    when: When executing Pipeline terms that depend on historical data windows (e.g., moving averages)
    action: Verify the simulation provides at least window_length + lookback_buffer days of historical data before computing
      the first valid output
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Pipeline will raise NoFurtherDataError from insufficient lookback data, preventing indicator computation
      and causing the backtest to terminate prematurely
  - id: finance-C-207
    when: When looking up assets by symbol strings
    action: Use symbol strings only as lookup keys; each internal asset operations must use the integer SID for consistent
      referencing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Symbol ambiguity may cause wrong asset to be selected (multiple assets can share symbols over time), leading
      to trading wrong securities and corrupting backtest results
  - id: finance-C-208
    when: When exposing portfolio and account metrics to user algorithms
    action: Wrap mutable objects in MutableView to prevent direct mutation while allowing read access through the same attribute
      interface
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: User code could mutate portfolio state directly, causing inconsistency between internal ledger and exposed
      metrics, corrupting backtest results
  - id: finance-C-209
    when: When creating Pipeline term instances (Factor, Filter, Classifier) for use in graphs
    action: Use the memoized __new__ constructor to verify term identity; equivalent term configurations must return the same
      instance for graph operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Pipeline dependency graph will treat semantically identical terms as different nodes, causing redundant computations
      and incorrect graph traversal during pipeline execution
  - id: finance-C-210
    when: When processing futures cash flow in the Ledger
    action: 'Calculate cash flow using exposure-based formula: cash_flow = (new_price - old_price) × multiplier × position_amount
      for futures; equity uses -price × amount'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Futures margin and PnL will be incorrectly calculated, leading to wrong equity curve and potential margin
      calls in live trading that would not occur based on backtest results
  - id: finance-C-211
    when: When creating continuous futures contracts via continuous_future()
    action: Use adjustment='mul' (default) for ratio-based roll transitions that preserve price continuity; use adjustment='add'
      only when explicit additive adjustment is required
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Continuous futures price series will have discontinuous jumps at roll dates when wrong adjustment style is
      used, corrupting strategy signals and causing unrealistic backtest performance
  - id: finance-C-212
    when: When managing order lifecycle state transitions
    action: 'Follow strict state transition order: orders start as OPEN, transition through FILLED when fully executed, or
      CANCELLED/REJECTED/HELD as terminal/intermediate states'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Order state machine violations will cause orders to be processed incorrectly — filled orders may still appear
      open or vice versa, corrupting position tracking and PnL
  - id: finance-C-213
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live returns — backtesting ignores market impact, financing costs,
      and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss when market impact and costs exceed modeled approximations
  - id: finance-C-214
    when: When claiming the capabilities of this trading system to external users or stakeholders
    action: Claim support for real-time production trading — this system is explicitly designed for backtesting only and requires
      custom integration for live trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will attempt to deploy the system for live trading without proper infrastructure, causing execution
      failures, missed orders, and potential financial losses due to lack of real-time data feeds and order execution capabilities
  - id: finance-C-215
    when: When claiming the capabilities of this trading system for options pricing, portfolio optimization, or high-frequency
      tick-level trading
    action: Claim support for options pricing, portfolio optimization, or high-frequency tick-level modeling — these require
      specialized engines not provided by this framework
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will build systems expecting options Greeks, mean-variance optimization, or sub-second execution that
      this backtesting framework cannot provide, leading to critical capability gaps in production systems
  - id: finance-C-216
    when: When handling datetime objects within the algorithm execution context
    action: Use UTC timezone for each internal datetime tracking; algorithm dt must be tz-aware with UTC as the canonical
      timezone
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Trading calendar calculations and session boundaries will be misaligned, causing orders to be placed outside
      market hours or missed entirely due to timezone mismatches
  - id: finance-C-217
    when: When requesting historical pricing data via data.history() or pipeline windows
    action: Allow the SlidingWindow mechanism to amortize adjustment computation across monotonically increasing end_dt requests
      rather than recomputing from scratch each time
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Backtest will run extremely slowly as adjustment calculations are repeated for every bar, making long backtests
      computationally infeasible
  - id: finance-C-218
    when: When implementing or refactoring TermGraph.compute_chunk() execution
    action: Call execution_order() and refcounts() before invoking compute_chunk() to satisfy the strict ordering contract
      for graph execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling compute_chunk() without first invoking execution_order() and refcounts() raises AttributeError or
      produces incorrect dependency ordering, causing pipeline results to be corrupted or fail silently
    derived_from_bd_id: BD-076
  - id: finance-C-220
    when: When implementing or modifying ledger cash flow calculations
    action: 'Use exposure-based calculation: cash_flow = exposure * direction * multiplier; do not replace with simple position
      * price multiplication which fails to handle leverage and short positions correctly'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple position*price instead of exposure*direction*multiplier incorrectly calculates PnL for leveraged
      positions and short trades, causing portfolio valuation errors that compound over time
    derived_from_bd_id: BD-080
  - id: finance-C-221
    when: When implementing currency conversion in multi-currency backtesting
    action: Apply multiplier=1.0 for fiat currencies (AUD,CAD,CHF,CNY,EUR,GBP,HKD,JPY,NZD,SGD,USD) and use separate conversion
      logic for cryptocurrency pairs; do not apply uniform conversion across each FX pairs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using uniform FX conversion logic for both fiat and cryptocurrency ignores the different market structures
      and variable multipliers of crypto, causing incorrect portfolio valuations in mixed asset backtests
    derived_from_bd_id: BD-087
  - id: finance-C-222
    when: When implementing or refactoring order execution logic in backtesting
    action: Enforce strict order state transitions following CREATED→OPEN→FILLED/CANCELLED lifecycle, and verify ledger registration
      only occurs after filled=True status is confirmed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Violating order state transitions or registering unfilled orders causes double-filling, portfolio inconsistency,
      and potential regulatory violations in live trading due to trades executing out of sequence
    derived_from_bd_id: BD-079
  - id: finance-C-223
    when: When configuring OLMAR portfolio optimizer for small portfolios or low-priced assets
    action: Assume the simplex projection handles arbitrary price scaling precision without weight normalization errors —
      the multiply-by-1000 uint32 storage has a 3-decimal precision limit that causes weight sum deviations from 1.0
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: OLMAR simplex projection fails for low-priced assets where uint32 scaling rounds prices, causing weight normalization
      to produce negative weights or sums deviating from 1.0, leading to incorrect position sizing and portfolio losses
    derived_from_bd_id: BD-094
  - id: finance-C-224
    when: When validating OLMAR portfolio optimizer configuration before backtesting
    action: Check portfolio weights sum to 1.0 within tolerance after simplex projection, and apply explicit renormalization
      or increase price scaling precision for low-priced assets (prices < $10) or small portfolios (value < $10,000)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unchecked weight normalization errors in OLMAR compound over trading days, causing cumulative allocation
      errors that diverge from intended portfolio weights and degrade strategy performance
    derived_from_bd_id: BD-094
  - id: finance-C-225
    when: When tracking model performance, diagnosing production issues, or conducting regulatory audits
    action: Assume the framework provides model/data version snapshot capabilities — the framework does not implement model
      versioning or data snapshot tracking
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without model/data versioning, production issues become difficult to diagnose as the exact state of model
      parameters and input data cannot be reproduced, causing extended downtime and regulatory audit failures
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-226
    when: When setting up data ingestion pipeline configuration for production deployments
    action: Implement model and data versioning by storing git commit hashes with model parameters, recording data source
      versions and timestamps, and logging version snapshots alongside backtest results for reproducibility
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing version snapshots prevent accurate reproduction of backtest conditions, making it impossible to debug
      live-vs-backtest discrepancies and comply with regulatory requirements for trading system audit trails
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-227
    when: When configuring data collection priority or regulatory compliance checks in the ingestion pipeline
    action: Assume the framework implements collection priority and compliance validation — the framework does not provide
      built-in priority queuing or compliance rule checking for data ingestion
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without collection priority and compliance checks, the ingestion pipeline cannot enforce regulatory requirements
      for data handling priority, potentially processing high-priority data late and violating compliance obligations
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-228
    when: When configuring data ingestion pipeline for regulated trading environments
    action: Implement collection priority and compliance checks by defining priority levels for data types, configuring compliance
      validation rules (e.g., data freshness requirements, source authorization), and logging compliance status for audit
      purposes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing compliance checks in production ingestion pipelines cause regulatory violations, failed audits, and
      potential trading suspensions due to inability to demonstrate proper data handling controls
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-229
    when: When implementing position tracking and PnL calculation logic
    action: Assume the framework implements PnL conservation checks — the framework does not verify that realized_pnl + unrealized_pnl
      equals total_pnl; manual validation is required
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit PnL conservation validation, floating point rounding errors or position delta bugs accumulate
      silently, causing backtest equity curves to diverge from actual trade records by small per-trade amounts that compound
      over thousands of transactions
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-230
    when: When implementing position tracking and PnL calculation logic
    action: 'Implement explicit PnL conservation validation: after each trade, verify that abs(realized_pnl + unrealized_pnl
      - total_pnl) < 1e-6, and log discrepancies for audit review'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without explicit PnL conservation validation, floating point rounding errors or position delta bugs accumulate
      silently, causing backtest equity curves to diverge from actual trade records by small per-trade amounts that compound
      over thousands of transactions
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-231
    when: When computing annualized metrics (Sharpe ratio, volatility, Sortino ratio) using TRADING_DAYS_IN_YEAR and comparing
      them across modules
    action: Use a consistent TRADING_DAYS_IN_YEAR value (either 250 or 252) across each annualized calculations; document
      the chosen convention and validate that annualized_volatility, annual_volatility, and Sharpe ratio each reference the
      same constant
    severity: high
    kind: domain_rule
    modality: must
    consequence: When TRADING_DAYS_IN_YEAR=250 is used for returns but 252 is used for volatility, Sharpe ratios are miscalculated
      by approximately 0.8%, causing strategies to appear more or less attractive than they actually are during live trading
    derived_from_bd_id: BD-090
  - id: finance-C-232
    when: When implementing volatility calculation with expanding window and computing annualized return metrics
    action: Use simple returns with expanding volatility window — simple returns assume no reinvestment while sqrt(252) annualization
      assumes i.i.d. returns, but expanding windows create autocorrelated volatility estimates that violate the i.i.d. assumption
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Combining simple returns with expanding volatility windows creates non-uniform mixing of historical and current
      observations, causing volatility estimates to be autocorrelated and overstated by 10-20% for trending strategies, leading
      to incorrect risk assessment and potentially premature strategy termination
    derived_from_bd_id: BD-095
  - id: finance-C-233
    when: When implementing credit risk or loan performance analysis in the backtesting framework
    action: Assume the framework defines or handles delinquency/DPD (Days Past Due) — this capability is not implemented
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without a defined delinquency threshold, credit risk models may misclassify loan performance states, causing
      systematic underestimation of default risk in the backtested portfolio
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-234
    when: When implementing credit risk scoring or loan performance tracking
    action: Define explicit DPD threshold (industry standard is DPD >= 30 days for delinquency classification) and implement
      custom logic to flag delinquent accounts based on payment schedules
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without an explicit DPD definition, the framework treats all accounts uniformly, making it impossible to
      segment performing vs non-performing loans for risk-adjusted return calculations
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-236
    when: When implementing equity order sizing or slippage modeling
    action: Limit equity orders to 2.5% or less of bar volume when using VolumeShareSlippage — orders exceeding this threshold
      should be split or flagged as having unrealistic market impact
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Orders exceeding 2.5% of bar volume assume unrealistic market participation rates; backtested execution prices
      will be significantly better than live trading, causing strategies to appear profitable when they cannot be executed
    derived_from_bd_id: BD-009
  - id: finance-C-237
    when: When configuring VolumeShareSlippage for equity strategies
    action: Verify price_impact=0.1 coefficient matches strategy liquidity assumptions before backtesting — adjust based on
      actual market microstructure or use regime-aware coefficients
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The 0.1 coefficient is calibrated for normal market conditions; changing it without empirical validation
      causes systematic over- or under-estimation of execution costs, distorting strategy profitability metrics
    derived_from_bd_id: BD-010
  - id: finance-C-238
    when: When implementing futures order sizing or slippage modeling
    action: Limit futures orders to 5% or less of bar volume when using VolumeShareSlippage — orders exceeding this threshold
      should be split or flagged as having unrealistic market impact
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Orders exceeding 5% of bar volume in futures markets assume unrealistic participation rates; backtested execution
      will overstate fill quality compared to live trading where large orders face significant market impact
    derived_from_bd_id: BD-011
  - id: finance-C-239
    when: When configuring PerShare commission model for equity trading
    action: Set min_trade_cost to match actual broker minimum commission ($1.00 is typical) — verify this floor is applied
      to prevent unrealistic zero-cost tiny orders in backtesting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without minimum trade cost floor, micro-orders incur negligible commission in backtests; strategies optimized
      for tiny order sizes will show unrealistic returns that cannot be replicated in live trading
    derived_from_bd_id: BD-012
  - id: finance-C-240
    when: When implementing dual moving average strategy or any MA-based signal generation
    action: Use 100-day short window and 300-day long window — verify warmup period of at least 300 bars before generating
      signals to avoid look-ahead bias from insufficient historical data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using shorter windows like 20/50 reduces warmup requirements but changes signal responsiveness and may introduce
      false signals; changing to longer windows increases data requirements without justification
    derived_from_bd_id: BD-014
  - id: finance-C-242
    when: When running backtests with moving average strategies in the framework
    action: Verify that warmup period is sufficient for the longest moving average; for dual_moving_average with 300-day warmup,
      verify backtest period exceeds 300 + expected signal days to avoid trading on incomplete data
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Backtests with insufficient warmup generate signals from incomplete moving averages, causing premature entries
      and exits that produce unreliable backtest results; live trading with proper warmup will show different signals
    derived_from_bd_id: BD-015
  - id: finance-C-243
    when: When implementing RSI momentum strategy portfolio construction
    action: Limit portfolio to top 3 longs and bottom 3 shorts per rebalance period — do not increase position count without
      recalibrating turnover and risk assumptions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Increasing position count to 5 or more significantly increases turnover and reduces per-position conviction,
      changing strategy risk characteristics and transaction costs from backtested values
    derived_from_bd_id: BD-016
  - id: finance-C-245
    when: When configuring RSI momentum strategy parameters
    action: Verify RSI window length matches strategy intent — default 15-day window balances noise and lag; changing to 14-day
      (standard) or shorter/longer values changes overbought/oversold thresholds and signal frequency
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using non-15-day RSI windows changes signal generation frequency and threshold crossings, causing backtest
      results to diverge from expected medium-term momentum behavior
    derived_from_bd_id: BD-018
  - id: finance-C-246
    when: When implementing Bollinger Bands in strategy
    action: Verify k=2 standard deviation multiplier matches strategy intent — k=2 captures ~95% of price action; changing
      k to 1 (68% coverage) or 3 (99.7%) alters band width and signal frequency
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using non-k=2 Bollinger Bands changes support/resistance level detection and signal frequency, causing backtest
      results to reflect different volatility assumptions than intended
    derived_from_bd_id: BD-019
  - id: finance-C-248
    when: When implementing limit order execution price calculation
    action: 'Round limit prices conservatively: round DOWN for buy orders and round UP for sell orders — this rounding is
      AGAINST the trader to verify worst-case conservative execution assumptions'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using symmetric or opposite rounding (optimistic assumptions) makes backtest results unrealistically favorable;
      actual execution in live trading may fail or execute at worse prices
    derived_from_bd_id: BD-021
  - id: finance-C-249
    when: When implementing stop order execution price calculation
    action: 'Round stop prices OPPOSITE to limit order rounding: round UP for buy stops and round DOWN for sell stops — this
      ensures stop triggers at or beyond intended price level'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using same rounding direction as limit orders for stops causes unintended trigger prices; buy stops may trigger
      prematurely at higher prices, sell stops at lower prices, causing unexpected executions
    derived_from_bd_id: BD-022
  - id: finance-C-250
    when: When implementing order price handling for assets without specified tick
    action: Verify $0.01 default tick size matches actual asset requirements — for high-priced securities or derivatives with
      different minimum increments, use asset-specific tick sizes instead of default
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using $0.01 tick for assets with larger minimum increments (e.g., $0.05, $0.10) causes price precision that
      doesn't match exchange rules; live orders may be rejected or rounded differently
    derived_from_bd_id: BD-023
  - id: finance-C-251
    when: When implementing order cancellation logic in backtesting
    action: Orders persist until explicitly filled or cancelled — default CancelPolicy is NeverCancel; if implementing time-based
      expiration, clearly document and handle order non-execution scenarios
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtests assuming orders never expire may show execution rates higher than live trading where orders can
      expire; strategies relying on unfilled orders behaving differently need explicit expiration handling
    derived_from_bd_id: BD-024
  - id: finance-C-252
    when: When implementing history lookback logic for daily-frequency backtesting
    action: Verify that 40 trading days is sufficient for the strategy's required lookback period; for strategies needing
      50+ days of daily data, explicitly configure a longer window
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Strategies requiring lookbacks beyond 40 days will experience data truncation or cache misses, causing incorrect
      technical indicator calculations and potentially signaling trades at wrong prices
    derived_from_bd_id: BD-026
  - id: finance-C-253
    when: When calculating annualized performance metrics (Sharpe ratio, returns, volatility)
    action: Use TRADING_DAYS_IN_YEAR=250 for US equity annualization, which accounts for weekends and market holidays; do
      not use calendar days (365) or exact trading days (252) without explicit justification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 365 calendar days underestimates annualized returns by ~31%; using 252 exact days inflates Sharpe by
      ~1.5%; both cause strategy selection errors and investor miscommunication about expected performance
    derived_from_bd_id: BD-029
  - id: finance-C-254
    when: When converting minute-frequency returns to annualized metrics
    action: Use TRADING_HOURS_IN_DAY=6.5 for minute annualization (US equity 9:30 AM - 4:00 PM EST with buffer); exclude pre/post-market
      minutes from standard annualization unless explicitly modeling extended hours
    severity: high
    kind: domain_rule
    modality: must
    consequence: Converting minute returns with incorrect hourly assumption distorts annualized volatility estimates; strategies
      appear more or less risky than they actually are, leading to inappropriate position sizing and risk management
    derived_from_bd_id: BD-030
  - id: finance-C-255
    when: When implementing OLMAR or similar mean-reversion portfolio strategies
    action: Verify OLMAR parameters (eps=1, window_length=5) match the strategy's risk tolerance and market regime; these
      defaults are tuned for specific market conditions and may require adjustment for different asset classes or time periods
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using OLMAR defaults without tuning produces suboptimal portfolios; eps=1 allows only 100% deviation from
      uniform allocation which may be too restrictive for volatile markets or too aggressive for stable ones
    derived_from_bd_id: BD-034
  - id: finance-C-256
    when: When implementing OLMAR portfolio optimization weight normalization
    action: Apply simplex projection to verify portfolio weights remain non-negative and sum to exactly 1.0 — do not use simple
      truncation or scaling methods that fail to satisfy both constraints simultaneously
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple truncation instead of simplex projection produces invalid portfolio allocations where weights
      either exceed budget or fail to sum to 1.0, causing backtest failures or misleading equity curves
    derived_from_bd_id: BD-035
  - id: finance-C-257
    when: When configuring PerDollar commission model for backtesting
    action: Verify that $0.0015 per dollar (15 bps) matches actual broker fee structure — typical retail brokers use per-share
      commissions ($0.005-0.01 per share), not percentage-of-assets fees
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using percentage-of-assets commission (15 bps) underestimates costs for strategies with small capital turnover
      and overestimates for high-turnover strategies, distorting strategy profitability estimates
    derived_from_bd_id: BD-038
  - id: finance-C-258
    when: When configuring PerContract commission model for futures backtesting
    action: Verify that $0.85 per contract matches actual futures broker fees — exchange and instrument-specific fees vary
      significantly; adjust for high-frequency strategies where commission dominates returns
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default $0.85 per contract underestimates actual costs for strategies trading micro futures (~$0.50-0.80)
      or overestimates for high-volume institutional accounts, causing profitability misestimation
    derived_from_bd_id: BD-039
  - id: finance-C-259
    when: When implementing order execution price rounding logic
    action: Apply 0.95 threshold for asymmetric rounding direction — when fractional part >= 0.95, round against trader (down
      for buys, up for sells) to model conservative market maker behavior
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using symmetric midpoint rounding (0.5 threshold) creates artificially optimistic execution assumptions,
      causing backtest returns to exceed what would be achieved in live trading with realistic slippage
    derived_from_bd_id: BD-040
  - id: finance-C-260
    when: When using or refactoring MACD factor implementation
    action: Change MACD parameters (fast=12, slow=26, signal=9) without validation — these are non-adaptive and assume stationary
      statistical properties over the signal window; modifying them alters the indicator's sensitivity to market cycles
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Changing MACD periods from 12/26/9 to different values changes signal timing and crossover frequency, potentially
      turning a profitable strategy into a losing one without proper re-optimization and walk-forward validation
    derived_from_bd_id: BD-046
  - id: finance-C-261
    when: When applying RollingPearson correlation to non-linear or non-normal return relationships
    action: Verify that the relationship between X and Y is approximately linear and that return distributions are approximately
      normal before using RollingPearson; for non-linear dependencies, use RollingSpearman instead
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Pearson correlation assumes linear relationships; applying it to non-linear dependencies (e.g., quadratic,
      exponential) produces near-zero correlation for strongly related pairs, causing factor models to miss true relationships
      and produce invalid signals
    derived_from_bd_id: BD-047
  - id: finance-C-262
    when: When applying RollingLinearRegression to heteroscedastic or autocorrelated financial time series
    action: Use RollingLinearRegression for financial returns with homoscedastic, uncorrelated errors only — heteroscedasticity
      or autocorrelation invalidates standard errors and produces unreliable beta estimates and statistical significance metrics
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: OLS standard errors computed by scipy.stats.linregress become unreliable when applied to heteroscedastic
      return series (common during volatile periods), producing statistically significant betas that are actually noise and
      leading to wrong risk estimates
    derived_from_bd_id: BD-049
  - id: finance-C-263
    when: When applying winsorize to asymmetric factor distributions
    action: Verify that winsorization percentile thresholds match expected tail distributions — symmetric winsorization may
      not suit asymmetric factors; adjust lower and upper percentiles independently for skewed distributions
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Symmetric winsorization at (1%, 99%) clips both tails equally, which over-clips the shorter tail and under-clips
      the longer tail in asymmetric distributions, distorting factor rankings and causing suboptimal portfolio construction
    derived_from_bd_id: BD-055
  - id: finance-C-264
    when: When using VolumeShareSlippage in markets with non-stationary volume patterns
    action: Recalibrate the volume impact coefficient periodically — VolumeShareSlippage assumes stationary volume patterns;
      the quadratic impact formula breaks down when ADV changes significantly (e.g., during earnings, crisis periods)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using stale VolumeShareSlippage calibration causes systematic underestimation of trading costs when market
      liquidity drops or overestimation when liquidity increases, leading to backtest results that do not match live execution
      costs
    derived_from_bd_id: BD-056
  - id: finance-C-265
    when: When applying FixedBasisPointsSlippage to large block trades or time-varying liquidity
    action: Use FixedBasisPointsSlippage only for small-to-medium orders with constant market impact — for block trades exceeding
      volume cap or intraday periods with varying liquidity, the fixed model systematically underestimates impact
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: FixedBasisPointsSlippage underestimates market impact for large block orders because the quadratic relationship
      between order size and impact is not captured, causing backtested execution costs to appear lower than actual live trading
      costs
    derived_from_bd_id: BD-057
  - id: finance-C-266
    when: When applying VolatilityVolumeShare to equity instruments instead of futures
    action: Use equity-calibrated eta values for equity instruments — VolatilityVolumeShare with futures-calibrated eta systematically
      misestimates equity market impact due to different microstructure and liquidity characteristics
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Futures-calibrated eta produces incorrect market impact estimates for equities due to different tick sizes,
      exchange rules, and liquidity profiles, causing backtest execution costs to diverge significantly from live trading
      reality
    derived_from_bd_id: BD-058
  - id: finance-C-268
    when: When backtesting strategies with non-trading day indicators or holiday-adjacent signals on international assets
    action: Adjust prefetch windows for non-NYSE calendars or strategies sensitive to holiday patterns; the 40-day daily and
      1560-minute minute prefetch defaults are optimized for NYSE and may cause stale data references around partial trading
      days
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: NYSE-centric prefetch windows miss partial trading days around US holidays, causing strategies using holiday-adjacent
      signals or international assets to reference stale data and produce inconsistent backtest results
    derived_from_bd_id: BD-096
  - id: finance-C-269
    when: When ingesting data from Quandl API in data_ingestion pipelines
    action: Implement exponential backoff for API retries instead of fixed retry count — the default 3-attempt strategy breaks
      under rate limiting or prolonged outages where backoff is required
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Fixed retry count without exponential backoff fails under API rate limiting or extended outages, causing
      data ingestion pipelines to terminate prematurely and leaving backtests with incomplete historical data
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-270
    when: When ingesting custom CSV data bundles via directory-based CSV ingestion
    action: Verify directory permissions are granted and CSV files conform to expected schemas before ingestion; inconsistent
      schemas or permission errors will cause silent data loading failures
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: CSV directory ingestion assumes unrestricted directory access and consistent file schemas; restrictive permissions
      or malformed CSVs cause silent loading failures that leave backtests with missing or partial data
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-271
    when: When configuring benchmark returns in backtesting
    action: Verify that the benchmark asset remains constant throughout the simulation period; if mid-simulation benchmark
      changes are required, use on-demand computation instead of pre-calculated returns; additionally confirm available memory
      can accommodate the pre-calculated series
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Pre-calculated benchmark returns will mismatch the intended benchmark if the benchmark asset changes mid-simulation,
      causing the backtest equity curve to be attributed to the wrong benchmark and producing misleading performance metrics
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-272
    when: When implementing symbol lookup logic in backtesting
    action: Return NaN or 0 (failure indicator) when symbol lookup is ambiguous or not found — must_not return partial matches
      or iterate through candidates; log the lookup failure for manual resolution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning symbol matches for ambiguous lookups causes data misattribution, where trades execute on the wrong
      security, corrupting the backtest equity curve with price data from an unintended asset
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-273
    when: When using the framework's default slippage model for equity backtesting
    action: Verify that FixedBasisPointsSlippage(10 bps) matches actual broker fees and market impact for the target equity;
      10 bps represents an average assumption that may not reflect order-size-dependent costs — large orders exceeding 5%
      of ADV face higher friction, while small orders in liquid ETFs face lower costs
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using the 10 bps default causes systematic backtest overestimation for institutional strategies executing
      large blocks, or underestimation for retail strategies with small orders in liquid ETFs, leading to live trading returns
      diverging significantly from backtested results
    derived_from_bd_id: BD-006
  - id: finance-C-274
    when: When using the framework's default slippage model for futures backtesting
    action: Verify that VolatilityVolumeShare parameters (fixed decay coefficients, volume sensitivity) align with actual
      futures contract liquidity profiles; the default may not capture high-volatility regime spikes or illiquid contract
      market impact
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default VolatilityVolumeShare parameters mismatched to specific futures contracts cause execution cost misestimation,
      with backtest returns appearing better than actual for illiquid contracts like bond futures during high-volatility periods
    derived_from_bd_id: BD-007
  - id: finance-C-275
    when: When configuring EWMA factors in pipeline calculations
    action: Explicitly specify warm-up period sufficient for EWMA convergence (typically 3-5x the decay parameter); EWMA has
      infinite theoretical memory with exponentially decaying weights that never fully converge, requiring explicit warm-up
      to avoid factor contamination from early observations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Insufficient warm-up causes EWMA factors to be contaminated by early observations that may reflect a different
      market regime, leading to factor values that don't represent current market conditions and degraded strategy signals
    derived_from_bd_id: BD-064
  - id: finance-C-276
    when: When processing price data for assets with high precision requirements
    action: Verify that uint32 price storage (multiply by 1000) provides sufficient precision for target assets; check that
      prices do not exceed ~$4 million (uint32 range / 1000) and that sub-millisecond precision is not required for the strategy
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Price scaling to uint32 loses precision below 0.001 units and causes silent overflow for assets priced above
      ~$4 million, leading to execution errors or system failures when backtesting high-priced securities or cryptocurrencies
      with fine price granularity
    derived_from_bd_id: BD-068
  - id: finance-C-277
    when: When calculating annualized volatility for strategy risk management
    action: Validate expanding-window volatility estimates against recent rolling-window values to detect regime changes;
      expanding std permanently includes early observations that may reflect different market conditions, causing stale volatility
      estimates that misrepresent current risk
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Expanding-window annual volatility permanently includes early regime observations, overstating volatility
      in stable trending markets and understating it during regime transitions, causing risk models to misallocate capital
      and exceed drawdown targets
    derived_from_bd_id: BD-070
  - id: finance-C-278
    when: When implementing or deploying zipline-reloaded
    action: Use Python version 3.9 or higher
    severity: high
    kind: resource_boundary
    modality: must
    consequence: The library is designed for Python >= 3.9 and will fail to install or run on earlier versions due to incompatible
      syntax and standard library features
  - id: finance-C-279
    when: When installing or upgrading zipline-reloaded
    action: Use pandas version 2.0 or higher
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Zipline 3.0+ requires pandas >= 2.0 which includes breaking changes from pandas 1.x. Using older pandas will
      cause import failures and API incompatibilities
  - id: finance-C-280
    when: When installing or upgrading zipline-reloaded
    action: Use SQLAlchemy version 2.0 or higher
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Zipline 3.0+ requires SQLAlchemy >= 2.0 which includes breaking changes from SQLAlchemy 1.x. Older versions
      will cause database operation failures
  - id: finance-C-281
    when: When installing zipline-reloaded with numpy 2.0
    action: Verify pandas version 2.2.2 or higher is installed
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Release 3.05 makes Zipline compatible with Numpy 2.0, but this requires Pandas 2.2.2 or higher. Using older
      pandas with Numpy 2.0 will cause compatibility errors
  - id: finance-C-282
    when: When installing or upgrading zipline-reloaded
    action: Use exchange_calendars version 4.2 or higher
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Release 2.4 switched to exchange_calendars >= 4.2 which is a major version update that may break existing
      calendar-related code
  - id: finance-C-283
    when: When modifying performance-critical code paths
    action: Use Cython for performance-critical components
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: The project uses Cython for performance-critical components. Using pure Python in these paths will significantly
      degrade backtesting performance
  - id: finance-C-284
    when: When developing new features or modifying APIs
    action: Review pandas 2.0 breaking changes documentation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Major version updates (pandas >= 2.0, SQLAlchemy > 2.0) include breaking API changes that may break existing
      code if not reviewed
  - id: finance-C-285
    when: When developing new data bundle loaders
    action: Follow the established pattern in src/zipline/data/bundles/
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Data bundle loaders must follow the established architecture pattern to integrate properly with the data
      pipeline and ingest system
  - id: finance-C-286
    when: When developing new pipeline factors
    action: Follow the established pattern in src/zipline/pipeline/factors/
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Pipeline factors must follow the established architecture pattern to integrate properly with the factor-based
      screening system
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
