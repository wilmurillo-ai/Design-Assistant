    - id: BD-019
      type: BA/DK
      summary: Flexible to_df with index/sort parameters
    - id: BD-053
      type: B/BA
      summary: Rolling window statistics (skew, variance, stdev, kurtosis)
    - id: BD-054
      type: B/BA
      summary: Rolling quantile calculation with median
    - id: BD-GAP-003
      type: B
      summary: Token sanitization in command history to redact sensitive credentials
    - id: BD-GAP-007
      type: B
      summary: Obfuscate sensitive information in HTTP response logging for ClientSession
    - id: BD-GAP-017
      type: B
      summary: Hash comparison for system settings to detect external modifications
    - id: BD-062
      type: B
      summary: MACD (Moving Average Convergence Divergence) parameters
    - id: BD-063
      type: B/BA
      summary: ADX (Average Directional Index) parameters
    - id: BD-064
      type: B/BA
      summary: RSI (Relative Strength Index) thresholds for overbought/oversold
    - id: BD-065
      type: B/BA
      summary: CCI (Commodity Channel Index) thresholds
    - id: BD-066
      type: B/BA
      summary: Fisher Transform thresholds for extreme readings
    - id: BD-067
      type: B/BA
      summary: Aroon indicator parameters
    - id: BD-GAP-002
      type: B/BA
      summary: Support custom argument groups beyond argparse defaults for organizing CLI commands
resources:
  packages:
  - name: openbb-core
    version_pin: latest
  - name: uvicorn
    version_pin: latest
  - name: fastapi
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: requests
    version_pin: latest
  - name: aiohttp
    version_pin: latest
  - name: pydantic
    version_pin: latest
  - name: python-multipart
    version_pin: latest
  - name: python-dotenv
    version_pin: latest
  - name: websockets
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install openbb-core
    - python3 -m pip install uvicorn
    - python3 -m pip install fastapi
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing a new provider extension
    action: Register the provider via the 'openbb_provider_extension' entry point in pyproject.toml
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Provider will not be discovered by ExtensionLoader, missing from provider_choices, and unusable through PlatformController
    stage_ids:
    - extension_loading
  - id: finance-C-002
    when: When implementing a new OBBject extension
    action: Return an instance of Extension class from the entry point
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Extension will be skipped during loading because load_obbject checks isinstance(entry, Extension) at line
      160
    stage_ids:
    - extension_loading
  - id: finance-C-003
    when: When implementing a new core extension
    action: Return an instance of Router, FastAPI, or APIRouter from the entry point
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Core extension will be skipped during loading because load_core only accepts Router, FastAPI, or APIRouter
      types
    stage_ids:
    - extension_loading
  - id: finance-C-006
    when: When setting OBBject extension attributes like command_output_paths or immutable=False
    action: Set on_command_output=True in the Extension constructor
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Extension initialization raises ValueError because on_command_output=False is incompatible with these settings
    stage_ids:
    - extension_loading
  - id: finance-C-014
    when: When implementing Provider class for new data providers
    action: Subclass the Provider abstract class with a name attribute matching the entry point name
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Provider will not be properly registered in the registry because Registry.include_provider uses provider.name.lower()
      as key
    stage_ids:
    - extension_loading
  - id: finance-C-021
    when: When implementing a Fetcher subclass
    action: Implement either extract_data or aextract_data method (but not both without aextract_data taking precedence)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Fetcher subclass instantiation will raise NotImplementedError with message 'Fetcher subclass must implement
      either extract_data or aextract_data method'
    stage_ids:
    - data_acquisition
  - id: finance-C-028
    when: When executing fetch_data on a Fetcher
    action: Execute transform_query before extract_data, and extract_data before transform_data
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Data pipeline will produce incorrect results or runtime errors if TET order is violated, breaking the fetch_data
      contract
    stage_ids:
    - data_acquisition
  - id: finance-C-029
    when: When executing queries through QueryExecutor
    action: Filter and validate credentials before calling fetcher.fetch_data
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Unauthorized API requests will leak data or cause security vulnerabilities if credentials are not validated
      at the QueryExecutor level
    stage_ids:
    - data_acquisition
  - id: finance-C-034
    when: When presenting data from the OpenBB Platform
    action: Claim data accuracy guarantees or real-time capabilities without provider documentation
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Platform disclaimer states 'The data contained in the Open Data Platform is not necessarily accurate', violating
      this will mislead users into making poor financial decisions
    stage_ids:
    - data_acquisition
  - id: finance-C-035
    when: When using fetched data for trading decisions
    action: Present data as guaranteed to generate profits or accurate for trading
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Trading disclaimer warns that past performance does not guarantee future results, and financial instruments
      involve high risks including loss of investment
    stage_ids:
    - data_acquisition
  - id: finance-C-040
    when: When implementing parameter validation for command execution
    action: Use pydantic create_model with ConfigDict(extra="allow", arbitrary_types_allowed=True) to validate kwargs
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Parameter validation will reject valid parameters that don't match the exact function signature, causing
      commands to fail with validation errors even when valid inputs are provided
    stage_ids:
    - command_execution
  - id: finance-C-064
    when: When registering a new provider with the OpenBB platform
    action: verify the provider's fetcher returns QueryParams or Data subclasses
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Provider registration will fail with ValueError during registry map construction
    stage_ids:
    - query_interface
  - id: finance-C-094
    when: When implementing extension loading and command registration pipeline
    action: Provider instances MUST be loaded via ExtensionLoader with lowercase provider name matching the registry
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Provider lookup fails at query execution time because provider name case mismatch prevents matching in registry
      map
  - id: finance-C-095
    when: When loading Router objects from core extensions
    action: Router instances MUST be properly included with prefix matching the extension name for CommandMap resolution
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Command routes fail with AttributeError because route paths do not match CommandMap entries due to incorrect
      prefix handling
  - id: finance-C-096
    when: When building the CommandMap for route resolution
    action: Route paths in CommandMap MUST be prefixed with '/' for exact matching against incoming route strings
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Route lookup fails returning None because slash prefix mismatch causes command not found errors
  - id: finance-C-100
    when: When executing queries with fetcher require_credentials flag
    action: Missing required credentials MUST raise OpenBBError before data extraction begins
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: API calls fail with cryptic errors or security exceptions when credentials validation is bypassed
  - id: finance-C-118
    when: When creating a Fetcher subclass
    action: Implement either extract_data or aextract_data — a Fetcher that provides neither will raise NotImplementedError
      at subclass initialization time
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: A Fetcher subclass with neither extract_data nor aextract_data raises NotImplementedError when imported,
      preventing the entire provider from loading
  - id: finance-C-125
    when: When building a system on top of the Open Data Platform
    action: Claim this platform is suitable for real-time trading execution, high-frequency trading requiring sub-millisecond
      latency, or any scenario requiring live order placement — the not_suitable_for list explicitly excludes these use cases
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users build trading systems expecting real-time execution capability that the platform does not provide,
      leading to order execution failures, missed fills, or trades at unexpected prices
  - id: finance-C-146
    when: When deploying multiple OpenBB versions in the same Python environment or when upgrading extensions across versions
    action: Rely on singleton metaclass (ExtensionLoader, singletons) for shared extension state across version boundaries
      - verify extension registry is version-scoped or isolated
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Extension singletons shared across OpenBB versions cause state corruption where newer version loads older
      version's extensions or vice versa, leading to incorrect data, failed commands, or silent wrong results that are difficult
      to diagnose
    derived_from_bd_id: BD-097
  - id: finance-C-220
    when: When implementing beta estimation or expected return calculation using the CAPM framework
    action: 'Use OLS regression on Fama-French factor data with at least 36 monthly observations; verify data meets OLS assumptions:
      linear relationship between market returns and asset returns, approximately normal residuals, and homoscedastic error
      terms'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: CAPM beta estimated with insufficient data or violated OLS assumptions produces unreliable risk estimates,
      causing misallocation of capital and strategies that underperform during market stress when beta accuracy matters most
    derived_from_bd_id: BD-051
  - id: finance-C-262
    when: When implementing data fetchers in providers
    action: Use built-in HTTP request utilities from openbb_core.provider.utils.helpers instead of creating raw requests,
      aiohttp, or httpx clients
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Raw HTTP clients bypass user-configured proxy, timeout, and user-agent settings from system_settings.json,
      causing connection failures and inconsistent behavior
  - id: finance-C-263
    when: When creating provider-backed router commands
    action: Use the exact four mandatory parameters (cc, provider_choices, standard_params, extra_params) and return OBBject.from_query(Query(**locals()))
      pattern
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect parameter signatures break the provider interface, causing data fetcher resolution to fail and
      returning empty results
  - id: finance-C-264
    when: When registering extensions in pyproject.toml
    action: Define correct entry points using the exact plugin group names (openbb_provider_extension, openbb_core_extension,
      openbb_charting_extension, openbb_obbject_extension)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect entry point names prevent OpenBB from discovering the extension entirely, leaving commands and
      fetchers unavailable
  - id: finance-C-265
    when: When connecting router commands to provider fetchers
    action: Verify the model name string matches a key in at least one provider's fetcher_dict
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched model names cause fetcher resolution failures, returning empty results or error responses
  regular:
  - id: finance-C-004
    when: When configuring an OBBject extension that acts on command output
    action: Enable allow_on_command_output in system_settings.json or set OPENBB_ALLOW_ON_COMMAND_OUTPUT environment variable
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Extension initialization raises RuntimeError, preventing the platform from starting
    stage_ids:
    - extension_loading
  - id: finance-C-005
    when: When configuring an OBBject extension that modifies output immutability
    action: Enable allow_mutable_extensions in system_settings.json or set OPENBB_ALLOW_MUTABLE_EXTENSIONS environment variable
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Extension initialization raises RuntimeError due to mutable extension security check failure
    stage_ids:
    - extension_loading
  - id: finance-C-007
    when: When accessing ExtensionLoader across CLI commands and API requests in the same session
    action: Access the singleton instance via ExtensionLoader() constructor call
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Multiple instances would cause credential conflicts and inconsistent provider registry state
    stage_ids:
    - extension_loading
  - id: finance-C-008
    when: When adding an optional provider with missing dependencies
    action: Handle ModuleNotFoundError gracefully in the provider entry point loading
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Provider loading fails silently, removing it from available_providers but allowing platform to continue functioning
    stage_ids:
    - extension_loading
  - id: finance-C-009
    when: When adding a new provider via entry_points
    action: Modify any core PlatformController or ExtensionLoader code
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: New provider will automatically appear in provider_choices without code changes due to entry point discovery
      mechanism
    stage_ids:
    - extension_loading
  - id: finance-C-010
    when: When implementing provider entry points with optional dependencies
    action: Raise errors that prevent other providers from loading
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: One provider's import failure would prevent all providers from loading, breaking platform functionality
    stage_ids:
    - extension_loading
  - id: finance-C-011
    when: When relying on ExtensionLoader for provider discovery in production
    action: Assume each providers registered via entry_points will load successfully
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Provider loading catches ModuleNotFoundError, so optional providers may be silently absent from the registry
    stage_ids:
    - extension_loading
  - id: finance-C-012
    when: When depending on entry_points discovery mechanism
    action: Claim real-time provider discovery or dynamic loading at runtime
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: entry_points() is called once during ExtensionLoader.__init__ and cached with @lru_cache, not real-time discovery
    stage_ids:
    - extension_loading
  - id: finance-C-013
    when: When implementing the Singleton pattern for ExtensionLoader
    action: Use SingletonMeta metaclass from openbb_core.app.model.abstract.singleton
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Multiple ExtensionLoader instances would populate separate registries, causing duplicate or conflicting provider
      entries
    stage_ids:
    - extension_loading
  - id: finance-C-015
    when: When loading core extensions via entry_points
    action: Verify FastAPI router instances are converted to OpenBB Router via Router.from_fastapi()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: APIRouter or FastAPI instances would not be properly integrated into the OpenBB command tree
    stage_ids:
    - extension_loading
  - id: finance-C-016
    when: When implementing lazy loading for extensions
    action: Use entry_points(group=...) instead of importing extension modules directly
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Direct imports would load all extensions at startup, increasing startup time and preventing optional dependency
      absence
    stage_ids:
    - extension_loading
  - id: finance-C-017
    when: When using lru_cache on ExtensionLoader property accessors
    action: Bypass the cached property accessors to reload extensions
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Direct manipulation of internal dicts (_provider_objects, _core_objects, _obbject_objects) would circumvent
      cache invalidation
    stage_ids:
    - extension_loading
  - id: finance-C-018
    when: When registering command output callbacks for OBBject extensions
    action: Populate the _on_command_output_callbacks dict during ExtensionLoader initialization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Extensions acting on command output would never be triggered, breaking extension functionality
    stage_ids:
    - extension_loading
  - id: finance-C-019
    when: When adding a new provider to the openbb_provider_extension group
    action: Verify the provider name is unique and lowercase in the entry point registration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate provider names would cause one to overwrite the other in the registry dictionary
    stage_ids:
    - extension_loading
  - id: finance-C-020
    when: When documenting the ExtensionLoader's provider discovery capability
    action: Claim guaranteed provider availability or real-time sync with provider APIs
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Extension loading only discovers registered entry points, not API availability or credential validity
    stage_ids:
    - extension_loading
  - id: finance-C-022
    when: When creating Data models for providers
    action: Set model_config with extra='allow' to accept heterogeneous fields from different providers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Data models will raise validation errors when providers return unexpected fields, breaking the standardization
      pipeline
    stage_ids:
    - data_acquisition
  - id: finance-C-023
    when: When creating QueryParams models
    action: Set model_config with extra='allow' to accept provider-specific query parameters
    severity: high
    kind: domain_rule
    modality: must
    consequence: Query validation will fail when users pass provider-specific parameters not defined in the base QueryParams
      schema
    stage_ids:
    - data_acquisition
  - id: finance-C-024
    when: When implementing Fetcher.require_credentials
    action: Set require_credentials to a boolean value only
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fetcher.test() assertion will fail with 'require_credentials must be a boolean', breaking test validation
    stage_ids:
    - data_acquisition
  - id: finance-C-025
    when: When using external data providers
    action: Claim real-time data capability for providers that inherently have delays
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Data accuracy claims will be misleading; for example FRED data is delayed by 1 month, causing incorrect trading
      decisions
    stage_ids:
    - data_acquisition
  - id: finance-C-026
    when: When depending on external provider APIs
    action: Implement rate limit handling for provider API quotas
    severity: high
    kind: resource_boundary
    modality: must
    consequence: API requests will fail with HTTP 429 errors when provider rate limits are exceeded, causing data fetching
      to stop
    stage_ids:
    - data_acquisition
  - id: finance-C-027
    when: When accessing paid provider data
    action: Assume each provider data is freely accessible without credentials
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Data fetching will fail with 'Unauthorized' errors for paid providers like Benzinga, Intrinio, TradingEconomics
    stage_ids:
    - data_acquisition
  - id: finance-C-030
    when: When implementing extract_data with async capabilities
    action: Name the async version aextract_data (not extract_data with async def)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The Fetcher class uses maybe_coroutine to check for async implementation, and only aextract_data is recognized
      as the async version
    stage_ids:
    - data_acquisition
  - id: finance-C-031
    when: When building a new provider Fetcher
    action: Use the built-in HTTP helpers (make_request, amake_request) instead of raw requests/httpx
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Custom HTTP clients will bypass user's proxy/timeout/user-agent settings from system_settings.json, causing
      inconsistent behavior
    stage_ids:
    - data_acquisition
  - id: finance-C-032
    when: When returning empty data from a provider
    action: Raise EmptyDataError instead of returning None or empty list silently
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty results will be returned as success with null/empty data, confusing users about whether the query failed
      or no data exists
    stage_ids:
    - data_acquisition
  - id: finance-C-033
    when: When testing Fetcher implementations
    action: Run Fetcher.test() method to validate TET pipeline correctness
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Incorrectly implemented fetchers will go undetected, causing runtime failures or incorrect data in production
    stage_ids:
    - data_acquisition
  - id: finance-C-036
    when: When accessing provider data through OpenBB
    action: Assume the Platform provides data equivalent to direct exchange access
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: OpenBB is a data aggregation platform that relays third-party provider data with inherent delays, not direct
      exchange feeds
    stage_ids:
    - data_acquisition
  - id: finance-C-037
    when: When implementing extract_data or aextract_data
    action: Return a non-empty data structure or raise specified error (EmptyDataError, UnauthorizedError, OpenBBError)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning None without raising an error violates the Fetcher contract and causes downstream processing failures
    stage_ids:
    - data_acquisition
  - id: finance-C-038
    when: When implementing transform_data
    action: Return data as instances of the declared Data model type, not raw dictionaries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Downstream data processing commands (ta, qa, econometrics) expect Data model instances, not raw dicts, causing
      AttributeError
    stage_ids:
    - data_acquisition
  - id: finance-C-039
    when: When processing credentials in extract_data
    action: Use credentials.get() with None fallback instead of direct key access
    severity: high
    kind: domain_rule
    modality: must
    consequence: KeyError will be raised when credentials dict doesn't contain expected keys, breaking data extraction
    stage_ids:
    - data_acquisition
  - id: finance-C-041
    when: When executing commands that produce warnings
    action: Capture warnings via warnings.catch_warnings(record=True) and append cast warnings to OBBject.warnings
    severity: high
    kind: domain_rule
    modality: must
    consequence: Warnings raised during command execution will be silently lost, preventing users from seeing important information
      about data quality, deprecations, or API rate limits
    stage_ids:
    - command_execution
  - id: finance-C-042
    when: When tracking execution performance metadata
    action: Record execution duration in nanoseconds using time.perf_counter_ns and timestamp using datetime.now()
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Performance monitoring will produce inaccurate or missing timing data, making it impossible to identify slow
      commands or optimize performance
    stage_ids:
    - command_execution
  - id: finance-C-043
    when: When running commands with invalid or unregistered routes
    action: Raise AttributeError with descriptive message when route is not found in command_map
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid routes will return cryptic errors or None instead of clear error messages, making debugging difficult
      for users
    stage_ids:
    - command_execution
  - id: finance-C-044
    when: When building parameters for command execution
    action: Make a deep copy of kwargs before validation to preserve original values for charting callbacks
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Chart callbacks will receive incomplete or empty kwargs, causing charts to render without proper parameters
      or fail to render entirely
    stage_ids:
    - command_execution
  - id: finance-C-045
    when: When injecting command context into function parameters
    action: Inject CommandContext(cc) into kwargs only when function signature contains 'cc' parameter
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Commands expecting user_settings and system_settings via CommandContext will receive None values, causing
      authentication or preference-related failures
    stage_ids:
    - command_execution
  - id: finance-C-047
    when: When registering OBBject extensions that act on command output
    action: Set system_settings allow_on_command_output to True for extensions with on_command_output=True
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Command output callbacks will fail to execute, breaking charting, logging, or other post-processing extensions
    stage_ids:
    - command_execution
  - id: finance-C-048
    when: When registering OBBject extensions that modify command output
    action: Set system_settings allow_mutable_extensions to True for extensions with immutable=False
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Mutable extensions will fail at initialization, preventing data transformation extensions from operating
    stage_ids:
    - command_execution
  - id: finance-C-049
    when: When populating metadata arguments in OBBject
    action: Remove callable values and non-JSON-serializable objects from metadata before returning
    severity: high
    kind: domain_rule
    modality: must
    consequence: OBBject serialization will fail or produce incomplete metadata, breaking downstream consumers that expect
      valid JSON
    stage_ids:
    - command_execution
  - id: finance-C-050
    when: When executing extension callbacks on command output
    action: Skip extensions that are not registered as accessors on OBBject class
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Extension callbacks will fail silently or raise errors when trying to access non-existent accessors on OBBject
    stage_ids:
    - command_execution
  - id: finance-C-051
    when: When handling unknown extra parameters in command validation
    action: Emit OpenBBWarning for extra parameters not found in the validation model (excluding chart_params)
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Users will not be notified when they pass invalid parameters, leading to silent failures where commands execute
      without expected behavior
    stage_ids:
    - command_execution
  - id: finance-C-052
    when: When executing commands via API with custom headers
    action: Pop custom headers from kwargs using system_settings.api_settings.custom_headers mapping
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Custom headers will be passed to commands, causing type errors or unexpected behavior in functions that don't
      expect these parameters
    stage_ids:
    - command_execution
  - id: finance-C-053
    when: When populating execution metadata in OBBject.extra
    action: Only populate metadata when user_settings.preferences.metadata is True and result is OBBject
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Metadata overhead will be incurred even when users have disabled metadata collection, wasting CPU cycles
      and memory
    stage_ids:
    - command_execution
  - id: finance-C-054
    when: When displaying warnings to users during command execution
    action: Display warnings via showwarning when user_settings.preferences.show_warnings is True
    severity: low
    kind: claim_boundary
    modality: must_not
    consequence: Warnings will never be shown to users who have enabled show_warnings preference, even when they explicitly
      request to see them
    stage_ids:
    - command_execution
  - id: finance-C-055
    when: When recording execution time for performance analysis
    action: Use perf_counter_ns() instead of time.time() for nanosecond precision timing
    severity: low
    kind: domain_rule
    modality: must
    consequence: Timing measurements will have millisecond resolution at best, making fine-grained performance analysis unreliable
    stage_ids:
    - command_execution
  - id: finance-C-056
    when: When handling chart parameters in Jupyter environments
    action: Pop 'chart' from kwargs before ParametersBuilder.build to preserve it for charting callback
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Charts will not render in Jupyter environments because the chart parameter is lost after ParametersBuilder.build
      processes kwargs
    stage_ids:
    - command_execution
  - id: finance-C-057
    when: When merging args and kwargs into function parameters
    action: Deep copy args and kwargs before merging to prevent mutation of original collections
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Original args and kwargs will be mutated during parameter building, causing unexpected side effects in calling
      code
    stage_ids:
    - command_execution
  - id: finance-C-058
    when: When executing extension output callbacks asynchronously
    action: Use run_async for async factory accessors and direct call for sync factory accessors
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Async charting or logging extensions will not execute properly, causing incomplete output or missing visualizations
    stage_ids:
    - command_execution
  - id: finance-C-059
    when: When cloning OBBject for immutable extension callbacks
    action: Return None and emit warning when OBBject cannot be duplicated for immutable extensions
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Immutable extension callbacks will fail silently, causing extensions like charting to not process output
      when they should
    stage_ids:
    - command_execution
  - id: finance-C-060
    when: When implementing extra param filtering for a new provider
    action: include the provider name in the field title separated by commas (e.g., 'title=fmp,polygon')
    severity: high
    kind: domain_rule
    modality: must
    consequence: Extra params will be silently filtered out for that provider even when user provides valid values, causing
      missing functionality
    stage_ids:
    - query_interface
  - id: finance-C-061
    when: When FastAPI sends default parameter values
    action: filter extra params that equal their default value
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: User-specified parameters will be silently dropped when they match the default value, causing incorrect API
      behavior
    stage_ids:
    - query_interface
  - id: finance-C-062
    when: When implementing provider name lookup in the registry
    action: convert provider name to lowercase before registry lookup
    severity: high
    kind: domain_rule
    modality: must
    consequence: Provider lookup will fail with 'Provider not found' error for mixed-case provider names like 'FMP' or 'Polygon'
    stage_ids:
    - query_interface
  - id: finance-C-063
    when: When accessing the ProviderInterface singleton
    action: instantiate multiple ProviderInterface instances in the same process
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Multiple singleton instantiations can cause inconsistent provider registry state and data schema mismatches
    stage_ids:
    - query_interface
  - id: finance-C-065
    when: When executing queries through the query interface
    action: pass filtered extra params through filter_extra_params before calling query_executor.execute
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unsupported extra params will be sent to provider APIs causing validation errors or unexpected behavior
    stage_ids:
    - query_interface
  - id: finance-C-066
    when: When executing queries with provider-specific extra parameters
    action: warn users when an extra param is not supported by the selected provider
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Users may not realize their specified parameters are being ignored, leading to incorrect data results
    stage_ids:
    - query_interface
  - id: finance-C-067
    when: When adding a new provider to the OpenBB platform
    action: register the provider via the extension entry point mechanism
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: New provider will not appear in provider_choices dropdown and cannot be selected for queries
    stage_ids:
    - query_interface
  - id: finance-C-068
    when: When requesting data from a provider that requires credentials
    action: provide valid credentials before executing the query
    severity: high
    kind: domain_rule
    modality: must
    consequence: Query execution will fail with OpenBBError requesting missing credential
    stage_ids:
    - query_interface
  - id: finance-C-069
    when: When filtering provider choices for a specific model
    action: include 'openbb' as a selectable provider in the dropdown choices
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Users will see 'openbb' as a valid provider option which is an internal placeholder, not an actual data source
    stage_ids:
    - query_interface
  - id: finance-C-070
    when: When defining extra parameters for multiple providers
    action: merge field descriptions with provider names in the title attribute
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Extra params will lose provider attribution, causing incorrect filtering and confusing documentation
    stage_ids:
    - query_interface
  - id: finance-C-071
    when: When returning data through the query interface
    action: normalize data into StandardData format regardless of the source provider
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent data schemas across providers will break downstream consumers expecting standardized output
    stage_ids:
    - query_interface
  - id: finance-C-072
    when: When accessing the OpenBB platform query interface
    action: expect real-time data streaming capabilities
    severity: low
    kind: claim_boundary
    modality: must_not
    consequence: The query interface uses polling-based data retrieval through provider APIs, not true real-time streaming
    stage_ids:
    - query_interface
  - id: finance-C-073
    when: When using the query interface for financial decisions
    action: assume query results are guaranteed to be current or error-free
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: External provider data may be delayed, incomplete, or contain errors that the query interface passes through
      without validation
    stage_ids:
    - query_interface
  - id: finance-C-074
    when: When generating CLI commands from platform API routes
    action: use obb.reference['paths'] as the source of truth for command structure
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: CLI commands will diverge from the platform API, causing user confusion and incorrect data retrieval when
      the API and CLI have mismatched routes
    stage_ids:
    - cli_interface
  - id: finance-C-075
    when: When accessing OBBject registry with index-based lookup
    action: use stack semantics where index 0 returns the most recently registered OBBject
    severity: high
    kind: domain_rule
    modality: must
    consequence: OBB0 command returns an older result than expected, breaking user workflows that depend on sequential result
      access
    stage_ids:
    - cli_interface
  - id: finance-C-076
    when: When setting a register_key for OBBject registry
    action: use the reserved prefix 'OBB' in the key name
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Key creation fails with ArgumentTypeError, preventing users from naming results for later retrieval
    stage_ids:
    - cli_interface
  - id: finance-C-077
    when: When registering an OBBject in the registry
    action: verify the OBBject has non-empty results before registration
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Empty OBBjects consume registry slots without providing useful data, reducing available workspace and cluttering
      results display
    stage_ids:
    - cli_interface
  - id: finance-C-078
    when: When provider argument changes in CLI help display
    action: rebuild custom argument groups to reflect provider-specific parameters
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Users see incorrect parameter options for a provider, leading to validation errors or unexpected behavior
      when executing commands
    stage_ids:
    - cli_interface
  - id: finance-C-079
    when: When enabling tab completion in CLI
    action: set CHOICES_GENERATION to True to trigger dynamic choice building
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Tab completion fails to show available commands and arguments, forcing users to manually type full commands
      without auto-complete assistance
    stage_ids:
    - cli_interface
  - id: finance-C-080
    when: When a new OBBject is registered
    action: call _link_obbject_to_data_processing_commands to update the data argument choices
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The 'data' argument choices for processing commands become stale, preventing newly registered results from
      being available as input to subsequent data processing commands
    stage_ids:
    - cli_interface
  - id: finance-C-081
    when: When parsing OBBject index from user input
    action: strip the 'OBB' prefix and convert to integer index before registry lookup
    severity: high
    kind: domain_rule
    modality: must
    consequence: Registry lookup fails because the input still contains the 'OBB' prefix, causing data processing commands
      to fail with incorrect results
    stage_ids:
    - cli_interface
  - id: finance-C-082
    when: When maximum OBBject count is reached in registry
    action: remove the oldest OBBject before registering the new one to maintain FIFO behavior
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: New results cannot be cached, users lose the ability to chain recent results through data processing commands
    stage_ids:
    - cli_interface
  - id: finance-C-083
    when: When initializing a PlatformController
    action: provide either platform_target or translators as constructor arguments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Controller initialization fails with ValueError, preventing CLI commands from being generated or executed
    stage_ids:
    - cli_interface
  - id: finance-C-085
    when: When processing provider-specific arguments from reference
    action: skip 'standard' parameters to only add provider-custom parameters to argument groups
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Provider-specific arguments are duplicated or incorrectly grouped, causing argparse validation errors or
      confusing CLI help output
    stage_ids:
    - cli_interface
  - id: finance-C-086
    when: When generating command descriptions for CLI help
    action: use obb.reference for command descriptions to verify consistency with platform API
    severity: low
    kind: architecture_guardrail
    modality: must
    consequence: Help text becomes inconsistent with the platform API documentation, misleading users about what a command
      does
    stage_ids:
    - cli_interface
  - id: finance-C-087
    when: When updating completer after registering new OBBject
    action: call update_completer to refresh prompt_toolkit completion choices
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Tab completion remains stale after result registration, not showing newly available OBBject references for
      data processing commands
    stage_ids:
    - cli_interface
  - id: finance-C-088
    when: When creating sub-controllers for nested paths
    action: dynamically generate SubController class with CHOICES_COMMANDS set to path-specific commands
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Sub-controller commands are not properly scoped, causing command name conflicts or inaccessible nested menu
      functionality
    stage_ids:
    - cli_interface
  - id: finance-C-089
    when: When handling duplicate OBBject registration
    action: prevent registration of OBBject with same UUID already in registry
    severity: low
    kind: domain_rule
    modality: must
    consequence: Duplicate results replace existing entries, causing confusion and potential loss of distinct results that
      share the same underlying data
    stage_ids:
    - cli_interface
  - id: finance-C-090
    when: When parsing type strings from OpenAPI reference
    action: handle Optional, Literal, and Annotated type annotations correctly in type mapping
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Arguments get incorrect Python types causing argparse validation failures or silent type coercion bugs
    stage_ids:
    - cli_interface
  - id: finance-C-091
    when: When determining nargs for list-type parameters
    action: set nargs to '+' to require at least one value for list parameters
    severity: medium
    kind: domain_rule
    modality: must
    consequence: List parameters are treated as optional single values, causing data to be truncated or commands to fail validation
      unexpectedly
    stage_ids:
    - cli_interface
  - id: finance-C-092
    when: When displaying cached results in help menu
    action: respect N_TO_DISPLAY_OBBJECT_REGISTRY setting for number of results shown
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Help output becomes excessively long or shows too few results, reducing CLI usability
    stage_ids:
    - cli_interface
  - id: finance-C-093
    when: When registering OBBject with existing key
    action: overwrite an existing register_key in the registry without warning
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: User loses access to previously registered results without notification, breaking workflows that depend on
      named result references
    stage_ids:
    - cli_interface
  - id: finance-C-097
    when: When validating command kwargs against function signatures
    action: Parameters MUST be coerced to correct types according to function signature annotations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect parameter values cause wrong data retrieval or validation errors when type coercion fails silently
  - id: finance-C-098
    when: When building the CommandContext with user and system settings
    action: CommandContext MUST be injected when 'cc' parameter exists in function signature
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Function executes without proper context causing credential access failures or wrong data source selection
  - id: finance-C-101
    when: When transforming query parameters to provider-specific format
    action: Fetcher.transform_query MUST produce valid QueryParams subclass instance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Data retrieval fails or returns wrong provider data when query transformation produces invalid or incorrectly-typed
      parameters
  - id: finance-C-102
    when: When returning data from fetcher transform_data method
    action: Transformed data MUST be subclass of Data base class for standardization
    severity: high
    kind: domain_rule
    modality: must
    consequence: OBBject serialization fails or downstream processing breaks when data does not conform to StandardData schema
  - id: finance-C-103
    when: When returning AnnotatedResult with metadata from fetcher
    action: Metadata MUST be preserved in extra field of OBBject when AnnotatedResult is returned
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Query metadata (pagination info, attribution, etc.) is lost causing incomplete data context for downstream
      processing
  - id: finance-C-104
    when: When converting OBBject results to DataFrame
    action: to_dataframe MUST NOT be called when results are None or empty
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: OpenBBError is raised for empty results causing crash when empty data is a valid query result
  - id: finance-C-105
    when: When passing OBBject through obbject extension callbacks
    action: Immutable extensions MUST receive a model_copy of the OBBject, not the original
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Extension modifications corrupt the original OBBject state affecting other consumers of the same object
  - id: finance-C-106
    when: When registering OBBject in CLI registry for chaining
    action: OBBject MUST have non-empty results to be registered
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Chained operations fail because registry returns None for empty results causing downstream type errors
  - id: finance-C-108
    when: When using mutable extensions that modify OBBject output
    action: allow_mutable_extensions system setting MUST be True for immutable=False extensions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Extension silently skips modifications that users expect, causing data inconsistency between expected and
      actual results
  - id: finance-C-109
    when: When converting results to DataFrame with date index
    action: DataFrame index column MUST exist when index parameter is specified
    severity: medium
    kind: domain_rule
    modality: must
    consequence: OpenBBError is raised when date column is missing from standardized financial data schema
  - id: finance-C-110
    when: When handling data from multiple providers with different schemas
    action: Extra fields MUST be allowed in Data model to accommodate provider-specific fields
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Provider-specific fields are silently dropped causing data loss when strict Pydantic validation rejects unknown
      fields
    stage_ids:
    - query_interface
  - id: finance-C-111
    when: When filtering extra_params by provider in Query execution
    action: Extra parameters MUST be filtered to only those supported by the selected provider
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Wrong data is returned or silent failures occur when provider rejects unsupported extra parameters
  - id: finance-C-112
    when: When passing chart parameters through the command execution pipeline
    action: Chart parameters MUST be extracted from extra_params before OBBject serialization
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Chart rendering fails or shows incorrect data when chart_params are lost in kwargs copy operations
  - id: finance-C-113
    when: When displaying financial data disclaimers and data accuracy warnings
    action: Platform MUST NOT claim data accuracy when providers may return stale or incorrect data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make financial decisions based on incorrect data believing it to be accurate, leading to financial
      losses
  - id: finance-C-114
    when: When handling financial instrument trading risk disclaimers
    action: Platform MUST NOT be promoted as suitable for trading without adequate risk disclosure
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users engage in high-risk trading without understanding potential for total investment loss, violating financial
      advisor regulations
  - id: finance-C-115
    when: When implementing a new provider Data or QueryParams subclass
    action: Use ConfigDict(extra='allow', strict=False, populate_by_name=True) — heterogeneous field sets returned by different
      providers must not cause Pydantic validation errors
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: A provider returning a field not declared in the standard schema will raise a ValidationError, breaking data
      access for all consumers of that provider
  - id: finance-C-116
    when: When writing code that accesses OBBject.results
    action: Check that results is not None before accessing — failed queries return OBBject without raising AttributeError,
      results defaults to None
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Accessing results on a failed query raises OpenBBError('Results not found.') instead of AttributeError, breaking
      code that assumes results are always populated
  - id: finance-C-117
    when: When defining provider credentials in a Provider subclass
    action: Prefix every credential name with the provider's lowercase name using f'{self.name.lower()}_{c}' — credential
      keys must be globally unique across each providers
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Two providers with overlapping credential names (e.g., 'api_key') will overwrite each other's values in the
      credentials store, causing authentication failures at runtime
  - id: finance-C-119
    when: When accessing CLI OBBject registry by index
    action: Use stack indexing where index=0 returns the most recently created OBBject, index=1 returns the second-most-recent,
      and so on — OBB0 is always the most recent
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Code using natural list indexing (0=oldest) will access the wrong OBBject, causing data corruption in downstream
      analysis
  - id: finance-C-120
    when: When loading credentials for a provider
    action: Use ENV > File > Default priority — environment variables override file credentials, which override hardcoded
      defaults; check os.environ before reading user_settings.json
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Credential loading code that does not respect the ENV-first priority will use stale or incorrect credentials,
      causing authentication failures against live provider APIs
  - id: finance-C-121
    when: When modifying SystemSettings or APISettings during implementation
    action: Attempt to modify fields on SystemSettings or APISettings (Cors, Servers) after initialization — these models
      are frozen=True and assignment raises ValidationError or silently fails
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Attempting to mutate a frozen model causes a Pydantic ValidationError, crashing the application or silently
      leaving the old value in place
  - id: finance-C-122
    when: When registering a new provider model
    action: Place standard models in openbb_core/provider/standard_models/ folder — only models in this exact folder are classified
      as 'standard'; each others are classified as 'extra'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: A model placed outside the standard_models folder is classified as 'extra', breaking the standard/extra field
      distinction used by the OpenAPI schema generator and provider interface
  - id: finance-C-123
    when: When presenting or reporting this system's returned data to users
    action: Claim that the data contained in the Open Data Platform is accurate or reliable — the README explicitly states
      data accuracy is not guaranteed
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make financial decisions (investments, risk management) based on inaccurate data they believe to be
      reliable, leading to financial losses
  - id: finance-C-124
    when: When presenting or reporting this system's returned data to users
    action: 'Claim that financial data returned by this system is real-time or current — many data providers impose significant
      delays (FRED: 1 month; Federal Reserve yield data: subject to staff research delay), and the system is a polling-based
      data aggregator'
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live trading decisions based on data they believe is real-time but which reflects historical snapshots,
      causing trades at stale prices
  - id: finance-C-126
    when: When building non-Python applications on top of the Open Data Platform
    action: Claim this platform is suitable for non-Python applications requiring direct data access without a REST API wrapper
      — the not_suitable_for list explicitly excludes this scenario
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Non-Python applications that bypass the REST API wrapper and access internal data formats directly will receive
      unstructured or undocumented responses, causing application failures
  - id: finance-C-127
    when: When building a system that uses OpenBB data for investment decisions
    action: Claim that OpenBB and data providers accept liability for trading losses — the README disclaimer explicitly disclaims
      each liability for 'any loss or damage as a result of your trading, or your reliance on the information displayed'
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users or integrators make financial claims about platform liability that exceed what the AGPLv3 license and
      README disclaimers actually provide, creating false expectations and potential legal exposure
  - id: finance-C-128
    when: When presenting or reporting this system's data to users
    action: Claim that financial data accessed through this platform is suitable as the sole basis for investment decisions
      — the README warns users to 'seek professional advice where needed' and to 'carefully consider your investment objectives,
      level of experience, and risk appetite'
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users treat platform data as complete financial advice without professional guidance, leading to unsuitable
      investments that do not match their risk profile or financial goals
  - id: finance-C-129
    when: When integrating with financial data provider APIs via OpenBB
    action: Understand and comply with each provider's credential requirements — the not_suitable_for field explicitly lists
      users without understanding of financial data provider credential requirements as an unsuitable use case
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Users who do not understand provider credential requirements will configure incorrect credentials, causing
      failed API calls, data access violations, or terms-of-service breaches with third-party data providers
  - id: finance-C-130
    when: When accessing financial data through this platform
    action: Use output_type='OBBject' as the default assumption — each surfaces (Python, REST API, CLI, MCP server) assume
      the OBBject wrapper; .chart/.to_df access patterns and extra metadata are only available on OBBject
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Code assuming a different default output type will fail when methods like .to_df() or .chart are called,
      because those methods only exist on OBBject
  - id: finance-C-131
    when: When adding a new fetcher to a provider
    action: Explicitly override Fetcher.require_credentials=False only if the provider genuinely supports unauthenticated
      access — the default value is True and provides a security boundary
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: A fetcher that requires credentials but is deployed without require_credentials=False will silently make
      unauthenticated API calls, exposing rate-limited or paid data to unauthorized users
  - id: finance-C-132
    when: When defining route strings for commands
    action: Use dot notation for route strings (e.g., 'equity.historical', 'derivatives.options_chains') — the dot notation
      creates hierarchical command trees that map to router nesting in the OpenAPI spec and Python package builder
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Routes without dot notation will not nest correctly in the command tree, causing missing or incorrectly placed
      endpoints in the Python package and REST API documentation
  - id: finance-C-133
    when: When using data returned by providers in financial calculations
    action: Assume that financial price or volume data from any provider has sub-second freshness — polling-based data aggregation
      introduces latency that varies by provider (some providers delay by days or months), and no provider offers true real-time
      streaming
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Trading algorithms that assume near-real-time data freshness will enter or exit positions at prices significantly
      different from the assumed market price, leading to unexpected trading losses
    stage_ids:
    - query_interface
  - id: finance-C-134
    when: When accessing HTTP endpoints through this platform
    action: Set request_timeout to a value specified for the target provider's latency — the default is 60 seconds, but some
      providers may require longer timeouts for large historical queries
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: A timeout that is too short causes incomplete data retrieval for large queries, resulting in truncated datasets
      that silently corrupt downstream financial analysis
    stage_ids:
    - query_interface
  - id: finance-C-135
    when: When deploying the OpenBB Platform REST API
    action: Configure CORS settings appropriately for the deployment environment — the default Cors model allows each origins,
      methods, and headers ('*'), which is insecure for production deployments
    severity: high
    kind: resource_boundary
    modality: must
    consequence: A production deployment with default CORS settings allows cross-origin requests from any website, enabling
      cross-site request forgery attacks against authenticated API sessions
  - id: finance-C-136
    when: When handling currency and monetary calculations in any financial computation
    action: Use Decimal type for each currency and monetary values — do not use float for financial calculations due to IEEE
      754 binary floating-point precision limitations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Float arithmetic accumulates rounding errors in currency calculations; 0.1 + 0.2 != 0.3 in float representation,
      causing incorrect pricing, interest calculations, and portfolio valuations that can result in significant financial
      discrepancies in live trading
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-137
    when: When implementing or refactoring extension loading logic
    action: Verify only one ExtensionLoader instance exists across CLI, API, and Python sessions using singleton metaclass
      pattern — do not instantiate ExtensionLoader directly, use the singleton access method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Multiple ExtensionLoader instances cause duplicate registry population leading to inconsistent command availability
      and potential memory leaks from multiple extension collections
    derived_from_bd_id: BD-002
  - id: finance-C-138
    when: When implementing CLI initialization logic or refactoring session startup
    action: Call bootstrap() before launching any interactive session to verify session, credentials, and extensions are properly
      initialized — do not use lazy initialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without bootstrap() initialization, runtime errors occur mid-session when uninitialized components are accessed,
      causing session failures and requiring user restart
    derived_from_bd_id: BD-023
  - id: finance-C-139
    when: When configuring cache, data, or export directory paths
    action: Use Path.home()/OpenBBUserData as the base directory — verify home directory write access is available before
      attempting directory creation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Path resolution happens at import time; restricted environments without home directory write access cause
      import failures, preventing the application from starting
    derived_from_bd_id: BD-076
  - id: finance-C-140
    when: When relying on OBBject registry for object persistence during interactive sessions
    action: Implement external storage for objects requiring retention beyond N_TO_KEEP_OBBJECT_REGISTRY limit — do not rely
      on registry for long-term object persistence since FIFO eviction discards oldest objects without warning
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: FIFO eviction silently discards oldest referenced objects when registry limit is reached; programmatic retention
      relying on registry causes unexpected data loss in long-running sessions
    derived_from_bd_id: BD-084
  - id: finance-C-141
    when: When implementing or using any financial calculation involving day count conventions
    action: Assume the framework provides a default day count convention — always explicitly specify the convention parameter
      (ACT/360, ACT/365, 30/360, etc.) for interest, yield, and duration calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Missing day count convention causes incorrect day fraction calculations, leading to wrong interest accruals,
      miscalculated yields, and inaccurate duration measurements that affect trading decisions
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-142
    when: When implementing interest, yield, or duration calculations
    action: Accept day_count_convention parameter (e.g., ACT/360, ACT/365, 30/360) in each financial calculation functions
      and apply it to day fraction computations — use consistent convention documentation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit day count convention support, calculations default to undocumented assumptions causing inconsistent
      results across different market instruments and asset classes
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-143
    when: When handling currency values in data models, API responses, or storage
    action: Assume the framework handles float-to-Decimal conversion automatically for currency fields — do not use float
      type for any monetary value fields
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using float for currency causes precision loss in financial calculations, resulting in incorrect pricing,
      reporting, and settlement values that accumulate over time
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-144
    when: When defining data models for financial instruments or creating custom providers
    action: Use Decimal type for each monetary fields (price, amount, balance, P&L) — configure field validators to reject
      float types and document the precision requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Float fields accumulate rounding errors in monetary calculations; without explicit Decimal configuration,
      providers returning float cause incorrect portfolio valuations and trade calculations
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-145
    when: When implementing custom commands that return non-OBBject types or when integrating third-party extensions with
      the platform
    action: Verify consistent validation policy for both inputs and outputs - either implement matching validation for return
      types or explicitly document allowed bypass cases; do not rely on no_validate flag as a general exception mechanism
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Asymmetric validation where parameters are strictly type-checked but return types can be bypassed causes
      silent type mismatches in command pipelines; downstream commands receiving unexpected types fail with confusing errors
      that are hard to trace to the source
    derived_from_bd_id: BD-100
  - id: finance-C-147
    when: When building workflows that depend on MIC codes or country data for regulatory compliance or trade eligibility
      verification
    action: Implement explicit cache invalidation or short TTL for MIC/country lookups; monitor ISO registry update announcements
      and trigger cache refresh on version changes; do not assume cached reference data is current
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: TTL-cached MIC codes and country data become stale when ISO registry updates, causing trades to be validated
      against deprecated exchange codes or country classifications leading to compliance violations or rejected orders
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-148
    when: When implementing workflows that use extensions loaded via lazy entry_points (charting, quantitative, etc.)
    action: Check extension credentials during workflow initialization rather than waiting for first command execution; call
      a pre-flight credential validation scan for each registered extensions before starting critical pipelines
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Lazy-loaded extension credentials bypass validation until first use, causing silent failures deep in pipelines
      where missing credentials surface as confusing runtime errors rather than upfront configuration guidance, disrupting
      automated trading workflows
    derived_from_bd_id: BD-092
  - id: finance-C-149
    when: When implementing or refactoring volatility calculation in relative rotation analysis
    action: Use rolling standard deviation as the volatility measure with square root scaling for annualization — do not substitute
      with exponentially weighted volatility or other methods that change the statistical interpretation of volatility values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing volatility calculation method alters the statistical properties of the risk measure, causing relative
      rotation charts to produce materially different RS/RR quadrant assignments that affect tactical allocation decisions
    derived_from_bd_id: BD-044
  - id: finance-C-150
    when: When implementing or refactoring momentum calculation in relative rotation analysis
    action: Use log returns for momentum calculation due to time-additivity property enabling aggregation across periods —
      do not substitute with arithmetic returns which lack time-additivity and produce asymmetric momentum signals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using arithmetic returns instead of log returns produces momentum signals that cannot be properly aggregated
      across time periods, leading to inconsistent RS/RR quadrant assignments and incorrect tactical allocation signals
    derived_from_bd_id: BD-045
  - id: finance-C-151
    when: When implementing or refactoring relative strength calculation in relative rotation analysis
    action: Calculate relative strength ratio as asset-to-benchmark division to identify outperformance/underperformance trends
      — do not use absolute return momentum which ignores benchmark comparison essential for relative evaluation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using absolute returns instead of relative strength ratio produces allocation signals that ignore benchmark
      comparison, causing assets to be misclassified in RS/RR quadrants and leading to suboptimal tactical allocation decisions
    derived_from_bd_id: BD-046
  - id: finance-C-152
    when: When implementing or refactoring performance measurement in portfolio analysis
    action: Use Omega ratio for performance measurement as it captures full return distribution including higher moments and
      asymmetric payoffs — do not substitute with Sharpe ratio which assumes normal distribution and ignores asymmetric return
      profiles
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Sharpe ratio instead of Omega ratio ignores tail risk and asymmetric payoffs, causing performance rankings
      that misrepresent investor utility and leading to allocation in strategies with unfavorable risk profiles
    derived_from_bd_id: BD-047
  - id: finance-C-153
    when: When configuring credentials for OpenBB platform deployment
    action: Set credentials via ENV variables for production deployments; be aware that empty string ENV values override file
      values — verify that ENV variable values are non-empty or remove the variable entirely if file-based credentials are
      intended
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Empty string ENV variables silently override file-based credentials, causing authentication failures in production
      where expected credentials are not loaded, leading to service unavailability
    derived_from_bd_id: BD-073
  - id: finance-C-154
    when: When modifying system settings during implementation in OpenBB platform
    action: Attempt to modify SystemSettings instance properties after initialization — the instance is frozen and immutable;
      any configuration changes require creating a new instance
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Attempting to modify frozen SystemSettings raises an error at runtime, causing unexpected exceptions in code
      that assumes mutable configuration and requiring code restructuring to use instance recreation patterns
    derived_from_bd_id: BD-074
  - id: finance-C-155
    when: When computing correlation matrices used in portfolio optimization
    action: Verify stationarity of input time series before computing Pearson correlation — apply ADF or KPSS stationarity
      tests (BD-052) to verify statistical assumptions are met; if inputs are non-stationary, apply differencing or use Engle-Granger
      co-integration approach
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Applying Pearson correlation to non-stationary series produces spurious correlation values that misrepresent
      asset relationships, leading to portfolio optimizations based on statistically invalid inputs and significant allocation
      errors
    derived_from_bd_id: BD-090
  - id: finance-C-156
    when: When using OpenBB Python API in DataFrame-first analysis workflows
    action: Call to_df() explicitly on OBBject results before pandas-native operations — be aware that OBBject default output
      requires explicit conversion which may break pandas-dependent pipelines if conversion is omitted
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Code written expecting DataFrame returns fails silently when OBBject results are passed directly, causing
      pandas operation errors that manifest as cryptic type errors in data analysis pipelines
    derived_from_bd_id: BD-094
  - id: finance-C-157
    when: When configuring provider-specific parameter filters using extra='allow'
    action: Verify that configured filter parameters are actually applied to results — test with known parameter values and
      check that filtering takes effect; do not assume silent acceptance of unknown parameters means filters are working correctly
    severity: high
    kind: operational_lesson
    modality: must
    consequence: extra='allow' silently drops unknown parameters, creating false confidence that filters are applied when
      they are not; results appear filtered but contain data that should have been excluded, leading to incorrect analytical
      conclusions
    derived_from_bd_id: BD-098
  - id: finance-C-158
    when: When implementing or modifying input sanitization logic in CLI command history
    action: Maintain credential sanitization that redacts API keys, passwords, and other sensitive tokens from command history
      files using the sanitize_input function in completer.py
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without credential sanitization, API keys and passwords are stored in plaintext in command history files,
      creating a security vulnerability where credentials can be extracted by anyone with file access
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-159
    when: When implementing or modifying data fetcher logic for provider data
    action: Use the Transform-Extract-Transform (TET) architecture separating provider-specific logic from standardized output
      via transform_query and related methods
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing the TET architecture causes provider-specific data structures to leak into the output, breaking
      multi-provider support and causing downstream code that expects standardized formats to fail or produce incorrect results
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-160
    when: When implementing or modifying HTTP client request logging for ClientSession
    action: Obfuscate sensitive information in HTTP request URLs and headers before logging using the obfuscate_request_info
      function to prevent API credentials and tokens from appearing in logs or debugging output
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without HTTP request obfuscation, API credentials embedded in URLs and headers are visible in logs and debugging
      output, exposing sensitive authentication tokens to anyone with log access
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-161
    when: When implementing or modifying package builder file write operations during extension builds
    action: Use file locking (FileLock with fcntl) to prevent concurrent write corruption when PackageBuilder writes to shared
      filesystem during extension builds
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without file locking, concurrent extension builds interleave write operations, corrupting package files and
      producing non-functional or inconsistent build artifacts
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-162
    when: When defining Pydantic models for API response schemas
    action: Use the exclude_from_api extra kwarg to mark internal fields (raw provider data, debugging info) for removal from
      REST API responses via validate_output in router/commands.py
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without exclude_from_api, internal fields leak into API responses, exposing implementation details and provider
      raw data that should remain internal to clients
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-163
    when: When implementing or modifying options chains properties for Greeks calculations
    action: Maintain manual last_price override capability in OptionsChainsProperties to handle stale underlying price data
      from providers and verify accurate Greeks calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without last_price override, stale underlying prices from providers propagate into Greeks calculations, causing
      materially incorrect delta, gamma, theta, and vega values that lead to poor trading decisions
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-164
    when: When implementing or modifying parallel data fetching with amake_requests for multi-asset queries
    action: Implement per-host throttling to prevent rate limit errors when using async batch HTTP requests for parallel data
      fetching
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without per-host throttling, concurrent batch requests trigger provider rate limits, causing request failures
      and incomplete data fetches that break strategy execution
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-165
    when: When implementing error handling for queries that may return no results
    action: Use EmptyDataError exception distinct from general OpenBBError to enable differentiated user messaging for legitimate
      no-results scenarios instead of catching each exceptions uniformly
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Catching EmptyDataError uniformly with other exceptions prevents differentiated error handling, causing users
      to see failure messages for legitimate empty results instead of appropriate informational messages
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-166
    when: When implementing or modifying system settings change detection
    action: Use hash comparison to detect external modifications to settings files, maintaining the same hash algorithm and
      serialization format used by _compare_hash in system_service.py
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without hash comparison, external settings modifications go undetected when using file watching callbacks
      alone, causing the system to operate with stale configuration until next explicit reload
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-167
    when: When implementing or modifying MCP settings validation
    action: Support both JSON and tuple validation formats in MCPSettings validator via _validate_json_or_tuple to reduce
      configuration friction for users
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Restricting MCPSettings to a single format breaks backward compatibility with existing configurations, causing
      validation failures for users who have configured settings in alternative formats
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-168
    when: When calculating or displaying portfolio PnL in backtesting
    action: Assume the framework enforces PnL conservation (realized_pnl + unrealized_pnl = total_pnl) — this validation is
      currently missing; discrepancies between components and total will not be flagged
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without PnL conservation validation, backtest reports may show inconsistent PnL figures where realized gains
      plus unrealized gains do not equal total PnL, causing silent errors in strategy evaluation and potentially masking losses
      or phantom profits
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-169
    when: When calculating portfolio PnL in backtesting
    action: 'Implement PnL conservation validation: after every trade, assert that abs(realized_pnl + unrealized_pnl - total_pnl)
      < 0.001 and log a CRITICAL error if the check fails; add a reconciliation method to verify PnL components sum correctly
      at each bar'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without PnL conservation, backtest results show phantom profits or masked losses that do not reflect actual
      trading outcomes, leading to incorrect strategy selection and potential financial loss in live trading
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-170
    when: When splitting historical data into training and testing sets for strategy development
    action: Assume the framework enforces train/test time split integrity — this validation is currently missing; data leakage
      between train and test sets will not be detected or prevented
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without train/test split integrity validation, future data may leak into training sets causing look-ahead
      bias, making backtest results appear more profitable than actual live trading performance would be
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-171
    when: When implementing train/test data splitting for strategy backtesting
    action: 'Implement temporal split integrity checks: verify that train_end_date < test_start_date, verify no feature values
      use future data relative to their timestamp, and add a data_leakage_detection flag that raises an error if train data
      contains timestamps >= test_start_date'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without train/test integrity checks, strategies optimized on leaked data will show inflated backtest returns
      that do not generalize to live trading, causing unexpected losses when deploying to production
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-172
    when: When generating and executing trading signals within bar-based backtesting
    action: Assume the framework enforces bar execution timing — this capability is currently missing; signals and order placements
      within the same bar are timestamped identically without distinguishing signal generation from order execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper signal-execution timing, orders execute at the same bar's close price as the signal, eliminating
      the realistic slippage and delay that occurs in live trading where execution follows signal generation
    derived_from_bd_id: BD-GAP-029
  - id: finance-C-173
    when: When implementing bar-based backtesting signal processing
    action: 'Implement bar execution timing model: separate signal_timestamp from execution_timestamp, add a bar_delay parameter
      (default=1) that defers order execution to the next bar, and require explicit opt-in to same-bar execution with documentation
      of assumptions'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without signal-execution timing delays, backtests assume instantaneous execution at signal prices, overestimating
      returns for strategies that rely on intrabar timing and creating live trading performance gaps
    derived_from_bd_id: BD-GAP-029
  - id: finance-C-174
    when: When modeling transaction costs in backtesting
    action: Assume the framework provides complete cost modeling — this capability is currently missing; only basic costs
      may be tracked while funding costs, margin interest, and borrow costs are not included in the cost model
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without complete cost modeling, strategies that involve borrowing, margin, or long-short positions show artificially
      high returns because funding costs are excluded, leading to significant live trading losses when actual costs are incurred
    derived_from_bd_id: BD-GAP-030
  - id: finance-C-175
    when: When implementing transaction cost modeling for backtesting
    action: 'Implement complete cost model with these components: commission_fee, slippage_model, funding_cost_rate (for long-short),
      margin_interest_rate, and borrow_cost_rate; verify total_cost_per_trade = commission + slippage_estimate + funding_cost_accrual'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without complete cost modeling, backtests for long-short strategies exclude funding costs and show returns
      2-5% higher than live trading, causing strategies to appear profitable when they are actually unprofitable after real
      costs
    derived_from_bd_id: BD-GAP-030
  - id: finance-C-176
    when: When tracking order status through its lifecycle in backtesting
    action: Assume the framework implements order lifecycle state machine — this capability is currently missing; orders do
      not transition through proper states (pending, filled, partial_fill, cancelled, rejected) and status remains static
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without order lifecycle tracking, partially filled or rejected orders are not detected, causing position
      mismatches between expected and actual holdings, leading to incorrect PnL calculations and unexpected exposure in live
      trading
    derived_from_bd_id: BD-GAP-031
  - id: finance-C-177
    when: When implementing order management in backtesting
    action: 'Implement order lifecycle state machine with states: PENDING, PARTIAL_FILLED, FILLED, CANCELLED, REJECTED, EXPIRED;
      define valid state transitions, track fill_price and fill_quantity for each fill event, and assert position_estimate
      == sum(filled_quantities) at each step'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without order lifecycle management, partial fills are ignored and orders are treated as fully executed, creating
      phantom positions and incorrect exposure calculations that cause significant losses when live orders partially fill
    derived_from_bd_id: BD-GAP-031
  - id: finance-C-178
    when: When modeling carry costs for long-short strategies in backtesting
    action: Assume the framework handles funding cost modeling (carry) — this capability is currently missing; long positions
      and short positions are not charged/paid financing costs, and cross-currency carry is not tracked
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without funding cost modeling, long-short strategies show returns excluding borrow costs for shorts and interest
      income for longs, making strategies appear more profitable than they would be in live trading with actual financing
      costs
    derived_from_bd_id: BD-GAP-032
  - id: finance-C-179
    when: When implementing long-short strategy backtesting
    action: 'Implement funding cost model: charge borrow_rate * abs(short_position_value) per day for short positions, credit
      lending_rate * long_position_value per day for long positions; for equities use benchmark borrow rate (e.g., Fed funds
      + spread), for futures use contract-specified carry'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without funding cost modeling, short equity strategies appear 3-8% more profitable annually because borrow
      costs are not deducted, leading to strategy selection based on inflated backtest results
    derived_from_bd_id: BD-GAP-032
  - id: finance-C-180
    when: When evaluating strategy robustness in backtesting
    action: Assume the framework provides backtest overfitting protection — this capability is currently missing; strategies
      are evaluated on single train/test split without walk-forward analysis or sample size validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without overfitting protection, strategies optimized on limited data with single train/test split appear
      profitable but fail in live trading, as parameters are overfitted to historical noise rather than genuine market patterns
    derived_from_bd_id: BD-GAP-033
  - id: finance-C-181
    when: When implementing strategy backtest validation
    action: Implement walk-forward analysis with minimum 3 out-of-sample periods, enforce minimum_sample_size = 252 trading
      days (1 year) for equity strategies, calculate Sharpe ratio stability across folds (std < 0.3), and require p-value
      > 0.05 for strategy edge before deployment recommendation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without overfitting protection, strategies that pass single backtests with high Sharpe ratios will likely
      fail in live trading, losing the capital allocated based on unreliable backtest performance metrics
    derived_from_bd_id: BD-GAP-033
  - id: finance-C-182
    when: When executing market orders in backtesting
    action: Assume the framework enforces fill assumptions for market orders — this capability is currently missing; market
      orders are assumed to fill fully at current price without volume or liquidity checks
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without fill assumption modeling, market orders in illiquid stocks fill instantly at the current price regardless
      of order size, overestimating execution probability and underestimating slippage in live trading scenarios
    derived_from_bd_id: BD-GAP-034
  - id: finance-C-183
    when: When implementing market order execution in backtesting
    action: 'Implement fill assumption model: for market orders, calculate fill_ratio based on order_size / ADV (average daily
      volume), apply slippage = order_size * (1 - fill_ratio) * 0.5% estimate, and for orders with fill_ratio < 0.5 flag as
      high_risk_execution with WARNING log'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without fill assumption modeling, large market orders in thin stocks appear fully executable at current prices,
      causing backtests to underestimate execution risk and overestimate strategy returns by 10-30% for illiquid names
    derived_from_bd_id: BD-GAP-034
  - id: finance-C-184
    when: When calculating insurance liabilities in actuarial valuation
    action: Assume the framework computes best estimate and risk margin for insurance contracts — the framework does not implement
      actuarial best estimate calculation or risk margin methodology
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without best estimate and risk margin calculation, the framework produces incorrect insurance liability valuations
      that fail actuarial reporting requirements and regulatory reserve adequacy tests
    derived_from_bd_id: BD-GAP-051
  - id: finance-C-185
    when: When processing ceded premiums and reinsurance recoveries
    action: Implement external reinsurance contract mapping to route ceded premiums and claims to proper reinsurance accounts;
      include treaty_id, coverage_lines, and recovery_percentage fields in mapping configuration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without reinsurance contract mapping, ceded premiums and recoveries are not properly allocated to treaty
      accounts, causing financial misstatements and failed audit reconciliations
    derived_from_bd_id: BD-GAP-051
  - id: finance-C-186
    when: When processing insurance premiums and calculating reinsurance recoveries
    action: Assume the framework maps ceded premiums and claims to reinsurance contracts — the framework does not implement
      reinsurance contract mapping with treaty_id and recovery_percentage fields
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without reinsurance contract mapping, ceded premiums and recoveries are not properly allocated to treaty
      accounts, causing financial misstatements and failed audit reconciliations
    derived_from_bd_id: BD-GAP-052
  - id: finance-C-187
    when: When configuring catastrophe model parameters for catastrophe-exposed portfolios
    action: Implement external cat model selection and calibration logic with vendor_name, model_version, return_period_exceedance_probability,
      and aggregate_loss_distribution fields; calculate net losses by applying treaty terms to gross losses
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without catastrophe model selection and calibration, cat-exposed portfolios have no loss estimation, leading
      to incorrect reinsurance pricing and inadequate catastrophe reserve allocation
    derived_from_bd_id: BD-GAP-052
  - id: finance-C-188
    when: When modeling insurance catastrophe losses
    action: 'Assume the framework runs catastrophe models or processes cat model output — the framework does not implement
      cat model selection, calibration, or return period loss estimation (INS Coverage: 0/6)'
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without catastrophe model support, cat-exposed portfolios have no loss estimation capability, leading to
      incorrect reinsurance pricing and inadequate catastrophe reserve allocation
    derived_from_bd_id: BD-GAP-053
  - id: finance-C-189
    when: When generating loan repayment schedules for lending products
    action: Implement external repayment plan generation with principal_amount, interest_rate, term_months, payment_frequency,
      and amortization_type fields; calculate monthly_payment using standard amortization formula
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without repayment plan generation, loan schedules show incorrect payment allocations, causing customer billing
      errors and accounting mismatches between principal and interest
    derived_from_bd_id: BD-GAP-053
  - id: finance-C-190
    when: When managing loan products and customer payment schedules
    action: Assume the framework generates repayment plans or amortization schedules — the framework does not implement repayment
      plan generation with principal_interest_split calculation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without repayment plan generation, loan schedules show incorrect payment allocations, causing customer billing
      errors and accounting mismatches between principal and interest
    derived_from_bd_id: BD-GAP-054
  - id: finance-C-191
    when: When classifying loan portfolio by delinquency status and calculating provisions
    action: Implement external delinquency classification with dpd_threshold field set to 30, 60, or 90 days; calculate roll
      rates by tracking accounts transitioning between delinquency buckets using migration_matrix
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without delinquency definition and roll rates, the framework misclassifies loan status, causing incorrect
      expected credit loss provisions and regulatory reporting violations
    derived_from_bd_id: BD-GAP-054
  - id: finance-C-192
    when: When classifying loan portfolio by delinquency status for provision calculation
    action: Assume the framework classifies loan delinquency status or calculates roll rates — the framework does not implement
      dpd_threshold logic or migration_matrix for delinquency buckets (DPD 30/60/90)
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without delinquency definition and roll rates, the framework misclassifies loan status, causing incorrect
      expected credit loss provisions and regulatory reporting violations
    derived_from_bd_id: BD-GAP-055
  - id: finance-C-193
    when: When processing double-entry accounting transactions
    action: Assume the framework maintains double-entry bookkeeping integrity or validates debit/credit balance — the framework
      does not implement balance_check or journal_entry_validation for accounting entries
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without double-entry bookkeeping integrity checks, unbalanced journal entries are accepted silently, causing
      material misstatements in financial statements and failed audit tests
    derived_from_bd_id: BD-GAP-057
  - id: finance-C-194
    when: When posting financial transactions to the general ledger
    action: Implement external double-entry validation that checks sum_of_debits equals sum_of_credits for each journal entry;
      reject entries where total_debit != total_credit with error code GL-IMBALANCE
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without double-entry bookkeeping integrity checks, unbalanced journal entries are accepted silently, causing
      material misstatements in financial statements and failed audit tests
    derived_from_bd_id: BD-GAP-057
  - id: finance-C-195
    when: When calculating regulatory liquidity metrics for banking supervision
    action: Assume the framework calculates LCR (liquidity coverage ratio) or NSFR (net stable funding ratio) — the framework
      does not implement HQLA classification, cash_flow_projection, or liquidity ratio formulas per Basel III
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without LCR and NSFR calculation, the framework cannot produce regulatory liquidity reports, causing supervisory
      reporting failures and potential banking license penalties
    derived_from_bd_id: BD-GAP-058
  - id: finance-C-196
    when: When reporting regulatory liquidity metrics to banking supervisors
    action: 'Implement external LCR calculation: HQLA_divided_by Net_Cash_Outflows_30d >= 100%; implement NSFR calculation:
      Available_Stable_Funding / Required_Stable_Funding >= 100%; include hqla_tier_classification and cf Maturity_Bucket
      fields'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without LCR and NSFR calculation, the framework cannot produce regulatory liquidity reports, causing supervisory
      reporting failures and potential banking license penalties
    derived_from_bd_id: BD-GAP-058
  - id: finance-C-197
    when: When allocating internal funding costs between business units
    action: Assume the framework calculates Fund Transfer Prices for internal transactions — the framework does not implement
      FTP_rate calculation or transfer_cost_allocation between business units
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without FTP method, internal fund transfers lack proper cost attribution, causing incorrect profitability
      measurement and suboptimal business unit performance evaluation
    derived_from_bd_id: BD-GAP-059
  - id: finance-C-198
    when: When allocating funding costs to business units for performance measurement
    action: Implement external FTP calculation using matched-maturity or single-rate method with ftp_rate, fund_amount, maturity_date,
      and business_unit fields; allocate transfer_costs_proportionally based on duration-matched curves
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without FTP method, internal fund transfers lack proper cost attribution, causing incorrect profitability
      measurement and suboptimal business unit performance evaluation
    derived_from_bd_id: BD-GAP-059
  - id: finance-C-199
    when: When configuring cash pool structures for group treasury management
    action: Assume the framework validates cash pool legal structures or checks notional vs physical pooling requirements
      — the framework does not implement cash_pool_type validation or regulatory structure compliance checks
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without cash pool legal structure validation, pooling arrangements may violate banking regulations, causing
      legal penalties and invalid tax treatment of intercompany transfers
    derived_from_bd_id: BD-GAP-060
  - id: finance-C-200
    when: When setting up group treasury cash pools for intercompany fund transfers
    action: Implement external cash pool structure validation with pool_type (notional/physical), participant_entities, master_account_id,
      and regulatory_jurisdiction fields; verify pooling structure complies with local banking regulations before activation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without cash pool legal structure validation, pooling arrangements may violate banking regulations, causing
      legal penalties and invalid tax treatment of intercompany transfers
    derived_from_bd_id: BD-GAP-060
  - id: finance-C-201
    when: When calculating bond prices, interest accruals, or performing any time-value-of-money computations in the quantitative
      analysis stage
    action: Assume the framework implements day count conventions (30/360, Act/365, Act/360, etc.) or compounding frequency
      settings — the framework does not enforce any standard convention for these calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit day count convention enforcement, bond price calculations may differ between the framework
      and actual market pricing, causing systematic valuation errors in fixed income strategies that compound over time
    derived_from_bd_id: BD-GAP-035
  - id: finance-C-202
    when: When implementing or configuring any fixed income, interest, or time-value-of-money calculations in the quantitative
      analysis stage
    action: Explicitly specify day count convention (e.g., 30/360, Act/365, Act/360, Act/Act) and compounding frequency for
      each calculation, documenting the chosen convention in strategy parameters
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unspecified day count conventions cause inconsistent interest accrual calculations across different instruments,
      leading to systematic pricing errors that accumulate in strategies holding multiple fixed income positions
    derived_from_bd_id: BD-GAP-035
  - id: finance-C-203
    when: When processing tax-advantaged account transactions (ISA, IRA, 401k, etc.) in portfolio operations
    action: Assume the framework encodes tax-exempt period rules or annual contribution limits — the framework does not implement
      tax regulation encoding for tax-advantaged accounts
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without tax-exempt period rule encoding, backtests may include transactions that would violate contribution
      limits or exempt period restrictions in live trading, causing regulatory violations and potential penalties
    derived_from_bd_id: BD-GAP-042
  - id: finance-C-204
    when: When backtesting strategies involving tax-advantaged accounts (UK ISA, US IRA, etc.) or tax-exempt investment vehicles
    action: Encode tax-exempt period rules by validating transaction dates against annual contribution limits and exempt period
      boundaries, filtering or rejecting transactions that would violate jurisdiction-specific tax regulations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategies that assume tax-advantaged execution without encoding contribution limits will produce non-reproducible
      live results, as transactions exceeding ISA/IRA limits are rejected or penalized in actual trading accounts
    derived_from_bd_id: BD-GAP-042
  - id: finance-C-205
    when: When using the to_df method to convert data in the results_container stage
    action: Verify the input data contains a 'date' field before relying on the default index='date' parameter; if the date
      field has a different name (e.g., 'timestamp', 'datetime', 'time'), explicitly specify index='<actual_field_name>'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default index='date' silently fails or produces incorrect DataFrame indexing when the actual data field is
      named differently, causing time-series plotting and analysis functions to produce misleading results
    derived_from_bd_id: BD-019
  - id: finance-C-206
    when: When adding a new provider fetcher or using the require_credentials parameter in openbb_core.provider.abstract
    action: Verify the provider actually requires API credentials before changing require_credentials from the default True;
      for truly public data sources, explicitly set require_credentials=False to avoid unnecessary authentication failures
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default require_credentials=True causes silent authentication failures when adding public data providers,
      breaking backtesting workflows without clear error messaging about the security default
    derived_from_bd_id: BD-088
  - id: finance-C-207
    when: When implementing pricing models for options, convertible securities, or structured products
    action: Assume the framework validates arbitrage-free conditions — the framework does not implement arbitrage-free constraint
      validation; models may produce theoretically impossible prices
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without arbitrage-free validation, pricing models can produce theoretically impossible prices (e.g., early
      exercise value violations in options), leading to systematic mispricing and trading losses when arbitrageurs exploit
      model violations
    derived_from_bd_id: BD-GAP-039
  - id: finance-C-208
    when: When implementing pricing validation for options, convertible securities, or structured products
    action: 'Implement arbitrage-free constraint validation ensuring: put-call parity holds within tolerance (e.g., |C - P
      - S + K*e^(-rT)| < threshold), early exercise boundary is respected for American options, and no negative option premiums
      exist'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without arbitrage-free constraint validation, pricing models produce theoretically impossible prices that
      arbitrageurs can exploit; PRC coverage drops to 0/8 (0%), causing production pricing failures for regulated instruments
    derived_from_bd_id: BD-GAP-039
  - id: finance-C-209
    when: When processing corporate actions and tax-related events in backtesting
    action: Assume the framework automatically binds event types to tax rules — the framework does not implement event type
      to tax rule binding; tax implications are not applied to corporate actions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without event type to tax rule binding, dividend income, interest payments, and capital gains are not mapped
      to their corresponding tax treatment, causing backtest results to misrepresent after-tax returns and violating regulatory
      reporting requirements
    derived_from_bd_id: BD-GAP-043
  - id: finance-C-210
    when: When implementing corporate action and tax event processing
    action: 'Implement event type to tax rule binding with a mapping table: dividend events map to dividend income tax rules,
      interest events map to interest income tax rules, capital gains events map to capital gains tax rules based on holding
      period'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without event type to tax rule binding, after-tax returns are miscalculated, leading to regulatory compliance
      violations and investor misrepresentation of actual strategy performance
    derived_from_bd_id: BD-GAP-043
  - id: finance-C-211
    when: When implementing or refactoring rolling statistics calculations
    action: Implement rolling statistics computations over the entire dataset (no window parameter) — aggregate statistics
      must compute over the complete historical period, not a sliding window
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Changing rolling statistics to use time-windowed calculations would fundamentally alter the metric interpretation,
      causing historical Sharpe/Sortino ratios to differ significantly from investor presentations and misrepresenting the
      strategy's long-term risk-adjusted performance
    derived_from_bd_id: BD-033
  - id: finance-C-212
    when: When implementing regression models for alpha estimation in CAPM or factor models
    action: Include a constant term (intercept) in OLS regression using sm.add_constant() or equivalent — must NOT force regression
      through origin
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting the constant term forces regression through origin, producing biased alpha estimates when mean returns
      are non-zero; strategies based on biased alpha will underperform or generate losses
    derived_from_bd_id: BD-038
  - id: finance-C-213
    when: When implementing volatility estimation for stable market conditions
    action: Use Garman-Klass estimator with open-high-low-close data for approximately 5x efficiency improvement over close-to-close;
      when only close prices are available, use close-to-close as fallback
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using close-to-close volatility when OHLC data is available underestimates true volatility in stable markets
      by ignoring overnight and intraday price range information, degrading strategy risk estimates
    derived_from_bd_id: BD-056
  - id: finance-C-214
    when: When implementing core services that require shared state management
    action: Verify each classes using SingletonMeta remain process-local — distributed scenarios require external coordination
      mechanisms (distributed locks, external state stores)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using SingletonMeta in distributed deployments (multi-process, container replicas) causes process-local singletons
      to diverge, resulting in inconsistent shared state and potential data corruption
    derived_from_bd_id: BD-068
  - id: finance-C-215
    when: When processing extension loading logic that requires portfolio rebalancing
    action: Assume the framework provides a rebalancing trigger mechanism — the framework does not implement automatic portfolio
      rebalancing triggers; positions continue without rebalancing until manual intervention
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without rebalancing triggers, portfolio allocations drift from target over time, causing unintended risk
      exposure that compounds silently in live trading
    derived_from_bd_id: BD-GAP-040
  - id: finance-C-216
    when: When implementing portfolio rebalancing logic
    action: Implement explicit rebalancing trigger checks using drift thresholds (e.g., allocation drift > 5% from target)
      or time-based intervals (e.g., monthly/quarterly rebalance calendar)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit trigger implementation, portfolio drift causes returns to diverge from expected risk-return
      profile; the gap in framework capability must be handled by application code
    derived_from_bd_id: BD-GAP-040
  - id: finance-C-217
    when: When implementing state persistence logic for extension configurations or data snapshots
    action: Assume the framework provides versioned write operations or snapshot semantics — the framework does not implement
      version control for configuration writes or data snapshots; overwrites are destructive
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Configuration updates or data snapshots occur without versioning, making rollback impossible when corrupted
      state is persisted and integrity verification becomes impossible
    derived_from_bd_id: BD-GAP-046
  - id: finance-C-218
    when: When implementing state persistence for extensions or data snapshots
    action: Implement versioned write operations using atomic replace patterns (write-to-temp then rename) and maintain snapshot
      history with configurable retention (minimum 3 versions recommended)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without versioned writes and snapshots, corrupted configurations cannot be rolled back to known-good state
      and data snapshots cannot be compared for integrity verification
    derived_from_bd_id: BD-GAP-046
  - id: finance-C-219
    when: When implementing command execution logic that passes parameters to functions
    action: Call validate_kwargs before invoking target functions to enforce type checking and enable pydantic coercion —
      do not bypass or remove this validation layer during refactoring
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping kwargs validation causes type mismatches to surface as runtime errors with confusing stack traces
      instead of graceful coercion failures; silent type coercion from string to numeric may produce unexpected strategy parameters
    derived_from_bd_id: BD-011
  - id: finance-C-221
    when: When implementing volatility estimation using the Yang-Zhang estimator
    action: Use Yang-Zhang formula with k=0.34 as the optimal weighting parameter; require OHLC (open, high, low, close) price
      data; validate k parameter is in range [0.1, 0.9]
    severity: high
    kind: domain_rule
    modality: must
    consequence: Yang-Zhang volatility requires all four OHLC price components; using only close prices omits the overnight
      and intraday variance components that provide 60-80% of total variance information, causing systematic underestimation
      of true volatility
    derived_from_bd_id: BD-058
  - id: finance-C-222
    when: When implementing volatility cones for term structure analysis
    action: Use at least 3 rolling windows (e.g., [10, 20, 30] or [5, 21, 63] days) with at least 2 quantile levels (typically
      10th and 90th percentiles) to construct the volatility cone; verify sufficient historical data covers the longest window
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Volatility cones with fewer than 3 windows produce unreliable regime detection, causing mean-reversion strategies
      to enter at wrong volatility levels and miss profitable opportunities or enter overextended positions
    derived_from_bd_id: BD-061
  - id: finance-C-223
    when: When implementing trend strength analysis using ADX in a backtesting strategy
    action: Use ADX length=14 following Wilder's original specification — verify the length parameter is set to 14, not a
      rounded or alternative value like 7, 20, or 21
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: ADX with length=14 measures trend strength per Wilder's specification; using alternative lengths produces
      different trend classification results, causing the strategy to misclassify trending vs range-bound markets and execute
      inappropriate trades
    derived_from_bd_id: BD-063
  - id: finance-C-224
    when: When implementing momentum analysis using RSI for mean-reversion entry signals
    action: Use RSI with 14-period window and 70/30 thresholds for overbought/oversold identification — verify the period
      is 14 and thresholds are exactly 70 (overbought) and 30 (oversold)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: RSI with 70/30 thresholds identifies extreme readings for mean-reversion entry signals; using different thresholds
      like 80/20 reduces signal frequency and delays entries, while wrong period values alter momentum sensitivity causing
      false reversal signals
    derived_from_bd_id: BD-064
  - id: finance-C-225
    when: When implementing cyclical analysis using CCI for mean-reversion strategies
    action: Use CCI with 25-period length and ±100 thresholds following Lambert's original specification — verify the length
      is 25 and thresholds are ±100
    severity: high
    kind: operational_lesson
    modality: must
    consequence: CCI with 25-period and ±100 thresholds per Lambert's specification identifies cyclical turning points by
      measuring deviation from mean typical price; incorrect parameters produce false reversal signals, causing the strategy
      to enter positions at wrong market phases
    derived_from_bd_id: BD-065
  - id: finance-C-226
    when: When implementing timing analysis using Fisher Transform for reversal detection
    action: Use Fisher Transform with ±2 thresholds (approximately 95% confidence interval) and 14-period length — verify
      thresholds are ±2 and period is 14
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fisher Transform ±2 thresholds correspond to 95% confidence interval in Gaussian-transformed distribution;
      different thresholds break this correspondence, causing unreliable extreme reading identification and timing applications
      to produce invalid reversal signals
    derived_from_bd_id: BD-066
  - id: finance-C-227
    when: When referencing prior command outputs in CLI workflows using OBBject registry
    action: Remember that OBBject registry uses stack semantics where OBB0 is the latest result and OBB1 is the previous result
      — verify index interpretation matches this stack order, not FIFO queue or chronological order
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: OBBject registry stack semantics mean OBB0 is latest and OBB1 is previous; misinterpreting these as FIFO
      or chronological causes users to reference stale or wrong historical data when building complex workflows, leading to
      incorrect analysis conclusions
    derived_from_bd_id: BD-022
  - id: finance-C-228
    when: When defining QueryParams or data schemas for OpenBB provider integrations
    action: Verify each parameter names are correct before submitting requests; enable validation logging to detect unknown
      parameters being silently ignored
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Extra='allow' silently accepts unknown parameters without warnings; typos in field names (e.g., 'start_datte'
      instead of 'start_date') pass validation but use default values, causing silently incorrect results
    derived_from_bd_id: BD-080
  - id: finance-C-229
    when: When processing data from OpenBB providers with strict=False type coercion
    action: Verify data types after retrieval and implement explicit type validation for numeric fields used in calculations;
      log any type conversions that occur
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Lenient type coercion may hide data quality issues; implicit conversions can affect numeric precision in
      financial calculations, leading to cumulative rounding errors in backtesting results
    derived_from_bd_id: BD-081
  - id: finance-C-230
    when: When implementing autocorrelation testing for econometric analysis
    action: For autocorrelation detection beyond lag-1, use Breusch-Godfrey test instead of Durbin-Watson; document the lag
      order being tested in analysis outputs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Durbin-Watson test only detects first-order autocorrelation and has a dead band region; higher-order autocorrelation
      patterns go undetected, leading to incorrectly concluding residual independence in time series models
    derived_from_bd_id: BD-039
  - id: finance-C-231
    when: When implementing residual autocorrelation testing in econometric analysis
    action: Use Breusch-Godfrey LM test for multi-lag autocorrelation detection — do NOT substitute with Durbin-Watson test
      or Ljung-Box test without explicit justification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Durbin-Watson only detects first-order autocorrelation; Ljung-Box tests joint hypothesis without specific
      lag structure, leading to invalid hypothesis testing conclusions for higher-order serial correlation that can invalidate
      strategy econometric validation
    derived_from_bd_id: BD-040
  - id: finance-C-232
    when: When normalizing data for algorithms requiring bounded input ranges
    action: Use Min-Max scaling to constrain outputs to [0,1] range — do NOT use Z-score normalization when bounded outputs
      are required by downstream algorithms
    severity: high
    kind: domain_rule
    modality: must
    consequence: Z-score produces unbounded outputs that violate assumptions for bounded-range algorithms, causing incorrect
      probability outputs in sigmoid-activated neural networks and improper relative rotation chart scaling
    derived_from_bd_id: BD-043
  - id: finance-C-233
    when: When defining or accessing provider credentials in OpenBB platform
    action: Use standardized credential naming format {provider_name.lower()}_{credential_name} — each environment variables
      and credential file entries must follow this lowercase convention
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Credential lookups fail silently when case mismatches occur, causing authentication errors in case-sensitive
      credential stores that prevent data fetching without clear error messages
    derived_from_bd_id: BD-072
  - id: finance-C-234
    when: When interpreting cointegration test results in statistical analysis
    action: Verify that Engle-Granger cointegration test results are interpreted in the context of embedded ADF assumptions
      — understand that p-values cascade through test chaining and may not reflect standalone ADF confidence levels
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Silent test chaining in Engle-Granger creates misleading p-values; users interpreting cointegration results
      without understanding embedded ADF assumptions will make incorrect decisions about mean-reversion strategies
    derived_from_bd_id: BD-091
  - id: finance-C-235
    when: When normalizing financial data features for machine learning or statistical models
    action: Use Z-score normalization for financial returns with outliers and skew rather than Min-Max scaling; verify distribution
      characteristics before selecting a normalization method and document the chosen approach for reproducibility
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Arbitrary normalization selection without understanding financial data characteristics distorts feature distributions;
      Min-Max scaling on skewed returns creates artificial bounds that propagate errors through ML models and backtests
    derived_from_bd_id: BD-096
  - id: finance-C-236
    when: When organizing CLI commands with custom argument groups
    action: Assume the framework supports arbitrary custom argument group names beyond argparse defaults without validation
      — conflicting or malformed group names will cause parsing failures in _build_custom_groups
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without validation for custom argument groups, CLI parsing fails silently or throws cryptic errors when group
      names conflict with existing conventions or argparse internal handling
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-237
    when: When defining custom argument groups in CLI commands
    action: Validate group names against a predefined allowlist before registration in _build_custom_groups; verify no duplicate
      group names exist and wrap group construction in try-except to provide clear error messages
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid group names silently break CLI parsing; proper validation with allowlists and exception handling
      prevents cryptic failures during argument processing
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-238
    when: When deploying the application in multi-process environments
    action: Assume singleton pattern works correctly for service classes (AuthService, SystemService, UserService) across
      multiple processes — each process will initialize its own singleton instance via __call__, breaking shared state assumptions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Singleton enforcement via __call__ in singleton.py:14 creates process-local instances; multi-process deployments
      result in inconsistent state across processes, causing authentication and user management failures
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-239
    when: When deploying services in multi-process or distributed environments
    action: Replace singleton pattern with dependency injection using shared state mechanisms (e.g., Redis, database-backed
      state) to verify consistent service state across processes; avoid relying on __call__ singleton enforcement for distributed
      deployments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Process-local singletons cause inconsistent authentication and user state in distributed deployments; dependency
      injection with shared state ensures all processes reference the same service instances
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-240
    when: When storing or passing MIC/alpha_2 codes through Exchange/Country type objects
    action: Assume Exchange and Country types always contain valid MIC/alpha_2 format values — when the stored value format
      differs from expected MIC/alpha_2, accessor methods (mic, acronym, name) will fail or return incorrect data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Exchange and Country inherit from str and use MIC/alpha_2 codes directly at exchange_utils.py:78; invalid
      format values cause accessor methods to return incorrect or malformed data, breaking downstream data processing
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-241
    when: When validating MIC/alpha_2 codes before creating Exchange/Country objects
    action: 'Validate code format before instantiation using regex patterns (MIC: 4 uppercase letters, alpha_2: 2 uppercase
      letters) and provide explicit conversion methods in Exchange/Country; raise ValidationError on format mismatch'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unvalidated MIC/alpha_2 codes in Exchange/Country objects cause silent data corruption; format validation
      with regex and explicit conversion prevents malformed codes from propagating through the system
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-242
    when: When implementing or selecting volatility models for options pricing
    action: Assume the framework implements volatility surface interpolation between strikes or maturities — the framework
      does not provide volatility surface interpolation capability; interpolated values will be missing or incorrect
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without volatility surface interpolation, skew and term structure effects cannot be properly captured; strategies
      relying on interpolated vol for strike selection or maturity interpolation will produce incorrect Greeks and suboptimal
      trade signals
    derived_from_bd_id: BD-GAP-036
  - id: finance-C-243
    when: When calibrating option pricing models to market prices
    action: Implement external volatility surface interpolation using cubic spline or SABR model between available strikes
      and maturities before passing to the framework, and document the interpolation method used
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Strategies using interpolated volatility without documented methodology may produce inconsistent results
      between backtesting and live trading if different interpolation methods are applied
    derived_from_bd_id: BD-GAP-036
  - id: finance-C-244
    when: When calibrating option pricing models to market prices
    action: Assume the framework can compute implied volatility from market prices — the framework does not implement an implied
      volatility solver; attempting to invert market prices will fail or return incorrect values
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without an implied volatility solver, model calibration to real market data is impossible; backtests using
      assumed or static volatility will diverge significantly from live trading conditions
    derived_from_bd_id: BD-GAP-037
  - id: finance-C-245
    when: When calibrating option pricing models for backtesting
    action: 'Pre-compute implied volatility externally using Newton-Raphson or bisection method (convergence tolerance: 1e-6)
      on observed bid/ask prices, then pass calibrated volatility values to the framework as inputs'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtests using assumed volatility without calibration to market-implied vol will systematically misprice
      options, causing strategies to exhibit unrealistic P&L patterns
    derived_from_bd_id: BD-GAP-037
  - id: finance-C-246
    when: When implementing finite difference PDE solvers for option pricing
    action: Assume the framework validates finite difference grid stability — the framework does not implement CFL (Courant-Friedrichs-Lewy)
      condition checks; unstable grids will produce divergent or NaN results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without CFL validation, finite difference schemes may become numerically unstable, producing NaN values or
      wildly oscillating prices that corrupt backtest results
    derived_from_bd_id: BD-GAP-038
  - id: finance-C-247
    when: When configuring finite difference grids for PDE-based option pricing
    action: 'Validate time step dt satisfies the CFL condition: dt <= dx² / (2D) for diffusion equations and dt <= dx / |v|
      for convection, where D is diffusion coefficient, dx is spatial step, and v is convection velocity; reject configurations
      failing this check'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failing to validate CFL before running finite difference schemes can produce numerical explosions that invalidate
      entire backtest runs and make results non-reproducible
    derived_from_bd_id: BD-GAP-038
  - id: finance-C-248
    when: When implementing credit risk models or ECL calculations under IFRS 9
    action: Assume the framework implements IFRS 9 staging logic or default definition criteria — the framework does not provide
      credit stage classification; each positions will be treated as Stage 1 with 12-month ECL
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without IFRS 9 staging, lifetime ECL is never recognized for deteriorating credits, causing systematic underestimation
      of credit reserves and regulatory non-compliance
    derived_from_bd_id: BD-GAP-041
  - id: finance-C-249
    when: When calculating expected credit loss for IFRS 9 compliance
    action: 'Implement external staging logic: Stage 1 for instruments with no significant increase in credit risk (SICR)
      since origination, Stage 2 for instruments with SICR but not credit-impaired, Stage 3 for credit-impaired or defaulted;
      apply 12-month ECL for Stage 1 and lifetime ECL for Stage 2 and Stage 3'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misclassifying credit stages leads to incorrect ECL calculations, resulting in regulatory penalties and understated
      credit risk provisions in financial statements
    derived_from_bd_id: BD-GAP-041
  - id: finance-C-250
    when: When generating sustainability reports or ESG disclosures
    action: Assume the framework defines or calculates GHG emissions scope boundaries — the framework does not implement GHG
      scope classification; emissions data will be missing or incorrectly categorized as Scope 1
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without GHG scope boundary definition, sustainability reports will incorrectly classify emissions, violating
      GHG Protocol and potentially regulatory disclosure requirements
    derived_from_bd_id: BD-GAP-044
  - id: finance-C-251
    when: When calculating carbon footprint or GHG emissions for ESG reporting
    action: 'Define explicit scope boundaries before any emissions calculation: Scope 1 (direct: company-owned sources), Scope
      2 (indirect: purchased energy), Scope 3 (value chain: upstream/downstream); for compliance, at minimum Scope 1 and 2
      must be reported per GHG Protocol; if Scope 3 is included, specify which of the 15 categories apply'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrectly categorizing emissions across scopes leads to non-compliant ESG disclosures, potential greenwashing
      claims, and regulatory sanctions under emerging carbon reporting rules
    derived_from_bd_id: BD-GAP-044
  - id: finance-C-252
    when: When implementing PCAF (Principles for Responsible Banking) aligned data processing
    action: Assume the framework provides a built-in PCAF Data Quality Score calculation — this capability is missing from
      the framework; the framework only provides 1/6 (16.7%) CMP coverage
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without implementing PCAF Data Quality Score, the framework cannot produce compliant PCAF reporting, causing
      regulatory non-compliance and inability to meet UN Principles for Responsible Banking disclosure requirements
    derived_from_bd_id: BD-GAP-045
  - id: finance-C-253
    when: When implementing PCAF-aligned data processing for responsible banking reporting
    action: Implement PCAF Data Quality Score calculation following the PCAF Global Banking Alliance methodology, scoring
      data quality across completeness, timeliness, accuracy, and consistency dimensions (DQA methodology requires scoring
      0-100 for each quality indicator)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without implementing PCAF Data Quality Score, the framework cannot produce compliant PCAF reporting, causing
      regulatory non-compliance and inability to meet UN Principles for Responsible Banking disclosure requirements
    derived_from_bd_id: BD-GAP-045
  - id: finance-C-254
    when: When implementing reinforcement learning trading agent reward functions
    action: Assume the RL reward function automatically incorporates trading costs — this capability is missing; RL agents
      will optimize gross returns without accounting for transaction costs
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: RL agents trained with incomplete reward functions systematically overestimate net returns; in live trading,
      the agent will execute trades that appear profitable in backtest but are loss-making after costs, causing significant
      financial loss
    derived_from_bd_id: BD-GAP-047
  - id: finance-C-255
    when: When implementing RL-based trading strategies with reinforcement learning agents
    action: 'Explicitly include trading costs (commission fees, slippage, bid-ask spread) in the reward function calculation:
      reward = gross_pnl - commission_cost - slippage_cost - spread_cost, ensuring RL agent optimizes net P&L rather than
      gross returns'
    severity: high
    kind: domain_rule
    modality: must
    consequence: RL agents trained with incomplete reward functions systematically overestimate net returns; in live trading,
      the agent will execute trades that appear profitable in backtest but are loss-making after costs, causing significant
      financial loss
    derived_from_bd_id: BD-GAP-047
  - id: finance-C-256
    when: When implementing ML pipeline transformation logic for feature engineering
    action: Assume the framework automatically handles fit/transform isolation between training and inference — this capability
      is missing; pipelines will leak information if not explicitly controlled
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without fit/transform isolation, scalers and encoders learn from test data during fit, causing look-ahead
      bias that inflates backtest performance and produces non-reproducible results in live trading
    derived_from_bd_id: BD-GAP-048
  - id: finance-C-257
    when: When implementing ML pipeline preprocessing stages for trading signal generation
    action: 'Explicitly separate fit operations from transform operations: use sklearn Pipeline with ColumnTransformer or
      equivalent, fit transformers only on training split, apply learned parameters to test/inference splits, preventing any
      information leakage across data splits'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without fit/transform isolation, scalers and encoders learn from test data during fit, causing look-ahead
      bias that inflates backtest performance and produces non-reproducible results in live trading
    derived_from_bd_id: BD-GAP-048
  - id: finance-C-258
    when: When implementing multi-agent trading systems with multiple AI agents
    action: Assume the framework provides built-in consensus mechanisms for multi-agent decision-making — this capability
      is missing; agents will produce independent signals without aggregation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without consensus mechanisms, conflicting agent signals are not reconciled, causing erratic trading behavior
      where the system may execute contradictory orders simultaneously
    derived_from_bd_id: BD-GAP-049
  - id: finance-C-259
    when: When implementing multi-agent trading architectures with multiple AI agents
    action: 'Implement explicit consensus mechanisms to aggregate multi-agent signals: use majority voting, weighted voting
      with confidence scores, or auction-based aggregation, with defined fallback strategy when agents disagree (AIL Coverage
      target: 6/6)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without consensus mechanisms, conflicting agent signals are not reconciled, causing erratic trading behavior
      where the system may execute contradictory orders simultaneously
    derived_from_bd_id: BD-GAP-049
  - id: finance-C-260
    when: When implementing insurance reserve estimation for actuarial calculations
    action: Assume the framework provides built-in reserve adequacy calculation methods (Chain Ladder, Bornhuetter-Ferguson,
      Mack) — this capability is missing; basic IBNR calculations will be inaccurate
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without reserve adequacy methods, the framework cannot properly calculate IBNR reserves, leading to under-reserving
      that causes capital inadequacy or over-reserving that triggers unnecessary capital requirements
    derived_from_bd_id: BD-GAP-050
  - id: finance-C-261
    when: When implementing insurance reserve estimation for actuarial analysis
    action: 'Implement reserve adequacy methods following standard actuarial practices: Chain Ladder method for incurred claims
      development factors, Bornhuetter-Ferguson method for a priori loss estimation, Mack method for stochastic uncertainty
      quantification with confidence intervals'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without reserve adequacy methods, the framework cannot properly calculate IBNR reserves, leading to under-reserving
      that causes capital inadequacy or over-reserving that triggers unnecessary capital requirements
    derived_from_bd_id: BD-GAP-050
  - id: finance-C-266
    when: When modifying model definitions, provider registrations, router commands, or entry points
    action: Run openbb-build to regenerate static assets before using the Python interface
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Skipping openbb-build leaves stale static assets, causing new commands to not appear on obb object and calls
      to fail
  - id: finance-C-267
    when: When setting up plugin output interceptors
    action: Skip explicit environment configuration for dangerous plugins
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Plugins that intercept output can modify responses unpredictably if allow_on_command_output and allow_mutable_extensions
      are not explicitly set
  - id: finance-C-268
    when: When integrating existing FastAPI applications as OpenBB extensions
    action: Rely on authorization hooks in the Python Interface
    severity: medium
    kind: resource_boundary
    modality: should_not
    consequence: Authorization hooks are not injected into the Python Interface, causing security mechanisms to silently fail
  - id: finance-C-269
    when: When using WebSockets in FastAPI applications
    action: Expect WebSocket support in the Python Interface
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: WebSockets are not supported in the Python Interface, causing connection failures for real-time features
  - id: finance-C-270
    when: When defining multi-method routes
    action: Create GET + POST on same path without verification
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Multi-method routes may not generate correctly, causing incomplete API coverage or incorrect routing
  - id: finance-C-271
    when: When interpreting tool response results
    action: 'Treat results: null or results: [] as errors'
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Empty results indicate no matching data (date range, unsupported symbol, data unavailable) - treating as
      errors causes incorrect error handling and user-facing failures
  - id: finance-C-272
    when: When implementing async data fetchers
    action: Use aextract_data instead of extract_data for async operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using extract_data in async context blocks the event loop and causes performance degradation or deadlocks
  - id: finance-C-273
    when: When configuring tool categories in MCP server
    action: Assume categories outside allowed_tool_categories can be activated via discovery tools
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Restricted categories cannot be activated even via discovery tools, causing tool activation calls to silently
      fail
  - id: finance-C-274
    when: When accessing user credentials for data providers
    action: Access API keys via credentials.get method using the package naming convention (e.g., credentials.get('package_name_api_key'))
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect credential key names cause authentication failures, preventing data access from protected providers
  - id: finance-C-275
    when: When registering charting views
    action: Name chart view methods using <router_name>_<command_name> convention in lower_snake_case
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect method naming causes charting views to not be registered to endpoints, preventing chart functionality
  - id: finance-C-276
    when: When defining tool response schemas with multiple providers
    action: Check the keys in returned records as field names vary by provider
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Different providers return different column names for the same endpoint, causing key errors when assuming
      consistent field names
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
