    - id: BD-063
      type: B/BA
      summary: Use percentile-based VaR with cutoff=0.05 as default (5th percentile)
    - id: BD-064
      type: B/BA
      summary: Compute CVaR (Expected Shortfall) as mean of returns at or below VaR percentile
    - id: BD-065
      type: B/DK
      summary: 'Use tail ratio with fixed 5th/95th percentiles: |p95| / |p5|'
    - id: BD-066
      type: B
      summary: Use R-squared of OLS linear fit on cumulative log returns for stability measure
    - id: BD-067
      type: B/BA
      summary: Use Nelder-Mead optimization for GPD parameter estimation (scale, shape)
    - id: BD-068
      type: B/DK
      summary: Filter returns by factor sign (>0 for up, <0 for down) in conditional calculations
    - id: BD-069
      type: B
      summary: Use bottleneck library for NaN-handling statistics when available (fallback to numpy)
    - id: BD-070
      type: B/BA
      summary: Compute max drawdown as (current - running_max) / running_max using fmax.accumulate
    - id: BD-071
      type: B/BA
      summary: Calmar ratio divides annual return by absolute max_drawdown
    - id: BD-072
      type: B/BA
      summary: Omega ratio uses sum of excess returns above/below threshold
    - id: BD-073
      type: B/DK
      summary: Performance attribution uses factor_exposure * factor_returns for common returns
    - id: BD-074
      type: B/DK
      summary: Aggregate returns groups by (year, period) and applies cumulate_returns
    - id: BD-075
      type: B
      summary: Use scipy.optimize.minimize with Nelder-Mead for GPD MLE optimization
    - id: BD-076
      type: B/BA
      summary: GPD VaR uses threshold excess approach with POT (Peaks Over Threshold) method
    - id: BD-077
      type: B
      summary: Excess Sharpe (Information Ratio) uses tracking error as denominator
resources:
  packages:
  - name: numpy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: bottleneck
    version_pin: latest
  - name: peewee
    version_pin: latest
  - name: yfinance
    version_pin: latest
  - name: pandas-datareader
    version_pin: latest
  - name: pytest
    version_pin: latest
  - name: pytest-cov
    version_pin: latest
  - name: tox
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy
    - python3 -m pip install pandas
    - python3 -m pip install scipy
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing rolling window calculations for financial metrics
    action: pass a zero-length window to rolling_window function
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Rolling window with length 0 causes ValueError('Can't have 0-length window') at runtime, breaking all downstream
      rolling metric calculations like roll_sharpe_ratio and roll_max_drawdown
    stage_ids:
    - data_ingestion
  - id: finance-C-002
    when: When implementing rolling window operations with stride tricks
    action: pass a scalar array to the rolling_window function
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Passing a scalar array causes IndexError('Can't restride a scalar'), preventing any rolling calculations
      from completing
    stage_ids:
    - data_ingestion
  - id: finance-C-003
    when: When creating pandas structures from numpy arrays
    action: convert arrays with dimensionality greater than 2 to pandas Series or DataFrame
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Attempting to convert arrays with dim > 2 raises ValueError('cannot convert array of dim > 2 to a pandas
      structure'), causing data transformation failures
    stage_ids:
    - data_ingestion
  - id: finance-C-004
    when: When specifying the period parameter for annualization
    action: use a valid period key ('daily', 'weekly', 'monthly', 'quarterly', 'yearly') or provide custom annualization value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid period string causes ValueError with message listing valid options, breaking annualization calculations
      for all downstream metrics
    stage_ids:
    - data_ingestion
  - id: finance-C-005
    when: When passing more than two return sets to the roll function
    action: pass more than two arguments to the roll function
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Passing more than 2 return sets raises ValueError('Cannot pass more than 2 return sets'), preventing rolling
      calculations with multiple benchmarks
    stage_ids:
    - data_ingestion
  - id: finance-C-021
    when: When implementing simple_returns for pandas DataFrame or Series
    action: Use pandas pct_change() method to compute percentage change between consecutive prices
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Manual formula (price[t] - price[t-1]) / price[t-1] must match pct_change() output, otherwise downstream
      risk metrics (Sharpe, Sortino, max_drawdown) will produce incorrect values
    stage_ids:
    - return_computation
  - id: finance-C-022
    when: When computing cumulative returns from simple returns
    action: Apply geometric compounding using cumprod(1 + returns) to preserve the multiplicative nature of returns
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Arithmetic cumulative sum will overstate gains and understate losses, causing cumulative returns to diverge
      significantly from actual portfolio performance over volatile periods
    stage_ids:
    - return_computation
  - id: finance-C-038
    when: When implementing annualization_factor
    action: Validate period parameter against known keys or raise ValueError with descriptive message
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid period parameter would produce incorrect annualization factors, causing volatility and ratio calculations
      to be scaled incorrectly
    stage_ids:
    - risk_metrics
  - id: finance-C-048
    when: When using GPD optimization with scipy
    action: Skip validation of optimization success flag before using estimated parameters
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Using failed optimization results would produce invalid GPD parameters, corrupting VaR/ES calculations with
      garbage values
    stage_ids:
    - risk_metrics
  - id: finance-C-063
    when: When calculating Sharpe ratio for a returns series
    action: Use the formula (mean returns - risk_free) / std(returns) * sqrt(annualization) with sample standard deviation
      (ddof=1)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect Sharpe ratio calculation produces misleading risk-adjusted return estimates, causing poor investment
      decisions based on faulty performance attribution
    stage_ids:
    - performance_metrics
  - id: finance-C-064
    when: When computing performance metrics with fewer than 2 data points
    action: Return np.nan for Sharpe ratio, Sortino ratio, and annual volatility
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Metrics calculated from insufficient data produce undefined or infinite values that contaminate downstream
      risk calculations and reporting
    stage_ids:
    - performance_metrics
  - id: finance-C-069
    when: When annualizing returns for different frequencies
    action: 'Apply the correct annualization factor: 252 for daily, 52 for weekly, 12 for monthly, 4 for quarterly, 1 for
      yearly'
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Incorrect annualization produces non-comparable metrics across different return frequencies, causing invalid
      strategy comparisons and misallocated capital
    stage_ids:
    - performance_metrics
  - id: finance-C-079
    when: When computing alpha and beta against benchmark returns
    action: 'Use the OLS regression formula: beta = Cov(strategy_returns, factor_returns) / Var(factor_returns), alpha = annualized
      excess return after beta adjustment'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Alpha and beta will not match OLS regression coefficients, causing systematic misrepresentation of strategy
      risk-adjusted performance relative to benchmark
    stage_ids:
    - factor_analysis
  - id: finance-C-080
    when: When implementing up_capture and down_capture functions
    action: 'Filter periods strictly by benchmark sign: up uses factor_returns > 0, down uses factor_returns < 0'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero benchmark returns will be incorrectly included in either up or down capture, distorting the capture
      ratio calculation and leading to misleading performance attribution
    stage_ids:
    - factor_analysis
  - id: finance-C-081
    when: When passing returns and factor_returns to alpha_beta functions
    action: Verify data alignment on index labels for pd.Series or length equality for np.ndarray
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Misaligned time series will produce incorrect alpha/beta values due to correlation computed between mismatched
      periods, invalidating factor analysis results
    stage_ids:
    - factor_analysis
  - id: finance-C-090
    when: When using wrapper functions up() and down() for bull/bear decomposition
    action: Apply the wrapper to decompose any binary stat into bull/bear variants by filtering factor_returns sign
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect filtering logic produces invalid bull/bear metric variants, corrupting performance attribution
      analysis
    stage_ids:
    - factor_analysis
  - id: finance-C-095
    when: When implementing factor attribution calculations
    action: verify specific_returns equals total_returns minus common_returns
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Attribution decomposition violates mathematical identity; total returns will not equal the sum of factor-attributed
      and specific returns, causing incorrect portfolio performance reporting
    stage_ids:
    - performance_attribution
  - id: finance-C-096
    when: When computing factor exposures
    action: group risk exposures by datetime index to sum per time period
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Risk factor exposures will not aggregate correctly per time period, causing incorrect factor contribution
      calculations and misleading attribution results
    stage_ids:
    - performance_attribution
  - id: finance-C-097
    when: When processing positions and factor loadings
    action: use MultiIndex structure with (dt, ticker) level names for input data alignment
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Data alignment between positions and factor loadings will fail silently, producing NaN values in risk_exposures
      and incorrect attribution results
    stage_ids:
    - performance_attribution
  - id: finance-C-111
    when: When computing returns from price data
    action: Represent each return series using decimal percentages (0.01 = 1% return), not basis points or raw fractions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: All downstream metrics (Sharpe ratio, alpha, beta, drawdowns) produce incorrect values if returns are in
      basis points or fractions instead of decimal percentages
  - id: finance-C-112
    when: When working with pandas datetime indexes in empyrical functions
    action: Verify each pandas datetime indexes are tz-aware UTC before passing to any empyrical function
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Timezone-naive datetime indexes cause misalignment across markets and may silently produce incorrect results
      when combining data from different sources
  - id: finance-C-113
    when: When annualizing returns using period constants
    action: 'Use the canonical period constants: DAILY=252 (trading days), WEEKLY=52, MONTHLY=12, QUARTERLY=4, YEARLY=1'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using calendar days instead of trading days for daily annualization produces inflated Sharpe ratios and annual
      returns by ~15% (252 vs 365)
  - id: finance-C-115
    when: When computing simple returns from prices
    action: Drop the first row of returns (effectively applying a one-period shift) to prevent look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Including the current price bar in return calculation causes look-ahead bias, where the current return appears
      known before it should be, leading to inflated backtest performance
  - id: finance-C-116
    when: When implementing alpha_beta_aligned() for joint alpha/beta computation
    action: Pre-compute beta and pass it as the _beta parameter to alpha_aligned — do not compute alpha independently without
      _beta
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Computing alpha independently without _beta causes numerical inconsistency between separate alpha() and beta()
      calls vs joint alpha_beta() call, as alpha requires the same beta for its calculation
  - id: finance-C-120
    when: When implementing factor analysis functions that accept input series
    action: Accept both pd.Series and np.ndarray as valid input types — the library is designed to work with both
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Restricting input to only pd.Series or only np.ndarray breaks existing workflows and compatibility with downstream
      analysis tools
  - id: finance-C-121
    when: When implementing non-aligned alpha/beta functions
    action: Call _aligned_series() to align pd.Series indexes before delegating to aligned versions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Skipping alignment causes mismatched returns and factor_returns, producing NaN or incorrect alpha/beta values
      when series have different timestamps
  - id: finance-C-122
    when: When computing performance attribution with positions and factor loadings
    action: Use MultiIndex with exactly (dt, ticker) level names for positions and factor_loadings DataFrames
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using single-level index or different MultiIndex names causes compute_exposures() to fail or produce incorrect
      factor exposure aggregations
  - id: finance-C-124
    when: When computing cumulative returns from price data
    action: Apply simple_returns() transformation first — cum_returns() requires non-cumulative simple returns as input
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Passing price data directly to cum_returns() produces meaningless values; the function expects period-over-period
      return percentages
  - id: finance-C-135
    when: When estimating Value at Risk or Expected Shortfall using extreme value theory
    action: Use GPD-based peaks-over-threshold method with scipy optimize - verify sufficient tail observations (minimum 100-200
      extreme events) exist in the dataset before applying the model, as GPD requires adequate sample size for reliable parameter
      estimation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: GPD VaR/ES with insufficient tail observations systematically underestimates extreme loss scenarios by 20-40%,
      causing inadequate capital reserves and potential regulatory violations during market stress events
    derived_from_bd_id: BD-009
  - id: finance-C-145
    when: When calculating annualized performance metrics (Sharpe, Omega, Calmar, Sortino) for daily frequency data
    action: Use annualization_factor = 252 (business days per year) for DAILY frequency - this reflects US equity market trading
      calendar and is the industry standard for daily-to-annual conversion
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using 365 (calendar days) overstates annualized volatility by ~45%, inflating Sharpe ratios and causing strategies
      to appear significantly more attractive than actual performance; using 250 ignores market holidays and creates systematic
      bias in cross-dataset comparisons
    derived_from_bd_id: BD-019
  regular:
  - id: finance-C-006
    when: When processing returns data with NaN values in cumulative returns
    action: handle NaN values in cum_returns by replacing them with 0 (zero-return assumption), not by skipping
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN values in cum_returns are silently replaced with 0 and participate in cumulative product calculation,
      treating missing periods as zero-return rather than skipping them - this produces mathematically incorrect cumulative
      returns that differ from manual window calculations
    stage_ids:
    - data_ingestion
  - id: finance-C-007
    when: When aligning multiple return series for joint calculations
    action: use the _aligned_series utility to align timestamps before passing to paired functions like alpha_beta or capture
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper alignment, misaligned timestamps cause incorrect paired calculations, leading to wrong alpha/beta
      values and incorrect performance attribution
    stage_ids:
    - data_ingestion
  - id: finance-C-008
    when: When calculating rolling statistics over arrays of varying lengths
    action: verify the window parameter is capped at min(len(arr), window) to handle short arrays gracefully
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Window larger than array length without capping causes IndexError in stride_tricks, crashing all rolling
      metric computations
    stage_ids:
    - data_ingestion
  - id: finance-C-009
    when: When processing data with yfinance for symbol returns
    action: assume yfinance returns timezone-aware indices without validation
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: yfinance may return timezone-naive indices; directly calling tz_localize on timezone-aware indices throws
      TypeError, causing data fetching failures in get_symbol_returns_from_yahoo
    stage_ids:
    - data_ingestion
  - id: finance-C-010
    when: When requiring high-performance NaN-aware aggregation for large financial datasets
    action: install bottleneck library to achieve ~10x speedup for NaN-heavy financial data
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Without bottleneck installed, nanmean/nanstd/nansum operations use slower numpy fallbacks, causing significant
      performance degradation for large datasets with frequent NaN values
    stage_ids:
    - data_ingestion
  - id: finance-C-011
    when: When fetching Fama-French factors or treasury yields
    action: install pandas-datareader dependency or accept ImportError for web-based data fetching
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without pandas-datareader installed, get_fama_french and get_treasury_yield raise ImportError, blocking all
      factor-based risk calculations
    stage_ids:
    - data_ingestion
  - id: finance-C-012
    when: When using the library with Python 3.12 or higher
    action: attempt to use pandas-datareader functionality for Fama-French factors
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: pandas-datareader is incompatible with Python >= 3.12, causing import failures for web data sources and blocking
      Fama-French factor downloads
    stage_ids:
    - data_ingestion
  - id: finance-C-013
    when: When fetching Yahoo Finance data for symbol returns
    action: install yfinance dependency or handle UserWarning gracefully when data fetch fails
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without yfinance installed, get_symbol_returns_from_yahoo silently catches exceptions and returns empty DataFrame
      with UserWarning, causing downstream calculations to fail with empty data errors
    stage_ids:
    - data_ingestion
  - id: finance-C-014
    when: When calculating rolling metrics from financial time series
    action: verify the input array has length >= window to produce meaningful rolling statistics
    severity: high
    kind: domain_rule
    modality: must
    consequence: Window parameter larger than array length causes rolling functions to return empty arrays, leading to downstream
      NaN propagation in all rolling metrics
    stage_ids:
    - data_ingestion
  - id: finance-C-015
    when: When normalizing timestamps to UTC for date range queries
    action: handle both timezone-aware and timezone-naive inputs using try-except pattern for tz_localize vs tz_convert
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Directly calling tz_localize on already-localized timestamps raises TypeError, breaking date range normalization
      and causing cache lookup failures
    stage_ids:
    - data_ingestion
  - id: finance-C-016
    when: When caching fetched data to local filesystem
    action: use XDG_CACHE_HOME or ~/.cache/empyrical as the default cache directory
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without proper cache directory setup or permissions, data caching fails silently with UserWarning, causing
      repeated network fetches and potential rate limiting from data sources
    stage_ids:
    - data_ingestion
  - id: finance-C-017
    when: When computing returns from price data using simple_returns
    action: verify input prices are non-negative to avoid divide-by-zero warnings in percentage change calculations
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Negative prices or zero initial prices cause invalid divide warnings and potential NaN propagation in returned
      values
    stage_ids:
    - data_ingestion
  - id: finance-C-018
    when: When providing data for rolling metric calculations
    action: verify input arrays are non-empty; empty arrays cause functions to return empty results
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Empty input arrays cause rolling functions to return empty arrays, which propagate as NaN values through
      all downstream calculations without clear error indication
    stage_ids:
    - data_ingestion
  - id: finance-C-019
    when: When using pandas-datareader to fetch Fama-French factors
    action: divide returned factor values by 100 to convert from percentage to decimal form
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fama-French data from pandas-datareader is returned as percentage values (e.g., 0.5 for 0.5%); failing to
      divide by 100 causes all factor-based calculations to be 100x inflated
    stage_ids:
    - data_ingestion
  - id: finance-C-023
    when: When processing tz-naive DatetimeIndex from price series
    action: Preserve or convert the datetime index to be tz-aware UTC for consistent cross-market alignment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixing tz-aware and tz-naive timestamps across markets causes misalignment in portfolio aggregation, leading
      to incorrect correlation and risk calculations when assets trade in different time zones
    stage_ids:
    - return_computation
  - id: finance-C-024
    when: When receiving empty return series (length < 1)
    action: Return a copy of the empty series without attempting cumprod computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling cumprod on empty arrays can cause undefined behavior or runtime errors, breaking downstream risk
      calculations that expect valid output for any input length
    stage_ids:
    - return_computation
  - id: finance-C-025
    when: When handling NaN values in returns array
    action: Replace NaN values with 0 before computing cumulative product to maintain array shape and avoid propagation
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN values in cumprod will propagate to all subsequent values, corrupting the entire cumulative return series
      and causing downstream metrics to return NaN instead of valid numbers
    stage_ids:
    - return_computation
  - id: finance-C-026
    when: When converting annualization factor for daily returns
    action: Use 252 trading days as the annualization factor, representing industry-standard approximation for trading days
      per year
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using incorrect annualization factor (e.g., 365 calendar days) will distort Sharpe ratio, annual volatility,
      and CAGR calculations, leading to improper performance comparison across strategies
    stage_ids:
    - return_computation
  - id: finance-C-027
    when: When computing returns from np.ndarray prices
    action: Use np.diff() to compute price differences, then divide element-wise by previous prices with divide-by-zero warnings
      silenced
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero in numpy arrays produces inf/nan values that corrupt return calculations, causing downstream
      metrics to fail or produce meaningless results
    stage_ids:
    - return_computation
  - id: finance-C-028
    when: When processing multi-asset price DataFrame
    action: Apply pct_change per column independently, preserving column structure for batch portfolio processing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Row-wise percentage change treats assets as sequential observations rather than concurrent assets, producing
      invalid cross-sectional return comparisons for multi-asset portfolios
    stage_ids:
    - return_computation
  - id: finance-C-029
    when: When cum_returns output is allocated fresh (out is None)
    action: Convert numpy cumprod result back to pd.Series with original index for Series input, or pd.DataFrame with original
      index and columns for DataFrame input
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Returning raw numpy array breaks downstream functions that expect datetime index for alignment, causing silent
      misalignments in factor analysis and risk attribution
    stage_ids:
    - return_computation
  - id: finance-C-030
    when: When validating period parameter for annualization
    action: Pass invalid period string that is not in the allowed set (daily, weekly, monthly, quarterly, yearly)
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Invalid period string causes ValueError, preventing annualization of return metrics and breaking batch performance
      reporting pipelines
    stage_ids:
    - return_computation
  - id: finance-C-031
    when: When computing simple_returns from flat/constant price series
    action: Produce zero returns for each periods when price remains constant
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-zero returns from constant prices create phantom trading signals, leading to incorrect strategy evaluation
      and potential overfitting in backtesting
    stage_ids:
    - return_computation
  - id: finance-C-032
    when: When simple_returns drops first element
    action: Return n-1 elements from n-element price series, aligning index with prices.iloc[1:] for DataFrame/Series
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Mismatched index between returns and prices causes alignment errors in downstream rolling window calculations,
      producing incorrect Sharpe and Sortino ratios
    stage_ids:
    - return_computation
  - id: finance-C-033
    when: When using empyrical for backtesting return calculations
    action: Claim that computed returns represent actual execution results or guarantee future live trading performance
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtested returns do not account for slippage, liquidity constraints, or market impact, presenting an optimistic
      view that cannot be achieved in live trading
    stage_ids:
    - return_computation
  - id: finance-C-034
    when: When using annualization_factor constant for period conversion
    action: Treat 252 as the replaceable annualization_factor point, allowing customization for different market calendars
      (e.g., 250 for some markets, 252 for US)
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Using incorrect trading days per year for non-US markets skews annualized volatility and Sharpe ratio, leading
      to improper risk-adjusted performance comparison
    stage_ids:
    - return_computation
  - id: finance-C-035
    when: When implementing max_drawdown computation
    action: Return NaN for empty returns series (length < 1)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty returns input would cause undefined behavior in downstream calculations, leading to silent data corruption
      or incorrect portfolio risk assessments
    stage_ids:
    - risk_metrics
  - id: finance-C-036
    when: When implementing drawdown_series computation
    action: Compute drawdown as (current_value - running_max) / running_max to verify values are always <= 0
    severity: high
    kind: domain_rule
    modality: must
    consequence: Drawdown series with positive values would misrepresent loss potential, causing risk metrics to report phantom
      gains during drawdown periods
    stage_ids:
    - risk_metrics
  - id: finance-C-037
    when: When implementing annual_volatility computation
    action: Return NaN when returns series has length < 2 (insufficient data for standard deviation)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Volatility calculation with single data point produces meaningless results, potentially causing division
      by zero or incorrect risk scaling
    stage_ids:
    - risk_metrics
  - id: finance-C-039
    when: When implementing calmar_ratio computation
    action: Return NaN when max_drawdown >= 0 (strategy has no drawdown), avoiding division by zero or infinity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategies with no drawdown would produce infinite or undefined Calmar ratios, leading to misleading performance
      comparisons
    stage_ids:
    - risk_metrics
  - id: finance-C-040
    when: When implementing GPD-based VaR/ES estimation
    action: Require shape_param > 0 for fat tail estimation and var_estimate > 0 for valid loss estimate
    severity: high
    kind: domain_rule
    modality: must
    consequence: GPD estimation with invalid parameters produces unreliable tail risk estimates, leading to underestimation
      of extreme loss potential
    stage_ids:
    - risk_metrics
  - id: finance-C-041
    when: When implementing GPD VaR calculator
    action: Return 0 when exceedance_n == 0 (no tail observations) or shape_param <= 0 (invalid distribution)
    severity: high
    kind: domain_rule
    modality: must
    consequence: VaR calculation without tail observations would extrapolate from insufficient data, producing meaningless
      risk estimates
    stage_ids:
    - risk_metrics
  - id: finance-C-042
    when: When implementing GPD ES calculator
    action: Guard against division by zero when (1 - shape_param) == 0
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero in ES calculation causes numerical instability and potential NaN propagation in risk metrics
    stage_ids:
    - risk_metrics
  - id: finance-C-043
    when: When implementing GPD log-likelihood scale/shape
    action: Return -float_info.max for invalid parameter combinations (scale <= 0 or invalid shape/scale ratio)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid log-likelihood values would cause optimization to converge to invalid parameter estimates, corrupting
      tail risk models
    stage_ids:
    - risk_metrics
  - id: finance-C-044
    when: When implementing GPD risk estimates for short series
    action: Return zeros array (not NaN) when returns length < 3, distinguishing from failed estimation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Insufficient data for GPD fitting must return distinguishable placeholder rather than NaN which could be
      mistaken for estimation failure
    stage_ids:
    - risk_metrics
  - id: finance-C-045
    when: When implementing value_at_risk computation
    action: Use percentile calculation based on cutoff parameter (default 0.05 = 5th percentile)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect percentile calculation would produce wrong VaR estimates, leading to either over or under-estimation
      of downside risk
    stage_ids:
    - risk_metrics
  - id: finance-C-046
    when: When implementing conditional_value_at_risk computation
    action: Include the VaR cutoff value in the CVaR average (cutoff_index + 1 elements)
    severity: high
    kind: domain_rule
    modality: must
    consequence: CVaR excluding the VaR boundary value would underestimate expected shortfall, providing false comfort about
      tail risk
    stage_ids:
    - risk_metrics
  - id: finance-C-047
    when: When implementing drawdown_series for single element
    action: Return 0 drawdown when only one return exists (no drawdown possible from single value)
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Single return without drawdown context would produce incorrect drawdown series, misrepresenting risk profile
    stage_ids:
    - risk_metrics
  - id: finance-C-050
    when: When computing drawdown_series with different input types
    action: Preserve input type (pd.Series, pd.DataFrame, np.ndarray) in output to maintain downstream compatibility
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Type conversion errors would break downstream code expecting specific data structures, causing AttributeError
      or shape mismatches
    stage_ids:
    - risk_metrics
  - id: finance-C-057
    when: When reporting GPD-based VaR/ES estimates
    action: Present GPD tail estimates as precise point forecasts without confidence bounds
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: GPD parameter estimation has inherent uncertainty; presenting point estimates as precise values would mislead
      risk management decisions
    stage_ids:
    - risk_metrics
  - id: finance-C-058
    when: When reporting historical VaR/CVaR from backtests
    action: Claim historical VaR/CVaR estimates represent expected future tail losses with certainty
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Historical simulation VaR does not predict extreme events; fat tails and regime changes invalidate historical-based
      tail risk estimates
    stage_ids:
    - risk_metrics
  - id: finance-C-059
    when: When calculating Calmar ratio for comparison
    action: Use Calmar ratio as sole indicator of strategy quality without context of return distribution
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Calmar ratio based on historical maximum drawdown ignores drawdown frequency and recovery patterns, potentially
      favoring fragile strategies
    stage_ids:
    - risk_metrics
  - id: finance-C-060
    when: When optimizing GPD parameters with small samples
    action: Assume GPD optimization convergence guarantees valid parameter estimates for small datasets
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Small sample GPD estimation produces unreliable shape/scale parameters; Nelder-Mead may converge to invalid
      solutions with few tail observations
    stage_ids:
    - risk_metrics
  - id: finance-C-062
    when: When computing cum_returns from returns
    action: Replace NaN values with 0 before cumulative product to avoid NaN propagation through entire series
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN values in returns would corrupt cumulative returns, making all subsequent drawdown/volatility calculations
      invalid
    stage_ids:
    - risk_metrics
  - id: finance-C-065
    when: When calculating Calmar ratio
    action: Return np.nan when maximum drawdown is non-negative or when the ratio is infinite
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calmar ratio becomes undefined for strategies with no drawdown or when annual return is extremely high relative
      to drawdown, producing meaningless infinite values
    stage_ids:
    - performance_metrics
  - id: finance-C-066
    when: When processing returns with missing values
    action: Use nan-aware aggregation functions (nanmean, nanstd) that ignore NaN values rather than propagating them
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN values propagate through calculations causing entire metrics to become NaN, losing useful information
      from non-missing data points
    stage_ids:
    - performance_metrics
  - id: finance-C-067
    when: When adjusting returns for risk-free rate
    action: Optimize by returning original returns unchanged when risk_free equals exactly 0
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unnecessary array subtraction creates memory copies and wastes CPU cycles when adjusting by zero, degrading
      performance for large return series
    stage_ids:
    - performance_metrics
  - id: finance-C-068
    when: When configuring risk-adjusted performance metrics
    action: Use risk_free rate of 0 as the default when no rate is explicitly specified
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using zero risk-free rate by default produces inflated Sharpe and Sortino ratios that do not reflect actual
      opportunity cost, leading to overestimation of risk-adjusted returns
    stage_ids:
    - performance_metrics
  - id: finance-C-070
    when: When computing rolling performance metrics
    action: Use a window size of at least 1 to avoid empty rolling calculations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Window size less than 1 produces invalid rolling calculations or empty output arrays, breaking rolling metric
      consistency with consecutive window calculations
    stage_ids:
    - performance_metrics
  - id: finance-C-071
    when: When reusing output buffers for metric calculations
    action: Pass the out parameter to enable in-place array writing when calling performance metric functions
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Repeated metric calculations without output buffer reuse cause excessive memory allocation and garbage collection
      overhead, degrading rolling calculation performance
    stage_ids:
    - performance_metrics
  - id: finance-C-072
    when: When calculating Sortino ratio
    action: Use downside deviation below required_return threshold instead of total standard deviation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using total volatility penalizes upside returns variance, producing non-meaningful Sortino ratios that misrepresent
      actual downside risk
    stage_ids:
    - performance_metrics
  - id: finance-C-073
    when: When aligning returns and benchmark series for alpha/beta calculation
    action: Use aligned functions (alpha_aligned, beta_aligned) when data is pre-aligned to skip expensive reindexing
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Unnecessarily reindexing already-aligned series wastes CPU cycles and may introduce unintended data transformations,
      degrading performance in high-frequency backtesting scenarios
    stage_ids:
    - performance_metrics
  - id: finance-C-074
    when: When creating rolling versions of performance metrics
    action: Use the factory functions (_create_unary_vectorized_roll_function, _create_binary_vectorized_roll_function) to
      generate consistent rolling implementations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Manually implementing rolling metrics violates consistency with base metric implementations, causing divergent
      behavior between rolling and non-rolling versions
    stage_ids:
    - performance_metrics
  - id: finance-C-075
    when: When calculating alpha and beta together
    action: Reuse beta calculation in alpha computation via _beta parameter to avoid redundant regression
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Computing beta twice wastes computational resources, doubling regression time for alpha_beta calculations
      which are called frequently in rolling windows
    stage_ids:
    - performance_metrics
  - id: finance-C-076
    when: When validating Sharpe ratio results
    action: Present infinite Sharpe ratio (from zero-variance returns) as valid performance metrics
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Infinite Sharpe ratio from flat-line returns misrepresents strategy quality, creating false confidence in
      strategies with no volatility and potentially no returns
    stage_ids:
    - performance_metrics
  - id: finance-C-077
    when: When reporting backtested performance metrics
    action: Claim that Sharpe, Sortino, or Calmar ratios from historical backtesting will match live trading results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtested risk-adjusted return metrics do not account for execution slippage, market impact, transaction
      costs, and behavioral differences, producing inflated expectations for live trading
    stage_ids:
    - performance_metrics
  - id: finance-C-078
    when: When interpreting Omega ratio
    action: Use default required_return=0 without considering the actual minimum acceptable return for the investment mandate
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Omega ratio with zero threshold treats all positive returns equally regardless of whether they meet investment
      objectives, potentially misrepresenting risk-adjusted performance
    stage_ids:
    - performance_metrics
  - id: finance-C-082
    when: When computing beta with insufficient data points
    action: Return np.nan when returns length < 1 or factor_returns length < 2
    severity: high
    kind: domain_rule
    modality: must
    consequence: Insufficient data causes division by zero or undefined statistical moments, producing NaN or infinity values
      that propagate through portfolio analysis
    stage_ids:
    - factor_analysis
  - id: finance-C-083
    when: When computing alpha with single data point
    action: Return np.nan when returns length < 2
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single-period returns cannot form a time series for alpha calculation, resulting in undefined annualization
    stage_ids:
    - factor_analysis
  - id: finance-C-084
    when: When processing multi-portfolio DataFrame with 2D array support
    action: Process each column independently and return results with corresponding column structure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Column mixing produces incorrect per-portfolio metrics, corrupting multi-strategy performance attribution
    stage_ids:
    - factor_analysis
  - id: finance-C-085
    when: When using beta_fragility_heuristic for extreme condition analysis
    action: Treat output as heuristic estimate only, not as precise fragility measurement
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Over-reliance on fragility heuristic for risk management may lead to inadequate capital reserves during market
      stress
    stage_ids:
    - factor_analysis
  - id: finance-C-086
    when: When computing capture ratios against factor returns
    action: Use annual returns in numerator and denominator, not raw period returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Capture ratio will not represent annualized market capture, mischaracterizing strategy performance relative
      to benchmark
    stage_ids:
    - factor_analysis
  - id: finance-C-087
    when: When calling alpha_beta jointly with pre-computed beta
    action: Pass pre-computed beta via _beta parameter to avoid duplicate beta_aligned calculation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Redundant beta calculation doubles computation time for joint alpha/beta queries, reducing efficiency for
      large-scale factor analysis
    stage_ids:
    - factor_analysis
  - id: finance-C-088
    when: When beta_fragility_heuristic receives fewer than 3 data points
    action: Return np.nan as insufficient data for median-of-3 estimation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Less than 3 data points cannot form start/mid/end triplets for median-of-3 heuristic, producing undefined
      fragility estimate
    stage_ids:
    - factor_analysis
  - id: finance-C-089
    when: When computing beta variance denominator approaches zero
    action: Set beta to np.nan when factor_returns variance < 1.0e-30
    severity: high
    kind: domain_rule
    modality: must
    consequence: Near-zero variance in factor returns causes numerical instability, producing extremely large or infinite
      beta values that corrupt risk metrics
    stage_ids:
    - factor_analysis
  - id: finance-C-091
    when: When converting 1D arrays to beta_aligned for processing
    action: Add column dimension via [:, np.newaxis] and extract scalar result for return
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Improper array dimension handling causes shape mismatch errors or incorrect scalar extraction in beta calculation
    stage_ids:
    - factor_analysis
  - id: finance-C-092
    when: When passing arrays to roll() function for rolling statistics
    action: Verify both arrays are of the same type (both np.ndarray or both pd.Series)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Type mismatch between returns and factor_returns causes ValueError or incorrect rolling window alignment
    stage_ids:
    - factor_analysis
  - id: finance-C-093
    when: When computing up_capture with no positive factor return periods
    action: Return np.nan due to empty filtered dataset passed to capture function
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Empty filtered dataset causes division by zero in annual_return or returns undefined capture ratio
    stage_ids:
    - factor_analysis
  - id: finance-C-098
    when: When decomposing portfolio returns
    action: separate tilt_returns from timing_returns to distinguish average exposure effect from daily timing decisions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Performance attribution conflates average factor exposure returns with active timing decisions, making it
      impossible to distinguish skill sources in portfolio management
    stage_ids:
    - performance_attribution
  - id: finance-C-099
    when: When providing positions input to perf_attrib
    action: normalize positions to weights summing to 1.0 across tickers per time period
    severity: high
    kind: domain_rule
    modality: must
    consequence: Risk exposures will be incorrectly scaled, causing factor attribution to misrepresent the portfolio's true
      factor exposure and over/under-attribute returns to factors
    stage_ids:
    - performance_attribution
  - id: finance-C-100
    when: When preserving output structure
    action: maintain MultiIndex datetime index in risk_exposures DataFrame output
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Downstream consumers expecting datetime-indexed risk exposures will fail, breaking integration with risk
      management and reporting pipelines
    stage_ids:
    - performance_attribution
  - id: finance-C-101
    when: When handling frequency information in returns
    action: preserve and restore the original datetime frequency after computations
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Time series frequency information is lost, causing incorrect temporal aggregation in downstream analysis
      and broken rolling window calculations
    stage_ids:
    - performance_attribution
  - id: finance-C-102
    when: When performing floating-point attribution calculations
    action: accept floating-point tolerance in sum verification instead of exact equality
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attribution sum checks will fail due to floating-point precision errors, causing valid results to be rejected
      and breaking CI/CD pipelines
    stage_ids:
    - performance_attribution
  - id: finance-C-103
    when: When using external factor data sources
    action: align factor_returns and factor_loadings to the exact time range of returns input
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Factor data outside the returns time range causes misalignment errors, producing NaN factor returns and zero
      common returns in attribution output
    stage_ids:
    - performance_attribution
  - id: finance-C-104
    when: When choosing factor attribution methodology
    action: document that the attribution_model is a replaceable point with varying factor decomposition approaches
    severity: medium
    kind: claim_boundary
    modality: should
    consequence: Users may incorrectly assume attribution results are definitive rather than methodology-dependent, leading
      to overconfident factor-based investment decisions
    stage_ids:
    - performance_attribution
  - id: finance-C-105
    when: When presenting performance attribution results
    action: claim that factor-attributed returns equal expected future alpha generation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Historical factor attribution explains past performance but does not predict future factor premiums; presenting
      attribution as predictive misleads investment decisions
    stage_ids:
    - performance_attribution
  - id: finance-C-106
    when: When processing positions to prevent caller mutation
    action: create a defensive copy of positions before modifying its index structure
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Original positions Series is mutated in-place, corrupting caller data structures and causing subtle bugs
      in calling code that reuses the positions object
    stage_ids:
    - performance_attribution
  - id: finance-C-107
    when: When using this library for live trading decisions
    action: rely solely on backtested attribution results without real-time factor data validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Live trading with factor exposures derived from backtest-only data may not reflect current market factor
      conditions, leading to incorrect risk management and potential losses
    stage_ids:
    - performance_attribution
  - id: finance-C-108
    when: When loading factor loadings from CSV sources
    action: parse dates correctly to maintain consistent datetime index type across positions, factor_returns, and factor_loadings
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Mismatched datetime types (string vs datetime vs Timestamp) cause silent alignment failures and produce all-NaN
      factor exposure calculations
    stage_ids:
    - performance_attribution
  - id: finance-C-109
    when: When calculating tilt_returns as average exposure effect
    action: use mean of risk_exposures_portfolio rather than sum to isolate the average exposure contribution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Tilt returns incorrectly include the portfolio size effect, mixing absolute return level with factor exposure
      quality in the attribution decomposition
    stage_ids:
    - performance_attribution
  - id: finance-C-114
    when: When implementing any financial calculation involving monetary values or cumulative sums
    action: Use numpy float64 for intermediate financial calculations — Decimal precision is not used in this library
    severity: medium
    kind: domain_rule
    modality: should_not
    consequence: Float64 precision errors accumulate in large cumulative sums (e.g., 1e9+), potentially causing rounding errors
      in final cumulative return calculations. For regulatory reporting or audit trails requiring exact arithmetic, use an
      external Decimal-based library
  - id: finance-C-117
    when: When using the empyrical library for production financial analysis
    action: Verify Python version is 3.10 or higher — the library does not support Python 3.9 or earlier
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using unsupported Python versions causes import errors or unexpected behavior due to language feature dependencies
  - id: finance-C-118
    when: When installing empyrical with numpy>=2.0
    action: Use pandas>=2.2.2 — older pandas versions are incompatible with numpy 2.0+
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incompatible numpy/pandas versions cause import failures or runtime errors when computing financial metrics
  - id: finance-C-119
    when: When using the pandas-datareader optional dependency
    action: Use pandas-datareader with Python versions 3.12 or later — pandas-datareader is incompatible with Python>=3.12
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: ImportError when attempting to fetch Fama-French factors or FRED treasury yields on Python 3.12+
  - id: finance-C-123
    when: When implementing statistical functions that allocate output arrays
    action: Support optional output buffer (out parameter) for in-place results and memory efficiency
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing out parameter support forces unnecessary array allocations in high-frequency or batch processing
      scenarios, degrading performance
  - id: finance-C-125
    when: When presenting or reporting this system's computed metrics to users or stakeholders
    action: Claim that backtested return metrics (Sharpe ratio, alpha, max drawdown) equal expected live trading results —
      backtesting ignores market impact, financing costs, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss when actual execution differs from historical simulation
  - id: finance-C-126
    when: When presenting backtested performance attribution results from perf_attrib()
    action: Claim that factor attributions in backtesting are predictive of live factor exposures — backtest factor loadings
      are typically derived from executed positions, not from actual market microstructure
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users relying on backtest factor attributions for live portfolio construction may discover significant tracking
      error as execution realities (slippage, fills, order sizing) alter actual factor exposures from intended ones
  - id: finance-C-127
    when: When describing the scope of empyrical-reloaded to users
    action: Claim that empyrical-reloaded supports non-financial time series analysis — the library is designed for financial
      return metrics with domain-specific conventions (decimal percentages, trading-day annualization)
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Applying trading-day annualization factors to non-financial time series produces meaningless annualized metrics;
      users expecting general-purpose statistics will get incorrect results
  - id: finance-C-128
    when: When describing the scope of empyrical-reloaded to users
    action: Claim that empyrical-reloaded supports real-time trading systems — the library is a computation library for historical
      and rolling-window metrics with no execution layer
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting real-time risk metric updates from empyrical will be disappointed; the library has no streaming
      API, no order execution, and no live connection to brokerages
  - id: finance-C-129
    when: When describing the scope of empyrical-reloaded to users
    action: Claim that empyrical-reloaded supports portfolio optimization — the library computes risk/return metrics but contains
      no optimization algorithms (mean-variance, Black-Litterman, etc.)
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting optimization capabilities will be misled; empyrical can provide inputs to an optimizer but
      does not perform portfolio construction or rebalancing
  - id: finance-C-130
    when: When describing the scope of empyrical-reloaded to users
    action: Claim that empyrical-reloaded supports non-US market analysis without adjustment — the library uses US trading-day
      conventions (252 days/year) and US risk-free rate assumptions
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Applying US annualization factors and treasury-based risk-free rates to non-US markets produces systematically
      biased Sharpe ratios and risk metrics (e.g., Japanese markets with 245 trading days, or emerging markets with different
      risk-free instruments)
  - id: finance-C-131
    when: When implementing DataFrame processing for multi-asset portfolio backtesting
    action: Process each column independently without cross-column state accumulation - verify rolling calculations treat
      each DataFrame column as a separate series and do not allow data from one asset to leak into calculations for another
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cross-column state leakage in multi-asset backtests causes return correlations to be artificially inflated,
      leading to incorrect portfolio optimization and allocation decisions that over-concentrate risk
    derived_from_bd_id: BD-004
  - id: finance-C-132
    when: When implementing factor analysis for multi-portfolio backtesting
    action: Process multi-portfolio data using column-wise operations - verify each column represents a distinct portfolio
      or asset and calculations operate across rows for each column independently
    severity: high
    kind: domain_rule
    modality: must
    consequence: Row-wise processing of multi-portfolio data incorrectly assumes temporal alignment across portfolios, causing
      factor loadings to be attributed to wrong securities and leading to flawed performance attribution reports
    derived_from_bd_id: BD-014
  - id: finance-C-133
    when: When implementing or extending rolling window calculations using the factory pattern
    action: Verify that new rolling metrics follow the factory pattern semantics for window size, min_periods, and rolling
      mean/std inheritance - do not introduce custom window handling that deviates from the factory's consistent behavior
      across the 14+ generated functions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Rolling metrics with inconsistent window semantics produce systematically biased performance metrics across
      the 14+ generated functions, causing backtest results to diverge from expected behavior without obvious error signals
    derived_from_bd_id: BD-082
  - id: finance-C-134
    when: When annualizing daily returns or risk metrics for backtesting
    action: 'Verify that 252 trading days matches the actual market calendar being backtested - adjust the annualization factor
      for non-US markets (UK: 252, Hong Kong: 248, Japan: 246) or special trading schedules like shortened hours or holiday
      intraday closings'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Annualization using 252 for non-US equity markets systematically misstates risk-adjusted returns by 1-4%,
      causing strategies to appear more or less attractive than they actually are when compared across different market calendars
    derived_from_bd_id: BD-006
  - id: finance-C-136
    when: When calling _adjust_returns with factor parameter set to zero
    action: Create a defensive copy of the input array before returning when factor equals zero - do not return the original
      array reference to prevent downstream mutation of input data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning the original array without copying causes downstream modifications to corrupt the caller's input
      data, leading to silent data corruption in chained operations where callers expect their input arrays to remain unchanged
    derived_from_bd_id: BD-081
  - id: finance-C-137
    when: When calculating alpha/beta metrics in performance_metrics stage
    action: Use aligned versions of alpha/beta functions when caller guarantees DatetimeIndex alignment — call alpha_aligned()
      or beta_aligned() to skip costly reindexing and achieve ~2x faster batch processing
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using non-aligned functions on pre-aligned data causes redundant reindexing operations, slowing batch processing
      by approximately 50% without any accuracy benefit
    derived_from_bd_id: BD-010
  - id: finance-C-138
    when: When processing financial time series data in return_computation stage
    action: Preserve timezone awareness (tz-aware DatetimeIndex) throughout each calculations — do not strip timezone info
      using tz_convert(None) or tz_localize(None)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Stripping timezone info causes incorrect return calculations when combining assets from different timezones,
      such as US equities with international ADRs, leading to silent data corruption in multi-timezone portfolios
    derived_from_bd_id: BD-005
  - id: finance-C-139
    when: When computing factor risk exposures in performance_attribution stage
    action: Calculate risk exposures as factor_loadings multiplied by positions, then group and sum by datetime to aggregate
      multi-asset exposures to portfolio level — do not use per-ticker exposures without aggregation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Per-ticker exposures without datetime grouping cannot map to portfolio-level factor returns, breaking factor-based
      return attribution and producing non-meaningful output for factor models
    derived_from_bd_id: BD-032
  - id: finance-C-140
    when: When decomposing returns using tilt vs timing attribution
    action: Separate tilt_returns (average exposure effect) from timing_returns (daily timing decisions) — do not combine
      into single attribution output as it conflates distinct investment decision types
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Combined attribution output cannot distinguish whether performance stems from static factor tilts versus
      dynamic market timing decisions, obscuring the source of investment skill
    derived_from_bd_id: BD-017
  - id: finance-C-141
    when: When processing financial data in data_ingestion stage
    action: Assume the framework annotates currency and unit metadata on data fields — the framework does not implement explicit
      currency and unit annotation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without currency/unit annotation, cross-currency calculations silently produce incorrect results when mixing
      USD, EUR, or other denomination assets in portfolio calculations
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-142
    when: When ingesting financial data in data_ingestion stage
    action: Implement currency and unit metadata annotation on data fields — add currency_code field (e.g., USD, CNY) and
      unit field (e.g., share, contract, basis_point) to each numeric columns with explicit documentation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing currency/unit annotation causes silent incorrect results in cross-currency operations and unit-mixed
      calculations, creating production reliability risk in multi-asset strategies
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-143
    when: When processing trades in data_ingestion stage
    action: Assume the framework handles settlement and delivery time tracking — the framework does not implement settlement/delivery
      time annotations for assets
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without settlement/delivery time tracking, T+1 settlement rules cannot be properly enforced, causing backtest
      results to include same-day round-trip trades that are prohibited in markets like A-shares
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-144
    when: When implementing position management in data_ingestion stage
    action: Implement settlement_delivery_time field annotation on each trade records — add settlement_date field to capture
      T+N settlement rules and use it to control available quantity (trading_t attribute) for position calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing settlement tracking causes T+1 violations in backtesting, making results non-reproducible in live
      trading and potentially violating regulatory requirements for markets with settlement delays
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-146
    when: When calculating beta values using aligned or non-aligned modes
    action: Explicitly specify and document the alignment mode when computing beta - be aware that beta_aligned and beta (non-aligned)
      produce different numerical results due to different NaN handling in _aligned_series(), and the variance floor of 1e-30
      may activate differently
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Switching between aligned and non-aligned beta modes without awareness causes inconsistent beta values from
      the same mathematical definition, leading to wrong risk estimates and strategy selection decisions based on which mode
      was used
    derived_from_bd_id: BD-091
  - id: finance-C-147
    when: When implementing tail ratio calculation for risk metrics
    action: Use 95th percentile for positive returns and 5th percentile for negative returns to compute tail_ratio = abs(95th_positive)
      / abs(5th_negative)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different percentile pairs (e.g., 90th/10th) would change tail ratio interpretation, making cross-strategy
      comparisons inconsistent and potentially mischaracterizing fund tail risk profiles for investor reporting
    derived_from_bd_id: BD-031
  - id: finance-C-148
    when: When implementing performance attribution common returns calculation
    action: Compute common returns as factor_loadings × factor_returns summed across each factors to get total factor-based
      return
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using per-factor breakdown instead of summed total would misrepresent attribution results; summing is essential
      for Brinson-style total attribution that matches benchmark minus portfolio return
    derived_from_bd_id: BD-033
  - id: finance-C-149
    when: When implementing return calculation for portfolio analytics
    action: Use Pandas pct_change().iloc[1:] or NumPy np.diff()/previous_value to compute simple returns — both methods assume
      discrete compounding
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using log returns via np.log(1+r) instead of simple returns fundamentally changes all downstream metrics
      (CAGR, Sharpe, drawdown), causing systematic discrepancies when comparing with frameworks using simple returns
    derived_from_bd_id: BD-020
  - id: finance-C-150
    when: When implementing cumulative returns calculation
    action: 'Apply conditional formula: if starting_value=0 return result-1, otherwise return result*starting_value — these
      two paths must NOT be interchanged'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using (result-1) for non-unit starting values produces incorrect cumulative returns, causing portfolio value
      reconstruction to differ from actual results by a factor of the starting_value
    derived_from_bd_id: BD-021
  - id: finance-C-151
    when: When using CAGR, geometric alpha annualization, or annual return calculation
    action: 'Verify each three annualization paths use consistent periods-per-year constant (252 for US equity) — if changing
      annualization, update each three locations: periods.py, stats.py:389, stats.py:1191-1198'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Hardcoded APPROX_BDAYS_PER_YEAR=252 in three separate locations means any change to annualization periods
      must update all three; inconsistency creates silent disagreement between CAGR, alpha, and annual_return values
    derived_from_bd_id: BD-096
  - id: finance-C-152
    when: When calculating Omega ratio for non-daily frequency data
    action: Verify required_return threshold is annualization-frequency-aware — for weekly data use n=52, monthly use n=12,
      not hardcoded 252
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 252 annualization factor for weekly data under-annualizes required return threshold by ~5x, causing
      miscalibrated Omega ratio that incorrectly classifies gains vs losses relative to the investor's threshold
    derived_from_bd_id: BD-098
  - id: finance-C-153
    when: When implementing tail risk metrics (VaR, CVaR, GPD)
    action: Assume VaR, CVaR, and GPD estimates are consistent — VaR at 5% (BD-027) feeds CVaR but GPD uses independent DEFAULT_THRESHOLD=0.2;
      changing VaR cutoff changes CVaR but not GPD
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: GPD tail estimates use 20th percentile threshold (Peaks Over Threshold) independent of VaR cutoff, creating
      two different tail risk quantification methodologies in the same framework that may produce contradictory risk estimates
    derived_from_bd_id: BD-092
  - id: finance-C-154
    when: When calculating Calmar ratio
    action: Assume numerator and denominator are comparable — annual_return (annualized via 252) is divided by raw max_drawdown
      (not annualized), creating an apples-to-oranges comparison for multi-year backtests
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Calmar ratio uses annualized return as numerator but raw drawdown as denominator; for a 3-year backtest with
      30% max drawdown and 10% annualized return, this produces misleadingly low Calmar of ~0.33 instead of properly annualized
      risk-adjusted figure
    derived_from_bd_id: BD-093
  - id: finance-C-156
    when: When computing CAPM alpha or other asset pricing metrics using Fama-French factor data
    action: Use risk_free=0 with Fama-French benchmark data - the benchmark includes risk-free income in its return calculation
      but the portfolio subtracts zero, creating systematic alpha bias where risk-free income is incorrectly attributed to
      portfolio skill
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: When Fama-French data includes positive risk-free rates (typically 3-month T-bill), using portfolio risk_free=0
      causes alpha = portfolio_return - beta*(benchmark_return) to subtract beta*rf from the benchmark but not from the portfolio,
      systematically overstating alpha by beta*rf and misrepresenting performance attribution
    derived_from_bd_id: BD-095
  - id: finance-C-157
    when: When using Fama-French factor data for asset pricing calculations
    action: 'Align the risk-free rate with the benchmark data source: when using Fama-French factors, use the corresponding
      FF risk-free series (typically 3-month T-bill returns) rather than defaulting to zero'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using misaligned risk-free rates causes systematic pricing errors in CAPM alpha and other asset pricing metrics,
      where performance attribution incorrectly credits or debits the risk-free income component to active management
    derived_from_bd_id: BD-095
  - id: finance-C-158
    when: When implementing beta calculation logic in risk_metrics
    action: Apply variance floor of 1e-30 before dividing in beta calculation to prevent division by near-zero variance causing
      overflow
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without the variance floor, beta calculation divides by near-zero variance for constant factors, causing
      overflow to inf and producing NaN in all downstream risk metrics that depend on beta values
    derived_from_bd_id: BD-042
  - id: finance-C-159
    when: When processing empty return series in batch data pipelines
    action: Return NaN for empty return series (not empty Series or exceptions) to signal undefined statistical result without
      disrupting batch processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning empty Series instead of NaN for empty input breaks downstream calculations that expect scalar numeric
      values, causing silent type errors in metrics like CAGR that cannot handle Series objects
    derived_from_bd_id: BD-044
  - id: finance-C-160
    when: When handling NaN values in return time series
    action: Use NaN→0 for cumulative returns (missing days have no change) and propagate NaN via nanmean/nanstd for ratio
      metrics to verify consistent statistical treatment across each calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent NaN handling creates invisible biases where the same missing data produces different results
      depending on which metric function processes it, making backtest results unreproducible across different metric combinations
    derived_from_bd_id: BD-045
  - id: finance-C-161
    when: When calculating annual volatility for return distributions with heavy tails
    action: Use alpha=2.0 (Levy stability exponent) only for normally distributed returns; for heavy-tailed distributions
      (e.g., crypto, emerging markets), use empirical scaling or alpha<2 to avoid systematic underestimation
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using alpha=2.0 for heavy-tailed distributions systematically underestimates annual volatility by 15-30%
      because actual tail behavior follows power-law rather than Gaussian scaling, causing VaR and position sizing to underestimate
      risk
    derived_from_bd_id: BD-026
  - id: finance-C-162
    when: When calculating Value at Risk with the default cutoff parameter
    action: Verify that cutoff=0.05 (5th percentile, 95% confidence) matches the strategy's risk management requirements;
      for strategies requiring extreme tail protection, use cutoff=0.01 (99% confidence) instead
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default 5% VaR instead of 1% VaR understates tail risk by 4x in observation count, causing momentum
      strategies with fat tails to experience losses 5-10x larger than the VaR estimate predicts
    derived_from_bd_id: BD-027
  - id: finance-C-163
    when: When caching returns data or loading cached CSV files
    action: Verify cache files use UTC timezone-aware datetime index to align with market data sources; reject or convert
      tz-naive timestamps to UTC before comparison operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using tz-naive timestamps in cache files causes silent misalignment when comparing against timezone-aware
      market data, leading to returns being attributed to wrong trading days and corrupting backtest results
    derived_from_bd_id: BD-037
  - id: finance-C-164
    when: When using batting average to evaluate strategy performance
    action: Use batting average in conjunction with risk-adjusted metrics (Sharpe ratio, CVaR) since batting average only
      measures win rate without accounting for win/loss magnitude differences
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Relying solely on batting average for strategy selection can choose high win-rate but small-profit strategies
      over lower win-rate but large-profit strategies, missing opportunities for strategies with better risk-adjusted returns
    derived_from_bd_id: BD-048
  - id: finance-C-165
    when: When interpreting up capture ratio for asymmetric performance analysis
    action: Interpret up capture ratio > 100% as directional outperformance in rising markets only; use in combination with
      down capture ratio and Sharpe ratio to assess risk-adjusted performance rather than in isolation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Interpreting up capture ratio as a standalone quality metric without context can select strategies with high
      up capture but even higher down capture, resulting in worse overall risk-adjusted returns than benchmark
    derived_from_bd_id: BD-049
  - id: finance-C-166
    when: When implementing or refactoring functions that accept returns input in the empyrical library
    action: Return scalar output for 1D array/Series input and Series of per-column outputs for 2D DataFrame input; preserve
      axis parameter semantics for row vs column processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Breaking the 1D scalar/2D Series output convention would cause silent type mismatches in downstream code
      expecting scalars for single series or Series for multi-asset portfolios, leading to indexing errors and incorrect batch
      computations
    derived_from_bd_id: BD-057
  - id: finance-C-167
    when: When calculating downside risk using semi-deviation methodology
    action: Verify that returns are clipped to [-inf, 0] range before squaring — the 0 threshold distinguishes negative from
      non-negative returns; only negative returns contribute to semi-deviation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using full variance instead of semi-deviation incorrectly penalizes positive returns, leading to overestimated
      risk measures that would cause a risk-averse strategy to underallocate to volatile but profitable positions
    derived_from_bd_id: BD-029
  - id: finance-C-168
    when: When aligning positions and factor data with returns in performance attribution
    action: Use date range intersection [returns.index[0], returns.index[-1]] to align positions and factors; only overlapping
      periods contribute to attribution analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using date union instead of intersection would include periods without position data, causing NaN contributions
      to appear in attribution results and creating false performance attribution that cannot be reproduced with actual trade
      data
    derived_from_bd_id: BD-052
  - id: finance-C-169
    when: When implementing or modifying rolling window operations in the empyrical library
    action: Assume memory-safe sliding_window_view is used by default — the framework uses numpy.lib.stride_tricks.as_strided
      which creates views sharing memory with the source array; source array must remain in scope during window usage
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using safer numpy sliding_window_view without verifying source array lifetime could cause data corruption
      if the underlying implementation assumptions change, leading to silent incorrect results in rolling calculations
    derived_from_bd_id: BD-055
  - id: finance-C-170
    when: When implementing or using rolling window operations in backtesting
    action: Verify source array remains in scope throughout rolling window operations; validate that as_strided views are
      not used after the source array has been deallocated or modified in-place
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: If the source array goes out of scope while views still reference it, subsequent rolling window calculations
      will access freed memory, producing garbage values that corrupt backtest results silently
    derived_from_bd_id: BD-055
  - id: finance-C-171
    when: When computing beta as Cov(portfolio, benchmark)/Var(benchmark)
    action: Implement beta calculation as covariance divided by variance with single-centering optimization; verify numerical
      equivalence with the mathematical definition
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect beta calculation due to improper centering or variance computation would lead to wrong systematic
      risk estimates, causing improper position sizing that either takes excessive market risk or underallocates to alpha-generating
      strategies
    derived_from_bd_id: BD-060
  - id: finance-C-172
    when: When implementing signal generation and order execution in backtesting
    action: Assume the framework provides signal-execution timing synchronization — the framework does not implement timing
      control between signal generation and order execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without signal-execution timing handling, stale signals may be executed at outdated prices, causing systematic
      order-execution mismatch where orders execute at prices that no longer reflect the signal's intended entry point
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-173
    when: When implementing signal generation and order execution pipeline
    action: 'Implement explicit timing validation: record signal timestamp, verify order timestamp, reject or flag orders
      where execution_time - signal_time exceeds configured latency threshold (default 5 seconds for intraday strategies)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without timing validation, stale signals cause orders to execute at outdated prices, creating systematic
      discrepancies between backtest signals and live trading execution prices
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-174
    when: When implementing cost calculation in backtesting
    action: Assume the framework provides complete transaction cost modeling — the framework does not implement comprehensive
      cost model covering each cost components
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without complete cost modeling, strategies appear more profitable than they would be in live trading, as
      backtests omit hidden costs like exchange fees, clearing fees, or funding costs that accumulate significantly in high-frequency
      strategies
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-175
    when: When implementing cost calculation module
    action: 'Verify cost model completeness: verify commission (per share/contract), stamp duty (0.1% for A-share sells),
      slippage (at least 0.01% for liquid stocks), and platform fees are each modeled; use configurable multipliers for fee
      components'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incomplete cost models cause systematic underestimation of transaction costs, making backtest returns appear
      2-5% higher than live trading would produce for high-frequency strategies
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-176
    when: When implementing backtesting engine
    action: Assume the framework protects against backtest overfitting — the framework does not implement overfitting detection
      mechanisms
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without overfitting protection, strategies optimized on historical data appear profitable but fail in live
      trading, as curve-fitting creates false patterns that do not generalize to unseen market conditions
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-177
    when: When implementing and validating backtesting strategies
    action: 'Implement walk-forward analysis: split data into train (60-70%) and test (30-40%) periods, retrain parameters
      on each training window, validate on corresponding test window; require minimum 3 out-of-sample periods with positive
      returns before accepting strategy'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without walk-forward analysis, overfitted strategies appear profitable in backtests but systematically lose
      money in live trading when market regimes shift
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-178
    when: When implementing portfolio rebalancing logic
    action: Assume the framework provides rebalancing trigger mechanism — the framework does not implement automatic rebalancing
      triggers based on drift thresholds or time-based schedules
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without rebalancing triggers, portfolio drift accumulates over time as positions deviate from target allocations,
      causing unintended risk exposure and return differences from expected strategy behavior
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-179
    when: When implementing portfolio rebalancing module
    action: 'Implement explicit rebalancing triggers: configure drift_threshold (e.g., 5% deviation from target weight), time_based_interval
      (e.g., daily/weekly), or combined trigger; record rebalancing events with timestamps and drift measurements'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit rebalancing triggers, portfolio weights drift from targets causing unintended risk concentrations
      that can result in 10-20% return deviation in volatile markets
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-180
    when: When computing annual volatility from sample returns
    action: 'Verify alpha=2.0 is used for annual_volatility calculation; the formula should be: annual_volatility = sample_std
      * sqrt(252) for daily returns; confirm this matches standard statistical theory under Gaussian assumptions'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using alpha values other than 2.0 changes the volatility scaling formula, producing incorrect annualized
      volatility estimates that misrepresent true risk levels by 10-30% for heavy-tailed distributions
    derived_from_bd_id: BD-061
  - id: finance-C-181
    when: When computing Sortino ratio for risk-adjusted performance
    action: Verify Sortino ratio implementation uses downside deviation (clipping returns at threshold) as denominator, NOT
      full standard deviation; threshold should be 0 for simple cases or configurable target rate
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using full standard deviation for Sortino ratio misrepresents investor preferences by penalizing upside volatility
      equally, producing misleading risk-adjusted performance metrics that cannot be compared with Sharpe ratio
    derived_from_bd_id: BD-062
  - id: finance-C-182
    when: When computing Value at Risk for risk reporting
    action: Verify VaR uses historical percentile method with cutoff=0.05 (5th percentile) rather than parametric (normal
      distribution) assumptions; the implementation should sort historical returns and take the value at the 5th percentile
      position
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using parametric VaR under normal distribution assumption underestimates tail risk by 20-40% due to fat tails
      in actual return distributions, violating regulatory expectations for accurate risk measurement
    derived_from_bd_id: BD-063
  - id: finance-C-183
    when: When computing Expected Shortfall for tail risk analysis
    action: Verify CVaR is computed as mean of returns at or below the VaR percentile (not just at the threshold), capturing
      average loss magnitude when VaR is exceeded
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Computing CVaR incorrectly (e.g., using only the VaR threshold value) loses information about tail severity,
      understating extreme loss scenarios by 15-25% for volatile strategies
    derived_from_bd_id: BD-064
  - id: finance-C-184
    when: When implementing return adjustment logic with factor parameter
    action: Implement defensive copy before modification when factor=0 to prevent mutation of original returns array; or verify
      _adjust_returns always returns a copy regardless of factor value
    severity: high
    kind: domain_rule
    modality: must
    consequence: No-copy mutation when factor=0 causes silent data corruption where original returns array is modified, propagating
      incorrect values through nanmean/nanstd and corrupting all downstream metrics (Sharpe, Sortino, max_drawdown, beta)
      without raising errors
    derived_from_bd_id: BD-089
  - id: finance-C-185
    when: When implementing NaN-handling functions for return calculations
    action: Verify NaN-handling fallback paths produce identical results to bottleneck implementations; add assertions comparing
      outputs for sample data to catch silent divergence
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Silent divergence between bottleneck and numpy fallback paths causes inconsistent metrics across environments,
      where backtests run differently depending on installed dependencies
    derived_from_bd_id: BD-089
  - id: finance-C-186
    when: When implementing rolling window calculations with optional bottleneck dependency
    action: Document performance expectations for environments without bottleneck; implement async loading or graceful degradation
      warning so users understand 60-70% slowdown is expected behavior, not a bug
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without performance expectation documentation, users without bottleneck report slow backtests as bugs, causing
      unnecessary support burden and delay in identifying actual performance issues
    derived_from_bd_id: BD-094
  - id: finance-C-187
    when: When implementing standard deviation calculations for risk metrics
    action: Verify ddof=1 is consistently used in each standard deviation calculations for sample variance estimation, regardless
      of whether bottleneck or numpy path is used
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent ddof values between bottleneck and numpy paths cause silent accuracy divergence where risk metrics
      differ between environments, violating correctness guarantees for backtest reproducibility
    derived_from_bd_id: BD-094
  - id: finance-C-188
    when: When implementing or refactoring alpha calculation logic in backtesting
    action: Validate that input returns are simple returns (not log returns) before applying geometric alpha annualization
      formula (1 + alpha_mean)^n - 1; reject or convert log returns if detected
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Passing log returns to geometric alpha annualization produces meaningless results because log returns compress
      variance asymmetrically under geometric compounding; strategies appear to have 20-50% different alpha in backtest vs
      live trading
    derived_from_bd_id: BD-090
  - id: finance-C-189
    when: When configuring alpha calculation pipeline with cum_returns()
    action: Verify simple_returns() precedes any alpha calculation in the pipeline; geometric annualization (1 + alpha_mean)^n
      - 1 only applies to simple returns per BD-091 contract
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping simple_returns() before alpha calculation causes geometric annualization to operate on cumulative
      returns instead, producing inflated alpha values that do not match live trading performance
    derived_from_bd_id: BD-090
  - id: finance-C-190
    when: When implementing or refactoring stability measurement logic in performance analysis
    action: Use R-squared from OLS linear regression of cumulative log returns against time for stability measurement — do
      not substitute with rolling volatility, drawdown-based measures, or other alternative stability metrics without validating
      numerical equivalence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the stability metric alters how strategy consistency is quantified; switching to rolling volatility
      or drawdown measures produces fundamentally different stability scores, making historical performance comparisons unreliable
    derived_from_bd_id: BD-066
  - id: finance-C-191
    when: When estimating GPD parameters for tail risk or extreme value analysis
    action: Use scipy.optimize.minimize with Nelder-Mead method for GPD maximum likelihood estimation — do not substitute
      with gradient-based methods (Newton-Raphson, BFGS) or bounded optimization methods without analytical gradient derivation
      or necessity justification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using gradient-based methods without proper gradient derivation may cause convergence failures or incorrect
      parameter estimates for GPD, leading to unreliable VaR and CVaR calculations that underestimate tail risk exposure
    derived_from_bd_id: BD-075
  - id: finance-C-192
    when: When calculating Information Ratio (Excess Sharpe) for benchmark-relative performance evaluation
    action: Calculate Information Ratio as active return divided by tracking error (not standard deviation of returns) — tracking
      error explicitly captures benchmark-relative risk and reflects the deviation from benchmark that benchmark-relative
      strategies aim to minimize
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using standard deviation instead of tracking error misrepresents benchmark-relative risk; for strategies
      designed to track or deviate from a benchmark, tracking error captures the relevant risk dimension that pure volatility
      ignores
    derived_from_bd_id: BD-077
  - id: finance-C-193
    when: When loading Fama-French factor data for factor risk adjustment in backtesting
    action: Verify that F-F_Research_Data_Factors_daily and F-F_Momentum_Factor_daily provide sufficient coverage for the
      strategy's risk exposures — confirm that factors included (market, SMB, HML, MOM) match the strategy's factor exposures,
      as strategies requiring additional factors (e.g., profitability, quality) must implement custom data ingestion
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using incomplete Fama-French factor sets omits relevant risk factors, causing systematic overestimation of
      alpha; strategies with hidden exposures to undocumented factors (profitability, quality) will have their risk-adjusted
      returns misrepresented
    derived_from_bd_id: BD-038
  - id: finance-C-194
    when: When implementing or refactoring beta fragility detection logic in risk_metrics
    action: Use median-of-3 with sorted factor returns for outlier detection — do not simplify to mean-based or std-dev based
      approaches without understanding the tradeoff
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Replacing median-of-3 with std-dev based detection changes fragility threshold sensitivity; strategies with
      borderline beta fragility may incorrectly pass validation, leading to live trading exposure to regime changes
    derived_from_bd_id: BD-047
  - id: finance-C-195
    when: When annualizing alpha values for risk_metrics reporting
    action: Apply geometric compounding formula (1 + alpha_mean)^n - 1 for annualization — do not use arithmetic mean as it
      underestimates annualized return for volatile series
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using arithmetic mean for annualization systematically underestimates strategy growth rates for volatile
      returns, causing misrepresentation of strategy performance relative to benchmarks
    derived_from_bd_id: BD-056
  - id: finance-C-196
    when: When calling _aligned function variants in high-frequency trading scenarios
    action: Verify input arrays are pre-aligned (same length, matching indices) before calling _aligned variants — the framework
      does not perform alignment checks and will crash on misaligned inputs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing misaligned arrays to _aligned functions causes crashes or silent data corruption; the 5-10x performance
      gain comes at the cost of removed safety checks
    derived_from_bd_id: BD-058
  - id: finance-C-197
    when: When scaling returns and risk metrics to annual periods
    action: 'Use framework''s fixed annualization constants: 252 for daily (trading days), 52 for weekly, 12 for monthly,
      4 for quarterly — do not substitute with calendar days (365) or actual trading days without explicit configuration'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Mixing annualization conventions (252 vs 365) produces inconsistent annualized metrics across modules, making
      strategy comparison unreliable and backtest results non-reproducible
    derived_from_bd_id: BD-059
  - id: finance-C-198
    when: When implementing aggregate_returns functionality for hierarchical reporting
    action: Group returns by (year, period) tuples and apply cumulate_returns within each group — do not use simple summation
      as it produces different results than compound calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Simple summation of returns within aggregation windows produces incorrect compound growth figures, causing
      misreported performance at monthly/weekly/daily granularities
    derived_from_bd_id: BD-074
  - id: finance-C-199
    when: When implementing or calling non-aligned function variants in stats.py (alpha_beta, alpha, beta)
    action: Invoke _aligned_series() to normalize misaligned input data before delegating to aligned function versions — this
      ensures date alignment across return series before computing ratios
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without calling _aligned_series(), misaligned input data causes silent computational errors in downstream
      ratio calculations, leading to incorrect alpha/beta values and unreliable performance attribution that could drive wrong
      investment decisions
    derived_from_bd_id: BD-078
  - id: finance-C-200
    when: When implementing or using performance attribution calculations with date boundary periods
    action: Assume the framework handles alignment boundary conditions correctly — _aligned_series() truncates returns to
      the intersection with positions/factors, silently dropping boundary data that causes NaN or zero in attribution calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: At period boundaries, alignment truncation produces NaN values when multiplying exposures by factor_returns,
      corrupting the total attribution sum and making performance attribution reports unreliable for decision-making
    derived_from_bd_id: BD-088
  - id: finance-C-201
    when: When implementing performance attribution calculations (perf_attrib)
    action: 'Implement attribution completeness validation: after computing exposures × factor_returns, check that no NaN
      values exist in boundary periods; if found, either exclude boundary periods from attribution or explicitly mark them
      as partial-period with zero contribution'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silent boundary period data loss in attribution calculations produces incomplete or misleading performance
      reports, causing investors to receive inaccurate information about strategy factor exposure and returns
    derived_from_bd_id: BD-088
  - id: finance-C-202
    when: When implementing or modifying the perf_attrib() function for performance attribution analysis
    action: 'Follow the two-step compositional pattern exactly: first compute factor exposures using compute_exposures() at
      the designated location, then multiply by factor_returns using perf_attrib_by_factor() — do not reorder or combine these
      steps'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reordering the exposure computation and multiplication steps or computing them in a single pass produces
      incorrect attribution results, leading to false conclusions about strategy factor exposure and potentially poor investment
      decisions
    derived_from_bd_id: BD-084
  - id: finance-C-203
    when: When implementing or calling alpha_aligned() and beta_aligned() functions in stats.py
    action: Execute beta_aligned() first to obtain the beta result, then pass that result as the _beta parameter to alpha_aligned()
      — the shared computation pattern ensures both metrics use identical aligned data series
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling alpha_aligned() without passing the beta result or using independently aligned data creates alpha-beta
      mismatch, producing internally inconsistent risk-adjusted return metrics that cannot be reliably used for strategy evaluation
    derived_from_bd_id: BD-085
  - id: finance-C-204
    when: When using the framework for production trading, risk management, or financial reporting
    action: Assume PnL conservation is automatically validated by the framework — this validation capability is confirmed
      missing from the codebase and must be implemented externally or as an extension
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without PnL conservation checks, floating-point accumulation errors or missing PnL components can silently
      corrupt profit/loss reports in production, leading to incorrect financial statements and potential regulatory compliance
      issues
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-205
    when: When implementing PnL calculation, reconciliation, or reporting logic
    action: 'Implement PnL conservation validation: after computing component PnLs (by asset, strategy, or account), verify
      that sum(component_PnLs) equals total_PnL within tolerance (e.g., 1e-6 for float comparison), and flag or reject calculations
      that fail this conservation check'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit PnL conservation validation, rounding errors, missing components, or calculation bugs can
      corrupt profit/loss reports, causing production reliability failures and potentially misleading financial performance
      assessments
    derived_from_bd_id: BD-GAP-002
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
