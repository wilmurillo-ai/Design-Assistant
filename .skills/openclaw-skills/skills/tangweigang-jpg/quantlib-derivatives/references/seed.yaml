resources:
  packages:
  - name: pandas
    version_pin: ==1.5.3
  - name: numpy
    version_pin: ==1.24.4
  - name: matplotlib
    version_pin: '>=2'
  - name: requests
    version_pin: ==2.31.0
  - name: scipy
    version_pin: '>=1.3.0'
  - name: scikit-learn
    version_pin: '>1.4.2'
  - name: pytest
    version_pin: '>=8.3'
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When building SWIG bindings for QuantLib
    action: use QuantLib version 1.42 or higher
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: SWIG interface compilation will fail with a hard error at ql.i:34 if QuantLib version is below 1.42, preventing
      any binding generation for the target language
    stage_ids:
    - swig_interface_definition
  - id: finance-C-004
    when: When running QuantLib-SWIG in JVM or .NET environments
    action: enable QL_ENABLE_THREAD_SAFE_OBSERVER_PATTERN in QuantLib C++ compilation
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Async garbage collectors in JVM/.NET will cause spurious crashes or pure virtual function calls when the
      observer pattern is accessed during GC pauses
    stage_ids:
    - swig_interface_definition
  - id: finance-C-009
    when: When exposing Python-specific wrappers in SWIG
    action: 'guard Python-only code with #if defined(SWIGPYTHON) preprocessor directives'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Python-specific code like PyObserver will cause compilation failures when building Java, C#, R, or Scala
      bindings without proper language guards
    stage_ids:
    - swig_interface_definition
  - id: finance-C-016
    when: When building market data objects
    action: wrap each market quotes in QuoteHandle before passing to rate helpers
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Raw quote values bypass the observer notification mechanism, causing dependent instruments to never recalculate
      when market data updates
    stage_ids:
    - market_data_construction
  - id: finance-C-017
    when: When constructing yield term structures from market instruments
    action: use bootstrap helpers (DepositRateHelper, FraRateHelper, SwapRateHelper) to construct PiecewiseFlatForward curves
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Arbitrary interpolation of points produces a curve shape that does not reflect market-implied forward rates
      from traded instruments
    stage_ids:
    - market_data_construction
  - id: finance-C-018
    when: When setting up market data construction
    action: set ql.Settings.instance().evaluationDate before constructing term structures and instruments
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without an explicit evaluation date, the curve reference date becomes undefined, causing date calculations
      to fail or produce incorrect settlement dates
    stage_ids:
    - market_data_construction
  - id: finance-C-024
    when: When using QuantLib-SWIG for live trading
    action: claim that QuantLib provides real-time trading or live execution capabilities
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: QuantLib is a modeling and pricing library for quantitative analysis, not a trading platform. Presenting
      simulation results as live trading proof misleads stakeholders
    stage_ids:
    - market_data_construction
  - id: finance-C-025
    when: When presenting backtest results
    action: present backtested returns as guaranteed expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results reflect historical market conditions without slippage, fees, or market impact. Actual live
      trading returns typically fall below backtested performance
    stage_ids:
    - market_data_construction
  - id: finance-C-029
    when: When constructing VanillaOption
    action: pass both StrikedTypePayoff and Exercise objects to constructor
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: VanillaOption will be incompletely initialized and will fail at pricing time with null reference errors when
      NPV() is called
    stage_ids:
    - instrument_definition
  - id: finance-C-031
    when: When constructing Exercise
    action: use specified Exercise subclass matching option type (EuropeanExercise for European, AmericanExercise with date
      range for American, BermudanExercise with dates vector for Bermudan)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Type mismatch between exercise and option will cause compilation failure in C++ or runtime errors in SWIG
      bindings
    stage_ids:
    - instrument_definition
  - id: finance-C-032
    when: When defining VanillaSwap
    action: use Swap.Type enum (ql.Swap.Payer or ql.Swap.Receiver) not raw numeric sign convention
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using numeric +/- convention instead of enum will cause incorrect swap direction interpretation (payer vs
      receiver) leading to sign-reversed NPV calculations
    stage_ids:
    - instrument_definition
  - id: finance-C-035
    when: When attaching pricing engine
    action: call setPricingEngine() on instrument after construction and before calling NPV()
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: NPV() will throw null pointer exception or return uninitialized garbage value when called on instrument without
      attached pricing engine
    stage_ids:
    - instrument_definition
  - id: finance-C-044
    when: When implementing instrument pricing logic
    action: Call setPricingEngine() on the instrument before invoking NPV() method
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calling NPV() without a pricing engine will return undefined results or raise an error, as the Instrument
      class requires an attached PricingEngine to calculate fair values
    stage_ids:
    - pricing_engine_attachment
  - id: finance-C-045
    when: When constructing stochastic processes for pricing
    action: Pass Handle objects wrapping market data quotes and term structures to process constructors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Processes constructed without Handle objects cannot receive observable updates, breaking the lazy evaluation
      chain and preventing dynamic recalculation when market data changes
    stage_ids:
    - pricing_engine_attachment
  - id: finance-C-052
    when: When presenting NPV calculation results to stakeholders
    action: Present backtested NPV results as guaranteed future trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: QuantLib NPV calculations are theoretical model outputs based on assumed market conditions; actual trading
      results will differ due to execution slippage, transaction costs, liquidity constraints, and model limitations
    stage_ids:
    - pricing_engine_attachment
  - id: finance-C-054
    when: When configuring calibration helpers for model fitting
    action: Call setPricingEngine() on each calibration helper before invoking model.calibrate()
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Calibration helpers without attached pricing engines cannot calculate model values needed for optimization,
      causing calibration to fail or produce incorrect parameter estimates
    stage_ids:
    - pricing_engine_attachment
  - id: finance-C-068
    when: When passing YieldTermStructureHandle or BlackVolTermStructureHandle from market_data_construction to instrument_definition
    action: Verify Handle objects are non-empty (empty() returns false) before passing to instrument or process constructors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Empty Handle objects cause undefined behavior when accessed by pricing engines, leading to null pointer dereferences
      or garbage values in NPV calculations
    stage_ids:
    - market_data_construction
    - instrument_definition
  - id: finance-C-069
    when: When constructing GeneralizedBlackScholesProcess or similar stochastic processes
    action: Pass Handle<Quote> for spot price, Handle<YieldTermStructure> for risk-free and dividend yields, and Handle<BlackVolTermStructure>
      for volatility to match the expected constructor signatures
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Type mismatch in Handle parameters causes SWIG type conversion errors or runtime exceptions, preventing process
      initialization and blocking all downstream pricing
    stage_ids:
    - market_data_construction
    - pricing_engine_attachment
  - id: finance-C-071
    when: When attaching PricingEngine to Instrument via setPricingEngine()
    action: Call setPricingEngine() with a valid ext::shared_ptr<PricingEngine> before invoking NPV() on the instrument
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: NPV() called without a PricingEngine returns a default/uninitialized value, leading to incorrect valuation
      and potentially catastrophic financial decisions based on erroneous pricing
    stage_ids:
    - instrument_definition
    - pricing_engine_attachment
    - npv_calculation
  - id: finance-C-075
    when: When implementing NPV() on an Instrument after engine attachment
    action: Verify that each required Handles (underlying spot, term structures, volatility) have non-null currentLink() values
      before trusting NPV results
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: NPV calculation proceeds with null market data references, producing NaN or infinity values that corrupt
      downstream risk calculations and P&L reporting
    stage_ids:
    - pricing_engine_attachment
    - npv_calculation
  - id: finance-C-078
    when: When implementing any pricing calculation that requires a time reference
    action: Set ql.Settings.instance().evaluationDate before invoking NPV(), option value, or any time-dependent calculation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Pricing uses system date by default when evaluationDate is unset, causing incorrect valuations and time-dependent
      calculations to be computed for the wrong date
  - id: finance-C-079
    when: When calculating NPV or any pricing result on an instrument
    action: Call setPricingEngine() with an specified engine before invoking NPV() or any pricing method
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: NPV() returns uninitialized or incorrect values without a pricing engine, leading to misleading financial
      calculations and wrong capital allocation decisions
  - id: finance-C-080
    when: When performing time fraction calculations for financial instruments
    action: Specify and use a consistent DayCounter (e.g., Actual365Fixed, Actual360, Thirty360) — 1 year in Act/365 produces
      different values than 1 year in Act/360
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Wrong day counter causes incorrect rate calculations, leading to mispriced instruments and potential financial
      losses in trading and risk management
  - id: finance-C-089
    when: When implementing NPV calculation for any instrument (options, swaps, bonds)
    action: Call setPricingEngine() to bind the instrument to its pricing model and term structure BEFORE invoking NPV()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calling NPV() before setPricingEngine() produces undefined pricing results, as the instrument has no bound
      model or curve to calculate from. This causes silent incorrect valuations that cannot be detected without explicit error
      messages
    derived_from_bd_id: BD-099
  - id: finance-C-092
    when: When exposing term structures (yield curves, volatility surfaces) to pricing engines via SWIG bindings
    action: Wrap each term structures in Handle<T> or RelinkableHandle<T> templates - do not pass raw pointers to pricing
      engines
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Passing raw pointers bypasses the lazy evaluation and observable notification mechanism; pricing engines
      will not receive curve updates, causing stale valuations that diverge from market reality
    derived_from_bd_id: BD-003
  - id: finance-C-094
    when: When implementing term structure construction for pricing models
    action: Wrap every term structure (YieldTermStructure, VolatilityTermStructure) in a dedicated YieldTermStructureHandle
      or RelinkableHandle to enable lifecycle management and event notification to attached pricing engines
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without proper handle wrapping, pricing engines do not receive curve update notifications when term structures
      change, leading to stale pricing that ignores market data refreshes
    derived_from_bd_id: BD-062
  - id: finance-C-129
    when: When constructing hybrid yield curves from Deposit/FRA/Swap helpers using bootstrapping
    action: Verify each rate helpers are sorted by maturity before constructing the curve — concatenating helpers (depositHelpers
      + futuresHelpers + swapHelpers) in maturity order is mandatory; long-dates before short-dates causes silent bootstrap
      failure or non-monotonic curves
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Bootstrap with unordered helpers produces non-monotonic curves or silent failures that generate incorrect
      discount factors, leading to systematic mispricing across all instruments dependent on the curve
    derived_from_bd_id: BD-123
  - id: finance-C-140
    when: When setting settlement_days for bond instruments
    action: Use settlement_days=3 for bonds (T+3 settlement convention) — this affects cash flow date calculations, accrued
      interest computation, and yield basis
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Setting settlement_days=2 for bonds violates the T+3 industry convention, causing incorrect cash flow dates
      and miscalculated accrued interest that propagates into yield basis errors of 0.01-0.05%
    derived_from_bd_id: BD-113
  - id: finance-C-141
    when: When setting settlement_days for swap instruments
    action: Use settlement_days=2 for swaps (T+2 settlement convention) — this affects cash flow date calculations and pricing
      outcomes
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Setting settlement_days=3 for swaps violates the T+2 industry convention, causing incorrect cash flow dates
      and pricing discrepancies that may result in failed trade reconciliation
    derived_from_bd_id: BD-113
  - id: finance-C-161
    when: When calibrating stochastic local vol models for smile-consistent pricing
    action: Use LocalVolSurface combining local volatility dynamics with stochastic vol — pure local vol violates Lee moment
      condition and produces negative probabilities
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calibrating with pure local vol produces invalid probability distributions that systematically misprice deep
      out-of-the-money options by 10-20%, causing significant hedging errors
    derived_from_bd_id: BD-036
  - id: finance-C-163
    when: When pricing any financial instrument using HestonModel, HullWhiteModel, or SABRModel in backtesting
    action: Call calibrate(helpers, method, endCriteria) before any pricing operation — uncalibrated models produce theoretically
      inconsistent values that deviate significantly from market pricing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using uncalibrated models produces pricing values that diverge from observable market prices by potentially
      5-15%, causing systematic misvaluation of derivatives positions and incorrect hedge ratios
    derived_from_bd_id: BD-110
  - id: finance-C-164
    when: When calculating NPV for any swap instrument in backtesting
    action: Attach DiscountingSwapEngine with the correct discount curve term structure before calling NPV() — the engine
      must use the matching currency's discount curve for accurate present value calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Omitting DiscountingSwapEngine or using incorrect term structure produces NPV values that may differ by 1-5%
      from market quotes, leading to incorrect strategy performance attribution and wrong sizing decisions
    derived_from_bd_id: BD-111
  - id: finance-C-181
    when: When pricing caps and floors using the framework
    action: Use Black model under lognormal forward rate assumption without checking rate environment — for low rate environments
      (near zero or negative rates), switch to Normal (Bachelier) model
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Black model under lognormal assumption produces unreliable cap prices when forward rates approach zero, systematically
      mispricing caps in low-rate environments and causing significant P&L variance in live trading
    derived_from_bd_id: BD-076
  regular:
  - id: finance-C-002
    when: When using PyObserver in Python for market data callbacks
    action: expose asObservable() method on Python objects passed to registerWith()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Python objects without asObservable() method will fail the typemap check at observer.i:45, causing registration
      to fail silently or raise TypeError
    stage_ids:
    - swig_interface_definition
  - id: finance-C-003
    when: When creating Handle<T> or RelinkableHandle<T> for term structures
    action: register the Handle as observer if automatic notification is required
    severity: high
    kind: domain_rule
    modality: must
    consequence: Handles created with registerAsObserver=false will not trigger recalculation when underlying values change,
      causing stale pricing results
    stage_ids:
    - swig_interface_definition
  - id: finance-C-005
    when: When selecting random number generation for Monte Carlo pricing engines
    action: choose from the available RNG types based on requirements (pseudo-random vs quasi-random)
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using pseudo-random sequences (MersenneTwister, Lecuyer) instead of low-discrepancy sequences (Sobol, Halton)
      will result in slower convergence for Monte Carlo option pricing
    stage_ids:
    - swig_interface_definition
  - id: finance-C-006
    when: When building Python extension modules from SWIG interfaces
    action: compile with -Werror flag to treat each warnings as errors
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Warnings during SWIG compilation may indicate type mapping issues or incorrect interface definitions that
      will cause runtime failures in Python
    stage_ids:
    - swig_interface_definition
  - id: finance-C-007
    when: When implementing Python callbacks for market data notifications
    action: verify callback function can be called with no arguments and handles exceptions properly
    severity: high
    kind: operational_lesson
    modality: must
    consequence: PyObserver::update() at observer.i:64-66 calls PyObject_CallObject with no arguments; exceptions in callbacks
      will cause runtime crashes
    stage_ids:
    - swig_interface_definition
  - id: finance-C-008
    when: When defining SWIG interface files for financial modules
    action: follow the one-.i-file-per-module structure with proper include dependencies
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect module ordering or missing dependencies will cause undefined type errors during SWIG processing,
      preventing extension compilation
    stage_ids:
    - swig_interface_definition
  - id: finance-C-010
    when: When exposing Handle<T> and RelinkableHandle<T> templates for term structures
    action: instantiate specific Handle types for YieldTermStructure in termstructures.i
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without explicit template instantiations like YieldTermStructureHandle, Python/R/other languages cannot use
      term structure handles for lazy evaluation and observer pattern
    stage_ids:
    - swig_interface_definition
  - id: finance-C-011
    when: When documenting QuantLib-SWIG capabilities
    action: claim the Python/C#/Java/Scala/R bindings provide native implementations
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: QuantLib-SWIG provides language bindings (SWIG wrappers) to C++ QuantLib core; claiming native implementations
      would mislead users about performance characteristics and API completeness
    stage_ids:
    - swig_interface_definition
  - id: finance-C-012
    when: When presenting results from QuantLib-SWIG pricing calculations
    action: present simulated or backtested results as guaranteed future performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Monte Carlo pricing and other quantitative calculations are simulations; presenting them as predictive guarantees
      violates financial modeling best practices and regulatory requirements
    stage_ids:
    - swig_interface_definition
  - id: finance-C-019
    when: When creating forecast yield term structures
    action: use RelinkableYieldTermStructureHandle instead of YieldTermStructureHandle for curves that may change
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using a non-relinkable handle prevents swapping the forecast curve without recreating all dependent instruments
    stage_ids:
    - market_data_construction
  - id: finance-C-020
    when: When updating market quote values
    action: call setValue() on SimpleQuote objects wrapped in QuoteHandle to trigger observer notifications
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Modifying the underlying quote without using setValue() bypasses the observable mechanism, preventing dependent
      recalculations
    stage_ids:
    - market_data_construction
  - id: finance-C-021
    when: When constructing volatility surfaces
    action: wrap volatility quotes in makeQuoteHandle or QuoteHandle before passing to BlackVolTermStructureHandle
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hard-coded volatility values cannot update reactively, breaking the observer pattern for live market data
      scenarios
    stage_ids:
    - market_data_construction
  - id: finance-C-022
    when: When passing term structures to pricing engines
    action: pass YieldTermStructureHandle, not the underlying YieldTermStructure object, to pricing engines
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Passing the bare term structure bypasses the Handle interface, preventing automatic recalculation when the
      curve changes
    stage_ids:
    - market_data_construction
  - id: finance-C-023
    when: When constructing rate helpers for bootstrap
    action: use consistent day count conventions between rate helpers and the term structure being bootstrapped
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched day count conventions cause incorrect time calculations, producing incorrect zero rates and forward
      rates
    stage_ids:
    - market_data_construction
  - id: finance-C-026
    when: When initializing Ibor indices for market data construction
    action: pass the forecast curve handle to the Ibor index constructor, not a discount curve
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using a discount curve as the forecast curve produces incorrect floating leg cash flows because the index
      uses its own forecast curve for rate calculations
    stage_ids:
    - market_data_construction
  - id: finance-C-027
    when: When bootstrapping yield curves
    action: verify helper instruments cover the required maturity range without gaps for the pricing use case
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Bootstrap fails or extrapolates unsafely when maturity dates fall outside the helper range, causing pricing
      errors for out-of-range instruments
    stage_ids:
    - market_data_construction
  - id: finance-C-028
    when: When constructing PiecewiseFlatForward curves
    action: verify the settlement date is a valid business day adjusted by the calendar
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a non-business day as settlement causes bootstrap failures or incorrect pillar date calculations for
      rate helpers
    stage_ids:
    - market_data_construction
  - id: finance-C-030
    when: When creating PlainVanillaPayoff
    action: pass Option.Type enum (Call or Put) and positive Real strike value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid payoff parameters will cause incorrect pricing calculations or runtime exceptions when the payoff
      is evaluated at exercise
    stage_ids:
    - instrument_definition
  - id: finance-C-033
    when: When creating Schedule for bond or swap
    action: pass valid BusinessDayConvention enum (Following, ModifiedFollowing, Preceding, Unadjusted, etc.) for payment
      date adjustment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cash flows will fall on non-business days, causing incorrect payment timing and potential valuation errors
      in fixed-income instruments
    stage_ids:
    - instrument_definition
  - id: finance-C-034
    when: When constructing FixedRateBond
    action: pass matching coupon rate vector length to schedule size minus one (one coupon per period)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Coupon vector size mismatch will cause runtime exception during cash flow generation or incorrect coupon
      payment calculations
    stage_ids:
    - instrument_definition
  - id: finance-C-036
    when: When defining instrument objects
    action: embed pricing engine inside instrument object or attempt to hold engine reference beyond setPricingEngine call
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Violates separation of concerns principle; instrument should be reusable with different engines for different
      pricing methods (SWIG/instruments.i:54 design note)
    stage_ids:
    - instrument_definition
  - id: finance-C-037
    when: When inspecting cash flows before pricing
    action: call cashflows() method on Bond or leg methods on Swap to verify cash flow dates and amounts before attaching
      pricing engine
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrectly configured schedules or day counters will produce wrong cash flow dates; late discovery during
      pricing leads to costly refactoring
    stage_ids:
    - instrument_definition
  - id: finance-C-038
    when: When setting up valuation date
    action: initialize ql.Settings.instance().evaluationDate before instrument construction and pricing
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Default evaluation date may be in the past or null, causing cash flow date calculations and discount factor
      computations to fail or use incorrect timing
    stage_ids:
    - instrument_definition
  - id: finance-C-039
    when: When constructing AmericanExercise
    action: verify earliestDate parameter is not after latestDate parameter
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid date range will cause exercise time window to be empty or negative, breaking American option pricing
      models
    stage_ids:
    - instrument_definition
  - id: finance-C-040
    when: When constructing BermudanExercise
    action: pass a non-empty vector of Date objects representing valid exercise dates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty dates vector will cause indexing errors or return zero exercise opportunities
    stage_ids:
    - instrument_definition
  - id: finance-C-041
    when: When defining instrument for QuantLib-SWIG
    action: expect live market data feed or real-time trading execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: QuantLib-SWIG is a pure pricing library for quantitative analysis; it cannot connect to exchanges, execute
      trades, or receive real-time market data
    stage_ids:
    - instrument_definition
  - id: finance-C-042
    when: When presenting instrument pricing results
    action: present NPV calculations as guaranteed live trading returns or actual portfolio performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Theoretical pricing models do not account for execution slippage, market impact, counterparty risk, or transaction
      costs; backtested values will differ from realized performance
    stage_ids:
    - instrument_definition
  - id: finance-C-043
    when: When using QuantLib-SWIG bindings
    action: understand that SWIG bindings add an indirection layer and may have different exception behavior than C++
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Unhandled exceptions in C++ QuantLib code may not propagate correctly through SWIG, leading to silent failures
      or cryptic error messages
    stage_ids:
    - instrument_definition
  - id: finance-C-046
    when: When performing model-based calibration
    action: Specify EndCriteria with maximum iterations and convergence tolerances for calibration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calibration without EndCriteria may run indefinitely or terminate prematurely, producing unreliable model
      parameters that degrade pricing accuracy
    stage_ids:
    - pricing_engine_attachment
  - id: finance-C-047
    when: When configuring Monte Carlo pricing engines
    action: Provide a seed parameter to verify reproducibility of random number sequences
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Monte Carlo engines without a seed will generate different random paths on each execution, producing non-reproducible
      NPV results that hinder debugging and validation
    stage_ids:
    - pricing_engine_attachment
  - id: finance-C-048
    when: When selecting binomial tree pricing methods
    action: Specify tree type as string parameter (JR, CRR, EQP, Trigeorgis, Tian, LR, Joshi4) for BinomialVanillaEngine
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Different tree constructions converge to the analytical solution at different rates; omitting the tree type
      specification may cause unexpected numerical behavior or performance issues
    stage_ids:
    - pricing_engine_attachment
  - id: finance-C-049
    when: When pricing multiple instruments with the same underlying model
    action: Reuse the same process object across multiple instruments to maintain consistency and improve performance
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Creating separate process objects for each instrument increases memory usage and may produce inconsistent
      results if underlying market data handles are not synchronized
    stage_ids:
    - pricing_engine_attachment
  - id: finance-C-050
    when: When changing volatility models for an instrument
    action: Create a new process object with updated volatility parameters rather than reusing the existing process
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reusing a process with a different volatility model will produce incorrect NPV calculations since the process
      caches volatility information at construction time
    stage_ids:
    - pricing_engine_attachment
  - id: finance-C-051
    when: When using HestonModel for semi-analytical pricing
    action: Construct HestonModel from HestonProcess before passing to AnalyticHestonEngine or COSHestonEngine
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Heston model-based engines require the calibrated HestonModel object, not the raw HestonProcess; using the
      process directly will bypass calibration and produce uncalibrated results
    stage_ids:
    - pricing_engine_attachment
  - id: finance-C-053
    when: When using RelinkableHandle objects for dynamic market data
    action: Link the RelinkableHandle to a valid term structure or quote before using in process construction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty or unlinked RelinkableHandle objects will cause null pointer exceptions or undefined behavior when
      the process attempts to access underlying market data during pricing
    stage_ids:
    - pricing_engine_attachment
  - id: finance-C-055
    when: When evaluating the instrument for expired contracts
    action: Check isExpired() before calling NPV() on instruments near or past maturity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling NPV() on expired instruments may return zero or undefined values, leading to incorrect portfolio
      valuations and reporting errors
    stage_ids:
    - pricing_engine_attachment
  - id: finance-C-056
    when: When implementing NPV retrieval for an Instrument
    action: Call NPV() only after a PricingEngine has been attached via setPricingEngine()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: NPV() returns undefined or zero values when no pricing engine is attached, causing silent calculation failures
      that propagate to downstream risk calculations
    stage_ids:
    - npv_calculation
  - id: finance-C-057
    when: When calculating NPV for Monte Carlo priced instruments
    action: Retrieve and validate errorEstimate() alongside NPV() to verify convergence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Monte Carlo simulations may not have converged if errorEstimate is not checked; using unconverged NPV for
      trading decisions leads to incorrect hedge ratios and PnL losses
    stage_ids:
    - npv_calculation
  - id: finance-C-058
    when: When computing fair rate or fair spread for a Swap
    action: Verify that applying the fair rate/spread produces NPV within 1.0e-8 of zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fair rate/spread calculation using numerical differentiation is approximate; a tolerance check ensures market-consistent
      pricing within numerical precision bounds
    stage_ids:
    - npv_calculation
  - id: finance-C-059
    when: When retrieving NPV from an instrument inheriting LazyObject
    action: Trigger NPV calculation by explicitly calling NPV() to initiate lazy evaluation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Instrument NPV is lazily evaluated; accessing NPV without calling NPV() returns stale cached values or zero,
      causing stale pricing data to propagate through the system
    stage_ids:
    - npv_calculation
  - id: finance-C-060
    when: When pricing instruments that may be expired
    action: Check isExpired() before retrieving NPV to avoid errors on matured instruments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Retrieving NPV on an expired instrument causes runtime errors or returns misleading zero values, breaking
      risk reporting pipelines
    stage_ids:
    - npv_calculation
  - id: finance-C-061
    when: When evaluating Greeks on option instruments
    action: Access Greeks (delta, gamma, vega, theta, rho) before a compatible pricing engine is attached
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Greeks methods return undefined values when called without a pricing engine, leading to incorrect hedge ratios
      and potential over/under-hedging
    stage_ids:
    - npv_calculation
  - id: finance-C-062
    when: When configuring Monte Carlo engine with requiredTolerance
    action: Set requiredTolerance parameter to control MC convergence, and check errorEstimate against it
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without requiredTolerance, MC engine may run indefinitely or with excessive paths; accepting results without
      errorEstimate validation produces unreliable NPV values
    stage_ids:
    - npv_calculation
  - id: finance-C-063
    when: When setting Monte Carlo engine seed parameter
    action: Provide explicit seed value for reproducible NPV calculations
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Default seed of 0 may cause non-reproducible MC results across runs, breaking audit trails and debugging
      workflows
    stage_ids:
    - npv_calculation
  - id: finance-C-064
    when: When freezing and unfreezing lazy instruments
    action: Call recalculate() after unfreeze() to verify NPV reflects current market data
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Frozen instruments cache stale NPV values; failing to recalculate after unfreeze produces pricing mismatches
      between frozen and live states
    stage_ids:
    - npv_calculation
  - id: finance-C-065
    when: When presenting NPV calculation results
    action: Present Monte Carlo NPV results as exact values without reporting the confidence interval
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Monte Carlo NPV has inherent stochastic variance; presenting point estimates without errorEstimate misleads
      users into treating probabilistic results as deterministic
    stage_ids:
    - npv_calculation
  - id: finance-C-066
    when: When validating NPV output for analytical (non-MC) pricing engines
    action: Expect NPV values to be deterministic and reproducible across invocations with same inputs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-MC engines (AnalyticEuropeanEngine, BinomialVanillaEngine) produce deterministic results; non-reproducibility
      indicates numerical instability or caching issues
    stage_ids:
    - npv_calculation
  - id: finance-C-067
    when: When configuring MC European engine parameters
    action: Set both requiredSamples and requiredTolerance simultaneously, which creates conflicting convergence criteria
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Specifying both requiredSamples and requiredTolerance creates ambiguity in convergence logic; the engine
      may stop at whichever criterion is met first, leading to unpredictable accuracy
    stage_ids:
    - npv_calculation
  - id: finance-C-070
    when: When constructing StochasticProcess with Handle objects for market data dependencies
    action: Verify Handle constructor's registerAsObserver parameter defaults to true, allowing automatic notification when
      underlying market data changes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without observer registration, StochasticProcess does not receive updates when term structures or volatility
      surfaces change, causing stale pricing calculations
    stage_ids:
    - market_data_construction
    - pricing_engine_attachment
  - id: finance-C-072
    when: When passing configured Instrument to pricing_engine_attachment stage
    action: Verify the Instrument's exercise date has not expired using isExpired() before engine attachment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attaching pricing engine to an expired instrument and calculating NPV produces meaningless results, causing
      incorrect P&L reporting and regulatory compliance issues
    stage_ids:
    - instrument_definition
    - pricing_engine_attachment
  - id: finance-C-073
    when: When Instrument.calculate() triggers NPV calculation via engine.calculate()
    action: Verify the day counter consistency between the instrument's exercise/reference dates and the term structures used
      by the attached PricingEngine
    severity: high
    kind: domain_rule
    modality: must
    consequence: Day counter mismatch causes incorrect time calculations, leading to wrong discount factors and materially
      incorrect NPV values affecting trading decisions and risk reports
    stage_ids:
    - pricing_engine_attachment
    - npv_calculation
  - id: finance-C-074
    when: When transferring Handle objects across the market_data_construction to instrument_definition boundary
    action: Use RelinkableHandle<T> instead of Handle<T> when the term structure needs to be updated after instrument construction
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using non-relinkable Handle requires instrument reconstruction when market data updates, causing recalculation
      delays and potential inconsistency in portfolio valuations
    stage_ids:
    - market_data_construction
    - instrument_definition
  - id: finance-C-076
    when: When QuantLib SWIG bindings are used from Python (or other target languages)
    action: Keep Python objects (term structures, quotes) alive (referenced) for the lifetime of the Instrument, as SWIG Python
      bindings use shared_ptr with Python object ownership semantics
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Python garbage collection frees underlying quotes or term structures while Handle still references them,
      causing segmentation faults or corrupted NPV calculations
    stage_ids:
    - market_data_construction
    - instrument_definition
    - pricing_engine_attachment
  - id: finance-C-077
    when: When Instrument with LazyObject behavior completes NPV calculation
    action: Check the errorEstimate() return value from Instrument to validate NPV calculation convergence
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: NPV calculations from Monte Carlo or numerical engines may not converge; without errorEstimate validation,
      incorrect pricing propagates to risk systems and trading decisions
    stage_ids:
    - pricing_engine_attachment
    - npv_calculation
  - id: finance-C-081
    when: When determining business days, payment dates, or scheduling cash flows
    action: Use an explicit Calendar (e.g., TARGET, UnitedStates, Euribor3M) to roll dates forward/backward to valid business
      days
    severity: high
    kind: domain_rule
    modality: must
    consequence: Payment dates scheduled on holidays or weekends cause settlement failures, failed trades, and incorrect cash
      flow timing in production systems
  - id: finance-C-082
    when: When creating market data objects that may change over time
    action: Wrap each market data (quotes, term structures, volatility) in Handle types (QuoteHandle, YieldTermStructureHandle,
      BlackVolTermStructureHandle) for observer pattern to work
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without Handle wrappers, instruments do not automatically recalculate when underlying market data changes,
      causing stale pricing and incorrect hedging
  - id: finance-C-083
    when: When adding historical interest rate or index fixings to an index
    action: Add fixings in chronological order from earliest to latest date — adding future fixings before past ones fails
      with RuntimeError
    severity: high
    kind: domain_rule
    modality: must
    consequence: RuntimeError raised when attempting to add fixings out of chronological order; missing historical fixings
      cause incorrect floating rate calculations
  - id: finance-C-084
    when: When calculating settlement or pricing for different asset classes
    action: Use correct settlement days for asset class — bonds typically require 3 settlement days, swaps typically require
      2 settlement days
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Wrong settlement day count causes pricing discrepancies across asset classes and incorrect cash flow timing
      in multi-asset portfolios
  - id: finance-C-085
    when: When presenting or reporting this system's calculated financial results to users or stakeholders
    action: Claim that calculated prices or NPV values represent actual executable market prices or that results can be achieved
      in live trading without slippage, fees, or execution risk
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make capital allocation decisions based on idealized theoretical prices, leading to significant performance
      gap between model assumptions and actual trading outcomes including transaction costs, market impact, and execution
      latency
  - id: finance-C-086
    when: When considering this system for production trading infrastructure
    action: Claim or imply this system supports real-time trading with sub-millisecond latency requirements — QuantLib-SWIG
      is a pricing and calculation engine, not a trading system
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Systems requiring real-time execution, market data feeds, order routing, or sub-millisecond latency will
      fail catastrophically; wrong infrastructure choices lead to missed trades and financial losses
  - id: finance-C-087
    when: When using this system to build or support regulatory filings, compliance reports, or audit documentation
    action: Present QuantLib model outputs as guaranteed, regulatory-compliant valuations without independent verification
      and documentation of model assumptions, limitations, and validation evidence
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Regulatory non-compliance when model outputs don't meet SR 11-7 validation requirements; potential regulatory
      penalties and forced remediation
  - id: finance-C-088
    when: When integrating this library into financial applications
    action: Claim that SWIG bindings provide identical behavior to C++ QuantLib in each edge cases — language bindings may
      have behavioral differences in exception handling, memory management, and threading
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Integration failures due to subtle behavioral differences between C++ and SWIG bindings in complex scenarios;
      memory leaks or crashes in long-running applications
  - id: finance-C-090
    when: When using fair value pricing for instruments in backtesting or live trading
    action: Verify that fair value calculations correctly adjust the instrument to NPV=0, and check that the convergence tolerance
      setting matches the precision requirements of your strategy
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Fair value search with improper convergence tolerance produces small residual NPV, accumulating pricing errors
      over thousands of trades and causing strategy returns to diverge from expected values
    derived_from_bd_id: BD-015
  - id: finance-C-091
    when: When configuring pricing engines for option strategies using binomial or trinomial trees
    action: Explicitly specify the engine string parameter (JR, CRR, EQP, Tian) matching your option type and verify the selected
      tree converges correctly for your strike and expiry ranges
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Different tree constructions (JR, CRR, EQP, Tian) have materially different convergence properties; using
      incorrect tree type causes systematic pricing errors of 1-5% for barrier options and deeply in-the-money contracts
    derived_from_bd_id: BD-012
  - id: finance-C-093
    when: When configuring Monte Carlo pricing engines for exotic options
    action: Provide a positive integer seed parameter to the Monte Carlo engine constructor; validate that seed > 0 before
      instantiation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero or negative seed values cause exception during random path generation; strategies relying on Monte Carlo
      pricing fail to produce results, breaking backtesting reproducibility
    derived_from_bd_id: BD-013
  - id: finance-C-095
    when: When attaching a stochastic process to a pricing engine in quantitative finance code
    action: Verify process and engine compatibility before attachment; mismatched pairs (e.g., lognormal process with non-lognormal
      engine) will throw exception at runtime
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Attaching an incompatible process to a pricing engine causes runtime exceptions during pricing calculations,
      resulting in backtest failures and strategy abandonment
    derived_from_bd_id: BD-011
  - id: finance-C-096
    when: When configuring time discretization for finite difference or binomial pricing methods
    action: Use 801 time steps (odd number) for centered Crank-Nicolson discretization to verify temporal resolution for early
      exercise detection; using 201 steps will cause visible oscillations in theta near expiry
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using even-numbered or insufficient time steps causes numerical oscillations in theta calculations near option
      expiry, leading to incorrect Greek sensitivities and poor hedging decisions
    derived_from_bd_id: BD-019
  - id: finance-C-097
    when: When configuring spatial discretization for finite difference pricing methods
    action: Use 800 grid points to verify delta accuracy within 0.001 tolerance across the entire spot range; using 400 grid
      points introduces interpolation errors exceeding tolerance for deep in-the-money options
    severity: high
    kind: domain_rule
    modality: must
    consequence: Insufficient spatial grid points cause delta interpolation errors exceeding tolerance for deep ITM options,
      resulting in incorrect hedging ratios and potential over/under-hedging losses
    derived_from_bd_id: BD-020
  - id: finance-C-098
    when: When defining vanilla interest rate swaps for market usage or curve construction
    action: Use annual fixed leg frequency with quarterly floating leg frequency as the standard vanilla swap structure in
      major markets; this combination provides the most liquid instrument for curve construction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-standard swap leg frequencies reduces liquidity and creates basis risk when hedging against the
      standard market instrument, causing suboptimal execution costs
    derived_from_bd_id: BD-027
  - id: finance-C-099
    when: When constructing quote handles for market data in batch operations
    action: Use makeQuoteHandle() factory to encapsulate SimpleQuote wrapping in a single call, reducing the chance of forgetting
      QuoteHandle wrapping and improving code maintainability
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Manual SimpleQuote plus QuoteHandle construction risks forgetting the QuoteHandle wrapping step, causing
      instruments to not receive price updates through the observable mechanism
    derived_from_bd_id: BD-114
  - id: finance-C-100
    when: When passing quotes to term structures for market data construction
    action: Wrap each quotes in QuoteHandle to enable observer notification for market data updates; passing raw doubles bypasses
      the observable mechanism and instruments will not receive price updates automatically
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing raw doubles to term structures bypasses the observable notification system, causing stale pricing
      data and incorrect NPV calculations after market moves
    derived_from_bd_id: BD-005
  - id: finance-C-101
    when: When using market data in historical backtesting simulations
    action: Assume each historical market data is available at simulated dates without checking release_date/publish_date
      metadata; the framework does not implement point-in-time data availability checks
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using data that wasn't available at the simulated historical date creates look-ahead bias in backtesting,
      invalidating performance attribution and producing unrealistic strategy returns
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-102
    when: When processing market data inputs in backtesting simulations
    action: Add release_date/publish_date metadata to each market data input and validate data availability before simulation
      date; exclude data with release_date greater than the current simulation date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without point-in-time data availability checks, backtest results are invalidated by look-ahead bias as the
      simulation uses data that wasn't publicly available at that historical point
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-103
    when: When calling impliedVolatility() root-finding function for options pricing
    action: Pre-compute NPV before calling impliedVolatility(); lazy evaluation causes timing mismatch because NPV may not
      be computed at the expected time when root-finding loop initiates, leading to convergence failures
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling impliedVolatility() without pre-computing NPV causes timing mismatch with lazy evaluation, potentially
      triggering unexpected side effects and root-finding non-convergence
    derived_from_bd_id: BD-125
  - id: finance-C-104
    when: When placing orders in backtesting or live trading without explicit discretization
    action: Assume order quantities and prices are automatically discretized to valid tick/lot sizes by the framework; the
      framework does not implement tick/lot size precision enforcement
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Placing orders without tick/lot size enforcement causes rejection by exchanges for non-compliant prices/quantities,
      resulting in failed fills and strategy execution gaps
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-105
    when: When validating order prices and quantities before submission
    action: Enforce tick_size and lot_size discretization on each order prices and quantities; round prices to nearest valid
      tick and round quantities to nearest valid lot
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit tick/lot size enforcement, orders are submitted at prices or quantities not tradable in
      the market, causing rejection and failed strategy execution
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-106
    when: When placing orders without validating minimum quantity and price discretization
    action: Assume order quantities and prices conform to market discretization rules without explicit validation; the framework
      does not implement tick_size/lot_size/min_qty enforcement
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Submitting orders without min_qty/tick_size/lot_size validation causes exchange rejections for quantities
      below minimum lot size or prices not on valid tick increments
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-107
    when: When validating orders before submission to exchanges
    action: 'Enforce tick_size/lot_size/min_qty constraints: round prices to nearest valid tick increment, round quantities
      to nearest lot size, and reject orders where quantity is below the minimum required lot'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without tick_size/lot_size/min_qty enforcement, orders are rejected by exchanges for non-compliant discretization,
      causing failed fills and strategy execution failures
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-108
    when: When implementing vol cube smile interpolation for CMS options
    action: Use strike spreads [-0.02, -0.005, 0.0, 0.005, 0.02] for vol cube construction — these five strikes at the specified
      spacing define the smile interpolation grid boundaries covering the most liquid CMS strike range
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different strike spacing would shift vol surface interpolation, causing systematic mispricing of CMS
      products that rely on this specific smile structure and potentially leading to hedge ineffectiveness
    derived_from_bd_id: BD-043
  - id: finance-C-109
    when: When configuring Monte Carlo simulation for American basket option pricing
    action: Use timeSteps=10 for American basket Monte Carlo simulation — this discretization level balances convergence accuracy
      against simulation runtime for early exercise instruments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using more time steps unnecessarily increases runtime by 5x without proportional accuracy gain; using fewer
      steps degrades discretization accuracy for early exercise convergence, causing materially wrong option prices
    derived_from_bd_id: BD-044
  - id: finance-C-110
    when: When implementing Longstaff-Schwartz regression for American basket option pricing
    action: Use polynomOrder=5 with Hermite basis functions for LSM continuation value approximation — Order-5 provides sufficient
      regression flexibility while avoiding overfitting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Order 3 would underfit the continuation function causing premature exercise decisions; Order 10 would overfit
      introducing simulation noise, both leading to materially wrong American option prices
    derived_from_bd_id: BD-045
  - id: finance-C-111
    when: When implementing dynamic term structure handling for scenario analysis workflows
    action: Use RelinkableYieldTermStructureHandle for yield curve objects — this enables dynamic rebinding without recreating
      dependent objects, maintaining consistent object references across scenario updates
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using standard YieldTermStructureHandle would require full object recreation for curve updates, breaking
      scenario analysis workflows that rely on persistent object references and causing memory leaks from orphaned objects
    derived_from_bd_id: BD-047
  - id: finance-C-112
    when: When calibrating Hull-White model for callable bond pricing
    action: Verify Hull-White parameters a=0.06 (mean reversion speed) and sigma=0.20 (volatility) match current market conditions
      — these boundaries calibrate the model to realistic rate dynamics for developed market rates
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using different Hull-White parameters without recalibration would shift callable bond valuations by 1-3 points,
      causing significant P&L impact and hedge ineffectiveness if the model diverges from current market conditions
    derived_from_bd_id: BD-049
  - id: finance-C-113
    when: When generating payment schedules for vanilla swap instruments
    action: Use DateGeneration.Forward for standard schedule generation — this creates payment schedules from start date forward
      matching ISDA definitions and counterparty expectations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using DateGeneration.Backward would create different maturity structures for irregular tenors, causing cash
      flow mismatches with counterparty confirmations and settlement failures
    derived_from_bd_id: BD-053
  - id: finance-C-114
    when: When implementing term structure bootstrapping and consistency checks
    action: Use tolerance 1e-10 for term structure consistency checks — this numerical precision is the minimum acceptable
      threshold for catching extrapolation errors and curve construction bugs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using looser tolerance 1e-6 would allow interpolation errors to pass undetected during bootstrapping, causing
      NPV calculation errors that silently propagate to all dependent trade valuations
    derived_from_bd_id: BD-055
  - id: finance-C-115
    when: When pricing interest rate caps and floors
    action: Use Black-Scholes (Black model) with constant volatility for cap/floor pricing — this matches quoted market vol
      surfaces and is the standard market convention for interest rate caps
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using stochastic vol models would produce prices that don't align with quoted market volatilities, making
      hedges ineffective and creating basis risk between model and market prices
    derived_from_bd_id: BD-058
  - id: finance-C-116
    when: When defining swing option instrument structure for retail energy contracts
    action: Verify swing option exercise dates match the intended contract structure — 31 consecutive days reflects typical
      retail energy contracts with daily flexibility within a month
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Changing exercise frequency to weekly would reduce optionality value by 30%, systematically underestimating
      the true value of swing contracts and causing adverse pricing in contract negotiations
    derived_from_bd_id: BD-059
  - id: finance-C-117
    when: When implementing tree-based swaption pricing calibration
    action: Use at least 50 time steps per year in the discretization grid to verify convergence within 0.1 basis point accuracy
      on early exercise values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fewer than 50 time steps per year causes insufficient convergence on early exercise values, leading
      to pricing errors that exceed 0.1 basis point tolerance and resulting in inaccurate risk management for Bermudan swaptions
    derived_from_bd_id: BD-073
  - id: finance-C-118
    when: When pricing European options requiring smile-consistent valuation
    action: Use Heston stochastic volatility model with correlated spot-volatility process and semi-closed-form pricing via
      characteristic function inversion — do not replace with basic Black-Scholes for equity or FX derivatives requiring volatility
      smile capture
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Black-Scholes instead of Heston model ignores volatility smile dynamics, systematically mispricing
      out-of-the-money options by 5-15% and causing hedging mismatches in live trading
    derived_from_bd_id: BD-077
  - id: finance-C-119
    when: When pricing two-asset spread options using basket approximation techniques
    action: Use Choi basket engine for two-asset spread option pricing — do not substitute with generic spread pricing methods
      that lack basket approximation accuracy for cross-commodity spreads
    severity: high
    kind: domain_rule
    modality: must
    consequence: Substituting Kirk approximation for Choi basket engine degrades spread option pricing accuracy, causing valuation
      errors that exceed acceptable thresholds for cross-commodity spread trading
    derived_from_bd_id: BD-086
  - id: finance-C-120
    when: When pricing spread options with early exercise features
    action: Use Bjerksund-Stensland approximation for American-style spread options — do not use European-only methods like
      Kirk approximation for structures with early exercise requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Kirk approximation for early-exercise spread options ignores the early exercise premium, systematically
      overpricing American spread options and causing losses when early exercise is optimal
    derived_from_bd_id: BD-087
  - id: finance-C-121
    when: When extracting implied standard deviation from Black prices
    action: Use numerical root-finding with at least 1e-10 solver accuracy for implied standard deviation extraction across
      the strike-expiry grid — do not use analytical approximations for production vol quote matching
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using insufficient solver tolerance (worse than 1e-10) causes imprecise implied volatility extraction, leading
      to mismatched vol quotes that propagate errors into hedging decisions and Greeks computation
    derived_from_bd_id: BD-089
  - id: finance-C-122
    when: When pricing European options using Fourier-COS method
    action: Verify that N=128 cosine series terms provide sufficient accuracy for the specific payoff structure — validate
      against higher N (256, 512) for non-standard payoffs or extreme parameters
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Relying on N=128 default without validation may produce errors exceeding 1 basis point for exotic payoffs
      or deep out-of-the-money strikes, silently distorting strategy backtest results
    derived_from_bd_id: BD-078
  - id: finance-C-123
    when: When pricing European options via Monte Carlo with low-discrepancy sequences
    action: Verify that 10,000 quasi-random paths achieve 1 basis point accuracy for the specific equity option configuration
      — increase paths for high-dimensional payoffs or extreme volatility regimes
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Reducing path count below 10,000 without verification increases Monte Carlo noise beyond 1 basis point, causing
      noisy Greeks and unreliable strategy performance estimates that don't match live trading results
    derived_from_bd_id: BD-079
  - id: finance-C-124
    when: When pricing CMS coupons using Linear TSR pricer
    action: Verify that the 2 basis point accuracy tolerance is acceptable for the specific CMS structure — use Hagan numerical
      integration for higher accuracy requirements or exotic CMS structures
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using Linear TSR for CMS structures requiring sub-2bp accuracy causes systematic pricing errors that compound
      in large swap portfolios, resulting in mark-to-market discrepancies and incorrect hedge ratios
    derived_from_bd_id: BD-081
  - id: finance-C-125
    when: When creating QuoteHandle objects from quote values in pricing calculations
    action: Wrap raw numeric values in SimpleQuote(value) before converting to QuoteHandle — QuoteHandle cannot accept raw
      numbers directly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attempting to create QuoteHandle from raw numbers without SimpleQuote wrapping causes QuoteHandle initialization
      to fail, breaking all downstream pricing calculations
    derived_from_bd_id: BD-104
  - id: finance-C-126
    when: When constructing PiecewiseFlatForward yield curves from rate helpers
    action: Verify each rate helpers are sorted by maturity date in ascending order before passing to the curve constructor
      — concatenate depositHelpers + futuresHelpers + swapHelpers only after sorting each collection by maturity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unordered helpers cause the bootstrap algorithm to fail or produce improperly constructed curves with gaps
      in the maturity structure, leading to incorrect discount factor calculations
    derived_from_bd_id: BD-112
  - id: finance-C-127
    when: When adding historical fixings to an index history using AddFixing
    action: Add fixings in strict chronological order (oldest to newest) — adding a future fixing before a past fixing corrupts
      the index history and causes incorrect interpolation for dates between fixings
    severity: high
    kind: domain_rule
    modality: must
    consequence: Adding fixings out of chronological order corrupts the index history, causing incorrect interpolation for
      dates between fixings and producing wrong rates for inflation-linked or ibor instruments
    derived_from_bd_id: BD-119
  - id: finance-C-128
    when: When setting the evaluation date for pricing calculations using Actual365Fixed day count
    action: Validate that the evaluation date is current before computing time-to-expiry or discount factors — stale evaluation
      dates compound errors with Actual365Fixed day count, producing multiplicative NPV errors exceeding 10% for long-dated
      instruments
    severity: high
    kind: domain_rule
    modality: must
    consequence: A stale evaluation date combined with Actual365Fixed day count produces wrong year fractions AND wrong discount
      factors in cascade, causing NPV errors exceeding 10% for instruments with maturity beyond 5 years
    derived_from_bd_id: BD-120
  - id: finance-C-130
    when: When pricing callable bonds using Hull-White tree engine with a=0.06 and sigma=0.20
    action: Use 40 grid points for tree discretization when sigma=0.20 — if sigma is changed to a higher value (e.g., 0.30),
      re-evaluate grid point adequacy to avoid discretization oscillations in OAS sensitivity
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Insufficient grid points for the given volatility level produces visible oscillations in callable bond OAS
      calculations, causing systematic mispricing of 2-5% on long-dated callable structures
    derived_from_bd_id: BD-127
  - id: finance-C-131
    when: When designing backtesting or strategy development workflows
    action: Assume the framework handles train/test time split automatically — the framework does not implement temporal data
      partitioning for backtesting workflows
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper train/test time splitting, strategies appear more profitable in backtests than they actually
      are due to look-ahead bias, causing significant losses when deployed to production
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-132
    when: When preparing historical data for backtesting or strategy training
    action: Split historical data chronologically into training and testing periods with no temporal overlap — use a fixed
      cutoff date where each data before cutoff is training data and each data after is testing data; apply walk-forward validation
      for robust evaluation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without explicit train/test splitting, the same data is used for both training and evaluation, inflating
      apparent strategy performance by 15-30% in typical scenarios and producing non-reproducible live trading results
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-133
    when: When computing factor information coefficients for multi-factor strategy evaluation
    action: Assume the framework computes factor IC with automatic de-meaning and grouping — the framework does not implement
      IC de-meaning or cross-sectional grouping
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without de-meaning and grouping, factor IC calculations show inflated correlations that don't reflect actual
      alpha generation, leading to overconfident strategy selection and live trading underperformance
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-134
    when: When computing factor information coefficients in multi-factor strategy evaluation
    action: Manually de-mean factor returns by subtracting cross-sectional mean before IC computation, and group stocks by
      market cap or sector for grouped IC calculations to verify accurate factor predictive power measurement
    severity: high
    kind: operational_lesson
    modality: must
    consequence: IC calculations without de-meaning overstate factor predictive power by 10-20% by allowing market-wide movements
      to inflate correlations, causing incorrect strategy allocation decisions
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-135
    when: When calibrating SABR volatility for CMS pricing using GFunctionFactory.Standard
    action: Enable VegaWeightedSmileFit=True for SABR calibration when using GFunctionFactory.Standard — Standard G-function
      relies on accurate wing behavior that requires vega-weighted calibration, disabling it causes systematic wing mispricing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: CMS pricing with Standard GFunction but without VegaWeightedSmileFit produces systematically biased wing
      pricing, causing 3-8% mispricing in long-dated CMS spread instruments
    derived_from_bd_id: BD-124
  - id: finance-C-136
    when: When pricing mixed portfolios containing both European options and basket options via Monte Carlo
    action: Use consistent Monte Carlo tolerance settings across each instruments in the portfolio — apply uniform tolerance
      (e.g., 0.02) for both European and basket options, or explicitly document divergent tolerances to avoid inconsistent
      P&L attribution
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Mixed tolerance levels create inconsistent P&L attribution where European option performance is measured
      at ~2% accuracy while basket options are measured at ~10% accuracy, distorting portfolio risk assessment and allocation
      decisions
    derived_from_bd_id: BD-126
  - id: finance-C-137
    when: When processing financial instruments in backtesting or production
    action: Assume the framework provides point-in-time data capabilities for audit compliance — the framework does not implement
      point-in-time data handling; each data references use the latest available values without timestamp awareness
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time data, backtests and live trading use current knowledge retroactively, creating look-ahead
      bias that inflates strategy performance by 5-30% in volatile markets and makes audit trails non-compliant with regulatory
      requirements
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-138
    when: When configuring market data infrastructure for multi-scenario analysis
    action: Implement point-in-time data handling by adding timestamp metadata to each price/rate data points and modifying
      data access patterns to filter by as_of_date <= scenario_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Implementing point-in-time data ensures backtest results are audit-compliant and match live trading behavior,
      preventing regulatory findings and performance misrepresentation in multi-scenario analysis
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-139
    when: When configuring forecast curve handles in multi-scenario or dynamic rebinding contexts
    action: Use RelinkableHandle for forecast curves that require runtime rebinding across scenarios; for static scenarios
      where curves do not change, use fixed Handle to minimize overhead
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using RelinkableHandle in static scenarios introduces unnecessary overhead; conversely, using fixed Handle
      for rebindable curves causes type incompatibility errors when attempting to rebind at runtime
    derived_from_bd_id: BD-007
  - id: finance-C-142
    when: When implementing instrument pricing logic or attaching pricing engines
    action: Attach pricing engine to instrument before calling NPV calculation — engine must be set via setPricingEngine()
      method prior to any valuation; detached engine throws exception
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling NPV calculation without an attached pricing engine throws an exception, breaking the pricing workflow
      and potentially causing cascading failures in dependent calculations
    derived_from_bd_id: BD-008
  - id: finance-C-143
    when: When creating yield term structure handles for instruments that need curve reassignment during scenario analysis
      or calibration
    action: Use RelinkableYieldTermStructureHandle instead of standard YieldTermStructureHandle when the curve needs to change
      during instrument lifetime, such as in scenario analysis or calibration loops; regular Handle is immutable after construction
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using immutable YieldTermStructureHandle for scenarios requiring curve updates causes runtime errors when
      attempting reassignment, breaking scenario analysis workflows
    derived_from_bd_id: BD-103
  - id: finance-C-145
    when: When implementing model versioning or reproducibility features in backtesting
    action: Assume the framework provides run_id/experiment_id binding for model versioning and data snapshots — the framework
      does not implement this capability; model runs cannot be traced to specific data versions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without run_id/experiment_id binding, model runs cannot be reproduced or linked to specific data versions,
      causing production audit failures and preventing regression analysis of model changes
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-146
    when: When implementing model versioning or reproducibility features in backtesting
    action: Implement run_id/experiment_id generation at strategy execution initialization and bind it to data snapshot hashes;
      store in results metadata for audit trail traceability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit run_id/experiment_id binding, production audits will fail and model runs cannot be linked
      to the specific data versions used, preventing reproducible research
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-147
    when: When configuring option pricing parameters for delta behavior validation
    action: Change the PlainVanillaPayoff strike from 8.0 without explicit validation — this value creates ATM option (spot=strike=8.0)
      for testing delta=0.5 behavior; OTM configuration (strike=10.0) produces different Greeks profile
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Modifying strike to 10.0 converts ATM to OTM option, changing delta from 0.5 toward 0, breaking delta-hedging
      validation tests and model verification procedures
    derived_from_bd_id: BD-030
  - id: finance-C-148
    when: When implementing or refactoring option pricing engine selection
    action: Maintain at least 3 distinct binomial tree engine implementations (JR, CRR, EQP, Trigeorgis, Tian, LR, Joshi4)
      for model risk assessment — do not reduce to single engine without documenting discretization error quantification
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reducing to single binomial engine prevents quantification of discretization error across methods, leading
      to unvalidated pricing that may diverge by 1-5% for barrier and Bermudan options
    derived_from_bd_id: BD-031
  - id: finance-C-149
    when: When implementing model calibration for instruments with noisy objective functions
    action: Use derivative-free optimization (Simplex/Nelder-Mead) for calibration — do not replace with gradient-based methods
      (LevenbergMarquardt) that require numerically unstable gradients for Bermudan pricing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using gradient-based calibration for Bermudan options causes numerical instability and convergence failures,
      leading to incorrect calibration and pricing errors of 2-10%
    derived_from_bd_id: BD-032
  - id: finance-C-150
    when: When using the framework's default day count convention for European OTC derivatives
    action: Verify that Actual365Fixed matches your instrument conventions — confirm against ISDA specifications for the specific
      instrument type; Actual360 would understate year fractions by ~1.5% affecting swap and bond valuations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using Actual360 instead of Actual365Fixed understates year fractions by 1.5%, causing systematic 1.5% overvaluation
      of interest accrual for swaps and bonds, leading to P&L discrepancies in live trading
    derived_from_bd_id: BD-023
  - id: finance-C-151
    when: When creating quotes or term structures for market data in the framework
    action: Wrap each quotes with QuoteHandle and each term structures with YieldTermStructureHandle — handles enable automatic
      market data updates where modifications to underlying values trigger recalculation in dependent instruments
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using raw pointers instead of Handle wrappers silently disables the observable mechanism, causing market
      data updates to have no effect on dependent calculations without any error notification
    derived_from_bd_id: BD-102
  - id: finance-C-152
    when: When implementing or refactoring any code that creates term structures or quotes
    action: Use Handle wrappers for each term structures and quotes — the combination of BD-063, BD-064, and BD-111 creates
      pervasive invisible coupling where breaking the Handle pattern (using raw pointers) silently disables the observable
      mechanism
    severity: high
    kind: operational_lesson
    modality: must
    consequence: 'Breaking the Handle pattern creates invisible coupling failures: market updates will have no effect on instruments
      without any compilation or runtime errors, making the system appear unresponsive to live market data'
    derived_from_bd_id: BD-122
  - id: finance-C-153
    when: When implementing settlement date calculations for OTC derivatives
    action: Set settlementDays parameter to 2 (T+2 settlement) matching ISDA and major exchange standards for OTC interest
      rate derivatives
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing settlementDays from 2 to T+1 increases operational pressure; changing to T+3 delays cash flows and
      causes timing mismatch with counterparty expectations, leading to settlement risk and potential disputes
    derived_from_bd_id: BD-025
  - id: finance-C-154
    when: When constructing yield curves using bootstrapping methods
    action: Use PiecewiseFlatForward interpolation for forward rate calculation between curve nodes — ensures stable bootstrap
      behavior without oscillatory artifacts
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing PiecewiseFlatForward with cubic splines introduces oscillatory artifacts in the forward rate curve,
      causing pricing errors in dependent instruments and model inconsistency across curve tenors
    derived_from_bd_id: BD-026
  - id: finance-C-155
    when: When implementing payment date calculations for derivative instruments
    action: Apply ModifiedFollowing business day convention for payment date adjustments — rolls to next business day unless
      month boundary is crossed, then rolls back
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Following convention instead of ModifiedFollowing causes payment dates to shift to Mondays after weekend
      holidays, potentially crossing month boundaries and complicating cash flow management and accounting reconciliation
    derived_from_bd_id: BD-028
  - id: finance-C-156
    when: When configuring model calibration convergence criteria
    action: 'Use EndCriteria parameters: maxIterations=1000, maxStationaryIterations=250, functionTolerance=1e-7 — these thresholds
      balance solution quality against computation time'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Loosening tolerance to 1e-4 risks unconverged calibration solutions producing inaccurate model parameters;
      tightening to 1e-10 increases runtime 5x without proportional accuracy gain for most use cases
    derived_from_bd_id: BD-033
  - id: finance-C-157
    when: When calculating implied volatility from observed option prices
    action: Use Black formula inversion for implied volatility calculation — applies to European-style options across equity,
      FX, and interest rate derivatives markets
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative vol surface methods (Nelson-Siegel, SVI) instead of Black formula for implied vol calculation
      introduces model inconsistency when the framework expects standardized Black-calibrated vol inputs for downstream pricing
    derived_from_bd_id: BD-088
  - id: finance-C-158
    when: When implementing swaption volatility cube interpolation
    action: Use linear interpolation for swaption vol cube — ensures bounded interpolation error proportional to second derivative
      of the true vol surface
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using cubic or monotone interpolation in the vol cube introduces different extrapolation behavior that violates
      the bounded error assumption, causing smile-consistent pricing to deviate from expected accuracy
    derived_from_bd_id: BD-091
  - id: finance-C-159
    when: When implementing market data handling in pricing or calibration routines
    action: Wrap market data values in Handle classes (QuoteHandle, YieldTermStructureHandle) to maintain shared reference
      semantics — do not pass raw data values directly
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Passing raw market data by value creates disconnected copies; term structures and quotes will not propagate
      updates to dependent calculations, causing stale pricing results
    derived_from_bd_id: BD-101
  - id: finance-C-160
    when: When pricing American-style options
    action: Use BaroneAdesiWhaley approximation engine for American option pricing — this provides analytic approximation
      with early exercise premium at acceptable accuracy-speed tradeoff
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using lattice methods (binomial/trinomial) for all American option pricing increases computation time 100x
      without business justification; conversely, using European pricing on American options ignores early exercise premium
      entirely
    derived_from_bd_id: BD-035
  - id: finance-C-162
    when: When calibrating HestonSLVMCModel leverage function discretization
    action: Use exactly 91 time steps for leverage function discretization (corresponding to weekly steps for ~2 year horizon)
      — provides sufficient resolution for short-end leverage function detail
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reducing to 52 steps (weekly for 1 year) loses short-end leverage function accuracy, causing calibration
      to miss critical near-term vol dynamics and misprice short-dated options by 3-8%
    derived_from_bd_id: BD-037
  - id: finance-C-165
    when: When constructing discount or forward curves involving synthetic instruments, OIS swaps, or non-standard tenors
    action: Use GlobalBootstrap with additional_helpers parameter to include synthetic instruments that don't follow standard
      ordering — do not assume standard sequential bootstrap handles irregular instrument maturities
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using standard sequential bootstrap for curves with synthetic instruments produces incorrect curve term structures,
      causing NPV errors of 0.5-2% on affected instruments and wrong discount rates for all dependent instruments
    derived_from_bd_id: BD-117
  - id: finance-C-166
    when: When running Monte Carlo simulations for stochastic local vol calibration or any stochastic pricing engine
    action: Use MTBrownianGeneratorFactory with seed 1234 for reproducible random number generation — fixed seed ensures deterministic
      path generation required for calibration convergence and audit trails
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different RNG seeds produces non-reproducible Monte Carlo paths, causing calibration results to vary
      between runs and making model validation and audit impossible
    derived_from_bd_id: BD-038
  - id: finance-C-167
    when: When pricing swaptions using Gaussian1dSwaptionEngine
    action: Configure Gaussian1dSwaptionEngine with exactly 64 paths and 7.0 standard deviation cutoff — these parameters
      define the numerical integration boundary for accurate swaption pricing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reducing paths to 32 introduces visible integration error in long-dated swaptions, causing pricing deviations
      of 2-5% for expiry > 5 years; changing std dev cutoff affects tail truncation for deep ITM options
    derived_from_bd_id: BD-039
  - id: finance-C-168
    when: When implementing GSR model calibration logic
    action: Use LevenbergMarquardt for iterative GSR calibration — do not substitute with alternative optimizers such as Simplex
    severity: high
    kind: domain_rule
    modality: must
    consequence: Substituting with Simplex optimizer would cause slower convergence and may converge to different local minima,
      resulting in incorrect GSR model parameters that propagate to all downstream interest rate derivative pricing
    derived_from_bd_id: BD-040
  - id: finance-C-169
    when: When configuring SABR model calibration for CMS products
    action: Disable vega-weighted smile fitting (VegaWeightedSmileFit=False) to verify equal importance across each strike
      level, preserving the full smile shape
    severity: high
    kind: domain_rule
    modality: must
    consequence: Enabling vega-weighted fitting would underfit the wings of the volatility smile, causing systematic CMS coupon
      mispricing where wing behavior is critical for product valuation
    derived_from_bd_id: BD-042
  - id: finance-C-170
    when: When constructing the interest rate term structure for option pricing
    action: Use FlatForward for constant rate term structure in baseline pricing and model testing to eliminate yield curve
      shape effects
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a sloping term structure introduces term structure risk that affects option delta calculations, making
      it impossible to isolate pure model behavior during baseline testing
    derived_from_bd_id: BD-034
  - id: finance-C-171
    when: When calibrating SABR model parameters
    action: Use initial parameter guess alpha=0.2, beta=0.5, nu=0.4, rho=0.0 as the starting point for SABR calibration to
      verify reproducible convergence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Different initial guesses could converge to different local minima, producing materially different volatility
      surfaces that affect all downstream option pricing and risk calculations
    derived_from_bd_id: BD-041
  - id: finance-C-172
    when: When setting up pricing engine for any derivative pricing operation
    action: Explicitly set evaluation date before any pricing call to verify deterministic time-to-expiry calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit evaluation date setup, the system may use default or stale dates causing incorrect time-to-expiry
      calculations, leading to wrong option prices and Greeks that do not match live trading systems
    derived_from_bd_id: BD-046
  - id: finance-C-173
    when: When configuring TreeCallableFixedRateBondEngine for Hull-White callable bond pricing
    action: Use grid_points=40 for the tree discretization — this value balances accuracy against computational cost
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fewer than 40 grid points causes visible oscillations in OAS sensitivity calculations, leading to inaccurate
      callable bond pricing that may result in mispriced instruments and trading losses
    derived_from_bd_id: BD-050
  - id: finance-C-174
    when: When defining interest rate swap instruments for pricing or risk management
    action: Correctly identify swap direction as Payer or Receiver — Payer pays fixed and receives floating, Receiver receives
      fixed and pays floating
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misidentifying payer/receiver reverses each cash flow sign, causing P&L attribution to be completely inverted
      and risk exposure to be misreported by 100%
    derived_from_bd_id: BD-052
  - id: finance-C-175
    when: When configuring CMS coupon pricing engines
    action: Use GFunctionFactory.Standard implementation per Hagan's formula for consistent CMS coupon calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-standard G-function variants produces different CMS adjustments, leading to inconsistent coupon
      calculations across the system and potential P&L discrepancies in live trading
    derived_from_bd_id: BD-054
  - id: finance-C-176
    when: When configuring FdmBlackScholesVanillaEngine for finite difference option pricing
    action: Use xSteps=100 and tSteps=25 for the finite difference discretization — this configuration ensures convergence
      to within 1bp accuracy for vanilla options across strike and maturity ranges
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fewer than 100 x-steps or 25 t-steps introduces visible discretization error for long-dated options,
      causing systematic mispricing that may result in incorrect hedge ratios and trading losses
    derived_from_bd_id: BD-056
  - id: finance-C-177
    when: When calibrating swaption model parameters using the framework
    action: Use derivative-free optimization (Nelder-Mead Simplex) with convergence tolerance of 1e-8 — do not substitute
      with gradient-based methods (Levenberg-Marquardt, quasi-Newton) even if gradients become computable
    severity: high
    kind: domain_rule
    modality: must
    consequence: Gradient-based methods may converge to local minima in the swaption calibration parameter surface, producing
      incorrect calibrated parameters that cause systematic mispricing of bermudan swaptions across all tenors
    derived_from_bd_id: BD-071
  - id: finance-C-178
    when: When extracting implied volatility from swaption prices using the framework
    action: Use Newton-bisection hybrid method with 1e-10 tolerance — do not use pure Newton method for speed optimization
      in well-behaved regions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pure Newton method can diverge on flat payoff regions where the derivative approaches zero, causing implied
      volatility extraction to fail or produce unstable results that corrupt all downstream pricing calculations
    derived_from_bd_id: BD-072
  - id: finance-C-179
    when: When pricing callable bonds using the framework's Hull-White tree engine
    action: Use backward induction on recombining lattice comparing continuation value to exercise value at each node, with
      convergence within 0.5 basis point
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using semi-analytical approximations for speed-critical applications introduces valuation errors in complex
      call schedules where early exercise boundary is path-dependent, potentially causing mispriced bonds by several basis
      points
    derived_from_bd_id: BD-074
  - id: finance-C-180
    when: When constructing zero curve from observed market points using the framework
    action: Use linear interpolation between observed market points to verify interpolation error stays under 0.1 basis point
      for standard market tenors
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Cubic spline interpolation may introduce spurious oscillations in forward rates that distort discount factors
      across the curve, causing inconsistent valuation errors that compound in long-dated instruments
    derived_from_bd_id: BD-075
  - id: finance-C-182
    when: When implementing or refactoring zero-coupon swap pricing tests
    action: Verify that zero-coupon swap NPV equals zero at inception (par value) as a sanity check for the pricing engine
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing or weakening the zero-NPV assertion allows discount/projection curve mismatches to go undetected,
      producing systematically incorrect swap valuations
    derived_from_bd_id: BD-057
  - id: finance-C-183
    when: When configuring CalibrationBasket mode for GSR model calibration
    action: Use 'MaturityStrikeByDeltaGamma' weighting mode rather than 'Naive' mode — Delta-Gamma weighting adjusts for varying
      instrument sensitivities and provides more stable calibration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Naive calibration mode over-weights deep OTM swaptions causing calibration instability, which propagates
      to all derivative pricing and results in unreliable valuations
    derived_from_bd_id: BD-061
  - id: finance-C-184
    when: When selecting American option pricing methods for dividend-paying stocks
    action: Consider Bjerksund-Stensland analytic approximation as a computationally efficient alternative for call options
      on dividend-paying stocks; do not use as primary method if Barone-Adesi-Whaley is the validated default
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using Bjerksund-Stensland as primary method without validation may produce different results than the primary
      Barone-Adesi-Whaley approximation for non-call American options
    derived_from_bd_id: BD-067
  - id: finance-C-185
    when: When pricing American options using tree-based methods
    action: Use binomial tree methods with backward induction for American option pricing — they provide convergence to true
      value as steps increase and explicit early exercise boundary evolution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching to alternative tree methods (e.g., trinomial) without proper CRR vs JR parameterization analysis
      may alter convergence properties and produce different exercise boundary results
    derived_from_bd_id: BD-069
  - id: finance-C-186
    when: When pricing American basket options
    action: Use Least Squares Monte Carlo (Longstaff-Schwartz) method — estimate continuation value through regression basis
      functions to determine optimal early exercise for multi-asset path-dependent high-dimensional problems
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using mesh methods or direct boundary estimation for American basket options fails to handle the high-dimensional
      exercise boundary correctly, producing suboptimal exercise decisions and incorrect premium valuations
    derived_from_bd_id: BD-070
  - id: finance-C-187
    when: When implementing or extending SWIG interface bindings for the backtesting framework
    action: Assume the framework provides 100% universal coverage of trading operations through SWIG interfaces — only 55%
      coverage (11/20 items) is confirmed; 9 interface items are missing
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without knowing which 9 interface items are missing, custom strategies relying on unimplemented SWIG bindings
      will fail silently at runtime, causing backtest to crash or produce incomplete results in production
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-188
    when: When auditing or extending the backtesting framework's SWIG interface layer
    action: Catalog the complete set of 28 expected trading operation interfaces, identify the 9 missing items by comparing
      against the audit report (11/20 coverage), and implement or document the missing SWIG bindings with explicit error handling
      for unsupported operations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without resolving the 9 missing interface items, production backtests will encounter undefined behavior when
      executing strategies that require unimplemented bindings, leading to unreliable strategy validation
    derived_from_bd_id: BD-GAP-005
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
