  evidence_refs:
  - type: community_validated
    ref: 中国金融期货交易所 IC/IF/IM 合约规则文件；知乎《A股可以做空的工具有哪些》（2024）
    url: http://mp.cnfol.com/58576/article/1732006910-141567623.html
  reference_code:
    bad_example: '# BAD: 忽略期货贴水成本，纯价格对冲

      hedge_pnl = futures_position * (futures_exit - futures_entry)

      '
    good_example: '# GOOD: 纳入滚仓贴水成本（IC 年化约 -15%）

      carry_cost_annual = 0.15  # IC 期货年化贴水约 15%

      hold_days = (exit_date - entry_date).days

      carry_cost = carry_cost_annual * hold_days / 365

      hedge_pnl = futures_position * (futures_exit - futures_entry) - carry_cost

      '
  provenance:
