  evidence_refs:
  - type: academic
    ref: Jegadeesh & Titman (1993) JF（基准研究）；知乎《因子研究系列之二：浅析动量策略在中国A股的应用研究》（2020）；东吴证券《求索动量因子系列研究（二）》
    url: https://zhuanlan.zhihu.com/p/200752762
  reference_code:
    bad_example: '# BAD: 直接套用美股 12-1 月动量因子

      df[''momentum_12_1''] = df[''return''].rolling(12).sum().shift(1)

      df[''signal''] = (df[''momentum_12_1''] > df[''momentum_12_1''].median()).astype(int)

      # A 股结果：多头持仓下个月大概率跑输

      '
    good_example: '# GOOD: A 股使用短期反转因子（1-4周）

      df[''reversal_1m''] = -df[''return''].rolling(20).sum()  # 反转，取负号

      df[''signal''] = (df[''reversal_1m''] > df[''reversal_1m''].median()).astype(int)

      '
  provenance:
    source: academic
  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-BF-001
  statement: '处置效应（Shefrin & Statman 1985）在 A 股散户中尤为显著： 投资者倾向于过早卖出盈利股票、过长持有亏损股票。上交所实证研究证实 超过 90% 的个人账户存在此效应，AI 辅助工具不应迁就"持有亏损等解套"
