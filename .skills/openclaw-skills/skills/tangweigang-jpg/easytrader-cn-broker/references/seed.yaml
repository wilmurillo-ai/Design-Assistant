resources:
  packages:
  - name: requests
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: pywinauto
    version_pin: latest
  - name: flask
    version_pin: latest
  - name: easyutils
    version_pin: latest
  - name: six
    version_pin: latest
  - name: pillow
    version_pin: latest
  - name: xtquant
    version_pin: latest
  - name: pytesseract
    version_pin: latest
  - name: rqopen_client
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install requests
    - python3 -m pip install pandas
    - python3 -m pip install pywinauto
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-003
    when: When implementing web trader authentication
    action: Call keepalive() immediately after successful login to start the heartbeat thread
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without keepalive(), the web session token expires after server-side timeout, causing all subsequent API
      calls to fail with NotLoginError
    stage_ids:
    - authentication
  - id: finance-C-004
    when: When implementing broker-specific login for BaseLoginClientTrader
    action: Implement login() as an abstract method that handles broker-specific GUI automation or authentication
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing implementation causes NotImplementedError when prepare() is called, blocking all trading operations
    stage_ids:
    - authentication
  - id: finance-C-005
    when: When implementing MiniQMT trader connection
    action: Pass DefaultXtQuantTraderCallback instance to XtQuantTrader constructor to receive order/trade callbacks
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without callback registration, order confirmations and fills are silently discarded, making it impossible
      to track order execution status
    stage_ids:
    - authentication
  - id: finance-C-007
    when: When connecting to MiniQMT trading terminal
    action: Enable '极简模式/独立交易模式' in the QMT client before attempting connection
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Connection silently fails when QMT client is not in simplified mode, and subscribe() returns no error but
      no data flows
    stage_ids:
    - authentication
  - id: finance-C-015
    when: When claiming the system supports live trading via GUI automation
    action: Claim reliable live trading support on systems without Windows GUI subsystem or pywinauto compatibility
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: GUI client traders (ClientTrader) require pywinauto which only works on Windows; using on Linux/macOS causes
      complete authentication failure
    stage_ids:
    - authentication
  - id: finance-C-016
    when: When implementing balance property to read from Static controls
    action: convert window_text() return value to float for monetary calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: String values from Static controls will cause downstream numeric operations to fail or produce incorrect
      financial calculations, leading to wrong trading decisions
    stage_ids:
    - account_query
  - id: finance-C-017
    when: When implementing security code extraction for trading
    action: extract last 6 digits from security code using security[-6:]
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Security codes with prefix (sh/sz) will fail to match broker systems which only accept 6-digit codes, causing
      order submission failures
    stage_ids:
    - account_query
  - id: finance-C-018
    when: When parsing grid data from broker UI with Chinese column names
    action: use GRID_DTYPE configuration to map column names to specified data types
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Numeric columns like '委托编号' and '证券代码' will be parsed as floats instead of strings, causing data truncation
      and incorrect record matching
    stage_ids:
    - account_query
  - id: finance-C-019
    when: When accessing balance property to retrieve account balance
    action: return a dict containing 'available' (可用金额) and 'asset' (总资产) keys as floats
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calling code expecting specific dict keys will raise KeyError or produce incorrect trading logic when keys
      are missing or have different names per broker
    stage_ids:
    - account_query
  - id: finance-C-022
    when: When accessing grid controls using pywinauto child_window
    action: handle ElementNotFoundError exception for graceful degradation when grid controls are not ready
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: UI automation will crash the entire trading session when grid controls are temporarily unavailable, preventing
      all subsequent operations
    stage_ids:
    - account_query
  - id: finance-C-024
    when: When accessing grid data through CVirtualGridCtrl class
    action: navigate to correct menu path via _switch_left_menus before accessing grid controls
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Grid control access will fail with ElementNotFoundError when UI is not on the correct page, causing all account
      query operations to fail
    stage_ids:
    - account_query
  - id: finance-C-026
    when: When implementing balance retrieval
    action: read from Static controls via BALANCE_CONTROL_ID_GROUP mapping, not from grid data
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Balance data will be incomplete or missing when read from grid, as Static controls contain pre-formatted
      balance values while grid only shows positions/entrusts
    stage_ids:
    - account_query
  - id: finance-C-033
    when: When implementing buy/sell/market orders in order_execution
    action: Verify order amount is rounded to nearest 100 shares (A-share lot size requirement)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Brokers reject orders not in 100-share multiples, causing trade failures and missed opportunities in automated
      systems
    stage_ids:
    - order_execution
  - id: finance-C-034
    when: When validating security code input in order_execution
    action: Extract exactly 6 trailing digits from security code (supports sh/sz prefixes)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect security code format causes orders to be submitted for wrong stocks, resulting in unintended positions
    stage_ids:
    - order_execution
  - id: finance-C-035
    when: When configuring slippage in trade following
    action: Keep slippage value within [0, 1] range (0 = no slippage, 1 = 100% adjustment)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: 'Slippage outside [0,1] causes extreme price distortion: buy orders at 2x price waste capital, sell orders
      at 0 price forfeit gains'
    stage_ids:
    - order_execution
  - id: finance-C-036
    when: When submitting any trade order via UI automation
    action: Call _handle_pop_dialogs() after _submit_trade() to extract entrust_no or handle errors
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Popup dialogs remain unhandled, blocking UI automation and leaving order status unknown - orders appear successful
      but may fail silently
    stage_ids:
    - order_execution
  - id: finance-C-038
    when: When processing trade error responses in popup dialogs
    action: Raise TradeError with meaningful message content from popup dialog on order rejection
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Silent failures leave orders in undefined state - automated systems cannot detect rejection and may retry
      or proceed with wrong assumptions
    stage_ids:
    - order_execution
  - id: finance-C-051
    when: When executing trade commands from external platforms
    action: Discard commands with invalid price (non-numeric or price <= 0)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid price values will cause trading failures, potentially executing at unintended prices or rejecting
      valid orders due to price validation errors in the broker API
    stage_ids:
    - trade_following
  - id: finance-C-052
    when: When executing trade commands from external platforms
    action: Discard commands with invalid amount (amount <= 0)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative or zero trade amounts will cause broker API rejections and potential fund safety issues in the trading
      account
    stage_ids:
    - trade_following
  - id: finance-C-053
    when: When validating stock codes from JoinQuant or RiceQuant
    action: Validate stock code format (11 characters with XSHG/XSHE suffix)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid stock codes will cause assertion errors or incorrect trading against wrong securities, resulting
      in financial losses
    stage_ids:
    - trade_following
  - id: finance-C-057
    when: When implementing trade sequencing for T+0 safety
    action: Execute sell orders before buy orders in each transaction batch
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Buying before selling may cause insufficient funds for sell orders and violates T+0 trading constraints,
      resulting in order rejections or margin issues
    stage_ids:
    - trade_following
  - id: finance-C-058
    when: When processing trade commands in the execution pipeline
    action: Check command expiration before queue insertion and before execution
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Stale signals executing beyond their intended window can cause position mismatches and losses when market
      conditions have changed
    stage_ids:
    - trade_following
  - id: finance-C-078
    when: When passing authenticated session from authentication to account_query stage
    action: Provide ClientTrader instance with valid config containing BALANCE_CONTROL_ID_GROUP and COMMON_GRID_CONTROL_ID
      mappings
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Query operations will fail to extract balance/position data because required UI control IDs are missing from
      the config object
    stage_ids:
    - authentication
    - account_query
  - id: finance-C-079
    when: When passing authenticated session from authentication to order_execution stage
    action: Provide ClientTrader instance with valid trade control IDs (TRADE_SECURITY_CONTROL_ID, TRADE_PRICE_CONTROL_ID,
      TRADE_AMOUNT_CONTROL_ID, TRADE_SUBMIT_CONTROL_ID)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Trade submission will silently fail or throw ElementNotFoundError because UI controls for security code,
      price, amount, and submit button are not properly configured
    stage_ids:
    - authentication
    - order_execution
  - id: finance-C-082
    when: When passing trade commands from trade_following to order_execution stage
    action: Verify trade_cmd['action'] is exactly 'buy' or 'sell' as getattr(user, action) is called dynamically
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid action will raise AttributeError, causing trade command to fail and potentially miss critical buy/sell
      signals
    stage_ids:
    - trade_following
    - order_execution
  - id: finance-C-083
    when: When passing trade commands from trade_following to order_execution stage
    action: Validate trade_cmd['price'] is numeric and greater than 0 before execution
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid price will cause order rejection by exchange or unexpected fills at wrong price levels, resulting
      in financial loss
    stage_ids:
    - trade_following
    - order_execution
  - id: finance-C-084
    when: When passing trade commands from trade_following to order_execution stage
    action: Validate trade_cmd['amount'] is greater than 0 before execution
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero or negative amount will cause order rejection by exchange, and sell orders may accidentally close entire
      positions instead of target amount
    stage_ids:
    - trade_following
    - order_execution
  - id: finance-C-086
    when: When passing login credentials from remote_service to authentication stage
    action: Include broker field in JSON payload to select correct ClientTrader subclass
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Server will raise NotImplementedError because it cannot determine which broker's client to instantiate without
      the broker parameter
    stage_ids:
    - remote_service
    - authentication
  - id: finance-C-087
    when: When passing login credentials from remote_service to authentication stage
    action: Verify user and password fields are present in JSON payload
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Authentication will fail with KeyError or validation error because user/password are required parameters
      for login() method
    stage_ids:
    - remote_service
    - authentication
  - id: finance-C-094
    when: When accessing remote service endpoints after authentication
    action: Verify user has been authenticated via /prepare endpoint before accessing any trading endpoints
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: KeyError will be raised when accessing global_store['user'] for unauthenticated requests, causing service
      disruption
    stage_ids:
    - remote_service
  - id: finance-C-095
    when: When executing buy or sell orders in the A-share market
    action: Round order amounts to multiples of 100 (lot size), rounding to the nearest 100
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Orders with non-100-multiple amounts will be rejected by the exchange, causing failed trades and potential
      position tracking errors
  - id: finance-C-096
    when: When processing stock security codes in the system
    action: Normalize stock codes to 6-digit format by extracting the last 6 characters (security[-6:])
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: UI automation will target wrong controls or fail to find the security input field, causing trade execution
      failures
  - id: finance-C-097
    when: When converting stock codes between different platform formats
    action: 'Map stock codes using platform-specific format: XSHG/XSHE suffixes for JoinQuant/RiceQuant vs sh/sz prefixes
      for XueQiu'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Orders submitted with incorrect stock code format will fail, as each broker requires its specific code format
  - id: finance-C-103
    when: When deduplicating trade commands to prevent duplicate execution
    action: Generate command cache keys using the combination of strategy_name+stock_code+action+amount+price+datetime
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate trade commands without proper deduplication cause double orders, over-trading, and financial losses
  - id: finance-C-104
    when: When executing UI automation for different broker clients
    action: Use broker-specific control IDs and TITLE strings defined in the broker's config class
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using incorrect control IDs causes automation failures, incorrect data reads, or wrong order submissions
  - id: finance-C-107
    when: When running UI automation-based broker clients
    action: Use Windows OS with pywinauto-compatible desktop environment — UI automation is not supported on Linux/macOS
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Non-Windows environments cause complete failure of UI automation-based broker clients (THS, YH, HT, GJ, etc.)
    stage_ids:
    - trade_following
  - id: finance-C-112
    when: When implementing order execution logic in the follower module for A-share backtesting
    action: Execute each sell orders before buy orders in every transaction batch to verify cash availability for settlement
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the SELL before BUY rule causes insufficient funds errors in live trading since A-shares markets
      settle securities before cash, making backtest results completely non-reproducible in production
    derived_from_bd_id: BD-105
  - id: finance-C-125
    when: When implementing the prepare() authentication sequence
    action: Execute login() before _init_toolbar() in the prepare() method flow — login establishes the session state required
      for UI automation component initialization
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Reversing the login-toolbar order causes authentication failures and UI automation errors, preventing the
      trading system from establishing valid session state for trade execution
    derived_from_bd_id: BD-112
  - id: finance-C-129
    when: When configuring send_interval parameter for trade following with sell-then-buy strategies
    action: Set send_interval to a value greater than 0 to verify sell settlement completes before buy execution — verify
      send_interval allows sufficient time for T+0 fund settlement between sell and buy transactions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: send_interval=0 causes buys to execute before sells settle, violating T+0 same-day fund reuse rules; both
      transactions fail leaving positions in an inconsistent state requiring manual intervention
    derived_from_bd_id: BD-120
  - id: finance-C-158
    when: When implementing cross-platform stock code format transformations
    action: Apply both XueQiu lowercase transformation (BD-034) and JoinQuant/RiceQuant XSHG/XSHE suffix normalization (BD-125)
      simultaneously — these transformations are incompatible and will produce codes that fail on one or both platforms
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Applying both transformations creates codes that neither platform accepts, causing order rejections and missed
      trade opportunities when strategies span multiple platforms
    derived_from_bd_id: BD-131
  - id: finance-C-159
    when: When implementing XueQiu session initialization and maintenance
    action: 'Verify login() completes successfully and fully before calling any configuration or toolbar initialization —
      the heartbeat mechanism depends on valid session state established by login, and any step failure cascades through the
      dependency chain: prepare() → login() → _init_toolbar() → heartbeat() → balance_query()'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incomplete login or wrong ordering causes heartbeat to maintain an invalid session, wasting API calls until
      eventual failure with no clear error indication about which step in the dependency chain failed
    derived_from_bd_id: BD-132
  - id: finance-C-169
    when: When implementing fund management or position settlement logic for China A-shares trading
    action: Enforce transaction delays between sell and buy operations using the send_interval parameter to comply with T+0
      same-day fund reuse restrictions — verify funds from sold positions are not immediately reused for new purchases
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating T+0 same-day fund reuse restrictions causes orders to be rejected by China A-share exchanges, resulting
      in failed trade execution and complete backtest-live inconsistency where live orders fail while backtested orders would
      succeed
    derived_from_bd_id: BD-121
  - id: finance-C-170
    when: When implementing the prepare() initialization sequence in easytrader client
    action: Execute login authentication before loading configuration and initializing _init_toolbar — verify session state
      is established before any config-dependent UI automation setup
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Reversing the login-before-config order breaks the authentication flow, causing UI automation to fail silently
      and preventing the trading system from establishing required session state for broker communication
    derived_from_bd_id: BD-124
  - id: finance-C-176
    when: When implementing IPO auto-fill functionality
    action: 'Use broker-specific IPO quantity field name mapping: ''申购数量'' for default brokers, ''可申购数量'' for HTZQ and UNIVERSAL
      broker types'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using wrong IPO quantity field name causes auto-fill to silently fail, leaving quantity fields empty and
      resulting in failed IPO applications
    derived_from_bd_id: BD-119
  - id: finance-C-178
    when: When implementing trade execution worker architecture
    action: Use queue-based single-threaded processing to verify trades execute in strict FIFO order — do not implement multi-threaded
      or concurrent trade processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Multi-threaded processing breaks FIFO ordering guarantee, causing trades to execute out of sequence which
      leads to incorrect position calculations and potential financial losses in live trading
    derived_from_bd_id: BD-050
  - id: finance-C-180
    when: When implementing position sizing and order quantity validation for Chinese A-share trading
    action: Round order quantities to the nearest 100 shares (1 hand lot) using round(amount, -2) — A-share exchanges reject
      orders not in 100-share increments
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Submitting orders with quantities not in 100-share lots causes exchange rejection, resulting in failed trade
      execution and strategy breakdown in live trading
    derived_from_bd_id: BD-051
  regular:
  - id: finance-C-001
    when: When implementing GUI client trader login automation
    action: Wait for login window to reach 'ready' state before typing credentials into input fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: Typing credentials before window is ready causes ElementNotFoundError and login failure, requiring manual
      intervention to retry authentication
    stage_ids:
    - authentication
  - id: finance-C-002
    when: When connecting to an already-running GUI client via connect()
    action: Omit the exe_path parameter when the client is already logged in and running
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Passing exe_path to connect() when client is already running causes ValueError because the method expects
      no exe_path for already-running clients per clienttrader.py:104-116
    stage_ids:
    - authentication
  - id: finance-C-006
    when: When using pywinauto Application().connect() with exe_path
    action: Set timeout parameter to at least 10 seconds for initial connection attempt
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Timeout too low causes ConnectionRefusedError when trading client takes longer than expected to respond,
      especially on first startup
    stage_ids:
    - authentication
  - id: finance-C-008
    when: When installing MiniQMT trading terminal
    action: Install to C drive without granting administrator privileges to the trading process
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Permission denied errors prevent the trading process from connecting to the QMT terminal, causing complete
      service failure
    stage_ids:
    - authentication
  - id: finance-C-009
    when: When configuring web trader authentication parameters
    action: Provide either config_file OR (user AND password) parameters to prepare(), not both simultaneously
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Passing both config_file and user/password creates ambiguous credential sources and may cause authentication
      failures with misleading error messages
    stage_ids:
    - authentication
  - id: finance-C-010
    when: When using web trader autologin mechanism
    action: Exceed 10 login attempts without intervening, as autologin() raises NotLoginError after limit=10
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Continuous login failures trigger NotLoginError, blocking all trading operations and requiring manual investigation
      of root cause
    stage_ids:
    - authentication
  - id: finance-C-011
    when: When implementing broker login that requires captcha verification
    action: Implement captcha recognition or user prompt before submitting login credentials
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Submitting login without captcha causes authentication failure, as the broker server rejects requests without
      valid verification codes
    stage_ids:
    - authentication
  - id: finance-C-012
    when: When performing web session authentication
    action: Set heartbeat interval to 30 seconds via check_login() sleepy parameter to maintain token validity
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Token expires if heartbeat interval exceeds server-side timeout, causing NotLoginError on subsequent API
      calls and requiring full re-authentication
    stage_ids:
    - authentication
  - id: finance-C-013
    when: When connecting to MiniQMT with stock_account parameter
    action: Pass the correct fund account (资金账号) string to connect() and then to StockAccount constructor
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect stock_account causes subscription failures, and the trader receives no order/trade callbacks despite
      successful connection
    stage_ids:
    - authentication
  - id: finance-C-014
    when: When claiming the system provides real-time trading capability
    action: Claim real-time order execution when using web trader polling mechanism with 30-second heartbeat intervals
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Web session token maintenance uses 30-second polling intervals, which is NOT real-time; order status updates
      have up to 30-second latency
    stage_ids:
    - authentication
  - id: finance-C-020
    when: When implementing grid data extraction for positions and entrusts
    action: return DataFrame with 'security' (证券代码) and 'amount' (当前持仓/委托数量) columns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategy code expecting standardized column names will fail with KeyError, causing position checking and
      order management to break
    stage_ids:
    - account_query
  - id: finance-C-021
    when: When implementing entrust query to retrieve order status
    action: return DataFrame containing 'status' (状态说明) column for order state tracking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Order tracking and cancellation logic will fail without status column, causing inability to determine if
      orders are filled, pending, or cancelled
    stage_ids:
    - account_query
  - id: finance-C-023
    when: When selecting grid extraction method for a specific broker
    action: select specified strategy from Copy/WMCopy/Xls based on broker clipboard restrictions
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Grid data extraction will fail silently or return empty data when Copy strategy is used on brokers that block
      clipboard operations
    stage_ids:
    - account_query
  - id: finance-C-025
    when: When implementing grid data retrieval
    action: delegate grid extraction to grid_strategy_instance.get() following Strategy pattern
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct grid access bypassing strategy pattern will break per-broker customization, causing extraction failures
      on brokers requiring different methods
    stage_ids:
    - account_query
  - id: finance-C-027
    when: When refreshing account data before querying
    action: call refresh() method to update UI data before balance/position/entrust queries
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Returned data will be stale and not reflect current market state, leading to incorrect trading decisions
      based on outdated position and balance information
    stage_ids:
    - account_query
  - id: finance-C-028
    when: When using clipboard-based grid extraction (Copy strategy)
    action: handle captcha dialogs that may appear during Ctrl+A Ctrl+C operations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Clipboard operations will hang indefinitely waiting for captcha input when brokers display verification dialogs,
      causing account queries to block or timeout
    stage_ids:
    - account_query
  - id: finance-C-029
    when: When querying account balance through the trading client
    action: claim that returned balance reflects real-time exchange data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Balance data reflects client UI state which has inherent polling delays, not real-time exchange positions,
      causing overconfidence in data freshness for live trading decisions
    stage_ids:
    - account_query
  - id: finance-C-030
    when: When returning position or entrust data from grid extraction
    action: guarantee that returned data is complete without checking for empty grids
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Empty grids will return empty DataFrames without error indication, causing downstream logic to assume zero
      positions when the query actually failed
    stage_ids:
    - account_query
  - id: finance-C-031
    when: When implementing broker-specific grid strategy selection
    action: override grid_strategy class attribute when broker requires Xls instead of Copy method
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Grid data extraction will fail completely when Copy strategy is used on brokers that block clipboard operations,
      returning empty position/entrust lists
    stage_ids:
    - account_query
  - id: finance-C-032
    when: When implementing refresh strategy for data updates
    action: use refresh_strategy property to trigger UI refresh before querying account data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Account queries will return stale data if UI is not refreshed first, causing incorrect balance and position
      calculations for trading decisions
    stage_ids:
    - account_query
  - id: finance-C-037
    when: When handling popup dialogs after order submission
    action: Extract entrust_no from '委托成功' popup message using regex pattern [\da-zA-Z]+
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without entrust_no, order cancellation is impossible and trade tracking fails - orphaned positions accumulate
      in live trading
    stage_ids:
    - order_execution
  - id: finance-C-039
    when: When calculating prices for buy orders with slippage
    action: 'Apply asymmetric slippage: multiply buy price by (1 + slippage) to overestimate cost'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Symmetric slippage on buys causes underestimation of costs, leading to insufficient capital allocation and
      failed orders in live trading
    stage_ids:
    - order_execution
  - id: finance-C-040
    when: When calculating prices for sell orders with slippage
    action: 'Apply asymmetric slippage: multiply sell price by (1 - slippage) to underestimate proceeds'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Symmetric slippage on sells causes overestimation of proceeds, leading to capital allocation based on unrealizable
      returns
    stage_ids:
    - order_execution
  - id: finance-C-041
    when: When executing market orders in order_execution
    action: Use regex matching for market order type selection to handle flexible ComboBox options
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Exact string matching fails on different broker UIs with slight variations in market order type labels, causing
      TypeError and order failure
    stage_ids:
    - order_execution
  - id: finance-C-042
    when: When submitting sell orders in automated trading
    action: Adjust sell amount to available position (multiple of 100) when _adjust_sell is enabled
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Attempting to sell more shares than available causes rejection, breaking strategy execution and leaving unsold
      positions
    stage_ids:
    - order_execution
  - id: finance-C-043
    when: When using pywinauto-based UI automation for trading
    action: Wait 0.5 seconds before checking for popup dialogs to allow UI rendering
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Race condition causes is_exist_pop_dialog() to return False prematurely, missing error dialogs and reporting
      false success
    stage_ids:
    - order_execution
  - id: finance-C-044
    when: When executing trades via client trader UI automation
    action: Use ClientTrader with active trading client for order execution - it is not a web API
    severity: high
    kind: resource_boundary
    modality: must
    consequence: ClientTrader requires Windows desktop environment with running broker application - cannot run on headless
      servers or Linux systems
    stage_ids:
    - order_execution
  - id: finance-C-045
    when: When selecting market order types
    action: Verify requested market order type exists in broker's supported list
    severity: high
    kind: resource_boundary
    modality: must
    consequence: TypeError raised when market order type is not found in ComboBox options after 10 retry attempts, preventing
      market order submission
    stage_ids:
    - order_execution
  - id: finance-C-046
    when: When validating order rejection scenarios
    action: 'Handle specific error conditions: insufficient balance, stock not held, suspended/delisted stocks'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Uncaught TradeError exceptions crash the trading thread, leaving subsequent orders unexecuted and strategy
      incomplete
    stage_ids:
    - order_execution
  - id: finance-C-047
    when: When claiming live trading capability
    action: Claim real-time trading capability for clienttrader-based execution
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: ClientTrader uses polling-based UI automation with inherent latency (0.5s+ per check) - not suitable for
      high-frequency or latency-sensitive strategies
    stage_ids:
    - order_execution
  - id: finance-C-048
    when: When presenting order execution results
    action: Present entrust_no as confirmed execution - it only indicates order submission
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: entrust_no confirms broker accepted the order but does not guarantee execution at requested price or quantity
      - partial fills possible
    stage_ids:
    - order_execution
  - id: finance-C-049
    when: When implementing order retry logic in trading loops
    action: Skip TradeError logging and retry without investigation
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Silent retry of failed orders without error analysis masks systemic issues (insufficient margin, suspended
      stock) leading to repeated failures
    stage_ids:
    - order_execution
  - id: finance-C-054
    when: When following simulated trading strategies
    action: Claim real-time trading capability when using polling-based HTTP requests
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting polling-based trade mirroring as real-time trading leads to incorrect expectations about
      execution speed and signal latency
    stage_ids:
    - trade_following
  - id: finance-C-055
    when: When mirroring platform trades to real accounts
    action: Claim that backtest or simulated strategy returns guarantee live trading results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting simulated platform performance as expected live trading results ignores slippage, execution latency,
      and market impact differences
    stage_ids:
    - trade_following
  - id: finance-C-056
    when: When configuring XueQiu portfolio tracking
    action: Set total_assets to at least 1000 yuan to meet minimum requirement
    severity: high
    kind: domain_rule
    modality: must
    consequence: Asset calculation with values below 1000 yuan produces incorrect position sizing, causing trades with wrong
      amounts
    stage_ids:
    - trade_following
  - id: finance-C-059
    when: When implementing trade command caching for idempotent restarts
    action: Enable cmd_cache=True to persist executed commands to disk via pickle
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without cmd_cache, program restarts cause duplicate trade execution for previously processed commands, potentially
      doubling position sizes
    stage_ids:
    - trade_following
  - id: finance-C-060
    when: When processing sell-then-buy sequences in rapid succession
    action: Set send_interval > 0 to verify sell orders complete before buy credit arrives
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without send_interval delay, buy orders may execute before sell order proceeds are credited, causing insufficient
      funds errors and order rejections
    stage_ids:
    - trade_following
  - id: finance-C-061
    when: When configuring trade command expiration
    action: Set trade_cmd_expire_seconds to discard signals older than 120 seconds
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Stale signals from delayed platform polling may execute against outdated market conditions, causing incorrect
      position sizing and losses
    stage_ids:
    - trade_following
  - id: finance-C-062
    when: When executing trades against broker APIs
    action: Use slippage adjustment asymmetrically (buy * (1+slip), sell * (1-slip))
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without asymmetric slippage, buy orders may execute at worse prices than expected while sells execute at
      better prices, systematically disadvantaging the account
    stage_ids:
    - trade_following
  - id: finance-C-063
    when: When implementing XueQiu portfolio position adjustment
    action: Enable adjust_sell=True to cap sell orders at actual available holdings
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without adjust_sell, sell orders exceeding actual holdings will be rejected, causing portfolio replication
      failure and position drift
    stage_ids:
    - trade_following
  - id: finance-C-064
    when: When implementing trade command deduplication
    action: Generate command cache key from strategy+stock+action+amount+price+datetime
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incomplete cache key allows duplicate commands to be re-executed, causing double trades and incorrect position
      sizing
    stage_ids:
    - trade_following
  - id: finance-C-065
    when: When polling XueQiu for portfolio net value
    action: Calculate total assets as initial_assets * net_value for dynamic scaling
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using fixed total_assets without net_value scaling causes incorrect position sizing as portfolio value changes
      over time
    stage_ids:
    - trade_following
  - id: finance-C-066
    when: When handling HTTPS requests to trading platforms
    action: Disable SSL verification (verify=False) without acknowledging security implications
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Disabling SSL verification exposes trade signals and credentials to man-in-the-middle attacks during polling
    stage_ids:
    - trade_following
  - id: finance-C-067
    when: When using daemon threads for trade execution workers
    action: Verify main program waits for worker completion or accepts abrupt termination
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Daemon threads are terminated when main program exits, potentially leaving pending trades uncompleted
    stage_ids:
    - trade_following
  - id: finance-C-068
    when: When writing RemoteClient HTTP request handlers
    action: Convert HTTP status codes >= 300 to TradeError exceptions by parsing response.json()['error']
    severity: high
    kind: domain_rule
    modality: must
    consequence: HTTP errors are silently swallowed and debugging becomes impossible without proper exception conversion from
      HTTP status codes
    stage_ids:
    - remote_service
  - id: finance-C-069
    when: When implementing Flask server endpoint error handling
    action: Wrap each Flask route handlers with error_handle decorator that catches exceptions and returns JSON error responses
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unhandled exceptions cause Flask to return HTML error pages instead of structured JSON, breaking RemoteClient
      error parsing
    stage_ids:
    - remote_service
  - id: finance-C-072
    when: When implementing RemoteClient methods
    action: Mirror the local ClientTrader interface exactly, including method signatures and return value formats
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies written for local traders fail or produce incorrect results when switching to RemoteClient due
      to interface mismatches
    stage_ids:
    - remote_service
  - id: finance-C-073
    when: When accessing server endpoints before authentication
    action: Access trading endpoints without calling prepare() first to establish authenticated session
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Server raises KeyError when accessing global_store['user'] before prepare() login, causing 500 Internal Server
      Error
    stage_ids:
    - remote_service
  - id: finance-C-075
    when: When running the server
    action: Keep the server process running continuously as RemoteClient operations depend on live server connection
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Server shutdown causes all RemoteClient operations to fail with connection errors, disrupting automated trading
      strategies
    stage_ids:
    - remote_service
  - id: finance-C-077
    when: When claiming remote trading capabilities
    action: Claim that RemoteClient operations have the same reliability as local ClientTrader operations
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Remote HTTP calls are subject to network latency, timeouts, and connection failures not present in local
      operations; presenting equivalent reliability claims is misleading
    stage_ids:
    - remote_service
  - id: finance-C-080
    when: When passing position data from account_query to trade_following stage
    action: Format stock_code field as 'sh' or 'sz' prefix followed by 6-digit code (e.g., 'sh600000', 'sz000001') compatible
      with _adjust_sell_amount lookup
    severity: high
    kind: domain_rule
    modality: must
    consequence: _adjust_sell_amount will fail to find matching positions, causing incorrect sell amounts that may exceed
      available holdings or miss selling altogether
    stage_ids:
    - account_query
    - trade_following
  - id: finance-C-081
    when: When passing position data from account_query to trade_following stage
    action: Include stock_code field in each position record for adjust_sell calculation lookup
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Adjust sell feature will silently fall back to original amount without stock_code, potentially causing over-trading
      beyond available holdings
    stage_ids:
    - account_query
    - trade_following
  - id: finance-C-085
    when: When passing trade commands from trade_following to order_execution stage
    action: Include trade_cmd['datetime'] with timezone-aware datetime for expiration check (now - datetime <= expire_seconds)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Trade commands may execute with stale signals if datetime is missing or timezone-naive, causing trades based
      on outdated strategy decisions
    stage_ids:
    - trade_following
    - order_execution
  - id: finance-C-088
    when: When passing trade parameters from remote_service to order_execution stage
    action: Format security code to extract last 6 digits before UI input (security[-6:])
    severity: high
    kind: domain_rule
    modality: must
    consequence: Market trade will fail to input security code correctly, causing trades to be submitted for wrong stocks
    stage_ids:
    - remote_service
    - order_execution
  - id: finance-C-089
    when: When passing trade parameters from remote_service to order_execution stage
    action: Convert amount parameter to integer before passing to trader (amount must be round lot divisible by 100 for Chinese
      stocks)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Exchange will reject non-integer or non-round-lot amounts, causing missed trade opportunities
    stage_ids:
    - remote_service
    - order_execution
  - id: finance-C-090
    when: When implementing trade command expiration across trade_following to order_execution edge
    action: Allow trade_cmd_expire_seconds to be set to 0 or extremely large values (e.g., 100000000000 as seen in docs/follow.md:40)
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Zero expiration defeats the purpose of signal freshness; extreme values allow very stale signals to execute,
      causing trades based on outdated strategy decisions
    stage_ids:
    - trade_following
    - order_execution
  - id: finance-C-091
    when: When following external platform strategies across remote service connections
    action: Claim real-time execution capability since system uses polling-based tracking (track_interval defaults to 1-10
      seconds)
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users may expect immediate signal execution but actual execution latency equals track_interval, causing confusion
      about system performance
    stage_ids:
    - trade_following
  - id: finance-C-092
    when: When passing trade commands between stages
    action: Process sell transactions before buy transactions in order_transactions_sell_first to prevent insufficient funds/holdings
      errors
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Buying before selling may cause insufficient funds error, or selling before buying with sell-first adjustment
      may cause holdings check mismatch
    stage_ids:
    - trade_following
    - order_execution
  - id: finance-C-093
    when: When using slippage calculation across trade_following to order_execution edge
    action: Apply slippage as percentage (1 + slippage) for buy and (1 - slippage) for sell, not as absolute value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect slippage application will either overpay on buys or undersell, systematically losing value on every
      trade
    stage_ids:
    - trade_following
    - order_execution
  - id: finance-C-098
    when: When calculating slippage-adjusted trade prices
    action: 'Apply asymmetric slippage: multiply buy prices by (1+slippage) and sell prices by (1-slippage)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using symmetric slippage inflates buy costs and reduces sell proceeds, leading to systematic performance
      degradation and incorrect backtesting results
  - id: finance-C-099
    when: When presenting or reporting this system's backtested/simulated returns to users
    action: Claim that simulated trading returns equal expected live trading returns — backtesting ignores market impact,
      financing costs, execution delays, and slippage model limitations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated simulated returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-100
    when: When claiming this system's trading capabilities
    action: Claim real-time trading support — this system uses HTTP polling with intervals of seconds to minutes, not true
      real-time execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting sub-second execution will experience significant latency, causing missed opportunities and
      failed high-frequency trading strategies
  - id: finance-C-101
    when: When deploying this system in production environments
    action: Claim this system is production-ready without implementing proper error handling, reconnection logic, and broker
      disconnection recovery
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Broker disconnections without proper handling cause order execution failures, lost trades, and potential
      financial losses in live trading
  - id: finance-C-102
    when: When ordering follower transactions for execution
    action: Process each SELL orders before BUY orders in the same batch to verify cash availability
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Executing buys before sells may cause insufficient cash errors, failed buy orders, and inability to complete
      the rebalancing plan
  - id: finance-C-105
    when: When submitting market orders
    action: Map market order types per exchange (SH/SZ) using the broker-specific MARKET_ORDER_TYPE_NAME_MAP
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using SH market order types for SZ stocks or vice versa causes order rejection and failed trades
  - id: finance-C-106
    when: When using MiniQMT trading interface
    action: Connect to MiniQMT in minimal/standalone trading mode (极简模式/独立交易模式) — the system will fail to connect otherwise
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Connection failures prevent any trading operations through MiniQMT, requiring manual intervention to restart
      the trading session
  - id: finance-C-108
    when: When initializing the prepare() method for client traders
    action: Execute login before loading configuration from config file — login establishes the session required for subsequent
      operations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Loading config before login causes session initialization failures, preventing any trading operations
  - id: finance-C-109
    when: When following strategies with sell-then-buy rebalancing
    action: Set send_interval > 0 to allow time for sell orders to settle before executing buy orders
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without send_interval, buys may execute before sells settle, causing insufficient cash errors and failed
      buy orders
  - id: finance-C-110
    when: When tracking XueQiu portfolios with percentage-based rebalancing
    action: Enable adjust_sell=True to adjust sell amounts based on actual holdings, preventing overselling
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without adjust_sell, percentage rounding errors cause sell orders exceeding actual holdings, leading to failed
      trades
  - id: finance-C-111
    when: When storing command cache files
    action: Store cmd_cache.pk in the current working directory — cache is not portable across different execution directories
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Different working directories prevent cache sharing, causing duplicate trade execution when restarting the
      program from different locations
    stage_ids:
    - trade_following
  - id: finance-C-113
    when: When implementing or refactoring authentication logic in BaseLoginClientTrader subclass hierarchy
    action: Maintain the distinction between auto-login mode and connect-only mode — do not merge login() and connect() into
      a single unified method
    severity: high
    kind: domain_rule
    modality: must
    consequence: Merging auto-login and connect-only modes into a single method breaks pre-authenticated session handling,
      causing unnecessary re-authentication overhead and breaking clients that manage credentials externally
    derived_from_bd_id: BD-001
  - id: finance-C-114
    when: When implementing or modifying web trader session management
    action: Maintain the heartbeat thread that sends keepalive signals every 30 seconds to prevent server-side token expiration
      — do not remove or disable this background thread
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Removing or disabling the heartbeat thread causes session tokens to expire, resulting in forced logouts and
      interrupted automated trading operations during long-running backtests
    derived_from_bd_id: BD-002
  - id: finance-C-115
    when: When implementing grid data extraction logic for broker account queries
    action: Use the strategy pattern with separate Copy/WMCopy/Xls handlers for broker-specific grid data extraction — do
      not consolidate into a single universal extraction method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using a single extraction method across all brokers causes data parsing failures since different terminal
      types use distinct clipboard and export mechanisms (plain Copy, Windows Metafile Copy, or Excel export)
    derived_from_bd_id: BD-004
  - id: finance-C-116
    when: When parsing grid CSV data from broker exports in account query operations
    action: Use broker-specific GRID_DTYPE mapping instead of pandas default dtype inference to correctly handle Chinese column
      headers and numeric format variations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using pandas default dtype inference on broker CSV exports causes silent parsing errors and incorrect numeric
      interpretation due to inconsistent Chinese headers and decimal separators between broker data formats
    derived_from_bd_id: BD-006
  - id: finance-C-117
    when: When implementing grid data transfer for YHClientTrader in clipboard-disabled environments
    action: Use XLS export strategy instead of Copy strategy for YHClientTrader — Copy strategy fails in clipboard-disabled
      environments (headless servers, restricted Windows policies)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using Copy strategy in clipboard-disabled environments causes grid data transfer failures, making account
      queries return empty or malformed data without obvious error indication
    derived_from_bd_id: BD-106
  - id: finance-C-118
    when: When implementing account balance retrieval logic
    action: Extract balance from Static controls (_get_balance_from_statics) rather than parsing the transactional grid —
      Static controls provide pre-formatted accurate balance without grid formatting complexity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Extracting balance from grid risks reading unformatted or inconsistent data, leading to incorrect capital
      calculations and potential overtrading or undertrading relative to actual account balance
    derived_from_bd_id: BD-005
  - id: finance-C-119
    when: When implementing price adjustment logic for trade orders
    action: 'Apply asymmetric slippage: multiply buy price by (1 + slippage) and sell price by (1 - slippage) — this directional
      asymmetry protects follower capital against market microstructure'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using symmetric slippage on both sides eliminates directional risk protection, systematically overestimating
      sell proceeds and underestimating buy costs, causing backtest-live discrepancy
    derived_from_bd_id: BD-010
  - id: finance-C-120
    when: When using the default send_interval parameter for sell-then-buy sequencing
    action: Verify that send_interval=0 is sufficient for your broker's settlement speed before executing buy orders after
      sells — some brokers require longer settlement windows (30-60 seconds typical)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default send_interval=0 without broker verification may cause buy orders to execute before sell proceeds
      are credited, leading to insufficient funds errors or margin calls
    derived_from_bd_id: BD-016
  - id: finance-C-121
    when: When using the default trade command expiration TTL of 120 seconds
    action: Verify that cmd_expiration=120 matches your data feed latency characteristics — high-frequency strategies with
      sub-minute latency requirements may need shorter TTL values
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 120-second TTL may cause valid trading signals to expire before execution during high-volatility
      periods, resulting in missed trade opportunities and strategy underperformance
    derived_from_bd_id: BD-014
  - id: finance-C-122
    when: When implementing trade execution price adjustments
    action: 'Apply directional slippage multipliers: buy orders use (1 + slippage) and sell orders use (1 - slippage) — this
      reflects real market asymmetry where buyers pay more due to price impact and spreads while sellers receive less'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying symmetric slippage to both directions misrepresents market microstructure, systematically overestimating
      strategy profitability by 1-3% in backtests compared to live execution
    derived_from_bd_id: BD-107
  - id: finance-C-123
    when: When requesting historical market data for any timestamp in backtesting
    action: Assume point-in-time data availability is guaranteed for any historical date — the framework does not implement
      point-in-time data validation and will fail silently when data is unavailable
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time validation, backtests produce results based on survivorship-biased or forward-filled
      data, making strategy performance claims unreliable and non-reproducible
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-124
    when: When loading historical market data for backtesting
    action: 'Implement point-in-time availability checks before each historical data request: verify data exists for the exact
      timestamp, check for survivorship bias, and validate no forward-filled values'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit availability checks, backtest results claim accuracy they don't have due to survivorship
      bias and look-ahead contamination from unavailable data being replaced with stale snapshots
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-126
    when: When implementing order submission logic in order_execution
    action: Use the popup dialog handler pattern (_handle_pop_dialogs) to detect and process modal confirmation/rejection
      dialogs before proceeding with order execution; extract entrust_no from success dialogs and raise TradeError for failure
      dialogs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without dialog handling, order submissions proceed without confirming acceptance, causing silent order failures
      where trades execute without entrust_no tracking and positions become inconsistent
    derived_from_bd_id: BD-009
  - id: finance-C-127
    when: When processing a batch of mixed sell and buy orders in order_execution
    action: Execute sell orders first to release capital before buy orders — use order_transactions_sell_first pattern to
      sequence transactions correctly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Buy-before-sell execution creates hidden leverage when capital is insufficient; buys may be rejected due
      to unsettled funds from pending sells, causing rebalancing failures and portfolio drift
    derived_from_bd_id: BD-023
  - id: finance-C-128
    when: When calculating order amounts for A-share equity trading in order_execution
    action: Round order amounts to the nearest 100 shares using Round(-2) — A-share market regulations mandate 100-share trading
      lots and orders not divisible by 100 are rejected by exchanges
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failing to round to 100-share lots causes exchange rejection of orders; strategies using fractional share
      calculations will fail entirely in live trading while appearing valid in backtests
    derived_from_bd_id: BD-011
  - id: finance-C-130
    when: When designing sell-then-buy strategies that rely on sell-first ordering (BD-105) with configurable send_interval
      (BD-016)
    action: Verify send_interval is configured to exceed the minimum settlement time required for T+0 compliance; document
      the relationship between send_interval and T+0 fund availability in strategy configuration
    severity: high
    kind: operational_lesson
    modality: must
    consequence: 'Risk cascade: sell-first ordering combined with send_interval=0 causes buys to execute against unsettled
      funds; both sell and buy transactions fail leaving the strategy stuck in an incomplete state'
    derived_from_bd_id: BD-135
  - id: finance-C-131
    when: When implementing authentication and session initialization for trading operations
    action: Assume that random seed is automatically initialized or seeded by the framework — the framework does not implement
      comprehensive random seed initialization
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit random seed initialization, reproducibility of backtest results and strategy simulations
      cannot be guaranteed across different runtime environments
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-132
    when: When implementing authentication and session initialization for trading operations
    action: Explicitly set random seed at strategy initialization using a fixed value (e.g., random.seed(42)) to verify reproducible
      backtest results; document the seed value used in strategy configuration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit random seed setting, backtest results vary across runs due to non-deterministic behavior
      in strategy calculations and simulations
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-133
    when: When implementing balance retrieval for YH (Yonghe) broker client
    action: Configure YHClientTrader with BALANCE_GRID_CONTROL_ID=1308 for grid-based balance queries — other brokers use
      different control IDs and this value is not universal
    severity: high
    kind: domain_rule
    modality: must
    consequence: Balance retrieval fails on YH platform when BALANCE_GRID_CONTROL_ID is missing or incorrect; users cannot
      query account balance to verify available funds
    derived_from_bd_id: BD-118
  - id: finance-C-134
    when: When implementing cancel entrust logic across different brokers
    action: Use broker-specific configuration to map contract/entrust number field names (e.g., 合同编号) before executing cancel
      operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cancel entrust operations will fail or match wrong orders if the broker-specific contract number field mapping
      is not configured, causing orders to remain open and accumulate execution risk
    derived_from_bd_id: BD-026
  - id: finance-C-135
    when: When implementing trade command persistence for follower crash recovery
    action: Use pickle serialization for command cache storage to preserve Python object structure across process restarts
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing pickle with JSON serialization will corrupt cached trade commands containing complex Python objects,
      causing duplicate orders during crash recovery replay
    derived_from_bd_id: BD-031
  - id: finance-C-136
    when: When processing trade commands in follower mode
    action: Verify that 120-second command expiration threshold matches the target market's order timeout requirements and
      adjust if trading venues have different timeout policies
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Commands executed after 120 seconds may execute at outdated prices, causing losses in volatile markets where
      order book state changes significantly within minutes
    derived_from_bd_id: BD-032
  - id: finance-C-137
    when: When calculating XueQiu portfolio total assets from net value data
    action: Multiply initial assets by net value (total_assets = initial_assets × net_value) to derive current portfolio value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect asset calculation formula causes wrong position sizing and risk management decisions, leading to
      overtrading or undertrading relative to intended allocation
    derived_from_bd_id: BD-035
  - id: finance-C-138
    when: When implementing slippage adjustment for trade execution
    action: 'Apply asymmetric slippage: multiply buy prices by (1+slippage) and sell prices by (1-slippage) to account for
      adverse price movement during execution'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Symmetric slippage application causes orders to be rejected at realistic execution prices or underestimates
      transaction costs, creating false confidence in backtest results
    derived_from_bd_id: BD-022
  - id: finance-C-139
    when: When calculating cash positions across different broker platforms
    action: Verify balance calculation semantics for each broker type; check whether frozen_cash exists and whether market
      value is included in balance calculation before making capital availability assumptions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Cross-broker inconsistency causes silent balance calculation errors; users switching between MiniQMT and
      HTZQ may incorrectly assess available capital, leading to overtrading or margin calls
    derived_from_bd_id: BD-138
  - id: finance-C-140
    when: When processing order settlement in backtesting
    action: Assume the framework handles settlement and delivery time tracking — the framework does not implement explicit
      settlement timing controls
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without settlement time handling, backtests may allow same-day round-trip trades for markets with T+1 or
      longer settlement cycles, making backtest results completely non-reproducible in live trading
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-141
    when: When implementing or verifying order processing logic
    action: 'Implement explicit settlement tracking: check order_type against market settlement rules (T+0, T+1, T+2), verify
      delivery_time >= order_time + settlement_period before allowing offsetting trades'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing settlement time controls causes the system to execute same-day reversals that violate market settlement
      rules, resulting in regulatory violations and failed live trades
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-142
    when: When validating portfolio data in XueQiu follower module
    action: Use minimum total assets threshold of 1000 CNY to filter out negligible portfolios before processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Portfolios below 1000 CNY may contain rounding artifacts or test accounts; including them causes misleading
      average return calculations and distorts strategy performance metrics
    derived_from_bd_id: BD-037
  - id: finance-C-143
    when: When implementing captcha recognition for brokerage login
    action: Use binarization threshold of 200 (0-199 = black, 200-255 = white) for grayscale captcha image processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect binarization threshold causes captcha recognition failures; threshold below 200 introduces
      noise causing false positives, threshold above 200 loses character detail causing rejection
    derived_from_bd_id: BD-038
  - id: finance-C-144
    when: When detecting stock exchange type from stock code in trade routing
    action: 'Identify exchange based on code prefix: Shanghai (SH) for codes starting with 5/6/7/9, Shenzhen (SZ) for codes
      starting with 0/1/2/3, Beijing (BJ) for codes starting with 4/8/9'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect exchange detection causes orders to be routed to wrong exchange resulting in immediate rejection;
      missed trading opportunities and potential slippage when resubmitting
    derived_from_bd_id: BD-028
  - id: finance-C-145
    when: When converting order amount from decimal to integer share quantity
    action: Truncate decimal portion (not round) to verify integer share count does not exceed requested amount
    severity: high
    kind: domain_rule
    modality: must
    consequence: Rounding instead of truncating may request more shares than intended; Chinese A-share markets reject orders
      with fractional shares causing order rejection and missed fills
    derived_from_bd_id: BD-029
  - id: finance-C-146
    when: When submitting weight adjustments to XueQiu API
    action: Round weight values to exactly 2 decimal places before API submission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Weights with more than 2 decimal places cause API rejection; rejected weight adjustments leave portfolio
      allocation unchanged causing tracking divergence from target strategy
    derived_from_bd_id: BD-074
  - id: finance-C-147
    when: When checking order status to determine if cancellation is possible
    action: Match entrust status against exact string 'pending' to identify cancellable orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using partial match or case-insensitive comparison on status field causes incorrect identification of order
      state; attempting to cancel non-pending orders returns errors and leaves unwanted positions open
    derived_from_bd_id: BD-075
  - id: finance-C-149
    when: When implementing or modifying the slippage model in trading backtesting
    action: 'Apply asymmetric slippage adjustment: buy prices must be adjusted upward by slippage factor, sell prices must
      be adjusted downward — do not use symmetric adjustment where both buy and sell move in the same direction'
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Symmetric slippage inverts the model's directional assumptions, causing buys to appear cheaper and sells
      to appear more profitable than in real markets, leading to backtest results that systematically overstate performance
    derived_from_bd_id: BD-081
  - id: finance-C-150
    when: When implementing position adjustment logic in xq_follower project_transactions
    action: Calculate sell quantity as the absolute value of negative weight differences (target minus previous holding) —
      positive difference means increase (buy), negative means decrease (sell)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrectly calculating sell quantities reverses the order type, causing buy orders to execute as sells and
      vice versa; this inverts portfolio rebalancing logic, leading to massive position drift and financial losses in live
      trading
    derived_from_bd_id: BD-072
  - id: finance-C-151
    when: When retrieving account balance for ClientTrader platform
    action: Access frozen_cash field on ClientTrader balance object — this field does not exist in ClientTrader implementation
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Attempting to access frozen_cash on ClientTrader raises AttributeError at runtime, breaking order sizing
      logic that depends on available funds calculation; MiniQMT exposes this field but ClientTrader does not
    derived_from_bd_id: BD-076
  - id: finance-C-152
    when: When calculating stock purchase quantities in xq_follower project_transactions
    action: Round calculated share amounts to the nearest 100-share lot increment using standard rounding, not floor or ceiling
      truncation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using floor division instead of nearest-rounding causes systematic under-sizing of buy orders, leaving residual
      cash that compounds over many trades into significant opportunity cost; using ceiling causes over-spending beyond target
      weights
    derived_from_bd_id: BD-083
  - id: finance-C-153
    when: When adjusting sell orders to available holdings in xq_follower _adjust_sell_amount
    action: Use floor division to constrain sell orders to complete 100-share lot increments — any fractional remainder is
      excluded from the sell order
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attempting to sell fractional lots causes order rejection by Chinese A-share exchanges, breaking the backtesting
      pipeline; floor division ensures only executable complete lots are submitted while rounding or ceiling methods would
      attempt non-existent fractional sales
    derived_from_bd_id: BD-084
  - id: finance-C-154
    when: When using the framework's default 100-share lot rounding for position sizing
    action: Verify that 100-share rounding matches the actual exchange trading lot requirements for your target market; Chinese
      A-shares require integer lot trading, but other markets may allow odd lots or fractional shares
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: 'Applying 100-share rounding to markets with different lot requirements causes position sizing errors: rounding
      down leaves cash uninvested in single-stock strategies, rounding up attempts to buy non-existent shares, distorting
      backtest results from actual execution'
    derived_from_bd_id: BD-083
  - id: finance-C-155
    when: When implementing sell order adjustment logic in the follower module
    action: Verify that holdings are already in lot increments before applying floor division adjustment; if holdings contain
      fractional shares, investigate the source data quality before relying on the adjustment logic
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Floor division silently excludes any remainder from sell orders, assuming holdings are clean lot multiples;
      if source data contains fractional shares (e.g., from corporate actions), the remainder is never sold, creating phantom
      positions and cash reconciliation failures
    derived_from_bd_id: BD-084
  - id: finance-C-156
    when: When implementing position rebalancing or transaction generation logic
    action: 'Use sign comparison of weight difference to determine trade direction: negative difference (underweight) triggers
      buy, positive difference (overweight) triggers sell, zero difference produces no trade'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reversing sign comparison would invert buy/sell signals, causing the strategy to sell underweight positions
      and buy overweight positions — opposite of mean-reversion logic, leading to systematic losses
    derived_from_bd_id: BD-103
  - id: finance-C-157
    when: When parsing broker grid data extracted via clipboard operations
    action: Validate GRID_DTYPE mappings after broker software updates, as broker UI format changes will cause pandas parsing
      to fail silently or raise exceptions
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Stale GRID_DTYPE mappings after broker updates cause silent parsing failures or exceptions, resulting in
      incomplete position data and incorrect order sizing in live trading
    derived_from_bd_id: BD-130
  - id: finance-C-160
    when: When calculating remaining portfolio weight using complement arithmetic (100 minus sum of position weights)
    action: Validate that input position weights sum correctly and represent actual portfolio state before computing remaining
      weight — check for data synchronization issues, stale prices, or manual overrides that could produce garbage-in garbage-out
      errors
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Inaccurate input weights produce incorrect remaining weight calculations, leading to over-allocation or under-allocation
      of capital in live trading positions
    derived_from_bd_id: BD-090
  - id: finance-C-161
    when: When recognizing captcha images using the fixed threshold binarization method
    action: Verify captcha recognition accuracy after broker or source system updates, as fixed threshold of 200 assumes consistent
      captcha generation brightness — monitor recognition error rates and adjust threshold if brightness characteristics change
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Fixed threshold of 200 becomes misaligned with actual captcha brightness after source system updates, causing
      recognition failures that block automated trading operations
    derived_from_bd_id: BD-091
  - id: finance-C-162
    when: When processing captcha images for noise removal via brightness thresholding
    action: Verify that captcha images maintain consistent brightness characteristics, as pixels below 100 brightness are
      converted to white (256) — monitor for recognition failures that indicate brightness drift in source system captcha
      generation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Source system brightness changes cause the 100-brightness threshold to misclassify noise versus actual captcha
      content, reducing recognition accuracy and blocking automated operations
    derived_from_bd_id: BD-092
  - id: finance-C-163
    when: When isolating captcha digit regions using gray value range mapping
    action: Test captcha recognition against a sample set of actual captchas, as gray value range 68-90 for digit mapping
      is empirically tuned and may misclassify digits with unusual shading or contrast variations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Empirically tuned gray range boundaries cause digit misclassification when captcha appearance varies, leading
      to recognition errors that block trading automation
    derived_from_bd_id: BD-093
  - id: finance-C-164
    when: When applying median filtering to captcha images for noise reduction
    action: Monitor captcha recognition accuracy, as two median filter iterations is the empirically determined balance between
      noise reduction and edge preservation — additional passes would blur digit edges and reduce recognition accuracy
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Changing median filter iteration count degrades captcha recognition accuracy, either leaving noise (too few
      passes) or blurring digit edges (too many passes), blocking automated trading operations
    derived_from_bd_id: BD-094
  - id: finance-C-167
    when: When implementing stale command detection logic that compares trade_cmd datetime with system time
    action: Synchronize system datetime with signal source API time; implement cross-validation that flags timing mismatches
      exceeding 30 seconds rather than relying solely on trade_cmd datetime for expiration checks
    severity: high
    kind: domain_rule
    modality: must
    consequence: When signal source time differs from local system time (timezones, clock drift, API latency), the 120-second
      expiration threshold becomes unreliable; fresh commands may be rejected as stale and stale commands may execute as valid
    derived_from_bd_id: BD-136
  - id: finance-C-168
    when: When configuring distributed systems where different components may have clock skew
    action: Use NTP synchronization across each system components; add logging of datetime comparison deltas to detect timing
      mismatches early
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Distributed systems with clock skew cause hidden timing mismatches that make stale command detection unreliable,
      leading to either premature command rejection or execution of truly stale commands
    derived_from_bd_id: BD-136
  - id: finance-C-171
    when: When implementing restart or recovery logic for the follower system
    action: Implement command cache using composite key (strategy+stock+action+amount+price+datetime) persisted via pickle
      storage — skip already-executed commands on restart to verify idempotent recovery
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without command cache, system restarts cause duplicate trade execution because the follower cannot distinguish
      already-executed commands from new signals, resulting in unintended double position sizes and potential margin calls
    derived_from_bd_id: BD-013
  - id: finance-C-172
    when: When implementing trade signal processing and order execution in the follower system
    action: Use queue-based decoupling between producer threads (signal polling) and consumer thread (order execution) — maintain
      separate trade_worker thread consuming from shared queue to enable batch processing without blocking
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Removing queue-based decoupling causes synchronous execution where signal polling blocks on order submission,
      resulting in delayed order execution during high-volume periods and missed trading opportunities
    derived_from_bd_id: BD-015
  - id: finance-C-173
    when: When extracting grid data from broker client interfaces using clipboard-based method
    action: Verify clipboard extraction succeeds for each data fetch operation — implement error logging or fallback validation
      when Ctrl+C returns empty or unexpected data to detect extraction failures early
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Silent clipboard extraction failures produce incomplete or stale grid data, leading to trading decisions
      based on outdated position information such as incorrect share counts or stale price levels
    derived_from_bd_id: BD-024
  - id: finance-C-174
    when: When implementing market order type selection logic
    action: Use ComboBox iteration with regex matching to identify compatible market order types, do not hardcode broker-specific
      mappings
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hardcoded broker-specific mappings break compatibility with brokers using non-standard market order type
      identifiers, causing order execution failures
    derived_from_bd_id: BD-012
  - id: finance-C-175
    when: When implementing async order and trade event handling in MiniqmtTrader
    action: Use XtQuantTraderCallback pattern for non-blocking event processing; do not use polling-based approaches for high-frequency
      trading scenarios
    severity: high
    kind: domain_rule
    modality: must
    consequence: Polling-based order event handling introduces latency and resource overhead, degrading performance for high-frequency
      trading strategies
    derived_from_bd_id: BD-116
  - id: finance-C-177
    when: When implementing data type conversion logic for broker API responses
    action: Use regex pattern matching to identify numeric fields requiring type conversion — do not replace with simple string
      comparison or field name matching
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing regex patterns with simple string matching breaks type conversion for APIs using inconsistent field
      naming conventions like balance vs BALANCE vs Balance, causing numeric fields to be treated as strings
    derived_from_bd_id: BD-049
  - id: finance-C-179
    when: When implementing captcha handling retry logic
    action: Increase the captcha retry count beyond 5 attempts — the limit prevents infinite loops when captcha recognition
      fails permanently
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Increasing retry count beyond 5 causes infinite retry loops on unwinnable captchas, blocking system progress
      and wasting computational resources indefinitely
    derived_from_bd_id: BD-052
  - id: finance-C-181
    when: When using the framework's default minimum trade unit parameter for A-share backtesting
    action: Verify that the default minimum trade unit of 100 shares matches actual exchange requirements and broker constraints
      — adjust if trading ETFs or other instruments with different lot sizes
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default lot size of 100 assumes pure A-share stock trading; using the framework for ETFs or mixed strategies
      without adjusting causes order quantity misalignment and potential rejection
    derived_from_bd_id: BD-051
  - id: finance-C-182
    when: When implementing or refactoring broker-specific balance calculations
    action: Preserve the HTZQ broker-specific logic that excludes stock market value from available balance calculation —
      when inheriting from HT broker, verify the balance adjustment is maintained
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrectly removing the HTZQ-specific balance adjustment causes margin and buying power calculations to
      include stock market values, leading to over-estimation of available capital and potential margin calls
    derived_from_bd_id: BD-063
  - id: finance-C-183
    when: When implementing or refactoring thread-based strategy tracking in the follower module
    action: Verify strategy tracking threads are configured as daemon threads using setDaemon(True) before starting — threads
      must not block program exit when main thread completes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-daemon threads prevent clean process exit, causing backtest scripts and automated trading systems to
      hang indefinitely after completion; this blocks subsequent scheduled runs and causes resource leaks
    derived_from_bd_id: BD-071
  - id: finance-C-184
    when: When implementing or refactoring the cancel_entrust logic in XueQiu trader
    action: Calculate cancel volume as (target_weight - current_weight) * total_balance / 100 to correctly translate weight
      changes into actual share counts for cancellation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect cancel volume calculation causes mismatches between intended and actual cancelled orders, leading
      to unintended portfolio weight deviations during rebalancing operations
    derived_from_bd_id: BD-077
  - id: finance-C-185
    when: When implementing or refactoring captcha recognition routing logic
    action: 'Route captcha recognition to broker-specific OCR service: YH brokers must use Alibaba cloud OCR; GF brokers must
      use local Tesseract OCR — do not interchange these services'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using wrong captcha recognition service causes login failures; cloud OCR fails on GF captchas while Tesseract
      produces garbage on YH captchas, blocking automated trading operations
    derived_from_bd_id: BD-078
  - id: finance-C-186
    when: When implementing or refactoring position weight calculation logic in XueQiu trader
    action: Calculate position weight as volume divided by total_asset_balance and round to exactly 2 decimal places after
      each individual trade — do not change precision or move rounding to aggregation phase
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing rounding precision or timing causes portfolio weight discrepancies that accumulate during rebalancing,
      leading to position sizes that deviate from intended allocation targets
    derived_from_bd_id: BD-088
  - id: finance-C-187
    when: When implementing or refactoring captcha retry logic in grid strategies
    action: Retry captcha recognition exactly 5 times with 0.1s fixed wait between attempts — after 5 failures, abandon the
      operation without fallback to manual input
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reducing retry count causes premature captcha abandonment and operation failure; increasing retry count or
      adding exponential backoff causes unacceptable latency without improving success rate
    derived_from_bd_id: BD-101
  - id: finance-C-188
    when: When calculating total assets from net value in XueQiu follower
    action: Verify that net value is denominated in consistent units with initial assets before multiplying; if units are
      inconsistent, use direct balance queries instead of the net value multiplication method
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Inconsistent unit assumptions in asset calculation cause position sizing errors proportional to the unit
      mismatch factor, leading to systematic over or under-trading in live execution
    derived_from_bd_id: BD-085
  - id: finance-C-189
    when: When parsing numeric strings from external sources (e.g., broker feeds, data exports)
    action: Verify locale compatibility before processing — confirm decimal separator is dot notation; for comma-separated
      locales, implement locale-aware parsing or pre-process input to normalize decimal separators
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Parsing '1,234' as 1.234 instead of 1234 causes position sizing errors of 1000x, leading to massively incorrect
      trade volumes and potential margin calls
    derived_from_bd_id: BD-096
  - id: finance-C-190
    when: When implementing position adjustment and trade volume calculation in backtesting
    action: Calculate trade volume using signed difference (target_weight - current_weight), NOT absolute value — sell orders
      must have negative volume and buy orders must have positive volume to preserve direction awareness
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using absolute value of weight difference loses trade direction, causing sells to execute as buys and vice
      versa; this inverts portfolio composition and creates catastrophic trading losses
    derived_from_bd_id: BD-098
  - id: finance-C-191
    when: When processing transaction quantities for order execution
    action: Track transaction direction in a separate field from quantity — quantity must be absolute value, direction must
      be preserved as an independent attribute (e.g., side='buy' or side='sell')
    severity: high
    kind: domain_rule
    modality: must
    consequence: Merging direction into signed quantity causes ambiguity when downstream code expects absolute quantities
      with separate direction indicators; transactions become uninterpretable
    derived_from_bd_id: BD-100
  - id: finance-C-192
    when: When configuring inter-transaction delays in same-day trading or follow mode
    action: Verify send_interval >= 5 seconds for T+0 operations to verify funds from sold positions are available before
      executing buy orders; explicitly configure this parameter rather than relying on the default value of 0
    severity: high
    kind: operational_lesson
    modality: must
    consequence: send_interval=0 allows buy orders to execute before sold funds settle, causing cash shortfalls and rejected
      buy orders in same-day trading scenarios; backtests will not reflect these failures
    derived_from_bd_id: BD-108
  - id: finance-C-193
    when: When configuring window title detection for trading system automation
    action: Verify that the TITLE configuration matches the specific trading system version; GFClientTrader requires '核新网上交易系统'
      while CommonConfig defaults to '网上股票交易系统5.0', which causes window detection failures
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Mismatched window title causes automation to fail silently when searching for trading system windows, preventing
      order placement and other automated operations
    derived_from_bd_id: BD-110
  - id: finance-C-194
    when: When implementing or modifying export functionality for YH brokers in the follower module
    action: Remove or modify the XLS export format selection without recognizing the hidden dependency on Ctrl+S → Alt+S →
      Alt+Y keyboard shortcut sequences; this interaction causes silent failures in restricted environments
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Removing the XLS/XLSX export check causes automation failures in virtual desktops, remote sessions, and environments
      with keyboard simulation restrictions; users experience silent failures without understanding why automation stopped
      working
    derived_from_bd_id: BD-134
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
skill_crystallization:
  trigger: all_hard_gates_passed AND user_opt_out_skill_saving != true
  output_path_template: '{workspace}/../skills/{slug}.skill'
  slug_template: '{blueprint_id_short}-{uc_id_lower}'
  captured_fields:
  - name
  - intent_keywords
  - entry_point_script
  - validate_script
  - fatal_constraints
  - spec_locks
  - preconditions
  - install_recipes
