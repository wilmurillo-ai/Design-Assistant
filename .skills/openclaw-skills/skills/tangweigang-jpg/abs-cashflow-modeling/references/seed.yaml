  - id: finance-C-187
    when: When implementing waterfall action sequencing
    action: Execute calcAndPayFee before payPrin and accrueAndPayInt before payPrin — enforce accrual-before-payment pattern
      in exact sequence order
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Executing payments before accrual calculations violates accounting principles and may cause overpayment;
      fee and interest obligations must be computed before principal distributions
    derived_from_bd_id: BD-073
  - id: finance-C-192
    when: When implementing collection rule logic for ABS waterfall processing
    action: 'Enforce strict collection priority ordering: CollectedInterest → CollectedPrincipal → CollectedPrepayment → CollectedRecoveries;
      collection rules must reject or queue any proceeds that violate this priority sequence'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating collection priority ordering causes interest obligations to be subordinated to principal proceeds,
      breaching ABS waterfall requirements and potentially causing regulatory non-compliance with structured finance regulations
    derived_from_bd_id: BD-078
  - id: finance-C-197
    when: When validating bond or asset quantities in deal definitions
    action: Add explicit tick_size and lot_size validation for each bond and asset quantities; quantities must be positive
      integers multiples of lot_size and conform to tick_size increments; reject fractional shares
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Accepting fractional or non-increment quantities causes deal configurations to violate market trading rules,
      potentially rendering the backtest unreproducible in live trading where exchanges enforce lot size and tick increment
      requirements
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-213
    when: When processing deal status transitions in ABS waterfall logic
    action: Assume 'Called'/'清仓回购' status is fully handled downstream — the status exists in dealStatusMap but may not be
      implemented in mkStatus, creating a boundary where early termination triggers fire without proper waterfall state transition
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: When deal early termination signals fire 'Called' status without mkStatus handling, waterfall state fails
      to transition correctly, affecting bond redemption sequencing and final distribution calculations; investors may receive
      incorrect payouts or experience delayed deal termination
    derived_from_bd_id: BD-090
  - id: finance-C-214
    when: When configuring or reviewing deal triggers in ABS waterfall definitions
    action: Verify 'Called'/'清仓回购' status is explicitly mapped in mkStatus with corresponding waterfall logic for early termination
      scenarios including bond redemption sequencing and final distribution calculations; verify each status-triggered actions
      account for deal early termination
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing 'Called' status handling in mkStatus causes early termination signals to be ignored, leaving the
      waterfall in active state after deal should have terminated; this prevents proper fund distribution, may cause continued
      accrual of fees, and creates inconsistencies in final deal accounting
    derived_from_bd_id: BD-090
  - id: finance-C-255
