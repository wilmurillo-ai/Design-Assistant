resources:
  packages:
  - name: pandas
    version_pin: latest
  - name: numpy
    version_pin: latest
  - name: requests
    version_pin: latest
  - name: toolz
    version_pin: latest
  - name: lenses
    version_pin: latest
  - name: graphviz
    version_pin: latest
  - name: schema
    version_pin: latest
  - name: htpy
    version_pin: latest
  - name: dateparser
    version_pin: latest
  - name: more-itertools
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install pandas
    - python3 -m pip install numpy
    - python3 -m pip install requests
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When defining deal dates in Generic or SPV dataclasses
    action: provide dates in ISO format YYYY-MM-DD validated by vDate()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid date format causes mkDate() RuntimeError at generic.py:171 or china.py runtime failure, preventing
      deal serialization and engine execution
    stage_ids:
    - deal_definition
  - id: finance-C-002
    when: When instantiating Generic or SPV with pool assets
    action: provide valid asset pool structure recognized by identify_deal_type()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Asset pool structure mismatch causes identify_deal_type() RuntimeError at component.py:1793 or 1817, preventing
      deal type identification and engine execution
    stage_ids:
    - deal_definition
  - id: finance-C-006
    when: When creating Generic or SPV deal instances
    action: include dates, pool, and bonds as required non-None arguments
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required fields causes Python TypeError at dataclass instantiation, preventing deal definition from
      being created
    stage_ids:
    - deal_definition
  - id: finance-C-009
    when: When selecting between Generic and SPV for Chinese market deals
    action: use SPV class which expects Chinese field names (名称, 日期, 资产池, 债券, 费用, 分配规则, 归集规则)
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Using Generic class with Chinese field names causes KeyError during mkDate() or mkPoolType() processing,
      as these functions expect English keys
    stage_ids:
    - deal_definition
  - id: finance-C-010
    when: When selecting between Generic and SPV for international market deals
    action: use Generic class which expects English field names (name, dates, pool, bonds, fees, waterfall, collection)
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Using SPV class with English field names causes AttributeError at dataclass initialization, as SPV.__init__
      expects Chinese parameter names
    stage_ids:
    - deal_definition
  - id: finance-C-012
    when: When serializing Generic.json property
    action: produce tagged JSON output matching engine schema with GenericDates or PreClosingDates or CurrentDates tag
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: JSON output not matching engine schema causes API rejection at deal_execution stage, blocking simulation
      runs
    stage_ids:
    - deal_definition
  - id: finance-C-014
    when: When implementing deals for Chinese ABS market
    action: use SPV class (信贷ABS alias) with Chinese field conventions and date keys (封包日, 起息日, 法定到期日, 收款频率, 付款频率)
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Using Generic class with Chinese field names causes RuntimeError in mkDate() pattern matching, as English
      match cases expect cutoff/closing/firstPay keys
    stage_ids:
    - deal_definition
  - id: finance-C-016
    when: When calling mkDeal() from deal.py to create Generic instances
    action: pass dates, accounts, bonds, waterfall, and collection as non-None values
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: mkDeal() raises AssertionError at deal.py:18,21,32,35,38 for missing required fields, preventing deal creation
    stage_ids:
    - deal_definition
  - id: finance-C-026
    when: When writing a component transformation function (mkAsset, mkAction, mkWaterfall, mkDs, mkBond, mkFee, mkPool, mkPre,
      mkStatus, mkTrigger, mkAcc, mkLimit, mkSupport, mkBookType, mkOrder, mkDatePattern)
    action: 'Return tagged dictionary with exact format {''tag'': tagName, ''contents'': contents} by calling mkTag()'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Engine cannot dispatch on component type because tagged format is missing, causing RuntimeError in deal execution
      or silent data corruption in waterfall processing
    stage_ids:
    - component_transformation
  - id: finance-C-029
    when: When transforming waterfall status keys to engine phases
    action: Map Chinese and English status keys (未违约/摊销/Amortizing, 循环/Revolving, 违约/DealDefaulted, etc.) to exact engine
      phase names using mapping dictionary
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Waterfall phase mismatch causes RuntimeError 'Failed to match :...:mkWaterfall' or incorrect distribution
      order affecting bond payment priority
    stage_ids:
    - component_transformation
  - id: finance-C-030
    when: When processing pools containing assets of different types (Mortgage + Loan, Lease + FixedAsset)
    action: Route to mkAssetUnion path which wraps assets with asset type tags (MO, LO, IL, LS, FA, RE, PF)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mixed asset pools processed with single-asset factory produce incorrect asset tags, causing engine to fail
      when computing heterogeneous cashflow distributions
    stage_ids:
    - component_transformation
  - id: finance-C-034
    when: When reading from isMixedDeal results or calling mkAssetUnion
    action: Pass mixFlag=True to mkPoolComp when isMixedDeal() returns True, otherwise single-asset factory may corrupt mixed
      pool data
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mixed asset pools processed with wrong factory produce untagged or incorrectly tagged assets, causing cashflow
      miscalculation across pool types
    stage_ids:
    - component_transformation
  - id: finance-C-041
    when: When implementing API connection
    action: Check version compatibility with engine server before processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incompatible versions between client library and engine server cause incorrect simulation results or cryptic
      errors during deal execution
    stage_ids:
    - deal_execution
  - id: finance-C-047
    when: When executing deal runs with pool assumptions
    action: Verify engine server returns HTTP 200 status code
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Non-200 HTTP status triggers EngineError with raw response text, preventing result parsing and DataFrame
      creation
    stage_ids:
    - deal_execution
  - id: finance-C-064
    when: When implementing result parsing for Generic deals
    action: use english_*_fields column headers defined in base.py
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Parsed DataFrames will have incorrect Chinese column headers like '余额' instead of 'balance', causing downstream
      analysis failures and incorrect financial calculations
    stage_ids:
    - result_parsing
  - id: finance-C-065
    when: When implementing result parsing for SPV deals
    action: use china_*_fields column headers defined in base.py
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Parsed DataFrames will have English column headers like 'balance' instead of Chinese '余额', breaking locale-consistent
      output for Chinese ABS market reporting
    stage_ids:
    - result_parsing
  - id: finance-C-067
    when: When reading MultiPool deals
    action: produce separate pool DataFrames per sub-pool using poolMap iteration
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: All sub-pool flows will be merged into a single DataFrame, losing critical per-pool breakdown required for
      portfolio-level analysis and risk attribution
    stage_ids:
    - result_parsing
  - id: finance-C-068
    when: When reading ResecDeal deals
    action: parse pool flow from underlying deal references using k.split(':') and tz.get path extraction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Underlying deal cashflows will not be correctly linked to their parent deal structure, causing incorrect
      waterfall attribution in resecuritization scenarios
    stage_ids:
    - result_parsing
  - id: finance-C-071
    when: When reading the engine response list
    action: validate response is a list with 5 elements [deal_content, run_summary, pool_flows, pricing, pool_outstanding]
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Invalid response structure will cause index access errors at runtime, failing the entire parsing pipeline
      without clear error message
    stage_ids:
    - result_parsing
  - id: finance-C-084
    when: When implementing asset creation with mkAsset or mkAssetUnion
    action: use only recognized asset type strings from the supported set
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unrecognized asset type strings cause RuntimeError and fail the entire deal construction, preventing any
      simulation from running
    stage_ids:
    - asset_types
  - id: finance-C-091
    when: When handling mixed asset pools with multiple asset types
    action: set mixedFlag=true and use mkAssetUnion for each assets in the pool
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mixed pools with mixedFlag=false use mkAsset instead of mkAssetUnion, resulting in untagged assets that cause
      deal type identification to fail with RuntimeError
    stage_ids:
    - asset_types
  - id: finance-C-100
    when: When validating date strings in the pipeline
    action: Enforce ISO 8601 date format using the dateStr regex pattern r'^\d{4}-\d{2}-\d{2}$'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid date formats accepted by the system will cause incorrect date parsing in the backend engine, leading
      to wrong payment schedules and cash flow calculations
    stage_ids:
    - validation
  - id: finance-C-101
    when: When validating numeric fields during deal component creation
    action: Validate numeric inputs using vNum which accepts float or int via Or(float, int)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: String numeric values passed without validation will cause type errors in downstream calculations or silently
      produce incorrect financial results
    stage_ids:
    - validation
  - id: finance-C-103
    when: When validating compound structures like asset lists and fee definitions
    action: Apply isListOfDict validation to confirm list contains only dictionary elements
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-dictionary elements in asset lists will cause RuntimeError during component transformation, corrupting
      the deal structure
    stage_ids:
    - validation
  - id: finance-C-107
    when: When calling mkDate, mkDatePattern, mkFee or similar component transformation functions
    action: Invoke validation functions (vDate, vStr, vNum) before transformation logic executes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Invalid inputs reaching transformation logic will cause RuntimeError exceptions or silently produce malformed
      deal structures sent to the engine
    stage_ids:
    - validation
  - id: finance-C-108
    when: When creating deal objects with mkDeal
    action: Validate required fields (dates, accounts, bonds, waterfall, collection) are not None
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing required fields will cause AttributeError during deal execution or invalid deal requests to the engine
    stage_ids:
    - validation
  - id: finance-C-111
    when: When calling the generic validation(deal) function
    action: Rely on the return value for error detection as the function always returns True with empty errors
    severity: fatal
    kind: operational_lesson
    modality: must_not
    consequence: Code relying on validation() return value will never detect invalid deal structures, allowing malformed deals
      to reach the engine
    stage_ids:
    - validation
  - id: finance-C-118
    when: When calling toHtml() with report generation input
    action: Provide input r as result from deal.run() with read=True parameter
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The HTML report generation will fail because toHtml() relies on pandas DataFrame methods like .to_html()
      which require properly parsed data from read=True processing
    stage_ids:
    - reporting
  - id: finance-C-119
    when: When calling toHtml() with report generation input
    action: Verify each data in the result dict contains properly formatted DataFrames with date index
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: HTML generation will throw AttributeError when attempting to call .to_html() on None or non-DataFrame objects,
      causing report generation to crash
    stage_ids:
    - reporting
  - id: finance-C-123
    when: When calling deal.run() for report generation
    action: Pass read=True parameter to convert raw response to DataFrames suitable for toHtml()
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Without read=True, the result will contain raw JSON response instead of DataFrames, causing AttributeError
      when toHtml() attempts to call .to_html() method
    stage_ids:
    - reporting
  - id: finance-C-133
    when: When writing input to mkTweak or mkStop functions
    action: Provide input tuples that match the documented pattern syntax exactly
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: RuntimeError will be raised at mkTweak:24 or mkStop:41 when input tuple does not match any case pattern,
      causing the root finding run to fail immediately without any calculation
    stage_ids:
    - root_finding
  - id: finance-C-134
    when: When providing a bond name to mkStop stop conditions
    action: Pass a valid string type for the bond name parameter
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: vStr validation will fail if bond name is not a string, causing the mkTag creation to fail and root finding
      to abort
    stage_ids:
    - root_finding
  - id: finance-C-135
    when: When providing a target IRR value to bondMetTargetIrr stop condition
    action: Pass a numeric value (float or int) for the irr parameter
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: vNum validation will fail if IRR is not numeric, causing the mkTag creation to abort and root finding to
      not execute
    stage_ids:
    - root_finding
  - id: finance-C-147
    when: When converting Generic/SPV dataclass to JSON via .json property
    action: access the .json property which triggers mkTag chains to produce tagged JSON structures
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Passing the raw Generic object instead of calling .json will send an unstructured dataclass to the engine,
      causing JSON serialization failures and runtime errors
  - id: finance-C-150
    when: When calling deal.read() static method for automatic result parsing
    action: pass the raw response list from engine execution with exactly 5 elements in correct order
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Passing malformed response list causes Generic.read() pattern matching at line 109-161 to fail, resulting
      in None values or KeyError in output DataFrames
  - id: finance-C-152
    when: When passing tagged JSON deal to deal_execution via build_run_deal_req
    action: wrap the deal.json output with mkTag using specified RunReqType enum value
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect RunReqType wrapping causes engine to misparse the request, leading to silent failures or incorrect
      calculations
  - id: finance-C-153
    when: When building pool performance assumptions via mkAssumpType
    action: pass poolAssump as tuple (prepayment, default, recovery) for single scenario or dict for multi-scenario
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect assumption format causes mkAssumpType pattern matching at component.py:2061-2080 to fail, producing
      None assumptions that disable performance calculations
  - id: finance-C-155
    when: When engine response is received from deal_execution
    action: check for 'error' key or 'Left' key in response before passing to result_parsing
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Passing error responses to Generic.read() causes KeyError exceptions and crashes, leaving no result for reporting
      stage
  - id: finance-C-156
    when: When parsing engine response list with Generic.read()
    action: 'expect exactly 5-element list with order: [deal_content, run_summary, pool_flows, pricing_result, pool_outstanding]'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Wrong element ordering causes DataFrame columns to contain mismatched data, corrupting bond summaries, pool
      flows, and pricing results
  - id: finance-C-161
    when: When validating deal dictionary input before calling mkDeal
    action: verify dates, accounts, bonds, waterfall, collection keys exist and are non-None
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required keys cause assertion errors at deal.py:18,21,32,35,38 blocking deal creation entirely
  - id: finance-C-162
    when: When classifying asset types to drive mkAsset/mkAssetUnion selection
    action: 'match asset type string to one of: Mortgage/AdjustRateMortgage/MO, Loan/LO, Installment/IL, Lease/LS, FixedAsset/FA,
      Invoice/RE, ProjectedByFactor/PF'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unmatched asset type causes mkAssetUnion RuntimeError at component.py:2099, preventing deal from being constructed
  - id: finance-C-164
    when: When root_finding triggers multiple deal executions via RootFinder request type
