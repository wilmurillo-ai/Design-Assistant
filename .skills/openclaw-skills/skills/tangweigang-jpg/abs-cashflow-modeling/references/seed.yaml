    stage_ids:
    - validation
  - id: finance-C-109
    when: When handling Schema library validation errors
    action: Wrap validation calls in try-except blocks to catch schema.SchemaError with descriptive messages
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Uncaught SchemaError exceptions will expose internal error messages to end users and provide no actionable
      guidance for fixing input data
    stage_ids:
    - validation
  - id: finance-C-110
    when: When validating user-provided URLs for deal library endpoints
    action: Parse URL using urllib.parse.urlparse and verify both scheme and netloc are present
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Malformed URLs will cause connection failures to the deal library server, preventing deal retrieval and execution
    stage_ids:
    - validation
  - id: finance-C-112
    when: When implementing the vDict validation function
    action: Complete the implementation with actual Schema(dict) validation instead of pass statement
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Placeholder vDict allows invalid dict structures to pass through unchecked, causing errors in downstream
      processing
    stage_ids:
    - validation
  - id: finance-C-113
    when: When accepting poolAssump parameter in API run methods
    action: Validate poolAssump is a tuple before building the request
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-tuple poolAssump will cause request serialization errors and fail deal execution
    stage_ids:
    - validation
  - id: finance-C-114
    when: When accepting _assets parameter in runAsset method
    action: Assert _assets is a list using isinstance(_assets, list)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-list assets will cause iteration errors during asset processing in the engine
    stage_ids:
    - validation
  - id: finance-C-115
    when: When validating bond IDs in root finder and tweak functions
    action: Use vStr to validate bond names are strings before passing to engine
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-string bond identifiers will cause incorrect bond matching in the engine, leading to wrong optimization
      results
    stage_ids:
    - validation
  - id: finance-C-116
    when: When validating numeric amounts in root finder stop conditions
    action: Use vNum to validate monetary amounts are numeric (int or float)
    severity: high
    kind: domain_rule
    modality: must
    consequence: String amounts will cause incorrect loss calculations or target IRR matching in the optimization engine
    stage_ids:
    - validation
  - id: finance-C-117
    when: When validating boolean flags in bond pricing equations
    action: Use vBool to validate boolean parameters for pricing equality conditions
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-boolean flags will cause unexpected branch selection in pricing logic, producing incorrect bond valuations
    stage_ids:
    - validation
  - id: finance-C-120
    when: When calling toHtml() with bond data
    action: Include scheduled cashflows and balances for each bond in the bond table section
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bond tables will be incomplete or empty, missing the scheduled principal, interest payments and outstanding
      balances required for financial reporting
    stage_ids:
    - reporting
  - id: finance-C-121
    when: When calling toHtml() with pool data
    action: Include each collection and default event for pool data in the pool table section
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Pool tables will be incomplete, missing critical collection periods and default events that are essential
      for asset pool performance analysis
    stage_ids:
    - reporting
  - id: finance-C-122
    when: When implementing HTML report generation
    action: Produce valid HTML with each specified section properly structured
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid HTML output will cause browser rendering issues and prevent users from properly viewing bond tables,
      pool tables, and financial summaries
    stage_ids:
    - reporting
  - id: finance-C-124
    when: When calling toHtml() with path parameter
    action: Provide a writable file path ending with .html extension for HTML output file
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Report generation will fail with file permission or IO error if path is invalid, preventing users from saving
      and sharing HTML reports
    stage_ids:
    - reporting
  - id: finance-C-125
    when: When using toExcel() for Excel output
    action: Skip empty or None DataFrames in Excel generation to avoid xlsxwriter errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Excel generation will fail or produce corrupted workbook when attempting to write None or empty DataFrames
      without proper validation
    stage_ids:
    - reporting
  - id: finance-C-126
    when: When generating reports from cashflow simulation engine
    action: Present HTML/Excel reports as anything other than backtested simulation results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting simulation outputs as actual trading results would mislead stakeholders and violate financial
      modeling best practices
    stage_ids:
    - reporting
  - id: finance-C-127
    when: When using OutputType.Anchor style
    action: Generate valid anchor links and table of contents for HTML navigation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Broken anchor links or malformed table of contents will make HTML navigation non-functional, reducing report
      usability
    stage_ids:
    - reporting
  - id: finance-C-128
    when: When reading result data for report generation
    action: Extract bonds, pools, accounts, and fees data with proper date index from parsed DataFrames
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrectly extracted or missing financial data will result in incomplete reports with missing cashflows,
      balances, and transaction history
    stage_ids:
    - reporting
  - id: finance-C-129
    when: When building report sections from cashflow data
    action: Use buildSection() for dict-to-DataFrame mappings and buildSectionFlat() for direct DataFrame sections
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using incorrect section building function will cause AttributeError when attempting to iterate over non-iterable
      DataFrames or call methods on dict structures
    stage_ids:
    - reporting
  - id: finance-C-130
    when: When building section with financial reports data
    action: Handle missing or None financial report section gracefully to prevent HTML generation failure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attempting to convert None to HTML will cause AttributeError, crashing the entire report generation process
    stage_ids:
    - reporting
  - id: finance-C-131
    when: When generating Excel reports
    action: Use xlsxwriter engine with proper header formatting for Excel output
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Excel output will be malformed or unreadable if xlsxwriter engine encounters unexpected data types or invalid
      header format specifications
    stage_ids:
    - reporting
  - id: finance-C-132
    when: When generating multi-scenario reports
    action: Select individual scenario result from multi-scenario results dict before passing to toHtml()
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Passing entire multi-scenario dict instead of individual scenario will cause AttributeError when iterating
      over results in report generation
    stage_ids:
    - reporting
  - id: finance-C-136
    when: When calling mkTweak with stressDefault, stressPrepayment, maxSpread, or splitBalance without explicit bounds
    action: Verify the base default assumption is non-zero, since binary search starts at 500x stress from the base value
    severity: high
    kind: operational_lesson
    modality: must
    consequence: If base default assumption is zero (e.g., CDR=0), the 500x stress produces no change, causing the binary
      search to fail finding any breakeven point
    stage_ids:
    - root_finding
  - id: finance-C-137
    when: When specifying bounds (l, h) for mkTweak stress parameters
    action: Set bounds wide enough to contain the true solution, otherwise binary search will fail to converge
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Binary search will not find a solution if the true breakeven point lies outside the specified bounds, resulting
      in AbsboxError from the server
    stage_ids:
    - root_finding
  - id: finance-C-138
    when: When root finding involves bond pricing equations
    action: Pass boolean values for TestBondFlag and TestFeeFlag parameters in bondPricingEqOriginBal condition
    severity: high
    kind: domain_rule
    modality: must
    consequence: vBool validation will reject non-boolean flag values, causing the mkTag creation to fail for bond pricing
      stop conditions
    stage_ids:
    - root_finding
  - id: finance-C-139
    when: When running root finder against the remote server API
    action: Abuse CPU-intensive root finding operations on the public server
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Excessive root finding requests will consume server resources and may result in rate limiting or service
      degradation for other users
    stage_ids:
    - root_finding
  - id: finance-C-140
    when: When constructing tweak tuples for mkTweak function
    action: 'Use the correct tuple structure: simple string for defaults, or (name, l, h) tuple for custom bounds'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect tuple structure will not match any pattern case, triggering RuntimeError and preventing root finding
      execution
    stage_ids:
    - root_finding
  - id: finance-C-141
    when: When constructing stop condition tuples for mkStop function
    action: Use the correct tuple structure with required positional arguments matching each stop condition type
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect stop condition tuple structure will not match any pattern case, triggering RuntimeError and preventing
      root finding execution
    stage_ids:
    - root_finding
  - id: finance-C-142
    when: When interpreting root finding results
    action: Treat the returned stress factor as an exact optimized value rather than an approximate breakeven point
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Root finding uses binary search which converges to tolerance, not exact optimization. Presenting the result
      as a precise optimal value misrepresents the method's capabilities
    stage_ids:
    - root_finding
  - id: finance-C-143
    when: When using mkTweak with bond name parameters
    action: Verify the bond name exists in the deal structure when using maxSpread or splitBalance tweaks
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using a non-existent bond name will cause the backend engine to fail, returning an error from the server
      rather than a valid result
    stage_ids:
    - root_finding
  - id: finance-C-144
    when: When building root finder request through build_run_deal_req
    action: Pass valid poolAssump and runAssump parameters, since root finding requires cashflow projection under stressed
      conditions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Invalid or missing assumptions will cause the server to reject the root finding request or produce invalid
      results
    stage_ids:
    - root_finding
  - id: finance-C-145
    when: When providing bounds (l, h) to mkTweak functions
    action: Provide bounds with lower bound less than upper bound
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Invalid bounds (l >= h) will cause undefined behavior in the binary search algorithm, potentially hanging
      or producing incorrect results
    stage_ids:
    - root_finding
  - id: finance-C-146
    when: When using binary search for root finding
    action: Verify the stop condition is monotonic (consistently true or false across the tweak range) for reliable convergence
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Non-monotonic stop conditions will cause binary search to converge to incorrect values or oscillate without
      finding a solution
    stage_ids:
    - root_finding
  - id: finance-C-148
    when: When the Generic/SPV .json property is invoked with mixed asset types
    action: set mixedAssetFlag=true by calling isMixedDeal() before passing pool to mkPoolType
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper mixedAssetFlag, the mkAssetUnion factory will not be used for each asset, causing incorrect
      asset type tagging and calculation errors in multi-asset deals
  - id: finance-C-149
    when: When accessing pool assumptions via .json property from Generic/SPV dataclass
    action: include non-null pool data with empty asset list without explicit tagging
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Passing pool data with no assets but missing explicit UPool tagging causes mkPoolType to fail pattern matching
      at component.py:2127
  - id: finance-C-151
    when: When invoking the Generic/SPV.read() static method with Chinese locale
    action: pass lang='cn' parameter to readRunSummary and readPricingResult functions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without correct language parameter, column names will be in English while data is in Chinese, causing DataFrame
      alignment errors in reporting stage
  - id: finance-C-154
    when: When passing non-performance assumptions via mkNonPerfAssumps
    action: pass runAssump as list even when empty (use []) not None
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing None instead of empty list causes mkNonPerfAssumps to fail at component.py, resulting in missing
      deal-level assumptions like pricing
  - id: finance-C-157
    when: When converting pool response to DataFrame in result_parsing
    action: handle None values in pool_breakdown_flow by checking breakdown flag before accessing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accessing None pool_breakdown_flow without checking breakdown flag causes AttributeError and crashes, leaving
      pool breakdown empty
  - id: finance-C-158
    when: When passing parsed result DataFrames to reporting via toHtml/toExcel
    action: include _deal key in result dict with name accessible via lens path
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing _deal metadata causes HTML report to fail title generation at report.py:123, resulting in empty or
      error-filled reports
  - id: finance-C-159
    when: When aggregating DataFrames in reporting stage via consolResp
    action: include None values in the bonds, pool, accounts, fees dictionaries
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: None values in component dictionaries cause type errors when to_excel attempts to write, leaving worksheets
      empty
  - id: finance-C-160
    when: When validating user inputs before deal instantiation in validation stage
    action: coerce poolAssump to tuple format before passing to mkAssumpType
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-tuple poolAssump bypasses mkAssumpType validation causing RuntimeError at component.py pattern matching,
      preventing deal creation
  - id: finance-C-163
    when: When using mixed asset types with mkPoolType
    action: set mixedFlag=True to enable mkAssetUnion factory for each individual asset
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without mixedFlag=True, all assets use mkAsset instead of mkAssetUnion, causing incorrect tag wrapping and
      pool computation failures
  - id: finance-C-165
    when: When sending RootFinder requests to deal_execution
    action: include dealRunInput tuple with (deal_json, perfAssump, nonPerfAssump, rtn) in correct order
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect dealRunInput ordering causes engine to misparse parameters, leading to wrong root-finding results
      or infinite loops
  - id: finance-C-166
    when: When client API version mismatches engine server version
    action: bypass version check by setting check=False during API initialization
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Using check=False allows version mismatches that cause silent failures in calculations or response parsing
      due to protocol changes
  - id: finance-C-171
    when: When configuring deal cash collection rules
    action: 'Follow priority order: CollectedInterest → CollectedPrincipal → CollectedPrepayment → CollectedRecoveries'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect collection priority causes available cash to be misallocated, leading to waterfall failures or
      insufficient funds for senior tranches
  - id: finance-C-172
    when: When defining waterfall actions in a distribution phase
    action: Execute calcAndPayFee (fee accrual and payment) before payPrin (principal payment), and accrueAndPayInt before
      payPrin
    severity: high
    kind: domain_rule
    modality: must
    consequence: Payment sequencing violation causes fees to be unpaid or paid from principal distributions, breaching deal
      waterfall priority and triggering covenant violations
  - id: finance-C-173
    when: When mapping waterfall phase status values
    action: 'Map Chinese/English status strings to engine phase identifiers: 未违约/摊销→Amortizing, 循环→Revolving, 加速清偿→DealAccelerated,
      违约→DealDefaulted'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unrecognized status string causes waterfall phase resolution failure, preventing cashflow simulation from
      proceeding
  - id: finance-C-174
    when: When working with this structured finance cashflow engine
    action: Claim real-time trading support — this is a scenario simulation engine for deal structuring and analysis
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users build automated trading systems based on simulated cashflows, but the engine only projects hypothetical
      scenarios and cannot execute live trades or respond to market events in real-time
  - id: finance-C-175
    when: When presenting or reporting this system's simulated cashflow results
    action: Claim that simulation outputs equal expected live trading returns or actual execution capabilities
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Cashflow simulations ignore market impact, financing costs, execution delays, counterparty risks, and regulatory
      constraints — presenting simulated results as live capability misleads investors and violates financial regulations
  - id: finance-C-176
    when: When users require full transparency into closed-source calculation engine internals
    action: Claim this wrapper provides complete visibility into the proprietary backend engine's internal calculations
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: The wrapper provides a Python interface to a closed-source calculation engine — certain model parameters,
      numerical approximations, and convergence behaviors remain opaque to users
  - id: finance-C-177
    when: When modeling non-cash flow based financial instruments
    action: Claim support for instruments that do not produce predictable cashflows (e.g., equity options, credit default
      swaps without deterministic payoffs)
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: The waterfall-based cashflow engine cannot model instruments requiring real-time pricing or event-driven
      payoffs, causing simulation failures or nonsensical results
  - id: finance-C-178
    when: When processing bilingual field names in deal configuration
    action: Perform Chinese↔English field name translation at the component transformation layer, not within the engine core
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mixing locale-specific field names directly in engine calculations causes data interpretation errors and
      incorrect cashflow projections across different language configurations
  - id: finance-C-179
    when: When selecting day count convention for bond interest calculations
    action: Use DC_ACT_365F as default for floating rate bonds; other conventions require explicit specification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect day count convention causes interest calculation errors, leading to underpayment or overpayment
      of bond coupons and potential covenant breaches
  - id: finance-C-180
    when: When inspecting deal statistics during simulation
    action: Only use defined integer stat fields (BondPaidPeriod, PoolCollectedPeriod); boolean/rate/balance stats require
      separate mechanisms
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Querying undefined stat types causes runtime errors or silent data mismatches in deal inspection outputs
  - id: finance-C-181
    when: When implementing waterfall distribution logic in ABS deal setup
    action: Verify equity bonds (权益) receive distributions only after each senior and mezzanine bonds are fully paid — implement
      residual claim structure where equity absorbs first losses and receives distributions last
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing waterfall priority to distribute equity before senior bonds violates the deal's seniority structure,
      causing incorrect tranche returns and potential indenture covenant breaches in live transactions
    derived_from_bd_id: BD-005
  - id: finance-C-182
    when: When setting up fixed rate bond interest calculation without explicit day count specification
    action: Verify that the default DC_ACT_365F (ACT/365 Fixed) convention matches the actual bond documentation; if the deal
      specifies a different day count (e.g., ACT/360, 30/360), explicitly override the default
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default ACT/365 Fixed may mismatch bond indenture requirements; interest calculation errors accumulate over
      the deal life, causing discrepancies between calculated and actual payment amounts
    derived_from_bd_id: BD-001
  - id: finance-C-183
    when: When configuring floating rate bond parameters
    action: Set SOFR3M as the reference rate with quarterly reset frequency and explicit 1% spread; verify these parameters
      match the deal's rate structure requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect reference rate or spread configuration leads to wrong interest payments, causing cash flow mismatches
      between the waterfall and actual bond obligations
    derived_from_bd_id: BD-010
  - id: finance-C-184
    when: When configuring bond group payment priority ordering
    action: Use mkOrder with one of the supported methods (byName, byProrata, byCurRate, byMaturity, byStartDate) to enforce
      senior bond payment priority over junior tranches — A-series bonds must be paid before B-series bonds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing or incorrect payment order configuration violates ABS waterfall seniority rules, causing senior bonds
      to receive inadequate distributions and potentially breaching regulatory requirements
    derived_from_bd_id: BD-023
  - id: finance-C-185
    when: When defining MultiPool or ResecDeal structures with multiple pools
    action: Assume each pool within a MultiPool or ResecDeal can have different deal types — deal type is inferred from the
      FIRST asset only and applies uniformly to each pools
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Assuming heterogeneous deal types across pools causes incorrect waterfall treatment and regulatory classification;
      the framework enforces homogeneous type classification across all pools
    derived_from_bd_id: BD-072
  - id: finance-C-186
    when: When implementing bond payment ordering in waterfall logic
    action: Enforce senior bonds (A1) paid before junior bonds (B) via mkOrder with byName ordering — verify A-series bonds
      receive distributions before B-series bonds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect payment ordering violates ABS regulatory waterfall seniority requirements, causing junior bonds
      to receive distributions ahead of senior bonds
    derived_from_bd_id: BD-081
  - id: finance-C-188
    when: When parsing Chinese regulatory reports using report_parser
    action: Use report_parser with Generic deal outputs — china.py parser uses Chinese field headers ('日期' for date, '归集'
      for collection) incompatible with English Generic deal outputs
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Using chinese report_parser on English Generic deal outputs causes parsing failures due to header mismatch,
      producing empty or incorrect parsed results
    derived_from_bd_id: BD-082
  - id: finance-C-189
    when: When implementing or refactoring trigger logic in ABS deal configurations
    action: Verify trigger effects correctly change deal status to 'Accelerated' and execute each predefined waterfall actions
      as specified in the trigger configuration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying trigger logic without preserving automated protective actions breaks deal integrity; during stress
      scenarios, missing trigger responses cause investor protection mechanisms to fail silently
    derived_from_bd_id: BD-007
  - id: finance-C-190
    when: When configuring reserve account targets in ABS deal structures
    action: Verify that percentage-based reserve targets correctly reference formula results and document the expected calculation
      chain for auditability
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Percentage-based reserve sizing that doesn't correctly reference deal performance metrics results in either
      insufficient buffer during stress or excessive reserve retention reducing investor returns
    derived_from_bd_id: BD-012
  - id: finance-C-191
    when: When creating asset pool configurations without explicit amortization_type specification
    action: Verify that the default 'Level' amortization type (Equal Monthly Payment) matches the expected cash flow schedule
      for the asset pool; explicitly specify amortization_type if different type is required
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Omitting amortization_type defaults to Level (Equal Monthly Payment), which produces significantly different
      cash flow patterns than bullet, interest-only, or custom schedules; strategies expecting different amortization will
      have systematically incorrect cash flow projections
    derived_from_bd_id: BD-002
  - id: finance-C-193
    when: When initializing deal configurations across different locales (Generic vs China SPV)
    action: Mix locale-specific initialization paths (Generic with 'Amortizing' vs China SPV with '摊销') within the same deal
      workflow; verify consistent locale context throughout initialization and waterfall processing
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Cross-locale initialization causes status mapping failures where Chinese status keys like '摊销' fail to map
      correctly after Generic initialization path; waterfall state transitions silently use incorrect defaults leading to
      incorrect cash distribution
    derived_from_bd_id: BD-093
  - id: finance-C-194
    when: When using SPV or 信贷ABS class aliases for deal initialization
    action: 'Verify field naming conventions match the locale context: use Chinese field names with 信贷ABS/SPV aliases and
      English field names with Generic; do not mix naming conventions across locale contexts'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using English field names with 信贷ABS alias or Chinese field names with Generic class causes AttributeError
      or silent field mapping failures; deal configurations work only within their intended locale initialization path
    derived_from_bd_id: BD-074
  - id: finance-C-195
    when: When processing deal data inputs and maintaining state across deal execution cycles
    action: Implement stale data detection mechanisms to identify and flag deal data that has not been updated within expected
      time intervals; reject or quarantine stale data before processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Processing stale deal data causes waterfall calculations to use outdated principal balances, interest accruals,
      and reserve levels, producing incorrect cash flow distributions that accumulate over multiple periods
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-196
    when: When comparing benchmark files between Chinese and Generic deal configurations
    action: 'Use locale-specific date formats and field names: Chinese benchmarks must use ''归集日期'', ''期初剩余本金'' etc; Generic
      benchmarks must use English equivalents; do not interchange benchmark file formats across locales'
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using Generic benchmark format with Chinese report parser causes parsing failures or silent field misalignment,
      producing incorrect benchmark comparison results that mask actual deal performance deviations
    derived_from_bd_id: BD-089
  - id: finance-C-198
    when: When implementing deal status management logic
    action: Transition deal status from 'PreClosing' to 'Amortizing' when first payment date is reached — this transition
      marks the operational start of the deal, initiating interest accrual and principal amortization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect status transition timing causes deal mechanics to start prematurely or late, leading to mismatched
      interest accrual and amortization schedules that break deal lifecycle
    derived_from_bd_id: BD-015
  - id: finance-C-199
    when: When implementing asset pool configuration logic
    action: Support coexistence of Mortgage and Loan asset types in single asset pools — mixed asset pool support enables
      diversification across asset classes within single deals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single-asset-only implementation prevents mixed asset pool deals from running, breaking deal structures that
      combine residential mortgages with consumer or commercial loans
    derived_from_bd_id: BD-016
  - id: finance-C-200
    when: When configuring credit enhancement trigger conditions
    action: Verify that 5% cumulative default rate threshold matches actual deal requirements — some deals may use different
      thresholds based on credit enhancement structure and asset class
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default 5% threshold in deals with different credit enhancement levels causes premature or delayed
      trigger activation, exposing investors to unanticipated loss or reduced yield
    derived_from_bd_id: BD-006
  - id: finance-C-201
    when: When implementing cash flow collection and waterfall allocation logic
    action: 'Separate pool collections into distinct types: CollectedInterest, CollectedPrincipal, CollectedPrepayment, CollectedRecoveries
      — each type follows different waterfall prioritization rules'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Commingling collection types breaks waterfall prioritization, causing incorrect fee payments, interest allocation,
      and principal amortization sequencing that violates deal covenants
    derived_from_bd_id: BD-008
  - id: finance-C-202
    when: When implementing reserve account interest calculations
    action: Support both InvestmentAccount (index+spread floating rate) and BankAccount (fixed rate) interest types — different
      account types serve different reserve investment strategies
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single interest type support prevents proper reserve account earnings optimization, causing incorrect interest
      calculations for deals requiring fixed-rate or floating-rate accounts
    derived_from_bd_id: BD-034
  - id: finance-C-203
    when: When implementing fee waterfall calculations and reporting
    action: 'Verify fee aggregation strategy matches deal requirements: ''balance'' uses min (prevents overstatement), ''payment''
      uses sum (aggregates each obligation), ''due'' uses min (handles partial payment edge cases)'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect fee aggregation causes fee overstatement or understatement, leading to incorrect waterfall calculations
      and potential fee payment disputes with servicers and investors
    derived_from_bd_id: BD-088
  - id: finance-C-204
    when: When analyzing pool performance metrics or calculating loss recognition timing
    action: 'Account for the 14-month loss recognition delay cascade: asset status mapping (BD-003) → 2-month delinquency
      lag (BD-062) → 12-month recovery lag (BD-057). During this period, loans may appear as performing while generating zero
      cash flows'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Ignoring the 14-month cascade creates misleading pool performance metrics and over-collateralization ratios
      that mask true credit risk exposure, causing incorrect investment decisions and regulatory compliance issues
    derived_from_bd_id: BD-092
  - id: finance-C-205
    when: When implementing trigger condition evaluation logic
    action: Use rateLikeFormula and intLikeFormula sets to classify formulas before trigger evaluation, selecting correct
      computational path (IfRate vs IfInt) based on formula type classification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect formula type classification causes wrong computational path selection in trigger evaluation, leading
      to type mismatches and incorrect waterfall trigger activation that affects cash distribution
    derived_from_bd_id: BD-085
  - id: finance-C-206
    when: When processing datetime operations in multi-timezone ABS deals
    action: Assume the framework handles timezone normalization automatically — the framework lacks explicit timezone handling
      and UTC normalization for datetime operations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit timezone handling, cash flows may be misaligned by timezone offsets, causing incorrect payment
      timing calculations in multi-timezone deal structures
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-207
    when: When implementing datetime operations for multi-timezone ABS deals
    action: 'Implement explicit UTC normalization for each datetime operation: convert each timestamps to UTC before storage,
      calculations, and comparisons; use timezone-aware datetime objects throughout the pipeline'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without UTC normalization, timezone mismatches cause incorrect cash flow timing calculations, leading to
      payment timing errors in cross-timezone transactions and potential settlement failures
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-208
    when: When implementing revolving period pool management logic in ABS waterfall
    action: Support buyAsset and sellAsset actions during revolving periods to enable dynamic pool quality management — do
      not remove or restrict these actions from the waterfall sequence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing buyAsset/sellAsset support breaks dynamic pool management, preventing issuers from adding qualified
      assets or liquidating underperforming ones during revolving periods; deals become locked into initial pool composition,
      violating diversification requirements and potentially trapping capital in impaired assets
    derived_from_bd_id: BD-021
  - id: finance-C-209
    when: When implementing conditional waterfall logic with If/ifelse actions
    action: Support complex predicate expressions including rate comparisons, balance tests, and status checks in conditional
      actions — verify predicates can evaluate deal state metrics for dynamic cash flow routing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Restricting conditional predicates to simple comparisons breaks sophisticated waterfall rules that depend
      on performance metrics; conditional triggers for subordinate tranche support or accelerated principal payments fail
      silently, causing incorrect cash flow distribution in structured credit instruments
    derived_from_bd_id: BD-022
  - id: finance-C-210
    when: When using the framework's default or configured interest accrual rate for ABS equity cushion calculations
    action: Verify that the currentRate (accrual rate) and original rate differential matches the intended excess spread credit
      enhancement; document the 3.5% differential assumption and confirm it aligns with deal structure requirements for reserve
      account funding
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Misconfiguring the rate differential changes the equity cushion size; if accrual rate is set too low, insufficient
      excess spread accumulates in reserve accounts, leaving investors under-protected against losses; if set too high, returns
      appear inflated relative to actual deal economics
    derived_from_bd_id: BD-009
  - id: finance-C-211
    when: When initializing a multi-pool ABS deal or adding assets sequentially to an existing deal
    action: Detect heterogeneous pool composition explicitly before deal type classification — verify that deal type inference
      does not silently override multi-pool diversity based on first-asset-only classification; log a warning when pool types
      differ across pools
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Silent type coercion from first-asset inference causes heterogeneous multi-pool deals (e.g., residential
      mortgages + consumer loans) to be misclassified as homogeneous, bypassing multi-pool detection; this affects downstream
      regulatory treatment, waterfall rule assumptions, and investor reporting with no explicit warning
    derived_from_bd_id: BD-095
  - id: finance-C-212
    when: When configuring default rates and loss timing parameters in ABS deal modeling
    action: 'Document and validate the complete loss recognition timing chain: CDR assumption, 2-month delinquency lag before
      default conversion, and 12-month recovery lag after default — calculate total lag as 14 months and flag when high CDR
      assumptions may mask near-term performance'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The 14-month loss timing lag creates apparent deal health during lag periods followed by sudden deterioration
      as lagged losses materialize; investors and rating agencies may be caught off-guard by this non-linear loss recognition,
      underestimating tail risk during early deal periods
    derived_from_bd_id: BD-096
  - id: finance-C-215
    when: When configuring default trigger thresholds and accelerated status transitions in ABS waterfall
    action: Validate the interaction between the 5% cumulative default threshold (BD-006) and Accelerated status trigger effects
      (BD-007) — document that crossing the 5% threshold produces non-linear cash flow amplification as waterfall priority
      shifts, and verify subordinate tranche sizing accounts for this discontinuity
    severity: high
    kind: domain_rule
    modality: must
    consequence: The 5% default threshold creates a cliff effect where 5.1% defaults produce materially different cash flows
      than 4.9% due to Accelerated status changing principal payment priority; subordinate tranches may deplete faster than
      modeled if the non-linear amplification at the threshold is not explicitly considered in tranche sizing
    derived_from_bd_id: BD-091
  - id: finance-C-216
    when: When implementing cash transfer logic using the Transfer action
    action: Explicitly specify the transfer limit type (formula/debt_service, reserve_gap, reserve_excess, or unlimited) —
      do not leave the limit type unspecified or rely on framework defaults
    severity: high
    kind: domain_rule
    modality: must
    consequence: If AI refactors the Transfer action to use a different limit mode, cash movement controls change fundamentally;
      formula-based limits ensure debt service coverage while unlimited transfers could cause insufficient reserve balances,
      violating deal covenants in live execution
    derived_from_bd_id: BD-043
  - id: finance-C-217
    when: When defining assets in deal structure using mkAsset
    action: 'Use the correct asset sub-type from the supported set: Mortgage, AdjustableRateMortgage, ScheduleMortgageFlow,
      PersonalLoan, RegularLease, StepUpLease — verify each asset type accurately reflects the underlying instrument''s cash
      flow characteristics'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using generic or incorrect asset sub-types causes the framework to apply wrong cash flow calculation logic;
      Mortgage assets expect amortization schedules, ARM assets expect rate adjustments, ScheduleMortgageFlow expects structured
      payment flows — mixing these up produces materially incorrect cash flow projections and deal performance estimates
    derived_from_bd_id: BD-049
  - id: finance-C-218
    when: When configuring fixed rate bonds using mkBondRate
    action: Verify DC_ACT_365F day count convention matches the actual instrument documentation; if the deal uses ACT/360,
      30/360, or other conventions, explicitly override the default
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: DC_ACT_365F uses a 365-day year basis while ACT/360 uses 360 days — over long-dated instruments, the accrual
      difference accumulates to 1.4% annually on interest calculations, causing backtest results to diverge from actual bondholder
      statements
    derived_from_bd_id: BD-051
  - id: finance-C-219
    when: When configuring prepayment stress scenarios using PSA benchmarks
    action: Verify PSA conversion factor 100% PSA = 0.2% CPR monthly matches the deal's vintage and product type assumptions;
      if the asset pool has different prepayment characteristics, adjust PSA speed accordingly
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: PSA standard assumes monthly ramp-up from origination, but pools with seasoned vintages or non-standard structures
      (construction loans, ARMs with rate reset triggers) do not follow this curve; applying standard PSA stress to mis-matched
      pools overestimates or underestimates prepayment speeds, distorting stress test results
    derived_from_bd_id: BD-054
  - id: finance-C-220
    when: When implementing or refactoring floater bond pricing logic
    action: 'Apply the bounded floater formula: Rate = min(max(Index + Spread, Floor), Cap) — verify cap and floor constraints
      are evaluated in the correct order (floor first, then cap)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect floater rate calculation causes bond pricing errors; issuers may be over/under-protected from rate
      movements, leading to mispriced instruments and waterfall distribution errors
    derived_from_bd_id: BD-059
  - id: finance-C-221
    when: When implementing waterfall distribution logic in ABS modeling
    action: Apply Min/Max/Floor/Cap operations on deal statistics before waterfall distribution — for example, interest available
      must be floored at zero and capped at note interest amount
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping range constraints on waterfall stats allows negative amounts or over-distribution that violates
      deal waterfall priority rules, causing incorrect cash flow allocation
    derived_from_bd_id: BD-069
  - id: finance-C-222
    when: When implementing deal statistic condition evaluations
    action: 'Use integer-only statistics (dealStatInt: ''BondPaidPeriod'', ''PoolCollectedPeriod'') for rate or balance metrics
      — maintain type consistency by using dealStatRate, dealStatBalance, or dealStatBool for non-integer statistics'
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using integer stats for rate/balance values causes silent type coercion errors in waterfall conditions, leading
      to incorrect true/false evaluations and misallocated cash flows
    derived_from_bd_id: BD-079
  - id: finance-C-223
    when: When processing deal status configurations in Chinese locale
    action: 'Map Chinese status keys to normalized English values using the mapping: ''未违约''/''摊销'' → ''Amortizing'', ''循环''
      → ''Revolving'', ''加速清偿'' → ''DealAccelerated'' — verify the waterfall engine receives English status values'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping Chinese-to-English status mapping causes waterfall engine to receive unrecognized status keys, breaking
      deal state transitions and cash flow distribution logic
    derived_from_bd_id: BD-084
  - id: finance-C-224
    when: When pricing bonds using IRR as the primary bond pricing metric
    action: Verify IRR calculation includes reinvestment assumption at the calculated rate — document that IRR assumes intermediate
      cash flows are reinvested at the IRR rate, which may not reflect actual reinvestment conditions in volatile rate environments
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: IRR assumes constant reinvestment rate throughout the bond life; during declining rates, actual returns fall
      below IRR as cash flows are reinvested at lower rates, causing overestimated bond valuations
    derived_from_bd_id: BD-055
  - id: finance-C-225
    when: When modeling liquidation discount rates for distressed asset scenarios
    action: Use BalanceFactor method with separate CurrentFactor and DefaultFactor for differentiated discounting — apply
      CurrentFactor to performing collateral and DefaultFactor to non-performing collateral with higher liquidation costs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a single blended discount rate for all collateral ignores higher liquidation costs and lower recovery
      expectations for defaulted assets, causing systematic overvaluation of distressed positions
    derived_from_bd_id: BD-056
  - id: finance-C-226
    when: When modeling delinquency and default progression in ABS deals
    action: Verify the 2-month reporting lag assumption matches the actual loan servicer reporting cycle — confirm delinquency
      buckets (30/60/90-day) are calculated with cumulative percentage tracking from the lagged reporting date
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using a lag period that differs from actual servicer reporting causes misaligned delinquency buckets, leading
      to incorrect default timing estimates and waterfall trigger points
    derived_from_bd_id: BD-060
  - id: finance-C-227
    when: When implementing train/test data splitting for time-series backtesting
    action: Assume the framework validates train/test time split integrity — the framework does not enforce temporal ordering
      between training and test sets
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper train/test split validation, models trained on future data will show artificially high backtest
      performance that cannot be reproduced in live trading, causing significant over-allocation and losses
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-228
    when: When implementing train/test data splitting for time-series backtesting
    action: Verify training data temporally precedes test data, implement out-of-time validation for time-series scenarios,
      and add warnings when temporal ordering is violated
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without enforcing temporal ordering, data leakage causes model overestimation by 20-50% in backtests, leading
      to over-allocation and significant losses when deployed to live trading
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-229
    when: When implementing RL reward functions for trading strategies
    action: Assume the framework models trading costs in RL reward functions — the framework does not include transaction
      cost modeling in reinforcement learning reward signals
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without trading cost modeling in RL rewards, the learned policy assumes frictionless trading and overestimates
      profits by 10-20% in realistic market conditions, causing strategies to appear profitable when they are not
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-230
    when: When implementing RL reward functions for trading strategies
    action: Include explicit transaction cost parameters (commission, slippage, market impact) in the reward function calculation
      — reward should account for cost_per_share, spread, and estimated market impact
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without trading costs in the reward function, RL agents learn to trade excessively and exploit thin margins
      that disappear after accounting for real costs, resulting in negative returns in live trading
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-231
    when: When implementing ML pipeline data transformations for backtesting
    action: Assume the framework enforces fit/transform isolation between training and test data — the framework does not
      prevent data leakage from fitting transformers on full datasets including test data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without fit/transform isolation, scalers and encoders leak information from test data into training, causing
      backtest results to be 5-30% better than actual out-of-sample performance
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-232
    when: When implementing ML pipeline data transformations for backtesting
    action: 'Separate fit and transform operations: fit transformers only on training data, apply fitted transformers separately
      to validation/test data, and use cross-validation with proper data splitting'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without fit/transform isolation, data leakage causes systematic overestimation of model performance by 5-30%,
      leading to overconfident strategy allocation and significant drawdowns when deployed
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-233
    when: When implementing multi-agent trading decision systems
    action: Assume single-agent trading decisions are sufficient without a multi-agent consensus mechanism and risk veto rights
      — the framework does not implement multi-agent decision consensus or risk veto
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without multi-agent consensus and risk veto, single-agent errors cannot be corrected, leading to unbounded
      losses and cascade failures when agents make correlated mistakes during market dislocations
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-234
    when: When implementing multi-agent trading decision systems
    action: Implement consensus mechanism requiring agreement from multiple agents before execution, and add risk veto rights
      allowing individual agents to block trades exceeding defined risk thresholds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without consensus and veto mechanisms, one erroneous agent can execute trades causing catastrophic losses;
      proper multi-agent controls prevent single points of failure in automated trading systems
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-235
    when: When implementing cash flow accounting in backtesting waterfall
    action: Assume the framework validates double-entry bookkeeping (Debit = Credit) automatically — the framework does not
      implement double-entry validation or reconciliation of cash flows
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without double-entry validation, cash flow imbalances accumulate silently in the waterfall, corrupting equity
      calculations and creating hidden P&L discrepancies that grow over time
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-236
    when: When implementing cash flow accounting in backtesting waterfall
    action: Add double-entry bookkeeping validation (Debit = Credit) with reconciliation after each transaction batch — verify
      total debits equals total credits within tolerance of 0.01 and flag imbalances
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without double-entry validation, accounting errors compound over time causing silent corruption of P&L calculations;
      early detection via reconciliation prevents accumulated losses from accounting mistakes
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-237
    when: When implementing bond spread calculations using Z-spread methodology
    action: Use non-parallel curve shifts (steepening, twist, or butterfly) for Z-spread calculations — Z-spread assumes parallel
      shifts only per BD-061 definition
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using non-parallel shifts for Z-spread calculation violates the model's parallel shift assumption, producing
      spreads that do not match actual bond prices and causing systematic mispricing across the portfolio
    derived_from_bd_id: BD-061
  - id: finance-C-238
    when: When implementing delinquency-to-default conversion logic in ABS cash flow models
    action: Apply exactly 2-month lag period between delinquency trigger and default conversion — use DelinqCDR with Lag parameter
      set to 2 months
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-standard lag periods (1 month or 3+ months) for delinquency conversion changes cash flow timing
      and tranche loss allocation, affecting deal analysis and investor returns
    derived_from_bd_id: BD-062
  - id: finance-C-239
    when: When implementing stress pool default sensitivity analysis for ABS tranche valuation
    action: Use stress pool default multiplier range of 1.0% to 500% for sensitivity analysis — do not exceed 500% as this
      represents extreme tail events outside standard stress testing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using stress defaults outside 1.0-500% range produces unrealistic scenarios that either underestimate risk
      (below 1.0%) or misrepresent tranche coverage (above 500% in non-tail analysis)
    derived_from_bd_id: BD-063
  - id: finance-C-240
    when: When implementing pool balance factorization in ABS cash flow modeling
    action: Use exactly 3-state pool balance model (Current/Delinquent/Defaulted) with separate BalanceFactor2 factors for
      each state — do not use 2-state or 5+ state models
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-3-state pool models causes incorrect cash flow allocation across tranches; 2-state models miss
      delinquent state treatment while 5+ state models add complexity without practical value
    derived_from_bd_id: BD-064
  - id: finance-C-241
    when: When implementing floating rate instrument day count conventions in ABS interest calculations
    action: Use ACT_365F as the default day count for floating rate instruments when no explicit convention is specified —
      verify EURIBOR products use ACT/360 override if applicable
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using non-ACT_365F defaults (e.g., ACT/360) for standard LIBOR/SOFR products causes systematic accrual errors
      of approximately 0.14% annually, compounding across large ABS portfolios
    derived_from_bd_id: BD-065
  - id: finance-C-242
    when: When implementing bond interest calculations in ABS waterfall
    action: Verify accrued interest calculation uses backward calculation from last accrual date to current date, and verify
      no missed accrual periods exist in the input data — for ACT_ACT day count, verify leap year handling matches the specific
      convention variant used
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Backward calculation assumes continuous accrual periods without gaps; missed periods cause accumulated interest
      shortfall that manifests as waterfall underpayments, creating legal liability for unpaid interest and potential covenant
      breaches in ABS structures
    derived_from_bd_id: BD-067
  - id: finance-C-243
    when: When implementing reserve account sizing logic in ABS waterfall
    action: Verify reserve target calculation uses percentage-based sizing relative to the source amount (note balance or
      scheduled interest), and verify no fixed dollar amounts or declining balance formulas are introduced — validate linear
      relationship assumption holds for the deal structure
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Percentage-based sizing assumes linear proportional relationship between reserve and deal size; fixed reserves
      or declining balances create disproportionate protection that either over-collateralizes small deals or under-protects
      large ones, causing either capital inefficiency or insufficient reserve coverage
    derived_from_bd_id: BD-068
  - id: finance-C-244
    when: When implementing bond or money market instrument definitions in ABS deal configuration
    action: Explicitly specify day count convention (DC) enum value for each instrument rather than relying on implicit defaults
      — verify DC_ACT_365F for fixed rate bonds and DC_ACT_365F for floaters are explicitly set per BD-001/BD-051/BD-065 specifications
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Implicit DC_ACT_ACT default differs from market-standard DC_ACT_365F used in fixed/floating instruments;
      this creates subtle 1-3 basis point differences per year that compound materially in long-dated ABS structures (10+
      years), causing up to 1-2% cumulative payment differences that are difficult to trace to their root cause
    derived_from_bd_id: BD-077
  - id: finance-C-245
    when: When implementing interest calculations involving multiple instrument types in ABS waterfall
    action: 'Track day count convention defaults explicitly per instrument type: fixed rate bonds use DC_ACT_365F (BD-001/BD-051),
      floating rate bonds use ACT_365F (BD-065), generic components use implicit ACT_ACT (BD-077) — do not mix instruments
      with different DC defaults without documenting the resulting calculation differences'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Three DC defaults (ACT_365F for fixed, ACT_365F for floaters, ACT_ACT for generic) create inconsistent precision
      across the waterfall; calculations mixing fixed and floating instruments produce materially different interest amounts
      over long-dated deals (10-20+ years), potentially causing waterfall shortfalls or overpayments that compound silently
      and are difficult to attribute to day count differences
    derived_from_bd_id: BD-094
  - id: finance-C-246
    when: When configuring Chinese ABS deal formats with waterfall status mapping
    action: Validate Chinese configuration keys (封包日, 起息日) match waterfall status mapping keys (未违约, 循环, 加速清偿) exactly — implement
      schema validation at configuration time to catch key mismatches before waterfall execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched Chinese keys pass silently during deal configuration setup but cause runtime errors during waterfall
      execution when status mapping lookup fails — this creates configuration errors that only surface during stress scenario
      simulation, making debugging difficult and potentially causing deal execution failures
    derived_from_bd_id: BD-097
  - id: finance-C-247
    when: When implementing pool liquidation proceeds calculation with multi-state asset tracking
    action: Apply separate liquidation discount factors (CurrentFactor, DefaultFactor) to each pool state (Current, Delinquent,
      Defaulted) during liquidation — track state distribution separately from total balance to verify materially different
      recovery values are computed per state transition
    severity: high
    kind: domain_rule
    modality: must
    consequence: Three-state pool balances with separate liquidation discount factors create complex non-linear loss patterns;
      a pool with 10% delinquent and 5% defaulted assets produces materially different liquidation proceeds than a pool with
      identical total balance but different state distribution, causing systematic mispricing of liquidation scenarios in
      stress testing
    derived_from_bd_id: BD-098
  - id: finance-C-248
    when: When running first loss analysis with the default stress pool range (1.0-500%)
    action: Verify that the 500% upper bound on the stress pool range matches expected subordination levels for the deal;
      if the deal has very thin subordination where actual required defaults could exceed 500% of pool balance, adjust the
      range bounds or enable explicit non-convergence reporting to avoid silent failure
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Root finder fails to converge when required defaults exceed 500% range bound, producing truncated results
      that falsely suggest infinite first loss protection; investors relying on these results may make incorrect credit assessment
      decisions
    derived_from_bd_id: BD-099
  - id: finance-C-249
    when: When implementing or modifying first loss analysis code
    action: Assume that non-convergence of the root finder within the stress pool range implies infinite first loss protection
      — non-convergence means the required defaults exceed the range bound, not that protection is unlimited
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misinterpreting non-convergence as infinite protection causes incorrect credit risk assessment; deals with
      extreme subordination that actually have marginal protection will appear to have unlimited protection, leading to poor
      investment decisions
    derived_from_bd_id: BD-099
  - id: finance-C-250
    when: When implementing first loss analysis
    action: Report explicitly when the root finder fails to converge within the stress pool range (1.0-500%), distinguishing
      between 'converged to X%' and 'required defaults exceed 500% bound — non-converged'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit non-convergence reporting, users cannot distinguish between successful analysis and truncated
      results due to range bounds; this silent failure leads to incorrect risk assessment and potential financial loss
    derived_from_bd_id: BD-099
  - id: finance-C-251
    when: When processing loan asset status codes from data feeds in ABS waterfall calculations
    action: Map both English 'current' and Chinese '正常' status codes to 'Current' status, indicating performing loans that
      generate regular cash flows
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying the status mapping would misclassify performing loans as delinquent, causing incorrect waterfall
      distributions and trigger evaluations that would result in incorrect payment priorities to bondholders
    derived_from_bd_id: BD-003
  - id: finance-C-252
    when: When implementing bond payment priority logic in ABS waterfall processing
    action: Execute sequential payment order where senior bonds receive full payment before junior bonds receive any distributions
      — verify no pro-rata sharing of any waterfall tranche
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing to pro-rata sharing would eliminate the credit enhancement protection that shields senior bondholders
      from default losses, as junior tranches would no longer absorb losses first in the waterfall priority
    derived_from_bd_id: BD-004
  - id: finance-C-253
    when: When configuring ResecDeal structures in the mkPoolType function
    action: Use exact pool map key format '{dealName}:{bondName}:{pct}:{date}' with each four components — enforce this format
      validation in configuration processing
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Partial or malformed pool map keys cause runtime errors during waterfall processing, breaking deal execution
      and preventing synthetic asset replication from completing successfully
    derived_from_bd_id: BD-083
  - id: finance-C-254
    when: When implementing revolving pool reinvestment logic in deal definition
    action: Verify buyAsset actions in revolving pools execute only after collection rules complete and cash is swept to the
      source account — verify collection rules appear earlier in the waterfall than any buyAsset operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Purchasing assets before collection cash sweep causes the system to calculate reinvestment amounts against
      unavailable funds, resulting in insufficient funds errors or incorrect reinvestment calculations that distort return
      distributions
    derived_from_bd_id: BD-086
  - id: finance-C-256
    when: When structuring clean-out repurchase transaction ordering in waterfall
    action: 'Execute sellAsset before transfer and payment actions in waterfall — enforce strict sequence: sellAsset → transfer
      → accrue → pay'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Executing payments before asset sale settlement leaves repurchase proceeds unaccounted for and violates transaction
      atomicity, potentially causing cash to be distributed before asset title transfer completes
    derived_from_bd_id: BD-076
  - id: finance-C-257
    when: When configuring pool frequency parameters for deal definition
    action: Verify pool frequency 'MonthFirst' setting matches intended collection timing — collection at beginning-of-month
      vs end-of-month directly affects cash availability timing for distributions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect pool frequency configuration causes cash to enter the waterfall at wrong times, leading to payment
      timing errors that may cause distributions to occur before sufficient cash is available or significantly delay investor
      payments
    derived_from_bd_id: BD-013
  - id: finance-C-258
    when: When configuring payment distribution schedules in ABS waterfall modeling
    action: Verify that the DayOfMonth payment day (default 20) aligns with actual borrower payment patterns and matches the
      deal's distribution date conventions; adjust to the correct day if the deal specifies a different distribution date
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: A mismatch between payment day and borrower payment patterns causes cash flow timing gaps, potentially delaying
      distributions by days or weeks and causing investor reporting inconsistencies with actual ABS performance
    derived_from_bd_id: BD-014
  - id: finance-C-259
    when: When implementing asset liquidation or sale valuation logic
    action: Verify that the discount_factor and recovery_rate parameters match the specific asset's risk profile and liquidation
      scenario assumptions; do not rely on PV defaults without validating these inputs against historical recovery data
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using PV valuation with incorrect discount factor or recovery rate causes systematic valuation errors, leading
      to inaccurate loss recognition timing and potentially misrepresenting tranche protection levels in ABS structures
    derived_from_bd_id: BD-017
  - id: finance-C-260
    when: When setting performance assumptions for ABS cash flow modeling
    action: Verify that CDR, CDRPadding, and CPR rate values are calibrated against actual historical performance data for
      the specific asset type; do not use standard assumptions without validating they reflect current market conditions and
      pool characteristics
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using uncalibrated rate assumptions causes the model to misrepresent prepayment and default behaviors, leading
      to incorrectly sized credit enhancements and potentially structuring deals that appear protected but fail under realistic
      stress scenarios
    derived_from_bd_id: BD-019
  - id: finance-C-261
    when: When using root finder functionality to reverse-engineer required prepayment/default rates for target IRR
    action: Validate root finder results through sensitivity analysis; verify the derived prepayment/default rates are realistic
      and achievable, not artifacts of model overfitting or unrealistic return targets
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Accepting root finder output without validation risks structuring deals around unachievable performance assumptions,
      leading to pricing errors and potential investor losses when actual performance falls short of breakeven scenarios
    derived_from_bd_id: BD-020
  - id: finance-C-262
    when: When modeling ABS waterfall distributions with segregated collection types
    action: Stress test each collection types (CollectedInterest, CollectedPrincipal, CollectedPrepayment, CollectedRecoveries)
      simultaneously across the entire waterfall; do not assume positive collections in one bucket can offset shortfalls in
      another due to strict priority ordering segregation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Collection type segregation creates non-linear cascade effects where shortfalls in any single collection
      type amplify into major structural changes, potentially triggering early amortization or reserve draws that reshape
      the entire deal structure
    derived_from_bd_id: BD-100
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
