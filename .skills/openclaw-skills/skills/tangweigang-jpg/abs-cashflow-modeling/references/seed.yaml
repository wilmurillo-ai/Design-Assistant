      incorrect cashflow projections
  - id: finance-C-170
    when: When defining bond payment ordering rules in waterfall
    action: 'Use one of the five defined order types: ByName, ByProRataCurBal, ByCurrentRate, ByMaturity, ByStartDate'
    severity: fatal
    kind: domain_rule
    modality: must
