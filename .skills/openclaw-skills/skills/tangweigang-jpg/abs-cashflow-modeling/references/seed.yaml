    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using single-pool asset factory for multi-pool deals causes incorrect cash flow aggregation and improper
      waterfall distribution across constituent pools, leading to miscalculated distributions and potential payment shortfalls
      to investors
    derived_from_bd_id: BD-075
