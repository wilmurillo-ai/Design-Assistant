    stage_ids:
    - asset_types
  - id: finance-C-086
    when: When creating Lease assets
    action: produce LS tagged structure with LeaseInfo and gap/rent fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: Lease assets without LS tag and LeaseInfo are misclassified, causing lease-specific gap and rent assumptions
      to be applied to wrong asset types
    stage_ids:
    - asset_types
  - id: finance-C-087
    when: When creating Loan assets
    action: produce LO tagged structure with PersonalLoan and LoanOriginalInfo fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: Loan assets without LO tag are misclassified, causing loan-specific prepayment and recovery assumptions to
      fail or be misapplied
    stage_ids:
    - asset_types
  - id: finance-C-088
    when: When creating Installment assets
    action: produce IL tagged structure with Installment tag and LoanOriginalInfo
    severity: high
    kind: domain_rule
    modality: must
    consequence: Installment assets without IL tag are misclassified, causing fee-based assumptions to be applied incorrectly
    stage_ids:
    - asset_types
  - id: finance-C-089
    when: When creating FixedAsset assets
    action: produce FA tagged structure with FixedAssetInfo and capacity/accRule fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: FixedAsset without FA tag is misclassified, causing capacity utilization and balance assumptions to be applied
      incorrectly
    stage_ids:
    - asset_types
  - id: finance-C-090
    when: When creating Invoice/Receivable assets
    action: produce RE tagged structure with ReceivableInfo and dueDate/feeType fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invoice assets without RE tag are misclassified, causing due date and fee assumptions to fail
    stage_ids:
    - asset_types
  - id: finance-C-092
    when: When creating assumptions for Lease assets
    action: apply loan-style prepayment assumptions to lease assets
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Lease assets use gap/rent/endType structure which is incompatible with CPR/prepayment assumptions, causing
      assumption application to fail or produce invalid results
    stage_ids:
    - asset_types
  - id: finance-C-093
    when: When using ByObligor assumptions for borrower-specific defaults
    action: assign obligor tags to assets that match the ByObligor strategy rules
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: ByObligor assumptions without matching obligor tags result in assets falling through to default strategy
      or being assigned incorrect assumptions
    stage_ids:
    - asset_types
  - id: finance-C-094
    when: When identifying deal type from pool assets
    action: use the first asset's tag to determine the deal type for homogeneous pools
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect first-asset detection causes wrong deal type classification, leading to mismatched waterfall and
      assumption application
    stage_ids:
    - asset_types
  - id: finance-C-095
    when: When adding new asset types to the system
    action: update both mkAsset and mkAssetUnion pattern matching functions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: New asset types added only to mkAsset but not mkAssetUnion cause RuntimeError in mixed asset pools, breaking
      multi-asset deal support
    stage_ids:
    - asset_types
  - id: finance-C-096
    when: When identifying deal type with multiple pools
    action: check if each pools have consistent asset types before setting deal type
    severity: high
    kind: domain_rule
    modality: must
    consequence: Multi-pool deals with inconsistent asset types must be classified as UDeal (UDeal), otherwise assumptions
      will be misapplied across pools
    stage_ids:
    - asset_types
  - id: finance-C-097
    when: When using AssetType and SubAssetType enums for classification
    action: confuse AssetType (broad category) with SubAssetType (specific variant)
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Confusing AssetType Mortgage with SubAssetType AdjustableRateMortgage causes wrong handling of ARM-specific
      fields like arm parameters
    stage_ids:
    - asset_types
  - id: finance-C-098
    when: When creating StepUpLease assets
    action: provide stepUp parameter with valid step-up type (FlatRate, byRates, flatAmount, byAmounts)
    severity: high
    kind: domain_rule
    modality: must
    consequence: StepUpLease without valid stepUp parameter causes mkLeaseStepUp pattern matching to fail with RuntimeError
    stage_ids:
    - asset_types
  - id: finance-C-099
    when: When creating Lease assets with rental calculation
    action: provide rental parameter with valid calc type (byDay, byPeriod)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Lease assets without valid rental calculation type cause mkLeaseCalc pattern matching to fail with RuntimeError
    stage_ids:
    - asset_types
  - id: finance-C-102
    when: When validating integer fields for bond parameters and date offsets
    action: Use vInt validator which enforces strict integer type via Schema(int).validate()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Float values passed as integers will cause incorrect bond numbering, period calculations, and financial results
      due to type coercion
    stage_ids:
    - validation
  - id: finance-C-104
    when: When validating list-typed inputs like bond name lists and date ranges
    action: Use vList validator with element type schema to validate list contents
    severity: high
    kind: domain_rule
    modality: must
    consequence: Lists with wrong element types will cause cascading errors in downstream data processing, leading to malformed
      deal requests
    stage_ids:
    - validation
  - id: finance-C-105
    when: When validating curve data with date-value pairs
    action: Use vCurve validator which enforces [[dateStr, Or(int,float)]] structure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid curve structures will cause incorrect interest rate curves and pricing calculations in the ABS deal
      engine
    stage_ids:
    - validation
  - id: finance-C-106
    when: When implementing or extending validation functions
    action: Bypass the schema library's validation mechanism with manual type checking alone
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Custom validation logic without schema library will miss edge cases like empty strings, None values, and
