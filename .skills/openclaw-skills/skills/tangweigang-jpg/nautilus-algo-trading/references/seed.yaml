- id: AP-ZIPLINE-181
  title: asset db 过期后 Pipeline 报"no assets traded"，误导用户排查数据范围
  description: 'Zipline 的 asset database（SQLite）记录每只股票的 start/end 交易日期。若 使用了旧版 Quandl/自建 bundle 且未重新 ingest，在回测新日期范围时 Pipeline
    抛出 "Failed to find any assets with country_code ''US'' that traded between [dates]"。A 股场景：重新下载行情后若只更新价格数据而未重建 asset db，退市/
