context_state_machine:
  states:
  - id: CA1_MEMORY_CHECKED
    entry: Task started
    exit: All memory queries attempted and recorded; memory_unavailable set if failed
    timeout: 30s — skip memory, mark memory_unavailable=true, proceed to CA2
  - id: CA2_GAPS_FILLED
    entry: CA1 complete
    exit: 'All FATAL-priority required inputs answered: target market (A-share/HK/US), data source, time range, strategy type'
    timeout: NOT skippable — FATAL inputs MUST be user-answered before proceeding
  - id: CA3_PATH_SELECTED
    entry: CA2 complete
    exit: intent_router matched single use case with confidence gap > 20% over next candidate, no data_domain ambiguity
    timeout: Trigger ambiguity_question for top-2 candidates, await user selection
  - id: CA4_EXECUTING
    entry: CA3 complete + user explicit confirmation received
    exit: All hard gates G1-Gn passed and output files written
    timeout: NOT skippable — user confirmation of execution path required
  enforcement: Code generation is PROHIBITED before CA4_EXECUTING. Any regression to earlier state MUST be announced to user.
    buy/sell ordering SL-01 check runs at CA4 entry.
spec_lock_registry:
  semantic_locks:
  - id: SL-01
    description: Execute sell orders before buy orders in every trading cycle
    locked_value: sell() called before buy() in each Trader.run() iteration
    violation_is: fatal
    source_bd_ids:
    - BD-018
  - id: SL-02
    description: Trading signals MUST use next-bar execution (no look-ahead)
    locked_value: due_timestamp = happen_timestamp + level.to_second()
    violation_is: fatal
    source_bd_ids:
    - BD-014
    - BD-025
  - id: SL-03
    description: Entity IDs MUST follow format entity_type_exchange_code
    locked_value: stock_sh_600000 | stockhk_hk_0700 | stockus_nasdaq_AAPL
    violation_is: fatal
    source_bd_ids: []
  - id: SL-04
    description: DataFrame index MUST be MultiIndex (entity_id, timestamp)
    locked_value: df.index.names == ['entity_id', 'timestamp']
    violation_is: fatal
    source_bd_ids: []
  - id: SL-05
    description: 'TradingSignal MUST have EXACTLY ONE of: position_pct, order_money, order_amount'
    locked_value: XOR enforcement in trading/__init__.py:68
    violation_is: fatal
    source_bd_ids: []
  - id: SL-06
    description: 'filter_result column semantics: True=BUY, False=SELL, None/NaN=NO ACTION'
    locked_value: factor.py:475 order_type_flag mapping
    violation_is: fatal
    source_bd_ids: []
  - id: SL-07
    description: Transformer MUST run BEFORE Accumulator in factor pipeline
    locked_value: 'compute_result(): transform at :403 before accumulator at :409'
    violation_is: fatal
    source_bd_ids: []
  - id: SL-08
    description: 'MACD parameters locked: fast=12, slow=26, signal=9'
    locked_value: factors/algorithm.py:30 macd(slow=26, fast=12, n=9)
    violation_is: fatal
    source_bd_ids:
    - BD-036
  - id: SL-09
    description: 'Default transaction costs: buy_cost=0.001, sell_cost=0.001, slippage=0.001'
    locked_value: sim_account.py:25 SimAccountService default costs
    violation_is: warning
    source_bd_ids:
    - BD-029
  - id: SL-10
    description: A-share equity trading is T+1 (no same-day close of buy positions)
    locked_value: sim_account.available_long filters by trading_t
    violation_is: fatal
    source_bd_ids: []
  - id: SL-11
    description: Recorder subclass MUST define provider AND data_schema class attributes
    locked_value: contract/recorder.py:71 Meta; register_schema decorator
    violation_is: fatal
    source_bd_ids: []
  - id: SL-12
    description: Factor result_df MUST contain either 'filter_result' OR 'score_result' column
    locked_value: result_df.columns.intersection({'filter_result', 'score_result'}) non-empty
    violation_is: fatal
    source_bd_ids: []
  implementation_hints:
  - id: IH-01
    hint: 'Use AdjustType enum exactly: qfq (pre-adjust), hfq (post-adjust), bfq (none) — contract/__init__.py:121'
  - id: IH-02
    hint: For A-share kdata, default to hfq for long-term analysis (dividend-adjusted) — trader.py:538 StockTrader
  - id: IH-03
    hint: SQLite connection MUST use check_same_thread=False for multi-threaded recorders
  - id: IH-04
    hint: Accumulator state serialization uses JSON with custom encoder/decoder hooks — contract/base_service.py
  - id: IH-05
    hint: Factor.level MUST match TargetSelector.level (enforced at add_factor) — factors/target_selector.py:84
preservation_manifest:
  required_objects:
    business_decisions_count: 137
    fatal_constraints_count: 68
    non_fatal_constraints_count: 217
    use_cases_count: 73
    semantic_locks_count: 12
    preconditions_count: 4
    evidence_quality_rules_count: 2
    traceback_scenarios_count: 5
architecture:
  pipeline: data_collection -> data_storage -> factor_computation -> target_selection -> trading_execution -> visualization
  stages:
  - id: data_collection
    narrative:
      does_what: TimeSeriesDataRecorder and FixedCycleDataRecorder fetch OHLCV and fundamental data from providers (eastmoney,
        joinquant, baostock, akshare) and persist domain objects (Stock1dKdata, BalanceSheet) to SQLite via df_to_db().
      key_decisions: BD-002 chose evaluate_start_end_size_timestamps for incremental fetch (not full refresh) because comparing
        to get_latest_saved_record avoids redundant API calls; BD-003 chose get_data_map field transformation to keep domain
        schema provider-agnostic.
      common_pitfalls: 'Don''t forget SL-11: Recorder subclass MUST declare both provider and data_schema class attributes
        else initialization fails with assertion error; finance-C-001 fatal violation.'
    business_decisions:
    - id: BD-001
      type: B
      summary: Data types classified into three tiers (PYO3 managed, Book data, Python managed) each with different internal
        representation
    - id: BD-002
      type: B
      summary: Bar aggregation done per-bar-type with internal queue of raw ticks, only finalized bars published on bar close
    - id: BD-003
      type: M/BA
      summary: Quote tick buffering at 10,000 per instrument by default (configurable tick_capacity)
    - id: BD-004
      type: BA
      summary: Time range generator uses a gap-filling strategy that requests adjacent intervals to fill gaps, not individual
        timestamps
    - id: BD-005
      type: B/DK
      summary: Replay mode suspends external data and injects historical data through the same data engine pipeline
    - id: BD-006
      type: B/RC
      summary: Data catalog uses a Singleton+ABCMeta metaclass to enforce single catalog instance per process
    - id: BD-045
      type: B
      summary: Use QuoteTickDataWrangler.process_bar_data to convert M1 bars to quote ticks
    - id: BD-048
      type: B/DK
      summary: BarType.from_str('XXX.YYY-5-MINUTE-BID-INTERNAL') uses internal bar aggregation
    - id: BD-049
      type: B/BA
      summary: Use subscribe_bars(bar_type) in on_start to receive bar updates
    - id: BD-059
      type: B/BA
      summary: DataEngineConfig time_bars_interval_type='left-open' excludes start, includes end
    - id: BD-060
      type: B/BA
      summary: DataEngineConfig time_bars_timestamp_on_close=True timestamps bar on close
    - id: BD-087
      type: B/RC
      summary: DataEngineConfig validate_data_sequence=True checks timestamp ordering
    - id: BD-088
      type: B
      summary: DataEngineConfig buffer_deltas=True waits for F_LAST flag on order book
    - id: BD-GAP-002
      type: M/DK
      summary: 'Missing: Day count convention'
    - id: BD-GAP-003
      type: B
      summary: 'Missing: Backtest Overfitting Protection'
    - id: BD-GAP-004
      type: B
      summary: 'Missing: RL Reward Function Trading Costs'
    - id: BD-GAP-005
      type: B
      summary: 'Missing: Transaction Threshold Config (CTR/SAR)'
    - id: BD-GAP-007
      type: M/DK
      summary: 'Missing: Day count convention'
    - id: BD-GAP-008
      type: B
      summary: 'Missing: Backtest Overfitting Protection'
    - id: BD-GAP-010
      type: B
      summary: 'Missing: VaR/CVaR Confidence Level'
    - id: BD-GAP-011
      type: B
      summary: 'Missing: Default Definition & IFRS 9'
    - id: BD-GAP-012
      type: B
      summary: 'Missing: NPL EBA Field Completeness'
    - id: BD-GAP-013
      type: B
      summary: 'Missing: RL Reward Function Trading Costs'
  - id: data_storage
    narrative:
      does_what: StorageBackend persists DataFrames to per-provider SQLite databases at {data_path}/{provider}/{provider}_{db_name}.db
        using path templates from _get_path_template; Mixin.record_data and Mixin.query_data provide uniform read/write interface.
      key_decisions: BD-004 chose StorageBackend abstraction (not hardcoded SQLite) to allow future cloud storage swap; BD-006
        derives db_name from data_schema __tablename__ for per-domain database isolation.
      common_pitfalls: SL-04 violation (wrong DataFrame index) causes factor pipeline failures downstream; always ensure df.index.names
        == ['entity_id', 'timestamp'] before calling record_data.
    business_decisions: []
  - id: factor_computation
    narrative:
      does_what: Factor.compute() applies Transformer (stateless, e.g. MacdTransformer) then Accumulator (stateful, e.g. MaStatsAccumulator)
        to produce filter_result or score_result columns; EntityStateService persists per-entity rolling state across batches.
      key_decisions: BD-007 chose Factor inheriting DataReader for composable data access; SL-08 locks MACD at (fast=12, slow=26,
        n=9) — chose standard Appel parameters not adaptive because interpretability matters for practitioners.
      common_pitfalls: 'SL-07: Transformer MUST run before Accumulator — swapping order causes NaN propagation; SL-12: result_df
        must contain filter_result OR score_result column or TargetSelector silently drops all signals.'
    business_decisions:
    - id: BD-007
      type: B
      summary: Strategy inherits from Actor which owns a Clock, msgbus, cache, portfolio, and log — ensuring strategies have
        full system context without coupling to engine internals
    - id: BD-008
      type: BA
      summary: Order events are routed through MessageBus with strategy_id and position_id attached, enabling stateless strategy
        reconstruction from event stream
    - id: BD-009
      type: BA
      summary: Bracket orders encoded as OrderList with OTO contingency; child orders inherit position_id at submission time,
        not fill time
    - id: BD-010
      type: M/BA
      summary: Strategy config is frozen dataclass validated at construction — config field names become strategy attributes,
        with on_config override for validation
    - id: BD-011
      type: BA
      summary: Actors/Strategies have a full lifecycle (on_start, on_stop, on_fault, on_degrade, on_save, on_load) supporting
        crash-only design
    - id: BD-052
      type: B/DK
      summary: EMA(10)/EMA(20) crossover signals for trend-following strategy entry
    - id: BD-053
      type: B/DK
      summary: Use instrument.make_price() to create price aligned to tick_size
    - id: BD-074
      type: B/DK
      summary: StrategyConfig manage_stop=True auto-exits positions on strategy stop
    - id: BD-075
      type: B/DK
      summary: market_exit_max_attempts=100 with 100ms interval = 10 second wait
    - id: BD-076
      type: B/DK
      summary: market_exit_reduce_only=True ensures closing orders don't open new positions
    - id: BD-GAP-001
      type: M
      summary: 'Missing: Matrix ill-conditioning'
    - id: BD-GAP-006
      type: B
      summary: 'Missing: Sanctions List Versioning'
    - id: BD-GAP-009
      type: B
      summary: 'Missing: Covariance Estimator Selection'
  - id: target_selection
    narrative:
      does_what: TargetSelector.add_factor() registers Factor instances; get_targets() returns entity_ids passing threshold
        filter at a specific timestamp, enabling point-in-time historical backtesting without look-ahead.
      key_decisions: BD-012 chose registrable factor list (not hardcoded) for runtime customization; BD-013 chose timestamp-specific
        filtering not current-only because backtests need historical point-in-time correctness.
      common_pitfalls: Factor.level MUST match TargetSelector.level (IH-05); mismatched levels cause silent empty target lists
        that look like no signals but are actually level-mismatch bugs.
    business_decisions: []
  - id: trading_execution
    narrative:
      does_what: Trader.run() calls sell() before buy() each cycle, generates TradingSignals with due_timestamp = happen_timestamp
        + level.to_second() for next-bar execution, and applies on_profit_control() for stop-loss/take-profit before regular
        target selection.
      key_decisions: SL-01 locks sell-before-buy order because available_long check in sim_account depends on it — chose this
        over symmetric ordering to prevent implicit leverage; BD-039 chose long=AND/short=OR multi-level logic to reflect
        risk asymmetry.
      common_pitfalls: 'SL-02 violation (immediate execution instead of next-bar) introduces look-ahead bias and makes backtest
        results unreproducible in live trading; SL-10: A-share T+1 constraint — backtesting without it overstates returns.'
    business_decisions: []
  - id: visualization
    narrative:
      does_what: Drawer.draw() combines kline main chart with factor overlays and Rect annotations for entry/exit signals
        using Plotly; Drawable interface on Factor enables consistent chart rendering across data types.
      key_decisions: BD-019 chose drawer_rects subclass override for custom annotations not hardcoded markers — allows traders
        to define entry/exit visuals without modifying base drawing logic.
      common_pitfalls: draw_result=True by default (BD-055) is fine for development but set draw_result=False in production/headless
        environments to avoid Plotly server startup overhead.
    business_decisions: []
  - id: cross_cutting_concerns
    narrative:
      does_what: 'Invariants and utilities that span multiple pipeline stages — collected from 23 source groups: accounting(3),
        backtest_simulation(6), default_value(5), execution(10), fill_model(3), global(10), and 17 more.'
      key_decisions: 101 BDs merged here because they apply to more than one main stage (e.g. algorithm helpers, default value
        choices, ordering contracts, error handling). Agent should inspect individual BD summaries and link back to affected
        main stages via shared IDs.
      common_pitfalls: Cross-cutting concerns frequently surface as bugs when changes to one main stage unintentionally break
        another. Check constraints referencing these BDs and verify invariants still hold after any stage-local modification.
    business_decisions:
    - id: BD-031
      type: B/RC
      summary: Account classes (Cash, Margin, Security) each implement the same Account interface but with different balance/margin
        semantics
    - id: BD-032
      type: BA
      summary: Margin requirements checked at order submission AND at every fill — two-level enforcement prevents order-time
        limits from being circumvented by subsequent price moves
    - id: BD-033
      type: BA/DK
      summary: Funding rate is TWAPed over the funding interval (typically 8 hours for perpetuals) rather than applied at
        a single instant
    - id: BD-023
      type: B
      summary: BacktestEngine reuses the same NautilusKernel (DataEngine, ExecutionEngine, RiskEngine, Portfolio, Cache, msgbus)
        as live — same code path, different data source and clock
    - id: BD-024
      type: B/DK
      summary: SimulatedExchange implements venue-style fill events that flow through ExecutionEngine identically to live
        fills
    - id: BD-025
      type: BA/DK
      summary: LatencyModel applied per-fill in simulated exchange; due_timestamp in commands used for HFT simulation
    - id: BD-026
      type: B/RC
      summary: Backtest uses a single static Clock advanced by the BacktestEngine — data timestamps must be monotonically
        non-decreasing
    - id: BD-027
      type: M
      summary: Data can be added in streaming mode (generator yielding chunks) or batch mode — sorting deferred to end provides
        O(n) vs O(n²) for incremental sorts
    - id: BD-080
      type: B
      summary: Add FXRolloverInterestModule for realistic FX carry simulation
    - id: BD-101
      type: BA
      summary: Commission calculation uses *2 for round-turn assumption
    - id: BD-103
      type: BA
      summary: StrategyConfig defaults manage_stop=False, manage_gtd_expiry=False
    - id: BD-108
      type: B/BA
      summary: IBContract normalizes strike=0.0 to UNSET_DOUBLE in __post_init__
    - id: BD-109
      type: DK
      summary: OrderFactory requires OrderManager with submit_order_handler=None
    - id: BD-112
      type: B
      summary: MockCacheDatabase uses in-memory dicts for each state - no persistence
    - id: BD-015
      type: B
      summary: ExecutionEngine maintains the single source of truth for order states — other components (Portfolio, Cache,
        Strategy) query it via MessageBus events rather than holding copies
    - id: BD-016
      type: B
      summary: OrderEmulator subscribes to DataEngine topics for order book data and generates simulated fills internally
        for conditional order types, then passes them to ExecutionEngine as if from a venue
    - id: BD-017
      type: B
      summary: ExecAlgorithm is optional plug-in applied per-order via exec_algorithm_id field — modifies order params over
        time without changing the execution interface
    - id: BD-018
      type: BA
      summary: due_timestamp field in ModifyOrder and CancelOrder encodes the intended execution time, enabling backtesting
        of HFT latency effects
    - id: BD-019
      type: B/BA
      summary: Order state machine has distinct LOCAL (Initialized, Emulated, Released) and VENUE states (Submitted, Accepted,
        etc.) — this separation enables emulation layer for conditional orders
    - id: BD-037
      type: B
      summary: OmsType.HEDGING generates position IDs per venue for cross-instrument strategies
    - id: BD-038
      type: B/BA
      summary: OmsType.NETTING for single-instrument strategies with position netting
    - id: BD-039
      type: B
      summary: AccountType.MARGIN enables leverage; AccountType.CASH for spot-only
    - id: BD-040
      type: B/BA
      summary: default_leverage=Decimal(1) means 1:1 no leverage; Decimal(10) for 10x
    - id: BD-041
      type: B
      summary: Use base_currency=None for multi-currency FX accounts
    - id: BD-042
      type: B/BA
      summary: FillModel prob_fill_on_limit=0.2 simulates partial limit order fills
    - id: BD-043
      type: B/BA
      summary: FillModel prob_slippage=0.5 adds realistic slippage to market orders
    - id: BD-044
      type: B
      summary: FillModel random_seed=42 ensures reproducible backtest results
    - id: BD-115
      type: BA
      summary: 'INTERACTION: [BD-023] × [BD-036] → Backtest parity promise undermined by hard gate bypass, creating phantom
        safety during simulation'
    - id: BD-116
      type: B/DK
      summary: 'INTERACTION: [BD-036] × [BD-061] → Risk bypass disables order rate limiting in backtest, masking potential
        HFT runaway scenarios'
    - id: BD-117
      type: BA
      summary: 'INTERACTION: [BD-002] × [BD-052] → Bar close aggregation conflicts with EMA crossover strategy timing assumptions'
    - id: BD-118
      type: B/BA
      summary: 'INTERACTION: [BD-100] × [BD-021] × [BD-107] → Three-way invariant dependency creates hidden coupling across
        position model layers'
    - id: BD-119
      type: BA
      summary: 'INTERACTION: [BD-006] × [BD-029] → Singleton catalog with optional database creates non-durable state in production
        deployments'
    - id: BD-120
      type: B
      summary: 'INTERACTION: [BD-112] × [BD-062] → Mock persistence creates false assurance that position snapshots work correctly'
    - id: BD-121
      type: BA/M
      summary: 'INTERACTION: [BD-026] × [BD-025] × [BD-018] → Deterministic clock combined with stochastic latency creates
        unreproducible HFT edge cases'
    - id: BD-122
      type: BA
      summary: 'INTERACTION: [BD-103] × [BD-074] → Conflicting defaults between StrategyConfig and Strategy lifecycle create
        stop management ambiguity'
    - id: BD-123
      type: BA
      summary: 'INTERACTION: [BD-004] × [BD-087] → Interval-level gap filling assumes timestamp ordering that validation is
        designed to enforce'
    - id: BD-124
      type: B/BA
      summary: 'INTERACTION: [BD-013] × [BD-040] × [BD-039] → Triple-layer conservative risk defaults amplify position constraints
        beyond individual settings'
    - id: BD-050
      type: B
      summary: register_indicator_for_bars(bar_type, indicator) auto-updates indicator before on_bar
    - id: BD-051
      type: B
      summary: MovingAverageFactory.create(period, MovingAverageType.EXPONENTIAL) for EMA
    - id: BD-056
      type: B
      summary: 'Cascaded indicators: use update_raw() to feed indicator output into another'
    - id: BD-057
      type: B/BA
      summary: Indicator initialization requires at least 'period' bars before valid values
    - id: BD-058
      type: B/DK
      summary: Use deque(maxlen=100) to store rolling window of historical indicator values
    - id: BD-105
      type: DK/B
      summary: Strategy inherits Actor which uses placeholder Clock until registered
    - id: BD-100
      type: DK
      summary: BUY OrderSide ALWAYS creates LONG PositionSide; SELL creates SHORT
    - id: BD-104
      type: B
      summary: ENGINE_EXPIRING_INSTRUMENT_CLASSES constant defines which instruments auto-expire
    - id: BD-110
      type: DK
      summary: Strategy requires registration with Trader before any trading operations
    - id: BD-114
      type: DK/B
      summary: Position.reopen after close clears each state then applies new fill
    - id: BD-063
      type: B/DK
      summary: LiveExecEngineConfig reconciliation=True reconciles orders on startup
    - id: BD-064
      type: B/BA
      summary: reconciliation_lookback_mins=1440 checks last 24 hours of orders on startup
    - id: BD-070
      type: B/DK
      summary: LiveDataClientConfig instrument_provider=InstrumentProviderConfig(load_all=True) loads each symbols
    - id: BD-071
      type: B
      summary: BinanceExecClientConfig max_retries=3 handles transient API failures
    - id: BD-072
      type: B/BA
      summary: 'Timeout values: timeout_connection=30.0, timeout_reconciliation=10.0'
    - id: BD-090
      type: B/RC
      summary: StrategyConfig log_events=True logs each order/position events
    - id: BD-068
      type: B/DK
      summary: VolatilityMarketMaker uses double_spread_position=0.5 for mid-price grid
    - id: BD-069
      type: B/DK
      summary: GridMarketMaker uses settings['inventory_strategy']='asymmetric' for skew
    - id: BD-092
      type: B/DK
      summary: MarketMaker strategies use inventory-based grid spacing
    - id: BD-094
      type: B/BA
      summary: Free balance calculation as min(availableBalance, walletBalance) for margin accounts
    - id: BD-095
      type: B/BA
      summary: Commission calculation with rounding to 4 decimal places for Polymarket
    - id: BD-099
      type: B/DK
      summary: Order side determination based on trader role and cross-asset matching for Polymarket
    - id: BD-096
      type: B/BA
      summary: Total PnL percentage calculation relative to starting balance
    - id: BD-098
      type: B/BA
      summary: Sharpe Ratio calculation with 252 days annualization
    - id: BD-097
      type: B/DK
      summary: Fixed Risk Position Sizing with unit batch calculation
    - id: BD-102
      type: DK
      summary: Order state machine has rigid transition table - certain states MUST come before others
    - id: BD-106
      type: DK
      summary: Position.purge_events_for_order rebuilds state by reapplying fills in order
    - id: BD-111
      type: DK/B
      summary: 'Closing order side is deterministic from position side: LONG->SELL, SHORT->BUY'
    - id: BD-107
      type: DK/B
      summary: Position uses signed_qty as canonical state; _buy_qty/_sell_qty are tracking only
    - id: BD-113
      type: DK
      summary: Strategy event handlers (on_bar, on_quote_tick) called by message bus subscription
    - id: BD-012
      type: B
      summary: RiskEngine is NOT a pluggable strategy — it is a hard gate that must approve every command before the ExecutionEngine
        sees it
    - id: BD-013
      type: BA
      summary: position_pct default=None means no position size limit by default — explicit opt-in required
    - id: BD-014
      type: BA
      summary: profit_threshold and loss_limit are unrealized PnL thresholds checked against the Portfolio's snapshot of open
        positions
    - id: BD-054
      type: B
      summary: Use order_factory.bracket() for single-order entry with TP/SL attached
    - id: BD-055
      type: B/BA
      summary: TimeInForce.GTC (Good Till Canceled) for bracket orders
    - id: BD-061
      type: B/BA
      summary: RiskEngineConfig max_order_submit_rate='100/00:00:01' limits to 100 orders/sec
    - id: BD-078
      type: B/BA
      summary: use_uuid_client_order_ids=True generates unique order IDs automatically
    - id: BD-079
      type: B/DK
      summary: External order claims bind external venue orders to strategy
    - id: BD-089
      type: B
      summary: ExecEngineConfig allow_overfills=True for high-frequency strategies
    - id: BD-091
      type: B
      summary: StrategyConfig manage_contingent_orders=True auto-manages OTO/OCO orders
    - id: BD-034
      type: B/BA
      summary: Use TraderId format 'BACKTESTER-001' or 'BACKTEST-XXX-001' for backtest identification
    - id: BD-035
      type: B
      summary: Log level 'INFO' shows indicator values and trades; 'ERROR' suppresses for performance
    - id: BD-036
      type: B
      summary: RiskEngineConfig bypass=True for backtests to skip pre-trade risk checks
    - id: BD-093
      type: B
      summary: Use Decimal for each monetary quantities to avoid floating-point errors
    - id: BD-028
      type: BA
      summary: Cache is NOT the source of truth for orders — ExecutionEngine is. Cache stores a snapshot for fast queries
        and persistence, but ExecutionEngine is consulted for authoritative state
    - id: BD-029
      type: M
      summary: Cache has optional database backing (CacheDatabaseFacade) — when None, no persistence occurs. This enables
        memory-only backtests and live trading without Redis
    - id: BD-030
      type: M
      summary: Bidirectional indexes (_index_venue_orders, _index_order_strategy, etc.) maintained in sync with primary caches
        — O(1) lookup for any entity relationship query
    - id: BD-046
      type: B
      summary: CacheConfig bar_capacity=5000 stores last N bars per bar type for lookback
    - id: BD-047
      type: B
      summary: CacheConfig tick_capacity=10000 stores last N ticks for order book simulation
    - id: BD-062
      type: B/RC
      summary: ExecEngineConfig snapshot_positions=True persists position states to database
    - id: BD-073
      type: B
      summary: Cache encoding='msgpack' is faster than JSON for database operations
    - id: BD-077
      type: B
      summary: ExecEngineConfig purge_closed_orders_interval_mins enables automatic cleanup
    - id: BD-081
      type: B
      summary: Cache add()/get() with pickle for custom object storage in cache
    - id: BD-082
      type: B
      summary: Use cache.bar(bar_type) and cache.bar(bar_type, index=1) for latest/previous bars
    - id: BD-083
      type: B/BA
      summary: 'Filter orders by state: cache.orders(), cache.orders_open(), cache.orders_closed()'
    - id: BD-084
      type: B
      summary: 'Filter positions by state: cache.positions(), cache.positions_open(), cache.positions_closed()'
    - id: BD-085
      type: B
      summary: Use cache.instrument(instrument_id) to get full instrument definition
    - id: BD-086
      type: B
      summary: cache.account_for_venue(venue) retrieves account with balances and margins
    - id: BD-020
      type: B
      summary: Portfolio and Position are decoupled via MessageBus events — Position objects are internal to Portfolio and
        not shared directly with strategies
    - id: BD-021
      type: B/DK
      summary: Position uses a fill-based aggregation model where each fill updates an internal cost-bar — not a streaming
        mark-to-market
    - id: BD-022
      type: B/BA
      summary: Trader owns each Actor instances (Strategies, ExecutionEngine, RiskEngine, etc.) and manages their lifecycle
        (start/stop) in sequence, ensuring dependencies are initialized before use
    - id: BD-065
      type: B
      summary: TrailingStopType.EXTERNAL for trailing stops executed by broker
    - id: BD-066
      type: B/DK
      summary: TriggerType.LAST_PRICE for trailing stop activation on price move
    - id: BD-067
      type: B/BA
      summary: TrailingOffsetParameters(activation_price=..., trailing_distance=...) configures offset
resources:
  packages:
  - name: numpy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: pyarrow
    version_pin: latest
  - name: msgspec
    version_pin: latest
  - name: fsspec
    version_pin: latest
  - name: click
    version_pin: latest
  - name: pytz
    version_pin: latest
  - name: tqdm
    version_pin: latest
  - name: portion
    version_pin: latest
  - name: uvloop
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy
    - python3 -m pip install pandas
    - python3 -m pip install pyarrow
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing bar aggregation and caching
    action: Maintain strictly increasing ts_event timestamps per bar type to verify correct time ordering
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Strategies would receive bars out of chronological order, causing incorrect indicator calculations, false
      signal generation, and corrupted backtest/live results
    stage_ids:
    - data_collection
  - id: finance-C-014
    when: When handling data requests with time ranges
    action: Verify request start timestamp does not exceed end timestamp before processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid time ranges would cause assertion errors or undefined behavior in data queries, crashing backtest
      runs
    stage_ids:
    - data_collection
  - id: finance-C-016
    when: When implementing strategy order submission logic
    action: verify orders are in INITIALIZED status before calling submit_order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Submitting orders not in INITIALIZED status causes InvalidStateTrigger exceptions, preventing order submission
      and potentially missing trading signals
    stage_ids:
    - factor_computation
  - id: finance-C-017
    when: When creating bracket orders via OrderList
    action: configure entry order with OTO contingency and child orders with OUO contingency and reduce_only flag
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect bracket order contingency types cause child orders to not activate atomically with entry fills,
      breaking the intended risk management strategy
    stage_ids:
    - factor_computation
  - id: finance-C-018
    when: When implementing order event handlers in strategy subclasses
    action: raise exceptions from on_bar, on_quote_tick, or other event handler callbacks
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Raising exceptions in event handlers breaks the message bus callback chain, leaving other components without
      state updates and potentially corrupting position/order tracking
    stage_ids:
    - factor_computation
  - id: finance-C-028
    when: When checking if strategy has been registered before submitting orders
    action: verify trader_id is not None before any order submission operations
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Attempting to submit orders without registration causes AttributeError or ValueError, preventing any trading
      activity
    stage_ids:
    - factor_computation
  - id: finance-C-034
    when: When submitting a trading command through ExecutionManager
    action: Route orders to RiskEngine via send_risk_command before ExecutionEngine
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Trading commands bypass risk validation, allowing unconstrained orders to reach the venue and potentially
      exceeding portfolio risk limits
    stage_ids:
    - risk_management
  - id: finance-C-035
    when: When RiskEngine is bypassed in configuration
    action: Use bypass=True for live trading environments
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: All pre-trade risk checks and rate limits are disabled, exposing the account to unbounded position sizes
      and potential margin calls
    stage_ids:
    - risk_management
  - id: finance-C-048
    when: When using LiveRiskEngineConfig in BACKTEST environment
    action: Configure LiveRiskEngineConfig for backtest mode
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Live-only risk engine features (async queues, graceful shutdown) are unavailable in backtest, causing runtime
      errors or hang
    stage_ids:
    - risk_management
  - id: finance-C-049
    when: When using RiskEngineConfig in LIVE environment
    action: Configure LiveRiskEngineConfig for live trading mode
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Backtest-only synchronous risk engine lacks async queue handling needed for live trading, causing performance
      bottlenecks
    stage_ids:
    - risk_management
  - id: finance-C-059
    when: When applying order events through the FSM
    action: Follow the defined state transition table exactly
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid state transitions cause InvalidStateTrigger exceptions, corrupting order state and potentially leaving
      orders stuck in unrecoverable states
    stage_ids:
    - execution
  - id: finance-C-060
    when: When applying OrderFilled events to an order
    action: Verify each trade_id is unique per order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Duplicate trade_id application causes KeyError, preventing proper fill processing and corrupting position
      calculations
    stage_ids:
    - execution
  - id: finance-C-068
    when: When processing live trading execution
    action: Use ExecutionEngine as the authoritative source for order state
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Components holding local order state copies cause state divergence, leading to incorrect trading decisions
      and potential financial losses
    stage_ids:
    - execution
  - id: finance-C-069
    when: When submitting orders to the trading system
    action: Route through the defined execution flow chain
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing the execution flow skips risk checks, causing potential risk limit violations and uncontrolled
      financial exposure
    stage_ids:
    - execution
  - id: finance-C-079
    when: When initializing a Position from an OrderFilled event
    action: validate instrument.id matches fill.instrument_id and fill.position_id is not None
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched instrument or missing position ID causes position state corruption, leading to incorrect PnL calculations
      and position tracking across the portfolio
    stage_ids:
    - trading
  - id: finance-C-080
    when: When BUY order fills update a Position
    action: increment signed_qty by last_qty to create or extend LONG position
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect signed_qty calculation causes position side to be misidentified, leading to wrong PnL signs and
      margin calculations
    stage_ids:
    - trading
  - id: finance-C-082
    when: When applying duplicate trade_id to a Position
    action: raise KeyError to prevent double-counting of fills
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Duplicate fills cause PnL to be calculated incorrectly, position quantity to be inflated, and commissions
      to be double-charged
    stage_ids:
    - trading
  - id: finance-C-083
    when: When calculating PnL for inverse instruments
    action: use inverse PnL formula (1/avg_px_open - 1/avg_px_close) to account for inverse pricing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using standard PnL formula for inverse instruments produces incorrect results, leading to substantial misreporting
      of trading performance
    stage_ids:
    - trading
  - id: finance-C-085
    when: When implementing Position apply() for a FLAT position
    action: reset each position state including events, commissions, and avg_px before processing new fill
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Reusing stale position state causes incorrect aggregation of fills from different trading cycles, corrupting
      PnL calculations
    stage_ids:
    - trading
  - id: finance-C-086
    when: When Unrealized PnL is calculated for an open position
    action: use avg_px_open from the position and current market price as avg_px_close
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect price inputs produce wrong unrealized PnL, leading to incorrect risk assessments and potential
      margin calls or missed opportunities
    stage_ids:
    - trading
  - id: finance-C-088
    when: When Portfolio calculates realized PnL for NETTING OMS
    action: aggregate closed position snapshots to preserve historical realized PnL across position cycles
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Lost historical PnL from closed positions causes underreported performance and incorrect strategy evaluation
    stage_ids:
    - trading
  - id: finance-C-089
    when: When PositionEvents are published via MessageBus
    action: publish to events.position.* topic so Portfolio subscribes can update position state
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Strategies receive stale position snapshots, causing incorrect order decisions based on outdated position
      state
    stage_ids:
    - trading
  - id: finance-C-090
    when: When ExecutionEngine processes OrderFilled
    action: route to _handle_position_update which calls open_position, flip_position, or update_position based on state
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Direct position mutation bypasses event publishing, breaking Portfolio synchronization and causing inconsistent
      position state
    stage_ids:
    - trading
  - id: finance-C-091
    when: When implementing Trader._start()
    action: start each actors first, then strategies, then exec_algorithms in sequence
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Out-of-order initialization causes dependencies to be unavailable, resulting in strategies receiving empty
      cache data and failed order submissions
    stage_ids:
    - trading
  - id: finance-C-102
    when: When calculating _calculate_pnl for any position
    action: limit quantity to fabs(signed_qty) to prevent over-booking beyond actual position size
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Over-booked quantity causes PnL to exceed actual profit/loss, corrupting performance metrics and risking
      margin miscalculations
    stage_ids:
    - trading
  - id: finance-C-103
    when: When adding data to the BacktestEngine
    action: verify data timestamps (ts_init) are sorted in monotonically non-decreasing order before calling run()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unsorted data causes clock non-monotonicity, leading to look-ahead bias where strategies receive future information
      before their time, producing unrealistic backtest results that cannot be replicated in live trading.
    stage_ids:
    - backtest_simulation
  - id: finance-C-104
    when: When using bar data for execution simulation
    action: verify bar ts_init represents the closing time of the bar, not the opening time
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect timestamp convention causes look-ahead bias where OHLC bar prices are processed before the bar
      period closes, allowing strategies to trade on future price information.
    stage_ids:
    - backtest_simulation
  - id: finance-C-105
    when: When configuring a venue with L2_MBP or L3_MBO book type
    action: provide order book delta data (OrderBookDelta/OrderBookDeltas), not quote ticks or bar data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Quote ticks and bars are ignored for book updates when using L2/L3 book types, causing orders to never fill
      because the simulated order book remains empty.
    stage_ids:
    - backtest_simulation
  - id: finance-C-110
    when: When the BacktestEngine runs
    action: process data through SimulatedExchange before dispatching to strategies via DataEngine
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Skipping exchange processing or reversing order causes fill timing to mismatch market state, producing incorrect
      execution prices and unrealistic P&L.
    stage_ids:
    - backtest_simulation
  - id: finance-C-125
    when: When adding or updating orders in the cache
    action: update each corresponding bidirectional indexes atomically
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Skipping index updates breaks O(1) lookups for relationship queries, causing full scans and degraded performance
      or missing data in queries.
    stage_ids:
    - state_persistence
  - id: finance-C-126
    when: When loading state from database after crash recovery
    action: rebuild each bidirectional indexes from loaded primary data
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Loaded data without indexes causes all relationship queries to fail or require expensive full scans, breaking
      position and order lookups.
    stage_ids:
    - state_persistence
  - id: finance-C-127
    when: When using position purge functionality
    action: preserve event ordering when reapplying fills for state reconstruction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect event ordering during position rebuild produces wrong realized PnL, quantity, and average price
      calculations, corrupting position state.
    stage_ids:
    - state_persistence
  - id: finance-C-134
    when: When implementing integrity checks for cached data
    action: verify bidirectional index consistency with primary data
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Index-data mismatch causes silent data loss where orders or positions exist but are unreachable via relationship
      queries.
    stage_ids:
    - state_persistence
  - id: finance-C-136
    when: When purging closed positions from the cache
    action: purge positions that are still open
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Purging open positions causes position state to become inconsistent with actual trading state, leading to
      incorrect PnL and risk calculations.
    stage_ids:
    - state_persistence
  - id: finance-C-138
    when: When implementing cash account balance updates
    action: allow negative balance totals for CASH account type
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Cash account balances becoming negative indicates corrupted state that violates financial integrity - the
      system will raise AccountBalanceNegative exception
    stage_ids:
    - accounting
  - id: finance-C-139
    when: When calculating account commissions
    action: use NO_LIQUIDITY_SIDE for commission calculation
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Commission calculation with undefined liquidity side produces incorrect fees, causing either overcharging
      or undercharging traders on every transaction
    stage_ids:
    - accounting
  - id: finance-C-140
    when: When applying account state events
    action: validate event.account_type matches self.type before applying
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Applying account state with mismatched account type corrupts internal state, potentially mixing CASH and
      MARGIN account semantics
    stage_ids:
    - accounting
  - id: finance-C-142
    when: When setting margin account leverage
    action: verify leverage value is greater than or equal to 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Setting leverage below 1 violates margin account semantics, causing incorrect margin calculations that could
      trigger premature liquidations or under-collateralization
    stage_ids:
    - accounting
  - id: finance-C-143
    when: When performing multi-currency balance updates
    action: convert commissions and PnLs to account base currency when currency mismatch occurs
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without currency conversion, multi-currency accounts accumulate balances in wrong denominations, corrupting
      account equity calculations
    stage_ids:
    - accounting
  - id: finance-C-144
    when: When calculating margin requirements for orders
    action: check margin compliance at order submission AND at every fill
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Skipping fill-time margin checks allows price moves to push accounts from compliant to non-compliant, risking
      liquidation on positions that appeared valid at order time
    stage_ids:
    - accounting
  - id: finance-C-145
    when: When calculating exchange rates for currency conversion
    action: proceed with conversion when xrate is zero (unavailable)
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Proceeding with zero exchange rate produces zero-value conversions, corrupting account balances with phantom
      zero amounts
    stage_ids:
    - accounting
  - id: finance-C-150
    when: When using replaceable Account type
    action: verify Account subclasses implement each abstract methods (is_unleveraged, calculate_commission, calculate_pnls,
      balance_impact)
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Missing abstract method implementations cause NotImplementedError at runtime, breaking order execution pipeline
    stage_ids:
    - accounting
  - id: finance-C-151
    when: When using replaceable MarginModel
    action: verify MarginModel subclasses implement calculate_margin_init and calculate_margin_maint
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Missing margin calculation methods cause NotImplementedError when margin checks run, preventing order submission
      and position management
    stage_ids:
    - accounting
  - id: finance-C-158
    when: When publishing QuoteTick/TradeTick/Bar data events from DataEngine
    action: 'Publish data events to the correct message bus topic pattern: data.quotes.{venue}.{symbol} for quotes, data.trades.{venue}.{symbol}
      for trades, data.bars.{bar_type} for bars'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Strategy.on_quote_tick() / on_bar() callbacks receive no data, causing strategies to never generate trading
      signals
  - id: finance-C-159
    when: When sending OrderBookDelta events for conditional order simulation
    action: Route OrderBookDelta events to OrderEmulator through data.book.deltas.{venue}.{symbol} topic
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: OrderEmulator cannot process conditional orders (stop-loss, take-profit), resulting in orders never triggering
      or filling
  - id: finance-C-160
    when: When replaying historical data through BacktestEngine
    action: Use identical data types (QuoteTick, TradeTick, Bar, OrderBookDelta) as live feed for deterministic replay
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backtest results become non-deterministic, producing different results from live trading and violating research-to-live
      parity
  - id: finance-C-161
    when: When publishing TradingCommand messages from Strategy
    action: Send SubmitOrder, CancelOrder, ModifyOrder commands to RiskEngine via msgbus for pre-trade validation before execution
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Trades execute without risk validation, potentially causing account margin breaches, forced liquidations,
      or regulatory violations
  - id: finance-C-162
    when: When processing approved TradingCommand messages from RiskEngine
    action: Forward validated TradingCommand messages to ExecutionEngine for order routing and venue submission
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Approved orders never reach the exchange, causing missed trade opportunities and broken strategy logic
  - id: finance-C-164
    when: When ExecutionEngine generates OrderFilled events
    action: Publish fill events to Portfolio via 'Portfolio.update_order' endpoint and to fill events topic for position updates
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Portfolio position state becomes stale, unrealized PnL calculations are incorrect, and margin calculations
      fail, leading to incorrect risk management
  - id: finance-C-165
    when: When publishing order events (Accepted, Filled, PartiallyFilled, Canceled) from ExecutionEngine
    action: Publish order events to strategy-specific topic 'events.order.{strategy_id}' for Strategy callbacks
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Strategy._handle_order_*() callbacks never fire, preventing strategy from knowing order state changes and
      reacting appropriately
  - id: finance-C-167
    when: When submitting order commands in backtest simulation
    action: Route SubmitOrder commands through SimulatedExchange matching engine to generate fill events that return to ExecutionEngine
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Backtest simulation produces no fills, resulting in empty backtest results that provide no useful performance
      metrics
  - id: finance-C-168
    when: When calculating margin requirements for positions
    action: Pass Position state (instrument, quantity, side, price) to Account.calculate_margin_init() and calculate_margin_maint()
      methods
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Margin calculations use stale or incorrect position data, leading to under-collateralization and potential
      forced liquidations
  - id: finance-C-172
    when: When using backtest simulation results for trading decisions
    action: Claim backtest returns as expected live trading returns or present simulated results as proof of real execution
      capability
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as live trading proof violates trading regulations and misleads investors about
      actual expected performance
  - id: finance-C-173
    when: When processing market data timestamps in backtest
    action: Verify data timestamps (ts_event) are processed in strict chronological order based on ts_init to prevent look-ahead
      bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backtest exhibits look-ahead bias, producing unrealistically high returns that cannot be replicated in live
      trading
  - id: finance-C-176
    when: When routing trading commands through multiple execution clients
    action: Route commands to correct ExecutionClient based on explicit client_id, account_id issuer, or venue-based routing
      priority
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Commands routed to wrong venue or client, causing orders to be rejected or executed in wrong account
  - id: finance-C-178
    when: When using external execution clients (non-simulated)
    action: Bypass internal execution for commands from external clients and publish directly to commands topic
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: External orders handled twice (internally and externally), causing duplicate fills and incorrect position
      state
  - id: finance-C-179
    when: When storing decimal precision values (Price, Quantity, Money)
    action: Use fixed-precision integers internally rather than floating-point to avoid rounding errors in monetary calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Floating-point precision errors in PnL or margin calculations accumulate over many trades, causing discrepancies
      between expected and actual account balances
  - id: finance-C-186
    when: When running trading nodes (TradingNode, BacktestNode, or BacktestEngine)
    action: Run multiple node instances concurrently in the same process — the system uses global singleton state including
      Backtest force-stop flag, Logger mode/timestamps, and Tokio runtime singletons
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Concurrent execution will cause undefined behavior due to shared global state conflicts, potentially leading
      to corrupted backtest results or runtime crashes
  - id: finance-C-191
    when: When loading data into BacktestEngine
    action: Sort each data before calling run() — either use sort=True on add_data() or explicitly call sort_data() before
      running the backtest
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Unsorted data will cause out-of-order execution events, leading to look-ahead bias and incorrect backtest
      results that do not reflect real trading
  - id: finance-C-192
    when: When configuring bar data for execution simulation
    action: Set ts_init (initialization timestamp) to represent the bar's closing time — ts_init must NOT be the opening time
      to prevent look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using opening timestamps for ts_init causes look-ahead bias where orders execute based on future price information
      not yet available at decision time
  - id: finance-C-214
    when: When implementing or refactoring backtesting engine logic
    action: Use the same NautilusKernel (DataEngine, ExecutionEngine, RiskEngine, Portfolio, Cache, msgbus) for backtesting
      as used in live trading — do not create separate code paths or behavioral differences for backtest environment
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Separate backtest code paths introduce behavioral divergence; strategies may behave differently in backtest
      versus live trading, causing backtest results to be completely unreproducible during actual trading
    derived_from_bd_id: BD-023
  - id: finance-C-219
    when: When configuring RiskEngine for production trading
    action: Set RiskEngineConfig bypass=True — this flag is intended for backtest environments only; production risk checks
      must remain enabled
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Disabling risk checks in live trading eliminates leverage limits, position size controls, and margin safeguards;
      the account can accumulate unlimited losses beyond intended risk parameters
    derived_from_bd_id: BD-036
  - id: finance-C-226
    when: When configuring account type for backtesting or live trading
    action: Select AccountType.CASH for spot-only trading without borrowed funds; select AccountType.MARGIN only when modeling
      futures, leveraged instruments, or strategies requiring margin — never default to MARGIN for spot trading
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using AccountType.MARGIN for spot trading introduces phantom leverage into the simulation; strategies designed
      for cash-settled spot execution will generate margin calls and forced liquidations in live trading that never appeared
      in backtesting, causing real financial losses
    derived_from_bd_id: BD-039
  - id: finance-C-231
    when: When running backtests to validate strategy risk management behavior
    action: Assume backtest results reliably predict RiskEngine behavior in live trading — the framework bypasses RiskEngine
      in backtest mode (BD-036), creating a fundamental gap where strategies that would fail live risk checks pass backtest
      silently
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Backtest parity is violated because RiskEngine safety gates are disabled during backtesting; strategies that
      would be rejected or modified by live risk controls execute fully in backtest, creating false confidence in risk management
      and potentially catastrophic losses when deployed live
    derived_from_bd_id: BD-115
  - id: finance-C-238
    when: When implementing position exit orders during shutdown
    action: Set market_exit_reduce_only=True to verify closing orders only reduce exposure — do not disable reduce-only mode
      as it allows new positions to open during shutdown
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Disabling reduce-only allows closing orders to inadvertently open reverse positions during shutdown, creating
      unintended directional exposure and potential margin calls
    derived_from_bd_id: BD-076
  - id: finance-C-268
    when: When implementing order submission or modification logic
    action: Verify every order passes through RiskEngine._check_order before reaching ExecutionEngine — orders must never
      bypass the risk gate regardless of component refactoring or optimization attempts
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Bypassing risk checks allows unconstrained orders to reach the venue, causing potential runaway positions,
      margin calls exceeding account equity, or regulatory violations that result in significant financial losses
    derived_from_bd_id: BD-012
  - id: finance-C-269
    when: When implementing order state querying or caching logic
    action: Query order states from ExecutionEngine via MessageBus events — do not cache or hold local copies of order state
      in Portfolio, Cache, or Strategy components
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Maintaining separate order state copies causes split-brain scenarios where components disagree on order status,
      leading to incorrect position calculations, duplicate orders, or missed fills that corrupt backtest and live trading
      results
    derived_from_bd_id: BD-015
  - id: finance-C-272
    when: When configuring position sizing for a strategy
    action: Set leverage to match the target instrument's margin requirements — Decimal(1) = 1:1 no leverage, Decimal(10)
      = 10x leverage — verify the leverage setting aligns with account risk parameters before enabling margin
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched leverage causes incorrect position sizing relative to account equity, either underutilizing capital
      or exceeding margin requirements and triggering forced liquidations during adverse market moves
    derived_from_bd_id: BD-040
  regular:
  - id: finance-C-002
    when: When implementing tick caching operations
    action: Skip adding ticks with ts_event older than the latest cached tick timestamp
    severity: high
    kind: domain_rule
    modality: must
    consequence: Tick cache would become corrupted with out-of-order data, causing stale prices to be used by strategies and
      indicators
    stage_ids:
    - data_collection
  - id: finance-C-003
    when: When processing order book updates in backtest simulation
    action: Skip stale quote updates where ts_event precedes the order book's last update timestamp
    severity: high
    kind: domain_rule
    modality: must
    consequence: Order book would be updated with older data, corrupting best bid/ask prices and causing incorrect fill simulations
    stage_ids:
    - data_collection
  - id: finance-C-004
    when: When configuring tick storage buffers
    action: Set tick_capacity to bound memory usage per instrument, defaulting to 10,000 ticks
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unbounded tick storage would cause memory exhaustion with long-running strategies or high-frequency instruments
    stage_ids:
    - data_collection
  - id: finance-C-005
    when: When configuring bar storage buffers
    action: Set bar_capacity to bound memory usage per bar type, defaulting to 10,000 bars
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unbounded bar storage would cause memory exhaustion for strategies processing many bar types over extended
      periods
    stage_ids:
    - data_collection
  - id: finance-C-006
    when: When instantiating the data catalog
    action: Enforce singleton pattern to prevent multiple catalog instances pointing to different data sources
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Multiple catalog instances could cause inconsistent data queries, missing or duplicate data, and non-deterministic
      backtest results
    stage_ids:
    - data_collection
  - id: finance-C-007
    when: When implementing data replay functionality
    action: Use the same data engine pipeline for historical data injection as live data processing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Different code paths for replay vs live would cause non-identical results across runs, breaking reproducibility
      and research-to-production parity
    stage_ids:
    - data_collection
  - id: finance-C-008
    when: When implementing bar aggregation logic
    action: Only publish finalized bars on bar close, using internal queue to accumulate raw ticks
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Publishing incomplete bars would allow strategies to trade on partial OHLCV data, corrupting indicator values
      and causing incorrect signals
    stage_ids:
    - data_collection
  - id: finance-C-009
    when: When implementing time range generation for gap-filling
    action: Request adjacent intervals to fill gaps rather than individual timestamps to reduce request overhead
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Inefficient gap-filling would cause excessive data requests, longer backtest initialization times, and potential
      API rate limit issues
    stage_ids:
    - data_collection
  - id: finance-C-010
    when: When implementing data catalog gap detection
    action: Return disjoint, non-overlapping missing intervals sorted by start time
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Overlapping or unsorted intervals would cause duplicate data requests or missing gaps, resulting in incomplete
      or corrupted historical datasets
    stage_ids:
    - data_collection
  - id: finance-C-011
    when: When publishing backtest performance results
    action: Claim that backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as expected live returns would mislead users about actual trading performance,
      ignoring slippage, fees, and market impact realities
    stage_ids:
    - data_collection
    - factor_computation
    - backtest_simulation
  - id: finance-C-012
    when: When presenting simulation results as execution proof
    action: Present simulated wallet or backtest fills as proof of real execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users would be misled into believing strategies perform identically in live trading without understanding
      fill model assumptions and market differences
    stage_ids:
    - data_collection
  - id: finance-C-013
    when: When selecting a data backend implementation
    action: Use DataBackend interface to abstract data source and transport protocol differences
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Hard-coded data source assumptions would cause integration failures with different data providers and prevent
      replay testing with alternative datasets
    stage_ids:
    - data_collection
  - id: finance-C-015
    when: When validating bar revision processing
    action: Replace cached bar only when revision has same ts_event as the last bar
    severity: high
    kind: domain_rule
    modality: must
    consequence: Improper revision handling would corrupt bar history, causing incorrect historical analysis and indicator
      recalculations
    stage_ids:
    - data_collection
  - id: finance-C-019
    when: When implementing Order.apply method with OrderFilled events
    action: verify trade_id is unique per fill to prevent duplicate fill processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate fills with matching trade_id cause incorrect position tracking, potentially double-counting fills
      and resulting in wrong PnL calculations
    stage_ids:
    - factor_computation
  - id: finance-C-020
    when: When implementing strategy subclass __init__ method
    action: call clock or logger components before registration with a Trader instance
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Accessing clock or logger before registration causes AttributeError or NoneType exceptions since these components
      are assigned during register() call
    stage_ids:
    - factor_computation
  - id: finance-C-021
    when: When using GTD (Good-Till-Date) time-in-force orders
    action: enable manage_gtd_expiry config option or manually track and cancel expired orders
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: GTD orders without expiry management remain open indefinitely past their expire_time_ns, potentially executing
      unexpectedly or blocking capital
    stage_ids:
    - factor_computation
  - id: finance-C-022
    when: When submitting orders or order lists with position_id
    action: assign position_id at submission time to verify atomic position assignment
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Passing position_id later or not at all causes race conditions where position assignment happens after order
      fill, breaking position tracking in concurrent backtest scenarios
    stage_ids:
    - factor_computation
  - id: finance-C-023
    when: When implementing strategy event handling logic
    action: verify cache and portfolio queries reflect the event state at the time of handler invocation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Querying stale cache data in event handlers causes incorrect trading decisions based on outdated position
      or order state
    stage_ids:
    - factor_computation
  - id: finance-C-024
    when: When submitting duplicate client order IDs
    action: reuse client order IDs within the same strategy without resetting order factory
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Duplicate client_order_id submission causes order denial, preventing intended trades from executing and potentially
      breaking strategy logic
    stage_ids:
    - factor_computation
  - id: finance-C-026
    when: When using paper trading or simulated execution
    action: present simulated execution results as proof of real trading capability
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Labeling paper trading results as live execution proof misleads about actual system capabilities and the
      reliability of execution paths
    stage_ids:
    - factor_computation
  - id: finance-C-027
    when: When strategy depends on data subscriptions
    action: subscribe to required data types in on_start before expecting callbacks
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing data subscriptions cause on_bar/on_quote_tick handlers to never fire, leaving the strategy passive
      with no trading signals
    stage_ids:
    - factor_computation
  - id: finance-C-029
    when: When managing OCO (One-Cancels-Other) contingent orders
    action: verify OCO orders are linked via linked_order_ids and handle one fill cancelling the other
    severity: high
    kind: domain_rule
    modality: must
    consequence: OCO orders without proper linked_order_ids configuration fail to cancel counterparts, potentially resulting
      in unintended double exposure
    stage_ids:
    - factor_computation
  - id: finance-C-030
    when: When modifying existing orders
    action: verify at least one modification parameter differs from the original order values
    severity: low
    kind: domain_rule
    modality: must
    consequence: Submitting modifications with identical values to the original order wastes network bandwidth and may cause
      unnecessary order update round-trips
    stage_ids:
    - factor_computation
  - id: finance-C-031
    when: When implementing order modification for stop orders
    action: pass trigger_price parameter (not price) when modifying stop orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing wrong parameter type for stop order modification causes Condition validation failure and order modification
      rejection
    stage_ids:
    - factor_computation
  - id: finance-C-032
    when: When cancelling orders during market exit
    action: submit non-reduce-only orders while market exit is in progress
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Submitting new orders during market exit can open unintended positions after the strategy has decided to
      close all positions
    stage_ids:
    - factor_computation
  - id: finance-C-033
    when: When closing positions programmatically
    action: pass reduce_only=True to verify closing orders only reduce position size
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Closing orders without reduce_only flag can accidentally open new positions in the opposite direction
    stage_ids:
    - factor_computation
  - id: finance-C-036
    when: When checking order notional against max_notional_per_order
    action: Reject orders exceeding configured max_notional_per_order per instrument
    severity: high
    kind: domain_rule
    modality: must
    consequence: Individual orders exceed per-instrument position limits, causing portfolio concentration risk and potential
      margin violations
    stage_ids:
    - risk_management
  - id: finance-C-037
    when: When checking balance constraints for BUY orders
    action: Reject BUY orders when cumulative notional exceeds free balance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cumulative BUY orders drain account balance below zero, causing rejected fills or margin calls from the exchange
    stage_ids:
    - risk_management
  - id: finance-C-038
    when: When processing GTD (Good-Till-Date) orders
    action: Reject GTD orders where expire_time has already passed at submission
    severity: medium
    kind: domain_rule
    modality: must
    consequence: GTD orders with expired timestamps enter the system, potentially executing at outdated price levels when
      conditions were favorable
    stage_ids:
    - risk_management
  - id: finance-C-039
    when: When checking TradingState.HALTED
    action: Deny each new order submissions except cancellations when trading is halted
    severity: high
    kind: domain_rule
    modality: must
    consequence: New orders enter execution during a halted market, potentially filling at unfavorable prices or causing compliance
      violations
    stage_ids:
    - risk_management
  - id: finance-C-040
    when: When checking TradingState.REDUCING
    action: Deny BUY orders when net long, and SELL orders when net short
    severity: high
    kind: domain_rule
    modality: must
    consequence: Position-increasing orders execute during REDUCING state, adding to existing exposure and violating circuit-breaker
      intent
    stage_ids:
    - risk_management
  - id: finance-C-041
    when: When validating reduce-only orders
    action: Reject reduce-only orders that would increase position size
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reduce-only orders incorrectly increase position size, violating the traders intent to close or reduce exposure
    stage_ids:
    - risk_management
  - id: finance-C-042
    when: When rate limiting order submissions
    action: Deny orders exceeding max_order_submit_rate configuration
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unthrottled order submission floods the execution layer, causing latency spikes, dropped messages, and potential
      exchange rate limit violations
    stage_ids:
    - risk_management
  - id: finance-C-043
    when: When rejecting orders due to risk violations
    action: Publish OrderDenied events to MessageBus for strategy error handling
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies remain unaware of order rejections, continuing to generate signals based on stale assumptions
      about order state
    stage_ids:
    - risk_management
  - id: finance-C-044
    when: When modifying orders
    action: Validate price precision matches instrument price_precision before processing
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Order modifications with invalid price precision cause exchange rejections or incorrect fill price calculations
    stage_ids:
    - risk_management
  - id: finance-C-045
    when: When checking instrument for order validation
    action: Reject orders when instrument is not found in cache
    severity: high
    kind: domain_rule
    modality: must
    consequence: Orders for non-existent instruments enter the system, causing errors at execution time and polluting the
      order management state
    stage_ids:
    - risk_management
  - id: finance-C-046
    when: When processing trailing stop orders
    action: Validate trailing_offset_type is one of PRICE, BASIS_POINTS, or TICKS
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unsupported trailing offset types cause calculation errors or unexpected trigger prices in stop-loss orders
    stage_ids:
    - risk_management
  - id: finance-C-047
    when: When checking price validity for non-negative instruments
    action: Reject prices that are zero or negative for instruments not in NEGATIVE_PRICE_INSTRUMENT_CLASSES
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero or negative prices enter the system for standard instruments, causing incorrect fill calculations and
      potential loss of funds
    stage_ids:
    - risk_management
  - id: finance-C-050
    when: When configuring max_notional_per_order
    action: Set max_notional_per_order to None for instruments requiring size constraints
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Unbounded order sizes can exceed position limits, margin requirements, or cause single-trade losses exceeding
      risk tolerance
    stage_ids:
    - risk_management
  - id: finance-C-051
    when: When calculating effective quantity for quote-quantity orders
    action: Convert quote quantity to base quantity using worst-case execution price
    severity: high
    kind: domain_rule
    modality: must
    consequence: Quote-quantity orders execute with more base quantity than intended when prices move unfavorably, potentially
      exceeding balance constraints
    stage_ids:
    - risk_management
  - id: finance-C-052
    when: When checking SELL orders against available long position
    action: Account for pending (unfilled) SELL orders when calculating available quantity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Multiple simultaneous SELL orders over-sell the position, causing rejected fills or short position violations
    stage_ids:
    - risk_management
  - id: finance-C-053
    when: When checking balance constraints for spot trading
    action: Validate base currency sell orders against account's free balance of base currency
    severity: high
    kind: domain_rule
    modality: must
    consequence: SELL orders for base currency exceed available holdings, causing rejected fills or forced borrowing
    stage_ids:
    - risk_management
  - id: finance-C-054
    when: When validating order quantity precision
    action: Reject quantities with precision exceeding instrument size_precision
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Orders with invalid quantity precision cause exchange rejections or rounding discrepancies at fill time
    stage_ids:
    - risk_management
  - id: finance-C-055
    when: When modifying orders
    action: Reject modifications for already-closed orders
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Order modifications for closed orders cause errors or confusion in order tracking state
    stage_ids:
    - risk_management
  - id: finance-C-056
    when: When modifying orders during REDUCING state
    action: Reject order increases that would increase exposure during REDUCING state
    severity: high
    kind: domain_rule
    modality: must
    consequence: Order size increases during REDUCING state violate the circuit-breaker intent, adding to position exposure
    stage_ids:
    - risk_management
  - id: finance-C-057
    when: When checking minimum notional for instruments
    action: Reject orders where notional is below instrument min_notional requirement
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Orders below minimum notional cause exchange rejections, generating error events and disrupting trading workflow
    stage_ids:
    - risk_management
  - id: finance-C-058
    when: When checking maximum notional for instruments
    action: Reject orders where notional exceeds instrument max_notional limit
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Orders exceeding maximum notional cause exchange rejections, generating error events and disrupting trading
      workflow
    stage_ids:
    - risk_management
  - id: finance-C-061
    when: When executing spawned orders from ExecAlgorithm
    action: Never spawn quantity exceeding the primary order's leaves_qty
    severity: high
    kind: domain_rule
    modality: must
    consequence: Spawning quantity beyond leaves_qty causes overfill tracking errors and corrupts position state across the
      system
    stage_ids:
    - execution
  - id: finance-C-062
    when: When handling order modification and cancellation commands
    action: Verify OrderClientId matches existing order before sending to venue
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sending modify/cancel for non-existent orders causes errors and potential unintended actions on wrong orders
    stage_ids:
    - execution
  - id: finance-C-063
    when: When configuring execution clients for the ExecutionEngine
    action: Verify OmsType is not UNSPECIFIED for each venue
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unspecified OMS type causes position tracking errors and potential state divergence between local and venue
      records
    stage_ids:
    - execution
  - id: finance-C-064
    when: When querying orders for cancellation from own order books
    action: Include PENDING_CANCEL status in cancellation status filters
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Including PENDING_CANCEL causes duplicate cancel attempts, inflated open order counts, and order state explosion
    stage_ids:
    - execution
  - id: finance-C-065
    when: When trading on venues with known duplicate fill issues
    action: Enable allow_overfills=True in LiveExecEngineConfig
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Rejection of valid overfills causes position discrepancies between system and venue, leading to incorrect
      PnL tracking
    stage_ids:
    - execution
  - id: finance-C-066
    when: When reconciling live execution state at startup
    action: Persist each execution events to the cache database
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing persisted events causes reliance on limited venue lookback windows, leading to incomplete position
      reconstruction
    stage_ids:
    - execution
  - id: finance-C-067
    when: When setting reconciliation configuration parameters
    action: Leave reconciliation_lookback_mins unset for maximum history
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Limited lookback windows miss opening fills, causing position reconstruction errors and PnL calculation discrepancies
    stage_ids:
    - execution
  - id: finance-C-070
    when: When emulating conditional orders in OrderEmulator
    action: Generate fill events that pass identically to live venue fills
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Emulated fills behaving differently from live fills cause strategy logic to work in backtest but fail in
      live trading
    stage_ids:
    - execution
  - id: finance-C-071
    when: When applying latency simulation for backtesting
    action: Use LatencyModel to modify command timestamps consistently
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent latency modeling produces unrealistic backtest results, overstating strategy performance
    stage_ids:
    - execution
  - id: finance-C-072
    when: When querying order state in live trading
    action: Query ExecutionEngine for authoritative state instead of local cache
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Local cache may be stale during in-flight order transitions, causing incorrect strategy decisions based on
      outdated state
    stage_ids:
    - execution
  - id: finance-C-073
    when: When presenting backtest results to stakeholders
    action: Claim backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results include look-ahead bias, perfect liquidity assumptions, and zero latency that do not exist
      in live trading
    stage_ids:
    - execution
  - id: finance-C-074
    when: When using simulated execution for production decisions
    action: Present simulated wallet results as real execution proof
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Simulated execution lacks actual market impact, slippage from order book depth, and exchange fee realities
    stage_ids:
    - execution
  - id: finance-C-075
    when: When operating live trading systems
    action: Claim the system provides real-time trading with zero latency
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Live trading involves network latency, exchange processing delays, and data feed delays that introduce meaningful
      execution lag
    stage_ids:
    - execution
  - id: finance-C-076
    when: When deploying trading strategies to production
    action: Understand system configuration, node operations, and execution reconciliation requirements
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Lack of operational understanding causes misconfiguration, leading to unexpected trading behavior and potential
      capital loss
    stage_ids:
    - execution
  - id: finance-C-077
    when: When running execution with development or nightly builds
    action: Use development wheels in production environments with real capital
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Development wheels may contain untested changes, bugs, or breaking modifications causing unexpected trading
      behavior
    stage_ids:
    - execution
  - id: finance-C-078
    when: When implementing custom execution algorithms
    action: Validate each exec_algorithm_params dictionary values before use
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Invalid parameters cause runtime errors during order spawning, potentially leaving orders in undefined states
    stage_ids:
    - execution
  - id: finance-C-084
    when: When Position quantity reaches zero after fill application
    action: set position side to FLAT and normalize signed_qty to exactly 0.0
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unnormalized signed_qty causes position to appear open with zero quantity, breaking cache queries and portfolio
      calculations
    stage_ids:
    - trading
  - id: finance-C-087
    when: When calculating total_pnl for a Position
    action: sum realized_pnl and unrealized_pnl using same settlement_currency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixing currencies or using stale values produces incorrect total PnL, corrupting portfolio-level performance
      metrics
    stage_ids:
    - trading
  - id: finance-C-092
    when: When implementing Portfolio.update_position() with PositionEvent
    action: invalidate cached realized_pnl and unrealized_pnl for affected instrument and account
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Stale cached PnL values cause incorrect portfolio reporting and stale risk calculations until next full recalculation
    stage_ids:
    - trading
  - id: finance-C-093
    when: When MarginAccount calculates margin requirements
    action: use the configured MarginModel (StandardMarginModel or LeveragedMarginModel) via composition
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Hardcoded margin formulas bypass custom models, causing margin requirements to not match venue-specific calculations
      and potential margin violations
    stage_ids:
    - trading
  - id: finance-C-094
    when: When FeeModel is configured for BacktestEngine
    action: use configured FeeModel (MakerTakerFeeModel, FixedFeeModel, or PerContractFeeModel) since fees affect PnL
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incorrect fee model causes PnL calculations to not match live trading, invalidating backtest results
    stage_ids:
    - trading
  - id: finance-C-095
    when: When BacktestEngine runs with FeeModel and MarginModel
    action: claim that backtest results equal live trading results without accounting for fee model differences
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting simulated fee calculations as actual execution proof misleads stakeholders about expected live
      trading performance
    stage_ids:
    - trading
  - id: finance-C-096
    when: When Portfolio reports realized PnL
    action: claim that closed position snapshots accurately reflect current account state for NETTING OMS
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Historical snapshots are preserved state, not live data. Presenting them as current position state misleads
      about active risk exposure
    stage_ids:
    - trading
  - id: finance-C-097
    when: When Position snapshots are used for PnL aggregation
    action: verify snapshot PnLs are correctly accumulated into the total realized PnL via _process_snapshot_pnl_contributions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect snapshot PnL accumulation causes underreported or overreported historical performance
    stage_ids:
    - trading
  - id: finance-C-098
    when: When Portfolio initializes positions via initialize_positions()
    action: clear realized and unrealized PnL caches before recalculating from current position state
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Stale cached PnL from previous sessions contaminates new calculations, causing incorrect starting equity
    stage_ids:
    - trading
  - id: finance-C-099
    when: When unrealized_pnl is queried without a price parameter
    action: return cached unrealized PnL if available, otherwise compute fresh and cache it
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Forcing recalculation on every query without caching degrades performance, especially during high-frequency
      position updates
    stage_ids:
    - trading
  - id: finance-C-100
    when: When Position.apply_adjustment handles commission in base currency
    action: adjust signed_qty when commission is deducted from traded quantity for spot currency pairs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ignoring base currency commission effect on quantity causes position to have apparent qty that exceeds actual
      holdings
    stage_ids:
    - trading
  - id: finance-C-101
    when: When Portfolio calculates net_exposures for multiple accounts with different base currencies
    action: require explicit target_currency parameter to prevent silent currency mixing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silent aggregation of exposures across different base currencies produces meaningless combined exposure figures
    stage_ids:
    - trading
  - id: finance-C-106
    when: When adding data with sort=True multiple times
    action: use sort=False for each add_data() calls and call sort_data() once after each data is added
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Repeated sorting of increasingly large datasets causes O(n²) complexity, leading to exponentially increasing
      load times for multi-instrument backtests.
    stage_ids:
    - backtest_simulation
  - id: finance-C-107
    when: When running backtests with probabilistic fill models
    action: set random_seed in FillModelConfig to verify reproducible results across runs
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without a fixed random seed, probabilistic fill/slippage outcomes vary between runs, making results non-reproducible
      and debugging strategy issues impossible.
    stage_ids:
    - backtest_simulation
  - id: finance-C-108
    when: When loading datasets larger than available memory
    action: use streaming mode with add_data_iterator() or batched add_data()/run(streaming=True)/clear_data()
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Attempting to load entire large dataset into memory causes OutOfMemoryError, crashing the backtest process.
    stage_ids:
    - backtest_simulation
  - id: finance-C-109
    when: When backtesting with bar data only (no tick data)
    action: recognize that slippage and market impact simulation is limited by OHLC granularity
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Bar-based backtests cannot capture intra-bar price movements, underestimating realistic slippage and potentially
      overstating strategy profitability by 10-30% or more.
    stage_ids:
    - backtest_simulation
  - id: finance-C-111
    when: When validating data precision during matching
    action: verify each prices and quantities match instrument's price_precision and size_precision
    severity: high
    kind: domain_rule
    modality: must
    consequence: Precision mismatches cause silent corruption of fill quantities or prices, leading to incorrect P&L calculations
      that may not be detected until significant losses accumulate.
    stage_ids:
    - backtest_simulation
  - id: finance-C-113
    when: When using LatencyModel for HFT strategy simulation
    action: configure base_latency_nanos and operation-specific latencies to match target market conditions
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Zero or incorrect latency configuration causes HFT strategies to fill unrealistically fast, producing backtest
      profits that cannot be achieved in live trading where network and exchange latencies impose real delays.
    stage_ids:
    - backtest_simulation
  - id: finance-C-114
    when: When a fill triggers cascading orders (e.g., stop-loss from take-profit fill)
    action: settle each cascading commands within the same timestamp/event cycle using the settle loop
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect command settling timing causes fill race conditions where dependent orders receive different prices
      than they would in live trading, producing unrealistic execution chains.
    stage_ids:
    - backtest_simulation
  - id: finance-C-115
    when: When using probabilistic fill models without a fixed seed
    action: use unreproducible random outcomes as the basis for strategy performance claims
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Different random outcomes produce different P&L curves without a seed; claiming good performance is valid
      when it may be due to favorable random draws violates scientific rigor.
    stage_ids:
    - backtest_simulation
  - id: finance-C-116
    when: When processing order book deltas with L2_MBP or L3_MBO
    action: verify delta price precision matches instrument.price_precision exactly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Precision mismatch raises RuntimeError, blocking execution, or in edge cases silently corrupts price levels
      causing fills at incorrect prices.
    stage_ids:
    - backtest_simulation
  - id: finance-C-117
    when: When using queue_position tracking for limit orders
    action: also enable trade_execution=True, since queue position depends on trade ticks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without trade_execution, queue position tracking has no effect since no trades occur to decrement the queue,
      causing limit orders to either never fill or fill incorrectly.
    stage_ids:
    - backtest_simulation
  - id: finance-C-118
    when: When running backtests with Bar.volume
    action: verify Bar.volume is in base currency units, not quote-currency volume
    severity: high
    kind: domain_rule
    modality: must
    consequence: Quote-currency volume causes incorrect position sizing calculations, leading to trades with wrong quantities
      and P&L that doesn't match expected returns.
    stage_ids:
    - backtest_simulation
  - id: finance-C-119
    when: When using bar_execution=True with bar_adaptive_high_low_ordering=True
    action: recognize that ~75-85% accuracy in High/Low sequence prediction is achieved, not 100%
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Incorrect sequence prediction causes wrong order fill ordering when both take-profit and stop-loss fall within
      the same bar, potentially producing incorrect position states.
    stage_ids:
    - backtest_simulation
  - id: finance-C-120
    when: When creating custom FillModel implementations
    action: manage own liquidity consumption tracking if providing simulated order books
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: When a custom fill model provides simulated order books via get_orderbook_for_fill_simulation(), liquidity_consumption
      tracking is not applied automatically, potentially causing over-filling if the custom model doesn't track consumption.
    stage_ids:
    - backtest_simulation
  - id: finance-C-121
    when: When backtesting with liquidity_consumption=True
    action: expect the same fill behavior as liquidity_consumption=False for identical orders
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: With consumption tracking, fills are limited to displayed liquidity, causing more partial fills and potentially
      different order states than the default unlimited liquidity model.
    stage_ids:
    - backtest_simulation
  - id: finance-C-122
    when: When the BacktestEngine processes trade ticks
    action: use aggressor_side correctly - SELLER trades fill BUY orders, BUYER trades fill SELL orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect aggressor side interpretation causes trades to fill wrong-side orders, producing filled positions
      opposite to what would occur in live trading.
    stage_ids:
    - backtest_simulation
  - id: finance-C-123
    when: When implementing order state queries in components
    action: treat the cache as the authoritative source of truth for order state
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Cache stores order snapshots for fast queries, but ExecutionEngine is the authoritative source. Querying
      stale order state from cache can lead to incorrect trading decisions when events are pending.
    stage_ids:
    - state_persistence
  - id: finance-C-124
    when: When implementing state persistence
    action: consult ExecutionEngine directly for authoritative order state
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using cache snapshots for critical state decisions while events are in-flight can cause race conditions and
      incorrect position calculations.
    stage_ids:
    - state_persistence
  - id: finance-C-128
    when: When persisting state to Redis
    action: convert nanosecond timestamps to strings before storage
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Redis stores int64 with max 17 digits precision, but nanosecond timestamps have 19 digits. Precision loss
      corrupts timestamp ordering and event sequencing.
    stage_ids:
    - state_persistence
  - id: finance-C-129
    when: When configuring cache database backing
    action: enable database backing via CacheDatabaseFacade for production live trading
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without database backing, a crash loses all in-memory state. No recovery is possible, requiring full manual
      reconciliation of positions and orders.
    stage_ids:
    - state_persistence
  - id: finance-C-130
    when: When running tests that depend on persistence behavior
    action: use MockCacheDatabase for persistence or recovery verification tests
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: MockCacheDatabase uses in-memory dicts with no actual persistence. Tests pass but fail in production where
      Redis persistence is expected.
    stage_ids:
    - state_persistence
  - id: finance-C-131
    when: When implementing queries for positions by venue, strategy, or instrument
    action: use the bidirectional indexes for O(1) lookup instead of iterating each positions
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without using indexes, queries iterate all positions causing O(n) performance degradation as position count
      grows, blocking the trading loop.
    stage_ids:
    - state_persistence
  - id: finance-C-132
    when: When implementing cache queries in any component
    action: block the caller while executing cache operations
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Blocking cache queries stalls the caller (Strategy, Portfolio, RiskEngine) during high-frequency operations,
      causing missed signals and order delays.
    stage_ids:
    - state_persistence
  - id: finance-C-133
    when: When implementing crash recovery
    action: verify positions are correctly reconstructed from persisted fill events
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incomplete position reconstruction leaves positions in incorrect state, causing wrong PnL calculations and
      potentially triggering unintended trades.
    stage_ids:
    - state_persistence
  - id: finance-C-135
    when: When using the cache without database backing
    action: claim crash recovery or state persistence capabilities
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting non-persistent system as recoverable misleads users about data safety, potentially causing financial
      loss if a crash destroys in-memory state.
    stage_ids:
    - state_persistence
  - id: finance-C-137
    when: When handling position snapshots for persistence
    action: include unrealized PnL with the snapshot for accurate state recovery
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without unrealized PnL in snapshots, recovered positions show stale PnL values causing incorrect portfolio
      valuations and risk calculations.
    stage_ids:
    - state_persistence
  - id: finance-C-141
    when: When calculating position sizing with commissions
    action: multiply commission_rate by 2 for round-turn position calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting the round-trip commission factor causes position sizes to exceed intended risk by up to 2x, leading
      to excessive losses when stop-loss is hit
    stage_ids:
    - accounting
  - id: finance-C-146
    when: When managing single-currency accounts
    action: verify exactly one currency balance exists in account state events
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Single-currency accounts with multiple currency balances violate denomination consistency, causing unpredictable
      PnL and margin calculations
    stage_ids:
    - accounting
  - id: finance-C-147
    when: When processing perpetual futures funding rate updates
    action: TWAP funding rate payments over the funding interval
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying funding at a single instant causes artificial PnL discontinuities and mismatched cash flows compared
      to exchange conventions
    stage_ids:
    - accounting
  - id: finance-C-148
    when: When calculating margin requirements
    action: apply rounding to currency precision after exchange rate conversion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping precision rounding causes accumulation of sub-cent fractions in locked/margin balances, eventually
      corrupting free balance calculations
    stage_ids:
    - accounting
  - id: finance-C-149
    when: When using calculated account state mode
    action: claim calculated balances match venue-reported balances
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Calculated account state is derived from order fills and may diverge from venue-reported state due to latency,
      rejections, or partial fills
    stage_ids:
    - accounting
  - id: finance-C-152
    when: When calculating PnL for non-premium instruments
    action: use minimum of fill quantity and position quantity to avoid double-counting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without min() protection, PnL calculation double-counts when closing portion exceeds remaining position,
      overstating realized gains or losses
    stage_ids:
    - accounting
  - id: finance-C-153
    when: When handling locked balance for cash accounts
    action: clamp locked balance to total balance when locked exceeds total
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without clamping, transient venue/client state desynchronization causes AccountBalance constructor to raise,
      terminating the trading application
    stage_ids:
    - accounting
  - id: finance-C-154
    when: When clearing balance locks for cash accounts
    action: clear existing locks before applying new locks per instrument
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Accumulating stale locks across order changes causes over-reporting of locked amounts, incorrectly reducing
      free balance
    stage_ids:
    - accounting
  - id: finance-C-155
    when: When processing external account state events
    action: clear per-instrument locked balances when event.is_reported is True
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Not clearing external state locks causes internal lock tracking to diverge from venue-authoritative state,
      corrupting balance calculations
    stage_ids:
    - accounting
  - id: finance-C-156
    when: When calculating maintenance margin
    action: use current position average open price for margin calculation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using current market price instead of avg_px_open causes margin requirements to fluctuate with market moves
      even when position hasn't changed
    stage_ids:
    - accounting
  - id: finance-C-157
    when: When calculating commission for inverse instruments
    action: return commission in base currency when use_quote_for_inverse is False
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning inverse commission in quote currency causes currency denomination mismatch, corrupting account
      balance tracking
    stage_ids:
    - accounting
  - id: finance-C-163
    when: When RiskEngine rejects a trading command
    action: Publish OrderReject event to strategy.order_rejected topic so Strategy can handle rejection and update state
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategy state becomes inconsistent with execution state, causing potential double-ordering or incorrect
      position tracking
  - id: finance-C-166
    when: When writing Order and Position snapshots to Cache
    action: Persist order state and position state snapshots through Cache.snapshot_order_state() and Cache.snapshot_position_state()
      methods
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: State persistence fails, causing loss of order/position state on restart and preventing recovery or reconciliation
  - id: finance-C-169
    when: When persisting position state
    action: Write Position snapshots to Cache via Cache.snapshot_position() for state recovery and backtest result archival
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Position history is lost, preventing performance analysis, state recovery, and regulatory auditing
  - id: finance-C-170
    when: When writing Account balance and margin snapshots
    action: Persist Account state snapshots to Cache to maintain balance history and margin utilization tracking
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Account history is lost, preventing PnL reconciliation, margin breach investigation, and audit trail reconstruction
  - id: finance-C-171
    when: When finalizing backtest run
    action: Serialize BacktestResult containing PnL, statistics, and state snapshots to catalog for persistence
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Backtest results are lost, preventing strategy comparison, hyperparameter optimization, and research reproducibility
  - id: finance-C-174
    when: When configuring leverage for margin positions
    action: Use leverage values retrieved from Account or explicitly configured, defaulting to account default_leverage when
      instrument-specific leverage is 0
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect leverage leads to either over-margin (missed trading opportunities) or under-margin (forced liquidations)
  - id: finance-C-175
    when: When handling inverse instrument margin calculations
    action: Return margin in base currency for inverse instruments unless use_quote_for_inverse is explicitly set to True
    severity: high
    kind: domain_rule
    modality: must
    consequence: Margin calculations in wrong currency cause incorrect balance checks and potential over-trading on inverse
      perpetual contracts
  - id: finance-C-177
    when: When processing spread instrument (combo) fills
    action: Update portfolio positions for spread fills used only for order management purposes
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Duplicate position updates for combo instruments cause incorrect PnL calculations and margin over-counting
  - id: finance-C-180
    when: When subscribing to data topics with wildcard patterns
    action: Subscribe to data topics using the correct wildcard pattern matching (e.g., 'data.quotes.*' not 'data.quotes.BINANCE.*')
      for proper routing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies receive no data callbacks because topic subscription patterns don't match published topics
  - id: finance-C-181
    when: When replaying historical data with data_client
    action: Prepend 'historical.' prefix to data topics when publishing replayed data so subscribers can distinguish from
      live data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Backtest data mixed with live data stream causes incorrect strategy behavior and corrupted historical analysis
  - id: finance-C-182
    when: When implementing any trading strategy or data processing in NautilusTrader
    action: Use ts_init (UNIX timestamp in nanoseconds) as the primary ordering key for each data objects — timestamps use
      nanosecond precision internally and human-readable conversion only occurs at I/O boundaries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Out-of-order execution or incorrect timestamp comparisons will occur if microsecond or millisecond precision
      is assumed, leading to incorrect signal generation and order timing
  - id: finance-C-183
    when: When working with identifiers (InstrumentId, ClientOrderId, Venue, AccountId, etc.)
    action: Treat each identifiers as immutable value objects with equality by value — they are designed to be safe dictionary
      keys and hash-based lookups
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying identifier objects after creation will cause hash table corruption and incorrect lookups in the
      Cache's bidirectional indexes
  - id: finance-C-184
    when: When submitting orders that create or modify positions
    action: Verify BUY orders use OrderSide.BUY to create LONG positions and SELL orders use OrderSide.SELL to create SHORT
      positions — the system assumes this mapping throughout position calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Position state calculations will be incorrect if non-standard order side mappings are assumed, causing wrong
      PnL attribution and risk calculations
  - id: finance-C-185
    when: When processing market data (quote ticks, trade ticks, bars) through the DataEngine
    action: Follow the cache-then-publish ordering — data is stored in Cache before being published to MessageBus, so strategy
      handlers always see consistent state when reading from cache
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategy handlers may read stale data if they attempt to access cache before data is fully persisted, causing
      inconsistent signal generation
  - id: finance-C-187
    when: When executing trading strategies
    action: Register the strategy with the Trader before any trading operations — submit_order and cancel_order each check
      trader_id is not None
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Trading operations will be rejected or fail silently if the strategy is not properly registered with a Trader
      instance
  - id: finance-C-188
    when: When building and deploying NautilusTrader
    action: Use Python 3.12-3.14 and verify Linux systems have glibc 2.35 or newer — Conda and other non-standard Python distributions
      are not officially supported
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Installation or runtime failures will occur on unsupported Python versions or with incompatible C standard
      libraries
  - id: finance-C-189
    when: When running backtests on Windows
    action: Accept reduced precision mode — Windows only ships standard-precision (64-bit) Python wheels because MSVC does
      not support __int128 for 128-bit precision
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Numeric calculations will have reduced precision and smaller value range on Windows compared to Linux/macOS
      high-precision (128-bit) mode
  - id: finance-C-190
    when: When running backtests with probabilistic fill models
    action: Set a fixed random_seed in the fill model configuration to verify reproducible, deterministic backtest results
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without a fixed random seed, backtest results will vary between runs due to probabilistic slippage and fill
      simulation, preventing reproducible research
  - id: finance-C-193
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live trading returns — backtesting ignores market impact, financing
      costs, latency, slippage approximations, and execution delays that occur in live markets
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-194
    when: When presenting simulated execution results (paper trading, dry-run, sandbox)
    action: Present simulated wallet or paper trading results as proof of live execution capability — simulated execution
      does not involve real exchange interactions, order book dynamics, or market impact
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users or stakeholders believe the system has demonstrated live trading competence when only simulated execution
      was performed, potentially leading to misplaced confidence
  - id: finance-C-195
    when: When describing this system's capabilities to potential users
    action: Claim support for manual trading, non-technical users without programming background, single-instrument discretionary
      strategies, or deployment in environments without Python 3.10+
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users with incompatible use cases will adopt the system and fail, damaging reputation and causing user frustration
      with an inappropriate tool choice
  - id: finance-C-196
    when: When deploying NautilusTrader in production environments
    action: Use development wheels (nightly/develop branch builds) for live trading controlling real capital — these are explicitly
      marked as not recommended for production use
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using untested development builds with real capital risks financial losses due to untested code paths, unverified
      bug fixes, and potential API breaking changes
  - id: finance-C-197
    when: When implementing strategies that depend on execution timing
    action: Accept that backtest execution simulation approximates real market conditions but does not replicate actual exchange
      latency, network delays, or market microstructure effects
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Strategies optimized for backtest execution may fail in live trading due to differences in fill timing, queue
      position, and liquidity availability that backtesting cannot accurately simulate
  - id: finance-C-198
    when: When maintaining cache consistency
    action: Keep Cache bidirectional indexes synchronized with primary caches on every write operation — the cache maintains
      O(1) lookup indexes for entity relationship queries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Stale indexes will cause incorrect or missing query results, leading to wrong position calculations, missed
      order tracking, and incorrect risk metrics
  - id: finance-C-199
    when: When reconciling order state across system components
    action: Consult ExecutionEngine as the single source of truth for authoritative order state — Cache stores snapshots for
      fast queries but should not be used as authoritative
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Relying on Cache snapshots for order state may lead to stale decisions if the ExecutionEngine has more recent
      state updates not yet reflected in the cache
  - id: finance-C-200
    when: When assigning position identifiers
    action: Only create or modify positions through order fill processing — positions must never be created or modified outside
      of order fill events
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct position manipulation bypasses the ExecutionEngine's order tracking, causing position state to diverge
      from actual order state and corrupting PnL calculations
  - id: finance-C-201
    when: When implementing conditional order logic or modifying the order state machine
    action: Preserve the distinction between LOCAL states (Initialized, Emulated, Released) and VENUE states (Submitted, Accepted,
      etc.) — do not merge or flatten these state hierarchies
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Flattening LOCAL and VENUE states breaks the emulation layer, causing conditional orders to submit prematurely
      without proper trigger validation, leading to incorrect order routing in backtesting and live trading
    derived_from_bd_id: BD-019
  - id: finance-C-202
    when: When instantiating or subclassing the data catalog
    action: Use the existing catalog instance via DataCatalog.instance() — never create additional catalog instances that
      point to different data sources
    severity: high
    kind: domain_rule
    modality: must
    consequence: Creating multiple catalog instances causes silent data inconsistencies where different parts of the system
      access different data sources, leading to incorrect backtest results and corrupted analysis
    derived_from_bd_id: BD-006
  - id: finance-C-203
    when: When using the time range generator for historical data backfill
    action: Verify that interval-level gap filling aligns with strategy requirements — confirm that small scattered gaps within
      intervals are not silently skipped by the generator
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Interval-level gap filling may silently skip small scattered gaps within intervals, leading to incomplete
      historical data and strategies operating on truncated datasets with missing ticks
    derived_from_bd_id: BD-004
  - id: finance-C-204
    when: When using simulated exchange for HFT strategy backtesting
    action: Verify that LatencyModel parameters match the target market characteristics — check that per-fill latency distributions
      are configured for realistic order execution timing
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Inaccurate latency simulation causes HFT strategies to overestimate or underestimate edge, leading to strategies
      that appear profitable in backtest but lose money in live trading due to timing mismatches
    derived_from_bd_id: BD-025
  - id: finance-C-205
    when: When running HFT strategy backtests that depend on reproducible results
    action: Verify random seed (BD-044) covers each latency-affected components — verify no random operations exist outside
      the seeded scope when simulating HFT strategies
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-deterministic HFT backtests cause strategies to pass or fail depending on random draws from LatencyModel,
      making edge cases unreproducible and backtest results unreliable for strategy validation
    derived_from_bd_id: BD-121
  - id: finance-C-206
    when: When processing large multi-instrument backtest data in streaming mode
    action: Use deferred sorting for large datasets to achieve O(n) performance — never rely on incremental sorting during
      streaming ingestion which causes O(n²) degradation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incremental sorting during streaming data ingestion causes O(n²) performance degradation on large multi-instrument
      backtests, making backtesting impractical for large historical datasets
    derived_from_bd_id: BD-027
  - id: finance-C-207
    when: When running strategies that require recent quote history in multi-instrument backtesting
    action: Verify that tick_capacity=10000 provides sufficient history for strategy needs — for memory-constrained environments,
      reduce tick_capacity but verify it covers the strategy's lookback window
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Insufficient tick_capacity causes strategies to lose access to recent quotes needed for indicator calculations,
      leading to incorrect trading signals and degraded backtest accuracy
    derived_from_bd_id: BD-003
  - id: finance-C-208
    when: When calculating interest accruals, bond pricing, or any financial calculation requiring time-based year fractions
    action: Assume the framework implements or defaults a day count convention for financial calculations — the framework
      does not enforce a day count convention
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without day count convention, bond pricing, interest calculations, and yield computations use inconsistent
      or incorrect year fractions, causing systematic valuation errors in fixed income strategies
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-209
    when: When implementing fixed income instruments, interest rate swaps, or any instruments requiring precise time-based
      financial calculations
    action: Explicitly specify day_count_convention parameter (e.g., 'ACT/365', 'ACT/360', '30/360', '30E/360') for each instrument,
      ensuring consistent year fraction calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failing to specify day count convention leads to incorrect interest accruals and bond valuations, causing
      P&L discrepancies and potentially regulatory reporting errors in fixed income portfolios
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-210
    when: When implementing bracket order submission logic in concurrent backtest scenarios
    action: Assign position_id to child orders at submission time (when OTO contingency triggers), not at fill time — verify
      atomic position assignment concurrent with parent order submission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fill-time position_id assignment creates a race condition window where child orders may have inconsistent
      or null position_ids in concurrent backtest scenarios, causing orders to be rejected or assigned to wrong positions
    derived_from_bd_id: BD-009
  - id: finance-C-211
    when: When implementing or modifying cache query operations that retrieve entity relationships
    action: Maintain bidirectional indexes (_index_venue_orders, _index_order_strategy, etc.) in strict synchronization with
      primary caches — never use lazy indexing or on-demand lookups
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without synchronized bidirectional indexes, entity relationship queries degrade from O(1) to O(n) full scans,
      causing severe performance degradation in high-frequency cache access patterns
    derived_from_bd_id: BD-030
  - id: finance-C-212
    when: When implementing or refactoring order execution logic in the backtesting or live trading system
    action: Apply execution algorithms via exec_algorithm_id field as optional plug-ins — do not hard-code execution logic
      into the order execution path; maintain the stateless plug-in architecture for TWAP, VWAP, Iceberg, and custom algorithms
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hard-coding execution logic removes plug-in extensibility; custom algorithms cannot be applied, forcing strategies
      to use sub-optimal default execution that may significantly degrade performance
    derived_from_bd_id: BD-017
  - id: finance-C-213
    when: When implementing or refactoring position management in strategies
    action: Receive position snapshots via MessageBus events — do not directly reference or mutate Position objects returned
      from Portfolio; maintain event-driven decoupling between strategy and position state
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct position reference breaks encapsulation; strategies can mutate Position state directly, causing inconsistent
      position tracking and potential state corruption across portfolio components
    derived_from_bd_id: BD-020
  - id: finance-C-215
    when: When configuring FillModel for backtesting market orders
    action: Verify prob_slippage=0.5 matches the expected slippage rate for the target market venue and instrument type —
      adjust to actual adverse fill probability based on historical execution quality data if available
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default slippage probability of 0.5 assumes half of market orders experience adverse price movement; if actual
      market conditions differ significantly, strategies optimized on miscalibrated slippage produce unrealistic backtest
      results
    derived_from_bd_id: BD-043
  - id: finance-C-216
    when: When implementing bracket order submission logic for multi-leg orders
    action: Use TimeInForce.GTC (Good Till Canceled) for bracket order legs — do not use IOC (Immediate Or Cancel) or FOK
      (Fill Or Kill) which have shorter execution windows that may expire before fills occur
    severity: high
    kind: domain_rule
    modality: must
    consequence: IOC/FOK time-in-force causes bracket order legs to expire before fills occur during volatile markets with
      extended execution times; positions remain unprotected, amplifying potential losses
    derived_from_bd_id: BD-055
  - id: finance-C-217
    when: When implementing or refactoring order modification or cancellation logic that supports backtesting
    action: Verify due_timestamp field in ModifyOrder and CancelOrder is properly evaluated by backtest engines for latency
      simulation — do not bypass, ignore, or remove this field from the execution path
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Ignoring due_timestamp removes latency simulation capability; backtest results appear better than actual
      live performance where network delays and order processing time affect execution outcomes
    derived_from_bd_id: BD-018
  - id: finance-C-218
    when: When implementing or refactoring order state queries or persistence logic
    action: Query ExecutionEngine for authoritative order state — do not treat Cache as the source of truth for order status;
      Cache is eventually consistent and stores snapshots for fast queries only
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Querying Cache for order state returns stale snapshots; Cache may lag behind ExecutionEngine state, causing
      strategies to act on outdated or incorrect order status information leading to duplicate orders or missed fills
    derived_from_bd_id: BD-028
  - id: finance-C-220
    when: When implementing strategy logic that uses technical indicators
    action: Check the .initialized attribute before executing any strategy logic that depends on indicator values — only execute
      when indicators have accumulated at least their configured period
    severity: high
    kind: domain_rule
    modality: must
    consequence: Trading on uninitialized indicators produces invalid signals during the warmup period, causing the strategy
      to enter positions based on incomplete or incorrect data and systematically losing money
    derived_from_bd_id: BD-057
  - id: finance-C-221
    when: When configuring DataEngine for time bar aggregation
    action: Use time_bars_interval_type='left-open' to align with standard financial data provider conventions — exclude start
      timestamp, include end timestamp for each bar
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using right-open convention causes bar misalignment when integrating with exchange data feeds, leading to
      timing discrepancies that corrupt backtest results and live execution
    derived_from_bd_id: BD-059
  - id: finance-C-222
    when: When implementing margin requirement validation logic
    action: Validate margin requirements at BOTH order submission time AND at every fill event — do not rely on single-point
      validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single-point margin checking allows a fill triggered by subsequent price movement to push an account from
      margin-compliant to non-compliant, potentially creating positions that exceed risk limits
    derived_from_bd_id: BD-032
  - id: finance-C-223
    when: When calculating risk metrics for multi-leg instruments or strategies
    action: Verify that commission *2 (round-turn assumption) correctly applies to the strategy — for multi-leg strategies
      where legs have different commission structures, override with explicit per-leg commission specification
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Applying round-turn *2 multiplier to multi-leg strategies overestimates costs for some legs and underestimates
      for others, distorting risk calculations and potentially allowing positions that exceed safe leverage limits
    derived_from_bd_id: BD-101
  - id: finance-C-224
    when: When configuring StrategyConfig for production or backtest
    action: Verify the intended behavior for manage_stop and manage_gtd_expiry before changing defaults — enabling automatic
      stop management or GTD expiration may cause unexpected order modifications during execution
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Changing manage_stop or manage_gtd_expiry to True enables automatic order management that may conflict with
      manual intervention or cause stops to be modified unexpectedly, resulting in unintended position exits
    derived_from_bd_id: BD-103
  - id: finance-C-225
    when: When implementing order management for cross-instrument hedging strategies
    action: Use OmsType.HEDGING with per-venue position IDs — verify each venue generates independent position identifiers
      to accurately model multi-leg execution and venue-specific margin/PnL attribution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Consolidating position IDs across venues breaks cross-instrument hedging by losing venue-specific tracking;
      multi-leg positions will be incorrectly attributed, causing margin calculation errors and PnL misattribution in live
      hedging workflows
    derived_from_bd_id: BD-037
  - id: finance-C-227
    when: When configuring multi-currency FX accounts for cross-pair strategies
    action: Set base_currency=None to properly handle cross-pair quotes where neither currency is the account denomination
      — this prevents incorrect conversion calculations and ensures accurate PnL reporting across currency pairs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting a specific base_currency for cross-pair FX strategies introduces conversion artifacts that distort
      PnL reporting; position valuations and profit calculations become inaccurate across currency pairs, leading to misleading
      performance metrics
    derived_from_bd_id: BD-041
  - id: finance-C-228
    when: When using time-based bars (OHLCV) for technical analysis in strategies
    action: Verify DataEngineConfig time_bars_timestamp_on_close=True is used — bars must be timestamped on close to accurately
      represent completed periods and align with technical analysis conventions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Timestamping bars on open causes off-by-one timing errors in strategy calculations; signals trigger one period
      early, causing strategies to execute on incomplete price action and generating results that don't match live trading
      behavior
    derived_from_bd_id: BD-060
  - id: finance-C-229
    when: When configuring RiskEngine order rate limiting for live or backtest trading
    action: Verify that max_order_submit_rate='100/00:00:01' aligns with exchange rate limits — adjust the threshold only
      after confirming the target exchange permits the higher rate
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Setting order rate limits above exchange caps causes order rejections during live trading; backtests without
      this limit show perfect fills while live systems experience rejections, creating a dangerous gap between backtest and
      live performance
    derived_from_bd_id: BD-061
  - id: finance-C-230
    when: When setting up reconciliation on strategy startup or after connectivity loss
    action: Set reconciliation_lookback_mins=1440 (24 hours) to cover typical exchange session boundaries and orders placed
      during connectivity loss — verify this aligns with exchange order retention policies
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using a shorter reconciliation window misses orders from previous sessions, creating position mismatches
      between the system and exchange; unfilled orders may remain in the system while exchange has already cancelled them,
      leading to incorrect state and potential duplicate order submissions
    derived_from_bd_id: BD-064
  - id: finance-C-232
    when: When implementing EMA crossover strategies using time bars
    action: Explicitly define and document whether strategy execution occurs at bar close or bar open — if using bar-close
      timestamps, verify strategy logic is designed for end-of-bar execution; if bar-open execution is required, verify data
      availability at bar open matches strategy assumptions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ambiguous timing between bar close publication and EMA crossover signal execution causes strategies to either
      miss signals or execute on stale data; timing misalignment accumulates over trades, systematically biasing strategy
      results away from expected performance
    derived_from_bd_id: BD-117
  - id: finance-C-233
    when: When implementing or refactoring backtest fill simulation logic
    action: Set random_seed=42 in FillModel to verify reproducible backtest results — do not use dynamic or time-based seeding
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-deterministic seeding produces different fill results on each run, making strategy performance comparison
      impossible and preventing reproducible issue reproduction
    derived_from_bd_id: BD-044
  - id: finance-C-234
    when: When converting M1 bar data to quote ticks for FX backtesting
    action: Use QuoteTickDataWrangler.process_bar_data for bar-to-tick conversion — do not use direct OHLCV bar data for strategies
      requiring spread or depth modeling
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using raw OHLCV bars for spread-dependent strategies ignores bid-ask dynamics, causing backtest results that
      do not reflect actual trading conditions where spread costs and depth affect execution
    derived_from_bd_id: BD-045
  - id: finance-C-235
    when: When implementing trailing stop functionality
    action: Configure TrailingOffsetParameters with separate activation_price and trailing_distance — do not use a single
      fixed offset without activation threshold
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Fixed offset without activation threshold causes premature trailing after small favorable moves, locking
      in insufficient profits and reducing strategy effectiveness
    derived_from_bd_id: BD-067
  - id: finance-C-236
    when: When configuring live trading connection settings
    action: Use timeout_connection=30.0 and timeout_reconciliation=10.0 — do not reduce timeouts below these values for reliability
      in high-latency connections
    severity: high
    kind: domain_rule
    modality: must
    consequence: Shorter timeouts cause connection drops during legitimate network latency, resulting in failed order submissions
      and missed trading opportunities
    derived_from_bd_id: BD-072
  - id: finance-C-237
    when: When implementing emergency position exit logic
    action: Configure market_exit_max_attempts=100 with 100ms interval for a 10-second total wait window — do not reduce below
      these values for emergency shutdown reliability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reducing exit attempts or interval causes incomplete position closure during emergency shutdown, leaving
      open positions exposed to after-hours market risk
    derived_from_bd_id: BD-075
  - id: finance-C-239
    when: When tracking positions in live trading with external venue orders
    action: Use external order claims to bind external venue orders to the strategy — do not ignore external orders as they
      cause duplicate position calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ignoring external orders results in duplicate position tracking, causing the system to believe it holds more
      contracts than actually exist, leading to over-trading and margin violations
    derived_from_bd_id: BD-079
  - id: finance-C-240
    when: When deploying the system with memory-only catalog in production
    action: Verify catalog persistence configuration — verify database backing is configured for production deployments; in-memory
      catalog (database=None) should only be used for development
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Process crash, restart, or OOM kill with memory-only catalog loses all strategies, orders, and positions
      stored in-process memory, causing complete state loss and requiring manual recovery
    derived_from_bd_id: BD-119
  - id: finance-C-241
    when: When configuring automatic position exit on strategy shutdown
    action: Explicitly set manage_stop=True in StrategyConfig AND verify manage_stop=False is not set in Strategy lifecycle
      — check both configuration locations to avoid conflicting defaults
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Conflicting manage_stop defaults between StrategyConfig and Strategy lifecycle cause positions to fail exiting
      on shutdown, leaving open positions that accumulate overnight risk
    derived_from_bd_id: BD-122
  - id: finance-C-242
    when: When using interval-level gap filling for historical data
    action: Verify validate_data_sequence=True is enabled when using interval-based gap filling — do not disable timestamp
      validation as it causes misordered data to be combined into wrong intervals
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Disabling timestamp validation while using interval gap filling produces incorrect historical data where
      misordered timestamps are silently combined, causing strategies to trade on corrupted price history
    derived_from_bd_id: BD-123
  - id: finance-C-243
    when: When implementing order entry with attached take-profit and stop-loss exits in backtesting or live trading
    action: Use order_factory.bracket() to create single-order entry with TP/SL attached atomically, ensuring risk management
      is defined at order submission time
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing bracket orders with separate stop/target orders introduces timing gaps between order fill and stop
      placement, leaving positions unprotected during overnight gaps or fast market moves, causing unbounded losses in live
      trading
    derived_from_bd_id: BD-054
  - id: finance-C-244
    when: When implementing multi-stage indicator analysis where one indicator's output feeds into another
    action: Use update_raw() method to feed indicator output into another indicator for cascaded calculations
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Custom cascaded indicator calculations bypass the established framework pattern, reducing code reusability
      and creating inconsistent indicator behavior across different strategies
    derived_from_bd_id: BD-056
  - id: finance-C-245
    when: When implementing trailing stop logic for high-frequency trading strategies
    action: Use TrailingStopType.EXTERNAL to delegate trailing stop management to the broker, reducing network latency impact
      on stop updates
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using internal trailing stops for high-frequency strategies introduces network latency in stop updates, causing
      delayed execution compared to broker-managed external stops
    derived_from_bd_id: BD-065
  - id: finance-C-246
    when: When configuring the Binance execution client for live trading
    action: Set max_retries=3 in BinanceExecClientConfig to handle transient API failures with balanced resilience and latency
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Setting max_retries=0 loses transactions on transient API failures; setting infinite retries blocks execution
      during prolonged outages, preventing recovery or failover
    derived_from_bd_id: BD-071
  - id: finance-C-247
    when: When calculating commissions for Polymarket trades
    action: Round commission calculations to exactly 4 decimal places to match Polymarket API requirements and prevent floating-point
      accumulation errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fewer decimal places causes Polymarket API rejection due to precision mismatch, while more decimal
      places introduces floating-point noise that accumulates in repeated calculations
    derived_from_bd_id: BD-095
  - id: finance-C-248
    when: When calculating total PnL percentage performance metrics
    action: Use starting_balance as the denominator for total PnL percentage calculation to verify consistent performance
      measurement from strategy initialization
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using current balance instead of starting_balance produces misleading percentages during capital changes,
      making strategy evaluation inconsistent across periods with deposits or withdrawals
    derived_from_bd_id: BD-096
  - id: finance-C-249
    when: When calculating Sharpe Ratio for risk-adjusted performance evaluation
    action: Use 252 trading days for annualization following industry convention to enable valid comparison of risk-adjusted
      returns across strategies
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using different annualization periods produces incomparable Sharpe Ratios, leading to incorrect strategy
      selection based on misaligned performance metrics
    derived_from_bd_id: BD-098
  - id: finance-C-250
    when: When creating Interactive Brokers contracts for options or other strike-bearing instruments
    action: Normalize strike=0.0 to UNSET_DOUBLE in __post_init__ to match IB protocol requirements for non-strike instruments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing strike=0.0 directly to Interactive Brokers API causes invalid request errors for options instruments,
      as IB protocol treats 0.0 as an invalid strike value
    derived_from_bd_id: BD-108
  - id: finance-C-251
    when: When implementing position sizing, calculation, or state management logic
    action: 'Maintain the three-way invariant chain: use signed_qty as canonical position state, verify BUY=LONG/SELL=SHORT
      mapping from BD-100, and aggregate positions deterministically from fills per BD-021'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using _buy_qty/_sell_qty for position sizing instead of signed_qty, or reversing BUY/SELL mapping, causes
      silent incorrect position calculations with no validation error, leading to wrong order sizing and unbounded PnL errors
    derived_from_bd_id: BD-118
  - id: finance-C-252
    when: When processing orders in backtesting with RiskEngine bypass enabled
    action: Assume backtest order rate limiting behavior reflects production safeguards — RiskEngine bypass (BD-036) disables
      max_order_submit_rate protection during backtest
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Strategies that would trigger rate limits in production pass unlimited order submissions in backtest, creating
      false confidence in high-frequency algorithms that would be throttled or rejected by exchanges
    derived_from_bd_id: BD-116
  - id: finance-C-253
    when: When testing high-frequency trading strategies in backtesting
    action: Implement independent rate limit validation by tracking order submission frequency against max_order_submit_rate
      threshold, regardless of RiskEngine bypass, to verify strategies would comply with exchange rate limits in production
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without independent rate limit validation, high-frequency strategies deploy to production only to discover
      throttling or rejection, causing missed trading opportunities and potential financial losses from delayed execution
    derived_from_bd_id: BD-116
  - id: finance-C-254
    when: When configuring DataEngine for order book data collection
    action: Keep DataEngineConfig buffer_deltas=True — wait for F_LAST flag before processing order book deltas to verify
      complete snapshots; do not disable buffering even if perceived performance overhead exists
    severity: high
    kind: domain_rule
    modality: must
    consequence: Disabling delta buffering causes partial order book updates to be processed prematurely, leading to incorrect
      spread and depth calculations that result in strategies trading at wrong price levels
    derived_from_bd_id: BD-088
  - id: finance-C-255
    when: When configuring position sizing and leverage parameters for backtesting strategies
    action: 'Verify the interaction between position_pct, default_leverage, and AccountType settings — if margin-based strategies
      are intended, explicitly configure each three: position_pct (e.g., 0.02 for 2%), default_leverage (>1 for margin), and
      AccountType.MARGIN; do not rely on individual defaults in isolation'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Relying on default position_pct=None, default_leverage=1, and AccountType.CASH creates a conservative spot-only
      environment where margin strategies fail silently with no position sizing, causing backtest-live divergence when users
      deploy expecting leveraged positions
    derived_from_bd_id: BD-124
  - id: finance-C-256
    when: When implementing or refactoring strategy initialization code that involves time-sensitive operations
    action: Verify that the Actor's placeholder Clock has been properly replaced by the registered trading context Clock before
      executing any time-dependent logic
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Time-sensitive operations executed with placeholder Clock produce incorrect timing behavior or silent failures,
      causing scheduled tasks to use wrong timestamps and backtest results to diverge from live execution
    derived_from_bd_id: BD-105
  - id: finance-C-257
    when: When implementing or configuring Cache for persistence in backtesting or live trading
    action: Assume Cache persists data by default — CacheDatabaseFacade must be explicitly provided at construction; when
      None, no persistence occurs regardless of deployment context
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Strategies relying on cross-session data persistence without configuring CacheDatabaseFacade silently lose
      all cached state between sessions, causing incorrect strategy state in live trading and non-reproducible backtest results
    derived_from_bd_id: BD-029
  - id: finance-C-258
    when: When implementing strategy configuration initialization
    action: Attempt to modify any strategy config field after construction — the config is a frozen dataclass and each assignments
      will raise FrozenInstanceError
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Attempts to modify config fields post-construction (e.g., for parameter tuning or dynamic adjustment) raise
      FrozenInstanceError, causing runtime crashes and preventing flexible strategy reconfiguration
    derived_from_bd_id: BD-010
  - id: finance-C-259
    when: When configuring strategy parameters without explicit on_config override
    action: Verify that each required config fields are provided at construction — field names automatically become strategy
      attributes; missing required fields or typos in field names will not raise validation errors unless on_config is overridden
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Silent typos in config field names result in missing strategy attributes without errors, causing strategies
      to fail with AttributeError at runtime when accessing misspelled parameters
    derived_from_bd_id: BD-010
  - id: finance-C-260
    when: When implementing strategy on_bar or on_history methods that receive bar data
    action: Assume strategies can receive incomplete or partial bars during bar aggregation — the framework finalizes bars
      internally via internal queue and only publishes completed OHLCV bars on bar close
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Strategies written to handle streaming or partial bar updates will never receive such data in backtesting,
      creating look-ahead bias where live trading signals differ from backtested behavior when receiving only closed bars
    derived_from_bd_id: BD-002
  - id: finance-C-261
    when: When implementing Actor instance initialization in multi-strategy systems
    action: Initialize each Actor instances (Strategies, ExecutionEngine, RiskEngine, etc.) sequentially under Trader's control,
      ensuring each dependency is fully initialized before the next begins — never use parallel or concurrent initialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Concurrent initialization of Actor instances causes race conditions where dependent components access uninitialized
      resources, leading to crashes, deadlocks, or silent state corruption that manifests only under specific timing conditions
    derived_from_bd_id: BD-022
  - id: finance-C-262
    when: When implementing position calculation logic in backtesting or live trading
    action: Use fill-based aggregation model where each fill updates an internal cost-bar — calculate position state from
      completed fills deterministically, never from real-time price feeds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using streaming mark-to-market breaks broker parity; position values differ from broker statements, causing
      reconciliation failures and live trading account mismatches that are difficult to debug
    derived_from_bd_id: BD-021
  - id: finance-C-263
    when: When implementing clock or time simulation in backtest engine
    action: Verify data timestamps are monotonically non-decreasing — use a single static Clock advanced by BacktestEngine
      and process events strictly in timestamp order to guarantee deterministic execution and reproducibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-monotonic timestamps cause events to be processed out of causal order, making backtest results irreproducible
      across runs and creating discrepancies between backtested and live trading behavior
    derived_from_bd_id: BD-026
  - id: finance-C-264
    when: When implementing strategy design for event sourcing or backtest replay
    action: Verify that strategy can be fully reconstructed from the event stream using strategy_id and position_id attached
      to order events — verify strategies hold no mutable state required for reconstruction
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Strategies relying on mutable state cannot be reconstructed from event logs alone, breaking audit trails,
      backtest replay, and compliance requirements that depend on stateless event sourcing
    derived_from_bd_id: BD-008
  - id: finance-C-265
    when: When implementing funding rate calculations for perpetual futures
    action: Verify that funding rate is TWAPed over the funding interval (typically 8 hours) rather than applied instantaneously
      at funding timestamps — check that cost/proceeds are distributed smoothly across the interval
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Instantaneous funding application creates artificial PnL discontinuities at funding timestamps, misrepresenting
      actual trader PnL and causing backtest results to diverge from live trading performance
    derived_from_bd_id: BD-033
  - id: finance-C-266
    when: When implementing factor computation that involves matrix operations (e.g., factor regression, covariance matrix
      calculation, portfolio optimization)
    action: Assume the framework handles matrix ill-conditioning — matrix inversion, eigenvalue decomposition, or linear system
      solving without regularization or condition number checks will produce unreliable results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Factor computations with ill-conditioned matrices produce numerically unstable results, causing strategies
      to receive incorrect factor values and generate erroneous trading signals that deviate significantly from expected performance
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-267
    when: When implementing factor computation with matrix operations
    action: Add regularization (Tikhonov/L2), check condition number before solving linear systems, use SVD-based pseudoinverse
      for matrices with condition_number > 10000, and implement fallback to numerically stable algorithms
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without regularization, ill-conditioned matrices in factor computations cause numerical overflow or underflow,
      leading to corrupted factor values that produce trading signals opposite to intended strategy behavior
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-270
    when: When configuring order management for single-instrument strategies
    action: Use OmsType.NETTING to automatically net opposing fills into a single position state — do not use HEDGING mode
      for single instruments as it adds unnecessary venue complexity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using HEDGING mode for single-instrument strategies creates unnecessary opposing positions, increasing transaction
      costs and causing incorrect P&L attribution that misrepresents actual strategy performance
    derived_from_bd_id: BD-038
  - id: finance-C-271
    when: When setting up order management for single-instrument strategies
    action: Verify OmsType configuration matches strategy requirements before live trading — NETTING for single-instrument,
      HEDGING for multi-instrument — and confirm the default matches expected netting behavior
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default OmsType configuration may not match strategy requirements, causing position tracking errors when
      mismatched configuration leads to unexpected netting or lack of netting in live trading
    derived_from_bd_id: BD-038
  - id: finance-C-273
    when: When using the framework's default leverage parameter
    action: Verify default_leverage=Decimal(1) matches the target instrument's actual margin requirements — for futures and
      margin-enabled instruments, adjust to required leverage ratio before live trading
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default leverage of 1x may not match futures or margin-enabled instruments requiring specific leverage ratios,
      causing insufficient position sizing or margin call mismatches that result in losses
    derived_from_bd_id: BD-040
  - id: finance-C-274
    when: When configuring execution engine settings for production backtesting
    action: Verify snapshot_positions=True remains enabled to persist position states to database for audit trail and system
      failure recovery
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Disabling position snapshots breaks the audit trail required for compliance, and eliminates the ability to
      reconstruct trading state after system failures, potentially causing regulatory violations and operational data loss
    derived_from_bd_id: BD-062
  - id: finance-C-275
    when: When implementing state management for Actors/Strategies in crash-only recovery scenarios
    action: Verify that on_save is explicitly called to persist state before any potential crash or failure, as the crash-only
      design pattern relies on state being available in the persisted cache for reload on startup
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without explicit state persistence via on_save, crash-only recovery will reload stale or empty state, causing
      strategies to lose positions, capital tracking, and other critical runtime state
    derived_from_bd_id: BD-011
  - id: finance-C-276
    when: When submitting orders via OrderFactory outside an active trading session
    action: Provide an explicit submit_order_handler when creating OrderFactory to verify orders are not silently discarded;
      verify OrderManager context exists before order submission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Submitting orders without proper OrderManager context causes silent order leakage where orders do nothing
      - no error is raised but orders are not executed, leading to missed trades that are difficult to diagnose
    derived_from_bd_id: BD-109
  - id: finance-C-277
    when: When implementing or modifying Position.reopen logic to restore trading positions
    action: Verify Position.reopen clears each position state (unrealized PnL, quantity history, fill count, realized PnL)
      before applying the new fill - use fresh position semantics without any carryover from the closed position
    severity: high
    kind: domain_rule
    modality: must
    consequence: Preserving any state during reopen (such as partial PnL or fill history) breaks position lifecycle semantics
      and creates inconsistent position states that do not reflect actual trading conditions, causing incorrect strategy decisions
    derived_from_bd_id: BD-114
  - id: finance-C-278
    when: When implementing portfolio-level risk management with profit_threshold and loss_limit parameters
    action: Verify that threshold checks use portfolio snapshot state rather than streaming updates to verify consistent portfolio
      state across each position evaluations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using streaming PnL updates instead of snapshot state can cause false triggers where threshold checks see
      inconsistent portfolio views, leading to premature or delayed position closures that distort backtest risk metrics
    derived_from_bd_id: BD-014
  - id: finance-C-279
    when: When implementing or refactoring OrderEmulator and related execution logic
    action: Verify OrderEmulator maintains its internal simulation path through DataEngine subscription and ExecutionEngine,
      preserving the uniform venue interface where emulated fills are indistinguishable from real fills
    severity: high
    kind: domain_rule
    modality: must
    consequence: Refactoring OrderEmulator to use separate paths breaks the uniform venue interface, causing risk engine and
      strategies to misidentify fill sources and produce incorrect risk calculations
    derived_from_bd_id: BD-016
  - id: finance-C-280
    when: When setting up backtesting with FillModel and conditional orders
    action: Verify that prob_fill_on_limit=0.2 matches actual market liquidity conditions or calibrate against historical
      fill rate data for the target market
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using default prob_fill_on_limit=0.2 without calibration causes backtests to assume unrealistic fill probabilities,
      leading to strategies that overpromise execution quality in live trading with actual fill rates that may be significantly
      lower
    derived_from_bd_id: BD-042
  - id: finance-C-281
    when: When calculating free balance for margin accounts
    action: Use min(availableBalance, walletBalance) as the free balance calculation — availableBalance alone must NOT be
      used as it may include collateral tied to open positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using availableBalance directly for free balance creates hidden leverage risk when open positions consume
      collateral; in live trading, over-trading beyond actual available funds triggers margin calls or forced liquidation
    derived_from_bd_id: BD-094
  - id: finance-C-282
    when: When implementing market maker quote distribution logic
    action: Use inventory-based dynamic grid spacing that adjusts quote distribution based on current position exposure —
      do NOT use fixed uniform grid spacing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Fixed grid spacing without inventory adjustment causes accumulation of one-sided inventory, leading to locked
      positions that must be closed at unfavorable market prices with high slippage
    derived_from_bd_id: BD-092
  - id: finance-C-283
    when: When implementing position sizing logic for risk management
    action: Calculate unit batch sizes aligned with instrument lot sizes using discrete unit calculation — do NOT use continuous
      floating-point sizing that ignores exchange minimum order size constraints
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Continuous sizing without unit batch alignment produces order sizes below exchange minimums, causing order
      rejections and missed entries on high-conviction trading signals
    derived_from_bd_id: BD-097
  - id: finance-C-284
    when: When routing orders on Polymarket binary markets
    action: 'Determine order side based on trader role: makers take the YES side, takers take the NO side — do NOT use generic
      order side assignment that ignores Polymarket''s bilateral market structure'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Generic order side assignment without understanding Polymarket's maker=taker YES/NO convention routes orders
      to the wrong outcome leg, causing order rejections or fills on unintended positions
    derived_from_bd_id: BD-099
  - id: finance-C-285
    when: When configuring ExecEngineConfig for high-frequency strategy execution
    action: Maintain allow_overfills=True for HFT strategies to prevent unnecessary order rejections due to strict lot size
      constraints; if changing to False, verify position accounting accurately reflects actual fills and lot enforcement
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting allow_overfills=False may cause order rejections in high-frequency strategies due to lot size mismatches
      during rapid position accumulation, leading to missed executions and execution delays that materially impact HFT returns
    derived_from_bd_id: BD-089
  - id: finance-C-286
    when: When configuring StrategyConfig for strategies using contingent orders (OTO/OCO)
    action: Enable manage_contingent_orders=True to verify linked orders are properly activated and canceled according to
      strategy rules; if disabling, implement manual contingent order management to prevent orphaned orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Disabling contingent order management causes orphaned OTO/OCO orders that never activate or cancel properly,
      resulting in strategies missing exit signals and accumulating unintended positions with no automatic resolution
    derived_from_bd_id: BD-091
  - id: finance-C-287
    when: When implementing position sizing, PnL calculation, or any monetary arithmetic
    action: Use Decimal type for each monetary quantities (prices, quantities, PnL, costs) instead of float or double to eliminate
      binary floating-point rounding errors in financial calculations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Float arithmetic in financial calculations introduces rounding errors that compound over many trades, causing
      PnL reports to diverge from actual returns and potentially triggering incorrect position sizing or risk management decisions
    derived_from_bd_id: BD-093
  - id: finance-C-288
    when: When adding new instrument types to the trading system
    action: Explicitly decide whether new instrument types belong in ENGINE_EXPIRING_INSTRUMENT_CLASSES whitelist for automatic
      expiration handling or require manual expiration processing; do not assume automatic inclusion or exclusion
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Adding instruments without determining expiration handling causes incorrect behavior: non-expiring instruments
      processed through expiration logic or expiring instruments missing expiration, leading to stale positions and incorrect
      backtest results'
    derived_from_bd_id: BD-104
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
