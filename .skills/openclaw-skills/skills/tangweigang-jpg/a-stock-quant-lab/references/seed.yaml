      summary: 'Missing: 利率缺口分析时间桶'
    - id: BD-GAP-057
      type: B
      summary: 'Missing: 资金转移定价（FTP）'
    - id: BD-GAP-058
      type: B
      summary: 'Missing: 现金池法律结构'
  - id: data_storage
    narrative:
      does_what: StorageBackend persists DataFrames to per-provider SQLite databases at {data_path}/{provider}/{provider}_{db_name}.db
        using path templates from _get_path_template; Mixin.record_data and Mixin.query_data provide uniform read/write interface.
      key_decisions: BD-004 chose StorageBackend abstraction (not hardcoded SQLite) to allow future cloud storage swap; BD-006
        derives db_name from data_schema __tablename__ for per-domain database isolation.
      common_pitfalls: SL-04 violation (wrong DataFrame index) causes factor pipeline failures downstream; always ensure df.index.names
        == ['entity_id', 'timestamp'] before calling record_data.
    business_decisions:
    - id: BD-004
      type: B/BA
      summary: StorageBackend abstraction enables future cloud storage
    - id: BD-005
      type: BA
      summary: Path template allows migration from old provider/ dir structure
    - id: BD-006
      type: B/BA
      summary: db_name derived from data_schema __tablename__
    - id: BD-022
      type: B/DK
      summary: 'AdjustType supports 3 modes: bfq (不复权), qfq (前复权), hfq (后复权)'
    - id: BD-049
      type: B/BA
      summary: Fix duplicate way defaults to 'add' for TimeSeriesDataRecorder, 'ignore' for FixedCycleDataRecorder
    - id: BD-050
      type: B/BA
      summary: 'Kline data: last 2 records checked, duplicates in same interval are deleted'
    - id: BD-053
      type: B/DK
      summary: 'pre_load_days=365: factors load 1 year of historical data before trading period'
    - id: BD-054
      type: B/BA
      summary: StockTrader default adjust_type=hfq (post-adjustment) for historical price analysis
    - id: BD-058
      type: B/BA
      summary: TechnicalFactor default columns include turnover and turnover_rate for liquidity analysis
    - id: BD-GAP-005
      type: B/BA
      summary: AdjustType.qfq (前复权) set as default for kdata retrieval, normalizing prices for dividend adjustments
    - id: BD-GAP-016
      type: T
      summary: Block money flow uses entity_id as primary category field, enabling sector-based aggregation
    - id: BD-GAP-017
      type: B/BA
      summary: OrderByType enum defines fixed sort directions without null handling preferences
    - id: BD-GAP-018
      type: T
      summary: Domain ID generation includes original data for deduplication across entity types
  - id: factor_computation
    narrative:
      does_what: Factor.compute() applies Transformer (stateless, e.g. MacdTransformer) then Accumulator (stateful, e.g. MaStatsAccumulator)
        to produce filter_result or score_result columns; EntityStateService persists per-entity rolling state across batches.
      key_decisions: BD-007 chose Factor inheriting DataReader for composable data access; SL-08 locks MACD at (fast=12, slow=26,
        n=9) — chose standard Appel parameters not adaptive because interpretability matters for practitioners.
      common_pitfalls: 'SL-07: Transformer MUST run before Accumulator — swapping order causes NaN propagation; SL-12: result_df
        must contain filter_result OR score_result column or TargetSelector silently drops all signals.'
    business_decisions:
    - id: BD-007
      type: B
      summary: Factor inherits DataReader for uniform data access pattern
    - id: BD-008
      type: B/DK
      summary: EntityStateService per-factor state for rolling computations
    - id: BD-009
      type: BA
      summary: factor_schema optional for Factor; enables dynamic schema creation
    - id: BD-010
      type: BA
      summary: fill_gap fills missing timestamps with ffill before computing
    - id: BD-011
      type: BA
