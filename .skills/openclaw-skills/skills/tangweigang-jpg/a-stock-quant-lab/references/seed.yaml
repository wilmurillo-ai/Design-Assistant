    evidence_quality_rules_count: 2
    traceback_scenarios_count: 5
architecture:
  pipeline: data_collection -> data_storage -> factor_computation -> target_selection -> trading_execution -> visualization
  stages:
  - id: data_collection
    narrative:
      does_what: TimeSeriesDataRecorder and FixedCycleDataRecorder fetch OHLCV and fundamental data from providers (eastmoney,
        joinquant, baostock, akshare) and persist domain objects (Stock1dKdata, BalanceSheet) to SQLite via df_to_db().
      key_decisions: BD-002 chose evaluate_start_end_size_timestamps for incremental fetch (not full refresh) because comparing
        to get_latest_saved_record avoids redundant API calls; BD-003 chose get_data_map field transformation to keep domain
        schema provider-agnostic.
      common_pitfalls: 'Don''t forget SL-11: Recorder subclass MUST declare both provider and data_schema class attributes
        else initialization fails with assertion error; finance-C-001 fatal violation.'
    business_decisions:
    - id: BD-001
      type: B
      summary: Recorder inherits OneStateService for single-state persistence
    - id: BD-002
      type: BA
      summary: evaluate_start_end_size_timestamps determines incremental fetch range
    - id: BD-003
      type: B
      summary: Provider-agnostic recording via get_data_map for field transformation
    - id: BD-GAP-004
      type: B/BA
      summary: Default include_bj=True for stock enumeration includes Beijing Stock Exchange listings
    - id: BD-GAP-013
      type: B/BA
      summary: JoinQuant recorders use force_update=True by default for metadata synchronization
    - id: BD-GAP-019
      type: B/BA
      summary: fix_duplicate_way='add' default behavior adds duplicates instead of skipping or replacing
    - id: BD-GAP-022
      type: DK
      summary: 'Missing: Stale data detection and expiry policy'
    - id: BD-GAP-024
      type: DK
      summary: 'Missing: Model and data version snapshot binding'
    - id: BD-GAP-027
      type: B
      summary: 'Missing: 资金成本建模（Carry/Funding）'
    - id: BD-GAP-028
      type: RC
      summary: 'Missing: 印花税'
    - id: BD-GAP-029
      type: B
      summary: 'Missing: 指数成分股调整'
    - id: BD-GAP-030
      type: B
      summary: 'Missing: 执行可行性/流动性约束'
    - id: BD-GAP-031
      type: B
      summary: 'Missing: 有限差分网格稳定性'
    - id: BD-GAP-032
      type: B
      summary: 'Missing: 波动率模型族与分布选择'
    - id: BD-GAP-036
      type: M/DK
      summary: 'Missing: Day count convention'
    - id: BD-GAP-037
      type: RC
      summary: 'Missing: 印花税'
    - id: BD-GAP-038
      type: B
      summary: 'Missing: 指数成分股调整'
    - id: BD-GAP-039
      type: B
      summary: 'Missing: 定价模型选择与适用边界'
    - id: BD-GAP-040
      type: B
      summary: 'Missing: 日计数与复利约定'
    - id: BD-GAP-041
      type: B
      summary: 'Missing: 波动率曲面插值方案'
    - id: BD-GAP-042
      type: B
      summary: 'Missing: 隐含波动率求解器'
    - id: BD-GAP-043
      type: B
      summary: 'Missing: Greeks 计算方法'
    - id: BD-GAP-044
