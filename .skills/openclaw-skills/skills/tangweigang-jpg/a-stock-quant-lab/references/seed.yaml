- id: AP-VNPY-3715
  title: loguru 格式化字符串中含花括号的 order 对象触发 KeyError 导致日志系统崩溃
  description: 'vnpy engine.py 使用 f-string 将 order.__dict__ 直接格式化后传给 loguru 的 write_log。当 order 的字段名（如 gateway_name）恰好匹配 loguru
    格式化占位符时， loguru 将其解析为模板变量并抛出 KeyError，导致整个日志线程崩溃。实盘中 日志系统崩溃意味着后续所有委托/成交记录丢失，是生产环境的高危陷阱。

    '
