    good_example: "# GOOD: 按板块分别设置阈值\nBOARD_LIMITS = {'main': 0.10, 'star': 0.20, 'chinext': 0.20, 'bse': 0.30}\ndef filter_abnormal(df):\n\
      \    limits = df['board_type'].map(BOARD_LIMITS).fillna(0.10)\n    mask = df['pct_change'].abs() <= limits * 1.05  #\
      \ 留5bp容差\n    return df[mask]\n"
