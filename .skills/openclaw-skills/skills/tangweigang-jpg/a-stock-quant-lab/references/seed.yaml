- id: SHARED-CN-ASTOCK-COST-002
  statement: '市场冲击成本（Market Impact）在回测中通常完全缺失，但在实盘中可能是 最大成本来源。A 股小盘股 100 万元买入可能推高 1% 以上。冲击成本与 成交规模呈幂律而非线性关系，应使用 Almgren-Chriss
    模型或简化版估算。

    '
  severity: high
  capability_tags:
    markets:
    - cn-astock
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - order_execution
    - portfolio_simulation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: order_execution
    constraint_context: market impact cost must be estimated for each trade, especially for small-cap stocks
  evidence_refs:
  - type: community_validated
    ref: 证券时报《微观量化百问第十六期：滑点、冲击成本、交易成本》（2024）；明汯投资教育《何为滑点及其影响因素》（中证网，2023）
    url: https://www.cs.com.cn/ssgs/gsxl/202312/t20231212_6380080.html
  reference_code:
    bad_example: '# BAD: 固定滑点，不区分成交规模

      impact = order_value * 0.001  # 固定 0.1%，不随规模变化

      '
    good_example: '# GOOD: 简化幂律冲击成本模型

      # impact ≈ σ * sqrt(Q / ADV)，σ 为日波动率，Q 为订单规模，ADV 为日均成交量

      sigma = df[''daily_return''].std()

      adv = df[''volume''].rolling(20).mean() * df[''close''].rolling(20).mean()

      impact_rate = sigma * np.sqrt(order_value / adv)

      impact_cost = order_value * impact_rate

      '
  provenance:
    source: community_validated
  _source_file: cn-astock/constraints.yaml
