- kuc_id: KUC-QU-005
  source_file: examples/migration.py
  business_problem: '演示如何用 Pydantic + SQLAlchemy Mixin 向 zvt 注册自定义数据 schema， 支持业务团队扩展本地数据库存储自定义实体和 JSON 字段，无需修改框架核心。

    '
  inputs:
  - custom_schema: 'User (含 added_col: String, json_col: JSON)'
  - db_name: test
  - providers:
    - zvt
  components:
  - Mixin
  - register_schema
  - get_db_session
  - UserModel (Pydantic BaseModel)
  parameters:
    declarative_base: ZvtInfoBase
  validation: 'UserModel.validate(user) 不报错，说明 SQLAlchemy ORM 对象可无缝转换为 Pydantic 模型。

    '
