anti_patterns:
- id: AP-ZVT-183
  title: 除权因子为 inf/NaN 时直接参与乘法导致复权静默失败
  description: 'ZVT 在计算前复权因子时以 new/old 价格比计算 qfq_factor。当 old==0（新股首日 或数据缺失）时因子为 inf；当 kdata.open 本身为 None（停牌日未填充）时乘法 抛出 TypeError。结果：整个
    entity 的复权计算中断，后续 K 线全部丢失，但主 流程只 log ERROR 不中断，用户往往不知道已有大量股票数据损坏。

    '
  project_source: zvt
  issue_link: https://github.com/zvtvz/zvt/issues/183
  applicable_to_tags:
    markets:
    - cn_a_share
    activities:
    - data_pipeline
    - backtesting
    - factor_research
  severity: high
- id: AP-ZVT-179
  title: 第三方数据接口超限后异常被吞噬，数据静默缺失
  description: 'ZVT 使用聚宽 jqdatasdk 批量拉取全市场 K 线时（4000+ 股票），触发聚宽每日 最大查询条数限制（错误：已超过每日最大查询数量）。ZVT 捕获异常后继续执行下一 entity，导致超限后所有股票的当日数据均静默缺失。回测若使用该残缺数据库，因
    子计算结果将产生系统性偏差，且无告警。

    '
  project_source: zvt
  issue_link: https://github.com/zvtvz/zvt/issues/179
  applicable_to_tags:
    markets:
    - cn_a_share
    activities:
    - data_pipeline
    - factor_research
  severity: high
- id: AP-ZVT-200
  title: Token 失效后数据查询返回空 DataFrame 而非报错
  description: '当聚宽/东财 token 过期时，ZVT 的 record_data 不抛异常，而是将 API 返回的 错误信息（如"error: token无效"）当作 DataFrame 列名解析，得到 0 行空表。 后续更新逻辑认为"无新数据"而跳过，造成数据库长期停止更新却无任何错误日志。
    用户直到回测结果异常才发现数据已过期数月。

    '
  project_source: zvt
  issue_link: https://github.com/zvtvz/zvt/issues/200
  applicable_to_tags:
    markets:
    - cn_a_share
    activities:
    - data_pipeline
  severity: high
- id: AP-ZVT-161
  title: 全市场 SQLite 批量因子计算触发 too many SQL variables 错误
  description: 'ZVT 在计算 VolumeUpMaFactor 等多股因子时，将所有 entity_id 拼入单条 SQL 的 IN 子句。当 A 股全市场（5000+ 股）一次性查询时，触发 SQLite 默认限制 SQLITE_MAX_VARIABLE_NUMBER=999。调大
    max_allowed_packet（MySQL 参数）无效， 根因是 SQLite 变量数上限。正确解法是分批查询，但 ZVT 早期版本未处理此边界。

    '
  project_source: zvt
  issue_link: https://github.com/zvtvz/zvt/issues/161
  applicable_to_tags:
    markets:
    - cn_a_share
    activities:
    - factor_research
    - data_pipeline
  severity: medium
- id: AP-ZVT-129
  title: 使用通配符导入隐藏 API 版本变更，AdjustType 等枚举莫名消失
  description: 'ZVT 文档示例使用 `from zvt import *` 导入所有符号。当 ZVT 版本升级重构 枚举（如将 AdjustType 移入子模块）后，通配符导入不再包含该符号，触发 AttributeError。使用者误以为是安装问题，实际是版本间
    API breaking change 未在 CHANGELOG 中标注，且通配符导入掩盖了具体来源。应显式 import 枚举类。

    '
  project_source: zvt
  issue_link: https://github.com/zvtvz/zvt/issues/129
  applicable_to_tags:
    markets:
    - cn_a_share
    activities:
    - data_pipeline
    - factor_research
  severity: medium
- id: AP-ZVT-187
  title: 回测引擎未在数据层空结果时提前终止，导致空指针级联崩溃
  description: 'ZVT Trader 在 load_data 完成后检查数据为空时，不提前退出，而是将空 DataFrame 传入 selector 计算，触发后续 NoneType 操作链式崩溃。错误栈深且难以定位根因， 用户误以为是策略逻辑问题。根因是数据时间窗口配置错误（start/end
    不在数据 库覆盖范围内）但无有效校验。

    '
  project_source: zvt
  issue_link: https://github.com/zvtvz/zvt/issues/187
  applicable_to_tags:
    markets:
    - cn_a_share
    activities:
    - backtesting
  severity: medium
- id: AP-ZVT-184
  title: 样例历史数据替换后 provider 目录不匹配导致更新报错
  description: 'ZVT 提供了可下载的历史快照数据库，但文档未说明必须放置于特定 zvt_home 子目录 下且与 provider 名称对应。用户将数据放错目录后执行 record_data 时，框架 发现本地库为空，触发从头全量拉取，再次遭遇
    API 额度或权限错误。数据库路径 与 provider 的隐式绑定是常见理解盲区。

    '
  project_source: zvt
  issue_link: https://github.com/zvtvz/zvt/issues/184
  applicable_to_tags:
    markets:
    - cn_a_share
    activities:
    - data_pipeline
  severity: low
- id: AP-ZVT-183B
  title: HFQ（后复权）与 QFQ（前复权）K 线表使用错误导致因子计算漂移
  description: 'ZVT 提供 Stock1dKdata（不复权）、Stock1dHfqKdata（后复权）、Stock1dQfqKdata （前复权）三张独立表。用户在计算价格动量/均线因子时混用两张表（如用不复权 做均线，用后复权做收益率），导致除权日前后因子值产生跳变。ZVT
    不做跨表 复权类型一致性校验，混用静默通过。

    '
  project_source: zvt
  issue_link: https://github.com/zvtvz/zvt/issues/183
  applicable_to_tags:
    markets:
    - cn_a_share
    activities:
    - factor_research
    - backtesting
  severity: high
- id: AP-QLIB-1930
  title: 回测结果与模型无关——共享 dataset 对象导致预测值被首次模型覆盖
  description: 'Qlib 中多个模型复用同一个已 fit 的 DatasetH 实例时，dataset 内部的标准化 参数（fit_start_time/fit_end_time 决定的归一化统计量）在第一次 fit 后固化。
    切换模型但不重新初始化 dataset，导致所有模型实际使用同一套预测信号。表现为 无论换 LightGBM/XGBoost/DNN，回测净值曲线完全一致。这是最危险的"实验看起来 在跑，但结论全部无效"反模式。

    '
  project_source: qlib
  issue_link: https://github.com/microsoft/qlib/issues/1930
  applicable_to_tags:
    markets:
    - cn_a_share
    - global
    activities:
    - backtesting
    - factor_research
    - model_training
  severity: high
- id: AP-QLIB-2090
  title: fit_start_time 与 train segment 双重配置引发隐式数据泄露
  description: 'Qlib DatasetH 有两个"训练数据范围"：handler 的 fit_start_time/fit_end_time （决定归一化器拟合范围）和 segments.train（决定模型训练范围）。常见错误是
    让 fit_end_time 覆盖 valid/test 段，使归一化统计量（均值、标准差）包含了 未来数据，造成前向偏差（look-ahead bias）。两者独立配置但语义耦合，文档 未明确说明 fit_end_time 必须 <=
    train_end。

    '
  project_source: qlib
  issue_link: https://github.com/microsoft/qlib/issues/2090
  applicable_to_tags:
    markets:
    - cn_a_share
    - global
    activities:
    - factor_research
    - backtesting
    - model_training
  severity: high
- id: AP-QLIB-2036
  title: MACD 因子公式文档错误——DEA 被多除一次 CLOSE 导致量纲不一致
  description: 'Qlib 官方文档中的 Alpha 公式示例将 MACD 的 DEA 定义为 EMA(DIF, 9) / CLOSE， 但 DIF 已经是无量纲（除过 CLOSE 的），再次除以 CLOSE 导致 DEA 量纲为
    1/price。 基于此文档公式构建的 MACD 因子在截面标准化后与正确公式差异显著，IC 下降。 此类文档层面的公式错误会被大量用户直接照搬入生产因子库。

    '
  project_source: qlib
  issue_link: https://github.com/microsoft/qlib/issues/2036
  applicable_to_tags:
    markets:
    - cn_a_share
    - global
    activities:
    - factor_research
  severity: high
- id: AP-QLIB-2184
  title: 自定义 A 股数据导入前未按约定填充停牌日 NaN，引发下游因子噪声
  description: 'Qlib 约定停牌日 open/close/high/low/volume/factor 字段均应填 NaN，以便框架 在因子计算时识别并跳过。用户自建 A 股数据集时若将停牌日保留为上一日价格 （常见于从东财/Wind
    直接导出的数据），会导致停牌期间的价格动量因子出现 "假信号"（价格不变但因子非零）。Qlib 不校验此约定，错误静默流入训练数据。

    '
  project_source: qlib
  issue_link: https://github.com/microsoft/qlib/issues/2184
  applicable_to_tags:
    markets:
    - cn_a_share
    activities:
    - data_pipeline
    - factor_research
  severity: high
- id: AP-QLIB-1892
  title: PIT（Point-In-Time）财务数据收集器依赖外部股票列表接口，全量 A 股获取不完整
  description: 'Qlib 的 PIT 数据收集器（财务数据时间点快照）在初始化时调用 get_hs_stock_symbols() 获取沪深股票列表。该函数依赖东财 API，经常仅返回 部分列表而非全量 5000+ 股票，且函数在获取不完整时直接
    raise ValueError。 用户若按文档步骤操作，财务数据集将只覆盖部分股票，基于 PIT 财务因子的回测 存在严重生存者偏差（未被采集的股票被隐式排除）。

    '
  project_source: qlib
  issue_link: https://github.com/microsoft/qlib/issues/1892
  applicable_to_tags:
    markets:
    - cn_a_share
    activities:
    - data_pipeline
    - factor_research
  severity: high
- id: AP-QLIB-2097
  title: 全市场 instrument="all" 在 32GB 内存机器上 OOM，但 CSI300 正常
  description: 'Qlib 在加载 Alpha158 特征时会将指定 universe 的全部特征矩阵一次性载入内存。 使用 instrument="csi300"（300 股）与 instrument="all"（5000+ 股）的内存占用
    差约 16 倍。32GB 机器跑全市场时在 init_instance_by_config 阶段直接 OOM， 错误信息不提示内存问题。用户容易误以为是配置错误，实际上需要分批加载或 使用流式特征计算。

    '
  project_source: qlib
  issue_link: https://github.com/microsoft/qlib/issues/2097
  applicable_to_tags:
    markets:
    - cn_a_share
    - global
    activities:
    - factor_research
    - model_training
  severity: medium
- id: AP-QLIB-1974
  title: data_collector 即使指定 --region US 仍调用东财 A 股接口获取股票列表
  description: 'Qlib Yahoo 数据收集器在 download_data 时无论 --region 参数为何，均调用 东财 API（_get_eastmoney）获取完整股票列表作为基底，再用 Yahoo Finance
    补充数据。在国际网络环境下东财接口不可达，导致即便指定 US 区域也必须科学 上网。这一隐式依赖从未在文档中说明，是 A 股数据基础设施默认全局的典型 设计陷阱。

    '
  project_source: qlib
  issue_link: https://github.com/microsoft/qlib/issues/1974
  applicable_to_tags:
    markets:
    - cn_a_share
    - global
    activities:
    - data_pipeline
  severity: medium
- id: AP-QLIB-1984
  title: LightGBM 模型标签维度校验逻辑永远不触发导致多标签训练静默失败
  description: 'Qlib gbdt.py 中用 y.values.ndim == 2 判断是否为多标签，但从 DataFrame 取出的 Series 的 ndim 永远为 1，条件永远为 False，因此多标签训练不会走 squeeze
    分支，而是直接进入 LightGBM 训练并在更深处抛出语义不明的错误。 用户尝试自定义多标签任务时无法从错误信息定位到此根因。

    '
  project_source: qlib
  issue_link: https://github.com/microsoft/qlib/issues/1984
  applicable_to_tags:
    markets:
    - cn_a_share
    - global
    activities:
    - model_training
    - factor_research
  severity: medium
- id: AP-QLIB-1915
  title: 自定义 CSV 数据 dump_bin 后 DataHandler 报 Length mismatch，D.features 却正常
  description: 'Qlib 存在两套数据访问路径：D.features（直接读 binary）和 DataHandler/DataHandlerLP （带 processor pipeline）。自定义 A 股 CSV 数据在 dump_bin
    时若字段顺序 或 symbol 格式（如 600000.SH vs SH600000）与 Qlib 约定不符，DataHandler 的 processor 在 align/reindex 时触发 Length mismatch，而 D.features
    因不 经过 processor 而成功。这一"两套路径行为不一致"让用户误以为数据已正确导入。

    '
  project_source: qlib
  issue_link: https://github.com/microsoft/qlib/issues/1915
  applicable_to_tags:
    markets:
    - cn_a_share
    activities:
    - data_pipeline
    - factor_research
  severity: high
- id: AP-QLIB-1949
  title: Colab/Linux 多进程后端与 Qlib ParallelExt 冲突导致 DataHandler 完全不可用
  description: 'Qlib 在非 fork 环境（Windows 或 Google Colab）中，DataHandler 使用 joblib 并行加载特征时，ParallelExt 初始化时访问 _backend_args 属性失败（AttributeError）。
    根因是 joblib 1.5+ 移除了该内部属性，Qlib 的兼容层未更新。表现为 D.features 调用抛出多层嵌套异常，用户无法从错误栈判断是并行后端问题还是数据问题。

    '
  project_source: qlib
  issue_link: https://github.com/microsoft/qlib/issues/1949
  applicable_to_tags:
    markets:
    - cn_a_share
    - global
    activities:
    - factor_research
    - model_training
  severity: medium
- id: AP-VNPY-3691
  title: K 线生成器首根 K 线时间戳不对齐，导致第一个周期信号错误
  description: 'vnpy BarGenerator 在合成 N 分钟 K 线时，第一根推送的 K 线时间戳为"当前 tick 所在分钟"而非"完整 N 分钟周期结束时间"。具体表现：09:59 的 tick 会 触发一根不完整的
    5 分钟 K 线推送（本应等到 10:04 才推送）。策略若在 on_bar 中直接用 datetime.minute % 5 过滤，第一根 K 线恰好通过，但包含的 数据不足一个完整周期，用于信号计算会产生错误的开仓信号。

    '
  project_source: vnpy
  issue_link: https://github.com/vnpy/vnpy/issues/3691
  applicable_to_tags:
    markets:
    - cn_a_share
    - cn_futures
    activities:
    - backtesting
    - live_trading
  severity: high
- id: AP-VNPY-3705
  title: CTP 委托价格超限被系统自动撤单，vnpy 无日志输出形同"无声失败"
  description: 'A 股/期货涨跌停价格限制下，超限委托在 CTP 端会被直接撤单（OnRtnOrder statusMsg="50:已撤单被拒绝SHFE:价格跌破跌停板"），而非触发 OnRspOrderInsert 拒单回调。vnpy
    的 CTP Gateway 仅在 onRspOrderInsert 时输出拒单日志，对 OnRtnOrder 的撤单原因不做解析区分。策略开发者若依赖日志监控委托失败， 超限委托将完全静默消失，导致实盘仓位与预期严重偏离。

    '
  project_source: vnpy
  issue_link: https://github.com/vnpy/vnpy/issues/3705
  applicable_to_tags:
    markets:
    - cn_a_share
    - cn_futures
    activities:
    - live_trading
  severity: high
- id: AP-VNPY-3669
  title: Alpha 模块历史数据增量保存时新旧 DataFrame schema 不兼容导致 SchemaError
  description: 'vnpy Alpha 模块在保存 K 线数据到 Parquet 文件时，将新下载数据（可能含 Float64 列）与已存文件（历史 Int64 列）直接 polars.concat。polars 强类型 不允许隐式类型提升，抛出
    SchemaError。根因是不同数据源/版本返回的字段类型 不一致（如 volume 在部分行情源为整数，在另一些为浮点），且 concat 前无 schema 对齐步骤。影响所有使用 vnpy alpha 进行回测的历史数据构建流程。

    '
  project_source: vnpy
  issue_link: https://github.com/vnpy/vnpy/issues/3669
  applicable_to_tags:
    markets:
    - cn_a_share
    - cn_futures
    activities:
    - data_pipeline
    - backtesting
  severity: medium
- id: AP-VNPY-3707
  title: CTP Gateway 登出时 C++ 空指针崩溃，重连/切换账号导致进程终止
  description: 'vnpy_ctp 在调用 close() 登出时，C++ 端 MdApi/TdApi 未检查空指针，有较大概率 触发段错误导致整个 Python 进程崩溃。影响场景：策略测试时频繁登录/登出、切换 模拟与实盘账号、服务器关机重连等。崩溃不产生
    Python 异常，无法被 try/except 捕获，是实盘场景中最危险的稳定性陷阱之一。

    '
  project_source: vnpy
  issue_link: https://github.com/vnpy/vnpy/issues/3707
  applicable_to_tags:
    markets:
    - cn_a_share
    - cn_futures
    activities:
    - live_trading
  severity: high
- id: AP-VNPY-3685
  title: 价差交易模块 run_backtesting() 在 Jupyter 环境下静默报错，结果不可信
  description: 'vnpy 4.10 价差交易（SpreadTrading）模块的 run_backtesting() 在 Jupyter 环境下存在事件循环冲突（asyncio already running），导致回测引擎部分逻辑
    不执行但不抛异常，返回看似正常的回测统计数据。同样代码在命令行 Python 中无此问题。vnpy 4.x 将部分 IO 改为 async 但 Jupyter 的事件循环与之不兼容， 是"回测结果看起来正确但实际不完整"的隐蔽陷阱。

    '
  project_source: vnpy
  issue_link: https://github.com/vnpy/vnpy/issues/3685
  applicable_to_tags:
