resources:
  packages:
  - name: requests==2.32.0
    version_pin: latest
  - name: SQLAlchemy==2.0.36
    version_pin: latest
  - name: pandas==2.2.3
    version_pin: latest
  - name: numpy==2.1.3
    version_pin: latest
  - name: pydantic==2.6.4
    version_pin: latest
  - name: arrow==1.3.0
    version_pin: latest
  - name: plotly==5.13.0
    version_pin: latest
  - name: dash==2.18.2
    version_pin: latest
  - name: dash-bootstrap-components==1.3.1
    version_pin: latest
  - name: dash_daq==0.5.0
    version_pin: latest
  - name: exchange-calendars
    version_pin: latest
    source_scope: domain
  - name: scikit-learn
    version_pin: '>1.4.2'
    source_scope: domain
  - name: empyrical-reloaded
    version_pin: latest
    source_scope: domain
  - name: pyfolio-reloaded
    version_pin: '>=0.9'
    source_scope: domain
  - name: beautifulsoup4
    version_pin: ==4.8.2
    source_scope: domain
  - name: lightgbm
    version_pin: latest
    source_scope: domain
  - name: scipy
    version_pin: '>=1.3.0'
    source_scope: domain
  - name: statsmodels
    version_pin: '>=0.14.0'
    source_scope: domain
  - name: lxml
    version_pin: ==4.9.1
    source_scope: domain
  - name: numba
    version_pin: '>0.54'
    source_scope: domain
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install requests==2.32.0
    - python3 -m pip install SQLAlchemy==2.0.36
    - python3 -m pip install pandas==2.2.3
    - python3 -m pip install zvt
    - python3 -m pip install exchange-calendars
    - python3 -m pip install 'scikit-learn>1.4.2'
    - python3 -m pip install empyrical-reloaded
    - python3 -m pip install 'pyfolio-reloaded>=0.9'
    - python3 -m pip install beautifulsoup4==4.8.2
    - python3 -m pip install lightgbm
    - python3 -m pip install 'scipy>=1.3.0'
    - python3 -m pip install 'statsmodels>=0.14.0'
    - python3 -m pip install lxml==4.9.1
    - python3 -m pip install 'numba>0.54'
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing a new Recorder subclass
    action: define the provider and data_schema class attributes
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Recorder will fail initialization with assertion error if provider or data_schema is None, preventing any
      data recording operations
    stage_ids:
    - data_collection
  - id: finance-C-002
    when: When implementing EntityEventRecorder subclass
    action: define entity_provider and entity_schema class attributes
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: EntityEventRecorder will fail initialization with assertion error if entity_provider or entity_schema is
      not defined, breaking entity discovery and data recording
    stage_ids:
    - data_collection
  - id: finance-C-003
    when: When generating entity identifiers
    action: follow the {entity_type}_{exchange}_{code} format for entity_id
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Entity ID decoding functions (decode_entity_id, get_entity_type, get_entity_exchange, get_entity_code) will
      return incorrect values, breaking downstream data filtering and entity matching across all ZVT components
    stage_ids:
    - data_collection
  - id: finance-C-007
    when: When implementing record() for provider-specific data fetching
    action: implement the abstract record() method to fetch data from the external API
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Calling run() will raise NotImplementedError, preventing any data collection from the target provider
    stage_ids:
    - data_collection
  - id: finance-C-031
    when: When storing DataFrames with MultiIndex to SQLite
    action: convert MultiIndex to flat columns (entity_id, timestamp) before passing to df_to_db
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: SQLite to_sql() is called with index=False, so MultiIndex data is silently dropped if not converted to columns
      first, causing data loss and inconsistent records
    stage_ids:
    - data_storage
  - id: finance-C-032
    when: When constructing storage_id for SQLite path resolution
    action: verify storage_id follows '{provider}_{db_name}' format with exactly one underscore separator
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid storage_id causes ValueError during database engine creation, breaking all data storage and retrieval
      operations
    stage_ids:
    - data_storage
  - id: finance-C-033
    when: When implementing data_schema for domain entities
    action: include 'id', 'entity_id', and 'timestamp' columns as defined in Mixin base class
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required Mixin columns causes query failures, duplicate detection errors, and incorrect entity identification
      during storage and retrieval
    stage_ids:
    - data_storage
  - id: finance-C-037
    when: When using session factories from SqliteStorageBackend
    action: configure sessionmaker with engine bind before creating session instances
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Sessions created without engine bind fail to execute queries, causing all database operations to fail
    stage_ids:
    - data_storage
  - id: finance-C-039
    when: When registering schemas with the framework
    action: use register_schema decorator to establish db_name mapping for storage routing
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Unregistered schemas cannot be resolved to storage_id, causing ValueError 'Cannot resolve db_name for schema'
      during data operations
    stage_ids:
    - data_storage
  - id: finance-C-049
    when: When implementing compute_result in a Factor subclass
    action: produce filter_result column with True for BUY, False for SELL, or NaN for NO ACTION
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Trading signals will be misinterpreted, causing incorrect target selection and potentially buying stocks
      marked as sells or vice versa
    stage_ids:
    - factor_computation
  - id: finance-C-051
    when: When creating Factor output DataFrames
    action: use entity_id+timestamp MultiIndex matching (entity_id, timestamp) format
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Data processing pipelines will fail or produce incorrect results when groupby(level=0) operations are applied
      to non-MultiIndex DataFrames
    stage_ids:
    - factor_computation
  - id: finance-C-067
    when: When presenting Factor computation results to end users
    action: guarantee that factor outputs will produce specific trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Factor signals are indicators based on historical price patterns, not predictions of future performance.
      Guaranteeing returns violates financial regulations and misleads users
    stage_ids:
    - factor_computation
  - id: finance-C-068
    when: When evaluating Factor performance on historical backtests
    action: claim that backtest returns will equal expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Backtest assumes perfect execution at known prices without slippage, fees, or market impact. Live trading
      incurs delays, spreads, and liquidity constraints causing returns to deviate significantly
    stage_ids:
    - factor_computation
  - id: finance-C-072
    when: When adding a factor to TargetSelector via add_factor()
    action: verify factor.level equals TargetSelector.level
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Factor produces data at wrong time granularity, causing timestamp alignment failures and incorrect target
      counts at specific timestamps
    stage_ids:
    - target_selection
  - id: finance-C-073
    when: When implementing a Factor class
    action: produce result_df containing either 'filter_result' or 'score_result' column
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TargetSelector.run() skips the factor silently, producing no targets - this is a silent failure that passes
      without error
    stage_ids:
    - target_selection
  - id: finance-C-090
    when: When creating TradingSignal instances
    action: Set exactly one of position_pct, order_money, or order_amount parameters
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TradingSignal validation at src/zvt/trader/__init__.py:68 will trigger assert False causing program crash
      if zero or multiple order specification fields are set
    stage_ids:
    - trading_execution
  - id: finance-C-091
    when: When implementing trading cycle order logic
    action: Execute sell orders before buy orders in each trading cycle
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Backtest results will be incorrect because capital allocation would double-count positions that should be
      liquidated before new positions are opened
    stage_ids:
    - trading_execution
  - id: finance-C-102
    when: When handling trading signals with missing order specification
    action: Trigger assert False to prevent silent signal processing failures
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Signals without order specification would be silently ignored or cause undefined behavior in position calculations
    stage_ids:
    - trading_execution
  - id: finance-C-104
    when: When implementing kline chart rendering with ChartType.kline
    action: 'Provide DataFrames containing required OHLC columns: open, close, high, low'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Plotly go.Candlestick will raise KeyError or produce empty charts when required OHLC columns are missing
      from the input DataFrame, making kline visualization completely fail
    stage_ids:
    - visualization
  - id: finance-C-105
    when: When preparing data for visualization via NormalData or Drawer
    action: Normalize DataFrames to MultiIndex format with (entity_id, timestamp) as index levels
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Visualization will fail silently or produce incorrect charts when entity_map_df contains improperly indexed
      data, causing factor overlays and annotations to be misaligned or missing
    stage_ids:
    - visualization
  - id: finance-C-111
    when: When claiming real-time visualization capabilities for trading
    action: Claim that Plotly/Dash UI is suitable for real-time market data and live trading interaction
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users relying on visualization for live trading decisions will experience delayed or stale data, leading
      to financial losses from outdated signals
    stage_ids:
    - visualization
  - id: finance-C-112
    when: When using Plotly-based visualization for backtest result presentation
    action: Present backtest equity curves as guaranteed live trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Investors may make poor allocation decisions based on inflated backtest returns that do not account for slippage,
      liquidity constraints, or market impact
    stage_ids:
    - visualization
  - id: finance-C-134
    when: When backtest results are presented using visualization
    action: Backtest equity curves MUST NOT be presented as guaranteed future returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as future guarantees violates financial regulations and misleads users about
      expected performance
  - id: finance-C-136
    when: When implementing custom data schemas that inherit from Mixin
    action: Include a 'timestamp' column of type DateTime representing the event happen time — this column is automatically
      indexed in composite indexes (timestamp, entity_id) and (timestamp, code) by the register machinery
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Custom schemas that omit or rename the timestamp column break all Factor operations, query_data filters,
      and the composite index strategy in register.py:50-64, causing silent data retrieval failures across the entire system
  - id: finance-C-137
    when: When encoding entity identifiers for any tradable entity
    action: Format entity_id as {entity_type}_{exchange}_{code} (e.g., stock_sh_600000, stockus_nasdaq_AAPL) — code may itself
      contain underscores since split() takes index [0] as entity_type, index [1] as exchange, and joins each remaining parts
      as code
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrectly formatted entity_id causes decode_entity_id() to return wrong (entity_type, exchange, code) tuples,
      corrupting all downstream entity lookups, trading signals, and factor operations that rely on decode_entity_id
  - id: finance-C-140
    when: When implementing or interpreting Factor result_df filter_result values
    action: 'Apply this semantics to filter_result column: True = BUY signal, False = SELL signal, None/NaN = NO ACTION —
      these values are consumed by TargetSelector and drawer_annotation_df for trade annotations'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Misinterpreting filter_result polarity causes all trading decisions to be inverted — BUY signals trigger
      sells and SELL signals trigger buys, producing the opposite of intended portfolio behavior
  - id: finance-C-146
    when: When using the TRADITIONAL Trader class or its subclasses for live trading execution
    action: Claim or imply that the Trader class supports real-time trading execution with broker integration — the traditional
      Trader only supports backtesting via simulated account; live trading requires the separate zvt_server REST API combined
      with a broker integration (e.g., QMT) that is not included in this codebase
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users execute strategies expecting live broker execution, but the Trader class only runs simulated backtests
      with no actual order routing, causing real financial exposure without any position management or risk controls
  - id: finance-C-9076
    when: When simulating entry signals in backtesting
    action: Process entry signals at current candle open price, not future candles
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Entry signals using future price data create look-ahead bias, causing backtest results to be unrealistically
      profitable
    stage_ids:
    - trading_execution
    source_scope: domain
    domain_constraint_id: finance-C-9076
    local_import_status: accepted
    _domain_provenance:
      original_id: finance-C-076
      original_hash: d3ab164bc2e2c9f2
      source_blueprint: unknown
      rank_when_imported: 1
  - id: finance-C-9247
    when: When implementing order direction logic in backtesting
    action: Use positive order amounts for buy (long) positions and negative amounts for sell (short) positions — maintain
      consistent sign convention throughout order processing and position calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inverting the order sign convention causes buy orders to be interpreted as sells and vice versa, resulting
      in completely opposite trading behavior with catastrophic losses in backtest and live trading
    source_scope: domain
    domain_constraint_id: finance-C-9247
    local_import_status: accepted
    _domain_provenance:
      original_id: finance-C-247
      original_hash: 55b1a4f662638e5a
      source_blueprint: unknown
      rank_when_imported: 3
  - id: finance-C-9017
    when: When implementing indicator-based signal generation
    action: introduce inherent 1-period lag through rolling window or shift operations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Signals generated without lag will exhibit look-ahead bias, causing live trading returns to fall far below
      backtested results because the strategy would have traded on information not yet available
    stage_ids:
    - factor_computation
    source_scope: domain
    domain_constraint_id: finance-C-9017
    local_import_status: accepted
    _domain_provenance:
      original_id: finance-C-017
      original_hash: bbe6f5d594e692a5
      source_blueprint: unknown
      rank_when_imported: 4
  - id: finance-C-9075
    when: When preparing historical data for backtesting
    action: Verify startup candle count equals or exceeds longest indicator lookback period
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Insufficient startup candles cause indicators to reference future data, introducing look-ahead bias that
      inflates backtest performance
    stage_ids:
    - trading_execution
    source_scope: domain
    domain_constraint_id: finance-C-9075
    local_import_status: accepted
    _domain_provenance:
      original_id: finance-C-075
      original_hash: 2a17d594bd73aac0
      source_blueprint: unknown
      rank_when_imported: 5
  - id: finance-C-9053
    when: When validating position state during order execution
    action: validate position is finite during each order processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Infinite or NaN positions cause arithmetic failures in size calculations and corrupt trade PnL records
    stage_ids:
    - portfolio_simulation
    source_scope: domain
    domain_constraint_id: finance-C-9053
    local_import_status: accepted
    _domain_provenance:
      original_id: finance-C-053
      original_hash: '8538179944618525'
      source_blueprint: unknown
      rank_when_imported: 9
  - id: finance-C-9057
    when: When processing order records to build trade records
    action: validate order size is greater than zero before creating trade records
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero or negative order sizes in trade generation produce invalid trade records with corrupted size fields
      and incorrect PnL calculations
    stage_ids:
    - portfolio_simulation
    source_scope: domain
    domain_constraint_id: finance-C-9057
    local_import_status: accepted
    _domain_provenance:
      original_id: finance-C-057
      original_hash: f47515deae570c1c
      source_blueprint: unknown
      rank_when_imported: 10
  - id: finance-C-9130
    when: When implementing data ingestion to data filtering data flow
    action: Maintain chronological order with no temporal gaps in OHLCV bar timestamps
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backtest equity curve exhibits look-ahead bias when non-chronological data causes indicator values to reference
      future prices, leading to live trading returns that fall far below backtested results
    source_scope: domain
    domain_constraint_id: finance-C-9130
    local_import_status: accepted
    _domain_provenance:
      original_id: finance-C-130
      original_hash: 759cbe8e2e60b4e0
      source_blueprint: unknown
      rank_when_imported: 11
  regular:
  - id: finance-C-004
    when: When implementing TimeSeriesDataRecorder.record()
    action: return a list of domain objects or raw data dictionaries for the given entity and time range
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The recorder run loop expects non-empty list to persist; returning None or empty list prematurely marks entity
      as finished, resulting in missing historical data
    stage_ids:
    - data_collection
  - id: finance-C-005
    when: When implementing generate_domain() method
    action: populate the domain item with transformed fields using get_data_map() and verify correct entity_id assignment
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Domain objects will have missing or incorrect field values, causing data integrity issues in downstream analysis
      and factor computation stages
    stage_ids:
    - data_collection
  - id: finance-C-006
    when: When implementing generate_domain_id() method
    action: include the entity.id prefix combined with timestamp for unique identification
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate domain IDs will cause data overwrite or constraint violations in SQLite, resulting in lost historical
      records
    stage_ids:
    - data_collection
  - id: finance-C-008
    when: When implementing TimeSeriesDataRecorder subclass
    action: implement get_data_map() to transform API response fields to domain schema fields
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: API response fields will not be mapped to domain schema, resulting in empty or null values for all data fields
      in persisted records
    stage_ids:
    - data_collection
  - id: finance-C-009
    when: When configuring SQLite storage for data persistence
    action: use check_same_thread=False in SQLite connection string for multi-threaded recorder access
    severity: high
    kind: resource_boundary
    modality: must
    consequence: SQLite will throw 'SQLite objects created in a thread can only be used in that same thread' errors when recorders
      run concurrently, blocking data persistence
    stage_ids:
    - data_collection
  - id: finance-C-010
    when: When fetching data from external providers
    action: record data with timestamp greater than or equal to current time
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Recording future timestamps introduces look-ahead bias, causing backtest results to be artificially inflated
      and unrepresentative of actual trading performance
    stage_ids:
    - data_collection
  - id: finance-C-011
    when: When implementing incremental data updates
    action: query get_latest_saved_record() to determine the starting timestamp for new data fetches
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Recorder will re-fetch all historical data on every run, causing excessive API calls, bandwidth waste, and
      potential rate limiting by external providers
    stage_ids:
    - data_collection
  - id: finance-C-012
    when: When configuring entity filters for recording scope
    action: filter out delisted entities using entity.end_date comparison to current time
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Recording data for delisted entities wastes storage and API quota, and may cause downstream analysis to include
      irrelevant or invalid securities
    stage_ids:
    - data_collection
  - id: finance-C-013
    when: When running recorder in continuous mode
    action: use specified sleeping_time intervals to avoid overwhelming external APIs
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Excessive API call frequency may trigger rate limiting or IP blocking by external providers, causing data
      collection to fail entirely
    stage_ids:
    - data_collection
  - id: finance-C-014
    when: When storing recorded data in SQLite
    action: commit session after batch insert operations to verify data durability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Uncommitted transactions may be lost on program crash or interruption, resulting in gaps in historical data
      requiring costly re-fetching
    stage_ids:
    - data_collection
  - id: finance-C-015
    when: When implementing get_original_time_field()
    action: return the correct timestamp field name from the raw API response data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Domain IDs will be generated with incorrect timestamps, causing duplicate detection to fail and creating
      duplicate records for the same timestamp
    stage_ids:
    - data_collection
  - id: finance-C-016
    when: When implementing get_evaluated_time_field()
    action: return the timestamp field used for evaluating time range of the recorder
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incremental update logic will compare wrong timestamps, causing either duplicate data fetching or missed
      records
    stage_ids:
    - data_collection
  - id: finance-C-017
    when: When handling duplicate domain IDs in recording
    action: handle duplicate detection using fix_duplicate_way parameter ('add' or 'ignore')
    severity: high
    kind: domain_rule
    modality: must
    consequence: SQLite primary key constraint violations will abort transactions, leaving partial data unpersisted and breaking
      the recording pipeline
    stage_ids:
    - data_collection
  - id: finance-C-018
    when: When using external data providers
    action: claim real-time data capability when using polling-based API access
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will have incorrect expectations about data freshness; polling-based access has inherent delays (typically
      minutes to hours depending on provider) and cannot provide true real-time updates
    stage_ids:
    - data_collection
  - id: finance-C-019
    when: When relying on external data provider APIs
    action: guarantee data completeness or availability across each market conditions
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: External APIs may experience outages, change endpoints, implement rate limits, or modify data schemas without
      notice, causing data collection failures
    stage_ids:
    - data_collection
  - id: finance-C-020
    when: When upgrading ZVT to new versions
    action: assume backward compatibility with existing database schemas or recorded data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Schema migrations may fail or produce incorrect data; existing recorded data may become incompatible with
      new domain schemas, requiring complete re-recording
    stage_ids:
    - data_collection
  - id: finance-C-021
    when: When recording entity list for initial data collection
    action: verify entity_provider is correctly set to discover available entities
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Recorder will query from wrong provider database, returning empty entity list and preventing any data recording
    stage_ids:
    - data_collection
  - id: finance-C-022
    when: When implementing EastmoneyTimestampsDataRecorder
    action: define timestamps_fetching_url and timestamp_path_fields for timestamp enumeration
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Recorder will fail to enumerate timestamps for time-based data fetching, preventing any data collection
    stage_ids:
    - data_collection
  - id: finance-C-023
    when: When implementing EastmoneyPageableDataRecorder
    action: define page_url for paginated data fetching with TotalCount in response
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Recorder cannot determine remote data count, breaking incremental update logic that compares local vs remote
      record counts
    stage_ids:
    - data_collection
  - id: finance-C-024
    when: When calling external API endpoints
    action: handle HTTP errors and JSON parsing exceptions appropriately
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unhandled exceptions will crash the recording process, leaving entities unprocessed and creating data gaps
      in the database
    stage_ids:
    - data_collection
  - id: finance-C-025
    when: When initializing Recorder instances
    action: register the recorder class with its data_schema and provider
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Data schemas will not know which recorder provides their data, breaking the record_data() class method and
      preventing programmatic data recording
    stage_ids:
    - data_collection
  - id: finance-C-026
    when: When configuring database path for SQLite storage
    action: follow the {data_path}/{provider}/{provider}_{db_name}.db pattern for consistent data organization
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Custom path formats may cause data to be stored in unexpected locations, making it difficult to locate recorded
      data and potentially causing duplicate storage
    stage_ids:
    - data_collection
  - id: finance-C-027
    when: When using force_update parameter
    action: set force_update=True as default for production continuous recording
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Forcing updates on every run causes unnecessary API calls and database writes, wasting resources and potentially
      triggering rate limits
    stage_ids:
    - data_collection
  - id: finance-C-028
    when: When implementing FixedCycleDataRecorder for kdata recording
    action: set specified IntervalLevel and AdjustType parameters
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Wrong interval level will cause data to be fetched at incorrect granularity (e.g., tick data when daily is
      needed), breaking downstream analysis
    stage_ids:
    - data_collection
  - id: finance-C-029
    when: When processing day_data flag in EntityEventRecorder
    action: skip entities that already have data for the specified end_timestamp when day_data=True
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Recorder will redundantly query for entities that already have today's data, wasting API calls and processing
      time
    stage_ids:
    - data_collection
  - id: finance-C-030
    when: When implementing FixedCycleDataRecorder for trading hours data
    action: implement real-time recording termination logic based on close_hour and close_minute
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Recorder will continue polling indefinitely after market close, wasting resources and potentially fetching
      incomplete or invalid candle data
    stage_ids:
    - data_collection
  - id: finance-C-034
    when: When using SQLite for multi-threaded data access
    action: use check_same_thread=False in SQLite connection URL to prevent thread-related deadlocks
    severity: high
    kind: resource_boundary
    modality: must
    consequence: SQLite default thread enforcement causes connection errors and potential deadlocks when multiple threads
      (recorders, readers) access the same database simultaneously
    stage_ids:
    - data_storage
  - id: finance-C-035
    when: When configuring database storage path
    action: follow the default path template {data_path}/{provider}/{provider}_{db_name}.db
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incorrect path structure causes data to be stored in unexpected locations, making retrieval fail or overwrite
      data from other providers
    stage_ids:
    - data_storage
  - id: finance-C-036
    when: When processing large DataFrames with df_to_db
    action: batch DataFrames in sub_size increments (default 8000, Windows 900) to avoid memory exhaustion
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Processing entire DataFrame at once causes excessive memory usage and potential out-of-memory errors on large
      datasets
    stage_ids:
    - data_storage
  - id: finance-C-038
    when: When persisting domain data to database
    action: commit session after to_sql operations to verify data is written to disk
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Uncommitted sessions cause data loss on application crash or unexpected termination, with data appearing
      saved but not persisted to disk
    stage_ids:
    - data_storage
  - id: finance-C-040
    when: When implementing StorageBackend for new storage types
    action: implement both get_engine and get_session_factory abstract methods
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing abstract method implementation causes NotImplementedError when framework attempts to access storage
    stage_ids:
    - data_storage
  - id: finance-C-041
    when: When handling duplicate records during df_to_db storage
    action: enable drop_duplicates=True to prevent duplicate primary key violations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Duplicate records with same 'id' cause SQLite IntegrityError on insert or silent overwrites corrupting data
      consistency
    stage_ids:
    - data_storage
  - id: finance-C-042
    when: When selecting journal mode for SQLite databases
    action: use WAL mode for high-write tables (zvt_info, stock_news, stock_tags, stock_quote) for better concurrency
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default DELETE journal mode causes write contention and potential database locks during concurrent recorder
      operations
    stage_ids:
    - data_storage
  - id: finance-C-043
    when: When storing data from multiple providers for the same entity type
    action: use separate database files per provider to avoid schema conflicts
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Storing multiple providers in same database causes table name collisions and data from different providers
      overwriting each other
    stage_ids:
    - data_storage
  - id: finance-C-044
    when: When creating composite indexes for query optimization
    action: create indexes on (timestamp, entity_id) and (timestamp, code) pairs for efficient time-series queries
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Missing composite indexes causes slow queries when filtering by entity_id/time ranges, degrading overall
      system performance
    stage_ids:
    - data_storage
  - id: finance-C-045
    when: When retrieving stored MultiIndex DataFrames
    action: use index_df() with index=['entity_id', 'timestamp'] to reconstruct MultiIndex from columns
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Query results without proper index reconstruction appear flat instead of hierarchical, breaking downstream
      factor computations that expect MultiIndex
    stage_ids:
    - data_storage
  - id: finance-C-046
    when: When claiming data storage capabilities
    action: claim real-time data availability from external providers that have inherent delays
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: External data providers (em, jq, sina) have documented delays, but stored data is only as fresh as the source;
      claiming real-time implies guarantees that do not exist
    stage_ids:
    - data_storage
  - id: finance-C-047
    when: When designing schema for internal business data
    action: set _zvt_internal=True to exclude schema from external provider routing
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Internal schemas (factor state, trader state) incorrectly routed through provider switching logic cause unexpected
      storage paths and data loss
    stage_ids:
    - data_storage
  - id: finance-C-048
    when: When ensuring stored data can be retrieved byte-for-byte
    action: verify DataFrame column order matches schema column order before df_to_db
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Column reordering after retrieval indicates data transformation during storage/retrieval cycle, compromising
      data integrity verification
    stage_ids:
    - data_storage
  - id: finance-C-050
    when: When implementing Factor subclasses that produce scores
    action: produce score_result column for normalized scoring output
    severity: high
    kind: domain_rule
    modality: must
    consequence: TargetSelector will not recognize the scoring output, causing all scored targets to be ignored in the selection
      process
    stage_ids:
    - factor_computation
  - id: finance-C-052
    when: When implementing Accumulator subclasses with rolling windows
    action: initialize acc_window parameter to at least the maximum rolling window size
    severity: high
    kind: domain_rule
    modality: must
    consequence: Rolling window calculations will produce NaN values for the first max(window) periods, causing incomplete
      factor values and incorrect trading signals
    stage_ids:
    - factor_computation
  - id: finance-C-053
    when: When implementing stateful Accumulators
    action: encode and decode state using JSON with custom object_hook and encoder methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accumulated state will be corrupted during persistence, causing factor computation to restart from scratch
      and lose continuity across compute cycles
    stage_ids:
    - factor_computation
  - id: finance-C-054
    when: When using Transformer.transform or Accumulator.acc
    action: implement either batch method (transform/acc) OR single-entity method (transform_one/acc_one), not both
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Single-entity method will be ignored when batch method is implemented, causing data processing to use inefficient
      iteration instead of vectorized operations
    stage_ids:
    - factor_computation
  - id: finance-C-055
    when: When calling Factor.get_targets method
    action: pass both timestamp and start_timestamp/end_timestamp parameters simultaneously
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Method will raise ValueError and fail to return any trading targets
    stage_ids:
    - factor_computation
  - id: finance-C-056
    when: When using computing_window/keep_window parameter
    action: set keep_window >= acc_window to verify accumulator has sufficient history for rolling computations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Rolling window calculations will use truncated data causing incorrect moving averages and indicator values
      in factor output
    stage_ids:
    - factor_computation
  - id: finance-C-057
    when: When using fill_method='ffill' for gap filling
    action: only apply forward-fill when data continuity assumption is valid (e.g., trading days for price data)
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Non-trading periods (weekends, holidays) will be incorrectly filled with stale prices, causing look-ahead
      contamination in factor calculations
    stage_ids:
    - factor_computation
  - id: finance-C-058
    when: When implementing factors with keep_all_timestamp=True
    action: use on large time ranges without considering performance impact of date_range generation
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: fill_gap creates full date_range between start and end timestamps, causing memory exhaustion for long periods
      (e.g., 10 years of 1-minute data)
    stage_ids:
    - factor_computation
  - id: finance-C-059
    when: When implementing stateful Accumulator logic
    action: filter new input data to only include rows after the last accumulated timestamp to avoid duplicate computation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Factor values will be duplicated or incorrectly recomputed, causing inconsistent results across multiple
      compute() calls
    stage_ids:
    - factor_computation
  - id: finance-C-060
    when: When implementing Factor subclasses that inherit from both DataReader and EntityStateService
    action: properly initialize EntityStateService with entity_ids list before compute operations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: State persistence will fail because entity_ids will be None, preventing factor state from being saved or
      loaded across compute cycles
    stage_ids:
    - factor_computation
  - id: finance-C-061
    when: When implementing Accumulators with rolling state transitions
    action: use .shift() properly to avoid look-ahead bias in live/dead state transitions
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Current candle will be compared against its own value instead of previous value, causing incorrect signal
      generation and potential real-time trading losses
    stage_ids:
    - factor_computation
  - id: finance-C-062
    when: When using TargetSelector with Factor instances
    action: verify Factor.level matches TargetSelector.level to prevent data mismatch
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Factor will load data at wrong granularity, causing incorrect signals or empty results when targets are selected
    stage_ids:
    - factor_computation
  - id: finance-C-064
    when: When implementing custom Factor with need_persist=True
    action: define factor_schema class attribute with proper schema matching indicator columns
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Factor persistence will fail because no schema exists to store factor values, causing data loss and recomputation
      on each run
    stage_ids:
    - factor_computation
  - id: finance-C-066
    when: When using Factor for live trading signal generation
    action: claim that factor output equals real-time trading execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Factor computation processes historical data with known timestamps, not real-time streaming. Misrepresenting
      this will lead to incorrect trading expectations and potential financial losses
    stage_ids:
    - factor_computation
  - id: finance-C-069
    when: When Factor uses acc_window > 1 with existing persisted factor_df
    action: load window of acc_window rows from persisted factor_df before incremental computation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Accumulator will lose continuity with previously computed values, causing rolling calculations to restart
      and produce different factor values than initial computation
    stage_ids:
    - factor_computation
  - id: finance-C-070
    when: When implementing Factor for securities with sparse trading data
    action: call fill_gap before computing to verify continuous timestamps for rolling windows
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Rolling window calculations will produce NaN values on non-trading days, causing discontinuous factor series
      and incorrect cross-sectional rankings
    stage_ids:
    - factor_computation
  - id: finance-C-071
    when: When implementing Transformer that modifies column structure
    action: maintain entity_id in index and add indicator names to Transformer.indicators list for downstream processing
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Drawer and persistence will fail because indicator columns cannot be located, causing incomplete visualization
      and storage of factor results
    stage_ids:
    - factor_computation
  - id: finance-C-074
    when: When configuring long_threshold and short_threshold parameters
    action: verify long_threshold is greater than or equal to short_threshold
    severity: high
    kind: domain_rule
    modality: must
    consequence: Threshold logic produces no 'keep' positions when short_threshold >= long_threshold, violating the three-way
      position classification intent
    stage_ids:
    - target_selection
  - id: finance-C-075
    when: When using select_mode=condition_and with multiple factors
    action: return intersection of factor filter results
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Wrong select_mode produces union instead of intersection, causing too many long/short targets and portfolio
      dilution
    stage_ids:
    - target_selection
  - id: finance-C-076
    when: When using select_mode=condition_or with multiple factors
    action: return union of factor filter results
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Wrong select_mode produces intersection instead of union, causing too few targets and missed trading opportunities
    stage_ids:
    - target_selection
  - id: finance-C-077
    when: When combining multiple score-producing factors
    action: average the scores by dividing sum by factor count
    severity: high
    kind: domain_rule
    modality: must
    consequence: Score values exceed [0,1] range when summed without averaging, causing threshold comparison to fail
    stage_ids:
    - target_selection
  - id: finance-C-078
    when: When calling get_targets() with timestamp
    action: return entity_ids filtered at that specific timestamp only
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using timestamp not in the DataFrame index returns empty list, causing missed trading signals
    stage_ids:
    - target_selection
  - id: finance-C-079
    when: When mixing filter_result and score_result factors in same selector
    action: apply filter_result first, then score_result on filtered entities
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Score filtering without prior filter application scores all entities, producing wrong target counts
    stage_ids:
    - target_selection
  - id: finance-C-080
    when: When implementing TargetSelector subclass
    action: call superclass run() method before custom logic
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Filter and score combination logic in run() is skipped, causing self.filter_result and self.score_result
      to remain None
    stage_ids:
    - target_selection
  - id: finance-C-081
    when: When configuring threshold parameters
    action: verify long_threshold is within [0, 1] range for normalized scores
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Normalized scores from average combination exceed threshold boundaries, causing all entities to be classified
      as long or short
    stage_ids:
    - target_selection
  - id: finance-C-082
    when: When customizing select_mode in TargetSelector
    action: change select_mode after initialization
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Modifying select_mode post-init is not enforced, but runtime changes cause unpredictable factor combination
      behavior
    stage_ids:
    - target_selection
  - id: finance-C-083
    when: When using TargetSelector for trading decisions
    action: present target selection results as guaranteed profitable trades
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Simulated backtest results do not guarantee live trading performance - market conditions, slippage, and execution
      delays differ
    stage_ids:
    - target_selection
  - id: finance-C-084
    when: When evaluating target selection performance
    action: equate backtest returns with expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest overfitting produces misleading equity curves that fail to predict future performance
    stage_ids:
    - target_selection
  - id: finance-C-085
    when: When selecting thresholds for new factors
    action: use default thresholds (0.8, 0.2) without validation
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Default thresholds are arbitrary and may not match factor score distribution, producing zero or all targets
    stage_ids:
    - target_selection
  - id: finance-C-086
    when: When adding factors to TargetSelector
    action: verify factors are computed and have valid result_df before calling run()
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Empty factor result_df causes Exception('no data for factor') in run() method
    stage_ids:
    - target_selection
  - id: finance-C-087
    when: When combining AND mode with OR mode logic
    action: mix filter_result and score_result without understanding precedence
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Confusing filter and score semantics produces unexpected target classification - NaN filter scores may be
      excluded from score computation
    stage_ids:
    - target_selection
  - id: finance-C-092
    when: When implementing position sizing defaults
    action: 'Apply tiered position sizing: 20% when no positions, 50% when <=10 positions, 100% otherwise'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Improper position sizing violates the Chinese market regulatory guidelines encoded in the defaults, leading
      to over-concentration and potential significant losses
    stage_ids:
    - trading_execution
  - id: finance-C-093
    when: When processing profit control triggers
    action: Execute profit-taking sells before selecting new buy targets
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Profit control signals would be ignored or overwritten by new buy signals, causing missed profit-taking opportunities
      and increased losses
    stage_ids:
    - trading_execution
  - id: finance-C-094
    when: When defining profit_threshold defaults
    action: Set default profit_threshold tuple to (+3%, -0.3%) for take-profit and stop-loss triggers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper profit control defaults, positions may run to excessive losses or miss optimal exit points,
      degrading strategy performance
    stage_ids:
    - trading_execution
  - id: finance-C-095
    when: When placing buy orders via the buy() method
    action: Ignore entities already in current position to prevent duplicate orders
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate buy orders for the same entity would cause position doubling and capital misallocation in the simulated
      account
    stage_ids:
    - trading_execution
  - id: finance-C-096
    when: When configuring trading execution costs
    action: Apply slippage (0.001), buy_cost (0.001), and sell_cost (0.001) to each order calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Simulated returns would be overstated by 0.3% per round-trip if costs are not properly deducted, creating
      false expectation of live trading performance
    stage_ids:
    - trading_execution
  - id: finance-C-097
    when: When using the trading system for live claims
    action: Present simulated backtest results as proof of real trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting backtest-only results as live trading proof violates platform usage guidelines and misleads
      stakeholders about actual strategy viability
    stage_ids:
    - trading_execution
  - id: finance-C-098
    when: When making performance claims based on backtest
    action: Claim that backtest returns guarantee equivalent live trading returns
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not account for slippage variations, liquidity constraints, and market impact that occur
      in live trading, leading to overstated expectations
    stage_ids:
    - trading_execution
  - id: finance-C-099
    when: When setting TradingSignal due_timestamp
    action: Calculate due_timestamp as happen_timestamp plus the interval level duration
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Signals would execute immediately without delay mechanism, eliminating the kdata-bar-aligned execution designed
      for real-time simulation
    stage_ids:
    - trading_execution
  - id: finance-C-100
    when: When implementing buy order quantity calculation
    action: Divide total position_pct by number of target entities to distribute capital evenly
    severity: high
    kind: domain_rule
    modality: must
    consequence: All buy targets would receive the full position percentage instead of equal distribution, causing over-investment
      beyond intended position sizing
    stage_ids:
    - trading_execution
  - id: finance-C-101
    when: When overriding position sizing strategies
    action: Override long_position_control() method for custom position sizing logic
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Custom position sizing logic would not be integrated into the trading system without proper method override,
      defeating the purpose of the replaceable point
    stage_ids:
    - trading_execution
  - id: finance-C-103
    when: When checking position profit rates for sell decisions
    action: Apply positive threshold (3%) for take-profit and negative threshold (-0.3%) for stop-loss
    severity: high
    kind: domain_rule
    modality: must
    consequence: Improper profit thresholds would fail to capture profits at optimal points or allow losses to exceed acceptable
      risk parameters
    stage_ids:
    - trading_execution
  - id: finance-C-106
    when: When using Drawable interface methods for custom visualization
    action: Implement drawer_rects to return List[Rect] with x0, y0, x1, y1 coordinates
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Trading signal annotations (entry/exit markers) will fail to render when Rect objects lack proper coordinate
      attributes, causing critical visual cues to be invisible
    stage_ids:
    - visualization
  - id: finance-C-107
    when: When implementing drawer_factor_df_list for factor overlay visualization
    action: Return factor DataFrames with aligned timestamps matching the main chart data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Factor overlay lines will be misaligned with kline chart, causing incorrect visual interpretation of technical
      indicators relative to price data
    stage_ids:
    - visualization
  - id: finance-C-108
    when: When creating annotation DataFrames for trading signals
    action: 'Structure annotation_df with MultiIndex of (entity_id, timestamp) and columns: value, flag, color'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Trading signal annotations (buy/sell markers) will fail to appear or appear at wrong positions, breaking
      the visual signal system
    stage_ids:
    - visualization
  - id: finance-C-109
    when: When building sub-chart visualizations below the main kline
    action: Verify sub-data uses numeric types compatible with bar/scatter chart rendering
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Sub-chart (volume bars) will fail to render or show incorrect coloring when non-numeric data is passed, breaking
      the standard candlestick+volume layout
    stage_ids:
    - visualization
  - id: finance-C-110
    when: When using StackedDrawer to combine multiple chart drawers
    action: Pass at least two Drawer instances to StackedDrawer constructor
    severity: high
    kind: domain_rule
    modality: must
    consequence: AssertionError at runtime when attempting to stack fewer than 2 drawers, preventing multi-chart composition
    stage_ids:
    - visualization
  - id: finance-C-114
    when: When rendering kline charts with Plotly go.Candlestick
    action: Verify timestamp index is properly formatted as datetime for x-axis display
    severity: high
    kind: domain_rule
    modality: must
    consequence: X-axis will show incorrect timestamps or fail to display, making temporal analysis of price data impossible
    stage_ids:
    - visualization
  - id: finance-C-115
    when: When using the Drawable.draw method with main_chart=ChartType.kline
    action: Pass DataFrames missing the timestamp field in the MultiIndex
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Annotation positioning will be incorrect since annotations rely on timestamp from index, causing buy/sell
      markers to appear at wrong time points
    stage_ids:
    - visualization
  - id: finance-C-116
    when: When implementing drawer_sub_col_chart for custom sub-chart types
    action: Return a dict mapping column names to ChartType values (line or bar)
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Sub-chart will default to bar rendering even when line chart is desired, causing incorrect visual representation
      of volume or secondary indicators
    stage_ids:
    - visualization
  - id: finance-C-117
    when: When implementing scale_value parameter for normalized chart rendering
    action: Verify the first non-zero value exists in each column before applying scaling
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Division by zero or skipped columns when all values in a column are zero, causing incomplete or incorrect
      scaled visualization
    stage_ids:
    - visualization
  - id: finance-C-118
    when: When data_collection stage writes DataFrames to database via df_to_db()
    action: DataFrame MUST contain 'id' column with unique identifier combining entity_id and timestamp
    severity: high
    kind: domain_rule
    modality: must
    consequence: Records without 'id' column are silently skipped, causing gaps in historical data and breaking downstream
      queries that depend on record identity
  - id: finance-C-119
    when: When data_collection stage passes DataFrames to df_to_db()
    action: DataFrame columns MUST intersect with target schema columns
    severity: high
    kind: domain_rule
    modality: must
    consequence: If no column intersection exists, df_to_db() prints 'wrong cols' and returns 0, causing data loss without
      raising an exception
  - id: finance-C-120
    when: When data_collection stage passes DataFrames to df_to_db()
    action: DataFrame MUST be non-empty (pd_is_not_null(df) returns True)
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Empty DataFrames are silently skipped, causing missing timestamps in historical data that downstream factor
      computation may not detect
  - id: finance-C-121
    when: When Factor instances are registered via TargetSelector.add_factor()
    action: Factor.level MUST match TargetSelector.level exactly
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched levels cause TargetSelector to fail filtering targets, resulting in incorrect trading signals
      or empty target lists
  - id: finance-C-122
    when: When TargetSelector computes trading targets
    action: Factor.result_df MUST contain either filter_result or score_result columns
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing result columns cause TargetSelector.run() to raise Exception, breaking the target selection pipeline
  - id: finance-C-123
    when: When TradingSignal is created from target_selection to trading_execution
    action: 'TradingSignal MUST have exactly one of: position_pct, order_money, or order_amount set'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If zero or multiple order parameters are set, TradingSignal.__init__ asserts False, causing trading execution
      to fail silently
  - id: finance-C-124
    when: When entity_id is generated from entity type, exchange, and code
    action: entity_id MUST follow format 'entity_type_exchange_code' (e.g., 'stock_sh_600000')
    severity: high
    kind: domain_rule
    modality: must
    consequence: Malformed entity_id causes decode_entity_id() to fail or produce incorrect entity_type/exchange/code, breaking
      data retrieval and visualization
  - id: finance-C-125
    when: When SimAccountService processes TradingSignal from trading_execution
    action: TradingSignal MUST have valid kdata (close price not None) at happen_timestamp
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If close price is missing, order is ignored with warning 'wrong kdata', leaving positions unmanaged and trading
      signals missed
  - id: finance-C-126
    when: When SimAccountService stores Order/Position/AccountStats records
    action: Position ID MUST combine trader_name, entity_id, and timestamp in format '{trader_name}_{entity_id}_{timestamp}'
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect position ID causes duplicate positions or missing position history, breaking account statistics
      and trade analysis
  - id: finance-C-127
    when: When Factor computes result and passes DataFrames to Drawable interface
    action: Factor.drawer_factor_df_list() MUST return List[pd.DataFrame] with indicator columns only
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Invalid factor DataFrame structure causes Drawer to fail rendering, breaking visualization of trading signals
      and factor indicators
  - id: finance-C-128
    when: When Factor instances are passed between factor_computation and target_selection
    action: Factor MUST implement Drawable interface with drawer_main_df() method returning kdata DataFrame
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing Drawable implementation breaks Trader.draw_result feature, preventing visualization of trading results
  - id: finance-C-129
    when: When data flows from data_storage to factor_computation via Factor.load_data()
    action: Factor MUST have data_schema matching the kdata schema (e.g., Stock1dKdata) expected by entity_schema
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Mismatched data_schema causes DataReader.load_data() to query wrong table, resulting in empty factor_df and
      failed target selection
  - id: finance-C-130
    when: When Factor computes and stores factor_df via accumulator state
    action: Accumulator acc_window parameter MUST be set correctly to preserve state across factor computations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect window causes state loss between computations, resulting in wrong factor values and incorrect trading
      signals
  - id: finance-C-131
    when: When Factor instances are passed to Trader.init_factors()
    action: Factor instances MUST use the same entity_ids/entity_schema parameters as the Trader
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Parameter mismatch causes Factor to compute on wrong entity set, producing trading signals for unintended
      stocks
  - id: finance-C-132
    when: When Factor computes result_df for TargetSelector
    action: Factor.result_df index MUST be a MultiIndex with (entity_id, timestamp) levels
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect index structure causes TargetSelector.get_targets() to fail timestamp lookups, resulting in empty
      target lists
  - id: finance-C-133
    when: When data flows from data_storage to factor_computation
    action: Kdata timestamps SHOULD align with trading calendar (no gaps for non-trading days)
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Data gaps cause Factor to compute with missing timestamps, resulting in incorrect indicator values and trading
      signals
  - id: finance-C-135
    when: When using yfinance or similar external data providers
    action: Kdata from polling-based providers MUST NOT be claimed as real-time data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Claiming polling-based data as real-time misleads users about data freshness and violates data provider terms
      of service
  - id: finance-C-138
    when: When defining OHLCV kdata schema subclasses
    action: Name the schema class using the convention {EntitySchema}{IntervalLevel}{AdjustType}Kdata (e.g., Stock1dKdata,
      Stock1dHfqKdata, Index1hQfqKdata) and register it with the matching entity_type and db_name
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-compliant naming breaks the {entity_schema}{level}{adjust_type}Kdata pattern expected by get_kdata_schema()
      lookups and all record_data/query_data operations for that schema
  - id: finance-C-139
    when: When using IntervalLevel comparisons for trading level ordering or threshold checks
    action: 'Treat IntervalLevel ordering as based on millisecond duration: 1m < 5m < 15m < 30m < 1h < 4h < 1d < 1wk < 1mon
      — comparisons use __ge__/__lt__ which call to_ms() on both operands'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using string-value comparison instead of the built-in ordering produces wrong level hierarchy — for example,
      '1h' string is less than '1d' by string comparison but correctly greater by ms-based ordering; this breaks level filtering
      and trading loop traversal
  - id: finance-C-141
    when: When building factor DataFrames for use with Factor or ScoreFactor
    action: Set MultiIndex levels as level[0]=entity_id, level[1]=timestamp — each factor operations (transform, accumulate,
      score, filter) expect this index structure; category_field and time_field parameters default to 'entity_id' and 'timestamp'
      respectively
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect MultiIndex ordering causes factor operations to fail with index alignment errors or produce wrong
      entity-timestamp groupings, silently corrupting trading signals
  - id: finance-C-142
    when: When using the TRADITIONAL backtesting Trader class (not the REST API server)
    action: Use AdjustType enum values exactly as qfq (前复权/pre-adjust), hfq (后复权/post-adjust), bfq (不复权/no adjustment) — never
      pass raw strings or adjust types outside this enum to trading or factor operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Passing non-enum adjust types causes AdjustType comparisons to fail silently, resulting in unadjusted prices
      being used when adjusted prices were intended, or vice versa, corrupting all factor calculations and trading signal
      generation
  - id: finance-C-143
    when: When setting up multi-level trading loops in the Trader class
    action: Traverse trading levels in ascending order (shortest interval first) as defined by IntervalLevel to_ms() values
      — signals from higher levels must be cached and promoted to the current cycle, not recalculated per level independently
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Processing levels out of order causes signals from higher-frequency levels to be unavailable at the lower-frequency
      execution cycle, breaking the multi-level signal aggregation architecture and producing incomplete or incorrect trading
      decisions
  - id: finance-C-144
    when: When running the Dash & Plotly UI (zvt command) for live or interactive trading decisions
    action: Claim that the Dash & Plotly UI supports real-time market data processing or user-interactive trading — this UI
      mode is explicitly for backtest and research only
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users rely on the UI to execute live trades based on factors and signals, but the Dash UI does not connect
      to any live data feed or broker API, resulting in simulated-only display with no actual order execution capability
  - id: finance-C-145
    when: When presenting or reporting the TRADITIONAL Trader backtested returns to users or stakeholders
    action: Claim that backtested returns equal expected live trading returns — backtesting ignores market impact, financing
      costs, execution delays, slippage model limitations, and broker fees that differ from the simulated default of 0.1%
      buy_cost + 0.1% sell_cost + 0.1% slippage
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns that exclude real-world execution
      costs and market friction, leading to severe underperformance when deployed live and potential financial loss
  - id: finance-C-147
    when: When targeting high-frequency trading strategies requiring sub-second execution
    action: Claim or imply that ZVT supports sub-second trading execution — the minimum IntervalLevel is LEVEL_TICK (5-second
      minimum per tick), and the polling-based real_time mode in Trader.run() uses sleep-based waiting that cannot achieve
      sub-second responsiveness
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users build high-frequency strategies expecting sub-second latency execution, but the system cannot process
      ticks faster than 5-second intervals, causing missed trading opportunities and stale signal execution at sub-second
      timescales
  - id: finance-C-148
    when: When applying this framework to markets outside China (A-shares via eastmoney/joinquant/jointquant)
    action: Claim or imply that ZVT supports live trading in non-Chinese markets — the framework is currently focused on China
      A-shares via eastmoney/jointquant/sina/em/joinquant providers; no international market data providers or broker integrations
      for US/HK/EU markets are implemented
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users attempt to deploy strategies on US or HK markets expecting the same data coverage and execution infrastructure,
      but no live data feeds or broker integrations exist for these markets, resulting in empty datasets and no order execution
      capability
  - id: finance-C-149
    when: When using free data providers (em/eastmoney, joinquant, sina) for production or live trading decisions
    action: Claim that free data providers are reliable or production-grade — these providers are explicitly described as
      unstable, potentially unavailable at any time, and requiring significant maintenance effort; they are suitable only
      for learning and research
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Production trading systems built on free data providers experience unexpected data gaps, API changes, or
      complete unavailability during critical trading periods, causing strategy failures and financial losses from missing
      or stale market data
  - id: finance-C-150
    when: When upgrading the zvt package to a newer version
    action: Assume or promise backward compatibility between versions — the project explicitly does not guarantee any backward
      compatibility and reserves the right to change or discontinue any component without notice
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Automated upgrades break existing strategies, data schemas, or API contracts without deprecation warnings,
      causing production systems to fail silently or raise exceptions on next run
  - id: finance-C-151
    when: When configuring the TRADITIONAL Trader for backtesting with kdata_use_begin_time=False (the default)
    action: Use end-of-period kdata prices for signal generation and order execution — with kdata_use_begin_time=False, the
      trading loop processes signals using the closed kdata's close price at the period end; this is the default and anti-lookahead-safe
      mode
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Setting kdata_use_begin_time=True uses the open price of the current period for execution, which introduces
      look-ahead bias in backtesting since the open price is revealed only after the period begins, making backtest results
      unrealistically optimistic
  - id: finance-C-152
    when: When executing TRADITIONAL Trader strategies across multiple timezone-aware data sources
    action: Verify each timestamp comparisons and trading calendar checks use consistent timezone handling — Mixin.timestamp
      has no enforced timezone, and Trader.in_trading_date() compares to_date_time_str(timestamp) against the pre-loaded trading_dates
      list; mixing UTC and CST timestamps produces wrong trading date classifications
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Stocks from different exchanges (US, HK, China) with incompatible timezone handling cause the trading calendar
      check to fail, resulting in signals being ignored on valid trading days or executed on non-trading days
  - id: finance-C-9008
    when: When incrementing stock day data in MongoDB
    action: query the last stored date from database and only fetch data after that date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Re-downloading existing data causes duplicate entries and incorrect backtest results due to overlapping timestamps
    stage_ids:
    - data_collection
    source_scope: domain
    domain_constraint_id: finance-C-9008
    local_import_status: accepted
    _domain_provenance:
      original_id: finance-C-008
      original_hash: 7d862312da27ee6f
      source_blueprint: unknown
      rank_when_imported: 2
  - id: finance-C-9065
    when: When implementing volatility targeting with rolling window periods
    action: account for NaN values in the first N periods before the rolling window completes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Volatility-adjusted leverage will be NaN for the initial periods equal to the rolling window (vol_periods),
      causing backtest P&L series to contain NaN values for warmup periods and potentially causing downstream calculation
      errors in portfolio aggregation
    stage_ids:
    - trading_execution
    source_scope: domain
    domain_constraint_id: finance-C-9065
    local_import_status: accepted
    _domain_provenance:
      original_id: finance-C-065
      original_hash: e783709ae54576ec
      source_blueprint: unknown
      rank_when_imported: 6
  - id: finance-C-9204
    when: When preparing datasets for machine learning model training and validation
    action: Split data temporally into TRAIN, VALID, TEST segments using date range boundaries — verify each TRAIN timestamps
      precede VALID, which precedes TEST
    severity: high
    kind: domain_rule
    modality: must
    consequence: Random or incorrect temporal splitting introduces look-ahead bias where future information leaks into training
      data, causing backtest results to significantly overestimate live trading performance
    source_scope: domain
    domain_constraint_id: finance-C-9204
    local_import_status: accepted
    _domain_provenance:
      original_id: finance-C-204
      original_hash: 89fb2c4644dda1f5
      source_blueprint: finance-bp-081
      rank_when_imported: 7
  - id: finance-C-9258
    when: When implementing Double Exponential Moving Average (DEMA) indicator
    action: 'Calculate DEMA using the formula: DEMA = 2*EMA(period) - EMA(EMA(period), period). This specific coefficient
      structure achieves approximately half the lag of standard EMA. Do not simplify or re-derive the formula.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect DEMA formula variations produce different lag characteristics that alter signal timing. Short-term
      strategies relying on DEMA crossovers will generate signals at different prices, causing backtest results to diverge
      from expected short-term trading behavior.
    source_scope: domain
    domain_constraint_id: finance-C-9258
    local_import_status: accepted
    _domain_provenance:
      original_id: finance-C-258
      original_hash: 76b24538c3c1445b
      source_blueprint: unknown
      rank_when_imported: 8
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
