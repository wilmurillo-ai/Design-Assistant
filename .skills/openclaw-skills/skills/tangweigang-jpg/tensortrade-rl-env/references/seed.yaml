resources:
  packages:
  - name: numpy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: tensorflow
    version_pin: latest
  - name: gymnasium
    version_pin: latest
  - name: pyyaml
    version_pin: latest
  - name: stochastic
    version_pin: latest
  - name: matplotlib
    version_pin: latest
  - name: plotly
    version_pin: latest
  - name: ta
    version_pin: latest
  - name: ipython
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy
    - python3 -m pip install pandas
    - python3 -m pip install tensorflow
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing financial quantity calculations
    action: Use Decimal type for each monetary values instead of float
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Floating-point arithmetic causes rounding errors in financial calculations, leading to incorrect order sizing
      and portfolio valuations that compound over time
    stage_ids:
    - data_collection
  - id: finance-C-002
    when: When validating quantity operations between instruments
    action: Validate instrument compatibility before performing arithmetic operations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Operations between incompatible instruments (e.g., BTC/USD + ETH/USD) produce semantically incorrect results
      without raising errors
    stage_ids:
    - data_collection
  - id: finance-C-016
    when: When evaluating trading strategies trained on synthetic data
    action: Claim that synthetic backtest returns predict live trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Synthetic data lacks market impact, slippage, and liquidity constraints of real trading; presenting synthetic
      returns as expected live results misleads stakeholders
    stage_ids:
    - data_collection
  - id: finance-C-017
    when: When presenting TensorTrade as a trading solution
    action: Claim that the data_collection stage alone provides real-time trading signals
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Data collection fetches historical data or generates synthetic scenarios; without agent training and evaluation
      stages, no actionable trading signals are produced
    stage_ids:
    - data_collection
  - id: finance-C-018
    when: When citing research findings from TensorTrade experiments
    action: Present experimental results as guarantees of future market performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Past performance does not guarantee future results; presenting agent P&L of +$239 as expected returns ignores
      market non-stationarity and changing conditions
    stage_ids:
    - data_collection
  - id: finance-C-021
    when: When implementing a Stream with a dtype parameter
    action: register the dtype in Stream._mixins before use
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Accessing dtype-specific operations (astype, arithmetic) on unregistered dtypes causes KeyError at runtime,
      breaking the data pipeline and preventing feature generation
    stage_ids:
    - feature_engineering
  - id: finance-C-022
    when: When implementing a Stream with a dtype parameter
    action: verify astype() is called only with registered dtype strings
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calling astype() with an unregistered dtype causes KeyError, corrupting the stream dtype and breaking downstream
      operations
    stage_ids:
    - feature_engineering
  - id: finance-C-027
    when: When using PushFeed for live data
    action: verify each Placeholder streams have data pushed before calling push()
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Calling push() when not all Placeholder streams are loaded raises Exception, breaking the live data feed
      execution
    stage_ids:
    - feature_engineering
  - id: finance-C-029
    when: When building stream DAGs with dependencies
    action: verify stream graphs are acyclic for topological sort to succeed
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Cyclic stream dependencies cause infinite loops or incorrect values during forward propagation, corrupting
      feature calculations
    stage_ids:
    - feature_engineering
  - id: finance-C-034
    when: When implementing Lag operation for look-ahead prevention
    action: use Lag operator for any signal that should reference previous timestep values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing lag causes look-ahead bias where current features include future price information, leading to unrealistic
      backtest results
    stage_ids:
    - feature_engineering
  - id: finance-C-041
    when: When implementing wallet withdrawal or lock operations
    action: allow wallet balance to become negative after any operation
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Negative wallet balance corrupts accounting records and causes phantom funds that cannot be reconciled in
      portfolio calculations
    stage_ids:
    - order_management
  - id: finance-C-042
    when: When creating an order
    action: lock funds immediately upon order creation to prevent concurrent orders from overdrawing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Concurrent orders could execute simultaneously, each believing sufficient funds exist, resulting in double-spending
      and negative balances
    stage_ids:
    - order_management
  - id: finance-C-043
    when: When implementing order chains (entry, stop-loss, take-profit)
    action: share the same path_id across each related orders for unified fund unlocking
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Orphaned locked funds cannot be released when related orders share different path_ids, causing permanent
      fund lockup
    stage_ids:
    - order_management
  - id: finance-C-044
    when: When implementing wallet transfer operations
    action: 'maintain conservation equation: (source_debit - commission) = target_credit across the transfer'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violation of conservation equation causes accounting discrepancies where funds appear from nowhere or vanish
      into nothing
    stage_ids:
    - order_management
  - id: finance-C-045
    when: When implementing order fill execution
    action: update both source and destination wallet balances atomically within a single transaction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-atomic updates cause inconsistent state where one wallet reflects changes but the other does not, corrupting
      portfolio balances
    stage_ids:
    - order_management
  - id: finance-C-059
    when: When implementing custom Observer components
    action: Return observations as numpy arrays compatible with GPU tensor operations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-numpy observations will cause device placement errors when RL frameworks attempt to move tensors to GPU,
      breaking training loops
    stage_ids:
    - trading_environment
  - id: finance-C-060
    when: When implementing PBR reward scheme
    action: Compute reward as (price_change) * position using lagged price difference
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect reward computation decouples reward signal from actual profit/loss, preventing the agent from learning
      position-aware trading behavior
    stage_ids:
    - trading_environment
  - id: finance-C-061
    when: When implementing TradingEnv.step()
    action: Increment the shared Clock after processing each step
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without clock increment, all components share stale temporal state, causing observation/reward misalignment
      with actual trading time
    stage_ids:
    - trading_environment
  - id: finance-C-063
    when: When implementing any Observer component
    action: Populate observation space with shape matching (window_size, n_features)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched observation space causes RL framework to reject environment during registration, blocking training
      initialization
    stage_ids:
    - trading_environment
  - id: finance-C-065
    when: When creating the TradingEnv
    action: Share a single Clock instance across each components
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Multiple clocks cause components to operate on different temporal references, corrupting observation/reward/action
      synchronization
    stage_ids:
    - trading_environment
  - id: finance-C-066
    when: When executing step() in TradingEnv
    action: 'Execute steps in the order: perform action, observe environment, compute reward, check termination, then increment
      clock'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Out-of-order execution breaks temporal causality - actions may execute on wrong time step, observations may
      be stale, rewards may be misaligned
    stage_ids:
    - trading_environment
  - id: finance-C-076
    when: When implementing custom ActionScheme
    action: Register the action_space property to return a valid Gymnasium Space
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing or invalid action_space prevents environment registration with RL frameworks, blocking training initialization
    stage_ids:
    - trading_environment
  - id: finance-C-077
    when: When implementing TradingEnv step return values
    action: 'Return the standard Gymnasium 5-tuple: (obs, reward, terminated, truncated, info)'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Non-standard return signature breaks compatibility with RL library integrations (Ray RLlib, stable-baselines3)
      that expect the Gymnasium API format
    stage_ids:
    - trading_environment
  - id: finance-C-078
    when: When implementing TradingEnv reset method
    action: 'Return the standard Gymnasium tuple: (obs, info)'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Non-standard reset signature breaks RL library integrations expecting Gymnasium API compatibility
    stage_ids:
    - trading_environment
  - id: finance-C-084
    when: When creating environment components via the default factory
    action: Pass portfolio to action_scheme before environment initialization
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Action scheme without portfolio reference cannot generate orders, causing AttributeError during trading execution
    stage_ids:
    - trading_environment
  - id: finance-C-085
    when: When initializing a builtin agent (DQNAgent, A2CAgent, ParallelDQNAgent)
    action: Pass a valid TradingEnv or TradingEnvironment instance that provides action_space.n and observation_space.shape
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Agent initialization fails or network architecture misaligns with observation shape, causing downstream training
      to crash or produce invalid policy gradients
    stage_ids:
    - agent_training
  - id: finance-C-086
    when: When initializing DQNAgent
    action: Use env.action_space.n cast to int for n_actions to verify correct network output dimension
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-integer action_space.n causes network output dimension mismatch, leading to shape incompatibility errors
      during gradient computation
    stage_ids:
    - agent_training
  - id: finance-C-087
    when: When training with DQN agent
    action: Verify replay memory has at least batch_size samples before applying gradient descent
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Attempting to sample from insufficient memory causes random.sample() to fail, terminating training prematurely
      with a ValueError
    stage_ids:
    - agent_training
  - id: finance-C-100
    when: When implementing data_collection to feature_engineering edge, DataFrame with OHLCV columns flows into Stream.source()
    action: Convert DataFrame columns to Python lists via list(dataframe['column']) before passing to Stream.source(iterable)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Passing DataFrame columns directly to Stream.source causes iteration failures because Stream expects Iterable[T],
      not DataFrame. DataFrame iteration yields column names, not values, corrupting the feature data stream.
    stage_ids:
    - data_collection
    - feature_engineering
  - id: finance-C-102
    when: When implementing feature_engineering to trading_environment edge, DataFeed.next() returns dict with stream names
      as keys
    action: 'Verify each Stream is named via .rename(''name'') before adding to DataFeed, as DataFeed.next() returns {s.name:
      s.value for s in self.inputs}'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without explicit stream naming, unnamed streams have name=None, causing dict key collisions and lookup failures
      when Observer tries to access specific feature values by name.
    stage_ids:
    - feature_engineering
    - trading_environment
  - id: finance-C-104
    when: When implementing trading_environment to order_management edge, ActionScheme.get_orders() must validate action against
      action_space
    action: Verify action is within Discrete action_space bounds (0 to n-1) before calling get_orders(action, portfolio)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Out-of-bounds actions cause index errors in action scheme get_orders(), crashing the trading loop or producing
      invalid order sizes that corrupt portfolio state.
    stage_ids:
    - trading_environment
    - order_management
  - id: finance-C-105
    when: When implementing trading_environment to order_management edge, order size must respect portfolio cash/asset balance
    action: Check source wallet balance before creating buy orders; check asset balance before creating sell orders
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Attempting to execute orders exceeding wallet balances causes order rejection or negative balance states,
      resulting in failed trades and incorrect portfolio tracking.
    stage_ids:
    - trading_environment
    - order_management
  - id: finance-C-108
    when: When implementing order_management to agent_training edge, RewardScheme.get_reward() must receive the same portfolio
      instance as the environment
    action: Verify action_scheme.attach(reward_scheme) is called to bind reward_scheme to the same portfolio as action_scheme
      before training
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched portfolio references cause reward computation to use stale or incorrect portfolio state, producing
      rewards that don't correspond to actual trading performance.
    stage_ids:
    - order_management
    - agent_training
  - id: finance-C-110
    when: When implementing agent_training to trading_environment edge, policy_network.forward() output must be integer action
      for Discrete action space
    action: Use np.argmax(policy_network(state)) or argmax from logits to convert continuous Q-values to discrete action index
      before passing to env.step(action)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Passing continuous policy outputs directly to step() causes TypeError since action_scheme expects int; the
      environment crashes or misinterprets actions.
    stage_ids:
    - agent_training
    - trading_environment
  - id: finance-C-112
    when: When implementing any data flow edge involving time series, stream iteration must not introduce look-ahead bias
    action: Use shift(1) for price returns or indicator features; data at index i must only use data from indices 0 to i
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Look-ahead bias causes the agent to learn from future prices, producing backtest profits that cannot be replicated
      in live trading where only current and past data are available.
    stage_ids:
    - data_collection
    - feature_engineering
    - trading_environment
  - id: finance-C-117
    when: 'When implementing trading_environment step loop, action and reward computation must follow strict order: perform
      action -> observe -> compute reward'
    action: Never compute reward before observing the new state; reward must reflect net_worth change between current and
      previous step, not pre-action portfolio value
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect reward ordering causes the agent to receive rewards for previous actions in current state, breaking
      temporal credit assignment and preventing learning.
    stage_ids:
    - trading_environment
    - order_management
    - agent_training
  - id: finance-C-118
    when: When implementing PBR reward scheme, price stream must be the SAME stream used by the exchange, not a copy
    action: Pass the same Stream object to PBR(price=stream) that is passed to Exchange()(stream); do not create separate
      Stream.source() instances for price and PBR
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched price streams cause PBR to compute rewards based on stale/cached prices while the exchange executes
      at different prices, producing rewards disconnected from actual trade outcomes.
    stage_ids:
    - data_collection
    - feature_engineering
    - order_management
    - agent_training
  - id: finance-C-120
    when: When implementing financial quantity calculations
    action: Use Decimal type with precision defined per Instrument to avoid floating-point rounding errors in monetary calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using float for monetary calculations leads to accumulated rounding errors that cause incorrect position
      sizing and P&L reporting, resulting in financial discrepancies
  - id: finance-C-121
    when: When implementing trading environment step logic
    action: Increment the shared Clock AFTER computing observation and reward, not before
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Clock increment before observation/reward computation causes temporal misalignment where components access
      incorrect time step data, leading to look-ahead bias and incorrect learning signals
  - id: finance-C-122
    when: When allocating funds in wallet operations
    action: Allow wallet balance to become negative — raise InsufficientFunds exception instead
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Negative wallet balances enable over-trading beyond available capital, causing realized losses exceeding
      initial capital and potential margin call scenarios
  - id: finance-C-127
    when: When executing wallet transfers between accounts
    action: 'Maintain conservation equation: (source_debit - commission) must equal (target_credit) within quantization tolerance'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Conservation violation indicates funds were created or destroyed during transfer, causing permanent portfolio
      value discrepancies that invalidate all P&L calculations
  - id: finance-C-128
    when: When retrieving quote prices from exchanges
    action: Allow zero or null prices to propagate — prices must always be non-zero positive values
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Zero prices cause division-by-zero or incorrect order sizing calculations, leading to either failed trades
      or trades with infinite quantity at zero cost
  - id: finance-C-135
    when: When splitting historical data for training and testing
    action: Use random shuffling or future data in training set — time series data requires strict temporal ordering to prevent
      look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Look-ahead bias causes agent to learn from future information, producing training curves that appear excellent
      but fail completely in real-time deployment
  - id: finance-C-156
    when: When implementing episode termination and reset logic for training
    action: Perform full portfolio reinitialization to original cash balance at episode termination; complete state clearing
      must occur at max_allowed_loss breach, max_trades limit, or dataset end
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Partial resets leave residual state that leaks information between episodes, causing the policy to learn
      from contaminated trajectories; this introduces look-ahead bias making backtest results non-reproducible in live trading
    derived_from_bd_id: BD-047
  regular:
  - id: finance-C-003
    when: When generating synthetic OHLCV data with stochastic processes
    action: Set numpy random seed before generating data to verify reproducibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without seeded random number generation, stochastic processes produce different results on each run, preventing
      reproducible backtests and experiment comparison
    stage_ids:
    - data_collection
  - id: finance-C-004
    when: When specifying timeframe for stochastic data generation
    action: 'Use timeframe format matching one of: minutes (min), hours (H), days (D), weeks (W), or months (M)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid timeframe format causes ValueError during data generation, halting the entire trading pipeline
    stage_ids:
    - data_collection
  - id: finance-C-005
    when: When using default stochastic model parameters for backtesting
    action: Use default gbm_mu=0.058 and all_sigma=0.125 parameters for production backtesting
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Default parameters encode annual drift of 5.8% and volatility of 12.5%, which may not represent actual market
      conditions, leading to unrealistic backtest results
    stage_ids:
    - data_collection
  - id: finance-C-006
    when: When fetching data from CryptoDataDownload
    action: Require API authentication for supported exchanges on CryptoDataDownload
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: CryptoDataDownload provides free public CSV downloads without authentication; requiring API keys creates
      unnecessary friction and blocks data access
    stage_ids:
    - data_collection
  - id: finance-C-007
    when: When establishing HTTPS connections to external data sources
    action: Accept SSL certificate verification bypass for development data fetching
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: SSL verification is bypassed globally for CryptoDataDownload, which may allow MITM attacks on data in production;
      however, this enables data access on restricted networks
    stage_ids:
    - data_collection
  - id: finance-C-008
    when: When processing OHLCV data from external exchanges
    action: Normalize column names to lowercase after fetching from CryptoDataDownload
    severity: high
    kind: resource_boundary
    modality: must
    consequence: CryptoDataDownload returns mixed-case column names; downstream processing assumes lowercase columns, causing
      KeyError or silent data misalignment
    stage_ids:
    - data_collection
  - id: finance-C-009
    when: When handling timestamp formats from different exchanges
    action: Convert Unix timestamps to seconds when processing 13-digit millisecond timestamps
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Some exchanges provide millisecond timestamps (13 digits); without division by 1000, datetime conversion
      produces dates in year 51380, causing data sorting and alignment issues
    stage_ids:
    - data_collection
  - id: finance-C-010
    when: When working with Gemini exchange data
    action: Convert Gemini hourly timeframe suffix from 'h' to 'hr' in filename
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Gemini uses 'hr' suffix for hourly data (e.g., 'gemini_BTCUSD_1hr.csv'); using standard '1h' format causes
      404 errors when fetching
    stage_ids:
    - data_collection
  - id: finance-C-011
    when: When selecting between synthetic and real market data
    action: Prefer real historical data over synthetic generation for production backtesting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Synthetic data generated by stochastic processes lacks market microstructure, order flow dynamics, and realistic
      price patterns found in actual trading data
    stage_ids:
    - data_collection
  - id: finance-C-012
    when: When generating training datasets for reinforcement learning
    action: Verify synthetic data contains at least 4000 candles for meaningful pattern learning
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Insufficient training data (less than 4000 candles) leads to overfitting where the agent memorizes noise
      instead of learning generalizable market patterns
    stage_ids:
    - data_collection
  - id: finance-C-013
    when: When setting datetime index for OHLCV DataFrame
    action: Use timezone-aware datetime index to match exchange data conventions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Naive datetime indexes without timezone information cause misalignment when combining data from multiple
      exchanges with different local times
    stage_ids:
    - data_collection
  - id: finance-C-014
    when: When designing data feed architecture for trading systems
    action: Route each market data through DataFeed before reaching the trading agent
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct access to exchange data bypasses the data feed's stream processing and compilation, causing inconsistent
      data availability across agents
    stage_ids:
    - data_collection
  - id: finance-C-015
    when: When consuming OHLCV data from stochastic generators
    action: 'Verify DataFrame output has exactly 5 columns: open, high, low, close, volume'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Downstream feature engineering and trading logic assume exactly 5 OHLCV columns; missing or extra columns
      cause index errors or silent wrong calculations
    stage_ids:
    - data_collection
  - id: finance-C-019
    when: When debugging synthetic data generation issues
    action: Assume the problem is in the stochastic process math without checking seed state
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Different outputs on identical parameters are likely due to random seed state, not process bugs; skipping
      seed verification wastes debugging time on false leads
    stage_ids:
    - data_collection
  - id: finance-C-020
    when: When first integrating external exchange data
    action: Assume the first successful fetch means data format is fully understood
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Exchange data formats vary by timeframe, asset pair, and historical periods; partial validation may miss
      edge cases causing silent failures in production
    stage_ids:
    - data_collection
  - id: finance-C-023
    when: When configuring a Rolling window operation
    action: verify min_periods parameter does not exceed window size
    severity: high
    kind: domain_rule
    modality: must
    consequence: Rolling window with min_periods > window always returns NaN, causing all rolling aggregations (mean, sum,
      std) to produce no valid features
    stage_ids:
    - feature_engineering
  - id: finance-C-024
    when: When configuring EWM parameters
    action: validate alpha is in range (0, 1], com >= 0, span >= 1, halflife > 0
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid EWM parameters cause AssertionError at runtime, preventing exponential weighted moving average calculations
      for feature generation
    stage_ids:
    - feature_engineering
  - id: finance-C-025
    when: When configuring pct_change fill_method
    action: use only 'pad' or 'ffill' as fill_method values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid fill_method causes AssertionError, preventing percentage change calculations for return-based features
    stage_ids:
    - feature_engineering
  - id: finance-C-026
    when: When using DataFeed with derived streams
    action: call compile() before the first next() invocation
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Calling next() before compile() causes auto-compilation but may produce incorrect topological ordering for
      complex stream graphs
    stage_ids:
    - feature_engineering
  - id: finance-C-028
    when: When using PushFeed for live data
    action: use only Placeholder streams as data sources in PushFeed
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-Placeholder streams in PushFeed cannot receive runtime data, causing incomplete feature generation in
      live trading scenarios
    stage_ids:
    - feature_engineering
  - id: finance-C-030
    when: When naming streams within a NameSpace context
    action: use unique stream names within each NameSpace for correct dict output
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate stream names in the same namespace cause dict key collisions in DataFeed output, resulting in missing
      or incorrect feature values
    stage_ids:
    - feature_engineering
  - id: finance-C-031
    when: When calling Stream.select() with a selector function
    action: verify at least one stream satisfies the selector condition
    severity: high
    kind: domain_rule
    modality: must
    consequence: No matching stream raises Exception, breaking downstream feature selection logic
    stage_ids:
    - feature_engineering
  - id: finance-C-032
    when: When implementing reverse arithmetic operations
    action: pass only scalar values to rsub and rdiv operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing Stream objects to reverse subtraction/division raises Exception, causing arithmetic feature calculations
      to fail
    stage_ids:
    - feature_engineering
  - id: finance-C-033
    when: When using DataFeed for feature generation
    action: maintain consistent dict key structure across each next() calls
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent dict keys across next() calls cause KeyError in downstream observers expecting stable feature
      names
    stage_ids:
    - feature_engineering
  - id: finance-C-035
    when: When implementing reverse arithmetic on float streams
    action: pass Stream objects as the left operand to rsub/rdiv operations
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using Stream on the left side of - or / operations raises Exception, breaking backward-compatibility for
      arithmetic expressions
    stage_ids:
    - feature_engineering
  - id: finance-C-036
    when: When training RL agents with feed-generated features
    action: claim real-time trading capability for batch DataFeed mode
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Batch DataFeed only processes historical data and cannot execute live trades, misrepresenting system capabilities
      to users
    stage_ids:
    - feature_engineering
  - id: finance-C-037
    when: When using PushFeed for live data
    action: claim true real-time capability without acknowledging polling-based data injection
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: PushFeed uses polling/pushing mechanism, not event-driven real-time updates, so system cannot claim sub-second
      latency capabilities
    stage_ids:
    - feature_engineering
  - id: finance-C-038
    when: When computing technical indicators using window operations
    action: warm up the stream pipeline for the longest window period before trading
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without proper warmup, rolling window operations return NaN for the first window_size-1 periods, causing
      the RL agent to receive incomplete observations
    stage_ids:
    - feature_engineering
  - id: finance-C-039
    when: When building feature streams with multiple dtype operations
    action: import each relevant API modules to register their mixins before creating dtype-specific streams
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing API module imports mean dtype mixins are not registered, causing AttributeError when calling dtype-specific
      methods like .rolling() or .ewm()
    stage_ids:
    - feature_engineering
  - id: finance-C-040
    when: When implementing the Feed type for different trading scenarios
    action: 'select specified feed type: DataFeed for batch backtesting, PushFeed for live trading simulation'
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using wrong feed type causes either no runtime data injection capability (DataFeed) or inefficient batch
      processing (PushFeed for backtesting)
    stage_ids:
    - feature_engineering
  - id: finance-C-046
    when: When using simulated execution for market orders
    action: expect market orders to always fill at the current quoted market price
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Market orders may fill at better-than-market prices due to scale factor (order.price / max(current_price,
      order.price)), creating unrealistic backtest results
    stage_ids:
    - order_management
  - id: finance-C-047
    when: When configuring exchange options
    action: override the default commission rate (0.003 = 0.3%) for paper trading simulations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default commission of 0.3% may not match actual paper trading fees, causing P&L calculations to diverge from
      real execution costs
    stage_ids:
    - order_management
  - id: finance-C-048
    when: When implementing commission calculations in execution services
    action: check if commission is less than instrument precision and raise a warning with minimum commission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Commission smaller than instrument precision rounds to zero, silently losing exchange fees and causing accounting
      errors
    stage_ids:
    - order_management
  - id: finance-C-049
    when: When checking order executability
    action: evaluate is_complete based on remaining quantity being zero or negative
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect executability checks cause orders to remain open when they should be complete, or complete prematurely
    stage_ids:
    - order_management
  - id: finance-C-050
    when: When processing order release on cancel or completion
    action: unlock each quantities across each wallets sharing the same path_id
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incomplete unlock leaves funds permanently locked in wallets, reducing available balance for future trades
    stage_ids:
    - order_management
  - id: finance-C-051
    when: When integrating with exchange execution services
    action: claim real-time trading capability when using simulated execution service with default is_live=False
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting simulated execution as live trading leads to unexpected order fills and stale price data
      in live deployments
    stage_ids:
    - order_management
  - id: finance-C-052
    when: When executing buy orders
    action: return None for limit orders when order price is less than current price (order not yet executable)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect limit order execution causes orders to fill at unfavorable prices, violating limit price guarantees
    stage_ids:
    - order_management
  - id: finance-C-054
    when: When adding an OrderSpec to create dependent orders
    action: verify the dependent order inherits the parent order's path_id for shared fund management
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Child orders with different path_ids cannot access locked parent funds, causing execution failures
    stage_ids:
    - order_management
  - id: finance-C-055
    when: When locking quantities
    action: raise DoubleLockedQuantity exception if attempting to lock an already-locked quantity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allowing double-locking corrupts fund tracking and causes inconsistent unlock behavior
    stage_ids:
    - order_management
  - id: finance-C-056
    when: When unlocking quantities
    action: raise QuantityNotLocked exception if quantity has a path_id not currently allocated in the wallet
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unlocking quantities not in the wallet causes accounting errors and potential fund discrepancies
    stage_ids:
    - order_management
  - id: finance-C-057
    when: When processing price streams
    action: raise ValueError if price becomes zero to prevent division-by-zero in order fills
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero price causes division by zero in conversions and fills, corrupting wallet balances or crashing execution
    stage_ids:
    - order_management
  - id: finance-C-058
    when: When validating exchange pairs
    action: return False for pairs not configured in price streams instead of raising exceptions
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Raising exceptions for untradable pairs disrupts order processing loop and prevents graceful handling
    stage_ids:
    - order_management
  - id: finance-C-062
    when: When initializing TradingEnv with random_start_pct > 0
    action: Start episode at a random point within the first X% of the data stream
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fixed starting points cause episodes to always see the same initial data patterns, creating look-ahead bias
      where agents learn to exploit specific start conditions
    stage_ids:
    - trading_environment
  - id: finance-C-064
    when: When computing episode termination signals
    action: Set both terminated and truncated flags to enable proper Gymnasium episode handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing truncated signal causes episodes to run indefinitely when max_episode_steps is set, or missing terminated
      signal prevents proper episode boundary detection
    stage_ids:
    - trading_environment
  - id: finance-C-067
    when: When implementing reset() in TradingEnv
    action: Reset each components and clock, then advance clock by one step before returning first observation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper reset sequence, stale component state bleeds into new episodes causing persistent look-ahead
      or stale data issues
    stage_ids:
    - trading_environment
  - id: finance-C-068
    when: When implementing custom Stopper components
    action: Return True when episode should terminate, False otherwise
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inverted stop logic causes episodes to continue indefinitely when they should stop, or terminate prematurely
      during valid trading
    stage_ids:
    - trading_environment
  - id: finance-C-069
    when: When using TensorTrade for evaluation
    action: Claim backtest results as guaranteed live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting simulated returns as expected live performance misleads stakeholders; backtest results historically
      diverge from live trading due to slippage, liquidity, and execution differences
    stage_ids:
    - trading_environment
  - id: finance-C-070
    when: When using TensorTrade in production
    action: Present the framework as capable of live trading execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: TensorTrade is a backtesting and training simulation framework with no live exchange connectivity, misrepresenting
      its capability exposes users to uncontrolled financial risk
    stage_ids:
    - trading_environment
  - id: finance-C-071
    when: When training RL agents in TensorTrade
    action: Account for commission costs during training with realistic rates
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Training without commission leads to overtrading strategies that appear profitable in backtest but lose money
      in live trading due to commission erosion
    stage_ids:
    - trading_environment
  - id: finance-C-072
    when: When configuring TradingEnv
    action: Set min_periods >= the longest indicator period to warm up each feature streams
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Insufficient warmup periods cause NaN values in observations, corrupting agent input features and degrading
      learning quality
    stage_ids:
    - trading_environment
  - id: finance-C-073
    when: When training agents with PBR reward
    action: Use reward schemes that only compute terminal P&L without step-by-step feedback
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Terminal-only rewards provide no learning signal per step, making reinforcement learning extremely slow or
      impossible as agents cannot identify which actions were beneficial
    stage_ids:
    - trading_environment
  - id: finance-C-074
    when: When building observation features
    action: Use only scale-invariant features (returns, ratios) instead of raw price values
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Raw price features cause distribution shift between train/test periods with different price ranges, leading
      to poor generalization to new market conditions
    stage_ids:
    - trading_environment
  - id: finance-C-075
    when: When configuring the TradingEnv
    action: Set max_episode_steps to bound episode length and enable truncation handling
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without max_episode_steps, episodes run until data exhaustion without truncation signal, causing RL framework
      compatibility issues with Gymnasium API
    stage_ids:
    - trading_environment
  - id: finance-C-079
    when: When implementing custom Observer
    action: Implement has_next() to return False when data feed is exhausted
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without has_next(), the MaxLossStopper cannot detect feed exhaustion, causing episodes to attempt processing
      empty data streams
    stage_ids:
    - trading_environment
  - id: finance-C-080
    when: When using TensorTrade data streams with lagged operators
    action: Allow warmup iterations equal to the maximum lag for each streams to return valid values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accessing lagged stream values before warmup period completes returns np.nan, corrupting reward and observation
      calculations
    stage_ids:
    - trading_environment
  - id: finance-C-081
    when: When evaluating trained agent performance
    action: Use zero commission rates that do not reflect actual trading costs
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Zero-commission evaluation produces misleading profitability metrics; strategies trained without commission
      awareness overtrade and lose money when real fees apply
    stage_ids:
    - trading_environment
  - id: finance-C-082
    when: When implementing BSH action scheme
    action: Check source wallet balance before creating orders to prevent invalid trades
    severity: high
    kind: domain_rule
    modality: must
    consequence: Submitting orders without balance validation causes execution failures, rejected orders, and corrupted portfolio
      state
    stage_ids:
    - trading_environment
  - id: finance-C-083
    when: When implementing portfolio net worth calculations
    action: Compute net_worth by valuing each instruments in base currency before comparison
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent valuation causes net_worth to fluctuate based on quote currency prices rather than true portfolio
      value, corrupting reward signals
    stage_ids:
    - trading_environment
  - id: finance-C-088
    when: When using builtin DQNAgent, A2CAgent, or ParallelDQNAgent for production
    action: Claim builtin agents as production-ready or use them for mission-critical trading systems
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Builtin agents lack distributed training, proper hyperparameter tuning, and community support, leading to
      suboptimal trading performance and potential financial losses
    stage_ids:
    - agent_training
  - id: finance-C-089
    when: When presenting agent training results or backtest performance
    action: Present simulated training returns as guaranteed future live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest overfitting, look-ahead bias, and simulator assumptions cause live trading returns to diverge significantly
      from backtested results, misleading stakeholders
    stage_ids:
    - agent_training
  - id: finance-C-090
    when: When using builtin agents for training
    action: Use Ray RLlib integration instead for production deployments due to distributed training and scalability advantages
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Builtin agents lack distributed training, checkpointing, and hyperparameter tuning infrastructure, causing
      performance bottlenecks and maintenance burden
    stage_ids:
    - agent_training
  - id: finance-C-091
    when: When initializing A2CAgent
    action: Pass a 'TradingEnvironment' compatible environment (not Gymnasium-style), as A2CAgent accesses env.reset() differently
      than DQNAgent
    severity: high
    kind: domain_rule
    modality: must
    consequence: A2CAgent.reset() at line 196 returns state directly without tuple unpacking, causing AttributeError if passed
      a Gymnasium-style env that returns (obs, info) tuple
    stage_ids:
    - agent_training
  - id: finance-C-092
    when: When configuring DQN training hyperparameters
    action: Set update_target_every parameter to a value that allows sufficient policy updates before target network synchronization
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Too-frequent target network updates cause training instability (moving target problem); too-infrequent updates
      slow convergence
    stage_ids:
    - agent_training
  - id: finance-C-093
    when: When configuring epsilon-greedy exploration
    action: Set eps_start > eps_end with eps_decay_steps proportional to total training steps for proper exploration-exploitation
      balance
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Improper epsilon schedule causes agent to either explore randomly too long (wasting samples) or exploit prematurely
      (suboptimal policy)
    stage_ids:
    - agent_training
  - id: finance-C-094
    when: When initializing builtin agents
    action: Set env.agent_id to the agent's unique identifier after agent initialization
    severity: low
    kind: architecture_guardrail
    modality: must
    consequence: Missing agent_id assignment causes environment to lack tracking metadata, making it impossible to correlate
      episodes with specific agent runs
    stage_ids:
    - agent_training
  - id: finance-C-095
    when: When evaluating trained agent performance
    action: Skip out-of-sample validation or walk-forward testing, assuming backtest results generalize to live trading
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Overfit models perform well on training data but fail on unseen market conditions, causing sustained losses
      during live trading
    stage_ids:
    - agent_training
  - id: finance-C-096
    when: When training completes successfully
    action: Skip proper model checkpointing and save validation, assuming the last checkpoint is sufficient
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Missing checkpoints or corrupted saves require retraining from scratch, wasting compute resources and delaying
      deployment
    stage_ids:
    - agent_training
  - id: finance-C-097
    when: When choosing RL algorithm for trading policy
    action: Select builtin agents (DQN/A2C/ParallelDQN) without first evaluating Ray RLlib's PPO or other algorithms for scalability
    severity: medium
    kind: resource_boundary
    modality: should_not
    consequence: Builtin agents lack distributed training, proper logging, and hyperparameter tuning, leading to suboptimal
      policies and engineering overhead
    stage_ids:
    - agent_training
  - id: finance-C-098
    when: When implementing custom gradient descent for agents
    action: Verify discount_factor (gamma) is in valid range [0, 1) for proper Q-value convergence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid discount_factor causes divergence in Q-value estimation, leading to unstable training and meaningless
      action values
    stage_ids:
    - agent_training
  - id: finance-C-099
    when: When using ParallelDQNAgent with multiprocessing
    action: Verify create_env callable is picklable and creates independent environment instances per process
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Non-picklable environment or shared state causes multiprocessing to fail with PicklingError or produce inconsistent
      training results
    stage_ids:
    - agent_training
  - id: finance-C-101
    when: When implementing data_collection to feature_engineering edge, DataFrame index must be a datetime index for proper
      temporal alignment
    action: Verify DataFrame index is converted to datetime via pd.to_datetime(df.index) before creating stream iterables
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without datetime index, technical indicators and rolling windows computed in feature engineering may produce
      incorrect temporal alignments, causing the agent to learn from misaligned price-action relationships.
    stage_ids:
    - data_collection
    - feature_engineering
  - id: finance-C-103
    when: When implementing feature_engineering to trading_environment edge, dtype specification ensures numpy compatibility
    action: Specify dtype='float' in Stream.source() to verify consistent numpy float32 output for GPU compatibility
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Without explicit dtype, Stream may produce Python floats instead of numpy arrays, causing _ensure_numpy()
      to do unnecessary type conversions and reducing GPU training throughput.
    stage_ids:
    - feature_engineering
    - trading_environment
  - id: finance-C-106
    when: When implementing order_management to trading_environment edge, portfolio.net_worth must be computed before Observer
      observes the environment
    action: Verify portfolio.update() or broker.update() is called before observer.observe() to sync wallet states
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If portfolio state is not updated before observation, the agent receives stale wallet balance data, causing
      incorrect trading decisions based on outdated portfolio state.
    stage_ids:
    - order_management
    - trading_environment
  - id: finance-C-107
    when: When implementing order_management to trading_environment edge, Sensor streams must use lambda functions to access
      wallet/exchange state
    action: 'Use Stream.sensor(obj, lambda w: w.balance.as_float(), dtype=''float'') pattern for portfolio state observation,
      not direct property access'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct property access captures a snapshot at sensor creation time; lambda functions defer evaluation to
      observation time, ensuring live wallet values are captured at each timestep.
    stage_ids:
    - order_management
    - trading_environment
  - id: finance-C-109
    when: When implementing order_management to agent_training edge, window_size in reward scheme must be <= portfolio performance
      history
    action: Set reward_scheme._window_size to a value <= min(window_size, min_periods) to verify sufficient net_worth history
      exists
    severity: high
    kind: domain_rule
    modality: must
    consequence: Insufficient net_worth history causes IndexError in SimpleProfit.get_reward() when accessing net_worths[-min(len(net_worths),
      self._window_size + 1)]
    stage_ids:
    - order_management
    - agent_training
  - id: finance-C-111
    when: When implementing agent_training to trading_environment edge, state observation must be np.ndarray before policy_network.forward()
    action: Verify TradingEnv._ensure_numpy(obs) converts observation to np.ndarray with proper shape before passing to policy_network
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Non-numpy inputs to policy_network cause TensorFlow/PyTorch to auto-convert, triggering CPU-GPU memory copies
      that significantly slow training throughput.
    stage_ids:
    - agent_training
    - trading_environment
  - id: finance-C-113
    when: When implementing data flow across trading_environment to order_management and back, episode reset must synchronize
      each component states
    action: Call env.reset() before each new episode; verify feed.reset(), portfolio.reset(), broker.reset() are each invoked
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without synchronized reset, portfolio state from previous episodes contaminates new episode data, causing
      incorrect reward computation and agent learning from stale information.
    stage_ids:
    - trading_environment
    - order_management
  - id: finance-C-114
    when: When implementing trading_environment, observation window must be warmed up before agent training begins
    action: Set min_periods parameter in TensorTradeObserver to >= window_size, or call observer.warmup() explicitly before
      training
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unwarmed observation windows contain NaN values from incomplete lookback history, causing gradient computation
      failures in neural network policy training.
    stage_ids:
    - feature_engineering
    - trading_environment
  - id: finance-C-115
    when: When implementing any edge involving backtest performance reporting, backtest returns must NOT be presented as expected
      live trading returns
    action: Include disclaimer that backtest results do not guarantee future live trading performance; commission costs, slippage,
      and execution delays differ between backtest and live
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest returns as expected live returns misleads stakeholders; actual live trading typically
      produces lower returns due to commission costs (research shows 0.1% commission causes agent to lose vs Buy-and-Hold).
    stage_ids:
    - order_management
    - agent_training
  - id: finance-C-116
    when: When implementing edge from data_collection, the data source delay must be accounted for in live trading
    action: Document data source latency (e.g., yfinance 15-minute delay for free tier); do not claim real-time capability
      when using delayed data feeds
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Claiming real-time trading capability while using delayed data causes missed trade entries/exits; price at
      execution differs from observed price, leading to systematic losses.
    stage_ids:
    - data_collection
  - id: finance-C-119
    when: When implementing feature engineering, technical indicator lookback periods must be less than min_periods for warmup
    action: Verify max(indicator_window_sizes) <= min_periods to guarantee indicators have valid values before first reward
      computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Indicators like SMA with window > min_periods produce NaN, corrupting observation features and causing gradient
      NaN during training.
    stage_ids:
    - data_collection
    - feature_engineering
  - id: finance-C-123
    when: When creating related orders (entry, stop-loss, take-profit)
    action: Link each related orders using the same path_id to enable unified unlock across wallets when any order completes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unlinked orders cause locked funds to remain permanently locked when stop-loss or take-profit triggers, leading
      to funds that cannot be used or recovered
  - id: finance-C-124
    when: When naming streams within a NameSpace context
    action: Verify stream names are unique within each NameSpace to prevent naming conflicts
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate stream names within a NameSpace cause stream selection ambiguity and incorrect feature routing
      in the data feed pipeline
  - id: finance-C-125
    when: When resolving component default values
    action: 'Apply three-tier priority: TradingContext values over kwargs over hardcoded defaults'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect default resolution causes components to use wrong configuration values, leading to unexpected environment
      behavior and training instability
  - id: finance-C-126
    when: When registering price streams with an Exchange
    action: Use namespace format 'exchange_name:/base-quote' for consistent naming across each price streams
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-standard stream naming breaks stream selector lookups and causes price data routing failures in multi-exchange
      configurations
  - id: finance-C-129
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live trading returns — backtesting ignores market impact, financing
      costs, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-130
    when: When presenting TensorTrade as a trading system
    action: Claim support for production trading systems with real capital, low-latency market making, high-frequency trading
      strategies, or non-RL trading approaches
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy real capital with a system designed for research simulation, causing severe financial losses
      due to execution limitations, latency issues, and capability mismatches
  - id: finance-C-131
    when: When evaluating trading agent performance
    action: Present paper trading or dry-run results as proof of live execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Paper trading omits real execution constraints including exchange connectivity failures, order rejection
      scenarios, and psychological factors, leading to overconfident deployment decisions
  - id: finance-C-132
    when: When configuring trading environments
    action: Set ExchangeOptions.is_live to True without proper exchange API integration — TensorTrade is a research framework
      without live trading connectivity
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Attempting live trading without proper integration causes failed order execution, capital locked in unresolved
      orders, and potential financial losses
  - id: finance-C-133
    when: When designing features for trading agents
    action: Use scale-invariant features (returns, ratios, normalized values) instead of raw price values to verify generalization
      across market regimes
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Raw price features cause severe performance degradation when test market conditions differ from training
      (3x price range difference), as agent learns price-level thresholds that become obsolete
  - id: finance-C-134
    when: When training reinforcement learning trading agents
    action: Include commission costs during training — agents trained without commission costs learn overtrading behaviors
      that destroy profits in live execution
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Agent trained without commission makes ~2,000 trades in 30 days paying $2,000+ in fees that completely wipe
      out the +$239 direction prediction profit, resulting in net loss
  - id: finance-C-136
    when: When implementing or refactoring order object structures in the OMS layer
    action: Preserve the path_id field on order objects and verify each linked orders (entry, stop-loss, take-profit) share
      the same path_id for unified fund management and coordinated unlock of locked funds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing path_id breaks the linkage between entry orders and their associated stop-loss/take-profit orders,
      causing locked funds to never be released and preventing proper capital management across wallet transfers
    derived_from_bd_id: BD-008
  - id: finance-C-137
    when: When implementing or modifying wallet transfer logic in the order management system
    action: Preserve conservation equation validation where (source_debit - commission) must equal target_credit; throw an
      exception on validation failure rather than silently accepting the transfer
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Removing conservation validation allows accounting errors where debit and credit amounts diverge due to rounding
      or logic bugs, causing wallet balances to become inconsistent and leading to incorrect position sizing or locked fund
      calculations
    derived_from_bd_id: BD-011
  - id: finance-C-138
    when: When configuring or modifying the reward scheme for RL trading agents
    action: Verify that PBR (Position-Based Returns) reward scheme R_t = (p_t - p_t-1) * x_t aligns with strategy objectives;
      note that reward is zero when no position is held (x_t=0) regardless of price movement, isolating value of active trading
      decisions only
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using PBR without understanding that no-position periods generate zero reward causes agents to overfit to
      always-hold behaviors, leading to strategies that cannot adapt to cash-only periods and perform poorly in live trading
      when position constraints apply
    derived_from_bd_id: BD-024
  - id: finance-C-139
    when: When configuring RL training parameters with default episode termination settings
    action: Verify that max_allowed_loss=0.5 (50% drawdown threshold) matches the strategy's risk tolerance before training;
      adjust to a lower threshold for high-risk strategies or higher for conservative approaches
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Training with default 50% max_allowed_loss permits catastrophic capital erosion before episode termination;
      strategies trained under this lenient threshold may exhibit risk profiles unsuitable for production where earlier stoppage
      would preserve capital for recovery
    derived_from_bd_id: BD-025
  - id: finance-C-140
    when: When implementing or modifying simulated execution logic in the execution model layer
    action: Deduct commission from filled quantity rather than from position value; verify net position calculation reflects
      commission impact on available quantity for subsequent trades
    severity: high
    kind: domain_rule
    modality: must
    consequence: Deducting commission separately from position value causes net position to be calculated incorrectly, as
      exchanges actually reduce available quantity by commission; this mismatch leads to backtest results showing more available
      capital than would exist in live trading
    derived_from_bd_id: BD-043
  - id: finance-C-141
    when: When implementing parallel execution scenarios or multi-component simulations with time-aware objects
    action: Explicitly override _clock parameter for each TimeIndexed component rather than relying on the shared global_clock
      default; use isolated Clock instances per component to prevent timing state contention
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Relying on global_clock default causes all TimeIndexed objects to share the same timing state, leading to
      race conditions and timing inconsistencies in parallel execution scenarios where components may read stale or incorrectly
      ordered time values
    derived_from_bd_id: BD-084
  - id: finance-C-142
    when: When configuring exchange commission rates for backtesting campaigns
    action: Verify that the default commission of 0.3% matches actual broker fee structures; adjust to reflect real exchange
      fees including stamp duty, transfer fees, and tiered volume discounts if applicable
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default 0.3% commission without validation causes strategies to be trained with incorrect cost assumptions;
      high-frequency strategies are particularly sensitive as commission errors accumulate and can transform profitable strategies
      into loss-making ones in live trading
    derived_from_bd_id: BD-012
  - id: finance-C-143
    when: When processing historical data in the data collection stage
    action: Assume the framework provides point-in-time data availability; the framework does not implement data validation
      for look-ahead bias from backfilled or adjusted prices, and historical data may include survivorship bias
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using data without point-in-time validation causes look-ahead bias where strategies access price information
      that was not available at the simulation time, making backtest results optimistically skewed and unreproducible in live
      trading
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-144
    when: When selecting and preprocessing historical data for backtesting
    action: Implement point-in-time data validation by filtering records using timestamp <= current_time, excluding backfilled
      data that was adjusted after the fact; use data sources that provide timestamped historical OHLCV with adjustment flags
      or explicitly mark backtest runs with known data quality limitations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without point-in-time data validation, backtests include securities that would have been delisted or had
      different prices at the simulated time, causing survivorship bias and look-ahead bias that systematically overstate
      strategy performance
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-145
    when: When configuring walk-forward validation and episode start positions in backtesting
    action: Use random start points for episodes rather than fixed starting positions; verify random_start_pct parameter is
      configured to a non-zero value to prevent episodes from always beginning at training data boundaries where patterns
      may be artificially consistent
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fixed episode start positions cause look-ahead bias where agents inadvertently learn patterns that only appear
      near training data boundaries, leading to backtest performance that does not generalize to genuine out-of-sample periods
      in live trading
    derived_from_bd_id: BD-017
  - id: finance-C-146
    when: When implementing or refactoring the trading environment's time management logic
    action: Use the shared single Clock instance across each environment components (observer, reward calculator, action processors)
      and increment it on each step to maintain consistent temporal state
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using local timestamps or independent clock instances causes temporal inconsistencies that corrupt training
      data, leading to unreliable reinforcement learning models with unpredictable policy convergence
    derived_from_bd_id: BD-014
  - id: finance-C-147
    when: When configuring exchange commission rates for backtesting or live trading
    action: Verify that the commission rate matches actual exchange fee structures (typical range 0.01% to 0.5%+ for crypto
      exchanges); do not rely solely on the default 0.003 (0.3%) without confirming it matches your target exchange
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Hardcoded 0.3% default produces unrealistic backtest results; overestimating fees makes profitable-looking
      strategies unviable, while underestimating causes strategies to fail in live trading
    derived_from_bd_id: BD-026
  - id: finance-C-148
    when: When registering or using Stream mixins in multi-tenant or parallel execution contexts
    action: Register mixins at the class level without isolation — doing so affects each Stream instances globally, creating
      hidden coupling between unrelated stream pipelines
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Class-level _mixins registry causes one component's mixin registration to impact unrelated Stream objects,
      leading to unpredictable behavior in parallel or multi-tenant scenarios
    derived_from_bd_id: BD-087
  - id: finance-C-149
    when: When using ExchangeOptions commission default for backtesting
    action: Explicitly set commission rate matching your target exchange rather than using the hardcoded 0.003 (0.3%) default;
      different exchanges have vastly different fee structures ranging from 0.01% to 0.5%+
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Hardcoded 0.3% commission significantly distorts backtest profitability calculations; strategies may appear
      profitable at 0.3% but unprofitable at actual exchange fees, or vice versa
    derived_from_bd_id: BD-092
  - id: finance-C-150
    when: When implementing DQN agent training with target network stabilization
    action: Use target network with periodic updates (every N steps) rather than continuous updates or no target network;
      target network must be separate from the online network to prevent moving target problem during gradient descent
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without target network or with continuous updates, Q-values become moving targets causing gradient oscillation
      or divergence; DQN training becomes unstable and policy fails to converge
    derived_from_bd_id: BD-019
  - id: finance-C-151
    when: When implementing RL-based trading strategies with temporal reward considerations
    action: Maintain discount factor gamma in the range [0.99, 0.995] for long-term reward planning; values outside this range
      cause temporal bias in value estimation or gradient vanishing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using gamma=0.9 causes excessive short-term focus where agents ignore profitable position holds; using gamma=0.999
      causes gradient vanishing where temporal differences become negligible, making the agent unable to learn from delayed
      rewards
    derived_from_bd_id: BD-041
  - id: finance-C-152
    when: When implementing reward computation for trading strategies using AdvancedPBR scheme
    action: Apply trade penalty of -0.001 per executed trade and accumulate hold bonus during flat periods; must NOT remove
      these modifiers from reward calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing trade penalties causes the agent to execute excessive small frequent trades, generating commissions
      that exceed profits and producing backtest results that are not reproducible in live trading with real transaction costs
    derived_from_bd_id: BD-050
  - id: finance-C-153
    when: When implementing return calculation and gradient computation for training
    action: Clip returns at ±20% magnitude to bound extreme values from flash crashes or price spikes; values exceeding 20%
      must be clamped to boundary before gradient computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unclipped extreme returns from flash crashes cause exploding gradients that destabilize neural network training,
      resulting in divergent loss functions and unusable policy networks
    derived_from_bd_id: BD-053
  - id: finance-C-154
    when: When optimizing hyperparameters for trading strategies using Optuna
    action: Use at least 100 Optuna trials with TPE sampling for systematic hyperparameter search; fewer trials produce suboptimal
      configurations that degrade strategy robustness
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Insufficient trials (e.g., 20-30) explore less of the hyperparameter space, finding local optima that underperform;
      backtested results from under-optimized parameters appear profitable but fail in live trading
    derived_from_bd_id: BD-054
  - id: finance-C-155
    when: When implementing order size validation and filtering logic
    action: Enforce minimum order size of 1e-6 (dust threshold); reject or round to zero any calculated order size below this
      threshold before submission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Dust orders below 1e-6 cause division-by-zero errors and precision issues in portfolio calculations; they
      also waste computational resources and clutter order books with economically meaningless transactions
    derived_from_bd_id: BD-046
  - id: finance-C-157
    when: When implementing trading environment interface for RL training
    action: Implement Gymnasium.Env compatible interface with standard reset/step methods and proper observation/action space
      definitions; must NOT use proprietary APIs that break ecosystem compatibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-Gymnasium interfaces prevent integration with Stable-Baselines3, RLlib, and other standard RL tooling,
      forcing custom implementation of training loops and hyperparameter tuning that increase development time and introduce
      bugs
    derived_from_bd_id: BD-048
  - id: finance-C-158
    when: When implementing reward scheme for risk-adjusted performance evaluation
    action: Use Sharpe ratio for normalizing returns by volatility when computing rewards; must NOT use raw returns which
      optimize for absolute profit regardless of risk taken
    severity: high
    kind: domain_rule
    modality: must
    consequence: Raw return optimization encourages high-risk strategies that maximize short-term profit but expose capital
      to unacceptable drawdowns; Sharpe-based rewards produce strategies with better risk-adjusted performance that survive
      live trading volatility
    derived_from_bd_id: BD-051
  - id: finance-C-159
    when: When training neural network policies for trading with observation features
    action: Apply Gaussian noise injection at std * 0.01 to observation features during training only; noise magnitude must
      represent plausible measurement noise without overwhelming signal content
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without noise regularization, networks overfit to exact feature values present in training data, causing
      degraded performance when live observations contain realistic measurement variations or slight distribution shifts
    derived_from_bd_id: BD-052
  - id: finance-C-160
    when: When computing total portfolio PnL in backtesting
    action: Assume the framework automatically conserves PnL across realized and unrealized components — the framework does
      not implement PnL conservation verification
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without PnL conservation checking, realized PnL from closed positions and unrealized PnL from open positions
      may not sum correctly, causing silent account discrepancies that accumulate over time and become difficult to reconcile
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-161
    when: When computing portfolio PnL in backtesting
    action: Track realized_pnl from closed positions and unrealized_pnl from open positions separately, then verify total_pnl
      == realized_pnl + unrealized_pnl holds after each position change
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit PnL conservation checking, position changes may cause PnL to leak or double-count, resulting
      in backtest equity that doesn't match actual trading performance
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-162
    when: When computing factor IC (Information Coefficient) for cross-sectional factor analysis
    action: Assume the framework automatically performs IC demean and group alignment — the framework does not implement factor
      IC normalization
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without IC demean and group alignment, raw factor IC values may be biased by cross-group differences, causing
      factor selection based on spurious correlations rather than true predictive power
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-163
    when: When computing factor IC for multi-group factor analysis
    action: Demean IC values within each group before computing cross-sectional IC, and align groups to verify consistent
      factor ranking across market regimes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Factor IC without demean and group alignment produces biased rankings that favor groups with higher absolute
      IC values rather than genuinely better predictors
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-164
    when: When implementing multi-agent trading systems where multiple agents contribute to trading decisions
    action: Assume the framework handles multi-agent decision reconciliation automatically — the framework does not implement
      consensus or veto mechanisms
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit consensus handling, multiple agents may generate conflicting signals that cause contradictory
      orders, resulting in execution failures or unintended position doubles
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-165
    when: When implementing multi-agent trading systems
    action: Implement explicit decision aggregation logic such as majority voting, weighted voting based on agent performance,
      or veto conditions before combining agent signals into actionable orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Multi-agent systems without consensus mechanisms produce divergent signals that cause contradictory trading
      actions, potentially resulting in position conflicts and execution errors
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-166
    when: When using CumMin or CumMax operators with the framework's default skip_na=True setting
    action: Verify that skip_na=True behavior is acceptable for the strategy — if continuous cumulative series are required,
      explicitly set skip_na=False to prevent discontinuities at NA positions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: With skip_na=True, cumulative minimum/maximum can jump discontinuously when NA values are skipped, creating
      statistical artifacts in indicator series that may trigger incorrect trading signals
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-167
    when: When using Rolling operators with the framework's default min_periods=1 setting
    action: Apply a warmup period before trusting Rolling operator outputs — set a minimum of window_size periods before using
      rolling statistics for trading decisions, or explicitly set min_periods=window_size if immediate signals are not needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: With min_periods=1, early rolling values are based on single observations that are statistically unreliable,
      causing erratic early-agent behavior and potentially significant losses from noise-driven trades
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-168
    when: When implementing data collection logic for TensorTrade feed
    action: Assume the framework handles each required data domains — 8 domains (32%) are confirmed missing from the data_collection
      stage
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without domain coverage, backtested strategies may fail silently on missing data fields, causing live trading
      to encounter data gaps that don't appear in backtesting
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-169
    when: When implementing data collection logic for TensorTrade feed
    action: Identify and document the 8 missing domains (32% gap), then implement custom data source adapters or preprocessing
      pipelines to fill each gap before backtesting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing domains cause strategies to receive incomplete data snapshots, leading to incorrect signal generation
      and non-reproducible live trading results
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-170
    when: When using lag operations in TensorTrade feed pipelines for momentum or change detection strategies
    action: Verify that lag=1 matches the strategy requirements; verify streams have sufficient history to avoid None values
      at initialization, or explicitly set lag parameter to required lookback period
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default lag=1 produces None for the first trading step when streams lack historical data, causing momentum
      strategies to miss initial signals and exhibit backtest-live inconsistency
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-171
    when: When generating synthetic price data for backtesting
    action: Use the established 'stochastic' package for Geometric Brownian Motion, Heston stochastic volatility, and Ornstein-Uhlenbeck
      processes to verify mathematically correct price paths; do NOT use ad-hoc random walk implementations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ad-hoc random walk implementations produce statistically incorrect price paths that do not follow theoretical
      dynamics, causing backtest results to diverge significantly from real market behavior
    derived_from_bd_id: BD-002
  - id: finance-C-172
    when: When computing reward signals in the trading environment
    action: Calculate reward as (price_change) * position using the PBR reward function; verify the formula correctly handles
      both long (position>0) and short (position<0) positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect reward calculation provides wrong learning signals to the trading agent, causing the policy to
      optimize for non-existent patterns and fail in live trading
    derived_from_bd_id: BD-016
  - id: finance-C-173
    when: When using the PBR reward function with short positions
    action: Verify that the reward correctly inverts for short positions (position=-1) by testing with synthetic price data
      where short positions should yield positive rewards when price decreases
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: If reward inversion fails for short positions, the agent receives incorrect feedback about short strategy
      performance, leading to wrong position sizing or entry/exit decisions
    derived_from_bd_id: BD-016
  - id: finance-C-174
    when: When designing data feed architecture for live trading
    action: Use placeholder streams to decouple feature definitions from data sources, enabling seamless transitions between
      backtesting and live trading without recompiling the feature DAG
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without placeholder streams, rebuilding the feature DAG at runtime introduces unacceptable latency; hardcoded
      sources lack flexibility for live data injection
    derived_from_bd_id: BD-006
  - id: finance-C-175
    when: When implementing financial calculations for order quantities, prices, and cumulative PnL
    action: Use Decimal type for each monetary values instead of float to verify exact representation of financial quantities;
      this applies to order quantities, prices, costs, and cumulative PnL calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point rounding errors cause cumulative PnL calculations to diverge from actual trading results over
      multiple trades, leading to incorrect strategy performance assessment and wrong capital allocation decisions
    derived_from_bd_id: BD-001
  - id: finance-C-176
    when: When processing timestamps across different data sources or exchanges
    action: Assume the framework handles timezone conversion or normalization — the framework does not implement explicit
      timezone annotation or UTC conversion logic
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit timezone handling, timestamps from different sources may be compared or aggregated without
      normalization, causing incorrect signal generation and trade execution at wrong times
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-177
    when: When simulating order execution with slippage, fill assumptions, and dust thresholds
    action: Treat each orders identically for slippage calculation and assume full immediate fill regardless of order size,
      liquidity, or proximity to dust threshold — this creates false confidence in execution realism
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Identical slippage treatment for all orders underestimates execution costs for large institutional positions
      and overestimates fill probability for orders near the dust threshold, making backtest returns systematically optimistic
    derived_from_bd_id: BD-108
  - id: finance-C-178
    when: When implementing execution simulation for backtesting
    action: Implement order-size-dependent slippage scaling where slippage increases proportionally with order size relative
      to average market volume, and add partial fill modeling for orders exceeding the dust threshold
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Without volume-weighted slippage and partial fill modeling, high-frequency strategies and large institutional
      orders exhibit systematically inflated backtest returns that cannot be reproduced in live trading
    derived_from_bd_id: BD-108
  - id: finance-C-179
    when: When configuring the TensorTrade runtime environment
    action: Verify Python 3.12 or higher is installed; verify using 'python --version' and fail fast if version is below 3.12
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using Python versions below 3.12 may cause compatibility issues with Gymnasium ecosystem and missing dataclass_transform
      features, leading to runtime errors or degraded async performance by 15-20%
    derived_from_bd_id: BD-022
  - id: finance-C-180
    when: When implementing or modifying technical indicators in the feature engineering stage
    action: Use Bollinger Bands with exactly 20-period SMA window and 2 standard deviation bandwidth as specified; do not
      alter parameters for 'optimization' without explicit domain validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing Bollinger Bands parameters without validation alters volatility-adjusted price channels, causing
      mean-reversion signals to fire at incorrect thresholds and leading to systematic trading losses
    derived_from_bd_id: BD-038
  - id: finance-C-181
    when: When implementing or maintaining agent training workflows
    action: Use deprecated built-in agents; must migrate to Ray RLlib for agent training to verify distributed training, GPU
      acceleration, and production-grade scalability
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Using deprecated built-in agents risks maintenance abandonment as research evolves; training performance
      will be limited without distributed training and GPU acceleration capabilities
    derived_from_bd_id: BD-018
  - id: finance-C-182
    when: When implementing or modifying stream/data processing in feature engineering
    action: Maintain the Observable pattern for stream notifications - registered listeners must receive updates automatically;
      do not replace with polling or pull-based evaluation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Replacing Observable pattern with polling introduces latency and inefficiency; pull-based evaluation breaks
      reactive data flow, causing downstream features to use stale market state
    derived_from_bd_id: BD-005
  - id: finance-C-183
    when: When implementing training data selection logic in the agent training pipeline
    action: Verify training data is deliberately selected to match target market conditions - if testing bear market scenarios,
      train on bear market data to verify strategy robustness to downside conditions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Training on mismatched market conditions produces strategies optimized for the wrong regime; a strategy trained
      on bull markets will fail defensively in bear conditions being tested, causing live trading losses
    derived_from_bd_id: BD-056
  - id: finance-C-184
    when: When configuring component default values in the TradingContext system
    action: 'Follow the three-tier resolution order: TradingContext values resolve first, then kwargs, then hardcoded defaults
      - never assume hardcoded values take precedence when context values exist'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrectly assuming hardcoded defaults override context values causes stale configuration to shadow intended
      parameter values, leading to unexpected behavior where components use wrong thresholds or fees
    derived_from_bd_id: BD-088
  - id: finance-C-185
    when: When generating synthetic price data using the framework's stochastic process defaults
    action: Verify that gbm_mu=0.058 (~5.8% annual return) and all_sigma=0.125 (~12.5% annual volatility) match the target
      asset class characteristics before using default parameters
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default stochastic parameters produce synthetic data representing typical stock market behavior; using these
      defaults for assets with different return/volatility profiles generates unrealistic price series that corrupt backtest
      results
    derived_from_bd_id: BD-095
  - id: finance-C-186
    when: When initializing or resetting PBR-based backtesting strategies
    action: Explicitly document that position defaults to -1 (SHORT), creating an implicit short stance that inverts initial
      reward signals — verify this matches strategy intent before training
    severity: high
    kind: operational_lesson
    modality: must
    consequence: With position=-1, positive returns produce negative rewards and vice versa, causing the agent to learn an
      inverted policy before any trades occur; strategies requiring flat or long initialization will exhibit systematically
      wrong behavior
    derived_from_bd_id: BD-093
  - id: finance-C-187
    when: When composing components (RewardScheme, Observer, ActionStrategy) in backtesting environments
    action: Explicitly inject independent clocks or document timing dependencies — verify component timing isolation is intentional
      before assuming independence
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Components sharing a global clock (BD-084) create hidden timing coupling; changing one component's timing
      inadvertently affects all others through shared state, causing subtle bugs that appear in integration but not unit tests
    derived_from_bd_id: BD-101
  - id: finance-C-188
    when: When implementing or extending order execution criteria composition
    action: Use Python operator overloading (__and__, __or__, __xor__) for composing Criteria objects — do NOT replace with
      explicit methods (Criteria.and(), Criteria.or())
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The fluent API design relies on operator overloading for readable boolean expressions like criteria1 & criteria2;
      replacing with explicit methods breaks the design contract and existing code patterns throughout the codebase
    derived_from_bd_id: BD-098
  - id: finance-C-189
    when: When building and training machine learning models in the framework
    action: Assume the framework declares explicit convergence criteria for iterative processes — the framework does not implement
      convergence criteria declaration capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without convergence criteria declaration, iterative processes may run indefinitely or stop prematurely without
      clear indication, causing training loops to hang or produce suboptimal model parameters
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-190
    when: When implementing model training and feature engineering pipelines
    action: Explicitly declare convergence criteria in model configuration (e.g., max_iterations, tolerance_threshold, evaluation_interval)
      and validate convergence status after each training run
    severity: high
    kind: domain_rule
    modality: must
    consequence: Undefined convergence behavior causes iterative processes to either run indefinitely or terminate prematurely
      without detection, leading to wasted compute or undertrained models
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-191
    when: When implementing feature engineering for neural network inputs
    action: Apply tanh() normalization to clip features to [-1, 1] range — use hyperbolic tangent function which compresses
      rather than hard-clips features with absolute values exceeding 1, preserving relative magnitude information while preventing
      gradient explosion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using unbounded features or hard-clipping causes gradient explosion during backpropagation, leading to numerical
      instability, NaN losses, or model divergence that produces meaningless predictions
    derived_from_bd_id: BD-031
  - id: finance-C-192
    when: When implementing agent training loops with validation monitoring
    action: Implement validation-based early stopping with patience parameter in range 3-20 iterations — halt training when
      validation loss stops improving within the patience window to prevent overfitting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Training without early stopping causes the model to overfit to training data, resulting in poor generalization
      where validation and live trading performance significantly underperform training metrics
    derived_from_bd_id: BD-032
  - id: finance-C-193
    when: When constructing observations and features for multi-asset trading models
    action: Convert each features to scale-invariant forms (returns, percentages, normalized values) — raw price values must
      be excluded and each feature must be converted to returns or normalized forms before observation construction to verify
      model generalizes across assets with different price scales
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using raw price features causes the model to overfit to asset-specific price levels, leading to poor generalization
      where the model fails to generalize to different assets or price ranges in live trading
    derived_from_bd_id: BD-030
  - id: finance-C-194
    when: When implementing market regime detection and conditional strategy adaptation
    action: Use three-state market regime classification with ±5% thresholds and 30-day trailing cumulative return — classify
      Bull when trailing 30-day return exceeds +5%, Bear when below -5%, and Sideways otherwise, requiring at least 5% directional
      movement to trigger regime transition
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misaligned regime thresholds cause inappropriate strategy selection for current market conditions, leading
      to applying bullish strategies during bear markets or vice versa, resulting in significant losses during regime transitions
    derived_from_bd_id: BD-034
  - id: finance-C-195
    when: When implementing wallet-based trading pair generation logic
    action: Include base_instrument in exchange trading pairs — the framework explicitly excludes base_instrument from pair
      generation as an invariant, treating base as the numeraire
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Including base_instrument in trading pairs creates redundant pair explosion and breaks the numeraire invariant,
      causing portfolio valuation and order routing inconsistencies
    derived_from_bd_id: BD-097
  - id: finance-C-196
    when: When implementing walk-forward training with random episode starts
    action: Constrain random episode start to remain within the same temporal fold (train/val/test) — episode boundaries must
      not cross fold boundaries, especially for 30-day splits where leakage magnitude is proportionally significant
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Random episode start with 30-day temporal split can place episode boundaries mid-window, crossing train/val
      boundaries and creating subtle data leakage within the walk-forward framework, making out-of-sample testing invalid
    derived_from_bd_id: BD-107
  - id: finance-C-197
    when: When implementing DQN training logic in tensortrade
    action: Use multiprocessing for parallel environment interactions with shared replay buffer aggregating samples across
      workers — do not replace with sequential single-process training
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Sequential single-process training reduces data collection throughput by worker count factor, making sample
      collection prohibitively slow for complex trading environments; near-linear speedup from parallelization is essential
      for practical training times
    derived_from_bd_id: BD-057
  - id: finance-C-198
    when: When configuring DQN training optimization parameters
    action: Use Nadam optimizer with Huber loss together — do not substitute with Adam or standard Adam variants; do not substitute
      Huber loss with MSE or MAE loss
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing Nadam with Adam removes Nesterov momentum benefits causing slower convergence; replacing Huber
      with MSE reintroduces outlier sensitivity causing unstable Q-value learning during early training phases with large
      temporal-difference errors
    derived_from_bd_id: BD-058
  - id: finance-C-199
    when: When implementing the critic network loss function for A2C agent training
    action: Use Huber loss for critic network value estimation — do not substitute with MSE or MAE
    severity: high
    kind: domain_rule
    modality: must
    consequence: MSE causes large gradient updates from Q-value outliers in noisy financial data leading to training instability;
      MAE has insufficient gradient variation near optimum causing slow convergence in critic network learning
    derived_from_bd_id: BD-062
  - id: finance-C-200
    when: When implementing the policy network gradient descent for A2C agent training
    action: Use Adam optimizer for gradient descent with its adaptive learning rate mechanism and bias correction — do not
      substitute with SGD with momentum or RMSprop
    severity: high
    kind: domain_rule
    modality: must
    consequence: SGD with momentum requires careful manual learning rate tuning unsuitable for non-stationary financial data;
      RMSprop lacks momentum component causing suboptimal convergence in deep neural network training for trading policy learning
    derived_from_bd_id: BD-064
  - id: finance-C-201
    when: When implementing advantage estimation for A2C policy gradient computation
    action: Use exponentially weighted returns for advantage estimation — do not substitute with Monte Carlo returns or TD(0)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Monte Carlo returns introduce high variance in financial environments with noisy data causing unstable policy
      updates; TD(0) introduces bias from truncated value estimates causing systematic underestimation of long-term rewards
      in trading scenarios
    derived_from_bd_id: BD-065
  - id: finance-C-202
    when: When implementing or modifying epsilon-greedy exploration logic in TensorTrade reinforcement learning agents
    action: Use exponential decay schedule for epsilon parameter to verify smooth transition from exploration to exploitation
      during training
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without exponential decay, epsilon may remain high causing continued random exploration that prevents policy
      convergence, or drop too quickly leading to premature convergence to suboptimal policies
    derived_from_bd_id: BD-067
  - id: finance-C-203
    when: When implementing DQN gradient updates in deep reinforcement learning for trading decisions
    action: Use Nadam optimizer for DQN gradient updates to combine Nesterov accelerated gradient with Adam adaptive learning
      rates for faster convergence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without Nadam optimizer, DQN may suffer from slower convergence, suboptimal Q-value estimates, or training
      instability in high-dimensional parameter spaces common in trading decisions
    derived_from_bd_id: BD-068
  - id: finance-C-204
    when: When implementing the target network mechanism in Deep Q-Network for trading
    action: Periodically copy weights from policy network to target network at fixed intervals to prevent the moving target
      problem
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without periodic target network weight copies, Q-value updates chase changing target values causing training
      divergence and unstable Q-value estimates that lead to poor trading decisions
    derived_from_bd_id: BD-070
  - id: finance-C-205
    when: When implementing epsilon decay for exploration in DQN training
    action: Use exponential epsilon decay schedule to provide smooth continuous reduction in random exploration throughout
      DQN training
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using linear decay causes under-exploration early or over-exploration late in training, leading to either
      wasted computation on random actions or premature convergence to suboptimal policies
    derived_from_bd_id: BD-071
  - id: finance-C-206
    when: When implementing position-based return reward computation in trading environments
    action: Compute PBR reward as position held times price change to align reward signal directly with actual profit/loss
      from trading positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative reward formulas instead of position times price change creates misaligned reward signals
      that don't reflect absolute profit targets, leading to strategies optimizing relative returns rather than actual trading
      profits
    derived_from_bd_id: BD-072
  - id: finance-C-207
    when: When implementing stochastic process generation for derivative pricing or path-dependent simulations
    action: Generate Wiener process increments using normal (Gaussian) distribution — do not replace with uniform or other
      non-normal distributions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-normal distributions (e.g., uniform) for Wiener process increments violates the mathematical definition
      of Brownian motion and produces incorrect derivative prices and risk measures
    derived_from_bd_id: BD-074
  - id: finance-C-208
    when: When implementing interest rate models for yield curve modeling and interest rate derivative pricing
    action: Use Cox-Ingersoll-Ross (CIR) model for mean-reverting interest rates — the square-root diffusion term ensures
      positivity of rates, do not use Vasicek which allows negative rates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Vasicek model instead of CIR allows negative interest rates which are mathematically possible but economically
      meaningless, causing incorrect pricing of interest rate derivatives
    derived_from_bd_id: BD-075
  - id: finance-C-209
    when: When implementing trade execution in backtesting
    action: Apply uniform random slippage between zero and the maximum slippage amount to each trade executions — do not use
      perfect fills (zero slippage) or deterministic slippage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Perfect fills in backtesting assume all orders execute at exact target prices, masking execution costs that
      cause live trading performance to fall significantly below backtested results
    derived_from_bd_id: BD-081
  - id: finance-C-210
    when: When splitting historical data into train/validation/test sets for strategy development
    action: Split data using temporal (chronological) split — verify test set period comes after validation set, which comes
      after training set, preserving time ordering
    severity: high
    kind: domain_rule
    modality: must
    consequence: Random data splitting introduces look-ahead bias, causing the model to learn from future information and
      producing performance estimates that cannot be replicated in live trading
    derived_from_bd_id: BD-082
  - id: finance-C-211
    when: When implementing reinforcement learning policy updates for trading agent training
    action: Use PPO algorithm with clipped probability ratios to limit policy update magnitude — do not remove clipping mechanism
      or replace with unclipped policy gradient methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing clipping allows arbitrarily large policy updates that destabilize training, causing the agent to
      converge to suboptimal or oscillating policies that perform poorly in live trading
    derived_from_bd_id: BD-083
  - id: finance-C-212
    when: When implementing or modifying order creation logic in the order management system
    action: Lock funds IMMEDIATELY upon order creation, making locked quantity unavailable for subsequent orders; implement
      explicit fund release mechanisms for rejected, expired, or cancelled orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying fund locking to execution-time creates over-commitment risk when multiple pending orders accumulate;
      in live trading this causes order rejections due to insufficient funds, breaking backtest-live consistency
    derived_from_bd_id: BD-090
  - id: finance-C-213
    when: When configuring PBR (Position-Based Return) reward function with non-zero default positions
    action: Use default position=-1 (SHORT) when PBR reward computes price_change × position without compensating for initial
      market direction; the sign inversion creates hostile learning where upward moves produce negative rewards
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: With default short position, upward price moves trigger negative rewards and downward moves trigger positive
      rewards, causing RL agents to initially learn inverted trading behaviors that must be unlearned, wasting training iterations
      and potentially failing to converge
    derived_from_bd_id: BD-100
  - id: finance-C-214
    when: When implementing order path_id coordination for fund unlock operations
    action: Verify path_id assignment uses a commutative merge strategy (e.g., sorted concatenation or hash ordering) instead
      of left-operand-wins rule; validate that locked funds release correctly regardless of order composition sequence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-commutative path_id causes fund unlock failures when orders are composed in different sequences, creating
      orphaned locks that permanently reserve capital; backtest equity becomes artificially reduced, and live trading may
      freeze available funds
    derived_from_bd_id: BD-102
  - id: finance-C-215
    when: When initializing a new backtesting episode with PBR position-based reward
    action: Set initial position to 0 (FLAT) rather than -1 (SHORT) to avoid implicit market direction assumption; if position=-1
      is required for strategy logic, explicitly document that first-step rewards are inverted and adjust PBR formula to compensate
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default short position creates an inverted reward signal for the first trading steps, causing RL agents to
      learn selling during upward momentum before unlearning, reducing sample efficiency and potentially degrading final strategy
      performance
    derived_from_bd_id: BD-100
  - id: finance-C-216
    when: When managing fund locks across multiple pending orders in the order management system
    action: 'Implement explicit fund lock lifecycle tracking: on order creation lock funds, on execution unlock and settle,
      on rejection/timeout/cancellation explicitly release locks; add monitoring for orphaned locks that persist beyond expected
      timeout'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without explicit lock lifecycle management, rejected or expired orders may leave funds permanently locked,
      reducing available capital below expected levels and causing backtest results to diverge from live trading behavior
    derived_from_bd_id: BD-090
  - id: finance-C-217
    when: When training Conv1D+GRU models using walk-forward testing with clipped return distributions
    action: Include tail scenarios in training data or use unclipped returns for policy learning, ensuring the model encounters
      returns exceeding ±20% during training
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Training on artificially bounded ±20% returns creates distribution mismatch where the policy never learns
      responses to extreme moves; real deployment encounters flash crashes or rallies exceeding 20%, causing the learned policy
      to make inappropriate decisions that destroy portfolio value
    derived_from_bd_id: BD-105
  - id: finance-C-218
    when: When implementing episode reset logic in the backtesting framework
    action: Clear or isolate the ledger transaction history on episode reset; verify ledger.clear() is called or ledger instances
      are isolated per episode
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ledger singleton persists transaction records across episode boundaries; portfolio analysis reads stale transactions
      from previous episodes mixed with current episode, corrupting per-episode performance attribution and potentially causing
      incorrect margin calculations
    derived_from_bd_id: BD-106
  - id: finance-C-219
    when: When computing percentage changes on financial streams for backtesting
    action: Set fill_method=None or handle missing periods explicitly; do not use pandas default fill_method='pad' which propagates
      future values backward
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Default fill_method='pad' in pct_change creates look-ahead bias by forward-filling known future values before
      computing percentage changes; backtest results become artificially inflated and non-reproducible in live trading
    derived_from_bd_id: BD-GAP-005
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
