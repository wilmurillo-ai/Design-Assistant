resources:
  packages:
  - name: pandas
    version_pin: ==1.5.3
  - name: numpy
    version_pin: ==1.24.4
  - name: matplotlib
    version_pin: '>=2'
  - name: requests
    version_pin: ==2.31.0
  - name: scipy
    version_pin: '>=1.3.0'
  - name: scikit-learn
    version_pin: '>1.4.2'
  - name: pytest
    version_pin: '>=8.3'
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When validating duration inputs in survival analysis
    action: Reject negative or zero durations with ValueError
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative durations are mathematically invalid in survival analysis, causing incorrect hazard rate calculations
      and producing meaningless survival curves that misrepresent actual time-to-event distributions
    stage_ids:
    - data_input
  - id: finance-C-002
    when: When processing event_observed array for survival models
    action: Cast event_observed to integer type and then to boolean
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid event values (non-0/1, non-boolean) will produce undefined behavior in likelihood calculations, potentially
      causing silent errors in survival function estimation
    stage_ids:
    - data_input
  - id: finance-C-003
    when: When accepting user-provided DataFrame in fit() method
    action: Create a shallow copy of the input DataFrame before extraction operations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The original DataFrame will be permanently modified by .pop() operations on duration/event/weights columns,
      corrupting user data and violating data isolation principles
    stage_ids:
    - data_input
  - id: finance-C-004
    when: When selecting the censoring type for survival analysis
    action: Automatically detect censoring type from the fit method name decorator
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using wrong censoring type will produce incorrect likelihood functions, leading to fundamentally wrong parameter
      estimates for the survival model
    stage_ids:
    - data_input
  - id: finance-C-007
    when: When checking for missing or infinite values in input arrays
    action: Raise TypeError for NaN values and TypeError for infinite values before model fitting
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NaN or Inf values in durations, events, or covariates will cause numerical errors in likelihood computations,
      producing NaN/Inf in all model outputs
    stage_ids:
    - data_input
  - id: finance-C-008
    when: When validating entry times against duration values
    action: Raise ValueError when entry time is greater than or equal to the duration
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Entry times >= duration create logically impossible scenarios where subjects enter after the observed event
      time, corrupting at-risk population calculations
    stage_ids:
    - data_input
  - id: finance-C-009
    when: When validating lower and upper bounds for interval-censored data
    action: Raise ValueError when upper_bound is less than lower_bound
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid interval bounds will produce undefined survival probability calculations and potentially negative
      time intervals in the likelihood function
    stage_ids:
    - data_input
  - id: finance-C-010
    when: When accepting weights in Cox proportional hazard fitting
    action: Accept non-positive weight values
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Zero or negative weights will distort the weighted likelihood function, causing undefined behavior in the
      partial log-likelihood gradient
    stage_ids:
    - data_input
  - id: finance-C-011
    when: When implementing survival function S(t) estimation using Kaplan-Meier estimator
    action: Verify S(t) is monotonically non-increasing across each timeline values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violation produces mathematically invalid survival curves where probability of survival increases over time,
      making results meaningless for downstream statistical inference and clinical decision-making
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-012
    when: When fitting any non-parametric survival curve estimator
    action: Set S(0) = 1 by initializing survival_function_ values to 1.0 at the first timeline point
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Survival probability at time zero must equal 1 by definition; violating this breaks interpretation as a probability
      distribution and invalidates median survival time calculations
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-013
    when: When constructing the survival table from event data
    action: Include columns for 'at_risk', 'removed', and 'observed' counts in the event_table DataFrame
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing these columns breaks the at_risk count visualization, risk-set calculations, and prevents downstream
      statistical tests that depend on life table structure
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-014
    when: When computing confidence interval bounds for survival estimates
    action: Verify CI lower bound >= 0 and CI upper bound <= 1 using fillna(1.0) and formula constraints
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Confidence intervals outside [0,1] bounds represent invalid probability ranges that cannot be interpreted
      as statistical confidence bounds for survival probabilities
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-015
    when: When validating input durations and event indicators
    action: Check that input arrays contain no NaN or Inf values before processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NaN/Inf values in input data propagate through calculations causing undefined survival estimates, failed
      convergence, or silently incorrect results
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-021
    when: When validating interval censoring lower and upper bounds
    action: Raise ValueError if any upper_bound < lower_bound
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid interval bounds (where upper < lower) represent logically impossible observations that would corrupt
      NPMLE estimation
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-022
    when: When validating birth times against death times
    action: Raise ValueError if any birth_time >= death_time
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Birth time at or after death time represents impossible observation where subject cannot be at risk, corrupting
      at-risk set calculations
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-023
    when: When handling late entry subjects with early truncation
    action: Allow zero net population in first half of timeline without switching to Breslow-Fleming-Harrington estimator
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Zero at-risk count causes undefined survival probability estimates (division by zero), producing NaN values
      that break downstream analysis
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-028
    when: When validating event_observed consistency with interval bounds
    action: Verify lower_bound == upper_bound iff event_observed == 1 for interval-censored data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inconsistent event indicators corrupt the NPMLE likelihood function, producing invalid survival estimates
      that don't correspond to any valid data configuration
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-029
    when: When fitting survival regression models with non-positive durations
    action: use zero or negative duration values in the duration column
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Non-positive durations violate the mathematical foundation of survival analysis, causing undefined log-likelihood
      and incorrect hazard calculations. The model will raise ValueError at lifelines/utils/__init__.py:1081.
    stage_ids:
    - regression_fitting
  - id: finance-C-030
    when: When fitting Cox PH models with Newton-Raphson optimization
    action: verify log-likelihood increases monotonically during iterations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: If log-likelihood decreases during Newton-Raphson iterations, the optimization is diverging, leading to incorrect
      coefficient estimates and invalid model convergence. The algorithm checks relative log-likelihood decrease at coxph_fitter.py:1577.
    stage_ids:
    - regression_fitting
  - id: finance-C-031
    when: When computing variance_matrix_ from fitted regression models
    action: verify the variance matrix diagonal contains only non-negative values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative values on the variance matrix diagonal indicate a non-positive-definite covariance matrix, which
      produces invalid standard errors and unreliable statistical inference. Warning is issued at lifelines/fitters/__init__.py:2092-2101.
    stage_ids:
    - regression_fitting
  - id: finance-C-033
    when: When preparing input data for regression fitting
    action: verify duration, event, and covariate data contain no NaN or Inf values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NaN or Inf values in input data corrupt the log-likelihood computation and gradient calculations, causing
      the Newton-Raphson optimization to produce NaN deltas or fail to converge. Check functions at lifelines/utils/__init__.py:1171-1190.
    stage_ids:
    - regression_fitting
  - id: finance-C-034
    when: When using entry times with delayed entry in survival regression
    action: have entry times greater than or equal to corresponding duration times
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Entry times exceeding duration times create impossible temporal relationships where subjects enter the study
      after they are supposed to experience the event, corrupting risk set calculations and producing invalid likelihood contributions.
    stage_ids:
    - regression_fitting
  - id: finance-C-042
    when: When preparing data for Newton-Raphson Efron optimization in Cox PH
    action: sort data by ascending duration time T before calling the fitter
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: The Efron tie-handling algorithm assumes data sorted by T in ascending order. Unsorted data corrupts risk
      set and tie calculations, producing incorrect gradient and Hessian values and invalid coefficients.
    stage_ids:
    - regression_fitting
  - id: finance-C-043
    when: When computing variance matrix for regression fitters
    action: call _compute_variance_matrix after _fit_model completes successfully
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Computing variance_matrix_ before the Hessian is properly computed from the fitted model produces invalid
      standard errors, corrupting statistical inference and hypothesis tests.
    stage_ids:
    - regression_fitting
  - id: finance-C-049
    when: When computing confidence intervals for fitted parameters
    action: derive CIs from variance_matrix_ via asymptotic normal theory (Wald intervals)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Confidence intervals will be incorrect if derived using pooled variance, which assumes no censoring and is
      anti-conservative, leading to overly narrow intervals that misrepresent uncertainty
    stage_ids:
    - statistical_inference
  - id: finance-C-050
    when: When fitting log-rank test for censored survival data
    action: use Greenwood variance formula that accounts for censoring in variance computation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using pooled variance that ignores censoring produces anti-conservative standard errors, increasing Type
      I error rate and causing false positive significance claims
    stage_ids:
    - statistical_inference
  - id: finance-C-051
    when: When computing p-values for parameter significance
    action: calculate p-values using chi-squared distribution with 1 degree of freedom on squared z-statistic
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect p-value computation leads to wrong statistical conclusions about variable significance, causing
      either false positives or missed discoveries in survival analysis
    stage_ids:
    - statistical_inference
  - id: finance-C-054
    when: When performing k-fold cross-validation scoring
    action: 'use only supported scoring methods: ''log_likelihood'' or ''concordance_index'''
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Using unsupported scoring methods causes NotImplementedError exceptions during cross-validation, breaking
      the model evaluation pipeline
    stage_ids:
    - statistical_inference
  - id: finance-C-061
    when: When using summary DataFrame from fitted survival models
    action: verify summary contains coef, se, and confidence interval columns (lower/upper bounds)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing required columns prevents proper statistical inference and model interpretation, breaking downstream
      analysis workflows
    stage_ids:
    - statistical_inference
  - id: finance-C-062
    when: When performing statistical inference on fitted models
    action: require fitted model to have variance_matrix_, log_likelihood_, and params_ attributes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing required model attributes causes AttributeError exceptions during statistical inference, preventing
      computation of standard errors, p-values, and confidence intervals
    stage_ids:
    - statistical_inference
  - id: finance-C-069
    when: When predicting survival functions for individuals using fitted lifelines models
    action: verify survival function values are monotonically non-increasing over time from S(0)=1 toward 0
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-monotonic survival predictions violate the fundamental mathematical definition of survival functions,
      causing invalid probability distributions and misleading risk assessments for patients or subjects
    stage_ids:
    - prediction
  - id: finance-C-070
    when: When predicting survival functions for new individuals at time zero
    action: return S(0)=1 for every individual prediction, representing 100% survival at study entry
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: S(0) ≠ 1 violates the survival function definition S(0) = P(T > 0) = 1, indicating incorrect probability
      calculations that would invalidate all downstream risk predictions
    stage_ids:
    - prediction
  - id: finance-C-071
    when: When predicting median survival times for individuals with survival curves that never cross S(t)=0.5
    action: return np.inf to indicate median is undefined due to insufficient follow-up time
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Returning a finite median when S(t) > 0.5 for all observed times would falsely imply a defined median where
      none exists, leading to incorrect clinical or business decisions based on incomplete data
    stage_ids:
    - prediction
  - id: finance-C-075
    when: When making predictions with new data using regression models
    action: provide covariate values matching the columns or formula specified in the regressors parameter during fit()
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing or mismatched covariate columns cause formulaic library errors or produce incorrect predictions with
      wrong covariate transformations, invalidating survival estimates
    stage_ids:
    - prediction
  - id: finance-C-081
    when: When implementing qq_plot for fitted survival models
    action: pass only KnownModelParametricUnivariateFitter instances with _KNOWN_MODEL=True
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: qq_plot raises TypeError with non-parametric or unknown models, causing the visualization to fail for Kaplan-Meier
      or Cox models that lack closed-form distributions
    stage_ids:
    - visualization
  - id: finance-C-082
    when: When computing confidence interval bounds for survival curves
    action: use the log-transform Greenwood formula with fillna(1.0) for numerical stability
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: CI bands may exceed [0, 1] bounds without proper log-transform, violating probability domain constraints
      and producing mathematically invalid confidence intervals
    stage_ids:
    - visualization
  - id: finance-C-083
    when: When fitting interval-censored survival models
    action: validate that each lower_bound values are <= corresponding upper_bound values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Fitting with invalid interval bounds (lower_bound > upper_bound) produces undefined survival estimates and
      corrupts downstream visualization output
    stage_ids:
    - visualization
  - id: finance-C-090
    when: When validating confidence interval labels
    action: verify ci_labels parameter is a length-2 array/list
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Passing incorrectly formatted ci_labels causes index errors when plotting confidence intervals, leading to
      visualization failures
    stage_ids:
    - visualization
  - id: finance-C-097
    when: When processing input data for survival curve estimation, the durations (T) and events (E) must be numeric
    action: convert durations and event_observed to numeric types using pd.to_numeric or raise ValueError if conversion fails
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-numeric duration or event data causes silent failures or NaN propagation through downstream Kaplan-Meier
      estimation, producing meaningless survival curves
  - id: finance-C-099
    when: When computing the survival table from raw data, birth times must be less than or equal to death times
    action: enforce birth_time <= death_time constraint, raising ValueError if violated
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: When birth_time exceeds death_time, the at-risk population calculations become negative or produce NaN values,
      corrupting the survival table structure
  - id: finance-C-101
    when: When creating survival table from events, each inputs must have equal length
    action: assert that groups, durations, event_observed, and birth_times arrays have the same length
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched array lengths cause index misalignment, producing incorrect at-risk counts and corrupted survival
      probabilities across all time points
  - id: finance-C-102
    when: When preparing covariates for regression fitting, non-numeric columns must be rejected or explicitly handled
    action: validate that each covariate columns are numeric (not categorical, datetime, or object types), raising TypeError
      for non-numeric columns
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-numeric covariates cause numerical computation failures or silent coercion to NaN, producing undefined
      coefficient estimates and invalid variance matrices
  - id: finance-C-104
    when: When computing interval-censored data, upper_bound must be greater than or equal to lower_bound
    action: raise ValueError if any upper_bound < lower_bound, ensuring valid interval specifications
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid intervals (upper < lower) cause undefined likelihood calculations and NPMLE convergence failures,
      producing NaN survival probabilities
  - id: finance-C-106
    when: When performing multivariate log-rank test, each input arrays (event_durations, groups, event_observed) must have
      equal length
    action: assert equal lengths and raise ValueError if mismatched, preventing index misalignment in chi-square calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Length mismatches cause incorrect group assignments and corrupted expected-observed calculations, producing
      invalid test statistics and p-values
  - id: finance-C-109
    when: When predicting survival from fitted Cox model, new data must have the same covariate columns as training data
    action: validate that predict methods receive DataFrames with columns matching the fitted model's regressors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing or extra covariates cause dimension mismatch in linear predictor calculations, producing undefined
      or incorrect survival predictions
  - id: finance-C-127
    when: When implementing survival analysis models with lifelines
    action: Use non-negative numeric arrays for duration_col (T) — lifelines does not allow zero or negative durations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-positive durations cause undefined behavior in survival function estimation, producing NaN or infinite
      hazard values that corrupt downstream statistical inference
  - id: finance-C-128
    when: When encoding event status in survival analysis data
    action: Use boolean or 0/1 integer encoding for event_col (E) — lifelines casts to int then bool internally
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-binary event encoding causes incorrect likelihood calculations, as the MLE assumes binary events where
      1=observed and 0=censored
  - id: finance-C-131
    when: When fitting parametric survival models
    action: Enforce _MIN_PARAMETER_VALUE=1e-9 as lower bound for each parametric model parameters — prevents negative parameters
      that would make hazard undefined
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Parameters below 1e-9 cause numerical issues in hazard/survival function computation, producing NaN gradients
      and preventing optimization convergence
  - id: finance-C-133
    when: When processing input data with potential missing or infinite values
    action: Validate that durations, events, covariates, and weights contain no NaN or Inf values — these cause undefined
      behavior in optimization
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NaN/Inf values in inputs cause undefined gradient computations, leading to ConvergenceError or silently incorrect
      parameter estimates
  - id: finance-C-151
    when: When fitting Cox proportional hazards models
    action: Rely on autograd for gradient computation — Cox PH uses partial likelihood which has no closed-form solution for
      derivatives; must use scipy optimization with numerical gradient approximations instead
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Autograd cannot compute gradients for Cox PH partial likelihood; attempting to use it will cause fitting
      failures or incorrect gradients, making survival coefficient estimates unreliable
    derived_from_bd_id: BD-009
  - id: finance-C-155
    when: When implementing CoxTimeVaryingFitter fitting logic
    action: Use maximum likelihood estimation for CoxTimeVaryingFitter — do not switch to partial likelihood as it produces
      biased estimates with time-varying covariates
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Partial likelihood estimation with time-varying covariates produces systematically biased hazard ratios,
      leading to incorrect conclusions about covariate effects in survival analysis
    derived_from_bd_id: BD-014
  - id: finance-C-166
    when: When implementing prediction methods for survival models
    action: Auto-fill missing covariates with zeros for predictions — predictions must provide explicit values for each covariates
      with non-zero coefficients; baseline hazard covariates must be provided even if coefficient equals zero
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Auto-filling zeros produces silent incorrect predictions when baseline covariates have non-zero expected
      values, making model predictions unreliable without raising errors
    derived_from_bd_id: BD-018
  - id: finance-C-202
    when: When implementing or refactoring any fit method in the lifelines fitters module
    action: Begin every fit method with df=df.copy() to create an isolated copy of the input DataFrame — this defensive copying
      pattern must be applied at each 24+ fit entry points to prevent external mutations from affecting the fitter's internal
      state
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Removing defensive copying allows external DataFrame mutations to propagate into the fitter, causing subtle
      reproducibility issues where the same data produces different results depending on prior operations
    derived_from_bd_id: BD-099
  regular:
  - id: finance-C-005
    when: When normalizing strata column specification
    action: Convert single-strata string input to a list using _to_list_or_singleton utility
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: String strata will cause iteration errors in downstream stratified analysis, as the code expects a list for
      consistent iteration patterns
    stage_ids:
    - data_input
  - id: finance-C-006
    when: When processing weights column for weighted MLE
    action: Cast weights to float64 dtype for numerical precision in maximum likelihood estimation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Integer or lower-precision weights will cause numerical instability in MLE optimization, potentially producing
      incorrect parameter estimates with larger variance
    stage_ids:
    - data_input
  - id: finance-C-016
    when: When implementing interval censoring with NPMLE
    action: Use expectation-maximization algorithm since NPMLE has no closed-form solution
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Attempting to find a closed-form solution will fail or produce incorrect results; EM algorithm is the standard
      approach for interval-censored survival analysis
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-017
    when: When caching survival table computations
    action: Compute survival_table once per fit and store in event_table attribute to avoid O(n) recomputation
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Repeated recomputation of event table for repeated access wastes computation; caching provides efficient
      O(1) access at cost of memory storage
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-018
    when: When entry times are not explicitly provided
    action: Default entry times to zeros assuming each subjects entered at time zero (immediate entry)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect entry time defaults would cause biased survival estimates for left-truncated data, violating the
      assumption of proper risk set construction
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-019
    when: When user provides a custom timeline array
    action: Use user-provided timeline; otherwise default to unique event times for estimation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect timeline handling causes survival estimates at wrong time points, breaking interpolation and comparison
      across fitted models
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-020
    when: When calculating confidence intervals for interval-censored data
    action: Claim confidence interval computation is supported for fit_interval_censoring - it is currently commented out
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting CI bands for interval-censored fits will receive no confidence intervals, violating documented
      expectations and causing silent failures in downstream analysis
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-024
    when: When providing floating-point weights to Kaplan-Meier estimator
    action: Warn user that naive variance estimates are biased and recommend Monte Carlo estimation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Non-integer weights (e.g., propensity scores) bias variance estimates if naive Greenwood formula is used,
      leading to incorrect statistical inference and invalid confidence intervals
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-025
    when: When setting convergence tolerance for NPMLE EM algorithm
    action: Default tolerance to 1e-7 for EM iterations unless user specifies different value
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Insufficient tolerance causes premature convergence with biased survival estimates; excessive tolerance wastes
      computation without meaningful accuracy gain
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-026
    when: When the entry parameter is provided to fit methods
    action: Accept entry parameter silently - it is documented as not yet supported for standard fit
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Silently ignoring entry times causes incorrect survival estimates for left-truncated data where subjects
      enter the study after time zero
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-027
    when: When computing the cumulative hazard estimate
    action: Set cumulative hazard to 0 at first event time and verify non-decreasing behavior
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative or decreasing cumulative hazard violates the mathematical definition of cumulative hazard as a non-decreasing
      function of time
    stage_ids:
    - survival_curve_estimation
  - id: finance-C-032
    when: When fitting parametric survival models
    action: verify each fitted parameters are greater than or equal to 1e-9
    severity: high
    kind: domain_rule
    modality: must
    consequence: Parametric survival models require positive parameters for valid hazard/survival calculations. Parameters
      below 1e-9 can cause numerical instability in log-hazard and cumulative hazard computations, leading to NaN values in
      predictions.
    stage_ids:
    - regression_fitting
  - id: finance-C-035
    when: When fitting Cox PH models with the Newton-Raphson algorithm
    action: exceed 500 maximum iterations without achieving convergence
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Exceeding max_steps=500 indicates the optimization has failed to converge, producing unreliable coefficient
      estimates. The algorithm terminates and issues ConvergenceWarning at lifelines/fitters/coxph_fitter.py:1582-1585.
    stage_ids:
    - regression_fitting
  - id: finance-C-036
    when: When using ridge regularization in parametric regression models
    action: use ridge_regression with penalizer matrix (c1+c2)*I for stability
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without proper ridge regularization, collinear covariates cause near-singular Hessian matrices, leading to
      numerical instability in matrix inversion and unreliable coefficient estimates. The ridge penalty adds (c1+c2)*I to
      X'X before inversion.
    stage_ids:
    - regression_fitting
  - id: finance-C-037
    when: When computing gradients for parametric regression with extreme covariate values
    action: use safe_exp instead of np.exp to prevent numerical overflow
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using np.exp with extreme covariate values produces overflow to inf, causing NaN values in gradient computations
      and preventing convergence. safe_exp clips exp to MAX = log(float.max) - 75, preserving differentiability.
    stage_ids:
    - regression_fitting
  - id: finance-C-038
    when: When setting Newton-Raphson convergence precision for Cox PH fitting
    action: use precision >= 1e-07 and r_precision >= 1e-9 for adequate convergence
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Insufficient precision thresholds (e.g., 1e-5) can cause premature termination of the Newton-Raphson algorithm,
      producing poorly estimated coefficients with high norm(delta) values.
    stage_ids:
    - regression_fitting
  - id: finance-C-039
    when: When fitting Cox models to data with complete or quasi-complete separation
    action: apply regularization or remove perfectly predictive covariates to prevent divergence
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Complete separation causes the log-likelihood to approach zero while delta remains large, leading to non-unique
      maximum likelihood estimates. The algorithm warns at coxph_fitter.py:1589-1594 but may produce invalid inference.
    stage_ids:
    - regression_fitting
  - id: finance-C-040
    when: When detecting near-zero variance in covariates during regression fitting
    action: warn about low variance predictors that may harm convergence
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Near-constant covariates (variance < 1e-4) cause numerical instability in matrix inversion and inflated standard
      errors, degrading model reliability. Warning issued at lifelines/utils/__init__.py:1090-1120.
    stage_ids:
    - regression_fitting
  - id: finance-C-041
    when: When fitting Cox models with covariates having large means
    action: center covariates to mean values closer to zero for numerical stability
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Covariates with mean > 1e4 cause numerical precision issues in exp(X @ beta) calculations, potentially leading
      to overflow or underflow in score computations and slower convergence.
    stage_ids:
    - regression_fitting
  - id: finance-C-044
    when: When handling tied event times in Cox proportional hazards estimation
    action: use Efron's method for tied times rather than Breslow approximation
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Breslow approximation produces biased coefficient estimates when ties are present, especially with high tie
      frequency. Efron's method provides more accurate likelihood approximation without O(n^2) complexity.
    stage_ids:
    - regression_fitting
  - id: finance-C-045
    when: When fitting regression models to censored data
    action: present coefficient confidence intervals as precise point estimates
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Survival regression confidence intervals assume correct model specification and proportional hazards. Presenting
      coefficients without proper uncertainty quantification misleads users about the reliability of covariate effects.
    stage_ids:
    - regression_fitting
  - id: finance-C-046
    when: When interpreting survival model predictions for decision-making
    action: claim that hazard ratios indicate causal effects without proper causal inference
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Cox PH hazard ratios represent associations conditional on covariates, not necessarily causal effects. Claiming
      causality leads to incorrect policy decisions or medical interventions based on observational survival analysis.
    stage_ids:
    - regression_fitting
  - id: finance-C-047
    when: When Newton-Raphson convergence issues occur in Cox PH fitting
    action: ignore ConvergenceWarning messages and proceed with inference
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Proceeding with inference after non-convergence produces unreliable coefficient estimates, invalid standard
      errors, and misleading p-values. Non-converged models should not be used for decision-making or publication.
    stage_ids:
    - regression_fitting
  - id: finance-C-048
    when: When using non-integer weights in regression fitting
    action: set robust=True to obtain correct variance estimates for non-integer weights
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Non-integer weights (e.g., propensity scores, inverse probability weights) invalidate naive variance estimates.
      Using robust=True computes sandwich estimators that produce valid inference for weighted survival analysis.
    stage_ids:
    - regression_fitting
  - id: finance-C-052
    when: When validating concordance index computation
    action: verify C-index ranges from 0 to 1 with 0.5 representing random prediction baseline
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misinterpretation of C-index range leads to incorrect model performance assessment, potentially accepting
      models that perform no better than random guessing
    stage_ids:
    - statistical_inference
  - id: finance-C-053
    when: When using Wald-based confidence intervals for survival models
    action: apply confidence intervals derived from asymptotic normal theory to small sample data without caveats
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Small samples invalidate asymptotic assumptions, producing unreliable confidence intervals that may not cover
      the true parameter value at the stated level, leading to incorrect statistical inferences
    stage_ids:
    - statistical_inference
  - id: finance-C-055
    when: When selecting model via AIC comparison
    action: interpret lower AIC values as indicating better model fit for selection purposes
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using incorrect AIC interpretation (higher is better) leads to selecting suboptimal models with worse predictive
      performance
    stage_ids:
    - statistical_inference
  - id: finance-C-056
    when: When computing concordance index on predicted risk scores
    action: compute C-index on any monotonic transformation of predicted scores (hazards, survival times, etc.)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incorrect input to concordance index function causes misaligned rankings, as C-index only works correctly
      with monotonic transformations of true risk scores
    stage_ids:
    - statistical_inference
  - id: finance-C-057
    when: When determining statistical significance of coefficients
    action: use p-value threshold of 0.05 for 95% significance level
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using incorrect significance threshold leads to wrong conclusions about which covariates significantly affect
      survival outcomes
    stage_ids:
    - statistical_inference
  - id: finance-C-058
    when: When interpreting concordance index results
    action: recognize that C-index of 0.5 indicates random predictions with no discriminative ability
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Accepting models with C-index near 0.5 as useful leads to deploying models with no predictive value, wasting
      resources on non-discriminative tools
    stage_ids:
    - statistical_inference
  - id: finance-C-059
    when: When comparing models using AIC
    action: select the model with lowest AIC value among candidate models
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Selecting models with higher AIC values results in suboptimal model choices with worse information-theoretic
      fit
    stage_ids:
    - statistical_inference
  - id: finance-C-060
    when: When validating input data for statistical inference
    action: check for NaN values and raise ValueError if detected before computing statistics
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN values in input cause statistical computations to fail or produce invalid results, corrupting model inference
      output
    stage_ids:
    - statistical_inference
  - id: finance-C-063
    when: When generating formal hypothesis test results
    action: return StatisticalResult objects containing test statistic and p-value
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Improper return types break integration with downstream analysis that expects StatisticalResult API, causing
      AttributeError on .p_value or .test_statistic access
    stage_ids:
    - statistical_inference
  - id: finance-C-064
    when: When reporting concordance index for model evaluation
    action: present C-index as proof of live trading performance or predictive accuracy guarantee
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest C-index as guaranteed live performance misleads stakeholders, as backtest results do
      not account for market regime changes, execution slippage, or transaction costs
    stage_ids:
    - statistical_inference
  - id: finance-C-065
    when: When interpreting p-value significance
    action: equate statistical significance (p < 0.05) with practical or clinical significance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Equating statistical significance with practical significance leads to overinterpreting small p-values from
      large samples where effect sizes are negligible, potentially guiding harmful decisions
    stage_ids:
    - statistical_inference
  - id: finance-C-066
    when: When using AIC for model selection
    action: claim AIC-selected model is definitively superior for prediction or causation
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: AIC-based model selection is a relative measure based on in-sample fit and complexity; it does not guarantee
      out-of-sample predictive performance or causal validity
    stage_ids:
    - statistical_inference
  - id: finance-C-067
    when: When handling variance matrix computation for non-invertible Hessian
    action: fall back to pseudo-inverse (pinv) and issue ApproximationWarning when standard inverse fails
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without fallback to pseudo-inverse, model fitting crashes on collinear or near-singular data; without warning,
      users remain unaware that variance estimates are approximated
    stage_ids:
    - statistical_inference
  - id: finance-C-068
    when: When variance matrix diagonal contains negative values or NaNs
    action: issue StatisticalWarning to alert users about unreliable variance estimates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Proceeding silently with negative variances or NaNs produces meaningless confidence intervals and p-values,
      leading to completely incorrect statistical conclusions
    stage_ids:
    - statistical_inference
  - id: finance-C-072
    when: When predicting survival outcomes for individuals with different covariate values
    action: respect the sign of fitted regression coefficients where higher X values produce lower S(t) for positive beta
      coefficients
    severity: high
    kind: domain_rule
    modality: must
    consequence: Predictions that don't respect coefficient signs would contradict the fitted model's interpretation, producing
      nonsensical risk rankings where higher-risk individuals appear to have better survival
    stage_ids:
    - prediction
  - id: finance-C-073
    when: When computing percentile predictions using predict_percentile() or predict_median()
    action: issue ApproximationWarning when timeline points don't exactly match fitted timeline, indicating approximation
      is used
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Silent approximation without warning could lead users to treat approximate results as precise, especially
      problematic when timeline granularity affects percentile accuracy for clinical decisions
    stage_ids:
    - prediction
  - id: finance-C-074
    when: When computing expected value via predict_expectation()
    action: treat results as meaningful if the survival function doesn't converge to 0 at infinity
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Unconverged survival functions produce meaningless infinite or inflated expectation values that could mislead
      resource allocation or treatment planning decisions
    stage_ids:
    - prediction
  - id: finance-C-076
    when: When predicting with times=None parameter
    action: use the fitted model's timeline as the default prediction time points rather than a custom grid
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using a different timeline than training causes interpolation errors and inconsistent comparisons between
      individuals predicted at different time grids
    stage_ids:
    - prediction
  - id: finance-C-077
    when: When using AFT (Accelerated Failure Time) models with ancillary parameters
    action: provide ancillary DataFrame matching primary DataFrame dimensions when predicting survival for parametric AFT
      models
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched ancillary parameters produce incorrect accelerated/slowed survival curves that don't reflect the
      specified covariate effects on time-to-event
    stage_ids:
    - prediction
  - id: finance-C-078
    when: When using CoxPHFitter or Cox models with stratification
    action: verify prediction data contains stratification column values present in original training data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Attempting prediction with unseen strata values causes StatError and prevents model scoring for new population
      subgroups not represented in training
    stage_ids:
    - prediction
  - id: finance-C-079
    when: When presenting survival predictions to end users or stakeholders
    action: claim predictions are exact or guarantee actual survival outcomes for specific individuals
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting model predictions as guaranteed outcomes misleads stakeholders about prediction uncertainty and
      ignores the probabilistic nature of survival analysis, violating statistical best practices
    stage_ids:
    - prediction
  - id: finance-C-080
    when: When using predict_percentile with default p=0.5 for median calculation
    action: issue ApproximationWarning since percentile is computed from discretized survival function rather than exact parametric
      solution
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unwarned approximation can produce median estimates with error exceeding clinical thresholds, particularly
      with coarse timeline discretization affecting 0.5 crossing detection
    stage_ids:
    - prediction
  - id: finance-C-084
    when: When mapping model class names to scipy distributions in qq_plot
    action: use string replacement pattern _class_name.replace('Fitter', '').replace('AFT', '').lower() for known distributions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect distribution name mapping causes NotImplementedError for valid parametric models like GeneralizedGammaFitter
      that have defined scipy mappings
    stage_ids:
    - visualization
  - id: finance-C-085
    when: When adding at-risk counts to survival plots
    action: call plt.tight_layout() after add_at_risk_counts to prevent label clipping
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: At-risk count annotations overlap with the survival curve plot without tight_layout, making the visualization
      unreadable and the annotations useless
    stage_ids:
    - visualization
  - id: finance-C-086
    when: When computing at-risk counts in interval-censored data plots
    action: use event_table for interval-censored models before it is fully initialized
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Accessing event_table on interval-censored models before NPMLE estimation completes causes AttributeError
      since interval-censored models do not build standard event tables
    stage_ids:
    - visualization
  - id: finance-C-087
    when: When visualizing interval-censored lifetimes
    action: limit the number of individuals to fewer than 25 to avoid visual clutter
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Displaying more than 25 interval-censored individuals produces overlapping bars that obscure individual trajectories,
      making the plot uninterpretable
    stage_ids:
    - visualization
  - id: finance-C-089
    when: When computing at-risk counts from event tables
    action: use at_risk - removed for the default case (at_risk_count_from_start_of_period=False)
    severity: high
    kind: domain_rule
    modality: must
    consequence: At-risk counts mismatch the survival table at-risk column when using wrong subtraction formula, causing misleading
      clinical/administrative reports
    stage_ids:
    - visualization
  - id: finance-C-091
    when: When computing qq_plot quantiles for interval-censored data
    action: use mean of cumulative density lower bounds for valid quantile computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: QQ plot produces invalid or NaN quantiles for interval-censored data when not properly averaging the lower
      bounds, breaking the probability-probability comparison
    stage_ids:
    - visualization
  - id: finance-C-092
    when: When presenting survival curve plots
    action: claim that plotted survival curves represent exact population parameters without uncertainty acknowledgment
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Survival curve plots show estimated functions with confidence intervals - presenting them as definitive values
      without the CI bands misleads stakeholders about the precision of estimates
    stage_ids:
    - visualization
  - id: finance-C-093
    when: When interpreting QQ plot output
    action: claim that deviation from y=x line provides formal statistical test result
    severity: low
    kind: claim_boundary
    modality: must_not
    consequence: QQ plots show visual deviance patterns but do not provide p-values or formal goodness-of-fit tests - they
      are exploratory tools only
    stage_ids:
    - visualization
  - id: finance-C-094
    when: When mapping WeibullAFTFitter to scipy distribution for QQ plot
    action: strip both 'Fitter' and 'AFT' suffixes before lowercase conversion
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: QQ plot fails for WeibullAFTFitter with NotImplementedError due to unmatched distribution name when 'AFT'
      suffix is not properly stripped
    stage_ids:
    - visualization
  - id: finance-C-095
    when: When handling NaN values in qq_plot quantiles
    action: replace [-np.inf, 0, np.inf] values with np.nan and dropna before plotting
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unfiltered infinite or zero quantiles cause matplotlib to produce uninterpretable QQ plots with scattered
      points outside the valid range
    stage_ids:
    - visualization
  - id: finance-C-096
    when: When adding at-risk counts with rows_to_show parameter
    action: validate rows_to_show contains only valid values ['At risk', 'Censored', 'Events']
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Invalid row names in rows_to_show cause assertion errors or silent failures when computing at-risk count
      annotations
    stage_ids:
    - visualization
  - id: finance-C-098
    when: When calculating survival curves, negative duration values must be rejected as invalid
    action: allow negative duration values that may represent invalid data or coding errors
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Negative durations produce mathematically invalid survival probability calculations, corrupting downstream
      statistical inference and visualization
  - id: finance-C-100
    when: When computing event table for survival analysis, weights must be positive if provided
    action: validate weights > 0, raising ValueError if any weight is <= 0
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero or negative weights distort the at-risk population counts and survival probability calculations, producing
      biased or infinite hazard rates
  - id: finance-C-103
    when: When fitting Cox proportional hazards model, strata columns must be valid categorical or numeric values in the DataFrame
    action: validate strata columns exist in the DataFrame and are not used as covariates, raising ValueError for invalid
      strata
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid strata specification causes dimension mismatch in stratified hazard calculations, producing undefined
      baseline survival functions
  - id: finance-C-105
    when: When calculating log-rank test statistics, event_observed must be binary (0 or 1) for each subject
    action: convert event_observed to boolean/int type, treating any non-zero value as event observed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-binary event indicators cause incorrect at-risk calculations and invalid chi-square test statistics,
      producing misleading p-values for survival comparisons
  - id: finance-C-107
    when: When computing Fleming-Harrington test weights, both p and q parameters must be non-negative
    action: validate p >= 0 and q >= 0, raising ValueError for negative weight parameters
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative p or q values produce undefined weight calculations (power of negative survival probability), causing
      NaN in test statistic computation
  - id: finance-C-108
    when: When computing proportional hazard test, fitted Cox model params_ and variance_matrix_ must be properly defined
    action: validate that params_ is a Series with covariate names as index and variance_matrix_ is a DataFrame with matching
      dimensions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Undefined or malformed params/variance structures cause failures in scaled Schoenfeld residual calculations
      and invalid proportional hazard test results
  - id: finance-C-110
    when: When computing baseline survival from Cox model, timeline must be extracted from observed durations if not explicitly
      provided
    action: use coalesce() to prefer explicit timeline parameter over unique training durations, ensuring temporal alignment
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect timeline causes misaligned baseline survival calculations, producing survival probabilities at
      wrong time points
  - id: finance-C-111
    when: When plotting survival curves, NaN values in survival_function_ must not cause plotting failures
    action: allow forward-fill of NaN values using pandas reindex with method='pad' to handle missing time points
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: NaN values in survival function cause plotting library failures or empty visualizations, preventing visual
      inspection of survival analysis results
  - id: finance-C-112
    when: When computing conditional survival after time s, conditional_after parameter must have length equal to number of
      subjects
    action: validate conditional_after array length matches DataFrame row count, reshaping appropriately for cumulative hazard
      subtraction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Dimension mismatch between conditional_after and new data causes broadcasting errors or silent incorrect
      conditional survival probabilities
  - id: finance-C-113
    when: When computing partial effects on outcome for visualization, covariate values must produce valid survival probability
      ranges (0 to 1)
    action: clip survival function predictions to [1e-12, 1-1e-12] range to avoid log(0) or log(negative) errors in plotting
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Extreme covariate values produce survival probabilities outside valid range, causing numerical overflow in
      log transformations during visualization
  - id: finance-C-114
    when: When computing restricted mean survival time, upper bound t must be within the timeline range of the survival function
    action: warn user if t exceeds maximum timeline value, suggesting refitting with extended timeline
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: RMST calculated with t beyond available timeline produces underestimated mean survival time, biasing clinical
      decision-making
  - id: finance-C-115
    when: When computing log-likelihood for statistical tests, weights must be normalized by sum(weights) to ensure proper
      likelihood scaling
    action: divide log-likelihood calculations by weights.sum() to produce comparable likelihood values across different weight
      configurations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unnormalized likelihoods cause inflated log-likelihood values, producing incorrect AIC/BIC comparisons and
      misleading model selection
  - id: finance-C-116
    when: When computing variance matrix for fitted parameters, the Hessian matrix must be positive definite for valid standard
      errors
    action: check for convergence failures and NaN in variance matrix, raising ConvergenceError with diagnostic suggestions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-positive-definite variance matrix produces undefined standard errors and confidence intervals, preventing
      statistical inference on coefficients
  - id: finance-C-117
    when: When computing concordance index for model evaluation, predicted survival must have proper temporal ordering relative
      to actual durations
    action: verify concordance_index calculation uses correctly ordered (time, event) pairs, with ties handled appropriately
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect temporal ordering produces invalid concordance ratios, misrepresenting model's predictive discrimination
      ability
  - id: finance-C-118
    when: When using interval-censored data with NPMLE, the timeline must include both lower_bound and upper_bound unique
      values
    action: concatenate unique values from lower_bound and upper_bound arrays to form the timeline for survival function reconstruction
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incomplete timeline causes NPMLE algorithm to miss critical interval boundaries, producing incorrect Turnbull
      interval estimates
  - id: finance-C-119
    when: When fitting models with penalizer terms, the penalizer matrix must be positive semi-definite to ensure convex optimization
    action: construct penalizer as penalizer * identity_matrix to verify positive-definiteness, preventing optimization failures
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-positive-definite penalizer causes scipy.optimize.minimize to fail or converge to invalid solutions,
      producing undefined coefficients
  - id: finance-C-120
    when: When computing baseline hazard using Breslow's method for Cox model, strata must produce independent baseline hazards
    action: validate strata columns produce sufficient sample sizes in each stratum for stable baseline hazard estimation
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Sparse strata cause undefined baseline hazard at many time points, producing NaN in predicted survival for
      subjects in those strata
  - id: finance-C-121
    when: When computing left-censored survival estimates, the first entry time must be less than the minimum observation
      time
    action: validate that late-entry (entry > 0) cases do not cause at-risk population to become zero or negative during early
      periods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero at-risk population during early periods causes division-by-zero in survival probability calculations,
      producing infinite or NaN estimates
  - id: finance-C-122
    when: When checking proportional hazard assumption, Schoenfeld residuals require unique training DataFrame index
    action: validate training_df.index.is_unique is True before computing scaled Schoenfeld residuals, raising IndexError
      otherwise
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-unique index causes incorrect residual assignments to observations, producing invalid proportional hazard
      test results
  - id: finance-C-123
    when: When computing expected value via trapezoidal integration, the survival function must have finite values at each
      timeline points
    action: clip survival function values to avoid inf in integration, using quad with specified epsabs/epsrel tolerances
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Infinite survival function values cause numerical integration failures, producing NaN or infinite expected
      lifetime estimates
  - id: finance-C-124
    when: When computing k-fold cross validation, the event_col must be created or preserved if each individuals are uncensored
    action: add default event_col='E' with value 1.0 when event_col is None, ensuring uncensored data works in CV folds
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing event_col in CV folds causes KeyError when accessing event observations, preventing cross-validation
      of survival models
  - id: finance-C-125
    when: When computing time-varying coefficient models, overlapping intervals must be detected and rejected
    action: validate that time intervals within each subject are non-overlapping and monotonically increasing using groupby
      level checks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Overlapping intervals cause duplicate contributions to partial log-likelihood, producing biased coefficient
      estimates with underestimated standard errors
  - id: finance-C-126
    when: When predicting median or percentile survival times, the survival function must cross the target probability within
      the timeline
    action: return np.inf when survival function does not reach the qth percentile within available timeline
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Missing percentile in timeline produces undefined median survival time, requiring clear handling to avoid
      silent incorrect results
  - id: finance-C-129
    when: When using weighted observations in survival models
    action: Cast weights to float64 dtype before fitting — weighted MLE requires float precision for convergence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Integer weights cause numerical instability in gradient-based optimization, leading to non-convergence or
      incorrect parameter estimates in weighted Cox PH models
  - id: finance-C-130
    when: When constructing confidence intervals for survival estimates
    action: Use alpha=0.05 (95% CI) as the default confidence level — this is the hardcoded default across each fitters
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Changing alpha default would break backward compatibility; users expecting 95% CI would get incorrect confidence
      bounds
  - id: finance-C-132
    when: When accessing model attributes before fitting
    action: Call fit() method before accessing any model attributes — __getattr__ proxy raises AttributeError until model
      is fitted
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Accessing pre-fit attributes raises AttributeError, preventing users from accidentally using unfitted models
      for prediction or inference
  - id: finance-C-134
    when: When handling entry times in delayed entry (left-truncated) survival data
    action: Verify entry times are strictly less than duration times — entry >= duration represents impossible observations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Entry times >= duration cause negative at-risk populations in Kaplan-Meier/Nelson-Aalen estimation, producing
      invalid survival function values outside [0,1]
  - id: finance-C-135
    when: When using time-varying covariate survival models
    action: Verify interval start/stop times for each subject are non-overlapping and monotonically increasing — overlapping
      intervals cause undefined likelihood
    severity: high
    kind: domain_rule
    modality: must
    consequence: Overlapping intervals produce undefined likelihood contributions and biased parameter estimates in Cox time-varying
      models
  - id: finance-C-136
    when: When computing exponential functions in gradient-based optimization
    action: Use safe_exp() instead of np.exp() — safe_exp clips inputs to MAX=log(finfo.max)-75 to prevent overflow that produces
      NaN gradients
    severity: high
    kind: domain_rule
    modality: must
    consequence: Direct np.exp() on large values produces inf, causing NaN in gradients and preventing convergence of Cox
      PH MLE optimization
  - id: finance-C-137
    when: When returning survival/hazard DataFrames from any fitter
    action: Index output DataFrames by timeline (sorted event times) — this is the canonical index for survival functions,
      cumulative hazards, and confidence intervals
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Non-timeline indexing breaks predict() interpolation and plotting functions that rely on timeline-lookup
      semantics
  - id: finance-C-138
    when: When organizing stratification groups in Cox PH models
    action: Store strata as a list even for single-element stratification — normalize to list for consistent downstream processing
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Non-list strata (e.g., string or tuple) causes iteration errors in stratification logic and incorrect stratum-specific
      baseline hazard estimation
  - id: finance-C-139
    when: When indexing regression coefficients from Cox/survival regression models
    action: Preserve the original column order from input X.columns in coefficient indices — do NOT alphabetically reorder
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Alphabetical reordering breaks interpretability when users map coefficients to input variables by position
      rather than name
  - id: finance-C-140
    when: When presenting or reporting survival analysis model results to users
    action: Claim that survival analysis estimates from historical data equal expected future outcomes — historical patterns
      may not persist in future populations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make critical decisions (clinical treatment, policy, business planning) based on inflated confidence
      from assuming historical patterns persist unchanged
  - id: finance-C-141
    when: When using the Cox proportional hazards model
    action: Claim that Cox PH model estimates are valid when the proportional hazards assumption is violated — hazard ratios
      vary over time in non-proportional scenarios
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Time-varying hazard ratios lead to misleading covariate effect estimates; the single hazard ratio misrepresents
      early vs late survival differences
  - id: finance-C-142
    when: When fitting survival models to censored data and reporting results
    action: Claim that statistical significance (p-values) from censored survival models equals causal effect — censoring
      mechanism may be informative
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Informative censoring (where censoring is related to survival probability) biases all parameter estimates;
      p-values become misleading
  - id: finance-C-143
    when: When users build systems based on this blueprint for survival analysis
    action: Claim the system supports real-time streaming data processing — lifelines is designed for batch analysis of fixed
      datasets
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting streaming capabilities experience failures; lifelines lacks data ingestion pipelines, connection
      handling, or incremental fitting
  - id: finance-C-144
    when: When users build machine learning pipelines using this blueprint
    action: Claim the system supports deep learning integration, automatic feature engineering, or sklearn-style transformers
      — lifelines provides standalone statistical estimators
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting AutoML or deep learning integration build broken pipelines; lifelines models are not scikit-learn
      compatible out-of-the-box
  - id: finance-C-145
    when: When users attempt causal inference beyond standard Cox regression
    action: Claim the system supports causal inference methods beyond Cox models — lifelines provides estimation, not causal
      identification
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Causal inference requires additional identification assumptions beyond conditional survival estimation; lifelines
      cannot establish causation
  - id: finance-C-146
    when: When detecting complete separation in survival regression data
    action: Warn users about complete separation (when a covariate perfectly predicts event occurrence) — this causes unbounded
      likelihood and non-convergence
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Complete separation produces infinitely large coefficients and standard errors, making inference impossible
      without regularization or data changes
  - id: finance-C-147
    when: When detecting low-variance covariates in regression models
    action: Warn users about very low variance covariates (var < 1e-4) — these provide minimal information and may harm convergence
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Near-constant covariates cause numerical instability in matrix inversion for variance estimation, leading
      to convergence warnings or failures
  - id: finance-C-148
    when: When modeling with parametric survival distributions
    action: Verify cumulative hazard is always non-negative and non-decreasing — parametric forms may violate monotonicity
      for poor parameter values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-monotone cumulative hazard violates survival analysis mathematical constraints, producing invalid survival
      functions S(t) not in [0,1]
  - id: finance-C-149
    when: When defending against data mutation in survival analysis workflows
    action: Use defensive df.copy() at fit entry points — prevents original DataFrame mutation when lifelines extracts/modifies
      columns
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: DataFrame mutation in-place causes unexpected side effects in pipelines that reuse the same DataFrame reference
      after fitting
  - id: finance-C-150
    when: When implementing gradient computation for log-likelihood functions in parametric survival models
    action: Use autograd or equivalent automatic differentiation framework for computing gradients — avoid closed-form derivative
      implementations that introduce derivation errors and require maintenance for custom distributions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Manual derivative implementations are error-prone and become outdated when distribution log-likelihood functions
      are modified; backtest results may exhibit numerical instability without automatic differentiation
    derived_from_bd_id: BD-009
  - id: finance-C-152
    when: When accessing survival_table multiple times through different operations (plotting, CI, median)
    action: Rely on the cached survival_table result from the first fit call — avoid manual cache invalidation or re-fitting
      to recompute; cache is invalidated only on new fit() calls
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Repeated survival_table accesses reuse the cached value; forcing recomputation defeats the caching mechanism
      and causes O(n) redundant calculations for each access, slowing down plotting and summary operations
    derived_from_bd_id: BD-004
  - id: finance-C-153
    when: When implementing parametric survival model fitting with log-space computations
    action: Set _MIN_PARAMETER_VALUE = 1e-9 to prevent numerical underflow in log-space computations and avoid log(0) and
      division by zero errors in likelihood calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting the minimum parameter bound causes log(0) errors and division by zero exceptions during likelihood
      calculations, breaking the optimization process entirely
    derived_from_bd_id: BD-027
  - id: finance-C-154
    when: When implementing stratified survival model fitting
    action: Fit separate models per stratum with independent baseline hazards — do not attempt to share baseline hazards across
      strata during model refactoring
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sharing baseline hazards across strata changes the statistical interpretation and produces incorrect stratum-specific
      results, leading to wrong conclusions about group differences in survival analysis
    derived_from_bd_id: BD-012
  - id: finance-C-156
    when: When validating parametric survival model outputs
    action: Verify that cumulative hazard functions are monotonically increasing and positive before using them for downstream
      calculations — check cumulative_hazard >= 0 and monotonic increase
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Non-monotonic or negative cumulative hazard values indicate model fitting failure and produce invalid survival
      probability estimates in downstream analysis
    derived_from_bd_id: BD-095
  - id: finance-C-157
    when: When visualizing or reporting confidence intervals from Kaplan-Meier estimates with small sample sizes (n<50)
    action: Rely solely on asymptotic normal-based confidence intervals (Wald-type) for small-sample survival analysis — the
      combination of Wald CIs and log-transformed bands amplifies undercoverage
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Small-sample confidence intervals using asymptotic normal theory combined with log-transformation systematically
      misrepresent uncertainty, with true coverage far below nominal levels
    derived_from_bd_id: BD-109
  - id: finance-C-158
    when: When computing median survival times from Kaplan-Meier estimates with heavy censoring
    action: Verify that the survival curve actually crosses S(t)=0.5 before interpreting the median — check for step functions
      that jump through 0.5 without landing on it, which returns NaN
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Median survival time returns infinity or NaN when survival probability never drops below 0.5 due to heavy
      censoring, but downstream code may misinterpret these as valid finite results
    derived_from_bd_id: BD-019
  - id: finance-C-159
    when: When implementing custom prediction methods for AalenAdditiveFitter after normalization
    action: Denormalize coefficients using original standard deviations when making predictions — coefficients must be multiplied
      by original_std to recover interpretable scale (coefficient * original_std for each covariate)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using normalized coefficients for predictions produces incorrectly scaled hazard contributions, silently
      generating wrong risk estimates on a different scale than original covariates
    derived_from_bd_id: BD-110
  - id: finance-C-160
    when: When selecting hazard models for survival analysis
    action: Use HAFT model only when hazard accumulation is believed to be non-linear (e.g., disease progression with accumulating
      damage) — do not use interchangeably with Weibull which assumes proportional hazards
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using HAFT when proportional hazards hold (or vice versa) produces systematically incorrect survival estimates
      with wrong hazard shapes and misinterpreted covariate effects
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-161
    when: When implementing or modifying survival curve confidence interval calculations
    action: Use Greenwood's exponential formula for Kaplan-Meier variance estimation — the exponential transformation ensures
      variance estimates remain positive and provides standard error for confidence intervals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing Greenwood's formula with a simplified variance estimator produces incorrect confidence intervals
      that do not account for censoring, leading to invalid statistical inference and hypothesis tests
    derived_from_bd_id: BD-032
  - id: finance-C-162
    when: When implementing interval-censored data analysis
    action: Use NPMLE (Turnbull estimator) for interval-censored data — this produces the unique maximum likelihood estimate
      under the nonparametric model by handling time intervals without converting to point estimates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing NPMLE with midpoint imputation introduces systematic bias by assuming events occur at interval
      midpoints, distorting survival estimates for interval-censored data
    derived_from_bd_id: BD-033
  - id: finance-C-163
    when: When implementing LOWESS smoothing for PH check plots
    action: Use plot_n_bootstraps=15 for LOWESS smoothing in Schoenfeld residual plots — this provides stable smoothing while
      maintaining reasonable plotting performance for diagnostic purposes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fewer than 10 bootstraps produces unstable LOWESS curves that fail to capture distributional variability,
      making PH assumption diagnostics unreliable; using 50+ provides publication quality but slower performance
    derived_from_bd_id: BD-035
  - id: finance-C-164
    when: When implementing Cox proportional hazards model optimization
    action: Use Newton-Raphson with Efron tie handling for Cox model convergence — this provides fast quadratic convergence
      to the maximum partial likelihood estimate with accurate handling of tied event times
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing Newton-Raphson with EM algorithm reduces convergence speed for typical Cox models; replacing Efron
      with Breslow approximation reduces accuracy when tie fraction exceeds 5%
    derived_from_bd_id: BD-037
  - id: finance-C-165
    when: When implementing log-rank test variance estimation
    action: Use Greenwood variance for log-rank test — Greenwood's formula properly accounts for censoring in variance estimation,
      producing valid tests; pooled variance must not be used as it assumes no censoring and is anti-conservative
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using pooled variance instead of Greenwood's formula inflates Type I error rate (anti-conservative), causing
      false positive significance claims in log-rank tests when censoring is heavy
    derived_from_bd_id: BD-017
  - id: finance-C-167
    when: When initializing survival model fitters
    action: Use alpha=0.05 as the default confidence interval level (producing 95% CIs) — this aligns with scipy, statsmodels,
      and R survival package conventions for interoperability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing default alpha away from 0.05 alters statistical inference behavior, producing non-standard confidence
      intervals that differ from established survival analysis conventions
    derived_from_bd_id: BD-022
  - id: finance-C-168
    when: When handling tied event times in Cox proportional hazards models
    action: Use Efron's method for handling ties in Cox PH model — Efron's method approximates the partial likelihood by averaging
      over tied event times, providing better accuracy than Breslow when tie fraction exceeds 5%
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Breslow approximation instead of Efron's method reduces accuracy when multiple subjects fail at the
      same time, producing biased coefficient estimates in datasets with significant tied event times
    derived_from_bd_id: BD-023
  - id: finance-C-169
    when: When implementing censoring type detection and model fitting methods
    action: Maintain consistent dispatch mechanism for censoring type detection — do not mix method-name string parsing (fit_right_censoring
      vs fit_left_censoring) with enum-as-decorator patterns (CensoringType); choose one paradigm and apply it consistently
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mixing string-based dispatch and enum-based state machines creates architectural inconsistency that confuses
      developers and risks refactoring bugs where one pattern is used where the other is expected
    derived_from_bd_id: BD-115
  - id: finance-C-170
    when: When implementing or refactoring mixture cure model optimization in ParametricUnivariateFitter
    action: Set cured fraction bounds to (0, 1) to constrain the cured fraction parameter within valid probability space —
      do not remove or relax bounds to (-0.1, 1.1) or unbounded
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without (0, 1) bounds, optimization may explore invalid probability spaces producing negative or exceeding-1
      cured fractions that are mathematically impossible, corrupting model estimates
    derived_from_bd_id: BD-041
  - id: finance-C-171
    when: When estimating survival curves with CoxPHFitter using cluster_col for clustered or correlated survival times
    action: Use Huber sandwich estimator for variance estimation instead of model-based variance — do not use naive variance
      estimation which underestimates uncertainty in clustered data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Naive variance underestimates standard errors for clustered survival times, leading to incorrect confidence
      intervals and potentially invalid statistical conclusions that could cause wrong treatment or investment decisions
    derived_from_bd_id: BD-055
  - id: finance-C-172
    when: When implementing or refactoring ParametricUnivariateFitter optimization routines
    action: Use L-BFGS-B as the default optimization method — do not replace with unbounded methods like Nelder-Mead that
      cannot enforce parameter bounds required for valid distribution parameters (scale > 0, shape >= 0)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unbounded optimizers may converge to invalid parameter values (negative scale, invalid shape) causing NaN
      or infinite likelihood values and completely invalid model fits
    derived_from_bd_id: BD-025
  - id: finance-C-173
    when: When implementing or refactoring SplineFitter for survival modeling
    action: Use cubic splines with natural boundary conditions (linear extrapolation beyond boundary knots) — do not use polynomial
      splines with clamped boundaries which produce endpoint oscillations corrupting tail survival estimates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Polynomial splines with clamped boundaries exhibit oscillations at endpoints, producing physically implausible
      survival probability estimates near 0 or 1 and invalidating tail extrapolation
    derived_from_bd_id: BD-028
  - id: finance-C-174
    when: When implementing or refactoring iteration logic for event processing
    action: Preserve adaptive batch/single iteration mode selection based on tie fraction threshold — use batch iteration
      for datasets with >1% tied events, single iteration for datasets with fewer ties
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing adaptive tie-based mode selection causes either inefficient batch processing for untied data or
      incorrect results for high-tie datasets when single iteration mode is applied inappropriately
    derived_from_bd_id: BD-039
  - id: finance-C-175
    when: When implementing survival curve comparison with weighted log-rank test
    action: Use default inverse-variance log-rank weights for proportional hazards testing; for early-diverging curves use
      Peto-Wilcoxon weights, for late-diverging curves use Tarone-Ware weights
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using unweighted or incorrectly weighted log-rank tests reduces statistical power for detecting survival
      differences, potentially missing significant risk factors in hazard-based comparisons
    derived_from_bd_id: BD-043
  - id: finance-C-176
    when: When configuring Cox proportional hazards model with non-smooth baseline hazard
    action: Use piecewise constant baseline hazard only when the proportional hazards assumption is violated or when interval-specific
      hazard estimates are explicitly needed; for standard Cox PH analysis, use smooth baseline hazard models (e.g., Breslow
      estimator)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Piecewise constant baseline hazard models non-proportional hazards, producing fundamentally different hazard
      ratios than standard Cox PH; using it for proportional hazards data leads to unnecessarily complex models with interval-specific
      coefficients that may confuse interpretation
    derived_from_bd_id: BD-085
  - id: finance-C-177
    when: When using ParametricRegressionFitter to estimate survival models with heterogeneous covariate scales
    action: Understand that the model normalizes covariates by standard deviation before optimization and then un-normalizes
      parameters for reporting; do not directly interpret coefficient magnitudes without accounting for this scaling
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without accounting for normalization, users misinterpret coefficient magnitudes as relative importance; a
      coefficient of 0.5 on a normalized covariate has different practical meaning than on a raw covariate, leading to incorrect
      investment or treatment decisions based on wrong parameter priorities
    derived_from_bd_id: BD-106
  - id: finance-C-178
    when: When running Kaplan-Meier survival estimation on clinical datasets with delayed patient enrollment
    action: Explicitly provide entry_times parameter for each observation instead of relying on default zeros; if entry times
      are not available, acknowledge potential left-truncation bias in results interpretation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Default entry times of zero combined with Kaplan-Meier's assumption of immediate entry creates silent left-truncation
      bias; clinical studies with delayed enrollment produce systematically overestimated survival probabilities that cannot
      be reproduced in practice
    derived_from_bd_id: BD-108
  - id: finance-C-179
    when: When interpreting mixture cure model results for financial or clinical outcomes
    action: Recognize that the model distinguishes two cure states labeled 'default' and 'repay' with distinct economic interpretations;
      do not collapse these into a single cured versus not-cured binary when making decisions about intervention strategies
      or risk scoring
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Assuming a single cure state when the mixture cure model produces two distinct states leads to misinterpreting
      recovery pathways; conflating 'default' and 'repay' cure types causes incorrect risk stratification and inappropriate
      intervention targeting in credit or clinical settings
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-180
    when: When implementing or calling the sample size calculation for Cox proportional hazards models
    action: Use Schoenfeld's formula via lifelines.statistics.sample_size_necessary_under_cph — do not substitute Freedman's
      method or other approximation formulas without theoretical validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect sample size formulas produces wrong power calculations, leading to underpowered studies that
      fail to detect true effects or overpowered studies that waste resources
    derived_from_bd_id: BD-088
  - id: finance-C-181
    when: When fitting survival curves with KaplanMeierFitter without specifying a timeline parameter
    action: Verify that the auto-generated timeline (sorted unique event times) matches the intended analysis granularity;
      specify explicit timeline if interpolation at arbitrary points or consistent time bucketing is required
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Auto-generated timelines produce different survival estimates depending on data distribution, causing inconsistent
      results across datasets with varying event time patterns
    derived_from_bd_id: BD-006
  - id: finance-C-182
    when: When using qq_plot with parametric survival models (WeibullAFTFitter, ExponentialAFTFitter, etc.)
    action: Verify the lifelines model class name has a valid scipy distribution equivalent before calling get_distribution_name_of_lifelines_model;
      check that the mapped scipy distribution is available in the scipy version in use
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid model-to-distribution mapping causes AttributeError or incorrect QQ plot visualization, obscuring
      whether the parametric model fits the data appropriately
    derived_from_bd_id: BD-020
  - id: finance-C-183
    when: When adding new parametric fitter classes to the lifelines library
    action: Verify new fitter classes follow the three-level inheritance chain (BaseFitter->UnivariateFitter->ParametricUnivariateFitter)
      and update the model-to-scipy distribution mapping in get_distribution_name_of_lifelines_model
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: New parametric fitters without proper inheritance break polymorphic usage and QQ plot functionality, causing
      runtime errors in downstream analysis
    derived_from_bd_id: BD-020
  - id: finance-C-184
    when: When implementing or refactoring code that accesses CoxPHFitter attributes (hazard_, survival_function_, etc.)
    action: Call fit() method before accessing any model attribute — CoxPHFitter enforces strict lifecycle contract via __getattr__
      proxy that raises AttributeError on unfitted instances
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accessing model attributes before calling fit() triggers AttributeError at runtime, causing immediate execution
      failure; this pattern cannot be bypassed by checking for None or other sentinel values
    derived_from_bd_id: BD-102
  - id: finance-C-185
    when: When evaluating Cox model predictive performance using concordance index
    action: Compute concordance index on predicted risk scores (linear predictor), not predicted survival times — C-index
      on times requires extrapolation and is not implemented; use risk scores for valid model comparison
    severity: high
    kind: domain_rule
    modality: must
    consequence: Computing C-index on predicted survival times instead of risk scores requires extrapolation beyond observed
      data, producing invalid model evaluation that does not measure concordance correctly
    derived_from_bd_id: BD-016
  - id: finance-C-186
    when: When fitting Cox proportional hazards models with tied event times
    action: Use Efron's approximation for handling tied event times — this method is more accurate than Breslow without O(n^2)
      complexity; note that exact marginal likelihood is only used when ties < 5% of data AND n > 500; below this threshold
      Efron is applied uniformly regardless of tie percentage
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using Breslow's method for ties instead of Efron's approximation introduces systematic bias in coefficient
      estimates; exact methods are prohibitively slow at O(n^2) complexity for large datasets
    derived_from_bd_id: BD-010
  - id: finance-C-187
    when: When using survival analysis with clinical or epidemiological data that may contain left-truncated observations
    action: Verify that entry_times are explicitly provided for each observations; if not provided, assume entry=0 may introduce
      systematic bias in presence of left-truncation. Check for the presence of entry time columns and validate they are non-zero
      when the data source documents truncation.
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Defaulting entry times to zero when left-truncation exists causes systematic underestimation of survival
      probabilities, leading to biased clinical conclusions and potentially flawed treatment recommendations
    derived_from_bd_id: BD-007
  - id: finance-C-188
    when: When implementing central tendency calculations for survival analysis summary statistics
    action: Use mode for categorical variable central tendency and median for numeric variable central tendency — do not use
      mean as a universal central tendency measure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using mean for categorical data produces meaningless statistics since categorical distributions lack numeric
      order; using mean for skewed continuous data underestimates central tendency, leading to incorrect survival probability
      estimates
    derived_from_bd_id: BD-060
  - id: finance-C-189
    when: When implementing model comparison logic for non-nested survival models
    action: Use AIC with 2*k penalty for model comparison — do not replace with BIC or other information criteria
    severity: high
    kind: domain_rule
    modality: must
    consequence: BIC with log(n)*k penalty tends to select underparameterized models that may underfit complex survival relationships,
      causing suboptimal model selection and poor predictive performance in live trading
    derived_from_bd_id: BD-061
  - id: finance-C-190
    when: When implementing Cox PH model optimization for survival regression with tied event times
    action: Use Newton-Raphson with Efron tie correction for Cox PH estimation — do not replace with Breslow approximation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Breslow approximation underestimates variance in heavy-tie scenarios, causing confidence intervals to be
      too narrow and p-values to be spuriously significant, leading to incorrect feature selection in survival models
    derived_from_bd_id: BD-062
  - id: finance-C-191
    when: When implementing coefficient penalty regularization for high-dimensional Cox PH models
    action: Use elastic net regularization combining L1 and L2 penalties — do not use pure LASSO (L1 only) or pure ridge (L2
      only) penalty
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pure LASSO may arbitrarily select one feature from correlated groups while dropping others; pure ridge cannot
      perform variable selection; both lead to suboptimal feature selection and overfitting in high-dimensional survival data
    derived_from_bd_id: BD-063
  - id: finance-C-192
    when: When implementing survival curve estimation for right-censored event data
    action: Use product-limit (Kaplan-Meier) estimator for right-censored survival estimation — do not replace with life-table
      method
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Life-table method provides interval-level estimates that are less precise than individual-level product-limit
      estimates, causing loss of granularity in survival probability calculations and reducing the accuracy of time-to-event
      predictions
    derived_from_bd_id: BD-065
  - id: finance-C-196
    when: When using AalenAdditiveFitter for survival analysis
    action: Normalize covariates to mean=0, std=1 before fitting; use denormalization step when interpreting coefficients
      in original scale; verify standardization was applied if comparing coefficients across models
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without proper normalization, Aalen additive model coefficients become incomparable due to different variable
      magnitudes, causing numerical instability and potentially misleading survival risk assessments
    derived_from_bd_id: BD-048
  - id: finance-C-197
    when: When initializing CRCSplineFitter for Cox regression with splines
    action: Verify gamma0_=0.0 and gamma1_=2.0 are used as initial values; for datasets with extreme baseline hazards (very
      high or very low), adjust initialization to match the expected baseline hazard shape
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default gamma initialization assumes Gompertz-like baseline hazard; datasets with different hazard shapes
      may converge to biased coefficient estimates, causing systematic under or over-estimation of covariate effects
    derived_from_bd_id: BD-051
  - id: finance-C-198
    when: When configuring NPMLE convergence tolerance for interval-censored survival analysis
    action: Verify tolerance is set to 1e-5 for standard applications; increase to 1e-7 for simulation studies requiring high
      precision; use 1e-3 only for quick exploratory diagnostics
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Insufficient tolerance (1e-3) causes the NPMLE to converge prematurely, producing imprecise survival estimates
      with systematic errors that compound across long event-time horizons
    derived_from_bd_id: BD-052
  - id: finance-C-199
    when: When implementing or refactoring survival analysis power calculations
    action: Implement power calculation using the Cox proportional hazards analytical formula as provided in lifelines/statistics.py:power_under_cph
      — do not replace with simulation-based power unless explicitly requested by the user
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing analytical power calculation with simulation-based approach changes computation characteristics,
      causing slower execution and inconsistent results across different hardware configurations
    derived_from_bd_id: BD-089
  - id: finance-C-200
    when: When implementing or refactoring model comparison logic in parametric survival fitters
    action: Use AIC and BIC information criteria for formal comparison of non-nested survival models — implement formulas
      in lifelines/fitters/__init__.py:AIC_ and verify both criteria are available for model selection
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting AIC/BIC forces users to rely on likelihood ratio tests which cannot handle non-nested models with
      different parameter counts, leading to incorrect model selection and poor statistical inference
    derived_from_bd_id: BD-091
  - id: finance-C-201
    when: When optimizing gradient computation for Cox proportional hazards Efron approximation
    action: Implement adaptive selection between batch and single-threaded Efron gradient computation based on problem size
      — small datasets must use single-threaded computation for efficiency, large datasets must use batch processing to manage
      memory
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using fixed batch size across all datasets causes memory overflow on large datasets or unnecessary overhead
      on small datasets, resulting in either crashes or degraded performance
    derived_from_bd_id: BD-096
  - id: finance-C-203
    when: When implementing or refactoring parameter bounds for exponential-family distributions in survival models
    action: Apply _MIN_PARAMETER_VALUE=1e-9 as the universal lower bound floor for each parametric distributions via the _buffer_bounds
      function — parameters must never be allowed to reach zero which causes log(0) singularities and infinite gradients
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allowing parameters to approach zero causes log(0) singularities and infinite gradients in exponential-family
      distributions, leading to optimization failures and NaN values in model estimates
    derived_from_bd_id: BD-103
  - id: finance-C-204
    when: When interpreting AalenAdditiveFitter coefficients after model fitting
    action: Denormalize coefficients by original standard deviations to restore them to original covariate scales, enabling
      direct interpretation of covariate effects on the additive hazard scale
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping denormalization produces uninterpretable coefficients on arbitrary scales, leading to incorrect
      conclusions about covariate effects and potentially causing adoption of invalid survival models
    derived_from_bd_id: BD-054
  - id: finance-C-205
    when: When using non-integer weights in survival model fitting
    action: Specify robust=True to enable robust variance estimation; non-integer weights indicate sampling weights or propensity
      scores that require robust inference
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-integer weights without robust variance estimation produce invalid statistical inference with underestimated
      standard errors, leading to false significance claims and incorrect model selection
    derived_from_bd_id: BD-056
  - id: finance-C-206
    when: When validating cumulative hazard estimates from non-known parametric models
    action: Validate that cumulative hazard is non-decreasing; decreasing hazards are mathematically impossible and indicate
      modeling errors that must be corrected
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silent modeling errors producing decreasing cumulative hazards create mathematically impossible results,
      corrupting downstream survival probability calculations and leading to invalid risk assessments
    derived_from_bd_id: BD-057
  - id: finance-C-207
    when: When computing log-likelihood for model comparison using information criteria
    action: Normalize log-likelihood by total weight sum to produce scale-invariant values comparable across datasets with
      different sample sizes or weighting schemes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unnormalized log-likelihood makes AIC/BIC comparisons invalid across datasets with different weight totals,
      causing incorrect model selection and potentially adopting inferior survival models
    derived_from_bd_id: BD-058
  - id: finance-C-208
    when: When performing subtract/divide operations on survival functions
    action: Use forward fill interpolation for survival function arithmetic operations to maintain mathematical coherence;
      this assumes constant hazard between observed time points and preserves valid probability ranges
    severity: high
    kind: domain_rule
    modality: must
    consequence: Alternative interpolation methods like linear interpolation can produce negative survival probabilities,
      corrupting survival analysis results and causing invalid risk calculations in downstream applications
    derived_from_bd_id: BD-059
  - id: finance-C-209
    when: When implementing PnL tracking in backtesting
    action: Assume the framework implements PnL conservation (realized + unrealized) — the framework does not have this capability;
      realized and unrealized PnL are tracked separately without conservation validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without PnL conservation, discrepancies between realized and unrealized PnL go undetected, causing equity
      miscalculation that compounds over time and produces unreliable backtest results
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-210
    when: When implementing equity and PnL calculation logic
    action: 'Implement PnL conservation check: after each trade event, verify that (current_equity - initial_equity) equals
      (cumulative_realized_pnl + current_unrealized_pnl) within tolerance of 0.001. Log discrepancy as ERROR and halt execution
      if mismatch exceeds tolerance'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without conservation validation, PnL tracking errors accumulate silently; equity curve diverges from actual
      returns, causing backtest results to be unreliable for live trading decisions
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-211
    when: When implementing train/test split logic for model validation
    action: Assume the framework enforces train/test time split integrity — the framework does not validate that test data
      timestamps are strictly after train data timestamps
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without temporal split validation, future data may leak into training set, causing look-ahead bias that makes
      backtest results appear significantly better than live performance
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-212
    when: When implementing data preprocessing for model training
    action: 'Validate temporal split integrity: verify that max(training_set.timestamp) is strictly less than min(test_set.timestamp).
      Reject with ERROR if temporal overlap exists; add explicit data_leakage_check flag to split configuration'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Data leakage from test into training causes overfitted models that perform well in backtesting but fail in
      live trading, leading to direct financial losses
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-213
    when: When implementing audit trail and event logging
    action: Assume the framework maintains an immutable event log — the framework does not implement append-only logging with
      tamper detection; events can be modified or deleted after recording
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without immutable logging, audit records can be altered post-hoc, compromising regulatory compliance and
      making it impossible to reconstruct exact sequence of trading decisions
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-214
    when: When implementing event logging for audit purposes
    action: 'Implement immutable event log: store each events with timestamp, content hash, and previous_event_hash (blockchain-style
      chaining). Append-only operations only; implement integrity verification function that recomputes hash chain and reports
      tampering'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without immutable logging, regulatory auditors cannot verify authenticity of historical records, potentially
      causing compliance violations and legal liability
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-215
    when: When implementing portfolio rebalancing logic
    action: Assume the framework implements a rebalancing trigger mechanism — the framework does not have built-in drift detection
      or threshold-based rebalancing triggers
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without rebalancing triggers, portfolio drift from target weights goes undetected, causing unintended risk
      exposure that deviates from the designed investment strategy
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-216
    when: When implementing portfolio management and rebalancing logic
    action: 'Implement rebalancing trigger mechanism: calculate weight_drift = abs(current_weight - target_weight) for each
      asset. Trigger rebalancing when max(weight_drift) exceeds threshold (default 5%) or when scheduled interval elapses'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Uncontrolled drift from target weights increases portfolio risk beyond intended levels, potentially causing
      significant losses when market conditions shift unexpectedly
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-217
    when: When configuring or verifying exponential fitter optimization settings in survival analysis
    action: Verify that tolerance settings match the documented default values; when modifying tolerance, document the rationale
      — higher tolerance sacrifices numerical accuracy for marginal speed gains
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using incorrect tolerance settings can cause the exponential fitter to converge prematurely with biased parameter
      estimates, or iterate unnecessarily consuming excess computational resources without improving accuracy
    derived_from_bd_id: BD-075
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
