resources:
  packages:
  - name: numpy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: pyyaml
    version_pin: latest
  - name: mlflow
    version_pin: latest
  - name: redis
    version_pin: latest
  - name: pymongo
    version_pin: latest
  - name: lightgbm
    version_pin: latest
  - name: cvxpy
    version_pin: latest
  - name: joblib
    version_pin: latest
  - name: matplotlib
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy
    - python3 -m pip install pandas
    - python3 -m pip install pyyaml
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing expression load with index range parameters
    action: Allow start_index to exceed end_index in Expression.load
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Invalid index range causes data corruption where features return empty or misaligned series, breaking calendar
      index alignment for all downstream consumers
    stage_ids:
    - data_expression
  - id: finance-C-002
    when: When implementing a new Expression subclass
    action: Implement _load_internal abstract method to return pd.Series indexed by calendar
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Subclass without _load_internal raises NotImplementedError, preventing feature calculation and breaking the
      entire data pipeline
    stage_ids:
    - data_expression
  - id: finance-C-008
    when: When using PIT (Point-in-Time) database expressions
    action: Create PIT expressions with positive right extended window (end_ws > 0) referencing future periods
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Future period references in PIT cause ValueError and break point-in-time data integrity, leading to look-ahead
      bias in backtests
    stage_ids:
    - data_expression
  - id: finance-C-026
    when: When using Ref operator with N=0
    action: Use Ref(expression, 0) for retrieving historical data as it returns np.inf for back_rolling
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Ref(ATTR, 0) returns np.inf in get_longest_back_rolling() and logs a warning about inaccurate calculation,
      causing unbounded data loading that exhausts memory and crashes the system
    stage_ids:
    - data_operators
  - id: finance-C-029
    when: When implementing PIT (Point-in-Time) database operations
    action: Access future period data in PIT expressions due to data integrity constraints
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: PIT database is designed for point-in-time analysis and explicitly rejects expressions with right-extended
      window (future data access), raising ValueError to prevent look-ahead bias in historical backtesting
    stage_ids:
    - data_operators
  - id: finance-C-043
    when: When implementing PITProvider.period_feature() query
    action: Query future data with end_index greater than 0
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: PIT data represents point-in-time historical data that must not include future revisions, querying future
      data causes data leakage and incorrect financial analysis
    stage_ids:
    - data_provider
  - id: finance-C-057
    when: When implementing provider subclasses
    action: Implement each abstract methods defined in base provider classes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing abstract method implementation causes NotImplementedError at runtime, preventing data access entirely
    stage_ids:
    - data_provider
  - id: finance-C-066
    when: When building TSDataSampler with data from DataHandler
    action: verify the datetime level of the DataFrame index is at level 0
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TSDataSampler initialization fails with AssertionError when datetime is not the first index level, causing
      data loading pipeline to break
    stage_ids:
    - dataset
  - id: finance-C-067
    when: When implementing data preprocessing pipeline in DataHandlerLP
    action: 'process data in sequential order: shared_processors → infer_processors → learn_processors (PTYPE_A) or shared_processors
      → (infer_processors | learn_processors) separately (PTYPE_I)'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Processing order violation causes wrong data transformations, leading to incorrect features/labels during
      training or inference
    stage_ids:
    - dataset
  - id: finance-C-075
    when: When defining dataset segments for train/valid/test splits
    action: 'verify temporal ordering: train segment end_time precedes valid segment start_time, and valid segment end_time
      precedes test segment start_time'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Overlapping or reversed segment ordering causes temporal data leakage where the model sees future information
      during training, inflating backtest returns
    stage_ids:
    - dataset
  - id: finance-C-079
    when: When using Ref operator with N<0 for forward-looking features
    action: use Ref(ATTR, N) with N<0 (future data reference) in features that will be used for live trading inference
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Using negative N in Ref creates look-ahead bias where features reference future data that is not available
      at inference time in live trading
    stage_ids:
    - dataset
  - id: finance-C-084
    when: When implementing Model.predict, the returned prediction must preserve the input DataFrame index
    action: return prediction using pd.Series with index=x_test.index or equivalent index from input features
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Breaking the index contract causes downstream backtest and analysis to misalign predictions with instruments
      and dates, producing incorrect portfolio metrics and potentially harmful trading signals
    stage_ids:
    - model
  - id: finance-C-085
    when: When implementing Model.fit, the learned parameters must be stored as instance attributes without underscore prefix
    action: prefix learned parameters with '_' as attribute names
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Pickle serialization via Serializable.__getstate__ drops attributes starting with '_' by default, causing
      model retraining to be necessary after unpickling and losing learned parameters
    stage_ids:
    - model
  - id: finance-C-086
    when: When implementing Model.predict, the model must raise ValueError when fit has not been called
    action: check if model parameters exist and raise ValueError('model is not fitted yet!') if not
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calling predict on an unfitted model produces undefined/NaN predictions that corrupt downstream backtest
      results and may cause silent financial losses
    stage_ids:
    - model
  - id: finance-C-088
    when: When training a Model using TrainerR, the model must be saved via R.save_objects with key 'params.pkl'
    action: 'save model using R.save_objects(**{''params.pkl'': model}) immediately after fit completes'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without saving as 'params.pkl', the model cannot be loaded by R.load_object('params.pkl') in online serving
      and rolling scenarios, breaking the deployment pipeline
    stage_ids:
    - model
  - id: finance-C-089
    when: When implementing Model.fit and Model.predict, these must be abstract methods to enable polymorphic Dataset handling
    action: implement fit(dataset, reweighter) and predict(dataset, segment) as abstract methods in base Model class
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without polymorphic Dataset handling, each model implementation would require different calling conventions,
      breaking TrainerR and workflow integration
    stage_ids:
    - model
  - id: finance-C-102
    when: When using signal data with shift parameter for temporal alignment
    action: use shift=1 when retrieving prediction data to avoid look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using current period signals instead of previous period causes look-ahead bias, inflating backtest returns
      and leading to significant live trading underperformance
    stage_ids:
    - strategy
  - id: finance-C-106
    when: When implementing generate_trade_decision method
    action: return TradeDecisionWO object containing order list as the output type
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect return type causes integration failures with the executor framework, preventing strategy from executing
      trades
    stage_ids:
    - strategy
  - id: finance-C-111
    when: When implementing EnhancedIndexingStrategy risk data handling
    action: load risk model data from the previous trading date to avoid look-ahead
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using current date risk data causes information leakage in backtesting, artificially inflating risk-adjusted
      returns
    stage_ids:
    - strategy
  - id: finance-C-115
    when: When implementing Order.deal_amount field semantics
    action: represent deal_amount as share count not monetary value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Order.deal_amount multiplied by trade_price yields trade_val; using monetary value would cause double-counting
      of price in cost calculations and corrupt position tracking
    stage_ids:
    - backtest_execution
  - id: finance-C-116
    when: When implementing Exchange.deal_order return signature
    action: return (trade_val, trade_cost, trade_price) tuple in this specific order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect tuple order causes position updates to receive wrong values, corrupting cash tracking and stock
      amount records in the portfolio
    stage_ids:
    - backtest_execution
  - id: finance-C-117
    when: When rounding stock amounts via round_amount_by_trade_unit
    action: adjust amounts by factor to handle 100-share lot rounding for Chinese A-shares
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without factor adjustment, order amounts won't align to trading unit lots, causing exchange rejection of
      orders or fractional share positions that cannot actually be executed
    stage_ids:
    - backtest_execution
  - id: finance-C-119
    when: When validating order direction in Order.__post_init__
    action: reject any direction except Order.BUY or Order.SELL
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid order direction causes incorrect position updates with cash being added instead of subtracted, corrupting
      portfolio accounting
    stage_ids:
    - backtest_execution
  - id: finance-C-121
    when: When processing sell orders that would result in negative stock amount
    action: raise ValueError preventing short positions when current amount < required amount
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Allowing negative stock amounts creates phantom short positions that don't exist in reality, causing incorrect
      PnL calculations and unrealistic backtest results
    stage_ids:
    - backtest_execution
  - id: finance-C-127
    when: When calling Exchange.deal_order with both trade_account and position
    action: pass both trade_account and position simultaneously as they are mutually exclusive
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Passing both parameters causes ambiguity in position updates and raises ValueError, breaking the execution
      flow
    stage_ids:
    - backtest_execution
  - id: finance-C-134
    when: When NestedExecutor runs with align_range_limit=True (default)
    action: Enforce inner trading within outer decision's trade_range by skipping steps outside start_idx to end_idx bounds
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Inner executor will execute trades at times not authorized by outer strategy, breaking multi-frequency hierarchy
      where outer controls inner time windows
    stage_ids:
    - backtest_nested
  - id: finance-C-135
    when: When implementing NestedExecutor._collect_data loop
    action: Call _init_sub_trading before _update_trade_decision in each iteration to initialize fresh inner strategy/executor
      state
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Inner strategy will use stale infrastructure (trade calendar, level_infra) leading to incorrect decisions
      based on wrong time context
    stage_ids:
    - backtest_nested
  - id: finance-C-139
    when: When relying on position consistency across nested execution levels
    action: Use shallow copy for Account between levels to share current_position while keeping portfolio_metrics independent
      per level
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Positions will diverge between levels causing PnL calculations to show inconsistent results or double-count
      trades; OR metrics will be shared incorrectly between levels
    stage_ids:
    - backtest_nested
  - id: finance-C-148
    when: When implementing a StateInterpreter or ActionInterpreter subclass
    action: implement interpret() method that validates output against the observation_space/action_space defined in the interpreter
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: State interpreter output violates the observation space constraint, causing GymSpaceValidationError during
      RL training loop and breaking the policy execution pipeline
    stage_ids:
    - rl_trading
  - id: finance-C-149
    when: When implementing a StateInterpreter or ActionInterpreter subclass
    action: declare observation_space property returning gym.Space and action_space property returning gym.Space
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing space declaration causes NotImplementedError when the interpreter is called, preventing RL policy
      from receiving observations or actions
    stage_ids:
    - rl_trading
  - id: finance-C-150
    when: When using FullHistoryStateInterpreter to interpret market data for RL observation
    action: call _mask_future_info() to zero out data from current time onwards before returning observation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: RL agent experiences look-ahead bias by accessing future market data, causing live trading returns to fall
      far below backtested results
    stage_ids:
    - rl_trading
  - id: finance-C-151
    when: When implementing a custom state interpreter that accesses backtest_data
    action: mask or filter out any data timestamps beyond the current state timestamp to prevent future information leakage
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Custom interpreter leaks future data into RL observation, invalidating backtest results and producing misleading
      live trading expectations
    stage_ids:
    - rl_trading
  - id: finance-C-152
    when: When using SAOEStateAdapter to track order execution state
    action: maintain position consistency where self.position -= exec_vol.sum() after each update
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Position tracking becomes inconsistent, causing execution volume to exceed available position or incorrect
      reward calculation
    stage_ids:
    - rl_trading
  - id: finance-C-153
    when: When initializing RLIntStrategy or SAOEIntStrategy
    action: provide both state_interpreter and action_interpreter parameters (either as dict config or StateInterpreter/ActionInterpreter
      instance)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing interpreter causes AttributeError when generate_trade_decision() is called, crashing the RL strategy
      execution
    stage_ids:
    - rl_trading
  - id: finance-C-154
    when: When calling simulator.step() in RL training loop
    action: check simulator.done() returns False before calling step() to avoid assertion error
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Simulator raises assertion error 'Simulator has already done!' when step() is called after done state, breaking
      RL training loop
    stage_ids:
    - rl_trading
  - id: finance-C-156
    when: When using SAOEIntStrategy with policy dict config
    action: provide network parameter when initializing SAOEIntStrategy to avoid assertion error
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Assertion error 'assert network is not None' raised at initialization when policy dict lacks required network
      configuration
    stage_ids:
    - rl_trading
  - id: finance-C-165
    when: When executing order volume in SAOE simulator
    action: validate that exec_vol.sum() does not exceed position + EPS tolerance to prevent negative position errors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Execution volume exceeds available position causing negative position state and corrupting PnL calculations
    stage_ids:
    - rl_trading
  - id: finance-C-172
    when: When generating rolling tasks with temporal splits
    action: Use trunc_segments to truncate training data based on test start_time to prevent future information leakage
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without truncation, training data overlaps with test period causing look-ahead bias, invalidating backtest
      results
    stage_ids:
    - workflow
  - id: finance-C-185
    when: When implementing rolling evaluation with time-series cross-validation
    action: Specify the prediction horizon parameter to prevent label calculation errors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without specifying horizon, the system cannot determine the label calculation offset, causing the rolling
      evaluation to fail with NotImplementedError
    stage_ids:
    - rolling
  - id: finance-C-187
    when: When setting up rolling tasks with prediction horizon
    action: Set trunc_days to at least (horizon + 1) to prevent future information leakage
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Label data leaks future information into training set, causing inflated backtest performance that does not
      generalize to live trading
    stage_ids:
    - rolling
  - id: finance-C-195
    when: When presenting rolling backtest results to stakeholders
    action: Claim that rolling backtest returns equal expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as live trading performance misleads stakeholders about actual expected returns,
      violating regulatory and ethical standards
    stage_ids:
    - rolling
  - id: finance-C-198
    when: When truncating segments to prevent future information leakage
    action: Verify that trunc_days accounts for each label_leak_n days needed for complete label calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incomplete truncation leaves future label information in training data, causing look-ahead bias that inflates
      backtest returns
    stage_ids:
    - rolling
  - id: finance-C-203
    when: When implementing data expressions with forward references (Ref with N < 0)
    action: use future data in historical feature calculations that will be consumed during backtesting or training
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Backtest results will exhibit look-ahead bias, causing live trading returns to fall far below backtested
      results when forward-ref data leaks into training features
  - id: finance-C-205
    when: When segmenting data for train/valid/test splits
    action: verify temporal ordering where train segment ends before valid segment, and valid segment ends before test segment
      to prevent data leakage
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Model will learn from future information during training, causing overly optimistic backtest results and
      poor generalization to live trading
  - id: finance-C-212
    when: When creating rolling evaluation tasks from workflow
    action: apply trunc_days parameter to truncate training data by trunc_days-1 days before test start to avoid information
      leakage in labels
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Rolling backtest will include future label information in training, causing inflated performance metrics
      that do not reflect live trading reality
  - id: finance-C-215
    when: When providing state observations to RL policy
    action: mask future information in state observations using _mask_future_info() to prevent look-ahead bias in policy training
      and evaluation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: RL policy will learn from future market data, causing unrealistic strategy behavior and poor live trading
      performance
  - id: finance-C-222
    when: When implementing or using any data expression in Qlib
    action: Verify each timestamps in data use calendar index (integer index into trading calendar), not wall-clock datetime
      values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Data queries will return incorrect time ranges, backtest signals will be misaligned with actual trading calendar,
      and feature calculations will reference wrong time periods
  - id: finance-C-223
    when: When implementing any Expression subclass
    action: Return pd.Series with calendar index as the return type of _load_internal()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream feature calculations will fail or produce incorrect results when they expect calendar-indexed
      data
  - id: finance-C-224
    when: When creating or parsing Order objects
    action: Set Order.direction to Order.BUY (1) for buy orders or Order.SELL (0) for sell orders
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Order execution will be reversed (buys executed as sells, sells executed as buys), causing complete portfolio
      destruction and financial loss
  - id: finance-C-225
    when: When specifying Order.amount or Order.deal_amount
    action: Express order quantities in SHARE COUNT (number of shares), not in monetary value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Order quantities will be misinterpreted as monetary values instead of share counts, causing orders to be
      100-1000x larger or smaller than intended
  - id: finance-C-229
    when: When implementing data processing in DataHandlerLP
    action: 'Follow the strict 3-stage contract: DK_R (raw data) -> DK_I (inferred/processed) -> DK_L (learn/model-ready)'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Data for model training will not be properly processed, causing incorrect feature values and invalid model
      inputs
  - id: finance-C-231
    when: When defining dataset segments for train/valid/test splits
    action: Verify dataset segments cover non-overlapping time ranges (chronological ordering without temporal overlap)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Training data will leak into test/validation sets, causing look-ahead bias and artificially inflated backtest
      performance metrics
  - id: finance-C-252
    when: When implementing transaction cost calculation for Chinese stock backtesting
    action: Include stamp duty (印花税) in the cost model — for A-share markets, stamp duty applies to sell transactions at 0.05%
      (or current regulatory rate), typically absorbed into sell_cost parameter
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing stamp duty causes underestimation of transaction costs by approximately 0.05% per sell trade, making
      backtest returns systematically higher than actual trading performance
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-255
    when: When implementing meta-learning loss computations in the data selection module
    action: Use negative Spearman correlation for IC Loss to optimize ranking quality; implement NaN handling to prevent missing
      predictions from breaking training; must NOT use Pearson correlation or MSE
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using Pearson correlation or MSE instead of negative Spearman ranking produces incorrect loss signals that
      ignore ranking quality, degrading cross-sectional prediction performance in live trading
    derived_from_bd_id: BD-100
  - id: finance-C-267
    when: When building RL state representations for order execution in FullHistoryStateInterpreter
    action: Mask future data with zeros at the current decision time point — verify the policy only observes information available
      at each decision point to prevent look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without zero-masking future data, the RL policy observes information not yet available at decision time,
      creating look-ahead bias that makes backtest results unreproducible in live trading
    derived_from_bd_id: BD-122
  - id: finance-C-272
    when: When evaluating portfolio-level backtest results and comparing strategy performance
    action: Calculate and report both IC (Pearson correlation) and Rank IC (Spearman correlation) between predictions and
      actual returns at each evaluation time step
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Skipping Rank IC causes incorrect strategy ranking when Pearson and Spearman correlations diverge due to
      outliers or non-linear relationships; strategies that appear inferior under Pearson IC may outperform under rank-based
      metrics, leading to wrong strategy selection
    derived_from_bd_id: BD-106
  - id: finance-C-282
    when: When implementing position management logic for A-share backtesting
    action: Verify stocks bought today cannot be sold on the same day (T+1 settlement rule) — control available selling quantity
      via trading_t attribute to reflect that sold cash is not immediately available
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the T+1 rule causes the backtest to include same-day round-trip trades that are prohibited in Chinese
      A-share markets, creating a capital illusion where the system overestimates available funds after selling
    derived_from_bd_id: BD-057
  - id: finance-C-290
    when: When implementing settlement logic for Chinese market A-share backtesting
    action: Use cash settlement with T+1 delayed cash availability matching Chinese market regulations — sold positions must
      not immediately increase buying power
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using immediate settlement overestimates available buying power, causing margin and position limit calculations
      to be unrealistic and strategies to appear more capital-efficient than possible in live trading
    derived_from_bd_id: BD-072
  - id: finance-C-309
    when: When implementing order execution logic in TT_PARAL mode
    action: Execute sell orders first to release capital, then execute buy orders - verify order sorting by direction flag
      (-1 SELL < 1 BUY) guarantees this sequence regardless of submission order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Buying before selling creates hidden leverage when capital is insufficient; in live trading, buy orders may
      be rejected due to insufficient funds while backtest assumes full execution, causing severe backtest-live inconsistency
    derived_from_bd_id: BD-108
  - id: finance-C-318
    when: When configuring data processors that include both inference and learning operations
    action: Separate infer_processors from learn_processors and use fit_start_time/fit_end_time to constrain temporal fitting;
      never apply fit operations using future data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Fitting normalizers or processors using future data introduces look-ahead bias, causing backtested performance
      to exceed live trading results by 5-15%
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-327
    when: When setting up training and test data splits for backtesting
    action: Apply trunc_segments to truncate training data at the test start boundary — verify training set contains no data
      points from or after test start date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without trunc_segments, training data extends into test period causing temporal data leakage where the model
      accesses future information, making backtest results completely invalid for production deployment
    derived_from_bd_id: BD-111
  regular:
  - id: finance-C-003
    when: When implementing a new Expression subclass
    action: Implement get_longest_back_rolling method returning finite int or np.inf
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing implementation causes NotImplementedError, preventing data system from pre-fetching required historical
      range for feature calculation
    stage_ids:
    - data_expression
  - id: finance-C-004
    when: When implementing a new Expression subclass
    action: Implement get_extended_window_size method returning tuple of (lft_etd, rght_etd)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing implementation prevents accurate calculation of needed data range for operators in start_index to
      end_index range
    stage_ids:
    - data_expression
  - id: finance-C-005
    when: When creating Skewness or Kurtosis rolling operators
    action: Set rolling window size N less than 3 for Skewness or less than 5 for Kurtosis
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Statistical skewness with window < 3 or kurtosis with window < 5 causes undefined/nan results, corrupting
      statistical feature calculations
    stage_ids:
    - data_expression
  - id: finance-C-006
    when: When using Ref operator with N=0
    action: Use Ref($feature, 0) expecting accurate historical lookback calculation
    severity: medium
    kind: domain_rule
    modality: should_not
    consequence: Ref with N=0 logs warning that it will not be accurately calculated, leading to incorrect first-value semantics
      and potential look-ahead bias
    stage_ids:
    - data_expression
  - id: finance-C-007
    when: When using Rolling operator with N=0
    action: Use Rolling($feature, 0) expecting accurate expanding calculation
    severity: medium
    kind: domain_rule
    modality: should_not
    consequence: Rolling with N=0 logs warning about inaccurate calculation, causing expanding window to not properly converge
      over time
    stage_ids:
    - data_expression
  - id: finance-C-009
    when: When working with expression caching
    action: Use consistent cache key components (str(self), instrument, start_index, end_index, *args)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Inconsistent cache keys prevent cache reuse, causing repeated expensive calculations and degrading system
      performance below 80% cache hit rate
    stage_ids:
    - data_expression
  - id: finance-C-010
    when: When configuring memory cache limits
    action: Set mem_cache_size_limit to specified value for available memory
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Unlimited or excessive cache size causes memory exhaustion, while too small cache causes frequent evictions
      reducing cache hit rate below 80%
    stage_ids:
    - data_expression
  - id: finance-C-011
    when: When replacing feature provider backend
    action: Maintain backward compatibility with FeatureProvider interface signature
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incompatible feature provider breaks expression load, preventing all feature calculations across the system
    stage_ids:
    - data_expression
  - id: finance-C-012
    when: When using forward reference operators like Ref($close, -1)
    action: Rely on forward operators for production feature calculations
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Forward operators are documented as not supported yet (TODO), causing incorrect future data leakage or runtime
      errors
    stage_ids:
    - data_expression
  - id: finance-C-013
    when: When building complex nested expressions like Ref(Ref($close, -1), 1)
    action: Expect accurate get_longest_back_rolling calculation from nested Ref operators
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Nested forward-backward Ref operators cannot be handled correctly by get_longest_back_rolling, causing incorrect
      data pre-fetching
    stage_ids:
    - data_expression
  - id: finance-C-014
    when: When using PairRolling operator with N=0
    action: Use PairRolling($feature1, $feature2, 0) expecting accurate expanding correlation
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: PairRolling with N=0 logs warning about inaccurate calculation, causing expanding correlation to not properly
      track rolling relationship
    stage_ids:
    - data_expression
  - id: finance-C-015
    when: When implementing expression load pipeline
    action: Set series.name to str(self) after loading feature data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing series.name assignment causes unnamed features, breaking downstream DataFrame column identification
      and feature tracking
    stage_ids:
    - data_expression
  - id: finance-C-016
    when: When implementing Feature expression
    action: Return string representation with '$' prefix for non-PIT features
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Feature string without '$' prefix causes data provider to fail feature lookup, breaking entire expression
      evaluation
    stage_ids:
    - data_expression
  - id: finance-C-017
    when: When implementing PFeature expression
    action: Return string representation with '$$' prefix for PIT features
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: PFeature string without '$$' prefix causes PIT provider to fail identification, breaking point-in-time data
      retrieval
    stage_ids:
    - data_expression
  - id: finance-C-018
    when: When implementing arithmetic operations on Expression objects
    action: Delegate operator to corresponding ops module class for lazy evaluation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct evaluation without ops delegation breaks expression tree construction, causing eager evaluation and
      loss of optimization opportunities
    stage_ids:
    - data_expression
  - id: finance-C-019
    when: When returning feature data from _load_internal
    action: Return pd.Series indexed by calendar position integers
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Non-calendar indexed Series breaks downstream alignment, causing misaligned features across instruments in
      dataset operations
    stage_ids:
    - data_expression
  - id: finance-C-020
    when: When calculating expression cache hit rate
    action: Claim cache hit rate guarantee below 80% for repeated expression evaluation
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Cache hit rate depends on cache size configuration, expression reuse patterns, and memory pressure; claiming
      specific rate may mislead users about performance
    stage_ids:
    - data_expression
  - id: finance-C-021
    when: When using get_longest_back_rolling for expressions like Ref($close, 5)
    action: Expect finite value from Ref($close, 5) due to lookback of 5 periods
    severity: low
    kind: claim_boundary
    modality: must_not
    consequence: Ref($close, N) for N>0 returns finite value N representing lookback periods, not indicating calculation errors
    stage_ids:
    - data_expression
  - id: finance-C-022
    when: When implementing rolling window statistical operators
    action: Use min_periods=1 in rolling operations to produce results from partial windows
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without min_periods=1, rolling aggregations will return NaN for all windows smaller than the window size,
      breaking the time-series continuity and producing incorrect feature values for early periods
    stage_ids:
    - data_operators
  - id: finance-C-023
    when: When implementing Skewness rolling operator
    action: Validate window size N is >= 3 (or N == 0 for expanding mode)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skewness calculation with window size < 3 produces undefined statistical results, causing numerical instability
      and NaN values in feature outputs
    stage_ids:
    - data_operators
  - id: finance-C-024
    when: When implementing Kurtosis rolling operator
    action: Validate window size N is >= 4 (or N == 0 for expanding mode)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Kurtosis calculation with window size < 4 produces undefined statistical results, causing numerical instability
      and NaN values in feature outputs
    stage_ids:
    - data_operators
  - id: finance-C-025
    when: When using boolean features in arithmetic operations
    action: Cast boolean series to float32 before numpy operations to prevent type errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Boolean dtype in numpy operations raises TypeError when performing element-wise mathematical functions, causing
      data loading failures
    stage_ids:
    - data_operators
  - id: finance-C-027
    when: When using Rolling or PairRolling with N=0
    action: Expect expanding mode behavior when N=0 and log warnings about accuracy limitations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Rolling(N=0) triggers expanding mode which accumulates all historical data, potentially producing misleading
      results for mean/std calculations and may not be accurately calculated per the FIXME comment
    stage_ids:
    - data_operators
  - id: finance-C-028
    when: When using EMA operator with float alpha parameter
    action: Verify N (alpha) is strictly between 0 and 1 for exponential weighted moving average
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: EMA with alpha outside (0, 1) range produces undefined exponential weighting behavior, causing incorrect
      smoothing and potentially numerical overflow
    stage_ids:
    - data_operators
  - id: finance-C-030
    when: When implementing expression operators that inherit from Rolling
    action: 'Implement each abstract methods: _load_internal, get_longest_back_rolling, get_extended_window_size'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing abstract method implementations causes NotImplementedError at runtime, preventing expression evaluation
      and breaking data pipeline execution
    stage_ids:
    - data_operators
  - id: finance-C-031
    when: When implementing time-series shift operations
    action: Use series.shift(N) for historical data access with N > 0, and handle N < 0 for future data access
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect shift semantics causes wrong temporal alignment of data, producing features that reference incorrect
      time periods and corrupting backtest results
    stage_ids:
    - data_operators
  - id: finance-C-032
    when: When composing rolling operators with nested expressions
    action: Aggregate back_rolling and extended_window_size from each child expressions using max()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incomplete aggregation of child expression requirements causes data loading to miss necessary historical
      context, producing incorrect or NaN feature values at boundaries
    stage_ids:
    - data_operators
  - id: finance-C-033
    when: When implementing conditional feature logic using If operator
    action: Use np.where for expression-level conditional evaluation without Python branching
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Python-level branching in conditional evaluation prevents vectorized operations and dramatically slows down
      feature calculation for large datasets
    stage_ids:
    - data_operators
  - id: finance-C-034
    when: When computing Delta operator
    action: Use series.shift(N) to compute period-over-period differences
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using iloc instead of shift produces incorrect temporal alignment, causing Delta to calculate differences
      between wrong time periods
    stage_ids:
    - data_operators
  - id: finance-C-035
    when: When using Ref with negative N for future data access
    action: Claim Ref($feature, -N) produces valid live-trading signals without considering look-ahead bias
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Ref with N < 0 accesses future data, which is impossible in live trading. Presenting backtest results from
      such expressions as expected live performance is misleading and violates financial backtesting standards
    stage_ids:
    - data_operators
  - id: finance-C-036
    when: When presenting results from Rolling(N=0) expanding operations
    action: Claim expanding mean/std results are equivalent to fixed-window rolling statistics
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Expanding mode accumulates all historical data, producing different statistical properties than fixed-window
      rolling. Presenting expanding statistics as rolling equivalents misleads about the stability and convergence properties
      of the indicators
    stage_ids:
    - data_operators
  - id: finance-C-037
    when: When using float32 precision for monetary calculations
    action: Rely on float32 precision for high-precision financial calculations requiring decimal accuracy
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: float32 has only ~7 significant decimal digits compared to float64's ~15 digits. For financial calculations
      involving large price values or many operations, accumulated rounding errors corrupt the final results
    stage_ids:
    - data_operators
  - id: finance-C-038
    when: When implementing custom rolling aggregation functions
    action: Prefer pandas/cython-optimized functions over rolling.apply with lambda for performance
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: rolling.apply with lambda functions is significantly slower than optimized pandas methods, causing feature
      calculation to become the bottleneck in data pipeline execution
    stage_ids:
    - data_operators
  - id: finance-C-039
    when: When handling Rsquare rolling regression with near-zero standard deviation
    action: Set Rsquare output to NaN when rolling standard deviation is close to zero (atol=2e-05)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by near-zero standard deviation produces extreme or infinite R-squared values that corrupt feature
      outputs and downstream calculations
    stage_ids:
    - data_operators
  - id: finance-C-040
    when: When implementing CalendarProvider.calendar() with out-of-range start_time
    action: Return empty numpy array when start_time exceeds the last calendar date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning incorrect calendar slice instead of empty array causes downstream components to process invalid
      date ranges, leading to incorrect feature queries and backtest results
    stage_ids:
    - data_provider
  - id: finance-C-041
    when: When implementing CalendarProvider.calendar() with out-of-range end_time
    action: Return empty numpy array when end_time precedes the first calendar date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning incorrect calendar slice instead of empty array causes date alignment issues in feature queries,
      potentially corrupting training data timestamps
    stage_ids:
    - data_provider
  - id: finance-C-042
    when: When implementing FeatureProvider feature retrieval
    action: Return pd.Series with float32 dtype for each feature data
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using float64 instead of float32 causes inconsistent precision and increased memory consumption, breaking
      cache compatibility with other qlib components
    stage_ids:
    - data_provider
  - id: finance-C-044
    when: When implementing DatasetProvider.dataset() with empty fields
    action: Raise ValueError when fields list is empty
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silent acceptance of empty fields returns invalid DataFrame without columns, causing downstream training
      loops to fail with cryptic errors
    stage_ids:
    - data_provider
  - id: finance-C-045
    when: When implementing LocalFeatureProvider.feature() field parsing
    action: Strip the first character from field parameter before use
    severity: high
    kind: domain_rule
    modality: must
    consequence: Field names from expression system include '$' prefix that must be stripped, failing to strip causes file
      path resolution errors
    stage_ids:
    - data_provider
  - id: finance-C-046
    when: When implementing DatasetProvider.get_instruments_d() with unsupported type
    action: Raise ValueError for unsupported instrument input types
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Silently accepting unsupported instrument types causes cryptic errors deep in the data pipeline instead of
      failing fast with clear message
    stage_ids:
    - data_provider
  - id: finance-C-047
    when: When setting disk_cache parameter for feature/dataset queries
    action: Use disk_cache=0 to bypass cache entirely for fresh computation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using cached data during rolling scenarios causes data leakage from future periods, corrupting model training
      and backtesting results
    stage_ids:
    - data_provider
  - id: finance-C-048
    when: When initializing LocalDatasetProvider with align_time parameter
    action: Align time queries to calendar boundaries when align_time=True
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Misaligned time queries cause cache misses and inconsistent data across different query parameters, breaking
      reproducibility
    stage_ids:
    - data_provider
  - id: finance-C-049
    when: When running data provider on Windows or macOS platforms
    action: Handle multiprocessing spawn context instead of fork
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using fork-based multiprocessing on Windows/macOS causes process crashes and deadlock, preventing data loading
      entirely
    stage_ids:
    - data_provider
  - id: finance-C-050
    when: When using ClientProvider mode for data queries
    action: Disable dataset cache by default in client mode
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Client-side caching in distributed mode causes stale data and cache inconsistency across multiple client
      instances
    stage_ids:
    - data_provider
  - id: finance-C-051
    when: When implementing expression field parsing in LocalExpressionProvider
    action: Handle extended window sizes for lookback indicators
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Indicators requiring historical lookback (e.g., rolling means) fail silently without extended window queries,
      producing NaN values
    stage_ids:
    - data_provider
  - id: finance-C-052
    when: When implementing features() with disk_cache=None
    action: Use default_disk_cache configuration value when parameter is None
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Ignoring configuration default causes unexpected cache behavior different from initialized qlib setup
    stage_ids:
    - data_provider
  - id: finance-C-053
    when: When implementing inst_calculator for parallel processing
    action: Process one instrument at a time to enable parallel processing
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Processing multiple instruments together prevents joblib parallel execution, causing slow data loading for
      large instrument lists
    stage_ids:
    - data_provider
  - id: finance-C-054
    when: When implementing filter_pipe for instrument filtering
    action: Maintain filter order as specified in the filter_pipe list
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Filter order affects final instrument set, changing order produces different stock pools and inconsistent
      backtest results
    stage_ids:
    - data_provider
  - id: finance-C-055
    when: When implementing CalendarProvider.load_calendar() with future=True
    action: Return current calendar if future calendar file does not exist
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Raising exception when future calendar is missing causes data loading failure instead of graceful degradation
    stage_ids:
    - data_provider
  - id: finance-C-056
    when: When implementing LocalDatasetProvider.cache_walker()
    action: Pre-compute expression cache for each field per instrument
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Skipping cache pre-warming causes repeated expression evaluation on each query, dramatically slowing down
      dataset loading
    stage_ids:
    - data_provider
  - id: finance-C-058
    when: When implementing storage backend for LocalCalendarProvider
    action: Use FileCalendarStorage as the default storage backend
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using wrong storage backend causes calendar data to be stored/read from incorrect locations, breaking data
      persistence
    stage_ids:
    - data_provider
  - id: finance-C-059
    when: When implementing DatasetProvider.dataset() with inst_processors
    action: Use SimpleDatasetCache when inst_processors are provided
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: SimpleDatasetCache does not support inst_processors, using it causes ValueError during dataset loading
    stage_ids:
    - data_provider
  - id: finance-C-060
    when: When implementing features() method in BaseProvider
    action: Delegate each feature requests to DatasetD.dataset() with proper parameters
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing DatasetD causes cache system to be ignored, leading to inconsistent caching behavior
    stage_ids:
    - data_provider
  - id: finance-C-061
    when: When implementing ExpressionProvider field parsing
    action: Catch NameError and SyntaxError exceptions for invalid field expressions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Invalid field expressions (typos, missing operators) cause cryptic errors instead of helpful error messages
    stage_ids:
    - data_provider
  - id: finance-C-062
    when: When claiming real-time data capability for the data provider
    action: Claim real-time or live market data access capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Qlib data provider loads from pre-downloaded local files or server cache, claiming real-time access misleads
      users about data freshness
    stage_ids:
    - data_provider
  - id: finance-C-063
    when: When presenting feature data to users
    action: Claim float32 precision is equivalent to financial-grade precision
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: float32 has limited precision (~7 decimal digits) and may cause rounding errors in high-frequency trading
      calculations
    stage_ids:
    - data_provider
  - id: finance-C-064
    when: When using LocalExpressionProvider with non-datetime indexed data
    action: Convert integer index to datetime using calendar lookup
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping index conversion causes features to have wrong datetime labels, corrupting time-series analysis
      results
    stage_ids:
    - data_provider
  - id: finance-C-065
    when: When implementing PITProvider.period_feature() field validation
    action: Validate period fields end with '_q' or '_a' suffix
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Invalid PIT field names cause silent failures or incorrect financial data retrieval
    stage_ids:
    - data_provider
  - id: finance-C-068
    when: When preparing data for model inference with DatasetH.prepare()
    action: use data_key=DK_I (inference) instead of DK_L (learning) to fetch data without label-aligned processing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using DK_L for inference applies learn_processors (e.g., DropnaLabel) that drop samples based on label values,
      causing data mismatch with live trading conditions
    stage_ids:
    - dataset
  - id: finance-C-069
    when: When placing processors in infer_processors list
    action: verify each processor returns True for is_for_infer() method, otherwise a TypeError will be raised
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Placing label-dependent processors (e.g., DropnaLabel) in infer_processors raises TypeError during inference
      data preparation, breaking the pipeline
    stage_ids:
    - dataset
  - id: finance-C-070
    when: When initializing DataHandlerLP with init_type=IT_FIT_SEQ
    action: fit each processor sequentially using the output of the previous processor as input to the next
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect sequential fitting causes processors to use unprocessed data for normalization/statistics, resulting
      in incorrect feature scaling during training
    stage_ids:
    - dataset
  - id: finance-C-071
    when: When using DataHandler.CS_ALL column set for fetching data
    action: use specific column sets (feature, label, weight) instead of CS_ALL to avoid loading unnecessary columns
    severity: medium
    kind: resource_boundary
    modality: should_not
    consequence: Fetching all columns with CS_ALL loads feature, label, and weight data unnecessarily, consuming excessive
      memory and slowing down data loading
    stage_ids:
    - dataset
  - id: finance-C-072
    when: When using TSDataSampler for time-series data sampling
    action: swap the DataFrame index to <instrument, datetime> order before passing to TSDataSampler, which internally swaps
      back to <datetime, instrument>
    severity: high
    kind: domain_rule
    modality: must
    consequence: Index ordering mismatch causes incorrect time-series window retrieval, leading to shuffled or misaligned
      training samples in RNN/Transformer models
    stage_ids:
    - dataset
  - id: finance-C-073
    when: When preparing time-series segments with TSDatasetH._prepare_seg()
    action: extend the slice start time by step_len periods to verify complete time-series windows are available
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without proper padding, the first step_len time steps in each segment contain NaN values, causing gradient
      computation issues or model training failures
    stage_ids:
    - dataset
  - id: finance-C-074
    when: When using DataHandlerLP with drop_raw=True
    action: attempt to access raw data via DK_R data_key after drop_raw=True has been set
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Accessing raw data after drop_raw=True raises AttributeError, and any downstream code expecting raw data
      will fail
    stage_ids:
    - dataset
  - id: finance-C-076
    when: When selecting col_set for dataset.prepare()
    action: use col_set=['feature', 'label'] instead of col_set='__all' to avoid loading unnecessary weight columns that may
      not be needed
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Loading unnecessary weight columns wastes memory and may cause unexpected behavior if weight-based sampling
      is not intended
    stage_ids:
    - dataset
  - id: finance-C-077
    when: When processing financial time-series data that requires historical context
    action: verify handler's start_time provides sufficient historical buffer for the longest rolling window or indicator
      period
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Insufficient historical buffer causes NaN values in early data windows, reducing effective training set size
      or causing incorrect rolling calculations
    stage_ids:
    - dataset
  - id: finance-C-078
    when: When using TSDataSampler with large datasets
    action: be aware that the sampler converts DataFrame to numpy arrays which may change data types, affecting precision
      for monetary calculations
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Data type conversion from DataFrame to numpy array causes loss of decimal precision, potentially affecting
      financial calculations in the strategy
    stage_ids:
    - dataset
  - id: finance-C-080
    when: When using Delta or other rolling operators that depend on shift
    action: verify the lookback period N is specified for the data frequency, accounting for non-trading days in the calendar
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using fixed-period rolling windows without accounting for trading calendar gaps causes inconsistent lookback
      periods across different market conditions
    stage_ids:
    - dataset
  - id: finance-C-081
    when: When accessing TSDatasetH segments via prepare()
    action: verify segments are defined with datetime-based slice objects, as TSDatasetH only supports datetime-level slicing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using instrument-level or other non-datetime slices in TSDatasetH causes KeyError or unexpected data retrieval
      behavior
    stage_ids:
    - dataset
  - id: finance-C-082
    when: When using DropnaLabel processor in learn_processors
    action: use DK_L data_key when fetching training data, ensuring samples with NaN labels are excluded from training
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using DK_I for training data fetches samples with NaN labels, causing gradient computation failures or training
      instability
    stage_ids:
    - dataset
  - id: finance-C-083
    when: When defining segments in DatasetH configuration
    action: provide segments as a dictionary mapping segment names (train/valid/test) to tuples of (start_time, end_time)
      or (start_time, end_time, None) for unbounded ranges
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect segment format causes KeyError or ValueError during dataset initialization, preventing model training
      from starting
    stage_ids:
    - dataset
  - id: finance-C-087
    when: When preparing training data in Model.fit, empty data must raise ValueError immediately
    action: check for empty DataFrame and raise ValueError with descriptive message
    severity: high
    kind: domain_rule
    modality: must
    consequence: Training on empty data produces invalid models with NaN/zero weights that generate meaningless predictions,
      corrupting entire backtest results
    stage_ids:
    - model
  - id: finance-C-090
    when: When using TrainerR for training, metrics are logged via MLflow tracking server integration
    action: call R.log_metrics() with epoch/step parameter to enable MLflow tracking
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without MLflow logging, experiment tracking is lost and reproducibility is compromised; cannot compare model
      iterations or rollback to known good states
    stage_ids:
    - model
  - id: finance-C-091
    when: When using Model.fit with biased training data, Reweighter must be supported for sample weighting
    action: accept reweighter parameter and apply sample weights during training
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without reweighter support, biased training data produces models that overfit to over-represented samples
      and underfit to rare but important cases
    stage_ids:
    - model
  - id: finance-C-092
    when: When implementing Model.predict, predictions must use the DK_I (inference) data key from Dataset
    action: call dataset.prepare(segment, col_set='feature', data_key=DataHandlerLP.DK_I) to get inference-ready features
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using DK_L (learning) data key at inference time may include label-leaked features or different preprocessing,
      causing look-ahead bias in predictions
    stage_ids:
    - model
  - id: finance-C-093
    when: When using Dataset.prepare in Model.fit, predictions must use the DK_L (learning) data key
    action: call dataset.prepare with data_key=DataHandlerLP.DK_L to get learning-processed features and labels
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using DK_I at training time applies inference preprocessing that may exclude training-only transformations,
      degrading model quality
    stage_ids:
    - model
  - id: finance-C-094
    when: When presenting Model training results, backtest performance must not be presented as guaranteed live trading returns
    action: present backtest results as simulated performance with explicit disclaimer about market conditions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as expected live trading returns misleads stakeholders and may result in regulatory
      violations; backtest ignores slippage, liquidity constraints, and market impact
    stage_ids:
    - model
  - id: finance-C-095
    when: When implementing LightGBM-based models, multi-label training must raise NotImplementedError
    action: check label dimensions and raise ValueError if multi-label training is attempted
    severity: high
    kind: domain_rule
    modality: must
    consequence: LightGBM does not support multi-label output; attempting multi-label training produces undefined behavior
      and crashes during predict
    stage_ids:
    - model
  - id: finance-C-096
    when: When using Qlib model components for production deployment, additional caution and validation is required
    action: apply extra validation, monitoring, and risk controls beyond backtest validation
    severity: medium
    kind: claim_boundary
    modality: should
    consequence: Qlib components originate from research projects with paper code; production use without additional safeguards
      may lead to unexpected trading behavior and financial losses
    stage_ids:
    - model
  - id: finance-C-097
    when: When implementing Model.fit, the dataset must contain 'train' in its segments
    action: assert 'train' in dataset.segments before proceeding with training
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without a train segment, model cannot access training data, causing immediate crash or training on wrong
      data segment
    stage_ids:
    - model
  - id: finance-C-098
    when: When training with TrainerR in a subprocess, model objects must be fully pickle-able
    action: verify model has no unpickle-able components (lambda functions, open file handles, etc.)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Non-pickle-able models cause training to fail when TrainerR uses call_in_subproc=True, breaking the distributed
      training pipeline
    stage_ids:
    - model
  - id: finance-C-099
    when: When implementing TopkDropoutStrategy without only_tradable flag
    action: skip tradability checks for stocks in trading decisions
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Orders may be generated for suspended stocks or stocks at limit-up/limit-down, causing orders to fail execution
      and potential capital losses in live trading
    stage_ids:
    - strategy
  - id: finance-C-100
    when: When generating sell orders for stocks with hold_thresh enforcement
    action: check stock holding period against hold_thresh before selling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stocks sold before the minimum holding period will violate trading constraints, potentially causing regulatory
      issues in markets with day-trading restrictions
    stage_ids:
    - strategy
  - id: finance-C-101
    when: When using risk_degree parameter for position sizing
    action: leave 5% cash buffer when risk_degree is 0.95 (the default)
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Full capital deployment without buffer can cause inability to cover trading costs and order shortfalls in
      volatile market conditions
    stage_ids:
    - strategy
  - id: finance-C-103
    when: When using forbid_all_trade_at_limit parameter for limit-up/down stocks
    action: set forbid_all_trade_at_limit=False to allow realistic trading at limit prices
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Conservative setting prevents selling at limit-up and buying at limit-down, causing strategy to deviate from
      realistic market behavior and underperforming
    stage_ids:
    - strategy
  - id: finance-C-104
    when: When implementing strategy using only_tradable parameter
    action: set only_tradable=True to filter suspended and limit-up/down stocks from trading decisions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without tradability filtering, strategy generates orders for stocks that cannot be traded, causing execution
      failures and inaccurate backtest results
    stage_ids:
    - strategy
  - id: finance-C-105
    when: When implementing strategy with exchange for tradability checks
    action: use trade_exchange.is_stock_tradable() method for tradability validation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct stock status checking without using exchange abstraction causes inconsistent behavior and bypasses
      important trading constraints
    stage_ids:
    - strategy
  - id: finance-C-107
    when: When using TopkDropoutStrategy with multiple signal sources
    action: pass pd.DataFrame with multiple signal columns to the strategy
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Strategy only handles the first column of multi-signal DataFrame, causing silent data loss and incorrect
      trading decisions
    stage_ids:
    - strategy
  - id: finance-C-108
    when: When using different exchange frequencies for trading
    action: use minutely exchange for minutely execution and daily exchange for daily execution
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using incompatible exchange frequency causes data access failures and strategy execution errors
    stage_ids:
    - strategy
  - id: finance-C-109
    when: When presenting backtest results from the strategy framework
    action: claim backtest returns as expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results reflect idealized conditions without slippage, latency, or market impact; presenting them
      as live performance misleads stakeholders and violates regulatory guidance
    stage_ids:
    - strategy
  - id: finance-C-110
    when: When using OrderGenWOInteract for order generation
    action: check tradability at both prediction time and trading time for each stock
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ignoring prediction-time tradability causes orders for stocks that were suspended when predicted, causing
      execution failures and inaccurate position calculations
    stage_ids:
    - strategy
  - id: finance-C-112
    when: When using check_stock_suspended for stock status validation
    action: treat stocks with None close price as suspended and not tradable
    severity: high
    kind: domain_rule
    modality: must
    consequence: Trading stocks with no close price causes NaN calculations and order generation failures, corrupting portfolio
      state
    stage_ids:
    - strategy
  - id: finance-C-113
    when: When calculating position weights in EnhancedIndexingStrategy
    action: normalize current weights by risk_degree to verify sum equals 1.0
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unnormalized weights cause incorrect position sizing and risk exposure mismatches, leading to portfolio drift
      and unexpected drawdowns
    stage_ids:
    - strategy
  - id: finance-C-114
    when: When generating buy orders with value calculation
    action: round order amounts by trade unit before creating Order objects
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unrounded amounts violate exchange trading unit requirements, causing order rejection and execution failures
    stage_ids:
    - strategy
  - id: finance-C-118
    when: When comparing stock amounts for equality in position sell operations
    action: use np.isclose for tolerance-aware comparison considering both relative and absolute amounts
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using exact equality comparison fails for large stock amounts due to floating-point precision; absolute tolerance
      check fails for small amounts due to insufficient precision
    stage_ids:
    - backtest_execution
  - id: finance-C-120
    when: When handling deal_price retrieval in Exchange.get_deal_price
    action: reject prices that are None, NaN, or <= 1e-08 as invalid
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid deal_price causes zero or incorrect trade_val calculations, leading to silent failures where orders
      appear to execute but no value changes occur
    stage_ids:
    - backtest_execution
  - id: finance-C-122
    when: When configuring Exchange for China A-share market backtesting
    action: use default trade_unit=100, limit_threshold=0.095, open_cost=0.0015, close_cost=0.0025
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incorrect trading unit causes order rejections or position mismatches; wrong cost rates cause inaccurate
      PnL estimates leading to poor strategy selection
    stage_ids:
    - backtest_execution
  - id: finance-C-123
    when: When using Exchange with adjusted_price mode
    action: set trade_unit to non-None value as this combination is unsupported
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Setting trade_unit in adjusted_price mode causes incorrect rounding behavior since adjusted prices already
      account for corporate actions
    stage_ids:
    - backtest_execution
  - id: finance-C-124
    when: When executing sell orders via deal_order
    action: 'expect short selling support as it is not implemented (TODO: make trading shortable)'
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Attempting to sell stocks not held will fail silently or cause ValueError, preventing testing of long-short
      strategies in backtest
    stage_ids:
    - backtest_execution
  - id: finance-C-125
