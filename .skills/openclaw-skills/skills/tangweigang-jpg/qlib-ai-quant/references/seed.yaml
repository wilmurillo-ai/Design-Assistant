    modality: must
    consequence: Expression calculations involving multiple features will misalign or fail when indices do not match the trading
      calendar
  - id: finance-C-218
    when: When configuring Exchange for order execution
    action: set deal_price field matching the available price expressions ($close, $open, $vwap) and configure open_cost/close_cost
      for proper PnL calculation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Trade execution will use incorrect prices or miss transaction costs, causing PnL reports to show unrealistic
      returns that cannot be reproduced in live trading
  - id: finance-C-219
    when: When handling suspended stocks in backtest
    action: treat stocks with NaN $close values as suspended and skip order execution, as suspended stocks cannot be traded
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attempting to execute orders for suspended stocks will cause errors or produce invalid trade results with
      zero execution
  - id: finance-C-220
    when: When using SignalWCache for model-based signals
    action: convert signal index to datetime level using convert_index_format() before caching, ensuring proper temporal alignment
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Strategy will receive incorrectly indexed signals, causing trading decisions to be made at wrong time points
  - id: finance-C-221
    when: When storing and retrieving recorders in rolling evaluation
    action: use separate experiment name for each rolling iteration (rolling_exp parameter) to avoid overwriting recorder
      artifacts
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Rolling evaluation results will be overwritten or confused, making it impossible to analyze per-period model
      performance
  - id: finance-C-226
    when: When calculating stock position adjustments in Exchange
    action: Apply factor (stock split/merger adjustment) to round amount by trade unit before executing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Position quantities will not be adjusted for stock splits, causing incorrect share counts and portfolio value
      mismatches
  - id: finance-C-227
    when: When building TradeDecisionWO in signal strategies
    action: Append sell orders before buy orders in the order list (sell_order_list + buy_order_list)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Execution order will be reversed, causing buy orders to potentially exhaust cash before sell orders can free
      capital
  - id: finance-C-228
    when: When executing orders in TT_PARAL (parallel) mode
    action: Sort orders by direction so SELL orders (direction=0) execute before BUY orders (direction=1), sorted by -direction
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Buying will occur before selling in parallel mode, potentially exceeding cash limits and causing order failures
  - id: finance-C-230
    when: When implementing or serializing Model classes
    action: Use attribute names starting with underscore '_' for learned model parameters — they will not be persisted by
      pickle serialization
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Model weights and learned parameters will be lost during serialization/deserialization, causing model loading
      failures or incorrect predictions
  - id: finance-C-232
    when: When calling Exchange.deal_order
    action: Accept that Order object will be modified in-place (deal_amount, factor fields updated), and return (trade_val,
      trade_cost, trade_price)
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Order status tracking will be incorrect if caller expects Order to remain unchanged after deal_order call
  - id: finance-C-233
    when: When implementing SoftTopkStrategy or similar cost-controlled rebalancing
    action: Execute Phase 1 (Deterministic Sell) completely before Phase 3 (Proportional Buy Allocation) — cash from sells
      must fund buys
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Buy orders may exceed available cash, causing order failures or margin violations in live trading
  - id: finance-C-234
    when: When implementing or using NestedExecutor in trading loops
    action: Call _init_sub_trading before _update_trade_decision each iteration to properly initialize sub-level infrastructure
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Sub-executor and sub-strategy will not be properly initialized, causing nested execution to fail or use stale
      state
  - id: finance-C-235
    when: When configuring Exchange limit_threshold for China markets (region=REG_CN or REG_TW)
    action: 'Use $change field direction: limit_buy for positive change (up limit), limit_sell for negative change (down limit)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stocks will be incorrectly blocked from buying on up-limit days or selling on down-limit days, causing missed
      trading opportunities and strategy failures
  - id: finance-C-236
    when: When configuring settle_type in BaseExecutor
    action: Accept that settle_type defaults to ST_NO (immediate cash settlement) — cash from sells is available immediately
      for buys
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Strategy will assume delayed settlement when it is not configured, causing cash balance miscalculations
  - id: finance-C-237
    when: When defining Point-in-Time data expressions
    action: Use $$ prefix for PFeature (e.g., $$roewa_q) while using $ prefix for regular Feature (e.g., $close) — $$ indicates
      point-in-time data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Point-in-time data will be incorrectly treated as regular data, causing look-ahead bias in fundamental data
      like earnings
  - id: finance-C-238
    when: When using Ref(expression, 0) in feature expressions
    action: Avoid Ref(expr, 0) which returns infinite back-rolling and causes unbounded data loading — use Ref(expr, N) with
      N > 0 instead
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Data loading will become extremely slow or run out of memory due to infinite back-rolling through all historical
      data
  - id: finance-C-239
    when: When collecting data from Yahoo Finance
    action: Validate and clean data before use — Yahoo Finance data is explicitly documented as 'might not be perfect'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Backtest results will be based on inaccurate price/volume data, causing incorrect strategy evaluation and
      potential financial loss
  - id: finance-C-240
    when: When computing expressions across different data frequencies
    action: Mix minute-level and daily-level data in feature expressions — cross-frequency expression computation is not supported
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Feature calculations will fail or produce incorrect results when attempting to combine data of different
      frequencies
  - id: finance-C-241
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live returns — backtesting ignores market impact, financing costs,
      and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-242
    when: When marketing or documenting Qlib's capabilities
    action: Claim Qlib supports real-time trading systems requiring sub-second execution — Qlib is designed for end-to-end
      offline research and backtesting workflows
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users building real-time trading systems will encounter severe limitations, causing system failures and financial
      losses during live market hours
  - id: finance-C-243
    when: When presenting backtest or paper trading results
    action: Present simulated (dry-run) results as proof of live execution capability — simulated execution differs fundamentally
      from real market execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will believe the strategy has proven live trading capability when only simulated results exist, leading
      to unexpected live trading losses
  - id: finance-C-244
    when: When using Qlib for financial predictions or trading
    action: Claim prediction accuracy observed in backtesting will persist in live markets — market regime changes cause model
      performance degradation
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users will over-allocate capital based on backtested accuracy that degrades under new market conditions,
      causing unexpected losses
  - id: finance-C-245
    when: When deploying Qlib in production trading environments
    action: Claim Qlib provides regulatory-compliant execution capabilities — Qlib does not include compliance, reporting,
      or audit trail features required by financial regulators
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users operating without proper compliance infrastructure may face regulatory penalties, trading halts, or
      legal consequences
  - id: finance-C-246
    when: When configuring Qlib for data collection from Yahoo Finance
    action: Expect 1-minute data from Yahoo Finance beyond the last month — YahooFinance API limitation restricts 1min data
      availability
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Intraday backtests will have incomplete data, causing incorrect strategy evaluation and missing trading signals
  - id: finance-C-247
    when: When implementing generate_order_for_target_amount_position in Exchange
    action: Use this function directly for live trading without validation — it explicitly uses future information in its
      calculation
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Live orders will be generated using information not yet available at order time, causing look-ahead bias
      and order failures
  - id: finance-C-248
    when: When initializing Qlib with provider_uri
    action: Use provider_uri path format consistent with region — cn data in ~/.qlib/qlib_data/cn_data, us data in specified
      us directory
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Data loading will fail or return incorrect market data when region and provider_uri path are mismatched
  - id: finance-C-249
    when: When storing data in Qlib format
    action: Store numeric features as float32 dtype to match Qlib's internal data format conventions
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Data conversion will occur during loading, slowing down data access and increasing memory usage
  - id: finance-C-250
    when: When implementing limit-based trading logic in Chinese stock markets
    action: Use tuple format for limit_threshold parameter (e.g., (limit_up, limit_down)) to enable asymmetric buy/sell limits
      matching real exchange rules — limit_up typically +10% for regular stocks, limit_down typically -10%
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using symmetric limits for Chinese stocks causes incorrect backtest results since buy and sell price limits
      are asymmetric (+10% vs -10%); strategies will miscalculate entry/exit prices and overestimate profitability
    derived_from_bd_id: BD-024
  - id: finance-C-251
    when: When configuring processor initialization order in dataset pipeline
    action: Use IT_FIT_SEQ (sequential fitting) for processors with dependencies — verify earlier processors fit before later
      ones that depend on their parameters (e.g., normalize before cross-sectional rank computation)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using parallel fitting (IT_FIT_PAR) when processors have dependencies causes incorrect normalization parameters
      to be used in rank calculations, leading to systematically wrong feature values and degraded model performance
    derived_from_bd_id: BD-013
  - id: finance-C-253
    when: When implementing data queries using the Expression or Dataset API in backtesting
    action: Use $$ prefix for Point-in-Time lookups and $ prefix for static (non-PIT) features; never substitute $ where $$
      is required to avoid look-ahead bias
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using $ (static) instead of $$ (PIT) in feature expressions introduces look-ahead bias, causing backtest
      results to appear significantly more profitable than actual live trading performance
    derived_from_bd_id: BD-002
  - id: finance-C-254
    when: When implementing TWAP/VWAP strategies or any strategy with volume constraints
    action: Use cum_limit parameter for cumulative volume limits requiring subtraction of already-traded volume; use limit
      parameter for per-step independent volume constraints; do not interchange them
    severity: high
    kind: domain_rule
    modality: must
    consequence: Confusing cum_limit with limit causes TWAP/VWAP strategies to exceed daily volume constraints, resulting
      in unrealistic backtest fills that cannot be executed in live trading
    derived_from_bd_id: BD-027
  - id: finance-C-256
    when: When configuring SignalStrategy for A-share market backtesting
    action: Verify that forbid_all_trade_at_limit setting matches strategy assumptions; for conservative backtesting, keep
      True; if changing to False, document the realistic execution risks explicitly
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Setting forbid_all_trade_at_limit=False allows selling limit-up stocks at unrealistic prices in backtesting,
      systematically inflating returns compared to actual trading where execution would fail
    derived_from_bd_id: BD-019
  - id: finance-C-257
    when: When implementing or extending Model classes for persistence and distribution
    action: Store learned parameters (weights, biases, fitted scalers, and other trained attributes) as non-private attributes
      without leading underscore; must NOT use '_' prefix for any attribute that must survive serialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Model attributes starting with '_' are excluded by Python's pickle serialization, causing model persistence
      to silently lose learned parameters and producing unusable models after reload
    derived_from_bd_id: BD-016
  - id: finance-C-258
    when: When evaluating strategy performance using MultiPassPortAnaRecord
    action: Configure multiple backtest passes (num_passes > 1) with shuffled initialization to reduce variance in performance
      estimation; must NOT rely on single-pass evaluation for final strategy assessment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single-pass evaluation produces high-variance performance estimates that may incorrectly accept or reject
      strategies, leading to overfitting or missed opportunities in live trading
    derived_from_bd_id: BD-037
  - id: finance-C-259
    when: When sizing orders for securities with non-standard lot sizes, particularly Chinese A-shares
    action: Use get_factor to adjust order quantities for securities not trading in 1-share lots; factor=100 for Chinese stocks;
      must NOT assume unit lot size for each markets
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without factor adjustment for non-standard lot sizes, order sizing calculations produce incorrect quantities
      that fail validation or execute incorrectly in live trading
    derived_from_bd_id: BD-026
  - id: finance-C-260
    when: When implementing or modifying Rolling window operations in feature engineering
    action: Preserve the Ref base class inheritance to maintain correct shift semantics for temporal alignment — do not refactor
      to use separate shift handling per operator
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing Rolling to use separate shift handling breaks temporal alignment in feature computation, causing
      features to access incorrect time periods and producing systematically wrong indicator values
    derived_from_bd_id: BD-005
  - id: finance-C-261
    when: When implementing temporal data access within Ref operations
    action: Use series.shift(self.N) for time-series shift operations — do not replace with manual indexing that breaks the
      expression tree abstraction
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Replacing shift semantics with manual indexing breaks the expression tree abstraction, causing downstream
      operators to lose temporal context and produce incorrect feature calculations
    derived_from_bd_id: BD-006
  - id: finance-C-262
    when: When integrating qlib with external reinforcement learning frameworks via the Simulator interface
    action: Maintain the gym-compatible step(action) interface signature and return format (obs, reward, done, info) — do
      not simplify or replace with custom RL interfaces that break framework compatibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Breaking the step(action) interface prevents integration with Stable Baselines, Ray RLlib, and other standard
      RL frameworks, requiring extensive adapter code or preventing RL strategy development entirely
    derived_from_bd_id: BD-034
  - id: finance-C-263
    when: When calculating execution costs and simulating trades in backtesting
    action: Use separate buy_price and sell_price from Exchange — calculate buy costs with buy_price (including ask spread)
      and sell proceeds with sell_price (including bid spread)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a single price model underestimates transaction costs by ignoring bid-ask spread, causing backtest
      returns to be inflated and unreproducible in live trading where spreads are real costs
    derived_from_bd_id: BD-023
  - id: finance-C-264
    when: When implementing or modifying SAOE order execution strategies
    action: Maintain SAOEStateAdapter to track order fill progress and current market data as the RL observation — do not
      replace with static observations that lack execution awareness
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using static observations removes execution awareness from the RL agent, causing suboptimal order execution
      decisions that result in worse fill prices and higher transaction costs in live trading
    derived_from_bd_id: BD-033
  - id: finance-C-265
    when: When collecting market data from Yahoo Finance API
    action: Implement delay of at least 0.5 seconds between requests — do not remove delays or increase request frequency
      as this triggers API blocking and data collection failures
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing rate limit delays causes Yahoo Finance API to block requests, resulting in incomplete or failed
      data collection that breaks historical data builds and live data feeds
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-266
    when: When implementing trading strategies that require finer temporal granularity than daily steps
    action: Verify that generate_trade_decision returns a generator when nested intraday execution is needed — verify the
      outer strategy properly iterates over yielded decisions for finer temporal resolution
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Not supporting generator-based trade decisions limits temporal granularity, preventing strategies from delegating
      intraday execution and reducing backtest fidelity for high-frequency approaches
    derived_from_bd_id: BD-021
  - id: finance-C-268
    when: When implementing rolling backtest workflows where underlying data changes between iterations
    action: Set disk_cache parameter to 2 (replace existing cache) to verify fresh data is used for each rolling window
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using cache mode 0 or 1 with rolling backtests causes stale data to be used, leading to look-ahead bias where
      training windows inadvertently include information from future periods relative to the window being tested
    derived_from_bd_id: BD-009
  - id: finance-C-269
    when: When executing trades in Chinese A-share backtesting
    action: Verify order quantities are multiples of 100 shares (trade_unit=100) - adjust position sizes and rebalance amounts
      to satisfy the lot size requirement
    severity: high
    kind: domain_rule
    modality: must
    consequence: Submitting orders with quantities not divisible by 100 causes settlement failure in live A-share trading
      since exchanges reject non-lot trades; backtests assuming fractional lots become non-reproducible
    derived_from_bd_id: BD-040
  - id: finance-C-270
    when: When selecting tradeable stocks in A-share rolling backtest simulations
    action: Apply limit_threshold=0.095 (9.5% daily price move limit) to filter out limit-up and limit-down stocks - set stock
      status to non-tradable when abs(close - prev_close) / prev_close >= 0.095
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper price limit filtering, backtests assume execution at limit-up/down prices that are unobtainable
      in live trading; strategies targeting momentum at limit-moves will show inflated backtest returns that cannot be replicated
    derived_from_bd_id: BD-041
  - id: finance-C-271
    when: When generating execution reports in A-share backtesting
    action: Use close price as the deal_price for order fills to verify deterministic, benchmark-aligned execution cost calculation
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using VWAP or open price introduces intraday data dependencies and makes backtest results incomparable to
      standard benchmarks that use close price; order fills become non-reproducible without end-of-day price confirmation
    derived_from_bd_id: BD-042
  - id: finance-C-273
    when: When implementing or refactoring processor logic in dataset handlers
    action: Maintain separate infer_processors and learn_processors paths — do not unify them into a single processor pipeline
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unifying processors creates data leakage where future information bleeds into training features through transformations
      like normalization fitting on the full dataset, causing overfitted models that perform well in backtest but fail in
      live trading
    derived_from_bd_id: BD-011
  - id: finance-C-274
    when: When implementing or refactoring data handler logic for training vs inference
    action: Use DK_L (learning) keys for training data processing and DK_I (inference) keys for prediction — do not use the
      same data keys for both phases
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using unified data keys for both training and inference causes unnecessary label computation during prediction,
      increasing latency and memory usage without any benefit to model accuracy
    derived_from_bd_id: BD-012
  - id: finance-C-275
    when: When implementing or refactoring model classes in the model layer
    action: Implement fit() and predict() as abstract methods with proper interface contracts — do not replace with duck typing
      or optional implementations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Removing abstract method enforcement allows models without proper fit/predict implementations to pass type
      checks but fail at runtime, causing polymorphic dataset handling to break when training or prediction code encounters
      incomplete implementations
    derived_from_bd_id: BD-015
  - id: finance-C-276
    when: When implementing or refactoring order execution logic in backtest executor
    action: Execute sell orders before buy orders within each trading step — do not reorder to buy-first or parallel execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Buy-before-sell execution creates hidden leverage when capital is insufficient because sold stock cash is
      not immediately available under T+1 settlement, causing backtest to assume positions that would be rejected in live
      trading due to insufficient funds
    derived_from_bd_id: BD-056
  - id: finance-C-277
    when: When configuring trading cost parameters for A-share backtesting
    action: Verify that open_cost=0.0005 and close_cost=0.0015 match actual broker fee structures (0.05% open commission plus
      0.15% close including stamp duty), and adjust if the specific account has different fee rates
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Inheriting default asymmetric costs of 0.05%/0.15% overestimates returns for accounts with lower fees or
      underestimates for higher-fee accounts, causing backtest results to diverge from actual trading performance by 10-30%
      in high-frequency strategies
    derived_from_bd_id: BD-043
  - id: finance-C-278
    when: When configuring minimum commission floor for A-share backtesting
    action: Set min_cost=5.0 CNY per trade as the commission floor — do not set to zero or remove the minimum
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing the minimum commission floor allows micro-positions with negligible commissions to consume execution
      capacity, creating unrealistic backtest scenarios where tiny positions generate apparently profitable trades that would
      be uneconomical in live trading due to regulatory minimum commission requirements
    derived_from_bd_id: BD-044
  - id: finance-C-279
    when: When implementing portfolio rebalancing logic with selling decisions
    action: Exclude bottom n_drop=5 performers from selling candidates — do not sell the worst performers regardless of intraday
      reversal potential
    severity: high
    kind: domain_rule
    modality: must
    consequence: Selling all positions including the worst performers during rebalancing ignores intraday reversal patterns
      in Chinese A-shares, causing premature liquidation of positions that would recover, reducing backtest returns compared
      to strategies that hold through temporary downturns
    derived_from_bd_id: BD-046
  - id: finance-C-280
    when: When implementing nested strategy execution logic in backtesting
    action: Remove or bypass the TradeRange.clip_time_range() constraint — inner strategies must be temporally bounded by
      parent strategy time ranges
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Removing clip_time_range allows inner strategies to execute trades outside permitted hours, causing hierarchical
      execution control to fail and allowing trades that parent strategies explicitly prohibited
    derived_from_bd_id: BD-029
  - id: finance-C-281
    when: When implementing RL trading integration with qlib
    action: Use the Interpreter pattern to translate RL states/actions to qlib domain concepts (portfolios, orders, observations)
      — do not access qlib objects directly from RL frameworks
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct coupling between RL frameworks and qlib internal objects creates brittle integration that breaks when
      qlib internals change, preventing strategy portability across different qlib versions
    derived_from_bd_id: BD-032
  - id: finance-C-283
    when: When implementing price recording in financial data processing
    action: Use float64 data type for each price recording operations to verify sufficient precision for financial calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using float32 for price recording introduces rounding errors that accumulate in cumulative return calculations
      and cross-instrument comparisons, causing backtest equity curves and PnL reports to diverge from actual trading results
    derived_from_bd_id: BD-058
  - id: finance-C-284
    when: When training long horizon prediction models with daily frequency
    action: Use risk_daily_epoch=100 as the training epoch count for daily frequency long-horizon models
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fewer than 100 epochs causes insufficient learning of temporal dependencies across market regimes,
      resulting in unreliable predictions that fail to capture long-horizon patterns and cause significant live trading losses
    derived_from_bd_id: BD-048
  - id: finance-C-285
    when: When selecting training data period for long-horizon models
    action: Use start_date=2008-01-01 or earlier to capture post-financial crisis market behavior and include sufficient market
      cycles for robust pattern learning
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using a later start date (e.g., 2010) reduces training samples for rare market events, causing models to
      be unprepared for crisis scenarios and systematically underperform during market stress periods
    derived_from_bd_id: BD-050
  - id: finance-C-286
    when: When selecting backtest out-of-sample period
    action: Use test_start_date=2020-01-01 to include COVID market shock and recovery for meaningful out-of-sample stress
      testing
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using a test period that excludes market stress events like COVID provides misleadingly optimistic backtest
      results that do not reflect actual strategy performance during turbulent market conditions
    derived_from_bd_id: BD-053
  - id: finance-C-287
    when: When implementing rolling backtest handler processing
    action: Enable handler caching for rolling backtests to reuse processed data across windows where underlying features
      remain unchanged
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without handler caching in rolling backtests, each window recomputes data from scratch, causing excessive
      execution time that makes iterative strategy development impractical
    derived_from_bd_id: BD-039
  - id: finance-C-288
    when: When reporting benchmark-relative performance metrics
    action: Use Information Ratio as the primary performance metric for active portfolio management — calculate as (portfolio_return
      - benchmark_return) / tracking_error
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Sharpe ratio alone ignores benchmark-relative performance, misrepresenting strategy value by not accounting
      for tracking error; strategies may appear profitable while underperforming simple passive exposure
    derived_from_bd_id: BD-099
  - id: finance-C-289
    when: When implementing TWAP execution strategy
    action: Use ceiling rounding for trade_unit calculations to verify TWAP execution completes on schedule — be aware that
      this causes slightly larger individual trades and marginal early completion
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using floor rounding instead of ceiling rounding causes TWAP execution to complete slightly late, potentially
      missing scheduled rebalancing windows and causing execution at suboptimal prices
    derived_from_bd_id: BD-119
  - id: finance-C-291
    when: When implementing portfolio rebalancing logic
    action: Execute rebalancing on a daily frequency to match feature generation and model prediction cycles
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using weekly or monthly rebalancing introduces look-ahead bias since the framework generates features daily;
      changes in market conditions between rebalancing dates would be invisible to the model
    derived_from_bd_id: BD-066
  - id: finance-C-292
    when: When setting up experiment tracking and logging
    action: Use log_file_path for persistent experiment records instead of in-memory only logging
    severity: high
    kind: domain_rule
    modality: must
    consequence: In-memory only logging loses all experiment records after process termination, making it impossible to audit
      historical results or reproduce past experiments
    derived_from_bd_id: BD-067
  - id: finance-C-293
    when: When splitting data for model development and evaluation
    action: Use temporal separation for train/valid/test splits to prevent data leakage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Random data splits allow future information to leak into training, causing model evaluation metrics to overestimate
      real-world performance and producing misleading backtests
    derived_from_bd_id: BD-068
  - id: finance-C-294
    when: When implementing hierarchical backtesting with portfolio-level and stock-level decisions
    action: Use nested decision execution structure to properly handle hierarchical strategy evaluation where high-level allocation
      interacts with low-level execution
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Flat execution cannot properly represent hierarchical strategies where portfolio allocation decisions interact
      with stock-level execution, leading to incorrect backtest results for composite strategies
    derived_from_bd_id: BD-073
  - id: finance-C-295
    when: When implementing trade classification and reporting logic
    action: Use integer status codes (0=hold, -1=sell, 1=buy) for trade classification to verify compatibility with standard
      sorting and filtering operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: String codes break numeric sorting and filtering operations in downstream reporting, requiring costly refactoring
      of report generation and analysis pipelines
    derived_from_bd_id: BD-083
  - id: finance-C-296
    when: When implementing trading strategies for backtesting
    action: Use SBBS (Better Sell/Buy Selection) rule-based strategy as a baseline for strategy comparison
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without a deterministic baseline strategy, ML strategies cannot demonstrate value-add; absence of interpretable
      benchmark makes it impossible to validate whether increased model complexity actually improves returns
    derived_from_bd_id: BD-084
  - id: finance-C-297
    when: When implementing position sizing and risk management logic
    action: Use limit_sell and limit_buy volume thresholds to control maximum position concentration per instrument and verify
      realistic liquidity constraints
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without volume limits, strategies can accumulate positions exceeding realistic liquidity, causing significant
      market impact in live trading that is not reflected in backtests
    derived_from_bd_id: BD-087
  - id: finance-C-298
    when: When processing meta-learning predictions before IC calculation
    action: Apply mean-centering to predictions to remove temporal drift bias that would leak future information into current
      predictions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without mean-centering, temporal drift in predictions introduces future information leakage, causing IC metrics
      to overestimate true forward-looking model quality
    derived_from_bd_id: BD-090
  - id: finance-C-299
    when: When training sandwich model hybrid CNN-KRNN architecture for market prediction
    action: Use MSE loss function with gradient clipping at 3.0 to verify stable regression gradients and prevent explosive
      gradients during adversarial training phases
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative loss functions without proper gradient control causes training instability; MAE converges
      too slowly while Huber adds hyperparameter sensitivity that degrades model performance
    derived_from_bd_id: BD-091
  - id: finance-C-300
    when: When generating market labels for adversarial decorrelation models
    action: Use tercile quantile discretization (1/3, 2/3 boundaries) to create balanced market labels (bear/neutral/bull)
      with equal sample proportions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using quartile discretization creates 4-class problems with more label imbalance, while binary classification
      loses market regime nuance, both causing classification instability
    derived_from_bd_id: BD-093
  - id: finance-C-301
    when: When implementing optimal transport assignment in TRA model training
    action: Use sinkhorn with entropic regularization (L2) and epsilon=0.01 — do not modify epsilon to other values like 0.1
      or 0.001
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing epsilon to 0.1 causes excessive smoothing that distorts the optimal transport plan, leading to incorrect
      sample matching and degraded model training quality; epsilon=0.001 risks numerical instability or divergence
    derived_from_bd_id: BD-079
  - id: finance-C-302
    when: When evaluating model predictions in adversarial decorrelation pipeline
    action: Calculate both IC (Pearson) and Rank IC (Spearman) for model evaluation — do not rely on a single metric alone
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using only Pearson IC misses non-linear monotonic relationships and is sensitive to outliers, potentially
      selecting suboptimal models that perform poorly on rank-based trading signals
    derived_from_bd_id: BD-094
  - id: finance-C-303
    when: When calculating daily IC metrics in meta-learning data selection utilities
    action: Skip IC calculation for days with fewer than 50 samples to avoid statistical noise corruption
    severity: high
    kind: operational_lesson
    modality: must
    consequence: IC values computed with less than 50 samples are dominated by sampling noise rather than true predictive
      signal, corrupting meta-learning training data and potentially causing models to learn spurious correlations
    derived_from_bd_id: BD-101
  - id: finance-C-304
    when: When initializing LightGBM models for trading signal prediction
    action: Use MSE loss for regression tasks (continuous returns) and binary cross-entropy for classification tasks (direction
      prediction) — match loss to prediction target type
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using MSE for classification tasks produces poorly calibrated probabilities and suboptimal convergence; using
      cross-entropy for regression causes the model to optimize the wrong objective, degrading prediction accuracy
    derived_from_bd_id: BD-104
  - id: finance-C-305
    when: When initializing CatBoost models for trading signal prediction
    action: Use RMSE loss for regression tasks (continuous returns) and Logloss for binary classification tasks — match loss
      to prediction target type
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using RMSE for classification produces misaligned gradients and poor probability calibration; using Logloss
      for regression optimizes the wrong objective, potentially causing predictions to be systematically biased
    derived_from_bd_id: BD-105
  - id: finance-C-306
    when: When implementing or tuning regularization parameters in the model's training loop
    action: Maintain rho=0.99 for exponential decay of regularization in financial time series models - do not change to more
      aggressive values like rho=0.95 unless market regime analysis specifically warrants faster adaptation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using rho=0.95 instead of rho=0.99 causes regularization to decay too aggressively, overly shrinking recent
      observations and degrading model accuracy for stable market regimes common in financial time series
    derived_from_bd_id: BD-080
  - id: finance-C-307
    when: When implementing trend-following signals in the strategy layer
    action: Use EMA (exponential moving average) for signal generation, not SMA (simple moving average) - EMA's faster response
      to price changes is essential for trend-following overlay with SBBS
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing EMA with SMA slows trend signal response, causing delayed entry and exit points that systematically
      erode trend-following strategy returns during rapid market reversals
    derived_from_bd_id: BD-085
  - id: finance-C-308
    when: When implementing linear models for high-dimensional factor spaces
    action: Use Ridge Regression with L2 regularization via sklearn for linear model baselines - do not replace with plain
      OLS or remove regularization as it prevents overfitting on high-dimensional factor data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing L2 regularization from linear models in high-dimensional factor spaces causes severe overfitting,
      leading to poor generalization and significant live trading losses compared to backtested results
    derived_from_bd_id: BD-107
  - id: finance-C-310
    when: When configuring strategy parameters without explicit risk_degree specification
    action: Verify that risk_degree=0.95 (95% portfolio utilization) matches your strategy's risk tolerance - this default
      reserves 5% cash buffer but may not suit high-volatility or margin-sensitive strategies
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default risk_degree=0.95 without adjustment can cause margin calls or forced liquidations during volatility
      spikes for strategies requiring higher cash reserves
    derived_from_bd_id: BD-109
  - id: finance-C-311
    when: When implementing rolling calculations using Ref(expression, offset)
    action: Use explicit finite offsets for rolling calculations (e.g., Ref(expr, -252) for 1-year window) - do not use Ref(expr,
      0) as it returns infinite back-rolling causing unbounded memory consumption
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using Ref(expr, 0) causes unbounded memory growth on large datasets, eventually crashing the backtesting
      process or causing severe performance degradation as memory exhaustion approaches
    derived_from_bd_id: BD-115
  - id: finance-C-312
    when: When configuring RollingGen parameters for rolling training
    action: 'Explicitly specify window type: use ROLL_SD (sliding window fixed size) for constant training time, or ROLL_EX
      (expanding window) for maximum historical coverage - document the choice as it fundamentally changes model behavior
      over time'
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Mixing expanding and sliding windows without explicit selection causes training data composition to drift
      unpredictably, producing inconsistent model behavior across different training periods
    derived_from_bd_id: BD-124
  - id: finance-C-313
    when: When implementing or optimizing covariance matrix estimation for portfolio construction
    action: Use Ledoit-Wolf shrinkage estimation with alpha auto-estimation toward constant variance target; verify n_samples
      is sufficient relative to n_assets (n_samples >= 3 * n_assets recommended)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using raw sample covariance without shrinkage produces ill-conditioned matrices when n_samples < n_assets,
      leading to unstable portfolio weights and significant tracking error in live trading
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-314
    when: When implementing risk parity portfolio optimization
    action: Implement risk parity using squared difference from equal risk contribution as the objective function; validate
      that covariance matrix is well-conditioned before optimization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using naive inverse volatility weighting instead of risk parity changes risk contribution distribution, causing
      unequal risk exposure across assets and violating portfolio mandate
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-315
    when: When configuring reinforcement learning training with replay buffer
    action: Set replay buffer size to at least 20000 and episodes_per_iter to at least 1000 to verify stable gradient estimates;
      monitor for training instability with very long episode lengths
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using smaller buffer size or fewer episodes per iteration produces noisy gradient estimates, causing unstable
      policy convergence and unpredictable trading behavior in live deployment
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-316
    when: When implementing enhanced indexing portfolio optimization
    action: Set benchmark deviation limit delta=0.2 and factor deviation limit b_dev=0.01 with epsilon=5e-05 for numerical
      stability; do not loosen constraints for better alpha capture
    severity: high
    kind: domain_rule
    modality: must
    consequence: Loosening factor deviation limits to capture more alpha causes portfolio to deviate from benchmark, increasing
      tracking error and potentially violating index fund mandate
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-317
    when: When managing model lifecycle and deployment status transitions
    action: Use the three-state model with ONLINE_TAG, OFFLINE_TAG, and NEXT_ONLINE_TAG; implement explicit transition logic
      for state changes and do not introduce additional states without updating transition rules
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Introducing additional model states (e.g., 'retiring') without updating transition rules causes undefined
      behavior in staged rollouts and graceful transitions
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-319
    when: When performing operations that require alignment across multiple SepDataFrame instances
    action: Verify column alignment before cross-column operations on SepDataFrame; do not assume parallel DataFrames maintain
      automatic synchronization after modifications
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Lazy joining on misaligned SepDataFrame instances produces silent data corruption where results appear valid
      but contain mismatched values across columns
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-320
    when: When selecting models for alpha factor research in quantile-based trading strategies
    action: Use Information Coefficient (IC) as the primary evaluation metric for model selection — IC measures rank correlation
      between predictions and actual returns and is invariant to monotonic transformations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using RMSE/MSE for model selection introduces sensitivity to outliers and loses rank-invariance property,
      leading to selection of models that optimize point estimates rather than ranking quality; this causes suboptimal trading
      signal quality and directly impacts strategy profitability
    derived_from_bd_id: BD-047
  - id: finance-C-321
    when: When configuring training data periods for backtesting
    action: Use end_date values after 2020-12-31 for training data periods — training data must end no later than 2020-12-31
      to maintain clean separation from test set and avoid data leakage
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Extending training data beyond 2020-12-31 causes look-ahead bias where future information contaminates model
      training, producing overly optimistic backtest results that cannot be reproduced in live trading
    derived_from_bd_id: BD-051
  - id: finance-C-322
    when: When implementing order execution logic for baseline strategy evaluation
    action: Use TradeDecisionWO (Without Order) for order execution — TradeDecisionWO trades each generated signal without
      position constraints, enabling evaluation of signal quality without portfolio-level interference from position limits
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using position-constrained execution for baseline evaluation adds portfolio-level complexity that interferes
      with signal quality assessment; trades that should execute may be rejected or modified, distorting the true signal performance
      measurement
    derived_from_bd_id: BD-065
  - id: finance-C-323
    when: When using the framework's default last_days=30 parameter for initial stock price lookup
    action: Verify that the 30-day lookback accommodates maximum suspension periods for target stocks; check if any stocks
      in the portfolio have historically been suspended for more than 30 trading days, as the lookup will fail to find a valid
      reference price
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Stocks suspended for more than 30 days will have no valid price reference, causing the backtest to either
      use stale pre-suspension prices or generate gaps in the portfolio, leading to incorrect equity calculations
    derived_from_bd_id: BD-069
  - id: finance-C-324
    when: When implementing rolling backtest logic with feature computation caching enabled
    action: Verify cache invalidation state before rolling window transitions; verify expression-level, handler-level, and
      disk-level caches are each properly invalidated when underlying data changes, or disable caching during rolling backtests
      to prevent stale feature values
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Expression and handler caches may return stale computed features despite disk_cache=2 updating underlying
      data, causing rolling backtests to use features derived from incorrect data without triggering cache warnings
    derived_from_bd_id: BD-138
  - id: finance-C-325
    when: When writing code that consumes feature storage lookup results
    action: Use 'if result.empty' or 'if len(result) == 0' instead of 'if result is None' to check for missing data, since
      feature storage returns empty pd.Series with dtype=float32 rather than None
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Code checking 'if result is None' will silently fail when data is missing, causing NaN values to propagate
      through backtest calculations and produce incorrect strategy performance metrics
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-326
    when: When implementing data processing pipelines in Qlib backtesting
    action: 'Follow the strict 3-stage contract: raw data (DK_R) must pass through inference stage (DK_I) for feature engineering
      before reaching learn stage (DK_L) — verify each stage receives properly transformed inputs'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Bypassing the infer stage (DK_I) causes data leakage where raw features enter model training without proper
      transformation, systematically overstating backtest returns and causing live trading performance degradation
    derived_from_bd_id: BD-110
  - id: finance-C-328
    when: When using the Exchange class for backtesting without explicit spread configuration
    action: Verify that buy_price == sell_price default matches actual market conditions; for realistic backtest results,
      configure deal_price with actual bid-ask spread (typically 0.05-0.2% round-trip for liquid stocks, higher for illiquid
      or retail-accessible markets)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Zero bid-ask spread assumption treats buy and sell at identical prices, systematically overstating strategy
      returns by the spread amount; in live trading, each round-trip incurs the spread cost, making backtest results optimistically
      biased by 0.1-0.4% per trade
    derived_from_bd_id: BD-113
  - id: finance-C-329
    when: When processing stock data via ArcticFeatureProvider for markets outside standard Chinese trading hours
    action: Assume the framework handles market-specific trading hour configurations for non-Chinese markets or extended trading
      sessions — the ArcticFeatureProvider contains hardcoded Chinese market hours (09:15-11:30, 13:00-15:00) that will cause
      data processing errors or incorrect timestamp alignment for other markets
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Hardcoded Chinese trading hours cause timestamp misalignment when processing US, EU, or other Asian market
      data; order timestamps may fall outside the hardcoded session windows, leading to missing data points or incorrect feature
      calculations
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-330
    when: When configuring data providers for non-Chinese markets using ArcticFeatureProvider
    action: Pass market_transaction_time_list as a configurable parameter to override the hardcoded Chinese trading hours;
      for US markets use 09:30-16:00 EST, for EU markets use 09:00-17:30 CET, for extended hours add pre-market/after-hours
      sessions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without configurable trading hours, data timestamps will be incorrectly aligned to Chinese market windows,
      causing features to be computed on wrong time slices and producing strategies that execute at incorrect times in live
      trading
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-331
    when: When implementing position adjustment logic in TopkDropoutStrategy
    action: Execute sell orders first (exiting positions closed before new positions open) then buy orders in the same rebalancing
      step
    severity: high
    kind: domain_rule
    modality: must
    consequence: Buying before selling creates hidden leverage when capital is insufficient; sell-before-buy ordering prevents
      holding both exiting and entering positions simultaneously, reducing gross exposure during rebalancing
    derived_from_bd_id: BD-117
  - id: finance-C-332
    when: When implementing SoftTopkStrategy phase execution logic
    action: 'Complete Phase 1: Deterministic Sell before executing Phase 3: Proportional Buy — target positions must be computed
      from a consistent base after sells complete'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Computing proportional buys before deterministic sells uses incorrect current holdings as the base calculation,
      leading to wrong position sizing that diverges from intended strategy behavior
    derived_from_bd_id: BD-118
  - id: finance-C-333
    when: When implementing or refactoring the Position class position dictionary handling
    action: Copy position_dict (defensive copy, not reference) to prevent external mutation from affecting internal position
      state
    severity: high
    kind: domain_rule
    modality: must
    consequence: Shared mutable state causes position calculations to become inconsistent within a backtest step when the
      caller retains and modifies the original dictionary reference
    derived_from_bd_id: BD-125
  - id: finance-C-334
    when: When implementing or refactoring the Executor class account copying between hierarchy levels
    action: Use shallow copy for trade_account between execution levels — positions must be shared for aggregation while metrics
      must remain independent for attribution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Deep copy would provide full isolation but prevent position aggregation across levels; shared reference would
      simplify but lose per-level P&L attribution tracking
    derived_from_bd_id: BD-127
  - id: finance-C-335
    when: When configuring disk_cache mode with training data truncation settings in backtesting
    action: Verify cache is invalidated or refreshed when test_start changes — disk_cache mode 1 with stale cached data predating
      the test boundary undermines training segment truncation (BD-111) and can introduce look-ahead bias
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using stale cached data that predates the test boundary causes BD-111's truncation to operate on incorrect
      historical data that may already contain future information relative to the intended training period
    derived_from_bd_id: BD-131
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
skill_crystallization:
  trigger: all_hard_gates_passed AND user_opt_out_skill_saving != true
  output_path_template: '{workspace}/../skills/{slug}.skill'
  slug_template: '{blueprint_id_short}-{uc_id_lower}'
  captured_fields:
  - name
  - intent_keywords
  - entry_point_script
  - validate_script
  - fatal_constraints
  - spec_locks
  - preconditions
  - install_recipes
  - human_summary_translated
  action: 'After all Hard Gates PASS, resolve slug via slug_template using the executed UC, then write the .skill YAML file
