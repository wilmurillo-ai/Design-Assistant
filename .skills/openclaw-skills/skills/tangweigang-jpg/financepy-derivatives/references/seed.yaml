resources:
  packages:
  - name: numpy
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: matplotlib
    version_pin: latest
  - name: numba
    version_pin: latest
  - name: llvmlite
    version_pin: latest
  - name: ipython
    version_pin: latest
  - name: mypy
    version_pin: latest
  - name: typing-extensions
    version_pin: latest
  - name: pytest
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy
    - python3 -m pip install scipy
    - python3 -m pip install pandas
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing date validation logic
    action: Validate date arguments in Date(day, month, year) order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Date arguments in wrong order (e.g., Date(1900, 1, 1) interpreted as year=1, month=1900) cause silent corruption
      of date calculations
    stage_ids:
    - utilities
  - id: finance-C-002
    when: When implementing year boundary checks
    action: Reject years before 1900 in Date class
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Dates before 1900 map incorrectly to Excel serial numbers causing financial calculations to produce wrong
      values
    stage_ids:
    - utilities
  - id: finance-C-003
    when: When implementing interpolation time validation
    action: Reject negative interpolation times with FinError
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative time values produce undefined discount factors and corrupt financial calculations downstream
    stage_ids:
    - utilities
  - id: finance-C-004
    when: When implementing array monotonicity checks
    action: Verify input arrays are strictly monotonically increasing before interpolation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-monotonic input arrays cause undefined interpolation behavior and incorrect discount factor calculations
    stage_ids:
    - utilities
  - id: finance-C-005
    when: When implementing root-finding solver
    action: Validate tolerance parameter is strictly positive
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-positive tolerance causes solver to either not iterate or divide by zero, producing undefined results
    stage_ids:
    - utilities
  - id: finance-C-006
    when: When implementing root-finding solver
    action: Validate maxiter parameter is greater than or equal to 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero or negative maxiter prevents any iteration, causing solver to fail immediately without finding a root
    stage_ids:
    - utilities
  - id: finance-C-009
    when: When using Numba jitted interpolation functions
    action: Verify discount factors are positive before log transformation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative or zero discount factors cause domain errors in log operations, crashing jitted functions
    stage_ids:
    - utilities
  - id: finance-C-016
    when: When implementing interpolation fit method
    action: Set discount factor arrays before calling interpolate
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Calling interpolate before fit() raises FinError('Dfs have not been set.')
    stage_ids:
    - utilities
  - id: finance-C-018
    when: When implementing day count type validation
    action: Validate day count type is a valid DayCountTypes enum value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid day count type causes AttributeError or wrong accrual calculations
    stage_ids:
    - utilities
  - id: finance-C-023
    when: When constructing discount curves from market instruments
    action: Use monotonically increasing time points to avoid interpolation errors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Interpolation with non-monotonic time points produces undefined discount factor values at crossing times,
      causing incorrect present value calculations and pricing errors
    stage_ids:
    - market_curves
  - id: finance-C-024
    when: When bootstrapping discount curves from calibration instruments
    action: Reproduce input instrument prices within SWAP_TOL=1e-10 tolerance
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Bootstrap failure to reproduce instrument prices within tolerance indicates incorrect curve construction,
      leading to wrong present values for all downstream products that use this curve
    stage_ids:
    - market_curves
  - id: finance-C-025
    when: When building interest rate curves from market data
    action: Verify each input instruments have start dates on or after the curve valuation date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Instruments starting before the valuation date create discount factors for past dates, causing negative time
      values and mathematically invalid discount factors
    stage_ids:
    - market_curves
  - id: finance-C-027
    when: When performing curve interpolation
    action: Use negative time values in interpolation calculations
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Negative time values cause log of discount factor to fail (math domain error) and produce invalid forward
      rate calculations
    stage_ids:
    - market_curves
  - id: finance-C-028
    when: When validating input instruments for curve construction
    action: Verify calibration instruments are provided in strictly increasing maturity order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Out-of-order instruments cause the bootstrap to solve for discount factors at incorrect time points, corrupting
      the entire term structure and producing wrong forward rates
    stage_ids:
    - market_curves
  - id: finance-C-029
    when: When validating input instruments for curve construction
    action: Verify deposit maturity dates occur before FRA maturity dates, and FRA dates occur before swap maturity dates
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Overlapping or out-of-sequence instruments cause the bootstrap algorithm to reference undefined discount
      factors, leading to incorrect curve construction and pricing failures
    stage_ids:
    - market_curves
  - id: finance-C-030
    when: When selecting interpolation type for curve bootstrapping
    action: Use only local interpolators (FLAT_FWD_RATES, LINEAR_FWD_RATES, LINEAR_ZERO_RATES, LINEAR_ONFWD_RATES) for the
      1D solver bootstrap method
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Non-local interpolators (cubic splines, PCHIP) cause each knot to affect all discount factors, breaking the
      sequential bootstrap assumption and producing incorrect curves
    stage_ids:
    - market_curves
  - id: finance-C-034
    when: When bootstrapping curves with FRAs
    action: Verify each swaps used in the bootstrap have coupon payment dates on the same schedule grid
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Misaligned coupon payment dates cause the bootstrap algorithm to reference incorrect cash flow timing, corrupting
      the discount factor calculation and producing materially wrong swap valuations
    stage_ids:
    - market_curves
  - id: finance-C-035
    when: When bootstrapping curves with FRAs
    action: Verify each swaps share the same effective/start date for the bootstrap to work correctly
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Swaps with different start dates create inconsistent pv01 calculations across the curve, causing the bootstrap
      to solve for discount factors at mismatched time points
    stage_ids:
    - market_curves
  - id: finance-C-039
    when: When interpolating volatility between two expiry time brackets
    action: produce negative variance during interpolation
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Negative variance indicates mathematical inconsistency in the volatility surface interpolation, leading to
      invalid sqrt(vart/t) computation and incorrect option pricing
    stage_ids:
    - market_volatility
  - id: finance-C-040
    when: When building a volatility surface with multiple time slices
    action: use consistent time convention with G_DAYS_IN_YEAR (365.0) for each expiry calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inconsistent day count conventions across expiry calculations will cause misaligned volatility interpolation
      and materially incorrect derivative pricing
    stage_ids:
    - market_volatility
  - id: finance-C-041
    when: When constructing SwaptionVolSurface or EquityVolSurface
    action: verify strike_grid and vol_grid are 2D arrays with identical dimensions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched grid dimensions cause index errors during calibration or silently incorrect pricing across the
      volatility surface
    stage_ids:
    - market_volatility
  - id: finance-C-042
    when: When creating an FXVolSurface instance
    action: provide a currency_pair string of exactly 6 characters
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid currency pair format prevents correct extraction of foreign/domestic currency names and causes downstream
      pricing errors
    stage_ids:
    - market_volatility
  - id: finance-C-045
    when: When interpolating volatility across time dimension
    action: interpolate in variance-time space (vol^2 * t), not volatility space
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Linear interpolation in volatility space violates no-arbitrage theory and can produce inconsistent term structures
      with calendar spread violations
    stage_ids:
    - market_volatility
  - id: finance-C-055
    when: When providing input volatility quotes
    action: verify ATM vol array length equals number of tenors/expiries
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched array lengths cause index errors during surface construction and prevent proper calibration
    stage_ids:
    - market_volatility
  - id: finance-C-059
    when: When implementing stochastic pricing models
    action: verify volatility is non-negative
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative volatility causes undefined sqrt operations in variance calculations, producing NaN or complex numbers
      that corrupt option pricing results
    stage_ids:
    - models
  - id: finance-C-060
    when: When implementing SABR or Black implied vol calculations
    action: validate strike and forward rate are strictly positive
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-positive strike or forward causes log(0) or division by zero in the Black-Scholes formula, producing
      undefined volatility results
    stage_ids:
    - models
  - id: finance-C-061
    when: When implementing option pricing functions
    action: enforce time_to_expiry is positive
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero or negative time_to_expiry causes division by zero in sqrt(t) calculations and corrupts the discount
      factor, producing invalid option prices
    stage_ids:
    - models
  - id: finance-C-062
    when: When implementing option pricing calculations
    action: clamp inputs to G_SMALL (1e-12) to prevent division by zero
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero volatility, strike, or time causes division by zero, producing infinite or NaN option values that corrupt
      downstream calculations
    stage_ids:
    - models
  - id: finance-C-063
    when: When calculating implied volatility
    action: enforce option price is greater than or equal to intrinsic value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Option price below intrinsic value violates arbitrage bounds and causes the implied vol solver to fail or
      produce undefined results
    stage_ids:
    - models
  - id: finance-C-080
    when: When valuing equity or FX options
    action: accept stock_price or spot_fx_rate values less than or equal to zero
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Black-Scholes and related models have singularities at zero or negative underlying prices, producing NaN
      or Inf outputs that corrupt downstream risk calculations.
    stage_ids:
    - products_equity_fx
  - id: finance-C-082
    when: When pricing European equity or FX options with Black-Scholes
    action: 'verify put-call parity holds: C - P = DF * (S - K) for equity, C - P = DF_dom * F - DF_dom * K for FX'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violation of put-call parity indicates fundamental mispricing or curve/parameter inconsistency, which cascades
      into incorrect delta hedging and risk management decisions.
    stage_ids:
    - products_equity_fx
  - id: finance-C-084
    when: When valuing equity options
    action: pass a dividend_curve (representing continuous dividend yield) in addition to discount_curve
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Equity forward price depends on dividend yield (F = S * exp((r-q)*T)). Without dividend curve, forward price
      is overestimated and option prices are systematically wrong, especially for high-yield stocks.
    stage_ids:
    - products_equity_fx
  - id: finance-C-085
    when: When valuing FX vanilla options
    action: use dual curve framework with separate domestic_curve and foreign_curve parameters
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: 'FX options require CIP pricing: the foreign currency is treated as an asset with foreign interest rate as
      dividend yield. Single-curve pricing violates no-arbitrage and produces systematically incorrect forward rates.'
    stage_ids:
    - products_equity_fx
  - id: finance-C-087
    when: When pricing FX vanilla options
    action: validate that volatility parameter is non-negative before passing to Black-Scholes or SABR pricing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative volatility causes sqrt(volatility) singularities in Black-Scholes, producing NaN option prices and
      Greeks that corrupt entire portfolio risk calculations.
    stage_ids:
    - products_equity_fx
  - id: finance-C-088
    when: When pricing equity index options
    action: validate strike_fx_rate is positive and delivery_dt is on or after expiry_dt
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative strike causes log(s/k) singularity in d1/d2 calculations. Delivery before expiry violates temporal
      logic and produces physically impossible option structures.
    stage_ids:
    - products_equity_fx
  - id: finance-C-089
    when: When using Black-Scholes analytical formulas for European option pricing
    action: verify the calculated price matches the analytical Black-Scholes formula within numerical precision
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Any deviation between analytical formula implementation and expected Black-Scholes values indicates implementation
      errors in d1/d2 calculations, normal CDF, or discount factor extraction that corrupt all option prices.
    stage_ids:
    - products_equity_fx
  - id: finance-C-091
    when: When pricing equity options with Black-Scholes analytical Greeks
    action: pass models other than BlackScholes to the analytical Greeks methods
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Analytical Greeks formulas (bs_delta, bs_gamma, bs_vega, etc.) are specific to Black-Scholes dynamics. Using
      other models (SABR, CRR tree) with these formulas produces incorrect Greeks that don't match finite difference validation.
    stage_ids:
    - products_equity_fx
  - id: finance-C-092
    when: When valuing equity options
    action: verify the discount_curve.value_dt matches the option value_dt exactly
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Discount curve rates are time-dependent. If curve valuation date doesn't match option valuation date, the
      discount factor extraction uses wrong rate interpolation, causing pricing errors.
    stage_ids:
    - products_equity_fx
  - id: finance-C-093
    when: When valuing FX options
    action: verify both domestic_curve.value_dt and foreign_curve.value_dt match the valuation date
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: FX CIP pricing requires simultaneous discount factors from both currency curves at matching dates. Date mismatch
      corrupts the CIP relationship and produces arbitrage opportunities in the forward curve.
    stage_ids:
    - products_equity_fx
  - id: finance-C-101
    when: When implementing swap valuation at inception
    action: value swap such that PV equals zero when fixed rate equals market swap rate
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Swap will be mispriced at inception, violating the fundamental no-arbitrage condition that at-the-money swaps
      have zero present value, leading to incorrect risk calculations
    stage_ids:
    - products_rates
  - id: finance-C-102
    when: When calculating DV01 on a swap
    action: compute DV01 as absolute value of PV01 to verify positive sensitivity regardless of leg direction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: DV01 will have incorrect sign for payer swaps, causing risk management systems to report negative rate sensitivity
      and leading to flawed hedging decisions
    stage_ids:
    - products_rates
  - id: finance-C-103
    when: When bootstrapping a discount curve with FRAs and swaps
    action: 'sequence instruments in order: deposits -> FRAs -> swaps with no temporal gaps'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Bootstrap will fail to span the yield curve completely, leaving gaps that require extrapolation and produce
      unreliable discount factors for terms without quoted instruments
    stage_ids:
    - products_rates
  - id: finance-C-104
    when: When computing swap rate with zero or near-zero PV01
    action: compute swap rate when PV01 magnitude is below G_SMALL threshold
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Division by near-zero PV01 produces numerical overflow or garbage swap rates, causing the entire pricing
      system to return invalid at-the-money rates
    stage_ids:
    - products_rates
  - id: finance-C-105
    when: When selecting interpolation type for curve bootstrapping
    action: use only local interpolators suitable_for_bootstrap=true during sequential bootstrap
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-local interpolators (cubic splines) will cause bootstrapped discount factors to depend on future unknown
      rates, creating look-ahead bias and invalidating the entire curve construction
    stage_ids:
    - products_rates
  - id: finance-C-110
    when: When building a discount curve with multiple swaps
    action: align each swap coupon payment dates on the same temporal grid
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Misaligned coupon schedules will cause bootstrapping to fit discount factors to inconsistent cash flow dates,
      producing a curve that cannot simultaneously reprice all input instruments
    stage_ids:
    - products_rates
  - id: finance-C-112
    when: When initializing HWTree model for swaption pricing
    action: set negative volatility (sigma) or negative mean reversion speed (a)
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Negative volatility produces invalid stochastic processes and non-positive discount factors; negative mean
      reversion violates the mathematical foundations of the Ornstein-Uhlenbeck process
    stage_ids:
    - products_rates
  - id: finance-C-116
    when: When validating swaption DV01 using finite difference bumping
    action: confirm pv01() method produces same DV01 as bump-and-revalue approach
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: DV01 mismatch indicates analytical pv01() calculation has an error in day count conventions, discount factor
      sensitivity, or cash flow timing assumptions
    stage_ids:
    - products_rates
  - id: finance-C-120
    when: When setting up IborSingleCurve for bootstrapping
    action: provide zero calibration instruments
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Zero instruments cannot define any discount factors, causing the curve to collapse to df=1 for all future
      dates and produce meaningless valuations
    stage_ids:
    - products_rates
  - id: finance-C-124
    when: When implementing CDSTranche valuation with Gaussian copula
    action: enforce monotonically decreasing tranche survival probabilities for both k_1 and k_2 attachment points
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-monotonic tranche survival probabilities produce mathematically invalid loss distributions, causing tranche
      prices to be incorrect and potentially leading to risk management failures in live portfolios
    stage_ids:
    - products_credit
  - id: finance-C-125
    when: When implementing CDS value calculation
    action: 'combine protection leg PV and premium leg PV as: dirty_pv = (prot_pv - running_cpn * dirty_rpv01) and clean_pv
      = (prot_pv - running_cpn * clean_rpv01)'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: CDS valuation breaks the fundamental no-arbitrage relationship between protection and premium legs, causing
      systematic mispricing and incorrect hedge ratios
    stage_ids:
    - products_credit
  - id: finance-C-126
    when: When calculating CDS par spread
    action: 'compute par spread as: protection_leg_PV / clean_RPV01 / notional'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect par spread formula breaks the fundamental pricing invariant that makes CDS value zero when contracted
      at market par spread
    stage_ids:
    - products_credit
  - id: finance-C-127
    when: When implementing CDS curve building
    action: require issuer CDSCurve valuation date to exactly match libor discount curve valuation date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatch between curve valuation dates produces inconsistent discount factors and survival probabilities,
      causing systematic mispricing across all CDS contracts referencing the curve
    stage_ids:
    - products_credit
  - id: finance-C-128
    when: When constructing CDSCurve from CDS contracts
    action: require CDS contracts to be sorted in strictly increasing maturity order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Out-of-order CDS contracts break the bootstrap algorithm used to build the survival probability curve, causing
      incorrect curve construction and mispriced CDS valuations
    stage_ids:
    - products_credit
  - id: finance-C-132
    when: When implementing CDS protection leg calculation
    action: handle the case when t_eff < 0.0 (protection starts in the past) by setting t_eff = 0.0 to verify protection starts
      immediately
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Failing to clamp t_eff < 0 causes numerical errors in the protection leg integration, producing invalid negative
      or infinite PV values
    stage_ids:
    - products_credit
  - id: finance-C-133
    when: When implementing CDSTranche valuation
    action: validate k_1 < k_2 (lower attachment point must be strictly less than upper attachment point)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Invalid tranche attachment points (k_1 >= k_2) produce mathematically undefined loss distributions, causing
      tranche pricing to fail
    stage_ids:
    - products_credit
  - id: finance-C-140
    when: When implementing CDS step-in date and maturity date validation
    action: raise error when step_in_dt > maturity_dt to prevent invalid contract structures
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: CDS with step-in date after maturity produces negative time-to-maturity, breaking all date-based calculations
      and producing invalid valuations
    stage_ids:
    - products_credit
  - id: finance-C-141
    when: When implementing dirty price calculation
    action: Calculate dirty price as clean price plus accrued interest (dirty = clean + AI)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Bond valuation will be incorrect because dirty price represents the full economic price a buyer pays, including
      accrued interest that belongs to the seller
    stage_ids:
    - products_bonds
  - id: finance-C-142
    when: When implementing YTM calculation with UK_DMO convention
    action: Use semiannual compounding for UK_DMO yield convention
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: YTM will not match Bloomberg UK_DMO convention, causing incorrect pricing and risk calculations that diverge
      from market-standard benchmarks
    stage_ids:
    - products_bonds
  - id: finance-C-143
    when: When implementing YTM calculation with US_TREASURY convention
    action: Use annual compounding for US_TREASURY yield convention
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: YTM will not match Bloomberg US_TREASURY convention, causing pricing discrepancies with market-standard government
      bond benchmarks
    stage_ids:
    - products_bonds
  - id: finance-C-144
    when: When calculating accrued interest
    action: Update previous coupon date (PCD) and next coupon date (NCD) before calculating accrual
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Accrued interest calculation will reference wrong coupon period, causing incorrect dirty/clean price split
      and incorrect ex-dividend handling
    stage_ids:
    - products_bonds
  - id: finance-C-145
    when: When calculating bond price from discount curve
    action: Validate settlement date is on or after the discount curve valuation date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Bond price calculation will fail or produce undefined results when discounting cash flows back to a date
      before the curve is anchored
    stage_ids:
    - products_bonds
  - id: finance-C-157
    when: When calculating yield for zero-coupon bond
    action: Use YTMCalcType.ZERO convention for zero-coupon bonds
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Zero-coupon bond will use incorrect yield formula, causing price calculation to fail or produce wrong results
    stage_ids:
    - products_bonds
  - id: finance-C-158
    when: When validating settlement date
    action: Set settlement date before bond issue date or after maturity date
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Bond valuation will fail or produce undefined results for settlement dates outside the bond's life
    stage_ids:
    - products_bonds
  - id: finance-C-164
    when: When passing valuation date (value_dt) from utilities stage to any downstream stage
    action: use the Date type from financepy.utils.date module, not datetime or string representations
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Type mismatch causes FinError 'Valuation date must be a Date' in downstream pricing calculations, leading
      to failed valuations
  - id: finance-C-165
    when: When passing discount factors from market_curves to models stage
    action: verify discount factors are monotonically decreasing from 1.0 and stored in np.ndarray format
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid discount factors cause incorrect present value calculations leading to materially wrong option or
      swap valuations
  - id: finance-C-167
    when: When passing volatility from market_volatility to models stage
    action: use volatility values that are non-negative (>= 0) as implied by the Black-Scholes framework
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative volatility causes numerical errors in sqrt operations within pricing models, producing NaN or complex
      values
  - id: finance-C-169
    when: When passing model instance from models to products_equity_fx stage
    action: verify model inherits from Model base class and has required volatility attribute
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Non-Model instance causes AttributeError when product.value() accesses model.volatility or calls model.value()
  - id: finance-C-170
    when: When calling product.value() with discount_curve and dividend_curve in products_equity_fx
    action: use DiscountCurve type for both discount_curve and dividend_curve parameters
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Wrong curve type causes AttributeError when product accesses curve.df() or curve.fwd_rate() methods
  - id: finance-C-171
    when: When passing swap rates from products_rates to market_curves for curve bootstrapping
    action: pass swap rates in increasing order of maturity dates
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Out-of-order swaps cause bootstrap algorithm to fail or produce incorrect discount factors for the curve
  - id: finance-C-173
    when: When passing CDS spreads from products_credit to market_curves for survival curve building
    action: verify CDS contracts are sorted by increasing maturity date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: CDS contracts out of order cause bootstrap solver to fail or produce incorrect survival probabilities
  - id: finance-C-174
    when: When building CDSCurve with libor_curve in market_curves
    action: verify libor_curve.value_dt matches the CDSCurve's value_dt
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Value date mismatch causes FinError 'Curve does not have same valuation date as Issuer curve' during CDS
      valuation
  - id: finance-C-180
    when: When constructing BondYieldCurve using fitted yields
    action: verify ylds array has same length as bonds list
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Length mismatch causes numpy broadcasting error during curve fitting with np.polyfit or scipy.optimize.curve_fit
  - id: finance-C-183
    when: When using Date arithmetic for time-to-expiry calculations across stages
    action: divide date difference by G_DAYS_IN_YEAR (365.0) to convert days to years, not assume 360 or 365.25
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inconsistent day/year conversion causes wrong time-to-expiry in Black-Scholes and other pricing formulas,
      leading to incorrect option values
  - id: finance-C-184
    when: When passing time_to_expiry from expiry date calculation to pricing models
    action: verify time_to_expiry is non-negative and bounded away from zero (minimum 1e-10) to avoid division by zero
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero or negative time-to-expiry causes division by zero in Black-Scholes d1/d2 calculations, producing infinite
      or NaN values
  - id: finance-C-185
    when: When using schedule generation across product stages
    action: verify effective_dt is strictly before termination_dt in Schedule construction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid schedule dates cause FinError or empty coupon schedule, preventing product valuation
  - id: finance-C-189
    when: When implementing any date-to-time conversion in any module of FinancePy
    action: Use G_DAYS_IN_YEAR (= 365.0) as the universal year fraction denominator, expressed as (date - value_dt) / G_DAYS_IN_YEAR
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mixing day-count conventions (e.g., 365 vs 360) causes incorrect time calculations, distorting discount factors,
      Greeks, and option prices across all products that depend on the curve
  - id: finance-C-190
    when: When implementing or reading any interest rate value in any FinancePy product or market class
    action: Express interest rates as a decimal fraction of 1 (e.g., 3% = 0.03), not as a percentage string or basis-point
      notation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Passing 3.0 instead of 0.03 inflates all cash flows and discount factors by 100×, producing meaningless prices
      and Greeks
  - id: finance-C-191
    when: When implementing or reading any bond price in any FinancePy bond product
    action: Assume bond prices are quoted per 100 units of notional (clean or dirty price basis), not per unit notional of
      1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Misinterpreting bond prices as per-notional-1 instead of per-100 inflates all position valuations by 100×,
      breaking accrued interest, DV01, and duration calculations
  - id: finance-C-192
    when: When implementing or reading any FX rate in any FinancePy FX product
    action: Express FX rates as domestic_per_foreign (e.g., EURUSD = 1.30 means 1.30 USD per 1 EUR; USD is domestic, EUR is
      foreign), NOT as foreign_per_domestic
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inverting the FX quote direction reverses the sign of all FX delta and vega calculations, causing puts to
      be priced as calls and long positions to appear as short
  - id: finance-C-195
    when: When constructing any discount curve (DiscountCurve or subclass) in FinancePy
    action: Verify the internal times array is strictly monotonically increasing — the curve constructor raises FinError if
      test_monotonicity(times) returns False
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-monotonic discount factor times cause the interpolator to produce undefined or inverted discount factors,
      leading to negative forward rates and invalid option prices
  - id: finance-C-198
    when: When building an IborDualCurve with multiple instruments (deposits, FRAs, swaps)
    action: Use InterpTypes with suitable_for_bootstrap() == True — only FLAT_FWD_RATES, LINEAR_FWD_RATES, LINEAR_ZERO_RATES,
      or LINEAR_ONFWD_RATES are allowed during bootstrap; NATCUBIC, PCHIP, FINCUBIC, and TENSION interpolation types are forbidden
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using a non-bootstrappable interpolation type causes the curve bootstrap to fail or produce non-monotone
      forward rates, invalidating all downstream product valuations that depend on the curve
  - id: finance-C-199
    when: When constructing an IborDualCurve with multiple IborSwap instruments
    action: Verify each swaps share the same effective_dt (start date) and the same fixed-leg payment date grid — the bootstrap
      algorithm requires identical coupon schedules across each swaps
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Swaps with different start dates or mismatched payment schedules cause the bootstrap solver to use inconsistent
      coupon grids, producing meaningless discount factors and wrong forward rates
  - id: finance-C-200
    when: When constructing a CDSCurve with any non-empty libor_curve
    action: Verify CDSCurve's value_dt exactly equals libor_curve.value_dt — the constructor raises FinError if the dates
      do not match
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched valuation dates cause the CDS risky PV01 to discount cash flows against a misaligned rate curve,
      producing incorrect CDS par spreads and credit risk sensitivities
  - id: finance-C-202
    when: When presenting or marketing FinancePy as a trading or risk system
    action: Claim that FinancePy supports real-time trading with sub-millisecond latency, ultra-low latency scenarios, or
      non-financial applications — the library's compile-time warmup and bump-based Greeks computation are incompatible with
      these requirements
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users and clients build trading infrastructure expecting sub-millisecond response times based on false claims,
      but FinancePy's Numba compile warmup and BUMP=1e-4 bump-and-reprice Greeks require seconds per calculation, causing
      catastrophic failures in live trading loops
  - id: finance-C-203
    when: When presenting or marketing FinancePy as a trading or risk system
    action: 'Claim that FinancePy is suitable for production risk systems without thorough independent validation — the library
      is explicitly in beta (README.md:121: ''currently in beta version'') and comes with no warranty'
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Deploying unvalidated beta software in production risk systems causes incorrect capital calculations, regulatory
      non-compliance, and potential financial losses without legal recourse since the software carries no warranty
  - id: finance-C-206
    when: When deploying or selling FinancePy as a commercial financial product
    action: Remove or obscure the GPL-3.0 license requirement — the library is distributed under GPL-3.0 (README.md:186, LICENSE
      file) and any commercial deployment must comply with its copyleft provisions
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Using FinancePy in proprietary commercial products without GPL compliance exposes the organization to copyright
      infringement liability and potential legal action from the original author
  - id: finance-C-228
    when: When instantiating IborSwap instruments in rate modeling
    action: Automatically set float leg type opposite to fixed leg per ISDA convention — fixed leg must be PAY and float leg
      must be RECEIVE; do not override this convention without explicit configuration
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect leg type assignment causes cash flows to flow in the wrong direction, producing negative swap values
      and incorrect P&L attribution that would not match live trading confirmations
    derived_from_bd_id: BD-009
  - id: finance-C-272
    when: When pricing FX options with both Black-Scholes and Bachelier model capabilities
    action: Mix Bachelier normal volatility model (for negative rates) with Black-Scholes delta-based FX vol surface calibration
      — this creates model inconsistency in the vol surface calibration chain
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Using Bachelier model pricing with BS-calibrated vol surfaces causes systematic mispricing of 2-5% for deep
      ITM options where delta conventions differ significantly between normal and log-normal models
    derived_from_bd_id: BD-090
  - id: finance-C-278
    when: When constructing equity volatility surfaces
    action: Use delta_fit parameterization for equity vol surfaces — equity markets use strike-based parameterization, not
      delta-based; applying FX delta-fitting methodology to equities produces incorrect vol surfaces
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Applying delta-based FX vol surface methodology to equities creates surfaces that do not align with equity
      market conventions, causing systematic mispricing of equity options by 2-10%
    derived_from_bd_id: BD-088
  regular:
  - id: finance-C-007
    when: When implementing leap year calculations
    action: Use correct Gregorian calendar rules (divisible by 4 except centuries unless divisible by 400)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect leap year calculation causes date arithmetic to be off by one day for leap year dates
    stage_ids:
    - utilities
  - id: finance-C-008
    when: When implementing Excel serial date conversion
    action: Account for Excel's incorrect treatment of 1900 as a leap year
    severity: high
    kind: domain_rule
    modality: must
    consequence: Excel serial date conversion ignores Feb 29, 1900 (which never existed), causing dates after Feb 28, 1900
      to be off by one day
    stage_ids:
    - utilities
  - id: finance-C-010
    when: When implementing discount factor interpolation
    action: Prefer FLAT_FWD_RATES interpolation for bootstrapping
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Non-flat forward interpolation can produce non-positive forward rates during curve bootstrapping, violating
      financial constraints
    stage_ids:
    - utilities
  - id: finance-C-011
    when: When implementing curve bootstrapping
    action: Use only bootstrap-suitable interpolation methods (FLAT_FWD_RATES, LINEAR_FWD_RATES, LINEAR_ZERO_RATES, LINEAR_ONFWD_RATES)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Non-suitable interpolation methods (cubic splines, PCHIP) create oscillatory curves that violate monotonicity
      requirements in bootstrapping
    stage_ids:
    - utilities
  - id: finance-C-013
    when: When implementing day count conventions
    action: Handle month-end special cases for 30/360 conventions (February 28/29)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect handling of February end-of-month causes wrong accrued interest calculations for bonds using 30E/360
      ISDA
    stage_ids:
    - utilities
  - id: finance-C-014
    when: When implementing add_weekdays function
    action: Assume regional holidays are handled by this function
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Only weekends are considered; using this for business day calculations ignores public holidays, causing incorrect
      settlement dates
    stage_ids:
    - utilities
  - id: finance-C-015
    when: When implementing month arithmetic (add_months)
    action: Clamp day-of-month to valid range when month length decreases
    severity: high
    kind: domain_rule
    modality: must
    consequence: Date like Jan 31 + 1 month should become Feb 28/29, not Mar 31; without clamping, produces invalid date
    stage_ids:
    - utilities
  - id: finance-C-017
    when: When implementing tenor parsing
    action: Reject invalid tenor units with FinError
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid tenor strings like '5X' without recognized unit cause silent parsing errors
    stage_ids:
    - utilities
  - id: finance-C-019
    when: When using numba jitted functions
    action: Claim that jitted functions behave identically to non-jitted versions in edge cases
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Numba jitting may introduce subtle differences in floating-point edge cases compared to pure Python
    stage_ids:
    - utilities
  - id: finance-C-020
    when: When validating solver convergence
    action: Check solver result rather than assuming convergence
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Non-converged solver returns unreliable root estimates; without checking, downstream calculations use invalid
      values
    stage_ids:
    - utilities
  - id: finance-C-021
    when: When implementing IMM date calculations
    action: Verify third Wednesday exists in target month
    severity: high
    kind: domain_rule
    modality: must
    consequence: Every month has a third Wednesday, but failure to find it indicates programming error
    stage_ids:
    - utilities
  - id: finance-C-022
    when: When using DateLite for lightweight date operations
    action: Convert to full Date class when finance-specific operations are needed
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: DateLite only supports excel_dt, weekday, add, and diff; using it for tenor or schedule operations causes
      AttributeError
    stage_ids:
    - utilities
  - id: finance-C-026
    when: When constructing term structure time values
    action: Use G_DAYS_IN_YEAR constant for year fraction calculation instead of hardcoded 365
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent day-count conventions across the codebase produce slightly different time values, causing discrepancies
      in discount factors and zero rates that compound over longer maturities
    stage_ids:
    - market_curves
  - id: finance-C-031
    when: When using the dual curve architecture
    action: Supply a separate discount_curve (typically OIS-based) as the discounting curve for IborDualCurve
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using Ibor discounting instead of OIS discounting post-2008 underestimates derivative values and fails to
      reflect actual collateral agreement terms, creating regulatory and valuation compliance issues
    stage_ids:
    - market_curves
  - id: finance-C-032
    when: When using IborSingleCurve for derivatives pricing
    action: Claim IborSingleCurve is specified for production post-crisis valuation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: IborSingleCurve uses Libor for both forward rates and discounting, which does not reflect ISDA standard post-2008
      OIS discounting practice, making valuations non-compliant with current market standards
    stage_ids:
    - market_curves
  - id: finance-C-033
    when: When accessing discount factors from a bootstrapped curve
    action: Call build_curve() method before any df() or df_t() calls on IborSingleCurve
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Accessing discount factors before curve construction completes returns undefined values, causing silent pricing
      errors without any exception being raised
    stage_ids:
    - market_curves
  - id: finance-C-036
    when: When using scipy brentq/newton root finder for bootstrap
    action: Set maximum iterations to 50 with tolerance SWAP_TOL=1e-10 to verify convergence without excessive computation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Insufficient iterations may cause premature convergence or non-convergence, producing incorrect discount
      factors; excessive iterations waste computation time
    stage_ids:
    - market_curves
  - id: finance-C-037
    when: When comparing curve pricing results with external systems
    action: Expect identical results to Bloomberg or other commercial systems without investigating date generation and interpolation
      differences
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Differences in business day conventions, holiday calendars, and interpolation schemes produce legitimate
      price differences that are not bugs but reflect implementation choices
    stage_ids:
    - market_curves
  - id: finance-C-038
    when: When using check_refit_flag to validate bootstrap results
    action: Enable check_refit=True during initial testing and curve validation to catch bootstrap errors
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without refit validation, incorrect bootstrap results are silently used for pricing, potentially causing
      significant valuation errors that go undetected
    stage_ids:
    - market_curves
  - id: finance-C-043
    when: When calibrating the volatility surface to market quotes
    action: achieve calibration error below specified tolerance (1e-5 for FX, 1e-6 for swaption/equity)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Poor calibration accuracy means the surface does not reproduce observed market prices, causing systematic
      mispricing in all dependent derivatives
    stage_ids:
    - market_volatility
  - id: finance-C-044
    when: When using Nelder-Mead optimizer for surface calibration
    action: implement fallback to Conjugate Gradient solver when Nelder-Mead fails to converge
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calibration failure without fallback leaves surface uninitialized or with invalid parameters, causing all
      downstream pricing to fail
    stage_ids:
    - market_volatility
  - id: finance-C-046
    when: When setting up ATM volatility for FX options
    action: use forward delta neutral ATM method to verify ATM vol corresponds to 50-delta
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect ATM convention causes mismatch between quoted ATM vol and actual 50-delta vol, leading to systematic
      pricing errors for ATM options
    stage_ids:
    - market_volatility
  - id: finance-C-047
    when: When configuring volatility surface for rates products
    action: use SABR model which handles smile via alpha, beta, rho, nu parameters
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using simpler volatility functions for swaptions may fail to capture rate smile/skew effects, causing material
      mispricing especially for out-of-the-money swaptions
    stage_ids:
    - market_volatility
  - id: finance-C-048
    when: When modeling FX volatility for pairs with inverted skew (e.g., EURJPY)
    action: rely on SABR model as it does not fit inverted skew discount properly
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: SABR model calibration fails to capture inverted skew in JPY pairs, causing systematic mispricing of JPY
      FX options
    stage_ids:
    - market_volatility
  - id: finance-C-049
    when: When using parametric volatility functions
    action: allow optimizer to drive volatility parameters to negative values
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Negative volatility parameters produce invalid negative variances for certain strikes/expiries, corrupting
      the entire volatility surface
    stage_ids:
    - market_volatility
  - id: finance-C-050
    when: When requesting implied probability distributions from volatility surface
    action: validate that the resulting probability density function has positive values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative density values in implied distribution indicate arbitrage opportunities or numerical instability
      in the vol surface, invalidating all Greeks calculations
    stage_ids:
    - market_volatility
  - id: finance-C-051
    when: When performing calibration quality verification
    action: check that ATM vol term structure matches observed rates across each tenors
    severity: high
    kind: domain_rule
    modality: must
    consequence: ATM term structure mismatch indicates incorrect calibration to market data, leading to incorrect forward
      rate expectations and wrong risk calculations
    stage_ids:
    - market_volatility
  - id: finance-C-052
    when: When validating arbitrage-free properties of volatility surface
    action: check for calendar spread arbitrage by verifying variance increases monotonically with time
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calendar spread arbitrage in the volatility surface creates guaranteed profit opportunities, indicating incorrect
      modeling and exposing the bank to regulatory/compliance risk
    stage_ids:
    - market_volatility
  - id: finance-C-053
    when: When building vol surface with single tenor
    action: apply flat volatility assumption for that single expiry
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Single-tenor surface without flat vol assumption causes index errors or undefined interpolation behavior
    stage_ids:
    - market_volatility
  - id: finance-C-054
    when: When using Clark volatility function for FX surface
    action: use exactly 3 parameters for the CLARK vol function type
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect parameter count for volatility function causes index errors or silently wrong calibration results
    stage_ids:
    - market_volatility
  - id: finance-C-056
    when: When requesting volatility at strike/expiry outside the calibrated surface
    action: extrapolate using flat volatility from the nearest boundary tenor
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Undefined behavior for out-of-range queries can cause crashes or silently incorrect pricing for long-dated
      or short-dated options beyond calibrated range
    stage_ids:
    - market_volatility
  - id: finance-C-057
    when: When interpreting implied distributions from volatility surface
    action: claim the resulting distribution is arbitrage-free without validation
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting potentially arbitrageable implied distributions as valid can mislead traders and risk managers
      about actual market expectations
    stage_ids:
    - market_volatility
  - id: finance-C-058
    when: When comparing calibrated surface output with market quotes
    action: present calibration differences as definitive pricing proof without tolerance context
    severity: low
    kind: claim_boundary
    modality: must_not
    consequence: Small calibration residuals within tolerance are expected numerical artifacts, not proof of exact market
      alignment
    stage_ids:
    - market_volatility
  - id: finance-C-064
    when: When implementing Monte Carlo pricing models
    action: claim Monte Carlo results are exact prices
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Monte Carlo uses finite sample estimates with random sampling error, presenting results as exact values misleads
      users about numerical precision
    stage_ids:
    - models
  - id: finance-C-065
    when: When implementing numerical tree or finite difference models
    action: validate model prices converge to known benchmarks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without benchmark validation, numerical methods may converge to wrong values due to implementation bugs or
      insufficient discretization
    stage_ids:
    - models
  - id: finance-C-066
    when: When implementing Heston stochastic volatility model
    action: warn when Feller condition (2*kappa*theta <= sigma^2) is violated
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Violating Feller condition allows variance to reach zero, causing numerical instability in Monte Carlo simulation
    stage_ids:
    - models
  - id: finance-C-067
    when: When implementing Monte Carlo path generation
    action: set num_paths to even number when using antithetic variates
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Odd num_paths causes mismatched path pairs in antithetic variates, reducing variance reduction effectiveness
    stage_ids:
    - models
  - id: finance-C-068
    when: When implementing implied volatility solver
    action: use Newton method with bisection fallback for robustness
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Newton method alone may fail to converge for ill-conditioned inputs; fallback to bisection ensures solution
      is found
    stage_ids:
    - models
  - id: finance-C-069
    when: When implementing CRR tree model
    action: enforce minimum num_steps of 30 for convergence
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Insufficient tree steps causes discrete approximation errors, producing inaccurate option prices that deviate
      from true values
    stage_ids:
    - models
  - id: finance-C-070
    when: When implementing SABR model
    action: clamp correlation rho to [-0.99, 0.99] range
    severity: high
    kind: domain_rule
    modality: must
    consequence: Rho outside [-1, 1] violates mathematical constraints, causing sqrt(1-rho^2) to become imaginary and corrupt
      volatility calculations
    stage_ids:
    - models
  - id: finance-C-071
    when: When implementing numerical solvers for tree models
    action: limit maximum iterations and raise error on non-convergence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Infinite loops occur when root-finding fails to converge; explicit max_iter prevents hanging and signals
      failure
    stage_ids:
    - models
  - id: finance-C-074
    when: When implementing tree-based rate models
    action: document convergence noise limitations in accrued interest calculation
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Tree models exhibit convergence noise in accrued interest due to inconsistent interpolation, affecting bond
      option pricing accuracy
    stage_ids:
    - models
  - id: finance-C-075
    when: When validating model implementations
    action: compare numerical model prices against analytical benchmarks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Tree and Monte Carlo models must reproduce analytical Black-Scholes prices within tolerance; failure indicates
      implementation errors
    stage_ids:
    - models
  - id: finance-C-076
    when: When implementing implied volatility calculation
    action: use tolerance of 1e-6 for convergence criterion
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Loose tolerance produces inaccurate implied vol; too tight causes excessive iterations or failure to converge
    stage_ids:
    - models
  - id: finance-C-077
    when: When implementing finite difference methods
    action: validate omega relaxation parameter stays in (1, 2) range
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Omega outside [1,2] violates PSOR convergence requirements, producing divergent or oscillating solutions
    stage_ids:
    - models
  - id: finance-C-078
    when: When implementing American option pricing
    action: validate LSMC regression fitting produces valid continuation values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Poor polynomial fitting in LSMC produces negative continuation values, violating early exercise boundary
      constraints
    stage_ids:
    - models
  - id: finance-C-079
    when: When calculating equity option vega using finite difference bumps
    action: use 1% (0.01) as the volatility bump size, not 1 basis point
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 1bp bump for volatility results in numerically negligible perturbation since volatility is expressed
      in percent terms, causing vega calculation to be dominated by floating-point noise instead of capturing true sensitivity.
    stage_ids:
    - products_equity_fx
  - id: finance-C-081
    when: When calculating theta for equity or FX options
    action: advance the value date by one calendar day (not business day) and divide by G_DAYS_IN_YEAR
    severity: high
    kind: domain_rule
    modality: must
    consequence: Theta represents time decay per unit of calendar time. Using business days instead of calendar days miscalibrates
      theta, causing Greeks to be inconsistent across different day count conventions.
    stage_ids:
    - products_equity_fx
  - id: finance-C-083
    when: When pricing American equity options
    action: verify the American option price is greater than or equal to the equivalent European option price
    severity: high
    kind: domain_rule
    modality: must
    consequence: American options have early exercise premium; if American price equals or falls below European price, it
      indicates the CRR tree implementation has convergence issues or the model is misconfigured.
    stage_ids:
    - products_equity_fx
  - id: finance-C-086
    when: When implementing finite difference Greeks for option price sensitivity
    action: use bump size BUMP = 1e-4 for price-based sensitivities (delta, gamma, rho) to balance accuracy vs numerical noise
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Bump size too small causes floating-point roundoff to dominate the finite difference; bump size too large
      introduces truncation error, degrading Greeks accuracy below required precision.
    stage_ids:
    - products_equity_fx
  - id: finance-C-090
    when: When implementing FX option delta
    action: support multiple delta conventions (pips_spot_delta, pips_fwd_delta, pct_spot_delta_prem_adj, pct_fwd_delta_prem_adj)
      as specified in Clark's FX Options book
    severity: high
    kind: domain_rule
    modality: must
    consequence: Different market conventions use different delta definitions. Providing only spot delta when the market uses
      premium-adjusted delta causes systematic hedging errors and incorrect strike selection for vol surface construction.
    stage_ids:
    - products_equity_fx
  - id: finance-C-094
    when: When calculating equity or FX option prices
    action: clamp time-to-expiry to minimum 1e-10 before passing to analytical formulas
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Black-Scholes formulas have sqrt(t) and log(t) terms that produce NaN at t=0. Clamping prevents numerical
      singularities while maintaining accuracy since options near expiry are essentially intrinsic.
    stage_ids:
    - products_equity_fx
  - id: finance-C-095
    when: When calculating implied volatility
    action: bracket the root-finding search within valid volatility bounds and use vega derivative to accelerate convergence
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper bracketing, Newton/Brent iteration may diverge or find local minima, producing implied vol
      that doesn't correspond to the actual market price, breaking vol surface consistency.
    stage_ids:
    - products_equity_fx
  - id: finance-C-096
    when: When calculating Greeks for equity options
    action: verify the dividend_curve valuation date is synchronized with the option valuation date before Greeks calculation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Dividend yield affects forward price which directly impacts delta and gamma. If dividend curve date is stale,
      the forward price is wrong and Greeks become inconsistent with option values.
    stage_ids:
    - products_equity_fx
  - id: finance-C-097
    when: When implementing American option pricing via CRR tree
    action: validate that time_to_expiry is positive and use sufficient tree steps (default 100+) for convergence
    severity: high
    kind: resource_boundary
    modality: must
    consequence: CRR tree with insufficient steps produces oscillatory prices that don't converge to the true American option
      value. Using fewer than 50 steps typically yields >1% pricing error, especially near expiry.
    stage_ids:
    - products_equity_fx
  - id: finance-C-099
    when: When using Monte Carlo methods for equity option valuation
    action: claim MC results as production-quality prices without validating against analytical benchmarks
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Monte Carlo has finite-sample bias and random seed sensitivity. Without validation against Black-Scholes
      analytical prices, MC results may deviate by more than the standard error, leading to incorrect risk reporting.
    stage_ids:
    - products_equity_fx
  - id: finance-C-100
    when: When reporting equity or FX option prices
    action: present finite-difference Greeks (delta, gamma, vega) as equivalent to analytical Greeks without tolerance specification
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Finite difference Greeks are approximations with truncation error proportional to BUMP^2. Presenting them
      as exact without tolerance specification misleads users about the precision of risk sensitivities.
    stage_ids:
    - products_equity_fx
  - id: finance-C-106
    when: When pricing swaptions with tree-based models
    action: build the tree before calling swaption pricing methods
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Tree-based swaption pricing will fail or return incorrect values because the lattice structure with branching
      probabilities and state prices has not been constructed
    stage_ids:
    - products_rates
  - id: finance-C-107
    when: When setting the ATM swap rate via set_fixed_rate_to_atm
    action: recalculate swap_rate and update fixed_leg.cpn and regenerate payments
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: ATM rate will be stale and cached values will not reflect the current curve state, causing mispriced swaps
      when curve parameters change
    stage_ids:
    - products_rates
  - id: finance-C-108
    when: When calculating swap rate for forward-starting swaps
    action: use forward discount factors from valuation date to swap start date
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Forward swap rate will be calculated using spot discount factors instead of forward discount factors, producing
      incorrect at-the-money rates for deferred-start swaps
    stage_ids:
    - products_rates
  - id: finance-C-109
    when: When using HWTree for swaption pricing
    action: use Jamshidian decomposition to reduce bond option to strip of zero cpn bond options
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Full tree-based bond option pricing has exponentially larger state space than Jamshidian decomposition, causing
      unacceptable runtime for typical portfolio sizes with multiple expiry dates
    stage_ids:
    - products_rates
  - id: finance-C-111
    when: When calibrating discount curve using Newton solver
    action: converge within SWAP_TOL=1e-10 tolerance and 50 maximum iterations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient convergence tolerance will produce inaccurate discount factors that fail to reprice the calibration
      instruments, causing persistent small arbitrage opportunities
    stage_ids:
    - products_rates
  - id: finance-C-113
    when: When using HWTree for European swaption pricing
    action: increase num_time_steps until price converges to analytical benchmark
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Insufficient tree steps will cause swaption prices to deviate from true values by more than acceptable tolerance,
      leading to systematic mispricing in risk management and trading
    stage_ids:
    - products_rates
  - id: finance-C-114
    when: When valuing IborSwaption with Black or SABR models
    action: price as option on swap rate using Black model rather than bond option decomposition
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using bond option pricing formulas for swaptions will produce incorrect prices because swap rate options
      have different payoff structures than bond options
    stage_ids:
    - products_rates
  - id: finance-C-115
    when: When comparing backtested swap or swaption prices to live trading results
    action: claim that backtest prices represent expected live execution prices
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest prices are model-based estimates assuming execution at mid-market rates without transaction costs,
      bid-ask spreads, or market impact; live execution will differ materially due to slippage and timing
    stage_ids:
    - products_rates
  - id: finance-C-117
    when: When decomposing bond option into zero coupon bond options using Jamshidian method
    action: include coupon payments on or after expiry date in the decomposition
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting expiry-date coupons will cause the Jamshidian decomposition to value an incorrect bond, producing
      systematically wrong European swaption prices
    stage_ids:
    - products_rates
  - id: finance-C-118
    when: When resetting the fixed coupon on a swap
    action: regenerate the fixed leg payment schedule after updating the coupon
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Stale payment schedule with old coupon amounts will produce incorrect swap valuations after rate changes,
      causing persistent mispricing until explicit regeneration
    stage_ids:
    - products_rates
  - id: finance-C-119
    when: When using single curve for both discounting and forward rates
    action: provide first fixing rate for seasoned floating legs
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Floating legs with no first fixing will be valued using unknown future rates instead of the known historical
      fixing, causing immediate cash flow mismatches
    stage_ids:
    - products_rates
  - id: finance-C-121
    when: When pricing cash-settled swaptions
    action: use flat swap rate assumption for annuity calculation rather than curve-implied forward rates
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-flat swap rate term structure causes cash-settled swaption payoff to be calculated on inconsistent annuity
      factors, producing incorrect option premiums
    stage_ids:
    - products_rates
  - id: finance-C-122
    when: When decomposing a payer swaption using Jamshidian method
    action: extract the put option value from zero coupon bond options
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using call values for payer swaption will produce inverted payoff structure and return near-zero prices for
      deep out-of-the-money payer swaptions
    stage_ids:
    - products_rates
  - id: finance-C-123
    when: When calculating annuity PV01 for swap with reversed leg direction
    action: adjust sign of pv01 based on pay/receive leg type to maintain positive DV01
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unadjusted PV01 sign will cause payer swaps to show negative rate sensitivity, contradicting the economic
      reality that rising rates benefit payers
    stage_ids:
    - products_rates
  - id: finance-C-129
    when: When setting default recovery rate for CDS contracts
    action: use 0.40 (40%) as the standard recovery rate for senior unsecured debt
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-standard recovery rates misaligns with market convention, causing CDS spreads to deviate from observable
      market quotes and creating arbitrage opportunities
    stage_ids:
    - products_credit
  - id: finance-C-130
    when: When using pv01_method parameter in CDS valuation
    action: understand that pv01_method controls the risky PV01 approximation vs exact calculation, with speed vs accuracy
      tradeoff
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Using pv01_method=0 (market standard) provides accurate CDS valuation but may be slower; alternative methods
      trade accuracy for speed
    stage_ids:
    - products_credit
  - id: finance-C-131
    when: When using prot_method parameter for protection leg calculation
    action: understand that prot_method controls the numerical integration method (approximation vs exact) for protection
      leg PV
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: prot_method affects protection leg calculation accuracy; higher accuracy methods may be computationally slower
    stage_ids:
    - products_credit
  - id: finance-C-134
    when: When building CDS tranche valuation
    action: require at least 2 credits in the issuer_curves list for tranche pricing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Single-credit tranche has undefined correlation structure, causing Gaussian copula calculation to fail
    stage_ids:
    - products_credit
  - id: finance-C-135
    when: When implementing CDS value function
    action: return both dirty_pv and clean_pv to allow callers to distinguish total value from value excluding accrued interest
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Returning only one PV measure forces callers to recalculate, risking inconsistency between dirty and clean
      valuations
    stage_ids:
    - products_credit
  - id: finance-C-136
    when: When using FinancePy CDS valuation for live trading decisions
    action: present simulated CDS values as proof of real execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: FinancePy is a backtesting and pricing library; presenting its simulated valuations as live trading signals
      misleads stakeholders about actual execution capability
    stage_ids:
    - products_credit
  - id: finance-C-137
    when: When using Gaussian copula Monte Carlo for tranche valuation
    action: claim Monte Carlo results are exact, ignoring numerical convergence requirements
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Monte Carlo tranche pricing has inherent variance; small sample sizes produce statistically insignificant
      results that may differ materially from true prices
    stage_ids:
    - products_credit
  - id: finance-C-138
    when: When using Numba-compiled CDS calculations
    action: expect significant first-import compilation delay as Numba JIT compiles numerical kernels
    severity: low
    kind: operational_lesson
    modality: must
    consequence: First import of CDS module triggers Numba JIT compilation which may take several seconds; subsequent imports
      use cached compiled code
    stage_ids:
    - products_credit
  - id: finance-C-139
    when: When building CDSCurve with multiple CDS contracts
    action: use consistent recovery rate across each CDS contracts in the curve
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent recovery rates across curve-building CDS contracts break the bootstrap algorithm, producing
      invalid survival probability curves
    stage_ids:
    - products_credit
  - id: finance-C-146
    when: When calculating duration and convexity
    action: Use finite difference bump results for verification matching
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duration/convexity values will not match Bloomberg/analytical formulas, causing risk metrics to diverge from
      market-standard benchmarks
    stage_ids:
    - products_bonds
  - id: finance-C-147
    when: When calculating OAS via root search
    action: Use tolerance of 1e-8 and maximum 50 iterations for solver convergence
    severity: high
    kind: resource_boundary
    modality: must
    consequence: OAS will be imprecise or fail to converge, causing incorrect option-adjusted spread values that affect trading
      decisions
    stage_ids:
    - products_bonds
  - id: finance-C-148
    when: When calculating YTM via root search
    action: Use brentq solver with bounds [-0.5, 5.0], tolerance 1e-8, and max 50 iterations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: YTM calculation may produce out-of-range yields or fail to converge, causing pricing errors that affect bond
      valuation
    stage_ids:
    - products_bonds
  - id: finance-C-149
    when: When setting ex-dividend days parameter
    action: Set ex_div_days greater than 90 days
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Ex-dividend period exceeds maximum allowed, causing incorrect coupon ownership determination and potential
      legal/compliance issues
    stage_ids:
    - products_bonds
  - id: finance-C-150
    when: When calculating dirty price from YTM
    action: Add tiny offset (0.000000000012345) to YTM to avoid zero yield singularity
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Price calculation will fail or produce infinite values when YTM equals exactly zero, causing system crashes
      or incorrect valuations
    stage_ids:
    - products_bonds
  - id: finance-C-151
    when: When implementing yield convention validation
    action: Reject unknown yield conventions not in YTMCalcType enum
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unknown yield convention will cause incorrect calculation logic or silent errors, producing unreliable bond
      prices
    stage_ids:
    - products_bonds
  - id: finance-C-152
    when: When calculating asset swap spread
    action: Pass accrued interest to convert clean price to dirty price before calculation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Asset swap spread will be incorrectly calculated using clean price instead of dirty price, causing wrong
      relative value signals
    stage_ids:
    - products_bonds
  - id: finance-C-153
    when: When calculating duration and convexity
    action: Call accrued_interest before price calculations to update alpha and ex-div date
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Duration/convexity will use stale accrued interest values, causing incorrect risk metrics and potential trading
      losses
    stage_ids:
    - products_bonds
  - id: finance-C-154
    when: When settlement date equals a coupon payment date
    action: Pay full coupon to the seller with accrued interest equaling the coupon amount
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect coupon allocation on settlement date will violate market convention and cause disputes with counterparties
    stage_ids:
    - products_bonds
  - id: finance-C-155
    when: When calculating Z-spread
    action: Use tolerance 1e-8 and max iterations 50 for Newton solver
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Z-spread will be imprecise or fail to converge, causing incorrect relative value analysis versus benchmark
      curve
    stage_ids:
    - products_bonds
  - id: finance-C-156
    when: When calculating bond with discount margin for FRN
    action: Use tolerance 1e-12 for high-precision FRN discount margin calculation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: FRN discount margin will lack required precision, causing incorrect floating rate bond pricing
    stage_ids:
    - products_bonds
  - id: finance-C-159
    when: When handling convergence failure in YTM/OAS solvers
    action: Return np.nan and print warning when solver fails to converge
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Silent convergence failure will propagate NaN values through calculations, causing downstream pricing errors
      without clear indication of root cause
    stage_ids:
    - products_bonds
  - id: finance-C-160
    when: When calculating option adjusted spread
    action: Use Newton method with initial guess of 0.01 (1%) for OAS convergence
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: OAS solver may converge to wrong local minimum or fail to converge with poor initial guess, producing incorrect
      spread values
    stage_ids:
    - products_bonds
  - id: finance-C-161
    when: When calculating dirty price from discount curve
    action: Calculate ex-dividend date from NCD minus ex_div_days using calendar
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect ex-dividend date will cause wrong coupon ownership determination, resulting in incorrect dirty
      price
    stage_ids:
    - products_bonds
  - id: finance-C-162
    when: When representing bond pricing results
    action: Claim that backtested YTM/OAS calculations equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting theoretical calculations as guaranteed live performance will mislead stakeholders about actual
      trading outcomes
    stage_ids:
    - products_bonds
  - id: finance-C-163
    when: When matching Bloomberg YTM calculations
    action: Use identical yield convention (UK_DMO, US_TREASURY, US_STREET, or CFETS) as Bloomberg reference
    severity: high
    kind: domain_rule
    modality: must
    consequence: YTM will not match Bloomberg reference values if conventions differ, causing validation failures and incorrect
      pricing
    stage_ids:
    - products_bonds
  - id: finance-C-166
    when: When using discount_curve.df() to extract discount factors for rate extraction
    action: verify the queried date is not before the curve's value_dt anchor date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Extrapolation beyond curve anchor causes undefined behavior or FinError in interpolation functions
  - id: finance-C-168
    when: When calibrating volatility surface from market_volatility stage
    action: verify strikes are provided in increasing order with no duplicates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-monotonic strikes cause incorrect interpolation in vol_function calls, producing wrong implied vols
  - id: finance-C-172
    when: When using IborSwap products to bootstrap curves in market_curves
    action: verify swap effective_dt matches the curve's value_dt for single curve bootstrap
    severity: high
    kind: domain_rule
    modality: must
    consequence: Date mismatch causes incorrect time calculations in bootstrap solver, leading to wrong discount factors
  - id: finance-C-175
    when: When using recovery_rate in CDS curve construction
    action: verify recovery_rate is between 0.0 and 1.0 (exclusive upper bound typically 0.4-0.8 in practice)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid recovery rate produces meaningless survival probabilities and incorrect CDS protection/premium leg
      valuations
  - id: finance-C-176
    when: When passing vol surface from products_equity_fx to products_rates for swaption/capfloor pricing
    action: use SwaptionVolSurface or IborCapVolCurve type with correctly ordered expiry dates and tenors
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Wrong vol surface type or misaligned dates causes incorrect implied volatility lookup in swaption/capfloor
      pricing
  - id: finance-C-177
    when: When pricing IborSwaption with discount_curve in products_rates
    action: verify swaption expiry and maturity dates are after the discount_curve's value_dt
    severity: high
    kind: domain_rule
    modality: must
    consequence: Forward-starting swaption with expiry before curve date causes invalid forward rate or discount factor calculation
  - id: finance-C-178
    when: When using caplet/floorlet vol curve for pricing IborCapFloor
    action: verify cap maturity dates start with the curve date and first cap volatility equals zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Vol curve date mismatch causes FinError in caplet vol lookup, preventing cap/floor pricing
  - id: finance-C-179
    when: When passing bond prices from products_bonds to products_rates for yield curve fitting
    action: verify bonds are ordered by increasing maturity date relative to settlement date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Out-of-order bonds cause incorrect yield curve fit parameters, leading to wrong bond and swap valuations
  - id: finance-C-181
    when: When using yield curve from BondYieldCurve for pricing
    action: use BondYieldCurve for discounting cash flows in derivative pricing
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: BondYieldCurve assumes flat yield per bond and does not support proper term-structure discounting, leading
      to materially incorrect valuations
  - id: finance-C-182
    when: When extracting forward rates from discount curve
    action: use consistent day count convention across the forward rate calculation and discount factor extraction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixed day count conventions cause inconsistent forward rate calculations leading to wrong swap or option
      valuations
  - id: finance-C-186
    when: When implementing cross-rate calculations using domestic and foreign curves
    action: verify domestic and foreign discount curves are independent with matching value_dt
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Shared curve references or date mismatches cause incorrect FX forward pricing and potential arbitrage
  - id: finance-C-187
    when: When using Heston model for equity option pricing
    action: verify initial volatility and volatility of volatility parameters are positive
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative volatility parameters cause numerical instability in Heston FFT pricing, producing NaN values
  - id: finance-C-188
    when: When using Monte Carlo models with seed parameter
    action: set seed for reproducible results in Black-Scholes MC and Heston simulations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without fixed seed, Monte Carlo results are non-reproducible making debugging and testing impossible
  - id: finance-C-193
    when: When implementing any numeric floor or division-by-zero guard in any FinancePy module
    action: Use G_SMALL = 1e-12 as the universal small constant for division guards and time floors across each modules
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using inconsistent small constants (e.g., 1e-10) can cause premature or late floor application, producing
      incorrect discount factors near t=0 and corrupting Greeks that depend on df/dt
  - id: finance-C-194
    when: When constructing any Date object in FinancePy
    action: Use the custom Date class (financepy.utils.date.Date) with __slots__ defined for memory efficiency, and rely on
      excel_dt serialization for each external date exchanges
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mixing Python datetime.date or np.datetime64 objects with FinancePy Date objects bypasses the excel_dt convention,
      causing off-by-one errors in date arithmetic across the entire calculation chain
  - id: finance-C-196
    when: When performing financial arithmetic that requires exact decimal precision (e.g., summing monetary cash flows or
      computing P&L) in FinancePy
    action: Rely on float64 (numpy.float64) for exact decimal arithmetic — float64 is used throughout the library but does
      not provide exact decimal representation for each fractional values
    severity: medium
    kind: resource_boundary
    modality: should_not
    consequence: Using float64 for monetary summation can cause rounding drift in large portfolios (e.g., summing millions
      of small cash flows may accumulate errors of cents to dollars), leading to incorrect accounting P&L
  - id: finance-C-197
    when: When importing or loading the financepy package for the first time (after installation or cache clear)
    action: Expect a multi-second compile delay on first import of Numba-accelerated models — compiled code is cached locally
      and subsequent imports are near-instantaneous
    severity: low
    kind: resource_boundary
    modality: must
    consequence: A wildcard import (from financepy.utils import *) triggers Numba JIT compilation on first use of any model,
      causing a 3–10 second freeze that is not indicative of a bug or infinite loop
  - id: finance-C-201
    when: When calling any product's value() method (Valuation = Product + Model + Market paradigm)
    action: Supply each three components — the product object, a market curves object, and a model object — as arguments to
      produce a valid valuation; omitting any component breaks the interface contract
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling product.value() without the correct model or market curves argument produces a TypeError or returns
      a dummy 0.0 value, masking the missing dependency and leading to silent wrong valuations
  - id: finance-C-204
    when: When presenting or marketing FinancePy's valuation results
    action: Claim that FinancePy prices are guaranteed to exactly match Bloomberg Terminal or any other commercial pricing
      system — README.md:148 explicitly warns that 'larger value differences may arise due to differences in date generation
      and interpolation schemes'
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Marketing FinancePy as Bloomberg-equivalent leads to front-office staff presenting non-matching prices to
      clients or using them in automated trading without understanding the model differences, causing reputational and financial
      harm
  - id: finance-C-205
    when: When presenting or marketing FinancePy's Greeks calculations
    action: Claim that FinancePy's bump-and-reprice Greeks (BUMP = 1e-4, i.e., 1 basis point) are production-grade risk sensitivities
      optimized for ultra-low latency scenarios — the bump-based approach and Numba compile times make these unsuitable for
      real-time risk systems
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Marketing bump-based Greeks as real-time capable leads to embedding FinancePy in live risk loops with unacceptable
      latency, causing delayed risk alerts and incorrect hedging signals
  - id: finance-C-207
    when: When constructing an IborDualCurve with calibration instruments
    action: 'Arrange calibration instruments in the fixed bootstrap sequence: deposits first, then FRAs, then swaps — the
      validator enforces that deposits mature in increasing order, FRAs start after value_dt and mature in increasing order,
      and swaps start on or after value_dt in increasing maturity'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping the required sequence or providing out-of-order instruments causes the bootstrap solver to use the
      wrong calibration points in the wrong order, producing physically impossible forward rate term structures
  - id: finance-C-208
    when: When implementing or extending any new product class in FinancePy
    action: Inherit from the specified base class (EquityOption for equity options, DiscountCurve for curves, etc.) to verify
      consistent value_dt parameter naming and the Product+Model+Market valuation paradigm is followed
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Creating standalone product classes that do not inherit from the established base classes breaks the consistent
      interface, preventing the product from being used with the standard model and market curve objects, and making it incompatible
      with the library's valuation framework
  - id: finance-C-209
    when: When implementing or refactoring price-to-yield calculation logic in bond pricing
    action: Preserve the epsilon addition (1e-12) used to prevent division by zero when yield-to-maturity equals exactly zero
      — do not remove this safeguard even if it appears unnecessary
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing the epsilon safeguard causes NaN values to propagate through all bond pricing calculations when
      ytm=0, breaking dirty/clean price computations and causing silent failures in downstream risk calculations
    derived_from_bd_id: BD-002
  - id: finance-C-210
    when: When constructing rate curves using any curve class (IborSingleCurve, IborDualCurve, CDSCurve, InflationSwapCurve)
    action: Be aware that FLAT_FWD_RATES is the system-wide default interpolation method — this restricts each curve construction
      to linear methods; if smoother interpolation (PCHIP, cubic splines) is needed for analytical pricing, explicitly configure
      per-curve interpolation method before building
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The universal FLAT_FWD_RATES default creates a hidden ceiling on interpolation quality; users cannot leverage
      beneficial higher-order methods even for pricing scenarios where they would improve accuracy
    derived_from_bd_id: BD-089
  - id: finance-C-211
    when: 'Boundary: When performing matrix operations (linear system solving, matrix inversion, eigen decomposition)'
    action: Assume numerical stability without explicit conditioning checks — do not assume matrices in production financial
      calculations are well-conditioned
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without conditioning checks, ill-conditioned matrices produce wildly inaccurate results that corrupt pricing
      and risk calculations without raising obvious errors
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-212
    when: 'Remedy: When solving linear systems or performing matrix inversions in production code paths'
    action: Implement condition number checking before matrix operations — if condition_number > 1e10, fall back to pivoted
      LU decomposition or Tikhonov regularization with lambda >= 1e-6; log warnings for 1e6 < condition_number <= 1e10
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without conditioning safeguards, ill-conditioned matrices in production produce numerical overflow or underflow
      that corrupts option pricing, risk calculations, and Greeks with no obvious error signal
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-213
    when: When calibrating SABR volatility models
    action: Validate parameter count before invoking calibration — standard SABR must receive exactly 4 parameters (alpha,
      beta, rho, nu); SABR_BETA_ONE must receive exactly 3 parameters (alpha, rho, nu); reject calibration with incorrect
      parameter count
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing 4 parameters to SABR_BETA_ONE or 3 parameters to standard SABR causes parameter misalignment, corrupting
      volatility surface calibration and producing incorrect option prices
    derived_from_bd_id: BD-081
  - id: finance-C-214
    when: When calibrating SABR_BETA_ONE for strikes away from ATM
    action: Use SABR_BETA_ONE only for ATM-ish strikes where beta=1 approximation is valid — for wider strike ranges requiring
      beta calibration, use standard SABR with full 4-parameter calibration
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using SABR_BETA_ONE for wide strike ranges systematically misprices out-of-the-money options due to the beta=1
      constraint, causing hedge ratio errors and P&L attribution failures
    derived_from_bd_id: BD-081
  - id: finance-C-215
    when: 'Boundary: When processing buy/sell orders in backtesting or live trading'
    action: Assume the framework handles price and quantity precision — do not assume orders can be placed at arbitrary floating-point
      prices or quantities without respecting tick size and lot size restrictions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without tick/lot handling, the framework accepts prices and quantities that violate exchange minimum increment
      rules, causing order rejections in live trading and inflated backtest returns
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-216
    when: 'Remedy: When generating or validating orders before submission'
    action: Round order quantities to nearest valid lot size (lot_size attribute) and round prices to nearest valid tick increment
      (tick_size attribute) — reject orders where rounded_quantity < exchange_min_quantity or rounded_price would violate
      price_band_limits
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without tick/lot rounding, orders fail exchange validation in live trading; backtests show unrealistic fills
      at sub-tick prices, overstating strategy performance by 2-5% in high-frequency scenarios
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-217
    when: When implementing Heston option pricing with multiple analytical methods available (Lewis, Rouah, Weber, Gatheral)
    action: Consolidate multiple Heston pricing implementations into a single method without providing explicit method selection
      capability and documentation for each method's applicable parameter regimes
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Removing multi-method support eliminates cross-validation capability and fallback options for edge cases,
      causing pricing errors when the single chosen method fails to converge in certain moneyness/maturity regimes
    derived_from_bd_id: BD-022
  - id: finance-C-218
    when: When implementing LMM simulation for path-dependent rate derivatives
    action: Use Sobol quasi-random sequences for Monte Carlo integration — do not replace with pseudo-random Mersenne Twister
      or other PRNG methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing Sobol with pseudo-random Mersenne Twister degrades convergence properties, requiring significantly
      more samples to achieve the same accuracy and increasing computational cost for rate derivative pricing
    derived_from_bd_id: BD-024
  - id: finance-C-219
    when: When implementing CDS protection leg calculation with numerical integration
    action: Verify that integration step count matches or exceeds 25 steps per year for survival probability and discount
      factor calculations — adjust based on convergence study if needed for specific hazard rate regimes
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using fewer than 25 steps per year (e.g., 12 monthly steps) introduces numerical integration error exceeding
      1 basis point, causing inaccurate CDS protection leg valuation and incorrect credit risk sensitivity calculations
    derived_from_bd_id: BD-007
  - id: finance-C-220
    when: When implementing CDS accrued premium calculation for default scenarios
    action: Verify that default timing assumption uses 50% midpoint of period (not 0% beginning or 100% end) under constant
      hazard rate assumptions — confirm alignment with ISDA standard practice for the specific CDS contract
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using incorrect default timing assumption (0% or 100%) introduces systematic bias in accrued premium calculations,
      causing consistent over or underpayment of CDS coupons depending on default occurrence timing
    derived_from_bd_id: BD-008
  - id: finance-C-221
    when: When implementing Greek calculations for equity vanilla options under Black-Scholes model
    action: Calculate Greeks analytically using closed-form Black-Scholes formulas — do not replace with numerical bump-and-reprice
      methods unless the model explicitly does not support analytical Greeks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using numerical Greeks introduces Monte Carlo noise into delta, gamma, theta, vega, and rho calculations,
      degrading hedge ratio precision and causing inconsistent P&L attribution between backtesting and live trading
    derived_from_bd_id: BD-034
  - id: finance-C-222
    when: When calibrating BDT short-rate tree to match observed bond prices
    action: Use Newton-Secant hybrid method to find short rate nodes — the hybrid combines fast Newton convergence with Secant's
      robustness for derivative estimation across the tree's rate grid
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using pure bisection or pure Newton methods without proper fallback logic causes calibration convergence
      failures for certain bond price configurations, resulting in uncalibrated or incorrectly calibrated BDT trees
    derived_from_bd_id: BD-061
  - id: finance-C-223
    when: When implementing LSMC for American option pricing
    action: Seed Monte Carlo paths at t=0 with spot_price (current market price) — verify path generation uses symmetric initialization
      for unbiased continuation value regression
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using forward induction or incorrect path initialization at t=0 introduces systematic bias in American option
      continuation values, causing premature or delayed exercise decisions that produce materially different pricing than
      the true optimal stopping rule
    derived_from_bd_id: BD-083
  - id: finance-C-224
    when: When calculating bond total return using Bond.calc_ror()
    action: Assume BUY transaction first followed by SELL transaction — do not reverse the order or calculate direction-agnostic
      returns without explicit begin/end convention specification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reversing the BUY→SELL convention or using direction-agnostic calculation produces negative total returns
      for profitable trades, causing incorrect performance attribution and misleading historical return reporting
    derived_from_bd_id: BD-086
  - id: finance-C-225
    when: When implementing or refactoring interest rate curve interpolation logic
    action: Use PCHIP (Piecewise Cubic Hermite Interpolating Polynomial) for log-discount factor curve fitting — do not replace
      with standard cubic splines as they can overshoot at boundaries, producing negative discount factors or unstable yield
      calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cubic spline interpolation can overshoot at curve boundaries, causing negative discount factors which invalidate
      all downstream present value calculations and produce nonsensical yields
    derived_from_bd_id: BD-037
  - id: finance-C-226
    when: When implementing bootstrap calibration for rate curves using FRA, swap, and deposit instruments
    action: Use flat forward rate interpolation between curve nodes — do not replace with spline-based interpolation as it
      introduces smoothing that deviates from exact market instrument prices at anchor points
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Spline-based bootstrapping smooths the curve away from instrument anchor points, causing calibrated curves
      to misprice the instruments used to build them and leading to incorrect risk calculations
    derived_from_bd_id: BD-040
  - id: finance-C-227
    when: When calibrating equity implied volatility surfaces for arbitrage-free interpolation
    action: Use SVI (Stochastic Volatility Inspired) parameterization with 5 parameters per maturity — do not use raw spline
      interpolation as it risks calendar spread arbitrage and produces unstable surfaces
    severity: high
    kind: domain_rule
    modality: must
    consequence: Raw spline interpolation of volatility surfaces can produce arbitrage opportunities, causing Monte Carlo
      and tree models to price derivatives inconsistently and generate exploitable arbitrage profits in backtesting
    derived_from_bd_id: BD-045
  - id: finance-C-229
    when: When pricing American-style equity options with early exercise features
    action: Use Cox-Ross-Rubinstein (CRR) binomial tree method — it converges to Black-Scholes in the limit and handles path-dependency
      naturally; do not use methods designed for European options
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using European pricing methods for American options ignores early exercise premium, systematically underpricing
      American puts by 5-15% and producing incorrect exercise boundaries
    derived_from_bd_id: BD-013
  - id: finance-C-230
    when: When implementing Heston model option pricing
    action: Use Lewis (2000) characteristic function integration with optimal contour deformation for Heston model pricing
      — do not replace with Carr-Madan FFT or other characteristic function methods that have pole removal issues
    severity: high
    kind: domain_rule
    modality: must
    consequence: Substituting Carr-Madan FFT for Lewis integration introduces numerical instabilities from pole removal near
      the strike, causing systematic pricing errors for deep ITM or long-maturity options under Heston dynamics
    derived_from_bd_id: BD-052
  - id: finance-C-231
    when: When implementing Vasicek short-rate simulation
    action: Use Euler-Maruyama discretization with normal scheme and antithetic variates for Vasicek model simulation — normal
      scheme must be used to avoid log-normal issues in low-rate environments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using log-normal discretization for Vasicek rates in near-zero rate environments causes simulated rates to
      become negative with high probability, producing invalid rate paths and incorrect valuations for interest rate derivatives
    derived_from_bd_id: BD-053
  - id: finance-C-232
    when: When implementing American option pricing
    action: Use Longstaff-Schwartz least-squares Monte Carlo (LSM) algorithm with backward induction — the continuation value
      must be estimated via regression on basis functions to determine optimal early exercise decisions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing LSM with binomial or trinomial trees for American option pricing causes poor scalability with dimensionality,
      leading to exponentially slower computation and inability to price multi-asset or path-dependent structures within acceptable
      time
    derived_from_bd_id: BD-055
  - id: finance-C-233
    when: When implementing yield curve bootstrapping interpolation
    action: Use linear interpolation of log discount factors (FLAT_FWD_RATES) for curve bootstrapping — this ensures monotonic
      discount factors and no arbitrage between adjacent points
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using cubic splines for bootstrapping introduces oscillation risk between data points, causing non-monotonic
      discount factors that violate no-arbitrage conditions and producing incorrect forward rates for interest rate product
      valuation
    derived_from_bd_id: BD-018
  - id: finance-C-234
    when: When implementing LIBOR Market Model correlation structure
    action: 'Use exponential decay correlation structure: exp(-beta*(j-i)*dt) for LMM — this captures the empirical observation
      that nearby maturity rates are more correlated than distant ones'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using constant correlation or full matrix calibration in LMM violates the empirical decay pattern, causing
      swaption and exotic rate product mispricing and inaccurate portfolio risk analysis in multi-rate environments
    derived_from_bd_id: BD-023
  - id: finance-C-235
    when: When implementing exotic interest rate product pricing
    action: Implement ratchet cap and sticky caplet pricer for exotic rate products — ratchet structure must handle dynamic
      strike adjustments while sticky behavior must reflect vol surface dynamics near barrier levels
    severity: high
    kind: domain_rule
    modality: must
    consequence: Valuing ratchet caps and sticky caplets using vanilla cap pricing models ignores the evolving strike structure
      and vol surface behavior, causing systematic mispricing of these structured rate products prevalent in capital markets
    derived_from_bd_id: BD-025
  - id: finance-C-236
    when: When implementing floating rate note discount margin calculation
    action: Use Newton-Raphson method for solving FRN discount margin — the fast quadratic convergence is required for real-time
      DM quotes in floating rate note trading
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Replacing Newton method with bisection for FRN discount margin solving increases convergence time significantly,
      making real-time pricing and risk management for floating rate notes impractical at trading desk speeds
    derived_from_bd_id: BD-059
  - id: finance-C-237
    when: When implementing Merton structural credit model calibration
    action: Use scipy.optimize.minimize with bounds and constraints for Merton model calibration — the optimizer must fit
      the implied equity volatility surface to market observables (equity value, volatility, debt)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing scipy minimize with ad-hoc calibration methods risks incorrect parameter estimation, causing market-inconsistent
      credit analysis and unreliable default probability calculations for corporate bond and credit derivative valuation
    derived_from_bd_id: BD-064
  - id: finance-C-238
    when: When implementing LIBOR Market Model simulation
    action: Use Cholesky decomposition for factoring the LMM correlation matrix — Cholesky ensures positive definiteness required
      for simulating correlated forward rates in Gaussian LMM
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-positive-definite correlation factorization in LMM simulation produces invalid rate paths with
      negative variances, causing incorrect swaption basket pricing and unreliable portfolio risk analysis in multi-rate environments
    derived_from_bd_id: BD-065
  - id: finance-C-239
    when: When implementing convertible bond pricing logic
    action: Use trinomial tree valuation for instruments with embedded call, put, and conversion options — binomial trees
      do not provide sufficient convergence for multi-feature American exercise boundaries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Binomial tree pricing of complex convertible bonds with multiple embedded features exhibits poor convergence
      and inaccurate early exercise boundary detection, leading to systematic mispricing that could cause significant losses
      in live trading
    derived_from_bd_id: BD-074
  - id: finance-C-240
    when: When implementing P&L tracking in backtesting or live trading
    action: Verify total_pnl equals realized_pnl plus unrealized_pnl at every calculation point — implement conservation check
      that raises an error if the sum deviates from total_pnl
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without PnL conservation validation, portfolio value calculations accumulate floating-point errors silently;
      unrealized gains drift from actual positions, causing reporting discrepancies and potential regulatory compliance issues
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-241
    when: When implementing train/test time split for strategy backtesting
    action: Enforce strict temporal ordering — each training data timestamps must precede each test data timestamps, with
      no overlap or lookahead; validate that max(train_dates) < min(test_dates)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without train/test split integrity validation, temporal overlap leaks future information into training data,
      causing strategies to appear profitable in backtesting but fail catastrophically in live trading due to look-ahead bias
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-242
    when: When creating bond instruments with maturity on the last day of a month
    action: Verify that coupon payment dates follow month-end convention matching the maturity date — check that flows dates
      with day=31 are adjusted to the last day of each month for Feb/May/Aug/Nov cycles
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Month-end convention mismatch causes irregular coupon periods and incorrect settlement date calculations,
      leading to cash flow timing errors that accumulate across long-dated bond positions
    derived_from_bd_id: BD-032
  - id: finance-C-243
    when: When creating swap or CDS instruments without specifying notional
    action: Verify that default notional of 1,000,000 matches the quoting convention for the instrument type — for inter-dealer
      quotes this is standard, but for bilateral OTC trades the notional should match actual trade terms
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default 1M notional for non-standard trades causes valuation errors when comparing to market quotes;
      payoff calculations scale incorrectly with notional, leading to P&L discrepancies
    derived_from_bd_id: BD-033
  - id: finance-C-244
    when: When calibrating implied volatility for equity vanilla options
    action: Verify that Newton-Secant hybrid converges reliably for the specific option moneyness and expiry range — test
      convergence on deep ITM and very short-dated options where BS derivative estimates become unstable
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Newton-Secant convergence failure on edge cases (deep ITM, very short expiry) produces incorrect implied
      volatility estimates, causing systematic mispricing of option strategies that rely on accurate vol calibration
    derived_from_bd_id: BD-035
  - id: finance-C-245
    when: When constructing zero curves with bootstrapped data for swap pricing
    action: Verify that linear interpolation assumptions are acceptable for the curve tenor range — for short tenors (<1Y)
      and sharp rate transitions, higher-order interpolation may better capture curve shape; for standard swap tenors linear
      is sufficient
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Linear interpolation smoothness limitation introduces pricing errors near curve inflection points, particularly
      affecting accurate pricing of short-dated swaps and forward rate agreements
    derived_from_bd_id: BD-039
  - id: finance-C-246
    when: When using the framework for production trading systems
    action: Assume the framework enforces binding between model versions and data versions — this binding is not implemented
      and creates production reliability risk
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without model-data version binding, stale model parameters may be applied to current market data, causing
      systematic mispricing and unexpected trading losses in production
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-247
    when: When deploying the framework to production trading systems
    action: Implement model version and data version binding with validation checks — require explicit version compatibility
      verification before executing trades
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without version binding, mismatched model-data versions cause silent mispricing; explicit checks prevent
      production failures from stale model parameters
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-248
    when: When implementing or using the framework for backtesting
    action: Assume the framework includes a complete transaction cost model — cost model completeness is not implemented and
      backtest results will systematically underestimate actual trading costs
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Incomplete cost model causes backtest results to show profits that would be erased by unmodeled costs in
      live trading, leading to strategy deployment failures
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-249
    when: When running backtesting with the framework
    action: 'Explicitly specify each cost components: commission rates, stamp duty (0.05-0.1% for A-shares), slippage model,
      and market impact estimates — do not rely on default or incomplete cost calculations'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unmodeled costs accumulate over high-frequency strategies; without explicit cost components, backtest Sharpe
      ratios are overstated by 20-50%, causing strategies to fail live
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-250
    when: When implementing or using the framework for order management
    action: Assume the framework implements a complete order lifecycle state machine — order state tracking is not implemented
      and order status cannot be reliably tracked
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without order lifecycle state machine, the framework cannot distinguish pending/partial/filled/cancelled
      orders, causing double execution and reconciliation failures
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-251
    when: When implementing order management with the framework
    action: Implement order lifecycle states (pending/submitted/partial_fill/filled/cancelled/rejected) with validation rules
      for valid state transitions and timeout handling for pending orders
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing state machine causes order tracking failures, silent duplicate submissions, and inability to detect
      stuck orders in trading systems
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-252
    when: When implementing or using the framework for position and risk management
    action: Assume the framework enforces position size and risk limits — risk limit enforcement is not implemented and positions
      may exceed defined limits
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without position size and risk limits, strategies can accumulate excessive exposure leading to margin calls
      and catastrophic losses beyond intended risk parameters
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-253
    when: When implementing position management with the framework
    action: Implement explicit position size limits (max_position_size parameter) and risk limits (max_loss_percent parameter)
      with pre-trade validation that rejects orders exceeding defined thresholds
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unenforced risk limits allow position accumulation beyond safe thresholds; explicit pre-trade checks prevent
      margin calls and forced liquidation scenarios
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-254
    when: When implementing or using the framework for market order execution
    action: Assume market orders are always filled instantly and completely — fill assumption for market orders is not implemented
      and backtest will overestimate execution certainty
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming instant complete fills overestimates strategy profitability; in live trading, market orders may
      experience delays, partial fills, or slippage causing execution shortfalls
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-255
    when: When executing market orders in backtesting
    action: Implement time-to-fill modeling with slippage estimates for market orders — use last_price with slippage_multiplier
      (e.g., 0.001-0.005) and add execution delay simulation for illiquid securities
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without market order fill assumptions, backtest assumes perfect execution that doesn't match live trading;
      realistic fill modeling prevents strategy failures at deployment
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-256
    when: When pricing interest rate derivatives with the framework
    action: Use Black's model for European swaptions, caps/floors, and FRAs under lognormal forward rate assumption; for American
      options or low-rate environments (negative rates possible), use alternative models (binomial tree, Bachelier/Normal
      model)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Black's model assumes positive forward rates under lognormal dynamics; applying it to American options or
      negative rate environments produces systematic pricing errors and incorrect Greeks
    derived_from_bd_id: BD-047
  - id: finance-C-257
    when: When simulating CIR square-root process for volatility modeling
    action: Use Kahl-Jackel fully implicit discretization scheme for CIR process — ensures strictly positive variance without
      moment-matching corrections; for extreme variance values, QE (Quadratic Exponential) scheme provides better accuracy
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Euler or simple truncation schemes for CIR process can produce negative variance values, causing numerical
      instabilities and incorrect path simulations for rate and equity volatility models
    derived_from_bd_id: BD-054
  - id: finance-C-258
    when: When implementing Hull-White short rate model for interest rate derivatives
    action: Use Hull-White trinomial tree with probability adjustment for American/bermudan options; for European payoffs,
      analytical HW formulas are more efficient — verify mean_reversion_speed and volatility parameters are calibrated to
      swaption vol surface
    severity: high
    kind: domain_rule
    modality: must
    consequence: Uncalibrated Hull-White parameters produce incorrect term structure dynamics; using tree for Europeans is
      inefficient while using analytical formulas for Americans causes pricing errors
    derived_from_bd_id: BD-062
  - id: finance-C-259
    when: When pricing zero-coupon bonds using Ho-Lee model
    action: Use Ho-Lee analytical closed-form solution for European ZCB pricing with normal interest rate dynamics; for path-dependent
      payoffs, use tree-based Ho-Lee implementation — analytical solution is not applicable to barrier or path-sensitive products
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Applying analytical Ho-Lee to path-dependent payoffs produces incorrect valuations; the analytical formula
      only applies to European zero-coupon bonds under normal rate dynamics
    derived_from_bd_id: BD-063
  - id: finance-C-260
    when: When implementing reinsurance contract mapping in the utilities stage
    action: Assume the framework provides reinsurance contract mapping functionality — this capability was identified as missing
      by audit checklist and is not implemented
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without reinsurance contract mapping, treaty and facultative reinsurance contracts cannot be properly tracked
      or validated, causing audit failures and potential regulatory compliance issues
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-261
    when: When selecting reinsurance models in the utilities stage
    action: Implement explicit reinsurance contract mapping that includes treaty identification, quota share percentages,
      and facultative approval chains, with validation against policy boundaries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit reinsurance mapping, contracts are treated as direct policies, causing incorrect risk transfer
      calculations and audit failures in INS checks
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-262
    when: When implementing catastrophe risk modeling in the utilities stage
    action: 'Assume the framework provides catastrophe model selection functionality — this capability was identified as missing
      by audit checklist (INS Pass: 0/6 | Fail: 6) and is not implemented'
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without catastrophe model selection, CAT-exposed portfolios cannot be properly assessed for tail risk, leading
      to insufficient reserves and potential solvency issues
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-263
    when: When configuring catastrophe risk models for insurance portfolios
    action: Implement catastrophe model selection with at least one industry-standard model (e.g., AIR, RMS, CoreLogic) and
      verify proper EP/PEP loss aggregation across modeled events
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without CAT model selection, only policy-level accumulation is available, causing underestimation of correlated
      event losses by 30-70% for severe storms
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-264
    when: When implementing delinquency tracking in credit/lending backtesting
    action: Assume the framework provides delinquency definition (DPD 30/60/90) functionality — this capability was identified
      as missing by audit checklist and is not implemented
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit delinquency definitions, default triggers may use inconsistent day-count conventions, causing
      incorrect NPL classifications and provisions
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-265
    when: When implementing credit risk or delinquency calculations
    action: 'Implement explicit delinquency thresholds with DPD (Days Past Due) buckets: 30-day, 60-day, and 90-day triggers,
      ensuring calendar days are used (not business days) for consistency with regulatory reporting'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit DPD thresholds, systems may use inconsistent day-count rules, causing misclassification
      of performing vs. non-performing loans and incorrect IFRS9 stage assignments
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-266
    when: When implementing financial transaction recording in the utilities stage
    action: Assume the framework enforces double-entry bookkeeping integrity — this capability was identified as missing by
      audit checklist and is not implemented
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without double-entry bookkeeping integrity, debits and credits may become unbalanced, causing trial balance
      errors and potential regulatory capital miscalculations
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-267
    when: When implementing journal entry processing or ledger updates
    action: Implement double-entry validation ensuring every journal entry has balanced debits and credits (sum of debits
      equals sum of credits), with automated exception alerts for unbalanced entries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without double-entry validation, unbalanced entries propagate through accounting ledgers, causing trial balance
      failures and potential audit findings in financial reporting
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-268
    when: When implementing reconciliation processes in the utilities stage
    action: 'Assume the framework provides reconciliation timing and exception handling functionality — this capability was
      identified as missing by audit checklist (LND Pass: 0/6 | Fail: 5 | Warn: 1) and is not implemented'
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without reconciliation timing controls, breaks may go undetected for extended periods, amplifying financial
      discrepancies and increasing end-of-day exception resolution time
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-269
    when: When implementing reconciliation workflows for financial data
    action: Implement reconciliation timing controls with defined T+1 settlement checkpoints and automated exception escalation
      workflows, ensuring breaks are flagged within defined SLAs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without reconciliation timing controls, breaks accumulate across business days, making exception resolution
      increasingly difficult and potentially causing downstream settlement failures
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-270
    when: When using the framework's default G_DAYS_IN_YEAR=365.0 parameter for time fraction calculations
    action: Verify that ACT/365 fixed convention matches your instrument's day-count convention before applying to pricing
      or risk calculations — check if instruments use ACT/360 or 30/360 which require different day-count factors
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using ACT/365 for instruments requiring ACT/360 causes systematic pricing errors of approximately 1.4% annually,
      accumulating significantly in long-dated swap valuations
    derived_from_bd_id: BD-079
  - id: finance-C-271
    when: When implementing DiscountCurve rate bumping for risk calculations
    action: Use exponential bumping with time scaling (exp(-bump_size*times)) for rate curve sensitivity calculations — this
      produces parallel curve shifts consistent with DV01-style risk measures
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using linear or additive bumping distorts forward rate structure, causing incorrect DV01 calculations and
      hedge ratios that diverge from expected values by 5-15%
    derived_from_bd_id: BD-087
  - id: finance-C-273
    when: When using dual curve framework with auto-built OIS-LIBOR curves
    action: Implement OIS-LIBOR basis monitoring that triggers curve reconstruction alerts when basis exceeds defined thresholds
      — auto-build validation only checks date alignment, not cross-curve consistency across curve lifetimes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using stale dual curves when OIS-LIBOR basis widens causes silent mispricing of 3-8 bps on interest rate
      swaps, accumulating to significant P&L errors in volatile rate environments
    derived_from_bd_id: BD-093
  - id: finance-C-274
    when: When implementing global numerical floor constants (G_DAYS_IN_YEAR, epsilon values, T clamps) across different asset
      classes (bonds, options) in backtesting
    action: Verify that global numerical floor constants are consistently applied across each calculations; check that epsilon
      values for bond YTM (1e-12) are not smaller than time floors for option pricing (1e-10), as this creates inconsistent
      behavior near expiry
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Inconsistent numerical floors across asset classes cause pricing discrepancies when calculating values near
      expiry; a bond maturing in 2 days with ytm=0 will use different numerical handling than an option with 2 days to expiry,
      leading to unhedged positions or incorrect strategy signals
    derived_from_bd_id: BD-095
  - id: finance-C-275
    when: When implementing VaR/CVaR calculations in the framework
    action: Assume the framework automatically handles VaR/CVaR confidence level and rolling window configuration — the framework
      does not implement these parameters
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit confidence level and window configuration, VaR/CVaR calculations use undefined defaults,
      producing risk measures that do not meet regulatory requirements and misrepresent portfolio risk exposure
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-276
    when: When configuring VaR/CVaR risk calculations
    action: Explicitly set confidence_level (e.g., 0.95 or 0.99) and rolling_window parameters before invoking VaR/CVaR functions;
      add validation that confidence_level is in range (0, 1) and window > 0
    severity: high
    kind: domain_rule
    modality: must
    consequence: VaR calculations without explicit confidence level produce inconsistent results across runs, making risk
      reporting unreliable and potentially causing regulatory compliance failures
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-277
    when: When building FX volatility surfaces
    action: Use delta_fit parameterization with norminvcdf transformation for FX vanilla and barrier options; do NOT use strike-based
      fitting for FX products as it violates market convention
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using strike-based fitting for FX options produces surfaces that do not match market-quoted delta conventions,
      causing systematic pricing errors of 5-20 bps in exotic option valuations
    derived_from_bd_id: BD-088
  - id: finance-C-279
    when: When implementing collection priority and compliance logic
    action: Assume the framework implements collection priority and compliance rules — the framework does not provide these
      capabilities
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without collection priority handling, cash flow ordering defaults to arbitrary sequence, potentially violating
      regulatory requirements for payment waterfall and creditor priority in default scenarios
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-280
    when: When processing cash flows in structured products or credit instruments
    action: Implement explicit collection_priority_rank field for each cash flow and compliance_checks before waterfall execution;
      verify senior > mezzanine > junior ordering for debt instruments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cash flow processing without priority ranking causes incorrect payment sequencing in default scenarios, leading
      to regulatory violations and potential legal liability
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-281
    when: When implementing or refactoring option pricing formulas that involve sqrt(T) terms
    action: Clamp time-to-expiry (T) to minimum 1e-10 before any division operation; when T approaches zero (T < 1e-10), return
      intrinsic value directly (max(S-K, 0) for calls, max(K-S, 0) for puts)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by sqrt(T) without clamping produces NaN or overflow for near-expiry options, causing batch risk
      systems to fail and pricing to return invalid values
    derived_from_bd_id: BD-014
  - id: finance-C-282
    when: When implementing bond settlement and accrued interest calculations
    action: Check if settlement_date > ex_dividend_date before including first coupon in payment schedule; when ex_div condition
      is true, skip the first coupon period to correctly compute accrued interest and dirty price
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including first coupon after ex-dividend date causes incorrect dirty price calculation, leading to overpayment
      of 1-3 coupon amounts for bonds purchased in ex-div period
    derived_from_bd_id: BD-003
  - id: finance-C-283
    when: When implementing zero rate curve interpolation for interest rate derivatives pricing
    action: Use natural cubic spline boundary conditions (zero second-derivative at boundaries) for zero rate interpolation
      to achieve C2 continuity without imposing artificial slope constraints
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using clamped spline boundary conditions imposes arbitrary slopes at curve boundaries, causing discontinuities
      in extracted forward rates and systematic pricing errors of 1-5 bps for instruments near curve endpoints
    derived_from_bd_id: BD-038
  - id: finance-C-284
    when: When calibrating volatility surfaces across different asset classes (SABR for rates, equity vol surface)
    action: Implement unified optimizer selection with consistent convergence diagnostics; document which optimizer is used
      for each surface type and why, to prevent calibration instability in one asset class from masking issues in another
    severity: high
    kind: operational_lesson
    modality: must
    consequence: SABR calibration using L-BFGS-B may fail and be caught by bounds, while identical numerical instability in
      equity vol surface succeeds with Nelder-Mead (no bounds), producing an apparently valid but numerically unstable surface
      that propagates to downstream pricing
    derived_from_bd_id: BD-092
  - id: finance-C-285
    when: When using multiple swaption models (Black, BK, HW, BDT) with hardcoded parameters
    action: Establish explicit model risk framework with uncertainty quantification; verify that HW mean reversion a=0.01
      and σ=0.20 match market-calibrated values before using, and document that different models produce different prices
      for the same swaption
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Users selecting 'HW' may not realize results depend on specific parameter choices (a=0.01, σ=0.20) that differ
      from market-calibrated values, creating hidden model risk where downstream risk metrics lack uncertainty quantification
    derived_from_bd_id: BD-096
  - id: finance-C-286
    when: When implementing or using transition matrix calculations in credit risk models
    action: Assume the framework enforces transition matrix time-homogeneity assumptions — the framework does not validate
      that transition matrices remain constant over time or that homogeneity assumptions are satisfied
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without time-homogeneity enforcement, credit migration models may incorrectly assume constant transition
      probabilities across time periods, causing systematic mispricing of credit derivatives and CDO tranches
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-287
    when: When validating transition matrix calculations in credit risk models
    action: 'Verify that transition matrices satisfy time-homogeneity constraints: confirm row probabilities sum to 1.0 (within
      floating-point tolerance of 1e-9), confirm each elements are non-negative, and document the time period over which the
      matrix was calibrated'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping transition matrix validation may allow non-stochastic matrices or time-varying probabilities to
      propagate through credit pricing models, causing material mispricing in CDO and CDS positions
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-288
    when: When implementing or selecting interpolation methods for curve bootstrapping in interest rate or credit models
    action: Use only explicitly marked bootstrap-suitable interpolation methods (CubicSplineInterpolation, monotonic cubic
      interpolation) — explicitly exclude non-bootstrap-safe methods such as linear interpolation near instrument maturities
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-bootstrap-safe interpolation introduces arbitrage opportunities between instrument prices, causing
      bootstrapped curves to misprice vanilla swaps and FRAs by 1-5 basis points, leading to systematic P&L leakage
    derived_from_bd_id: BD-019
  - id: finance-C-289
    when: When implementing Heston stochastic volatility model discretization
    action: Use the QUADEXP scheme (Andersen 2006) for Heston discretization — do not substitute with simple Euler, QE Milstein,
      or other schemes that exhibit instability in near-flat volatility regimes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Euler discretization of Heston exhibits path instability and incorrect variance distributions, causing option
      prices to deviate by 10-30% from theoretical values in high-volatility regimes
    derived_from_bd_id: BD-021
  - id: finance-C-290
    when: When configuring CDS pricing calculations using the default flat hazard rate integral setting
    action: Verify that the flat hazard rate integral approximation (USE_FLAT_HAZARD_RATE_INTEGRAL=True) matches your accuracy
      requirements by comparing results with numerical integration option; increase accuracy requirements for CDS with sparse
      coupons, steep hazard term structures, or tenors exceeding 7 years
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The flat hazard rate approximation (10-20x speedup) introduces cumulative pricing errors of 2-8% in CDS with
      steep hazard curves or long tenors, causing systematic misvaluation of credit portfolios
    derived_from_bd_id: BD-005
  - id: finance-C-291
    when: When configuring CDS pricing calculations using the default recovery rate of 0.40
    action: Verify that the default recovery rate of 0.40 (STANDARD_RECOVERY_RATE) matches the specific issuer characteristics
      and instrument seniority for your portfolio; override to issuer-specific values for high-yield, distressed debt, or
      subordinated instruments
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 40% recovery for non-senior-unsecured instruments introduces pricing errors of 15-40% in CDS on high-yield
      issuers where recovery rates commonly range from 10-25%, causing severe portfolio misvaluation
    derived_from_bd_id: BD-006
  - id: finance-C-292
    when: When implementing or modifying discount curve risk calculation logic
    action: Use proportional forward rate bumping for curve sensitivity calculations — verify curve bumps preserve relative
      tenor relationships and maintain the curve's risk profile shape
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using absolute (parallel) bumping distorts relative tenor sensitivities, causing DV01 and bucket vega reports
      to misrepresent actual market risk exposure; risk managers may make incorrect hedging decisions based on distorted risk
      measures
    derived_from_bd_id: BD-020
  - id: finance-C-293
    when: When constructing risk measures from bumped discount curves
    action: Apply absolute (parallel) bumping to discount curves for risk calculations — this distorts relative tenors and
      misrepresents the curve's risk profile shape
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Parallel bumping forces uniform shifts across all tenors, which contradicts how traders conceptualize curve
      movements and produces inconsistent risk measures that don't align with market practice
    derived_from_bd_id: BD-020
  - id: finance-C-294
    when: When implementing numerical methods for equity volatility surface construction
    action: Use Newton-Secant hybrid root finding for delta-to-strike conversion — combine Newton's quadratic convergence
      near the root with Secant's robustness when derivative information is unreliable
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using pure bisection for delta-to-strike conversion causes excessive iteration counts, significantly slowing
      vol surface construction; using pure Newton may diverge without good starting values, leading to failed strikes and
      incomplete vol grids
    derived_from_bd_id: BD-042
  - id: finance-C-295
    when: When configuring interpolation method defaults in curve construction workflows
    action: Verify the interpolation method matches the curve usage context — PCHIP (BD-037) is for log-discount fitting only,
      while bootstrap-suitable curves (BD-040) require flat forward method; do not use a single method for both fitting and
      bootstrap without explicit switching logic
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using PCHIP with bootstrap-suitable curves causes numerical failures since PCHIP cannot guarantee positive
      forward rates required for bootstrapping; curve construction workflows may silently switch to incorrect interpolation,
      distorting forward rate calculations across the entire curve
    derived_from_bd_id: BD-094
  - id: finance-C-296
    when: When implementing curve construction workflows involving both fitting and bootstrap stages
    action: Implement explicit interpolation method switching when transitioning from fitting to bootstrap — verify default
      (FLAT_FWD_RATES from BD-018) is overridden to match the curve's intended use
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without explicit method switching, the workflow uses FLAT_FWD_RATES default for both fitting and bootstrap,
      causing inconsistent curve shapes and potential numerical instability in pricing applications that rely on the fitted
      curve
    derived_from_bd_id: BD-094
  - id: finance-C-297
    when: When validating CDS instrument parameters at construction time
    action: Validate that step-in date (protection start) precedes maturity date in the CDS constructor — reject invalid combinations
      with clear error messages before any pricing calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without fail-fast validation, invalid CDS contracts with step-in date >= maturity date produce nonsensical
      pricing outputs or crash during numerical calculations; downstream systems may propagate these errors silently
    derived_from_bd_id: BD-031
  - id: finance-C-298
    when: When implementing FX vanilla option pricing for currency pair convention
    action: Use FORDOM (Foreign/Domestic) convention for FXVanillaOption — Foreign currency is base for notional, Domestic
      for payoff; verify consistent delta hedging direction across each FX option valuations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using DOMFOR convention produces incorrect delta hedges with reversed sign, causing systematic hedging errors
      in live FX option portfolios; P&L attribution will show consistent losses that don't match theoretical pricing
    derived_from_bd_id: BD-082
  - id: finance-C-299
    when: When converting spot or forward FX products to FX option convention
    action: Apply FORDOM conversion when passing spot or forward prices to FXVanillaOption — do not assume spot/forward convention
      matches option convention without explicit conversion
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Passing spot/forward prices in DOMFOR convention directly to FXVanillaOption causes double-counting or missing
      currency conversion, producing systematically wrong option valuations across the entire book
    derived_from_bd_id: BD-082
  - id: finance-C-300
    when: When implementing SABR volatility calibration for rate swaptions
    action: Use Hagan 2002 SABR lognormal volatility approximation formula — the approximation provides closed-form implied
      vol from SABR parameters enabling fast calibration to market swaption vols and arbitrage-free extrapolation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using an alternative SABR approximation or exact Fourier integration will either produce incorrect implied
      vol values or cause unacceptable computational latency, leading to mispriced swaptions and hedge losses
    derived_from_bd_id: BD-049
  - id: finance-C-301
    when: When calibrating SABR model for rate markets with limited liquid swaption data
    action: Fix beta=1 (lognormal asset assumption) to reduce parameters to 3 free parameters — this provides better calibration
      stability and reduces overfitting risk for markets where beta is often fixed near 1
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using general SABR with 4 free parameters in markets with limited data risks overfitting, causing unstable
      volatility surfaces that produce incorrect option prices and unreliable risk metrics
    derived_from_bd_id: BD-050
  - id: finance-C-302
    when: When computing bond yield-to-maturity from dirty prices
    action: Use root-finding algorithms (Newton-Raphson or bisection) to invert the non-linear price-yield relationship —
      analytical solutions are unavailable for non-trivial cash flows
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect root-finding implementation causes YTM convergence failures or wrong yield values, leading to mispriced
      bonds and incorrect portfolio valuation
    derived_from_bd_id: BD-057
  - id: finance-C-303
    when: When computing modified duration for complex FRN structures with caps/floors
    action: Use finite difference bumping to compute modified duration — this captures non-linear price-yield relationships
      and optionality effects where analytical duration formulas break down
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using analytical duration formulas for complex FRN structures with caps/floors produces incorrect risk metrics,
      leading to improper hedge ratios and portfolio losses
    derived_from_bd_id: BD-058
  - id: finance-C-304
    when: When building volatility surfaces for equity options across multiple expiries
    action: Use SSVI (Surface SVI) parameterization — SSVI extends SVI to the full surface by parameterizing total implied
      variance as a function of time and moneyness, ensuring no cross-term calendar spread arbitrage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using slice-by-slice SVI without the SSVI structure introduces term structure inconsistencies and calendar
      spread arbitrage violations, causing inconsistent pricing across expiries and exploitable arbitrage opportunities
    derived_from_bd_id: BD-046
  - id: finance-C-305
    when: When calibrating FX volatility surfaces using the CG optimizer
    action: Verify that tolerance 1e-8 matches the pricing precision requirements for vanilla FX options; adjust tolerance
      if calibration residuals consistently fail to converge or if pricing errors exceed acceptable bounds
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Tight tolerance 1e-8 may cause excessive iterations without improved pricing accuracy, while loose tolerance
      may introduce systematic calibration errors in vol surface that propagate to option pricing
    derived_from_bd_id: BD-071
  - id: finance-C-306
    when: When implementing delta-to-strike conversion for FX options
    action: Use inverse normal CDF mapping (analytical Black-Scholes delta inversion) to translate FX delta quotes to strike
      prices — do not substitute with numerical inversion or alternative mappings
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using numerical inversion or alternative mappings instead of standard inverse normal CDF produces different
      strike prices from delta quotes, causing systematic hedge ratio errors for FX vanilla options quoted as delta-straddles
      or delta-risk reversals
    derived_from_bd_id: BD-072
  - id: finance-C-307
    when: When constructing discount curves using piecewise flat forward rates
    action: Implement piecewise flat instantaneous forward rates via cumulative sum of log-discount factors — maintain constant
      forward rate between pillars and verify consistency with bootstrap methodology
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using continuous forward curves via spline interpolation instead of piecewise flat forwards introduces forward
      rate oscillations that distort discount factors and produce incorrect present values for rate instruments
    derived_from_bd_id: BD-073
  - id: finance-C-308
    when: When setting interpolation method for discount curve subclasses
    action: Use InterpTypes.FLAT_FWD_RATES as the default interpolation method — applies to IborSingleCurve, IborDualCurve,
      CDSCurve, and InflationSwapCurve; switch to FLAT or LINEAR interpolation when using bootstrapping per suitable_for_bootstrap()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the default to LINEAR interpolation causes forward rate discontinuities at pillar dates, introducing
      interpolation artifacts that distort discount factor calculations and produce incorrect pricing for instruments dependent
      on smooth forward curves
    derived_from_bd_id: BD-075
  - id: finance-C-309
    when: When implementing discount curve classes for financial instruments
    action: Verify each curve classes inherit from DiscountCurve base class — the df() method must return (times, dfs) tuple,
      and fwd(), bump() methods must maintain identical semantics across each curve types
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using protocol-based duck typing or interface contracts that deviate from DiscountCurve inheritance breaks
      polymorphic pricing engines; financial instruments calling curve.value() expect consistent df() tuple return format
      that is not enforced by duck typing alone
    derived_from_bd_id: BD-077
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
skill_crystallization:
