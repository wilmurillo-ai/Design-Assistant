resources:
  packages:
  - name: matplotlib
    version_pin: latest
  - name: requests
    version_pin: latest
  - name: oandapy
    version_pin: latest
  - name: ibpy
    version_pin: latest
  - name: comtypes
    version_pin: latest
  - name: pytz
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: blaze
    version_pin: latest
  - name: talib
    version_pin: latest
  - name: numpy
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install matplotlib
    - python3 -m pip install requests
    - python3 -m pip install oandapy
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing a CSV data feed
    action: override _loadline method to parse tokens into OHLCV values
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: CSV data feed will fail to parse any market data because _loadline is the only hook for subclasses to implement
      token-to-value conversion, causing the entire backtest to receive no price data
    stage_ids:
    - data_ingestion
  - id: finance-C-002
    when: When parsing datetime strings from CSV
    action: use the exact dtformat parameter matching the source file format
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Datetime parsing will raise ValueError at runtime when the format string doesn't match the actual date format
      in the CSV file, causing data loading to fail silently or crash the entire backtest
    stage_ids:
    - data_ingestion
  - id: finance-C-003
    when: When configuring data feed column indices
    action: verify CSV column indices match the actual column positions in the file
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: OHLCV values will be assigned to wrong lines or raise IndexError when column indices don't align with the
      actual CSV structure, producing garbage data in indicators and trading signals
    stage_ids:
    - data_ingestion
  - id: finance-C-018
    when: When loading data into LineSeries format
    action: store values at index [0] for current bar, positive indices for past
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Indicator calculations will reference wrong historical values if prices are stored at incorrect indices,
      causing all technical analysis results to be offset from their expected time periods
    stage_ids:
    - data_ingestion
  - id: finance-C-021
    when: When implementing data resampling filters
    action: return False from filter __call__ to pass bars through unchanged
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Returning True instead of False will incorrectly filter out valid bars from the data stream, causing gaps
      or missing data in the output feed
    stage_ids:
    - data_filtering
  - id: finance-C-025
    when: When enabling replay mode on a data feed
    action: enable preload=True because replay is incompatible with preloading
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Preloading with replay produces incorrect backtest results because bars are pre-aggregated instead of built
      step-by-step
    stage_ids:
    - data_filtering
  - id: finance-C-038
    when: When implementing custom indicators that need warmup period
    action: call addminperiod() in __init__ to register the required warmup period
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Indicator will produce incorrect values before sufficient data is available, causing strategy logic to execute
      on invalid indicator readings
    stage_ids:
    - indicator_computation
  - id: finance-C-039
    when: When implementing custom indicators with custom calculation logic
    action: override both next() and once() methods to verify identical results in both runonce=True and runonce=False modes
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Indicator will produce different numerical values between runonce=True (vectorized) and runonce=False (bar-by-bar)
      modes, causing inconsistent strategy behavior
    stage_ids:
    - indicator_computation
  - id: finance-C-043
    when: When implementing indicators that depend on future data or require non-causal look-ahead
    action: access positive array indices that represent future bars relative to current processing position
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Indicator will exhibit look-ahead bias, producing unrealistic signals that cannot be executed in live trading
      based on historical data
    stage_ids:
    - indicator_computation
  - id: finance-C-083
    when: When executing orders that would result in negative cash
    action: Allow order execution if pseudo-execution yields negative cash balance
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Order would create negative cash balance, representing impossible trading scenario where broker would extend
      unlimited credit
    stage_ids:
    - order_execution
  - id: finance-C-113
    when: When presenting backtest results to stakeholders
    action: Present simulated backtest returns as if they represent actual live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not account for slippage, liquidity constraints, and market impact that occur in live
      trading, creating misleading performance expectations
    stage_ids:
    - analysis_reporting
  - id: finance-C-119
    when: When instantiating strategy classes with cerebro.addstrategy()
    action: pass data feeds as positional arguments before other parameters
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Cerebro prepends data feeds to strategy arguments at cerebro.py:1220, so strategies must accept data feeds
      as positional parameters to receive correct market data
    stage_ids:
    - cerebro_orchestration
  - id: finance-C-130
    when: When implementing data ingestion to data filtering data flow
    action: Maintain chronological order with no temporal gaps in OHLCV bar timestamps
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backtest equity curve exhibits look-ahead bias when non-chronological data causes indicator values to reference
      future prices, leading to live trading returns that fall far below backtested results
  - id: finance-C-131
    when: When implementing data filtering to indicator computation data flow
    action: Pass complete OHLCV line tuples where each bar contains each 7 fields (DateTime, Open, High, Low, Close, Volume,
      OpenInterest)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Indicator calculations produce NaN or incorrect values when missing price fields cause arithmetic operations
      on empty values
  - id: finance-C-132
    when: When implementing data ingestion to strategy logic data flow
    action: Access future bar data using negative index (e.g., data[-1]) before shift/lag operation
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Backtest exhibits look-ahead bias where strategy references price data from future bars, causing live trading
      results to diverge significantly from backtested performance
  - id: finance-C-140
    when: When implementing cerebro orchestration to strategy logic data flow
    action: Inject broker reference into strategy instance before strategy start() is called
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Strategy cannot execute trades when broker reference is not available during __init__ or start()
  - id: finance-C-145
    when: When backtesting produces returns that appear too good to be true
    action: Claim backtest returns equal expected live trading returns without examining for look-ahead bias
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Live trading produces losses when backtest performance was inflated by look-ahead bias or overfitting to
      historical data
  - id: finance-C-150
    when: When implementing or using LineIterator subclasses (indicators, strategies, data feeds)
    action: Use datetime[0] as the current timestamp reference — index [0] is current bar, index [-1] is previous bar
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Misalignment between datetime reference and data indexing causes look-ahead bias where strategy decisions
      use future information, invalidating backtest results and potentially causing financial losses in live trading
  - id: finance-C-151
    when: When implementing or using LineIterator subclasses
    action: 'Use forward indexing convention: [0] = current, [-1] = previous, positive indices = past'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect index interpretation causes data access violations where future values are inadvertently read,
      producing invalid backtest results that don't reflect actual trading conditions
  - id: finance-C-152
    when: When implementing LineIterator subclasses that consume data sources
    action: Calculate _minperiod as the maximum of each input datas and indicators _minperiod values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Premature calculation before all data sources have yielded values causes NaN contamination in indicator outputs,
      leading to incorrect signal generation and trading decisions
  - id: finance-C-153
    when: When creating or using data feeds based on OHLCV format
    action: 'Use the standard line order: [DateTime, Open, High, Low, Close, Volume, OpenInterest]'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect line ordering causes price data to be interpreted as wrong fields (e.g., volume as close price),
      corrupting all subsequent calculations and producing invalid backtest results
  - id: finance-C-155
    when: When implementing broker subclasses or using broker operations
    action: 'Implement each abstract methods: getcash(), getvalue(), getposition(), submit(), cancel(), buy(), sell()'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing broker method implementation causes runtime NotImplementedError exceptions, preventing order execution
      and backtest completion
  - id: finance-C-171
    when: When configuring instrument commission parameters
    action: Check comminfo.margin field to determine instrument type — non-zero margin indicates derivatives requiring margin
      handling, while zero margin indicates equity with no margin requirement. Margin field presence is the sole determinant
      for short selling and position tracking behavior
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Misclassifying instruments due to margin field causes incorrect short selling behavior or wrong position
      tracking; derivatives with margin requirements behave fundamentally differently for short positions compared to equity
      instruments
    derived_from_bd_id: BD-031
  - id: finance-C-173
    when: When processing data feeds that implement the Iterator pattern
    action: Understand that data feeds use __iter__ returning self with next() advancing internal cursor state — multiple
      consumers can iterate over the same feed independently because each consumer maintains their own iteration context
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrectly assuming feed iteration is destructive or shared between consumers causes strategies to miss
      data or process bars out of expected order; the iterator pattern enables concurrent indicator consumption but requires
      understanding that state advances on each iteration
    derived_from_bd_id: BD-123
  - id: finance-C-176
    when: When implementing risk-free rate conversion for Sharpe ratio or similar analytics
    action: 'Use compound annual-to-periodic conversion formula: periodic_rate = (1 + annual_rate)^(1/factor) - 1; factor
      must represent the number of periods per year (e.g., 252 for daily trading)'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Linear conversion (annual_rate / factor) ignores compounding effects and understates periodic risk-free returns,
      causing Sharpe ratio calculation errors that misrepresent actual risk-adjusted performance
    derived_from_bd_id: BD-076
  - id: finance-C-180
    when: When implementing the cerebro run loop execution flow
    action: 'Preserve the strict execution order: store_notify → data_notify → timers(cheat) → _next_open → broker_notify
      → timers(regular) → strat._next. This ensures price discovery completes before order processing and cheat-on-open timers
      fire before broker settlement notification.'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Breaking the execution order causes look-ahead bias (orders execute at stale prices before data advances)
      or order timing violations where orders fill before reaching the current bar boundary
    derived_from_bd_id: BD-103
  - id: finance-C-220
    when: When configuring commission schemes for different symbols
    action: Verify the CommissionInfo subclass key used in addcommissioninfo() matches exactly the symbol key in the broker's
      _comminfo_map; mismatched keys cause the broker to fall back to zero commission
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched CommissionInfo keys cause commission calculation to silently fall back to zero, overstating backtest
      returns and creating large discrepancies with live trading where actual commissions are charged
    derived_from_bd_id: BD-128
  - id: finance-C-228
    when: When implementing short order submission logic
    action: Check that position_size >= order_size before allowing short order submission — broker.check_order_short() must
      enforce this to prevent naked shorting
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Allowing short orders without sufficient long position violates regulatory requirements and creates naked
      short positions that cannot be covered in live trading
    derived_from_bd_id: BD-105
  - id: finance-C-230
    when: When comparing datetime values from different data feeds or with user-provided timestamps
    action: Mix UTC datetime objects (returned by data.datetime) with naive datetime comparisons
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Comparing UTC-aware datetimes with naive datetime objects silently produces incorrect results, causing wrong
      bar alignment, missed signals, or duplicate executions in multi-timezone backtesting Always use data._tz.localize()
      or explicit timezone conversion for local-time display to avoid silent failures.
    derived_from_bd_id: BD-129
  - id: finance-C-241
    when: When configuring commission scheme parameters
    action: Verify commission values are in decimal format (0.0-1.0 range) when percabs=True; if providing integer values
      like 10 for '10 basis points', set percabs=False instead
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: When percabs=True (decimal format), passing commission=10 instead of commission=0.10 multiplies commission
      100x, causing backtested returns to be grossly inflated or strategy to appear profitable when it is not
    derived_from_bd_id: BD-029
  regular:
  - id: finance-C-004
    when: When converting OHLCV values from strings
    action: wrap numeric conversion in try-except to handle empty or malformed fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: Malformed numeric values in CSV will raise ValueError during float conversion, aborting the entire backtest
      with unhandled exception and producing no results
    stage_ids:
    - data_ingestion
  - id: finance-C-005
    when: When loading data with missing/null values
    action: set nullvalue parameter to float('NaN') for missing price fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing data fields will be set to 0.0 instead of NaN, causing indicators to use zero values in calculations
      which corrupts all downstream technical analysis results
    stage_ids:
    - data_ingestion
  - id: finance-C-006
    when: When accessing datetime from data feed
    action: use self.lines.datetime[0] or self.data0.datetime[0] to get current timestamp
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies will reference stale or incorrect datetime values if they access datetime without the proper index,
      causing position sizing and order timing to use wrong market dates
    stage_ids:
    - data_ingestion
  - id: finance-C-007
    when: When specifying data date range boundaries
    action: convert fromdate/todate to datetime objects before passing to data feed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Date filtering will not work correctly if fromdate/todate are passed as strings, causing data outside the
      intended range to be included or data inside the range to be incorrectly excluded
    stage_ids:
    - data_ingestion
  - id: finance-C-008
    when: When using CSV data feeds
    action: pass preload=True or call data.preload() before running cerebro
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without preloading, live data feeds will cause cerebro to wait indefinitely for streaming data that doesn't
      exist in CSV files, causing the backtest to hang or fail immediately
    stage_ids:
    - data_ingestion
  - id: finance-C-009
    when: When accessing OHLCV data lines
    action: access prices via self.data0.high, self.data0.close, not direct dictionary keys
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies will raise AttributeError if they attempt to access prices using non-standard attribute names,
      preventing the strategy from running with clear error messages
    stage_ids:
    - data_ingestion
  - id: finance-C-010
    when: When setting timezone for data feed
    action: use pytz timezone objects or tzparse for tz parameter
    severity: high
    kind: domain_rule
    modality: must
    consequence: Timezone-aware data will be displayed in wrong hours when naive timezone specification is used, causing misalignment
      between backtest timestamps and actual market hours
    stage_ids:
    - data_ingestion
  - id: finance-C-011
    when: When loading Yahoo Finance CSV data
    action: check for 'null' string tokens and skip rows with missing adjusted close
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Yahoo CSV downloads may contain 'null' strings for missing data, and without skipping these rows, float()
      conversion will crash the data feed
    stage_ids:
    - data_ingestion
  - id: finance-C-012
    when: When reading CSV files with custom separators
    action: specify separator parameter matching the actual CSV delimiter
    severity: high
    kind: domain_rule
    modality: must
    consequence: CSV rows will be parsed incorrectly when separator doesn't match the file delimiter, causing all price data
      to be misaligned or cause index errors when accessing non-existent columns
    stage_ids:
    - data_ingestion
  - id: finance-C-013
    when: When using multiple data feeds
    action: verify datetime alignment through proper timeframe and compression settings
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Multi-timeframe strategies will fail or produce incorrect signals when data feeds are not properly aligned,
      as indicators cannot compute across misaligned timestamps
    stage_ids:
    - data_ingestion
  - id: finance-C-014
    when: When processing Pandas DataFrame feeds
    action: verify datetime column is index or explicitly mapped in datetime parameter
    severity: high
    kind: domain_rule
    modality: must
    consequence: PandasData will fail to convert timestamps or produce IndexError when column indices don't exist in the DataFrame
      structure, breaking the entire data feed pipeline
    stage_ids:
    - data_ingestion
  - id: finance-C-015
    when: When using IB/Interactive Brokers data feed
    action: handle CONNBROKEN and DISCONNECTED notifications in strategy logic
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Live data feed will silently stop delivering ticks when connection is lost, causing strategies to continue
      with stale prices and generate incorrect trading signals
    stage_ids:
    - data_ingestion
  - id: finance-C-016
    when: When using CSV data feeds
    action: claim the data represents real-time market conditions
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: CSV data feeds only contain historical records and cannot reflect current market prices, so presenting them
      as real-time would mislead users about live trading capabilities
    stage_ids:
    - data_ingestion
  - id: finance-C-017
    when: When using backtrader data ingestion
    action: expect CSV data feeds to provide real-time tick-by-tick updates
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: CSVDataBase reads files sequentially and cannot poll for new data, so expecting live updates from static
      files would cause strategies to hang waiting for data that will never arrive
    stage_ids:
    - data_ingestion
  - id: finance-C-019
    when: When using exactbars=1 memory optimization
    action: expect historical price data to be accessible beyond the minimum period
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Strategies will encounter NaN values when accessing historical prices beyond the lookback buffer when exactbars=1
      is set, causing index errors or incorrect signal generation
    stage_ids:
    - data_ingestion
  - id: finance-C-020
    when: When implementing custom data feed filters
    action: use _barstack to store bars that need reprocessing after filter application
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Custom filters will corrupt the data feed state if they modify bars without proper stack management, causing
      duplicate bars or missing price data in the strategy
    stage_ids:
    - data_ingestion
  - id: finance-C-022
    when: When configuring resampling with bar2edge=True
    action: align resampled bars to time boundaries (0, 5, 10...) not rolling windows
    severity: high
    kind: domain_rule
    modality: must
    consequence: Bars will be misaligned with expected time boundaries, causing indicator calculations and strategy logic
      to use incorrect timestamps
    stage_ids:
    - data_filtering
  - id: finance-C-023
    when: When using SessionFiller to detect active sessions
    action: use MAXDATE sentinel (datetime.max) to identify when no session is active
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without MAXDATE sentinel, session gaps cannot be properly identified, leading to incorrect bar filling during
      non-trading hours
    stage_ids:
    - data_filtering
  - id: finance-C-024
    when: When initializing _Bar for resampling
    action: initialize open/close to NaN and high/low to +/- infinity to track bar state correctly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect initialization causes bar aggregation logic to fail, producing invalid resampled bars with incorrect
      OHLC values
    stage_ids:
    - data_filtering
  - id: finance-C-026
    when: When performing calendar-based resampling (weeks/months/years)
    action: attempt calendar-based resampling on feeds without a trading calendar (_calendar is None)
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Resampling to weekly/monthly/yearly timeframes fails silently when no calendar is available, producing unpredictable
      bar boundaries
    stage_ids:
    - data_filtering
  - id: finance-C-027
    when: When configuring resampling parameters
    action: set target timeframe greater than source timeframe for valid resampling
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Resampling to a lower or equal timeframe produces no aggregation, wasting computational resources without
      data transformation
    stage_ids:
    - data_filtering
  - id: finance-C-028
    when: When configuring adjbartime parameter
    action: set bar2edge=True for adjbartime to have any effect on resampled bar timestamps
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: adjbartime parameter is silently ignored when bar2edge=False, causing confusion about why bar times are not
      adjusted to boundaries
    stage_ids:
    - data_filtering
  - id: finance-C-029
    when: When configuring rightedge parameter
    action: understand that rightedge=True uses end boundary (e.g., :05) while False uses start boundary (e.g., :00) for 5-minute
      bars
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Misunderstanding rightedge causes confusion about which timestamp convention is used, leading to off-by-one
      errors in time-based analysis
    stage_ids:
    - data_filtering
  - id: finance-C-030
    when: When handling late-arriving data in subday timeframes
    action: configure takelate parameter appropriately (default True) to control late data acceptance
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Late-arriving data mishandling causes bars to be incorrectly attributed to wrong time periods, corrupting
      backtest results
    stage_ids:
    - data_filtering
  - id: finance-C-031
    when: When using SessionFiller with fill_price=None
    action: use previous bar close price as fill price for session gap bars
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using NaN for fill_price causes gaps in price series, breaking indicators that require continuous price data
    stage_ids:
    - data_filtering
  - id: finance-C-032
    when: When implementing resampler/replayer as filters
    action: wrap filters around data feeds following the filter-as-wrapper pattern
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing the filter pattern breaks resampling/replay integration with cerebro orchestration and data feed
      lifecycle management
    stage_ids:
    - data_filtering
  - id: finance-C-033
    when: When using Replayer to simulate intrabar price buildup
    action: set replaying=True on data feed to enable step-by-step bar construction
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without replaying=True, indicators and strategies see completed bars instead of building bars, breaking intrabar
      analysis
    stage_ids:
    - data_filtering
  - id: finance-C-034
    when: When initializing _BaseResampler
    action: modify data feed attributes (timeframe, compression, replaying, resampling flags) during initialization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping attribute modification breaks cerebro's ability to track data feed characteristics, causing incorrect
      execution paths
    stage_ids:
    - data_filtering
  - id: finance-C-035
    when: When presenting backtest results using resampling or replay
    action: claim that resampled/replayed backtest results equal expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Resampling aggregates historical data into synthetic bars; replay simulates intrabar buildup - neither replicates
      actual market microstructure or liquidity effects of live trading
    stage_ids:
    - data_filtering
  - id: finance-C-036
    when: When using resampled data as proof of live execution
    action: present resampled historical bars as evidence of actual market fills or liquidity
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Resampled bars are synthetic aggregations, not actual trades - presenting them as live execution proof misleads
      stakeholders about strategy viability
    stage_ids:
    - data_filtering
  - id: finance-C-037
    when: When comparing resampled timeframes
    action: claim that 5-minute bars from resampling represent actual 5-minute market activity with full OHLCV fidelity
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Resampled bars aggregate tick data into OHLCV, losing sub-bar price action details and potentially misrepresenting
      actual market microstructure
    stage_ids:
    - data_filtering
  - id: finance-C-040
    when: When declaring indicator output lines
    action: declare lines as class attribute using lines = ('line_name',) tuple syntax
    severity: high
    kind: domain_rule
    modality: must
    consequence: Metaclass will not extract lines correctly, causing indicator to lack expected output lines or fail to instantiate
    stage_ids:
    - indicator_computation
  - id: finance-C-041
    when: When implementing indicators that reference their own previous values
    action: override nextstart() to seed the recursive calculation with valid initial values before next() is called
    severity: high
    kind: domain_rule
    modality: must
    consequence: Recursive indicators will access undefined [-1] values before minperiod is met, producing NaN or incorrect
      values for the first calculation
    stage_ids:
    - indicator_computation
  - id: finance-C-042
    when: When implementing vectorized once() methods for performance
    action: use start and end parameters to only calculate for valid indices where sufficient history exists
    severity: high
    kind: domain_rule
    modality: must
    consequence: once() will access out-of-bounds array indices for bars before minperiod, causing index errors or NaN propagation
    stage_ids:
    - indicator_computation
  - id: finance-C-044
    when: When creating custom indicator classes that should not auto-register with MovingAverage registry
    action: set _notregister = True as class attribute to prevent automatic registration
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Indicator will be automatically registered to MovAv registry, potentially causing unintended envelope/oscillator
      auto-generation and namespace pollution
    stage_ids:
    - indicator_computation
  - id: finance-C-045
    when: When implementing indicators that require bar-by-bar execution regardless of runonce setting
    action: set _nextforce = True as class attribute to force bar-by-bar mode
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Indicator will execute in vectorized mode where it may produce different results due to forward-referencing
      dependencies that only work correctly in bar-by-bar mode
    stage_ids:
    - indicator_computation
  - id: finance-C-046
    when: When implementing arithmetic indicators with multiple line dependencies
    action: use line assignment syntax self.lines[0] = expression rather than direct arithmetic on self
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Line operations may not propagate minperiod correctly, causing premature indicator output before source data
      is available
    stage_ids:
    - indicator_computation
  - id: finance-C-047
    when: When backtesting with runonce=True mode
    action: claim that backtested indicator values equal live trading results without accounting for vectorized execution
      differences
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results may differ from live trading because vectorized mode processes all bars at once, potentially
      exposing subtle timing/dependency differences not present in bar-by-bar execution
    stage_ids:
    - indicator_computation
  - id: finance-C-048
    when: When using pre-built backtrader indicators
    action: assume indicator values are calculated with financial-grade precision without independent verification
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Built-in indicators use float arithmetic and math.fsum, which may accumulate precision errors over long backtest
      periods, differing from exchange-grade decimal calculations
    stage_ids:
    - indicator_computation
  - id: finance-C-049
    when: When implementing custom indicator calculations
    action: use math.fsum instead of built-in sum for accumulating values to reduce floating-point precision errors
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Accumulated floating-point errors may cause indicator values to diverge from expected values over long calculation
      periods
    stage_ids:
    - indicator_computation
  - id: finance-C-050
    when: When verifying indicator correctness across different execution modes
    action: run tests with both runonce=True and runonce=False to verify numerical consistency
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Indicators may produce different values between vectorized and bar-by-bar modes, causing strategy parameters
      optimized in one mode to fail in the other
    stage_ids:
    - indicator_computation
  - id: finance-C-051
    when: When implementing recursive indicators that reference their own previous output
    action: call super().__init__() after each line assignments to verify correct minperiod propagation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Recursive dependency chain will not be established correctly, causing minperiod to be underestimated and
      leading to premature/invalid calculations
    stage_ids:
    - indicator_computation
  - id: finance-C-052
    when: When creating multi-line indicators with interdependent outputs
    action: declare each lines before assigning values to any, using class-level lines tuple
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Later line calculations may fail or produce incorrect results because earlier line references are not properly
      initialized
    stage_ids:
    - indicator_computation
  - id: finance-C-053
    when: When subclassing MovingAverageBase
    action: inherit from MovingAverageBase and call super().__init__() to trigger MetaMovAvBase registration
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Moving average will not be registered with MovAv registry, making MovAv.SMA shorthand unavailable and preventing
      automatic envelope/oscillator generation
    stage_ids:
    - indicator_computation
  - id: finance-C-054
    when: When implementing period-based indicators
    action: set params = (('period', default_value),) with a reasonable default period
    severity: high
    kind: domain_rule
    modality: must
    consequence: Indicator cannot be instantiated without explicit period parameter, breaking default cerebro execution and
      requiring manual parameter passing
    stage_ids:
    - indicator_computation
  - id: finance-C-055
    when: When implementing indicators with alias names
    action: declare alias tuple as class attribute to provide alternative access names
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Users cannot access indicator via common alternative names, reducing API usability and consistency with other
      indicators
    stage_ids:
    - indicator_computation
  - id: finance-C-056
    when: When implementing indicators that perform cumulative calculations
    action: implement oncestart() method to seed the cumulative calculation before vectorized once() processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: once() will access larray[start-1] which is uninitialized, causing first calculation to use garbage values
      and propagate errors throughout
    stage_ids:
    - indicator_computation
  - id: finance-C-057
    when: When debugging indicator calculation issues
    action: skip testing with prenext() handling before assuming minperiod is always met
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Indicator will fail during warmup period when integrated into strategies that access indicator values before
      minperiod is satisfied
    stage_ids:
    - indicator_computation
  - id: finance-C-058
    when: When implementing next() or strategy logic that places orders
    action: Check if an order is already pending before submitting new orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Multiple orders may be submitted in the same bar causing unintended double-positioning or race conditions
      in bracket order execution
    stage_ids:
    - strategy_logic
  - id: finance-C-059
    when: When using buy() or sell() methods without explicit size
    action: Verify sizer is properly configured via setsizer() or cerebro.addsizer()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Default FixedSize sizer with stake=1 will place orders with wrong position size, leading to overtrading or
      undersized positions
    stage_ids:
    - strategy_logic
  - id: finance-C-060
    when: When using close() to exit positions
    action: Verify position exists before calling close()
    severity: medium
    kind: domain_rule
    modality: must
    consequence: close() returns None when no position exists, and calling it without position creates no action - this may
      hide logic errors where exit signals fire unexpectedly
    stage_ids:
    - strategy_logic
  - id: finance-C-061
    when: When implementing bracket orders via buy_bracket() or sell_bracket()
    action: Pass correct parent parameter to child orders and use transmit=False for non-terminal orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Bracket orders will not link correctly - stop-loss and take-profit may execute independently instead of canceling
      each other when one fills
    stage_ids:
    - strategy_logic
  - id: finance-C-062
    when: When using order_target_size(), order_target_value(), or order_target_percent()
    action: Check return value - these methods return None when target equals current position
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Silent failure when target position matches current position causes confusing behavior where no order is
      placed but no error is raised
    stage_ids:
    - strategy_logic
  - id: finance-C-063
    when: When accessing data in strategy next() methods
    action: Use self.data0 or self.datas[0] for primary data, not hardcoded indices
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using wrong data index causes indicator calculations on incorrect data, leading to wrong trading signals
      and backtest failures
    stage_ids:
    - strategy_logic
  - id: finance-C-064
    when: When implementing custom Sizer subclasses
    action: Override _getsizing() method and return an integer size value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sizer._getsizing() raises NotImplementedError, causing immediate strategy failure if custom sizer does not
      implement the method
    stage_ids:
    - strategy_logic
  - id: finance-C-065
    when: When processing order notifications in notify_order()
    action: Use order.status == order.Completed for completed checks, not order.status == 1
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Magic number status checks break if order status enum values change; backtrader may add new statuses causing
      index shifts
    stage_ids:
    - strategy_logic
  - id: finance-C-066
    when: When checking if a position exists
    action: Use self.position.size != 0 or bool(self.position) instead of checking size directly
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Direct comparison may miss edge cases; Position class has __bool__ and __len__ methods designed for proper
      boolean evaluation
    stage_ids:
    - strategy_logic
  - id: finance-C-067
    when: When submitting orders through broker
    action: Use strategy.buy()/sell() methods, not direct broker access
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct broker access bypasses sizer integration and strategy context, causing incorrect order sizing and
      missing trade tracking
    stage_ids:
    - strategy_logic
  - id: finance-C-068
    when: When accessing broker state for cash or portfolio value
    action: Use self.broker.getcash() and self.broker.getvalue() instead of direct attribute access
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Direct attribute access may not reflect updated values during order processing; broker methods ensure proper
      state calculation
    stage_ids:
    - strategy_logic
  - id: finance-C-069
    when: When implementing notify_order() callback
    action: Clear pending order sentinel when order is no longer alive
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Stale pending order sentinel prevents new orders from being placed, causing strategies to silently skip trading
      opportunities
    stage_ids:
    - strategy_logic
  - id: finance-C-070
    when: When calculating order size in custom sizer
    action: Return absolute integer value from _getsizing() - sign is handled by buy/sell methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning negative size from sizer causes order rejection or unexpected reversal behavior; order methods
      handle sign internally
    stage_ids:
    - strategy_logic
  - id: finance-C-071
    when: When using order_target_value() or order_target_percent()
    action: Provide price parameter for non-marker order types or use data.close[0]
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without price, target value calculations use current data.close[0] which may not match expected entry price,
      causing incorrect position sizing
    stage_ids:
    - strategy_logic
  - id: finance-C-072
    when: When using bracket orders with specific price levels
    action: Calculate stop and limit prices relative to entry price, not current market price
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bracket orders execute at specified prices; using current market price may cause immediate execution at unfavorable
      levels if price moved since signal
    stage_ids:
    - strategy_logic
  - id: finance-C-073
    when: When tracking trades manually without using Trade API
    action: Duplicate trade tracking logic already implemented by backtrader
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Redundant trade tracking causes double-counting of positions and incorrect PnL calculations in trade history
      and analyzers
    stage_ids:
    - strategy_logic
  - id: finance-C-074
    when: When implementing strategy that relies on order execution timing
    action: Assume orders execute immediately in the same bar as submission
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Market orders execute at next bar's open price in backtesting; assuming immediate execution causes look-ahead
      bias in backtest results
    stage_ids:
    - strategy_logic
  - id: finance-C-075
    when: When presenting backtest results as trading performance
    action: Claim backtest returns will translate directly to live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results exclude slippage, latency, partial fills, and market impact that occur in live trading;
      actual returns will differ significantly
    stage_ids:
    - strategy_logic
  - id: finance-C-076
    when: When using broker simulation for live trading decisions
    action: Rely on simulated fills as accurate representations of real market execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Simulated fills use deterministic prices without considering real market liquidity, bid-ask spread, or order
      book depth; live execution may fail or fill at worse prices
    stage_ids:
    - strategy_logic
  - id: finance-C-077
    when: When using backtrader as a live trading platform
    action: Configure slippage, fillers, and commission schemes to model real market conditions
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without realistic slippage modeling, live trading results will significantly underperform backtest results
      due to spread, fees, and partial fills
    stage_ids:
    - strategy_logic
  - id: finance-C-078
    when: When placing orders for leveraged instruments
    action: Configure margin requirements via broker.setcommission() before trading
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without margin configuration, leveraged positions may be accepted even when insufficient margin exists, causing
      margin calls or forced liquidations in live trading
    stage_ids:
    - strategy_logic
  - id: finance-C-079
    when: When using order_target_value() with short selling
    action: Configure short cash parameters via broker.set_shortcash()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Short positions without proper cash management may cause unlimited loss exposure; set_shortcash ensures adequate
      cash reserves for short positions
    stage_ids:
    - strategy_logic
  - id: finance-C-080
    when: When implementing multiple strategy instances on same data
    action: Use tradeid parameter to distinguish trades from different strategies
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without tradeid, trades from different strategies on same data get grouped together, causing incorrect position
      tracking and PnL attribution
    stage_ids:
    - strategy_logic
  - id: finance-C-081
    when: When setting commission scheme via setcommission()
    action: Explicitly configure commission rate since default is 0.0 with no cost deduction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategies will not account for transaction costs in backtesting, causing inflated returns that do not reflect
      actual trading performance with fees
    stage_ids:
    - order_execution
  - id: finance-C-082
    when: When configuring futures-like instruments without margin
    action: Set margin parameter for non-stocklike assets to verify correct position sizing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without margin set, futures operations use default margin of 1.0, causing incorrect position sizing and potential
      over-leveraging in backtests
    stage_ids:
    - order_execution
  - id: finance-C-084
    when: When using BackBroker for trading operations
    action: Claim BackBroker provides real-time market execution or live broker connectivity
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: BackBroker is a broker simulator for backtesting; it does not connect to real exchanges and order fills are
      simulated using historical OHLCV data
    stage_ids:
    - order_execution
  - id: finance-C-085
    when: When presenting backtest trading results
    action: Present backtest returns as guaranteed future trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtested results do not account for slippage, market impact, or execution delays that occur in live trading;
      presenting them as predictions violates reasonable expectations
    stage_ids:
    - order_execution
  - id: finance-C-086
    when: When enabling cheat-on-close (coc) mode
    action: Understand that coc executes market orders at the close price of the order creation bar, introducing look-ahead
      bias
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Cheat-on-close allows orders to execute at bar close before the close price is actually known, creating look-ahead
      bias that would not exist in live trading
    stage_ids:
    - order_execution
  - id: finance-C-087
    when: When backtesting with default BackBroker settings
    action: Configure explicit slippage if live trading execution quality needs to be approximated
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Default slippage of 0.0 means orders execute at exact OHLC prices with no market impact simulation, overstating
      execution quality compared to live markets
    stage_ids:
    - order_execution
  - id: finance-C-088
    when: When using checksubmit parameter for order validation
    action: Keep checksubmit=True to validate cash/margin before order acceptance (default behavior)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Setting checksubmit=False bypasses margin validation, allowing orders that would fail in real trading due
      to insufficient capital
    stage_ids:
    - order_execution
  - id: finance-C-089
    when: When implementing order execution for new order types
    action: Follow the _try_exec_* pattern for execution type dispatching
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Order types must be routed through appropriate _try_exec_* methods to ensure correct execution logic for
      Market/Limit/Stop/StopLimit/Trail orders
    stage_ids:
    - order_execution
  - id: finance-C-090
    when: When submitting orders to BackBroker
    action: Route orders through submit() → transmit() → check_submitted() execution pipeline
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct execution bypassing the submission pipeline would skip cash validation and order state management
    stage_ids:
    - order_execution
  - id: finance-C-091
    when: When handling stocklike vs futures-like position tracking
    action: Use stocklike=True for equities (cost = size × price) and stocklike=False for futures (cost = size × margin)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect stocklike setting causes wrong position cost calculation, leading to sizing errors that either
      over/leverage positions
    stage_ids:
    - order_execution
  - id: finance-C-092
    when: When computing commission for percentage-based schemes
    action: Understand percabs parameter controls whether commission is 0.XX (True) or XX% (False)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misunderstanding percabs causes commission to be 100× larger or smaller than intended, significantly distorting
      net returns
    stage_ids:
    - order_execution
  - id: finance-C-093
    when: When creating custom commission schemes
    action: Inherit from CommInfoBase and override _getcommission() for custom fee structures
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Custom commission schemes must follow the CommInfoBase interface to integrate properly with broker cash management
    stage_ids:
    - order_execution
  - id: finance-C-094
    when: When executing bracket orders (parent + child)
    action: Cancel remaining bracket children when parent order is executed or cancelled
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Orphaned bracket children would remain pending, potentially executing unexpectedly in subsequent bars
    stage_ids:
    - order_execution
  - id: finance-C-095
    when: When handling OCO (One-Cancels-Other) orders
    action: Cancel the other OCO group member when one order executes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without OCO cancellation logic, both orders could execute leading to doubled position or conflicting trades
    stage_ids:
    - order_execution
  - id: finance-C-096
    when: When processing futures positions with cash adjustments
    action: Apply end-of-bar cashadjust() to reflect mark-to-market for open futures positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without daily cash adjustments, futures P&L is not properly tracked, causing incorrect account value calculations
    stage_ids:
    - order_execution
  - id: finance-C-097
    when: When configuring interest on short positions
    action: Set interest parameter with interest_long=True if charging long positions as well
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: By default, interest is only charged on short positions; forgetting interest_long=True results in missed
      borrowing costs for long positions in products like ETFs
    stage_ids:
    - order_execution
  - id: finance-C-098
    when: When implementing Sharpe ratio calculations
    action: Use risk-free rate conversion factor from RATEFACTORS table for timeframe matching
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sharpe ratio produces incorrect annualized values when risk-free rate is not converted to match the analysis
      timeframe, leading to misleading performance comparisons
    stage_ids:
    - analysis_reporting
  - id: finance-C-099
    when: When calculating Sharpe ratio with zero or single return samples
    action: Handle ZeroDivisionError gracefully and return None for the ratio
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero crashes the backtest when standard deviation of returns is zero (no variance in returns),
      producing uncaught exception instead of informative None value
    stage_ids:
    - analysis_reporting
  - id: finance-C-100
    when: When implementing SQN (System Quality Number) calculations
    action: Handle ZeroDivisionError when standard deviation of trade PnL is zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: SQN calculation crashes with division by zero when all trades have identical profit/loss, preventing analysis
      completion
    stage_ids:
    - analysis_reporting
  - id: finance-C-101
    when: When plotting analysis results with matplotlib
    action: Verify matplotlib is installed before invoking plot functionality
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Plotting operation fails entirely with ImportError when matplotlib is not available, blocking visual analysis
      output
    stage_ids:
    - analysis_reporting
  - id: finance-C-102
    when: When using exactbars mode for memory optimization
    action: Attempt plotting when exactbars is set to value greater than 0
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Plotting returns empty/silent failure when exactbars > 0 is active, as this mode deactivates all plotting
      functionality for memory savings
    stage_ids:
    - analysis_reporting
  - id: finance-C-103
    when: When integrating with pyfolio for portfolio analysis
    action: Set analyzer timeframe to bt.TimeFrame.Days (default) to match pyfolio expectations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: PyFolio integration produces incorrect returns and metrics when non-daily timeframe is used, as pyfolio expects
      daily data for its internal calculations
    stage_ids:
    - analysis_reporting
  - id: finance-C-104
    when: When integrating with pyfolio for portfolio analysis
    action: Verify pandas is installed before calling get_pf_items() method
    severity: high
    kind: resource_boundary
    modality: must
    consequence: PyFolio get_pf_items() method raises NameError when pandas is not installed, as the method performs local
      import of pandas and DataFrame
    stage_ids:
    - analysis_reporting
  - id: finance-C-105
    when: When observers track broker cash and portfolio value
    action: Query broker state at each clock tick using getcash() and getvalue() methods
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Observer equity curve shows stale or incorrect values if broker state is not queried on each tick, breaking
      equity visualization accuracy
    stage_ids:
    - analysis_reporting
  - id: finance-C-106
    when: When using observers to track trading activity
    action: Use prenext() that calls next() by default for observers tracking state
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Observer fails to record values during warm-up period if prenext is not implemented, causing gaps in equity
      curve and trade marker visualization
    stage_ids:
    - analysis_reporting
  - id: finance-C-107
    when: When using the fundmode parameter in analyzers
    action: Pass fund parameter to child analyzers for consistent NAV vs fund value selection
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent fundmode selection across child analyzers produces mismatched returns, positions, and leverage
      calculations in PyFolio output
    stage_ids:
    - analysis_reporting
  - id: finance-C-108
    when: When using stddev_sample parameter in Sharpe ratio calculation
    action: Apply Bessel's correction (divide by N-1) when calculating standard deviation for sample data
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Sharpe ratio underestimates risk when using sample standard deviation without Bessel's correction, producing
      overly optimistic performance metrics
    stage_ids:
    - analysis_reporting
  - id: finance-C-109
    when: When calculating drawdown metrics in DrawDown analyzer
    action: Track peak value using max() comparison before calculating drawdown
    severity: high
    kind: domain_rule
    modality: must
    consequence: Drawdown calculation produces incorrect negative values if peak tracking is not maintained, misrepresenting
      strategy risk profile
    stage_ids:
    - analysis_reporting
  - id: finance-C-110
    when: When rendering analysis plots
    action: Set datetime locators based on strategy clock timeframe and compression
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Plot x-axis displays incorrect or unreadable date labels when locators are not matched to the data's timeframe,
      making temporal analysis impossible
    stage_ids:
    - analysis_reporting
  - id: finance-C-111
    when: When calculating SQN with fewer than 30 trades
    action: Apply caution flag or reduced confidence when interpreting SQN results
    severity: high
    kind: domain_rule
    modality: must
    consequence: SQN values below 30 trades have unreliable statistical significance, potentially leading to overconfidence
      in strategies with insufficient trade history
    stage_ids:
    - analysis_reporting
  - id: finance-C-112
    when: When presenting backtest Sharpe ratio results
    action: Claim Sharpe ratio as guaranteed future performance metric
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Sharpe ratio calculated from historical backtest does not account for changing market conditions, leading
      to over-optimistic expectations for live trading
    stage_ids:
    - analysis_reporting
  - id: finance-C-114
    when: When pyfolio integration returns DataFrame timestamps
    action: Normalize each datetime indices to UTC timezone using tz_localize('UTC')
    severity: high
    kind: domain_rule
    modality: must
    consequence: PyFolio tearsheet produces incorrect performance attribution when timestamps have inconsistent or missing
      timezone information, breaking time-based calculations
    stage_ids:
    - analysis_reporting
  - id: finance-C-115
    when: When TradeAnalyzer calculates average PnL with zero closed trades
    action: Handle division by zero when calculating average PnL before any trade closes
    severity: high
    kind: domain_rule
    modality: must
    consequence: TradeAnalyzer crashes with division by zero when dividing total PnL by closed trades count before any trade
      has completed
    stage_ids:
    - analysis_reporting
  - id: finance-C-116
    when: When implementing observers as LineIterator subclasses
    action: Define lines tuple and plotinfo dict for each observer implementation
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Observer fails to plot or record data when lines or plotinfo are not properly defined, causing silent data
      loss in analysis output
    stage_ids:
    - analysis_reporting
  - id: finance-C-117
    when: When using cerebro.plot() with multiprocessing optimization
    action: Return plots from main process only after collecting results from worker processes
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Plotting in multiprocessing mode produces no output if called in worker processes, as matplotlib cannot render
      in forked processes
    stage_ids:
    - analysis_reporting
  - id: finance-C-118
    when: When implementing strategies that use data filters or signals
    action: rely on runonce=True vectorized execution mode
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Data filters modify bars during iteration, which is incompatible with vectorized _runonce mode that loads
      all data upfront. Backtest results will be incorrect because filter transformations are not applied.
    stage_ids:
    - cerebro_orchestration
  - id: finance-C-120
    when: When implementing cerebro.py with replay or resample data feeds
    action: disable preload by setting preload=False explicitly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Preloading is incompatible with replay mode because replay constructs bars in realtime from tick data. Enabling
      preload with replay will cause incorrect bar construction or errors
    stage_ids:
    - cerebro_orchestration
  - id: finance-C-121
    when: When configuring cerebro with exactbars=True or exactbars=1
    action: accept that plotting functionality is automatically disabled
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: exactbars with value True or 1 enables aggressive memory optimization but disables all plotting functionality
      per cerebro.py:975-976 return statement
    stage_ids:
    - cerebro_orchestration
  - id: finance-C-122
    when: When subclassing strategy classes with custom parameters
    action: expect base class params to automatically inherit to child strategies
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: MetaParams metaclass pops 'params' attribute before class creation (metabase.py:207), preventing automatic
      inheritance. Each subclass must explicitly declare its params or explicitly reference base params
    stage_ids:
    - cerebro_orchestration
  - id: finance-C-123
    when: When running parameter optimization with multiprocessing enabled
    action: verify custom analyzers are picklable for multiprocessing pool
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Multiprocessing pool.imap (cerebro.py:1148) pickles strategy objects to subprocesses. Custom analyzers with
      unpicklable attributes will cause runtime errors during optimization
    stage_ids:
    - cerebro_orchestration
  - id: finance-C-124
    when: When accessing analysis results via strat.analyzers after cerebro.run()
    action: use the analyzers attribute on strategy instances returned by run()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Analyzers are attached to strategy objects during runstrategies() at cerebro.py:1261-1262. Non-optimization
      runs return strategy list directly; optimization runs return OptReturn objects with analyzers attribute
    stage_ids:
    - cerebro_orchestration
  - id: finance-C-125
    when: When cerebro.py:live=True is set for live trading mode
    action: accept that both preload and runonce are automatically forced to False
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Live mode disables vectorized execution to support tick-by-tick data delivery from live feeds. This reduces
      backtest speed but enables real-time data handling
    stage_ids:
    - cerebro_orchestration
  - id: finance-C-126
    when: When comparing runnext vs runonce execution modes for non-filter strategies
    action: expect identical results for strategies without filters or signals
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Both execution paths invoke strategy.next() per bar, but _runonce uses vectorized indicator calculation before
      calling next. For pure next()-based strategies with no indicators, results are equivalent
    stage_ids:
    - cerebro_orchestration
  - id: finance-C-127
    when: When cerebro runs with optdatas=True (default) during parameter optimization
    action: accept that data preloading happens once in main process before pool workers
    severity: low
    kind: resource_boundary
    modality: must
    consequence: With optdatas=True, cerebro preloads data in main process (cerebro.py:1138-1145) before spawning pool workers.
      This saves ~20% optimization time but requires sufficient memory for full dataset
    stage_ids:
    - cerebro_orchestration
  - id: finance-C-128
    when: When using cerebro.run() return value for non-optimization runs
    action: unpack the return value as a list of strategy instances (not a list of lists)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-optimization runs return self.runstrats[0] (cerebro.py:1161) which is already a list of strategy instances,
      not a nested list. Optimization runs return list of lists
    stage_ids:
    - cerebro_orchestration
  - id: finance-C-129
    when: When implementing custom indicators that require non-vectorized execution
    action: call cerebro._disable_runonce() during indicator initialization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Custom indicators like HeikinAshi that transform data in non-vectorizable ways must disable runonce mode.
      Failing to do so causes incorrect bar calculations
    stage_ids:
    - cerebro_orchestration
  - id: finance-C-133
    when: When implementing indicator computation to strategy logic data flow
    action: Wait until _minperiod requirement is satisfied before executing strategy next() method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategy executes with incomplete indicator values during warmup period, generating invalid trading signals
      based on insufficient data
  - id: finance-C-134
    when: When implementing strategy logic to order execution data flow
    action: Market orders created during bar N execute at bar N+1 opening price (default behavior)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategy executes at different price than expected when order timing assumptions do not match backtrader's
      bar-end execution model
  - id: finance-C-135
    when: When implementing order execution to strategy logic data flow
    action: Forward order status notifications through _addnotification with quicknotify flag respected
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategy receives stale order status causing duplicate submissions or missed trade opportunities when notifications
      queue improperly
  - id: finance-C-136
    when: When implementing strategy logic to analysis reporting data flow
    action: Pass trade events with complete execution data including dt, size, price, pnl, closedvalue, openedvalue
    severity: high
    kind: domain_rule
    modality: must
    consequence: Analyzer produces incorrect performance metrics when trade PnL calculations receive incomplete execution
      data
  - id: finance-C-137
    when: When implementing strategy logic to analysis reporting data flow
    action: Maintain PnL conservation where realized_pnl + unrealized_pnl equals total_position_value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Analyzer reports inconsistent portfolio value when PnL components do not sum correctly, causing misreporting
      of actual returns
  - id: finance-C-138
    when: When implementing cerebro orchestration to data ingestion data flow
    action: Start data feeds before strategy initialization through preload or explicit start() call
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategy fails to initialize with empty data feed when data start() is not called before run() begins
  - id: finance-C-139
    when: When implementing cerebro orchestration to order execution data flow
    action: Set broker cash and commission schemes before run() begins
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Backtest fails or uses incorrect capital when broker configuration happens after data preload begins
  - id: finance-C-141
    when: When implementing data filtering to indicator computation data flow in replay mode
    action: Set preload to False when using replaydata() to allow proper bar-by-bar construction
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Replayer produces incomplete intraday bars when preload=True forces all data to be loaded before replay processing
      begins
  - id: finance-C-142
    when: When implementing data ingestion to strategy logic with live data feeds
    action: Disable preload and runonce when using live=True to allow real-time bar processing
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Live data feed stalls or produces incorrect bars when preload=True attempts to load historical data before
      real-time bars arrive
  - id: finance-C-143
    when: When implementing strategy logic to order execution with Cheat-On-Open enabled
    action: Call set_coo(True) on broker AND set cheat_on_open=True on cerebro to enable open price execution
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cheat-On-Open orders execute at wrong price when broker.coo is not set, causing discrepancy between expected
      and actual fill prices
  - id: finance-C-144
    when: When implementing indicator computation to strategy logic with multiple data feeds
    action: Use the minimum length among each data feeds to determine _minperiod for multi-data indicators
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategy operates on incomplete or misaligned multi-data indicators when minperiod calculation ignores shorter
      data feed
  - id: finance-C-146
    when: When implementing resampling with bar2edge=True
    action: Align resampled bars to time boundaries (day/week/month edges) before passing to indicator computation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Resampled indicators produce misaligned values when bar edges do not align with expected timeframe boundaries
  - id: finance-C-147
    when: When implementing strategy to broker order submission
    action: Submit orders only during next() or next_open() method execution, not during __init__
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Orders execute with stale broker state when submitted during strategy initialization before data feed is
      ready
  - id: finance-C-148
    when: When passing broker cash and value to analyzers
    action: Forward broker notifications through _notify_cashvalue before strategy next() is called each bar
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Analyzers receive stale portfolio values causing incorrect performance calculations for subsequent bars
  - id: finance-C-149
    when: When implementing data ingestion with exactbars=True
    action: Set qbuffer memory saving mode when exactbars > 0 to prevent buffer overflow
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Backtest consumes excessive memory when exactbars is enabled without corresponding qbuffer memory management
  - id: finance-C-154
    when: When submitting buy/sell orders from strategies
    action: Pass absolute value of order size to broker (strategy sends signed size, broker uses abs())
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Negative size values passed to broker cause incorrect position sizing or rejected orders, leading to unexpected
      trading behavior and potential financial losses
  - id: finance-C-156
    when: When implementing TradingCalendarBase subclasses
    action: Implement _nextday() and schedule() abstract methods to define trading session times
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing calendar implementation causes undefined trading session boundaries, potentially allowing orders
      outside market hours or missing trading days
  - id: finance-C-157
    when: When accessing data within strategies without explicit data parameter
    action: Default to self.datas[0] (first data feed) when no data is specified
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect default data selection causes orders to be placed on wrong instruments, leading to unintended positions
      and potential financial losses
  - id: finance-C-158
    when: When running backtests and presenting results to users or making trading decisions
    action: Claim that backtested returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      when actual live trading begins due to slippage, fees, execution delays, and market impact not fully modeled in backtesting
  - id: finance-C-159
    when: When presenting or reporting simulated trading results from cerebro.run() dry-run or paper trading mode
    action: Present simulated wallet/cash results as proof of live execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users invest real capital based on simulated performance claims that don't reflect actual market conditions,
      order execution quality, or broker-specific behaviors in live trading
  - id: finance-C-160
    when: When using backtrader for trading strategies or presenting system capabilities
    action: Claim suitability for high-frequency trading, production deployment without proper risk management, or non-financial
      time-series analysis
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy the system beyond its designed scope (event-based backtesting framework) leading to missed orders,
      latency issues, or inappropriate use in non-financial applications
  - id: finance-C-161
    when: When modeling transaction costs and execution quality in backtests
    action: Assume slippage and commission models are equivalent to real execution costs
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Backtest profitability estimates are significantly overstated when actual trading incurs market impact, wider
      spreads during volatility, and broker-specific fees not captured in simplified backtest models
  - id: finance-C-162
    when: When using Yahoo Finance data feeds or any web API data source
    action: Account for data delivery delays — Yahoo API has known latency and historical data may have gaps
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Backtest results are corrupted by missing or delayed data, causing incorrect signal timing and unreliable
      performance metrics
  - id: finance-C-163
    when: When configuring cerebro with runonce=True (default)
    action: Understand that vectorized indicator calculation assumes continuous time series without look-ahead bias in the
      vector
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Indicators with look-ahead bias produce incorrect values when runonce=True, causing strategies to make decisions
      based on future information not available in live trading
    stage_ids:
    - indicator_computation
  - id: finance-C-164
    when: When implementing indicators that require non-vectorized execution
    action: Set _nextforce = True to disable runonce mode and force step-by-step execution
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Indicators requiring sequential state (e.g., Heikin-Ashi) produce incorrect values when vectorized, causing
      invalid signals and trading losses
  - id: finance-C-165
    when: When creating custom broker implementations
    action: Simulate realistic order execution by checking margin/cash before accepting orders
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Strategies can issue orders exceeding available capital, leading to margin calls, forced liquidations, or
      broker rejection of orders in live trading
  - id: finance-C-166
    when: When handling timezone-aware datetime in strategies
    action: Explicitly set timezone via cerebro.tz or data feed tz parameter — default is UTC
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Unspecified timezone causes datetime misinterpretation across different system locales, leading to incorrect
      session boundaries and timing-based signal errors
  - id: finance-C-167
    when: When configuring cerebro exactbars parameter
    action: Understand that exactbars=True or -1 disables preload and runonce, and exactbars=True also disables plotting
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Misconfigured exactbars causes unexpected memory usage patterns, disabled features (plotting), or performance
      degradation if misunderstood
  - id: finance-C-168
    when: When implementing strategies that require open price access before broker evaluation
    action: Enable cheat_on_open=True and broker.set_coo(True) for orders based on previous day indicators using current open
      price
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies expecting Cheat-On-Close/Open execution without proper configuration execute orders at incorrect
      prices, causing slippage and position sizing errors
  - id: finance-C-169
    when: When extracting or displaying datetime from lines in strategies or analyzers
    action: Use datetime.datetime(ago=0) or datetime.date(ago=0) with explicit timezone handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ambiguous datetime conversion causes session boundary errors when trading across timezones, leading to orders
      placed outside market hours or missed trading opportunities
  - id: finance-C-170
    when: When configuring resampling parameters in data filtering
    action: Use bar2edge=True (boundary-aligned) alignment mode for resampling — ensures bars align to time boundaries (0,
      5, 10...) rather than rolling windows, maintaining reproducibility across different data start dates
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Changing bar2edge to False causes rolling window alignment which introduces off-by-one ambiguity in historical
      analysis; the same data starting from different dates produces different bar boundaries, breaking reproducibility requirements
    derived_from_bd_id: BD-005
  - id: finance-C-172
    when: When setting up commission, slippage, and stake parameters for backtesting
    action: 'Avoid running with each three conservative defaults enabled: commission=0.0, slippage disabled (0), and FixedSize
      stake=1 simultaneously — verify at least commission or slippage reflects realistic execution costs before evaluating
      strategy profitability'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Zero commission plus zero slippage plus unit stake creates systematically optimistic backtests that appear
      2-5% more profitable than realistic execution; the amplification effect is worst for high-frequency strategies where
      per-trade costs compound, causing strategies to look profitable in backtest but lose money live
    derived_from_bd_id: BD-138
  - id: finance-C-174
    when: When implementing or refactoring data feed classes
    action: Implement data feeds as LineIterator to enable consistent next/once execution model with indicators; data feeds
      must participate in both bar-by-bar (_runnext) and vectorized (_runonce) execution paths without special handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without LineIterator implementation, data feeds cannot participate in both execution paths, breaking compatibility
      with the framework's indicator system and vectorized batching capabilities
    derived_from_bd_id: BD-003
  - id: finance-C-175
    when: When implementing close() or position closing logic in strategies
    action: Use close(position) with automatic opposite-direction inference based on position sign; do NOT manually calculate
      opposing order sizes with explicit buy/sell direction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Manual direction calculation with explicit buy/sell is error-prone due to sign mistakes; wrong direction
      orders can flip positions or cause unintended leverage, leading to significant trading losses
    derived_from_bd_id: BD-012
  - id: finance-C-177
    when: When using auto-conversion from next() to once() for vector mode execution
    action: Verify that vectorized execution (runonce with once_via_next) produces equivalent results to bar-by-bar execution;
      test strategy behavior with preload=True and runonce=True to confirm auto-conversion does not introduce subtle differences
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Auto-conversion from next() to once() may produce different results due to state management differences between
      bar-by-bar and vectorized execution, causing backtest-live inconsistency that is difficult to detect without explicit
      testing
    derived_from_bd_id: BD-008
  - id: finance-C-178
    when: When modeling order execution scenarios, particularly for illiquid markets
    action: Assume partial fills are supported by default; order.executed.remscale=0 indicates fully filled or rejected orders
      with no partial fills possible unless explicitly modified
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Assuming partial fill capability leads to overstating execution certainty in illiquid markets; backtests
      may assume full position changes that cannot be achieved when orders are only partially filled
    derived_from_bd_id: BD-114
  - id: finance-C-179
    when: When implementing data filtering using resampler or replayer
    action: Use filters to wrap feeds, returning False to pass bars through unchanged. This composition pattern preserves
      separation of concerns and allows chaining multiple transformations (resampling, session filling, data cleaning) without
      modifying the underlying feed.
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying resampler or replayer to behave as feeds breaks the filter composition pattern, causing data to
      be transformed incorrectly or skipped entirely during backtesting runs
    derived_from_bd_id: BD-004
  - id: finance-C-181
    when: When using framework MA types via MovAv.SMA factory or auto-composed indicators like BollingerBands
    action: Understand that MetaMovAvBase auto-registers MA types at class definition time. Verify required MA types (SMA,
      EMA, etc.) are properly registered before use. Check _ma_registry or similar internal state if auto-creation fails.
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Missing auto-registration causes runtime AttributeError when calling MovAv.SMA or breaks BollingerBands auto-creation,
      requiring manual MA instantiation instead of factory pattern
    derived_from_bd_id: BD-009
  - id: finance-C-182
    when: When configuring session times and resampling for non-US markets
    action: Explicitly reset session times when loading non-US data (forex, Asian equities) - session times default to 9:31-16:00
      US Eastern and will create artificial gaps if not overridden; also specify timezone parameter for session boundaries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Session defaults of 9:31-16:00 US Eastern combined with bar2edge resampling creates incorrect boundaries
      when processing non-US data, resulting in artificial trading gaps and corrupted bar alignment that distorts strategy
      performance metrics
    derived_from_bd_id: BD-144
  - id: finance-C-183
    when: When implementing or modifying position management logic in backtesting
    action: Recalculate average entry price only when position size increases (adding to position); reducing or closing positions
      must leave average price unchanged
    severity: high
    kind: domain_rule
    modality: must
    consequence: Recalculating average price on every trade including reductions would incorrectly blend exit prices into
      the cost basis, systematically distorting P&L calculations and making backtest results unrepresentative of actual trading
    derived_from_bd_id: BD-050
  - id: finance-C-184
    when: When configuring or modifying commission/sizing settings for backtesting
    action: Verify that leverage=1.0 matches the intended trading mode; explicitly set leverage >1.0 only when margin-based
      position sizing is required, as leverage of 1.0 provides conservative 1:1 exposure without margin amplification
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using default leverage=1.0 in strategies designed for margin trading would create positions that don't reflect
      intended risk exposure, causing backtest results to show returns that cannot be achieved in actual leveraged trading
    derived_from_bd_id: BD-032
  - id: finance-C-185
    when: When configuring commission parameters for short selling strategies
    action: Verify that interest_long=False aligns with broker fee structure; for strategies where long holdings should earn
      interest (forex-style carry), explicitly set interest_long=True, as default charges interest only on short positions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Default interest_long=False ignores interest income from idle cash or long positions, overstating financing
      costs by up to the risk-free rate per annum and making backtest returns optimistic for strategies relying on carry
    derived_from_bd_id: BD-034
  - id: finance-C-186
    when: When using the FixedSize sizer default for live-equivalent backtesting
    action: Verify that stake=1 produces position sizes proportional to account capital; adjust stake to match actual account
      size and risk tolerance, as single-share trading may have rounding issues and doesn't reflect real position sizing requirements
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Default stake=1 creates unrealistically small positions for high-priced instruments and doesn't scale with
      account size, producing backtest results that cannot be replicated with realistic capital management
    derived_from_bd_id: BD-035
  - id: finance-C-187
    when: When configuring PercentSizer for position sizing in backtesting
    action: Verify that percents=20 (20% allocation per trade, max 5 concurrent positions) matches strategy risk profile;
      conservative strategies should use 5-10% allocation, as default 20% is aggressive and can produce large drawdowns
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Default 20% allocation per trade allows only 5 concurrent positions, which is aggressive for many strategies
      and can lead to concentrated risk and significant drawdowns that wouldn't occur with more conservative sizing
    derived_from_bd_id: BD-036
  - id: finance-C-188
    when: When implementing Bollinger Bands %B indicator calculation
    action: Calculate %B as (price - lower_band) / (upper_band - lower_band) — this normalized price position formula transforms
      price into a bounded oscillator where values >1.0 indicate overbought and <0.0 indicate oversold conditions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using any other %B formula (e.g., simple price deviation from SMA) produces fundamentally different indicator
      values that break strategy signal logic expecting normalized 0-1 range
    derived_from_bd_id: BD-080
  - id: finance-C-189
    when: When implementing MACD Histogram calculation
    action: Calculate MACD Histogram as MACD_line minus Signal_line — this measures convergence/divergence where zero-line
      crossovers indicate momentum shifts and histogram crossovers provide early warning of trend changes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calculating histogram as signal minus MACD or using absolute values reverses signal interpretation, causing
      buy/sell signals to fire at incorrect market turning points
    derived_from_bd_id: BD-082
  - id: finance-C-190
    when: When implementing EMA (Exponential Moving Average) calculation
    action: Use alpha = 2 / (period + 1) for exponential smoothing — this standard formula gives the most recent data point
      twice the weight of the equivalent-period SMA, providing faster response while maintaining continuity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative alpha formulations changes indicator responsiveness characteristics, causing strategies
      tuned for standard EMA behavior to generate signals at incorrect timing
    derived_from_bd_id: BD-084
  - id: finance-C-191
    when: When implementing ADXR (Average Directional Movement Index Rating) calculation
    action: Calculate ADXR as (ADX_current + ADX_period_bars_ago) / 2 — this averaging of current and lagged ADX reduces volatility
      and provides more stable trend strength readings with fewer false signals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-averaged ADX or different lag periods changes trend strength quantification, causing strategies
      expecting ADXR > 25 threshold for trending conditions to fire incorrect signals
    derived_from_bd_id: BD-090
  - id: finance-C-192
    when: When implementing AC (Acceleration/Deceleration) Oscillator calculation
    action: Calculate AC as AO minus SMA(AO, period) — this compares current Awesome Oscillator to its smoothed average to
      measure the force driving price changes, where color changes before zero-line crossover indicate weakening momentum
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting the SMA smoothing step loses the early warning capability of AC, causing strategies to miss momentum
      weakening signals that precede zero-line crossovers
    derived_from_bd_id: BD-093
  - id: finance-C-193
    when: When configuring MACD indicator with default parameters
    action: Verify that MACD parameters (fast=12, slow=26, signal=9) match the data timeframe being analyzed — these standard
      periods are optimized for daily data; intraday strategies typically require shorter periods (e.g., 5/35/5)
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using standard 12/26/9 periods on intraday data produces sluggish MACD with delayed crossover signals, causing
      entries and exits at suboptimal price levels that significantly erode strategy profitability
    derived_from_bd_id: BD-038
  - id: finance-C-194
    when: When configuring ATR (Average True Range) with default parameters
    action: Verify that ATR period=14 matches the volatility measurement requirements — shorter periods increase sensitivity
      to volatility spikes while longer periods smooth but delay反映 (delay response)
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using default 14-period ATR on high-volatility assets underestimates true range during spike events, causing
      position sizing algorithms to allocate insufficient capital and increase liquidation risk
    derived_from_bd_id: BD-039
  - id: finance-C-195
    when: When calculating Sharpe Ratio for strategy evaluation
    action: Verify that risk_free_rate=0.01 (1% annual) matches the current interest rate environment — during near-zero rate
      periods this overstates opportunity cost; during high-rate periods it understates
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using fixed 1% risk-free rate during low-rate environments (e.g., 2020-2023) overstates opportunity cost,
      causing Sharpe Ratio calculations to undervalue risk-adjusted performance and potentially reject profitable strategies
    derived_from_bd_id: BD-041
  - id: finance-C-196
    when: When annualizing returns for Sharpe Ratio calculation
    action: Use 252 trading days for annualization when working with daily-return strategies — this matches the NYSE trading
      calendar; different data frequencies require different annualization factors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying 252-day annualization to intraday or lower-timeframe return data produces incorrectly inflated Sharpe
      Ratios, leading to false confidence in strategy performance and poor capital allocation decisions
    derived_from_bd_id: BD-042
  - id: finance-C-197
    when: When implementing order execution and margin validation logic in backtesting broker
    action: Execute margin validation BEFORE any trade execution occurs — the execution order must be _processbars → _execute
      → check_order_margin → submit_trade
    severity: high
    kind: domain_rule
    modality: must
    consequence: If margin checks run after execution, the system could create positions exceeding risk limits requiring complex
      rollback logic, leading to overdraft positions that cannot be properly managed in live trading
    derived_from_bd_id: BD-104
  - id: finance-C-198
    when: When implementing data filter processing logic in backtesting
    action: 'Maintain the two-stage filter chain order: _stage1_process → user_filter.__call__ → _stage2_process → backwards;
      do not reorder or collapse stages'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reordering filter stages breaks resampling filters that must see each data point first and smoothing filters
      that process incrementally, causing incorrect data transformation and signal timing errors
    derived_from_bd_id: BD-109
  - id: finance-C-199
    when: When configuring or refactoring CSV feed base class inheritance structure
    action: 'Preserve dual base class separation: CSVFeedBase for standalone data export/transformation and CSVDataBase for
      cerebro-integrated backtesting; do not merge into single base with conditional flags'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Merging base classes with conditional flags breaks flexible deployment modes, preventing CSV feeds from running
      independently while also integrating into backtesting pipelines
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-200
    when: When using TradeAnalyzer to access trade statistics with zero trades
    action: Verify that downstream code handles zero-trade initialization gracefully — division by zero will occur in win
      rate and ratio calculations; add explicit zero-count checks before accessing ratio fields
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Zero initialization ensures consistent dictionary structure but downstream ratio calculations like win rate
      will throw division by zero errors when total trades equals zero
    derived_from_bd_id: BD-045
  - id: finance-C-201
    when: When tracking or referencing orders by their reference number
    action: Expect order references to start at 1 and increment sequentially — external order modifications that bypass sequential
      numbering will break order reference tracking
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Order reference tracking assumes sequential 1-based numbering; external modifications breaking this assumption
      cause mismatched order tracking and potential execution errors
    derived_from_bd_id: BD-046
  - id: finance-C-202
    when: When setting order validity for end-of-day or intraday trading strategies
    action: Verify order validity settings match strategy requirements — default DAY validity expires orders at session end;
      intraday strategies requiring immediate execution and multi-day GTC orders must explicitly override the default
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Orders defaulting to DAY validity may expire prematurely for strategies requiring multi-day holds, or fail
      to execute immediately for intraday strategies expecting instant order processing
    derived_from_bd_id: BD-047
  - id: finance-C-203
    when: When placing limit or stop orders without explicit price specification
    action: Explicitly specify order price rather than relying on close price default — verify the close price reference matches
      the intended entry point for precise control
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using close price as default limit/stop reference may differ from intended entry point, causing orders to
      execute at unexpected prices and breaking strategy entry timing assumptions
    derived_from_bd_id: BD-048
  - id: finance-C-204
    when: When configuring missing bar handling in data feed processing
    action: Verify fill_price parameter setting matches strategy requirements — fill_price=True maintains continuous series
      for indicators requiring uninterrupted data, fill_price=False preserves original bars for exact data analysis
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Incorrect fill_price setting causes indicator discontinuity for strategies requiring continuous data, or
      loses exact bar information for strategies needing precise data analysis
    derived_from_bd_id: BD-100
  - id: finance-C-205
    when: When implementing or modifying Dickson Moving Average calculation
    action: 'Preserve the dual lag-reduction approach: Dickson MA must remain the average of ZeroLagIndicator and Hull Moving
      Average to achieve ultra-smooth output with reduced overshoot'
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Simplifying DMA to use ZLI or Hull alone changes indicator smoothness and lag characteristics, affecting
      signal generation timing and swing trading entry/exit points
    derived_from_bd_id: BD-102
  - id: finance-C-206
    when: When implementing or refactoring live data feed handling code
    action: Call islive() method to determine data feed mode; when islive() returns True, disable preloading and runonce optimization
      in Cerebro to enable real-time bar delivery
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without calling islive(), preloading remains enabled in live trading mode causing artificial latency in bar
      delivery; orders may reference stale data or miss real-time execution opportunities
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-207
    when: When processing data from Blaze feeds in backtesting
    action: Interpret negative values as end-of-data sentinel; do not treat negative values as legitimate data values for
      any trading or calculation purpose
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: If negative values are processed as actual data, indicators and signals will incorporate invalid values leading
      to incorrect trading decisions; strategy equity curve will be corrupted
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-208
    when: When backtesting strategies with default slippage parameters
    action: Verify that slip_perc=0.0 and slip_fixed=0.0 (default slippage disabled) matches the actual market conditions;
      add realistic slippage values for the target asset class before comparing backtest results to live trading
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Backtests with zero slippage show idealized execution prices that are not achievable in live trading; systematic
      strategies systematically overestimate returns by 1-5% or more depending on asset volatility
    derived_from_bd_id: BD-051
  - id: finance-C-209
    when: When implementing market order execution logic or analyzing order fill prices
    action: Understand that market orders execute at the NEXT bar's open price (not current bar close); verify that this execution
      model aligns with the target strategy's requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Assuming market orders fill at current bar close introduces look-ahead bias in backtests; strategies designed
      under this assumption will fail to replicate live trading behavior where fills occur at next bar open
    derived_from_bd_id: BD-052
  - id: finance-C-210
    when: When implementing short selling logic or calculating buying power in margin accounts
    action: Account for shortcash=True behavior where short sale proceeds are immediately added to available cash; recognize
      that buying power increases but net exposure also increases when proceeds fund long positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: With shortcash=True, using short proceeds to buy long positions doubles effective exposure; margin calls
      may occur if positions move adversely while net exposure exceeds initial capital calculation
    derived_from_bd_id: BD-054
  - id: finance-C-211
    when: When developing intraday strategies that require end-of-bar price knowledge
    action: Enable cheat-on-close (coc=True) when strategy logic requires accessing the current bar's close price for decisions
      within the same bar; otherwise coc=False prevents look-ahead bias
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: With coc=False (default), strategies cannot access current bar close price within the same bar; intraday
      strategies requiring Close8592Open gap trading must explicitly enable coc=True or they will exhibit delayed signal execution
    derived_from_bd_id: BD-055
  - id: finance-C-212
    when: When implementing data ingestion layer that switches between data sources
    action: Assume the framework handles provider failover with semantic consistency validation — the framework does not implement
      failover mechanisms; data source switches occur silently without behavioral validation
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Silent data source switches can introduce subtle behavioral changes in backtest results, such as different
      timestamp conventions, adjusted vs unadjusted prices, or data provider-specific missing value handling, making results
      non-reproducible across providers
    derived_from_bd_id: BD-GAP-033
  - id: finance-C-213
    when: When implementing data ingestion layer with multiple data sources
    action: 'Implement provider failover by validating data semantic consistency after each source switch: check timestamp
      alignment, verify OHLC relationship (High >= Low, Close within [Low, High]), and compare overlapping data points for
      significant deviations'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without semantic consistency validation, provider switches can silently introduce data quality issues that
      distort strategy performance metrics, leading to strategies that look profitable in backtest but fail in live trading
    derived_from_bd_id: BD-GAP-033
  - id: finance-C-214
    when: When configuring data feed CSV format for backtesting
    action: Verify that the CSV format parameter matches the actual data file structure — btcsv format requires Backtrader-specific
      columns; if using Yahoo Finance or other sources, explicitly set format parameter to match their column layout (e.g.,
      Datetime, Open, High, Low, Close, Volume)
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using btcsv format with non-Backtrader CSV files produces empty or zero data feeds without explicit errors,
      causing strategies to run with no positions and misleadingly profitable equity curves
    derived_from_bd_id: BD-067
  - id: finance-C-215
    when: When configuring data feed timeframe for intraday or tick-based backtesting
    action: Explicitly specify timeframe parameter when using intraday data (minutes, seconds, ticks) — the framework defaults
      to daily timeframe, which causes intraday data to be misinterpreted as daily bars, producing incorrect signals and distorted
      performance metrics
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Intraday data with default daily timeframe interpretation collapses multiple intraday bars into single daily
      bars, causing strategies to trade on wrong time boundaries and generating backtest results that cannot be replicated
      in live trading
    derived_from_bd_id: BD-068
  - id: finance-C-216
    when: When configuring commission scheme for production backtesting
    action: Replace default flat-fee commission values with actual broker-specific rates — flat fees like $2.0 per trade systematically
      overstate costs for high-frequency strategies and understate costs for large-position strategies; use percentage-based
      commissions (e.g., 0.1% of trade value) for realistic cost modeling
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Default flat-fee commissions distort strategy profitability evaluation; a strategy with 100 daily trades
      loses $200/day to commissions, which may be acceptable, but a high-frequency strategy with 1000 trades loses $2000/day,
      making profitable strategies appear unprofitable
    derived_from_bd_id: BD-069
  - id: finance-C-217
    when: When configuring cheat-on-open execution in backtesting
    action: Set both cerebro.p.cheat_on_open=True AND broker.p.coo=True explicitly; do not rely on cerebro default alone as
      the broker ignores cerebro's setting unless broker.coo is explicitly set
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Relying only on cerebro.p.cheat_on_open=True without setting broker.p.coo=True causes next-bar execution
      instead of open-bar execution, making backtest results inconsistent with expected cheat-on-open behavior
    derived_from_bd_id: BD-112
  - id: finance-C-218
    when: When implementing position tracking in strategy code
    action: Check the sign of getposition() return value to determine direction (positive = long, negative = short); do not
      assume getposition returns separate quantity and direction fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: Treating getposition() as directional-aware when it returns absolute size causes sign errors in position
      calculations, leading to incorrect P&L attribution and wrong position sizing in bidirectional strategies
    derived_from_bd_id: BD-126
  - id: finance-C-219
    when: When enabling margin-based leverage trading in backtesting
    action: Explicitly set either margin_perc (percentage of position value, e.g., 0.5 for 2x leverage) OR margin (absolute
      per-unit cost) on the broker; if neither is set, leveraged positions cannot be calculated and are effectively disabled
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without margin_perc or margin configured, the broker cannot calculate position limits for leveraged trades,
      causing the backtest to miss margin requirements and produce results incompatible with live margin trading
    derived_from_bd_id: BD-127
  - id: finance-C-221
    when: When using preload=True with complex multi-timeframe strategies
    action: Verify vectorization is active by checking that exactbars=False and replay mode is disabled; expect slower bar-by-bar
      execution if either is true
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: When exactbars mode or replay is enabled, vectorization is silently disabled causing 10-100x performance
      degradation without warning, making complex multi-timeframe backtests take unexpectedly long
    derived_from_bd_id: BD-137
  - id: finance-C-222
    when: When calculating Sharpe ratio alongside interest costs for short positions
    action: Use consistent day-count conventions across each calculations; prefer 252 trading days for both Sharpe annualization
      and interest accrual to avoid systematic misalignment in carry cost vs risk-adjusted return calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 365-day interest accrual with 252-day Sharpe annualization artificially improves risk-adjusted returns
      for short-duration strategies, creating backtest results that do not reflect actual carry costs
    derived_from_bd_id: BD-139
  - id: finance-C-223
    when: When enabling cheat-on-open functionality in backtesting
    action: Set broker.p.coo=True in addition to cerebro.p.cheat_on_open=True; cerebro's cheat_on_open setting is ignored
      by the broker unless broker.coo is explicitly enabled
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Setting only cerebro.p.cheat_on_open=True without broker.p.coo=True causes open-bar orders to execute at
      next-bar prices, making backtest results inconsistent with expected cheat-on-open execution timing
    derived_from_bd_id: BD-140
  - id: finance-C-224
    when: When optimizing backtest execution speed with runonce=True
    action: 'Verify each three vectorization dependencies are active: runonce=True, preload=True, and no indicators with only
      once() implementations; any break in the chain causes silent fallback to bar-by-bar execution'
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Breaking any link in the runonce-preload-once chain silently disables vectorization, causing 10-100x slower
      backtests without any warning or user notification, making performance optimization difficult to diagnose
    derived_from_bd_id: BD-141
  - id: finance-C-225
    when: When running strategies with indicators on limited historical data
    action: Calculate maximum indicator lookback requirements and verify sufficient warmup bars are available; with ExactBars=False,
      the framework does not calculate or communicate minimum warmup needs
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Insufficient data relative to indicator lookback requirements causes NaN values in early bars, leading to
      incomplete indicator calculations and potentially wrong trading signals during the warmup period
    derived_from_bd_id: BD-142
  - id: finance-C-226
    when: When switching between PandasDirectData and PandasData feeds
    action: Rename columns or change DataFrame column order when using PandasDirectData; itertuples() relies on positional
      access and breaks if columns are reordered or renamed
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Using PandasDirectData with renamed or reordered columns causes itertuples() positional access to read wrong
      data fields, corrupting price data fed to the strategy and producing incorrect backtest results
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-227
    when: When implementing calendar day bar filling logic for intraday strategies
    action: Use midpoint of previous bar's high/low ((high[-1] + low[-1]) / 2) as price estimate for missing calendar day
      bars — do not use last close or NaN fill
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using last close price fill loses high/low information needed for indicator calculations; using NaN fill
      breaks indicator continuity causing incorrect signal generation
    derived_from_bd_id: BD-101
  - id: finance-C-229
    when: When implementing data feed synchronization for non-master datas
    action: 'Implement the peek-advance-check cycle: peek checks if next bar timestamp exceeds master timeline, advance adds
      current bar, check validates alignment — repeat until synchronized'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping the synchronization cycle causes timestamp gaps between master and non-master datas, corrupting
      backtesting accuracy and producing non-reproducible strategy results
    derived_from_bd_id: BD-108
  - id: finance-C-231
    when: When implementing or modifying multiprocessing pool usage for parameter optimization
    action: Verify pool processes are properly terminated after optimization completes and verify process-based isolation
      prevents state leakage between parameter combinations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Improper pool cleanup leaves zombie processes consuming system resources; state leakage between parameter
      combinations produces incorrect optimization results that appear valid
    derived_from_bd_id: BD-023
  - id: finance-C-232
    when: When configuring commission info for equity or futures instruments in backtesting
    action: Set stocklike=True for equity-style instruments (margin = price × size) and stocklike=False for futures contracts
      (margin = price × size × mult) — do not apply a single formula across each asset classes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using stocklike=False for equities underestimates required margin by ignoring the full value collateral requirement;
      using stocklike=True for futures overestimates margin, causing strategies to hold fewer contracts than actually possible
      and reducing capital efficiency
    derived_from_bd_id: BD-015
  - id: finance-C-233
    when: When running backtests with default starting cash of 10000.0 in BackBroker
    action: Verify that cash=10000.0 matches actual capital requirements and adjust explicitly for higher-priced securities
      or specific portfolio sizing needs — amounts below 1000 may cause position sizing issues
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Default starting cash of 10000.0 is inherited silently by position sizing algorithms; for higher-priced securities
      or strategies requiring larger positions, this default causes undersized positions or zero allocations, leading to returns
      that do not reflect actual trading conditions
    derived_from_bd_id: BD-025
  - id: finance-C-234
    when: When running backtests with large datasets or in memory-constrained environments
    action: Set preload=False to enable streaming mode instead of preloading each data into memory — default preload=True
      may cause out-of-memory errors on large datasets
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Default preload=True loads all historical data into memory before backtesting begins; for datasets spanning
      many years or many symbols, this causes out-of-memory errors that halt backtesting entirely, especially on systems with
      limited RAM
    derived_from_bd_id: BD-026
  - id: finance-C-235
    when: When implementing or modifying benchmark observer logic in backtesting
    action: Pass the reference asset via datas passed to the system — do not hardcode a fixed benchmark ticker parameter
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a fixed benchmark ticker parameter prevents relative performance measurement against market indices,
      making strategy evaluation incomplete and potentially misleading investors about actual performance
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-236
    when: When configuring broker parameters for backtesting with cheat_on_open enabled
    action: Verify that cheat_on_open=True does not introduce look-ahead bias in the strategy — check that open-price orders
      do not see the open price before it is confirmed, or document the intentional look-ahead boundary
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: With cheat_on_open=True, order timers fire with the cheat flag before the broker receives open notification,
      allowing open-price execution that may include look-ahead bias; strategies may show unrealistic fills not reproducible
      in live trading
    derived_from_bd_id: BD-111
  - id: finance-C-237
    when: When configuring the broker commission scheme for backtesting
    action: Explicitly configure a CommissionInfo subclass (e.g., PerCoin, Fixed_commission) — do not rely on the default
      None which applies zero commission
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The default commission is None (zero commission), causing backtests to omit trading costs; in live trading,
      real brokers charge commissions, making backtest returns systematically overstated by the commission amount per trade
    derived_from_bd_id: BD-113
  - id: finance-C-238
    when: When implementing interest calculation logic for short cash positions
    action: Use 365-day calendar year divisor for interest accrual calculation to match precise daily interest matching calendar
      days
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching from 365-day to 250/252 trading-day basis would systematically overstate or understate daily interest
      charges, causing discrepancies between backtest equity and broker statements that accumulate over time
    derived_from_bd_id: BD-033
  - id: finance-C-239
    when: When implementing or refactoring position existence checks
    action: Use size-based boolean evaluation (if position:) to determine position existence — zero size means no position
      regardless of stored price value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing size-based boolean checks with None checks or separate existence flags breaks existing position
      evaluation patterns throughout the codebase, potentially causing positions to be incorrectly treated as open or closed
    derived_from_bd_id: BD-049
  - id: finance-C-240
    when: When configuring indicators in backtesting strategies
    action: Verify that each indicators used in the strategy are compatible with runonce=True (vectorized execution) before
      running backtests; stateful indicators like AnySterling, LeastSquares, etc. MUST explicitly set runonce=False in cerebro
      setup
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Running stateful indicators with runonce=True (the default) causes incorrect calculation results because
      vectorized execution ignores execution order dependencies, leading to silently wrong backtest results that appear valid
    derived_from_bd_id: BD-027
  - id: finance-C-242
    when: When backtesting with futures, forex, or other derivatives instruments
    action: Explicitly specify margin parameter for each derivative instrument; do not rely on default margin=1.0 which assumes
      100% contract value requirement
    severity: high
    kind: domain_rule
    modality: must
    consequence: Default margin=1.0 works for conservative equity positions but is incorrect for most futures contracts; relying
      on default causes position sizes to be calculated based on wrong capital requirements, leading to under-sized or over-sized
      positions in live trading
    derived_from_bd_id: BD-030
  - id: finance-C-243
    when: When using position.close(size) method for position management
    action: Treat size parameter as absolute trigger value, not net target; close(10) on a 10-share long position fully exits
      the position, close(10) on a -10 short position also fully exits; to reduce position to specific size, use reduce_by_value
      or explicit size adjustment
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Users expecting close(5) on a 10-share position to reduce to 5 shares will instead trigger full exit, causing
      unintended position liquidation and potential trading strategy disruption
    derived_from_bd_id: BD-115
  - id: finance-C-244
    when: When setting up broker commission configuration
    action: Validate that commission map contains matching entries for each tradable instruments; verify slippage is configured
      if intended; add warning/error logging when commission falls back to default due to missing mapping
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Silent commission fallback creates cumulative backtest-live divergence where all trading costs (commission,
      slippage) disappear from backtest results, making strategies appear more profitable than they would be in live trading
      by the sum of all omitted costs
    derived_from_bd_id: BD-143
  - id: finance-C-245
    when: When implementing or modifying backtesting strategies in the framework
    action: Assume the framework provides inherent backtest overfitting protection — the framework does not implement walk-forward
      analysis, out-of-sample testing, or Monte Carlo simulation for strategy validation
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Without overfitting protection, optimized strategy parameters appear profitable in backtests but fail in
      live trading, causing strategies to systematically lose money while appearing profitable during development
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-246
    when: When validating trading strategies in backtesting
    action: Implement walk-forward analysis using expanding window with minimum 3 out-of-sample periods, or use train/test
      split ratio of 70/30 with Monte Carlo simulation using at least 1000 iterations to assess strategy robustness
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategies without overfitting validation appear profitable in backtests but fail systematically in live
      trading, leading to capital losses from deploying overfitted strategies
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-247
    when: When processing credit risk calculations or credit-sensitive instruments
    action: Assume the framework implements IFRS 9 default definitions or staging criteria — the framework does not provide
      default probability thresholds, staging logic (Stage 1/2/3), or ECL calculation methodology
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Credit portfolios using the framework without IFRS 9 staging will misclassify instrument stages, causing
      ECL reserves to be understated by 30-60% for instruments showing significant credit risk deterioration
    derived_from_bd_id: BD-GAP-029
  - id: finance-C-248
    when: When calculating expected credit loss for financial instruments under IFRS 9 accounting
    action: 'Define default as 90+ days past due OR probability of default > 50% within 12 months, implement 3-stage classification:
      Stage 1 (12-month ECL, no significant increase), Stage 2 (lifetime ECL, significant increase), Stage 3 (lifetime ECL,
      credit-impaired), and calculate ECL using PD × LGD × EAD methodology'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Instruments without proper IFRS 9 staging will have incorrect ECL reserves, leading to regulatory non-compliance
      and potential restatement of financial statements
    derived_from_bd_id: BD-GAP-029
  - id: finance-C-249
    when: When calculating credit portfolio risk metrics or asset correlation for Basel compliance
    action: Assume the framework implements Vasicek single-factor model for asset correlation — the framework does not provide
      vasicek_model, asset_correlation, or rho parameters for credit portfolio modeling
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Credit portfolios using the framework without Vasicek correlation will underestimate portfolio VaR by 40-70%,
      leading to insufficient capital reserves under Basel IRB requirements
    derived_from_bd_id: BD-GAP-030
  - id: finance-C-250
    when: When calculating regulatory capital or portfolio credit risk under Basel II/III IRB approach
    action: 'Implement Vasicek single-factor correlation using Basel IRB formula: R = 0.12 × (1 - exp(-50×PD)) / (1 - exp(-50))
      + 0.24 × (1 - (1 - exp(-50×PD)) / (1 - exp(-50))) for wholesale exposures, or use formula R = 0.02 × (1 - exp(-35×PD))
      / (1 - exp(-35)) + 0.04 × (1 - (1 - exp(-35×PD)) / (1 - exp(-35))) for retail exposures'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper Vasicek asset correlation, credit portfolio models underestimate tail risk, causing regulatory
      capital to be insufficient during credit crises
    derived_from_bd_id: BD-GAP-030
  - id: finance-C-251
    when: When managing multi-position portfolios or aggregate risk across strategies
    action: Assume the framework provides portfolio-level risk controls — the framework does not implement VaR limits, maximum
      drawdown constraints, or sector concentration monitoring for portfolio-level risk management
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without portfolio-level risk limits, positions accumulate unchecked during black swan events, potentially
      causing portfolio losses exceeding 50% of capital when multiple correlated positions move adversely simultaneously
    derived_from_bd_id: BD-GAP-032
  - id: finance-C-252
    when: When monitoring aggregate portfolio risk across each positions and strategies
    action: 'Implement and monitor three portfolio-level risk limits: (1) VaR limit at 99% confidence with 1-day holding period
      not exceeding 2% of portfolio value, (2) maximum drawdown alert at 15% of peak equity triggering position reduction,
      (3) sector concentration limit of 30% maximum in any single sector and 10% maximum in any single name'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without portfolio-level risk controls, black swan events can cause catastrophic losses as all positions move
      adversely together, potentially losing more than 50% of portfolio value in days
    derived_from_bd_id: BD-GAP-032
  - id: finance-C-253
    when: When implementing or refactoring order execution logic in backtesting
    action: Enable cheat-on-open (coo=True) unless specifically required for an opening gap strategy with documented early
      signal processing needs
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Enabling cheat-on-open creates look-ahead bias by providing access to intrabar open/high/low/close prices
      before the bar completes, causing backtest results to be non-reproducible in live trading
    derived_from_bd_id: BD-056
  - id: finance-C-254
    when: When implementing Sharpe Ratio annualization logic
    action: Scale annualized Sharpe by sqrt(factor) where factor is periods per year (252 for daily, 52 for weekly, 12 for
      monthly); this assumes returns are independent and identically distributed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper sqrt(factor) annualization, Sharpe ratios across different timeframes become incomparable;
      strategy A with 0.5 weekly Sharpe cannot be fairly compared to strategy B with 2.0 daily Sharpe, leading to suboptimal
      capital allocation decisions
    derived_from_bd_id: BD-077
  - id: finance-C-255
    when: When calculating System Quality Number for strategy assessment
    action: Verify minimum 30 trades are executed before calculating SQN; below this threshold, mean(pnl) and stddev(pnl)
      estimates lack statistical reliability and SQN values become meaningless
    severity: high
    kind: domain_rule
    modality: must
    consequence: SQN requires statistically significant sample size; with fewer than 30 trades, the metric produces unreliable
      quality assessments that could misleadingly rank poor strategies as 'good' or dismiss profitable strategies as 'poor',
      causing flawed strategy selection
    derived_from_bd_id: BD-078
  - id: finance-C-256
    when: When implementing or refactoring Average True Range (ATR) calculation in backtesting
    action: 'Use Wilder''s Smoothed Moving Average (SMMA) formula: new_ATR = (old_ATR * (period - 1) + new_TR) / period. This
      is the industry-standard smoothing method for ATR used in trade management calculations. Do not substitute with standard
      EMA or SMA smoothing.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using EMA instead of SMMA for ATR produces different volatility readings that converge faster but are more
      volatile. This affects stop-loss and position sizing calculations, causing backtest results to differ from industry-standard
      trade management approaches by 5-15% in volatile markets.
    derived_from_bd_id: BD-083
  - id: finance-C-257
    when: When using ATR for strategy warmup or indicator convergence calculations
    action: Account for ATR convergence taking approximately period*2 bars to stabilize. Use ATR values only after this warmup
      period for trade management decisions.
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using ATR values before period*2 bars of warmup causes premature trade sizing and stop-loss placement based
      on artificially low volatility readings. Strategies enter positions with incorrect risk parameters, leading to overtrading
      or oversized positions in early stages.
    derived_from_bd_id: BD-083
  - id: finance-C-258
    when: When implementing Double Exponential Moving Average (DEMA) indicator
    action: 'Calculate DEMA using the formula: DEMA = 2*EMA(period) - EMA(EMA(period), period). This specific coefficient
      structure achieves approximately half the lag of standard EMA. Do not simplify or re-derive the formula.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect DEMA formula variations produce different lag characteristics that alter signal timing. Short-term
      strategies relying on DEMA crossovers will generate signals at different prices, causing backtest results to diverge
      from expected short-term trading behavior.
    derived_from_bd_id: BD-085
  - id: finance-C-259
    when: When initializing DEMA indicator with historical data
    action: Allow for a warmup period of at least 2*period bars before using DEMA values for trading signals. The double EMA
      calculation requires this extended initialization.
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using DEMA before 2*period bars of warmup generates unreliable values based on incomplete EMA nesting. Trading
      signals during warmup may be spurious, causing premature or delayed entries that significantly impact short-term strategy
      performance.
    derived_from_bd_id: BD-085
  - id: finance-C-260
    when: When implementing Triple Exponential Moving Average (TEMA) indicator
    action: 'Calculate TEMA using the formula: TEMA = 3*EMA1 - 3*EMA2 + EMA3. This triple exponential structure achieves approximately
      one-third the lag of standard EMA. Do not alter the coefficient structure 3, -3, 1.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying TEMA coefficients changes the lag reduction factor from one-third to a different value. Very short-term
      strategies requiring minimal lag will receive signals at different timing, causing measurable divergence from expected
      ultra-short-term trading behavior.
    derived_from_bd_id: BD-086
  - id: finance-C-261
    when: When initializing TEMA indicator with historical data
    action: Allow for a warmup period of at least 3*period bars before using TEMA values for trading signals. The triple EMA
      calculation requires this extended initialization.
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using TEMA before 3*period bars of warmup generates unreliable values with incomplete triple EMA nesting.
      Very short-term signals during warmup will be distorted, causing incorrect ultra-short-term trading decisions.
    derived_from_bd_id: BD-086
  - id: finance-C-262
    when: When implementing Kaufman's Adaptive Moving Average (KAMA)
    action: 'Calculate KAMA using the efficiency ratio (ER) formula: ER = direction / volatility, then smoothing constant
      = (ER * (fast - slow) + slow)^2. The ER must range from 0 (choppy markets) to 1 (trending markets) to enable adaptive
      smoothing.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fixed smoothing instead of ER-based adaptive smoothing causes KAMA to either lag in trends or whipsaw
      in ranging markets. Adaptive strategies relying on KAMA's market-adaptive behavior will lose their edge, producing worse
      results than either pure EMA or SMA approaches.
    derived_from_bd_id: BD-087
  - id: finance-C-263
    when: When calculating KAMA's efficiency ratio (ER)
    action: Use at least 10 periods of data to calculate ER reliably. The ER calculation requires sufficient history to distinguish
      true directional movement from noise.
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Calculating ER with fewer than 10 periods produces unreliable efficiency ratios that may falsely indicate
      trending or ranging conditions. This causes KAMA to incorrectly adapt its smoothing, leading to premature entries in
      noise or delayed responses in actual trends.
    derived_from_bd_id: BD-087
  - id: finance-C-264
    when: When implementing or refactoring Average Directional Index (ADX) calculation
    action: 'Calculate ADX using the formula: ADX = 100 * |+DI - -DI| / (+DI + -DI), then apply Wilder smoothing (typically
      14-period SMMA). ADX measures trend strength regardless of direction using directional indicators derived from True
      Range.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect ADX formula or smoothing method produces wrong trend strength readings that alter regime detection.
      Strategies using ADX for market state filtering will incorrectly enter or avoid trades based on faulty trend strength
      assessment.
    derived_from_bd_id: BD-089
  - id: finance-C-265
    when: When implementing PPO (Percentage Price Oscillator) calculation logic
    action: Use formula 100 * (EMA_short - EMA_long) / EMA_long with 12 and 26-period EMA defaults — do not simplify to absolute
      difference (MACD formula)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using absolute difference instead of percentage formula produces values that cannot be compared across assets
      with different price magnitudes, breaking cross-asset strategy analysis
    derived_from_bd_id: BD-091
  - id: finance-C-266
    when: When implementing AO (Awesome Oscillator) calculation logic
    action: Use fixed 5-period and 34-period SMAs on median_price = (high + low) / 2 — do not parameterize to variable periods
      based on volatility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using variable periods changes signal frequency and breaks standardization; saucer pattern detection assumes
      fixed 5/34 periods, causing inconsistent buy signals across runs
    derived_from_bd_id: BD-092
  - id: finance-C-267
    when: When implementing PGO (Pretty Good Oscillator) signal generation logic
    action: Use ±1.0 as momentum thresholds after ATR normalization — do not use raw deviation thresholds that vary across
      volatility regimes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without ATR normalization, PGO thresholds would be inconsistent across volatile and calm periods, causing
      either excessive or insufficient signals depending on market conditions
    derived_from_bd_id: BD-094
  - id: finance-C-268
    when: When configuring commission calculation for backtesting
    action: Verify that commission model matches actual broker fee structure — percentage model for percentage-based brokers,
      fixed per-unit model for per-share/contract brokers — and adjust accordingly
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using wrong commission model causes P&L miscalculation; percentage model underestimates costs for small trades
      and overestimates for large trades, while fixed model has opposite effect, making strategies appear more or less profitable
      than they actually are
    derived_from_bd_id: BD-095
  - id: finance-C-269
    when: When calculating net P&L for short positions held overnight
    action: 'Include credit interest calculation: days * price * abs(size) * (annual_rate / 365) — verify the annual_rate
      matches broker call money rate for the account type'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Omitting credit interest overstates short position costs and understates profitability, causing short strategies
      to appear less viable than they actually are in live trading where credit interest is credited
    derived_from_bd_id: BD-096
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
skill_crystallization:
  trigger: all_hard_gates_passed AND user_opt_out_skill_saving != true
  output_path_template: '{workspace}/../skills/{slug}.skill'
  slug_template: '{blueprint_id_short}-{uc_id_lower}'
  captured_fields:
  - name
  - intent_keywords
  - entry_point_script
  - validate_script
  - fatal_constraints
  - spec_locks
  - preconditions
  - install_recipes
  - human_summary_translated
  action: 'After all Hard Gates PASS, resolve slug via slug_template using the executed UC, then write the .skill YAML file
    at output_path_template. Notify user in their detected locale: ''Skill saved as {slug}.skill — next time say one of {sample_triggers}
    from the matched UC to invoke directly.'''
  violation_signal: All hard gates passed but no .skill file exists at expected path
  skill_file_schema:
    name: finance-bp-086 / SMA Crossover Backtester with PyFolio Analytics
    version: v5.3
    intent_keywords:
    - backtrader
    - SMA crossover
    - moving average
