    - id: BD-011
      type: B/BA
      summary: Benktander n_iters=1 for Bornhuetter-Ferguson, allowing iteration for Benktander method
    - id: BD-012
      type: B/BA
      summary: apriori=1.0 default multiplier for sample_weight in Bornhuetter-Ferguson/Benktander
    - id: BD-013
      type: B/BA
      summary: apriori_sigma=0.0 for deterministic mode; non-zero enables lognormal sampling in bootstrap
    - id: BD-015
      type: B/BA
      summary: CapeCod decay=1 means no decay weighting; decay<1 weights recent origins more heavily
    - id: BD-016
      type: B
      summary: Ultimate = latest_diagonal * CDF where CDF aligns to valuation_date using nan_triangle
    - id: BD-024
      type: B/BA
      summary: ExpectedLoss n_iters=0 bypasses CDF weighting - apriori alone determines ultimate
    - id: BD-026
      type: B/BA
      summary: Mack std err = sqrt(parameter_risk^2 + process_risk^2) in quadrature
    - id: BD-033
      type: B
      summary: CapeCod reported_exposure = sample_weight / CDF (exposure trended to ultimate basis)
    - id: BD-006
      type: B/BA
      summary: Default tail=1.0 (no tail factor) with decay=0.5 (50% decay per period) for TailConstant
    - id: BD-007
      type: B/BA
      summary: TailCurve default curve is 'exponential' with extrap_periods=100 and errors='ignore'
    - id: BD-008
      type: B/BA
      summary: TailBondy uses scipy least_squares optimization with initial b=0.5 for generalized Bondy tail
    - id: BD-010
      type: B/BA
      summary: projection_period=12 months default for extending LDFs beyond last development age
    - id: BD-025
      type: B/BA
      summary: 'TailBase decay formula: ldf = 1 + initial * (decay^period) where initial from quadratic expansion'
    - id: BD-028
      type: B/BA
      summary: reg_threshold=(1.00001, None) lower bound for tail curve fitting excludes LDFs near 1.0
    - id: BD-029
      type: B/BA
      summary: Tail stats extrapolation uses log-linear regression on sigma over time periods
    - id: BD-GAP-001
      type: DK
      summary: 'Missing: Stale data detection and expiry'
    - id: BD-GAP-002
      type: B
      summary: 'Missing: Train/test time split integrity'
    - id: BD-GAP-003
      type: B
      summary: 'Missing: Currency/unit explicit annotation'
    - id: BD-GAP-004
      type: RC
      summary: 'Missing: Settlement and delivery time'
    - id: BD-GAP-005
      type: RC
      summary: 'Missing: Price/quantity precision (tick/lot)'
    - id: BD-GAP-006
      type: B
      summary: 'Missing: Provider 优先级与凭证隔离'
    - id: BD-GAP-007
      type: B
      summary: 'Missing: 最优估计假设 (Best Estimate)'
    - id: BD-GAP-008
      type: B
      summary: 'Missing: Solvency II SCR/internal model'
    - id: BD-GAP-009
      type: B
      summary: 'Missing: ** "Add currency and unit explicit annotation: Allow users to specify currency codes and units for
        triangle values'
    - id: BD-GAP-010
      type: B
      summary: 'Missing: ** "Implement parameter version tracking: Add effective_date and valid_from fields to track when
        reserving assumptions were changed'
    - id: BD-GAP-011
      type: M
      summary: 'Missing: ** "Add matrix ill-conditioning checks: Implement condition number monitoring and regularization
        for inverse problems'
    - id: BD-GAP-012
      type: DK
      summary: 'Missing: ** "Add random seed documentation: Ensure each stochastic methods document reproducibility requirements
        and minimum seed coverage'
resources:
  packages:
  - name: pandas >=2.0, <3.0
    version_pin: latest
  - name: scikit-learn >1.4.2
    version_pin: latest
  - name: sparse >=0.9
    version_pin: latest
  - name: matplotlib
    version_pin: latest
  - name: dill
    version_pin: latest
  - name: patsy
    version_pin: latest
  - name: numba >0.54
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install pandas >=2.0, <3.0
    - python3 -m pip install scikit-learn >1.4.2
    - python3 -m pip install sparse >=0.9
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When specifying columns for Triangle construction
    action: Verify each column values are numeric type, as non-numeric columns raise TypeError during construction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-numeric column data causes TypeError with message 'column attribute must be numeric', preventing Triangle
      instantiation and blocking downstream analysis
  - id: finance-C-002
    when: When constructing a Triangle from DataFrame
    action: Pass columns with unique names, as duplicate column names raise AttributeError
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Duplicate column names cause AttributeError 'Columns are required to have unique names', breaking Triangle
      construction before any downstream processing
  - id: finance-C-003
    when: When accessing Triangle.shape property
    action: Return a 4-tuple representing (index_size, columns_size, origin_size, development_size) in that order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream stages expect 4D array shape for vectorized operations; violating this causes incorrect dimension
      alignment in link_ratio_analysis and development_estimation stages
  - id: finance-C-004
    when: When deriving development lags from origin and valuation dates
    action: Calculate development lag as monthly difference using (valuation - origin) / (365.25/12) rounded to 1 day
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect development lag calculation causes misaligned origin/development dimension mapping, corrupting
      the Triangle's fundamental data structure and producing wrong reserving estimates
  - id: finance-C-005
    when: When filling missing origin-development combinations
    action: Verify development dates are strictly greater than origin dates when constructing the date axes
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid origin-development pairs (where development <= origin) create logically impossible triangle cells,
      corrupting actuarial calculations
  - id: finance-C-007
    when: When selecting array backend for Triangle operations
    action: 'Use one of the supported backends: numpy, sparse, cupy, or dask'
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Unsupported backend causes AttributeError 'backend is not supported', halting all Triangle computations
  - id: finance-C-017
    when: When converting between cumulative and incremental representations
    action: Apply cum_to_incr followed by incr_to_cum to recover original cumulative triangle values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Actuarial reserving calculations require accurate triangle representations; failing to use inverse operations
      causes data integrity loss and incorrect IBNR estimates
  - id: finance-C-018
    when: When performing grain() aggregation on cumulative triangles
    action: Verify that ultimate values remain unchanged when summed across development periods
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Grain aggregation is used for reserving analysis; incorrect summation produces wrong ultimate loss estimates
      leading to materially incorrect reserves
  - id: finance-C-020
    when: When using grain() method on triangles
    action: Call grain() with is_cumulative attribute unset (None)
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Without explicit is_cumulative setting, grain() aggregation produces undefined behavior and may cause downstream
      reserving calculations to fail
  - id: finance-C-021
    when: When specifying grain parameters for triangle transformation
    action: Verify origin grain is coarser than or equal to development grain
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Triangles with origin grain finer than development grain produce invalid triangular data structures with
      misaligned periods, corrupting actuarial calculations
  - id: finance-C-022
    when: When converting grain in triangle transformation
    action: Verify target grain is compatible with current origin and development grains
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incompatible grain conversion produces malformed triangles with incorrect period alignment, leading to incorrect
      loss development factors
  - id: finance-C-029
    when: When computing link ratios on a cumulative triangle
    action: Calculate link ratios using the formula (current_period / previous_period) with sliced arrays excluding the last
      development period
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Link ratios will include the incomplete latest diagonal, causing development factor estimation to use partial/incomplete
      data that may lead to biased IBNR estimates
  - id: finance-C-030
    when: When link ratios are computed from cumulative triangles
    action: Compute link ratios directly on incremental triangles without first converting to cumulative format
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Incremental link ratios do not represent true development patterns; ratios will be near 1.0 regardless of
      actual claims development, producing misleading development factor estimates
  - id: finance-C-032
    when: When extracting link ratios for development factor estimation
    action: Exclude the latest diagonal from link ratio computation using valuation_date filtering
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: The latest diagonal contains incomplete/in-progress development that would contaminate historical development
      patterns and produce unreliable development factors
  - id: finance-C-041
    when: When implementing development factor estimation
    action: verify the input triangle is in cumulative form before fitting Development
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Link ratios computed from incremental triangles produce invalid development factors, corrupting reserve calculations
      with mathematically incorrect LDF patterns
  - id: finance-C-043
    when: When computing sigma_ for tail development periods
    action: apply log-linear or Mack interpolation to fill missing sigma values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing sigma values for tail periods prevent stochastic reserve calculations and Mack Chainladder error
      estimation from completing
  - id: finance-C-045
    when: When setting n_periods parameter
    action: set n_periods to 1 for stochastic calculations requiring sigma and std_err
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: n_periods=1 provides insufficient degrees of freedom for regression statistics calculation, resulting in
      undefined sigma_ and std_err_ values
  - id: finance-C-046
    when: When applying MackChainladder method
    action: verify the input triangle has sigma_ attribute from Development stage
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: MackChainladder requires sigma_ values for stochastic error estimation; without it, the method raises ValueError
      and fails
  - id: finance-C-053
    when: When implementing Development fit method
    action: produce ldf_, sigma_, and std_err_ attributes on the fitted transformer
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing output attributes break downstream stochastic reserving methods that depend on these development
      statistics
  - id: finance-C-054
    when: When computing link ratios for development
    action: use y/x (next development value / current development value) for age-to-age factors
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect link ratio formula produces inverted development factors, causing reserve extrapolation in the
      wrong direction
  - id: finance-C-060
    when: When implementing tail extrapolation for LDFs
    action: Verify each LDF values are greater than 1.0 to avoid division by zero in tail calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Tail fit calculation produces division by zero error when LDFs are less than or equal to 1.0, as logarithmic
      transformation of (LDF-1) becomes invalid for LDF <= 1
    stage_ids:
    - tail_estimation
  - id: finance-C-061
    when: When calculating tail factor for infinite development
    action: Compute tail_ as the cumulative product of each remaining LDFs beyond the last observed age
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Tail factor incorrectly calculated if not using cumulative product, causing ultimate loss estimates to be
      understated or overstated
    stage_ids:
    - tail_estimation
  - id: finance-C-062
    when: When computing ultimate losses from tail-extended development
    action: Calculate ultimate as latest_diagonal multiplied by the full CDF (including tail factor)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Ultimate losses incorrectly calculated if CDF does not include tail factor, leading to reserves being understated
      for long-tail lines
    stage_ids:
    - tail_estimation
  - id: finance-C-063
    when: When deriving CDF from extended LDFs
    action: Compute CDF as the cumulative product of each LDFs including tail-extended ones
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: CDF does not properly accumulate tail factors if not computed from extended ldf_ array, breaking chainladder
      identity
    stage_ids:
    - tail_estimation
  - id: finance-C-064
    when: When applying TailCurve extrapolation
    action: Use curve types other than 'exponential', 'inverse_power', or 'weibull'
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Invalid curve type causes ValueError and tail extrapolation fails completely
    stage_ids:
    - tail_estimation
  - id: finance-C-068
    when: When fitting TailBondy to triangle data
    action: Set attachment_age earlier than earliest_age as it violates temporal ordering
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: TailBondy raises ValueError when attachment_age is before earliest_age, breaking the temporal sequence required
      for bondy calculation
    stage_ids:
    - tail_estimation
  - id: finance-C-069
    when: When tail methods auto-apply to triangles without ldf_
    action: Chain Development estimator before applying tail to raw triangles
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Tail methods expect ldf_ attribute; without applying Development first, tail extrapolation fails or produces
      invalid results
    stage_ids:
    - tail_estimation
  - id: finance-C-078
    when: When calculating IBNR from a fitted reserving method
    action: calculate ibnr_ as ultimate_ minus latest_diagonal for each origin period
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect IBNR calculation will cause reserves to be overstated or understated, leading to financial misstatements
      and potential regulatory compliance issues
  - id: finance-C-079
    when: When setting ultimate_ attribute on reserving method output
    action: set ddims to [9999], is_cumulative to True, and valuation_date to max valuation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect ultimate_ attributes cause downstream full_triangle_ and full_expectation_ calculations to fail
      or produce invalid projections
  - id: finance-C-080
    when: When applying reserving methods to a triangle without ldf_ attribute
    action: auto-apply Development transformer to compute LDFs before calculating ultimates
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Ultimate calculations will fail or produce meaningless results when LDFs are not available from the triangle
      data
  - id: finance-C-082
    when: When computing ultimate from a triangle that may be incremental
    action: convert incremental triangles to cumulative form before calculating latest_diagonal and ultimate
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using incremental data as cumulative will produce invalid ultimates that are not comparable to actual reported
      losses
  - id: finance-C-094
    when: When the triangle appears simple and incremental-to-cumulative conversion seems unnecessary
    action: skip incr_to_cum() conversion assuming triangle is already cumulative
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Assuming incremental data is cumulative produces invalid ultimates that do not reflect actual cumulative
      loss development patterns
  - id: finance-C-097
    when: When implementing MackChainladder without prior Development fit
    action: fit Development transformer to produce sigma_ attribute on the triangle
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: MackChainladder fit() raises ValueError('Triangle not compatible with MackChainladder') because sigma_ attribute
      is missing, preventing stochastic estimation entirely
  - id: finance-C-098
    when: When fitting Development with n_periods=1 parameter
    action: expect sigma_ to be usable for Mack stochastic estimation
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: n_periods=1 lacks degrees of freedom for regression statistics; sigma_ is not calculated (only LDFs), causing
      subsequent MackChainladder to fail with ValueError
  - id: finance-C-099
    when: When computing mack_std_err_ for Mack chainladder
    action: combine parameter_risk_ and process_risk_ via square root of sum of squares
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect formula (e.g., linear addition instead of sqrt of sum of squares) produces wrong standard error
      estimates, violating Mack's variance decomposition theory
  - id: finance-C-108
    when: When predicting MackChainladder on new triangles in predict() method
    action: copy sigma_, std_err_, average_, and w_ attributes from fitted triangle to new triangle
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing attribute copying causes attribute errors or uses stale values, producing incorrect stochastic estimates
      for new data
  - id: finance-C-109
    when: When implementing paid_to_incurred parameter in MunichAdjustment
    action: pass None as paid_to_incurred argument
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: MunichAdjustment raises ValueError when paid_to_incurred is None because the correlation adjustment requires
      a valid paid-to-incurred column mapping to compute lambda coefficients. Without it, P/I and I/P ratios cannot be calculated.
  - id: finance-C-110
    when: When fitting MunichAdjustment on triangles with missing P/I or I/P ratios
    action: pass fillna=True to impute missing zero values with Chainladder expectation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without fillna=True, MunichAdjustment raises ValueError and halts because the P/I and I/P ratios cannot be
      computed from zero or NaN cells, making the correlation adjustment impossible to calculate.
  - id: finance-C-119
    when: When implementing BootstrapODPSample for overdispersed Poisson bootstrap
    action: Require cumulative triangle as input to the ODP bootstrap model
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The ODP model assumes incremental counts follow Poisson distribution with cumulative structure for mean/variance
      calculation. Using incremental input directly violates the model's statistical assumptions, producing invalid resampling
      distributions.
    stage_ids:
    - adjustments
  - id: finance-C-120
    when: When using BootstrapODPSample with multi-index triangles
    action: Pass multi-index triangles to BootstrapODPSample without aggregation
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: BootstrapODPSample raises ValueError when len(X) != 1, rejecting multi-index triangles. This is because ODP
      resampling assumes independence across single-index structure for proper degree-of-freedom calculations.
    stage_ids:
    - adjustments
  - id: finance-C-121
    when: When applying bootstrap adjustments to triangles
    action: Express triangles with development lags (numpy array ddims) before fitting BootstrapODPSample
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The bootstrap model's design matrix construction (Shapland eq 3.12) and hat matrix adjustment require development
      lags in array format. Without proper ddims, matrix dimensions become misaligned, corrupting residual standardization.
    stage_ids:
    - adjustments
  - id: finance-C-122
    when: When setting up BerquistSherman adjustments
    action: 'Provide each four required column names: paid_amount, incurred_amount, reported_count, closed_count'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: BerquistSherman computes case reserve adequacy (open_count = reported - closed) and applies two-period exponential
      regression. Missing any required column causes arithmetic failures and raises ValueError.
    stage_ids:
    - adjustments
  - id: finance-C-138
    when: When initializing VotingChainladder with estimators parameter
    action: Use only chainladder-compatible estimators that have _estimator_type='chainladder' registered
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Non-chainladder estimators (e.g., generic sklearn models) will cause ValueError during fit, breaking the
      ensemble initialization
  - id: finance-C-139
    when: When providing weights parameter to VotingChainladder
    action: Verify weights array dimension -3 matches the number of accident periods in X
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Shape mismatch between weights and triangle accident periods causes ValueError, preventing ensemble from
      fitting
  - id: finance-C-140
    when: When providing weights parameter to VotingChainladder
    action: Verify weights array dimension -2 matches the number of estimators in the ensemble
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Number of weight columns must equal number of estimators; otherwise ValueError prevents ensemble from computing
      weighted average
  - id: finance-C-143
    when: When using 5-dimensional weights with VotingChainladder
    action: Verify weights index (axis 0) and column (axis 1) dimensions match X triangle dimensions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Shape mismatch in 5D weights causes ValueError during _get_ultimate prediction phase
  - id: finance-C-144
    when: When calling predict on unfitted VotingChainladder
    action: Call fit() before predict() to verify estimators_ attribute exists
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Calling predict on unfitted estimator raises NotFittedError; ensemble cannot make predictions without fitting
  - id: finance-C-148
    when: When defining estimators list for VotingChainladder
    action: Provide estimators as list of (string, estimator) tuples with unique string names
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Invalid estimator format causes ValueError during _validate_estimators; sklearn's _validate_names also rejects
      duplicate or invalid names
  - id: finance-C-149
    when: When VotingChainladder combines ultimate estimates
    action: Compute weighted average using sum(estimator_ultimate * weight) / sum(weights) formula
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect aggregation formula produces wrong ultimate values that invalidate reserve calculations and actuarial
      analysis
  - id: finance-C-152
    when: When replacing base estimators in VotingChainladder via set_params
    action: Verify replacement estimators are chainladder-compatible if not set to 'drop'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Setting non-chainladder estimator via set_params causes ValueError during next fit call
  - id: finance-C-153
    when: When initializing VotingChainladder with empty estimators list
    action: Pass empty estimators list to VotingChainladder constructor
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Empty estimators list raises ValueError immediately during construction, preventing any ensemble operations
  - id: finance-C-155
    when: When implementing Pipeline for chainladder transformations
    action: Verify intermediate pipeline steps implement both fit and transform methods
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Pipeline will fail during fit_transform execution if intermediate transformers lack proper fit/transform
      implementation, causing AttributeError exceptions during grid search
  - id: finance-C-157
    when: When defining scoring functions for GridSearch
    action: Verify scoring callable returns a single scalar value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Scoring functions returning non-scalar values will cause DataFrame construction failure in results_, preventing
      grid search completion
  - id: finance-C-161
    when: When performing grid search with estimators requiring sample_weight
    action: Pass sample_weight using the step__sample_weight parameter naming convention
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Failing to use the step__sample_weight format (e.g., 'benk__sample_weight') will cause sample_weight to be
      ignored, leading to incorrect IBNR estimates in reserving calculations
  - id: finance-C-166
    when: When processing Triangle data through Pipeline during GridSearch
    action: Shuffle or randomize Triangle row order before fitting
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Triangle data has inherent temporal/development ordering; shuffling destroys valuation-date relationships
      and causes incorrect development factor calculations
  - id: finance-C-167
    when: When passing Triangle data from data_ingestion to triangle_transformation
    action: provide valid 4D array with properly defined origin, development, index, and columns dimensions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Malformed triangles cause dimension misalignment, resulting in incorrect link ratios and flawed IBNR reserve
      estimates
  - id: finance-C-168
    when: When converting incremental to cumulative triangle for link ratio calculation
    action: verify the Triangle has is_cumulative=True after transformation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Link ratios computed on incremental triangles produce meaningless values, causing fundamentally incorrect
      reserving estimates
  - id: finance-C-173
    when: When passing development factors to MackChainladder stochastic estimation
    action: verify Triangle has sigma_ and std_err_ attributes (requires n_periods != 1 in Development estimator)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: MackChainladder requires regression statistics; missing sigma_ causes ValueError and prevents stochastic
      reserving entirely
  - id: finance-C-174
    when: When passing paid_ldf_ and incurred_ldf_ pairs to Munich Chainladder adjustment
    action: provide Triangle with paired columns representing paid and incurred losses (e.g., columns=['paid', 'incurred'])
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: MunichAdjustment requires both paid and incurred columns; missing column pair causes _get_p_to_i_object()
      to fail with index errors
  - id: finance-C-176
    when: When passing Triangle with extended LDF and tail to reserving_calculation
    action: include ldf_ with shape[-1] = X.shape[-1] + 1 (tail factor extends development dimension by one period)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched ldf_ and triangle development dimensions cause index errors or silent misalignment in ultimate
      calculation
  - id: finance-C-177
    when: When passing ultimate_ and X_ reference to MackChainladder stochastic estimation
    action: provide Triangle with ultimate_ attribute and preserve original X_ reference for variance recursion
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mack recursion (_mack_recursion) at methods/mack.py:121-157 requires X_ for full_triangle_ construction;
      missing X_ causes parameter risk calculation to fail
  - id: finance-C-179
    when: When computing age-to-age link ratios on cumulative triangles
    action: compute link ratios using incremental triangles
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Age-to-age factors on incremental data are meaningless ratios that cannot represent loss development patterns
  - id: finance-C-189
    when: When implementing Triangle data structures
    action: Store each triangle data in a 4D numpy-like array with shape (index, columns, origin, development)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Triangle methods expecting specific dimensional ordering will produce incorrect results, corrupting actuarial
      reserve calculations and IBNR estimates
  - id: finance-C-190
    when: When computing development lags from origin and valuation dates
    action: Use 365.25 days divided by 12 months as the monthly time unit (30.4375 days) for lag calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Development age calculations will be incorrect, causing misaligned link ratios and flawed chain ladder estimates
  - id: finance-C-191
    when: When representing origin dates in Triangle construction
    action: Represent origin_date values as the beginning of period (how='s' in to_timestamp)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Development lag calculations will be systematically shifted, causing incorrect IBNR projections based on
      misaligned origin-valuation relationships
  - id: finance-C-193
    when: When computing cdf_ from ldf_
    action: Derive cdf_ by computing cumulative product of ldf_ values via incr_to_cum() method
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Cumulative development factors will be incorrectly computed, leading to materially wrong ultimate loss estimates
      and reserve requirements
  - id: finance-C-195
    when: When setting ultimate values for reserving methods
    action: Set ddims to pd.DatetimeIndex([options.ULT_VAL]) where ULT_VAL='2261-12-31 23:59:59.999999999' and set valuation_date
      to the maximum valuation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Ultimate valuations will not sort correctly in cross-method comparisons, and reserving pipelines may produce
      incorrect full-expectation triangles
  - id: finance-C-199
    when: When validating data input to Triangle constructor
    action: Verify column data is numeric (no 'object' dtype) with unique column names
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Triangle construction will raise TypeError or AttributeError at runtime, failing to load actuarial data and
      blocking reserve calculations
  - id: finance-C-211
    when: When using WeightedRegression for Mack stochastic model calculations in chainladder/utils/weighted_regression.py
    action: Verify closed-form OLS is used for WeightedRegression fitting; Mack's stochastic model depends on exact variance
      calculations that require the closed-form solution; iterative methods may not converge to the same values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Replacing closed-form OLS with iterative optimization methods can produce different parameter estimates,
      breaking the exact variance calculations that Mack's stochastic model depends on for standard error estimation
    derived_from_bd_id: BD-006
  - id: finance-C-214
    when: When configuring CapeCod method parameters
    action: Verify reported_exposure is computed as sample_weight / CDF (exposure trended to ultimate basis); verify sample_weight
      and CDF are on different maturity bases before applying this formula
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Applying the CapeCod exposure formula when exposure is already on ultimate basis produces incorrectly scaled
      reported_exposure, causing the Bornhuetter-Ferguson adjustment to over or under-weight reported claims
    derived_from_bd_id: BD-083
  - id: finance-C-215
    when: When computing Mack's stochastic variance estimates
    action: Use expected (rather than actual) ultimate values for process_variance computation in Mack's model; actual ultimates
      are random variables and using them violates Mack 1993 theoretical assumptions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using actual ultimates in Mack's process_variance formula makes variance estimates dependent on the particular
      realization observed, violating the model's i.i.d. assumptions and producing inconsistent standard error estimates
    derived_from_bd_id: BD-016
  - id: finance-C-242
    when: When computing MackChainladder standard errors combined with bootstrap methods
    action: 'Verify variance chain integrity: (1) sigma_ attribute exists from Development fit, (2) triangle is in cumulative
      form for ODP bootstrap, (3) variance patterns are monotonic for log-linear sigma interpolation, (4) hat matrix leverage
      correction is applied, (5) ODP Pearson residuals are used; non-monotonic variance patterns will cause biased Mack standard
      errors propagating through the cascade'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: 'Risk cascade failure: log-linear sigma extrapolation produces biased variance estimates for non-monotonic
      patterns, Mack standard errors become systematically wrong, reserve distribution width is incorrect, bootstrap confidence
      intervals are unreliable, risk capital calculations are misstated by potentially 20-40%'
    derived_from_bd_id: INT-006
  - id: finance-C-252
    when: When implementing the core chainladder ultimate calculation
    action: Calculate ultimate as latest_diagonal multiplied by CDFs where CDFs are aligned to valuation_date using nan_triangle
      to verify only data as of valuation date is used; do not perform direct multiplication without proper alignment
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without nan_triangle alignment, the calculation includes data beyond the valuation date, causing look-ahead
      bias in reserve estimates that produces systematically optimistic results in backtesting
    derived_from_bd_id: BD-066
  - id: finance-C-253
    when: When validating input triangle data for claims development analysis
    action: Enforce origin <= development validation rule and remove observations violating this constraint with a warning
      message; do not allow, flip origin/development, or use absolute values as alternatives
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating origin <= development constraint includes physically impossible claim development patterns in reserves,
      making reserve estimates invalid for regulatory reporting and actuarial review
    derived_from_bd_id: BD-080
  - id: finance-C-255
    when: When configuring tail factor models for long-tail lines (workers compensation, liability) where tail factors represent
      30-50% of ultimate
    action: 'Review and validate the compounded effect of each five tail assumption decisions: (1) TailCurve exponential form
      vs power-law alternative, (2) TailBase quadratic expansion, (3) projection_period=12 months, (4) TailConstant 12-month
      extension, (5) Bondy power-law selection. Document the combined uncertainty range for tail factors'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Wrong exponential vs power-law choice can produce 2-5x difference in tail factors, materially affecting reserve
      estimates by 30-50% for long-tail lines
    derived_from_bd_id: INT-005
  - id: finance-C-260
    when: When implementing Clark LDF method for ultimate estimation
    action: Use Loglogistic growth curve with L-BFGS-B optimization for Clark LDF estimation — growth curve form and optimization
      method are domain-specific actuarial assumptions that affect estimated ultimate
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using Weibull or Gompertz growth curves with Clark LDF produces different ultimate estimates due to different
      asymptotic behavior; L-BFGS-B optimization is required for MLE convergence
    derived_from_bd_id: BD-088
  regular:
  - id: finance-C-006
    when: When storing Triangle values internally
    action: Use float64 dtype for each numeric values to maintain consistent numerical precision
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using lower precision types (float32) causes rounding errors in financial calculations, leading to accumulation
      of numerical errors across multiple reserving transformations
  - id: finance-C-008
    when: When determining whether to auto-convert to sparse backend
    action: Trigger sparse conversion when array size exceeds 30MB AND density is below 20%
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Disabling auto-sparse on large low-density triangles causes excessive memory consumption and degraded performance
      in development_estimation and stochastic_estimation stages
  - id: finance-C-009
    when: When initializing the ULT_VAL sentinel date for ultimates
    action: Use '2261-12-31 23:59:59.999999999' as the far-future ultimate valuation date
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using a near-future date risks collision with real valuation dates, causing ultimates to sort incorrectly
      within the development dimension
  - id: finance-C-010
    when: When serializing a Triangle to JSON
    action: Transform cumulative triangles to incremental via cum_to_incr() and convert to valuation-based via dev_to_val()
      before serialization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Serializing without these transformations loses triangle type metadata and causes incorrect deserialization
      in read_json
  - id: finance-C-011
    when: When deserializing a Triangle from JSON
    action: Restore is_val_tri and is_cumulative flags from metadata to reconstruct the correct triangle type
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing metadata restoration causes the deserialized triangle to have wrong development dimension type (lag
      vs valuation) and wrong cumulative/incremental state
  - id: finance-C-012
    when: When accessing origin and development dimension labels
    action: Verify odims and ddims are properly labeled and accessible as numpy arrays or DatetimeIndex
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unlabeled dimensions cause KeyError or IndexError when downstream estimators attempt to access origin/development
      periods for link ratio calculations
  - id: finance-C-013
    when: When constructing a Triangle without specifying cumulative flag
    action: Explicitly set cumulative=True or cumulative=False, as None triggers deprecation warning
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Future versions will raise errors instead of warnings; relying on implicit behavior causes silent breakage
      when upgrading chainladder
  - id: finance-C-014
    when: When performing serialization roundtrip with pickle
    action: Use dill.dump (not pickle.dump) to preserve closure-captured state in nested estimators
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using standard pickle fails to serialize lambda functions and closures used in Development patterns, causing
      incomplete Triangle restoration
  - id: finance-C-015
    when: When reading JSON with non-default array_backend
    action: Pass array_backend parameter to read_json to match the original triangle's backend
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Omitting array_backend parameter causes read_json to use default numpy backend, breaking the backend contract
      for sparse-only triangles
  - id: finance-C-016
    when: When using ARRAY_PRIORITY for mixed-backend operations
    action: Respect the precedence order ['dask', 'sparse', 'cupy', 'numpy'] for automatic backend selection
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Bypassing ARRAY_PRIORITY in mixed-backend operations causes unexpected backend selection, potentially triggering
      conversion errors in downstream estimators
  - id: finance-C-019
    when: When extracting latest_diagonal from triangles in different coordinate systems
    action: Account for whether triangle is in valuation mode (val_tri) or development mode (dev_tri)
    severity: high
    kind: domain_rule
    modality: must
    consequence: latest_diagonal extraction returns different origin-period values depending on coordinate system, causing
      incorrect latest diagonal selection for reserves calculation
  - id: finance-C-023
    when: When transforming triangles with partial or trailing periods
    action: Use trailing=True parameter to handle incomplete origin periods correctly
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without trailing=True, partial origin periods cause misaligned date boundaries resulting in incorrect period
      assignments for recent accident years
  - id: finance-C-024
    when: When using link_ratio or age_to_age properties on triangles
    action: Work with cumulative triangles to compute valid age-to-age development factors
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Link ratios computed on incremental data produce undefined factors since incremental changes lack cumulative
      meaning required for development calculations
  - id: finance-C-025
    when: When converting between valuation and development coordinate systems
    action: Apply dev_to_val() to convert development lags to calendar valuation dates
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Coordinate system mismatches cause incorrect cell alignment when computing development factors across calendar
      periods, corrupting loss reserving estimates
  - id: finance-C-026
    when: When calling methods that require is_cumulative to be explicitly set
    action: Explicitly set cumulative parameter during Triangle initialization or invoke incr_to_cum/cum_to_incr first
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Future versions will raise errors for undefined is_cumulative; currently causes unpredictable behavior in
      grain() and dev_to_val() methods
  - id: finance-C-027
    when: When initializing Triangle objects without explicit cumulative specification
    action: Proceed with is_cumulative=None state without explicit conversion
    severity: medium
    kind: claim_boundary
    modality: should_not
    consequence: Warning indicates future breaking change; behavior may become inconsistent across operations that depend
      on cumulative state
  - id: finance-C-028
    when: When performing grain transformations on full triangles without ultimate values
    action: Expect warning about extraneous development lags when triangle is_complete but lacks ultimate
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Warning indicates potential data quality issue with development lags that don't contribute to ultimate calculation
  - id: finance-C-031
    when: When computing link ratios from triangles with missing values
    action: Propagate NaN values through the division operation where denominator or numerator is missing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Forcing valid link ratios where data is insufficient produces artificially complete patterns, violating statistical
      integrity of development factor estimation
  - id: finance-C-033
    when: When using link ratios that already have is_pattern=True
    action: Return the pattern object directly without recomputing the link ratio formula
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reapplying the division formula to patterns would produce incorrect second-order development factors instead
      of the original first-order link ratios
  - id: finance-C-034
    when: When weighting link ratios for development factor averaging
    action: Apply volume weighting with exponent=1 for 'volume' average, simple weighting with exponent=2, and unweighted
      with exponent=0 for 'regression'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect weighting exponent produces development factors that over-weight or under-weight large claim origins,
      leading to biased IBNR estimates
  - id: finance-C-035
    when: When dropping outlier link ratios from development factor calculation
    action: Maintain at least preserve=N link ratios per development period after each exclusions
    severity: high
    kind: operational_lesson
    modality: must
    consequence: If too many link ratios are excluded, the development factor becomes statistically unreliable and may produce
      extreme or unstable IBNR estimates
  - id: finance-C-036
    when: When the triangle contains zero values in the denominator of link ratio calculation
    action: Propagate NaN for link ratios where the denominator cell contains zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero in link ratio calculation without NaN propagation produces Inf values that corrupt downstream
      development factor estimation
  - id: finance-C-037
    when: When calculating age-to-age correlation using Mack's T statistic
    action: Exclude the incomplete diagonal from link ratio comparison using valuation_date filtering
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Including the latest diagonal in age-to-age correlation analysis violates the assumption that all origins
      have complete development history at each age
  - id: finance-C-038
    when: When using chainladder for live trading or real-time financial decisions
    action: Claim that link ratio analysis provides real-time or current-period predictions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Chainladder link ratios are computed from historical claim development patterns; they represent past behavior
      and do not constitute forward-looking predictions for live trading
    stage_ids:
    - link_ratio_analysis
  - id: finance-C-039
    when: When development patterns use n_periods for limited period averaging
    action: Set n_periods=1 when standard errors are required for Mack's method
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: n_periods=1 does not provide enough degrees of freedom for regression statistics, resulting in NaN sigma
      and std_err values that invalidate stochastic estimates
  - id: finance-C-040
    when: When setting drop_high or drop_low parameters in Development estimator
    action: Verify drop adjustments are applied after n_periods consideration for proper weight assignment
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Applying drop adjustments before n_periods filtering can incorrectly exclude link ratios that would otherwise
      be within the n_periods window, reducing statistical validity
  - id: finance-C-042
    when: When calculating loss development factors
    action: verify LDF values are monotonically non-increasing across development ages
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-monotonic LDFs violate insurance loss development theory and produce mathematically invalid cumulative
      development patterns that extrapolate losses incorrectly
  - id: finance-C-044
    when: When using WeightedRegression for LDF calculation
    action: use closed-form OLS solution instead of iterative methods
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Iterative methods would introduce convergence concerns and slow down the Mack stochastic calculations unnecessarily
  - id: finance-C-047
    when: When configuring preserve parameter
    action: maintain at least preserve number of link ratios for LDF calculation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Preserve parameter violation triggers warning and ignores exclusions, potentially producing unreliable LDFs
      from insufficient data
  - id: finance-C-048
    when: When selecting sigma_interpolation method
    action: choose between 'log-linear' (default) or 'mack' for tail sigma extrapolation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid sigma_interpolation value causes sigma_fill to skip extrapolation, leaving tail periods with undefined
      sigma values
  - id: finance-C-049
    when: When using fillna parameter with stochastic methods
    action: apply fillna with non-deterministic or stochastic averaging methods
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Fillna assumption of zero values introduces bias in stochastic methods where each link ratio should be treated
      independently
  - id: finance-C-050
    when: When defaulting n_periods to -1
    action: use each available periods for maximum data usage in LDF averaging
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Restricting periods unnecessarily discards credible data from older origin periods, reducing LDF stability
  - id: finance-C-051
    when: When applying drop_high and drop_low
    action: perform symmetric exclusion to preserve balance in link ratio distribution
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Asymmetric exclusion of extreme link ratios without symmetry distorts the weighted average and biases LDF
      estimates
  - id: finance-C-052
    when: When computing std_err_ values
    action: verify std_err_ increases at older development ages due to reduced data credibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Decreasing std_err_ at older ages violates statistical theory and indicates incorrect weighting or data handling
  - id: finance-C-055
    when: When weighting link ratios in Development
    action: apply volume weighting (default) to give more credence to larger origin periods
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Simple averaging without volume weighting treats small and large origin periods equally, producing unreliable
      LDFs from low-volume data
  - id: finance-C-056
    when: When fitting Development transformer
    action: transform the triangle to development time dimension before computing link ratios
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Computing link ratios on calendar valuation time produces inconsistent age-to-age factors across origin periods
  - id: finance-C-057
    when: When reserving with Development-estimated LDFs
    action: claim that backtested reserve estimates equal expected live trading results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest reserves as guaranteed live results misleads stakeholders about the uncertainty inherent
      in actuarial projections
  - id: finance-C-058
    when: When using Development with tail estimation
    action: extrapolate LDF patterns beyond observed development ages without explicit tail factors
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming development converges to 1.0 without tail estimation ignores tail uncertainty and produces overconfident
      ultimate loss estimates
  - id: finance-C-059
    when: When sigma interpolation fills tail periods
    action: use log-linear interpolation to extrapolate sigma_ for periods beyond observed data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Linear or no interpolation of sigma_ in tail produces discontinuous error estimates that invalidate Mack
      confidence intervals
  - id: finance-C-065
    when: When selecting decay method parameters
    action: Set projection_period to 12 months as conservative default for tail extension
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using non-12 month projection_period may produce unrealistic tail estimates, leading to inadequate or excessive
      reserve calculations
    stage_ids:
    - tail_estimation
  - id: finance-C-066
    when: When using TailConstant for tail estimation
    action: Expect stochastic variability parameters (sigma_, std_err_) from TailConstant outputs
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: TailConstant produces deterministic results without variability estimates, cannot support MackChainladder
      or stochastic reserving methods
    stage_ids:
    - tail_estimation
  - id: finance-C-067
    when: When applying TailClark method
    action: Use cupy backend with TailClark as it only supports numpy
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: TailClark fails with cupy backend, raising errors or producing incorrect results
    stage_ids:
    - tail_estimation
  - id: finance-C-070
    when: When methods auto-apply tail extension to triangles
    action: Automatically apply TailConstant when LDF dimension exceeds triangle dimension by exactly one
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Chainladder method may produce incorrect ultimates without automatic tail application when triangle development
      extends beyond observed LDFs
    stage_ids:
    - tail_estimation
  - id: finance-C-071
    when: When setting up tail decay calculation
    action: Use quadratic series expansion to compute initial LDF seed for numerical stability
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct optimization of tail LDF without proper initialization may fail to converge or produce unstable results
    stage_ids:
    - tail_estimation
  - id: finance-C-072
    when: When representing tail factor in reserving calculations
    action: Claim tail_ represents actual observed development factors beyond the data horizon
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Tail factor is an extrapolation beyond observed data, not a measured value; presenting it as observed data
      misrepresents actuarial methodology
    stage_ids:
    - tail_estimation
  - id: finance-C-073
    when: When using tail extrapolation for regulatory reserving
    action: Treat tail_ factor as a deterministic point estimate without sensitivity analysis
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Tail estimates significantly impact ultimate calculations for long-tail lines; deterministic-only approach
      may not satisfy regulatory requirements for reserve adequacy testing
    stage_ids:
    - tail_estimation
  - id: finance-C-074
    when: When applying TailCurve with errors='ignore'
    action: Set lower threshold for LDF regression to at least 1.00001 to avoid distortion from LDFs near 1.0
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: LDFs close to 1.0 cause log transformation issues in curve fitting, leading to unstable or infinite tail
      estimates
    stage_ids:
    - tail_estimation
  - id: finance-C-075
    when: When selecting earliest_age parameter in TailBondy
    action: Verify earliest_age aligns with available development ages in the triangle grain
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Mismatched earliest_age with development grain causes index errors or incorrect tail factor calculation
    stage_ids:
    - tail_estimation
  - id: finance-C-076
    when: When computing tail sigma and standard error
    action: Check if tail factor equals 1.0 and zero out sigma/std_err when no tail exists
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Variability estimates become non-zero even when no tail is actually applied, misrepresenting uncertainty
      in tail-free triangles
    stage_ids:
    - tail_estimation
  - id: finance-C-077
    when: When applying tail methods to triangles without development patterns
    action: Bypass tail estimation if no clear development trend exists in the data
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Applying tail extrapolation to unstable or incomplete triangles produces unreliable ultimate estimates, leading
      to materially incorrect reserve calculations
    stage_ids:
    - tail_estimation
  - id: finance-C-081
    when: When the triangle LDF ddims are one less than triangle ddims
    action: auto-add TailConstant to extend development patterns to ultimate
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without tail factor, ultimate calculations will truncate at the last observed development period, underestimating
      total reserves
  - id: finance-C-083
    when: When setting process_variance_ on deterministic reserving methods
    action: set process_variance_ to None since deterministic methods do not support variance estimation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Attempting to compute process variance without stochastic model support will raise AttributeError or produce
      None results
  - id: finance-C-084
    when: When applying TailConstant tail estimation
    action: use TailConstant for stochastic methods that require process variance estimation
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: TailConstant sets sigma_=None and std_err_=None for tail periods, making stochastic calculations invalid
  - id: finance-C-085
    when: When initializing TailConstant with default parameters
    action: set tail=1.0, decay=0.5, attachment_age=None, projection_period=12 as the default tail factor
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Default tail=1.0 means no tail factor is applied unless explicitly overridden, potentially underestimating
      ultimate losses
  - id: finance-C-086
    when: When using MackChainladder for stochastic reserving
    action: verify triangle has sigma_ attribute computed by Development with sigma_interpolation parameter
    severity: high
    kind: resource_boundary
    modality: must
    consequence: MackChainladder will raise ValueError if sigma_ is not available for computing process and parameter risk
  - id: finance-C-087
    when: When fitting CapeCod or Benktander reserving methods
    action: provide sample_weight parameter as exposure measure for a priori estimation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Both methods will raise ValueError when sample_weight is None, as they require exposure-based a priori weights
  - id: finance-C-088
    when: When validating sample_weight alignment with triangle
    action: broadcast sample_weight when shapes are misaligned but sample_weight has single column dimension
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Misaligned sample_weight without proper broadcasting will cause dimension mismatch errors in exposure-based
      reserving calculations
  - id: finance-C-089
    when: When applying reserve calculation methods
    action: inherit from MethodBase class to verify consistent validation and ultimate calculation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Methods not inheriting from MethodBase will bypass validate_X() checks, leading to incomplete LDF computation
      and invalid ultimates
  - id: finance-C-090
    when: When computing ultimate values across different reserving methods
    action: route each ultimate_ attribute assignments through _set_ult_attr method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing _set_ult_attr will leave ultimate_ with wrong ddims and valuation_date, breaking full_triangle_
      and full_expectation_ calculations
  - id: finance-C-091
    when: When calculating ultimate values for reserving
    action: use ULT_VAL sentinel date '2261-12-31 23:59:59.999999999' for ultimate ddims to verify correct sorting
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without ULT_VAL sentinel, ultimate values will not sort correctly in valuation chronology, causing incorrect
      full_triangle_ projections
  - id: finance-C-092
    when: When using reserve calculation outputs for reporting
    action: claim deterministic ultimate estimates have the same precision as stochastic estimates
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Chainladder, Bornhuetter-Ferguson, and Cape Cod methods produce point estimates without confidence intervals;
      presenting them as precise predictions misleads stakeholders
  - id: finance-C-093
    when: When presenting ultimate estimates to stakeholders
    action: represent ultimate_ values as actual paid losses without noting they are actuarial projections
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting projected ultimate values as confirmed losses creates false impression of certainty in financial
      reporting
  - id: finance-C-095
    when: When LDFs are already present and the triangle appears complete
    action: skip validation of LDF ddims coverage assuming each development periods are covered
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Incomplete LDF coverage without tail factor auto-addition leads to truncated ultimate estimates that underestimate
      total reserves
  - id: finance-C-096
    when: When trend is set to zero in Cape Cod method
    action: assume trend assumption has no impact on ultimate calculation
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Zero trend still affects Cape Cod through on-level adjustments and interacts with a priori calculations,
      potentially altering ultimate estimates
  - id: finance-C-100
    when: When calculating total_mack_std_err_ across each origin periods
    action: aggregate total_parameter_risk_ squared plus total_process_risk_ squared, then square root
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect aggregation produces misleading aggregate uncertainty that does not reflect proper variance decomposition
      across development ages
  - id: finance-C-101
    when: When extending Mack recursion beyond observed development periods
    action: use expected ultimate values (full_triangle) for process variance calculation, not actual ultimates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using actual ultimates introduces randomness into variance estimates, violating Mack's model assumption that
      expected values drive variance
  - id: finance-C-102
    when: When requiring sigma_ tail extrapolation for last development period
    action: use sigma_interpolation method (log-linear or mack) to extrapolate tail sigma
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without tail sigma extrapolation, Mack recursion lacks sigma values for final development age, producing
      incomplete variance estimates
  - id: finance-C-103
    when: When using log-linear sigma interpolation for tail extrapolation
    action: apply exponential transformation after linear regression on log(sigma) values
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incorrect interpolation (skipping log transform or exponential back-transform) produces biased tail sigma
      estimates, distorting Mack variance
  - id: finance-C-104
    when: When estimating Mack standard errors for older origin years
    action: expect higher mack_std_err_ values compared to recent origin years
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Older origin years have fewer observations in the development triangle, leading to higher estimation uncertainty
      that must be reflected in standard errors
  - id: finance-C-105
    when: When using MackChainladder on asymmetric triangles with varying data density
    action: apply nan_triangle masking to preserve specified zero risk for missing future cells
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper nan_triangle masking, risk_arr would incorrectly propagate through missing cells, producing
      invalid standard error estimates
  - id: finance-C-106
    when: When chaining MackChainladder after Development transformation
    action: verify validate_X() automatically fits Development when ldf_ is missing from input triangle
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without automatic Development fitting, users must manually ensure ldf_/sigma_ are present before Mack, breaking
      the expected sklearn-like fit pattern
  - id: finance-C-107
    when: When presenting Mack standard errors to stakeholders
    action: claim standard errors represent actual prediction intervals for real reserve outcomes
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Mack standard errors are model-based estimates of statistical uncertainty assuming the chainladder model
      is correct; actual reserves may deviate due to model misspecification, tail factor uncertainty, and external factors
      not captured by the model
  - id: finance-C-111
    when: When passing input triangle to MunichAdjustment.fit()
    action: call Development().fit_transform() on input triangle before MunichAdjustment
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without pre-computing LDFs via Development, the input triangle lacks the ldf_ attribute, causing the fit
      method to internally call Development().fit_transform(obj) which may produce different LDFs than expected for the paid/incurred
      pair.
  - id: finance-C-112
    when: When passing a dict to the paid_to_incurred argument of MunichAdjustment
    action: use dict type for paid_to_incurred argument
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Passing a dict to paid_to_incurred triggers a deprecation warning and converts to list-of-tuples internally.
      Future versions will remove this automatic conversion, causing a TypeError when dict is passed.
  - id: finance-C-113
    when: When setting up paid_to_incurred tuple for MunichAdjustment
    action: provide exactly two column names representing paid and incurred data
    severity: high
    kind: resource_boundary
    modality: must
    consequence: The Munich method requires bivariate paid/incurred data to compute the P/I and I/P ratios used for the correlation
      coefficient lambda. With fewer than two columns, the iterative correction loop (chainladder/development/munich.py:276-315)
      cannot compute paid and incurred CDFs separately.
  - id: finance-C-114
    when: When MunichAdjustment is used on triangles where paid and incurred are independent
    action: verify that paid and incurred claim data exhibit genuine correlation
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: When lambda approaches zero (no correlation between paid and incurred residuals), the Munich CDFs reduce
      to simple Chainladder without redundancy reduction. Using MunichAdjustment on uncorrelated paid/incurred data provides
      no benefit over standard Chainladder, wasting computation effort and potentially misleading analysts into believing
      a correlation adjustment was applied.
  - id: finance-C-115
    when: When interpreting munich_cdf_ output for reserving decisions
    action: treat munich_cdf_ as equivalent to simple chain ladder CDFs
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: munich_cdf_ differs from simple chain ladder CDFs because it iteratively adjusts the paid CDF using incurred
      residuals via the lambda coefficient. Presenting them as equivalent understates the model's complexity and correlation
      adjustment, leading to incorrect reserve estimates.
  - id: finance-C-116
    when: When interpreting residuals from MunichAdjustment for model validation
    action: expect non-zero residuals even after Munich adjustment
    severity: medium
    kind: domain_rule
    modality: must
    consequence: resids_ represents unexplained variation after the Munich correlation adjustment. Reporting residuals as
      near-zero or using them to claim perfect model fit leads to overconfident reserve estimates, as the residuals are an
      inherent part of the model's design rather than evidence of poor fit.
  - id: finance-C-117
    when: When setting fillna=True to suppress missing-value errors in MunichAdjustment
    action: blindly use fillna=True without investigating why P/I ratios are missing
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: fillna=True silently imputes zero cells using Chainladder expectations, which may mask data quality issues.
      If the triangle has structural missingness (e.g., new line of business with no historical data), the imputation can
      produce misleading Munich CDFs that don't reflect actual paid/incurred correlation.
  - id: finance-C-118
    when: When computing lambda_ from MunichAdjustment output
    action: validate that lambda_ values fall within the expected range of -1 to 1
    severity: high
    kind: domain_rule
    modality: must
    consequence: lambda_ is a correlation coefficient derived from the regression of ldf residuals against P/I ratio residuals.
      Values outside [-1, 1] indicate numerical instability or overfitting in the WeightedRegression step, and such lambdas
      will cause the Munich CDF adjustment to over- or under-correct the development patterns.
  - id: finance-C-123
    when: When implementing Trend adjustment with date specifications
    action: Specify dates as tuples of (start_date, end_date) pairs
    severity: high
    kind: domain_rule
    modality: must
    consequence: The Trend estimator's date handling expects tuple pairs to match with trend list elements. Non-tuple date
      specification causes AttributeError during trend matrix construction.
    stage_ids:
    - adjustments
  - id: finance-C-124
    when: When applying BerquistSherman adjustments
    action: Modify reported_count values during Berquist-Sherman adjustment
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: The Berquist-Sherman method preserves reported_count (claim counts) while adjusting paid and incurred amounts.
      Altering reported_count breaks disposal rate calculations that depend on original count ratios.
    stage_ids:
    - adjustments
  - id: finance-C-125
    when: When applying bootstrap process variance
    action: Use gamma distribution sampling with Pearson chi-square scale parameter for ODP process variance
    severity: high
    kind: domain_rule
    modality: must
    consequence: The ODP model requires gamma-distributed process variance with scale=phi (Pearson chi-square/degrees of freedom).
      Using normal or other distributions violates the actuarial standard for overdispersed Poisson models.
    stage_ids:
    - adjustments
  - id: finance-C-126
    when: When performing bootstrap resampling with ODP model
    action: Set random_state parameter for reproducible bootstrap simulations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without a fixed random_state, bootstrap simulations produce different ultimate distributions on each run,
      making results non-reproducible and invalidating stochastic reserve estimates.
    stage_ids:
    - adjustments
  - id: finance-C-127
    when: When using BootstrapODPSample with sparse backend triangles
    action: Convert sparse backend to numpy before bootstrap fitting
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Bootstrap operations involve matrix inversions (hat matrix computation) and element-wise operations that
      perform poorly or fail entirely on sparse backends. The implementation automatically converts to numpy backend.
    stage_ids:
    - adjustments
  - id: finance-C-128
    when: When applying Trend adjustments to triangles
    action: Recalculate development factors after trend adjustment to reflect changed claims magnitudes
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Trend factors alter the scale of claims data (e.g., -5% annual trend). Development factors calculated on
      untrended data produce incorrect IBNR when applied to trended triangles.
    stage_ids:
    - adjustments
  - id: finance-C-129
    when: When computing hat matrix adjustment in bootstrap
    action: Skip hat matrix computation when matrix inversion fails silently
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Failed hat matrix computation due to singular weight matrix (e.g., zero variance cells) corrupts residual
      standardization. The code silently sets hat_adj=False with a warning, which may go unnoticed.
    stage_ids:
    - adjustments
  - id: finance-C-130
    when: When running bootstrap with n_sims simulations
    action: Set n_sims >= 1000 for statistically meaningful distribution of ultimates
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: BootstrapODPSample default is 1000 simulations. With fewer simulations, the distribution of ultimates has
      high variance, producing unreliable reserve estimates and wide confidence intervals.
    stage_ids:
    - adjustments
  - id: finance-C-131
    when: When applying ParallelogramOLF on-level adjustments
    action: Verify rate_history contains date_col and change_col columns matching the data
    severity: high
    kind: domain_rule
    modality: must
    consequence: ParallelogramOLF performs cumulative product of (1 + change) over time periods. Missing or mismatched columns
      cause KeyError during on-level factor calculation.
    stage_ids:
    - adjustments
  - id: finance-C-132
    when: When applying BerquistSherman adjustments
    action: Preserve the latest diagonal values unchanged through the adjustment process
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: BerquistSherman adjustment modifies historical diagonals but preserves the most recent diagonal (valuation_date)
      as the known anchor point. Changing this breaks the chainladder development chain.
    stage_ids:
    - adjustments
  - id: finance-C-133
    when: When applying ODP resampling in bootstrap
    action: Preserve total volume across simulations through the resampling mechanism
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: 'ODP resampling uses standardized Pearson residuals with mean-centering (line 154: adj_resid_dist - mean).
      This preserves the volume-weighted structure of the original triangle across all n_sims simulations.'
    stage_ids:
    - adjustments
  - id: finance-C-134
    when: When applying ParallelogramOLF adjustments
    action: Use origin-based date boundaries when applying effective-date rate changes to earned-premium basis triangles
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Premium triangles are typically on earned basis (origin dates) while rate changes are on effective basis
      (effective dates). Using effective dates directly on earned-origin triangles creates misaligned on-level factors.
    stage_ids:
    - adjustments
  - id: finance-C-135
    when: When using bootstrap resampled triangles
    action: Interpret bootstrap resampled results as expected values rather than one possible outcome
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: BootstrapODPSample generates n_sims individual simulated triangles. Each represents one possible realization
      of claims development. Presenting the mean as deterministic expected value ignores the full distribution and understates
      uncertainty.
    stage_ids:
    - adjustments
  - id: finance-C-136
    when: When applying Trend adjustments
    action: Claim trend-adjusted results represent actual future claim amounts without uncertainty bounds
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Trend adjustment applies deterministic scalar factors (e.g., -5% annual trend) to historical data. Actual
      inflation/solvency may differ materially. Presenting deterministic trended values as precise forecasts overstates accuracy.
    stage_ids:
    - adjustments
  - id: finance-C-137
    when: When applying BerquistSherman adjustments
    action: Present BerquistSherman-adjusted triangles as observed data without noting the adjustment methodology
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: BerquistSherman modifies historical paid/incurred amounts using exponential regression on closed counts and
      trend factors. Reporting these as actual observations without disclosure misrepresents data provenance.
    stage_ids:
    - adjustments
  - id: finance-C-141
    when: When using callable weights with VotingChainladder
    action: Return weight tuples matching the number of estimators from the callable
    severity: high
    kind: domain_rule
    modality: must
    consequence: Callable that returns weights with wrong length will cause broadcasting errors or incorrect weighted averages
  - id: finance-C-142
    when: When using dict weights with VotingChainladder
    action: Include weights for each origin periods or provide default_weighting for missing origins
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing origin periods without default_weighting fallback will cause KeyError or NaN weights in ensemble
      calculation
  - id: finance-C-145
    when: When including CapeCod or BornhuetterFerguson estimators in VotingChainladder
    action: Provide sample_weight parameter containing exposure/apriori information during fit
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing sample_weight causes exposure-based methods to use invalid or NaN apriori estimates, leading to materially
      incorrect reserve estimates
  - id: finance-C-146
    when: When providing weights as numpy array or list to VotingChainladder
    action: Use valid numeric types (int, float) for weight values; avoid NaN or Inf
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN or Inf weights cause the weighted average ultimate calculation to produce NaN or Inf reserves
  - id: finance-C-147
    when: When weighting scheme differs across origin periods in VotingChainladder
    action: Provide origin-specific weights via array, dict, or callable to capture varying method credibility by accident
      year
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Uniform weighting across all origins may underweight method credibility for specific accident years with
      limited development data
  - id: finance-C-150
    when: When backtesting VotingChainladder ensemble against historical reserves
    action: Claim the weighted average of backtested ultimates equals expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Ensemble weights calibrated on historical data do not guarantee similar performance in future periods; backtest
      results inherently include look-ahead bias
    stage_ids:
    - ensemble_voting
  - id: finance-C-151
    when: When using VotingChainladder with 5D weight arrays
    action: Mix 5D weights with different index/column dimensions across the weight tensor
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Inconsistent weight dimensions cause broadcasting errors or silent miscalculation of per-cell ultimate values
  - id: finance-C-154
    when: When setting default_weighting to None in VotingChainladder
    action: Set default_weighting to tuple of ones (1,) * n_estimators for equal weighting fallback
    severity: high
    kind: operational_lesson
    modality: must
    consequence: None default_weighting without callable/dict weights causes TypeError in array broadcasting operations
  - id: finance-C-156
    when: When constructing GridSearch param_grid dictionaries
    action: Use double-underscore format (step_name__param_name) for nested parameter names
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Parameter grid keys without proper step__param format will not be recognized by sklearn's ParameterGrid,
      causing grid search to use incorrect or no parameter values
  - id: finance-C-158
    when: When passing sample_weight through Pipeline during grid search
    action: Expect intermediate transformers to receive sample_weight directly
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Intermediate transformers (Development, TailCurve, etc.) do not accept sample_weight; it is only forwarded
      to the final estimator via step__sample_weight parameter naming convention
  - id: finance-C-159
    when: When accessing GridSearch results after fit
    action: Access results using the results_ attribute instead of cv_results_
    severity: high
    kind: claim_boundary
    modality: must
    consequence: This is NOT sklearn's GridSearchCV; it uses results_ (DataFrame) instead of cv_results_ (dict of arrays),
      causing AttributeError if wrong attribute name is used
  - id: finance-C-160
    when: When selecting best estimator from GridSearch
    action: Expect a best_estimator_ attribute to exist
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: chainladder's GridSearch does not implement best_estimator_ attribute like sklearn's GridSearchCV; users
      must manually select best parameters from results_ DataFrame
  - id: finance-C-162
    when: When configuring n_jobs for parallel grid search execution
    action: Set n_jobs to specified value for computational resources and problem size
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default n_jobs=None provides no parallelization; for large parameter grids, n_jobs=-1 (all processors) can
      significantly reduce computation time
  - id: finance-C-163
    when: When validating param_grid structure
    action: Verify param_grid is a dict or list of dicts with parameter names as keys
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid param_grid structure will cause ParameterGrid to fail or produce incorrect parameter combinations,
      corrupting grid search results
  - id: finance-C-164
    when: When setting up chained Triangle transformations before reserving
    action: Place reserving estimators as the final step in the Pipeline
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Pipeline expects final step to be an estimator (fit-only); placing transformers after reserving methods will
      cause AttributeError on predict calls
  - id: finance-C-165
    when: When accessing fitted transformer parameters in scoring functions
    action: Use named_steps attribute to access fitted transformers after grid search fit
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without named_steps access, scoring functions cannot extract intermediate transformer results (ldf_, cdf_,
      tail_) for computing custom metrics
  - id: finance-C-169
    when: When passing Triangle through triangle_transformation to adjustments
    action: preserve the is_cumulative attribute (cumulative or incremental state) as specified for the adjustment type
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: BootstrapODPSample requires incremental triangles while Trend may require cumulative; mismatched state causes
      numerical errors
  - id: finance-C-170
    when: When passing Triangle from link_ratio_analysis to development_estimation
    action: include computed link_ratio (age-to-age) factors in the Triangle attributes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing link_ratio attribute causes Development.fit() to re-calculate from scratch, potentially using different
      weighting
  - id: finance-C-171
    when: When passing adjusted Triangle from adjustments to development_estimation
    action: verify adjusted Triangle maintains valid numeric values without NaN in the upper triangle (known data area)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Trend or bootstrap adjustments with invalid values in the upper triangle produce NaN link ratios and degenerate
      reserving estimates
  - id: finance-C-172
    when: When passing Triangle with computed development factors to tail_estimation
    action: include ldf_, sigma_, and std_err_ attributes on the Triangle object
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing stochastic parameters (sigma_, std_err_) causes tail_estimation to fail or produce deterministic-only
      results
  - id: finance-C-175
    when: When passing fitted estimators to VotingChainladder ensemble
    action: verify each base estimator has ldf_ attribute (fitted Development transformer) for CDF alignment
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: VotingChainladder requires ldf_ for CDF computation in _get_ultimate(); missing ldf_ causes AttributeError
      during voting
  - id: finance-C-178
    when: When passing VotingChainladder to GridSearchCV for hyperparameter optimization
    action: verify VotingChainladder implements scikit-learn estimator interface (fit, predict, get_params, set_params)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: GridSearchCV relies on clone() and get_params() to create estimator copies; non-compliant interface causes
      pickling errors
  - id: finance-C-180
    when: When using Munich Chainladder with missing P/I ratios
    action: pass triangles with NaN values in both paid and incurred columns that prevent ratio calculation
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: MunichAdjustment raises ValueError when P/I or I/P ratios cannot be computed due to missing data
  - id: finance-C-181
    when: When applying MackChainladder to triangles with development ages exceeding model training ages
    action: predict on triangles with development periods beyond the ldf_ training range
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: MethodBase.predict() at methods/base.py:110-111 raises ValueError('X has ages that exceed those available
      in model')
  - id: finance-C-182
    when: When setting n_periods=1 in Development estimator for MackChainladder
    action: expect std_err_ and sigma_ attributes to be populated (insufficient degrees of freedom)
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: MackChainladder requires sigma_ and std_err_; n_periods=1 produces only LDFs without regression statistics,
      causing ValueError at methods/mack.py:60
  - id: finance-C-183
    when: When applying TailCurve with LDFs <= 1.0
    action: fit exponential or inverse_power curves with ldfs <= 1.0 (division by log of non-positive number)
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: TailCurve._predict_tail() at tails/curve.py:206-212 computes xp.log(ldf - 1) which fails for ldf <= 1.0
  - id: finance-C-184
    when: When using bootstrap sampling with multi-index triangles
    action: apply BootstrapODPSample to triangles with multiple index dimensions
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: BootstrapODPSample only supports single-index triangles; multi-index causes ValueError at adjustments/bootstrap.py:89-90
  - id: finance-C-185
    when: When applying Development estimator to triangles with development lags instead of dates
    action: convert valuation-mode triangles (development with DatetimeIndex) to development-mode (using integer lags) before
      fitting Development
    severity: high
    kind: domain_rule
    modality: must
    consequence: DevelopmentBase expects integer development lags; datetime ddims cause shape mismatches in _param_property()
      at development/base.py:229
  - id: finance-C-186
    when: When performing cross-validation or grid search with time-series triangle data
    action: use random shuffling or standard train_test_split (violates temporal ordering required for reserving)
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Random shuffling destroys the temporal structure of origin/development periods, producing invalid link ratios
      and look-ahead bias
  - id: finance-C-187
    when: When interpreting MackChainladder stochastic estimates
    action: interpret Mack standard errors as confidence intervals for ultimate estimates without accounting for model uncertainty
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: MackChainladder standard errors reflect parameter estimation uncertainty and process variance, but do not
      account for model specification error or structural breaks in the data
  - id: finance-C-188
    when: When applying tail factors from one triangle to triangles with different development patterns
    action: transfer tail factors between triangles with substantially different tail development characteristics
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Tail factors are highly sensitive to the tail shape; applying a tail from one line of business to another
      produces incorrect ultimate estimates
  - id: finance-C-194
    when: When extracting the latest_diagonal from a cumulative triangle
    action: Convert incremental triangles to cumulative form via incr_to_cum() before extracting latest_diagonal
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Latest diagonal will contain incremental values instead of cumulative, producing incorrect ultimate estimates
      and IBNR calculations
  - id: finance-C-196
    when: When modifying the shape of a Triangle (index, columns, or slicing operations)
    action: Call _set_slicers() to reinitialize iloc, loc, iat, at, and virtual_columns accessors
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Triangle slicing operations will fail or produce incorrect results, breaking data access patterns required
      by downstream actuarial methods
  - id: finance-C-197
    when: When implementing sklearn-compatible estimators in chainladder
    action: Implement fit(X, y=None, sample_weight=None) and predict(X, sample_weight=None) signatures following sklearn conventions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Estimators will not be compatible with sklearn Pipelines, GridSearchCV, or other sklearn utilities, limiting
      integration with standard ML workflows
  - id: finance-C-198
    when: When selecting array computation backend
    action: Use ARRAY_PRIORITY order ['dask', 'sparse', 'cupy', 'numpy'] when determining backend for mixed-type array operations
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Array operations may fall back to slower backends or fail silently, degrading performance on large triangle
      datasets
  - id: finance-C-200
    when: When presenting or reporting this system's actuarial reserve estimates
    action: Claim that IBNR estimates and ultimate loss projections represent actual future claim amounts without professional
      actuarial review
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Stakeholders may make capital allocation, pricing, or financial reporting decisions based on unvalidated
      projections, leading to regulatory non-compliance and financial loss
  - id: finance-C-201
    when: When applying chain ladder reserving methods
    action: Claim the library can replace actuarial expertise or professional judgment in reserve estimation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users unfamiliar with actuarial reserving methodology may misapply chain ladder techniques, select inappropriate
      development patterns, or misinterpret results, leading to materially incorrect reserves
  - id: finance-C-202
    when: When using this library for insurance applications
    action: Claim support for life insurance or health insurance reserving without explicit actuarial methodology adaptation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Life and health insurance products have fundamentally different claim emergence patterns, benefit structures,
      and actuarial assumptions than property-casualty insurance. Applying standard chain ladder methods without adaptation
      will produce invalid reserve estimates.
  - id: finance-C-203
    when: When presenting model outputs
    action: Present chain ladder reserve estimates as guarantees of actual future claim costs without explicit uncertainty
      quantification
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Decision-makers may not understand the inherent uncertainty in actuarial projections, leading to underestimation
      of capital needs and inadequate reserve provisions
  - id: finance-C-204
    when: When using this library for real-time pricing or trading applications
    action: Claim suitability for real-time insurance pricing systems or algorithmic trading applications
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Real-time pricing systems require millisecond-level response times and different statistical models. Chain
      ladder methods are batch-processing oriented and designed for periodic reserve estimation, not high-frequency pricing
      decisions.
  - id: finance-C-205
    when: When using this library for non-insurance financial modeling
    action: Claim suitability for non-insurance financial modeling applications such as banking, investments, or derivatives
      pricing
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Chain ladder methods assume specific insurance claim development patterns (accident year, development period
      emergence) that do not apply to banking loans, investment portfolios, or derivative instruments. Results will be meaningless
      or misleading.
  - id: finance-C-206
    when: When validating sample_weight alignment in reserving methods
    action: Ignore misaligned X and sample_weight shapes without explicit warning when multiple triangles exist
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Automatic broadcasting of misaligned exposure weights may silently distort reserve estimates, producing incorrect
      IBNR projections that appear valid
  - id: finance-C-207
    when: When computing development factors without explicit LDFs
    action: Auto-compute link ratios via Development estimator if X lacks ldf_ attribute
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Methods expecting development factors will fail with AttributeError, blocking reserve estimation workflows
  - id: finance-C-208
    when: When extending the Development class with new attributes in chainladder/development/development.py
    action: Verify that any new attributes added to Development class are included in the transform() method's hardcoded attribute
      list; if missing, results may have attribute loss during transformation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Development.transform() copies only a hardcoded list of attributes; new attributes added to the Development
      class won't be copied automatically, causing silent data loss in transformed results
    derived_from_bd_id: BD-046
  - id: finance-C-209
    when: When implementing regression-based LDF estimation in chainladder/utils/weighted_regression.py
    action: Disable the thru_orig=True constraint when data genuinely suggests LDF[0] != 1.0 at inception; forcing regression
      through origin will produce biased slope and intercept estimates
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: LDF regression with thru_orig=True forces the regression line through the origin, assuming LDF[0]=1.0 by
      actuarial convention; this breaks when data genuinely suggests non-unity at inception, producing systematically biased
      development factors
    derived_from_bd_id: BD-067
  - id: finance-C-210
    when: When interpreting or constructing Triangle objects with origin_date and development_date fields
    action: Verify origin_date represents period START and development_date represents period END per industry-standard accounting
      convention; mismatched conventions will cause incorrect lag calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misinterpreting origin_date as period END or development_date as period START causes inverted lag calculations,
      resulting in incorrect development periods and fundamentally wrong reserving estimates
    derived_from_bd_id: BD-069
  - id: finance-C-212
    when: When implementing link ratio computation in actuarial estimation
    action: Compute link ratios along diagonals of the loss development triangle (same calendar time/valuation date), not
      per-cell
    severity: high
    kind: domain_rule
    modality: must
    consequence: Per-cell link ratios produce non-standard age-to-age factors that deviate from standard actuarial methodology,
      causing model output to be incomparable with industry benchmarks and peer implementations
    derived_from_bd_id: BD-004
  - id: finance-C-213
    when: When applying TailBase to triangles without pre-computed LDFs
    action: Explicitly call Development() before Tail() to control tail estimation parameters; be aware that TailBase auto-applies
      Development() with default parameters when ldf_ is missing
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Implicit Development() auto-application may use inappropriate tail decay assumptions; for long-tail lines
      like workers comp or liability, default tail factors can be significantly off, causing reserve estimates to be materially
      wrong
    derived_from_bd_id: BD-010
  - id: finance-C-216
    when: When using the groupby parameter to pool multiple triangles for joint estimation
    action: Verify that grouped triangles share common development characteristics before pooling; if triangles have genuinely
      different development patterns, estimate LDFs and apriori separately per group
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Pooling heterogeneous triangles assumes common development patterns per credibility theory; when groups have
      different tail behavior or claim reporting patterns, joint estimation produces biased ultimates for each sub-segment
    derived_from_bd_id: BD-081
  - id: finance-C-217
    when: When processing buy/sell orders in backtesting
    action: Assume the framework validates price and quantity precision (tick size/lot size) — this capability is not implemented
      in the framework
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without tick/lot size validation, orders may be submitted at precision levels unsupported by the market;
      in live trading, such orders are rejected, causing backtest-live execution inconsistency and missed trades
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-218
    when: When implementing order validation for market orders
    action: Implement external price precision validation to match tick size requirements (e.g., round to nearest 0.01 for
      stocks, 0.005 for bonds) and quantity validation to match lot size (e.g., multiples of 100 shares)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping tick/lot size validation causes backtested fill rates to exceed actual execution rates; orders rejected
      in live trading due to precision violations create divergence between backtested and live performance
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-219
    when: When implementing or refactoring CDF alignment logic in chain ladder reserving methods
    action: Use multiplicative CDF alignment (ultimate = diagonal * CDF) rather than additive formulas — this is the industry-standard
      chain ladder principle
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing to additive CDF alignment would produce non-standard reserve estimates that deviate from industry-accepted
      chain ladder methodology, causing systematic misestimation of insurance liabilities
    derived_from_bd_id: BD-015
  - id: finance-C-220
    when: When using reserving methods without explicitly fitting Development
    action: Verify that validate_X() auto-fitting behavior is intentional — check if Development has been explicitly fitted
      before the method call, as auto-fitted LDFs may differ from expected values
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The auto-fit of Development with TailConstant silently modifies LDF calculations; users expecting custom
      LDFs may get different ultimates without realizing the framework auto-fitted them
    derived_from_bd_id: BD-013
  - id: finance-C-221
    when: When running Bootstrap ODP model for reserve estimation
    action: Provide cumulative triangle input to Bootstrap ODP — incremental triangles will not preserve the overdispersion
      structure required for correct bootstrap variance estimation
    severity: high
    kind: domain_rule
    modality: must
    consequence: The ODP bootstrap relies on mean-variance relationship of cumulative triangles; feeding incremental data
      directly produces incorrect variance estimates, leading to unreliable reserve ranges
    derived_from_bd_id: BD-021
  - id: finance-C-222
    when: When estimating tail factors for reserves using the tail decay module
    action: Use quadratic series expansion to generate seed LDF values before optimization — arbitrary starting values risk
      optimization failure or convergence to local minima
    severity: high
    kind: domain_rule
    modality: must
    consequence: Tail optimization without quadratic series expansion initial LDFs may fail to converge or find suboptimal
      tail factors, causing systematic reserve estimation errors
    derived_from_bd_id: BD-011
  - id: finance-C-223
    when: When applying reserving methods to triangles
    action: Verify the framework auto-detects cumulative vs incremental triangles correctly — verify that incremental data
      is converted to cumulative form before processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: If auto-detection fails or is bypassed, incremental triangles processed as cumulative will produce incorrect
      reserve estimates due to wrong developmental patterns
    derived_from_bd_id: BD-014
  - id: finance-C-224
    when: When running Benktander bootstrap with apriori uncertainty sampling
    action: Set apriori_sigma to non-zero value when bootstrap sampling is expected to capture parameter uncertainty — apriori_sigma=0.0
      produces deterministic results without uncertainty quantification
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Setting apriori_sigma=0.0 disables lognormal sampling in bootstrap, eliminating parameter uncertainty from
      reserve distributions and giving false confidence in single-point estimates
    derived_from_bd_id: BD-063
  - id: finance-C-225
    when: When computing Mack standard errors with missing sigma values
    action: Use log-linear sigma interpolation to fill missing values — verify that log(sigma) decreases approximately linearly
      with development age before applying this method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Log-linear interpolation assumes monotonic decreasing variance with age; applying it to non-monotonic variance
      patterns produces incorrect Mack standard errors, understating or overstating reserve uncertainty
    derived_from_bd_id: BD-059
  - id: finance-C-226
    when: When implementing or refactoring Munich Chain Ladder adjustment logic
    action: Use the correlation coefficient lambda to adjust LDFs for the paid/incurred relationship — compute lambda via
      _get_MCL_lambda and apply it to pull LDFs toward each other based on correlation strength
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping lambda correlation adjustment reduces reserve estimate efficiency when paid and incurred triangles
      are correlated, producing less accurate reserves than the Munich method design intends
    derived_from_bd_id: BD-018
  - id: finance-C-227
    when: When implementing origin-specific trend assumptions in ensemble voting workflows
    action: Verify that assum_vector accepts callable functions when trend varies by origin period — implement callable returning
      origin-specific assumption values
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using constant assumptions for trending scenarios produces biased reserve estimates when development patterns
      legitimately vary by origin period (e.g., inflation changes, claims handling changes)
    derived_from_bd_id: BD-024
  - id: finance-C-228
    when: When processing large triangles in data ingestion stage
    action: Verify that sparse conversion triggers when triangle size exceeds 30MB OR density falls below 20% — confirm these
      thresholds match actual performance requirements
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using incorrect sparse conversion thresholds causes either excessive memory usage (when threshold too high)
      or unnecessary sparse operation overhead (when threshold too low), degrading backtesting performance
    derived_from_bd_id: BD-040
  - id: finance-C-229
    when: When computing variance estimates for reserving methods
    action: Use process_variance=None for deterministic methods (Chain Ladder, Bornhuetter-Ferguson, Cape Cod) — only compute
      variance explicitly for stochastic methods (Mack, Bootstrap)
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Enabling process variance computation for deterministic methods causes unnecessary computational overhead
      and breaks the expected API contract where these methods return point estimates only
    derived_from_bd_id: BD-043
  - id: finance-C-230
    when: When processing timestamp fields in data ingestion
    action: Assume the framework handles timezone explicit annotation and UTC normalization — the framework does not implement
      timezone handling; naive timestamps are processed as-is
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without timezone annotation, timestamps from different sources may be interpreted inconsistently, causing
      data alignment errors in multi-timezone backtesting scenarios and production deployments
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-231
    when: When selecting stocks or configuring timezone-sensitive data feeds
    action: Annotate each timestamp fields with explicit timezone (e.g., UTC) and normalize to UTC during data ingestion —
      apply pytz or zoneinfo for timezone conversion before storing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without UTC normalization and explicit timezone annotation, timestamp comparisons across different timezones
      produce incorrect results, corrupting time-series analysis in production
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-232
    when: When implementing Munich Chain Ladder LDF calculations
    action: Compute Munich LDFs as weighted average of basic paid and incurred LDFs using correlation-based weighting scheme
      — use _set_ldf with correlation structure, not simple arithmetic average
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple average instead of correlation-weighted average reduces the variance reduction benefit of the
      Munich method, producing less efficient reserve estimates
    derived_from_bd_id: BD-019
  - id: finance-C-233
    when: When configuring Cape Cod decay parameter for development estimation
    action: Verify decay parameter setting matches data characteristics — decay=1 for uniform weighting, decay<1 for exponential
      decay weighting of recent origins
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using decay<1 on stable lines where older data has equal credibility overweights recent origins, distorting
      reserve estimates for lines without genuine trend
    derived_from_bd_id: BD-065
  - id: finance-C-234
    when: When computing Mack chain ladder standard errors
    action: 'Compute Mack std err using quadrature formula: sqrt(parameter_risk^2 + process_risk^2) — combine variance sources
      using square root of sum of squares, not scalar addition'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using scalar addition instead of quadrature combines variance sources incorrectly, producing invalid confidence
      intervals for Mack reserve estimates
    derived_from_bd_id: BD-076
  - id: finance-C-235
    when: When implementing Bootstrap resampling for reserve estimation
    action: Use ODP (Overdispersed Poisson) process with Pearson residuals and resampling with replacement — implement Pearson
      residual calculation before resampling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using parametric bootstrap instead of ODP with Pearson residuals produces different reserve distributions,
      invalidating stochastic reserving estimates that rely on the ODP model
    derived_from_bd_id: BD-082
  - id: finance-C-236
    when: When configuring GLM development estimation with Tweedie distribution
    action: Verify Tweedie power parameter matches expected loss distribution — power=1.0 for compound Poisson-Gamma (typical
      insurance losses), power=0 for normal, power=2 for gamma, power=3 for inverse Gaussian
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using incorrect Tweedie power produces wrong link function and variance structure, causing systematic bias
      in GLM reserve estimates for non-standard loss distributions
    derived_from_bd_id: BD-085
  - id: finance-C-237
    when: When implementing or modifying chainladder methods that compute latest_diagonal
    action: Verify the triangle is in cumulative form before computing latest_diagonal; link ratios require cumulative amounts
      at successive development ages for meaningful comparison
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incremental amounts for link ratio calculations produces meaningless ratios, causing systematic errors
      in development factor estimation and reserve calculations
    derived_from_bd_id: BD-028
  - id: finance-C-238
    when: When implementing MackChainladder stochastic estimation
    action: Verify sigma_ attribute from Development fit is available before computing Mack standard errors; the model requires
      link ratio standard deviations to compute process and estimation variance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without sigma_ attribute, MackChainladder cannot compute stochastic variance estimates, producing incomplete
      reserve distributions and unreliable confidence intervals
    derived_from_bd_id: BD-029
  - id: finance-C-239
    when: When modifying Triangle array shape in any transformation operation
    action: Call _set_slicers() after any array shape modification to regenerate cached indexing metadata; stale slicers cause
      incorrect mapping between logical and array indices
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stale slicers cause incorrect triangle slicing, leading to wrong development factors, reserve calculations,
      and silent data corruption that is difficult to diagnose
    derived_from_bd_id: BD-031
  - id: finance-C-240
    when: When applying BootstrapODPSample to triangles with multiple indices
    action: Aggregate multi-index triangles to single-index before applying BootstrapODPSample; verify len(X)==1 before fitting
      as the ODP bootstrap requires a single portfolio or line of business
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: BootstrapODPSample silently processes only the first index when multi-index triangles are passed, causing
      reserve estimates to ignore portions of the portfolio and produce systematically underestimated reserves
    derived_from_bd_id: BD-047
  - id: finance-C-241
    when: When using TailConstant with default projection_period=12
    action: Verify that 12-month projection extension is sufficient for the line of business; long-tail lines such as workers
      compensation or liability coverage may require projection_period>12
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 12-month projection may underestimate tail factors for long-tailed lines by 5-20%, causing systematic
      under-reserving for lines with development beyond 12 months
    derived_from_bd_id: BD-049
  - id: finance-C-243
    when: When implementing exposure trending calculations
    action: 'Use compound growth formula: exposure_trended = exposure_base * (1 + trend_rate) ^ years; apply year-by-year
      compounding rather than linear multiplication'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using linear trending (exposure * (1 + trend_rate * years)) underestimates or overestimates trended exposure
      exponentially; for multi-year projections, error compounds to 10-25% deviation
    derived_from_bd_id: BD-090
  - id: finance-C-244
    when: When computing bootstrap scale parameter for variance estimation
    action: Apply degrees of freedom correction sqrt(n/df) to the scale parameter for unbiased variance estimation; verify
      n > df to avoid division by zero or inflated variance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting DOF correction produces biased (underestimated) variance estimates, causing bootstrap reserve distributions
      to appear narrower than actual uncertainty, leading to under-reserving by 5-15%
    derived_from_bd_id: BD-091
  - id: finance-C-245
    when: When implementing link ratio calculation logic in the Triangle development module
    action: Fill missing link ratios with placeholder values (0 or 1) — NaN must propagate through ratio calculations to preserve
      statistical integrity of subsequent averaging operations
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Replacing NaN with 0 or 1 in link ratio calculations introduces statistical bias, distorting development
      factor estimates and causing reserve calculations to produce systematically incorrect values
    derived_from_bd_id: BD-005
  - id: finance-C-246
    when: When configuring drop_high/drop_low parameters in development factor estimation
    action: Apply asymmetric exclusion (dropping only high or only low values) — symmetric exclusion (dropping equal counts
      of high and low) must be used by default to prevent bias from extreme observations in thin data periods
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Asymmetric exclusion of link ratios introduces directional bias in development factor estimation, systematically
      distorting reserve calculations by either over- or under-weighting extreme observations
    derived_from_bd_id: BD-008
  - id: finance-C-247
    when: When implementing or modifying the Triangle data structure for insurance reserving
    action: Maintain 4D array shape (index, columns, origin, development) — the 4 orthogonal dimensions are required to represent
      policy grouping, coverage types, origin periods, and development ages for vectorized operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Changing to a lower-dimensional representation loses semantic meaning of actuarial data dimensions, breaking
      vectorized operations and requiring awkward flattening that obscures the business domain structure
    derived_from_bd_id: BD-001
  - id: finance-C-248
    when: When processing data ingestion in actuarial reserving pipelines
    action: Assume the framework handles settlement and delivery time conventions — the framework does not implement time
      convention matching between trade execution and settlement dates
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit settlement and delivery time convention handling, data pipelines may mismatching timing
      records, causing position tracking errors and regulatory reporting discrepancies in production environments
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-249
    when: When implementing data ingestion pipelines for actuarial reserving systems
    action: Explicitly define and validate settlement and delivery time conventions — compare settlement_date against trade_execution_date
      to verify T+n settlement alignment, with configurable day-count conventions matching the specific jurisdiction and instrument
      type
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing time convention validation causes production pipelines to process trades with mismatched settlement
      dates, leading to incorrect reserve calculations and potential regulatory compliance violations
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-250
    when: When selecting the averaging method for loss development factor (LDF) calculation in actuarial estimation
    action: Verify that average='volume' (volume-weighted average of link ratios) matches the actuarial assumption for the
      specific line of business; if simple averaging is needed, explicitly set average='volume' to 'simple' and document the
      rationale
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using simple averaging instead of volume-weighted averaging gives equal influence to all origin periods regardless
      of claim magnitude, systematically distorting LDF estimates for lines with varying claim sizes
    derived_from_bd_id: BD-007
  - id: finance-C-251
    when: When implementing or refactoring Bornhuetter-Ferguson method calculations
    action: Maintain n_iters=1 for Bornhuetter-Ferguson calculations to preserve the single-iteration estimate behavior; if
      iterative refinement is needed, use the Benktander method explicitly with n_iters>1
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing n_iters for BF method causes estimates to converge toward chainladder with apriori weighting, fundamentally
      altering reserve estimates from the intended single-iteration behavior
    derived_from_bd_id: BD-061
  - id: finance-C-254
    when: When processing triangles with very long-tail insurance lines exceeding 200+ years of development
    action: Verify that no valuation date in the data extends to year 2261 or beyond; if collision is possible, configure
      ULT_VAL to a later year or implement dynamic ULT_VAL based on latest valuation date plus buffer
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: If actual data extends to year 2261, ULT_VAL sentinel collision causes ultimate values to sort incorrectly
      among real data, corrupting triangle ordering and valuation date-based calculations
    derived_from_bd_id: BD-003
  - id: finance-C-256
    when: When processing data ingestion in production systems
    action: Assume the framework provides point-in-time data availability — the framework does not implement point-in-time
      snapshot capability; historical data may reflect subsequent developments rather than true historical state
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time data, the system uses current-period data for historical analysis, violating audit
      requirements and causing incorrect reserve calculations based on hindsight information
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-257
    when: When implementing data ingestion pipelines for actuarial data
    action: Implement point-in-time snapshot capability by maintaining separate historical snapshots with as-of-date tracking;
      verify data queries filter by snapshot_date <= analysis_date to prevent look-ahead bias
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing point-in-time capability causes audit failures and reserve calculations that use information not
      available at the assessment date, creating compliance violations
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-258
    when: When implementing bootstrap resampling in actuarial analysis
    action: Apply the Shapland correction using hat matrix adjustment for leverage correction when high-leverage observations
      are present in the triangle data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without hat matrix leverage correction, high-leverage observations have undue influence on residuals, producing
      biased residual distributions and incorrect reserve confidence intervals
    derived_from_bd_id: BD-022
  - id: finance-C-259
    when: When implementing tail variance estimation for Mack chain-ladder standard errors
    action: Use log-linear regression for sigma extrapolation over time periods, assuming log(sigma) decreases linearly with
      age — this method is required for Mack standard errors in tail periods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using constant sigma or different extrapolation methods for tail variance produces incorrect Mack standard
      errors, leading to under- or over-estimation of reserve uncertainty by 10-30%
    derived_from_bd_id: BD-079
  - id: finance-C-261
    when: When implementing Clark LDF method with L-BFGS-B optimization
    action: Verify L-BFGS-B optimization is used for maximum likelihood estimation in Clark LDF — switching to other optimizers
      may fail to converge or produce different parameter estimates
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: L-BFGS-B is a bounded optimizer required for MLE with growth curve parameters; alternative optimizers may
      produce non-convergent fits or different ultimate estimates
    derived_from_bd_id: BD-088
  - id: finance-C-262
    when: When implementing reserving methods that use LDFs (Loss Development Factors) in backtesting or production
    action: Verify whether LDFs extend to ultimate period — if not, the framework auto-adds a TailConstant of 1.0 in validate_X();
      check for implicit tail factor by inspecting the tail attribute or explicitly set tail factors if needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Silent auto-addition of TailConstant(1.0) produces ultimates different from user expectations without warning;
      strategies relying on specific ultimate values will have inflated or deflated reserves
    derived_from_bd_id: BD-044
  - id: finance-C-263
    when: When creating ensemble models using VotingChainladder with custom or non-chainladder estimators
    action: Verify that each estimators in the voting ensemble are properly registered as chainladder estimators via is_chainladder()
      check; if using custom estimators, verify they implement the chain ladder interface before adding to the ensemble
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Non-chainladder estimators are silently rejected by the voting ensemble validation; backtests may fail or
      use unexpected estimator subsets without clear error messages
    derived_from_bd_id: BD-045
  - id: finance-C-264
    when: When implementing gridsearch optimization with sample weights for exposure-based reserving methods
    action: Pass sample_weight through the pipeline's final estimator only (fit_params), not to intermediate pipeline steps
      — this differs from standard sklearn behavior where sample_weight flows through each step
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing sample_weight to intermediate steps causes unexpected parameter routing; exposure-based methods receive
      incorrect or duplicate weights, producing incorrect reserve estimates
    derived_from_bd_id: BD-034
  - id: finance-C-265
    when: When configuring tail estimation using TailBase methods
    action: Use the decay formula ldf = 1 + initial * (decay^period) where initial is derived from quadratic expansion; do
      not use fixed tail factors or purely empirical tail methods when TailBase is the selected tail method
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fixed tail factors or empirical tail methods with TailBase produces inconsistent tail extrapolation;
      ultimates diverge from mathematically derived expectations, causing systematic over- or under-reserving
    derived_from_bd_id: BD-075
  - id: finance-C-266
    when: When implementing or modifying reserve estimation error calculations using the Mack method
    action: 'Use the recursive standard error formula combining parameter_risk and process_risk via quadrature: sqrt(parameter_risk^2
      + process_risk^2) — do not substitute simple addition or separate risk reporting'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing quadrature with simple addition changes reserve distribution quantification, potentially misrepresenting
      confidence intervals by 5-15% for portfolios with correlated development factors
    derived_from_bd_id: BD-087
  - id: finance-C-267
    when: When implementing or modifying tail extrapolation in reserving calculations
    action: Use Bondy power-law tail extrapolation formula f0^(b/(1-b)) for tail factor estimation — parameter b must be between
      0 and 1 exclusively; verify the exponent (b/(1-b)) produces valid finite tail factors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid b values (b >= 1 or b <= 0) cause division by zero or infinite tail factors, leading to reserve estimates
      that diverge from actual claims development
    derived_from_bd_id: BD-089
  - id: finance-C-268
    when: When calculating interest, duration, or any time-proportional value using the framework
    action: Assume the framework provides a default day count convention — the framework does not implement day count handling;
      any date difference calculation will use incorrect conventions if not explicitly specified
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit day count convention, interest accrual calculations differ from actual instrument terms,
      causing reserve estimates to deviate by up to 6% annually for long-tail lines
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-269
    when: When calculating interest, duration, or any time-proportional value in reserving or pricing calculations
    action: Explicitly specify the day count convention parameter (e.g., '30/360', 'ACT/365', 'ACT/360') for each interest-sensitive
      calculations and validate against the specific instrument's documentation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting explicit day count convention causes silent miscalculation of interest accrual, systematically biasing
      reserve estimates for instruments with non-standard day count terms
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-270
    when: When using drop_valuation to exclude calendar periods from LDF calculations in actuarial backtesting
    action: Verify that excluded periods are truly anomalous and not representative of genuine loss development patterns before
      applying drop_valuation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Removing genuine pattern periods from LDF calculation causes systematic bias in ultimate estimates; backtest
      results will diverge from actual experience when excluded periods contain true development signals
    derived_from_bd_id: BD-071
  - id: finance-C-271
    when: When processing sparse triangles with fillna=None in actuarial backtesting
    action: Verify that zeros in the triangle represent truly missing data rather than genuine zero payments (especially in
      late development periods) before excluding them from LDF calculations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Excluding genuine zero payments as NaN values distorts LDF calculations for sparse triangles; late development
      periods with legitimate zero payments will show inflated development factors, causing systematic overestimation of reserves
    derived_from_bd_id: BD-072
  - id: finance-C-272
    when: When calling grain() to change triangle grain in actuarial backtesting
    action: Convert triangle to cumulative format using to_cumulative() before calling grain(), as grain() only operates on
      cumulative triangles and will raise an error or produce incorrect results on incremental data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling grain() on an incremental triangle causes an error or silently produces incorrect aggregation results;
      backtest workflows that assume grain() works on any triangle will fail or produce mathematically incorrect results
    derived_from_bd_id: BD-050
  - id: finance-C-273
    when: When implementing reserving logic with n_periods=-1 and preserve=1 parameters
    action: Prevent drop_valuation from removing the only available ratio when n_periods=-1 and only 1 link ratio exists for
      a development age, or raise an explicit error for the conflicting parameter combination — do not silently warn and proceed
      or ignore the preserve constraint
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Dropping the only ratio for a development age violates the preserve=1 minimum retention requirement, causing
      silent calculation failures or degraded reserve estimates without user awareness of the parameter conflict
    derived_from_bd_id: INT-002
  - id: finance-C-274
    when: When implementing reserving methods that accept sample_weight parameters alongside loss triangles
    action: Perform strict shape validation when sample_weight (Triangle type) and loss triangle have incompatible shapes
      — require explicit broadcasting specification rather than allowing silent numpy broadcasting expansion (e.g., 3×1 weight
      array broadcasting against 10×5×8 triangle)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Silent numpy broadcasting silently expands mismatched shapes without raising errors, directly distorting
      reserve estimates in VotingChainladder where weights broadcast uniformly across origins
    derived_from_bd_id: INT-003
  - id: finance-C-275
    when: When implementing reserving methods using ExpectedLoss with n_iters=0, CapeCod with decay=1, or BF/CapeCod with
      apriori=1.0
    action: Verify that the combination of n_iters=0 (ExpectedLoss ignores experience), decay=1 (CapeCod applies equal weighting),
      and apriori=1.0 (exposure equals expected ultimate) does not collectively eliminate each credibility given to actual
      claims experience — raise a warning when method defaults produce ExpectedLoss-equivalent behavior despite different
      method names
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Three default decisions compound to eliminate experience credibility, making CapeCod produce identical results
      to ExpectedLoss despite appearing to be an experience-based reserving method — strategies designed for experience weighting
      silently become exposure-only models
    derived_from_bd_id: INT-004
  - id: finance-C-276
    when: When implementing LDF calculation logic involving volume weighting, thru_orig constraint, regression fitting, or
      rank exclusion
    action: Acknowledge that LDF estimation parameters (volume='volume' weighting, thru_orig=True constraint, drop_high/low
      rank exclusion, and through-origin constraint pulling weighted averages) are a coupled system — do not tune or modify
      any single parameter assuming independence from the others
    severity: high
    kind: operational_lesson
    modality: must
    consequence: The through-origin constraint limits regression slope flexibility and pulls weighted averages away from volume-optimal
      values, while rank exclusion removes high-volume periods that may legitimately differ — treating these as independent
      parameters produces unexpected LDF values that cascade into reserve distortions
    derived_from_bd_id: INT-007
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
