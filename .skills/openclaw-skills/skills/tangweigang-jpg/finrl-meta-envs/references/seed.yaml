resources:
  packages:
  - name: numpy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: torch (via ray[default])
    version_pin: latest
  - name: gym
    version_pin: latest
  - name: scikit-learn
    version_pin: latest
  - name: stockstats
    version_pin: latest
  - name: talib
    version_pin: latest
  - name: matplotlib
    version_pin: latest
  - name: yfinance
    version_pin: latest
  - name: alpaca_trade_api
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy
    - python3 -m pip install pandas
    - python3 -m pip install torch (via ray[default])
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing data download from external providers
    action: Validate date format as YYYY-MM-DD using check_date function before processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid date format causes downstream data processing failures, leading to incorrect trading signals or environment
      simulation errors
    stage_ids:
    - data_collection
  - id: finance-C-002
    when: When initializing data processor for a specific ticker list
    action: Map ticker to correct exchange timezone via calc_time_zone to prevent market hour misalignment
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Timezone misalignment causes data timestamps to fall outside market hours, producing incorrect OHLCV data
      or empty datasets
    stage_ids:
    - data_collection
  - id: finance-C-003
    when: When cleaning data from any provider
    action: 'Standardize column names to required schema: time, tic, open, high, low, close, volume'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inconsistent column names cause downstream pipeline failures in feature engineering and environment simulation
      stages
    stage_ids:
    - data_collection
  - id: finance-C-008
    when: When specifying time interval for Binance
    action: Use lowercase interval format (1d, 1m, 15m) as Binance API rejects uppercase (1D)
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Incorrect case causes ValueError and complete data fetching failure for Binance cryptocurrency data
    stage_ids:
    - data_collection
  - id: finance-C-009
    when: When selecting time interval for data collection
    action: Verify time_interval is supported by the specific data provider before fetching data
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Unsupported time interval causes assertion errors or silent data fetching failures
    stage_ids:
    - data_collection
  - id: finance-C-010
    when: When using Tushare provider
    action: Provide a valid API token in kwargs as Tushare requires authentication
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Missing token causes assertion error, preventing any Chinese A-share data from being fetched
    stage_ids:
    - data_collection
  - id: finance-C-011
    when: When downloading data from each tickers in a list
    action: Handle partial fetch failures gracefully and raise error when each tickers fail to fetch
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Silent all-failure scenario produces empty dataset causing downstream pipeline to process invalid data
    stage_ids:
    - data_collection
  - id: finance-C-015
    when: When implementing a new data provider
    action: Inherit from _Base class and override download_data method for provider-specific logic
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Non-inheriting providers bypass clean_data and fillna, producing datasets incompatible with the rest of the
      pipeline
    stage_ids:
    - data_collection
  - id: finance-C-017
    when: When extending the DataProcessor class
    action: Map data_source enum value to corresponding processor class in DataProcessor.__init__
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing enum mapping causes ImportError when attempting to use unregistered data source
    stage_ids:
    - data_collection
  - id: finance-C-021
    when: When encountering column naming inconsistencies
    action: Skip column standardization by assuming downstream stages handle different schemas
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping standardization causes environment simulation to fail when accessing expected column names
    stage_ids:
    - data_collection
  - id: finance-C-022
    when: When data fetch partially succeeds
    action: Proceed with empty dataset assuming later stages will handle missing data gracefully
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Empty dataset causes division-by-zero or shape-mismatch errors in array transformations
    stage_ids:
    - data_collection
  - id: finance-C-026
    when: When converting DataFrame to numpy arrays via df_to_array
    action: verify price_array.shape[0] equals tech_array.shape[0] for correct temporal alignment
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched array dimensions break the gym.Env state space contract, causing index errors or silent misalignment
      where state[t] uses price[t] but tech[t-1] or tech[t+1]
    stage_ids:
    - feature_engineering
  - id: finance-C-071
    when: When implementing DRLAgent for a new library
    action: Provide get_model, train_model, and DRL_prediction interface methods
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Strategies cannot switch between DRL libraries without the standardized interface, breaking the plug-and-play
      architecture that FinRL-Meta relies on for fair algorithm comparisons
    stage_ids:
    - agent_training
  - id: finance-C-072
    when: When building MODEL_KWARGS dictionary
    action: Extract parameters from config module using uppercase model name suffix pattern
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: MODEL_KWARGS will be empty or None, causing KeyError when get_model() attempts to access model hyperparameters,
      crashing the training pipeline
    stage_ids:
    - agent_training
  - id: finance-C-075
    when: When selecting the best model in ensemble strategy
    action: Use Sharpe ratio calculated on validation window to compare models
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without Sharpe ratio validation, the ensemble may select an overfitted model that performed well on training
      data but lacks generalization capability, leading to poor live trading performance
    stage_ids:
    - agent_training
  - id: finance-C-076
    when: When running ensemble strategy
    action: Validate models using rolling train/val/test windows with rebalance_window
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without proper temporal separation, models will be trained on future data relative to validation, introducing
      look-ahead bias that invalidates performance estimates
    stage_ids:
    - agent_training
  - id: finance-C-091
    when: When implementing market impact models for order execution
    action: correctly separate permanent and temporary impact components
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mixing permanent and temporary impact causes incorrect execution price calculations, leading to inaccurate
      implementation shortfall estimates and suboptimal trade scheduling
    stage_ids:
    - order_execution
  - id: finance-C-092
    when: When calculating Almgren-Chriss utility
    action: use positive risk aversion lambda to balance expected shortfall vs variance tradeoff
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative or zero lambda causes utility calculation to be invalid or invert the risk-return tradeoff, leading
      to either overly aggressive or undefined execution behavior
    stage_ids:
    - order_execution
  - id: finance-C-093
    when: When executing trades in MarketEnvironment
    action: round share quantities to integers before executing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Fractional shares cannot be traded in real markets, causing simulated execution to diverge from actual broker
      execution capabilities and invalidating backtest results
    stage_ids:
    - order_execution
  - id: finance-C-094
    when: When using MarketEnvironment for order execution
    action: call start_transactions() before calling step()
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Calling step() without start_transactions() leaves transacting flags as False, causing all trades to have
      zero execution (sharesToSellNow=0) and producing meaningless simulation results
    stage_ids:
    - order_execution
  - id: finance-C-097
    when: When implementing AC (Almgren-Chriss) execution policy
    action: correctly compute the AC utility as expected shortfall plus lambda times variance
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect utility formula inverts the risk-return tradeoff or produces invalid optimization objectives, leading
      to either over-trading or under-trading compared to optimal execution
    stage_ids:
    - order_execution
  - id: finance-C-121
    when: When passing data from data_collection to feature_engineering
    action: The DataFrame MUST contain columns [tic, time, open, high, low, close, adjusted_close, volume] as specified in
      clean_data()
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Feature engineering will fail or produce incorrect technical indicators if required OHLCV columns are missing,
      leading to training on invalid data
  - id: finance-C-122
    when: When converting DataFrame to numpy arrays for environment simulation
    action: price_array.shape[0] MUST equal tech_array.shape[0] (same number of timesteps)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Environment simulation will fail with dimension mismatch error, preventing agent training from starting
  - id: finance-C-124
    when: When calculating turbulence index for market regime detection
    action: Turbulence calculation MUST use only historical data (look-back window) and NOT include current timestep
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using current timestep in turbulence calculation introduces look-ahead bias, causing the agent to trade on
      future information in backtesting
  - id: finance-C-127
    when: When initializing the StockTradingEnv for agent training
    action: 'The config dictionary MUST contain keys: price_array, tech_array, turbulence_array, if_train'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing config keys will raise KeyError during environment initialization, preventing agent training
  - id: finance-C-128
    when: When passing the Gym environment to DRLAgent for training
    action: The environment MUST implement reset() returning state and step(action) returning (state, reward, done, info)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Stable-Baselines3, RLlib, and ElegantRL expect standard Gym interface; non-compliant environment will fail
      training
  - id: finance-C-129
    when: When loading trained model for paper trading or order execution
    action: The cwd (current working directory) MUST contain the saved model file (act.pth for ElegantRL, .zip for Stable-Baselines3)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Model loading will fail with FileNotFoundError, preventing paper trading execution
  - id: finance-C-130
    when: When passing state_dim and action_dim to AlpacaPaperTrading
    action: state_dim MUST match the environment's computed state dimension (1 + 2 + 3*stock_dim + tech_array.shape[1])
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched state_dim will cause state tensor shape mismatch during prediction, leading to runtime errors
      or incorrect actions
  - id: finance-C-132
    when: When passing price and technical data from Alpaca API in paper trading
    action: Fetched price data MUST be normalized with the same scaling factors used during training (price*2**-6, tech*2**-7)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: State mismatch between training and live trading will cause the agent to take incorrect actions based on
      improperly scaled observations
  - id: finance-C-135
    when: When running the training-testing-trading pipeline
    action: Training data and testing/trading data MUST NOT overlap temporally
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Temporal overlap causes information leakage where the agent has seen future data during training, producing
      overly optimistic backtest results that do not reflect real trading performance
  - id: finance-C-141
    when: When calculating turbulence threshold for paper trading
    action: Turbulence threshold MUST be derived from in-sample (training) turbulence distribution
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using current period turbulence will cause look-ahead bias in market regime detection during live trading
  - id: finance-C-145
    when: When processing data across each data sources
    action: 'Use standardized column names: ''tic'' for ticker, ''time'' for timestamp, ''open'', ''high'', ''low'', ''close'',
      ''adjusted_close'', ''volume'' — no exceptions'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream trading environments expect these exact column names; mismatch causes KeyError or silent shape
      mismatches in df_to_array, breaking the training pipeline
  - id: finance-C-146
    when: When sorting DataFrames in any data processor
    action: Sort by [time, tic] in that exact order after every DataFrame mutation operation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Environment step() assumes price_array rows correspond to consecutive time steps per ticker; unsorted data
      causes wrong price lookups, corrupting the entire episode reward signal
  - id: finance-C-162
    when: When executing the training-testing-trading pipeline
    action: Verify training data precedes testing data in time, with no temporal overlap — training period end_date must be
      strictly less than testing period start_date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Temporal overlap between training and testing causes information leakage — the agent's policy has been trained
      on data it will be evaluated on, producing artificially inflated backtest results
  - id: finance-C-166
    when: When implementing position management logic for margin trading
    action: Execute cover_short orders before buy_long orders, and sell_long orders before short orders — follow the hardcoded
      position-flipping sequence in _execute_trade()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the position-flipping sequence causes regulatory violations for short selling; short positions
      must be covered before establishing new long positions, and vice versa
    derived_from_bd_id: BD-128
  - id: finance-C-167
    when: When implementing market impact tracking for regulatory reporting
    action: Call end_day() explicitly after each trading day to apply permanent impact decay — impact calculations are not
      automatically finalized
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing end_day() calls causes impact accumulation that violates regulatory accounting standards; permanent
      market impact must be decayed daily for best execution reporting
    derived_from_bd_id: BD-138
  - id: finance-C-232
    when: When implementing or modifying MarketEnvironment execution simulation
    action: Verify start_transactions() is called before step() — the state machine requires proper initialization sequence;
      violating this contract produces incorrect transaction cost tracking and market impact calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calling step() before start_transactions() violates the state machine contract, causing transaction costs
      and market impact to be tracked incorrectly or not at all, making compliance reports and execution analysis unreliable
    derived_from_bd_id: BD-140
  - id: finance-C-243
    when: When implementing episode termination logic for FX backtesting environments
    action: Force closure of each open positions when episode data ends — execute market orders to flatten each positions
      at the final available price
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Failing to force position closure at episode end leaves unrealized P&L assumptions beyond available data,
      creating non-reproducible backtest results that cannot be validated in live trading
    derived_from_bd_id: BD-045
  - id: finance-C-257
    when: When implementing turbulence-based trading policies in DRLEnsembleAgent
    action: Rely on fixed turbulence threshold of 70 (99th percentile) for sell-each behavior triggering - the hardcoded boundary
      creates exploitable patterns where agents learn to predict and front-run sell-offs just before threshold crossings
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Fixed turbulence threshold creates predictable market impact where decision cascades accelerate sell-offs;
      front-running by external agents can amplify losses during stress periods beyond what backtesting predicts
    derived_from_bd_id: BD-147
  - id: finance-C-258
    when: When processing input data in the feature pipeline before turbulence calculation
    action: Assume column standardization and timezone auto-detection work silently without validation - the dependency chain
      (BD-002 → BD-004 → BD-136) produces incorrect turbulence values if early stages use non-standard column conventions
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Silent cascade failure causes turbulence calculations to be incorrect without triggering warnings; DRLEnsembleAgent
      selects wrong policies based on corrupted data, leading to significant performance divergence between backtest and live
      trading
    derived_from_bd_id: BD-148
  regular:
  - id: finance-C-004
    when: When processing data from providers that support it
    action: Run dropna to remove rows with missing critical columns after data cleaning
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN values in price columns propagate to technical indicators causing calculation errors or invalid trading
      decisions
    stage_ids:
    - data_collection
  - id: finance-C-005
    when: When using technical indicator calculation with talib
    action: Apply forward-fill to DataFrame before calling talib functions to avoid NaN-related errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: TALib raises exceptions when encountering NaN values, breaking the feature engineering pipeline entirely
    stage_ids:
    - data_collection
  - id: finance-C-006
    when: When fetching data from YahooFinance API
    action: Exceed the API rate limit of 2000 requests per hour to avoid being blocked
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: API rate limit exceeded causes data fetching failures, halting the entire data collection pipeline
    stage_ids:
    - data_collection
  - id: finance-C-007
    when: When using IEXCloud data source
    action: Exceed the API rate limit of 100 requests per second per IP address
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: API rate limit exceeded causes request failures and data gaps in the fetched dataset
    stage_ids:
    - data_collection
  - id: finance-C-012
    when: When working with high-frequency intraday data
    action: Call fillna method to forward-fill missing timesteps for proper panel data alignment across tickers
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing timesteps cause misaligned price arrays in environment simulation, leading to incorrect state representations
    stage_ids:
    - data_collection
  - id: finance-C-013
    when: When calculating technical indicators
    action: Use drop_na_timesteps=1 to remove timesteps with any NaN after adding indicators
    severity: high
    kind: operational_lesson
    modality: must
    consequence: NaN timesteps cause invalid states in RL environment, producing undefined actions or gradient issues
    stage_ids:
    - data_collection
  - id: finance-C-014
    when: When processing WRDS data
    action: Validate that no NaN values remain in OHLCV columns after preprocessing
    severity: high
    kind: operational_lesson
    modality: must
    consequence: NaN prices propagate through covariance calculations in turbulence index, producing invalid market stress
      measurements
    stage_ids:
    - data_collection
  - id: finance-C-016
    when: When implementing download_data in any provider
    action: Store fetched data in self.dataframe and call self.save_data after download completes
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing save_data call causes fetched data to be lost, forcing redundant API calls on subsequent runs
    stage_ids:
    - data_collection
  - id: finance-C-018
    when: When downloading market data
    action: Claim real-time data support when using polling-based providers with inherent delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting polling as real-time causes users to make trading decisions based on stale price data
    stage_ids:
    - data_collection
  - id: finance-C-019
    when: When presenting data collection results
    action: Claim downloaded data equals exchange-provided data due to provider preprocessing variations
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Different providers apply varying adjustment algorithms for splits/dividends, producing materially different
      price series
    stage_ids:
    - data_collection
  - id: finance-C-020
    when: When using auto_adjust option in yfinance
    action: Understand that adjusted prices modify open/high/low/close differently than raw prices
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Price adjustment for dividends/splits distorts intraday OHLC relationships, potentially invalidating indicator
      calculations
    stage_ids:
    - data_collection
  - id: finance-C-023
    when: When NaN values appear in data cleaning
    action: Assume NaN filling is optional and skip fillna for performance reasons
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping fillna for intraday data creates misaligned timesteps, causing incorrect price lookups in trading
      loop
    stage_ids:
    - data_collection
  - id: finance-C-024
    when: When implementing technical indicator calculations using stockstats library
    action: group DataFrame by ticker (tic) before computing each indicator to verify proper alignment per stock
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without per-ticker grouping, technical indicators will be calculated across mixed tickers causing meaningless
      cross-sectional values that corrupt the state representation fed to the trading agent
    stage_ids:
    - feature_engineering
  - id: finance-C-025
    when: When building technical indicator arrays from DataFrame using df_to_array
    action: filter tech_indicator_list to only include columns that exist in the DataFrame before array construction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Requesting non-existent indicator columns causes array construction to fail or produce misaligned data, breaking
      the temporal alignment between price_array and tech_array
    stage_ids:
    - feature_engineering
  - id: finance-C-027
    when: When using talib for technical indicator calculation
    action: fill NaN values with forward-fill (ffill) before calling talib functions as talib does not handle NaN inputs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Talib functions with NaN inputs produce all-NaN outputs, corrupting indicator columns and breaking the environment
      state representation
    stage_ids:
    - feature_engineering
  - id: finance-C-028
    when: When adding technical indicators via add_technical_indicator with drop_na_timesteps=1
    action: drop entire timesteps (each tickers) that contain any NaN value to maintain temporal consistency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Partial NaN rows would cause misaligned state arrays across tickers, as each ticker's data must be present
      at the same timestamp for proper environment simulation
    stage_ids:
    - feature_engineering
  - id: finance-C-029
    when: When computing turbulence index via calculate_turbulence
    action: require at least time_period (default 252) trading days of historical data before producing non-zero turbulence
      values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Insufficient warmup data produces unreliable turbulence values that trigger incorrect sell-all behavior in
      the trading environment during early periods
    stage_ids:
    - feature_engineering
  - id: finance-C-030
    when: When selecting technical indicator library via select_stockstats_talib parameter
    action: validate that the selected library is a valid IndicatorLib enum value and raise ValueError for unknown values
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Invalid library selection causes cryptic attribute errors or silent fallback to wrong indicator computation
      method
    stage_ids:
    - feature_engineering
  - id: finance-C-031
    when: When initializing StockTradingEnv with feature arrays
    action: cast price_array, tech_array, and turbulence_array to np.float32 to match gym.Env observation_space dtype
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Float64 arrays consume 2x memory and may cause dtype mismatch errors in PyTorch-based DRL agents that expect
      float32 inputs
    stage_ids:
    - feature_engineering
  - id: finance-C-032
    when: When populating tech_array in df_to_array
    action: replace remaining NaN values with 0 after array construction to prevent NaN propagation into environment states
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN values in tech_array corrupt gradient computation during DRL training and produce undefined reward signals
    stage_ids:
    - feature_engineering
  - id: finance-C-033
    when: When building price_array in df_to_array for multi-ticker dataset
    action: verify tickers appear in consistent order across each array constructions to maintain feature alignment
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent ticker ordering between price_array and tech_array causes wrong stock prices to be paired with
      wrong technical indicators, producing meaningless state-action pairs
    stage_ids:
    - feature_engineering
  - id: finance-C-034
    when: When configuring turbulence threshold in trading environment
    action: use turbulence_thresh=99 for backtesting as it approximates the 99th percentile of historical turbulence values
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Using lower thresholds (e.g., 30 for paper trading) causes premature sell-all behavior, dramatically reducing
      achievable returns in backtest evaluation
    stage_ids:
    - feature_engineering
  - id: finance-C-035
    when: When computing MACD using talib in _calculate_talib_indicators
    action: 'use standard parameters: fastperiod=12, slowperiod=26, signalperiod=9 for conventional MACD calculation'
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Non-standard MACD parameters produce indicator values outside expected ranges, confusing trained DRL agents
      that learned on default-indicator states
    stage_ids:
    - feature_engineering
  - id: finance-C-036
    when: When computing RSI using talib in _calculate_talib_indicators
    action: use timeperiod=14 for conventional RSI calculation matching stockstats convention
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Non-standard RSI period produces values outside [0,100] expected range, corrupting DRL state normalization
    stage_ids:
    - feature_engineering
  - id: finance-C-037
    when: When scaling technical indicators in StockTradingEnv
    action: multiply tech_array by 2^-7 (≈0.0078) to normalize values within observation space bounds [-3000, 3000]
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unscaled technical indicators (MACD values in hundreds, RSI in [0,100]) exceed observation space bounds causing
      gym.spaces.Box constraint violations
    stage_ids:
    - feature_engineering
  - id: finance-C-038
    when: When scaling reward in StockTradingEnv
    action: multiply raw PnL by 2^-11 (≈0.000488) to prevent gradient explosion in DRL training
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unscaled rewards cause vanishing or exploding gradients making DRL agent training unstable or non-convergent
    stage_ids:
    - feature_engineering
  - id: finance-C-039
    when: When renaming date columns during technical indicator processing
    action: standardize column name 'date' to 'time' before indicator calculation to maintain consistent temporal key
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Mixed column naming causes merge failures between DataFrames with different temporal key names, producing
      empty indicator columns
    stage_ids:
    - feature_engineering
  - id: finance-C-040
    when: When calculating Bollinger Bands using talib
    action: use timeperiod=20 with nbdevup=2 and nbdevdn=2 (standard parameters) for conventional Bollinger Band calculation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Non-standard Bollinger parameters produce bands with different widths than stockstats version, causing inconsistent
      state representations
    stage_ids:
    - feature_engineering
  - id: finance-C-041
    when: When selecting data source for turbulence calculation
    action: call add_turbulence for unsupported sources (binance, ccxt, iexcloud, joinquant, quantconnect) as turbulence is
      not applicable
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Attempting to calculate turbulence for unsupported data sources produces errors or None turbulence_array
      breaking environment initialization
    stage_ids:
    - feature_engineering
  - id: finance-C-042
    when: When extracting price column for array construction in df_to_array
    action: use 'close' column (not 'adjusted_close') for price_array construction to match stockstats convention
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using adjusted_close misaligns price values with indicator calculations that use close, producing inconsistent
      state representations
    stage_ids:
    - feature_engineering
  - id: finance-C-043
    when: When evaluating technical indicator ranges for sanity checking production data
    action: claim that RSI values outside [0, 100] range indicate data errors without checking if stockstats uses different
      smoothing conventions
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Stockstats RSI can briefly exceed [0,100] boundaries due to different EMA smoothing, causing false positive
      data quality alerts
    stage_ids:
    - feature_engineering
  - id: finance-C-044
    when: When using FinRL-Meta for backtesting evaluation
    action: claim that backtest returns equal expected live trading returns as stated in README disclaimer
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not reflect actual trading performance due to lack of market impact, slippage modeling,
      and latency that exist in live execution
    stage_ids:
    - feature_engineering
  - id: finance-C-045
    when: When building turbulence_array from insample data
    action: use 90th percentile of insample turbulence values as the turbulence threshold for sell-each behavior
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using an arbitrary threshold instead of empirically-determined percentile causes either over-trading (too
      low) or never-triggering (too high) turbulence sell signals
    stage_ids:
    - feature_engineering
  - id: finance-C-046
    when: When requesting VIX data via add_vix
    action: use add_vix with unsupported data sources (binance, ccxt, iexcloud, joinquant, quantconnect, ricequant, tushare)
      as VIX is not available
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Calling add_vix on unsupported sources produces errors or None vix values breaking risk array construction
      in df_to_array
    stage_ids:
    - feature_engineering
  - id: finance-C-047
    when: When sorting DataFrame after adding technical indicators
    action: sort DataFrame by ['time', 'tic'] to verify consistent temporal ordering across each processing stages
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unsorted data causes index misalignment when converting to arrays, producing states where price[t] belongs
      to ticker A but tech[t] belongs to ticker B
    stage_ids:
    - feature_engineering
  - id: finance-C-048
    when: When computing covariance matrix for turbulence calculation
    action: use pseudo-inverse (np.linalg.pinv) instead of regular inverse to handle near-singular covariance matrices
    severity: high
    kind: domain_rule
    modality: must
    consequence: Regular matrix inverse on ill-conditioned covariance matrices (highly correlated assets) produces numerical
      overflow and incorrect turbulence values
    stage_ids:
    - feature_engineering
  - id: finance-C-049
    when: When implementing state normalization in trading environment
    action: scale cash by 2^-12, price by 2^-6, and stocks by 2^-6 to keep state values in [-1, 1] range
    severity: high
    kind: domain_rule
    modality: must
    consequence: Neural network convergence degrades when state values exceed [-1, 1] range due to saturated activation functions
    stage_ids:
    - environment_simulation
  - id: finance-C-050
    when: When defining trading environment action space
    action: use Box space with low=-1, high=1 normalized across each stock dimension
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Agent policy architecture fails to generalize across different stock counts when action space is not normalized
    stage_ids:
    - environment_simulation
  - id: finance-C-051
    when: When implementing environment step function
    action: process SELL actions before BUY actions to prevent using same-tick cash from sells to fund buys
    severity: high
    kind: domain_rule
    modality: must
    consequence: Agent can buy stocks using cash from sells on the same tick, violating T+1 settlement constraints and inflating
      backtest returns
    stage_ids:
    - environment_simulation
  - id: finance-C-052
    when: When initializing StockTradingEnv with config dict
    action: require turbulence_array in config dict and apply sigmoid_sign transformation scaled by 2^-5
    severity: high
    kind: domain_rule
    modality: must
    consequence: Turbulence-based risk management fails when turbulence data is missing, exposing portfolio to unhedged volatility
      risk
    stage_ids:
    - environment_simulation
  - id: finance-C-053
    when: When preparing input data for trading environment
    action: verify turbulence column exists in data and call add_turbulence() before df_to_array()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Environment crashes or produces incorrect risk signals when turbulence column is absent from data pipeline
    stage_ids:
    - environment_simulation
  - id: finance-C-054
    when: When calculating turbulence threshold for DRLEnsembleAgent
    action: compute threshold as 90th percentile (0.90 quantile) of turbulence values from in-sample training data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect turbulence threshold causes either premature forced liquidation or failure to protect against market
      crashes
    stage_ids:
    - environment_simulation
  - id: finance-C-055
    when: When executing step() in high turbulence market conditions
    action: liquidate each positions when turbulence exceeds threshold to avoid extended drawdown
    severity: high
    kind: domain_rule
    modality: must
    consequence: Portfolio suffers catastrophic losses during market crashes when forced liquidation logic is not triggered
      by turbulence threshold
    stage_ids:
    - environment_simulation
  - id: finance-C-056
    when: When implementing environment reset() for training mode
    action: initialize stocks_cool_down array to zeros to enable cooldown tracking from episode start
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Wash trading prevention fails when cooldown tracking is not reset, allowing rapid re-trading of same assets
    stage_ids:
    - environment_simulation
  - id: finance-C-057
    when: When computing reward in trading environment
    action: apply reward_scaling factor (default 2^-11) to prevent gradient vanishing in deep neural networks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Agent fails to learn effective trading policies when reward gradients vanish due to large absolute reward
      values
    stage_ids:
    - environment_simulation
  - id: finance-C-058
    when: When computing episode-terminal reward
    action: accumulate gamma-decayed rewards (gamma=0.99) to balance immediate vs delayed returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Agent becomes short-sighted and fails to consider long-term portfolio impact when gamma reward accumulation
      is not implemented
    stage_ids:
    - environment_simulation
  - id: finance-C-059
    when: When converting data arrays in environment initialization
    action: cast price_array and tech_array to float32 to verify consistent numerical precision
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Silent numerical errors occur when mixing float64 input data with float32 computations in neural network
      training
    stage_ids:
    - environment_simulation
  - id: finance-C-060
    when: When processing buy/sell trades in step function
    action: check price[index] > 0 before executing trades to handle missing data gracefully
    severity: high
    kind: domain_rule
    modality: must
    consequence: Environment crashes or produces NaN values when attempting to trade stocks with missing price data
    stage_ids:
    - environment_simulation
  - id: finance-C-061
    when: When presenting backtest results from environment simulation
    action: claim that backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misleading stakeholders with unrealistic expectations when live trading results differ significantly from
      backtest due to slippage, fees, and market impact
    stage_ids:
    - environment_simulation
  - id: finance-C-062
    when: When validating data compatibility with StockTradingEnv
    action: verify tech_array length matches price_array length to maintain temporal alignment
    severity: high
    kind: domain_rule
    modality: must
    consequence: State computation fails with shape mismatch error when tech indicators are not aligned with price data
    stage_ids:
    - environment_simulation
  - id: finance-C-063
    when: When creating environment config dict for StockTradingEnv
    action: include if_train flag to differentiate training mode with stochastic initialization from testing mode
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Agent overfits to deterministic initial conditions when training mode uses same initialization as testing
    stage_ids:
    - environment_simulation
  - id: finance-C-064
    when: When implementing environment interface for DRL agent integration
    action: inherit from gym.Env and implement reset(), step(), and get_state() methods as required by Stable Baselines3
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: DRL agent fails to interact with environment when required gym.Env interface methods are not implemented
    stage_ids:
    - environment_simulation
  - id: finance-C-065
    when: When selecting turbulence threshold for stock trading environment
    action: use turbulence_thresh=99 as default threshold (99th percentile) in StockTradingEnv
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Environment triggers excessive forced liquidations or insufficient risk protection when threshold deviates
      from calibrated default
    stage_ids:
    - environment_simulation
  - id: finance-C-066
    when: When tracking trades with cooldown mechanism
    action: reset stocks_cool_down[index] to 0 after any trade and enforce min_action threshold before re-trading
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Wash trading occurs when cooldown tracking does not reset after trades, violating regulatory requirements
    stage_ids:
    - environment_simulation
  - id: finance-C-067
    when: When normalizing technical indicators in environment
    action: scale tech_array by 2^-7 to keep technical indicator values in reasonable numerical range
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Neural network training becomes unstable when technical indicator values are not normalized to match other
      state components
    stage_ids:
    - environment_simulation
  - id: finance-C-068
    when: When using FinRL-Meta simulation environment
    action: present simulated backtest results as proof of real trading execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not account for slippage, market impact, and execution latency that occur in live trading,
      leading to inflated performance claims
    stage_ids:
    - environment_simulation
  - id: finance-C-069
    when: When designing custom reward function for trading environment
    action: compute reward as difference between current and previous total asset values to capture portfolio performance
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Agent receives meaningless reward signals when reward computation does not reflect actual portfolio value
      change
    stage_ids:
    - environment_simulation
  - id: finance-C-070
    when: When executing sell action in turbulence mode
    action: reset each stocks_cool_down entries to 0 after forced liquidation to prepare for post-turbulence trading
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Agent cannot execute any trades after turbulence period ends due to stuck cooldown state from previous holdings
    stage_ids:
    - environment_simulation
  - id: finance-C-073
    when: When initializing ElegantRL for futures trading
    action: Set state_dim to 39 and action_dim to 3 for futures environment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Neural network will be created with wrong input/output dimensions, causing shape mismatch errors during forward
      pass in the futures trading environment
    stage_ids:
    - agent_training
  - id: finance-C-074
    when: When configuring DDPG/TD3/SAC algorithms
    action: Use Ornstein-Uhlenbeck action noise for continuous trading actions
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Random normal noise lacks temporal correlation, producing erratic trading actions that degrade training stability
      and final policy quality compared to OU process designed for continuous control
    stage_ids:
    - agent_training
  - id: finance-C-077
    when: When training DRL models with Stable Baselines3
    action: Use TensorboardCallback to log per-episode reward during training
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without TensorBoard logging, practitioners cannot visualize training progress, detect reward divergence,
      or diagnose training instability issues in real-time
    stage_ids:
    - agent_training
  - id: finance-C-078
    when: When accessing a DRL model by name
    action: Pass unsupported model names to get_model or DRL_prediction methods
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Unsupported model names trigger NotImplementedError, halting the entire training pipeline since the model
      lookup in MODELS dict will fail
    stage_ids:
    - agent_training
  - id: finance-C-079
    when: When using Stable Baselines3 models with action_noise
    action: Map action_noise string keys to NOISE class implementations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Action noise will be passed as string instead of class instance, causing TypeError in Stable Baselines3 model
      constructor since it expects Noise classes not string identifiers
    stage_ids:
    - agent_training
  - id: finance-C-080
    when: When presenting trained model performance results
    action: Claim backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as live trading proof violates financial best practices and misleads stakeholders
      about expected performance, as backtesting suffers from look-ahead bias, overfitting, and ignores execution slippage
    stage_ids:
    - agent_training
  - id: finance-C-081
    when: When computing Sharpe ratio for model validation
    action: Pass zero or near-zero standard deviation daily returns to Sharpe calculation
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Division by zero in Sharpe ratio calculation will crash the ensemble strategy execution, preventing model
      selection and trading deployment
    stage_ids:
    - agent_training
  - id: finance-C-082
    when: When initializing RLlib agent for training
    action: Initialize Ray before creating trainer with init_ray=True
    severity: high
    kind: resource_boundary
    modality: must
    consequence: RLlib operations will fail with Ray connection errors since Ray runtime is not started, preventing any RLlib-based
      agent training from executing
    stage_ids:
    - agent_training
  - id: finance-C-083
    when: When validating ElegantRL model_kwargs input
    action: Handle missing or malformed kwargs with informative ValueError
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Silent failure or cryptic errors will prevent users from understanding why training fails when model_kwargs
      keys don't match expected parameters like learning_rate, batch_size, gamma
    stage_ids:
    - agent_training
  - id: finance-C-084
    when: When loading a trained model from checkpoint
    action: Verify model file exists before attempting load operation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Load operation will raise FileNotFoundError, crashing prediction pipeline and preventing the system from
      generating trading signals from saved models
    stage_ids:
    - agent_training
  - id: finance-C-085
    when: When selecting DRL algorithm for trading
    action: Distinguish between on-policy and off-policy algorithms for proper replay buffer usage
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Off-policy algorithms like DDPG will use experience replay correctly, but on-policy algorithms like PPO will
      suffer from catastrophic forgetting if replay buffer is used inappropriately, degrading policy quality
    stage_ids:
    - agent_training
  - id: finance-C-086
    when: When defining the supported DRL library frameworks
    action: 'Support exactly three DRL libraries: ElegantRL, Stable Baselines3, and RLlib'
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Limiting to three libraries may exclude specialized implementations, but ensures maintainability and prevents
      fragmentation of the agent layer architecture
    stage_ids:
    - agent_training
  - id: finance-C-087
    when: When storing model checkpoints during ensemble training
    action: Save models with unique filenames encoding model name, timesteps, and iteration number
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Models saved with identical filenames will overwrite each other, making it impossible to recover previous
      ensemble iterations or compare different training runs
    stage_ids:
    - agent_training
  - id: finance-C-088
    when: When citing financial backtesting results
    action: Present simulated backtest results as evidence of real execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Claims of real trading success without live execution verification are misleading; backtesting assumes perfect
      execution, ignores slippage, and cannot account for market impact of actual orders
    stage_ids:
    - agent_training
  - id: finance-C-089
    when: When calculating validation Sharpe ratio
    action: Annualize the Sharpe ratio using square root of trading periods scaling factor
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without proper annualization, Sharpe ratios across different validation windows cannot be compared fairly,
      leading to incorrect model selection in the ensemble strategy
    stage_ids:
    - agent_training
  - id: finance-C-090
    when: When configuring ElegantRL futures model parameters
    action: Set max_step to 3000 for futures trading environment
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Incorrect max_step may cause premature termination or excessive episode lengths, affecting training efficiency
      and policy convergence in futures trading scenarios
    stage_ids:
    - agent_training
  - id: finance-C-095
    when: When implementing reward signals for order execution
    action: implement isinstant() method to return True for per-timestep rewards and False for terminal-only rewards
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect isinstant() return value causes reward signals to be delivered at wrong times, corrupting RL agent
      training with either sparse or misaligned feedback
    stage_ids:
    - order_execution
  - id: finance-C-096
    when: When implementing observation classes for order execution
    action: implement BaseObs interface with get_obs() and get_space() methods
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Violation of BaseObs interface causes executor code to fail when swapping between rule-based and RL observation
      strategies, breaking the pluggable observation architecture
    stage_ids:
    - order_execution
  - id: finance-C-098
    when: When terminating trading in MarketEnvironment
    action: set done flag when time horizon reaches zero or shares remaining falls below tolerance threshold of 1
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failure to set done flag causes infinite trading loops or incomplete liquidation, producing invalid simulation
      termination and incorrect episode statistics
    stage_ids:
    - order_execution
  - id: finance-C-099
    when: When executing TWAP, VWAP, or AC strategies
    action: produce order schedules with amounts that sum to the target liquidation quantity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Order schedules that under- or over-execute relative to target cause implementation shortfall to be miscalculated
      and agent training to optimize for wrong objectives
    stage_ids:
    - order_execution
  - id: finance-C-100
    when: When running backtested order execution strategies
    action: claim that simulated implementation shortfall equals expected live trading costs
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest simulations cannot account for real-world factors like slippage, latency, market impact feedback
      loops, and liquidity constraints, causing live results to significantly diverge from backtested performance
    stage_ids:
    - order_execution
  - id: finance-C-101
    when: When initializing MarketEnvironment
    action: set transacting flags to False initially and initialize capture totals to zero
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect initialization causes trades to execute without proper start_transactions() call or produces incorrect
      implementation shortfall calculations due to uninitialized totalCapture
    stage_ids:
    - order_execution
  - id: finance-C-102
    when: When selecting execution policy
    action: configure the correct policy class (TWAP, VWAP, or AC) matching the intended execution strategy
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using wrong policy class produces incorrect order schedules—for example, TWAP ignores volume profiles while
      VWAP ignores risk preferences—leading to suboptimal execution costs
    stage_ids:
    - order_execution
  - id: finance-C-103
    when: When calculating execution price with market impact
    action: subtract temporary impact from current price to get execution price
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect impact subtraction causes fill prices to be calculated wrong, corrupting implementation shortfall
      and PnL calculations throughout the simulation
    stage_ids:
    - order_execution
  - id: finance-C-105
    when: When implementing observation for rule-based agents
    action: construct private state with normalized position, target, time, and max_step_num
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect private state construction causes execution agents to miscalculate remaining execution capacity
      and produce inappropriate trade sizes
    stage_ids:
    - order_execution
  - id: finance-C-106
    when: When initializing AlpacaPaperTrading with drl_lib parameter
    action: pass agent='ppo' with drl_lib values other than 'elegantrl' for multi-crypto trading
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: AlpacaPaperTradingMultiCrypto raises ValueError('Agent input is NOT supported yet.') at line 65 when agent
      is not 'ppo'
    stage_ids:
    - paper_trading
  - id: finance-C-107
    when: When submitting orders to Alpaca API
    action: submit orders with zero or negative quantity
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Zero-quantity orders cause redundant API calls and pollute order history with no trading value
    stage_ids:
    - paper_trading
  - id: finance-C-108
    when: When connecting to Alpaca paper trading API
    action: validate API credentials before trading
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Trading fails silently or raises ValueError when invalid API credentials prevent connection
    stage_ids:
    - paper_trading
  - id: finance-C-109
    when: When specifying time interval for stock trading
    action: 'use only supported intervals: ''1s'', ''5s'', ''1Min'', ''5Min'', ''15Min'''
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unsupported time intervals cause ValueError('Time interval input is NOT supported yet.')
    stage_ids:
    - paper_trading
  - id: finance-C-111
    when: When running paper trading without testing latency
    action: call test_latency() before starting the main trading loop
    severity: high
    kind: operational_lesson
    modality: must
    consequence: High API latency without testing can cause orders to fail silently, positions to miss execution, and equity
      to diverge from expectations
    stage_ids:
    - paper_trading
  - id: finance-C-112
    when: When starting a new paper trading session
    action: cancel each existing open orders before placing new orders
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Leaving open orders from previous sessions can cause unintended execution at stale prices or conflicting
      positions
    stage_ids:
    - paper_trading
  - id: finance-C-113
    when: When trading US stocks during market hours
    action: wait for market to open using awaitMarketOpen() before executing trades
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Orders submitted outside US market hours (9:30 AM - 4:00 PM ET) will fail or be queued until market opens
    stage_ids:
    - paper_trading
  - id: finance-C-114
    when: When monitoring market close timing
    action: stop trading when timeToClose falls below 60 seconds
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Trading too close to market close risks orders not being filled or causing unauthorized overnight positions
    stage_ids:
    - paper_trading
  - id: finance-C-115
    when: When fetching current account state for trading decisions
    action: query Alpaca API directly via list_positions() and get_account() for authoritative state
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using stale local state (self.stocks, self.cash) instead of live API state causes position mismatches and
      potential over-trading
    stage_ids:
    - paper_trading
  - id: finance-C-116
    when: When tracking filled positions and account state
    action: synchronize local position tracking with Alpaca API after each order submission
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Local position state becomes inconsistent with broker state, causing incorrect sizing of subsequent trades
    stage_ids:
    - paper_trading
  - id: finance-C-117
    when: When presenting paper trading results as trading performance
    action: claim that paper trading returns predict live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Paper trading uses simulated fills without real market impact, slippage, or partial fills that occur in live
      trading
    stage_ids:
    - paper_trading
  - id: finance-C-118
    when: When using paper trading system for financial decisions
    action: treat paper trading as financial advice or recommendation to trade real money
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misleading users into believing the software provides financial guidance violates the project's explicit
      disclaimers
    stage_ids:
    - paper_trading
  - id: finance-C-119
    when: When deciding between supported DRL libraries
    action: select 'elegantrl', 'rllib', or 'stable_baselines3' for stock paper trading
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using unsupported DRL library causes ValueError('The DRL library input is NOT supported yet.')
    stage_ids:
    - paper_trading
  - id: finance-C-120
    when: When handling turbulence conditions in trading
    action: liquidate each positions when turbulence index exceeds turbulence_thresh (default=30)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Failing to liquidate during high turbulence can lead to significant losses due to increased market volatility
    stage_ids:
    - paper_trading
  - id: finance-C-123
    when: When initializing StockTradingEnv with numpy arrays
    action: price_array and tech_array MUST be converted to np.float32 dtype
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: State normalization using bit-shift operations (2**-7, 2**-12) will produce incorrect state values, degrading
      training performance
  - id: finance-C-125
    when: When engineering technical indicators that require historical data
    action: Technical indicators MUST be calculated after data is sorted by [time, tic] and NaN timesteps dropped
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Indicators like MACD and Bollinger Bands will be incorrectly calculated on misaligned data, leading to faulty
      trading signals
  - id: finance-C-126
    when: When the data source is alpaca, ricequant, tushare, wrds, or yahoofinance
    action: Turbulence index MUST NOT be requested when it is not supported for the data source
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Unsupported turbulence calculation will return None or unchanged data, causing turbulence_array to be missing
      during environment initialization
  - id: finance-C-131
    when: When submitting orders through Alpaca API during paper trading
    action: Order quantity MUST be converted to positive integer before submission
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Negative or fractional quantities will cause Alpaca API rejection, resulting in failed trades and incorrect
      portfolio state
  - id: finance-C-133
    when: When passing turbulence data from feature engineering to environment simulation
    action: turbulence_array MUST be processed with sigmoid_sign transformation before entering state
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unscaled turbulence values will dominate or be negligible in the state vector, causing unreliable market
      regime detection
  - id: finance-C-134
    when: When calculating technical indicators using stockstats library
    action: StockDataFrame.retype() MUST NOT be called with DataFrame that has duplicate tic-time combinations
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Duplicate entries will cause indicator calculation errors, producing NaN values that corrupt the tech_array
  - id: finance-C-136
    when: When backtesting is presented as paper_trading or live trading results
    action: Backtest performance MUST NOT be presented as expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest returns as indicative of live trading creates misleading expectations; real execution
      involves slippage, latency, and market impact not present in simulation
  - id: finance-C-137
    when: When working with cryptocurrency data (Binance, CCXT sources)
    action: 1-second interval data MUST only be used with Binance data source
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using 1s interval with other sources will raise ValueError, preventing data collection
    stage_ids:
    - data_collection
  - id: finance-C-138
    when: When the data source is yahoofinance
    action: Price columns (open, high, low, close) MUST be adjusted using the adjusted_close/close ratio
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unadjusted prices will cause dividend and split adjustments to be ignored, leading to artificially inflated
      returns during backtesting
  - id: finance-C-139
    when: When passing data from data collection with time_interval specification
    action: 'The time_interval string MUST be in supported format: ''1s'', ''5s'', ''1Min'', ''5Min'', ''15Min'', ''1d'',
      ''1w'', ''1M'''
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unsupported time_interval will cause API errors or incorrect data sampling, corrupting the OHLCV DataFrame
  - id: finance-C-140
    when: When using 1-second interval data from Binance
    action: NaN values in price data MUST be handled before technical indicator calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unfilled NaN values in 1s data will propagate through indicator calculations, producing invalid tech_array
  - id: finance-C-142
    when: When training DRL agents with different libraries (ElegantRL, RLlib, SB3)
    action: Agent type parameter (drl_lib) MUST be one of 'elegantrl', 'rllib', or 'stable_baselines3'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid drl_lib string will raise ValueError, preventing training or trading from starting
  - id: finance-C-143
    when: When extracting price data from the DataFrame for array conversion
    action: The close price column MUST be used for price_array construction (not adjusted_close)
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using adjusted_close directly will create inconsistency with the environment's state representation, leading
      to incorrect portfolio valuations
  - id: finance-C-144
    when: When using technical indicators in the environment state
    action: NaN values in tech_array MUST be replaced with 0 before passing to environment
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN values will cause numerical instability in neural network training and produce invalid state representations
  - id: finance-C-147
    when: When filling missing data values
    action: Apply backward-fill then forward-fill per ticker before any technical indicator calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Talib and stockstats indicators produce NaN or garbage when input contains leading NaN rows; NaN technical
      indicators corrupt the state vector and destabilize the policy network gradient
  - id: finance-C-148
    when: When implementing any trading environment
    action: Process SELL orders before BUY orders within each step() call — the sell loop must execute completely before the
      buy loop begins
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If buy orders are processed before sells, the cash balance used for buy decisions includes proceeds from
      sells that have not yet been settled, inflating available capital and producing impossible trading states
  - id: finance-C-149
    when: When passing data to StockTradingEnv
    action: Include a turbulence column in the DataFrame; when turbulence is unavailable, provide a column of zeros — never
      omit the turbulence column
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The environment's state vector has a fixed layout including turbulence at index 1; a missing column causes
      the tech_array to be misaligned with price_array, producing garbage state values and undefined behavior
  - id: finance-C-150
    when: When computing technical indicators from price data
    action: Apply shift(1) or equivalent lag to price-based indicators before using them as state features
    severity: high
    kind: domain_rule
    modality: must
    consequence: Technical indicators computed on the current candle's close price create look-ahead bias — the agent sees
      information not yet available at decision time, inflating backtest returns and causing live underperformance
  - id: finance-C-151
    when: When defining reward scaling in any trading environment
    action: Use power-of-2 inverse scaling (2^-n) — default reward_scaling=2^-11 for StockTradingEnv
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unscaled raw PnL values cause gradient explosion in policy networks with float32 precision, leading to training
      divergence or NaN losses
  - id: finance-C-152
    when: When normalizing state values for policy network input
    action: Apply power-of-2 scaling (2^-n) to state components — cash uses 2^-12, prices use 2^-6, tech indicators use 2^-7
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: State values outside the [-1, 1] range saturate tanh/sigmoid activations, making the policy network effectively
      blind to large cash or price magnitudes
  - id: finance-C-153
    when: When using impact_models.py for market impact-aware backtesting
    action: Call end_day() at the conclusion of each trading day to apply exponential decay to accumulated permanent impact
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without end_day() calls, permanent impact state accumulates without decay, causing impact costs to be overstated
      in multi-day backtests and misrepresenting realistic trading costs
  - id: finance-C-154
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live returns — backtesting ignores market impact, financing costs,
      execution delays, and order-fill uncertainty
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-155
    when: When presenting paper trading results from AlpacaPaperTrading
    action: Present paper trading results as proof of real-money live trading capability — AlpacaPaperTrading uses simulated
      fills and does not execute in real markets
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users believe the strategy is production-ready after seeing paper trading results; live execution reveals
      API latency, fill reliability, and capital constraints absent from simulation
  - id: finance-C-156
    when: When using FinRL-Meta for any production trading scenario
    action: Claim support for real-time production trading without modification — FinRL-Meta is a backtesting and research
      framework, not a production trading system
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy the system in live markets without proper risk controls, order management, and circuit breakers,
      resulting in uncontrolled losses
  - id: finance-C-157
    when: When using data from YahooFinance
    action: Claim that YahooFinance data provides real-time market data — yfinance delivers delayed data (approximately 15-minute
      delay for free tier)
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Trading strategies relying on yfinance data for intraday decisions operate on stale prices, causing fills
      at outdated prices and systematic losses during fast market conditions
  - id: finance-C-158
    when: When interpreting Sharpe ratios and performance metrics from backtests
    action: Claim that in-sample or backtest Sharpe ratios predict out-of-sample or live trading performance — backtested
      metrics overestimate due to overfitting and optimistic cost assumptions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Investors allocate capital based on inflated Sharpe ratios; live trading Sharpe falls dramatically due to
      transaction costs, slippage, and regime changes not captured in backtesting
  - id: finance-C-159
    when: When using fixed-cost transaction models (BaselineImpactModel) for live trading estimates
    action: Claim that the fixed-basis-point cost model accurately represents real-world trading costs — the 10bps baseline
      ignores market impact that scales with order size and liquidity
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Large orders face non-linear market impact costs far exceeding 10bps; strategies optimized for the baseline
      model enter positions at unfavorable prices in live trading
  - id: finance-C-160
    when: When accessing market data through supported data sources
    action: 'Acknowledge that each data source has specific limitations: turbulence not available for binance/ccxt/iexcloud/joinquant/quantconnect;
      VIX not available for crypto sources; time intervals vary by source'
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Attempting to call add_turbulence() or add_vix() on unsupported sources produces no data, causing KeyError
      or NaN in the turbulence column of the environment state
  - id: finance-C-161
    when: When requesting intraday data (1s, 1min, 5min intervals)
    action: Use Binance as the data source for 1-second interval data — no other source supports 1s granularity
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Requesting 1s interval from non-Binance sources raises ValueError at data_processor.py:161-163, halting the
      entire pipeline
    stage_ids:
    - data_collection
  - id: finance-C-163
    when: When setting the turbulence threshold for trading decisions
    action: Calculate the turbulence threshold as the 90th percentile of in-sample turbulence data — never use the full maximum
      or mean
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using a threshold that is too high causes the agent to ignore market stress conditions, entering positions
      during high-volatility regimes where losses accelerate
  - id: finance-C-164
    when: When normalizing timezone-aware timestamps for plotting and performance statistics
    action: Localize naive timestamps to UTC before passing to pyfolio — pyfolio requires UTC-aware DatetimeIndex
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Passing timezone-naive timestamps to pyfolio.timeseries.perf_stats raises TypeError or produces incorrect
      annualized returns due to AmbiguousTimeError
  - id: finance-C-165
    when: When using the DataProcessor factory to instantiate data processors
    action: Pass valid DataSource enum values — raw string data_source names will be silently ignored and raise a generic
      exception at connection time
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Invalid data_source values cause the processor dictionary lookup to return None, resulting in AttributeError
      when calling download_data on the None object
    stage_ids:
    - data_collection
  - id: finance-C-168
    when: When implementing order generation logic in backtesting
    action: Skip orders with zero target amount rather than executing them — do not attempt to process zero-quantity trades
    severity: high
    kind: domain_rule
    modality: must
    consequence: Executing zero-target orders causes unnecessary processing overhead and potential division-by-zero errors
      in downstream calculations; skipping provides clear boundary behavior
    derived_from_bd_id: BD-038
  - id: finance-C-169
    when: When configuring reinforcement learning agent training for stock trading
    action: Verify gamma=0.99 reward decay parameter matches the strategy's investment horizon; adjust to lower values (e.g.,
      0.95) for shorter-horizon strategies or higher values (e.g., 0.999) for longer horizons
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default gamma=0.99 accumulates discounted rewards over long episodes; short-term strategies may learn suboptimal
      policies due to reward signal dilution, causing backtest returns to diverge from live performance
    derived_from_bd_id: BD-009
  - id: finance-C-170
    when: When implementing action scaling for stock trading policies
    action: Normalize each policy outputs to [-1,1] range, then scale by max_stock at environment step execution — policy
      outputs normalized actions regardless of portfolio size
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing [-1,1] normalization causes policy architecture mismatch; actions outside this range cannot be
      properly scaled by max_stock, leading to incorrect share quantities
    derived_from_bd_id: BD-008
  - id: finance-C-171
    when: When implementing or refactoring the performance evaluation metric calculation
    action: Calculate GLR (Gain/Loss Ratio) using the formula -mean(positive)/mean(negative) — verify negative sign is applied
      to produce positive GLR for favorable trading edge
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing GLR calculation to median-based or removing the negative sign would invert the metric interpretation,
      causing strategies with negative edge to appear favorable and leading to deployment of losing strategies
    derived_from_bd_id: BD-050
  - id: finance-C-172
    when: When using the framework's default buy_cost parameter for crypto backtesting
    action: Verify that buy_cost=0.001 (0.1%) matches actual crypto exchange fee structure including maker/taker spreads and
      network fees, and adjust if the target exchange has different fee tiers
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default 0.1% buy cost may overestimate profitability for low-fee exchanges (0.05%) or underestimate
      for high-fee exchanges (0.2%), causing backtest results to diverge from live trading P&L by up to 0.15% per round-trip
    derived_from_bd_id: BD-023
  - id: finance-C-173
    when: When implementing ensemble model selection using rolling train/val/test windows
    action: Validate that the rolling window validation period represents typical market conditions — check for volatility
      regime shifts, trend reversals, or crisis periods that could cause Sharpe ratio selection to favor overfitted models
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Rolling validation windows that include unusual volatility periods cause Sharpe-based model selection to
      favor strategies that exploit validation anomalies, resulting in deployed models that underperform on representative
      test data and live trading
    derived_from_bd_id: BD-014
  - id: finance-C-174
    when: When implementing order execution cost modeling using Almgren-Chriss market impact
    action: Verify that permanent impact coefficient (γ) and temporary impact parameters (ε, η) are calibrated to the specific
      asset liquidity profile — high-liquidty assets require different coefficients than low-liquidity assets
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default Almgren-Chriss market impact parameters without liquidity calibration causes execution cost
      overestimation for liquid assets (making strategies appear less profitable) and underestimation for illiquid assets
      (causing live execution slippage beyond backtest estimates)
    derived_from_bd_id: BD-017
  - id: finance-C-175
    when: When transferring policies between stock trading and crypto trading environments or ensembling models from both
    action: Transfer policies or ensemble models directly between environments with different normalization ranges without
      standardizing state and reward scaling — stock env uses [-1,1] state normalization while crypto env clips rewards to
      [-100,100]
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Direct policy transfer between environments with mismatched state/reward normalization causes gradient explosion
      during training updates because reward magnitudes differ by 100x from state magnitudes, leading to unstable training
      and divergent policy updates
    derived_from_bd_id: BD-150
  - id: finance-C-176
    when: When selecting models for deployment based on validation Sharpe ratio with rolling train/val/test windows
    action: Cross-validate model selection using multiple non-overlapping validation periods to verify selected models are
      not exploiting validation period anomalies — avoid deploying models selected solely on a single rolling window Sharpe
      ratio
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Single-period Sharpe-based model selection from rolling windows that include unusual volatility causes deployment
      of overfitted models that exploit validation anomalies, resulting in live trading performance significantly below validation
      Sharpe expectations
    derived_from_bd_id: BD-153
  - id: finance-C-177
    when: When deploying models in production trading systems
    action: Assume the framework automatically binds model versions to data versions — the framework does not implement model-data
      version snapshot binding, leading to potential reproducibility failures when model is trained on different data than
      deployed
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without model-data version binding, production systems may load a model trained on a different data version
      than expected, causing silent prediction quality degradation that manifests as P&L divergence between training validation
      and live trading
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-178
    when: When implementing data collection and model deployment pipelines
    action: Implement version tracking that binds model checkpoint hash to data version identifier and validates version match
      at inference time — store version manifest alongside model artifacts and check compatibility before loading
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without version binding, models trained on different data versions may be deployed in production, causing
      silent prediction drift that leads to trading strategies operating on stale patterns while market regime has shifted
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-179
    when: When calculating risk-adjusted performance metrics across different components of the trading platform
    action: Use inconsistent annualization assumptions (240 trading days in one component versus 250 trading days in another)
      when comparing Sharpe ratios or other annual risk metrics
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Inconsistent annualization creates misaligned Sharpe ratios and contradictory risk metrics across the platform,
      making performance comparisons unreliable and potentially leading to incorrect capital allocation decisions based on
      inconsistent benchmark calculations
    derived_from_bd_id: BD-154
  - id: finance-C-180
    when: When implementing stock filtering logic in backtesting data collection
    action: Filter paused stocks using the paused flag check before signal generation — do not include halted stocks in trading
      decisions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including paused stocks in signal generation causes incorrect trading decisions based on stale prices, as
      halted stocks cannot be traded at their displayed prices in live markets
    derived_from_bd_id: BD-073
  - id: finance-C-181
    when: When implementing portfolio risk estimation in portfolio optimization
    action: Use covariance matrix for risk estimation to capture asset correlations and enable diversification benefits —
      do not replace with single-asset variance or factor models
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using single-asset variance ignores diversification effects, causing portfolio to concentrate risk and fail
      to achieve optimal risk-adjusted returns
    derived_from_bd_id: BD-075
  - id: finance-C-182
    when: When implementing action scaling in continuous trading environments
    action: Bound action space to [-1, 1] range for symmetric long/short/allocation decisions — do not use asymmetric bounds
      like [0, 1] or unbounded actions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using unbounded actions or asymmetric bounds causes numerical instability in gradient computation and breaks
      symmetry assumptions in policy networks
    derived_from_bd_id: BD-076
  - id: finance-C-183
    when: When configuring market impact model parameters for execution optimization
    action: Verify gamma=0.1 matches actual market microstructure — if eta (permanent impact) differs significantly from gamma,
      adjust gamma to maintain balanced impact profile
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Mismatched gamma relative to eta distorts optimal execution timing, causing strategies to either overpay
      for execution or experience excessive market impact
    derived_from_bd_id: BD-033
  - id: finance-C-184
    when: When calculating VWAP benchmarks for execution quality evaluation
    action: 'Use Simpson''s rule VWAP formula: (open + 2*high + 2*low + close)/6 — do not use simple OHLC/4 average which
      underweights price extremes'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple OHLC/4 average for VWAP underweights price extremes, causing benchmark to misrepresent typical
      execution prices and distort performance attribution
    derived_from_bd_id: BD-035
  - id: finance-C-185
    when: When implementing price normalization for cross-market feature engineering
    action: Use 240-minute (4-hour) reference window for price normalization — verify window captures meaningful baselines
      and adjust for specific market characteristics if needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using shorter windows (30 min) creates volatile baselines causing noisy features; using longer windows (1
      day) lags market shifts causing stale features
    derived_from_bd_id: BD-036
  - id: finance-C-186
    when: When handling missing features at time=-1 in observation preprocessing
    action: Fill missing features at time=-1 with zeros — do not use forward-fill (propagates stale values) or backward-fill
      (leaks future information)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Forward-fill propagates stale values causing model to see outdated information; backward-fill leaks future
      prices causing look-ahead bias in backtests
    derived_from_bd_id: BD-043
  - id: finance-C-187
    when: When implementing RSRS factor calculation for trend strength estimation
    action: Use OLS regression to estimate beta from high-low relationship — do not use exponential smoothing or alternative
      beta parameterizations without validation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Insufficient lookback data leads to noisy beta estimates causing unreliable trend signals; excessive lookback
      lags regime detection causing delayed strategy responses
    derived_from_bd_id: BD-114
  - id: finance-C-188
    when: When implementing optimal execution trajectory calculation
    action: Use arccosh formula for kappa in Almgren-Chriss model — alternative closed-form solutions or numerical optimization
      may cause unbounded numerical behavior
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Alternative kappa parameterizations can cause unbounded trajectory calculations, leading to negative execution
      times or numerically unstable liquidation schedules
    derived_from_bd_id: BD-118
  - id: finance-C-189
    when: When calculating turbulence index for market regime detection
    action: Use exponential weighted covariance for turbulence index — verify halflife parameter matches desired responsiveness
      to recent market conditions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Shorter halflife increases responsiveness but causes noise sensitivity; longer halflife smooths regime changes
      but delays detection of market stress
    derived_from_bd_id: BD-126
  - id: finance-C-190
    when: When implementing continuous action exploration in DRL agent training
    action: Use Ornstein-Uhlenbeck process for temporally correlated noise with theta=1.0 (mean reversion speed), mu=0 (zero-centered
      exploration), and explicit sigma parameter for action perturbation magnitude
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using independent Gaussian noise instead of OU process breaks temporal correlation in exploration, causing
      the agent to lose action continuity that physical control systems require, leading to unstable training and divergence
      from optimal policies
    derived_from_bd_id: BD-104
  - id: finance-C-191
    when: When implementing Bollinger Bands indicator for volatility-based support/resistance detection
    action: Use 20-period moving average with 2 standard deviation band width per John Bollinger's original specification,
      ensuring ~95% price distribution capture under normal market conditions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing period or SD width alters statistical capture ratio (1 SD captures ~68%, 3 SD captures ~99.7%),
      causing Bollinger Bands signals to reference incorrect volatility-adjusted price ranges and generating false breakouts
      or missed opportunities
    derived_from_bd_id: BD-113
  - id: finance-C-192
    when: When implementing prioritized experience replay for DRL training
    action: Use alpha=0.6 for prioritization strength and beta=0.4 for importance sampling correction as specified by Schaul
      et al.; alpha controls how much TD error affects sampling probability, beta corrects resulting sampling bias
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting alpha=0 disables prioritization entirely; setting alpha=1 causes severe sampling bias without correction;
      wrong beta values lead to biased gradient updates that either overfit to rare high-TD-error experiences or underfit
      by ignoring priority signals
    derived_from_bd_id: BD-116
  - id: finance-C-193
    when: When converting unbounded actor outputs to valid portfolio weight distributions
    action: Use softmax normalization to transform actor outputs into portfolio weights that sum to 1.0 with non-negative
      allocations; control weight concentration via temperature parameter (high temperature produces uniform weights, low
      temperature produces extreme weights)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Replacing softmax with sigmoid plus normalization enables shorting which fundamentally changes the portfolio
      strategy; direct simplex projection may produce non-differentiable boundaries that break gradient-based actor training
    derived_from_bd_id: BD-119
  - id: finance-C-194
    when: When aggregating multiple value estimates from historical states
    action: Use softmax attention mechanism to derive attention weights from compatibility scores for differentiable aggregation;
      control attention sharpness via temperature parameter (low temperature sharpens focus on highest-compatibility states)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Replacing softmax attention with hard attention or Gumbel-softmax breaks differentiability required for gradient-based
      learning; single-head attention limits expressiveness but maintains stable training whereas multi-head attention may
      overfit without sufficient data
    derived_from_bd_id: BD-122
  - id: finance-C-195
    when: When selecting the best model from an ensemble for deployment
    action: Select the model with highest validation Sharpe ratio for ensemble deployment, balancing returns against risk
      to prevent overfitting to raw returns; do not use pure return-based or maximum drawdown-based selection
    severity: high
    kind: domain_rule
    modality: must
    consequence: Selecting based on raw returns ignores risk-adjusted performance, favoring high-volatility strategies that
      appear superior but may underperform in live trading; drawdown-based selection is overly conservative and may select
      inferior strategies that happened to avoid recent drawdowns
    derived_from_bd_id: BD-062
  - id: finance-C-196
    when: When training DRL models with default hyperparameters
    action: Verify that 200,000 timesteps is sufficient for convergence by monitoring policy loss and returns during training;
      extend training if loss has not stabilized or returns are still improving at the boundary
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 200,000 timesteps without checking convergence causes underfitted policies that underperform in live
      trading; strategies requiring more complex policy representations will systematically underperform despite appearing
      well-tuned on the training curve
    derived_from_bd_id: BD-063
  - id: finance-C-197
    when: When splitting data into training and testing sets
    action: Verify that the turbulence threshold correctly identifies market regime changes by checking that test sets include
      sufficient stress periods; if test set lacks stress periods, adjust threshold downward to capture earlier regime transitions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using turbulence threshold without verification causes regime-blind evaluation where strategies are tested
      primarily on calm market data and appear robust but fail catastrophically during stress periods not represented in the
      test set
    derived_from_bd_id: BD-068
  - id: finance-C-198
    when: When implementing data collection logic in backtesting
    action: 'Assume the framework automatically handles each required data fields (gap field: 8) — this field is not implemented;
      missing values will propagate silently through the pipeline'
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Missing required data field (8) causes silent propagation of null values through backtesting pipeline, leading
      to incomplete signals and inaccurate equity curve calculations that may not raise explicit errors
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-199
    when: When collecting data for backtesting or live trading
    action: Explicitly handle the missing data field (8) by implementing validation checks, providing default values, or failing
      fast with clear error messages — do not let missing values silently propagate
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit handling of missing data field (8), backtest results become unreliable and live trading
      may execute on corrupted data, causing unpredictable trading outcomes
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-200
    when: When implementing risk modeling or position sizing in backtesting
    action: Assume the framework handles GARCH or tail risk modeling — these volatility models are not implemented; the system
      uses constant or rolling historical volatility assumptions instead
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without GARCH/tail risk modeling, the system underestimates volatility clustering and tail events, leading
      to over-leveraged positions during market stress that cause catastrophic losses in live trading
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-201
    when: When implementing feature engineering or reward calculation in trading strategies
    action: Normalize profit/loss by the capital base (default 1,000,000) to enable scale-independent policy learning — do
      not use raw P&L values directly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using unnormalized P&L causes policies optimized for one account size to fail at different scales, leading
      to over-trading in small accounts or under-utilization in large accounts
    derived_from_bd_id: BD-084
  - id: finance-C-202
    when: When implementing feature normalization in neural network-based trading strategies
    action: Use sigmoid normalization with threshold=30 for bounded feature scaling — do not replace with raw values, tanh,
      or min-max normalization without validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using raw or improperly bounded features causes gradient explosion in neural network training, leading to
      unstable convergence or NaN weights that produce invalid trading signals
    derived_from_bd_id: BD-085
  - id: finance-C-203
    when: When implementing momentum signals in trading strategies
    action: Use multi-period RSI with periods 6, 12, and 24 to capture short, medium, and long-term overbought/oversold conditions
      — do not simplify to single-period RSI
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using single-period RSI loses multi-timescale granularity, causing the strategy to miss medium-term trends
      and generate false signals that increase trading costs and reduce returns
    derived_from_bd_id: BD-087
  - id: finance-C-204
    when: When implementing trailing stop logic in trading strategies
    action: Use Parabolic SAR with acceleration=0 and maximum=0 for conservative stable reference behavior — if changing SAR
      parameters, validate against whipsaw frequency and trend detection accuracy
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using aggressive SAR parameters causes excessive whipsaw trades, increasing transaction costs and generating
      false trend reversal signals that erode strategy profitability
    derived_from_bd_id: BD-091
  - id: finance-C-205
    when: When calculating risk-adjusted performance metrics for strategy evaluation
    action: Calculate Sharpe ratio using daily risk-free rate for standard risk-adjusted performance — do not use annualized
      risk-free rate without adjusting volatility estimation accordingly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using mismatched risk-free and volatility time scales distorts Sharpe ratio calculation, causing incorrect
      strategy ranking that selects inferior strategies for live deployment
    derived_from_bd_id: BD-092
  - id: finance-C-206
    when: When calculating Sortino ratio for strategy risk evaluation
    action: Calculate Sortino ratio using downside deviation based only on negative returns — do not use full standard deviation
      which penalizes upside volatility
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using full deviation in Sortino calculation incorrectly penalizes upside volatility, misrepresenting risk-adjusted
      returns and potentially rejecting profitable strategies with occasional large gains
    derived_from_bd_id: BD-093
  - id: finance-C-207
    when: When annualizing returns or performance metrics for comparison
    action: Use 240 trading days for annualization to account for US market holidays and weekends — do not use 252 or 365
      without explicit justification
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using incorrect trading day counts for annualization causes misleading year-over-year comparisons, either
      overestimating returns (365 days) or misaligning with actual market exposure (252 days)
    derived_from_bd_id: BD-095
  - id: finance-C-208
    when: When calculating drawdown metrics for risk management
    action: Calculate maximum drawdown from cumulative returns peak (peak-to-trough) — do not use simple point-to-point drawdown
      which misses recovery tracking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using point-to-point drawdown misses peak tracking, misrepresenting actual capital preservation risk and
      potentially allowing strategies with large hidden drawdowns to pass risk limits
    derived_from_bd_id: BD-096
  - id: finance-C-209
    when: When implementing mean-variance portfolio optimization
    action: Verify that risk_aversion parameter is calibrated to investor risk tolerance and market regime; typical values
      range from 1.0 (moderate) to 5.0 (conservative); higher values increase diversification but reduce expected returns
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect risk_aversion leads to portfolios that are either too concentrated (low values) or too diversified
      (high values), causing either excessive volatility or suboptimal risk-adjusted returns that deviate from intended investment
      objectives
    derived_from_bd_id: BD-108
  - id: finance-C-210
    when: When scaling rewards for neural network training in stock trading environments
    action: Verify that 2^-11 (approximately 0.000488) scaling produces gradient magnitudes suitable for the optimizer; monitor
      gradient norms during training and adjust scaling if gradients are too small (vanishing) or too large (exploding)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Insufficient reward scaling causes saturating activations leading to vanishing gradients and failed training;
      excessive scaling causes gradient explosion resulting in unstable policy updates and policy collapse
    derived_from_bd_id: BD-110
  - id: finance-C-211
    when: When calculating annualized Sharpe ratio from periodic returns
    action: Use 4**0.5 annualization only when quarterly returns are independent and identically distributed; for autocorrelated
      returns, use 252 trading days annualization or apply Newey-West standard errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: IID-based annualization underestimates true Sharpe volatility for autocorrelated returns, inflating risk-adjusted
      performance metrics and causing strategies to appear more attractive than actual risk-adjusted returns justify
    derived_from_bd_id: BD-105
  - id: finance-C-212
    when: When calculating optimal liquidation trajectory using Almgren-Chriss model
    action: Verify that annual_volatility=0.12 matches the specific asset's realized volatility; for volatile assets (VIX>25)
      use 0.20, for stable assets (VIX<15) use 0.08
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Incorrect volatility parameter causes suboptimal execution trajectories: high volatility with low parameter
      underestimates market impact urgency, causing excessive price movement; low volatility with high parameter causes unnecessarily
      aggressive liquidation'
    derived_from_bd_id: BD-106
  - id: finance-C-213
    when: When estimating market impact costs using square-root law model
    action: Use Y=0.6 empirical coefficient for equity markets with typical liquidity; use Y=0.5 for highly liquid index products;
      use Y=1.0 for illiquid assets or stress periods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using theoretical Y=0.5 on less liquid stocks underestimates market impact, causing execution costs to exceed
      backtest projections by 20-40%; using Y=0.6 on liquid assets overestimates costs, leading to unnecessarily conservative
      position sizing
    derived_from_bd_id: BD-107
  - id: finance-C-214
    when: When configuring market regime detection parameters in turbulence-based risk management
    action: Verify turbulence threshold percentile matches expected regime boundaries; be aware that 90th percentile may cause
      delayed risk-off responses in rapidly deteriorating markets and premature responses in slowly building volatility
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using a 90th percentile turbulence threshold may cause the risk management system to activate too late during
      sudden market crashes or too early during gradual volatility increases, resulting in either delayed protective action
      or unnecessary trading friction
    derived_from_bd_id: BD-115
  - id: finance-C-215
    when: When configuring the Average-CVaR utility function for order execution optimization
    action: Verify that lambda parameter is explicitly configured for the desired risk-return tradeoff; verify CVaR tail percentile
      (95%) aligns with the strategy's downside risk tolerance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit lambda configuration, the default risk aversion setting may not match the strategy's intended
      risk profile, causing either excessive conservative trading (high lambda) or unacceptable downside exposure (low lambda)
      in live execution
    derived_from_bd_id: BD-120
  - id: finance-C-216
    when: When using KDJ stochastic oscillator for trading signal generation
    action: Verify KDJ parameters N=9, M1=3, M2=3 match the desired indicator responsiveness; be aware that smaller windows
      increase sensitivity and noise while larger windows introduce lag
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default KDJ parameters without tuning for specific market conditions may produce either excessive false
      signals (small windows) or delayed entries/exits (large windows), causing systematic underperformance in live trading
    derived_from_bd_id: BD-121
  - id: finance-C-217
    when: When computing daily volatility from annual volatility for position sizing or risk calculation
    action: Verify that sqrt(250) annualization factor matches the actual trading calendar; be aware that using 252 or realized
      volatility estimation may produce materially different daily volatility estimates
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using sqrt(250) annualization assumes exactly 250 trading days and IID log-normal returns; if the actual
      market has different trading conventions or if returns exhibit serial correlation, daily volatility estimates will be
      systematically biased, causing incorrect position sizing
    derived_from_bd_id: BD-123
  - id: finance-C-218
    when: When adding technical indicators using add_technical_indicator() without explicit library specification
    action: Verify that STOCKSTATS library default produces acceptable indicator accuracy for the strategy; be aware that
      TA-Lib may produce different numerical values due to algorithm differences
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using STOCKSTATS as the default library without verification may introduce silent discrepancies in indicator
      calculations compared to TA-Lib, causing different trading signals and inconsistent backtest-live performance
    derived_from_bd_id: BD-129
  - id: finance-C-219
    when: When configuring reward scaling for StockTradingEnv neural network training
    action: Verify that reward_scaling=2**-11 provides stable gradient descent for the strategy's reward magnitude; adaptive
      scaling or asset-specific normalization may be needed for strategies with different reward ranges
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using the hardcoded reward_scaling=2**-11 without matching it to the actual reward distribution may cause
      gradient explosion or vanishing, leading to training instability and poor policy convergence in live trading
    derived_from_bd_id: BD-130
  - id: finance-C-220
    when: When processing data for DRLEnsembleAgent or any turbulence-dependent trading environment
    action: Verify turbulence column is present in input data and calculated as 90th percentile of insample data; missing
      turbulence column causes policy selection failures and regime detection breakdown
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without a turbulence column in the data, the framework's turbulence-based regime detection will fail silently
      or throw errors, causing trading policies to default to inappropriate regimes and resulting in catastrophic losses during
      high-volatility market conditions
    derived_from_bd_id: BD-136
  - id: finance-C-221
    when: When ingesting market data into any trading environment
    action: 'Verify input data contains required column names: tic, time, open, high, low, close, adjusted_close, volume with
      correct data types and no missing values; clean_data() will fail with validation errors for any schema mismatch'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Providing data with mismatched column names (e.g., 'symbol' instead of 'tic', 'adj_close' instead of 'adjusted_close')
      causes immediate validation failure in clean_data(), preventing backtesting from running and blocking strategy deployment
    derived_from_bd_id: BD-137
  - id: finance-C-222
    when: When implementing or modifying data processing pipelines that feed into feature engineering or environment simulation
    action: Verify column renaming (date→time, datetime→time) occurs immediately after raw data download and before any technical
      indicator calculation
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Inconsistent column names cause downstream feature engineering and environment simulation to fail or produce
      incorrect results, as they expect predictable column names regardless of source API format
    derived_from_bd_id: BD-002
  - id: finance-C-223
    when: When training reinforcement learning models using FinRL's stock trading environment
    action: Apply reward scaling factor of 2^-11 (0.00048828125) to normalize rewards to approximately [-1,1] range before
      computing training gradients
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper reward scaling, gradient explosion occurs in policy gradient methods, causing training instability
      and model divergence from expected behavior
    derived_from_bd_id: BD-007
  - id: finance-C-224
    when: When implementing test evaluation logic for the execution environment
    action: Process test instruments in sequential order as defined by the test sampler — do not introduce random shuffling,
      parallel processing, or non-deterministic ordering during test evaluation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-deterministic test ordering causes backtest results to vary across runs, making it impossible to reproduce
      published performance metrics or compare model improvements reliably
    derived_from_bd_id: BD-040
  - id: finance-C-225
    when: When constructing the observation space for the order execution agent
    action: Include each private execution state components (position, target, time, max_steps) in the observation returned
      to the agent — do not remove or partially observe these fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing private state from observations creates partial observability, causing the agent to make suboptimal
      execution decisions that would not occur in live trading where this information is available
    derived_from_bd_id: BD-041
  - id: finance-C-226
    when: When initializing the trading environment for agent training
    action: Verify that the reward type parameter (instant vs end-of-episode) matches the intended training regime before
      starting training; switching requires full environment recreation since reward type is fixed per training run
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Training with mismatched reward type produces agents optimized for wrong objectives; instant rewards favor
      frequent updates but may not emphasize final execution quality, leading to agents that perform well in training but
      poorly in live trading
    derived_from_bd_id: BD-019
  - id: finance-C-227
    when: When configuring the stock trading environment
    action: Verify that the cool_down period (steps since last trade per stock) aligns with the strategy's transaction cost
      profile and regulatory requirements for wash trading prevention; adjust the default cooldown if needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default cool_down period may not match actual broker constraints or regulatory limits; strategies tuned with
      wrong cooldown assumptions will either incur excessive transaction costs or fail to execute desired trading patterns
      in live trading
    derived_from_bd_id: BD-010
  - id: finance-C-228
    when: When implementing or modifying turbulence-based trading condition logic in the environment
    action: Remove or modify the 99th percentile threshold for turbulence_bool without ensuring the binary flag accurately
      reflects extreme market conditions — the binary encoding forces sell-each behavior during market instability and provides
      a clear risk management signal
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Changing the turbulence boolean encoding to a continuous value without proper threshold handling removes
      the explicit market-regime signal, causing the risk-off policy to not trigger during volatile periods and potentially
      holding losing positions longer
    derived_from_bd_id: BD-006
  - id: finance-C-229
    when: When using the environment's state normalization for neural network training or inference
    action: 'Replace the fixed power-of-2 scaling (cash: 2^-12, prices: 2^-6) with arbitrary normalization parameters — the
      scaling ensures state values remain within [-1,1] required for stable neural network forward passes; learned normalization
      layers would break state consistency across training runs'
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Using learned normalization layers or non-power-of-2 scaling breaks state space consistency across training
      episodes, causing the neural network to receive inputs outside the [-1,1] range it was trained on and leading to unstable
      forward passes or diverged gradients
    derived_from_bd_id: BD-012
  - id: finance-C-230
    when: When implementing the environment's state representation
    action: 'Verify each continuous state features use the fixed power-of-2 scaling (cash: 2^-12, prices: 2^-6) while binary
      features (position_held, turbulence_bool) pass through unchanged — verify no learned normalization layers are inserted
      before the state is returned to the agent'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inserting learned normalization layers breaks the fixed state space contract, causing the agent to receive
      inconsistent state distributions across training episodes and potentially degrading convergence
    derived_from_bd_id: BD-012
  - id: finance-C-231
    when: When implementing or modifying the crisis policy selection logic in DRLEnsembleAgent
    action: Remove the turbulence threshold check or replace it with a fixed numeric value different from the 99th percentile
      — the threshold determines when to switch from normal trading to risk-off strategies based on market volatility regime;
      removing it breaks regime detection entirely
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Removing the turbulence threshold check causes the agent to never switch to crisis policies during market
      instability, holding positions through severe drawdowns and potentially incurring losses 20-50% greater than strategies
      with proper regime detection
    derived_from_bd_id: BD-145
  - id: finance-C-233
    when: When implementing or deploying trading strategies across multiple trading environments
    action: Verify consistent execution order across each environments — verify that regulatory compliance requirements (sell-before-buy
      for stocks, cover-short-before-buy-long for margin) are enforced per environment type, and document which ordering applies
      to each strategy deployment target
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Strategies that appear profitable in backtests due to favorable execution ordering may violate regulatory
      compliance rules when deployed in a different environment, leading to live trading failures and potential legal penalties
    derived_from_bd_id: BD-155
  - id: finance-C-234
    when: When designing event-driven architecture for real-time trading updates using MQ topic-based pub/sub
    action: Rely on MQ topic-based pub/sub for scenarios requiring guaranteed message ordering or exactly-once delivery —
      the current architecture does not support these guarantees
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Event-driven architecture breaks when message ordering is violated, causing trading notifications to arrive
      out of sequence and potentially triggering incorrect order modifications or state updates
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-235
    when: When implementing event-driven architecture for real-time trading updates
    action: Add message sequence IDs or implement an event store with ordering guarantees to verify consistent event processing
      across each consumers (monitor, logger, notifier)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without ordering guarantees, notifications may be processed out of sequence, leading to inconsistent system
      state and potentially triggering wrong trading actions based on stale market data
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-236
    when: When configuring the AC utility function risk aversion parameter (λ) for liquidation or execution optimization
    action: Validate that λ is explicitly configured based on asset volatility and liquidation urgency requirements — do not
      use default values without verification; λ=1e-6 for conservative market impact minimization, λ=1e-4 for aggressive execution
      risk reduction
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using incorrect λ values causes execution policies to either over-trading (high λ) with excessive market
      impact costs, or under-trading (low λ) with unacceptable liquidation risk exposure
    derived_from_bd_id: BD-018
  - id: finance-C-237
    when: When implementing market impact models in execution optimization environments
    action: Mix different market impact model assumptions (square-root law vs Almgren-Chriss linear permanent impact) across
      environments — agents trained under one model will have miscalibrated execution cost expectations when deployed under
      the other
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Using contradictory market impact models causes execution cost estimates to differ by 10-30% for large orders,
      leading to suboptimal policy optimization and significant trading cost overruns in live deployment
    derived_from_bd_id: BD-149
  - id: finance-C-238
    when: When selecting market impact models for execution optimization
    action: Standardize on a single market impact model across each trading environments, ensuring consistent execution cost
      estimates and policy optimization — either square-root law (BD-107 with Y=0.6) or Almgren-Chriss decomposition (BD-031
      with gamma coefficient)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent market impact models across environments cause backtest-live discrepancy where strategies optimized
      under one model produce different execution costs under another, making performance comparisons unreliable
    derived_from_bd_id: BD-149
  - id: finance-C-239
    when: When implementing market impact modeling in backtesting
    action: Use square root market impact model (Almgren-Chriss style) — linear models underestimate large order costs; cubic
      models overpenalize and discourage legitimate trades
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using linear impact model causes execution cost underestimation for large orders, leading to backtest results
      that are optimistic compared to live trading where large orders face significant market impact
    derived_from_bd_id: BD-031
  - id: finance-C-240
    when: When configuring market impact model parameters for stock backtesting
    action: Verify that eta=0.1 permanent impact coefficient matches the stock's liquidity profile — higher values (0.5) indicate
      illiquid stocks; lower values (0.01) are for highly liquid assets
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default eta=0.1 for illiquid stocks underestimates permanent price impact by 80%, causing backtest
      returns to exceed what would occur in live trading; for highly liquid stocks, it overestimates impact by 10x, causing
      strategies to undertrade
    derived_from_bd_id: BD-032
  - id: finance-C-241
    when: When adjusting Almgren-Chriss execution model parameters
    action: Recalibrate each coupled parameters together when changing any single parameter — volatility=0.12 (BD-106) for
      timing risk interacts with square-root impact coefficient Y=0.6 (BD-107) to determine optimal execution trajectories
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing one parameter without recalibrating others creates misaligned risk-cost tradeoffs, leading to either
      excessive market impact costs or uncompensated timing risk in execution strategies
    derived_from_bd_id: BD-152
  - id: finance-C-242
    when: When implementing or modifying MACD indicator calculations in feature engineering
    action: 'Use standard MACD periods: fast=12, slow=26, signal=9 — these specific values represent the established technical
      analysis configuration for medium-term momentum signals'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Altering MACD parameters from standard (12,26,9) changes signal timing and crossover points, causing the
      indicator to detect different momentum shifts than intended and producing fundamentally different trading signals
    derived_from_bd_id: BD-086
  - id: finance-C-244
    when: When implementing profit-taking logic in FX trading environments
    action: 'Calculate profit taken using formula: profit = fraction_action * max_profit_taken + stop_loss — verify stop_loss
      provides downside floor protection regardless of fraction_action value'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting stop_loss from profit calculation removes downside protection floor, causing strategies to be overconfident
      in partial profit-taking scenarios where market reverses sharply
    derived_from_bd_id: BD-046
  - id: finance-C-245
    when: When implementing limit order expiration logic in FX trading environments
    action: Configure limit order expiration as bar-based (time periods) rather than timestamp-based — verify expiration_bars
      field is used and expiration_time is not relied upon for order lifecycle management
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using time-based instead of bar-based expiration causes order lifecycle misalignment with episode boundaries,
      potentially leaving orders active beyond intended strategy horizon or expiring prematurely
    derived_from_bd_id: BD-047
  - id: finance-C-246
    when: When implementing or modifying KDJ indicator calculations in feature engineering
    action: Use fastk_period=5 and slowk_period=3 for KDJ calculation — these specific parameters balance responsiveness with
      noise reduction as validated in the original implementation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different fastk/slowk periods causes KDJ signals to deviate from expected behavior, producing false
      momentum readings that lead to incorrect trading signals
    derived_from_bd_id: BD-089
  - id: finance-C-247
    when: When implementing or modifying DX (Directional Movement Index) calculations in feature engineering
    action: Use period=14 for DX calculation — this is the Welles Wilder standard ensuring interpretability and proper trend
      quality assessment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-14 period values for DX causes non-standard trend strength measurements that may not align with
      common market analysis practices and reduce strategy interpretability
    derived_from_bd_id: BD-090
  - id: finance-C-248
    when: When implementing or tuning GAE (Generalized Advantage Estimation) parameters in PPO policy training
    action: Use lambda=0.95 for advantage estimation in PPO — this specific value balances bias-variance tradeoff, reducing
      variance while maintaining controlled bias for stable policy gradient learning
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using lambda values below 0.9 introduces high-variance gradients causing unstable training; values above
      0.98 introduce excessive bias slowing convergence and degrading learned policy quality
    derived_from_bd_id: BD-100
  - id: finance-C-249
    when: When implementing or tuning PPO policy clipping parameters in order execution or RL training
    action: Use epsilon clip of 0.2 to constrain policy ratio to [0.8, 1.2] range — this prevents catastrophically destructive
      policy updates while allowing sufficient learning speed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting epsilon below 0.1 over-restricts learning causing slow convergence; setting epsilon above 0.3 allows
      destabilizing large policy changes that can cause catastrophic performance drops
    derived_from_bd_id: BD-102
  - id: finance-C-250
    when: When configuring episode termination logic in training environments
    action: Verify the 10% portfolio threshold matches the strategy's acceptable loss limits — higher threshold (50%) triggers
      too early and wastes learning opportunities; lower threshold (1%) risks numerical instability with near-zero equity
      values
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: An inappropriate termination threshold causes episodes to either end prematurely before meaningful learning
      occurs, or continue with numerically unstable positions that corrupt training gradients and degrade model quality
    derived_from_bd_id: BD-078
  - id: finance-C-251
    when: When modeling transaction costs in backtesting
    action: Verify that percentage-based transaction costs match actual exchange fee structures — percentage costs scale with
      trade size correctly, but may not capture fixed exchange fees for small trades or tiered fee structures; fixed costs
      distort small trades and tiered costs add complexity
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect cost modeling causes systematic over- or under-estimation of strategy profitability; small trades
      appear more profitable than they would be in live trading due to unmodeled fixed fees, while large trades may appear
      less profitable due to percentage caps
    derived_from_bd_id: BD-079
  - id: finance-C-252
    when: When configuring future trading execution parameters
    action: Verify slippage assumptions match the target futures market — slippage=0 provides a clean baseline but underestimates
      real execution costs; typical slippage (0.01%) should be added for realistic backtests; negative slippage is unrealistic
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Zero slippage baseline causes backtested results to appear more profitable than live trading would deliver,
      as actual fills occur at slightly worse prices than the quoted price; this creates false expectations and live trading
      disappointment
    derived_from_bd_id: BD-082
  - id: finance-C-253
    when: When implementing or refactoring state normalization logic in the stock trading environment
    action: Normalize state values using power-of-2 scaling to maintain consistent gradient magnitudes across heterogeneous
      state features
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing or altering power-of-2 scaling causes gradient explosion or feature dominance, leading to training
      instability where features with large absolute values dominate learning and the agent fails to converge
    derived_from_bd_id: BD-125
  - id: finance-C-254
    when: When refactoring BaseExecutor policy instantiation logic
    action: Maintain getattr() factory pattern for dynamic instantiation from string names to preserve runtime policy selection
      capability
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Replacing getattr() with explicit imports or hardcoded class instantiation breaks runtime policy selection,
      preventing A/B testing and model updates without code changes
    derived_from_bd_id: BD-134
  - id: finance-C-255
    when: When modifying the FX trading environment action space
    action: Preserve discrete action encoding {0:buy, 1:sell, 2:nothing} with fractional part usage for profit-taking behavior
    severity: high
    kind: domain_rule
    modality: must
    consequence: Expanding to continuous action space or hierarchical decomposition fundamentally changes strategy representation,
      corrupting trained agent behavior and causing misalignment between trained policies and expected trading outcomes
    derived_from_bd_id: BD-146
  - id: finance-C-256
    when: When implementing position sizing in Wt4ElegantRL CTA environment
    action: Use Box(-1,1) normalized action space multiplied by 3 in setAction() - max position is limited to 3 contracts
      (300% notional)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the action space scaling factor from 3 alters position sizing beyond 3 contracts, violating the
      CTA strategy design constraints and potentially causing margin calls or position sizing errors in live trading
    derived_from_bd_id: BD-141
  - id: finance-C-259
    when: When adding new data sources or modifying column naming conventions in the feature pipeline
    action: Add validation checks between pipeline stages (column standardization → timezone detection → turbulence calculation)
      to catch silent failures early; verify timezone auto-detection results match expected market hours
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing validation between pipeline stages allows silent failures to propagate; early stages appear successful
      while turbulence calculations produce incorrect values, corrupting ensemble policy selection without obvious error messages
    derived_from_bd_id: BD-148
  - id: finance-C-260
    when: When deploying the monitor component in high-frequency trading backtesting with concurrent state updates
    action: Rely on default SQLite database (mondata.db) for state persistence under high concurrent write loads - SQLite's
      single-writer limitation causes write bottlenecks and potential state corruption
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: SQLite concurrent write bottleneck can cause state persistence failures during high-frequency updates, leading
      to lost position tracking and corrupted backtest results that don't reflect actual trade history
    derived_from_bd_id: BD-GAP-002
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
