    - id: BD-019
      type: B
      summary: 'Z-Score mean reversion: entry at ±1.8, exit at ±0.4, stop loss at ±2.5, time stop 8 days'
    - id: BD-022
      type: B/BA
      summary: Backtest auto-subscribes 1-minute K-line if no K-line or K-line period > minute
    - id: BD-027
      type: B
