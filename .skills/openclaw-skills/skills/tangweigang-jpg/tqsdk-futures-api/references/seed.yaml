  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
    - portfolio_simulation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: factor crowding should be measured to avoid strategy overlap risk
  evidence_refs:
  - type: community_validated
    ref: 21世纪经济报道《多重因素致小盘策略失灵》（2024年2月）；中国基金报《史诗级量化巨震！深度解析来了》（2024年2月）
    url: https://www.21jingji.com/article/20240221/herald/f85c309ebeffb53edf282b0c4fa569b6.html
  reference_code:
    bad_example: '# BAD: 选股池与主流量化完全重叠无感知

      selected = factor_ranker.top_decile(universe, factor=''size'')

      '
    good_example: "# GOOD: 计算持仓与基准量化产品的 Jaccard 重叠率，高于 0.6 告警\noverlap = len(set(selected) & set(benchmark_holdings)) / len(set(selected))\n\
      if overlap > 0.6:\n    logger.warning(f\"High strategy crowding: {overlap:.1%} overlap\")\n"
  provenance:
    source: community_validated
  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-MKT-004
  statement: 'A 股量化对冲策略常用 IF/IC/IM 股指期货做多/空对冲系统性风险。 但 A 股股指期货长期处于贴水（远期价格 < 现货），IC 年化贴水可达 10-20%。 回测若仅考虑价格收益而忽略期货贴水/升水，会严重高估对冲策略净收益。

    '
  severity: high
