    - id: BD-020
      type: B/BA
      summary: Report annualization uses 250 trading days/year, 21 trading days/month
    - id: BD-021
      type: B/BA
      summary: Winning rate calculated by volume, profit/loss ratio uses contract multiplier
    - id: BD-GAP-001
      type: B/RC
      summary: Password segments in URLs are replaced with fixed placeholder 'xxx' during logging, preserving URL structure
        for readability while preventing credential leakage
    - id: BD-001
      type: B
      summary: Grid trading uses 0.5% price step (0.005) for both long and short directions
    - id: BD-009
      type: B
      summary: Turtle uses Donchian channel for entry (20-day) and exit (10-day)
    - id: BD-010
