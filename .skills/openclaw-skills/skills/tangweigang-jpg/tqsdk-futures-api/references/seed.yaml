resources:
  packages:
  - name: websockets
    version_pin: latest
  - name: requests
    version_pin: latest
  - name: numpy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: simplejson
    version_pin: latest
  - name: aiohttp
    version_pin: latest
  - name: certifi
    version_pin: latest
  - name: pyjwt
    version_pin: latest
  - name: psutil
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install websockets
    - python3 -m pip install requests
    - python3 -m pip install numpy
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing market data reconnection logic
    action: Verify each K-line data has last_id != -1 and quote data matches the subscribed ins_list before resuming processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Market data gaps will appear in the equity curve when _is_all_received returns prematurely, causing K-lines
      to have missing historical bars or quotes to show stale data in live trading
    stage_ids:
    - connection
  - id: finance-C-002
    when: When implementing trade data reconnection logic
    action: Verify trade_more_data == False for each tracked users before resuming processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Trade confirmations will be duplicated or missing after reconnection, causing position discrepancies and
      potential over-trading when the system resumes with incomplete trade data
    stage_ids:
    - connection
  - id: finance-C-009
    when: When processing reconnection data flow
    action: Chain reconnect handlers between TqConnect and api channels to verify data buffering during reconnection
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Skipping the reconnect handler chain will cause data loss when reconnection occurs, as the system will forward
      packets before confirming completeness
    stage_ids:
    - connection
  - id: finance-C-010
    when: When implementing reconnect handler for market data
    action: Track subscribe_quote and set_chart requests for resending and verify completeness using mdhis_more_data and last_id
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Market data will have gaps or stale values when the system resumes after reconnection without proper completeness
      verification
    stage_ids:
    - connection
  - id: finance-C-011
    when: When implementing reconnect handler for trade data
    action: Track req_login and confirm_settlement requests and verify completeness using trade_more_data flag only
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Trade positions will be inconsistent after reconnection when the system resumes without waiting for trade_more_data=False,
      leading to incorrect order sizing or direction
    stage_ids:
    - connection
  - id: finance-C-016
    when: When initializing numeric price fields in Quote, Tick, Position, or Account objects
    action: Initialize price fields to float('nan') instead of 0 or None
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Comparing numeric values initialized to 0 will produce incorrect trading signals because uninitialized prices
      are not distinguishable from valid zero prices. Using float('nan') ensures uninitialized prices are properly detected
      via math.isnan() checks.
    stage_ids:
    - data_management
  - id: finance-C-017
    when: When accessing Quote.last_price or other price fields for trading decisions
    action: Perform math.isnan() check before any numeric comparison of price fields
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Direct comparison with nan values (e.g., quote.last_price > 0) always evaluates to False, causing trading
      logic to silently skip valid price conditions and miss trading opportunities or fail to close positions.
    stage_ids:
    - data_management
  - id: finance-C-018
    when: When implementing or extending Entity classes for new business objects
    action: Call _instance_entity(path) during initialization to set _path and _listener attributes
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without _instance_entity(), the Entity lacks _path tracking and _listener WeakSet, breaking hierarchical
      path-based access and update notification mechanisms. Downstream methods relying on self._path[1] for account key extraction
      will fail.
    stage_ids:
    - data_management
  - id: finance-C-048
    when: When implementing backtest quote generation logic
    action: use _get_quote_diffs_from_tick for tick data or _get_quote_diffs_from_kline for K-line data with valid froms parameter
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Quote generation from K-lines will produce malformed data causing order matching to fail in simulation, as
      the price generation logic depends on the froms parameter to correctly set bid/ask prices
    stage_ids:
    - market_data_simulation
  - id: finance-C-049
    when: When implementing backtest K-line generation
    action: verify K-line high/low/close prices derive from the same tick period when multiple timeframes are subscribed
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Cross-bar contamination occurs when quotes from different timeframes use inconsistent price data, causing
      strategy signals to produce different results in live trading vs backtest
    stage_ids:
    - market_data_simulation
  - id: finance-C-053
    when: When implementing settlement logic in simulation backtest
    action: trigger _settle() when current datetime exceeds trading_day_end before processing next trading day
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Position and margin calculations for the next trading day become incorrect because settlement was skipped,
      potentially causing over-trading or margin calls
    stage_ids:
    - market_data_simulation
  - id: finance-C-054
    when: When implementing quote field filtering for backtest
    action: strip future data fields (open, close, settlement, high, low) and backtest-generated fields from quotes before
      forwarding to strategies
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Strategies inadvertently access future data causing look-ahead bias in backtest results that cannot replicate
      in live trading
    stage_ids:
    - market_data_simulation
  - id: finance-C-068
    when: When implementing TargetPosTask for a symbol+account
    action: enforce singleton pattern - only one TargetPosTask instance per account+symbol
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Multiple TargetPosTask instances for the same account+symbol would issue conflicting orders, causing position
      chaos, duplicate fills, and financial losses from incorrect net positions
    stage_ids:
    - trading_algorithms
  - id: finance-C-069
    when: When creating TargetPosTask with different parameters than existing instance
    action: reuse the existing instance instead of creating a new one
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Creating a second TargetPosTask with different parameters raises Exception, leaving the original instance
      active and causing resource leaks or order conflicts
    stage_ids:
    - trading_algorithms
  - id: finance-C-070
    when: When calling set_target_volume() on TargetPosTask
    action: continue calling wait_update() to execute the order placement
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: set_target_volume() only queues the target position; without wait_update(), no orders are actually placed,
      causing the strategy to fail silently
    stage_ids:
    - trading_algorithms
  - id: finance-C-071
    when: When using TargetPosTask and insert_order() for the same symbol
    action: use only one order management method - either TargetPosTask or insert_order()
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Mixing TargetPosTask with manual insert_order() causes TargetPosTask to error or place incorrect orders due
      to position state corruption from external orders
    stage_ids:
    - trading_algorithms
  - id: finance-C-077
    when: When checking contract minimum order volume constraints
    action: use TargetPosTask for contracts where open_min_market_order_volume > 1 or open_min_limit_order_volume > 1
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: TargetPosTask cannot handle partial fills that leave amounts below exchange minimums; attempting to use it
      causes Exception and leaves positions in an unmanageable state
    stage_ids:
    - trading_algorithms
  - id: finance-C-078
    when: When implementing stock trading with TargetPosTask
    action: use TargetPosTask for stock trading - it is designed only for futures
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: TargetPosTask uses futures-specific offset logic (OPEN/CLOSE/CLOSETODAY) that does not apply to stocks, causing
      incorrect order generation or errors
    stage_ids:
    - trading_algorithms
  - id: finance-C-086
    when: When using insert_order while TargetPosTask is active
    action: skip using TargetPosTask for the same symbol or explicitly manage their interaction
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Uncoordinated use of insert_order alongside TargetPosTask causes '已经结束的 TargetPosTask 实例不可以再设置手数' errors
      or silent position miscalculations
    stage_ids:
    - trading_algorithms
  - id: finance-C-089
    when: When inserting orders for a contract
    action: Verify quote for the contract has been received with valid datetime
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Order insertion fails silently or matches incorrectly if quote datetime is empty, causing incorrect order
      matching and position calculations
    stage_ids:
    - order_execution
  - id: finance-C-090
    when: When inserting orders for an option contract
    action: Verify underlying quote for the option has been received with valid datetime
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Option order insertion fails or margin calculation returns NaN if underlying quote is not received, causing
      incorrect保证金 calculations
    stage_ids:
    - order_execution
  - id: finance-C-091
    when: When matching market orders
    action: Match at counterparty price (ask_price for BUY, bid_price for SELL)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Market orders execute at incorrect prices, causing simulated PnL to diverge from real exchange behavior and
      backtest results to be unreliable
    stage_ids:
    - order_execution
  - id: finance-C-092
    when: When matching limit orders
    action: Execute at the order's limit_price (not at counterparty price)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Limit orders execute at wrong prices, causing incorrect fill prices in backtest that do not reflect actual
      exchange semantics
    stage_ids:
    - order_execution
  - id: finance-C-102
    when: When validating init_balance parameter
    action: Accept zero or negative initial balance values
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Simulation starts with invalid capital, causing all margin calculations and order placement logic to fail
      immediately
    stage_ids:
    - order_execution
  - id: finance-C-103
    when: When setting commission for a symbol
    action: Set commission to NaN value
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Commission calculation returns NaN causing all trade fee computations to fail, corrupting account balance
    stage_ids:
    - order_execution
  - id: finance-C-104
    when: When setting margin for a symbol
    action: Set margin to NaN value
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Margin calculation returns NaN causing all margin frozen calculations to fail, corrupting available balance
    stage_ids:
    - order_execution
  - id: finance-C-118
    when: When implementing order request packets (insert_order, cancel_order, set_risk_management_rule, pre_insert_order)
    action: include account_key field in the pack for multi-account routing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Order requests without account_key will fail routing in multi-account mode, causing orders to be sent to
      wrong accounts or silently dropped
    stage_ids:
    - tradeable_interface
  - id: finance-C-119
    when: When implementing multi-account order routing
    action: filter orders by comparing pack['account_key'] with self._account_key in _is_self_trade_pack
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without proper account_key filtering, orders will be processed by all accounts causing cross-account contamination
      and incorrect position tracking
    stage_ids:
    - tradeable_interface
  - id: finance-C-120
    when: When creating TqMultiAccount with account list
    action: verify no duplicate account instances exist in the accounts list
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Duplicate account instances will cause routing conflicts and undefined behavior when orders are matched to
      accounts
    stage_ids:
    - tradeable_interface
  - id: finance-C-126
    when: When setting up multi-account channel chain in TqMultiAccount._setup_connection
    action: connect accounts in iteration order with last account receiving api_send_chan and api_recv_chan directly
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect channel chaining breaks the n-to-1 upstream routing pattern, causing data to loop or drop between
      accounts
    stage_ids:
    - tradeable_interface
  - id: finance-C-127
    when: When implementing Tradeable subclasses
    action: inherit from TqModule for channel-based communication pattern
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Not inheriting TqModule breaks the unified data flow pattern, preventing proper n-to-1 upstream routing
    stage_ids:
    - tradeable_interface
  - id: finance-C-128
    when: When implementing _account_key generation in Tradeable subclasses
    action: verify _account_key is generated at __init__ time and remains immutable
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Modifying _account_key after initialization breaks all subsequent order routing and data lookups using account_key
      as the key
    stage_ids:
    - tradeable_interface
  - id: finance-C-129
    when: When using BaseOtg._get_account_key
    action: generate account_key using MD5 hash of broker_id + account_id concatenation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Different hashing or key generation breaks consistency with server-side account identification
    stage_ids:
    - tradeable_interface
  - id: finance-C-130
    when: When using TqAccount._get_account_key
    action: use str(id(self)) as account_key for object identity based unique key
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using other key generation methods breaks object identity based routing in multi-account scenarios
    stage_ids:
    - tradeable_interface
  - id: finance-C-182
    when: When implementing simulation backtest order processing logic
    action: Execute the insert_order → wait_update → settlement sequence in strict order within each simulation cycle — settlement
      must occur only after wait_update completes to verify updated position state
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the insert_order → wait_update → settlement ordering causes settlement to use stale pre-trade positions,
      leading to incorrect P&L calculations and fill matching that doesn't reflect actual market execution
    derived_from_bd_id: BD-040
  - id: finance-C-191
    when: When configuring TqMultiAccount with multiple trading accounts
    action: Register accounts in reverse order (last account first) — the chain traversal semantics require reverse ordering
      for correct message routing to each account
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Forward ordering causes orders and messages to be routed to the wrong account due to chain traversal semantics;
      this silent routing error leads to positions being opened in incorrect accounts and potential unintended trading in
      wrong accounts
    derived_from_bd_id: BD-037
  - id: finance-C-198
    when: When implementing trading operations in multi-account configuration
    action: Pass explicit account parameter to every trading operation (insert_order, get_position, get_account, etc.) when
      multiple accounts are active — do not rely on implicit default account routing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Omitting explicit account parameter routes orders to the default account in multi-account mode, potentially
      executing trades on the wrong broker account and causing position/confirmation mismatches
    derived_from_bd_id: BD-045
  regular:
  - id: finance-C-003
    when: When establishing WebSocket connection with wss:// scheme
    action: Configure SSL context with certificate verification using certifi
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unverified SSL connections expose the trading system to man-in-the-middle attacks, allowing attackers to
      inject fake market data or intercept trading credentials
    stage_ids:
    - connection
  - id: finance-C-004
    when: When sending subscribe_quote requests
    action: Exceed ins_list_max_length of 100000 characters in a single subscription request
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Oversized subscription requests will be rejected by the server, causing the strategy to fail receiving market
      data for some or all subscribed symbols
    stage_ids:
    - connection
  - id: finance-C-005
    when: When sending ins_query requests
    action: Exceed query_max_length of 50000 characters in a single query request
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Oversized query requests will be rejected by the server, causing the strategy to fail fetching instrument
      information needed for trading
    stage_ids:
    - connection
  - id: finance-C-006
    when: When implementing reconnection strategy after network failure
    action: Apply exponential backoff starting from 10-20 seconds with maximum delay of 1280-2560 seconds
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Aggressive reconnection attempts without backoff will trigger server-side rate limiting or IP bans, preventing
      the trading system from recovering
    stage_ids:
    - connection
  - id: finance-C-007
    when: When establishing first connection during daily maintenance window
    action: Attempt connection during 19:00-19:30 China Standard Time maintenance period
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Connections attempted during the 19:00-19:30 maintenance window will fail with an exception, causing the
      trading strategy to crash on startup
    stage_ids:
    - connection
  - id: finance-C-008
    when: When using websockets library with TqSdk
    action: Verify websockets version is >= 10.0 for compatibility (API differs for version >= 14.0)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incompatible websockets library versions will cause connection failures or malformed WebSocket frames, preventing
      market data reception
    stage_ids:
    - connection
  - id: finance-C-012
    when: When resuming processing after reconnection
    action: Send peek_message request after verifying completeness to fetch remaining data packets
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The reconnection handler will miss data packets and forward incomplete market data when peek_message is not
      sent after completeness check
    stage_ids:
    - connection
  - id: finance-C-013
    when: When verifying data completeness during reconnection
    action: Set _un_processed flag to True and wait for complete data截面 before forwarding to api layer
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Data forwarded to the strategy layer before completeness verification will contain stale or missing information,
      causing incorrect trading decisions
    stage_ids:
    - connection
  - id: finance-C-014
    when: When claiming reconnection behavior to users
    action: Claim real-time or streaming capability for WebSocket connections
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: TqSdk uses polling-based WebSocket communication where data arrives in discrete packets with potential reconnection
      delays, not true streaming or real-time delivery
    stage_ids:
    - connection
  - id: finance-C-015
    when: When handling subscription throttling warnings
    action: Use api.get_quote_list for batch subscription instead of individual subscribe_quote calls when subscribing more
      than 100 instruments
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Excessive individual subscription requests will trigger server-side rate limiting or cause slow market data
      updates due to quota exhaustion
    stage_ids:
    - connection
  - id: finance-C-019
    when: When accessing nested data structures in the unified data store
    action: Use _get_obj() from tqsdk.diff module instead of direct attribute access
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct attribute access like data['trade'][account]['orders'] bypasses lazy Entity instantiation via _get_obj(),
      resulting in plain dict objects that lack _path tracking, _listener notifications, and path-based hierarchical access
      patterns.
    stage_ids:
    - data_management
  - id: finance-C-020
    when: When accessing Position.orders() or SecurityPosition.orders()
    action: Use the orders property directly without filtering for FINISHED status
    severity: high
    kind: domain_rule
    modality: must
    consequence: The orders() property explicitly filters to return only ALIVE orders (objs.py:454). Adding redundant status
      checks or expecting FINISHED orders in the returned dict will cause incorrect position state calculations.
    stage_ids:
    - data_management
  - id: finance-C-021
    when: When accessing trade-related entities (orders, trades, positions)
    action: Use self._path[1] as the account key when constructing data paths
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The _path attribute follows the pattern ['trade', account_key, entity_type]. Using hardcoded account keys
      or indices other than [1] will break multi-account support and cause data access failures in multi-account scenarios.
    stage_ids:
    - data_management
  - id: finance-C-022
    when: When processing diff updates from upstream data sources
    action: Call _merge_diff() to apply incremental changes rather than replacing entire objects
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Full object replacement destroys the reference integrity of Entity listeners and breaks update notifications.
      Only _merge_diff() maintains the incremental update semantics and properly propagates _notify_update() calls to registered
      listeners.
    stage_ids:
    - data_management
  - id: finance-C-023
    when: When implementing alternative DataStorage backends
    action: Implement the same Entity interface contract (MutableMapping, _path, _listener, _instance_entity)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Non-conforming storage backends will break path-based access patterns, update notification subscriptions,
      and hierarchical data traversal. The diff protocol and listener mechanism depend on this interface contract.
    stage_ids:
    - data_management
  - id: finance-C-024
    when: When comparing float values in diff protocol (reduce_diff logic)
    action: Use explicit nan equality check (x != x) when comparing values that may be nan
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Python's nan != nan is always True, but nan == nan is always False. The diff protocol at diff.py:56-58 explicitly
      handles this with a special check to prevent spurious diffs when comparing nan values.
    stage_ids:
    - data_management
  - id: finance-C-025
    when: When iterating over Entity children in __iter__
    action: Filter out keys starting with underscore (_) to exclude internal attributes
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Including _path, _listener, _api, and other internal attributes in iteration will expose implementation details
      and may cause errors in code that assumes only business fields are present during iteration.
    stage_ids:
    - data_management
  - id: finance-C-026
    when: When registering for update notifications via TqChan channels
    action: Use _register_update_chan() to add channel to entity's _listener WeakSet
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Direct manipulation of _listener bypasses the registration helper and may cause memory leaks or missed notifications.
      _register_update_chan() properly handles list-to-singleton conversion and maintains weak reference semantics.
    stage_ids:
    - data_management
  - id: finance-C-027
    when: When receiving data from upstream modules (connection or market_data_simulation)
    action: Treat incoming diff packets as incremental updates, not authoritative snapshots
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Treating partial diffs as complete state may cause missing fields to be interpreted as zero/empty rather
      than unchanged. The diff protocol requires merging with existing state via _merge_diff(), not replacing it.
    stage_ids:
    - data_management
  - id: finance-C-028
    when: When representing backtest simulation results via the in-memory data store
    action: Claim that simulated backtest equity curves equal expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest data stored in the unified data store reflects simulated fills, slippage models, and historical
      market conditions that do not account for live execution variability, liquidity constraints, and market impact. Presenting
      backtest PnL as live trading proof misleads stakeholders.
    stage_ids:
    - data_management
  - id: finance-C-029
    when: When accessing Quote.last_price before market open or for expired contracts
    action: Check that price_tick is not nan before relying on price field values
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Quote objects for symbols without valid market data have price fields initialized to nan. Trading strategies
      that assume valid prices without checking will generate invalid orders based on nan comparison results.
    stage_ids:
    - data_management
  - id: finance-C-030
    when: When the price_type is ANY (market order) in order processing
    action: Validate that the retrieved price is not nan before using it for execution
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Market orders with nan price will either fail execution or produce incorrect fills in simulation, causing
      position sizing errors and incorrect PnL calculations.
    stage_ids:
    - data_management
  - id: finance-C-050
    when: When implementing backtest time advancement
    action: advance time only when no pending user events exist to verify deterministic execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtest results become non-deterministic across repeated runs because event processing order varies with
      user input timing
    stage_ids:
    - market_data_simulation
  - id: finance-C-051
    when: When implementing dividend adjustment for stock backtests
    action: fetch dividend data from TqBacktestDividend service and apply cash_dividend_ratio and stock_dividend_ratio adjustments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stock backtest results exclude dividend impacts, causing equity curve to diverge from real portfolio performance
      where dividends are received
    stage_ids:
    - market_data_simulation
  - id: finance-C-052
    when: When implementing continuous contract mapping for backtest
    action: use TqBacktestContinuous to map KQ.m@* symbols to underlying front-month contracts for each trading day
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtest trades stale or non-existent contracts causing order rejections or position mismatches with actual
      historical trading
    stage_ids:
    - market_data_simulation
  - id: finance-C-055
    when: When implementing K-line quote generation for backtest
    action: generate quote with last_price from the last element of froms list (open or close) and bid/ask spread based on
      price_tick
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Order matching in backtest uses incorrect price boundaries causing fills that would not occur at the same
      price in live trading
    stage_ids:
    - market_data_simulation
  - id: finance-C-056
    when: When using TqReplay for market data replay
    action: replay more than one trading day in a single session
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Replay server will fail to initialize due to server-side resource constraints, blocking strategy execution
    stage_ids:
    - market_data_simulation
  - id: finance-C-057
    when: When using TqBacktest with user strategies
    action: claim that backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest uses simulated fills with fixed price_tick spread, simplified matching rules, and excludes slippage/fees
      that affect live trading returns
    stage_ids:
    - market_data_simulation
    - order_execution
  - id: finance-C-058
    when: When using TqBacktest for stock strategies
    action: present simulated stock wallet results as proof of real execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Stock backtest uses TqSimStock with simulated T+1 settlement that does not reflect actual exchange matching
      and regulatory constraints
    stage_ids:
    - market_data_simulation
  - id: finance-C-059
    when: When implementing backtest order matching
    action: claim real-time trading support for backtest mode
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtest uses historical data polling with 15-minute delay from data provider, not real-time exchange feeds
    stage_ids:
    - market_data_simulation
  - id: finance-C-060
    when: When implementing backtest time advancement
    action: advance time by at most one market event per wait_update call
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Backtest produces non-deterministic results across runs because multiple events processed in single wait_update
      creates race conditions
    stage_ids:
    - market_data_simulation
  - id: finance-C-061
    when: When implementing combination contract backtesting
    action: subscribe only to tick data for combination contracts, not K-lines
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: K-lines for combination contracts are synthesized from last_price which is not available in exchange data
      for spread contracts, causing empty or incorrect K-lines
    stage_ids:
    - market_data_simulation
  - id: finance-C-062
    when: When implementing dividend data fetching
    action: fall back to quote's original dividend data when stock-dividend service request fails
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Backtest may receive future dividend data if service returns insufficient historical records, causing look-ahead
      bias in stock strategies
    stage_ids:
    - market_data_simulation
  - id: finance-C-063
    when: When distinguishing backtest from replay
    action: use event-driven time advancement for backtest and time-driven continuous advancement for replay
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Confusing the two modes causes strategies to expect different data update patterns, leading to missed signals
      or duplicate processing
    stage_ids:
    - market_data_simulation
  - id: finance-C-064
    when: When implementing K-line initialization in backtest
    action: initialize K-line data with open price for each OHLC fields and zero volume until bar closes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies reading K-line data during bar formation receive misleading prices that would not exist in live
      market data
    stage_ids:
    - market_data_simulation
  - id: finance-C-065
    when: When backtesting with multiple K-line durations
    action: auto-subscribe 1-minute K-line when subscribed duration exceeds 1 minute to verify quote updates at least every
      minute
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Quote updates become too infrequent for time-sensitive strategies, causing delayed order placement that differs
      from expected live behavior
    stage_ids:
    - market_data_simulation
  - id: finance-C-066
    when: When implementing quote update from K-lines without tick subscription
    action: set highest/lowest/average/amount to NaN and volume to 0 in quote generated from K-line
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Strategies relying on these quote fields receive non-NaN values that could only exist from tick data, causing
      incorrect signal generation
    stage_ids:
    - market_data_simulation
  - id: finance-C-067
    when: When handling trading day transitions in backtest
    action: update _trading_day, _trading_day_start, and _trading_day_end before sending continuous contract quotes for new
      day
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Continuous contract mapping uses wrong trading day causing KQ.m@* symbols to resolve to incorrect underlying
      contracts
    stage_ids:
    - market_data_simulation
  - id: finance-C-072
    when: When configuring price mode as ACTIVE
    action: use counterparty price (ask_price1 for BUY, bid_price1 for SELL) for order execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: ACTIVE orders placed at wrong prices will have reduced fill probability or miss execution windows, causing
      position targets to be missed
    stage_ids:
    - trading_algorithms
  - id: finance-C-073
    when: When configuring price mode as PASSIVE
    action: use queue price (bid_price1 for BUY, ask_price1 for SELL) for order execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: PASSIVE orders at counterparty prices will face queue priority issues, potentially causing excessive cancellations
      and missed fills
    stage_ids:
    - trading_algorithms
  - id: finance-C-074
    when: When setting offset_priority for futures position closing
    action: default to '今昨,开' for Chinese futures to close yesterday position before today
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using wrong offset priority causes incorrect margin rates, as yesterday positions have different margin requirements
      than today positions in Chinese futures markets
    stage_ids:
    - trading_algorithms
  - id: finance-C-075
    when: When dealing with SHFE or INE exchange contracts
    action: use CLOSE for yesterday positions and CLOSETODAY for today positions separately
    severity: high
    kind: domain_rule
    modality: must
    consequence: SHFE/INE exchanges require separate CLOSE vs CLOSETODAY commands; using wrong close type causes rejection
      or incorrect position adjustments
    stage_ids:
    - trading_algorithms
  - id: finance-C-076
    when: When using split order mode with min_volume and max_volume
    action: verify max_volume >= min_volume > 0 for valid split execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid min_volume/max_volume parameters cause _check_volume_limit to raise Exception, preventing order execution
      and leaving positions unmanaged
    stage_ids:
    - trading_algorithms
  - id: finance-C-079
    when: When implementing automated order chasing in trading algorithms
    action: claim real-time trading support - TqSdk uses polling, not streaming
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting TqSdk as real-time when it uses market data polling creates misleading expectations about execution
      speed and fill probability in live trading
    stage_ids:
    - trading_algorithms
  - id: finance-C-080
    when: When presenting TargetPosTask execution results
    action: claim that simulated/backtest fills equal expected live trading performance
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Simulated fills use local matching that differs from actual market microstructure; presenting these as live
      performance guarantees misleads users about execution quality
    stage_ids:
    - trading_algorithms
  - id: finance-C-081
    when: When managing TargetPosTask lifecycle
    action: call cancel() on the existing TargetPosTask before creating a new one with different parameters
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping cancel() leaves the old instance in _instances dict, preventing new instance creation or causing
      parameter mismatch exceptions
    stage_ids:
    - trading_algorithms
  - id: finance-C-082
    when: When executing TargetPosScheduler with time_table
    action: verify subsequent wait_update() calls continue after TargetPosScheduler creation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: TargetPosScheduler creation does not execute orders immediately; without continuous wait_update(), scheduled
      execution targets are never achieved
    stage_ids:
    - trading_algorithms
  - id: finance-C-083
    when: When using multi-account mode with TargetPosTask
    action: explicitly pass account parameter to TargetPosTask constructor
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: 'Omitting account parameter in multi-account mode causes Exception: ''多账户模式下, 需要指定账户实例 account'', leaving
      the task uncreated'
    stage_ids:
    - trading_algorithms
  - id: finance-C-084
    when: When a custom price function returns nan for TargetPosTask
    action: allow nan to propagate - the system raises Exception on nan price
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: nan price causes order placement to fail, potentially leaving positions at incorrect targets while waiting
      for valid prices
    stage_ids:
    - trading_algorithms
  - id: finance-C-085
    when: When receiving filled orders from trading_algorithms stage
    action: update order_execution stage with actual fill prices and volumes from market matching
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mismatch between expected fill prices and actual fills corrupts position tracking, causing incorrect PnL
      calculation and position state
    stage_ids:
    - trading_algorithms
  - id: finance-C-087
    when: When creating new TargetPosTask without canceling existing one
    action: skip calling cancel() on existing TargetPosTask before creating a new one
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Forgetting to cancel existing TargetPosTask leaves orphaned instances in _instances dict, causing '您试图用不同的参数创建两个调仓任务'
      exceptions
    stage_ids:
    - trading_algorithms
  - id: finance-C-088
    when: When calling set_target_volume without checking return value
    action: skip checking if TargetPosTask instance is still active (not canceled/finished)
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Calling set_target_volume on a canceled/finished TargetPosTask raises '已经结束的 TargetPosTask 实例不可以再设置手数' Exception
    stage_ids:
    - trading_algorithms
  - id: finance-C-093
    when: When orders match
    action: Execute all-or-nothing fills with no partial fills
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtest results show full fills but real exchanges may partially fill, causing live execution to fail or
      underfill orders
    stage_ids:
    - order_execution
  - id: finance-C-094
    when: When calculating stock sell fees
    action: Include stamp tax at 0.1% (0.001) on sell side only
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stock simulation undercharges sell fees by omitting stamp tax, causing backtest equity to be overstated compared
      to real trading
    stage_ids:
    - order_execution
  - id: finance-C-095
    when: When calculating stock buy fees
    action: Charge only commission without stamp tax on buy side
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stock simulation incorrectly charges stamp tax on buy side, causing backtest equity to differ from real A-share
      trading costs
    stage_ids:
    - order_execution
  - id: finance-C-096
    when: When calculating call option margin
    action: 'Use Shenzhen Exchange formula: (last_price + max(12% × underlying - OTM, 7% × underlying)) × volume_multiple'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect option margin calculation using wrong exchange coefficients causes insufficient frozen margin,
      leading to over-trading in simulation
    stage_ids:
    - order_execution
  - id: finance-C-097
    when: When calculating put option margin
    action: 'Use Shenzhen Exchange formula: min(last_price + max(12% × underlying - OTM, 7% × strike), strike) × volume_multiple'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect put option margin calculation causes wrong margin requirements, leading to unrealistic risk management
      in backtest
    stage_ids:
    - order_execution
  - id: finance-C-098
    when: When placing close orders on SHFE or INE exchanges
    action: Use CLOSETODAY offset to close today positions, CLOSE for yesterday positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Close orders fail or close wrong positions due to missing CLOSETODAY distinction, causing position mismatch
      errors
    stage_ids:
    - order_execution
  - id: finance-C-099
    when: When TqSim processes quotes
    action: Skip matching and update processing when quote last_price is NaN
    severity: high
    kind: domain_rule
    modality: must
    consequence: Order matching against invalid (NaN) prices causes corrupted position calculations and incorrect fill prices
    stage_ids:
    - order_execution
  - id: finance-C-100
    when: When validating order status transitions
    action: Verify only ALIVE orders are processed in matching logic
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attempting to match already FINISHED orders causes duplicate fills or state corruption in the order book
    stage_ids:
    - order_execution
  - id: finance-C-101
    when: When adjusting position account fields
    action: Verify exactly one of buy_open, buy_close, sell_open, sell_close is non-zero (or each are zero for price change)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Position adjustment calculations become incorrect if multiple open/close actions are processed simultaneously,
      corrupting margin and PnL
    stage_ids:
    - order_execution
  - id: finance-C-105
    when: When using TqSim for trading
    action: Expect real-time trading capabilities or live exchange connectivity
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: TqSim is a pure backtesting/simulation framework with no live trading connectivity, causing confusion if
      used expecting live execution
    stage_ids:
    - order_execution
  - id: finance-C-106
    when: When calculating futures margin
    action: Apply yesterday/today position split correctly for SHFE/INE exchanges
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect position split causes wrong margin calculations, leading to overstated or understated available
      balance
    stage_ids:
    - order_execution
  - id: finance-C-107
    when: When executing settlement
    action: Preserve position continuity by moving today's positions to historical positions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Settlement without position continuity causes position history to be lost, breaking multi-day backtest calculations
    stage_ids:
    - order_execution
  - id: finance-C-108
    when: When orders reach end of trading day
    action: Cancel each GFD (Good For Day) orders automatically during settlement
    severity: high
    kind: domain_rule
    modality: must
    consequence: GFD orders persist into next trading day incorrectly, causing unintended positions or stale orders to execute
    stage_ids:
    - order_execution
  - id: finance-C-109
    when: When calculating account balance after settlement
    action: Set pre_balance = balance - market_value before starting new trading day
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect pre_balance calculation causes equity curve discontinuity between trading days in backtest
    stage_ids:
    - order_execution
  - id: finance-C-110
    when: When checking order insert validity
    action: Verify order is within trading time before accepting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Orders accepted outside trading hours execute at stale prices, causing incorrect fills and broken backtest
      results
    stage_ids:
    - order_execution
  - id: finance-C-111
    when: When calculating frozen margin for open orders
    action: Freeze margin before order insertion to prevent over-trading
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Orders accepted without margin freeze allow unlimited position building beyond available capital
    stage_ids:
    - order_execution
  - id: finance-C-112
    when: When verifying open order feasibility
    action: Check that frozen_margin + frozen_premium <= available balance
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Opening positions without sufficient margin check allows over-leveraging, causing impossible trades in live
      execution
    stage_ids:
    - order_execution
  - id: finance-C-114
    when: When presenting TqSim order fills
    action: Present as proof of real exchange execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Simulated fills use internal matching engine, not actual exchange matching, and should not be presented as
      live trading proof
    stage_ids:
    - order_execution
  - id: finance-C-115
    when: When checking available balance for buy orders (stock)
    action: Freeze both order amount and estimated fee before order insertion
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Stock buy orders without fee freeze cause insufficient balance for actual execution, leading to failed trades
      in live trading
    stage_ids:
    - order_execution
  - id: finance-C-116
    when: When executing sell orders (stock)
    action: Verify sell volume does not exceed available position (volume_his + shared_volume_today - sell_volume_today -
      sell_volume_frozen)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sell orders without position validation allow short selling non-existent shares, causing impossible positions
    stage_ids:
    - order_execution
  - id: finance-C-117
    when: When calculating stock sell fee
    action: Charge minimum commission of 5.0 CNY for any trade
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Omitting minimum commission causes undercharging for small trades, making micro-strategy backtests unrealistically
      profitable
    stage_ids:
    - order_execution
  - id: finance-C-121
    when: When implementing futures accounts (FutureMixin)
    action: use Account, Position, Order, Trade objects for data representation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using wrong object types will cause field mismatch errors and incorrect financial calculations for futures
      margin trading
    stage_ids:
    - tradeable_interface
  - id: finance-C-122
    when: When implementing stock accounts (StockMixin)
    action: use SecurityAccount, SecurityPosition, SecurityOrder, SecurityTrade objects for data representation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using wrong object types will cause field mismatch errors and incorrect financial calculations for stock
      trading
    stage_ids:
    - tradeable_interface
  - id: finance-C-123
    when: When implementing TqKq class
    action: hardcode broker_id='快期模拟' in the parent TqAccount initialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect broker_id will cause TqKq to fail authentication or connect to wrong trading servers
    stage_ids:
    - tradeable_interface
  - id: finance-C-124
    when: When implementing TqKq Stock class
    action: hardcode broker_id='快期股票模拟' in the parent TqAccount initialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect broker_id will cause TqKqStock to fail authentication or connect to wrong trading servers
    stage_ids:
    - tradeable_interface
  - id: finance-C-125
    when: When using TqMultiAccount for multi-account operations
    action: pass account parameter explicitly for get_position, get_account, insert_order, set_target_volume operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Omitting account parameter in multi-account mode returns None or first account by default, causing data leakage
      between accounts
    stage_ids:
    - tradeable_interface
  - id: finance-C-133
    when: When using TqKq or TqKqStock for trading
    action: claim TqKq provides real-time live trading capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: TqKq is a simulation account that does not reflect actual market conditions or provide real-time trading
      execution
    stage_ids:
    - tradeable_interface
  - id: finance-C-134
    when: When using TqSim for backtesting
    action: claim backtest results equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Simulated trading results do not account for slippage, market impact, or liquidity constraints that occur
      in live trading
    stage_ids:
    - tradeable_interface
  - id: finance-C-135
    when: When implementing multi-account mode
    action: require explicit account parameter for each account-specific operations (get_position, get_account, insert_order)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Omitting account parameter causes AmbiguousAccountError or returns wrong account's data in multi-account
      mode
    stage_ids:
    - tradeable_interface
  - id: finance-C-137
    when: When implementing financial calculations involving monetary values
    action: Use float with explicit decimal precision checks for prices and margin calculations — TqSdk uses float('nan')
      as default for Quote.last_price and similar fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: Direct float comparisons without nan-checks will cause silent logical errors, as Quote.last_price defaults
      to float('nan') requiring explicit nan-check before any price comparison
  - id: finance-C-138
    when: When handling timestamps across the system
    action: Use nanosecond integers (int64) for each internal timestamps — Quote.datetime is string format 'YYYY-MM-DD HH:MM:SS.nnnnnnnnn'
      for display only
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixing string datetime with integer timestamps causes timing logic errors, as the system uses nanosecond
      integers internally for precise time tracking
  - id: finance-C-139
    when: When validating order parameters for futures trading
    action: Validate direction is in ('BUY', 'SELL') and offset is in ('OPEN', 'CLOSE', 'CLOSETODAY') for futures — stock
      trading requires offset=None
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid order parameters cause API exceptions and failed trade execution, as the system enforces strict validation
      on direction and offset values
  - id: finance-C-140
    when: When building business data structures that cross component boundaries
    action: Inherit from Entity (MutableMapping) providing path-based dict access and use Diff protocol for incremental updates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-Entity objects cannot participate in the diff update mechanism, breaking data synchronization across
      TqChan communications
  - id: finance-C-141
    when: When implementing inter-component communication
    action: Use TqChan (asyncio.Queue wrapper) for each inter-component channels — never use raw asyncio.Queue directly
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using raw asyncio.Queue bypasses TqSdk's sanitized logging and update notification mechanisms, breaking debuggability
      and update tracking
  - id: finance-C-142
    when: When creating TargetPosTask instances for position management
    action: Verify only one TargetPosTask per account+symbol combination — singleton pattern enforced via id(account)+'#'+symbol
      key
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Multiple TargetPosTask instances for same account+symbol with different parameters raise exceptions, causing
      duplicate order execution
  - id: finance-C-143
    when: When configuring TqMultiAccount for multi-account trading
    action: Configure account list in REVERSE order for proper message routing — last account connects directly to API channels
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect account order causes message routing failures, as channels are chained in forward order with the
      last account having direct API access
  - id: finance-C-144
    when: When executing orders via insert_order
    action: Call wait_update() after insert_order() — order packets are queued and only sent on next wait_update() call
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Orders are silently queued without transmission when wait_update() is not called, causing strategies to fail
      without obvious errors
  - id: finance-C-145
    when: When using TargetPosTask for position management
    action: Continue calling wait_update() after set_target_volume() — TargetPosTask executes orders only during wait_update()
      cycles
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: TargetPosTask does not execute any orders if wait_update() is not called after set_target_volume(), leaving
      positions unchanged
  - id: finance-C-146
    when: When managing positions for the same symbol
    action: Mix TargetPosTask with manual insert_order() on the same symbol — this causes duplicate orders or TargetPosTask
      errors
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Conflicting order instructions cause unpredictable position states, with TargetPosTask raising exceptions
      about mixed usage
  - id: finance-C-147
    when: When operating TqSdk for high-frequency trading requiring microsecond latency
    action: Claim TqSdk supports HFT requiring microsecond latency — TqSdk is not suitable for this use case per blueprint
      applicability constraints
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users building HFT systems based on TqSdk will experience significant latency issues, as TqSdk requires TqSdk
      gateways for connectivity and uses polling-based updates
  - id: finance-C-148
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live trading returns — backtesting ignores market impact, financing
      costs, slippage modeling approximations, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-149
    when: When presenting simulated trading results from TqSim or TqKq
    action: Present TqSim/TqKq simulation results as proof of real trading capability — simulation results MUST be clearly
      distinguished from live execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users may incorrectly trust simulated results as indicative of actual trading performance, leading to incorrect
      strategy selection and potential losses in live trading
  - id: finance-C-150
    when: When using TqSdk for stock trading operations
    action: Use TargetPosTask for stock trading — TargetPosTask does not support stock accounts due to T+1 settlement rules
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Attempting to use TargetPosTask with stock accounts causes errors since TargetPosTask assumes futures-style
      immediate position updates incompatible with T+1 settlement
  - id: finance-C-151
    when: When trading futures contracts requiring offset specification
    action: Specify correct offset value — use offset='OPEN' for opening positions, offset='CLOSE' or 'CLOSETODAY' for closing,
      and omit offset entirely for stock trading
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incorrect offset causes ValueError exceptions or wrong position management — passing offset to stock orders
      or omitting it from futures orders triggers validation errors
  - id: finance-C-152
    when: When running strategies in Jupyter notebook environment
    action: Prefer synchronous examples with explicit deadline parameter — TqSdk wait_update() may block indefinitely in Jupyter
      without deadline
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Strategies hang indefinitely in Jupyter when wait_update() waits for data that never arrives, requiring kernel
      restart to recover
  - id: finance-C-153
    when: When using backtest mode for strategy evaluation
    action: Understand that wait_update() behavior differs from live mode — backtest may update order state without advancing
      quote time, or advance time without order updates
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Strategies expecting synchronous time+order updates fail in backtest, as backtest progression rules differ
      from live trading timing semantics
  - id: finance-C-154
    when: When subscribing to quotes without checking datetime field
    action: Check quote.datetime is non-empty before using quote data — datetime may be empty string until first data packet
      arrives
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using quote data with empty datetime produces invalid timestamps or stale prices, causing indicator calculations
      and order logic to fail silently
  - id: finance-C-155
    when: When implementing TqModule subclasses for data routing
    action: Implement _handle_recv_data and _handle_req_data as async abstract methods — TqModule pattern requires n-to-1
      upstream routing with 1-to-1 downstream
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incomplete TqModule implementation breaks the channel routing chain, preventing data from flowing between
      components
  - id: finance-C-156
    when: When combining futures and stock trading in multi-account mode
    action: Use TqMultiAccount with TqSim for futures and TqSimStock for stocks — do not mix account types within the same
      trading component
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incorrect account type selection causes order validation failures or position tracking errors, as futures
      and stocks have different offset semantics and settlement rules
  - id: finance-C-157
    when: When implementing or refactoring Turtle strategy position sizing code
    action: 'Maintain the exact Turtle unit formula: unit = (balance * 0.01) / (volume_multiple * ATR), with stop loss at
      2N and pyramid additions at 0.5N intervals'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying the position sizing formula changes the risk per trade; reduced unit size underprotects capital
      while increased size creates excessive drawdown exposure
    derived_from_bd_id: BD-008
  - id: finance-C-158
    when: When implementing or refactoring Turtle strategy signal generation logic
    action: 'Maintain the exact Donchian channel parameters: 20-day lookback for entry signals, 10-day lookback for exit signals'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Shorter lookbacks increase false signals and whipsaws; longer lookbacks reduce trend capture and delay entries/exits,
      degrading strategy performance
    derived_from_bd_id: BD-009
  - id: finance-C-159
    when: When implementing TargetPosTask large order split execution logic
    action: Randomize child order volumes between min_volume and max_volume bounds when splitting large orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fixed-size order splits create predictable execution patterns that market makers can detect and exploit through
      front-running or adverse positioning
    derived_from_bd_id: BD-004
  - id: finance-C-160
    when: When implementing TWAP execution algorithm price strategy logic
    action: Maintain dual-trigger transition from passive (limit) to active (market/IOC) pricing at either 2/3 elapsed interval
      OR when 2 seconds remain in the interval
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing the time-based trigger risks non-execution at interval end; removing the elapsed-based trigger reduces
      early interval fill rates and increases market impact costs
    derived_from_bd_id: BD-006
  - id: finance-C-161
    when: When implementing TargetPosScheduler final task handling logic
    action: Consider adding a configurable timeout for the final task's indefinite wait to prevent task hang if fills never
      occur due to market conditions or connectivity issues
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Indefinite wait for final task fill can cause the scheduler to hang indefinitely if fills never occur, blocking
      downstream operations and preventing strategy recovery
    derived_from_bd_id: BD-030
  - id: finance-C-162
    when: When using Quote.last_price or any price field in comparisons or calculations
    action: Always call math.isnan() check before using last_price in comparisons or arithmetic operations; do not assume
      price fields have valid numeric values
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: NaN values propagate silently through all comparisons, causing every comparison to return False regardless
      of actual values; this produces incorrect signal generation and silent trading failures
    derived_from_bd_id: BD-036
  - id: finance-C-163
    when: When implementing data pipeline processing in backtesting or production trading
    action: Assume the framework automatically isolates fit/transform operations between pipeline stages — the framework does
      not implement fit/transform isolation, meaning data transformations computed during training may leak into inference
      or prediction phases
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Without fit/transform isolation, ML model training features computed on historical data leak into prediction,
      causing look-ahead bias where backtest results appear significantly better than live trading would allow
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-164
    when: When implementing data pipeline processing in backtesting or production trading
    action: Verify fit/transform isolation by using separate compute contexts for training and prediction, or by implementing
      explicit feature store with timestamp-based retrieval that prevents future data leakage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit fit/transform isolation, features computed during training contaminate prediction datasets,
      causing systematic overestimation of strategy performance in backtests
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-165
    when: When using the framework's default annualization constants (250 trading days/year, 21 trading days/month) for performance
      reporting
    action: Verify that 250/21 matches your target market's actual trading calendar — Chinese equity/futures uses 250 days/year
      while US markets use 252, and actual trading days vary by exchange and contract
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using Chinese market constants (250/21) for US equity backtests misrepresents annualized returns, causing
      strategies to appear more or less attractive than their actual performance warrants
    derived_from_bd_id: BD-020
  - id: finance-C-166
    when: When calculating winning rate and profit/loss ratio for strategy performance reporting
    action: Verify that winning rate calculation (volume-weighted) and P&L ratio (contract multiplier-adjusted) match your
      intended metric definition — volume-weighted win rate differs from count-weighted; contract multipliers must be correctly
      configured per instrument
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Volume-weighted win rate may show high values for large winning trades even when win rate by count is low,
      leading to incorrect strategy evaluation and potentially larger position sizing than appropriate
    derived_from_bd_id: BD-021
  - id: finance-C-167
    when: When implementing or optimizing backtesting strategies that trigger frequently
    action: Verify that single-tick advancement per wait_update call is acceptable for your strategy's execution frequency
      — each market tick is processed sequentially which may cause significantly slower backtest execution for high-frequency
      strategies
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Single-tick advancement causes backtest execution time to scale linearly with market ticks, making complex
      high-frequency strategies computationally prohibitive to backtest within reasonable timeframes
    derived_from_bd_id: BD-023
  - id: finance-C-168
    when: When using the framework's Double MA strategy defaults (30/60 period SMA, 3-lot position size) as reference parameters
    action: Verify that 30/60 SMA periods and 3-lot fixed sizing match your risk tolerance — fixed 3-lot sizing creates varying
      leverage inversely proportional to account balance, and parameters may need adjustment for different market conditions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Fixed 3-lot position sizing creates inconsistent leverage across different account balances; small accounts
      receive high leverage while large accounts receive low leverage, causing unexpected risk exposure
    derived_from_bd_id: BD-024
  - id: finance-C-169
    when: When implementing or evaluating grid trading strategies
    action: Verify that 10 levels with linear position sizing matches your intended risk architecture — linear sizing creates
      symmetric risk accumulation proportional to distance from reference price
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Linear grid sizing creates unbounded drawdown risk as positions increase proportionally with adverse price
      movement, potentially exhausting capital before price reversal occurs
    derived_from_bd_id: BD-025
  - id: finance-C-170
    when: When processing market data feeds in simulation trading
    action: Verify that quotes arrive in strict temporal order — max quote datetime assumes temporal ordering; out-of-sequence
      quotes (due to network delays, exchange retransmissions) may cause incorrect current-time determination
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Out-of-sequence quotes cause SimTradeBase to set current time to the maximum received timestamp, potentially
      skipping processing of earlier legitimate quotes and causing order execution timing errors
    derived_from_bd_id: BD-029
  - id: finance-C-171
    when: When implementing VWAP execution schedules with short time intervals
    action: Verify that 2-second ACTIVE buffer at each interval end is proportional to your schedule intervals — the fixed
      buffer becomes disproportionately large (exceeding interval length) for intervals under 4 seconds
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Fixed 2-second active buffer causes excessive market impact for short-interval VWAP schedules, as the aggressive
      execution window may dominate the passive execution period
    derived_from_bd_id: BD-031
  - id: finance-C-172
    when: When implementing or modifying price fill logic in backtesting
    action: Change the ACTIVE price mode fill behavior or opponent price fill assumption without explicitly documenting the
      impact on guaranteed fill reliability — these decisions have silent coupling where changes to either degrade the other's
      assumptions
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Modifying ACTIVE price fill or opponent price execution without coordination causes silent degradation of
      fill reliability guarantees, making backtest results inconsistent with actual execution expectations
    derived_from_bd_id: BD-048
  - id: finance-C-173
    when: When implementing grid trading position management near range boundaries
    action: Implement explicit boundary handling for grid positions when price approaches grid edges — detect when price moves
      beyond 5% total coverage and handle one-directional position state transitions explicitly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit boundary handling, grid positions become entirely one-directional near extremes, creating
      unintended directional bias that causes backtest results to misrepresent actual risk exposure
    derived_from_bd_id: BD-054
  - id: finance-C-174
    when: When implementing mean-reversion strategies using Z-Score or Kalman filter signals
    action: Run Z-Score strategy (entry at ±1.8 sigma) and Kalman filter strategy (entry at ±2.0 sigma) simultaneously on
      the same underlying without reconciling their threshold differences — conflicting signals on the same data will cause
      position management confusion
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Without reconciling the 0.2 sigma difference between Z-Score and Kalman entry thresholds, strategies receive
      contradictory signals at ±1.9 sigma, leading to confused position management and inconsistent trading behavior
    derived_from_bd_id: BD-055
  - id: finance-C-175
    when: When implementing order insertion logic for end-of-day position closure strategies
    action: Verify order insertion through insert_order→wait_update→settlement cycle completes within available ticks before
      14:50 market close — add computation time buffers and verify tick frequency can support full settlement cycle
    severity: high
    kind: domain_rule
    modality: must
    consequence: If the order settlement cycle cannot complete before market close due to computation delays or low tick frequency
      near daily close, positions persist overnight unexpectedly, exposing strategies to overnight market risk not reflected
      in backtest
    derived_from_bd_id: BD-057
  - id: finance-C-176
    when: When connecting to CTP brokers (TqCtp, TqYida, TqJees, TqRohon)
    action: Implement authentication renewal monitoring for app_id and auth_code parameters — validate that auth codes are
      current and establish renewal procedures before expiration to prevent connection failures
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: CTP broker connections fail silently when auth codes expire or brokers update authentication requirements
      without SDK updates, causing live trading disconnection and financial loss due to missed trades
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-177
    when: When managing sub-account attribution in multi-strategy trading
    action: Implement explicit sub-account tagging with strategy identifiers instead of relying on filename-based defaults
      — use durable strategy IDs that persist across file renames and distinguish multiple strategies in the same file
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Filename-based sub-account tagging causes historical attribution to break when files are renamed, and loses
      attribution when multiple strategies run from the same file, making performance tracking unreliable for strategy management
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-178
    when: When implementing or modifying matrix operations in the backtesting framework
    action: Assume the framework handles matrix ill-conditioning detection and automatic remediation — the framework does
      not implement condition number checks or numerical stability safeguards for matrix operations
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Without ill-conditioning handling, matrix inversions or decompositions in portfolio optimization and risk
      calculations produce wildly inaccurate results when matrices are near-singular, causing strategies to generate incorrect
      signals
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-179
    when: When implementing matrix operations in the backtesting framework
    action: Check condition number before matrix inversion or decomposition; if condition_number > 1e10, apply Tikhonov regularization,
      pivoting, or switch to pseudo-inverse methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unchecked matrix ill-conditioning causes numerical overflow or underflow, producing NaN/Inf values in risk
      calculations and corrupting backtest results silently
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-180
    when: When implementing or modifying model calibration logic in the backtesting framework
    action: Assume the framework validates model calibration residuals automatically — the framework does not implement residual
      analysis, goodness-of-fit checks, or calibration convergence verification
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Without residual validation, poorly calibrated models produce systematically biased pricing and risk estimates,
      causing live trading strategies to underperform backtested results significantly
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-181
    when: When implementing model calibration in the backtesting framework
    action: After model calibration, compute and analyze residuals (mean, std, autocorrelation, normality tests); reject calibration
      if RMSE exceeds threshold or residuals show systematic patterns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unvalidated calibration produces model parameters that fit historical data but fail out-of-sample, causing
      strategies based on those parameters to generate incorrect signals in live trading
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-183
    when: When implementing grid trading position allocation logic
    action: Use 0.005 (0.5%) price step interval symmetrically for both long and short grid directions — maintain consistent
      step size regardless of direction to preserve risk distribution balance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing step size without recalibrating grid parameters creates asymmetric risk distribution between long
      and short directions, causing one side to accumulate more positions at extreme prices and increasing drawdown risk
    derived_from_bd_id: BD-001
  - id: finance-C-184
    when: When using TargetPosTask for order execution in fast-moving markets
    action: Verify that ACTIVE price mode (opponent/best bid-ask) and offset_priority 今昨开 (today-yesterday-open) match your
      execution requirements; if using PASSIVE mode or different offset priority, backtest with realistic fill assumptions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default TargetPosTask parameters in markets requiring passive execution causes limit orders to remain
      unfilled during fast moves, creating significant execution slippage between backtest and live results
    derived_from_bd_id: BD-003
  - id: finance-C-185
    when: When implementing multiple TargetPosTask instances for the same account and symbol
    action: Create or modify TargetPosTask instances to allow multiple concurrent instances for the same (account, symbol)
      pair — the singleton pattern must be preserved
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Multiple TargetPosTask instances for the same account+symbol can issue conflicting offset orders simultaneously,
      causing race conditions that lead to unintended position accumulation or rapid position flipping in live trading
    derived_from_bd_id: BD-002
  - id: finance-C-186
    when: When implementing order insertion logic in TqRiskRule
    action: Preserve the _could_insert_order and _on_insert_order hook methods and verify they are called at the correct insertion
      points — do not refactor insert_order flow without maintaining hook extensibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Breaking the hook pattern in TqRiskRule prevents third-party risk modules from vetoing orders before submission,
      causing risk checks to be bypassed silently and exposing accounts to unintended order execution
    derived_from_bd_id: BD-033
  - id: finance-C-187
    when: When initializing TqKq or TqKqStock instances for non-simulation trading
    action: Pass broker_id as a configurable parameter or modify the hardcoded broker_id='快期模拟' value — this hardcode is required
      for simulation broker authentication
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Changing the hardcoded broker_id breaks connectivity to the simulation broker, causing connection failures
      and preventing backtesting from executing orders against simulated market data
    derived_from_bd_id: BD-038
  - id: finance-C-188
    when: When implementing datetime calculations for international markets or exchanges in different timezones
    action: Use the framework's hardcoded CST offset (+8 hours) from datetime.py for trading day boundary calculations — this
      assumes each trading occurs in Nanjing timezone
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Hardcoded CST offset causes trading day calculations to shift by up to 24 hours for international users or
      exchanges using different timezone representations, leading to orders being scheduled for wrong trading sessions
    derived_from_bd_id: BD-034
  - id: finance-C-189
    when: When implementing simulation order matching logic
    action: Market orders must fill at opponent (best bid/ask) price as guaranteed fills; limit orders must only fill when
      limit price is favorable relative to opponent (buy limit >= opponent ask, sell limit <= opponent bid)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Market orders at mid-price or with random slippage create unrealistic fills that overestimate execution quality;
      passive limit orders treated as aggressive creates false liquidity assumptions, causing backtest returns to exceed what
      live trading can achieve
    derived_from_bd_id: BD-026
  - id: finance-C-190
    when: When implementing TWAP scheduling or TimeTableGenerator interval validation
    action: Maintain consistent 3-second minimum interval constraint across both TWAP algorithm (BD-005) and TimeTableGenerator
      (BD-015); when changing the interval threshold in one layer, must update the other layer to preserve consistency
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent interval constraints between TWAP and TimeTableGenerator cause confusing duplicate error messages
      and create coupling risk where changes to one layer without the other lead to unpredictable validation failures
    derived_from_bd_id: BD-051
  - id: finance-C-193
    when: When implementing strategies using wait_update with computational delays between calls
    action: 'Account for simulation timing accuracy vs speed trade-off: simulation time only advances when wait_update is
      called with new quotes; strategies with long computational delays may have simulation time that does not advance proportionally
      to real time'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies with long computational delays between wait_update calls will have simulation time lagging behind
      real time, causing execution timing mismatches that make backtest results unreproducible in live trading
    derived_from_bd_id: BD-056
  - id: finance-C-194
    when: When implementing or refactoring the AR momentum strategy thresholds
    action: 'Use the fixed AR bands: long entries when 110 < AR < 150 (moderate overheating), short entries when 50 < AR <
      90 (moderate weakness), with symmetric exit thresholds around neutral. Do not use symmetric ranges like 90-110 for both
      entries'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing AR thresholds to symmetric ranges or arbitrary values removes the asymmetric entry logic designed
      to exploit the empirical observation that markets sustain overheating longer than weakness, potentially causing strategy
      to enter positions at suboptimal timing
    derived_from_bd_id: BD-013
  - id: finance-C-195
    when: When implementing order execution logic in backtesting
    action: Execute sell orders before buy orders when both are pending — verify no reliance on leverage or intraday credit
    severity: high
    kind: domain_rule
    modality: must
    consequence: Buying before selling creates hidden leverage when capital is insufficient; in live trading, buy orders may
      be rejected due to insufficient funds, causing backtest-live inconsistency
    derived_from_bd_id: BD-013
  - id: finance-C-196
    when: When implementing IOC (Immediate-Or-Cancel) order handling in simulation
    action: Cancel IOC orders immediately if fill cannot occur at the required price — implement all-or-nothing execution
      semantics, do not support partial fills for IOC orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: IOC orders with partial fill support violate exchange IOC behavior semantics; strategies expecting immediate
      cancellation will receive unintended fills at worse prices, causing backtest-live execution mismatch
    derived_from_bd_id: BD-032
  - id: finance-C-197
    when: When implementing custom risk rule subclasses extending TqRiskRule
    action: Override _could_insert_order as a pre-check hook (called before order submission) and _on_insert_order as a post-check
      hook (called after order submission) — both hooks must be called within TqApi insert_order flow to maintain correct
      risk management sequencing
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Overriding risk check hooks incorrectly or outside the TqApi insert_order flow breaks the template method
      pattern, causing pre-checks to run after order submission or post-checks to never execute, resulting in uncaught risk
      violations
    derived_from_bd_id: BD-043
  - id: finance-C-199
    when: When implementing data retrieval logic
    action: call wait_update() after any get_* API call to receive data updates
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Data fields remain empty, NaN, or stale because the first data packet has not arrived — the user sees no
      updates even though the API call succeeded
  - id: finance-C-200
    when: When placing or cancelling orders
    action: call wait_update() after insert_order() or cancel_order() to send the network packet
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Orders are queued locally but never transmitted to the exchange — insert_order or cancel_order silently does
      nothing
  - id: finance-C-201
    when: When operating TargetPosTask
    action: call wait_update() after every set_target_volume() to let the task send orders
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: TargetPosTask does not act — target volume is set but no orders are generated because the task never receives
      its update cycle
  - id: finance-C-202
    when: When using multi-account mode with TqMultiAccount
    action: pass account= to every account-sensitive API call including insert_order, cancel_order, get_account, get_position,
      get_order, and get_trade
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Runtime error '多账户模式下, 需要指定账户实例 account' — the API rejects the call because it cannot infer which account
      to use
  - id: finance-C-203
    when: When writing stock trading code
    action: pass offset parameter to stock orders or use TargetPosTask for stock position management
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Stock orders reject offset values and raise an error, while TargetPosTask silently does not work for stock
      accounts — causing position management failures
  - id: finance-C-204
    when: When writing futures trading code
    action: use offset values OPEN, CLOSE, or CLOSETODAY only — never pass empty or stock-style offset to futures orders
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Futures orders with invalid offset values are rejected by the exchange layer with an offset error
  - id: finance-C-205
    when: When mixing TargetPosTask with manual order placement
    action: combine TargetPosTask and insert_order on the same symbol for the same account
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: TargetPosTask conflicts with manual orders on the same symbol — the task stops acting or raises an error
      about conflicting parameters
  - id: finance-C-206
    when: When creating TargetPosTask instances
    action: create only one TargetPosTask per account and symbol combination
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Creating multiple TargetPosTask instances for the same account and symbol with different parameters raises
      an error and position management becomes broken
  - id: finance-C-207
    when: When using get_kline_serial or get_tick_serial
    action: create the DataFrame reference once outside the loop and reuse it — never recreate inside wait_update() loop
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Recreating the DataFrame inside the loop resets data continuity and causes indicators to lose historical
      context, producing incorrect signals
  - id: finance-C-208
    when: When using K-line durations at day level or higher
    action: set dur_sec as an integer multiple of 86400 up to a maximum of 2419200 seconds (28 days)
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-integer-multiple day-level durations or durations exceeding 28 days cause DataDownloader or get_kline_serial
      to reject the request or return incorrect data
  - id: finance-C-209
    when: When requesting historical data rows
    action: limit data_length to 10000 rows or fewer per get_kline_serial or get_tick_serial call
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Requesting more than 10000 rows causes the API to raise an error or return incomplete data
  - id: finance-C-210
    when: When needing long-range historical CSV export
    action: use DataDownloader for CSV export of historical data ranges
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using backtest mode for long-range data export fails because backtest is for historical strategy execution,
      not arbitrary data retrieval
  - id: finance-C-211
    when: When running backtest mode
    action: use TqSim or TqSimStock as the trading account — TqKq and TqAccount cannot trade in backtest mode
    severity: high
    kind: resource_boundary
    modality: must
    consequence: TqKq and TqAccount do not support backtest trading — orders placed with these account types during backtest
      are silently ignored or raise errors
  - id: finance-C-212
    when: When expecting Quick account data to appear in Quick clients
    action: use TqKq instead of TqSim for Quick ecosystem simulation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: TqSim is local and disposable — account data does not appear in official Quick clients, causing confusion
      about account state
  - id: finance-C-213
    when: When using DataDownloader for historical export
    action: verify the account has DataDownloader permission — it is a paid or permission-gated feature
    severity: high
    kind: resource_boundary
    modality: must
    consequence: DataDownloader raises TqBacktestPermissionError when the account lacks download permission, blocking historical
      data export
  - id: finance-C-214
    when: When implementing a trading strategy
    action: expect backtest returns to equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as live trading performance misleads stakeholders — backtest does not account
      for slippage, fills, market impact, or execution latency that occur in live trading
  - id: finance-C-215
    when: When using TqApi with only auth parameter
    action: treat TqApi(auth=TqAuth(...)) as a real broker trading account
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: TqApi(auth=...) without an explicit account type defaults to TqSim — it cannot execute real broker trades
      and users may mistakenly believe they are trading live
  - id: finance-C-216
    when: When presenting stock trading capabilities
    action: claim that TargetPosTask works for stock trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: TargetPosTask does not support stock trading — advertising it as a stock position management tool misleads
      users into broken workflows
  - id: finance-C-217
    when: When answering field-related questions for stock accounts
    action: explain futures-only fields such as offset, margin, pos_long_today on stock objects
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Stock objects do not have futures-specific fields — explaining them creates confusion and incorrect code
      patterns for stock users
  - id: finance-C-218
    when: When writing examples for current market data
    action: hardcode expired delivery month contracts in examples
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Expired contracts return no data or stale data — hardcoded expired symbols in examples fail for users trying
      to run the code
  - id: finance-C-219
    when: When debugging TargetPosTask issues
    action: check that wait_update() is still being called after set_target_volume() before investigating other causes
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: The most common TargetPosTask failure is forgetting wait_update() — investigating other causes wastes time
      on a solved problem
  - id: finance-C-220
    when: When debugging insert_order or cancel_order issues
    action: check that wait_update() follows the order call before investigating other causes
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: insert_order and cancel_order queue requests — they do nothing until wait_update() is called, which is the
      most common misuse pattern
  - id: finance-C-221
    when: When implementing backtest strategy logic
    action: expect wait_update() to advance time in steps — one call may update only order state, another may advance market
      time
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Backtest timing differs from live mode — expecting synchronous updates causes confusion about why quotes
      are not updating on every wait_update() call
  - id: finance-C-222
    when: When calling account-object getters directly
    action: wire the account into TqApi first before calling account.get_account() or similar getters
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling account-object getters before TqApi initialization raises '未初始化 TqApi' error
  - id: finance-C-223
    when: When running interactive trading code in Jupyter
    action: use wait_update(deadline=...) to avoid indefinite blocking
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: wait_update() blocks indefinitely in Jupyter notebooks, freezing the interface — users must interrupt the
      kernel to regain control
  - id: finance-C-224
    when: When trying to use sleep() to wait for TqSdk
    action: call sleep() to pause execution waiting for data or order updates
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: sleep() stops the update loop — no data arrives, no orders are processed, and background tasks are suspended
      during sleep
  - id: finance-C-225
    when: When choosing the default account type
    action: default to TqKq or TqAccount without confirming the user needs that specific account mode
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: TqKq and TqAccount require real credentials and broker connectivity — defaulting to them without confirmation
      causes auth errors for users without those accounts
  - id: finance-C-226
    when: When explaining object fields to users
    action: explain the smallest relevant field set first and state whether the object is futures or stock
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Showing all fields at once overwhelms users and mixing futures and stock fields causes incorrect usage patterns
  - id: finance-C-227
    when: When creating advanced execution helpers
    action: recommend InsertOrderTask, InsertOrderUntilAllTradedTask, or tqsdk.algorithm.Twap as default answers
    severity: low
    kind: operational_lesson
    modality: should_not
    consequence: These are internal or advanced helpers — recommending them as defaults leads users to overcomplicated solutions
      when TargetPosTask or TargetPosScheduler suffices
  - id: finance-C-228
    when: When debugging order and position issues in triage
    action: 'check in this order: wrong account type, missing wait_update(), futures versus stock mismatch, missing account=
      in multi-account mode, wrong symbol, wrong offset or advanced parameters, unsupported target-position workflow'
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Skipping the error triage order wastes time investigating symptoms instead of root causes — wrong account
      type and missing wait_update() account for the majority of issues
  - id: finance-C-230
    when: When describing behavior differences across modes
    action: state explicitly when behavior differs between live trading, Quick sim, local sim, stock sim, or backtest
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Failing to distinguish mode-specific behavior misleads users into incorrect assumptions — for example, expecting
      backtest to behave like live trading
  - id: finance-C-231
    when: When adjusting TargetPosTask parameters
    action: cancel the old TargetPosTask before creating a new one with different price, offset_priority, min_volume, or max_volume
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Creating a new TargetPosTask for the same account and symbol with different parameters raises a conflict
      error — the old task must be canceled first
  - id: finance-C-232
    when: When requesting multiple symbols for tick download
    action: pass multiple symbols to DataDownloader for tick-level download (dur_sec=0)
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Tick download with multiple symbols is not supported — the DataDownloader raises an error and no data is
      exported
  - id: finance-C-233
    when: When using adj_type parameter
    action: use adj_type only for stock and fund contracts — not for futures or other contract types
    severity: low
    kind: resource_boundary
    modality: must
    consequence: adj_type has no effect on non-stock contracts and may cause confusion or unsupported parameter errors in
      some contexts
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
