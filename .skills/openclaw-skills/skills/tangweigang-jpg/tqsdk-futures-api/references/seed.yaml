    - id: BD-044
      type: DK
      summary: risk_rule.py uses time.monotonic/CLOCK_MONOTONIC instead of exchange time for rate limiting
    - id: BD-047
      type: B/BA
      summary: 'INTERACTION: BD-007 (10M default balance) × BD-008 (Turtle 1% unit) → amplified position sizing creating implicit
        leverage exposure'
    - id: BD-048
      type: B/BA
      summary: 'INTERACTION: BD-003 (ACTIVE price default) × BD-026 (opponent price fill) → guaranteed fill assumption silently
