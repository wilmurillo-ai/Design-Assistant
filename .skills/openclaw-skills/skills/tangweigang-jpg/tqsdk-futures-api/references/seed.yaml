  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-BF-002
  statement: 'A 股以散户为主（个人账户交易量占比超 80%），羊群效应显著：散户倾向于 跟风操作，导致价格非理性波动（如 2015年杠杆牛熊）。量化策略应避免 使用成交量排行/热度排行等可能强化羊群信号的指标作为主要因子。

