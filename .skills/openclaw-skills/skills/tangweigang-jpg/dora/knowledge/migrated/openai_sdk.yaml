constraints:
- 'OpenAI''s o1/o3/o4 reasoning model series have significant API constraints that differ from GPT-4 class
  models. In the initial releases: system messages are not supported (they are merged into the first user
  message); temperature, top_p, and presence_penalty parameters are ignored; streaming is supported but
  the thinking tokens are not streamed (only the final response streams); and tool use requires setting
  parallel_tool_calls=False because reasoning models handle sequential tool calls differently than chat
  models. The most impactful constraint for applications: reasoning models have a max_completion_tokens
  parameter separate from max_tokens, which limits the combined thinking + output tokens — setting this
  too low causes the model to truncate its reasoning trace mid-thought, producing a low-quality final
  answer that is indistinguishable from a well-reasoned one without inspecting token counts.'
- 'Migrating from SDK v0.x to v1.0 breaks every call site because the module-level `openai.ChatCompletion.create()`
  API was removed entirely — it is not deprecated with a shim, it simply does not exist. The failure mode
  is a hard `AttributeError` at runtime, not at import time, so tests that mock the old path pass while
  production calls crash. The correct migration is: (1) instantiate `client = OpenAI()`, (2) replace `openai.ChatCompletion.create(**kwargs)`
  with `client.chat.completions.create(**kwargs)`, (3) note that response objects changed from dict-like
  to Pydantic models so `.get(''choices'')` must become `.choices`. OpenAI provides an official migration
  guide and a `openai migrate` CLI tool that runs codemods, but the codemods miss dynamic call sites constructed
  with `getattr`.'
- 'Token counts returned in `response.usage.prompt_tokens` and `response.usage.completion_tokens` do not
  always match what appears on the billing dashboard. Known causes: (1) the API counts tokens server-side
  using its own tokenizer version, which may differ from `tiktoken` used locally; (2) function/tool call
  definitions are injected into the prompt by the server before tokenization — these hidden tokens are
  counted in `prompt_tokens` but many developers forget to account for them when estimating costs; (3)
  image inputs (vision API) use a tile-based token formula that is computed server-side and cannot be
  predicted client-side without replicating the exact tile logic. The correct approach is to trust `response.usage`
  for billing estimation and treat local `tiktoken` counts as approximations only.'
- 'OpenAI''s Assistants API maintains conversation state server-side via threads, and each thread can
  accumulate thousands of messages over time. The failure mode: threads are never automatically truncated
  or pruned — they grow indefinitely, and older threads with 200+ messages cause the Assistant to silently
  truncate early messages when constructing the context window for a new run. Unlike the chat completions
  API where context management is explicit (you control the messages array), Assistants API context management
  is opaque. Teams have discovered this only when users complained that the Assistant ''forgot'' information
  from earlier in long conversations. Mitigation: implement thread rotation (create a new thread and summarize
  the old one) when thread message count exceeds a threshold, or set truncation_strategy on the run to
  control which messages are preserved.'
- OpenAI SDK's httpx timeout configuration applies separately to connect timeout and read timeout. The
  default read timeout is 600 seconds, which means a hung server call will block for 10 minutes before
  raising a TimeoutError. For applications with strict latency SLOs, this default is catastrophically
  long. Setting timeout=httpx.Timeout(connect=5.0, read=30.0, write=10.0, pool=5.0) on the OpenAI client
  constructor correctly bounds all network operations. A common mistake is setting timeout=30 (scalar)
  thinking this covers all operations — a scalar timeout only sets the read timeout, leaving connect and
  pool timeouts at their defaults. Under network failures where the TCP connection hangs at the SYN stage,
  a scalar read timeout does not prevent the 10-minute block. Testing timeout behavior requires a tool
  like toxiproxy to simulate network delays, as real API endpoints are too reliable to trigger timeout
  paths in development.
- 'OpenAI''s moderation endpoint (/v1/moderations) returns a categories dict and a category_scores dict,
  but the flagged boolean is computed from a proprietary threshold applied server-side to the scores.
  The threshold changes over time as OpenAI updates the moderation model, which means the same text can
  be flagged differently across weeks without any API version change or notification. Code that caches
  ''safe'' moderation results and reuses them should set TTLs of hours, not days. A second failure: the
  moderation endpoint is NOT the same model used to moderate requests to chat/completions — the production
  moderation guardrails are applied internally and are more conservative than the standalone moderation
  endpoint. Passing content through /v1/moderations and receiving ''not flagged'' does not guarantee the
  corresponding /v1/chat/completions call will succeed if the content is borderline.'
- 'OpenAI Python SDK v1.0 (released November 2023) replaced the module-level function pattern with an
  explicit client instance pattern. All API calls now go through an `OpenAI()` or `AsyncOpenAI()` client
  object rather than `openai.ChatCompletion.create()`. This redesign was intentional: it makes API key
  scoping, base URL overriding, and HTTP client configuration explicit and per-client rather than global
  mutable state, which eliminates entire classes of concurrency and multi-tenant bugs.'
- The SDK's streaming interface uses a context-manager pattern (`with client.chat.completions.stream(...)
  as stream`) for v1.x, which guarantees the underlying HTTP connection is closed even on early exit or
  exceptions. The older `.create(stream=True)` path returns a raw iterator without resource cleanup guarantees.
  Streaming is the recommended path for latency-sensitive applications because it allows first-token display
  within ~300ms while the full response is still generating, and because the SDK exposes `.get_final_message()`
  and `.get_final_usage()` helpers on the stream object to recover structured data without manual accumulation.
- 'The SDK provides two parallel client classes: `OpenAI` (synchronous, built on `httpx` sync transport)
  and `AsyncOpenAI` (async, built on `httpx` async transport). They are not interchangeable at runtime
  — calling `AsyncOpenAI` methods without `await` in a sync context returns a coroutine object silently,
  not an error. The rule: use `AsyncOpenAI` inside any async framework (FastAPI, asyncio, Starlette) and
  `OpenAI` in synchronous scripts or Django views. Using the sync client inside an async event loop blocks
  the loop thread and degrades throughput; using `asyncio.run()` inside an already-running event loop
  raises a `RuntimeError`. For mixed codebases, `anyio.from_thread.run_sync` is the correct bridge.'
- 'The tool/function calling API went through two schema generations. The original `functions` parameter
  (June 2023) used `function_call` for control and returned `finish_reason=''function_call''`. The current
  `tools` parameter (November 2023+) wraps functions under `{"type": "function", "function": {...}}` and
  returns `finish_reason=''tool_calls''` with a `tool_calls` list on the message. The old `functions`
  schema still works but is deprecated and absent from newer models. The critical behavioral difference:
  the new schema supports parallel tool calls (multiple tool invocations in a single response), which
  the old schema cannot express. Projects that detect `finish_reason == ''function_call''` will silently
  miss tool results from newer models that return `finish_reason == ''tool_calls''`.'
- The SDK v1.x has built-in automatic retry with exponential backoff enabled by default (`max_retries=2`).
  It retries on HTTP 429 (rate limit) and 5xx errors, but NOT on 400 (bad request) or 401 (auth) errors.
  The default retry count of 2 is often too low for production burst workloads; setting `max_retries=6`
  with the default backoff covers most quota recovery windows. For TPM (tokens-per-minute) limits specifically,
  retrying immediately after a 429 is counterproductive — the `Retry-After` header in the 429 response
  contains the exact wait time and the SDK respects it. Custom retry logic using `tenacity` should be
  layered outside the SDK client only when you need per-request jitter strategies or circuit breaker patterns
  that the built-in retry does not support.
- 'OpenAI''s Batch API (/v1/batches) enables submitting up to 50,000 requests in a single JSONL file for
  asynchronous processing with a 24-hour completion window at 50% cost discount. The architectural implication:
  Batch API is not a throughput optimization for real-time use cases — it is designed for offline workloads
  (evaluation runs, data annotation, bulk document processing) where latency is irrelevant. The SDK workflow
  is: (1) create a file with client.files.create(purpose=''batch''), (2) submit with client.batches.create(input_file_id=...,
  endpoint=''/v1/chat/completions''), (3) poll client.batches.retrieve() until status=''completed'', (4)
  download results with client.files.content(). Mixing Batch API and real-time API for the same application
  logic creates operational complexity with no benefit; they serve orthogonal use cases.'
- 'OpenAI''s Structured Outputs feature (response_format={''type'': ''json_schema'', ''json_schema'':
  {...}}) guarantees that the model''s output conforms to a provided JSON schema with 100% reliability
  — not just ''usually''. This is architecturally different from json_object mode, which only guarantees
  valid JSON without schema adherence. Structured Outputs works by applying constrained decoding server-side,
  similar to vLLM''s guided decoding. The SDK''s parse() method on the beta client (client.beta.chat.completions.parse())
  integrates this with Pydantic: pass a Pydantic model class and receive a parsed model instance directly.
  The constraint: Structured Outputs only supports a subset of JSON Schema (no $ref without $defs, no
  recursive schemas, limited additionalProperties support). Schemas that violate these constraints return
  a 400 error with a descriptive message about which feature is unsupported.'
- OpenAI's vision API (gpt-4o, gpt-4-vision) accepts images as base64-encoded data URLs or as HTTPS URLs
  directly in the message content array. The detail parameter ('low', 'high', 'auto') controls the resolution
  at which the image is processed. 'low' mode always uses 85 tokens and processes the image at 512x512
  regardless of original size — appropriate for questions that don't require fine spatial detail. 'high'
  mode tiles the image into 512x512 chunks (up to 3072x3072 input), using 170 tokens per tile plus 85
  base tokens. For a 2000x2000 image in 'high' mode, this is 765 tokens. Using 'auto' on high-resolution
  diagrams or documents is a hidden cost multiplier that surprises teams doing cost estimation. The correct
  approach is to size images to the minimum resolution needed for the task and use 'low' when spatial
  precision is not required.
- 'OpenAI''s Realtime API (WebSocket-based, for gpt-4o-realtime) has a fundamentally different programming
  model from the REST API: it is event-driven and stateful over a persistent connection. The SDK wraps
  this in client.beta.realtime.connect() which manages connection lifecycle, event dispatching, and audio
  buffer management. Key architectural implications: (1) audio input is streamed in chunks as input_audio_buffer.append
  events, not as a single payload; (2) model responses are also streamed as audio deltas, requiring the
  client to buffer and play them incrementally; (3) function calling works via response.function_call_arguments.done
  events, not the synchronous tool_calls in REST; (4) the session maintains conversation history automatically,
  similar to Assistants threads but in-memory. Teams should not attempt to build real-time voice applications
  on top of the REST streaming API — the Realtime API is purpose-built for sub-300ms voice interaction
  latency.'
