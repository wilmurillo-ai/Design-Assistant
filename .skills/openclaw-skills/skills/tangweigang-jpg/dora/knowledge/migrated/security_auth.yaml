constraints:
- 'PKCE (Proof Key for Code Exchange) is now mandatory for all OAuth2 authorization code flows — not just
  public clients — because the authorization code interception attack is possible even in confidential
  clients when the redirect URI is a localhost port or a custom URL scheme. PKCE binds the authorization
  request to the token exchange via a code verifier/challenge pair that only the original requestor knows.
  The constraint: any OAuth2 flow without PKCE is considered insecure per RFC 9700 (OAuth 2.1), which
  consolidates best current practice. For AI skill OAuth integrations, always generate a cryptographically
  random code_verifier (43-128 chars), hash it with S256 to produce the code_challenge, and include both
  in respective steps of the flow.'
- 'Dependency supply chain attacks (like the XZ Utils backdoor, event-stream incident, and polyfill.io
  compromise) demonstrate that any imported package is a trust boundary. The constraint for AI skill development:
  every new dependency is an expanded attack surface, and indirect (transitive) dependencies are the highest-risk
  vector because they are invisible in casual review. Concrete mitigations: pin all dependencies to exact
  versions using a lock file (uv.lock, package-lock.json, poetry.lock) so any upstream mutation is detectable;
  enable automated vulnerability scanning (Dependabot, Snyk, pip-audit) in CI; use hash verification for
  package downloads; prefer packages with broad adoption and active maintenance over niche alternatives.
  The cost of a supply chain compromise is typically total credential exfiltration of everything the process
  can access.'
- 'The most common OAuth2 implementation failure in production is not storing the refresh token securely
  — developers store it in localStorage or a plain database column, allowing XSS or a DB breach to yield
  a persistent credential that grants access until manually revoked. The UNSAID trap: access tokens expire
  but refresh tokens are often valid for weeks or indefinitely. A leaked refresh token is more damaging
  than a leaked password because it requires explicit server-side action to revoke, whereas a password
  can be reset by the user. Correct practice: store refresh tokens encrypted at rest using envelope encryption
  (data encryption key wrapped by a key in a managed KMS), never in a browser-accessible store, and implement
  refresh token rotation so each use issues a new token and invalidates the old one.'
- 'Secret rotation that does not include updating all consumers simultaneously causes a class of outages
  called ''rotation brownout'': the old secret is revoked, some services have fetched the new one, others
  are still using cached copies of the old one. The UNSAID failure mode: libraries that cache credentials
  in memory (database connection pools, SDK clients initialized at startup) will continue using the old,
  now-invalid credential until the process restarts or the cache TTL expires. The correct pattern is to
  implement secret version awareness — use secrets manager SDK watchers or a short TTL on cached credentials,
  and design clients to retry with a freshly fetched credential on 401/403 before propagating the error.
  Without this, rotation windows reliably produce partial outages proportional to cache TTL.'
- 'Rate limiting implemented only at the application layer (counting in Redis or a counter table) fails
  under distributed attack because the counting itself can be bypassed by hitting multiple nodes before
  counters synchronize. The UNSAID failure mode: if you have 5 app servers and each has an in-process
  counter, an attacker can send 4 requests to each server concurrently and bypass a limit of 5. The correct
  pattern is atomic counting at the gateway layer (API gateway, WAF, or Nginx with shared memory) combined
  with token bucket or leaky bucket algorithm in a single authoritative store (Redis with INCR + EXPIRE
  or a sliding window using Redis sorted sets). For AI skill APIs specifically, rate limits should be
  per API key, per user, AND per IP to prevent credential-sharing abuse.'
- 'Input sanitization that only blocks known-bad patterns (blacklist approach) reliably fails against
  novel encodings and context-specific injection vectors. The UNSAID failure: attackers iterate faster
  than blocklists are updated, and the same payload can be represented in dozens of equivalent encodings
  (URL encoding, Unicode normalization variants, HTML entities, null bytes) that bypass string-matching
  filters. The correct approach for AI skill inputs is allowlist validation: define exactly what is valid
  (type, length, character set, format), reject everything else, and normalize input to a canonical form
  before validation to collapse encoding variants. For free-text fields that go into LLM prompts, additionally
  apply structural isolation (delimiter tags) rather than trying to scan for malicious content — you cannot
  reliably detect all prompt injection patterns.'
- 'Storing credentials in environment variables is safer than hardcoding but is not the final answer —
  process-level environment exposure is a common lateral movement path in containerized environments.
  The UNSAID failure: environment variables are visible to all processes running as the same user, leaked
  in crash dumps and error logs, visible through /proc/self/environ on Linux, and frequently captured
  by APM tools that collect process environment for debugging. The correct graduated approach: for local
  dev, .env files (gitignored) are acceptable; for staging/prod in containers, use the container platform''s
  secrets injection (Kubernetes Secrets mounted as files, not env vars; AWS ECS Secrets Manager integration);
  for highest sensitivity, fetch secrets at runtime from a secrets manager SDK and hold them only in memory,
  never in env vars.'
- 'Indirect prompt injection via retrieved documents is the most underappreciated attack vector for RAG-based
  AI agents. The failure pattern: an attacker publishes a web page, document, or database record containing
  hidden LLM instructions (white text on white background, zero-width characters, HTML comments, or instructions
  embedded in metadata). When the agent retrieves this content for a query, the injected instructions
  execute in the agent''s context, potentially overriding its system prompt or exfiltrating user data.
  Real-world examples include attacks on Bing Chat, ChatGPT plugins, and Slack AI. The UNSAID severity:
  this attack requires no access to the system — any content the agent is trained to read is a potential
  injection surface. Mitigations: delimiter isolation of retrieved content, explicit untrusted-data declarations
  in system prompts, and tool-call confirmation for high-impact actions.'
- 'LLM budget caps are a security control, not just a cost control — without them, a compromised or runaway
  agent can exhaust API quotas in minutes, causing denial of service for all legitimate users of the same
  key. The UNSAID failure: many teams set budget alerts but not hard limits, meaning the alert fires after
  the damage is done. The correct pattern is to set hard per-key, per-day, and per-request token limits
  at the LLM provider level AND in the application layer (count tokens before dispatch, reject if over
  budget). For multi-agent systems, budget should be allocated per agent invocation so a single misbehaving
  agent cannot consume the allocation for all agents. Treat LLM API quota like a file descriptor limit
  — a resource that must be actively managed, not assumed to be infinite.'
- 'API keys must never be hardcoded into source code because source code — even in private repositories
  — is routinely leaked through accident, misconfigured access, former-employee credentials, or supply-chain
  attacks on dependencies. The underlying reason hardcoding is catastrophic rather than merely bad: a
  key in source survives indefinitely in git history even after deletion from the working tree, so a ''fix''
  of removing the key from current code still leaves the secret readable in every prior commit. The correct
  model is to treat all secrets as runtime-injected configuration — environment variables, secrets managers
  (AWS Secrets Manager, HashiCorp Vault, GCP Secret Manager) — so that the codebase itself never contains
  credential material. Rotation is then possible without changing code.'
- 'The principle of least privilege (PoLP) is the single most impactful security control for AI skill
  and agent systems because agents operate autonomously on behalf of users and can cause irreversible
  damage if over-permissioned. The WHY: when an agent is compromised — via prompt injection, a malicious
  tool response, or a supply-chain attack — the blast radius is bounded by its permission scope. An agent
  with read-only database access cannot exfiltrate and delete; an agent with only one API scope cannot
  pivot to other services. PoLP transforms a total compromise into a contained incident. For AI agents
  specifically, every tool registration should specify only the exact operations needed, and credentials
  should be scoped per-agent rather than shared.'
- 'OAuth 2.0''s token-based model exists to solve the fundamental problem of credential delegation: before
  OAuth, delegating access required sharing the actual password, which could not be scoped, audited per-delegation,
  or revoked independently. OAuth''s access token is a short-lived, scoped capability proof that separates
  ''I am authorized to act'' from ''here are my master credentials''. The refresh token mechanism exists
  because access tokens should be short-lived to limit exposure from token theft, but requiring the user
  to re-authenticate every hour would be unusable. Refresh tokens allow silent renewal while remaining
  revocable server-side — revoking a refresh token invalidates all future access tokens without touching
  the user''s core credential.'
- 'CORS (Cross-Origin Resource Sharing) headers do not protect server-side resources — they only instruct
  browsers to block unauthorized cross-origin reads. The WHY this matters for AI skill APIs: server-side
  clients (curl, Python requests, Postman, other services) ignore CORS entirely. A CORS policy is a browser-trust
  mechanism, not an authentication mechanism. Many developers implement a permissive CORS policy (Access-Control-Allow-Origin:
  *) thinking it ''opens up'' the API for external use, not realizing that non-browser clients were never
  restricted to begin with. The correct model: use authentication (API keys, OAuth tokens) for server-to-server
  access control, and use CORS to restrict which browser origins can make credentialed requests. Allowing
  wildcard CORS on credentialed routes is the specific dangerous anti-pattern.'
- 'JWT (JSON Web Token) stateless authentication trades server-side session storage for cryptographic
  verification, but this trade-off introduces a critical property: JWTs cannot be invalidated before expiry
  without maintaining a server-side blocklist — which reintroduces the state you were trying to avoid.
  The WHY this matters operationally: when a user logs out, changes password, or has their account suspended,
  a stateless JWT continues to authorize requests until it expires. For AI agents that operate on behalf
  of users, an agent could continue taking actions using a JWT long after the user has revoked consent.
  The correct pattern is: short expiry (15 minutes) + refresh token rotation for interactive sessions,
  and for agents, use opaque tokens backed by a server-side session table so revocation is immediate.'
- 'Permission scoping for AI agents must be defined at the tool registration level, not at the authentication
  level, because authentication answers ''who is this agent'' but scoping answers ''what can this agent
  do right now''. The WHY this distinction matters: an agent authenticated as ''service-account-X'' may
  be legitimately trusted for some operations but not others. Defining permissions at the tool level —
  each tool in the agent''s manifest specifies exactly which APIs it calls and what data it accesses —
  creates a capability manifest that can be audited before deployment. This maps to the OAuth 2.0 scope
  concept: each tool invocation should carry only the scope needed for that specific operation, and the
  agent orchestrator should refuse to grant broader scopes than what the tool manifest declares.'
- 'Token refresh should be implemented with a jitter to prevent thundering herd on the auth server. The
  WHY: when many agents or clients have tokens that were issued at the same time (e.g., after a deployment
  or a mass reauth event), all tokens expire simultaneously and all clients attempt refresh at the same
  moment, causing a traffic spike that can overload the authorization server. Adding random jitter (±
  10-20% of TTL) to the refresh trigger point distributes this load evenly. Additionally, implement proactive
  refresh: refresh the token at 75-80% of its TTL rather than waiting for a 401, so agents never experience
  auth failures during high-value operations. The cost of a failed LLM agent mid-task due to an expired
  token is higher than the overhead of proactive refresh.'
- 'A secure AI skill authentication assembly combines: (1) API key stored in a secrets manager, fetched
  at runtime with a short TTL cache; (2) every outbound request includes the key in an Authorization header,
  never in URL query params (query params appear in server logs, browser history, and HTTP referrer headers);
  (3) rate limiting enforced at the gateway with token bucket per API key; (4) all requests and responses
  logged to an append-only audit store with masked key values; (5) automated key rotation on a schedule
  with consumer-side retry-on-401 logic. The WHY this assembly matters: each element alone is insufficient
  — secrets manager without rotation creates stale keys; rotation without consumer retry causes outages;
  logging without masking leaks the secret. The assembly is the unit of correctness, not the individual
  controls.'
