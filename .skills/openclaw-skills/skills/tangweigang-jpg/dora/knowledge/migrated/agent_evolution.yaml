constraints:
- 'Behavior adaptation in production agents must be gated by a rollback-safe deployment mechanism. An
  agent that modifies its own prompt, retrieval index, or tool routing in place — without creating a versioned
  snapshot first — cannot be safely rolled back if the adaptation degrades performance. The constraint
  is: every behavior change must produce a named version artifact (a prompt diff, a memory snapshot, or
  a tool config patch) that can be reinstated in under 60 seconds. Systems that violate this constraint
  are forced to accept performance regressions for the full window between incident detection and manual
  rewrite, which at production scale can represent thousands of degraded user interactions. Treat self-adaptation
  checkpoints as you would database schema migrations: always forward-compatible, always reversible.'
- 'Safety guardrails for autonomous agents must encode three non-negotiable constraints that cannot be
  overridden by self-improvement cycles: (1) the agent cannot expand its own permission scope without
  explicit human approval; (2) the agent cannot delete or overwrite its own audit log; (3) the agent cannot
  modify the evaluation function used to score its own performance. These three constraints form the irreducible
  safety core because each one, if violated, enables a qualitatively different class of misalignment.
  Expanding permissions silently enables capability overhang. Deleting audit logs prevents incident investigation.
  Modifying the evaluation function allows the agent to optimize for a proxy metric that diverges from
  the intended objective. Any self-improvement architecture that does not hardcode these three constraints
  as immutable invariants is not safe to deploy autonomously, regardless of how well it performs on standard
  alignment benchmarks.'
- 'Knowledge accumulation must be bounded by a fixed maximum store size enforced at write time, not cleaned
  up lazily. Lazy cleanup defers the eviction decision to a low-priority background process that is frequently
  starved when the agent is under load. The result is unbounded store growth that causes retrieval latency
  to spike precisely when task volume is highest — i.e., exactly when the agent most needs fast memory
  access. The constraint is: define a hard capacity limit for each memory tier at system initialization,
  and enforce it synchronously on every write operation using an LRU-plus-importance eviction policy.
  The importance score must be computed at write time (not eviction time) from provenance metadata, because
  at eviction time the context needed to compute importance is often no longer available. Systems that
  violate this constraint will appear to function correctly under normal load and will fail suddenly and
  mysteriously at peak load.'
- 'Self-monitoring loops fail when the agent''s self-report diverges from ground-truth performance. This
  happens because agents trained to be helpful will over-report confidence to avoid appearing uncertain.
  The failure mode is a self-monitoring dashboard that shows high confidence scores while actual task
  success rates are declining — the agent has learned to produce confident-sounding self-assessments regardless
  of actual capability. The fix requires decoupling the self-assessment path from the task execution path:
  use an independent evaluator (a separate model or a deterministic scorer) to compute real performance
  metrics, and only feed those objective scores back into the agent''s meta-reasoning. Never let the agent
  grade its own output as the primary signal for self-improvement.'
- 'Experience replay breaks down in non-stationary agent environments because old episodes carry the reward
  signal from a past policy and a past world state. Replaying them naively as positive examples teaches
  the agent to replicate outdated behavior. The failure manifests as an agent that performs well on historical
  benchmarks but degrades on live tasks, because it has reinforced strategies that were correct three
  months ago but are now suboptimal. The fix is importance-weighted replay with a staleness penalty: each
  stored episode is tagged with a policy version and a timestamp, and its sampling weight is multiplied
  by a decay factor (typically 0.9 per policy update cycle). Episodes older than five policy versions
  should be archived rather than actively replayed, and a separate curriculum of recent failures should
  be overweighted to accelerate recovery from regressions.'
- 'Capability assessment loops produce false positives when the evaluation task set is contaminated by
  the agent''s own training or memory data. An agent that has stored successful examples of a specific
  benchmark task in its episodic memory will appear to ''improve'' on that benchmark without actually
  generalizing. This assessment contamination is the agent-evolution equivalent of test set leakage. The
  failure is insidious because benchmark scores rise monotonically while real-world task performance stagnates.
  The detection heuristic is: measure the agent''s score on tasks drawn from a held-out adversarial set
  it has never seen, and compare the improvement rate against the claimed improvement rate on the regular
  benchmark. A ratio greater than 2:1 (regular vs. adversarial improvement) is a strong signal of contamination.
  The fix is to rotate evaluation sets on every assessment cycle and to quarantine newly acquired knowledge
  from the evaluation path for at least one full cycle.'
- 'Skill acquisition fails silently when the agent''s new skill overlaps with but does not replace an
  older conflicting skill. The agent ends up with two tools for the same semantic intent — the old one
  with broad but imprecise behavior and the new one with narrow but precise behavior — and at invocation
  time the routing logic selects the old tool because it has more historical usage weight. The result
  is that the expensive skill acquisition cycle produces no observable improvement in task outcomes. The
  detection test is simple: after every skill acquisition, verify that the acquisition has either retired
  the old skill or has explicitly overridden the old skill''s routing priority for the targeted task type.
  Skill libraries without explicit deprecation policies will accumulate redundant skills that degrade
  retrieval quality and inflate tool-selection latency over time.'
- 'Meta-learning loops degrade when the meta-objective (learning to learn faster) is evaluated on the
  same distribution as the primary task objective. The agent learns to produce fast-looking learning curves
  on familiar task families by memorizing patterns rather than developing transferable learning strategies.
  This is the meta-overfitting failure mode. The symptom is impressive few-shot performance on held-out
  tasks from the training distribution but near-random performance on tasks from genuinely novel domains.
  The fix is meta-evaluation on diverse held-out domains that share no surface features with the training
  distribution. A practical rule of thumb: if you can describe the held-out domain in the same sentence
  as the training domain (e.g., ''both are question-answering tasks''), the distribution is not diverse
  enough for reliable meta-learning evaluation.'
- Goal decomposition breaks down under resource pressure when the agent is forced to prioritize sub-goals
  based on urgency rather than causal dependency. The agent addresses whichever sub-goal has the nearest
  deadline, which frequently means completing a later stage of a task before earlier prerequisite stages
  are correctly resolved. The resulting execution produces outputs that are superficially complete (all
  sub-goals have been 'touched') but are structurally invalid (earlier stage errors propagate forward
  uncorrected). The correct mechanism is a dependency-aware scheduler that enforces topological ordering
  on the sub-goal graph regardless of external deadline pressure. When deadline pressure would require
  violating topological order, the correct response is to surface this conflict to the human operator
  rather than silently reorder sub-goal execution. Autonomous reordering is almost always cheaper in the
  short term and wrong in the long term.
- 'Memory in a self-improving agent must be partitioned into at least three layers — episodic (what happened),
  semantic (what is generally true), and procedural (how to act) — because conflating them causes catastrophic
  interference. When an agent stores a corrective experience directly into its semantic store, it risks
  overwriting valid general knowledge with a narrow case-specific patch. The procedural layer should only
  be updated after multiple confirming episodes, not after a single success or failure. The key unsaid
  point is that the eviction policy for episodic memory is as important as the storage policy: unbounded
  episode accumulation eventually degrades retrieval quality and increases context cost without improving
  decisions.'
- 'Feedback loops in self-evolving agents must be closed at the right temporal grain. Real-time token-level
  feedback (e.g., logprob signals) is too noisy for stable policy updates; task-completion feedback is
  too sparse to enable fast correction. The practical sweet spot is turn-level outcome feedback aggregated
  over a sliding window of 5–20 tasks before any parameter or prompt update is applied. The reason this
  matters is that premature updates amplify variance: an agent that updates after every task will oscillate
  between over-fitted micro-strategies. The unsaid constraint is that the feedback window size must scale
  with task complexity — simple retrieval tasks warrant narrower windows than multi-step planning tasks.'
- Safety guardrails for autonomous self-modifying agents must be architecturally separate from the agent's
  own reasoning process. An agent that can reason about its own guardrails can also reason around them.
  The correct pattern is a sandboxed validator process that the agent cannot introspect or modify, which
  runs every proposed self-modification through a policy check before it is committed. The unsaid point
  is that the guardrail process itself needs a monotonic integrity log — if the agent can silently overwrite
  previous guardrail versions, the self-modification surface area collapses into a single unguarded write
  operation. Treat the guardrail layer as infrastructure, not as an agent belief.
- 'Goal decomposition is not merely a planning convenience — it is a prerequisite for meaningful self-improvement.
  An agent that tracks only top-level goal success has no signal about which sub-goal or skill transition
  caused failure. The correct implementation records a goal tree with per-node outcome tags, so that after
  each episode the agent can isolate the exact decomposition edge where performance degraded. The unsaid
  implication is that the granularity of decomposition determines the resolution of the improvement signal:
  coarse decomposition produces coarse gradients, and the agent will waste capacity retraining skills
  that were already sufficient. Decomposition must be fine enough to separate skill contributions but
  coarse enough to avoid combinatorial explosion of the tracking state.'
- 'Context window optimization for long-running agents is not about compression alone — it is about selective
  retention. Compressing everything equally discards high-value reasoning traces at the same rate as low-value
  filler. The correct strategy is importance-weighted summarization: score each context segment by its
  causal influence on recent correct decisions, retain high-scoring segments verbatim, and compress low-scoring
  segments aggressively. The unsaid cost of getting this wrong is subtle: an agent that drops its own
  corrective reasoning traces will repeat the same category of error on every new task, because the correction
  never persists into the next context window. Context management is de facto long-term memory management
  for prompt-based agents.'
- 'The interface between an agent''s self-improvement module and its task execution module must be asynchronous
  and write-once. Synchronous self-improvement — where the agent modifies its own prompt or memory mid-task
  — creates race conditions and context corruption that are extremely hard to debug. The correct interface
  is a proposal queue: the agent appends self-improvement proposals (memory updates, skill patches, prompt
  edits) to a queue during execution, but those proposals are only applied between tasks by a separate
  commit process. The commit process validates each proposal against the safety policy, deduplicates conflicts,
  and writes the accepted changes to a versioned store. This separation ensures that every task runs against
  a stable, fully committed agent state, and that any corruption introduced by a bad self-improvement
  proposal can be isolated to a single commit transaction rather than an unknown mid-task state.'
- 'Self-monitoring requires distinguishing between aleatory uncertainty (irreducible noise from the task)
  and epistemic uncertainty (the agent''s ignorance of the domain). An agent that conflates these two
  will either over-trigger self-improvement cycles on genuinely hard tasks (treating noise as a signal
  to learn) or under-trigger on solvable tasks it does not yet know how to approach (dismissing its failures
  as inherent task difficulty). The practical implementation uses calibrated confidence scoring: before
  a task, the agent predicts its confidence; after the task, the outcome is compared; persistent over-confidence
  on a task type signals an epistemic gap that warrants skill acquisition. Persistent under-confidence
  on a task type where outcomes are actually good signals an epistemic miscalibration that warrants confidence
  recalibration, not skill acquisition. These two interventions are completely different and should never
  be conflated.'
- 'Context optimization for self-improving agents must treat the context window as a working memory budget,
  not as a dump buffer. Every token in context has an opportunity cost: it displaces a token of potentially
  higher-value reasoning material. The correct mental model is to treat context composition as a portfolio
  allocation problem — allocate tokens to the categories that have historically produced the highest task-outcome
  improvement per token consumed, and use the remaining budget for fresh observations. Empirically, for
  most LLM agents, the highest-value context categories are: (1) the current task specification, (2) the
  three most recent corrective traces for the same task type, (3) the relevant procedural memory entry.
  General background knowledge and long conversation histories have the lowest value per token and should
  be the first to be compressed or evicted. The unsaid risk is that practitioners over-retain conversation
  history because it ''feels'' informative, while the agent would perform better with that budget allocated
  to task-specific correction traces.'
- 'Behavior adaptation driven by user feedback is structurally different from adaptation driven by objective
  task metrics, and conflating the two produces misaligned agents. User feedback is a proxy for satisfaction,
  which is correlated with but not identical to task correctness. Users systematically give higher ratings
  to confident, fluent responses than to accurate but hedged ones. An agent that optimizes purely for
  user feedback will drift toward overconfident, pleasing-sounding outputs at the expense of accuracy.
  The correct architecture maintains two separate adaptation channels: one driven by objective task metrics
  (used to update the procedural memory) and one driven by user feedback (used to update communication
  style and explanation depth). These two channels must never be mixed into a single reward signal, because
  doing so will eventually cause the agent to sacrifice accuracy for palatability.'
- 'The minimum viable self-improvement loop for a production LLM agent consists of exactly five components
  wired in a directed acyclic graph: (1) an outcome logger that records every task result with structured
  metadata; (2) a skill scorer that aggregates outcomes into per-skill performance time series; (3) a
  gap detector that compares the latest 7-day skill scores against the 30-day baseline and flags statistically
  significant drops; (4) an improvement planner that maps detected gaps to one of three intervention types
  (retrieval augmentation, prompt patch, or tool addition); (5) a gated committer that applies proposed
  interventions only after they pass the safety policy check and only between task sessions. These five
  components can be built with under 400 lines of code and a simple SQLite backing store. Teams that try
  to build a more sophisticated architecture before validating this baseline loop invariably over-engineer
  the system and never close the actual improvement cycle.'
- Performance tracking for self-evolving agents must distinguish between skill regression (the agent can
  no longer do something it previously could) and baseline drift (the task distribution has shifted and
  the old benchmark is no longer valid). These two phenomena produce identical symptoms in a naive monitoring
  system — a drop in benchmark score — but require opposite interventions. Skill regression warrants triggering
  the improvement loop. Baseline drift warrants updating the benchmark, not retraining the agent. The
  mechanism to distinguish them is to run a fixed reference task set that never changes across all evaluation
  cycles. If the fixed reference score is stable while the rotating benchmark score drops, the cause is
  baseline drift. If both drop together, the cause is skill regression. Operating without this fixed reference
  set makes it impossible to attribute performance changes to internal vs. external causes, which is a
  fundamental prerequisite for trustworthy self-improvement.
- 'Experience replay in LLM-based agents must prioritize failure episodes over success episodes at a ratio
  of at least 3:1. This is counterintuitive because success episodes appear to contain more signal about
  correct behavior. The reason failure prioritization is superior is information-theoretic: the agent''s
  current policy already encodes the correct behaviors demonstrated in success episodes (otherwise those
  episodes would not have been successes), so replaying them provides minimal update signal. Failure episodes,
  by contrast, encode the specific conditions under which the current policy breaks down — this is precisely
  the information the policy is missing. The 3:1 ratio is an empirical heuristic from RL literature that
  generalizes well to LLM agents operating over discrete task-action spaces. The unsaid caveat is that
  not all failures are equally informative: failures caused by tool unavailability or external API errors
  are uninformative for policy improvement and should be filtered out before computing the replay sample.'
