constraints:
- 'US securities trading automation must comply with FINRA Pattern Day Trader (PDT) rules: accounts with
  less than $25,000 are limited to 3 day trades (open and close same security same day) within any 5 business
  days on margin accounts. Violations result in account restriction to ''closing transactions only'' for
  90 days. For automated bots targeting smaller accounts, the practical workaround is swing trading (hold
  overnight) rather than intraday, or using a cash account (PDT doesn''t apply to cash accounts but settlement
  takes 2 days). Outside the US: crypto exchanges have no PDT equivalent, making crypto more accessible
  for frequent automated trading. Extraction signal: a bot designed for US equities with intraday entries
  and exits on a sub-$25k account will hit PDT restrictions.'
- 'Exchange WebSocket connections for real-time market data have keep-alive requirements that most beginner
  implementations miss. Binance WebSocket streams timeout after 24 hours and require reconnection, and
  they need a ping/pong heartbeat every 3 minutes to avoid premature disconnect. Failure to implement
  heartbeats causes silent data stream drops — the connection appears open but no data arrives. The correct
  pattern: implement a watchdog timer that checks ''last message received'' timestamp, reconnects if no
  data in 60 seconds, and re-subscribes to all channels on reconnect. The websockets Python library handles
  ping/pong automatically with ping_interval and ping_timeout parameters. Extraction signal: a WebSocket
  trading client without reconnection logic will silently stop receiving data after network hiccups.'
- 'Tax reporting requirements significantly affect the design of a trading system''s state store. In the
  US, wash sale rules disallow claiming a loss on a security if you buy the same security within 30 days
  before or after the sale. For automated systems trading the same symbols repeatedly, wash sale violations
  are nearly guaranteed without explicit tracking. The system must record every sale''s tax lot (FIFO
  or specific identification), flag potential wash sale pairs, and generate annual 1099-B equivalent reports.
  In many jurisdictions, crypto gains are taxed as short-term capital gains for positions held under 1
  year. The practical implication: trading system databases must retain complete trade history indefinitely
  (not just 90 days), and the database schema must support tax lot matching queries.'
- 'NEVER run a trading bot on live capital without first completing a paper trading phase of at least
  30 trading days. Backtests suffer from look-ahead bias (accidentally using future data), survivorship
  bias (only testing on assets that still exist), and overfitting (parameters tuned to historical noise).
  Paper trading reveals real-world problems: order fill latency, partial fills, API rate limits, and market-hours
  edge cases that backtests cannot simulate. Projects that skip paper trading and go straight to live
  trading routinely lose capital in the first week on bugs that would have been caught immediately with
  paper trading. The minimum viable paper-trading setup: use a broker''s sandbox API (Alpaca paper, IBKR
  paper account) and run with identical code to production.'
- 'Backtesting without accounting for transaction costs and slippage produces dangerously optimistic results.
  A strategy showing 40% annual return in a backtest may become unprofitable after realistic costs. Rule
  of thumb: assume 0.1% round-trip cost for liquid equities, 0.2% for less liquid stocks, 0.05–0.15% for
  crypto on major exchanges. Slippage is an additional hidden cost: market orders at illiquid times fill
  at worse prices. For high-frequency strategies (many trades per day), even small per-trade costs compound
  into strategy-killing drag. The correct modeling: in backtesting frameworks like backtrader or vectorbt,
  always set commission and slippage parameters before analyzing results. Extraction signal: any backtest
  with zero commission/slippage settings is misleading.'
- 'NEVER hardcode take-profit and stop-loss as absolute price levels in persistent storage without also
  storing the entry price and R-multiple. Absolute price levels become meaningless context without the
  trade''s reference point. The correct schema: store entry_price, stop_price (initial), take_profit_price,
  and risk_amount (entry - stop) per trade. This allows computing current R-multiple (how many times risk
  is currently profitable) at any time. Bots that only store target_price=150.00 without knowing entry_price=145.00
  cannot calculate if a trade is at 1R or 3R, making dynamic management impossible. Also: take-profit
  levels should use limit orders, not market orders, to avoid paying the bid-ask spread unnecessarily.'
- 'NEVER assume that a market order will fill at the last traded price shown. Market orders receive the
  next available ask price (for buys) or bid price (for sells). In illiquid markets or at market open/close,
  the bid-ask spread can be 0.5–2% or more. For automated trading, always use limit orders with a small
  allowable slippage (e.g., limit buy at ask + 0.1%) to control maximum fill price while maintaining high
  fill probability. Avoid market orders entirely in pre/post-market hours where liquidity is thin. The
  critical failure mode: a bot placing market orders for illiquid small-caps at open can move the price
  against itself by buying up multiple levels of the order book, paying far more than expected.'
- 'NEVER store API keys for trading accounts in plaintext config files or environment variable files checked
  into version control. Trading API keys with withdrawal permissions can drain an entire account within
  seconds if leaked. The correct approach: use read-only API keys (most brokers support separate read/trade/withdraw
  permission tiers) for market data, trade-only keys (no withdrawals) for order placement, and never generate
  withdrawal-enabled API keys programmatically. Store keys in OS keychain (keyring library in Python),
  a secrets manager (AWS Secrets Manager, HashiCorp Vault), or at minimum in a .env file excluded from
  git with a .gitignore entry. Extraction signal: any repository with trading API keys in committed config
  files is a critical security vulnerability.'
- 'Backtesting on the same data used to select strategy parameters is overfitting — the strategy is memorizing
  history, not discovering patterns. The correct protocol: split historical data into in-sample (use for
  parameter optimization) and out-of-sample (use for final validation, touch only once). Walk-forward
  testing is the gold standard: repeatedly optimize on a rolling window and validate on the next period,
  simulating live trading. A strategy that looks excellent in-sample but fails out-of-sample is curve-fitted
  and will fail live. Common overfit signals: more than 5 free parameters in a simple strategy, Sharpe
  ratio above 3 in backtest, strategy only works on one specific asset. Extraction signal: any backtest
  report without an out-of-sample validation section should be treated as unreliable.'
- 'NEVER rely on cron jobs or scheduled tasks alone for live trading operations. Cron has no awareness
  of whether the previous execution is still running, causing overlapping executions that can double-place
  orders. If the cron job crashes without updating state, the next run may re-process the same signals
  and re-open positions that were already opened. The correct architecture: use a stateful scheduler (APScheduler,
  Celery beat) with job locking (prevent overlapping runs) and state checkpoints (persist ''last processed
  timestamp'' to storage). Before placing any order, always query the broker API for current open positions
  — never rely solely on local state. Extraction signal: a trading scheduler without overlap protection
  and broker-state verification before ordering is a double-execution bug waiting to happen.'
- 'NEVER use string-based datetime comparison for trading timestamps. Trading data has multiple time zone
  contexts: exchange local time (NYSE is Eastern), UTC timestamps from APIs, and local machine time. String
  comparison (''2024-01-15 09:30'' > ''2024-01-14 16:00'') is unreliable across DST transitions. The correct
  pattern: store all timestamps as UTC-aware datetime objects (Python datetime.timezone.utc or pandas
  Timestamp with tz=''UTC''), convert to exchange timezone only for display and market-hours logic. pandas_market_calendars
  provides is_open() methods that handle DST and holidays correctly. Extraction signal: any codebase comparing
  trading timestamps as naive datetime strings will have subtle bugs around daylight saving transitions
  in March and November.'
- 'Yahoo Finance''s free API (via yfinance) is the fastest path to historical OHLCV data for backtesting,
  but it is unsuitable for live trading. yfinance scrapes Yahoo''s undocumented endpoints and has no SLA
  — it breaks silently when Yahoo changes its internal format. For backtesting historical strategies,
  yfinance is sufficient: data is broadly accurate, latency doesn''t matter, and the free tier covers
  years of daily/hourly data. For live or paper trading, switch to a vendor with official APIs and guaranteed
  uptime (Alpaca, Interactive Brokers, Alpha Vantage, Polygon.io). The extraction signal: any project
  that uses yfinance in a live-trading loop is one Yahoo HTML change away from silent failure with no
  error thrown.'
- 'RSI (Relative Strength Index) measures momentum, not direction. RSI > 70 signals overbought, RSI <
  30 signals oversold — but these are probabilistic tendencies, not reversal guarantees. In trending markets,
  RSI can stay overbought for extended periods (weeks in bull runs), causing premature exits. The correct
  use: combine RSI with a trend filter (e.g., price above 200-day SMA = uptrend). In an uptrend, only
  take RSI oversold (< 30) signals as buys; ignore overbought. Standalone RSI strategies fail because
  they assume mean-reversion in all regimes. Extraction signal: a trading bot that fires on RSI alone
  without trend context will generate excessive false signals in trending markets.'
- MACD (Moving Average Convergence Divergence) is a lagging indicator — it confirms trend changes after
  they happen, not before. The signal line crossover (MACD line crossing above/below signal line) is the
  most popular entry trigger, but it generates whipsaws in choppy, low-volatility markets. MACD works
  best on daily/weekly charts in clearly trending assets. The histogram (MACD minus signal) shrinking
  toward zero before a crossover is an early warning that doesn't wait for the full crossover. The hidden
  divergence pattern (price makes higher low, MACD makes lower low) is a continuation signal. Projects
  using MACD on 1-minute charts or in sideways markets will experience high false-positive rates that
  destroy profitability.
- 'Bollinger Bands adapt to volatility by expanding during high-volatility periods and contracting during
  low-volatility periods. The ''Bollinger Squeeze'' — when bands contract to their tightest in months
  — historically precedes large breakout moves, though direction is uncertain. Trading purely on band
  touches (buy lower band, sell upper band) is a mean-reversion strategy that fails catastrophically in
  trending markets where price ''rides'' the band. The correct pattern: use the squeeze to identify high-probability
  setups, then wait for a momentum confirmation (volume spike, candlestick pattern) to determine direction.
  Extraction signal: code that buys every lower-band touch without a trend or momentum filter will suffer
  large losses during breakdowns.'
- 'Alpha Vantage''s free tier provides 25 API calls/day with a 5 calls/minute rate limit. This is adequate
  for end-of-day portfolio monitoring but insufficient for intraday strategies needing frequent refreshes.
  The paid tiers start at $50/month for 75 calls/minute. Critical interface behavior: Alpha Vantage returns
  HTTP 200 even on errors — the error message is embedded in the JSON body as a ''Note'' or ''Information''
  key. Code that checks only HTTP status codes and ignores JSON body will silently receive empty or error
  data. Always check the response for these keys before processing. For technical indicators (RSI, MACD,
  Bollinger), Alpha Vantage has dedicated endpoints that compute server-side, avoiding local calculation
  but adding an API call per indicator.'
- 'CoinGecko''s free public API supports 10–30 calls/minute (varies by endpoint) without authentication,
  making it the most accessible crypto price source for prototyping. The /coins/markets endpoint returns
  current price, market cap, volume, and 24h price change for up to 250 coins in a single call — use this
  instead of individual /coins/{id}/market_chart calls for portfolio monitoring. Critical: coin IDs in
  CoinGecko are not ticker symbols (''bitcoin'', not ''BTC''; ''ethereum'', not ''ETH''). Mismatching
  ticker to CoinGecko ID is a common failure that returns 404 silently. Use the /coins/list endpoint once
  to build a ticker→ID mapping. For historical data beyond 90 days, the Pro plan is required; the free
  tier returns only 365 days of daily data.'
- 'Binance''s REST API uses signed requests (HMAC-SHA256) for account and order endpoints. The signature
  must include a timestamp parameter within 5000ms of Binance server time — clock drift between your server
  and Binance will cause ''Timestamp for this request is outside the recvWindow'' errors intermittently.
  Always sync to Binance server time before placing orders, or use the python-binance client which handles
  this automatically. Binance rate limits are weight-based: each endpoint has a ''weight'' (typically
  1–20), and you have 1200 weight per minute per IP. Exceeding the limit returns HTTP 429 and triggers
  a temporary IP ban. The correct pattern: track consumed weight locally and throttle proactively, not
  reactively on 429 errors.'
- 'Interactive Brokers (IBKR) TWS API uses a persistent socket connection, not REST — the client library
  (ibapi) maintains a stateful session. This means your trading bot must run as a long-lived process,
  not a serverless function. Orders are tracked by client-assigned orderId integers that must be monotonically
  increasing per session. IBKR''s reqNextValidId() must be called at connection time to get a safe starting
  orderId. Paper trading uses port 7497; live trading uses port 7496. The TWS application or IB Gateway
  must be running and logged in on the same machine. Extraction signal: code that tries to use IBKR via
  HTTP/REST requests or as a stateless function will never work.'
- 'Position sizing via the Kelly Criterion maximizes long-term compounding but produces high variance
  that most traders cannot psychologically handle. Full Kelly (bet fraction = edge/odds) is theoretically
  optimal but causes 50%+ drawdowns routinely. Half-Kelly (bet half the Kelly fraction) reduces variance
  significantly while retaining most of the growth benefit. The fixed fractional method (bet X% of portfolio
  per trade, typically 1–2%) is psychologically easier and more suitable for automated systems. The critical
  insight: even a winning strategy with poor position sizing can blow up the account. A 2% risk-per-trade
  rule means you need 35+ consecutive losses to lose 50% of capital, giving time to detect and fix problems
  before ruin.'
- 'Stop-loss orders protect capital but the placement level is critical. Stops placed too tight (inside
  normal price volatility) cause being stopped out of good trades by random noise. The ATR (Average True
  Range) method places stops at 2–3 ATR below entry, adapting to the asset''s current volatility. Fixed
  percentage stops (e.g., 2% below entry) ignore volatility context and perform poorly on high-volatility
  assets. Trailing stops capture profits by moving the stop up as price rises, but they can trigger on
  temporary pullbacks in strong uptrends. The correct pattern: use initial ATR-based stop-loss for entry
  risk, switch to trailing stop only after the trade is profitable by at least 1R (1x risk amount). Extraction
  signal: a bot using the same fixed percentage stop for Bitcoin and a utility stock will be systematically
  wrong.'
- 'LLM token cost management for continuous market monitoring requires a polling-vs-event-driven architecture
  decision. Polling every minute with full context (portfolio state, recent news, indicator values) for
  50 assets costs approximately 1M tokens/day at GPT-4 pricing — roughly $3–10/day, which quickly exceeds
  most portfolio sizes'' justifiable AI spend. The correct pattern: use cheap rule-based signal detection
  first (price crosses SMA, RSI enters zone) and only invoke LLM for the triggered assets needing interpretation.
  This reduces LLM calls by 95%+ while preserving intelligent decision-making for genuinely ambiguous
  situations. Extraction signal: any system that calls an expensive LLM on every market tick for all monitored
  assets will have unmanageable operating costs.'
- 'Data frequency and latency trade-offs determine viable strategy types. Daily OHLCV data (free from
  most providers) supports swing trading and position trading strategies with holding periods of days
  to weeks. Minute-level data (paid, ~$30–200/month) supports intraday strategies but requires handling
  market hours, pre/post-market gaps, and holiday schedules. Tick data (very expensive, often $500+/month)
  supports scalping strategies but requires co-location infrastructure to act on. The practical LLM agent
  use case sits at daily-to-hourly frequency: expensive LLM reasoning is wasted on sub-minute decisions
  that should be pure algorithmic. Match your data frequency to your strategy timeframe and your infrastructure
  latency — a daily strategy with minute data is just wasted cost with no benefit.'
- 'A robust portfolio tracker requires three separate data update loops with different frequencies: (1)
  real-time price loop — poll every 60 seconds during market hours, update current P&L, check stop-loss/take-profit
  thresholds; (2) daily fundamentals loop — run after market close, pull OHLCV for the day, recompute
  indicators, regenerate signals for next day; (3) weekly review loop — compute portfolio-level statistics
  (Sharpe ratio, max drawdown, win rate), compare vs benchmark, generate performance report. Combining
  these into one loop either over-polls expensive data or under-updates time-sensitive risk checks. The
  state machine pattern: maintain a ''market_open'' boolean updated from exchange calendars (the pandas_market_calendars
  library) so loops correctly pause on weekends and holidays.'
- 'Alert and notification thresholds for trading systems must distinguish between informational alerts
  (trade executed, daily summary) and action-required alerts (stop-loss hit, API connection failure, unusual
  drawdown). Information overload from too many alerts causes alert fatigue — traders start ignoring everything
  including critical notifications. The correct design: tier alerts into three levels: (1) INFO → log
  only; (2) WARNING → append to a daily digest sent once; (3) CRITICAL → immediate push notification (Telegram
  bot, SMS via Twilio). CRITICAL triggers: any open position losing more than 5% intraday, API authentication
  failure, consecutive failed order attempts, broker connection drop. Telegram bots are the most common
  choice for trading alerts because they''re free, have a clean API, support rich formatting, and work
  on mobile.'
- 'Sharpe ratio (excess return divided by return standard deviation) is the standard risk-adjusted performance
  metric but has two critical blind spots: it treats upside and downside volatility equally (penalizing
  large gains as much as large losses), and it assumes returns are normally distributed (they''re not
  — markets have fat tails). Sortino ratio (divides by downside deviation only) is more appropriate for
  strategies with asymmetric return profiles. Calmar ratio (annual return divided by max drawdown) is
  the most intuitive for evaluating capital preservation. For complete strategy evaluation, report all
  three: Sharpe (for comparison with benchmarks), Sortino (for downside risk assessment), and Calmar (for
  drawdown context). A strategy with Sharpe 1.5 and 40% max drawdown is very different from one with Sharpe
  1.5 and 10% max drawdown.'
- 'Maximum drawdown (peak-to-trough decline) is the most psychologically important risk metric because
  it represents the actual capital loss a real trader would experience. A strategy with 50% max drawdown
  requires a 100% gain to recover — most human traders abandon a strategy before recovery, locking in
  the loss. Automated bots face the same problem: if a bot loses 30% before a human reviews it, confidence
  is destroyed and the bot gets switched off at the worst time. The design implication: build a circuit
  breaker into every trading system — if portfolio drawdown from peak exceeds X% (typically 10–20%), halt
  all trading and require manual restart. This prevents automated systems from silently compounding losses
  while no one is watching.'
- 'A minimal viable automated trading system requires five components wired together: (1) DataFeed — polls
  or streams market prices, normalizes to OHLCV format; (2) SignalEngine — computes indicators on OHLCV
  data, emits BUY/SELL/HOLD signals with confidence scores; (3) RiskManager — filters signals through
  position sizing rules, portfolio exposure limits, and circuit breakers; (4) OrderExecutor — translates
  approved signals into broker API calls, handles partial fills and retries; (5) StateStore — persists
  open positions, order history, and portfolio snapshots to survive restarts. The critical coupling rule:
  RiskManager must sit between SignalEngine and OrderExecutor — signals should never directly trigger
  orders without risk filtering. Any direct signal-to-order path is a reliability and safety anti-pattern.'
- 'Correlation analysis between portfolio holdings is as important as individual position risk. Holding
  10 positions in technology stocks provides almost no diversification — in a sector drawdown, all 10
  fall together. True diversification requires low inter-asset correlation (ideally below 0.3). The practical
  implementation: compute rolling 30-day correlation matrix for all holdings weekly, alert if any two
  holdings exceed 0.7 correlation (they''ve become effectively the same position). For automated systems,
  a correlation-based position limit is more robust than sector limits: if adding a new position would
  make any pair exceed 0.7 correlation with existing positions, reduce the new position size proportionally.
  The numpy/pandas correlation matrix computation is lightweight and should be a standard nightly risk
  report component.'
- 'Monitoring a live trading system requires tracking three distinct health dimensions simultaneously:
  (1) System health — API connectivity, database write latency, memory usage, process alive; (2) Market
  health — data freshness (last price update timestamp), market open/closed status, unusual volatility
  flags; (3) Portfolio health — current drawdown from peak, open position P&L, daily realized P&L vs target.
  Each dimension needs a different alert threshold and escalation path. The correct implementation: expose
  a /health endpoint (for process monitoring) and a /status endpoint (for business metrics), structured
  as JSON with a status field (''OK'', ''WARNING'', ''CRITICAL'') per dimension. This pattern enables
  both automated alerting and at-a-glance human review without parsing logs. Prometheus metrics + Grafana
  dashboard is the production-grade version of this pattern for teams.'
