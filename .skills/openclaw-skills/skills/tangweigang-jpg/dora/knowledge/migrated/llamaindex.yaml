constraints:
- 'LlamaIndex ships over 300 integration packages on PyPI (llama-index-llms-openai, llama-index-embeddings-huggingface,
  llama-index-vector-stores-chroma, etc.). pip install llama-index installs llama-index-core plus a minimal
  default set, but does NOT include most integrations. Developers who assume pip install llama-index gives
  them a working Chroma or HuggingFace embedding setup hit ImportError at runtime. The correct pattern
  is: install llama-index-core explicitly, then add each integration package individually. Namespace convention
  distinguishes them: imports containing .core. come from llama-index-core; imports without .core. come
  from a separate integration package.'
- The choice of embedding model silently determines retrieval quality in ways LlamaIndex does not surface
  at runtime. The default embedding model (text-embedding-ada-002, 1536 dimensions) is set globally via
  Settings.embed_model; if a user loads a pre-built index using one embedding model but queries it with
  a different one — or changes models between indexing and retrieval — retrieved nodes will be semantically
  incoherent without any error. Switching to a local model (e.g., HuggingFace BAAI/bge-small-en) changes
  output dimensionality, causing vector dimension mismatch errors in existing stores. Additionally, ada-002
  has been superseded by text-embedding-3-small/large with better retrieval benchmarks at lower cost,
  but LlamaIndex's default has not always tracked this, leaving new users on a suboptimal default.
- 'LlamaCloud is a managed platform built on LlamaIndex that handles document parsing, indexing, and retrieval
  as a service. The critical distinction for self-hosted deployments: some LlamaIndex documentation examples
  reference `llama_cloud` imports and LlamaCloud-specific readers that require a LlamaCloud API key and
  send your documents to LlamaAI''s servers. This is a data privacy concern for regulated industries.
  The open-source alternative paths are: use LlamaParse (document parsing) which has a free tier but also
  sends data to LlamaAI; use completely local parsers (pypdf, docling, unstructured) with the open-source
  LlamaIndex pipeline. Teams building air-gapped or HIPAA-compliant systems must audit all import paths
  for `llama_cloud` and `llama_parse` references before deployment.'
- 'FAILURE: The v0.10 package rename from llama_index to llama-index-core broke a massive base of tutorials,
  blog posts, and Stack Overflow answers. Pre-v0.10 code uses `from llama_index import ...` or `import
  llama_index`; post-v0.10 the canonical import is `from llama_index.core import ...`. The legacy package
  llama-index-legacy (pinned to 0.9.48) still exists on PyPI, so pip install llama-index-legacy succeeds
  silently — meaning a project can have both llama_index (legacy) and llama_index.core (current) installed
  simultaneously, causing subtle version conflicts. ServiceContext (the pre-v0.10 configuration object)
  was fully deprecated; its replacement is the module-level Settings singleton. The migration CLI tool
  (`llamaindex-cli upgrade-file`) exists but is not widely known, leaving most users doing manual find-replace.'
- 'FAILURE: LlamaIndex''s default chunk_size of 1024 tokens and chunk_overlap of 20 tokens are rarely
  optimal and produce poor retrieval quality on most real-world corpora without explicit tuning. The 20-token
  overlap is too small to preserve semantic continuity at chunk boundaries, causing split reasoning chains
  to be retrieved as incoherent fragments. For dense technical documents, 1024 tokens often exceeds the
  semantic unit size, embedding noise into vectors and lowering similarity scores for correct matches.
  The fix is domain-specific: start at 512 tokens with ~50 overlap, then evaluate using a retrieval benchmark.
  Critically, changing chunk_size on an existing VectorStoreIndex requires full re-indexing — the index
  does not warn users that stale embeddings from a prior chunk_size are still in use, making silent quality
  regression a common production failure.'
- 'LlamaIndex''s metadata filtering API (MetadataFilter, MetadataFilters) is a portability abstraction
  over per-vector-store filter syntax, but implementation completeness varies significantly. Pinecone
  supports all filter operators; Chroma supports a subset; FAISS''s in-memory store has no metadata filtering
  support at all (filters are ignored silently). The failure pattern: a developer builds and tests filtering
  with Chroma, deploys to FAISS for cost reasons, and discovers that document-type or date-range filters
  produce no narrowing — all nodes are returned regardless of filter. Always verify metadata filter support
  for your specific vector store in the LlamaIndex integration docs before building filter-dependent retrieval
  logic. Use explicit pre-filtering via a retriever wrapper when the vector store does not support native
  filters.'
- LlamaIndex query engines and retrievers expose both sync and async APIs (query() vs aquery(), retrieve()
  vs aretrieve()), but many built-in retrievers and response synthesizers only implement the sync path
  — the async methods fall back to running sync code in a thread executor. This means calling aquery()
  in a FastAPI endpoint does not actually free the event loop during LLM I/O; it occupies a thread. To
  verify whether a component is truly async, check whether it overrides `_aretrieve` or `_aget_response`.
  True async performance requires using providers and retrievers that implement native async (OpenAI async
  client, Pinecone async client). Mixing sync-behind-async components in a high-concurrency FastAPI service
  causes thread pool exhaustion under load.
- 'LlamaIndex''s core object model has three layers: (1) Document — a generic container wrapping any data
  source (PDF, API response, database row); (2) Node (specifically TextNode, subclassed from BaseNode)
  — a chunk of a Document that carries text, metadata, and inter-node relationship pointers (prev/next/parent);
  (3) Index — a structure built over Nodes that enables retrieval (VectorStoreIndex stores each Node plus
  its embedding, SummaryIndex stores Nodes as a sequential chain, TreeIndex builds a hierarchy, KeywordTableIndex
  maps keywords to Nodes). NodeParsers bridge Documents to Nodes by chunking and inheriting metadata downward.'
- 'VectorStoreIndex, KnowledgeGraphIndex, and PropertyGraphIndex serve fundamentally different retrieval
  semantics: VectorStoreIndex embeds each Node and retrieves by cosine similarity — best for open-ended
  semantic search over unstructured text. KnowledgeGraphIndex extracts subject-predicate-object triplets
  and stores them in a graph — suited for structured entity-relationship queries but is limited in expressiveness
  and is now considered legacy. PropertyGraphIndex (introduced after KnowledgeGraphIndex) uses a labeled
  property graph with schema-guided or free-form LLM extraction, supports multiple kg_extractors per chunk,
  and enables far richer relationship modeling — preferred when graph structure matters. Mixing index
  types for the same corpus via RouterQueryEngine is a valid production pattern.'
- 'LlamaIndex''s IngestionPipeline is the production-grade document processing abstraction that adds deduplication,
  caching, and transformation chaining on top of raw NodeParsers. It caches transformed nodes by document
  hash so that re-running an ingestion over unchanged files is a no-op. The UNSAID production pattern:
  pair IngestionPipeline with a persistent DocStore (SimpleDocumentStore backed to disk, or a database
  store) and a persistent VectorStore — this enables incremental indexing where only modified documents
  trigger re-embedding. Without a DocStore, every IngestionPipeline.run() call re-processes all documents
  regardless of cache, causing redundant embedding API calls and silent cost accumulation on large corpora.'
- 'Two-stage retrieval (vector similarity → reranker) dramatically outperforms single-stage vector retrieval
  for most RAG applications, and LlamaIndex makes this composable via postprocessors. The pattern: retrieve
  top-K=20-50 candidates from the VectorStoreIndex using fast approximate nearest neighbor search, then
  rerank with a cross-encoder (CohereRerank, SentenceTransformerRerank, or LLMRerank) to select the final
  top-k=3-5. Cross-encoders evaluate query-document pairs jointly (vs bi-encoders that embed independently),
  producing much higher precision at the cost of O(K) inference calls. The UNSAID constraint: LLMRerank
  (using an LLM to score relevance) is the highest quality but most expensive option; for production cost
  sensitivity, use a dedicated reranker model (Cohere rerank-english-v3.0, or a local cross-encoder) instead
  of consuming LLM tokens for reranking.'
- 'LlamaIndex QueryEngine uses response synthesis modes that trade quality for cost and latency. `refine`
  mode sends each retrieved chunk to the LLM sequentially, asking it to refine the answer — highest quality
  but O(k) LLM calls. `compact` mode consolidates chunks into fewer prompts first, reducing calls by ~50%.
  `tree_summarize` builds a summary tree and is best for long-document summarization. `simple_summarize`
  truncates to the context window — lowest cost but silently drops context. `no_text` returns only the
  source nodes without synthesis — useful when you need raw retrieval output for custom processing. The
  UNSAID default: QueryEngine defaults to `compact` mode, which is a reasonable production balance. Teams
  that switch to `refine` for quality without awareness of the O(k) cost multiplication often see 5-10x
  higher API costs on queries that retrieve many chunks.'
- 'Custom retrievers in LlamaIndex are implemented by subclassing `BaseRetriever` and overriding `_retrieve(query_bundle:
  QueryBundle) -> list[NodeWithScore]`. QueryBundle contains both the query string and a pre-embedded
  query vector, enabling the custom retriever to use either for lookup. The UNSAID pattern for combining
  multiple retrieval strategies: implement a fusion retriever that calls multiple sub-retrievers, deduplicates
  results by node_id, and applies Reciprocal Rank Fusion (RRF) scoring to combine ranked lists. LlamaIndex
  ships `QueryFusionRetriever` for this exact case, which also supports query rewriting (generating N
  paraphrased queries, retrieving for each, then fusing). The critical implementation trap for custom
  retrievers: `_retrieve` must be synchronous; `_aretrieve` is the async override. Many developers only
  implement `_retrieve` and assume `aretrieve()` works — it does via thread executor fallback, but this
  blocks the event loop in async contexts and must be explicitly overridden for truly non-blocking async
  operation.'
- 'Metadata filtering in LlamaIndex VectorStoreIndex improves retrieval precision by pre-filtering the
  candidate pool before cosine similarity ranking. The correct ingestion pattern is to embed structured
  metadata at indexing time as Node.metadata dict fields and use `MetadataFilters(filters=[MetadataFilter(key=''doc_type'',
  value=''contract'', operator=FilterOperator.EQ)])` at query time. The UNSAID performance implication:
  metadata filtering happens at the vector store level (before similarity computation) in databases that
  support it (Pinecone, Weaviate, Qdrant) — reducing the search space from millions to thousands of documents
  before ANN search. For vector stores without native metadata filtering (FAISS, simple in-memory), LlamaIndex
  applies filtering post-retrieval, which means the full ANN search still runs and then results are dropped
  — negating the performance benefit. Additionally, injecting metadata into the embedding text using `MetadataMode.EMBED`
  (which prepends key-value pairs to the text before embedding) can improve recall by making metadata
  part of the semantic space, useful for filtering on fields the user may express in natural language
  (date, author, category).'
- 'Hybrid search combines dense vector retrieval (semantic similarity) with sparse BM25 retrieval (keyword
  matching) to cover both exact-match and semantic-match queries. LlamaIndex provides `BM25Retriever`
  for sparse retrieval over in-memory node sets and `QueryFusionRetriever` with `mode=RECIPROCAL_RERANK`
  to fuse results. The WHY hybrid outperforms pure vector: vector retrieval fails for queries containing
  rare proper nouns, product codes, or technical identifiers (e.g., ''CVE-2024-3094'') because their embeddings
  are trained on distribution statistics and rare terms are underrepresented. BM25 retrieves documents
  by exact term frequency regardless of semantic similarity. The production deployment constraint: LlamaIndex''s
  BM25Retriever builds the BM25 index in-memory from the node corpus at instantiation time — it is not
  persisted. For large corpora, rebuilding the BM25 index on every service restart is expensive. The solution
  is to use a vector store that natively supports hybrid search (Weaviate, Qdrant, Elasticsearch) so both
  retrieval modes share a single persistent index rather than requiring two separate indexes.'
- 'LlamaIndex''s IngestionPipeline accepts a list of transformations that are applied sequentially: typically
  [NodeParser, MetadataExtractor(s), EmbeddingModel]. The UNSAID production insight is that transformation
  order matters: metadata extractors (TitleExtractor, QuestionsAnsweredExtractor, SummaryExtractor) make
  LLM calls per node and should be placed before the embedding step so that extracted metadata is embedded
  into the text representation. QuestionsAnsweredExtractor generates hypothetical questions a node answers
  and appends them to the node''s metadata — this improves retrieval by expanding the semantic coverage
  of each node (a technique called HyDE-adjacent). The cost trap: running QuestionsAnsweredExtractor on
  10,000 nodes with GPT-4o at 5 questions/node costs ~$15-50 in API calls for a one-time indexing operation.
  Use cheaper models (gpt-4o-mini or a local LLM) for metadata extraction, reserving expensive models
  for answer synthesis at query time.'
- 'LlamaIndex''s ResponseSynthesizer uses prompt templates for each synthesis step that can be customized
  via `get_response_synthesizer(text_qa_template=..., refine_template=...)`. The default QA prompt asks
  the LLM to ''answer the question given the context'' without citation or confidence instructions — for
  production RAG, always override the text_qa_template to (1) require inline citations using node metadata
  (e.g., ''cite the source document name for each claim''), (2) instruct the model to respond with ''I
  don''t know'' when context is insufficient rather than hallucinating, and (3) specify the output format
  (bullet points, numbered list, prose). The UNSAID failure mode of default prompts: the default refine
  prompt says ''refine the original answer using the new context'' without instructing the model to preserve
  prior citations, causing the refined answer to drop citations from earlier context windows. Custom refine
  prompts must explicitly carry citation instructions through every refinement step.'
