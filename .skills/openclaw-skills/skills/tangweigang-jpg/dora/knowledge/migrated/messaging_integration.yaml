constraints:
- 'Do not build a multi-platform messaging integration without a unified message abstraction layer, because
  each platform''s native message object has different schemas and the platform-specific code will spread
  throughout your entire codebase. Telegram uses chat_id + message_id; Slack uses channel + ts (timestamp
  as ID); Discord uses channel_id + message_id; WeChat Work uses from_username + msg_id. Without abstraction,
  a change to Telegram''s API version requires touching every piece of business logic that handles Telegram
  messages — not just the Telegram adapter. The correct architecture defines a canonical message object
  {platform: str, conversation_id: str, message_id: str, sender_id: str, sender_name: str, text: str |
  None, media: list[MediaAttachment], timestamp: datetime, reply_to_id: str | None, raw: dict} and platform
  adapters that translate to/from this canonical form. All business logic operates on canonical messages;
  only adapters know about platform-specific schemas. This also makes adding a new platform a bounded
  change (one new adapter) rather than a cross-cutting change. The raw field preserves the original platform
  payload for debugging and for accessing platform-specific features not captured by the canonical schema.'
- 'Do not implement WeChat Work (企业微信/WeCom) bot integration assuming it works like Telegram or Slack,
  because WeChat Work''s API has fundamentally different authentication, message delivery guarantees,
  and content restrictions. The authentication flow uses a corp_id + corpsecret pair that generates a
  2-hour access token — this token must be refreshed before expiry and cannot be refreshed concurrently
  without a lock (similar to Gmail OAuth2 concurrent refresh problem). Message delivery is not guaranteed:
  WeChat Work has no webhook retry mechanism — if your endpoint returns non-200, the message event is
  permanently lost. The message type restrictions are stricter: you cannot send arbitrary markdown, only
  WeWork''s custom markdown format (which is not standard CommonMark), and rich message cards (news type)
  have strict field length limits (title ≤128 chars, description ≤512 chars). The received message format
  includes an XML envelope (not JSON) that must be decrypted using the EncodingAESKey from the app settings
  before parsing. Building WeChat Work integration without reading the 企业微信开发者文档 in full is the most common
  source of subtle message loss bugs in Chinese market automation.'
- 'Do not implement Telegram bot polling and webhook simultaneously for the same bot token, because Telegram''s
  architecture treats them as mutually exclusive: if a webhook URL is set, getUpdates (polling) returns
  an error (409 Conflict); if polling is active, setWebhook silently fails to deliver webhooks. The common
  failure scenario: a developer registers a webhook in production, then runs a local polling script with
  the same token for debugging — the webhook deliveries stop and the production bot silently goes offline.
  The correct approach: use separate bot tokens for development (polling) and production (webhook). The
  Telegram BotFather allows creating multiple bots, and test tokens are free. Never use the production
  token in a development environment. Additionally, when switching from polling to webhook mode, call
  deleteWebhook with drop_pending_updates=True before setWebhook to clear the update queue — otherwise
  the webhook receives all updates that accumulated during the polling period, which can be thousands
  of duplicate events if the bot has been running for a while.'
- 'Do not implement bot conversation logic that assumes messages arrive in order, because all major messaging
  platforms have eventual delivery guarantees with no strict ordering. Telegram guarantees that messages
  within a single chat are delivered in-order when using polling (because getUpdates returns updates in
  sequence), but webhook delivery can arrive out of order due to network variability and Telegram''s own
  parallel delivery infrastructure. Slack explicitly documents that event delivery order is not guaranteed.
  Discord similarly does not guarantee event order. This creates a class of bugs in sequential workflows:
  a bot sends message A (''What is your name?'') and expects the next message to be the answer, but message
  B (''Yes'') from a parallel conversation arrives first. The fix is always to tie conversation context
  to both user_id AND a state machine step identifier, not to message arrival order. Never implement ''wait
  for the next message from this user'' using a simple queue — always validate that the received message
  matches the expected state before processing it as a response to the current prompt.'
- Do not use Telegram Bot API long polling (getUpdates with a 60-second timeout) in an async framework
  (asyncio, FastAPI) without understanding that it blocks the event loop. A naive asyncio bot that calls
  await bot.get_updates(timeout=60) in a loop will block all other coroutines in the event loop for up
  to 60 seconds if no updates arrive, preventing the bot from processing other events (including health
  checks). The correct implementation uses python-telegram-bot's Application class (which manages long
  polling correctly in an async context) or implements manual polling with asyncio.wait_for and a short
  timeout (5 seconds), re-polling immediately on timeout. For production bots, prefer webhooks over long
  polling in async frameworks — the webhook pattern is inherently event-driven and does not have the blocking
  issue. If polling is necessary (e.g., no public endpoint for webhook), run the polling loop in a separate
  thread (using threading.Thread or asyncio.run_in_executor) to isolate its blocking from the rest of
  the async application. Benchmark polling interval carefully — a 1-second polling interval with no messages
  generates 86,400 empty API calls per day.
- Do not implement Slack bot posting without understanding the bot token vs. user token distinction, because
  they have different capabilities and different audit trail implications. Bot tokens (xoxb-) can only
  post as the bot identity; user tokens (xoxp-) allow posting on behalf of a human user but require explicit
  user OAuth consent and are subject to stricter Slack audit log scrutiny (enterprise organizations log
  all user token API calls for compliance). Using a user token for automation posting creates compliance
  issues in regulated industries (FINRA, HIPAA) because messages appear to come from a human but were
  generated by automation — regulators treat this as deceptive communication. The correct architecture
  for automated messages is always bot tokens, with the bot's identity clearly named (e.g., 'SalesBot'
  or 'AlertBot') so recipients understand they are interacting with automation. For workspace-level operations
  that require elevated permissions (managing channels, accessing private channels), use user tokens only
  for the administrative setup steps (creating channels, inviting members) and bot tokens for all ongoing
  message operations. Scope each token to the minimum required permissions.
- 'Do not implement bot rate limiting by sleeping (time.sleep) between API calls, because sleep-based
  throttling blocks the entire thread/process and prevents handling incoming messages, health checks,
  and other concurrent operations. In a bot handling multiple simultaneous conversations, sleeping to
  respect a rate limit for one user''s request blocks all other users for the duration of the sleep. The
  correct rate limiting implementation for messaging bots uses a non-blocking token bucket or leaky bucket
  algorithm: maintain a queue of outbound requests with timestamps; before sending, check if the token
  bucket has available tokens (refilled at the allowed rate); if no tokens, enqueue the request and use
  asyncio.sleep (non-blocking) or schedule the send for when the next token is available. For asyncio
  bots, use asyncio.Queue with a consumer that paces sends. The most common production failure mode: a
  bot successfully handles 100 messages/minute for months, then a viral event generates 1,000 messages/minute
  — a sleep-based throttle serializes all processing and creates a growing backlog; a proper async queue
  maintains responsiveness by shedding load gracefully.'
- 'Webhook vs polling is not a performance trade-off but an architectural philosophy choice with profound
  implications for reliability and operational complexity. Polling means your system initiates requests
  on a schedule — it is simple to implement, easy to debug, and requires no public endpoint, but it introduces
  latency (up to 1 polling interval per message), wastes API quota on empty polls, and does not scale
  as the number of monitored conversations grows. Webhooks mean the platform initiates requests to your
  system when events occur — latency is sub-second, quota is consumed only on real events, but your system
  must be publicly accessible with a stable HTTPS endpoint, must validate webhook signatures (or a malicious
  actor can forge events), and must be designed for idempotency (platforms commonly deliver the same webhook
  twice on network errors). The canonical decision rule: use webhooks in production for any system where
  message latency matters or where you process more than 100 messages/day per account; use polling for
  development, for platforms that do not support webhooks (legacy IMAP, some enterprise systems), or for
  integrations that are genuinely batch-oriented (daily digest). Never mix both for the same channel without
  a deduplication layer — running both will process every message twice.'
- 'Conversation state management is the hardest problem in multi-platform messaging integration, not API
  authentication or message formatting. Without explicit state management, a bot that works correctly
  for single-turn interactions will fail on any multi-turn flow (wizard forms, confirmations, onboarding
  sequences) because the stateless nature of webhooks means each incoming message arrives with no memory
  of previous exchanges unless the system maintains that memory. The WHY this is hard: conversation state
  must survive bot restarts, platform API outages, and parallel conversations with thousands of users
  simultaneously. The correct architecture is explicit state storage (Redis or a database) keyed by (platform,
  user_id) with a state machine model: each state defines the valid next states and the actions triggered
  on each transition. An LLM-based bot that reconstructs conversation context from the message history
  on every turn (context-window approach) is an alternative that works well for open-ended conversations
  but is expensive and introduces latency — use it for free-form intent handling, but use a state machine
  for structured flows. Never store conversation state in memory only — a single process restart loses
  all in-progress conversations without any notification to users.'
- 'Telegram Bot API rate limiting is enforced at two levels that must be handled independently: per-bot
  global limits (30 messages/second maximum; in practice, bursting above 20/second triggers 429 errors)
  and per-chat limits (1 message/second per individual chat, 20 messages/minute to the same group). An
  automation that sends a notification blast to 1,000 users will hit the per-chat limit on the first user
  if it sends more than 1 message per second to the same chat, and will hit the global limit if it sends
  messages to different users faster than 30/second. The correct implementation uses a rate-limited queue
  (token bucket algorithm) with separate buckets for global rate and per-chat rate. When a 429 Too Many
  Requests response arrives, parse the retry_after field from the response body (Telegram always includes
  it) and pause that specific chat''s queue for exactly that duration rather than applying a fixed backoff.
  For broadcast scenarios, batch messages across different chats to maximize throughput while staying
  under per-chat limits: send one message to chat A, one to chat B, one to chat C (rotating) rather than
  3 messages to chat A then 3 to chat B.'
- Discord bot implementation must handle the Gateway intents system introduced in Discord API v8+ or the
  bot will silently receive no messages. Gateway intents are explicit permission flags that the bot declares
  at connection time, specifying which event types it wants to receive. The critical intents for a message-handling
  bot are MESSAGE_CONTENT (privileged — requires explicit enable in the Discord Developer Portal AND in
  the bot code) and GUILD_MESSAGES. Without MESSAGE_CONTENT intent enabled, the message.content field
  is empty string for all messages from users that are not @mentioning the bot or sending DMs — there
  is no error, the field is simply empty, which causes silent processing failures. Additionally, Discord
  enforces a rate limit of 50 requests per second globally per bot token, with a separate 5 requests per
  5 seconds per channel for message sending. For bots serving many guilds (servers), implement a global
  request queue with per-route bucket tracking using the X-RateLimit-Bucket, X-RateLimit-Remaining, and
  X-RateLimit-Reset-After response headers that Discord includes on every API response.
- 'Slack bot architecture must choose between Bolt framework and raw API calls based on deployment complexity,
  not preference. Bolt (Python, JavaScript, Java) handles Socket Mode, OAuth flow, middleware, and retry
  logic out of the box — for production bots, it eliminates approximately 2,000 lines of boilerplate.
  The critical Slack-specific behavior to understand: Slack''s Events API requires a 200 OK response within
  3 seconds of receiving a webhook or it will retry the event (up to 3 retries with exponential backoff).
  For event handlers that trigger LLM calls (which take 2–10 seconds), the pattern is: (1) immediately
  return 200 OK to Slack; (2) enqueue the event in a background task queue (Celery, RQ, or asyncio queue);
  (3) process asynchronously and post the response via chat.postMessage. Failing to respond within 3 seconds
  causes duplicate processing — a 5-second LLM call will be retried 3 times, processing the same message
  4 times and sending 4 responses to the user. The Bolt framework handles this automatically with its
  acknowledge() pattern; with raw API calls, you must implement the async response pattern manually.'
- 'Message formatting for multi-platform bots requires a platform-aware renderer because each platform
  uses a different markup language. Telegram uses HTML (limited subset: <b>, <i>, <u>, <s>, <code>, <pre>,
  <a>, <tg-spoiler>) or MarkdownV2 (with aggressive escaping requirements — 18 characters must be escaped
  including ''.'', ''!'', ''-'', ''('', '')''); Slack uses mrkdwn (its own dialect: *bold*, _italic_,
  `code`, >blockquote, and @mentions with <@USER_ID> syntax); Discord uses CommonMark with extensions
  (*bold*, **bold**, ~~strikethrough~~, ||spoiler||). The escape requirements alone are a source of constant
  bugs: in Telegram MarkdownV2, a URL like ''https://example.com/path-to-page'' contains ''-'' and ''.''
  that must be escaped inside link syntax — failing to escape causes the entire message to fail to parse
  and be delivered as a malformed blank. The correct pattern is a platform-agnostic intermediate representation
  (a document model with typed nodes: Paragraph, Bold, Code, Link, List) and platform-specific renderers
  that handle escaping correctly. Never do string interpolation of user-provided content directly into
  platform markup — it is both a formatting bug and a potential injection vector.'
- 'Long message splitting for platforms with character limits must be content-aware, not position-aware.
  Splitting at exactly 4096 characters (Telegram''s limit) or 2000 characters (Discord''s limit) breaks
  mid-sentence, mid-word, and mid-code-block, producing garbled output. The correct splitting algorithm:
  (1) attempt to split at paragraph boundaries (double newline) at or before the limit; (2) if no paragraph
  boundary exists within the last 20% of the limit, split at a sentence boundary (period + space + capital
  letter); (3) for code blocks, never split inside a code block — if the code block exceeds the limit,
  send it as a file attachment instead; (4) for numbered lists and bullet lists, keep each list item intact
  and split between items. For Telegram specifically, the message entity offsets (for bold/italic/links
  applied via the entities array) must be recalculated for each split chunk because they are byte offsets
  from the start of the message text — applying the entities from the original message to a split chunk
  produces wrong formatting. When splitting Markdown/HTML, ensure opening formatting tags that span a
  split point are closed in the first chunk and reopened in the second.'
- 'Slack slash command handling requires understanding that slash commands are delivered as HTTP POST
  requests to your endpoint (not via the Events API WebSocket) and must receive a response within 3 seconds
  or Slack displays a ''command failed'' error to the user. For slash commands that trigger long-running
  operations (LLM inference, database queries, external API calls), the correct pattern is: (1) immediately
  return an HTTP 200 with a JSON body containing {response_type: ''in_channel'', text: ''⏳ Processing...''}
  or an empty 200 to acknowledge receipt; (2) post the actual result using the response_url provided in
  the slash command payload (valid for 30 minutes, allows up to 5 responses); (3) for operations taking
  more than 1 minute, post an intermediate ''still working'' message via the response_url at 30-second
  intervals. The response_url pattern is more reliable than chat.postMessage for slash command responses
  because it is pre-authenticated and does not require looking up the channel ID. Always validate the
  Slack signing secret on incoming slash command requests — the signature is in the X-Slack-Signature
  header and prevents malicious actors from triggering your commands.'
- 'Media handling in messaging bot integrations requires platform-specific caching strategies because
  each platform''s media URLs have different lifetime guarantees. Telegram file URLs generated via getFile
  are valid for only 1 hour — storing the download URL and attempting to use it later will fail with a
  404. The correct pattern for Telegram: download the file immediately upon receipt and store it in your
  own object storage (S3, GCS), keeping only the Telegram file_id (not the URL) in your database — the
  file_id is permanent and can be re-fetched via getFile at any time. Discord attachment URLs use a CDN
  with authentication tokens that expire after an undocumented period (typically 24–48 hours). Slack file
  URLs require a bot token for download even if the file is ''public'' — store the file_id and download
  on demand with the bot token. For multi-platform systems, abstract media as {platform: str, media_id:
  str, cached_url: str | None, cached_at: datetime | None} and implement a cache-aside pattern: check
  cached_url freshness before use, re-download if expired, and update the cache. Set cache TTLs conservatively
  (Telegram: 45 minutes, Discord: 12 hours) to stay well within platform guarantees.'
- 'Command parsing for bots must handle the Telegram-specific username suffix that appears on commands
  in group chats. In a group, commands are sent as ''/start@YourBotName'' rather than ''/start'' because
  Telegram appends the bot''s username to disambiguate which bot the command is intended for when multiple
  bots are in the same group. A naive command parser that checks message.text == ''/start'' will fail
  in groups — the check must be message.text.startswith(''/start'') or (more correctly) use a regex that
  strips the optional @BotUsername suffix. The standard pattern: parse the command as command_text.split(''@'')[0].lower()
  to normalize. Additionally, Telegram strips the leading ''/'' in bot commands for inline keyboard callback
  payloads — ensure command handling is consistent between text commands and callback handlers. For Discord,
  prefix-based commands (e.g., ''!help'') are being superseded by slash commands which are handled via
  the Interactions API — building new Discord bots with prefix commands rather than slash commands means
  losing the platform''s native command discoverability (the ''/'' command menu) and potentially being
  blocked in servers with strict permission settings that require slash commands.'
- 'Webhook signature validation must be implemented as the first middleware before any business logic
  processing for all messaging platform integrations. Each platform provides a different signature mechanism:
  Telegram uses a secret_token parameter in the setWebhook call, then includes X-Telegram-Bot-Api-Secret-Token
  header in deliveries; Slack uses HMAC-SHA256 of (version:timestamp:body) with the signing secret, in
  X-Slack-Signature; Discord uses ED25519 signature verification of (timestamp + body) with the app''s
  public key (verified via nacl library); WeChat Work uses a custom SHA1 hash of (token, timestamp, nonce,
  echostr). Skipping signature validation means any attacker who discovers your webhook URL can inject
  arbitrary messages, trigger your bot actions, exfiltrate data, or exhaust your LLM budget by flooding
  the endpoint with fake messages. For development, use a webhook testing tool (ngrok with request inspection,
  or Hookdeck) rather than disabling validation. The validation code should reject with 403 Forbidden
  before logging the request body — logging before validation could log malicious content that triggers
  log injection vulnerabilities.'
- 'Multi-platform conversation abstraction must handle the fundamental differences in conversation primitives
  between platforms. Telegram has three conversation types: private chat (1:1 with bot), group chat, and
  channel; the chat_id is negative for groups/channels and positive for private chats. Slack has channels
  (identified by Cxxxxxxxx), direct messages (identified by Dxxxxxxxx), and group DMs (identified by Gxxxxxxxx)
  — these have different permission requirements for posting. Discord has guild channels, DM channels,
  and threads within channels — threads have their own channel_id that must be used for thread-specific
  replies. WeChat Work has single-user messages and group messages with different webhook endpoints. The
  canonical conversation model must capture: {platform, conversation_id, conversation_type: ''dm'' | ''group''
  | ''channel'', bot_is_member: bool}. The bot_is_member field is critical — attempting to post to a Slack
  channel the bot is not a member of returns an error that is indistinguishable from a permission error;
  the bot must join the channel first via conversations.join.'
- 'Slack Block Kit message formatting enables rich interactive messages but imposes a strict payload size
  limit of 50 blocks per message and a total payload size limit of 3,001 bytes for response_url messages
  (vs. no strict limit for chat.postMessage). Block Kit messages that exceed these limits are silently
  truncated — Slack returns a 200 OK but only delivers the truncated content. The practical implication:
  a dynamic message that lists search results (each result as a section block) must implement pagination
  rather than returning all results. The correct pattern for paginated Block Kit responses: include ''Previous''
  and ''Next'' button actions (Actions block) with the page offset encoded in the action value, and store
  the full result set server-side keyed by a session ID in the action value. For messages that may have
  variable length content (LLM responses, document summaries), implement a character budget check before
  constructing the Block Kit payload — count the characters in each text field and truncate with an ellipsis
  at 3,000 characters total across all text fields before building the blocks array. Never discover the
  truncation limit through production failures; test with max-length inputs during development.'
- Discord application commands (slash commands) must handle the 15-minute deferred response window correctly
  for long-running operations. When a slash command triggers work that takes more than 3 seconds, you
  must immediately call interaction.defer_response() (which sends an initial 'thinking...' state to the
  user) and then follow up with interaction.followup.send() within 15 minutes. After 15 minutes, the interaction
  token expires and any followup attempt returns a 401. For operations that may take more than 15 minutes
  (batch processing, large file operations), the correct pattern is to defer immediately, start the long
  operation as a background task, and send the result as a new message via channel.send() rather than
  via the interaction followup — channel.send() does not have the 15-minute expiry. Always monitor the
  time elapsed between defer and followup in production — background task queue backlogs can silently
  push operations past the 15-minute window, causing the user to see a 'thinking...' indicator that never
  resolves. Set an explicit task timeout at 14 minutes that sends an 'operation timed out' followup message
  rather than letting the interaction expire silently.
- 'Bot user identification across platforms requires normalizing user IDs into a platform-scoped namespace
  to prevent ID collisions. User ID ''12345'' on Telegram is a different person than user ID ''12345''
  on Slack, but if both are stored in the same users table with just the integer ID, queries will return
  wrong users. The canonical user identifier must always include the platform prefix: ''telegram:12345'',
  ''slack:U12345678'', ''discord:12345678901234567''. For systems that support cross-platform user linkage
  (a user who is on both Slack and Telegram), maintain a separate identity_links table with (platform_a,
  user_id_a, platform_b, user_id_b, linked_at, linked_by_method) rather than trying to unify IDs — linked
  identities have their own lifecycle (can be unlinked, can be incorrect) that must be managed separately
  from the core user record. Never auto-link users across platforms based solely on display name similarity
  — display names are user-controlled and not unique within a platform. Only link on explicit user action
  (user sends the same linking code on both platforms) or on verified shared identifiers (same verified
  email address on both platforms).'
- 'Telegram webhook setup for production requires configuring the max_connections parameter carefully,
  because the default of 40 connections means Telegram can open up to 40 simultaneous webhook POST requests
  to your server. For a bot handling LLM responses (each taking 2–8 seconds), 40 simultaneous connections
  means 40 concurrent LLM calls — which can exhaust your LLM API rate limits and your server''s memory
  simultaneously. The setWebhook call accepts max_connections (1–100) to control this. Calculate the correct
  value: max_connections = floor(LLM_rate_limit_rps * average_response_time_seconds), with a 20% safety
  margin. Additionally, Telegram webhook endpoints must use HTTPS with a valid SSL certificate from a
  trusted CA (self-signed certs are supported but require uploading the certificate to Telegram via setWebhook''s
  certificate parameter). The webhook URL must be on port 443, 80, 88, or 8443 — other ports are silently
  rejected. For bots that need to process messages sequentially per user (to maintain conversation coherence),
  implement per-user message queuing in your webhook handler even though Telegram delivers them in parallel
  — allow_updates parameter can filter to specific update types, reducing irrelevant webhook calls.'
- 'Multi-platform bot deployment must handle the different reconnection behavior of persistent gateway
  connections vs. stateless webhooks. Discord and Slack''s Real-Time Messaging (RTM, now deprecated in
  favor of Events API) use persistent WebSocket connections that require active reconnection logic: WebSocket
  connections drop due to network interruptions, server-side session expirations (Discord invalidates
  sessions after 24 hours), and rate limit-induced disconnections. The correct WebSocket reconnection
  pattern: (1) implement an exponential backoff reconnect with jitter (start at 1 second, cap at 5 minutes);
  (2) for Discord, use the ''resume'' mechanism (send Resume payload with session_id and seq) rather than
  full reconnect to avoid re-processing missed events; (3) monitor WebSocket heartbeat ACKs — if the server
  stops sending heartbeat ACKs, close and reconnect immediately rather than waiting for TCP timeout; (4)
  set a maximum reconnect attempt count (e.g., 10) after which the process restarts entirely rather than
  entering an infinite reconnect loop that masks deeper issues. For production deployments, use the maintained
  library (discord.py, slack-sdk) rather than raw WebSocket — they implement this reconnection logic correctly.'
- 'Slack app distribution via OAuth (allowing other workspaces to install your app) requires implementing
  the complete OAuth 2.0 installation flow with state parameter CSRF protection, which is different from
  the simpler bot token creation for single-workspace bots. The installation flow: (1) generate a cryptographically
  random state token (32 bytes, hex-encoded); (2) store it in a session cookie with a 10-minute expiry;
  (3) redirect the user to Slack''s authorization URL with state parameter; (4) on the callback, verify
  the state parameter matches the session cookie before exchanging the code for a token; (5) exchange
  the authorization code for an access token via oauth.v2.access (this returns both a bot token AND optionally
  a user token if user scopes were requested); (6) store the bot token per workspace_id with encryption
  at rest. The critical security step is the state verification — without it, a CSRF attack can trick
  a workspace admin into installing your app on their workspace, granting your app access to their Slack.
  For multi-workspace SaaS bots, implement token rotation: when Slack rotates bot tokens (for security
  incidents), they deliver the new token via the tokens_revoked event — handle this event to update stored
  tokens.'
- Bot error handling for messaging platforms must distinguish between user-facing errors and system errors,
  and handle each differently. User-facing errors (invalid input, unsupported command, missing permissions)
  should produce a helpful message in the chat that explains what went wrong and what the user can do.
  System errors (API failures, database unavailability, LLM errors) should produce a minimal user-facing
  message ('Something went wrong, please try again in a moment') while logging the full error with context
  (user_id, platform, message_id, stack trace) for operator investigation. Never send raw exception messages
  to users — they leak implementation details, can contain sensitive information (file paths, database
  connection strings in error messages), and produce a poor user experience. For Telegram, send errors
  as ephemeral messages in the conversation; for Slack, use ephemeral messages (chat.postEphemeral) for
  user errors so other channel members do not see them; for Discord, use ephemeral interaction responses
  (ephemeral=True in the response). Implement a 'bot health' monitoring that alerts operators when the
  error rate exceeds 5% of processed messages in any 10-minute window.
- Testing messaging bot integrations requires a deterministic test harness that does not make real API
  calls, because real platform APIs have rate limits, require authentication, and produce non-deterministic
  responses (message IDs, timestamps, user IDs) that make tests flaky. The correct testing architecture
  uses a 'fake platform transport' that implements the same interface as the real platform client but
  stores sent messages in memory and allows test code to inject incoming messages programmatically. For
  Telegram, the fake transport intercepts sendMessage calls and records them as (chat_id, text, parse_mode,
  reply_markup) tuples that test assertions check; for incoming messages, it provides a send_update(update_dict)
  method that triggers the handler pipeline as if a real update arrived. This approach tests the full
  bot logic (conversation state transitions, command parsing, error handling, rate limiting) without any
  network calls. Additionally, implement contract tests that run against the real platform API in a dedicated
  test bot/workspace — these run nightly (not on every commit) to catch platform API changes. Never use
  the production bot token in tests — credential exposure and accidental real-message delivery are both
  unacceptable outcomes.
