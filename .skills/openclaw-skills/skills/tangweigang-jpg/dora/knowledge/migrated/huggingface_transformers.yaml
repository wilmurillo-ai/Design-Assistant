core_capability: '`AutoModel` and its task-specific siblings (`AutoModelForCausalLM`, `AutoModelForSequenceClassification`,
  etc.) resolve the concrete class at runtime by reading `config.json`''s `model_type` field and ...'
constraints:
- '`device_map=''auto''` invokes Accelerate''s device dispatcher, which shards model layers across all
  visible devices in priority order: CUDA GPUs first, then CPU RAM, then disk offload — but the behavior
  diverges significantly across hardware. On a single GPU it is equivalent to `.to(''cuda'')`. On multi-GPU
  it applies naive balanced layer splitting, not tensor parallelism, so communication overhead can make
  it slower than single-GPU for models that fit on one card. On Apple Silicon `mps` is NOT included in
  the auto-dispatch chain as of Transformers 4.x; you must explicitly pass `device_map=''mps''` or `model.to(''mps'')`.
  In CPU-only or mixed CPU+disk scenarios, `load_in_8bit` or `load_in_4bit` must be combined with `device_map`
  for the quantization kernels to activate correctly.'
- 'fp16, bf16, and fp8 are not interchangeable precision modes: fp16 has a narrow dynamic range that causes
  loss spikes on LLMs unless loss scaling is active, while bf16 matches fp32''s exponent range and is
  stable without scaling but requires Ampere+ GPUs (A100, H100) or Apple M-series; older V100/T4 hardware
  silently falls back to fp32 when `bf16=True` is passed to `TrainingArguments`, wasting memory budget.
  fp8 (via `transformer-engine` or `bitsandbytes`) requires Hopper (H100) hardware and separate quantization
  config; passing `load_in_8bit=True` via bitsandbytes is INT8 quantization for inference, not fp8 training,
  and mixing these concepts in config is a common source of silent accuracy regression or OOM errors.'
- 'Model checkpoints on the Hub ship with a `generation_config.json` that encodes the model author''s
  recommended generation parameters (temperature, top_p, repetition_penalty, max_new_tokens, etc.). Calling
  `model.generate()` without explicit parameters uses these stored defaults, not Transformers library
  defaults. The dangerous divergence: `generation_config.json` for some models sets `do_sample=False`
  (greedy decoding), making outputs fully deterministic regardless of any temperature you pass — because
  `temperature` is only active when `do_sample=True`. Other models set aggressive `repetition_penalty`
  values that suppress correct code or formulaic text. The debug pattern: print `model.generation_config`
  before any generation call to see the active defaults, and explicitly override every parameter you care
  about rather than relying on model-shipped defaults.'
- 'GPTQ, AWQ, and GGUF are all post-training quantization formats but serve different deployment contexts.
  GPTQ (via auto-gptq or optimum) is a calibration-based method that quantizes to 4-bit by minimizing
  reconstruction error on a small calibration dataset — producing higher quality than round-to-nearest
  but requiring 10-60 minutes of GPU time to quantize. AWQ (via autoawq) is also calibration-based but
  protects the most salient weights, achieving similar quality to GPTQ with better hardware-specific kernel
  support on recent NVIDIA GPUs. GGUF (via llama.cpp) is a CPU-first format with mixed-precision quantization
  (2-8 bit per layer) optimized for Apple Silicon and CPU inference — it cannot be loaded by Transformers
  natively; use `llama-cpp-python` with its own generation API. The critical incompatibility: a model
  quantized to GPTQ cannot be loaded with `load_in_4bit=True` (bitsandbytes NF4) — these are mutually
  exclusive formats and attempting to combine them causes either silent weight corruption or runtime errors
  depending on version.'
- 'The Hub has two mechanisms that restrict model access: (1) Gated repositories requiring signed license
  agreements — `from_pretrained(''meta-llama/Llama-3.1-8B'')` returns a 403 error if you haven''t accepted
  the license at huggingface.co, requiring `huggingface-cli login` with an approved token; (2) `trust_remote_code=True`
  — required for models that ship custom Python modeling code (Phi-3, Qwen, Falcon) in `modeling_*.py`
  files that are downloaded and `exec()`''d locally. The security implication of `trust_remote_code=True`
  is equivalent to running arbitrary code from the model publisher: a malicious model repository could
  execute system commands during model loading. The safe practice is to pin the model revision with `revision=''specific_commit_hash''`
  when using `trust_remote_code=True`, so that any future updates to the remote code files cannot silently
  execute new code in your environment. Never use `trust_remote_code=True` with `revision=''main''` in
  production.'
- '`from_pretrained(''meta-llama/Llama-2-70b-hf'')` will silently initiate a multi-GB (often 100–140 GB
  for 70B models) download to `~/.cache/huggingface/hub/` on the first call with no confirmation prompt
  and no progress ETA shown unless the caller explicitly pipes output. This burns disk quota in CI, saturates
  shared network links, and can time-out long-running training scripts mid-download. The correct mitigation
  is to pre-download with `huggingface-cli download <model>` in a dedicated setup step, pin the cache
  directory via `HF_HOME` or `TRANSFORMERS_CACHE`, and set `local_files_only=True` in production inference
  containers so an accidental model ID typo cannot trigger a network fetch.'
- Decoder-only models (GPT-2, LLaMA, Mistral, etc.) are trained with right-side content and left-side
  padding during batch inference, but many tokenizers default to `padding_side='right'`, which places
  padding tokens before the EOS position and causes the model to attend to meaningless pad tokens during
  generation — silently producing degraded or truncated outputs without raising any error. The fix is
  to explicitly set `tokenizer.padding_side = 'left'` before calling `tokenizer(batch, padding=True)`
  for any batch generation workload with a causal LM. Encoder-only models (BERT, RoBERTa) are unaffected
  because their bidirectional attention treats padding positions symmetrically, making this a decoder-only
  foot-gun that is easy to miss when porting encoder code to a generation task.
- 'Transformers v5 (released 2024) drops first-class TensorFlow and Flax support: TF/Flax model classes,
  `TFAutoModel*`, and the Keras training integration are removed or moved to unmaintained legacy status,
  making PyTorch the sole supported framework for new architecture additions. Code that used `from transformers
  import TFBertForSequenceClassification` or relied on `model.fit()` via the Keras API will break on upgrade
  with `ImportError` or `AttributeError` rather than a deprecation warning. Projects migrating from TF-based
  training pipelines must rewrite the training loop in PyTorch or Keras 3 with a manual Transformers integration;
  there is no automated migration path, and many tutorials predating v5 are silently broken.'
- Instruction-tuned models require prompts formatted in their specific chat template (ChatML, Llama-2
  format, Gemma format, etc.), and applying the wrong template silently degrades output quality without
  raising an error. As of Transformers 4.34, tokenizers ship with an embedded Jinja2 `chat_template` field
  and `tokenizer.apply_chat_template(messages, tokenize=False)` is the correct formatting method. The
  failure mode is manually constructing prompt strings using examples from tutorials that hardcode a specific
  model's format, then switching to a different model family — the wrong template produces syntactically
  valid but semantically misaligned prompts that make the model appear to 'forget' its instructions. Always
  call `apply_chat_template()` rather than string formatting, and verify the tokenizer has a `chat_template`
  attribute before deployment.
- 'PEFT''s QLoRA workflow has a critical target_modules pitfall: `lora_config.target_modules` must match
  the exact layer name strings used in the model''s named_modules(), and these differ across architectures.
  LLaMA-2 uses [''q_proj'',''v_proj'']; Mistral uses the same; Falcon uses [''query_key_value'']; BLOOM
  uses [''query_key_value''] as a combined projection. Specifying the wrong module names causes PEFT to
  silently create zero adapters while reporting success — training proceeds but only the LoRA modules
  have gradients, and since none were correctly attached, the base model remains frozen with no adapter
  updates. Verify injection with `model.print_trainable_parameters()` before starting training; if trainable
  parameters report as 0.0% or missing, the target_modules specification is wrong. Additionally, rank_pattern
  and alpha_pattern allow per-layer overrides for mixed-rank strategies, but they override the global
  r and lora_alpha silently with no validation warning.'
- 'Adding new special tokens with `tokenizer.add_special_tokens({''additional_special_tokens'': [''<TOOL>'',
  ''</TOOL>'']})` resizes the tokenizer vocabulary, but the model''s embedding matrix is NOT automatically
  resized — any forward pass after adding tokens without calling `model.resize_token_embeddings(len(tokenizer))`
  will raise an IndexError or silently use a stale embedding matrix with wrong dimensions. The secondary
  trap: after resizing, the newly added token embeddings are initialized randomly and require training
  to learn useful representations — using a newly added special token as a marker without any fine-tuning
  produces incoherent outputs because the model has never seen its embedding in meaningful context. For
  instruction-tuning setups that add <|im_start|>/<|im_end|> or similar tokens, initialize new embeddings
  to the average of existing similar tokens (e.g., copy from [BOS] or [EOS] embedding) to provide a better
  starting point and reduce the number of training steps required for convergence.'
- 'The Hugging Face Hub is the gravitational center of the Transformers ecosystem: every model, tokenizer,
  and config is expected to live there, and `from_pretrained()` is the universal entry point that fetches,
  caches, and instantiates any of them with a single string identifier. This design deliberately collapses
  the ''find + download + load + configure'' lifecycle into one call so that switching between BERT, LLaMA,
  or Whisper requires zero architectural changes in application code. The UNSAID implication is that the
  library is optimized for hub-centric workflows; local-file-first or air-gapped workflows are supported
  but are second-class citizens that require explicit `local_files_only=True` and manual cache management.'
- 'Transformers exposes two layers of abstraction that serve opposite audiences: `pipeline()` wraps the
  full pre/post-processing chain into a one-liner optimized for correctness and rapid prototyping, while
  the raw `AutoModel` + tokenizer API gives full control over every tensor operation for production optimization.
  The critical insight is that pipeline() is not a thin wrapper — it applies task-specific defaults (padding
  strategy, truncation, label mapping, output decoding) that differ from what you get calling the model
  directly, so a model that scores well via pipeline can behave differently when you call it through the
  raw API with naive defaults. Teams building latency-sensitive services should prototype with pipeline
  but eventually drop to the direct API to control batching, device placement, and output postprocessing
  explicitly.'
- '`AutoModel` and its task-specific siblings (`AutoModelForCausalLM`, `AutoModelForSequenceClassification`,
  etc.) resolve the concrete class at runtime by reading `config.json`''s `model_type` field and consulting
  a registry of `(model_type, task)` → class mappings. The UNSAID consequence is that the same checkpoint
  string can instantiate different Python classes depending on which Auto class you call — `AutoModel.from_pretrained(''bert-base-uncased'')`
  returns a `BertModel` (no head), while `AutoModelForMaskedLM` returns `BertForMaskedLM` (with MLM head).
  Calling the wrong Auto class silently loads the architecture without the task head and produces dimensionally
  correct but semantically wrong outputs; no warning is raised unless the config explicitly declares an
  incompatible task.'
- '`Trainer` eliminates boilerplate for standard supervised fine-tuning (gradient accumulation, mixed
  precision, distributed setup, logging, checkpointing) and is the fastest path to a working training
  loop, but it enforces an opinionated data contract (`__getitem__` returning dicts with `input_ids`/`labels`)
  and abstracts away the optimizer step in ways that make custom loss functions, curriculum scheduling,
  or RL-from-human-feedback reward shaping awkward. The practical rule: use `Trainer` when your training
  loop matches its assumptions and you need distributed training without writing FSDP/DeepSpeed config
  by hand; drop to native PyTorch + Accelerate when you need per-step control over gradients, custom optimizers
  not in `transformers.optimization`, or multi-objective losses — the switching cost is low because Trainer
  itself is built on Accelerate.'
- 'Flash Attention 2 can be enabled in Transformers via `attn_implementation=''flash_attention_2''` in
  `from_pretrained()`, reducing memory usage for long sequences by O(n) and improving throughput by 2-4x
  on supported architectures. The UNSAID requirements: Flash Attention 2 requires `flash-attn` installed
  separately (`pip install flash-attn --no-build-isolation`), requires CUDA compute capability ≥8.0 (A100,
  H100, RTX 30xx+), and only works with fp16 or bf16 dtype — passing float32 raises a runtime error. Additionally,
  not all model architectures in Transformers support it; unsupported models silently fall back to standard
  attention without a warning as of version 4.38. On SDPA (Scaled Dot Product Attention via PyTorch 2.0),
  use `attn_implementation=''sdpa''` as a lower-friction alternative that requires no extra install and
  supports a wider range of hardware.'
- 'Model weights on the Hub are increasingly distributed as `.safetensors` files rather than PyTorch `.bin`
  (pickle) files. Safetensors loads 2-3x faster than pickle because it supports memory-mapped, direct
  dtype loading with zero deserialization overhead. The security difference is critical: `.bin` files
  are Python pickle objects that can execute arbitrary code during load — the `--trust-remote-code` risk
  applies to pickle weights too, not just Python source files. Safetensors cannot execute code; it is
  a pure tensor container. `from_pretrained()` automatically prefers `.safetensors` when both formats
  exist. For models that only ship `.bin`, using `convert_to_safetensors()` from the Hub before deployment
  in secure environments eliminates the pickle code-execution attack surface entirely.'
- 'HuggingFace''s `evaluate` library (`pip install evaluate`) is the canonical way to compute NLP metrics
  (BLEU, ROUGE, BERTScore, accuracy, F1) in a way that is compatible with Trainer''s `compute_metrics`
  callback. The UNSAID integration pattern: `compute_metrics` receives `EvalPrediction(predictions=logits,
  label_ids=labels)` where predictions are raw logits (not argmax''d), requiring an explicit `np.argmax(predictions,
  axis=-1)` inside the function. The most common mistake is passing logits directly to `metric.compute()`,
  which either crashes or silently produces wrong scores. For generation tasks (summarization, translation),
  predictions are token ID arrays that must be decoded with the tokenizer before passing to ROUGE/BLEU.
  Batch decoding with `skip_special_tokens=True` is mandatory or metric scores are artificially penalized
  by special token strings.'
- 'Speculative decoding (also called assisted generation) is a latency optimization available in Transformers
  via `model.generate(..., assistant_model=draft_model)`: a small draft model generates N candidate tokens
  cheaply, then the main model verifies them in a single forward pass. Because verification is parallel
  and much cheaper than sequential generation, accepted tokens cost near-zero latency. The practical constraints:
  (1) the draft model must share the same tokenizer vocabulary as the main model; (2) the speedup is 1.5-3x
  for low-temperature or greedy decoding but approaches 1x for high-temperature sampling (because acceptance
  rate drops); (3) `do_sample=True` requires speculative sampling (SPEC_SAMPLING) rather than greedy verification,
  which reduces gains further. The best draft model candidates are smaller versions of the same model
  family (e.g., Llama-3-8B drafting for Llama-3-70B).'
- 'The HuggingFace `datasets` library''s `load_dataset()` downloads and caches the entire dataset to disk
  by default. For multi-hundred-GB datasets (The Pile, RedPajama, LAION), this exhausts disk quota silently.
  The correct pattern for large-scale processing is `load_dataset(..., streaming=True)`, which returns
  an IterableDataset that fetches shards lazily over HTTP with no local disk cache. The UNSAID constraint:
  IterableDataset does not support random access (no `dataset[i]` indexing), cannot be shuffled with a
  fixed seed over the full corpus (only buffer-based approximate shuffle via `.shuffle(buffer_size=10000)`),
  and does not support `.map()` with `num_proc > 1` (multiprocessing requires materialization). For training
  that requires true epoch-level shuffling and multi-worker DataLoader compatibility, download and cache
  the dataset once using `load_dataset()` with `num_proc=8` for parallel arrow conversion, then use the
  cached Dataset (non-streaming) for training.'
- 'Instantiating `pipeline(''text-generation'', model=''meta-llama/Llama-3-8B'')` loads the model into
  GPU/CPU memory every call if the pipeline object is not reused — in a FastAPI or Lambda handler that
  creates a new pipeline per request, this causes 30-120 second cold-start latency and potential OOM from
  multiple model copies. The correct production pattern is to initialize the pipeline once at module load
  time (a module-level singleton) and reuse it across requests. For serverless environments where module-level
  state may not persist, use `transformers.pipelines.PIPELINE_REGISTRY` or a dedicated model server (TGI,
  vLLM) instead. A second caching concern: `from_pretrained()` uses `~/.cache/huggingface/hub/` and HTTP
  HEAD requests to check for model updates on every call even when `local_files_only=False`. In production
  with a stable model version, set `local_files_only=True` and pin the revision to eliminate the network
  round-trip on every container start.'
- 'PyTorch FSDP (via Accelerate) and DeepSpeed ZeRO are both supported by Transformers'' Trainer via TrainingArguments,
  but they solve the memory problem differently and have incompatible trade-offs. FSDP shards parameters,
  gradients, and optimizer states across all GPUs natively in PyTorch with no additional dependencies
  — preferred for 7-70B model fine-tuning when all nodes are homogeneous NVIDIA hardware. DeepSpeed ZeRO-3
  also shards all states but adds CPU offloading (ZeRO-Offload) and NVMe offloading, enabling 100B+ training
  on GPU clusters that lack enough aggregate VRAM — critical for extreme-scale training but adds a complex
  JSON configuration file and a deepspeed dependency. The UNSAID interaction: FSDP and DeepSpeed cannot
  be used simultaneously; if `--deepspeed ds_config.json` is passed to training, FSDP must not be configured
  in the accelerate config. Mixing them causes a silent configuration conflict where one silently takes
  precedence, typically DeepSpeed, with no warning that FSDP settings were ignored.'
