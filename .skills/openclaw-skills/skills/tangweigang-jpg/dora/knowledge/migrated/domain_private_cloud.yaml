constraints:
- 'Self-hosted data requires a backup strategy: volume snapshots, pg_dump for PostgreSQL, SQLite backup
  API for SQLite, restic/rclone for file backups. 3-2-1 rule: 3 copies, 2 media, 1 offsite. UNSAID: backing
  up a PostgreSQL data directory while the DB is running can produce corrupt backups unless using pg_dump
  (logical backup) or pg_basebackup (physical, with WAL). Extraction signal: self-hosted projects without
  documented backup procedures are one disk failure away from data loss.'
- 'Docker containers are ephemeral — all data written inside a container is lost on container restart
  unless mounted to a volume or bind mount. Named volumes (managed by Docker) vs bind mounts (mapped to
  host directory) serve different needs. UNSAID: SQLite databases INSIDE a container (not volume-mounted)
  will lose all data on container updates. This is the #1 data loss cause in self-hosted deployments.
  Extraction signal: any database file path in a Docker container not pointing to a volume mount will
  lose data on container replacement.'
- 'Docker Compose .env files are readable by all containers in the compose project by default via ${VAR}
  substitution. Docker secrets (Swarm mode) provide encrypted secret storage. UNSAID: .env files committed
  to git repositories expose secrets — this is the most common credential leak. .env files should be in
  .gitignore; provide .env.example instead. Environment variables in Docker are visible in process listings
  and docker inspect — not suitable for high-sensitivity secrets (use Docker secrets or a vault like HashiCorp
  Vault). Extraction signal: hardcoded passwords in docker-compose.yml are critical security issues.'
- 'Kubernetes resource limits (requests vs limits) are the most misunderstood tuning knob. Requests are
  what the scheduler uses to place the pod; limits are the enforcement ceiling. UNSAID: setting CPU limits
  causes CPU throttling even when the node has idle capacity — many teams remove CPU limits and only set
  CPU requests. Memory limits, however, should always be set: a pod exceeding its memory limit is OOMKilled
  immediately. Setting requests == limits (Guaranteed QoS) means pods are never OOMKilled by node pressure
  but waste capacity. Setting no limits at all (BestEffort QoS) means the pod is first to be evicted when
  the node is under pressure. Vertical Pod Autoscaler (VPA) can recommend right-sized values based on
  historical usage. Extraction signal: CrashLoopBackOff pods with OOMKilled reason need higher memory
  limits; CPU-throttled services need limits removed or raised.'
- 'Docker Compose services on the same network communicate by service name (not localhost). If ''web''
  and ''db'' are services, web connects to ''db:5432'', not ''localhost:5432''. UNSAID: a common mistake
  is hardcoding ''localhost'' in app configs inside containers — this refers to the container itself,
  not the host or sibling containers. Port mapping (ports:) makes services reachable from the HOST; internal
  communication uses the Docker internal DNS. Extraction signal: database URLs with ''localhost'' inside
  a Docker Compose setup are misconfigured.'
- 'Self-hosted applications typically sit behind a reverse proxy (nginx, Traefik, Caddy) that handles
  TLS termination, routing, and load balancing. The app receives HTTP traffic (not HTTPS) from the proxy.
  UNSAID: X-Forwarded-For header carries the real client IP — apps must trust and read this header to
  log real IPs. Without proper trusted-proxy configuration, all requests appear to come from the proxy.
  Caddy auto-provisions Let''s Encrypt certs; Traefik does the same with Let''s Encrypt/ZeroSSL. Extraction
  signal: apps that hardcode port 443 or handle their own TLS inside Docker are fighting against the standard
  reverse-proxy model.'
- 'Horizontal Pod Autoscaler (HPA) scales the number of pod replicas based on metrics. The default metric
  is CPU utilization; custom metrics (RPS, queue depth, latency) require the Kubernetes Metrics Server
  plus a custom metrics adapter (Prometheus Adapter or KEDA). UNSAID: HPA and VPA should not both target
  CPU on the same Deployment — they fight each other. Use HPA for scaling out (replicas) and VPA in Off
  mode just for recommendations, or use KEDA which unifies event-driven scaling. Scale-down is intentionally
  slow (default cooldown 5 min) to avoid flapping; scale-up is fast. Extraction signal: services that
  spike and drop quickly need a shorter scaleDown stabilizationWindowSeconds; services that remain over-provisioned
  need VPA recommendations applied.'
- 'Kubernetes Ingress exposes HTTP/HTTPS routes from outside the cluster to services. Ingress controllers
  (nginx-ingress, Traefik, HAProxy, Contour) implement the Ingress spec. UNSAID: the Ingress resource
  alone does nothing — you need an Ingress controller deployed in the cluster. cert-manager integrates
  with Ingress via the kubernetes.io/tls annotation and automatically provisions Let''s Encrypt TLS certificates
  using ACME HTTP-01 or DNS-01 challenges. Multiple Ingress resources with the same hostname but different
  paths are merged by the controller — conflicting rules between namespaces can cause unexpected routing.
  For gRPC or WebSocket traffic, ensure the Ingress controller is configured with appropriate timeouts
  and protocol support, as default HTTP/1.1 proxying breaks both. Extraction signal: services accessible
  inside the cluster but unreachable externally need Ingress + controller + DNS configuration verified.'
- 'Kubernetes RBAC (Role-Based Access Control) controls what API operations subjects (users, groups, service
  accounts) can perform on which resources. Roles are namespace-scoped; ClusterRoles span the whole cluster.
  UNSAID: the most common RBAC mistake is granting cluster-admin to application service accounts ''to
  make it work'' — this gives the pod the ability to read all secrets, delete any resource, and escalate
  privileges. Principle of least privilege: application pods should only have the ServiceAccount permissions
  they actually need (e.g., only list/watch ConfigMaps in their own namespace). Audit RBAC grants with
  kubectl auth can-i --list --as=system:serviceaccount:<ns>:<sa>. Wildcard verbs (''*'') and resources
  (''*'') are red flags in production RoleBindings. Extraction signal: pods with cluster-admin ServiceAccount
  are a critical security finding in any Kubernetes deployment.'
- 'Kubernetes NetworkPolicy restricts pod-to-pod traffic at the network layer. Without any NetworkPolicy,
  all pods in the cluster can reach all other pods — a flat, fully open network. UNSAID: NetworkPolicy
  is only enforced if the CNI plugin supports it (Calico, Cilium, Weave Net support it; Flannel alone
  does NOT enforce NetworkPolicy). A default-deny-all policy in each namespace followed by explicit allow
  rules is the gold standard. Services like databases should only accept connections from their application
  pods, not from the entire cluster. Extraction signal: clusters using Flannel as the only CNI have no
  network isolation even if NetworkPolicy resources exist — they are silently ignored.'
- 'Prometheus + Grafana is the de facto observability stack for Kubernetes. kube-prometheus-stack (Helm
  chart) deploys Prometheus Operator, Grafana, Alertmanager, and pre-built dashboards for Kubernetes cluster
  metrics in one command. UNSAID: Prometheus scrapes metrics by convention via /metrics endpoints and
  ServiceMonitor CRDs — adding a ServiceMonitor is how you onboard a new service into monitoring. Cardinality
  explosion is the #1 Prometheus operational failure: high-cardinality labels (user IDs, request IDs,
  full URLs) in metrics cause memory exhaustion. AlertManager deduplicates, groups, and routes alerts
  to PagerDuty/Slack — without proper grouping, a cluster failure triggers thousands of individual alerts
  (alert storm). Long-term storage requires remote_write to Thanos, Cortex, or Mimir since Prometheus
  local storage is not designed for multi-year retention. Extraction signal: Prometheus pods with OOMKilled
  status are usually caused by high-cardinality metric labels.'
- 'Multi-tenancy in Kubernetes comes in three models: namespace-per-tenant (soft isolation, shared control
  plane), virtual clusters (vcluster — tenant gets their own API server within the host cluster), and
  separate physical clusters (full isolation, high cost). UNSAID: namespace isolation is incomplete without
  NetworkPolicy (default-deny), LimitRanges (prevent resource hogging), ResourceQuotas (cap total namespace
  consumption), and RBAC (prevent cross-namespace access). Kubernetes does not prevent a tenant''s pod
  from accessing another tenant''s PVC by volume name if they know it — physical cluster separation is
  the only true hard isolation. Hierarchical namespaces (HNC) let platform teams create namespace hierarchies
  with inherited policies. Cost showback/chargeback per tenant requires namespace-level resource tagging
  and a tool like OpenCost or Kubecost. Extraction signal: shared clusters with per-namespace tenants
  but no ResourceQuota will have noisy-neighbor resource contention.'
- 'Kubernetes log aggregation requires shipping container logs (which are ephemeral, stored on the node
  in /var/log/containers/) to a centralized store before pods are terminated or nodes are cycled. The
  standard stack is Fluent Bit (lightweight DaemonSet) → Elasticsearch or Loki, visualized in Kibana or
  Grafana. UNSAID: Loki (Grafana Labs) stores only log metadata as index and the raw log stream compressed
  — dramatically cheaper than Elasticsearch for pure log storage. However, Loki does not support full-text
  search across all fields; you must query by label first. Fluent Bit uses less memory than Fluentd and
  is preferred for Kubernetes DaemonSet deployments. Log volume from verbose DEBUG-level application logs
  can overwhelm the pipeline — enforce log level discipline (INFO in production, DEBUG behind a feature
  flag). Extraction signal: clusters without a log aggregation DaemonSet lose all logs from terminated
  pods, making post-incident diagnosis impossible.'
