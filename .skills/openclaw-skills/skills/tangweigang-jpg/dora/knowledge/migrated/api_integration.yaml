constraints:
- 'Error handling in API integrations must distinguish between retryable and non-retryable errors — treating
  all errors the same way is a common source of both wasted retries and missed error propagation. The
  constraint: 5xx errors are generally retryable (server-side transient faults); 4xx errors are generally
  not retryable (client errors that will fail identically on retry). Specific cases: 429 Too Many Requests
  is retryable after delay; 400 Bad Request is not retryable without fixing the request; 401 Unauthorized
  may be retryable after token refresh; 404 Not Found is typically not retryable unless the resource is
  eventually consistent. For AI agents, 422 Unprocessable Entity from an LLM API (e.g., context window
  exceeded) requires a different remediation path (truncate context) rather than a simple retry. Mapping
  error codes to remediation strategies is an explicit design decision, not a default behavior.'
- 'Cursor-based pagination is significantly more robust than offset-based pagination for large or frequently-updated
  datasets, but the failure to use it is the most common pagination bug in production APIs. The UNSAID
  failure: offset pagination (LIMIT 20 OFFSET 100) breaks when rows are inserted or deleted between pages
  — rows shift positions, causing items to be skipped or duplicated across pages. On large datasets, high
  offsets also cause full table scans in most databases, making page 500 100x slower than page 1. Cursor-based
  pagination uses a stable, opaque pointer to the last-seen item (typically an indexed column value like
  created_at + id), making pagination both stable under mutations and O(1) regardless of page depth. The
  trade-off: cursor pagination sacrifices random page access (''jump to page 50'') in exchange for correctness
  and performance.'
- 'Ignoring rate limit response headers (X-RateLimit-Remaining, X-RateLimit-Reset, Retry-After) in favor
  of blind exponential backoff on 429 errors wastes quota and creates unnecessary delays. The UNSAID failure:
  when X-RateLimit-Reset tells you exactly when your quota resets (e.g., in 3 seconds), sleeping for 2^3
  = 8 seconds is a 5-second penalty you paid unnecessarily. The correct implementation reads the Retry-After
  or X-RateLimit-Reset header and sleeps until that exact time, with a small jitter buffer. For per-minute
  quotas (common in LLM APIs), this means you can often immediately process the next batch after the reset
  rather than backing off progressively. Additionally, track X-RateLimit-Remaining proactively to throttle
  request rate before hitting the limit, which avoids 429s entirely and maximizes throughput.'
- 'Timeout misconfiguration is the most common cause of thread pool exhaustion in API integration layers.
  The failure has two modes: no timeout (requests hang indefinitely, exhausting thread/connection pools)
  and uniform timeout (setting the same timeout for all requests regardless of expected latency, causing
  false timeouts for legitimately slow operations like file uploads). The correct pattern is layered timeouts:
  connect timeout (2-5s, how long to wait for the TCP handshake), read timeout (varies per endpoint —
  5s for fast lookups, 120s for ML inference), and total request timeout (safety cap regardless of connect+read).
  For async code, also set a semaphore limit on concurrent in-flight requests to prevent connection pool
  exhaustion even when individual timeouts are correctly set. Absent explicit timeouts, a single slow
  or hung upstream will eventually starve all available workers.'
- 'Webhook delivery failure is almost always caused by not acknowledging receipt quickly enough, causing
  the sender to retry and creating duplicate deliveries. The UNSAID failure: most webhook senders (Stripe,
  GitHub, Slack) have delivery timeouts of 5-30 seconds; if your endpoint does not return a 2xx within
  that window, the sender marks the delivery as failed and queues a retry. Endpoints that perform synchronous
  processing (calling a database, calling another API, triggering an LLM) inside the HTTP handler routinely
  exceed this timeout under load. The correct pattern: receive the webhook, validate the signature, immediately
  enqueue the payload to an internal queue, and return 200 — all within <1 second. A background worker
  processes the queued payload asynchronously. This decouples delivery reliability from processing speed
  and handles retries at your own pace.'
- 'REST API versioning via URL prefix (/v1/, /v2/) creates a hidden migration cliff: when v1 is deprecated,
  all consumers must migrate simultaneously or lose functionality. The UNSAID failure teams discover too
  late: URL versioning creates N parallel code paths in the server that must all be maintained and kept
  consistent until the old version is fully deprecated. The actual migration cliff is contractual — most
  API consumers will not migrate until forced, and the v1 shutdown date becomes a high-stakes coordination
  event. A less painful alternative is sunset headers (Sunset: Sat, 31 Dec 2025 23:59:59 GMT, Deprecation:
  true) that give consumers machine-readable migration signals in current responses. The cleanest versioning
  strategy at scale is additive-only (never break, only add) with explicit deprecation cycles, which pushes
  the need for version numbers far into the future.'
- 'Setting timeouts based on p50 latency instead of p99 latency is a common misconfiguration that causes
  production timeout cascades. The failure: if an API endpoint has p50=100ms and p99=2000ms, setting timeout=200ms
  will cause 1% of requests to time out in normal operation — which seems acceptable until you realize
  that at 100 req/s that is 1 failed request per second continuously, creating a constant stream of retry
  load. The correct heuristic: set timeouts at 2-3x the p99 latency of the specific endpoint, not a uniform
  value for all endpoints. For LLM API calls, p99 can be 10-20x p50 due to output-length variance — a
  timeout appropriate for short responses will routinely truncate long-form generations. Additionally,
  distinguish between network timeout (how long to wait for bytes) and total timeout (how long the entire
  operation can take including retries).'
- 'GraphQL N+1 query problems are not automatically solved by GraphQL itself — they require explicit DataLoader
  (batching + deduplication) implementation on the server side. The UNSAID failure: a GraphQL query for
  a list of posts with their authors triggers one DB query for posts, then N separate queries for each
  author — one per post. Without DataLoader, GraphQL can be dramatically more expensive than a well-written
  SQL JOIN. DataLoader batches all author lookups within a single event loop tick into a single query.
  For AI skill GraphQL integrations on the client side, the equivalent problem is over-fetching via deep
  nested queries — limit query depth (max depth 5-7 levels), implement query complexity scoring, and reject
  queries over a complexity budget to prevent a single expensive query from consuming disproportionate
  server resources.'
- 'REST and GraphQL solve different fundamental problems, and choosing the wrong one for the use case
  creates long-term friction that is expensive to undo. REST excels at resource-oriented APIs with predictable,
  cacheable access patterns — its HTTP semantics (GET/POST/PUT/DELETE, status codes, Cache-Control) are
  understood by every HTTP middleware, CDN, and proxy. GraphQL excels at client-driven data fetching where
  different consumers need different subsets of the same graph — it eliminates over-fetching and under-fetching
  by letting clients specify their exact data requirements. The UNSAID WHY: the real cost of choosing
  REST for a graph-shaped domain is N+1 query patterns and proliferating bespoke endpoints; the real cost
  of choosing GraphQL for a simple CRUD API is operational overhead (no HTTP caching out of the box, complex
  error handling, tooling complexity) that dwarfs the benefit.'
- 'Exponential backoff with jitter is the canonical retry strategy for API calls because it simultaneously
  solves two problems: it avoids hammering a degraded upstream (pure exponential backoff), and it avoids
  synchronized retry storms where all clients retry at the same time after the same failure (jitter).
  The WHY jitter is non-optional: without jitter, all clients that failed at time T retry at T+1s, then
  T+3s, then T+7s — a synchronized wave that can exceed the load that caused the original failure. Full
  jitter (sleep = random_between(0, min(cap, base * 2^attempt))) is generally preferred over equal jitter.
  For AI agent API calls, combine exponential backoff with a circuit breaker: after N consecutive failures,
  stop retrying and return a clear error rather than exhausting the budget on a permanently failed service.'
- 'Idempotency keys are essential for any API call that causes side effects (payments, email sends, resource
  creation) because networks are unreliable and clients cannot know whether a request that timed out was
  processed or not. Without idempotency, retrying a timed-out POST /charges call can double-charge a user.
  The HOW: the client generates a unique key (UUID v4) per logical operation and sends it in a header
  (Idempotency-Key). The server stores the request hash + response keyed by this value; if the same key
  arrives again within a TTL window, it returns the stored response without re-executing. The UNSAID WHY:
  idempotency keys shift the deduplication responsibility to the server, where it belongs, because only
  the server has the state to know what was actually processed. For AI agents that orchestrate API calls,
  idempotency keys prevent duplicate side-effects during replays and error recovery.'
- 'API versioning exists to decouple the deployment of API providers from API consumers — without it,
  any breaking change requires simultaneous updates to all consumers, which is operationally impossible
  at scale. The two dominant strategies carry different tradeoffs: URL versioning (/v1/, /v2/) is explicit,
  cache-friendly, and easily routed at the gateway level but creates URL pollution and requires clients
  to explicitly migrate. Header versioning (Accept: application/vnd.api+json;version=2) is cleaner in
  URL space but harder to test in a browser, more complex to route, and invisible in logs. The UNSAID
  principle: versioning strategy matters less than the commitment to never making breaking changes within
  a version — additive changes (new fields, new endpoints) are always safe; removing or renaming fields
  is always a version bump.'
- 'The circuit breaker pattern prevents cascading failures in microservice architectures by detecting
  when a downstream service is unhealthy and fast-failing requests instead of waiting for timeouts to
  propagate. The WHY cascading failures are the primary availability threat in distributed systems: a
  single slow dependency does not cause failure in isolation — it causes thread pool exhaustion, connection
  pool depletion, and memory pressure in all upstream services that are waiting for it to respond. The
  circuit breaker transitions through CLOSED (normal), OPEN (fast-fail), and HALF-OPEN (probe) states.
  The UNSAID operational insight: the circuit breaker threshold should be calibrated against baseline
  error rates — setting it too tight causes nuisance trips; too loose defeats the purpose. For AI agent
  API calls, a tripped circuit should trigger a graceful degradation path rather than crashing the agent.'
- 'Request batching reduces API call overhead when an API supports batch endpoints, but naive batching
  creates a latency-vs-throughput tradeoff that must be consciously designed. The WHY: unbatched requests
  incur per-request overhead (TLS handshake amortization, HTTP/2 multiplexing limits, per-request auth
  validation). A batch of 100 items in one request is typically 5-10x faster total than 100 individual
  requests. The UNSAID design tension: collecting 100 items before dispatching adds latency for early
  items in the batch; dispatching too eagerly loses the batching benefit. The correct pattern is dual-trigger
  batching: flush when either the batch size threshold OR a maximum wait time is reached (e.g., 100 items
  or 50ms, whichever comes first). For AI agent data pipelines, batch size should also be bounded by the
  API''s payload size limit, not just item count.'
- 'Connection pooling is essential for high-throughput API integration because establishing a new TCP+TLS
  connection for every request adds 100-500ms of latency and significant CPU overhead at both ends. HTTP/1.1
  keep-alive and HTTP/2 multiplexing provide connection reuse, but only if the client is configured with
  a persistent session — many HTTP client libraries default to creating a new connection per request unless
  explicitly configured otherwise. In Python, using a requests.Session() or httpx.Client() instance reuses
  connections; creating a new requests.get() call for every request does not. For async clients (httpx.AsyncClient,
  aiohttp.ClientSession), the client must be created once and reused across all requests in the application
  lifetime, not created per-request in an async handler. The hidden cost of not pooling: at 1000 req/s,
  cold connections can consume more CPU than the actual request processing.'
- 'API gateway patterns centralize cross-cutting concerns — auth verification, rate limiting, request
  logging, SSL termination, routing — so that individual services do not each need to re-implement them.
  The WHY this matters for AI skill architectures: each skill typically calls multiple upstream APIs;
  without a gateway, each skill must independently implement auth refresh, retry logic, and logging —
  creating N copies of infrastructure code that diverge over time. The gateway pattern moves these to
  a single layer that all skills route through. The UNSAID operational benefit: the gateway is also the
  point where you can implement circuit breakers and failover without changing skill code. Tradeoff: the
  gateway is a single point of failure and a performance bottleneck, so it must be highly available (multiple
  instances, health-checked) and must add minimal latency (target <5ms overhead).'
- 'HTTP caching headers (Cache-Control, ETag, Last-Modified) allow API clients to avoid redundant data
  transfer, but most API integration code ignores them entirely, fetching the same unchanged data on every
  request. The WHY caching at the HTTP layer is preferable to application-level caching: HTTP caching
  is part of the contract between API provider and consumer; the provider signals exactly what can be
  cached and for how long. ETags enable conditional requests (If-None-Match) that return 304 Not Modified
  with no body when data hasn''t changed — this eliminates both network transfer and parsing cost. For
  AI skill integrations that poll APIs for new data (news feeds, price feeds, document changes), implementing
  ETag-based conditional GETs can reduce API quota consumption by 60-90% when data changes infrequently.'
- 'Webhook signature verification is mandatory because without it, your webhook endpoint will process
  any HTTP POST from any source, enabling attackers to inject arbitrary events. The pattern: the webhook
  provider generates a shared secret, uses HMAC-SHA256 to sign the request body, and includes the signature
  in a header (e.g., X-Signature-256: sha256=...). The receiver recomputes the HMAC using the shared secret
  and compares signatures using a constant-time comparison function (hmac.compare_digest in Python, crypto.timingSafeEqual
  in Node.js). The UNSAID WHY for constant-time comparison: string equality operators short-circuit on
  the first differing byte, creating a timing side-channel that allows an attacker to guess signatures
  byte by byte. Also validate a timestamp header (X-Timestamp) to reject replayed requests older than
  5 minutes — HMAC verification alone does not prevent replay attacks.'
- 'A production-grade API integration assembly for an AI skill should include: (1) connection pool with
  per-host limits (e.g., max 10 concurrent connections to the same host); (2) layered timeouts (connect:
  3s, read: 30s, total: 60s); (3) retry with exponential backoff + jitter, only on retryable errors (5xx,
  429, network errors); (4) circuit breaker that opens after 5 consecutive failures within 60 seconds;
  (5) rate limit header parsing to proactively throttle; (6) idempotency keys on mutating requests; (7)
  structured logging of every request+response with duration, status code, and masked auth headers. The
  WHY this specific assembly: each element is load-bearing — omitting circuit breakers allows cascading
  failures; omitting idempotency keys risks duplicate side-effects; omitting rate limit header parsing
  leads to wasted retries. httpx + tenacity in Python implements all of this with about 50 lines of wrapper
  code.'
