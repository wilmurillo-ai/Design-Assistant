core_capability: Python context managers (with statement, __enter__/__exit__ or @contextmanager) handle
  resource acquisition and release deterministically. This is Python's primary RAII pattern. Files, DB
  connections,...
constraints:
- 'Python''s Global Interpreter Lock (GIL) prevents true parallel CPU execution in a single process. CPU-bound
  tasks must use multiprocessing or separate processes; threading only helps I/O-bound work. This is NOT
  a bug to work around per-project — it''s a language design constant. Extraction signal: projects that
  do CPU-heavy work (ML inference, image processing) use ProcessPoolExecutor, Ray, or spawn subprocesses;
  threading is reserved for network/disk I/O.'
- 'Python''s match statement (structural pattern matching, Python 3.10+) is NOT the same as a switch/case
  in other languages. It performs STRUCTURAL matching against patterns: sequences, mappings, class instances,
  OR patterns, guard clauses. UNSAID: match with a plain variable name (match value: case x:) ALWAYS matches
  and BINDS x to value — it does NOT compare with an existing variable x. To compare with an existing
  variable, use a guard: case x if x == existing_var. Extraction signal: code attempting to match against
  existing variables without guards is silently incorrect.'
- 'Python module import executes top-level code immediately. Code at module scope runs on import, not
  on call. This means: (1) expensive initialization at module level slows startup for all importers; (2)
  database connections opened at module level fail in test environments without DB; (3) circular imports
  cause AttributeError at runtime, not at definition time. Common anti-pattern: putting ''db = create_engine(DATABASE_URL)''
  at module level in models.py.'
- 'Python evaluates default argument values ONCE at function definition time, not on each call. def f(items=[])
  creates ONE list shared across all calls — a notorious bug source. Correct pattern: def f(items=None):
  items = items or []. Extraction signal: any function with list, dict, or set as a default argument value
  is likely buggy. This also applies to class-level mutable attributes shared across instances.'
- 'asyncio''s single-threaded event loop means ANY blocking call (time.sleep, requests.get, file I/O without
  aiofiles) freezes ALL concurrent tasks. This is the #1 asyncio bug: mixing sync and async code. Blocking
  DB drivers (psycopg2, sqlite3) block the event loop; async alternatives needed (asyncpg, aiosqlite).
  run_in_executor() delegates blocking work to a thread pool. Extraction signal: ''import requests'' in
  an asyncio project is a red flag unless guarded by run_in_executor.'
- 'Python''s multiprocessing uses pickle to serialize objects between processes. Objects that cannot be
  pickled (lambda functions, nested functions, closures, file handles, database connections) cause cryptic
  ''cannot pickle'' errors at runtime. This is the most common multiprocessing failure. Extraction signal:
  passing lambda functions or class instances with non-picklable attributes to ProcessPoolExecutor.submit()
  or Pool.map() will fail silently or with obscure errors. Solution: use module-level functions, not lambdas;
  serialize only primitive data across process boundaries; or use a fork-based start method where the
  parent''s memory is copied.'
- 'Python''s threading.local() and contextvars.ContextVar are different mechanisms for thread-local /
  async-local state. threading.local() isolates data per OS thread. ContextVar (Python 3.7+) isolates
  data per asyncio Task — the correct primitive for async code. Using threading.local() in async code
  gives the SAME value to all tasks running on the same thread (the event loop thread), which is almost
  always wrong. UNSAID: libraries that use threading.local for request-scoped state (Flask''s current_app,
  many ORMs) are fundamentally incompatible with async code without an adapter layer. Extraction signal:
  Flask extensions used in FastAPI apps without ASGI compatibility wrappers will have shared-state bugs.'
- 'Python''s subprocess module: subprocess.run() is the modern API (Python 3.5+); os.system() and subprocess.call()
  are legacy. Critical security: NEVER pass shell=True with user-controlled input — this enables shell
  injection equivalent to SQL injection. Use shell=False (default) and pass arguments as a list. UNSAID:
  subprocess.run([''ls'', user_input]) is safe even with malicious user_input because it never invokes
  a shell. subprocess.run(f''ls {user_input}'', shell=True) is exploitable. check=True raises CalledProcessError
  on non-zero exit; without it, failures are silently ignored. Extraction signal: any subprocess call
  with shell=True and external input is a command injection vulnerability.'
- 'Python 3.11+ ExceptionGroup and except* syntax handle multiple concurrent exceptions from TaskGroup
  or trio/anyio. A TaskGroup raises an ExceptionGroup containing all exceptions from failed tasks. Catching
  it requires ''except* ValueError as eg:'' — NOT ''except ValueError''. The except* syntax catches matching
  exception types from the group and can re-raise remaining exceptions. WHY this fails silently: code
  written before 3.11 that wraps TaskGroup in ''except Exception as e:'' will catch the ExceptionGroup
  but treating it as a single exception hides the child exceptions. Iterating eg.exceptions gives the
  list. Extraction signal: try/except around asyncio.TaskGroup without except* will mask which tasks failed
  and with what errors — a hidden data integrity risk in concurrent pipelines.'
- 'Python virtual environment activation pitfalls: (1) ''source venv/bin/activate'' only affects the CURRENT
  shell session — subprocesses launched from that shell use their own Python unless the venv is explicitly
  specified; (2) shebang lines (#!/usr/bin/env python3) in scripts use the system Python, not the venv
  Python — use absolute paths (#!/path/to/venv/bin/python) in deployed scripts; (3) cron jobs and LaunchAgents
  do NOT inherit the shell environment — venv must be specified explicitly; (4) uv run <cmd> is the correct
  way to run commands in a uv-managed project venv without manual activation. UNSAID: the most common
  deployment failure pattern is a script that works in a developer shell but fails in production because
  a dependency only exists in the venv that wasn''t activated. Always use absolute interpreter paths in
  systemd/cron/LaunchAgent configurations.'
- 'Python context managers (with statement, __enter__/__exit__ or @contextmanager) handle resource acquisition
  and release deterministically. This is Python''s primary RAII pattern. Files, DB connections, locks,
  HTTP sessions, and temporary state should use context managers. Extraction signal: repeated try/finally
  without context managers is a code smell indicating a missed opportunity for resource safety.'
- 'Python generators (yield) produce values lazily, enabling processing of datasets larger than memory.
  Generator expressions (x for x in ...) are memory-efficient alternatives to list comprehensions. asyncio
  is built on generators/coroutines under the hood. Extraction signal: projects processing large files,
  streams, or infinite sequences use generators; list() wrapping a generator call is a warning that the
  developer may not understand the tradeoff.'
- 'Python dataclasses (@dataclass, Python 3.7+) auto-generate __init__, __repr__, __eq__ from field annotations.
  Pydantic extends this for validation and serialization. attrs is an alternative with more features.
  NamedTuple provides immutable dataclasses. In 2024+, most projects prefer Pydantic v2 over raw dataclasses
  for any data that crosses a trust boundary (API, user input, config files). Extraction signal: mixing
  raw dicts and dataclasses inconsistently signals architectural drift.'
- 'pathlib.Path (Python 3.4+) is the modern way to handle file paths. os.path.join and string concatenation
  for paths are obsolete patterns. Path objects are immutable, support / operator for joining, and have
  methods like .read_text(), .write_text(), .glob(), .rglob(), .stat(). Extraction signal: projects using
  os.path extensively are either old or maintained by developers not current with Python best practices.
  Mixing pathlib and os.path is a code smell.'
- 'Modern Python typing patterns (3.10+): use X | Y instead of Union[X, Y], use X | None instead of Optional[X].
  list[int] instead of List[int] (no import needed). TypeAlias, TypeVar, ParamSpec for generic code. Protocol
  for structural subtyping (the Pythonic way to define interfaces without ABC). TypedDict for typed dict
  shapes. Literal for constrained string/int types. Extraction signal: from __future__ import annotations
  enables postponed evaluation for forward references.'
- 'Python dependency isolation: venv (stdlib), virtualenv, conda, or uv (modern, fast). requirements.txt
  pins exact versions for reproducibility; pyproject.toml (PEP 517/518) is the modern standard. pip-tools
  compiles requirements.txt from pyproject.toml. UNSAID: projects without a lock file (requirements.txt
  or poetry.lock) will have non-reproducible builds. Extraction signal: the absence of ANY dependency
  lockfile is a deployment reliability risk.'
- 'Python decorators are functions that wrap other functions, applied at definition time. @functools.wraps
  preserves the wrapped function''s metadata (critical for introspection, docs, tests). Class-based decorators
  with __call__ enable stateful decorators. Stacked decorators apply bottom-up (innermost first). UNSAID:
  decorators that don''t use @wraps break Sphinx autodoc and pytest parametrize. Framework decorators
  (@app.route, @login_required) are typically syntactic sugar over registration in a registry.'
- '__slots__ in a class prevents dynamic attribute creation and reduces memory by replacing __dict__ with
  a fixed-size array. A class with 1M instances saves ~50-200MB by using __slots__. Inheritance complicates
  slots: subclassing a non-slots class negates the benefit. UNSAID: dataclasses support slots=True (Python
  3.10+). Pydantic v2 models already use __slots__ internally. Extraction signal: __slots__ in a non-trivial
  project signals memory-conscious optimization, likely a high-volume data processing path.'
- 'pyproject.toml (PEP 621) is the single source of truth for project metadata in modern Python. It replaces
  setup.py, setup.cfg, and requirements.txt. uv is the modern, Rust-accelerated replacement for pip +
  pip-tools + virtualenv. Key sections: [project] for metadata, [project.optional-dependencies] for extras,
  [tool.ruff] and [tool.mypy] for tool config. UNSAID: uv.lock (generated by uv) is the equivalent of
  package-lock.json — it pins exact versions including transitive deps. Committing uv.lock ensures reproducible
  installs across all environments. Extraction signal: projects using only pyproject.toml without uv.lock
  or requirements.txt have non-reproducible builds.'
- 'Python''s functools.cache (Python 3.9+) and functools.lru_cache are memoization decorators. @cache
  is unbounded; @lru_cache(maxsize=128) evicts least recently used entries. Both require hashable arguments.
  UNSAID: @cache holds strong references to all cached results — on long-running servers, this is a memory
  leak if the cache is never cleared. For methods on class instances, @lru_cache can prevent garbage collection
  of the instance (the instance is an argument, so it''s cached). Use methodtools.lru_cache or cache the
  method on the class, not the instance, to avoid this. Extraction signal: server code using @cache on
  methods that process user data will grow memory unboundedly.'
- 'Python''s execution model: source (.py) → bytecode (.pyc in __pycache__) → CPython VM. The bytecode
  is portable across platforms but version-specific. Python is interpreted but NOT line-by-line — the
  entire function body is compiled to bytecode before execution. This means SyntaxError is raised at compile
  time (before any line runs), but NameError is raised at runtime when the name is accessed. Extraction
  signal: ''if False: invalid_syntax'' does NOT suppress a SyntaxError but DOES suppress a NameError —
  a common confusion. Understanding this compile/run distinction helps diagnose import-time vs runtime
  failures.'
- 'pytest is the de facto Python testing framework. Key patterns: fixtures for test setup/teardown (scoped:
  function, class, module, session), parametrize for data-driven tests, monkeypatch for mocking. conftest.py
  provides shared fixtures without importing. UNSAID: pytest fixtures are dependency-injected by name
  — the fixture parameter name MUST match the fixture function name. Scope=session fixtures run once for
  the whole test suite — database setup, expensive ML model loading. Scope=function fixtures (default)
  run per test — DB rollback, temp files. Extraction signal: test files that manually call setup/teardown
  functions instead of using fixtures are fighting pytest''s design.'
- 'Python''s __init_subclass__ and __class_getitem__ hooks enable metaclass-free class customization.
  __init_subclass__ is called whenever a class is subclassed — useful for auto-registration patterns (plugin
  registries, command registries). Pydantic and Django use this internally. UNSAID: the classic metaclass-based
  plugin registry (class Meta: type = ...) is now superseded by __init_subclass__ which is simpler and
  doesn''t interfere with other metaclasses. Extraction signal: projects using ABCMeta solely for plugin
  registration could simplify with __init_subclass__. This pattern enables auto-discovery of plugins at
  import time without explicit registration calls.'
- 'Python''s tomllib (stdlib, Python 3.11+) reads TOML files natively. For older versions, tomli (third-party)
  backports it. TOML is preferred over JSON for config files because it supports comments, multiline strings,
  and dates. UNSAID: pyproject.toml uses TOML; reading it from Python code to get project metadata should
  use importlib.metadata (for installed packages) not raw TOML parsing — importlib.metadata.version(''mypackage'')
  is the correct runtime API. Extraction signal: code that reads pyproject.toml with raw file parsing
  to get the version string is fragile and breaks in non-editable installs.'
- 'Python 3.10+ structural pattern matching (match/case) supports four critical pattern types that go
  beyond simple equality: (1) sequence patterns — case [x, y]: matches a two-element list and binds x,
  y; (2) mapping patterns — case {''action'': action, ''value'': v}: matches dict subsets; (3) class patterns
  — case Point(x=0, y=y): matches dataclass/namedtuple structure; (4) OR patterns — case ''a'' | ''b'':
  matches either. Guard clauses add conditions: case x if x > 0. WHY this is powerful: unlike switch/case
  in C/Java, Python''s match performs deep structural decomposition — it replaces long if/elif chains
  over data types (JSON dispatch, command routing, AST traversal). UNSAID: a bare variable name in a case
  clause ALWAYS binds (never compares) — case x matches everything and shadows any existing x. Use dotted
  names (case Status.ACTIVE) or guards (case x if x == STATUS) to compare against existing values.'
- 'Python profiling toolkit: (1) cProfile — call-level profiler, zero external deps, use ''python -m cProfile
  -o output.prof myscript.py'' then pstats to analyze; (2) py-spy — sampling profiler for production,
  attaches to running processes without code changes: ''py-spy record -o profile.svg --pid 12345''; (3)
  pyinstrument — async-aware, presents call-stack as a flame chart, best for FastAPI/Django profiling:
  ''pyinstrument -m pytest tests/''; (4) memray — memory profiler that tracks allocations over time, finds
  leaks. WHY sampling profilers (py-spy) are preferred for production: they introduce <1% overhead and
  don''t require modifying application code, unlike line_profiler which requires decorators. UNSAID: cProfile''s
  cumtime (cumulative time) is misleading for async code because async functions appear slow even when
  they''re just waiting — use pyinstrument for accurate async profiling.'
- 'Python memory optimization techniques: (1) __slots__ on classes eliminates per-instance __dict__, saving
  50-200 bytes per instance — critical at millions of objects; (2) generators vs lists — a generator expression
  uses O(1) memory, a list comprehension uses O(n); (3) array module for homogeneous numeric data instead
  of list[float] — 4-8x smaller; (4) memoryview for zero-copy slicing of bytes/bytearray without allocation;
  (5) weakref.WeakValueDictionary for caches that don''t prevent garbage collection of values. WHY this
  matters for extraction/processing pipelines: loading a 10GB log file with readlines() allocates 10GB
  at once; iterating line by line via the file object uses O(line_size) memory. UNSAID: sys.getsizeof()
  only measures the shallow size of an object — it does NOT include referenced objects. Use tracemalloc
  (stdlib) or memray for accurate memory profiling.'
- 'Python C extension patterns: (1) ctypes — zero compilation, load shared libraries directly: ctypes.CDLL(''libfoo.so'');
  function signatures must be declared manually; (2) cffi — cleaner API than ctypes, used by PyPy; (3)
  Cython — Python-like syntax compiled to C, .pyx files; fastest path for CPU-bound Python code with type
  annotations; (4) pybind11 — C++ bindings, idiomatic C++ interface; (5) mypyc — compiles type-annotated
  Python to C extension via mypy''s type information. WHY extensions exist: Python functions have ~100ns
  overhead per call due to the interpreter; tight loops calling a function millions of times benefit enormously
  from compiled code. UNSAID: the correct pattern is to profile first, identify the hot loop, then wrap
  ONLY that loop in a C extension — not to rewrite entire modules. Extraction signal: projects with .pyx
  files are using Cython for performance-critical paths, indicating the Python-pure version was a bottleneck.'
