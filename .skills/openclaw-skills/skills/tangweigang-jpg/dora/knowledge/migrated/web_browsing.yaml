  pattern: 'HTTP redirect handling is a surprisingly common source of silent data loss in scraping pipelines.
    The failure pattern: a site migrates from HTTP to HTTPS, or restructures its URL scheme, leaving 301
    redirects in place. Libraries like httpx follow redirects by default up to a limit (default 20), but
    if the final destination returns a different schema than expected (e.g., a login page instead of the
    content), the pipeline continues with wrong data. The second failure: some sites use 302 temporary
    redirects to inject CAPTCHA challenges or cookie consent pages — the scraper follows the redirect,
    receives the challenge page HTML, parses it against the content extractor, and returns empty or nonsense
    fields without logging an error. The correct mitigation: always log the final URL after redirect resolution
    and compare it against the expected URL pattern; implement a redirect-chain inspector that flags unexpected
    domain changes (e.g., target.com → accounts.target.com signals a login redirect); never treat a 200
    status code as a guarantee of correct content.'
