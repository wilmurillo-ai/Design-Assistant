constraints:
- 'robots.txt is a legal and ethical constraint that also has practical enforcement consequences. The
  WHY to treat it as a hard constraint rather than a suggestion: the hiQ v. LinkedIn ruling (9th Circuit,
  2022) and subsequent cases have clarified that scraping publicly accessible data is generally permissible,
  but courts have also found that bypassing explicit robots.txt directives can constitute unauthorized
  access under the Computer Fraud and Abuse Act in some jurisdictions. Beyond legal risk, ignoring robots.txt
  Crawl-delay and Disallow directives is the most reliable way to land on a site''s IP block list permanently.
  The practical pattern: parse robots.txt on first visit, cache it with a 24-hour TTL, check every URL
  against Disallow rules before fetching, and respect Crawl-delay as the minimum inter-request delay.
  Python''s urllib.robotparser handles this correctly. Scrapy respects robots.txt by default when ROBOTSTXT_OBEY
  = True.'
- 'Cloudflare''s bot management (formerly Cloudflare Bot Fight Mode, now Turnstile + Bot Management Enterprise)
  operates on a fundamentally different threat model than IP-based blocking, and treating it as an IP
  problem leads to a cat-and-mouse loop that is rarely winnable. The constraint: Cloudflare''s JavaScript
  challenge issues a proof-of-work challenge that runs in the browser for 5 seconds and sends an encrypted
  token back to Cloudflare''s edge. This token is bound to the browser''s TLS fingerprint and canvas fingerprint.
  Rotating IPs does not help because the challenge must be solved fresh for every new browser instance.
  The sustainable approach for scraping Cloudflare-protected sites: use residential proxy networks with
  real browser automation (Playwright with stealth patches) for low-volume needs, or use specialized services
  (Zyte API, ScraperAPI, Oxylabs) that handle Cloudflare bypass at the infrastructure level. Attempting
  to replicate challenge solving in plain HTTP clients is a dead end — the challenge algorithm updates
  weekly.'
- 'XPath expressions are more powerful but more brittle than CSS selectors for web extraction, and the
  choice between them has a non-obvious maintenance implication. XPath allows selecting nodes by text
  content (//div[contains(text(), ''Price'')]), by parent-child position, and by attribute substring matching
  — none of which CSS selectors support. However, XPath path expressions that traverse the full document
  tree (/html/body/div[3]/section/...) are fragile to any DOM restructuring. CSS selectors are shorter,
  faster to evaluate (browser engines optimize them), and the subset that targets semantic attributes
  (data-*, aria-*, itemprop) is far more stable than structural XPath. The practical constraint: use CSS
  selectors as the default; use XPath only for text-content matching (which CSS cannot do) and sibling
  traversal patterns. Never mix XPath absolute paths with CSS — absolute XPath paths are the most fragile
  selector type in existence and break on any layout change.'
- 'Scrapy''s asynchronous architecture (Twisted reactor) makes it incompatible with asyncio-native code
  and standard Python async libraries without adapter layers. The constraint matters in practice when
  integrating Scrapy with asyncio-based libraries (aiohttp, asyncpg, motor for MongoDB) — calling await
  in a Scrapy Spider method raises a RuntimeError unless the spider inherits from scrapy.Spider and the
  method is wrapped with scrapy.utils.defer.deferred_from_coro(). The practical implication: teams that
  adopt Scrapy for production pipelines must either stay within Scrapy''s Twisted ecosystem (use scrapy-splash
  for headless, use scrapy-redis for distributed) or use Scrapy only for HTTP fetching and hand off to
  asyncio workers for downstream processing. Mixing asyncio coroutines directly into Scrapy spiders without
  deferred wrappers produces subtle concurrency bugs where async operations appear to succeed but their
  results are never awaited.'
- 'The single most common Playwright/Puppeteer failure in production is the race between network requests
  and DOM readiness — specifically, calling page.waitForSelector() or reading innerHTML immediately after
  page.goto() before the application''s internal data-fetch XHR calls have completed. The surface symptom
  is inconsistent extraction: the title appears but product prices are missing, or a list renders 0 items
  on some runs. The root cause: SPA frameworks render a skeleton shell synchronously, then populate it
  with data from async API calls. page.waitForLoadState(''load'') or even ''networkidle'' is not reliable
  — ''networkidle'' waits for 500ms of no new requests, but many sites have background polling that prevents
  it from ever triggering. The correct fix is to wait for the specific DOM element that only appears after
  the data is loaded (waitForSelector with a leaf-node selector), or to intercept and await the specific
  XHR response using page.waitForResponse() with a URL pattern match.'
- 'Proxy rotation as a bot evasion strategy fails when implemented as naive IP cycling without fingerprint
  consistency. The trap: modern anti-bot systems (Cloudflare, PerimeterX, Akamai Bot Manager) do not rely
  on IP alone — they correlate TLS fingerprint (JA3/JA4 hash), HTTP/2 frame ordering, browser canvas fingerprint,
  WebGL renderer string, navigator.languages, and timezone against each other. Rotating the IP while keeping
  the same headless browser fingerprint achieves nothing because the non-IP signals create a unique identifier
  that is sticky across IPs. The correct approach requires fingerprint rotation in addition to IP rotation:
  randomizing viewport size, user-agent, language headers, and using stealth plugins (playwright-extra
  with puppeteer-extra-plugin-stealth) that patch the known headless detection surfaces. Even then, sites
  with ML-based bot scoring will fingerprint behavioral patterns (mouse movement entropy, click timing
  distributions) that are hard to spoof.'
- 'JavaScript rendering is not binary — it exists on a spectrum, and misclassifying a site''s rendering
  mode causes systematic extraction failures. The failure taxonomy: (1) Server-side rendered (SSR): full
  HTML in the response body — plain HTTP client works, no JS needed. (2) Static site generation (SSG):
  pre-built HTML files — same as SSR from the scraper''s perspective. (3) Client-side rendered (CSR):
  empty shell + JS bundle — requires headless browser. (4) Hybrid/Next.js ISR: some routes SSR, some CSR
  — the same domain may require different strategies per URL path. The diagnostic trap: checking the homepage
  only. Many sites SSR the landing page for SEO but CSR product detail pages or user dashboards. The correct
  diagnostic is to curl the exact URL you need to scrape and check whether the target data appears in
  the raw HTML. Running curl -s URL | grep ''target-text'' is the 30-second test that prevents hours of
  unnecessary Playwright infrastructure setup.'
- 'BeautifulSoup''s lxml parser and html.parser produce different parse trees for malformed HTML, and
  choosing the wrong one causes silent data loss. The failure: html.parser is Python''s built-in and requires
  no installation, so it is the default in many tutorials. However, lxml uses libxml2''s error-correction
  heuristics which more closely match browser behavior — for real-world malformed HTML (unclosed tags,
  nested tables, invalid nesting), lxml produces the DOM structure you see in the browser''s Inspector,
  while html.parser may collapse or restructure it differently. The practical consequence: a CSS selector
  that works when you inspect the page in Chrome fails when applied to BeautifulSoup''s html.parser tree
  because the trees differ. The correct default is BeautifulSoup(html, ''lxml'') for any scraping work
  on real sites. Use html.parser only when lxml is unavailable and you have verified the target HTML is
  well-formed.'
- 'Async concurrency in Python web scraping with asyncio + aiohttp produces a common failure mode: uncapped
  semaphore concurrency causes connection pool exhaustion or per-domain rate limiting even when the code
  ''looks'' throttled. The trap: beginners create asyncio.gather() with 100 coroutines thinking that ''async''
  means they won''t hammer the server simultaneously. In fact, asyncio.gather() with 100 coroutines issues
  all 100 requests as fast as the event loop can schedule them — there is no implicit throttling. The
  correct pattern requires an explicit asyncio.Semaphore(N) where N is your desired per-domain concurrency
  cap, and all fetch coroutines must acquire the semaphore before making the request. Additionally, aiohttp''s
  TCPConnector must be shared across all requests (not created per-request) and given a matching limit
  parameter — creating a new connector per request bypasses the connection pool entirely, defeating keep-alive
  and creating thousands of TCP connections.'
- 'Storing raw HTML in a database as the scraping record is a deceptively poor archiving strategy that
  creates significant operational problems. The failure modes: (1) Storage cost — a single SPA page with
  inlined JavaScript can be 2–5 MB of raw HTML, making it 100x larger than the extracted structured data.
  (2) Re-extraction fragility — re-parsing stored HTML with a new extractor assumes the extractor logic
  is compatible with the DOM structure of the HTML as it existed at crawl time, which is only true if
  extraction was deterministic. (3) GDPR and legal compliance — storing full page HTML may capture personal
  data (user-generated content, profile information) that was not the extraction target, creating unnecessary
  data retention liability. The correct archival pattern: store the structured extracted data as the primary
  record; store a content hash (SHA-256 of the normalized HTML) for change detection; store raw HTML only
  in a cold archive (S3 Glacier, object storage with lifecycle policies) with a 90-day TTL, not in the
  operational database.'
- 'HTTP redirect handling is a surprisingly common source of silent data loss in scraping pipelines. The
  failure pattern: a site migrates from HTTP to HTTPS, or restructures its URL scheme, leaving 301 redirects
  in place. Libraries like httpx follow redirects by default up to a limit (default 20), but if the final
  destination returns a different schema than expected (e.g., a login page instead of the content), the
  pipeline continues with wrong data. The second failure: some sites use 302 temporary redirects to inject
  CAPTCHA challenges or cookie consent pages — the scraper follows the redirect, receives the challenge
  page HTML, parses it against the content extractor, and returns empty or nonsense fields without logging
  an error. The correct mitigation: always log the final URL after redirect resolution and compare it
  against the expected URL pattern; implement a redirect-chain inspector that flags unexpected domain
  changes (e.g., target.com → accounts.target.com signals a login redirect); never treat a 200 status
  code as a guarantee of correct content.'
- 'User-agent string spoofing is necessary but insufficient for bot evasion, and treating it as sufficient
  is the most common beginner mistake that leads to immediate blocking. The failure: setting a realistic
  Chrome user-agent string in a plain requests session changes one HTTP header while leaving dozens of
  bot-revealing signals untouched: the TLS handshake has a Python ssl fingerprint (not a Chrome fingerprint),
  the Accept-Language header is missing or wrong, there is no Sec-CH-UA client hint header, and there
  are no browser-generated headers like Upgrade-Insecure-Requests, Sec-Fetch-Site, Sec-Fetch-Mode, or
  Sec-Fetch-Dest. Modern anti-bot systems score the full header set — missing any of the 8–12 headers
  that Chrome sends by default immediately raises the bot score. The correct approach for plain HTTP (non-headless)
  scraping: use curl_cffi (Python binding for curl with browser TLS fingerprinting) or httpx with a realistic
  header set copied from a browser''s Network tab, including all Sec-* headers in the correct order.'
- 'Encoding detection is the invisible bug that corrupts non-ASCII content in web scraping at a rate that
  only surfaces in production with international sites. The failure chain: HTTP response declares charset=utf-8
  in the Content-Type header, but the actual bytes are Windows-1252 or ISO-8859-1 — a common legacy pattern
  on European e-commerce sites. Python''s requests library uses the Content-Type charset declaration directly
  without verification, so response.text returns mojibake (e.g., ''café'' becomes ''cafÃ©''). The same
  bug occurs when the HTTP header charset is absent and requests defaults to ISO-8859-1 per HTTP/1.1 spec,
  but the actual encoding is UTF-8. The correct fix: use response.content (raw bytes) and decode with
  chardet or charset_normalizer to detect the actual encoding empirically — charset_normalizer is the
  modern replacement for chardet and is already a dependency of requests. The Playwright equivalent: page.content()
  always returns a Python string with correct decoding because the browser handles encoding detection
  natively.'
- 'Headless browsers (Playwright, Puppeteer) exist because the web has fundamentally split into two rendering
  models: static HTML served by the server, and JavaScript-rendered HTML assembled in the client. For
  roughly 60% of modern web applications, the HTTP response body contains an empty skeleton and a JS bundle
  — the actual content is painted only after dozens of fetch/XHR calls complete. This means traditional
  HTTP clients (requests, httpx, curl) see nothing useful. The WHY headless browsers exist: they ship
  a real browser engine (Chromium/WebKit/Firefox) that executes all JavaScript, fires all network calls,
  and hands you the final DOM after the rendering pipeline finishes. The cost is 10–100x more memory and
  latency versus a plain HTTP request, which is why the decision ''API vs headless'' is the most important
  call in any scraping architecture — use headless only when the target genuinely requires JS execution,
  not as a default.'
- 'The API-vs-scraping decision is the single highest-leverage architectural choice in information extraction
  work, and it is almost always worth 30 minutes of research before writing a single line of scraping
  code. The reasoning: a public or unofficial JSON API returns structured, stable, machine-readable data
  with no DOM fragility; scraping HTML is inherently brittle because CSS selectors and DOM structure change
  frequently without warning. The hidden signal: most popular consumer sites (Twitter/X, Reddit, LinkedIn,
  Instagram, Amazon product pages) expose unofficial internal APIs that browsers call via XHR — these
  can often be reverse-engineered from the browser Network tab and called directly, bypassing HTML parsing
  entirely. The WHY to prefer APIs: they are 10–100x faster, require no JavaScript rendering, and produce
  cleaner data. Scraping should be a last resort when no API exists and the data has clear business value.'
- 'Rate limiting and politeness are not merely ethical — they are the primary mechanism by which scraping
  systems achieve long-term operational stability. Sites that detect aggressive crawling deploy IP bans,
  CAPTCHA walls, and honeypot traps. The WHY behind politeness: human browsing generates requests in the
  1–5 second range with natural jitter; automated crawlers making sub-second requests immediately stand
  out in server access logs. The correct mental model is to treat every site as a shared resource and
  every crawl as a sustained relationship: respecting robots.txt, honoring Crawl-delay directives, and
  adding randomized delays (uniform random between 2–8 seconds is a common baseline) dramatically extends
  how long a crawler can run before triggering countermeasures. Concurrency caps (1–3 concurrent requests
  per domain) are equally important — parallel bursts of 50 requests are detectable in milliseconds even
  with IP rotation.'
- 'Content change detection and monitoring is fundamentally a diffing problem, not a scraping problem.
  The architectural insight: you do not need to re-extract all structured data from a page to detect that
  something changed — hashing the raw response body (or a canonical normalized form) is orders of magnitude
  cheaper. The WHY to separate ''has it changed?'' from ''what changed?'': most pages on a monitoring
  list change infrequently. Running full extraction on every poll cycle wastes CPU and API quota. The
  correct pattern is a two-phase pipeline — Phase 1 fetches and hashes (cheap, runs frequently), Phase
  2 performs full extraction only on hash mismatch (expensive, runs rarely). For HTML pages, normalizing
  before hashing (stripping timestamps, ad slots, session tokens, CSRF tokens) prevents false positives
  from dynamic content injected on every page load.'
- 'Session management in web scraping is the discipline of maintaining authenticated state across requests
  — cookies, localStorage, sessionStorage, and sometimes in-memory JS state. The WHY it matters: logged-in
  scraping unlocks dramatically more data (paywalled content, personalized feeds, account-specific pages)
  and sidesteps many bot detection layers that are only active for anonymous traffic. The core principle:
  treat the browser session as a first-class resource to be serialized, stored, and restored rather than
  re-created on every run. Playwright''s storageState API serializes all cookies and localStorage to a
  JSON file that can be reloaded in seconds. The failure mode is treating session reuse as a security
  shortcut — sessions expire, get invalidated server-side, or get flagged for reuse from a different IP.
  A robust session manager tracks expiry, proactively refreshes before staleness, and detects login-wall
  redirect patterns to trigger re-authentication.'
- 'Playwright''s route interception API (page.route() / context.route()) is one of the most powerful and
  underused capabilities for efficient scraping. The WHY it matters: in a typical SPA load, 30–70% of
  network bytes are images, fonts, analytics scripts, and ad trackers that are irrelevant to data extraction.
  Blocking these with route interception reduces page load time by 40–80% and eliminates the ''network
  activity keeps the networkidle state from triggering'' problem. The pattern: intercept requests matching
  resource types [''image'', ''font'', ''media'', ''stylesheet''] and abort them; intercept analytics
  domains (google-analytics.com, doubleclick.net) and abort. Additionally, route interception enables
  request rewriting (injecting auth headers, replacing API hostnames) and response mocking for testing
  — making it a single API that serves both production efficiency and test isolation.'
- 'The correct pagination handling pattern for web scraping has three distinct strategies depending on
  how the site implements pagination, and mixing them up is the second most common data-completeness bug
  after race conditions. Strategy 1 — URL parameter pagination (e.g., ?page=2): enumerate pages until
  a 404 or empty result set; use a seen-URL set to prevent infinite loops on malformed sites. Strategy
  2 — cursor/token pagination (next_cursor in JSON API response, or a ''next page'' link in HTML): always
  follow the cursor from the response rather than constructing URLs, because cursors encode server-side
  state that URL construction cannot replicate. Strategy 3 — infinite scroll (Intersection Observer /
  scroll-triggered XHR): requires headless browser with programmatic scrolling (page.evaluate(''window.scrollTo(0,
  document.body.scrollHeight)'')) and waiting for new content to appear after each scroll event. The failure
  mode that produces partial data silently: treating all pagination as Type 1 and constructing page URLs
  when the site uses Type 2 cursor logic — pages 1–10 fetch correctly, but duplicates and gaps appear
  beyond page 10 when the server''s cursor order diverges from integer page order.'
- 'Playwright''s browser context isolation model enables safe parallel scraping without session cross-contamination.
  The critical distinction that most tutorials miss: a Browser is the OS process; a BrowserContext is
  an isolated profile (separate cookies, localStorage, permissions, certificates); a Page is a tab within
  a context. The WHY to use one context per scraping task rather than one context for all tasks: shared
  contexts share cookies — if one task scrapes a logged-in session and another scrapes anonymously in
  the same context, the anonymous task will silently receive the authenticated session''s data, producing
  data integrity issues that are hard to debug. The correct pattern for parallel scraping: create one
  BrowserContext per worker using browser.new_context(storage_state=...) with appropriate storageState
  loaded, run all pages for that worker in that context, then close the context when done. This also prevents
  cookie pollution between targets when scraping multiple domains in parallel.'
- 'The correct architecture for a production web monitoring system separates four concerns that beginners
  collapse into one script: (1) URL discovery — maintaining a live list of URLs to monitor, adding/removing
  based on business rules; (2) fetching — rate-limited, retry-aware HTTP or headless retrieval with proxy
  rotation; (3) change detection — fast hash comparison against stored baseline to filter unchanged pages;
  (4) extraction — running structured extractors only on changed pages. The WHY to separate these: each
  layer has different resource needs (fetching is I/O-bound, extraction is CPU-bound), different failure
  modes, and different retry logic. Collapsing them into a single function means a transient fetch error
  causes re-extraction of unchanged data, and a slow extraction pipeline blocks timely fetching of newly
  changed pages. The orchestration pattern is a work queue (Celery, Redis Queue, or even a SQLite-backed
  queue) where each stage enqueues work for the next stage, allowing independent scaling and retry without
  reprocessing.'
- 'Tavily Search API is purpose-built for LLM agent web search and returns clean, token-efficient results
  by default. The interface contract that distinguishes it from raw search APIs: Tavily strips ads, navigation,
  and boilerplate from result pages and returns markdown-clean content in the ''content'' field (truncated
  at ~200 chars) or full page content in ''raw_content'' when include_raw_content=True. The search_depth
  parameter is the primary cost/quality dial: ''basic'' runs one search round (1 API credit), ''advanced''
  runs sub-queries and synthesizes a better answer (2 API credits). The include_answer field triggers
  Tavily''s own summarization, which returns a single-sentence answer suitable for direct injection into
  an agent''s context without RAG retrieval. Critical interface note: Tavily''s max_results caps at 20;
  the default is 5. For monitoring or bulk URL extraction tasks, include_domains and exclude_domains allow
  whitelist/blacklist filtering that is more reliable than post-filtering in the agent.'
- 'The extract-transform-load (ETL) mental model maps poorly to web scraping and should be replaced with
  the crawl-parse-validate-store (CPVS) pattern. The WHY: ETL assumes clean, schema-consistent source
  data. Web pages violate this assumption constantly — missing fields, inconsistent date formats, price
  strings with non-numeric characters, truncated content, and structural variations between paginated
  items. The CPVS pattern introduces a validation stage between parsing and storage that (a) logs schema
  violations rather than silently dropping records, (b) applies normalization transforms (parse price
  strings to float, normalize date strings to ISO 8601, strip HTML entities), and (c) routes ambiguous
  records to a manual review queue rather than discarding them. The practical implementation: Pydantic
  models with custom validators are ideal for the validation stage — model_validate() will raise ValidationError
  with field-level detail on malformed records, and a try/except block routes failures to a dead-letter
  log without stopping the pipeline.'
- 'Scrapy''s built-in middlewares (AutoThrottle, HttpCache, RetryMiddleware) provide production-grade
  scraping infrastructure that most custom implementations re-invent poorly. AutoThrottle dynamically
  adjusts request delay based on server response latency — if the server starts slowing down (a signal
  of load), AutoThrottle backs off automatically without configuration. HttpCache stores responses locally
  with configurable TTL, enabling near-instant re-runs during development and incremental crawls that
  only fetch new content. RetryMiddleware handles transient HTTP errors (500, 503, connection timeouts)
  with exponential backoff by default. The WHY to use Scrapy for production scraping pipelines rather
  than raw aiohttp or httpx: these middleware behaviors are battle-tested across millions of scraping
  runs and handle edge cases (redirect loops, gzip encoding errors, encoding detection) that custom implementations
  miss. The practical onboarding path: start with Scrapy even for simple one-off scripts; the overhead
  of defining a Spider class pays off in the first time a production error reveals a gap in custom retry
  logic.'
- 'Playwright''s CDP (Chrome DevTools Protocol) integration via page.context.new_cdp_session() unlocks
  capabilities not exposed in the Playwright API: intercepting WebSocket frames, reading IndexedDB, capturing
  performance timeline data, and accessing the raw network HAR. For scraping use cases, the most valuable
  CDP capability is network event interception at a lower level than page.route() — specifically, Network.requestWillBeSent
  and Network.responseReceived events allow building a full request waterfall log that identifies which
  XHR call carries the target data. This replaces the need for manual browser inspection during selector
  discovery: run the page with CDP logging, filter network events for responses with status 200 and content-type
  application/json, inspect the response bodies, and the API endpoint delivering the data becomes immediately
  obvious. This turns ''reverse engineer the API'' from a manual 20-minute task into a 2-minute automated
  one.'
- 'ByteRover''s browser relay API exposes a managed headless browser pool with a REST interface, removing
  the need to manage Playwright infrastructure. The key interface contract: POST /browse with a URL and
  optional actions array (click, type, scroll, wait_for_selector) returns rendered HTML and optional screenshot
  after executing the action sequence. The WHY ByteRover exists in the market: managing Playwright at
  scale requires dealing with browser crashes, memory leaks, chromium updates, and infrastructure provisioning
  — ByteRover commoditizes this. The integration pattern for agentic use: the actions parameter enables
  multi-step form interactions (login, search, filter) that previously required stateful browser session
  management. Rate limit: the default tier allows 60 requests/minute; the response includes a remaining-credits
  header for quota tracking. Critical constraint: rendered HTML is returned after action completion, not
  after all network requests settle — for SPAs, add a wait_for_selector action targeting a content-loaded
  indicator to ensure the DOM is fully populated before HTML capture.'
