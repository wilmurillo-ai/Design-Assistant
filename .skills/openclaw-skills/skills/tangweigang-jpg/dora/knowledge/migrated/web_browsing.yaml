    logic is compatible with the DOM structure of the HTML as it existed at crawl time, which is only
    true if extraction was deterministic. (3) GDPR and legal compliance — storing full page HTML may capture
    personal data (user-generated content, profile information) that was not the extraction target, creating
    unnecessary data retention liability. The correct archival pattern: store the structured extracted
    data as the primary record; store a content hash (SHA-256 of the normalized HTML) for change detection;
    store raw HTML only in a cold archive (S3 Glacier, object storage with lifecycle policies) with a
