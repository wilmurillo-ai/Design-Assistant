constraints:
- 'LangGraph''s state serialization for checkpointing requires that all values in the state TypedDict
  be JSON-serializable by the checkpointer''s serializer. The default serializer uses Python''s pickle
  (for MemorySaver) or JSON (for SqliteSaver/PostgresSaver). Objects that pickle but do not JSON-serialize
  — including Pydantic models, numpy arrays, bytes objects, and most LangChain message types — cause silent
  serialization errors with SqliteSaver that surface as ''Object of type X is not JSON serializable''.
  The fix depends on the checkpointer: (1) for SqliteSaver, override the serde (serializer/deserializer)
  parameter with a custom encoder; (2) for PostgresSaver, use the default msgpack serializer which handles
  most Python types; (3) redesign state to store JSON-native types (dicts, lists, strings) and reconstruct
  complex objects in node code. Choosing a checkpointer before finalizing state schema avoids serialization
  rewrites late in development.'
- 'A frequent confusion: MessageGraph is a convenience subclass of StateGraph that hardcodes state to
  a list of messages with an append reducer. Developers coming from simple chatbot examples then try to
  store arbitrary structured state (tool results, counters, flags) inside MessageGraph and hit AttributeError
  or silent data loss because non-message fields are stripped. The fix is to always use StateGraph with
  an explicit TypedDict schema unless the application is truly a pure message-passing chain. MessageGraph''s
  convenience is also its constraint.'
- 'Streaming in multi-agent LangGraph graphs has non-obvious failure modes. When a subgraph is invoked
  as a node, its internal token stream is swallowed by default — only the final node output surfaces to
  the outer graph''s stream. To propagate inner streams you must pass subgraph=True to stream() or use
  the streaming_mode=''messages'' option introduced in 0.2.x. A second trap: streaming and interrupts
  interact poorly when an interrupt fires mid-stream; buffered tokens before the interrupt point are lost
  unless the caller explicitly handles the interrupt exception and re-attaches to the resumed stream.
  Both issues have caused production chatbots to silently drop partial outputs.'
- In LangGraph versions before 0.2, checkpoints were addressed by thread_id + thread_ts (a timestamp string).
  The 0.2.x release replaced thread_ts with checkpoint_id (a UUID). Code that passes thread_ts to get_state(),
  update_state(), or stream() will silently receive the latest checkpoint instead of the intended historical
  one — no error is raised, but the wrong state is loaded. This silent regression has caused replay-debugging
  workflows to produce incorrect results. Migration requires replacing all thread_ts keyword arguments
  with checkpoint_id and regenerating stored checkpoint references.
- 'LangGraph''s interrupt_before and interrupt_after parameters on compile() or stream() pause execution
  before or after specific nodes and raise an Interrupt exception. The critical failure mode: when an
  interrupt fires inside a subgraph that was invoked as a node in an outer graph, the Interrupt propagates
  up through the outer graph''s exception handling and is re-raised as a generic exception — not as an
  Interrupt — if the outer graph''s checkpointer is not configured to handle subgraph interrupts. This
  causes human-in-the-loop workflows with nested graphs to silently swallow interrupts or crash rather
  than pause correctly. The fix is to ensure the outer graph''s compile() also includes the same checkpointer
  as the subgraph, and to test interrupt propagation explicitly in nested graph configurations before
  deploying HITL workflows.'
- 'LangGraph''s PostgresSaver checkpointer requires the psycopg package (not psycopg2) and specifically
  needs connection pool support via PostgresSaver.from_conn_string(). A common failure is passing a plain
  psycopg connection object instead of a pool, which causes serialization errors under concurrent thread
  access because psycopg connections are not thread-safe. Under FastAPI with multiple workers, this produces
  intermittent ''ProgrammingError: connection already closed'' errors that are difficult to reproduce
  in development. The correct pattern is to initialize the PostgresSaver with an AsyncConnectionPool for
  async FastAPI applications or a ConnectionPool for sync applications, and to configure pool size to
  match expected concurrent graph executions, not HTTP workers.'
- 'LangGraph''s get_state() returns a StateSnapshot containing the state at the latest checkpoint for
  a given thread. A common failure in time-travel debugging: calling get_state(config) without specifying
  a checkpoint_id always returns the LATEST state, not the state at a specific historical point. To retrieve
  historical state for replay, you must call get_state_history() which returns an iterator of StateSnapshot
  objects ordered newest-first, then select the desired snapshot by checkpoint_id. Developers who call
  get_state() in a loop expecting to replay execution step-by-step instead see the same final state repeated.
  The correct replay pattern is: (1) call get_state_history() to list snapshots, (2) select the target
  checkpoint, (3) call invoke() or stream() with config={''configurable'': {''thread_id'': ..., ''checkpoint_id'':
  <target>}} to replay from that point.'
- 'LangGraph models agent orchestration as an explicit directed graph where nodes are computation units
  and edges are conditional transitions. This deliberate choice separates control flow from computation:
  the graph topology encodes WHEN logic runs, while node functions encode WHAT runs. The payoff is that
  complex multi-step agent behavior — retries, branching, human-in-the-loop pauses — becomes inspectable
  and debuggable as a static structure rather than implicit call-stack recursion. The tradeoff is upfront
  verbosity: simple chains that never branch do not benefit from the graph formalism and are better served
  by plain LCEL.'
- LangGraph's checkpointer is not a logging layer — it is the persistence primitive that makes stateful,
  resumable execution possible. Every graph invocation is associated with a thread_id; after each node
  completes the full state snapshot is serialized and stored. On failure or human interrupt the graph
  resumes from the latest checkpoint rather than from scratch. The architectural implication is that checkpointer
  choice (MemorySaver for dev, SqliteSaver/PostgresSaver for prod) is a deployment decision, not a debugging
  convenience. Omitting a checkpointer silently disables persistence and interrupt support, which is a
  common misconfiguration.
- LangGraph permits cycles (e.g. agent → tool → agent) but guards against infinite loops via a recursion_limit
  parameter (default 25 steps). When the limit is hit LangGraph raises GraphRecursionError. This limit
  counts superstep transitions, not LLM calls — one superstep may execute multiple nodes in parallel.
  The correct response to a GraphRecursionError in production is almost never to raise the limit blindly;
  it is to inspect whether the agent is trapped in a retry loop due to a tool error or a prompt that never
  produces a terminal condition. The limit is a circuit breaker, not a configuration knob.
- 'LangGraph''s Send() primitive enables dynamic fan-out: instead of defining edges statically, a conditional
  edge function can return a list of Send objects, each targeting a specific node with a specific payload.
  This is the correct pattern for map-reduce workflows where the number of parallel branches is not known
  at graph design time — for example, splitting a document into chunks and processing each chunk in parallel.
  The architectural distinction from static parallel edges: Send() creates separate state copies per branch
  that are merged back via reducers after all branches complete, while static parallel edges to the same
  node share state and require careful reducer design to avoid conflicts. Send() is also the mechanism
  for spawning subgraph instances dynamically, making it the foundation for agent swarms where a single
  coordinator node spawns variable numbers of worker agents.'
- 'LangGraph Cloud (hosted LangGraph Platform) and LangGraph OSS are architecturally different beyond
  hosting: LangGraph Cloud adds a built-in task queue, cron scheduling, streaming over Server-Sent Events,
  and a web-based Studio UI for visualizing graph execution. The most operationally significant addition
  is the background task queue: it enables fire-and-forget graph invocations where the client submits
  a run and polls for results, rather than holding an open connection. This enables long-running agent
  workflows (minutes to hours) that would time out over a synchronous HTTP connection. For self-hosted
  deployments requiring the same capability, the LangGraph Platform self-hosted Docker image provides
  the same queue infrastructure. Teams building asynchronous agent APIs should use LangGraph Platform
  rather than building their own queue infrastructure around the OSS library.'
