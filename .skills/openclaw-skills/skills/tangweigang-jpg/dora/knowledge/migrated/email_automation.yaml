constraints:
- 'Do not use keyword-based spam detection as the primary spam filter for an email automation system,
  because it fails against modern spam in both directions: it produces high false positives on legitimate
  transactional email (order confirmations, shipping notices contain words like ''free'', ''limited time'')
  and false negatives on sophisticated phishing that uses clean language with malicious links. The root
  cause is that keyword matching captures surface form, not intent or context. The correct approach is
  layered defense: (1) check sender reputation via SPF/DKIM/DMARC validation first — unauthenticated email
  from domains with published records is high-confidence spam; (2) use a pre-trained spam classification
  model (SpamAssassin, or an LLM-based classifier) for content analysis; (3) apply custom rules only as
  a post-filter for domain-specific patterns. The UNSAID cost of false positives in automation: when a
  legitimate email is classified as spam, the entire downstream automation chain silently skips it — there
  is no user who notices. Spam misclassification in automated pipelines requires an explicit quarantine
  queue with periodic human review, not silent discard.'
- 'Do not implement follow-up tracking by polling the sent folder for replies, because this approach silently
  fails in three common scenarios: (1) the recipient replies from a different email address than the one
  you sent to; (2) the reply is forwarded to you through a third party and lands in a different thread;
  (3) the recipient calls you instead of replying. The correct follow-up tracking system uses a multi-signal
  approach: thread-level reply detection (check if message count in the thread has increased since the
  sent message), plus a configurable escalation path for non-reply follow-ups. For high-stakes follow-ups
  (contracts, proposals), the automation must generate a follow-up draft at T+3 days and surface it for
  human approval rather than auto-sending — unsolicited follow-up emails from automation systems have
  high unsubscribe and spam-report rates that damage domain reputation. Track follow-up state in a local
  database with (thread_id, sent_at, due_follow_up_at, status) rather than relying on email labels alone,
  because label state can drift if the email is manually managed.'
- 'Do not use SMTP for sending bulk automated emails (newsletters, campaign emails, batch notifications)
  through a standard business email account because: (1) ISPs apply strict sending limits — Gmail allows
  500 emails/day for consumer, 2,000/day for Workspace; Outlook limits per-minute send rates even on enterprise
  plans; (2) bulk sending from a shared business domain will trigger spam reputation damage that affects
  ALL email from that domain, including transactional and sales emails; (3) deliverability metadata (List-Unsubscribe
  headers, DKIM alignment for bulk senders, FBL registration) are not handled by raw SMTP. The correct
  architecture separates transactional email (use the mail API with your domain) from bulk/marketing email
  (use a dedicated service like SendGrid, Mailgun, or Amazon SES with a separate sending domain and subdomain).
  Never send bulk email from the same domain used for executive communications — a single spam complaint
  wave can blacklist the entire domain including outbound sales emails.'
- 'Do not rely on ''Delivered-To'' header or the SMTP RCPT TO address to determine which of the user''s
  email addresses received a message, because Gmail silently rewrites these for alias addresses. If a
  user has aliases (e.g., user@company.com and john@company.com both deliver to the same inbox), the ''To''
  header will show the original address the sender used but the Gmail API message object''s ''labelIds''
  will not distinguish them. This causes automation that routes emails based on the receiving alias to
  fail silently — all emails end up in the same bucket regardless of which alias was targeted. The correct
  approach: use the Gmail API''s ''users.settings.sendAs'' endpoint to fetch all send-as aliases, then
  match them against the ''Delivered-To'' header (which Gmail does preserve per alias). For Outlook, the
  equivalent is to check ''X-MS-Exchange-Organization-Recipient-P2-Type'' or use the Microsoft Graph ''toRecipients''
  field on the message resource. Test alias routing explicitly during integration testing — it is not
  testable without a real mailbox.'
- 'Do not build email classification models by fine-tuning on a single user''s inbox without stratified
  sampling across time, because email distributions shift dramatically over months and years (a startup''s
  email in year 1 is mostly fundraising; in year 3 it is mostly operations). A model trained on recent
  data will perform poorly on email patterns that are now rare but will recur cyclically (annual reviews,
  quarterly reports, seasonal campaigns). The correct training data strategy is: (1) sample uniformly
  across at least 12 months of history; (2) oversample underrepresented categories (if ''legal'' emails
  are 2% of inbox, oversample to 15% of training data); (3) hold out the most recent 2 months as the evaluation
  set — not a random 20% split — because chronological holdout better simulates production conditions.
  Retrain monthly with a sliding 18-month window rather than accumulating all historical data indefinitely,
  because very old email patterns (pre-COVID travel booking patterns, for example) will degrade current
  accuracy.'
- 'Do not store email content in plaintext in the automation system''s database, because email inherently
  contains sensitive personal data (PII, financial information, health data, legal communications) that
  is subject to GDPR, HIPAA, and other regulations. The storage requirement creates liability even if
  the system never exposes the data — a database breach exposes all historical email content. The correct
  pattern is to store only metadata and extracted structured fields (sender, timestamp, classification
  labels, extracted action items) in the database, and reference the canonical email via its message ID
  (which allows re-fetching from the mail server when needed for reprocessing). For systems that must
  cache email content for performance, encrypt at the field level using the user''s own encryption key
  (envelope encryption pattern: user key encrypts a data encryption key, data encryption key encrypts
  the content). This also enables right-to-deletion compliance: deleting the user''s key cryptographically
  erases all their stored email content without requiring a database sweep.'
- 'Do not use the Gmail API''s ''q'' (query) parameter as the primary search mechanism for finding emails
  to process in a batch automation job, because the query engine uses Gmail''s full-text search index
  which has up to 30-second staleness for newly received emails. This creates a race condition where a
  Pub/Sub notification arrives, the automation triggers a search query for ''is:unread'', and the newly
  arrived email is not yet in the search index — the email is missed until the next polling cycle. The
  correct approach: when triggered by a push notification, use the historyId from the notification to
  call users.history.list() — this returns the exact set of message IDs that changed since the last known
  historyId, with zero staleness, because history is an append-only log. Store the last processed historyId
  persistently (not in memory) so that a worker restart does not cause missed events. Process messages
  by ID (users.messages.get) rather than by search query.'
- 'OAuth2 for Gmail and Outlook is not merely an authentication upgrade from password-based access — it
  is the only operationally viable approach because application passwords are being deprecated across
  enterprise tenants (Google Workspace enforces this for all accounts with 2FA; Microsoft 365 disables
  Basic Auth for Exchange Online since October 2022). The WHY this matters beyond compliance: OAuth2 tokens
  are scoped, rotatable, and auditable. For email automation, the minimum viable scope is read + send
  (Gmail: gmail.readonly + gmail.send, or gmail.modify if labels are needed); requesting full gmail scope
  is a security antipattern that creates excessive access and fails enterprise security reviews. Access
  tokens expire in 1 hour; agents must implement token refresh logic using the refresh token without user
  interaction. Store refresh tokens encrypted at rest — they are equivalent to long-lived credentials.
  For Outlook/O365, use MSAL (Microsoft Authentication Library) rather than raw OAuth2 endpoints to handle
  tenant-specific authority URLs correctly.'
- 'Auto-reply drafting for email agents requires a two-stage architecture: intent classification followed
  by template-aware generation. Skipping intent classification and passing every email directly to an
  LLM for reply generation is expensive and inconsistent — the LLM will hallucinate commitments, pricing,
  and timelines without constraints. The correct pattern is: (1) classify the email intent (inquiry, complaint,
  meeting request, support ticket, etc.); (2) retrieve the relevant policy template or knowledge base
  snippet for that intent; (3) generate the reply with the template as a system constraint and the original
  email as context. This approach reduces LLM token usage by 40–60% (templates are shorter than full context)
  and dramatically reduces hallucination because the model is completing a constrained template rather
  than generating freely. For enterprise deployments, all auto-replies must go through a human-in-the-loop
  approval queue for the first 500 instances of each intent category before being set to fully automatic
  — this catches systematic errors before they reach customers at scale.'
- 'Email thread summarization for long chains (>10 messages) must use a sliding window or map-reduce approach
  rather than naive full-context summarization, because most LLMs have context windows that cannot reliably
  handle 50+ message threads, and even when they fit, earlier context is deprioritized (the ''lost in
  the middle'' problem documented in Liu et al. 2023). The correct approach: (1) chunk the thread into
  5-message windows with 1-message overlap; (2) summarize each window independently; (3) summarize the
  summaries with explicit instructions to preserve the most recent decision and the outstanding action
  items. The WHY overlap matters: email threads often have a decision at message 8 that is referenced
  again at message 14 — without overlap, the reference at message 14 appears unexplained. For AI agents
  that use thread summaries as input for action generation, the summary must always include the LAST MESSAGE
  in full — never summarize the most recent message, because it contains the triggering intent for the
  agent''s action.'
- 'Gmail label management via the API requires understanding that labels in Gmail are applied at the message
  level and the thread level independently, which creates a subtle bug in automation systems that assume
  thread-level operations. When you add a label to a thread via threads.modify, it applies to all existing
  messages in that thread but NOT to future messages added to the thread — new messages inherit only the
  INBOX and UNREAD labels by default. This means an automation that labels ''waiting-for-reply'' will
  silently miss the reply when it arrives unless you also set up a filter rule via the Gmail Filters API
  or poll the thread for new messages. For Outlook, the equivalent behavior differs: categories applied
  to a conversation via the Graph API do propagate to new items by default (controlled by the AlwaysShowItemCategories
  property). Always test label/category propagation behavior against your specific provider before deploying
  automation that depends on persistent thread labeling.'
- 'IMAP IDLE is the correct mechanism for near-real-time email monitoring instead of polling because polling
  at 1-minute intervals generates 1,440 API calls per day per mailbox — which hits Gmail''s daily quota
  (1 billion units/day across all users, but per-user throttling applies) and creates unnecessary load.
  IMAP IDLE holds a persistent TCP connection open and receives a server push notification when a new
  message arrives, typically within 2–5 seconds. The implementation caveat: IMAP IDLE connections must
  be recycled every 29 minutes per RFC 2177 (servers are allowed to terminate IDLE after 30 minutes),
  and network interruptions require reconnect-with-backoff logic. For Gmail specifically, IDLE is available
  on imap.gmail.com:993 with SSL, but the Gmail REST API''s push notifications (Pub/Sub via Cloud Pub/Sub)
  are preferred for production systems because they are stateless, horizontally scalable, and survive
  application restarts without missing events. IMAP IDLE is simpler for single-instance deployments; Pub/Sub
  is the right choice once you have multiple workers.'
- Bulk email operations via the Gmail API must use batch requests rather than individual API calls because
  each individual API call counts against the per-user rate limit (250 quota units/second for Gmail API).
  The Gmail batch endpoint (https://www.googleapis.com/batch/gmail/v1) accepts up to 100 sub-requests
  per batch, and a single batch counts as one quota unit for rate-limiting purposes. For operations like
  bulk-labeling or bulk-archiving 1,000 messages, a naive loop of 1,000 individual calls will be throttled
  after ~2 seconds; the same operation as 10 batch requests of 100 each completes without throttling.
  The Python implementation uses google-api-python-client's BatchHttpRequest class. For Microsoft Graph
  API (Outlook), the equivalent is the $batch endpoint with a limit of 20 requests per batch. Always implement
  exponential backoff even for batch requests — a single 429 response means the entire batch failed and
  must be retried with backoff, not individual sub-requests.
- Email spam detection in automation pipelines must validate the SPF, DKIM, and DMARC authentication chain
  as the first filter stage, before any content analysis, because authentication failure is a near-perfect
  predictor of malicious email and is computationally cheap. SPF checks the sending server IP against
  the domain's DNS SPF record; DKIM validates a cryptographic signature in the email header against a
  public key in DNS; DMARC enforces an alignment policy (both SPF and DKIM must align with the From domain).
  In Gmail API responses, the 'Authentication-Results' header contains pre-computed SPF/DKIM/DMARC results
  — parse these directly rather than re-computing. For emails that pass authentication but score high
  on content-based spam signals, route to a 'suspicious' queue rather than spam — authenticated phishing
  (sent from compromised legitimate accounts) is the most dangerous category and must not be silently
  discarded. Log authentication results for every processed email to enable retrospective analysis when
  a phishing campaign is discovered.
- 'Gmail OAuth2 token refresh must be implemented with a mutex or distributed lock when multiple agent
  workers share the same OAuth2 credentials, because concurrent refresh attempts using the same refresh
  token will cause all but the first to fail (Google invalidates the previous refresh token when a new
  one is issued under the rotating refresh token policy). The silent failure mode is severe: worker 2
  attempts to refresh while worker 1''s refresh is in-flight, receives a 401 on its refresh attempt, and
  marks its entire queue of tasks as failed. The correct pattern: (1) store the access token and expiry
  in a shared cache (Redis or a database row with optimistic locking); (2) each worker checks cache before
  calling the token endpoint; (3) use a distributed lock (Redis SETNX or a database advisory lock) around
  the refresh operation with a 10-second TTL; (4) workers that lose the lock wait 2 seconds and re-read
  the cache rather than retrying the refresh. For single-worker deployments, a simple threading.Lock()
  suffices. Always log token refresh events with worker ID to diagnose contention.'
- 'Outlook Graph API email automation requires handling the difference between ''mail folders'' and ''categories''
  which serve conceptually similar but architecturally different purposes. Folders are hierarchical containers
  that hold messages (a message can only be in one folder at a time); categories are multi-value tags
  applied to messages (a message can have multiple categories). Most automation flows that map naturally
  to Gmail labels should use categories in Outlook, not folders, because Gmail labels are semantically
  closer to categories (multi-value) than folders. The Graph API endpoint for categories is /users/{id}/mailFolders/{id}/messages/{id}/microsoft.graph.copy
  for physical moves vs. PATCH /messages/{id} with {categories: [...]} for tagging. Rate limits for Graph
  API are 10,000 requests per 10 minutes per application per tenant — much more generous than Gmail''s
  per-user limits, but shared across all users of your application within a tenant, which creates contention
  issues when automating for an entire organization. Implement per-tenant rate limit tracking, not just
  per-user.'
- 'Email content extraction for downstream processing must handle MIME multipart structure correctly before
  passing content to an LLM. A typical email message has three content parts: text/plain, text/html, and
  zero or more attachments. LLMs should receive the text/plain part when available, because text/html
  contains navigation chrome, tracking pixels, and layout markup that inflates token count and degrades
  extraction quality. When text/plain is absent (HTML-only emails from marketing platforms), strip HTML
  tags using a library like BeautifulSoup with explicit whitespace normalization — do not pass raw HTML
  to the LLM as the tag soup confuses intent extraction. For emails with PDF attachments that are relevant
  to the task, extract PDF text separately and append it to the message content with a clear delimiter.
  Always truncate the combined content at a safe token limit (e.g., 8,000 tokens for gpt-4o-mini) with
  a suffix indicating truncation has occurred — silent truncation causes the LLM to generate responses
  based on partial context without indicating the limitation.'
- 'Gmail push notifications via Google Cloud Pub/Sub require a watch renewal strategy because Gmail watch
  subscriptions expire after 7 days. Automation systems that do not renew the watch silently stop receiving
  notifications on day 8 — there is no error, no exception, and no notification that the watch has expired.
  The correct implementation: (1) schedule a daily cron job that calls users.watch() to renew the subscription
  (renewing daily rather than every 7 days provides buffer against cron failures); (2) implement a health
  check that verifies the watch expiration timestamp is more than 24 hours in the future — alert if not;
  (3) on application startup, always call users.watch() unconditionally rather than checking if an existing
  watch is valid, because watch IDs are idempotent (a new watch replaces the old one, not adds to it).
  For multi-user systems, the watch renewal cron must iterate over all active user tokens and renew each
  independently — a single watch failure for one user should not block renewal for others.'
- 'Email thread detection across different mail clients requires normalizing the subject line before thread
  grouping, because clients apply different conventions for reply subject prefixes. Outlook prepends ''RE:''
  (with a colon and space), while some localized clients use language-specific equivalents (''AW:'' in
  German Outlook, ''RÉP:'' in French clients). Additionally, some clients break thread continuity by stripping
  all Re:/Fwd: prefixes after 3 levels of nesting. The canonical thread grouping algorithm used by Gmail
  API and most modern clients is based on the In-Reply-To and References headers (RFC 5322), not the subject
  line. When these headers are present, always use them as the primary thread key — subject-based threading
  should be a fallback only for emails that lack these headers (e.g., some mobile mail clients omit them).
  For the Gmail API specifically, the threadId field on each message object is the authoritative thread
  identifier and should always be used rather than reconstructing thread groups from headers.'
- 'Email importance scoring for executive inboxes must implement a ''VIP sender'' fast-path that bypasses
  ML scoring and immediately surfaces emails from a configurable list of senders (board members, key clients,
  direct reports). ML models have inherent latency (100–500ms per email for inference) and occasional
  misclassification — both are unacceptable for truly critical communications. The VIP list should be
  stored in a quickly-queryable structure (Redis set or database index on sender_email) and checked before
  any other processing step. The WHY this is a separate concept from sender graph scoring: the sender
  graph score is learned and emergent (it discovers important senders from communication patterns), while
  the VIP list is explicit and guaranteed (it surfaces these emails regardless of historical patterns).
  A new board member who has never emailed before should have VIP-level treatment immediately, not after
  30 days of communication history. Provide a UI for the user to manage the VIP list and audit its effectiveness
  monthly.'
- 'For email automation that drafts replies on behalf of a user, the system must detect and handle ''calendar
  invite'' emails specially rather than attempting to generate a text reply. Calendar invites (Content-Type:
  text/calendar; method=REQUEST) contain iCalendar data that must be accepted, tentatively accepted, or
  declined via the calendar API — a text reply does not register as an RSVP in the organizer''s calendar
  system. The detection is: check the MIME parts for text/calendar content type, parse the METHOD field
  (REQUEST = invitation, CANCEL = cancellation, REPLY = RSVP). For Gmail, the correct automation is to
  use the Calendar API (events.patch with the attendees[].responseStatus field) rather than sending a
  text reply. For Outlook Graph API, use calendarEvent.tentativelyAccept(), .accept(), or .decline() methods.
  Text replies to calendar invites are silently ignored by most calendar systems — the organizer never
  sees a confirmed RSVP, and automation that generates text replies to invitations creates confusion without
  resolving the calendar state.'
- 'Email attachment handling in automation pipelines requires explicit MIME type validation before processing,
  not relying on file extension alone, because malicious actors routinely rename executables to .pdf or
  .docx. Use python-magic (libmagic bindings) or the ''file'' command to detect actual MIME type from
  the file header bytes. For automation systems that extract text from attachments for LLM processing,
  the permitted MIME type allowlist should be narrow: text/plain, application/pdf, application/vnd.openxmlformats-officedocument.wordprocessingml.document
  (DOCX), and application/vnd.ms-excel variants. Any attachment with a MIME type outside this list should
  be flagged for human review, not processed. PDF text extraction requires handling both text-layer PDFs
  (use pdfplumber or pypdf2) and scanned/image PDFs (require OCR via pytesseract or a cloud OCR API) —
  passing an image PDF to a text extractor returns empty string, which silently produces empty context
  for the LLM downstream. Always detect whether PDF text extraction returned content > 100 characters
  before treating extraction as successful.'
- Inbox zero automation systems that archive emails automatically must implement a dry-run mode that is
  the default for the first 30 days of deployment, because the cost of false-positive archiving (important
  email auto-archived before the user sees it) vastly exceeds the cost of false-negative (unimportant
  email left in inbox). During dry-run, the system logs all actions it would have taken and presents a
  daily summary for user review. After 30 days, upgrade to 'supervised mode' where the system applies
  actions but the user receives a daily undo digest with one-click reversal. Only move to 'autonomous
  mode' (no daily digest) after 90 days of supervised operation with a measured false-positive rate below
  0.5%. This progressive trust-building approach follows the Anthropic principle of maintaining human
  oversight during the period when the system is being calibrated — automation errors compound silently
  and the inbox is a critical information asset that, once corrupted by misarchiving, is difficult to
  recover.
