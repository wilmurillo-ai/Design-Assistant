constraints:
- 'FAILURE MODE: Relying on created_at for incremental loading instead of updated_at (or both) causes
  silently missing updates. A row inserted at T=0 with created_at=''2025-01-01'' that is updated 90 days
  later will not be captured by an incremental query with WHERE created_at > last_watermark=''2025-01-02''
  — the created_at is before the watermark but the row changed after it. This produces a pipeline that
  appears healthy (no errors, processes records) but silently produces stale downstream data. The failure
  is particularly insidious because it does not manifest as an error — query results look complete, just
  incorrect. THE FIX: always use updated_at (or a logical timestamp that changes on every modification)
  for incremental loading. If the source table has no updated_at, use CDC (Debezium) which captures all
  row changes from the transaction log regardless of timestamp presence. If neither is available, fall
  back to a full table scan with snapshot diffing — more expensive but complete. Audit your watermark
  column choice when setting up any new incremental pipeline.'
- 'FAILURE MODE: Not handling late-arriving data in stream pipelines produces metrics that become incorrect
  retroactively as late events arrive. A pipeline that counts daily orders based on event_time will produce
  an initial count at T+1h that is correct for events received on time, but events that arrive 6 hours
  late (due to mobile offline usage, network delays, or upstream system lag) will not be included in the
  T+1h aggregate. The downstream team sees the metric jump inexplicably when the late events are processed
  the next day. THE FIX: implement a watermark-based windowing approach where the pipeline defines a maximum
  acceptable late arrival time (e.g., 2 hours) and holds the window open for that duration before finalizing
  the aggregate. Apache Flink''s event-time processing with allowedLateness and side outputs for very-late
  records is the canonical implementation. For batch pipelines, run a ''late arrival reconciliation''
  job that re-processes the previous day''s aggregates 6 hours after midnight to capture any late-arriving
  events, then issues a MERGE/UPSERT to correct the published numbers.'
- 'FAILURE MODE: Using Airflow''s LocalExecutor in production for pipelines that have concurrency requirements
  results in resource contention and cascading failures. LocalExecutor runs tasks as subprocesses on the
  scheduler host — all tasks share the same machine''s CPU, memory, and I/O bandwidth. When a memory-intensive
  transformation task and multiple sensor tasks run concurrently on the same machine, the machine OOMs
  and the scheduler dies, taking all running task instances with it. The failure compounds because Airflow''s
  scheduler recovery is slow (30–60 seconds) and all tasks in ''running'' state at the time of the crash
  are marked as ''failed'' and require manual clearing. THE FIX: use CeleryExecutor or KubernetesExecutor
  for any production Airflow deployment with more than 10 concurrent tasks. KubernetesExecutor is preferred
  for cloud deployments because each task runs in an isolated Pod with its own resource limits and the
  scheduler is not on the critical path for task execution. Always set resource_limits on KubernetesPodOperator
  to prevent runaway tasks from consuming cluster resources.'
- 'FAILURE MODE: Storing pipeline secrets (database passwords, API keys, cloud credentials) in Airflow
  Variables or Airflow Connections without encryption at rest exposes them in the Airflow metadata database
  in plaintext. The default Airflow deployment stores Variables and Connections unencrypted in the metadata
  Postgres database — any user with direct database access or any compromised Airflow admin account can
  read all secrets. THE FIX: (1) Enable Fernet encryption for Airflow by generating a Fernet key and setting
  AIRFLOW__CORE__FERNET_KEY — this encrypts Connection passwords and Variable values at rest, (2) For
  production deployments, use a secrets backend (HashiCorp Vault via airflow-providers-hashicorp, AWS
  Secrets Manager, GCP Secret Manager) rather than Airflow Variables — secrets backends store secrets
  outside the metadata database entirely and retrieve them at task runtime, (3) Never commit the Fernet
  key or any secret to version control — inject it via environment variable in the deployment configuration.
  Rotate secrets quarterly and immediately on any personnel change that had access.'
- 'The choice between stream processing and batch processing is not primarily about latency — it is about
  whether the business use case requires per-event reactions or aggregate insights, and each paradigm
  has fundamentally different failure modes. Batch processing (Spark, dbt, Airflow-scheduled SQL) is simpler
  to build, test, and debug because jobs are bounded, repeatable, and can be re-run from the start. Stream
  processing (Kafka + Flink, Kafka Streams, AWS Kinesis) is required when the business needs to act on
  events within seconds to minutes of their occurrence — fraud detection, real-time personalization, inventory
  reservation. The UNSAID WHY most teams overinvest in streaming: they build streaming pipelines for operational
  reporting that genuinely needs results within minutes, not seconds — a micro-batch approach (batch every
  1–5 minutes) often satisfies the latency requirement with 80% less operational complexity. The decision
  framework: if the required freshness is under 30 seconds, use streaming; 30 seconds to 5 minutes, evaluate
  micro-batch; over 5 minutes, batch is almost always the right choice.'
- 'Exactly-once semantics in distributed data pipelines is theoretically achievable but practically expensive
  — every system that claims exactly-once delivery actually implements at-least-once delivery with idempotent
  consumers that deduplicate on the receive side. The WHY this distinction matters: Kafka''s exactly-once
  transactions (enabled via enable.idempotence=true and transactional.id) provide exactly-once within
  a single Kafka cluster but not across heterogeneous systems. A pipeline that reads from Kafka, transforms
  data, and writes to PostgreSQL must implement idempotency at the sink (upsert on unique key rather than
  insert) to achieve exactly-once end-to-end, because the consumer can always receive a duplicate or reprocess
  after a crash-recovery. The practical implication: design every pipeline stage for at-least-once delivery
  and idempotent processing, and you get effectively-once semantics at lower operational cost than relying
  on the framework''s exactly-once guarantees. Idempotency at the sink is the safest and most portable
  approach.'
- 'Schema evolution in data pipelines must be treated as a first-class concern from day one, not retrofitted
  when the first breaking change occurs. The fundamental tension: source schemas change (new fields added,
  field types widened, columns renamed, tables split) and pipelines must continue processing during and
  after the change without data loss or downtime. The industry-standard approach uses a schema registry
  (Confluent Schema Registry, AWS Glue Schema Registry) that enforces compatibility rules between schema
  versions. The three compatibility modes and when to use each: BACKWARD compatible (new schema can read
  data written with old schema — safe for consumers to update first), FORWARD compatible (old schema can
  read data written with new schema — safe for producers to update first), FULL compatible (both — requires
  the most discipline but provides the most safety). The UNSAID WHY teams skip schema registries: they
  feel like overhead for small datasets, but the first schema-induced pipeline outage in production changes
  that calculus permanently.'
- 'ETL pipeline design should follow the medallion architecture (raw/bronze → cleansed/silver → aggregated/gold)
  because it separates concerns and enables independent replay of any layer. Raw (bronze) layer: exact
  copy of source data, no transformation, append-only, retained for 90+ days. Silver layer: type-cast,
  deduplicated, nulls handled, schema-validated data. Gold layer: business-aggregated tables optimized
  for reporting. The WHY each layer must be independently replayable: when a business logic bug is discovered
  in the gold layer transformation, you replay only gold from silver without re-ingesting from source;
  when a source data quality issue is discovered, you fix the silver transformation and replay from bronze.
  Implement each layer as a separate job with its own scheduling, monitoring, and SLA. Store layer lineage
  metadata (source table, transformation version, run timestamp) with every record to enable audit and
  backfill targeting. Apache Iceberg and Delta Lake table formats support time-travel queries, making
  bronze layer replay trivial.'
- 'Incremental loading patterns reduce pipeline cost and latency by processing only changed records rather
  than full table scans. The three main incremental loading strategies: (1) Timestamp-based: query WHERE
  updated_at > last_watermark — simple, widely applicable, but misses hard-deletes and requires the source
  to have a reliable updated_at field that is always updated on row change, (2) CDC (Change Data Capture):
  subscribe to database transaction log (Debezium for MySQL/PostgreSQL, AWS DMS) to capture inserts, updates,
  and deletes — complete but operationally complex, requires database-level access, (3) Surrogate key
  diff: compare a hash of key fields between current and previous snapshot to detect changes — works for
  sources without updated_at but requires storing the previous snapshot. Watermark management is the most
  error-prone aspect: store the watermark (last processed timestamp or offset) durably (not in process
  memory), and advance it only after records are durably committed downstream — never advance watermark
  before the write completes or you will lose data on crash-recovery.'
- 'Deduplication in data pipelines must be implemented at both the ingestion layer (before inserting into
  the raw table) and the transformation layer (before aggregating) because the same event can arrive duplicated
  from multiple sources. Ingestion-layer dedup: use an upsert with a deterministic event_id as the unique
  key (INSERT INTO ... ON CONFLICT(event_id) DO NOTHING for PostgreSQL; MERGE INTO for Spark). The event_id
  should be generated by the producer (not the pipeline) and should be stable across retries — use a hash
  of (source_system, entity_id, event_type, timestamp_ms) if the source does not provide one. Transformation-layer
  dedup for slowly-changing dimensions (SCD2): use ROW_NUMBER() OVER(PARTITION BY entity_id ORDER BY updated_at
  DESC) = 1 to select the most recent version before aggregating. A common footgun: deduplicating only
  by primary key without considering update time will merge a later update with an earlier insert and
  produce a row with a lower updated_at than it should have, causing downstream SCD2 logic to malfunction.'
- 'Apache Airflow DAG design for data pipelines should use the TaskFlow API (Python decorators) for complex
  pipelines because it makes data dependencies explicit in code and avoids the XCom-as-data-bus antipattern.
  Key Airflow pipeline design rules: (1) Never pass large data through XCom — XCom is designed for small
  metadata (row counts, file paths, status flags), not dataframes; pass data by reference (S3 path, GCS
  URI, Snowflake table name), (2) Set depends_on_past=True only for the specific tasks that require sequential
  ordering — applying it at the DAG level forces all task instances to wait for yesterday''s completion,
  creating unnecessary cascading delays, (3) Use SLAs and callbacks (on_failure_callback, on_retry_callback)
  on every DAG to ensure failures are surfaced via Slack/PagerDuty immediately rather than silently, (4)
  Separate transformation DAGs from ingestion DAGs with an ExternalTaskSensor dependency — this decouples
  scheduling, allows independent retries, and prevents a slow transformation from blocking the next ingestion
  run.'
- 'Prefect 3.x pipeline design uses flows and tasks with native async support and server-based orchestration.
  Key design patterns: (1) Use .submit() with a ConcurrentTaskRunner to run independent tasks in parallel
  within a flow — avoid sequential task calls for independent API fetches or database writes, (2) Configure
  retries at the task level (retries=3, retry_delay_seconds=exponential) rather than the flow level —
  task-level retries are cheaper and more targeted, (3) Use Prefect artifacts to log data quality metrics,
  row counts, and sample records as structured HTML artifacts per flow run — this provides built-in observability
  without a separate monitoring tool, (4) Deploy flows as Prefect Deployments with a work pool backed
  by Kubernetes or ECS rather than running them on a single machine — this provides horizontal scaling
  for burst workloads. The main operational advantage of Prefect over Airflow: the Python-first design
  means local testing of a Prefect flow runs the exact same code as production with no framework overhead.'
- 'Data quality monitoring requires both schema-level checks (is the column present? is the type correct?)
  and distribution-level checks (is the null rate for this column within the expected range? is the row
  count within ±20% of yesterday''s count? are there anomalous value spikes?). Tools: dbt tests cover
  the schema-level and simple row-count assertions; Great Expectations covers distribution-level with
  its expect_column_values_to_be_between and expect_column_proportion_of_unique_values_to_be_between expectations;
  Monte Carlo and Bigeye are commercial tools that auto-learn distribution baselines and alert on anomalies.
  For homegrown monitoring: query the target table daily and compute the following per column — null_rate,
  distinct_count, min, max, mean (for numerics), and most_common_values. Store these statistics in a monitoring
  table and alert if any metric deviates more than 3 standard deviations from the trailing 30-day mean.
  The most impactful single monitor: alert when a table''s row count drops more than 15% compared to the
  same day last week — this catches missed ingestion runs before anyone downstream notices.'
- 'Backfill strategy for historical data must account for rate limits, source system load, and cost. The
  naive backfill approach — run the pipeline for all historical dates in parallel — will exceed API rate
  limits, overload the source database, and generate a cloud compute bill that surprises everyone. The
  safe backfill pattern: (1) Define a backfill window (e.g., 24 months of history), (2) Partition by day
  or week depending on data volume, (3) Process partitions sequentially with a configurable concurrency
  limit (default: 1, maximum: 3 for most APIs), (4) Implement checkpoint/resume: store the last completed
  partition in a backfill_state table so the job can be interrupted and restarted without re-processing
  completed partitions, (5) Add a rate limit sleep between partition fetches. For Airflow: use the backfill
  CLI command with --max-active-runs 1 to process historical DAG runs one at a time. Never mix backfill
  runs with production incremental runs in the same worker pool — backfills compete for resources and
  can delay the live pipeline SLA.'
- 'Dead letter queues (DLQs) are essential for stream processing pipelines to prevent a single malformed
  or unprocessable message from blocking the entire pipeline. Every Kafka consumer that processes messages
  should be configured with a DLQ pattern: (1) On processing failure after N retries (typically 3), publish
  the failed message to a <topic>-dlq topic with error metadata appended (original_topic, partition, offset,
  error_message, error_timestamp, attempt_count), (2) Continue processing subsequent messages — never
  allow a single message to block the consumer, (3) Monitor the DLQ topic — a growing DLQ indicates a
  systemic issue requiring investigation, not just individual bad records, (4) Implement a DLQ replay
  mechanism that allows re-publishing DLQ messages back to the original topic after the root cause is
  fixed. AWS SQS provides native DLQ support with maxReceiveCount threshold. The WHY DLQs are non-optional:
  without a DLQ, a consumer that cannot process message N will retry indefinitely, lag will grow, and
  downstream consumers will not receive any messages past N until the issue is manually resolved.'
- 'Data lineage tracking enables impact analysis (''if I change this source table, which downstream reports
  break?'') and root cause analysis (''why is this metric wrong? what transformed it?''). OpenLineage
  (https://openlineage.io) is the open standard for lineage metadata, implemented by Airflow (via openlineage-airflow
  package), Spark (via openlineage-spark), dbt (via dbt-openlineage), and others. Integrate OpenLineage
  by configuring the OPENLINEAGE_URL environment variable to point to a Marquez server (the reference
  OpenLineage backend) or a commercial alternative (Atlan, DataHub). Each job run emits START and COMPLETE
  events with input and output dataset references. For custom Python pipelines not using a supported framework,
  emit OpenLineage events manually via the openlineage-python client library: emit a RunEvent with RunState.START
  before processing and RunState.COMPLETE with output dataset statistics after. Store lineage in a graph
  database or the Marquez API and expose it as a queryable graph for impact analysis and data discovery.'
- 'Schema migration for production data pipelines must be backward compatible during the transition period
  to enable rolling deployments without pipeline downtime. The safe schema change sequence: (1) For adding
  a column: add the column as nullable with a default value — both old and new pipeline code can read/write
  the table simultaneously, (2) Deploy new pipeline code that writes to the new column, (3) Backfill the
  new column for historical rows, (4) Add the NOT NULL constraint only after backfill is complete and
  old code is retired, (5) For renaming a column: add the new column as an alias, migrate writes to the
  new column, update all readers, then drop the old column — never rename in place. Tools: Flyway and
  Liquibase manage migration version history and provide checksum validation; Alembic is the Python/SQLAlchemy
  equivalent. Run migrations in CI against a snapshot of production schema to catch breaking changes before
  deployment. Never run a pipeline deployment and a schema migration simultaneously — deploy the migration,
  verify success, then deploy the new pipeline code.'
