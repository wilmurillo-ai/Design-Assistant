core_capability: LangChain's core design principle is that every component — LLMs, retrievers, output
  parsers, chains — implements the same Runnable interface with invoke/stream/batch/ainvoke methods. This
  'everything...
constraints:
- 'The ''why we removed LangChain'' pattern (popularized by multiple engineering blogs in 2024) identifies
  over-abstraction as the core failure mode for simple use cases. LangChain''s value is proportional to
  use-case complexity: for a single LLM call with a prompt template, the framework adds 3-4 abstraction
  layers with no benefit. The UNSAID signal: LangChain shines when you need retrieval, memory, multi-step
  tool use, or multi-model routing — its composition primitives pay off only when you have 3+ components
  to compose. Teams that bolt it on for single-step pipelines end up debugging framework internals instead
  of their actual logic.'
- 'Tool and function calling schemas differ materially across providers, and LangChain''s tool abstraction
  hides this until you hit an edge case. OpenAI accepts nested object schemas; Anthropic requires all
  properties be present in required when strict mode is off; Gemini rejects certain JSON Schema keywords
  like ''default''. The WHY: LangChain''s @tool decorator generates a schema from Python type hints using
  Pydantic, but it does not validate or adapt that schema per-provider — it passes it through as-is. Using
  Optional fields, Union types, or complex nested models in tools will work on one provider and silently
  fail or error on another.'
- 'VectorStore integrations in LangChain (Chroma, Pinecone, Weaviate, etc.) follow an inconsistent API
  surface because each is implemented as a thin wrapper by community contributors. The add_texts() method
  exists on all of them but batch size limits, metadata filtering syntax, and upsert vs insert semantics
  differ per provider. The most dangerous silent divergence: some stores (Chroma, FAISS) store embeddings
  locally and require explicit .persist() or save_local() calls to survive process restarts; others (Pinecone,
  Weaviate) are remote and persist automatically. A FAISS index not persisted before process exit silently
  discards all indexed data — no error, no warning, just empty results on the next run.'
- 'LangChain''s document loaders (PDFLoader, WebBaseLoader, etc.) are convenience wrappers with significant
  hidden limitations. Most PDF loaders use PyPDF or pdfminer and silently produce garbled output on scanned
  PDFs, multi-column layouts, or PDFs with embedded tables — there is no fallback to OCR or table extraction.
  WebBaseLoader makes blocking HTTP requests (no async, no retry, no timeout by default) and strips JavaScript-rendered
  content, making it useless for SPAs. The constraint pattern: loaders are reliable only for well-structured,
  text-native files. For production document ingestion pipelines, use purpose-built parsers (unstructured,
  docling, or provider-specific APIs like Azure Document Intelligence) and feed their output into LangChain
  as pre-processed Document objects rather than relying on LangChain''s built-in loaders.'
- 'LangChain''s document loaders for web content (WebBaseLoader, AsyncHtmlLoader, RecursiveUrlLoader)
  are all text-extraction-only wrappers: they make HTTP requests and return the DOM''s textContent. They
  cannot handle JavaScript-rendered pages, login-protected content, or sites that require cookie authentication.
  The hidden divergence between loaders: WebBaseLoader uses the `bs4` (BeautifulSoup4) `get_text()` method
  which concatenates all visible text including nav, footer, and sidebar noise; RecursiveUrlLoader respects
  `exclude_dirs` but does not deduplicate near-identical crawled pages. For production web ingestion,
  the correct pattern is to use a headless browser or a managed crawl API (FireCrawl, Jina Reader, or
  Playwright-based custom loader) and feed the resulting markdown or cleaned HTML into LangChain''s Document
  class directly, bypassing LangChain''s built-in web loaders entirely. LangChain provides a FireCrawlLoader
  integration for exactly this pattern.'
- 'LangChain''s package split (langchain, langchain-core, langchain-community, langchain-openai, etc.)
  is the most common source of ImportError and version conflict in production. The UNSAID trap: langchain-core
  is the stable base with no third-party dependencies; langchain is a thin meta-package; langchain-community
  holds integrations with looser pinning. Installing just ''langchain'' pulls in langchain-core automatically,
  but installing only ''langchain-openai'' does NOT install langchain — causing missing chain utilities.
  Pinning langchain and langchain-openai independently without checking their shared langchain-core constraint
  causes silent version mismatches.'
- 'The v0.1→v0.2→v0.3 migration path combined with Pydantic v2 is the single largest breakage source in
  LangChain production codebases. LangChain v0.2 dropped many legacy chain classes; v0.3 dropped Python
  3.8 and fully migrated internal models to Pydantic v2. The hidden trap: custom classes subclassing BaseModel
  or BaseTool that worked with Pydantic v1 break silently at runtime under v0.3 because Pydantic v2 enforces
  stricter type coercion and changes field validators from @validator to @field_validator. Many tutorials
  still show v0.1 syntax, creating a false sense of compatibility when code runs but produces wrong behavior.'
- 'LCEL streaming and callback propagation has a non-obvious gotcha: callbacks passed to .invoke() do
  NOT automatically propagate into nested Runnables created inside RunnableLambda or custom tools. The
  UNSAID mechanism: callbacks propagate through the chain graph only if the nested call uses the config
  parameter (RunnableConfig) passed into the lambda. Code that calls another chain directly inside a lambda
  (e.g., inner_chain.invoke(input)) instead of inner_chain.invoke(input, config) silently drops tracing
  and token-level streaming for all downstream steps, making LangSmith traces appear to have missing spans.'
- 'ConversationBufferMemory and all classes in langchain.memory are deprecated as of v0.3 and will be
  removed. The UNSAID problem is that they were stateful objects that mixed concerns: they stored messages
  AND managed the prompt injection, making them impossible to compose cleanly with LCEL. The replacement
  pattern is explicit message history management using RunnableWithMessageHistory or direct ChatMessageHistory
  objects passed through chain state. Teams migrating from ConversationBufferMemory often reproduce the
  same tight coupling in their replacement code because they don''t understand that the deprecation was
  architectural, not cosmetic.'
- 'Output parsers (PydanticOutputParser, StructuredOutputParser, JsonOutputParser) fail brittlely because
  they rely on the LLM following format instructions in the prompt — there is no retry or schema enforcement
  at the protocol level. The UNSAID fix that most teams miss: use .with_structured_output() on the chat
  model instead of a separate output parser. This method uses the provider''s native function-calling
  or JSON-mode API to enforce structure at the model API level, making it 10x more reliable than prompt-based
  parsing. Output parsers remain useful only for models that don''t support native structured output.'
- LangSmith tracing is enabled by setting LANGCHAIN_TRACING_V2=true and LANGCHAIN_API_KEY in environment
  variables, but there is no runtime error if tracing silently fails due to network issues, wrong API
  key, or quota exceeded — the chain still executes and returns results. Teams that rely on LangSmith
  for debugging discover missing traces only during incident postmortems. The correct production pattern
  is to check LangSmith connectivity as a startup health check, log the trace URL per request via the
  run_id returned by chain.invoke() when tracing is active, and configure a dead-letter alert if trace
  ingestion failure rate exceeds a threshold in LangSmith's dashboards.
- 'LangChain''s text splitters (RecursiveCharacterTextSplitter, TokenTextSplitter) share a non-obvious
  default: chunk_overlap defaults to 200 characters, not tokens. When using TokenTextSplitter, overlap
  is measured in tokens; when using CharacterTextSplitter, overlap is measured in characters. Mixing these
  splitters in a pipeline without explicit overlap specification causes inconsistent chunk boundary behavior.
  A second trap: RecursiveCharacterTextSplitter uses character count for chunk_size by default, but most
  downstream vector stores and LLMs care about token count. Setting chunk_size=1000 with the character
  splitter gives wildly variable token counts per chunk depending on content — code (dense tokens) vs
  prose (sparse tokens) — making token-budget planning unreliable. Always use TokenTextSplitter with an
  explicit model-matched encoding when token budget matters.'
- 'LangChain''s multi-modal chains for vision-language models (GPT-4o, Claude 3, Gemini) require images
  to be passed as HumanMessage content with a specific list format: a list of dicts with ''type'': ''image_url''
  entries alongside ''type'': ''text'' entries. The failure trap: passing images as base64 strings directly
  in the prompt template string (not as typed content blocks) causes every tested provider to silently
  ignore the image and respond to text only — no error is raised. A second divergence: OpenAI expects
  `{''type'': ''image_url'', ''image_url'': {''url'': ''data:image/jpeg;base64,...''}}` while Anthropic
  expects `{''type'': ''image'', ''source'': {''type'': ''base64'', ''media_type'': ''image/jpeg'', ''data'':
  ''...''}}`. LangChain''s ChatOpenAI and ChatAnthropic accept a normalized format and handle the conversion,
  but only when using the `content` list format — mixing providers while using raw dict construction bypasses
  this normalization and silently sends malformed payloads.'
- 'LangChain''s LangGraph deployment via LangGraph Platform (LangGraph Cloud or self-hosted LangGraph
  Server) introduces a persistence layer using Postgres as a checkpointer. The UNSAID operational trap:
  LangGraph''s checkpointing serializes the entire state graph object to JSON on every node transition,
  storing it in the `checkpoints` table. For graphs with large state (e.g., retrieved documents, conversation
  history, tool outputs accumulated across many steps), checkpoint blob sizes grow to hundreds of kilobytes
  per turn, causing two hidden problems: (1) Postgres storage grows unboundedly without a checkpoint pruning
  strategy; (2) Deserializing multi-MB state objects on every node entry becomes a latency bottleneck
  at scale. The mitigation is to use state compression (exclude large intermediate values from the persisted
  schema using Annotated types with `operator.add` reducers) and configure TTL-based checkpoint expiry
  rather than keeping full history indefinitely.'
- 'AgentExecutor is the legacy agent runtime and is superseded by LangGraph for all non-trivial agent
  workflows. The UNSAID distinction: AgentExecutor is a fixed loop (reason → act → observe, repeat) with
  no ability to branch, retry individual steps, or maintain complex state machines. LangGraph models the
  agent as an explicit state graph where you define nodes and edges, enabling conditional branching, parallel
  tool calls, human-in-the-loop interruption, and checkpointing. The migration trigger is not complexity
  per se — it is whenever you need any control flow beyond linear ReAct: if yes, use LangGraph from day
  one rather than retrofitting AgentExecutor.'
- 'RunnableParallel enables true fan-out execution within LCEL pipelines, running multiple branches concurrently
  and collecting results into a dict. The UNSAID production pattern: wrap CPU-bound branches in RunnableLambda
  with run_in_executor to avoid blocking the event loop, and wrap I/O-bound branches directly since LCEL''s
  async path uses asyncio.gather internally. The critical gotcha is that RunnableParallel materializes
  ALL branch outputs into memory before returning — if one branch produces a 100k-token document and another
  produces a small label, the full document sits in RAM until both complete. For memory-constrained services,
  sequential execution with lazy processing is safer despite lower throughput.'
- 'Multi-turn chat applications using LangChain should use RunnableWithMessageHistory rather than manually
  prepending history to prompts. RunnableWithMessageHistory wraps any chain and injects message history
  from a configurable store (InMemoryChatMessageHistory, RedisChatMessageHistory, etc.) before each invocation,
  keyed by session_id in the config dict. The performance insight that most documentation omits: ChatMessageHistory
  stores the full message list and grows unboundedly — for long conversations this inflates prompt token
  cost quadratically. The production pattern is to add a trimming step (trim_messages()) in the chain
  before history injection to enforce a sliding-window or token-budget constraint on history length.'
- 'LangChain''s .batch() method is the correct way to run the same chain on multiple inputs with controlled
  concurrency, not Python list comprehensions over .invoke(). .batch() accepts a max_concurrency parameter
  and uses async gather internally when the chain has async implementations. The UNSAID performance implication:
  calling [chain.invoke(x) for x in inputs] runs sequentially in a single thread; calling chain.batch(inputs,
  config={''max_concurrency'': 10}) makes up to 10 concurrent async calls, reducing wall-clock time by
  ~10x for I/O-bound LLM calls. For chains that implement ainvoke but not abatch, the framework automatically
  constructs abatch from ainvoke calls — meaning async batch support is free for any async-aware component.'
- 'LangChain''s caching layer (InMemoryCache, SQLiteCache, semantic cache via RedisSemanticCache) is an
  underused production optimization that eliminates redundant LLM API calls for identical or near-identical
  prompts. Caching is configured globally via langchain.globals.set_llm_cache() and applies transparently
  to all LLM calls. The UNSAID cost implication: for classification tasks or FAQ-style applications where
  many users ask semantically equivalent questions, semantic cache hit rates of 40-60% are achievable,
  directly reducing API costs by that fraction. The critical constraint: streaming responses cannot be
  cached — the cache layer only stores complete responses, so enabling cache on a streaming-first application
  silently falls back to non-streaming for cache misses while returning cached responses instantly for
  hits, creating inconsistent latency profiles.'
- 'LangServe is the official deployment layer for LangChain chains, exposing any Runnable as a FastAPI
  endpoint with automatic OpenAPI docs, playground UI, and streaming support via Server-Sent Events. The
  deployment pattern: wrap any LCEL chain in `add_routes(app, chain, path=''/my-chain'')` and LangServe
  generates /invoke, /batch, /stream, /stream_log, and /stream_events endpoints automatically. The UNSAID
  production constraints: LangServe pins FastAPI and Pydantic versions to match its internal schema generation
  — installing it alongside an independently pinned FastAPI app can cause version conflicts. Also, LangServe''s
  auto-generated input/output schemas are derived from the chain''s first and last Runnable types; chains
  using RunnableLambda with untyped callables produce `Any` schemas that break the playground UI. For
  production deployments, always annotate input/output types explicitly using RunnablePassthrough or TypedDict
  schemas to get usable OpenAPI docs and client SDK generation.'
- 'Custom embedding models integrate into LangChain by subclassing `Embeddings` (from langchain_core.embeddings)
  and implementing `embed_documents(texts: list[str]) -> list[list[float]]` and `embed_query(text: str)
  -> list[float]`. The WHY for the two-method split: query and document embeddings use different prompts
  in asymmetric embedding models (e.g., E5, BGE-M3, Cohere embed-v3) — a query is prefixed with ''query:''
  and a document with ''passage:''. Failing to apply the correct prefix when implementing a custom embeddings
  class silently uses symmetric embedding, degrading retrieval quality by 10-20% on benchmarks. The second
  hidden trap: `embed_documents` should batch its HTTP calls to avoid per-document API overhead; the default
  `embed_query` path calls `embed_documents([text])[0]` unless overridden, so a naively implemented batch
  method that fires one request per document also penalizes single-query calls with unnecessary batching
  logic.'
- 'Semantic chunking (SemanticChunker from langchain_experimental) creates chunk boundaries based on embedding
  distance between consecutive sentences rather than fixed character or token counts. This produces semantically
  coherent chunks where each chunk covers a single conceptual unit, unlike fixed-size chunking which splits
  mid-argument. The WHY it matters for retrieval: embeddings of semantically coherent chunks have lower
  intra-chunk variance and higher inter-chunk separation, making cosine similarity matching more discriminative.
  The practical constraint: SemanticChunker makes one embedding API call per sentence in the document
  to compute inter-sentence distances, which is 10-50x more expensive than character-based splitting for
  large corpora. The production pattern is to use semantic chunking for high-value structured documents
  (contracts, technical specs) where retrieval precision matters, and fall back to RecursiveCharacterTextSplitter
  with 512-token chunks for high-volume commodity text where cost dominates.'
- 'LangChain''s cost optimization patterns center on four techniques that compound: (1) Caching — InMemoryCache
  or SQLiteCache eliminates redundant LLM calls for identical prompts (30-60% savings on FAQ/classification
  workloads); (2) Token counting before dispatch — use `get_num_tokens_from_messages()` from the chat
  model to check prompt size and truncate pre-flight rather than hitting context-window errors at API
  call time; (3) Cheaper model routing — use `RunnableBranch` or `model.with_fallbacks()` to route simple
  queries to gpt-4o-mini and complex ones to gpt-4o based on a classifier step costing ~0.001 per call;
  (4) Streaming with early exit — using `.stream()` and checking partial output for a stop condition to
  abort long generations early. The UNSAID interaction between these: caching and streaming are mutually
  exclusive — enabling the cache layer disables streaming for cached keys. Teams must decide per endpoint
  whether to prioritize cost (caching) or latency perception (streaming).'
