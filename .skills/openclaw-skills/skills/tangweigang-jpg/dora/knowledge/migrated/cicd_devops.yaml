constraints:
- HashiCorp Vault dynamic secrets generate short-lived credentials on demand for databases, cloud providers,
  and PKI. The architectural constraint teams miss is that Vault leases have a TTL and must be actively
  renewed by the consuming application — they do not auto-renew. Applications that cache a Vault-issued
  database credential at startup and never renew the lease will start failing after the TTL expires (typically
  1 hour for database credentials). The solution is either the Vault Agent Sidecar (handles lease renewal
  transparently) or the Vault SDK with an active lease renewal goroutine/thread. The Vault Secrets Operator
  for Kubernetes (VSO) is the recommended modern pattern as it reconciles secrets as Kubernetes Secret
  objects with automatic rotation.
- 'GitHub Actions concurrency groups without cancel-in-progress: true cause silent build queue pile-ups
  that block PR merges for minutes. The failure pattern: a developer pushes three commits quickly; three
  workflow runs queue; each waits for the previous; the developer merges thinking CI passed on their last
  commit but the run that actually gated the merge was against their first commit — which had different
  code. The fix is concurrency: group: ''${{ github.workflow }}-${{ github.ref }}'' cancel-in-progress:
  true on PR workflows. The exception is deployment workflows where cancel-in-progress would leave infrastructure
  in a half-deployed state — those need a different strategy using environment protection rules instead.'
- Storing secrets in GitHub Actions environment variables with echo exposes them in plaintext in workflow
  logs. GitHub masks registered secrets but only in exact-match form — base64-encoded, URL-encoded, or
  chunked variants of a secret are NOT automatically masked. The failure mode appears when developers
  run 'echo ${{ secrets.TOKEN }}' for debugging and the value is split across log lines or encoded, bypassing
  the mask. The correct pattern is to never echo secrets, use step outputs with add-mask for derived values
  ('echo ::add-mask::$derived_value'), and audit workflow logs with 'gh run view --log' regularly. OIDC
  token-based authentication eliminates long-lived secrets entirely and is the architecturally correct
  solution.
- 'Terraform remote state in S3 without DynamoDB locking causes state corruption when two engineers run
  apply simultaneously. The failure pattern is well-known but frequently skipped in bootstrap phases:
  two concurrent applies read the same state, both succeed, one overwrites the other''s changes in the
  state file, leaving actual infrastructure out of sync with recorded state. DynamoDB locking uses a conditional
  write to prevent concurrent applies. The subtler trap is that ''terraform init'' itself does NOT warn
  about missing locking — the error only manifests under concurrent load. Teams bootstrapping new workspaces
  must provision the DynamoDB lock table before any team member runs apply, not after.'
- 'Dependabot PRs that auto-merge without required status checks create a false sense of automated dependency
  hygiene. The failure pattern: Dependabot opens a PR, auto-merge fires on the ''opened'' event before
  CI has run, the PR merges with a broken dependency update. This happens because GitHub''s auto-merge
  respects required status checks only when they are configured as branch protection rules — if CI is
  not listed as a required check, auto-merge fires on PR approval alone (including Dependabot''s own auto-approval).
  The correct architecture requires: branch protection with required CI checks + Dependabot auto-approve
  only after all checks pass, not on PR creation.'
- 'Renovate and Dependabot both update dependencies but have fundamentally different scheduling models
  that create different failure modes. Dependabot opens one PR per outdated dependency immediately on
  schedule; Renovate batches updates into grouped PRs on a configurable schedule. The failure mode with
  Dependabot in active monorepos is PR flood: 40+ dependency PRs opening simultaneously overwhelms review
  capacity, causing teams to approve without reviewing (rubber-stamping) or to disable the tool entirely.
  Renovate''s grouping and automerge for minor/patch semantic version bumps with green CI is the operationally
  sustainable pattern. The critical configuration is semantic versioning grouping: never automerge major
  version bumps regardless of CI status.'
- 'Kubernetes resource requests and limits misconfiguration is the most common cause of mysterious pod
  evictions and node pressure in production. The failure pattern: pods without resource requests are scheduled
  on any node by the Kubernetes scheduler, which doesn''t account for their actual consumption; during
  node memory pressure, pods with no requests are the first eviction candidates (BestEffort QoS class).
  Pods without limits can consume unbounded memory and trigger OOMKill on neighbor pods. The correct pattern
  is: always set both requests and limits; set CPU limit equal to or higher than CPU request (CPU throttling
  is preferable to OOM); set memory limit equal to memory request for Guaranteed QoS class on latency-sensitive
  services.'
- 'GitHub Actions cache poisoning is a real supply chain attack vector that teams treat as theoretical.
  The failure mode: a malicious PR modifies a workflow that writes to the GitHub Actions cache (actions/cache@v4
  with a predictable key) and the cached artifact is reused by a subsequent run on the main branch or
  another PR, executing attacker-controlled code in a trusted context. GitHub''s cache isolation model
  restricts cross-branch cache reads (PRs can read base branch caches but not vice versa by default) but
  this is frequently misconfigured. The mitigation is: use content-addressed cache keys (hash of lockfile),
  never cache compiled binaries in shared caches, and use immutable artifact storage (GitHub Releases,
  OCI registries) for build outputs that cross trust boundaries.'
- 'Kubernetes namespace-level NetworkPolicy defaults allow all pod-to-pod traffic, creating an implicit
  flat network where a compromised pod can reach any other pod in the cluster. The failure mode is discovered
  after a breach: teams that never configured NetworkPolicy assume namespaces provide network isolation
  (they do not — namespaces are organizational, not security boundaries). The correct posture is a default-deny
  NetworkPolicy applied to every namespace at creation time, with explicit allow rules for required service-to-service
  communication. In practice, many teams add NetworkPolicy only after a security audit and struggle with
  retroactive policy because they never documented their actual service dependency graph — this is why
  drawing the dependency map before writing policies is mandatory.'
- 'Rollback strategies that rely on redeploying the previous image tag fail silently when database migrations
  have run forward. The failure pattern: deploy v2 which runs a destructive migration (drops a column);
  v2 is buggy; rollback to v1 is attempted; v1 code reads the dropped column and crashes. The root cause
  is that rollback planning is done at the code level but not at the data level. The correct architecture
  for safe rollback is: never run irreversible migrations in the same deploy step as application code
  (separate database migration pipeline); use the expand-contract pattern (add new column, dual-write,
  migrate data, remove old column over multiple deploys); and test rollback in staging by actually deploying
  n-1 after running n''s migrations. Teams that skip this design step discover the gap during the worst
  possible moment: a production incident.'
- 'Canary deployment routes a small percentage of traffic (typically 1–5%) to the new version before full
  rollout. The WHY is that production traffic has properties — distribution of user devices, geographic
  latency, data edge cases — that staging never replicates. A canary exposes real error rates and latency
  regressions with bounded blast radius before 100% exposure. The critical design decision is the promotion
  criteria: canaries without automated rollback thresholds (error rate > X%, p99 latency > Y ms) degrade
  into manually-watched deploys that block engineering velocity. Pairing canary with feature flags lets
  you decouple code deploy from feature exposure entirely.'
- 'GitHub Actions reusable workflows (workflow_call trigger) and composite actions serve different purposes
  that are frequently confused. Reusable workflows are full workflow files called from another workflow
  — they run in their own job context with isolated runners and secrets. Composite actions are steps bundled
  into a single action — they run inside the calling job. The WHY this matters: reusable workflows enforce
  stronger isolation and can run parallel jobs internally; composite actions share the job''s environment
  and are better for step-level DRY code. Teams that implement organization-wide CI standards should use
  reusable workflows so security policies (OIDC token scopes, secret access) are enforced at the workflow
  boundary, not the step boundary.'
- 'GitHub Actions OIDC tokens replace long-lived credentials for cloud provider access (AWS, GCP, Azure).
  The WHY: traditional service account keys or AWS access keys stored as GitHub secrets are long-lived
  — a compromised secret is valid until manually rotated, often weeks or months later. OIDC tokens are
  short-lived (15-minute TTL), scoped to specific repository/branch/environment conditions, and require
  no stored secrets in GitHub at all. The cloud provider validates the JWT issued by GitHub''s OIDC provider
  against configurable trust policies (e.g., only the main branch of repo X can assume role Y). This eliminates
  the entire class of leaked credential incidents from CI/CD pipelines.'
- 'Build log analysis for flaky test detection requires structured logging rather than unstructured text.
  The WHY: unstructured ''test failed'' lines require regex parsing that breaks across runner OS versions,
  test framework updates, and log format changes. Structured test result formats (JUnit XML, pytest JSON
  report, Go''s -json flag) provide machine-readable pass/fail/duration per test case that can be aggregated
  across runs to compute flakiness scores (failure rate over rolling window). GitHub Actions Test Summary
  uploads JUnit XML and renders it in the workflow summary UI. Teams that instrument CI with test result
  artifacts can build flakiness dashboards and proactively quarantine tests before they block trunk.'
- 'Pulumi enables Infrastructure as Code using real programming languages (TypeScript, Python, Go, C#)
  instead of DSLs. The capability this unlocks versus Terraform HCL: real loops, conditionals, functions,
  and imports — eliminating the workarounds required for dynamic resource generation in HCL. The trade-off
  is that Pulumi stacks are harder to audit for non-engineers because the infrastructure intent is buried
  in code rather than declarative resource blocks. The recommended pattern for teams with mixed engineering/ops
  ownership is Pulumi for application-layer infrastructure (per-service resources) and Terraform/CDK for
  platform-layer infrastructure (VPCs, IAM boundaries) where auditability by security teams matters more
  than expressiveness.'
- 'Docker multi-stage builds dramatically reduce production image size and attack surface by separating
  build-time dependencies from runtime artifacts. The WHY: a Node.js app built in a full node:20 image
  includes npm, build tools, and source code (~1GB+); a multi-stage build that copies only the compiled
  output into node:20-alpine produces images under 100MB. The security implication is equally important:
  every tool in the image is a potential attack vector post-compromise. The best practice is to use a
  build stage with the full SDK, a test stage for CI validation, and a final runtime stage based on distroless
  or alpine with only the binary/bundle. Layer caching strategy (copying package.json before source code)
  keeps incremental builds fast.'
- 'Grafana alerting rules should be written against recording rules (precomputed PromQL expressions) rather
  than raw metrics for production alert reliability. The WHY: alert rules that query raw high-cardinality
  metrics at evaluation time can cause query timeouts during the exact incident scenarios when alerting
  is most critical — a cardinality spike that triggers an alert can also make the alert evaluation query
  time out, creating an alert black hole. Recording rules precompute expensive aggregations on a schedule
  (typically 1-5m) so alert evaluation queries are fast and bounded. The pattern is: write a recording
  rule for every alert expression that touches cardinality >10k time series, then alert on the recording
  rule metric.'
- 'Rolling deployment strategy replaces instances incrementally without maintaining a duplicate environment,
  making it the most cost-efficient zero-downtime deployment approach. The WHY it fails without proper
  configuration: if maxUnavailable is set too high, the application runs with reduced capacity during
  the deployment window, causing latency spikes under normal load. If readiness probes have too-short
  initialDelaySeconds, new pods receive traffic before warming up, causing errors. The recommended configuration
  for stateless services: maxSurge=25%, maxUnavailable=0 (ensures capacity never drops), readiness probe
  with initialDelaySeconds matching p95 cold-start time. For stateful services with database migrations,
  rolling deployments require backward-compatible schema changes (expand-contract pattern) to support
  two code versions simultaneously.'
- 'A complete release automation pipeline for semantic versioning combines: conventional commits (feat/fix/chore
  prefixes) → automated changelog generation (semantic-release, release-please) → version bump → GitHub
  Release creation → artifact publish → deployment trigger. The WHY this matters as a complete assembly:
  teams that automate only parts of this pipeline (e.g., changelog generation but not version bumping,
  or release creation but not deployment trigger) create hybrid workflows where some steps require manual
  intervention, defeating the automation goal. semantic-release and release-please both implement the
  full pipeline but with different models: semantic-release executes directly in CI; release-please creates
  a ''release PR'' for human approval before publishing, providing a review gate.'
- 'GitHub Actions job matrices let a single workflow definition test across multiple OS/runtime/config
  combinations in parallel. The key design insight is using matrix.include and matrix.exclude for asymmetric
  combinations rather than the full Cartesian product. The WHY: a matrix of 4 OS × 4 runtime versions
  = 16 jobs; but often only certain combinations are valid (e.g., Windows only tests against the LTS runtime).
  Using the full product wastes minutes and quota on meaningless combinations. The fail-fast: true default
  means one matrix failure cancels all others — for nightly builds this is wrong (you want to see all
  failures); for PR gates it is correct (fail fast to save minutes when any combination breaks).'
