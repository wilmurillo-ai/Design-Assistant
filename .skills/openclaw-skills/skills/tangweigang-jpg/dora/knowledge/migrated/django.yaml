  query methods: Article.published.all() instead of Article.objects.filter(status=''published''). Using
  get_...'
constraints:
- 'Django''s deployment checklist (manage.py check --deploy) validates: DEBUG=False, SECRET_KEY strength,
  ALLOWED_HOSTS, HTTPS settings (SECURE_SSL_REDIRECT, HSTS), cookie security (SESSION_COOKIE_SECURE, CSRF_COOKIE_SECURE).
  UNSAID: ALLOWED_HOSTS=[''*''] in production is a Host header injection vulnerability. Static files must
  be served by the web server or CDN (not Django''s development server) — collectstatic gathers them to
  STATIC_ROOT. WhiteNoise is the simplest solution for serving static files from Django in production
  without a separate web server. Extraction signal: applications deploying to production without running
  manage.py check --deploy have unknown security misconfigurations.'
- 'The N+1 query problem: fetching 100 blog posts and then accessing post.author in a template fires 101
  queries (1 for posts + 1 per post for author). Fix: Post.objects.select_related(''author'') for ForeignKey/OneToOne
  (SQL JOIN). Post.objects.prefetch_related(''tags'') for ManyToMany/reverse FK (separate query + Python
  join). Detection: django-debug-toolbar shows duplicate queries. django-silk profiles them. UNSAID: prefetch_related
  with a custom queryset uses Prefetch() object. Extraction signal: any view doing DB access inside a
  template loop is likely N+1.'
- 'Django signals (pre_save, post_save, post_delete) are synchronous and fire in the same transaction.
  They''re used for side effects: audit logging, cache invalidation, sending emails. UNSAID: signals are
  invisible coupling — no type checker can trace them. post_save signal calling external APIs will delay
  saves and fail if the API is down. post_save fires even within transactions that will be rolled back
  — the signal handler may see data that never ends up in the DB. Best practice: use on_commit() for side
  effects that must only happen if the transaction commits.'
- 'Django wraps each request in an atomic transaction by default (ATOMIC_REQUESTS=True). UNSAID: this
  means a slow request holds a DB transaction open for its entire duration, blocking other queries that
  need row locks. For requests that do heavy computation and then a final write, use transaction.atomic()
  only around the write block. Also: exceptions inside @transaction.atomic rollback the transaction —
  raising an exception in a signal handler rolls back the entire parent transaction. Side effects (emails,
  external API calls) inside transactions are dangerous because they execute even if the transaction is
  later rolled back. on_commit() defers code until after successful commit.'
- 'Django ORM N+1 deep patterns beyond basic select_related: (1) Reverse FK relations — Post.objects.prefetch_related(''comments'')
  prefetches all comments in one query; (2) Nested relations — prefetch_related(''comments__author'')
  chains prefetches; (3) Annotations instead of properties — annotate(comment_count=Count(''comments''))
  adds a computed field in SQL, avoiding Python-side aggregation loops; (4) Only/defer — .only(''id'',
  ''title'') fetches fewer columns, avoiding expensive text fields; (5) values_list() for bulk ID extraction
  without model instantiation overhead. UNSAID: prefetch_related with a filtered Prefetch() object is
  the only way to apply WHERE conditions to prefetched relations — Post.objects.prefetch_related(Prefetch(''comments'',
  queryset=Comment.objects.filter(approved=True))). Using Python filtering after prefetch defeats the
  purpose (all data is fetched then filtered in Python).'
- 'Django migration strategy for zero-downtime deployments: the naive approach (add non-nullable column
  → deploy) causes downtime because the migration adds the column with NOT NULL before the new code is
  deployed. Safe three-phase pattern: Phase 1 — add nullable column (no default required, existing rows
  get NULL), deploy; Phase 2 — backfill with a data migration or management command, add application-level
  default in code; Phase 3 — add DB-level NOT NULL constraint (fast if all rows filled) and remove nullable.
  UNSAID: Django''s migration framework does NOT automatically detect that removing a field from the model
  is a breaking change for running instances — the old code reading the dropped column will get AttributeError
  until fully redeployed. Extraction signal: projects that run migrate before deploying new code can safely
  add nullable columns; projects that deploy code before migrate can safely read new nullable columns
  as None.'
- 'Django signals anti-patterns: (1) Connecting signals in models.py at module level — signals are connected
  every time the module is imported, leading to duplicate handler calls if the module is imported multiple
  times (rare but possible in test setups); correct location is AppConfig.ready(); (2) Signals for business
  logic — signals create invisible coupling that breaks the ''explicit is better than implicit'' principle;
  business logic in signal handlers is untestable in isolation; (3) post_save for external side effects
  — the signal fires inside the transaction; if the external call fails, the transaction is already committed;
  use on_commit() callback to defer external calls until after commit; (4) Circular signal chains — A.post_save
  triggers B.save() which triggers B.post_save which triggers A.save(). UNSAID: Django doesn''t protect
  against signal recursion — add a ''dispatch_uid'' parameter to prevent duplicate registration and guard
  against circular chains with a flag.'
- 'Django ORM uses an Active Record pattern — each model instance represents a DB row. QuerySets are lazy:
  they don''t hit the DB until evaluated (iteration, slicing, len(), bool()). This means chaining .filter().exclude().order_by()
  doesn''t query the DB. UNSAID: QuerySets are ALSO cached — calling list(qs) evaluates and caches; qs[0]
  re-evaluates. This leads to the classic N+1 problem: iterating over objects and accessing related objects
  in a loop fires one query per iteration. select_related() and prefetch_related() are the fix.'
- 'Django migrations track schema changes as Python code. makemigrations generates them; migrate applies
  them. Migrations must be committed to version control — they ARE the schema history. UNSAID: squashmigrations
  compresses migration history for large projects. Data migrations (RunPython) mix schema and data changes
  — dangerous in production if the migration times out or fails halfway. Zero-downtime migration pattern:
  (1) add nullable column, (2) deploy and backfill, (3) make non-nullable. Extraction signal: migrations
  with direct SQL (RunSQL) indicate the ORM couldn''t express the change.'
- 'Django uses a single settings.py by convention, but production projects should split settings: base.py
  (common), local.py (development overrides), production.py (production config). The DJANGO_SETTINGS_MODULE
  environment variable selects which to use. SECRET_KEY, DATABASE_URL, and API keys must come from environment
  variables, never be hardcoded. UNSAID: django-environ or python-decouple are common libraries for reading
  env vars with type coercion. Extraction signal: SECRET_KEY hardcoded in settings.py is a security vulnerability
  and indicates the project is not production-ready.'
- 'Django REST Framework serializers are the layer between Python objects and JSON. ModelSerializer auto-generates
  fields from a Model. UNSAID: serializers run validation in two phases — field-level (validate_<fieldname>)
  then object-level (validate()). read_only_fields prevents clients from overwriting server-set fields
  (created_by, updated_at). SerializerMethodField for computed fields. The create() and update() methods
  must be explicitly overridden for nested writable serializers — DRF doesn''t auto-handle nested creates.
  Extraction signal: DRF serializers with nested writable data that don''t override create()/update()
  will silently ignore nested object changes.'
- 'DRF ViewSets combine CRUD operations into a single class. ModelViewSet provides list, create, retrieve,
  update, partial_update, destroy. Routers auto-generate URL patterns from ViewSets. UNSAID: the get_queryset()
  method is the correct place to filter data by the current user — overriding it ensures every action
  (list, retrieve, update, delete) is filtered. Not overriding get_queryset() and relying only on object-level
  permissions leaves list endpoints leaking all users'' data. Extraction signal: ViewSets with permission_classes
  but without user-scoped get_queryset() likely expose cross-user data in list views.'
- 'Django''s cache framework supports multiple backends: Redis (django-redis), Memcached, filesystem,
  in-memory. Cache is configured in CACHES setting. cache.set(key, value, timeout), cache.get(key), cache.delete(key).
  Django''s per-view cache (@cache_page) and per-site cache are higher-level. UNSAID: cache invalidation
  is the hardest part — stale cache causes data inconsistency bugs that are hard to reproduce. Pattern:
  cache-aside (read from cache, fallback to DB, write to cache). django-cacheops provides ORM-level automatic
  invalidation. Extraction signal: applications with cache.set() but no cache.delete() on data mutations
  will serve stale data.'
- 'Django''s security defaults: CSRF protection (CSRFMiddleware) is on by default for all POST/PUT/DELETE
  forms. Same-origin cookie policy prevents CSRF. XSS protection via template auto-escaping. Clickjacking
  protection via X-Frame-Options header. UNSAID: @csrf_exempt is a security downgrade — use it only for
  webhook endpoints that can''t send CSRF tokens (and verify a shared secret instead). Django''s DEBUG=True
  in production disables security headers and exposes tracebacks to browsers — a critical misconfiguration.
  Extraction signal: DEBUG=True in production settings is a critical security issue that must be caught
  in deployment checks.'
- 'Django + Celery integration: create a celery.py in the project package, call app.config_from_object(''django.conf:settings'',
  namespace=''CELERY''), and autodiscover tasks with app.autodiscover_tasks(). UNSAID: Django ORM can
  be used in Celery tasks because Celery workers load Django settings via DJANGO_SETTINGS_MODULE. But
  tasks must call django.setup() if run outside the Celery worker. Database connections are NOT shared
  between Django request threads and Celery workers — each worker has its own connection pool. close_old_connections()
  should be called at the start of long-running tasks to avoid using stale connections. Extraction signal:
  Celery tasks that use Django models without proper setup cause ''Apps aren''t loaded yet'' errors.'
- 'Django TestCase wraps each test in a transaction that is rolled back after the test — fast but means
  signals and on_commit() don''t fire. TransactionTestCase truncates tables after each test — slower but
  tests real transaction behavior. UNSAID: mixing TestCase and TransactionTestCase in the same test suite
  causes ordering issues. factory_boy is the preferred fixture library over Django fixtures (JSON files)
  because fixtures are brittle with schema changes. pytest-django provides a django_db mark that''s more
  idiomatic with pytest. Extraction signal: projects that use loaddata for test fixtures will have failing
  tests after every migration that changes the data shape.'
- 'Django async views (Django 4.1+): define a view as ''async def my_view(request)'' and Django will run
  it in an async context using ASGI. Async class-based views override async def get()/post(). Django''s
  ORM remains synchronous by default — use sync_to_async() wrapper or the async QuerySet API (Django 4.1+
  adds afilter(), aget(), acreate(), acount(), etc.) to avoid blocking the event loop. WHY async views
  matter: for views that make multiple external API calls, async allows concurrent fetching (asyncio.gather)
  in a single view, reducing response time from sum-of-calls to max-of-calls. UNSAID: mixing sync ORM
  calls and async views causes Django to emit a SynchronousOnlyOperation error when running under ASGI
  — this is intentional to prevent accidental event loop blocking. Extraction signal: Django projects
  running under ASGI (Daphne, Uvicorn) that use sync ORM calls in async views will fail with SynchronousOnlyOperation.'
- 'Django REST Framework advanced patterns: (1) Custom authentication — implement BaseAuthentication.authenticate()
  returning (user, token) tuple or None; (2) Throttling — AnonRateThrottle/UserRateThrottle with DEFAULT_THROTTLE_RATES
  in settings; custom throttles override get_cache_key(); (3) Filtering — DjangoFilterBackend (django-filter
  package) for URL query parameter filtering; SearchFilter for full-text; OrderingFilter for sort; (4)
  Pagination — PageNumberPagination, LimitOffsetPagination, CursorPagination (most scalable — uses opaque
  cursor, consistent results even with concurrent inserts); (5) Versioning — URLPathVersioning (v1/, v2/)
  or AcceptHeaderVersioning. UNSAID: CursorPagination requires the queryset to have a stable ordering
  — without ORDER BY, cursor results are non-deterministic and will return duplicates or skip rows. Extraction
  signal: DRF list views with LimitOffset pagination on large tables without a DB index on the ordering
  column will degrade to full table scans.'
- 'Django + Celery production integration patterns: (1) Use django-celery-results to store task results
  in the Django DB — avoids a separate Redis result backend; (2) Use django-celery-beat for periodic tasks
  stored in DB (editable via admin) instead of static celerybeat_schedule; (3) Task idempotency — Celery
  guarantees at-least-once delivery; tasks that write to DB must use update_or_create or check existence
  before creating; (4) Task chaining — chain(fetch_data.s(), process.s(), save.s()) builds a pipeline;
  chord() for fan-out/fan-in; (5) close_old_connections() at task start prevents using stale DB connections
  that were created before the worker forked. WHY at-least-once matters: a task can execute twice if the
  worker crashes after completing but before acknowledging the broker. Idempotent tasks are safe to retry;
  non-idempotent tasks (send email, charge card) need deduplication logic with a unique task ID stored
  in the DB.'
