constraints:
- 'Flask''s session object uses a client-side signed cookie by default. Session data is stored in the
  cookie itself (not the server), signed with SECRET_KEY. This means: (1) session data is visible to the
  user (just base64-decoded), (2) session data is limited to ~4KB (cookie size limit), (3) you cannot
  invalidate sessions server-side without a server-side session store. UNSAID: Flask-Session extension
  adds server-side sessions (Redis, filesystem, DB). Financial or auth-sensitive apps that need immediate
  session revocation MUST use server-side sessions. Extraction signal: Flask apps using default client-side
  sessions for sensitive user data cannot enforce logout.'
- 'Flask''s request, g, session, and current_app are context-local proxies, not real objects. They only
  work within an active request context or application context. Accessing them outside a request (e.g.,
  in background threads, startup code, CLI commands) raises RuntimeError. Anti-pattern: passing request.form
  or session data to background threads — the context is torn down before the thread reads the data. Correct
  pattern: extract the data from the context before spawning the thread.'
- 'FastAPI middleware wraps the entire request/response cycle. Middleware is applied in REVERSE order
  of addition — last added runs first for requests, first for responses. UNSAID: adding CORSMiddleware
  AFTER other middleware that might return early (like auth) can cause CORS failures on preflight OPTIONS
  requests, because the auth middleware blocks before CORS headers are added. CORS middleware must typically
  be the OUTERMOST (first added) middleware. Extraction signal: CORS issues in production but not development
  often trace to middleware ordering.'
- 'FastAPI''s response_model parameter filters output fields and handles serialization, but it does NOT
  prevent sensitive fields from reaching the response if used incorrectly. Using response_model=UserInDB
  where UserInDB has a hashed_password field exposes the hashed password. Correct pattern: define a separate
  UserOut model without sensitive fields, use response_model=UserOut. UNSAID: Pydantic''s model_config
  = ConfigDict(from_attributes=True) is required for SQLAlchemy models in Pydantic v2. Extraction signal:
  response models that inherit from DB models without exclusion are a data leakage risk.'
- 'Flask''s before_request and teardown_request hooks are global — they run for ALL requests including
  static files and health checks. A before_request that opens a DB connection will open one for every
  asset request. UNSAID: use request.endpoint check inside before_request to skip setup for unwanted routes.
  Flask-SQLAlchemy''s session management uses these hooks internally — this is why flask_sqlalchemy works
  ''magically'' but also why you see DB connections even for non-DB routes. Extraction signal: Flask apps
  with high connection pool exhaustion often have DB setup in before_request without route filtering.'
- 'Flask''s test client (app.test_client()) handles requests synchronously and in-process. UNSAID: the
  test client does NOT start the actual server — it calls the WSGI application directly. This means: network-level
  bugs (timeouts, connection pool behavior) are not tested. Also, session management in tests requires
  app.test_request_context() or the test client''s session_transaction() method — accessing flask.session
  outside these contexts raises RuntimeError. Extraction signal: Flask tests that try to access flask.session
  directly without a request context will fail with ''Working outside of request context''.'
- 'Flask and FastAPI background task anti-patterns: (1) Flask''s threading.Thread in a request handler
  — the request context is torn down when the response is sent, so accessing flask.g or current_app in
  the thread raises RuntimeError; correct fix is app.app_context().push() in the thread; (2) FastAPI BackgroundTasks
  are fire-and-forget with no retry — if the task raises an exception, it is logged but the caller gets
  no notification; (3) Spawning asyncio.create_task() inside a FastAPI route without tracking it creates
  a ''detached'' task — if the event loop shuts down, the task is cancelled mid-execution without cleanup;
  use lifespan-managed task sets or background task queues instead. UNSAID: the correct architecture for
  reliable background work is an external task queue (Celery, ARQ, RQ) with a worker process — this survives
  server restarts and provides retry semantics that in-process solutions cannot.'
- 'FastAPI is built on Starlette (ASGI) + Pydantic (validation) + Python type hints. Its entire design
  philosophy is: use standard Python type annotations to drive automatic validation, serialization, and
  OpenAPI documentation. There is no ''magic'' — each route''s parameter types determine whether it comes
  from path, query, body, header, or cookie. Key mental model: FastAPI is a thin layer; most complexity
  lives in Pydantic models and dependency injection. Extraction signal: unusual route parameters or complex
  business logic NOT in Pydantic models indicates a team that hasn''t fully internalized FastAPI''s design.'
- 'Flask is a WSGI micro-framework: no ORM, no auth, no form validation built in. Its philosophy is ''batteries
  not included'' — compose your own stack. Flask uses a global application context (app_ctx) and request
  context (req_ctx) via thread-locals. This is radically different from FastAPI''s dependency injection.
  UNSAID: Flask''s g object and current_app proxy work because of werkzeug''s LocalStack. Extraction signal:
  Flask projects with heavy SQLAlchemy integration typically use flask_sqlalchemy for session management
  within request contexts, not raw SQLAlchemy sessions.'
- 'FastAPI''s Depends() system is its most powerful feature. Dependencies can be: functions, classes with
  __call__, sub-dependencies (nested Depends). FastAPI caches dependency results per request by default
  (use_cache=True). Common patterns: auth token validation, DB session injection, rate limiting, pagination.
  UNSAID: Depends() can yield (generator) to run teardown code after the response — this is the correct
  way to close DB sessions. Using a plain function that returns a session without yield leaks connections.'
- 'FastAPI uses Pydantic v2 (Rust-accelerated) for request/response validation. Request bodies must be
  Pydantic BaseModel subclasses. Response models use response_model= parameter. Field() provides validators,
  defaults, aliases, examples. UNSAID: Pydantic v2 is NOT backward compatible with v1 — model.dict() became
  model.model_dump(), parse_obj() became model.model_validate(). Many older tutorials show v1 API. Extraction
  signal: projects mixing .dict() and .model_dump() are mid-migration between Pydantic versions.'
- 'FastAPI''s BackgroundTasks runs functions AFTER the response is sent, in the same process. These are
  NOT task queues — they''re simple post-response hooks. BackgroundTasks are suitable for: email sending,
  cache invalidation, audit logging. NOT suitable for: long-running jobs, retryable tasks, jobs that need
  persistence. For real async task processing, projects use Celery, ARQ, or Dramatiq. Extraction signal:
  BackgroundTasks used for DB writes or external API calls that must not fail is an architectural risk
  — if the server crashes, the task is lost.'
- 'Flask Blueprints organize routes into modular components, registered on the app with a URL prefix.
  Blueprint-specific template folders, static files, and error handlers are possible. Common pattern:
  api/v1/ Blueprint, auth/ Blueprint, admin/ Blueprint. UNSAID: Blueprints don''t isolate state — db.session
  is still global, app config is still shared. Large Flask apps often use the Application Factory pattern
  (create_app()) to enable testing with different configs and prevent circular imports between extensions.'
- 'FastAPI''s lifespan context manager (Python 3.9+ recommended) handles startup and shutdown events.
  Replaces the deprecated @app.on_event(''startup''). Use lifespan for: creating connection pools, loading
  ML models, initializing caches. UNSAID: code in lifespan runs in the main thread before workers start
  — avoid heavy blocking I/O. In production with Gunicorn+Uvicorn workers, lifespan runs once per worker,
  NOT once per deployment. Extraction signal: projects that create DB connection pools in lifespan are
  doing it correctly.'
- 'FastAPI JWT authentication pattern: use python-jose or PyJWT for token creation/verification; inject
  the current user via a Depends(get_current_user) dependency that decodes the token. The dependency returns
  the user object or raises HTTPException(401). UNSAID: store the secret key in environment variables,
  never in code. JWTs are signed, not encrypted — the payload is base64-encoded and readable by anyone.
  Never put sensitive data (passwords, PII) in JWT payload. Use short-lived access tokens (15 min) + long-lived
  refresh tokens (7 days) stored in httpOnly cookies to prevent XSS theft. Extraction signal: JWTs with
  no expiry or multi-day access tokens are security anti-patterns.'
- 'SQLAlchemy 2.0 async with FastAPI: use AsyncSession from sqlalchemy.ext.asyncio, create an async engine
  with create_async_engine(), inject sessions via async generator Depends. Pattern: async def get_db()
  -> AsyncGenerator[AsyncSession, None]: async with AsyncSessionLocal() as session: yield session. UNSAID:
  SQLAlchemy 2.0''s new-style query API uses session.execute(select(Model).where(...)) instead of session.query(Model).
  Mixing 1.x and 2.0 APIs in the same codebase causes confusion; 1.x legacy API still works but is deprecated.
  Extraction signal: projects using session.query() with an async engine are using the legacy API — functional
  but not idiomatic 2.0.'
- 'WSGI vs ASGI is the fundamental divide between Flask and FastAPI deployment models. WSGI (Flask, Django)
  is synchronous: one request handled per worker thread/process at a time. ASGI (FastAPI, Starlette) is
  asynchronous: one worker can handle thousands of concurrent connections via the event loop. This means:
  Flask needs many Gunicorn workers for concurrency; FastAPI needs fewer Uvicorn workers but they must
  never block. Extraction signal: running FastAPI behind a WSGI server (Gunicorn without Uvicorn workers)
  works but defeats async benefits — all requests become synchronous.'
- 'Flask application factory pattern with extensions: create_app() initializes Flask, then calls db.init_app(app),
  migrate.init_app(app, db), login_manager.init_app(app). Extensions are initialized outside the factory
  function (db = SQLAlchemy()) so they can be imported elsewhere without circular imports. UNSAID: this
  pattern is REQUIRED for testing — test fixtures call create_app(testing_config) to get a fresh app instance
  with test DB. Apps that initialize extensions at module scope (db = SQLAlchemy(app)) cannot be tested
  with different configs. Extraction signal: Flask projects that can''t run tests with a test database
  are using the non-factory pattern.'
- 'FastAPI streaming responses: use StreamingResponse with a generator for large files or real-time data.
  Server-Sent Events (SSE) send text/event-stream; WebSockets (app.websocket()) provide full duplex. UNSAID:
  StreamingResponse bypasses FastAPI''s response_model validation — the generator yields raw bytes or
  strings. For LLM streaming (token-by-token output), SSE is the right choice because it works through
  HTTP/1.1 without upgrade; WebSocket is overkill if the server never needs to receive data during streaming.
  Extraction signal: projects that buffer entire LLM responses before sending are wasting latency that
  streaming would eliminate.'
- 'FastAPI Router-level dependencies apply to all routes in a router: router = APIRouter(dependencies=[Depends(verify_token)]).
  This is the correct pattern for applying auth to an entire API section without repeating it on every
  endpoint. UNSAID: router-level dependencies run but their RETURN VALUES are not injected into route
  functions — they''re used for side effects (auth check, rate limiting). To get the return value (e.g.,
  current user), use endpoint-level Depends. Extraction signal: projects that copy-paste Depends(verify_token)
  on every endpoint instead of using router-level deps have maintenance debt.'
- 'FastAPI''s exception handlers provide centralized error responses. @app.exception_handler(RequestValidationError)
  catches Pydantic validation errors and can return custom 422 responses. @app.exception_handler(HTTPException)
  overrides default HTTP error format. UNSAID: custom exception handlers that catch Exception broadly
  can mask programming errors — always log the exception before returning a sanitized response. In production,
  return generic error messages; log the full traceback server-side. Extraction signal: APIs that return
  Python stack traces to clients expose implementation details and are security risks.'
- 'Gunicorn + Uvicorn workers is the standard FastAPI production deployment: gunicorn -w 4 -k uvicorn.workers.UvicornWorker
  myapp:app. Gunicorn handles process management, worker restarts, and graceful shutdown; Uvicorn workers
  handle the actual ASGI event loop. UNSAID: running uvicorn directly in production without a process
  manager means no automatic worker restart on crash. Number of workers: (2 × CPU cores) + 1 is the recommended
  formula. Using --preload with Gunicorn loads the app once in the master process then forks — beneficial
  for large models but problematic if the app has fork-unsafe resources (open sockets). Extraction signal:
  uvicorn started directly without Gunicorn in production has no crash recovery.'
- 'FastAPI advanced dependency injection patterns: (1) Class-based dependencies with __init__ enable configuration
  — RateLimiter(calls=100, period=60) creates a reusable dependency instance; (2) Sub-dependencies are
  automatically resolved — if get_db depends on get_settings, FastAPI chains them; (3) use_cache=False
  forces re-execution per injection point even within the same request — needed when side effects matter
  (e.g., logging each access); (4) Security dependencies (HTTPBearer, OAuth2PasswordBearer) auto-generate
  OpenAPI security schemes. WHY dependency injection beats global state: each request gets its own dependency
  instances, enabling clean teardown via yield, testability via override, and parallel-safe isolation.
  UNSAID: app.dependency_overrides[get_db] = get_test_db is the correct pattern for injecting test databases
  — it''s cleaner than monkeypatching and scoped to the FastAPI app instance.'
- 'FastAPI WebSocket handling: app.websocket(''/ws/{client_id}'') accepts a WebSocket parameter. Lifecycle:
  await websocket.accept(), then loop receiving with await websocket.receive_text() or receive_json(),
  send with await websocket.send_text(). Disconnect is signaled by WebSocketDisconnect exception — must
  be caught to clean up connection state. For broadcasting to multiple clients, maintain a ConnectionManager
  class with a list of active WebSocket objects. WHY WebSocket over SSE: WebSocket is bidirectional —
  the client can send data during the connection. SSE is server-push only. Use WebSocket for chat, collaborative
  editing, real-time games; use SSE for LLM token streaming, progress notifications. UNSAID: WebSocket
  connections bypass FastAPI''s response_model and middleware authentication — authentication must be
  done inside the websocket handler using a token passed as a query parameter or in the first message.'
- 'FastAPI middleware chain design: Starlette BaseHTTPMiddleware is the simple path but has a known performance
  issue — it buffers the entire response body before passing it down, breaking streaming responses. For
  streaming-compatible middleware, implement ASGI middleware directly as a class with async def __call__(self,
  scope, receive, send). Order matters: add_middleware() wraps in LIFO — last added is outermost. Canonical
  order: TrustedHostMiddleware → HTTPSRedirectMiddleware → CORSMiddleware → GZipMiddleware → custom auth
  middleware → routes. UNSAID: BaseHTTPMiddleware breaks Server-Sent Events and WebSocket upgrades in
  some configurations because it intercepts the initial HTTP response before the protocol upgrade. Pure
  ASGI middleware that passes scope/receive/send through unchanged avoids this.'
- 'Testing FastAPI with httpx.AsyncClient: use ''async with AsyncClient(app=app, base_url="http://test")
  as client:'' for async tests. pytest-asyncio enables async test functions. Override dependencies in
  tests: app.dependency_overrides[get_db] = lambda: test_session. Use httpx.MockTransport to mock external
  HTTP calls without starting servers. WHY httpx over TestClient for async apps: FastAPI''s synchronous
  TestClient runs the ASGI app in a thread, which means truly async behavior (background tasks, lifespan
  events) may behave differently than production. AsyncClient runs in the same event loop as the test,
  giving accurate async behavior. UNSAID: TestClient is simpler for synchronous testing and is fine for
  most route tests. Use AsyncClient specifically when testing WebSockets, SSE endpoints, or when background
  task timing matters.'
- 'FastAPI OpenAPI customization: (1) app = FastAPI(title, description, version, docs_url, redoc_url,
  openapi_url) — set docs_url=None to disable Swagger UI in production; (2) operation-level: @router.get(''/path'',
  summary, description, tags, response_description, deprecated=True); (3) Custom OpenAPI schema: override
  app.openapi() to inject security schemes, custom extensions, or remove internal endpoints; (4) Response
  examples via Annotated[Model, Body(example={...})] or model_config examples. WHY OpenAPI matters beyond
  docs: the /openapi.json endpoint is used by SDK generators, API gateways (Kong, AWS API Gateway), and
  contract testing tools. Disabling it in production prevents schema scraping but also breaks automated
  integration. UNSAID: FastAPI generates OpenAPI 3.1 (as of 0.99+). Some older tools only support OpenAPI
  3.0 — if a partner''s code generator fails, check the version mismatch first.'
- 'Uvicorn/Gunicorn production tuning: (1) worker count: (2 × CPU_count) + 1 for CPU-bound, higher for
  I/O-bound ASGI apps; (2) --timeout 30 kills workers that don''t respond — set higher for long-running
  LLM calls; (3) --graceful-timeout 30 for clean shutdown; (4) --max-requests 1000 --max-requests-jitter
  50 recycles workers to prevent memory leaks; (5) UVICORN_WORKERS env var works with fastapi[standard]
  (uvicorn[standard]); (6) Use --log-level warning in production — info logs every request, adding I/O
  overhead. WHY --max-requests matters: Python long-running processes accumulate memory from cached objects
  and connection pools. Periodic worker recycling returns memory to OS and prevents slow memory leaks
  from growing indefinitely. UNSAID: Gunicorn with UvicornWorker in a Docker container with a single CPU
  should use 1-2 workers, not the 2*CPU+1 formula — CPU count in containers reflects host CPUs, not container
  quota.'
