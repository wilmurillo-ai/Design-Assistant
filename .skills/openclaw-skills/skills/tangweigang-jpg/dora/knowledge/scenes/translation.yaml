# 知识积木 v2 — 翻译与多语言处理
# 用途：文档/文本翻译、保留格式标记、多语言内容生成

# === 信封层（给系统看）===
id: translation-v1
name: 翻译与多语言处理
version: 1.0.0
category:
  - 语言处理
  - 内容生成
tags:
  - 翻译
  - 多语言
  - DeepL
  - LibreTranslate
  - Google Translate
  - RTL
  - Markdown
  - 格式保留
capability_type: transform
data_source: null

inputs:
  text:
    type: text
    required: true
    description: "待翻译的文本内容，支持纯文本/Markdown/HTML；最大 50000 字符"
    validation: "0 < len(value) <= 50000"
  source_lang:
    type: string
    required: false
    default: "auto"
    description: "源语言代码（ISO 639-1），如 'en'/'zh'/'ja'/'ko'/'ar'；
      'auto' 表示自动检测；自动检测对短文本（<20 字）不可靠"
  target_lang:
    type: string
    required: true
    description: "目标语言代码（ISO 639-1），如 'zh'/'en'/'fr'/'de'/'ja'；
      DeepL 使用变体代码：简体中文='ZH-HANS'，英式英语='EN-GB'"
  provider:
    type: enum
    required: false
    default: "libretranslate"
    description: "翻译提供商：libretranslate=开源自托管（免费），
      mymemory=MyMemory（1000 words/day 免费，email 注册可提升至 10000 words/day），
      deepl=DeepL（$4.99/mo Pro，500K chars/mo；免费层 500K chars/mo 亦可用），
      google=Google Translate API（$20/1M chars）"
    enum_values:
      - libretranslate
      - mymemory
      - deepl
      - google
  content_type:
    type: enum
    required: false
    default: "plain"
    description: "内容格式：plain=纯文本，markdown=保留 Markdown 语法，html=保留 HTML 标签"
    enum_values:
      - plain
      - markdown
      - html
  glossary:
    type: string
    required: false
    default: ""
    description: "JSON 格式的术语表，确保专业术语一致翻译，如 '{\"AI\": \"人工智能\", \"API\": \"API\"}'；
      DeepL 原生支持术语表功能，其他 provider 通过后处理替换实现"
  preserve_formatting:
    type: boolean
    required: false
    default: true
    description: "是否保留原文格式（换行/缩进/空白行）；
      true 时翻译按段落分割，维持段落结构；false 时整段传入，效率更高"
  libretranslate_url:
    type: string
    required: false
    default: "https://libretranslate.com"
    description: "LibreTranslate API 地址；自托管实例填写内网地址，如 'http://localhost:5000'；
      官方公共实例需要 API key（免费注册可获）"

outputs:
  translated_text:
    type: string
    description: "翻译后的文本，保留原始格式标记（Markdown/HTML）"
  detected_lang:
    type: string
    description: "检测到的源语言代码（source_lang=auto 时返回），如 'en'"
  char_count:
    type: integer
    description: "本次翻译消耗的字符数（用于配额追踪）"
  warnings:
    type: string
    description: "翻译质量警告，如专业术语未覆盖、RTL 语言检测、文本被截断等，每行一条"

requires: []
conflicts_with: []
compatible_with:
  - knowledge-base-v1
  - telegram-notifier-v1

# === 内容层（给 LLM 看）===
core_capability: >
  将文本翻译为目标语言，支持保留 Markdown/HTML 格式标记，通过术语表保证专业词汇一致性，
  覆盖免费（LibreTranslate/MyMemory）和付费（DeepL/Google）提供商。

constraints:
  - "LibreTranslate API 调用：
     POST {libretranslate_url}/translate，
     body: {q: text, source: src_lang, target: tgt_lang, format: 'html'/'text', api_key: key}；
     免费官方实例限流约 10 req/min，自托管无限制；
     API key 从环境变量 LIBRETRANSLATE_API_KEY 读取，不可硬编码"
  - "MyMemory API（provider=mymemory）：
     GET https://api.mymemory.translated.net/get?q={text}&langpair={src}|{tgt}&de={email}；
     免费额度：匿名 1000 words/day，注册邮箱 10000 words/day；
     注意：q 参数最长 500 字符，超出必须分段，join 前添加段间分隔符"
  - "DeepL API（provider=deepl）：
     使用 deepl-python 库（pip install deepl），不直接调用 HTTP；
     translator = deepl.Translator(os.environ['DEEPL_API_KEY'])；
     result = translator.translate_text(text, source_lang=src, target_lang=tgt)；
     target_lang 必须大写（'ZH-HANS'/'EN-GB'/'FR'），否则 ValueError；
     DeepL 免费账号 API 地址为 api-free.deepl.com，付费账号为 api.deepl.com，
     deepl-python 库自动处理，无需手动区分"
  - "Google Translate API（provider=google）：
     使用 google-cloud-translate 库 v3（pip install google-cloud-translate）；
     client = translate.TranslationServiceClient()；
     target_lang 使用 BCP-47 格式（'zh-CN'/'en-US'）而非 ISO 639-1；
     API key 通过环境变量 GOOGLE_CLOUD_CREDENTIALS_JSON 以服务账号形式认证"
  - "Markdown 格式保留（content_type=markdown）：
     翻译前用正则提取所有 Markdown 标记（**加粗**/*斜体*/`代码`/[链接](url)/![图片](url)/# 标题）；
     将标记替换为占位符（如 %%MARK_0%%），翻译后按占位符还原；
     代码块（```...```）和行内代码（`...`）内容不翻译，整体用占位符保护"
  - "HTML 格式保留（content_type=html）：
     LibreTranslate 和 DeepL 原生支持 HTML 格式（format='html'），无需手动处理；
     Google Translate 用 mime_type='text/html' 参数；
     MyMemory 不支持 HTML，需手动提取文本节点、翻译后回填（用 html.parser）"
  - "RTL 语言处理（target_lang 为 ar/he/fa/ur）：
     纯文本输出前添加 Unicode RTL 标记（\\u202b）并在 warnings 中提示；
     HTML 输出在根元素添加 dir='rtl' 属性；
     Markdown 无法直接支持 RTL，在 warnings 中明确提示"
  - "术语表应用（glossary 非空）：
     翻译完成后对输出做精确字符串替换；
     替换顺序：按术语长度降序（避免短词替换污染长词）；
     大小写不敏感匹配（re.IGNORECASE），但输出保留 glossary 中定义的大小写"
  - "文本长度限制：各 provider 单次请求限制不同：
     LibreTranslate: 5000 chars；MyMemory: 500 chars（需强制分段）；
     DeepL: 128KB per request（字节）；Google: 30000 chars；
     超过限制时自动按段落（\\n\\n）分割，逐段翻译后合并"
  - "配额追踪：每次翻译后将 char_count 累计记录到 ~/.doramagic/translation_quota.json
     按 provider 和日期分类，帮助用户了解免费额度剩余"
  - "【社区经验】DeepL 长文档静默截断：超长文档翻译时，DeepL 可能在中途停止输出而不报错，
     导致法律/财务条款等关键内容无声丢失；必须对比输出段落数与输入段落数，
     不一致时触发重试或警告（来源：bluente.com/blog/deepl-long-text-translation-problems）"
  - "【社区经验】DeepL tag_handling_version=v2 仅兼容 next-gen 模型：
     同时设置 model_type=latency_optimized 和 tag_handling_version=v2 会返回错误；
     tag_handling v2 会隐式强制 model_type=quality_optimized（来源：DeepL API docs）"
  - "【社区经验】机器翻译跨段上下文丢失导致代词指向歧义：
     分段翻译时前段主语在后段被错误代指，尤其在中译英时 '它/他/她' 的性别会错误生成；
     DeepL 支持 context 参数（前段末尾文字），其他 provider 在每段前附前段最后 2 句作为上下文前缀，
     翻译完成后从输出中截除（来源：naargmedia.com/challenges-in-machine-translation）"
  - "【社区经验】专业术语过度翻译：技术词汇（API/Webhook/SDK）被翻译为中文反而降低可读性；
     建议所有不应翻译的技术词汇在 glossary 中映射为自身（{'API': 'API', 'SDK': 'SDK'}），
     DeepL glossary feature 对常见技术词效果最佳（来源：sawadeetranslations.com）"
  - "【社区经验】DeepL 免费账号与付费账号 API endpoint 不同，混用导致 403 Forbidden：
     免费账号必须使用 api-free.deepl.com，付费账号使用 api.deepl.com；
     deepl-python 库自动处理，但直接 HTTP 调用时必须根据 key 是否以 ':fx' 结尾来选择 endpoint
     （来源：Drupal auto_translation #3526941）"
  - "【社区经验】DeepL API 对葡萄牙语 'PT' 代码已废弃，未指定变体时行为不确定：
     应明确使用 'PT-BR'（巴西）或 'PT-PT'（欧洲）；同样阿拉伯语和繁体中文目前不支持文档翻译，
     只支持文本翻译（来源：DeepL supported languages 文档）"
  - "【社区经验】Google Translate API 请求 URL 过长（大量文本放在 GET 参数）被 web server 拒绝：
     单次翻译文本超过约 2000 字符时应改用 POST 请求而非 GET；
     google-cloud-translate v3 SDK 默认已使用 POST，旧版 v2 SDK 需注意（来源：Google Translate API 文档）"
  - "【社区经验】Google Translate 对包含 {name}/%s 等占位符的字符串会修改或重排占位符：
     大括号内的文字可能被翻译，'%s' 可能被移位；
     翻译前将占位符替换为独特 UUID 标记（如 %%TOKEN_0%%），翻译后还原（来源：lokalise.com blog）"
  - "【社区经验】Google Translate 不支持正式/非正式语气选择：
     荷兰语/德语/法语等的 u/du/vous 等礼貌形式随机输出，同批翻译内语气不一致；
     若产品需要一致的语气，只能使用 DeepL（支持 formality 参数）或 GPT-4 进行后处理调整
     （来源：lokalise.com/blog Google Translate pitfalls）"
  - "【社区经验】LibreTranslate 1.6.3 版本因语言检测 bug 被 yanked，生产环境若使用该版本会静默检测错误：
     pip install libretranslate 默认拉取最新版本，若拉取到被 yanked 版本则语言检测完全失效；
     在 requirements.txt 中 pin 到已知稳定版本（来源：LibreTranslate GitHub issue #395）"
  - "【社区经验】LibreTranslate 自托管添加新语言后，auto-detect 不自动识别新语言：
     仅翻译功能可用，自动检测缓存没有刷新；需重启服务使语言模型重新加载（来源：LibreTranslate Community 2024）"
  - "【社区经验】MyMemory 分段翻译时段间拼接处产生多余空格或标点重复：
     每段翻译结果尾部和下一段开头之间需要智能合并；
     简单 ''.join(segments) 会丢失段间空格，' '.join() 又会在标点前多加空格；
     使用正则 re.sub(r'\\s+([。，.!?，！？])', r'\\1', joined_text) 清理多余空格（来源：MyMemory API 文档）"
  - "【社区经验】DeepL 对阿拉伯语和希伯来语（RTL 语言）翻译质量明显低于欧洲语言：
     DeepL 主要优化了欧洲语言对，RTL 语言支持是二等公民；
     RTL 语言场景推荐 fallback 到 Google Translate 或 Azure Translator（来源：eesel.ai/blog/deepl-review）"
  - "【社区经验】LibreTranslate 公共实例因滥用频繁触发 429，且响应体格式为 {'error': 'Too many requests'}
     与正常翻译响应格式不同（正常为 {'translatedText': ...}）；
     必须检测 response.json().get('error') 字段，不可只看 HTTP 状态码（来源：LibreTranslate GitHub issues）"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. Chinese Character Web (http://ccdb.hemiola.com/) — 汉字释义与发音，认证：No
         2. Chinese Text Project (https://ctext.org/tools/api) — 在线 open-access 数字 库 用于 pre-modern 中文 / 汉字 texts，认证：No
         3. Collins (https://api.collinsdictionary.com/api/v1/documentation/html/) — Bilingual 词典 和 Thesaurus 数据，认证：`apiKey`
         4. Free Dictionary (https://dictionaryapi.dev/) — 定义、音标、发音、词性、示例、同义词，认证：No
         5. Indonesia Dictionary (https://new-kbbi-api.herokuapp.com/) — Indonesia 词典 许多 单词，认证：No
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "Markdown 格式标记被翻译破坏：如 '**bold**' 翻译为 '**粗体字**' 但 ** 丢失或位置错乱"
    mitigation: "必须用占位符保护所有 Markdown 语法；
      翻译后用正则验证占位符数量是否匹配，不匹配时触发重试（最多 2 次），
      仍失败时返回无格式翻译并在 warnings 中注明"
  - severity: HIGH
    pattern: "DeepL target_lang 使用小写（'zh-hans'）导致 ValueError: Invalid target language"
    mitigation: "写入 deepl.translate_text 前统一 target_lang.upper()；
      维护语言代码映射表：{'zh': 'ZH-HANS', 'zh-tw': 'ZH-HANT', 'en': 'EN-GB', 'pt': 'PT-PT'}"
  - severity: HIGH
    pattern: "上下文丢失：长文档分段翻译后，跨段的代词指向（如 '它' 指代上段主语）翻译失准"
    mitigation: "分段时保留前一段末尾作为上下文（带 context 参数传给 DeepL）；
      其他 provider 在每段 prompt 前附上前段最后 2 句作为上下文前缀（翻译后删除）"
  - severity: MEDIUM
    pattern: "MyMemory 500 字符限制被触发但未分段，返回截断翻译而非报错"
    mitigation: "强制检查 len(text_segment) <= 500，超出必须分段；
      分段断点优先选句号/换行，不可在词中间断开（用 re.split(r'(?<=[.!?。！？])', text)）"
  - severity: MEDIUM
    pattern: "专业术语误译：API → 应用程序接口（过度翻译），Webhook → 网络钩子（失准）"
    mitigation: "建议用户维护项目级 glossary，将不应翻译的术语映射到自身（{'API': 'API'}）；
      DeepL glossary feature 对常见技术词效果最佳"
  - severity: LOW
    pattern: "LibreTranslate 官方公共实例因滥用被封禁，请求返回 403 或连接超时"
    mitigation: "官方实例失败时自动降级到 MyMemory；
      提示用户通过 Docker 自托管（docker run -p 5000:5000 libretranslate/libretranslate）"
  - severity: HIGH
    pattern: "【社区经验】DeepL 长文档内容静默丢失：翻译在文档中途停止，后续内容未出现在输出中但无错误码"
    mitigation: "翻译完成后对比输入/输出的段落数（按 '\\n\\n' 分割）；
      段落数差异 > 5% 时触发重试（最多 2 次）；仍失败则分段翻译并拼接；
      在 warnings 中标注 'output_completeness: partial'（来源：bluente.com/blog）"
  - severity: MEDIUM
    pattern: "【社区经验】DeepL 覆盖语言对少（约 30 种），亚洲小语种（泰语/越南语/印尼语等）不支持，
      调用时返回 400 错误，但上游没有提前验证"
    mitigation: "调用前检查 target_lang 是否在 deepl 支持列表中；
      不支持时自动 fallback 到 Google Translate（覆盖 130+ 语种）；
      维护 DEEPL_UNSUPPORTED_LANGS 常量集合用于快速判断（来源：eesel.ai/blog/deepl-review）"
  - severity: HIGH
    pattern: "【社区经验】DeepL 免费账号使用 api.deepl.com 而非 api-free.deepl.com，返回 403 Forbidden，
      错误信息不直接提示 endpoint 错误，难以排查"
    mitigation: "检查 DEEPL_API_KEY 是否以 ':fx' 结尾，是则使用 api-free.deepl.com；
      deepl-python 库会自动选择 endpoint，直接 HTTP 调用时必须手动判断（来源：DeepL API error docs）"
  - severity: MEDIUM
    pattern: "【社区经验】Google Translate 对包含 {name} 或 %s 占位符的本地化字符串翻译后占位符被修改或移位，
      导致字符串格式化时运行时报错"
    mitigation: "翻译前用 UUID 占位符替换所有格式化标记（%%PLACEHOLDER_0%% 等），翻译后按 UUID 还原；
      翻译完成后 assert 占位符数量与原文一致，否则触发重试（来源：lokalise.com blog）"
  - severity: MEDIUM
    pattern: "【社区经验】LibreTranslate 公共实例 429 响应体格式为 {'error': '...'} 而非正常 {'translatedText': '...'} ，
      代码只解析 translatedText 时 KeyError 导致程序崩溃"
    mitigation: "调用后先检查 response.ok 和 response.json().get('error')；
      error 存在时记录日志并 fallback 到 MyMemory（来源：LibreTranslate GitHub issues）"
  - severity: LOW
    pattern: "【社区经验】Google Translate 在同一批次请求中对同一语言的礼貌语气（正式/非正式）输出不一致，
      用户界面文案语气混乱"
    mitigation: "后处理阶段用 LLM 对整批翻译结果进行语气统一校对；
      或迁移至 DeepL 并设置 formality='prefer_more' 或 'prefer_less'（来源：Google Translate 限制文档）"

# === 元数据 ===
source: manual
freshness_date: "2026-03-29"
quality_score: 81.0
usage_count: 0
evidence_refs:
  - "https://libretranslate.com/docs/"
  - "https://mymemory.translated.net/doc/spec.php"
  - "https://github.com/DeepLcom/deepl-python"
  - "https://cloud.google.com/translate/docs/reference/rest/v3/projects/translateText"
