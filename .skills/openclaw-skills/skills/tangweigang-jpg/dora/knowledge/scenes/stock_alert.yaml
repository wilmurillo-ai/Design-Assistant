# 知识积木 v2 — 股票价格提醒
# 用途：轮询 A 股价格，当涨跌幅超过阈值时触发下游通知

# === 信封层（给系统看）===
id: stock-alert-v1
name: 股票价格提醒
version: 1.0.0
category:
  - 金融
  - 监控
tags:
  - 股票
  - A股
  - 价格提醒
  - akshare
  - 涨跌幅
capability_type: poll
data_source: stock_api

inputs:
  ticker:
    type: string
    required: true
    description: "股票代码，如 '000001'（不含市场前缀）"
    validation: "len(value) == 6 and value.isdigit()"
  stock_name:
    type: string
    required: true
    description: "股票名称，仅用于通知消息，不参与 API 调用"
  threshold_pct:
    type: float
    required: true
    description: "触发阈值，百分比形式，如 3.0 表示 ±3%"
    validation: "0 < value <= 20"
  direction:
    type: enum
    required: false
    default: "both"
    description: "监控方向：up=仅涨过阈值，down=仅跌过阈值，both=双向"
    enum_values:
      - up
      - down
      - both
  interval_min:
    type: integer
    required: false
    default: 5
    description: "轮询间隔（分钟），交易时段建议 1-5 分钟"
    validation: "1 <= value <= 60"

outputs:
  triggered:
    type: boolean
    description: "是否触发阈值"
  current_pct:
    type: float
    description: "当前涨跌幅，百分比"
  message:
    type: string
    description: "格式化的提醒消息，可直接传给 notify 积木"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1

# === 内容层（给 LLM 看）===
core_capability: >
  通过 akshare 轮询 A 股实时行情，当涨跌幅超过阈值时返回触发信号和格式化消息。

constraints:
  - "必须使用 akshare 库（import akshare as ak），调用 ak.stock_zh_a_spot_em() 获取全市场行情，
     然后按股票代码过滤，不可直接调用单只股票接口（限流更严格）"
  - "akshare 免费接口限流约 10 次/分钟，轮询间隔不得低于 6 秒；
     建议用 time.sleep(interval_min * 60) 而非 asyncio.sleep 避免线程问题"
  - "必须检测交易时段：A 股交易时间为工作日 09:30-11:30、13:00-15:00（北京时间）；
     非交易时段直接 return {'triggered': False}，不调用 API"
  - "停牌检测：若返回数据中 '涨跌幅' 字段为 None 或 NaN，视为停牌，
     记录日志 'stock {ticker} suspended' 并跳过本轮"
  - "涨跌幅字段名为 '涨跌幅'（中文），值为 float，单位为百分比，已含正负号"
  - "stock_zh_a_spot_em() 返回 DataFrame，必须用 df[df['代码'] == ticker] 过滤，
     不能假设行序固定"
  - "节假日检测：用 datetime.weekday() 过滤周末；法定节假日建议维护静态列表或跳过检测"

common_failures:
  - severity: HIGH
    pattern: "akshare 在 09:15-09:30 集合竞价期间返回盘前价而非实时价，导致误触发"
    mitigation: "交易时段判断从 09:30 开始，集合竞价期间不触发阈值检查"
  - severity: HIGH
    pattern: "API 限流导致 HTTPError 429 或返回空 DataFrame"
    mitigation: "捕获异常后指数退避重试（初始 30s，最多 3 次），失败后记录日志不抛异常"
  - severity: MEDIUM
    pattern: "停牌股票的涨跌幅字段为 NaN，直接计算导致 TypeError"
    mitigation: "用 pd.isna() 检测后跳过，避免 float(NaN) 抛异常"
  - severity: LOW
    pattern: "夏令时导致交易时段判断偏差（akshare 以北京时间为准）"
    mitigation: "使用 pytz 或 zoneinfo 强制以 Asia/Shanghai 时区计算当前时间"

# === 元数据 ===
source: manual
freshness_date: "2026-03-29"
quality_score: 82.0
usage_count: 0
evidence_refs:
  - "https://akshare.akfamily.xyz/data/stock/stock.html#股票-实时行情数据"
  - "https://github.com/akfamily/akshare/issues/3721"
