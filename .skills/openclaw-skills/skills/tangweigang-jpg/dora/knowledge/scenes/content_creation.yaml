# 知识积木 v2 — 内容创作与多平台分发
# 用途：从草稿生成多平台变体（Twitter/X、LinkedIn、Blog），定时发布

# === 信封层（给系统看）===
id: content-creation-v1
name: 内容创作与多平台分发
version: 1.0.0
category:
  - 内容创作
  - 社交媒体
tags:
  - Twitter
  - LinkedIn
  - Blog
  - Buffer
  - Hootsuite
  - 多平台
  - 定时发布
  - Markdown
capability_type: transform
data_source: twitter

inputs:
  draft_content:
    type: text
    required: true
    description: "原始草稿内容，Markdown 格式或纯文本；长度不限，积木负责按平台截断/改写"
    validation: "1 <= len(value) <= 50000"
  target_platforms:
    type: text
    required: true
    description: "目标平台列表，JSON 数组，支持：twitter、linkedin、blog；
                  示例：[\"twitter\", \"linkedin\"]"
  credentials:
    type: text
    required: true
    description: "各平台认证凭据，JSON 对象；
                  twitter：{\"bearer_token\":\"...\",\"api_key\":\"...\",\"api_secret\":\"...\",
                            \"access_token\":\"...\",\"access_secret\":\"...\"};
                  linkedin：{\"access_token\":\"...\",\"person_urn\":\"urn:li:person:...\"}；
                  所有 token 从环境变量读取，此参数传变量名映射如 {\"twitter_bearer\": \"TW_BEARER_TOKEN\"}"
  schedule_time:
    type: string
    required: false
    default: ""
    description: "定时发布时间，ISO 8601 格式（如 '2026-03-30T10:00:00+08:00'）；
                  空字符串表示立即发布"
  twitter_thread:
    type: boolean
    required: false
    default: false
    description: "Twitter 内容超过 280 字符时是否拆分为 Thread（串推）；
                  false 时截断到 277 字符并追加 '...'"
  image_urls:
    type: text
    required: false
    default: "[]"
    description: "要附带发布的图片 URL 列表，JSON 数组；每平台有最大图片数限制"

outputs:
  platform_posts:
    type: "dict"
    description: "各平台的最终发布内容，key 为平台名，value 含 content/char_count/status 字段"
  published_ids:
    type: "dict"
    description: "各平台发布成功后的帖子 ID，key 为平台名；调度发布时为空"
  scheduled:
    type: boolean
    description: "是否为定时任务（通过 Buffer/Hootsuite API 调度）"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1

# === 内容层（给 LLM 看）===
core_capability: >
  将 Markdown 草稿按各平台字符限制改写并格式化，通过 Twitter/X API v2、LinkedIn API v2
  直接发布或通过 Buffer API 定时调度，处理 OAuth 认证、图片上传和字符编码。

constraints:
  - "Twitter/X API v2 发推：POST https://api.twitter.com/2/tweets；
     Free tier：1500 tweets/mo（约 50/天），15 req/15min；
     认证用 OAuth 1.0a（User Context），需要 api_key + api_secret + access_token + access_secret；
     用 tweepy 库（pip install tweepy）：client = tweepy.Client(...)；
     字符限制：280 Unicode 字符（Twitter 计算方式：URL 固定算 23 字符）"
  - "Twitter Thread 发布：第一条推文先发，获取 tweet_id，后续推文通过
     reply.in_reply_to_tweet_id=tweet_id 串联；每条独立计费 rate limit"
  - "LinkedIn API v2 发帖：POST https://api.linkedin.com/v2/ugcPosts；
     认证：OAuth 2.0 Bearer Token，Scope 需包含 w_member_social；
     字符限制：个人帖子 3000 字符，公司页面帖子 700 字符；
     person_urn 格式：'urn:li:person:{profile_id}'，从 GET /v2/me 接口获取"
  - "LinkedIn API 限制：免费个人账号受限（官方未公开具体数字），商业页面 API 申请需审核；
     实际约 100-200 req/day；付费方案：Buffer API 封装（Basic $6/mo）、Hootsuite（$99/mo）"
  - "Buffer API（定时调度）：POST https://api.bufferapp.com/1/updates/create.json；
     需先创建 Buffer 账号关联各平台；scheduled_at 传 Unix timestamp；
     免费套餐支持 3 个渠道，付费 Essentials $6/mo 支持更多"
  - "Markdown 转各平台格式：Twitter/LinkedIn 不支持 Markdown；
     转换时：**粗体** → 去掉符号保留文字（Twitter）或 Unicode 粗体字符（LinkedIn 技巧）；
     [链接文字](url) → 保留 url，去掉 Markdown 语法；
     Blog（Markdown → HTML）：用 markdown 库（pip install Markdown）"
  - "图片发布（Twitter）：先用 POST https://upload.twitter.com/1.1/media/upload.json 上传，
     获取 media_id，再在 tweets 请求 body 中加 media.media_ids；
     支持格式：JPEG/PNG/GIF/WEBP；单图最大 5MB，GIF 最大 15MB；最多 4 张"
  - "所有 token 必须从环境变量读取：os.environ[credentials[platform+'_token_env']]；
     禁止将 token 写入日志；token 过期（401）时在 outputs 中返回 auth_error 而非抛异常"
  - "【社区经验】Twitter/X API v1.1 媒体上传端点已于 2025-03-31 对 Free/Basic/Pro tier 弃用；
     旧的 POST /1.1/media/upload.json 将返回 404 或 403；
     必须迁移到 v2 媒体上传端点（目前仍在 Early Access），或改用第三方发布工具（Buffer/Ayrshare）
     （来源：X Developer Platform, Make Community）"
  - "【社区经验】Twitter/X API 有两层限制机制：15分钟窗口的 rate limit 和按日历月计算的月度用量上限；
     Free tier 月度上限极低（1500 tweets/mo），Basic tier 相对宽松；
     429 响应的 X-Rate-Limit-Reset 头只反映 15 分钟窗口重置时间，月度上限耗尽不会通过此头告知；
     需分别处理两类 429（来源：X API v2 官方文档，zernio.com）"
  - "【社区经验】LinkedIn API 需要 X-Restli-Protocol-Version: 2.0.0 请求头；
     遗漏此头时部分端点仍能工作（向后兼容），但 ugcPosts 等新端点会返回 400/406；
     旧教程（2021年前）引用的 v1 scope（如 r_basicprofile）已废弃，
     使用旧 scope 申请 token 会 silently 降级到有限权限（来源：LinkedIn Developer FAQ，Marcus Noble）"
  - "【社区经验】LinkedIn OAuth redirect_uri 必须与 Developer Portal 完全匹配（含尾部斜杠）：
     redirect_uri='https://example.com/callback' 与 'https://example.com/callback/'（含斜杠）
     被视为不同 URI，会触发 'redirect_uri_mismatch' 错误；
     多环境（dev/staging/prod）需在 Developer Portal 分别注册各环境的 redirect_uri
     （来源：LinkedIn OAuth 2.0 官方文档，Medium @ed.sav 2025 notes）"
  - "【社区经验】LinkedIn ugcPosts API 的 422 含 emoji 字符计数问题：
     emoji 在 LinkedIn API 中计 2 个字符（UTF-16 编码）；带肤色修饰符的 emoji 可计 4+ 个字符；
     len(text) 返回 Unicode 字符数，不等于 LinkedIn 计算的字符数；
     安全做法：将内容截断到 2800 字符（留 200 字符 buffer）再提交
     （来源：LinkedIn API 错误处理文档，Ordinal 字符限制指南）"
  - "【社区经验】LinkedIn API w_member_social scope 需要通过 LinkedIn 审核才能在生产使用：
     使用 LinkedIn 默认开发应用（未审核）时，w_member_social 仅允许帖子发到测试账号；
     发布到真实受众需申请 'Share on LinkedIn' 产品权限；
     许多开发者在测试环境成功后上生产环境时发现权限不足，导致 403
     （来源：LinkedIn Developer FAQ，trykondo.com 权限指南）"
  - "【社区经验】Twitter/X Free tier 在 2025 年 API 变更后写操作（发推）需要 Basic tier（$100/月）：
     Free tier 目前不支持写操作（POST /2/tweets），只支持读操作；
     尝试在 Free tier 发推会返回 403 'Forbidden'，与权限不足错误相同；
     自动化发推项目上线前必须升级到 Basic tier 或 Pro tier
     （来源：X API 官方定价页面 2025）"
  - "【社区经验】tweepy 的 wait_on_rate_limit=True 只处理 15 分钟窗口 429，不处理月度上限 429：
     月度用量耗尽返回的 429 没有 x-rate-limit-reset 头（或值为月末），
     tweepy 会无限等待到月底，阻塞整个进程；
     应捕获 tweepy.TooManyRequests，检查 error response body 中是否含 'monthly cap' 字样，
     是则标记为月度耗尽状态，不再重试
     （来源：tweepy GitHub PR #2231，X Developer Community 讨论）"
  - "【社区经验】Twitter Thread 发布时每条推文是独立 API 请求，中途失败导致 Thread 不完整：
     Thread 没有原子性保证；第 3 条发送失败时，前 2 条已经发布无法回滚；
     应在发布前将整个 Thread 内容生成完毕并验证，减少中途中断的概率；
     记录已发布推文 ID，支持'从断点继续发布'的恢复逻辑
     （来源：tweepy 文档，Twitter API Thread 最佳实践）"
  - "【社区经验】Twitter 媒体上传 v1.1 endpoint 在 2025-03-31 对 Free/Basic/Pro tier 停用：
     POST https://upload.twitter.com/1.1/media/upload.json 返回 404 或 403；
     必须迁移到 v2 媒体上传（需 Early Access 申请）或改用第三方发布工具（Buffer/Ayrshare）；
     旧代码依赖 tweepy.API.media_upload() 的 v1.1 路径会失败
     （来源：X Developer Platform 通知，Make Community 2025 讨论）"
  - "【社区经验】Buffer API 定时发布时 scheduled_at 必须用 Unix timestamp 而非 ISO 格式：
     Buffer API 的 scheduled_at 参数接受 Unix 时间戳（秒），不接受字符串日期；
     传 ISO 8601 字符串会被静默忽略，内容立即发布而非定时发布；
     用 int(datetime.fromisoformat(schedule_time).timestamp()) 转换
     （来源：Buffer API 官方文档 updates/create）"
  - "【社区经验】LinkedIn API 版本头 X-LinkedIn-Version 需要指定 YYYYMM 格式：
     某些端点的版本头过期（超过 12 个月）后会返回 'version deprecated' 错误；
     每次 LinkedIn API 更新后需更新版本头；
     最新版本在 LinkedIn 开发者新闻通讯中公布，需定期关注
     （来源：LinkedIn API Error Handling 文档，Pipedream GitHub issue #854）"
  - "【社区经验】Markdown 中的 Unicode 粗体字符（𝗕𝗼𝗹𝗱）在 LinkedIn 上表现为粗体视觉效果：
     但在 LinkedIn 内部搜索中不可检索（搜索不到 Unicode 特殊字符）；
     且部分设备/屏幕阅读器渲染异常；建议仅在主文字内容末尾少量使用，不可滥用
     （来源：LinkedIn Content Creator 指南，contentide.com）"
  - "【社区经验】发布图片 URL 到 Twitter 时不能直接传 URL，必须先下载再以二进制上传：
     tweepy.Client 的 create_tweet 不支持直接使用图片 URL；
     media_upload 接口也不支持 URL（只支持二进制数据）；
     流程：requests.get(image_url) → bytes → media.upload(binary) → 获取 media_id → 附加到推文
     （来源：Twitter API 媒体上传文档，tweepy 示例代码）"
  - "【社区经验】LinkedIn API Client Secret 在某些情况下可能超过官方声称的 32 字符限制：
     n8n 社区报告了 33 字符 Client Secret 导致集成配置失败的案例；
     验证 Client Secret 时不应做长度校验，直接使用 LinkedIn Developer Portal 提供的原始值
     （来源：n8n Community LinkedIn API Client Secret 86953）"
  - "【社区经验】内容定时发布调度脚本若无心跳监控，静默停止后内容计划完全中断：
     定时任务进程崩溃不会自动重启，且不会发任何告警；
     必须配置进程级心跳监控（每次发布后写入 last_run 时间戳），
     并设置'超过预期间隔未发布'的零产出告警
     （来源：全局工程规范 §6.6 零产出告警）"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. 4chan (https://github.com/4chan/4chan-API) — 简单 image-based bulletin 看板 dedi猫ed 到 variety 的 topics，认证：No
         2. Ayrshare (https://www.ayrshare.com) — 社交 媒体 API 到 post, 获取 分析, 和 管理 多个 用户 社交 媒体 账户，认证：`apiKey`
         3. aztro (https://aztro.sameerkumar.website/) — 每日 horoscope 信息 用于 yesterday, today, 和 tomorrow，认证：No
         4. Blogger (https://developers.google.com/blogger/) — Blogger API 允许 client 应用程序 到 view 和 更新 Blogger 内容，认证：`OAuth`
         5. Cisco Spark (https://developer.ciscospark.com) — 团队协作软件，认证：`OAuth`
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "Twitter Free tier 超过 1500 tweets/mo 后返回 403 Forbidden，
              错误信息含 'Usage cap exceeded'，与权限不足的 403 相同"
    mitigation: "捕获 403 后检查 response.json()['detail'] 是否含 'Usage cap'，
                 是则标记 twitter 为月额度耗尽，当月不再尝试；
                 不可与权限类 403 混淆处理"
  - severity: HIGH
    pattern: "LinkedIn OAuth Access Token 有效期仅 60 天，到期后所有请求返回 401"
    mitigation: "每次调用前检查 token 创建时间，距今 > 50 天时主动提示用户刷新；
                 捕获 401 在 outputs 中返回 linkedin_auth_expired=True"
  - severity: MEDIUM
    pattern: "Twitter 字符计数使用 Twitter 的权重算法（URL=23字符），len() 计算结果偏大导致误截断"
    mitigation: "用 tweepy.parsers 或 Twitter 官方字符计数库计算权重字符数；
                 简化方案：先统计 URL 数量，替换为 23 字符占位后再计算总长"
  - severity: MEDIUM
    pattern: "LinkedIn 帖子含 emoji 时 Unicode 字符数与 LinkedIn 计数不一致，导致超限 422"
    mitigation: "发布前用 len(content.encode('utf-16-le')) / 2 计算 UTF-16 长度，
                 按 LinkedIn 的字符计数逻辑保守截断到 2900 字符"
  - severity: LOW
    pattern: "图片 URL 来自需要认证的 CDN，Twitter 上传时无法下载，返回 invalid_media"
    mitigation: "先用 requests.get(image_url) 下载到内存/临时文件，再以二进制上传；
                 禁止直接传 URL 给 Twitter 上传接口"
  - severity: HIGH
    pattern: "【社区经验】LinkedIn OAuth access token 有效期仅 60 天（官方文档确认），
              服务端自动化脚本若无主动续期逻辑，第61天起所有发布请求返回 401，
              且 LinkedIn 不支持 refresh_token 的 3-legged OAuth 静默续期（只有 Partner 级才支持）"
    mitigation: "在 token 创建时写入 created_at 时间戳；每次调用前检查距今天数 >= 50 天时
                 推送告警到 Telegram/邮件提示用户手动重新授权；
                 不能依赖自动续期（来源：LinkedIn OAuth 文档，Medium @ed.sav）"
  - severity: MEDIUM
    pattern: "【社区经验】Twitter/X v1.1 到 v2 迁移：假设旧端点仍可用导致 404，
              或以为 v1.1 token 可以直接用于 v2 端点导致认证失败"
    mitigation: "v2 使用 OAuth 2.0 Bearer Token（应用级）或 OAuth 1.0a（用户级写操作）；
                 v2 写操作（发推）必须用 OAuth 1.0a User Context，不能用纯 Bearer Token；
                 使用 tweepy.Client 而非手动拼 URL 可减少迁移出错概率
                 （来源：X API v2 官方文档）"
  - severity: HIGH
    pattern: "【社区经验】tweepy wait_on_rate_limit=True 在月度配额耗尽时无限阻塞进程，
              导致整个自动化管道挂起数周"
    mitigation: "不使用 wait_on_rate_limit=True；改为手动捕获 tweepy.TooManyRequests；
                 检查 response body 中 'monthly cap' 标志，区分窗口限流和月度耗尽；
                 月度耗尽时立即停止并发出告警，不继续等待
                 （来源：tweepy GitHub PR #2231）"
  - severity: MEDIUM
    pattern: "【社区经验】LinkedIn 60 天 token 过期后，服务端脚本没有续期逻辑，
              第 61 天起所有发布失败，且 LinkedIn 不支持 3-legged OAuth refresh token 静默续期"
    mitigation: "token 创建时存入 created_at；每次调用前检查 >= 50 天时推送 Telegram/邮件告警；
                 代码中捕获 401 后同时检查 token 年龄，> 60 天时给出明确提示'请重新授权 LinkedIn'
                 （来源：LinkedIn OAuth 2.0 官方文档，Medium @ed.sav）"
  - severity: LOW
    pattern: "【社区经验】社交媒体自动化脚本提前数周批量调度内容，世界突发事件期间发出不合时宜的帖子，
              造成品牌形象损害"
    mitigation: "定时发布前 1 小时设置 human review 检查点；
                 或建立关键词黑名单，命中时自动暂停发布并发送告警
                 （来源：Agorapulse 社交媒体自动化最佳实践，obbserv.com）"

