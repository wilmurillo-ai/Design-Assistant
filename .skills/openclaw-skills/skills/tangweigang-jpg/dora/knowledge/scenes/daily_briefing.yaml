# 知识积木 v2 — 每日简报与信息聚合
# 用途：从多源（RSS、API、网页）聚合信息，生成摘要推送

# === 信封层（给系统看）===
id: daily-briefing-v1
name: 每日简报与信息聚合
version: 1.0.0
category:
  - 信息聚合
  - 内容摘要
tags:
  - 简报
  - NewsAPI
  - RSS
  - HackerNews
  - feedparser
  - 信息汇总
  - 摘要
capability_type: poll
data_source: rss

inputs:
  sources:
    type: text
    required: true
    description: "数据源列表，JSON 数组格式，每项含 type（rss/newsapi/hackernews）和 url 或参数；
                  示例：[{\"type\":\"rss\",\"url\":\"https://feeds.reuters.com/reuters/topNews\"},
                         {\"type\":\"hackernews\",\"limit\":20}]"
  keywords:
    type: text
    required: false
    default: ""
    description: "关键词过滤，逗号分隔；空字符串表示不过滤"
  max_items_per_source:
    type: integer
    required: false
    default: 10
    description: "每个数据源最多抓取的条目数"
    validation: "1 <= value <= 50"
  newsapi_key:
    type: string
    required: false
    default: ""
    description: "NewsAPI API Key；不填则仅使用免费源（HN Firebase + RSS）"
  summary_max_length:
    type: integer
    required: false
    default: 200
    description: "每条摘要最大字符数，超出截断"
    validation: "50 <= value <= 1000"
  deduplicate:
    type: boolean
    required: false
    default: true
    description: "是否开启跨源去重（基于标题相似度 + URL 规范化）"

outputs:
  items:
    type: "list[dict]"
    description: "聚合后的条目列表，每项含 title/url/source/published/summary/score 字段"
  item_count:
    type: integer
    description: "去重后的条目总数"
  sources_failed:
    type: "list[str]"
    description: "本次失败的数据源标识列表，用于监控告警"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1

# === 内容层（给 LLM 看）===
core_capability: >
  从 RSS（feedparser）、NewsAPI（requests）、HackerNews Firebase API（requests）多源并行
  抓取信息，按关键词过滤后跨源去重，生成结构化摘要条目列表，供下游通知或报告积木消费。

constraints:
  - "RSS 源使用 feedparser 解析（import feedparser），HackerNews 用 Firebase API：
     GET https://hacker-news.firebaseio.com/v0/topstories.json 获取 ID 列表，
     再 GET https://hacker-news.firebaseio.com/v0/item/{id}.json 获取详情；
     HN API 完全免费无限流，适合作为默认兜底源"
  - "NewsAPI 免费账号限制：100 req/day，每次请求返回最多 100 条，仅有前 100 条可访问
     （免费账号无法翻页）；Key 从环境变量 NEWSAPI_KEY 读取，不可硬编码；
     API 端点：GET https://newsapi.org/v2/top-headlines?apiKey=KEY&pageSize=20"
  - "NewsAPI 付费升级路径：Developer Plan $449/mo，250K req/month，支持全量搜索和全文内容；
     本积木代码需在 newsapi_key 为空时优雅跳过 NewsAPI，不抛异常"
  - "去重策略（按优先级）：1) URL 规范化后精确匹配；2) 标题 token 集合 Jaccard 相似度 >= 0.8
     视为重复；3) 相同标题不同大小写；保留评分（HN score/NewsAPI relevance）较高的版本"
  - "摘要生成：优先使用 feedparser entry.summary 或 NewsAPI description 字段，截断到
     summary_max_length；HTML 标签用 html.parser 或 re.sub 去除，保留纯文本"
  - "多源并行：使用 concurrent.futures.ThreadPoolExecutor(max_workers=5) 并行请求，
     单源超时设为 10 秒（requests timeout=10）；某源失败不影响其他源，失败源记入 sources_failed"
  - "RSS 编码处理：feedparser 自动处理编码，但 entry.summary 含 HTML 时需用
     html.unescape() + 正则去标签；中文 feed 的 published 时区可能不标准，
     解析失败时用 datetime.utcnow() 兜底"
  - "Feedly API（付费升级选项）：需 OAuth 2.0，端点 GET https://cloud.feedly.com/v3/streams/contents；
     本积木不直接集成，通过 sources 参数的 type='feedly' 扩展点预留"
  - "【社区经验】feedparser bozo 异常处理：feed.bozo=True 并不意味着解析失败，大量真实 feed 会设置
     bozo=True（如 CharacterEncodingOverride、NonXMLContentType），但仍能正常解析；
     只有 bozo_exception 为 xml.sax.SAXParseException 等严重错误时才视为解析失败；
     误把 bozo=True 当作失败条件会丢弃大量合法 feed（来源：feedparser 官方文档 Bozo Detection）"
  - "【社区经验】RSS 服务端 User-Agent 过滤：部分 feed 服务器会拒绝默认 User-Agent（python-feedparser/X.X），
     返回 403 或空内容；需在 feedparser.parse(url, agent='Mozilla/5.0 ...') 中指定浏览器 UA；
     约 10-12% 的非公开 feed 服务器配置了此类过滤（来源：社区实践）"
  - "【社区经验】RSS guid 字段不可靠：RSS 2.0 规范中 guid 是可选字段，大量 feed 不提供；
     不提供 guid 时不可用 entry.id 作为唯一键，需回退到 link 字段；link 仍相同时再用 title hash；
     依赖 guid 去重会导致同一文章被重复推送（来源：Make Community RSS 去重讨论）"
  - "【社区经验】跨源去重相似度阈值调优：Jaccard 相似度阈值 0.8 偏高会漏判同一故事的不同标题版本；
     实践推荐 0.6-0.7；低于 0.5 则误把不同故事分为同组；
     Feedly 工程团队通过 trial-and-error 最终采用 0.6（来源：Feedly Engineering Blog）"
  - "【社区经验】RSS published_parsed DST 双重调整 bug：feedparser 在解析某些 RSS 的 pubDate 时，
     会对已含 DST 偏移的时间再次做 DST 调整，导致时间偏差 1-2 小时；
     解决方案：使用 entry.published_parsed[:8] + (-1,) 丢弃 tm_isdst 值并用 -1 替代，
     告知 Python '时区未知'，再统一做 UTC 转换（来源：django-newswall feedparser wiki）"
  - "【社区经验】feedparser 日期解析失败静默返回 None：约 12% 的 RSS feed 使用非标准日期格式
     （如 'Mon, 29 Mar 2026 10:00' 无时区），feedparser 解析失败时 entry.published_parsed 返回 None
     而非抛异常；代码需始终检查 None，不可直接用 time.mktime(entry.published_parsed)
     （来源：feedparser 官方 Date Parsing 文档）"
  - "【社区经验】RSS feed 302 重定向不跟随：feedparser 默认不跟随重定向，返回的 feed.status=301/302，
     feed.entries 为空；需检查 feed.href（重定向后 URL），用新 URL 重新调用 feedparser.parse()，
     并在存储中更新 feed URL 避免下次仍走旧地址（来源：feedparser 文档 Handling Redirects）"
  - "【社区经验】RSS Last-Modified 和 ETag 缓存头应优先使用：服务端支持时，
     用 feedparser.parse(url, modified=last_modified, etag=last_etag) 可触发 304 Not Modified，
     节省带宽；忽略缓存头会让部分严格服务器返回 429 限流；
     不更新缓存头会导致每次都获取全量 feed，资源浪费（来源：feedparser 官方 HTTP 功能文档）"
  - "【社区经验】HackerNews Firebase API 并发请求 item 详情时需要节流：
     topstories 返回 500 个 ID，如果全部并发请求 item 详情会触发 Firebase 速率限制（429）；
     实践方案：ThreadPoolExecutor(max_workers=10) + 每批请求间 sleep(0.1)；
     不节流时约 30% 概率被临时封禁（来源：GitHub HackerNews/API issues）"
  - "【社区经验】NewsAPI 免费账号时间范围限制：免费账号只能查询最近 30 天内的新闻；
     超过 30 天的查询静默返回空结果（不报错），容易误以为没有相关新闻；
     需要历史数据时必须升级付费套餐或改用 The Guardian/NYT Open API
     （来源：NewsAPI 定价页面，Reddit r/webdev 讨论）"
  - "【社区经验】NewsAPI 'everything' 端点被 Developer Plan 限制用于生产：
     免费 Developer Plan 明确不允许在生产/staging 环境使用；违规使用会被封号；
     测试期免费，上线必须购买至少 Business Plan（$449/mo）；
     开发阶段应模拟 API 响应，不要在 staging 环境对真实 NewsAPI 发起请求
     （来源：NewsAPI 服务条款，NewsAPI Errors 文档）"
  - "【社区经验】feedparser 解析含 CDATA 的 Atom feed 时 summary 包含原始 HTML 转义字符：
     如 &amp;lt;p&amp;gt; 而非 <p>；直接展示给用户会显示乱码；
     需要对 summary 调用 html.unescape() 后再进行 HTML 标签清理，顺序不可颠倒
     （来源：feedparser GitHub issues，Stack Overflow #23262371）"
  - "【社区经验】多线程 feedparser 并发解析时的线程安全问题：feedparser.parse() 不是线程安全的，
     多线程并发调用可能导致解析结果交叉污染；
     解决方案：每个线程使用独立的 feedparser 调用，不共享任何 feedparser 全局状态；
     ThreadPoolExecutor 每次 submit 一个独立任务是安全的
     （来源：feedparser GitHub issues #424）"
  - "【社区经验】RSS 内容长度与 summary_max_length 的截断边界问题：
     直接按字符数截断会截断 HTML 实体（如 &amp;）的中间部分，导致显示乱码；
     必须先完整去除 HTML 标签，再对纯文本按 summary_max_length 截断
     （来源：社区最佳实践，feedparser 用户论坛）"
  - "【社区经验】NewsAPI 搜索结果 sources 参数最多允许 20 个 source ID：
     超过 20 个 source ID 时 API 静默截断或返回 400；
     多源场景需分批查询（每批不超过 20 个），再合并结果去重
     （来源：NewsAPI 官方文档 Parameter Limits）"
  - "【社区经验】RSS feed URL 含 query 参数时 feedparser 可能解析出多个 feed 实例的重复 entry：
     如 ?page=1&page=2 的翻页 feed URL，每个 URL 都返回相同的最新 N 条；
     RSS 聚合时应只使用每个 feed 的主 URL（不带翻页参数），否则去重逻辑会失效
     （来源：Make Community RSS 去重讨论）"
  - "【社区经验】大量 RSS feed 轮询的调度策略：不同 feed 更新频率差异巨大（每5分钟到每天1次）；
     统一固定间隔轮询会浪费资源（对低频 feed）或错过内容（对高频 feed）；
     生产系统应根据 feed 历史更新频率动态调整轮询间隔，
     至少区分高频（<1h）和低频（>1h）两档（来源：RSS 最佳实践研究论文）"
  - "【社区经验】feedparser 解析本地 XML 文件时与 URL 解析行为不一致：
     本地文件模式 feedparser.parse('/path/to/file.xml') 不会发送 HTTP 请求，
     feed.status 为 None；不要用 feed.status 判断本地 feed 的解析状态
     （来源：feedparser 官方文档 Parsing a Local File）"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. apilayer mediastack (https://mediastack.com/) — 免费, 简单的 用于…的 REST API 实时 新闻 & Blog 文章，认证：`apiKey`
         2. Associated Press (https://developer.ap.org/) — 搜索 用于 新闻 和 元数据 来自 Associated Press，认证：`apiKey`
         3. Chronicling America (http://chroniclingamerica.loc.gov/about/api/) — 提供 访问 到 millions 的 pages 的 历史 美国 newspapers 来自 库 的 Congress，认证：No
         4. Currents (https://currentsapi.services/) — Latest 新闻 published 在 各种 新闻 来源, blogs 和 forums，认证：`apiKey`
         5. Feedbin (https://github.com/feedbin/feedbin-api) — RSS 阅读器，认证：`OAuth`
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "首次运行无历史记录时返回大量历史条目（RSS 可能含 100+ 历史条目），触发通知轰炸"
    mitigation: "首次运行标记所有现有条目为已见（写入持久化去重存储），仅触发日志，不推送通知；
                 第二次起才正常返回新条目"
  - severity: HIGH
    pattern: "NewsAPI 免费账号 100 req/day 耗尽后返回 429，未处理导致整体失败"
    mitigation: "捕获 HTTP 429，标记 newsapi 源为限流状态，本轮跳过，记录日志；
                 不影响 RSS 和 HN 源的正常运行"
  - severity: MEDIUM
    pattern: "RSS feed URL 返回 301/302 重定向，feedparser 不跟随导致解析空结果"
    mitigation: "检查 feed.status，若为 301 则用重定向后 URL 重试并更新存储的 URL"
  - severity: MEDIUM
    pattern: "部分 RSS feed 的 summary 字段包含大量 HTML/JS 脚本，未清洗时摘要不可读"
    mitigation: "用 re.sub(r'<[^>]+>', '', summary) 去除所有 HTML 标签后再截断"
  - severity: LOW
    pattern: "HN Firebase API 单 item 请求失败（网络抖动），导致部分条目详情缺失"
    mitigation: "单 item 请求失败时用 title=str(item_id) 占位，link 指向 HN 页面，不中断整批"
  - severity: HIGH
    pattern: "【社区经验】RSS feed 仅返回最近 10-20 条（部分提供商服务端限制），
              历史条目无法通过轮询回填，依赖 feed 获取历史数据的需求会静默失败"
    mitigation: "首次接入 feed 时立即全量抓取并存档；设计上不假设 feed 会保留历史数据；
                 需要历史数据时改用 NewsAPI 历史接口或对应媒体的专属 API"
  - severity: MEDIUM
    pattern: "【社区经验】去重前未做 LLM 聚合导致大量重复标题被发送给 LLM 摘要，
              推文/简报成本比预期高 20-40%（Feedly 工程团队实测）"
    mitigation: "LLM 摘要调用必须在去重/聚类之后进行，相同故事只摘要一次；
                 按 URL 去重 → 标题相似度聚类 → 取最高质量版本 → 再调用 LLM"
  - severity: HIGH
    pattern: "【社区经验】NewsAPI 返回 426 要求升级付费套餐时，错误信息与配置错误类似，
              代码将其当做认证失败处理，导致错误信息不清晰，用户无法判断是计费问题还是 Key 错误"
    mitigation: "区分 newsapi 错误 code：'apiKeyInvalid'/'apiKeyExhausted'/'parametersMissing' 各处理不同；
                 426 时在日志中明确输出 'NewsAPI requires paid plan upgrade'，
                 同时在 sources_failed 中加注明原因"
  - severity: MEDIUM
    pattern: "【社区经验】feedparser 解析过程中网络中断（timeout）后再次调用，
              可能复用了上次的连接缓存状态，导致解析结果不一致或使用旧数据"
    mitigation: "设置 feedparser.parse(url, timeout=10) 每次强制重新建立连接；
                 timeout 值不可过大（建议 10s），过大会阻塞线程池工作线程"
  - severity: LOW
    pattern: "【社区经验】RSS feed 含非 ASCII 路径的 entry.link，直接拼接为完整 URL 时
              urllib 拼接错误，生成格式为 'http://domain.comhttps://other.com/path' 的错误 URL"
    mitigation: "使用 urllib.parse.urljoin(feed_url, entry.link) 而非字符串拼接；
                 同时过滤 entry.link 为空或 None 的条目"

