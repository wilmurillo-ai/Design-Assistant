# 知识积木 v2 — Project Management Integration
# 用途：跨平台任务创建/更新、Sprint 报告、状态同步，支持 GitHub/Trello/Linear/Jira 等

# === 信封层（给系统看）===
id: project-mgmt-v1
name: Project Management Integration
version: 1.0.0
category:
  - Project Management
  - Productivity
tags:
  - github issues
  - trello
  - linear
  - jira
  - asana
  - task management
  - sprint report
  - status sync
  - webhook
  - project tracking
capability_type: poll
data_source: github

inputs:
  platform:
    type: enum
    required: true
    description: "Target project management platform"
    enum_values:
      - github
      - trello
      - linear
      - jira
      - asana
      - monday
  operation:
    type: enum
    required: true
    description: "Operation to perform"
    enum_values:
      - create_task
      - update_task
      - list_tasks
      - generate_sprint_report
      - sync_status
      - get_task
  task_data:
    type: text
    required: false
    default: "{}"
    description: "JSON object with task fields; schema varies by operation and platform.
      For create_task: {title, description, assignee, labels, due_date, priority}.
      For update_task: {task_id, fields_to_update: {...}}.
      For sync_status: {task_id, new_status, source_platform, target_platform}."
    validation: "len(value) <= 8000"
  project_id:
    type: string
    required: true
    description: "Platform-specific project identifier: GitHub owner/repo, Trello board ID, Linear team ID, Jira project key"
    validation: "0 < len(value) <= 256"
  sprint_period_days:
    type: integer
    required: false
    default: 14
    description: "Sprint duration in days; used only for generate_sprint_report"
    validation: "1 <= value <= 90"
  webhook_secret:
    type: string
    required: false
    default: ""
    description: "Webhook signature secret for validating incoming webhook payloads; leave empty to skip validation"
    validation: "len(value) <= 256"
  paginate_all:
    type: boolean
    required: false
    default: true
    description: "Whether to follow pagination and retrieve all results (not just the first page). Disable for large projects to control latency."

outputs:
  result:
    type: string
    description: "JSON object with operation result; for create_task: {task_id, url}; for list_tasks: [{id, title, status, assignee, url}...]; for sprint_report: {completed, in_progress, blocked, velocity}"
  tasks_fetched:
    type: integer
    description: "Number of tasks returned for list/report operations; 0 for create/update"
  rate_limit_remaining:
    type: integer
    description: "Remaining API calls in current rate limit window; -1 if not reported by platform"
  warnings:
    type: string
    description: "JSON array of non-fatal warnings, e.g. pagination truncation, status mapping approximations"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1
  - data-reporting-v1
  - customer-comms-v1

# === 内容层（给 LLM 看）===
core_capability: >
  Integrate with project management platforms (GitHub Issues, Trello, Linear, Jira) to
  create and update tasks, generate Sprint reports from completed/in-progress issues, and
  synchronise task status across platforms with a normalised status mapping layer.

constraints:
  - "GitHub Issues API: base URL https://api.github.com. Auth via Authorization: Bearer
     {GITHUB_TOKEN} from env var GITHUB_TOKEN. Rate limit: 5000 req/h for authenticated
     users. List issues: GET /repos/{owner}/{repo}/issues?state=all&per_page=100.
     Pagination: follow Link header 'rel=next' URL until absent; do NOT construct page
     URLs manually as GitHub may change them."
  - "Trello API: base URL https://api.trello.com/1. Auth via ?key={TRELLO_API_KEY}&token=
     {TRELLO_TOKEN} query params from env vars TRELLO_API_KEY and TRELLO_TOKEN.
     Rate limit: 300 req/10s per token. List cards: GET /boards/{id}/cards?fields=
     id,name,idList,due,desc,idMembers. Batch card updates: PUT /cards/{id}."
  - "Linear API: GraphQL endpoint https://api.linear.app/graphql. Auth via Authorization:
     {LINEAR_API_KEY} from env var LINEAR_API_KEY. Free tier has no explicit rate limit
     but enforce max 50 queries/min with a token bucket. Use GraphQL fragments to fetch
     all needed fields in a single query rather than N+1 queries."
  - "Status normalisation: implement a mapping layer between platform-specific status names
     and the canonical set {todo, in_progress, in_review, blocked, done}. Example mapping:
     GitHub (open→todo, closed→done), Trello (list name matching), Linear (state.type).
     When mapping is ambiguous, preserve the original status and add a warning to the
     warnings output."
  - "Webhook validation: if webhook_secret is non-empty, validate the HMAC-SHA256
     signature from the X-Hub-Signature-256 (GitHub), X-Trello-Webhook (Trello), or
     Linear-Signature header. Use hmac.compare_digest() for timing-safe comparison.
     Reject payloads with invalid signatures with HTTP 401."
  - "Webhook deduplication: GitHub and Linear may deliver the same event multiple times.
     Maintain a local dedup cache (TTL 60s) keyed by event_id or delivery_id header.
     Use a simple dict with timestamp; evict entries older than 60s on each access."
  - "Pagination: for list_tasks and generate_sprint_report, always follow all pages when
     paginate_all=True. GitHub uses Link header; Trello uses ?before cursor; Linear uses
     pageInfo.hasNextPage in GraphQL response. Log a warning in rate_limit_warnings if
     pagination is truncated by rate limit before completion."
  - "Batch operations: Jira supports bulk issue creation via POST /rest/api/3/issue/bulk
     (max 50 per request). GitHub does NOT support bulk issue creation — loop with
     individual POST /repos/{owner}/{repo}/issues and add 250ms sleep to respect secondary
     rate limits."
  - "Jira API (paid): base URL https://{domain}.atlassian.net/rest/api/3. Auth via
     Basic base64(email:JIRA_API_TOKEN) from env var JIRA_API_TOKEN. Jira statuses are
     project-specific — fetch /rest/api/3/project/{key}/statuses before mapping."
  - "Sprint report generation: filter issues by closed_at within the sprint period window
     (last sprint_period_days days). Count velocity as number of completed story-point-
     bearing issues. For platforms without story points (Trello), use issue count as proxy
     and note this in warnings."
  # --- Community-sourced constraints (2025-2026) ---
  - "Jira Cloud points-based rate limits (effective March 2, 2026): Jira Cloud has migrated
     from a simple request-per-minute limit to a points-based model where complex queries
     (returning large result sets, using custom field JQL) consume more points per request.
     Always use field filtering (?fields=id,status,summary) to reduce points consumed per
     request; never fetch all fields when only a subset is needed."
  - "Jira pagination: the /rest/api/3/search endpoint has a hard server-side cap of
     maxResults=100. If you set maxResults higher it is silently clamped to 100. Always
     paginate using startAt offset arithmetic (startAt += maxResults) until the returned
     issues array length < maxResults. Do NOT assume total == len(issues) on the first page."
  - "Jira webhook JQL filter performance: webhooks with complex JQL filters (especially those
     involving custom fields) are evaluated synchronously on every user action. Avoid
     registering webhooks with expensive JQL — use simple filters and filter in application
     code. Complex webhook JQL has been observed to slow Jira UI operations to 15-30s."
  - "Webhook delivery is best-effort only: Jira Cloud, GitHub, and Linear do NOT guarantee
     webhook delivery. If the receiver endpoint is down or slow, the event is dropped without
     retry in most cases. For critical state-sync operations, always implement a polling
     fallback that reconciles state periodically independent of webhook delivery."
  - "Jira Cloud concurrent webhook limit: Jira enforces a maximum of 20 concurrent outbound
     webhook requests per tenant per destination host. During bulk operations this limit is
     easily reached and excess events are queued then dropped if the queue overflows. For
     bulk imports, disable webhooks during the import and trigger a manual reconciliation
     poll instead."
  - "Webhook replay attack protection: storing a webhook secret is necessary but not
     sufficient — without timestamp validation, a captured valid webhook payload can be
     replayed hours or days later. Check the X-GitHub-Delivery header for uniqueness and
     validate that the request timestamp (from X-GitHub-Delivery or a custom timestamp
     header) is within a 5-minute window of the current time. Reject requests older than
     5 minutes regardless of signature validity."
  - "Linear API token expiry: when configuring a Linear-Jira integration or webhook, the
     API token created for the integration defaults to a 1-week expiry. Set token expiry
     to 1 year (or use a machine account with a non-expiring token) and store the expiry
     date in a config file with an alert 7 days before expiry. Expired tokens cause silent
     webhook delivery failures — Linear stops delivering events without notifying the
     integration owner."
  - "GitHub-Jira integration breakage after GitHub access policy changes (April 2025):
     the GitHub-Jira OAuth integration stopped working for many users after GitHub tightened
     third-party app access policies in spring 2025. The integration shows 'In Progress' for
     10-15 minutes then fails silently. Mitigation: switch to direct webhook configuration
     instead of the OAuth integration; configure GitHub webhooks manually to POST to Jira's
     webhook endpoint with HMAC-SHA256 signature validation."
  - "Jira webhook JQL evaluation with 'project = X AND issue_type = Story': JQL filters on
     webhooks are evaluated as the system user, not the integration user. If the system user
     lacks browse permission on a project, the JQL filter silently excludes events from that
     project. Verify the webhook registration user has global 'Browse Projects' permission,
     not just project-specific permission."
  - "GitHub secondary rate limits on issue creation: creating >50 issues in rapid succession
     triggers GitHub's secondary rate limit (HTTP 403 with 'secondary rate limit exceeded'
     in the response body, not a 429). Standard 429 retry logic does not catch this. Detect
     secondary rate limit by checking response.status_code == 403 and 'secondary rate limit'
     in response.text; back off 60 seconds before retrying."
  - "Linear GraphQL N+1 query pattern: fetching a list of issues and then querying each
     issue's comments separately (one GraphQL call per issue) hits the rate limit quickly.
     Use GraphQL nested queries to fetch issues with their comments in a single request:
     issues { nodes { id title comments { nodes { body } } } }. Never loop over results
     and make per-item API calls."
  - "Trello API key and token in query parameters logged by web servers: Trello's API
     authenticates via ?key=KEY&token=TOKEN query string parameters, which appear in server
     access logs in plaintext. Rotate Trello tokens after any log exposure; use a log
     sanitisation middleware that replaces ?key=... and ?token=... with ?key=REDACTED in
     access logs."
  - "Jira transition API requires transition ID, not status name: to move an issue to a
     different status, POST to /rest/api/3/issue/{id}/transitions with a transition ID (not
     the status name). Transition IDs are project-specific and change if a workflow is
     modified. Fetch available transitions via GET /rest/api/3/issue/{id}/transitions before
     attempting a status change; never hardcode transition IDs."
  - "GitHub Issues labels are case-sensitive in the API but not in the UI: creating a label
     'Bug' and 'bug' results in two distinct labels. When filtering issues by label in list
     operations, normalise label names to lowercase for comparison. The Labels filter in the
     API is case-insensitive for GET requests but case-sensitive for POST (create label)."
  - "Asana rate limit (150 req/min per user): Asana's API enforces a per-user rate limit of
     150 requests per minute. A sprint report that fetches all tasks in a project and then
     fetches each task's subtasks separately can easily exceed this limit for projects with
     >100 tasks. Use Asana's opt_fields parameter to include subtask data in the initial
     task list request rather than making secondary per-task calls."
  - "Webhook endpoint must respond within 10 seconds or GitHub retries: GitHub considers a
     webhook delivery failed if the receiving endpoint does not return HTTP 200-299 within
     10 seconds. Long-running processing (e.g. syncing to multiple platforms) must be
     offloaded to a background queue immediately; the webhook handler should only enqueue
     the event and return 200 within 1-2 seconds."
  - "Jira Cloud API v2 vs. v3 endpoint confusion: Jira has both /rest/api/2 and /rest/api/3
     endpoints with different response schemas (v3 uses Atlassian Document Format for
     description fields, v2 uses plain markdown-like text). Mixing v2 and v3 calls in the
     same integration causes description field parsing errors. Choose one version and use
     it consistently; v3 is the current supported version."
  - "Sprint velocity calculation with story-point-less issues: platforms like GitHub Issues
     and basic Trello don't have story points. Using issue count as velocity proxy inflates
     velocity for sprints with many small bugs vs. large feature work. Implement a size
     proxy based on label (e.g. 'size:S=1, size:M=3, size:L=5') and document this
     proxy in the sprint report output to prevent misleading velocity comparisons."
  - "Monday.com GraphQL rate limit resets daily, not per minute: Monday's API uses a daily
     quota (10,000 API calls per day for standard plans). Queries that recursively paginate
     large boards can exhaust the daily quota in a single run. Implement a quota tracker
     that monitors the complexity header in Monday responses and stops pagination when
     daily quota falls below 10%."

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. 24 Pull Requests (https://24pullrequests.com/api) — 项目 到 promote 开源 协作 during December，认证：No
         2. Screenshot (https://www.abstractapi.com/website-screenshot-api) — 以编程方式截取任意网站网页截图，认证：`apiKey`
         3. Agify.io (https://agify.io) — 根据名字估算年龄，认证：No
         4. API Grátis (https://apigratis.com.br/) — Multiples 服务 和 公共 API，认证：No
         5. ApicAgent (https://www.apicagent.com) — 提取 设备 详情 来自 user-agent 字符串，认证：No
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "GitHub secondary rate limit triggered by rapid successive API calls in a loop"
    mitigation: "Add time.sleep(0.25) between individual issue creation requests;
      catch HTTP 403 with 'secondary rate limit' in body and back off 60 seconds"
  - severity: HIGH
    pattern: "Status sync conflict: two platforms updated the same task simultaneously,
      later sync overwrites the more recent change"
    mitigation: "Fetch current status before updating; compare updated_at timestamps;
      if target was updated more recently than source, skip sync and add conflict warning"
  - severity: HIGH
    pattern: "Webhook duplicate processing: same event handled twice causing duplicate tasks"
    mitigation: "Implement dedup cache keyed by delivery_id/event_id with 60s TTL;
      return HTTP 200 immediately for duplicates without processing"
  - severity: MEDIUM
    pattern: "Pagination stops early — only first page retrieved for large backlogs"
    mitigation: "Always check for Link header 'rel=next' (GitHub) or hasNextPage (GraphQL)
      in every response; assert total count from API matches len(collected_results) if API
      provides a total field"
  - severity: MEDIUM
    pattern: "Jira status names are project-specific; hardcoded status names cause
      400 Bad Request on status transitions"
    mitigation: "Always fetch /rest/api/3/project/{key}/statuses at the start of each
      session and build the status ID map dynamically; never hardcode Jira status IDs"
  - severity: LOW
    pattern: "Trello API key/token exposed in server logs when query params are logged"
    mitigation: "Use a requests.Session with a custom PreparedRequest hook to redact
      ?key= and ?token= query params from log output"
  # --- Community-sourced failures (2025-2026) ---
  - severity: HIGH
    pattern: "Jira pagination stops at 100 issues because maxResults silently clamped —
      sprint report shows only the most recently updated issues, missing earlier ones"
    mitigation: "Never rely on a single API call for list_tasks; always loop with startAt
      until issues returned < maxResults; add an assertion that total_fetched >= api_total
      where api_total is the 'total' field in the JQL search response"
  - severity: HIGH
    pattern: "Webhook events dropped during bulk import — task creation events trigger
      downstream integrations that process incomplete data, causing data inconsistency"
    mitigation: "Implement a periodic reconciliation job (every 15 minutes) that queries
      each platform for current state and updates local cache; treat webhooks as performance
      optimisation only, not as the source of truth for state"
  - severity: HIGH
    pattern: "Jira points-based rate limit exhausted mid-report on large projects (>500 issues)
      causing 429 errors that halt pagination with partial results returned as complete"
    mitigation: "Monitor X-RateLimit-Remaining header on every Jira response; when remaining
      < 20% of window quota, switch to a reduced-fields query (?fields=id,status) and log
      a rate_limit_warning; resume full-field queries in the next rate limit window"
  - severity: MEDIUM
    pattern: "Jira webhook JQL filter evaluation slows user UI operations to 15-30s,
      causing user complaints about Jira slowness traced to the integration webhook"
    mitigation: "Register webhooks with minimal JQL (e.g. project = KEY) and perform
      additional filtering in the receiver; audit registered webhooks periodically and
      remove any with complex custom-field JQL filters"
  - severity: MEDIUM
    pattern: "GitHub Link header pagination URL changes between API versions, causing
      manually constructed pagination URLs to return 404 or wrong page offsets"
    mitigation: "Always parse the Link header for rel=next URL; never construct pagination
      URLs manually using page number arithmetic; use the exact URL from the Link header"
  - severity: HIGH
    pattern: "GitHub webhook delivery fails silently because endpoint takes >10s to respond
      — GitHub retries 3 times then stops; downstream integration misses events permanently"
    mitigation: "Webhook handler must return HTTP 200 within 2s; immediately write the raw
      payload to a durable queue (Redis, SQS, or SQLite with WAL mode); process asynchronously
      in a worker; implement a missed-event reconciliation job that polls platform APIs every
      15 minutes to catch any events lost during delivery failures"
  - severity: HIGH
    pattern: "Linear API token expires silently after 1 week — webhook events stop arriving
      and the integration appears operational but no data is syncing"
    mitigation: "Set token expiry to 1 year on creation; store expiry_at in config; add a
      daily health-check job that tests API connectivity and alerts when expiry_at is within
      14 days; treat a sudden drop in event volume as a token expiry signal"
  - severity: HIGH
    pattern: "Jira transition uses hardcoded transition ID that becomes invalid after a
      workflow modification — all status updates silently fail with 400 Bad Request"
    mitigation: "Fetch valid transitions dynamically at the start of each session with
      GET /rest/api/3/issue/{id}/transitions; build a name-to-ID map; cache with TTL 1 hour;
      never store transition IDs in config files or source code"
  - severity: MEDIUM
    pattern: "Webhook replay attack: captured GitHub webhook payload re-sent hours later
      — signature validates successfully but creates duplicate tasks"
    mitigation: "Store all X-GitHub-Delivery IDs for the last 24 hours; reject duplicate
      delivery IDs immediately with HTTP 200 (to prevent GitHub retry); also validate that
      the event timestamp is within a 5-minute window of current time"
  - severity: MEDIUM
    pattern: "Trello API credentials exposed in web server access logs because authentication
      uses query string parameters"
    mitigation: "Configure web server log format to redact query parameters matching
      key= and token=; rotate tokens after any log file breach; consider proxying Trello
      calls through a backend service that injects credentials server-side, never exposing
      them to client-side or logging layers"
  - severity: LOW
    pattern: "Sprint velocity report inflated for bug-fix sprints vs. feature sprints
      because issue count is used as proxy — misleads team planning"
    mitigation: "Implement label-based size mapping (size:XS=1, size:S=2, size:M=3,
      size:L=5, size:XL=8); compute weighted velocity using label weights; add a note in
      the sprint_report output when >50% of closed issues lack size labels, indicating
      the velocity figure is unreliable"

