# 知识积木 v2 — 电子表格处理
# 用途：Excel/CSV/Google Sheets 数据清洗、公式生成、图表分析

# === 信封层（给系统看）===
id: spreadsheet-v1
name: 电子表格处理
version: 1.0.0
category:
  - 数据处理
  - 生产力
tags:
  - Excel
  - CSV
  - Google Sheets
  - 数据清洗
  - 公式
  - openpyxl
  - pandas
  - 表格
capability_type: transform
data_source: filesystem

inputs:
  file_path:
    type: string
    required: false
    description: "本地文件路径（.xlsx/.xls/.csv/.ods）；与 sheet_id 二选一，不可同时为空"
  sheet_id:
    type: string
    required: false
    description: "Google Sheets 文档 ID（URL 中 /d/ 后的部分）；需配置 GOOGLE_SERVICE_ACCOUNT_JSON 环境变量"
  sheet_name:
    type: string
    required: false
    default: ""
    description: "工作表名称；空字符串表示第一张工作表；Google Sheets 中为 Tab 名称"
  operation:
    type: enum
    required: true
    description: "操作类型：read=读取数据为 JSON，clean=数据清洗，formula=生成公式，analyze=统计摘要，write=写入数据"
    enum_values:
      - read
      - clean
      - formula
      - analyze
      - write
  clean_rules:
    type: string
    required: false
    default: '{"remove_empty_rows": true, "normalize_dates": true, "trim_whitespace": true, "remove_duplicates": false}'
    description: "JSON 格式的清洗规则，仅 operation=clean 时生效"
  formula_request:
    type: string
    required: false
    default: ""
    description: "自然语言公式需求，如 '计算B列的去年同期增长率'，仅 operation=formula 时生效；
      LLM 会生成对应的 Excel 公式字符串"
  data_json:
    type: text
    required: false
    default: ""
    description: "写入数据的 JSON 字符串（二维数组），仅 operation=write 时生效；
      格式：[[row1col1, row1col2], [row2col1, row2col2]]"
  target_cell:
    type: string
    required: false
    default: "A1"
    description: "写入起始单元格（operation=write），Excel A1 格式，如 'B3'"
  max_rows:
    type: integer
    required: false
    default: 10000
    description: "最大读取行数，防止超大文件 OOM；0 表示不限制（慎用）"
    validation: "0 <= value <= 1000000"

outputs:
  data:
    type: string
    description: "读取/清洗后的数据（operation=read/clean），JSON 格式：{columns: [...], rows: [[...]]}"
  formula:
    type: string
    description: "生成的 Excel/Sheets 公式字符串（operation=formula），如 '=IFERROR(B2/OFFSET(B2,-12,0)-1,\"N/A\")'"
  summary:
    type: string
    description: "统计摘要（operation=analyze），包含行数、列数、空值率、数值列均值/中位数/标准差"
  modified_path:
    type: string
    description: "修改后的文件路径（operation=clean/write），原文件加 _cleaned/_updated 后缀"
  warnings:
    type: string
    description: "处理过程中的数据质量警告，如编码问题、日期格式不一致、合并单元格等"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1
  - knowledge-base-v1

# === 内容层（给 LLM 看）===
core_capability: >
  使用 pandas 和 openpyxl 处理本地 Excel/CSV 文件，或通过 Google Sheets API 处理云端表格，
  支持数据清洗、AI 公式生成、统计分析和数据写入。

constraints:
  - "文件读取优先级：.xlsx 用 openpyxl 引擎（pd.read_excel(engine='openpyxl')），
     .xls 用 xlrd 引擎，.csv 先尝试 UTF-8 再 fallback GBK/GB2312/Latin-1；
     编码检测用 chardet.detect(f.read(10240))['encoding']，不可硬编码编码格式"
  - "CSV 编码乱码处理：检测失败时逐一尝试 ['utf-8', 'utf-8-sig', 'gbk', 'gb2312', 'latin-1']；
     全部失败时用 errors='replace' 读取并在 warnings 中标注"
  - "公式注入安全（CRITICAL）：CSV/Excel 中以 =、+、-、@ 开头的单元格值是潜在公式注入；
     写入 Google Sheets 时必须对用户输入数据调用 sanitize：
     value = \"'\" + str(value) if str(value).startswith(('=','+','-','@')) else value；
     禁止将用户数据直接写入 cells 而不加前缀"
  - "Google Sheets API（sheet_id 非空时）：
     使用 google-api-python-client，scope=['https://www.googleapis.com/auth/spreadsheets']；
     读取：GET spreadsheets/{id}/values/{range}；
     写入：PUT spreadsheets/{id}/values/{range}，valueInputOption='USER_ENTERED'（允许公式）；
     服务账号 JSON 从环境变量 GOOGLE_SERVICE_ACCOUNT_JSON 解析（json.loads），不从文件读取"
  - "Google Sheets API 限流：免费套餐 300 req/min per project，60 req/min per user；
     批量读写用 batchGet/batchUpdate 而非逐单元格请求；
     遇到 429 时指数退避（初始 1s，最多 5 次）"
  - "合并单元格处理（openpyxl）：ws.merged_cells 包含所有合并区域；
     读取时必须解开合并：for merged_range in ws.merged_cells.ranges: ws.unmerge_cells(str(merged_range))；
     解开后用左上角单元格的值填充整个区域，不可直接读取合并区域内的非左上角单元格（返回 None）"
  - "日期格式统一化（clean_rules.normalize_dates=true）：
     pd.to_datetime(col, infer_datetime_format=True, errors='coerce') 统一转为 datetime64；
     转换失败的单元格变为 NaT，在 warnings 中报告原始值；
     输出时格式化为 ISO 8601：dt.strftime('%Y-%m-%d')"
  - "大文件内存控制（max_rows > 0）：用 pd.read_csv(chunksize=1000) 流式读取；
     读取行数达到 max_rows 时停止并在 warnings 中注明截断；
     openpyxl read_only 模式（load_workbook(file, read_only=True)）可减少 60% 内存占用"
  - "公式生成（operation=formula）：调用 LLMAdapter 时在 system prompt 中声明目标是
     生成 Excel/Google Sheets 兼容公式字符串；要求只输出公式本身（以 = 开头），不含解释；
     公式中的列引用基于 sheet 实际的列头名称，先读取第一行作为上下文传给 LLM"
  - "【社区经验】openpyxl 打开含图表/图片/VBA 的 Excel 文件后保存会丢失这些元素：
     openpyxl 文档明确说明不支持读取所有 Excel 元素，shapes 在 save 时丢失；
     处理此类文件前在 warnings 中提示用户备份原文件（来源：openpyxl docs）"
  - "【社区经验】openpyxl 默认不防御 XML 炸弹攻击（Billion Laughs / Quadratic Blowup）：
     处理不可信来源的 .xlsx 文件时必须安装 defusedxml 并在 load_workbook 前 patch；
     import defusedxml.ElementTree; defusedxml.defuse_stdlib()（来源：openpyxl security docs）"
  - "【社区经验】Google Sheets API 2025 年加强了安全协议和配额执行：
     每用户每分钟读取请求上限 60 次（比旧文档严格），超出触发 429；
     批量读写必须用 batchGet/batchUpdate，单次请求超过 180 秒会触发 timeout 错误（来源：developers.google.com/workspace/sheets/api/limits）"
  - "【社区经验】UTF-8 BOM 编码 CSV（Windows Excel 导出默认格式）导致首列名有隐藏字符：
     pd.read_csv() 读取后第一列名变为 '\\ufeffColumnName'，导致后续 df['ColumnName'] 报 KeyError；
     读取时使用 encoding='utf-8-sig' 自动剥离 BOM，或用 charset_normalizer 自动检测（来源：pandas docs）"
  - "【社区经验】openpyxl 保存含合并单元格边框的文件后边框样式被破坏：
     load + save 操作后合并区域的边框样式大多丢失，这是 openpyxl 已知 bug；
     若文件需保留边框样式，建议只读取数据（read_only=True）不回写，或使用 xlsxwriter 重建文件
     （来源：openpyxl users group）"
  - "【社区经验】openpyxl 含注释（comments）的工作簿保存第二次时报错：
     第一次 save() 成功，再次 load + save 同一文件时因注释 XML 结构重复注册抛出异常；
     有注释的文件在处理后重命名输出（_updated.xlsx），不覆盖原文件（来源：openpyxl changelog #206）"
  - "【社区经验】openpyxl data_only=True 读取公式单元格只返回上次 Excel 打开时的缓存值，
     若文件从未用 Excel 打开过（如服务端生成）则返回 None：
     服务端处理 xlsx 时不应依赖 data_only 缓存值；需要公式计算结果时改用 xlcalculator 或 openpyxl-formula
     （来源：openpyxl docs data_only 说明）"
  - "【社区经验】Excel 从一个工作簿复制单元格到另一个工作簿时 openpyxl 抛异常：
     不支持跨 workbook 对象的 cell/row 复制；必须手动读取值再写入目标 workbook；
     不要直接 append(source_ws['A1:Z1000'])（来源：openpyxl docs cross-workbook）"
  - "【社区经验】Google Sheets API 单次 batchUpdate 请求体超过 2MB 触发 413 错误：
     大批量写入（>1000 行）时应将请求拆分为每批最多 500 行；
     每行数据量较大（含长文本）时进一步减小批大小（来源：developers.google.com/sheets/api/limits）"
  - "【社区经验】pandas 低内存模式（low_memory=True，默认）在混合类型列中猜测 dtype 不稳定：
     同一列的前 10 万行全是数字，后面出现字符串，导致 dtype 变为 object，后续数值运算报错；
     指定 dtype={'列名': str} 或在 read_csv 时设置 low_memory=False 来稳定推断（来源：pandas docs）"
  - "【社区经验】CSV 中 'None'/'NULL'/'NA' 字符串被 pandas 自动转换为 NaN，导致原始值丢失：
     某些业务字段（如状态码 'NA' = North America）被误识别为空值；
     使用 na_values=[] 或 keep_default_na=False 禁用默认 NaN 识别，手动声明哪些值是空（来源：pandas read_csv docs）"
  - "【社区经验】Excel serial date（序列日期）在不同 Excel 版本间有 1900/1904 日期系统差异：
     Mac 版 Excel 历史上使用 1904-01-01 作为 origin（而非 1900-01-01），同样数字在 Windows/Mac 间相差 4 年；
     转换时检查文件是否有 1904 标志（ws.sheet_format.defaultDate1904），相应切换 origin
     （来源：openpyxl datetime 处理文档）"
  - "【社区经验】Google Sheets API 服务账号 JSON 包含换行符的私钥在环境变量传递时被截断：
     os.environ['GOOGLE_SERVICE_ACCOUNT_JSON'] 读取时若私钥 \\n 被 shell 转义，认证失败报 'Invalid PEM'；
     使用 base64 编码环境变量，读取时 base64.b64decode 解码再 json.loads（来源：Google Cloud auth 文档）"
  - "【社区经验】CSV formula injection（公式注入）Microsoft Excel 会在重新保存时移除单引号前缀防护：
     常见的 \"'\" + 前缀方案在用户保存文件后失效，原公式重新激活；
     更安全的方案是写入时使用 valueInputOption='RAW'（Google Sheets）或对所有以 =+- 开头的值加空格前缀
     （来源：OWASP CSV Injection + Cyber Chief 2024）"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. Airtable (https://airtable.com/api) — 集成 带有 Airtable，认证：`apiKey`
         2. Api2Convert (https://www.api2convert.com/) — 在线 文件 转换 API，认证：`apiKey`
         3. apilayer pdflayer (https://pdflayer.com) — HTML / URL 转 PDF，认证：`apiKey`
         4. Asana (https://developers.asana.com/docs) — Programmatic 访问 到 全部 数据 在 你的 asana 系统，认证：`apiKey`
         5. ClickUp (https://clickup.com/api) — ClickUp 是 robust, cloud-based 项目 管理 工具 用于 boosting 生产力 / 办公效率，认证：`OAuth`
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "CSV 公式注入：用户数据中含 '=SUM(A1:A100)' 被 Excel 当公式执行，触发安全漏洞"
    mitigation: "写入前扫描所有单元格值，以特殊符号开头的加单引号前缀；
      Google Sheets 写入用 valueInputOption='RAW' 代替 'USER_ENTERED'（禁止公式解析）"
  - severity: HIGH
    pattern: "openpyxl 读取合并单元格时，非左上角单元格返回 None，误认为空值被删除"
    mitigation: "必须先解除合并再读取；detection：len(ws.merged_cells.ranges) > 0 时触发解合并流程"
  - severity: HIGH
    pattern: "GBK 编码 CSV 在 macOS/Linux 上 pd.read_csv() 报 UnicodeDecodeError，任务中断"
    mitigation: "先用 chardet 检测编码；detection 置信度 < 0.8 时逐一尝试编码列表；
      全部失败时 errors='replace' 兜底，并在 warnings 中标记受影响行号"
  - severity: MEDIUM
    pattern: "Excel 文件中日期存储为数字（serial date，如 44927 = 2023-01-01），pd 读取为浮点数"
    mitigation: "对 float/int 列检查值域：1900-2100 年对应序列号 1-73050；
      疑似日期列用 pd.to_datetime(col, unit='D', origin='1899-12-30') 转换"
  - severity: MEDIUM
    pattern: "Google Sheets API 429 限流：批量更新 100+ 行时触发，整个操作失败"
    mitigation: "batchUpdate 每次最多 200 个单元格；超出时分批发送，批间 sleep(0.2)；
      遇到 429 捕获 googleapiclient.errors.HttpError，退避后重试"
  - severity: LOW
    pattern: "openpyxl 修改含宏（.xlsm）文件后宏代码丢失"
    mitigation: "检测到 .xlsm 后缀时在 warnings 中提示 'VBA macros will be lost'；
      保存时改用 .xlsx 后缀；若必须保留宏，提示用户手动处理"
  - severity: HIGH
    pattern: "【社区经验】openpyxl 处理不可信 .xlsx 文件时存在 XML 炸弹安全漏洞（Billion Laughs 攻击）"
    mitigation: "处理外部上传文件前执行：import defusedxml; defusedxml.defuse_stdlib()；
      生产环境对所有非内部来源文件限制最大文件大小（<10MB）并在 sandbox 中处理（来源：openpyxl docs）"
  - severity: MEDIUM
    pattern: "【社区经验】Windows Excel 导出的 CSV 带 UTF-8 BOM，pd.read_csv() 首列名包含不可见 BOM 字符，
      导致 df['列名'] 报 KeyError，排查困难"
    mitigation: "固定用 encoding='utf-8-sig' 读取 CSV（可同时兼容有/无 BOM 的文件）；
      在 data cleaning 阶段对所有列名执行 df.columns = df.columns.str.strip()（来源：pandas docs）"
  - severity: HIGH
    pattern: "【社区经验】CSV formula injection 的单引号前缀防护在 Excel 重新保存后失效，
      公式重新激活可能导致代码执行或数据外泄"
    mitigation: "对所有以 =+-@ 开头的值在前面加一个空格字符（' '+value）而非单引号；
      或使用 valueInputOption='RAW' 向 Google Sheets 写入（来源：OWASP CSV Injection 2024）"
  - severity: MEDIUM
    pattern: "【社区经验】openpyxl data_only=True 在服务端生成的文件中返回 None，
      因为文件从未被 Excel 打开过，公式结果缓存不存在"
    mitigation: "服务端不要依赖 data_only 读取计算结果；需要公式结果时用 xlcalculator 库手动计算；
      或在文件创建时就只写入数值而非公式（来源：openpyxl 文档）"
  - severity: MEDIUM
    pattern: "【社区经验】pandas 默认 NaN 识别将业务字段 'NA'/'NULL'/'None' 等有效字符串值转为 NaN"
    mitigation: "read_csv/read_excel 时显式设置 na_values=[] 或 keep_default_na=False；
      或在读取后用 df.fillna('') 配合业务逻辑单独处理真正的空值（来源：pandas IO 文档）"
  - severity: LOW
    pattern: "【社区经验】openpyxl 含注释的工作簿第二次 save() 时崩溃，无法正常覆盖保存"
    mitigation: "处理流程改为：读取 → 修改 → 写入新文件（加 _updated 后缀）；
      不要重复保存同一 workbook 对象（来源：openpyxl 已知 bug）"

