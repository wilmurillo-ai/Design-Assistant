# 知识积木 v2 — Data Reporting
# 用途：自动生成周报/月报，包含数据聚合、图表生成和格式化描述，支持多种输出后端

# === 信封层（给系统看）===
id: data-reporting-v1
name: Data Reporting
version: 1.0.0
category:
  - Analytics
  - Reporting
tags:
  - weekly report
  - monthly report
  - data visualization
  - matplotlib
  - plotly
  - google sheets
  - metabase
  - looker studio
  - aggregation
  - alt text
capability_type: transform
data_source: database

inputs:
  data_source_type:
    type: enum
    required: true
    description: "Where the raw data comes from"
    enum_values:
      - csv_file
      - json_file
      - sqlite
      - postgres
      - google_sheets
      - api_json
  data_source_uri:
    type: string
    required: true
    description: "Path or connection string to the data source; for google_sheets use the sheet ID"
    validation: "len(value) <= 512"
  report_period:
    type: enum
    required: true
    description: "Reporting period granularity"
    enum_values:
      - daily
      - weekly
      - monthly
      - quarterly
  timezone:
    type: string
    required: false
    default: "UTC"
    description: "IANA timezone name for period boundary calculation, e.g. 'America/New_York', 'Asia/Tokyo'"
    validation: "len(value) <= 64"
  metrics:
    type: text
    required: true
    description: "JSON array of metric definitions; each item: {\"name\": str, \"column\": str, \"aggregation\": \"sum|avg|count|max|min\"}"
    validation: "len(value) <= 4000"
  chart_type:
    type: enum
    required: false
    default: "bar"
    description: "Chart type for visualisation"
    enum_values:
      - bar
      - line
      - pie
      - scatter
      - table_only
  output_format:
    type: enum
    required: false
    default: "markdown"
    description: "Output format for the report body"
    enum_values:
      - markdown
      - html
      - json
      - pdf
  include_chart_image:
    type: boolean
    required: false
    default: true
    description: "Whether to render and embed a chart image (PNG base64) in the output"

outputs:
  report_text:
    type: string
    description: "Formatted report body in the requested output_format"
  chart_image_b64:
    type: string
    description: "Base64-encoded PNG chart image; empty string if include_chart_image=false or chart_type=table_only"
  chart_alt_text:
    type: string
    description: "Accessibility alt text describing the chart content, suitable for screen readers and email clients"
  period_start:
    type: string
    description: "ISO 8601 timestamp of the report period start (in the specified timezone)"
  period_end:
    type: string
    description: "ISO 8601 timestamp of the report period end (in the specified timezone)"
  data_row_count:
    type: integer
    description: "Number of rows used in the aggregation after period filtering"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1
  - project-mgmt-v1
  - customer-comms-v1

# === 内容层（给 LLM 看）===
core_capability: >
  Load tabular data from the configured source, filter to the requested reporting period
  using timezone-aware datetime boundaries, aggregate metrics, render a chart via matplotlib
  or plotly, generate an LLM-written narrative summary, and produce a formatted report with
  accessibility alt text.

constraints:
  - "Timezone alignment is mandatory: use zoneinfo.ZoneInfo(timezone) (Python 3.9+) to
     compute period_start and period_end. NEVER use datetime.utcnow() — it returns naive
     datetimes that silently drop timezone offsets and corrupt period boundaries."
  - "Period boundary calculation: for 'weekly', use ISO week (Monday=start, Sunday=end).
     For 'monthly', first day of month 00:00:00 to last day 23:59:59 in the local timezone.
     Convert boundaries to UTC only when querying databases that store UTC timestamps."
  - "Data loading: for CSV/JSON, use pandas read_csv/read_json with dtype inference disabled
     for date columns; parse dates explicitly with pd.to_datetime(col, utc=True) then
     convert to the target timezone. For Google Sheets, use the gspread library with service
     account credentials from env var GOOGLE_SERVICE_ACCOUNT_JSON."
  - "Aggregation: parse the metrics JSON array, group the DataFrame by period, and apply
     the specified aggregation function. Validate each metric column exists before aggregating;
     raise ValueError('column {col} not found') with the full column list for debuggability."
  - "Chart rendering with matplotlib: use plt.switch_backend('Agg') BEFORE importing pyplot
     to prevent GUI window creation in headless environments. Always call plt.close('all')
     after saving to prevent memory leaks across multiple report runs."
  - "Chart alt text: generate a concise alt text string describing the chart using an LLM
     (e.g. 'Bar chart showing weekly revenue: week 1 $12k, week 2 $15k, week 3 $11k').
     This is required for WCAG 2.1 compliance and email client accessibility."
  - "Google Sheets Charts (free): generate a chart URL via the Sheets Charts API
     (POST /v4/spreadsheets/{id}/charts). The chart is hosted by Google; embed the returned
     URL rather than a base64 blob in HTML output."
  - "Metabase (paid, self-hosted): POST /api/card to create a question, then GET
     /api/card/{id}/query to retrieve results. Auth via METABASE_SECRET_KEY env var
     (session token endpoint POST /api/session)."
  - "Data source connection failures must be caught individually: if the data source is
     unreachable, return {'report_text': '', 'error': 'datasource_unavailable', 'detail': str(e)}
     rather than raising, so the calling pipeline can decide retry logic."
  - "Never hard-code date literals in the aggregation logic. All date boundaries must derive
     from the current UTC time plus the timezone offset. Tests must mock datetime.now() to
     verify period boundary correctness."
  # --- Community-sourced constraints (2025-2026) ---
  - "Figure size must be set explicitly: never rely on matplotlib's default figure size (6.4x4.8
     inches). In automated reports, default sizing causes labels, tick marks, and titles to
     overlap or be clipped. Always call plt.figure(figsize=(width, height)) before plotting;
     use tight_layout=True or fig.tight_layout() after adding all elements."
  - "Date axis formatting in time series charts: matplotlib auto-formats date ticks but the
     default produces overlapping labels at daily/weekly granularity. Always apply
     fig.autofmt_xdate(rotation=45) or set explicit DateFormatter with
     ax.xaxis.set_major_formatter(mdates.DateFormatter('%Y-%m-%d')) to prevent label collision."
  - "Export DPI for reports: saving charts with the default dpi=72 produces blurry images
     in PDF/Word reports and on high-DPI screens. Always use plt.savefig(path, dpi=150,
     bbox_inches='tight') for report-quality output; use dpi=300 for print-quality output."
  - "Colorblind accessibility: default matplotlib color cycles ('tab10') include red-green
     pairs that are indistinguishable for 8% of users. Use the 'petroff10' cycle (added in
     matplotlib 3.10) or pass colors from the 'viridis'/'cividis' perceptually uniform
     palettes for all multi-series charts in reports intended for wide audiences."
  - "Version-locked chart styles in regulated reporting: different matplotlib versions produce
     visually different chart styles (font sizes, tick spacing, default colors). Pin matplotlib
     version in pyproject.toml/requirements.txt for any pipeline where chart appearance must
     be stable across runs (e.g. compliance reports, version-controlled report archives)."
  - "DST ambiguous times in pandas groupby aggregations: when grouping time-series data by
     day/week/month during DST fall-back transitions, pandas may raise AmbiguousTimeError
     or silently duplicate the ambiguous hour (e.g. 01:30 AM appears twice). Always call
     df.index.tz_localize(tz, ambiguous='infer') when loading raw data, or store all
     timestamps in UTC and convert only at display time."
  - "matplotlib mixed pyplot/OO API causes state leaks: code that alternates between
     plt.plot() calls and ax.plot() calls in the same function creates hidden state
     dependencies. Standardise on the OO API (fig, ax = plt.subplots()) throughout;
     never mix the two APIs in the same module. State leaks are especially dangerous in
     multi-threaded report generation."
  - "Seaborn style resets global matplotlib rcParams: calling sns.set_theme() or
     sns.set_style() globally modifies matplotlib's rcParams for the entire process.
     In a pipeline that generates multiple chart types with different styles, apply
     seaborn styles per-figure using with sns.axes_style('whitegrid'): context manager
     to scope style changes to individual plots."
  - "NaN values in line charts create invisible gaps: matplotlib line plots silently
     skip NaN data points, resulting in gaps in the line that look like missing data
     but are not visually obvious. Either interpolate NaN values with df.fillna(method=
     'ffill') for continuous metrics, or explicitly mark gaps with a secondary scatter
     plot of the NaN positions so the reader knows data is missing."
  - "Plotly figures not displaying in non-interactive environments: pio.show() opens a
     browser tab and blocks execution in headless server environments. Use
     fig.write_image(path, engine='kaleido') for static PNG/SVG export in production;
     install kaleido explicitly (pip install kaleido) as it is not a default Plotly
     dependency. Missing kaleido raises a generic ValueError at runtime."
  - "pandas read_csv infers date columns as object dtype by default: date columns are
     loaded as strings unless explicitly parsed. Always pass parse_dates=['date_col'] and
     dtype={'metric_col': float} to read_csv. Silent object-dtype dates cause aggregation
     to sort alphabetically ('2025-10-01' before '2025-09-30') rather than chronologically."
  - "Google Sheets API quota: free tier allows 300 read requests per minute per project,
     not per user. A report generator making 5 sheet reads per report and triggered 70 times
     in a minute will hit the quota. Implement request batching with gspread's
     spreadsheet.values_batch_get() to read all ranges in a single API call."
  - "matplotlib subplot spacing with tight_layout: tight_layout() sometimes fails silently
     when axes have colorbars, inset axes, or legends placed outside the axes boundary.
     Use constrained_layout=True at figure creation (plt.figure(constrained_layout=True))
     instead of calling tight_layout() after the fact — it handles complex layouts more
     robustly."
  - "Report period boundaries differ by DST switch: a 'weekly' report covering a week that
     includes a DST transition will have 167 or 169 hours instead of 168. Use
     pd.date_range(start, periods=7, freq='D', tz=timezone) instead of
     start + timedelta(days=7) to generate correct period boundaries that respect DST."
  - "Large dataset plotting performance: matplotlib can freeze the process when rendering
     scatter plots with >100,000 points. Use datashader or rasterize=True (in hvplot/
     datashader integration) for large datasets. For standard matplotlib, downsample to
     max 10,000 points using df.sample(10000, random_state=42) and note the sampling
     in the chart title or footnote."
  - "Chart font rendering differs across OS: matplotlib uses system fonts by default, and
     reports generated on macOS vs. Linux may render with different fonts causing layout
     differences in PDFs sent to clients. Bundle a specific font (e.g. DejaVu Sans) and
     set it explicitly with matplotlib.rcParams['font.family'] = 'DejaVu Sans' to ensure
     consistent cross-platform rendering."
  - "Base64 chart images balloon email size: embedding a 300 DPI chart as base64 in HTML
     email produces attachments of 500KB-2MB per chart, triggering Gmail's clipping of
     emails >102KB. Use dpi=96 for email-embedded charts and dpi=150 for PDF reports.
     For email, prefer linking to a hosted image URL over base64 embedding."
  - "Aggregation on empty DataFrame: pandas agg() on an empty DataFrame returns an empty
     DataFrame without raising an error, causing a silent zero-result report. Always check
     len(df) > 0 after applying period filters; if the filtered DataFrame is empty, return
     a structured warning {'error': 'no_data_in_period', 'period': period_label} rather
     than an empty report."
  - "Report scheduler timezone drift: if the report scheduler (cron, Celery beat, APScheduler)
     runs in UTC but the report period is defined in local time, the scheduler trigger time
     must be converted to UTC. A monthly report scheduled for '1st of month 09:00 Asia/Tokyo'
     must be scheduled at UTC 00:00 in winter and 23:00 the previous day in summer (JST is
     UTC+9 year-round, but other timezones shift). Always define schedules in UTC and apply
     timezone offsets explicitly in the period calculation code."

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. 18F (http://18f.github.io/API-All-the-X/) — 非官方 美国 联邦 政府 API 开发，认证：No
         2. API Setu (https://www.apisetu.gov.in/) — Indian 政府 平台 提供 lot 的 API 用于 KYC, 商业 / 业务, edu猫ion & employment，认证：No
         3. Archive.org (https://archive.readme.io/docs) — 互联网档案馆，认证：No
         4. Black History Facts (https://www.blackhistoryapi.io/docs) — Contribute 或 搜索 一个 的 最大的 black 历史 fact databases 关于 网页 / 网络，认证：`apiKey`
         5. BotsArchive (https://botsarchive.com/docs.html) — JSON formatted 详情 关于 Telegram Bots 可用的 在 数据库，认证：No
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "Period boundary off by one day due to naive datetime comparison"
    mitigation: "Use zoneinfo-aware datetimes throughout; convert DB UTC timestamps to local
      timezone before filtering with >= period_start and < period_end"
  - severity: HIGH
    pattern: "matplotlib GUI backend crashes in headless server environment"
    mitigation: "Call matplotlib.use('Agg') before any other matplotlib import; add this
      as the first line in the module, not inside a function"
  - severity: HIGH
    pattern: "Google Sheets API rate limit (100 req/100s) exceeded when generating many reports"
    mitigation: "Batch all reads into a single sheet.get_all_values() call; never call
      cell.value() in a loop"
  - severity: MEDIUM
    pattern: "Memory leak from matplotlib figures across multiple report generations"
    mitigation: "Always call plt.close('all') after fig.savefig(); use figure context
      manager with plt.figure() or explicitly del fig"
  - severity: MEDIUM
    pattern: "Aggregation silently drops rows with NaN in metric columns"
    mitigation: "Log count of NaN rows before aggregation; include na_count in output
      metadata so callers are aware of data quality issues"
  - severity: LOW
    pattern: "chart_alt_text is empty or generic ('a bar chart') failing accessibility audit"
    mitigation: "Include actual metric values in the alt text; prompt the LLM with the
      aggregated data JSON to generate a specific description"
  # --- Community-sourced failures (2025-2026) ---
  - severity: HIGH
    pattern: "Chart labels and title clipped in saved image — report output has truncated
      axis labels or title cut off at image boundary"
    mitigation: "Always call fig.tight_layout() before savefig(); alternatively use
      bbox_inches='tight' in savefig() to auto-expand canvas; set figure size explicitly
      (not relying on default 6.4x4.8) to accommodate label length"
  - severity: HIGH
    pattern: "Overlapping date labels on x-axis make time-series chart unreadable in reports"
    mitigation: "Apply fig.autofmt_xdate(rotation=45, ha='right') after plotting; for weekly
      reports use mdates.WeekdayLocator() to control tick frequency; reduce tick count with
      ax.xaxis.set_major_locator(mdates.AutoDateLocator(maxticks=8))"
  - severity: MEDIUM
    pattern: "Red-green color pairs in multi-series chart are indistinguishable for 8% of
      recipients, triggering accessibility complaints"
    mitigation: "Replace default color cycle with matplotlib.rcParams['axes.prop_cycle'] =
      cycler(color=plt.cm.tab10.colors) substituting the 'petroff10' cycle available in
      matplotlib >= 3.10; for older versions use seaborn colorblind palette as fallback"
  - severity: MEDIUM
    pattern: "Blurry chart images in PDF/Word report output because dpi=72 default is too low"
    mitigation: "Always pass dpi=150 (screen) or dpi=300 (print) to savefig(); for base64
      embedding in HTML email, dpi=150 balances quality vs. email attachment size"
  - severity: HIGH
    pattern: "Plotly write_image() fails at runtime because kaleido is not installed —
      no error during development (pio.show() works fine) but crashes in production"
    mitigation: "Add kaleido to production dependencies explicitly; add a startup check
      that calls fig.write_image(io.BytesIO()) with a trivial figure at application init
      to catch missing kaleido before the first real report run"
  - severity: HIGH
    pattern: "Aggregation on a period-filtered empty DataFrame returns an empty report
      with no warning — recipient receives a blank chart with no explanation"
    mitigation: "After applying date filters, assert len(filtered_df) > 0; if empty,
      return report_text containing a human-readable 'No data available for [period]'
      message and set data_row_count=0 in outputs; never send a blank chart"
  - severity: MEDIUM
    pattern: "DST transition during report period causes off-by-one-hour boundary error
      — a weekly report covering a DST change includes 167 or 169 hours of data instead
      of 168, skewing aggregated metrics"
    mitigation: "Generate period boundaries with pd.date_range(start, periods=n, freq='D',
      tz=tz_name) rather than arithmetic timedelta addition; verify boundary correctness
      in unit tests using a mocked DST-crossing week (e.g. US/Eastern in early November)"
  - severity: MEDIUM
    pattern: "Seaborn sns.set_theme() call inside a utility function changes global
      matplotlib rcParams, causing all subsequent charts in the same process to render
      in an unexpected style"
    mitigation: "Wrap seaborn style calls in with sns.axes_style('whitegrid'): context
      manager instead of global sns.set_theme(); or explicitly restore rcParams with
      matplotlib.rcdefaults() after chart generation"
  - severity: LOW
    pattern: "Chart font renders differently on Linux CI vs. macOS developer machine
      — client-facing report PDFs have inconsistent typography between environments"
    mitigation: "Set matplotlib.rcParams['font.family'] = 'DejaVu Sans' at the top of
      the reporting module; DejaVu Sans is bundled with matplotlib on all platforms;
      add a CI step that renders a reference chart and compares pixel hash to a stored
      golden image to catch font regressions"

