# 知识积木 v2 — 安全与隐私扫描
# 用途：依赖漏洞检测、密钥泄露扫描、代码安全审计

# === 信封层（给系统看）===
id: security-scan-v1
name: 安全与隐私扫描
version: 1.0.0
category:
  - 安全
  - DevSecOps
  - 代码质量
tags:
  - 漏洞检测
  - 密钥泄露
  - SAST
  - SCA
  - Trivy
  - gitleaks
  - Bandit
  - CVE
  - CVSS
  - Snyk
  - 依赖扫描
capability_type: transform
data_source: filesystem

inputs:
  scan_target:
    type: string
    required: true
    description: "扫描目标路径：代码目录的绝对路径、容器镜像名（如 nginx:latest）或 git 仓库路径"
  scan_type:
    type: enum
    required: true
    description: "扫描类型：deps=依赖漏洞（SCA），secrets=密钥泄露，sast=代码安全静态分析，all=全量扫描"
    enum_values:
      - deps
      - secrets
      - sast
      - all
  language:
    type: enum
    required: false
    default: "python"
    description: "目标代码语言，影响 SAST 工具选择"
    enum_values:
      - python
      - javascript
      - typescript
      - go
      - java
      - ruby
      - mixed
  severity_threshold:
    type: enum
    required: false
    default: "MEDIUM"
    description: "最低告警严重等级，低于此等级的发现不输出"
    enum_values:
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL
  fail_on_finding:
    type: boolean
    required: false
    default: false
    description: "发现任何不低于 severity_threshold 的问题时是否返回失败状态（CI 门禁模式）"

outputs:
  vulnerabilities:
    type: "list[dict]"
    description: "漏洞列表，每项含 cve_id/package/installed_version/fixed_version/cvss_score/severity 字段"
  secrets_found:
    type: "list[dict]"
    description: "泄露密钥列表，每项含 file/line/rule_id/match_preview（部分脱敏）字段"
  sast_findings:
    type: "list[dict]"
    description: "SAST 发现列表，每项含 file/line/cwe_id/severity/message/mitigation 字段"
  scan_passed:
    type: boolean
    description: "是否通过扫描（fail_on_finding=true 时有意义）"
  summary:
    type: string
    description: "扫描摘要，含各严重等级数量统计"

requires: []
conflicts_with: []
compatible_with:
  - code-assistance-v1

# === 内容层（给 LLM 看）===
core_capability: >
  使用 Trivy（容器/依赖扫描）、gitleaks（密钥泄露检测）、Bandit（Python 安全 SAST）
  对代码仓库和容器镜像执行安全扫描；所有工具免费开源；
  Snyk 和 GitHub Advanced Security 作为付费深度扫描选项。

constraints:
  - "Trivy（deps/all 模式）调用方式：subprocess.run(['trivy', 'fs', '--format', 'json',
     '--severity', severity_threshold, '--exit-code', '0', scan_target], capture_output=True)；
     --exit-code 0 避免非零退出码被误判为工具失败；
     输出 JSON 中 Results[].Vulnerabilities[] 包含 CVE 详情"
  - "Trivy 漏洞数据库更新：首次运行会自动下载 CVE 数据库（~100MB）；
     CI 环境中必须挂载 trivy-db 缓存目录（~/.cache/trivy/）；
     数据库超过 12 小时未更新时，扫描结果在 VulnerabilityID 字段附加 _STALE 标注"
  - "gitleaks（secrets 模式）调用方式：subprocess.run(['gitleaks', 'detect', '--source', scan_target,
     '--report-format', 'json', '--report-path', '/tmp/gitleaks.json', '--no-git'], capture_output=True)；
     --no-git 对非 git 目录有效；git 仓库必须去掉 --no-git 以扫描历史提交"
  - "密钥输出脱敏：gitleaks 的 Match 字段包含完整密钥明文；
     输出时必须截断为前 4 位 + '****' + 后 4 位（如 AKIA****XYZW）；
     禁止将完整密钥写入日志或传给下游系统"
  - "Bandit（Python SAST）调用方式：subprocess.run(['bandit', '-r', '-f', 'json', '-l', '-i',
     scan_target], capture_output=True)；-l -i 分别设置 LOW 以上和 INFO 以上；
     通过 -s <test_id> 可跳过特定规则（如 B101=assert 用法，测试代码中可接受）"
  - "CVSS 评分分级标准（CVSS v3.1）：0=None，0.1-3.9=LOW，4.0-6.9=MEDIUM，
     7.0-8.9=HIGH，9.0-10.0=CRITICAL；
     按此标准过滤 severity_threshold，不可使用工具自定义的严重等级名"
  - "付费升级：Snyk CLI（snyk test --json --severity-threshold=medium）支持 200 tests/月免费额度；
     超限后需 --token 配合付费账号；GitHub Advanced Security 通过 Code Scanning API
     (https://api.github.com/repos/{owner}/{repo}/code-scanning/alerts) 获取结果，
     仅限 GitHub 平台仓库"
  - "误报率管理：Bandit B603/B607（subprocess 调用）在 CI 脚本中大量误报；
     应维护 .bandit 配置文件排除测试目录（[exclude_dirs] = tests/）；
     Trivy 对已知误报 CVE 维护 .trivyignore 文件，格式为每行一个 CVE ID"
  - "秘钥检测工具的熵分析（entropy analysis）对哈希值产生系统性误报：
     SHA-256 哈希、随机 UUID、Base64 编码字符串的熵值与真实密钥相近；
     纯正则匹配规则在不同密钥格式间易断裂（brittle across formats）；
     2025-2026 最佳实践：用多信号组合（熵 + 正则 + 上下文语义）判断，单一指标不足以判定"
  - "CI/CD 供应链攻击风险：2025 年 CISA 报告显示 45% 的重大数据泄露涉及构建流水线被入侵；
     gitleaks/Trivy 等安全扫描工具本身的 GitHub Actions 版本可能被 tag 指向恶意镜像；
     所有安全工具引用必须固定到 SHA 而非 tag（如 uses: aquasecurity/trivy-action@SHA_HASH）"
  - "Trivy GitHub Actions 供应链攻击（2026-02/03 真实事件）：
     攻击者在 2026 年 2 月和 3 月两次入侵 aquasecurity/trivy-action，
     将 75/76 个 version tag 替换为含凭证窃取器的恶意 commit；
     恶意代码在正常扫描之前静默运行，从 /proc 内存中提取 GitHub Actions secrets；
     所有使用 trivy-action 的工作流必须立即审查 tag 是否指向已知安全的 commit SHA"
  - "tag 指向被篡改后工作流表面正常完成但凭证已泄露：
     上述 Trivy 攻击的恶意代码先运行凭证窃取，再运行真正的扫描，所以 CI 日志显示 PASSED；
     任何安全工具的供应链攻击都有'正常完成但已被利用'的特征；
     发现 tag 被重指向时，必须认为所有相关工作流期间产生的 secrets 均已泄露，立即轮换"
  - "SAST 框架保护机制导致大量误报：
     现代 Web 框架（Django、Rails、Spring）内置了 CSRF 保护、XSS 转义、SQL 参数化；
     SAST 工具不理解框架级别的防护，会在 ORM 查询、模板渲染等位置产生大量虚假告警；
     应在 SAST 配置中添加框架感知规则集（如 Semgrep 的 django/flask/express rulepack）"
  - "传递依赖漏洞占比超过直接依赖：
     2025 年 log4shell 类漏洞往往来自 3-4 层传递依赖（用户的依赖的依赖的依赖）；
     仅扫描 requirements.txt/package.json 的直接依赖会遗漏最常见的漏洞来源；
     Trivy fs 默认包含传递依赖；Python 项目用 pip list --format=freeze 生成完整依赖列表"
  - "无 fixed_version 的 CVE 不应阻断 CI 但需可见：
     许多历史 CVE 没有修复版本（upstream 未修复或已 EOL 的包），
     将这类漏洞设为 fail_on_finding=true 会导致 CI 永久阻塞且无法解决；
     应将无 fixed_version 的 CVE 单独归类到 known_unfixable 列表，不阻断 CI 但每周汇总报告"
  - "Semgrep Pro 的跨文件数据流分析在大型项目（>50 万行）中扫描时间超 30 分钟：
     跨文件/跨函数的污点分析（taint analysis）是 Semgrep Pro 的核心优势，
     但在大型 monorepo 中耗时极长，可能阻塞 PR 流水线；
     建议 PR 级别仅扫描变更文件（--diff-based），完整跨文件分析降级为每日定期运行"
  - "密钥泄露的二次泄露风险：扫描发现的密钥出现在通知/日志/报告中：
     gitleaks 输出的 Match 字段包含完整明文密钥；若直接将扫描报告发送到 Slack/邮件，
     或记录到日志系统，密钥会在另一个系统中产生新的泄露；
     所有 secrets_found 输出必须在传出前经过脱敏处理（保留前 4+后 4 位）"
  - "GitHub Advanced Security Code Scanning API 只适用于 GitHub 仓库：
     GET /repos/{owner}/{repo}/code-scanning/alerts 要求仓库托管在 GitHub 且开启 Advanced Security；
     GitLab/Bitbucket/Gitea 上的仓库不可使用此 API；
     多平台代码托管环境中不可假设 Code Scanning API 普遍可用"
  - "SAST 规则集冷启动时产生告警洪水导致工程师集体屏蔽：
     新项目第一次运行 Bandit/Semgrep 时可能产生数百条告警，
     工程师因无法全部处理而将整个工具加入 CI skip 列表或 .banditignore；
     应分阶段上线：第一月仅开 CRITICAL，稳定后再依次开 HIGH/MEDIUM；
     每周新增告警数超过 20 条时触发规则审查而非让开发者无限点击'忽略'"
  - "容器镜像扫描遗漏运行时注入的漏洞组件：
     Trivy 扫描的是 Docker image layer 中已安装的包，但运行时通过 volume mount 或
     init container 注入的文件不在扫描范围内；
     必须同时扫描 image（trivy image）和运行时文件系统快照（trivy fs），
     不可只用其中一种"
  - "Bandit B603/B607 在 CI 辅助脚本中大量误报导致规则全局禁用：
     subprocess.run(['git', 'status']) 等正常的 CI 脚本调用全部被 B603/B607 标记；
     为消除噪音，工程师在全局配置中 skip B603/B607，导致生产代码中真实的命令注入漏洞
     也被一并跳过；应仅对 CI 脚本目录（scripts/、.github/）排除这两条规则"
  - "CVSS 评分未考虑实际可达性导致优先级错误：
     CVSS 9.8 的漏洞可能在当前代码中根本未调用该函数；
     CVSS 6.5 的漏洞可能处于关键认证路径上且立即可被利用；
     漏洞优先级必须结合 CVSS 分数 + 函数可达性（是否有调用链到达漏洞函数）综合判断；
     Snyk/Semgrep Pro 的 reachability analysis 提供此能力"
  - "GitHub Actions 的 pull_request_target 触发器是最常见的供应链攻击入口：
     pull_request_target 在仓库上下文中运行（而非 fork 上下文），拥有写权限和 secrets 访问；
     Trivy 2026-02 攻击正是通过 misconfigured pull_request_target 窃取了 PAT；
     所有使用 pull_request_target 的工作流必须审查是否在无隔离的情况下 checkout fork 代码并运行"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. Application Environment Verification (https://github.com/fingerprintjs/aev) — Android 库 和 API 到 verify safety 的 用户 设备, 检测 rooted 设备 和 其他 risks，认证：`apiKey`
         2. BinaryEdge (https://docs.binaryedge.io/api-v2.html) — 提供 访问 到 BinaryEdge 40fy scanning 平台，认证：`apiKey`
         3. BitWarden (https://bitwarden.com/help/api/) — Best open-source password manager，认证：`OAuth`
         4. Botd (https://github.com/fingerprintjs/botd) — Botd 是 browser 库 用于 JavaScript bot 检测，认证：`apiKey`
         5. Bugcrowd (https://docs.bugcrowd.com/api/getting-started/) — Bugcrowd API 用于 interacting 和 追踪 reported issues 以编程方式，认证：`apiKey`
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "Trivy CVE 数据库过期（>7 天），漏洞库缺少近期 CVE，新发现的高危漏洞被漏报，
              扫描结果显示 PASSED 实则不安全"
    mitigation: "扫描前检查数据库年龄：trivy image --download-db-only 或检查 ~/.cache/trivy/db/metadata.json；
                 db_update_time 超过 48 小时必须先更新再扫描"
  - severity: HIGH
    pattern: "密钥脱敏处理缺失，gitleaks JSON 输出中的 Match 字段包含真实 API Key，
              被写入通知消息或日志后造成密钥泄露（二次泄露）"
    mitigation: "所有 secrets_found 输出必须经过脱敏函数处理，
                 函数签名：def redact_secret(match: str) -> str，
                 单元测试必须验证输出不包含输入的原始值"
  - severity: HIGH
    pattern: "扫描大型 monorepo（>10 万文件）时 Trivy/gitleaks 超时（默认无超时限制），
              占用 CI 资源 >30 分钟，阻塞其他流水线"
    mitigation: "设置扫描超时：subprocess.run(..., timeout=600)；
                 超时时返回部分结果并在 summary 中标注 'SCAN INCOMPLETE (timeout)'"
  - severity: MEDIUM
    pattern: "告警疲劳：低价值 LOW/MEDIUM CVE 数量过多（如 openssl 的 200+ 历史 CVE），
              淹没真正需要处理的 HIGH/CRITICAL 漏洞"
    mitigation: "默认 severity_threshold=MEDIUM；输出时 CRITICAL 和 HIGH 放最前面；
                 有 fixed_version 的漏洞优先展示（可立即修复）；
                 无 fixed_version 的 LOW CVE 折叠到摘要中不展开"
  - severity: MEDIUM
    pattern: "Bandit 将测试代码中的 assert 语句（B101）标记为安全漏洞，产生大量误报，
              开发者开始忽略所有 Bandit 告警（狼来了效应）"
    mitigation: "在 .bandit 配置中 skips = B101 排除测试目录的 assert 检查；
                 同时保留生产代码的 B101 检查（assert 不应在生产逻辑中作安全检查）"
  - severity: LOW
    pattern: "gitleaks 对注释中的假密钥示例（如文档中的 'YOUR_API_KEY_HERE'）误报，
              每次 CI 运行都触发告警"
    mitigation: "在代码行添加 gitleaks:allow 注释，或在 .gitleaks.toml 中配置
                 [[allowlists]] 排除已知安全的模式（如长度不符合真实密钥的占位符）"
  - severity: HIGH
    pattern: "告警风暴导致安全团队完全忽略扫描结果：SAST 工具对大型项目产生数百条 LOW/MEDIUM 告警，
              开发者将所有告警标记为'已知问题'后，真正的 HIGH/CRITICAL 漏洞淹没在噪音中"
    mitigation: "分阶段上线扫描规则：第一个月仅开启 CRITICAL，稳定后开启 HIGH，再稳定后开启 MEDIUM；
                 每周告警数量超过 20 条时触发规则审查，而非让开发者无限点击'忽略'"
  - severity: MEDIUM
    pattern: "依赖扫描只覆盖直接依赖（requirements.txt/package.json），
              传递依赖（transitive dependencies）中的高危 CVE 被遗漏；
              2025 年真实案例：log4shell 类漏洞往往来自 3-4 层传递依赖"
    mitigation: "Trivy fs 扫描时默认包含传递依赖；确认不添加 --skip-dirs 排除 vendor 目录；
                 Python 项目用 pip list --format=freeze 生成完整依赖树，
                 比 requirements.txt 更全面（包含传递依赖）"
  - severity: HIGH
    pattern: "Trivy GitHub Actions tag 被篡改，CI 扫描结果全部失效（2026-03 真实事件）：
              aquasecurity/trivy-action 的 75 个 version tag 在 2026-03-19 被攻击者重指向恶意 commit，
              使用 tag 而非 commit SHA 的所有 CI 工作流在不知情的情况下运行了凭证窃取器"
    mitigation: "立即将所有 uses: aquasecurity/trivy-action@v* 替换为 uses: aquasecurity/trivy-action@{COMMIT_SHA}；
                 检查 2026-02-27 至 2026-03-19 期间运行的工作流，对应期间的所有 secrets 应视为已泄露并轮换"
  - severity: HIGH
    pattern: "SAST 告警洪水在新项目冷启动时导致工具被全局禁用：
              第一次扫描产生 200+ 告警，工程师无力逐一处理，将整个工具加入 skip 列表；
              真正的 HIGH/CRITICAL 漏洞被随之埋没"
    mitigation: "分阶段上线：第一个月只开 CRITICAL；稳定后逐步开 HIGH → MEDIUM；
                 每个阶段进入前确保现有告警数量在可处理范围内（<20 条/周）"
  - severity: MEDIUM
    pattern: "运行时注入组件未被容器扫描覆盖：通过 volume mount 注入的第三方二进制/库
              不在 Docker image layer 中，Trivy image 扫描完全漏掉这部分攻击面"
    mitigation: "为包含 volume mount 的服务同时运行 trivy fs 对挂载目录进行扫描；
                 在 Pod/容器启动后定期对运行中文件系统做快照扫描"
  - severity: MEDIUM
    pattern: "Semgrep 跨文件分析在大型 monorepo 中阻塞 PR 超过 30 分钟：
              taint analysis 对所有文件全量分析耗时过长，PR 流水线超时失败"
    mitigation: "PR 触发的扫描使用 --diff-based 仅分析变更文件；
                 全量跨文件分析改为每日定期 cron 任务运行，结果发布到安全看板"
  - severity: LOW
    pattern: "gitleaks 对注释中的文档示例 API Key（YOUR_API_KEY_HERE、example-key-12345）持续误报，
              每次 CI 运行都触发告警，开发者最终将整个 secrets scanning 步骤跳过"
    mitigation: "在 .gitleaks.toml 中为已知安全的占位符添加 allowlists；
                 或在对应代码行添加 # gitleaks:allow 注释；
                 严禁用 --no-git 跳过整个扫描，应精确排除已知安全模式"

