# 知识积木 v2 — 文档读写
# 用途：读写 Google Docs、Notion、Markdown 文档

# === 信封层（给系统看）===
id: document-rw-v1
name: 文档读写
version: 1.0.0
category:
  - 文档
  - 知识管理
tags:
  - Google Docs
  - Notion
  - Markdown
  - Confluence
  - batchUpdate
  - block
  - 富文本
capability_type: transform
data_source: null

inputs:
  provider:
    type: enum
    required: true
    description: "文档服务商：google_docs（Google Docs API）、notion（Notion API）、
                  markdown（本地或 URL Markdown 文件）"
    enum_values:
      - google_docs
      - notion
      - markdown
  operation:
    type: enum
    required: true
    description: "操作类型：read（读取内容）、write（追加内容）、replace（替换全文）、
                  create（新建文档）"
    enum_values:
      - read
      - write
      - replace
      - create
  document_id:
    type: string
    required: false
    default: ""
    description: "文档 ID：Google Docs 为 URL 中的文档 ID 字段；Notion 为 page/database UUID；
                  markdown 为文件路径或 URL；create 操作时留空"
  content:
    type: text
    required: false
    default: ""
    description: "写入内容，Markdown 格式；积木负责转换为目标格式；read 操作时留空"
  credentials_path:
    type: string
    required: false
    default: ""
    description: "Google Docs OAuth credentials.json 路径；Notion 填 API Key（从环境变量读取时留空）"
  notion_token_env:
    type: string
    required: false
    default: "NOTION_API_TOKEN"
    description: "Notion API Token 的环境变量名"
  parent_id:
    type: string
    required: false
    default: ""
    description: "create 操作时的父级 ID（Google Docs 用 Drive folder_id；Notion 用 parent page_id）"

outputs:
  content_text:
    type: string
    description: "read 操作返回的纯文本内容"
  content_markdown:
    type: string
    description: "read 操作返回的 Markdown 格式内容（尽力转换）"
  document_id:
    type: string
    description: "create 操作返回的新文档 ID"
  document_url:
    type: string
    description: "文档的访问 URL"
  char_count:
    type: integer
    description: "文档内容字符数（read/write 后）"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1
  - daily-briefing-v1

# === 内容层（给 LLM 看）===
core_capability: >
  通过 Google Docs API（batchUpdate + get）或 Notion API（blocks CRUD）读写文档内容，
  支持 Markdown↔富文本双向转换，正确处理嵌套 block、权限错误和大文档分页。

constraints:
  - "Google Docs API 读取：GET https://docs.googleapis.com/v1/documents/{documentId}；
     OAuth Scopes：只读用 'https://www.googleapis.com/auth/documents.readonly'，
     写入用 'https://www.googleapis.com/auth/documents'；
     返回的 body.content 是 StructuralElement 数组，需递归提取 paragraph.elements[].textRun.content"
  - "Google Docs API 写入：必须用 batchUpdate 接口（不可直接 PUT body）；
     追加文本用 insertText 请求：{'insertText': {'location': {'index': end_index}, 'text': content}}；
     end_index 通过读取文档后取 body.content[-1].endIndex - 1 获得；
     index 从 1 开始（不是 0），段落末尾 \\n 占一个 index 单位"
  - "Google Docs batchUpdate 结构（关键）：
     POST /v1/documents/{documentId}:batchUpdate；
     Body: {'requests': [{'insertText': {...}}, {'updateParagraphStyle': {...}}]}；
     requests 是数组，支持一次发送多个操作；索引变化是累积的，多个 insertText 时需按倒序插入"
  - "Notion API 版本：必须在所有请求头加 'Notion-Version: 2022-06-28'；
     读取页面内容：GET https://api.notion.com/v1/blocks/{page_id}/children；
     返回分页结构，has_more=true 时需用 start_cursor 参数继续请求"
  - "Notion Block 类型映射（Markdown → Notion）：
     # 标题 → heading_1 block；## → heading_2；**粗体** → rich_text.annotations.bold；
     - 列表项 → bulleted_list_item block；```代码``` → code block；
     每个 block 的 rich_text 数组最多 100 个元素，超出需拆分为多个 block"
  - "Notion Block 嵌套限制：最多 3 层嵌套（children of children of children）；
     嵌套更深的内容需拍平后写入；读取时用递归 GET /blocks/{block_id}/children 展开"
  - "Markdown↔富文本转换：写入前将 Markdown 解析为 AST（用 mistletoe 或 mistune 库），
     再将 AST 节点映射为目标格式 block；直接字符串替换会导致嵌套格式错乱"
  - "大文档处理：Google Docs 超过 100 万字符时 get 接口超时；
     Notion 页面深层内容需多轮 API 调用（每次最多 100 个 block）；
     两者均需分块读取，read 操作需设置 timeout=30 秒"
  - "【社区经验】Notion API 版本 2025-09-03 破坏性变更：引入多数据源数据库（multi-source database）后，
     GET /v1/databases/{id} 对多数据源数据库返回 validation_error；
     Search API 的 filter.value 不再接受 'database'，改为 'data_source'；
     所有仍使用 'Notion-Version: 2022-06-28' 的集成必须升级，否则无法操作多数据源数据库
     （来源：Notion 官方升级指南，n8n GitHub Issue #19489）"
  - "【社区经验】Notion API 限流为 3 req/s（平均），突发请求超出后返回 429 并携带 Retry-After 头；
     批量写入大量 block 时需在每次 append_children 调用后等待 Retry-After 指定的秒数；
     不尊重 Retry-After 会触发更长的封禁窗口（来源：Thomas Frank, Oreate AI Blog）"
  - "【社区经验】Google Docs API batchUpdate 使用 endOfSegmentLocation: {segmentId: ''} 追加文本
     比计算 end_index 更安全：不需要先读取文档获取最新 index，避免并发写入时的 index 竞争；
     但 endOfSegmentLocation 不支持特定位置插入，仅适用于追加场景
     （来源：Google Docs API 官方 How-To，GitHub Gist tanaikech）"
  - "【社区经验】Google Docs batchUpdate 的 requests 数组是原子操作，任一请求失败全部回滚：
     但 index 变化在 requests 数组内是累积计算的，必须按倒序排列多个 insertText 操作；
     正序插入时前面的 insertText 会让后面操作的 index 失效，导致内容插入到错误位置
     （来源：Google Docs API structural edit rules 文档，tanaikech GitHub Gist）"
  - "【社区经验】Google Docs API 文档超过 100 万字符时 get 接口会超时（timeout 60s+）：
     大文档建议使用 Export API（Drive API v3 files.export）导出为纯文本或 HTML；
     Docs API 不支持范围读取（只能全量），对大文档应改变读取策略
     （来源：Google Docs API 已知限制文档）"
  - "【社区经验】Google Docs API 403 'Insufficient permissions for this file' 可能不是 scope 问题：
     Service Account 有正确 scope，但目标文档未共享给 Service Account 邮箱时也返回 403；
     必须在 Google Drive 中将文档显式共享给 service-account@project.iam.gserviceaccount.com；
     错误诊断：先用 Drive API files.list 确认 Service Account 能看到该文件
     （来源：opero.com Docs API 403 排查指南）"
  - "【社区经验】Google Docs WriteControl 字段用于处理并发编辑冲突：
     batchUpdate 支持 requiredRevisionId 和 targetRevisionId 两种模式；
     requiredRevisionId：文档版本不匹配时请求失败（适合需要精确控制的场景）；
     targetRevisionId：尝试合并变更（适合多用户协同）；
     不设置 WriteControl 时并发编辑会产生不可预期的结果
     （来源：Google Docs API batchUpdate 官方文档 WriteControl）"
  - "【社区经验】Notion API Integration 必须被手动添加到目标页面才能访问：
     即使 token 有效，未被添加到页面的 integration 也会收到 404 object_not_found；
     自动化脚本常因此报错，且错误信息不区分'页面不存在'和'没有权限'；
     每次创建新页面后，必须在 Notion UI 中手动 Share > Add connections > 选择 integration
     （来源：Notion Developer 文档，Zapier Community）"
  - "【社区经验】Notion API 2025-09-03 版本变更破坏了大量现有 Zapier/n8n 集成：
     filter.value='database' 改为 filter.value='data_source'；
     多数据源数据库使用不同的 API 路径；
     n8n GitHub Issue #19489 记录了大量用户集成失败；
     自研代码需显式升级 Notion-Version 头，第三方平台需等其更新对应节点
     （来源：Notion 官方升级指南，n8n GitHub Issue #19489）"
  - "【社区经验】Notion API append_block_children 每次最多 100 个 block：
     超过 100 个 block 的内容必须分批次追加；
     分批追加时每次 append 的 block 数量不超过 100，且批次间遵守 3 req/s 速率限制；
     一次发送 110+ block 会收到 400 'Fix one: body.children.length should be ≤ 100'
     （来源：Notion API 文档，Zapier Community #24532）"
  - "【社区经验】Notion 富文本字段 rich_text[i].text.content 单个元素最多 2000 字符：
     超过 2000 字符的内容必须拆分为多个 rich_text 元素；
     直接发送 4000 字符的单段文本会收到 400 'length should be ≤ 2000, instead was 4099'；
     拆分时需注意不要在 Unicode 多字节字符或 emoji 的字节边界截断
     （来源：Notion API，Make Community，Zapier Community）"
  - "【社区经验】Notion API 429 的 Retry-After 是整数秒，但内容有时为浮点数字符串：
     读取时必须用 int(float(response.headers['Retry-After'])) 而不直接 int()；
     不遵守 Retry-After 等待更长的封禁窗口；
     推荐实现请求队列（2-4 并发 + 全局速率限制器）而非直接并发请求
     （来源：Notion API 官方文档，notion-sdk-py GitHub Issue #262）"
  - "【社区经验】Google Docs API 读取表格内容需要递归遍历嵌套 StructuralElement：
     table → tableRow → tableCell → content（再次是 StructuralElement 数组）；
     仅遍历顶层 body.content 会完全跳过表格内的所有文本；
     遇到 table 类型的 StructuralElement 需进入其 tableRows 继续递归
     （来源：Google Docs API 官方文档 Body Content 结构）"
  - "【社区经验】Notion API 创建 page 和创建 database item 是不同操作：
     pages.create 的 parent 可以是 page 或 database；
     parent 为 database 时，需提供 properties 字段（与 database schema 匹配）；
     parent 为 page 时，properties 只有 title 字段有效；
     混淆两种场景会收到 400 'properties must not be provided when parent is page'
     （来源：Notion API 官方文档 pages.create）"
  - "【社区经验】Google Drive API 权限不继承：子文件夹/文件不自动继承父文件夹的权限变更；
     将文档移入 Shared Drive 后，文档原有的直接共享权限会被 Shared Drive 权限模型替代；
     通过 API 修改 Shared Drive 中某文件的权限时会返回 403（Shared Drive 不支持直接权限修改）
     （来源：Google Drive API permissions 文档）"
  - "【社区经验】Notion 数据库 properties 类型不可通过 API 修改（只能通过 UI）：
     API 只能读写已有 property 的值，无法修改 property 的类型（如 text → select）；
     尝试在 database.update 中改变 property type 会静默忽略 type 字段的变更；
     schema 变更必须由用户在 Notion UI 中手动完成
     （来源：Notion API 数据库文档限制章节）"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. Airtable (https://airtable.com/api) — 集成 带有 Airtable，认证：`apiKey`
         2. Api2Convert (https://www.api2convert.com/) — 在线 文件 转换 API，认证：`apiKey`
         3. apilayer pdflayer (https://pdflayer.com) — HTML / URL 转 PDF，认证：`apiKey`
         4. Asana (https://developers.asana.com/docs) — Programmatic 访问 到 全部 数据 在 你的 asana 系统，认证：`apiKey`
         5. ClickUp (https://clickup.com/api) — ClickUp 是 robust, cloud-based 项目 管理 工具 用于 boosting 生产力 / 办公效率，认证：`OAuth`
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "Google Docs batchUpdate 中多个 insertText 的 index 未按倒序计算，
              前插入操作使后续 index 偏移，导致内容插入位置错误"
    mitigation: "多次插入时按文档 index 从大到小排序 requests，倒序插入；
                 或每次操作后重新读取文档获取最新 index"
  - severity: HIGH
    pattern: "Notion API Token 无目标页面访问权限，返回 404 而非 403，难以与'页面不存在'区分"
    mitigation: "捕获 404 时先检查 error.code == 'object_not_found'，
                 在错误消息中同时提示'页面不存在或 Token 无权限访问'"
  - severity: MEDIUM
    pattern: "Notion 页面的 rich_text 字段超过 2000 字符限制，API 返回 400 body too large"
    mitigation: "写入前将 content 按 1800 字符分割为多个 paragraph block，而非单个超长 block"
  - severity: MEDIUM
    pattern: "Google Docs 文档中含有内嵌图片/表格，递归提取 textRun 时跳过这些元素，
              导致输出文本与原文档结构不符"
    mitigation: "遇到 table/inlineObjectElement 元素时插入 '[表格]' 或 '[图片]' 占位符，
                 并在 content_text 的开头追加提示 'Note: images/tables rendered as placeholders'"
  - severity: LOW
    pattern: "markdown 文件路径含中文或空格，open() 在某些系统环境下抛 FileNotFoundError"
    mitigation: "路径统一用 pathlib.Path(document_id).expanduser().resolve() 处理，
                 不依赖 os.path 字符串拼接"
  - severity: HIGH
    pattern: "【社区经验】Notion API 404 不区分'页面不存在'和'Token 无权访问'：
              两种情况返回相同的 404 + object_not_found，开发者无法判断根因，
              导致静默失败，用户看不到有效错误信息（这是 Notion API 已知设计缺陷）"
    mitigation: "出现 404 时同时展示两种可能：'页面 ID 不存在' 或 'Integration 未被添加到该页面'；
                 Notion 要求手动将 Integration 添加到每个页面（Share → Add connections），
                 这是常见忘记步骤；在错误提示中包含具体操作指引
                 （来源：Notion Developer 文档，Zapier Community）"
  - severity: MEDIUM
    pattern: "【社区经验】Notion API 2025-09-03 升级后，Zapier/n8n 等第三方集成平台的
              Notion 节点尚未支持新 API 版本，导致涉及多数据源数据库的自动化流程全部失败"
    mitigation: "使用第三方平台时检查其 Notion 集成是否已升级到 2025-09-03 版本；
                 未升级前避免在 Notion 中创建多数据源数据库；
                 自研集成应在请求头 Notion-Version 中明确指定版本号
                 （来源：Zapier Community，Retool Forum）"
  - severity: HIGH
    pattern: "【社区经验】Notion API 分页获取 block children 不处理 has_more=true，
              只获取前 100 个 block，导致长文档内容截断"
    mitigation: "所有 GET /v1/blocks/{id}/children 调用必须循环处理分页：
                 while data.get('has_more'): cursor=data['next_cursor']; data=get_children(id, cursor=cursor)
                 每次 API 调用后合并 results 列表
                 （来源：Notion API 分页文档，thomasjfrank.com）"
  - severity: MEDIUM
    pattern: "【社区经验】Google Docs API 多个 insertText 按正序索引排列，
              前面的插入操作改变了文档结构，导致后面操作的 index 全部偏移，内容乱序"
    mitigation: "在一个 batchUpdate 内多个 insertText 请求必须按 index 从大到小倒序排列；
                 使用 endOfSegmentLocation 追加场景无此问题（顺序不影响）；
                 或每次 batchUpdate 只包含一个 insertText，操作后重新读取 endIndex
                 （来源：Google Docs API structural edit rules 文档）"
  - severity: LOW
    pattern: "【社区经验】Notion integration token 被误提交到 Git 仓库，
              导致任何获取代码的人都能读写所有已共享给该 integration 的 Notion 页面"
    mitigation: "NOTION_API_TOKEN 必须通过环境变量注入，不可硬编码；
                 发现泄露后立即在 Notion Developer Portal 撤销对应 integration token；
                 在 .gitignore 中加入 .env 文件
                 （来源：Notion API 安全最佳实践，Level Up Coding 指南）"

