# 知识积木 v2 — 网页搜索与调研
# 用途：实时网页搜索、内容提取、摘要生成

# === 信封层（给系统看）===
id: web-search-v1
name: 网页搜索与调研
version: 1.0.0
category:
  - 搜索
  - 调研
tags:
  - DuckDuckGo
  - Serper
  - Google Search
  - Bing
  - 网页抓取
  - readability
  - 内容提取
capability_type: poll
data_source: null

inputs:
  query:
    type: string
    required: true
    description: "搜索查询词，支持 site: filetype: 等高级语法"
    validation: "1 <= len(value) <= 500"
  provider:
    type: enum
    required: false
    default: "duckduckgo"
    description: "搜索引擎：duckduckgo（免费无限）、serper（100 free/mo）、
                  google_cse（$5/1K queries）、bing（$3/1K transactions）"
    enum_values:
      - duckduckgo
      - serper
      - google_cse
      - bing
  api_key:
    type: string
    required: false
    default: ""
    description: "API Key；duckduckgo 模式下忽略；其他模式从环境变量读取时此参数留空"
  max_results:
    type: integer
    required: false
    default: 5
    description: "返回搜索结果数量"
    validation: "1 <= value <= 20"
  fetch_content:
    type: boolean
    required: false
    default: false
    description: "是否抓取并提取搜索结果页面的正文内容（慢但内容丰富）"
  content_max_length:
    type: integer
    required: false
    default: 2000
    description: "每个页面提取的正文最大字符数（fetch_content=true 时生效）"
    validation: "100 <= value <= 10000"

outputs:
  results:
    type: "list[dict]"
    description: "搜索结果列表，每项含 title/url/snippet/content（fetch_content=true）字段"
  result_count:
    type: integer
    description: "实际返回的结果数量"
  provider_used:
    type: string
    description: "实际使用的搜索引擎（可能因失败而降级）"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1
  - daily-briefing-v1

# === 内容层（给 LLM 看）===
core_capability: >
  通过 DuckDuckGo Instant Answer API（免费无限）或 Serper/Google CSE/Bing（付费）执行网页搜索，
  可选用 readability 算法提取页面正文，去广告后返回结构化结果列表。

constraints:
  - "DuckDuckGo Instant Answer API（默认免费方案）：
     GET https://api.duckduckgo.com/?q={query}&format=json&no_html=1&skip_disambig=1；
     无需 API Key，无限制；但返回的是摘要型结果（Abstract/RelatedTopics），
     不是完整网页搜索列表；适合实体查询（人物/地点/定义），不适合长尾搜索"
  - "DuckDuckGo HTML 搜索（非官方）：用 duckduckgo_search 库（pip install duckduckgo-search）；
     DDGS().text(query, max_results=n) 返回完整搜索结果列表，无需 Key；
     限流约 30 req/min，超过时抛 RatelimitException，需 sleep(2) 重试"
  - "Serper API：POST https://google.serper.dev/search；
     Header: X-API-KEY: {api_key}；Body: {\"q\": query, \"num\": max_results}；
     免费层 100 req/mo，付费 $50/2500 req；Key 从环境变量 SERPER_API_KEY 读取"
  - "Google Custom Search Engine API：
     GET https://customsearch.googleapis.com/customsearch/v1?key=KEY&cx=CX&q=query；
     $5/1000 queries（超出免费 100 req/day 后）；需预先创建 CSE 并获取 cx ID"
  - "Bing Web Search API（Azure Cognitive Services）：
     GET https://api.bing.microsoft.com/v7.0/search?q=query；
     Header: Ocp-Apim-Subscription-Key: KEY；$3/1000 transactions（F1 免费层 3 req/s）"
  - "页面内容提取（fetch_content=True）：用 requests.get(url, timeout=10) 获取 HTML，
     再用 readability-lxml 库（pip install readability-lxml）的 Document(html).summary()
     提取正文；比 BeautifulSoup 对广告和导航栏的去除效果更好"
  - "去广告策略：readability 提取后仍需过滤：
     1) 删除长度 < 20 字符的段落（通常是菜单/标签）；
     2) 删除含 'advertisement'/'sponsor'/'cookie' 的段落；
     3) 截断到 content_max_length"
  - "降级策略：provider 按顺序降级 duckduckgo → serper → bing；
     当前 provider 连续失败 3 次自动切换到下一个，并在 provider_used 中标注实际使用的 provider"
  - "【社区经验】Python requests 库的 TLS 指纹与 Chrome 不同，会被 Cloudflare 和 Akamai 等
     反爬系统识别并返回 403；仅修改 User-Agent 不足以绕过 TLS 指纹检测；
     需要通过 curl_cffi 或 httpx 等支持 TLS 伪装的库，或使用第三方 SERP API
     （来源：Firecrawl Blog, ScrapingBee Blog）"
  - "【社区经验】DuckDuckGo 没有官方公共搜索 API，duckduckgo-search 库本质上是抓取 HTML 结果；
     2025 年起 DDG 加强了反爬保护，直接请求封禁频率升高；
     生产环境应优先使用 Serper（$50/2500 req）或 SerpApi 等商业 SERP API 确保稳定性
     （来源：SerpApi, ScrapingBee DuckDuckGo Scraper API）"
  - "【社区经验】静态请求头被反爬系统识别：Cloudflare 等现代反爬系统会检查多个信号：
     固定 Accept-Language、无 Cookie、完美匀速请求间隔；
     即使设置了 User-Agent 也会因 behavioral fingerprint 被识别；
     每个 session 应使用随机请求间隔（0.5-3s），并通过 requests.Session 复用连接模拟真实行为
     （来源：ZenRows, WebAutomation.io）"
  - "【社区经验】Cloudflare TLS 指纹检测无法用 requests 库绕过：
     Cloudflare 2025+ 版本检测 TLS ClientHello 指纹；Python requests 的 TLS 指纹与任何浏览器都不同；
     仅修改 User-Agent 无效；需要使用 curl_cffi（模拟 Chrome TLS）或 httpx with http2；
     生产环境建议改用 Serper/SerpApi 等商业 SERP API（来源：Firecrawl Blog，ZenRows Cloudflare 指南）"
  - "【社区经验】puppeteer-extra-stealth 在 2025 年后已不被维护且失效：
     Cloudflare 已更新检测策略能识别 stealth 插件；2025年2月后 stealth 成功率大幅下降；
     应迁移到仍在维护的替代方案：Python 的 Camoufox、nodriver、SeleniumBase UC Mode；
     （来源：Scrapfly 博客 2025年2月报告）"
  - "【社区经验】duckduckgo-search 库触发 202 Ratelimit 后应立即切换 backend：
     库支持 backend 参数（'api'、'html'、'lite'），其中 'lite' 最容易被限流；
     限流后不要立即重试同一 backend，应按顺序尝试：lite → html → api；
     最终仍失败时降级到 Serper；library 不是 DuckDuckGo 官方，限流策略可能随时变化
     （来源：duckduckgo-search PyPI，open-webui GitHub Discussion #13292）"
  - "【社区经验】Google CSE API 免费层 100 req/day 不是 calendar day 而是按 UTC 00:00 重置：
     下午 11 点用完 100 次后，UTC 00:00（中国时间 08:00）重置；
     监控告警时注意时区，不要误判为'每天都超额'；
     Google CSE 403 错误可能是配额耗尽、billing 未启用或 CSE ID 错误，三者报错信息相同，
     需逐一排查（来源：Google CSE 官方文档，codestudy.net 403 排查指南）"
  - "【社区经验】Serper API 搜索结果中 'organic' 字段为主要搜索结果，
     'answerBox'/'knowledgeGraph' 为特殊结果，初学者易只处理 organic 而遗漏 answerBox：
     实体类查询（如公司名/人名）常返回 knowledgeGraph 而 organic 为空；
     代码应合并处理 organic + answerBox + knowledgeGraph 三种结果类型
     （来源：Serper API 文档，SerpApi 结果格式对比）"
  - "【社区经验】fetch_content 抓取 PDF 时 readability-lxml 无法解析，但不报错只返回空字符串：
     readability 只能处理 HTML，PDF/DOCX/XLSX URL 返回的二进制内容被 readability 静默忽略；
     应在 requests.get 后检查 response.headers['Content-Type']；
     'application/pdf' 时跳过 readability，改用 PyPDF2/pdfminer 或跳过内容提取
     （来源：readability-lxml GitHub issues，ScraperAPI 文档）"
  - "【社区经验】requests.Session 不跨进程/线程共享：
     多线程搜索时为每个线程创建独立 Session 对象；
     共享 Session 会导致 HTTP 连接竞争，在高并发时引发 ConnectionError 或返回错误页面；
     requests.Session 是线程不安全的，不可在多线程间共用同一实例
     （来源：requests 官方文档 Thread Safety 章节）"
  - "【社区经验】Bing Web Search API v7 的 safeSearch 参数默认为 Moderate：
     默认过滤成人内容，某些合法商业搜索词（如 medical/legal 领域）可能被误过滤；
     如需完整结果，需显式设置 safeSearch=Off；
     同时注意 Bing 搜索结果语言受 mkt 参数影响，不设置时返回服务器地区语言结果
     （来源：Bing Web Search API 官方文档）"
  - "【社区经验】网页内容提取时 readability-lxml 和 BeautifulSoup 对同一页面的提取质量差异大：
     新闻类页面 readability 更好（自动识别正文区域）；
     API 文档/技术页面 BeautifulSoup 更精确（可通过 CSS 选择器精准提取）；
     遇到 readability 提取内容 < 500 字符时应 fallback 到 BeautifulSoup 的 article/main 选择器
     （来源：python-readability GitHub，社区实践对比）"
  - "【社区经验】搜索 API 返回的 URL 不是最终 URL 时，抓取内容前必须先解析重定向：
     Google AMP 链接（amp.domain.com/...）实际内容在原始域；
     news.google.com 的新闻链接是重定向，直接用 requests.get 会获取到中间页面；
     使用 requests.get(url, allow_redirects=True) 后用 response.url 获取最终 URL
     （来源：Google AMP 文档，ScraperAPI AMP 处理指南）"
  - "【社区经验】Cloudflare 5-second challenge 响应 HTML 含有特定标志字符串，可编程检测：
     响应 HTML 包含 'cf-browser-verification'、'Just a moment' 或 '__cf_chl_opt' 时为 Cloudflare 挑战页；
     此时 readability 提取内容为空，但 HTTP 状态码可能是 200 而非 403；
     检测到挑战页时跳过内容提取，返回 content=''，改用 snippet 字段
     （来源：ScrapingBee Cloudflare 检测文档）"
  - "【社区经验】DuckDuckGo 没有官方授权的第三方 API，任何第三方库都存在被随时封禁的风险：
     duckduckgo-search 库的免责声明明确指出仅用于教育目的，禁止商业使用；
     生产自动化系统不应依赖 DDG 作为主要搜索引擎；
     应以 Serper 或 SerpApi 为主，DDG 仅作为开发测试环境的无 Key 备选
     （来源：duckduckgo-search PyPI 免责声明）"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. 24 Pull Requests (https://24pullrequests.com/api) — 项目 到 promote 开源 协作 during December，认证：No
         2. Screenshot (https://www.abstractapi.com/website-screenshot-api) — 以编程方式截取任意网站网页截图，认证：`apiKey`
         3. Agify.io (https://agify.io) — 根据名字估算年龄，认证：No
         4. API Grátis (https://apigratis.com.br/) — Multiples 服务 和 公共 API，认证：No
         5. ApicAgent (https://www.apicagent.com) — 提取 设备 详情 来自 user-agent 字符串，认证：No
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "DuckDuckGo duckduckgo-search 库触发 CloudFlare 反爬保护，抛 HTTPError 403"
    mitigation: "捕获 403 后降级到 Serper；同时设置随机 User-Agent 和 requests.Session 复用；
                 连续失败时在日志中记录 'DDG blocked, fallback to serper'"
  - severity: HIGH
    pattern: "fetch_content=True 时目标页面有 JS 渲染（SPA），requests 获取的 HTML 为空 shell"
    mitigation: "检测 body 文本长度 < 200 字符时判断为 JS 渲染，跳过内容提取，
                 snippet 仍使用搜索结果中的摘要字段"
  - severity: MEDIUM
    pattern: "搜索结果包含 PDF/PPT/Excel 文件 URL，requests 下载后 readability 无法解析"
    mitigation: "检测 URL 后缀或 Content-Type 含 pdf/msword/excel 时跳过内容提取，
                 返回 content='' 并记录 'binary file skipped'"
  - severity: MEDIUM
    pattern: "部分搜索结果 URL 为 Google AMP 或重定向链接，实际内容在重定向后地址"
    mitigation: "用 requests.get(allow_redirects=True) 跟随重定向，取 response.url 为最终 URL"
  - severity: LOW
    pattern: "Serper/Google CSE 返回地理限制内容（与服务器 IP 所在地区相关），结果与用户预期不符"
    mitigation: "Serper API 支持 gl（国家）和 hl（语言）参数，按用户 locale 设置"
  - severity: HIGH
    pattern: "【社区经验】抓取到 429 后立即重试，形成重试风暴，导致 IP 被封禁时间从分钟级变为天级"
    mitigation: "429 响应后必须使用指数退避：第1次等1秒，第2次等2秒，第3次等4秒；
                 连续3次失败后停止本次任务，不继续重试；记录日志并降级到下一个 provider
                 （来源：ScraperHero Rate Limiting 完整指南）"
  - severity: MEDIUM
    pattern: "【社区经验】将 requests 库直接用于内容抓取时被 Cloudflare 5-second challenge 拦截，
              返回 HTML 中含 'Checking if the site connection is secure' 而非真实内容"
    mitigation: "检测响应 HTML 是否含 'cf-browser-verification' 或 'Just a moment' 字样；
                 是则判断为 Cloudflare 拦截，跳过此页面内容提取，改用搜索结果摘要字段
                 （来源：ScrapingBee Cloudflare Scraper 文档）"
  - severity: HIGH
    pattern: "【社区经验】fetch_content=True 时抓取大量 URL 无限速控制，导致 IP 被多个目标站点同时封禁"
    mitigation: "并发抓取限制在 5 个以下（ThreadPoolExecutor max_workers=5）；
                 每个目标域名的请求间隔不少于 1 秒；
                 同一 IP 在 30 分钟内对同一域名的请求不超过 30 次
                 （来源：ScraperHero Rate Limiting 完整指南）"
  - severity: MEDIUM
    pattern: "【社区经验】Google CSE 的 cx（Custom Search Engine ID）被误删或修改，
              API 返回 403 而非清晰的'CSE 不存在'错误，难以与 Key 错误区分"
    mitigation: "在 Google Cloud Console 中验证 cx ID 与激活的 CSE 对应；
                 记录 cx ID 到环境变量 GOOGLE_CSE_CX，不要硬编码；
                 403 时同时检查 Key 是否有效、billing 是否开启、cx 是否存在
                 （来源：codestudy.net Google CSE 403 排查指南）"
  - severity: LOW
    pattern: "【社区经验】搜索结果中的新闻网站返回 paywall 页面（付费墙），
              readability 提取到的内容只有标题和前 2 段，但代码认为提取成功"
    mitigation: "检测提取文本是否含 'subscribe'/'paywall'/'sign in to continue' 等关键词；
                 命中时将 content 标记为 'paywall_detected'，不计入搜索结果内容质量评分
                 （来源：ScrapingBee 付费墙检测文档）"

