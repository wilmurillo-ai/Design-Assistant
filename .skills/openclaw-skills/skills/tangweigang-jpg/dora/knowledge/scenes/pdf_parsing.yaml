# 知识积木 v2 — PDF & Document Parsing
# 用途：从 PDF 中提取文本、识别表格、执行 OCR，支持本地工具与付费 API 升级

# === 信封层（给系统看）===
id: pdf-parsing-v1
name: PDF & Document Parsing
version: 1.0.0
category:
  - Document Processing
  - Data Extraction
tags:
  - pdf
  - ocr
  - table extraction
  - text extraction
  - pymupdf
  - pdfplumber
  - tesseract
  - adobe pdf services
  - aws textract
capability_type: transform
data_source: filesystem

inputs:
  file_path:
    type: string
    required: true
    description: "Local path to the PDF file to process"
    validation: "value.endswith('.pdf') and len(value) <= 1024"
  extract_tables:
    type: boolean
    required: false
    default: false
    description: "Whether to extract tables in addition to plain text"
  ocr_fallback:
    type: boolean
    required: false
    default: true
    description: "Whether to fall back to Tesseract OCR if the PDF contains no extractable text (scanned document)"
  language:
    type: string
    required: false
    default: "eng"
    description: "Tesseract OCR language code(s), e.g. 'eng', 'chi_sim', 'eng+chi_sim'"
    validation: "len(value) <= 64"
  page_range:
    type: string
    required: false
    default: "all"
    description: "Page range to process, e.g. '1-5', '3', 'all'. Single-indexed."
    validation: "value == 'all' or value.replace('-', '').replace(',', '').isdigit()"
  backend:
    type: enum
    required: false
    default: "auto"
    description: "Parsing backend: 'auto' selects pymupdf for text PDFs, tesseract for scanned; 'adobe' uses Adobe PDF Services API; 'textract' uses AWS Textract"
    enum_values:
      - auto
      - pymupdf
      - pdfplumber
      - tesseract
      - adobe
      - textract

outputs:
  text:
    type: string
    description: "Extracted plain text content from the document"
  tables:
    type: string
    description: "JSON-serialized list of tables; each table is a list of rows (list of strings). Empty list if extract_tables=false."
  page_count:
    type: integer
    description: "Total number of pages in the document"
  is_scanned:
    type: boolean
    description: "Whether the PDF was detected as a scanned (image-based) document"
  metadata:
    type: string
    description: "JSON-serialized document metadata: title, author, creation_date, encrypted"

requires: []
conflicts_with: []
compatible_with:
  - customer-comms-v1
  - data-reporting-v1
  - academic-research-v1

# === 内容层（给 LLM 看）===
core_capability: >
  Detect whether a PDF is text-based or scanned, extract text and optional tables using the
  appropriate local tool (PyMuPDF for text PDFs, pdfplumber for tables, Tesseract for OCR),
  and optionally upgrade to Adobe PDF Services or AWS Textract for higher accuracy on
  complex layouts.

constraints:
  - "Scanned detection: open with PyMuPDF (fitz), call page.get_text('text').strip() on the
     first 3 pages; if all return empty string, classify as scanned and route to OCR pipeline.
     Never assume scanned/text based on file size alone."
  - "Text PDF extraction: use 'import fitz' (PyMuPDF). Open with fitz.open(file_path),
     iterate pages, call page.get_text('text'). For multi-column layouts use
     page.get_text('blocks') and sort blocks by (y0, x0) to preserve reading order."
  - "Table extraction: use pdfplumber (pip install pdfplumber). Call
     pdfplumber.open(file_path) then page.extract_tables(). Returns list[list[str|None]].
     Replace None cells with '' before serialising to JSON."
  - "OCR pipeline: convert PDF pages to images via PyMuPDF (page.get_pixmap(dpi=300)),
     then run pytesseract.image_to_string(img, lang=language). DPI must be >=300 for
     acceptable accuracy; lower DPI causes character recognition errors."
  - "Page range: parse the page_range input BEFORE opening the document.
     Convert to 0-indexed list for fitz (fitz uses 0-index), but report to the user
     in 1-indexed terms in output metadata."
  - "Encrypted PDFs: fitz.open() will raise fitz.fitz.PasswordError if the PDF is
     encrypted. Catch this exception and return {'text': '', 'error': 'encrypted_pdf'}
     immediately; do NOT attempt to continue parsing."
  - "Memory limit: for files >100 MB, process pages in batches of 10 and concatenate
     results. Never load the full document text into a single string before streaming
     to output."
  - "Adobe PDF Services API (paid upgrade): endpoint POST
     https://pdf-services.adobe.io/operation/extractpdf. Free tier: 500 pages/month.
     Requires CLIENT_ID + CLIENT_SECRET from environment variables
     ADOBE_PDF_CLIENT_ID and ADOBE_PDF_CLIENT_SECRET. Returns structured JSON with
     text, tables, and bounding boxes."
  - "AWS Textract (paid upgrade): use boto3 client 'textract'. For sync call use
     detect_document_text() for pure text; for tables use analyze_document() with
     FeatureTypes=['TABLES']. Region must match the bucket if uploading via S3."
  - "Never import pytesseract unless ocr_fallback=True or backend='tesseract';
     tesseract binary must be pre-installed on the host (brew install tesseract on macOS,
     apt install tesseract-ocr on Linux)."
  # --- Community-sourced constraints (2025-2026) ---
  - "PyMuPDF glibc compatibility on AWS Lambda: official Linux wheels require a minimum glibc
     version that increases with each release. If pip install pymupdf fails on Lambda or
     older Linux (glibc < 2.28), pin to the last compatible wheel version or switch to the
     pymupdf-binary variant. Do NOT assume the latest wheel is universally compatible."
  - "PyMuPDF page.find_tables() requires version >=1.23.0; calling it on 1.22.x or earlier
     raises AttributeError. Always check fitz.version[0] >= '1.23' at startup and raise a
     clear ImportError with the required version if the check fails."
  - "Tesseract requires image pre-processing for low-quality scans: skewed pages reduce line
     segmentation accuracy severely. Before OCR, apply deskew (rotate to 0°), binarise
     (cv2.threshold with OTSU), and remove dark borders. Preprocessing can improve accuracy
     by up to 20% on degraded documents."
  - "pdfplumber merged-cell tables: pdfplumber cannot reliably detect merged cells spanning
     multiple rows/columns. When a cell spans multiple rows, the content appears only in the
     top-left cell and all spanned cells return None. Post-process with forward-fill logic
     (carry value down/right) if the document type is known to use merged cells."
  - "PyMuPDF table extraction (find_tables) vs pdfplumber: PyMuPDF is significantly faster
     but lacks visual debugging. For complex multi-column tables, use pdfplumber with
     explicit table_settings={'vertical_strategy': 'lines', 'horizontal_strategy': 'lines'}
     rather than relying on text-heuristic strategies which fail on borderless tables."
  - "Unicode replacement character (U+FFFD) in extracted text: PyMuPDF emits U+FFFD (65533)
     when it cannot map a glyph to a Unicode codepoint due to a missing or incomplete CMAP
     in the font. Detect by scanning text for chr(65533); if found, either accept the loss
     or fall back to OCR for that page. Do NOT silently pass garbled text downstream."
  - "Ligature characters in extracted text: PDF fonts often encode ligatures as single
     glyphs (e.g. U+FB00 'ﬀ', U+FB01 'ﬁ'). Before text indexing or NLP, normalise with
     unicodedata.normalize('NFKC', text) to decompose ligatures into standard ASCII
     sequences. Failing to normalise causes search misses (searching 'ff' won't match 'ﬀ')."
  - "LaTeX-generated PDFs with Type3 fonts: PyMuPDF versions >=1.22 may produce garbled or
     invalid Unicode characters for Type3 font glyphs in LaTeX-generated academic papers.
     Detect by checking page.get_fonts() for subtype='Type3'; route those pages to OCR
     fallback or use pdfplumber which handles Type3 differently."
  - "pdfplumber crop() for header/footer exclusion: production PDFs commonly have running
     headers, footers, and page numbers that contaminate table extraction. Use
     page.crop((x0, header_height, x1, page_height - footer_height)) before extract_tables()
     to isolate the content area. Omitting this step causes header text to be merged into
     the first table row."
  - "PyMuPDF segmentation fault on corrupted PDFs: malformed PDF files can trigger a
     segmentation fault in the underlying MuPDF C library, crashing the entire Python
     process. Isolate PDF parsing in a subprocess (subprocess.run with timeout) so that
     a crash does not take down the main application. Never parse untrusted PDFs in-process."
  - "Watermarks interfere with text extraction: semi-transparent watermarks rendered as
     text layers (not images) are extracted by PyMuPDF alongside actual content. Use
     page.get_text('dict') and filter blocks by font size (watermarks are often very large
     fonts at low opacity) or by color value to remove watermark spans before joining text."
  - "page.get_text('text') concatenates all text spans with newlines but drops inter-word
     spacing when words are in adjacent spans. Use page.get_text('words') to get individual
     word bounding boxes with coordinates, then reconstruct lines with explicit space
     insertion based on x-gap thresholds."
  - "PDF with 'empty' text layer over scanned image (dual-layer PDF): some scan-to-PDF
     tools embed an invisible text layer (OCR output) over the scanned image. PyMuPDF
     extracts the invisible text layer, which may contain OCR errors from the scan tool.
     Always validate extracted text quality (character confidence, entropy) rather than
     assuming the text layer is authoritative."
  - "pdfplumber extract_text() default x_tolerance/y_tolerance: the default tolerances
     (x_tolerance=3, y_tolerance=3 pixels) are tuned for well-formatted PDFs. PDFs with
     variable character spacing (e.g. justified text) require higher x_tolerance (6-10).
     Tight column layouts require lower tolerance. Calibrate per document type rather than
     using defaults for all documents."
  - "PDF page rotation metadata: scanned PDFs are frequently stored with a 90° or 180°
     rotation flag in the page metadata. PyMuPDF applies rotation transparently when
     rendering but page.get_text() returns text based on the stored (unrotated) coordinate
     system. Check page.rotation before OCR; if non-zero, rotate the rendered pixmap back
     before passing to Tesseract."
  - "AWS Textract async job polling: for multi-page documents, Textract requires async
     start_document_text_detection() + polling get_document_text_detection() until
     JobStatus is SUCCEEDED or FAILED. Never use synchronous detect_document_text() for
     documents over 1 page — it silently truncates to page 1. Poll with exponential backoff
     (start 5s, max 30s) and set a total timeout of 10 minutes."
  - "pdfplumber memory usage on large files: pdfplumber loads the entire PDF into memory
     via pdfminer. For files >50 MB, memory consumption can exceed 1 GB. Process large PDFs
     page-by-page using a for page in pdf.pages loop and explicitly call page.flush_cache()
     after processing each page to release pdfminer's internal cache."

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. Airtable (https://airtable.com/api) — 集成 带有 Airtable，认证：`apiKey`
         2. Api2Convert (https://www.api2convert.com/) — 在线 文件 转换 API，认证：`apiKey`
         3. apilayer pdflayer (https://pdflayer.com) — HTML / URL 转 PDF，认证：`apiKey`
         4. Asana (https://developers.asana.com/docs) — Programmatic 访问 到 全部 数据 在 你的 asana 系统，认证：`apiKey`
         5. ClickUp (https://clickup.com/api) — ClickUp 是 robust, cloud-based 项目 管理 工具 用于 boosting 生产力 / 办公效率，认证：`OAuth`
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "Scanned PDF silently returns empty string — caller assumes successful extraction"
    mitigation: "Always check is_scanned in the output and warn if text is empty; include
      is_scanned=True in output so downstream bricks can decide whether to retry with OCR"
  - severity: HIGH
    pattern: "Encrypted PDF raises PasswordError and crashes the pipeline"
    mitigation: "Wrap fitz.open() in try/except fitz.fitz.PasswordError and return a
      structured error dict instead of raising"
  - severity: HIGH
    pattern: "Multi-column academic papers extracted in wrong reading order"
    mitigation: "Use page.get_text('blocks') and sort by (y0, x0) rather than
      page.get_text('text') which streams left-to-right across columns"
  - severity: MEDIUM
    pattern: "pdfplumber table extraction returns None cells causing JSON serialization errors"
    mitigation: "Replace all None with '' via nested list comprehension before json.dumps()"
  - severity: MEDIUM
    pattern: "Large PDF (>200 MB) causes OOM when all pages loaded simultaneously"
    mitigation: "Process in batches of 10 pages, free pixmap objects after each batch
      with del pixmap; gc.collect()"
  - severity: LOW
    pattern: "Tesseract language pack not installed causes TesseractError"
    mitigation: "Catch pytesseract.TesseractError, log the missing language code,
      fall back to 'eng' before retrying"
  # --- Community-sourced failures (2025-2026) ---
  - severity: HIGH
    pattern: "AWS Lambda deployment fails silently because PyMuPDF wheel is incompatible
      with the Lambda runtime glibc version; fitz import raises ImportError at runtime"
    mitigation: "Pin pymupdf to a specific version tested against the Lambda runtime; add
      a startup smoke test that imports fitz and logs the version; use pymupdf-binary as
      fallback for environments with restricted glibc"
  - severity: MEDIUM
    pattern: "Borderless tables in PDFs not detected by pdfplumber — extract_tables()
      returns empty list even though the table is visually present"
    mitigation: "Switch table_settings to text-based strategy:
      {'vertical_strategy': 'text', 'horizontal_strategy': 'text',
      'intersection_x_tolerance': 10, 'intersection_y_tolerance': 10};
      or use PyMuPDF find_tables() which uses a different detection algorithm"
  - severity: MEDIUM
    pattern: "Skewed scanned pages produce garbled Tesseract output with random character
      substitutions even at 300 DPI"
    mitigation: "Detect skew angle with pytesseract.image_to_osd(), rotate using
      PIL.Image.rotate() before OCR; add binarisation step with cv2.THRESH_OTSU
      to separate foreground text from background noise"
  - severity: HIGH
    pattern: "PyMuPDF segmentation fault on corrupted PDF crashes entire Python process
      — production service goes down for a single bad file"
    mitigation: "Run PDF parsing in an isolated subprocess with a timeout; catch
      subprocess.TimeoutExpired and subprocess.CalledProcessError; return a structured
      error with {'error': 'parse_crash', 'file': path} rather than propagating the crash"
  - severity: HIGH
    pattern: "U+FFFD replacement characters silently passed downstream to NLP/search
      pipeline, causing garbled indexing and broken search results"
    mitigation: "Scan extracted text for chr(65533) after each page; if proportion >5%
      of total characters, flag page as extraction_quality=LOW and trigger OCR fallback;
      log the font name from page.get_fonts() to assist debugging"
  - severity: MEDIUM
    pattern: "Ligature characters (ﬀ, ﬁ, ﬂ) break keyword search — 'efficient' not
      found because PDF stores it as 'e﹒ﬁcient'"
    mitigation: "Apply unicodedata.normalize('NFKC', text) to all extracted text before
      indexing or returning; this is a one-line fix with no side effects on normal text"
  - severity: MEDIUM
    pattern: "Watermark text extracted alongside content — every page contains company
      watermark repeated in the text output, polluting downstream analysis"
    mitigation: "Filter page.get_text('dict') blocks by font size thresholds (watermarks
      typically >72pt) and opacity values; build a watermark pattern detector that checks
      the first 3 pages and adds identified watermark strings to an exclusion list"
  - severity: LOW
    pattern: "PDF page stored rotated 90° — Tesseract receives un-rotated pixmap and
      produces zero output because text is sideways"
    mitigation: "Check page.rotation before get_pixmap(); if non-zero, apply
      mat = fitz.Matrix(1, 1).prerotate(page.rotation) when creating the pixmap so
      the rendered image is always upright before OCR"

