# 知识积木 v2 — UI/UX 设计辅助
# 用途：Figma 设计稿转代码、设计规范审查、UI 组件生成、响应式断点适配

# === 信封层（给系统看）===
id: ui-design-v1
name: UI/UX 设计辅助
version: 1.0.0
category:
  - 设计工具
  - 前端开发
tags:
  - Figma
  - 设计转代码
  - 组件生成
  - 响应式设计
  - 设计token
  - Auto Layout
  - CSS
  - React
capability_type: transform
data_source: webhook

inputs:
  figma_file_key:
    type: string
    required: true
    description: "Figma 文件 key，从 URL 中提取，如 https://figma.com/file/<KEY>/..."
    validation: "len(value) >= 10 and value.replace('-', '').isalnum()"
  figma_access_token:
    type: string
    required: true
    description: "Figma Personal Access Token，从 Figma Settings > Account > Personal access tokens 生成"
  node_ids:
    type: text
    required: false
    default: ""
    description: "指定要导出的节点 ID 列表，逗号分隔；空字符串表示导出整个文件的顶层 Frame"
  target_framework:
    type: enum
    required: false
    default: "react"
    description: "目标代码框架，影响组件语法和 CSS 方案"
    enum_values:
      - react
      - vue
      - html
      - swiftui
      - flutter
  design_mode:
    type: enum
    required: false
    default: "inspect"
    description: "操作模式：inspect=提取设计规范，codegen=生成组件代码，review=设计审查"
    enum_values:
      - inspect
      - codegen
      - review
  breakpoints:
    type: text
    required: false
    default: "320,768,1024,1440"
    description: "响应式断点像素值，逗号分隔，用于生成媒体查询"

outputs:
  design_tokens:
    type: "dict"
    description: "提取的设计 token，含 colors/typography/spacing/border_radius/shadows 字段"
  components:
    type: "list[dict]"
    description: "生成的组件代码列表，每项含 name/code/css/props 字段"
  review_issues:
    type: "list[dict]"
    description: "设计审查发现的问题，含 type/node_id/description/suggestion 字段"
  responsive_css:
    type: string
    description: "生成的响应式 CSS 媒体查询代码"

requires: []
conflicts_with: []
compatible_with: []

# === 内容层（给 LLM 看）===
core_capability: >
  通过 Figma REST API（免费，个人访问 token 即可）读取设计文件，
  提取设计 token（颜色、字体、间距）、Auto Layout 结构，
  生成对应的前端组件代码和响应式 CSS；付费 Figma Plugin API 提供实时双向同步能力。

constraints:
  - "Figma 2025-11 更新了更严格的限速策略（2025年11月17日生效）：
     Images API 在约 10 次请求后即返回 429，Retry-After 头部有时高达 400,000 秒（约 4.6 天）；
     免费/Starter 席位用 MCP 工具时每月仅限 6 次工具调用；
     必须实现指数退避重试，并在触发 429 时在输出中标注'Figma API 限速，结果为缓存数据'"
  - "Figma 引入 AI Credits 配额制度：2025 年下半年起各订阅层级的 AI 功能受 Credits 限制，
     超额后工作流将中断；集成 Figma AI 功能的代码必须处理 429/402 响应，降级为非 AI 模式"
  - "Figma 设计系统的 Variables API 在 2025/2026 最佳实践中推荐用于替代旧版设计 Token；
     Variables 支持 Color/Number/String/Boolean 四种类型，读取接口为 GET /files/{key}/variables/local；
     旧版 styles API 返回的 paints/effects 字段与 Variables 数据不重叠，两者必须分别读取"
  - "Figma REST API 基础 URL 为 https://api.figma.com/v1/；
     必须在请求头中设置 X-Figma-Token: <access_token>，不可用 Bearer Token 格式；
     免费用户 API 限速：每 15 分钟 1500 次请求；文件级读取用 GET /files/{file_key}"
  - "节点树解析：根节点类型为 DOCUMENT，Frame/Component/Instance 是组件候选；
     必须递归遍历 children 数组，不可只看顶层节点；
     Auto Layout 属性在 layoutMode（HORIZONTAL/VERTICAL/NONE）和 itemSpacing 字段"
  - "设计 token 提取规则：颜色必须转换为 HEX/RGB/HSL 三种格式并输出；
     字体大小以 px 为单位（Figma 内部单位与 CSS px 1:1 映射）；
     spacing 取 paddingLeft/paddingRight/paddingTop/paddingBottom 和 itemSpacing；
     圆角取 cornerRadius（均匀）或 rectangleCornerRadii（四角独立）"
  - "CSS 变量命名规范：颜色用 --color-<name>，字体用 --font-size-<scale>，
     间距用 --spacing-<n>，必须遵循 CSS 自定义属性命名（小写 + 连字符）；
     颜色名从 Figma 图层名派生，空格替换为连字符，特殊字符移除"
  - "响应式适配：Figma 中的 Frame 宽度决定设计断点；
     移动端 Frame（宽度 <=768px）映射为 max-width 媒体查询；
     桌面端 Frame（宽度 >=1280px）作为基准样式；
     必须生成 mobile-first CSS（基础样式针对最小屏幕，用 min-width 向上扩展）"
  - "组件嵌套深度限制：超过 5 层嵌套的组件必须拆分为子组件；
     Instance 节点（Figma 组件实例）对应代码中的组件复用，不可展开为内联 HTML"
  - "字体可用性检查：提取到的 fontFamily 若不是系统字体（Arial/Helvetica/Georgia 等），
     必须检查是否为 Google Fonts 托管（GET https://fonts.googleapis.com/css2?family=<name>），
     不可用的字体必须在输出中标注警告，并提供系统字体 fallback"
  - "付费升级：Figma Plugin API 需要在 Figma 桌面客户端内运行，
     无法通过 REST API 替代；Adobe XD API（https://adobexdplatform.com/plugin-docs/）
     只支持 XD 原生插件，不提供公开 REST 接口"
  - "图层命名直接影响 AI 代码生成质量：图层名为 'Frame 74' 或 'Rectangle 1' 时，
     Figma Make/AI 代码生成工具将生成无意义的 div/className 名称；
     设计稿中所有组件必须使用语义化命名（如 CreateProjectModal、HeroButton），
     空格替换为连字符，不含特殊字符；否则生成代码中 className 全部为随机字符串"
  - "Design Tokens vs Variables 的混淆是 2025/2026 最常见设计系统错误：
     Figma Variables（Color/Number/String/Boolean）和旧版 Styles（paints/effects/type styles）
     是完全不同的 API，Variables 通过 GET /files/{key}/variables/local 读取，
     旧版 Styles 通过 GET /files/{key}/styles 读取；两者数据不重叠，必须分别处理；
     只读其中一个会导致设计 token 不完整"
  - "固定高度（fixed height）会破坏代码生成的响应式语义：
     设计师在 Figma 中为容器设置固定高度时，对应 CSS 应生成 height: fixed_value；
     但正确做法是让高度'拥抱内容'（hug），对应 CSS 的 height: auto；
     代码生成时必须区分 layoutSizingVertical='FIXED' 和 'HUG' 来决定是否输出 height 属性"
  - "语义化 token 命名不可用原始值命名：
     使用 'blue-500' 这类原始值命名的 token 在主题切换时失去意义；
     必须改为语义化命名如 'color-button-background-brand'；
     代码生成时若检测到 token 名称为颜色值或数字（如 #3B82F6、500），
     应在 review_issues 中记录 type=primitive_token_name 警告"
  - "Figma Dev Mode 插件无法修改文档：
     在 Dev Mode 中运行的 Plugin API 不允许创建、删除或修改节点（除 pluginData/relaunchData 外）；
     依赖 Plugin API 修改设计的工作流必须切换到 Edit Mode；
     代码生成工具不可在 Dev Mode 中尝试写回注释或标注"
  - "Compare Changes 在分支合并后可能指向错误版本：
     Figma 分支合并后，Dev Mode 的 Ready for dev 标签中的 Compare Changes 功能
     有时指向合并前的旧版本而非最新版本；
     审查代码变更时不可仅依赖 diff 视图，需结合图层面板确认实际节点状态"
  - "Figma 导出 SVG 时内联样式覆盖 CSS 类：
     通过 API 导出的 SVG 包含大量内联 style 属性（fill/stroke），
     这些内联样式的优先级高于外部 CSS 类，导致主题切换/暗色模式无效；
     SVG 用于交互界面时必须后处理：将内联 fill/stroke 替换为 CSS 变量引用"
  - "Figma 中组件 Instance 的 override 属性不出现在 REST API 的顶层节点：
     组件实例（Instance）的属性覆盖（override）存储在 overrides 字段中，
     而非直接覆盖 children 的属性值；直接读取 Instance.children 会拿到主组件的原始值，
     必须合并 overrides 数组才能获取实际渲染属性"
  - "颜色模式（Color Mode/Light-Dark）在 Figma Variables 中表示为集合（Collection），
     但 REST API 仅返回当前活跃模式的值；
     需要导出所有主题变量时，必须遍历 variableCollections 中所有 modes 并分别请求；
     单次 GET /variables/local 只返回默认模式，会遗漏暗色/高对比度模式的值"
  - "触摸目标尺寸问题在设计稿中不可见但在真实设备上问题严重：
     按钮/链接的视觉尺寸可以很小（图标按钮常见 24×24px），
     但 WCAG 2.5.8 和 Apple HIG 要求可交互区域至少 44×44px（通过 padding 扩展）；
     AI 代码生成时无法从 Figma 视觉尺寸自动推断需要加 padding 扩展点击区域"
  - "Figma AI Credits 配额在 2025 下半年静默耗尽时不返回明显错误：
     Figma AI 功能（Figma Make、AI 生成组件等）超出 Credits 配额后，
     API 返回 402/429 而非明确的 quota_exceeded 错误信息；
     集成代码必须处理这两个状态码并降级为非 AI 模式，并在输出中标注'AI 功能不可用'"
  - "Token 导出与代码库的同步是持续工程问题而非一次性任务：
     大多数团队在 Figma 中维护 Variables 的同时在代码库中维护 CSS/JS token，
     两者之间没有官方双向同步机制；社区插件（如 Token Studio）填补了这个空白，
     但插件版本更新后 JSON schema 可能变化，导致导出的 token 文件格式与代码库解析器不兼容"
  - "Figma 组件嵌套超过 5 层时代码生成产生无法维护的深度 div 嵌套：
     设计稿中过深的组件树直接映射为代码中同等深度的 HTML 结构，
     导致 CSS 选择器过长、调试困难、渲染性能下降；
     review 模式下必须检测嵌套深度，超过 5 层时在 review_issues 中记录并建议拆分子组件"
  - "Figma API 限速 Retry-After 头部返回异常大值：
     2025-11 更新后，Images API 在 10 次请求后返回 429，Retry-After 有时高达 400,000 秒（约 4.6 天）；
     不可按 Retry-After 的值等待，否则任务将永久卡住；
     应设置最大等待上限（如 300 秒），超过上限时切换为缓存数据并在输出中标注"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. Améthyste (https://api.amethyste.moe/) — 生成 图片 用于 Discord 用户，认证：`apiKey`
         2. Art Institute of Chicago (https://api.artic.edu/docs/) — 艺术，认证：No
         3. Colormind (http://colormind.io/api-access/) — Color scheme 生成器，认证：No
         4. ColourLovers (http://www.colourlovers.com/api) — 获取 各种 patterns, palettes 和 图片，认证：No
         5. Cooper Hewitt (https://collection.cooperhewitt.org/api) — Smithsonian Design 博物馆，认证：`apiKey`
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "设计稿使用了自定义字体（如付费商业字体），代码中直接引用但生产环境不可用，
              导致字体回退为 Times New Roman，整体排版崩溃"
    mitigation: "在 design_tokens.typography 中标注每个字体的 is_web_safe 和 google_fonts_url 字段；
                 生成代码时自动加入 Google Fonts import 或标注需手动引入字体文件"
  - severity: HIGH
    pattern: "Figma Auto Layout 的 space-between 对齐方式映射到 CSS 时，
              开发者误用 margin: auto 代替 justify-content: space-between，
              导致 flex 容器内子元素间距在不同屏幕宽度下不一致"
    mitigation: "Auto Layout primaryAxisAlignItems=SPACE_BETWEEN 必须映射为 justify-content: space-between，
                 不可用 margin/gap 替代"
  - severity: HIGH
    pattern: "响应式断点遗漏中间尺寸（如 768px-1024px 的平板视图），
              导致平板设备上布局在桌面和移动样式之间跳变"
    mitigation: "检查输入 breakpoints 是否覆盖 768px（平板分界），
                 不足 3 个断点时自动补全 320/768/1440 三档"
  - severity: MEDIUM
    pattern: "Figma 文件含有多个同名 Frame（设计师直接复制图层），
              节点 ID 唯一但名称重复，生成的组件名冲突"
    mitigation: "组件命名时追加节点 ID 后 6 位作为后缀，如 Button_a3f2c9，并在注释中说明来源"
  - severity: MEDIUM
    pattern: "设计稿间距使用奇数像素值（如 7px、13px），不符合 4px 基准网格，
              导致代码实现与设计稿在 Retina 屏幕下有 0.5px 偏差"
    mitigation: "inspect 模式下检查所有 spacing 值是否为 4 的倍数，
                 不符合时在 review_issues 中记录 type=spacing_off_grid 的警告"
  - severity: LOW
    pattern: "Figma API 返回的颜色 opacity 在 0-1 之间（浮点），
              直接转 CSS rgba() 时精度丢失（如 0.8999999 出现在代码里）"
    mitigation: "所有 opacity 值用 round(value, 2) 保留两位小数后再写入 CSS"
  - severity: HIGH
    pattern: "生成代码使用固定 px 单位作为布局基础（而非 rem/em），
              在高 DPI 设备或用户调整浏览器字体大小后，整体布局比例失调"
    mitigation: "所有非边框类尺寸转换为 rem（1rem = 16px 基准）；
                 仅 border、box-shadow 等视觉装饰元素保留 px；
                 生成的 CSS 变量统一使用 --spacing-N-rem 命名"
  - severity: MEDIUM
    pattern: "移动端图片未优化：Figma 导出的资源文件按桌面分辨率导出，直接用于移动端时文件体积过大，
              导致首屏加载时间过长，移动端性能评分差（Core Web Vitals LCP 超标）"
    mitigation: "codegen 模式下，图片资源输出 srcset 属性并提供 1x/2x/3x 三档；
                 推荐使用 WebP 格式替代 PNG；在 review_issues 中记录所有未压缩图片资源"
  - severity: MEDIUM
    pattern: "触摸目标尺寸过小：设计稿中按钮/链接尺寸 <44×44px（Apple HIG 和 WCAG 2.5.8 标准），
              在真实移动设备上误触率高"
    mitigation: "inspect/review 模式下检查所有交互元素最小边（min(width, height)）；
                 小于 44px 时在 review_issues 中记录 type=touch_target_too_small 警告"
  - severity: HIGH
    pattern: "设计师将语义级别（h1→h2）在 Figma 中通过样式覆盖而非修改组件实现，
              导出代码后 HTML 标题层级混乱；Figma 允许这种操作但 HTML 语义不允许"
    mitigation: "codegen 模式下检查文字节点的 textStyles 中 fontSize 大小与 HTML heading 层级的映射关系；
                 若 h1 字号小于 h2 字号，在 review_issues 中记录 type=heading_hierarchy_error"
  - severity: HIGH
    pattern: "导出的 SVG 图标包含内联 fill 颜色（如 fill='#3B82F6'），
              无法通过 CSS currentColor 响应主题切换，导致暗色模式下图标颜色不随主题变化"
    mitigation: "SVG 导出后处理：将所有内联 fill/stroke 替换为 fill='currentColor'；
                 对多色 SVG 需保留各色层的 CSS 变量引用而非硬编码颜色值"
  - severity: MEDIUM
    pattern: "Figma Instance 的 override 属性被代码生成工具忽略，生成了主组件的原始值而非实例的实际值；
              按钮文字、图标等在设计中已修改但代码中仍为默认值"
    mitigation: "读取 Instance 节点时必须合并 overrides 数组：对每个 override 项，
                 按 id 找到对应 children 节点并用 override 中的属性值覆盖原始值"
  - severity: MEDIUM
    pattern: "Figma Variables 仅导出了默认（Light）模式，Dark/HighContrast 模式的 token 值被遗漏；
              生产代码中暗色模式使用了亮色模式的颜色值"
    mitigation: "遍历 variableCollections[].modes 数组，对每个 mode 单独提取变量值；
                 输出的 design_tokens 结构应为 {mode_name: {token_name: value}}"
  - severity: HIGH
    pattern: "图层命名为 Frame 74/Rectangle 1 等默认名称，AI 代码生成产生无意义 className；
              整个代码库中 CSS 类名全部为 frame-74、rectangle-1，无法维护"
    mitigation: "inspect 前检查顶层 Frame 及 Component 节点的 name 字段是否包含数字开头或 'Frame'/'Rectangle'；
                 检测到默认命名时在 review_issues 中标注 type=unnamed_layer，阻止进入 codegen 流程"

