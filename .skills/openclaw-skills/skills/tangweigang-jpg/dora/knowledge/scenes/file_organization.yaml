# 知识积木 v2 — 文件整理自动化
# 用途：批量重命名文件、按规则分类整理、检测重复文件

# === 信封层（给系统看）===
id: file-organization-v1
name: 文件整理自动化
version: 1.0.0
category:
  - 文件管理
  - 生产力
tags:
  - 文件整理
  - 批量重命名
  - 重复检测
  - exiftool
  - 元数据
  - pathlib
capability_type: transform
data_source: filesystem

inputs:
  source_dir:
    type: string
    required: true
    description: "待整理的源目录绝对路径，如 '/Users/user/Downloads'；必须是绝对路径"
  target_dir:
    type: string
    required: true
    description: "整理后目标目录绝对路径；不存在时自动创建；与 source_dir 可以相同（原地整理）"
  operation:
    type: enum
    required: false
    default: "organize"
    description: "操作类型：organize=按规则分类，rename=批量重命名，dedup=重复检测，dry_run=只预览不执行"
    enum_values:
      - organize
      - rename
      - dedup
      - dry_run
  rename_pattern:
    type: string
    required: false
    default: "{date}_{original}"
    description: "重命名模板（operation=rename 时生效），支持变量：
      {date}=文件修改日期(YYYYMMDD)，{exif_date}=EXIF拍摄日期，
      {original}=原始文件名（不含扩展名），{index:04d}=序号，{ext}=扩展名"
  organize_rules:
    type: string
    required: false
    default: '{"images": [".jpg",".jpeg",".png",".gif",".webp"], "documents": [".pdf",".doc",".docx",".txt"], "videos": [".mp4",".mov",".avi",".mkv"], "audio": [".mp3",".wav",".m4a",".flac"]}'
    description: "JSON 字符串格式的分类规则，key 为子目录名，value 为扩展名列表"
  dedup_method:
    type: enum
    required: false
    default: "hash"
    description: "重复检测方式：hash=MD5/SHA256 完整比较（精确），
      size_name=文件大小+文件名（快速），perceptual=感知哈希（图片相似度，需 imagehash 库）"
    enum_values:
      - hash
      - size_name
      - perceptual
  conflict_policy:
    type: enum
    required: false
    default: "skip"
    description: "文件名冲突处理：skip=跳过（保留原文件），rename=自动加序号后缀，overwrite=覆盖（危险）"
    enum_values:
      - skip
      - rename
      - overwrite
  follow_symlinks:
    type: boolean
    required: false
    default: false
    description: "是否跟随符号链接；false 时跳过符号链接文件，避免无限递归"
  max_depth:
    type: integer
    required: false
    default: 3
    description: "目录遍历最大深度，避免大目录结构超时；-1 表示无限深度"
    validation: "-1 <= value <= 20"

outputs:
  processed_count:
    type: integer
    description: "成功处理的文件数量"
  skipped_count:
    type: integer
    description: "跳过的文件数量（冲突/权限/符号链接）"
  duplicate_groups:
    type: string
    description: "重复文件组列表（仅 operation=dedup 返回），每组一行：'HASH: file1.txt, file2.txt'"
  error_files:
    type: string
    description: "处理失败的文件列表，格式：'路径: 错误原因'，每行一条"
  preview:
    type: string
    description: "操作预览（operation=dry_run 时返回），格式：'SOURCE → TARGET'，每行一条"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1

# === 内容层（给 LLM 看）===
core_capability: >
  使用 Python pathlib 和 shutil 对指定目录进行批量文件整理，支持按扩展名分类、
  按模板重命名（含 EXIF 元数据）、MD5/感知哈希重复检测，所有操作前可 dry_run 预览。

constraints:
  - "文件移动必须用 shutil.move() 而非 os.rename()：跨磁盘（如 Downloads→外置硬盘）时
     os.rename() 报 OSError，shutil.move() 自动处理跨设备复制+删除"
  - "文件名编码：必须在所有路径操作前对文件名执行 path.name.encode('utf-8', errors='replace').decode('utf-8')；
     Windows NTFS 允许非 UTF-8 路径，macOS HFS+ 用 NFD 规范化，
     统一用 unicodedata.normalize('NFC', filename) 处理"
  - "符号链接安全：默认 follow_symlinks=False，用 path.is_symlink() 检测后跳过；
     若 follow_symlinks=True 则用 set() 追踪已访问的真实路径（path.resolve()）防止循环"
  - "权限检查：移动/删除前用 os.access(path, os.W_OK) 验证写权限；
     无权限时记录到 error_files，继续处理下一文件，不终止整个操作"
  - "EXIF 日期提取（rename_pattern 含 {exif_date}）：用 exiftool 命令行工具
     subprocess.run(['exiftool', '-DateTimeOriginal', '-csv', path], capture_output=True)；
     exiftool 不可用时降级到 path.stat().st_mtime；
     EXIF 日期格式为 'YYYY:MM:DD HH:MM:SS'，需转换为 'YYYYMMDD'"
  - "文件名冲突处理（conflict_policy=rename）：自动在文件名后加 _01/_02...序号；
     检查目标路径是否存在用 target_path.exists()，不可假设操作原子性（并发整理时可能竞态）"
  - "大目录遍历性能：使用 pathlib.Path.rglob('*') 而非 os.walk()；
     单次遍历文件数 > 100000 时，必须分批处理（每批 1000 文件），批间 yield 让出控制权"
  - "重复检测（dedup_method=hash）：读取文件时分块计算 MD5，避免大文件 OOM：
     with open(f, 'rb') as fp: 循环 fp.read(8192) 更新 md5.update(chunk)；
     相同 hash 视为完全重复，仅报告不自动删除（删除属于高危操作，留给用户确认）"
  - "感知哈希（dedup_method=perceptual）：使用 imagehash 库（pip install imagehash），
     imagehash.phash(Image.open(f)) 计算感知哈希；
     仅对图片文件（MIME type image/*）执行，非图片跳过；
     汉明距离 <= 8 视为相似（可配置）"
  - "操作日志：每次整理完成后将操作记录写入 target_dir/.organize_log_YYYYMMDD_HHMMSS.json，
     格式：{moved: [{from, to}], skipped: [{path, reason}], errors: [{path, error}]}"
  - "【社区经验】pathlib.Path.rename() 在目标文件已存在时会静默覆盖（Python 3.x 行为）：
     必须在 rename 前用 target_path.exists() 判断，或改用 shutil.move() 配合 conflict_policy；
     注意：Path.rename() 与 Path.replace() 的覆盖行为文档描述不够明确（来源：bugs.python.org #27886）"
  - "【社区经验】符号链接 TOCTOU 竞态安全风险：
     check-then-use 模式（先 is_symlink() 再 stat()）在并发/恶意环境下存在竞态；
     用 os.open(path, O_CREAT|O_EXCL) 或 tmpfile 原子操作代替 check-then-create；
     至少确保批量整理脚本不在 /tmp 或 world-writable 目录创建临时文件（来源：SEI CERT POS35-C）"
  - "【社区经验】macOS HFS+ 与 Linux ext4 Unicode 规范化差异导致同名文件在跨平台同步后出现重复：
     macOS 用 NFD（分解式），Linux 用 NFC（组合式），同一中文文件名在云同步后变成两个文件；
     统一用 unicodedata.normalize('NFC', filename) 规范化后再比较文件名（来源：Python pathlib docs）"
  - "【社区经验】shutil.copy() 和 shutil.copy2() 在 POSIX 平台不保留文件 owner/group/ACL：
     copy 后文件 owner 变为运行脚本的用户，ACL 丢失；备份/迁移场景需改用 shutil.copytree(copy_function=shutil.copy2)
     + 手动设置权限，或使用 rsync -a（来源：Python shutil 文档）"
  - "【社区经验】perceptual hash 对旋转/裁剪/明显色调变换的图片会产生截然不同的 hash：
     同一图片 90 度旋转后 pHash 差异可能超过汉明距离阈值 8，被误判为不同图片；
     对轻度变换图片的去重需降低汉明阈值（<=4）并结合多种 hash 算法投票（来源：benhoyt.com duplicate-image-detection）"
  - "【社区经验】大目录遍历时 pathlib.rglob('*') 会一次性展开所有路径到内存，100 万文件时内存峰值超 2GB：
     改用 os.scandir() 配合自定义深度限制的生成器，按需逐层展开目录；
     或使用 pathlib.Path.iterdir() 替代 rglob，仅递归需要的层级（来源：Python docs pathlib）"
  - "【社区经验】EXIF DateTimeOriginal 无时区信息，旅行拍摄的照片时间戳混乱：
     DateTimeOriginal 是设备本地时间，不带时区偏移；跨时区拍摄后整理时按日期排序会出现乱序；
     可读取 GPS 坐标反查拍摄地时区（pytz.timezone），或要求用户在重命名前手动确认时区偏移
     （来源：exiftool.org/forum）"
  - "【社区经验】多个 EXIF 日期标签（DateTimeOriginal/SubSecDateTimeOriginal/CreateDate）值不一致：
     相机厂商写入多个日期标签时值可能不同步；应优先使用 SubSecDateTimeOriginal（含亚秒精度），
     降级到 DateTimeOriginal，最后才用 st_mtime（来源：photoprism/photoprism #2320）"
  - "【社区经验】PyExifTool 在 Windows 上抛 'OSError: WinError 10038'（非 socket 对象）：
     PyExifTool 底层用 socket 通信，Windows 某些 Python 版本存在兼容问题；
     改用 subprocess.run(['exiftool', ...]) 直接调用命令行而非 Python 包装层（来源：PyExifTool PyPI）"
  - "【社区经验】整理脚本与 iCloud/OneDrive/Dropbox 同时运行产生 'file not found' 堆积：
     move 操作和云同步的上传队列竞争同一文件，导致云同步报错并在事件日志中产生大量报错；
     整理前暂停云同步进程或将目标目录排除在同步范围外（来源：Apple 安全编程指南）"
  - "【社区经验】dedup 时 MD5 碰撞虽极罕见，对恶意构造文件库存在风险：
     对可信度低的文件来源（用户上传、外部共享文件夹），改用 SHA-256 而非 MD5；
     两文件 hash 相同前提下再对比文件大小作双重确认（来源：SEI CERT C 安全编码规范）"
  - "【社区经验】在 NFS/SMB 网络文件系统上批量重命名时，文件锁和延迟导致 rename 成功但后续读取失败：
     网络文件系统的 inode 同步延迟可达数秒；rename 后立即 verify（检查目标路径存在）；
     批量操作时建议先在本地操作再同步到网络位置（来源：Python bugs.python.org #46317）"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. AnonFiles (https://anonfiles.com/docs/api) — 上传并分享 你的 文件 anonymously，认证：No
         2. BayFiles (https://bayfiles.com/docs/api) — 上传并分享 你的 文件，认证：No
         3. Box (https://developer.box.com/) — 文件 共享 和 存储，认证：`OAuth`
         4. ddownload (https://ddownload.com/api) — 文件 共享 和 存储，认证：`apiKey`
         5. Dropbox (https://www.dropbox.com/developers) — 文件 共享 和 存储，认证：`OAuth`
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "误删非重复文件：dedup 时因文件大小相同但内容不同被误标为重复"
    mitigation: "dedup_method=hash 为默认值，size_name 仅作预筛选；
      自动删除重复文件的操作必须有用户二次确认；积木本身只标记，不执行删除"
  - severity: HIGH
    pattern: "大目录（>50GB）整理时内存溢出：一次性加载所有文件路径到列表"
    mitigation: "使用生成器而非列表：for path in source_dir.rglob('*') 逐文件处理；
      不缓存全部路径，只在 dedup（需比较 hash）时构建 {hash: [paths]} 字典"
  - severity: HIGH
    pattern: "文件名冲突覆盖：target_path.exists() 返回 True 时直接 overwrite，导致原文件丢失"
    mitigation: "conflict_policy 默认为 skip，overwrite 必须明确传参；
      执行覆盖前将被覆盖文件备份到 .organize_trash/ 目录（保留 7 天）"
  - severity: MEDIUM
    pattern: "macOS .DS_Store 和 Thumbs.db 被当作普通文件处理，分类到 documents/"
    mitigation: "硬编码跳过列表：['.DS_Store', 'Thumbs.db', 'desktop.ini', '.localized']；
      以 . 开头的隐藏文件默认跳过（可通过 include_hidden=True 参数启用）"
  - severity: MEDIUM
    pattern: "exiftool 不在 PATH 中，subprocess.run() 抛 FileNotFoundError，整个积木崩溃"
    mitigation: "先 shutil.which('exiftool') 检测可用性；
      不可用时自动降级到 stat().st_mtime，并在 preview 中注明 'EXIF unavailable, using mtime'"
  - severity: LOW
    pattern: "符号链接指向已删除目标（dangling symlink），path.stat() 抛 FileNotFoundError"
    mitigation: "检测符号链接时用 path.is_symlink() + try/except OSError；
      dangling symlink 记录到 error_files，不终止整个整理流程"
  - severity: HIGH
    pattern: "【社区经验】Path.rename() 静默覆盖已存在目标文件，导致原目标文件永久丢失"
    mitigation: "执行 rename/move 前强制检查 target_path.exists()；conflict_policy=overwrite 时先备份到
      .organize_trash/；生产脚本必须先 dry_run 验证所有目标路径（来源：bugs.python.org #27886）"
  - severity: MEDIUM
    pattern: "【社区经验】自动整理脚本与文件同步工具（iCloud/OneDrive/Dropbox）同时运行时产生竞态，
      文件被移走后同步工具仍尝试上传原路径导致 'file not found' 错误大量堆积"
    mitigation: "整理操作前暂停或排除 cloud sync 目录；或先 copy 到目标路径再删除源文件，
      而非直接 move（来源：Apple 安全编程指南）"
  - severity: MEDIUM
    pattern: "【社区经验】shutil.copy() 在 POSIX 上丢失文件 owner/ACL，备份归档后权限丢失"
    mitigation: "需要保留权限时使用 shutil.copy2() + os.chown() 手动恢复，或改用 rsync -a；
      在 dry_run 输出中明确提示'本工具不保留 ACL 权限'（来源：Python shutil 文档）"
  - severity: MEDIUM
    pattern: "【社区经验】perceptual hash 汉明距离阈值 <=8 对旋转/裁剪图片产生大量漏检（相似图误判为不同）"
    mitigation: "对相似度敏感的场景（如照片整理）降低阈值至 <=4；
      对轻微变换的图片结合多算法（pHash + aHash + dHash）投票，至少 2/3 算法判相似才标记为重复
      （来源：benhoyt.com duplicate-image-detection）"
  - severity: LOW
    pattern: "【社区经验】exiftool 在 Windows PATH 未设置时 subprocess.run 抛出 FileNotFoundError，
      但错误信息不明确，开发者误以为文件路径有问题"
    mitigation: "优先用 shutil.which('exiftool') 检测可用性并输出友好提示；
      Windows 用户需将 exiftool.exe 所在目录加入 PATH 或提供 exiftool_path 配置参数（来源：exiftool.org FAQ）"

