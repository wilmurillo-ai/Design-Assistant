# 知识积木 v2 — 金融分析与投资追踪
# 用途：监控股票/加密货币行情，分析财报，追踪投资组合

# === 信封层（给系统看）===
id: financial-analysis-v1
name: 金融分析与投资追踪
version: 1.0.0
category:
  - 金融
  - 投资
tags:
  - 股票
  - 加密货币
  - 财报
  - 投资组合
  - Yahoo Finance
  - Alpha Vantage
  - CoinGecko
  - Polygon
capability_type: poll
data_source: stock_api

inputs:
  symbols:
    type: string
    required: true
    description: "逗号分隔的资产代码，如 'AAPL,MSFT,BTC-USD,ETH-USD'；
      美股用 TICKER，加密货币用 TICKER-USD（yfinance 格式）"
  asset_type:
    type: enum
    required: false
    default: "auto"
    description: "资产类型：auto=自动检测，stock=股票，crypto=加密货币；
      自动检测规则：含 -USD/-BTC 后缀为加密货币，否则为股票"
    enum_values:
      - auto
      - stock
      - crypto
  provider:
    type: enum
    required: false
    default: "yfinance"
    description: "数据提供商：yfinance=Yahoo Finance（免费无限），
      alpha_vantage=Alpha Vantage（5 req/min 免费/500 req/day standard tier $50/mo），
      coingecko=CoinGecko（30 req/min 免费）,
      polygon=Polygon.io（$29/mo Starter）"
    enum_values:
      - yfinance
      - alpha_vantage
      - coingecko
      - polygon
  interval:
    type: enum
    required: false
    default: "1d"
    description: "数据粒度：1m/5m/15m/1h=分/小时线（yfinance 免费 tier 延迟 15 分钟），1d/1wk/1mo=日/周/月线"
    enum_values:
      - 1m
      - 5m
      - 15m
      - 1h
      - 1d
      - 1wk
      - 1mo
  period:
    type: string
    required: false
    default: "1mo"
    description: "历史数据周期，如 '1d'/'5d'/'1mo'/'3mo'/'1y'/'5y'；
      与 interval 组合：interval=1m 最多 period=7d（yfinance 限制）"
  portfolio:
    type: string
    required: false
    default: ""
    description: "JSON 字符串格式的持仓，如 '{\"AAPL\": {\"shares\": 10, \"cost_basis\": 150.0}}'；
      留空则只返回行情数据，不计算持仓盈亏"
  alert_threshold_pct:
    type: float
    required: false
    default: 5.0
    description: "涨跌幅告警阈值（百分比），超过时在输出中标记告警；0 表示不告警"
    validation: "0 <= value <= 50"

outputs:
  quotes:
    type: string
    description: "当前行情 JSON，格式：{symbol: {price, change_pct, volume, market_cap}}"
  portfolio_summary:
    type: string
    description: "持仓盈亏摘要（仅 portfolio 非空时返回），格式：{symbol: {cost, current, pnl_pct}}"
  alerts:
    type: string
    description: "触发告警的资产列表，格式：'TICKER: +/-X.XX% 超过阈值 Y%'，每行一条"
  market_status:
    type: string
    description: "当前市场状态：'open'/'closed'/'pre-market'/'after-hours'（美股），'24h'（加密货币）"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1
  - stock-alert-v1

# === 内容层（给 LLM 看）===
core_capability: >
  通过 yfinance/Alpha Vantage/CoinGecko/Polygon 获取全球股票和加密货币行情，
  计算持仓盈亏，检测价格告警，输出结构化行情摘要。

constraints:
  - "yfinance 使用方式（provider=yfinance）：
     import yfinance as yf；
     单只股票：ticker = yf.Ticker('AAPL'); info = ticker.fast_info；
     批量获取：data = yf.download(symbols_list, period=period, interval=interval)；
     fast_info 比 info 更快（无额外 API 调用），包含 lastPrice/marketCap/52WeekHigh/Low"
  - "yfinance 免费 tier 数据延迟：日线及以上实时，分钟线/小时线延迟 15 分钟；
     interval in ['1m','5m','15m','1h'] 时在输出中注明 'delayed 15min'"
  - "Alpha Vantage 限流（免费 tier）：5 req/min，500 req/day；
     批量查询多个 symbol 时，必须在每次请求后 sleep(12)（60s / 5 = 12s/req）；
     超限返回 {'Note': 'Thank you for...'} 而非 HTTP 429，需检测 JSON key"
  - "CoinGecko 免费 API（provider=coingecko）：30 req/min；
     GET https://api.coingecko.com/api/v3/simple/price?ids={coin_id}&vs_currencies=usd&include_24hr_change=true；
     注意：CoinGecko ID 与交易所 ticker 不同（BTC → bitcoin，ETH → ethereum），
     需维护 ticker → coin_id 映射表或调用 /coins/list 接口"
  - "交易时段检测（美股）：用 pytz 以 America/New_York 时区判断；
     常规交易时段：工作日 09:30-16:00 ET；盘前：04:00-09:30；盘后：16:00-20:00；
     非交易时段返回最后收盘价，market_status='closed'"
  - "加密货币 24 小时交易：market_status 恒为 '24h'，不做交易时段过滤"
  - "货币单位统一：所有价格输出以 USD 为基准；
     非美元股票（港股 HKD、日股 JPY 等）需在 quotes 中注明原始货币和汇率；
     汇率数据用 yf.Ticker('HKDUSD=X').fast_info.lastPrice 获取"
  - "Polygon.io（provider=polygon）：需环境变量 POLYGON_API_KEY；
     GET https://api.polygon.io/v2/aggs/ticker/{symbol}/range/1/day/{from}/{to}?apiKey={key}；
     Starter 套餐（$29/mo）包含实时延迟 15 分钟数据，Stocks Starter 含所有美股"
  - "持仓盈亏计算：pnl_pct = (current_price - cost_basis) / cost_basis * 100；
     避免浮点精度问题：用 round(value, 4) 而非直接比较"
  - "停牌/退市检测：yfinance 返回 None 或空 DataFrame 时（delisted/suspended），
     在 quotes 中标记 status='suspended'，不抛异常"
  - "【社区经验】yfinance 在 Yahoo Finance API 变更后可能整体失效（历史案例：2025年2月17日）：
     Yahoo 修改后端 API 后 yfinance 返回 0 条结果并报 'possibly delisted' 错误；
     生产环境必须实现 provider 自动降级：yfinance 失败时 fallback 到 Alpha Vantage/Polygon；
     同时监控返回 DataFrame 的非空率作为健康指标（来源：GitHub yfinance discussions #2606）"
  - "【社区经验】yfinance Adj Close（复权收盘价）数据不准确：
     Yahoo 将分红与资本利得分配混合计算，导致复权价格存在系统性偏差；
     针对量化回测场景应用 yf.Ticker.history(auto_adjust=True) 并启用 repair=True 触发价格修复；
     关键历史数据需与第二数据源交叉验证（来源：GitHub yfinance #1531, #2070）"
  - "【社区经验】Alpha Vantage 非美股历史数据质量差：
     英国/爱尔兰投资信托等非美股历史数据存在明显错误，且再次下载时数据会被改写；
     对非美股建议改用 Polygon.io 或专门的国际数据源（来源：alpha_vantage GitHub #115）"
  - "【社区经验】Alpha Vantage 免费套餐日限额已从 500 降至 25 次/天（2024 年起）：
     旧代码按 500/day 设计的调度频率会立刻耗尽额度；
     使用前用 /query?function=TIME_SERIES_INTRADAY 测试实际限额；
     批量查询时每次请求间隔不少于 60s/25=2.4 分钟（来源：macroption.com alpha-vantage-api-limits）"
  - "【社区经验】yfinance 在 PythonAnywhere 等共享 IP 环境遭 Yahoo 封禁频率更高：
     共享 IP 的大量请求叠加会触发 IP 级限流；
     建议在独立 VPS 或本地运行，或增加 User-Agent 轮换和随机 sleep(random.uniform(2,8))（来源：PythonAnywhere forums）"
  - "【社区经验】yfinance 在 2025-02-17 Yahoo 后端变更期间整体失效且返回 'possibly delisted'：
     Yahoo Finance 修改鉴权机制后，所有 Ticker 数据返回空 DataFrame；
     务必实现跨 provider 的健康心跳检测（每 15 分钟 ping AAPL），失败时自动切换到备用源（来源：yfinance #2276）"
  - "【社区经验】CoinGecko /coins/markets 接口支持一次查询最多 250 个币种：
     以前逐币种调用 /simple/price 的代码在 250+ 币时触发速率限制；
     改用 /coins/markets?vs_currency=usd&ids=bitcoin,ethereum,...&per_page=250 单次请求（来源：CoinGecko API 文档）"
  - "【社区经验】CoinGecko 免费层速率限制 2024 年实际约为 10-30 req/min（随流量浮动）：
     文档上写 30/min 但高峰期实际更低；必须实现指数退避，不可简单 sleep(2) 重试；
     指数退避起始 1s，最多 64s（来源：CoinGecko docs common-errors-rate-limit）"
  - "【社区经验】CoinGecko total_volume 和 price_change_24h 基于滚动 24 小时计算，非固定日期：
     定时获取同一时间的 24h 变化率时，相邻两次调用结果会因滚动窗口轻微差异而不一致；
     若需计算日间涨跌幅应用 OHLCV 历史接口而非 /simple/price（来源：CoinGecko troubleshooting guide）"
  - "【社区经验】Polygon.io Starter 套餐 upsert 速率随向量维度升高而显著降低：
     128 维时可达 300 updates/s，768 维时仅 50 updates/s；
     批量回填历史数据时必须限速，否则触发 429 并消耗重试配额（来源：Polygon.io 文档）"
  - "【社区经验】yfinance 返回的 DataFrame 列名随版本变化（如 'Adj Close' vs 'Adj. Close'）：
     版本升级后按旧列名访问会报 KeyError；
     访问时用 df.filter(like='Adj').columns[0] 动态获取列名，或在 requirements.txt 中 pin yfinance 版本（来源：yfinance GitHub issues）"
  - "【社区经验】美股节假日/半日交易日期间 yfinance 返回空 DataFrame 但不报错：
     仅做 df.empty 检查不够，还需检查返回行的时间戳是否在预期交易日；
     用 pandas_market_calendars 库获取 NYSE 交易日历进行预验证（来源：slingacademy.com）"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. VAT Validation (https://www.abstractapi.com/vat-validation-rates-api) — 校验 VAT 号码 和 calculate VAT 汇率，认证：`apiKey`
         2. Aletheia (https://aletheiaapi.com/) — Insider 交易 数据, earnings call 分析, 金融 statements, 和 更多，认证：`apiKey`
         3. Alpaca (https://alpaca.markets/docs/api-documentation/api-v2/market-data/alpaca-data-api-v2/) — 实时和历史 市场 数据 关于 全部 美国 equities 和 ETFs，认证：`apiKey`
         4. Alpha Vantage (https://www.alphavantage.co/) — 实时和历史 股票 数据，认证：`apiKey`
         5. apilayer marketstack (https://marketstack.com/) — 实时, 盘中 & 历史 市场 数据 API，认证：`apiKey`
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "Alpha Vantage 返回 {'Note': 'Thank you...'} 被误认为正常数据，导致后续计算 KeyError"
    mitigation: "每次调用后检查 'Note' 或 'Information' key；
      若存在则等待 60s 后重试，最多 3 次；超限记录日志并跳过该 symbol"
  - severity: HIGH
    pattern: "yfinance 在非交易时段（周末/节假日）返回空 DataFrame，导致 iloc[0] IndexError"
    mitigation: "调用后立即检查 df.empty；为空时返回 market_status='closed' 和最后已知收盘价"
  - severity: HIGH
    pattern: "CoinGecko ticker 到 coin_id 映射错误，查询到错误币种价格（如 $BLOCK ≠ blocknet）"
    mitigation: "优先用 /coins/list 接口做精确匹配；映射表本地缓存 24 小时（文件时间戳判断），
      避免每次查询都全量拉取（接口返回 10000+ 条数据）"
  - severity: MEDIUM
    pattern: "汇率换算：港股数据中 yfinance 有时返回 HKD 价格，有时返回 USD，字段不稳定"
    mitigation: "检查 ticker.fast_info.currency 字段，非 USD 时显式获取汇率换算；
      若 currency 为 None，默认以 USD 处理并在日志中警告"
  - severity: MEDIUM
    pattern: "期权/ETF/指数代码格式与普通股票不同，yfinance 解析报错"
    mitigation: "期权代码包含日期和行权价（如 AAPL231215C00150000），不在普通行情接口处理；
      检测到期权代码格式时提示用户使用专用期权接口"
  - severity: LOW
    pattern: "Polygon.io 30 天试用期结束后 API key 失效，静默返回 403 而非明确错误"
    mitigation: "检测 HTTP 403 响应，在告警中提示 'API key expired or invalid'；
      自动降级到 yfinance 并记录降级日志"
  - severity: HIGH
    pattern: "【社区经验】yfinance 整体失效：Yahoo Finance 变更后端导致所有 ticker 返回空或报 delisted 错误"
    mitigation: "部署 provider 健康检查：每小时用已知稳定 ticker（如 AAPL）测试一次；
      连续 3 次失败触发自动降级到备用 provider；
      在 Telegram 告警中推送 'yfinance provider degraded' 通知（来源：yfinance discussions #2606）"
  - severity: MEDIUM
    pattern: "【社区经验】yfinance Adj Close 复权价格系统性偏差导致回测收益率计算错误"
    mitigation: "量化回测必须用 history(auto_adjust=True, repair=True) 参数；
      分红密集股票（REITs/ETF）需与 Tiingo/Quandl 数据交叉验证；
      在 portfolio_summary 输出中标注 'adj_close_accuracy: unverified'（来源：yfinance #2070）"
  - severity: HIGH
    pattern: "【社区经验】Alpha Vantage 免费额度从 500/天降至 25/天后，旧代码按高频调度运行，
      当天额度在几分钟内耗尽，剩余请求全部静默返回 Note 字段"
    mitigation: "在每次 Alpha Vantage 调用前检查本地计数器，超过 25 次/天则停止调用并记录告警；
      考虑升级到付费套餐（$50/mo Standard 层无日限额）（来源：macroption.com）"
  - severity: MEDIUM
    pattern: "【社区经验】CoinGecko 速率限制在高流量时段动态降低至 10 req/min，
      固定 sleep(2) 重试策略无法应对，导致任务被持续阻塞"
    mitigation: "捕获 429 后使用指数退避（起始 2s，最大 64s，最多 5 次）；
      对于超过 50 个币种的批量查询改用 /coins/markets?per_page=250 单请求（来源：CoinGecko docs）"
  - severity: LOW
    pattern: "【社区经验】yfinance DataFrame 列名在 0.2.x 与 0.1.x 间不兼容，
      升级版本后代码报 KeyError 但无明显错误提示"
    mitigation: "在 requirements.txt 中 pin yfinance 版本号；升级时用 df.columns.tolist() 日志检查列名变化；
      用 df.filter(like='Close') 代替硬编码列名访问复权价格（来源：yfinance GitHub）"

