# 知识积木 v2 — 日历与任务管理
# 用途：创建/查询/修改 Google Calendar 事件和任务

# === 信封层（给系统看）===
id: calendar-tasks-v1
name: 日历与任务管理
version: 1.0.0
category:
  - 日历
  - 任务管理
tags:
  - Google Calendar
  - CalDAV
  - 时区
  - RRULE
  - 任务
  - 提醒
  - OAuth2
capability_type: poll
data_source: null

inputs:
  operation:
    type: enum
    required: true
    description: "操作类型：list_events（查询事件）、create_event（创建事件）、
                  update_event（修改事件）、list_tasks（查询任务）、create_task（创建任务）"
    enum_values:
      - list_events
      - create_event
      - update_event
      - list_tasks
      - create_task
  credentials_path:
    type: string
    required: true
    description: "OAuth credentials.json 文件路径，从 Google Cloud Console 下载"
  token_path:
    type: string
    required: false
    default: "~/.doramagic/gcal_token.json"
    description: "OAuth token 缓存文件路径"
  calendar_id:
    type: string
    required: false
    default: "primary"
    description: "日历 ID；'primary' 表示主日历；从 calendar.list 接口获取完整列表"
  time_min:
    type: string
    required: false
    default: ""
    description: "查询时间下界，RFC 3339 格式（如 '2026-03-29T00:00:00Z'）；空则为当前时间"
  time_max:
    type: string
    required: false
    default: ""
    description: "查询时间上界，RFC 3339 格式；空则为 time_min + 7 天"
  event_data:
    type: text
    required: false
    default: ""
    description: "create_event/update_event 时的事件数据，JSON 格式；
                  示例：{\"summary\":\"周会\",\"start\":{\"dateTime\":\"2026-03-29T10:00:00+08:00\"},
                         \"end\":{\"dateTime\":\"2026-03-29T11:00:00+08:00\"}}"
  timezone:
    type: string
    required: false
    default: "UTC"
    description: "用户本地时区，如 'Asia/Shanghai'、'America/New_York'；
                  用于将用户输入的本地时间转换为 UTC 存储"

outputs:
  events:
    type: "list[dict]"
    description: "查询到的事件列表，每项含 id/summary/start/end/location/recurrence 字段"
  tasks:
    type: "list[dict]"
    description: "查询到的任务列表，每项含 id/title/due/status 字段"
  created_id:
    type: "string | null"
    description: "create 操作成功时返回新建事件/任务 ID"
  next_event:
    type: "dict | null"
    description: "距当前时间最近的即将到来事件摘要，用于简报场景"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1
  - daily-briefing-v1

# === 内容层（给 LLM 看）===
core_capability: >
  通过 Google Calendar API（OAuth 2.0）执行日历事件 CRUD 和 Google Tasks 查询/创建，
  正确处理时区转换（UTC 存储 + 本地显示）、全天事件、重复事件展开。

constraints:
  - "Google Calendar API 认证：google-auth + google-api-python-client；
     Scopes：['https://www.googleapis.com/auth/calendar']（读写），
     只读场景用 ['https://www.googleapis.com/auth/calendar.readonly'] 最小权限；
     Tasks API 需额外 Scope：'https://www.googleapis.com/auth/tasks'"
  - "Google Calendar API 免费限制：1,000,000 requests/day，100 requests/100s/user；
     远超常规使用量；付费升级无需操作（默认配额足够），但需在 Google Cloud Console 开启 API"
  - "时区处理（关键）：所有时间必须以 UTC 存储（dateTime 字段含时区偏移）；
     用户输入本地时间时，用 zoneinfo.ZoneInfo(timezone) 转换：
     local_dt = datetime.fromisoformat(user_input).replace(tzinfo=ZoneInfo(timezone))；
     存储时转 UTC：local_dt.astimezone(ZoneInfo('UTC')).isoformat()；
     禁止用 pytz.localize()（已弃用），改用 zoneinfo（Python 3.9+ 内置）"
  - "全天事件：全天事件使用 date 字段（非 dateTime），格式 YYYY-MM-DD；
     区分全天事件的方法：event['start'].get('date') is not None；
     不可对全天事件调用 dateTime 时区转换逻辑"
  - "重复事件（RRULE）：list_events 返回的单次实例含 recurringEventId 字段；
     展开重复事件用 events.list(singleEvents=True, orderBy='startTime')；
     不展开时用 singleEvents=False（返回重复事件的主记录，含 recurrence 字段）"
  - "CalDAV 协议（非 Google 日历替代方案）：使用 caldav 库，
     client = caldav.DAVClient(url, username, password)；
     适用于 Apple Calendar、Nextcloud、Fastmail 等；
     时区处理同 Google API，均以 UTC 为基准"
  - "create_event 必须验证 start < end，start 不在过去 30 天前；
     event_data 必须含 summary、start、end 三个字段，否则返回错误不发起 API 调用"
  - "Calendly API / Cal.com API（付费调度场景）：均提供 REST API，需单独 OAuth；
     本积木不直接集成，通过 operation 扩展点预留"
  - "【社区经验】永远不要硬编码 UTC 偏移量（如 +08:00），因为夏令时（DST）或政治时区变更会使偏移失效；
     2023 年摩洛哥、2025 年智利 Aysén 地区均出现时区规则变更，导致使用硬编码偏移的代码产生 1 小时偏差；
     必须使用 IANA 时区 ID（如 'Asia/Shanghai'）而非 UTC 偏移字符串
     （来源：Google Calendar API 文档，codestudy.net）"
  - "【社区经验】n8n/自动化工具忽略 timeZone 参数的 bug（GitHub issue #14411）：
     部分集成框架在创建事件时会忽略用户指定的 timeZone 字段，强制使用服务器默认时区（如 America/New_York）；
     自建集成时需验证 API 返回的 start.timeZone 与输入一致，不一致则回退到手动 UTC 转换
     （来源：n8n GitHub Issue #14411）"
  - "【社区经验】重复事件 DST 问题：重复事件（RRULE）会根据'创建时'的时区规则展开，
     跨 DST 边界的重复事件实际发生时间会偏移 1 小时；
     Google Calendar 自动处理基于 IANA ID 的 DST，但基于 UTC 偏移创建的重复事件不会自动调整；
     受影响场景：中美欧均有夏令时的定期会议（来源：Pocket Informant, Google Calendar Community）"
  - "【社区经验】list_events 默认不展开重复事件，只返回主记录，导致查询结果看似'缺少'事件：
     events.list() 默认 singleEvents=False，重复事件只返回 1 条主记录而非每个实例；
     查询'某时间段内的事件'必须传 singleEvents=True + orderBy='startTime'；
     不传这两个参数，每周一的定期会议只会出现 1 次而非应有的多次
     （来源：Google Calendar API 官方文档 Recurring Events）"
  - "【社区经验】Google Calendar API list_events 存在分页，默认每页 250 条（最大 2500）：
     不处理 nextPageToken 时只能获取前 250 个事件，日程繁忙的用户会静默丢失事件；
     必须在循环中检查 response.get('nextPageToken') 并用 pageToken 继续请求；
     orderBy 与 lastSyncToken 存在冲突：加了 orderBy 后响应中不含 lastSyncToken
     （来源：Google Calendar API 分页文档，GitHub googleapis/google-api-dotnet-client #610）"
  - "【社区经验】重复事件不可单独修改一个实例后再修改整个序列：
     单独修改重复事件某实例会创建 Exception（例外），exception 会累积使日历变慢；
     之后修改整个序列时，已有 exception 的实例不会被覆盖，与预期不符；
     生产系统应避免大量 'this event only' 修改，改为修改整个系列
     （来源：Google Calendar Community，GitHub OutlookGoogleCalendarSync issue #67）"
  - "【社区经验】Google Calendar API 403 'Request had insufficient authentication scopes'：
     已缓存的 token 不含所需 scope（如升级后新增了 tasks scope），API 报 403；
     解决方案：修改 SCOPES 列表后必须删除 token_path 文件，强制重新走 OAuth 授权流程；
     仅修改代码中的 SCOPES 常量但不清除 token 文件，已有 token 的 scope 不会自动刷新
     （来源：Make Community Google Calendar 403 报告，Google Calendar Community）"
  - "【社区经验】Google Tasks API 和 Google Calendar API 使用不同的 OAuth Scopes：
     Tasks API 需要 'https://www.googleapis.com/auth/tasks'，不在 Calendar scope 内；
     同时使用两者时必须合并 scope 列表：['...calendar', '...tasks']；
     Token 授权后不支持动态追加 scope，追加 scope 必须撤销旧 token 重新授权
     （来源：Google OAuth 2.0 Scopes 文档）"
  - "【社区经验】全天事件（All-day event）的日期格式为 YYYY-MM-DD，时区字段无意义：
     为全天事件设置 timeZone 字段不会改变其在日历中的显示；
     混淆全天事件和时间段事件：全天事件用 date 字段，时间段事件用 dateTime 字段；
     尝试对全天事件做时区转换会导致 AttributeError 或逻辑错误
     （来源：Google Calendar 官方文档 All-Day Events，Google Calendar Community）"
  - "【社区经验】create_event 时 calendar_id='primary' 仅对认证用户有效，服务账号需使用邮箱：
     Service Account 没有 'primary' 日历，必须传具体邮箱（如 'user@example.com'）；
     传 'primary' 时 Service Account 会创建事件到自己的不可见日历，而非目标用户的日历；
     实际部署需通过 Google Workspace Admin 设置域级委托（Domain-Wide Delegation）
     （来源：Google Calendar API Service Account 文档）"
  - "【社区经验】calendar.list() 调用需要额外的 calendar.readonly 或 calendar scope：
     事件操作（events.list）和日历列表操作（calendarList.list）使用不同的 scope；
     仅授权了 calendar.readonly scope 时，calendarList.list 返回的是授权用户有权限的日历，
     但 list 接口本身的 quota 计算单独统计，不与 events.list 共享
     （来源：Google Calendar API 权限文档）"
  - "【社区经验】CalDAV 协议与 Google Calendar 的时区处理差异：
     CalDAV 使用 VTIMEZONE 组件存储时区规则，而 Google Calendar API 使用 IANA ID 字符串；
     通过 CalDAV 创建事件时如果 VTIMEZONE 定义与 Google 数据库不一致，会触发隐式转换；
     建议始终用 TZID=America/New_York 格式，而非内嵌 VTIMEZONE 块
     （来源：caldav 库文档，Python Calendar/CalDAV 社区）"
  - "【社区经验】pytz 已被社区认为是遗留库，Python 3.9+ 应使用内置 zoneinfo：
     pytz 的 localize() 方法与 astimezone() 行为在边界情况下不一致；
     混用 pytz 和 zoneinfo 时间对象会在 datetime 比较时触发 TypeError；
     新代码统一使用 from zoneinfo import ZoneInfo，不再引入 pytz
     （来源：PEP 615，Python 3.9 发布说明）"
  - "【社区经验】update_event 操作应使用 patch 而非 update：
     events.update 需要提供完整事件对象（否则省略字段被重置为 null）；
     events.patch 只需提供要修改的字段（增量更新）；
     常见错误：修改 summary 时调用 update 但忘记传 recurrence 字段，导致重复事件变为单次
     （来源：Google Calendar API 官方文档 events.patch vs events.update）"
  - "【社区经验】events.list 的 updatedMin 参数实现增量同步，但首次使用需获取 syncToken：
     增量同步通过 syncToken（非 nextPageToken）实现；syncToken 在全量同步的最后一页响应中返回；
     直接用 updatedMin=yesterday 而不用 syncToken 会遗漏删除/取消的事件（只能同步新增/修改）；
     正确做法是首次全量同步获取 syncToken，后续用 syncToken 增量同步
     （来源：Google Calendar API 增量同步文档）"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. Public Holidays (https://www.abstractapi.com/holidays-api) — 数据 关于 国家级, regional, 和 religious 节假日 通过 API，认证：`apiKey`
         2. Calendarific (https://calendarific.com/) — 全球 节假日，认证：`apiKey`
         3. Checkiday - National Holiday API (https://apilayer.com/marketplace/checkiday-api) — Industry-leading 节假日 API. 超过 5,000 节假日 和 数千 的 descriptions. Trusted 按 / 通过 World’s leading 公司，认证：`apiKey`
         4. Church Calendar (http://calapi.inadiutorium.cz/) — 天主教礼拜日历，认证：No
         5. Czech Namedays Calendar (https://svatky.adresa.info) — 查询 用于 名称 和 回报 / 返回 nameday date，认证：No
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "用户输入本地时间但未指定时区，datetime.fromisoformat() 解析为 naive datetime，
              存入 Google Calendar 后实际时间偏差"
    mitigation: "若解析出 naive datetime（tzinfo is None），强制附加 timezone 参数的时区；
                 记录警告日志 'assumed timezone: {timezone}'"
  - severity: HIGH
    pattern: "OAuth Scope 不包含 tasks，调用 Google Tasks API 时返回 403 insufficientPermissions"
    mitigation: "在初始化时检查 operation 类型，list_tasks/create_task 时确保 Scopes 包含 tasks；
                 已有 token 的 Scope 不足时需清除 token 文件重新授权"
  - severity: MEDIUM
    pattern: "重复事件 list 时 singleEvents=False，返回的 start.dateTime 是第一次发生时间，
              不是下一次发生时间，导致错误的'即将到来事件'判断"
    mitigation: "查询近期事件时始终用 singleEvents=True + time_min=now，避免重复事件主记录干扰"
  - severity: MEDIUM
    pattern: "全天事件的 start 字段为 date（非 dateTime），代码直接解析为 datetime 时抛 KeyError"
    mitigation: "解析前检查 event['start'].get('dateTime')，为 None 时改读 event['start']['date']
                 并用 date.fromisoformat() 解析"
  - severity: LOW
    pattern: "calendar_id 含 # 或 @ 等特殊字符（如 group email），在 URL 路径中未编码导致 404"
    mitigation: "用 urllib.parse.quote(calendar_id, safe='') 编码后再拼 URL；
                 google-api-python-client 会自动处理，但自行拼 URL 时必须手动编码"
  - severity: HIGH
    pattern: "【社区经验】用户输入台北时间 3 PM 但事件创建为 11 PM（UTC）——原因是 timeZone 字段
              正确传入了但 start.dateTime 使用的是 UTC 格式未带偏移，API 将其解释为 UTC 时间"
    mitigation: "创建事件时 start.dateTime 必须包含时区偏移（如 '2026-03-29T15:00:00+08:00'），
                 或同时传 timeZone='Asia/Taipei'；只传 UTC dateTime 不传 timeZone 会按 UTC 存储
                 （来源：n8n Community 时区问题报告）"
  - severity: MEDIUM
    pattern: "【社区经验】Google Calendar Scope 权限在 token 已存在时升级不生效：
              新增 tasks scope 但 token_path 文件仍是旧 scope 的 token，API 调用返回 403"
    mitigation: "每次修改 scopes 列表后，必须删除 token_path 文件重新授权；
                 在代码中检查 creds.scopes 是否包含所有需要的 scope，不足时强制重新走授权流程
                 （来源：Google Identity 文档）"
  - severity: HIGH
    pattern: "【社区经验】事件列表查询不处理 nextPageToken，只获取前 250 条事件，
              大量事件被静默丢弃，日历内容不完整"
    mitigation: "所有 events.list 调用必须循环处理 nextPageToken：
                 while True: resp=service.events().list(...pageToken=token); token=resp.get('nextPageToken'); if not token: break
                 （来源：Google Calendar API 分页文档）"
  - severity: MEDIUM
    pattern: "【社区经验】重复事件主记录的 start.dateTime 是第一次发生时间，
              不代表'最近一次'或'下一次'，导致错误的即将到来事件判断"
    mitigation: "查询近期事件始终用 singleEvents=True + time_min=now()；
                 不展开重复事件（singleEvents=False）时不可用 start.dateTime 做时间比较
                 （来源：Google Calendar API 文档，社区反馈）"
  - severity: LOW
    pattern: "【社区经验】通过 API 批量创建重复事件的单个实例修改过多，
              导致日历 API 读取性能严重下降（exception 列表累积到数千条）"
    mitigation: "禁止对重复事件做大量 'this event only' 实例修改；
                 如需大量差异化修改，改为创建独立的单次事件而非修改重复事件实例
                 （来源：Google Calendar Community 性能讨论）"

