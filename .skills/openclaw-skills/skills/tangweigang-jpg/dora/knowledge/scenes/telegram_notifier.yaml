# 知识积木 v2 — Telegram 消息通知
# 用途：通过 Telegram Bot API 向指定 chat 发送格式化消息

# === 信封层（给系统看）===
id: telegram-notifier-v1
name: Telegram 消息通知
version: 1.0.0
category:
  - 通知
  - 消息
tags:
  - Telegram
  - Bot
  - 通知
  - python-telegram-bot
  - MarkdownV2
capability_type: notify
data_source: null  # 无外部数据源，仅发送消息

inputs:
  chat_id:
    type: string
    required: true
    description: "目标 chat ID，可以是用户 ID（数字字符串）或频道用户名（@channel_name）"
  bot_token:
    type: string
    required: true
    description: "Telegram Bot Token，格式 '123456789:AABBccdd...'，从 @BotFather 获取"
    validation: "':' in value and len(value) > 10"
  message_template:
    type: text
    required: true
    description: "消息模板，支持 Python str.format() 格式化，如 '{stock_name} 涨幅 {pct:.1f}%'"
  parse_mode:
    type: enum
    required: false
    default: "MarkdownV2"
    description: "消息格式：MarkdownV2（需转义）、HTML（推荐用于含特殊字符消息）、plain"
    enum_values:
      - MarkdownV2
      - HTML
      - plain

outputs:
  success:
    type: boolean
    description: "消息是否成功发送"
  message_id:
    type: "integer | null"
    description: "成功时返回 Telegram 消息 ID，失败时为 null"
  error:
    type: "string | null"
    description: "失败时的错误描述"

requires: []
conflicts_with: []
compatible_with:
  - stock-alert-v1
  - rss-monitor-v1

# === 内容层（给 LLM 看）===
core_capability: >
  使用 python-telegram-bot 库（v20+ 异步版本）向 Telegram chat 发送消息，
  处理消息长度截断、MarkdownV2 特殊字符转义和 rate limit。

constraints:
  - "必须使用 python-telegram-bot>=20.0（异步版）：
     from telegram import Bot; bot = Bot(token=bot_token)；
     调用 await bot.send_message(chat_id=chat_id, text=text, parse_mode=parse_mode)"
  - "消息长度硬限制：Telegram API 单条消息最大 4096 UTF-16 字符（不是字节）；
     超出时必须截断并追加 '...(截断)' 提示，禁止直接发送超长消息（API 会返回 400 Bad Request）"
  - "MarkdownV2 必须转义以下特殊字符（否则 API 返回 Bad Request）：
     _ * [ ] ( ) ~ ` > # + - = | { } . !
     转义方法：re.sub(r'([_*\\[\\]()~`>#+=|{}.!-])', r'\\\\\\1', text)"
  - "HTML parse_mode 下，只需转义 < > & 三个字符（用 html.escape()），
     比 MarkdownV2 安全，推荐用于含动态内容的消息"
  - "Rate limit：Telegram Bot API 全局限制约 30 条/秒，同一 chat 限制 1 条/秒；
     批量发送时必须在每条消息之间 await asyncio.sleep(1)"
  - "bot_token 禁止硬编码：必须从环境变量或密钥管理系统读取，
     如 os.environ['TELEGRAM_BOT_TOKEN']"
  - "异步调用必须在 event loop 中运行：脚本入口用 asyncio.run(main())，
     不可用 asyncio.get_event_loop().run_until_complete()（Python 3.10+ 已弃用）"

common_failures:
  - severity: HIGH
    pattern: "Bot 被用户 block 后调用返回 Forbidden: bot was blocked by the user (403)"
    mitigation: "捕获 telegram.error.Forbidden，标记该 chat_id 为不可达，停止重试；
                 记录日志但不抛异常，避免影响其他 chat 的通知"
  - severity: HIGH
    pattern: "MarkdownV2 消息中含有未转义的特殊字符（常见于股票代码含 . 或 - 时），API 返回 400"
    mitigation: "始终对动态内容调用转义函数，或改用 HTML parse_mode 降低转义复杂度"
  - severity: MEDIUM
    pattern: "消息超过 4096 字符时 API 返回 400 Bad Request，未截断直接发送"
    mitigation: "发送前检查 len(text) <= 4096，超出时截断到 4090 字符并追加 '...(截断)'"
  - severity: MEDIUM
    pattern: "批量通知时触发 RetryAfter 429，未处理 retry_after 字段导致循环失败"
    mitigation: "捕获 telegram.error.RetryAfter，读取 e.retry_after 秒数后 await asyncio.sleep(e.retry_after + 1)"
  - severity: LOW
    pattern: "chat_id 为频道用户名（@xxx）时，机器人未被添加为频道管理员，返回 ChatNotFound"
    mitigation: "捕获 telegram.error.ChatNotFound，在错误消息中提示检查 Bot 是否已加入频道"

# === 元数据 ===
source: manual
freshness_date: "2026-03-29"
quality_score: 88.0
