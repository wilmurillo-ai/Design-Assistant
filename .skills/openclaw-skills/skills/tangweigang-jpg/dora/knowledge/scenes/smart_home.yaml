# 知识积木 v2 — 智能家居控制
# 用途：轮询设备状态、执行自动化规则、场景联动控制

# === 信封层（给系统看）===
id: smart-home-v1
name: 智能家居控制
version: 1.0.0
category:
  - 物联网
  - 智能家居
  - 自动化
tags:
  - Home Assistant
  - MQTT
  - 设备控制
  - 自动化规则
  - 场景控制
  - SmartThings
  - mDNS
  - 状态轮询
capability_type: poll
data_source: webhook

inputs:
  ha_base_url:
    type: string
    required: true
    description: "Home Assistant 实例的本地 URL，如 http://homeassistant.local:8123 或 http://192.168.1.x:8123"
    validation: "value.startswith('http://') or value.startswith('https://')"
  ha_access_token:
    type: string
    required: true
    description: "Home Assistant Long-Lived Access Token，从 HA 用户设置页面生成"
  entity_ids:
    type: text
    required: false
    default: ""
    description: "要查询/控制的实体 ID 列表，逗号分隔，如 'light.living_room,switch.fan'；
                  空字符串则查询所有实体状态"
  action:
    type: enum
    required: false
    default: "get_state"
    description: "操作类型：get_state=查询状态，call_service=调用服务，trigger_scene=触发场景"
    enum_values:
      - get_state
      - call_service
      - trigger_scene
  service_domain:
    type: string
    required: false
    default: ""
    description: "call_service 模式下的服务域，如 light/switch/climate"
  service_name:
    type: string
    required: false
    default: ""
    description: "call_service 模式下的服务名，如 turn_on/turn_off/set_temperature"
  poll_interval_sec:
    type: integer
    required: false
    default: 30
    description: "状态轮询间隔（秒），建议不低于 10 秒以避免 HA 过载"
    validation: "10 <= value <= 3600"

outputs:
  states:
    type: "list[dict]"
    description: "实体状态列表，每项含 entity_id/state/attributes/last_changed 字段"
  triggered:
    type: boolean
    description: "是否有状态变化触发了自动化规则"
  service_result:
    type: "dict"
    description: "call_service 模式下的执行结果，含 success/context_id 字段"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1

# === 内容层（给 LLM 看）===
core_capability: >
  通过 Home Assistant REST API（本地，免费）轮询设备状态，
  支持服务调用（开关控制、温度设定）和场景触发；
  MQTT 作为事件驱动的替代协议，适合低延迟实时响应；
  SmartThings 和 Apple HomeKit 作为云端付费升级选项。

constraints:
  - "Home Assistant REST API 基础 URL：{ha_base_url}/api/；
     所有请求必须携带 Authorization: Bearer {ha_access_token} 头；
     GET /api/states 返回所有实体；GET /api/states/{entity_id} 返回单个实体；
     POST /api/services/{domain}/{service} 调用服务（请求体为 JSON）"
  - "实体 ID 格式规范：{domain}.{object_id}，如 light.living_room；
     domain 为小写字母，object_id 只含小写字母、数字和下划线；
     传入 entity_ids 时必须验证格式，不合法的 ID 跳过并记录警告"
  - "设备发现：局域网内 Home Assistant 实例通过 mDNS 广播 _home-assistant._tcp.local；
     若 ha_base_url 填写的是域名（homeassistant.local），需用 zeroconf 库解析；
     生产环境建议固定 IP + 端口，不依赖 mDNS 动态发现"
  - "MQTT 集成（低延迟替代方案）：使用 paho-mqtt 库（pip install paho-mqtt）；
     订阅 homeassistant/# 主题获取所有实体状态变化；
     消息 QoS 级别建议 1（至少一次），不可用 QoS 0（可能丢失状态变化事件）"
  - "离线回退策略：HA 不可达时（连接超时 < 5 秒），必须返回缓存的最后已知状态，
     并在 states 列表每项的 attributes 中追加 _cached: true 和 _cached_at: ISO 时间戳；
     不可抛异常导致整个自动化流程中断"
  - "服务调用幂等性：turn_on 对已开启的设备调用不会报错（HA 本身幂等）；
     set_temperature 等有参数的服务必须检查设备能力（通过 attributes.supported_features 位掩码）；
     不支持的服务调用不返回错误，HA 静默忽略"
  - "HA 版本升级后集成名称可能静默变更：2026.1/2026.3 已出现多起集成重命名导致自动化规则失效（如
     climate 集成的风扇模式从 'med' 改为 'medium'，BSB-Lan 水加热器 state 从 'on' 改为 'performance'）；
     升级 HA 版本后必须检查所有使用字符串值匹配 state/attribute 的自动化规则"
  - "MQTT Broker 公开暴露风险：生产部署中 Mosquitto/EMQX 不可监听 0.0.0.0 而无认证；
     2025 年统计显示超过 32,000 个 MQTT broker 无密码保护暴露在公网，
     可被利用远程控制门锁/摄像头等安全设备；必须配置 ACL 和客户端证书认证"
  - "断电恢复后设备不自动汇报状态：Zigbee/Z-Wave 设备断电重启后可能不主动发布状态到 MQTT；
     HA 中设备状态卡在断电前的 last known value，直到下次手动操作才更新；
     必须在自动化中增加 homeassistant_start 触发器，断电恢复后主动 call_service 查询设备状态"
  - "付费升级：SmartThings API（https://developer-preview.smartthings.com/）需注册 SmartThings 开发者账号，
     免费层支持 250 设备；Apple HomeKit 无公开 REST API，只能通过 HomeKit Accessory Protocol（HAP）
     或 Home Assistant HomeKit Bridge 集成，不可直接调用"
  - "状态变化检测：轮询时比较当前 state 和 last_changed 字段与上次缓存值；
     仅 state 变化（如 on→off）或 attributes 中关键字段变化（温度、亮度）才触发通知；
     避免因 last_updated（HA 内部心跳）频繁刷新导致误触发"
  - "MQTT retained 消息导致 HA 重启后自动化被意外重新触发：
     当 MQTT 消息 retain=true 时，HA 每次重启或重新订阅主题后都会收到该消息并重新触发自动化；
     对于'状态变化'类触发器（如门锁打开），retained 消息会导致 HA 重启后重复执行关联动作；
     自动化中使用 MQTT 触发器时必须在消息处理逻辑中检查 trigger.payload 是否为 retained"
  - "MQTT 触发器双重触发（double trigger）：
     使用 json_attributes_topic 和 state_topic 指向同一 MQTT 主题时，
     加上 force_update: true 会导致 HA 产生两次 state_changed 事件（一次状态更新+一次属性更新）；
     相关自动化会被触发两次，导致灯光等设备快速开关；
     应为 state_topic 和 json_attributes_topic 使用不同的子主题（如 /state 和 /attributes）"
  - "MQTT 通配符订阅（# 或 home/#）引入不可预期的消息：
     订阅过宽的主题会导致处理到非预期设备的消息，可能触发错误的自动化；
     同时高频设备（温湿度传感器每分钟上报）的消息量会超过客户端处理能力，积压导致延迟；
     必须按设备类型分层订阅（如 home/lights/#，home/sensors/#），不可用单一 # 订阅所有消息"
  - "Z-Wave/Zigbee 设备升级后 entity_id 自动重命名：
     HA Z-Wave JS 更新后设备的 entity_id 可能从 switch.plug_1 变为 switch.smart_plug_model_x_1，
     所有硬编码了旧 entity_id 的自动化、脚本、仪表板将静默失效；
     每次 HA 或 Z-Wave JS/ZHA 集成更新后，必须检查受影响实体并批量更新引用"
  - "battery-powered 设备无法主动汇报状态需要手动唤醒采访（interview）：
     Z-Wave 电池设备在 HA 升级后若显示 'Unknown' 状态，不是设备故障而是未完成 interview；
     必须手动唤醒设备（通常是按一次设备按钮）触发通信，interview 完成后状态才会恢复；
     大批量设备升级后可能需要逐一手动唤醒，耗时数小时"
  - "自动化竞争条件（race condition）：
     自动化被触发但条件检查时设备已切换到下一状态，导致条件与预期不符；
     典型案例：开关快速开关，自动化在 on 事件触发后检查状态时设备已经是 off；
     解决方法：在自动化条件中加入 for: 延迟确认（如 for: '0:00:02' 确保状态持续 2 秒）"
  - "HA 版本升级后 climate 实体的模式值字符串静默变更：
     HA 2026.1/2026.3 已记录多起 climate 集成模式值重命名（advanced_sleep→sleep，
     on→performance 等）；字符串值匹配的自动化（如 state='advanced_sleep'）静默失效且无错误日志；
     升级前必须查看 HA 官方 changelog 中的 Breaking Changes 章节，
     逐条检查受影响的 integration 和属性值"
  - "IoT 设备 VLAN 隔离缺失导致横向移动风险：
     智能家居设备不可与生产办公网络共用同一子网；
     未隔离的 IoT 设备若被攻击者控制，可作为跳板访问同网段的 NAS、工作站等高价值资产；
     推荐将所有 IoT 设备划入独立 VLAN（如 192.168.20.0/24），仅允许 HA 服务器跨 VLAN 通信"
  - "HA Cloud/Nabu Casa 的远程访问在付费订阅失效后所有外部访问立即断开：
     依赖 HA Cloud 进行远程控制的家庭，订阅过期后手机 App 在外网完全无法访问；
     关键告警通知（如漏水传感器）也会因此中断；
     生产级部署必须同时配置本地访问（VPN/Tailscale）作为备份，不可单点依赖云服务"
  - "HA 自动化 'homeassistant_started' 触发器在监控容器/虚拟机快速重启时可能被漏掉：
     若 HA 在启动过程中 MQTT broker 尚未就绪，startup 触发器发送的命令会因无法连接而静默丢失；
     建议改用 availability topic 模式：设备在上线时主动发布 online 状态，
     HA 订阅此 topic 作为触发器而非依赖 homeassistant_started 事件"
  - "mDNS 在多子网/VLAN 环境中无法跨网段解析：
     homeassistant.local 的 mDNS 广播不穿越路由器，VLAN 隔离后客户端无法通过域名发现 HA；
     生产环境必须为 HA 分配固定 IP 并在 DNS 中添加 A 记录，不可依赖 mDNS 动态发现"
  - "time_pattern 触发器精度仅为分钟级，秒级自动化需用 script 延迟替代：
     HA 的 time_pattern 触发器最小粒度为 1 分钟；
     需要在某一分钟的第 N 秒执行动作时，必须先用 time_pattern 触发，
     再在 action 中用 delay: '00:00:N' 延迟，不可期望 time_pattern 提供秒级精度"
  - "input_number/input_boolean 辅助实体在 HA 重启后状态重置为默认值：
     基于辅助实体状态的自动化在 HA 重启后可能因状态被重置而误触发或失效；
     对于持久化状态（如'今日是否已执行早晨唤醒'），必须使用 counter 积木或 recorder 数据库，
     不可依赖辅助实体的运行时状态跨重启持久化"
  - "Zigbee/Z-Wave 弱信号设备不汇报 unavailable 直接静默失联：
     信号弱的 Zigbee 设备不会主动报告 unavailable，只是停止更新状态，
     state 卡在最后一次正常值（如 'on'）；自动化因状态'正常'而继续执行，
     实际设备已无响应；必须监控 last_changed 时间戳，超过预期间隔标记为 suspected_offline"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. 7Timer! (http://www.7timer.info/doc.php?lang=en) — 天气, especially 用于 Astroweather，认证：No
         2. AccuWeather (https://developer.accuweather.com/apis) — 天气 和 预报 数据，认证：`apiKey`
         3. Aemet (https://opendata.aemet.es/centrodedescargas/inicio) — 天气 和 预报 数据 来自 西班牙，认证：`apiKey`
         4. apilayer weatherstack (https://weatherstack.com/) — 实时 & 历史 全球 天气 数据 API，认证：`apiKey`
         5. APIXU (https://www.apixu.com/doc/request.aspx) — 天气，认证：`apiKey`
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "设备离线时 HA 实体 state 值变为 'unavailable' 而非报错，
              调用方未检查此状态直接读取 attributes，导致 KeyError"
    mitigation: "读取 attributes 前检查 state != 'unavailable' and state != 'unknown'；
                 unavailable 状态时跳过该实体并记录日志"
  - severity: HIGH
    pattern: "Long-Lived Token 过期（HA 默认永不过期，但用户手动撤销后返回 401），
              且没有重新认证逻辑，导致所有请求静默失败"
    mitigation: "捕获 401 响应，立即停止轮询并向用户发送 token 已失效告警，不重试"
  - severity: HIGH
    pattern: "固件更新后设备实体 ID 变化（厂商更新导致 object_id 重命名），
              硬编码的 entity_id 失效后 API 返回 404 被静默忽略"
    mitigation: "404 响应时记录 ERROR 级别日志，触发告警；不可将 404 视为正常空响应"
  - severity: MEDIUM
    pattern: "WiFi 断连导致 MQTT broker（Mosquitto）重启，订阅丢失，
              后续状态变化事件全部漏收但客户端无感知"
    mitigation: "使用 paho-mqtt 的 on_disconnect 回调，断连后指数退避重连（初始 5s，最多 300s），
                 重连后必须重新订阅所有主题"
  - severity: MEDIUM
    pattern: "通过 POST /api/services 调用 climate.set_temperature 时，
              temperature 参数单位不匹配（设备用华氏度，HA 配置用摄氏度），
              导致空调被设置到 75°C"
    mitigation: "调用温度相关服务前检查 attributes.unit_of_measurement 字段，
                 必要时做 (F-32)*5/9 转换，并设置合理范围校验（0-35°C）"
  - severity: LOW
    pattern: "poll_interval_sec 设置过短（<10s）时，大型 HA 实例（100+ 设备）的
              GET /api/states 响应时间超过间隔，导致请求堆积"
    mitigation: "实现基于响应时间的自适应间隔：若上次请求耗时 >interval/2，
                 自动将间隔扩大到响应时间的 3 倍"
  - severity: HIGH
    pattern: "HA 自动化升级后触发器静默失效：2026.1.0 版本起部分升级后 automation trigger 不再触发，
              表面上自动化存在且启用，实际上完全不运行，没有错误日志"
    mitigation: "每次 HA 版本升级后，必须手动触发一次关键自动化验证其有效性；
                 在 HA 日志中搜索 'automation' + 'triggered' 确认最近一次触发时间"
  - severity: MEDIUM
    pattern: "云端 MQTT（如 AWS IoT Core）引入额外延迟：消息往返经过云端导致命令执行延迟 500ms+，
              是本地 MQTT broker 的首要性能瓶颈，用户感知明显（如灯光响应迟钝）"
    mitigation: "智能家居核心控制链路必须使用本地 MQTT broker（Mosquitto 部署在局域网内）；
                 云端 MQTT 仅用于远程监控/数据上报，不用于实时控制指令"
  - severity: HIGH
    pattern: "MQTT retained 消息在 HA 重启后触发自动化误动作：
              门锁/安防设备的'已触发'状态 retained 在 broker，HA 重启后重新接收到该消息，
              导致警报重新响起或门锁重新执行上次动作"
    mitigation: "安防/门锁等高风险设备的 MQTT 消息不可设置 retain=true；
                 或在 HA automation 中添加条件检查 trigger.to_state.last_changed 在过去 30 秒内"
  - severity: HIGH
    pattern: "Z-Wave 设备固件或 Z-Wave JS 升级后 entity_id 批量变更，
              数十条自动化规则在更新当晚静默失效，直到用户次日发现设备不响应才察觉"
    mitigation: "HA/Z-Wave JS 更新前：导出当前自动化配置作为备份；
                 更新后立即检查 Developer Tools → States 中各设备 entity_id 是否与配置一致；
                 逐一测试关键自动化（安防、暖通、灯光控制）"
  - severity: MEDIUM
    pattern: "state_topic 和 command_topic 混淆：初学者将 command_topic 配置为 state_topic，
              导致 HA 向设备发送命令时实际上是在订阅一个输出主题，命令不生效且无错误日志"
    mitigation: "在 MQTT 设备配置 YAML 中加注释说明 state_topic（设备→HA）和 command_topic（HA→设备）方向；
                 用 MQTT Explorer 或 mosquitto_sub 工具监听主题，实际验证消息流向"
  - severity: MEDIUM
    pattern: "IoT 设备与生产网络未隔离：智能插座/摄像头与工作电脑处于同一子网，
              IoT 设备被攻击后可扫描内网，访问共享文件夹或攻击 NAS"
    mitigation: "为 IoT 设备划独立 VLAN，防火墙规则限制 IoT VLAN 只能访问互联网和 HA 服务器 IP；
                 不允许 IoT VLAN 内设备主动访问家庭/办公 VLAN 的任何端口"

