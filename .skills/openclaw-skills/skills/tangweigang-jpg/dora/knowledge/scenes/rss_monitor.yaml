# 知识积木 v2 — RSS 订阅监控
# 用途：轮询 RSS/Atom feed，过滤含关键词的新条目，去重后返回

# === 信封层（给系统看）===
id: rss-monitor-v1
name: RSS 订阅监控
version: 1.0.0
category:
  - 信息聚合
  - 监控
tags:
  - RSS
  - Atom
  - 订阅
  - feedparser
  - 关键词过滤
  - 去重
capability_type: poll
data_source: rss

inputs:
  feed_url:
    type: string
    required: true
    description: "RSS/Atom feed 的完整 URL，支持 http 和 https"
    validation: "value.startswith('http://') or value.startswith('https://')"
  keywords:
    type: text
    required: false
    default: ""
    description: "过滤关键词，逗号分隔，如 'AI,GPT,Claude'；空字符串表示返回所有新条目"
  max_items:
    type: integer
    required: false
    default: 10
    description: "单次轮询最多返回条目数，防止首次运行时历史条目爆炸"
    validation: "1 <= value <= 100"

outputs:
  new_items:
    type: "list[dict]"
    description: "新条目列表，每项含 title/link/published/summary 字段"
  item_count:
    type: integer
    description: "本次新条目数量"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1

# === 内容层（给 LLM 看）===
core_capability: >
  使用 feedparser 解析 RSS/Atom feed，通过 entry.id 或 entry.link 去重，
  按关键词过滤后返回新条目列表，支持持久化已见条目 ID 集合。

constraints:
  - "必须使用 feedparser 库（import feedparser），不可用 requests + BeautifulSoup 手动解析，
     feedparser 处理了 200+ 种 RSS 方言和编码问题"
  - "去重逻辑：优先用 entry.get('id') 作为唯一键，其次用 entry.get('link')；
     两者都为空时用 entry.get('title', '') + entry.get('published', '') 拼接哈希；
     已见 ID 集合必须持久化（json 文件或 sqlite），不能只存内存"
  - "编码处理：feedparser 自动处理编码，但若 entry.summary 出现乱码，
     需检查 feed.encoding 字段并显式 encode/decode"
  - "SSL 证书错误处理：部分老旧 feed 证书过期，用 ssl.create_default_context() 设置
     check_hostname=False 时需记录警告日志，不可静默忽略"
  - "关键词匹配应检查 title 和 summary 两个字段，大小写不敏感（用 .lower()）；
     关键词列表为空时返回全部新条目"
  - "max_items 限制应在去重和关键词过滤之后应用，不是之前，避免因历史条目占满而漏报新条目"
  - "feed.bozo == True 表示 feed 格式有瑕疵但仍可解析，应记录警告而非抛异常；
     仅当 entries 为空且 feed.bozo_exception 是网络错误时才视为失败"

common_failures:
  - severity: HIGH
    pattern: "首次运行时无已见 ID 集合，返回 feed 中所有历史条目（可能数百条），触发下游通知轰炸"
    mitigation: "首次运行时将所有现有条目标记为已见（写入持久化存储）但不触发通知，
                 第二次轮询起才正常返回新条目"
  - severity: HIGH
    pattern: "feed URL 返回 301/302 重定向，feedparser 不跟随时解析为空"
    mitigation: "检查 feed.status，若为 301 则更新存储的 feed_url 为重定向后地址"
  - severity: MEDIUM
    pattern: "RSS feed 不标准：缺少 entry.id 字段，用 entry.link 去重时若 link 也缺失则重复推送"
    mitigation: "哈希兜底策略：title + published 拼接后 md5 作为最后手段"
  - severity: MEDIUM
    pattern: "SSL 证书错误导致 feedparser 抛出 URLError，整个 feed 跳过"
    mitigation: "捕获 URLError 后用 ssl.CERT_NONE 重试一次，并在日志中记录 feed_url 和错误"
  - severity: LOW
    pattern: "中文 RSS feed 的 published 字段时区不标准（如 +0800 写成 +08:00），解析出 None"
    mitigation: "published 为 None 时用 updated 字段兜底，两者均无则用当前时间"

# === 元数据 ===
source: manual
freshness_date: "2026-03-29"
quality_score: 78.0
usage_count: 0
evidence_refs:
  - "https://feedparser.readthedocs.io/en/latest/bozo.html"
  - "https://feedparser.readthedocs.io/en/latest/character-encoding.html"
  - "https://github.com/kurtmckee/feedparser/issues/268"
