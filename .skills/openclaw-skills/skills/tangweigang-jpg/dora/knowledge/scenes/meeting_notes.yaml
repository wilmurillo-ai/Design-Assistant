# 知识积木 v2 — 会议纪要自动化
# 用途：将会议音频转录为文本，提取摘要与行动项，推送给指定渠道

# === 信封层（给系统看）===
id: meeting-notes-v1
name: 会议纪要自动化
version: 1.0.0
category:
  - 生产力
  - 音频处理
tags:
  - 会议
  - 转录
  - 摘要
  - 行动项
  - whisper
  - otter.ai
  - assemblyai
  - 说话人分离
capability_type: transform
data_source: filesystem

inputs:
  audio_path:
    type: string
    required: true
    description: "本地音频文件路径，支持格式：WAV/MP3/M4A/OGG/FLAC"
    validation: "audio_path.split('.')[-1].lower() in ['wav', 'mp3', 'm4a', 'ogg', 'flac']"
  provider:
    type: enum
    required: false
    default: "whisper"
    description: "转录服务提供商：whisper=本地开源免费，otter=otter.ai（300 min/mo free），assemblyai=AssemblyAI（$0.37/h），deepgram=Deepgram（$0.25/h）"
    enum_values:
      - whisper
      - otter
      - assemblyai
      - deepgram
  whisper_model:
    type: enum
    required: false
    default: "base"
    description: "Whisper 本地模型大小，仅 provider=whisper 时生效；large 精度高但需 10GB+ RAM"
    enum_values:
      - tiny
      - base
      - small
      - medium
      - large
  language:
    type: string
    required: false
    default: "auto"
    description: "音频语言代码，如 'en'/'zh'/'ja'；'auto' 表示自动检测；多语言混杂场景请设为主要语言"
  diarization:
    type: boolean
    required: false
    default: false
    description: "是否启用说话人分离（diarization）；免费 Whisper 原生不支持，需配合 pyannote.audio；AssemblyAI/Deepgram 原生支持"
  max_file_size_mb:
    type: integer
    required: false
    default: 200
    description: "允许处理的最大文件大小（MB）；AssemblyAI 限制 5GB，Deepgram 限制 2GB，Whisper 本地无限制"
    validation: "1 <= value <= 5120"

outputs:
  transcript:
    type: string
    description: "完整转录文本，带时间戳（格式：[HH:MM:SS] 文本）"
  summary:
    type: string
    description: "会议摘要，不超过 300 字"
  action_items:
    type: string
    description: "行动项列表，格式：'负责人: 事项 (截止日期)'，每行一条"
  speaker_segments:
    type: string
    description: "说话人分段结果（仅 diarization=true 时返回），格式：'Speaker_N [HH:MM:SS-HH:MM:SS]: 文本'"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1

# === 内容层（给 LLM 看）===
core_capability: >
  将会议音频文件转录为结构化文本，通过 LLM 提取摘要和行动项，支持本地 Whisper 免费方案和
  AssemblyAI/Deepgram 云端付费方案，可选说话人分离。

constraints:
  - "Whisper 本地方案：使用 openai-whisper 库（pip install openai-whisper），调用
     whisper.load_model(model_size).transcribe(audio_path, language=lang)；
     模型文件首次下载后缓存于 ~/.cache/whisper/，无需重复下载"
  - "文件大小校验必须在调用 API 前完成：用 os.path.getsize(path) / (1024*1024) 检查；
     超限时抛出 ValueError 而非让 API 返回 413"
  - "AssemblyAI API 调用流程（provider=assemblyai）：
     POST https://api.assemblyai.com/v2/upload 上传文件获取 upload_url，
     POST https://api.assemblyai.com/v2/transcript 提交转录任务，
     轮询 GET https://api.assemblyai.com/v2/transcript/{id} 直到 status=completed；
     轮询间隔建议 3s，最大等待 30 分钟，超时则抛出 TimeoutError"
  - "Deepgram API（provider=deepgram）：使用 deepgram-sdk（pip install deepgram-sdk），
     调用 client.listen.prerecorded.v('1').transcribe_file()；
     说话人分离需在 options 中设置 diarize=True"
  - "otter.ai（provider=otter）：otter.ai 无官方公开 API，仅有非官方逆向接口，
     生产环境不推荐；免费额度为 300 分钟/月，超出需付费"
  - "说话人分离（diarization=True + provider=whisper）：需安装 pyannote.audio（需申请 HuggingFace token），
     先用 pyannote 生成 speaker segments，再用 Whisper 转录各段；
     注意 pyannote 需 GPU 才能实时处理"
  - "行动项提取使用 LLM：将转录文本分段（每段 ≤4000 tokens）后调用 LLMAdapter，
     prompt 中明确要求输出格式为 JSON 数组 [{owner, task, due_date}]；
     合并所有段的结果去重后输出"
  - "音频格式转换：M4A 需先用 ffmpeg 转为 WAV（subprocess.run(['ffmpeg', '-i', input, output])），
     确保系统已安装 ffmpeg；若不可用降级到 pydub"
  - "长会议（>2小时）必须分段处理：Whisper 单次建议不超过 30 分钟音频，
     用 pydub.AudioSegment 按静音点切分，最终合并转录结果"
  - "【社区经验】Whisper 幻觉（Hallucination）问题：Whisper 会凭空生成未说过的内容，
     如自动插入 'Thank you for watching' / 'Subscribe to our channel' 等短语，
     在静音段或噪音段尤为严重；检测方式：对比静音段时间戳是否有文字产出，
     可疑段落标记 confidence_warning=True；医疗/法律场景必须人工复核（来源：influxmd.com）"
  - "【社区经验】pyannote 说话人分离对相似音色说话人效果差：
     三位男性说话人音调相近时，说话人归属接近随机；
     缓解方案：增加 min_speakers/max_speakers 参数约束，
     要求用户提供参考音频（enroll speakers）来提升区分精度（来源：GitHub pyannote-audio #1406）"
  - "【社区经验】AssemblyAI 语言检测混淆相近语言（如捷克语/斯洛伐克语）：
     检测到相似语言时可能将转录文字混合进去；
     解决方案：对已知语言场景显式传 language_code，不依赖自动检测（来源：gladia.io）"
  - "【社区经验】AssemblyAI 422/500 错误需重试而非立即失败：
     上传接口（/v2/upload）返回 422 和转录接口（/v2/transcript）返回 500 均为临时错误；
     必须用指数退避重试（推荐 tenacity 库），不可直接标记任务失败（来源：assemblyai.com blog）"
  - "【社区经验】Whisper hallucination 率约 1%，其中约 40% 含有害内容（种族评论、暴力描述、
     虚构诊疗内容）：1% 看似很低但规模化后问题严峻；医疗转录商业产品已有真实伤害案例；
     OpenAI 2023 年底更新模型已修复大多数静音段幻觉，但建议升级到最新版本并仍保留置信度检测
     （来源：TechCrunch/Fortune 2024-10）"
  - "【社区经验】Whisper 对失语症等言语障碍患者的幻觉率显著高于普通人群：
     语言障碍者的停顿/不流利片段更多，是触发幻觉的高危因素；
     访客障碍辅助/医疗场景必须加倍人工复核，不可依赖自动转录结果（来源：AAAS Science 2024）"
  - "【社区经验】AssemblyAI 复用 upload_url 被新删除逻辑破坏：
     删除一条 transcript 会立即使关联的 upload_url 失效，其他使用同一 url 的任务会报错；
     每条转录任务必须独立上传，不可复用 upload_url（来源：assemblyai.com changelog）"
  - "【社区经验】AssemblyAI 音频时长过短（<160ms）会直接报 error 状态：
     检查上传文件是否为有效音频而非空文件或截断文件；
     提交前用 pydub 或 ffprobe 验证音频时长 >= 1s（来源：assemblyai.com 错误文档）"
  - "【社区经验】WhisperX 强制对齐对含数字的词汇时间戳偏差高达 3 秒：
     '2014.' 或 '£13.60' 等含非字母字符的词无法对齐，在 WhisperX 输出中该词无时间戳；
     对数字密集音频（财务/法律）需单独处理无时间戳词段，不可假设所有词都有时间戳
     （来源：m-bain/whisperX #1298）"
  - "【社区经验】WhisperX v3.3.3+ 版本时间戳准确性退步：
     强制对齐质量低于 v3.3.2，词级时间戳普遍偏松散；
     生产环境固定到已知稳定版本（如 v3.1.x），并在 requirements.txt 中 pin 版本号
     （来源：m-bain/whisperX #1220）"
  - "【社区经验】pyannote 3.0 依赖 onnxruntime 导致部署困难：
     3.0 版本的 onnxruntime 依赖在多平台存在兼容问题；3.1 版本已移除该依赖；
     生产部署应使用 pyannote.audio >= 3.1（来源：HuggingFace pyannote/speaker-diarization-3.1）"
  - "【社区经验】Deepgram diarization + 标点同时启用时跨说话人句子标点混乱：
     无先做说话人分离再做标点处理时，跨话转换处易出现中句断点或标点丢失，降低准确率至 60-70%；
     使用 smart_format=True 参数让 Deepgram 同步处理 diarization、标点和 ITN（来源：Deepgram 文档）"
  - "【社区经验】Deepgram 流式模式断连后需指数退避重连并重放 buffer：
     断连后不重放缓冲区的未确认音频会导致转录丢段；
     维护 rolling buffer（建议 5-10 秒），重连成功后先重放 buffer 再继续推流（来源：Deepgram 文档）"
  - "【社区经验】Deepgram embedding 对口音/方言/年龄差异大的说话人聚类失效：
     训练数据不覆盖某类音色时，多个说话人被错误合并为一个标签，或同一说话人被拆成多个标签；
     对 out-of-distribution 音频必须配合人工校正（来源：Deepgram 2025 白皮书）"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. An API of Ice And Fire (https://anapioficeandfire.com/) — 游戏 的 Thrones API，认证：No
         2. Bob's Burgers (https://bobs-burgers-api-ui.herokuapp.com) — Bob's Burgers API，认证：No
         3. Breaking Bad (https://breakingbadapi.com/documentation) — Breaking Bad API，认证：No
         4. Breaking Bad Quotes (https://github.com/shevabam/breaking-bad-quotes) — Some Breaking Bad 报价，认证：No
         5. Catalogopolis (https://api.catalogopolis.xyz/docs/) — Doctor Who API，认证：No
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "背景噪音导致转录错误率超过 30%，尤其是餐厅/咖啡厅环境录音"
    mitigation: "转录前用 noisereduce 库降噪（noisereduce.reduce_noise(y=audio, sr=rate)）；
      或提示用户使用近场麦克风；无法降噪时在输出中标记置信度警告"
  - severity: HIGH
    pattern: "多语言混杂（如中英夹杂）时 Whisper 自动检测语言失败，整段翻译为单一语言"
    mitigation: "language 参数设为主要语言而非 auto；在输出摘要前注明语言混杂问题；
      AssemblyAI 的 language_detection 选项处理混杂语言更准确"
  - severity: HIGH
    pattern: "AssemblyAI 轮询超时：长音频（>1小时）处理时间超过 30 分钟"
    mitigation: "最大等待时间调整为 60 分钟，轮询间隔 10s 而非 3s；
      记录任务 ID 到本地文件，支持断点续查"
  - severity: MEDIUM
    pattern: "Whisper large 模型在 8GB RAM 机器上 OOM 崩溃"
    mitigation: "内存不足时自动降级到 medium/small 模型；
      检测方式：import psutil; psutil.virtual_memory().available"
  - severity: MEDIUM
    pattern: "文件名含非 ASCII 字符（中文路径）时 ffmpeg 命令失败"
    mitigation: "所有临时文件写入 tempfile.mkdtemp() 下的 ASCII 路径，
      原始文件先 shutil.copy 到临时路径再处理"
  - severity: LOW
    pattern: "说话人分离将背景音乐/噪音识别为独立说话人"
    mitigation: "设置最小说话人段时长（≥5s），过滤短于阈值的伪说话人段"
  - severity: HIGH
    pattern: "【社区经验】Whisper 在低 SNR 录音（咖啡厅/多人重叠说话）中触发幻觉：
      静音或噪音段被填充为莫名文字，甚至出现种族歧视/暴力内容，已有医疗领域案例"
    mitigation: "转录后对每段文字与对应音频时间戳做 confidence 评分检验；
      在输出 summary 前标注警告 'hallucination_risk: high'；
      高风险场景（医疗/法律/财务）必须人工审核原始转录文本（来源：influxmd.com/blog）"
  - severity: MEDIUM
    pattern: "【社区经验】pyannote + Whisper 时间戳对齐问题：
      pyannote 的精确 diarization 时间戳与 Whisper 输出时间戳在重叠说话片段存在偏移"
    mitigation: "使用 WhisperX 替代原版 Whisper，其使用 forced alignment 对齐词级时间戳；
      或使用 fuzzy 匹配将 Whisper 段落分配给 pyannote speaker segments（容差 ±0.5s）"
  - severity: HIGH
    pattern: "【社区经验】Whisper 幻觉内容含有害信息（种族/暴力）且无任何警告标记，
      约 40% 的幻觉条目属于有害内容，已在医疗/法律领域造成真实伤害"
    mitigation: "对高风险场景（医疗/法律/教育）增加内容安全过滤层，将转录文本过滤已知有害模式；
      输出报告中标注 'auto_transcription: unverified'，强制人工审核工作流（来源：TechCrunch 2024-10）"
  - severity: MEDIUM
    pattern: "【社区经验】AssemblyAI 复用 upload_url 后因 transcript 删除导致后续任务失败，
      错误报文不直接提示 url 失效原因，排查困难"
    mitigation: "每次转录任务单独上传文件获取新的 upload_url；
      在任务元数据中记录 transcript_id 和 upload_url 的一对一映射关系，方便追溯（来源：assemblyai changelog）"
  - severity: MEDIUM
    pattern: "【社区经验】Deepgram embedding 对相似音色说话人聚类失效，同一说话人被拆为多个 Speaker 标签"
    mitigation: "提交转录时设置 diarize=True 并指定 min_speakers/max_speakers；
      后处理阶段可用 agglomerative clustering 合并余弦相似度 > 0.9 的 speaker embedding（来源：Deepgram 文档）"

