resources:
  packages:
  - name: pandas
    version_pin: ==1.5.3
  - name: numpy
    version_pin: ==1.24.4
  - name: matplotlib
    version_pin: '>=2'
  - name: requests
    version_pin: ==2.31.0
  - name: scipy
    version_pin: '>=1.3.0'
  - name: scikit-learn
    version_pin: '>1.4.2'
  - name: pytest
    version_pin: '>=8.3'
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-002
    when: When writing DataRequirements.merge() implementation
    action: Union each boolean flags and select the longest price_period
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect merge logic causes missing data for some screeners. The union of needs (OR operation for booleans)
      ensures every screener receives data it requires, while the longest period accommodates all indicator lookbacks.
    stage_ids:
    - data_collection
  - id: finance-C-006
    when: When implementing data fetching with yfinance
    action: Enforce yfinance rate limit of 1 request per second
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Exceeding the yfinance rate limit causes API errors and data fetch failures. The self-imposed 1 req/sec limit
      (settings.yfinance_rate_limit) prevents triggering provider-side throttling that could affect all users.
    stage_ids:
    - data_collection
  - id: finance-C-021
    when: When validating screener result scores
    action: enforce score values are in the 0-100 range via post-init validation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Scores outside 0-100 would cause incorrect composite calculations and corrupt rating thresholds, producing
      invalid stock recommendations
    stage_ids:
    - screening_execution
  - id: finance-C-023
    when: When combining individual screener scores into composite
    action: return 0.0 composite score when no screener outputs are provided
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Empty screener list would cause division-by-zero or None returns, breaking downstream rating calculations
      and causing scan failures
    stage_ids:
    - screening_execution
  - id: finance-C-024
    when: When calculating weighted average composite scores
    action: guard against total_weight of zero to prevent division-by-zero errors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: All-zero weights would cause ZeroDivisionError, crashing the scan process and preventing stock screening
      results
    stage_ids:
    - screening_execution
  - id: finance-C-042
    when: When implementing a pattern detector subclass
    action: Define a name class attribute using snake_case convention
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Detector initialization fails with TypeError, preventing pattern detection from executing
    stage_ids:
    - pattern_detection
  - id: finance-C-043
    when: When validating pattern candidate scores
    action: Verify each score values are within [0, 100] range
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid scores cause ValueError at validation boundary, breaking the scanner pipeline
    stage_ids:
    - pattern_detection
  - id: finance-C-044
    when: When validating pattern confidence values
    action: Verify confidence values are within [0, 1] range
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Out-of-range confidence causes ValueError, preventing pattern candidate from being accepted
    stage_ids:
    - pattern_detection
  - id: finance-C-045
    when: When normalizing OHLCV input data
    action: Verify each required columns (Open, High, Low, Close, Volume) are present
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required columns causes normalization failure, preventing pattern detection from running
    stage_ids:
    - pattern_detection
  - id: finance-C-046
    when: When processing OHLCV dataframes
    action: Verify DataFrame index is a DatetimeIndex
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-DatetimeIndex causes ValueError in technical indicators, breaking all readiness calculations
    stage_ids:
    - pattern_detection
  - id: finance-C-047
    when: When computing technical indicators
    action: Verify ATR period parameter is >= 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid ATR period causes ValueError, breaking all volatility-based readiness calculations
    stage_ids:
    - pattern_detection
  - id: finance-C-048
    when: When computing Bollinger Bands
    action: Verify window parameter is >= 2 and stddev is > 0
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid Bollinger parameters cause ValueError, breaking volatility squeeze detection
    stage_ids:
    - pattern_detection
  - id: finance-C-050
    when: When invoking pattern detectors
    action: Use detect_safe() instead of detect() directly
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Direct detect() calls bypass exception guards, causing unhandled exceptions to crash the scanner
    stage_ids:
    - pattern_detection
  - id: finance-C-072
    when: When creating ScreenerOutputDomain or ScanResultItemDomain with a score outside 0-100
    action: Accept scores outside 0-100 range
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Invalid scores outside 0-100 would corrupt ranking and rating logic, causing unpredictable screening results
      that violate the fundamental score contract
    stage_ids:
    - scoring_rating
  - id: finance-C-073
    when: When calculating composite score from screener outputs
    action: Return values strictly within 0-100 range
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Composite scores outside 0-100 would cause threshold mapping to fail, resulting in incorrect Strong Buy/Buy/Watch/Pass
      ratings that mislead investors
    stage_ids:
    - scoring_rating
  - id: finance-C-074
    when: When mapping composite score to rating category
    action: 'Apply correct threshold boundaries: Strong Buy >= 80, Buy >= 70, Watch >= 60, Pass < 60'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect threshold mapping would assign wrong rating categories, causing investors to receive misleading
      Strong Buy/Buy/Watch/Pass signals
    stage_ids:
    - scoring_rating
  - id: finance-C-075
    when: When evaluating data completeness for quality policy
    action: Force PASS rating for completeness < 30 and downgrade one tier for completeness in [30, 60)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incomplete data with low completeness scores would produce misleading high ratings, causing investors to
      act on unreliable screening signals
    stage_ids:
    - scoring_rating
  - id: finance-C-076
    when: When handling zero screeners passing
    action: Return PASS rating regardless of composite score
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: A high composite score from zero passing screeners would give false confidence, violating the fundamental
      pass-rate contract
    stage_ids:
    - scoring_rating
  - id: finance-C-084
    when: When claiming real-time or live trading capability based on screening scores
    action: Claim that backtest screening results guarantee live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtested screening ratings as proof of real execution would mislead investors about actual trading
      performance
    stage_ids:
    - scoring_rating
  - id: finance-C-090
    when: When implementing feature run state transitions
    action: Follow the explicit state machine transitions defined in _VALID_TRANSITIONS mapping
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid state transitions will cause InvalidTransitionError exceptions and corrupt feature run lifecycle,
      preventing proper publish/quarantine workflow
    stage_ids:
    - persistence
  - id: finance-C-091
    when: When implementing atomic publishing for feature runs
    action: Update both feature run status and FeatureRunPointer in the same database transaction flush
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without atomic publish, readers may see partial data or inconsistent latest_published pointer, exposing users
      to stale or mixed data views from different feature runs
    stage_ids:
    - persistence
  - id: finance-C-097
    when: When implementing feature run repository
    action: Bypass the state machine validation via validate_transition() for any status change
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Skipping state machine validation allows invalid transitions like RUNNING→PUBLISHED directly, corrupting
      feature run lifecycle and breaking publish policy
    stage_ids:
    - persistence
  - id: finance-C-098
    when: When evaluating publish readiness
    action: Block publishing only for CRITICAL DQ failures; allow publishing with WARNING failures
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Blocking on WARNING failures prevents valid runs from publishing; allowing CRITICAL failures publishes corrupted
      feature data to users
    stage_ids:
    - persistence
  - id: finance-C-124
    when: When deserializing cached DataFrames from Redis
    action: use pickle.loads() instead of json.loads() for DataFrame deserialization
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: DataFrame objects cannot be serialized to JSON; using json.loads() will raise TypeError and cause cache misses
      for valid cached data, leading to unnecessary API calls and increased latency
    stage_ids:
    - cache_infrastructure
  - id: finance-C-128
    when: When acquiring distributed lock for cache miss handling
    action: use Redis SET with NX and EX flags for atomic lock acquisition
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-atomic lock acquisition allows multiple workers to simultaneously fetch the same symbol, causing duplicate
      API calls, rate limit exhaustion, and potential data inconsistency
    stage_ids:
    - cache_infrastructure
  - id: finance-C-136
    when: When routing benchmark requests for different markets
    action: resolve market code to correct benchmark symbol using BenchmarkRegistryService
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect benchmark routing causes wrong market comparison data (e.g., using SPY for HK market), producing
      invalid relative strength calculations
    stage_ids:
    - cache_infrastructure
  - id: finance-C-147
    when: When validating market routing configuration
    action: skip testing unsupported market codes by assuming US-only deployment
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: HK/JP/TW markets require different benchmarks; assuming US-only causes incorrect benchmark routing and invalid
      market comparisons
    stage_ids:
    - cache_infrastructure
  - id: finance-C-148
    when: When constructing PatternDetectorInput from StockData
    action: Use shift(1) for previous close calculations to prevent look-ahead bias; price sequences must be ordered oldest
      to newest
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backtest signals exhibit look-ahead bias when current bar prices are used in calculations, causing live trading
      returns to fall below backtested results
  - id: finance-C-149
    when: When persisting orchestrator results to database
    action: Convert numpy/pandas types to native Python using convert_numpy_types() before JSON serialization
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Scan result details column fails JSON serialization when numpy types are passed directly, causing scan execution
      to crash and results to be lost
  - id: finance-C-151
    when: When fetching data for screening execution
    action: Verify StockData.price_data DataFrame contains Open, High, Low, Close, Volume columns with datetime index
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Pattern detectors crash with KeyError when expected OHLCV columns are missing, causing scan to fail for all
      stocks
  - id: finance-C-163
    when: When presenting scan results to users
    action: Present simulated scan results as historical analysis only; never claim they represent real-time trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users may mistakenly believe backtested results guarantee future returns, leading to financial losses from
      overconfident trading decisions
  - id: finance-C-166
    when: When implementing a screener that produces a score
    action: Verify the score is between 0 and 100 inclusive — fail-fast with ValueError on invalid scores to prevent garbage
      data propagation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid scores (negative or exceeding 100) propagate through the entire scan pipeline, corrupting composite
      scores, ranking results, and exported CSV data with nonsensical values
  - id: finance-C-170
    when: When connecting to the application database
    action: Use PostgreSQL as the sole database backend — reject any other database backend with ValueError at startup
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Using SQLite or another database causes startup failure with an opaque error, as the ORM models, migrations,
      and connection pool configuration are PostgreSQL-specific
  - id: finance-C-171
    when: When implementing a new stock screening strategy
    action: Extend BaseStockScreener ABC and implement each abstract methods (screener_name, get_data_requirements, scan_stock,
      calculate_rating) — register via @register_screener decorator
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Screener implementations that skip abstract method implementations cause runtime AttributeError crashes when
      the ScanOrchestrator attempts to execute the screening
  - id: finance-C-179
    when: When adding new API endpoint paths in the frontend
    action: Include the /api prefix in API paths — the axios client already prepends baseURL='/api', causing double-prefix
      in Docker (/api/api/v1/...)
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: API calls return 404 errors in Docker deployment because nginx proxies /api/* to backend, and paths with
      /api prefix get doubled — breaking all affected frontend features
  - id: finance-C-180
    when: When implementing or routing API endpoint paths in the backend
    action: Prefix each API routes with /v1/ to maintain versioning contract — frontend API client expects /api/v1/* paths
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Routes without /v1/ prefix are unreachable from the frontend, causing silent failures in all affected API
      calls
  - id: finance-C-189
    when: When implementing financial calculations involving monetary values, score thresholds, rating boundaries, or calibration
      values
    action: Use Decimal type for each financial precision-critical calculations including monetary values, score thresholds
      (>=70), rating boundaries (85/70/60), and calibration values (+0.01 bias, 0.78 cap) — must not use float for any financial
      arithmetic
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Floating-point representation cannot exactly represent decimal values, causing silent rounding errors that
      accumulate through repeated calculations; a stock scoring 69.999999 due to floating-point error would incorrectly fail
      the >=70 threshold despite being mathematically correct at 70.0, creating silent misclassification across rating boundaries
    derived_from_bd_id: BD-116
  - id: finance-C-190
    when: When implementing iterative computations including PCA, regression, clustering, or any sklearn operations used in
      theme correlation and feature computation
    action: Set explicit convergence criteria parameters (n_iter, tol) for each iterative sklearn operations including hierarchical
      clustering (BD-079) and correlation calculations (BD-078) instead of relying on implicit defaults
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Implicit convergence defaults in sklearn operations cause non-deterministic behavior where identical data
      on different hardware or sklearn versions produces slightly different clustering and PCA results, breaking signal reproducibility
      guarantees required for backtesting reliability
    derived_from_bd_id: BD-117
  - id: finance-C-191
    when: When implementing any stochastic operations in pattern detection, scoring, or theme correlation pipelines
    action: Assume ML operations produce deterministic results without explicit random seed management — the codebase has
      no centralized random seed control, and any stochastic elements (dropout, random initialization, sampling) would produce
      non-reproducible results
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Without reproducible random seeds, backtest results become non-deterministic; repeated runs produce different
      equity curves, making strategy validation unreliable and violating reproducibility requirements for quantitative trading
      systems
    derived_from_bd_id: BD-118
  - id: finance-C-192
    when: When adding any stochastic operations to pattern detection, scoring, or theme correlation components
    action: Implement centralized random seed management via a dedicated seed utility module that initializes seeds for each
      stochastic components (numpy.random, random, torch, tensorflow) before execution, ensuring each randomness sources are
      explicitly controlled
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Failing to implement centralized seed control means each stochastic component may use different implicit
      seeds, making reproducibility impossible and backtest validation unreliable for live trading decisions
    derived_from_bd_id: BD-118
  - id: finance-C-256
    when: When implementing debug or diagnostic features that capture HTML artifacts
    action: Require explicit opt-in configuration for raw HTML capture and prevent automatic inclusion of DOM content that
      may contain auth tokens or personal information
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without explicit opt-in, sensitive credentials embedded in DOM elements get archived in debug artifacts,
      creating security vulnerabilities and potential GDPR violations
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-308
    when: When configuring the Docker or development deployment environment
    action: Use PostgreSQL as the database with DATABASE_URL pointing to the intended instance
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: SQLite does not safely support concurrent writes; with multiple Celery workers in Docker it leads to database
      lock errors, corruption, and scan result loss
  - id: finance-C-323
    when: When presenting market data or recommendations without checking the freshness block
    action: Claim data is live or recent without a supporting freshness block from the MCP tool
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: User acts on stale or fabricated market state, leading to wrong investment decisions based on incorrectly
      timestamped data
  - id: finance-C-326
    when: When building an analysis or recommendation from market data
    action: Substitute MCP tool facts with personal or generic market opinions unsupported by the tool output
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Analysis makes claims not traceable to any tool output, mixing unsupported opinion with factual tool data,
      leading to misleading or fabricated market conclusions
  regular:
  - id: finance-C-001
    when: When implementing bulk scan data fetching logic
    action: Deduplicate symbols before cache lookups and API calls
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate API calls for the same symbol waste rate limit quota and increase scan latency. The bulk path must
      use unique canonical symbols (backend/app/scanners/data_preparation.py:464) to prevent redundant yfinance fetches.
    stage_ids:
    - data_collection
  - id: finance-C-003
    when: When implementing stock data fetching without caching
    action: Check cache first before making external API calls
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing the cache layer triggers redundant yfinance API calls, exhausting the 1 req/sec rate limit and
      causing scan failures. The cache-first pattern ensures efficient use of rate limits while providing fast data retrieval
      on cache hits.
    stage_ids:
    - data_collection
  - id: finance-C-004
    when: When configuring cache TTL for benchmark data
    action: Set benchmark cache TTL to 24 hours maximum
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Benchmark data with TTL exceeding 24 hours may contain stale price bars during market hours. The 24h TTL
      ensures benchmark data is refreshed after market close, preventing incorrect relative strength calculations from intraday
      stale data.
    stage_ids:
    - data_collection
  - id: finance-C-005
    when: When configuring cache TTL for price data
    action: Set price cache TTL to 7 days minimum to survive weekends and holidays
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Price cache with shorter TTL causes data gaps over weekends and market holidays. The 7-day TTL (604800 seconds)
      ensures cached price data survives all market closures including long weekends and exchange holidays.
    stage_ids:
    - data_collection
  - id: finance-C-007
    when: When configuring default price period for screeners
    action: Use 2-year price period as default for 200-day MA calculations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using a shorter price period than 2 years causes insufficient data for 200-day moving average and Minervini
      template checks. The default '2y' period provides approximately 504 trading days, enough for 200-day MA calculations
      plus Minervini uptrend verification.
    stage_ids:
    - data_collection
  - id: finance-C-008
    when: When implementing benchmark data fetching for bulk scans
    action: Fetch benchmark data once per market and share across each symbols in that market
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Fetching benchmark data for each symbol individually causes N redundant API calls. The market-level benchmark
      fetch pattern (benchmark_bundle_by_market) ensures benchmark data is fetched once and reused, reducing API calls and
      improving scan performance.
    stage_ids:
    - data_collection
  - id: finance-C-009
    when: When configuring cache TTL for fundamentals data
    action: Set fundamentals cache TTL to 7 days (weekly refresh is sufficient)
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Fundamental data refreshed more frequently wastes API calls since fundamentals change slowly. The 7-day TTL
      balances data freshness with API efficiency, as quarterly earnings and balance sheet data don't change intraday.
    stage_ids:
    - data_collection
  - id: finance-C-010
    when: When configuring cache TTL for quarterly data
    action: Set quarterly data cache TTL to 30 days minimum
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Quarterly data cache with shorter TTL wastes API calls since earnings data is released quarterly. The 30-day
      TTL accommodates the typical 4-6 week gap between quarter end and earnings release, preventing unnecessary refreshes.
    stage_ids:
    - data_collection
  - id: finance-C-011
    when: When implementing stock data validation
    action: Reject price data with fewer than 100 trading days for screening
    severity: high
    kind: domain_rule
    modality: must
    consequence: Screening with insufficient price history produces unreliable scores. Stocks with fewer than 100 days of
      data cannot reliably calculate 50-day or 200-day moving averages, causing incorrect Minervini and CANSLIM signals.
    stage_ids:
    - data_collection
  - id: finance-C-012
    when: When documenting data collection capabilities
    action: Claim real-time data delivery when using yfinance polling
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: yfinance provides delayed market data (typically 15-20 minutes for US stocks), not real-time streaming. Claiming
      real-time support misleads users and causes incorrect trading decisions based on stale price information.
    stage_ids:
    - data_collection
  - id: finance-C-013
    when: When handling data fetch errors in bulk operations
    action: Continue processing remaining symbols when individual fetches fail
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Failing the entire bulk scan on a single symbol error causes complete scan failure. The allow_partial flag
      pattern (backend/app/scanners/data_preparation.py:434) ensures partial results are returned with fetch_errors metadata
      for fault tolerance.
    stage_ids:
    - data_collection
  - id: finance-C-014
    when: When implementing cache fallback logic
    action: Follow Redis → Database → Live API fallback hierarchy
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing cache layers forces direct API calls, exhausting rate limits and causing data fetch failures. The
      three-tier fallback ensures fastest data retrieval via Redis, database persistence for durability, and live API as last
      resort.
    stage_ids:
    - data_collection
  - id: finance-C-015
    when: When implementing screener data requirements
    action: Use the longest price period when any screener needs extended history
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Volume Breakthrough Scanner requires 5 years of history for 5-year volume high checks (backend/app/scanners/volume_breakthrough_scanner.py:95).
      Using a shorter period causes incorrect volume percentile calculations and false positive signals.
    stage_ids:
    - data_collection
  - id: finance-C-016
    when: When validating data completeness for screening
    action: Track fetch_errors for each data component and expose via get_error_summary()
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Silent data fetch failures cause screening results to be based on incomplete data without operator awareness.
      The fetch_errors dict and get_error_summary() method ensure operators can diagnose which data components failed and
      take corrective action.
    stage_ids:
    - data_collection
  - id: finance-C-017
    when: When implementing data collection for multi-market scans
    action: Normalize None market to 'US' for consistent benchmark resolution
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Symbols with None market resolve to different benchmark buckets than 'US' symbols, causing inconsistent relative
      strength calculations in mixed-market scans. Normalizing None to 'US' ensures all US stocks share the same benchmark
      for RS ranking.
    stage_ids:
    - data_collection
  - id: finance-C-018
    when: When configuring data fetch lock timeout
    action: Set lock timeout to 2 hours maximum to prevent indefinite blocking
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Data fetch locks without timeout can block cache refresh indefinitely if the holding worker crashes. The
      2-hour maximum lock expiry (data_fetch_lock_timeout=7200) ensures locks are released even if holding process fails,
      preventing scan deadlocks.
    stage_ids:
    - data_collection
  - id: finance-C-019
    when: When using Redis bulk pipeline operations
    action: Chunk bulk operations to 500 symbols maximum per pipeline
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Large Redis pipelines without chunking cause memory pressure and timeout failures. The redis_pipeline_chunk_size=500
      setting (settings.py:212) balances throughput with connection stability for large universe scans.
    stage_ids:
    - data_collection
  - id: finance-C-020
    when: When handling screener score validation
    action: Enforce score range of 0 to 100 in ScreenerResult.__post_init__()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid scores outside 0-100 range cause rating calculation errors and API response validation failures.
      The __post_init__ check with ValueError ensures only valid scores pass through the screening pipeline.
    stage_ids:
    - data_collection
  - id: finance-C-022
    when: When executing multiple screeners on the same stock
    action: use pre-fetched shared data to avoid redundant rate-limited API calls
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Each screener fetching its own data would multiply API calls by number of screeners, exhausting rate limits
      and causing scan failures
    stage_ids:
    - screening_execution
  - id: finance-C-025
    when: When determining composite scoring method
    action: default to weighted_average when an unknown composite_method string is provided
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Invalid method strings would raise ValueError, preventing scans from completing and leaving users without
      screening results
    stage_ids:
    - screening_execution
  - id: finance-C-026
    when: When validating stock data sufficiency
    action: require at least 100 days of price data for basic screening operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Insufficient data would produce unreliable technical indicators and incorrect screening scores, leading to
      poor investment decisions
    stage_ids:
    - screening_execution
  - id: finance-C-027
    when: When screening with technical scanners requiring extended history
    action: require at least 240 days of price data for Minervini, CANSLIM, and VolumeBreakthrough screeners
    severity: high
    kind: domain_rule
    modality: must
    consequence: Short price history would cause 200-day moving average calculations to fail, producing invalid stage analysis
      and RS ratings
    stage_ids:
    - screening_execution
  - id: finance-C-028
    when: When applying quality-aware fallback policy
    action: force rating to PASS when field_completeness_score is below 30
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stocks with <30% data completeness would produce misleadingly high scores, competing unfairly with fuller
      data stocks
    stage_ids:
    - screening_execution
  - id: finance-C-029
    when: When applying quality-aware fallback policy
    action: downgrade rating by one tier when field_completeness_score is between 30 and 60
    severity: high
    kind: domain_rule
    modality: must
    consequence: Partial data stocks would score at par with complete data stocks, reducing signal quality and misleading
      investors
    stage_ids:
    - screening_execution
  - id: finance-C-030
    when: When handling missing completeness scores
    action: pass through ratings unchanged when field_completeness_score is None
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unknown completeness data would incorrectly trigger quality downgrades, regressing results for legacy data
      from before T2 migration
    stage_ids:
    - screening_execution
  - id: finance-C-031
    when: When running multiple screeners in parallel
    action: limit ThreadPoolExecutor to max_workers=5 to match typical screener count
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Excessive concurrent workers would cause resource exhaustion, API rate limit violations, and degraded scan
      performance
    stage_ids:
    - screening_execution
  - id: finance-C-032
    when: When handling screener execution errors
    action: return partial results for successful screeners when some screeners fail
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Single screener failure would prevent entire scan from completing, blocking user access to valid results
      from working screeners
    stage_ids:
    - screening_execution
  - id: finance-C-033
    when: When fetching data for multiple screeners
    action: merge data requirements using the longest price_period from each screeners
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using shorter price period would truncate required historical data, causing incorrect calculations in screeners
      expecting longer history
    stage_ids:
    - screening_execution
  - id: finance-C-034
    when: When returning screening results
    action: include both composite_score and individual screener scores in the output
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing individual scores would prevent users from understanding which screeners passed/failed, reducing
      diagnostic capability
    stage_ids:
    - screening_execution
  - id: finance-C-035
    when: When a screener is disabled via settings
    action: silently filter out disabled screeners without per-symbol warnings
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Warning per symbol in bulk scans would generate excessive log noise, obscuring meaningful diagnostic messages
    stage_ids:
    - screening_execution
  - id: finance-C-036
    when: When calculating overall rating
    action: force PASS rating when zero screeners pass the screening criteria
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-zero composite score with zero passing screeners would mislead users into considering stocks that failed
      all criteria
    stage_ids:
    - screening_execution
  - id: finance-C-037
    when: When calculating overall rating
    action: downgrade rating by one tier when fewer than half of screeners pass
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Majority-failing screeners would receive inflated ratings, misrepresenting stock quality to users
    stage_ids:
    - screening_execution
  - id: finance-C-038
    when: When presenting screening results to users
    action: include field_completeness_score as secondary sort key for tie-breaking equal composite scores
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Equal composite scores without completeness ranking would produce inconsistent result ordering across identical
      scan runs
    stage_ids:
    - screening_execution
  - id: finance-C-039
    when: When the system processes screening results
    action: claim that backtest screening scores predict future investment returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting historical screening scores as guaranteed future returns would mislead investors and violate financial
      advisory regulations
    stage_ids:
    - screening_execution
  - id: finance-C-040
    when: When screening stocks in bulk operations
    action: claim real-time data capability when using polling-based data fetching with delays
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting real-time signals from delayed data would make investment decisions based on stale information
    stage_ids:
    - screening_execution
  - id: finance-C-041
    when: When retrieving registered screeners
    action: raise ValueError with available screener names when requested screener does not exist
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing screener without clear error would cause silent failures and confuse users about why their scan is
      incomplete
    stage_ids:
    - screening_execution
  - id: finance-C-049
    when: When normalizing date values in pattern candidates
    action: Verify date strings conform to YYYY-MM-DD format
    severity: high
    kind: domain_rule
    modality: must
    consequence: Malformed dates cause ValueError, preventing pattern reports from being serialized
    stage_ids:
    - pattern_detection
  - id: finance-C-051
    when: When aggregating pattern detection results
    action: Coerce each candidates to canonical PatternCandidate shape before aggregation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Uncoerced candidates cause type errors and inconsistent scoring across detector families
    stage_ids:
    - pattern_detection
  - id: finance-C-052
    when: When selecting primary pattern candidate
    action: Apply confidence floor filtering before candidate selection
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without confidence filtering, weak pattern candidates may be selected as primary, reducing signal quality
    stage_ids:
    - pattern_detection
  - id: finance-C-053
    when: When deriving DetectorOutcome from results
    action: 'Follow the outcome priority: DETECTED > NOT_IMPLEMENTED > ERROR > INSUFFICIENT_DATA > NOT_DETECTED'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect outcome derivation causes wrong check strings and misaligned pattern evaluation
    stage_ids:
    - pattern_detection
  - id: finance-C-054
    when: When processing incomplete weekly data
    action: Exclude incomplete current week from weekly pattern analysis
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Including incomplete current week causes look-ahead bias, as future data would not be available in live trading
    stage_ids:
    - pattern_detection
  - id: finance-C-055
    when: When running pattern detectors on insufficient data
    action: Return insufficient_data outcome with clear failed_checks metadata
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing insufficient_data handling causes detector crashes and invalid pattern detection results
    stage_ids:
    - pattern_detection
  - id: finance-C-056
    when: When configuring pattern detection parameters
    action: Set readiness_score_ready_min_pct >= 70.0 for breakout gate threshold
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Low readiness threshold causes false breakout signals, leading to poor quality trading setups
    stage_ids:
    - pattern_detection
  - id: finance-C-057
    when: When configuring pattern detection parameters
    action: Set pattern_confidence_min_pct >= 55.0 to filter noise
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Low confidence floor allows weak detector outputs to dominate pattern selection
    stage_ids:
    - pattern_detection
  - id: finance-C-058
    when: When computing breakout readiness
    action: Verify atr14_pct <= 8.0% for readiness classification
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: High volatility breakout setups have higher failure rates due to disorderly price movement
    stage_ids:
    - pattern_detection
  - id: finance-C-059
    when: When computing breakout readiness
    action: Verify volume_vs_50d <= 0.8 for pre-breakout dry-up readiness
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: High volume before breakout indicates accumulation/distribution ambiguity, reducing breakout success probability
    stage_ids:
    - pattern_detection
  - id: finance-C-060
    when: When validating pattern data requirements
    action: Verify minimum daily_bars >= 252 for meaningful pattern analysis
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient daily data causes incomplete readiness metrics and unreliable pattern detection
    stage_ids:
    - pattern_detection
  - id: finance-C-061
    when: When validating pattern data requirements
    action: Verify minimum weekly_bars >= 52 for meaningful weekly pattern detection
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient weekly data causes incomplete cup-and-handle and VCP pattern detection
    stage_ids:
    - pattern_detection
  - id: finance-C-062
    when: When validating SetupEngineParameters
    action: Verify three_weeks_tight_max_contraction_pct_strict <= relaxed threshold
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid threshold ordering causes contradictory strict/relaxed mode behavior
    stage_ids:
    - pattern_detection
  - id: finance-C-063
    when: When validating SetupEngineParameters
    action: Verify quality_score_min_pct <= readiness_score_ready_min_pct
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inverted threshold ordering violates logical expectation that quality should be below readiness gate
    stage_ids:
    - pattern_detection
  - id: finance-C-064
    when: When handling missing OHLCV data
    action: Treat missing feature keys as unavailable, not as implicit pass/fail signals
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Treating missing data as pass/fail causes incorrect pattern detection and false confidence in results
    stage_ids:
    - pattern_detection
  - id: finance-C-065
    when: When enforcing candidate limits
    action: Cap pattern candidates at defined maximums (5 for most detectors)
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Unbounded candidate enumeration causes exponential runtime growth in worst-case scenarios
    stage_ids:
    - pattern_detection
  - id: finance-C-066
    when: When computing swing detection
    action: Verify swing left and right parameters are >= 1
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid swing parameters cause ValueError, breaking pivot point detection for all patterns
    stage_ids:
    - pattern_detection
  - id: finance-C-067
    when: When computing readiness scores
    action: Handle zero denominators by returning None instead of division errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero causes crashes when computing distance_to_pivot_pct or other ratio metrics
    stage_ids:
    - pattern_detection
  - id: finance-C-068
    when: When validating pattern candidate checks
    action: Verify each checks dictionary values are boolean type
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-boolean check values cause type errors in downstream aggregation logic
    stage_ids:
    - pattern_detection
  - id: finance-C-069
    when: When validating metrics keys
    action: Verify each metrics dictionary keys follow snake_case convention
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-snake_case keys violate naming contract and cause issues in API serialization
    stage_ids:
    - pattern_detection
  - id: finance-C-070
    when: When computing pattern scores for live trading
    action: Claim readiness scores guarantee actual breakout success
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Readiness scores reflect historical pattern conditions only; actual breakout success depends on market microstructure
      and execution quality
    stage_ids:
    - pattern_detection
  - id: finance-C-071
    when: When presenting pattern detection results
    action: Claim detected patterns predict future price movements
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Chart patterns identify historical price structures but do not guarantee future price behavior
    stage_ids:
    - pattern_detection
  - id: finance-C-077
    when: When implementing scoring and rating calculations
    action: Include I/O dependencies or side effects in scoring module
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: I/O dependencies would break determinism, making scoring untestable without database/Redis mocks and violating
      the pure function contract
    stage_ids:
    - scoring_rating
  - id: finance-C-078
    when: When applying quality policy adjustment
    action: Apply quality policy AFTER calculate_overall_rating
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Applying quality policy before rating calculation would cause incorrect double-downgrade or missed pass-rate
      enforcement
    stage_ids:
    - scoring_rating
  - id: finance-C-079
    when: When exposing completeness information to consumers
    action: Expose field_completeness_score for secondary tie-break sorting
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without completeness score exposure, consumers cannot break ties fairly, causing inconsistent ranking of
      stocks with equal composite scores
    stage_ids:
    - scoring_rating
  - id: finance-C-080
    when: When calculating weighted average composite score
    action: Default missing screener weights to 1.0 and handle zero total weight
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing weights without default would cause incorrect scoring; zero total weight without guard would raise
      division by zero
    stage_ids:
    - scoring_rating
  - id: finance-C-081
    when: When handling legacy data with NULL completeness
    action: Penalize or regress legacy rows with unknown completeness
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Penalizing NULL completeness would regress existing scan results from before the T2 migration, breaking historical
      consistency
    stage_ids:
    - scoring_rating
  - id: finance-C-082
    when: When processing empty screener outputs
    action: Return composite score of 0.0 and rating of PASS
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Empty inputs without explicit handling would cause unexpected behavior or errors in ranking systems that
      expect valid numeric output
    stage_ids:
    - scoring_rating
  - id: finance-C-083
    when: When computing pass-rate adjustment with fewer than half passing
    action: Downgrade rating exactly one tier (strict < half comparison)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-strict comparison or multi-tier downgrade would incorrectly suppress ratings, causing investors to miss
      valid opportunities
    stage_ids:
    - scoring_rating
  - id: finance-C-085
    when: When recording quality policy downgrade reason
    action: Record downgrade reason when rating is already at floor (WATCH/PASS)
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Recording spurious downgrade reasons for WATCH/PASS would mislead operators about the cause of low ratings
      in monitoring dashboards
    stage_ids:
    - scoring_rating
  - id: finance-C-086
    when: When using composite scoring results
    action: Sort by field_completeness_score as secondary key for equal composite scores
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without secondary sort, stocks with identical composite scores would have non-deterministic ordering, causing
      inconsistent ranking across requests
    stage_ids:
    - scoring_rating
  - id: finance-C-087
    when: When modifying rating threshold values
    action: Change rating thresholds without updating each dependent documentation
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Changing thresholds without documentation updates would cause mismatch between code behavior and user-facing
      descriptions of Strong Buy/Buy/Watch/Pass meanings
    stage_ids:
    - scoring_rating
  - id: finance-C-088
    when: When configuring composite scoring method
    action: Support only the three defined CompositeMethod options (weighted_average, maximum, minimum)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid composite methods would cause ValueError in CompositeMethod parsing, preventing scans from running
    stage_ids:
    - scoring_rating
  - id: finance-C-089
    when: When configuring quality policy thresholds
    action: Keep QUALITY_EXCLUSION_THRESHOLD strictly less than QUALITY_DOWNGRADE_THRESHOLD
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Inverted or equal thresholds would collapse the quality policy to a single behavior, eliminating the upgrade
      band
    stage_ids:
    - scoring_rating
  - id: finance-C-092
    when: When validating pagination parameters
    action: Enforce page >= 1 and per_page in range [1, 100] with ValueError on violation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid pagination parameters will cause database query errors or return incorrect result sets, leading to
      API failures or data inconsistency
    stage_ids:
    - persistence
  - id: finance-C-093
    when: When validating RunStats counters
    action: Verify processed_symbols + failed_symbols <= total_symbols in RunStats.__post_init__
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid statistics will produce misleading run summaries and corrupt DQ check calculations that depend on
      row count ratios
    stage_ids:
    - persistence
  - id: finance-C-094
    when: When validating DQ threshold configuration
    action: Verify each threshold fractions are in [0.0, 1.0] and score_mean_range has low < high
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid DQ thresholds will cause incorrect publish decisions, either blocking valid runs or publishing corrupted
      feature data
    stage_ids:
    - persistence
  - id: finance-C-095
    when: When querying the latest published feature run
    action: Use FeatureRunPointer lookup instead of querying FeatureRun directly by status
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct status queries may return inconsistent results when multiple runs are transitioning, exposing readers
      to partial or incorrect feature data
    stage_ids:
    - persistence
  - id: finance-C-096
    when: When persisting feature rows in batches
    action: Batch rows in chunks of _BATCH_SIZE (500) to avoid SQLite variable limit errors
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without batching, large feature runs will fail with database variable limit errors, preventing completion
      of feature store updates
    stage_ids:
    - persistence
  - id: finance-C-099
    when: When performing upsert operations on feature rows
    action: Use true UPSERT (INSERT OR REPLACE) with conflict resolution on [run_id, symbol] to verify Celery retries are
      safe
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without idempotent upserts, Celery task retries will create duplicate feature rows, corrupting feature run
      data and breaking DQ checks
    stage_ids:
    - persistence
  - id: finance-C-100
    when: When persisting scan results
    action: Normalize each numpy/pandas types to native Python via convert_numpy_types before database insertion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Raw numpy types will cause JSON serialization failures in the details column, preventing scan result persistence
      and losing screening data
    stage_ids:
    - persistence
  - id: finance-C-101
    when: When handling terminal feature run states
    action: Allow any outgoing transitions from FAILED or PUBLISHED states
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Terminal states represent completed lifecycle phases; allowing transitions corrupts audit trail and may cause
      inconsistent feature run state
    stage_ids:
    - persistence
  - id: finance-C-102
    when: When performing filter queries on feature store
    action: Apply StockUniverse and StockFundamental outer joins before filter application to resolve joined columns
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing joins cause broken SQL or silently drop filter results for market/industry/rating filters, returning
      incomplete feature pages
    stage_ids:
    - persistence
  - id: finance-C-103
    when: When implementing data quality checks
    action: Run each five DQ checks (row_count, null_rate, score_distribution, rating_distribution, symbol_coverage) before
      publish decision
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping any DQ check allows corrupted or incomplete feature data to be published, leading to incorrect screening
      results for users
    stage_ids:
    - persistence
  - id: finance-C-104
    when: When requiring atomic persistence operations
    action: Use Unit of Work pattern with commit only after each operations succeed; rollback on any exception
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper UoW handling, partial writes leave database in inconsistent state after failures, corrupting
      feature run and scan data
    stage_ids:
    - persistence
  - id: finance-C-105
    when: When implementing scan creation endpoint POST /scans
    action: Return existing scan for duplicate idempotency_key requests without creating new scan
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate scan creation wastes compute resources and produces inconsistent user experience where identical
      requests yield different scan IDs
    stage_ids:
    - api_layer
  - id: finance-C-106
    when: When implementing GET /scans/{id}/results pagination
    action: Enforce per_page parameter bounds between 1 and 100 items per page
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unbounded pagination allows clients to request excessive data, causing memory exhaustion and degraded API
      performance for all users
    stage_ids:
    - api_layer
  - id: finance-C-107
    when: When implementing POST /scans endpoint
    action: Persist scan record to database before dispatching background task to Celery worker
    severity: high
    kind: domain_rule
    modality: must
    consequence: If dispatch fails after commit, scan status is marked failed. If commit fails, Celery worker cannot find
      the scan record causing data loss
    stage_ids:
    - api_layer
  - id: finance-C-110
    when: When implementing GET /scans/{id}/results filtering and sorting
    action: Parse each filter parameters through shared parse_scan_filters, parse_scan_sort, and parse_page_spec dependencies
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent filter parsing causes different API endpoints to apply different filter semantics, producing
      incorrect or unpredictable query results
    stage_ids:
    - api_layer
  - id: finance-C-111
    when: When implementing POST /scans with non-each universe type
    action: Use async scan path regardless of whether exact published feature run exists
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrectly reusing feature run for non-ALL universes produces results that do not reflect the actual universe
      configuration, leading to misleading scan scores
    stage_ids:
    - api_layer
  - id: finance-C-112
    when: When handling scan creation with legacy universe parameter
    action: Return deprecation headers and record telemetry for legacy universe usage
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Missing deprecation signals causes clients to continue using deprecated APIs indefinitely, complicating future
      API migrations
    stage_ids:
    - api_layer
  - id: finance-C-115
    when: When implementing POST /scans response
    action: Return status field indicating whether scan is completed or queued for background execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Clients cannot determine if results are immediately available or require polling for background task completion
    stage_ids:
    - api_layer
  - id: finance-C-116
    when: When implementing GET /scans/{id}/results filtering
    action: Transform passes_only parameter to include only Strong Buy and Buy ratings in filter
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect passes_only filter causes stocks that do not meet template criteria to be included in filtered
      results, providing misleading screening output
    stage_ids:
    - api_layer
  - id: finance-C-117
    when: When dispatching scan background task fails
    action: Mark scan status as failed and commit before re-raising exception to API layer
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unhandled dispatch failure leaves scan in inconsistent queued state while client receives generic error,
      causing confusion about scan fate
    stage_ids:
    - api_layer
  - id: finance-C-118
    when: When handling dispatch failure in API layer
    action: Return HTTP 500 with descriptive error message to client
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Generic error message without scan ID or failure reason prevents client from retrying or understanding failure
      cause
    stage_ids:
    - api_layer
  - id: finance-C-119
    when: When implementing scan delete operation
    action: Prevent deletion of scans with queued or running status, requiring cancellation first
    severity: high
    kind: domain_rule
    modality: must
    consequence: Deleting active scan leaves orphaned background task processing symbols that no longer have associated scan
      record, causing resource waste and potential data corruption
    stage_ids:
    - api_layer
  - id: finance-C-120
    when: When handling empty universe resolution
    action: Raise ValidationError when no symbols found for requested universe
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silent failure with empty symbol list creates scan that processes nothing, wasting storage and misleading
      user about actual scan scope
    stage_ids:
    - api_layer
  - id: finance-C-121
    when: When implementing scan result queries
    action: Raise EntityNotFoundError when scan_id does not exist, caught and returned as HTTP 404
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing scan returns ambiguous 500 error instead of clear 404, confusing API consumers about whether request
      failed or resource is missing
    stage_ids:
    - api_layer
  - id: finance-C-122
    when: When implementing POST /scans with idempotency_key
    action: Store idempotency_key on Scan record for lookup on duplicate requests
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without persisting idempotency_key, duplicate requests cannot be detected, defeating the purpose of idempotency
      protection
    stage_ids:
    - api_layer
  - id: finance-C-123
    when: When implementing background task dispatch
    action: Store returned task_id on Scan record after successful dispatch
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing task_id prevents correlation between scan record and background worker execution, hindering debugging
      and progress tracking
    stage_ids:
    - api_layer
  - id: finance-C-125
    when: When detecting stale intraday cache data
    action: check if data was fetched during market hours and current time is past 4:30 PM ET
    severity: high
    kind: domain_rule
    modality: must
    consequence: Intraday data fetched during market hours contains incomplete daily bars; returning such data post-close
      produces incorrect technical calculations and stale indicator values
    stage_ids:
    - cache_infrastructure
  - id: finance-C-126
    when: When checking data freshness for benchmarks
    action: use market-aware trading calendar logic instead of pure time-based expiration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using pure time-based expiration causes false positives on weekends/holidays, rejecting valid cached data
      and triggering unnecessary API fetches
    stage_ids:
    - cache_infrastructure
  - id: finance-C-127
    when: When handling Redis connection failures during cache operations
    action: fall back to database cache with specified logging
    severity: high
    kind: domain_rule
    modality: must
    consequence: Redis unavailability without fallback causes complete cache failures, forcing all requests to hit external
      APIs and degrading system performance under load
    stage_ids:
    - cache_infrastructure
  - id: finance-C-129
    when: When configuring Redis connection pool for regular cache operations
    action: exceed max_connections=10 for the shared connection pool
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Exceeding the 10-connection limit causes connection exhaustion, preventing new requests from accessing the
      cache and triggering cascading failures
    stage_ids:
    - cache_infrastructure
  - id: finance-C-130
    when: When setting cache TTL values for different data types
    action: 'align TTL with data update frequency: 24 hours for benchmarks, 7 days for prices and fundamentals'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incorrect TTL causes either stale data retention (too long) or unnecessary refetches (too short), degrading
      both data freshness and API efficiency
    stage_ids:
    - cache_infrastructure
  - id: finance-C-131
    when: When setting distributed lock expiry for benchmark cache misses
    action: set LOCK_EXPIRY_SECONDS to 30 seconds to auto-expire stale locks
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Lock expiry too long blocks other workers for excessive time on failures; lock expiry too short causes premature
      lock expiration during long fetches
    stage_ids:
    - cache_infrastructure
  - id: finance-C-132
    when: When waiting for another worker to populate cache
    action: poll Redis at 0.5-second intervals with configurable max_wait_seconds
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Too-frequent polling wastes CPU; too-infrequent polling causes excessive wait times when cache is populated
      quickly
    stage_ids:
    - cache_infrastructure
  - id: finance-C-133
    when: When warming cache for multiple symbols in batches
    action: trigger exponential backoff when batch failure rate exceeds 50%
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Ignoring high batch failure rates causes rapid rate limit exhaustion, triggering API rejections and prolonged
      cache warmup failures
    stage_ids:
    - cache_infrastructure
  - id: finance-C-134
    when: When detecting stuck warmup tasks holding stale locks
    action: force-release locks with no heartbeat for more than 30 minutes
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Stuck locks without force-release permanently block cache warming, causing persistent cache misses and degraded
      scan performance
    stage_ids:
    - cache_infrastructure
  - id: finance-C-135
    when: When implementing cache warming for bulk symbol fetches
    action: use Redis pipeline for batch storage to reduce round-trips
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Non-pipelined batch storage causes N individual Redis round-trips, dramatically slowing warmup for thousands
      of symbols
    stage_ids:
    - cache_infrastructure
  - id: finance-C-137
    when: When implementing cache hit logic
    action: check Redis first, then database, then live API fetch
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping cache layers causes unnecessary API calls, exhausting rate limits and increasing response latency
      for repeated requests
    stage_ids:
    - cache_infrastructure
  - id: finance-C-138
    when: When initializing cache services
    action: use shared Redis connection pool via get_redis_client() for each services
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Creating separate Redis connections per service exhausts file descriptors and causes connection pool fragmentation
    stage_ids:
    - cache_infrastructure
  - id: finance-C-139
    when: When fetching benchmark data for a market
    action: implement fallback candidate logic when primary benchmark is unavailable
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing fallback logic causes cache miss when primary benchmark data is unavailable, leaving scans without
      market comparison data
    stage_ids:
    - cache_infrastructure
  - id: finance-C-140
    when: When tracking cache warming progress across distributed workers
    action: use market-scoped heartbeat keys to prevent cross-market interference
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Non-scoped heartbeat causes parallel US+HK warmups to overwrite each other's progress, leading to incorrect
      completion detection
    stage_ids:
    - cache_infrastructure
  - id: finance-C-141
    when: When presenting cache hit rate metrics to users
    action: claim real-time data availability when using cached data with yfinance delay
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: yfinance data has ~15-minute delay; presenting cached data as real-time misleads users about data freshness
      and may cause delayed trading decisions
    stage_ids:
    - cache_infrastructure
  - id: finance-C-142
    when: When advertising cache warmup capabilities
    action: guarantee cache hit for first-time symbols or after invalidation
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Cache miss is expected for new symbols or post-invalidation; guaranteeing hits leads to failed expectations
      when external APIs are unavailable or rate-limited
    stage_ids:
    - cache_infrastructure
  - id: finance-C-143
    when: When presenting intraday cached data during market hours
    action: display cached intraday bars as if they represent complete daily data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Intraday bars fetched during market hours show partial day data; displaying them as complete causes incorrect
      OHLC analysis and unreliable trading signals
    stage_ids:
    - cache_infrastructure
  - id: finance-C-144
    when: When claiming distributed lock protection for cache misses
    action: claim race-condition-free operation when Redis is unavailable
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Distributed locking requires Redis; without it, multiple workers can simultaneously fetch the same symbol,
      exhausting API rate limits
    stage_ids:
    - cache_infrastructure
  - id: finance-C-145
    when: When implementing cache infrastructure changes
    action: skip testing with Redis disabled to verify graceful fallback behavior
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Changes that work with Redis but fail gracefully may hide bugs in fallback paths, causing production outages
      when Redis becomes unavailable
    stage_ids:
    - cache_infrastructure
  - id: finance-C-146
    when: When optimizing cache performance
    action: skip lock testing by assuming no concurrent cache miss scenarios
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Production deployments with Celery workers always have concurrent access; skipping lock tests causes race
      conditions that exhaust API rate limits
    stage_ids:
    - cache_infrastructure
  - id: finance-C-150
    when: When building AggregatedPatternOutput for scanner payload
    action: Validate setup_engine payload using assert_valid_setup_engine_payload() and drop invalid payloads with logging
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid setup_engine payloads corrupt scan results database rows, causing downstream API responses to return
      malformed data or crash
  - id: finance-C-152
    when: When executing data policy evaluation before pattern detection
    action: Require minimum 252 daily bars and 52 weekly bars for full analysis; allow degraded mode for incomplete benchmark
      data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setup engine produces unreliable scores with insufficient historical data, causing incorrect stock ratings
      and poor investment decisions
  - id: finance-C-153
    when: When retrieving cached price data for screening
    action: Check cache freshness using is_data_fresh() and is_intraday_data_stale() before returning cached data
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Stale intraday price data causes incorrect pattern detection and scoring, leading to poor screening quality
      and potential financial loss from false signals
  - id: finance-C-154
    when: When merging data requirements across multiple screeners
    action: Use DataRequirements.merge_all() to compute union of price_period, needs_fundamentals, needs_quarterly_growth,
      needs_benchmark, needs_earnings_history flags
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Redundant data fetches cause rate limit exhaustion, slowing scan completion and potentially missing stocks
      due to API throttling
  - id: finance-C-155
    when: When fetching price data using yfinance
    action: Use batch yf.download() for bulk fetches instead of per-symbol API calls; per-symbol fallback only for individual
      requests
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Per-symbol yfinance calls exhaust rate limits quickly, causing cache warming to fail and subsequent scans
      to fetch expensive live data
  - id: finance-C-156
    when: When applying quality-aware fallback to rating
    action: Force PASS rating when field_completeness_score < 30; downgrade one tier when score < 60
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Stocks with incomplete fundamentals receive inflated ratings, causing investors to buy low-quality stocks
      with hidden risks
  - id: finance-C-157
    when: When computing relative strength universe performances
    action: Partition stocks by market (US, HK, JP, TW) and deduplicate symbols before computing RS percentile rankings
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Cross-market RS calculations produce incorrect rankings, causing stocks to receive wrong relative strength
      scores and incorrect screening results
  - id: finance-C-158
    when: When processing incomplete current week data
    action: Exclude incomplete current week from weekly features when allow_incomplete_current_week=False; set requires_weekly_exclude_current
      flag
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Incomplete weekly bars cause pattern detection to fail or produce incorrect results, leading to false positive
      or false negative setup signals
  - id: finance-C-159
    when: When validating setup engine candidate data
    action: Verify pattern scores are in 0-100 range and confidence values are in 0-1 range before payload assembly
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Out-of-range scores cause incorrect pattern ranking and selection, potentially selecting inferior patterns
      over superior ones
  - id: finance-C-160
    when: When returning scan results via API
    action: Apply ORDER BY composite_score DESC, field_completeness_score DESC for secondary sort tie-breaking
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Stocks with identical composite scores appear in non-deterministic order, causing inconsistent API responses
      and poor user experience
  - id: finance-C-161
    when: When resolving universe symbols for scan execution
    action: Fail scan creation with ValidationError when no symbols found for universe instead of proceeding with empty scan
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Empty scans waste computational resources and create confusing user experience with zero results displayed
  - id: finance-C-162
    when: When executing screeners in parallel
    action: Pass shared StockData to each screeners; do NOT re-fetch data per screener in parallel execution
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Parallel re-fetching causes redundant API calls and rate limit exhaustion, slowing scan completion by 5x
      or more
  - id: finance-C-164
    when: When using cached price data for screening decisions
    action: Treat cached data as historical reference; acknowledge 15-minute yfinance delay and do not claim real-time capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users relying on cached data for intraday decisions may trade on stale prices, causing unexpected losses
      during fast-moving markets
  - id: finance-C-165
    when: When debugging scan execution failures
    action: Skip root cause investigation when patterns appear simple; always verify data freshness and schema compliance
      first
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Premature assumption of simple root cause leads to incorrect fixes that mask underlying data issues, causing
      recurring failures
  - id: finance-C-167
    when: When making requests to the yfinance data provider
    action: Enforce a rate limit of 1 request per second aggregate across each markets — use Redis-backed distributed limiter
      to prevent thundering herd
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding yfinance rate limits triggers 429 errors, causing cache refresh failures, incomplete screening
      results, and potential IP-based blocking from the data provider
  - id: finance-C-168
    when: When making requests to the Alpha Vantage data provider
    action: Enforce a rate limit of 25 requests per day for the free tier — use DailyQuotaTracker to prevent quota exhaustion
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exhausting the Alpha Vantage daily quota blocks fundamental data fetching until the next calendar day, leaving
      stock fundamentals stale or missing from screening results
  - id: finance-C-169
    when: When making requests to the SEC EDGAR data provider
    action: Enforce a rate limit of 10 requests per second (150ms between requests) to avoid regulatory violations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding SEC EDGAR rate limits may result in IP blocking from the SEC, preventing access to regulatory filings
      needed for fundamental analysis
  - id: finance-C-172
    when: When fetching stock data for screening or analysis
    action: Route each stock data access through the StockDataProvider port interface — screeners and services MUST NOT access
      external data providers (yfinance, Finviz) directly
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct data provider access bypasses the rate limiter, cache, and error handling infrastructure, causing
      429 errors, duplicate API calls, and inconsistent data across screeners
  - id: finance-C-173
    when: When dispatching external API calls to data providers
    action: Route each external API calls through the data_fetch Celery queue — serialize API requests to prevent rate limit
      violations across distributed workers
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Running API calls on the general celery queue allows concurrent workers to exhaust rate limits simultaneously,
      causing widespread 429 errors and data fetch failures
  - id: finance-C-174
    when: When presenting or reporting this system's screening results to users
    action: Claim that screening results constitute financial advice or guarantee investment returns — this system is for
      educational and research purposes only
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on unqualified screening signals, potentially leading
      to significant financial losses — this also exposes the system operator to legal liability
  - id: finance-C-175
    when: When presenting or reporting this system's screening results to users
    action: Claim real-time intraday trading capability — this system is designed for batch-scan orientation and does not
      support intraday trading workflows
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users attempting intraday trading strategies based on delayed data suffer losses due to stale prices, missing
      real-time signals, and batch-mode scan latencies incompatible with active trading
  - id: finance-C-176
    when: When presenting screening scores and rankings to users
    action: Claim that high screening scores predict future stock performance or guarantee profitable trades — screening results
      reflect historical patterns only
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users over-allocate capital to high-scoring stocks based on the assumption that historical screening patterns
      will repeat, leading to severe underperformance when market regimes shift
  - id: finance-C-177
    when: When presenting or reporting this system's screening capabilities to users
    action: Claim support for cryptocurrency screening, non-US markets with limited API coverage, or non-technical users requiring
      simple price lookups — these scenarios are explicitly unsupported
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users in unsupported markets or with unsupported use cases experience data gaps, API failures, or receive
      misleading results that appear valid but lack coverage
  - id: finance-C-178
    when: When configuring or executing scheduled cache warmup tasks
    action: Schedule cache warmup to occur after US market close (default 5:30 PM ET) — data refresh during market hours should
      only be incremental and rate-limited
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Cache warmup during market hours competes for rate limit budget with user-initiated scans, causing slower
      response times and potential 429 errors from data providers
  - id: finance-C-181
    when: When implementing or modifying the pattern score aggregation logic in calibration
    action: Apply detector-specific calibration profiles to raw pattern scores before aggregation to normalize base-rate differences
      across pattern types, preventing detectors with inherently higher or lower base rates from dominating the composite
      ranking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without detector-specific calibration, pattern detectors with inherently higher or lower base rates will
      systematically dominate composite rankings, causing high-quality signals from lower-base-rate patterns like cup-with-handle
      to be systematically undervalued compared to higher-base-rate patterns like NR7
    derived_from_bd_id: BD-003
  - id: finance-C-182
    when: When implementing pattern detector execution logic
    action: 'Execute pattern detectors in the specified order: CupWithHandle, ThreeWeeksTight, HighTightFlag, FirstPullback,
      VCP, NR7InsideDay, DoubleBottom — higher-conviction longer-duration patterns must be evaluated before shorter-term catalysts'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing execution order causes shorter-term noise patterns like NR7 and HTF to overshadow established structural
      setups when multiple patterns fire simultaneously, leading to suboptimal signal prioritization and missed investment
      opportunities
    derived_from_bd_id: BD-002
  - id: finance-C-183
    when: When implementing pattern detector execution framework
    action: Use deterministic sequential execution order for the 7 specialized pattern detectors instead of parallel execution
      to verify reproducible signal generation and consistent ranking across runs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Parallel execution introduces non-determinism where identical scans produce different signal rankings due
      to race conditions in score aggregation, breaking backtesting reliability and user-facing alert stability guarantees
    derived_from_bd_id: BD-001
  - id: finance-C-184
    when: When implementing VCP pattern detection logic with local peak identification
    action: Use order=4 for local peak identification in VCP base pattern detection — this specific parameter ensures proper
      noise rejection while maintaining responsiveness to actual swing highs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using order=3 would make detection noisier and more responsive; using order=5+ would reduce sensitivity and
      miss valid VCP patterns, directly affecting pattern detection sensitivity and consistency of structural setup identification
    derived_from_bd_id: BD-051
  - id: finance-C-185
    when: When implementing or modifying repository interfaces for feature storage and scan results
    action: Maintain separate FeatureStoreRepository and ScanResultRepository interfaces to verify domain separation — each
      domain should own its persistence contract independently without cross-domain coupling
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Merging repository interfaces breaks domain isolation, causing feature data and scan results to become coupled
      — changes in one domain may unexpectedly affect the other domain, reducing system maintainability and extensibility
    derived_from_bd_id: BD-105
  - id: finance-C-186
    when: When implementing SetupEngineAggregator or other aggregators that depend on pattern detectors
    action: Use lazy detector injection pattern to defer concrete detector selection until aggregate() runtime, enabling testability
      through mock injection and extensibility through implementation swapping without modifying aggregator code
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Tight coupling at construction time reduces testability by preventing mock injection and reduces extensibility
      by requiring aggregator code modification to swap detector implementations, lowering system flexibility and maintainability
    derived_from_bd_id: BD-096
  - id: finance-C-187
    when: When processing matrix operations in data collection, correlation calculations, or clustering
    action: Assume the framework handles matrix ill-conditioning automatically — the framework does not implement matrix condition
      checking or numerical stabilization for ill-conditioned matrices used in PCA, theme correlation, and clustering operations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Ill-conditioned matrices in correlation calculations, theme clustering, or other matrix operations can produce
      numerically unstable results, causing feature computations to be unreliable and potentially causing downstream signal
      distortion in theme grouping
    derived_from_bd_id: BD-GAP-051
  - id: finance-C-188
    when: When implementing matrix operations involving correlation matrices, covariance matrices, or any matrix inversions
      in the data collection pipeline
    action: Check matrix condition number before inversion or decomposition operations; apply regularization or SVD-based
      approaches when condition_number exceeds safe thresholds (typically > 10000 indicates ill-conditioning)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without condition checking, ill-conditioned matrices produce numerically unstable results that can cause
      PCA, clustering, and correlation calculations to return unreliable values, affecting theme grouping accuracy and feature
      computation integrity
    derived_from_bd_id: BD-GAP-051
  - id: finance-C-193
    when: When implementing candidate scoring and ranking in calibration stage
    action: 'Use exact candidate setup score weights: quality=0.45, readiness=0.30, confidence=0.25 — these weights represent
      the specific quality-first prioritization and must not be adjusted without full revalidation'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing weights to different values (e.g., equal weighting or confidence-dominant) causes low-quality candidates
      to pass the calibration filter, degrading signal quality and producing strategies that underperform in live trading
    derived_from_bd_id: BD-008
  - id: finance-C-194
    when: When calculating relative strength (RS) ratings for stock ranking
    action: 'Calculate RS using weighted multi-period formula: 63-day at 40%, 126-day at 20%, 189-day at 20%, 252-day at 20%
      — the 40% short-term emphasis captures momentum leadership while distributed weights verify sustained outperformance'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using equal weighting or different period distributions shifts RS rankings toward medium-term or long-term
      leadership, making the momentum-focused strategy ineffective at capturing near-term outperformance
    derived_from_bd_id: BD-012
  - id: finance-C-195
    when: When resampling price data to weekly timeframe for pattern analysis
    action: Exclude the incomplete current period from weekly resampled data — only complete weekly OHLC bars should be used
      for pattern detection
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including incomplete weekly bars causes pattern detection algorithms to misidentify formations due to artificially
      inflated or deflated OHLC values, leading to false trading signals
    derived_from_bd_id: BD-015
  - id: finance-C-196
    when: When calculating Average True Range (ATR) for volatility measurement and stop-loss sizing
    action: Use ATR period of 14 with Wilder smoothing (exponential moving average approach) as specified by J. Welles Wilder
      in 'New Concepts in Technical Trading Systems'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different ATR periods (e.g., 7 or 20) causes misaligned volatility readings, leading to incorrectly
      sized stop-losses that either trigger prematurely or fail to protect against excessive drawdowns
    derived_from_bd_id: BD-009
  - id: finance-C-197
    when: When calculating Bollinger Bands for overbought/oversold detection and squeeze identification
    action: Use Bollinger Band window=20 and standard deviation=2.0 as per John Bollinger's original specification aligned
      with the trading month concept
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different window or stddev values produces unreliable statistical bounds, causing squeeze detection
      to fail and overbought/oversold signals to be inaccurate across different market conditions
    derived_from_bd_id: BD-010
  - id: finance-C-198
    when: When calculating Beta-Adjusted Relative Strength for fair comparison across risk profiles
    action: Apply beta adjustment using formula RS_Rating / max(Beta, 0.5) with a cap of 100 — the 0.5 floor prevents over-penalization
      and 100 cap prevents unrealistic inflation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping beta adjustment causes high-volatility stocks to rank unrealistically high, as their raw RS achieved
      excessive market exposure; this misranks risk-adjusted leadership
    derived_from_bd_id: BD-058
  - id: finance-C-199
    when: When calculating ATR for volatility measurement and stop-loss sizing
    action: Calculate ATR using EMA smoothing of True Range, where True Range = max(H-L, |H-PrevC|, |L-PrevC|) — this captures
      intraday range, upward gaps, and downward gaps completely
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simplified range calculation (e.g., |Close-Close_prev|) misses gap information, causing ATR to understate
      true volatility; stop-losses set using this value will be too tight or too loose
    derived_from_bd_id: BD-060
  - id: finance-C-200
    when: When processing settlement and delivery of trades
    action: Assume the framework handles settlement/delivery time conventions — the framework does not implement settlement
      timing; the current week incomplete period exclusion applies only to pattern analysis, not trade settlement
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit settlement time handling, the system cannot verify T+1 compliance for A-shares or same-day
      settlement for other markets, risking regulatory violations in live trading
    derived_from_bd_id: BD-GAP-053
  - id: finance-C-201
    when: When processing settlement and delivery of trades
    action: Implement exchange-specific settlement time conventions by retrieving exchange calendar data including market
      open/close times and settlement timestamps; for A-shares enforce T+1 settlement where securities purchased on day N
      cannot be delivered until day N+1
    severity: high
    kind: domain_rule
    modality: must
    consequence: Implementing explicit settlement handling ensures the system correctly models delivery timing across exchanges,
      preventing same-day round-trip trades in markets with T+1 settlement requirements
    derived_from_bd_id: BD-GAP-053
  - id: finance-C-202
    when: When processing order prices and quantities for execution
    action: Assume the framework handles price/quantity precision (tick size and lot size) — the framework does not implement
      tick/lot validation; orders with invalid precision may be rejected by exchanges
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without tick/lot handling, orders with invalid price precision or quantity increments are submitted to exchanges,
      causing rejection and missed trading opportunities with increasing frequency during high-volatility periods
    derived_from_bd_id: BD-GAP-054
  - id: finance-C-203
    when: When processing order prices and quantities for execution
    action: Implement exchange-specific tick size and lot size validation by retrieving security precision data; round order
      prices to nearest tick and adjust quantities to valid lot multiples before order submission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Implementing tick/lot validation ensures all orders meet exchange requirements, preventing rejection and
      enabling proper partial fills when lot size exceeds remaining allocation
    derived_from_bd_id: BD-GAP-054
  - id: finance-C-204
    when: When modeling volatility for option pricing or risk calculations
    action: Assume the framework supports GARCH volatility modeling — the framework does not implement GARCH; assuming GARCH
      availability causes option pricing and VaR calculations to silently use fallback models producing incorrect risk estimates
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without GARCH implementation, assuming it exists causes the system to use inappropriate volatility models
      for options or risk management, systematically underestimating tail risk during volatile market periods
    derived_from_bd_id: BD-GAP-055
  - id: finance-C-205
    when: When modeling volatility for option pricing or risk calculations
    action: Implement alternative volatility modeling using available methods (historical volatility, EWMA, or parametric
      approaches) with explicit documentation of model assumptions and limitations; select model based on option type and
      market conditions
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Implementing explicit fallback volatility models ensures risk calculations use appropriate methods for the
      available data, preventing silent model substitution that produces misleading risk estimates
    derived_from_bd_id: BD-GAP-055
  - id: finance-C-206
    when: When implementing quiet day detection logic in pattern analysis
    action: 'Use dual-condition quiet day definition: volume < 0.8*SMA50 AND true_range < ATR14%. Both conditions must be
      satisfied simultaneously — do not simplify to single-condition detection.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing the dual-condition requirement allows single-dimension quiet days to pass through, causing false
      readiness signals when volume is low but price movement is normal, leading to incorrect volatility expansion predictions
    derived_from_bd_id: BD-018
  - id: finance-C-207
    when: When implementing cup-and-handle pattern detection
    action: 'Enforce handle specifications: duration 1-5 weeks, maximum depth 15%, volume ratio cap 1.10. Handle that exceeds
      any limit must be rejected as invalid.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Relaxing handle parameters allows extended handles or deep pullbacks to pass validation, which historically
      show weak breakout performance and may signal trend failure rather than healthy consolidation
    derived_from_bd_id: BD-021
  - id: finance-C-208
    when: When validating cup-and-handle pattern structure
    action: Verify handle low is located in the upper half of the cup range (above cup midpoint). Handles below midpoint risk
      completing double-top or failing to establish proper uptrend angle.
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allowing handles below cup midpoint identifies consolidations that represent meaningful corrections rather
      than shallow pullbacks, reducing pattern reliability and increasing false positive signals
    derived_from_bd_id: BD-022
  - id: finance-C-209
    when: When implementing Bollinger Band squeeze detection
    action: Calculate squeeze threshold as the 20th percentile of band width over 252-day lookback. This specific percentile
      filters common narrow-range days from true squeeze conditions.
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a different percentile (e.g., 30th or 10th) either flags too many false squeeze signals or misses valid
      squeeze events, causing readiness indicators to trigger inappropriately or fail to identify volatility expansion opportunities
    derived_from_bd_id: BD-011
  - id: finance-C-210
    when: When calculating volume ratio for pattern analysis
    action: Use 50-day SMA as the baseline for volume ratio calculation. This specific window aligns with the 50-day price
      moving average for consistency.
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using a different SMA window (e.g., 20-day or 100-day) either creates excessive sensitivity or sluggish response,
      causing volume ratio to misidentify accumulation/distribution shifts relative to price trend
    derived_from_bd_id: BD-013
  - id: finance-C-211
    when: When constructing weekly bars from daily data
    action: Use 'W-FRI' (Friday week-ending) rule for weekly resampling. This aligns with US market convention and institutional
      portfolio rebalancing cycles.
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using non-Friday week boundaries causes misalignment with institutional rebalancing and options expiration
      cycles, distorting weekly price patterns and reducing signal reliability
    derived_from_bd_id: BD-014
  - id: finance-C-212
    when: When calculating relative strength ratio and identifying RS line new highs
    action: Calculate RS as Close / SPY_Close. For RS line new high detection, require current >= max - epsilon (with epsilon
      preventing floating-point edge cases).
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using RS without epsilon buffer causes false signals from floating-point rounding imprecision; incorrectly
      implementing the new high condition fails to distinguish genuine stock leadership from mere market matching
    derived_from_bd_id: BD-064
  - id: finance-C-213
    when: When implementing rolling regression for trend analysis
    action: Use Ordinary Least Squares (OLS) regression with x = [0..window-1] (sequential indices, not dates). OLS minimizes
      squared errors for best linear fit in equally-spaced time steps.
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-OLS methods (e.g., exponential weighting) fundamentally changes how the trend line fits historical
      data, causing different slope estimates and potentially reversing trend signals
    derived_from_bd_id: BD-070
  - id: finance-C-214
    when: When detecting swing highs and lows
    action: Require the bar to be the maximum (for highs) or minimum (for lows) of the left+right+1 window. The symmetric
      window ensures swing points are genuine local extrema.
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using asymmetric windows or different comparison logic creates bias in swing detection, causing false signals
      from isolated price spikes or missing valid swing points that affect trade entry/exit timing
    derived_from_bd_id: BD-071
  - id: finance-C-215
    when: When processing any monetary values (prices, scores, thresholds) in the trading system
    action: Use Python float type for financial quantities — float's binary floating-point representation causes precision
      errors in decimal financial calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using float for financial values (prices, scores, thresholds) causes accumulated rounding errors that can
      result in incorrect trade sizing, miscalculated P&L, or threshold breaches that violate strategy parameters
    derived_from_bd_id: BD-GAP-058
  - id: finance-C-216
    when: When defining or processing any monetary values in the trading system
    action: 'Replace each float declarations for financial quantities with Decimal from the decimal module. For numpy/pandas
      arrays used for financial data, use Decimal dtype or implement explicit float-to-Decimal conversion at display/export
      boundaries. Key affected areas: price calculations, score computations, threshold values, and any monetary parameters.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without Decimal type, binary floating-point representation causes precision errors in decimal calculations
      leading to incorrect position sizing, misreported returns, or threshold violations that can result in significant financial
      losses or compliance issues
    derived_from_bd_id: BD-GAP-058
  - id: finance-C-217
    when: When implementing Minervini scan data validation
    action: Require exactly 240 trading days of historical data before running Minervini pattern detection calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Running Minervini scan with fewer than 240 days of data produces unreliable technical indicators, leading
      to false pattern detection and garbage-in-garbage-out scenarios where invalid stocks are flagged as candidates
    derived_from_bd_id: BD-049
  - id: finance-C-218
    when: When implementing RSI calculation in technical analysis
    action: Use Wilder's Exponential Moving Average smoothing with alpha = 1/period for RSI calculation (not simple SMA or
      standard EMA)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using standard EMA instead of Wilder smoothing changes RSI values significantly; standard EMA gives more
      weight to recent prices, causing RSI to cross overbought/oversold thresholds more frequently, distorting momentum signals
    derived_from_bd_id: BD-059
  - id: finance-C-219
    when: When implementing volatility calculation for risk assessment
    action: Calculate volatility as Standard Deviation of Returns multiplied by 100 to express as percentage, enabling cross-stock
      comparison regardless of price level
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using raw price standard deviation instead of return-based volatility makes the metric incomparable across
      stocks at different price levels, breaking cross-stock risk comparison and regime detection logic
    derived_from_bd_id: BD-061
  - id: finance-C-220
    when: When implementing NR7 signal scoring in pattern detection
    action: 'Use exact signal score formula: 0.20 base + subtype_bonus + 0.28*range_tight + 0.12*vol_dry + 0.08*ema21 + 0.14*recency
      with specified coefficient weights'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying coefficient weights without empirical validation changes which patterns rank highest, potentially
      causing inferior NR7 patterns to be traded over superior ones, reducing strategy edge
    derived_from_bd_id: BD-066
  - id: finance-C-221
    when: When implementing 3-Week Tight pattern detection
    action: Apply strict 1.5% price band for low-volatility names and relaxed 2.5% band for high-volatility names to define
      consolidation range
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a single fixed band instead of dual thresholds excludes valid setups in high-volatility names (too
      strict) or includes false consolidations in low-volatility names (too loose), reducing pattern detection accuracy
    derived_from_bd_id: BD-032
  - id: finance-C-222
    when: When implementing first pullback MA level detection
    action: Use exactly 21-bar period for the first pullback moving average, representing approximately one month of trading
      data as the pullback reference level
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a different MA period changes pullback reference levels significantly; shorter MA may trigger premature
      entries while longer MA may miss optimal entry points during meaningful pullbacks
    derived_from_bd_id: BD-033
  - id: finance-C-223
    when: When implementing MA touch detection for pullback patterns
    action: Apply exactly 1.5% distance threshold for recognizing MA touches, treating prices within this band as valid touches
      rather than requiring exact contact
    severity: high
    kind: domain_rule
    modality: must
    consequence: A tighter threshold causes valid near-touches to be rejected as false signals, missing entry opportunities;
      a looser threshold includes distant approaches as touches, generating false entry signals
    derived_from_bd_id: BD-034
  - id: finance-C-224
    when: When implementing NR7 confidence scoring in pattern detection
    action: 'Use the exact confidence formula: min(0.78, max(0.05, 0.20 + score*0.55)) — do not modify the 0.55 scaling factor,
      0.78 cap, 0.05 floor, or 0.20 base values'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying the confidence formula changes signal strength classification for all NR7 patterns, causing strategies
      to over-trade or under-trade based on miscalibrated confidence thresholds
    derived_from_bd_id: BD-067
  - id: finance-C-225
    when: When calculating ATR for volatility-based indicators
    action: Implement ATR calculation using Wilder EMA (alpha=1/period) as the primary method, with SMA as an alternative
      option — verify both methods are available for selection
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect ATR calculation method changes volatility measurements, affecting stop-loss sizing and position
      sizing calculations that rely on accurate volatility estimates
    derived_from_bd_id: BD-068
  - id: finance-C-226
    when: When implementing RS Rating scoring for stock quality assessment
    action: 'Apply the tiered scoring function exactly: >=80 ratings get 20pts, >=70 get 15pts, >=60 get 10pts, otherwise
      calculate (rating/60)*10 — do not alter tier boundaries or point values'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing RS tier thresholds or point values alters stock ranking order, causing momentum strategies to select
      different stocks and produce materially different backtest results
    derived_from_bd_id: BD-072
  - id: finance-C-227
    when: When detecting MA touch patterns for pullback entries
    action: Enforce exactly 5 bars minimum separation between MA touches — filter rapid oscillations where touches occur within
      5 bars of each other
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reducing the 5-bar minimum to 3 bars causes the same pullback to generate multiple entry signals, inflating
      backtest trade count by 40-60% and creating impossible-to-execute strategies in live trading
    derived_from_bd_id: BD-035
  - id: finance-C-228
    when: When calculating pullback orderliness score for pattern quality assessment
    action: Apply exactly 55% weight to lower-highs ratio in orderliness scoring — the lower-highs ratio must be the dominant
      factor driving the composite score
    severity: high
    kind: domain_rule
    modality: must
    consequence: Equalizing weights to 50/50 reduces predictive power for trend resumption by 15-20%, allowing lower-quality
      pullbacks to pass filters and reducing strategy win rates
    derived_from_bd_id: BD-036
  - id: finance-C-229
    when: When confirming pullback resumption for entry signal generation
    action: 'Require each three conditions simultaneously: EMA10 breakout above pullback high, positive close (up day), and
      volume >= 90% of 20-day average — do not allow single or dual-condition entries'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using single-condition entry (price only) doubles false resumption signals, causing premature entries into
      failed pullbacks and increasing average loss per trade by 25-35%
    derived_from_bd_id: BD-037
  - id: finance-C-230
    when: When detecting VCP (Volume Price Contraction) patterns for base identification
    action: Require at least 3 distinct bases for VCP detection — a valid base consists of higher lows with contracting volatility;
      reject patterns with fewer than 3 bases as insufficient compression
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reducing minimum to 2 bases allows normal volatility oscillations to pass as VCP, inflating base count by
      50-70% and causing strategies to enter premature positions before proper accumulation completes
    derived_from_bd_id: BD-038
  - id: finance-C-231
    when: When implementing or refactoring the setup ready gate logic in pattern scoring
    action: 'Evaluate each threshold independently: quality >= 60%, readiness >= 70%, pattern_confidence >= 55%. each three
      conditions must pass as separate checks, not combined into a single composite score'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a combined score instead of independent gates allows stocks with imbalanced metrics to pass; a stock
      with 40% quality but 80% readiness and 80% confidence would incorrectly qualify despite an inadequate fundamental basis
    derived_from_bd_id: BD-082
  - id: finance-C-232
    when: When implementing RS Rating calculation logic
    action: 'Apply asymmetric weighting to performance periods: 40% weight to 63-day period, 20% to 126-day, 20% to 189-day,
      20% to 252-day. Do not use equal weights or reverse the weighting priority'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Equal weighting over-weights older performance data, causing RS Rating to reflect historical returns rather
      than current momentum; strategies based on RS Rank will misalign with actual near-term performance
    derived_from_bd_id: BD-083
  - id: finance-C-233
    when: When implementing Stage 2 classification logic
    action: 'Require each three conditions simultaneously: price > MA200, MA200 is rising, and price structure shows higher
      highs and higher lows. Use AND logic exclusively - do not use OR or make any condition optional'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using OR logic over-classifies stocks as Stage 2; stocks only meeting price > MA200 (without rising MA200
      or proper structure) would trigger accumulation alerts for stocks in distribution phases, causing strategies to buy
      into weakening positions
    derived_from_bd_id: BD-086
  - id: finance-C-234
    when: When implementing pattern scoring logic for candidates and setups
    action: 'Maintain two-stage scoring: candidate stage uses 55% confidence + 35% quality + 10% recency weights; setup stage
      uses 60% quality + 40% readiness weights. The stages are architecturally distinct - do not merge or use identical weights'
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using identical weights across stages or merging the stages eliminates the architectural distinction between
      candidate evaluation (confidence-driven) and setup evaluation (quality-driven), causing alert priority to misalign with
      actual pattern maturity
    derived_from_bd_id: BD-081
  - id: finance-C-235
    when: When implementing MA trend classification logic
    action: Verify that flat MA classification uses the < 1% change threshold over the configured lookback period. Test sensitivity
      around this boundary - MAs changing 0.5% or less are effectively sideways
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 0.5% threshold misclassifies normal MA noise as flat trends; strategies expecting flat MAs to precede
      stage transitions will trigger prematurely on random fluctuations
    derived_from_bd_id: BD-041
  - id: finance-C-236
    when: When implementing RS Rating calculation
    action: 'Use percentile rank vs universe when universe data is available; when unavailable, use the fallback formula:
      50 +/- relative performance. Verify the fallback is applied only when necessary and not as default'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using relative performance without percentile ranking produces non-comparable ratings across different market
      regimes; stocks rated 60 RS in a weak market may underperform stocks rated 50 RS in a strong market, causing allocation
      errors
    derived_from_bd_id: BD-043
  - id: finance-C-237
    when: When implementing or modifying calibration profiles for pattern detection scoring
    action: Verify calibration profiles are validated for accuracy before use in BD-007's weighted aggregation — calibration
      errors propagate multiplicatively into every composite rank score, and a 0.01 error in calibration profiles becomes
      a weighted component affecting each final rankings
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inaccurate calibration profiles cause systematic ranking distortions where correct patterns may be undervalued
      and incorrect patterns may qualify for trading signals, leading to poor strategy performance in live trading
    derived_from_bd_id: BD-108
  - id: finance-C-238
    when: When debugging pattern ranking discrepancies between candidate stage and final aggregation results
    action: Assume that high-quality candidate patterns will rank consistently in final results — BD-008 weights quality highest
      (0.45) while BD-007 weights confidence highest (0.55), creating inverted hierarchies where patterns scoring 80 quality/50
      confidence rank first at candidate stage but below patterns with 60 quality/80 confidence at aggregation
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: This weight dissonance creates unpredictable ranking behavior where debugging high-quality candidates producing
      low-ranked signals is confounded by the intentional semantic difference between candidate selection and final aggregation
      stages
    derived_from_bd_id: BD-109
  - id: finance-C-239
    when: When processing temporal queries in A-share backtesting
    action: Assume the framework provides centralized lookahead prevention mechanisms — BD-019 documents time alignment but
      provides no explicit shift/lag parameters; future modifications without understanding time-series constraints could
      accidentally introduce lookahead bias where current bar data influences historical calculations
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Without centralized shift configuration, developers adding new features without understanding temporal constraints
      may create look-ahead bias, causing backtest equity curves to exhibit non-reproducible results in live trading
    derived_from_bd_id: BD-119
  - id: finance-C-240
    when: When adding new time-series features to the pattern detection system
    action: Implement centralized shift configuration with validation ensuring each time-series calculations use explicit
      shift parameters that prevent lookahead — require validation that new features do not use current bar data in historical
      calculations (e.g., check for any raw[bar_index] access without corresponding shift)
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Lack of centralized shift validation allows accidental lookahead bias to be introduced in future feature
      additions, causing systematic overestimation of strategy performance in backtesting
    derived_from_bd_id: BD-119
  - id: finance-C-241
    when: When implementing scoring and calibration operations in the pattern detection backend
    action: Assume the backend has a first-class evaluation_date domain model for consistent temporal semantics — BD-008 and
      BD-007 operate without explicit temporal context; the evaluation_date concept exists only in frontend storage (feature_as_of_date,
      scan_as_of_date) but is missing from backend domain models
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Missing evaluation_date domain model creates ambiguity about temporal semantics across scoring operations,
      potentially causing inconsistent temporal handling when staleness checks via snapshot flags interact with pattern scoring
    derived_from_bd_id: BD-120
  - id: finance-C-242
    when: When defining scoring and calibration APIs for pattern detection operations
    action: Define evaluation_date as an explicit parameter in scoring APIs and establish it as a first-class domain model
      — verify each BD-008 setup score weight calculations and BD-007 aggregation formulas receive consistent temporal context
      through this parameter
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without explicit evaluation_date in backend APIs, temporal semantics remain ambiguous across scoring and
      calibration operations, leading to potential inconsistencies when staleness checks and pattern scoring interact
    derived_from_bd_id: BD-120
  - id: finance-C-243
    when: When implementing bulk data export or large scan result processing in the scanning module
    action: Handle the 50 items/page pagination limit with hard cap of 100 as an architectural constraint — implement client-side
      paging or streaming strategies for UI scenarios requiring bulk data export, as the server enforces memory and bandwidth
      protection at this cap
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bulk data exports exceeding 100 items will be silently truncated, causing incomplete data processing and
      potential analysis errors when downstream systems assume complete result sets
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-244
    when: When running cup-with-handle pattern detection on large stock universes
    action: Respect the 3000-pair evaluation runtime cap as a hard limit — cup search operations that would evaluate more
      than 3000 swing pairs must be truncated to prevent excessive computation times that exceed practical batch scanning
      requirements
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Removing the 3000-pair cap causes cup detection to run 30+ minutes on large universes, making the detector
      unsuitable for batch scanning operations and potentially causing timeout failures in production environments
    derived_from_bd_id: BD-050
  - id: finance-C-245
    when: When implementing VCP (Volatility Contraction Pattern) detection logic
    action: 'Apply progressive depth thresholds: first base pullbacks must be within 5-45% depth while subsequent pullbacks
      must be within 5-35% depth — the progressive tightening from 45% to 35% encodes the core VCP signature that predicts
      breakout strength, and uniform thresholds would eliminate this signature'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using uniform depth thresholds eliminates the progressive contraction characteristic that distinguishes true
      VCP patterns from random price consolidation, increasing false positive rates in pattern detection
    derived_from_bd_id: BD-052
  - id: finance-C-246
    when: When implementing VCP contraction validation logic
    action: Enforce that at least 75% (3 of 4) of pullbacks in a VCP sequence must be shallower than the previous pullback
      — this statistical boundary provides confidence that contraction is intentional rather than noise while allowing one
      anomalous pullback in real market data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Relaxing the 75% contraction threshold to 67% (2 of 3) would increase false positives by accepting VCP patterns
      that include significant depth reversals, reducing the predictive reliability of breakout success signals
    derived_from_bd_id: BD-053
  - id: finance-C-247
    when: When implementing or modifying VCP quality scoring weights
    action: Maintain VCP score weights at depth 35%, volume 25%, tightness 25%, ATR 15% — depth receives highest weight because
      progressive contraction is the core VCP insight for predicting breakout success; any weight modifications require backtesting
      validation against historical breakout outcomes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying VCP score weights without backtesting validation may reduce pattern quality prediction accuracy,
      causing high-quality VCP setups to be underweighted and reducing the effectiveness of breakout trading signals
    derived_from_bd_id: BD-054
  - id: finance-C-248
    when: When implementing stock universe membership checks in filtering or trading logic
    action: Use the is_active boolean field for membership testing, not status string comparisons — boolean provides O(1)
      lookup performance and SQLAlchemy class-level filtering capability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing is_active boolean with status string lookup introduces O(n) string matching that degrades filtering
      performance and breaks SQLAlchemy class-level filter expressions used throughout the codebase
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-250
    when: When implementing Average Daily Range (ADR) calculation for volatility scanning
    action: Calculate ADR using the formula (High-Low)/Close * 100, averaged over exactly 20 trading days — this percentage-normalized
      range enables cross-stock comparability and aligns with monthly trading cycle analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different periods (e.g., 10-day or 30-day) changes ADR values significantly — 10-day produces noisier
      signals that trigger false volatility expansions, while 30-day lags regime changes causing missed trading opportunities
    derived_from_bd_id: BD-056
  - id: finance-C-251
    when: When implementing Bollinger Band width calculation for volatility regime detection
    action: 'Calculate BB Width using the normalized formula: 100 * (BB_upper - BB_lower) / BB_middle — this percentage form
      enables threshold consistency across stocks trading at different price levels ($10 vs $500)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using absolute width in dollars requires stock-specific thresholds that cannot be applied universally — a
      $5 bandwidth means compression for a $10 stock but normal range for a $500 stock, breaking cross-stock volatility comparisons
    derived_from_bd_id: BD-062
  - id: finance-C-252
    when: When implementing BB Squeeze detection for mean reversion strategy signals
    action: Identify squeeze condition when BB_width_percentile <= 20.0 — this 20th percentile threshold detects genuine compression
      unique to each stock's historical volatility behavior
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fixed percentile thresholds (e.g., 25th) or absolute bandwidth values produces incorrect signals —
      25th percentile triggers too frequently for high-volatility stocks, while fixed thresholds miss stock-specific compression
      patterns
    derived_from_bd_id: BD-063
  - id: finance-C-253
    when: When implementing Narrow Range NR7 pattern detection for volatility expansion signals
    action: Identify NR7 trigger bar as the bar with smallest range within the most recent 7 bars — the 7-bar window captures
      approximately one trading week with statistically meaningful compression detection
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using NR4 instead produces more frequent but less significant signals with lower predictive power for volatility
      expansion; using NR10+ makes the pattern too rare and statistically weak for practical strategy use
    derived_from_bd_id: BD-065
  - id: finance-C-254
    when: When implementing Bollinger Bands technical indicator for mean reversion or breakout strategies
    action: Calculate Bollinger Bands using middle_band = SMA(close, 20) with upper_band = middle + 2*std(close, 20) and lower_band
      = middle - 2*std(close, 20) — the 20-period captures approximately one trading month and 2*std captures 95% of price
      action
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 1.5*std produces narrower bands that trigger excessive breakout signals; using 3*std creates bands
      too wide to be useful for most applications, causing strategies to miss valid entry and exit points
    derived_from_bd_id: BD-069
  - id: finance-C-255
    when: When implementing or refactoring tweet extraction logic
    action: Maintain the dual-strategy extraction approach (article-first with link-first fallback) — do not collapse to a
      single extraction method
    severity: high
    kind: domain_rule
    modality: must
    consequence: Collapsing to a single extraction strategy removes resilience against X.com DOM structure changes; when the
      primary strategy fails, the entire extraction pipeline breaks and returns no tweets
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-257
    when: When implementing or refactoring alert state transition logic
    action: Enforce that alert state transitions from open to closed require the breach condition to persist across two consecutive
      evaluation cycles (hysteresis requirement)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing hysteresis logic causes alerts to flap on transient metric fluctuations, generating alert noise
      and reducing operator trust in the monitoring system
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-258
    when: When implementing feature run status management or refactoring quality checks
    action: Maintain quarantine state separation for failed feature runs — do not allow completed-but-failed runs to publish
      directly; mark quarantined runs for review before promotion
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing quarantine allows failed runs to publish production pointers, causing downstream systems to consume
      invalid feature data with no audit trail for post-mortem analysis
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-259
    when: When refactoring API key rotation logic or optimizing for throughput
    action: Implement probabilistic API key rotation after rate limits — do not use immediate round-robin rotation that exhausts
      each keys simultaneously during sustained outage
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Immediate key rotation spreads rate limit failures across all keys faster, potentially exhausting the entire
      key pool during extended service outages and leaving no fallback keys available
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-260
    when: When implementing or modifying stock screening logic in the Minervini scanner
    action: 'Enforce 52-week position thresholds: current price must be at least 30% above the 52-week low AND no more than
      25% below the 52-week high for position eligibility'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Relaxing 52-week position thresholds changes the stock selection universe, potentially including range-bound
      or declining stocks that lack institutional momentum, leading to poor trading outcomes
    derived_from_bd_id: BD-074
  - id: finance-C-261
    when: When implementing or modifying recommendation scoring logic
    action: 'Apply tiered recommendation thresholds with template pass requirements: Strong Buy requires score >= 85 AND template
      pass; Buy requires score >= 70 AND template pass; Watch requires score >= 60'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying score thresholds or removing template pass requirements allows high-scoring stocks with poor fundamentals
      to receive aggressive recommendations, increasing false positive risk in live trading
    derived_from_bd_id: BD-075
  - id: finance-C-262
    when: When implementing or modifying IPO scoring logic
    action: Apply IPO age scoring with 6-24 month sweet spot earning full 25 points, with linear degradation outside this
      window — verify that the scoring function reflects diminishing but non-zero value outside the optimal age range
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect IPO age scoring misweights the post-lockup institutional accumulation signal, potentially overvaluing
      freshly-IPO'd stocks with high volatility or undervaluing established post-lockup performers
    derived_from_bd_id: BD-076
  - id: finance-C-263
    when: When implementing or modifying IPO stability scoring logic
    action: 'Apply tiered volatility scoring: assign 20 points for annualized volatility <3%, 15 points for <5%, 10 points
      for <7% — verify volatility calculation uses annualized standard deviation'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect volatility tier boundaries or calculation method reduces discriminative power for institutional-quality
      stability, causing IPO stocks with excessive volatility to receive inflated stability scores
    derived_from_bd_id: BD-077
  - id: finance-C-264
    when: When implementing or modifying theme correlation validation logic
    action: Validate that average correlation within a theme group meets or exceeds the minimum correlation threshold (default
      0.5) — reject themes where stocks move coincidentally rather than demonstrating genuine co-movement
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accepting themes with weak average correlation includes stocks moving together by chance rather than genuine
      thematic exposure, causing diversification to fail and concentrated risk during sector-wide reversals
    derived_from_bd_id: BD-078
  - id: finance-C-265
    when: When implementing or modifying telemetry collection in the extraction pipeline
    action: Maintain Redis-only telemetry for per-call extraction metrics; must not introduce per-call PostgreSQL writes as
      they would create millions of rows and dwarf extraction table size
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Per-LLM-call PG writes would create millions of rows in the database, causing extraction table size to be
      dominated by telemetry data and severely degrading query performance on the extraction service
    derived_from_bd_id: BD-GAP-029
  - id: finance-C-266
    when: When implementing query filters that use the filter builder pattern
    action: Assume that None values passed to the filter builder are always skipped - when None is intentionally meaningful
      for exclude-null filters, use explicit skip parameters instead of relying on silent skipping
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Silent None skipping causes exclude-null filters to malfunction completely - filters like 'exclude stocks
      with no rating' would be silently ignored, returning all stocks instead of filtering them
    derived_from_bd_id: BD-GAP-030
  - id: finance-C-267
    when: When implementing MCP tool boundary validation for stock scanning
    action: Enforce strict validation at MCP boundary including symbol normalization and rating list coercion; must not implement
      lenient validation that passes potentially invalid data to backend services
    severity: high
    kind: domain_rule
    modality: must
    consequence: Lenient validation allows malformed symbols and ratings to reach the backend, causing downstream processing
      errors, inconsistent query results, and potential data corruption in the stock database
    derived_from_bd_id: BD-GAP-031
  - id: finance-C-268
    when: When implementing or modifying queries that bridge feature store and scan results
    action: Maintain identical outer join structure between feature store and scan result queries; must not introduce schema
      divergence that causes different filtering behavior between the two query paths
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Schema divergence causes feature-store-backed and scan-result-backed scans to behave differently, breaking
      the unified filtering contract expected by callers and producing inconsistent trading signals
    derived_from_bd_id: BD-GAP-033
  - id: finance-C-269
    when: When implementing merge approval operations that may be retried due to network timeouts
    action: Reuse the same idempotency key for different merge operations - each distinct operation must use a unique idempotency
      key derived from operation-specific parameters
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Reusing idempotency keys across different operations causes merge to execute with wrong parameters from a
      previous operation, leading to data integrity violations or duplicate execution when keys collide
    derived_from_bd_id: BD-GAP-035
  - id: finance-C-270
    when: When implementing theme clustering for stock groupings
    action: Use average linkage with distance threshold calculated as 1 minus correlation coefficient; must not substitute
      single linkage or complete linkage without understanding the consequences
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Single linkage creates unbalanced chains of loosely connected themes while complete linkage fragments natural
      stock groupings, both leading to incorrect theme classifications and suboptimal portfolio construction
    derived_from_bd_id: BD-079
  - id: finance-C-271
    when: When auto-classifying L2 themes to L1 parents using cosine similarity
    action: Apply cosine similarity threshold of 0.65 for L2→L1 auto-classification decisions; threshold values below 0.5
      misclassify dissimilar themes while values above 0.8 require excessive similarity
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using incorrect similarity threshold causes themes to be grouped with semantically unrelated parents, degrading
      portfolio diversification accuracy and risk analysis quality
    derived_from_bd_id: BD-080
  - id: finance-C-272
    when: When calculating RS percentile ranking for stock relative strength comparison
    action: Calculate RS percentile as (stocks_below divided by total_stocks) multiplied by 100; must not use z-score normalization
      or raw RS values for cross-universe comparisons
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using raw RS or z-score normalization prevents valid comparison across different market conditions and stock
      universe sizes, leading to incorrect relative strength rankings and misguided trading signals
    derived_from_bd_id: BD-084
  - id: finance-C-273
    when: When classifying MA trend as flat in stage analysis for trading decisions
    action: Classify MA trend as flat when price change is less than 1% over a 20-day period; thresholds below 0.5% classify
      too many stocks as flat while values above 2% miss genuine flat consolidations
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Incorrect flat classification threshold causes stage transitions to be misidentified, leading to poorly timed
      entry and exit signals that significantly reduce strategy returns
    derived_from_bd_id: BD-085
  - id: finance-C-274
    when: When determining market context for provider routing decisions
    action: Default to US market when market identifier is None or unrecognized to verify graceful degradation; verify market
      context is correct before routing to prevent None propagation through downstream providers
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Routing stocks to wrong market due to incorrect default causes scan results to pull data from incorrect providers,
      resulting in missing price data and inaccurate stock analysis
    derived_from_bd_id: BD-090
  - id: finance-C-275
    when: When implementing embedding refresh or recompute logic for theme discovery
    action: Acquire the theme stale embedding lock via _acquire_theme_stale_embedding_lock() before starting recompute to
      prevent concurrent campaigns from corrupting each other's results
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Running concurrent embedding recompute without the distributed lock causes read-during-write corruption where
      stale embeddings overwrite fresh results or vice versa
    derived_from_bd_id: BD-GAP-040
  - id: finance-C-276
    when: When implementing scan cancellation propagation across Celery worker processes
    action: Poll the database using DbCancellationToken for cancellation status rather than relying on shared memory or async
      signals; account for polling interval lag
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using async signals for cross-process cancellation fails due to lack of shared memory between Celery workers,
      causing cancelled scans to continue executing
    derived_from_bd_id: BD-GAP-042
  - id: finance-C-278
    when: When modifying calibration profiles, pattern scoring thresholds, or rating category definitions
    action: Trace the full cascade chain BD-003 → BD-045 → BD-044 → BD-046 before making changes; adding calibration sensitivity
      bands around threshold boundaries prevents silent rating migrations across Strong Buy/Buy/Watch/Pass categories
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Changes to calibration profiles (BD-003) cascade through composite scores (BD-044) and pass thresholds (BD-045),
      systematically shifting stocks across rating boundaries without fundamental change, potentially converting Pass to Buy
      and generating inappropriate trading signals
    derived_from_bd_id: BD-111
  - id: finance-C-279
    when: When validating ticker symbols in the framework
    action: Verify that 1 consecutive failure threshold and 30-day lookback window match your trading universe requirements
      — low-volume symbols may never accumulate enough consecutive failures for reporting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Low-volume symbols that rarely get validated may never surface in failure reports even when genuinely broken,
      causing stale tickers to persist in the system undetected
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-280
    when: When implementing Minervini Stage 2 stock screening criteria
    action: Enforce 30% above 52-week low threshold AND within 25% of 52-week high — these thresholds encode specific market
      wizard teaching about accumulation patterns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying these thresholds without understanding their market wizard origin changes which stocks qualify
      as Stage 2 breakouts, causing backtest results to diverge from the strategy's documented teaching
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-281
    when: When configuring data-fetch tasks with Redis distributed locks
    action: Verify that lock TTL exceeds maximum expected fetch duration — default 2hr TTL may expire before large fetches
      complete, causing duplicate operations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Lock expiration during long fetches allows concurrent workers to trigger duplicate expensive operations,
      wasting resources and potentially causing data inconsistencies
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-282
    when: When implementing duplicate resolution logic for pipeline and canonical_key columns
    action: Assume canonical_key values are globally unique without deduplication — duplicate rows are resolved by keeping
      first row and appending _dup_<id> suffix
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Downstream systems assuming canonical_key uniqueness will encounter unexpected _dup_ suffixes, causing data
      integrity errors and failed lookups
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-283
    when: When designing access patterns for xui-reader local storage
    action: Use multi-process concurrent write access patterns against SQLite storage — SQLite WAL mode only supports single-writer
      with concurrent reads
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Multi-process writes to SQLite without proper locking causes database corruption, locked transactions, or
      data loss in concurrent access scenarios
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-284
    when: When loading selector overrides from TOML configuration files
    action: Validate override TOML syntax matches expected schema — override-wins merge policy requires specific field structure;
      malformed overrides are silently ignored
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Override syntax mismatches cause selectors to fall back to defaults unexpectedly, breaking page extraction
      without producing visible errors
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-285
    when: When configuring scan result retention policy per universe_key
    action: Verify that keep_count=3 provides sufficient historical comparison baseline — users needing scan history beyond
      3 most recent results will lose older data
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Retaining only 3 most recent scans prevents historical comparison and trend analysis, causing users to lose
      visibility into older but relevant scan results
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-286
    when: When implementing theme entity auto-merge workflows
    action: Limit wave 1 auto-merge to only highest-confidence identical pairs — ambiguous pairs must be queued for wave 2
      manual review
    severity: high
    kind: domain_rule
    modality: must
    consequence: Auto-merging ambiguous pairs without human judgment causes incorrect entity consolidation, corrupting theme
      cluster identities with no easy rollback
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-287
    when: When computing price change bounds for theme or watchlist visualization
    action: Verify that computing bounds across each stocks is acceptable for performance — large themes may experience slow
      bar chart rendering due to full aggregation
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Computing price bounds across all stocks in large themes causes expensive aggregation operations, degrading
      UI responsiveness during visualization
    derived_from_bd_id: BD-GAP-034
  - id: finance-C-288
    when: When implementing RS line new high comparison logic
    action: 'Use epsilon tolerance of 1e-12 when comparing current RS value against 252-day maximum: current >= max - 1e-12'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without 1e-12 epsilon tolerance, IEEE 754 floating-point representation artifacts cause mathematically equal
      RS values to fail equality checks, resulting in false negatives that miss genuine RS leadership breakthroughs
    derived_from_bd_id: BD-017
  - id: finance-C-289
    when: When implementing cup-with-handle pattern detection
    action: 'Enforce cup parameters: duration 6-65 weeks, depth 8-50%, recovery >= 90% — do not adjust these thresholds without
      retesting against historical performance'
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Changing cup parameters causes pattern misidentification: shallower cups lack meaningful base formation,
      shorter durations include V reversals, and lower recovery rates permit invalid cups that fail to reach prior highs'
    derived_from_bd_id: BD-019
  - id: finance-C-290
    when: When implementing cup shape validation
    action: Require curvature_balance >= 0.35 to distinguish U-shaped cups from V reversals — patterns below threshold must
      be rejected as invalid cups
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accepting cups with curvature_balance < 0.35 permits V-shaped reversals that lack sustained basing time for
      institutional accumulation, causing premature breakout signals from sharp reversals rather than genuine base breakouts
    derived_from_bd_id: BD-020
  - id: finance-C-291
    when: When implementing High-Tight Flag detection
    action: Require pole return >= 100% for HTF pattern classification — stocks with pole returns below 100% must not be flagged
      as HTF
    severity: high
    kind: domain_rule
    modality: must
    consequence: Flagging HTF patterns with pole returns below 100% includes normal uptrends lacking explosive institutional
      buying character, resulting in flag consolidation patterns that fail to continue higher after breakout
    derived_from_bd_id: BD-023
  - id: finance-C-292
    when: When implementing MA Alignment scoring algorithm
    action: 'Maintain weighted scoring structure: perfect alignment (40 points), trend health (30 points), 50-day MA position
      (30 points) — do not alter weight distribution without validating against stage identification accuracy'
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Modifying MA Alignment weight distribution causes incorrect market stage identification: equal weights undervalue
      the perfect stack signal, reducing the system''s ability to distinguish Stage 2 leadership from mixed markets'
    derived_from_bd_id: BD-073
  - id: finance-C-293
    when: When implementing universe backfill logic or modifying market inference algorithms
    action: Assume each symbols in a symbol set belong to the same market when processing mixed-market symbol collections
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Market inference logic assigns a single market to all symbols, causing incorrect market assignment for symbols
      in mixed-market sets, leading to wrong data routing and corrupted backfill results
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-294
    when: When implementing universe backfill logic for mixed-market symbol sets
    action: Explicitly specify market field for each symbol or validate that each symbols share the same market before triggering
      market inference
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit market specification, mixed-market symbol sets cause ambiguous market assignment, breaking
      downstream data processing and analytics
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-295
    when: When configuring or modifying the shutdown window scheduler
    action: Assume the shutdown window boundaries align correctly with actual system availability or user operational hours
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: If shutdown window clamp boundaries don't align with actual availability windows, the watch loop fails to
      execute during business hours, causing missed data collection and processing gaps
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-296
    when: When setting up shutdown window timing for XUI reader scheduler
    action: Verify shutdown window boundaries match actual business hours and system availability before activating the clamp_to_shutdown_wakeup
      function
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Misaligned window boundaries cause the watch loop to wake only at window end, missing critical data collection
      opportunities during active business hours
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-297
    when: When implementing or modifying breadth backfill query logic
    action: Request breadth data with date range exceeding 365 days in a single query
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Queries requesting more than 365 days of historical breadth data cause excessive execution time and storage
      growth, degrading system performance
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-298
    when: When implementing breadth backfill for long-horizon trend analysis
    action: Use pagination or multiple bounded queries to retrieve historical breadth data beyond 365 days, ensuring each
      query stays within the 365-day maximum window
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Long-horizon trend analysis requiring data beyond 365 days needs segmented queries to avoid DB strain and
      maintain acceptable query response times
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-299
    when: When implementing or configuring intraday data freshness detection logic
    action: Assume market close detection is reliable under each conditions without fallback validation
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: If market close detection fails, stale intraday data goes unflagged, causing next-day operations to use outdated
      price information and resulting in incorrect trading decisions
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-300
    when: When configuring intraday data refresh scheduling
    action: Implement fallback staleness check using time-based threshold (e.g., data older than 16 hours) when market close
      detection fails or is unavailable
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without time-based fallback, failed market close detection leaves intraday data flagged as fresh, corrupting
      next-day accuracy and strategy performance
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-301
    when: When implementing or modifying NR7InsideDay pattern detection scoring logic
    action: Modify NR7InsideDay quality_score beyond the cap of 65 or readiness_score beyond the cap of 70
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Raising quality or readiness caps above their calibrated limits causes single-day patterns to achieve scores
      comparable to multi-dimensional pattern analyses, breaking calibration integrity and causing misleading signal quality
      assessment
    derived_from_bd_id: BD-029
  - id: finance-C-302
    when: When implementing or modifying scan filter preset configurations in the technical analysis module
    action: Preserve the default value of VCP detection as True in scan filter presets to verify pattern richness is enabled
      by default
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the VCP detection default to False causes scan results to miss Volume-Price Confirmation patterns,
      potentially filtering out valid trading setups that rely on VCP confirmation
    derived_from_bd_id: BD-GAP-036
  - id: finance-C-303
    when: When using the framework's default VCP detection setting for production scans with SLA requirements
    action: Explicitly set vcp_enabled=False when scan SLAs require sub-second response times; verify actual latency meets
      requirements before deployment
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default VCP detection (enabled=True) causes scan response times to exceed sub-second SLA requirements due
      to computational overhead, breaking production latency contracts
    derived_from_bd_id: BD-GAP-036
  - id: finance-C-307
    when: When writing or calling any API endpoint in the frontend codebase
    action: Include the `/api` prefix in API path strings, since the axios baseURL already prepends it
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Docker deployments will produce duplicate `/api/api/v1/...` paths causing all API calls to return 404, breaking
      every feature that depends on the backend
  - id: finance-C-309
    when: When implementing or routing any external API call through Celery
    action: Route each external API calls to the data_fetch queue, not the general celery queue
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: External API tasks dispatched to the general celery queue bypass serialization and trigger rate-limit violations
      (yfinance 1 req/sec, Alpha Vantage 25 req/day, SEC EDGAR 10 req/sec), causing data fetches to fail and scans to stall
  - id: finance-C-310
    when: When making code changes to any Setup Engine component
    action: 'Execute each five quality gates in sequence before considering the work complete: gate-1 (detector correctness),
      gate-2 (temporal integrity), gate-3 (integration coverage), gate-4 (performance baselines), gate-5 (golden regression)'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without running all five gates, regressions in detector correctness, temporal alignment, integration completeness,
      performance, or visual output go undetected, corrupting the Setup Engine evaluation pipeline
  - id: finance-C-311
    when: When the agent decides work is finished and considers ending the session
    action: 'Complete the mandatory session-close workflow: (1) file issues for remaining work, (2) run quality gates if code
      changed, (3) close or update issue statuses, (4) pull --rebase, (5) git push to remote, (6) verify git status shows
      ''up to date with origin'', (7) clear stashes and prune remote branches'
    severity: high
    kind: rationalization_guard
    modality: must
    consequence: Ending the session before git push succeeds strands all work locally; changes never reach the remote repository,
      blocking collaborators, losing issue state in git-tracked beads, and creating divergent branch histories
  - id: finance-C-312
    when: When the agent faces push conflicts, network errors, or a long-running push
    action: Resolve the failure and retry the push until it succeeds, without stopping the session early or treating a failed
      push as acceptable completion
    severity: high
    kind: rationalization_guard
    modality: must
    consequence: Treating a failed push as acceptable completion abandons uncommitted work and leaves git-tracked issue state
      out of sync with the remote, requiring manual recovery in future sessions
  - id: finance-C-313
    when: When composing a market brief, watchlist review, or run-diff analysis using market-copilot
    action: Present data as live or real-time unless the MCP tool response freshness block explicitly supports that claim
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Representing stale or polled data as live misleads the user about market state; the market-copilot operates
      on polling intervals and after-close snapshots, not real-time streams
  - id: finance-C-314
    when: When producing an after-close brief using market-copilot
    action: 'Follow the fixed workflow order: (1) market_overview, (2) compare_feature_runs, (3) theme_state, (4) task_status,
      (5) watchlist_snapshot per requested watchlist, then optionally explain_symbol for the top mover'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping or reordering tool calls omits critical context (pipeline health, run diffs, theme state) and produces
      incomplete or misleading market briefs that omit gating signals like stale data or failed scheduled jobs
  - id: finance-C-315
    when: When the market-copilot receives a request that depends on pipeline freshness or scheduled jobs
    action: Call mcp_stockscreen_market_task_status to verify pipeline health before surfacing recommendations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping task_status causes the agent to make recommendations based on stale or missing scan data without
      alerting the user, leading to decisions made on outdated market signals
  - id: finance-C-316
    when: When the user requests adding a symbol to a watchlist using market-copilot
    action: Call watchlist_add unless the user has given explicit approval AND the tool response confirms writes are enabled
      on the server
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Calling watchlist_add against a read-only server (the default configuration) produces a tool error, breaks
      the agentic workflow, and violates the user's expectation that read operations are non-destructive
  - id: finance-C-317
    when: When the market-copilot MCP tool returns missing breadth data, failed tasks, or absent runs
    action: Surface these conditions as first-class response sections with explicit caveats, not as hidden footnotes or omitted
      from the summary
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Omitting missing data or failed tasks from the response output misleads users into assuming completeness;
      the response falsely appears authoritative despite gaps that should affect interpretation
  - id: finance-C-318
    when: When producing any market analysis or recommendation using market-copilot
    action: Replace or contradict MCP tool-provided facts with unsupported market opinions or generic market priors
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Overriding tool facts with generic market opinions corrupts the analytical output, removes traceability to
      source data, and violates the contract that conclusions are anchored to the latest published screening run
  - id: finance-C-319
    when: When building a market-copilot response from any MCP tool result
    action: Construct the response by prioritizing structured fields (summary, facts, freshness, citations, next_actions)
      before prose synthesis, and perform synthesis only after each required tool calls have completed
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Generating prose synthesis before all tool calls complete causes the response to reference incomplete data
      and lose the deterministic trace from tool results to output sections
  - id: finance-C-320
    when: When the market-copilot tool results show stale freshness or missing data
    action: Surface the tool-provided next_actions in the response instead of guessing or inventing follow-up steps
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Guessing next_actions when data is stale or missing replaces authoritative tool guidance with potentially
      incorrect agent speculation, misleading users about what actions are actually available
  - id: finance-C-321
    when: When a symbol recommendation is made within a market-copilot response
    action: Trace the recommendation to at least one MCP tool result citation in the response
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Untraced recommendations appear to originate from the agent's own analysis rather than the screening data,
      undermining the reproducibility and credibility of the market-copilot output
  - id: finance-C-322
    when: When performing theme scouting using market-copilot
    action: Call theme_state first to establish the theme narrative from current metrics and alerts before calling explain_symbol
      for individual constituents
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Explaining individual symbols before inspecting theme_state produces isolated analyses disconnected from
      the current theme narrative, reducing the coherence and actionability of theme-scouting output
  - id: finance-C-324
    when: When the user or task context implies watchlist modification
    action: Assume watchlist_add will succeed and use it without explicit user confirmation and write-enabled server confirmation
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Tool call fails silently or with an error, leaving the user with a broken action and no feedback, or writing
      to a read-only server corrupts user expectations
  - id: finance-C-325
    when: When the user's request depends on pipeline freshness or scheduled background jobs
    action: Skip calling task_status and assume the pipeline is healthy based on surface-level data appearance
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Analysis is based on a failed or stalled pipeline, producing incorrect results that appear valid but have
      no fresh backing, leading to misleading market conclusions
  - id: finance-C-327
    when: When market data is missing, tasks have failed, or runs are absent from the pipeline
    action: Bury missing breadth, failed tasks, or absent runs as footnotes or parenthetical notes instead of surfacing them
      as first-class outputs
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Critical data gaps are hidden in the response margins, causing the user to act on incomplete pipeline state
      and miss that the analysis is based on missing or failed data
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
