      summary: Poloniex uses ticker endpoint as authoritative source for pair mappings because official documentation does
        not expose pair string-to-ID mappings
    - id: BD-063
      type: BA/DK
      summary: BUY='buy', SELL='sell' constants must be normalized across ALL exchange mixins - inconsistent implementations
        exist
    - id: BD-070
      type: B/BA
      summary: Every exchanges use Symbols singleton pattern - must call Symbols.populated() check before symbol_mapping()
    - id: BD-073
      type: B/RC
      summary: timedelta_str_to_sec() hardcodes interval mappings - must update for new candle intervals
    - id: BD-001
      type: B/BA
      summary: Throttle default window of 60 seconds - allows 1 update per window, drops each others
    - id: BD-002
      type: B/BA
      summary: OHLCV default window of 300 seconds (5 minutes) for candle aggregation
    - id: BD-003
      type: B/BA
      summary: RenkoFixed default brick_size of 10 points
    - id: BD-022
      type: B/DK
      summary: VWAP calculation for OHLCV aggregation using price * amount sum
    - id: BD-035
      type: B/RC
      summary: 'Renko reversal logic: same-direction brick opens at prior close'
    - id: BD-036
      type: B/DK
      summary: 'VWAP normalization: divide by volume after aggregation window'
    - id: BD-045
      type: B
      summary: 'Book delta calculation: set difference for removed/added levels'
    - id: BD-GAP-003
      type: B/DK
      summary: Performance metrics collection uses exchange_filter pattern allowing selective enablement/disablement per exchange
    - id: BD-GAP-005
      type: BA
      summary: Order book testing tracks both message timestamp and receipt_timestamp to measure latency through the system
    - id: BD-065
      type: B/DK
      summary: Feed.connect() requires symbol conversion FROM normalized TO exchange format for WebSocket subscription
    - id: BD-072
      type: B/BA
      summary: NBBO._update() extracts bid@0 and ask@0 before calculating min/max - order book index(0) is architectural
    - id: BD-066
      type: B/BA
      summary: 'Subscription mutual exclusion: subscription= OR channels+symbols, not both - enforced in Feed.__init__'
    - id: BD-074
      type: BA
      summary: BackendCallback.to_dict() called with numeric_type and none_to - serialization contract for data transformation
    - id: BD-048
      type: B
      summary: Cython types for Trade, Ticker, Candle with freelist(128)
    - id: BD-004
      type: B
      summary: Snapshot interval of 1000 updates before writing a new snapshot for order books
    - id: BD-005
      type: B/BA
      summary: Snapshots only mode for order books - only writes complete snapshots, not deltas
    - id: BD-006
      type: B/BA
      summary: Redis ZSet default score_key='timestamp' for time-series data ordering
    - id: BD-007
      type: B/BA
      summary: Numeric type defaults to float for backend serialization
    - id: BD-008
      type: B
      summary: None values converted to 'None' string for Redis storage
    - id: BD-009
      type: B
      summary: AsyncIO queue for backend writes with configurable multiprocessing
    - id: BD-010
      type: B
      summary: Daemon process for multiprocess backend workers
    - id: BD-031
      type: B/BA
      summary: 'Postgres: batch insert with UniqueViolationError silently ignored'
    - id: BD-032
      type: B/DK
      summary: 'Postgres: custom_columns mapping for flexible schema adaptation'
    - id: BD-046
      type: B/BA
      summary: Backend multiprocessing disabled by default
    - id: BD-019
      type: B/RC
      summary: Binance request_limit of 20 requests per second
    - id: BD-020
      type: B/DK
      summary: Retry delay of 60 seconds for rate-limited requests
    - id: BD-033
      type: B/BA
      summary: 'Coinbase REST: candle max limit 300 rows per request'
    - id: BD-034
      type: B
      summary: 'Binance REST: trade aggregation limit 1000 per request'
    - id: BD-038
      type: B/DK
      summary: Receipt timestamp always recorded, exchange timestamp optional
    - id: BD-039
      type: B/DK
      summary: 'Raw data collection: each HTTP/WebSocket traffic captured to file'
    - id: BD-GAP-002
      type: T
      summary: Test data generation supports exchange-level filtering via only_exchange parameter to enable isolated testing
    - id: BD-GAP-007
      type: B
      summary: WebSocket testing reuses same callback signatures as other book/trade handlers, enforcing consistent event
        interface across transport layers
resources:
  packages:
  - name: requests
    version_pin: latest
  - name: websockets
    version_pin: latest
  - name: pyyaml
    version_pin: latest
  - name: aiohttp
    version_pin: latest
  - name: aiofile
    version_pin: latest
  - name: yapic.json
    version_pin: latest
  - name: uvloop
    version_pin: latest
  - name: order_book
    version_pin: latest
  - name: aiodns
    version_pin: latest
  - name: arctic
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install requests
    - python3 -m pip install websockets
    - python3 -m pip install pyyaml
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-004
    when: When running FeedHandler on Windows platforms
    action: install signal handlers via loop.add_signal_handler()
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: asyncio loop.add_signal_handler() is not supported on Windows, causing runtime errors and preventing feed
      orchestration
    stage_ids:
    - feed_orchestration
  - id: finance-C-016
    when: When initializing a WebSocket connection address
    action: use the wss:// protocol prefix for secure connections
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: WebSocket connections with non-wss addresses will raise ValueError and fail to establish, preventing any
      data feed from functioning
    stage_ids:
    - connection_management
  - id: finance-C-017
    when: When performing HTTP read/write operations
    action: check HTTP response status codes and raise for non-200 status
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Silent failure on HTTP error responses leads to data corruption and missing market data, as failed requests
      are not retried
    stage_ids:
    - connection_management
  - id: finance-C-026
    when: When handling connection lifecycle
    action: 'execute connection operations in the order: authenticate, subscribe, then message handler'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Executing operations out of order causes subscription failures and no data flow through the connection
    stage_ids:
    - connection_management
  - id: finance-C-031
    when: When implementing symbol mapping logic for exchange integration
    action: Check Symbols.populated(exchange_id) before calling symbol_mapping() to verify symbol data is available
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Attempting to access normalized_symbol_mapping before population causes KeyError or returns empty data, corrupting
      downstream data normalization
    stage_ids:
    - exchange_interface
  - id: finance-C-038
    when: When implementing exchange symbol normalization
    action: Implement both exchange_symbol_to_std_symbol and std_symbol_to_exchange_symbol conversion methods
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing either conversion method causes symbol lookup failures when processing incoming messages or building
      subscription messages
    stage_ids:
    - exchange_interface
  - id: finance-C-039
    when: When implementing new exchange feeds
    action: Define websocket_channels mapping from normalized channel names to exchange-specific channel identifiers
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing websocket_channels mapping prevents channel normalization and subscription message generation
    stage_ids:
    - exchange_interface
  - id: finance-C-040
    when: When implementing exchange-specific symbol parsing
    action: Override _parse_symbol_data classmethod to handle exchange-specific REST API response format
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrectly parsing symbol data causes wrong symbol normalization and data attribution to wrong trading pairs
    stage_ids:
    - exchange_interface
  - id: finance-C-050
    when: When creating data objects with numeric financial fields
    action: Use Decimal type for each price, amount, balance, and quantity fields
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Floating-point arithmetic causes rounding errors in financial calculations, leading to incorrect trade sizes,
      prices, and PnL figures
    stage_ids:
    - data_normalization
  - id: finance-C-052
    when: When implementing exchange data normalization
    action: Verify each data objects of the same type have identical field structure across each exchanges
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inconsistent field structures cause downstream consumers to fail when accessing expected fields, breaking
      callback contracts
    stage_ids:
    - data_normalization
  - id: finance-C-064
    when: When implementing order book data structures
    action: Use Decimal type for each price and quantity fields
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Floating-point arithmetic can cause incorrect price/quantity calculations, leading to wrong trading signals
      or corrupted order book state
    stage_ids:
    - book_processing
  - id: finance-C-065
    when: When validating sequence numbers from exchange messages
    action: Verify sequence numbers are validated as integers and increment by exactly 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing or out-of-order messages will corrupt the local order book state, causing stale or incorrect price
      levels to persist
    stage_ids:
    - book_processing
  - id: finance-C-067
    when: When handling order book delta messages before receiving a snapshot
    action: Ignore or buffer delta messages until a snapshot is received for that symbol
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Applying deltas to an uninitialized or stale book causes price levels to be added/removed incorrectly, corrupting
      book state
    stage_ids:
    - book_processing
  - id: finance-C-071
    when: When detecting missing sequence numbers
    action: Trigger book reset or reconnection to resynchronize state
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without resetting the book after a sequence gap, subsequent deltas are applied to a corrupted book state,
      compounding errors
    stage_ids:
    - book_processing
  - id: finance-C-076
    when: When initializing book state for a symbol
    action: Initialize _l2_book or _l3_book dict entry with a new OrderBook instance on snapshot receipt
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Skipping OrderBook instantiation causes AttributeError when applying deltas, or stale book state persists
    stage_ids:
    - book_processing
  - id: finance-C-080
    when: When implementing NBBO best bid calculation
    action: Use max() function on bid prices to find highest bid across exchanges
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using min() on bids would select the lowest bid instead of the highest, violating NBBO definition and causing
      trades to execute at suboptimal prices
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-081
    when: When implementing NBBO best ask calculation
    action: Use min() function on ask prices to find lowest ask across exchanges
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using max() on asks would select the highest ask instead of the lowest, violating NBBO definition and causing
      trades to pay more than necessary
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-082
    when: When extracting best bid/ask from exchange order book
    action: Use index(0) on sorted bid/ask collections to get top-of-book price and size
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using a different index level would fundamentally alter NBBO calculation, producing incorrect consolidated
      quotes that don't reflect true best prices
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-083
    when: When creating NBBO instance
    action: Initialize separate bid and ask dictionaries for each symbol to track per-exchange quotes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using a shared dictionary would cause exchange data to overwrite each other, resulting in NBBO reflecting
      only the last exchange to update
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-086
    when: When NBBO is subscribed with add_nbbo
    action: Subscribe each specified feeds to L2_BOOK channel for NBBO calculation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without L2_BOOK channel subscription, exchanges cannot provide order book data, resulting in NBBO that never
      updates
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-093
    when: When implementing BackendCallback serialization
    action: Call to_dict() with numeric_type and none_to parameters from self
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backend storage will receive data with wrong numeric types or missing None value handling, causing storage
      corruption and analytics errors
    stage_ids:
    - callback_dispatch
  - id: finance-C-094
    when: When implementing BackendBookCallback serialization
    action: Call to_dict() with numeric_type, none_to, and delta parameters from self
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Book snapshots and deltas will have incorrect numeric types or missing delta flags, breaking order book reconstruction
    stage_ids:
    - callback_dispatch
  - id: finance-C-096
    when: When invoking user callbacks
    action: Pass typed data object and receipt_timestamp as second argument
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: User callbacks will receive incorrect arguments, causing type errors or missing data in downstream processing
    stage_ids:
    - callback_dispatch
  - id: finance-C-101
    when: When invoking callbacks during feed lifecycle
    action: Propagate start() call to backend callbacks with event loop and multiprocess config
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Backend writers will never start, causing data to accumulate in queues indefinitely and never be written
    stage_ids:
    - callback_dispatch
  - id: finance-C-102
    when: When shutting down feed gracefully
    action: Propagate stop() call to backend callbacks to flush remaining queue data
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Queued data will be lost on shutdown, causing gaps in historical data and incomplete storage
    stage_ids:
    - callback_dispatch
  - id: finance-C-105
    when: When receiving backend callbacks that are not subclass instances
    action: Access attributes like numeric_type or none_to that only exist on BackendCallback subclasses
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: AttributeError will be raised for raw function callbacks, crashing the callback dispatch
    stage_ids:
    - callback_dispatch
  - id: finance-C-132
    when: When implementing websocket connection to exchange servers
    action: use wss:// prefix for secure WebSocket connections
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Insecure ws:// connections may expose sensitive trading data to network interception, leading to potential
      data corruption and security breaches
  - id: finance-C-133
    when: When parsing JSON responses from exchange APIs
    action: use yapic.json parser with parse_float=Decimal to preserve financial precision
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Floating-point rounding errors will corrupt price calculations, causing incorrect PnL reports and misaligned
      trading signals
  - id: finance-C-135
    when: When constructing typed data objects (Trade, Ticker, Candle) from normalized data
    action: verify price and amount fields are of Decimal type before passing to constructor
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-Decimal numeric types will cause assertion errors and prevent data from reaching callbacks, resulting
      in missing market data
  - id: finance-C-150
    when: When handling authenticated channels (BALANCES, ORDER_INFO, FILLS)
    action: verify API key and secret are provided before subscribing to authenticated channels
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Missing credentials will cause subscription failures and unauthorized errors, breaking private data feeds
  - id: finance-C-156
    when: When establishing WebSocket connections to exchanges
    action: Use wss:// prefix for each WebSocket addresses, never ws:// or unencrypted connections
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unencrypted WebSocket connections expose sensitive market data and authentication credentials to network
      interception, violating exchange API requirements
  - id: finance-C-178
    when: When implementing or modifying any exchange REST mixin class
    action: Verify BUY='buy' and SELL='sell' constants are defined and used consistently — every exchange mixin must import
      and use the canonical BUY/SELL defines, never introduce exchange-specific variations
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Per-exchange BUY/SELL variations cause cross-exchange code to misinterpret order directions, executing wrong
      trade directions on some exchanges while working correctly on others — trades may be placed on wrong sides of the market
    derived_from_bd_id: BD-063
  - id: finance-C-221
    when: When implementing REST API calls to Binance exchange
    action: Exceed 20 requests per second to the Binance API — implement request throttling with a token bucket or leaky bucket
      algorithm to maintain sustainable usage patterns
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Exceeding 20 rps triggers Binance's IP-based throttling or permanent ban, causing API access loss and complete
      failure of live trading strategies that rely on Binance market data
    derived_from_bd_id: BD-019
  regular:
  - id: finance-C-001
    when: When adding feeds to FeedHandler with multiple exchanges
    action: use EXCHANGE_MAP keys or Feed class instances via add_feed()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid feed specification will cause ValueError, preventing multiple exchanges from being added and started
      simultaneously
    stage_ids:
    - feed_orchestration
  - id: finance-C-002
    when: When calling FeedHandler.run() with default parameters
    action: expect the main thread to block until SIGINT/SIGTERM/SIGHUP or exception
    severity: high
    kind: domain_rule
    modality: must
    consequence: Application will hang indefinitely without proper signal handling or exception handling in the calling code
    stage_ids:
    - feed_orchestration
  - id: finance-C-003
    when: When implementing WebSocket-first connection architecture
    action: fall back to REST polling endpoints when WebSocket is unavailable
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Feed will fail to connect if no connection method is available, breaking multi-exchange coordination
    stage_ids:
    - feed_orchestration
  - id: finance-C-005
    when: When managing asyncio event loops with start_loop=False
    action: user must manually call loop.run_forever() after adding feeds
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Feeds will never start if user doesn't manually manage the event loop, causing the application to exit immediately
    stage_ids:
    - feed_orchestration
  - id: finance-C-006
    when: When configuring feeds with high subscription volumes
    action: use delay_start parameter to stagger feed starts and avoid 429 rate limit errors
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Exchange API rate limits (HTTP 429) will cause connection failures and feed restart cycles, impacting data
      collection
    stage_ids:
    - feed_orchestration
  - id: finance-C-007
    when: When connecting to multiple exchanges simultaneously
    action: use asyncio.gather() to coordinate concurrent connection tasks
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Feed connections will not start together, breaking the multi-exchange NBBO aggregation and data synchronization
    stage_ids:
    - feed_orchestration
  - id: finance-C-008
    when: When running FeedHandler from a child thread
    action: set install_signal_handlers=False and call setup_signal_handlers() from main thread
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Signal handlers cannot be installed from non-main threads, causing feed to crash on Unix or behave incorrectly
      on Windows
    stage_ids:
    - feed_orchestration
  - id: finance-C-009
    when: When using uvloop for feed orchestration
    action: prefer uvloop event loop policy for better async I/O performance
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Default asyncio event loop has higher overhead, potentially causing missed messages under high throughput
      conditions
    stage_ids:
    - feed_orchestration
  - id: finance-C-010
    when: When configuring connection timeout and retry parameters
    action: set timeout between 120-300 seconds for production feeds
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Too-short timeout will cause unnecessary connection restarts; timeout=-1 disables watchdog entirely
    stage_ids:
    - feed_orchestration
  - id: finance-C-011
    when: When processing feed data through callbacks
    action: perform CPU-intensive operations in callbacks
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Blocking callbacks will prevent other feed tasks from executing, causing data backlog and missed updates
    stage_ids:
    - feed_orchestration
  - id: finance-C-012
    when: When implementing NBBO aggregation across feeds
    action: use FeedHandler.add_nbbo() with L2_BOOK channel for best bid/ask aggregation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incompatible channel types will cause NBBO callback to receive malformed data, breaking cross-exchange price
      comparison
    stage_ids:
    - feed_orchestration
  - id: finance-C-013
    when: When claiming cryptofeed provides real-time trading capability
    action: present cryptofeed as a live trading or execution platform
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Cryptofeed is a data collection library that provides market data feeds with typical WebSocket polling delays;
      it does not execute trades
    stage_ids:
    - feed_orchestration
  - id: finance-C-014
    when: When claiming data completeness or accuracy guarantees
    action: promise complete or accurate orderbook state without sequence number validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Exchanges without sequence numbers, checksums, or snapshots-only mode may have missed messages causing incorrect
      orderbook state
    stage_ids:
    - feed_orchestration
  - id: finance-C-015
    when: When adding feeds after FeedHandler.run() has been called
    action: pass the event loop explicitly via the loop parameter
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Feed will not start if running=True and loop is not provided, causing missing market data subscriptions
    stage_ids:
    - feed_orchestration
  - id: finance-C-018
    when: When reading or writing on a connection
    action: verify connection is open before performing I/O operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attempting I/O on closed connections raises ConnectionClosed exception, causing data gaps and feed restart
      loops
    stage_ids:
    - connection_management
  - id: finance-C-019
    when: When configuring WebSocket connection options
    action: set ping_interval according to exchange-specific requirements
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exchanges that require specific ping intervals will disconnect clients that do not respond in time, causing
      service interruption
    stage_ids:
    - connection_management
  - id: finance-C-020
    when: When establishing WebSocket connections
    action: use the websockets library version 14.1 or higher
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Older websockets library versions have RFC compliance issues causing connection failures with strict exchanges
    stage_ids:
    - connection_management
  - id: finance-C-021
    when: When handling message processing exceptions
    action: log raw messages at ERROR level when log_on_error is enabled
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without message logging, debugging production data handling failures becomes impossible, delaying incident
      resolution
    stage_ids:
    - connection_management
  - id: finance-C-022
    when: When implementing message handling for exchanges
    action: respond to exchange-specific ping/pong messages at the application layer
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Exchanges like Huobi send pings every 5 seconds and will disconnect clients that do not respond, causing
      repeated reconnection cycles
    stage_ids:
    - connection_management
  - id: finance-C-023
    when: When reconnection is required after connection failure
    action: implement exponential backoff starting from 1 second delay
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without exponential backoff, rapid reconnection attempts trigger rate limits and worsen connection issues
    stage_ids:
    - connection_management
  - id: finance-C-024
    when: When encountering HTTP 429 rate limit responses
    action: wait for retry_delay seconds before retrying the request
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Ignoring rate limits causes permanent API bans, resulting in complete data feed loss
    stage_ids:
    - connection_management
  - id: finance-C-025
    when: When the feed does not receive messages within timeout
    action: close and restart the connection to detect silent failures
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Silent connection failures without timeout detection result in extended data gaps that go unnoticed
    stage_ids:
    - connection_management
  - id: finance-C-027
    when: When closing a connection
    action: set conn to None before awaiting close to prevent double-close race conditions
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Race conditions in connection closing cause spurious errors and resource leaks
    stage_ids:
    - connection_management
  - id: finance-C-028
    when: When initializing WebsocketEndpoint connection options
    action: merge user options with defaults, preserving default ping_interval=10s
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Overwriting default options causes missing ping_interval configuration, leading to exchange disconnections
    stage_ids:
    - connection_management
  - id: finance-C-029
    when: When claiming real-time data capabilities
    action: claim zero-latency data delivery to end users
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Cryptocurrency exchanges have inherent latency (network delays, exchange processing), claiming zero latency
      misleads users about data freshness
    stage_ids:
    - connection_management
  - id: finance-C-030
    when: When claiming data reliability guarantees
    action: claim 100% message delivery during reconnection events
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: During reconnection, message gaps are inevitable, claiming perfect delivery misleads users about data completeness
    stage_ids:
    - connection_management
  - id: finance-C-032
    when: When converting symbol strings to Symbol objects
    action: Verify symbol strings are already in correctly normalized format before passing to str_to_symbol()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing non-normalized exchange-specific symbol strings causes ValueError or incorrect Symbol object creation
      with wrong base/quote currency
    stage_ids:
    - exchange_interface
  - id: finance-C-033
    when: When implementing REST API time range queries
    action: Validate that start time is less than or equal to end time before making API calls
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing start time greater than end time causes incorrect query results or exchange API errors
    stage_ids:
    - exchange_interface
  - id: finance-C-034
    when: When creating Binance WebSocket subscription addresses
    action: Split subscriptions exceeding 200 pair/stream limit per connection into multiple connections
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding the exchange's per-connection stream limit causes subscription failures and missing market data
    stage_ids:
    - exchange_interface
  - id: finance-C-035
    when: When implementing REST API calls for rate-limited exchanges
    action: Implement retry logic with 60-second default delay when encountering HTTP 429 rate limit responses
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Ignoring rate limit responses causes API access to be blocked for extended periods, losing data feed continuity
    stage_ids:
    - exchange_interface
  - id: finance-C-036
    when: When implementing REST API request throttling
    action: Respect exchange-specific request_limit to avoid rate limit errors
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Ignoring per-exchange rate limits causes 429 errors and temporary API access loss
    stage_ids:
    - exchange_interface
  - id: finance-C-037
    when: When implementing Binance futures or delivery REST mixins
    action: Inherit from BinanceRestMixin and override only the differing methods and API endpoints
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reimplementing the entire mixin causes code duplication and inconsistency in authentication/signature logic
    stage_ids:
    - exchange_interface
  - id: finance-C-041
    when: When implementing candle subscription intervals
    action: Validate candle interval against exchange-specific valid_candle_intervals set
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using unsupported candle intervals causes exchange API errors and failed subscriptions
    stage_ids:
    - exchange_interface
  - id: finance-C-042
    when: When implementing Binance spot subscription addresses
    action: Convert symbols to lowercase before including in WebSocket stream URL
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using uppercase symbols in subscription URL causes exchange to reject the stream subscription
    stage_ids:
    - exchange_interface
  - id: finance-C-043
    when: When implementing authenticated exchange channels
    action: Separate private and public channel subscriptions into distinct feed instances
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Mixing private and public channels in single feed causes connection errors and authentication failures
    stage_ids:
    - exchange_interface
  - id: finance-C-044
    when: When implementing REST order validation
    action: Enforce that limit orders must specify price and time_in_force, market orders must not specify price
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid order parameters cause exchange API rejection and failed order placement
    stage_ids:
    - exchange_interface
  - id: finance-C-045
    when: When claiming exchange interface capabilities
    action: Claim real-time data delivery since WebSocket connections use polling with inherent network latency
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting WebSocket data as real-time misleads users about data freshness, especially during high-volatility
      periods
    stage_ids:
    - exchange_interface
  - id: finance-C-046
    when: When presenting exchange interface data collection results
    action: Present historical REST API query results as live trading signals or execution proof
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting historical data collection as live trading evidence violates user expectations and may violate
      financial regulations
    stage_ids:
    - exchange_interface
  - id: finance-C-047
    when: When implementing Bithumb exchange integration
    action: Override symbol_mapping() because Bithumb has no REST endpoint for symbol reference information
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using default symbol_mapping causes KeyError since Bithumb requires special ticker-based symbol discovery
    stage_ids:
    - exchange_interface
  - id: finance-C-048
    when: When implementing order book depth intervals for Binance
    action: Validate depth_interval parameter against valid_depth_intervals set {100ms, 1000ms}
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using invalid depth interval causes exchange to reject subscription and data feed failure
    stage_ids:
    - exchange_interface
  - id: finance-C-049
    when: When implementing exchange REST mixins
    action: Use Decimal for each monetary values (price, amount, quantity) in API requests and responses
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using float for monetary values causes rounding errors leading to incorrect order quantities or prices
    stage_ids:
    - exchange_interface
  - id: finance-C-051
    when: When type assertions are enabled at compile time
    action: Pass only correct types to data object constructors
    severity: high
    kind: domain_rule
    modality: must
    consequence: AssertionError is raised when passing incorrect types, breaking data normalization pipeline if type validation
      is expected but not guaranteed
    stage_ids:
    - data_normalization
  - id: finance-C-053
    when: When validating timestamps in data objects
    action: Use float type for timestamp fields or None if timestamp is missing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid timestamp types cause comparison failures, sorting errors, and incorrect time-based calculations
      in downstream processing
    stage_ids:
    - data_normalization
  - id: finance-C-054
    when: When building cryptofeed from source
    action: Assume type validation is enabled by default
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Type validation is disabled by default (CYTHON_WITHOUT_ASSERTIONS is set), allowing invalid types to pass
      silently, causing subtle bugs in production
    stage_ids:
    - data_normalization
  - id: finance-C-055
    when: When checking runtime type validation status
    action: Check COMPILED_WITH_ASSERTIONS flag before relying on type validation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Code that assumes type validation is active may miss invalid data when assertions are disabled, leading to
      silent data corruption
    stage_ids:
    - data_normalization
  - id: finance-C-056
    when: When converting exchange messages to typed data objects
    action: Convert string numeric values to Decimal before passing to constructors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing string values directly causes AssertionError (when assertions enabled) or silent type mismatches
      when disabled, breaking data normalization
    stage_ids:
    - data_normalization
  - id: finance-C-057
    when: When debugging data normalization issues
    action: Access raw exchange messages via the raw field for inspection
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Missing raw field access makes it difficult to diagnose data normalization errors and validate field mapping
      correctness
    stage_ids:
    - data_normalization
  - id: finance-C-058
    when: When storing or transmitting normalized data
    action: Use to_dict() method for serialization, not direct field access
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct field access bypasses numeric_type conversion, potentially causing type mismatches in storage backends
      that expect native types
    stage_ids:
    - data_normalization
  - id: finance-C-059
    when: When modifying OrderBook objects after creation
    action: Modify readonly fields like exchange, symbol, or book in non-OrderBook types
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Cython readonly fields cannot be modified after object creation; attempts will raise AttributeError in compiled
      code
    stage_ids:
    - data_normalization
  - id: finance-C-060
    when: When relying on type validation for data correctness
    action: Claim that enabled type validation guarantees data values are correct
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Type validation only checks types (Decimal, float, str), not value ranges or business logic correctness;
      invalid values within correct types will pass validation
    stage_ids:
    - data_normalization
  - id: finance-C-061
    when: When presenting normalized data as exchange-verified truth
    action: Claim that normalized data objects are identical to exchange-provided data
    severity: low
    kind: claim_boundary
    modality: must_not
    consequence: Normalization inherently transforms data (symbol mapping, timestamp conversion, type coercion); raw field
      preserves original but normalized form may differ
    stage_ids:
    - data_normalization
  - id: finance-C-066
    when: When processing L2 book delta updates
    action: Interpret size=0 as instruction to delete the price level from the book
    severity: high
    kind: domain_rule
    modality: must
    consequence: Price levels with zero size will incorrectly remain in the book, causing stale orders to influence trading
      decisions
    stage_ids:
    - book_processing
  - id: finance-C-068
    when: When configuring checksum validation
    action: Consider enabling checksum validation only when data integrity is critical, as it adds 10-100 microseconds per
      update
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: High-frequency trading systems may experience increased latency with checksum validation enabled on all updates
    stage_ids:
    - book_processing
  - id: finance-C-069
    when: When selecting book depth levels
    action: Consider that higher max_depth values increase processing time per message
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Excessive book depth causes increased memory usage and slower update processing, degrading feed performance
    stage_ids:
    - book_processing
  - id: finance-C-070
    when: When receiving messages from exchanges without validation mechanisms
    action: Assume order book integrity without sequence numbers, checksums, or snapshots
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Exchanges without validation provide no guarantee that all messages were received or that the book state
      is correct, leading to unreliable data
    stage_ids:
    - book_processing
  - id: finance-C-072
    when: When handling checksum validation failures
    action: Log checksum mismatches when validation is enabled and raise BadChecksum exception
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unlogged checksum failures allow corrupted book state to persist, causing incorrect price data in downstream
      applications
    stage_ids:
    - book_processing
  - id: finance-C-073
    when: When subscribing to Coinbase L3 book data
    action: Enable L3 books for Coinbase to enable sequence number validation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without L3 books, Coinbase sequence validation does not work, making it impossible to detect missing messages
    stage_ids:
    - book_processing
  - id: finance-C-074
    when: When using dYdX exchange
    action: Enable cross_check=True on dYdX to avoid crossed books due to offset-based ordering
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: dYdX uses offsets that monotonically increase but are not strict sequence numbers, potentially causing crossed
      books without cross-checking
    stage_ids:
    - book_processing
  - id: finance-C-075
    when: When processing order book callbacks
    action: Use book_callback method to assign sequence_number, checksum, delta, and timestamp before invoking callbacks
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing book_callback means callbacks receive OrderBook objects without proper metadata, breaking downstream
      data consumers
    stage_ids:
    - book_processing
  - id: finance-C-077
    when: When maintaining book state across connections
    action: Track sequence numbers per symbol or per connection as specified for the exchange
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Improper sequence tracking causes false positives for missing messages or allows actual gaps to go undetected
    stage_ids:
    - book_processing
  - id: finance-C-078
    when: When logging checksum mismatches
    action: Distinguish between missing validation support and actual checksum failures
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Reporting checksum errors on exchanges without checksum support creates false alarms and reduces trust in
      monitoring systems
    stage_ids:
    - book_processing
  - id: finance-C-079
    when: When presenting order book data
    action: Claim real-time data accuracy for websocket-based feeds subject to network delays
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Network latency, exchange-side delays, and polling intervals mean order book data is not truly real-time;
      presenting it as such misleads users
    stage_ids:
    - book_processing
  - id: finance-C-084
    when: When passing NBBO updates to callbacks
    action: Include the source exchange identifier for both bid and ask in the callback parameters
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Without exchange identification, users cannot determine which exchange contributed to the NBBO, preventing
      latency analysis and exchange attribution
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-085
    when: When receiving order book updates from exchanges
    action: Store stale exchange quotes without expiration or staleness tracking
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Outdated exchange quotes would remain in NBBO calculation after an exchange goes offline, producing stale
      NBBO that doesn't reflect current market conditions
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-087
    when: When calculating NBBO updates for identical consecutive quotes
    action: Suppress duplicate callback invocations when both best bid and best ask remain unchanged
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without deduplication, callbacks would be invoked for every exchange update even when NBBO hasn't changed,
      wasting CPU cycles and network bandwidth
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-088
    when: When measuring NBBO update latency
    action: Propagate receipt timestamp from source exchange through to NBBO callback
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without timestamp propagation, users cannot measure the time from exchange message receipt to NBBO delivery,
      preventing latency analysis and SLA verification
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-089
    when: When using NBBO callback with synchronous user functions
    action: Execute synchronous callbacks in a thread pool executor to avoid blocking the event loop
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Blocking synchronous callbacks would halt all feed processing, causing message backlog and potential connection
      drops from exchanges
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-090
    when: When handling NBBO initialization with no exchange data yet
    action: Return early and suppress callback when either best bid or best ask is None
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invoking callback with None values would propagate invalid data to downstream systems, potentially causing
      trading algorithms to use uninitialized state
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-091
    when: When claiming NBBO update frequency capabilities
    action: Claim real-time NBBO updates with zero latency when using websocket polling architecture
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Cryptofeed uses websocket connections with inherent polling delays - claiming zero-latency would mislead
      users about actual update speed
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-092
    when: When comparing NBBO backtest results with live trading
    action: Present NBBO backtest fills as guaranteed live execution prices
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: NBBO represents best bid/ask prices at specific moments - actual execution prices depend on order size, market
      impact, and slippage not captured in NBBO
    stage_ids:
    - nbbo_aggregation
  - id: finance-C-095
    when: When serializing data with missing exchange timestamp
    action: Populate timestamp field with receipt_timestamp fallback value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Data stored without timestamp information becomes unqueryable by time, breaking time-series analysis and
      backtesting
    stage_ids:
    - callback_dispatch
  - id: finance-C-097
    when: When configuring backend callbacks
    action: Set numeric_type and none_to attributes on backend callback instance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backend will pass None values to to_dict() causing type errors or fail to convert None to specified replacement
      value
    stage_ids:
    - callback_dispatch
  - id: finance-C-098
    when: When invoking book callbacks
    action: Handle snapshot_count tracking for snapshot_interval logic
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Snapshot interval logic will malfunction causing excessive or missing snapshots, breaking order book continuity
    stage_ids:
    - callback_dispatch
  - id: finance-C-099
    when: When implementing BackendQueue.start()
    action: Guard against double-starting to prevent duplicate writers and queues
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Multiple backend writers will cause duplicate data writes, queue exhaustion, and memory leaks
    stage_ids:
    - callback_dispatch
  - id: finance-C-100
    when: When configuring multiprocess backend mode
    action: Set worker Process as daemon to prevent zombie processes
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Non-daemon worker processes will block shutdown, causing resource leaks and inability to exit cleanly
    stage_ids:
    - callback_dispatch
  - id: finance-C-103
    when: When processing callbacks with mixed async/sync functions
    action: Detect async functions using inspect.iscoroutinefunction and await accordingly
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Sync callbacks invoked without run_in_executor will block the event loop, preventing concurrent message processing
    stage_ids:
    - callback_dispatch
  - id: finance-C-104
    when: When invoking callbacks
    action: Iterate over each registered callbacks for the data type
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: User-registered callbacks will not be invoked, breaking multi-subscriber patterns and data distribution
    stage_ids:
    - callback_dispatch
  - id: finance-C-106
    when: When routing data to callbacks
    action: Verify typed data objects (Trade, Ticker, OrderBook) are passed, not raw dicts
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Backend callbacks expecting typed objects with to_dict() will fail with AttributeError, breaking storage
      pipeline
    stage_ids:
    - callback_dispatch
  - id: finance-C-107
    when: When providing callbacks to Feed
    action: Wrap user functions in Callback class for consistent async/sync handling
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Sync functions will block the event loop without the Callback wrapper's executor handling
    stage_ids:
    - callback_dispatch
  - id: finance-C-108
    when: When using cryptofeed data for trading decisions
    action: Claim real-time trading capability - feed data is delayed and normalized
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Trading systems built on delayed feed data will execute at stale prices, causing losses
    stage_ids:
    - callback_dispatch
  - id: finance-C-109
    when: When presenting backtest results from callback data
    action: Claim callback-processed data is equivalent to live trading conditions
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtests will misrepresent live performance due to callback processing delays and async handling differences
    stage_ids:
    - callback_dispatch
  - id: finance-C-110
    when: When tempted to bypass Callback wrapper for simple functions
    action: Skip Callback wrapper to save import - sync functions will block the event loop
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Event loop will block on sync callbacks, preventing concurrent connection handling and causing message backlogs
    stage_ids:
    - callback_dispatch
  - id: finance-C-111
    when: When tempted to remove BackendQueue.start() guard
    action: Skip started flag check to simplify code - double-initialization will corrupt data
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Multiple writers will produce duplicate data, exhaust queue capacity, and corrupt storage integrity
    stage_ids:
    - callback_dispatch
  - id: finance-C-112
    when: When tempted to skip stop() propagation on shutdown
    action: Skip callback.stop() to simplify shutdown - queued data will be lost
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Data in backend queues will not be flushed before process exit, causing permanent data loss
    stage_ids:
    - callback_dispatch
  - id: finance-C-113
    when: When implementing a backend callback class
    action: Prevent multiple calls to start() to avoid creating multiple writer instances and queues
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling BackendQueue.start() multiple times creates multiple queue writers, causing duplicate data writes,
      race conditions on shared resources, and potential memory leaks from orphaned workers
    stage_ids:
    - backend_storage
  - id: finance-C-114
    when: When storing numeric values to backends
    action: Convert numeric types explicitly using the numeric_type parameter before storage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Numeric values stored without proper type conversion may cause precision loss, storage errors in typed databases,
      or incorrect sorting in ordered collections like Redis sorted sets
    stage_ids:
    - backend_storage
  - id: finance-C-115
    when: When processing backend queue shutdown
    action: Handle SHUTDOWN_SENTINEL to properly drain and terminate queue writers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper sentinel handling, in-flight data in the queue is lost during shutdown, and worker tasks may
      hang indefinitely instead of gracefully terminating
    stage_ids:
    - backend_storage
  - id: finance-C-116
    when: When configuring BackendQueue multiprocess mode
    action: Use multiprocess=True with multiprocessing.Pipe for true parallelism, multiprocess=False with asyncio.Queue for
      single-process async I/O
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using multiprocess=False for high-throughput workloads causes GIL contention, blocking the event loop and
      creating backpressure that leads to queue overflow and data loss
    stage_ids:
    - backend_storage
  - id: finance-C-117
    when: When writing book data to Arctic storage
    action: Use Arctic for high-throughput book data storage
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Arctic cannot handle high-throughput book data as documented, causing severe performance degradation, memory
      exhaustion, and potential data loss due to write bottlenecks
    stage_ids:
    - backend_storage
  - id: finance-C-118
    when: When selecting a backend storage system
    action: Choose specified storage backend based on data type and throughput requirements
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: 'Mismatched backend selection leads to performance degradation: low-throughput backends cannot handle book
      data volume, while specialized backends may have unnecessary overhead for low-frequency data'
    stage_ids:
    - backend_storage
  - id: finance-C-119
    when: When configuring Kafka backend producer
    action: Set specified acks and request_timeout_ms values for data durability requirements
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without proper acks configuration, messages may be lost during broker failures. Low timeout values cause
      RequestTimedOutError and silent message drops
    stage_ids:
    - backend_storage
  - id: finance-C-120
    when: When using MongoDB backend
    action: Set numeric_type explicitly if numeric precision is required, as MongoDB backend defaults to str
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: MongoDB backend defaults numeric_type to str, causing numeric values to be stored as strings, which breaks
      range queries, sorting, and mathematical operations
    stage_ids:
    - backend_storage
  - id: finance-C-121
    when: When configuring OHLCV aggregation
    action: Set window parameter to match analysis requirements, aware that window=300s is the default
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Incorrect window configuration causes data loss from dropped updates (Throttle) or misaligned candles (OHLCV),
      invalidating downstream analysis
    stage_ids:
    - backend_storage
  - id: finance-C-122
    when: When stopping a feed with backend callbacks
    action: Allow sufficient time for backend queue drain before forcing shutdown
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Forcing immediate shutdown without queue drain loses data that has been received but not yet written to storage,
      causing gaps in historical data
    stage_ids:
    - backend_storage
  - id: finance-C-123
    when: When handling database unique constraint violations
    action: Expect and silently handle UniqueViolationError during feed restart due to exchange re-publishing
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Without catching UniqueViolationError, restart scenarios fail with database errors, preventing data recovery
      and requiring manual intervention
    stage_ids:
    - backend_storage
  - id: finance-C-124
    when: When implementing backend writer loop
    action: Check self.running flag in the writer loop condition to enable graceful shutdown
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Writer loops without self.running check cannot be stopped gracefully, causing orphaned processes or tasks
      that consume resources after shutdown
    stage_ids:
    - backend_storage
  - id: finance-C-125
    when: When creating a backend callback class
    action: Define default_key class attribute to specify the storage key prefix
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing default_key causes AttributeError at runtime when the backend tries to construct storage keys, breaking
      data storage entirely
    stage_ids:
    - backend_storage
  - id: finance-C-126
    when: When subclassing BackendQueue
    action: Implement async writer() method that reads from self.read_queue() context manager
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing or incorrectly implemented writer() causes NotImplementedError or silent data loss as data never
      reaches storage backend
    stage_ids:
    - backend_storage
  - id: finance-C-127
    when: When validating socket backend protocol
    action: Validate protocol prefix at initialization time, not at connection time
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Invalid protocol detection at runtime causes confusing errors in the connection loop instead of failing fast
      at configuration time
    stage_ids:
    - backend_storage
  - id: finance-C-128
    when: When storing book data to backends
    action: Include receipt_timestamp for traceability and debugging of data pipeline latency
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing receipt_timestamp prevents debugging of data pipeline delays, correlation of data across exchanges,
      and detection of latency issues in the storage layer
    stage_ids:
    - backend_storage
  - id: finance-C-129
    when: When claiming reliability for backend storage
    action: Claim exactly-once delivery semantics for any backend storage system
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backend storage does not provide transactional exactly-once delivery guarantees; network partitions, broker
      failures, or queue overflows can cause message loss
    stage_ids:
    - backend_storage
  - id: finance-C-130
    when: When using OHLCV aggregation for trading decisions
    action: Rely on OHLCV aggregation as primary data source when exchange provides native candle data
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Using aggregated trade data misses exchange-provided candle metadata, may have timing discrepancies, and
      adds unnecessary processing overhead
    stage_ids:
    - backend_storage
  - id: finance-C-131
    when: When using Throttle aggregation
    action: Claim Throttle preserves each updates during high-volume periods
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Throttle drops updates that arrive within the window interval, causing data loss during high-frequency market
      activity
    stage_ids:
    - backend_storage
  - id: finance-C-134
    when: When converting exchange-specific symbol strings to normalized format
    action: parse symbol into base/quote components using hyphen separator and validate against exchange symbol mapping
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched symbol formats will cause data from wrong trading pairs to be attributed incorrectly, corrupting
      historical records and analytics
  - id: finance-C-136
    when: When normalizing timestamps to UTC float representation
    action: convert each exchange timestamps to UTC timezone-aware datetime before extracting float timestamp
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect timezone handling will cause temporal misalignment of data across exchanges, corrupting time-series
      analysis and backtesting results
  - id: finance-C-137
    when: When processing order book snapshot and delta messages
    action: maintain bid price < ask price invariant and track sequence numbers for ordering validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Crossed books indicate stale data or race conditions, causing incorrect best bid/ask calculations and potential
      order execution at wrong prices
  - id: finance-C-138
    when: When aggregating best bid/ask quotes from multiple exchanges for NBBO
    action: update NBBO state only when best bid or best ask changes from previous value
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unfiltered NBBO updates will cause excessive callback invocations, overwhelming downstream systems and wasting
      CPU cycles on redundant data
  - id: finance-C-139
    when: When handling 429 rate limit responses from exchange APIs
    action: implement exponential backoff retry with delay before reconnection attempts
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Ignoring rate limits will result in IP bans, causing complete data feed disruption and loss of market visibility
  - id: finance-C-140
    when: When transferring order book snapshots to callback dispatch
    action: include raw message bytes in OrderBook.raw field for audit and replay purposes
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing raw data prevents debugging of parsing issues and recreating exact order book state, hindering incident
      investigation
  - id: finance-C-141
    when: When writing normalized data to storage backends
    action: convert Decimal types to specified numeric_type (float/str) before serialization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Storing Decimal objects in JSON-incompatible backends will cause serialization failures and data loss
  - id: finance-C-142
    when: When invoking user callbacks with typed data objects
    action: handle both async and sync callback functions by wrapping sync callbacks in executor
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling sync callbacks directly from async context blocks the event loop, causing all other coroutines to
      stall and potentially timeout connections
  - id: finance-C-143
    when: When processing connection timeout monitoring
    action: reset timeout watchdog timer on each received message to avoid premature connection restarts
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Premature reconnections caused by stale timeout timers will create data gaps and increase load on exchange
      rate limits
  - id: finance-C-144
    when: When enabling raw data collection for debugging
    action: process raw bytes through raw_data_callback after JSON parsing to avoid double-counting
    severity: low
    kind: operational_lesson
    modality: must_not
    consequence: Duplicate raw data collection will inflate storage requirements and create confusion during replay debugging
  - id: finance-C-145
    when: When calculating National Best Bid and Offer across exchanges
    action: use highest bid price and lowest ask price from different exchanges, tracking source exchange for each
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect NBBO calculation will generate false arbitrage signals, leading to unprofitable trades and wasted
      fees
  - id: finance-C-146
    when: When using HTTPPoll for REST polling with multiple addresses
    action: cycle through each configured addresses sequentially before repeating
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Skipped or duplicated polling of addresses will cause gaps or duplicates in time-series data
  - id: finance-C-147
    when: When subscribing to L2_BOOK channel for NBBO aggregation
    action: subscribe with L2_BOOK channel (not L3_BOOK) to receive aggregated price levels
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Individual order-level data (L3) cannot be directly compared for NBBO, causing calculation failures
  - id: finance-C-148
    when: When deserializing OrderBook from persisted data using from_dict
    action: reconstruct OrderBook with bid/ask dictionaries containing price-to-size mappings
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect order book reconstruction will produce invalid price levels and corrupt best bid/ask calculations
  - id: finance-C-149
    when: When validating order book checksums when checksum_validation is enabled
    action: raise BadChecksum exception if computed checksum does not match received checksum
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid checksums indicate message corruption or replay attacks, and processing corrupted books will corrupt
      downstream analytics
  - id: finance-C-151
    when: When converting Candle data to dictionary for storage
    action: preserve closed flag indicating whether candle interval is complete
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing or incorrect closed flag will cause incomplete candle data to be mixed with complete candles, corrupting
      historical OHLCV analysis
  - id: finance-C-152
    when: When working with symbols across any exchange feed or data structure
    action: Use normalized symbol format BASE-QUOTE (e.g., BTC-USD, ETH-USD) for spot, BASE-QUOTE-EXPIRY for futures, BASE-QUOTE-PERP
      for perpetual contracts, and BASE-QUOTE-STRIKE-EXPIRY-TYPE for options
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Exchange-specific symbol formats vary (e.g., BTCUSD, BTC-USDT, BTC/USDT), causing subscription failures or
      data corruption when mismatched symbols are used across feeds
  - id: finance-C-153
    when: When normalizing trade side values from any exchange API response
    action: Normalize trade sides to lowercase 'buy' and 'sell' using defines.BUY and defines.SELL constants, regardless of
      the exchange's native side representation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Exchange APIs return sides in different formats (e.g., 'BUY'/'SELL', 'b'/'s', 'bid'/'ask'), causing inconsistent
      behavior in trading strategies and downstream processing logic
  - id: finance-C-154
    when: When accessing symbol mappings for any exchange
    action: Check Symbols.populated(exchange_id) returns True before calling Symbols.get(exchange_id) or accessing normalized_symbol_mapping
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Accessing unpopulated Symbols singleton raises KeyError, causing feed initialization to fail at runtime with
      cryptic error messages
  - id: finance-C-155
    when: When configuring a Feed subscription
    action: Supply subscription parameter OR (channels AND symbols) parameter combination, never both simultaneously
    severity: high
    kind: domain_rule
    modality: must
    consequence: Feed initialization raises ValueError when both subscription and channels+symbols are provided, preventing
      the feed from starting
  - id: finance-C-157
    when: When implementing BackendCallback.to_dict() for any backend storage adapter
    action: Accept numeric_type and none_to keyword arguments to support type coercion and null value handling during dictionary
      conversion
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Backend callbacks fail when receiving data types that don't support the expected conversion parameters, causing
      data loss and storage failures
  - id: finance-C-158
    when: When processing order book updates in BackendBookCallback
    action: Check snapshots_only flag BEFORE processing delta updates, and write snapshots when snapshot_interval threshold
      is reached
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect ordering causes delta-only updates without corresponding snapshots, leading to order book state
      corruption and unreliable market data
  - id: finance-C-159
    when: When extending candle interval support in cryptofeed
    action: Update timedelta_str_to_sec() mappings in util/time.py to include new interval string-to-seconds conversions
    severity: medium
    kind: domain_rule
    modality: must
    consequence: New candle intervals silently fail to convert to seconds, causing timing errors in candle data retrieval
      and historical backfill operations
  - id: finance-C-160
    when: When implementing NBBO best bid/offer aggregation
    action: Extract best bid and ask using index(0) method on order book bids/asks to get (price, size) tuple at level 0
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect level extraction returns wrong price levels, causing NBBO calculation to report stale or incorrect
      best prices across exchanges
  - id: finance-C-161
    when: When using Decimal for monetary calculations in cryptofeed
    action: Use Decimal type for each price, amount, quantity, and balance fields to avoid floating-point precision errors
      in financial calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point float representation causes rounding errors in price/quantity calculations, leading to incorrect
      order sizing and balance discrepancies
  - id: finance-C-162
    when: When adding new exchange implementations to cryptofeed
    action: Implement each NotImplemented abstract class attributes (id, websocket_endpoints, rest_endpoints, _parse_symbol_data,
      websocket_channels, request_limit) on the Exchange subclass
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing abstract attributes cause AttributeError at runtime when Feed attempts to use the exchange, preventing
      data subscription
  - id: finance-C-163
    when: When processing timestamps from cryptocurrency exchange APIs
    action: Normalize each timestamps to UTC timezone using astimezone(timezone.utc).timestamp() before storage or computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Exchanges report timestamps in various formats and timezones, causing time-series misalignment and incorrect
      temporal ordering of market events
  - id: finance-C-164
    when: When claiming or advertising capabilities of systems built on cryptofeed
    action: Claim that cryptofeed provides real-time order execution, algorithmic trading, or automated trade placement —
      cryptofeed is a market data library only
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users may build trading systems expecting live execution capability, leading to unauthorized trades, financial
      losses, and regulatory compliance violations
  - id: finance-C-165
    when: When using cryptofeed for historical data analysis or backtesting
    action: Claim that REST API historical data retrieval is equivalent to real-time data feed — historical data may have
      gaps, different aggregation methods, and rate limits
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtesting results appear artificially profitable due to historical data limitations, causing live trading
      losses when gaps or aggregation differences affect signal quality
  - id: finance-C-166
    when: When using cryptofeed for latency-sensitive high-frequency trading applications
    action: Claim that cryptofeed's WebSocket polling-based architecture meets sub-millisecond latency requirements — it is
      unsuitable for HFT systems requiring custom network optimization
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: HFT strategies fail to execute profitably due to message processing overhead, Python GIL limitations, and
      network latency in WebSocket polling architecture
  - id: finance-C-167
    when: When using cryptofeed with non-cryptocurrency markets
    action: Claim that cryptofeed supports equities, forex, commodities, or other non-cryptocurrency markets — it only supports
      cryptocurrency exchanges
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Integration with traditional finance systems fails due to incompatible data formats, missing instrument types,
      and unsupported market structures
  - id: finance-C-168
    when: When validating order book data integrity on exchanges without sequence numbers or checksums
    action: Enable checksum_validation=True or sequence number checking on supported exchanges to detect missing messages
      and order book corruption
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without validation mechanisms, missing WebSocket messages cause order book state drift, leading to incorrect
      pricing signals and trading losses
  - id: finance-C-169
    when: When configuring candle intervals for exchange feeds
    action: Use only intervals from the exchange's valid_candle_intervals list — invalid intervals raise ValueError during
      feed initialization
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Feed fails to start with ValueError, causing data collection pipeline interruptions and missing historical
      candles
  - id: finance-C-170
    when: When subscribing to authenticated data channels (ORDER_INFO, FILLS, TRANSACTIONS, BALANCES, POSITIONS)
    action: Provide valid key_id and key_secret authentication credentials — channels reject subscriptions without valid credentials
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Authenticated channels fail to subscribe without API keys, causing missing account data and failed trade
      tracking
  - id: finance-C-171
    when: When handling callbacks in user-defined callback functions
    action: Keep callback execution time minimal and use async libraries where possible — heavy callbacks block the event
      loop and cause message processing delays
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Blocking callbacks cause message queue buildup, missed updates, increased latency, and potential WebSocket
      disconnection from exchanges
  - id: finance-C-172
    when: When processing book data (L2_BOOK, L3_BOOK) for many symbols
    action: Split subscriptions across multiple add_feed() calls or enable multiprocessing backend mode to avoid single-process
      bottlenecks
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Single-process book processing saturates CPU, causing message queue buildup, dropped updates, and missed
      trades on high-volume symbols
  - id: finance-C-173
    when: When using WebSocket connection ping_interval configuration
    action: Set ping_interval to 10 seconds (the default) or explicitly configure connection keepalive to maintain WebSocket
      connection health
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Exchanges close idle WebSocket connections after 60-120 seconds without ping/pong, causing data gaps and
      reconnection delays
  - id: finance-C-174
    when: When configuring order book depth with max_depth parameter
    action: Set max_depth to non-zero values only when needed — unnecessary depth trimming increases CPU processing time per
      update
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Depth trimming overhead compounds with high message rates, causing event loop saturation on book-heavy feeds
  - id: finance-C-175
    when: When implementing order book persistence logic
    action: Implement snapshot interval tracking that writes a new snapshot after exactly 1000 updates — must track update
      count and trigger snapshot at threshold, not per-update or time-based
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reducing snapshot interval below 1000 increases Redis I/O overhead with each additional write cycle; increasing
      it extends recovery point objective with up to 999 updates potentially lost on crash
    derived_from_bd_id: BD-004
  - id: finance-C-176
    when: When configuring throttling behavior for NBBO aggregation
    action: Verify that the 60-second throttle window matches strategy requirements — for intraday or high-frequency strategies,
      explicitly configure a shorter window or disable throttling to capture each price updates
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Strategies relying on fine-grained intraday signals silently lose all but one update per 60-second window,
      creating material divergence between backtested and live trading performance that accumulates over time
    derived_from_bd_id: BD-001
  - id: finance-C-177
    when: When configuring aggregation parameters for backtesting or live trading
    action: Verify that OHLCV window=300 and Throttle window=60 match strategy requirements — for sub-minute strategies, explicitly
      specify non-default window values; do not rely on default aggregation windows
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Strategies requiring sub-minute granularity silently use 5-minute OHLCV bars, distorting backtest results;
      strategies requiring real-time updates silently drop all but one update per 60 seconds, causing signal loss in live
      trading
    derived_from_bd_id: BD-067
  - id: finance-C-179
    when: When implementing or modifying BackendQueue callback implementations
    action: Change the multiprocess=False default in BackendQueue.start() — the Queue-based IPC mechanism is architecturally
      coupled to callback serialization requirements and threading model; any change requires full migration path for each
      BackendCallback subclasses
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Changing multiprocess=True switches IPC from Queue to Pipe, breaking pickle-based serialization assumptions
      in existing callback implementations and requiring complete rewrite of threading model and inter-process communication
      patterns
    derived_from_bd_id: BD-064
  - id: finance-C-180
    when: When processing data feeds in production trading systems
    action: Assume the framework implements stale data detection and automatic expiry — the framework does not currently track
      data freshness or implement expiry policies; data may persist indefinitely without validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without stale data detection, expired or corrupted data continues to propagate through the system causing
      trading decisions to be based on outdated information, potentially resulting in significant financial losses
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-181
    when: When implementing feed data ingestion in production trading systems
    action: 'Implement staleness detection using timestamps: track last_update_time per symbol and mark data as stale when
      age exceeds configured threshold (e.g., 5x normal update interval); implement explicit data expiry policy to remove
      or flag stale data'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without staleness detection, stale data causes downstream systems to make trading decisions on outdated prices,
      leading to execution at stale quotes and potential losses when market conditions change
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-182
    when: When implementing any iterative or convergence-based algorithm
    action: Assume the framework defines convergence criteria — convergence thresholds, maximum iterations, and tolerance
      values must be explicitly declared in strategy or model code; the framework does not provide implicit convergence definitions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit convergence criteria, iterative algorithms may run indefinitely producing unpredictable
      results, or terminate prematurely yielding inaccurate calculations that propagate through trading decisions
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-183
    when: When implementing any iterative or convergence-based algorithm
    action: 'Define and document explicit convergence criteria including: max_iterations (integer), tolerance threshold (float),
      and convergence_check_interval (integer); validate convergence status after each iteration and log termination reason'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Iterative algorithms without explicit convergence criteria may produce non-reproducible results or run indefinitely,
      causing backtest-live inconsistencies where the same algorithm yields different outputs across runs
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-184
    when: When implementing data storage or retrieval for regulatory reporting
    action: Assume the framework supports point-in-time data retrieval — the framework does not currently implement timestamp-based
      data versioning or point-in-time recovery capabilities; data retrieval returns current state only
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time data availability, the system cannot reconstruct historical states required for regulatory
      audits, compliance verification, or dispute resolution, causing potential regulatory violations and legal exposure
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-185
    when: When implementing data storage for trading systems with compliance requirements
    action: 'Implement point-in-time data capability using timestamp-based versioning: store data with effective_from and
      effective_to timestamps; implement as_of(timestamp) retrieval method to reconstruct historical state; maintain audit
      trail for each data modifications'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without point-in-time data, regulatory audits cannot verify historical order states, price data, or trading
      decisions at specific timestamps, resulting in compliance failures and potential regulatory penalties
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-186
    when: When implementing connection handling logic in FeedHandler
    action: Maintain exactly 10 retry attempts for failed connections — do not reduce or increase the retry count without
      assessing the network failure recovery requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reducing retries below 10 causes transient network failures to become permanent connection failures, causing
      data gaps; increasing retries indefinitely blocks restart under permanent failures
    derived_from_bd_id: BD-016
  - id: finance-C-187
    when: When configuring Binance WebSocket subscriptions in the exchange handler
    action: Exceed 1024 streams per WebSocket connection — the Binance API enforces a hard limit of 1024 streams per connection
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Subscribing beyond 1024 streams causes server-side rejection errors, preventing data ingestion from the affected
      subscriptions
    derived_from_bd_id: BD-018
  - id: finance-C-188
    when: When using Redis ZSet for time-series data ordering with default score_key='timestamp'
    action: Verify timestamp-based scoring handles identical timestamp ordering correctly — within identical timestamps, ordering
      is lexicographic and secondary ordering is undefined
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without understanding lexicographic ordering within identical timestamps, cross-feed time queries may return
      inconsistent ordering across data reloads, causing analysis reproducibility issues
    derived_from_bd_id: BD-006
  - id: finance-C-189
    when: When serializing numeric data to Redis backends using default float type
    action: Verify float precision is acceptable for the use case — large integers may lose sub-unit accuracy during float
      serialization and deserialization
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Float serialization silently truncates sub-unit precision for large integers, causing subtle data corruption
      in financial calculations that require exact decimal representation
    derived_from_bd_id: BD-007
  - id: finance-C-190
    when: When implementing historical candle retrieval for OKX exchange
    action: Verify end timestamp is exclusive (add 1ms) and start timestamp is inclusive (subtract 1ms) to prevent duplicate
      candle boundaries from overlapping time ranges
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect timestamp boundaries cause duplicate candle data at query edges, inflating backtest counts and
      distorting historical analysis results
    derived_from_bd_id: BD-043
  - id: finance-C-191
    when: When FeedHandler pauses for slow callbacks with AsyncIO queue backend
    action: Implement explicit backpressure control to prevent queue overflow cascade — do not rely solely on callback pauses,
      as queue buildup continues while workers cannot drain messages
    severity: high
    kind: operational_lesson
    modality: must
    consequence: FeedHandler pause mechanism amplifies queue pressure rather than relieving it; slow callbacks cause queue
      buildup, memory growth, and potential message loss under backpressure
    derived_from_bd_id: BD-079
  - id: finance-C-192
    when: When analyzing order book depth using level count and volume tracking
    action: Track both price level count and volume aggregation separately — these provide different market structure insights
      and should not be conflated
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Exchanges may change depth reporting format (L2 vs L3); conflating level count with volume aggregation causes
      depth analysis to break silently when exchange reporting changes
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-193
    when: When implementing pagination logic for Binance REST historical trade queries
    action: Verify pagination handles batches of 1000 trades maximum per request, implementing cursor-based pagination for
      queries spanning more than 1000 trades
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Batches exceeding 1000 trades per request will trigger API errors or truncated responses, causing historical
      data gaps and incomplete backtesting datasets
    derived_from_bd_id: BD-034
  - id: finance-C-194
    when: When implementing order book delta calculation logic
    action: Use set difference computation to identify removed and added levels between previous and current book snapshots,
      requiring both states to be available
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using full snapshot comparison instead of set difference introduces overhead and may produce incorrect delta
      encodings, leading to wrong book state reconstruction
    derived_from_bd_id: BD-045
  - id: finance-C-195
    when: When implementing Redis storage for real-time and historical data access patterns
    action: Use Redis stream structure for real-time data consumption and Redis ZSet for historical range queries — both structures
      must be written to simultaneously
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using a single storage structure breaks either real-time consumption or historical queries, as access patterns
      fundamentally differ between use cases
    derived_from_bd_id: BD-047
  - id: finance-C-196
    when: When configuring candle interval for data aggregation across different exchanges
    action: Verify that '1m' candle interval is natively supported by the target exchange API; if not supported, implement
      client-side aggregation or use an alternative supported interval
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Assuming universal 1-minute candle support causes silent data gaps for exchanges without native 1m candles,
      corrupting historical analysis and backtesting results
    derived_from_bd_id: BD-011
  - id: finance-C-197
    when: When implementing real-time candle-based trading strategies or triggers
    action: Verify candle_closed_only=True default behavior; if partial candle observation is needed for live analysis, explicitly
      configure candle_closed_only=False and handle revision logic
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: With candle_closed_only=True, the current incomplete candle period is not observable until closure, causing
      missed trading opportunities for strategies requiring immediate candle data
    derived_from_bd_id: BD-012
  - id: finance-C-198
    when: When configuring max_depth parameter for order book data ingestion in long-running processes
    action: Set max_depth to a finite value based on available memory constraints; validate that max_depth=0 is intentional
      only for short-lived debugging sessions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: With max_depth=0, memory usage grows unbounded with large order books, potentially causing memory exhaustion
      and process termination in long-running backtesting or trading processes
    derived_from_bd_id: BD-013
  - id: finance-C-199
    when: When implementing order book latency profiling and performance analysis
    action: Verify clock synchronization between feed sources before relying on receipt_timestamp for latency analysis; implement
      clock skew detection or use NTP-synchronized timestamps
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Clock synchronization issues between feed sources cause receipt_timestamp to produce incorrect latency measurements,
      leading to false performance conclusions and misallocated optimization efforts
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-200
    when: When configuring snapshot persistence behavior in cryptofeed
    action: Understand that snapshot_interval parameter is IGNORED when snapshots_only=True; in snapshots_only mode, every
      update triggers an immediate full snapshot write regardless of the interval setting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting snapshot_interval to reduce write frequency has no effect when snapshots_only=True, causing unexpected
      high disk I/O and confusion about actual persistence behavior that differs from documented configuration
    derived_from_bd_id: BD-077
  - id: finance-C-201
    when: When processing symbols from external data sources before passing to feed subscription
    action: Convert each symbols to BASE-QUOTE hyphen-separated format (e.g., BTC-USDT) for internal representation before
      using in the framework; do not pass native exchange symbols directly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-normalized symbol formats causes cross-exchange symbol matching failures and prevents proper subscription
      to exchange channels, resulting in missing market data
    derived_from_bd_id: BD-025
  - id: finance-C-202
    when: When loading configuration in cryptofeed applications
    action: 'Verify the expected configuration source is being used by checking the cascading priority: explicit dict > config
      file > CRYPTOFEED_CONFIG env var > code defaults; environment variable changes require process restart to take effect'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Configuration loading from unexpected source (e.g., stale environment variable or default values instead
      of intended config file) causes runtime behavior that differs from deployment expectations
    derived_from_bd_id: BD-027
  - id: finance-C-203
    when: When calling Feed.connect() with symbols for WebSocket subscription
    action: Convert symbols FROM internal normalized format TO exchange-specific format before passing to connect(); WebSocket
      subscriptions require exchange-specific symbol formats (e.g., 'BTCUSDT' not 'BTC-USDT')
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing normalized BASE-QUOTE format symbols directly to connect() causes WebSocket subscription failures
      with exchange rejection of malformed symbol strings, preventing market data reception
    derived_from_bd_id: BD-065
  - id: finance-C-204
    when: When configuring feed initialization in cryptofeed
    action: Monitor the startup sequence when delay_start=0 to avoid triggering exchange rate limits on rapid sequential feed
      starts; implement staggered initialization if more than 3 feeds are started simultaneously
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Starting feeds with zero delay may trigger exchange rate limits, causing data feed failures and missed market
      data that leads to incorrect trading decisions
    derived_from_bd_id: BD-042
  - id: finance-C-205
    when: When implementing order book update processing for Binance derivatives
    action: Implement integer sequence validation to detect message gaps and duplications; handle sequence wraps at 2^63-1,
      resets on reconnect, and set a tolerance window of 100 sequence numbers for legitimate gaps during high-frequency updates
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing sequence validation allows message gaps or replay attacks to corrupt order book state, causing strategies
      to trade on stale or manipulated data
    derived_from_bd_id: BD-053
  - id: finance-C-206
    when: When configuring open interest polling for Binance futures
    action: Set polling interval between 1-5 seconds for open interest monitoring; implement an alert when polling interval
      exceeds 5 seconds to detect rate limit compliance issues or connection problems
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Polling intervals outside the 1-5 second range either consume excessive API quota or miss significant open
      interest changes that indicate market moves, causing strategies to trade on outdated position data
    derived_from_bd_id: BD-054
  - id: finance-C-207
    when: When implementing open interest change detection logic
    action: Use Decimal comparison with zero tolerance for open interest equality checks; do not use floating-point equality
      or percentage-based threshold comparisons
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-exact comparison causes false positives triggering unnecessary market analysis or false negatives missing
      significant position changes, leading to incorrect trading signals
    derived_from_bd_id: BD-056
  - id: finance-C-208
    when: When parsing JSON responses from exchange APIs containing financial fields
    action: Use Decimal type for each financial fields (price, quantity, volume) during JSON deserialization; do not rely
      on default float parsing which causes precision loss that propagates through calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Float parsing loses precision in financial calculations, causing rounding errors that accumulate in P&L calculations
      and position sizing, resulting in strategies producing incorrect trading signals
    derived_from_bd_id: BD-058
  - id: finance-C-209
    when: When determining order side (buy/sell) from exchange responses
    action: Use case-insensitive string comparison for side determination; accept 'buy', 'BUY', 'Buy', 'sell', 'SELL', 'Sell'
      as valid values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Case-sensitive comparison rejects valid exchange responses with non-standard capitalization, causing order
      processing failures and missed trade executions
    derived_from_bd_id: BD-059
  - id: finance-C-210
    when: When implementing open interest cache lookups for Binance futures
    action: Use exact symbol key matching with proper delimiter formatting (e.g., 'BTC-USDT-PERPETUAL'); validate key format
      against exchange naming conventions before cache operations
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Incorrect key formatting causes cache misses, resulting in repeated API calls and stale open interest data
      that leads to wrong position size calculations
    derived_from_bd_id: BD-062
  - id: finance-C-211
    when: When initializing cryptofeed with subscription parameters
    action: Provide both subscription= and channels+symbols parameters simultaneously; Feed configuration validation rejects
      any initialization with both parameter sets populated
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Providing both subscription parameter styles creates undefined behavior for duplicate channel subscriptions,
      causing unpredictable feed behavior and data inconsistencies
    derived_from_bd_id: BD-066
  - id: finance-C-212
    when: When accessing symbol mappings in cryptofeed
    action: Call Symbols.populated() and verify it returns True before calling symbol_mapping(); handle KeyError exceptions
      as initialization failures
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accessing symbol_mapping() without checking Symbols.populated() raises KeyError exceptions, causing the application
      to crash during symbol resolution and preventing any trading operations
    derived_from_bd_id: BD-070
  - id: finance-C-213
    when: When calculating NBBO (National Best Bid and Offer) in order matching or price validation logic
    action: Use only the best bid at index 0 and best ask at index 0 for NBBO calculation — must NOT use depth-weighted or
      volume-weighted pricing that incorporates multiple price levels
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching to volume-weighted NBBO would change the calculated fair price, causing order matching at incorrect
      prices and breaking exchange API alignment assumptions built into the framework
    derived_from_bd_id: BD-072
  - id: finance-C-214
    when: When implementing matrix operations in feed_orchestration stage
    action: Assume the framework handles matrix ill-conditioning and stability checks — the framework does not implement matrix
      condition number validation or numerical stability checks
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without matrix stability checks, ill-conditioned matrices in state transitions or aggregations produce numerically
      unstable results, causing cumulative rounding errors that silently corrupt feed processing calculations
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-215
    when: When implementing numerical operations involving matrices in feed_orchestration stage
    action: Implement matrix condition number validation before critical operations; use SVD decomposition to check singular
      values and apply regularization when condition number exceeds threshold (typically >1e10)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ill-conditioned matrices without stability checks produce numerically unstable results; regularization prevents
      overflow and NaN propagation in feed calculations
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-216
    when: When implementing state transition logic in feed_orchestration stage
    action: Assume the framework validates transition matrix time-homogeneity — the framework does not implement time-homogeneity
      checks for transition matrices
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Non-homogeneous transition matrices evolve unpredictably over time, causing backtest results to diverge from
      live trading behavior as market regime shifts are not detected
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-217
    when: When validating transition matrices in feed_orchestration stage
    action: Implement chi-square test or Cramer-von Mises test to validate transition matrix time-homogeneity; compare empirical
      transition frequencies against expected stationary distribution using Kolmogorov-Smirnov test
    severity: high
    kind: domain_rule
    modality: must
    consequence: Time-varying transition matrices without homogeneity validation cause regime change detection failures, leading
      to strategies using stale state estimates that underperform in shifting markets
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-218
    when: When implementing Redis read operations in persistence stage
    action: Explicitly decode 'None' string back to Python None object on Redis read operations — do not treat 'None' string
      as a valid value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit decoding, 'None' string values are misinterpreted as valid string data, causing downstream
      logic to receive string 'None' instead of null, leading to incorrect filtering and comparison logic
    derived_from_bd_id: BD-008
  - id: finance-C-219
    when: When implementing backend write operations in persistence stage
    action: Maintain AsyncIO queue for backend writes to decouple data ingestion from persistence; implement queue depth monitoring
      and backpressure handling to prevent unbounded memory growth
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Removing AsyncIO queue or blocking writes synchronously causes feed processing to stall during slow backend
      operations, reducing throughput and potentially causing message backlog that corrupts real-time data ordering
    derived_from_bd_id: BD-009
  - id: finance-C-220
    when: When configuring OHLCV candle aggregation in nbbo_aggregation stage
    action: Verify that the 300-second (5-minute) OHLCV default window matches strategy requirements; be aware that partial
      candles at window boundaries are discarded until the window completes, creating look-ahead-free aggregation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 5-minute OHLCV windows may lack sufficient granularity for high-frequency strategies while wasting
      storage for low-frequency strategies; window misalignment with strategy timeframe causes systematic data lag
    derived_from_bd_id: BD-002
  - id: finance-C-222
    when: When implementing Trade, Ticker, or Candle type definitions in cryptofeed
    action: Use Python Decimal type for each price and amount fields — do not replace with float or other numeric types
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using float for financial values introduces rounding errors that accumulate in pricing calculations; float
      precision is insufficient for exact financial arithmetic, potentially causing penny-level discrepancies that violate
      regulatory precision requirements
    derived_from_bd_id: BD-049
  - id: finance-C-223
    when: When configuring Binance depth aggregation in backtesting
    action: Verify that depth interval matches actual API subscription capabilities and strategy requirements — the default
      '100ms' increases bandwidth and processing overhead; confirm this granularity is necessary or adjust to '1000ms' if
      coarser data suffices
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 100ms depth interval by default increases data volume and processing overhead proportionally; strategies
      optimized on high-granularity data may perform differently when live trading uses lower-frequency updates, causing backtest-live
      divergence
    derived_from_bd_id: BD-017
  - id: finance-C-224
    when: When implementing dynamic exchange management or adding/removing exchanges from the trading system
    action: Update exchange_filter patterns in performance metrics configuration whenever exchanges are added, removed, or
      modified to verify consistent metric collection
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without synchronizing exchange_filter with the exchange registry, metrics collection becomes inconsistent
      across exchanges, leading to incomplete performance monitoring that may hide system issues or give false positives
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-225
    when: When implementing or consuming WebSocket event handlers in the trading system
    action: Validate that WebSocket response schemas contain each fields present in REST response schemas before using uniform
      callback signatures — implement schema compatibility checks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using uniform callback signatures without schema validation causes silent data loss when WebSocket introduces
      protocol-specific fields not present in REST responses, breaking data processing pipelines
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-226
    when: When calculating or reporting PnL in the trading system
    action: Assume PnL calculations are conservation-compliant without explicit validation — do not assume realized_pnl +
      unrealized_pnl equals total_pnl without runtime verification
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without PnL conservation validation, accounting discrepancies remain undetected until audit or settlement,
      potentially causing significant financial reconciliation issues
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-227
    when: When implementing PnL calculation logic
    action: 'Implement PnL conservation validation: after each position update, assert that realized_pnl + unrealized_pnl
      equals total_pnl within floating-point tolerance (threshold: 0.001 currency units)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without conservation validation, rounding errors or calculation bugs compound silently, leading to incorrect
      portfolio valuations and potentially significant financial loss
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-228
    when: When implementing train/test data split logic for backtesting
    action: Assume train/test time split maintains data integrity without explicit boundary enforcement — do not assume temporal
      ordering or non-overlapping datasets without validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit time split integrity checks, data leakage between train and test sets invalidates model
      evaluation results, leading to strategies that overfit and fail in live trading
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-229
    when: When implementing train/test data split logic
    action: 'Implement time split integrity validation: assert train_end_time < test_start_time, validate no timestamps overlap,
      and log split boundaries for audit trail'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without train/test integrity validation, future data may leak into training periods causing look-ahead bias,
      making backtest results unrealistically optimistic compared to live performance
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-230
    when: When designing or evaluating backtesting strategies
    action: Assume backtest results reflect live trading performance without overfitting protection mechanisms — do not rely
      on single train/test split results for strategy acceptance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without overfitting protection, strategies optimized on historical data exhibit severe performance degradation
      in live trading, causing significant financial losses from false confidence
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-231
    when: When evaluating backtesting strategy performance
    action: 'Implement overfitting protection: use walk-forward optimization or out-of-sample validation; require minimum
      sample size ratio of 3:1 (in-sample to out-of-sample); track performance degradation ratio between train and test periods'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without overfitting protection, strategies tuned to historical patterns fail catastrophically in live trading
      as market regimes shift, causing losses that exceed backtested drawdowns
    derived_from_bd_id: BD-GAP-015
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
