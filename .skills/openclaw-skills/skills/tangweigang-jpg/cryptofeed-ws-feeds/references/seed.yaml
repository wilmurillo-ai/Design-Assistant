anti_patterns:
- id: AP-CRYPTO-TRADING-001
  title: Float Arithmetic for Monetary Values
  description: Using Python float type instead of Decimal for price, amount, balance, PnL, and other financial calculations
    causes precision errors due to binary floating-point representation. Rounding errors compound across multiple calculations,
    leading to incorrect order sizing, wrong profit/loss reporting, and potentially incorrect trading decisions or tax calculations.
  project_source: rotki, hummingbot, cryptofeed, ccxt
  severity: high
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
- id: AP-CRYPTO-TRADING-002
  title: Missing Market Initialization Before Access
  description: Attempting to access market data via symbol lookups before load_markets() is called leaves self.markets empty,
    causing KeyError or BadSymbol exceptions on all trading operations and data retrieval. This breaks the entire trading
    workflow at the first market interaction.
  project_source: ccxt
  severity: high
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
- id: AP-CRYPTO-TRADING-003
  title: Bypassing API Facade Layer
  description: Directly accessing internal service methods without routing through the RestAPI facade bypasses authentication,
    task tracking, and error handling mechanisms. Anonymous requests can execute privileged operations, creating critical
    security vulnerabilities where unauthorized users access sensitive financial data or execute trades.
  project_source: rotki
  severity: high
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
- id: AP-CRYPTO-TRADING-004
  title: Non-Checksummed EVM Addresses
  description: Passing lowercase or mixed-case Ethereum addresses to RPC nodes causes InvalidAddress exceptions since nodes
    enforce EIP-55 checksum format. This results in RemoteError failures that halt all blockchain data collection for the
    affected chain, with no graceful degradation or fallback.
  project_source: rotki
  severity: high
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
- id: AP-CRYPTO-TRADING-005
  title: Unvalidated Collateral for Order Execution
  description: Submitting orders without checking collateral requirements including order cost, percent fees, and fixed fees
    against available balance causes orders to exceed margin. This triggers immediate liquidation or forced position closure
    at unfavorable prices with partial or total loss of collateral.
  project_source: hummingbot
  severity: high
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
- id: AP-CRYPTO-TRADING-006
  title: Close Order Placed Before Open Order Fills
  description: Placing a close order before verifying the open order is fully filled causes mismatched position sizes. The
    executor attempts to close a larger or smaller position than actually exists, leading to unintended directional exposure
    and potential losses exceeding the configured risk parameters.
  project_source: hummingbot
  severity: high
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
- id: AP-CRYPTO-TRADING-007
  title: Arbitrage Across Non-Interchangeable Tokens
  description: Executing arbitrage trades between tokens that appear similar but are not interchangeable causes permanent
    loss of funds. The received tokens cannot be used to close the opposing position, stranding capital and creating one-sided
    exposure with no recovery path.
  project_source: hummingbot
  severity: high
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
- id: AP-CRYPTO-TRADING-008
  title: Skipping Triple Barrier Evaluations
  description: Omitting control_stop_loss, control_take_profit, or control_time_limit calls in the control_barriers cycle
    leaves positions unprotected. Losses exceed configured thresholds as barrier checks never trigger, positions remain open
    beyond risk tolerance, resulting in amplified losses.
  project_source: hummingbot
  severity: high
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
- id: AP-CRYPTO-TRADING-009
  title: Applying Order Book Deltas Before Snapshot
  description: Processing order book delta messages before receiving a snapshot for the symbol applies updates to an uninitialized
    or stale book state. Price levels are incorrectly added/removed, corrupting the local book representation with no way
    to recover without full reset.
  project_source: cryptofeed
  severity: high
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
- id: AP-CRYPTO-TRADING-010
  title: Silent HTTP Error Handling
  description: Ignoring non-200 HTTP response status codes without raising exceptions causes silent failures for data requests.
    Market data is missing or corrupted, failed requests are not retried, and downstream consumers receive incomplete data
    with no indication of failure.
  project_source: cryptofeed
  severity: medium
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
- id: AP-CRYPTO-TRADING-011
  title: Missing Sequence Number Validation
  description: Not validating that order book sequence numbers increment by exactly 1 allows out-of-order or missing messages
    to corrupt local book state. Stale or incorrect price levels persist in the book, leading to wrong trading signals and
    corrupted market depth data.
  project_source: cryptofeed
  severity: medium
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
- id: AP-CRYPTO-TRADING-012
  title: Wrong Position Key for Perpetual Modes
  description: Using trading_pair only as the position key in HEDGE mode causes different position sides to collide and overwrite
    each other. Position tracking becomes incorrect, leading to wrong order matching and potential financial loss when the
    system misidentifies position direction.
  project_source: hummingbot
  severity: medium
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
- id: AP-CRYPTO-TRADING-013
  title: Overwriting User-Customized Event Classifications
  description: Re-decoding operations silently replace user-modified events marked as CUSTOMIZED without explicit user action.
    User edits to event classifications are permanently lost, causing incorrect accounting treatment and potential tax reporting
    errors that may not be detected until audit.
  project_source: rotki
  severity: medium
  applicable_to_tags:
    markets:
    - crypto
    activities:
    - crypto-trading
  _source_file: anti-patterns/crypto-trading.yaml
cross_project_wisdom:
- wisdom_id: CW-CRYPTO-TRADING-001
  source_project: rotki, hummingbot, cryptofeed, ccxt
  pattern_name: Decimal Type for All Monetary Values
  description: All four projects mandate Decimal type for price, amount, balance, quantity, and PnL fields. Float arithmetic
    causes rounding errors that compound across financial calculations, leading to incorrect order sizing and reporting. Always
    use Decimal for any value representing money in crypto trading systems.
  applicable_to_activity: crypto-trading
  _source_file: cross-project-wisdom/crypto-trading.yaml
- wisdom_id: CW-CRYPTO-TRADING-002
  source_project: ccxt, cryptofeed, rotki
  pattern_name: Initialize Data Structures Before Access
  description: 'Projects consistently require explicit initialization before data access: load_markets() before symbol lookups,
    check symbol population before mapping access, establish RPC connections before queries. Skipping initialization causes
    KeyError, AttributeError, or silent data corruption that breaks downstream operations.'
  applicable_to_activity: crypto-trading
  _source_file: cross-project-wisdom/crypto-trading.yaml
- wisdom_id: CW-CRYPTO-TRADING-003
  source_project: ccxt
  pattern_name: Precise String Arithmetic for Financial Calculations
  description: CCXT mandates Precise.string_* static methods (string_mul, string_div, string_add, string_sub) for monetary
    calculations to avoid floating-point precision errors. This is especially critical for high-precision exchange data where
    rounding errors cause incorrect order costs, fees, and balances that may result in financial loss.
  applicable_to_activity: crypto-trading
  _source_file: cross-project-wisdom/crypto-trading.yaml
- wisdom_id: CW-CRYPTO-TRADING-004
  source_project: ccxt
  pattern_name: Respect Exchange Rate Limits
  description: Disabling rate limiting via enableRateLimit=False causes HTTP 429 responses and potential temporary or permanent
    API key suspension by exchanges. CCXT enforces rate limits per IP/API key pair, and bypassing throttle() gates results
    in compliance violations that disrupt all trading activity until exchanges lift bans.
  applicable_to_activity: crypto-trading
  _source_file: cross-project-wisdom/crypto-trading.yaml
- wisdom_id: CW-CRYPTO-TRADING-005
  source_project: ccxt, hummingbot
  pattern_name: Inverse Contract Price Adjustment
  description: Perpetual swap cost calculations require applying inverse price adjustment (1/price) before multiplying by
    contractSize for inverse contracts. Incorrect cost calculation causes wrong position sizing, leading to unexpected liquidation
    or insufficient margin for perpetual trading positions.
  applicable_to_activity: crypto-trading
  _source_file: cross-project-wisdom/crypto-trading.yaml
- wisdom_id: CW-CRYPTO-TRADING-006
  source_project: cryptofeed, ccxt
  pattern_name: Strict Connection Lifecycle Ordering
  description: 'Both projects enforce strict execution order for connection operations: cryptofeed requires authenticate ->
    subscribe -> message handler sequence, while ccxt mandates connect -> on_connected_callback -> subscriptions -> on_close_callback.
    Out-of-order operations cause subscription failures and no data flow through connections.'
  applicable_to_activity: crypto-trading
  _source_file: cross-project-wisdom/crypto-trading.yaml
- wisdom_id: CW-CRYPTO-TRADING-007
  source_project: rotki, cryptofeed
  pattern_name: Validate Input Data Structure Before Processing
  description: Rotki validates EVM address checksum format before RPC calls; cryptofeed checks Symbols.populated() before
    symbol mapping access. Validating data structure before processing prevents downstream crashes (KeyError, InvalidAddress)
    and data corruption that is harder to debug when symptoms appear in unrelated code paths.
  applicable_to_activity: crypto-trading
  _source_file: cross-project-wisdom/crypto-trading.yaml
- wisdom_id: CW-CRYPTO-TRADING-008
  source_project: hummingbot
  pattern_name: Validate Order Sizes Against Exchange Minimums
  description: DCAExecutor amounts must be validated against min_notional_size and amounts_quote/prices against min_order_size
    before execution. Orders below exchange minimums are rejected, breaking strategy execution and potentially leaving positions
    partially unfilled at unfavorable prices.
  applicable_to_activity: crypto-trading
  _source_file: cross-project-wisdom/crypto-trading.yaml
