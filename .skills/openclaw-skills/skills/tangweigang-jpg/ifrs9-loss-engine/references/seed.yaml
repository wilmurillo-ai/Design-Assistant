resources:
  packages:
  - name: pandas
    version_pin: latest
  - name: numpy
    version_pin: latest
  - name: matplotlib
    version_pin: latest
  - name: seaborn
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: statsmodels
    version_pin: latest
  - name: scikit-learn
    version_pin: latest
  - name: graphviz
    version_pin: latest
  - name: varclushi
    version_pin: latest
  - name: python-dateutil
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install pandas
    - python3 -m pip install numpy
    - python3 -m pip install matplotlib
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When computing Credit Cycle Index using DDP values near 0 or 1
    action: Apply bounds check to prevent norm.ppf() from producing infinite values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The norm.ppf() inverse CDF function diverges to infinity when DDP equals exactly 0 or 1, causing CCI computation
      to fail or produce NaN values that corrupt downstream PIT PD calculations.
    stage_ids:
    - macro_forward_looking
  - id: finance-C-002
    when: When calculating DDP as number of downgrade observations divided by total observations
    action: Handle division by zero when total observations per period equals zero
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Division by zero in DDP calculation produces inf/NaN values, corrupting the CCI computation and subsequently
      the forward-looking PD multipliers used in IFRS 9 impairment calculations.
    stage_ids:
    - macro_forward_looking
  - id: finance-C-012
    when: When implementing amortization schedule calculations
    action: use Effective Interest Rate (EIR) for each discount factor computations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violation results in non-compliant ECL calculation under IFRS 9, as ECL must be discounted at original EIR
      per IFRS 9 Appendix A definition of credit loss
    stage_ids:
    - ecl_amortization
  - id: finance-C-014
    when: When implementing Stage 1 ECL calculations
    action: use exactly 12-month amortization window (11 iterations in zero-indexed loop)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect window causes Stage 1 ECL to be overstated or understated, violating IFRS 9 requirement for 12-month
      ECL calculation on performing loans
    stage_ids:
    - ecl_amortization
  - id: finance-C-015
    when: When implementing Stage 2/3 ECL calculations
    action: amortize using full remaining tenor (tenor - 1 iterations for remaining life)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect remaining-life amortization causes Stage 2/3 lifetime ECL to be understated, violating IFRS 9 requirement
      for full-lifetime ECL on credit-impaired loans
    stage_ids:
    - ecl_amortization
  - id: finance-C-024
    when: When implementing lifetime cumulative PD calculation
    action: Use cumprod(1-conPD) with shift(1) and fillna(1) for cumulative survival product
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect cumprod ordering without shift(1) produces corrupted lifetime PD term structure, violating IFRS
      9 lifetime ECL calculation requirements and producing systematically wrong expected credit loss estimates
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-025
    when: When computing marginal PD from conditional PD
    action: Initialize cumulative calculation with fillna(1) on shift(1) to assume 1.0 survival at period zero
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using a different fill_value corrupts the first-period survival probability assumption, causing cascading
      errors in all subsequent marginal and cumulative PD calculations
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-026
    when: When constructing transition matrices
    action: Verify each row of the transition matrix sums to exactly 1.0 for stochastic validity
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-stochastic transition matrices violate fundamental probability theory, causing PD estimates to be incorrectly
      calibrated and producing invalid through-the-cycle probability estimates
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-044
    when: When defining the loss rate calculation for LGD
    action: calculate loss rate as 1 minus the ratio of discounted recovery PV to EAD
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using a loss rate formula other than 1 - PV_recovery/EAD produces mathematically incorrect LGD values that
      do not reflect the complement of recovery rate
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-059
    when: When building the EAD module for IFRS 9 ECL calculation
    action: incorporate EAD into the ECL formula as ECL = PD × LGD × EAD
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ECL calculation will be incomplete and unusable for provisioning purposes, violating IFRS 9 impairment recognition
      requirements. The financial institution cannot meet regulatory reporting obligations without this component.
    stage_ids:
    - ead_exposure_at_default
  - id: finance-C-062
    when: When the EAD module is not yet fully implemented
    action: obtain EAD values from external data sources for current operations
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: End-to-end ECL pipeline cannot execute, blocking regulatory reporting and provisioning processes. The placeholder
      status must be explicitly documented and flagged for full implementation.
    stage_ids:
    - ead_exposure_at_default
  - id: finance-C-068
    when: When developing the EAD module
    action: comply with IFRS 9 requirements for unbiased EAD estimation without regulatory floors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-compliant EAD estimation will result in regulatory rejection of ECL calculations and potential penalties
      for failure to meet IFRS 9 impairment recognition standards.
    stage_ids:
    - ead_exposure_at_default
  - id: finance-C-069
    when: When implementing stage 3 classification, accounts with BUCKETS >= 4 must be allocated to Stage 3
    action: allocate accounts with aging status >= 4 months past due to Stage 3 (default classification)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Misclassifying defaulted accounts (BUCKETS >= 4) as Stage 1 or 2 underestimates lifetime ECL, leading to
      insufficient loan loss provisions and regulatory non-compliance under IFRS 9
    stage_ids:
    - staging_classification
  - id: finance-C-070
    when: When implementing stage 2 classification, accounts with BUCKETS between 2-3 must trigger SICR
    action: allocate accounts with delinquency buckets 2 or 3 to Stage 2 as SICR trigger
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Failure to classify moderate delinquency accounts (BUCKETS 2-3) as Stage 2 results in using 12-month ECL
      instead of lifetime ECL, materially underestimating credit loss provisions
    stage_ids:
    - staging_classification
  - id: finance-C-071
    when: When implementing SICR thresholds, relative PD change or DPD criteria must be used as triggers
    action: apply absolute threshold triggers including max_del_12==3, n_30_dpd_6==3, n_60_dpd_12==1, n_90_dpd_12==1, n_last_month_30==1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Omitting absolute DPD threshold triggers causes Stage 2 misclassification, leading to incorrect 12-month
      vs lifetime ECL calculation and non-compliance with IFRS 9 three-stage framework
    stage_ids:
    - staging_classification
  - id: finance-C-073
    when: When determining ECL bucket, stage 2 and 3 accounts must use lifetime ECL calculation
    action: apply lifetime expected credit loss for Stage 2 and Stage 3 accounts after SICR detection
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using 12-month ECL for Stage 2/3 accounts underestimates provisions and violates IFRS 9 requirements for
      lifetime ECL when credit risk has significantly increased
    stage_ids:
    - staging_classification
  - id: finance-C-081
    when: When implementing stage classification logic, the code must not allow look-ahead bias by using future information
    action: verify each staging triggers use only information available at the observation point, not future transaction data
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Using future transaction data in staging classification creates look-ahead bias, causing live ECL calculations
      to appear artificially accurate during backtesting but fail in production
    stage_ids:
    - staging_classification
  - id: finance-C-089
    when: When implementing OLS regression for PD macro factor models, the normality assumption of residuals must be verified
    action: Run formal normality tests (Shapiro-Wilk, Anderson-Darling, or Jarque-Bera) on regression residuals
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violated normality assumption invalidates t-statistics and confidence intervals, causing systematic miscalibration
      of PD estimates and potential regulatory non-compliance under IFRS 9
    stage_ids:
    - validation_monitoring
  - id: finance-C-090
    when: When validating OLS regression assumptions for PD macro factor models, homoskedasticity of residuals must be confirmed
    action: Apply White's test and Breusch-Pagan test to verify constant variance of residuals
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Heteroskedasticity inflates standard errors, leading to invalid t-values and unreliable coefficient estimates,
      which corrupts the forward-looking PD calibration
    stage_ids:
    - validation_monitoring
  - id: finance-C-091
    when: When validating OLS regression assumptions for PD macro factor models with time-series data, autocorrelation in
      residuals must be absent
    action: Execute Durbin-Watson test and Ljung-Box test on regression residuals to confirm no serial correlation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Autocorrelated residuals violate the independence assumption, causing underestimated standard errors and
      spurious significance of macro factors, leading to flawed PD estimates
    stage_ids:
    - validation_monitoring
  - id: finance-C-095
    when: When the OLS regression exhibits heteroskedasticity, HAC standard errors must be computed using Newey-West adjustment
      instead of conventional OLS standard errors
    action: Switch from non-robust to HAC covariance estimator using Newey-West standard errors for valid inference
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Ignoring heteroskedasticity with non-robust standard errors produces biased t-statistics, leading to incorrect
      significance decisions and unreliable PD confidence intervals for regulatory reporting
    stage_ids:
    - validation_monitoring
  - id: finance-C-098
    when: When backtesting PD predictions against actual defaults, the deviation must remain within the acceptable tolerance
      range
    action: Compare predicted vs actual default rates and verify deviations fall within acceptable range specified by model
      governance
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Backtesting failures indicate model miscalibration, potentially leading to inadequate provisions, regulatory
      sanctions, and unexpected credit losses
    stage_ids:
    - validation_monitoring
  - id: finance-C-099
    when: When designing the model validation test suite, each four FWL assumption tests must be included in the validation
      pipeline
    action: Include normality test, homoskedasticity test, autocorrelation test, and multicollinearity test in the validation
      scope
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Omitting any FWL assumption test leaves undetected model misspecification that corrupts PD estimates and
      violates IFRS 9 regulatory requirements
    stage_ids:
    - validation_monitoring
  - id: finance-C-106
    when: When computing macro-adjusted transition matrices using FWL PD multipliers
    action: Apply FWL multipliers using the same risk grade granularity as the base TTC transition matrix
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Granularity mismatch causes PDs to be misapplied across risk grades, materially affecting lifetime ECL calculations
      under IFRS 9.5.5.17
    stage_ids:
    - macro_forward_looking
    - pd_probability_of_default
  - id: finance-C-108
    when: When transferring PIT PD curves from pd_probability_of_default to staging_classification
    action: Include both 12-month PD and lifetime PD term structure as separate data elements
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing lifetime PD prevents calculation of lifetime ECL for Stage 2/3 exposures, causing under-provisioning
      and regulatory non-compliance
    stage_ids:
    - pd_probability_of_default
    - staging_classification
  - id: finance-C-113
    when: When allocating exposures to stages based on risk parameters
    action: Use 12-month PD for Stage 1 ECL bucket determination, not lifetime PD
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using lifetime PD for Stage 1 causes excessive lifetime ECL provision for low-risk instruments, misstating
      financial position
    stage_ids:
    - staging_classification
    - ecl_amortization
  - id: finance-C-114
    when: When calculating ECL amortization schedule for Stage 1 accounts
    action: Amortize only 12-month portion of exposure when tenor exceeds 12 months for Stage 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Full lifetime amortization for Stage 1 understates provisions and violates IFRS 9 requirement for 12-month
      ECL for Stage 1 accounts
    stage_ids:
    - staging_classification
    - ecl_amortization
  - id: finance-C-115
    when: When processing Stage 3 accounts in ECL amortization
    action: Amortize Stage 3 accounts - they should be treated as already in default
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Amortizing Stage 3 accounts delays loss recognition and violates IFRS 9 requirement for immediate recognition
      of credit-impaired asset losses
    stage_ids:
    - staging_classification
    - ecl_amortization
  - id: finance-C-122
    when: When calculating Lifetime Cumulative PD across each PD modules
    action: 'apply the canonical formula: cumprod(1 - conPD).shift(1).fillna(1) — this ensures monotonically increasing lifetime
      PD term structure with proper temporal alignment'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Lifetime PD term structure will contain look-ahead bias or non-monotonic values, causing ECL calculations
      to understate or overstate credit risk at different horizons
  - id: finance-C-123
    when: When computing ECL for any account at any stage
    action: 'apply the fundamental ECL formula: ECL = PD × LGD × EAD, discounted at Effective Interest Rate (EIR) — using
      a discount rate other than EIR violates IFRS 9 Appendix A'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: ECL calculation violates IFRS 9 definition of credit loss, which requires discounting at original EIR or
      credit-adjusted EIR, leading to non-compliant provisioning
  - id: finance-C-143
    when: When implementing staging classification logic for IFRS9 compliance
    action: 'Implement three-bucket stage model: Stage 1 (12-month ECL, no SICR), Stage 2 (lifetime ECL, SICR), Stage 3 (lifetime
      ECL, credit-impaired) — this IFRS9 mandate is immutable and affects each ECL calculations'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-IFRS9-compliant staging model causes regulatory reporting violations and incorrect ECL provisions that
      fail external audit and regulatory examination
    derived_from_bd_id: BD-013
  - id: finance-C-144
    when: When implementing LGD calculation logic
    action: Exclude indirect costs from LGD calculation per IFRS9 B5.4.1 unbias requirement — LGD must represent recovery
      on exposure excluding indirect costs; this differs from Basel IRB which includes indirect costs
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Including indirect costs in LGD violates IFRS9 regulatory requirements and produces non-compliant provisions
      that fail regulatory examination
    derived_from_bd_id: BD-007
  - id: finance-C-145
    when: When implementing LGD calculation logic for recovery cost treatment
    action: Include only direct recovery costs in LGD calculation — indirect costs must be excluded per IFRS9 para 5.4.1 which
      limits scope to directly attributable incremental costs of recovery
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect cost classification in LGD calculation violates IFRS9 regulatory scope limitations and produces
      inaccurate loss estimates for regulatory reporting
    derived_from_bd_id: BD-048
  - id: finance-C-146
    when: When implementing EAD calculation AND production deployment architecture
    action: Address EAD placeholder and notebook-only architecture gaps together as a combined production blocking issue —
      EAD implementation alone does not enable production deployment; notebook-only architecture alone cannot support ECL
      calculations
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: The risk cascade (EAD missing → ECL incomplete, Notebook-only → cannot deploy) means neither gap can be resolved
      in isolation. Attempting partial fixes wastes development effort and still produces non-production-ready code
    derived_from_bd_id: BD-102
  - id: finance-C-147
    when: When implementing expected credit loss (ECL) calculation logic
    action: 'Use the three-component multiplicative formula: ECL = PD × LGD × EAD — verify each three components are computed
      and multiplied in sequence'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Deviating from the PD×LGD×EAD formula structure violates IFRS 9 impairment requirements, resulting in regulatory
      non-compliance and potential regulatory sanctions
    derived_from_bd_id: BD-040
  - id: finance-C-148
    when: When implementing ECL discounting logic for present value calculation
    action: Discount future cash flows at the Effective Interest Rate (EIR) calculated at loan origination — EIR must be derived
      from contractual cash flows and represent the rate that exactly discounts to carrying amount
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using contractual rate instead of EIR overstates ECL for performing loans, causing provisions to be too high
      and violating IFRS 9 time value of money requirements
    derived_from_bd_id: BD-041
  - id: finance-C-158
    when: When implementing expected credit loss (ECL) calculation for loan impairment under IFRS 9
    action: Apply 12-month ECL at initial recognition and transition to Lifetime ECL only when credit risk increases significantly
      per IFRS 9 para 5.5.3 three-stage classification framework
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using Lifetime ECL from initial recognition over-provisions performing loans, violating IFRS 9 proportionality
      principle and causing unnecessary capital drag for financial institutions
    derived_from_bd_id: BD-042
  - id: finance-C-159
    when: When implementing default event tracking for loss given default (LGD) calculations under IFRS 9 and CRR Art. 178
    action: Track multiple default events over the account lifecycle, treating each 12-month period as independent default
      for ECL measurement purposes
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Treating multiple defaults as a single event understates total expected credit loss and violates regulatory
      requirements for provisioning, leading to insufficient loan loss reserves
    derived_from_bd_id: BD-046
  - id: finance-C-161
    when: When implementing probability of default (PD) propagation across multiple periods including lifetime calculations
    action: Use transition matrix multiplication for PD propagation across PD, LGD, and lifetime calculations — transition
      matrix is the universal data structure, not scalar PD values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Replacing transition matrix with scalar PD breaks conditional PD propagation through time, causing incorrect
      lifetime PD calculations and materially misstated expected credit loss for Stage 2/3 exposures
    derived_from_bd_id: BD-032
  - id: finance-C-162
    when: When calculating lifetime cumulative survival probability for ECL Stage 2/3 exposures
    action: Use cumprod(1-conPD) with shift(1) as the canonical lifetime cumulative survival formula — conPD from prior period
      t-1 must be shifted correctly
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using cumprod(1-conPD) without shift(1) or using unconditional PD produces incorrect lifetime PD term structure,
      systematically misstating expected credit loss for Stage 2/3 accounts
    derived_from_bd_id: BD-036
  - id: finance-C-174
    when: When implementing default flag logic for credit risk assessment per CRR Article 178
    action: Use 90+ Days Past Due (Bucket 4+) as the regulatory definition of default for IRB approach; applying 60+ DPD or
      180+ DPD thresholds would create inconsistency with mandatory CRR regulatory reporting requirements
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using non-90+ DPD default threshold violates CRR Article 178 regulatory requirements, causing non-compliance
      in regulatory reporting and potential supervisory action or capital requirement adjustments
    derived_from_bd_id: BD-057
  - id: finance-C-175
    when: When implementing staging trigger analysis for credit-impaired accounts
    action: Exclude accounts already classified as defaulted from 'significant increase in credit risk' (SICR) staging trigger
      analysis; defaulted accounts must remain in Stage 3 with lifetime ECL measured using collateral valuation and recovery
      projections per IFRS 9 para 5.5.11
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Including defaulted accounts in SICR assessment violates IFRS 9 para 5.5.11, causing incorrect staging classification
      and mismeasured expected credit losses that do not reflect proper credit-impaired accounting treatment
    derived_from_bd_id: BD-066
  - id: finance-C-176
    when: When implementing or modifying the default threshold definition in any credit risk module
    action: 'Recognize that 90+ DPD threshold is a single-point-of-change that gates each downstream modules: staging (Stage
      2 via BD-062, Stage 3 via BD-022), PD calculations, LGD calculations, and ECL measurements; changing this threshold
      requires simultaneous full recalibration of each dependent modules and cross-module invariant revalidation'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Changing default threshold from 90+ DPD without recalibrating all downstream modules invalidates staging
      classification, PD curves, LGD estimates, and ECL calculations, causing systemic model failure and regulatory reporting
      errors
    derived_from_bd_id: BD-103
  - id: finance-C-204
    when: When implementing the DDP → CCI → Vasicek rho → PIT PD pipeline
    action: 'Verify sequential execution with validation gates: (1) DDP must complete fully before CCI transformation, (2)
      CCI standardization must validate z-score range [-3,3] before Vasicek rho mapping, (3) Vasicek rho must validate [0,1]
      range before PIT PD calculation — any violation must halt pipeline and raise exception'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Hidden dependency chain means CCI values outside [-3,3] or rho outside [0,1] silently propagate through the
      pipeline, producing invalid PIT PD that corrupts ECL calculations without triggering obvious errors
    derived_from_bd_id: BD-100
  - id: finance-C-208
    when: When implementing the macro-forward-looking stage ECL calculation pipeline
    action: 'Execute the macro-adjustment pipeline in strict order: (1) BD-069 CCI aggregation first, (2) BD-027 Vasicek/lifetime
      calibration second, (3) BD-085 macro-overlay formula third. Each stage must validate outputs before passing to the next
      stage. CCI values must be within expected range before entering calibration; calibration must complete before applying
      macro-overlay'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the pipeline execution order causes uncalibrated PDs to enter the macro-overlay formula, resulting
      in systematically overstated or understated forward-looking ECL by 10-30%, directly affecting loan loss reserve requirements
      and regulatory capital
    derived_from_bd_id: BD-106
  - id: finance-C-209
    when: When implementing the macro-overlay formula (BD-085) in the ECL pipeline
    action: 'Validate macro-overlay formula parameters before execution: beta coefficients must be recalibrated to current
      economic conditions, CCI inputs must be within calibrated range, TTC_PD must reflect through-the-cycle estimates. Formula:
      logit(condPD) + beta*x - logit(TTC_PD) requires each components to be present and valid'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Miscalibrated beta coefficients in the macro-overlay formula cause systematic ECL overstatement or understatement
      across the entire portfolio; errors compound multiplicatively through the logit transformation, making results unreliable
      for reserve-setting and capital planning
    derived_from_bd_id: BD-106
  - id: finance-C-212
    when: When implementing PD probability of default calculations for IFRS9 ECL
    action: 'Maintain strict separation between three PD dimensions: (1) unbiased through-the-cycle PD, (2) forward-looking
      conditional PD, (3) lifetime PD — these must be computed independently and stored as separate attributes, not merged
      or averaged'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: IFRS9 mandates three-dimensional PD for ECL buckets; merging or conflating these dimensions would violate
      regulatory requirements, break the audit trail for independent model validation, and render the ECL calculation non-compliant
      for regulatory reporting
    derived_from_bd_id: BD-001
  - id: finance-C-218
    when: When estimating migration matrices using the quadratic*exponential hybrid optimization method
    action: Use quadratic*exponential hybrid with weighted squared error minimization via Nelder-Mead simplex algorithm optimizing
      10 parameters simultaneously; the multiplicative assumption (rating × notch effects) must be preserved; do NOT replace
      with pure quadratic or pure exponential formulations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Pure quadratic or pure exponential migration matrix formulations violate the multiplicative assumption that
      rating and notch effects combine multiplicatively; this causes systematic migration probability misestimation affecting
      portfolio credit risk measurements and regulatory capital calculations
    derived_from_bd_id: BD-075
  - id: finance-C-219
    when: When implementing PD probability of default, LGD, or staging classification calculations
    action: Enforce a minimum 12-month performance window as a cross-module invariant for each credit risk calculations including
      survival analysis exclusion, LGD calculation, and staging thresholds; this is mandated by IFRS9 for conservative unbiased
      assessment
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the 12-month minimum performance window violates IFRS9 regulatory requirements; using shorter windows
      causes non-conservative ECL estimates that do not meet regulatory standards, resulting in potential audit failures and
      regulatory sanctions
    derived_from_bd_id: BD-021
  - id: finance-C-221
    when: When implementing EAD (Exposure at Default) calculation or data loading in the ECL pipeline
    action: Leave EAD as a placeholder value in the multiplicative ECL formula - the formula ECL = PD × LGD × EAD requires
      numeric EAD values; leaving EAD as placeholder causes the entire ECL pipeline to fail to produce any output regardless
      of PD/LGD accuracy
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: 'EAD placeholder causes complete ECL pipeline failure: intermediate PD and LGD outputs cannot be combined
      into final ECL values, breaking end-to-end IFRS 9 impairment calculation regardless of how accurate other components
      are'
    derived_from_bd_id: BD-098
  - id: finance-C-222
    when: When implementing EAD data sourcing or estimation in the ECL pipeline
    action: Populate EAD field with actual drawn amounts and committed undrawn limits (for contingent exposures); if estimation
      is required, use standardized approach per regulatory guidelines (e.g., credit conversion factors from Basel III); EAD
      must be numeric and validated before entering ECL calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without proper EAD population, the ECL pipeline produces no output, preventing IFRS 9 provision calculation,
      regulatory reporting, and credit risk assessment from being completed
    derived_from_bd_id: BD-098
  - id: finance-C-226
    when: When implementing default status determination across PD, LGD, and staging modules
    action: Define default as AGING >= 4 (90+ DPD) — this threshold is a regulatory invariant per CRR Article 178 and Basel
      guidelines, applied consistently across each credit risk calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using any threshold other than 90+ DPD for default definition violates CRR Article 178 regulatory requirements,
      causing non-compliance with Basel capital adequacy framework and potential regulatory sanctions including capital requirement
      adjustments
    derived_from_bd_id: BD-022
  - id: finance-C-228
    when: When calculating Loss Given Default (LGD) for accounts with recovery cash flows
    action: Discount recovery cash flows to present value using the original effective interest rate as required by IFRS 9
      time value of money principle; do not use nominal recovery amounts
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Failure to discount recovery cash flows using EIR overstates LGD for long-recovery accounts, violating IFRS
      9 accounting standards and producing materially inaccurate expected credit loss measurements
    derived_from_bd_id: BD-049
  - id: finance-C-229
    when: When calculating Risk Weighted Assets (RWA) for regulatory capital purposes using IRB approach
    action: 'Apply regulatory risk weights: Strong=5%, Good=10%, Satisfactory=35%, Weak=100%, Default=625% as mandated by
      Basel CRR IRB approach for each corresponding asset quality category'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using non-standard or uniform risk weights violates Basel regulatory capital requirements under CRR, resulting
      in incorrect RWA calculations and potential regulatory sanction or insufficient capital allocation
    derived_from_bd_id: BD-050
  regular:
  - id: finance-C-003
    when: When clustering macroeconomic time series using K-Means for scenario grouping
    action: Validate silhouette score exceeds 0.5 threshold to verify stable scenario groupings
    severity: high
    kind: domain_rule
    modality: must
    consequence: Clusters with silhouette score below 0.5 produce unstable scenario groupings where observations could be
      assigned to wrong macro economic regimes, leading to incorrect forward-looking PD multipliers and misstated ECL provisions
      under IFRS 9.
    stage_ids:
    - macro_forward_looking
  - id: finance-C-004
    when: When deriving rho factors from CCI for conditional PD calculation via Vasicek model
    action: Verify rho factors converge to Basel asset correlation ranges of 0.02 to 0.25
    severity: high
    kind: domain_rule
    modality: must
    consequence: Rho values outside Basel ranges (0.02-0.25) invalidate the regulatory capital equivalence of the IFRS 9 PIT
      PD model, potentially causing regulatory non-compliance and requiring higher capital reserves.
    stage_ids:
    - macro_forward_looking
  - id: finance-C-005
    when: When CCI values are standardized z-scores of inverse normal CDF
    action: Validate CCI values fall within historically observed range of -1 to +1
    severity: medium
    kind: domain_rule
    modality: must
    consequence: CCI values outside the -1 to +1 range indicate extreme credit cycle conditions not historically observed,
      potentially caused by data errors or model instability, leading to unreliable forward-looking PD adjustments.
    stage_ids:
    - macro_forward_looking
  - id: finance-C-006
    when: When retrieving macroeconomic data from Bank of Thailand API
    action: Limit missing values to less than 5% of total observations per variable
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing macro data exceeding 5% threshold creates imputation uncertainty that propagates through CCI and
      cluster assignments, resulting in unreliable forward-looking PD multipliers and potentially misstated ECL provisions.
    stage_ids:
    - macro_forward_looking
  - id: finance-C-007
    when: When accessing Bank of Thailand's public API for macroeconomic indicators
    action: Provide valid API authentication key since the endpoint requires X-IBM-Client-Id header
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing or invalid BOT API key causes authentication failures, blocking macro data retrieval required for
      CCI computation and forward-looking adjustments under IFRS 9 Stage 2/3 criteria.
    stage_ids:
    - macro_forward_looking
  - id: finance-C-008
    when: When selecting number of clusters for macro economic scenario grouping
    action: Use silhouette analysis or elbow method to determine optimal cluster count rather than arbitrary selection
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Arbitrary cluster selection without validation may produce suboptimal groupings, causing unstable scenario
      assignments that reduce the accuracy of forward-looking PD adjustments and IFRS 9 impairment calculations.
    stage_ids:
    - macro_forward_looking
  - id: finance-C-009
    when: When computing forward-looking PD multipliers from CCI and cluster assignments
    action: Maintain monotonicity of PD multipliers across macro scenarios from adverse to favorable
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-monotonic PD multipliers violate IFRS 9 requirements for consistent forward-looking adjustments, potentially
      allowing lower provisions in adverse scenarios and higher provisions in favorable scenarios, contradicting prudent credit
      risk management principles.
    stage_ids:
    - macro_forward_looking
  - id: finance-C-010
    when: When applying macro economic forward-looking adjustments to PD models
    action: Claim real-time or current-period PD adjustments since BOT macro data has inherent publication lag
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting FWL PD adjustments as current-period observations when they are based on lagged macro data misleads
      stakeholders about the timeliness of IFRS 9 forward-looking information incorporated in ECL estimates.
    stage_ids:
    - macro_forward_looking
  - id: finance-C-011
    when: When preparing macro data for CCI computation
    action: Align each macro variables to a consistent temporal frequency before aggregation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Mixing monthly, quarterly, and annual frequency macro variables without proper temporal alignment causes
      inaccurate CCI computation and cluster assignments, leading to unreliable forward-looking PD multipliers.
    stage_ids:
    - macro_forward_looking
  - id: finance-C-013
    when: When computing amortization schedules
    action: verify principal plus interest equals payment within floating-point tolerance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unbalanced schedules cause incorrect EAD calculations, leading to material misstatement of expected credit
      loss provisions
    stage_ids:
    - ecl_amortization
  - id: finance-C-016
    when: When computing discount factors
    action: produce present values that match contractual cash flows when discounted at EIR
    severity: high
    kind: domain_rule
    modality: must
    consequence: Present value mismatch causes incorrect EAD calculations, leading to materially wrong ECL provisioning amounts
    stage_ids:
    - ecl_amortization
  - id: finance-C-017
    when: When handling hybrid loans with revolving-term conversion
    action: correctly identify conversion dates using truncate logic based on AccountMaturity vs LimitMaturity
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect conversion date identification causes wrong amortization schedule, leading to EAD miscalculation
      for convertible loan structures common in Thai banking
    stage_ids:
    - ecl_amortization
  - id: finance-C-018
    when: When comparing Python and SAS implementations
    action: produce matching outputs within 0.01% tolerance for audit compliance
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Mismatch beyond tolerance indicates calculation error, making SAS production validation unreliable for Thai
      banking regulatory compliance
    stage_ids:
    - ecl_amortization
  - id: finance-C-019
    when: When using amortization engine as replaceable computation backend
    action: maintain interface contract for generating schedules and discount factors
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Interface violation causes downstream ECL calculation failures, disrupting monthly provisioning cycle in
      banking operations
    stage_ids:
    - ecl_amortization
  - id: finance-C-020
    when: When implementing abnormal amortization for inconsistent terms
    action: use iterative balance calculation with round(2) for floating-point stability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing round causes floating-point accumulation errors, producing incorrect ending balances for variable-rate
      or variable-payment loans
    stage_ids:
    - ecl_amortization
  - id: finance-C-021
    when: When modeling normal amortization with consistent terms
    action: use closed-form PMT formulas from numpy-financial library
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Manual iteration is slower than numpy-financial optimized C implementations, causing unnecessary computation
      time for large loan portfolios
    stage_ids:
    - ecl_amortization
  - id: finance-C-022
    when: When presenting ECL amortization results
    action: claim that simulated amortization outputs equal actual credit losses
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting model outputs as actual results misleads stakeholders about credit risk exposure, violating financial
      reporting principles
    stage_ids:
    - ecl_amortization
  - id: finance-C-023
    when: When terminating amortization loop
    action: check balance <= 0 condition to handle fully repaid loans correctly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing termination check causes infinite loop or negative balance entries, corrupting amortization schedules
      for short-tenor loans
    stage_ids:
    - ecl_amortization
  - id: finance-C-027
    when: When estimating through-the-cycle (TTC) PD using survival analysis
    action: Use non-parametric survival analysis to avoid introducing optimism or conservatism bias
    severity: high
    kind: domain_rule
    modality: must
    consequence: Parametric models with implicit assumptions may introduce systematic optimism or conservatism bias, violating
      IFRS 9.5.5.17 requirement for unbiased probability-weighted estimates
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-028
    when: When defining default status using aging buckets
    action: Use AGING >= 4 threshold to classify accounts as default per regulatory NPL definitions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect AGING threshold produces default rates that do not match regulatory NPL definitions, causing non-compliance
      with supervisory reporting requirements and misaligned ECL provisioning
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-029
    when: When excluding recent-origin accounts from 12-month performance window
    action: Exclude accounts with Monthkey > (maxMonthkey - 12) from performance analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including recent-origin accounts without full 12-month performance history introduces insufficient data bias,
      causing understated observed default rates and underestimation of ECL
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-030
    when: When computing Point-in-Time (PIT) PD from Through-the-Cycle (TTC) PD
    action: Verify PIT PD values are greater than or equal to TTC PD values to incorporate forward-looking premium
    severity: high
    kind: domain_rule
    modality: must
    consequence: PIT PD falling below TTC PD indicates incorrect forward-looking adjustment, violating IFRS 9 requirement
      for point-in-time estimates that incorporate current macroeconomic conditions
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-031
    when: When generating lifetime PD term structure
    action: Verify lifetime PD term structure is monotonically non-decreasing over each time horizons
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-monotonic lifetime PD term structure violates fundamental probability theory (cumulative probability
      cannot decrease over time), producing invalid lifetime ECL calculations
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-032
    when: When estimating Vasicek asset correlation (rho) for forward-looking adjustment
    action: Constrain estimated rho factors within Basel asset correlation ranges of 0.02 to 0.25
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Rho factors outside Basel ranges produce unrealistic systematic risk adjustments, either overstating forward-looking
      PD (if too high) or understating it (if too low), causing ECL miscalculation
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-033
    when: When aggregating segment-level PD curves to portfolio-level
    action: Verify segment-filtered PD curves sum to portfolio-level PD within rounding tolerance
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Segment-level PD curves not summing to portfolio-level indicates segmentation model error or weighting inconsistency,
      causing portfolio ECL to differ from sum of segment ECLs
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-034
    when: When calibrating lifetime PD curves beyond observed data horizon
    action: Use Chain Ladder combined with Gamma fitting for lifetime extrapolation as specified replaceable point
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Alternative extrapolation methods without proper tail behavior may produce unrealistic long-term PD values,
      causing lifetime ECL overestimation or underestimation
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-035
    when: When implementing forward-looking adjustment methodology
    action: Use Vasicek single-factor model with macro-overlay as specified FWL adjustment method
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Alternative FWL methods without proper systematic risk factor incorporation may produce inconsistent forward-looking
      adjustments across economic cycles
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-036
    when: When implementing PD estimation methodology
    action: Use survival analysis as baseline unbias PD model per design decision
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Alternative unbias PD methods without non-parametric validation may introduce systematic bias, violating
      IFRS 9.5.5.17 requirement for unbiased probability-weighted estimates
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-037
    when: When separating three PD dimensions
    action: Maintain modular separation between unbias, forward-looking, and lifetime PD components for independent validation
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Tight coupling between PD dimensions prevents independent validation of each component, reducing model governance
      effectiveness and auditability per IFRS 9 requirements
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-038
    when: When presenting backtested or simulated PD estimates
    action: Claim that simulated backtest PD returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtested PD performance as guaranteed future results violates regulatory requirements and misleads
      stakeholders about actual credit risk exposure and ECL accuracy
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-039
    when: When claiming real-time trading capability for PD outputs
    action: Claim real-time PD estimation capability when model relies on polling and batch processing
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Overstating PD estimation timeliness misleads users about actual data latency and may cause inappropriate
      reliance on stale probability estimates for credit decisions
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-040
    when: When implementing LGD estimation incorporating recovery costs
    action: include indirect costs in the LGD calculation
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Including indirect costs violates IFRS 9 requirements which mandate only direct recovery costs be considered
      in LGD modeling, leading to non-compliant ECL calculations
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-041
    when: When estimating LGD using regulatory Basel approaches as starting point
    action: remove downturn buffers and regulatory floors from the LGD calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Basel LGD with downturn adjustments violates IFRS 9 unbias requirement, causing systematic overestimation
      of expected credit losses and non-compliant provisioning
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-042
    when: When calculating present value of recovery cash flows for LGD
    action: use EIR as the discount rate matching the ECL discount rate requirement
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a discount rate different from EIR violates IFRS 9 paragraph 5.5.17 time value of money requirement,
      causing incorrect ECL calculations
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-043
    when: When expressing LGD values in the output
    action: express LGD as a percentage of EAD within 0-100% range
    severity: high
    kind: domain_rule
    modality: must
    consequence: LGD values outside 0-100% range produce invalid probability measures that corrupt downstream ECL calculations
      and provisioning amounts
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-045
    when: When modeling LGD through EIR function linkage
    action: 'express loss rate as a linear function of EIR: Loss Rate = Intercept + EIR * beta'
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using non-linear or non-EIR-dependent loss rate functions reduces model stability and fails to capture the
      EIR-LGD relationship required by IFRS 9
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-046
    when: When classifying defaulted accounts into recovery pathways
    action: classify accounts into Open or Closed pathways based on presence of closed date
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect pathway classification produces wrong flow rate weights, corrupting the weighted LGD calculation
      across open and closed recovery paths
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-047
    when: When calculating LGD across both Open and Closed pathways
    action: apply separate flow rates and loss rates for each pathway and weight them in the final LGD
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using single pathway LGD without weighted combination produces incorrect lifetime LGD estimates that do not
      reflect portfolio recovery behavior
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-048
    when: When determining monitoring periods for Open versus Closed pathway accounts
    action: apply longer monitoring periods for Open pathway accounts than Closed pathway accounts
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using uniform monitoring periods across pathways fails to capture the different recovery timing characteristics
      of open versus closed defaulted accounts
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-049
    when: When processing Non-Default accounts in the LGD model
    action: exclude Non-Default accounts with observation dates within the last 12 months
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Including recently defaulted accounts without full recovery observation period introduces look-ahead bias
      and incomplete recovery data into LGD estimates
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-050
    when: When assigning default status to accounts in the LGD model
    action: classify accounts with AGING >= 4 as defaulted within the 12-month observation window
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using incorrect delinquency thresholds for default classification produces wrong default pools and corrupted
      LGD estimates
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-051
    when: When estimating LGD using different methodological approaches
    action: verify the chosen LGD estimation approach supports unbias treatment consistent with PD module
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent unbias treatment between PD and LGD modules violates IFRS 9 paragraph 5.5.17 requirement for
      consistent probability-weighted unbiased estimates
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-052
    when: When calculating LGD using direct recovery costs
    action: apply direct costs as percentage of recovery discounted at EIR in the loss rate function
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using undiscounted or non-EIR-based direct costs in LGD calculation violates IFRS 9 time value of money requirement
      and produces incorrect loss estimates
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-053
    when: When applying this IFRS 9 LGD model to production credit loss estimation
    action: present the resulting LGD estimates as guaranteed future realized losses
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting modeled LGD as deterministic future losses misrepresents the probabilistic nature of the estimates
      and violates IFRS 9 requirement for probability-weighted outcomes
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-054
    when: When comparing LGD estimates across different Basel regulatory floors
    action: claim that LGD estimates are comparable across jurisdictions without adjusting for different regulatory floor
      requirements
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Different jurisdictions impose different regulatory LGD floors (e.g., 0% vs 45%); comparing raw model outputs
      across jurisdictions without adjustment produces misleading comparative analyses
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-055
    when: When using LGD estimates from this model for regulatory capital calculations
    action: substitute IFRS 9 unbias LGD for regulatory capital LGD without proper adjustment
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Regulatory capital LGD includes downturn adjustments and floors required by Basel framework; using IFRS 9
      unbias LGD directly understates capital requirements
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-056
    when: When implementing the LGD estimation methodology without reviewing historical recovery patterns
    action: skip validation of EIR function parameters against historical recovery data
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Unvalidated EIR-Loss Rate function parameters may produce biased LGD estimates that do not reflect actual
      portfolio recovery behavior
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-057
    when: When monitoring the LGD model over time
    action: perform regular back-testing comparing predicted LGD against actual realized LGD
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without back-testing, the model may develop systematic biases that go undetected, leading to progressively
      inaccurate ECL calculations
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-058
    when: When using this LGD model implementation for production systems
    action: assume the model code is production-ready without independent validation of the EIR function calibration
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Jupyter notebook implementation may contain data leakage, edge case handling issues, or numerical precision
      problems that require production-grade code review
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-060
    when: When implementing EAD calculation inputs
    action: process loan schedules, drawdown patterns, and limit utilization data as specified in the EAD interface
    severity: high
    kind: domain_rule
    modality: must
    consequence: EAD estimates will be inaccurate without proper loan schedule amortization data and credit conversion factors,
      leading to misstated expected credit loss provisions under IFRS 9.
    stage_ids:
    - ead_exposure_at_default
  - id: finance-C-061
    when: When calculating EAD for revolving credit facilities
    action: apply Credit Conversion Factors (CCF) to account for undrawn commitments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Undrawn portions of revolving facilities will not be included in EAD calculation, underestimating potential
      credit exposure and violating IFRS 9 requirements for complete exposure measurement.
    stage_ids:
    - ead_exposure_at_default
  - id: finance-C-063
    when: When using external EAD data sources
    action: validate that external EAD values align with internal loan schedules and limit data
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Mismatch between external EAD values and internal systems can cause inconsistent provisioning, leading to
      regulatory non-compliance and potential audit failures.
    stage_ids:
    - ead_exposure_at_default
  - id: finance-C-064
    when: When completing the EAD module implementation
    action: implement proper integration with the ECL calculation pipeline
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Completed EAD module cannot be integrated into the ECL pipeline, defeating the purpose of the full implementation
      and leaving the provisioning workflow broken.
    stage_ids:
    - ead_exposure_at_default
  - id: finance-C-065
    when: When replacing the EAD placeholder with full implementation
    action: verify the new EAD calculation method maintains compatibility with existing PD and LGD modules
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incompatible EAD module will cause calculation errors in the ECL pipeline, producing incorrect expected credit
      loss figures that misrepresent credit risk exposure.
    stage_ids:
    - ead_exposure_at_default
  - id: finance-C-066
    when: When presenting EAD modeling results or ECL calculations
    action: claim the system provides real-time EAD monitoring or live trading capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misleading stakeholders about EAD monitoring capabilities creates regulatory compliance risk and reputational
      damage when discrepancies are discovered between reported and actual exposures.
    stage_ids:
    - ead_exposure_at_default
  - id: finance-C-067
    when: When using EAD estimates from backtesting or historical analysis
    action: claim historical EAD calculations represent current portfolio exposure without adjustment
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting historical EAD as current exposure ignores portfolio turnover, economic changes, and borrower-specific
      factors, potentially under- or over-provisioning expected credit losses.
    stage_ids:
    - ead_exposure_at_default
  - id: finance-C-072
    when: When determining ECL bucket, stage 1 accounts must use 12-month ECL calculation
    action: apply 12-month expected credit loss for Stage 1 accounts showing low credit risk with no SICR triggers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using lifetime ECL for low-risk Stage 1 accounts overstates provisions and reduces reported earnings unnecessarily
    stage_ids:
    - staging_classification
  - id: finance-C-074
    when: When performing backward transaction analysis, at least 12-month performance window must be used
    action: use 12-month lag for forward-looking default observation and backward transaction analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using insufficient performance window (< 12 months) produces unreliable SICR thresholds that cannot accurately
      predict 12-month default rates, compromising staging accuracy
    stage_ids:
    - staging_classification
  - id: finance-C-075
    when: When deriving SICR thresholds, backward transaction analysis must be performed on historical data
    action: apply backward-looking transaction analysis to establish stable and empirically validated staging triggers
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Setting SICR thresholds without backward transaction analysis produces arbitrary thresholds that may not
      reflect actual credit behavior, leading to systematic misclassification
    stage_ids:
    - staging_classification
  - id: finance-C-076
    when: When excluding observations from staging analysis, defaulted accounts at observation point must be excluded
    action: exclude accounts that are already in default (BUCKETS >= 4) at the observation point from backward transaction
      analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including defaulted accounts in backward transaction analysis introduces survivorship bias, as these accounts
      cannot transition through stages like non-defaulted accounts
    stage_ids:
    - staging_classification
  - id: finance-C-077
    when: When the system requires SICR threshold customization, the threshold method must be a replaceable component
    action: expose SICR threshold method as configurable replaceable point to accommodate different portfolio characteristics
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Hardcoding SICR thresholds prevents adaptation to different loan products, geographies, or economic conditions,
      reducing model accuracy over time
    stage_ids:
    - staging_classification
  - id: finance-C-078
    when: When staging classification relies on historical backward analysis, thresholds must be validated for stability over
      time
    action: verify that SICR thresholds produce consistent stage distributions across different historical periods
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unstable thresholds produce volatile stage distributions, causing sudden and unjustified swings in ECL provisions
      that do not reflect genuine credit deterioration
    stage_ids:
    - staging_classification
  - id: finance-C-079
    when: When presenting staging classification results, the system must not claim that historical thresholds guarantee future
      live performance
    action: present backtested stage distributions as historical analysis only, not as predictive guarantees
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Overstating the reliability of historically-derived SICR thresholds may lead to inappropriate management
      decisions and regulatory findings if actual default patterns diverge significantly from historical patterns
    stage_ids:
    - staging_classification
  - id: finance-C-080
    when: When allocating exposures across stages, the distribution must produce economically sensible proportions
    action: validate that Stage 1 represents the majority of performing accounts, Stage 2 contains accounts with identified
      SICR, and Stage 3 contains defaulted accounts only
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unrealistic stage distributions (e.g., excessive Stage 2 or 3) indicate threshold calibration errors that
      will materially misstate ECL provisions
    stage_ids:
    - staging_classification
  - id: finance-C-082
    when: When the problem appears simple due to clear IFRS 9 guidelines, the implementation must not skip validation of SICR
      thresholds against actual default rates
    action: skip empirical validation of whether staging thresholds actually predict future defaults at reasonable rates
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Assuming IFRS 9 staging criteria are self-evidently correct without validation may lead to thresholds that
      sound reasonable in principle but fail to discriminate between performing and non-performing accounts
    stage_ids:
    - staging_classification
  - id: finance-C-083
    when: When time is constrained during model updates, the staging threshold review must not be shortened or skipped
    action: shorten the backward transaction analysis or use simplified thresholds without revalidation against sufficient
      historical data
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Expedited staging updates without proper backward analysis may introduce thresholds that worked in the past
      training period but fail under different economic conditions or for new portfolio segments
    stage_ids:
    - staging_classification
  - id: finance-C-084
    when: When creating staging criteria, the number of months since last delinquency must be calculated correctly
    action: calculate n_last_month_X as the distance from observation point to last occurrence of bucket >= X, using argmax
      on historical BUCKETS
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect calculation of months since last delinquency produces wrong n_last_month triggers, causing systematic
      Stage 2/3 misclassification
    stage_ids:
    - staging_classification
  - id: finance-C-085
    when: When stage classification produces null results for recent accounts, missing future performance data must be handled
    action: exclude the last 12 months of observations from staging analysis where forward-looking dfFlag cannot be computed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including observations without complete 12-month forward performance windows introduces truncation bias,
      as these accounts cannot be properly classified
    stage_ids:
    - staging_classification
  - id: finance-C-086
    when: When ECL calculation follows staging, the system must not claim that ECL bucket determination is final without reconciliation
    action: present stage-based ECL buckets as conditional on staging classification accuracy without independent verification
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting ECL calculations as final without acknowledging staging classification uncertainty understates
      model risk and may mislead financial statement users about provisioning adequacy
    stage_ids:
    - staging_classification
  - id: finance-C-087
    when: When staging distribution is analyzed, the system must consider portfolio composition effects
    action: segment stage distribution analysis by loan product, vintage, or risk segment to identify portfolio composition
      changes
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Analyzing overall stage distribution without segmentation masks portfolio composition shifts that may cause
      apparent threshold changes even when individual account behavior is stable
    stage_ids:
    - staging_classification
  - id: finance-C-088
    when: When implementing staging logic, the system must not use different trigger thresholds for Stage 2 vs Stage 3 classification
    action: apply the same absolute threshold criteria for both Stage 2 and Stage 3, with BUCKETS >= 4 as the sole differentiator
      for Stage 3
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Using inconsistent or overlapping trigger criteria between stages creates classification ambiguity and may
      cause the same account to be treated differently across reporting periods
    stage_ids:
    - staging_classification
  - id: finance-C-092
    when: When validating multicollinearity in PD macro factor models, VIF values for each explanatory variable must be below
      critical thresholds
    action: Calculate Variance Inflation Factor (VIF) for each macro predictors and exclude variables with VIF exceeding 10
    severity: high
    kind: domain_rule
    modality: must
    consequence: High multicollinearity inflates standard errors and destabilizes coefficient estimates, making the PD model
      unstable and unreliable for regulatory reporting under IFRS 9
    stage_ids:
    - validation_monitoring
  - id: finance-C-093
    when: When performing outlier detection on PD macro factor regression, Cook's Distance must be calculated for each observations
    action: Compute Cook's Distance for each data point and flag observations with D values exceeding 4/n as influential outliers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Influential outliers distort regression coefficients and PD estimates, causing understatement or overstatement
      of credit risk for affected portfolios
    stage_ids:
    - validation_monitoring
  - id: finance-C-094
    when: When presenting Cook's Distance validation results, the proportion of influential outliers must not exceed 5% of
      total observations
    action: Exceed the 5% threshold for influential observations identified by Cook's Distance
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: More than 5% influential outliers indicates model misspecification or data quality issues, invalidating the
      PD calibration and requiring model redesign or data cleansing
    stage_ids:
    - validation_monitoring
  - id: finance-C-096
    when: When computing confidence intervals for PD estimates, HAC standard errors must produce valid coverage probabilities
    action: Verify HAC confidence intervals have approximately nominal coverage (typically 95%)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid confidence interval coverage renders stage migration triggers unreliable, potentially causing delayed
      or premature provisioning changes under IFRS 9 framework
    stage_ids:
    - validation_monitoring
  - id: finance-C-097
    when: When monitoring PD calibration over time, stability of PD estimates must be assessed against historical benchmarks
    action: Generate monitoring reports showing stable PD calibration with no systematic drift beyond tolerance thresholds
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unstable PD calibration leads to underprovisioning or overprovisioning, causing either regulatory capital
      shortfalls or unnecessary capital constraints that impact profitability
    stage_ids:
    - validation_monitoring
  - id: finance-C-100
    when: When recalibration signals are generated from validation monitoring, signals must remain dormant under normal stable
      conditions
    action: Configure recalibration triggers with specified thresholds that avoid false alarms during normal market fluctuations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Frequent unnecessary recalibrations due to overly sensitive triggers destabilize PD estimates and increase
      model maintenance burden without improving accuracy
    stage_ids:
    - validation_monitoring
  - id: finance-C-101
    when: When validating the PD macro factor regression, the model must be revalidated periodically according to model governance
      policy
    action: Schedule periodic model validation reviews to verify continued validity of statistical assumptions
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Failure to perform periodic revalidation violates IFRS 9 model governance requirements and may result in
      regulatory findings during model validation audits
    stage_ids:
    - validation_monitoring
  - id: finance-C-102
    when: When interpreting backtesting results, the monitoring system must not present simulated backtesting performance
      as guaranteed future live trading results
    action: Claim that historical backtesting returns predict future live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting simulated backtesting as indicative of future live trading performance misleads stakeholders and
      violates regulatory expectations for model risk disclosures
    stage_ids:
    - validation_monitoring
  - id: finance-C-103
    when: When implementing statistical tests for model validation, the chosen significance level (alpha) must be explicitly
      documented and justified
    action: Document the significance level used for each hypothesis tests in the validation suite
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Undocumented significance levels create ambiguity during regulatory reviews and audit, potentially invalidating
      test conclusions
    stage_ids:
    - validation_monitoring
  - id: finance-C-104
    when: When transferring Credit Cycle Index (CCI) and Rho factors from macro_forward_looking to pd_probability_of_default
    action: Align the temporal index of CCI/Rho time series with the observation dates in the transition matrix
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Misaligned CCI values with transition matrix dates cause incorrect macro-adjusted PD estimates, violating
      IFRS 9 requirement for PIT PD that reflects current macro conditions
    stage_ids:
    - macro_forward_looking
    - pd_probability_of_default
  - id: finance-C-105
    when: When transferring cluster assignments from macro_forward_looking segmentation to pd_probability_of_default
    action: Verify cluster variable definitions are consistent between clustering stage and PD estimation model
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent cluster definitions cause PD estimates to be misapplied to wrong portfolio segments, leading
      to material misestimation of ECL provisions
    stage_ids:
    - macro_forward_looking
    - pd_probability_of_default
  - id: finance-C-107
    when: When deriving SICR thresholds from macro scenario analysis
    action: Use probability-weighted average of forward-looking macro scenarios when calibrating PD migration thresholds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-probability-weighted thresholds violate IFRS 9.5.5.17 requirement for unbiased, probability-weighted
      ECL measurement
    stage_ids:
    - macro_forward_looking
    - pd_probability_of_default
  - id: finance-C-109
    when: When computing Significant Increase in Credit Risk (SICR) for stage migration
    action: Use absolute PD threshold approach for Stage 2 classification, not just relative change
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pure relative thresholds allow low-PD instruments to avoid lifetime ECL even when absolute PD indicates high
      default risk, violating IFRS 9 objective
    stage_ids:
    - pd_probability_of_default
    - staging_classification
  - id: finance-C-110
    when: When passing unbias LGD estimates from lgd_loss_given_default to staging_classification
    action: Remove any downturn LGD adjustments before transmission to staging stage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Downturn LGD violates IFRS 9 requirement for unbiased LGD estimates, causing over-provisioning or under-provisioning
      depending on economic cycle
    stage_ids:
    - lgd_loss_given_default
    - staging_classification
  - id: finance-C-111
    when: When passing discounted recovery cash flows from lgd_loss_given_default to staging_classification
    action: Discount using the Effective Interest Rate (EIR) as specified in IFRS 9 Appendix A definition of credit loss
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using non-EIR discount rate violates IFRS 9 definition of credit loss as contractual cash flows minus expected
      cash flows discounted at original EIR
    stage_ids:
    - lgd_loss_given_default
    - staging_classification
  - id: finance-C-112
    when: When transferring EAD amounts from ead_exposure_at_default to staging_classification
    action: Use outstanding balance at time of default, not current exposure, for EAD input
    severity: high
    kind: domain_rule
    modality: must
    consequence: Current exposure underestimates EAD for revolving facilities at default, causing under-provisioning of ECL
    stage_ids:
    - ead_exposure_at_default
    - staging_classification
  - id: finance-C-116
    when: When using external BOT (Bank of Thailand) macroeconomic data for forward-looking PD models
    action: Account for data publication delay when aligning macro variables with current-period PD estimates
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Ignoring BOT data delay causes look-ahead bias in PIT PD estimates, violating IFRS 9 requirement for reasonable
      and supportable information at reporting date
    stage_ids:
    - macro_forward_looking
    - pd_probability_of_default
  - id: finance-C-117
    when: When developing LGD models from Basel regulatory models
    action: Include indirect costs in LGD calculations
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Including indirect costs violates IFRS 9 requirement to exclude non-direct collection costs from LGD estimation
    stage_ids:
    - lgd_loss_given_default
  - id: finance-C-118
    when: When monitoring PD models for recalibration needs
    action: Perform continuous PD monitoring and recalibrate when model performance degrades
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Outdated PD models produce unreliable ECL estimates, violating IFRS 9 requirement for timely and accurate
      impairment recognition
    stage_ids:
    - pd_probability_of_default
  - id: finance-C-119
    when: When presenting backtested ECL results
    action: Claim expected live trading returns equal to backtested ECL performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtested ECL results do not guarantee future impairment recognition accuracy due to forward-looking nature
      of IFRS 9 models
    stage_ids:
    - ecl_amortization
  - id: finance-C-120
    when: When the staging logic appears straightforward based on DPD thresholds alone
    action: Skip validation of backward-looking threshold calibration against portfolio-specific default rates
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Using generic DPD thresholds without portfolio-specific calibration leads to incorrect stage allocation,
      causing material ECL miscalculation
    stage_ids:
    - staging_classification
  - id: finance-C-121
    when: When implementing or calibrating credit risk models for IFRS 9 compliance
    action: use Point-in-Time (PIT) Probability of Default with forward-looking macroeconomic adjustments — TTC-only models
      without forward-looking overlay do not satisfy IFRS 9 requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Regulatory auditors will reject ECL calculations as non-compliant with IFRS 9 paragraph 5.5.17, which mandates
      unbiased probability-weighted amounts reflecting reasonable and supportable forward-looking information
  - id: finance-C-124
    when: When staging accounts or computing credit risk metrics for any module
    action: exclude accounts with less than 12 months of performance history from PD, LGD, and staging calculations — the
      12-month performance window is a cross-module invariant
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accounts without sufficient history will produce unstable or biased PD/LGD estimates and incorrect staging
      classifications, violating cross-module consistency requirements
  - id: finance-C-125
    when: When determining default status across PD, LGD, and staging modules
    action: use AGING >= 4 (90+ Days Past Due) as the default threshold — dfFlag=0 indicates non-default, NaN indicates inactive/writeoff
      accounts
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent default definitions across modules will cause PD, LGD, and staging calculations to use contradictory
      default states, corrupting ECL calculations
  - id: finance-C-126
    when: When aggregating account-level calculations for reporting
    action: maintain account-level granularity (ACCOUNT_ID/AccID) as the atomic unit — each PD, LGD, and EAD calculations
      must be performed at account level with aggregation at output only
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Portfolio-level calculations before aggregation will lose account-level heterogeneity, producing inaccurate
      ECL allocations that do not reflect individual account risk profiles
  - id: finance-C-127
    when: When presenting or reporting this system's modeled outputs to users, auditors, or regulators
    action: claim that modeled ECL estimates equal expected actual credit losses — IFRS 9 ECL is a probability-weighted estimate
      based on reasonable and supportable information, not a prediction of actual losses
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users, auditors, or regulators may make incorrect capital allocation decisions, regulatory filings, or provisioning
      assessments based on inflated or misinterpreted ECL figures
  - id: finance-C-128
    when: When using this blueprint for organizations operating outside Thai banking context
    action: claim that the BOT (Bank of Thailand) NPL data anchor and CCI calibration are applicable — the Credit Cycle Index
      calibration depends on Thai macro-economic data that is not globally transferable
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Organizations will implement macro-economic linkages calibrated to Thai banking conditions, producing incorrect
      forward-looking PD adjustments for their local market conditions
  - id: finance-C-129
    when: When applying this system for real-time credit decisioning
    action: claim that the monthly snapshot (AS_OF_DATE) temporal grain supports real-time credit decisions — the system operates
      on monthly account-level snapshots requiring fundamental redesign for sub-monthly decisions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Credit decisions will be based on stale data (up to 30 days old), leading to incorrect risk assessment and
      potential regulatory non-compliance for real-time lending products
  - id: finance-C-130
    when: When using this system in non-IFRS 9 regulatory frameworks
    action: claim IFRS 9 compliance or use ECL methodology for Basel-only calculations — the PIT forward-looking PD requirements
      and three-stage impairment framework are specific to IFRS 9
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Regulatory submissions to non-IFRS 9 jurisdictions may be rejected; conversely, Basel capital calculations
      using IFRS 9 ECL may produce incorrect risk-weighted assets
  - id: finance-C-131
    when: When presenting LGD estimates derived from this system
    action: claim that regulatory (Basel) LGD values are specified for IFRS 9 — IFRS 9 LGD must exclude indirect costs and
      remove downturn floors per IFRS 9 unbias requirement
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: LGD estimates will include indirect collection costs and downturn adjustments that violate IFRS 9 unbias
      principle, leading to non-compliant ECL calculations
  - id: finance-C-132
    when: When computing ECL for organizations without access to BOT macro data feeds
    action: claim that CCI forward-looking adjustments can be approximated with alternative macro data — the CCI and Rho calibration
      depends on BOT NPL data that anchors the entire forward-looking model
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Forward-looking PD adjustments will be incorrectly calibrated to non-equivalent macro proxies, producing
      systematically biased PIT PD estimates that violate IFRS 9 paragraph 5.5.17
  - id: finance-C-133
    when: When calculating EIR for discounting LGD recoveries or ECL
    action: use the account-specific Effective Interest Rate (EIR) — using a single portfolio-wide rate violates IFRS 9 time-value
      alignment requirement across accounts with different rates
    severity: high
    kind: domain_rule
    modality: must
    consequence: ECL calculations will use inconsistent discount rates, causing accounts with higher or lower rates to have
      systematically over- or under-discounted expected cash flows
  - id: finance-C-134
    when: When monitoring and maintaining PD models in production
    action: perform continuous PD model monitoring and recalibration when necessary — IFRS 9 requires ongoing validation of
      PD estimates against actual default experience
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: PD estimates will become increasingly stale relative to actual portfolio risk, causing systematic under-
      or over-provisioning as economic conditions evolve
  - id: finance-C-135
    when: When implementing staging criteria for Stage 1 vs Stage 2 classification
    action: apply consistent 12-month lookback for delinquency triggers across each staging variables — the 12-month performance
      window for max_del_12, n_90_dpd_12, and similar triggers must be identical to the 12-month performance exclusion window
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Staging classifications will be misaligned with PD calculation exclusions, causing accounts to receive incorrect
      ECL time-horizon assignments
  - id: finance-C-136
    when: When implementing or refactoring ECL calculation logic
    action: Assume the framework provides complete Exposure at Default (EAD) calculation — the EAD module is a placeholder
      with core logic not yet implemented, and complete ECL calculation is impossible without it regardless of PD/LGD accuracy
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without EAD module implementation, ECL calculations produce incomplete or incorrect provisions, leading to
      regulatory reporting errors and potential capital adequacy misstatements
    derived_from_bd_id: BD-009
  - id: finance-C-137
    when: When implementing EAD module for the ECL pipeline
    action: Implement complete EAD calculation logic including drawn amount, undrawn commitment conversion factors, and collateral
      haircut adjustments required for IFRS9-compliant ECL computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: ECL pipeline remains broken without EAD implementation; downstream staging and provisioning calculations
      cannot produce valid results for regulatory reporting
    derived_from_bd_id: BD-009
  - id: finance-C-138
    when: When implementing loan product type conversion logic for hybrid loans with truncate option
    action: Implement conversion rules between revolving credit facility and term loan based on remaining tenor thresholds
      — verify amortization schedule recalculation and staging trigger evaluation when loan type changes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect loan type conversion logic causes wrong amortization schedules and staging triggers, leading to
      materially incorrect ECL calculations and provisioning amounts
    derived_from_bd_id: BD-043
  - id: finance-C-139
    when: When selecting baseline PD estimation method for probability of default calculation
    action: Use Kaplan-Meier survival analysis as the baseline unbiased PD estimation method — this statistical method correctly
      handles right-censored data; alternative methods (logistic regression, KMV, transitionMatrix) must not replace Kaplan-Meier
      for baseline estimation without validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative PD estimation methods without Kaplan-Meier's right-censoring handling produces biased PD
      estimates, causing systematic mismeasurement of default probability
    derived_from_bd_id: BD-002
  - id: finance-C-140
    when: When implementing PD segmentation logic using statistical algorithms
    action: Use CHAID (Chi-squared Automatic Interaction Detection) algorithm with chi-squared independence testing for decision
      tree segmentation on categorical predictors (OVD codes, MOB, tenor, finance variables) — different algorithms (CART,
      expert judgment) will produce different segmentations affecting risk differentiation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-CHAID segmentation methods changes PD segment boundaries, producing materially different risk-differentiated
      PD estimates that affect ECL staging and provisioning accuracy
    derived_from_bd_id: BD-058
  - id: finance-C-141
    when: When implementing forward-looking macro adjustment for PIT PD calculation
    action: Use Vasicek single-factor asymptotic single risk factor model for forward-looking macro adjustment with Basel
      rho asset correlation parameter encoding Thai market credit cycle assumptions — alternative methods (CCI-only, time-series
      K-means clustering) produce different conditional PD precision
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative forward-looking methods without Vasicek model changes conditional PD precision estimates,
      creating materially different ECL calculations with implications for regulatory capital
    derived_from_bd_id: BD-003
  - id: finance-C-142
    when: When fitting migration matrix transition rates
    action: Fit migration matrix using quadratic function a*s^2 + b*s + c — this polynomial form captures parabolic relationship
      between transition rates and rating distance; alternative specifications (exponential decay, linear, spline) produce
      different transition probability estimates
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using non-quadratic fitting functions changes transition rate estimates, causing migration matrix inaccuracy
      that propagates through PD calculations and affects ECL staging thresholds
    derived_from_bd_id: BD-074
  - id: finance-C-149
    when: When implementing staging classification triggers for credit deterioration
    action: Implement multiple lookback windows of 12, 9, 6, and 3 months for evaluating recency of credit deterioration events
      — recent delinquency patterns must have stronger predictive weight than distant history
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a single lookback window fails to capture the empirically-validated finding that recent behavior is
      more predictive of default, resulting in suboptimal staging decisions and either excessive or insufficient provisions
    derived_from_bd_id: BD-063
  - id: finance-C-150
    when: When outputting any numeric value in macro_forward_looking stage calculations
    action: Assume numeric values have implicit currency or unit context — the framework does not provide currency and unit
      explicit annotation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit currency and unit annotation, downstream systems may misinterpret values (e.g., treating
      EUR as USD or basis points as percentages), causing cascading calculation errors in ECL and capital outputs
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-151
    when: When outputting NPL portfolio data in macro_forward_looking stage
    action: Include each EBA-mandated fields in NPL portfolio output — verify field completeness against EBA NPL portfolio
      disclosure requirements before data export
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing EBA-required fields in NPL portfolio output causes regulatory reporting failures, potentially resulting
      in supervisory penalties and forced remediation
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-152
    when: When processing NPL portfolio data in macro_forward_looking stage
    action: Assume NPL portfolio data contains each EBA-required fields without validation — the framework does not implement
      EBA field completeness checks
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without EBA field completeness validation, incomplete NPL data passes through the pipeline, causing downstream
      regulatory reports to be non-compliant and requiring manual remediation
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-153
    when: When generating macro_forward_looking outputs for NPL portfolio
    action: Validate NPL portfolio output against EBA field completeness checklist — include status, gross carrying amount,
      provisions, and collateral values as required by EBA NPL guidelines
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incomplete NPL portfolio fields violate EBA disclosure requirements, causing regulatory reporting deficiencies
      and potential supervisory sanctions
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-154
    when: When implementing macro scenario grouping using unsupervised learning
    action: Use K-means clustering with silhouette analysis for time series macro scenario grouping — silhouette score must
      be computed to determine optimal cluster count (typically maximizing score while maintaining interpretability)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using arbitrary cluster count without silhouette validation produces suboptimal scenario groupings, causing
      macro factors to be miscategorized and affecting PD/LGD accuracy across all portfolios
    derived_from_bd_id: BD-017
  - id: finance-C-155
    when: When implementing Cook's Distance for outlier detection in PD model
    action: Apply Cook's Distance threshold (typically 4/n or 4/(n-p-1)) to flag influential observations before PD model
      estimation — influential outliers must be reviewed and documented before model fitting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without Cook's Distance filtering, influential outliers distort PD model coefficients, causing systematically
      biased default probability estimates that affect staging and ECL provisions
    derived_from_bd_id: BD-019
  - id: finance-C-156
    when: When implementing macro_forward_looking adjustments using conditional transition matrices
    action: Verify convergence of multiple FWL approaches (simplifiedCCI, full CCI, vasicekBaselRho) on conditional transition
      matrix — outputs must be consistent within tolerance, and any material divergence must be investigated
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-convergent FWL approaches indicate model uncertainty that is not captured in the conditional transition
      matrix, leading to unpredictable ECL outputs across scenarios
    derived_from_bd_id: BD-037
  - id: finance-C-157
    when: When implementing LGD calculation in lgd_loss_given_default stage
    action: 'Use the pathway-segmented formula: LGD = FlowRate(Closed) × ExpectedLossRate(Closed) + FlowRate(Open) × ExpectedLossRate(Open)
      — flow rates must be applied as pathway probabilities conditioning the loss rate expectations'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a single-pathway LGD ignores the conditional independence of closed and open recovery pathways, causing
      systematic misestimation of expected loss given default
    derived_from_bd_id: BD-045
  - id: finance-C-160
    when: When estimating coefficient standard errors in FWL regression residuals for validation monitoring
    action: Use HAC (Newey-West) standard errors for robust inference correcting heteroskedasticity and autocorrelation —
      not basic OLS standard errors
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using OLS standard errors without HAC correction produces unreliable coefficient significance tests, leading
      to incorrect variable inclusion decisions and invalid statistical inference
    derived_from_bd_id: BD-020
  - id: finance-C-163
    when: When implementing Credit Cycle Index (CCI) for macro forward-looking adjustments
    action: 'Calculate CCI as negative z-score of inverse normal DDP: CCI = -norm.ppf(N(downgrade or default at t) / N(total
      at t)) — the negative convention ensures higher CCI indicates worse credit conditions'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using raw DDP without z-score standardization produces non-comparable credit risk signals across different
      portfolio sizes and historical periods, breaking cross-sectional and temporal analysis
    derived_from_bd_id: BD-052
  - id: finance-C-164
    when: When computing portfolio-level downgrade or default probability for time-series credit quality analysis
    action: Calculate DDP as N(downgrade or default at t) / N(total at t) — the ratio of accounts experiencing downgrade or
      default events in period t to total accounts at t
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative credit risk metrics (e.g., EDPR, simple default count) instead of the standardized DDP
      ratio produces inconsistent time-series analysis and breaks CCI calculation
    derived_from_bd_id: BD-053
  - id: finance-C-165
    when: When preparing account data for staging classification analysis
    action: Verify that accounts with less than 12-month performance history are excluded from staging analysis — insufficient
      behavioral data prevents reliable delinquency pattern detection
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Including accounts with insufficient history introduces unreliable staging assignments based on inadequate
      observation windows, causing incorrect ECL provisioning and potential regulatory findings
    derived_from_bd_id: BD-065
  - id: finance-C-166
    when: When implementing transaction analysis for credit risk assessment in staging classification
    action: Use backward transaction analysis with prior 12-month delinquency history as the primary credit risk assessment
      method — verify lookback_period equals 12 and lookback_method includes 'backward' or 'historical'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using forward-looking only approaches without historical delinquency patterns misses predictive behavioral
      signals, resulting in less accurate staging classifications and suboptimal early warning effectiveness
    derived_from_bd_id: BD-067
  - id: finance-C-167
    when: When configuring staging trigger selection methodology for credit risk classification
    action: Verify trigger selection uses bad rate exceeding dynamic threshold at 30+ DPD bucket — bad_rate_threshold must
      be calculated per criteria, not as a fixed universal value
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using fixed universal thresholds instead of criteria-specific bad rate thresholds fails to account for differing
      base rates across criteria, causing suboptimal trigger selection and reduced discriminatory power
    derived_from_bd_id: BD-068
  - id: finance-C-168
    when: When implementing or modifying LGD calculation logic in ECL estimation
    action: Document and verify the combined effect of indirect cost exclusion AND downturn floor removal on LGD; calculate
      cumulative LGD understatement impact and verify expected loss estimates are properly calibrated and disclosed
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Undocumented compound effect of both indirect cost exclusion and downturn floor removal materially lowers
      LGD, potentially causing ECL to be significantly understated in Stage 1/2 calculations, leading to insufficient loan
      loss provisions
    derived_from_bd_id: BD-099
  - id: finance-C-169
    when: When implementing or modifying PD curve interpolation logic for macro time series
    action: Use cubic spline interpolation with forward limit constraint for macro time series curves; verify extrapolation
      is bounded by observed data range and continuous first/second derivatives are computed correctly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using linear interpolation instead of cubic spline produces non-smooth PD curves with discontinuous derivatives,
      degrading the quality of macro time series modeling and downstream credit risk estimates
    derived_from_bd_id: BD-071
  - id: finance-C-170
    when: When implementing or modifying regression validation for macroeconomic time series
    action: Use Newey-West HAC estimator for consistent covariance estimation when residuals exhibit heteroskedasticity or
      autocorrelation; do not substitute with standard OLS errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Standard OLS errors are inconsistent when macroeconomic time series residuals exhibit heteroskedasticity
      or autocorrelation, leading to invalid statistical inference and potentially incorrect risk model validation
    derived_from_bd_id: BD-072
  - id: finance-C-171
    when: When implementing or modifying distribution fitting evaluation for PD models
    action: Use SSE and R-square metrics for primary distribution selection evaluation; when alternative criteria (AIC, BIC,
      K-S test, Anderson-Darling) yield different distributions, document the discrepancy and validate using empirical data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Distribution selected by AIC/BIC may differ from SSE/R-square selection, affecting PD curve shape and ultimately
      ECL calculations with material impact on loan loss provisions
    derived_from_bd_id: BD-077
  - id: finance-C-172
    when: When implementing or modifying 12-month or lifetime PD estimation methodology
    action: Use survival analysis methodology to properly handle right-censored observations when account observation windows
      vary; incorporate partial information from accounts observed for shorter durations rather than discarding incomplete
      observations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using cohort/transition matrix methods that discard right-censored observations reduces statistical efficiency,
      potentially producing biased PD estimates that misrepresent actual portfolio credit risk
    derived_from_bd_id: BD-061
  - id: finance-C-173
    when: When implementing or modifying migration matrix estimation for credit risk
    action: Apply exponential decay function p*exp(q*n) for migration rate fitting using scipy curve_fit with Levenberg-Marquardt
      algorithm; verify convergence with maxfev=1000; document if alternative functions (quadratic, linear, power-law) produce
      materially different migration matrices
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect migration matrix functional form affects predicted upgrade/downgrade rates between credit rating
      notches, cascading into inaccurate ECL calculations and risk-based pricing errors
    derived_from_bd_id: BD-073
  - id: finance-C-177
    when: When aggregating portfolio-level PD from segment-level or aging bucket data
    action: Use weighted average calculation with exposure counts as probability weights — do NOT use simple average, median,
      or geometric mean which would produce different portfolio PD estimates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple average or geometric mean for PD aggregation distorts portfolio risk estimates by treating segments
      with different exposure sizes as equal weight, causing risk to be overstated for large exposures and understated for
      small ones
    derived_from_bd_id: BD-083
  - id: finance-C-178
    when: When applying macro-overlay adjustments to forward-looking lifetime PD estimates
    action: Apply linear combination in logit space using formula logit(condPD) + beta*x - logit(TTC_PD) with beta coefficients
      from regression — do NOT use multiplicative overlay or Vasicek formula which produce different macro adjustment magnitudes
      under stress scenarios
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using multiplicative overlay or Vasicek formula produces incorrect macro adjustment magnitudes under stress
      scenarios, systematically misrepresenting forward-looking PD during economic downturns or upturns
    derived_from_bd_id: BD-085
  - id: finance-C-179
    when: When determining optimal cluster number for PD segmentation in validation monitoring
    action: Use silhouette coefficient analysis measuring cohesion and separation — do NOT use elbow method, gap statistic,
      or BIC which provide different criteria for cluster number selection in unsupervised learning validation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using elbow method, gap statistic, or BIC instead of silhouette analysis produces different optimal cluster
      counts, leading to suboptimal PD segmentation that misrepresents portfolio risk distribution across segments
    derived_from_bd_id: BD-092
  - id: finance-C-180
    when: When implementing iterative optimization algorithms for macro-forward-looking PD calibration
    action: Assume convergence criteria are implicitly defined or will be set by default — convergence thresholds must be
      explicitly declared in code with documented convergence metrics
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit convergence criteria, iterative algorithms may terminate prematurely producing unstable
      PD estimates, or run indefinitely consuming excessive computational resources without ever achieving convergence
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-181
    when: When implementing iterative optimization algorithms for macro-forward-looking PD calibration
    action: 'Explicitly declare convergence criteria including: max_iterations (e.g., 1000), tolerance threshold (e.g., 1e-6
      for relative change in objective), and convergence metric name — document these in code comments and configuration files'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit convergence criteria, iterative algorithms may terminate prematurely producing unstable
      PD estimates, or run indefinitely consuming excessive computational resources without ever achieving convergence
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-182
    when: When calibrating observed default rate lifetime curves using account age as the explanatory variable
    action: Use Gamma cumulative distribution function with initial guess [1,1,1] for ODR lifetime calibration — do NOT use
      beta CDF or lognormal CDF which assume different distributional shapes for bounded positive random variables
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using beta CDF or lognormal CDF instead of Gamma CDF produces incorrect lifetime default curves, systematically
      misestimating default probabilities at specific account ages and distorting lifetime loss forecasts for credit portfolios
    derived_from_bd_id: BD-078
  - id: finance-C-183
    when: When calibrating forward-looking PD by finding optimal scaling factor relative to TTC PD
    action: Use scalar optimization with scipy minimize with absolute error objective function assuming multiplicative scaling
      factor — do NOT use gradient descent or Newton-Raphson unless properly initialized as they converge to same optimum
      if properly initialized
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using gradient descent or Newton-Raphson without proper initialization may converge to local optima or diverge,
      producing incorrect scaling factors that misalign forward-looking PD with TTC PD estimates and distort credit risk assessments
    derived_from_bd_id: BD-080
  - id: finance-C-184
    when: When modeling credit cycle correlation structure for CCI estimation using copula methods
    action: Use Gaussian copula model with bivariate normal correlation parameter rho optimized via minimize to match empirical
      default dependencies — do NOT use t-copula, Clayton copula, or Gumbel copula which capture tail dependence differently
      and would affect extreme credit event modeling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using t-copula or Clayton copula instead of Gaussian copula introduces tail dependence that changes the correlation
      structure during extreme credit events, potentially misrepresenting portfolio loss distribution in stress scenarios
    derived_from_bd_id: BD-081
  - id: finance-C-185
    when: When implementing settlement or delivery logic for financial transactions
    action: Assume the framework handles settlement and delivery time conventions — the framework does not explicitly define
      settlement timing, delivery lag, or business day conventions for financial transactions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit settlement conventions, transactions may be scheduled for non-business days or holidays,
      causing failed settlements and regulatory compliance violations in live trading environments
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-186
    when: When implementing settlement or delivery logic for financial transactions
    action: 'Explicitly define settlement conventions including: settlement_days lag (e.g., T+2 for bonds, T+1 for equities),
      business_day_convention (e.g., ''following'' or ''modified_following''), and holiday_calendar reference — document in
      configuration and validate against market data'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit settlement conventions, transactions may be scheduled for non-business days or holidays,
      causing failed settlements and regulatory compliance violations in live trading environments
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-187
    when: When implementing order pricing or quantity management in trading systems
    action: Assume the framework handles price and quantity precision requirements — the framework does not implement tick
      size validation or lot size rounding rules for order submission
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without tick/lot size handling, orders may be submitted with invalid precision causing rejection by exchanges,
      and backtested fills may not reflect actual executable price levels creating live-backtest inconsistency
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-188
    when: When implementing order pricing or quantity management in trading systems
    action: Implement price precision validation using tick_size configuration (e.g., round to nearest 0.01 for stocks, 0.0001
      for bonds) and quantity rounding using lot_size (e.g., round down to nearest 100 shares) before order submission — validate
      against market data tick tables
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without tick/lot size handling, orders may be submitted with invalid precision causing rejection by exchanges,
      and backtested fills may not reflect actual executable price levels creating live-backtest inconsistency
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-189
    when: When implementing time series decomposition for seasonal pattern analysis
    action: Apply additive decomposition when seasonal variation scales proportionally with the trend level — use multiplicative
      decomposition instead when amplitude increases with trend
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Additive decomposition assumes constant seasonal amplitude across all trend levels; when seasonal variation
      scales with trend, additive model systematically misattributes variance between trend and seasonal components, distorting
      downstream forecasts
    derived_from_bd_id: BD-082
  - id: finance-C-190
    when: When implementing time series decomposition
    action: Verify that seasonal fluctuations remain relatively constant across the series range before applying additive
      decomposition; if seasonal amplitude varies significantly across different trend levels, switch to multiplicative decomposition
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without verifying constant seasonal amplitude, additive decomposition produces structurally biased decompositions
      when seasonal variation scales with trend, corrupting all downstream seasonal-adjusted calculations
    derived_from_bd_id: BD-082
  - id: finance-C-191
    when: When implementing PD conversion between cumulative and conditional representations
    action: Verify monthly PDs are independent conditional on prior state before applying cumulative product aggregation across
      periods — document this independence assumption explicitly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cumulative product aggregation assumes conditional independence between periods; if default events are correlated
      (e.g., systemic risk events), the multiplicative aggregation underestimates portfolio PD, causing ECL miscalculation
    derived_from_bd_id: BD-084
  - id: finance-C-192
    when: When implementing PD conversion using cumulative product operations
    action: Verify that matrix exponentiation alternative produces equivalent results for validation purposes; if results
      diverge significantly, investigate conditional independence violations in the PD chain
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Matrix exponentiation and cumulative product should yield equivalent results for valid PD chains; divergence
      indicates violations of conditional independence assumptions that corrupt PD conversion
    derived_from_bd_id: BD-084
  - id: finance-C-193
    when: When implementing PD calibration with absolute error minimization
    action: Apply absolute error minimization when the calibration objective requires proportional treatment of outliers (e.g.,
      regulatory capital calculations) — use squared error instead to penalize large deviations proportionally
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Absolute error minimization treats all residuals equally regardless of magnitude; for regulatory capital
      calculations requiring proportional risk sensitivity, this systematically under-penalizes large deviations, causing
      ECL underestimation
    derived_from_bd_id: BD-086
  - id: finance-C-194
    when: When implementing PD calibration
    action: Verify that random initial guess converges reliably — if calibration produces different results across runs, set
      deterministic seed or switch to weighted least squares for more stable convergence
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Random initial guesses in non-convex optimization can converge to local minima, producing inconsistent calibration
      results across runs that corrupt PD estimates and violate regulatory reproducibility requirements
    derived_from_bd_id: BD-086
  - id: finance-C-195
    when: When implementing external PD to internal PD mapping using power-law scaling
    action: Validate that power-law parameters (a, b, c) are fitted simultaneously and that the non-linear mapping captures
      the actual relationship between external and internal PD estimates — do not substitute with linear scaling without re-validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Power-law scaling with three parameters captures non-linear relationships that linear scaling cannot represent;
      substituting linear mapping misaligns internal PD estimates with external rating agencies, corrupting regulatory capital
      calculations
    derived_from_bd_id: BD-087
  - id: finance-C-196
    when: When implementing external PD mapping
    action: Compare power-law fit against linear and exponential alternatives using holdout validation; if alternatives produce
      lower RMSE on validation set, re-evaluate the non-linearity assumption
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Power-law assumption of non-linear relationship may not hold for all external rating scales; without validation
      against alternatives, the mapping function may systematically misestimate internal PDs for certain rating tiers
    derived_from_bd_id: BD-087
  - id: finance-C-197
    when: When implementing ODR calibration using sample-size weighted average
    action: Document the representativeness assumption explicitly and do not mix with exposure-based weighting in downstream
      calculations without reconciliation — verify consistent weighting philosophy across the PD pipeline
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sample-size weighting assumes larger cohorts are more representative; if small-exposure accounts with large
      sample counts drive ODR calibration but are underweighted in final ECL aggregation, large portfolios experience ECL
      misstatement
    derived_from_bd_id: BD-088
  - id: finance-C-198
    when: When implementing ODR calibration
    action: Compare sample-size weighted average against unweighted average and median to assess sensitivity; if results differ
      materially, investigate whether sample size truly indicates representativeness for the specific portfolio structure
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Sample-size assumption may not hold when large cohorts have selection bias; without sensitivity testing,
      ODR calibration can be systematically biased toward over-represented segments that do not reflect true portfolio characteristics
    derived_from_bd_id: BD-088
  - id: finance-C-199
    when: When implementing CHAID decision tree for PD bucket segmentation
    action: Verify that each predictor variables are categorical before applying chi-squared splitting criteria — continuous
      predictors must be discretized first, otherwise CHAID produces invalid splits
    severity: high
    kind: domain_rule
    modality: must
    consequence: CHAID relies on chi-squared significance testing which requires categorical predictors; continuous variables
      without discretization cause invalid split calculations, producing suboptimal tree structures that misclassify PD buckets
    derived_from_bd_id: BD-089
  - id: finance-C-200
    when: When implementing CHAID decision tree segmentation
    action: Compare CHAID tree structure against CART (Gini impurity) and C4.5 (information gain) alternatives — if alternative
      algorithms produce materially different bucket assignments, validate which splitting criterion best matches the underlying
      PD distribution
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Different splitting criteria produce different tree structures and bucket boundaries; without comparing alternatives,
      the segmentation may not optimally capture PD variation, causing misallocation of accounts to risk buckets
    derived_from_bd_id: BD-089
  - id: finance-C-201
    when: When implementing PD backtesting using binomial distribution confidence intervals
    action: Apply binomial distribution when default events exhibit known correlation or contagion — use Poisson approximation
      with dispersion parameter or exact methods for portfolios with correlated defaults
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Binomial distribution assumes independent identical trials with constant PD; correlated defaults (e.g., during
      economic downturns) violate this assumption, causing confidence intervals to underestimate actual default rate volatility
    derived_from_bd_id: BD-090
  - id: finance-C-202
    when: When implementing PD backtesting
    action: Compare binomial confidence intervals against Poisson approximation and exact binomial tests, especially for extreme
      tail probabilities; if results diverge significantly in the tails, investigate whether independence assumption holds
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Binomial and Poisson approximations differ for extreme tail probabilities where independence assumptions
      are most likely violated; divergence indicates potential underestimation of backtesting risk thresholds
    derived_from_bd_id: BD-090
  - id: finance-C-203
    when: When implementing LGD beta distribution modeling
    action: Test for multimodality in recovery rate distributions; if mixture patterns exist, evaluate logistic-normal or
      mixture distributions as alternatives to capture multimodality that single-mode beta distribution cannot represent
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Single-mode beta distribution cannot capture multimodality in recovery outcomes caused by different collateral
      types or recovery processes; without testing for mixture patterns, ECL underestimates loss for multimodal segments
    derived_from_bd_id: BD-091
  - id: finance-C-205
    when: When implementing macro forward-looking PD pipeline
    action: Document explicit upstream/downstream dependencies between DDP, CCI, Vasicek rho, and PIT PD stages — add validation
      assertions at each pipeline boundary to catch unexpected output formats before downstream processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without documented dependencies and boundary validation, hidden dependencies cause silent failures where
      incorrect CCI or rho values propagate through the entire pipeline, corrupting all downstream PIT PD calculations
    derived_from_bd_id: BD-100
  - id: finance-C-206
    when: When implementing both ODR calibration (BD-088) and PD aggregation (BD-083)
    action: Use inconsistent weighting schemes between ODR calibration (sample size weights) and PD aggregation (exposure
      count weights) without reconciliation — align weighting philosophy or document explicit rationale for the inconsistency
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Inconsistent weighting means an account with small exposure but large sample count gets high weight in ODR
      calibration but low weight in PD aggregation, causing ECL misstatement for large portfolios where small-exposure high-count
      accounts drive ODR
    derived_from_bd_id: BD-105
  - id: finance-C-207
    when: When reconciling ODR calibration and PD aggregation weighting schemes
    action: Perform sensitivity analysis comparing ECL results under both weighting schemes; if results differ materially,
      investigate whether sample size or exposure count better represents the true risk contribution of each account segment
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Material differences between weighting schemes indicate that ECL calculations are sensitive to the choice
      of aggregation method, suggesting that without proper reconciliation, the ECL may not accurately reflect portfolio risk
      composition
    derived_from_bd_id: BD-105
  - id: finance-C-210
    when: When configuring or refactoring the macro-forward-looking stage
    action: Implement pipeline integrity checks that verify CCI aggregation (BD-069), calibration ordering (BD-027), and macro-overlay
      formula (BD-085) are not independently modified or reordered; any change to one component requires validation of the
      entire cascade
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Silent result distortion occurs when the three-step macro pipeline is modified without understanding the
      cascade dependencies; ECL errors accumulate without obvious failure signals, causing incorrect financial reporting that
      may not be detected until audit or regulatory review
    derived_from_bd_id: BD-106
  - id: finance-C-211
    when: When implementing ECL amortization logic for Thai banking hybrid loan products
    action: Implement truncate option at revolving-to-term conversion point — hybrid loans must truncate remaining revolving
      balance at conversion to term loan, not carry forward as continuous revolving exposure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without truncation at conversion point, revolving balances would be mis-modeled as continuous revolving exposure,
      causing ECL to be calculated on incorrectly inflated outstanding amounts and producing non-compliant IFRS9 loss estimates
      for Thai banking products
    derived_from_bd_id: BD-011
  - id: finance-C-213
    when: When configuring LGD loss given default parameters for unbiased ECL calculation
    action: Verify that downturn LGD regulatory floors (20-25% Basel IRB minimums) have been explicitly removed from LGD calculations
      — confirm floor_disabled=True or equivalent flag is set for IFRS9 unbias compliance
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: If downturn LGD floors remain active during unbias ECL calculation, capital adequacy buffers designed for
      Basel IRB would artificially inflate loss estimates, causing ECL to overstate expected losses and potentially trigger
      unnecessary provisioning actions
    derived_from_bd_id: BD-008
  - id: finance-C-214
    when: When sourcing macro data inputs for forward-looking CCI (Consumer Confidence Index) calibration
    action: Use BOT (Bank of Thailand) API as the authoritative macro data source — do not substitute with alternative external
      NPL sources or different macroeconomic indicator providers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative data sources would break CCI calibration established for Thai market forward-looking models,
      causing misalignment between macro scenarios and ECL probability weights, leading to systematically incorrect loss estimates
      for Thai banking portfolios
    derived_from_bd_id: BD-015
  - id: finance-C-215
    when: When extrapolating lifetime PD beyond the observed data horizon using the Chain Ladder method with Gamma distribution
      fitting
    action: Apply Chain Ladder run-off triangles combined with Gamma distribution fitting for outer bucket marginal PD term
      structure; do NOT substitute with Nelson-Siegel curve fitting without validating tail behavior equivalence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Nelson-Siegel curve fitting produces different tail behavior compared to Gamma-distributed Chain Ladder extrapolation;
      switching methods without validation causes systematic PD term structure misestimation affectingECL calculations and
      capital reserves
    derived_from_bd_id: BD-004
  - id: finance-C-216
    when: When implementing staging classification logic for SICR threshold determination
    action: Use backward transaction analysis with historical default rates to determine PD change thresholds for SICR triggers;
      do NOT use relative PD change, absolute PD threshold, or DPD-based methods without explicit business approval
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Backward transaction analysis calibrates SICR thresholds using observed historical default rates; switching
      to alternative methods without validation causes misaligned staging triggers, potentially under- or over-provisioning
      ECL reserves
    derived_from_bd_id: BD-014
  - id: finance-C-217
    when: When implementing SICR staging classification without explicit calibration of backward transaction analysis
    action: Verify that backward transaction analysis historical data covers at least one full economic cycle (minimum 5 years)
      and validate that the derived thresholds match observed default rates within acceptable tolerance (<=5% deviation)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using backward transaction analysis with insufficient historical data or uncalibrated thresholds causes SICR
      triggers to misclassify credit quality transitions, leading to inappropriate staging and ECL provision swings that do
      not reflect actual portfolio risk
    derived_from_bd_id: BD-014
  - id: finance-C-220
    when: When implementing PD probability of default calculation logic
    action: Apply segment filter (e.g., 'CU' = Consumer) before each PD calculation; computing without segment filtering produces
      incorrect portfolio-level estimates that do not reflect segment-level PD curves
    severity: high
    kind: domain_rule
    modality: must
    consequence: Computing PD without segment filtering produces blended portfolio-level estimates that misrepresent segment-specific
      credit risk; strategies relying on segment-specific PD curves will experience significant P&L deviation between backtesting
      and live trading
    derived_from_bd_id: BD-033
  - id: finance-C-223
    when: When implementing portfolio stratification logic for PD probability calculations
    action: Use CHAID (Chi-squared Automatic Interaction Detection) decision tree method for categorical segmentation of borrowers
      into risk-homogeneous groups — verify chi-squared interaction detection is applied and segmentation tree parameters
      are validated against historical default rates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative segmentation methods (e.g., K-means clustering, equal-frequency binning) without validation
      will alter PD curves for subgroups, causing systematic miscalibration of probability of default estimates across portfolio
      segments
    derived_from_bd_id: BD-005
  - id: finance-C-224
    when: When implementing LGD calculation logic for expected credit loss computations
    action: Apply EIR (Effective Interest Rate) as the discount rate for each recovery cash flows in LGD calculations — verify
      present value computations use time-value-aligned discounting concordant with the contract EIR
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a discount rate other than EIR for recovery cash flows will misalign the time value of money in LGD
      calculations, causing systematic overstatement or understatement of expected credit loss amounts depending on the rate
      differential
    derived_from_bd_id: BD-006
  - id: finance-C-225
    when: When implementing forward-looking adjustment in macro credit risk calculations
    action: Use Credit Cycle Index (CCI) as the forward-looking proxy mapped to Vasicek rho — verify the mathematical transformation
      from CCI to systematic correlation parameter is correctly implemented and validated against historical credit cycle
      data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using raw macro variables or alternative proxies (e.g., K-means clustered macro, Lasso-selected variables)
      without proper validation will alter systematic risk correlation in the Vasicek model, causing misaligned forward-looking
      adjustments in ECL calculations and potential regulatory capital misstatement
    derived_from_bd_id: BD-016
  - id: finance-C-227
    when: When implementing credit risk tracking across each modules (PD, LGD, staging)
    action: Use ACCOUNT_ID or AccID as the atomic granularity unit for each credit risk calculations — do not aggregate to
      loan-level identifiers as this loses sub-account correlations critical for credit risk tracking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using loan-level instead of account-level granularity will lose sub-account correlations and behavioral information,
      causing systematic misrepresentation of credit risk exposure and inaccurate ECL calculations that diverge from actual
      portfolio risk
    derived_from_bd_id: BD-034
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
