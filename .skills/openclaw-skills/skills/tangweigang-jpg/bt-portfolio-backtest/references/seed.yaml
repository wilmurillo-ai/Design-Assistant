resources:
  packages:
  - name: ffn>=1.1.2
    version_pin: latest
  - name: pyprind>=2.11
    version_pin: latest
  - name: tqdm>=4
    version_pin: latest
  - name: cython>=0.29.25
    version_pin: latest
  - name: matplotlib>=2
    version_pin: latest
  - name: numpy>=1
    version_pin: latest
  - name: pandas>=0.19
    version_pin: latest
  - name: pytest
    version_pin: latest
  - name: pytest-cov
    version_pin: latest
  - name: ruff>=0.5.0,<0.16
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install ffn>=1.1.2
    - python3 -m pip install pyprind>=2.11
    - python3 -m pip install tqdm>=4
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing data input for backtesting
    action: verify the price DataFrame index is a DateTimeIndex for time-series alignment
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without a DateTimeIndex, pandas datetime operations like shift() and offset calculations will fail or produce
      incorrect results, corrupting backtest calculations
    stage_ids:
    - data_input
  - id: finance-C-002
    when: When passing price data with duplicate column names
    action: allow duplicate column names in the price DataFrame
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Duplicate columns cause ambiguous column access and can lead to incorrect signal generation or position sizing
      based on wrong securities
    stage_ids:
    - data_input
  - id: finance-C-006
    when: When providing price data to Backtest
    action: use a datetime-indexed pandas DataFrame or Series as the data source
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Non-datetime indexed data causes pandas datetime operations to fail, preventing proper time-series alignment
      and offset calculations
    stage_ids:
    - data_input
  - id: finance-C-012
    when: When adding children to a Node in the tree structure
    action: Add duplicate child names to the same parent node
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Duplicate child names cause one child to silently overwrite another, leading to missing or incorrect trading
      signals for overwritten securities
    stage_ids:
    - tree_building
  - id: finance-C-023
    when: When implementing an Algo subclass
    action: implement __call__ method returning a bool value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Algo.__call__ raises NotImplementedError by default, causing strategy execution to fail if the method is
      not properly implemented
    stage_ids:
    - strategy_logic
  - id: finance-C-039
    when: When implementing sequential rebalancing without base parameter
    action: Pass the base parameter to lock the original value for delta calculation across children
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Sequential rebalancing without base causes incorrect allocations because each child rebalance changes the
      base value for subsequent children, leading to misaligned target weights
    stage_ids:
    - capital_allocation
  - id: finance-C-040
    when: When allocating capital to securities with zero or NaN prices
    action: Allocate capital when security price is zero or NaN (open positions)
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Allocating to securities with zero or NaN prices causes division by zero or undefined behavior in quantity
      calculation, corrupting portfolio state
    stage_ids:
    - capital_allocation
  - id: finance-C-054
    when: When implementing a price or value property accessor in StrategyBase
    action: check root.stale flag and trigger update via root.update() if stale is True before returning cached values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Returning stale cached values causes portfolio calculations to be based on outdated position data, leading
      to incorrect rebalancing decisions and financial losses
    stage_ids:
    - value_propagation
  - id: finance-C-055
    when: When implementing floating-point equality comparisons for financial values
    action: use is_zero(x) function instead of direct 'x == 0' comparison to check for zero values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Direct zero comparison fails with floating-point accumulation errors, causing division-by-zero exceptions
      or infinite loops in value calculations
    stage_ids:
    - value_propagation
  - id: finance-C-056
    when: When updating a SecurityBase with NaN price while position is non-zero
    action: raise an exception with clear error message instead of proceeding with undefined value calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Computing value = position * NaN * multiplier produces undefined results, corrupting backtest results and
      causing silent incorrect portfolio valuations
    stage_ids:
    - value_propagation
  - id: finance-C-057
    when: When calculating strategy price for a regular (non-fixed-income) strategy
    action: 'use multiplicative return formula: price = last_price * (1 + ret) where ret = value / (last_value + net_flows)
      - 1'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using additive formula for regular strategies produces incorrect price index that doesn't reflect compound
      growth, leading to misleading performance reporting
    stage_ids:
    - value_propagation
  - id: finance-C-058
    when: When calculating strategy price for a fixed income strategy
    action: 'use additive return formula: price = last_price + ret where ret = (value - (last_value + net_flows)) / last_notional_value
      * PAR'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using multiplicative formula for fixed income strategies produces incorrect price index, as fixed income
      returns are additive and scaled by PAR (100.0) reference value
    stage_ids:
    - value_propagation
  - id: finance-C-059
    when: When a date change is detected during strategy update
    action: set newpt=True, reset _net_flows to 0, and save _last_value, _last_notl_value, _last_price before processing new
      period data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without newpt tracking, net flows accumulate across periods, causing incorrect return calculations that mix
      inter-period and intra-period capital movements
    stage_ids:
    - value_propagation
  - id: finance-C-061
    when: When initializing a FixedIncomeStrategy price
    action: set initial price to PAR=100.0 as the reference price for fixed income price index calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Starting fixed income price at 0 or other value corrupts the price index calculation, making the strategy
      price meaningless for performance tracking
    stage_ids:
    - value_propagation
  - id: finance-C-062
    when: When propagating values from children up the strategy tree
    action: accumulate child values by summing c.value for each child SecurityBase node before calculating strategy-level
      value
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect value accumulation causes strategy-level value to misrepresent total portfolio value, leading to
      wrong weight calculations and improper capital allocation
    stage_ids:
    - value_propagation
  - id: finance-C-063
    when: When computing weight for each child node in a strategy
    action: use c.value / val for regular strategies or c.notional_value / notl_val for fixed income strategies
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Wrong weight calculation basis causes misallocation of capital, as weights drive rebalancing decisions in
      the trading algorithm
    stage_ids:
    - value_propagation
  - id: finance-C-066
    when: When accessing security price or value properties
    action: check if _needupdate flag is set OR if now differs from parent.now, and call update() if either condition is true
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Stale security data causes incorrect value calculations and propagates wrong values up the strategy tree,
      corrupting portfolio-level calculations
    stage_ids:
    - value_propagation
  - id: finance-C-068
    when: When calculating fixed income notional value
    action: use position (quantity) as notional value, not market value (position * price), unlike regular securities
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using market value as notional for fixed income breaks the price return calculation, as fixed income returns
      should be based on par value movements scaled by notional quantity
    stage_ids:
    - value_propagation
  - id: finance-C-070
    when: When allocating capital to a strategy or security
    action: handle the case where price is zero or NaN by raising an exception instead of calculating infinite or undefined
      position quantity
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Division by zero when price is zero produces infinite position quantity; NaN price causes undefined position,
      both leading to critical system errors or silent portfolio corruption
    stage_ids:
    - value_propagation
  - id: finance-C-073
    when: When extracting transaction records from backtest results
    action: use positions.diff() to detect trades, setting first row to initial positions since diff(NaN) equals NaN
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Transaction records will be incomplete or missing trades on the first date, causing inaccurate slippage and
      commission calculations
    stage_ids:
    - result_analysis
  - id: finance-C-074
    when: When computing fixed income strategy price series
    action: 'use PAR (100.0) as the reference price with additive returns formula: prices = PAR * (1.0 + (returns / v).cumsum())'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Fixed income prices will be computed with incorrect reference point, breaking PAR-normalized comparisons
      and distorting total return calculations
    stage_ids:
    - result_analysis
  - id: finance-C-075
    when: When applying RenormalizedFixedIncomeResult to backtest results
    action: validate that each backtests use fixed_income strategy flag before renormalization
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Attempting to renormalize non-fixed-income backtests will raise ValueError at runtime, breaking automated
      result processing pipelines
    stage_ids:
    - result_analysis
  - id: finance-C-079
    when: When creating RenormalizedFixedIncomeResult
    action: 'compute additive returns net of flows using formula: returns = strategy.values.diff() - strategy.flows'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Fixed income return normalization will be incorrect without subtracting flows, leading to inaccurate comparison
      across periods with varying notional
    stage_ids:
    - result_analysis
  - id: finance-C-081
    when: When presenting backtest results to stakeholders
    action: claim that backtest returns predict future live trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Backtest overfitting, survivorship bias, and execution differences mean historical backtest returns systematically
      overestimate live trading returns
    stage_ids:
    - result_analysis
  - id: finance-C-085
    when: When implementing a custom Node subclass
    action: Implement the update(date, data, inow) method to update the node's state for a given date and data point; if not
      implemented, must raise NotImplementedError
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Strategy will fail with NotImplementedError during backtest execution when the framework attempts to update
      node state on each simulation date
  - id: finance-C-086
    when: When accessing price, prices, values, or notional_values properties
    action: Call root.update() before accessing the cached value if root.stale is True; stale flag indicates the value cache
      is invalidated and requires recalculation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Strategy returns stale/outdated values from previous dates causing incorrect trading decisions and corrupted
      backtest results
  - id: finance-C-087
    when: When running a Backtest instance
    action: 'Execute in the fixed order: setup(data) → adjust(initial_capital) → update(t0) → loop with update→run→update
      pattern for each subsequent date'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Backtest produces incorrect results, crashes, or enters infinite loop if initialization sequence is violated
      — capital is not set before trading begins
  - id: finance-C-089
    when: When allocating capital to a Security
    action: Allocate capital if the security price is zero or NaN at the allocation time; attempting allocation when price
      equals zero or is NaN must raise an Exception
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: System attempts to buy/sell at invalid prices, resulting in division errors, position sizing errors, or trades
      that cannot be properly modeled
  - id: finance-C-102
    when: When implementing fixed income and equity security construction in the same portfolio tree
    action: Bypass the fixed income parent-child type validation (ValueError check in BD-068); equity securities must not
      inherit fixed income parent nodes
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: If fixed income type validation is bypassed, equity securities would receive notional (par-based) weighting
      instead of market-value weighting, and prices would be calculated relative to PAR=100.0 instead of actual market prices
      - an equity trading at $150 would be mispriced as $100 par value, catastrophically distorting NAV calculations and position
      sizing
    derived_from_bd_id: BD-085
  - id: finance-C-103
    when: When implementing price calculation for securities within a mixed fixed income and equity portfolio tree
    action: Verify that each security's price calculation uses the correct pricing method - equity securities must use actual
      market price, fixed income securities must use PAR=100.0 reference; add runtime checks in weight calculation to verify
      each child matches parent fixed_income flag before applying weighting method
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without explicit type matching checks, a type mismatch between parent and child nodes causes catastrophic
      mispricing where downstream NAV calculations are completely unreliable and position sizing is severely distorted
    derived_from_bd_id: BD-085
  - id: finance-C-146
    when: When implementing or configuring paper trading mode in the backtesting framework
    action: Change $_paper_amount from 1000000 or use this value as real strategy capital — the $1M is a fake placeholder
      for shadow strategy simulation and must not be confused with actual strategy capital
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Confusing the $1M paper trading placeholder with real capital causes catastrophic fund mismanagement in live
      trading; strategies may attempt to allocate based on phantom notional value instead of actual account balance
    derived_from_bd_id: BD-070
  - id: finance-C-147
    when: When configuring portfolio hierarchy with mixed security types in the backtesting framework
    action: Create a portfolio hierarchy where any child security has fixed_income=True while the parent has fixed_income=False
      — the framework enforces this invariant and raises ValueError at setup
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Violating the fixed income parent-child constraint produces portfolio analytics that incorrectly blend equity
      and fixed income characteristics, generating misleading duration, convexity, and cash flow calculations that violate
      regulatory reporting requirements
    derived_from_bd_id: BD-068
  - id: finance-C-150
    when: When adding new securities or handling securities with data gaps in backtesting
    action: Verify each securities have sufficient lookback data before inclusion in momentum calculations; implement explicit
      data quality checks at security allocation time and provide graceful exclusion paths when historical data is insufficient
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The NaN cascade from virtual row insertion (t0-1day with NaN) propagates through SelectAll/SelectThese filters,
      causes StatTotalReturn to return False, and triggers allocation failures; backtest may fail completely or produce incomplete
      results for securities with data gaps
    derived_from_bd_id: BD-084
  - id: finance-C-154
    when: When implementing risk-based portfolio weighting algorithms (WeighInvVol, WeighERC, WeighMeanVar) in backtesting
    action: Verify sklearn covariance module is available and API-compatible — these algorithms require sklearn for covariance
      matrix estimation (specifically Ledoit-Wolf shrinkage per BD-057)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Risk-based weighting algos fail silently if sklearn covariance module is unavailable or upgraded to an incompatible
      API version, causing all risk parity, equal risk contribution, and mean-variance optimization strategies to break simultaneously
    derived_from_bd_id: BD-089
  regular:
  - id: finance-C-003
    when: When using additional_data with DataFrames
    action: verify additional_data DataFrames share the same index as price data before backtest initialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched indexes between price data and additional data (bidoffer, coupons) cause lookback calculations
      to fail or produce NaN values, breaking strategy logic
    stage_ids:
    - data_input
  - id: finance-C-004
    when: When processing price data for backtesting
    action: prepend a virtual t0-1day row with NaN prices to the data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without the virtual row, day-0 commissions adjust Strategy.prices and hide true total return, causing misleading
      backtest performance reporting
    stage_ids:
    - data_input
  - id: finance-C-005
    when: When initializing a Backtest object
    action: deepcopy the strategy to enable reuse across multiple runs while isolating state
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without deepcopy, multiple backtests sharing the same strategy object cause state contamination, leading
      to incorrect performance calculations across runs
    stage_ids:
    - data_input
  - id: finance-C-007
    when: When running the backtest framework
    action: claim that backtest results equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not account for slippage, market impact, liquidity constraints, or execution delays that
      occur in live trading, leading to unrealistic performance expectations
    stage_ids:
    - data_input
  - id: finance-C-008
    when: When configuring additional_data
    action: apply the same virtual row treatment to additional_data DataFrames to maintain index consistency
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without matching virtual rows, additional data (bidoffer, coupons) will have misaligned indexing causing
      incorrect transaction cost calculations and cash flow tracking
    stage_ids:
    - data_input
  - id: finance-C-009
    when: When backtesting strategies with transaction costs
    action: skip the virtual t0-1day row if large day-0 trades are expected
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Skipping the virtual row causes day-0 commissions to distort the starting price reference, making performance
      metrics appear worse than actual strategy performance
    stage_ids:
    - data_input
  - id: finance-C-010
    when: When reusing a strategy across multiple Backtest instances
    action: verify the Backtest constructor handles the strategy copying via deepcopy
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper deepcopy handling, modifying strategy parameters in one backtest affects all other backtests
      using the same strategy, causing cross-contamination of results
    stage_ids:
    - data_input
  - id: finance-C-011
    when: When implementing a Node tree structure for backtesting
    action: Set parent=self when creating a root node for cheap root detection
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without parent=self pattern, root detection would require a separate root flag check, increasing memory overhead
      and complicating tree traversal logic
    stage_ids:
    - tree_building
  - id: finance-C-013
    when: When creating a root node with integer_positions not explicitly set
    action: Rely on integer_positions default value for high-priced securities backtesting
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Default integer_positions=True causes rounding issues with high prices relative to capital, resulting in
      zero-position trades and missed trading opportunities
    stage_ids:
    - tree_building
  - id: finance-C-014
    when: When configuring integer_positions setting on a parent Node
    action: Cascade integer_positions setting to each descendant children via use_integer_positions method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without cascading, child securities may have inconsistent position sizing behavior, causing mismatched allocations
      across the strategy tree
    stage_ids:
    - tree_building
  - id: finance-C-015
    when: When accessing a child Node by string name that hasn't been materialized
    action: Create lazy children on first attribute access via _create_child_if_needed
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without lazy creation, all securities in sparse universes would be materialized upfront, causing unnecessary
      memory overhead and slower initialization
    stage_ids:
    - tree_building
  - id: finance-C-016
    when: When adding string-named children to a parent Node
    action: Manually create Node objects when lazy child creation is desired for performance
    severity: low
    kind: operational_lesson
    modality: must_not
    consequence: Eagerly creating all security nodes defeats lazy loading benefits, causing unnecessary memory allocation
      and slower tree construction for large universes
    stage_ids:
    - tree_building
  - id: finance-C-017
    when: When traversing descendants in a Node tree
    action: Use parent-child relationships to access descendants rather than flattening the tree
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Flattening the tree structure breaks the hierarchical relationships needed for proper capital allocation
      and weight propagation
    stage_ids:
    - tree_building
  - id: finance-C-018
    when: When adding children to a Node
    action: Set root reference on child nodes to maintain tree-wide root access
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without root reference propagation, child nodes cannot access the tree root, breaking root detection and
      stale flag management
    stage_ids:
    - tree_building
  - id: finance-C-019
    when: When implementing custom security types for lazy child creation
    action: Extend from SecurityBase to maintain proper tree structure compatibility
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Custom securities not inheriting from SecurityBase may not properly integrate with tree structure, causing
      transaction and allocation failures
    stage_ids:
    - tree_building
  - id: finance-C-020
    when: When initializing a Node with a children dictionary
    action: Preserve child names from dictionary keys when renaming child nodes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched dictionary keys and child names breaks name-based child access and causes KeyError exceptions
      during tree traversal
    stage_ids:
    - tree_building
  - id: finance-C-021
    when: When verifying tree construction in tests
    action: Skip validation that node.parent == node for root nodes
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Skipping root node validation allows incorrect tree structures to pass tests, causing runtime errors during
      strategy execution
    stage_ids:
    - tree_building
  - id: finance-C-022
    when: When using floating point comparisons in position calculations
    action: Use is_zero function with TOL=1e-16 tolerance instead of direct equality checks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Direct floating point equality causes infinite loops or incorrect position sizing due to precision errors
      in financial calculations
    stage_ids:
    - tree_building
  - id: finance-C-024
    when: When creating a SelectN Algo
    action: pass a negative value for the n parameter
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: SelectN raises ValueError('n cannot be negative') when initialized with n < 0, causing strategy creation
      to fail
    stage_ids:
    - strategy_logic
  - id: finance-C-025
    when: When executing AlgoStack
    action: return False from an Algo when execution should stop
    severity: high
    kind: domain_rule
    modality: must
    consequence: AlgoStack stops executing subsequent algos immediately when any algo returns False, potentially skipping
      critical rebalancing steps
    stage_ids:
    - strategy_logic
  - id: finance-C-026
    when: When implementing an Algo that needs to run every period
    action: apply the @run_always decorator to the algo method
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without @run_always, RebalanceOverTime and similar algos will only execute on the first date when a timing
      algo returns True, causing gradual rebalancing to fail
    stage_ids:
    - strategy_logic
  - id: finance-C-027
    when: When configuring RunPeriod-based algos
    action: set run_on_first_date=False if first-date execution should be skipped
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: RunPeriod defaults to run_on_first_date=True, causing algos to fire unexpectedly on the first backtest date
      when developer assumes monthly/weekly-only execution
    stage_ids:
    - strategy_logic
  - id: finance-C-028
    when: When building an AlgoStack
    action: skip validation that required temp keys are set by preceding algos
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Framework intentionally does not validate AlgoStack validity; missing required temp keys will cause downstream
      algos to raise KeyError or produce incorrect results silently
    stage_ids:
    - strategy_logic
  - id: finance-C-029
    when: When using RebalanceOverTime algo
    action: verify the algo stack includes @run_always decorator for the RebalanceOverTime
    severity: high
    kind: operational_lesson
    modality: must
    consequence: RebalanceOverTime needs multiple consecutive periods to complete gradual rebalancing; without run_always,
      subsequent periods will not execute the rebalancing logic after the first period
    stage_ids:
    - strategy_logic
  - id: finance-C-030
    when: When implementing the Algo temp pipeline
    action: 'execute algos in the correct order: selected first, then stat, then weights, then Rebalance'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: SelectN and WeighEqually algos require temp['stat'] and temp['selected'] respectively to be set by preceding
      algos; incorrect order causes KeyError or empty selections
    stage_ids:
    - strategy_logic
  - id: finance-C-031
    when: When implementing an Algo that needs cross-period state
    action: store state in target.perm dict instead of target.temp
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: temp dict is cleared on each Strategy.run() call; storing state in temp causes state loss between periods,
      breaking algos like CloseDead and RollPositionsAfterDates
    stage_ids:
    - strategy_logic
  - id: finance-C-032
    when: When implementing an Algo subclass
    action: return None from __call__ method
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Algo.__call__ returning None causes truthy evaluation issues in AlgoStack logic, potentially allowing execution
      to continue when it should stop or vice versa
    stage_ids:
    - strategy_logic
  - id: finance-C-033
    when: When using StatTotalReturn or other lag-enabled algos
    action: verify sufficient lookback data exists for the lag period
    severity: medium
    kind: domain_rule
    modality: must
    consequence: StatTotalReturn and similar algos use lag to prevent look-ahead bias; insufficient data causes return False,
      skipping rebalancing in early periods
    stage_ids:
    - strategy_logic
  - id: finance-C-034
    when: When creating a strategy using bt framework
    action: claim that backtest returns equal expected live trading returns
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtesting is a simulation that cannot account for slippage, liquidity constraints, and market impact; presenting
      backtest results as live trading proof violates financial modeling best practices
    stage_ids:
    - strategy_logic
    - value_propagation
  - id: finance-C-035
    when: When using bt for live trading decisions
    action: claim bt provides real-time trading capabilities
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: bt is explicitly a backtesting framework with no live trading connectivity; claiming real-time capability
      misleads users about the framework's limitations
    stage_ids:
    - strategy_logic
  - id: finance-C-036
    when: When evaluating bt framework stability
    action: claim bt is production-ready despite alpha status
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: README explicitly states 'bt is currently in alpha stage' - production use without understanding beta limitations
      risks financial loss from unexpected behavior
    stage_ids:
    - strategy_logic
  - id: finance-C-037
    when: When building complex AlgoStacks with branching logic
    action: assume Algo order doesn't matter for Or/Not/Require flow control
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Or([algo1, algo2]) returns True if ANY algo returns True; incorrect ordering can cause unintended execution
      branches or premature termination
    stage_ids:
    - strategy_logic
  - id: finance-C-038
    when: When developing custom Algos
    action: skip documenting 'Sets' and 'Requires' sections in docstrings
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Without proper documentation, users cannot correctly order algos in the stack; missing required temp keys
      causes silent failures or incorrect behavior
    stage_ids:
    - strategy_logic
  - id: finance-C-041
    when: When implementing bid/offer spread for regular trades
    action: Use abs(q) for symmetric bid/offer calculation to account for spread on both buy and sell
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without abs(q), bid/offer spread becomes asymmetric between buys and sells, causing incorrect transaction
      cost modeling and inflated/lopsided trading costs
    stage_ids:
    - capital_allocation
  - id: finance-C-042
    when: When using FixedIncomeStrategy
    action: Use market value for weight calculations in fixed income strategies
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Fixed income strategies have deterministic notional values; using market value causes incorrect weight calculations
      and breaks strategy logic since fixed income positions are not mark-to-market the same way as equities
    stage_ids:
    - capital_allocation
  - id: finance-C-043
    when: When implementing FixedIncomeStrategy
    action: Automatically trigger bankruptcy detection on negative value
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Fixed income strategies with negative values (leverage, short positions) should not be flagged as bankrupt;
      bankruptcy must be modeled explicitly via Margin Algo or other mechanisms
    stage_ids:
    - capital_allocation
  - id: finance-C-044
    when: When allocating capital to children in a hierarchy
    action: Propagate capital allocation proportionally using each child's _weight attribute
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proportional propagation, children receive incorrect capital amounts, breaking hierarchical allocation
      where a 10% parent allocation should result in 5%/5% for two 50%-weighted children
    stage_ids:
    - capital_allocation
  - id: finance-C-045
    when: When executing transactions with commission fees
    action: Deduct commission from the capital after determining the transaction quantity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Commissions not deducted correctly cause capital accounting errors where the strategy believes it has more
      cash than it actually does, leading to over-trading or impossible trades
    stage_ids:
    - capital_allocation
  - id: finance-C-046
    when: When using Rebalance algo without weights in temp
    action: Add debugging or logging when Rebalance silently passes due to missing weights
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Rebalance silently passes when weights are missing, causing empty portfolios that are hard to debug since
      no error is raised
    stage_ids:
    - capital_allocation
  - id: finance-C-047
    when: When allocating capital with commission functions that are non-linear
    action: Set commission per share greater than the price per share for regular securities
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Commission functions with per-share costs exceeding price per share cause infinite loops in allocation convergence,
      as the outlay cannot be satisfied within the amount constraint
    stage_ids:
    - capital_allocation
  - id: finance-C-048
    when: When implementing fixed income strategy as child of regular strategy
    action: Nest FixedIncomeStrategy as child of non-fixed-income Strategy
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Fixed income strategies have different price semantics (reference price) that cannot be correctly handled
      in a non-fixed-income parent, causing incorrect capital allocation and valuation
    stage_ids:
    - capital_allocation
  - id: finance-C-049
    when: When creating custom price transactions
    action: Enable bid/offer tracking by passing 'bidoffer' parameter during setup before using custom price transactions
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Transacting at custom prices without bid/offer tracking enabled causes ValueError, as the system cannot track
      the directional spread properly
    stage_ids:
    - capital_allocation
  - id: finance-C-050
    when: When using fixed income strategies
    action: Set notional_value via SetNotional algo or temp for rebalancing
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without proper notional_value setup, fixed income rebalancing uses stale or incorrect base values, causing
      misaligned weight targets and incorrect position sizing
    stage_ids:
    - capital_allocation
  - id: finance-C-051
    when: When comparing floating-point values in capital allocation
    action: Use the is_zero() function with TOL tolerance instead of direct equality comparisons
    severity: high
    kind: domain_rule
    modality: must
    consequence: Direct floating-point equality comparisons cause incorrect behavior due to precision errors, leading to missed
      zero-value conditions and infinite loops in quantity calculations
    stage_ids:
    - capital_allocation
  - id: finance-C-052
    when: When calculating bid/offer spread with custom prices
    action: Calculate bidoffer as q * (p - _price) * multiplier for signed directional tracking
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using abs(q) for custom prices breaks directional tracking since custom prices inherently represent signed
      transactions, causing incorrect spread attribution
    stage_ids:
    - capital_allocation
  - id: finance-C-053
    when: When implementing fixed income strategies
    action: Rely on initial capital as the allocation base
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Fixed income strategies treat initial capital differently - capital allocations are not necessary and initial
      capital is not used for weight calculations, only notional_value drives allocation
    stage_ids:
    - capital_allocation
  - id: finance-C-060
    when: When implementing SecurityBase.update() with unchanged date and unchanged position
    action: skip the update and return immediately to avoid unnecessary recalculation for position=0 securities
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Omitting this check causes unnecessary value recalculations on every step for zero-position securities, degrading
      backtest performance especially with sparse trading
    stage_ids:
    - value_propagation
  - id: finance-C-064
    when: When handling bid/offer spread accounting in strategy updates
    action: propagate bidoffer_paid from child securities and accumulate into strategy-level bidoffer_paid when bidoffer accounting
      is enabled
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silent omission of bid/offer tracking underestimates transaction costs, making backtest results overly optimistic
      compared to actual trading
    stage_ids:
    - value_propagation
  - id: finance-C-065
    when: When updating strategy value with changed value or notional value
    action: update both _values and _notl_values series at the current time index to maintain time series integrity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing time series update causes gaps or duplicate values in historical records, corrupting the backtest
      result time series used for analysis
    stage_ids:
    - value_propagation
  - id: finance-C-067
    when: When marking a strategy node as requiring update after capital adjustments or transactions
    action: set self.root.stale = True to defer expensive tree-wide value recalculation until data is actually accessed
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Omitting stale flag causes immediate O(n*depth) recalculation on every transaction, severely degrading backtest
      performance during iterative date processing
    stage_ids:
    - value_propagation
  - id: finance-C-071
    when: When rounding position quantities for securities with integer_positions=True
    action: use math.floor for long positions and math.ceil for short positions to correctly round fractional share quantities
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Incorrect rounding direction causes position sizing errors, as floor rounding on short positions or ceil
      on long positions introduces systematic bias in capital allocation
    stage_ids:
    - value_propagation
  - id: finance-C-072
    when: When StrategyBase root detects negative total value during update
    action: declare bankruptcy and flatten each positions when value < 0, unless the strategy is fixed_income or already bankrupt
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failure to detect and handle bankruptcy causes negative portfolio value to persist, leading to unlimited
      loss exposure and potential system failures from negative capital
    stage_ids:
    - value_propagation
  - id: finance-C-076
    when: When running random benchmark simulations
    action: use at least 100 simulations (nsim=100) to produce statistically meaningful comparison distribution
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Insufficient simulations produce noisy distribution that cannot reliably distinguish strategy skill from
      random chance
    stage_ids:
    - result_analysis
  - id: finance-C-077
    when: When calculating Sharpe ratio and related risk-adjusted metrics
    action: set riskfree rate via res.set_riskfree_rate() before displaying statistics
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Sharpe ratio and other risk-adjusted performance metrics will be calculated incorrectly without proper riskfree
      rate baseline
    stage_ids:
    - result_analysis
  - id: finance-C-078
    when: When accessing transactions from Result object
    action: delegate to strategy.get_transactions() which returns MultiIndex DataFrame with (Date, Security) index and quantity,
      price columns
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct access to backtest data will bypass proper transaction extraction logic, producing incomplete or incorrectly
      formatted records
    stage_ids:
    - result_analysis
  - id: finance-C-080
    when: When separating random benchmark statistics in RandomBenchmarkResult
    action: drop base_name (benchmarked strategy) from r_stats DataFrame and isolate it in b_stats Series
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Random distribution statistics will be contaminated with the benchmarked strategy's values, invalidating
      percentile rankings and skill assessment
    stage_ids:
    - result_analysis
  - id: finance-C-082
    when: When using RandomBenchmarkResult histogram for strategy evaluation
    action: claim statistical significance without considering the distribution width and overlap
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Strategies that appear to beat random distributions may still be indistinguishable when accounting for variance
      in the random simulation outcomes
    stage_ids:
    - result_analysis
  - id: finance-C-083
    when: When comparing fixed income results across different notional periods
    action: use RenormalizedFixedIncomeResult with consistent normalizing_value rather than comparing raw Result objects
    severity: high
    kind: domain_rule
    modality: must
    consequence: Raw fixed income results use varying notional denominators, causing counter-intuitive comparisons where price
      can be below par but total return is positive
    stage_ids:
    - result_analysis
  - id: finance-C-088
    when: When adding children to a Node
    action: Verify each child has a unique name within the parent; duplicate names within the same parent must raise ValueError
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ambiguous security/strategy references cause key errors or silent overwrites of existing children, corrupting
      the strategy tree structure
  - id: finance-C-090
    when: When executing an AlgoStack
    action: Stop execution and return False when any algo returns False, unless the algo has run_always=True decorator; algos
      with run_always continue executing even after a prior algo returns False
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Trading logic executes out of intended order, causing incorrect signals, wrong position sizing, or unintended
      trades based on incomplete signal processing
  - id: finance-C-091
    when: When setting integer_positions on a Node
    action: Propagate the integer_positions setting to each children via use_integer_positions() method; each children must
      share the same integer_positions setting as their parent/root
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Mixed position sizing between integer and fractional causes portfolio value misalignment and incorrect capital
      allocation across strategy branches
  - id: finance-C-092
    when: When creating a strategy tree structure with fixed income components
    action: Have a fixed income strategy as a child of a non-fixed income strategy; this violates the weighting model assumptions
      and must raise ValueError during setup
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Notional weighting is incorrectly applied to fixed income instruments, causing fundamentally incorrect portfolio
      valuations and weight calculations
  - id: finance-C-093
    when: When calculating quantities or comparing floating-point values
    action: Use the is_zero() function with TOL=1e-16 tolerance for floating-point comparisons instead of direct equality
      checks; this tolerance guards against floating-point precision errors
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Trades execute incorrectly or fail silently due to floating-point rounding errors, especially when commission
      functions or position sizing calculations produce near-zero values
  - id: finance-C-094
    when: When accessing the framework as a user
    action: Claim that this framework supports real-time trading execution — bt is a backtesting-only framework with no live
      trading connectivity or execution capabilities
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users allocate real capital expecting live execution, but the system only simulates historical trading, causing
      complete failure to execute any live trades
  - id: finance-C-095
    when: When presenting or reporting this system's backtested returns
    action: Claim that backtested returns equal expected live trading returns — backtesting uses perfect execution assumptions,
      ignores market impact, financing costs, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss when actual execution differs from simulated conditions
  - id: finance-C-096
    when: When using this framework for production deployment decisions
    action: Claim that this framework is suitable for production deployment — bt is explicitly designed for strategy research
      and backtesting only, with no operational infrastructure for live trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Organizations deploy untested infrastructure for live trading, causing catastrophic failures when backtested
      strategies encounter real-world operational requirements
  - id: finance-C-097
    when: When requiring sub-second latency trading capabilities
    action: Claim that this framework supports high-frequency trading with sub-second latency — bt uses Python and event-loop
      backtesting, incompatible with HFT requirements
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users design HFT strategies expecting microsecond execution, but the framework's Python-based architecture
      and daily/bar-based simulation cannot meet latency requirements
  - id: finance-C-098
    when: When users require risk management or compliance features
    action: Claim that this framework provides built-in risk management or compliance features — bt provides no such capabilities;
      risk management must be implemented externally or via custom Algos
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Regulatory violations occur when users assume compliance guards exist, leading to potential legal penalties
      and financial losses from uncontrolled trading
  - id: finance-C-099
    when: When running a backtest that has already executed
    action: Run a backtest instance more than once; has_run flag prevents re-execution and attempting to run an already-run
      backtest returns immediately without re-computing
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Duplicate backtest execution produces corrupted results with doubled returns, incorrect statistics, and invalid
      performance metrics
  - id: finance-C-100
    when: When accessing framework capability documentation or marketing materials
    action: Treat the framework as in alpha stage and expect potential bugs; the framework has not reached production stability
      and should not be used for live capital management without thorough validation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Users rely on alpha-quality code for live trading without adequate safeguards, causing unexpected behavior,
      incorrect trades, or system failures during critical trading periods
  - id: finance-C-101
    when: When accessing data through the framework
    action: Understand that each price and value arrays are indexed by DateTimeIndex matching the input data dates; the strategy.prices
      index includes a virtual row at t0-1day with NaN values as a reference starting point
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Off-by-one errors in date indexing cause look-ahead bias, incorrect signal timing, or key errors when accessing
      data arrays
  - id: finance-C-104
    when: When implementing rebalancing logic with update=False (default mode)
    action: Verify that external modifications to positions between rebalances do not occur, or set update=True to capture
      current position values dynamically rather than using a stale base captured at rebalance start
    severity: high
    kind: operational_lesson
    modality: must
    consequence: When positions are modified externally between rebalances, the stale base causes incorrect delta calculations,
      leading to systematic over-allocation or under-allocation that compounds over multiple rebalance periods
    derived_from_bd_id: BD-078
  - id: finance-C-105
    when: When implementing leveraged strategies that use both TargetVol scaling and margin financing
    action: Verify that annualization factors are consistent across the risk and cost calculations - either use 252-day annualization
      for both volatility and margin costs, or use 365.25-day annualization for both; document any intentional inconsistency
      for strategy transparency
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 252-day annualization for volatility while using 365.25-day daily compounding for margin costs creates
      a systematic mismatch in risk-adjusted return calculations, causing leveraged strategies to slightly misestimate true
      risk-adjusted returns
    derived_from_bd_id: BD-087
  - id: finance-C-106
    when: When implementing or modifying the stale flag propagation mechanism in the strategy tree
    action: Verify that every child node transaction (transact() call) marks root.stale=True, and that each weight and value
      computations check root.stale before returning cached values; code must not bypass the stale check or use cached values
      without triggering recalculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: If the stale flag propagation is broken or bypassed, downstream weight and value computations use outdated
      cached values, causing stale portfolio state to propagate through the strategy tree with silently incorrect NAV and
      position calculations
    derived_from_bd_id: BD-080
  - id: finance-C-107
    when: When implementing point-in-time data handling in backtesting
    action: Assume the framework handles point-in-time data correctly without lookahead bias - the framework does not implement
      point-in-time data filtering; future data may leak into historical calculations if not handled externally
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time data handling, backtests exhibit look-ahead bias where historical strategies use information
      that would not have been available at that point in time, causing live trading returns to fall significantly below backtested
      results
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-108
    when: When implementing stochastic components in backtesting (optimization, Monte Carlo, random sampling)
    action: Explicitly set and document random seeds for each stochastic operations - verify reproducibility by setting numpy.random.seed(),
      random.seed(), and any framework-specific seed parameters before stochastic calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without full random seed coverage, backtest results are non-reproducible, making it impossible to verify
      strategy performance across runs or share exact replication parameters with stakeholders
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-109
    when: When implementing stochastic components in backtesting
    action: Assume the framework sets random seeds automatically for each stochastic operations - the framework does not implement
      comprehensive random seed initialization; seeds must be set explicitly for numpy, random, and any third-party libraries
      used
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit seed setting, stochastic backtest results are unreproducible across runs, making it impossible
      to distinguish genuine strategy edge from random variation or to debug strategy behavior
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-110
    when: When implementing optimization or Monte Carlo simulation in backtesting
    action: 'Set seeds for each random number generators at the start of each stochastic operation: numpy.random.seed(seed_value),
      random.seed(seed_value), and framework-specific seed parameters if available; log seed values for reproducibility'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing random seed initialization causes backtest results to vary across runs without warning, making it
      impossible to reproduce optimization results or validate strategy stability across different random samples
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-111
    when: When implementing currency calculations or financial data handling
    action: Assume float precision is sufficient for currency values — floating-point arithmetic introduces rounding errors
      that accumulate in large-volume transactions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using float for currency calculations causes precision errors that accumulate over many transactions, leading
      to discrepancies between backtest results and actual account balances in live trading
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-112
    when: When implementing currency calculations in the framework
    action: Use Decimal type for each monetary calculations — initialize with string values to preserve precision, and explicitly
      convert float inputs via Decimal(str(value))
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without Decimal-based currency handling, rounding errors in fee calculations and position valuations cause
      systematic P&L discrepancies that are difficult to audit and reconcile
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-113
    when: When implementing settlement or delivery timing logic
    action: Assume uniform settlement timing across each instruments — different asset classes have different settlement conventions
      (T+0, T+1, T+2, T+3) that must be explicitly modeled
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming uniform settlement timing causes position management errors where securities appear available for
      trading before actual settlement completes, leading to rejected orders and regulatory violations
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-114
    when: When implementing model versioning or tracking data changes
    action: Assume model and data versions are implicitly tracked — the framework does not implement automatic model/data
      version snapshots for reproducibility
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit model/data version tracking, backtest results cannot be reliably reproduced when underlying
      models or data are updated, breaking audit trails and causing regulatory compliance issues
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-115
    when: When implementing audit trails for backtest reproducibility
    action: Implement explicit model and data version snapshots — capture hash of model parameters, data source, and data
      version at backtest initialization; store alongside results for full reproducibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit version snapshots, updating model parameters or data sources invalidates historical comparisons,
      making it impossible to determine whether performance changes are due to strategy improvements or external data changes
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-119
    when: When implementing data persistence or checkpoint logic in backtesting
    action: Assume the framework provides versioned write and snapshot semantics for data persistence — the framework does
      not implement atomic writes with versioning or point-in-time recovery capabilities
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without versioned writes and snapshot semantics, power failures or crashes during backtest checkpointing
      can leave data in an inconsistent state, making it impossible to recover the exact state of the backtest at a given
      point in time
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-120
    when: When implementing data persistence or checkpoint logic in backtesting
    action: Implement external versioning logic for backtest state saves — use atomic file operations (write to temp file
      then rename), store timestamps with each checkpoint, and maintain a version history log to enable rollback to specific
      backtest states
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without implementing external versioning, checkpoint failures can corrupt backtest state, making it impossible
      to resume from the exact previous state or recover from failed saves
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-121
    when: When processing historical data with delayed publication or revision in backtesting
    action: Assume data is available from the start of its timestamp coverage — the framework does not implement point-in-time
      data availability tracking with release_date/publish_date semantics
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming data availability from coverage start causes look-ahead bias where strategies trade on information
      that wouldn't have been available at that point in historical time, making backtest results optimistically biased compared
      to live trading
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-122
    when: When processing historical data with delayed publication or revision in backtesting
    action: Implement external point-in-time data availability tracking — add release_date and publish_date fields to each
      data record, filter data to only include records available at each simulation date, and explicitly handle data revision
      scenarios
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without point-in-time tracking, backtests trade on information published after the simulation date, inflating
      returns compared to live trading where such data wouldn't be available
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-123
    when: When implementing monetary calculations for PnL, fees, commissions, or position valuation in backtesting
    action: Use float64 for monetary calculations — the framework does not implement Decimal type for currency values, and
      floating-point arithmetic accumulates rounding errors over many transactions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using float64 for monetary calculations causes rounding errors that accumulate over many transactions, leading
      to discrepancies between backtested PnL and actual trading results, particularly in high-frequency or long-running strategies
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-124
    when: When implementing execution price calculation for new positions in backtesting
    action: Deduct half-spread from execution prices — buy orders execute at ask price minus half-spread, sell orders execute
      at bid price plus half-spread
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting bid/offer spread deduction makes backtest results unrealistically optimistic; live trading will
      incur 0.05-0.15% additional cost per round-trip, causing persistent gap between backtested and actual returns
    derived_from_bd_id: BD-039
  - id: finance-C-125
    when: When implementing WeighTarget algo in backtesting
    action: Return False when current date is not found in weights DataFrame — do not substitute previous weights or equal
      weights; halt algo execution instead
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using previous weights when targets are undefined creates look-ahead bias; using equal weights masks missing
      data, causing positions to be assigned without proper signal alignment and distorting backtest performance
    derived_from_bd_id: BD-043
  - id: finance-C-126
    when: When using StatTotalReturn with default parameters for momentum calculation
    action: Verify that 3-month lookback period matches the strategy's signal frequency and market characteristics; adjust
      lookback if strategy operates on different time horizons
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 3-month momentum lookback may not align with strategy objectives; shorter lookbacks increase responsiveness
      but add noise, longer lookbacks increase stability but lag regime changes
    derived_from_bd_id: BD-008
  - id: finance-C-127
    when: When using WeighInvVol, WeighERC, or WeighMeanVar with default parameters
    action: Verify that 3-month covariance lookback matches the rebalancing frequency; risk-based weights computed from different
      lookback periods will produce inconsistent portfolio allocations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Inconsistent covariance lookback periods across risk-based algos cause portfolio allocations to be based
      on different risk estimates, reducing the effectiveness of diversification and potentially increasing concentration
      risk
    derived_from_bd_id: BD-009
  - id: finance-C-128
    when: When implementing weight rebalancing with LimitDeltas default parameters
    action: Verify that 10% weight delta limit (0.1) balances turnover costs against tracking error for the specific strategy;
      adjust limit if strategy requires more aggressive rebalancing or stricter cost control
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 10% weight delta limit may be too conservative for high-conviction strategies or too aggressive for
      low-volatility portfolios, causing either excessive transaction costs or poor tracking of target weights
    derived_from_bd_id: BD-010
  - id: finance-C-129
    when: When implementing TargetVol or any volatility targeting with annualization
    action: Use 252 trading days as the annualization factor for US equity backtesting — verify volatility calculations convert
      daily/weekly/monthly measures to annualized terms consistently
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect annualization factor (365 calendar days or 250 for EU) causes volatility targets to be systematically
      miscalculated, leading to incorrect position sizing and either excessive risk or unnecessarily small positions
    derived_from_bd_id: BD-012
  - id: finance-C-130
    when: When implementing or initializing algos that require historical context in backtesting
    action: Assume data (prices, returns, historical context) is available during algo initialization or setup phase — data
      is only accessible after the first update(t0) call in the backtest loop
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Algos that perform data-dependent initialization (e.g., setting up rolling windows for covariance calculation)
      will fail silently or produce incorrect results if they attempt to access historical data before the first update()
      call in the backtest loop
    derived_from_bd_id: BD-086
  - id: finance-C-131
    when: When implementing algo initialization that requires historical data context
    action: Defer each data-dependent initialization to the first update() call rather than during algo setup — store initialization
      flags and compute rolling windows, covariance estimates, or other historical context only after data becomes available
      in the loop
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without deferring data-dependent initialization, algos like WeighInvVol or WeighERC will fail to set up proper
      rolling windows during setup phase, causing incorrect weight calculations on the first trading date
    derived_from_bd_id: BD-086
  - id: finance-C-132
    when: When implementing data storage in backtesting
    action: Assume the framework implements versioned data storage with immutable snapshots and prune protection — data modifications
      are destructive with no rollback capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without immutable snapshots and versioned storage, data corruption or accidental modifications cannot be
      rolled back, potentially invalidating entire backtest runs and requiring manual data reconstruction
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-133
    when: When implementing data management in backtesting
    action: Implement immutable data snapshots before any modification operations — create versioned copies of data before
      applying transforms, filters, or adjustments to enable rollback on error
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without immutable snapshots, any data transformation error permanently corrupts the dataset, requiring time-consuming
      data reload and reprocessing rather than simple rollback
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-134
    when: When evaluating backtest results for production deployment
    action: Assume the framework provides backtest overfitting protection mechanisms — the framework does not implement overfitting
      detection, walk-forward analysis, or out-of-sample validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without overfitting protection, strategies appear profitable in backtest but underperform live trading by
      40-80%, wasting capital on false alpha signals
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-135
    when: When validating strategy before production deployment
    action: Implement walk-forward analysis with out-of-sample testing to detect overfitting; split data into training and
      validation windows, test on unseen data, and verify performance degradation is within acceptable bounds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Deploying overfitted strategies causes live trading returns to fall 40-80% below backtested results, leading
      to capital losses and strategy abandonment
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-136
    when: When implementing or refactoring the Require algo in backtesting
    action: Change the if_none parameter from False (pass through) to True (blocking) — when weights are already set, Require
      must pass through to downstream algos, not block execution
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Setting if_none=True blocks execution even when weights are already properly set, preventing flexible composition
      of Require within conditional flows where Require acts as a filter
    derived_from_bd_id: BD-037
  - id: finance-C-137
    when: When implementing RunIfOutOfBounds position adjustment logic in backtesting
    action: Measure deviation as abs(new-old)/old (relative percentage change) rather than absolute difference — verify thresholds
      are scale-independent regardless of position size or asset price
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using absolute difference instead of relative deviation requires different threshold values for different
      position sizes, breaking the scale-independent threshold specification design
    derived_from_bd_id: BD-042
  - id: finance-C-138
    when: When implementing weight scaling logic in backtesting
    action: Allow negative scale factors to be applied to weights and preserve negative signs for short positions — do not
      normalize or block negative scale values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Blocking or normalizing negative scale factors breaks ScaleWeights functionality for long/short and market-neutral
      strategies that rely on inverse scaling of short positions
    derived_from_bd_id: BD-044
  - id: finance-C-139
    when: When implementing PairsSignal correlation check in pairs trading
    action: Use threshold of 4.0 standard deviations for correlation deviation check — this filters out normal correlation
      fluctuations and only signals when the pairs relationship has unusually broken down
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing threshold from 4.0 significantly alters signal frequency and false positive rate, potentially introducing
      excessive false signals or missing valid trading opportunities
    derived_from_bd_id: BD-045
  - id: finance-C-140
    when: When implementing pairs trading position sizing in backtesting
    action: Allocate 100% (weight=1.0) to the long leg of each pairs trade while the short leg receives offsetting exposure
      — maintain full position sizing to maximize pairs trade return potential per capital deployed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reducing the long leg allocation below 100% diminishes return potential for the pairs trade, leading to suboptimal
      capital utilization and reduced strategy returns
    derived_from_bd_id: BD-046
  - id: finance-C-141
    when: When implementing pairs trading initialization in backtesting
    action: Create child strategies dynamically for each pair — each child maintains its own state for independent position
      tracking, per-pair performance measurement, and isolated exits
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Managing all pairs in a single strategy prevents independent pair analysis and requires custom logic for
      per-pair exits, breaking the ability to manage pairs independently without interference
    derived_from_bd_id: BD-047
  - id: finance-C-142
    when: When implementing security selection logic in backtesting
    action: Drop securities with NaN prices by default during security inclusion — only pass NaN securities through when include_no_data=True
      is explicitly set to allow explicit handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing NaN securities through by default creates errors downstream when attempting to trade securities with
      no valid price data, causing backtest failures or incorrect position assignments
    derived_from_bd_id: BD-048
  - id: finance-C-143
    when: When implementing Equal Risk Contribution portfolio optimization
    action: Use Equal Risk Contribution optimization to verify each asset contributes equally to total portfolio volatility,
      respecting solver convergence tolerance and maximum iteration constraints
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing ERC with simple inverse volatility weighting ignores correlation structure between assets, leading
      to suboptimal diversification and potentially higher portfolio risk
    derived_from_bd_id: BD-052
  - id: finance-C-144
    when: When implementing Markowitz mean-variance portfolio optimization
    action: Apply constraints to verify positive semi-definite covariance matrix input for Markowitz optimization — do not
      use raw historical covariance without adjustment or regularization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-positive semi-definite covariance matrix causes optimization solver failures, produces invalid
      portfolio weights, or generates extreme concentrated positions
    derived_from_bd_id: BD-053
  - id: finance-C-145
    when: When implementing price normalization or float comparison logic in the backtesting framework
    action: Change PAR from 100.0 or TOL from 1e-16 without understanding the impact on price normalization and zero-threshold
      calculations — is_zero() function uses TOL to classify values smaller than machine epsilon as numerically zero
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Changing PAR or TOL values causes incorrect price normalization in normalization scenarios and may misclassify
      very small floating-point values as zero in high-frequency trading calculations, leading to silent errors in position
      sizing and P&L computation
    derived_from_bd_id: BD-071
  - id: finance-C-148
    when: When instantiating Backtest objects with strategy instances in the backtesting framework
    action: Deep copy the strategy object before passing it to Backtest — each backtest must receive an independent copy to
      prevent state leakage between concurrent runs
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Omitting deep copy causes backtests to share strategy state, making results from multiple runs contaminate
      each other with crossed signals, modified weights, and corrupted position tracking that produces non-reproducible and
      misleading backtest results
    derived_from_bd_id: BD-002
  - id: finance-C-149
    when: When initializing backtest data with the first data point at t0 in the backtesting framework
    action: Verify that a virtual pre-period row (t0-1day) with NaN values is present to enable accurate total return calculation
      for the first actual data point
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without the virtual NaN baseline row, first-period total return calculations fail or produce incorrect values,
      causing the backtest equity curve to be misaligned with actual strategy performance from day one and compounding errors
      in subsequent periods
    derived_from_bd_id: BD-001
  - id: finance-C-151
    when: When implementing or modifying AlgoStack execution logic in backtesting
    action: Short-circuit execution on first False return from any algo in the stack (unless the algo is decorated with @run_always
      decorator) — do not execute subsequent algos after a False signal
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing short-circuit behavior causes all algos to execute regardless of failure signals, breaking conditional
      execution flows where downstream algos depend on upstream conditions being met, leading to incorrect position sizing
      and wrong trading signals
    derived_from_bd_id: BD-032
  - id: finance-C-152
    when: When implementing conditional execution flows using AlgoStack in backtesting
    action: Verify AlgoStack stops execution immediately when any algo returns False — subsequent algos in the stack must
      not be invoked for that execution cycle
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without fail-fast behavior, downstream algos execute even when guard conditions (e.g., CheckDate) fail, causing
      the backtest to process dates that should have been skipped and producing incorrect equity curves
    derived_from_bd_id: BD-069
  - id: finance-C-153
    when: When implementing position allocation logic in backtesting
    action: Validate that security price is non-zero and non-NaN before allocating positions — raise an exception if price
      is invalid rather than attempting allocation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allocating positions with zero or NaN prices causes division by zero errors in position sizing calculations,
      potentially halting the backtest or creating infinite position sizes
    derived_from_bd_id: BD-075
  - id: finance-C-155
    when: When implementing Equal Risk Contribution (ERC) weight optimization
    action: Use Ledoit-Wolf shrinkage for covariance estimation — Ledoit-Wolf provides stable covariance estimates that prevent
      singular matrices
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sample covariance with limited history or high correlation produces singular matrices, causing ERC optimization
      to fail or produce degenerate weights that cannot be executed
    derived_from_bd_id: BD-019
  - id: finance-C-156
    when: When configuring ERC weight optimization convergence parameters
    action: Set tolerance=1e-8 and maximum_iterations=100 — tolerance of 1e-8 balances numerical stability with convergence
      speed for typical portfolio sizes
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Looser tolerance (e.g., 1e-4) may terminate optimization prematurely; stricter tolerance (e.g., 1e-12) wastes
      iterations with negligible weight improvements
    derived_from_bd_id: BD-019
  - id: finance-C-157
    when: When implementing rebalance execution logic
    action: Execute close orders first for positions not in target weights, then execute open orders for new positions — verify
      capital is freed before allocating new positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Opening new positions before closing zero-weight positions creates double exposure and potential leverage
      when capital is insufficient; buy orders may be rejected in live trading causing backtest-live inconsistency
    derived_from_bd_id: BD-020
  - id: finance-C-158
    when: When using SelectN with fractional n parameter
    action: Verify that n < 1 is interpreted as percentage of available securities — validate that 'SelectN(0.1)' selects
      10% of the current universe, not 0 or 1 security
    severity: high
    kind: operational_lesson
    modality: must
    consequence: If n < 1 is interpreted as absolute number, SelectN(0.1) selects 0 securities; if rounded to 1, strategy
      holds only 1 position instead of 10% of universe, distorting diversification and risk
    derived_from_bd_id: BD-023
  - id: finance-C-159
    when: When using UpdateRisk with default parameters for risk tracking
    action: Verify that default history=0 meets analysis requirements — if time-series risk analysis is needed, explicitly
      set history > 0 to enable historical snapshots
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default history=0 stores no historical risk snapshots; strategies requiring drawdown analysis or risk attribution
      cannot be backtested accurately without explicit history configuration
    derived_from_bd_id: BD-025
  - id: finance-C-160
    when: When implementing pairs trading exit conditions
    action: Exit pairs trades when price deviates beyond 4% from parity (price < 96 OR price > 104 for base=100) — hardcoded
      exit bands of 96-104 verify consistent mean reversion exit
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without defined exit bands, pairs trades hold indefinitely during diverged pairs, accumulating losses when
      mean reversion fails; tight bands (2%) increase costs, wide bands (10%) increase tail risk
    derived_from_bd_id: BD-027
  - id: finance-C-161
    when: When implementing pairs trading time-based exit
    action: Exit pairs trades when hold duration >= 5 days — maximum 5-day hold prevents extended exposure to broken pairs
      that fail to revert
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without time-based exit, pairs trades hold indefinitely waiting for mean reversion; broken pairs accumulate
      carry costs and margin interest, converting mean reversion strategy into directional bet
    derived_from_bd_id: BD-027
  - id: finance-C-162
    when: When implementing benchmark comparison logic in backtesting
    action: Assume the framework provides random weight generation for null-hypothesis benchmarking — the weighrandomly function
      referenced in bt/algos.py:1289 was not found in the codebase
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without random weight generation, backtests cannot establish null-hypothesis baseline; strategies that appear
      profitable may simply outperform random allocation by chance, leading to false confidence in ineffective strategies
    derived_from_bd_id: BD-058
  - id: finance-C-163
    when: When implementing benchmark comparison logic in backtesting
    action: Implement random weight generation supporting both uniform and bounded distributions with seed control, following
      the null-hypothesis benchmark design pattern
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Strategies without null-hypothesis comparison may appear profitable when they simply outperform random allocation;
      proper benchmarking requires random weight generation to establish whether active management adds value
    derived_from_bd_id: BD-058
  - id: finance-C-164
    when: When implementing or modifying portfolio turnover calculation logic
    action: Calculate turnover as min(buy_outlay, sell_outlay) divided by NAV — do not use max or sum which would double-count
      and overestimate transaction costs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using max or sum for turnover calculation double-counts opposing trades and overestimates transaction costs
      by up to 100%, causing backtest cost projections to exceed actual live trading costs
    derived_from_bd_id: BD-060
  - id: finance-C-165
    when: When implementing pairs trading strategy logic
    action: Generate long/short signals using z-score threshold on price spread difference — verify threshold parameter is
      exposed and validated against the strategy's target correlation and mean reversion assumptions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper z-score threshold validation, pairs trading may generate excessive false signals on low-correlation
      pairs or miss signals on high-correlation pairs, causing losses in both directions
    derived_from_bd_id: BD-061
  - id: finance-C-166
    when: When implementing pairs trading strategy
    action: Verify that z-score threshold parameter matches the expected mean reversion speed — typical values range from
      1.5 to 2.5 standard deviations; tighter thresholds increase signal frequency but reduce specificity
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using inappropriate z-score thresholds without validation causes strategies to either over-trade with low
      thresholds or under-trade with high thresholds, degrading risk-adjusted returns
    derived_from_bd_id: BD-061
  - id: finance-C-167
    when: When using the framework's default integer_positions parameter for backtesting
    action: Verify that integer_positions=True matches the broker's actual capabilities — fractional share support requires
      setting this to False, otherwise fractional share quantities will be silently truncated and residual cash will accumulate
      over many rebalances
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: With integer_positions=True, a $500 allocation with $100 share price results in 5 shares instead of 5.23,
      leaving $23 uninvested per rebalance; the error compounds silently over thousands of rebalancing cycles, causing backtest
      equity to diverge significantly from actual portfolio performance
    derived_from_bd_id: BD-067
  - id: finance-C-168
    when: When implementing rebalancing logic in backtesting
    action: Verify the weights key exists in target.temp before calling Rebalance, or explicitly check the return value to
      confirm trades were executed — Rebalance returns True without making any adjustments when weights are missing
    severity: high
    kind: domain_rule
    modality: must
    consequence: When weights are missing from target.temp, Rebalance returns True without executing any trades while the
      caller incorrectly assumes rebalancing completed successfully; this silent failure causes the strategy to operate on
      stale allocations with no trades executed
    derived_from_bd_id: BD-072
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
