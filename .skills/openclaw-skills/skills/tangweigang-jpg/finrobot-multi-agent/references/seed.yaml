  - id: finance-C-055
    when: When presenting financial analysis outputs to users
    action: present AI-generated equity research as guaranteed investment advice
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Generated reports use LLM-generated text and model-based forecasts; presenting them as guaranteed results
