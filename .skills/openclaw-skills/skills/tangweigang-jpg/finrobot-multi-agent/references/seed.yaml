      to reports
    stage_ids:
    - catalyst_analysis
  - id: finance-C-094
    when: When estimating event probability
    action: verify probability values fall within the range of 0.0 to 1.0
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Out-of-range probability values will cause incorrect weighted impact calculations in catalyst scoring
    stage_ids:
    - catalyst_analysis
  - id: finance-C-100
    when: When generating catalyst output for reports
    action: 'include each four required fields: event_type, impact_level, probability, sentiment'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing any output field will cause HTML/PDF rendering to fail or display incomplete catalyst information
    stage_ids:
    - catalyst_analysis
  - id: finance-C-120
    when: When including disclaimer text in generated reports
    action: State 'informational purposes only' and 'does not constitute investment advice'
    severity: fatal
    kind: claim_boundary
    modality: must
    consequence: Reports presented without proper disclaimers could create legal liability and regulatory compliance issues
    stage_ids:
    - report_generation
  - id: finance-C-129
    when: When configuring SQLite database for FastAPI
    action: Set connect_args with check_same_thread=False and use StaticPool class for connection pooling
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: SQLite database throws 'database is locked' errors or causes application crash when FastAPI workers attempt
      concurrent access
    stage_ids:
    - web_application
  - id: finance-C-163
    when: When implementing or extending agent response protocols
    action: Terminate each agent response messages with 'TERMINATE' string — every FinRobot agent workflow relies on this
      sentinel to signal task completion
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Agent workflows enter infinite loops or hang indefinitely because calling agents never receive completion
      signals, blocking all downstream report generation
  - id: finance-C-164
    when: When executing the equity research pipeline
    action: Complete financial_analysis step (generate_financial_analysis.py) before starting create_equity_report step —
      the report generator depends on CSV outputs from analysis
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Report generation fails with missing file errors because the report creation step cannot find the required
      financial_metrics_and_forecasts.csv and related outputs from the analysis step
  - id: finance-C-173
    when: When presenting or reporting this system's analysis outputs to users
    action: Present or market this system as capable of real-time trading with sub-second latency — FinRobot is designed for
      equity research and analysis, not high-frequency execution
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users relying on FinRobot for high-frequency trading face severe financial losses due to order execution
      latency, missed fills, and inability to interact with exchange APIs — the system has no live trading connectivity
  - id: finance-C-174
    when: When presenting or reporting this system's analysis outputs to users
    action: Claim that this system supports live trading execution — the system is a research and analysis platform with no
      exchange connectivity or order management capabilities
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users attempting live trading based on FinRobot's signals face catastrophic losses because the system cannot
      submit orders to brokerages, has no real-time market data feeds, and lacks position management functionality
  - id: finance-C-177
    when: When presenting or reporting this system's analysis outputs to users
    action: Present this system's outputs as financial advice or investment recommendations — the Apache 2.0 license explicitly
      disclaims this system as financial counsel
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users making investment decisions based on FinRobot's analysis face regulatory and financial consequences;
      presenting AI-generated analysis as investment advice may violate securities regulations in multiple jurisdictions
  - id: finance-C-184
    when: When making SEC EDGAR API requests for filing retrieval
    action: Enforce rate limiting of 10 requests per second using @sleep_and_retry @limits decorators on each EDGAR API calls;
      queue or reject requests exceeding the rate limit
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Exceeding the SEC EDGAR rate limit risks temporary or permanent API access revocation, blocking critical
      SEC filing retrieval and violating SEC access terms of service
    derived_from_bd_id: BD-003
  - id: finance-C-187
    when: When implementing any financial calculations involving monetary amounts
    action: Use Python float type for currency calculations — float precision errors in binary representation cause silent
      rounding errors that accumulate across transactions
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Using float for currency calculations introduces precision errors due to binary floating-point representation;
      small rounding errors accumulate across thousands of transactions, leading to incorrect P&L and audit reconciliation
      failures
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-188
    when: When implementing any financial calculations involving monetary amounts
    action: Use Python Decimal type with sufficient precision (minimum 4 decimal places) for each currency fields including
      prices, costs, fees, dividends, and P&L calculations; wrap each currency arithmetic with Decimal() constructor from
      the decimal module
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing Decimal implementation for currency causes precision errors accumulating across transactions, resulting
      in incorrect account balances, failed audit checks, and potential financial discrepancies in production systems
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-190
    when: When configuring API key management for the finrobot framework
    action: Store each sensitive API keys exclusively in environment variables and never commit them to version control; use
      JSON configuration files only for non-sensitive, shareable settings
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Exposing API keys in version control risks unauthorized access and quota exhaustion; if leaked keys are used
      by third parties, the organization bears financial liability and may lose API access entirely
    derived_from_bd_id: BD-061
  - id: finance-C-192
    when: When performing DCF valuation with terminal value calculation
    action: Conduct explicit sensitivity analysis on terminal value since it dominates DCF output (with WACC ~10%, a 0.5%
      change in growth rate changes terminal value by ~12.5%); document terminal value as percentage of total valuation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Terminal value typically represents 60-80% of DCF valuation; ignoring this sensitivity causes price targets
      to be heavily dependent on one assumption, leading to misleading investment recommendations
    derived_from_bd_id: BD-100
  regular:
  - id: finance-C-003
