      analysis to find zero forecast years, resulting in empty sensitivity DataFrames with no scenarios across parameter ranges
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-092
    when: When creating a CatalystData instance
    action: 'include each required fields: event_type, description, expected_date, impact_level, probability, sentiment'
    severity: fatal
    kind: domain_rule
    modality: must
