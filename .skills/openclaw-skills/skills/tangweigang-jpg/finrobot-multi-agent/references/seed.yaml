resources:
  packages:
  - name: pyautogen>=0.2.19
    version_pin: latest
  - name: openai>=1.0.0,<2.0.0
    version_pin: latest
  - name: yfinance>=0.2.0,<1.0.0
    version_pin: latest
  - name: pandas>=2.0.0,<3.0.0
    version_pin: latest
  - name: numpy>=1.24.0,<2.0.0
    version_pin: latest
  - name: requests>=2.28.0,<3.0.0
    version_pin: latest
  - name: matplotlib>=3.6.0,<4.0.0
    version_pin: latest
  - name: seaborn>=0.12.0
    version_pin: latest
  - name: fastapi>=0.100.0
    version_pin: latest
  - name: sqlalchemy>=2.0.0
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install pyautogen>=0.2.19
    - python3 -m pip install openai>=1.0.0,<2.0.0
    - python3 -m pip install yfinance>=0.2.0,<1.0.0
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing SEC API calls
    action: apply rate limiting decorators to prevent exceeding SEC EDGAR limits
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Exceeding SEC's 10 req/sec rate limit causes IP blocking, preventing access to critical financial filings
      and disrupting the data collection pipeline
    stage_ids:
    - data_collection
  - id: finance-C-002
    when: When fetching SEC EDGAR data directly
    action: set User-Agent header with valid company and email for SEC access
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: SEC EDGAR rejects requests without proper User-Agent headers, causing all filing retrieval operations to
      fail silently
    stage_ids:
    - data_collection
  - id: finance-C-007
    when: When using SEC EDGAR API
    action: exceed the regulatory rate limit of 10 requests per second
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: SEC EDGAR enforces strict rate limits; exceeding them results in IP blocking that prevents all subsequent
      filing downloads for extended periods
    stage_ids:
    - data_collection
  - id: finance-C-016
    when: When using financial data for trading decisions
    action: claim real-time trading capability when using delayed polling-based data sources
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting delayed market data as real-time creates false confidence; yfinance provides 15+ minute delayed
      quotes, unsuitable for time-sensitive trading
    stage_ids:
    - data_collection
  - id: finance-C-017
    when: When presenting backtest results
    action: equate simulated returns with expected live trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results exclude slippage, liquidity constraints, and market impact; presenting them as live trading
      proof misleads users about expected returns
    stage_ids:
    - data_collection
  - id: finance-C-021
    when: When implementing agent conversation termination logic
    action: set is_termination_msg to check for 'TERMINATE' suffix in response content
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Agent conversations hang indefinitely without termination, blocking the workflow and consuming API resources
      indefinitely
    stage_ids:
    - agent_workflow
  - id: finance-C-022
    when: When defining agent system prompts for completion signaling
    action: include 'TERMINATE' keyword in agent completion instructions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: LLM agents without explicit TERMINATE instruction may not signal completion, causing chats to hang and never
      terminate cleanly
    stage_ids:
    - agent_workflow
  - id: finance-C-023
    when: When registering toolkit functions for agent use
    action: verify each tool function is callable before registration
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-callable tool registration raises ValueError, breaking agent initialization and preventing financial
      data retrieval
    stage_ids:
    - agent_workflow
  - id: finance-C-026
    when: When implementing SingleAssistantBase or MultiAssistantBase classes
    action: implement chat() and reset() abstract methods for agent interaction contract
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing abstract method implementation causes TypeError on instantiation, preventing any agent workflow from
      running
    stage_ids:
    - agent_workflow
  - id: finance-C-027
