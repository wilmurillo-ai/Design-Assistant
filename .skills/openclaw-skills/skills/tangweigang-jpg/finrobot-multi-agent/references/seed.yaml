  - id: finance-C-012
    when: When implementing earnings call data retrieval
    action: apply retry logic with exponential backoff for transient network failures
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Network timeouts during earnings transcript retrieval cause incomplete data collection without retry mechanisms
    stage_ids:
    - data_collection
  - id: finance-C-013
    when: When returning financial DataFrames from data sources
    action: verify stock price DataFrames contain date, open, high, low, close, volume columns
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing standard OHLCV columns causes KeyError exceptions in downstream charting and analysis functions
    stage_ids:
    - data_collection
  - id: finance-C-014
    when: When returning financial metrics DataFrames
    action: verify financial statement DataFrames have consistent year column naming with 'A'/'E' suffixes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent year column naming breaks valuation calculations and peer comparison logic in downstream analysis
      stages
    stage_ids:
    - data_collection
  - id: finance-C-015
    when: When accessing external market data
    action: access data exclusively through data_source module utilities
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct API access bypasses rate limiting, caching, and graceful degradation mechanisms, risking service disruptions
    stage_ids:
