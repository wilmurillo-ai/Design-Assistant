  - id: finance-C-020
    when: When troubleshooting SEC filing retrieval
    action: ignore rate limit warnings assuming one failed request is acceptable
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Ignoring rate limit violations causes IP bans from SEC EDGAR, preventing access to all filings for extended
      periods
    stage_ids:
    - data_collection
  - id: finance-C-024
    when: When implementing nested chat delegation in leader-employee pattern
    action: register nested chats with proper trigger pattern matching agent name in brackets
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Improper trigger registration causes employee agents to never receive delegated tasks, breaking the hierarchical
      workflow orchestration
    stage_ids:
    - agent_workflow
  - id: finance-C-025
    when: When implementing shadow agent validation pattern
    action: assign toolkits to shadow validation agent
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Shadow agents with toolkit access may validate using tools instead of pure reasoning, invalidating the parallel
      validation guarantee
    stage_ids:
    - agent_workflow
  - id: finance-C-028
    when: When implementing speaker selection in MultiAssistant group chat
    action: define custom speaker selection logic to prevent infinite loops
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Default speaker selection may cause repeated agent selection, leading to infinite conversation loops and
      API timeout failures
    stage_ids:
    - agent_workflow
  - id: finance-C-029
    when: When implementing nested chat message extraction
    action: extract orders using regex pattern matching agent name brackets
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Improper order extraction causes employees to receive incorrect or empty instructions, breaking leader-employee
      coordination
    stage_ids:
    - agent_workflow
  - id: finance-C-030
    when: When using Cache.disk() for reducing repeated LLM API calls
    action: enable cache disk when identical queries may be executed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Repeated identical queries without cache incur full API costs for each execution, significantly increasing
      operational costs
    stage_ids:
    - agent_workflow
  - id: finance-C-031
    when: When implementing SingleAssistantShadow nested chat registration
    action: register nested chats with silent=True to mute validation output
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Shadow agent chat without silent flag produces verbose validation output, cluttering logs and obscuring primary
      workflow results
    stage_ids:
    - agent_workflow
  - id: finance-C-033
    when: When implementing toolkit registration via class methods
    action: use register_toolkits_from_cls for class-based toolkit registration
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Class methods without proper registration may not be accessible to agents, breaking financial data retrieval
      workflows
    stage_ids:
    - agent_workflow
  - id: finance-C-035
    when: When implementing leader-employee order delegation
    action: include TERMINATE in employee response before code execution completes
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Premature TERMINATE in employee response causes conversation to end before code execution results are received,
      producing incomplete analysis
    stage_ids:
    - agent_workflow
  - id: finance-C-039
    when: When implementing nested chat order extraction
    action: append 'Reply TERMINATE' instruction to extracted order text
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing TERMINATE instruction in nested chat message causes employee agent to never signal completion, leaving
      conversations hanging
    stage_ids:
    - agent_workflow
  - id: finance-C-040
    when: When implementing FinRobot agent with proxy registration
    action: register toolkit functions with both caller and executor agents
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Toolkit functions registered without proper caller-executor pairing prevents agents from executing financial
      data retrieval tools
    stage_ids:
    - agent_workflow
  - id: finance-C-041
    when: When implementing financial data processing pipelines
    action: follow year suffix convention with 'A' for actual and 'E' for estimate values in DataFrame column names
    severity: high
    kind: domain_rule
    modality: must
    consequence: Downstream modules filter columns by endswith('A') or endswith('E') patterns; mismatched suffixes cause metric
      columns to be silently excluded from forecasts and reports
    stage_ids:
    - financial_analysis
  - id: finance-C-042
    when: When extracting financial metrics from API responses
    action: implement fallback chains for field names across different data provider conventions
    severity: high
    kind: domain_rule
    modality: must
    consequence: FMP API uses multiple field name conventions (revenue, totalRevenue, netSales); without fallback chains,
      critical metrics return None, causing downstream division-by-zero errors in margin calculations
    stage_ids:
    - financial_analysis
  - id: finance-C-043
    when: When creating DataFrames that store both numeric values and percentage strings
    action: use object dtype instead of float or int to enable mixed-type storage without type coercion errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pandas cannot store '32.5%' strings in float columns; using object dtype prevents 'cannot insert into Scalar
      type' errors while allowing both numeric revenue and formatted margin strings
    stage_ids:
    - financial_analysis
  - id: finance-C-044
    when: When performing financial calculations with margins
    action: parse percentage strings by removing '%' and ',' characters before numeric conversion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Margin values stored as '32.5%' strings cause TypeError in division operations; parsing is required to extract
      numeric values for growth and CAGR calculations
    stage_ids:
    - financial_analysis
  - id: finance-C-045
    when: When validating required inputs for financial analysis
    action: check that income_statement DataFrame is not None and not empty before processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: FMP API may return None or empty DataFrame when API key is invalid or ticker is not found; without validation,
      downstream code attempts to access .sort_values() on None, causing AttributeError
    stage_ids:
    - financial_analysis
  - id: finance-C-047
    when: When projecting EBITDA for peer comparison
    action: require at least 2 historical EBITDA values to calculate average growth rate for projections
    severity: high
    kind: resource_boundary
    modality: must
    consequence: With fewer than 2 historical values, pct_change().dropna() returns empty Series, causing division by zero
      or NaN in projection calculations at market_data_api.py:226-230
    stage_ids:
    - financial_analysis
  - id: finance-C-048
    when: When handling missing or unavailable financial data
    action: populate fields with 'N/A' string for non-numeric metrics and None for numeric metrics
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Graceful degradation prevents crashes when peer data or ratios are unavailable; missing data shows as 'N/A'
      rather than causing KeyError or AttributeError
    stage_ids:
    - financial_analysis
  - id: finance-C-049
    when: When calculating revenue growth rates
    action: use the first year as baseline with no growth rate calculation (set to NaN or 'N/A')
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: First year has no prior year to compare; attempting to calculate growth rate with previous = NaN produces
      NaN results, breaking downstream percentage formatting
    stage_ids:
    - financial_analysis
  - id: finance-C-050
    when: When processing revenue values from API responses
    action: validate that revenue is not zero before calculating revenue growth rates
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Division by zero occurs when previous revenue is 0, producing inf values and corrupting financial metrics
      display in generated reports
    stage_ids:
    - financial_analysis
  - id: finance-C-051
    when: When identifying forecast years for projections
    action: filter DataFrame columns using endswith('E') pattern to distinguish estimates from actuals
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Sensitivity analyzer and valuation engine use only forecast columns for projections; mixing actual and estimate
      columns causes incorrect sensitivity ranges and valuation results
    stage_ids:
    - financial_analysis
  - id: finance-C-052
    when: When determining the base year for revenue forecasts
    action: identify the latest column ending with 'A' as the base year for projection calculations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Forecasts build on the most recent actual data; using wrong base year causes revenue projections to compound
      from incorrect starting point, producing materially wrong forecasts
    stage_ids:
    - financial_analysis
  - id: finance-C-053
    when: When extracting PE Ratio from financial data
    action: check ratios DataFrame first, then key_metrics DataFrame as fallback, before giving up
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: PE Ratio appears in both ratios and key_metrics endpoints with different field names; checking only one source
      causes missed data and None values in report tables
    stage_ids:
    - financial_analysis
  - id: finance-C-054
    when: When initializing SensitivityAnalyzer with forecast data
    action: copy the input DataFrame to prevent mutation of original data during sensitivity calculations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Sensitivity analysis modifies DataFrame values during what-if scenarios; without copy(), original forecast
      data becomes corrupted, affecting downstream report generation
    stage_ids:
    - financial_analysis
  - id: finance-C-056
    when: When generating financial forecasts and projections
    action: represent forecasted revenue and EBITDA values as actual historical results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Forecast values are model-based estimates with inherent uncertainty; presenting them as actual results misleads
      users about data reliability and investment decision quality
    stage_ids:
    - financial_analysis
  - id: finance-C-057
    when: When displaying confidence intervals from sensitivity analysis
    action: claim statistical certainty for model-based confidence ranges without external validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: SensitivityAnalyzer calculates confidence intervals using assumed 15% standard deviation ratio (sensitivity_analyzer.py:240);
      presenting these as statistically validated ranges without verification misleads users about forecast precision
    stage_ids:
    - financial_analysis
  - id: finance-C-058
    when: When handling API request failures or data unavailability
    action: gracefully continue pipeline with fallback text instead of crashing
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: OpenAI API failures or missing news data should not halt entire report generation; fallback text ensures
      deliverables are produced even with degraded content quality
    stage_ids:
    - financial_analysis
  - id: finance-C-059
    when: When parsing date strings from FMP API responses
    action: convert date columns to datetime before extracting year values
    severity: high
    kind: domain_rule
    modality: must
    consequence: API returns date strings; without pd.to_datetime() conversion, year extraction fails and causes KeyError
      when trying to filter or group by year in financial data processing
    stage_ids:
    - financial_analysis
  - id: finance-C-060
    when: When calculating EBITDA projections from historical peer data
    action: handle zero growth rate scenario by defaulting to 0% when historical values show no change
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: When all historical EBITDA values are identical, mean() of pct_change returns NaN; defaulting to 0 prevents
      infinite projections while indicating flat performance
    stage_ids:
    - financial_analysis
  - id: finance-C-064
    when: When balance sheet data is unavailable for net_debt calculation
    action: apply simplified net_debt assumption as net_debt = EV * 10% (0.1 multiplier)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without the 10% fallback assumption, EV-to-equity conversion fails silently, producing zero or undefined
      target prices and losing the entire valuation output
    stage_ids:
    - valuation_engine
  - id: finance-C-065
    when: When free_cash_flow field is absent from financial_data
    action: approximate FCF as EBITDA * 60% (0.6 multiplier) to enable DCF calculation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without the FCF approximation, DCF valuation returns zero target price and confidence=0, making the primary
      DCF method unusable and reducing synthesis reliability
    stage_ids:
    - valuation_engine
  - id: finance-C-066
    when: When no historical EV/EBITDA multiple data exists in key_metrics
    action: fall back to default multiple of 12.0x with standard deviation of 3.0x
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without default multiples, EV/EBITDA method uses 0 target_multiple and produces zero valuations, leaving
      a gap in the multi-method synthesis
    stage_ids:
    - valuation_engine
  - id: finance-C-067
    when: When peer_data dictionary is empty or contains no valid ev_ebitda entries
    action: return ValuationResult with target_price=0, low_estimate=0, high_estimate=0, confidence=0 and log a warning
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing peer data check causes KeyError or empty list iteration in np.mean/np.min/np.max, crashing the valuation
      pipeline and preventing report generation
    stage_ids:
    - valuation_engine
  - id: finance-C-069
    when: When synthesizing valuation from multiple methods
    action: compute weighted average using confidence scores as weights, filtering to only non-zero target_price results
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect weighting produces misleading target prices that do not reflect method reliability, causing investors
      to make decisions based on unweighted averages that over-weight low-confidence methods
    stage_ids:
    - valuation_engine
  - id: finance-C-070
    when: When generating ValuationResult output
    action: populate target_price, low_estimate, high_estimate, and confidence fields in the dataclass
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing fields in ValuationResult cause KeyError in synthesize_valuation and downstream report generation,
      breaking the entire valuation pipeline output
    stage_ids:
    - valuation_engine
  - id: finance-C-071
    when: When calculating DCF terminal growth rate
    action: use default terminal_growth of 2.5% (0.025) aligned with long-term GDP growth expectations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using incorrect terminal growth rate causes terminal value to diverge from realistic long-term expectations,
      producing inflated or deflated enterprise values and misleading target prices
    stage_ids:
    - valuation_engine
  - id: finance-C-072
    when: When assigning confidence scores to valuation methods
    action: assign EV/EBITDA confidence=0.7, Peer=0.6, DCF=0.5 to reflect relative reliability of each method
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect confidence assignments distort the confidence-weighted synthesis, causing the output target_price
      to over- or under-weight less reliable methods and produce misleading investment recommendations
    stage_ids:
    - valuation_engine
  - id: finance-C-073
    when: When computing DCF per-share price sensitivity range
    action: vary WACC by ±1% (wacc+0.01 and wacc-0.01) to establish low/high bounds for the sensitivity table
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Missing sensitivity range causes flat valuation estimates with no uncertainty bounds, making it impossible
      to assess valuation confidence or compare to current price
    stage_ids:
    - valuation_engine
  - id: finance-C-074
    when: When generating multi-method valuation output
    action: produce results from at least EV/EBITDA, Peer Comparison, and DCF methods to enable meaningful synthesis
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Single-method valuation misleads readers into believing the output reflects expert consensus, when in reality
      it represents only one approach with its own biases and limitations
    stage_ids:
    - valuation_engine
  - id: finance-C-075
    when: When presenting valuation results to users
    action: claim the system provides real-time or professional-grade valuation comparable to sell-side equity research
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Overstating valuation accuracy leads investors to trust automated estimates as precise price targets, resulting
      in financial losses when actual market prices diverge from simplified model outputs
    stage_ids:
    - valuation_engine
  - id: finance-C-076
    when: When equity_value equals or falls below net_debt
    action: produce a target_price near zero or negative without explicit warning about distressed company valuation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Near-zero valuations presented without context mislead readers into thinking the company is worthless, when
      in reality distressed companies require special valuation approaches (liquidation value, sum-of-parts) not used here
    stage_ids:
    - valuation_engine
  - id: finance-C-077
    when: When the valuation engine encounters missing financial_data fields
    action: use fallback defaults and log warnings rather than raising unhandled exceptions
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unhandled KeyError or AttributeError crashes the entire valuation pipeline, preventing report generation
      and leaving users without any valuation output
    stage_ids:
    - valuation_engine
  - id: finance-C-078
    when: When calculating valuation synthesis upside percentage
    action: guard against division by zero when current_price is zero or missing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero in upside calculation produces inf or NaN in the synthesis output, corrupting the report
      and causing template rendering errors
    stage_ids:
    - valuation_engine
  - id: finance-C-081
    when: When implementing confidence interval calculation in sensitivity analysis
    action: Use fixed std_ratio of 0.15 (15%) for revenue volatility heuristic in confidence interval calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: The calculate_confidence_interval method hardcodes std_ratio=0.15; if changed to a different value, confidence
      intervals no longer reflect the documented 15% volatility heuristic assumption, causing misleading uncertainty quantification
      in the sensitivity analysis outputs
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-082
    when: When setting default sensitivity analysis ranges for revenue growth scenarios
    action: Apply ±5% revenue growth range (growth_range = (-0.05, 0.05)) as the default scenario boundaries
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: The analyze_revenue_sensitivity method defaults to ±5% growth range; using wider ranges may produce unrealistic
      extreme scenarios, while narrower ranges may miss plausible market conditions, reducing the utility of sensitivity analysis
      for risk assessment
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-083
    when: When setting default sensitivity analysis ranges for margin scenarios
    action: Apply ±2% margin range (margin_range = (-0.02, 0.02)) as the default scenario boundaries
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: The analyze_margin_sensitivity method defaults to ±2% margin range; using wider ranges may produce implausible
      margin scenarios, while narrower ranges may not capture meaningful operational variations, limiting risk identification
      in sensitivity outputs
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-084
    when: When calculating default confidence level for sensitivity intervals
    action: Use 95% confidence level (confidence = 0.95) as the default for confidence interval calculations
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: The calculate_confidence_interval method defaults to 95% confidence; using lower confidence levels produces
      narrower intervals that understate uncertainty, while higher levels produce wider intervals that may overstate risk,
      misrepresenting the sensitivity analysis reliability
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-085
    when: When performing sensitivity analysis with base_forecast DataFrame
    action: Verify the base_forecast DataFrame contains 'Revenue' and 'EBITDA Margin' metrics for sensitivity calculations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: The sensitivity analysis requires Revenue and EBITDA Margin metrics to compute scenario impacts; missing
      these metrics causes _get_metric_value to return None, resulting in empty or zero sensitivity matrices that provide
      no meaningful scenario analysis
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-086
    when: When implementing combined sensitivity matrix generation
    action: Use the last forecast year (forecast_years[-1]) as the target year for the combined sensitivity matrix
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The generate_sensitivity_table method uses forecast_years[-1] as target_year; using a different year selection
      may produce matrix values based on earlier periods, misrepresenting the long-term sensitivity scenario that investors
      typically focus on for valuation decisions
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-087
    when: When implementing the sensitivity analysis stage
    action: Call generate_sensitivity_summary to output assumption summary with base case and scenario details
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: The generate_sensitivity_summary method documents all assumptions including growth/margin ranges and confidence
      levels; omitting this step leaves users without clear documentation of the sensitivity analysis methodology, violating
      transparency requirements for financial analysis outputs
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-088
    when: When presenting sensitivity analysis confidence intervals to users
    action: Claim confidence intervals represent actual statistical uncertainty computed from historical volatility data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: The confidence intervals are based on a simplified heuristic (15% std_ratio assumption) rather than actual
      historical volatility analysis; presenting these as rigorous statistical intervals misleads users about the precision
      of uncertainty estimates in the sensitivity analysis outputs
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-089
    when: When presenting sensitivity analysis results
    action: Present sensitivity scenario results as predictions of actual future financial outcomes
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Sensitivity analysis scenarios (±5% revenue growth, ±2% margin) are simplified assumptions for exploring
      parameter uncertainty; presenting these as predictions misleads users into believing specific scenario outcomes will
      occur, violating the fundamental distinction between scenario analysis and financial forecasting
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-090
    when: When calculating confidence intervals using the std_ratio parameter
    action: Modify std_ratio to values outside the validated range of 0.10 to 0.20 without re-validation
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: The std_ratio of 0.15 is calibrated for typical revenue volatility across sectors; changing it without validation
      produces systematically biased confidence intervals that either understate risk (too narrow) or overstate uncertainty
      (too wide), leading to poor investment decision-making
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-091
    when: When generating the sensitivity matrix output DataFrame
    action: Return a DataFrame with 'Revenue Growth' as the index containing forecast values across parameter ranges
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The generate_sensitivity_table method sets 'Revenue Growth' as the index with scenario values; missing this
      structure causes downstream HTML/PDF renderers to fail when trying to access the sensitivity matrix, breaking report
      generation for the sensitivity analysis section
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-093
    when: When classifying earnings events
    action: assign probability of 0.95 to earnings catalysts
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect probability will misrepresent the certainty of scheduled earnings releases in risk assessment
    stage_ids:
    - catalyst_analysis
  - id: finance-C-095
    when: When validating catalyst sentiment
    action: 'return only values from the set: positive, negative, neutral'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid sentiment values will cause rendering failures in HTML/PDF reports and incorrect catalyst categorization
    stage_ids:
    - catalyst_analysis
  - id: finance-C-096
    when: When filtering irrelevant news articles
    action: check for ticker symbol or company name in article title or first 500 characters of body text
    severity: high
    kind: domain_rule
    modality: must
    consequence: Processing unrelated company news will inject false catalysts and corrupt the investment thesis with irrelevant
      events
    stage_ids:
    - catalyst_analysis
  - id: finance-C-097
    when: When analyzing sentiment from news text
    action: check analyst action phrase patterns before falling back to keyword counting
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without priority pattern matching, analyst upgrades/downgrades will be misclassified as generic sentiment,
      losing high-signal event identification
    stage_ids:
    - catalyst_analysis
  - id: finance-C-098
    when: When identifying catalysts from news articles
    action: filter out events classified as 'other' unless their impact level is 'high'
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Including low-signal 'other' category events will dilute the catalyst list with noise, reducing report quality
      and decision-making value
    stage_ids:
    - catalyst_analysis
  - id: finance-C-099
    when: When classifying analyst upgrades and downgrades
    action: apply analyst action phrase patterns with higher priority than generic sentiment keywords
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Misclassifying analyst rating changes as neutral will miss critical investment signals that materially affect
      stock price
    stage_ids:
    - catalyst_analysis
  - id: finance-C-101
    when: When using keyword-based classification
    action: claim classification accuracy equivalent to machine learning models
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Overstating keyword-based classification precision will mislead users about the reliability of catalyst identification
    stage_ids:
    - catalyst_analysis
  - id: finance-C-102
    when: When reporting earnings event probability
    action: present 0.95 probability as a guaranteed outcome
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Stating earnings probability as certain will misrepresent the inherent uncertainty in scheduled event occurrence
      and timing
    stage_ids:
    - catalyst_analysis
  - id: finance-C-103
    when: When processing catalyst news data
    action: process articles beyond the configured news time window
    severity: low
    kind: resource_boundary
    modality: must_not
    consequence: Processing stale news articles will waste API quota and computational resources on outdated catalyst information
    stage_ids:
    - catalyst_analysis
  - id: finance-C-104
    when: When using FMP API for news data
    action: handle cases where news API returns empty results gracefully
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Uncaught empty API response will cause catalyst analysis to fail entirely, blocking report generation
    stage_ids:
    - catalyst_analysis
  - id: finance-C-105
    when: When implementing event type classification
    action: bypass the defined catalyst keyword dictionaries for classification
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Skipping keyword-based classification will result in all events defaulting to 'other' type, eliminating catalyst
      differentiation
    stage_ids:
    - catalyst_analysis
  - id: finance-C-106
    when: When generating catalyst summaries
    action: limit each sentiment category to at most 5 catalysts in the output summary
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Unlimited catalyst output will create excessively long summaries that are difficult for users to parse and
      act upon
    stage_ids:
    - catalyst_analysis
  - id: finance-C-107
    when: When assessing impact level by event type
    action: classify earnings, acquisition, and regulatory events as 'high' impact
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect impact classification will misrepresent the importance of major corporate events, leading to misallocated
      investor attention
    stage_ids:
    - catalyst_analysis
  - id: finance-C-108
    when: When generating charts for HTML embedding
    action: Return base64-encoded data URI format for embedded image display
    severity: high
    kind: domain_rule
    modality: must
    consequence: Charts will not render in HTML reports if not base64-encoded, breaking visual content delivery
    stage_ids:
    - report_generation
  - id: finance-C-109
    when: When rendering negative EV/EBITDA values in peer comparison
    action: Replace negative values with 'N/M' (not meaningful) indicator
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Negative EV/EBITDA ratios are meaningless for valuation comparison and would mislead readers if displayed
      as raw negative numbers
    stage_ids:
    - report_generation
  - id: finance-C-110
    when: When generating equity research reports for US markets
    action: Use Eastern Time timezone for report timestamps and disclaimers
    severity: medium
    kind: domain_rule
    modality: must
    consequence: US equity research reports require Eastern Time timezone for regulatory and market consistency
    stage_ids:
    - report_generation
  - id: finance-C-111
    when: When OpenAI API key is not provided or API call fails
    action: Return predefined fallback text from _get_fallback_text dictionary
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Report generation would fail or produce empty content sections without fallback text, breaking report completeness
    stage_ids:
    - report_generation
  - id: finance-C-112
    when: When LLM text generation API has availability or rate limitations
    action: Enable graceful degradation through hardcoded fallback text templates
    severity: high
    kind: resource_boundary
    modality: must
    consequence: API rate limits or service outages would cause incomplete reports without fallback content generation
    stage_ids:
    - report_generation
  - id: finance-C-113
    when: When LLM model parameter is not explicitly specified
    action: Use 'gpt-4o-mini' as default model for text generation
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Inconsistent model selection across report sections could cause varying quality and unexpected API costs
    stage_ids:
    - report_generation
  - id: finance-C-114
    when: When CSV-like data patterns are detected in text content fields
    action: Trigger AI regeneration or use hardcoded fallback text
    severity: high
    kind: operational_lesson
    modality: must
    consequence: CSV data appearing in text sections would corrupt report readability and mislead readers about content quality
    stage_ids:
    - report_generation
  - id: finance-C-115
    when: When chart generation fails due to missing or invalid data
    action: Return None or empty string to prevent blocking report generation
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Chart generation failures would block entire report generation without graceful empty fallback
    stage_ids:
    - report_generation
  - id: finance-C-116
    when: When DataFrame data is empty or missing required columns
    action: Return empty DataFrame and log warning to prevent crashes
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Missing data would cause exceptions and crash report generation without defensive empty checks
    stage_ids:
    - report_generation
  - id: finance-C-117
    when: When implementing chart generation functions
    action: Return Optional[str] type hint with None fallback for missing data
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing return type hints would allow None values to propagate and cause runtime errors in HTML rendering
    stage_ids:
    - report_generation
  - id: finance-C-118
    when: When processing text content for report sections
    action: Use unified generate_text_section() function for each text types
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using different text generation paths would cause inconsistent content formatting and missing fallback handling
    stage_ids:
    - report_generation
  - id: finance-C-119
    when: When saving generated reports to filesystem
    action: Write to configured OUTPUT_DIR path as specified in --output-dir argument
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reports saved to wrong directory would be inaccessible to users expecting standard output location
    stage_ids:
    - report_generation
  - id: finance-C-121
    when: When displaying AI-generated content in reports
    action: Include AI content marker through is_ai_generated flag in ReportSection metadata
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Undisclosed AI-generated content presented as human-written analysis would mislead readers about content
      origin
    stage_ids:
    - report_generation
  - id: finance-C-122
    when: When presenting valuation target prices and ratings
    action: Include 'Past performance is not indicative of future results' in disclaimer
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Historical analysis presented without forward-looking disclaimer could mislead readers about prediction reliability
    stage_ids:
    - report_generation
  - id: finance-C-123
    when: When claiming report accuracy or data reliability
    action: State 'accuracy cannot be guaranteed' in default disclaimer text
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Claims of guaranteed accuracy would create false expectations and potential legal liability for AI-generated
      analysis
    stage_ids:
    - report_generation
  - id: finance-C-124
    when: When deciding to skip text validation checks
    action: Bypass validate_and_fix_text_content() for any text section
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping validation would allow empty or corrupted text sections to appear in reports, damaging report credibility
    stage_ids:
    - report_generation
  - id: finance-C-125
    when: When implementing new text generation agents
    action: Add hardcoded fallback templates outside the _get_fallback_text function
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Fallback text defined outside the centralized function would be bypassed during API failures, causing empty
      sections
    stage_ids:
    - report_generation
  - id: finance-C-126
    when: When implementing session validation logic
    action: Check session.expires_at against current datetime and delete expired sessions from the database
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stale sessions remain active after expiry, allowing unauthorized access with old session tokens
    stage_ids:
    - web_application
  - id: finance-C-127
    when: When implementing report request status transitions
    action: Enforce status lifecycle of pending -> running -> completed|failed and set completed_at timestamp when entering
      terminal states
    severity: high
    kind: domain_rule
    modality: must
    consequence: Report status may show incorrect lifecycle state; completed_at timestamp is not set on terminal states, causing
      tracking and UI polling issues
    stage_ids:
    - web_application
  - id: finance-C-128
    when: When implementing optional report section control
    action: Use boolean flags in AnalysisRequest to control which report sections are generated
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Report pipeline generates all sections regardless of user preferences, causing unnecessary API calls and
      longer processing times
    stage_ids:
    - web_application
  - id: finance-C-130
    when: When deploying with GitHub OAuth enabled
    action: Validate GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET environment variables are properly configured before enabling
      OAuth routes
    severity: high
    kind: resource_boundary
    modality: must
    consequence: GitHub OAuth authentication silently fails, users cannot login with GitHub, causing service disruption for
      OAuth-only users
    stage_ids:
    - web_application
  - id: finance-C-131
    when: When migrating from SQLite to PostgreSQL
    action: Replace StaticPool with QueuePool and remove check_same_thread=False from connect_args
    severity: high
    kind: resource_boundary
    modality: must
    consequence: PostgreSQL connections fail to pool correctly or SQLite-specific settings cause database connection errors
      in production
    stage_ids:
    - web_application
  - id: finance-C-133
    when: When authenticating GitHub OAuth users
    action: Prefix OAuth user emails with 'github:' to distinguish them from local auth users
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: OAuth users cannot login after initial registration or conflict with local accounts using same email address
    stage_ids:
    - web_application
  - id: finance-C-135
    when: When implementing session expiry durations
    action: Set default session expiry to 7 days for normal sessions and 30 days when 'remember me' is enabled
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Sessions expire too quickly causing poor UX, or never expire creating security risk
    stage_ids:
    - web_application
  - id: finance-C-136
    when: When implementing database session lifecycle
    action: Enclose each database operations in try-finally blocks to verify sessions are always closed
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Database connections leak over time, eventually exhausting the connection pool and causing application failure
    stage_ids:
    - web_application
  - id: finance-C-137
    when: When implementing authentication service layer
    action: Encapsulate each authentication logic in auth.py module to maintain auth_provider replaceability
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Authentication logic becomes scattered across codebase, making it impossible to swap authentication methods
      without major refactoring
    stage_ids:
    - web_application
  - id: finance-C-138
    when: When implementing session storage backend
    action: Encapsulate each session CRUD operations in database/crud.py module to maintain session_store replaceability
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Session storage logic becomes tightly coupled to main.py, making it impossible to swap storage backends without
      breaking authentication
    stage_ids:
    - web_application
  - id: finance-C-139
    when: When presenting the web application for production use
    action: Claim production-ready status without acknowledging SQLite single-thread limitation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: System crashes under concurrent user load due to SQLite locking, causing reputational damage and user trust
      loss
    stage_ids:
    - web_application
  - id: finance-C-140
    when: When displaying GitHub OAuth login option
    action: Display GitHub OAuth button without warning that it silently fails without proper environment variable configuration
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users click GitHub OAuth button and experience silent failure, leading to confusion about why authentication
      is not working
    stage_ids:
    - web_application
  - id: finance-C-141
    when: When presenting report generation results
    action: Claim real-time trading capability or guarantee specific investment returns based on generated reports
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make investment decisions based on unverified reports, potentially causing financial losses
    stage_ids:
    - web_application
  - id: finance-C-143
    when: When implementing password change for GitHub users
    action: Allow GitHub OAuth users to change their password since they authenticated via OAuth
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: GitHub users cannot set passwords through OAuth flow, but endpoint allows password change attempt that fails
      silently or causes confusion
    stage_ids:
    - web_application
  - id: finance-C-144
    when: When implementing RAG-based document retrieval for LLM context
    action: Provide a non-empty retrieve_config dictionary to SingleAssistantRAG
    severity: high
    kind: domain_rule
    modality: must
    consequence: The system will fail with an AssertionError at finrobot/agents/workflow.py:196 if retrieve_config is empty,
      preventing RAG functionality from initializing properly
    stage_ids:
    - rag_retrieval
  - id: finance-C-145
    when: When configuring text chunking parameters for document splitting
    action: Use chunk_size of 1024 and chunk_overlap of 100 for RecursiveCharacterTextSplitter
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Incorrect chunk sizing may cause important context to be split across chunks, reducing retrieval relevance
      and LLM answer quality
    stage_ids:
    - rag_retrieval
  - id: finance-C-146
    when: When performing similarity search queries on the vector database
    action: Specify k parameter (number of results) when calling similarity_search
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without explicit k parameter, default retrieval may return too few or too many results, corrupting the LLM
      context with irrelevant or incomplete information
    stage_ids:
    - rag_retrieval
  - id: finance-C-147
    when: When configuring embedding function for vector store
    action: Use SentenceTransformerEmbeddings with model_name='all-MiniLM-L6-v2'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using a different embedding model will cause vector mismatches if documents were embedded with a different
      model, resulting in irrelevant search results
    stage_ids:
    - rag_retrieval
  - id: finance-C-148
    when: When controlling the number of retrieved context chunks
    action: Set n_results parameter explicitly in retrieve_content function calls
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without explicit n_results, the default value of 3 may provide insufficient context for complex financial
      queries, or excessive context for simple queries, corrupting LLM response quality
    stage_ids:
    - rag_retrieval
  - id: finance-C-149
    when: When handling RAG agent iterative refinement
    action: Limit consecutive auto-replies to 3 via max_consecutive_auto_reply parameter
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without limiting auto-replies, the agent may enter an infinite loop of query refinement attempts, causing
      service disruption and resource exhaustion
    stage_ids:
    - rag_retrieval
  - id: finance-C-150
    when: When implementing fallback logic for insufficient retrieval results
    action: Use the customized RAG prompt template instructing agents to try refined search queries
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without fallback guidance, the LLM may attempt to answer questions with insufficient context, leading to
      hallucinated or inaccurate financial analysis
    stage_ids:
    - rag_retrieval
  - id: finance-C-151
    when: When selecting vector store backend for RAG implementation
    action: Use Chroma vector store with persistent storage
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without persistent storage, vector database is lost on restart, requiring re-indexing of all documents and
      causing extended downtime
    stage_ids:
    - rag_retrieval
  - id: finance-C-152
    when: When querying SEC filings database with specific form types
    action: Validate sec_form_name against available sec_form_names before query execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid form name will cause query to return empty results without clear error, misleading LLM into thinking
      relevant documents don't exist
    stage_ids:
    - rag_retrieval
  - id: finance-C-153
    when: When querying earnings call database with specific quarters
    action: Validate quarter against available earnings_call_quarter_vals before query execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid quarter will cause KeyError or empty results, corrupting the financial analysis with missing context
    stage_ids:
    - rag_retrieval
  - id: finance-C-154
    when: When claiming RAG retrieval capabilities in documentation
    action: Claim real-time data retrieval capability for RAG-enhanced queries
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: RAG uses pre-indexed documents stored in Chroma vector database - presenting retrieval results as real-time
      exchange data misleads users about data freshness
    stage_ids:
    - rag_retrieval
  - id: finance-C-155
    when: When presenting similarity search results
    action: Claim exact semantic match accuracy for retrieved chunks
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Similarity search using embeddings returns approximate matches - presenting them as exact relevant content
      may lead to incorrect financial conclusions
    stage_ids:
    - rag_retrieval
  - id: finance-C-156
    when: When using RAG for financial analysis
    action: Assume retrieved SEC filings or earnings call data reflects current market conditions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: SEC filings and earnings calls are historical documents - using outdated context for investment decisions
      may result in significant financial losses
    stage_ids:
    - rag_retrieval
  - id: finance-C-157
    when: When configuring metadata filters for SEC filings retrieval
    action: Use exact match filter with $eq operator for form_name and filing_type fields
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Incorrect filter operators may return documents from unintended filing types, corrupting the financial analysis
      with mismatched context
    stage_ids:
    - rag_retrieval
  - id: finance-C-158
    when: When building earnings call database with speaker metadata
    action: Include speaker metadata in document metadata for speaker-based filtering
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without speaker metadata, the earnings call retrieval cannot filter by speaker, returning irrelevant speaker
      content and corrupting analysis attribution
    stage_ids:
    - rag_retrieval
  - id: finance-C-162
    when: When constructing financial DataFrames with historical data
    action: Append 'A' suffix to year columns for actual values and 'E' suffix for estimates (e.g., '2024A', '2025E')
    severity: high
    kind: domain_rule
    modality: must
    consequence: Downstream report generation and valuation models will misinterpret historical vs projected data, causing
      incorrect financial analysis and potentially misleading investment recommendations
  - id: finance-C-165
    when: When initializing data source utilities with ticker symbols
    action: Convert ticker symbols to uppercase strings before passing to yfinance.Ticker() — the library expects uppercase
      ticker symbols
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Data retrieval fails silently or returns incorrect data for the wrong ticker because yfinance requires uppercase
      symbols (e.g., 'NVDA' not 'nvda'), causing erroneous financial analysis
  - id: finance-C-166
    when: When accessing external financial data APIs (FMP, Finnhub, SEC)
    action: Check for required API keys in environment variables at runtime — return None gracefully when keys are absent
      rather than raising exceptions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Application crashes or exposes API credentials in error logs when required environment variables are not
      set, preventing any graceful degradation to cached or alternative data sources
  - id: finance-C-167
    when: When synthesizing multi-method valuation results into a final recommendation
    action: 'Apply method-specific confidence weights: DCF at 0.5, EV/EBITDA at 0.7, Peer comparison at 0.6 — do not treat
      each valuation methods as equally reliable'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Overweighted DCF analysis inflates valuation estimates by 20-40% compared to market-based methods, leading
      investors to overpay for securities based on optimistic long-term assumptions
  - id: finance-C-168
    when: When calculating equity value from enterprise value and net debt is not available from balance sheet
    action: Approximate net debt as 10% of enterprise value — do not assume zero net debt or skip the net debt adjustment
      entirely
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Equity value overestimated by 10% of EV for companies with typical leverage, causing price targets to be
      inflated by hundreds of millions for large-cap companies
  - id: finance-C-169
    when: When performing DCF valuation and free cash flow data is unavailable
    action: Approximate free cash flow as EBITDA multiplied by 60% — do not use net income or revenue as a proxy without this
      adjustment
    severity: medium
    kind: domain_rule
    modality: must
    consequence: DCF price targets inflated by 40-60% when using EBITDA directly instead of the FCF conversion, because FCF
      properly accounts for capex and working capital requirements
  - id: finance-C-170
    when: When calculating confidence intervals for financial forecasts
    action: Apply std_ratio of 15% for the uncertainty band calculation — do not use tighter bounds that understate forecast
      uncertainty
    severity: medium
    kind: domain_rule
    modality: must
    consequence: 95% confidence intervals become artificially narrow, misleading investors into believing forecast ranges
      are more precise than warranted, leading to overconfident capital allocation decisions
  - id: finance-C-172
    when: When tracking report generation request lifecycle
    action: 'Follow the status state machine: ''pending'' → ''running'' → ''completed'' | ''failed'' — never skip states or
      allow ''completed'' without ''running'''
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Frontend UI shows inconsistent status indicators, cron jobs monitoring completion fail to trigger, and audit
      logs record incorrect lifecycle events for regulatory compliance
  - id: finance-C-175
    when: When presenting or reporting this system's analysis outputs to users
    action: Claim that backtested or simulated returns equal expected live trading returns — backtesting ignores market impact,
      financing costs, slippage, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users allocate live capital based on inflated backtest returns that assume perfect execution and ignore liquidity
      constraints, leading to severe underperformance when trading live with real position sizes
  - id: finance-C-176
    when: When presenting or reporting this system's analysis outputs to users
    action: Claim that the system's cryptocurrency market analysis is reliable without substantial adaptation — cryptocurrency
      markets have fundamentally different liquidity, volatility, and data availability characteristics
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users applying equity-focused models to cryptocurrency trading face extreme losses due to 10x higher volatility,
      24/7 trading without calendar resets, exchange-specific liquidity issues, and regulatory uncertainty absent in traditional
      markets
  - id: finance-C-178
    when: When presenting or reporting this system's analysis outputs to users
    action: Claim that the system provides reliable analysis for non-English financial markets with limited data API support
      — financial statement formats, disclosure requirements, and market conventions vary substantially
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users analyzing non-English markets (emerging markets, Asian exchanges) receive incorrect metrics because
      accounting standards (IFRS vs GAAP), fiscal year conventions, and reporting formats differ fundamentally from US markets
  - id: finance-C-179
    when: When generating or displaying chart images in reports
    action: Return base64-encoded chart images suitable for HTML embedding — binary chart files cannot be directly embedded
      in HTML reports
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Report generation fails or charts are missing when chart image formats are incompatible with HTML embedding
      requirements, breaking the professional report output
  - id: finance-C-180
    when: When implementing or refactoring multi-agent orchestration logic in financial analysis workflows
    action: Use the Workflow base class with group chat manager pattern for agent coordination — do not replace with direct
      agent instantiation or hierarchical supervisor pattern that bypasses the orchestration layer
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Replacing Workflow orchestration with direct instantiation breaks multi-agent collaboration, causing agents
      to operate in isolation and producing incomplete or inconsistent financial analysis results
    derived_from_bd_id: BD-032
  - id: finance-C-181
    when: When applying Markowitz mean-variance portfolio optimization to construct portfolios
    action: Verify that return distributions in the dataset approximate normal distribution; if skewness or kurtosis significantly
      deviates from zero, apply Cornish-Fisher expansion or switch to a robust optimization method
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mean-variance optimization assumes normal return distributions; applying it to assets with non-normal returns
      (fat tails, skewness) produces suboptimal portfolios with incorrect risk-return estimates
    derived_from_bd_id: BD-039
  - id: finance-C-182
    when: When extracting SEC filing sections (MD&A, Risk Factors, Financials) for fundamental analysis
    action: Use prepline_sec_filings library for structured extraction; verify XBRL availability before extraction; implement
      fallback handling for filings without XBRL data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper XBRL handling, SEC filing extraction fails for filings without XBRL tags, causing incomplete
      fundamental analysis and potentially missing critical risk disclosures
    derived_from_bd_id: BD-044
  - id: finance-C-183
    when: When deploying the framework or configuring data source API keys
    action: Verify each required API keys are properly configured during deployment; do not rely on lazy initialization with
      graceful fallback to mask missing configuration in production environments
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Relying on graceful fallback for missing API keys causes silent data source failures where functions return
      empty or null data, leading to incorrect backtest results without obvious error messages
    derived_from_bd_id: BD-001
  - id: finance-C-185
    when: When running backtesting with the framework's default starting capital parameter
    action: Verify that starting_capital=$10,000 matches the target strategy's capital requirements and real-world account
      size; adjust default capital to reflect actual trading constraints before drawing conclusions from backtest returns
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default $10,000 starting capital misrepresents position sizing for strategies designed for different account
      sizes, causing percentage returns and leverage calculations to diverge from actual live trading outcomes
    derived_from_bd_id: BD-006
  - id: finance-C-186
    when: When encoding event probabilities for catalyst-driven trading strategies
    action: 'Use event-type-specific probabilities: earnings events at 95% (scheduled), acquisitions at 40% (uncertain); do
      not apply uniform probability across event types'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Uniform probability ignores domain knowledge about scheduled versus uncertain events, causing mispriced catalyst
      risk and incorrect position sizing that leads to suboptimal strategy performance
    derived_from_bd_id: BD-022
  - id: finance-C-189
    when: When implementing news aggregation in the finrobot framework
    action: Implement multi-source streaming from CNBC, Yicai, and InvestorPlace with proper proxy rotation to prevent IP
      blocking and verify continuous data flow
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single-source news streaming introduces geographic and perspective bias; without proxy rotation, IP blocking
      interrupts data collection, leading to gaps in market monitoring that affect sentiment analysis accuracy
    derived_from_bd_id: BD-047
  - id: finance-C-191
    when: When designing report generation architecture using finrobot_equity
    action: Verify that 8 specialized agent types maintain proper separation of concerns for distinct report sections; verify
      each agent has domain-specific prompts and formatting rules
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Consolidating specialized agents into a single agent requires excessively long context and produces generic,
      low-quality output that fails to meet equity research report standards, reducing analyst utility
    derived_from_bd_id: BD-024
  - id: finance-C-193
    when: When configuring DCF terminal growth rate for equity valuation
    action: Anchor terminal growth rate at 2.5% (long-term GDP expectation); verify rate does not exceed WACC to avoid mathematically
      unstable terminal values; document the chosen rate and its justification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a terminal growth rate higher than WACC produces mathematically infinite terminal values; even rates
      above 3% can inflate terminal value unrealistically, causing significant overvaluation in price targets
    derived_from_bd_id: BD-017
  - id: finance-C-194
    when: When processing financial data with year suffixes in finrobot_equity
    action: 'Apply year suffix convention consistently: use ''A'' suffix for actual/historical data and ''E'' suffix for estimates/forecasts;
      implement column pattern filtering to distinguish historical from projected data'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent year suffix parsing causes historical and forecast data to be misidentified, leading to incorrect
      ratio calculations and valuation models that mix actuals with estimates
    derived_from_bd_id: BD-013
  - id: finance-C-195
    when: When processing financial data in the finrobot framework
    action: Assume the framework handles price and quantity precision correctly by default — the framework has a documented
      gap in precision handling for decimal values in financial calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Missing price/quantity precision handling causes rounding errors in trade calculations and valuation models;
      accumulated errors lead to incorrect P&L reporting and reconciliation failures in production
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-196
    when: When implementing financial data processing and trade execution logic
    action: Define and enforce decimal precision standards for price (minimum 2 decimal places for USD, 3 for JPY) and quantity
      (integer for shares, configurable decimal for contracts); use Decimal type instead of float for each monetary calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit precision handling, float arithmetic causes penny rounding errors that accumulate in high-frequency
      trading and large-volume positions, leading to reconciliation failures and audit exceptions
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-197
    when: When implementing DCF valuation model
    action: Use WACC as the discount rate and verify terminal growth rate is explicitly specified and validated; verify that
      discount rate and terminal growth rate parameters are present in model initialization and documented for user review
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect discount rates or omitting terminal growth assumptions produces systematically wrong intrinsic
      valuations; investment decisions based on flawed DCF outputs can lead to significant financial losses
    derived_from_bd_id: BD-052
  - id: finance-C-198
    when: When implementing technical analysis indicator calculation
    action: Use TA-Lib for technical indicator calculations when available; provide pandas-ta as automatic fallback when TA-Lib
      C library is not installed or unavailable — verify indicator calculations do not fail silently or produce different
      results between implementations
    severity: high
    kind: domain_rule
    modality: must
    consequence: If TA-Lib is missing and no fallback is implemented, technical indicator calculations fail causing strategy
      backtests to crash or produce incorrect results
    derived_from_bd_id: BD-038
  - id: finance-C-199
    when: When extending or modifying agent workflow implementations
    action: Inherit from the designated abstract base class for agent workflow patterns — new agent variants MUST implement
      each abstract methods (chat, reset) defined in the contract; verify inheritance chain before adding new agent types
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper abstract base class inheritance, new agent variants may have missing or inconsistent method
      implementations causing runtime errors that are difficult to debug
    derived_from_bd_id: BD-007
  - id: finance-C-200
    when: When processing DCF valuation sensitivity analysis
    action: Document and validate the fixed 15% standard deviation assumption for sensitivity confidence intervals; if the
      assumption is used for high-volatility assets or sectors with different risk profiles, the confidence intervals may
      misrepresent actual uncertainty
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Fixed 15% standard deviation applied uniformly ignores asset-specific volatility characteristics; confidence
      intervals based on this assumption can severely misrepresent actual value ranges, leading to poor investment decisions
    derived_from_bd_id: BD-018
  - id: finance-C-201
    when: When implementing or refactoring valuation synthesis logic in valuation_engine.py
    action: Use confidence-weighted averaging to combine multiple valuation methods — weights must be derived from data vintage
      and peer count, renormalized to sum to 1.0, with equal weighting fallback when each methods have low confidence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing confidence-weighted averaging with equal weighting ignores data quality differences, causing noisy
      estimates to dominate valuation output and systematically bias price targets toward unreliable inputs
    derived_from_bd_id: BD-072
  - id: finance-C-202
    when: When implementing agent selection or routing logic in workflow.py
    action: Use string-keyed dictionary lookup with exact string matching for agent selection — any deviation to enum-based
      or case-insensitive lookup will break existing configuration files that rely on exact agent name strings
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Changing to enum-based agent selection breaks configuration files with string agent names, causing KeyError
      at runtime; configuration flexibility is lost and existing deployments fail silently
    derived_from_bd_id: BD-090
  - id: finance-C-203
    when: When implementing valuation synthesis that combines DCF and EV/EBITDA methods
    action: Apply confidence weight recalibration when combining DCF (weight 0.5) and EV/EBITDA (weight 0.7) — verify that
      unreliable FCF data does not cause DCF to dominate synthesis when high uncertainty exists
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without cascade-aware weight recalibration, estimation errors from uncertain DCF inputs are amplified through
      synthesis weighting, causing systematic price target bias that diverges from actual fair value
    derived_from_bd_id: BD-104
  - id: finance-C-204
    when: When implementing technical indicator logic for trend identification in chart_generator.py
    action: Use the 20/50/200-day moving average combination for equity charts — generate golden/death cross signals at 50/200
      intersection; for fixed income use 2/5/10-year equivalent
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing MA parameters to different window sizes alters signal timing and trend classification, causing institutional-grade
      trend signals to lose meaning and strategy backtests to produce non-reproducible results
    derived_from_bd_id: BD-065
  - id: finance-C-205
    when: When implementing EV/EBITDA valuation band visualization in enhanced_chart_generator.py
    action: Use mean ± 1 standard deviation for valuation bands on sector peer comparisons — single-stock analysis may use
      ±2 SD for wider context; use fill_between to highlight relative valuation zones
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using ±2 SD for sector peer comparison creates over-broad bands that reduce signal utility, making actionable
      valuation zones indistinguishable and causing missed trading opportunities or inappropriate position sizing
    derived_from_bd_id: BD-066
  - id: finance-C-206
    when: When implementing DCF terminal value calculation in valuation_engine.py
    action: Use Gordon Growth Model for terminal value with terminal growth rate bounded between 0% and 3%; trigger a warning
      flag when explicit TV exceeds 80% of enterprise value; discount rate must come from WACC calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing terminal growth bounds allows implausible perpetual growth rates, causing enterprise value to become
      inflated or nonsensical; TV exceeding 80% of EV signals over-reliance on terminal assumptions rather than near-term
      cash flows
    derived_from_bd_id: BD-068
  - id: finance-C-207
    when: When configuring the RAG retrieval context size using n_results parameter in rag.py
    action: Verify that the n_results default value matches query type requirements — use fewer results for focused queries
      and more for exploratory analysis; monitor token usage and latency when increasing n_results
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using fixed or inappropriately high n_results increases token usage and latency without improving retrieval
      quality for focused queries, causing unnecessary cost accumulation in production deployments
    derived_from_bd_id: BD-031
  - id: finance-C-208
    when: When implementing agent response handling in workflow.py
    action: Verify every agent response ends with the exact 'TERMINATE' string — the _check_termination function expects this
      contract; any agent not ending with TERMINATE will cause infinite loops or premature termination
    severity: high
    kind: domain_rule
    modality: must
    consequence: Agent responses not ending with TERMINATE cause infinite loops in the calling code waiting for the termination
      signal, or trigger premature termination with incomplete results, leading to workflow hang or silent data loss
    derived_from_bd_id: BD-080
  - id: finance-C-209
    when: When defining the equity analysis pipeline in main.py
    action: Verify financial_analysis task completes before create_equity_report begins — this ordering is enforced in sequential_pipeline
      definition; parallelizing or reordering these tasks causes KeyError on missing analysis results
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping or parallelizing financial_analysis before create_equity_report causes KeyError exceptions when
      report generation tries to access missing analysis data, breaking the entire pipeline execution
    derived_from_bd_id: BD-081
  - id: finance-C-210
    when: When configuring SQLite database connection for the Flask web application in connection.py
    action: Use check_same_thread=False with StaticPool for SQLite configuration — this threading configuration is required
      for cross-thread database access in async Flask handlers
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Reverting to default SQLite threading configuration causes 'SQLite objects created in a thread can only be
      used in that same thread' errors when async handlers attempt cross-thread database access, crashing the web application
    derived_from_bd_id: BD-083
  - id: finance-C-211
    when: When implementing position cost or carry calculation in backtesting or live trading
    action: Assume the framework automatically models funding costs, borrowing costs, or carry; the framework does not implement
      carry/funding cost modeling
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without carry modeling, long-short strategies appear more profitable than reality because funding costs for
      short positions and interest costs for margin positions are not deducted, causing live trading results to significantly
      underperform backtested results
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-212
    when: When implementing or configuring the trading backtesting framework
    action: 'Implement explicit funding cost modeling: interest_rate parameter for cash balances, margin_rate for borrowed
      funds, and dividend_obligations for short positions; apply differential rates for long vs short positions and across
      asset classes'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Long-short strategies incur ongoing funding costs that accumulate significantly over time; without explicit
      carry modeling, backtested returns systematically overestimate live trading performance by ignoring these costs
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-213
    when: When implementing order fill simulation in backtesting
    action: Assume the framework automatically handles partial fills, order rejection, or volume-limited execution for market
      orders; the framework assumes market orders are fully filled at the specified price
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming full market order fills overestimates execution probability for illiquid stocks or large orders,
      causing backtested returns to exceed what would be achievable in live trading with real volume constraints
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-214
    when: When simulating market order execution in backtesting
    action: Check order volume against ADV (average daily volume) thresholds; if order_size > adv * fill_ratio_threshold,
      implement partial fill simulation with residual position marked as unfilled or rolled to next bar
    severity: high
    kind: domain_rule
    modality: must
    consequence: Large market orders in illiquid stocks cannot be fully filled at the specified price; without volume-aware
      fill simulation, backtested execution assumes unrealistic liquidity that causes live trading slippage far exceeding
      backtested costs
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-215
    when: When implementing portfolio optimization or risk calculation
    action: Assume the framework provides optimal covariance estimation; the framework uses raw sample covariance which is
      numerically unstable for high-dimensional problems
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Raw sample covariance matrices are singular or near-singular with many assets, causing portfolio optimizers
      to produce extreme weights and risk estimates that fail to converge or produce nonsensical allocations
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-216
    when: When implementing portfolio optimization or multi-factor risk models
    action: Implement covariance shrinkage estimator (Ledoit-Wolf or Oracle Approximating Shrinkage) before passing covariance
      matrix to portfolio optimizer; apply lookback_period > 252 days for stability and validate condition_number < threshold
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unregularized covariance matrices cause numerical instability in optimization, producing extreme portfolio
      weights that amplify rather than reduce risk; shrinkage methods improve condition number and produce more stable allocations
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-217
    when: When estimating Free Cash Flow for valuation
    action: Check if direct FCF data exists for >= 2 years of history before applying EBITDA*60% heuristic; for high-capex
      sectors, override with sector-specific conversion factor; recalibrate the 60% factor annually with actual company data
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using the 60% heuristic for companies with poor FCF conversion undervalues or overvalues the business, leading
      to incorrect buy/sell signals based on distorted intrinsic value estimates
    derived_from_bd_id: BD-073
  - id: finance-C-218
    when: When estimating net debt for Enterprise Value calculations
    action: Apply 10% net debt-to-EV heuristic only for real-time quotes without latest financials; for high-yield companies,
      use manual override as the 10% heuristic significantly underestimates leverage for sub-investment-grade issuers
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: High-yield companies typically have net debt representing 30-60% of EV; using the 10% heuristic understates
      financial risk and overstates equity value, causing buy recommendations on overleveraged companies with insufficient
      margin of safety
    derived_from_bd_id: BD-074
  - id: finance-C-219
    when: When configuring report generation defaults for the analysis platform
    action: Verify that enable_sensitivity=False default is acceptable for the use case; if comprehensive risk analysis is
      required, explicitly set enable_sensitivity=True as it performs Monte Carlo analysis providing confidence intervals
      on returns
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Reports generated with enable_sensitivity=False lack Monte Carlo-based confidence intervals, potentially
      causing narrow return estimates to appear precise when they have wide actual uncertainty bounds
    derived_from_bd_id: BD-084
  - id: finance-C-220
    when: When implementing or extending toolkit functions that return DataFrames to the agent
    action: Apply @stringify_output decorator to each functions returning DataFrames; verify decorator is present before deployment
      to prevent JSON serialization failures in agent context
    severity: high
    kind: operational_lesson
    modality: must
    consequence: DataFrames cannot be JSON-serialized directly; omitting @stringify_output causes runtime exceptions when
      toolkit functions attempt to return results to the LLM agent, breaking the analysis pipeline
    derived_from_bd_id: BD-091
  - id: finance-C-221
    when: When configuring default AnalysisRequest parameters for the analysis platform
    action: Review whether the default enabled features (sensitivity, catalyst, enhanced_news) are necessary for the analysis
      use case; disabling specific features reduces processing time and API costs but may reduce thoroughness of risk detection
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Disabling default features reduces API costs and processing time but eliminates comprehensive coverage of
      risk factors and market catalysts, potentially missing important signals in the analysis output
    derived_from_bd_id: BD-098
  - id: finance-C-222
    when: When calculating returns for performance analysis across different time periods
    action: Assume the framework has a documented return frequency and annualization methodology — the framework lacks explicit
      documentation of return frequency (daily/weekly/monthly) and annualization factors
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without documented return frequency and annualization, performance comparisons across strategies become unreliable;
      annualized returns may be computed inconsistently, causing misallocation decisions based on incomparable metrics
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-223
    when: When performing portfolio risk analysis using VaR or CVaR metrics
    action: Define and document explicit VaR/CVaR confidence level (e.g., 95%, 99%) and lookback window parameters before
      using risk metrics in allocation decisions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit VaR/CVaR parameters, different implementations may use inconsistent confidence levels, making
      risk estimates incomparable across portfolios and potentially exposing the strategy to unquantified tail risk
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-224
    when: When implementing or using risk metrics that include VaR or CVaR calculations
    action: Assume the framework provides transparent VaR/CVaR confidence levels and lookback windows — the framework lacks
      documented VaR/CVaR parameter configuration
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Hidden VaR/CVaR assumptions may cause the risk model to underestimate or overestimate tail risk, leading
      to insufficient capital reserves or excessive leverage that violates risk tolerance limits
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-225
    when: When configuring portfolio risk measurement with VaR or CVaR
    action: Explicitly set and validate VaR/CVaR confidence_level (95% or 99%) and lookback_window (e.g., 252 trading days
      for daily data) parameters; document the chosen values in strategy configuration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using undocumented VaR parameters means the risk model operates on hidden assumptions; if parameters differ
      from expected (e.g., 95% vs 99% confidence), backtested drawdown estimates will be systematically wrong
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-226
    when: When selecting volatility models for option pricing, risk assessment, or strategy optimization
    action: Assume the framework provides documented volatility model family and distribution selection — the framework lacks
      explicit volatility model and distribution assumption documentation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without documented volatility models and return distributions, pricing models may use inappropriate assumptions
      (e.g., normal distribution for fat-tailed returns), causing systematic mispricing and unexpected losses in extreme market
      conditions
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-227
    when: When implementing volatility-based calculations including options pricing, VaR, or portfolio optimization
    action: Explicitly document and validate volatility model type (e.g., GARCH, EWMA, historical) and return distribution
      assumption (normal, t-distribution,skew-normal); do not use framework defaults without verification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using undocumented volatility models means strategy risk assessments are based on hidden assumptions; in
      volatile markets, models assuming normal distribution systematically underestimate tail risk
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-228
    when: When implementing or modifying performance calculation logic in backtesting
    action: Calculate Return on Capital as net_profit / deployed_capital — deployed_capital includes opening balance only;
      annualized for periods less than 1 year
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the ROC formula (e.g., to IRR or time-weighted return) alters the performance metric interpretation,
      making historical comparisons invalid and potentially causing misallocation to strategies with inflated IRR but lower
      absolute returns
    derived_from_bd_id: BD-076
  - id: finance-C-229
    when: When deriving financial metrics for cross-company comparisons
    action: Use ratio-based metric derivation (margins, turns, returns) for cross-company analysis — ratios normalize scale
      effects; non-recurring items are not normalized; validate against SEC XBRL tags where available
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using raw financial metrics instead of ratios for cross-company comparison introduces scale bias; small companies
      will always show higher absolute profits but lower efficiency, leading to incorrect allocation decisions favoring large-cap
      stocks
    derived_from_bd_id: BD-079
  - id: finance-C-230
    when: When running Markowitz portfolio optimization using historical return data
    action: Validate upstream YFinance data quality before optimization input — check for price gaps, stale prices, survivorship
      bias (delisted stocks), and data completeness; do not assume optimization inputs are clean
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Portfolio optimization using flawed YFinance data produces weights optimized for imperfect inputs; this creates
      portfolios that appear efficient in backtests but underperform live due to data quality issues embedded in the optimization
    derived_from_bd_id: BD-103
  - id: finance-C-231
    when: When designing or modifying pipeline stage dependencies involving financial analysis
    action: Implement secondary data source fallback or partial report capability for FMP fundamental data; do not create
      hard pipeline dependencies where a single data source failure causes complete system unavailability
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Hard dependency on FMP as sole fundamental data source means any API unavailability, rate-limiting, or incomplete
      data causes complete pipeline failure; this creates operational risk with no graceful degradation path for financial
      analysis
    derived_from_bd_id: BD-106
  - id: finance-C-232
    when: When using EV/EBITDA valuation bands alongside sensitivity tornado analysis
    action: Unify volatility assumptions across valuation bands and sensitivity analysis — use consistent volatility source
      (actual historical volatility or explicitly documented fixed assumption); do not mix band-based SD calculation with
      fixed 15% sensitivity volatility
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using conflicting volatility assumptions in bands (±1 SD) and sensitivity analysis (fixed 15%) creates contradictory
      valuation signals; a stock may appear undervalued by band standards but high-risk by sensitivity standards, confusing
      users about actual valuation uncertainty
    derived_from_bd_id: BD-110
  - id: finance-C-233
    when: When using SensitivityAnalyzer for equity valuation confidence intervals
    action: Verify that std_ratio=0.15 matches the stock's actual volatility profile; for high-beta stocks (implied volatility
      >30%) or low-beta stocks (<10%), adjust the parameter or supplement with market-derived volatility data
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Fixed 15% volatility assumption produces unreliable confidence intervals for extreme-beta stocks, leading
      to either overconfident or underconfident price targets that misrepresent actual valuation uncertainty
    derived_from_bd_id: BD-096
  - id: finance-C-234
    when: When implementing DCF projection with FCF approximated as EBITDA*60%
    action: Validate that actual FCF-to-EBITDA ratio falls within a reasonable range around 60%; for capital-intensive industries
      or companies with FCF margin deviation >15% from assumption, flag for manual review or use reported FCF data
    severity: high
    kind: domain_rule
    modality: must
    consequence: The 60% FCF approximation error compounds through both 5-year projections and terminal value calculation,
      creating a double-amplification effect where a 10% FCF margin deviation causes 17% underestimation in each projection
      year
    derived_from_bd_id: BD-101
  - id: finance-C-235
    when: When calculating equity value as Enterprise Value minus Net Debt
    action: Use actual balance sheet data for net debt; for companies with actual net debt exceeding 15% of EV, flag the valuation
      for manual review as the 10% assumption understates leverage and overstates equity value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Assuming net debt is 10% of EV when actual leverage is 30% causes $2B equity value overstatement for a $10B
      EV company, creating a hidden leverage assumption amplification visible only at the final price target stage
    derived_from_bd_id: BD-102
  - id: finance-C-236
    when: When implementing stock screening and backtesting workflows
    action: Implement walk-forward analysis with rolling train/test splits; use out-of-sample testing to validate that fixed
      technical indicator parameters (RSI 14, MACD 12/26/9, MA 20/50/200) produce robust strategies not overfitted to historical
      data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Default technical indicator parameters become baked into the entire research workflow with no train/test
      split, causing systematic overfitting where strategies appear robust in backtest but fail in live trading due to look-ahead
      bias
    derived_from_bd_id: BD-108
  - id: finance-C-237
    when: When synthesizing DCF, EV/EBITDA, and peer comparison results into final recommendations
    action: Implement FCF conversion validation before synthesis; for companies where EBITDA*60% differs from reported FCF
      by >20%, apply industry-specific conversion rates or weight reported FCF higher to prevent error amplification through
      multiple valuation layers
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: FCF approximation error compounds through DCF projection, terminal value, and confidence-weighted synthesis;
      capital-intensive companies with actual FCF at 30% of EBITDA will be undervalued by 50%, producing incorrect investment
      recommendations
    derived_from_bd_id: BD-109
  - id: finance-C-238
    when: When implementing exit logic that combines profit thresholds with ROC-based sizing
    action: Align profit measurement methodology across each metrics; use consistent denominator (either deployed capital
      or position value) for both the 15% exit threshold and ROC calculation to prevent conflicting exit signals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using absolute percentage threshold (15% profit) with ROC calculated as net profit divided by deployed capital
      creates metric inconsistency where a 10% ROC trade may trigger or not trigger the 15% threshold depending on position
      sizing
    derived_from_bd_id: BD-111
  - id: finance-C-239
    when: When implementing HTTP request handling for SEC API document retrieval
    action: Replace the hardcoded 1-second timeout with adaptive timeout configuration; implement exponential backoff for
      retries when network latency exceeds the initial timeout threshold
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Hardcoded 1-second timeout causes premature request failures under high-latency network conditions or during
      large SEC document processing, breaking document retrieval workflows without graceful degradation
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-240
    when: When configuring profit control parameters in trading strategy backtesting
    action: Verify that the 15% profit threshold matches actual strategy requirements and broker fee structures; position-based
      sizing must maintain fixed percentage (not volatility-adjusted) unless explicitly reconfigured
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 15% profit threshold without verification causes backtest results to not reflect actual trading expectations;
      high-frequency strategies accumulate significant costs with wrong threshold, leading to live trading underperformance
    derived_from_bd_id: BD-040
  - id: finance-C-241
    when: When implementing or modifying data source integration in production trading systems
    action: Verify the multi-source abstraction layer's provider fallback chain is correctly implemented with proper timeout
      handling, retry logic, and failover sequencing; verify downstream code does not assume primary provider availability
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without verified fallback chains, rate-limiting or provider unavailability causes silent data gaps; strategies
      continue with stale data or fail mid-execution, leading to incorrect trading signals and financial losses
    derived_from_bd_id: BD-002
  - id: finance-C-242
    when: When implementing custom strategy loading using the 'module:ClassName' string format
    action: Verify that the module path is importable and the class exists in the runtime environment before attempting dynamic
      class loading
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Incorrect class path causes the strategy to silently load a different class or fail at runtime, producing
      backtest results that don't reflect the intended strategy logic
    derived_from_bd_id: BD-004
  - id: finance-C-243
    when: When implementing custom position sizing or indicator loading via string paths
    action: Validate that the string path resolves to a valid callable function or class before using it in position calculation
      or signal generation
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Invalid indicator or position sizer string path causes calculations to use default fallbacks silently, leading
      to P&L estimates that don't reflect the intended trading logic
    derived_from_bd_id: BD-005
  - id: finance-C-244
    when: When using the framework's default forecast parameters for DCF valuation
    action: Verify that revenue_growth_2025=0.05, revenue_growth_2026=0.06, revenue_growth_2027=0.04, and margin_improvement=0.01
      match the company's actual growth trajectory, and adjust if company-specific data is available
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using generic forecast defaults materially affects DCF intrinsic value estimates by 15-25%, causing investment
      decisions based on systematically incorrect valuations
    derived_from_bd_id: BD-085
  - id: finance-C-245
    when: When implementing catalyst classification logic for analyst recommendations
    action: Prioritize analyst action phrase matching (upgrade/downgrade detection) over generic keyword matching in the classification
      pipeline; analyst actions are high-signal events that must be correctly identified
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper priority handling, analyst upgrades/downgrades are misclassified as generic sentiment, causing
      high-signal catalyst events to be ignored or false catalysts to trigger incorrectly
    derived_from_bd_id: BD-021
  - id: finance-C-246
    when: When implementing confidence-weighted valuation synthesis across multiple methods
    action: Normalize confidence weights to sum to exactly 1.0 before synthesis; explicitly filter out methods with zero confidence
      before normalization to prevent division-by-zero or NaN propagation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Weights not summing to 1.0 cause systematic valuation bias where the final estimate is either scaled up or
      down incorrectly, leading to mispriced positions and incorrect allocation decisions
    derived_from_bd_id: BD-015
  - id: finance-C-247
    when: When implementing portfolio optimization or risk calculation requiring covariance matrices
    action: Assume the framework handles covariance matrix positive semi-definite (PSD) repair — the framework does not implement
      PSD validation or repair; raw historical return data may produce non-PSD matrices due to estimation error
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Non-PSD covariance matrices cause portfolio optimization to fail or produce mathematically invalid results,
      leading to incorrect portfolio weights and systematic risk mismeasurement in production
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-248
    when: When computing covariance matrices from historical returns for portfolio optimization
    action: Apply PSD repair before optimization — use Higham (2002) nearest PSD projection, eigenvalue clipping (set negative
      eigenvalues to epsilon), or spectral decomposition with rank-k approximation; validate with np.linalg.eigvalsh() ensuring
      each eigenvalues >= 1e-8
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without PSD repair, Cholesky decomposition fails in optimization routines, causing portfolio construction
      to crash or produce invalid allocations that misrepresent actual risk exposure
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-249
    when: When implementing portfolio and trade persistence in database operations
    action: Replace SQLAlchemy ORM models with raw SQL queries or direct SQL execution — the ORM abstraction layer must be
      maintained for each Portfolio and Trade persistence operations
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using raw SQL bypasses the ORM abstraction layer, introducing SQL injection vulnerabilities and breaking
      audit trail consistency; production systems lose the ability to track trade history and portfolio performance reliably
    derived_from_bd_id: BD-051
  - id: finance-C-250
    when: When configuring stock screener parameters for stock_selection stage
    action: Verify default screener thresholds (price, volume, sector, market cap) match the target investment strategy —
      do not use default quantitative filters without explicit validation against strategy requirements; document any deviation
      from default parameters
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default screener criteria filter stocks based on generic thresholds, potentially excluding valid candidates
      for factor-based or sector-specific strategies, causing systematic underperformance in backtested results compared to
      live trading
    derived_from_bd_id: BD-059
  - id: finance-C-251
    when: When executing batch data fetching operations for large-scale historical data
    action: 'Implement error handling with circuit-breaker pattern: track consecutive failures, halt batch processing after
      N failures (configurable threshold), require manual review before resuming; log each failed symbol with error reason
      for debugging'
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Sequential batch processing without circuit-breaker allows partial failures to cascade, resulting in incomplete
      datasets where missing symbols cause silent backtest errors or strategy decisions based on incomplete price history
    derived_from_bd_id: BD-060
  - id: finance-C-252
    when: When implementing or refactoring the investment analysis workflow
    action: Use multi-agent architecture with parallel specialized analyst roles (fundamental, technical, sentiment, risk)
      and aggregate signals via consensus or voting mechanism
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Replacing multi-agent architecture with a single agent removes domain-specific expertise and parallel analysis
      capabilities, causing less comprehensive market assessment and potentially missing critical signals
    derived_from_bd_id: BD-058
  - id: finance-C-253
    when: When implementing sensitivity analysis for strategy parameter tuning
    action: Use uniform linspace sampling with 11-point grid within ±20% parameter range for sensitivity analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative sampling methods like Monte Carlo or Latin hypercube may violate the framework's expected
      grid structure and cause compatibility issues with visualization and interpretation modules
    derived_from_bd_id: BD-070
  - id: finance-C-254
    when: When using DBSCAN clustering for SEC filing document section detection
    action: Verify DBSCAN epsilon and min_samples parameters are calibrated for 10-K/10-Q formatting conventions; for non-SEC
      financial documents, re-tune parameters before applying
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using DBSCAN with SEC-calibrated parameters on other financial documents causes inaccurate section detection,
      leading to incomplete or incorrect document parsing and potential loss of critical filing information
    derived_from_bd_id: BD-062
  - id: finance-C-255
    when: When calculating RSI for equity technical analysis
    action: Use 14-period RSI with 70/30 overbought/oversold thresholds for equity ticker charts; for commodity or forex instruments,
      adjust period parameter accordingly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 14-period RSI on non-equity instruments produces misleading overbought/oversold signals due to different
      volatility characteristics, potentially causing incorrect trading signals
    derived_from_bd_id: BD-063
  - id: finance-C-256
    when: When calculating MACD for daily and weekly trend charts
    action: Use 12/26/9 MACD parameters for daily and weekly equity charts; use 5/13/4 parameters for intraday charts to achieve
      faster response
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using standard 12/26/9 MACD on intraday charts produces delayed trend signals, while using 5/13/4 on daily/weekly
      charts introduces excessive noise and false crossover signals
    derived_from_bd_id: BD-064
  - id: finance-C-257
    when: When implementing or consuming the SEC filings API endpoint that returns multiple document sections
    action: Verify client capability to parse multipart/mixed MIME responses before relying on bundled responses; implement
      fallback or alternative endpoint for clients that cannot handle multipart responses
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Simple GET callers and basic HTTP clients cannot parse multipart/mixed responses, causing silent data retrieval
      failures where SEC filing sections are completely inaccessible
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-258
    when: When implementing API clients that consume the file upload endpoint
    action: Verify that the API accepts JSON request body format for programmatic clients; if only Form defaults are supported,
      construct form-encoded requests or use the provided client SDK
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: RESTful JSON API clients expecting standard JSON request bodies will fail to upload files, causing data collection
      pipelines to break when switching from browser/curl testing to programmatic access
    derived_from_bd_id: BD-GAP-005
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
