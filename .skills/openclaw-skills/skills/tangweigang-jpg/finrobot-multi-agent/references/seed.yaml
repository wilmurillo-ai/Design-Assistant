architecture:
  pipeline: data_collection -> data_storage -> factor_computation -> target_selection -> trading_execution -> visualization
  stages:
  - id: data_collection
    narrative:
      does_what: TimeSeriesDataRecorder and FixedCycleDataRecorder fetch OHLCV and fundamental data from providers (eastmoney,
        joinquant, baostock, akshare) and persist domain objects (Stock1dKdata, BalanceSheet) to SQLite via df_to_db().
      key_decisions: BD-002 chose evaluate_start_end_size_timestamps for incremental fetch (not full refresh) because comparing
        to get_latest_saved_record avoids redundant API calls; BD-003 chose get_data_map field transformation to keep domain
        schema provider-agnostic.
      common_pitfalls: 'Don''t forget SL-11: Recorder subclass MUST declare both provider and data_schema class attributes
        else initialization fails with assertion error; finance-C-001 fatal violation.'
    business_decisions:
    - id: BD-001
      type: BA
      summary: Lazy API key initialization via decorator pattern with graceful fallback
    - id: BD-002
      type: BA
      summary: Multi-source abstraction layer with provider-swappable architecture
    - id: BD-003
      type: M
      summary: Rate limiting on SEC EDGAR API calls (10 req/sec compliance)
    - id: BD-034
      type: B/DK
      summary: Financial data utilities with DataFrame return type and optional CSV persistence
    - id: BD-035
      type: B
      summary: FMP API as primary fundamental data source with free tier support
    - id: BD-037
      type: B/DK
      summary: SEC EDGAR for regulatory filings with CIK-based lookup
    - id: BD-046
      type: B/DK
      summary: Finnhub API for real-time news and social media sentiment
    - id: BD-051
      type: B
      summary: Database persistence via SQLAlchemy ORM for portfolio and trade tracking
    - id: BD-060
      type: B/BA
      summary: Batch data fetching with error handling and progress reporting
    - id: BD-GAP-006
      type: DK
      summary: 'Missing: as-of vs processing time'
    - id: BD-GAP-007
      type: RC
      summary: 'Missing: float vs Decimal for currency'
    - id: BD-GAP-008
      type: M
      summary: 'Missing: Convergence criteria explicit'
    - id: BD-GAP-009
      type: M
      summary: 'Missing: Matrix ill-conditioning stability'
    - id: BD-GAP-010
      type: DK
      summary: 'Missing: Point-in-Time data availability'
    - id: BD-GAP-011
      type: DK
      summary: 'Missing: Model and data version snapshot'
    - id: BD-GAP-012
      type: RC
      summary: 'Missing: Settlement and delivery time'
    - id: BD-GAP-013
      type: RC
      summary: 'Missing: Price/quantity precision'
    - id: BD-GAP-014
