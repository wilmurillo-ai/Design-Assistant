      values
    stage_ids:
    - sensitivity_analysis
  - id: finance-C-080
    when: When implementing sensitivity analysis for forecast scenarios
    action: Include forecast year columns ending with 'E' suffix in the base_forecast DataFrame
    severity: fatal
