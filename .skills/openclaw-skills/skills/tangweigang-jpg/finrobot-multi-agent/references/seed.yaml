    stage_ids:
    - data_collection
  - id: finance-C-019
    when: When deploying data collection
    action: skip API key validation assuming keys are always configured
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping environment variable checks causes cryptic errors when keys are missing, complicating debugging
      and deployment
    stage_ids:
