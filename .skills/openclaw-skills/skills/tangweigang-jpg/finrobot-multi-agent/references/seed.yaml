  - id: finance-C-061
    when: When computing per-share valuations in any valuation method
    action: verify shares_outstanding is positive before dividing equity_value by shares
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Division by zero when shares_outstanding equals zero causes arithmetic error, producing invalid price estimates
      of 0 or NaN that corrupt downstream synthesis
    stage_ids:
    - valuation_engine
  - id: finance-C-062
    when: When producing any price estimate (target_price, low_estimate, high_estimate)
    action: apply max(result, 0) to prevent negative prices from discounted cash flow or negative EBITDA multiples
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative per-share prices appear in football field charts, causing report readers to make invalid investment
      decisions based on nonsensical valuation outputs
    stage_ids:
    - valuation_engine
  - id: finance-C-063
    when: When calculating DCF terminal value
    action: allow WACC to equal or fall below terminal_growth_rate
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Division by zero or negative denominator in terminal value formula produces infinite or negative enterprise
      value, corrupting the entire valuation synthesis
    stage_ids:
    - valuation_engine
  - id: finance-C-068
    when: When running valuation synthesis without any valid (non-zero) results
    action: 'return {''target_price'': 0, ''range'': (0, 0), ''methods_used'': 0} to avoid division by zero in confidence-weighted
      average'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Dividing by total_weight=0 when all methods fail produces ZeroDivisionError, crashing the synthesis step
      and preventing report output
    stage_ids:
    - valuation_engine
  - id: finance-C-079
    when: When implementing sensitivity analysis with base_forecast DataFrame input
    action: Include 'metrics' as the row identifier column in the input DataFrame
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The SensitivityAnalyzer._get_metric_value method queries rows where metrics == metric_name; missing 'metrics'
