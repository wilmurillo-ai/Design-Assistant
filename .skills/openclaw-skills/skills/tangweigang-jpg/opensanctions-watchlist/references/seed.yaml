resources:
  packages:
  - name: followthemoney==4.8.0
    version_pin: latest
  - name: nomenklatura==4.7.4
    version_pin: latest
  - name: plyvel==1.5.1
    version_pin: latest
  - name: rigour==1.8.1
    version_pin: latest
  - name: datapatch>=1.2.4,<1.3
    version_pin: latest
  - name: banal>=1.1.2,<2.0
    version_pin: latest
  - name: lxml==6.0.4
    version_pin: latest
  - name: requests[security]
    version_pin: latest
  - name: orjson==3.11.8
    version_pin: latest
  - name: sqlalchemy[mypy]
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install followthemoney==4.8.0
    - python3 -m pip install nomenklatura==4.7.4
    - python3 -m pip install plyvel==1.5.1
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing HTTP request methods in data collection
    action: Validate HTTP method against supported list (GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid HTTP methods cause ValueError exceptions, halting data collection pipeline and preventing successful
      crawls
    stage_ids:
    - data_collection
  - id: finance-C-002
    when: When processing HTTP responses in data collection
    action: Call raise_for_status() on responses to handle HTTP error status codes
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: HTTP 4xx/5xx errors are silently ignored, causing incomplete or corrupt data to enter the pipeline
    stage_ids:
    - data_collection
  - id: finance-C-003
    when: When generating cache fingerprints for POST requests
    action: Include request body data in cache fingerprint calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Different POST bodies with same URL return identical cached content, causing data corruption and missing
      entities
    stage_ids:
    - data_collection
  - id: finance-C-004
    when: When caching HTTP responses in data collection
    action: Use fingerprint-based caching that includes URL, method, auth, and body for each request types
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Cache returns stale data for requests with different parameters, causing incomplete or incorrect entity extraction
    stage_ids:
    - data_collection
  - id: finance-C-005
    when: When using ZyteAPI backend for HTTP requests
    action: Configure OPENSANCTIONS_ZYTE_API_KEY environment variable before making requests
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: ZyteAPI requests fail with RuntimeError, preventing data collection from blocked sites
    stage_ids:
    - data_collection
  - id: finance-C-021
    when: When configuring ZyteAPI for HTTP responses
    action: Base64-decode httpResponseBody responses before charset decoding
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Attempting to decode base64-encoded bytes as text produces garbage characters and parsing failures
    stage_ids:
    - data_collection
  - id: finance-C-022
    when: When adding statements to an entity without first setting entity.id
    action: attempt to add statements to an entity without first setting entity.id
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: The system will raise InvalidData('Cannot add statement to entity without ID!') causing data loss for that
      entity's properties
    stage_ids:
    - entity_construction
  - id: finance-C-024
    when: When adding values to stub (reverse) properties directly
    action: add values to stub properties which represent reverse relationships
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Stub properties raise InvalidData exceptions when direct assignment is attempted, corrupting the entity construction
      flow
    stage_ids:
    - entity_construction
  - id: finance-C-025
    when: When entity statements are emitted without a statement ID
    action: emit statements that lack a statement ID
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Statement emission will raise ValueError for missing statement IDs, preventing the entity from being stored
      in the database
    stage_ids:
    - entity_construction
  - id: finance-C-026
    when: When using make_id() with a dataset that has no prefix set
    action: use make_id() with a dataset that has no prefix configured
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: The assertion 'Prefix must be set for entity ID' will fail, causing the crawler to crash during entity construction
    stage_ids:
    - entity_construction
  - id: finance-C-034
    when: When constructing entity IDs from source identifiers
    action: include sufficient identifying attributes in make_id() to avoid ID collisions
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: ID collisions cause two different real-world entities to be merged into one, creating false positive sanctions
      matches
    stage_ids:
    - entity_construction
  - id: finance-C-040
    when: When using add_cast() with invalid schema or property names
    action: pass non-existent schemas or properties to add_cast()
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: InvalidModel exceptions are raised for invalid schemas, causing crawler crashes
    stage_ids:
    - entity_construction
  - id: finance-C-041
    when: When trying to make schema changes that are incompatible
    action: attempt to change entity schema to an incompatible type (e.g., Person to Company)
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: InvalidData exception is raised when schema changes are incompatible, aborting entity construction
    stage_ids:
    - entity_construction
  - id: finance-C-042
    when: When emitting entities without a valid entity ID
    action: emit entities where entity.id is None
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: ValueError is raised preventing entity emission, and the entity is lost from the output
    stage_ids:
    - entity_construction
  - id: finance-C-044
    when: When adopting statements from other entities
    action: validate that the adopted statement's property exists in the target entity's schema
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: InvalidModel exception is raised if the property doesn't exist in the target schema
    stage_ids:
    - entity_construction
  - id: finance-C-047
    when: When emitting an entity without a prior ID assignment
    action: raise ValueError before statement emission to prevent data loss
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Entities without IDs cannot be tracked or versioned, causing permanent loss of entity lineage and breaking
      delta detection across dataset versions
    stage_ids:
    - statement_storage
  - id: finance-C-049
    when: When emitting a statement that lacks a statement ID
    action: raise ValueError to prevent serialization of malformed statements
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Statements without IDs break the TimeStampIndex key format (entity_id:stmt_id) and cause KeyError exceptions
      during entity reconstruction
    stage_ids:
    - statement_storage
  - id: finance-C-056
    when: When calling emit() on the Context
    action: use Context.emit() as the sole entry point for statement emission instead of direct store writes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Direct store writes bypass the statement cloning, timestamp tracking, and dry_run checks, causing inconsistent
      timestamps and potential duplicate statements
    stage_ids:
    - statement_storage
  - id: finance-C-063
    when: When exporting entities with the StatementsCSVExporter
    action: Call feed_unconsolidated before consolidate_entity for each entity
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Original unconsolidated statements will be lost because consolidate_entity mutates the entity in-place, removing
      duplicate name variants that StatementsCSVExporter needs to export raw data
    stage_ids:
    - exporting
  - id: finance-C-064
    when: When implementing a new Exporter subclass
    action: Implement the feed() method with proper entity and fragment handling
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The Exporter.feed() method raises NotImplementedError(), causing the exporter to fail at runtime if called
      without implementation
    stage_ids:
    - exporting
  - id: finance-C-065
    when: When exporting resources via export_resource
    action: Verify the exported file exists before computing its checksum
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: resource_from_path raises ValueError 'File does not exist' if the file path doesn't exist, preventing the
      export from completing and generating checksum metadata
    stage_ids:
    - exporting
  - id: finance-C-067
    when: When exporting statements data
    action: Use feed_unconsolidated to export raw statements before consolidation removes variants
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: StatementsCSVExporter relies on feed_unconsolidated to access original unconsolidated statements. Without
      it, case-duplicated names like 'JOHN DOE' vs 'John Doe' would not be preserved in the export
    stage_ids:
    - exporting
  - id: finance-C-079
    when: When looking up entity referents for unconsolidated statements
    action: Perform consolidation before calling feed_unconsolidated
    severity: fatal
    kind: operational_lesson
    modality: must_not
    consequence: The test harness in test_exporters.py explicitly follows the correct order (feed_unconsolidated then consolidate_entity).
      Violating this order would cause StatementsCSVExporter to receive mutated entities without original statements
    stage_ids:
    - exporting
  - id: finance-C-083
    when: When implementing hash function for entity fingerprinting
    action: include entity.id, schema.name, and each property names+values in digest computation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing entity.id or schema.name from hash digest causes different entities to collide, leading to incorrect
      ADD/MOD/DEL classification in delta output
    stage_ids:
    - delta_computation
  - id: finance-C-084
    when: When computing content hash for delta comparison
    action: sort both property names and their values before hashing to verify canonical order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unsorted property iteration produces different hashes for identical entity states with different property
      insertion order, causing spurious MOD operations and incorrect delta classification
    stage_ids:
    - delta_computation
  - id: finance-C-085
    when: When processing entity with no identifier
    action: skip the entity in hash computation and LevelDB storage
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Entity without id causes KeyError or empty hash entry, corrupting LevelDB hash database and breaking delta
      computation for the entire dataset version
    stage_ids:
    - delta_computation
  - id: finance-C-086
    when: When storing entity hash in LevelDB
    action: encode entity_id and version_id in the key as 'entity_id:version_id' with utf-8 encoding
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Non-compliant key format causes iterator comparison to fail, producing incorrect ADD/MOD/DEL classifications
      for all entities in the delta
    stage_ids:
    - delta_computation
  - id: finance-C-092
    when: When comparing entity hashes for change detection
    action: classify operation as DEL when curr_hash is None and prev_hash is not None
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect DEL classification causes missing entity deletions in delta output, leaving stale entities in downstream
      systems that consume the delta
    stage_ids:
    - delta_computation
  - id: finance-C-093
    when: When comparing entity hashes for change detection
    action: classify operation as ADD when prev_hash is None and curr_hash is not None
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect ADD classification causes new entities to be missed or misclassified, breaking delta completeness
      for downstream systems
    stage_ids:
    - delta_computation
  - id: finance-C-094
    when: When comparing entity hashes for change detection
    action: classify operation as MOD when both prev_hash and curr_hash are present but unequal
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect MOD classification causes changed entities to not be updated in downstream systems, leaving them
      with stale data
    stage_ids:
    - delta_computation
  - id: finance-C-118
    when: When emitting entities from the crawler to statement storage
    action: assign a valid ID to each entity before calling context.emit()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Entity without ID causes ValueError in emit(), preventing any statements from being stored to the pack file
  - id: finance-C-125
    when: When computing deltas between current and previous entity states
    action: compare hash values using exact equality, not similarity or fuzzy matching
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-exact hash comparison causes incorrect delta operations, leading to missing or phantom entity changes
  - id: finance-C-131
    when: When generating delta export operations
    action: yield DEL operations for entities present in previous version but absent in current
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing DEL operations cause entities removed from source to remain in consumer databases
  - id: finance-C-142
    when: When emitting an entity from a crawler
    action: Set the entity ID before emitting — never emit an entity with id=None
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Statements will fail to attach to the entity, causing orphaned data in the dataset store with no way to associate
      property values to their source entity
  - id: finance-C-143
    when: When generating entity IDs using hash-based ID generation
    action: Use make_id() for hash-based IDs or make_slug() for prefix-based IDs — never use raw string concatenation or manual
      ID construction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Entity IDs will not follow the deterministic prefix:hash format required for cross-version de-duplication,
      causing duplicate entities when the same entity appears in multiple dataset versions
  - id: finance-C-144
    when: When emitting entities from a crawler
    action: Call context.begin() before any entity emit operations to initialize the version tracking and statement writer
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Entity statements will be written with no version tracking, no first_seen/last_seen timestamps, and no proper
      flush on completion, resulting in corrupted or lost statement data
  - id: finance-C-147
    when: When constructing entity IDs from source identifiers
    action: Include personal identifying information (names, dates of birth, passport numbers) in entity IDs — use only source-assigned
      opaque identifiers or hash inputs
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Entity IDs containing PII will be logged, indexed in search systems, and exposed in public APIs, violating
      data minimization principles and potentially exposing sensitive personal data in breach scenarios
  - id: finance-C-148
    when: When defining a new dataset prefix in the YAML metadata
    action: Verify the prefix is unique across each datasets and follows slugified format (lowercase, hyphens only, no leading/trailing
      hyphens)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Dataset prefixes must be globally unique to prevent entity ID collisions across datasets; invalid format
      will cause validation errors during dataset loading
  - id: finance-C-155
    when: When presenting OpenSanctions data or this codebase to users
    action: Claim real-time sanctions screening capability — this is a batch ETL data aggregation system, not a real-time
      screening API
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users will build compliance systems expecting real-time sanctions list updates when data is only updated
      on batch crawler schedules (daily/weekly/monthly), leading to delayed screening results and potential regulatory violations
  - id: finance-C-156
    when: When presenting OpenSanctions data or this codebase to users
    action: Claim individual entity lookup/query API capability — this is a bulk data export system with no built-in real-time
      query API
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting individual entity lookups via API will be unable to query the system in real-time for compliance
      screening purposes, leading to failed integration and compliance gaps
  - id: finance-C-164
    when: When implementing delta computation logic for entity change tracking
    action: 'Use correct delta operation semantics: ADD for new entities, MOD for changed entities, DEL for deleted entities;
      MERGE operations must mark the source entity as MOD and the result as MERGED - never treat MERGE as ADD or substitute
      MOD for DEL'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Misclassifying MERGE as ADD destroys entity history lineage; using DEL instead of MOD causes the entity to
      appear deleted and recreated instead of modified, silently corrupting audit trails and change tracking
    derived_from_bd_id: BD-025
  - id: finance-C-165
    when: When implementing or modifying entity ID generation and content hashing logic
    action: Assume entity identity is preserved when upstream crawlers normalize or alter entity content before hashing -
      any content modification causes hash-based ID changes, resulting in undetectable entity identity corruption across the
      data pipeline
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Silent entity identity corruption occurs when upstream normalization creates new entity IDs for existing
      entities, causing subsequent crawls to generate ADD/DEL pairs instead of MOD operations with no mechanism to detect
      the corruption
    derived_from_bd_id: BD-094
  - id: finance-C-170
    when: When implementing PEP designation retention logic or configuring screening system parameters
    action: 'Apply tiered retention periods based on position type: (1) default 5 years for standard PEP positions, (2) 20
      years for national-level officials and intergovernmental organization (IGO) representatives, (3) indefinite/no expiration
      for heads of state; the period starts from the last known office end date'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using uniform 5-year retention for all PEP types causes premature removal of high-risk individuals (national
      ministers, IGO directors) who retain influence for decades after leaving office, leading to compliance violations and
      regulatory penalties in jurisdictions with enhanced PEP requirements
    derived_from_bd_id: BD-032
  - id: finance-C-176
    when: When implementing PEP occupancy status determination logic for screening decisions
    action: 'Evaluate dates in strict priority order: (1) endDate first, (2) then periodEnd boundary, (3) then dissolutionDate,
      (4) finally MAX_OFFICE tenure limit; do not reorder, skip, or combine these checks as each represents distinct business
      semantics'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Reordering date checks causes incorrect PEP occupancy determination; for example, checking MAX_OFFICE before
      endDate incorrectly marks active officials as inactive, creating compliance gaps where sanctioned individuals pass screening
      checks
    derived_from_bd_id: BD-072
  - id: finance-C-181
    when: When implementing dataset consolidation matching logic
    action: Consolidate datasets in the UNIQUE_DATASETS set {'us_ofac_sdn','eu_fsf','un_sc_sanctions','in_mha_banned'} with
      other datasets; these datasets must preserve independent regulatory status
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Consolidating UNIQUE_DATASETS entries with others merges regulatory status, causing sanctions to lose their
      independent regulatory provenance required for compliance reporting and audit trails
    derived_from_bd_id: BD-078
  - id: finance-C-203
    when: When implementing sanction status determination logic for compliance screening
    action: 'Calculate sanction active status using the bounded date range formula: min(startDate) <= NOW <= max(endDate);
      when endDate is None, treat the sanction as unbounded (indefinitely active)'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect active status calculation causes sanctioned entities to be missed during screening, resulting in
      regulatory violations and potential legal penalties for processing transactions with sanctioned parties
    derived_from_bd_id: BD-071
  - id: finance-C-224
    when: When processing entities through the exporter pipeline with consolidate_entity in-place mutation
    action: Call feed_unconsolidated() to preserve raw unmerged entity data BEFORE calling consolidate_entity() which mutates
      the entity in-place; verify exporters receive unconsolidated entities to maintain statement provenance
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the ordering contract destroys original entity state after consolidation, causing exporters to
      silently operate on incomplete entity data with missing unmerged statement provenance without raising any errors
    derived_from_bd_id: BD-090
  - id: finance-C-230
    when: When implementing data processing stages that use LevelDB for statement storage, delta computation, or entity comparison
    action: Implement transactional backup or redundancy for LevelDB _state directory; avoid write operations during read
      iterations; implement corruption detection and recovery mechanism
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: LevelDB corruption (from crash, disk full, or bit rot) simultaneously destroys statement storage, delta computation
      history, and entity comparison functionality, causing complete pipeline failure with no recovery path
    derived_from_bd_id: BD-092
  - id: finance-C-233
    when: When modifying property serialization, sorting logic, or hash computation in the entity pipeline
    action: 'Verify deterministic property ordering across each three hash-dependent systems: entity ID hashing for deduplication
      (BD-003), entity hash computation for delta detection (BD-013), and HashDelta sorted (prop,values) pairs (BD-077)'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: 'Non-deterministic property ordering creates cascading failures: entity deduplication produces different
      IDs for same entity, delta detection shows false changes, and consistency tracking reports incorrect states, creating
      false positives and negatives across the entire pipeline'
    derived_from_bd_id: BD-089
  - id: finance-C-237
    when: When implementing Wikidata upload or publication automation logic
    action: Use the TUI with interactive resolve → propose → publish workflow for Wikidata edits — process entities one at
      a time with human confirmation rather than batch automation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Fully automated Wikidata uploads without human-in-the-loop risk violating Wikidata policy, causing mass incorrect
      updates that may result in account suspension or rejected edits
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-240
    when: When a crawler encounters data it cannot interpret with confidence
    action: Crash or emit a warning instead of silently emitting ambiguous output
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Silently emitted ambiguous data propagates through the KYC/AML pipeline, potentially matching innocent parties
      against incorrect sanctions designations and causing compliance failures.
  - id: finance-C-241
    when: When creating any entity in a crawler
    action: Emit an entity without setting its .id attribute first
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Entities without IDs cannot be deduplicated or linked by downstream systems, causing silent data loss and
      broken referential integrity.
  - id: finance-C-245
    when: When emitting a sanctioned entity from any sanctions-list crawler
    action: Emit a linked Sanction entity alongside the sanctioned entity
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing Sanction entities break downstream enrichment, making it impossible to determine program membership
      or authority for the sanctioned party.
  - id: finance-C-267
    when: When a sanctions/PEP crawler encounters ambiguous, malformed, or unexpected data during parsing
    action: emit ambiguous data silently instead of crashing or producing an error
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Ambiguous or malformed data is silently emitted into the sanctions/PEP output, corrupting KYC/AML screening
      results. Downstream consumers receive entities with incorrect properties, names, or identifiers, leading to false positives
      or false negatives in compliance screening.
  - id: finance-C-269
    when: When adding a new sanctions-list crawler that normalises name data using LLM-based cleaning
    action: apply LLM-based name normalisation (h.clean_names) to sanctioned entity names
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: LLM-based name normalisation silently alters sanctioned entity names, producing non-legal-designation names.
      Sanctioned names are legal designations — any normalisation must be human-reviewed to remain accurate. LLM cleaning
      introduces hallucinations and undocumented changes that corrupt the sanctioned entity record.
  - id: finance-C-270
    when: When building a new crawler and needing to generate a stable entity identifier
    action: put PII (names, DOB, passport numbers) into make_slug to create entity IDs
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Personal identifiers (names, dates of birth) embedded in entity IDs are logged, indexed, and exposed in APIs.
      This constitutes a PII data leak and violates the project's de-identification contract. It also creates unstable IDs
      because PII data changes, silently breaking downstream enrichment and deduplication links.
  regular:
  - id: finance-C-006
    when: When configuring HTTP sessions for data collection
    action: Set SSL verification to False due to invalid certificates on target scraping sites
    severity: high
    kind: resource_boundary
    modality: must
    consequence: SSL certificate validation failures cause all HTTPS requests to fail on sites with invalid certificates
    stage_ids:
    - data_collection
  - id: finance-C-007
    when: When configuring HTTP request timeouts
    action: Set HTTP timeout to 1200 seconds (20 minutes) for large file downloads
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Default Python requests timeout causes incomplete downloads for large files, resulting in corrupt cached
      data
    stage_ids:
    - data_collection
  - id: finance-C-008
    when: When retrying failed HTTP requests
    action: Apply exponential backoff with configurable retry count for transient HTTP errors
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Immediate retry of failed requests amplifies server load and may trigger IP blocking or rate limiting
    stage_ids:
    - data_collection
  - id: finance-C-009
    when: When using ZyteAPI for bot-blocked sites
    action: Use httpResponseBody scrape type (default) instead of browserHtml for faster, cheaper requests
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using browserHtml increases API costs and latency significantly without benefit for non-JavaScript content
    stage_ids:
    - data_collection
  - id: finance-C-010
    when: When caching sanctions index pages in data collection
    action: Cache sanctions index pages for long durations due to critical freshness requirements
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Newly sanctioned persons remain undiscovered for extended periods, reducing dataset completeness and timeliness
    stage_ids:
    - data_collection
  - id: finance-C-011
    when: When caching paginated listing pages
    action: Cache paginated pages that change dynamically when entities are added or removed
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Old page versions cause entities to disappear and reappear inconsistently, corrupting historical analysis
    stage_ids:
    - data_collection
  - id: finance-C-012
    when: When performing HTTP operations in data collection
    action: Use context fetch methods (fetch_text, fetch_html, fetch_json) that handle caching, retries, and status checking
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Bypassing context methods results in missing cache handling, broken retry logic, and unhandled HTTP errors
    stage_ids:
    - data_collection
  - id: finance-C-013
    when: When caching detail pages for slow-moving sources
    action: Cache detail pages (person profiles) for longer durations to balance freshness vs. crawl efficiency
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Re-fetching thousands of detail pages on each crawl wastes bandwidth and increases API costs unnecessarily
    stage_ids:
    - data_collection
  - id: finance-C-014
    when: When handling JSON decode failures during data collection
    action: Clear the cached entry for the failed URL before re-raising the exception
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cached malformed JSON causes repeated decode failures on subsequent crawls, blocking entity extraction
    stage_ids:
    - data_collection
  - id: finance-C-015
    when: When initializing Context for data collection
    action: Context object must own the HTTP session instance to avoid threading issues with shared sessions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Shared HTTP sessions across threads cause race conditions, corrupted responses, and non-deterministic behavior
    stage_ids:
    - data_collection
  - id: finance-C-016
    when: When implementing alternative HTTP backends
    action: fetch_response method must produce identical response content regardless of backend (requests.Session vs ZyteAPI)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Different backends returning different content causes inconsistent entity extraction across environments
    stage_ids:
    - data_collection
  - id: finance-C-017
    when: When representing cached data availability
    action: Claim cached responses are equivalent to fresh server responses without considering cache age
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Stale cached content misrepresents current server state, leading to decisions based on outdated information
    stage_ids:
    - data_collection
  - id: finance-C-018
    when: When describing ZyteAPI capabilities
    action: Claim ZyteAPI provides real-time data or bypasses each anti-scraping measures
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: ZyteAPI may still fail against sophisticated JavaScript challenges or geo-restrictions, leading to incomplete
      crawls
    stage_ids:
    - data_collection
  - id: finance-C-019
    when: When caching PEP database detail pages
    action: Cache with very short duration (hours) when it's acceptable to discover new positions after a few days delay
    severity: low
    kind: operational_lesson
    modality: should_not
    consequence: Excessively long caches delay discovery of minister position changes and other timely PEP updates
    stage_ids:
    - data_collection
  - id: finance-C-020
    when: When validating content-type headers from HTTP responses
    action: Parse charset from content-type header using email.message.Message for correct text decoding
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect charset detection causes mojibake in extracted text, corrupting entity names and other text data
    stage_ids:
    - data_collection
  - id: finance-C-023
    when: When emitting entities that have no properties set
    action: emit entities that have no properties set
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Empty entities are logged as errors and silently dropped from the output, losing the entity record entirely
    stage_ids:
    - entity_construction
  - id: finance-C-027
    when: When adding LegalEntity names that do not pass is_name validation
    action: add name values to LegalEntity schemas that fail the is_name validation check (unless from lookup)
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Invalid names are silently skipped (logged as warning) and never added to the entity, causing incomplete
      entity data
    stage_ids:
    - entity_construction
  - id: finance-C-028
    when: When property values exceed the defined max_length for their type
    action: add property values that exceed the property's max_length constraint
    severity: medium
    kind: domain_rule
    modality: should_not
    consequence: Oversized values trigger warnings and may be truncated or cause downstream processing issues
    stage_ids:
    - entity_construction
  - id: finance-C-029
    when: When using make_id() for generating entity IDs
    action: use context.make_id() to generate deterministic hash-based entity IDs
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hash-based IDs enable cross-run deduplication; missing this causes duplicate entities and inconsistent results
    stage_ids:
    - entity_construction
  - id: finance-C-030
    when: When calling add_cast() for schema evolution
    action: use add_cast() to incrementally type entities when source data lacks complete schema upfront
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Failing to use add_cast() prevents proper schema evolution, causing type inference failures for entities
      with incomplete source data
    stage_ids:
    - entity_construction
  - id: finance-C-032
    when: When applying value cleaning during entity construction
    action: apply type-aware value cleaning via value_clean() based on property type (identifier, name, date, etc.)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing type-aware cleaning causes inconsistent normalization across entities, leading to deduplication failures
      and search issues
    stage_ids:
    - entity_construction
  - id: finance-C-033
    when: When identifier properties are cleaned
    action: use clean_identifier() for identifier-type properties to normalize BIC, ISIN, LEI, IBAN, etc.
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unnormalized identifiers fail to match across datasets, causing sanctions and entity lookups to miss matches
    stage_ids:
    - entity_construction
  - id: finance-C-035
    when: When creating entities with similar attributes in datasets
    action: use name plus birthDate or other distinguishing attributes for make_id() to reduce collision probability
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Simple name-based IDs lead to false merges when multiple people share the same name
    stage_ids:
    - entity_construction
  - id: finance-C-036
    when: When adding Person names to entities
    action: normalize name values to NFC Unicode form for consistent matching
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-NFC normalized names fail to match across systems that normalize differently, causing missed entity resolutions
    stage_ids:
    - entity_construction
  - id: finance-C-037
    when: When date values are added to entities
    action: truncate date values to day precision (YYYY-MM-DD format)
    severity: medium
    kind: domain_rule
    modality: must
    consequence: High-precision timestamps introduce false distinctions between entities based on data source timing rather
      than actual birth dates
    stage_ids:
    - entity_construction
  - id: finance-C-038
    when: When HTML-like content is detected in property values
    action: log warnings for XSS-suspect content rather than silently storing it
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Malicious HTML/JS in data could be rendered by downstream systems, potentially executing in user browsers
    stage_ids:
    - entity_construction
  - id: finance-C-039
    when: When the system claims to provide real-time sanctions data
    action: claim real-time trading or screening capabilities based on OpenSanctions data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: OpenSanctions data is inherently delayed and batch-updated, unsuitable for real-time use cases
    stage_ids:
    - entity_construction
  - id: finance-C-043
    when: When considering the OpenSanctions XSS detection as a complete security solution
    action: rely solely on the XSS smell detector for security guarantees
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: The XSS detector is explicitly a 'smell detector' (safety.py:49-60) and cannot guarantee values are safe
      to render in all contexts
    stage_ids:
    - entity_construction
  - id: finance-C-045
    when: When adding address values that are too short
    action: log warnings for addresses with 3 or fewer characters
    severity: low
    kind: domain_rule
    modality: should
    consequence: Suspiciously short addresses likely indicate extraction errors, leading to incomplete address data
    stage_ids:
    - entity_construction
  - id: finance-C-046
    when: When using deprecated properties
    action: add values to deprecated properties without understanding migration path
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Deprecated properties may be removed in future versions, breaking entity construction
    stage_ids:
    - entity_construction
  - id: finance-C-048
    when: When emitting an entity that has no property statements
    action: log error and skip entity emission without raising exception
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty entities are silently skipped, potentially losing data if entity construction logic fails to populate
      properties
    stage_ids:
    - statement_storage
  - id: finance-C-050
    when: When building the TimeStampIndex with statements having missing metadata
    action: skip statements with None/empty first_seen, id, or entity_id to prevent corrupt index entries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Corrupt index entries with None keys cause KeyError exceptions during delta detection and incorrect first_seen
      tracking for previously-seen statements
    stage_ids:
    - statement_storage
  - id: finance-C-051
    when: When storing statements in the embedded LevelDB instance
    action: exceed the 10MB write buffer threshold without flushing to prevent memory exhaustion
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: LevelDB write buffers that exceed available memory cause OutOfMemoryError and dataset crawl failure
    stage_ids:
    - statement_storage
  - id: finance-C-052
    when: When indexing statements into TimeStampIndex batch processing
    action: flush the write batch every 500,000 statements to prevent batch overflow
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Write batches exceeding plyvel limits cause batch write failures and incomplete timestamp indices, breaking
      delta detection
    stage_ids:
    - statement_storage
  - id: finance-C-053
    when: When running in dry_run mode with the Context
    action: write statements to disk or modify the timestamp index during dry run
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Accidental writes during dry run pollute the dataset state with test data, requiring manual cleanup of LevelDB
      files
    stage_ids:
    - statement_storage
  - id: finance-C-054
    when: When emitting entities during a dataset crawl operation
    action: flush buffered writes to disk every 10,000 entities to prevent data loss on interruption
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Interrupted crawls without periodic flushes lose all buffered statements since the last flush, potentially
      losing thousands of entity records
    stage_ids:
    - statement_storage
  - id: finance-C-055
    when: When processing entities with many statements in a single emit
    action: initialize the PackStatementWriter on first write rather than at context creation time
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Early writer initialization for empty datasets wastes file handles and memory; lazy initialization ensures
      writes only occur when data exists
    stage_ids:
    - statement_storage
  - id: finance-C-057
    when: When serializing statements to the statements.pack file
    action: use PackStatementWriter from followthemoney.statement.serialize for efficient binary encoding
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using non-Pack format causes incompatible file format and prevents downstream components (archive, export)
      from reading statements correctly
    stage_ids:
    - statement_storage
  - id: finance-C-058
    when: When reconstructing entities from stored statements
    action: use Store.assemble() which handles InvalidData exceptions and logs statement details on failure
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct LevelDBView.assemble() bypasses error logging, making debugging malformed statements difficult and
      causing silent entity assembly failures
    stage_ids:
    - statement_storage
  - id: finance-C-059
    when: When accessing the timestamp index for previous statement timestamps
    action: use the TimeStampIndex.get() method which correctly decodes keys using UTF-8 encoding
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Direct LevelDB access without proper encoding uses wrong character encoding, causing UnicodeDecodeError when
      processing entity IDs with non-ASCII characters
    stage_ids:
    - statement_storage
  - id: finance-C-060
    when: When presenting LevelDB state as a queryable dataset
    action: claim that LevelDB _state directory contains a production-quality database suitable for real-time queries
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: LevelDB is an ephemeral processing artifact stored in _state/ directory; it is cleared between runs and has
      no ACID guarantees, query optimization, or concurrent access controls
    stage_ids:
    - statement_storage
  - id: finance-C-061
    when: When tracking first_seen timestamps across dataset versions
    action: claim that TimeStampIndex contains complete historical data for each statements ever emitted
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: TimeStampIndex is rebuilt from the previous version's statements.pack file; if previous artifacts are unavailable
      due to archival failures or new datasets, statements appear as new despite existing in source data
    stage_ids:
    - statement_storage
  - id: finance-C-066
    when: When computing checksums for exported files
    action: Read file content in chunks and update digest incrementally
    severity: high
    kind: domain_rule
    modality: must
    consequence: Computing checksum without chunked reading can cause memory exhaustion for large files, resulting in export
      failure or system crash
    stage_ids:
    - exporting
  - id: finance-C-068
    when: When consolidating entities with OFAC sanctions data
    action: Remove or demote names from us_ofac_sdn, us_ofac_cons, or other high-trust datasets
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Names from OFAC datasets are protected by NEVER_REMOVE_NAMES_DATASETS. Demoting 'The Tiger' would remove
      sanctioned entity names that downstream users depend on for compliance verification
    stage_ids:
    - exporting
  - id: finance-C-069
    when: When caching entities in ViewFragment for nested property lookups
    action: Respect MAX_BUFFER limit of 1000 entries when caching entities and inverted index
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding the MAX_BUFFER limit causes unbounded memory growth, leading to potential out-of-memory errors
      when exporting large datasets with many entity relationships
    stage_ids:
    - exporting
  - id: finance-C-070
    when: When running multiple exporters simultaneously on the same entity set
    action: Verify each exporter receives a separate ViewFragment instance to avoid state interference
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without isolated ViewFragment instances, exporters sharing state could cause incorrect entity references
      or corrupted exports when multiple exporters access inverse relationships
    stage_ids:
    - exporting
  - id: finance-C-071
    when: When exporting data and calling ViewFragment.entities()
    action: Call entities() method on a ViewFragment instance directly
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: ViewFragment.entities() raises NotImplementedError('This method should not be called on a ViewFragment!'),
      causing export to fail if attempted
    stage_ids:
    - exporting
  - id: finance-C-072
    when: When generating delta exports for incremental updates
    action: Backfill previous version hashes before feeding current entities
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without backfilling previous hashes, the delta exporter cannot detect modifications (MOD operations), causing
      entities to be incorrectly classified as ADD even when they already existed
    stage_ids:
    - exporting
  - id: finance-C-073
    when: When consolidating entities with a null entity.id
    action: Attempt to add referents using linker.get_referents() with null id
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: consolidate_entity has explicit null check 'if entity.id is not None:' before calling linker.get_referents().
      Calling with null id would cause KeyError or incorrect referent handling
    stage_ids:
    - exporting
  - id: finance-C-074
    when: When computing entity hashes for delta detection
    action: Include entity.id, schema.name, and each sorted property values in the hash digest
    severity: high
    kind: domain_rule
    modality: must
    consequence: HashDelta uses SHA1 over sorted entity components. Missing any component from the digest would cause hash
      collisions where different entities appear unchanged or vice versa
    stage_ids:
    - exporting
  - id: finance-C-075
    when: When exporting with config-driven exporter selection
    action: Validate exporter names against the EXPORTERS registry before instantiation
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: 'export_data() logs error ''No exporter found for target: {name}'' if exporter class not in registry, skipping
      the exporter. Unvalidated config could silently omit expected exports'
    stage_ids:
    - exporting
  - id: finance-C-076
    when: When reading consolidated entities from ViewFragment.get_entity
    action: Re-consolidate the entity each time it is retrieved from the cache
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: ViewFragment.get_entity() consolidates entities on retrieval (line 38). Skipping consolidation would return
      unmerged duplicate entities causing downstream consumers to see incomplete data
    stage_ids:
    - exporting
  - id: finance-C-077
    when: When writing dataset index metadata after export
    action: Close the context before writing index files to verify each resources are flushed
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: export_dataset() explicitly closes context (context.close()) before calling write_dataset_index(). Skipping
      this would publish stale or missing resource metadata
    stage_ids:
    - exporting
  - id: finance-C-078
    when: When entity hash comparison detects no changes between versions
    action: Skip generating delta for entities where prev_hash equals curr_hash
    severity: medium
    kind: domain_rule
    modality: must
    consequence: 'DeltaExporter.generate() explicitly skips unchanged entities (if prev_hash == curr_hash: continue). Without
      this check, delta export would include all entities even unchanged ones, dramatically increasing export size'
    stage_ids:
    - exporting
  - id: finance-C-080
    when: When exporting to FtM format
    action: Open file in binary write mode 'wb' not text mode
    severity: high
    kind: domain_rule
    modality: must
    consequence: FtMExporter uses 'wb' mode (line 14) because write_entity writes entity bytes. Using text mode would cause
      encoding errors with non-ASCII entity data
    stage_ids:
    - exporting
  - id: finance-C-081
    when: When handling the case where no previous version exists for delta comparison
    action: Treat each entities as ADD operations when prev_hash is None
    severity: high
    kind: domain_rule
    modality: must
    consequence: HashDelta.generate() yields 'ADD' when prev_hash is None (line 97-98). Skipping this would lose all initial
      entities in delta export, breaking downstream consumers expecting full entity sets
    stage_ids:
    - exporting
  - id: finance-C-082
    when: When generating checksums for dataset resources
    action: Use SHA1 algorithm for content-based checksums as defined in resource_from_path
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: resource_from_path uses sha1() from hashlib to compute checksums. Using a different algorithm would produce
      mismatches with downstream consumers expecting the published checksum format
    stage_ids:
    - exporting
  - id: finance-C-087
    when: When initializing HashDelta for delta generation
    action: run backfill() before feed() to load previous version hashes into LevelDB
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Calling feed() before backfill() means no previous hashes exist in LevelDB, causing all existing entities
      to be incorrectly classified as ADD instead of MOD/UNCHANGED
    stage_ids:
    - delta_computation
  - id: finance-C-088
    when: When generating delta operations after processing each entities
    action: call generate() only after each entities have been fed to verify complete hash comparison
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Premature generate() call misses entities still in the write buffer, causing them to be incorrectly classified
      as DEL instead of ADD/MOD
    stage_ids:
    - delta_computation
  - id: finance-C-089
    when: When selecting hash algorithm for entity content fingerprinting
    action: implement SHA1 from hashlib as the digest algorithm to match expected hash file format
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using a different hash algorithm produces incompatible entity hashes, causing all delta operations to be
      misclassified and breaking dataset version compatibility
    stage_ids:
    - delta_computation
  - id: finance-C-090
    when: When swapping hash algorithm implementation
    action: maintain sorted property traversal order independent of hash algorithm choice
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Swapping hash algorithm without preserving sorted traversal breaks determinism, causing identical entities
      to produce different hashes across versions
    stage_ids:
    - delta_computation
  - id: finance-C-091
    when: When using LevelDB iterator for delta comparison
    action: iterate over sorted keys to group prev_hash and curr_hash by entity_id in single pass
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Random access to LevelDB for each entity causes O(n²) complexity, making delta computation impractical for
      large datasets with hundreds of thousands of entities
    stage_ids:
    - delta_computation
  - id: finance-C-095
    when: When computing entity hash for comparison
    action: skip entities with identical hashes from delta output
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Omitting hash equality check causes unchanged entities to be included in delta output, inflating file size
      and downstream processing with unnecessary data
    stage_ids:
    - delta_computation
  - id: finance-C-096
    when: When using delta output for synchronization
    action: claim the delta output is a complete snapshot of the current dataset
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Delta files only contain ADD/MOD/DEL operations, not full entity data. Downstream systems that treat delta
      as complete snapshot will have missing entities for DEL operations where only ID is exported
    stage_ids:
    - delta_computation
  - id: finance-C-097
    when: When presenting delta computation results
    action: imply SHA1 hash security properties apply to the delta comparison
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: SHA1 is used for content fingerprinting (deduplication/diff), not for cryptographic integrity verification.
      Claiming cryptographic security would be misleading as SHA1 is deprecated for security purposes
    stage_ids:
    - delta_computation
  - id: finance-C-099
    when: When publishing artifacts to archive
    action: publish version history before artifacts that reference it
    severity: high
    kind: domain_rule
    modality: must
    consequence: Artifacts cannot be backfilled without published version history, causing dataset retrieval to fail with
      missing data
    stage_ids:
    - archival_publishing
  - id: finance-C-100
    when: When publishing unchanged files to archive
    action: use republish() instead of publish() for identical content
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Re-uploading unchanged large files wastes bandwidth and GCS API quota; GCS copy_blob is instant while upload
      costs significant time
    stage_ids:
    - archival_publishing
  - id: finance-C-101
    when: When initializing GoogleCloudBackend
    action: use a GCS bucket with object versioning enabled
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without versioned bucket, GCS object generations fail causing streaming issues when blobs are replaced
    stage_ids:
    - archival_publishing
  - id: finance-C-102
    when: When invalidating CDN cache after archive changes
    action: expect cache invalidation to succeed if BUNNYNET_API_KEY is not set
    severity: low
    kind: resource_boundary
    modality: must_not
    consequence: Published artifacts appear stale to CDN users until natural TTL expiration, causing users to receive outdated
      data
    stage_ids:
    - archival_publishing
  - id: finance-C-103
    when: When backfilling artifacts for processing
    action: verify version history is published before requesting backfill
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Backfill returns None when version history is unpublished, leaving processing without required dataset artifacts
    stage_ids:
    - archival_publishing
  - id: finance-C-105
    when: When archiving a file path during publishing
    action: verify the path is within the dataset data directory
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Publishing files outside dataset directory breaks path isolation, potentially exposing or overwriting unintended
      files
    stage_ids:
    - archival_publishing
  - id: finance-C-106
    when: When publishing resources to /datasets
    action: include each required artifact files from ARTIFACT_FILES list
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing artifact files cause downstream processing to fail when trying to backfill required metadata
    stage_ids:
    - archival_publishing
  - id: finance-C-107
    when: When publishing delta exports
    action: verify artifact exists with size > 0 before including in delta index
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Empty delta artifacts included in index cause downstream consumers to download and process zero-length files
    stage_ids:
    - archival_publishing
  - id: finance-C-108
    when: When handling archive failure scenarios
    action: clear interim artifact files before publishing failure metadata
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Stale artifact files from failed runs pollute metadata, causing incorrect statistics and misleading issue
      counts
    stage_ids:
    - archival_publishing
  - id: finance-C-109
    when: When using GCS backend for blob operations
    action: verify source blob exists before attempting copy operation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Attempting to copy non-existent source blob raises RuntimeError, aborting publish operation
    stage_ids:
    - archival_publishing
  - id: finance-C-110
    when: When publishing collection datasets
    action: call archive_failure for collection datasets
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Failed collection indexes would have empty resources, causing client applications to receive invalid dataset
      metadata
    stage_ids:
    - archival_publishing
  - id: finance-C-111
    when: When reading version history from archive
    action: clear get_versions_data cache after publishing new version
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Stale cached version data causes incorrect version lookups, returning outdated historical information
    stage_ids:
    - archival_publishing
  - id: finance-C-112
    when: When backfilling statements from archive
    action: respect ARCHIVE_BACKFILL_STATEMENTS setting before attempting download
    severity: low
    kind: resource_boundary
    modality: should
    consequence: Unconditional backfill downloads large statement packs unnecessarily, consuming bandwidth and disk space
    stage_ids:
    - archival_publishing
  - id: finance-C-113
    when: When publishing resources for distribution
    action: set specified TTL based on resource type (short/medium/long)
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Incorrect TTL causes CDN to cache content too aggressively or not enough, affecting update propagation
    stage_ids:
    - archival_publishing
  - id: finance-C-114
    when: When requesting artifact object from archive
    action: check existence before attempting operations on the object
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Operating on non-existent archive objects raises RuntimeError, causing pipeline failures
    stage_ids:
    - archival_publishing
  - id: finance-C-115
    when: When operating GCS archive in production
    action: expect real-time synchronization of published artifacts
    severity: medium
    kind: claim_boundary
    modality: should_not
    consequence: GCS operations have eventual consistency; published blobs may not be immediately available for backfill or
      republish
    stage_ids:
    - archival_publishing
  - id: finance-C-116
    when: When comparing backfill behavior across backends
    action: expect FileSystemBackend to copy files while GCS downloads blobs
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Assuming identical behavior causes subtle bugs; FileSystemObject uses shutil.copyfile while GoogleCloudObject
      uses download_to_filename
    stage_ids:
    - archival_publishing
  - id: finance-C-117
    when: When publishing artifacts with MIME types
    action: specify JSON mime type for .json artifact files
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Missing MIME types cause incorrect content serving by CDN, potentially breaking client parsing
    stage_ids:
    - archival_publishing
  - id: finance-C-119
    when: When emitting entities from the crawler to statement storage
    action: populate at least one property on each entity before emitting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Entity with no properties is logged as error and skipped, causing data loss for that sanctioned entity
  - id: finance-C-120
    when: When converting raw HTTP responses into parseable data structures
    action: use only lxml etree for XML parsing, not Python stdlib xml modules
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using stdlib xml or beautifulsoup causes parsing failures and incomplete entity extraction from source data
  - id: finance-C-121
    when: When processing date values during entity construction
    action: normalize each dates to day precision, truncating time component
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Dates with time components cause inconsistent temporal queries and may prevent matching with other data sources
  - id: finance-C-122
    when: When creating entity IDs from source data components
    action: use context.make_id() or context.make_slug() for each entity identifiers
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-deterministic or manually set entity IDs cause duplicate entities and incorrect deduplication across
      runs
  - id: finance-C-123
    when: When emitting statements to the pack file
    action: set first_seen and last_seen timestamps using settings.RUN_TIME_ISO for new statements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect timestamp tracking causes stale entities to be treated as new, corrupting delta computation between
      runs
  - id: finance-C-124
    when: When generating entity hashes for delta computation
    action: include entity.id, schema.name, and sorted properties.values in the hash computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hash computation excluding required fields causes incorrect ADD/MOD/DEL classifications in delta export
  - id: finance-C-126
    when: When exporting entities to downstream formats
    action: apply entity consolidation via view.store.linker before writing final output
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unconsolidated entities lack resolved aliases and relationships, producing incomplete export data
  - id: finance-C-127
    when: When assembling entities from statements in the store
    action: handle InvalidData exceptions during assembly without crashing the export
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: InvalidData exception causes store.assemble() to return None, skipping the entity in export without error
  - id: finance-C-128
    when: When emitting entities during crawling
    action: emit entities with only stub property values or invalid data to avoid contaminating the store
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Stub or invalid entity data causes downstream validation failures and potential false negatives in sanctions
      screening
  - id: finance-C-129
    when: When processing names during entity construction
    action: normalize names using NFC unicode normalization to verify consistent matching
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-normalized names cause duplicate entities for the same person due to encoding differences
  - id: finance-C-130
    when: When publishing exported files to the archive
    action: verify each required artifact files exist before publishing to prevent partial publishes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing artifact files cause incomplete dataset publication with no error indication to consumers
  - id: finance-C-132
    when: When writing statements to the pack file
    action: use UTF-8 encoding via rigour.env.ENCODING for proper international character support
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-UTF-8 encoding causes data loss for non-ASCII names and addresses in sanctions data
  - id: finance-C-133
    when: When backfilling hash data from previous versions
    action: load only the most recent previous version's hashes, not each historical versions
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Loading all historical hash versions causes exponential memory usage and slow delta computation
  - id: finance-C-134
    when: When creating a Store View for exporting
    action: pass external=False to view() when exporting internal datasets to exclude enrichment entities
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Including external entities in export causes unintended enrichment data to appear in base dataset
  - id: finance-C-135
    when: When exporting delta operations to JSON
    action: use write_json utility to verify consistent JSON formatting across exporters
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent JSON formatting causes parse failures in downstream delta processing systems
  - id: finance-C-136
    when: When fetching remote data for crawling
    action: respect HTTP timeout settings to prevent indefinite hanging during data collection
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing timeout causes crawler to hang indefinitely on unresponsive sources, blocking dataset updates
  - id: finance-C-137
    when: When using lookups to transform entity property values
    action: invoke LookupException handler to avoid emitting ambiguous or untransformed data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unhandled LookupException causes crawler to fail silently or emit incorrect property mappings
  - id: finance-C-138
    when: When setting entity first_seen timestamp
    action: check the timestamp index for existing statement timestamps, falling back to RUN_TIME_ISO for new
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ignoring timestamp index causes all entities to appear as new, breaking incremental update semantics
  - id: finance-C-139
    when: When archiving files to the artifact directory
    action: publish ARTIFACT_FILES including statements.pack and entities.hash for complete audit trail
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing artifact files prevent backfilling and version comparison in future runs
  - id: finance-C-140
    when: When validating identifiers during entity construction
    action: validate identifier formats (BIC, ISIN, LEI, IBAN, etc.) using rigour.ids before adding to entity
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Invalid identifiers cause false positive matches in sanctions screening systems
  - id: finance-C-141
    when: When flushing entity statements to storage
    action: flush after every 10000 entities to prevent memory buildup during large crawls
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Memory buildup from not flushing causes OOM errors for datasets with millions of entities
  - id: finance-C-145
    when: When exporting entities through the export pipeline
    action: Call feed_unconsolidated() on each exporters before calling consolidate_entity() for each entity — consolidate_entity
      mutates the entity in place
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Exporters will receive entities with unconsolidated data (names not simplified, dates not normalized) after
      consolidation should have occurred, leading to inconsistent export output across exporter types
  - id: finance-C-146
    when: When completing an export or crawl run
    action: Call context.close() in a finally block to verify cache flush, timestamp index close, statement writer close,
      and issues export
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cached HTTP responses will not be flushed, statement writer may not complete writing, timestamp index will
      not be persisted, and issues.log will not be exported, resulting in data loss and incomplete run artifacts
  - id: finance-C-149
    when: When parsing date values from source data
    action: Use h.apply_date() helper with the dataset's configured date formats — never add raw date strings directly with
      entity.add()
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Dates will not be normalized to ISO prefix format (YYYY, YYYY-MM, YYYY-MM-DD), causing inconsistent date
      formats across entities and breaking date-based queries in downstream consumers
  - id: finance-C-150
    when: When a crawler encounters data it cannot interpret with confidence
    action: Crash with an error (assert, raise ValueError) or emit a warning — never silently emit ambiguous or assumed data
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Ambiguous data emitted silently will propagate incorrect entity properties to all downstream consumers, including
      sanctions screening users making compliance decisions based on false information
  - id: finance-C-151
    when: When changing entity IDs in an existing crawler
    action: Change the entity ID of an existing crawler without explicit team agreement — IDs are stable keys for downstream
      deduplication and enrichment
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Changing entity IDs silently breaks all downstream links to enrichment data, deduplication history, and cross-dataset
      references, causing duplicate entities and lost relationship data
  - id: finance-C-152
    when: When processing HTML or XML data
    action: Use lxml library for HTML/XML parsing — never use BeautifulSoup or Python stdlib xml modules
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using unsupported parsing libraries will cause compatibility issues with the XPath helpers in zavod.helpers.html,
      leading to parsing failures and incomplete data extraction
  - id: finance-C-153
    when: When using MIME type constants for resource exports
    action: Use rigour.mime.types constants (XML, ZIP, CSV, XLSX, PDF) — never use string literals for MIME types
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: String literals for MIME types will cause incorrect content-type headers in exported resources, preventing
      proper file handling by downstream consumers
  - id: finance-C-154
    when: When resolving entity names using LLM-assisted cleaning
    action: Use LLM-based name cleaning only for PEP crawlers — sanctions list names are legal designations that must be human-reviewed
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Automated name normalization of sanctioned entity names without human review may alter the legal designation,
      causing compliance failures when the altered name does not match the official sanctions list
  - id: finance-C-157
    when: When presenting OpenSanctions data or this codebase to users
    action: Claim this system is suitable for non-financial compliance use cases unrelated to sanctions/PEP screening
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will attempt to use OpenSanctions data for compliance purposes beyond sanctions/PEP screening (e.g.,
      AML, fraud detection) where the data model and coverage are insufficient, leading to incomplete compliance coverage
  - id: finance-C-158
    when: When presenting OpenSanctions aggregated data to users
    action: Present the aggregated data as equivalent to the original government source data or as a live government database
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will rely on OpenSanctions as authoritative government data when it is a derived, aggregated, and potentially
      delayed copy, leading to compliance decisions based on outdated or incomplete information
  - id: finance-C-159
    when: When presenting OpenSanctions data for KYC or customer onboarding purposes
    action: Claim OpenSanctions data is sufficient for individual identity verification or customer due diligence
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will use OpenSanctions sanctions/PEP data as the sole source for KYC identity verification when the
      data lacks completeness guarantees, biometric verification, address verification, or transaction monitoring
  - id: finance-C-160
    when: When using the archive backfill mechanism to retrieve historical data
    action: 'Expect fallback order: local path → remote archive artifact → legacy ''latest'' fallback (legacy fallback may
      be deprecated)'
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: If the remote archive backend is unavailable and local path does not exist, backfill will fall back to legacy
      'latest' which may contain stale or incorrect data versions
  - id: finance-C-161
    when: When fetching external HTTP resources via context.fetch_* methods
    action: Use context.fetch_* methods for HTTP requests — never use the requests library directly
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Direct requests usage bypasses the cache layer, retry logic, and session configuration managed by the context,
      leading to duplicate downloads, missing retries, and inconsistent HTTP headers
  - id: finance-C-162
    when: When adding type hints to zavod code
    action: Use built-in container types (list, dict, set, tuple) and union syntax (str | None) — not deprecated typing module
      types (typing.List, typing.Dict, Optional[str])
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using deprecated typing module types will fail mypy --strict checks which the project runs on every change,
      causing CI failures
  - id: finance-C-163
    when: When implementing or refactoring the export pipeline order in zavod/exporters/__init__.py
    action: Verify feed_unconsolidated is called BEFORE consolidation step; exporters that need raw unmerged statements (like
      StatementsCSVExporter) must execute at their designated position in the pipeline
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling consolidation before feeding unconsolidated data permanently loses access to unmerged original statements,
      breaking exporters that require provenance information and causing data loss in the exported output
    derived_from_bd_id: BD-009
  - id: finance-C-166
    when: When implementing crawler logic for registry-based data sources
    action: Extract session tokens by following the full redirect chain before making data requests; the secret parameter
      must be captured from the redirect response, not hardcoded
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hardcoding the token makes the crawler brittle to token expiration; skipping redirect following means the
      session token is never captured, causing all subsequent API requests to fail with authentication errors
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-167
    when: When implementing delta computation backfill logic for large datasets
    action: Verify that LevelDB is used for storing previous version hashes during backfill, ensuring indexed lookups instead
      of full file scans; if using alternative storage, verify O(1) lookup performance for entity hash retrieval
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Loading hashes without indexed storage causes repeated file I/O for each entity lookup, resulting in O(n*m)
      complexity that becomes prohibitively slow for large datasets with millions of entities
    derived_from_bd_id: BD-014
  - id: finance-C-168
    when: When implementing entity hash comparison for delta computation
    action: Verify both previous and current entity hashes are sorted by entity ID before pairing; the sorted iterator enables
      single-pass O(n) comparison vs hash map lookup which requires O(n*m) with full memory storage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unsorted iteration causes incorrect entity pairing in the diff algorithm, leading to false positives or missed
      changes; hash map approach requires holding entire previous dataset in memory, causing out-of-memory failures for large
      datasets
    derived_from_bd_id: BD-015
  - id: finance-C-169
    when: When implementing or refactoring abbreviation detection for non-Person entity names
    action: 'Treat entity names as abbreviations only when they are: (1) single uppercase tokens AND (2) length below the
      configured threshold (default typically 5-6 characters); verify the threshold matches domain conventions for the target
      dataset'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Entities with legitimate abbreviations exceeding the length threshold (e.g., NATO, UNESCO, IRS) get misclassified
      as regular capitalized words, causing entity resolution failures and missed sanctions screening for thousands of organizations
      worldwide
    derived_from_bd_id: BD-031
  - id: finance-C-171
    when: When implementing name cleaning and normalization using LLM-based approaches
    action: Verify that LLM API is available and responsive before processing batches; implement fallback to rule-based normalization
      when LLM service is degraded or unavailable; verify original_value is always tracked for audit trail regardless of cleaning
      method used
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without fallback handling, name cleaning pipeline fails silently or times out when LLM API becomes unavailable,
      causing processing backlogs and incomplete entity datasets that miss critical screening matches
    derived_from_bd_id: BD-029
  - id: finance-C-172
    when: When configuring CSV import pipeline for data from French government sources or legacy Windows systems
    action: Explicitly specify cp1252 (Windows-1252) encoding when parsing CSV files; do not rely on UTF-8 as default or auto-detection
      for French Senate, European government, or legacy Windows-exported data
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using UTF-8 encoding on cp1252-encoded files corrupts French characters (é, è, ç, à, û) into garbage sequences,
      causing complete loss of name accuracy for affected entities and making French person/organization records unreadable
      in downstream systems
    derived_from_bd_id: BD-061
  - id: finance-C-173
    when: When implementing FollowTheMoney schema enforcement for entity construction
    action: Do not suppress or filter out warnings for unknown entity properties; investigate each warning to determine whether
      it indicates schema drift requiring schema extension or a data quality issue needing upstream correction
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Suppressing unknown property warnings causes schema drift to go unnoticed; custom properties get silently
      dropped, leading to incomplete entity records that fail to match in downstream analysis and investigation tools
    derived_from_bd_id: BD-054
  - id: finance-C-174
    when: When implementing entity schema migration or type upgrade logic
    action: Use common_schema() for each entity type transitions; explicitly define and test upgrade paths for every schema
      version pair that may appear in production data; verify LegalEntity->Company and other hierarchical transitions preserve
      semantic compatibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping common_schema() for type upgrades causes type coercion errors or silent semantic changes; entities
      may lose parent-child relationships or classification properties, breaking queries and downstream compatibility with
      tools expecting type hierarchies
    derived_from_bd_id: BD-056
  - id: finance-C-175
    when: When implementing archive republishing logic for incremental dataset updates
    action: Verify source and destination buckets are in the same cloud region before using server-side GCS copy; for cross-region
      publishing scenarios, implement explicit handling for copy latency or fall back to re-upload with checksum verification
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Cross-region GCS copy operations take minutes to hours instead of seconds, causing publishing timeouts or
      indefinite hangs; republished archives may appear complete but contain stale data due to copy failures being silently
      retried
    derived_from_bd_id: BD-017
  - id: finance-C-177
    when: When implementing sanction status evaluation logic
    action: Compare end_date against run_time (not current time) to determine active/inactive status; active if end_date >=
      run_time, inactive if end_date < run_time
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using current_time instead of run_time breaks reproducibility; a sanction appearing expired in current time
      may still be active in historical backtests, causing incorrect filtering and compliance violations
    derived_from_bd_id: BD-040
  - id: finance-C-178
    when: When calibrating dataset assertion thresholds for entity counts and country distributions
    action: Verify assertion thresholds against known-good dataset baselines; calibrate min/max values to accommodate legitimate
      distribution variations before enabling assertions in production
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Uncalibrated assertion thresholds generate false alarms for legitimate data variations, causing valid datasets
      to be rejected and pipeline failures that require manual override and delay data delivery
    derived_from_bd_id: BD-036
  - id: finance-C-179
    when: When configuring PEP entity deduplication matching
    action: Use NameQualifiedMatcher with 0.6 similarity threshold for PEP entities; this higher sensitivity captures politically
      exposed persons with name variations, translations, or incomplete records
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a lower threshold for PEP dedup increases false-positive merges that consolidate distinct individuals;
      using a higher threshold misses legitimate name variations, both causing incorrect entity consolidation
    derived_from_bd_id: BD-038
  - id: finance-C-180
    when: When processing EGRUL data for dates on or after 2025-01-01
    action: Switch from legacy EGRUL format to new format on 2025-01-01; maintain overlapping processing during transition
      window to prevent gaps or duplicates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using the wrong format after 2025-01-01 causes parsing failures, missing entities, or data corruption; format
      mismatch creates gaps in coverage or duplicate records during the migration window
    derived_from_bd_id: BD-045
  - id: finance-C-182
    when: When implementing GB PSC data parsing
    action: Parse GB PSC base data and PSC statements as separate data sources with different schemas, then combine in the
      crawl using company number matching
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Interleaving or merging the parse logic loses the distinct schema structure of each source; if either download
      changes format or has different publication cadence, combined parsing breaks and creates data gaps
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-183
    when: When configuring name cleaning for datasets without explicit overrides
    action: Verify CleaningSpec defaults (min_length=2, require_space=True) match the dataset's target audience; cultural
      names or single-letter initials may violate these defaults and need explicit per-dataset configuration
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Names rejected by default cleaning thresholds cause legitimate entities to be filtered out, silently reducing
      dataset coverage especially for non-Western naming conventions or organizations with initials
    derived_from_bd_id: BD-084
  - id: finance-C-184
    when: When implementing occupancy ID generation in position tracking
    action: Include start_date and end_date strings in occupancy IDs to differentiate occupancies when the same person holds
      the same position multiple times with different tenures
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without date strings, consecutive occupancies of identical positions generate duplicate IDs, causing later
      occupancies to overwrite earlier ones in state tracking and creating gaps in historical position records
    derived_from_bd_id: BD-085
  - id: finance-C-185
    when: When implementing entity creation helpers (make_sanction, make_position, make_address)
    action: Have extractor functions return entities for caller to emit; extractors must remain stateless and reusable, callers
      must manage emission context and timing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Making extractors emit entities directly breaks the separation of concerns, causing entities to be emitted
      in wrong context with incorrect timestamps or partial buffered data, corrupting downstream processing
    derived_from_bd_id: BD-086
  - id: finance-C-190
    when: When implementing or refactoring validation logic in zavod
    action: 'Maintain the sequential execution order in the validator pipeline: dangling references validator → self-reference
      validator → empty dataset check; do not parallelize or reorder validators'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reordering validators breaks critical dependencies; dangling references must be caught before self-reference
      checks can execute correctly, and empty dataset validation requires prior validators to have completed
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-191
    when: When configuring assertion validators for dataset publication
    action: 'Correctly mark assertions as fatal or non-fatal based on their impact: fatal assertions (e.g., zero entities)
      must block publication; non-fatal assertions warn but allow proceeding; do not misclassify assertion metadata'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misclassifying a fatal assertion as non-fatal allows publication of invalid datasets; classifying a non-fatal
      assertion as fatal causes unnecessary publication failures and blocks valid datasets from publishing
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-192
    when: When processing internal data via fetch_internal_data
    action: Keep internal data in its dedicated bucket/key namespace separate from published source data; do not merge internal
      sources into public namespaces or combine access controls
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Merging internal data into public namespaces violates access controls and causes accidental inclusion of
      non-public data in exports, creating regulatory compliance violations and data leakage risks
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-193
    when: When implementing entity enrichment logic with LocalEnricher
    action: Use recursive expansion via non-edge traversal to capture the full network of related entities; implement a depth
      limit parameter to prevent unbounded recursion on circular references
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single-level matching misses connected persons and companies in the entity network; backtest results will
      underrepresent true entity relationships and produce incomplete coverage analysis
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-194
    when: When implementing network analysis capabilities in entity relationship mapping
    action: Assume the framework provides configurable network analysis depth or graph traversal depth limits; network analysis
      depth configuration is not available
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Missing network analysis depth configuration prevents proper analysis of entity networks with varying connectivity
      levels, leading to incomplete or inaccurate relationship mapping
    derived_from_bd_id: BD-GAP-026
  - id: finance-C-195
    when: When implementing entity relationship mapping or network analysis
    action: Implement configurable network analysis depth parameter (max_depth) with reasonable default value of 3, and allow
      depth configuration per analysis scenario to handle different entity connectivity patterns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without configurable depth, analysis either misses deep entity connections or exhausts computational resources
      on unbounded graph traversals
    derived_from_bd_id: BD-GAP-026
  - id: finance-C-196
    when: When managing audit logs for regulatory compliance
    action: Assume Review records can be updated in-place via SQL update statements; in-place updates destroy the audit trail
      integrity and violate immutability requirements
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Audit logs with mutable records cannot satisfy regulatory requirements for immutable audit trails; reviewer
      changes can overwrite historical states, destroying evidence needed for compliance audits
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-197
    when: When implementing Review record modifications
    action: Use soft delete pattern (create new inactive record) instead of update statements; implement append-only audit
      log with ReviewChange table tracking each modifications with timestamps and user IDs
    severity: high
    kind: domain_rule
    modality: must
    consequence: In-place updates destroy the historical audit trail, making it impossible to prove data integrity for regulatory
      audits or investigate data discrepancies
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-198
    when: When implementing sanction list data management and ingestion
    action: Assume the framework provides documented SLA for sanction list freshness or automatic update verification; SLA
      documentation for list updates is not available
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Missing SLA documentation for sanction list updates creates regulatory exposure; OFAC violations occur when
      outdated lists are used for screening due to unknown freshness thresholds
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-199
    when: When implementing sanction list data ingestion and validation
    action: Implement max_age_days validation with documented threshold (default 365*5=1825 days for enforcements) and add
      freshness check that fails if last_update_timestamp exceeds configured threshold; document SLA in configuration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using stale sanction lists without validation causes OFAC violations; entities may appear clean when they're
      actually sanctioned, creating significant legal and financial exposure
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-200
    when: When implementing data cleaning, validation, or sanitization operations in the codebase
    action: Use the centralized runtime/cleaning.value_clean function for each data paths involving lookup normalization,
      format compliance, XSS prevention, or provenance tracking instead of inline validation scattered across code
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inline validation scattered across code paths creates inconsistent sanitization rules, potentially allowing
      XSS payloads or malformed data to bypass checks that value_clean would catch
    derived_from_bd_id: BD-087
  - id: finance-C-201
    when: When implementing or modifying entity hash computation logic in HashDelta
    action: Verify hash computation uses sorted (prop, values) pairs in canonical order to guarantee deterministic hash output
      for the same entity across each runs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-deterministic property ordering causes the same entity to produce different hashes on different runs,
      leading to false positive delta detection (same entity flagged as changed) or false negative delta detection (changed
      entity not detected)
    derived_from_bd_id: BD-077
  - id: finance-C-202
    when: When implementing or modifying the entity deduplication logic_decide chain
    action: 'Call dedup decision functions in the exact specified order: vessel > identifiers > unique > pkpro > securities
      — this ordering ensures entity-type-specific matching runs first with fallback to general methods'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reordering the dedup chain changes matching precedence, causing ships to be matched by general identifiers
      before vessel-specific rules apply, resulting in incorrect merge decisions and entity data corruption
    derived_from_bd_id: BD-075
  - id: finance-C-204
    when: When implementing crawler context, HTTP session, or cache handling logic
    action: Verify HTTP session and cache are owned by the crawler Context object with isolated instances per thread — do
      not create shared session services or cross-thread cache access
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sharing HTTP sessions or caches across threads causes race conditions, authentication token corruption, and
      cache incoherence, leading to crawlers receiving wrong session data or authentication failures
    derived_from_bd_id: BD-001
  - id: finance-C-205
    when: When modifying entity schema definitions in zavod crawlers
    action: Alter the property names or structure that are used as hash inputs for entity ID generation — any schema change
      must preserve the content parts used in make_id() to maintain hash-based ID stability
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Schema modifications that change hash inputs will cause the same entity to generate different IDs, breaking
      delta detection and dataset merging functionality — delta comparison will incorrectly report entities as added/removed
      when they are only modified
    derived_from_bd_id: BD-020
  - id: finance-C-206
    when: When implementing or modifying entity hash computation in zavod
    action: Include entity ID, schema, and sorted properties in the hash computation — properties must be sorted alphabetically
      to verify consistent hashing regardless of property insertion order
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hashing without sorted properties produces non-deterministic results depending on property insertion order,
      breaking content-based diff functionality — the same entity could generate different hashes on different runs
    derived_from_bd_id: BD-020
  - id: finance-C-207
    when: When implementing hash computation for entity content comparison in delta.py
    action: Include entity ID, schema, and alphabetically sorted properties in the hash — verify property sorting is deterministic
      to enable reliable content-based diff across regeneration cycles
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hash computation without sorted properties produces different results depending on property insertion order,
      breaking content-based delta detection — entities with identical content but different property orders would generate
      different hashes
    derived_from_bd_id: BD-013
  - id: finance-C-208
    when: When initializing zavod context for dataset processing
    action: Default context.lang to dataset.data.lang to encode dataset-specific language assumptions — verify language consistency
      if mixing entities from different language sources
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default language mismatch causes incorrect text normalization, transliteration decisions, and display formatting
      — entities processed with wrong language assumptions accumulate silent errors that are difficult to detect post-processing
    derived_from_bd_id: BD-070
  - id: finance-C-209
    when: When implementing delta computation logic that uses entity hash for change detection
    action: Entity hash computation for delta detection MUST include id, schema name, and sorted property values while EXCLUDING
      first_seen and last_seen timestamps
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including timestamps in delta hash causes spurious MOD operations on every run as timestamps update, masking
      actual entity changes and creating compliance reporting gaps where real modifications go undetected
    derived_from_bd_id: BD-024
  - id: finance-C-210
    when: When running incremental backtesting with statement processing
    action: Verify that TimestampIndex (entity+statement first_seen tracking) persists across backtest runs and is not rebuilt
      on each execution — check that incremental mode is enabled and timestamps are loaded from storage
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without TimestampIndex persistence, incremental processing degrades to full reprocessing on each run, exponentially
      increasing computation time and potentially causing duplicate downstream operations
    derived_from_bd_id: BD-007
  - id: finance-C-211
    when: When validating Person entity names using NamesSpec default schema rules
    action: NamesSpec schema rules MUST enforce requires_space=True for Person entities and reject_chars_baseline=';\\/()[]<>{}:'
      — single-token names after honorific stripping must be categorized as weakAlias
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Disabling requires_space allows single-token fragments as valid Person names, corrupting entity data quality
      and causing false positive entity matches in sanctions screening downstream
    derived_from_bd_id: BD-074
  - id: finance-C-212
    when: When setting context language for French or other non-UTF-8 encoded datasets
    action: Verify that context.lang matches the actual dataset encoding (e.g., cp1252 for French data), and verify encoding
      is explicitly set rather than relying on UTF-8 defaults; validate that LLM name cleaning receives correctly decoded
      text
    severity: high
    kind: operational_lesson
    modality: must
    consequence: When context.lang assumes UTF-8 for cp1252-encoded French data, accented characters (é, è, ç) become garbled
      during LLM name cleaning, producing incorrect name normalizations that break entity matching for French entities in
      compliance workflows
    derived_from_bd_id: BD-096
  - id: finance-C-213
    when: When implementing entity addition methods that handle pre-cleaned data
    action: Bypass the cleaning/sanitization pipeline without explicit opt-in parameter; unsafe_add() must only skip cleaning
      when caller explicitly takes responsibility via a documented parameter
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Silently bypassing sanitization introduces malformed or malicious data into the entity store, causing downstream
      compliance screening to receive unclean entities and produce false negatives in regulatory matching
    derived_from_bd_id: BD-005
  - id: finance-C-214
    when: When implementing statement storage or querying in the backtesting framework
    action: Use LevelDB's key-value sequential write pattern for statement storage; do not introduce relational queries (JOIN,
      complex WHERE) against the statement store at runtime
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Adding relational queries to LevelDB breaks the append-only write architecture, introducing transaction overhead
      and connection pooling latency that defeats the purpose of fast batch ingestion for high-volume crawling workloads
    derived_from_bd_id: BD-006
  - id: finance-C-215
    when: When configuring batch write parameters for timestamp indexing in large-scale ingestion
    action: Verify the 500,000 statement batch threshold matches available memory; monitor memory consumption and adjust batch
      size for datasets exceeding 10 million statements
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The default 500,000 statement batch may cause excessive memory consumption or OOM failures for very large
      datasets, and may cause write amplification issues if batch size is too small for the workload
    derived_from_bd_id: BD-023
  - id: finance-C-216
    when: When implementing entity target flag assignment logic based on topic classification
    action: Set entity target flag by intersecting entity topics with the official RISKS topic categories (crime, sanctions,
      corruption, etc.); validate topic classification accuracy via periodic sampling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect target flag assignment causes high-risk entities to be filtered out of compliance screening, resulting
      in missed sanctions matches and regulatory violations in downstream AML/KYC workflows
    derived_from_bd_id: BD-042
  - id: finance-C-217
    when: When implementing edge deduplication logic using extra_props for key generation
    action: Sort extra_props tuples into canonical order (e.g., alphabetically by key) before generating deduplication keys
      — verify the same set of properties in any order produces identical keys
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without canonical ordering, the same edge with identical properties in different orders generates different
      keys, causing the relationship graph to fragment with duplicate entries representing the same entity
    derived_from_bd_id: BD-076
  - id: finance-C-218
    when: When implementing post-tenure association period logic in PEP classification
    action: Return NO_EXPIRATION for gov.head roles, EXTENDED_AFTER_OFFICE (20yr) for gov.national/igo/diplo roles, and DEFAULT_AFTER_OFFICE
      (5yr) for each other positions — preserve the graduated approach based on PEP risk classification
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Changing post-tenure expiration periods causes premature data removal for high-risk PEPs or excessive retention
      for low-risk positions, compromising screening accuracy and compliance with data retention requirements
    derived_from_bd_id: BD-079
  - id: finance-C-219
    when: When modifying consolidation demotion logic for name data
    action: Check that NEVER_REMOVE_NAMES_DATASETS includes OFAC, FCDO, and other high-authority sanction list datasets —
      verify names from these sources are never demoted regardless of consolidation score
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without NEVER_REMOVE_NAMES_DATASETS protection, high-authority name variations get demoted during consolidation,
      weakening screening accuracy and potentially missing sanctioned entities in compliance checks
    derived_from_bd_id: BD-081
  - id: finance-C-220
    when: When configuring archive retrieval settings in backtesting or production pipelines
    action: 'Use tiered TTL values matching source update frequency: 10 minutes for volatile sources, 24 hours for standard
      sources, 7 days for stable sources — do not replace with uniform TTL values without analyzing source update patterns'
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using uniform TTL values instead of tiered approach causes volatile sources to return stale data or stable
      sources to incur unnecessary retrieval overhead, reducing backtest accuracy and increasing infrastructure costs
    derived_from_bd_id: BD-027
  - id: finance-C-221
    when: When implementing or modifying entity export workflows in the consolidation pipeline
    action: Verify feed_unconsolidated is called and completes before consolidate_entity mutates any entity; the ordering
      contract MUST be preserved — violating this order causes consolidated entities to lose their unconsolidated properties
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling consolidate_entity before feed_unconsolidated causes entities to lose their unconsolidated property
      sets; downstream consumers receive incomplete entity data with corrupted property states
    derived_from_bd_id: BD-069
  - id: finance-C-222
    when: When ingesting bulk entities with LevelDB store sync using batch writes of 50,000 statements
    action: Monitor entity size against the 50,000 statement batch capacity threshold; entities that generate more than 50,000
      statements during consolidation may exceed batch capacity and cause unbounded memory growth
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Very large single entities that exceed the batch capacity can cause unbounded memory growth during LevelDB
      sync, leading to out-of-memory failures that crash the ingestion process mid-batch
    derived_from_bd_id: BD-049
  - id: finance-C-223
    when: When validating and cleaning address fields in entity data during the cleaning pipeline
    action: Flag addresses shorter than 3 characters as suspicious during validation, and maintain an exception list for legitimate
      short abbreviations like 'St', 'Rd', 'Ave' used in standard address formats
    severity: high
    kind: domain_rule
    modality: must
    consequence: Addresses below the 3-character threshold may represent truncation errors or incomplete data that lead to
      incorrect geo-targeting and sanctions jurisdiction assessment in compliance screening
    derived_from_bd_id: BD-050
  - id: finance-C-225
    when: When calculating PEP after-office periods using PositionCategorisation LRU cache with volatile DB state
    action: Implement cache invalidation when is_pep flag or topics change in the database; verify that positions promoted
      to national or IGO level (triggering 20yr period) are not cached with stale regular position classification (5yr default)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stale LRU cache entries cause after-office calculation to use outdated position type data, under-classifying
      PEP exposure duration and potentially allowing entities to exit screening prematurely before the correct 20yr national/IGO
      period expires
    derived_from_bd_id: BD-091
  - id: finance-C-226
    when: When crawlers use unsafe_add() with cleaned=False parameter to insert pre-cleaned data
    action: Avoid calling unsafe_add() with cleaned=False parameter as it bypasses value_clean central validation including
      XSS sanitization, format validation, and origin tracking; only use unsafe_add when caller integrity can be fully verified
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Bypassing the central validation layer via unsafe_add allows potentially malicious payloads from compromised
      or misconfigured crawlers to reach exports unchanged, creating an unmonitored security blind spot in the data pipeline
    derived_from_bd_id: BD-093
  - id: finance-C-227
    when: When implementing large-scale iterative merge operations on Spark DataFrames
    action: Coalesce DataFrames to a fixed partition count (e.g., 16) after each iterative merge to prevent exponential partition
      growth; verify partition count matches cluster resources for the dataset size
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without coalescing, iterative merges cause exponential partition growth that degrades performance and triggers
      out-of-memory errors on large datasets during EGRUL processing
    derived_from_bd_id: BD-052
  - id: finance-C-228
    when: When calculating after-office influence periods for political positions
    action: 'Explicitly configure DEFAULT_AFTER_OFFICE multiplier based on target jurisdiction; verify the multiplier matches
      political cycle duration (typical range: 30 days for short-cycle countries like Italy to 1 year for long-cycle bodies
      like US Senate); set to 0 only for jurisdictions where informal influence does not apply'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default after-office multiplier causes entities to be incorrectly included or excluded from sanctions
      screening; political influence tracking misses ongoing leverage or generates false positives depending on jurisdiction
    derived_from_bd_id: BD-065
  - id: finance-C-229
    when: When implementing data export pipelines using the Context API
    action: Call Context.begin() before emitting any entities and call context.close() after each emissions to verify proper
      initialization and guaranteed flush; never skip or reorder these lifecycle calls
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping context.begin() causes entities to be emitted without proper metadata, breaking downstream processing;
      skipping context.close() loses buffered entities that were never flushed to storage, causing silent data loss
    derived_from_bd_id: BD-082
  - id: finance-C-231
    when: When implementing data export pipelines that consolidate entities before feeding to downstream consumers
    action: Verify feed_unconsolidated is called BEFORE consolidate_entity in each processing paths; consolidate_entity mutates
      entity state in-place, so feeding unconsolidated data after consolidation applies protections to the wrong entity state
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling feed_unconsolidated after consolidation causes authoritative names to be lost before downstream consumers
      access them; NEVER_REMOVE_NAMES protection is applied to the wrong entity state, resulting in silent false negatives
      in sanctions screening
    derived_from_bd_id: BD-095
  - id: finance-C-232
    when: When refactoring PositionCategorisation caching logic or modifying database state dependencies
    action: Implement cache invalidation when is_pep flag or topic assignments change in the database, or use database-dependent
      cache keys that include entity version timestamps
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without cache invalidation, stale cached categorizations persist after database changes, causing entities
      to be incorrectly excluded from or included in screening workflows
    derived_from_bd_id: BD-073
  - id: finance-C-234
    when: When modifying context, session management, or threading architecture in crawler implementations
    action: Maintain per-thread HTTP session isolation where each crawler thread owns its own session through context, preventing
      authentication-state-dependent responses from being cached and served to wrong sessions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Violating session isolation causes cache poisoning where authentication-dependent response content is cached
      and served to different sessions, leading to data corruption in multi-threaded crawling scenarios
    derived_from_bd_id: BD-097
  - id: finance-C-235
    when: When implementing crawler initialization or queue management logic
    action: Seed cities independently before crawling companies within each city — the registry API requires a city parameter
      to filter results and the work queue depends on city-level enumeration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping city-first seeding causes the crawler to fail filtering by city or miss companies; hierarchical
      region structures (cantons) may cause incomplete data if cities are not enumerated independently first
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-236
    when: When implementing error handling in crawler exception handlers
    action: Silently skip disqualified officer records with recoverable errors (timeout, 503) — use AbortCrawl to halt the
      entire crawl when errors occur to prevent propagating bad data quality records
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Skipping bad records and continuing allows potentially corrupted disqualified officer data to propagate through
      the pipeline, compromising data quality for sensitive records that require strict validation
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-238
    when: When implementing Wikidata position holder resolution logic
    action: Resolve Wikidata position holders via inverted P39 lookup (position held) first — P39 is more commonly populated
      on person items; check for missing results when neither P39 nor P1308 is populated
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using only P1308 (officeholder) direction misses entities where only P39 is populated, resulting in incomplete
      position holder enrichment when neither property direction is fully populated
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-239
    when: When implementing FIRDS data import or dump processing logic
    action: Use 'latest_full_set' strategy to return items from the most recent date in the dump list only — do not process
      cumulative files blindly; validate that the latest dump is complete before using it
    severity: high
    kind: domain_rule
    modality: must
    consequence: Processing cumulative files without deduplication or using an incomplete latest dump causes duplicate records
      or missing data, corrupting the final FIRDS dataset used for financial instrument reference
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-242
    when: When adding a date value to any entity
    action: Pass raw date strings directly to entity.add() — always use h.apply_date()
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Raw date strings bypass normalization, causing inconsistent date formats across entities and broken date-range
      queries in downstream KYC systems.
  - id: finance-C-243
    when: When building an entity slug identifier
    action: Put PII (names, dates of birth, passport numbers) into make_slug() — use make_id() instead
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: PII embedded in entity IDs gets logged, indexed, and exposed in APIs, violating data minimization principles
      and creating GDPR exposure.
  - id: finance-C-244
    when: When writing a sanctions-list crawler
    action: Use LLM-based name cleaning — sanctioned names are legal designations requiring human-reviewed normalization
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: LLM-normalized sanction names lack audit trails and may alter legal designations, creating compliance risk
      and breaking the chain of accountability.
  - id: finance-C-246
    when: When parsing HTML or XML in any crawler
    action: Use BeautifulSoup or Python stdlib xml modules — use lxml exclusively
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: BeautifulSoup and stdlib xml parsers produce inconsistent DOM trees and lack XPath support, causing silent
      field extraction failures and broken crawlers.
  - id: finance-C-247
    when: When needing to make HTTP requests in a crawler
    action: Use the requests library directly — use context.fetch_* methods instead
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Direct requests bypass caching and proxy configuration, causing repeated downloads, rate-limit violations,
      and inconsistent data across crawl runs.
  - id: finance-C-248
    when: When using MIME type constants
    action: Import MIME types from rigour.mime.types constants instead of using string literals
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: String literals for MIME types cause silent type misdetection, leading to failed exports or incorrect parsing
      downstream.
  - id: finance-C-249
    when: When writing type hints for zavod code
    action: Use built-in container types (list, dict, set, tuple) and union syntax (X | None) instead of deprecated typing
      module classes
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Deprecated typing module imports cause mypy errors and indicate outdated code that may have other compatibility
      issues.
  - id: finance-C-250
    when: When running mypy after changes to zavod code
    action: Run mypy --strict on the zavod/ directory (excluding tests) to verify full type coverage
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Untyped zavod code causes silent type mismatches at runtime, leading to corrupted entity data or failed crawls
      in production.
  - id: finance-C-251
    when: When writing tests for zavod
    action: Write each zavod tests in the zavod/zavod/tests directory
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Tests in wrong directories are not run by CI, causing untested code to be deployed and breaking production
      crawlers.
  - id: finance-C-252
    when: When writing code that processes crawler input data
    action: Write specific conditional checks (if var is None) instead of relying on truthiness (if var)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Implicit truthiness checks silently swallow empty strings and zero values, causing incorrect entity properties
      and silent data loss.
  - id: finance-C-253
    when: When completing record processing in a crawler
    action: Consume each source fields with dict.pop() and call context.audit_data() to catch unhandled fields
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unconsumed fields indicate the crawler is not processing new source data fields, silently dropping information
      and breaking when sources are updated.
  - id: finance-C-254
    when: When validating entity counts after crawler changes
    action: Run zavod validate separately (not during crawl) to check entity counts against YAML assertion bounds
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Skipping validation allows entity count regressions to go undetected, breaking downstream consumers that
      depend on expected data volumes.
  - id: finance-C-255
    when: When changing existing entity ID generation logic
    action: Change entity IDs of existing crawlers without explicit team agreement — IDs are the stable key for downstream
      deduplication
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Changed entity IDs silently break all downstream enrichment, deduplication, and cross-reference links, causing
      data duplication and lost entity history.
  - id: finance-C-256
    when: When emitting a Person entity from a PEP crawler
    action: Emit the person AFTER calling make_occupancy — occupancy adds role.pep to person.topics
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Emitting a Person before occupancy processing causes role.pep to be missing from topics, making the person
      invisible to downstream PEP filtering.
  - id: finance-C-257
    when: When building a PEP crawler occupancy
    action: Set each person properties (including birthDate and deathDate) BEFORE calling make_occupancy
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: make_occupancy reads person properties internally to determine PEP qualification — missing properties cause
      incorrect occupancy filtering and dropped PEPs.
  - id: finance-C-258
    when: When accessing lookup values for type-* properties
    action: Call context.lookup_value() for type.* lookups — entity.add() applies type.* lookups automatically
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Explicitly looking up type.* values before entity.add() causes double-rewriting and corrupted property values.
  - id: finance-C-259
    when: When adding fields to a Person name entity
    action: Use h.apply_name() for Person entities with name parts (first, last, patronymic)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct entity.add() for name parts skips fingerprinting and firstName/lastName population, breaking name
      deduplication downstream.
  - id: finance-C-260
    when: When needing to normalize messy PEP name data
    action: Use h.clean_names() (LLM-assisted) or h.review_names() for PEP crawlers only — not sanctions
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: LLM name cleaning applied to sanctions lists creates unauditable changes to legal designations.
  - id: finance-C-261
    when: When creating a Position entity in a PEP crawler
    action: Provide wikidata_id when creating positions to enable cross-dataset position matching
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Positions without wikidata_id cannot be matched across datasets, preventing unified PEP coverage and causing
      duplicate position records.
  - id: finance-C-262
    when: When implementing lookups for country values
    action: Start crawlers without lookups, run them, add lookup entries for each unmatched value surfaced by warnings
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Premature lookup entries add complexity and technical debt; only entries for values actually encountered
      in production should be added.
  - id: finance-C-263
    when: When the project asks to install new packages
    action: Try to install new packages or on-board new services without explicit promotion
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Unauthorized package installations can conflict with existing dependencies, break the venv, and cause production
      crawls to fail.
    stage_ids:
    - all
  - id: finance-C-264
    when: When the problem looks simple and quick to fix
    action: Skip root cause investigation based on apparent simplicity — distrust each input and validate assumptions
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Quick fixes for apparently simple problems without root cause investigation cause subtle data corruption
      that is harder to detect and fix later.
    stage_ids:
    - all
  - id: finance-C-265
    when: When running zavod code in an unfamiliar environment
    action: Assume the venv has zavod configured — do not install dependencies manually
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Manual dependency installation can create version conflicts with the project's pinned dependencies, causing
      cryptic runtime errors.
    stage_ids:
    - all
  - id: finance-C-266
    when: When the project provides a cached resource during development
    action: Assume cached data is still valid — always verify the cache is specified for the current development task
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Using stale cached source data during crawler development causes wrong entity outputs to be emitted, which
      may be committed if not caught.
  - id: finance-C-268
    when: When writing crawler code that calls entity.add() with a value that might be None or empty
    action: 'guard entity.add() calls with if value: checks, claiming it is defensive coding'
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Unguarded `entity.add()` calls skip silently by design for None and empty strings, but wrapping with if-value
      guards hides the actual data gap from audit_data(). Unhandled fields go undetected, so when the source schema changes
      and new fields appear, they are silently ignored rather than surfaced as warnings.
  - id: finance-C-271
    when: When selecting HTML/XML parsing libraries or HTTP fetch methods in a new crawler
    action: import or use BeautifulSoup, stdlib xml modules, or the requests library directly
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Using BeautifulSoup or stdlib xml.etree instead of lxml bypasses the project's standardised parsing pipeline
      and type helpers, introducing inconsistent handling and silent failures. Using requests directly instead of context.fetch_*
      bypasses caching, authentication, and standardised error handling, causing redundant downloads and inconsistent data
      retrieval.
  - id: finance-C-272
    when: When the issues-agent finishes reviewing warnings and finds no fixable lookup entries to add
    action: open an empty or no-op pull request claiming to address warnings when no YAML changes are needed
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Opening a no-op PR wastes reviewer time, pollutes the repository history with empty branches, and generates
      unnecessary CI/pipeline noise. The policy explicitly states 'DO NOT open a PR if no changes are needed.'
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
