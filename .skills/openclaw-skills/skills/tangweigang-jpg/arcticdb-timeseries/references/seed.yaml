        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install pandas
    - python3 -m pip install numpy
    - python3 -m pip install attrs
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-005
    when: When providing an S3 URI
    action: include force_uri_lib_config=false in the query parameters
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Security vulnerability from deprecated force_uri_lib_config=false allows configuration bypass, exposing system
      to unauthorized access
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-036
    when: When writing DataFrames with MultiIndex columns to ArcticDB
    action: use MultiIndex columns since they are not yet implemented
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: DataFrames with MultiIndex columns will raise ArcticDbNotYetImplemented exception, causing write failure
      and data loss if not handled
    stage_ids:
    - data_normalization
  - id: finance-C-037
    when: When normalizing PyArrow-backed pandas DataFrames or Series
    action: write PyArrow-backed pandas DataFrames directly since they are not supported
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: PyArrow-backed pandas DataFrames will raise ArcticDbNotYetImplemented exception during normalization, preventing
      the write operation and causing data loss
    stage_ids:
    - data_normalization
  - id: finance-C-038
    when: When normalizing DataFrame columns with timedelta64 dtype
    action: store timedelta columns since they are not supported in normalization
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Timedelta columns will raise ArcticDbNotYetImplemented exception, causing write failure for any DataFrame
      containing timedelta data
    stage_ids:
    - data_normalization
  - id: finance-C-041
    when: When running ArcticDB on Windows platform
    action: enable dynamic_strings=True for each write operations since Windows does not support numpy string arrays
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Windows has incompatible wchar size for numpy string arrays; attempting writes without dynamic_strings=True
      will raise ValueError and fail
    stage_ids:
    - data_normalization
  - id: finance-C-053
    when: When denormalizing DataFrames with multi_columns metadata
    action: attempt to denormalize multi_columns data since it is not implemented
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Attempting to read data with multi_columns normalization metadata will raise ArcticDbNotYetImplemented exception,
      making the data permanently unreadable
    stage_ids:
    - data_normalization
  - id: finance-C-064
    when: When writing and reading recursive normalizer data
    action: change the compact_v1() algorithm after data has been written
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: compact_v1 is used at both write time (to generate stream IDs) and read time (to look up stream IDs). Changing
      it breaks backward compatibility permanently
    stage_ids:
    - recursive_normalization
  - id: finance-C-088
    when: When implementing read with both date_range and row_range parameters
    action: specify both date_range and row_range simultaneously
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: ArcticNativeException is raised with message 'Date range and row range both specified', causing read operation
      to fail
    stage_ids:
    - read_operations
  - id: finance-C-124
    when: When implementing version deletion operations
    action: check snapshot protection before physical deletion to prevent removing snapshot-protected versions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Deleting snapshot-protected versions causes data loss and breaks point-in-time recovery capabilities that
      snapshots provide, violating data consistency guarantees
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-125
    when: When implementing prune_previous_versions
    action: skip versions that are referenced by any existing snapshot during pruning
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Pruning snapshot-protected versions breaks historical data access through snapshots, causing read failures
      when users attempt to read from snapshot references
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-138
    when: When implementing storage write operations
    action: Write atom keys (TABLE_DATA, TABLE_INDEX, VERSION) before updating reference keys (VERSION_REF)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: If reference keys are updated before atom keys complete, readers may access incomplete or missing data, causing
      data loss or corruption in multi-writer scenarios
    stage_ids:
    - storage_backend
  - id: finance-C-139
    when: When implementing storage write operations
    action: Modify existing atom keys (VERSION, TABLE_INDEX, TABLE_DATA, SYMBOL_LIST) after they are written
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Modifying atom keys invalidates content-addressed storage invariants, causing version chain corruption and
      inconsistent reads across concurrent clients
    stage_ids:
    - storage_backend
  - id: finance-C-140
    when: When implementing storage write operations
    action: Only update mutable reference keys (VERSION_REF, SNAPSHOT_REF, APPEND_REF) as the latest pointer
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Updating reference keys incorrectly can break version chain head pointer, causing reads to access wrong or
      missing versions
    stage_ids:
    - storage_backend
  - id: finance-C-144
    when: When selecting or implementing a storage backend
    action: Assume each storage backends support atomic write_if_none operations
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Backends without atomic write support can cause data corruption under concurrent access, as write_if_none
      may not prevent duplicate writes
    stage_ids:
    - storage_backend
  - id: finance-C-146
    when: When implementing LMDB storage backend
    action: Allow multiple processes to write to the same LMDB database simultaneously
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: LMDB does not support multi-process concurrent writes; simultaneous writes cause database corruption or undefined
      behavior
    stage_ids:
    - storage_backend
  - id: finance-C-147
    when: When implementing storage key types
    action: Treat AtomKey and RefKey objects as immutable after construction
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Modifying keys after construction can cause hash collisions, incorrect lookups, and version chain corruption
    stage_ids:
    - storage_backend
  - id: finance-C-152
    when: When implementing S3 storage backend
    action: Test atomic write support at runtime for S3-compatible backends that report NEEDS_TEST
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Some S3-compatible providers (e.g., VAST) silently override existing keys despite IfNoneMatch headers, causing
      data corruption in concurrent write scenarios
    stage_ids:
    - storage_backend
  - id: finance-C-153
    when: When implementing segment encoding
    action: Maintain backwards compatibility for both V1 (protobuf headers) and V2 (binary headers) segment formats
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Breaking segment format compatibility causes older data to become unreadable, violating the guarantee that
      newer clients can read data written by older clients
    stage_ids:
    - storage_backend
  - id: finance-C-154
    when: When implementing storage backend interfaces
    action: 'Implement each required virtual methods: do_write, do_read, do_remove, do_key_exists, do_iterate_type_until_match'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing required method implementations cause compilation errors or runtime crashes when the storage backend
      is used
    stage_ids:
    - storage_backend
  - id: finance-C-155
    when: When implementing storage key path formatting
    action: Verify key paths are unique across library prefix and storage backend
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-unique key paths cause data overwrites or incorrect data retrieval across different libraries using the
      same storage
    stage_ids:
    - storage_backend
  - id: finance-C-158
    when: When implementing URI parsing for ArcticDB connections
    action: use only supported URI schemes (s3://, s3s://, azure://, lmdb://, memory://, mongodb://)
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Unsupported URI scheme will raise ValueError, preventing any connection to the storage backend
  - id: finance-C-159
    when: When implementing S3 adapter URI parsing
    action: use colon (:) to separate endpoint and bucket (s3://endpoint:bucket), not slash (/ )
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: URI regex mismatch will cause adapter selection to fail, preventing S3 connection
  - id: finance-C-169
    when: When writing segments to storage backend
    action: write TABLE_DATA keys before TABLE_INDEX key, and TABLE_INDEX before VERSION key (write order invariant)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect write order causes partial or inconsistent version chains, potentially losing data
  - id: finance-C-170
    when: When creating versioned keys for written data
    action: generate unique atom keys for TABLE_DATA and TABLE_INDEX segments to verify version isolation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-unique keys cause version data to overwrite or corrupt previous version contents
  - id: finance-C-171
    when: When reading segments from storage backend
    action: resolve VERSION key first via VERSION_REF (or explicit version), then lookup TABLE_INDEX, then fetch TABLE_DATA
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect read order causes KeyError or returns stale/incorrect version data
  - id: finance-C-184
    when: When implementing write operations to a single symbol from multiple concurrent writers
    action: Rely on transactional isolation or ACID guarantees for single-symbol concurrent writes
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Last-writer-wins semantics apply without isolation; data from interleaved writes will be lost or corrupted,
      only the last writer's version will be accessible through the version chain
  - id: finance-C-216
    when: When implementing resample queries with the origin parameter in arcticdb
    action: Document and validate the origin parameter choice ('epoch', 'start', 'end', or specific timestamp) before running
      queries — understand that origin directly affects bucket boundaries and can significantly change aggregation results
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect origin parameter alignment causes bucket boundaries to shift, resulting in materially different
      aggregation results that corrupt downstream analysis and backtesting conclusions
    derived_from_bd_id: BD-019
  - id: finance-C-217
    when: When configuring S3 storage credentials for arcticdb libraries
    action: Embed credentials directly in URIs — this practice is deprecated due to security risks including credential exposure
      through logging, shell history, and unintended credential leakage
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: URI-embedded credentials are logged in shell history, system logs, and error messages, exposing sensitive
      authentication tokens and creating security compliance violations
    derived_from_bd_id: BD-051
  - id: finance-C-229
    when: When implementing timestamp period counting and aggregation for daily/monthly/yearly financial calculations
    action: Use floor rounding semantics for timestamps falling exactly on period boundaries to verify deterministic EOD calculations;
      do not use ceiling rounding which causes double-counting at exact period boundaries
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using ceiling rounding for period counting causes double-counting at exact period boundaries, leading to
      incorrect daily/monthly/yearly aggregations that violate financial reporting consistency requirements
    derived_from_bd_id: BD-079
  - id: finance-C-230
    when: When processing timestamps for global financial data queries across multiple timezones
    action: Normalize each timestamps to nanoseconds since UTC epoch to verify consistent trading day attribution regardless
      of client timezone; critical boundary is 23:59:59.999999 vs 00:00:00.000 which determines trading day attribution
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inconsistent timestamp normalization causes incorrect trading day attribution where 23:59:59.999 and 00:00:00.000
      are attributed to different days, violating compliance requirements for global financial data systems
    derived_from_bd_id: BD-083
  - id: finance-C-231
    when: When implementing isin/isnotin filter predicates with large value lists in compliance-sensitive applications
    action: Implement integer overflow detection to verify filter predicates either succeed deterministically with correct
      results or raise clear errors; must not silently truncate or overflow which would cause incorrect membership results
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Silent integer overflow in isin/isnotin operations causes incorrect filter results without error indication,
      leading to data integrity violations in compliance-sensitive financial applications where filter accuracy is critical
    derived_from_bd_id: BD-085
  - id: finance-C-241
    when: When implementing data normalization for timestamps in financial audit trails
    action: Normalize each timestamps to datetime64[ns] format before storage; do not use datetime64[us], datetime64[ms],
      or datetime64[s] even if pandas infers different precision
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using non-nanosecond precision timestamps causes silent precision loss during schema migrations, breaking
      legal audit trail requirements where timestamp granularity has evidentiary weight
    derived_from_bd_id: BD-089
  - id: finance-C-242
    when: When implementing string data type normalization for compliance-bound writes
    action: Truncate strings exceeding defined max_length with logging rather than throwing exceptions; verify truncation
      is logged with original length and column name for data governance auditing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Throwing exceptions on string length violations fails entire write operations for minor length issues, while
      silent truncation without logging violates data governance requirements for audit trails showing data transformation
      history
    derived_from_bd_id: BD-091
  - id: finance-C-249
    when: When constructing TimeFrame objects or processing timestamp data
    action: Use datetime64[ns] dtype exclusively for timestamps — the framework rejects other resolutions at construction
      time to prevent silent precision loss
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using non-nanosecond timestamp precision causes silent precision loss during storage, resulting in incorrect
      price timestamps that invalidate time-based strategies and cause order timing errors in live trading
    derived_from_bd_id: BD-121
  - id: finance-C-250
    when: When copying CA certificates for SSL connections in test environments
    action: Copy CA certificates with overly permissive file permissions (chmod 666) — this breaks security policies requiring
      stricter certificate permissions in production environments
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Using chmod 666 on CA certificates violates security compliance requirements, causing audit failures and
      potential disqualification in regulated trading environments that require strict file permission controls
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-251
    when: When implementing or testing storage backends with permission controls
    action: Make permission enforcement mandatory in storage implementations — use the context manager to verify permission
      behavior, and fail tests when backends claim support but implement incorrectly
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Optional permission enforcement allows backends with incorrect permission implementations to pass tests,
      causing security vulnerabilities where unauthorized access is not blocked in production environments
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-276
    when: When modifying log sanitization logic in ArcticDB GitHub CI context
    action: Verify GitHubSanitizingHandler.sanitize_message strips each sensitive values from test output - maintain comprehensive
      regex patterns covering credentials, tokens, and secrets in request/response data
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incomplete sanitization allows credentials to leak into CI logs; exposed secrets require immediate credential
      rotation and may indicate successful attack if found in public repositories
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-295
    when: When implementing key storage operations in ArcticDB
    action: Modify or mutate Atom keys after creation — only Reference keys support mutability; Atom keys must remain immutable
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Mutating Atom keys breaks the immutability contract and causes cascading consistency failures for concurrent
      readers and all historical versions that reference those atoms
    derived_from_bd_id: BD-113
  - id: finance-C-297
    when: When implementing or modifying the Reference Layer in ArcticDB's four-layer storage hierarchy
    action: Implement strict consistency checks and atomic operations for Reference Layer modifications — each historical
      version pointers depend on this layer's integrity
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Corruption or inconsistency in the Reference Layer (the only mutable layer) can simultaneously affect all
      historical versions, since it is foundational to the entire versioning system
    derived_from_bd_id: BD-131
  - id: finance-C-302
    when: When configuring S3 authentication for test infrastructure
    action: Use STS-based assumed role authentication with policy-controlled access for each S3 operations in tests to verify
      isolation from production resources
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing STS assumed role authentication exposes production S3 resources to test code, creating risk of
      data corruption or unauthorized access when test code contains bugs or executes malicious operations
    derived_from_bd_id: BD-GAP-014
  regular:
  - id: finance-C-001
    when: When initializing Arctic with a URI string
    action: parse the URI scheme to match one of the supported adapters in _LIBRARY_ADAPTERS list
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Arctic initialization fails with ValueError when no adapter supports the URI scheme, preventing any database
      operations
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-002
    when: When implementing a new storage backend adapter
    action: inherit from ArcticLibraryAdapter ABC and implement supports_uri() as a static method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: New adapter cannot be discovered by the URI parser, causing all URIs for the new backend to fail with cryptic
      errors
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-003
    when: When registering a new storage adapter
    action: append the adapter class to Arctic._LIBRARY_ADAPTERS in the correct order of priority
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Adapter precedence is broken when added in wrong order, causing the wrong backend to handle URIs (e.g., generic
      handler matching before specific handler)
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-004
    when: When implementing supports_uri() for an adapter
    action: use simple string prefix matching (e.g., uri.startswith()) rather than regex for performance
    severity: low
    kind: domain_rule
    modality: must
    consequence: Overly complex URI matching causes unnecessary overhead during Arctic initialization, slowing down connection
      establishment
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-006
    when: When providing Azure CA certificate options
    action: use CA_cert_path or CA_cert_dir on non-Linux platforms
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Azure adapter raises ValueError on Windows/MacOS when CA certificate options are provided, preventing connection
      to secured Azure storage
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-007
    when: When providing LMDB map_size option
    action: use supported suffix formats (MB, GB, TB) with uppercase letters and positive integer mantissa
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid map_size format raises LmdbOptionsError, preventing creation of LMDB-backed Arctic instances with
      misconfigured storage
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-008
    when: When providing URI query parameters
    action: include unsupported query parameter names in the URI
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: S3/GCPXML adapters raise ValueError with clear message listing valid parameters when unsupported query parameters
      are provided
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-009
    when: When providing an unsupported URI scheme
    action: raise ValueError with clear message indicating the URI is invalid
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without clear error message, users cannot diagnose why their URI was rejected and which schemes are supported
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-010
    when: When setting encoding version for Arctic instance
    action: pass encoding_version to adapter constructor, not store at adapter level
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Encoding version mismatch causes data written with different versions than configured, leading to read failures
      or corruption
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-011
    when: When initializing Arctic with URI
    action: attempt to access the storage backend during initialization
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Early storage connection attempts cause Arctic initialization to fail for unavailable backends, blocking
      all operations even when library might not be accessed
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-013
    when: When using MongoDB adapter without pymongo installed
    action: fall back to regex-based URI parsing instead of pymongo's parse_uri
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without pymongo fallback, MongoDB adapter fails with ImportError when pymongo is not available, breaking
      MongoDB storage support
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-014
    when: When ArcticDB supports storage backends
    action: claim support for storage backends not in the supported list (S3, Azure, LMDB, MongoDB, in-memory)
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting supported backends leads to user confusion and failed connections when attempting to use
      unsupported URI schemes
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-015
    when: When ArcticDB initializes storage adapters
    action: claim real-time or streaming data capabilities based on adapter selection
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: ArcticDB is a database for batch DataFrame storage, not a streaming platform - misleading claims about real-time
      capabilities lead to architectural mismatches
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-016
    when: When validating a URI before implementation
    action: skip validation assuming the URI format is well-known or simple
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping URI validation causes unhandled exceptions when users provide malformed URIs, producing cryptic
      Python errors instead of helpful messages
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-017
    when: When adding a new storage adapter
    action: assume query parameter names without checking against the adapter's expected fields
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Silent acceptance of invalid parameters leads to configuration being ignored, causing connection failures
      that are difficult to diagnose
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-018
    when: When using Azure URI connection string
    action: include Container parameter as Azure requires explicit container specification
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing Container parameter causes Azure adapter to fail initialization with ValueError about missing required
      query parameter
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-019
    when: When connecting to AWS S3 endpoints
    action: handle 'amazonaws' endpoint pattern to enable automatic AWS credential provider chain
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Missing AWS-specific handling causes authentication failures when connecting to AWS S3 without explicit credentials
    stage_ids:
    - uri_parsing_and_adapter_selection
  - id: finance-C-020
    when: When creating a library without specifying LibraryOptions
    action: use default LibraryOptions with dynamic_schema=False, dedup=False, rows_per_segment=100_000, columns_per_segment=127,
      encoding_version=V1
    severity: high
    kind: domain_rule
    modality: must
    consequence: Library will be created with a fixed schema that cannot be modified, and data will be tiled by rows AND columns.
      Subsequent writes with different schemas will fail.
    stage_ids:
    - library_configuration
  - id: finance-C-021
    when: When creating a library with dynamic_schema=True
    action: accept that columns_per_segment setting does not apply and there is always a single column-slice
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Column subsetting performance will degrade significantly when storing a large number of columns (>1,000)
      because only row tiling is used instead of row+column tiling.
    stage_ids:
    - library_configuration
  - id: finance-C-022
    when: When library schema is fixed (dynamic_schema=False)
    action: write data with different column sets, column orders, or column types than the initial write
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Updates and appends will fail with schema mismatch errors because the schema is locked at first write and
      cannot be modified.
    stage_ids:
    - library_configuration
  - id: finance-C-023
    when: When specifying encoding_version for a library
    action: use EncodingVersion.V2 for production systems without thorough testing
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: V2 encoding is experimental and may have unknown bugs or compatibility issues that could corrupt data or
      cause read/write failures.
    stage_ids:
    - library_configuration
  - id: finance-C-024
    when: When creating a library without specifying encoding_version
    action: default to EncodingVersion.V1 as the stable encoding version
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Library will use V1 encoding which is slower than V2 but is the stable, production-ready format that guarantees
      data integrity.
    stage_ids:
    - library_configuration
  - id: finance-C-025
    when: When enabling deduplication (dedup=True) on a library
    action: verify that new data only adds rows at the end without modifying existing rows
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Deduplication will fail to identify duplicate segments if any data is inserted at the start or middle of
      the data. A one-row offset will prevent deduplication and negate storage savings.
    stage_ids:
    - library_configuration
  - id: finance-C-026
    when: When using get_library with create_if_missing=True and library_options specified
    action: verify that the existing library's options match the provided library_options exactly
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: MismatchingLibraryOptions exception will be raised if the existing library was created with different options,
      preventing access to the library.
    stage_ids:
    - library_configuration
  - id: finance-C-027
    when: When using get_library with library_options but create_if_missing=False
    action: pass library_options since it would be unused and indicates a misuse of the API
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: ArcticInvalidApiUsageException will be raised because library_options is only meaningful when creating a
      library.
    stage_ids:
    - library_configuration
  - id: finance-C-028
    when: When calling create_library with a library name that already exists
    action: raise ValueError instead of silently overwriting or ignoring the duplicate
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Existing library data could be corrupted or lost if the system silently ignored the duplicate creation attempt.
    stage_ids:
    - library_configuration
  - id: finance-C-029
    when: When creating a library with encoding_version=None
    action: fall back to the Arctic instance's default encoding version or V1 if not specified
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Library will be created with an unspecified encoding version, potentially causing inconsistent behavior across
      restarts or different Arctic instances.
    stage_ids:
    - library_configuration
  - id: finance-C-030
    when: When modifying library options after creation via modify_library_option
    action: restart processes that have the library open to see the new configuration
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Running processes will continue using the old configuration until restarted, leading to inconsistent behavior
      between restarted and non-restarted processes.
    stage_ids:
    - library_configuration
  - id: finance-C-031
    when: When the system claims to support dynamic schema changes
    action: claim that type promotions are unlimited - only narrow-to-wide integer and integer-to-float promotions are supported
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Type promotions beyond integer widening or integer-to-float will fail at runtime, breaking user expectations
      set by false documentation.
    stage_ids:
    - library_configuration
  - id: finance-C-032
    when: When the system claims library option changes via modify_library_option
    action: claim that each library options are modifiable - only a specific subset of options can be changed post-creation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users attempting to modify non-modifiable options will encounter errors, breaking documented expectations.
    stage_ids:
    - library_configuration
  - id: finance-C-033
    when: When skipping library existence check before creating a library
    action: skip the has_library() check because create_library explicitly validates and raises ValueError for duplicates
    severity: low
    kind: rationalization_guard
    modality: must_not
    consequence: Duplicate library creation would fail with ValueError anyway, making redundant pre-checks wasteful and indicating
      lack of understanding of the API.
    stage_ids:
    - library_configuration
  - id: finance-C-034
    when: When assuming default LibraryOptions are suitable for each use cases
    action: skip evaluating whether dynamic_schema, dedup, or segment size parameters match the actual data access patterns
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Using wrong segment sizes or schema settings causes severe performance degradation or failed operations when
      data patterns don't match defaults.
    stage_ids:
    - library_configuration
  - id: finance-C-035
    when: When normalizing column or index names
    action: use boolean values as column or index names since bools are a subclass of int
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Boolean column/index names cause data corruption because the validation check fails to distinguish bools
      from integers, leading to silent type coercion or exception during denormalization
    stage_ids:
    - data_normalization
  - id: finance-C-039
    when: When using dynamic_schema mode with multiple None or empty string column names
    action: create multiple None or empty string columns in dynamic_schema mode
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Dynamic schema mode prohibits duplicate None/empty column names to maintain schema integrity; violation causes
      ArcticNativeException during normalization
    stage_ids:
    - data_normalization
  - id: finance-C-040
    when: When normalizing datetime64 columns with non-nanosecond resolution
    action: convert datetime64 columns to nanosecond resolution (datetime64[ns]) before writing
    severity: high
    kind: domain_rule
    modality: must
    consequence: ArcticDB only operates at nanosecond resolution internally; non-ns datetime columns may cause data precision
      loss or inconsistent timestamps on read
    stage_ids:
    - data_normalization
  - id: finance-C-042
    when: When normalizing data types that are not natively supported
    action: fall back to MsgPack serialization when native normalization fails and pickle_on_failure is disabled
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Non-supported types without fallback will raise exceptions, preventing data storage. Proper fallback ensures
      data preservation at the cost of performance
    stage_ids:
    - data_normalization
  - id: finance-C-043
    when: When normalizing PyArrow Tables to ArcticDB
    action: assume PyArrow Tables are normalized as Arrow unless allow_arrow_input=True is explicitly set
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: PyArrow Tables default to falling through to MsgPack normalization when allow_arrow_input=False, losing native
      Arrow format efficiency and potential schema information
    stage_ids:
    - data_normalization
  - id: finance-C-044
    when: When writing empty DataFrames with no known fallback normalizer
    action: configure a fallback normalizer (MsgPack/Pickle) for empty DataFrames to verify graceful handling
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Empty DataFrames without fallback may fail to normalize when specific normalizers reject them, causing unexpected
      write failures
    stage_ids:
    - data_normalization
  - id: finance-C-045
    when: When serializing data with pickle
    action: assume pickled data is readable by other Python clients if strict_mode is enabled
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Pickled data is only readable by compatible Python versions; logging at WARN level indicates pickled metadata
      may not be readable by other clients
    stage_ids:
    - data_normalization
  - id: finance-C-046
    when: When using the stage() method for incomplete data writes
    action: rely on dynamic_strings=True which is automatically enabled for staged writes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Staged writes must use dynamic_strings=True to handle incomplete/flexible string data during incremental
      data collection; disabling it may cause staged writes to fail
    stage_ids:
    - data_normalization
  - id: finance-C-047
    when: When round-tripping Pandas DataFrames through ArcticDB
    action: preserve pandas metadata including index names and MultiIndex structure through normalization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: DataFrame round-trips without proper metadata preservation will lose index names, MultiIndex levels, and
      column type information, causing silent data structure corruption
    stage_ids:
    - data_normalization
  - id: finance-C-048
    when: When denormalizing data with MultiIndex
    action: reconstruct MultiIndex from stored normalization metadata using field_count and timezone information
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: MultiIndex structures will be lost on read if denormalization does not properly reconstruct index levels
      and their timezones from metadata
    stage_ids:
    - data_normalization
  - id: finance-C-049
    when: When normalizing unknown data types to ArcticDB
    action: fall back to Pickle serialization when both native normalization and MsgPack fail
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without Pickle fallback, unknown data types will raise unhandled exceptions causing write failures and potential
      data loss
    stage_ids:
    - data_normalization
  - id: finance-C-050
    when: When coercing DataFrame columns to string types
    action: attempt column type coercion without enabling dynamic_strings parameter
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: String type coercion will silently fail without dynamic_strings=True, causing columns to retain incorrect
      types and potentially causing downstream processing errors
    stage_ids:
    - data_normalization
  - id: finance-C-051
    when: When writing Arrow Tables with timezone-naive timestamp columns
    action: apply timezone metadata during Arrow normalization to verify proper timestamp handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Timezone-naive timestamps without proper metadata will be interpreted incorrectly on read, causing timestamp
      shifts or data inconsistency
    stage_ids:
    - data_normalization
  - id: finance-C-052
    when: When normalizing DataFrames with non-unique column names or NaN values
    action: use iloc-based column access instead of direct column access to handle duplicates and NaN
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-unique or NaN-containing column names accessed directly will cause data extraction errors, potentially
      corrupting or losing column data during normalization
    stage_ids:
    - data_normalization
  - id: finance-C-054
    when: When normalizing Windows datetime timestamp columns with PyArrow timezone operations
    action: install timezone database on Windows using pyarrow.util.download_tzdata_on_windows()
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing timezone database on Windows causes ArrowInvalid exceptions during timezone conversion, preventing
      write operations with timestamp columns
    stage_ids:
    - data_normalization
  - id: finance-C-055
    when: When writing nested dict structures with recursive normalizers enabled
    action: contain the '__' separator character in dictionary keys
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Dictionary keys with '__' will cause UnsupportedKeyInDictionary exception and the write operation fails,
      leaving no data written and requiring cleanup of partial state
    stage_ids:
    - recursive_normalization
  - id: finance-C-056
    when: When recursively normalizing deeply nested structures
    action: exceed 255 levels of nesting depth
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: DataTooNestedException is raised when depth exceeds 255, preventing the symbol from being recursively normalized
      and written to storage
    stage_ids:
    - recursive_normalization
  - id: finance-C-057
    when: When writing data with recursive normalizers enabled
    action: generate symbol names exceeding 100 characters without compaction
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Uncompacted long symbol names would exceed LMDB key size limits, causing write failures and potential data
      loss
    stage_ids:
    - recursive_normalization
  - id: finance-C-058
    when: When creating a library to store nested structures
    action: explicitly set recursive_normalizers=True in LibraryOptions
    severity: high
    kind: resource_boundary
    modality: must
    consequence: By default, recursive_normalizers is False, causing nested structures like dict of DataFrames to raise ArcticUnsupportedDataTypeException
    stage_ids:
    - recursive_normalization
  - id: finance-C-059
    when: When enabling recursive normalizers
    action: verify each custom normalizers used in nested structures are registered in the reading session
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Custom normalizers not registered in the reading session cause KeyError when attempting to deserialize V2
      metastructures, making the data unreadable
    stage_ids:
    - recursive_normalization
  - id: finance-C-060
    when: When writing dict of DataFrames with recursive normalizers enabled
    action: write multiple symbols to storage (one per DataFrame leaf node)
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Multiple symbols are written under a MULTI_KEY, each storing a leaf node of the nested structure, enabling
      reconstruction on read
    stage_ids:
    - recursive_normalization
  - id: finance-C-061
    when: When reading nested structures written with recursive normalizers
    action: reconstruct the original nested structure from flattened symbols using metastructure metadata
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: The read operation uses create_original_obj_from_metastruct to reconstruct the original dict/list structure
      from stored symbols
    stage_ids:
    - recursive_normalization
  - id: finance-C-062
    when: When writing symbols with very long names using recursive normalizers
    action: compact symbol names exceeding 100 characters using the last-3-chars-of-segments plus hash algorithm
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Symbol compaction prevents LMDB key length errors by obfuscating long symbol names while maintaining uniqueness
      via SHA256 hash suffix
    stage_ids:
    - recursive_normalization
  - id: finance-C-063
    when: When implementing metastructure versioning
    action: use '__version__' for V1 and '__VER__' for V2 to enable graceful KeyError fallback on old releases
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Old releases checking for '__version__' will get KeyError on V2 data, allowing them to fail gracefully instead
      of corrupting metastructure
    stage_ids:
    - recursive_normalization
  - id: finance-C-065
    when: When writing nested structures with recursive normalizers
    action: record the key_name explicitly in the metastructure for forward compatibility
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Newer versions record key_name explicitly in metastruct to allow future improvements to compact_v1 without
      breaking old data format
    stage_ids:
    - recursive_normalization
  - id: finance-C-066
    when: When reading data written by a newer ArcticDB release with V2 metastructure
    action: expect custom normalizers used in the data to be automatically available
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: V2 metastructure stores only module/name strings for class reconstruction. Old releases without the custom
      normalizer registered will raise RuntimeError during deserialization
    stage_ids:
    - recursive_normalization
  - id: finance-C-067
    when: When migrating from V1 to V2 metastructure as default
    action: verify V1-written data remains readable by the new V2-enabled release
    severity: high
    kind: claim_boundary
    modality: must
    consequence: V1 data (using pickled types and '__version__' key) must be readable by V2 code to maintain backward compatibility
      during migration
    stage_ids:
    - recursive_normalization
  - id: finance-C-068
    when: When writing nested structures that require partial pickling
    action: warn users that leaf nodes requiring pickle are mixed with normalized data in the same symbol
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Data with mixed msgpack-serializable and pickle-required leaf nodes results in partially normalized, partially
      pickled storage, which may not behave as users expect
    stage_ids:
    - recursive_normalization
  - id: finance-C-069
    when: When writing data with validate_index=True to ArcticDB
    action: verify the input DataFrame index is sorted in ascending order
    severity: high
    kind: domain_rule
    modality: must
    consequence: UnsortedDataException will be raised during write, causing the operation to fail and data not to be persisted
    stage_ids:
    - write_operations
  - id: finance-C-070
    when: When calling append() on an existing symbol
    action: verify the index of the first row in new data is equal to or greater than the index of the last row in existing
      data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Append operation will fail or produce corrupted data if the first row index is less than the last row index
      of existing data
    stage_ids:
    - write_operations
  - id: finance-C-071
    when: When calling update() on a symbol
    action: verify the input data is sorted in ascending order
    severity: high
    kind: domain_rule
    modality: must
    consequence: SortingException will be raised when calling update with unsorted data, causing the operation to fail
    stage_ids:
    - write_operations
  - id: finance-C-072
    when: When creating symbol names for write operations
    action: exceed 255 characters or use the characters "*", "&", "<", ">" in symbol names
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Symbol name validation will fail and write operations will be rejected if name exceeds 255 chars or contains
      forbidden characters
    stage_ids:
    - write_operations
  - id: finance-C-073
    when: When using concurrent writers to write to a single symbol
    action: have multiple concurrent writers to the same symbol
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Data corruption or undefined behavior may occur if multiple concurrent writers access the same symbol simultaneously
    stage_ids:
    - write_operations
  - id: finance-C-074
    when: When relying on deduplication for write operations
    action: verify that new data is identical to previous data plus additional data appended only at the end
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Deduplication will not occur if data is inserted at the start or middle; all segments after modification
      will differ and require re-writing
    stage_ids:
    - write_operations
  - id: finance-C-075
    when: When writing staged data using stage()
    action: call finalize_staged_data() before reading the staged data
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Staged data is unreadable until finalize_staged_data() is called; reads will fail or return incomplete data
    stage_ids:
    - write_operations
  - id: finance-C-076
    when: When calling finalize_staged_data()
    action: verify staged segments are ordered, non-overlapping, and contain no NaT values in their index
    severity: high
    kind: domain_rule
    modality: must
    consequence: SortingException will be raised if staged segments contain NaT in index; incorrect ordering causes data corruption
    stage_ids:
    - write_operations
  - id: finance-C-077
    when: When running ArcticDB on Windows
    action: set dynamic_strings=True for each write operations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Fixed size strings not implemented on Windows; writes will fail or produce incorrect results with dynamic_schema=False
    stage_ids:
    - write_operations
  - id: finance-C-078
    when: When using write() or append() with incomplete=True parameter
    action: continue using the deprecated incomplete parameter for staging data
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Staging data with write()/append() is deprecated; DeprecationWarning is issued and support may be removed
      in future versions
    stage_ids:
    - write_operations
  - id: finance-C-079
    when: When managing storage growth from version history
    action: explicitly set prune_previous_version=True or periodically call prune_previous_versions() to avoid unbounded storage
      growth
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without pruning, all versions are kept by default, causing storage to grow indefinitely as new versions are
      written
    stage_ids:
    - write_operations
  - id: finance-C-080
    when: When writing to existing symbols
    action: access previous versions via the as_of parameter in read operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Write always creates new versions; without using as_of parameter, reads return only the latest version, potentially
      losing access to historical data
    stage_ids:
    - write_operations
  - id: finance-C-081
    when: When calling prune_previous_versions()
    action: expect snapshot-protected versions to be deleted
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Versions included in snapshots are protected from pruning; prune_previous_versions() only removes non-snapshotted
      versions
    stage_ids:
    - write_operations
  - id: finance-C-082
    when: When verifying acceptance criteria for write_operations stage
    action: confirm that write to existing symbol creates new version with old version accessible via as_of
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without version creation, historical data access is lost and version history is broken
    stage_ids:
    - write_operations
  - id: finance-C-083
    when: When verifying acceptance criteria for append operation
    action: confirm that append extends data along the index dimension only
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Append only extends along the index; appending to non-index dimensions or incorrect ordering causes data
      corruption
    stage_ids:
    - write_operations
  - id: finance-C-084
    when: When verifying acceptance criteria for finalize_staged_data
    action: confirm that staged data is readable after finalize operation completes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Staged data remains unreadable until finalized; premature reads return empty or partial data
    stage_ids:
    - write_operations
  - id: finance-C-085
    when: When deleting symbols with delete() operation
    action: expect symbols accessible via snapshots to persist even after delete
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: delete() only removes symbols not part of any snapshot; symbols referenced in snapshots remain accessible
    stage_ids:
    - write_operations
  - id: finance-C-086
    when: When configuring library for write operations
    action: set dedup=True only if workload is append-only with data appended at the end
    severity: low
    kind: claim_boundary
    modality: must
    consequence: Dedup with non-append-only workloads provides no benefit and may add unnecessary hash computation overhead
    stage_ids:
    - write_operations
  - id: finance-C-087
    when: When using pickle_on_failure for write operations
    action: expect pickled data to support advanced query features or efficient storage
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Pickled data consumes more storage space, is less performant for reads and writes, and does not support advanced
      query features
    stage_ids:
    - write_operations
  - id: finance-C-089
    when: When requesting PyArrow output format
    action: install pyarrow as an optional dependency
    severity: high
    kind: resource_boundary
    modality: must
    consequence: ModuleNotFoundError is raised stating 'ArcticDB's pyarrow optional dependency missing but is required to
      use arrow output format', preventing read operation from completing
    stage_ids:
    - read_operations
  - id: finance-C-090
    when: When requesting Polars output format
    action: install both pyarrow and polars as optional dependencies
    severity: high
    kind: resource_boundary
    modality: must
    consequence: ModuleNotFoundError is raised stating 'ArcticDB's pyarrow or polars optional dependencies are missing but
      are required to use polars output format', preventing read operation from completing
    stage_ids:
    - read_operations
  - id: finance-C-091
    when: When requesting SMALL_STRING arrow format with POLARS output
    action: use SMALL_STRING arrow format with POLARS output
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: ValueError is raised stating 'SMALL_STRING is not supported with POLARS output format. Please use LARGE_STRING
      instead', causing read operation to fail
    stage_ids:
    - read_operations
  - id: finance-C-092
    when: When using LazyDataFrame without calling collect()
    action: call collect() on LazyDataFrame to trigger actual storage read
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without calling collect(), the read request remains deferred and no data is retrieved, causing code that
      expects data to fail with empty results
    stage_ids:
    - read_operations
  - id: finance-C-093
    when: When providing columns parameter as empty list
    action: expect only index columns in returned DataFrame when columns=[]
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Empty column list [] returns only the index columns, not a completely empty DataFrame. This can cause downstream
      operations expecting data columns to fail
    stage_ids:
    - read_operations
  - id: finance-C-094
    when: When using QueryBuilder with date_range and row_range in same query
    action: prepend date_range to query before row_range for correct execution order
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Query clauses are prepended in order, so date_range prepended before row_range causes execution order mismatch,
      potentially returning incorrect filtered results
    stage_ids:
    - read_operations
  - id: finance-C-095
    when: When providing invalid as_of parameter type to read
    action: pass non-None value of unexpected type as as_of parameter
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: ArcticNativeException is raised with 'Unexpected combination of read parameters' when as_of is not None and
      not one of (str, int, datetime, Timestamp, _PreloadedIndexQuery)
    stage_ids:
    - read_operations
  - id: finance-C-096
    when: When using version query with snapshot name that does not exist
    action: verify snapshot name exists before using it as as_of parameter
    severity: high
    kind: domain_rule
    modality: must
    consequence: NoSuchVersionException is raised when reading with as_of referencing non-existent snapshot, causing read
      operation to fail
    stage_ids:
    - read_operations
  - id: finance-C-097
    when: When specifying output format as unknown string value
    action: pass unrecognized string value as output_format parameter
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: 'ValueError is raised with ''Unknown OutputFormat: {output_format}'' when output_format does not match PANDAS,
      PYARROW, or POLARS (case-insensitive)'
    stage_ids:
    - read_operations
  - id: finance-C-098
    when: When using QueryBuilder with string comparison operators (<, <=, >, >=)
    action: use <, <=, >, >= operators on string columns in QueryBuilder
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: String comparisons using less-than or greater-than operators will fail or produce incorrect results. QueryBuilder
      only supports string equality/inequality and regex matching
    stage_ids:
    - read_operations
  - id: finance-C-099
    when: When reading without specifying output_format
    action: expect PANDAS as the default output format
    severity: low
    kind: resource_boundary
    modality: must
    consequence: When output_format is None, PANDAS is used as default (per resolve_runtime_defaults with global_default=OutputFormat.PANDAS),
      not returning PyArrow or Polars data
    stage_ids:
    - read_operations
  - id: finance-C-100
    when: When using lazy=True with read operation
    action: call collect() to actually read data from storage
    severity: high
    kind: resource_boundary
    modality: must
    consequence: LazyDataFrame is returned without reading data until collect() is called. Code that accesses .data directly
      without collect() will get incomplete or missing data
    stage_ids:
    - read_operations
  - id: finance-C-101
    when: When using batch read operations with mismatched parameter lengths
    action: provide different number of date_ranges than symbols in batch read
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: ArcticNativeException is raised with 'Mismatched number of symbols ({}) and date ranges ({}) supplied to
      batch read', causing batch operation to fail
    stage_ids:
    - read_operations
  - id: finance-C-102
    when: When using _preloaded_index with LazyDataFrame after calling _collect_schema
    action: use _preloaded_index correctly in subsequent collect() call
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: When _collect_schema() is called first, _preloaded_index is set. collect() should use this preloaded index
      via read_request replacement, ensuring consistent version snapshot behavior
    stage_ids:
    - read_operations
  - id: finance-C-103
    when: When implementing filtering expressions with boolean logic in QueryBuilder
    action: use Python boolean operators (and, or, not) directly in query expressions
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using Python's 'and', 'or', 'not' operators in query expressions raises UserInputException because the ExpressionNode.__bool__
      method explicitly prevents boolean coercion to enforce proper query syntax
    stage_ids:
    - query_processing
  - id: finance-C-104
    when: When implementing filtering expressions in QueryBuilder
    action: use bitwise operators (&, |, ~) for boolean combination operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without using bitwise operators, queries will fail with UserInputException since only &, |, ^, and ~ are
      supported for logical combinations in filtering
    stage_ids:
    - query_processing
  - id: finance-C-105
    when: When implementing filtering expressions that compare strings with ordering operators
    action: use ordering comparison operators (<, <=, >, >=) between string columns
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: String comparisons using <, <=, >, >= are not supported in ArcticDB queries and will raise an exception,
      unlike Pandas which allows such comparisons
    stage_ids:
    - query_processing
  - id: finance-C-106
    when: When implementing filtering expressions that mix string and numeric types
    action: compare string columns with numeric values or perform arithmetic with string columns
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Comparing strings to numeric values (or vice versa) and arithmetic operations involving string columns are
      not supported and will raise UserInputException
    stage_ids:
    - query_processing
  - id: finance-C-107
    when: When implementing filtering with string columns
    action: use non-ASCII characters in string equality/inequality filtering
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: String equality/inequality (and isin/isnotin) operations only support printable ASCII characters, using Unicode
      or special characters will produce incorrect results
    stage_ids:
    - query_processing
  - id: finance-C-108
    when: When using floating point values in equality or membership filtering
    action: use ==, !=, isin, or isnotin operators with floating point columns or values
    severity: medium
    kind: domain_rule
    modality: should_not
    consequence: Floating point comparisons using equality operators may produce unexpected results due to precision issues,
      documentation explicitly recommends avoiding this pattern
    stage_ids:
    - query_processing
  - id: finance-C-109
    when: When implementing resampling with flexible origin parameters
    action: combine origin='start', 'start_day', 'end', or 'end_day' with date_range in read operations
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Using 'start', 'start_day', 'end', 'end_day' origin values with date_range raises UserInputException because
      these origin types cannot be properly aligned when a date_range is applied
    stage_ids:
    - query_processing
  - id: finance-C-110
    when: When implementing resampling with frequency strings
    action: use unsupported frequency strings (M, A, Q, BM, BA, BQ, W, CBME, BME, SME, ME, C, etc.) for resampling
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Using unsupported frequency strings in resample raises ArcticDbNotYetImplemented exception, only ns, us,
      ms, s, min, h, D and combinations thereof are supported
    stage_ids:
    - query_processing
  - id: finance-C-111
    when: When implementing resampling with origin parameter
    action: check pandas version requirements before using 'end' or 'end_day' origin values
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Origin values 'end' and 'end_day' require pandas >= 1.3.0, using them with older pandas versions will fail
    stage_ids:
    - query_processing
  - id: finance-C-112
    when: When implementing resampling on symbols with dynamic schema
    action: use resampling on dynamic schema symbols where aggregation columns are missing from row-slices
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Resampling on dynamic schema with missing aggregation columns in some row-slices raises SchemaException because
      the operation cannot be properly applied
    stage_ids:
    - query_processing
  - id: finance-C-113
    when: When implementing resampling on symbols with sparse data
    action: use resampling on sparse data symbols
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Resampling on sparse data symbols raises SchemaException because sparse data resampling is not implemented
      in ArcticDB
    stage_ids:
    - query_processing
  - id: finance-C-114
    when: When implementing aggregation operations in QueryBuilder
    action: verify the aggregation follows a groupby or resample clause
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling agg() without a preceding groupby or resample clause raises ArcticNativeException because aggregation
      only makes sense after grouping operations
    stage_ids:
    - query_processing
  - id: finance-C-115
    when: When implementing aggregation operations on column types
    action: use sum, mean, min, or max aggregations on string columns, or sum on datetime columns
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Using incompatible aggregation operators on column types raises SchemaException; string columns support only
      count, first, last; datetime columns do not support sum
    stage_ids:
    - query_processing
  - id: finance-C-116
    when: When implementing resampling operations
    action: expect empty time buckets to be excluded from results (unlike Pandas default behavior)
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Resampling results will not include time-buckets with no data, which differs from Pandas default behavior
      where empty buckets may appear
    stage_ids:
    - query_processing
  - id: finance-C-117
    when: When implementing resampling with the default origin parameter
    action: be aware that the default origin='epoch' may produce different results than Pandas' default origin='start_day'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Resample results with default origin='epoch' will differ from Pandas default behavior when rule is not a
      multiple of 24 hours; future ArcticDB versions plan to change default to 'start_day'
    stage_ids:
    - query_processing
  - id: finance-C-118
    when: When implementing string filtering with regex patterns
    action: pass only string type to regex_match method
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing non-string types to regex_match raises UserInputException because regex patterns must be strings
    stage_ids:
    - query_processing
  - id: finance-C-119
    when: When implementing row range filtering with non-integer bounds
    action: pass non-integer values as row_range bounds
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using non-integer values for row_range bounds raises UserInputException because row ranges only accept integers
      or None
    stage_ids:
    - query_processing
  - id: finance-C-120
    when: When implementing concat operations with join parameter
    action: use only 'inner' or 'outer' as valid join values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using invalid join values (not 'inner' or 'outer') in concat raises ArcticNativeException because only these
      two join types are supported
    stage_ids:
    - query_processing
  - id: finance-C-121
    when: When implementing QueryBuilder filter operations
    action: filter on columns that do not exist in the symbol
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Filtering on non-existent columns raises InternalException because the query references columns not present
      in the stored data
    stage_ids:
    - query_processing
  - id: finance-C-122
    when: When implementing offset parameter in resampling
    action: use pd.Timedelta or convertible string format for the offset parameter
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using invalid offset format raises UserInputException because offset must be a valid timedelta value or string
    stage_ids:
    - query_processing
  - id: finance-C-123
    when: When implementing symbol deletion logic
    action: use tombstone-based deletion marking versions as deleted without immediate physical removal
    severity: high
    kind: domain_rule
    modality: must
    consequence: Immediate physical deletion without tombstones creates dangling references, causing read failures for any
      code that depends on version history or snapshots referencing the deleted versions
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-126
    when: When implementing list_versions
    action: return each version with symbol name, version number, creation date, deleted status, and associated snapshot list
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incomplete version information causes application errors and prevents proper version history analysis and
      debugging
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-127
    when: When implementing symbol list caching
    action: trigger compaction when delta entries exceed SymbolList.MaxDelta threshold (default 500)
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Unbounded symbol list cache growth causes severe performance degradation on list_symbols operations, with
      response times increasing linearly with modification count
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-128
    when: When implementing snapshot creation
    action: capture current version state at creation time and persist symbol-version references independently of future writes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Snapshots not capturing point-in-time state defeats the purpose of point-in-time recovery, allowing users
      to access modified or deleted data when they expect historical data
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-129
    when: When implementing symbol list iteration
    action: bypass snapshot protection checks when iterating versions to exclude snapshot-protected deleted versions
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Showing snapshot-protected deleted versions creates confusion about actual data availability and may cause
      incorrect application logic decisions based on visible-but-protected versions
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-130
    when: When implementing delete_snapshot
    action: physically remove underlying data only when the snapshot is the last reference to that data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Deleting snapshot data prematurely causes data loss if other snapshots still reference the same version keys,
      breaking data integrity guarantees
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-131
    when: When implementing version map entry loading with 3-item ref keys
    action: use 3-item ref key optimization bypass when loading versions with deleted content, to avoid skipping snapshot-protected
      deleted versions
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Skipping snapshot-protected deleted versions during load causes incorrect data retrieval when reading from
      snapshots that reference those versions
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-132
    when: When configuring symbol list compaction behavior
    action: use random draw between MinCompactionThreshold (300) and MaxCompactionThreshold (700) when SymbolList.MaxDelta
      is not set
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Deterministic compaction at fixed thresholds creates coordinated contention among multiple clients accessing
      the same library simultaneously
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-133
    when: When deleting symbols
    action: respect each snapshot references before marking symbols as fully deleted in the symbol list
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing symbols from the list while still referenced by snapshots causes inconsistent library state and
      read failures for snapshot-based access
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-134
    when: When implementing batch delete operations
    action: validate that version_ids list is non-empty for each symbol before processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty version_ids causes silent failures in batch deletion, leaving symbols undeleted without error indication
      to callers
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-135
    when: When implementing snapshot metadata loading
    action: load snapshot metadata by default in list_snapshots as it may be slow for large snapshots
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Mandatory metadata loading in list_snapshots causes performance degradation proportional to snapshot size,
      affecting responsiveness of snapshot enumeration operations
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-136
    when: When implementing date range deletion
    action: apply row filtering with end-inclusive range semantics before removing data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect range semantics in date-based deletion causes either data loss (missing boundary rows) or incomplete
      deletion (extra rows retained), violating user expectations
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-137
    when: When reading data as of a timestamp with tombstoned versions
    action: search snapshot references to find version data when regular version lookup fails due to tombstoning
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Failing to search snapshots for tombstoned versions causes read failures for historical queries where the
      version was deleted but still accessible via snapshot
    stage_ids:
    - version_and_snapshot_management
  - id: finance-C-141
    when: When implementing versioned read operations with as_of queries
    action: Assume constant-time access for deep version histories
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Deep version chains require O(n) traversal through linked list of version keys, causing significant latency
      for historical version queries on symbols with many versions
    stage_ids:
    - storage_backend
  - id: finance-C-142
    when: When implementing column subset read operations
    action: Read only data segments containing the requested columns, skipping unrelated column segments
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without column subsetting optimization, reading a subset of columns requires loading all column data, causing
      unnecessary I/O and memory usage for wide tables
    stage_ids:
    - storage_backend
  - id: finance-C-143
    when: When implementing date range read operations
    action: Filter data segments using the B-Tree index before fetching data layer segments
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without index-based filtering, date range queries require reading all data segments, causing full table scans
      and excessive I/O for large datasets
    stage_ids:
    - storage_backend
  - id: finance-C-145
    when: When configuring LMDB storage backend
    action: Set map_size large enough at library creation to accommodate expected data growth
    severity: high
    kind: resource_boundary
    modality: must
    consequence: LMDB map_size cannot be easily resized after creation; reaching map_size limit causes LMDBMapFullException
      and halts writes
    stage_ids:
    - storage_backend
  - id: finance-C-148
    when: When implementing concurrent write operations
    action: Assume deterministic ordering or complete success for concurrent appends to the same symbol
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Last-writer-wins concurrency means concurrent appends may appear out of order or one may be dropped, causing
      data inconsistency
    stage_ids:
    - storage_backend
  - id: finance-C-149
    when: When implementing read operations
    action: Return consistent snapshots because the version chain is immutable after writes complete
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Readers expecting mutable state may observe inconsistent data if the underlying assumption of immutability
      is violated
    stage_ids:
    - storage_backend
  - id: finance-C-150
    when: When implementing symbol list operations
    action: Assume list_symbols() always reflects exact storage state if multiple clients operate concurrently
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Clock skew between clients can cause symbol list cache divergence, where lib.read(symbol) works but symbol
      in lib.list_symbols() returns False
    stage_ids:
    - storage_backend
  - id: finance-C-151
    when: When implementing data persistence verification
    action: Verify data persists by reading it back after library restart
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without read-back verification, silent data loss from storage backend issues may go undetected, causing production
      data loss
    stage_ids:
    - storage_backend
  - id: finance-C-156
    when: When implementing data layer segmentation
    action: Slice data by rows and columns according to rows_per_segment and columns_per_segment configuration
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper segmentation, date range and column subset queries cannot efficiently skip irrelevant data
      segments, causing full table scans
    stage_ids:
    - storage_backend
  - id: finance-C-157
    when: When implementing version compaction operations
    action: Compact version chains when they exceed the configured maximum block threshold
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Uncompacted version chains with excessive version blocks slow down all version lookups, especially as_of
      queries on deep version histories
    stage_ids:
    - storage_backend
  - id: finance-C-160
    when: When configuring library with encoding version
    action: set encoding_version explicitly in LibraryOptions; default EncodingVersion.V1 if not specified
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect encoding version causes data written with one version to be unreadable by older clients
  - id: finance-C-161
    when: When configuring library write options
    action: set rows_per_segment and columns_per_segment to control data tiling and deduplication behavior
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect segment sizing causes inefficient read/write for column or row subsetting operations
  - id: finance-C-162
    when: When normalizing DataFrame data for write
    action: convert each datetime columns to datetime64[ns] resolution before writing to ArcticDB
    severity: high
    kind: domain_rule
    modality: must
    consequence: Datetime precision loss causes timestamp values to be truncated, corrupting financial time-series data
  - id: finance-C-163
    when: When normalizing pandas DataFrame with object dtype strings
    action: encode string columns to UTF_DYNAMIC64 type to verify consistent string handling across read/write
    severity: high
    kind: domain_rule
    modality: must
    consequence: Object dtype strings without proper encoding cause read/write mismatches or encoding errors
  - id: finance-C-164
    when: When normalizing pandas DataFrame with mixed int and float columns
    action: coerce integer columns containing None/NaN values to float64 to support missing value representation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Integer columns with NaN values cause silent type coercion to float, losing integer precision
  - id: finance-C-165
    when: When normalizing nested dict/list structures with recursive_normalizers enabled
    action: flatten complex structures and create metastructure metadata for reconstruction
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Nested structures written without flattening cause incomplete serialization and data loss
  - id: finance-C-166
    when: When converting DataFrame to internal FrameData format
    action: preserve index column names and index_values as separate numpy arrays in NPDDataFrame structure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Index information loss causes incorrect index restoration on read, breaking time-series alignment
  - id: finance-C-167
    when: When writing normalized FrameData to storage via C++ layer
    action: slice data into row/column segments based on rows_per_segment (default 100,000) and columns_per_segment (default
      127)
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect segment sizing causes inefficient storage access patterns and increased I/O latency
  - id: finance-C-168
    when: When writing data to storage with dedup enabled
    action: compare content hash of new segments against previous version segments before writing
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing deduplication causes redundant storage writes and increased storage costs
  - id: finance-C-172
    when: When reading data with output_format=PYARROW or POLARS
    action: verify pyarrow module is available and properly handles timezone conversions on Windows
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing pyarrow dependency or Windows timezone database causes ArcticDbNotYetImplemented exception
  - id: finance-C-173
    when: When denormalizing stored segments to requested output format
    action: convert stored columnar arrays back to original pandas/pyarrow/polars types based on NormalizationMetadata
    severity: high
    kind: domain_rule
    modality: must
    consequence: Type mismatch between stored metadata and denormalized data causes incorrect values or crashes
  - id: finance-C-174
    when: When applying query filters during read operations
    action: push filter and projection operations to C++ storage layer for efficient execution before returning data
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Unpushed queries cause full segment decompression and Python-level filtering, causing 10x-100x slowdown
  - id: finance-C-175
    when: When specifying output format for read operations
    action: use OutputFormat enum values (PANDAS, PYARROW, POLARS) or case-insensitive string equivalents
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid output format string causes ValueError and read operation failure
  - id: finance-C-176
    when: When denormalizing data with norm_meta for composite/normalizer reconstruction
    action: pass NormalizationMetadata through the denormalization pipeline to reconstruct original nested structures
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing norm_meta causes nested dict/list structures to be returned as flattened key-value pairs
  - id: finance-C-177
    when: When handling string columns with POLARS output format
    action: use ArrowOutputStringFormat.SMALL_STRING format with POLARS output, as Polars does not support small strings
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: SMALL_STRING with POLARS raises ValueError, preventing read operation from completing
  - id: finance-C-178
    when: When reconstructing DataFrame index from denormalized data
    action: restore index from stored index_columns metadata, converting nanosecond timestamps back to DatetimeIndex
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect index restoration causes time-series misalignment and wrong data association
  - id: finance-C-179
    when: When reading data with column subsetting
    action: only fetch TABLE_DATA segments that contain the requested columns based on column-slice boundaries
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Full segment fetch despite column filtering causes unnecessary I/O and memory usage
  - id: finance-C-180
    when: When handling datetime index columns during normalization
    action: convert each DatetimeIndex values to UTC-normalized nanosecond timestamps before storage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Timezone-aware timestamps stored without UTC normalization cause incorrect time interpretation
  - id: finance-C-181
    when: When writing empty DataFrames to storage
    action: handle empty data gracefully through empty_types normalization flag rather than blocking write
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Empty DataFrames cause normalization exceptions if empty_types is not properly handled
  - id: finance-C-182
    when: When writing time-series data with timestamps to ArcticDB
    action: Use datetime64[ns] resolution for each timestamp columns and index values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Timestamps with sub-nanosecond precision (from Pandas 2.0+ datetime64[us/ms/s]) will silently lose precision
      when stored, causing data integrity issues in time-sensitive financial or scientific applications
  - id: finance-C-183
    when: When creating a TimeFrame object in ArcticDB
    action: Pass times as np.ndarray with datetime64[ns] dtype, not other datetime resolutions
    severity: high
    kind: domain_rule
    modality: must
    consequence: TimeFrame construction will raise TypeError for non-datetime64[ns] times arrays, causing write operations
      to fail
  - id: finance-C-185
    when: When presenting ArcticDB as a solution for time-series storage
    action: Claim it supports real-time streaming workloads requiring sub-millisecond latency
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: ArcticDB is a serverless embedded database that uses polling and HTTP/S3 operations; it cannot meet sub-millisecond
      latency requirements for high-frequency trading or ultra-low-latency streaming applications
  - id: finance-C-186
    when: When presenting ArcticDB as a solution for data storage
    action: Claim it supports unstructured document storage
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: ArcticDB is optimized for structured DataFrame storage (Pandas, PyArrow, Polars) with time-series indexing;
      it lacks document database capabilities like flexible schemas, nested JSON queries, or full-text search
  - id: finance-C-187
    when: When presenting ArcticDB as a solution for data storage
    action: Claim it supports applications requiring strong transactional guarantees on single-symbol operations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: ArcticDB lacks transaction isolation; write-after-read transactions are not supported, making it unsuitable
      for financial ledgers, inventory systems, or any use case requiring ACID compliance per symbol
  - id: finance-C-188
    when: When implementing deduplication logic in ArcticDB
    action: Only check dedup against the immediately previous version (version n-1), not any earlier version
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Deduplication checks only scan the previous live version; identical data in older versions will not be deduplicated,
      wasting storage space and causing incorrect deduplication assumptions
  - id: finance-C-189
    when: When using symbol list caching across multiple clients
    action: Synchronize system clocks via NTP or similar to verify timestamp ordering is consistent across clients
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without clock synchronization, the symbol list cache can diverge from reality if clients create/delete symbols
      at similar times, causing symbols to appear in list_symbols() but fail on read(), or vice versa
  - id: finance-C-190
    when: When creating a library with dynamic_schema disabled (the default)
    action: Maintain identical column names, column order, and data types across each write/update/append operations to the
      same symbol
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Dynamic schema disabled enforces immutable schema; mismatched columns or types across versions will cause
      write failures or data corruption
  - id: finance-C-191
    when: When storing timezone-aware timestamps on Windows with PyArrow or Polars output format
    action: Install the IANA timezone database on Windows before reading timezone-aware timestamps
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without the timezone database, PyArrow timezone conversion will fail with NormalizationException, preventing
      read operations on timezone-aware data when using PYARROW or POLARS output formats
  - id: finance-C-192
    when: When storing data with integer columns that may contain NaN values
    action: Use integer dtype for columns that will contain NaN or None values
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Integer columns with NaN will be automatically promoted to float64, causing type mismatches and potential
      downstream processing errors in type-sensitive applications
  - id: finance-C-193
    when: When reading time-series data with timezone-aware timestamps
    action: Preserve original timezone by using Pandas output format (PyArrow/Polars may fail if timezone cannot be resolved
      on the host system)
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Timezone restoration via PyArrow can fail if the timezone name cannot be resolved on the host system, especially
      on Windows or with older Pandas versions using pytz
    stage_ids:
    - read_operations
  - id: finance-C-194
    when: When storing categorical data with append or update operations
    action: Attempt append or update operations on symbols containing categorical columns
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Categorical data does not support append/update operations; attempting these will raise an exception, breaking
      data pipelines that assume continuous updates
  - id: finance-C-195
    when: When building systems using Python environments
    action: Claim ArcticDB supports non-Python programming languages for data access
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: ArcticDB only provides Python bindings; building systems expecting multi-language support (R, Julia, Java,
      etc.) will fail as no APIs exist for these languages
  - id: finance-C-196
    when: When querying ArcticDB data
    action: Expect SQL query support for data retrieval
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: ArcticDB does not support SQL; all data access requires Python API calls with DataFrame-like operations,
      limiting adoption in SQL-centric environments
  - id: finance-C-197
    when: When pickling data to ArcticDB
    action: Understand that pickled data cannot be index-sliced, column-sliced, updated, or appended
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Pickled data is stored as binary blobs, disabling all advanced ArcticDB features; read operations must load
      entire objects, causing severe performance degradation for large datasets
  - id: finance-C-198
    when: When configuring ArcticDB libraries with dedup enabled
    action: Verify new data is appended only at the end; data inserted at the start or middle will not be deduplicated
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Deduplication relies on segment hash matching; one-row offset prevents dedup, causing unnecessary storage
      growth and reduced deduplication effectiveness
  - id: finance-C-199
    when: When using the ConfigsMap singleton across multiprocessing contexts
    action: Call set_config_from_env_vars or reinitialize config in child processes after fork
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: In spawn/forkserver multiprocessing contexts, ConfigsMap singleton is merged not replaced; child processes
      may have stale or incorrect configuration leading to silent data routing errors
  - id: finance-C-200
    when: When normalizing data using the normalizer chain
    action: 'Follow the normalizer chain order: CustomNormalizer first, then CompositeNormalizer, then DataFrameNormalizer'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping or reordering the normalizer chain will cause normalization failures, data corruption, or incorrect
      type handling for custom data types
  - id: finance-C-201
    when: When storing nested dictionary structures with recursive normalizers
    action: Use dictionary keys containing the separator character ['__'] in nested data structures
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Recursive normalizers use '__' as internal separator for flattening nested structures; using '__' in dictionary
      keys will cause key collisions and data corruption during denormalization
  - id: finance-C-202
    when: When initializing ArcticDB libraries with default configuration
    action: Rely on implicit encoding version defaults — BD-107 and BD-005 declare contradictory defaults (V1 vs V2), making
      behavior dependent on import order or code path
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Implicit defaults cause silent encoding version mismatches where the same library may be initialized as V1
      or V2 depending on import order, corrupting data or causing read failures when expected encoding does not match actual
    derived_from_bd_id: BD-124
  - id: finance-C-203
    when: When creating an ArcticDB library
    action: Explicitly specify encoding_version parameter in LibraryOptions to override defaults and verify deterministic
      behavior regardless of import order
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit encoding_version, the contradictory defaults (V1 vs V2) cause initialization path-dependent
      behavior, leading to failed reads when expected encoding does not match what was actually used
    derived_from_bd_id: BD-124
  - id: finance-C-204
    when: When creating an ArcticDB library
    action: Verify the encoding version at library creation time — encoding version is determined at library creation and
      cannot be changed after the fact
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Encoding version set at library creation becomes immutable; attempting to use a different version later causes
      read/write incompatibility with existing data
    derived_from_bd_id: BD-002
  - id: finance-C-205
    when: When collecting results from a LazyDataFrame
    action: Recognize that collect() triggers actual read execution and side effects (including read timestamps) occur at
      this point — not at query construction time
    severity: high
    kind: domain_rule
    modality: must
    consequence: Assuming queries execute at construction time causes timing-dependent bugs where read timestamps reflect
      collect() time rather than query definition time, leading to inconsistent behavior in time-sensitive scenarios
    derived_from_bd_id: BD-016
  - id: finance-C-206
    when: When using library_tool for low-level storage operations
    action: Verify normalizer configuration matches between library_tool operations and normal data access paths — data bypassing
      the normalizer may not be portable across different normalizer configurations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Data written via library_tool bypassing the normalizer may be unreadable when accessed through the normalizer
      pipeline, causing silent data inaccessibility when normalizer settings change
    derived_from_bd_id: BD-118
  - id: finance-C-207
    when: When implementing data storage operations that depend on encoding version behavior
    action: Assume a single consistent default encoding version across each code paths — encoding version defaults vary between
      LibraryOptions (V1) and core encoding module (V2)
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming unified default encoding version causes cross-module compatibility failures when one code path uses
      V1 defaults and another expects V2
    derived_from_bd_id: BD-124
  - id: finance-C-208
    when: When implementing or refactoring data normalization logic in ArcticDB
    action: 'Maintain the fixed normalization fallback chain order: Arrow → MsgPack → Pickle; do not reorder, remove, or allow
      customization of this sequence'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying the normalization fallback chain (Arrow→MsgPack→Pickle) can cause silent data loss or serialization
      failures; complex objects that fail Arrow encoding may not be properly preserved by alternative fallback sequences
    derived_from_bd_id: BD-006
  - id: finance-C-209
    when: When implementing Arrow-based data normalization for pandas objects
    action: Preserve pandas metadata including index names and MultiIndex structure in the Arrow schema during normalization
      and deserialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Losing pandas metadata during Arrow normalization breaks round-trip compatibility; index names and MultiIndex
      structure become unrecoverable, causing silent data interpretation errors in downstream analysis
    derived_from_bd_id: BD-008
  - id: finance-C-210
    when: When configuring LibraryOptions for ArcticDB library initialization
    action: Verify that default options (dynamic_schema=False, dedup=False, rows_per_segment=100k) match the specific use
      case requirements before library creation; override only when the safety trade-offs are explicitly understood
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default LibraryOptions without verification can lead to schema rigidity (dynamic_schema=False) or excessive
      storage overhead (dedup=False) in production workloads, causing performance degradation and operational issues
    derived_from_bd_id: BD-003
  - id: finance-C-211
    when: When initializing a new ArcticDB library without explicit encoding_version specification
    action: Default to encoding_version=1 (V1); if using V2, document this choice explicitly as V2 is experimental and cannot
      be downgraded once a library contains V2-encoded data
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unintentional migration to V2 encoding creates irreversible format lock-in; if issues arise with V2 experimental
      format, the library cannot be downgraded to V1, potentially losing access to historical data
    derived_from_bd_id: BD-005
  - id: finance-C-212
    when: When implementing query expression handling using operator overloading in ArcticDB
    action: Maintain operator overloading semantics for QueryBuilder expressions (e.g., __lt__, __gt__, __getitem__) to enable
      Pandas-compatible boolean indexing syntax; operators must construct ExpressionNode trees for lazy evaluation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing or altering operator overloading in QueryBuilder breaks the natural Pandas-like query syntax (q[q['a']
      < 5]); replacing with method chaining requires rewriting all queries and changes the framework's query paradigm
    derived_from_bd_id: BD-018
  - id: finance-C-213
    when: When performing staged write operations in ArcticDB without explicit dynamic_strings specification
    action: Verify the dynamic_strings setting before executing staged writes; dynamic_strings=True is the default for staging
      operations but cannot be changed after data is written, affecting storage format irreversibly
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Accepting the dynamic_strings=True default without verification causes irreversible storage format changes;
      once data is written with dynamic strings, the format is locked, potentially causing compatibility issues with downstream
      static-string consumers
    derived_from_bd_id: BD-007
  - id: finance-C-214
    when: When implementing or refactoring version checking logic in arcticdb storage
    action: Maintain the __version__/__VER__ key checking mechanism for backward compatibility with V1 pickled types and V2
      class-reconstructed types — do not simplify or remove version detection logic
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing or simplifying version checking breaks backward compatibility, causing KeyError exceptions when
      reading V1 data with V2 code or silently corrupting type reconstruction for V2 data read with older releases
    derived_from_bd_id: BD-009
  - id: finance-C-215
    when: When configuring recursive normalizers for a library in arcticdb
    action: Explicitly evaluate the storage format implications before enabling recursive normalizers — verify that nested
      structures are supported by each downstream consumers of the data
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Enabling recursive normalizers changes how nested structures are stored with flattened keys; once written
      with flattening enabled, disabling after write has no effect on existing data, creating format inconsistency
    derived_from_bd_id: BD-011
  - id: finance-C-218
    when: When querying historical versions using as_of in arcticdb with libraries having deep version history
    action: Monitor version count for libraries with frequent writes — be aware that version linked-list structure creates
      O(n) traversal where n is version count, causing significant query latency for deep history
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Time-travel queries on libraries with thousands of versions suffer from O(n) traversal, causing queries to
      become increasingly slow as version history grows, with no warning until performance degradation is observed
    derived_from_bd_id: BD-129
  - id: finance-C-219
    when: When performing high-frequency delete operations on arcticdb symbols
    action: Monitor list_symbols performance for libraries with rapid deletion workloads — be aware that tombstones persist
      until 500-entry compaction threshold is reached, causing cache bloat and degraded list_symbols performance
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: High-frequency delete operations accumulate tombstones faster than 500-entry cache compaction triggers, causing
      list_symbols operations to process each tombstone marker and degrade performance gradually
    derived_from_bd_id: BD-130
  - id: finance-C-220
    when: When implementing operations that return LazyDataFrame or LazyDataFrameCollection from arcticdb queries
    action: Handle return values as proxy objects that defer computation — do not assume results are materialized; access
      methods must trigger actual data evaluation when needed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Treating LazyDataFrame proxies as materialized results causes operations to work with empty or unevaluated
      data structures, producing incorrect results or silent failures in downstream processing
    derived_from_bd_id: BD-122
  - id: finance-C-221
    when: When implementing symbol storage or key generation logic for symbols longer than 100 characters
    action: Use deterministic separator-based compaction (last-3-chars of each segment + hash) for symbols exceeding 100 characters
      to respect LMDB key size limits; the compaction must remain non-reversible (original symbol cannot be recovered from
      the compacted key)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing compaction to a reversible method or removing hash components risks LMDB key size violations or
      hash collisions, causing data corruption or storage failures when symbol keys exceed LMDB limits
    derived_from_bd_id: BD-010
  - id: finance-C-222
    when: When implementing write operations in ArcticDB version store
    action: Create a new version on every write operation regardless of data content; previous versions must remain accessible
      via 'as_of' parameter; identical consecutive writes must produce distinct versions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Implementing write deduplication or update-in-place logic breaks version history, preventing rollback, audit
      trails, and 'as_of' access to previous states; strategies relying on version semantics will fail
    derived_from_bd_id: BD-012
  - id: finance-C-223
    when: When configuring write operations for ArcticDB version store
    action: Verify that prune_previous_version is explicitly set to desired value before write operations; default behavior
      keeps each versions accessible via 'as_of'; explicit snapshot protection is required to prevent accidental deletion
      of specific versions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without verifying prune_previous_version settings, storage grows unbounded and users may lose track of which
      versions are protected by snapshots versus which are eligible for pruning
    derived_from_bd_id: BD-013
  - id: finance-C-224
    when: When configuring output format options across multiple precedence levels (Arctic instance, Library, Read operation)
    action: 'Verify the actual effective precedence: Arctic instance → Library → Read operation (left-to-right); operation-level
      settings override library-level, which override instance-level; be aware that resolve_defaults() at lower levels may
      reset to conservative defaults and override higher-level configurations'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without verifying precedence, users expecting instance-level format configuration to propagate to all operations
      may receive unexpected formats when low-level resolve_defaults() resets to conservative values, causing silent data
      interpretation errors
    derived_from_bd_id: BD-015
  - id: finance-C-225
    when: When implementing or calling get_description_batch for date range queries
    action: Use nanosecond precision for date range calculations to verify exact matching with stored data granularity; time
      range queries must preserve microsecond-level precision to prevent off-by-one errors in time-based filtering
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using second-level or millisecond precision in date range queries causes off-by-one errors, filtering out
      valid records or including invalid ones; for high-frequency financial time-series data, this results in incorrect backtest
      results and strategy performance metrics
    derived_from_bd_id: BD-053
  - id: finance-C-226
    when: When implementing last-X-percent date range computations for time-series queries
    action: Use TimestampNumber arithmetic for percentage-based date range calculations to verify consistent results across
      timezone configurations and pre/post-epoch boundaries; do not use fixed date ranges or string-based date parsing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-TimestampNumber arithmetic for percentile-based date ranges produces inconsistent results across
      timezones and epoch boundaries, causing backtest-live inconsistency in financial time-series strategies that depend
      on precise date range semantics
    derived_from_bd_id: BD-078
  - id: finance-C-227
    when: When configuring output format at multiple precedence levels and using resolve_defaults()
    action: Verify that high-level (Arctic instance, Library) output format configurations are not silently overridden by
      low-level resolve_defaults() calls that reset to conservative False values; document the actual effective configuration
      after precedence resolution
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Configuration precedence conflicts cause high-level format settings to be silently overridden by low-level
      defaults, producing output in unexpected formats and causing data interpretation errors in downstream processing
    derived_from_bd_id: BD-132
  - id: finance-C-228
    when: When migrating away from deprecated URI-embedded credentials and configuring AWS connections
    action: 'Verify that AWS credential configuration aligns with security posture: if explicit configuration is required,
      verify auto-discovery (BD-066) is disabled or documented; if auto-discovery is expected, verify deprecated URI credentials
      are fully removed to avoid silent fallback'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Misaligned credential handling causes security policy violations (deprecated URI credentials still active)
      or authentication failures (credentials expected but auto-discovery disabled), leading to connection failures or unintended
      security exposure
    derived_from_bd_id: BD-133
  - id: finance-C-232
    when: When configuring QueryBuilder optimization mode for processing large financial datasets
    action: Verify that the default speed optimization mode has sufficient RAM available for the dataset size; when dataset
      approaches or exceeds available memory, switch to memory optimization mode to avoid out-of-memory failures
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using speed optimization mode on large datasets without sufficient RAM causes out-of-memory errors, leading
      to query failures that prevent timely data access in time-sensitive trading scenarios
    derived_from_bd_id: BD-020
  - id: finance-C-233
    when: When managing symbol lists that grow dynamically over time
    action: Monitor symbol list size and be aware that compaction occurs at 500 entries threshold, incurring write overhead;
      adjust caching strategy if symbol count consistently exceeds threshold
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Unbounded symbol list growth without awareness of the 500-entry compaction threshold leads to unexpected
      write overhead during compaction operations, degrading query performance for symbol listing operations
    derived_from_bd_id: BD-023
  - id: finance-C-234
    when: When configuring segment tile size for read performance versus compression efficiency trade-offs
    action: 'Evaluate access patterns: smaller tiles (100k rows × 127 cols default) enable selective date_range and column
      subsetting but reduce compression efficiency; larger tiles improve compression ratios but may require full segment reads
      for selective access'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default tile sizes without considering actual access patterns leads to either inefficient selective
      reads when small tiles require full scans, or poor compression when large tiles are used with selective column access
    derived_from_bd_id: BD-025
  - id: finance-C-235
    when: When implementing subclasses that override _safe_enter or _safe_exit context manager methods
    action: Separate resource allocation that requires __exit__ cleanup into _safe_enter, and place initialization that can
      safely fail into separate methods; do not mix allocation with fallible initialization in _safe_enter
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrectly overriding _safe_enter causes __exit__ to run on uninitialized resources, leading to AttributeError
      exceptions and resource leaks that cascade into broader system failures during error recovery
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-236
    when: When implementing or refactoring storage layer logic
    action: Collapse or merge the 4-layer storage hierarchy (Reference Layer → Version Layer → Index Layer → Data Layer) into
      fewer layers
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Collapsing the storage hierarchy mixes mutable pointers with immutable data, breaking consistency guarantees
      across layer boundaries and causing silent data corruption in versioned reads
    derived_from_bd_id: BD-024
  - id: finance-C-237
    when: When implementing version query logic for historical reads
    action: Replace the linked list version history with indexed version storage or hash-based lookups
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Using indexed versions breaks the O(n) traversal guarantee and may introduce consistency issues with the
      immutable linked list contract, causing as_of queries to return incorrect historical states
    derived_from_bd_id: BD-026
  - id: finance-C-238
    when: When implementing or configuring defragmentation operations
    action: Set defragmentation factor to 1 or less
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Setting defragmentation factor to 1 creates a no-op operation that consumes resources without reducing segment
      count or storage usage, wasting CPU and I/O cycles on meaningless compaction
    derived_from_bd_id: BD-038
  - id: finance-C-239
    when: When configuring segment size defaults for data storage operations
    action: Verify that rows_per_segment=100,000 matches available memory constraints and adjust if running in memory-constrained
      environments (use 10K-50K) or high-throughput batch scenarios (use 500K-1M)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 100,000-row segments in memory-constrained environments may cause OOM errors, while using it for high-throughput
      batch writes may cause excessive overhead from metadata and system calls
    derived_from_bd_id: BD-027
  - id: finance-C-240
    when: When implementing version pruning logic for write operations
    action: Verify that prune_previous_versions=False is intentional for audit trail requirements, or explicitly set to True
      if storage cost reduction is needed with full understanding of irreversible data deletion
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Accidentally enabling version pruning causes permanent deletion of historical versions, breaking audit trails
      and time-travel queries required for financial compliance and data forensics
    derived_from_bd_id: BD-028
  - id: finance-C-243
    when: When implementing column name validation logic in dynamic_schema mode
    action: Allow multiple None columns in the schema — the framework rejects multiple None columns at normalization time
      to prevent ambiguous column identification
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Allowing multiple None columns causes ambiguous column identification during data retrieval, leading to unpredictable
      query results and potential data corruption in downstream analytical pipelines
    derived_from_bd_id: BD-062
  - id: finance-C-244
    when: When implementing column name normalization logic for empty string columns
    action: Rename empty string columns to __empty__ prefix during normalization — preserve the data while ensuring valid
      column names for storage and query operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without renaming empty string columns, storage operations may fail or produce invalid column names, causing
      query errors and preventing data retrieval in dynamic schema mode
    derived_from_bd_id: BD-063
  - id: finance-C-245
    when: When implementing column name validation in dynamic_schema mode
    action: Allow duplicate column names in the schema — the framework rejects duplicates to maintain data integrity and predictable
      column access
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Allowing duplicate column names causes ambiguous column references during data retrieval, leading to unpredictable
      results where the same column name may return different values across queries
    derived_from_bd_id: BD-064
  - id: finance-C-246
    when: When implementing column name normalization for integer-indexed DataFrames
    action: Preserve integer column names with is_int metadata flag during normalization — verify exact reconstruction of
      original DataFrames for pandas compatibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Converting integer column names to strings without preserving the is_int flag breaks pandas round-trip compatibility,
      causing data loss or transformation errors when DataFrames are stored and retrieved
    derived_from_bd_id: BD-065
  - id: finance-C-247
    when: When configuring compact_incomplete operations for large symbols
    action: Verify via_iteration setting based on symbol size expectations — default of True prevents OOM failures for large
      symbols but trades speed for guaranteed completion; disable only for small, memory-safe symbols
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Disabling iterative compaction by default for large symbols causes memory exhaustion during compaction, leading
      to OOM failures and interrupted operations that leave data in an inconsistent state
    derived_from_bd_id: BD-035
  - id: finance-C-248
    when: When configuring compact_incomplete operations with failure handling
    action: Verify delete_staged_data_on_failure setting based on debugging requirements — default of False preserves debugging
      evidence but leaves temporary data; set to True only when automatic cleanup is explicitly required
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Enabling automatic deletion on failure by default removes debugging evidence for interrupted compaction operations,
      making it difficult to diagnose the root cause of failures and recover partial data
    derived_from_bd_id: BD-036
  - id: finance-C-252
    when: When implementing query builder modification logic in ArcticDB
    action: Deep copy the query builder before modification — verify callers retain their original query state and prevent
      shared mutable state
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying the query builder without deep copying mutates shared state, causing subtle bugs where subsequent
      operations use unexpected query parameters and produce incorrect results
    derived_from_bd_id: BD-067
  - id: finance-C-253
    when: When implementing symbol list compaction operations
    action: Acquire storage lock before performing symbol list compaction — verify atomic updates to the symbol list and prevent
      race conditions with concurrent operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Running symbol list compaction without storage locks introduces race conditions where concurrent modifications
      corrupt the symbol list structure, making data inaccessible or causing silent data loss
    derived_from_bd_id: BD-069
  - id: finance-C-254
    when: When implementing timezone handling for Pandas 2.0+ compatibility
    action: Normalize each timezone-aware data to pytz.UTC before storage in ArcticDB — verify consistent timezone representation
      across different Pandas versions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-pytz.UTC timezones with Pandas 2.0+ causes timezone incompatibilities when data is read by different
      Pandas versions, leading to incorrect datetime comparisons and analysis errors
    derived_from_bd_id: BD-071
  - id: finance-C-255
    when: When implementing batch append operations across multiple symbols
    action: Implement batch append as non-atomic across symbols — allow partial success when individual symbols fail, enabling
      error handling strategies like retry-only-failed-symbols
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Forcing full atomicity on batch appends causes head-of-line blocking where one symbol failure prevents all
      other symbols from being written, degrading throughput and complicating error recovery
    derived_from_bd_id: BD-072
  - id: finance-C-256
    when: When implementing empty dataframe append logic with write_if_missing
    action: Emit a warning when appending an empty dataframe that creates a new version — alert users to potentially unintended
      behavior while allowing the operation to proceed
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Silently appending empty dataframes creates new versions without data, causing confusion in version history
      and breaking downstream pipelines that expect data in every version
    derived_from_bd_id: BD-073
  - id: finance-C-257
    when: When configuring defragmentation behavior in ArcticDB
    action: Verify that the 0.9 (90%) defragmentation threshold matches storage efficiency requirements for the target workload
      — adjust threshold if fragmentation or defragmentation CPU overhead becomes problematic
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using the default 0.9 threshold may cause excessive defragmentation frequency and CPU overhead for write-heavy
      workloads, or insufficient defragmentation for read-heavy workloads leading to storage inefficiency
    derived_from_bd_id: BD-037
  - id: finance-C-258
    when: When using head() and tail() operations for data preview in ArcticDB
    action: Verify that the default 5 rows provides sufficient preview for the data schema — use explicit n parameter if a
      different preview size is needed for wide or complex tables
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Relying on the default 5 rows for head/tail may return incomplete previews that miss important data patterns
      in wide tables, causing users to make incorrect assumptions about data structure
    derived_from_bd_id: BD-039
  - id: finance-C-259
    when: When reading string data from ArcticDB with pandas-dependent downstream code
    action: Verify that the default Arrow-native string type (force_strings_to_object=False) is compatible with downstream
      consumers — explicitly enable string-to-object conversion if pandas object types are required
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Disabling string-to-object conversion preserves Arrow-native strings which may cause type errors in pandas-dependent
      code expecting object types, breaking data pipelines silently
    derived_from_bd_id: BD-040
  - id: finance-C-260
    when: When reading string data from ArcticDB with memory-constrained environments
    action: Verify that the default no-optimization setting (optimise_string_memory=False) matches memory requirements — explicitly
      enable string memory optimization (dictionary encoding) for memory-constrained workloads
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Disabling string memory optimization stores strings in original encoding which may consume excessive memory
      in large-scale string data scenarios, causing out-of-memory errors on constrained systems
    derived_from_bd_id: BD-041
  - id: finance-C-261
    when: When deploying ArcticDB with network storage in production environments
    action: Use NFS layout for production workloads — NFS does not provide durability guarantees required for production data
      storage; only use NFS layout for testing purposes
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Deploying to NFS in production risks data loss and corruption since NFS lacks durability guarantees; production
      systems must use S3 or Azure storage adapters which provide durability guarantees
    derived_from_bd_id: BD-075
  - id: finance-C-262
    when: When implementing or refactoring library tool overwrite operations in maintenance scripts
    action: Execute overwrite operations with extreme caution and explicit operator acknowledgment — implement manual review
      gates or safety confirmations before destructive operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Overwrite operations are destructive and can cause permanent data loss from script errors or misconfiguration;
      without careful handling, automated maintenance scripts may accidentally destroy valuable version history
    derived_from_bd_id: BD-076
  - id: finance-C-263
    when: When implementing read operations with sparse data handling
    action: Verify that sparse defaults are disabled (False) for production read operations — if enabled, missing sparse values
      could be misinterpreted as explicit zeros or nulls
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Sparse-aware reads enabled by default can cause subtle data interpretation bugs where missing values are
      silently converted to zeros, leading to incorrect analytical results in production pipelines
    derived_from_bd_id: BD-043
  - id: finance-C-264
    when: When implementing read operations that may encounter incomplete data segments
    action: Verify that incomplete data reading defaults to disabled (False) — enable only with explicit error handling for
      missing segments
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Returning partial data by default causes silent data loss in analytical pipelines where downstream systems
      may process incomplete results without detecting gaps
    derived_from_bd_id: BD-044
  - id: finance-C-265
    when: When implementing dataframe normalization in write operations
    action: Verify that empty types are rejected (default False) in normalization — empty-type columns can cause serialization
      failures and query ambiguities
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Empty-type columns allowed by default can cause serialization errors or silent type inference failures, leading
      to data corruption that is difficult to debug in production
    derived_from_bd_id: BD-045
  - id: finance-C-266
    when: When configuring AWS authentication for S3 storage adapters
    action: Explicitly configure AWS authentication before accessing S3 — AWS authentication is disabled by default following
      least-privilege principles
    severity: high
    kind: domain_rule
    modality: must
    consequence: Relying on implicit AWS credential detection exposes credentials unintentionally or causes authentication
      failures when credentials are expected but not configured
    derived_from_bd_id: BD-046
  - id: finance-C-267
    when: When configuring S3 connection security for production environments
    action: Enable SSL/TLS (set to True) for production S3 connections — SSL is disabled by default to reduce overhead for
      local testing, but production must use HTTPS
    severity: high
    kind: operational_lesson
    modality: must
    consequence: SSL disabled for production S3 connections exposes data in transit to interception attacks; while disabled
      by default for local storage compatibility, production deployments must explicitly enable SSL
    derived_from_bd_id: BD-047
  - id: finance-C-268
    when: When implementing or refactoring resampling frequency validation logic
    action: Verify frequency values are validated to fit within 64-bit signed integer bounds before performing timedelta calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Integer overflow in timedelta calculations causes silent incorrect results or runtime crashes when users
      specify extremely large frequency values during resampling operations
    derived_from_bd_id: BD-097
  - id: finance-C-269
    when: When implementing dense row count prediction for resampling test generation
    action: Use integer division with floor semantics (Python's // operator) to predict dense row counts from timedelta values
      — verify consistent rounding behavior matches the hypothesis test oracle expectations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using ceiling division or floating-point division for dense row count prediction causes the test oracle to
      validate against incorrect expected values, resulting in false negative test failures
    derived_from_bd_id: BD-098
  - id: finance-C-270
    when: When implementing or refactoring defragmentation batch update operations
    action: Verify upsert mode defaults to True during defragmentation — updated data must overwrite existing versions rather
      than creating duplicates to maintain the single-version-per-symbol invariant
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Changing upsert to False during defrag causes duplicate versions to accumulate per symbol, inflating storage
      costs and violating the one-version-per-symbol data integrity guarantee
    derived_from_bd_id: BD-057
  - id: finance-C-271
    when: When implementing DataFrame index normalization logic for serialization
    action: Default to 'index' as the index name when the DataFrame has no explicit index name — verify that any changes to
      the default index name maintain backward compatibility with existing serialized data
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Changing the default index name from 'index' causes incompatibility with previously serialized data, resulting
      in incorrect deserialization or missing index metadata in restored DataFrames
    derived_from_bd_id: BD-058
  - id: finance-C-272
    when: When implementing or configuring symbol fragmentation detection logic
    action: Use a segment count threshold of 100 for triggering defragmentation in is_symbol_fragmented — changing this threshold
      without empirical validation may cause either excessive compaction overhead or missed fragmentation opportunities
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Suboptimal fragmentation threshold causes either unnecessary compaction cycles that waste CPU and I/O resources,
      or under-compaction that leaves symbols fragmented and degrades query performance
    derived_from_bd_id: BD-070
  - id: finance-C-273
    when: When implementing or refactoring GCP S3 storage fixtures in ArcticDB
    action: Maintain the separate GcpHostDispatcherApplication class for GCP S3-compatible API - do not consolidate GCP and
      standard S3 handling since GCP's API lacks batch delete operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Consolidating GCP and standard S3 handling hides real behavior differences; tests will pass but production
      GCP deployments will fail when batch delete is attempted
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-274
    when: When implementing cloud storage detection in ArcticDB test infrastructure
    action: Detect real cloud storage exclusively from environment variables - never from config files, CLI arguments, or
      interactive prompts in test context
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Adding config file or prompt-based detection breaks CI determinism; tests may behave differently based on
      local developer configuration, causing flaky or non-reproducible test failures
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-275
    when: When modifying installation tests for ArcticDB storage backends
    action: Preserve test coverage for deduplicated batch writes, parallel writes with appends, and stage/finalize patterns
      with chunking - these are core ArcticDB features that must be validated across each storage backend
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing or modifying these test patterns allows storage-specific bugs to go undetected; cloud-specific behaviors
      in concurrent access patterns will only surface in production
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-277
    when: When refactoring storage client creation in ArcticDB installation tests
    action: Maintain the client factory pattern via create_arctic_client function - do not inline storage creation logic or
      hardcode storage-specific features in test code
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Breaking the factory pattern couples tests to specific storage backends; the same test cannot run against
      multiple backends, requiring separate test copies and missing cross-backend compatibility issues
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-278
    when: When configuring encoding version for data writes in ArcticDB
    action: Verify encoding version is explicitly set when required; be aware that DEFAULT_ENCODING_VERSION=V2 means new writes
      use V2 format by default while V1 remains fully readable - explicitly opt into V1 only when V1 compatibility is required
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Implicit reliance on default encoding version causes confusion during migration; V2 data written by default
      may be incompatible with tooling expecting V1 format, causing read failures in legacy systems
    derived_from_bd_id: BD-104
  - id: finance-C-279
    when: When implementing or extending data normalization in ArcticDB
    action: 'Follow the three-tier normalizer chain order: CustomNormalizer → CompositeNormalizer → DataFrameNormalizer -
      do not reorder or bypass tiers as each handles a specific data category with priority'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing normalizer evaluation order causes wrong normalizer to handle data; user-defined types may be incorrectly
      processed by DataFrameNormalizer instead of CustomNormalizer, resulting in data corruption or serialization failures
    derived_from_bd_id: BD-106
  - id: finance-C-280
    when: When configuring write options for ArcticDB operations
    action: Use the resolve_defaults() pattern with explicit False defaults - do not use None as default value for write options;
      always explicitly opt into behaviors rather than relying on implicit None handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using None instead of explicit False creates ambiguous option state; different code paths may interpret None
      differently, causing inconsistent write behaviors that silently corrupt data or produce unexpected results
    derived_from_bd_id: BD-111
  - id: finance-C-281
    when: When using the flattener module for nested data structures in ArcticDB
    action: Be aware that flattener metastructure v2 is the default; verify v2 compatibility when working with legacy data
      or tooling that only supports v1 encoding - v1 flattened data remains readable by v2
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Unaware use of v2 default causes incompatibility with systems expecting v1 encoding; nested structures flattened
      with v2 may not be readable by legacy tools, causing silent data unavailability
    derived_from_bd_id: BD-114
  - id: finance-C-282
    when: When implementing or refactoring S3 bucket access fixtures in arcticdb
    action: Preserve the lazy singleton pattern in S3Bucket.get_boto_bucket (python/arcticdb/storage_fixtures/s3.py:171) to
      maintain thread-safe lazy initialization; must_not replace with eager initialization as this would add connection overhead
      for each tests, including those that never use bucket operations
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Replacing lazy singleton with eager initialization adds connection overhead to all test cases, even those
      that never access bucket operations, causing unnecessary test slowdown without providing thread-safety benefits
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-283
    when: When implementing append operation logic in ArcticDB
    action: Enable index validation by default — keep validate_index=False as the default parameter to avoid significant performance
      overhead on append-heavy workloads
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Enabling index validation by default introduces significant performance overhead on append operations, causing
      throughput degradation in high-volume data pipelines and live trading data ingestion scenarios
    derived_from_bd_id: BD-032
  - id: finance-C-284
    when: When implementing batch append operation logic in ArcticDB
    action: Set write_if_missing=False as the default — keep write_if_missing=True as the default parameter to verify missing
      symbols are created automatically without silent failures
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Setting write_if_missing=False by default causes silent data loss when symbols don't pre-exist, creating
      backtest data gaps that accumulate silently and produce incorrect strategy performance metrics
    derived_from_bd_id: BD-033
  - id: finance-C-285
    when: When processing timezone data during serialization in data_normalization
    action: Convert ZoneInfo timezone objects to strings before storage using _ensure_str_timezone; do not preserve original
      ZoneInfo objects
    severity: high
    kind: domain_rule
    modality: must
    consequence: ZoneInfo objects pickled in modern Python versions fail to deserialize in older versions, causing permanent
      data loss and serialization failures when data is accessed across different Python environments
    derived_from_bd_id: BD-059
  - id: finance-C-286
    when: When normalizing timezone data in data_normalization
    action: Coerce each UTC timezone representations (datetime.timezone.utc, pytz.UTC, ZoneInfo('UTC')) to the string 'UTC'
      for consistent storage and comparison
    severity: high
    kind: domain_rule
    modality: must
    consequence: Different UTC instantiations (pytz.UTC, datetime.timezone.utc, ZoneInfo) compare as unequal despite representing
      the same instant, causing silent inconsistencies in financial timestamp comparisons and settlement calculations
    derived_from_bd_id: BD-060
  - id: finance-C-287
    when: When validating column and index names during data_normalization
    action: Restrict each column and index names to str or int types only; reject tuples, floats, or other complex types at
      validation via _check_valid_name
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-str/int name types cause serialization failures in ArcticDB storage, leading to data write errors and
      potential loss of entire DataFrames due to invalid column or index naming
    derived_from_bd_id: BD-061
  - id: finance-C-288
    when: When implementing timestamp handling in ArcticDB backtesting operations
    action: Assume the framework supports timestamps outside datetime64[ns] resolution; each time indexes must be convertible
      to nanosecond precision as defined by _NS_DTYPE
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Attempting to store or process timestamps with millisecond, second, or date resolution without conversion
      causes type mismatches and silent data truncation, producing incorrect backtest timestamps
    derived_from_bd_id: BD-108
  - id: finance-C-289
    when: When implementing or refactoring the query processing pipeline for filter/projection/aggregation operations
    action: Maintain Expression AST with C++ operator dispatch — do not replace with row-by-row Python iteration or alternative
      approaches
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Replacing C++ dispatch with Python iteration causes 100-1000x performance degradation in high-throughput
      streaming scenarios, making the system unusable for production workloads
    derived_from_bd_id: BD-086
  - id: finance-C-290
    when: When implementing or modifying query optimization logic in arcticdb.version_store.processing
    action: Preserve both SPEED and MEMORY optimization modes — do not consolidate to a single fixed mode
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: 'Consolidating to a single mode forces unsuitable defaults for deployment environments: memory-constrained
      edge devices may experience OOM failures while high-memory servers suffer unnecessary performance penalties'
    derived_from_bd_id: BD-087
  - id: finance-C-291
    when: When implementing or modifying query predicate processing with integer constants
    action: Use min_scalar_type() to minimize integer types to the smallest sufficient width — do not use fixed 64-bit integers
      for each integer values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fixed 64-bit integers wastes 50-75% memory in common cases, particularly in high-cardinality isin queries
      where storage savings multiply across millions of rows
    derived_from_bd_id: BD-088
  - id: finance-C-292
    when: When implementing data normalization logic for float columns
    action: Use math.isnan() for float NaN detection — do not replace with pd.isna() which may handle non-float NA types differently
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using pd.isna() instead of math.isnan() causes inconsistent null detection for float NaN values, leading
      to data integrity issues in numeric columns during normalization
    derived_from_bd_id: BD-093
  - id: finance-C-293
    when: When implementing or modifying test data generation for benchmark scenarios
    action: Use Bernoulli mask for sparse data generation with configurable sparsity probability — do not replace with fixed
      sparse patterns
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using fixed sparse patterns fails to test varying sparsity levels (1%, 10%, 50%), missing validation of compression
      effectiveness and sparse-read optimizations across different data distributions
    derived_from_bd_id: BD-094
  - id: finance-C-294
    when: When implementing streaming data processing in ArcticDB where finalize() transitions data from APPEND_DATA to APPEND_REF
      state
    action: Skip, bypass, or optimize away the finalize() call — the two-phase commit pattern must complete before data becomes
      readable
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Without finalize(), streams remain in APPEND_DATA state and reads can access incomplete data, causing silent
      data corruption in backtests and downstream analytics
    derived_from_bd_id: BD-112
  - id: finance-C-296
    when: When implementing snapshot and version pruning logic in ArcticDB
    action: Log or warn when prune_previous_version=True cannot execute due to snapshot protection — snapshot-protected versions
      must not be deleted regardless of pruning configuration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Users who explicitly configure prune_previous_version=True may believe pruning is active while snapshot protection
      silently blocks deletion, causing unexpected storage growth in multi-tenant systems
    derived_from_bd_id: BD-128
  - id: finance-C-298
    when: When configuring MongoDB test infrastructure in ArcticDB
    action: Verify MongoDB connection explicitly rather than relying solely on the auto-detection fallback chain (CI_MONGO_HOST
      → localhost → random port spawn)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The auto-detection fallback chain can cause test failures or conflicts when localhost MongoDB instances conflict
      with existing installations, leading to wasted test runtime and non-deterministic behavior
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-299
    when: When configuring service startup retry parameters for test infrastructure
    action: Verify that timeout=20s and polling_interval=0.2s match the expected cold-start variance of the target deployment
      environment before using default values
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default timeout and polling values without environment-specific verification may cause tests to either
      hang excessively on slow systems or fail prematurely on fast systems, leading to inconsistent CI results across different
      runners
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-300
    when: When creating storage fixtures with library names in test code
    action: Understand that same lib_name returns the same underlying storage; explicitly clear or reset state between tests
      if isolation is required, and do not assume that calling with the same lib_name produces fresh storage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Tests assuming that repeated lib_name usage creates fresh storage will experience test pollution where data
      from one test leaks into another, causing flaky tests and incorrect test results that mask real bugs
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-301
    when: When implementing storage failure injection tests using mock S3
    action: Use mock_s3_with_error_simulation with symbol name-based error patterns for targeted failure testing; do not rely
      on general mock fixtures for storage failure injection
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using general mock fixtures instead of symbol name-based error simulation causes targeted storage failure
      tests to fail silently, leaving error handling code untested and allowing production outages to go undetected
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-303
    when: When implementing temporary path cleanup logic in test infrastructure
    action: Emit a warning (not an exception) when rmtree cleanup fails to distinguish test bugs from external interference
      like concurrent processes accessing the same paths
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing cleanup to fail-fast on rmtree errors causes tests to fail due to concurrent process interference
      rather than actual test bugs, generating CI noise and hiding real issues that need investigation
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-306
    when: When starting work in an area of the codebase
    action: Read the relevant Claude-maintained documentation in docs/claude/ before modifying related code
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Skipping documentation review may cause implementation misalignment with established architecture patterns
      and conventions
    stage_ids:
    - global
  - id: finance-C-307
    when: When attempting to modify files inside submodule directories
    action: Edit files inside submodule directories directly; instead update the submodule reference to the desired commit
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Direct edits to submodule files get lost on submodule updates and create inconsistent dependency states
    stage_ids:
    - global
  - id: finance-C-308
    when: When posting any inline review comment
    action: Check existing comments for an entry with the same path and line before posting; skip if human or previous Claude
      comment exists
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate comments create noise, confuse authors, and reduce review signal quality
  - id: finance-C-309
    when: When posting inline review comments
    action: Post inline comments only on lines present in the delta diff, not on the full diff
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Posting comments on unchanged lines wastes author time and creates noise for already-reviewed code
  - id: finance-C-310
    when: When running any make target or Python-dependent command
    action: Activate the virtual environment using 'source $(make activate NAME=<name>)' before executing the command
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Running without activated venv causes wrong Python interpreter, missing packages, and build/test failures
    stage_ids:
    - global
  - id: finance-C-311
    when: When making code changes to ArcticDB
    action: Run 'make lint' to enforce code style after completing the code changes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping lint after code changes causes style violations to accumulate, blocking CI and reducing code quality
    stage_ids:
    - global
  - id: finance-C-312
    when: When writing commit messages for ArcticDB
    action: Add 'Generated with AI' or 'Co-Authored-By' lines to commit messages
    severity: low
    kind: rationalization_guard
    modality: must_not
    consequence: AI attribution lines in commits violate project conventions and may cause commit history pollution
    stage_ids:
    - global
  - id: finance-C-313
    when: When upgrading dependencies via vcpkg submodule
    action: 'Follow the ordered sequence: (1) fetch and checkout vcpkg commit, (2) update version override in cpp/vcpkg.json,
      (3) rebuild'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping version override update causes vcpkg to fetch wrong dependency version, leading to build failures
      or runtime errors
    stage_ids:
    - global
  - id: finance-C-314
    when: When updating PR review summary for synchronize events with existing sticky summary
    action: Update only checklist items affected by the delta diff, leaving unaffected items unchanged
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Regenerating the entire summary loses prior review context and increases cognitive load for the author
  - id: finance-C-315
    when: When PR review detects synchronize event with delta diff available
    action: Evaluate only the delta diff against guidelines, not the full diff
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Evaluating full diff wastes time reviewing unchanged code that was already addressed in prior reviews
  - id: finance-C-316
    when: When delta diff is empty or BEFORE_SHA fetch fails
    action: Fetch the full diff and use it for both inline comments and summary as fallback
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Failing to fetch full diff as fallback leaves review incomplete and blocks PR feedback
  - id: finance-C-317
    when: When PR_NUMBER and $ARGUMENTS are both unset in local review mode
    action: Detect PR number from current branch using 'gh pr view --json number -q .number'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing PR number causes review to fail entirely, blocking the review workflow
  - id: finance-C-318
    when: When initiating a PR review for opened, reopened, or ready_for_review events
    action: Fetch the full diff using 'gh pr diff <PR_NUMBER>' and evaluate against each guidelines
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using delta diff on initial review events misses all changes, leaving critical issues undetected
  - id: finance-C-319
    when: When writing or modifying public V1 or V2 APIs
    action: Highlight API changes affecting public APIs in the PR description to alert reviewers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Undocumented API changes may be merged without proper review, causing downstream breakage
    stage_ids:
    - global
  - id: finance-C-320
    when: When data written by newer ArcticDB clients needs to be read by older clients
    action: 'Verify forward compatibility: new client writes must remain readable by older client versions'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Breaking forward compatibility causes data loss when users downgrade or use older tools
    stage_ids:
    - global
  - id: finance-C-321
    when: When running PR review without event context
    action: Fetch full diff and post fresh summary checklist (treat as initial review)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using wrong review mode leaves review incomplete or produces incorrect scope analysis
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
