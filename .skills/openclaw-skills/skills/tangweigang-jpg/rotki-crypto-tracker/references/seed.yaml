resources:
  packages:
  - name: pandas
    version_pin: ==1.5.3
  - name: numpy
    version_pin: ==1.24.4
  - name: matplotlib
    version_pin: '>=2'
  - name: requests
    version_pin: ==2.31.0
  - name: scipy
    version_pin: '>=1.3.0'
  - name: scikit-learn
    version_pin: '>1.4.2'
  - name: pytest
    version_pin: '>=8.3'
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing API endpoint responses
    action: 'Wrap each responses in {''result'': ..., ''message'': ...} structure'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Frontend clients expect the standard wrapper format. Missing 'result' or 'message' keys causes client-side
      parsing errors and unhandled exceptions in consuming applications.
    stage_ids:
    - api_layer
  - id: finance-C-002
    when: When implementing async API endpoints
    action: 'Decorate endpoints with @async_api_call() and return {''result'': ..., ''message'': ...} dict'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without the decorator, async tasks cannot be tracked via query_tasks_outcome(). Clients receive incomplete
      responses and have no way to poll for completion status.
    stage_ids:
    - api_layer
  - id: finance-C-004
    when: When handling user login operations
    action: Protect login operations with @login_lock() decorator to prevent race conditions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Concurrent login attempts without the lock cause race conditions in user unlock logic. Multiple greenlets
      may simultaneously modify user session state, leading to authentication bypass or data corruption.
    stage_ids:
    - api_layer
  - id: finance-C-017
    when: When writing JSON responses
    action: Use process_result() serializer before json.dumps() to handle Decimal/FVal types
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Raw Decimal values raise TypeError in json.dumps(). Clients receive 500 errors instead of valid JSON, breaking
      all API integrations.
    stage_ids:
    - api_layer
  - id: finance-C-023
    when: When exposing service layer methods via API
    action: Route each requests through RestAPI class which acts as facade to core functionality
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing RestAPI breaks authentication, task tracking, and error handling. Anonymous requests can access
      internal services, causing security vulnerabilities.
    stage_ids:
    - api_layer
  - id: finance-C-026
    when: When querying historical balance data at a specific block
    action: Route queries through archive nodes only, not pruned nodes
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Historical balance queries at non-'latest' blocks will return incorrect data or fail entirely when routed
      to pruned nodes that lack historical state
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-027
    when: When querying EVM contract state via RPC
    action: Use ChecksumEvmAddress format for each address parameters
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-checksummed addresses cause InvalidAddress exceptions from RPC nodes, resulting in RemoteError and failed
      data collection
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-030
    when: When querying RPC nodes with no prior connection
    action: Establish connection via attempt_connect before using node in query loop
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unconnected nodes cause RemoteError with no fallback, halting all blockchain data collection for affected
      chain
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-056
    when: When implementing event decoding rules for EVM transaction logs
    action: match events using log topics[0] as the primary identifier rather than transaction hashes
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Topic-based matching is essential for handling nested contract calls and internal transactions; hash-based
      matching would cause the decoder to miss nested interactions and produce incomplete event histories
    stage_ids:
    - transaction_decoding
  - id: finance-C-058
    when: When processing swap events from DeFi protocol interactions
    action: generate paired SPEND and RECEIVE events with optional FEE identified, conforming to TRADE event type structure
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Swap events require proper SPEND+RECEIVE pairing for accurate PnL calculation; incomplete or unordered swap
      groups result in failed swap processing and incorrect trading history records
    stage_ids:
    - transaction_decoding
  - id: finance-C-059
    when: When implementing protocol-specific EVM decoders
    action: inherit from EvmDecoderInterface and implement required abstract methods for decoding_rules and addresses_to_counterparties
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Protocol decoders must conform to the EvmDecoderInterface contract to participate in the plug-and-play decoder
      architecture; non-conforming decoders will not be registered and their protocol interactions will not be decoded
    stage_ids:
    - transaction_decoding
  - id: finance-C-065
    when: When decoding ERC20 and ERC721 token transfers
    action: use token_normalized_value to convert raw amounts according to the token's decimals property
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Raw token amounts are stored as integers with chain-specific precision; without proper normalization, decoded
      amounts will be orders of magnitude incorrect and PnL calculations will be meaningless
    stage_ids:
    - transaction_decoding
  - id: finance-C-067
    when: When decoding protocol-specific swap events
    action: generate TRADE event_type with SPEND/RECEIVE/FEE subtypes rather than generic SPEND/RECEIVE to enable swap grouping
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: The _process_swaps method filters for HistoryEventType.TRADE events; using generic SPEND/RECEIVE types will
      prevent swaps from being grouped and processed correctly, resulting in duplicate or missing swap events
    stage_ids:
    - transaction_decoding
  - id: finance-C-099
    when: When creating HistoryBaseEntry instances
    action: use only valid event type and subtype combinations defined in EVENT_CATEGORY_MAPPINGS
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid type/subtype pairs cause get_event_direction to return None, breaking event direction classification
      for accounting and balance tracking
    stage_ids:
    - history_event_management
  - id: finance-C-102
    when: When processing re-decode operations
    action: overwrite user-modified events marked as CUSTOMIZED without explicit user action
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: User edits to event classifications are silently lost during re-decode, causing incorrect accounting treatment
      and potential tax reporting errors
    stage_ids:
    - history_event_management
  - id: finance-C-114
    when: When implementing cost basis calculations for financial amounts
    action: use FVal (Decimal-based) instead of float for each monetary calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Floating-point arithmetic causes rounding errors in PnL calculations, leading to incorrect tax reporting
      and potential financial loss from over/underpaid taxes
    stage_ids:
    - accounting_pnl
  - id: finance-C-115
    when: When consuming acquisition results during cost basis processing
    action: validate used_amount is in range [0, remaining_amount] before deduction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid used_amount values corrupt the acquisition heap state, causing incorrect lot matching and PnL calculation
      errors that compound through subsequent transactions
    stage_ids:
    - accounting_pnl
  - id: finance-C-116
    when: When processing history events for accounting
    action: verify events are provided in chronological order sorted by timestamp
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Out-of-order events cause incorrect acquisition-to-disposal matching, leading to wrong cost basis assignments
      and tax calculations that violate holding period rules
    stage_ids:
    - accounting_pnl
  - id: finance-C-119
    when: When calculating cost basis with Average Cost Basis (ACB) method
    action: calculate average_cost_basis before calling consume_result
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calculating ACB after consume_result uses wrong pool amounts, causing incorrect average rate and erroneous
      cost basis assignments for all subsequent disposals
    stage_ids:
    - accounting_pnl
  - id: finance-C-123
    when: When implementing SWAP accounting treatment
    action: always mark acquisition events (in_event) as taxable=False
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Marking swap acquisitions as taxable violates the tax-free acquisition principle, causing incorrect PnL calculations
      and potential overpayment of taxes
    stage_ids:
    - accounting_pnl
  - id: finance-C-124
    when: When processing SWAP events
    action: pair out_event with in_event sharing the same group_identifier
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Unpaired swap events cause incorrect cost basis transfers and missing acquisition records, leading to incomplete
      PnL calculations
    stage_ids:
    - accounting_pnl
  - id: finance-C-126
    when: When implementing Average Cost Basis method
    action: maintain running totals (current_amount and current_total_acb) instead of heap-based lot tracking
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using heap-based tracking for ACB calculates wrong average by treating lots independently instead of as a
      pooled position
    stage_ids:
    - accounting_pnl
  - id: finance-C-134
    when: When implementing database encryption for user financial data
    action: use SQLCipher password-based encryption for the database file
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unencrypted database exposes sensitive financial data including transaction history, asset balances, and
      API credentials to unauthorized access
    stage_ids:
    - database_layer
  - id: finance-C-135
    when: When escaping passwords for SQLCipher PRAGMA statements
    action: escape single quotes by doubling them to prevent SQL syntax errors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unescaped single quotes in passwords break SQLCipher PRAGMA statements, causing AuthenticationError and preventing
      database access
    stage_ids:
    - database_layer
  - id: finance-C-139
    when: When importing encrypted database from unencrypted source
    action: encrypt the database using sqlcipher_export() with user's password and kdf_iter settings
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Improper encryption leaves database unreadable or with weak encryption, exposing sensitive financial data
    stage_ids:
    - database_layer
  - id: finance-C-140
    when: When unlocking SQLCipher database connection
    action: set KDF_ITER=64000 for SQLCipher version 3 to match encryption settings
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Mismatched KDF iterations between encryption and decryption causes AuthenticationError, preventing database
      access
    stage_ids:
    - database_layer
  - id: finance-C-142
    when: When upgrading database schema to a new version
    action: create a backup before performing upgrade and restore it if upgrade fails
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Failed upgrade without backup leaves database in corrupted state, losing all user data and requiring manual
      recovery
    stage_ids:
    - database_layer
  - id: finance-C-143
    when: When detecting an unfinished database upgrade state
    action: restore from the latest backup and reconnect, or raise error for user intervention
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Unfinished upgrade state leaves database partially migrated, causing query failures and data inconsistencies
    stage_ids:
    - database_layer
  - id: finance-C-144
    when: When migrating database from versions older than 26
    action: attempt automatic migration as minimum supported version is 26
    severity: fatal
    kind: operational_lesson
    modality: must_not
    consequence: Attempting to upgrade very old databases causes unpredictable schema differences, potentially corrupting
      user data
    stage_ids:
    - database_layer
  - id: finance-C-151
    when: When initializing an Asset instance with a non-string identifier
    action: raise a DeserializationError with message indicating non-string identifier was provided
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Asset instances with non-string identifiers cause silent type coercion errors in downstream operations like
      hash() and equality checks, leading to data corruption in asset mappings
    stage_ids:
    - asset_registry
  - id: finance-C-152
    when: When creating Asset subclasses that require resolution
    action: use direct_field_initialization=True flag and _set_attributes() method for frozen dataclass compatibility
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Direct field assignment on frozen dataclass raises FrozenInstanceError, breaking asset initialization for
      CryptoAsset, EvmToken, FiatAsset, and SolanaToken
    stage_ids:
    - asset_registry
  - id: finance-C-153
    when: When resolving EVM token identifiers
    action: include chain_id in the CAIP-19 identifier format 'eip155:{chain_id}/{token_type}:{address}'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without chain_id, identical token addresses on different EVM chains (e.g., USDC on Ethereum vs Arbitrum)
      are conflated, causing incorrect balance and price queries
    stage_ids:
    - asset_registry
  - id: finance-C-167
    when: When passing time ranges from api_layer to blockchain_data_collection
    action: convert each timestamps to integer Timestamp type (seconds since epoch) before invoking blockchain queries
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TimestampMS (milliseconds) passed to blockchain layer causes queries to search wrong time ranges, potentially
      missing years of transactions or including unintended future dates
  - id: finance-C-173
    when: When passing decoded HistoryBaseEntry events from transaction_decoding to history_event_management
    action: 'populate required HistoryBaseEntry fields: group_identifier (string), sequence_index (int), timestamp (TimestampMS),
      location (Location), event_type (HistoryEventType), event_subtype (HistoryEventSubType), asset (Asset), amount (FVal)'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required fields causes database insertion failures, corrupting the event record and breaking PnL
      calculations that depend on complete event data
  - id: finance-C-174
    when: When decoded events from transaction_decoding and exchange_integration converge at history_event_management
    action: merge events by identifier to avoid duplicates — each event identifier must be unique across both on-chain and
      exchange sources
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Duplicate events from both sources cause double-counting in PnL calculations, inflating or deflating reported
      profits
  - id: finance-C-177
    when: When passing sequenced HistoryBaseEntry events from history_event_management to accounting_pnl
    action: sort events by ascending timestamp before passing to process_history — events must already be sorted when received
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unsorted events cause incorrect cost basis calculations, as FIFO/LIFO matching depends on chronological order
      of acquisitions and disposals
  - id: finance-C-191
    when: When implementing financial calculations that involve monetary values
    action: Use FVal for each monetary calculations — FVal wraps Python Decimal with precision up to uint256 max to avoid
      floating-point errors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Floating-point arithmetic causes rounding errors in financial calculations, leading to incorrect tax liability
      computations and potentially regulatory non-compliance
  - id: finance-C-192
    when: When storing or comparing EVM addresses
    action: Use to_checksum_address() to checksum each EVM address literals before storage or comparison
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-checksummed addresses cause database lookup failures and silent data mismatches, resulting in transactions
      not being recognized or tracked
  - id: finance-C-193
    when: When working with history event timestamps
    action: Use TimestampMS (milliseconds) for history events; use Timestamp (seconds) for accounting
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Timestamp unit mismatch causes events to be misclassified in time ranges, leading to incorrect tax period
      calculations and missing or duplicate transactions
  - id: finance-C-194
    when: When using database cursors
    action: Always use context manager (with statement) for database cursors or explicitly close them — use read_ctx()/write_ctx()/user_write()
      for context-managed access
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Unclosed database cursors cause connection leaks, database lock timeouts, and application crashes during
      extended operation
  - id: finance-C-195
    when: When processing swap events in accounting
    action: 'Process OUT events before IN events with sequence_index convention: SPEND=0, RECEIVE=1, FEE>=2'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect swap processing order causes cost basis miscalculation, leading to inflated or deflated profit/loss
      figures and wrong tax liabilities
  - id: finance-C-196
    when: When resetting the AccountingPot for a new accounting period
    action: 'Reset cascade order MUST be: pnls.reset() → cost_basis.reset() → events_accountant.reset()'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect reset order causes state leakage between accounting periods, leading to cross-contaminated PnL
      calculations and invalid tax reports
  - id: finance-C-204
    when: When presenting rotki's capabilities to users or stakeholders
    action: Claim real-time trading execution capability — rotki is a portfolio tracker and tax calculator, NOT a trading
      platform
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users who rely on rotki for trading execution will experience missed trades, inability to place orders, and
      financial loss when attempting to execute through rotki
  - id: finance-C-218
    when: When implementing SWAP event processing in accounting history_base_entries
    action: 'Process SWAP events in strict sequence: first resolve out_event (spending), then process fee_events, finally
      resolve in_event (receiving) — maintain this ordering to verify correct tax calculation'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Reversing the processing order causes fees to be calculated against incorrect asset quantities, resulting
      in wrong tax amounts and potential regulatory non-compliance
    derived_from_bd_id: BD-045
  - id: finance-C-219
    when: When calculating fee taxability for SWAP events with partial tax-free portions
    action: Determine fee taxability using taxable_amount_ratio = trade_taxable_amount / out_event.amount, proportionally
      allocating fees to taxable portions only
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without proportional fee taxability calculation, fees on tax-free portions of trades create artificial taxable
      events, overstating tax liability and causing regulatory non-compliance
    derived_from_bd_id: BD-046
  - id: finance-C-223
    when: When implementing event pairing logic in accounting modules
    action: Pair SWAP events with corresponding BASIS_TRANSFER events using EventsAccountant pairing logic — do not process
      these events independently
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unpaired SWAP processing shows zero PnL incorrectly while BASIS_TRANSFER events would double-count gains,
      causing both incorrect tax reporting and regulatory non-compliance
    derived_from_bd_id: BD-020
  - id: finance-C-226
    when: When implementing HIFO cost basis disposal ordering
    action: Prioritize disposal of highest-cost acquisitions first by using negated acquisition rate as heap priority — use
      -rate as secondary sort key after timestamp in the priority tuple
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using FIFO or random ordering instead of HIFO prioritizes wrong acquisitions, resulting in higher taxable
      gains that could trigger unexpected tax liabilities and regulatory penalties
    derived_from_bd_id: BD-059
  - id: finance-C-227
    when: When processing Coinbase exchange data for accounting timestamps
    action: Use created_at timestamp for Coinbase trade timing — do not use payout_at (fund arrival time) or any average of
      both timestamps
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using payout_at misaligns trade records with exchange records, causing discrepancies in compliance reports
      and potentially triggering audit flags for timing mismatches
    derived_from_bd_id: BD-066
  - id: finance-C-234
    when: When processing swap events in the accounting module
    action: Process out_event before in_event in every _process_swap call; out_asset is the source and in_asset is the target,
      and this ordering is required for correct cost basis calculation and proper asset movement attribution regardless of
      timestamp ordering
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Processing swap events in the wrong order corrupts cost basis calculations, causing incorrect gain/loss recognition
      and misattributing asset movements, leading to materially incorrect tax reports and P&L statements
    derived_from_bd_id: BD-088
  - id: finance-C-237
    when: When implementing timing-related constants for tax calculations
    action: Verify YEAR_IN_SECONDS (31536000) equals HOUR_IN_SECONDS (3600) multiplied by 8760 (365.25×24) — the 8760:1 ratio
      must remain consistent for tax-free holding period calculations to be correct
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inconsistent hour-to-year ratio causes tax-free holding period calculations to be incorrect, potentially
      allowing taxable events to be incorrectly marked as tax-free or vice versa
    derived_from_bd_id: BD-115
  - id: finance-C-247
    when: When implementing API field serialization for sensitive credentials
    action: Implement ApiSecretField with deserialization only (accept input) and no serialization (never return secret in
      GET responses) — verify secrets never appear in API responses
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Adding serialization to ApiSecretField would leak sensitive credentials in API responses, exposing API keys
      and secrets to anyone with API access
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-253
    when: When implementing FIFO/LIFO/HIFO cost basis ordering logic
    action: Use ascending counter as heap priority for FIFO ordering and negated counter for LIFO ordering to verify mathematically
      consistent heap-based ordering
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect priority encoding causes FIFO and LIFO methods to select wrong acquisition lots, resulting in systematically
      wrong cost basis calculations and distorted PnL reports
    derived_from_bd_id: BD-058
  - id: finance-C-262
    when: When implementing or modifying swap event parsing and classification logic
    action: Assign sequence_index=0 for SPEND events, sequence_index=1 for RECEIVE events, and sequence_index>=2 for FEE events;
      maintain this convention for each exchange event processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Deviating from the sequence_index convention causes swap event parsing to break completely and fee events
      to be misclassified as primary trade components, corrupting tax lot matching and causing incorrect capital gains calculations
    derived_from_bd_id: BD-089
  - id: finance-C-265
    when: When implementing cost basis method selection and users need to change their accounting approach
    action: Retroactively change the cost basis method (FIFO/LIFO/HIFO/ACB) for already-processed transactions; method selection
      is immutable once applied to historical data
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Allowing retroactive cost basis method changes corrupts historical tax lot data, creates inconsistent tax
      reporting across reporting periods, and may constitute tax fraud by altering historical declarations
    derived_from_bd_id: BD-093
  - id: finance-C-280
    when: When implementing cost basis tracking for ETH-denominated assets
    action: Map WETH to ETH for cost basis calculations — treat them as the same asset bucket with shared acquisition history
      for tax lot tracking
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using separate cost basis tracking for WETH and ETH would enable tax avoidance by artificially creating different
      acquisition histories, violating tax reporting requirements and potentially triggering regulatory scrutiny
    derived_from_bd_id: BD-036
  - id: finance-C-289
    when: When implementing tax-free holding period calculation for asset disposals
    action: 'Calculate tax-free eligibility using strict less-than comparison: tax_free = acquisition.timestamp + taxfree_after_period
      < spend.timestamp; do not use <= comparison or round to day boundaries'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using <= or rounding to day boundaries incorrectly extends tax-free eligibility to assets held exactly one
      year, violating jurisdiction-specific holding period requirements and causing potential tax assessment errors or compliance
      violations
    derived_from_bd_id: BD-038
  - id: finance-C-339
    when: When writing EVM address literals in Python code
    action: Use checksummed EVM addresses with to_checksum_address()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-checksummed addresses will cause transactions to fail or funds to be sent to incorrect addresses, resulting
      in permanent loss of cryptocurrency
  - id: finance-C-362
    when: When using string_to_evm_address() function
    action: Rely on string_to_evm_address() to checksum addresses
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: string_to_evm_address() is a no-op typing function that does not checksum addresses, leading to transaction
      failures or lost funds
  - id: finance-C-368
    when: When working on code and considering skipping checksum validation for EVM addresses
    action: use string_to_evm_address() or raw string literals instead of to_checksum_address() for EVM addresses
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: EVM addresses must be checksummed. Using string_to_evm_address() or raw lowercase addresses will result in
      database errors ('Invalid XXX account in DB') and potential loss of funds or incorrect transaction routing.
  regular:
  - id: finance-C-003
    when: When polling for async task completion
    action: Query /api/1/tasks endpoint with task_id parameter and handle pending/completed/not-found statuses
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Improper polling leads to infinite wait loops or premature result consumption. Task results are removed from
      task_results dict after retrieval (line 465), causing 'result already consumed' errors on duplicate polls.
    stage_ids:
    - api_layer
  - id: finance-C-005
    when: When managing greenlet task lifecycle
    action: Handle GreenletKilledError exceptions in _handle_killed_greenlets() to prevent silent failures
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unhandled greenlet exceptions corrupt task_results dictionary. Clients polling for task outcome receive malformed
      responses with 'backend query task died unexpectedly' error messages.
    stage_ids:
    - api_layer
  - id: finance-C-006
    when: When broadcasting WebSocket messages
    action: Remove closed WebSocket connections from subscribers list to prevent broadcast failures
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Attempting to send to closed WebSocket connections raises WebSocketError exceptions. Unremoved dead connections
      accumulate, causing memory leaks and repeated error logging.
    stage_ids:
    - api_layer
  - id: finance-C-007
    when: When implementing exchange connector plugins
    action: Register exchanges via ExchangeManager.setup_exchange() with proper API credentials and database handler
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Exchanges instantiated outside ExchangeManager bypass synchronization and credential validation. Duplicate
      exchange instances cause data inconsistency and unexpected query behavior.
    stage_ids:
    - api_layer
  - id: finance-C-008
    when: When adding pluggable exchange connectors
    action: Follow ExchangeManager._get_exchange_module_name() naming convention matching Location enum
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect module naming causes importlib.import_module() failures. Exchange cannot be instantiated, resulting
      in 'module not found' errors at runtime.
    stage_ids:
    - api_layer
  - id: finance-C-009
    when: When implementing price oracle plug-ins
    action: Implement CurrentPriceOracleInterface or HistoricalPriceOracleInterface base classes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Oracles not implementing the interface cannot be registered with PriceHistorian or Inquirer. Price queries
      silently fail or return ZERO_PRICE, causing incorrect portfolio valuations.
    stage_ids:
    - api_layer
  - id: finance-C-010
    when: When setting up price oracle implementations
    action: Register oracles with Inquirer.set_oracles_order() or PriceHistorian.set_oracles_order()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unregistered oracles are never queried for prices. System falls back to default oracle order, potentially
      using slower or less reliable price sources.
    stage_ids:
    - api_layer
  - id: finance-C-011
    when: When querying exchange APIs
    action: Respect rate limits with exponential backoff up to query_retry_limit (default 5)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Exceeding exchange rate limits results in 429 responses and temporary API bans. Queries fail until cooldown
      period expires, causing stale balance data and missed transactions.
    stage_ids:
    - api_layer
  - id: finance-C-012
    when: When querying price oracles
    action: Wait 60 seconds after rate limit detection before retrying the same oracle
    severity: high
    kind: domain_rule
    modality: must
    consequence: Immediate retries to rate-limited oracles trigger additional bans. Price queries fail for extended periods,
      causing missing valuations in reports and dashboards.
    stage_ids:
    - api_layer
  - id: finance-C-013
    when: When implementing gevent-based async operations
    action: Use gevent.spawn() for non-blocking I/O operations without threading complexity
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using threads instead of greenlets increases memory footprint and context-switch overhead. Thread-based concurrency
      cannot integrate with gevent's event loop, causing blocking operations.
    stage_ids:
    - api_layer
  - id: finance-C-014
    when: When tracking async task IDs
    action: Use thread-safe task_id generation with task_lock Semaphore to prevent ID collisions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without locking, concurrent requests can generate duplicate task_ids. Task results overwrite each other in
      task_results dict, causing clients to receive wrong results.
    stage_ids:
    - api_layer
  - id: finance-C-015
    when: When handling long-running operations
    action: Send WebSocket PROGRESS_UPDATES messages for operations exceeding typical request timeout
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Clients have no indication of operation progress, leading to timeout errors and user perception of system
      hang. Users may cancel operations prematurely or resubmit requests.
    stage_ids:
    - api_layer
  - id: finance-C-016
    when: When cancelling async tasks via API
    action: Use delete_async_task() with GreenletKilledError exception for clean cancellation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Forcibly killing greenlets without GreenletKilledError bypasses error handling. Task results may be written
      with inconsistent state, and cleanup handlers are skipped.
    stage_ids:
    - api_layer
  - id: finance-C-018
    when: When implementing WebSocket message handling
    action: Protect WebSocket send operations with per-connection locks to prevent concurrent write errors
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Concurrent sends to the same WebSocket from different greenlets cause protocol violations. Messages may be
      interleaved, resulting in corrupted frames and connection drops.
    stage_ids:
    - api_layer
  - id: finance-C-019
    when: When serving WebSocket connections
    action: Unsubscribe WebSocket on connection close to prevent stale references
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Unremoved closed WebSocket references cause broadcast attempts to fail. Exception handling overhead accumulates,
      and memory leaks occur from unreleased socket objects.
    stage_ids:
    - api_layer
  - id: finance-C-020
    when: When configuring API timeouts
    action: Set connect_timeout and read_timeout appropriately for network conditions
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Short timeouts cause premature connection failures on slow networks. Long timeouts delay error detection
      and waste server resources on hanging connections.
    stage_ids:
    - api_layer
  - id: finance-C-021
    when: When stopping the API server
    action: Wait for waited_greenlets and kill each api_task_greenlets before cleanup
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping greenlet cleanup leaves dangling async operations. Database connections may be closed while queries
      are in-flight, causing 'database is locked' errors.
    stage_ids:
    - api_layer
  - id: finance-C-022
    when: When initializing the RotkiNotifier
    action: Pass RotkiNotifier instance to RotkiWSApp via websocket environ dict
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: WebSocket handlers cannot broadcast messages without the notifier reference. Progress updates and status
      notifications never reach connected clients.
    stage_ids:
    - api_layer
  - id: finance-C-024
    when: When implementing the API response structure
    action: Return task_id in result dict for async queries (not in message field)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Clients expect task_id in result object. Placing it in message field requires string parsing, causing integration
      failures and incorrect polling logic.
    stage_ids:
    - api_layer
  - id: finance-C-028
    when: When querying ERC20 token balances via multicall
    action: Chunk balance queries to stay within MULTICALL_CHUNKS limit of 20 calls
    severity: high
    kind: domain_rule
    modality: must
    consequence: Exceeding MULTICALL_CHUNKS causes RequestTooLargeError, resulting in failed balance collection for wallets
      with many tokens
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-029
    when: When querying logs across a large block range via Web3
    action: Split queries to stay within WEB3_LOGQUERY_BLOCK_RANGE of 250000 blocks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Queries exceeding the block range limit cause errors from RPC providers, resulting in incomplete or failed
      log retrieval
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-031
    when: When RPC node is detected as rate-limited
    action: Enter 300-second cooldown period before retrying the node
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Ignoring rate limits causes repeated HTTP 429/403 responses, potentially resulting in temporary or permanent
      API key suspension
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-032
    when: When querying token balances via Etherscan-compatible indexer
    action: Limit chunk size to ETHERSCAN_MAX_ARGUMENTS_TO_CONTRACT of 110 tokens per call
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding the etherscan argument limit causes RequestTooLargeError and failed token balance retrieval for
      affected addresses
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-033
    when: When querying token balances via non-Etherscan RPC node
    action: Limit chunk size to OTHER_MAX_TOKEN_CHUNK_LENGTH of 460 tokens per call
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding the optimized chunk length causes gas limit errors and failed multicall execution for token-heavy
      wallets
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-034
    when: When querying token balances on Arbitrum chain
    action: Limit chunk size to ARBISCAN_MAX_ARGUMENTS_TO_CONTRACT of 25 tokens per call
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Arbitrum's lower gas limit requires smaller chunks; exceeding causes RequestTooLargeError and failed balance
      queries
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-035
    when: When Solana RPC query fails with rate limit error
    action: Implement exponential backoff starting at 4 seconds with max 3 retries
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing backoff causes repeated rate limit hits, potentially blacklisting the node and halting Solana data
      collection
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-036
    when: When querying multiple Solana accounts in one request
    action: Limit batch size to MAX_ACCOUNTS_PER_REQUEST of 100 accounts
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding the Solana RPC batch limit causes request failures and incomplete account data retrieval
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-037
    when: When no configured RPC nodes are archive nodes
    action: Return None for historical balance queries rather than failing silently
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Attempting historical queries without archive nodes returns incorrect zero balances, corrupting historical
      portfolio valuations
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-038
    when: When RPC query encounters request too large error
    action: Retry with chunk_size reduced to 3, failing if still unsuccessful
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Failing to reduce chunk size causes persistent RequestTooLargeError and complete failure of batch balance
      queries
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-039
    when: When EVM transaction query encounters pruned node error
    action: Skip pruned nodes for historical transaction retrieval and try next node
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Querying pruned nodes for old transactions returns incomplete data, missing historical transaction history
      for addresses
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-040
    when: When querying logs and encountering 'query returned more than 10000 results' error
    action: Reduce block range to 9999 blocks and retry, halving on timeout
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Not reducing block range causes persistent query failures and complete inability to retrieve event logs for
      affected contracts
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-041
    when: When token balance chunk query fails
    action: Recursively split chunk in half until reaching single-token chunks
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Failing to split chunks causes complete loss of balance data for all tokens in the failed chunk
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-042
    when: When each RPC nodes fail after exhaustion of retry attempts
    action: Raise RemoteError with specific chain context, not generic exception
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Generic exceptions prevent proper error handling downstream, causing unhandled failures in dependent stages
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-043
    when: When querying historical transactions
    action: Query indexers (Etherscan/Blockscout) first before falling back to RPC nodes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping indexers and using pruned RPC directly causes missing historical transaction data, leading to incomplete
      transaction history
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-044
    when: When querying current state via eth_call
    action: Use RPC nodes directly rather than indexers for better latency
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Routing current state queries through indexers introduces unnecessary latency and potential rate limiting
      for real-time balance checks
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-045
    when: When executing multicall for token balances
    action: Aggregate multiple balance lookups into single RPC call to reduce overhead
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Executing individual balance calls instead of multicall multiplies RPC overhead, causing timeout and rate
      limit issues for wallets with many tokens
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-046
    when: When implementing chain-specific blockchain data collection
    action: Extend EvmNodeInquirer subclass rather than modifying base class
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Modifying EvmNodeInquirer directly breaks polymorphism for other chain implementations, causing incorrect
      behavior across chains
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-047
    when: When implementing indexer replacement
    action: Implement EtherscanLikeApi interface for custom indexer providers
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-compliant indexer implementations cause type errors and data format mismatches during transaction retrieval
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-048
    when: When querying blockchain data from external indexers
    action: Claim real-time data accuracy equal to direct RPC queries
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: 'Indexers have inherent latency (Etherscan: ~15 min, Blockscout: variable), presenting stale data as current
      creates incorrect portfolio representations'
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-049
    when: When presenting blockchain data collection results
    action: Claim complete transaction coverage when using free indexer tiers
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Free indexer tiers have rate limits and data gaps; claiming complete coverage misleads users about data accuracy
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-050
    when: When RPC node returns successful response
    action: Record node success to reset consecutive failure counter
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Skipping success recording keeps nodes in cooldown permanently after transient failures, reducing available
      node pool
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-051
    when: When Solana query requires archive node capabilities
    action: Add Helius RPC as fallback at end of call order for archive queries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing archive fallback causes historical Solana data queries to fail or return incomplete results
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-052
    when: When querying Etherscan for internal transactions
    action: Handle ChainNotSupported exception by removing indexer from available pool
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Not removing unsupported indexers causes repeated failed queries, wasting API quota and causing delays
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-053
    when: When RPC query fails with timeout
    action: Mark node as failed_to_connect and remove from rpc_mapping
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Not marking timed-out nodes prevents automatic failover, causing repeated timeouts on dead nodes
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-054
    when: When querying Ethereum address transactions without API key
    action: Claim transaction completeness when using rate-limited free tier
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Free Etherscan tier has strict rate limits; claiming complete transaction history misleads users during high-activity
      periods
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-055
    when: When processing detected tokens for address
    action: Query against per-chain token exceptions to exclude spam/problematic tokens
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Including spam tokens causes false balance entries, corrupting portfolio valuations and triggering unnecessary
      API calls
    stage_ids:
    - blockchain_data_collection
  - id: finance-C-057
    when: When decoding EVM transaction logs with empty topic arrays
    action: skip anonymous events without attempting to match any decoding rules
    severity: high
    kind: domain_rule
    modality: must
    consequence: Anonymous events lack identifying signatures and cannot be reliably decoded by protocol-specific rules; attempting
      to decode them would cause IndexError or produce incorrect event classifications
    stage_ids:
    - transaction_decoding
  - id: finance-C-060
    when: When executing the EVM transaction decoding pipeline
    action: 'follow the strict execution order: address_mappings rules first, then event_rules, then input_data_rules'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The decoding order ensures that protocol-specific address-based decoders have priority; violating this order
      could cause generic rules to match before specialized ones, producing incorrect or less informative event classifications
    stage_ids:
    - transaction_decoding
  - id: finance-C-061
    when: When implementing decoders for protocols with dynamic data (Curve, Balancer pools)
    action: implement ReloadableDecoderMixin or ReloadableCacheDecoderMixin and handle cache freshness validation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Protocols with dynamic pool/gauge data require cache invalidation to avoid decoding with stale data; failing
      to reload when cache is outdated produces incorrect pool identification and misclassified events
    stage_ids:
    - transaction_decoding
  - id: finance-C-062
    when: When a ReloadableDecoder reload_data method encounters a RemoteError during cache refresh
    action: log the error with counterparty context and add user-facing error message without halting the decoding process
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Remote query failures during cache refresh should not crash the decoder; the error must be logged and users
      notified via msg_aggregator, with a recommendation to re-decode when data is available
    stage_ids:
    - transaction_decoding
  - id: finance-C-063
    when: When defining EVM address constant literals in decoder implementations
    action: use properly checksummed EVM addresses formatted as 0x... with mixed case per EIP-55
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-checksummed addresses can silently match different addresses due to case-insensitive comparisons in some
      contexts, causing decoder rules to fail to match transactions for the intended contracts
    stage_ids:
    - transaction_decoding
  - id: finance-C-064
    when: When encountering a log that cannot be matched by any decoding rule
    action: silently skip the log without creating a generic 'UNKNOWN' event, preserving the log data for potential future
      decoding
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Transactions with unknown contract interactions may result in no decoded events if no rules match; this is
      by design as the system avoids creating misleading generic events with incomplete information
    stage_ids:
    - transaction_decoding
  - id: finance-C-066
    when: When implementing decoder rule exception handling with decode_safely
    action: catch each handled_exceptions, log the full traceback, and propagate user-facing errors via msg_aggregator.add_error
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Decoding exceptions must be caught and reported to users via msg_aggregator; uncaught exceptions would crash
      the decoding loop and leave transactions in an undecoded state
    stage_ids:
    - transaction_decoding
  - id: finance-C-068
    when: When adding EVM protocol decoders to the rotki system
    action: implement counterparties() method returning protocol identifier constants (e.g., CPT_UNISWAP_V2)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Counterparty identification is essential for event filtering, accounting categorization, and UI display;
      decoders without counterparties() will not be properly registered in the decoding pipeline
    stage_ids:
    - transaction_decoding
  - id: finance-C-069
    when: When handling zero-amount token transfers during decoding
    action: skip and ignore zero-amount transfers without creating events
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Zero-amount transfers create noise in transaction histories and can cause divide-by-zero errors in PnL calculations;
      skipping them improves decoding performance and data quality
    stage_ids:
    - transaction_decoding
  - id: finance-C-070
    when: When executing post-decoding rules after the main decoding loop
    action: process rules in ascending priority order, with higher priority numbers executing later
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Post-decoding rules may depend on the execution order (e.g., enrichment rules must run before finalization
      rules); incorrect ordering can cause events to be improperly enriched or categorized
    stage_ids:
    - transaction_decoding
  - id: finance-C-071
    when: When claiming rotki can decode each blockchain transactions
    action: make such a claim because rotki only decodes transactions for which protocol decoders have been implemented
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Rotki's decoding coverage depends on having implemented protocol-specific decoders; transactions for unknown
      protocols or novel contract interactions will not be decoded, potentially leaving gaps in transaction history
    stage_ids:
    - transaction_decoding
  - id: finance-C-072
    when: When the decoding system encounters a protocol decoder that raises an unhandled exception
    action: catch the exception via decode_safely and continue with the next rule rather than failing the entire transaction
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Individual decoder failures should not halt transaction decoding; uncaught exceptions would leave the transaction
      partially decoded or not decoded at all, creating data integrity issues
    stage_ids:
    - transaction_decoding
  - id: finance-C-073
    when: When implementing exchange API key handling
    action: validate API key type as string (T_ApiKey) using assert
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing non-string API key causes runtime AttributeError when exchange attempts string operations, resulting
      in exchange connection failures
    stage_ids:
    - exchange_integration
  - id: finance-C-074
    when: When implementing exchange API secret handling
    action: validate API secret type as bytestring (T_ApiSecret) using assert
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing non-bytestring secret causes cryptographic signature failures, resulting in 401 Unauthorized errors
      from exchange API
    stage_ids:
    - exchange_integration
  - id: finance-C-075
    when: When identifying exchange instances
    action: use both name and Location enum for unique identification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Same exchange name on different instances (e.g., Binance vs BinanceUS) causes data collision, resulting in
      incorrect balance and trade attribution
    stage_ids:
    - exchange_integration
  - id: finance-C-076
    when: When querying exchange trade history
    action: persist trade unique_id from exchange API in HistoryBaseEntry
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Missing unique_id prevents manual verification of trade events against exchange order IDs, breaking acceptance
      criteria for trade matching
    stage_ids:
    - exchange_integration
  - id: finance-C-077
    when: When recording deposit/withdrawal events
    action: capture transaction_id from blockchain for on-chain verification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing transaction_id prevents matching deposits and withdrawals to on-chain transactions, violating acceptance
      criteria for blockchain verification
    stage_ids:
    - exchange_integration
  - id: finance-C-078
    when: When creating HTTP sessions for exchanges
    action: use RecoveringExchangeSession to handle keep-alive disconnects
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without recovery wrapper, flaky exchange connections cause false RemoteError failures, resulting in incomplete
      historical data retrieval
    stage_ids:
    - exchange_integration
  - id: finance-C-079
    when: When handling exchange API errors
    action: implement single retry for recoverable connection errors only
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Multiple retries without proper state coordination can cause race conditions; excessive retries delay error
      reporting to user
    stage_ids:
    - exchange_integration
  - id: finance-C-080
    when: When initializing exchange connections
    action: check exchange location against SUPPORTED_EXCHANGES list
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Attempting to connect to unsupported exchanges causes KeyError or import failures, preventing exchange initialization
    stage_ids:
    - exchange_integration
  - id: finance-C-081
    when: When handling exchange rate limits
    action: implement exponential backoff and respect Retry-After headers
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Ignoring rate limits causes 429 responses and potential API bans, resulting in complete loss of exchange
      data access
    stage_ids:
    - exchange_integration
  - id: finance-C-082
    when: When using exchanges without API secret
    action: use ExchangeWithoutApiSecret base class for read-only exchanges
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Attempting to use ExchangeInterface for read-only exchanges causes assertion errors when secret is None
    stage_ids:
    - exchange_integration
  - id: finance-C-083
    when: When connecting to deprecated exchanges
    action: attempt to use FTX, FTXUS, Bittrex, or CoinbasPro exchanges
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: These exchanges are no longer operational; API calls fail with connection errors, wasting resources and generating
      misleading error messages
    stage_ids:
    - exchange_integration
  - id: finance-C-084
    when: When managing exchange query state
    action: track query ranges per exchange location_id to avoid re-fetching
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without range tracking, repeated queries to same time ranges cause excessive API calls, triggering rate limits
      and slowing down sync
    stage_ids:
    - exchange_integration
  - id: finance-C-085
    when: When implementing exchange sync
    action: wait for session reset readiness before retrying after disconnects
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Attempting to use session before reset completion causes connection errors, resulting in failed history event
      retrieval
    stage_ids:
    - exchange_integration
  - id: finance-C-086
    when: When encountering unknown assets in exchange data
    action: halt exchange data processing due to unrecognized asset
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Unknown assets are common in exchange data; halting processing loses all valid data for the query period
    stage_ids:
    - exchange_integration
  - id: finance-C-087
    when: When validating exchange API keys
    action: handle RemoteError gracefully and report authentication failures
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Uncaught RemoteError during key validation crashes exchange setup, preventing users from correcting invalid
      credentials
    stage_ids:
    - exchange_integration
  - id: finance-C-088
    when: When querying Binance trade history
    action: select trading pairs before querying myTrades endpoint
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without selected pairs, trade query fails with InputError, resulting in missing trade data for the exchange
    stage_ids:
    - exchange_integration
  - id: finance-C-089
    when: When retrieving exchange balance snapshots
    action: reconcile balance with trades + deposits - withdrawals
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unreconciled balances may indicate missing transactions, causing inaccurate PnL calculations and potential
      tax compliance issues
    stage_ids:
    - exchange_integration
  - id: finance-C-090
    when: When implementing exchange with extra settings
    action: extend ExchangeWithExtras interface for Kraken margin accounts and Binance markets
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing ExchangeWithExtras for optional settings creates complex optional parameter handling, leading to
      runtime AttributeError
    stage_ids:
    - exchange_integration
  - id: finance-C-091
    when: When organizing exchange query callbacks
    action: execute history events query after margin history in correct order
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Out-of-order queries may cause timestamp overlap issues, resulting in duplicate or missing historical events
    stage_ids:
    - exchange_integration
  - id: finance-C-092
    when: When recovering from exchange connection errors
    action: coordinate session reset using semaphore to prevent concurrent recovery
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without semaphore coordination, concurrent greenlets attempting recovery cause race conditions, resulting
      in session corruption
    stage_ids:
    - exchange_integration
  - id: finance-C-093
    when: When representing exchange balance data
    action: claim balance snapshots represent real-time asset positions
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Balance snapshots are point-in-time queries with inherent delay; presenting them as real-time causes user
      misunderstanding of actual positions
    stage_ids:
    - exchange_integration
  - id: finance-C-094
    when: When reporting exchange trade events
    action: claim complete order matching with exchange UI without verification
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Some exchange APIs don't expose all order IDs; manual verification may reveal discrepancies, damaging user
      trust in reported data
    stage_ids:
    - exchange_integration
  - id: finance-C-095
    when: When storing exchange transaction records
    action: guarantee each deposits/withdrawals have matching on-chain transactions
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Internal exchange transfers (e.g., sub-account movements) don't have blockchain transactions; guaranteeing
      matches causes false data integrity claims
    stage_ids:
    - exchange_integration
  - id: finance-C-096
    when: When adding new exchange implementations
    action: skip implementing validate_api_key for new exchange adapters
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Missing validate_api_key prevents API key verification, causing silent credential failures that manifest
      as data retrieval errors later
    stage_ids:
    - exchange_integration
  - id: finance-C-097
    when: When implementing exchange-specific history parsing
    action: skip error handling for malformed exchange API responses
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Exchange APIs return inconsistent data formats; missing error handling causes crashes during sync, losing
      all retrieved data
    stage_ids:
    - exchange_integration
  - id: finance-C-098
    when: When processing exchange timestamps
    action: mix milliseconds and seconds timestamp representations
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Different exchanges use different timestamp formats; mixing them causes incorrect event ordering and duplicate
      processing
    stage_ids:
    - exchange_integration
  - id: finance-C-100
    when: When querying history events
    action: support filtering by asset, time range (from_ts/to_ts), location, and event type
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incomplete filtering support prevents users from isolating specific subsets of transactions, causing incorrect
      tax reports and balance calculations
    stage_ids:
    - history_event_management
  - id: finance-C-101
    when: When exporting events to CSV
    action: include direction (IN/OUT/NEUTRAL) derived from event type/subtype combination
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Missing direction in CSV export causes users to misclassify transactions for tax accounting, leading to incorrect
      capital gains calculations
    stage_ids:
    - history_event_management
  - id: finance-C-103
    when: When editing history events
    action: create backup copies before modification to enable restore to original decoded state
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without backups, users cannot undo edits or restore original decoded events, permanently losing auto-decode
      information
    stage_ids:
    - history_event_management
  - id: finance-C-104
    when: When grouping related events
    action: use group_identifier + sequence_index to maintain natural transaction relationships
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect grouping breaks swap pairing (spend+receive), multi-leg transfers, and proper event ordering, causing
      incorrect PnL calculations
    stage_ids:
    - history_event_management
  - id: finance-C-105
    when: When deleting the last event of a transaction
    action: require force_delete=True to be explicitly set by caller
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Deleting the last event without force_delete leaves orphaned transaction data with no way to retrieve event
      details, creating data inconsistency
    stage_ids:
    - history_event_management
  - id: finance-C-106
    when: When restoring events from backup
    action: delete backup entries after successful restore to prevent stale data accumulation
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Orphaned backup entries consume database space and may cause confusion about which events have been customized
    stage_ids:
    - history_event_management
  - id: finance-C-107
    when: When creating history event type mappings
    action: verify mapping extensibility for replaceable event type mappings
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Hardcoded event type mappings prevent integration with new exchanges or blockchain events, limiting system
      extensibility
    stage_ids:
    - history_event_management
  - id: finance-C-108
    when: When querying paginated event lists
    action: support aggregate_by_group_ids to group related events together
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without grouping, pagination splits related swap events across pages, causing confusion and incorrect transaction
      analysis
    stage_ids:
    - history_event_management
  - id: finance-C-109
    when: When marking customized events during redecode
    action: store original sequence_index to prevent duplicate event creation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without tracking original positions, re-decode may create duplicate events for customized transactions, causing
      double-counting in PnL calculations
    stage_ids:
    - history_event_management
  - id: finance-C-110
    when: When handling matched asset movements
    action: delete the matched pair when purging one side of the location
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Deleting matched pairs incorrectly causes accounting imbalance and incorrect PnL attribution between exchange
      and blockchain events
    stage_ids:
    - history_event_management
  - id: finance-C-111
    when: When classifying event direction for balance tracking
    action: handle special cases where deposit/withdrawal direction differs between accounting and balance tracking
    severity: high
    kind: domain_rule
    modality: must
    consequence: DEPOSIT/DEPOSIT_ASSET returns IN for accounting but OUT for movement matching, causing incorrect balance
      sheet representation
    stage_ids:
    - history_event_management
  - id: finance-C-112
    when: When exporting CSV with fiat values
    action: use HOUR_IN_SECONDS tolerance when querying historical prices
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Incorrect price tolerance may use stale prices for CSV export, causing misleading value representations
    stage_ids:
    - history_event_management
  - id: finance-C-113
    when: When processing EVM events
    action: validate transaction existence before allowing event creation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Creating events for non-existent transactions creates orphaned data that cannot be properly decoded or linked
      to real blockchain activity
    stage_ids:
    - history_event_management
  - id: finance-C-117
    when: When adding missing acquisitions for unsatisfied spends
    action: only record missing acquisitions for non-fiat assets
    severity: high
    kind: domain_rule
    modality: must
    consequence: Recording missing acquisitions for fiat assets causes incorrect cost basis calculations and distorts PnL
      reports for currency exchanges
    stage_ids:
    - accounting_pnl
  - id: finance-C-118
    when: When processing acquisition events in AccountingPot
    action: verify taxable_amount plus free_amount equals total acquisition amount
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatch between taxable/free amounts and total corrupts PnL reports and causes incorrect tax calculations
      for the reporting period
    stage_ids:
    - accounting_pnl
  - id: finance-C-120
    when: When processing free tier users for PnL reports
    action: enforce the FREE_PNL_EVENTS_LIMIT of 1000 events maximum
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Users exceeding the event limit cannot generate complete PnL reports, preventing tax filing preparation until
      they upgrade to premium
    stage_ids:
    - accounting_pnl
  - id: finance-C-121
    when: When setting the default tax-free holding period
    action: default to 31536000 seconds (1 year) as specified in tax regulations
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Incorrect default holding period causes assets to be incorrectly classified as taxable or tax-free, leading
      to compliance violations and potential penalties
    stage_ids:
    - accounting_pnl
  - id: finance-C-122
    when: When handling blockchain fork events for cost basis
    action: handle fork acquisitions for assets outside the supported fork list (ETH/ETC, BTC/BCH/BSV)
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Attempting to handle unsupported forks causes incorrect cost basis calculations or silent failures, leading
      to missing tax records for forked assets
    stage_ids:
    - accounting_pnl
  - id: finance-C-125
    when: When implementing cost basis methods
    action: use heap-based acquisition tracking for FIFO/LIFO/HIFO to maintain sorted order
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Non-heap implementation causes O(n log n) sorting overhead on each insertion, degrading performance significantly
      for portfolios with many acquisitions
    stage_ids:
    - accounting_pnl
  - id: finance-C-127
    when: When accessing cost basis functionality
    action: use CostBasisCalculator as the sole entry point for each cost basis operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing CostBasisCalculator causes inconsistent state between acquisition tracking and PnL calculations,
      leading to incorrect tax reports
    stage_ids:
    - accounting_pnl
  - id: finance-C-128
    when: When classifying asset dispositions as taxable or tax-free
    action: evaluate taxability based on acquisition timestamp plus taxfree_after_period compared to disposal timestamp
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect holding period calculation causes assets to be misclassified, resulting in either overpayment of
      taxes or compliance violations
    stage_ids:
    - accounting_pnl
  - id: finance-C-129
    when: When generating CSV export for PnL reports
    action: 'include each required columns: type, notes, location, timestamp, asset, asset_identifier, free_amount, taxable_amount,
      price, pnl_taxable, cost_basis_taxable, pnl_free, cost_basis_free, direction'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing CSV columns cause incompatible exports that cannot be imported into tax software or audited properly
    stage_ids:
    - accounting_pnl
  - id: finance-C-130
    when: When generating tax reports
    action: claim rotki calculations are guaranteed accurate for tax filing purposes
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting estimates as guarantees creates legal liability and may cause users to file incorrect tax returns
      with regulatory authorities
    stage_ids:
    - accounting_pnl
  - id: finance-C-131
    when: When querying historical prices for tax calculations
    action: claim price oracle queries return guaranteed accurate values
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Price oracle failures or network issues may result in ZERO_PRICE values, causing incorrect cost basis and
      PnL calculations that propagate to tax reports
    stage_ids:
    - accounting_pnl
  - id: finance-C-132
    when: When comparing backtested PnL results to live trading
    action: represent simulated tax calculations as equivalent to actual execution results
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtested PnL ignores slippage, liquidity constraints, and timing differences, causing expectations to diverge
      significantly from actual trading results
    stage_ids:
    - accounting_pnl
  - id: finance-C-133
    when: When modifying cost basis calculation logic
    action: modify FIFO/LIFO/HIFO heap ordering without understanding the priority mechanism
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Incorrect heap priority calculation breaks the cost basis method ordering, causing wrong lots to be matched
      and incorrect PnL calculations that may trigger audit flags
    stage_ids:
    - accounting_pnl
  - id: finance-C-136
    when: When performing write operations on user database
    action: use user_write() context manager which sets commit_ts=True to update last_write_ts
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing last_write_ts timestamp breaks cache invalidation, causing stale cached queries to return outdated
      balance and event data
    stage_ids:
    - database_layer
  - id: finance-C-137
    when: When changing database password
    action: re-encrypt both conn and conn_transient databases with the new password
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Changing password for only one database leaves the other database accessible with the old password, breaking
      encryption consistency
    stage_ids:
    - database_layer
  - id: finance-C-138
    when: When executing PnL report calculations
    action: use transient_write() for the separate transient database to isolate calculations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Report calculations in the main database pollute user data and cannot be cleared independently, leading to
      database bloat and potential data corruption
    stage_ids:
    - database_layer
  - id: finance-C-141
    when: When querying balance or event data with cache
    action: track modification timestamps to enable selective cache invalidation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without modification tracking, the system invalidates entire caches causing repeated expensive blockchain
      queries and degraded performance
    stage_ids:
    - database_layer
  - id: finance-C-145
    when: When exporting database to unencrypted format
    action: use critical_section lock to prevent concurrent modifications during export
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Concurrent writes during export cause plaintext database lock errors or inconsistent data in exported file
    stage_ids:
    - database_layer
  - id: finance-C-146
    when: When chunking SQL queries with variable bindings
    action: split queries into chunks of at most 10000 variables per statement
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding SQLite variable limit causes 'too many SQL variables' errors, breaking batch operations
    stage_ids:
    - database_layer
  - id: finance-C-147
    when: When setting up SQLCipher database pragmas
    action: enable foreign_keys=ON, cache_size=-32768, and journal_mode=WAL for data integrity and performance
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Missing optimizations cause poor query performance and disabled foreign keys allow orphaned records
    stage_ids:
    - database_layer
  - id: finance-C-148
    when: When creating new database upgrade scripts
    action: increment version from current to current+1 and register UpgradeRecord in UPGRADES_LIST
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing or misordered upgrade registration leaves database at wrong version, causing schema mismatches and
      query failures
    stage_ids:
    - database_layer
  - id: finance-C-149
    when: When the system claims database encryption capability
    action: claim the database is unreadable without the user password when SQLCipher is properly configured
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Overclaiming security guarantees when database uses weak or no encryption exposes users to data theft risk
    stage_ids:
    - database_layer
  - id: finance-C-150
    when: When the system provides database backup functionality
    action: guarantee data recovery after failed upgrades without user intervention
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Overpromising recovery guarantees when backups may be missing or corrupted leaves users without recourse
      for data loss
    stage_ids:
    - database_layer
  - id: finance-C-154
    when: When normalizing underlying token weights in compound tokens
    action: verify weights sum to exactly 100% (ONE in FVal terms) for cost basis calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Compound tokens with misaligned underlying weights cause incorrect cost basis allocation, leading to inaccurate
      tax reporting and false MissingAcquisition events
    stage_ids:
    - asset_registry
  - id: finance-C-155
    when: When implementing cost basis calculations for wrapped tokens
    action: map WETH (eip155:1/erc20:0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2) to ETH for cost basis bucket consolidation
    severity: high
    kind: domain_rule
    modality: must
    consequence: WETH and ETH treated as separate assets cause fragmented cost basis tracking, inflating taxable events when
      users unwrap WETH to ETH
    stage_ids:
    - asset_registry
  - id: finance-C-156
    when: When caching resolved Asset instances
    action: invalidate AssetResolver caches after editing token properties in GlobalDBHandler
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Stale cache entries cause resolved assets to retain outdated metadata (name, decimals, protocol), leading
      to incorrect price queries and balance calculations
    stage_ids:
    - asset_registry
  - id: finance-C-157
    when: When querying price oracles for assets
    action: check oracle mappings before issuing API requests to prevent UnsupportedAsset errors
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Querying oracles without checking mappings raises UnsupportedAsset exceptions, breaking price inquiry pipeline
      and leaving assets with zero USD value
    stage_ids:
    - asset_registry
  - id: finance-C-158
    when: When adding new EVM tokens to the database
    action: validate token address is ERC20/ERC721 conformant before insertion to prevent data corruption
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Non-conformant tokens inserted into globaldb cause query failures and cascade errors in balance/tx decoding
      pipelines
    stage_ids:
    - asset_registry
  - id: finance-C-159
    when: When detecting spam tokens during token discovery
    action: mark detected spam tokens with SPAM_PROTOCOL and add them to user's ignored assets list
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unmarked spam tokens appear in user balances and transaction history, cluttering the UI and causing confusion
      about actual portfolio value
    stage_ids:
    - asset_registry
  - id: finance-C-160
    when: When handling unknown asset identifiers during resolution
    action: raise UnknownAsset exception with the identifier for caller to handle custom asset creation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Silently returning None or generic objects for unknown assets causes downstream type errors and breaks resolve_to_*
      methods expecting specific asset subclasses
    stage_ids:
    - asset_registry
  - id: finance-C-161
    when: When resolving assets via AssetResolver
    action: normalize identifier to canonical form (case-insensitive) and cache the result
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without normalization, 'eTh' and 'ETH' create different Asset instances, breaking dict key lookups and equality
      checks in portfolio calculations
    stage_ids:
    - asset_registry
  - id: finance-C-162
    when: When creating Solana token identifiers
    action: use CAIP-19 format 'solana/{token_type}:{address}' for chain-agnostic identification
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-CAIP-19 Solana identifiers cause parsing failures in identifier_to_evm_address() and break cross-chain
      asset resolution
    stage_ids:
    - asset_registry
  - id: finance-C-163
    when: When querying cryptocurrency price oracles
    action: claim real-time price data when using CoinGecko/Cryptocompare which have inherent polling delays
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting polled oracle prices as real-time misleads users about price accuracy, especially during volatile
      market conditions where delays cause significant value discrepancies
    stage_ids:
    - asset_registry
  - id: finance-C-164
    when: When handling CustomAsset identifiers
    action: require user-provided custom_asset_type field to categorize non-standard assets
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Custom assets without type categorization cannot be filtered or grouped, making portfolio reports incomplete
      and tax calculations inaccurate
    stage_ids:
    - asset_registry
  - id: finance-C-165
    when: When resolving asset equality
    action: perform case-insensitive identifier comparison to verify 'ETH' == 'eth' == 'Eth'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Case-sensitive comparison breaks hash-based collections and causes duplicate asset entries in portfolio tracking,
      corrupting balance calculations
    stage_ids:
    - asset_registry
  - id: finance-C-166
    when: When passing blockchain address lists from api_layer to blockchain_data_collection
    action: normalize each addresses to checksummed EVM addresses for supported chains or valid BTC/BCH/substrate addresses
      for their respective chains
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unchecksummed addresses will cause blockchain queries to fail silently or query wrong accounts, resulting
      in missing transaction data and incorrect balance calculations
  - id: finance-C-168
    when: When querying blockchain data with RPC node configurations
    action: assume RPC responses are trusted without validation — each blockchain data must be validated against source-of-truth
      indexers
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Malicious or faulty RPC nodes can return fabricated transaction data, causing false positive event detection
      and incorrect accounting calculations
  - id: finance-C-169
    when: When passing exchange credentials from api_layer to exchange_integration
    action: store API keys as ApiKey (NewType string) and ApiSecret (NewType bytes) with proper type validation at the boundary
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect type handling of credentials causes authentication failures, preventing exchange data synchronization
  - id: finance-C-170
    when: When querying exchange history events with time filters
    action: pass start_ts and end_ts as integer Timestamp (seconds) to exchange query methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing TimestampMS or float timestamps causes exchange API requests to fail with invalid parameter errors,
      preventing historical event retrieval
  - id: finance-C-171
    when: When passing raw transaction receipts from blockchain_data_collection to transaction_decoding
    action: 'verify transaction receipt contains required fields: tx_hash, block_number, status, logs array before invoking
      decoder'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incomplete receipt data causes decoder to raise DeserializationError, leaving transactions permanently undecoded
  - id: finance-C-172
    when: When raw blockchain transaction data is unavailable
    action: proceed with transaction decoding without pulling transaction receipts from the chain
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Attempting to decode transactions without receipts produces empty event lists, wasting computation and leaving
      user transactions unprocessed
  - id: finance-C-175
    when: When passing normalized HistoryEvent records from exchange_integration to history_event_management
    action: convert each exchange-specific event timestamps to TimestampMS (milliseconds since epoch) for storage in DB
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched timestamp precision causes events to be stored with incorrect timestamps, leading to out-of-order
      processing and wrong cost basis calculations
  - id: finance-C-176
    when: When passing HistoryEvent records from exchange_integration
    action: populate the location field with the correct Location enum value matching the exchange (e.g., Location.BINANCE,
      Location.KRAKEN)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Wrong location causes exchange events to be misattributed, breaking event grouping and causing incorrect
      tax reporting
  - id: finance-C-178
    when: When passing events to accounting_pnl that require cost basis tracking
    action: verify each events have Asset instances resolved through AssetResolver before processing — unresolved asset identifiers
      cause UnknownAsset exceptions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unresolved assets cause processing to skip events silently or raise exceptions, resulting in incomplete PnL
      reports with missing transactions
  - id: finance-C-179
    when: When history_event_management generates custom events not matching standard HistoryEvent patterns
    action: implement AccountingEventMixin interface (get_timestamp, get_accounting_event_type, get_identifier, should_ignore,
      get_assets, process, serialize, deserialize) for any custom event type
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Custom events without proper AccountingEventMixin implementation are silently skipped during PnL processing,
      causing missing transactions in reports
  - id: finance-C-180
    when: When passing ProcessedAccountingEvent records from accounting_pnl to database_layer
    action: 'populate each required ProcessedAccountingEvent fields: event_type, notes, location, timestamp, asset, free_amount,
      taxable_amount, price, pnl, cost_basis, index'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incomplete ProcessedAccountingEvent records cause CSV export and API responses to contain null/missing values,
      breaking downstream reporting
  - id: finance-C-181
    when: When non-premium users exceed FREE_PNL_EVENTS_LIMIT during accounting
    action: cap event processing at FREE_PNL_EVENTS_LIMIT (1000 events) and return truncated results
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Without enforcing the limit, non-premium users receive incomplete tax reports, potentially causing incorrect
      tax filings
  - id: finance-C-182
    when: When saving PNL reports to database_layer
    action: serialize report with timestamp, start_ts, end_ts, first_processed_timestamp before inserting to DB
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reports saved without proper timestamps cannot be retrieved by date range, making historical tax reports
      inaccessible
  - id: finance-C-183
    when: When querying database_layer for cached data to return to api_layer
    action: deserialize DB records using proper from_db methods — do not return raw tuples to API
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Raw DB tuples exposed to API layer cause serialization errors and potential data leakage of internal identifiers
  - id: finance-C-184
    when: When database_layer returns query results to api_layer
    action: wrap each successful results using _wrap_in_ok_result or _wrap_in_result before sending HTTP response
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unwrapped responses cause frontend to receive malformed JSON, breaking API contract and causing UI errors
  - id: finance-C-185
    when: When asset_registry provides Asset instances to accounting_pnl for cost basis tracking
    action: resolve each asset identifiers to AssetWithNameAndType subclasses (EvmToken, CryptoAsset, etc.) before passing
      to cost basis calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unresolved assets cause WrongAssetType errors during cost basis processing, breaking FIFO/LIFO calculations
      for affected transactions
  - id: finance-C-186
    when: When asset_registry resolves assets for accounting_pnl cost basis
    action: return assets with normalized identifiers — identifiers must match database canonical form (uppercase for ETH,
      checksummed for EVM tokens)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-normalized identifiers cause cost basis events to reference wrong assets, creating duplicate entries
      in PnL calculations
  - id: finance-C-187
    when: When asset_registry provides token metadata to blockchain_data_collection for balance queries
    action: return EvmToken/SolanaToken with chain_id, address, and decimals fields populated for token balance queries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incomplete token metadata causes balance queries to fail or return zero balances, making user portfolios
      appear incomplete
  - id: finance-C-188
    when: When blockchain_data_collection queries balances for newly discovered tokens
    action: attempt to fetch token balances without first validating token exists in asset_registry
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Querying unknown tokens wastes RPC bandwidth and may return misleading zero balances for legitimate tokens
      not yet in registry
  - id: finance-C-189
    when: When event processing creates new events from paired events (basis transfers, prefork events)
    action: verify paired events share the same group_identifier and are processed in sequence_index order
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched group_identifiers cause paired events to be processed separately, breaking cost basis tracking
      and producing incorrect PnL
  - id: finance-C-190
    when: When database_layer caches query results for api_layer
    action: set specified TTL on cached data — balance caches expire quickly (1 min), price caches follow price_ttl setting,
      event caches are invalidated by transaction updates
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Stale cached data causes API to return outdated balances/prices, misleading users about their actual portfolio
      value
  - id: finance-C-197
    when: When resolving assets for cost basis calculations
    action: Call Asset.resolve() before using any asset in calculations; WETH must resolve to ETH for cost basis tracking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unresolved assets cause MissingAcquisition errors and incorrect cost basis tracking, leading to incorrect
      PnL calculations and tax liability over/under-reporting
  - id: finance-C-198
    when: When pairing history events from the same transaction
    action: Use group_identifier (transaction hash) + sequence_index to uniquely identify and pair related events
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect event pairing breaks transaction grouping, causing events to be displayed or processed out of context,
      leading to accounting errors
  - id: finance-C-199
    when: When serializing EVM transaction references
    action: Serialize tx_ref as bytes using bytes(tx_ref) for database storage
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect tx_ref serialization breaks EVM event-to-transaction linkage, causing decoded events to appear
      orphaned and unprocessable
  - id: finance-C-200
    when: When implementing EVM protocol decoders
    action: Prefer addresses_to_decoders() over generic decoding_rules() for performance — only use decoding_rules() when
      no reliable address/topic/input selector scoping exists
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Overusing decoding_rules() causes per-log decoder evaluation overhead, degrading decode throughput for all
      transactions
  - id: finance-C-201
    when: When determining accounting treatment for history events
    action: Use event direction (IN/OUT/NEUTRAL) as returned by get_event_direction() to determine how events affect taxable
      calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect direction-based accounting causes transactions to be misclassified, leading to incorrect taxable
      gains/losses and potential audit findings
  - id: finance-C-202
    when: When initializing default accounting settings
    action: Use DEFAULT_TAXFREE_AFTER_PERIOD=1 year, DEFAULT_COST_BASIS_METHOD=FIFO, DEFAULT_INCLUDE_CRYPTO2CRYPTO=True unless
      explicitly overridden by user
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using incorrect defaults violates user expectations and jurisdictional tax rules, leading to incorrect tax
      liability calculations
  - id: finance-C-203
    when: When implementing exchange interface additions
    action: Implement ExchangeInterface superclass methods for authentication, balance fetching, and deposit/withdrawal/trade
      retrieval
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing interface implementation causes incomplete exchange data retrieval, leading to gaps in portfolio
      tracking and incomplete tax reports
  - id: finance-C-205
    when: When presenting rotki's capabilities to users or stakeholders
    action: Claim support for non-cryptocurrency asset tracking — rotki is designed exclusively for crypto assets
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users who expect stock, bond, or traditional finance tracking will encounter missing features, incorrect
      calculations, and inability to properly categorize non-crypto assets
  - id: finance-C-206
    when: When presenting rotki's capabilities to organizations
    action: Claim enterprise multi-user access control with audit trails — rotki is single-user, self-hosted software without
      built-in multi-user authentication or audit logging
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Organizations requiring role-based access control, audit trails, and compliance tracking will have no mechanism
      to enforce these requirements within rotki
  - id: finance-C-207
    when: When presenting rotki's tax calculation results
    action: Present rotki's calculations as official tax advice — tax calculations are automated estimates only
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users who rely solely on rotki's tax estimates without professional review risk filing incorrect tax returns,
      leading to penalties, interest, and legal consequences
  - id: finance-C-208
    when: When developing or modifying rotki code
    action: Always use pytestgeventwrapper.py for backend tests instead of direct pytest invocation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Direct pytest execution without gevent patching causes runtime errors and test failures that don't occur
      in production, leading to wasted debugging time
  - id: finance-C-209
    when: When adding hex/bytes constants in protocol decoders
    action: Convert hex signatures to byte literals (b'\x...') and verify round-trip with bytes.fromhex() — do not keep bytes.fromhex()
      in final constant definitions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-byte-literal constants cause parsing errors, signature mismatches, and failed transaction decoding
  - id: finance-C-210
    when: When implementing price oracle queries
    action: Handle RemoteError, PriceQueryUnsupportedAsset, and DefiPoolError gracefully with logging and continue processing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Uncaught oracle exceptions cause single price query failures to cascade into complete accounting/report failures,
      making the system unusable
  - id: finance-C-211
    when: When adding EVM address constants in tests or code
    action: Use to_checksum_address() output for EVM address constants — do not use string_to_evm_address() for literal addresses
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: string_to_evm_address() is a no-op typing function that doesn't checksum; literal addresses not checksummed
      cause 'Invalid XXX account in DB' errors
  - id: finance-C-212
    when: When reviewing rotki code changes
    action: Assume error handling is missing without tracing function implementations to their actual definitions
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: False positive error handling suggestions waste maintainer time and introduce unnecessary try-catch blocks
      that mask real issues
  - id: finance-C-213
    when: When reviewing code and identifying potential issues
    action: Provide exact code line references and trace full code paths before flagging any issue
    severity: medium
    kind: rationalization_guard
    modality: must
    consequence: Insufficient evidence-based reviews generate false positives, causing maintainer fatigue and slowing legitimate
      bug fixes
  - id: finance-C-214
    when: When implementing event processing logic for multi-leg transactions such as DEX swaps and complex transfers
    action: Group events using group_id + sequence_index identifiers to enable correct pairing; sequence_index must follow
      convention (SPEND=0, RECEIVE=1) to prevent misattribution between unrelated transactions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper group/sequence indexing, DEX swap events (spend + receive) get misattributed, causing incorrect
      cost basis tracking and tax reporting for cryptocurrency trades
    derived_from_bd_id: BD-013
  - id: finance-C-215
    when: When implementing cost basis disposal calculations for portfolios with thousands of transactions
    action: Use heapq-based acquisition tracking (_acquisitions_heap) for O(log n) insertion and O(1) min/max access to enable
      performant FIFO/LIFO/HIFO matching
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without heap-based tracking, list-based acquisition tracking requires O(n) sorting on each disposal event,
      causing exponential performance degradation in large portfolios with frequent rebalancing
    derived_from_bd_id: BD-016
  - id: finance-C-216
    when: When configuring cost basis calculation for portfolios containing assets with 1:1 mappings (like cToken variants)
    action: Verify that use_asset_collections_in_cost_basis=True matches user intent; if separate cost basis tracking is required,
      explicitly set use_asset_collections_in_cost_basis=False in database settings
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default asset collection sharing causes functionally equivalent assets to merge cost basis pools, potentially
      understating gains when one variant is sold at a profit while another is at a loss
    derived_from_bd_id: BD-037
  - id: finance-C-217
    when: When processing accounting calculations for user portfolios
    action: Verify the ignored_assets list is correctly maintained and intentionally curated; verify no assets are silently
      excluded that should be included in tax calculations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Ignored assets are completely excluded from all accounting calculations, which may cause underreported capital
      gains and tax liability if exclusions are not periodically reviewed
    derived_from_bd_id: BD-047
  - id: finance-C-220
    when: When processing cost basis for assets held before cryptocurrency hard forks
    action: 'When spending pre-fork assets, proportionally reduce cost basis across each forked chains: pre-fork ETH spend
      reduces both ETH and ETC pools; pre-fork BTC spend reduces BTH, BCH, and BSV pools proportionally'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failing to maintain fork spend invariant causes cost basis to be incorrectly allocated across forked assets,
      leading to tax compliance violations in jurisdictions treating forked assets as distinct entities
    derived_from_bd_id: BD-090
  - id: finance-C-221
    when: When implementing or modifying SWAP event processing, sequence indexing, or acquisition taxable flags
    action: 'Maintain the invariant chain: BD-088 (OUT-before-IN swap ordering) → BD-089 (sequence_index convention SPEND=0,
      RECEIVE=1) → BD-105 (acquisitions non-taxable); any modification to one component requires re-validating the entire
      chain'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: 'Violation of any invariant in the chain causes cascade failures: OUT-before-IN reordering makes BD-105 taxable
      flag assignment incorrect, sequence_index mismatches misattribute fees, resulting in wrong swap taxability calculations'
    derived_from_bd_id: BD-114
  - id: finance-C-222
    when: When implementing or refactoring cost basis acquisition tracking logic
    action: Use running totals (total cost, total quantity) for Average Cost Basis calculations instead of maintaining a full
      lot history with per-lot tracking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching to lot-level ACB tracking introduces repeated division operations and floating-point accumulation
      errors that corrupt cost basis calculations over time
    derived_from_bd_id: BD-018
  - id: finance-C-224
    when: When configuring the accounting event processing cache size
    action: Verify the PROCESSABLE_EVENTS_CACHE_SIZE setting matches expected portfolio scale — default value of 1500 balances
      memory usage against repeated computation; adjust for portfolios with more than 1500 unique asset/event rule combinations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Cache undersizing causes repeated computation of accounting rules for large portfolios; cache oversizing
      wastes memory without proportional performance gains
    derived_from_bd_id: BD-050
  - id: finance-C-225
    when: When configuring profit reporting currency for accounting output
    action: Verify DEFAULT_MAIN_CURRENCY setting matches the user's primary trading pair — USD (A_USD) provides universal
      reporting but non-USD traders should configure their native currency for accurate gain/loss visualization
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Non-USD users relying on USD defaults may misinterpret PnL figures without proper currency conversion, leading
      to incorrect tax calculations and reporting
    derived_from_bd_id: BD-053
  - id: finance-C-228
    when: When calculating cost basis for positions involving WETH
    action: Use _resolve_bucket_asset function to map WETH to the ETH bucket for cost basis calculations — do not treat WETH
      as a separate asset requiring independent cost basis tracking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Treating WETH as separate from ETH creates two independent cost basis pools for economically equivalent positions,
      resulting in incorrect ACB calculations and potential over/under-reporting of gains
    derived_from_bd_id: BD-094
  - id: finance-C-229
    when: When implementing or overriding the AccountingEventMixin.process() method
    action: Accept a peekable iterator parameter and return the consumed event count — subclasses must maintain this contract
      or downstream event coordination will break
    severity: high
    kind: domain_rule
    modality: must
    consequence: Breaking the peekable iterator contract causes event coordination failures across accounting modules, resulting
      in events being skipped, duplicated, or processed out of order
    derived_from_bd_id: BD-097
  - id: finance-C-230
    when: When implementing custom cost basis strategies or modifying acquisition ordering
    action: Implement compatible priority tuple semantics for the heapq-based acquisition tracking — FIFO must use incrementing
      counter as secondary key after timestamp; HIFO must use negative acquisition rate
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incompatible priority tuple semantics cause incorrect acquisition ordering in the heap, leading to wrong
      cost basis calculations that silently corrupt tax reports
    derived_from_bd_id: BD-104
  - id: finance-C-231
    when: When identifying or creating token instances across different blockchains
    action: Use chain-specific token classes (EvmToken, SolanaToken) with chain_id context rather than address-only identification;
      token addresses are not globally unique across blockchains and the same numeric address may exist on multiple chains
    severity: high
    kind: domain_rule
    modality: must
    consequence: Address-only token identification causes cross-chain token collisions where an ERC-20 token and a Solana
      SPL token with the same address are incorrectly treated as identical assets, leading to wrong asset balances and incorrect
      trade execution
    derived_from_bd_id: BD-025
  - id: finance-C-232
    when: When configuring CSV export or adjusting row reference formulas in accounting
    action: Verify CSV_INDEX_OFFSET=2 matches the actual file structure; this offset accounts for the title row and Excel's
      1-based row numbering in formulas, ensuring SUMIF formulas correctly reference data ranges
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect CSV_INDEX_OFFSET causes formulas to reference wrong rows, leading to data miscalculation where
      SUMIF operations sum incorrect data ranges or fail to match expected values
    derived_from_bd_id: BD-055
  - id: finance-C-233
    when: When configuring tax reporting settings or modifying tax-free holding period defaults
    action: Verify DEFAULT_TAXFREE_AFTER_PERIOD=YEAR_IN_SECONDS matches the user's jurisdiction requirements; US tax rules
      require 1-year holding for long-term capital gains treatment but other jurisdictions have different thresholds; adjust
      to country-specific rules before generating tax reports
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using the default 1-year tax-free holding period without jurisdiction verification either over-reports taxes
      in jurisdictions with shorter periods or under-reports taxes in jurisdictions with longer requirements, leading to incorrect
      tax liability calculations
    derived_from_bd_id: BD-070
  - id: finance-C-235
    when: When processing swap acquisition events in trade accounting
    action: Set taxable=False for swap acquisition events; the corresponding disposal of the given asset in the same swap
      already triggers the taxable event, and setting taxable=True would cause double-counting of capital gains and losses
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting taxable=True for swap acquisitions causes double-counting of gains and losses where both the disposal
      and acquisition sides of the same swap are treated as taxable events, resulting in significantly overstated or understated
      capital gains tax liability
    derived_from_bd_id: BD-105
  - id: finance-C-236
    when: When processing fee events in trade accounting sequence
    action: Process fee events after SPEND events when the fee asset matches the spent asset, or when the fee's sequence_index
      is less than the RECEIVE event's sequence_index; this ensures fee events are attributed to the correct trade leg
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect fee event ordering causes fees to be miscategorized or creates artificial price distortions in
      trade legs, leading to incorrect cost basis calculations and distorted P&L reporting across multiple transactions
    derived_from_bd_id: BD-107
  - id: finance-C-238
    when: When implementing historical transaction data retrieval with indexer failover
    action: Implement alert/warning when falling back from indexers to RPC for historical queries — RPC endpoints do not return
      complete internal transaction data; add data quality indicator when fallback occurs
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Silent RPC fallback causes incomplete historical data to be used for cost basis calculations, creating missing
      internal transactions in acquisition history that affect tax accuracy
    derived_from_bd_id: BD-108
  - id: finance-C-239
    when: When implementing cost basis calculations with asset collections enabled
    action: Document how FIFO/LIFO/HIFO lot consumption order behaves when asset collections merge lots from different asset
      identifiers — verify that LIFO users understand lots are ordered by acquisition time across the merged pool, not per-asset
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Undocumented lot ordering across asset collection pools causes LIFO users to receive unexpected tax lots,
      potentially resulting in higher tax liability than anticipated
    derived_from_bd_id: BD-109
  - id: finance-C-240
    when: When implementing WETH wrap/unwrap transactions with fees included in cost basis
    action: Review WETH→ETH unwrap transactions to verify fee treatment asymmetry — if include_fees_in_cost_basis is True,
      unwrapping WETH does not recover gas fees from ETH bucket, creating permanent tax cost on wrap operations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Fee treatment asymmetry causes wrap/unwrap cycles to have asymmetric tax costs, systematically overstating
      tax liability for users who frequently wrap and unwrap WETH
    derived_from_bd_id: BD-110
  - id: finance-C-241
    when: When implementing or refactoring cryptocurrency fork handling logic
    action: Use BTC_BCH_FORK_TS=1501593374 for BCH/BSV fork detection — do not change or recalculate this timestamp value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the fork timestamp would misattribute BCH and BSV prefork acquisitions to wrong holders, causing
      incorrect cost basis calculations and phantom capital gains in tax reports
    derived_from_bd_id: BD-041
  - id: finance-C-242
    when: When implementing or refactoring BSV fork attribution logic
    action: Use BCH_BSV_FORK_TS=1542304352 for BSV prefork detection — do not change or recalculate this timestamp value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the BSV fork timestamp would misattribute BSV acquisitions to wrong holders, causing incorrect cost
      basis attribution for BCH holders at fork height
    derived_from_bd_id: BD-042
  - id: finance-C-243
    when: When implementing or refactoring internal transfer event handling in accounting
    action: Apply BASIS_TRANSFER treatment pairing OUT event with paired IN event for the same transfer transaction — do not
      treat internal transfers as disposal/reacquisition
    severity: high
    kind: domain_rule
    modality: must
    consequence: Treating internal transfers as disposal/reacquisition would create phantom taxable events for every internal
      account movement, resulting in incorrect capital gains calculations and potential overpayment of taxes
    derived_from_bd_id: BD-044
  - id: finance-C-244
    when: When implementing Bitcoin address discovery or HD wallet scanning logic
    action: Use gap limit of 20 for BTC address derivation (DEFAULT_BTC_DERIVATION_GAP_LIMIT=20) — stop derivation after 20
      consecutive unused addresses per BIP44 standard
    severity: high
    kind: domain_rule
    modality: must
    consequence: Increasing gap limit beyond 20 multiplies API calls and response times without meaningful completeness improvement;
      decreasing below 20 may miss wallet activity in high-usage wallets, causing silent balance discrepancies
    derived_from_bd_id: BD-073
  - id: finance-C-245
    when: When implementing oracle health monitoring or penalty logic
    action: Apply penalty after exactly 5 consecutive oracle query failures (DEFAULT_ORACLE_PENALTY_THRESHOLD_COUNT=5) — do
      not penalize oracles before 5 failures
    severity: high
    kind: domain_rule
    modality: must
    consequence: Lowering the threshold below 5 would penalize healthy oracles during brief network outages, reducing price
      feed redundancy and potentially causing reliance on degraded data sources
    derived_from_bd_id: BD-074
  - id: finance-C-246
    when: When implementing oracle penalty duration and reactivation logic
    action: Lift oracle penalty after exactly 1800 seconds (30 minutes) of recovery time (DEFAULT_ORACLE_PENALTY_DURATION=1800)
      — do not re-enable penalized oracles before this window
    severity: high
    kind: domain_rule
    modality: must
    consequence: Shortening the penalty duration below 30 minutes risks re-enabling unstable oracles before full recovery,
      potentially reintroducing incorrect price data into the feed rotation
    derived_from_bd_id: BD-075
  - id: finance-C-248
    when: When implementing ETH2 staking balance queries or tax reporting
    action: Verify jurisdiction-specific tax treatment before enabling treat_eth2_as_eth flag — consult tax professional as
      ETH2 and ETH have different withdrawal mechanisms that may affect tax treatment
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Collapsing ETH2 staking into ETH balance via treat_eth2_as_eth may be incorrect in jurisdictions where ETH2
      is treated as a different asset, causing tax reporting errors for staking rewards
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-249
    when: When using asset collections feature alongside fork handling
    action: Review asset collection mappings before enabling fork handling — verify that forked assets (ETC/BCH/BSV) have
      explicit cost basis rules defined for each collection configuration
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Enabling asset collections with fork handling creates ambiguous cost basis attribution where spending parent
      assets after a fork may simultaneously affect multiple cost basis pools, leading to silent calculation errors in tax
      reports
    derived_from_bd_id: BD-111
  - id: finance-C-250
    when: When processing staking rewards with ETH2 treated as ETH
    action: Verify jurisdiction-specific tax treatment for staking rewards before relying on ETH2-as-ETH cost basis logic
      — consult tax professional as staking rewards may constitute taxable income
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Treating staking rewards as regular ETH acquisitions via ETH2-as-ETH flag may miss taxable income reporting
      requirements in jurisdictions where staking rewards are taxable events, leading to underreported tax obligations
    derived_from_bd_id: BD-116
  - id: finance-C-251
    when: When implementing CSV export functionality for PnL reports
    action: Generate SUMIF formulas in CSV output when pnl_csv_with_formulas=True to enable dynamic recalculation and audit
      trail preservation in spreadsheet applications
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing SUMIF formulas breaks auditability and prevents users from modifying source data while maintaining
      accurate totals, causing discrepancies between manual spreadsheet analysis and system reports
    derived_from_bd_id: BD-054
  - id: finance-C-252
    when: When implementing cost basis calculation for asset disposals
    action: Set CostBasisInfo.is_complete=False when spend amount exceeds found acquisition lots, preventing silent calculation
      with partial cost basis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting the is_complete flag check causes incorrect cost basis calculations with partial data, leading to
      misreported PnL and potential tax reporting errors that silently accumulate over time
    derived_from_bd_id: BD-056
  - id: finance-C-254
    when: When configuring blockchain transaction conflict resolution settings
    action: Verify DEFAULT_INTERNAL_TX_CONFLICT_REPULL_FREQUENCY=900 (15 minutes) matches the target blockchain's block confirmation
      time; shorter values risk re-pulling before block confirmation, longer values delay conflict visibility
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect conflict repull frequency causes either premature retries before block confirmation or delayed
      detection of conflicting transactions, leading to inconsistent internal balance states
    derived_from_bd_id: BD-079
  - id: finance-C-255
    when: When implementing API query retry logic for exchange data fetching
    action: Verify DEFAULT_QUERY_RETRY_LIMIT=5 matches target exchange rate limit characteristics; lower values fail too quickly
      on transient errors, higher values cause excessive wait times during outages
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect retry limit causes premature failures during transient rate limiting or excessive user-perceived
      delays during exchange outages, degrading data reliability
    derived_from_bd_id: BD-083
  - id: finance-C-256
    when: When implementing network timeout configuration for API requests
    action: Verify DEFAULT_CONNECT_TIMEOUT=DEFAULT_READ_TIMEOUT=30 seconds matches target exchange response patterns; shorter
      timeouts fail on legitimate slow responses, longer timeouts frustrate users
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect timeout values cause false failures on legitimate slow API responses or excessive waiting during
      outages, leading to incomplete data fetching and degraded user experience
    derived_from_bd_id: BD-084
  - id: finance-C-257
    when: When implementing cost basis calculation logic for asset disposals in the accounting module
    action: Maintain current_amount and current_total_acb as separate fields in the ACB tracker; never merge these fields
      or recalculate ACB from transaction history during disposal processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Merging current_amount and current_total_acb into a single field causes per-disposal ACB calculations to
      become inaccurate, leading to incorrect cost basis assignments that result in overpayment or underpayment of taxes across
      multiple disposal events
    derived_from_bd_id: BD-060
  - id: finance-C-258
    when: When implementing the order of operations in cost basis processing flow
    action: Calculate average cost basis BEFORE calling consume_result; do not reorder operations to place ACB calculation
      after consumption
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calculating ACB after consume_result commits stale calculation results to state, causing incorrect cost basis
      values to persist across disposal events and resulting in cumulative tax reporting errors that compound over time
    derived_from_bd_id: BD-061
  - id: finance-C-259
    when: When implementing event processing limit configuration in the accountant module
    action: Set events_limit to -1 for premium subscriptions to enable unlimited PnL event processing; free tier must enforce
      finite limits
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Removing the -1 unlimited flag for premium users causes complete PnL calculation failures for large portfolios,
      preventing accurate tax reporting and violating premium service guarantees
    derived_from_bd_id: BD-062
  - id: finance-C-260
    when: When implementing PnL event filtering logic in the cost basis processor
    action: Exclude KFEE (MakerDAO fee token) from cost basis and PnL calculation; treat it as a fee payment mechanism, not
      as a standard investment asset
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including KFEE in standard PnL calculations generates meaningless cost basis events for a non-investment
      fee token, corrupting tax reports with phantom gains and losses that have no economic substance
    derived_from_bd_id: BD-063
  - id: finance-C-261
    when: When implementing batch SQL operations with large portfolio data in database queries
    action: Increase SQL_VARIABLE_CHUNK_SIZE beyond 10000 to improve batch query performance
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Increasing chunk size above 10000 exceeds SQLite parameter limits, causing 'SQL too many variables' errors
      during large portfolio history queries and preventing batch operations from completing successfully
    derived_from_bd_id: BD-068
  - id: finance-C-263
    when: When using the default tax-free holding period for German-style tax reporting
    action: Verify that DEFAULT_TAXFREE_AFTER_PERIOD=1 year matches the user's tax jurisdiction; users in non-German jurisdictions
      must explicitly configure jurisdiction-specific tax-free period settings
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Applying the German-style 1-year tax-free period to US users who have no equivalent long-term capital gains
      threshold causes systematic underpayment of taxes and potential audit exposure from tax authorities
    derived_from_bd_id: BD-091
  - id: finance-C-264
    when: When determining taxable events for crypto-to-crypto trades using default settings
    action: Verify that DEFAULT_INCLUDE_CRYPTO2CRYPTO=True matches the user's jurisdiction tax rules; users in jurisdictions
      where C2C is non-taxable must explicitly disable this setting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Defaulting to C2C taxable treatment for users in non-taxable jurisdictions causes over-reporting of taxable
      events, creating unnecessary tax liability and potential disputes with tax authorities over phantom capital gains
    derived_from_bd_id: BD-092
  - id: finance-C-266
    when: When implementing or refactoring reset logic for AccountingPot
    action: 'Reset accounting components in the exact order: pnls → cost_basis → events_accountant. New accounting components
      added to AccountingPot must respect this reset dependency chain'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Resetting in wrong order leaves dependent components with stale data, causing cascading calculation errors
      in PnL and cost basis tracking that silently corrupt historical records
    derived_from_bd_id: BD-096
  - id: finance-C-267
    when: When adding new chain-specific accountant modules to the EVM accounting ecosystem
    action: Follow the naming convention and implement the expected interface for EVMAccountingAggregator auto-discovery;
      modules must be placed in the correct subdirectory structure
    severity: high
    kind: domain_rule
    modality: must
    consequence: New chain accountants not following naming conventions or interface will silently fail to load, causing incomplete
      EVM accounting coverage that only manifests as missing transactions
    derived_from_bd_id: BD-098
  - id: finance-C-268
    when: When configuring cost basis calculation for transactions involving UK or Canadian tax jurisdictions
    action: Verify that DEFAULT_INCLUDE_FEES_IN_COST_BASIS=True matches the user's tax jurisdiction requirements; UK and CAN
      users benefit from fee inclusion while US users typically need to disable this
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect fee inclusion setting causes systematic overstatement or understatement of gains, leading to incorrect
      tax filings and potential penalties
    derived_from_bd_id: BD-099
  - id: finance-C-269
    when: When handling staked ETH (ETH2) transactions for users in jurisdictions with specific staking tax treatment
    action: Verify that DEFAULT_TREAT_ETH2_AS_ETH=True aligns with user's regulatory requirements; users needing to distinguish
      liquid from staked ETH must disable this setting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Treating ETH2 as ETH when user requires separation causes incorrect cost basis tracking and potentially incorrect
      taxable event classification for staked positions
    derived_from_bd_id: BD-100
  - id: finance-C-270
    when: When generating profit/loss reports for users with non-USD primary currencies
    action: Verify that DEFAULT_MAIN_CURRENCY=USD matches the user's reporting requirements; non-USD users must explicitly
      configure their preferred reporting currency
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: USD reporting may not meet local currency reporting requirements and causes user confusion when exchange
      rate fluctuations affect displayed gains/losses
    derived_from_bd_id: BD-106
  - id: finance-C-271
    when: When processing multi-leg transactions involving crypto-to-fiat conversions
    action: 'Decompose crypto-to-fiat trades correctly: crypto→fiat is always taxable on the fiat leg, fiat→crypto is taxable
      on crypto acquisition, do not apply BD-035 fiat exemption to crypto-fiat trades'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrectly applying fiat exemption to crypto-to-fiat trades causes underreported taxable gains, potentially
      resulting in tax underpayment and penalties
    derived_from_bd_id: BD-117
  - id: finance-C-272
    when: When implementing or refactoring numerical computation modules
    action: Assume the framework handles matrix ill-conditioning and stability — matrix operations lack numerical stability
      safeguards such as condition number monitoring or pivot strategies
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without matrix stability handling, numerical computations may produce silently incorrect results when matrices
      become ill-conditioned, causing accumulated errors in calculations like portfolio optimization or covariance matrices
    derived_from_bd_id: BD-GAP-026
  - id: finance-C-273
    when: When implementing numerical computation modules that use matrix operations
    action: Implement numerical stability checks including condition number validation before matrix inversion, SVD-based
      stability monitoring, and fallback to stable algorithms when condition_number > 1e10
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without stability checks, ill-conditioned matrices produce wildly inaccurate results that propagate through
      the entire computation pipeline, leading to incorrect portfolio allocations or risk assessments
    derived_from_bd_id: BD-GAP-026
  - id: finance-C-274
    when: When implementing API endpoint handlers in the rotkehlchen API layer
    action: Maintain service layer separation — API handlers must delegate business logic to service classes (e.g., HistoryService)
      rather than embedding logic directly in handler functions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Embedding business logic in API handlers creates tight coupling between HTTP handling and domain logic, making
      unit testing impossible and causing regression bugs during refactoring
    derived_from_bd_id: BD-002
  - id: finance-C-275
    when: When querying historical transaction data for blockchain accounts
    action: Query indexers (Etherscan/Blockscout) first for historical transaction data — use RPC as fallback only for real-time
      data or contract calls where indexer latency would be problematic
    severity: high
    kind: domain_rule
    modality: must
    consequence: RPC-only queries miss internal transactions and contract-to-contract transfers, resulting in incomplete transaction
      histories that cause silent data loss in accounting and tax calculations
    derived_from_bd_id: BD-004
  - id: finance-C-276
    when: When implementing cost basis calculation methods (FIFO, LIFO, HIFO, Average)
    action: Use class inheritance strategy pattern for cost basis methods — implement separate subclasses inheriting from
      a common base class, not conditional branching with if/else statements
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Conditional branching for cost basis methods creates tangled logic that is difficult to test and maintain,
      risking incorrect tax lot selection and compliance failures during audits
    derived_from_bd_id: BD-017
  - id: finance-C-277
    when: When configuring cost basis calculation for user accounts
    action: Verify that the cost basis method matches the user's jurisdiction requirements — FIFO is the default but US investors
      may prefer specific methods, and some jurisdictions require FIFO by law
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using incorrect cost basis method for a user's jurisdiction causes systematic tax miscalculation, potentially
      resulting in underpayment penalties or overpayment of taxes due to incorrect capital gains computation
    derived_from_bd_id: BD-027
  - id: finance-C-282
    when: When implementing event redecode operations in history event management
    action: Implement and use the event backup/restore mechanism to preserve user modifications during redecode operations;
      verify decoded events can be restored to original state without losing user corrections
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without backup/restore, user-corrected events are silently lost during redecode operations, causing data
      quality degradation and inconsistent event state across sessions
    derived_from_bd_id: BD-015
  - id: finance-C-283
    when: When implementing tax calculation logic for spend events
    action: Set cost_basis_pnl flag on spend events based on holding period analysis; support fully taxable (short-term),
      partially tax-free (long-term portion), and fully tax-free classifications per jurisdiction requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper cost_basis_pnl flagging, tax calculations apply incorrect rates to all gains regardless of
      holding period, resulting in either overpayment (short-term rates on long-term gains) or underpayment (escaping taxation)
    derived_from_bd_id: BD-019
  - id: finance-C-284
    when: When querying historical blockchain or account state data via API
    action: Assume the framework provides point-in-time data availability for historical queries; do not rely on the system
      returning historical snapshots at specific timestamps
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time data availability, historical queries may return current data instead of historical
      snapshots, causing incorrect balance calculations and audit trail failures in tax reporting
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-285
    when: When implementing historical data retrieval for API layer
    action: Implement timestamp-parameterized queries or snapshot mechanisms to fetch historical states; verify that historical
      data endpoints accept timestamp parameters and return point-in-time consistent data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper point-in-time data retrieval, tax reports and audit trails use current balances for historical
      periods, causing incorrect tax calculations and non-compliance with audit requirements
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-286
    when: When implementing tax-free holding period calculations using time-based constants
    action: Verify YEAR_IN_SECONDS constant exists in rotkehlchen/constants/timing.py and equals 31536000; use this standardized
      value for taxfree_after_period calculations to determine long-term vs short-term capital gains classification
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect or missing YEAR_IN_SECONDS constant causes systematic errors in holding period calculations, misclassifying
      short-term vs long-term capital gains and producing incorrect tax liabilities
    derived_from_bd_id: BD-029
  - id: finance-C-287
    when: When configuring crypto tax calculation settings for a user account
    action: Verify that include_crypto2crypto=True matches the user's jurisdiction tax treatment of crypto-to-crypto trades;
      if the jurisdiction exempts such trades, explicitly set it to False before running accounting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: 'Wrong include_crypto2crypto setting causes incorrect taxable event detection: setting it to False in a jurisdiction
      that taxes crypto swaps creates underreported tax liability with potential penalties, while keeping True in an exempt
      jurisdiction causes overpayment'
    derived_from_bd_id: BD-031
  - id: finance-C-288
    when: When implementing swap event taxability logic in the accounting module
    action: Only trigger taxable events for swaps when the receiving asset is fiat currency OR include_crypto2crypto is explicitly
      set to True; crypto-to-crypto swaps without include_crypto2crypto enabled must not generate taxable events
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect swap taxability logic causes either phantom taxable gains (treating exempt crypto swaps as taxable)
      or missed tax obligations (treating taxable swaps as exempt), both resulting in inaccurate tax reports and potential
      compliance issues
    derived_from_bd_id: BD-033
  - id: finance-C-290
    when: When modifying trade events that affect cached query results
    action: Call _mark_events_modified() with affected event identifiers when modifying events; verify modification timestamp
      tracking is active to enable selective cache invalidation instead of relying on TTL-based or full rebuild strategies
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without modification timestamp tracking, cached query results become stale after event modifications, causing
      users to see outdated cost basis calculations and incorrect P&L reports until TTL expiration or manual cache clear
    derived_from_bd_id: BD-022
  - id: finance-C-291
    when: When designing or modifying database storage architecture for calculation artifacts
    action: Maintain transient database isolation for temporary calculation data (report intermediates, tax calculations)
      — store these separately from the main user database to enable independent cleanup without risking user data
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Mixing transient calculation data with main user database makes cleanup dangerous and risks accidental deletion
      of user data, while also causing database bloat that degrades performance over time
    derived_from_bd_id: BD-023
  - id: finance-C-292
    when: When processing events that involve SWAP transactions in tax accounting
    action: Implement data quality indicators that propagate through the event processing cascade, and validate that each
      internal transactions are captured before tax calculation completes
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Silent data quality failures cascade through grouping and pairing logic, causing incorrect PnL reports where
      swap transactions appear as isolated events rather than properly paired exchanges, leading to wrong tax submissions
    derived_from_bd_id: BD-118
  - id: finance-C-293
    when: When processing ETH2 staking rewards for tax calculation
    action: Mark staking rewards as taxable acquisitions upon receipt, explicitly distinguishing them from regular ETH holdings
      — do not apply BD-100's ETH2 equivalence mapping to staking income
    severity: high
    kind: domain_rule
    modality: must
    consequence: Treating staking rewards as non-disposal events per BD-100 causes the system to underreport taxable income
      in jurisdictions where US IRS and UK HMRC require income recognition at reward receipt
    derived_from_bd_id: BD-120
  - id: finance-C-294
    when: When serializing ChainID enum to human-readable chain names for API responses
    action: Validate chain name consistency between internal ChainID and canonical chain names; implement fallback handling
      when names differ or change
    severity: high
    kind: domain_rule
    modality: must
    consequence: Serialization breaks when chain names change or internal ChainID differs from canonical names, causing frontend
      display errors where 'ethereum' may resolve to wrong chain or fail deserialization entirely
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-295
    when: When enriching ProcessedAccountingEvent notes with addressbook labels at export time
    action: Pre-process addressbook labels to escape special regex characters before lookup, and implement timeout handling
      for slow addressbook queries
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Regex matching with unescaped labels containing special characters causes matching failures, leaving events
      unlabeled in exports even when addressbook entries exist
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-296
    when: When processing spending events that require matching to acquisition records
    action: Flag spending events for user review when acquisition count falls below spending count, and must not assume zero
      cost basis for unmatched acquisitions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silent zero-cost assumption for unmatched acquisitions causes cost basis to be systematically understated,
      resulting in overreported capital gains and incorrect tax liability calculations
    derived_from_bd_id: BD-048
  - id: finance-C-297
    when: When processing events with missing price data in accounting
    action: Flag events with missing price data using rate_limited status for user notification — must NOT silently use zero
      price, last available price, or any fallback that bypasses the flag mechanism
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without the rate_limited flag, missing prices cause silent calculation errors in P&L reporting; users receive
      incorrect accounting results with no indication that data was unavailable
    derived_from_bd_id: BD-049
  - id: finance-C-298
    when: When processing event batches in accounting with more than 500 events
    action: Execute gevent.sleep(0.5) every 500 events to yield control to other greenlets — must NOT skip or remove the yielding
      call
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without periodic yielding, accounting processing monopolizes the event loop causing greenlet starvation;
      other concurrent tasks fail to execute, potentially freezing the application or causing timeouts
    derived_from_bd_id: BD-051
  - id: finance-C-299
    when: When using the framework's default asset movement amount tolerance for cross-exchange reconciliation
    action: Verify that DEFAULT_ASSET_MOVEMENT_AMOUNT_TOLERANCE=0.005 matches actual exchange fee structures and rounding
      precision; adjust if exchanges have significantly different fee percentages or precision requirements
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default tolerance of 0.005 may cause false positives for exchanges with higher fees or false negatives for
      exchanges with very low fees; matching errors compound over time causing reconciliation discrepancies
    derived_from_bd_id: BD-076
  - id: finance-C-300
    when: When using the framework's default time range for asset movement matching
    action: Verify that DEFAULT_ASSET_MOVEMENT_TIME_RANGE=20_HOURS accommodates actual timezone differences and exchange processing
      delays; adjust for exchanges known to have longer backlogs if needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default time window of 20 hours may be too short for exchanges with significant processing delays or manual
      transfer review processes, causing missed matches and reconciliation gaps
    derived_from_bd_id: BD-077
  - id: finance-C-301
    when: When repulling internal Ethereum transactions during blockchain reconciliation cycles
    action: Verify that DEFAULT_INTERNAL_TXS_TO_REPULL=100 aligns with actual blockchain API rate limits and consistency requirements;
      monitor for rate limit responses and adjust batch size accordingly
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default batch size of 100 may trigger rate limiting on busy networks or cause slow convergence for wallets
      with many transactions, leading to incomplete reconciliation over extended periods
    derived_from_bd_id: BD-078
  - id: finance-C-302
    when: When implementing WebSocket message sending logic in the RotkiNotifier
    action: Maintain Semaphore(1) lock in _ws_send_impl to verify only one WebSocket message transmits at a time per connection;
      sequential sending preserves message ordering guarantees for progress updates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing the Semaphore(1) lock enables parallel message transmission, causing message interleaving that breaks
      progress update ordering; clients receive garbled or out-of-sequence progress notifications
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-303
    when: When implementing balance event processing in HistoricalBalancesManager
    action: Return (identifier, group_identifier) tuples for negative balance events instead of silently ignoring them; negative
      balances indicate missed events or incorrect transaction decoding and must be flagged as data integrity issues
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silently discarding negative balances causes missed events or incorrect transaction decoding to propagate
      undetected, leading to corrupted historical balance records and incorrect portfolio valuations
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-304
    when: When implementing Hyperliquid token deposit processing
    action: Process only USDC transfers and treat each other token deposits as invalid; Hyperliquid operates exclusively with
      USDC and accepting other tokens would misclassify deposits
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accepting non-USDC tokens for Hyperliquid deposits causes misclassification of transferred assets, leading
      to incorrect balance tracking and failed transaction matching in the protocol
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-305
    when: When implementing deposit extraction logic for GMX positions
    action: Maintain _extract_unique_deposits deduplication logic after fetching deposit events; deduplication minimizes blockchain
      RPC queries and prevents duplicate position processing when users modify collateral multiple times
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing deduplication causes duplicate position processing or missed positions due to timing issues, resulting
      in incorrect collateral tracking and potential financial discrepancies in position management
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-306
    when: When implementing two-phase transaction decoding for Umami protocol
    action: Use balance matching to distinguish deposit/withdraw request events from execution events instead of transaction
      graph analysis; balance matching is robust to blockchain reorgs and correctly correlates two-phase transactions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing balance matching with transaction graph analysis causes incorrect correlation of request-execution
      pairs during blockchain reorgs, leading to failed transaction tracking and potential loss of deposit/withdrawal records
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-307
    when: When implementing or refactoring cost basis calculation logic including the strategy pattern, heap structure, priority
      encoding, or counter logic
    action: Maintain FIFO ordering correctness through the entire dependency chain from FIFOCostBasisMethod selection through
      strategy pattern, heap structure, priority encoding (BD-057), to counter logic (BD-058); any refactoring of intermediate
      components must preserve FIFO semantics
    severity: high
    kind: domain_rule
    modality: must
    consequence: An off-by-one error in the counter-based priority encoding silently corrupts FIFO ordering, causing the cost
      basis method to produce non-FIFO results without any obvious failure indication, leading to systematically wrong tax
      calculations
    derived_from_bd_id: BD-119
  - id: finance-C-308
    when: When processing crypto-to-crypto trades for users in jurisdictions that exempt such disposals from capital gains
      tax (Germany, Singapore, Portugal before 2023)
    action: Detect user jurisdiction or provide explicit opt-in for crypto2crypto taxability; warn users when the default
      setting conflicts with their detected jurisdiction
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Users in jurisdictions exempting crypto-to-crypto disposals who do not change the default taxable setting
      will over-report tax liability, creating regulatory non-compliance and potential financial penalties
    derived_from_bd_id: BD-121
  - id: finance-C-310
    when: When implementing or refactoring vault token price computation for yield-bearing tokens
    action: Use vault_price_per_share * underlying_token_usd_price for token valuation — do not replace with direct vault.totalAssets()/totalSupply()
      queries without validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing the multiplication model with direct vault queries breaks compatibility with rebasing vaults and
      vaults where price_per_share includes accrued rewards, causing incorrect portfolio valuations that lead to improper
      trading decisions
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-311
    when: When implementing Base chain transaction processing or refactoring L2 transaction classes
    action: Verify BaseTransactions continues extending L2WithL1FeesTransactions to maintain separate L1 fee accounting —
      do not simplify by absorbing L1 fees into L2 gas price
    severity: high
    kind: domain_rule
    modality: must
    consequence: Consolidating L1 fees into L2 gas price destroys the cost attribution between Layer 1 and Layer 2, causing
      inaccurate P&L calculations and incorrect fee reporting for Base transactions
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-312
    when: When implementing BasenamesDecoder labelhash resolution or refactoring the API lookup strategy
    action: Maintain cache-first lookup with fallback to API call on cache miss — do not remove caching or make API the primary
      lookup method
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing cache-first lookup exposes basenames resolution to API rate limiting and unavailability, causing
      failed lookups for reverse record resolution during transaction decoding
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-313
    when: When implementing EchoDecoder transaction decoding or refactoring refund tracking logic
    action: Implement explicit partial refund detection logic in _transform_refund — do not rely solely on deregistration
      events as partial refunds do not emit them
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing partial refund detection means transactions with partial refunds (historically rare but nonzero)
      are silently misclassified, causing incomplete transaction records and inaccurate fund flow tracking
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-314
    when: When implementing or refactoring API filter fields that handle include/exclude logic
    action: Maintain IncludeExcludeListField unified schema with 'values' array and 'behaviour' key — do not split into separate
      IncludeFilterField and ExcludeFilterField classes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Splitting the unified filter field into separate classes breaks API schema compatibility and requires dual
      field maintenance, causing API response inconsistencies and increased schema duplication
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-315
    when: When implementing train/test data splitting in backtesting
    action: Assume the framework automatically maintains train/test time split integrity — the framework does not implement
      temporal separation validation; training data may inadvertently leak into test period
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without train/test split integrity validation, future information leaks into historical training data causing
      look-ahead bias; backtest results become non-reproducible and systematically overestimate live trading performance
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-316
    when: When implementing signal generation and order execution workflow
    action: Validate that each signals include timestamp fields and enforce chronological ordering — verify execution timestamp
      >= signal timestamp with configurable latency tolerance (default 60 seconds), reject or queue signals received after
      execution cutoff
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without signal-execution timing validation, signals generated at time T may be executed at earlier timestamps,
      causing position state inconsistencies and impossible trades that never occur in live markets
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-317
    when: When implementing position management and PnL calculation in backtesting
    action: Assume the framework models funding or carry costs for positions — the framework does not implement funding rate,
      borrow cost, or storage cost calculations; overnight positions are treated as cost-free
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without funding/carry cost modeling, long-short strategies with overnight exposure show inflated returns
      that exclude financing costs; live trading returns fall 2-8% below backtested results depending on interest rate environment
    derived_from_bd_id: BD-GAP-030
  - id: finance-C-318
    when: When calculating strategy performance metrics and parameter optimization
    action: Incorporate funding rate inputs (borrow_cost for long positions, lend_rate for short positions) and accrue daily
      carry costs based on position_size × funding_rate / 365 — document each assumed rates in strategy metadata
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit carry cost accrual, mean-reversion strategies holding overnight positions show returns inflated
      by 3-5% annualized that do not materialize in live trading due to financing fees
    derived_from_bd_id: BD-GAP-030
  - id: finance-C-319
    when: When implementing strategy parameter optimization in backtesting
    action: Assume the framework provides backtest overfitting protection — the framework does not implement walk-forward
      analysis, out-of-sample validation, or parameter stability testing; optimized parameters may be overfitted to historical
      data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without overfitting protection, grid-search optimized parameters fit noise in historical data; live trading
      Sharpe ratios drop 50-80% compared to backtested values as market regimes shift
    derived_from_bd_id: BD-GAP-031
  - id: finance-C-320
    when: When optimizing strategy parameters during backtesting
    action: Apply walk-forward analysis with in-sample optimization window (60% of data) and out-of-sample test window (40%),
      reject parameter sets where out-of-sample Sharpe < 50% of in-sample Sharpe — require minimum 3 walk-forward folds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without walk-forward validation, overfitted parameters show impressive backtest curves that collapse in live
      trading when market microstructure changes or regime shifts occur
    derived_from_bd_id: BD-GAP-031
  - id: finance-C-321
    when: When calculating risk metrics or pricing derivatives in backtesting
    action: Assume the framework provides volatility modeling or return distribution assumptions — the framework does not
      implement GARCH, stochastic volatility, or fat-tailed distribution modeling; each calculations assume constant volatility
      and normal distribution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without volatility modeling, option pricing and VaR calculations systematically underestimate tail risk during
      high-volatility regimes; losses exceed VaR forecasts by 3-5x during market crashes
    derived_from_bd_id: BD-GAP-032
  - id: finance-C-322
    when: When calculating risk metrics, option prices, or position sizing
    action: Specify volatility model (EWMA with lambda=0.94 or GARCH(1,1)) and distribution assumption (t-distribution with
      df=5-7) in strategy configuration — use risk_metric_volatility_source field to document which price series feeds the
      volatility calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit volatility modeling, constant-volatility assumption underprices out-of-the-money options
      during calm periods and underestimates tail risk when volatility spikes, causing systematic losses on hedging trades
    derived_from_bd_id: BD-GAP-032
  - id: finance-C-323
    when: When implementing multi-factor or statistical arbitrage strategies in backtesting
    action: Assume the framework handles signal-execution timing synchronization — the framework does not implement latency
      modeling or execution delay compensation; signals are assumed to execute at exact generation timestamps
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without signal-execution timing handling, high-frequency statistical arbitrage strategies show unrealistic
      execution at stale prices; live trading misses signals or executes at prices 2-10 bps worse than backtested prices
    derived_from_bd_id: BD-GAP-033
  - id: finance-C-324
    when: When designing signal generation and order execution interfaces
    action: Add signal_execution_delay_ms field to signal records and validate execution occurs within configurable latency
      budget — for strategies with holding period < 5 minutes, explicitly document that backtest assumes zero-latency execution
      and may not be representative
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without latency acknowledgment in signal metadata, short-horizon strategies produce misleading backtests
      showing execution at theoretically perfect prices while live execution faces realistic delays causing significant slippage
    derived_from_bd_id: BD-GAP-033
  - id: finance-C-325
    when: When processing insurance contracts that involve reinsurance arrangements in the API layer
    action: Assume the framework handles reinsurance contract mapping — the framework does not implement reinsurance contract
      mapping; treat each contracts as direct insurance only with no ceded premium or loss tracking
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without reinsurance contract mapping, the system cannot properly track ceded premiums or recovered losses
      from reinsurers, causing significant errors in net loss calculations and regulatory reporting
    derived_from_bd_id: BD-GAP-038
  - id: finance-C-326
    when: When implementing insurance risk calculation modules that require catastrophe modeling
    action: Implement catastrophe model selection capability supporting industry-standard models (RMS, AIR, Eqecat) with parameterized
      event sets, footprint loading, and loss aggregation functions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without catastrophe model selection, the system cannot generate probabilistic losses for extreme events,
      making cat risk-exposed portfolios unmanageable and causing severe underestimation of tail risk
    derived_from_bd_id: BD-GAP-038
  - id: finance-C-327
    when: When calculating loan or mortgage portfolio values requiring catastrophe risk assessment
    action: Assume the framework provides catastrophe model selection for cat risk calculation — the framework does not implement
      any catastrophe model selection; cat risk calculations will fail or produce zero results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without catastrophe model selection, any cat risk calculations return zero or error, causing catastrophic
      underestimation of cat-exposed portfolios and potential regulatory capital shortfalls
    derived_from_bd_id: BD-GAP-039
  - id: finance-C-328
    when: When implementing loan or bond portfolio valuation modules requiring financial projections
    action: Implement amortization schedule generation supporting both equal payment (ANNUITY) and equal principal (LINEAR)
      methods with configurable principal amount, interest rate, term, and periodic breakdown of principal/interest components
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without amortization schedule generation, financial projections for loans and mortgages are incomplete, causing
      errors in present value calculations and portfolio valuation summaries
    derived_from_bd_id: BD-GAP-039
  - id: finance-C-329
    when: When processing loan or mortgage products that require financial projection calculations
    action: Assume the framework generates amortization schedules — the framework does not implement amortization calculation;
      financial projections will be missing periodic principal/interest breakdowns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without amortization schedules, loan portfolio analysis cannot generate payment schedules, causing inaccurate
      cash flow projections and balance tracking for mortgage-backed instruments
    derived_from_bd_id: BD-GAP-040
  - id: finance-C-330
    when: When implementing credit portfolio risk analysis modules that require delinquency classification
    action: 'Implement delinquency tracking with days-past-due (DPD) calculation and configurable thresholds (default: DPD
      30 for watchlist, DPD 60 for substandard, DPD 90 for charge-off) to classify loan accounts by risk stage'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without delinquency definition, the system cannot classify loan accounts by payment status, causing inability
      to calculate NPL ratios, provision requirements, or credit loss reserves accurately
    derived_from_bd_id: BD-GAP-040
  - id: finance-C-331
    when: When analyzing loan portfolios that require payment status classification
    action: Assume the framework tracks days past due (DPD) for loan accounts — the framework does not implement delinquency
      definition; each accounts default to current status regardless of actual payment history
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without delinquency tracking, the system reports all loans as current, hiding default risk and causing severely
      understated credit loss provisions in financial reporting
    derived_from_bd_id: BD-GAP-041
  - id: finance-C-332
    when: When implementing credit risk management or provisioning modules for loan portfolios
    action: Implement DPD (days-past-due) calculation for each loan account by comparing scheduled payment date against actual
      payment date, with configurable stage thresholds (default 30/60/90 days) mapping to watchlist/substandard/charge-off
      classifications
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without DPD-based delinquency tracking, the system cannot calculate key credit risk metrics, leading to incorrect
      loan loss provisions and potential regulatory compliance violations
    derived_from_bd_id: BD-GAP-041
  - id: finance-C-333
    when: When processing any financial calculation that depends on unknown or unspecified missing capability
    action: Assume the framework handles any unspecified missing capability — the audit identified additional gaps beyond
      the documented items; always validate required capabilities are implemented before using
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming undocumented missing capabilities are present causes production failures, as the framework lacks
      functionality that was identified as missing but not fully specified in the audit
    derived_from_bd_id: BD-GAP-042
  - id: finance-C-334
    when: When implementing any financial module based on this blueprint
    action: Review the complete audit checklist referenced by this finding and implement each documented missing capabilities
      (this appears to be a summary entry indicating additional gaps requiring attention beyond the 4 specific items listed)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incomplete implementation of audit-identified gaps causes production reliability issues, potentially resulting
      in system failures when missing capabilities are invoked
    derived_from_bd_id: BD-GAP-042
  - id: finance-C-335
    when: When implementing TypeScript code
    action: Use type assertions `as` to bypass type checking
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Type assertions bypass the compiler and hide bugs that could cause runtime errors in production
  - id: finance-C-336
    when: When writing Vue.js TypeScript code
    action: Use explicit generic types for refs, computed, and function return types
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing explicit types can cause type inference errors and runtime bugs that TypeScript cannot catch
  - id: finance-C-337
    when: When using useI18n() in Vue.js components
    action: 'Pass the { useScope: ''global'' } parameter to useI18n()'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing global scope causes i18n to not properly resolve translation keys across the application
  - id: finance-C-338
    when: When handling async operations in Vue.js
    action: Use void operator to suppress floating promises
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Void operator creates floating promises that are silently dropped, causing unhandled errors and unpredictable
      behavior
  - id: finance-C-340
    when: When defining byte literals for event topics and method selectors
    action: Use byte literals (b'\x...') instead of keeping bytes.fromhex() in constant definitions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Keeping conversion functions in constant definitions causes unnecessary runtime overhead and potential bugs
      from repeated conversions
  - id: finance-C-341
    when: When creating hex/bytes constants from on-chain data
    action: Validate hex values with bytes.fromhex() and verify round-trip conversion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect hex values copied from on-chain data will cause decoding failures and missing transaction events
  - id: finance-C-342
    when: When writing backend Python exception handling
    action: Use broad except Exception clauses that catch each errors
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Broad exception catching hides bugs, makes debugging difficult, and can cause unexpected behavior to be silently
      ignored
  - id: finance-C-343
    when: When defining Python backend constants
    action: Use the Final type specifier for immutable constants
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing Final type specifier allows constants to be accidentally reassigned, causing hard-to-detect bugs
  - id: finance-C-344
    when: When organizing Vue.js setup scripts
    action: 'Follow the prescribed order: imports, definitions, i18n/vue-router, reactive state, Pinia stores, composables,
      computed, methods, watchers, lifecycle hooks, exposed methods'
    severity: low
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect script organization makes code harder to read, maintain, and can cause initialization order bugs
  - id: finance-C-345
    when: When implementing v-model bindings in Vue.js
    action: Use defineModel() for each v-model bindings instead of manual prop + emit pattern
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Manual prop + emit pattern is error-prone and creates inconsistent behavior with Vue 3.4+ v-model conventions
  - id: finance-C-346
    when: When using template refs in Vue.js 3.5+
    action: Use useTemplateRef() for typed template refs instead of ref<T>() pattern
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using ref<T>() pattern for template refs bypasses Vue's ref typing system and can cause type errors
  - id: finance-C-347
    when: When running frontend commands
    action: Run each frontend commands from the frontend/ directory, not frontend/app/
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Running from wrong directory causes command failures, missing dependencies, and broken development environment
  - id: finance-C-348
    when: When implementing EVM protocol decoders
    action: Prefer addresses_to_decoders() over generic decoding_rules() for performance
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: decoding_rules() are evaluated for every log in every transaction, significantly increasing decoding overhead
  - id: finance-C-349
    when: When creating ActionItem from log handlers
    action: Reuse data from current context.tx_log for matching fields instead of scanning each logs
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Unnecessary all_logs scanning increases per-transaction work and decoder complexity without benefit
  - id: finance-C-350
    when: When writing backend Python tests
    action: Always use pytestgeventwrapper.py instead of running pytest directly
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Running pytest directly without gevent patching causes gevent errors and test failures
  - id: finance-C-351
    when: When writing frontend unit tests
    action: Place .spec.ts test files co-located next to the source file they test
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Placing tests in separate directories breaks the project structure and makes tests harder to find and maintain
  - id: finance-C-352
    when: When writing test descriptions
    action: Follow the pattern it('should ...') for each test descriptions
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Non-standard test descriptions break test runner patterns and make test output harder to parse
  - id: finance-C-353
    when: When adding EVM decoder tests
    action: Use @pytest.mark.vcr decorator for VCR recording of decoder tests
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: VCR tests cause brittle recordings that fail with API changes and block developer testing
  - id: finance-C-354
    when: When styling Vue.js components
    action: Use Tailwind CSS for each styling instead of scoped SCSS with BEM
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Mixing Tailwind with scoped SCSS/BEM creates inconsistent styling and maintenance burden
  - id: finance-C-355
    when: When applying scoped CSS in Vue.js
    action: Use scoped SCSS modules with BEM naming conventions
    severity: low
    kind: resource_boundary
    modality: must_not
    consequence: Scoped SCSS with BEM conflicts with Tailwind CSS and creates duplicate styling systems
  - id: finance-C-356
    when: When reviewing rotki code changes
    action: Assume error handling is missing without tracing function implementations
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: False assumptions about missing error handling lead to incorrect reviews and wasted developer time
  - id: finance-C-357
    when: When reviewing code without checking implementation
    action: Skip line-by-line examination or make assumptions about patterns
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping systematic review causes false positives and misses real issues in the codebase
  - id: finance-C-358
    when: When suggesting error handling improvements
    action: Flag missing try-catch around request_get() or other safe functions
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Flagging safe functions with built-in error handling creates noise and wastes developer time on false positives
  - id: finance-C-359
    when: When using pre-validated types like ChainID or ChecksumEvmAddress
    action: Suggest additional runtime validation that duplicates compile-time checks
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Redundant validation creates unnecessary code bloat and suggests lack of understanding of the type system
  - id: finance-C-360
    when: When handling timestamps in rotki
    action: Use Unix timestamps in milliseconds for each timestamp fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different timestamp units causes date calculation errors and mismatched event ordering
  - id: finance-C-361
    when: When adding localization keys
    action: Order translation keys alphabetically in localization JSON files
    severity: low
    kind: domain_rule
    modality: must
    consequence: Non-alphabetical ordering breaks the linter and makes translation maintenance harder
  - id: finance-C-363
    when: When processing chain data when indexers are unavailable
    action: Fallback to public RPC nodes instead of blocking on explorer availability
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Blocking on unavailable explorers causes data fetching to fail entirely instead of using fallback sources
  - id: finance-C-364
    when: When reviewing rotki code and considering flagging error handling as missing or incomplete
    action: assume error handling is missing without tracing function implementations to verify
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: False positive code review findings waste maintainer time and erode trust in review feedback. The codebase
      has utility functions like request_get() that handle errors internally, and flagging them as missing try-catch creates
      noise.
  - id: finance-C-365
    when: When considering adding VCR (cassette) tests to decoder tests
    action: add @pytest.mark.vcr decorators to decoder tests claiming it makes tests more reliable
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Adding VCR tests to decoder tests violates project policy. VCR tests record real API responses which can
      become stale, fail in CI, or capture non-deterministic data, defeating the purpose of automated testing.
  - id: finance-C-366
    when: When reviewing code and considering flagging ChainID or enum validation as missing
    action: suggest ChainID validation or type validation when the type is an enum or pre-validated
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: ChainID is an Enum type with compile-time validation. Flagging it as needing runtime validation creates false
      positives that waste maintainer time and indicate lack of understanding of the project's type system.
  - id: finance-C-367
    when: When encountering empty try-except blocks and considering adding explanatory comments
    action: add comments explaining why except blocks are empty without verifying the project convention
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: The project explicitly lists 'recommending error handling that exists in called functions' as a common false
      positive pattern. Adding explanatory comments to empty except blocks implies they need improvement when the project
      considers these acceptable.
  - id: finance-C-369
    when: When making typo corrections, rewordings, or trivial changes and considering creating a PR
    action: submit PRs for simple typo fixes, rewordings, or AI-generated content that adds no functional value
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: PRs with only typo fixes, rewordings, or AI slop will be immediately rejected. Such attempts at starts or
      airdrop farming damage credibility and waste maintainer review time.
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
