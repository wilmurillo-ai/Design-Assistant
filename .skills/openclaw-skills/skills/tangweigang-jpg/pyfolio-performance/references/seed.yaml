resources:
  packages:
  - name: empyrical-reloaded
    version_pin: latest
  - name: numpy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: scikit-learn
    version_pin: latest
  - name: matplotlib
    version_pin: latest
  - name: seaborn
    version_pin: latest
  - name: ipython
    version_pin: latest
  - name: pytz
    version_pin: latest
  - name: pytest
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install empyrical-reloaded
    - python3 -m pip install numpy
    - python3 -m pip install pandas
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-002
    when: When estimating intraday positions from transactions
    action: Apply shift(1) to EOD positions before adding intraday transaction deltas
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without shift(1), positions at day-start are contaminated with end-of-day values, causing look-ahead bias
      that makes intraday-adjusted results unrepresentative of actual peak-exposure moments.
    stage_ids:
    - data_preprocessing
  - id: finance-C-018
    when: When implementing allocation percentage calculation
    action: Include cash column in the denominator when computing allocation percentages
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Portfolio allocation percentages will not sum to 100% if cash is excluded from the denominator, misrepresenting
      the portfolio's actual composition and misleading risk analysis
    stage_ids:
    - position_analysis
  - id: finance-C-019
    when: When identifying top positions for analysis
    action: Exclude cash column when finding top long/short/absolute positions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Cash would incorrectly appear as a position holding, causing top position analysis to report cash as the
      largest portfolio holding rather than actual securities
    stage_ids:
    - position_analysis
  - id: finance-C-020
    when: When computing position concentration metrics
    action: Exclude cash column from concentration calculations to measure only equity position concentration
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Concentration metrics would be artificially skewed by including cash (a non-position asset), producing misleading
      diversification assessments
    stage_ids:
    - position_analysis
  - id: finance-C-022
    when: When calculating long and short allocations
    action: Define net liquidation as sum of longs plus shorts plus cash when computing allocation percentages
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Net liquidation denominator excluding cash would misrepresent the true portfolio size, causing long/short
      allocations to not sum to 100% and leading to incorrect leverage calculations
    stage_ids:
    - position_analysis
  - id: finance-C-025
    when: When identifying long positions
    action: Filter for positive position values only when computing long allocations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Including zero or negative values in long sum would corrupt the long allocation percentage, potentially showing
      incorrect long exposure that could mislead risk management decisions
    stage_ids:
    - position_analysis
  - id: finance-C-026
    when: When identifying short positions
    action: Filter for negative position values only when computing short allocations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Including positive values in short sum would inflate the short allocation percentage, misrepresenting the
      portfolio's actual short exposure and leverage characteristics
    stage_ids:
    - position_analysis
  - id: finance-C-031
    when: When computing net exposure as the sum of long and short allocation percentages
    action: Include both long and short allocations in the net exposure calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Net exposure incorrectly calculated would misrepresent the portfolio's directional exposure, potentially
      showing a long portfolio as having net short exposure or vice versa
    stage_ids:
    - position_analysis
  - id: finance-C-034
    when: When implementing transaction volume extraction, the transaction DataFrame MUST have price and amount columns as
      numeric types
    action: Use absolute value of amount multiplied by price to calculate txn_dollars for each transaction row
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect transaction volume calculations will produce wrong daily volume aggregates, causing turnover rates
      to be misstated and capacity analysis to fail
    stage_ids:
    - transaction_analysis
  - id: finance-C-035
    when: When implementing the turnover denominator parameter, the value MUST be either 'AGB' or 'portfolio_value'
    action: Validate denominator parameter against allowed values and raise ValueError for invalid inputs
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid denominator values will cause division by unexpected values, producing NaN turnover rates or silent
      calculation errors that corrupt downstream analysis
    stage_ids:
    - transaction_analysis
  - id: finance-C-036
    when: When implementing daily transaction volume aggregation, the transaction timestamps MUST be normalized to date level
      before grouping
    action: Normalize transaction index using .index.normalize() before summing amounts and values per day
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-normalized timestamps will cause intra-day trades to be incorrectly split across days, violating the
      acceptance criteria that daily volumes sum to total traded value
    stage_ids:
    - transaction_analysis
  - id: finance-C-037
    when: When calculating AGB-based turnover, the cash column MUST be dropped from positions before computing the denominator
    action: Drop the 'cash' column using positions.drop('cash', axis=1) before calculating AGB and rolling mean
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Including cash in turnover denominator will artificially inflate the denominator, producing understated turnover
      rates that misrepresent trading activity
    stage_ids:
    - transaction_analysis
  - id: finance-C-048
    when: When extracting round trips from transactions DataFrame
    action: 'Verify transactions DataFrame contains required columns: amount, price, symbol'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required columns causes KeyError exceptions during round trip extraction, breaking PnL calculation
      and duration computation
    stage_ids:
    - round_trip_analysis
  - id: finance-C-049
    when: When calculating round trip duration
    action: Verify open_dt is strictly less than close_dt for each round trips
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative or zero duration values indicate data corruption, causing incorrect holding period statistics and
      skewed duration distributions
    stage_ids:
    - round_trip_analysis
  - id: finance-C-050
    when: When calculating round trip PnL
    action: Verify sum of each round trip PnLs equals total realized transaction dollars
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: PnL conservation violation causes material discrepancies between reported trading gains and actual cash flows,
      leading to incorrect performance attribution
    stage_ids:
    - round_trip_analysis
  - id: finance-C-057
    when: When using FIFO matching algorithm for round trip pairing
    action: Maintain order preservation using deque data structure for price stack
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Non-FIFO matching violates accounting principle of first-in-first-out, producing incorrect PnL attribution
      and invalid round trip boundaries
    stage_ids:
    - round_trip_analysis
  - id: finance-C-058
    when: When determining buy vs sell direction for matching
    action: Use copysign function to determine transaction direction from signed amounts
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect direction detection causes buys to match with buys and sells with sells, completely invalidating
      round trip pairing logic
    stage_ids:
    - round_trip_analysis
  - id: finance-C-060
    when: When processing transactions across multiple symbols
    action: Group transactions by symbol before applying FIFO matching
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Cross-symbol matching produces invalid round trips that pair shares of different securities, generating meaningless
      PnL and duration statistics
    stage_ids:
    - round_trip_analysis
  - id: finance-C-070
    when: When performing performance attribution calculations
    action: verify common_returns plus specific_returns equals total_returns
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Portfolio return attribution will be mathematically incorrect, causing incorrect factor contribution analysis
      and misleading performance reports
    stage_ids:
    - performance_attribution
  - id: finance-C-071
    when: When computing risk factor exposures from positions
    action: verify risk exposures match the mathematical product of position weights and factor loadings
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Factor exposure attribution will be incorrect, misrepresenting portfolio risk profile and leading to poor
      risk management decisions
    stage_ids:
    - performance_attribution
  - id: finance-C-072
    when: When providing factor loadings as input
    action: verify factor_loadings DataFrame has a MultiIndex with 'dt' and 'ticker' as level names
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Factor loading lookup will fail with KeyError or produce incorrect exposures, causing performance attribution
      to crash or produce invalid results
    stage_ids:
    - performance_attribution
  - id: finance-C-076
    when: When factor loadings are completely unavailable for each positions
    action: raise ValueError with message 'No factor loadings were available'
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Performance attribution will silently return empty or invalid results instead of failing explicitly, causing
      downstream analysis to produce meaningless results
    stage_ids:
    - performance_attribution
  - id: finance-C-077
    when: When processing positions before exposure calculation
    action: call _align_and_warn to verify date and ticker alignment across each inputs
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Misaligned data between positions, factor_returns, and factor_loadings will cause incorrect factor attribution
      or runtime errors due to index mismatches
    stage_ids:
    - performance_attribution
  - id: finance-C-097
    when: When deprecating pyfolio timeseries functions
    action: bypass or suppress the @deprecated decorator decorator for any risk metric function
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Users will not receive deprecation warnings, delaying their migration to empyrical equivalents and causing
      future breakage when deprecated functions are removed
    stage_ids:
    - returns_analysis
  - id: finance-C-099
    when: When implementing days_to_liquidate_positions calculation
    action: Apply shift(1) to rolling mean volume to prevent look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without shift(1), the volume rolling mean includes the current bar's volume, causing look-ahead bias where
      liquidation estimates appear faster than actually achievable in live trading
    stage_ids:
    - capacity_analysis
  - id: finance-C-111
    when: When implementing report generation, tear sheet functions MUST check optional inputs for None before accessing them
    action: guard each downstream functions with `if data is not None` checks for positions, transactions, and market_data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing optional data will cause AttributeError or KeyError, crashing the report generation pipeline mid-execution
      and producing incomplete analysis
    stage_ids:
    - report_generation
  - id: finance-C-114
    when: When running create_returns_tear_sheet with bootstrap=True, benchmark_rets MUST be provided
    action: pass benchmark_rets parameter when bootstrap analysis is required
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: ValueError is raised at runtime, terminating report generation with message 'bootstrap requires passing of
      benchmark_rets'
    stage_ids:
    - report_generation
  - id: finance-C-115
    when: When performing intraday position estimation, both positions AND transactions data MUST be available
    action: verify positions and transactions are both non-None when estimate_intraday is True or 'infer'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: ValueError raised with 'Positions and txns needed to estimate intraday', preventing report generation from
      completing
    stage_ids:
    - report_generation
  - id: finance-C-116
    when: When plotting rolling volatility with volatility_match=True, factor_returns MUST be passed
    action: pass factor_returns parameter when volatility matching against benchmark is required
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: 'ValueError raised at line 803: ''volatility_match requires passing of factor_returns'', breaking the returns
      tear sheet'
    stage_ids:
    - report_generation
  - id: finance-C-117
    when: When executing performance attribution, factor loadings MUST exist for at least some portfolio positions
    action: verify factor_loadings covers at least one position; gracefully handle missing stocks with warnings
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: 'ValueError raised: ''No factor loadings were available for this algorithm''s positions'', attribution cannot
      proceed'
    stage_ids:
    - report_generation
  - id: finance-C-127
    when: When data preprocessing validates external inputs
    action: Normalize timezone-aware datetime indices for returns, positions, and transactions to UTC using tz_localize or
      tz_convert
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Data misalignment between positions, returns, and transactions causes incorrect portfolio metrics and analysis
      results
  - id: finance-C-129
    when: When positions flow to position_analysis or report_generation
    action: Include 'cash' column in positions DataFrame, using 0 or NaN for days where stocks are not held
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing cash column causes KeyError and breaks turnover calculations, position allocation percentages, and
      net liquidation computations
  - id: finance-C-131
    when: When transactions flow to round_trip_analysis
    action: Verify transactions DataFrame has 'symbol', 'amount', 'price' columns as specified in docstrings
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required columns causes KeyError in extract_round_trips and breaks round-trip PnL calculations
  - id: finance-C-133
    when: When market_data flows to capacity_analysis
    action: Provide market_data with multi-index (date level and ticker level) containing 'price' and 'volume' columns for
      each ticker
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect market_data format causes KeyError in capacity calculations and produces meaningless liquidation
      time estimates
  - id: finance-C-135
    when: When positions flow to performance_attribution
    action: Verify factor_loadings DataFrame has multi-index (date, ticker) matching positions columns, excluding 'cash'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched factor loadings cause ValueError and incorrect risk factor attribution results
  - id: finance-C-137
    when: When returns flow to performance_attribution
    action: Verify factor_returns shares the same date index as returns for proper alignment in empyrical.perf_attrib
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Misaligned factor returns cause incorrect common returns and specific returns breakdown in performance attribution
  - id: finance-C-141
    when: When returns flow to report_generation for drawdown analysis
    action: Pass noncumulative daily returns (decimal format) to gen_drawdown_table to correctly identify peak-valley-recovery
      periods
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Passing cumulative returns causes completely wrong drawdown identification and meaningless risk metrics
  - id: finance-C-147
    when: When implementing or calling pyfolio analysis functions
    action: Provide returns DataFrame/Series indexed by datetime (tz-aware or naive)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: All pyfolio functions expect datetime-indexed inputs. Providing non-datetime indexed data causes analysis
      failures or incorrect results
  - id: finance-C-148
    when: When providing positions DataFrame to any pyfolio function
    action: Include a 'cash' column representing net capital not invested in securities
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Functions that compute portfolio totals (turnover, leverage, etc.) sum all columns including cash, causing
      incorrect calculations when cash column is missing
  - id: finance-C-149
    when: When representing short positions in positions DataFrame
    action: Use negative values to indicate short positions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: pyfolio's position aggregation functions (get_long_short_pos, get_percent_alloc) use sign of values to distinguish
      long/short positions, causing misclassification when short positions use positive values
  - id: finance-C-150
    when: When providing transactions DataFrame to any pyfolio function
    action: 'Include columns: amount, price, symbol with datetime index'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Transaction processing functions (get_txn_vol, adjust_returns_for_slippage, extract_round_trips) access these
      specific columns by name, causing KeyError when columns are missing or using different names
  - id: finance-C-151
    when: When providing factor_loadings DataFrame for performance attribution
    action: Use MultiIndex with levels (datetime, ticker) for the index
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Performance attribution code uses factor_loadings.index.get_level_values(0) for dates and get_level_values(1)
      for tickers, causing incorrect factor exposure calculations with flat or single-level index
  - id: finance-C-152
    when: When providing returns data to any pyfolio analysis function
    action: Provide non-cumulative daily percentage changes (decimal format, not cumulative)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Performance metrics (Sharpe ratio, max drawdown, etc.) use empyrical functions expecting daily returns, causing
      incorrect annualized statistics when cumulative returns are provided
  - id: finance-C-175
    when: When processing monetary values in the backtesting framework
    action: Use Decimal type for each currency and financial calculations; float is prohibited for monetary operations due
      to binary representation errors
    severity: fatal
    kind: claim_boundary
    modality: must
    consequence: Using float for currency calculations introduces rounding errors that accumulate over many transactions;
      for example, 0.1 + 0.2 = 0.30000000000000004 in float, causing incorrect PnL calculations and audit discrepancies
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-176
    when: When implementing monetary calculation modules in the backtesting framework
    action: Replace each float currency fields with Decimal('0.00') or use decimal.Decimal throughout the calculation pipeline;
      verify database adapters, serialization layers, and external API calls preserve Decimal precision
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without Decimal adoption, cumulative rounding errors distort portfolio valuations, PnL reports, and fee calculations;
      audit trails become non-reproducible due to floating-point non-determinism
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-184
    when: When processing live trading dates for comparison with backtest results
    action: Convert live start date to UTC using empyrical.utils.get_utc_timestamp before performing any timezone-dependent
      comparisons
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without UTC conversion, live trading vs. backtest date comparisons fail silently in non-UTC environments,
      causing performance reports to misalign live returns with their backtest benchmarks
    derived_from_bd_id: BD-066
  - id: finance-C-187
    when: When implementing performance attribution calculations
    action: Delegate each factor model calculations, covariance estimation, and return attribution to the empyrical package
      — do not implement independent attribution algorithms that parallel empyrical functionality
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Independent attribution implementations diverge from canonical empyrical results, causing inconsistent performance
      attribution across tools that share empyrical as a dependency
    derived_from_bd_id: BD-015
  - id: finance-C-196
    when: When calculating turnover and calling empyrical risk functions in performance attribution
    action: Pass dollar-denominated positions to get_turnover first, then convert positions to percentages (sum to 1.0) before
      calling empyrical functions; maintain this exact sequence order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calculating turnover on percentage positions (sum ~1.0) produces near-zero values, while empyrical regression
      receives positions summing to hundreds/thousands, causing completely incorrect risk attribution results
    derived_from_bd_id: BD-016
  - id: finance-C-202
    when: When implementing or modifying position data schema for backtesting
    action: Verify the cash column is always present in positions DataFrame and properly populated; for short positions, verify
      cash contribution is correctly calculated using short proceeds accounting
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing cash column causes cascading NaN propagation through allocation calculations and position analysis,
      producing incorrect portfolio weights that silently distort backtest results
    derived_from_bd_id: BD-128
  - id: finance-C-220
    when: When implementing round-trip extraction for trade attribution and tax reporting
    action: Use FIFO (First-In-First-Out) matching for lot identification; maintain FIFO order within each position direction
      (long/short) using signed price stack; do not switch to LIFO or specific identification without understanding tax consequences
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using LIFO or specific identification instead of FIFO changes tax lot matching, potentially creating disallowed
      wash sales, different cost basis calculations, and IRS non-compliance for US-regulated accounts
    derived_from_bd_id: BD-090
  regular:
  - id: finance-C-001
    when: When implementing intraday strategy detection
    action: Use threshold value of 0.25 to classify intraday strategies (held positions / unique stocks traded)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misclassification causes pyfolio to incorrectly apply end-of-day position snapshots to intraday strategies,
      producing misleading performance attribution that does not reflect actual market exposure during the trading day.
    stage_ids:
    - data_preprocessing
  - id: finance-C-003
    when: When computing starting capital from first-day positions and returns
    action: 'Use the formula: starting_capital = positions.iloc[0].sum() / (1 + returns[0])'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect back-calculation causes the first-day returns to be improperly allocated to starting capital rather
      than reflecting actual initial portfolio value, distorting cumulative return calculations.
    stage_ids:
    - data_preprocessing
  - id: finance-C-004
    when: When applying slippage adjustment to returns
    action: Calculate slippage_dollars as traded_value multiplied by slippage_rate (slippage_bps * 0.0001)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect slippage calculation underestimates market impact costs, presenting artificially inflated backtest
      returns that would not be achievable in live trading with the same transaction volume.
    stage_ids:
    - data_preprocessing
  - id: finance-C-005
    when: When timezone-naive DataFrame timestamps are processed
    action: Localize index to UTC using tz_localize before timezone-aware operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixing timezone-naive and timezone-aware timestamps causes silent alignment errors in resampling and groupby
      operations, resulting in incorrect position snapshots and transaction attribution.
    stage_ids:
    - data_preprocessing
  - id: finance-C-006
    when: When positions DataFrame is empty or contains no holdings
    action: Raise ValueError with message 'The backtest does not have any positions'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty positions silently pass through, causing division-by-zero errors or NaN propagations in downstream
      calculations that produce invalid performance metrics.
    stage_ids:
    - data_preprocessing
  - id: finance-C-007
    when: When intraday estimation is requested but positions or transactions are None
    action: Raise ValueError with message 'Positions and txns needed to estimate intraday'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing data causes cryptic TypeError exceptions in downstream intraday estimation functions, making debugging
      difficult and producing incomplete error messages for users.
    stage_ids:
    - data_preprocessing
  - id: finance-C-008
    when: When calculating portfolio turnover with invalid denominator parameter
    action: Raise ValueError for denominator values other than 'AGB' or 'portfolio_value'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid denominator causes unexpected behavior in turnover calculations, producing misleading portfolio activity
      metrics that do not reflect actual trading intensity.
    stage_ids:
    - data_preprocessing
  - id: finance-C-009
    when: When inferring intraday strategy behavior automatically
    action: Call detect_intraday to compute daily positions held / unique stocks traded quotient
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Skipping automatic detection causes the wrong position resampling strategy to be applied, producing incorrect
      performance attribution for strategies whose behavior is misclassified.
    stage_ids:
    - data_preprocessing
  - id: finance-C-010
    when: When intraday estimation is enabled
    action: Issue a UserWarning to alert users that intraday positions are being inferred from transactions
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Silent intraday inference causes users to misinterpret performance metrics as representing end-of-day positions
      rather than peak-exposure intraday snapshots.
    stage_ids:
    - data_preprocessing
  - id: finance-C-011
    when: When calculating daily transaction volume
    action: Normalize transaction timestamps to date level using groupby(level=0).sum()
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-normalized timestamps cause intraday trades to be incorrectly aggregated across date boundaries, producing
      inaccurate transaction volume calculations for slippage and turnover.
    stage_ids:
    - data_preprocessing
  - id: finance-C-012
    when: When handling positions with zero values during intraday estimation
    action: Replace zero positions with NaN before counting held positions using replace(0, np.nan)
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Zero positions counted as held positions artificially inflate the held/transacted ratio, causing valid intraday
      strategies to be misclassified as overnight strategies.
    stage_ids:
    - data_preprocessing
  - id: finance-C-013
    when: When pyfolio is used to analyze live trading performance
    action: Claim that backtested performance metrics equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as live trading proof misleads stakeholders about actual strategy performance,
      ignoring execution differences, slippage variance, and market impact that differ between simulation and live markets.
    stage_ids:
    - data_preprocessing
  - id: finance-C-014
    when: When transaction data contains zero-value prices or amounts
    action: Replace zero daily volume averages with NaN to avoid division-by-zero in capacity calculations
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Zero volumes produce infinite days-to-liquidate estimates, causing capacity analysis to fail or produce meaningless
      results for illiquid securities.
    stage_ids:
    - data_preprocessing
  - id: finance-C-015
    when: When Zipline assets with multipliers are present in positions
    action: Apply price_multiplier from Equity/Future asset objects to position values
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Missing multiplier application causes futures and adjusted equity positions to be under/over-valued, producing
      incorrect position concentration and performance attribution metrics.
    stage_ids:
    - data_preprocessing
  - id: finance-C-016
    when: When estimating daily returns on high-volume trading days
    action: Apply slippage penalty as negative deduction to returns proportional to traded value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting slippage deductions on high-volume days produces inflated return estimates that do not reflect actual
      execution costs, leading to over-optimistic strategy assessments.
    stage_ids:
    - data_preprocessing
  - id: finance-C-017
    when: When a practitioner assumes the intraday detection threshold is arbitrary
    action: Modify the 0.25 threshold without understanding its balance between false positives and missed intraday detection
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Blindly changing the threshold without empirical validation causes either excessive false intraday classifications
      (low threshold) or missing valid intraday strategies (high threshold), both producing incorrect position resampling.
    stage_ids:
    - data_preprocessing
  - id: finance-C-021
    when: When grouping positions by sector mapping
    action: Warn when symbols in positions have no corresponding entry in the sector mapping
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unmapped symbols are silently excluded from sector exposures, causing sector allocations to understate total
      portfolio exposure and produce incorrect sector concentration metrics
    stage_ids:
    - position_analysis
  - id: finance-C-023
    when: When sector mapping source is provided
    action: Verify sector mapping dictionary or Series covers each symbols in the positions DataFrame
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unmapped symbols will not appear in sector exposures, causing incomplete sector allocation analysis and potentially
      masking concentration risk in unmapped sectors
    stage_ids:
    - position_analysis
  - id: finance-C-024
    when: When computing sector exposures from position values
    action: Pass position values (dollar amounts) to sector grouping, not pre-computed percentages
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Grouping pre-computed percentages by sector would produce sector weights that don't properly reflect actual
      capital allocation, as percentages lose the magnitude information needed for accurate aggregation
    stage_ids:
    - position_analysis
  - id: finance-C-027
    when: When computing position concentration metrics
    action: Validate that concentration metrics stay within reasonable bounds for the portfolio size
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: A single position concentration exceeding 100% would indicate incorrect allocation computation; extremely
      high concentrations suggest data quality issues that could invalidate portfolio risk assessments
    stage_ids:
    - position_analysis
  - id: finance-C-028
    when: When handling backtest position data from zipline
    action: Multiply position values by asset price multipliers for Equity and Future assets when available
    severity: high
    kind: domain_rule
    modality: must
    consequence: Position values for futures or equities with multipliers would be understated without multiplier adjustment,
      causing incorrect portfolio sizing and allocation analysis
    stage_ids:
    - position_analysis
  - id: finance-C-029
    when: When computing sector allocations for visualization
    action: Drop cash column from sector allocation percentages before plotting
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Including cash in sector allocation charts would misrepresent sector diversification, as cash is not a sector
      and should not appear in sector allocation visualizations
    stage_ids:
    - position_analysis
  - id: finance-C-030
    when: When aggregating positions by sector
    action: Sum each positions belonging to the same sector group using pandas groupby
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using mean instead of sum would produce sector exposures that don't reflect total capital deployed in each
      sector, leading to incorrect sector allocation analysis
    stage_ids:
    - position_analysis
  - id: finance-C-032
    when: When presenting portfolio analysis results from backtests
    action: Claim that simulated position analysis results equal expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtested position allocations represent ideal portfolio composition without accounting for real-world execution
      slippage, market impact, or liquidity constraints that would affect actual position sizes
    stage_ids:
    - position_analysis
  - id: finance-C-033
    when: When processing positions with duplicate datetime indices
    action: Aggregate duplicate indices using pivot_table before computing allocations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate datetime indices without proper aggregation would cause misalignment in position analysis, potentially
      double-counting or dropping position values, corrupting allocation calculations
    stage_ids:
    - position_analysis
  - id: finance-C-038
    when: When implementing turnover calculation with AGB denominator, the first day's denominator MUST be set to half of
      its AGB value to avoid singularities
    action: Set denom.iloc[0] = AGB.iloc[0] / 2 to handle the NaN from rolling(2) on the first day
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without this fix, the first day will have NaN or Infinity turnover, corrupting the time series and causing
      downstream analysis to fail or produce incorrect statistics
    stage_ids:
    - transaction_analysis
  - id: finance-C-039
    when: When implementing turnover analysis, daily turnover rates SHOULD remain below 100% for typical trading strategies
    action: Display warning or flag unusually high turnover (>1.0) during analysis output
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: 'Turnover exceeding 100% daily indicates potential issues: complete portfolio replacement, erroneous data,
      or strategies incompatible with the AGB calculation method'
    stage_ids:
    - transaction_analysis
  - id: finance-C-040
    when: When implementing transaction time histogram, the time range MUST be hardcoded to trading hours (570-960 minutes
      representing 9:30 AM - 4:00 PM)
    action: Use fixed xlim(570, 960) and filter transaction times to NYSE trading hours only
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Incorrect time boundaries will misrepresent the trading pattern distribution, showing off-hours transactions
      that are data artifacts rather than actual trading behavior
    stage_ids:
    - transaction_analysis
  - id: finance-C-041
    when: When calculating slippage-adjusted returns, the traded_value MUST be retrieved from get_txn_vol before multiplying
      by slippage rate
    action: Call get_txn_vol(transactions).txn_volume to extract daily traded dollar volume for slippage calculation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using incorrect volume will miscalculate slippage impact, over or understating the true cost of trading and
      producing inaccurate return estimates
    stage_ids:
    - transaction_analysis
  - id: finance-C-042
    when: When implementing capacity analysis with market data, the transactions index MUST be normalized to date level and
      grouped by symbol and day
    action: Group transactions by ['symbol', pd.Grouper(freq='D')] and sum amounts to compute daily transaction totals per
      security
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched grouping will cause transaction totals to be incorrectly attributed to wrong dates or symbols,
      corrupting liquidity analysis results
    stage_ids:
    - transaction_analysis
  - id: finance-C-043
    when: When backtesting shows daily turnover exceeding 100%, the system MUST NOT present this as evidence of valid trading
      strategy performance
    action: Include validation that flags >100% daily turnover as potentially erroneous data requiring investigation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting extreme turnover as valid backtest results misleads users about strategy feasibility and can lead
      to poor investment decisions based on unrealistic trading assumptions
    stage_ids:
    - transaction_analysis
  - id: finance-C-044
    when: When presenting transaction analysis results, the system MUST NOT claim that backtest turnover rates predict live
      trading costs
    action: Acknowledge in documentation that backtest slippage estimates are approximations based on historical volume and
      may not reflect actual execution quality
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Overstating the accuracy of backtest slippage estimates leads users to expect live trading will match simulated
      costs, causing disappointment and potential financial losses
    stage_ids:
    - transaction_analysis
  - id: finance-C-045
    when: When detecting intraday strategies, the system MUST validate that both positions and transactions are provided before
      attempting estimation
    action: Check for None values on both positions and transactions parameters and raise ValueError if either is missing
      when estimate_intraday is True
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing parameter validation will cause TypeError exceptions at runtime when trying to access columns on
      None objects, breaking the analysis pipeline
    stage_ids:
    - transaction_analysis
  - id: finance-C-046
    when: When implementing transaction data validation, empty transaction DataFrames MUST produce zero turnover rates without
      errors
    action: Handle empty transactions by returning Series filled with zeros and NaN-free results via fillna(0)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty transaction data causing division by zero or NaN propagation will corrupt entire analysis output and
      crash visualization pipelines
    stage_ids:
    - transaction_analysis
  - id: finance-C-047
    when: When normalizing transaction time to hours for histogram, the system MUST convert timezone-aware timestamps correctly
      using tz_convert before extracting hour/minute
    action: Apply tz_convert to the index before mapping to hour*60+minute values to verify correct time-of-day representation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect timezone handling will misalign transaction times with market hours, causing the histogram to show
      transactions at wrong times of day
    stage_ids:
    - transaction_analysis
  - id: finance-C-051
    when: When calculating round trip returns
    action: Calculate returns as pnl divided by invested capital, not portfolio value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect return calculation inflates or deflates reported trade profitability relative to actual invested
      capital, misrepresenting strategy performance
    stage_ids:
    - round_trip_analysis
  - id: finance-C-052
    when: When segregating long and short trades in aggregated statistics
    action: Group round trips by 'long' boolean field to separate long and short trade statistics
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixed long/short statistics obscure directional performance, preventing accurate risk assessment of each
      trade orientation
    stage_ids:
    - round_trip_analysis
  - id: finance-C-053
    when: When processing transactions with negative prices
    action: Include transactions with negative prices in round trip calculations
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Negative prices create invalid PnL calculations and corrupt round trip attribution by producing mathematically
      impossible gains/losses
    stage_ids:
    - round_trip_analysis
  - id: finance-C-054
    when: When processing transactions with zero transacted shares
    action: Calculate VWAP from a group with zero total transacted amount
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Division by zero produces NaN values that propagate through PnL calculations, corrupting downstream statistics
      and visualizations
    stage_ids:
    - round_trip_analysis
  - id: finance-C-055
    when: When providing portfolio_value for returns calculation
    action: Normalize portfolio_value to beginning-of-day values using shift() or positions.sum(axis='columns') / (1+returns)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-BOD portfolio values create look-ahead bias in returns, causing round trip returns to reflect future
      portfolio values not yet available at close time
    stage_ids:
    - round_trip_analysis
  - id: finance-C-056
    when: When grouping consecutive same-direction transactions
    action: Merge transactions within 8-hour window to avoid over-counting partial fills
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without proper merging, multiple partial fills for the same order appear as separate trades, inflating trade
      count and distorting turnover metrics
    stage_ids:
    - round_trip_analysis
  - id: finance-C-059
    when: When closing open positions at end of backtest
    action: Add closing transactions before extract_round_trips to capture each round trips
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without closing transactions, open positions at end of backtest are excluded from analysis, causing incomplete
      PnL reporting and missing final round trips
    stage_ids:
    - round_trip_analysis
  - id: finance-C-061
    when: When calculating VWAP for grouped transactions
    action: Compute VWAP as sum of (amount * price) divided by sum of amount
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect VWAP formula produces wrong average prices for merged transactions, distorting PnL calculations
      for round trips spanning multiple trades
    stage_ids:
    - round_trip_analysis
  - id: finance-C-062
    when: When presenting round trip analysis results
    action: Claim that backtest round trip returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest round trip performance does not account for live market impact, slippage, and execution delays,
      overstating expected live trading profitability
    stage_ids:
    - round_trip_analysis
  - id: finance-C-063
    when: When handling transactions where invested capital calculation yields zero
    action: Divide by zero invested capital when calculating rt_returns
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Division by zero in return calculation produces inf values that corrupt downstream aggregation statistics
      and visualizations
    stage_ids:
    - round_trip_analysis
  - id: finance-C-064
    when: When creating round_trip_grouping_window configuration
    action: Set time window to at least several hours to properly merge intraday partial fills
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Insufficient grouping window causes over-segmentation of intraday trades, inflating trade counts and misrepresenting
      actual trading frequency
    stage_ids:
    - round_trip_analysis
  - id: finance-C-065
    when: When extracting round trips from sparse or incomplete transaction data
    action: Warn when fewer than 5 round-trip trades are extracted
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Insufficient round trips produce statistically meaningless tear sheet statistics, misleading users about
      strategy performance characteristics
    stage_ids:
    - round_trip_analysis
  - id: finance-C-066
    when: When applying sector mappings to round trips
    action: Handle symbols with no sector mapping by assigning 'No Sector Mapping'
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unmapped symbols cause KeyError exceptions or silent data loss, preventing complete sector attribution analysis
    stage_ids:
    - round_trip_analysis
  - id: finance-C-067
    when: When computing profit factor from round trip PnL series
    action: Divide by zero when gross loss sum equals zero for profitable-only portfolios
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Zero gross loss causes division by zero in profit factor calculation, producing inf values that break downstream
      statistics tables
    stage_ids:
    - round_trip_analysis
  - id: finance-C-068
    when: When calculating average winning and losing trades
    action: Calculate mean on empty series when no winning or losing trades exist
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Mean of empty series produces NaN values that propagate through statistics tables, making them unreadable
      or misleading
    stage_ids:
    - round_trip_analysis
  - id: finance-C-069
    when: When normalizing date for portfolio value joining
    action: Strip time components from close_dt before joining with daily portfolio_value
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Timestamp mismatch prevents proper join of round trips with portfolio value, causing NaN returns for all
      round trips
    stage_ids:
    - round_trip_analysis
  - id: finance-C-073
    when: When analyzing strategies with high turnover
    action: trigger warning when average daily turnover exceeds 25% threshold
    severity: high
    kind: resource_boundary
    modality: must
    consequence: High-turnover strategy attribution will be presented as accurate when it is actually unreliable, misleading
      stakeholders about factor contributions
    stage_ids:
    - performance_attribution
  - id: finance-C-074
    when: When calculating performance attribution
    action: claim accuracy for intraday trading activity that is not captured by end-of-day holdings
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Performance attribution will misrepresent the true sources of returns for intraday strategies, as only end-of-day
      positions are used in calculations
    stage_ids:
    - performance_attribution
  - id: finance-C-075
    when: When factor loadings are missing for some positions
    action: issue warning identifying missing assets and continue with available factor loadings
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Returns from assets without factor loadings will be incorrectly attributed to other factors, corrupting the
      factor analysis and specific return calculations
    stage_ids:
    - performance_attribution
  - id: finance-C-078
    when: When computing portfolio risk exposures
    action: delegate core factor exposure calculation to empyrical.compute_exposures
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using non-empyrical implementation may produce inconsistent factor exposure results that don't match industry-standard
      risk model calculations
    stage_ids:
    - performance_attribution
  - id: finance-C-079
    when: When handling position data with cash positions
    action: exclude cash column from factor exposure calculation and drop it after normalization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cash positions will be incorrectly treated as a factor exposure, distorting risk attribution and causing
      calculation errors
    stage_ids:
    - performance_attribution
  - id: finance-C-080
    when: When validating transactions for turnover calculation
    action: verify get_turnover receives positions in dollars, not percentages
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Turnover calculation will produce incorrect ratios when positions are in percentages, leading to false high-turnover
      warnings or missed warnings
    stage_ids:
    - performance_attribution
  - id: finance-C-081
    when: When presenting performance attribution results
    action: claim that backtest attribution results represent expected live trading performance
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtest performance attribution does not account for real-world factors like slippage, market impact, and
      execution delays, overstating factor alpha accuracy
    stage_ids:
    - performance_attribution
  - id: finance-C-082
    when: When generating performance attribution statistics
    action: treat specific returns as pure alpha when residuals may include model specification errors
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Attributing unexplained returns entirely to skill may overstate alpha when factor model specification is
      incomplete or factors are incorrectly partitioned
    stage_ids:
    - performance_attribution
  - id: finance-C-083
    when: When verifying acceptance criteria
    action: validate that factor model correctly partitions returns into style and sector factor categories
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Mixing style and sector factors will distort factor attribution, making it impossible to distinguish between
      systematic style exposure and idiosyncratic sector bets
    stage_ids:
    - performance_attribution
  - id: finance-C-084
    when: When implementing returns analysis functions that compute financial risk metrics
    action: use empyrical library equivalents instead of direct pyfolio timeseries implementations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Direct pyfolio timeseries functions are deprecated wrappers that will be removed in a future release, breaking
      downstream code that depends on them
    stage_ids:
    - returns_analysis
  - id: finance-C-085
    when: When calling deprecated pyfolio timeseries functions directly
    action: expect DeprecationWarning messages to be emitted at runtime
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Users will see deprecation warnings when using pyfolio timeseries functions, indicating they should migrate
      to empyrical equivalents
    stage_ids:
    - returns_analysis
  - id: finance-C-086
    when: When computing drawdown metrics from return series
    action: correctly identify peak, valley, and recovery dates using the underwater DataFrame algorithm
    severity: high
    kind: domain_rule
    modality: must
    consequence: Drawdown table will report incorrect peak, valley, and recovery dates, causing misleading risk analysis for
      trading strategies
    stage_ids:
    - returns_analysis
  - id: finance-C-087
    when: When calculating rolling beta from returns and factor_returns
    action: use the correct rolling window alignment where beta is assigned to the END date of each window
    severity: high
    kind: domain_rule
    modality: must
    consequence: Rolling beta values will be misaligned with the timeline, causing incorrect factor exposure analysis
    stage_ids:
    - returns_analysis
  - id: finance-C-088
    when: When configuring rolling window size for beta and volatility calculations
    action: use APPROX_BDAYS_PER_MONTH * 6 (126 days) as the default 6-month rolling window
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using non-standard rolling windows will produce metrics inconsistent with industry-standard 6-month lookback
      periods used in financial analysis
    stage_ids:
    - returns_analysis
  - id: finance-C-089
    when: When generating forecast cones for probability cone plots
    action: use bootstrap sampling from in-sample returns to compute non-parametric cone bounds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Forecast cone will assume normal distribution and produce inaccurate probability bounds for non-normal return
      distributions
    stage_ids:
    - returns_analysis
  - id: finance-C-090
    when: When plotting rolling beta in tear sheets
    action: plot both 6-month and 12-month rolling beta to show convergence behavior over time
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Single-window rolling beta analysis may mislead users about factor exposure stability without observing convergence
      at different lookback periods
    stage_ids:
    - returns_analysis
  - id: finance-C-091
    when: When computing rolling volatility and Sharpe ratio
    action: annualize volatility using sqrt(APPROX_BDAYS_PER_YEAR) where APPROX_BDAYS_PER_YEAR equals 252
    severity: high
    kind: domain_rule
    modality: must
    consequence: Annualized volatility and Sharpe ratio will be incorrectly scaled if using calendar days instead of trading
      days
    stage_ids:
    - returns_analysis
  - id: finance-C-092
    when: When using pyfolio timeseries for backtest analysis
    action: claim that backtest risk metrics equal expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as expected live trading returns violates financial analysis best practices and
      may mislead stakeholders about actual expected performance
    stage_ids:
    - returns_analysis
  - id: finance-C-093
    when: When handling returns that have not recovered from a drawdown
    action: set recovery date to NaN instead of omitting the drawdown record
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ongoing drawdowns will be excluded from analysis, understating the current risk exposure of the trading strategy
    stage_ids:
    - returns_analysis
  - id: finance-C-094
    when: When computing performance statistics with factor returns
    action: pass factor_returns to both alpha and beta calculation functions in the FACTOR_STAT_FUNCS list
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Alpha and beta statistics will be skipped when factor_returns is provided, causing incomplete factor analysis
    stage_ids:
    - returns_analysis
  - id: finance-C-095
    when: When analyzing returns data with missing values in rolling calculations
    action: handle NaN values gracefully in rolling beta without breaking the calculation loop
    severity: high
    kind: domain_rule
    modality: must
    consequence: Rolling beta will return all NaN values if either returns or factor_returns contains NaN, making factor analysis
      impossible
    stage_ids:
    - returns_analysis
  - id: finance-C-096
    when: When computing forecast cone bounds using bootstrap sampling
    action: verify random_seed parameter produces reproducible results for the same seed value
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Identical code runs will produce different forecast cones, making it impossible to reproduce analysis or
      compare strategy changes
    stage_ids:
    - returns_analysis
  - id: finance-C-098
    when: When modifying the cone_method for forecast cone estimation
    action: maintain compatibility with the expected function signature (is_returns, num_days, cone_std, starting_value)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Custom cone functions will fail to integrate with pyfolio plotting code, breaking forecast cone visualization
    stage_ids:
    - returns_analysis
  - id: finance-C-100
    when: When implementing volume rolling mean calculation
    action: Use only historical data by returning DataFrame starting at mean_volume_window index
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning data before the rolling window is filled produces NaN values that corrupt liquidation time calculations,
      leading to invalid portfolio capacity estimates
    stage_ids:
    - capacity_analysis
  - id: finance-C-101
    when: When implementing slippage penalty calculation
    action: Use quadratic volume consumption model for slippage penalties
    severity: high
    kind: domain_rule
    modality: must
    consequence: Linear slippage models underestimate market impact for large trades, causing backtests to overstate returns
      for positions that consume significant daily volume
    stage_ids:
    - capacity_analysis
  - id: finance-C-102
    when: When configuring capacity analysis parameters
    action: Set max_bar_consumption default to 20% (0.2) of daily volume
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Consuming more than 20% of daily volume in a single day exceeds realistic market liquidity, causing estimated
      liquidation times to be too optimistic and leading to capital over-deployment
    stage_ids:
    - capacity_analysis
  - id: finance-C-103
    when: When calculating position allocations for capacity
    action: Exclude cash from position allocation calculations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Including cash in position allocations inflates the denominator, causing days-to-liquidate calculations to
      underestimate actual liquidation time for equity positions
    stage_ids:
    - capacity_analysis
  - id: finance-C-104
    when: When estimating days to liquidate positions
    action: Use capital_base multiplied by portfolio allocation instead of actual position values
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using actual position values introduces compounding effects, where liquidation of one position affects the
      relative size of remaining positions, distorting capacity estimates over time
    stage_ids:
    - capacity_analysis
  - id: finance-C-105
    when: When scaling slippage penalties for different capital bases
    action: Scale both trade size numerator and portfolio value denominator by the same multiplier
    severity: high
    kind: domain_rule
    modality: must
    consequence: Scaling only the trade size without adjusting portfolio value produces inconsistent slippage penalties that
      misrepresent market impact at different capital levels
    stage_ids:
    - capacity_analysis
  - id: finance-C-106
    when: When identifying low-liquidity transactions
    action: Calculate bar consumption as transaction amount divided by daily volume
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect bar consumption calculation causes misidentification of low-liquidity positions, hiding potential
      market impact issues from portfolio managers
    stage_ids:
    - capacity_analysis
  - id: finance-C-107
    when: When presenting capacity analysis results
    action: Claim that backtested capacity estimates equal expected live trading capacity
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest capacity estimates as live trading expectations overstates portfolio capacity since historical
      volume may not reflect future market conditions or intraday liquidity patterns
    stage_ids:
    - capacity_analysis
  - id: finance-C-108
    when: When calculating slippage-adjusted returns
    action: Use quadratic slippage model for small trades that would be better served by linear models
    severity: low
    kind: claim_boundary
    modality: must_not
    consequence: Quadratic slippage penalties become disproportionately large for small trades relative to their actual market
      impact, understating expected returns for liquid large-cap positions
    stage_ids:
    - capacity_analysis
  - id: finance-C-109
    when: When implementing volume rolling mean window
    action: Set mean_volume_window default to 5 days for trailing volume calculation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: A window that is too short introduces noise from daily volume fluctuations, while a window that is too long
      may not capture recent liquidity changes, reducing the accuracy of liquidation time estimates
    stage_ids:
    - capacity_analysis
  - id: finance-C-110
    when: When configuring slippage impact coefficient
    action: Set impact parameter default to 0.1 for slippage scaling
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: An impact coefficient that is too high overestimates slippage costs, discouraging potentially profitable
      strategies; too low underestimates market impact, leading to capital over-deployment
    stage_ids:
    - capacity_analysis
  - id: finance-C-112
    when: When configuring factor_partitions for performance attribution plots, the dict MUST contain 'style' and 'sector'
      keys
    action: use FACTOR_PARTITIONS default containing style and sector factor groups
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attribution plots will fail to partition style vs sector factors, causing misleading risk attribution analysis
      that mixes factor categories
    stage_ids:
    - report_generation
  - id: finance-C-113
    when: When plotting with matplotlib after seaborn context, axis tick parameters MUST be explicitly set for bottom and
      label positions
    action: apply ax.tick_params(axis='x', bottom=True, labelbottom=True) to each figure axes after plotting
    severity: medium
    kind: domain_rule
    modality: must
    consequence: X-axis tick marks and labels will be hidden, making date labels invisible and plots unreadable in Jupyter
      notebook output
    stage_ids:
    - report_generation
  - id: finance-C-118
    when: When generating interesting times tear sheet, returns data MUST overlap with at least one predefined historical
      period
    action: verify returns date range includes dates between 2000-2020 for meaningful historical event analysis
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: 'UserWarning emitted: ''Passed returns do not overlap with any interesting times'' and function returns early
      without plots'
    stage_ids:
    - report_generation
  - id: finance-C-119
    when: When plotting with seaborn, set_context parameter MUST be respected to apply consistent styling
    action: apply @customize decorator to each tear sheet functions and respect set_context parameter in kwargs
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Plots will display without pyfolio's custom seaborn context, causing inconsistent font scales and axis styles
      across different environments
    stage_ids:
    - report_generation
  - id: finance-C-120
    when: When executing tear sheet functions, returns data index SHOULD be timezone-aware with UTC localization
    action: localize returns index to UTC using tz_localize('UTC') if timezone-naive
    severity: high
    kind: domain_rule
    modality: must
    consequence: Timezone mismatches can cause silent data alignment issues between returns and benchmark/transaction timestamps,
      producing incorrect date-matched analysis
    stage_ids:
    - report_generation
  - id: finance-C-121
    when: When generating tear sheets with incomplete factor coverage, missing factor loadings SHOULD trigger UserWarning
    action: warn users about assets missing factor loadings rather than silently dropping them from attribution
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Users will incorrectly believe all portfolio positions are included in attribution, leading to incomplete
      risk factor analysis
    stage_ids:
    - report_generation
  - id: finance-C-122
    when: When generating reports without position or transaction data, the system MUST NOT claim live trading capability
    action: clearly indicate in output that results are from backtest simulation, not live trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as live trading performance violates financial analysis ethics and can mislead
      investors about actual expected returns
    stage_ids:
    - report_generation
  - id: finance-C-123
    when: When plotting slippage sweep or sensitivity, the system MUST NOT claim these represent actual transaction costs
    action: label slippage plots as hypothetical sensitivity analysis, not actual execution data
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Slippage sweep plots show theoretical impact at various basis points; presenting these as measured execution
      costs would misrepresent actual trading expenses
    stage_ids:
    - report_generation
  - id: finance-C-124
    when: When generating capacity analysis, the system MUST NOT claim precise liquidation timelines
    action: present capacity constraints as estimates based on volume limits, not guaranteed execution projections
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Capacity tear sheet uses parameterized volume limits (liquidation_daily_vol_limit=0.2, trade_daily_vol_limit=0.05);
      actual liquidation success depends on market conditions not modeled
    stage_ids:
    - report_generation
  - id: finance-C-125
    when: When creating round trip analysis, the system MUST use peak exposure detection for intraday strategies
    action: detect intraday trading patterns and use peak exposure point rather than end-of-day positions
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Round trip durations will be miscalculated for intraday strategies, showing trades lasting months when they
      actually close within hours
    stage_ids:
    - report_generation
  - id: finance-C-126
    when: When handling sector mappings, symbols without mapping SHOULD emit UserWarning
    action: warn users when positions contain symbols not found in sector_mappings dictionary
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Users will not realize their sector allocation analysis excludes unmapped positions, leading to incomplete
      sector exposure reporting
    stage_ids:
    - report_generation
  - id: finance-C-128
    when: When positions flow from data_preprocessing to position_analysis
    action: Pass positions through check_intraday() to detect and handle intraday strategies before position analysis
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Intraday strategies not holding end-of-day positions will show zero positions, causing incorrect allocation
      and exposure calculations
  - id: finance-C-130
    when: When returns flow to returns_analysis with benchmark_rets
    action: Clip returns index to match benchmark_rets start and end dates using clip_returns_to_benchmark()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Returns outside benchmark date range cause misalignment errors in alpha/beta calculations and rolling beta
      plots
  - id: finance-C-132
    when: When positions flow to round_trip_analysis via add_closing_transactions
    action: Use end-of-period positions to generate closing transactions at timestamp + 1 second to avoid conflicts
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Closing transactions at the same timestamp as other trades cause duplicate transaction entries and incorrect
      round-trip calculations
  - id: finance-C-134
    when: When transactions flow to capacity_analysis
    action: Aggregate transaction amounts to daily totals using abs(amount) to get absolute daily volume for capacity calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using signed transaction amounts causes incorrect capacity analysis as buys and sells would cancel each other
      out
  - id: finance-C-136
    when: When positions flow to performance_attribution
    action: Pass positions with zero stocks having factor loadings when pos_in_dollars=True, as turnover check cannot be skipped
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Performance attribution silently ignores stocks without factor loadings, leading to incomplete attribution
      analysis
  - id: finance-C-138
    when: When positions flow to report_generation for turnover calculation
    action: Drop 'cash' column from positions before calculating GMV (Gross Market Value) as denominator in turnover formula
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including cash in turnover denominator causes incorrect turnover percentages that don't reflect actual trading
      activity
  - id: finance-C-139
    when: When round_trips flow to report_generation
    action: Skip round-trip reporting if fewer than 5 trades are detected, as statistical significance is insufficient
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Presenting round-trip statistics with fewer than 5 trades creates misleading performance claims with no statistical
      validity
  - id: finance-C-140
    when: When capacity_analysis calculates days_to_liquidate
    action: Use trailing 5-day rolling mean volume (shifted by 1) for available bar volume to prevent look-ahead bias
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using current day volume causes look-ahead bias in liquidation estimates, making capacity analysis overly
      optimistic
  - id: finance-C-142
    when: When capacity_analysis applies slippage penalty to returns
    action: Use noncumulative returns index to align with daily_penalty series using reindex before computing adjusted returns
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Index misalignment causes NaN values in adjusted returns and breaks capacity sweep analysis
  - id: finance-C-143
    when: When sector_mappings flow to position_analysis or round_trip_analysis
    action: Provide sector_mappings as dict or pd.Series mapping security identifiers to sector names for sector-level analysis
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Missing sector_mappings causes sector allocation charts to be skipped, limiting analysis visibility
  - id: finance-C-144
    when: When positions flow through check_intraday estimation
    action: Compute beginning-of-day portfolio value as positions.sum(axis='columns') / (1 + returns) for proper round-trip
      return calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using end-of-day positions as portfolio value causes incorrect round-trip returns calculation due to same-day
      price movement
  - id: finance-C-145
    when: When backtest returns are extracted from Zipline
    action: Normalize backtest index using normalize() before timezone operations to verify correct date alignment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-normalized timestamps cause position-referencing errors when backtest spans multiple years with timezone
      changes
  - id: finance-C-146
    when: When calculating capacity with daily volume consumption limit
    action: Replace zero volume days with NaN before division to avoid division by zero and infinite days_to_liquidate values
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Division by zero produces inf values that corrupt capacity analysis results and cause plotting errors
  - id: finance-C-153
    when: When specifying slippage parameter to adjust_returns_for_slippage
    action: Pass slippage value in basis points (1 basis point = 0.01% = 0.0001)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Slippage calculation multiplies by 0.0001 internally, so passing raw percentage values causes 100x over-adjustment
      of returns
  - id: finance-C-154
    when: When using estimate_intraday parameter in tear sheet functions
    action: Set estimate_intraday='infer' to auto-detect intraday strategies, or explicitly set True/False based on strategy
      type
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Intraday strategies not detected may show misleading end-of-day positions, causing inaccurate position concentration
      and turnover metrics
  - id: finance-C-155
    when: When annualizing returns or computing Sharpe ratio
    action: Use APPROX_BDAYS_PER_YEAR=252 for daily returns, APPROX_BDAYS_PER_MONTH=21 for approximations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using calendar days instead of trading days inflates annualized metrics by approximately 15%, causing misleading
      performance comparisons
  - id: finance-C-156
    when: When working with timestamps in interesting periods analysis
    action: Use UTC timezone for each event timestamps (tzinfo=dt.timezone.utc)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Date range extraction comparing local timestamps against UTC-based event definitions may exclude or include
      wrong events, causing incorrect interesting period analysis
  - id: finance-C-157
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live trading returns — backtesting ignores market impact, financing
      costs, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-158
    when: When presenting simulated portfolio analysis results
    action: Present pyfolio analysis outputs as proof of live trading capability or execution accuracy
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: pyfolio is a backtesting analysis library only. Presenting its outputs as live execution proof misleads stakeholders
      about actual trading performance
  - id: finance-C-159
    when: When using estimate_intraday=True for intraday strategy analysis
    action: Claim the estimated intraday positions represent actual intraday trades with precise timing
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: estimate_intraday approximates positions at peak market exposure, not actual trade timing. High-frequency
      trading results may be materially different
  - id: finance-C-160
    when: When using pyfolio's performance attribution analysis
    action: Claim attribution results account for intraday trading activity or high-frequency rebalancing
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Performance attribution is calculated based on end-of-day holdings only. Algorithms with high intraday turnover
      will have inaccurate factor exposure attribution
  - id: finance-C-161
    when: When presenting pyfolio analysis for cross-asset portfolio evaluation
    action: Claim pyfolio provides accurate cross-asset correlation or multi-asset risk analysis
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: pyfolio's factor model and correlation analysis is designed for equity portfolios. Multi-asset portfolios
      with commodities, derivatives, or fixed income may produce misleading risk estimates
  - id: finance-C-162
    when: When using pyfolio's slippage adjustment feature
    action: Claim slippage-adjusted backtest results equal actual execution costs in live trading
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: The linear slippage model (slippage_bps * traded_value) is a simplified approximation. Actual execution costs
      include market impact, bid-ask spread, and liquidity constraints that vary with order size and market conditions
  - id: finance-C-163
    when: When attempting to use pyfolio for real-time trading operations
    action: Use pyfolio as a real-time trading system or execution platform
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: pyfolio is a backtesting analysis library that reads pre-computed returns, positions, and transactions. It
      has no capability to submit orders, manage positions in real-time, or connect to brokerage APIs
  - id: finance-C-164
    when: When analyzing strategies with high turnover using performance attribution
    action: Investigate whether performance attribution accurately represents strategy returns or may produce misleading factor
      exposures
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: High turnover strategies that rebalance within the same day may have significant returns not captured by
      end-of-day holdings analysis, leading to incorrect factor attribution
  - id: finance-C-165
    when: When computing portfolio value from positions and returns
    action: Use beginning-of-day positions (shifted or corrected) for portfolio value calculation to avoid look-ahead bias
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using end-of-day positions combined with end-of-day returns causes look-ahead bias, as the day's return includes
      price movement after positions are established
  - id: finance-C-166
    when: When analyzing round trips with incomplete position closures
    action: Account for open positions at the end of the analysis period that may not have realized PnL recorded
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Round trip analysis that does not add closing transactions for positions open at the end of the backtest
      under-reports total strategy returns
  - id: finance-C-167
    when: When implementing or refactoring tear sheet generation functions
    action: Delegate each calculations to specialized modules (pos, txn, round_trips); tear sheet functions must only orchestrate
      calls and render output
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Embedding computation in tear sheet functions breaks modularity; calculation logic becomes inconsistent when
      called programmatically vs. from reports, causing silent divergence between backtest and live analysis outputs
    derived_from_bd_id: BD-027
  - id: finance-C-168
    when: When implementing transaction merging logic for trade analysis
    action: Merge same-direction transactions separated by less than 8 hours using VWAP = sum(price × shares) / sum(shares);
      do not merge opposite-direction transactions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect merging of opposite-direction transactions or wrong thresholds destroys round-trip analysis; strategies
      that rapidly flip positions would show false returns while actual realized gains/losses differ significantly
    derived_from_bd_id: BD-032
  - id: finance-C-169
    when: When implementing or modifying round-trip matching logic
    action: Use FIFO (First In, First Out) deque-based algorithm with copysign for direction detection; position tracking
      must reset at zero-crossing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using LIFO or average-cost basis changes reported gains/losses and breaks regulatory compliance for multi-asset
      portfolios; audit trails become non-reproducible when matching methodology changes
    derived_from_bd_id: BD-033
  - id: finance-C-170
    when: When implementing sector mapping analysis for portfolio holdings
    action: Issue a warning for securities with no GICS mapping and exclude them from sector analysis; do not silently skip
      or fail entirely
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silently excluding unmapped securities hides data quality issues; failing entirely blocks reporting for portfolios
      with new issues; warning allows users to address data gaps while maintaining analysis
    derived_from_bd_id: BD-037
  - id: finance-C-171
    when: When processing EOD positions for starting capital calculation
    action: Verify that the 1-day position shift aligns with your data pipeline's timestamp convention; if positions are reported
      at start-of-day, remove the shift
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect position timestamp alignment causes first-day returns to be calculated against wrong starting capital;
      look-ahead bias may be introduced if positions and capital are misaligned by a day
    derived_from_bd_id: BD-003
  - id: finance-C-172
    when: When merging consecutive same-direction transactions
    action: 'Compute VWAP using formula: sum(price × shares) / sum(shares); do not use simple average, first-fill, or last-fill
      price'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple average price when merging transactions with different sizes produces incorrect cost basis;
      VWAP weighting by economic size correctly represents blended execution price across multiple fills
    derived_from_bd_id: BD-009
  - id: finance-C-173
    when: When computing bootstrap confidence cones for return analysis
    action: Use default num_samples=1000 for convergence stability; verify that 1000 samples provide adequate precision for
      your use case (95% CI typically stabilizes at 500+ samples)
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Insufficient bootstrap samples produce unstable confidence intervals with high variance; strategies may appear
      more or less risky than actual performance warrants, affecting risk management decisions
    derived_from_bd_id: BD-021
  - id: finance-C-174
    when: When modeling transaction costs and slippage for backtesting
    action: Use linear slippage model (BPS × traded_value) only for small orders; for large orders with significant market
      impact, apply nonlinear correction (e.g., square root of volume ratio model)
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Linear slippage model underestimates costs for substantial trades where market impact becomes superlinear;
      backtest results systematically overestimate net returns for high-turnover strategies
    derived_from_bd_id: BD-002
  - id: finance-C-177
    when: When configuring bootstrap confidence interval calculations for performance statistics
    action: Use exactly 1000 bootstrap iterations (n_samples=1000) to verify stable confidence intervals while balancing computational
      cost
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reducing sample size below 1000 may cause unstable confidence intervals that fail to capture tail behavior,
      leading to unreliable risk estimates; increasing sample size unnecessarily increases computation time without proportional
      precision gains
    derived_from_bd_id: BD-050
  - id: finance-C-178
    when: When generating round-trip tear sheets with fewer than 5 round-trips
    action: Display a warning message and suppress the round-trip tear sheet when fewer than 5 round-trips are available,
      as derived metrics (avg hold time, profit factor) lack statistical significance below this threshold
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Publishing tear sheet statistics from fewer than 5 trades presents misleading performance metrics, causing
      poor investment decisions based on statistically insignificant samples
    derived_from_bd_id: BD-035
  - id: finance-C-179
    when: When implementing bootstrap cone calculations for test suite validation
    action: Set random seed to 100 for bootstrap sampling to verify reproducible results across test runs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without a fixed seed, bootstrap cone tests produce non-deterministic results, causing intermittent test failures
      that prevent reliable CI/CD validation
    derived_from_bd_id: BD-056
  - id: finance-C-180
    when: When calculating portfolio allocations that include cash positions
    action: Include the 'cash' column in the allocation sum denominator, treating net cash (short borrow costs minus long
      proceeds) as an active position that is part of portfolio exposure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Excluding cash from allocation sum misrepresents portfolio composition, causing long-only portfolios with
      large cash reserves to show allocations exceeding 100% and creating inconsistency with benchmark comparisons
    derived_from_bd_id: BD-004
  - id: finance-C-181
    when: When using transaction data for intraday execution quality analysis
    action: Rely on timestamp-normalized transaction data to assess time-of-day execution quality, momentum effects, or end-of-day
      positioning — midnight normalization discards each intraday timing information
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Normalized timestamps aggregate all trades from 9:30 AM to 4:00 PM into the same bucket, making it impossible
      to identify execution quality issues at specific times of day or momentum effects
    derived_from_bd_id: BD-008
  - id: finance-C-182
    when: When implementing cost basis matching for share lots
    action: Use FIFO (First-In-First-Out) matching via deque stack, where the oldest shares (first pushed) are matched against
      new sales first, ensuring standard accounting practice and tax reporting compliance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using LIFO or unordered matching changes cost basis calculations, potentially causing incorrect tax lot identification
      and regulatory reporting violations
    derived_from_bd_id: BD-010
  - id: finance-C-183
    when: When implementing or selecting slippage models for capacity analysis
    action: Use quadratic market impact model (Almgren-Chriss implementation) when modeling large orders, as linear models
      underestimate impact and square-root models (Kyle 1985) may overestimate for typical participation rates
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using linear slippage underestimates market impact for large orders, causing backtest results to show unrealistic
      fills and profits; square-root models may over-conservative for normal participation rates
    derived_from_bd_id: BD-026
  - id: finance-C-185
    when: When computing gross exposure from position data in backtesting
    action: Use sum(abs(positions)) for gross exposure calculation — short positions show as negative values and would be
      incorrectly netted if using sum(positions)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using sum(positions) for gross exposure silently nets short positions, producing figures 50-100% below actual
      gross exposure for hedged portfolios; investors relying on gross exposure metrics make misallocated capital decisions
    derived_from_bd_id: BD-005
  - id: finance-C-186
    when: When implementing optional zipline import pattern for multiplier logic
    action: Check zipline.assets availability before attempting any zipline import — use conditional import or try-except
      pattern; never hard-code 'import zipline' at module level
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Hard-coded zipline imports at module level cause ImportError in environments where zipline is not installed,
      breaking pyfolio functionality for non-zipline users despite the intentional optional dependency design
    derived_from_bd_id: BD-112
  - id: finance-C-188
    when: When performing matrix inversion operations in numerical computations
    action: Assume matrices are well-conditioned without explicit validation — do not perform inversion without computing
      condition_number first
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Ill-conditioned matrices produce unreliable inversion results with errors amplified by factor of condition_number,
      causing silently incorrect portfolio optimization, risk calculations, and factor model estimates
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-189
    when: When performing matrix inversion operations in numerical computations
    action: Compute condition_number before any matrix inversion; if condition_number > 1e10 (for double precision), use numerically
      stable alternatives (SVD decomposition, Tikhonov regularization, or pseudo-inverse)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without condition number validation, ill-conditioned covariance or correlation matrices produce unreliable
      inversions, causing portfolio optimization to generate degenerate solutions and risk models to underestimate portfolio
      volatility
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-190
    when: When implementing or modifying profit factor calculation logic
    action: Return NaN when gross_profit >= 0 AND gross_loss == 0 (perfect profitability case); do not substitute 0 or infinity
      values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Substituting 0 misrepresents perfect profitability as zero gains, while infinity causes visualization errors
      in performance dashboards; both misrepresent the strategy's risk-adjusted returns
    derived_from_bd_id: BD-059
  - id: finance-C-191
    when: When implementing slippage adjustment calculations for transaction cost modeling
    action: 'Apply linear slippage model using formula: slippage = 0.0001 * slippage_bps * traded_value; do not substitute
      square-root or fixed-bps models without explicit parameterization'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Square-root market impact models produce higher slippage for large orders, while fixed-bps models ignore
      trade-size effects; mismatched models cause backtest returns to diverge significantly from live execution reality
    derived_from_bd_id: BD-038
  - id: finance-C-192
    when: When processing drawdown recovery date calculations for position analysis
    action: Assign NaN to recovery_date field for drawdowns where current value has not exceeded peak; do not substitute dummy
      dates or zero values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Assigning dummy dates misrepresents ongoing drawdowns as resolved, causing negative drawdown duration calculations
      and misleading recovery time reports for active positions
    derived_from_bd_id: BD-057
  - id: finance-C-193
    when: When performing performance attribution analysis with incomplete factor data
    action: Warn users and use average portfolio allocation for assets with missing factor loadings; do not exclude affected
      securities or halt calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Excluding missing securities understates total portfolio exposure in attribution, while halting calculation
      prevents any attribution output; both cause incomplete or absent performance analysis
    derived_from_bd_id: BD-069
  - id: finance-C-194
    when: When calculating turnover metrics for transaction analysis
    action: Verify turnover denominator uses AGB (Actual Gross Book = positions.abs().sum()) not portfolio_value; AGB represents
      beginning-of-period gross exposure and stabilizes turnover during cash flow volatility
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using portfolio_value as denominator causes turnover spikes during large deposits or withdrawals, misrepresenting
      actual trading activity relative to deployed capital
    derived_from_bd_id: BD-007
  - id: finance-C-195
    when: When extracting round-trips from transaction history for trade analysis
    action: Merge same-direction transactions within 8-hour (28800 seconds) window using VWAP pricing before round-trip extraction;
      verify window parameter matches US market trading session calibration
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Shorter windows split intraday fills into separate transactions, inflating round-trip counts; longer windows
      merge distinct trading decisions, obscuring individual trade profitability
    derived_from_bd_id: BD-011
  - id: finance-C-197
    when: When implementing liquidation time calculations in capacity analysis
    action: Use capital_base=1e6 ($1,000,000) as the reference baseline for percentage-based capacity estimates, ensuring
      cross-fund comparison by normalizing to this common base
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using actual portfolio value instead of the 1e6 baseline makes capacity estimates fund-specific, preventing
      meaningful comparison across different fund sizes and potentially causing liquidity misestimation in backtests
    derived_from_bd_id: BD-043
  - id: finance-C-198
    when: When implementing position display and cash calculation in performance attribution
    action: Display short positions as negative values in position tables and include the sum of negative values in the 'cash'
      column — short sale proceeds correctly increase net cash position
    severity: high
    kind: domain_rule
    modality: must
    consequence: Excluding negative position values from the cash column misrepresents available capital, causing performance
      attribution to show incorrect net cash positions and misleading borrowing cost calculations for short strategies
    derived_from_bd_id: BD-114
  - id: finance-C-199
    when: When implementing round-trip extraction with FIFO matching, deque-based lot tracking, and synthetic closing transactions
    action: Allow closing transactions with 1-second offset to cross calendar day boundaries — trades near midnight with after-hours
      activity or timezone issues can be incorrectly paired with wrong lots due to FIFO timing artifact
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Round-trip identification becomes corrupted when synthetic closing transactions cross day boundaries and
      FIFO matching pairs them with incorrect lots, resulting in fundamentally wrong PnL calculations for round-trip analysis
    derived_from_bd_id: BD-123
  - id: finance-C-200
    when: When aggregating performance statistics in round-trip analysis
    action: Aggregate statistics separately for long, short, and combined positions — do not collapse directional performance
      into single aggregate figures
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Aggregating long and short stats together masks directional performance asymmetry; strategies with strong
      long-side alpha but poor short-side selection will show misleading overall performance, preventing identification of
      which direction actually drives alpha
    derived_from_bd_id: BD-014
  - id: finance-C-201
    when: When computing performance attribution using EOD-based snapshots
    action: Check if daily turnover exceeds 25% threshold (PERF_ATTRIB_TURNOVER_THRESHOLD) and emit warning — strategies with
      significant intraday activity will have positions that change multiple times within a single day
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: EOD-based attribution misses intraday round trips when turnover exceeds 25%, causing backtest attribution
      to diverge significantly from actual live trading results as intraday position changes are not captured in daily snapshots
    derived_from_bd_id: BD-017
  - id: finance-C-203
    when: When using APPROX_BDAYS_PER_MONTH=21 for rolling window calculations
    action: Verify that 21 trading days per month matches your target market; for non-US markets (e.g., UK with ~20 days,
      some Asian markets with ~22 days), adjust the constant to avoid systematic window misalignments
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using 21 for markets with different trading day counts causes rolling window calculations to be systematically
      misaligned, producing Sharpe ratios, beta, and volatility metrics that diverge from actual market performance
    derived_from_bd_id: BD-099
  - id: finance-C-204
    when: When implementing event logging in pyfolio for production backtesting
    action: Assume the framework provides an immutable event log — the framework does not implement immutable event logging;
      audit trail relies on standard Python logging which can be modified
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without immutable event logging, audit findings may be unverifiable in production; compliance auditors cannot
      verify that historical events were not altered retroactively
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-205
    when: When implementing event logging for backtesting audit trails
    action: Implement immutable event logging using append-only storage (e.g., write-ahead log, blockchain-based audit trail,
      or independent audit service) that records each backtest events with timestamps before execution
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without immutable logging, production backtests cannot pass audit reviews; auditors cannot verify the integrity
      of backtest results if log entries can be modified retroactively
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-206
    when: When implementing carry or funding cost calculations for strategies with overnight positions
    action: Assume the framework models carry costs or funding costs — the framework does not implement carry or funding cost
      modeling; strategies holding positions overnight will have underestimated true costs
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without carry/funding cost modeling, strategies holding overnight positions appear more profitable than they
      actually are; live trading will incur real borrowing costs that backtests do not capture
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-207
    when: Using estimate_intraday='infer' for strategies that trade near end of day
    action: Verify that EOD_HOUR=23 aligns with the actual market close time for each traded securities — for exchanges closing
      before 23:00 local time, the position interpolation will overestimate end-of-day holdings
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using hour 23 as EOD proxy misaligns intraday position estimation with actual market close; positions are
      interpolated using incorrect timestamps, causing ~1-5% daily PnL attribution errors for late-day trades
    derived_from_bd_id: BD-049
  - id: finance-C-208
    when: When calculating turnover ratios for strategies that use net liquidation or cash-only bases
    action: 'Verify that turnover_denom=''AGB'' matches broker statement conventions — compare AGB-based turnover against
      broker-reported turnover and document any systematic discrepancy (typical difference: 10-30% for strategies with significant
      cash buffers)'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using AGB as denominator overstates turnover relative to cash-based metrics used by brokers; strategy comparisons
      against broker statements will show apparent discrepancies that are just measurement basis differences
    derived_from_bd_id: BD-100
  - id: finance-C-209
    when: When running backtests with missing or incomplete position/transaction data
    action: Verify both positions AND transactions data are available when using estimate_intraday='infer' — the auto-detection
      requires both data streams; provide complete datasets or explicitly set estimate_intraday parameter
    severity: high
    kind: domain_rule
    modality: must
    consequence: Auto-detection fails silently with incomplete data, falling back to incorrect assumptions about intraday
      trading; backtest PnL attribution becomes unreliable when position snapshots do not align with actual trading activity
    derived_from_bd_id: BD-101
  - id: finance-C-210
    when: When classifying strategies with near-100% daily turnover as non-intraday
    action: Verify that INTRADAY_DETECTION_THRESHOLD=0.25 correctly classifies high-turnover strategies — strategies with
      held positions/transacted ratio near 1.0 may be misclassified as position-trading when they are actually day-trading
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: High-turnover strategies near 100% daily position change are misclassified as non-intraday due to threshold=0.25;
      this causes incorrect intraday estimation logic to be applied, distorting PnL attribution between overnight and intraday
      components
    derived_from_bd_id: BD-115
  - id: finance-C-211
    when: When calculating rolling beta, Sharpe ratio, or volatility for non-US markets
    action: 'Verify that APPROX_BDAYS_PER_MONTH=21 aligns with the target market''s trading calendar — non-US markets with
      different trading day patterns (e.g., UK: 20, Japan: 19) will have effective windows that do not correspond to 6 calendar
      months'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Fixed 21 trading days per month assumption causes non-US strategies to have incorrect window lengths; Japanese
      or UK strategies effectively use 5.7-6.3 month windows instead of 6 months, biasing rolling statistics
    derived_from_bd_id: BD-118
  - id: finance-C-212
    when: When analyzing both performance metrics AND capacity estimates for strategies with large order sizes
    action: Do not combine BD-002 (linear BPS slippage for performance) and BD-026 (quadratic volume-share for capacity) without
      acknowledging model inconsistency — large orders will have underestimated performance costs but overestimated capacity
      constraints
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Using inconsistent slippage models for performance vs capacity analysis creates contradictory signals: backtests
      report optimistic net returns while capacity projections show conservative estimates; scale-up decisions become unreliable
      when comparing these inconsistent metrics'
    derived_from_bd_id: BD-119
  - id: finance-C-213
    when: When estimating capacity for strategies during sudden liquidity events or market stress
    action: Account for the 6-day structural lag (BD-024 shift(1) + BD-042/BD-073 5-day window) in volume-based capacity estimates
      — during flash crashes or vol spikes, capacity estimates will not reflect current market conditions for up to 6 business
      days
    severity: high
    kind: domain_rule
    modality: must
    consequence: Structural lag in capacity estimation causes position sizing to remain inappropriately large during market
      stress events; strategies may continue executing large orders at prices far worse than capacity estimates suggest, causing
      significant slippage that is not anticipated
    derived_from_bd_id: BD-122
  - id: finance-C-214
    when: When implementing intraday position estimation from end-of-day positions in backtesting
    action: Apply shift(1) to align EOD positions with beginning-of-day holdings — use prior-day close positions for current
      period intraday estimates to prevent look-ahead bias; first period must use zero position
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using current position (shift(0)) for intraday estimation introduces look-ahead bias where backtest assumes
      positions are known before they occur, causing inflated returns that cannot be replicated in live trading
    derived_from_bd_id: BD-067
  - id: finance-C-215
    when: When implementing execution cost modeling in backtesting
    action: Use quadratic volumeshare relationship for slippage calculation — larger orders must incur disproportionately
      higher costs reflecting market microstructure where order size approaches liquidity limits
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using linear or square-root volumeshare models underestimates large-order slippage by 15-40%, causing backtest
      to overstate net returns for high-turnover strategies and creating live trading gap when actual execution costs exceed
      estimates
    derived_from_bd_id: BD-074
  - id: finance-C-216
    when: When calculating portfolio Value at Risk using variance-covariance method
    action: Use normal distribution assumption for variance-covariance VaR — this closed-form parametric approach is validated
      for diversified portfolios; be aware it systematically underestimates tail risk during market stress when return distributions
      exhibit fat tails
    severity: high
    kind: domain_rule
    modality: must
    consequence: Normal distribution VaR underestimates tail risk by 20-60% during volatile markets when actual returns follow
      fat-tailed distributions, potentially leading to insufficient capital reserves and catastrophic losses exceeding VaR
      estimates
    derived_from_bd_id: BD-075
  - id: finance-C-217
    when: When using bootstrap resampling for performance metric uncertainty quantification
    action: Verify that the bootstrap iteration count (default typically 100-1000) provides sufficient convergence for the
      specific metric distribution; increase iterations for heavy-tailed metrics like Sharpe ratio
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Insufficient bootstrap iterations produce unstable confidence intervals that vary across runs, causing inconsistent
      strategy ranking decisions and potentially misleading risk assessments
    derived_from_bd_id: BD-083
  - id: finance-C-218
    when: When implementing slippage adjustment logic for transaction cost modeling
    action: Use linear basis point scaling for slippage calculation; do not replace with non-linear models without explicit
      parameter calibration and liquidity analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Linear slippage models may underestimate execution costs in illiquid markets where large orders face liquidity
      saturation, causing systematic backtest overperformance relative to live trading
    derived_from_bd_id: BD-085
  - id: finance-C-219
    when: When implementing position concentration risk metrics
    action: Calculate both max and median concentration separately for long and short sides; do not combine long/short positions
      or use aggregate concentration that obscures directional single-name risk
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixing long and short concentrations or using aggregate metrics can hide concentrated short exposure that
      faces unlimited loss potential, leading to inadequate risk limits
    derived_from_bd_id: BD-088
  - id: finance-C-221
    when: When configuring performance attribution analysis and interpreting turnover warnings
    action: Verify that the turnover threshold (PERF_ATTRIB_TURNOVER_THRESHOLD) is calibrated to the strategy type; do not
      accept default threshold for strategies with structurally high or low turnover without justification
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using miscalibrated turnover thresholds causes spurious attribution warnings that either suppress legitimate
      analysis or fail to flag noise-driven rebalancing, leading to incorrect investment skill assessment
    derived_from_bd_id: BD-092
  - id: finance-C-222
    when: When implementing position stacking for multi-account performance attribution
    action: Convert positions to percentages before stacking; maintain percentage normalization to enable meaningful cross-account
      aggregation regardless of capital base differences
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stacking absolute positions causes large accounts to dominate attribution results, masking the contribution
      of smaller accounts and producing misleading performance breakdowns
    derived_from_bd_id: BD-093
  - id: finance-C-223
    when: When implementing multivariate factor analysis or outlier detection
    action: Use Z-score standardization (remove mean, divide by standard deviation) for heterogeneous variables; do not use
      min-max scaling that loses standard deviation information unless bounded range is explicitly required
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using min-max scaling instead of Z-score standardization for multivariate analysis distorts factor combination
      weights and reduces outlier detection sensitivity, leading to incorrect factor attributions
    derived_from_bd_id: BD-094
  - id: finance-C-224
    when: When classifying trading strategies as intraday versus positional
    action: Use position-to-transaction ratio for intraday detection; do not rely on time-based detection that misses same-day
      round-trips without position change
    severity: high
    kind: domain_rule
    modality: must
    consequence: Time-based intraday detection misses strategies that accumulate and reduce positions within a day without
      net overnight exposure, misclassifying day-trading as positional and vice versa
    derived_from_bd_id: BD-095
  - id: finance-C-225
    when: When estimating intraday positions for margin calculation and risk management
    action: Use peak exposure identification for intraday position estimation; do not use end-of-day positions alone as they
      miss intraday leverage spikes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using end-of-day positions underestimates actual margin requirements during the day when peak exposure occurs,
      potentially causing margin calls and forced liquidations that would not occur with proper peak-based estimation
    derived_from_bd_id: BD-096
  - id: finance-C-227
    when: When implementing turnover calculations that involve capital flow events (LP drawdowns, margin calls, capital injections)
    action: Analyze the interaction between AGB denominator selection (BD-007), rolling AGB smoothing (BD-039), and first-day
      AGB halving (BD-040) — test turnover calculations across scenarios with capital flows occurring at different points
      relative to the rolling window
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: 'The cascade of three denominator decisions creates systematic turnover distortion during capital transitions:
      first-day injections show artificially high turnover (due to halved AGB), and mid-period flows are dampened by rolling
      average smoothing, making strategies with frequent capital flows appear to have inconsistent turnover profiles'
    derived_from_bd_id: BD-121
  - id: finance-C-228
    when: When comparing allocation reports to leverage metrics in pyfolio analysis
    action: Recognize that allocation percentages (BD-004) include cash as a position while gross leverage (BD-104) excludes
      cash — do not compare these metrics directly without accounting for the different cash treatment semantics
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: A portfolio with 30% cash will show 70/30 long/cash allocation but report 100% gross leverage, causing confusion
      when investors expect the leverage metric to reflect their cash buffer as a risk reducer
    derived_from_bd_id: BD-124
  - id: finance-C-229
    when: When calculating returns using round_trip_analysis functions
    action: Verify that return calculations use pnl/invested_capital as the denominator rather than pnl/portfolio_value; the
      formula divides profit by the capital committed to the trade, not the total portfolio value
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using the wrong denominator for return calculations produces misleading performance metrics; a $100 profit
      on a $1000 position shows 10% return vs potentially 50% of portfolio value, causing incorrect strategy evaluation and
      potentially deploying capital to underperforming strategies
    derived_from_bd_id: BD-013
  - id: finance-C-230
    when: When configuring market impact assumptions for capacity analysis
    action: Verify that max_bar_consumption=0.2 (20% of daily volume) matches the actual trading volume and liquidity profile
      of the target assets; adjust the threshold based on asset class and trading style
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default bar consumption of 20% of daily volume may underestimate market impact for large orders in less liquid
      securities, causing execution shortfalls in live trading that invalidate backtest results and reduce realized strategy
      returns
    derived_from_bd_id: BD-025
  - id: finance-C-231
    when: When calling turnover extraction and position stacking functions in sequence
    action: 'Extract turnover from dollar-denominated positions BEFORE converting to percentages; do not reverse this ordering
      or pass percentages to turnover or dollars to stacking functions — maintain the sequential contract: dollar positions
      → turnover extraction → percent conversion → stacking'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Passing percentages directly to turnover or dollars to stacking causes silent calculation failures or incorrect
      attribution results since the functions expect different unit types; errors accumulate without obvious failure signals
    derived_from_bd_id: BD-125
  - id: finance-C-232
    when: When processing data in data_preprocessing stage
    action: Assume the framework provides point-in-time (PIT) data availability — the framework does not implement PIT data
      handling, and data may contain lookahead bias if not properly validated before use
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time data handling, backtests may use information that was not available at the time of
      decision, introducing lookahead bias that causes live trading returns to fall far below backtested results
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-233
    when: When normalizing return series for cross-strategy or cross-period comparison
    action: Use first-value normalization (returns.iloc[0]) with starting_value=1 to create comparable series starting at
      1.0; verify the first non-null value is used as the normalization denominator
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different normalization methods produces incomparable return series; without consistent first-value
      normalization, cross-strategy and cross-period performance analysis produces misleading comparisons that may lead to
      incorrect strategy selection
    derived_from_bd_id: BD-068
  - id: finance-C-234
    when: When classifying a trading strategy as intraday in the backtesting framework
    action: Use position_count/transactions_per_day < 0.25 threshold for intraday detection — do not modify this threshold
      without re-validating against actual trading patterns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting threshold too high (>0.25) misclassifies intraday strategies as positional, causing intraday position
      adjustments to be ignored and producing inflated returns; setting too low (<0.25) over-corrects, distorting genuine
      positional strategies
    derived_from_bd_id: BD-048
  - id: finance-C-235
    when: When using the detect_intraday function with threshold parameter
    action: Verify the 0.25 threshold produces correct classifications by comparing against known intraday strategies — higher
      thresholds (0.5) classify more strategies as intraday; lower thresholds (0.1) require sustained same-day trading
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using an unvalidated threshold causes systematic misclassification of strategy types, leading to incorrect
      position estimation and unreliable performance attribution in backtest results
    derived_from_bd_id: BD-048
  - id: finance-C-236
    when: When generating sub-tear sheets after position extraction has already applied intraday correction
    action: Re-apply intraday estimation when estimate_intraday=True is set by default — positions have already been corrected
      upstream and re-estimation introduces redundant adjustments
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Re-applying intraday estimation to already-corrected positions double-adjusts positions, systematically distorting
      the equity curve and creating inconsistent results between main and sub-tear sheets
    derived_from_bd_id: BD-029
  - id: finance-C-237
    when: When processing positions through multiple pipeline stages
    action: Track whether intraday estimation has been applied upstream and set estimate_intraday=False to preserve original
      data integrity in subsequent stages
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without tracking estimation status, subsequent pipeline stages may inadvertently re-apply estimation, causing
      position drift and corrupted performance metrics that accumulate silently across report generations
    derived_from_bd_id: BD-029
  - id: finance-C-238
    when: When using estimate_intraday with the default EOD_hour=23 setting for A-share or extended-hours trading
    action: Verify EOD_hour=23 aligns with your market's after-hours trading session — this setting treats 23:00 as end-of-day
      snapshot but does NOT provide true intraday granularity; positions are attributed to the calendar day before market
      open
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using EOD_hour=23 for markets without after-hours trading attributes positions to the wrong calendar day,
      causing date misalignment in performance attribution and potentially misleading overnight position risk calculations
    derived_from_bd_id: BD-105
  - id: finance-C-239
    when: When initializing position data in the backtesting framework
    action: Set pos_in_dollars=True for dollar-based position values (market value tracking) or pos_in_dollars=False for share-quantity
      positions — do not mix formats without explicit conversion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing share quantities when pos_in_dollars=True causes exposure calculations to use raw share counts as
      dollar amounts, massively overstating position sizes and producing backtest returns that are completely inconsistent
      with actual capital requirements
    derived_from_bd_id: BD-108
  - id: finance-C-240
    when: When converting position data for analysis and visualization
    action: Verify pos_in_dollars flag matches the actual input data format — when True, framework expects dollar amounts;
      when False, expects share quantities requiring price multiplication for dollar-based exposure calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatch between pos_in_dollars flag and actual data format causes incorrect percentage weight calculations,
      producing misleading allocation visualizations and incorrect risk metrics that don't reflect true portfolio exposure
    derived_from_bd_id: BD-108
  - id: finance-C-241
    when: When implementing or refactoring backtesting validation logic
    action: Assume the framework provides backtest overfitting protection — no overfitting detection mechanism exists; strategies
      can be tuned to historical data without safeguards
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without overfitting protection, optimized strategies appear profitable in backtesting but fail in live trading;
      walk-forward analysis shows Sharpe ratios typically collapse by 60-80% when overfitted strategies are deployed
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-242
    when: When running backtest optimization for strategy parameter tuning
    action: Implement walk-forward analysis with out-of-sample testing, enforce minimum backtest-to-parameter ratio (at least
      10:1 observations per parameter), and require at least 2 out-of-sample periods for validation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without overfitting protection, optimized strategies appear profitable in backtesting but fail in live trading;
      walk-forward analysis shows Sharpe ratios typically collapse by 60-80% when overfitted strategies are deployed
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-243
    when: When implementing optimization routines for strategy parameter search
    action: Assume the framework enforces optimization constraint completeness — no built-in constraints exist for parameter
      bounds, optimization depth, or search space limits; unbounded optimization is permitted
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Unbounded optimization allows unlimited parameter search that systematically fits noise in historical data,
      creating strategies that appear optimal in backtests but have no predictive value in live trading
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-244
    when: When setting up optimization runs for strategy parameter tuning
    action: Define explicit parameter bounds (minimum 5 data points per parameter level), limit optimization iterations, require
      out-of-sample validation pass before accepting optimization results, and reject any parameter set that shows >30% performance
      degradation on holdout data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unbounded optimization allows unlimited parameter search that systematically fits noise in historical data,
      creating strategies that appear optimal in backtests but have no predictive value in live trading
    derived_from_bd_id: BD-GAP-010
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
