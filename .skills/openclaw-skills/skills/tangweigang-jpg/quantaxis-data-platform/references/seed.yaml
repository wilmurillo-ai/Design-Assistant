  required_objects:
    business_decisions_count: 124
    fatal_constraints_count: 35
    non_fatal_constraints_count: 163
    use_cases_count: 8
    semantic_locks_count: 12
    preconditions_count: 4
    evidence_quality_rules_count: 2
