      '
    good_example: '# GOOD: 简化幂律冲击成本模型

      # impact ≈ σ * sqrt(Q / ADV)，σ 为日波动率，Q 为订单规模，ADV 为日均成交量

      sigma = df[''daily_return''].std()

      adv = df[''volume''].rolling(20).mean() * df[''close''].rolling(20).mean()

