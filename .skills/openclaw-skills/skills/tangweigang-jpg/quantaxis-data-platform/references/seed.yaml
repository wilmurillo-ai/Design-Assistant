resources:
  packages:
  - name: pymongo
    version_pin: latest
  - name: motor
    version_pin: latest
  - name: clickhouse-driver
    version_pin: latest
  - name: redis
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: numpy
    version_pin: latest
  - name: pyarrow
    version_pin: latest
  - name: requests
    version_pin: latest
  - name: tornado
    version_pin: latest
  - name: pika
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install pymongo
    - python3 -m pip install motor
    - python3 -m pip install clickhouse-driver
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-002
    when: When storing timestamps in MongoDB stock_day/index_day collections
    action: create both date_stamp (float Unix timestamp) and time_stamp fields for temporal queries
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Temporal range queries fail or return incorrect results when date_stamp is missing, breaking data retrieval
      for trading strategies
    stage_ids:
    - data_collection
  - id: finance-C-013
    when: When QUANTAXIS fetches market data
    action: claim the data is real-time trading data from live exchange feeds
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: QUANTAXIS connects to TDX/Tushare which provide historical backfill data with delays, not live market feeds;
      presenting this as real-time violates regulatory disclosure requirements
    stage_ids:
    - data_collection
  - id: finance-C-014
    when: When storing simulated market data in MongoDB
    action: present stored backtest data as proof of live trading execution
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Data stored during backtesting represents simulated historical scenarios, not actual trade execution; presenting
      it as live results misleads stakeholders
    stage_ids:
    - data_collection
  - id: finance-C-016
    when: When initializing _quotation_base with DataFrame input
    action: normalize volume column name from vol or trade to volume before processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Resampling aggregation will fail because CONVERSION dict expects 'vol' or 'volume' column, causing KeyError
      during OHLCV aggregation
    stage_ids:
    - data_processing
  - id: finance-C-018
    when: When creating QA_DataStruct_Stock_block
    action: assert that DataFrame index is pd.MultiIndex type
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Block data queries by (datetime, code) tuple will fail at runtime with IndexError if index is not MultiIndex
    stage_ids:
    - data_processing
  - id: finance-C-019
    when: When performing minute-level resampling
    action: split data by Chinese market trading sessions (9:30-11:30 and 13:00-15:00) with separate offset parameters
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Aggregating across lunch break causes incorrect OHLCV values where afternoon bar includes lunch period prices
    stage_ids:
    - data_processing
  - id: finance-C-020
    when: When using adjustment factor (fq) calculation
    action: apply price adjustment to each price columns (open, high, low, close) using the adj factor
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Forward/backward adjustment inconsistency causes indicator calculations to produce incorrect values when
      some prices are adjusted and others are not
    stage_ids:
    - data_processing
  - id: finance-C-023
    when: When aggregating OHLCV data during resampling
    action: use 'first' for open, 'max' for high, 'min' for low, 'last' for close aggregation functions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect aggregation functions produce wrong price values, breaking technical indicators and strategy signals
    stage_ids:
    - data_processing
  - id: finance-C-025
    when: When creating new DataStruct instances from processed data
    action: preserve MultiIndex (datetime, code) structure in the returned DataFrame
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Loss of MultiIndex structure breaks cross-sectional queries by code or datetime, causing KeyError in downstream
      operations
    stage_ids:
    - data_processing
  - id: finance-C-035
    when: When implementing a custom factor class inheriting from QASingleFactor_DailyBase
    action: Return a DataFrame with exactly the columns ['date', 'code', 'factor'] from the calc() method
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Factor storage and IC/IR analysis will fail or produce incorrect results if the DataFrame schema does not
      match the expected columns, causing downstream analytics to break
    stage_ids:
    - factor_computation
  - id: finance-C-036
    when: When calculating forward returns for IC/IR analysis
    action: Use shift() operation to align returns with the correct time period, ensuring the factor on day T correlates with
      returns for day T+1 to T+N
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: IC/IR analysis will exhibit look-ahead bias, showing artificially inflated correlations that do not exist
      in live trading, leading to faulty factor selection
    stage_ids:
    - factor_computation
  - id: finance-C-055
    when: When executing sell orders for Chinese A-share stocks
    action: verify the sellable quantity against historical positions (volume_long_his) not today's newly bought positions
      (volume_long_today)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating T+1 trading restriction causes backtest results to be invalid; live trading would fail with 'SELLCLOSE
      今日仓位不足' rejection
    stage_ids:
    - strategy_execution
  - id: finance-C-056
    when: When initializing a CTA strategy base class
    action: auto-detect market type by checking whether the instrument code contains alphabetic characters
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect market type classification causes wrong position tracking logic (futures vs stock T+1 handling),
      leading to trading rule violations or incorrect PnL calculations
    stage_ids:
    - strategy_execution
  - id: finance-C-062
    when: When executing strategies
    action: separate strategy execution logic based on running_mode ('sim', 'backtest', or 'real') before applying market-specific
      order handling
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect running_mode handling causes simulated orders to be treated as live trades or vice versa, leading
      to data corruption or incorrect account updates
    stage_ids:
    - strategy_execution
  - id: finance-C-064
    when: When closing trading days in position tracking
    action: transfer today's positions (volume_long_today) to historical positions (volume_long_his) and reset today's tracking
      fields to zero
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without proper daily settlement, today's positions remain locked for selling beyond T+1, causing incorrect
      position state and failed sell orders on subsequent days
    stage_ids:
    - strategy_execution
  - id: finance-C-068
    when: When implementing order lifecycle state transitions
    action: 'Follow the defined order status machine: NEW(100)→QUEUED(300)→SUCCESS_ALL/SUCCESS_PART/CANCEL_ALL(200/203/400)→SETTLED(500)'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid state jumps cause order tracking corruption where orders appear in wrong states, leading to double-execution
      or lost trades in backtesting and live trading
    stage_ids:
    - order_management
  - id: finance-C-069
    when: When processing stock sell orders for Chinese markets
    action: Allow selling of stocks purchased on the same trading day
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Violates T+1 trading restriction mandated by Chinese stock market regulations; executing same-day sells causes
      non-compliant trades that would fail in actual markets
    stage_ids:
    - order_management
  - id: finance-C-072
    when: When determining order fill eligibility
    action: Call order_check before creating order objects to validate sufficient position/balance
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Orders created without validation allow over-trading beyond available positions, causing margin calls or
      rejected live trades with execution gaps
    stage_ids:
    - order_management
  - id: finance-C-075
    when: When trading futures contracts
    action: Use MARKET_PRESET commission coefficients instead of fixed stock rates
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Applying stock commission formula to futures causes severe miscalculation since futures use per-lot fees
      (e.g., 10 yuan/lot) versus percentage-based stock commissions
    stage_ids:
    - order_management
  - id: finance-C-084
    when: When computing float profit on price changes
    action: Calculate float_profit using last_price multiplied by unit_table for futures contracts
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Omitting unit_table in futures P&L calculation causes position profit to be off by factor of 10-1000x, making
      risk management decisions incorrect
    stage_ids:
    - order_management
  - id: finance-C-122
    when: When implementing trading strategies or accessing market data
    action: Use MultiIndex (datetime, code) as the primary key for each DataStruct objects
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Custom data access patterns will break when the DataStruct internal index structure changes, causing data
      misalignment and incorrect backtest results
  - id: finance-C-123
    when: When sending stock orders, the order direction MUST use BUY=1 or SELL=-1; for futures orders, MUST use BUY_OPEN=2,
      BUY_CLOSE=3, SELL_OPEN=-2, SELL_CLOSE=-3
    action: Apply the correct integer encoding for order direction based on asset type
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect position tracking and margin calculations occur when stock direction codes are confused with futures
      direction codes, causing wrong trade execution
  - id: finance-C-124
    when: When processing order settlements, SELL orders MUST be processed before BUY orders to preserve cash availability
    action: Process sell orders first, then buy orders in the settlement queue
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Buy orders may consume cash that should have been freed by sell orders first, causing insufficient funds
      errors and failed trades in live execution
  - id: finance-C-125
    when: When calculating position cost basis and profit, the FIFO (First In First Out) matching rule MUST be used
    action: Apply FIFO matching for each position calculations to verify consistent cost basis across the system
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Portfolio PnL calculations will be inconsistent with regulatory reporting if non-FIFO matching is used, causing
      compliance issues in live trading
  - id: finance-C-135
    when: When calculating price limits (high_limit/low_limit) in backtesting
    action: Use shift(1) to reference the previous day's close price for limit calculations, ensuring no look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using current bar's close price for limit calculations causes look-ahead bias, making backtest results unrealistically
      optimistic
  - id: finance-C-138
    when: When modeling market types for different asset classes
    action: 'Use the correct integer encoding: STOCK=0, FUTURE=2, CRYPTO=5 for market type classification'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Wrong market type encoding causes incorrect margin calculations and trading rules, leading to margin calls
      or failed trades
  - id: finance-C-154
    when: When processing small position reductions where proceeds fall below commission minimum floor
    action: Handle net negative proceeds by tracking gross lots matched via FIFO before settling net position changes — verify
      account view reflects correct position under-reduction rather than apparent over-reduction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: 'For small position reductions where proceeds are below commission minimum floor, FIFO matching combined
      with sell-first settlement causes position underestimation: account view shows excessive reduction while actual filled
      lots differ, leading to margin calculation errors and potential margin calls in live trading'
    derived_from_bd_id: BD-088
  - id: finance-C-156
    when: When implementing position management logic for Chinese stock market backtesting
    action: Track shares acquired today separately from existing holdings and prevent same-day selling via close_available
      attribute; enforce T+1 settlement by only allowing sale of shares acquired on previous trading days
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating T+1 settlement rule causes backtest to include same-day round-trip trades prohibited in Chinese
      A-share markets, resulting in backtest returns that cannot be reproduced in live trading and potential regulatory penalties
    derived_from_bd_id: BD-018
  - id: finance-C-160
    when: When routing orders for multi-market strategies
    action: Assume regex-based market type detection (BD-014) is reliable for each security code patterns; silent regex failures
      cause BD-069 to apply wrong SELL_CLOSE conversion rules, routing futures orders to stock markets or vice versa
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Regex detection failures cause SELL_CLOSE orders to be incorrectly converted, routing orders to wrong markets;
      futures orders sent to stock systems fail or execute incorrectly, causing position mismatches and potential margin violations
    derived_from_bd_id: BD-087
  - id: finance-C-161
    when: When implementing order routing for securities with non-standard code patterns
    action: Use explicit market_type parameter instead of relying solely on regex detection from security codes; validate
      market_type against known exchange listings (SSE/SZSE for stocks, SHFE/CZCE/DCE for futures); use regex detection only
      as secondary validation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Explicit market_type validation prevents order routing errors when security codes follow non-standard conventions
      or contain mixed alphanumeric patterns; this ensures correct SELL_CLOSE conversion and proper market routing
    derived_from_bd_id: BD-087
  - id: finance-C-170
    when: When implementing factor analysis with shift(-day-1) for forward returns
    action: Rely on Arrow IPC LRU cache for factor data persistence without explicit timestamp watermarks — the cache serves
      stale factor data across backtest iterations, causing look-ahead bias to compound
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Look-ahead bias compounds across backtest iterations because LRU cache serves stale factor data with incorrect
      temporal ordering, making backtest results systematically optimistic and non-reproducible
    derived_from_bd_id: BD-083
  - id: finance-C-174
    when: When implementing or refactoring position matching logic in backtesting
    action: Use FIFO (First-In-First-Out) matching for each position close operations — Chinese stock markets legally require
      FIFO for cost basis determination; LIFO and specific-lot matching are not compliant
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using non-FIFO matching (LIFO or specific-lot) causes incorrect cost basis calculation, leading to non-compliant
      P&L reporting and potential regulatory issues in live trading
    derived_from_bd_id: BD-070
  - id: finance-C-184
    when: When processing transaction data or converting external data formats
    action: 'Use the fixed buyorsell encoding: 0=buy, 1=sell, 2=none; when importing external data, convert string (''buy''/''sell'')
      or other encodings to this integer convention before any framework operations'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect buyorsell encoding causes wrong order directions to be submitted — selling when intended to buy
      or vice versa — resulting in unintended position exposure and potential significant losses
    derived_from_bd_id: BD-075
  - id: finance-C-213
    when: When computing forward returns for factor analysis
    action: Use shift(-day-1) for forward return calculation to align returns with signal date (day t return starts from t+1)
      — must align with factor computation date to avoid look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect shift alignment causes look-ahead bias in factor analysis, systematically overfitting strategies
      to historical data and causing live trading returns to fall far below backtested results
    derived_from_bd_id: BD-077
  - id: finance-C-216
    when: When implementing order lifecycle management logic in backtesting
    action: Implement exactly 9 order states (new/submitted/accepted/partially-filled/filled/canceled/rejected/pending-cancel/expired)
      with defined state machine transitions — invalid transitions must be rejected
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Simplifying to a 5-state model loses granular order tracking, causing partially-filled orders and pending-cancel
      states to be improperly handled; strategy execution history becomes incomplete and non-reproducible
    derived_from_bd_id: BD-072
  regular:
  - id: finance-C-001
    when: When writing market data to MongoDB collections
    action: convert DataFrame to JSON format using QA_util_to_json_from_pandas before insert_many
    severity: high
    kind: domain_rule
    modality: must
    consequence: MongoDB insert_many fails or data type mismatches occur, causing OHLCV data to be stored with incorrect schema
    stage_ids:
    - data_collection
  - id: finance-C-003
    when: When inserting data into ClickHouse factor tables
    action: 'provide DataFrame with required columns: date, code, factor (with factor as Float32)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Factor data insertion fails with column validation error, preventing factor storage and subsequent factor-based
      strategy execution
    stage_ids:
    - data_collection
  - id: finance-C-004
    when: When handling stock codes in data collection
    action: verify stock code is 6-character string (zero-padded if needed) for consistent MongoDB matching
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stock code mismatch causes duplicate data entries or missing data during queries, corrupting backtest results
    stage_ids:
    - data_collection
  - id: finance-C-005
    when: When connecting to TDX server for market data
    action: respect the 0.7 second connection timeout limit for each API call
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Connection timeout causes data fetch to fail silently, resulting in incomplete market data downloads
    stage_ids:
    - data_collection
  - id: finance-C-006
    when: When using ProcessPoolExecutor for parallel download
    action: limit worker processes to cpu_count() to avoid resource exhaustion on the host system
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Excessive parallel processes cause CPU contention and memory exhaustion, slowing down or crashing the download
      system
    stage_ids:
    - data_collection
  - id: finance-C-007
    when: When TDX primary engine fails to connect or returns no data
    action: fallback to secondary engine (Tushare or Baostock) to maintain data collection continuity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Primary engine failure without fallback leaves data collection incomplete, breaking downstream strategy execution
    stage_ids:
    - data_collection
  - id: finance-C-008
    when: When incrementing stock day data in MongoDB
    action: query the last stored date from database and only fetch data after that date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Re-downloading existing data causes duplicate entries and incorrect backtest results due to overlapping timestamps
    stage_ids:
    - data_collection
  - id: finance-C-009
    when: When TDX API call fails due to network or server issues
    action: retry up to 3 times with random delay between 50-100ms before failing
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Single failed API call without retry causes data gap, leading to incomplete historical data for backtesting
    stage_ids:
    - data_collection
  - id: finance-C-010
    when: When loading stock list before downloading market data
    action: populate MongoDB stock_list collection before running stock_day download tasks
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing stock_list causes download loop to have no codes to iterate, resulting in zero bars collected
    stage_ids:
    - data_collection
  - id: finance-C-017
    when: When initializing any DataStruct subclass
    action: apply drop_duplicates() to remove duplicate bars before sort_index()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate bars cause incorrect indicator calculations and lead to misaligned OHLCV aggregation in downstream
      analysis
    stage_ids:
    - data_processing
  - id: finance-C-021
    when: When using price adjustment calculation
    action: filter out non-trading days using if_trade flag and zero-price bars before returning adjusted data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Adjusted data includes suspended stocks with zero prices, causing division by zero and incorrect indicator
      values
    stage_ids:
    - data_processing
  - id: finance-C-022
    when: When performing price adjustment factor calculation
    action: calculate preclose using previous close price with dividend/split adjustments, not using raw close
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect preclose calculation leads to wrong adjustment factors, causing material price misrepresentation
      after splits or dividends
    stage_ids:
    - data_processing
  - id: finance-C-024
    when: When executing groupby operations on DataStruct
    action: normalize by parameter to None with level=1 for code-based grouping or level=0 for datetime-based grouping
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect groupby parameters cause RuntimeError or KeyError when grouping by datetime or code in MultiIndex
      DataFrame
    stage_ids:
    - data_processing
  - id: finance-C-026
    when: When calculating price limits (high_limit/low_limit)
    action: group by security code before applying shift(1) to get previous close
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using ungrouped shift causes price limit to be calculated across securities, producing incorrect limit prices
    stage_ids:
    - data_processing
  - id: finance-C-027
    when: When adding two DataStruct instances together
    action: assert both operands are instances of _quotation_base and have same type and if_fq settings
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Adding incompatible DataStruct types produces incorrect merged data or silent failures in indicator calculations
    stage_ids:
    - data_processing
  - id: finance-C-028
    when: When accessing get_bar method
    action: raise ValueError when bar is not found for given code and time tuple
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Silent failure returning None instead of raising error causes downstream KeyError when accessing bar properties
    stage_ids:
    - data_processing
  - id: finance-C-029
    when: When processing tick data to minute bars
    action: apply volume conversion factor (multiply by 100) to convert from lot to share
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Volume in lots instead of shares causes incorrect money flow calculations and portfolio sizing
    stage_ids:
    - data_processing
  - id: finance-C-030
    when: When resampling minute data
    action: drop NaN rows after aggregation to remove incomplete bars
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incomplete bars at market open/close contain partial OHLCV data, causing indicator calculation errors
    stage_ids:
    - data_processing
  - id: finance-C-031
    when: When setting index after resampling operations
    action: call remove_unused_levels() to compact the MultiIndex after data operations
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unused levels in MultiIndex cause memory bloat and slow groupby operations on large datasets
    stage_ids:
    - data_processing
  - id: finance-C-032
    when: When initializing QA_DataStruct_Stock_min
    action: select only required columns (open, high, low, close, volume/amount, type) before data assignment
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Extra columns cause unexpected behavior in aggregation functions and increase memory usage
    stage_ids:
    - data_processing
  - id: finance-C-033
    when: When accessing stock adjustment data from database
    action: drop duplicates by (date, code) keeping last entry to handle multiple adjustment records
    severity: high
    kind: domain_rule
    modality: must
    consequence: Multiple adjustment records for same date/code cause KeyError or incorrect price adjustment factors
    stage_ids:
    - data_processing
  - id: finance-C-034
    when: When converting adjustment data dates
    action: set utc=False to maintain naive datetime without timezone information
    severity: high
    kind: domain_rule
    modality: must
    consequence: Timezone-aware datetime causes misalignment between adjustment dates and market data timestamps during join
      operations
    stage_ids:
    - data_processing
  - id: finance-C-037
    when: When inserting factor data into ClickHouse
    action: Execute OPTIMIZE TABLE {tablename} FINAL after INSERT to trigger ReplacingMergeTree deduplication
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate factor values will accumulate in ClickHouse until OPTIMIZE runs, causing IC/IR analysis to use
      stale data and produce incorrect factor rankings
    stage_ids:
    - factor_computation
  - id: finance-C-038
    when: When storing factor values in ClickHouse
    action: Use Float32 data type for factor column to verify consistent precision and storage efficiency
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using Float64 may cause inconsistent precision across factor values; using lower precision may lose significant
      digits in high-magnitude factors
    stage_ids:
    - factor_computation
  - id: finance-C-039
    when: When running IC/IR analysis with QAFeatureAnalysis
    action: Verify factor and returns data are aligned by index before correlation calculation to prevent spurious IC values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misaligned data will produce NaN correlations or incorrect IC values, leading to incorrect factor ranking
      and suboptimal strategy selection
    stage_ids:
    - factor_computation
  - id: finance-C-041
    when: When processing factor data for large stock universes
    action: Complete factor computation for 3000+ securities within 60 seconds to meet performance requirements
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Slow factor computation delays strategy execution, causes stale factor values, and prevents real-time or
      near-real-time factor updates
    stage_ids:
    - factor_computation
  - id: finance-C-042
    when: When using alphalens get_clean_factor_and_forward_returns
    action: Pass max_loss parameter (default 0.15) to handle data alignment issues and filter extreme z-scores (filter_zscore=20)
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without max_loss protection, data alignment failures will raise exceptions; without z-score filtering, extreme
      factor values will distort IC calculations
    stage_ids:
    - factor_computation
  - id: finance-C-043
    when: When initializing QASingleFactor_DailyBase for a new factor
    action: Register the factor in factormetadata and call init_database to create the ClickHouse table before inserting data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Attempting to insert data into non-existent tables or unregistered factors will fail, causing factor computation
      pipeline to break
    stage_ids:
    - factor_computation
  - id: finance-C-044
    when: When implementing factor computation logic
    action: Implement the calc() method in subclasses (raise NotImplementedError in base class ensures this contract is enforced)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling calc() on base class without implementation will raise NotImplementedError, breaking the factor update
      pipeline
    stage_ids:
    - factor_computation
  - id: finance-C-045
    when: When retrieving factor values for analysis or backtesting
    action: Use QAFeatureView as the sole interface for factor retrieval to verify consistent data access patterns
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Direct ClickHouse queries bypass factor metadata tracking and may return outdated or incorrectly formatted
      data
    stage_ids:
    - factor_computation
  - id: finance-C-046
    when: When performing factor backtesting
    action: Drop duplicate (date, code) entries from factor data before entering the trading loop to prevent double-positioning
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate factor entries will cause the backtest to buy/sell the same security multiple times, inflating
      transaction costs and producing unrealistic PnL
    stage_ids:
    - factor_computation
  - id: finance-C-047
    when: When computing IC (Information Coefficient) values
    action: Use Spearman rank correlation (not Pearson) to measure monotonic relationship between factor and forward returns
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Pearson correlation assumes linear relationships and is sensitive to outliers; for factor analysis, Spearman
      better captures ranking-based predictive power
    stage_ids:
    - factor_computation
  - id: finance-C-048
    when: When calculating IR (Information Ratio) from IC series
    action: Use a rolling window (default 20 days) to compute IC mean divided by IC standard deviation for stability
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without rolling window smoothing, IR will be highly volatile and meaningless for factor evaluation; unstable
      IR leads to poor factor selection
    stage_ids:
    - factor_computation
  - id: finance-C-049
    when: When preparing factor data for alphalens analysis
    action: Localize timestamps to UTC before passing to get_clean_factor_and_forward_returns to verify consistent timezone
      handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Timezone mismatches between factor dates and price panel dates will cause alignment failures or silent data
      errors in IC calculation
    stage_ids:
    - factor_computation
  - id: finance-C-050
    when: When presenting IC/IR analysis results
    action: Claim that historical IC/IR values guarantee future factor performance or predict actual trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: IC/IR are backward-looking correlation metrics that do not account for transaction costs, slippage, market
      impact, or regime changes; presenting them as predictive guarantees violates financial modeling best practices
    stage_ids:
    - factor_computation
  - id: finance-C-051
    when: When presenting backtest results from QAFeatureBacktest
    action: Present backtest returns as expected live trading performance without noting simulation assumptions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results exclude real-world slippage, liquidity constraints, market impact, and psychological factors;
      presenting them as live results is misleading and could lead to significant financial losses
    stage_ids:
    - factor_computation
  - id: finance-C-052
    when: When inserting factor data into ClickHouse
    action: Validate that the DataFrame contains both 'date' and 'factor' columns before attempting insertion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing columns will cause ClickHouse insertion to fail or store malformed data, corrupting the factor database
    stage_ids:
    - factor_computation
  - id: finance-C-053
    when: When computing factor returns using next_open model
    action: Use shift(-day-1) to correctly calculate forward returns from the next trading day's open price, accounting for
      the gap between close and next open
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect shift offset will misalign factors with their corresponding forward returns, producing invalid
      IC/IR values that cannot be used for factor evaluation
    stage_ids:
    - factor_computation
  - id: finance-C-054
    when: When handling suspended/delisted securities in factor computation
    action: Use forward-fill (bfill) on price panel to handle suspended stocks, matching the behavior of real trading where
      suspended stocks cannot be sold until resumption
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without forward-fill, suspended stocks will have NaN prices causing division errors or incorrect PnL calculation
      in backtesting
    stage_ids:
    - factor_computation
  - id: finance-C-057
    when: When executing orders in backtest mode
    action: use distinct ORDER_DIRECTION values for stock trades (BUY=1, SELL=-1) versus futures trades (BUY_OPEN=2, SELL_OPEN=-2,
      etc.)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched order directions cause position tracking errors and incorrect margin calculations across market
      types
    stage_ids:
    - strategy_execution
  - id: finance-C-058
    when: When running backtests with the Rust QARS engine
    action: achieve 10-20x speedup compared to Python backtest execution time
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without Rust acceleration, backtesting large datasets (1+ year of daily data across 1000+ instruments) would
      take 30+ seconds instead of 3 seconds, degrading development iteration speed
    stage_ids:
    - strategy_execution
  - id: finance-C-059
    when: When initializing strategy accounts
    action: use init_cash=1000000 CNY as the default initial capital for retail-sized backtests
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Inconsistent initial capital settings across strategies cause difficulty comparing performance metrics and
      misaligned risk calculations
    stage_ids:
    - strategy_execution
  - id: finance-C-060
    when: When executing strategies across multiple bars
    action: track the bar_id when each BUY_OPEN/SELL_OPEN order is placed using bar_order dictionary
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing bar tracking causes BarsSinceEntryLong/Short functions to return incorrect values, leading to wrong
      exit timing decisions
    stage_ids:
    - strategy_execution
  - id: finance-C-061
    when: When validating order submissions
    action: check against last_order_towards to prevent duplicate same-direction same-offset orders in futures markets
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without duplicate order checking, the same position could be opened multiple times, causing margin overexposure
      and incorrect position sizing
    stage_ids:
    - strategy_execution
  - id: finance-C-063
    when: When processing stock sell orders
    action: convert SELL_CLOSE/SELL_CLOSETODAY directions to simple SELL direction for stock market handling
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect order direction causes position tracking to fail; stocks use BUY/SELL rather than BUY_OPEN/SELL_OPEN/BUY_CLOSE/SELL_CLOSE
      futures terminology
    stage_ids:
    - strategy_execution
  - id: finance-C-065
    when: When presenting backtest results to stakeholders
    action: claim that simulated backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results reflect idealized execution without slippage, latency, or market impact; presenting them
      as live trading expectations violates financial compliance standards
    stage_ids:
    - strategy_execution
  - id: finance-C-066
    when: When using the Rust QARS backtest engine
    action: claim real-time trading capability for the Rust engine
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: QARS is a backtest acceleration engine implemented in Rust; it does not support live trading or real-time
      order execution
    stage_ids:
    - strategy_execution
  - id: finance-C-067
    when: When backtesting stock strategies
    action: claim identical behavior between simulated mode ('sim') and backtest mode ('backtest')
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Simulated mode uses live data subscriptions and pub/sub messaging; backtest mode uses historical data replay
      with different order execution paths
    stage_ids:
    - strategy_execution
  - id: finance-C-070
    when: When calculating stock commission fees
    action: Apply minimum commission fee of 5 yuan using max(commission, 5)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Small trades with commission below 5 yuan incur disproportionate costs not reflected in backtest results,
      causing live trading returns to fall below expectations
    stage_ids:
    - order_management
  - id: finance-C-071
    when: When executing trade operations on orders
    action: Convert trade_amount to positive integer before processing; reject orders with trade_amount < 1
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fractional or zero trade amounts cause position miscalculations where holdings appear with partial shares,
      corrupting P&L calculations and risk assessments
    stage_ids:
    - order_management
  - id: finance-C-073
    when: When performing daily position settlement
    action: Move volume_long_today to volume_long_his and reset today's volumes to zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Settlement errors cause positions to show incorrect holding periods, allowing or blocking same-day sells
      in subsequent trading days incorrectly
    stage_ids:
    - order_management
  - id: finance-C-074
    when: When calculating commission for Chinese stock sells
    action: Apply stamp tax of 0.001 (0.1%) on sell transactions in addition to base commission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting stamp tax causes backtested returns to exceed realistic live trading results by 0.1% per sell cycle,
      masking true transaction costs
    stage_ids:
    - order_management
  - id: finance-C-076
    when: When backtesting order execution
    action: Claim backtest results reflect actual live trading performance with T+1 delays or slippage
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest executes orders immediately at current bar price without T+1 restrictions or slippage, producing
      unrealistic returns that won't match live trading
    stage_ids:
    - order_management
  - id: finance-C-077
    when: When executing market orders in backtest mode
    action: Expect market orders to reflect actual exchange fill prices including liquidity gaps
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Market orders use bar open/close prices without liquidity modeling; large orders face significant slippage
      in live markets not captured in backtests
    stage_ids:
    - order_management
  - id: finance-C-078
    when: When freezing position volumes for pending sell orders
    action: Update volume_long_frozen_today before checking close_available to enforce T+1 correctly
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent freeze state causes close_available to return wrong values, allowing or blocking same-day sells
      unpredictably across trading sessions
    stage_ids:
    - order_management
  - id: finance-C-079
    when: When handling order status transitions to final states
    action: Allow status changes from final states (SETTLED, CANCEL_ALL, CANCEL_PART, FAILED) to intermediate states
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Orders reaching final states then changing back to queued/active states cause duplicate fills or impossible
      trading scenarios in position tracking
    stage_ids:
    - order_management
  - id: finance-C-080
    when: When setting default commission rates
    action: Use commission_coeff=0.00025 for stocks (0.025% excluding stamp tax) as default in QA_Order
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Incorrect default commission rates cause backtest P&L to diverge from actual trading costs, with small accounts
      particularly affected by rate discrepancies
    stage_ids:
    - order_management
  - id: finance-C-081
    when: When implementing market type detection for commission calculation
    action: 'Detect market type from code format: alphanumeric codes are futures, numeric codes are stocks'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Wrong market type detection causes commission to be calculated with incorrect formula, leading to significant
      cost miscalculation especially for futures
    stage_ids:
    - order_management
  - id: finance-C-082
    when: When adding order IDs to trade records
    action: Append duplicate trade_id entries for the same order execution
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Duplicate trade_id entries cause commission to be calculated multiple times on the same execution, inflating
      transaction costs in backtests
    stage_ids:
    - order_management
  - id: finance-C-083
    when: When handling SELL orders before BUY settlement in cash management
    action: Preserve cash availability by not releasing frozen funds until BUY orders are fully settled
    severity: high
    kind: domain_rule
    modality: must
    consequence: Releasing cash prematurely from unsettled BUY orders causes margin calls when sells execute before buys settle,
      forcing unnecessary liquidations
    stage_ids:
    - order_management
  - id: finance-C-099
    when: When implementing Pandas to Polars conversion
    action: set preserve_index=False by default because Polars DataFrames do not support index semantics
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pandas index data will be silently dropped during conversion, causing data loss if preserve_index=True is
      used without understanding Polars limitations
    stage_ids:
    - data_bridging
  - id: finance-C-100
    when: When importing or using Arrow conversion functions
    action: check HAS_ARROW flag and raise ImportError with installation instructions if pyarrow is unavailable
    severity: high
    kind: domain_rule
    modality: must
    consequence: Code will fail with cryptic error message instead of clear guidance, requiring users to debug missing dependency
    stage_ids:
    - data_bridging
  - id: finance-C-101
    when: When using Arrow to Pandas conversion with zero_copy_only=True
    action: guarantee zero-copy conversion will always succeed because Arrow memory layout requirements may not be met
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Conversion will fail at runtime when zero_copy_only=True and Arrow cannot share memory, breaking data pipeline
      without fallback
    stage_ids:
    - data_bridging
  - id: finance-C-102
    when: When initializing SharedMemoryWriter without QADataSwap
    action: raise RuntimeError with clear installation instructions instead of silently creating a non-functional object
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silent failure will cause data write operations to fail later with confusing error messages, masking the
      root cause
    stage_ids:
    - data_bridging
  - id: finance-C-103
    when: When requiring Arrow-based zero-copy conversion
    action: use pyarrow>=15.0.0 as the minimum version requirement because earlier versions lack critical zero-copy features
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Zero-copy conversion will fall back to slower copy-based methods, causing 2-5x performance degradation for
      large DataFrames
    stage_ids:
    - data_bridging
  - id: finance-C-104
    when: When requiring Polars-based conversion
    action: use polars>=0.20.0 as the minimum version requirement because earlier versions have incomplete Arrow interop
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Conversion will use fallback methods that may not preserve data types correctly, causing silent data corruption
    stage_ids:
    - data_bridging
  - id: finance-C-105
    when: When using SharedMemoryWriter
    action: set default size_mb=100 and buffer_count=3 to balance memory usage and throughput
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Insufficient shared memory size will cause write failures; too many buffers wastes memory without proportional
      performance gain
    stage_ids:
    - data_bridging
  - id: finance-C-106
    when: When reading from SharedMemory
    action: set default timeout_ms=5000ms to prevent indefinite blocking while allowing slow consumers to keep up
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing timeout will cause the reader to hang indefinitely if the writer fails or network latency occurs
    stage_ids:
    - data_bridging
  - id: finance-C-107
    when: When QADataSwap is unavailable
    action: fallback to Python implementation that uses pl.from_pandas and df.to_pandas for compatibility
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without fallback, critical data pipeline operations will crash instead of degrading gracefully to slower
      copy-based conversion
    stage_ids:
    - data_bridging
  - id: finance-C-108
    when: When calling auto_convert with invalid target_format
    action: raise ValueError with message specifying allowed values 'pandas' or 'polars'
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Invalid format parameter will cause silent type mismatches or cryptic errors downstream in the data pipeline
    stage_ids:
    - data_bridging
  - id: finance-C-109
    when: When converting unsupported DataFrame types via auto_convert
    action: raise TypeError indicating the unsupported type for debugging
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Silent type rejection will cause downstream processing to fail with confusing errors that don't indicate
      the root cause
    stage_ids:
    - data_bridging
  - id: finance-C-110
    when: When pyarrow is unavailable during Pandas to Polars conversion
    action: fallback to pl.from_pandas with a UserWarning rather than crashing
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without warning, users will unknowingly use slower copy-based conversion instead of zero-copy Arrow path
    stage_ids:
    - data_bridging
  - id: finance-C-111
    when: When importing QADataBridge module
    action: emit ImportWarning (not silent) when QADataSwap is unavailable to inform users of missing functionality
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Silent failure means users will unknowingly use slow Python fallback instead of fast Rust-based zero-copy
      transfer
    stage_ids:
    - data_bridging
  - id: finance-C-112
    when: When writing DataFrames to SharedMemory
    action: auto-convert Pandas DataFrames to Polars format before writing to verify consistent memory layout
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Writing Pandas directly to shared memory may cause memory alignment issues leading to corrupted data reads
      by other processes
    stage_ids:
    - data_bridging
  - id: finance-C-113
    when: When reading from SharedMemory with to_pandas=True
    action: auto-convert Polars result to Pandas after reading to maintain API consistency
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Returning Polars when Pandas is expected will cause type errors in calling code that expects Pandas DataFrame
    stage_ids:
    - data_bridging
  - id: finance-C-114
    when: When claiming 5-10x performance improvement
    action: claim this speedup applies to each conversions because Python fallback provides only marginal improvement
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Marketing performance claims will mislead users who experience slow Python fallback without QADataSwap installed
    stage_ids:
    - data_bridging
  - id: finance-C-115
    when: When claiming zero-copy conversion capability
    action: claim zero-copy works unconditionally because zero_copy_only=False defaults to copy-based fallback
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting guaranteed zero-copy will experience memory copies when zero_copy_only=True fails, violating
      their expectations
    stage_ids:
    - data_bridging
  - id: finance-C-116
    when: When claiming shared memory support
    action: claim shared memory works without QADataSwap because SharedMemoryWriter/Reader raise RuntimeError in fallback
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: API documentation claims shared memory support but actual functionality requires Rust library installation
    stage_ids:
    - data_bridging
  - id: finance-C-117
    when: When documenting cross-language communication capability
    action: clarify that Python/Rust/C++ interop requires QADataSwap installation as documented prerequisite
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Without clear prerequisites, users will attempt cross-language communication that fails at runtime with confusing
      errors
    stage_ids:
    - data_bridging
  - id: finance-C-118
    when: When measuring conversion performance for acceptance testing
    action: use the benchmark_conversion function with proper DataFrame size (1000x1000) to validate 500ms threshold
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without proper benchmarking, teams will incorrectly pass or fail conversion performance requirements, either
      accepting slow code or rejecting fast implementations
    stage_ids:
    - data_bridging
  - id: finance-C-119
    when: When writing unit tests for data bridging
    action: assume conversions preserve each DataFrame metadata because Arrow conversion only handles data values
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Test assertions on metadata (dtypes, column order, index) will fail unexpectedly due to Arrow schema differences
    stage_ids:
    - data_bridging
  - id: finance-C-120
    when: When verifying data integrity after conversion
    action: compare computed values using pandas.testing.assert_frame_equal with check_dtype=False since Arrow may use different
      integer widths
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Strict dtype checking will cause false failures for valid conversions where Arrow uses int32 vs Pandas int64
    stage_ids:
    - data_bridging
  - id: finance-C-126
    when: When initializing a strategy for backtesting, the init_cash default is 1000000 (1M CNY) for retail-sized simulations
    action: Set init_cash parameter explicitly when testing with different capital amounts
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Backtest results scaled with unrealistic capital may not reflect actual trading performance, leading to poor
      capital allocation decisions
  - id: finance-C-127
    when: When using the default forward adjustment method, 'bfq' (不复权/no adjustment) is applied system-wide affecting each
      price calculations
    action: Explicitly specify fq='hfq' or fq='qfq' when forward-adjusted prices are required for historical comparison
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Historical price comparisons will be incorrect when using unadjusted prices across different dividend periods,
      distorting strategy performance metrics
  - id: finance-C-128
    when: When using PubSub connections with RabbitMQ, the context manager protocol MUST ensure channel is closed before connection
    action: Use with statement or explicitly call close() to guarantee channel→connection close order
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Improper connection closure may leave RabbitMQ resources in inconsistent state, causing subsequent connection
      failures and message loss
  - id: finance-C-129
    when: When storing factor data in ClickHouse, the schema MUST use date, code, factor Float32 with ReplacingMergeTree engine
      and deduplication on merge
    action: Create factor tables with the specified schema to verify proper deduplication during merges
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Factor duplicates will accumulate over time without proper ReplacingMergeTree deduplication, causing incorrect
      factor research results
  - id: finance-C-130
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live returns — backtesting ignores market impact, financing costs,
      and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-131
    when: When presenting paper trading or dry-run results
    action: Present simulated wallet results as proof of live execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Paper trading lacks real market impact, slippage, and execution constraints, giving false confidence in strategy
      viability for live trading
  - id: finance-C-132
    when: When users claim this system supports sub-second latency trading
    action: Claim real-time trading support based on polling-based data retrieval mechanisms
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Polling mechanisms inherently have delays; strategies requiring sub-second execution will experience missed
      fills and stale price execution
  - id: finance-C-133
    when: When implementing or evaluating trading strategies
    action: Claim this system is suitable for high-frequency trading (HFT) or sub-millisecond latency requirements
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: QUANTAXIS is designed for event-driven backtesting and simulation, not HFT; Python's GIL and RabbitMQ polling
      mechanisms preclude true low-latency execution
  - id: finance-C-134
    when: When users without programming experience attempt to use pre-built trading signals
    action: Claim this system provides production-ready trading signals without quantitative expertise
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will execute strategies without understanding risk parameters, position sizing, or market regime sensitivity,
      leading to significant losses
  - id: finance-C-136
    when: When working with market data across different timezones
    action: Use local timezone (Asia/Shanghai for CN markets) consistently — each data uses utc=False
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixing UTC and local timestamps causes date boundary misalignment, especially for intraday strategies trading
      around market open/close
  - id: finance-C-137
    when: When defining supported frequency strings for bar aggregation
    action: 'Use standard frequency strings: ''1min'', ''5min'', ''15min'', ''30min'', ''60min'', ''day'', ''week'', ''month'',
      ''year'''
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-standard frequency strings will cause data retrieval failures and incompatible bar aggregation across
      the system
  - id: finance-C-139
    when: When using backtest results to estimate live trading costs
    action: Claim that backtest slippage models accurately represent real execution slippage
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtest slippage is a simplified model; real market slippage varies with liquidity, order size, and market
      conditions, often significantly worse than modeled
  - id: finance-C-140
    when: When integrating with external systems via QIFI protocol
    action: 'Follow the QIFI state machine for account lifecycle: NEW→QUEUED→SUCCESS_ALL/SUCCESS_PART/CANCEL_ALL→SETTLED'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect state transitions will cause account sync failures with external systems and potential fund discrepancies
  - id: finance-C-141
    when: When users without programming experience try to use multi-market workflows
    action: Claim this system is suitable for single-asset-only workflows without multi-market support needs
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting single-asset simplicity will be overwhelmed by the complexity of multi-market position management
      and margin calculations
  - id: finance-C-142
    when: When modeling financial calculations involving monetary values
    action: Use specified precision for monetary calculations — avoid pure float for high-precision financial operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Float precision errors accumulate over many trades, causing tiny but compounding discrepancies in account
      balances and PnL calculations
  - id: finance-C-143
    when: When performing backtesting with price-impact-sensitive strategies
    action: Claim that backtest fills reflect real market impact and liquidity constraints
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest execution assumes full fill at requested price; large orders in live trading will move markets significantly,
      causing fill shortfalls
  - id: finance-C-144
    when: When implementing order lifecycle management and state transitions in backtesting
    action: 'Enforce explicit order status state machine transitions: 100(queued)→300(submitted)→200(filled)/400(partially-filled)→500(rejected/cancelled);
      reject any transition not conforming to this sequence'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid state transitions like cancelling before queuing or filling an already-cancelled order corrupt order
      state; downstream position calculations will produce incorrect results, causing systematic P&L errors in backtesting
    derived_from_bd_id: BD-016
  - id: finance-C-145
    when: When using the framework's default init_cash parameter for backtesting
    action: Verify that init_cash=1000000 CNY matches your actual trading capital; adjust to actual value if testing with
      different capital sizes as slippage and commission estimates scale with position sizes
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default capital of 1M CNY may significantly overstate or understate real-world slippage for different account
      sizes; strategies optimized under wrong capital assumptions produce unrealistic backtest results when deployed with
      actual trading capital
    derived_from_bd_id: BD-013
  - id: finance-C-146
    when: When configuring KDJ indicator parameters in quantitative trading strategies
    action: Use standard KDJ parameters (n=9, m1=3, m2=3) for default behavior; if modifying parameters, validate that non-standard
      values (e.g., 14,3,3 or 5,2,2) are intentional as they significantly alter signal sensitivity and crossover frequency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-standard KDJ parameters change indicator responsiveness and signal timing; strategies tuned with one
      parameter set may generate false signals or miss signals when parameters are inadvertently changed, causing significant
      performance deviation
    derived_from_bd_id: BD-031
  - id: finance-C-147
    when: When implementing factor-based strategies using the factor base class
    action: Always use the register method when creating new factors and follow the insert lifecycle for persistence; verify
      factors are properly registered to maintain registry integrity for lazy loading and factor lineage tracking
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Unregistered factors break lazy loading functionality and lose factor lineage tracking; backtests become
      non-reproducible without proper factor registry, and compliance audit trails will have gaps making strategy validation
      impossible
    derived_from_bd_id: BD-010
  - id: finance-C-148
    when: When computing high/low limit prices in price limit calculations
    action: Include the 0.0002 magic number offset in limit price calculations to handle floating-point precision boundaries;
      do not remove this offset or replace with pure rounding as it preserves edge case handling in limit price computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing the 0.0002 magic number changes limit price computation results at boundary values, potentially
      causing orders to be rejected or incorrectly accepted at exchange price limits; backtest execution differs from live
      trading
    derived_from_bd_id: BD-076
  - id: finance-C-149
    when: When implementing position tracking with mark-to-market valuation using on_price_change callback
    action: Compute float profit (unrealized P&L) on every price tick update to maintain accurate real-time position tracking;
      verify on_price_change callback is triggered for each price updates to support live dashboard displays and risk monitoring
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping float profit computation on price ticks causes stale P&L values in risk monitoring dashboards; strategies
      making decisions based on outdated unrealized gains may execute inappropriate trades or fail to cut losses in time
    derived_from_bd_id: BD-019
  - id: finance-C-150
    when: When implementing or refactoring signal processing in data_processing stage
    action: Use Butterworth filter with order=3 and cutoff=0.05 (5% of Nyquist frequency) for signal denoising — do not adjust
      parameters without re-evaluating signal-to-noise ratio
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Changing Butterworth filter order or cutoff without re-validation causes signal quality degradation: higher
      orders introduce oscillation artifacts while lower orders reduce noise suppression effectiveness, leading to false trend
      signals in the backtest'
    derived_from_bd_id: BD-025
  - id: finance-C-151
    when: When implementing Bollinger Bands volatility-adjusted support/resistance boundaries
    action: 'Use standard Bollinger Bands parameters: period=20 and standard_deviations=2 for 95% statistical coverage — do
      not change multipliers without adjusting mean-reversion entry thresholds accordingly'
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Using non-standard Bollinger Bands parameters changes channel width: tighter bands (1.5σ) generate excessive
      false breakout signals while wider bands (3σ) miss valid mean-reversion opportunities, causing systematic backtest-live
      inconsistency in momentum strategies'
    derived_from_bd_id: BD-029
  - id: finance-C-152
    when: When calculating Simple Moving Average for trend baseline over extended periods
    action: Verify iterative SMA implementation for cumulative floating-point error accumulation; for backtests exceeding
      500 trading days, compare against cumulative sum method to validate precision
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Iterative SMA formulas accumulate floating-point rounding errors over extended periods, causing trend direction
      misclassification by 1-3% drift; in long-horizon backtests, this creates systematic bias in trend-following entry timing
    derived_from_bd_id: BD-028
  - id: finance-C-153
    when: When implementing RSI-based mean-reversion signal generation
    action: 'Use standard RSI thresholds: overbought=70 and oversold=30 for symmetric momentum boundary detection — do not
      change thresholds without explicitly documenting the signal frequency adjustment rationale'
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Non-standard RSI thresholds change reversal signal frequency: aggressive thresholds (80/20) miss valid reversal
      opportunities while conservative thresholds (60/40) generate excessive false signals, causing backtest strategies to
      produce unrealistically high or low returns'
    derived_from_bd_id: BD-030
  - id: finance-C-155
    when: When deploying QARS Rust backend for performance-critical calculations
    action: Implement explicit fallback detection to Python implementation when Rust binary is unavailable — verify calculation
      parity after fallback activation before continuing live operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without explicit Rust fallback detection, performance-critical calculations silently use Python fallback
      causing 100x slower execution; in high-frequency scenarios, this creates order submission delays, missed execution windows,
      and potential position exposure
    derived_from_bd_id: BD-079
  - id: finance-C-157
    when: When implementing commission fee calculations for multi-strategy accounts
    action: Apply consistent commission rates across each orders within each account; verify the account-level calculation
      accounts for varying fee structures per market segment (stocks vs futures vs options)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Account-level commission aggregation assumes uniform fee application; if strategies use different market
      instruments with different commission rates, incorrectly aggregated fees cause P&L discrepancies that accumulate silently
      over time
    derived_from_bd_id: BD-066
  - id: finance-C-158
    when: When processing order liquidation for portfolios holding both Chinese stocks and futures
    action: Assume SELL-first liquidation order (BD-061) is universally safe across each position types; the interaction of
      T+1 settlement on stocks with SELL-before-BUY execution can trigger regulatory violations when recently acquired stock
      positions cannot be sold
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: When selling stocks acquired same day due to SELL-first ordering combined with T+1 restrictions, orders fail
      silently or positions are retained beyond intended liquidation horizon; in cross-margined accounts, this creates margin
      shortfalls and potential forced liquidation
    derived_from_bd_id: BD-084
  - id: finance-C-159
    when: When routing liquidation orders for portfolios with mixed stock and futures positions
    action: Check market_type for each position before applying liquidation order; for stocks, verify T+1 eligibility via
      close_available; for futures, apply standard liquidation ordering; when cross-margining exists, liquidate futures positions
      first to avoid T+1 stock sell failures
    severity: high
    kind: domain_rule
    modality: must
    consequence: Market-aware liquidation ordering prevents T+1 violations while maintaining intended portfolio reduction
      targets; ignoring market type causes stock sells to fail and disrupts overall position management
    derived_from_bd_id: BD-084
  - id: finance-C-162
    when: When implementing factor IC correlation calculation in QAFeatureAnalysis
    action: Use a consistent IC calculation method (Pearson for linear relationships or Spearman for monotonic/rank-based
      relationships) and document the choice — do not mix methods without clear justification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixing Pearson and Spearman IC methods across factor evaluations produces inconsistent factor quality rankings,
      causing wrong factor selection decisions and degraded portfolio performance
    derived_from_bd_id: BD-039
  - id: finance-C-163
    when: When implementing factor retention decisions based on IC stability metrics
    action: Apply IR ratio (mean IC / IC_std) as the factor stability criterion — factors with IR<0.5 should be flagged as
      unreliable and subject to replacement review
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without IR-based filtering, unreliable factors with inconsistent predictive power are retained, causing portfolio
      returns to diverge from backtested expectations as factor quality degrades over time
    derived_from_bd_id: BD-040
  - id: finance-C-164
    when: When implementing factor quantile binning for long-short portfolio construction
    action: Use a consistent bin count across each factor evaluations and document the choice (e.g., 5 quintiles or 10 deciles)
      — bin count affects statistical power per bin and return distribution granularity
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Inconsistent quantile binning across factors causes unequal comparison of return spreads, leading to suboptimal
      long-short portfolio construction with reduced spread capture
    derived_from_bd_id: BD-041
  - id: finance-C-165
    when: When implementing trend vs range market regime detection using ADX indicator
    action: Use ADX threshold of 25 to classify market regimes — ADX>=25 indicates trending market favoring trend-following
      strategies, ADX<25 indicates ranging market favoring mean-reversion strategies
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Using incorrect ADX threshold causes wrong strategy selection: mean-reversion strategies deployed in trending
      markets and trend-following strategies deployed in ranging markets both generate significant losses'
    derived_from_bd_id: BD-037
  - id: finance-C-166
    when: When extending the web server to handle new domain object types in JSON responses
    action: Extend CJsonEncoder class to support any new non-serializable object types added to the codebase — do not assume
      standard json.JSONEncoder handles each domain objects
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unhandled non-serializable objects cause web API endpoints to crash with TypeError, breaking all frontend
      integrations that depend on those endpoints
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-167
    when: When implementing custom QA_Worker subclasses for extensible event handlers
    action: Verify each QA_Worker subclasses (QA_Broker, QA_Account, QA_OrderHandler) properly implement the run(event) method
      — missing or incorrect implementation causes silent failures where events are not processed
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Silent event processing failures cause orders to not be placed, accounts to not update balances, and events
      to be dropped without any error indication, leading to catastrophic trading losses
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-171
    when: When using the framework's default commission_coeff=0.00025 (万2.5) for backtesting
    action: Verify that commission_coeff=0.00025 matches the actual broker commission structure — rates vary significantly
      (万1 to万3) and must be overridden in production; adjust if actual rate differs
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default commission rate of 万2.5 may differ from actual broker rate by up to 3x; in high-frequency strategies,
      this accumulates to significant P&L distortion between backtest and live trading
    derived_from_bd_id: BD-063
  - id: finance-C-172
    when: When using the framework's default tax_coeff=0.001 (千1) for sell transactions
    action: Verify that tax_coeff=0.001 (千1 stamp duty) matches Chinese regulatory requirements — stamp duty is legally mandated
      and only applies to sell orders, not buy orders
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using incorrect stamp duty rate causes compliance violations in production; overestimating benefits live
      trading execution, underestimating inflates backtest returns by 0.1% per round-trip
    derived_from_bd_id: BD-064
  - id: finance-C-175
    when: When implementing trading strategy backtesting logic
    action: Assume the framework provides backtest overfitting protection mechanisms — the framework does not implement walk-forward
      analysis, cross-validation, or regularization safeguards
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Strategies that pass naive backtests due to overfitting will appear profitable but fail in live trading,
      wasting capital and resources on non-viable approaches
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-176
    when: When developing rebalancing logic in portfolio management strategies
    action: 'Implement explicit rebalancing triggers: either deviation-based (threshold monitoring against target weights,
      e.g., 5% drift) or time-based (scheduled intervals), and document trigger conditions in strategy configuration'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit rebalancing triggers, portfolio drift accumulates unchecked, causing actual allocation to
      diverge from target allocation and increasing systematic risk beyond intended bounds
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-177
    when: When implementing portfolio rebalancing logic
    action: Assume the framework provides rebalancing trigger mechanisms — the framework does not implement drift detection
      or scheduled rebalancing; each rebalancing decisions must be handled by the strategy
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Strategies relying on implicit rebalancing will see portfolio weights drift over time, causing actual risk
      exposure to diverge from intended risk profile and backtest assumptions
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-178
    when: When implementing portfolio rebalancing in strategy code
    action: 'Implement explicit rebalancing trigger conditions: deviation-based triggers (e.g., check if abs(current_weight
      - target_weight) > threshold, commonly 5%) or time-based triggers (e.g., daily/weekly/monthly intervals), and document
      the chosen mechanism'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit rebalancing triggers, portfolio drift accumulates until allocations diverge significantly
      from targets, causing backtest-live inconsistency and unexpected risk exposure
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-179
    when: When implementing volatility modeling or risk calculation
    action: Assume the framework provides volatility model family selection or distribution assumptions — the framework does
      not implement volatility models (GARCH, EWMA, stochastic volatility) or return distribution choices
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Strategies relying on default volatility assumptions may underestimate tail risk in live trading, leading
      to larger drawdowns than backtested results suggest
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-180
    when: When implementing volatility-sensitive strategy components (options pricing, VaR, risk parity)
    action: Explicitly select and configure volatility model (e.g., GARCH(1,1), EWMA with lambda=0.94, or stochastic volatility)
      and return distribution (normal, t-distribution, or Cornish-Fisher expansion), matching the model's assumptions to the
      asset class being modeled
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit volatility model selection, strategies may use inappropriate assumptions (e.g., normal distribution
      for fat-tailed returns), causing systematic underestimation of risk and incorrect position sizing
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-181
    when: When implementing ESG reporting or carbon footprint tracking
    action: Assume the framework provides GHG emission accounting — the framework does not implement GHG scope classification
      or emission calculation; Scope 1/2/3 boundaries must be handled externally
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Strategies claiming ESG compliance without proper GHG scope tracking may face regulatory penalties or greenwashing
      accusations when actual emissions differ from reported values
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-182
    when: When implementing ESG reporting or sustainability metrics in strategy
    action: 'Define GHG scope boundaries explicitly: Scope 1 (direct emissions), Scope 2 (purchased energy), Scope 3 (supply
      chain, value chain) with specific data sources, emission factors, and calculation methodologies documented for each
      scope'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit GHG scope boundaries, Scope 3 emissions are systematically omitted from reporting, causing
      incomplete carbon accounting that violates ESG disclosure standards and stakeholder expectations
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-183
    when: When configuring QIFI account for futures backtesting
    action: Verify that QIFI account-level commission_rate=0.0015 matches actual institutional fee structure (万15 rate); adjust
      to actual broker rate if account has different tier or negotiate better rates for high-volume trading
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 0.0015 rate overestimates costs for institutional accounts with negotiated rates or underestimates
      for retail accounts; commission errors accumulate significantly in high-frequency futures strategies, distorting backtest
      profitability
    derived_from_bd_id: BD-065
  - id: finance-C-185
    when: When initializing strategy with default capital or preparing for live trading deployment
    action: Verify that init_cash=1000000 matches the actual live account balance; strategies deployed with mismatched capital
      will produce incorrect position sizing and margin calculations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 1,000,000 CNY capital may not match actual account balance, causing position sizes to be calculated
      incorrectly (over or under-sized); in margin trading, this can trigger forced liquidation or missed opportunities
    derived_from_bd_id: BD-080
  - id: finance-C-186
    when: When configuring the job scheduler for high-volume backtesting or live trading operations
    action: Submit more than 100 concurrent jobs or 10000 pending jobs to the async scheduler — the framework enforces hard
      limits at these thresholds and will reject or fail excess jobs
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Exceeding scheduler limits causes jobs to be rejected or queued indefinitely, resulting in missed trade executions
      or incomplete backtests that silently drop tasks without warning
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-187
    when: When integrating market data for asset classes other than stock/future/index
    action: Assume the framework supports options, bonds, crypto, or other non-listed asset classes — the market data model
      only supports stock/future/index with 1min/1day frequencies; unsupported assets require external data pipelines
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Attempting to use options, bonds, or crypto data with the framework's market data model causes parsing errors
      or silent data corruption due to mismatched schemas
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-188
    when: When implementing data quality assessment in the framework
    action: Assume the framework implements PCAF data quality scoring — the framework does not have a PCAF data quality scoring
      module; CMP coverage shows 0/6 pass, 1/6 partial, 5/6 fail
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without PCAF data quality scoring, strategies may use low-quality data inputs that violate regulatory reporting
      requirements, leading to non-compliant audit findings and potential regulatory penalties
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-189
    when: When implementing data quality assessment in the framework
    action: Implement PCAF data quality scoring covering completeness, accuracy, timeliness, consistency, validity, and availability
      dimensions — verify at least 4/6 dimensions achieve pass criteria
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing PCAF data quality scoring causes audit failures (5/6 fail, 1/6 partial) and prevents production deployment
      due to insufficient data governance controls
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-190
    when: When implementing RL-based trading strategies with reward functions
    action: Assume the RL reward function accounts for trading costs automatically — the framework RL reward function does
      not model transaction costs, slippage, or market impact
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit trading cost modeling in the RL reward function, the agent learns to trade at frequencies
      that are profitable in backtesting but unprofitable in live trading after costs, leading to significant real-world losses
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-191
    when: When implementing RL-based trading strategies with reward functions
    action: 'Add explicit trading cost modeling to RL reward functions: include commission (fixed per trade), slippage (percentage
      or bps), and market impact (volume-based); subtract total costs from reward signal at each step'
    severity: high
    kind: domain_rule
    modality: must
    consequence: RL agent without trading cost modeling optimizes for high-frequency patterns invisible after costs, resulting
      in backtest profits that evaporate in live trading
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-192
    when: When implementing data preprocessing pipelines with fit/transform operations
    action: Assume the pipeline properly isolates fit operations from transform operations — the framework does not implement
      fit/transform isolation, risking data leakage in cross-validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without fit/transform isolation, scalers and encoders leak future information into training data, causing
      look-ahead bias that inflates backtest performance by 10-30% compared to live trading
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-193
    when: When implementing data preprocessing pipelines with fit/transform operations
    action: 'Implement strict fit/transform isolation: fit operations (computing mean, std, scaler parameters) must occur
      only on training folds; transform operations apply pre-computed parameters to validation/test sets; use sklearn Pipeline
      or equivalent with separate fit/transform stages'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Data leakage from improper fit/transform isolation causes backtest results to be non-reproducible in live
      trading, as the model has implicitly seen future data during training
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-194
    when: When implementing multi-agent trading decision systems
    action: Assume the framework implements multi-agent decision consensus with risk veto capabilities — the framework does
      not have this capability; AIL coverage shows 0/6 pass, 3/6 partial, 3/6 fail
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without multi-agent consensus and risk veto, individual agents may execute trades that are collectively inappropriate,
      leading to concentrated positions or risk limit breaches that a human risk manager would have rejected
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-195
    when: When implementing multi-agent trading decision systems
    action: 'Implement multi-agent decision consensus with risk veto: require minimum voting threshold (e.g., 2/3 majority)
      for position changes; add risk veto agent with authority to block trades exceeding VaR or sector limits; log each veto
      decisions with justification'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing consensus mechanism allows conflicting agent signals to execute simultaneously, causing contradictory
      positions and cascading losses during volatile market conditions
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-196
    when: When implementing performance metrics caching with Sharpe ratio calculations
    action: Use Sharpe ratio cache keys that omit day-count convention — the framework uses unbounded LRU cache without including
      trading day convention in cache keys, causing stale results when mixing 365-day and actual trading day conventions
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: 'Sharpe ratio caching without day-count awareness causes strategies to be mis-ranked: one strategy''s metrics
      reflect 365-day annualization while another''s reflect actual 250 trading days, leading to incorrect capital allocation
      and suboptimal portfolio construction'
    derived_from_bd_id: BD-085
  - id: finance-C-197
    when: When implementing performance metrics caching with Sharpe ratio calculations
    action: Include day-count convention and actual trading days in cache keys; add cache key versioning to invalidate stale
      metrics when convention changes; implement rolling Sharpe recalculation on cache miss to verify consistency
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Without day-count aware cache keys, annualized Sharpe calculations become inconsistent across strategies,
      causing systematic mis-ranking that leads to capital being allocated to underperforming strategies
    derived_from_bd_id: BD-085
  - id: finance-C-198
    when: When implementing regime detection logic with ADX threshold crossings
    action: 'Implement position size reduction during ADX transition zone (20-30 range): reduce position sizes by 50% when
      ADX crosses between mean-reversion and trend-following regimes to account for volatility mis-estimation from calibration
      mismatch'
    severity: high
    kind: domain_rule
    modality: must
    consequence: During regime transitions, volatility spikes while ADX hasn't confirmed the new regime, causing positions
      sized for trending markets to receive stops calibrated to range-bound assumptions, leading to premature stop-outs on
      false breakouts and accumulated realized losses
    derived_from_bd_id: BD-089
  - id: finance-C-199
    when: When configuring web server bindings for the backtesting framework
    action: Bind web server to 0.0.0.0 in production environments — the framework defaults to 0.0.0.0:8010 binding which accepts
      connections from any network interface, exposing services to external access
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Binding to 0.0.0.0 in security-sensitive environments allows unauthorized external access to trading data
      and execution APIs, potentially enabling data exfiltration or unauthorized trade execution
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-200
    when: When configuring web server bindings for the backtesting framework
    action: Use localhost (127.0.0.1) binding for local development; use explicit IP binding or reverse proxy with authentication
      for distributed deployment; document the binding configuration requirement in deployment guidelines
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without proper binding configuration, internal trading systems may be exposed to external networks, creating
      security vulnerabilities that could be exploited for unauthorized access or data theft
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-201
    when: When implementing command execution utilities in the framework
    action: Change execute() function's shell parameter from the secure default (shell=False) to shell=True — the security-conscious
      default prevents shell injection but legitimate shell features are unavailable
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Changing shell=False to shell=True enables shell injection attacks where malicious input can execute arbitrary
      commands on the system, potentially compromising trading infrastructure and exposing sensitive market data
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-202
    when: When implementing command execution utilities in the framework
    action: Use subprocess.run with shell=False and explicit argument lists (shell=True with command lists is not supported);
      if shell features are needed, implement a parameterized command builder that safely handles pipes and redirects
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Without shell features, complex command operations like pipes and globbing require manual implementation,
      which may lead to workarounds that bypass security controls if not carefully designed
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-203
    when: When implementing RabbitMQ connection handling in messaging infrastructure
    action: Use context manager (__enter__/__exit__) for RabbitMQ connections, ensuring channel closes before connection closes
      in reverse order of opening
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: RabbitMQ connection leaks cause resource exhaustion and broker connection errors; without proper context
      manager cleanup, channels and connections remain open indefinitely, leading to broker connection errors and system failures
      in production environments
    derived_from_bd_id: BD-021
  - id: finance-C-204
    when: When initializing DataStruct with financial time-series data
    action: Call drop_duplicates() during DataStruct initialization to remove duplicate bars before data enters the pipeline
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate bars cause incorrect indicator calculations such as double-counting volume or generating false
      technical patterns, leading to flawed trading signals and financial losses in live trading
    derived_from_bd_id: BD-007
  - id: finance-C-205
    when: When implementing DataStruct initialization with time-series data
    action: Verify that drop_duplicates() is called at initialization and not deferred to later stages — lazy deduplication
      allows corrupted state to propagate to downstream indicators
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Lazy deduplication permits duplicate data to persist through the pipeline, causing indicators to compute
      on contaminated data and generate unreliable trading signals
    derived_from_bd_id: BD-007
  - id: finance-C-206
    when: When implementing factor computation involving monetary values
    action: Assume the framework handles float vs Decimal precision for currency calculations — the framework does not implement
      Decimal type enforcement for monetary values
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using float for currency calculations introduces precision errors that accumulate over many transactions,
      potentially causing incorrect position sizing, margin calculations, or profit/loss reporting in production
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-207
    when: When implementing factor computation involving monetary values
    action: Use Decimal type for each currency and monetary calculations; verify database columns for monetary values use
      DECIMAL(p,s) types instead of FLOAT or DOUBLE; add type validation in factor computation layer
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without Decimal type usage, floating-point precision errors cause silent rounding discrepancies in financial
      calculations, potentially leading to compliance issues and significant financial losses in live trading
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-208
    when: When implementing factor storage with ClickHouse
    action: Use ReplacingMergeTree engine for factor tables to enable automatic deduplication of records with identical primary
      keys during background merges; do NOT use standard MergeTree
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without ReplacingMergeTree, duplicate factor records accumulate during recalculations and high-throughput
      daily batch updates, causing incorrect factor values to be used in trading decisions
    derived_from_bd_id: BD-002
  - id: finance-C-209
    when: When implementing resampling logic for financial data
    action: Use DataStruct.resample() method instead of raw DataFrame.resample() to preserve fq (forward adjustment) settings
      and dtype information
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Raw DataFrame resampling loses domain-specific metadata including fq adjustment flags and dtype information,
      causing inconsistent forward adjustment behavior that silently corrupts backtest results
    derived_from_bd_id: BD-008
  - id: finance-C-210
    when: When adding or configuring new futures contracts in the backtesting framework
    action: Add new futures contracts to the MARKET_PRESET table in qamarket/market_preset.py — manual code update is required
      since dynamic loading is not supported
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using futures contracts not registered in MARKET_PRESET causes incorrect tick size, multiplier, and commission
      calculations, leading to order rejection or incorrect P&L reporting
    derived_from_bd_id: BD-074
  - id: finance-C-211
    when: When processing any stochastic operations in backtesting
    action: Assume the framework provides comprehensive random seed handling for full reproducibility — random seed configuration
      is not fully covered across each modules
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without full random seed coverage, backtest results may vary between runs due to non-deterministic behavior
      in factor computation, making results non-reproducible and strategy comparisons unreliable
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-212
    when: When implementing or modifying factor analysis strategies
    action: Explicitly set and manage random seeds for each random number generators (numpy.random, random, tensorflow, etc.)
      before each backtest run to verify reproducibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failing to set random seeds causes different execution paths and results across backtest runs, invalidating
      strategy performance comparisons and making live trading behavior unpredictable
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-214
    when: When implementing strategies that require historical data lookback
    action: Verify that the default cache window of 120 bars (_num_cached) is sufficient for indicator calculations; explicitly
      override _num_cached in strategy __init__ if longer lookback is needed
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Default 120-bar cache may truncate indicator calculations for strategies requiring longer historical context,
      producing incomplete or incorrect trading signals that degrade strategy performance
    derived_from_bd_id: BD-071
  - id: finance-C-215
    when: When implementing accumulation/distribution momentum indicators using ADOSC in backtesting
    action: Use fast_period=3 and slow_period=10 for ADOSC calculation — these parameters determine momentum confirmation
      speed and volume-price divergence signal timing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different fast/slow period ratios (e.g., 2/5 or 5/20) changes momentum signal timing, causing divergence
      detection to occur at different market points and producing inconsistent strategy signals
    derived_from_bd_id: BD-059
  - id: finance-C-217
    when: When calculating annualized Sharpe ratio for Chinese A-share strategy performance evaluation
    action: Use 365-day annualization convention for Sharpe ratio calculation (365/trading_days), not 252-day US market convention
      — verify this matches Chinese A-share market characteristics where only ~250 trading days occur annually
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 252-day annualization inflates Sharpe ratio by ~5% compared to 365-day calculation, causing misleading
      risk-adjusted performance comparisons and potentially inappropriate strategy selection
    derived_from_bd_id: BD-050
  - id: finance-C-218
    when: When calculating Average True Range for volatility-based position sizing or stop-loss calibration
    action: Verify ATR period=14 aligns with strategy timeframe — 14-day standard balances responsiveness with stability for
      half-month volatility measurement; shorter periods (7-day) capture faster volatility spikes while longer periods (20-day)
      smooth but lag
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using mismatched ATR period (e.g., 7-day for a swing strategy) causes volatility estimates to be too sensitive
      or too lagged, leading to oversized or undersized positions that increase drawdown risk
    derived_from_bd_id: BD-051
  - id: finance-C-219
    when: When calculating Average Directional Index for trend strength measurement and market regime classification
    action: Verify ADX period=14 balances responsiveness with stability for trend-following signal generation — 14-day standard
      aligns with half trading month for market regime classification; shorter periods (7-day) generate faster signals while
      longer periods (21-day) reduce whipsaws
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using mismatched ADX period causes trend-following signals to be poorly timed, generating premature entry/exit
      signals (7-day) or lagging signals that miss trend reversals (21-day)
    derived_from_bd_id: BD-052
  - id: finance-C-220
    when: When configuring thread-based backtesting tasks via QA_Thread constructor
    action: Change the daemon parameter from its default value (daemon=False) to daemon=True for long-running or critical
      pipeline operations
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Setting daemon=True allows threads to be abruptly terminated when the main program exits, causing incomplete
      batch calculations, partial data writes, and silently corrupted backtest results that appear valid but are mathematically
      incomplete
    derived_from_bd_id: BD-GAP-010
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
