      positions = factor_ranker.daily_rebalance(universe)

      '
    good_example: "# GOOD: 控制换手率，计算成本后净收益\nANNUAL_TURNOVER_CAP = 5.0  # 年化换手率上限 500%\npositions = factor_ranker.rebalance_with_turnover_constraint(\n\
