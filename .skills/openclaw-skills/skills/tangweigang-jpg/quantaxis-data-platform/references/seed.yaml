    url: https://image.hanspub.org/Html/5-1140388_30054.htm
  reference_code:
    bad_example: "# BAD: 允许用户手动豁免止损规则（强化处置效应）\nif user_override and position_loss > 0.1:\n    hold_position()  # \"等回来\" 的心态\n"
    good_example: "# GOOD: 纪律性止损，不因情绪豁免\nMAX_LOSS = 0.08\nif (current_price / entry_price - 1) < -MAX_LOSS:\n    execute_stop_loss(stock)\n\
      \    log_decision(reason=\"systematic_stop_loss\")\n"
  provenance:
