resources:
  packages:
  - name: pandas
    version_pin: latest
  - name: numpy
    version_pin: latest
  - name: scikit-learn
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: zipline-reloaded
    version_pin: latest
  - name: pyfolio-reloaded
    version_pin: latest
  - name: alphalens-reloaded
    version_pin: latest
  - name: empyrical-reloaded
    version_pin: latest
  - name: backtrader
    version_pin: latest
  - name: quandl
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install pandas
    - python3 -m pip install numpy
    - python3 -m pip install scikit-learn
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing web scraping for alternative data collection
    action: Respect robots.txt rules by setting ROBOTSTXT_OBEY=True in settings
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating robots.txt may result in legal consequences, IP bans, or 403/403 errors preventing data collection
    stage_ids:
    - alternative_data_collection
  - id: finance-C-002
    when: When configuring Scrapy for alternative data scraping
    action: Limit CONCURRENT_REQUESTS to 1 to prevent IP blocks and 403 errors
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: High concurrency causes IP blocks, 403 errors, or temporary/permanent bans from target websites
    stage_ids:
    - alternative_data_collection
  - id: finance-C-004
    when: When scraping content from websites that require authentication
    action: Hardcode credentials in source code files
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Exposing credentials in source code leads to unauthorized access, potential account termination, and security
      breaches
    stage_ids:
    - alternative_data_collection
  - id: finance-C-009
    when: When configuring Splash for JavaScript rendering
    action: Set SPLASH_URL to localhost:8050 and verify Splash service is running
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Without Splash service running, JavaScript-rendered pages return empty content and scraping fails
    stage_ids:
    - alternative_data_collection
  - id: finance-C-017
    when: When implementing Zipline bundle ingest function
    action: 'Accept exactly 9 parameters in the specified order: environ, asset_db_writer, minute_bar_writer, daily_bar_writer,
      adjustment_writer, calendar, start_session, end_session, cache, show_progress, output_dir'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched function signature causes Zipline to fail with TypeError during bundle ingest, preventing any
      backtesting from running
    stage_ids:
    - market_data_ingestion
  - id: finance-C-018
    when: When writing equities metadata to Zipline SQLite database
    action: 'Include each required columns: symbol, asset_name, start_date, end_date, first_traded, auto_close_date, exchange
      with correct datetime64[ns] dtypes'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required metadata columns cause asset_db_writer.write() to raise KeyError or store invalid assets,
      making securities untradeable during backtest
    stage_ids:
    - market_data_ingestion
  - id: finance-C-019
    when: When configuring Algoseek extended-hours trading calendar
    action: Set minutes_per_day to match the total trading minutes including extended hours (960 for regular NYSE hours, 1600
      for extended hours starting at 4:00 AM)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched minutes_per_day causes minute bar misalignment with calendar, resulting in backtest prices that
      don't correspond to actual trading times
    stage_ids:
    - market_data_ingestion
  - id: finance-C-023
    when: When configuring Zipline bundle registration
    action: Register bundle with correct calendar_name that matches a registered TradingCalendar
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Mismatched calendar_name causes ValueError when Zipline tries to find the trading calendar, preventing backtest
      initialization
    stage_ids:
    - market_data_ingestion
  - id: finance-C-037
    when: When implementing feature engineering from OHLCV data
    action: Replace infinite values with NaN and call dropna before ML model training
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TA-Lib technical indicators (RSI, MACD, ATR) produce infinite values during division-by-zero edge cases.
      Unhandled inf values cause gradient-based ML models (neural networks, random forests) to produce NaN gradients or crash
      during training, corrupting the model entirely.
    stage_ids:
    - feature_engineering
  - id: finance-C-039
    when: When structuring Feature DataFrame for multi-ticker trading
    action: Maintain (ticker, date) MultiIndex structure on output DataFrame
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Downstream stages (prediction_modeling, backtesting) expect MultiIndex (ticker, date) for proper train/test
      temporal splits. Flattening or renaming index levels causes misalignment between predictions and price data, producing
      incorrect trading signals and corrupted backtest results.
    stage_ids:
    - feature_engineering
  - id: finance-C-040
    when: When computing technical indicators using TA-Lib
    action: Install TA-Lib C library before importing Python wrapper
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: TA-Lib Python package (import talib) is a wrapper around a compiled C library. Without the C library pre-installed,
      import fails, causing immediate runtime failure in all feature_engineering code that relies on RSI, MACD, ATR, Stochastic,
      or Bollinger Bands calculations.
    stage_ids:
    - feature_engineering
  - id: finance-C-048
    when: When installing TA-Lib dependencies for feature engineering
    action: Assume pip install ta-lib alone is sufficient without C library compilation
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: pip install ta-lib only installs the Python wrapper. The underlying TA-Lib C library must be compiled and
      installed separately (via make install on Linux or brew install ta-lib on macOS). Without the C library, import talib
      succeeds but all function calls raise AttributeError, breaking the entire feature engineering pipeline.
    stage_ids:
    - feature_engineering
  - id: finance-C-049
    when: When implementing cross-validation for financial time series data
    action: use random K-fold or standard train_test_split without temporal ordering
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Random splits leak future information into training data, causing look-ahead bias that inflates backtest
      performance and leads to live trading losses
    stage_ids:
    - prediction_modeling
  - id: finance-C-050
    when: When implementing cross-validation for financial time series data
    action: use purged walking forward split with embargo gap between train and test
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without purge gap, overlapping outcomes between training and test periods contaminate validation results,
      producing artificially inflated performance metrics
    stage_ids:
    - prediction_modeling
  - id: finance-C-051
    when: When designing train/test split for time series prediction
    action: place training indices chronologically AFTER test indices (reverse of typical ML)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Training on future data to predict past is physically impossible in live trading; backtest results will not
      generalize to live performance
    stage_ids:
    - prediction_modeling
  - id: finance-C-059
    when: When implementing a trading simulator with discrete positions
    action: enforce position bounds as {-1, 0, 1} using action-1 mapping for gym.Env Discrete(3) actions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid position values will cause incorrect reward calculations and violate the gym.Env interface contract,
      leading to undefined behavior in RL agent training
    stage_ids:
    - backtesting
  - id: finance-C-060
    when: When calculating trading costs in the simulator
    action: apply trading costs proportional to trade size using basis points (bps) scale
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect cost scaling will underestimate/overestimate transaction costs, causing backtest results to diverge
      from real-world execution by orders of magnitude
    stage_ids:
    - backtesting
  - id: finance-C-062
    when: When implementing NAV-based termination conditions
    action: trigger episode termination when NAV drops to 0 (loss) or reaches 2.0 (win)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing NAV termination will allow strategies to continue trading after catastrophic losses or incorrectly
      report win conditions, invalidating RL training signals
    stage_ids:
    - backtesting
  - id: finance-C-064
    when: When using zipline for backtesting
    action: verify data bundles use point-in-time (PIT) data to eliminate look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-PIT data introduces look-ahead bias where future information leaks into current signals, causing backtest
      returns to be unrealistically inflated by 10-50%
    stage_ids:
    - backtesting
  - id: finance-C-065
    when: When running backtests for strategy selection
    action: present backtest results as guaranteed future performance or expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting backtest results as predictive of future performance violates investment advisory regulations
      and deceives stakeholders about actual expected returns
    stage_ids:
    - backtesting
  - id: finance-C-068
    when: When preparing data for backtesting
    action: use future information in feature engineering or signal generation that would not be available at decision time
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Look-ahead bias in features causes backtest to overestimate strategy performance by 20-100%, as the model
      uses information not available in live trading
    stage_ids:
    - backtesting
  - id: finance-C-073
    when: When setting up cross-validation for time-series trading strategies
    action: use temporal splits that respect chronological order, with lookahead buffer to prevent information leakage
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Random train/test splits cause look-ahead bias where training data contains future information relative to
      test data, inflating out-of-sample performance by 30-200%
    stage_ids:
    - backtesting
  - id: finance-C-075
    when: When implementing step() method in a gym.Env trading environment
    action: Return a 4-tuple of (observation, reward, done, info) in that exact order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: RL agent training will fail because all standard RL libraries expect the exact tuple order (obs, reward,
      done, info) defined in the gym.Env interface specification
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-076
    when: When implementing the action mapping in TradingEnvironment
    action: Map action index 0 to SHORT (-1), action index 1 to NEUTRAL (0), action index 2 to LONG (1) using end_position
      = action - 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Agent's trading decisions will be inverted or incorrect, causing the RL agent to take opposite positions
      than intended and destroying the learned policy's effectiveness
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-082
    when: When using OpenAI gym.Env for trading RL environments
    action: Claim real-time trading capability - the gym environment is a pure backtesting/simulation framework with no live
      market connection
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users may attempt to use the simulation environment for live trading, resulting in financial losses as the
      environment has no connection to actual market execution
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-083
    when: When presenting RL trading agent results
    action: Claim that backtested returns equal expected live trading returns - past performance does not guarantee future
      results
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as expected live trading performance will mislead users; RL agents are prone
      to overfitting to historical data and markets change regime
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-084
    when: When using TradingEnvironment for live trading inference
    action: Use the same environment without proper look-ahead bias safeguards for live execution
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Agent will trade on signals that include future information or stale data, causing losses in live trading
      that differ significantly from backtested performance
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-090
    when: When implementing TradingEnvironment that inherits from gym.Env
    action: Define action_space as spaces.Discrete(3) and observation_space as spaces.Box with specified shape for the feature
      vector
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: RL libraries cannot interact with the environment if action_space and observation_space are not properly
      defined, causing immediate failure when trying to create agents
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-094
    when: When using the deflated Sharpe ratio formula
    action: Verify num_trials is at least 2 to avoid division by zero in the norm.ppf arguments
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: With num_trials=1, the term 1-1/num_trials equals 0, causing norm.ppf(0) to return -inf and making the deflated
      Sharpe ratio undefined or meaningless
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-095
    when: When computing Sharpe ratio statistics
    action: Verify sigma (volatility) is strictly positive to avoid division by zero
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: A sigma value of zero causes division by zero in Sharpe ratio calculations, producing NaN or infinite values
      that corrupt downstream risk calculations and portfolio optimization
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-097
    when: When applying the deflated Sharpe ratio correction
    action: Verify that the deflated Sharpe ratio is less than or equal to the raw (unadjusted) Sharpe ratio
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: If DSR >= raw Sharpe, the multiple testing correction is not properly applied, potentially leading to overstated
      strategy performance and deployment of overfitted strategies that will underperform in live trading
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-110
    when: When converting Zipline OHLCV bars to feature engineering input
    action: Verify OHLCV data contains proper timestamp index and ticker identifier for MultiIndex construction
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing timestamps or ticker identifiers will cause groupby(level='ticker') operations to fail, preventing
      technical indicator computation
    stage_ids:
    - market_data_ingestion
    - feature_engineering
  - id: finance-C-111
    when: When creating technical indicators from OHLCV price data
    action: Apply pct_change() and talib indicators per ticker using groupby(level='ticker') to avoid cross-contamination
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without per-ticker grouping, momentum indicators will compute incorrect values mixing multiple securities'
      prices
    stage_ids:
    - market_data_ingestion
    - feature_engineering
  - id: finance-C-112
    when: When creating the target variable from forward returns
    action: Use shift(-1) on per-ticker returns to align future returns with current features without look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect target alignment will cause look-ahead bias, making backtest results unrealistically positive and
      leading to live trading losses
    stage_ids:
    - feature_engineering
    - prediction_modeling
  - id: finance-C-114
    when: When passing ML predictions to backtesting engine
    action: Join predictions with price data using same MultiIndex (ticker, date) structure to verify temporal alignment
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Index mismatch will cause prediction-price misalignment, making backtest results meaningless or causing execution
      errors
    stage_ids:
    - prediction_modeling
    - backtesting
  - id: finance-C-115
    when: When computing forward returns for strategy evaluation
    action: Use shift(-1) on returns to align predictions with subsequent period returns, not current period returns
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using current returns instead of forward returns introduces look-ahead bias, inflating backtest performance
      artificially
    stage_ids:
    - prediction_modeling
    - backtesting
  - id: finance-C-116
    when: When extracting technical features for RL agent observations
    action: Include returns as the first feature column in observation vector (index 0) for reward calculation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing returns from observation will prevent TradingSimulator from computing proper rewards, breaking the
      RL learning loop
    stage_ids:
    - feature_engineering
    - reinforcement_learning_trading
  - id: finance-C-118
    when: When mapping RL actions to trading positions
    action: Map discrete actions (0=SHORT, 1=HOLD, 2=LONG) to positions (-1, 0, 1) using end_position = action - 1
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect action-to-position mapping will cause wrong position sizing, leading to opposite trades from intended
      strategy
    stage_ids:
    - reinforcement_learning_trading
    - backtesting
  - id: finance-C-119
    when: When passing RL trading actions to TradingSimulator
    action: Pass both action and market_return (forward returns) to take_step() for reward calculation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing market_return will break reward computation, preventing proper P&L calculation and strategy evaluation
    stage_ids:
    - reinforcement_learning_trading
    - backtesting
  - id: finance-C-121
    when: When calculating deflated Sharpe ratio
    action: Pass the number of strategy trials (N) to DSR calculation to properly adjust for selection bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without trial count, DSR cannot correct for multiple testing bias, producing misleading statistical significance
      estimates
    stage_ids:
    - prediction_modeling
    - backtesting
    - multiple_testing_correction
  - id: finance-C-123
    when: When joining predictions with price data for signal generation
    action: Use temporal join on matching (ticker, date) pairs to verify predictions align with correct price bars
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Cartesian product join will misalign predictions with prices, causing trades on wrong dates and incorrect
      P&L
    stage_ids:
    - prediction_modeling
    - backtesting
  - id: finance-C-127
    when: When conducting multiple hypothesis tests during strategy selection
    action: Apply multiple testing correction (e.g., Bonferroni, FDR) before claiming statistical significance
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Uncorrected multiple testing inflates false positive rate, leading to publication of strategies that fail
      out-of-sample
    stage_ids:
    - prediction_modeling
    - multiple_testing_correction
  - id: finance-C-130
    when: When computing return labels for ML model training in backtesting
    action: Forward-shift returns using shift(-1) to create labels that represent future returns, not past returns
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backtest signals use future information to generate current trades, creating look-ahead bias that produces
      unrealistic returns in live trading
  - id: finance-C-132
    when: When implementing a Zipline custom bundle ingest function
    action: 'Define ingest function with the exact signature: (environ, asset_db_writer, minute_bar_writer, daily_bar_writer,
      adjustment_writer, calendar, start_session, end_session, cache, show_progress, output_dir)'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Zipline bundle registration fails or raises TypeError if the ingest function signature does not match the
      expected parameters
  - id: finance-C-133
    when: When implementing the TradingSimulator for reinforcement learning trading environments
    action: 'Map action space {0, 1, 2} to position space {-1, 0, 1} using the formula: end_position = action - 1'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Position mapping errors cause the RL agent to hold opposite positions than intended, leading to incorrect
      reward signals and strategy losses
  - id: finance-C-138
    when: When preprocessing features in a trading DataSource while preserving return labels
    action: Scale features (excluding returns) using StandardScaler or similar normalization, but copy and preserve returns
      in their original scale
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Scaling returns corrupts the target variable for ML training, causing models to predict scaled values that
      cannot be used for actual trading
  - id: finance-C-139
    when: When implementing time series cross-validation for financial ML models
    action: Verify training indices are chronologically AFTER test indices (reverse of typical ML train/test split to respect
      temporal ordering)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Training on future data to predict past creates look-ahead bias, producing unrealistic backtest results that
      cannot be replicated in live trading
  - id: finance-C-148
    when: When training ML models on historical financial data
    action: Use point-in-time (PIT) data that reflects only information available at each historical date — adjusted prices
      and fundamental data must be PIT-corrected
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Training on forward-filled or revised data creates look-ahead bias, causing models to fail in live trading
      when using only available information
  - id: finance-C-155
    when: When implementing prediction-to-price matching for backtesting
    action: Extend prediction dates by 1 day so predictions made at close of day t are matched with actual prices at open
      of day t+1 — match pred_date with t+1 actual price
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without +1 day offset, predictions are matched to same-day closing prices, causing look-ahead bias where
      strategy appears profitable due to price data leakage
    derived_from_bd_id: BD-041
  - id: finance-C-170
    when: When implementing the reinforcement learning trading environment preprocessing
    action: Include the 'returns' column in sklearn.preprocessing.scale or any other feature scaling — returns must maintain
      original scale for correct reward signal interpretation
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Scaling returns destroys the direct economic interpretation of the reward signal; the agent learns from distorted
      rewards and produces policies that make economically irrational trading decisions
    derived_from_bd_id: BD-095
  - id: finance-C-179
    when: When implementing train-test split logic in backtesting framework
    action: Maintain lookahead gap between training window end and test window start equal to lookahead days (gap_size = lookahead);
      do not use zero-gap cross-validation that allows temporal overlap between train and test ranges
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero-gap train-test split creates look-ahead bias where features at training end incorporate information
      unavailable at that time, making backtest results unreproducible in live trading
    derived_from_bd_id: BD-094
  - id: finance-C-184
    when: When selecting cross-validation methodology for financial time series models
    action: Use TimeSeriesSplit or TimeSeriesCV for each financial ML model validation to preserve temporal ordering; do not
      use KFold with shuffle=True which destroys temporal structure and creates data leakage
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Shuffled KFold creates optimistic, biased performance estimates by mixing future and past observations, while
      TimeSeriesSplit produces conservative, unbiased estimates; inconsistent CV methodologies lead to wrong strategy selection
      and deployment of overfitted models
    derived_from_bd_id: BD-115
  - id: finance-C-185
    when: When implementing momentum signals in the DRL trading environment
    action: Calculate Stochastic oscillator differential as slowD minus slowK (not absolute values) — slowD (%K smoothed twice)
      and slowK (%K smoothed once) crossover provides bullish/bearish momentum signals
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using absolute Stochastic values instead of differential eliminates crossover signal interpretation, causing
      the agent to lose critical timing information for trade entries and momentum divergence detection
    derived_from_bd_id: BD-074
  - id: finance-C-209
    when: When implementing cross-validation for financial time-series models
    action: Use TimeSeriesSplit for cross-validation to preserve temporal ordering — do not use KFold, GroupKFold, or shuffled
      splits that allow future data to leak into training sets
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using KFold or random splits in time-series cross-validation allows future information to leak into training,
      causing overly optimistic backtest results that do not reflect real-world prediction scenarios where only historical
      data is available
    derived_from_bd_id: BD-029
  - id: finance-C-217
    when: When implementing the reward calculation in the trading environment's step function
    action: Calculate reward as start_position multiplied by market_return, then subtract costs — the formula reward = start_position
      * market_return - costs must be preserved exactly
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Simplifying to absolute return only removes the agent's ability to learn position-direction awareness, causing
      it to take positions regardless of market direction; using Sharpe ratio adds complexity that obscures the direct profit-cost
      relationship the agent needs to learn
    derived_from_bd_id: BD-055
  - id: finance-C-218
    when: When implementing the RL action-to-position mapping in the ordering contract
    action: Apply the mapping formula end_position = action - 1 where action 0 yields SHORT (-1), action 1 yields NEUTRAL
      (0), and action 2 yields LONG (1) — the offset of 1 is mandatory
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using direct action-to-position mapping or wrong offset causes all position decisions to be inverted or misaligned,
      making the RL agent take opposite positions from intended and systematically losing money on every trade
    derived_from_bd_id: BD-090
  - id: finance-C-226
    when: When configuring cross-validation splits for time series backtesting
    action: Set shuffle=True or alter date_idx ordering in MultipleTimeSeriesCV — temporal order must be preserved to prevent
      look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Shuffling or reordering splits destroys autocorrelation patterns in financial data, introducing look-ahead
      bias that makes backtested performance significantly overestimate actual live trading returns
    derived_from_bd_id: BD-099
  - id: finance-C-231
    when: When implementing cross-validation for financial time series backtesting strategies
    action: Verify training indices are chronologically AFTER test indices (train-after-test ordering); do not apply standard
      ML cross-validation patterns that would cause look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using standard ML train-before-test ordering in time series CV causes data leakage, systematically overestimating
      strategy performance in backtests and producing results that cannot be replicated in live trading
    derived_from_bd_id: BD-093
  regular:
  - id: finance-C-003
    when: When scraping JavaScript-rendered pages
    action: Use SplashRequest with wait parameter set to at least 1 second
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper wait time, JS content fails to render causing empty/incomplete data extraction
    stage_ids:
    - alternative_data_collection
  - id: finance-C-005
    when: When configuring monitoring for web scraping operations
    action: Enable MonitorDownloadsExtension to periodically log active download counts
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without monitoring, scraping failures go undetected, resulting in incomplete datasets and wasted resources
    stage_ids:
    - alternative_data_collection
  - id: finance-C-006
    when: When scraping SeekingAlpha for earnings transcripts
    action: Claim automatic transcript downloads are reliable or guaranteed
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: SeekingAlpha uses captcha protection, making automatic downloads unreliable or impossible
    stage_ids:
    - alternative_data_collection
  - id: finance-C-007
    when: When implementing alternative data scrapers
    action: Implement sleep/delay between requests to prevent blocking
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without delays, target servers detect rapid automated requests and block the scraping IP
    stage_ids:
    - alternative_data_collection
  - id: finance-C-008
    when: When using Selenium for alternative data scraping
    action: Run the scraper on a host machine rather than Docker container
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Selenium requires a real browser which cannot run properly inside Docker containers without additional configuration
    stage_ids:
    - alternative_data_collection
  - id: finance-C-010
    when: When rotating user agents in scraping operations
    action: Populate USER_AGENT_LIST with diverse browser user-agent strings
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without diverse user agents, requests are easily identified as bots and blocked
    stage_ids:
    - alternative_data_collection
  - id: finance-C-011
    when: When extracting structured data from web pages
    action: Handle missing HTML elements gracefully to prevent crawler crashes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing elements cause AttributeError exceptions, stopping the spider and losing already collected data
    stage_ids:
    - alternative_data_collection
  - id: finance-C-012
    when: When collecting alternative data for trading strategies
    action: Claim that scraped alternative data signals will produce guaranteed alpha
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Alternative data signals are informational inputs, not guarantees of profitable trading outcomes
    stage_ids:
    - alternative_data_collection
  - id: finance-C-013
    when: When building web scrapers for alternative data
    action: Implement graceful degradation when target website structure changes
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Website changes cause scraper failures; without graceful handling, data collection stops entirely
    stage_ids:
    - alternative_data_collection
  - id: finance-C-014
    when: When implementing Scrapy spiders for alternative data
    action: Enable AUTOTHROTTLE to automatically adjust request rate based on server response
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without auto-throttling, fixed high request rates trigger server blocks and 403 errors
    stage_ids:
    - alternative_data_collection
  - id: finance-C-015
    when: When handling authentication for alternative data sources
    action: Store cookies/sessions and reuse them for subsequent requests
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without session persistence, re-authentication is required for each request, increasing detection risk
    stage_ids:
    - alternative_data_collection
  - id: finance-C-016
    when: When parsing alternative data into structured formats
    action: Output data to CSV files with headers for downstream ML processing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper CSV formatting, downstream ML pipelines fail to load and process the collected data
    stage_ids:
    - alternative_data_collection
  - id: finance-C-020
    when: When storing OHLCV price data for Zipline bundle
    action: 'Use exact OHLCV column naming: first/open, high, low, last/close, volume as column names in the price DataFrames'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect column names cause Zipline to reject price data, resulting in empty minute/daily bars or KeyError
      during backtesting
    stage_ids:
    - market_data_ingestion
  - id: finance-C-021
    when: When loading market data for backtesting
    action: Convert each timestamps from local timezone to UTC before storing in Zipline bundle using tz_localize followed
      by tz_convert
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing timezone conversion causes timestamps to be misinterpreted, leading to look-ahead bias where future
      data appears available before it should be
    stage_ids:
    - market_data_ingestion
  - id: finance-C-022
    when: When setting up custom Zipline bundles
    action: Define ZIPLINE_ROOT environment variable or set custom_data_path explicitly to locate HDF5 data files
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing ZIPLINE_ROOT causes bundle to fall back to default ~/.zipline/custom_data, resulting in FileNotFoundError
      during data loading
    stage_ids:
    - market_data_ingestion
  - id: finance-C-024
    when: When implementing Algoseek minute data bundle
    action: Expect Pipeline API to work with minute-bar data - Zipline Pipeline only supports daily frequency data
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Attempting to use Pipeline API with minute data results in empty Pipeline results or ValueError, as Pipeline
      is designed for daily data only
    stage_ids:
    - market_data_ingestion
  - id: finance-C-025
    when: When using Zipline bundles
    action: Store non-OHLCV data (fundamentals, alternative data) in Zipline bundles - bundles are limited to price and volume
      only
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Attempting to store non-OHLCV data in bundles causes ValueError or data corruption, as Zipline bundles only
      accept open/high/low/close/volume columns
    stage_ids:
    - market_data_ingestion
  - id: finance-C-026
    when: When running Zipline bundle ingestion
    action: Run data preprocessing scripts before executing zipline ingest command to generate required HDF5 files and SQLite
      databases
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Running zipline ingest without preprocessing causes FileNotFoundError for algoseek.h5/stooq.h5, requiring
      manual restart of the entire ingest process
    stage_ids:
    - market_data_ingestion
  - id: finance-C-027
    when: When deploying custom Zipline bundles
    action: Create symbolic links from ZIPLINE_ROOT/.zipline/ to bundle Python file and from ZIPLINE_ROOT/.zipline/custom_data/
      to HDF5 data file
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing symlinks cause ImportError for bundle function and FileNotFoundError for data, making zipline ingest
      command fail silently
    stage_ids:
    - market_data_ingestion
  - id: finance-C-028
    when: When extracting adjustment data for Algoseek bundle
    action: Run zipline ingest -b quandl first to populate Quandl bundle SQLite database, then run preprocessing to extract
      splits and dividends from assets-7.sqlite
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Missing Quandl bundle causes empty splits/dividends adjustments, resulting in unadjusted prices that misrepresent
      actual returns in backtest
    stage_ids:
    - market_data_ingestion
  - id: finance-C-029
    when: When implementing custom trading calendar
    action: Inherit from XNYSExchangeCalendar and only override open_times, close_times, name, and tz properties rather than
      reimplementing holiday rules
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reimplementing calendar from scratch causes incorrect holiday handling, leading to backtests that execute
      trades on market holidays
    stage_ids:
    - market_data_ingestion
  - id: finance-C-030
    when: When implementing data loading for Zipline bundle
    action: Use generator functions (yield) for lazy data loading rather than loading each symbols into memory at once
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Loading all symbols at once causes MemoryError for large universes (thousands of securities), making bundle
      ingest fail on systems with limited RAM
    stage_ids:
    - market_data_ingestion
  - id: finance-C-031
    when: When designing bundle data flow
    action: Separate heavy preprocessing (SQLite joins, HDF5 writes) from bundle registration - run preprocessing once, then
      use bundle only for final ingest
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Mixing preprocessing with bundle ingest causes repeated expensive operations on every zipline ingest run,
      significantly slowing down development iteration
    stage_ids:
    - market_data_ingestion
  - id: finance-C-032
    when: When presenting bundle data ingestion results
    action: Claim that Zipline bundle data quality equals proprietary data provider quality - Algoseek data requires parsing
      and Stooq data requires adjustment
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Overclaiming data quality misleads users about backtest accuracy, as custom bundles may have parsing errors,
      missing data points, or incorrect adjustments
    stage_ids:
    - market_data_ingestion
  - id: finance-C-033
    when: When using Zipline backtest results
    action: Present Zipline backtest returns as expected live trading performance - backtest assumes instant execution at
      recorded prices with no slippage
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not account for market impact, slippage, or execution delays, causing actual live trading
      returns to fall significantly below backtested results
    stage_ids:
    - market_data_ingestion
  - id: finance-C-034
    when: When deploying Algoseek bundle with extended hours
    action: Use the bundle for live trading claims - Zipline backtest results do not reflect actual market liquidity during
      extended hours when bid-ask spreads may be wider
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtesting on extended-hours Algoseek data assumes same liquidity as regular hours, but actual execution
      may face wider spreads or reduced liquidity during pre/post-market
    stage_ids:
    - market_data_ingestion
  - id: finance-C-038
    when: When normalizing features for ML model input
    action: Normalize the returns column using sklearn.scale
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Returns are already scaled by nature (percentage changes bounded by -1 to +1). Applying sklearn.scale centering
      would shift mean returns away from zero, destroying the interpretability of returns as profit/loss percentages and causing
      incorrect trading signal calibration.
    stage_ids:
    - feature_engineering
  - id: finance-C-041
    when: When using sklearn.preprocessing.scale for feature normalization
    action: Apply normalization to each features except the returns column
    severity: high
    kind: domain_rule
    modality: must
    consequence: Neural networks and random forests require standardized inputs (zero mean, unit variance) for stable gradient
      descent and optimal splits. Skipping normalization on features causes gradient vanishing/exploding in neural nets and
      suboptimal tree splits, degrading prediction accuracy significantly.
    stage_ids:
    - feature_engineering
  - id: finance-C-042
    when: When designing feature engineering pipeline for production
    action: Use TA-Lib battle-tested indicator implementations over custom calculations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Custom RSI/Stochastic/MACD implementations require handling edge cases (division by zero, lookback period
      warmup, smoothing parameters). Incorrect implementations produce wrong signal values, causing systematic prediction
      errors that are difficult to debug without reference implementations.
    stage_ids:
    - feature_engineering
  - id: finance-C-043
    when: When creating technical indicators requiring historical lookback
    action: Discard the first N rows equal to the maximum indicator lookback period
    severity: high
    kind: domain_rule
    modality: must
    consequence: Indicators like RSI (14-period), MACD (26-period), ATR (14-period) produce invalid NaN values during warmup.
      Including warmup periods in training data causes ML models to learn from invalid indicators, producing systematically
      biased predictions.
    stage_ids:
    - feature_engineering
  - id: finance-C-044
    when: When presenting feature engineering results to stakeholders
    action: Claim that backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results are simulated using historical data with perfect liquidity assumptions, no slippage modeling
      at market open, and fixed transaction costs. Live trading incurs bid-ask spreads, order execution delays, market impact,
      and psychological constraints that cause real returns to diverge substantially from backtested results.
    stage_ids:
    - feature_engineering
    - prediction_modeling
  - id: finance-C-045
    when: When computing return features from price data
    action: Use pct_change() with specified lookback period before normalizing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Computing returns with incorrect lookback periods (e.g., using 1-day return when modeling weekly rebalancing)
      causes signal misalignment with actual trading frequency, producing systematically wrong position sizing and corrupted
      backtest performance metrics.
    stage_ids:
    - feature_engineering
  - id: finance-C-046
    when: When implementing feature scaling in ML trading systems
    action: Store unscaled returns before applying sklearn.scale, then restore them
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: sklearn.preprocessing.scale modifies the DataFrame in-place during z-score normalization. Without saving
      returns before scaling, the trading signal calibration loses the actual return magnitude information needed for proper
      position sizing and risk management.
    stage_ids:
    - feature_engineering
  - id: finance-C-047
    when: When adding technical indicator features to OHLCV data
    action: Pass correct column ordering to TA-Lib (high, low, close) for ATR and STOCH functions
    severity: high
    kind: domain_rule
    modality: must
    consequence: TA-Lib functions like ATR(high, low, close) and STOCH(high, low, close) require specific column ordering.
      Passing columns in wrong order produces mathematically incorrect indicator values that corrupt the feature set and cause
      wrong trading signals.
    stage_ids:
    - feature_engineering
  - id: finance-C-052
    when: When training ML models on financial time series
    action: set shuffle=False as default to maintain temporal validity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Random shuffling destroys temporal ordering, allowing future data points to appear before past data points
      in training, causing catastrophic look-ahead bias
    stage_ids:
    - prediction_modeling
  - id: finance-C-053
    when: When selecting alpha (regularization hyperparameter) for ML models
    action: use Spearman rank correlation instead of MSE/RMSE for alpha selection
    severity: high
    kind: domain_rule
    modality: must
    consequence: MSE/RMSE optimizes for least-squared errors which is sensitive to outliers; Spearman correlation selects
      alphas that maximize rank ordering, which is invariant to monotonic transforms and better for trading signal quality
    stage_ids:
    - prediction_modeling
  - id: finance-C-054
    when: When using sklearn TimeSeriesSplit for financial data
    action: rely on sklearn TimeSeriesSplit without implementing purge and embargo manually
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: sklearn TimeSeriesSplit lacks built-in purge/embargo mechanism; overlapping outcome contamination will inflate
      validation metrics and mislead strategy selection
    stage_ids:
    - prediction_modeling
  - id: finance-C-055
    when: When selecting cross-validation period lengths for trading strategies
    action: use train_period_length of 126 trading days (6 months) and test_period_length of 21 trading days (1 month)
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: 'Improper period lengths distort validation: too short reduces statistical power, too long reduces number
      of folds and increases regime-change risk'
    stage_ids:
    - prediction_modeling
  - id: finance-C-056
    when: When using MultipleTimeSeriesCV for model validation
    action: verify lookahead parameter matches the prediction horizon of the trading strategy
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mismatch between lookahead and strategy horizon causes incorrect purge gap sizing, leading to outcome contamination
      or overly conservative gap
    stage_ids:
    - prediction_modeling
  - id: finance-C-058
    when: When presenting ML model validation results
    action: present cross-validation metrics as guarantees of live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Cross-validation on historical data cannot account for future market regime changes, liquidity constraints,
      or execution differences between simulated and live trading
    stage_ids:
    - prediction_modeling
  - id: finance-C-061
    when: When modeling opportunity cost in the trading simulator
    action: incur time cost at each step when no trades occur, proportional to portfolio value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing time cost creates survivorship bias where idle strategies appear profitable when they would actually
      erode capital through opportunity cost
    stage_ids:
    - backtesting
  - id: finance-C-063
    when: When selecting a backtesting framework for strategy evaluation
    action: choose between vectorized (fast, limited fidelity) or event-driven (slow, realistic) approaches based on requirements
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Mismatched framework selection leads to either false positives from over-simplified simulations or prohibitively
      slow iteration during strategy development
    stage_ids:
    - backtesting
  - id: finance-C-066
    when: When using zipline for backtesting
    action: claim live trading capability when using zipline as it is a backtesting-only framework
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Zipline is a pure backtesting engine; claiming live trading support will result in system failures when attempting
      actual trade execution
    stage_ids:
    - backtesting
  - id: finance-C-067
    when: When evaluating multiple trading strategies via backtest
    action: apply multiple testing corrections (e.g., deflated Sharpe ratio) to account for selection bias
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without correction, selecting best backtest from multiple strategies inflates Sharpe ratio by 50-200% due
      to stochastic noise, leading to poor live performance
    stage_ids:
    - backtesting
  - id: finance-C-069
    when: When designing the data preprocessing pipeline
    action: exclude returns from normalization to preserve the original return scale for reward calculations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Normalized returns will distort reward signals, causing the RL agent to receive incorrect feedback about
      strategy quality and fail to learn optimal policies
    stage_ids:
    - backtesting
  - id: finance-C-070
    when: When computing episode rewards in the trading environment
    action: use the position BEFORE the market return to determine exposure (start_position * market_return)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using end-of-day position for reward calculation introduces causality confusion where the agent is rewarded
      for positions taken after the return occurred
    stage_ids:
    - backtesting
  - id: finance-C-071
    when: When using backtrader for strategy backtesting
    action: understand that backtrader supports live trading but requires broker integration and testing before production
      use
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Without proper broker integration and extended dry-run testing, live trading failures will cause financial
      losses and missed trade executions
    stage_ids:
    - backtesting
  - id: finance-C-072
    when: When simulating trading costs in backtests
    action: model costs as proportional to trade value (bps-based) rather than fixed per trade
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Fixed costs bias against frequent trading strategies, causing strategies that should be profitable after
      realistic costs to appear unprofitable
    stage_ids:
    - backtesting
  - id: finance-C-074
    when: When implementing a TradingEnvironment class inheriting from gym.Env
    action: Define metadata class attribute with 'render.modes' key containing a list of supported render modes
    severity: high
    kind: domain_rule
    modality: must
    consequence: The environment will not conform to OpenAI gym interface standards, causing compatibility issues with RL
      libraries like stable-baselines and RLlib that expect this metadata to be present
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-077
    when: When implementing NAV termination triggers in the trading environment
    action: Set episode termination when NAV drops to 0 (loss) or hits 2.0 (win) to provide clear success criteria
    severity: high
    kind: domain_rule
    modality: must
    consequence: Episode will never terminate early even when the agent achieves extreme profit or total loss, causing infinite
      episodes or incorrect performance evaluation
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-078
    when: When implementing the DataSource.reset() method for RL episode initialization
    action: Randomize episode start offset using np.random.randint to prevent overfitting to specific date ranges
    severity: high
    kind: domain_rule
    modality: must
    consequence: Agent will repeatedly train on the same historical date range, causing severe overfitting where the policy
      only works for specific market conditions and dates, not generalizing to unseen periods
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-079
    when: When setting the episode length for trading RL environments
    action: Use 252 trading days as default episode length to align with one trading year and standard holding period evaluation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Episode lengths will be misaligned with standard trading performance evaluation periods, making it difficult
      to compare results against benchmarks like annual returns
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-080
    when: When validating action input in step() method
    action: Use assert statement to verify action is within action_space before processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid actions may corrupt internal state or cause numerical errors when computing rewards and positions,
      leading to unpredictable agent behavior and training instability
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-081
    when: When implementing data normalization in DataSource
    action: Scale features using sklearn.preprocessing.scale but exclude returns column from normalization to preserve directional
      information
    severity: high
    kind: domain_rule
    modality: must
    consequence: Normalized returns will lose their directional meaning (positive vs negative returns become indistinguishable
      after standardization), causing the agent to learn incorrect position-reward relationships
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-085
    when: When implementing the render() method in gym.Env
    action: Implement actual rendering logic or properly handle unimplemented state per gym.Env conventions
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Code calling render() will execute pass statement without visualization, potentially hiding debug information
      that could be critical for understanding agent behavior
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-086
    when: When orchestrating the RL environment architecture
    action: Reset both DataSource and TradingSimulator in the reset() method to verify clean episode initialization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: State leakage between episodes will occur if only one component is reset, causing the agent to have access
      to information from previous episodes that corrupts the learning process
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-087
    when: When computing the market return for the trading simulator
    action: Pass the returns feature (observation[0]) as market_return, not the price, to correctly compute position returns
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reward calculation will be incorrect if price values are used instead of returns, causing the agent to receive
      misleading reward signals about position profitability
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-088
    when: When training a Deep Q-Learning agent on the trading environment
    action: Use experience replay and target networks to stabilize training and prevent divergence
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without experience replay, samples will be highly correlated causing gradient instability; without target
      networks, Q-values will oscillate or diverge preventing convergence
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-089
    when: When configuring RL agent exploration
    action: Use epsilon-greedy exploration with annealing schedule to verify each state-action pairs are visited during training
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Agent will not explore sufficiently, getting stuck in suboptimal policies; Q-learning convergence requires
      all state-action pairs to be updated infinitely often
    stage_ids:
    - reinforcement_learning_trading
  - id: finance-C-091
    when: When computing the expected maximum Sharpe ratio analytically
    action: Use the precise Euler-Mascheroni constant (0.5772156649) in the maxZ formula
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using an approximate value (like 0.5772) instead of the precise constant (0.5772156649) introduces numerical
      error in the analytical max Sharpe ratio calculation, causing the deflated Sharpe ratio to be systematically biased
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-092
    when: When computing the analytical max Sharpe ratio
    action: Use np.e (Euler's number ~2.71828) in the term 1/(num_trials * np.e) for the Bailey-Lopez formula
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting or replacing np.e with an incorrect value breaks the Bailey-Lopez formula's ability to account for
      correlation structure in Sharpe estimates, producing invalid deflated Sharpe ratios
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-093
    when: When validating the deflated Sharpe ratio implementation
    action: Cross-validate analytical results against Monte Carlo simulation within tolerance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without Monte Carlo cross-validation, implementation errors in the analytical formula (such as incorrect
      coefficient weighting) go undetected, leading to invalid deflated Sharpe ratios that could cause poor investment decisions
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-096
    when: When computing deflated Sharpe ratios
    action: Use scipy.stats.norm.ppf (inverse normal CDF) to compute the extreme value distribution quantiles
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a different distribution's inverse CDF or implementing norm.ppf manually risks numerical instability
      and incorrect extreme value estimates, corrupting the deflated Sharpe ratio calculation
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-098
    when: When adjusting Sharpe ratio for multiple testing
    action: Confirm that deflated Sharpe ratio decreases as the number of trials (num_trials) increases
    severity: high
    kind: domain_rule
    modality: must
    consequence: If DSR does not monotonically decrease with more trials, the formula is incorrectly implemented, and strategies
      tested against many alternatives will appear more attractive than warranted by statistical theory
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-099
    when: When using the deflated Sharpe ratio for strategy selection
    action: Claim that the deflated Sharpe ratio represents guaranteed future live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: The deflated Sharpe ratio corrects for backtest selection bias but does not account for execution costs,
      market impact, regime changes, or other factors that cause live trading returns to diverge from backtested results
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-100
    when: When publishing or presenting Sharpe ratio estimates
    action: Present raw backtest Sharpe ratios as the true expected performance without mentioning the upward bias from multiple
      testing
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Published raw Sharpe ratios without multiple testing correction mislead investors about true strategy performance,
      violating ethical standards and potentially regulatory requirements for fair disclosure
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-101
    when: When comparing strategies using Sharpe ratios
    action: Assume that higher raw Sharpe ratios indicate superior strategies without accounting for the number of trials
      tested
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Strategies with identical true Sharpe ratios tested against more trials will have higher observed Sharpe
      ratios due to selection bias, leading to selecting inferior strategies that happened to be tested more extensively
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-102
    when: When running Monte Carlo validation of the analytical formula
    action: Use a sufficiently large number of iterations (n_iter >= 1000) to achieve statistically meaningful results
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: With insufficient Monte Carlo iterations, the numerical estimate has high variance and may not reliably validate
      the analytical formula, potentially allowing incorrect implementations to pass validation
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-103
    when: When computing the deflated Sharpe ratio
    action: Assume normally distributed Sharpe estimates for the analytical formula to be valid
    severity: high
    kind: resource_boundary
    modality: must
    consequence: The Bailey-Lopez analytical formula derives from extreme value theory assuming normal distribution. For highly
      skewed or heavy-tailed returns, the formula underestimates the maximum expected Sharpe, producing overconfident deflated
      ratios
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-104
    when: When applying the deflated Sharpe ratio methodology
    action: Account for the formula's limitation with very small sample sizes (less than 30 observations)
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: With very short backtest periods, the Sharpe ratio estimate itself has high uncertainty, and the deflated
      Sharpe ratio may not provide meaningful correction, potentially leading to false confidence in under-tested strategies
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-105
    when: When implementing the deflated Sharpe ratio
    action: Log the num_trials value alongside DSR results for auditability
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Without recording the number of trials, results cannot be reproduced or verified, and the multiple testing
      correction cannot be independently validated by reviewers or auditors
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-106
    when: When setting up strategy selection experiments
    action: Document each tested strategy variants and their Sharpe ratios before applying DSR correction
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without documenting all trials, the DSR calculation cannot be reproduced, and reviewers cannot verify that
      the multiple testing correction was properly applied, potentially leading to regulatory or audit failures
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-107
    when: When validating DSR implementation
    action: Verify the error between analytical and numerical DSR is within tolerance (typically < 0.01)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If analytical and numerical DSR diverge beyond tolerance, the analytical formula implementation is incorrect,
      leading to systematic bias in all downstream strategy selection decisions
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-108
    when: When integrating DSR into the strategy selection workflow
    action: Apply DSR correction after each strategy testing is complete and before final selection
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Applying DSR during testing (rather than after) changes the selection criteria mid-experiment, invalidating
      the statistical properties of both the raw and deflated Sharpe ratios
    stage_ids:
    - multiple_testing_correction
  - id: finance-C-109
    when: When passing scraped HTML data to market data ingestion
    action: Parse HTML into structured CSV or HDF5 files with consistent column naming conventions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unstructured data may cause parsing failures downstream, leading to incomplete price series and incorrect
      backtest results
    stage_ids:
    - alternative_data_collection
    - market_data_ingestion
  - id: finance-C-113
    when: When building the Feature DataFrame with MultiIndex (ticker, date)
    action: Verify returns column is NOT normalized/scaled, only feature columns may be scaled
    severity: high
    kind: domain_rule
    modality: must
    consequence: Scaling returns will destroy the signal meaning, causing ML model to learn meaningless patterns and produce
      useless predictions
    stage_ids:
    - feature_engineering
    - prediction_modeling
  - id: finance-C-117
    when: When normalizing technical features for RL environment
    action: Exclude returns column from sklearn.preprocessing.scale() normalization to preserve signal magnitude
    severity: high
    kind: domain_rule
    modality: must
    consequence: Scaled returns will distort the reward signal, causing RL agent to optimize for normalized rather than actual
      returns
    stage_ids:
    - feature_engineering
    - reinforcement_learning_trading
  - id: finance-C-120
    when: When computing backtest Sharpe ratio for deflated Sharpe calculation
    action: Use actual Sharpe ratio from backtest returns, not annualized or adjusted values that may inflate significance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inflated Sharpe inputs to DSR will produce falsely significant results, leading to publication of overfit
      strategies
    stage_ids:
    - backtesting
    - multiple_testing_correction
  - id: finance-C-122
    when: When using deflated Sharpe ratio for publication
    action: Present DSR as definitive proof of strategy viability without specified disclaimers
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting DSR-corrected results as guaranteed will mislead investors about actual expected performance
    stage_ids:
    - backtesting
    - multiple_testing_correction
  - id: finance-C-124
    when: When filtering predictions by investment universe
    action: Apply same universe filter to both predictions and returns to maintain alignment across each securities
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Universe mismatch will cause missing values or misaligned signals for excluded securities
    stage_ids:
    - prediction_modeling
    - backtesting
  - id: finance-C-125
    when: When dropping NaN values from feature DataFrame
    action: Apply dropna() AFTER feature/target creation to avoid removing valid training samples prematurely
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Dropping NaN before feature creation will remove samples with valid prices but missing technical indicators
    stage_ids:
    - feature_engineering
    - prediction_modeling
  - id: finance-C-126
    when: When processing RL observations in TradingEnvironment
    action: Replace infinite values with NaN before dropna() to avoid propagation of inf values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inf values in observations will cause numerical instability in RL agent training
    stage_ids:
    - feature_engineering
    - reinforcement_learning_trading
  - id: finance-C-128
    when: When passing Best-of-N Sharpe ratio for DSR calculation
    action: Pass the actual number of trials (N) that were tested, not just the winning strategy's metrics
    severity: high
    kind: domain_rule
    modality: must
    consequence: Underreporting trial count will make DSR overly optimistic, falsely indicating statistical significance
    stage_ids:
    - prediction_modeling
    - multiple_testing_correction
  - id: finance-C-129
    when: When creating financial DataFrames for use across the ML4T workflow
    action: Use pandas MultiIndex with (ticker, date) levels as the index structure for each financial data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategies and backtesting code assume MultiIndex structure; non-conforming data causes index alignment failures
      and incorrect signal computation
  - id: finance-C-131
    when: When computing technical indicators using TA-Lib that may produce inf/NaN values
    action: Drop NaN and infinite values after technical indicator computation before using features in ML models
    severity: high
    kind: domain_rule
    modality: must
    consequence: TA-Lib functions like STOCHRSI and MACD can produce NaN/inf values at series boundaries, causing ML model
      training failures or silent numerical errors
  - id: finance-C-134
    when: When implementing episode reset in a trading reinforcement learning environment
    action: Randomize the episode start index using np.random.randint(low=0, high=high) to prevent overfitting to specific
      date ranges
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Fixed episode start dates cause the RL agent to learn market patterns specific to those dates, degrading
      generalization to unseen market conditions
  - id: finance-C-135
    when: When requiring reproducible results across runs of any ML or backtesting code
    action: Set numpy random seed to 42 using np.random.seed(42) at module initialization
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Non-deterministic behavior causes ML model training and backtesting results to vary between runs, preventing
      reproducible research and debugging
  - id: finance-C-136
    when: When setting default trading cost parameters in backtesting or RL environments
    action: Express trading costs in basis points using the convention 1e-3 = 10bps default, 1e-4 = 1bps time cost
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent cost representation causes underestimation of transaction costs in backtesting, leading to inflated
      strategy returns that do not reflect real trading
  - id: finance-C-137
    when: When registering a Zipline bundle with custom data
    action: Call register() at module import time (as a side effect of importing the module) to register the bundle before
      backtesting
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bundle not found during backtest initialization when registration is not performed at import time
  - id: finance-C-140
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live trading returns — backtesting ignores market impact, financing
      costs, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-141
    when: When presenting simulated or paper trading results from this system
    action: Present simulated wallet or paper trading results as proof of capability for live execution — paper trading uses
      idealized execution without real market conditions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting paper trading as proof leads users to overestimate system reliability in live markets where order
      fills, latency, and fees differ substantially
  - id: finance-C-142
    when: When presenting or marketing this system's capabilities
    action: Claim this blueprint supports high-frequency trading (HFT) requiring ultra-low latency — the framework uses batch
      processing and polling-based data access
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploying the system for HFT will experience severe latency issues causing missed opportunities and
      adverse fills
  - id: finance-C-143
    when: When presenting or marketing this system's capabilities
    action: Claim this blueprint is suitable for production real-time trading systems — each examples are backtesting demonstrations
      without live execution infrastructure
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will deploy a system without production-grade order management, risk controls, and execution infrastructure,
      leading to operational failures
  - id: finance-C-144
    when: When presenting or marketing this system's capabilities
    action: Claim this blueprint handles regulatory trading compliance — the system has no compliance monitoring, reporting,
      or audit trail mechanisms
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users operating without proper compliance infrastructure risk regulatory violations, fines, and legal consequences
  - id: finance-C-145
    when: When presenting or marketing this system's capabilities
    action: Claim this blueprint is suitable for pure fundamental analysis without ML components — the entire workflow is
      built around ML-driven signal generation
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting traditional fundamental analysis tools will find no implementation of DCF models, ratio analysis,
      or economic indicators
  - id: finance-C-146
    when: When using financial data sourced from yfinance or similar free providers
    action: Claim that the data provides real-time market access — free data providers have inherent delays (15+ minutes for
      yfinance) and are not suitable for live trading
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Trading decisions based on delayed data cause entries at stale prices, resulting in systematic losses in
      fast-moving markets
  - id: finance-C-147
    when: When using Zipline as the backtesting framework
    action: Claim that Zipline supports live trading capability without additional integration — Zipline is a pure backtesting
      framework requiring separate execution adapters
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Users expecting Zipline to execute trades will find no broker integration, leading to failed deployment attempts
    stage_ids:
    - backtesting
  - id: finance-C-149
    when: When evaluating ML model predictions for trading signals
    action: Account for the irreducible prediction error — financial predictions have inherent uncertainty that cannot be
      eliminated by model improvements alone
    severity: high
    kind: domain_rule
    modality: must
    consequence: Overconfident predictions without error bounds lead to excessive leverage and position sizing, resulting
      in severe drawdowns during prediction failures
  - id: finance-C-150
    when: When optimizing trading strategy parameters using historical data
    action: Claim that optimized backtest parameters will perform identically in live trading — parameter optimization overfits
      to historical market regimes
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users allocate capital based on overfitted parameters that fail to generalize, leading to significant losses
      as market conditions change
  - id: finance-C-152
    when: When implementing currency calculations in financial data processing
    action: Use floating-point types (float, double) for currency fields — floating-point representation causes rounding errors
      in monetary calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Floating-point precision errors accumulate in currency calculations, causing discrepancies in P&L reporting,
      margin calculations, and trade settlement amounts
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-153
    when: When implementing financial data processing with currency amounts
    action: Use Python's Decimal type with sufficient precision (minimum 4 decimal places) for each currency calculations,
      including prices, costs, fees, and P&L computations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without Decimal, floating-point errors cause P&L discrepancies in backtests that don't appear in live trading,
      creating reproducibility failures and potential audit violations
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-154
    when: When implementing custom exchange calendar for Algoseek data
    action: Inherit AlgoseekCalendar from XNYSExchangeCalendar and only override open/close time methods — do not modify holiday
      logic or early-close handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Overriding or replacing holiday logic causes backtests to execute trades on exchange holidays when no liquidity
      exists, producing non-reproducible results
    derived_from_bd_id: BD-005
  - id: finance-C-156
    when: When accessing SeekingAlpha for earnings call transcripts
    action: Use Selenium with Chrome/Firefox driver for login-based transcript access — verify webdriver initialization succeeds
      and session persists through navigation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using stateless Scrapy for login-protected content returns authentication errors or empty responses, causing
      missing earnings transcript data in backtests
    derived_from_bd_id: BD-003
  - id: finance-C-157
    when: When configuring Algoseek data ingestion with Zipline bundles
    action: Verify that minutes_per_day=1600 matches the Algoseek data schema (960 regular + 640 extended hours) — adjust
      only if using different Algoseek data products with different trading hours
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Hardcoded 1600 minutes_per_day causes array size mismatch if Algoseek schema changes, resulting in data truncation
      or padding errors in backtests
    derived_from_bd_id: BD-008
  - id: finance-C-158
    when: When implementing feature normalization for ML model training
    action: Use sklearn.preprocessing.StandardScaler (mean=0, std=1) for feature normalization — do not substitute with MinMaxScaler
      without validating outlier handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Substituting MinMaxScaler without analysis causes gradient descent instability with outliers, degrading model
      accuracy and producing suboptimal trading signals
    derived_from_bd_id: BD-010
  - id: finance-C-159
    when: When running backtests with trained models
    action: Assume the framework automatically binds model versions and data snapshots to backtest runs — it does not implement
      version tracking
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit version binding, backtests cannot be reproduced when model or data versions change, causing
      discrepancies between reported and actual performance
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-160
    when: When implementing backtest reproducibility
    action: 'Implement explicit version tracking: record run_id, experiment_id, model_version hash, and data_version hash
      at backtest initialization and persist to metadata log'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing version binding causes inability to reproduce exact backtest conditions, violating audit requirements
      and preventing debugging of performance discrepancies
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-161
    when: When implementing settlement logic for trade execution
    action: Assume the framework handles settlement conventions — the framework does not implement settlement date tracking
      or T+N settlement rules; trades are immediately settled
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without settlement convention handling, backtest results assume immediate settlement which does not match
      actual market T+1 or T+2 settlement rules, causing capital calculation errors and potential margin calls in live trading
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-162
    when: When implementing order execution and position tracking logic
    action: Track settlement_date = trade_date + settlement_days (default T+1 for stocks) and restrict re-trading of unsettled
      positions until settlement is confirmed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without tracking settlement dates, the backtest allows same-day round-trip trades that violate settlement
      rules, causing capital imbalances that don't exist in live trading and producing misleading performance metrics
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-163
    when: When implementing order price validation and fill simulation
    action: Assume the framework handles tick size and lot size rounding — the framework does not implement tick/lot size
      precision; orders are filled at exact requested prices regardless of minimum increment
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without tick/lot size handling, order prices are not rounded to valid price increments, causing fill simulations
      to use prices that cannot execute in live markets and producing inaccurate slippage estimates
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-164
    when: When implementing order price validation and fill simulation
    action: Round order prices to nearest valid tick_size (e.g., price_tick = 0.01 for stocks, price_tick = 0.005 for options)
      and adjust order quantities to valid lot_size (e.g., lot = 100 for A-shares) before simulating fills
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without tick/lot size rounding, simulated fills use non-executable prices that differ from actual execution
      prices, causing systematic slippage estimation errors that accumulate over many trades
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-165
    when: When implementing cross-validation for financial time-series models
    action: Use TimeSeriesCV (purged walking forward split) instead of random K-fold or standard sklearn CV — verify no future
      information leaks into training via overlapping price data at train/test boundaries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using random K-fold for time-series data causes look-ahead bias where future data influences training, producing
      CV estimates that are optimistically biased by 10-30% compared to actual live trading performance
    derived_from_bd_id: BD-013
  - id: finance-C-166
    when: When preprocessing return features in the machine learning pipeline
    action: Apply normalization/standardization to raw return values — returns are already in comparable scale and normalizing
      would destroy the magnitude information essential for distinguishing 5% moves from 0.5% moves
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Normalizing returns makes economically significant moves indistinguishable from noise after scaling, causing
      the model to treat small fluctuations as equivalent to large price changes and degrading prediction accuracy for actionable
      signals
    derived_from_bd_id: BD-011
  - id: finance-C-167
    when: When implementing deflated Sharpe ratio calculation
    action: Use Euler-Mascheroni constant exactly as emc = 0.5772156649 in the deflated Sharpe ratio computation — this constant
      appears in the asymptotic distribution of Sharpe ratio under non-normal returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a different constant value corrupts the deflated Sharpe calculation, causing upward-biased performance
      attribution that leads to selecting strategies that underperform in live trading
    derived_from_bd_id: BD-039
  - id: finance-C-168
    when: When using the framework's default trading_cost_bps and time_cost_bps parameters for backtesting
    action: Verify that trading_cost_bps=0.001 (0.1%) and time_cost_bps=0.0001 (0.01%) match the actual broker fee structure
      including spreads, commissions, and transfer fees; adjust to actual values if needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default trading costs of 0.1% may not reflect actual institutional or retail broker fees; overestimating
      costs penalizes legitimate trading, underestimating causes strategies to appear profitable when they are not
    derived_from_bd_id: BD-031
  - id: finance-C-169
    when: When implementing the Bailey-Lopez deflated Sharpe formula
    action: 'Use np.e (approximately 2.718281828) as the correlation adjustment coefficient in the denominator: analytical_max_sr
      = expected_max_sharpe / (np.e ** (1 - 1/num_trials))'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a different coefficient in the denominator invalidates the Bailey-Lopez correction for multiple testing
      bias, causing the deflated Sharpe to either over or under-correct, leading to strategy selection errors
    derived_from_bd_id: BD-027
  - id: finance-C-171
    when: When processing time-series data in the framework
    action: Assume processing_time and as_of_time are equivalent or interchangeable — these represent distinct temporal concepts
      that must be tracked separately
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Confusing as-of time with processing time causes look-ahead bias or stale data usage, corrupting backtest
      results and leading to strategies that cannot replicate live trading performance
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-172
    when: When executing time-sensitive trading operations
    action: Implement explicit distinction between as_of_time (event timestamp) and processing_time (system timestamp) with
      validation logic that flags mismatches and ensures correct temporal ordering
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without temporal validation, late-arriving data or out-of-order events cause incorrect state representation,
      leading to wrong trading decisions based on corrupted historical states
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-173
    when: When implementing live trading data fetching logic
    action: Assume fetched data is always fresh without stale data detection — the framework does not implement max_age or
      cache_ttl validation for live trading data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without stale data detection, live trading may execute on outdated prices or fundamental data, causing orders
      to be placed at stale levels that have already moved, resulting in significant execution slippage
    derived_from_bd_id: BD-GAP-026
  - id: finance-C-174
    when: When implementing live trading data fetching and caching logic
    action: Implement stale data detection by checking current_time > data_timestamp + max_age, and if cache_ttl is configured,
      verify freshness before use; mark stale data as non-tradable or trigger fresh fetch
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stale data in live trading causes orders to be placed based on outdated information, leading to adverse execution
      at prices that have moved away from the stale quote, accumulating losses over many trades
    derived_from_bd_id: BD-GAP-026
  - id: finance-C-175
    when: When implementing or refactoring dividend adjustment logic in backtesting
    action: Preserve the explicit bypass of dividend adjustments as documented; do not automatically add dividend data processing
      without first verifying the broken implementation is fixed and tested
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping dividend adjustments means total return calculations exclude dividend income, making backtest results
      incomplete and potentially misleading for dividend-paying stocks and long-horizon strategies
    derived_from_bd_id: BD-056
  - id: finance-C-176
    when: When implementing web scraping middleware for data collection
    action: Use configurable user agent rotation list from settings; do not hardcode a single user agent or remove the rotation
      logic during refactoring
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Single static user agent increases blocking risk from target servers, causing data collection failures and
      gaps in alternative data pipelines that require consistent historical coverage
    derived_from_bd_id: BD-059
  - id: finance-C-177
    when: When implementing price data loading for large security universes in backtesting
    action: Use ticker generator pattern for lazy loading that defers data fetching until each symbol is requested; do not
      replace with eager loading that loads the entire dataset into memory simultaneously
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Eager loading of large security universes causes memory exhaustion when processing thousands of securities,
      preventing backtesting from completing and requiring expensive hardware upgrades
    derived_from_bd_id: BD-052
  - id: finance-C-178
    when: When implementing reinforcement learning episode initialization in trading environment
    action: Use random starting position selection in reset() to introduce episode diversity across market regimes; do not
      refactor to use fixed starting points that create temporal correlation in training data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fixed episode start points cause the agent to overfit to specific market regimes at the beginning of historical
      data, reducing generalization to unseen periods and creating temporal correlation in experience replay
    derived_from_bd_id: BD-080
  - id: finance-C-180
    when: When implementing or modifying reinforcement learning environment reset and step logic
    action: Maintain the asymmetry where reset() uses random starting index while take_step() uses fixed step increment; document
      this asymmetry explicitly to prevent unintentional changes that would destroy trajectory reproducibility
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Randomizing step increments in take_step() would make trajectory analysis impossible for reproducibility
      verification, preventing debugging of learned policies and strategy auditing
    derived_from_bd_id: BD-096
  - id: finance-C-181
    when: When implementing reinforcement learning episode termination logic in trading environment
    action: Use symmetric termination thresholds at NAV <= 0.0 OR NAV >= 2.0 (100% loss or 100% gain from initial NAV=1.0);
      do not replace with fixed episode length or asymmetric thresholds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fixed episode length allows unlimited drawdown beyond 100% loss, removing bounded risk guarantees; asymmetric
      termination thresholds would distort reward shaping and risk management assumptions
    derived_from_bd_id: BD-097
  - id: finance-C-182
    when: When implementing feature pipeline with TA-Lib indicators for reinforcement learning
    action: 'Preserve raw OHLCV data before computing indicators; implement logging of NaN/inf occurrence patterns to detect
      silent data loss from the cascade: TA-Lib produces NaN/inf for edge cases → dropna removes affected rows → raw OHLCV
      data is already gone'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Silent data loss occurs when NaN/inf rows cluster around specific market regimes (e.g., low volatility periods),
      systematically eliminating training examples from those periods and causing model bias that accumulates silently
    derived_from_bd_id: BD-113
  - id: finance-C-183
    when: When calibrating trading cost parameters in reinforcement learning reward function
    action: Perform sensitivity analysis across multiple bps values (e.g., 5, 10, 15, 20 bps) since the reward function reward
      = position * return - costs compounds costs multiplicatively with position size and every trade
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategies appearing profitable at 10bps may be unprofitable at 15bps due to cost amplification through position-return
      products; incorrect cost calibration leads to strategies that look good in backtest but lose money in live trading
    derived_from_bd_id: BD-107
  - id: finance-C-186
    when: When implementing momentum indicators in the DRL trading environment
    action: Use Ultimate Oscillator with three lookback periods (7, 14, 28) — the multi-timeframe combination reduces false
      signals from single-period indicators by weighting short, medium, and long-term momentum
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing Ultimate Oscillator with single-period RSI loses multi-timeframe robustness, causing the agent
      to misinterpret short-term noise as momentum signals and execute trades at suboptimal entry/exit points
    derived_from_bd_id: BD-075
  - id: finance-C-187
    when: When implementing cross-validation for financial datasets
    action: Use KFold with 5 splits and shuffle=True for balanced class distribution across folds; 5 splits provide 80/20
      train-test splits balancing bias-variance tradeoff
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without shuffling, KFold may create imbalanced class distributions across folds, causing unreliable performance
      estimates that lead to deploying underperforming strategies
    derived_from_bd_id: BD-081
  - id: finance-C-189
    when: When implementing cross-validation for small financial datasets with severe sample constraints
    action: Use LeaveOneOut cross-validation to maximize training data utilization when dataset is severely limited (<100
      observations), but apply with caution due to high variance in estimates
    severity: high
    kind: operational_lesson
    modality: must
    consequence: LeaveOneOut with insufficient data produces high-variance performance estimates; strategies may appear to
      perform well but fail consistently in out-of-sample testing due to overfitting to individual observations
    derived_from_bd_id: BD-083
  - id: finance-C-190
    when: When implementing price-based features in the DRL trading environment
    action: Normalize features using ATR (Average True Range) instead of standard deviation to properly handle gapped moves
      and daily price ranges across high and low volatility regimes
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Standard deviation-based normalization fails to account for gapped overnight moves and true daily ranges,
      causing features to misrepresent volatility during market stress events and leading to poorly calibrated position sizing
    derived_from_bd_id: BD-073
  - id: finance-C-191
    when: When implementing return-based features in the DRL trading environment
    action: Use 5 distinct lookback windows (1-5, 10, 21, 42, 63 days) to capture multi-scale price dynamics from short-term
      to longer-term trends; do not reduce to fewer windows
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Single or reduced lookback windows cannot distinguish between short-term trend-following and medium-term
      mean-reversion opportunities, causing the agent to misinterpret market regime changes and execute inappropriate strategies
    derived_from_bd_id: BD-076
  - id: finance-C-192
    when: When setting episode length for DRL training in financial markets
    action: Use 252 trading days (1 trading year) as episode length to capture seasonal patterns, earnings cycles, and macro-economic
      effects while maintaining computational feasibility
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Shorter episodes lose seasonal patterns and earnings cycle information, while longer episodes increase return
      variance without proportional learning benefits
    derived_from_bd_id: BD-077
  - id: finance-C-193
    when: When implementing transaction cost modeling in the DRL trading environment
    action: Use 10bps per-trade cost and 1bps per-period holding cost to reflect realistic institutional execution including
      spread, commission, and market impact
    severity: high
    kind: domain_rule
    modality: must
    consequence: Underestimating transaction costs causes the agent to learn over-trading strategies that appear profitable
      in backtesting but incur unsustainable costs in live trading, leading to significant capital erosion
    derived_from_bd_id: BD-078
  - id: finance-C-194
    when: When defining the action space for a DRL trading agent
    action: Use discrete SHORT/HOLD/LONG action space — this 3-action design captures directional market exposure without
      continuous position sizing complexity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Simplifying to 2-action space (UP/DOWN) eliminates short-selling capability, preventing the agent from profiting
      in bear markets or hedging long positions
    derived_from_bd_id: BD-079
  - id: finance-C-195
    when: When implementing cross-validation for reinforcement learning trading model evaluation
    action: Use ShuffleSplit cross-validation to obtain Monte Carlo estimates with known variance properties — do not replace
      with single KFold which lacks variance estimation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using KFold instead of ShuffleSplit loses variance estimation capability; without Monte Carlo averaging over
      random partitions, model selection becomes unstable and may choose suboptimal trading strategies
    derived_from_bd_id: BD-084
  - id: finance-C-196
    when: When selecting models based on alpha signal evaluation using financial returns
    action: Use Spearman rank correlation for model selection — do not use Pearson correlation which assumes normality and
      linearity and is less robust for returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pearson correlation on non-normal financial returns can produce misleading correlation estimates, causing
      model selection to favor strategies with spurious correlations that fail in live trading
    derived_from_bd_id: BD-085
  - id: finance-C-197
    when: When comparing performance across multiple trading strategies in backtesting
    action: Use Deflated Sharpe Ratio to adjust observed Sharpe for selection bias from multiple trials — do not use raw Sharpe
      ratio which ignores selection bias
    severity: high
    kind: domain_rule
    modality: must
    consequence: Standard Sharpe ratio ignores selection bias from testing multiple strategies, causing overfitting where
      selected strategies appear to outperform but actually underperform in live trading due to lucky backtest selection
    derived_from_bd_id: BD-088
  - id: finance-C-198
    when: When processing buy/sell orders and calculating cumulative returns in backtesting
    action: Assume PnL conservation is automatically implemented by the framework — the framework does not validate that cumulative
      PnL equals the sum of individual transaction PnLs
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit PnL validation, rounding errors, slippage assumptions, or fee calculation bugs accumulate
      silently, causing backtest equity curves to diverge from actual trading results by 1-5% over time
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-199
    when: When managing alternative data for production trading systems
    action: 'Implement explicit PnL conservation checks: validate total_realized_pnl equals sum(position_pnl) at each rebalance
      point, and log discrepancies exceeding 0.01% tolerance'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without PnL conservation validation, fee calculation errors, rounding issues, or position tracking bugs cause
      silent capital erosion that compounds over thousands of trades
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-200
    when: When loading model checkpoints and corresponding training datasets for production inference
    action: Assume model/data version binding is automatically tracked by the framework — the framework does not enforce that
      model weights are paired with the exact dataset version used during training
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without version binding, using model weights with a different dataset version causes silent prediction drift;
      a model trained on normalized data receiving unnormalized inputs produces systematically incorrect trading signals
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-201
    when: When managing alternative data in production trading systems
    action: 'Implement model/data version binding: store model checkpoint with metadata including training_dataset_version,
      data_preprocessing_hash, and timestamp; validate version match before loading'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Model/data version mismatch causes silent prediction failures where a model trained on specific data preprocessing
      receives incompatible input formats, leading to incorrect position sizing and trade execution
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-202
    when: When working with financial data fields containing monetary values or quantities
    action: Assume currency/unit annotation is automatically attached by the framework — the framework does not embed denomination
      metadata (USD, CNY, JPY) or unit specifications (shares, contracts) in data fields
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without currency/unit annotation, mixing JPY and USD values in calculations causes 100x errors, and treating
      shares as contracts creates position sizing errors that lead to margin calls or failed trades
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-203
    when: When managing alternative data in production trading systems
    action: 'Add explicit currency and unit metadata to each financial data fields: annotate denomination (currency_code field:
      USD/CNY/JPY) and measurement unit (unit field: shares/contracts/percent); validate no implicit assumptions across data
      sources'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing currency annotations cause cross-border strategy failures where USD positions mixed with JPY data
      produce incorrect leverage calculations, triggering margin violations and forced liquidations
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-204
    when: When computing expected maximum Sharpe ratio across multiple strategy trials for selection bias correction
    action: Use analytical expected max Sharpe computation via extreme value approximation for fast computation; verify parameters
      n_trials, n_observations, sharpe_mean, and sharpe_std are passed correctly to the analytical formula
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect parameter passing to analytical Sharpe computation produces wrong selection bias estimates, causing
      over-optimistic strategy rankings that select overfitted strategies
    derived_from_bd_id: BD-086
  - id: finance-C-205
    when: When validating Sharpe ratio selection bias correction in strategy backtesting
    action: Use Monte Carlo simulation to validate analytical approximation when trial count or observation count deviates
      from asymptotic conditions; compare MC distribution with analytical estimate and flag discrepancies exceeding 5%
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Relying solely on analytical approximation under non-asymptotic conditions produces biased DSR estimates,
      leading to strategy selection errors where overfitted strategies pass the bias correction test
    derived_from_bd_id: BD-087
  - id: finance-C-206
    when: When initializing any stochastic component in ML4T workflows (DNN weights, dropout, sampling, data shuffling)
    action: Set random seed to 42 before any stochastic operations to verify deterministic results across runs — do not run
      experiments without fixed seed
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without fixed random seed, stochastic training produces non-reproducible model parameters, causing strategy
      comparisons to be confounded by initialization randomness rather than actual strategy differences
    derived_from_bd_id: BD-089
  - id: finance-C-207
    when: When converting bundle data for decision tree/random forest model training
    action: Use default interval '1d' for bundle conversion to verify daily OHLCV bars are used as primary granularity — do
      not assume intraday patterns are captured when interval is set to daily
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Using minute-level data with daily-interval trained models causes feature mismatch where intraday patterns
      cannot be represented by daily-bar features, leading to systematically incorrect predictions
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-208
    when: When implementing technical indicator calculations in backtesting
    action: Use TA-Lib library for RSI, Stochastic, and other technical indicators — do not replace with custom implementations
      that may produce different numerical results
    severity: high
    kind: domain_rule
    modality: must
    consequence: Custom implementations of complex indicators like RSI and Stochastic may produce different numerical outputs
      than the industry-standard TA-Lib, causing backtest results to diverge from professional trading systems and live trading
      signals
    derived_from_bd_id: BD-009
  - id: finance-C-210
    when: When implementing position representation and action space in trading environment
    action: 'Maintain discrete 3-value position representation: -1 (short), 0 (neutral), 1 (long) — do not expand to continuous
      position sizing or add additional discrete values without retraining the agent'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Expanding position representation from discrete -1/0/1 to continuous values [-1,1] changes the action space
      requiring full agent retraining; backtests using mismatched position interpretations produce incorrect P&L calculations
      and strategy signals
    derived_from_bd_id: BD-016
  - id: finance-C-211
    when: When evaluating and selecting alpha signals in quantitative strategy development
    action: Use Spearman rank correlation for alpha signal evaluation instead of Pearson correlation — Spearman measures monotonic
      relationship robustness to outliers common in financial returns
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using Pearson correlation for alpha selection is sensitive to outliers in financial returns, potentially
      selecting inferior signals that perform well linearly but fail under real market conditions with fat-tailed distributions
    derived_from_bd_id: BD-040
  - id: finance-C-212
    when: When implementing web scraping for alternative data collection
    action: Implement randomized delay between 7-9 seconds (8 +/- 1) between page requests — shorter delays risk IP blocking,
      longer delays excessively slow data collection
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using fixed delays or delays shorter than 7 seconds increases risk of IP blocking by target servers, halting
      all data collection; delays longer than 15 seconds unnecessarily extend collection time without reducing blocking risk
    derived_from_bd_id: BD-043
  - id: finance-C-213
    when: When implementing feature scaling in the trading environment's feature engineering pipeline
    action: Use sklearn.preprocessing.scale for feature scaling — do not substitute with MinMaxScaler or RobustScaler
    severity: high
    kind: domain_rule
    modality: must
    consequence: MinMaxScaler is sensitive to outliers common in financial data, causing feature distributions to be compressed
      toward the median and distorting model learning; RobustScaler adds complexity without sufficient benefit for this use
      case
    derived_from_bd_id: BD-033
  - id: finance-C-214
    when: When applying sklearn.preprocessing.scale to features in the trading environment
    action: Explicitly exclude returns columns from sklearn.preprocessing.scale operations — returns must preserve their natural
      scale to maintain percentage change interpretation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Including returns in scaling destroys their natural distribution and magnitude, causing the RL agent to interpret
      normalized returns as dimensionless values rather than actual percentage changes, leading to incorrect position sizing
      decisions
    derived_from_bd_id: BD-033
  - id: finance-C-215
    when: When implementing return calculation for feature engineering in the trading environment
    action: Calculate returns at horizons of 1, 2, 5, 10, and 21 days using pct_change — these specific horizons are mandatory
      for capturing both short-term noise and medium-term trends
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different return horizons changes the temporal resolution of features, causing the RL agent to operate
      on different timescales than intended; finer granularity (hourly) increases computational cost without proportional
      benefit, while coarser horizons (60+ days) miss short-term trading signals
    derived_from_bd_id: BD-035
  - id: finance-C-216
    when: When implementing return feature calculation without explicit horizon specification
    action: Verify that return horizons match the intended set [1, 2, 5, 10, 21] days rather than using default lookback values
      which may differ in timeframe coverage and miss relevant trading signals
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default return horizons may differ from the intended [1, 2, 5, 10, 21] selection, causing the model to train
      on signals at different timescales than live trading expects, leading to strategy underperformance in production
    derived_from_bd_id: BD-035
  - id: finance-C-219
    when: When implementing step-based cost calculation in the trading environment
    action: Apply trading costs using `costs[max(0, step-1)]` — costs must appear one step AFTER the trade that generated
      them, not in the same step
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Same-step cost application creates immediate feedback loops causing overly conservative policies; backtest
      results become inconsistent with delayed reward contract assumptions
    derived_from_bd_id: BD-092
  - id: finance-C-220
    when: When implementing reward calculation in the trading environment's take_step method
    action: Calculate reward as `returns[t] * position[t-1]` — the previous position earns returns on the current market move,
      not the current position
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using position[t] * returns[t] assumes perfect execution speed unrealistic in live trading; backtest results
      become non-reproducible due to look-ahead bias from immediate reward recognition
    derived_from_bd_id: BD-091
  - id: finance-C-221
    when: When selecting the best alpha model for backtesting
    action: Use Spearman rank correlation (scipy.stats.spearmanr) for model selection — maximize rho value, not MSE/RMSE;
      rank correlation captures monotonic relationship regardless of linear scaling
    severity: high
    kind: domain_rule
    modality: must
    consequence: MSE/RMSE selection requires perfectly calibrated probability outputs; using these metrics instead of Spearman
      causes suboptimal model selection, leading to strategies that underperform due to scale-sensitive metric optimization
    derived_from_bd_id: BD-098
  - id: finance-C-222
    when: When processing datetime fields from alternative data sources (transcripts, earnings calls)
    action: Assume datetime fields are timezone-aware or consistently formatted — the framework lacks timezone normalization
      to UTC, and naive datetime operations may silently produce incorrect results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Timezone mismatches cause off-by-one-day errors when comparing earnings across international markets; backtest
      timestamps become inconsistent with actual event dates
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-223
    when: When parsing datetime from Seeking Alpha transcript titles or URLs
    action: Parse dates using MM-DD-YY format for US date representations and Q1-Q4 patterns for fiscal quarters — do not
      replace with more flexible parsers like dateutil without explicit justification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect date parsing causes fiscal period misalignment; earnings data organized by wrong dates becomes
      non-comparable across years, breaking chronological analysis
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-224
    when: When implementing transcript title parsing for Seeking Alpha data collection
    action: Extract dates using MM-DD-YY format and fiscal quarters using Q1-Q4 patterns — these patterns enable automatic
      fiscal period identification essential for chronological organization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing to more flexible date parsers (dateutil) introduces complex error handling risks; incorrect date
      parsing breaks earnings data chronology and cross-year quarter comparisons
    derived_from_bd_id: BD-045
  - id: finance-C-225
    when: When implementing or modifying reward or cost calculation logic in DRL agent training
    action: Verify reward and cost timing conventions remain synchronized with one-step delay (reward[t] = position[t-1] *
      returns[t], costs[max(0, step-1)]) — any modification to either timing contract requires updating both to maintain consistent
      temporal credit assignment
    severity: high
    kind: operational_lesson
    modality: must
    consequence: If only one timing contract is modified while the other remains unchanged, reward attribution becomes incorrect
      and policy gradients develop systematic bias, causing the agent to converge on suboptimal trading policies that either
      over- or under-estimate position values
    derived_from_bd_id: BD-110
  - id: finance-C-227
    when: When selecting cross-validation strategy for financial ML models in the same codebase
    action: Use TimeSeriesSplit or TimeSeriesCV consistently across each financial ML tasks — avoid mixing with KFold + shuffle
      for different model types as this creates inconsistent validation approaches
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent validation approaches cause some models to leak future information while others respect temporal
      order, making strategy comparisons misleading and potentially selecting models based on artificially inflated performance
      metrics
    derived_from_bd_id: BD-106
  - id: finance-C-228
    when: When implementing asset lifecycle management and defining the trading period boundaries
    action: Set auto_close_date to end_date + 1 day to verify assets remain tradeable throughout their designated period including
      the final trading day
    severity: high
    kind: domain_rule
    modality: must
    consequence: Premature asset closure caused by using exact end_date would exclude valid trading opportunities on the last
      available data date, reducing backtest performance and misrepresenting actual trading potential
    derived_from_bd_id: BD-053
  - id: finance-C-229
    when: When configuring reinforcement learning trading episode termination parameters
    action: Verify that episode termination thresholds (NAV=0 for loss, NAV=2.0 for 100% return win) match the specific strategy
      risk tolerance and capital requirements before using default values
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default NAV termination thresholds without validation may cause premature episode ending or excessive
      computation on strategies with different risk profiles, leading to suboptimal training outcomes
    derived_from_bd_id: BD-038
  - id: finance-C-230
    when: When mapping security tickers between data sources for backtesting
    action: Verify that NASDAQ symbols from pandas_datareader correctly map to the target data provider's symbol conventions;
      validate ticker coverage for the complete universe before assuming alignment
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect ticker mapping caused by mismatched symbol conventions between data sources would cause security
      identification failures, resulting in missing or incorrect price data in backtest results
    derived_from_bd_id: BD-050
  - id: finance-C-232
    when: When implementing or refactoring action-to-position mapping logic in the backtesting framework
    action: Verify any refactoring of action-position mapping updates each occurrences of the mapping logic (action-1 offset)
      across the codebase simultaneously
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Modifying only one instance of the action-position mapping causes positions to be inverted, making strategies
      take opposite positions than intended; live trading will execute inverse trades to backtest assumptions
    derived_from_bd_id: BD-109
  - id: finance-C-233
    when: When using adjusted close prices (adj_close) from Quandl Wiki or Algoseek data sources for backtesting dividend-paying
      stocks
    action: Verify that the dividend adjustment pipeline is functioning correctly; if dividend adjustments are skipped or
      incomplete, explicitly document this limitation and exclude dividend returns from strategy performance metrics
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using adj_close while dividend adjustment is broken creates partially-adjusted prices, causing total return
      calculations to be understated for dividend-paying stocks; strategies expecting full dividend reinvestment will show
      lower backtest returns than actual live performance
    derived_from_bd_id: BD-111
  - id: finance-C-234
    when: When preparing backtesting data with adjusted close prices from Quandl Wiki
    action: Use 'adj_close' field for Quandl Wiki prices to account for splits and dividends; do not substitute with unadjusted
      'close' prices
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using unadjusted close prices during corporate actions causes backtest performance to be distorted; stock
      splits make per-share metrics appear artificially inflated or deflated, producing non-reproducible backtest results
    derived_from_bd_id: BD-063
  - id: finance-C-235
    when: When merging prediction data with price data for backtesting
    action: Use 'right' join strategy when merging predictions with prices to retain each price observations; do not switch
      to inner join or left join without explicit justification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching to inner join excludes valid price points when predictions have gaps, causing the backtest to miss
      trading opportunities and underestimate strategy returns; left join creates gaps in price series affecting indicator
      calculations
    derived_from_bd_id: BD-064
  - id: finance-C-236
    when: When implementing walk-forward cross-validation with 126/21 training/testing splits
    action: Verify that the effective training window accounts for the lookback-1 gap; explicitly calculate effective training
      size as (split_window - lookback_gap) and document this in the CV configuration
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: With 126/21 splits across 7+ folds, cumulative training data loss compounds to 7+ days per fold transition,
      causing the model to train on progressively smaller effective windows than expected, leading to underfitting in later
      folds and unreliable strategy evaluation
    derived_from_bd_id: BD-112
  - id: finance-C-237
    when: When running long crawling jobs for data collection
    action: Implement post-crawl data completeness validation by checking for missing restaurants/dates after each batch,
      and retry failed URLs rather than marking as success
    severity: high
    kind: operational_lesson
    modality: must
    consequence: The Scrapy-Splash-random-delay cascade causes partial render failures to be marked as success, creating sparse
      datasets where some restaurants or dates are silently missing; accumulated partial failures distort statistical analysis
      and strategy signals based on incomplete data
    derived_from_bd_id: BD-114
  - id: finance-C-238
    when: When processing historical price data for stock splits
    action: Run the stock split adjustment preprocessing step before any returns calculations; check that split_table is populated
      and applied to price columns using adjusted_price = raw_price / split_ratio
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unadjusted prices show artificial gaps at split dates, causing decision trees to make incorrect splits based
      on price discontinuities rather than true market movements, leading to strategies that would behave differently in live
      trading
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-239
    when: When tracking historical security data through corporate actions
    action: Use sid (security identifier) as the primary key for each historical lookups and portfolio tracking; implement
      ticker-to-sid mapping for user-facing queries while maintaining internal sid continuity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using ticker-only tracking breaks historical continuity when companies rename or merge (e.g., GOOGL 2015
      split), causing backtests to show discontinuous price history and incorrect position sizing across corporate actions
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-240
    when: When implementing position sizing logic in the trading environment
    action: Calculate end_position as action - 1, where action 0 produces short position (-1), action 1 produces neutral (0),
      and action 2 produces long position (+1); do not modify this offset formula
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the action-to-position mapping (e.g., to action+1 or lookup tables) inverts trading signals, causing
      short positions to become long and vice versa, leading to strategies that lose money in the opposite direction of expectations
    derived_from_bd_id: BD-069
  - id: finance-C-241
    when: When implementing signal-to-execution timing alignment in backtesting
    action: Assume the framework handles bar-level signal-to-execution timing alignment — the framework does not implement
      bar execution timing controls; signals at bar N may be executed at bar N instead of N+1
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without bar execution timing controls, signals execute at incorrect bars causing look-ahead bias or stale
      signal execution, leading to backtest results that cannot be reproduced in live trading
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-242
    when: When implementing signal generation and execution logic in backtesting
    action: Implement bar-level execution timing alignment — verify signals generated at bar N are executed at bar N+1 (next
      bar), and validate timing alignment in the execution layer with explicit timestamp matching
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper bar-level timing alignment, intraday strategies execute signals at incorrect price points,
      causing backtest equity curves to diverge materially from live trading performance
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-243
    when: When implementing order management logic in backtesting
    action: Assume the framework tracks order state transitions automatically — the framework does not implement order lifecycle
      state machine; orders may proceed from pending to filled without proper state validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without an order lifecycle state machine, invalid state transitions (e.g., cancelled→filled) are not caught,
      causing order tracking errors and incorrect position calculations in backtesting
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-244
    when: When implementing order management logic in backtesting
    action: Implement an explicit order lifecycle state machine with valid states (pending, submitted, partially_filled, filled,
      cancelled, rejected) and validate each transitions; log each state change with timestamp and reason code
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without an explicit order state machine, order tracking errors accumulate silently, causing position discrepancies
      between backtest records and actual trade history that are difficult to audit
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-245
    when: When implementing position sizing and risk management in backtesting
    action: Assume the framework enforces position sizing limits and aggregate risk caps automatically — the framework does
      not implement position size or risk ceiling controls; positions may exceed defined limits
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without position sizing and risk ceiling enforcement, strategies may accumulate oversized positions exceeding
      risk tolerance, causing catastrophic losses that backtesting fails to capture
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-246
    when: When implementing order submission logic in backtesting
    action: Implement position size validation against max_position_size per instrument and portfolio_risk_limit in aggregate;
      reject or scale orders that would breach these thresholds before submission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without position size validation, orders may exceed per-instrument or portfolio-level risk limits, causing
      realized losses far exceeding backtested expectations in live trading
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-247
    when: When implementing backtesting strategy validation
    action: Assume the backtester detects and prevents overfitting automatically without explicit out-of-sample validation
      — the framework does not implement overfitting protection mechanisms
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without overfitting protection, strategies that appear profitable in backtest may be entirely fitted to noise,
      producing live trading results that are dramatically worse than backtested performance
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-248
    when: When validating strategy performance before deployment
    action: Implement out-of-sample validation by splitting historical data into training set and holdout set; only deploy
      strategies with Sharpe ratio degradation < 20% on holdout data compared to training data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without out-of-sample validation, overfitted strategies pass backtesting but fail in live trading, causing
      sustained losses as the strategy trades on noise patterns that have no predictive power
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-249
    when: When implementing finite difference option pricing models
    action: Assume finite difference grids remain numerically stable without explicit stability validation — the framework
      does not implement grid stability checks; unstable grids produce meaningless option prices
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without grid stability validation, unstable finite difference grids produce oscillating or diverging option
      prices, causing systematic mispricing that leads to incorrect Greeks and flawed hedging decisions
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-250
    when: When implementing finite difference option pricing models
    action: 'Implement CFL stability condition validation: verify dt <= dx²/(2σ²S²) for each grid points before solving; if
      any cell violates stability, reject the grid with error and require parameter adjustment (reduce dt or increase grid
      points)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without CFL condition validation, unstable grids produce nonsensical option values causing systematic hedging
      errors, with Greeks that may be orders of magnitude off from correct values
    derived_from_bd_id: BD-GAP-017
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
