resources:
  packages:
  - name: httpx>=0.25.0
    version_pin: latest
  - name: pandas>=2.0.0
    version_pin: latest
  - name: pyarrow>=17.0.0
    version_pin: latest
  - name: beautifulsoup4>=4.10.0
    version_pin: latest
  - name: lxml>=4.4
    version_pin: latest
  - name: pydantic>=2.0.0
    version_pin: latest
  - name: stamina>=24.2.0
    version_pin: latest
  - name: pyrate-limiter>=3.0.0
    version_pin: latest
  - name: httpxthrottlecache>=0.3.0
    version_pin: latest
  - name: truststore>=0.9.0
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install httpx>=0.25.0
    - python3 -m pip install pandas>=2.0.0
    - python3 -m pip install pyarrow>=17.0.0
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing SEC EDGAR data retrieval
    action: Set User-Agent identity before making any SEC API requests
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: SEC rejects requests without valid User-Agent identity, raising IdentityNotSetException and blocking all
      filing access
    stage_ids:
    - data_retrieval
  - id: finance-C-002
    when: When querying SEC EDGAR for filing data
    action: Respect the SEC rate limit of 10 requests per second
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Exceeding 10 req/sec triggers SEC IP block for 10 minutes, causing TooManyRequestsError and extending the
      block if requests continue
    stage_ids:
    - data_retrieval
  - id: finance-C-010
    when: When handling SEC rate limit violations
    action: Wait at least 10 minutes before retrying after receiving HTTP 429
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Immediate retry extends the IP block duration, potentially causing hours of data access loss
    stage_ids:
    - data_retrieval
  - id: finance-C-021
    when: When handling rate limit errors during bulk data retrieval
    action: Immediately retry requests to check if block expired
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Probing SEC rate limit blocks extends the block duration significantly, potentially causing hours of access
      loss
    stage_ids:
    - data_retrieval
  - id: finance-C-022
    when: When implementing rapid-fire filing queries for any company
    action: Implement 10+ seconds gap between requests to stay within rate limits
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Rapid successive requests exhaust rate limit within seconds, triggering 10-minute IP blocks that prevent
      access to critical filing data
    stage_ids:
    - data_retrieval
  - id: finance-C-027
    when: When parsing HTML input
    action: Validate HTML is string or bytes type before processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: HTML parsing will fail with TypeError if None or unsupported types are passed, causing silent failures or
      crashes in production pipelines
    stage_ids:
    - html_parsing
  - id: finance-C-028
    when: When configuring HTML parser
    action: Verify max_document_size is positive integer
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid configuration with non-positive max_document_size will cause DocumentTooLargeError on all documents
      or silent failures
    stage_ids:
    - html_parsing
  - id: finance-C-031
    when: When parsing large HTML documents
    action: Switch to streaming parser when document exceeds streaming_threshold (10MB default)
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Non-streaming parsing of documents >10MB will cause OOM errors or extreme memory usage, making the system
      unusable for large NPORT-P filings
    stage_ids:
    - html_parsing
  - id: finance-C-037
    when: When implementing document parsing
    action: Limit document size to 160MB maximum to prevent resource exhaustion
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Parsing documents exceeding 160MB without size check will cause OOM errors, potentially crashing the entire
      service for all users
    stage_ids:
    - html_parsing
  - id: finance-C-052
    when: When parsing XBRL date strings
    action: Validate date format strictly using YYYY-MM-DD pattern with proper leap year and month-end day checks
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid XBRL dates (e.g., February 31) cause downstream financial calculations to fail or produce incorrect
      results
    stage_ids:
    - xbrl_processing
  - id: finance-C-053
    when: When building XBRL fact dictionaries
    action: Extract and include concept, value, period, and unit attributes from every fact
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Financial analysis queries return incomplete or misleading results when essential fact attributes are missing
    stage_ids:
    - xbrl_processing
  - id: finance-C-054
    when: When processing XBRL periods
    action: Distinguish between 'instant' (point-in-time) and 'duration' (range) period types correctly
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Balance sheet data is incorrectly associated with range periods, causing stockholder equity calculations
      to be wrong
    stage_ids:
    - xbrl_processing
  - id: finance-C-055
    when: When selecting periods for balance sheet statements
    action: Use instant periods only since balance sheets represent point-in-time snapshots
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Balance sheet rendered with duration periods shows nonsensical date ranges instead of 'As of' point-in-time
      values
    stage_ids:
    - xbrl_processing
  - id: finance-C-059
    when: When selecting XBRL reporting periods
    action: Filter out periods that end after the document date to prevent future date bugs
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Filing from 2024 incorrectly includes periods from 2026-2029, causing analysis to assume future data exists
    stage_ids:
    - xbrl_processing
  - id: finance-C-077
    when: When converting stitched statement data to a pandas DataFrame for period-over-period calculations
    action: preserve the chronological period column ordering (newest first) as produced by the stitcher
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Period-over-period calculations using .shift(1) will produce incorrect results because shifted values will
      reference wrong time periods, corrupting trend analysis and financial ratios
    stage_ids:
    - statement_stitching
  - id: finance-C-082
    when: When performing period selection for stitched statements
    action: use exact date matching for document_period_end_date, with no approximate tolerance
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Approximate matching with tolerance (3-day, 14-day) causes wrong fiscal year/quarter selection, leading to
      incorrect multi-period financial analysis (PERIOD_MATCHING_BUG_ANALYSIS)
    stage_ids:
    - statement_stitching
  - id: finance-C-087
    when: When creating DataFrame from stitched statement for financial analysis
    action: verify period columns appear in reverse chronological order (newest first) for correct shift(1) behavior
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Period-over-period calculations using pandas shift() will reference wrong periods, producing incorrect financial
      ratios and trend indicators
    stage_ids:
    - statement_stitching
  - id: finance-C-110
    when: When parsing ownership XML content
    action: validate that the XML root element is ownershipDocument before extracting form data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Parsing will fail with opaque error or return empty ownership object, making all subsequent analysis impossible
    stage_ids:
    - ownership_reporting
  - id: finance-C-128
    when: When implementing AI context generation for edgartools objects
    action: Implement to_context(detail='standard') method following HasContext Protocol
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: LLM agents will not be able to generate AI-optimized context for the object, breaking the integration layer
      contract
    stage_ids:
    - ai_integration
  - id: finance-C-132
    when: When implementing MCP tools for AI agents
    action: Use @tool decorator for registration and return ToolResponse dataclass
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Tools will not be discoverable via list_tools and responses will lack consistent JSON structure
    stage_ids:
    - ai_integration
  - id: finance-C-135
    when: When using MCP server for production pipelines
    action: Respect SEC rate limits (max 10 req/sec) and set EDGAR_IDENTITY environment variable
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: SEC blocks persistent violators with 429 errors; anonymous requests face stricter limits
    stage_ids:
    - ai_integration
  - id: finance-C-136
    when: When receiving SEC 429 rate limit error
    action: Retry immediately or within short timeframe
    severity: fatal
    kind: operational_lesson
    modality: must_not
    consequence: SEC blocks persistent violators; repeated violations may result in extended IP bans
    stage_ids:
    - ai_integration
  - id: finance-C-137
    when: When iterating over company filings
    action: Apply .head() or limit before iterating to prevent unbounded API calls
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Unbounded iteration exhausts SEC rate limits within seconds, blocking all subsequent requests
    stage_ids:
    - ai_integration
  - id: finance-C-141
    when: When presenting MCP server results as investment advice
    action: Claim the system provides financial analysis or investment recommendations
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Regulatory compliance violation; system only retrieves SEC filings, not investment advice
    stage_ids:
    - ai_integration
  - id: finance-C-149
    when: When parsing CMBS XML EX-102 exhibits
    action: Handle both namespaced and non-namespaced XML elements
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: CMBS filings may use XML with or without SEC namespace prefixes. Without namespace handling, loan and property
      data extraction returns empty DataFrames, losing critical asset-level data
    stage_ids:
    - abs_filing_processing
  - id: finance-C-168
    when: When calculating period-over-period comparisons
    action: Use consecutive periods sorted by date in descending order to verify the current period is compared with the immediately
      preceding period
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Comparison calculations will produce incorrect percentage changes, showing Q3 vs Q1 instead of Q3 vs Q2,
      leading to misleading financial analysis
    stage_ids:
    - reporting
  - id: finance-C-170
    when: When rendering monetary values
    action: Apply dominant scale (thousands/millions/billions) consistently across each periods for a given statement
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Values across periods will be displayed at different scales, making period-over-period comparisons meaningless
      and potentially misleading investors
    stage_ids:
    - reporting
  - id: finance-C-189
    when: When configuring hybrid search engine weights
    action: verify bm25_weight and semantic_weight sum to exactly 1.0
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Hybrid search scores become improperly normalized when weights do not sum to 1.0, causing either inflated
      or deflated relevance scores that misrepresent actual document relevance
    stage_ids:
    - search_discovery
  - id: finance-C-225
    when: When parsing 13F institutional holdings filings
    action: 'Apply value scale based on report_period date: multiply by 1000 if filing date <= 2022-09-30, otherwise use values
      as dollars'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: 13F position values will be 1000x wrong for filings before Q4 2022 if values are not scaled from thousands
      to dollars, causing severe portfolio valuation errors
  - id: finance-C-231
    when: When accessing SEC EDGAR via HTTP requests
    action: Set the EDGAR_IDENTITY environment variable with proper User-Agent format 'Name email@domain.com' before making
      requests
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: SEC EDGAR will reject requests without proper User-Agent identification, blocking all data access
  - id: finance-C-234
    when: When presenting or reporting this system's capabilities to users
    action: Claim real-time market data support — EdgarTools accesses SEC EDGAR which is a historical filing repository with
      inherent filing delays
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users make investment decisions based on stale data believing they have real-time information, potentially
      missing critical market events and suffering financial losses
  - id: finance-C-237
    when: When presenting or reporting this system's capabilities to users
    action: Claim high-frequency trading system support — SEC EDGAR is a batch filing system incompatible with HFT requirements
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users build HFT strategies on regulatory filing delays, experiencing severe adverse selection and execution
      failures
  - id: finance-C-239
    when: When writing verification or tests for this library
    action: Skip asserting specific data values — verification must verify ground truth against actual SEC filing values,
      not just check that data exists
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Silent data corruption goes undetected, leading to users making decisions based on wrong financial data without
      any test failure
  - id: finance-C-256
    when: When processing SEC Form 13F position values in backtesting or analysis
    action: 'Apply scaling factor based on filing date: if filing_date < 2022-09-30, divide values by 1000 to convert from
      thousands to dollars; if filing_date >= 2022-09-30, values are already in dollars and must NOT be scaled'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unscaled 13F values from pre-2022 filings are 1000x too large, causing portfolio analysis to show fictitious
      holdings values and completely incorrect position sizing in backtesting
    derived_from_bd_id: BD-055
  - id: finance-C-264
    when: When classifying prospectus offerings for 424B filings
    action: Detect structured note offerings using regex patterns matching 'buffer|trigger|barrier|principal at risk|capped
      buffered|step up' — apply case-insensitive matching with word boundaries to avoid false positives; partial matches without
      word boundaries must not trigger classification
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing structured note detection causes failure to identify principal-at-risk products requiring regulatory
      disclosure, potentially leading to non-compliant filings and investor protection violations
    derived_from_bd_id: BD-068
  - id: finance-C-266
    when: When adding or modifying CONCEPT_RELATIONSHIPS semantic mappings in the AI semantic enrichment layer (BD-041) that
      overlap with XBRL taxonomy concepts
    action: Define concept equivalence mappings in CONCEPT_RELATIONSHIPS without verifying they exist in MappingStore (BD-009)
      XBRL standardization — these two mapping systems are maintained independently with no synchronization mechanism
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Semantic misalignment between AI interpretation and XBRL-based calculations causes AI-processed data to differ
      from actual financial calculations, leading to incorrect investment decisions based on non-representative financial
      analysis
    derived_from_bd_id: BD-106
  - id: finance-C-271
    when: When implementing SEC form parsing in the edgar library
    action: Assert form type before invoking form-specific parsing logic — validate that form type matches expected format
      before any structure-dependent parsing occurs
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Parsing a form with incorrect type expectations causes silent data corruption where fields are read from
      wrong positions, corrupting financial data without raising errors
    derived_from_bd_id: BD-079
  - id: finance-C-272
    when: When calculating holdings values from 13F filings
    action: Check filing_date against 2022-09-30 cutoff — if filing_date < 2022-09-30, divide value by 1000 (THOUSANDS); if
      filing_date >= 2022-09-30, use value as-is (DOLLARS)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect value scale causes holdings valuation errors by factor of 1000x, making portfolio analysis and
      position sizing decisions based on wildly inaccurate values
    derived_from_bd_id: BD-081
  - id: finance-C-320
    when: When implementing or refactoring 13F holdings data processing across global pipeline stages
    action: 'Apply the 2022-09-30 cutoff date consistently across each stages: raw data loading, CUSIP aggregation (BD-058),
      and value sorting (BD-059); verify scaled values from BD-057 are used only after raw aggregation completes at the correct
      scale'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inconsistent cutoff application causes 1000x scaling errors to propagate through position sizing and sorting;
      reports show incorrectly concentrated positions, leading to wrong investment decisions and regulatory compliance violations
    derived_from_bd_id: BD-105
  - id: finance-C-328
    when: When implementing financial data changes
    action: Perform extra verification for accuracy, test with multiple filing examples from diverse companies, and verify
      GAAP compliance
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Financial calculations contain incorrect values or fail GAAP compliance checks, leading to unreliable data
      for users
  - id: finance-C-331
    when: When writing verification tests
    action: Assert specific values from real SEC filings, not just existence checks like 'is not None'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Tests pass with incorrect data values, allowing wrong numbers to reach users who make financial decisions
      based on them
  - id: finance-C-332
    when: When writing verification tests
    action: Verify that bad or missing input produces useful error messages instead of silent None returns
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Methods silently return None where users expected data, creating silent failures that are hard to debug
  - id: finance-C-334
    when: When handling GitHub issues for bug reports
    action: Coordinate with product-manager for severity classification before implementing any fixes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Critical bugs may not trigger immediate point releases, delaying fixes for data accuracy or core functionality
      issues
  - id: finance-C-335
    when: When handling GitHub issues for bug reports
    action: Proceed directly from GitHub issue to implementation without PM classification
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Critical bugs bypass the point release protocol and get delayed in the minor release queue
  - id: finance-C-343
    when: When conducting research
    action: Write the research document with placeholder values instead of actual findings
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Research document contains fabricated data that misleads future planning and implementation
  - id: finance-C-346
    when: When verifying data accuracy issues
    action: Verify ground truth against actual SEC filing data, not assumptions about what the data should be
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Fixes are applied based on wrong assumptions about SEC data, introducing new bugs
  regular:
  - id: finance-C-003
    when: When requesting SEC filing data for historical analysis
    action: Use Q3 1994 (1994-06-01) as the earliest possible start date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Requesting filings before 1994-06-01 returns empty or invalid results since SEC EDGAR archive begins Q3 1994
    stage_ids:
    - data_retrieval
  - id: finance-C-004
    when: When storing filing metadata in PyArrow tables
    action: Cast CIK column to int32 and accession_number to string format
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect CIK or accession_number types cause filter failures and missing filing results when joining or
      querying the index
    stage_ids:
    - data_retrieval
  - id: finance-C-005
    when: When processing XBRL instances from SEC filings
    action: Assume XBRL data is present in every filing
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Many filings lack XBRL data; accessing XBRL methods without checking raises XBRLFilingWithNoXbrlData exception,
      breaking data pipelines
    stage_ids:
    - data_retrieval
  - id: finance-C-006
    when: When validating filing date input
    action: Use YYYY-MM-DD date format for each date parameters
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid date formats cause ValueError exceptions and prevent filing index retrieval, breaking all downstream
      data access
    stage_ids:
    - data_retrieval
  - id: finance-C-007
    when: When validating accession number input
    action: Format accession numbers as 10-digit-CIK-prefix + hyphen + 2-digit-sequence + hyphen + 6-digit-suffix
    severity: high
    kind: domain_rule
    modality: must
    consequence: Malformed accession numbers cause SEC 404 errors and filing lookup failures, preventing document retrieval
    stage_ids:
    - data_retrieval
  - id: finance-C-008
    when: When implementing HTTP requests to SEC
    action: Use PyArrow tables for filing indexes instead of pandas for datasets larger than 100K rows
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Pandas DataFrames consume excessive memory and slow filtering operations when processing millions of historical
      filings
    stage_ids:
    - data_retrieval
  - id: finance-C-009
    when: When making HTTP requests to SEC EDGAR
    action: Use configurable HTTP client that supports SSL fallback and proxy settings
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Corporate networks with SSL inspection fail all SEC requests without proper certificate configuration, blocking
      data access
    stage_ids:
    - data_retrieval
  - id: finance-C-011
    when: When downloading bulk filing data from SEC
    action: Set bulk download timeout to 300 seconds per chunk
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Default short timeouts cause premature failure on large SEC file downloads over congested connections
    stage_ids:
    - data_retrieval
  - id: finance-C-012
    when: When running automated tests against SEC EDGAR
    action: Use VCR cassettes for network tests to avoid hitting rate limits
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Running live network tests without cassettes triggers SEC rate limits and blocks IP address
    stage_ids:
    - data_retrieval
  - id: finance-C-013
    when: When running fast tests during development
    action: Parallelize network tests that contact SEC EDGAR
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Parallel network tests quickly exhaust the 10 req/sec rate limit, triggering IP blocks
    stage_ids:
    - data_retrieval
  - id: finance-C-014
    when: When implementing SSL error handling
    action: Provide diagnostic messages categorizing SSL errors (corporate network, self-signed, expired, etc.)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Generic SSL errors without diagnostics leave users unable to resolve corporate network SSL inspection issues
    stage_ids:
    - data_retrieval
  - id: finance-C-015
    when: When implementing bulk download retry logic
    action: Retry failed bulk downloads up to 8 times with exponential backoff up to 120 seconds
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Insufficient retry attempts and short delays cause bulk downloads to fail on transient network issues
    stage_ids:
    - data_retrieval
  - id: finance-C-016
    when: When architecting filing data retrieval
    action: Separate filing index download from document retrieval operations
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Combined operations prevent bulk metadata operations and efficient filtering of millions of filings
    stage_ids:
    - data_retrieval
  - id: finance-C-017
    when: When implementing XBRL concept standardization
    action: Use singleton pattern for MappingStore to avoid redundant JSON file I/O
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Creating multiple MappingStore instances loads multi-MB JSON files repeatedly, causing 10+ second delays
      on each statement call
    stage_ids:
    - data_retrieval
  - id: finance-C-018
    when: When using EdgarTools for production data retrieval
    action: Claim real-time trading capability or current market data support
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: EdgarTools retrieves historical SEC EDGAR filings only; claiming real-time capabilities misleads users about
      data freshness and availability
    stage_ids:
    - data_retrieval
  - id: finance-C-019
    when: When presenting filing data retrieval results
    action: Claim SEC EDGAR data represents real-time or live market conditions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: SEC filings have inherent processing delays; presenting cached or historical filings as current market data
      produces misleading analysis
    stage_ids:
    - data_retrieval
  - id: finance-C-020
    when: When debugging SSL connection failures in corporate environments
    action: Assume SSL verification should be disabled as the first solution
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Disabling SSL verification removes security protections and exposes connections to man-in-the-middle attacks
    stage_ids:
    - data_retrieval
  - id: finance-C-023
    when: When filtering PyArrow filing index tables
    action: Handle empty tables explicitly before applying filters to avoid type errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying PyArrow filters to empty tables causes type mismatch errors and crashes in data pipelines
    stage_ids:
    - data_retrieval
  - id: finance-C-024
    when: When making API requests to SEC EDGAR
    action: Cache filing data with 30-second freshness for recent filings
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without caching, every filing lookup consumes rate limit budget, quickly triggering IP blocks during active
      data retrieval
    stage_ids:
    - data_retrieval
  - id: finance-C-025
    when: When decoding SEC EDGAR response content
    action: Try UTF-8 first, then fall back to latin-1 encoding
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strict UTF-8 decoding fails on SEC documents with non-standard characters, causing garbled or missing filing
      content
    stage_ids:
    - data_retrieval
  - id: finance-C-026
    when: When reading SEC filing index files
    action: Skip the first 10 rows of the index file which contain headers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including header rows in filing index causes CIK parsing errors and malformed PyArrow table schemas
    stage_ids:
    - data_retrieval
  - id: finance-C-029
    when: When implementing section detection
    action: 'Use multi-strategy cascade: TOC (0.95 confidence) → Heading (0.7-0.9) → Pattern (0.6) for fallback coverage'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Single-strategy detection will fail on edge cases where primary method cannot parse filing format, resulting
      in missing sections
    stage_ids:
    - html_parsing
  - id: finance-C-030
    when: When processing document text
    action: Use CacheableMixin lazy text caching pattern to prevent expensive re-parsing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without caching, repeated text() calls will re-traverse entire document tree, causing 10x+ performance degradation
      on large documents
    stage_ids:
    - html_parsing
  - id: finance-C-032
    when: When detecting section headers
    action: Enforce minimum confidence threshold (0.6 default) before accepting header detection result
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accepting low-confidence headers (<0.6) will cause false section boundaries, corrupting document structure
      and section content extraction
    stage_ids:
    - html_parsing
  - id: finance-C-033
    when: When implementing header detection strategies
    action: 'Implement each four detector types: Style, Pattern, Structural, Contextual with weighted voting'
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing any detector type will reduce accuracy for edge cases where certain filing formats rely on specific
      detection methods
    stage_ids:
    - html_parsing
  - id: finance-C-034
    when: When storing original HTML for TOC analysis
    action: Store unmodified HTML in metadata.original_html BEFORE preprocessing to enable TOC-based section detection
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: TOC-based section detection requires raw HTML before ix:hidden removal and other preprocessing; storing preprocessed
      HTML will cause TOC detection to fail silently
    stage_ids:
    - html_parsing
  - id: finance-C-035
    when: When extracting tables to DataFrames
    action: Handle colspan and rowspan via TableMatrix expansion before DataFrame creation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Tables with spanning cells will produce misaligned or truncated DataFrames if colspan/rowspan are not properly
      expanded, corrupting financial data analysis
    stage_ids:
    - html_parsing
  - id: finance-C-036
    when: When validating document structure
    action: Check for section boundary overlaps and adjust boundaries at midpoint
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unresolved boundary overlaps will cause duplicate content in adjacent sections or missing content between
      sections
    stage_ids:
    - html_parsing
  - id: finance-C-038
    when: When cleaning boundary artifacts from section text
    action: Remove page numbers, PART headers, and next-section Item headers bleeding into current section
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Page break artifacts in section text will pollute extracted content, corrupting text analysis and AI/LLM
      processing results
    stage_ids:
    - html_parsing
  - id: finance-C-039
    when: When implementing section detection for supported forms
    action: 'Use HybridSectionDetector only for forms: 10-K, 10-Q, 8-K, 20-F; use fallback pattern extractor for other forms'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using hybrid detector on unsupported forms will cause runtime errors or silent failures, leaving sections
      undetected
    stage_ids:
    - html_parsing
  - id: finance-C-040
    when: When implementing section deduplication
    action: Keep section with highest confidence when duplicate sections are detected from multiple methods
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Not deduplicating sections will cause duplicate sections in results, confusing downstream analysis and wasting
      processing resources
    stage_ids:
    - html_parsing
  - id: finance-C-041
    when: When building document tree from HTML
    action: Maintain parent/child relationships for each nodes to enable hierarchical traversal
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Broken parent/child relationships will prevent tree traversal operations like find() and xpath(), making
      document navigation impossible
    stage_ids:
    - html_parsing
  - id: finance-C-042
    when: When processing SEC filing HTML
    action: Extract XBRL data BEFORE HTML preprocessing to preserve ix:hidden content
    severity: high
    kind: domain_rule
    modality: must
    consequence: XBRL facts extracted after preprocessing will be missing ix:hidden elements, resulting in incomplete financial
      data extraction
    stage_ids:
    - html_parsing
  - id: finance-C-043
    when: When detecting section confidence
    action: Report confidence scores as floating point values between 0.0 and 1.0
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Confidence scores outside 0.0-1.0 range will cause incorrect filtering decisions in threshold comparisons
    stage_ids:
    - html_parsing
  - id: finance-C-044
    when: When handling table numeric cell parsing
    action: Handle currency prefixes (US$, C$, etc.), parentheses for negative numbers, and placeholder symbols (—, N/A, NM)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unparsed currency symbols and negative number formats will cause numeric values to be extracted as strings,
      breaking financial calculations
    stage_ids:
    - html_parsing
  - id: finance-C-045
    when: When claiming parsing accuracy
    action: Claim 100% accuracy or guaranteed section detection for each SEC filings
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Over-promising accuracy will lead to legal liability and user disappointment when edge-case filings produce
      incomplete or incorrect results
    stage_ids:
    - html_parsing
  - id: finance-C-046
    when: When documenting table extraction capabilities
    action: Claim tables will always produce perfectly formatted DataFrames matching source
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Complex nested tables with irregular colspan/rowspan may not perfectly preserve original layout, leading
      to data integrity issues in downstream analysis
    stage_ids:
    - html_parsing
  - id: finance-C-047
    when: When implementing document validation
    action: Apply cross-validation boost (1.2x) when multiple detection methods agree on section
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without cross-validation, single-method detections cannot be distinguished from multi-method validated detections,
      reducing confidence score accuracy
    stage_ids:
    - html_parsing
  - id: finance-C-048
    when: When writing verification tests
    action: Assert specific values from real SEC filings, not just existence checks like 'is not None'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Weak assertions like 'assert x is not None' will pass for incorrect values, hiding bugs that produce wrong
      financial data
    stage_ids:
    - html_parsing
  - id: finance-C-049
    when: When processing empty HTML
    action: Return empty Document with zero size rather than raising error
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Raising error for empty HTML will break pipelines processing documents that may legitimately contain no body
      content
    stage_ids:
    - html_parsing
  - id: finance-C-050
    when: When implementing streaming parser
    action: Store original HTML before parsing for TOC-based section detection
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Streaming parser that processes HTML before storing original will have no original_html for TOC detection,
      breaking section extraction for large filings
    stage_ids:
    - html_parsing
  - id: finance-C-051
    when: When comparing section names for deduplication
    action: Normalize names by lowercasing and removing underscores before comparison
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Case-sensitive or underscore-containing name comparisons will fail to detect duplicate sections like 'risk_factors'
      vs 'Risk_Factors'
    stage_ids:
    - html_parsing
  - id: finance-C-056
    when: When rendering periods for income or cash flow statements
    action: Use duration periods only since these statements measure activities over a range of time
    severity: high
    kind: domain_rule
    modality: must
    consequence: Income statement shows instant dates instead of date ranges, making quarterly comparisons meaningless
    stage_ids:
    - xbrl_processing
  - id: finance-C-057
    when: When processing numeric XBRL values
    action: Handle Decimal type alongside int and float for precision-sensitive monetary calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point rounding errors cause small discrepancies in financial calculations and validation failures
    stage_ids:
    - xbrl_processing
  - id: finance-C-058
    when: When mapping company-specific XBRL concepts
    action: Map non-standard concepts to 95 canonical StandardConcept enum values for cross-company comparison
    severity: high
    kind: domain_rule
    modality: must
    consequence: Financial analysis compares mismatched concepts across companies, producing invalid comparative metrics
    stage_ids:
    - xbrl_processing
  - id: finance-C-060
    when: When deduplicating XBRL facts
    action: Remove duplicate facts based on concept, context_ref, value, and decimals combination
    severity: high
    kind: domain_rule
    modality: must
    consequence: Financial totals are doubled or inflated when the same fact is tagged multiple times in different statement
      sections
    stage_ids:
    - xbrl_processing
  - id: finance-C-061
    when: When handling abstract XBRL concepts
    action: Mark concepts without actual values as abstract using multi-tier fallback detection
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Statement displays empty rows for abstract headers, confusing users with non-clickable line items
    stage_ids:
    - xbrl_processing
  - id: finance-C-062
    when: When processing XBRL instances from SEC EDGAR
    action: Access data only through the XBRL object interface, not by directly accessing raw XML
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct XML parsing bypasses normalization logic, causing inconsistent handling of malformed contexts and
      units
    stage_ids:
    - xbrl_processing
  - id: finance-C-063
    when: When querying XBRL facts
    action: Use the FactsView.query() interface which provides fluent chainable filters for complex queries
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Custom filtering logic bypasses the query builder, missing important deduplication and enrichment steps
    stage_ids:
    - xbrl_processing
  - id: finance-C-064
    when: When selecting periods for statements
    action: Apply fiscal intelligence by aligning to the company's fiscal year end month and day
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Periods misaligned with fiscal year end are selected over more relevant periods, reducing comparability
    stage_ids:
    - xbrl_processing
  - id: finance-C-065
    when: When filtering XBRL facts by value
    action: Filter on numeric_value field rather than string value for numeric comparisons
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: String comparison of values produces incorrect results for negative numbers and decimal values
    stage_ids:
    - xbrl_processing
  - id: finance-C-066
    when: When rendering balance sheet statements
    action: Display 'As of' indicator instead of date range for point-in-time periods
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Balance sheet shows misleading date ranges like 'From Jan 1 to Dec 31' for a snapshot of financial position
    stage_ids:
    - xbrl_processing
  - id: finance-C-067
    when: When filtering periods with insufficient data
    action: Require minimum 10 facts per period with statement-specific dynamic thresholds up to 40 facts
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Sparse historical periods with only 1-2 concepts are displayed, misleading investors about data availability
    stage_ids:
    - xbrl_processing
  - id: finance-C-068
    when: When handling balance sheet concept diversity
    action: Require at least 5 unique concepts per period (30% of maximum diversity found)
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Periods with only assets or only liabilities are shown, misleading users about complete balance sheet availability
    stage_ids:
    - xbrl_processing
  - id: finance-C-069
    when: When working with SEC EDGAR XBRL data
    action: Claim real-time data capability - SEC XBRL filings have inherent processing delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users may make investment decisions based on stale data believing they have real-time access
    stage_ids:
    - xbrl_processing
  - id: finance-C-070
    when: When presenting XBRL financial analysis results
    action: Claim that standardized concepts guarantee identical meaning across each companies
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Standardized mapping produces false comparability when companies use same tag for different accounting treatments
    stage_ids:
    - xbrl_processing
  - id: finance-C-071
    when: When using XBRL parsed data for financial analysis
    action: Claim that parsed XBRL values equal the final audited figures without manual verification
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: XBRL parsing errors or amendments cause analysis to use incorrect figures as if verified
    stage_ids:
    - xbrl_processing
  - id: finance-C-072
    when: When handling equity statement periods
    action: Apply relaxed fact threshold of minimum 3 facts per period instead of standard thresholds
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Equity statements incorrectly filtered out when they contain only 4-11 activity facts (vs 25+ for income
      statements)
    stage_ids:
    - xbrl_processing
  - id: finance-C-073
    when: When parsing decimal attributes from XBRL
    action: Handle both integer values and 'INF' string for unlimited precision
    severity: high
    kind: domain_rule
    modality: must
    consequence: ValueError when parsing decimals='INF' crashes statement rendering for precise financial data
    stage_ids:
    - xbrl_processing
  - id: finance-C-074
    when: When classifying annual periods
    action: Use 300-400 day duration range to identify truly annual periods
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Quarterly periods (~90 days) or multi-year periods incorrectly classified as annual, misaligning fiscal year
      analysis
    stage_ids:
    - xbrl_processing
  - id: finance-C-075
    when: When processing fund statement facts
    action: Use concept-based fallback gathering when statement_type filtering returns empty
    severity: high
    kind: operational_lesson
    modality: must
    consequence: FinancialHighlights periods show no data because fund facts are tagged with different statement_types
    stage_ids:
    - xbrl_processing
  - id: finance-C-076
    when: When determining statement minimum facts
    action: Calculate adaptive threshold as 40% of richest period's fact count
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Small companies with inherently fewer facts are filtered out; large companies get overly permissive thresholds
    stage_ids:
    - xbrl_processing
  - id: finance-C-078
    when: When determining if two duration periods are duplicates during stitching
    action: check BOTH start_date AND end_date match exactly, not just end_date alone
    severity: high
    kind: domain_rule
    modality: must
    consequence: Q2 quarterly (Apr-Jun) and Q2 YTD (Jan-Jun) have identical end dates but different start dates - treating
      them as duplicates removes valid data, causing incomplete trend analysis
    stage_ids:
    - statement_stitching
  - id: finance-C-079
    when: When merging duplicate concepts that map to the same standard_concept
    action: enforce value agreement on overlapping periods before merging (within 0.1% tolerance for rounding)
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Unrelated sub-items that happen to map to the same standard_concept will be incorrectly merged, corrupting
      financial data integrity (Issue #642)'
    stage_ids:
    - statement_stitching
  - id: finance-C-080
    when: When merging concept variants that are NOT in the equivalent_standard_concepts list
    action: require bare concept names to be variants (one contains the other) before merging
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unrelated XBRL concepts that happen to map to the same standard_concept will be incorrectly merged, causing
      incorrect financial line items in stitched output
    stage_ids:
    - statement_stitching
  - id: finance-C-081
    when: When selecting periods for balance sheet statements
    action: use instant periods (point-in-time snapshots), not duration periods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using duration periods for balance sheets produces nonsensical values since assets/liabilities are point-in-time,
      not cumulative flows
    stage_ids:
    - statement_stitching
  - id: finance-C-083
    when: When configuring period selection for quarterly vs annual analysis
    action: select quarterly periods (~80-100 days) as primary for income/cash flow statements, falling back to YTD only when
      quarterly data is unavailable
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Using YTD periods by default provides cumulative instead of discrete quarterly data, reducing granularity
      of trend analysis
    stage_ids:
    - statement_stitching
  - id: finance-C-084
    when: When analyzing quarterly filings for period selection
    action: prefer periods with more tagged facts (typically YTD for some companies) over purely duration-based selection
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Companies like PYPL tag more detailed data to YTD periods - selecting purely quarterly periods loses financial
      fact completeness
    stage_ids:
    - statement_stitching
  - id: finance-C-085
    when: When processing companies that rename XBRL concepts across filing years
    action: use _KNOWN_CONCEPT_RENAMES mapping to merge renamed concepts with value agreement verification
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Companies switching concept names (e.g., PG pre-tax income at FY2024) create duplicate line items without
      rename handling, breaking trend continuity
    stage_ids:
    - statement_stitching
  - id: finance-C-086
    when: When handling cash-related concepts that span multiple XBRL standards
    action: merge CashAndCashEquivalents and CashAndMarketableSecurities via _EQUIVALENT_STANDARD_CONCEPTS without variant
      name check
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Cash equivalents vs marketable securities variants won't merge correctly, creating duplicate cash line items
      in stitched statements
    stage_ids:
    - statement_stitching
  - id: finance-C-088
    when: When applying standardization during stitching
    action: standardize concept labels BEFORE integrating data across periods
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cross-period concept name inconsistencies prevent proper merging, causing duplicate rows for semantically
      identical line items
    stage_ids:
    - statement_stitching
  - id: finance-C-089
    when: When constructing stitched output with ordering
    action: use StatementOrderingManager to determine semantic ordering before rendering
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Financial statements without proper semantic ordering are confusing and violate user expectations for standard
      financial statement structure
    stage_ids:
    - statement_stitching
  - id: finance-C-090
    when: When validating stitched statement data
    action: present stitched multi-period data as equivalent to single-period filing accuracy
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Multi-period stitched data involves normalization and concept mapping that introduces potential discrepancies
      - this cannot be presented as raw filing accuracy
    stage_ids:
    - statement_stitching
  - id: finance-C-091
    when: When using .shift(1) on DataFrame columns for period-over-period calculations
    action: assume shift(1) gives previous period if chronological ordering is not confirmed
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without confirmed chronological ordering, shift(1) may reference future periods or wrong time periods, producing
      invalid trend calculations
    stage_ids:
    - statement_stitching
  - id: finance-C-092
    when: When handling company-specific XBRL taxonomy variations
    action: claim universal concept mapping coverage without explicit testing per company
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Companies use non-standard taxonomy extensions (e.g., orcl:, adbe:) that may not map correctly, leading to
      incorrect standardized labels
    stage_ids:
    - statement_stitching
  - id: finance-C-093
    when: When implementing entity resolution for Company or Entity classes
    action: 'Resolve identifiers through the fallback chain: ticker symbol first (via find_cik), then CIK number (via normalize_cik)'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Entity resolution will fail silently for ticker symbols if the CIK normalization is attempted before ticker
      lookup, returning incorrect entity data or raising CompanyNotFoundError unexpectedly
    stage_ids:
    - entity_resolution
  - id: finance-C-094
    when: When Company or Entity initialization fails for unknown identifiers
    action: Raise CompanyNotFoundError with fuzzy-match suggestions for alternative identifiers
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Failed entity lookups will return cryptic errors without actionable guidance, forcing users to manually search
      for correct identifiers
    stage_ids:
    - entity_resolution
  - id: finance-C-095
    when: When implementing CompanyReport subclasses for TenK, TenQ, EightK, and other report types
    action: Implement __getitem__(item_or_part) method for section access by item identifier
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Report sections cannot be accessed via bracket notation (report['Item 1']), breaking the documented API contract
      and forcing users to use alternative methods
    stage_ids:
    - entity_resolution
  - id: finance-C-096
    when: When accessing EntityFacts for SIC categorization
    action: Extract SIC code from XBRL company facts data during EntityFacts initialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Industry categorization based on SIC codes will be unavailable, preventing proper entity classification and
      business category detection
    stage_ids:
    - entity_resolution
  - id: finance-C-097
    when: When accessing entity facts for a company
    action: Handle NoCompanyFactsFound exception when the SEC has no facts data for the entity
    severity: medium
    kind: domain_rule
    modality: must
    consequence: get_facts() will raise unhandled exceptions for entities without XBRL facts, crashing applications instead
      of returning None
    stage_ids:
    - entity_resolution
  - id: finance-C-098
    when: When looking up ticker symbols for CIK resolution
    action: Rely solely on bundled parquet data for recent IPOs or delistings not present in the cached dataset
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Ticker lookup will fail for recently listed companies (within weeks of IPO) or recently delisted tickers,
      returning CompanyNotFoundError for valid identifiers
    stage_ids:
    - entity_resolution
  - id: finance-C-099
    when: When downloading entity submissions from SEC API
    action: Cache submissions indefinitely without respecting the 30-second freshness TTL in HttpxThrottleCache
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Entity data will become stale, missing recent filings or changes to company metadata for up to hours after
      the SEC updates the data
    stage_ids:
    - entity_resolution
  - id: finance-C-100
    when: When loading entity data from local storage
    action: Handle corrupted JSON files by re-downloading from SEC and logging warnings
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Corrupted local cache files will cause entity resolution to fail silently, returning None for entities that
      exist on SEC
    stage_ids:
    - entity_resolution
  - id: finance-C-101
    when: When accessing filings through EntityData
    action: Trigger lazy loading of historical filings when trigger_full_load=True (default) for complete filing history
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: get_filings() will return only the most recent filings, missing historical data that exists on SEC but wasn't
      in the initial API response
    stage_ids:
    - entity_resolution
  - id: finance-C-102
    when: When presenting company entity data to users or AI systems
    action: Claim entity data reflects current real-time company state
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users will make decisions based on potentially outdated company information, as SEC filings reflect historical
      data with inherent delays (quarterly reports can be months old)
    stage_ids:
    - entity_resolution
  - id: finance-C-103
    when: When classifying entity business categories
    action: 'Apply priority-based decision tree: definitive SIC codes first, then investment company forms, then BDC indicators,
      then investment manager signals, then holding company, then name patterns'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Entities will be misclassified (e.g., SPAC detected as operating company), causing incorrect business category
      assignments and downstream analysis errors
    stage_ids:
    - entity_resolution
  - id: finance-C-104
    when: When determining if an entity is an individual person
    action: 'Apply the 9-signal priority chain: insider issuer flag > tickers/exchanges > state of incorporation > entity
      type > company forms > EIN > name keywords > insider owner flag'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Individuals filing with SEC will be incorrectly classified as companies or vice versa, breaking access to
      ownership reports and insider transaction data
    stage_ids:
    - entity_resolution
  - id: finance-C-105
    when: When normalizing CIK identifiers
    action: Strip leading zeros and convert to integer for consistent CIK representation across each operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: CIK comparisons and lookups will fail due to inconsistent formatting ('0000320193' vs '320193'), breaking
      entity resolution and API calls
    stage_ids:
    - entity_resolution
  - id: finance-C-106
    when: When implementing AI context composition for entities
    action: Verify Entity objects implement the HasContext Protocol with to_context(detail) method for LLM-ready output
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: AI agents and language models will receive unstructured or incomplete entity data, breaking natural language
      queries about SEC filings
    stage_ids:
    - entity_resolution
  - id: finance-C-107
    when: When resolving entity identifiers via the Company factory function
    action: Skip the CompanyNotFoundError exception handling when ticker lookup fails
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Unknown ticker symbols will cause unhandled exceptions with cryptic messages instead of providing helpful
      suggestions and alternative lookup methods
    stage_ids:
    - entity_resolution
  - id: finance-C-108
    when: When implementing transaction code translation for ownership forms
    action: 'use the canonical BUY_SELL mapping {''A'': ''Buy'', ''D'': ''Sell''} for AcquiredDisposed codes'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Transaction types will be misclassified, causing purchase/sale analytics to be inverted and insider trading
      signals to be incorrect
    stage_ids:
    - ownership_reporting
  - id: finance-C-109
    when: When extracting transaction values that contain footnote references
    action: strip footnote markers like [F1], [F2] before numeric conversion using safe_numeric()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Transaction shares, prices, and values will be None instead of parsed numbers, causing aggregated summaries
      to be zero or incorrect
    stage_ids:
    - ownership_reporting
  - id: finance-C-111
    when: When calculating transaction summaries and aggregations
    action: use shares_numeric and value_numeric properties which handle None/missing footnote values gracefully
    severity: high
    kind: domain_rule
    modality: must
    consequence: Aggregations will crash with TypeError or produce incorrect totals when transactions contain non-numeric
      footnote references
    stage_ids:
    - ownership_reporting
  - id: finance-C-112
    when: When filtering market trades from ownership transactions
    action: filter by TransactionCode.TRADES = ['P', 'S'] which represents open market purchases and sales
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Market trade analytics will include internal company transactions (exercises, awards, gifts) instead of open
      market activity, distorting price-volume analysis
    stage_ids:
    - ownership_reporting
  - id: finance-C-113
    when: When parsing ownership forms from SEC filings
    action: support Forms 3, 4, and 5 as defined in FORM_DESCRIPTIONS mapping
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unsupported form types will fail silently or produce incomplete data, causing gaps in insider activity tracking
    stage_ids:
    - ownership_reporting
  - id: finance-C-114
    when: When resolving footnote IDs in ownership transactions
    action: handle newline-separated footnote IDs by splitting and looking up each ID in the Footnotes collection
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Transaction footnotes will be empty or partial, losing important context about Rule 10b5-1 plans, derivative
      terms, and other material information
    stage_ids:
    - ownership_reporting
  - id: finance-C-115
    when: When extracting transaction activities from ownership filings
    action: populate footnote_ids from the transaction coding section before calling _resolve_footnotes()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Footnotes will not be resolved for transactions, losing critical context about transaction conditions and
      regulatory compliance information
    stage_ids:
    - ownership_reporting
  - id: finance-C-116
    when: When converting ownership data to DataFrames
    action: use safe_numeric() for numeric columns to handle footnote-annotated values without crashing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: DataFrame conversion will fail or produce mixed-type columns for transactions with footnote references, breaking
      downstream pandas operations
    stage_ids:
    - ownership_reporting
  - id: finance-C-117
    when: When calculating net_change and net_value for transaction summaries
    action: filter transactions by transaction_type ('purchase', 'sale') and use value_numeric property for aggregation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect net change calculations will produce wrong position summaries, potentially causing over/under-trading
      decisions based on false signals
    stage_ids:
    - ownership_reporting
  - id: finance-C-118
    when: When detecting Rule 10b5-1 trading plans from transaction footnotes
    action: search for patterns including '10b5-1', '10b-5-1', 'rule 10b5', '10b5 plan' in footnote text
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Compliance checks for pre-planned trading schedules will miss important disclosures, potentially causing
      regulatory compliance issues for downstream users
    stage_ids:
    - ownership_reporting
  - id: finance-C-119
    when: When parsing derivative security transactions
    action: extract underlying security shares and exercise price using safe_numeric() to handle footnote-annotated values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Derivative transaction values will be zero or incorrect, breaking option exercise analytics and position
      valuation
    stage_ids:
    - ownership_reporting
  - id: finance-C-120
    when: When displaying transaction data to users
    action: use format_numeric() and format_currency() which handle None/NaN values gracefully
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Display will show 'nan' or errors for transactions with missing prices or footnote-only values, breaking
      report generation
    stage_ids:
    - ownership_reporting
  - id: finance-C-121
    when: When comparing aggregated summaries with individual transactions
    action: verify net_change in summary equals sum of individual transaction shares using shares_numeric
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Aggregated reports will show inconsistent totals, breaking trust in the data and requiring manual reconciliation
    stage_ids:
    - ownership_reporting
  - id: finance-C-122
    when: When using Ownership.from_xml() to parse SEC filings
    action: claim real-time trading capability - parsed data reflects SEC EDGAR submissions which may have delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users may make trading decisions based on stale insider activity data, leading to financial losses from delayed
      information
    stage_ids:
    - ownership_reporting
  - id: finance-C-123
    when: When working with non-derivative holdings that may have footnote references
    action: convert holdings 'Shares' column to numeric using convert_to_numeric() if each values are numeric
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Holdings DataFrame will have object dtype instead of numeric, breaking aggregation and comparison operations
    stage_ids:
    - ownership_reporting
  - id: finance-C-124
    when: When parsing transaction values from XML that contain value tags
    action: use child_value() which extracts from <value> child elements while preserving footnote references
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Values will be empty or incorrect when XML uses <value> wrapper tags with footnote annotations, losing transaction
      data
    stage_ids:
    - ownership_reporting
  - id: finance-C-125
    when: When calculating remaining shares after transactions
    action: use the last transaction's Remaining value from market_trades as the post-transaction position
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Final position calculations will be incorrect, breaking portfolio tracking and compliance reporting
    stage_ids:
    - ownership_reporting
  - id: finance-C-126
    when: When translating transaction codes to human-readable descriptions
    action: use TransactionCode.TRANSACTION_TYPES mapping which provides descriptions like 'Award', 'Conversion', 'Disposition'
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Transaction types will show raw codes (M, C, F, G) instead of readable descriptions, making reports unintelligible
    stage_ids:
    - ownership_reporting
  - id: finance-C-127
    when: When handling transaction values where price per share may be missing
    action: check pd.notna(row.Price) and row.Price > 0 before calculating transaction value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Value calculations will use 0 or NaN prices producing incorrect totals in transaction summaries and net value
      reports
    stage_ids:
    - ownership_reporting
  - id: finance-C-129
    when: When composing multiple objects for LLM context
    action: Allocate first object 60% of token budget, remaining split equally
    severity: high
    kind: domain_rule
    modality: must
    consequence: Primary context loses priority causing LLM to miss the most important information in token-constrained responses
    stage_ids:
    - ai_integration
  - id: finance-C-130
    when: When requesting TTM period type for balance sheet in AI context
    action: Return error message explaining TTM not applicable for point-in-time balance sheet data
    severity: high
    kind: domain_rule
    modality: must
    consequence: LLM agents will incorrectly report TTM balance sheet values that are mathematically meaningless (point-in-time
      vs flow data)
    stage_ids:
    - ai_integration
  - id: finance-C-131
    when: When estimating token usage for AI context
    action: Use 4 characters per token heuristic for estimation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Token budget will be miscalculated causing output truncation or context overflow
    stage_ids:
    - ai_integration
  - id: finance-C-133
    when: When handling errors in MCP tool execution
    action: Return ToolResponse with error_code and suggestions fields populated
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: LLM agents cannot programmatically handle failures, causing repeated invalid requests
    stage_ids:
    - ai_integration
  - id: finance-C-134
    when: When routing AI agent requests through integration layer
    action: Prefer Skills + Code execution over MCP for interactive analysis (90% of use cases)
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Unnecessary JSON-RPC overhead (~100-200ms) and token cost (~400 tokens per conversation) for simple queries
    stage_ids:
    - ai_integration
  - id: finance-C-138
    when: When composing context for LLM with multiple objects
    action: Respect max_tokens budget limits by downgrading detail levels progressively
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Context exceeds token budget causing LLM context window overflow or truncated responses
    stage_ids:
    - ai_integration
  - id: finance-C-139
    when: When using AI-generated code that constructs Filing objects manually
    action: Use find() function instead of manual Filing constructor
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Manual Filing construction bypasses proper initialization causing data access failures
    stage_ids:
    - ai_integration
  - id: finance-C-140
    when: When MCP server is deployed for production workflows
    action: Claim real-time data capability when using SEC EDGAR polling
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will make trading decisions based on stale data, potentially missing time-sensitive information
    stage_ids:
    - ai_integration
  - id: finance-C-142
    when: When generating code that uses repr() for LLM output
    action: Use str() or to_context() instead of repr() for LLM-friendly output
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: LLM receives developer-friendly repr output with technical details instead of user-friendly formatted output
    stage_ids:
    - ai_integration
  - id: finance-C-143
    when: When handling company not found errors in AI context
    action: Provide progressive fallback suggestions (try CIK, use find(), or edgar_search)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: LLM cannot help users recover from lookup failures, degrading user experience
    stage_ids:
    - ai_integration
  - id: finance-C-144
    when: When using xbrl() for simple financial metrics
    action: Use get_financials() instead of xbrl().statements for simple metrics
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Unnecessary complexity; get_financials() provides cleaner API with proper abstraction
    stage_ids:
    - ai_integration
  - id: finance-C-145
    when: When composing context for LLM output
    action: Include helpful next_steps in ToolResponse for programmatic action guidance
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: LLM agents lack actionable next steps, reducing automation effectiveness
    stage_ids:
    - ai_integration
  - id: finance-C-146
    when: When configuring MCP server for HTTP transport
    action: Set stateless=True for HTTP mode to verify request isolation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: State leakage between requests causes incorrect data in multi-user scenarios
    stage_ids:
    - ai_integration
  - id: finance-C-147
    when: When implementing to_context() on objects with non-standard signatures
    action: Implement fallback to call to_context() without detail parameter
    severity: medium
    kind: domain_rule
    modality: must
    consequence: TypeError when compose_context() tries to call to_context(detail='standard') on objects that only support
      to_context()
    stage_ids:
    - ai_integration
  - id: finance-C-148
    when: When initializing TenD with a non-10-D filing
    action: Initialize TenD with non-10-D forms like 10-K or 8-K
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: TenD constructor raises ValueError with message 'Expected 10-D filing' when passed an invalid form type,
      preventing misuse of the parser
    stage_ids:
    - abs_filing_processing
  - id: finance-C-150
    when: When extracting money values from distribution report tables
    action: Apply minimum thresholds to distinguish real dollar amounts from per-unit values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without $1000 threshold in _extract_large_money_from_row, per-$1000 factor tables would be incorrectly parsed
      as pool balances, corrupting distribution metrics with values 1000x too small
    stage_ids:
    - abs_filing_processing
  - id: finance-C-151
    when: When processing HTML distribution reports with EX-99 exhibits
    action: Skip per-$1000 tables during balance and distribution extraction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Per-$1000 tables contain normalized values (e.g., 0.854 pool factor), not actual dollar amounts. Extracting
      these as pool balance would produce metrics off by 1000x, making analysis unreliable
    stage_ids:
    - abs_filing_processing
  - id: finance-C-152
    when: When extracting tables from distribution report HTML
    action: Skip tables with fewer than 2 rows to avoid parsing formatting artifacts
    severity: low
    kind: domain_rule
    modality: must
    consequence: Tiny HTML tables with 0-1 rows are formatting elements, not data tables. Processing them wastes CPU cycles
      and creates empty ReportTable objects that clutter the output
    stage_ids:
    - abs_filing_processing
  - id: finance-C-153
    when: When calling filing.obj() on non-CMBS 10-D filings
    action: Return None for credit card, auto, and other non-CMBS ABS types
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Non-CMBS 10-D filings lack EX-102 XML exhibits with structured loan data. Returning None prevents users from
      expecting CMBS-specific methods like loans and properties that would produce empty DataFrames
    stage_ids:
    - abs_filing_processing
  - id: finance-C-154
    when: When accessing CMBS loan or property data
    action: Verify has_asset_data returns True before accessing asset_data property
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling loans or properties on non-CMBS TenD instances returns empty DataFrames. Accessing asset_data when
      has_asset_data is False returns None, which would cause AttributeError if used directly
    stage_ids:
    - abs_filing_processing
  - id: finance-C-155
    when: When parsing invalid or malformed XML in CMBS EX-102 exhibits
    action: Handle XML parsing errors gracefully by returning empty DataFrames
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: SEC occasionally publishes malformed XML exhibits. Without try-catch around ET.fromstring, parsing crashes
      would bubble up as unhandled exceptions, breaking downstream analysis pipelines
    stage_ids:
    - abs_filing_processing
  - id: finance-C-156
    when: When CMBS XML exhibits contain missing or NA values
    action: Filter out NA state values in property type/state distribution calculations
    severity: medium
    kind: domain_rule
    modality: must
    consequence: CMBS property data includes NA as a literal string value for missing state codes. Without filtering, state
      distribution would show 'NA' as a valid jurisdiction, skewing geographic analysis
    stage_ids:
    - abs_filing_processing
  - id: finance-C-157
    when: When building CMBS summary statistics from loan DataFrame
    action: Check column existence before calling pandas aggregation methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: CMBS XML schemas vary between issuers - not all include payment_status or is_modified fields. Without column
      checks, KeyError would be raised for securities without these optional fields
    stage_ids:
    - abs_filing_processing
  - id: finance-C-158
    when: When extracting date values from distribution report tables
    action: Support multiple date format patterns including MM/DD/YY, MM/DD/YYYY, and Month DD, YYYY
    severity: high
    kind: domain_rule
    modality: must
    consequence: Different issuers use different date conventions in 10-D filings. Without comprehensive format coverage,
      distribution dates would return None for securities using unfamiliar formats, making time-series analysis incomplete
    stage_ids:
    - abs_filing_processing
  - id: finance-C-159
    when: When presenting CMBS loan and property DataFrames to users
    action: Claim specific column availability across each CMBS securities
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: CMBS XML schema is not strictly enforced - optional fields like origination_date or occupancy_securitization
      may be missing. Claiming specific columns exist would cause KeyError when analyzing securities without those fields
    stage_ids:
    - abs_filing_processing
  - id: finance-C-160
    when: When using ABS type auto-detection for analysis routing
    action: Rely solely on keyword matching in company names for ABS type classification
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: ABS type detection via company name keywords is heuristic only - issuers may use ambiguous names. Relying
      solely on this would misclassify securities with generic names like 'Funding' (utility keyword) as utility ABS when
      they're actually CMBS
    stage_ids:
    - abs_filing_processing
  - id: finance-C-161
    when: When accessing TenD loans or properties on non-CMBS filings
    action: Return empty pandas DataFrames, not raise exceptions
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Credit card and auto loan ABS filings don't have EX-102 XML exhibits. Returning empty DataFrames allows downstream
      pandas operations (len, columns, etc.) to work without try-except blocks, enabling uniform data pipeline code
    stage_ids:
    - abs_filing_processing
  - id: finance-C-162
    when: When detecting table purposes in distribution reports
    action: Apply regex pattern matching against first 5 rows of each table
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Table labels (balances, distributions, delinquencies) identify the data purpose for targeted extraction.
      Only checking first 5 rows ensures labels are captured before data rows obscure headers, while limiting scope prevents
      false matches from deep data
    stage_ids:
    - abs_filing_processing
  - id: finance-C-163
    when: When distributing distribution metrics extraction across table types
    action: Extract from each tables regardless of detected label for robustness
    severity: high
    kind: domain_rule
    modality: must
    consequence: ABS issuers use inconsistent table structures - labels may be wrong or missing. Scanning all rows in all
      tables ensures metrics are captured even when label-based routing fails, preventing incomplete distribution reports
    stage_ids:
    - abs_filing_processing
  - id: finance-C-164
    when: When using TenD data objects for regulatory compliance verification
    action: Claim parsed data values match official SEC EDGAR filings byte-for-byte
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: HTML parsing and text extraction from SEC documents may introduce minor differences from source filings.
      For regulatory compliance, users must verify against original SEC documents - parsed data is for analytical convenience
      only
    stage_ids:
    - abs_filing_processing
  - id: finance-C-165
    when: When parsing EX-99 HTML exhibits from non-US ABS issuers
    action: Assume US date formats (MM/DD/YY) and dollar currency conventions
    severity: low
    kind: resource_boundary
    modality: must
    consequence: SEC filings use US conventions regardless of issuer nationality. Attempting to parse international date formats
      would fail silently, returning None for distribution dates and breaking time-series analysis
    stage_ids:
    - abs_filing_processing
  - id: finance-C-166
    when: When initializing CMBSAssetData with empty or whitespace XML
    action: Return empty DataFrames for both loans and properties
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Empty or whitespace XML strings cause ET.fromstring to fail silently or produce empty roots. Without graceful
      handling, len() calls on empty loans/properties DataFrames would return 0, confusing users about whether parsing succeeded
    stage_ids:
    - abs_filing_processing
  - id: finance-C-167
    when: When calculating summary statistics from CMBS loan data
    action: Use dropna() before computing mean values for rate/DSCR/occupancy
    severity: high
    kind: domain_rule
    modality: must
    consequence: CMBS loans may have NULL values for interest rates, DSCR, or occupancy. Computing mean() on Series with NaN
      returns NaN in pandas, resulting in None avg_rate/avg_dscr/avg_occupancy in summary even when valid loans exist
    stage_ids:
    - abs_filing_processing
  - id: finance-C-169
    when: When determining if a percentage change should display as 'unchanged'
    action: Apply the 0.01 (1%) threshold check using abs(pct_change) < COMPARISON_CONFIG['threshold']
    severity: high
    kind: domain_rule
    modality: must
    consequence: Insignificant percentage changes will clutter the display with comparison indicators for noise-level variations
      (e.g., 0.3% revenue change shown as ▲0.3%)
    stage_ids:
    - reporting
  - id: finance-C-171
    when: When exporting to DataFrame
    action: Preserve original cell.value without formatting transformations in the DataFrame output
    severity: high
    kind: domain_rule
    modality: must
    consequence: DataFrame consumers will receive formatted strings instead of numeric values, breaking downstream numerical
      analysis and ratio calculations
    stage_ids:
    - reporting
  - id: finance-C-172
    when: When generating markdown output
    action: Strip Rich markup tags from units_note and other metadata before including in markdown
    severity: high
    kind: domain_rule
    modality: must
    consequence: Markdown tables will contain raw Rich markup syntax ([italic], [/italic], etc.) that renders as literal text
      instead of proper markdown formatting
    stage_ids:
    - reporting
  - id: finance-C-173
    when: When handling Statement of Equity or Comprehensive Income statements
    action: Set include_dimensions=True by default because these statements are inherently dimensional
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Statement of Equity will display mostly NaN values (only 31% of concepts had values vs 44% with correct setting),
      making the statement unusable
    stage_ids:
    - reporting
  - id: finance-C-174
    when: When filtering periods for display
    action: Remove periods containing only empty strings or NaN values from CashFlowStatement, IncomeStatement, and BalanceSheet
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Financial statements will display empty columns for periods with no meaningful data, confusing users and
      requiring them to scroll past irrelevant periods
    stage_ids:
    - reporting
  - id: finance-C-175
    when: When enabling period-over-period comparisons
    action: Only apply comparisons to IncomeStatement and CashFlowStatement statement types
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Balance Sheet comparisons will display misleading percentage changes for items like Assets that measure cumulative
      position rather than period activity
    stage_ids:
    - reporting
  - id: finance-C-176
    when: When excluding concepts from comparison display
    action: Skip SharesOutstanding concepts from percentage change calculations using COMPARISON_CONFIG['excluded_concepts']
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Shares outstanding will show spurious percentage changes that reflect corporate actions (stock splits, buybacks)
      rather than operational performance
    stage_ids:
    - reporting
  - id: finance-C-177
    when: When rendering with rich console output
    action: Apply color-coded comparison indicators (▲ green for increase, ▼ red for decrease, • neutral for unchanged) for
      visual analysis
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Users cannot quickly identify which line items improved or deteriorated period-over-period, defeating the
      purpose of comparison indicators
    stage_ids:
    - reporting
  - id: finance-C-178
    when: When serializing RenderedStatement to dict
    action: Pre-apply cell formatters before storing values so the resulting dict contains only JSON-safe primitive types
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: RenderedStatement.to_dict() will fail to serialize because cell.formatter closures are not JSON-compatible,
      breaking caching and persistence features
    stage_ids:
    - reporting
  - id: finance-C-179
    when: When reconstructing RenderedStatement from dict
    action: Replace cell formatters with PreformattedValue instances that return the pre-computed formatted_value
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: from_dict() will lose the ability to reconstruct the original display format, causing inconsistency between
      original and deserialized statements
    stage_ids:
    - reporting
  - id: finance-C-180
    when: When creating cached renderers
    action: Use CellFormatter dataclass with __slots__ instead of closures to enable pickling
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: RenderedStatement cannot be pickled and cached to disk, forcing re-rendering on every access and degrading
      performance for large datasets
    stage_ids:
    - reporting
  - id: finance-C-181
    when: When calculating Return on Assets ratio
    action: Use average of current and previous period total assets (shift(1)) rather than only current period assets
    severity: high
    kind: domain_rule
    modality: must
    consequence: ROA will be overstated or understated because denominator should represent the asset base during the period
      (beginning + ending)/2, not just the ending balance
    stage_ids:
    - reporting
  - id: finance-C-182
    when: When displaying financial data
    action: Claim that rendered output represents real-time or live trading data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: SEC XBRL filings are historical documents (10-K, 10-Q, 8-K) with inherent reporting delays; presenting rendered
      statements as real-time will mislead users about data freshness
    stage_ids:
    - reporting
  - id: finance-C-183
    when: When comparing rendered output across systems
    action: Assume that rich console output will render identically on each terminals without color/width configuration
    severity: low
    kind: resource_boundary
    modality: must_not
    consequence: Terminal color schemes, font rendering, and width settings vary across environments; comparison indicators
      and table alignment will appear differently
    stage_ids:
    - reporting
  - id: finance-C-184
    when: When handling EPS values
    action: Format EPS with 2-3 decimal places and do not apply monetary scaling (thousands/millions)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Earnings per share will display incorrectly (e.g., $5.23M instead of $5.23) or be scaled to meaningless values,
      breaking financial analysis
    stage_ids:
    - reporting
  - id: finance-C-185
    when: When rendering share values
    action: Apply share-specific decimal scaling from decimals attribute rather than dominant_scale
    severity: high
    kind: domain_rule
    modality: must
    consequence: Share counts will be displayed at incorrect scales (e.g., millions of shares shown as billions), misrepresenting
      capital structure
    stage_ids:
    - reporting
  - id: finance-C-186
    when: When displaying abstract row headers in markdown
    action: Apply bold formatting (**text**) to abstract rows for semantic distinction in LLM-optimized output
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Statement hierarchy becomes unclear in markdown, making it difficult to distinguish section headers from
      line items in LLM consumption
    stage_ids:
    - reporting
  - id: finance-C-187
    when: When optimizing markdown for LLM consumption
    action: Skip abstract rows that contain no meaningful values to reduce noise in LLM input
    severity: low
    kind: operational_lesson
    modality: should
    consequence: LLMs processing financial statements will waste tokens on empty section headers, increasing processing cost
      and potentially confusing hierarchical context
    stage_ids:
    - reporting
  - id: finance-C-188
    when: When implementing BM25 search for filing content
    action: use the standard Okapi BM25 parameters k1=1.5 and b=0.75
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-standard BM25 parameters may produce suboptimal relevance rankings, causing irrelevant results to rank
      higher than relevant matches in financial documents where exact term matching is critical
    stage_ids:
    - search_discovery
  - id: finance-C-190
    when: When performing regex search on filing content
    action: preprocess HTML entities to spaces before pattern matching
    severity: high
    kind: domain_rule
    modality: must
    consequence: Regex patterns fail to match SEC filing content when HTML entities like &#160; (non-breaking space) are present,
      causing false negative search results for valid patterns
    stage_ids:
    - search_discovery
  - id: finance-C-191
    when: When indexing filing sections for BM25 search
    action: apply text preprocessing pipeline including lowercasing, tokenization, stopword removal, and numeric normalization
    severity: high
    kind: domain_rule
    modality: must
    consequence: BM25 search quality degrades without proper preprocessing, as financial terms like 'Item 1A' and numeric
      values '$5B' may not match query terms correctly
    stage_ids:
    - search_discovery
  - id: finance-C-192
    when: When building BM25 search indices for documents
    action: skip parent nodes and only index leaf nodes with text content
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Including parent nodes in the BM25 index causes duplicate text matches, leading to inflated scores and redundant
      search results that appear multiple times
    stage_ids:
    - search_discovery
  - id: finance-C-193
    when: When using hybrid search engine for ranking
    action: normalize BM25 scores to 0-1 range before combining with semantic scores
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without score normalization, BM25 scores with arbitrary magnitude dominate the weighted combination, causing
      semantic boosting to have negligible effect on final rankings
    stage_ids:
    - search_discovery
  - id: finance-C-194
    when: When implementing ranked search for financial documents
    action: present relevance scores as absolute probability values
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: BM25 scores are relative ranking measures, not probabilities. Presenting them as such misleads users about
      the certainty of search result relevance
    stage_ids:
    - search_discovery
  - id: finance-C-195
    when: When caching BM25 search indices for performance
    action: include document content hash to invalidate cache when document changes
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Stale cached indices for modified documents produce incorrect search results, causing documents to appear
      in search results for terms no longer present
    stage_ids:
    - search_discovery
  - id: finance-C-196
    when: When caching search indices across sessions
    action: set specified TTL expiration to prevent serving stale SEC filing data
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: SEC filings are periodically amended and updated. Cached indices without TTL expiration return search results
      from superseded filing versions, leading to analysis based on outdated information
    stage_ids:
    - search_discovery
  - id: finance-C-197
    when: When performing text search with case sensitivity enabled
    action: preserve original case in search results for accurate snippet display
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Search snippets show incorrectly transformed text when case conversion leaks into result display, breaking
      fidelity of SEC filing content representation
    stage_ids:
    - search_discovery
  - id: finance-C-198
    when: When handling empty search queries
    action: return empty result set instead of raising an error
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Empty query errors break downstream processing pipelines and API integrations that expect graceful handling
      of edge case inputs
    stage_ids:
    - search_discovery
  - id: finance-C-199
    when: When using regex search with compiled patterns
    action: catch and wrap re.error exceptions into ValueError with descriptive message
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Raw regex compilation errors expose implementation details and confuse users who cannot determine which part
      of their pattern is invalid
    stage_ids:
    - search_discovery
  - id: finance-C-200
    when: When implementing whole word search matching
    action: use word boundary regex patterns instead of simple substring matching
    severity: high
    kind: domain_rule
    modality: must
    consequence: Whole word matching without word boundaries causes false matches where search terms appear as substrings
      of other words (e.g., 'rev' matching 'revenue' instead of just 'rev')
    stage_ids:
    - search_discovery
  - id: finance-C-201
    when: When implementing semantic section search
    action: normalize section names to lowercase for consistent matching
    severity: high
    kind: domain_rule
    modality: must
    consequence: Section name matching without case normalization fails when users provide 'Risk Factors' but document contains
      'RISK FACTORS', causing valid searches to return no results
    stage_ids:
    - search_discovery
  - id: finance-C-202
    when: When normalizing financial terms in search queries
    action: preserve financial notation patterns including dollar signs, percentages, and item references
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Financial term normalization that removes currency symbols or percentage signs causes queries like '$5 billion'
      or '15%' to match irrelevant documents, degrading search precision for financial analysis
    stage_ids:
    - search_discovery
  - id: finance-C-203
    when: When accessing search indices via cached_property
    action: allow modification of underlying sections after index construction
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Cached search indices become inconsistent with modified document content, producing search results that reference
      non-existent text locations or miss newly added content
    stage_ids:
    - search_discovery
  - id: finance-C-204
    when: When implementing Filing.document() or Filing.html() data retrieval
    action: Pass the HTML content through is_probably_html() validation before passing to HTMLParser
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-HTML content (PDFs, binary files, or malformed documents) passed to HTMLParser will cause parsing failures,
      resulting in None returns or corrupted Document objects
  - id: finance-C-205
    when: When implementing Filing.html() data retrieval with None values
    action: Handle None return values gracefully — the filing may be a paper filing or binary document
    severity: medium
    kind: domain_rule
    modality: must
    consequence: When Filing.html() returns None (paper filings, binary documents), downstream HTML parsing must return None
      without raising exceptions
  - id: finance-C-206
    when: When implementing Filing.xbrl() for XBRL data retrieval
    action: Verify that XBRL attachments are present and contain 'xbrl' content before creating XBRL objects
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Filings without XBRL data will cause XBRLFilingWithNoXbrlData exceptions, breaking the xbrl_processing stage
  - id: finance-C-207
    when: When handling XBRLAttachments for XBRL data retrieval
    action: Check that XML attachments contain '<xbrl' in the first 2000 characters to identify XBRL instance documents
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-XBRL XML files (schema, definition linkbases) may be incorrectly treated as instance documents, corrupting
      the XBRL parser input
  - id: finance-C-208
    when: When implementing XBRLS.from_filings() for statement stitching
    action: Filter amendments from filings list when creating XBRLS objects to avoid missing statement data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Amended filings (10-K/A, 10-Q/A) may not contain full XBRL data, causing incomplete stitched statements or
      missing period values
  - id: finance-C-209
    when: When implementing XBRLS.from_filings() for statement stitching
    action: Verify XBRL objects are ordered from newest to oldest filing date for proper temporal alignment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect temporal ordering of XBRL objects will produce stitched statements with misaligned periods, causing
      financial data analysis errors
  - id: finance-C-210
    when: When converting StitchedStatement to output in reporting
    action: Handle the conversion properly — render() produces Rich Table, to_dataframe() produces pandas DataFrame with XBRL
      structural elements filtered
    severity: medium
    kind: domain_rule
    modality: must
    consequence: XBRL structural elements (Axes, Domains, Members, Tables) must be filtered from output to prevent confusing
      users with internal XBRL metadata
  - id: finance-C-211
    when: When implementing Ownership.from_filing() for forms 3, 4, 5
    action: Handle XML content for ownership forms — these forms use XML format, not HTML
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Ownership forms 3, 4, 5 use XML primary documents. Attempting to parse them as HTML will result in malformed
      Ownership objects with missing transaction data
  - id: finance-C-212
    when: When implementing HasContext protocol for AI integration
    action: Verify objects passed to compose_context() either implement to_context() or have meaningful __str__() representations
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Objects without to_context() will fall back to str() which may truncate important financial context, reducing
      LLM analysis quality
  - id: finance-C-213
    when: When implementing compose_context() token budget management
    action: Allocate 60% of token budget to the first object and distribute remaining 40% equally among additional objects
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect budget allocation causes important context to be truncated or less important data to consume excessive
      tokens, degrading LLM analysis effectiveness
  - id: finance-C-214
    when: When implementing TenD.from_filing() for ABS filing processing
    action: Validate that the filing form is 10-D or 10-D/A before processing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Passing non-10-D filings to TenD processing will raise ValueError and fail the abs_filing_processing stage
  - id: finance-C-215
    when: When implementing Filings.filter() for search discovery
    action: Return filtered results as a Filings object with PyArrow Table data, not raw Filing objects
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Returning raw data instead of Filings object breaks method chaining (.latest(), [index], etc.) and causes
      downstream type errors
  - id: finance-C-216
    when: When accessing Filing objects from filtered Filings
    action: Use get_filing_at() method to retrieve individual Filing objects from PyArrow Table data
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Direct indexing on PyArrow Table bypasses enrichment logic, producing Filing objects with missing related
      entity information
  - id: finance-C-217
    when: When handling Form 4, 5 XML ownership documents
    action: Convert XML content to HTML via ownership.to_html() before rendering, as these forms lack XSLT rendering support
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Attempting to access SEC XSLT-rendered HTML for ownership forms will fail, resulting in missing or corrupted
      ownership report output
  - id: finance-C-218
    when: When processing HTML for document parsing
    action: Handle bytes-to-string conversion with UTF-8 decoding and fallback to latin-1 for malformed content
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Improper encoding handling causes UnicodeDecodeError when parsing filings with non-UTF-8 character encodings,
      breaking the HTML parsing pipeline
  - id: finance-C-219
    when: When implementing Document parsing for large filings
    action: Check document size against max_document_size threshold before parsing to avoid memory issues
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Attempting to parse extremely large documents (multi-MB) without streaming causes memory exhaustion and crashes
      the parsing process
  - id: finance-C-220
    when: When extracting XBRL facts from inline XBRL HTML
    action: Extract XBRL data BEFORE HTML preprocessing to preserve ix:hidden content in document metadata
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Preprocessing HTML before XBRL extraction removes ix:hidden elements, causing incomplete XBRL fact data in
      document metadata and lost financial data
  - id: finance-C-221
    when: When implementing Document sections extraction
    action: Normalize form types by removing /A suffix for section detection (10-K/A → 10-K)
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using amended form type (10-K/A) for section detection fails to match known patterns, causing incomplete
      section detection in amended filings
  - id: finance-C-222
    when: When implementing XBRL statement access
    action: Filter out statement abstracts (concepts ending with 'Abstract' where label equals concept) from user-facing output
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Statement abstracts like 'StatementOfFinancialPositionAbstract' are internal XBRL structure, not financial
      data. Including them confuses users and corrupts DataFrame output
  - id: finance-C-223
    when: When implementing XBRL period data across stitching
    action: Merge complementary rows with identical labels but non-overlapping period values when companies switch XBRL concepts
    severity: medium
    kind: domain_rule
    modality: must
    consequence: When companies switch from extension concepts to us-gaap concepts, identical labels appear in different rows.
      Without merging, users see incomplete financial data
  - id: finance-C-224
    when: When parsing financial monetary values in SEC filings
    action: Use Decimal type for monetary amounts to avoid floating-point precision errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point arithmetic produces rounding errors in financial calculations, leading to incorrect currency
      values in extracted data that may cause downstream analysis errors
  - id: finance-C-226
    when: When parsing ownership transactions (Form 3, 4, 5)
    action: 'Interpret buy_sell codes as: P=Purchase, S=Sale, A=Buy, D=Sell'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Transaction direction will be misclassified, leading to incorrect insider trading signals and portfolio position
      calculations
  - id: finance-C-227
    when: When working with XBRL financial facts
    action: Recognize that Period types are either 'instant' (point-in-time balance sheet items) or 'duration' (range for
      income/cash flow statements)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Balance sheet items (assets, equity) will be incorrectly matched with income statement periods (revenue,
      expenses), corrupting cross-statement analysis
  - id: finance-C-228
    when: When filtering or comparing form types
    action: Normalize form types by stripping '/A' suffix for amendments before comparison
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Amendment filings (e.g., '10-K/A') will be missed in searches for base forms (e.g., '10-K'), breaking historical
      analysis and filing completeness checks
  - id: finance-C-229
    when: When creating objects that need AI/LLM context generation
    action: Implement to_context(detail='standard') -> str method following the HasContext protocol
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Objects will not be usable with compose_context() utility, breaking AI integration and LLM-optimized context
      generation workflows
  - id: finance-C-230
    when: When parsing a filing to get typed data objects
    action: Assert the form type matches the expected form before parsing — wrong form causes silent failures or wrong data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Data objects will contain parsed data from the wrong filing type, leading to type confusion and incorrect
      financial analysis
  - id: finance-C-232
    when: When making HTTP requests to SEC EDGAR
    action: Respect the default rate limit of 9 requests per second to avoid being blocked by SEC
    severity: high
    kind: resource_boundary
    modality: must
    consequence: SEC EDGAR will temporarily block the IP address, causing extended service disruption and potential permanent
      rate limit reduction
  - id: finance-C-233
    when: When the httpxthrottlecache library is imported for HTTP caching
    action: Set locale to 'C' before httpxthrottlecache operations to verify consistent date parsing across each system locales
    severity: high
    kind: operational_lesson
    modality: must
    consequence: On non-English systems, HTTP date headers fail to parse causing cache misses and potential request failures
  - id: finance-C-235
    when: When presenting or reporting this system's capabilities to users
    action: Claim support for non-US securities filings — EdgarTools is designed specifically for US SEC EDGAR filings
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users attempt to analyze international securities using US filing formats, receiving empty results or parsing
      errors with no actionable data
  - id: finance-C-236
    when: When presenting or reporting this system's capabilities to users
    action: Claim derivative pricing support — EdgarTools provides filing data, not pricing models
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users rely on historical filing data for real-time derivative valuation, leading to incorrect pricing and
      potential financial losses
  - id: finance-C-238
    when: When using historical filing data for financial analysis
    action: Claim that historical XBRL-extracted financial data equals current market valuations — filings are backward-looking
      snapshots
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make investment decisions based on outdated financial positions, missing subsequent events that materially
      affect company valuation
  - id: finance-C-240
    when: When documenting library capabilities and behaviors
    action: Document behaviors that cannot be verified — 'if we can't verify it, we don't promise it'
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Documentation promises features that may be broken, leading to user frustration and incorrect usage patterns
  - id: finance-C-241
    when: When handling parsing failures or missing data
    action: Return None silently — failures must raise useful errors so users know data is missing
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Users receive None values without explanation, continuing analysis with missing data leading to incorrect
      conclusions
  - id: finance-C-242
    when: When implementing or refactoring identifier resolution logic in edgar/entity/core.py
    action: 'Maintain the exact fallback resolution order: Ticker → CIK → name; cached lookups must be attempted before network
      queries'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the fallback chain order (e.g., resolving name before CIK, or missing CIK lookup) causes incorrect
      entity resolution, returning wrong company data for ambiguous inputs
    derived_from_bd_id: BD-017
  - id: finance-C-243
    when: When implementing or refactoring header detection in edgar/documents/strategies/header_detection.py
    action: 'Maintain the calibrated voting ensemble weights exactly: pattern=0.4, style=0.3, structural=0.2, contextual=0.1;
      each five detector types must be included in the voting ensemble'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying detector weights or removing detectors causes silent degradation in header detection accuracy,
      leading to incorrect document section parsing and wrong data extraction
    derived_from_bd_id: BD-005
  - id: finance-C-244
    when: When implementing multi-process backtesting scenarios using MappingStore
    action: Assume MappingStore singleton persists across process boundaries; each process must initialize its own store instance
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Sharing singleton state across processes causes each worker to read the same file independently, wasting
      memory and potentially causing race conditions in shared caches
    derived_from_bd_id: BD-003
  - id: finance-C-245
    when: When configuring or modifying header detection defaults
    action: Verify that detector_weights defaults match the calibrated values {style:0.3, pattern:0.4, structural:0.2, contextual:0.1}
      before applying to production backtesting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect weights cause silent header misclassification, leading to wrong section extraction in parsed SEC
      filings which propagates into incorrect financial statement data
    derived_from_bd_id: BD-083
  - id: finance-C-246
    when: When rendering XBRL financial statements using edgar/xbrl/abstract_detection.py
    action: Filter out abstract concepts (concepts ending with 'Abstract' suffix, e.g., us-gaap:BalanceSheetAbstract) before
      rendering line items; underlying data model must retain abstract concepts for taxonomy navigation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Displaying abstract concepts as line items in financial statements causes confusion and incorrect financial
      interpretation by end users viewing the rendered output
    derived_from_bd_id: BD-012
  - id: finance-C-247
    when: When calculating financial ratios with missing primary concept data in SEC filings
    action: Use concept equivalents as fallback (e.g., NetIncomeLoss → ProfitLoss, OperatingIncomeLoss) rather than returning
      zero or failing silently
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silent zero-values for missing concepts produce misleading financial ratios; strategies based on these ratios
      will have inflated or deflated performance estimates that don't match actual company fundamentals
    derived_from_bd_id: BD-036
  - id: finance-C-248
    when: When implementing Return on Assets (ROA) calculation
    action: 'Use average of beginning and ending period assets as denominator (formula: NetIncome / Average(TotalAssets_current,
      TotalAssets_previous)) rather than end-of-period assets only'
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using only end-of-period assets distorts ROA for companies with large intra-period asset changes; a company
      that grows assets mid-quarter would show artificially high or low returns, leading to incorrect investment decisions
      based on ratio analysis
    derived_from_bd_id: BD-035
  - id: finance-C-249
    when: When calculating cross-statement financial ratios like ROE, ROA, or P/E ratio
    action: Intersect available_periods across income statement, balance sheet, and cash flow statement before calculating
      ratios; verify each ratio uses data from the same reporting period
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using mismatched periods (e.g., Q1 income with Q2 balance sheet) produces meaningless cross-statement ratios
      that mix temporal data; backtested strategies using these ratios will show inconsistent behavior between backtesting
      and live trading
    derived_from_bd_id: BD-045
  - id: finance-C-250
    when: When parsing hierarchical SEC filing HTML documents
    action: Apply forward-fill (ffill) to designated header columns (Item, Part) to propagate identifiers through DataFrame
      rows; data columns must use explicit None for missing values instead of implicit forward-fill
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Incorrect fill direction (back-fill) corrupts document structure interpretation; applying forward-fill to
      data columns introduces phantom values where the original SEC filing had no data, distorting extracted financial information
    derived_from_bd_id: BD-059
  - id: finance-C-251
    when: When implementing section detection logic for SEC filings
    action: 'Implement fallback chain: TOC detection first, then Pattern matching, then Heading detection as final fallback;
      do not skip or reorder the chain as each strategy handles different filing structures'
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Changing the fallback order or removing strategies breaks section detection for certain filing types; without
      proper fallback, critical sections may be misclassified or missed entirely, causing downstream analysis to operate on
      incorrect document structure
    derived_from_bd_id: BD-006
  - id: finance-C-252
    when: When accessing extracted text from SEC filing documents multiple times within a session
    action: Implement instance-level lazy caching (via CacheableMixin or equivalent) to avoid re-parsing HTML for repeated
      document access; avoid eager caching at load time to prevent memory bloat with large document sets
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without lazy caching, repeated text access triggers redundant HTML parsing operations; for read-heavy workloads
      accessing the same document sections, this causes significant performance degradation and increased CPU usage
    derived_from_bd_id: BD-007
  - id: finance-C-253
    when: When implementing content search functionality for SEC document retrieval
    action: Use BM25 ranking algorithm for relevance-ranked search results with term frequency normalization; do not use simple
      regex matching as it produces unranked results where common terms dominate
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using regex matching instead of BM25 produces unranked search results where common financial terms (revenue,
      company, financial) dominate; users cannot find relevant sections within long SEC documents, degrading search utility
      for investment research
    derived_from_bd_id: BD-030
  - id: finance-C-254
    when: When configuring BM25 ranking parameters for SEC document search
    action: Set BM25 parameters k1=1.5 for term frequency saturation and b=0.75 for document length normalization; these values
      are tuned for SEC document corpus where length variation is significant
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using default BM25 parameters (k1=1.2, b=0.75) optimized for web search under-weights term frequency saturation
      for SEC documents; financial terms appearing frequently in long 10-K filings will be over-penalized, reducing search
      relevance for legitimate repeated concepts
    derived_from_bd_id: BD-082
  - id: finance-C-255
    when: When implementing financial ratio calculations that require cross-statement data alignment
    action: Implement period intersection logic to find common dates across income statement, balance sheet, and cash flow
      before calculating ratios; discard periods where any required statement is missing data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without period intersection, ratios may combine Q1 income statement with Q2 balance sheet, producing nonsensical
      financial metrics; backtesting strategies on misaligned ratios creates systematic errors that don't reflect actual company
      performance
    derived_from_bd_id: BD-045
  - id: finance-C-257
    when: When implementing XBRL fact retrieval and ratio calculations
    action: 'Use three-tier lookup order: (1) authoritative concept mapping first, (2) direct XBRL concept match second, (3)
      label-based matching as final fallback — verify each tier provides correct data before proceeding to the next'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping concept mapping lookup produces incorrect financial ratios by using non-authoritative label matches;
      downstream analysis may select wrong valuation metrics, leading to poor investment decisions
    derived_from_bd_id: BD-046
  - id: finance-C-258
    when: When interpreting revenue and cash flow values for company analysis
    action: 'Apply scale-based contextualization: treat values >= 1B as large-cap, 100M to 1B as mid-cap, < 100M as small-cap;
      contextualize significance within magnitude category rather than using absolute thresholds alone'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without scale interpretation, small absolute values are dismissed as unimportant when they may represent
      significant percentages for smaller companies; AI analysis may incorrectly filter out relevant small-cap metrics
    derived_from_bd_id: BD-042
  - id: finance-C-259
    when: When performing period-over-period comparisons using XBRL financial data
    action: Use fiscal year intelligence to align periods when entity metadata is available; when entity metadata is unavailable,
      explicitly use calendar quarters and document this limitation — never compare quarters from different fiscal year patterns
      without fiscal alignment
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Comparing fiscal quarters without alignment produces misleading cross-company comparisons; Q1 of a company
      with March fiscal year-end is compared against a different business cycle than Q1 of a calendar-year company
    derived_from_bd_id: BD-010
  - id: finance-C-260
    when: When processing SEC form types for amendment detection and filtering
    action: Normalize form type strings by stripping the '/A' suffix from amendments before base form comparison — verify
      'SC 13G/A' matches 'SC 13G' as the same base form type
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without stripping '/A' suffix, amendment forms are treated as distinct from original filings, causing duplicate
      processing, incorrect filing counts, and broken amendment tracking in compliance workflows
    derived_from_bd_id: BD-094
  - id: finance-C-261
    when: When implementing BM25 text search with CUSIP-based company identification
    action: Apply number normalization (decimal pattern conversion) before CUSIP extraction or matching — preserve 9-character
      CUSIP patterns (xxx-xx-xxx or xxx.xxx.xxx format) unchanged during text preprocessing
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: BM25 number normalization transforms 9-digit CUSIP identifiers into decimal patterns like 'xx.xxxxxx', breaking
      downstream CUSIP extraction by regex and Jaro similarity matching; company searches by CUSIP silently fail returning
      no results
    derived_from_bd_id: BD-104
  - id: finance-C-262
    when: When implementing fraud detection statistical tests in the edgar/xbrl/analysis/fraud module
    action: Use scipy.stats.chi2.cdf() for p-value calculation from chi-square test statistics — this provides precise statistical
      significance enabling threshold-based fraud alerts with known false-positive rates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using approximate or custom p-value calculations instead of scipy chi2.cdf may produce incorrect statistical
      significance, causing fraud alerts to fire on false positives or miss actual fraudulent reporting patterns
    derived_from_bd_id: BD-053
  - id: finance-C-263
    when: When implementing portfolio holding aggregation and reporting
    action: Sort aggregated holdings by Value in descending order as primary sort key, with CUSIP as secondary sort for deterministic
      ordering of equal-value positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-descending sort or alphabetical sorting by name obscures portfolio concentration risk; analysts
      may miss large position exposures affecting fund strategy and regulatory reporting accuracy
    derived_from_bd_id: BD-056
  - id: finance-C-265
    when: When processing SEC filing data that may contain N/A string variants
    action: Convert N/A string variants ('N/A', 'n/a', 'NA', 'na', 'N/A') to Python None for consistent null handling — retain
      numeric strings like 'NA' company suffixes by checking context (non-string or no exact string match)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Keeping N/A strings causes type errors in downstream numeric operations and creates inconsistent null handling
      where missing data is treated differently depending on source format
    derived_from_bd_id: BD-071
  - id: finance-C-267
    when: When implementing period selection for financial statement analysis queries
    action: Verify that period selection criteria are mutually exclusive within a single request — use either RECENT_PERIODS
      for investor analysis or FISCAL_YEARS for historical trend analysis, but not both in the same query without explicit
      handling
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Mixing RECENT_PERIODS and FISCAL_YEARS in the same query returns unexpected results as the selection logic
      assumes mutually exclusive criteria, potentially causing analysts to use incorrect time periods for investment decisions
    derived_from_bd_id: BD-014
  - id: finance-C-268
    when: When implementing classes that need to work with the compose_context() function
    action: Verify that to_context() implementation returns properly structured context objects — Protocol-based duck typing
      accepts any object claiming to implement the interface without validating actual compliance
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrectly implemented to_context() methods are silently accepted due to duck typing, causing entity resolution
      to produce wrong contexts that corrupt downstream financial data aggregation and relationship mapping
    derived_from_bd_id: BD-016
  - id: finance-C-269
    when: When implementing financial value parsing in the edgar library
    action: Use Python Decimal type for parsing monetary values and performing financial calculations — verify parsed values
      maintain exact decimal representation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using float arithmetic causes binary representation errors (e.g., $10.99 becomes 10.989999...), leading to
      accumulating rounding errors in portfolio valuations and cost basis calculations
    derived_from_bd_id: BD-070
  - id: finance-C-270
    when: When parsing Form D filings in the edgar library
    action: Use BeautifulSoup with 'xml' parser for Form D parsing — do not use html.parser which cannot handle XML declarations,
      namespaces, and entity references
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using html.parser on XML-formatted Form D filings causes parsing failures and data corruption when encountering
      XML namespaces or entity references, resulting in incomplete or missing filing data
    derived_from_bd_id: BD-072
  - id: finance-C-274
    when: When configuring hybrid search mode
    action: Validate that bm25_weight + semantic_weight equals 1.0 with tolerance of 0.01 — reject configuration if sum is
      outside [0.99, 1.01] range
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Invalid weight sums cause hybrid search relevance scores to exceed or fall short of 100%, distorting ranking
      results and potentially hiding relevant documents
    derived_from_bd_id: BD-093
  - id: finance-C-275
    when: When implementing financial metric calculation for Balance Sheet data
    action: Apply Trailing Twelve Months (TTM) aggregation to balance sheet queries — TTM represents cumulative flow data
      incompatible with point-in-time snapshots; return error instead of calculating
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Calculating TTM on balance sheet data produces misleading values since balance sheets represent snapshots
      at period end, not cumulative flows; strategies relying on this data will have incorrect position valuations
    derived_from_bd_id: BD-097
  - id: finance-C-276
    when: When resolving entity identifiers from SEC filings
    action: Validate form type before entity resolution — verify form type assertion from BD-092 passes before applying BD-017's
      fallback chain (Ticker -> CIK -> name)
    severity: high
    kind: domain_rule
    modality: must
    consequence: If form type validation fails silently, entity resolver queries wrong SEC database endpoint or uses incorrect
      parsing logic, causing wrong entity associations and incorrect fundamental data attribution
    derived_from_bd_id: BD-102
  - id: finance-C-277
    when: When using ML-assisted document parsing with default DetectionThresholds
    action: Verify that min_confidence=0.6 and cross_validation_boost=1.2 match your precision requirements — adjust thresholds
      if false positives or false negatives cause unacceptable data quality issues
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default confidence thresholds balance precision vs recall but may not match strategy requirements; false
      positives introduce noise while false negatives miss critical disclosures, both degrading strategy performance silently
    derived_from_bd_id: BD-091
  - id: finance-C-278
    when: When enabling ML-assisted features via ParserConfig.features
    action: Verify that the default feature flag configuration enables required capabilities — check that semantic search,
      table understanding, and other ML features are explicitly enabled when needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default feature flags may silently disable ML-assisted parsing, causing degraded document understanding when
      semantic relationships or table structure interpretation are required for accurate financial data extraction
    derived_from_bd_id: BD-092
  - id: finance-C-279
    when: When querying 13F institutional holdings filings
    action: Verify that use_latest_period_of_report=False matches your analysis requirements — if analyzing specific quarter
      data, verify no unintended period switching occurs when multiple filings exist
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default exact-period matching prevents unintended period switching but may miss the most recent filing if
      not explicitly specified; using wrong period quarters causes incorrect holdings analysis and portfolio positioning errors
    derived_from_bd_id: BD-096
  - id: finance-C-280
    when: When implementing train/test split logic for ML model development
    action: Assume the framework implements train/test time split integrity — the framework does not enforce temporal ordering
      between train and test datasets; test data may inadvertently contain information from the training period
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without train/test time split integrity, models trained on historical data will appear more accurate than
      they actually are; live trading performance will fall significantly below backtested results due to look-ahead bias
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-281
    when: When implementing train/test split logic for ML model development
    action: Verify that each test set timestamps exceed the maximum training set timestamp; implement data leakage checks
      that fail when any test record predates a training record
    severity: high
    kind: domain_rule
    modality: must
    consequence: Data leakage between train and test sets inflates model performance metrics; without explicit temporal ordering
      checks, models will fail to generalize to truly future data in live trading
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-282
    when: When calculating strategy returns or position costs for multi-day holding periods
    action: Assume the framework implements carry or funding cost modeling — the framework does not model overnight financing
      costs, margin interest, or dividend passed-through adjustments
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without carry/funding cost modeling, strategies with overnight positions appear more profitable than they
      actually are; live trading will incur financing costs that backtests do not reflect, causing sustained underperformance
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-283
    when: When backtesting strategies with multi-day holding periods or using margin accounts
    action: 'Implement explicit carry cost deduction: for each overnight position, subtract margin_rate * position_value *
      days_held / 365 from strategy returns; for short positions, add dividend_accrual adjustments'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Overnight positions incur financing costs that accumulate over time; strategies that appear profitable in
      backtest may become unprofitable after accounting for carry costs in live trading
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-284
    when: When determining BDC active status for entity filtering or inclusion logic
    action: Verify that the 18-month inactivity threshold matches your analysis requirements; BDCs in wind-down phase may
      still file periodically and be incorrectly marked as active
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using the default 18-month threshold may include BDCs in terminal wind-down phases or exclude active BDCs
      that missed a filing deadline; both errors distort portfolio composition and performance analysis
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-285
    when: When evaluating AI skill effectiveness using the A/B comparison framework
    action: Verify that the minimal context baseline provides a fair comparison; when skills rely on prior conversation context,
      the baseline comparison may be biased toward showing larger skill improvements
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using minimal context instead of empty context as baseline inflates skill value measurement; AI evaluations
      may claim larger improvements than users would actually experience in isolated interactions
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-286
    when: When deriving quarterly values from YTD cumulative figures for financial reporting
    action: 'Implement sum-check validation after deriving: verify Q1 + Q2 + Q3 + Q4 equals FY; flag amended reports with
      inconsistent cumulative values or companies reporting discrete quarters instead of YTD'
    severity: high
    kind: domain_rule
    modality: must
    consequence: YTD-to-quarterly derivation produces incorrect discrete quarters when companies file amended reports with
      different cumulative values or switch reporting formats; silent errors propagate to TTM calculations and valuation models
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-287
    when: When aggregating beneficial ownership percentages across multiple 13D/13G filings
    action: Implement ownership group detection to identify overlapping beneficial owners within a single filing and prevent
      double-counting; cross-reference amendments to track control chain changes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Summing raw per-reporter percentages double-counts overlapping ownership in control groups, overstating total
      ownership by 10-40% for entities with complex ownership structures; investment decisions based on inflated ownership
      data lead to incorrect position sizing
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-288
    when: When implementing backtesting logic in data_retrieval stage
    action: Assume the framework provides backtest overfitting protection — no such protection mechanism is implemented
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Strategies without overfitting protection may appear profitable in backtests but fail in live trading, leading
      to capital losses when deploying under-optimized parameters
    derived_from_bd_id: BD-GAP-029
  - id: finance-C-289
    when: When validating backtest robustness before production deployment
    action: Implement walk-forward analysis or out-of-sample testing with train/test split ratios (e.g., 70/30) to detect
      overfitting; use metrics like Sharpe ratio degradation between in-sample and out-of-sample periods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without overfitting detection, backtest-optimized strategies fail to generalize, causing live trading losses
      when market conditions change
    derived_from_bd_id: BD-GAP-029
  - id: finance-C-290
    when: When implementing ESG or sustainability reporting in data_retrieval stage
    action: Assume the framework defines GHG emission scope boundaries (Scope 1/2/3) — no such boundary definitions are implemented
      in the framework
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Missing scope boundaries causes GHG data to be aggregated without proper categorization, resulting in non-compliant
      ESG reports that misattribute emissions sources
    derived_from_bd_id: BD-GAP-031
  - id: finance-C-291
    when: When retrieving or processing GHG emission data for sustainability reports
    action: 'Apply explicit scope categorization: Scope 1 (direct emissions) must use fuel_combustion fields, Scope 2 (indirect
      energy) must use electricity_purchased fields, Scope 3 (value chain) must use supply_chain_activity fields; annotate
      each data point with scope indicator before aggregation'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit scope categorization, Scope 3 emissions are misclassified as Scope 1/2, leading to regulatory
      non-compliance and inaccurate sustainability disclosures
    derived_from_bd_id: BD-GAP-031
  - id: finance-C-292
    when: When processing SEC EDGAR filings with individual names that contain prefixes or compound surnames
    action: Verify name reversal logic handles prefixes (Van, De, Mac, O', Le, La) and compound surnames (e.g., 'Van Halen',
      'Delacroix', 'MacDonald'); add prefix detection before reversal to avoid incorrect ordering
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Name reversal incorrectly transforms 'Van Halen' to 'Halen Van' and 'De Marco' to 'Marco De', corrupting
      officer/director name records in entity databases
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-293
    when: When using concept learning for niche industries with legitimate rare concepts
    action: Verify that 0.3 occurrence threshold does not filter industry-specific concepts; for niche sectors, lower threshold
      to 0.1-0.15 or implement manual concept allowlist for critical industry terms
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The 0.3 threshold filters legitimate rare concepts in niche industries (e.g., rare earth mining, specialty
      pharma), degrading mapping accuracy for domain-specific XBRL concepts
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-294
    when: When scaling filing harness storage beyond typical database limits
    action: Monitor SQLite database size; plan migration to PostgreSQL or DuckDB when approaching 50GB or when concurrent
      write latency exceeds 100ms; set up automated size alerting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: SQLite with WAL mode degrades severely beyond 100GB with increased write contention, causing query timeouts
      and potential data corruption under heavy concurrent access
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-295
    when: When detecting stock splits using 'StockSplitConversionRatio' XBRL facts for reporting
    action: Verify split detection handles delayed reporting from 10-Q and annual filings; implement secondary check using
      closing price discontinuity detection (ratio > 1.5 or < 0.67 within 5-day window) to catch splits missing from XBRL
      facts
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: When splits are reported only in 10-Q/annual filings with filing lag, split-adjusted price calculations are
      incorrect, causing artificial price jumps that distort returns and valuations
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-296
    when: When implementing ratio calculation logic for financial data processing
    action: Convert empty strings to NaN (not zero) before numeric operations — use pandas fillna or explicit NaN conversion
      to preserve null-semantics in ratio calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Treating empty strings as zeros conflates missing data with zero values, causing ratio calculations to produce
      incorrect results (e.g., a missing divisor incorrectly yields 0 instead of NaN), which propagates through period-over-period
      analysis
    derived_from_bd_id: BD-038
  - id: finance-C-297
    when: When implementing filing selection logic in data retrieval
    action: Use the exact filing passed by the caller (self._actual_filing) rather than auto-selecting the latest related
      filing — verify deterministic behavior when specific filings are referenced
    severity: high
    kind: domain_rule
    modality: must
    consequence: Auto-selecting the latest related filing causes silent context switching where analysis on filing A unexpectedly
      uses data from filing B, leading to incorrect conclusions and non-reproducible results
    derived_from_bd_id: BD-047
  - id: finance-C-298
    when: When implementing or modifying XBRL stitching logic in financial statement processing
    action: Deduplicate standard concepts before merging — check for duplicate concept names within the same period and merge
      using the most recent/authoritative value (typically from latest amendment or filing)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without deduplication, the same standard concept appearing multiple times due to XBRL taxonomy inheritance
      or filing amendments creates duplicate rows that distort financial analysis, leading to incorrect ratio calculations
      and misstated financial metrics
    derived_from_bd_id: BD-013
  - id: finance-C-299
    when: When evaluating code using the weighted scoring model in evaluate_code
    action: 'Use exact weight values: execution=1.0, pattern_compliance=0.5, token_efficiency=0.3 — weights MUST NOT be modified
      without recalibrating against test cases; verify weights sum to 1.8 (unnormalized scoring is intentional)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing individual weights without recalibrating the entire scoring model causes systematic evaluation bias;
      higher execution weight (1.0) means execution correctness dominates, but modified weights without validation produce
      unreliable code quality assessments
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-300
    when: When modifying pattern expectations or evaluation criteria in AI code evaluation
    action: Recalibrate each weight values (execution=1.0, pattern_compliance=0.5, token_efficiency=0.3) whenever pattern
      expectations change — verify new weights maintain intended prioritization through test case validation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The unnormalized weighting system (sum=1.8) is calibrated to specific pattern expectations; when pattern
      expectations change without weight recalibration, the scoring model becomes misaligned, causing systematic under/over-scoring
      of code quality
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-301
    when: When executing AI-generated code during SEC document processing evaluation
    action: Enforce a hard 30-second execution timeout as a resource management guardrail; terminate any operation exceeding
      this limit
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Operations exceeding the 30-second timeout are forcibly terminated, causing legitimate computationally intensive
      valid code to fail; backtest results may be incomplete if complex calculations cannot finish within the time limit
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-302
    when: When parsing ownership documents with footnotes containing transaction value context
    action: Parse and resolve footnote text from transaction value fields before using values for analysis — verify footnote
      text structure matches expected format
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without footnote resolution, transaction values like 'Approximately 50,000 shares based on $25.00 average
      price' remain as raw text strings, causing downstream calculations to fail or use incorrect values
    derived_from_bd_id: BD-020
  - id: finance-C-303
    when: When allocating token budgets in multi-object financial document contexts for AI analysis
    action: Allocate 60% of token budget to the first object containing primary financial statements (balance sheet or income
      statement), and 40% split among supporting objects
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Equal token distribution underweights primary financial statements, causing AI analysis to have insufficient
      context for key decisions and potentially miss critical financial information
    derived_from_bd_id: BD-022
  - id: finance-C-304
    when: When implementing fraud detection using Benford's Law chi-square test on financial data
    action: Use chi-square goodness-of-fit test with exactly 8 degrees of freedom (digits 1-9 minus 1 constraint for sum of
      probabilities) to detect anomalous first-digit distributions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect degrees of freedom invalidates statistical inference, causing false positives in fraud alerts
      or missing actual anomalies — compromising the reliability of fraud detection at alpha=0.05 significance level
    derived_from_bd_id: BD-052
  - id: finance-C-305
    when: When calculating net change in holdings from ownership filings
    action: Calculate net change in holdings as the arithmetic sum of transaction shares where disposed shares are recorded
      as negative values and acquired shares are recorded as positive values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect sign convention will invert position change calculations, causing net holdings to show disposals
      as acquisitions and vice versa, leading to fundamentally wrong portfolio positions in backtesting
    derived_from_bd_id: BD-069
  - id: finance-C-306
    when: When using batch ratio calculations that depend on standardized gaap_mappings
    action: Implement version binding or audit trail mechanism for gaap_mappings.json to verify reproducible ratio outputs;
      each ratio calculations must include mapping version metadata and fail or warn when versions differ between runs
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Silent risk cascade occurs when gaap_mappings.json is updated between runs, causing identical filings to
      produce different ratio outputs without any version binding or audit trail, invalidating historical comparisons and
      potentially corrupting downstream analysis
    derived_from_bd_id: BD-103
  - id: finance-C-307
    when: When calculating trailing twelve months (TTM) figures for financial reporting
    action: Verify TTM calculation selects exactly 4 most recent consecutive quarters ending on or before the reference date;
      implement fiscal year boundary validation and fail with clear error when non-standard quarter boundaries cause calculation
      ambiguity
    severity: high
    kind: domain_rule
    modality: must
    consequence: TTM calculation breaks when fiscal year ends mid-quarter causing non-standard quarter boundaries, producing
      incorrect trailing twelve-month figures that misrepresent actual financial performance and lead to wrong investment
      decisions
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-308
    when: When validating TTM window selection before calculation
    action: Verify each 4 selected quarters are consecutive and fall within the same fiscal year; if fiscal year boundary
      causes non-standard quarters, log warning and return NaN instead of silently calculating with misaligned quarters
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Silent TTM calculation with misaligned fiscal quarters produces numerically plausible but semantically incorrect
      trailing twelve-month figures that misrepresent company financial performance over actual time windows
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-309
    when: When implementing data staleness detection logic for SEC filings
    action: Use 999999 days as the sentinel value when filing_date is None — do not replace with None, 0, or any other numeric
      value, and do not attempt actual date calculation for missing dates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using None or 0 for missing filing dates causes staleness calculations to return 0 or fail, making complete
      data absence indistinguishable from current filings and allowing stale data to be treated as fresh
    derived_from_bd_id: BD-057
  - id: finance-C-310
    when: When implementing hybrid ranking engine for financial document search
    action: Weight BM25 scores at 0.8 (80%) and semantic embedding scores at 0.2 (20%) in hybrid ranking — BM25 must dominate
      to preserve exact term match precision critical for financial queries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Equal weighting or reduced BM25 weight dilutes exact match precision, causing semantically related but financially
      incorrect documents to rank higher than exact matches, degrading search relevance for regulatory and financial queries
    derived_from_bd_id: BD-064
  - id: finance-C-311
    when: When preprocessing text queries for BM25 search indexing
    action: Normalize 1-2 digit numbers to 'xx.x' pattern to generalize numeric queries — preserve exact digits for CUSIPs
      and CIKs due to precision requirements, only normalizing financial magnitude numbers
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Over-normalizing CUSIPs or CIKs destroys identifier precision, causing wrong securities to be matched; under-normalizing
      financial magnitudes requires exact year matches where generalization is desired
    derived_from_bd_id: BD-065
  - id: finance-C-312
    when: When implementing BM25 search ranking results filtering
    action: Filter results to include only nodes with BM25 score > 0 — exclude zero and negative scores which indicate no
      query term matches
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including zero-score nodes returns documents with no query term matches, polluting search results with irrelevant
      content and degrading LLM tool selection accuracy
    derived_from_bd_id: BD-077
  - id: finance-C-313
    when: When initializing Campaign objects with FormC filing data
    action: Parse and cache FormC data immediately on Campaign initialization — do not use lazy parsing that triggers XML
      parsing on each property access
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Lazy parsing causes unpredictable latency spikes when accessing FormC properties multiple times; eager caching
      trades memory for consistent CPU usage
    derived_from_bd_id: BD-078
  - id: finance-C-314
    when: When implementing or extending MCP tool response handlers
    action: Use the standard ToolResponse format with status, data, and error fields — verify consistent JSON schema across
      each MCP tools
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Non-standard response formats break LLM parsing of tool results; clients expecting standard fields receive
      undefined values causing downstream processing failures
    derived_from_bd_id: BD-024
  - id: finance-C-315
    when: When implementing formatting logic for RenderedStatement that requires disk caching or cross-process sharing
    action: Use class-based CellFormatter instead of closures or lambda functions — closures cannot be pickled for serialization
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Closures fail silently during pickling serialization for disk caching or multiprocessing, causing serialization
      errors that break caching infrastructure without obvious error messages
    derived_from_bd_id: BD-028
  - id: finance-C-316
    when: When implementing or refactoring non-accrual extraction logic in the data_retrieval stage
    action: 'Maintain the three-tier priority order: XBRL footnotes → dimensional XBRL → aggregate concepts; never reorder
      or remove tiers, and verify each tier serves as a fallback when prior tier fails'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the extraction priority may cause aggregate totals to be used instead of richer footnote data, leading
      to understated non-accrual amounts and incorrect portfolio risk assessment for bank holding company analysis
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-317
    when: When implementing or refactoring investment classification logic in the data_retrieval stage
    action: Execute label-based detection first to classify investments efficiently; use XBRL data signals as fallback only
      when label-based detection fails or returns ambiguous results; never skip either tier
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping label-based detection or removing XBRL fallback causes misclassification of investments as equity
      vs debt, distorting portfolio composition reports and risk metrics for regulatory filings
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-318
    when: When implementing or refactoring 13F infotable parsing logic in the data_retrieval stage
    action: Use <S>/<C> column position markers as the primary parsing strategy when present; fall back to CUSIP anchor regex
      parsing only when column markers are absent; never attempt to use CUSIP anchor when column markers are available
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using CUSIP anchor regex when column markers are present may misalign column boundaries, causing value columns
      to be parsed in wrong positions and producing corrupted position size data for SEC filings
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-319
    when: When implementing or refactoring fund hierarchy resolution logic in the entity_resolution stage
    action: Attempt resolution using cached tickers first (0 HTTP calls) for instant resolution; only invoke browse-edgar
      (2 HTTP calls) for unknown tickers when cache misses; never skip cache lookup or bypass HTTP fallback for unknown tickers
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping cached ticker lookup forces unnecessary HTTP calls for every fund, hitting SEC rate limits quickly;
      bypassing HTTP fallback for unknown tickers results in unresolved fund entities causing downstream portfolio analysis
      failures
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-321
    when: When implementing financial fraud detection using Benford's Law first-digit analysis alongside ROA calculations
    action: Verify that ROA denominator calculations do not use average-of-period assets (BD-035) when combined with Benford's
      Law fraud detection (BD-054) — the averaging smooths asset values too uniformly, artificially creating Benford-conforming
      distributions even for manipulated data
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Fraud detection using Benford's Law produces false negatives because averaging under BD-035 masks natural
      variability that Benford's Law (BD-054) relies on to detect manipulation, allowing fraudulent filings to pass undetected
      in backtesting
    derived_from_bd_id: BD-107
  - id: finance-C-322
    when: When implementing code generation evaluation with token budget constraints
    action: Assume character-based token estimation (~4 chars/token) provides accurate budget validation for complex nested
      code structures — this method systematically underestimates actual token count for indented code, JSON, or nested function
      calls
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Complex nested code structures exceed the 1024 token budget when evaluated with proper tokenizers (tiktoken),
      but pass character-based estimation, causing inconsistent evaluation results and allowing code that would exceed LLM
      context limits
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-323
    when: When implementing financial statement normalization and stitching pipeline
    action: Initialize MappingStore singleton (BD-003) before any stitching operations, and verify standardization mappings
      (BD-009) remain stable throughout — apply standardization explicitly before each stitch operation per BD-015 requirement
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Stitched financial statements have inconsistent canonical names when standardization is not applied before
      stitching or when mappings change between calls, causing downstream ratio calculations and fraud detection to fail silently
      or use wrong fields
    derived_from_bd_id: BD-100
  - id: finance-C-324
    when: When implementing period-over-period financial calculations using pandas shift(1) operations
    action: Verify common periods are established across each financial statements (per BD-045) before applying shift(1) —
      verify chronological alignment of data spans to prevent comparing mismatched time periods (e.g., Q1 income with Q2 balance
      sheet)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: shift(1) on misaligned data produces meaningless ratios by comparing income statement periods with balance
      sheet periods that do not correspond chronologically, silently corrupting ROA, leverage, and other key metrics
    derived_from_bd_id: BD-101
  - id: finance-C-325
    when: When implementing missing value handling for financial filing data (XBRL and Form D)
    action: Unify missing value conversion logic across filing types — establish a consistent policy for empty strings and
      N/A sentinel values; XBRL empty strings (BD-038) and Form D 'N/A' (BD-083) must be treated identically after normalization
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Semantically identical missing values are handled differently depending on filing type (empty string becomes
      NaN vs N/A becomes None), causing inconsistent ratio calculations and fraud detection results across the same company's
      mixed filing types
    derived_from_bd_id: BD-108
  - id: finance-C-326
    when: When conducting research using the /research command
    action: Document only what exists today without suggesting improvements, performing root cause analysis, or critiquing
      the implementation
    severity: high
    kind: rationalization_guard
    modality: must
    consequence: The research phase produces evaluative content instead of factual documentation, violating the separation
      of concerns in the FIC workflow
  - id: finance-C-327
    when: When implementing changes from a plan
    action: Run pre-implementation checks including git status, git diff, pytest baseline, and git branch verification
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Code changes proceed without verifying clean baseline, risking unnoticed regressions and state pollution
  - id: finance-C-329
    when: When creating checkpoint documents
    action: Include specific file paths with line numbers, clear next steps, technical decisions with rationale, and any blockers
      or issues encountered
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Checkpoint lacks critical context, making it impossible to resume work after context reset
  - id: finance-C-330
    when: When creating checkpoint documents
    action: Include code snippets in checkpoints since files are tracked in git
    severity: low
    kind: architecture_guardrail
    modality: must_not
    consequence: Checkpoint becomes stale and bloated as git tracks actual files
  - id: finance-C-333
    when: When writing verification tests
    action: Diversify test companies across industries including Finance, Healthcare, Energy, and International sectors
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Bugs in handling non-tech company filings remain undetected since approximately 70% of tests use tech companies
  - id: finance-C-336
    when: When creating documentation or code examples
    action: Read the relevant skill YAML files before writing any code examples to learn the correct API patterns
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Documentation contains incorrect API calls with wrong method names or parameters, misleading users
  - id: finance-C-337
    when: When finalizing Colab notebooks
    action: Execute and verify every code cell before finalizing the notebook
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Notebooks contain runtime errors that destroy credibility and fail when users try them
  - id: finance-C-338
    when: When analyzing code using the codebase-analyzer agent
    action: Document only how code works without suggesting improvements, critiquing quality, or recommending changes
    severity: high
    kind: rationalization_guard
    modality: must
    consequence: Analysis mixes documentation with evaluation, violating the separation of concerns that enables clean handoffs
  - id: finance-C-339
    when: When locating code using the codebase-locator agent
    action: Find and document where things exist without suggesting improvements, critiquing, or proposing changes
    severity: medium
    kind: rationalization_guard
    modality: must
    consequence: Locator output mixes factual location data with evaluative content
  - id: finance-C-340
    when: When finding patterns using the codebase-pattern-finder agent
    action: Find and document existing patterns without suggesting improvements, evaluating quality, or recommending alternatives
    severity: medium
    kind: rationalization_guard
    modality: must
    consequence: Pattern catalog mixes factual pattern documentation with evaluative content
  - id: finance-C-341
    when: When conducting research and spawning sub-agents
    action: Read mentioned files fully before spawning any sub-tasks
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Sub-agents receive incomplete context, leading to inaccurate research findings
  - id: finance-C-342
    when: When conducting research and spawning sub-agents
    action: Wait for each sub-agents to complete before synthesizing findings
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Research document is written with incomplete findings, missing critical information from pending sub-tasks
  - id: finance-C-344
    when: When creating network-dependent verification tests
    action: Use VCR cassettes to record and replay network responses for deterministic, fast tests
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Tests become slow, non-deterministic, and subject to SEC rate limits without cassettes
  - id: finance-C-345
    when: When writing examples in documentation
    action: Verify every documented code example is verifiable and runnable as a test
    severity: high
    kind: domain_rule
    modality: must
    consequence: Documentation promises functionality that does not work, breaking user trust
  - id: finance-C-347
    when: When investigating failures to determine root cause
    action: Determine whether the issue is in the codebase or caused by upstream SEC data changes before applying fixes
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Engineering effort is wasted fixing issues in SEC data that are outside the library's control
  - id: finance-C-348
    when: When the plan does not align with discovered reality
    action: Stop and document the mismatch clearly before proceeding with alternative approaches
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Implementation proceeds with incorrect assumptions, leading to broken code that doesn't match user expectations
  - id: finance-C-349
    when: When verifying the implementation plan phases
    action: Run verification steps from the plan including specific pytest tests and functionality checks after each phase
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Phases are marked complete without actually working, leading to broken code in later phases
  - id: finance-C-350
    when: When planning new features or changes
    action: Verify each phase is independently testable and builds on previous phases
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Phases cannot be verified independently, making it impossible to detect regressions early
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
