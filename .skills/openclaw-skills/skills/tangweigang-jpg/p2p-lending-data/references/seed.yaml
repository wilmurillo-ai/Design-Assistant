resources:
  packages:
  - name: frappe
    version_pin: latest
  - name: erpnext
    version_pin: latest
  - name: payments
    version_pin: latest
  - name: pypika
    version_pin: latest
  - name: flake8
    version_pin: latest
  - name: flake8-bugbear
    version_pin: latest
  - name: isort
    version_pin: latest
  - name: semgrep
    version_pin: latest
  - name: wkhtmltopdf
    version_pin: latest
  - name: frappe-bench
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install frappe
    - python3 -m pip install erpnext
    - python3 -m pip install payments
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing Loan Application validation for term loans
    action: require repayment_periods field when repayment_method is 'Repay Over Number of Periods'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without repayment_periods, the PMT formula cannot calculate monthly repayment amount, causing loan application
      calculations to fail or produce zero installments
    stage_ids:
    - loan_application
  - id: finance-C-002
    when: When implementing repayment validation for fixed amount loans
    action: enforce repayment_amount to be greater than monthly interest but less than loan amount
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: If repayment_amount is greater than loan_amount, borrower would repay principal faster than intended; if
      less than monthly interest, loan balance never decreases and becomes infinite debt
    stage_ids:
    - loan_application
  - id: finance-C-003
    when: When validating loan amount for loan applications
    action: enforce loan_amount does not exceed maximum_loan_amount from loan product or proposed securities
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Disbursing loan amounts exceeding product or collateral limits exposes the lender to uncollateralized risk
      and violates lending policy
    stage_ids:
    - loan_application
  - id: finance-C-008
    when: When checking sanctioned amount limits
    action: prevent loan applications where loan_amount plus existing loan exposure exceeds sanctioned limit
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Over-exposing the lending institution to a single applicant beyond sanctioned limits increases default risk
      concentration and violates internal lending policies
    stage_ids:
    - loan_application
  - id: finance-C-012
    when: When getting loan security price for pledge calculation
    action: proceed with loan application if loan_security_price returns None or 0
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Continuing with a zero or null security price causes pledge amount to be zero, allowing unlimited loan against
      non-valued collateral
    stage_ids:
    - loan_application
  - id: finance-C-014
    when: When creating Loan from Loan Application
    action: require loan application document status to be submitted (docstatus == 1)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Creating loans from unsubmitted applications bypasses approval workflows, allowing unverified loans to enter
      the disbursement pipeline
    stage_ids:
    - loan_application
  - id: finance-C-028
    when: When implementing loan disbursement validation
    action: Validate disbursed amount is non-zero before processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero disbursement amount causes downstream calculation errors in repayment schedule and GL entries, resulting
      in incorrect loan accounting
    stage_ids:
    - disbursement
  - id: finance-C-029
    when: When implementing loan disbursement validation
    action: Validate disbursed amount does not exceed loan limit or assigned security value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Disbursement exceeding loan limit or security value creates unbacked exposure, causing financial loss and
      regulatory non-compliance
    stage_ids:
    - disbursement
  - id: finance-C-030
    when: When implementing loan disbursement validation for Line of Credit
    action: Validate disbursement date falls within approved limit_applicable_start and limit_applicable_end dates
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Disbursement outside approved limit period violates credit authorization, creating unauthorized lending exposure
      and compliance violations
    stage_ids:
    - disbursement
  - id: finance-C-031
    when: When implementing loan disbursement validation
    action: Validate disbursement amount does not exceed available limit amount for LOC loans
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Disbursement exceeding available limit overdraws credit facility, causing unauthorized balance and potential
      regulatory violations
    stage_ids:
    - disbursement
  - id: finance-C-032
    when: When implementing loan disbursement validation
    action: Validate repayment start date is not before disbursement date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Repayment start date preceding disbursement date creates invalid repayment schedule with negative tenor,
      causing calculation errors
    stage_ids:
    - disbursement
  - id: finance-C-034
    when: When implementing GL entries for disbursement
    action: Only create GL entries when loan_accounting_enabled returns True for the company
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Creating GL entries when accounting is disabled causes duplicate or orphaned accounting records, corrupting
      the general ledger
    stage_ids:
    - disbursement
  - id: finance-C-046
    when: When creating Loan Interest Accrual documents for Normal Interest
    action: allow overlapping accrual date ranges for the same loan/disbursement/interest_type combination
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Duplicate interest calculations distort loan balances, causing financial records to show inflated or incorrect
      interest income and receivable amounts
    stage_ids:
    - accrual
  - id: finance-C-047
    when: When submitting Loan Interest Accrual documents
    action: provide a positive interest_amount value before submission
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Accrual entries with zero or missing interest amounts corrupt financial records and create invalid GL entries
      with zero debit/credit amounts
    stage_ids:
    - accrual
  - id: finance-C-048
    when: When processing interest accrual for Written Off loans
    action: create accrual entries with posting_date on or after the loan write-off date
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Accruing interest on written-off loans inflates income artificially, misrepresents loan portfolio value,
      and violates provisioning requirements
    stage_ids:
    - accrual
  - id: finance-C-050
    when: When processing accrual batches for multiple loans
    action: set loan_accrual_frequency to a valid value (Daily, Weekly, or Monthly) in the Company doctype
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Accrual batch processing fails without a valid frequency setting, preventing daily/weekly/monthly interest
      calculations as required by regulatory mandates
    stage_ids:
    - accrual
  - id: finance-C-051
    when: When creating GL entries for accrual
    action: configure required accounts (interest_accrued_account, interest_income_account, penalty_accrued_account, penalty_income_account)
      in the Loan Product
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Missing account configurations cause frappe.throw errors during accrual submission, blocking interest recording
      and GL entry creation
    stage_ids:
    - accrual
  - id: finance-C-055
    when: When submitting Loan Interest Accrual for NPA loans
    action: create suspense journal entries to move interest income to suspense accounts instead of recognizing income directly
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: NPA loans must not recognize interest income per IFRS9/regulatory requirements; direct income recognition
      violates accounting standards and triggers regulatory findings
    stage_ids:
    - accrual
  - id: finance-C-064
    when: When generating term loan demands from repayment schedule
    action: filter repayment schedule rows by demand_generated=0 to verify idempotent demand generation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without demand_generated=0 filter, the system will create duplicate Loan Demand documents for the same installment
      on reprocessing, causing financial record inflation and double billing
    stage_ids:
    - demand
  - id: finance-C-065
    when: When processing batched loan demands at scale
    action: enforce BATCH_SIZE=5000 loans per batch with per-loan commits to prevent transaction timeout
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without batching and per-loan commits, processing large volumes will cause database transaction timeout,
      leading to complete batch failure with no recovery mechanism
    stage_ids:
    - demand
  - id: finance-C-084
    when: When implementing loan repayment allocation logic
    action: use the collection_offset_sequence defined for the asset classification (Standard→Sub-Standard→Written-Off) retrieved
      via get_allocation_order()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violation causes regulatory non-compliance as repayment allocation order deviates from mandated collection_offset_sequence
      per asset classification, leading to incorrect fund flow and potential audit failures
    stage_ids:
    - repayment
  - id: finance-C-085
    when: When creating GL entries for loan repayment
    action: populate mandatory accounts (Payment Account, Loan Account, Interest Receivable Account, Penalty Receivable Account)
      before submitting the repayment
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: GL entries will have missing debit/credit mappings, causing accounting imbalance and failed audit trail for
      the repayment transaction
    stage_ids:
    - repayment
  - id: finance-C-086
    when: When processing backdated repayments
    action: trigger Loan Repayment Repost via create_repost() to recalculate accruals and demands for the affected period
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backdated repayment without repost causes accrual/demand inconsistency where interest calculations and demand
      amounts become inaccurate for the period before the repayment value date
    stage_ids:
    - repayment
  - id: finance-C-088
    when: When validating Full Settlement repayment type
    action: prevent backdating by checking value_date against the last repayment's value_date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backdated Full Settlement creates temporal inconsistency where settlement occurs before subsequent repayments,
      breaking the settlement sequence and potentially causing incorrect loan closure
    stage_ids:
    - repayment
  - id: finance-C-090
    when: When posting repayment after Full Settlement
    action: allow any repayment type except Interest Waiver, Penalty Waiver, or Charges Waiver
    severity: fatal
    kind: operational_lesson
    modality: must_not
    consequence: Posting non-waiver repayments after Full Settlement violates the settlement closure state, corrupting loan
      status and creating duplicate payment records for an already-closed loan
    stage_ids:
    - repayment
  - id: finance-C-091
    when: When submitting a loan repayment
    action: execute update_demands() to mark Loan Demand records as allocated with paid_amount and outstanding_amount updates
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Demands remain in unpaid state after repayment, causing demand tracking inconsistency where the system shows
      unpaid demands that have actually been settled
    stage_ids:
    - repayment
  - id: finance-C-092
    when: When submitting a loan repayment with loan accounting enabled
    action: execute make_gl_entries() after each demand allocation and status updates
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: GL entries are not created, breaking the accounting chain where repayments are recorded without corresponding
      debit/credit entries, causing financial statement imbalance
    stage_ids:
    - repayment
  - id: finance-C-097
    when: When processing repayment for written-off or settled loans
    action: enforce specific repayment types (Write Off Recovery/Write Off Settlement for Written-Off status; only Waiver
      types for Settled status)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid repayment type for closed loan status violates loan lifecycle constraints, potentially causing accounting
      entries against accounts that should no longer accept transactions
    stage_ids:
    - repayment
  - id: finance-C-099
    when: When validating a new Loan Restructure document
    action: allow a second restructure to be initiated when another Loan Restructure with status 'Initiated' exists for the
      same loan
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Multiple simultaneous restructructures can corrupt loan balances and create inconsistent repayment schedules,
      leading to duplicate interest capitalizations or incorrect principal adjustments
    stage_ids:
    - restructure
  - id: finance-C-100
    when: When calculating monetary amounts in Loan Restructure
    action: use currency precision retrieved from frappe.db.get_default('currency_precision') with fallback to 2 decimal places
      for each financial calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using inconsistent precision (e.g., float) can cause rounding errors in loan balances, leading to discrepancies
      between expected and actual EMI amounts, and incorrect interest capitalization amounts
    stage_ids:
    - restructure
  - id: finance-C-101
    when: When validating interest waiver amounts in Loan Restructure
    action: allow interest_waiver_amount to exceed (interest_overdue - adjusted_interest_amount)
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Waiving more interest than actually overdue can result in revenue loss for the lender and incorrect loan
      balance calculations
    stage_ids:
    - restructure
  - id: finance-C-102
    when: When validating penalty waiver amounts in Loan Restructure
    action: allow penal_interest_waiver to exceed penalty_overdue
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Waiving more penalty interest than actually accrued can result in incorrect penalty calculations and lost
      revenue
    stage_ids:
    - restructure
  - id: finance-C-103
    when: When validating charge waiver amounts in Loan Restructure
    action: allow charges_waiver_amount for any charge to exceed its charges_overdue amount
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Waiving charges beyond overdue amounts creates incorrect charge records and potential revenue leakage
    stage_ids:
    - restructure
  - id: finance-C-104
    when: When validating unaccrued interest waiver amounts in Loan Restructure
    action: allow unaccrued_interest_waiver to exceed (unaccrued_interest - adjusted_unaccrued_interest)
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Waiving unaccrued interest beyond available amount creates incorrect income recognition and balance discrepancies
    stage_ids:
    - restructure
  - id: finance-C-105
    when: When validating capitalize amounts for charges in Loan Restructure
    action: allow capitalize_amount to be negative or to exceed the charges_overdue amount
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Negative or excessive capitalization amounts can inflate loan principal incorrectly and cause accounting
      errors
    stage_ids:
    - restructure
  - id: finance-C-112
    when: When initiating a Loan Restructure for a loan
    action: check for existing Loan Restructure with status 'Initiated' before allowing new restructure to proceed
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without this check, multiple simultaneous restructures can corrupt loan data and create inconsistent repayment
      schedules
    stage_ids:
    - restructure
  - id: finance-C-113
    when: When executing the Loan Restructure validation sequence
    action: call update_overdue_amounts before allocate_security_deposit in the validate method
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Calling allocate_security_deposit before update_overdue_amounts means security deposit would be applied to
      stale/empty overdue amounts, causing incorrect principal adjustments
    stage_ids:
    - restructure
  - id: finance-C-124
    when: When calculating Days Past Due (DPD) for loan classification
    action: use the oldest unpaid demand date as the reference point
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without a demand to reference, DPD cannot be accurately calculated, leading to incorrect NPA classification
      and regulatory non-compliance
    stage_ids:
    - classification
  - id: finance-C-125
    when: When implementing NPA classification logic
    action: compare DPD against the loan product's days_past_due_threshold_for_npa value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Loans will not be correctly classified as NPA when DPD exceeds threshold, violating regulatory asset classification
      requirements
    stage_ids:
    - classification
  - id: finance-C-134
    when: When attempting to unmark NPA status
    action: allow unmarking before the watch_period_end_date has passed
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Premature NPA exit violates regulatory cooling-off period requirements, potentially leading to compliance
      violations and penalties
    stage_ids:
    - classification
  - id: finance-C-144
    when: When validating the write-off amount
    action: Set write_off_amount equal to pending_principal_amount (not total outstanding)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched write-off amount causes accounting discrepancy where principal is not fully recovered or incorrectly
      reduced
    stage_ids:
    - write_off
  - id: finance-C-166
    when: When implementing write-off features
    action: Skip waiver creation for non-settlement write-offs (waivers are mandatory for proper NPA accounting)
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping waivers for non-settlement write-offs creates untracked liabilities and violates accounting completeness
      requirements
    stage_ids:
    - write_off
  - id: finance-C-167
    when: When validating write-off amount against pending principal
    action: Allow write-off of total outstanding (including interest) instead of pending principal only
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Writing off interest along with principal violates regulatory provisions that require interest to be waived
      through separate mechanisms
    stage_ids:
    - write_off
  - id: finance-C-168
    when: When implementing loan balance adjustment amount validation
    action: submit adjustment with zero or negative amount
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Invalid adjustment records will corrupt loan ledger balances and cause incorrect accounting entries in the
      general ledger
    stage_ids:
    - adjustment
  - id: finance-C-169
    when: When creating GL entries for credit adjustment
    action: post credit to loan receivable account and debit to adjustment account
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect debit/credit polarity will cause double-entry accounting imbalance and corrupt financial statements
    stage_ids:
    - adjustment
  - id: finance-C-171
    when: When processing security deposit refund
    action: refund amount exceed available security deposit amount
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Refund amount exceeding available security deposit will create unauthorized payment from company funds and
      financial loss
    stage_ids:
    - adjustment
  - id: finance-C-172
    when: When processing excess amount refund
    action: excess amount refund result in negative excess_amount_paid balance
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Negative excess amount indicates refund exceeding actual overpayment, causing unauthorized disbursement
    stage_ids:
    - adjustment
  - id: finance-C-177
    when: When processing excess amount refund GL entries
    action: use customer_refund_account as debit account and refund_account as credit account
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect account mapping for excess refund will cause funds to flow through wrong ledger accounts, breaking
      audit trail
    stage_ids:
    - adjustment
  - id: finance-C-178
    when: When processing security deposit refund GL entries
    action: use security_deposit_account as debit account and refund_account as credit account
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect account mapping for security deposit refund will cause liability accounts to be incorrectly credited,
      violating accounting principles
    stage_ids:
    - adjustment
  - id: finance-C-180
    when: When submitting loan refund without customer refund account configured
    action: submit refund if loan_product.customer_refund_account is not set
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Refund without customer refund account will cause GL entry failure and leave loan in inconsistent state
    stage_ids:
    - adjustment
  - id: finance-C-181
    when: When loan has active restructure in process
    action: allow balance adjustment on a loan with submitted Loan Restructure in Initiated status
    severity: fatal
    kind: operational_lesson
    modality: must_not
    consequence: Concurrent adjustment during active restructure will cause double-modification of loan balances and corrupt
      restructure workflow calculations
    stage_ids:
    - adjustment
  - id: finance-C-188
    when: When implementing haircut calculation for loan security pledging
    action: 'Calculate post_haircut_amount using the formula: amount - (amount × haircut / 100)'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect haircut calculation will result in overvalued collateral estimates, allowing loans exceeding safe
      LTV limits and exposing the lender to excessive risk
    stage_ids:
    - security_management
  - id: finance-C-189
    when: When implementing LTV ratio retrieval for shortfall checks
    action: Derive LTV ratio from Loan Security Type, not from individual security records
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using individual security LTV ratios causes inconsistent collateral valuations and incorrect shortfall calculations
      across securities of the same type
    stage_ids:
    - security_management
  - id: finance-C-190
    when: When calculating outstanding amount for LTV shortfall determination
    action: Use (total_payment - total_interest_payable - total_principal_paid) for Disbursed loans and (disbursed_amount
      - total_interest_payable - total_principal_paid) for Partially Disbursed loans
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect outstanding amount calculation leads to wrong LTV ratios, either triggering unnecessary shortfalls
      or missing real collateral breaches
    stage_ids:
    - security_management
  - id: finance-C-191
    when: When implementing shortfall threshold validation
    action: Create shortfall record when current_ratio (outstanding_amount / security_value × 100) exceeds ltv_ratio
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect threshold comparison logic causes the system to either fail to alert on dangerous LTV levels or
      generate false positive alerts
    stage_ids:
    - security_management
  - id: finance-C-197
    when: When integrating security management with loan lifecycle
    action: Update security values on disbursement (increase utilization) and on repayment (decrease utilization) to keep
      LTV current
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Stale security values cause LTV to drift from actual risk exposure, leading to either missed shortfalls or
      premature collateral calls
    stage_ids:
    - security_management
  - id: finance-C-201
    when: When blocking disbursements with pending shortfall
    action: Return zero disbursal amount when loan has is_secured_loan=1 and pending Loan Security Shortfall with status='Pending'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Disbursing into a shortfall violates collateral coverage requirements and increases lender risk exposure
    stage_ids:
    - security_management
  - id: finance-C-203
    when: When implementing security unpledge validation
    action: Enforce that unpledge qty does not exceed pledged qty and that post-unpledge LTV ratio remains within acceptable
      limits
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Releasing more security than pledged or allowing LTV breach creates undercollateralized loans exposing lender
      to losses
    stage_ids:
    - security_management
  - id: finance-C-204
    when: When calculating maximum loan value from pledged securities
    action: Sum post_haircut_amount across each securities in the pledge to determine maximum_loan_value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect maximum loan value causes over-lending or under-lending relative to actual collateral coverage
    stage_ids:
    - security_management
  - id: finance-C-211
    when: When validating unpledge quantity against pledged holdings
    action: Reject unpledge requests where requested qty exceeds currently pledged qty for any security
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Releasing securities not in pledge causes incorrect collateral tracking and potential fraud through fictitious
      security releases
    stage_ids:
    - security_management
  - id: finance-C-213
    when: When mapping Loan Application to Loan via create_loan
    action: Loan Application must have docstatus=1 (submitted) before mapping
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Unsubmitted loan applications will create invalid Loan documents with incomplete data, causing downstream
      disbursement and repayment processing failures
  - id: finance-C-214
    when: When creating Loan from Loan Application via create_loan mapping
    action: Loan Application status must be Approved before Loan creation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Loans created from non-approved applications bypass credit approval workflow, violating regulatory requirements
      for loan sanctioning
  - id: finance-C-216
    when: When Loan is in Sanctioned status and disbursement is created
    action: Disbursement amount must not exceed possible disbursal amount calculated from loan limit or assigned security
      value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Over-disbursement exceeds collateral coverage and borrower capacity, leading to potential recovery losses
  - id: finance-C-220
    when: When creating Loan Interest Accrual entries
    action: Interest accruals must not overlap with existing accruals for the same loan_disbursement and interest_type
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Overlapping accruals cause double-counting of interest income, inflating reported earnings and borrower obligations
  - id: finance-C-228
    when: When updating Loan Security Assignment for a Loan
    action: Loan.maximum_loan_amount must be updated by adding/subtracting maximum_loan_value from security assignment
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Stale maximum_loan_amount allows over-disbursement beyond collateral coverage, exposing lender to excess
      risk
  - id: finance-C-231
    when: When creating Loan Write Off
    action: Write Off amount must equal pending_principal_amount calculated from loan details
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect write-off amount causes reconciliation failures and audit discrepancies in loan ledger
  - id: finance-C-240
    when: When generating GL entries for any loan-related doctype
    action: Check loan_accounting_enabled(self.company) returns True before creating GL entries; if False, skip GL generation
      entirely
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: GL entries generated without accounting infrastructure produce unreconciled books, violating double-entry
      bookkeeping requirements and causing regulatory non-compliance for audit trails
  - id: finance-C-241
    when: When enabling loan accounting functionality for a company
    action: Set Company.enable_loan_accounting flag to True; without this flag, GL entries are disabled and accounting workflows
      fail silently
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Organizations expecting automated accounting entries receive no GL entries, leading to complete disconnect
      between loan operations and financial statements
  - id: finance-C-242
    when: When implementing any loan doctype requiring accounting integration
    action: Extend LoanController class (which extends AccountsController) to inherit GL entry generation, validation hooks,
      and accounting dimension handling
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Custom loan doctypes bypass standard accounting controls, breaking audit trails and GL reconciliation required
      by financial regulations in India and other jurisdictions
  - id: finance-C-245
    when: When generating loan demands for term loans
    action: Only generate demand for Repayment Schedule rows where demand_generated=0; row must transition from 0→1 to indicate
      demand created
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Duplicate demand generation creates multiple EMI demands for same installment, causing over-collection and
      accounting reconciliation failures
  - id: finance-C-246
    when: When processing backdated loan repayment transactions
    action: Trigger automatic Loan Repayment Repost to recalculate and re-post each accruals, demands, and GL entries from
      the backdated value_date
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Backdated repayment without repost creates inconsistent state where principal/interest balances don't match
      actual payment history, breaking audit trail and financial accuracy
  - id: finance-C-248
    when: When configuring loan products for asset classification-based collection offset
    action: Define collection_offset_sequence_for_standard_asset and collection_offset_sequence_for_sub_standard_asset sequences
      (either on Loan Product or inherited from Company level)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing collection offset sequences prevents proper IRAC provisioning ordering, violating Basel/India RBI
      asset classification requirements and causing incorrect provision calculations
  - id: finance-C-253
    when: When maintaining audit trails for financial compliance
    action: Verify each GL-entry-making loan doctypes (Loan Balance Adjustment, Loan Disbursement, Loan Interest Accrual,
      Loan Refund, Loan Repayment, Loan Write Off) have audit_trail_doctypes configured
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing audit trail configuration for GL-entry doctypes violates Indian Companies Act requirements for loan
      documentation, causing regulatory non-compliance and potential penalties
  - id: finance-C-255
    when: When handling backdated transactions by value_date versus posting_date
    action: Use value_date as the authoritative date for loan repayment processing, accrual reversal, and demand cancellation
      — posting_date is display only
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using posting_date instead of value_date for backdated repayment creates incorrect accrual reversals, wrong
      demand cancellation range, and corrupted repayment schedule state
  - id: finance-C-260
    when: When implementing disbursement amount validation for A-share or secured/unsecured loan backtesting
    action: Validate disbursement amount against available limit (for unsecured loans) or security value (for secured loans)
      — verify disbursal_amount <= available_limit AND disbursal_amount <= security_value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Disbursements exceeding available limit or security value violate regulatory lending limits; over-advances
      cause collateral coverage shortfalls and expose the lending institution to uncontrolled credit risk
    derived_from_bd_id: BD-037
  - id: finance-C-261
    when: When processing loan disbursement with withhold_security_deposit flag enabled
    action: Withhold security deposit from disbursement amount (net_amount = gross_amount - security_deposit) when withhold_security_deposit
      flag is enabled on loan product — must_not apply this deduction when flag is disabled
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect security deposit handling causes net disbursement amount mismatches; deducting when flag is disabled
      reduces borrower proceeds, while not deducting when enabled creates collection gaps
    derived_from_bd_id: BD-039
  - id: finance-C-273
    when: When implementing or modifying NPA classification logic
    action: 'Enforce the complete NPA cascade: (1) Calculate DPD from last payment date, (2) Propagate NPA status to customer
      master, (3) Enforce atomic consistency across Loan, LoanInterestAccrual, LoanRepayment, and LoanWriteOff doctypes —
      each three links must function together'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: 'Breaking any link in the NPA cascade chain causes regulatory reporting failures: wrong DPD calculation produces
      incorrect NPA classification, missing customer-level flagging causes exposure tracking gaps, and inconsistent NPA across
      doctypes triggers audit failures and potential penalties'
    derived_from_bd_id: BD-097
  - id: finance-C-274
    when: When modifying NPA status handling across financial doctypes
    action: Verify NPA status is atomically consistent across Loan, LoanInterestAccrual, LoanRepayment, and LoanWriteOff doctypes
      — implement cross-validation on save and reject updates that create inconsistency
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inconsistent NPA status across related financial doctypes causes reporting discrepancies, regulatory non-compliance,
      and potential fraud since different documents show different asset quality classifications for the same loan
    derived_from_bd_id: BD-088
  - id: finance-C-280
    when: When generating GL entries for loan transactions
    action: Skip GL entry creation when loan.is_imported equals 1; only generate GL entries for newly created loans where
      is_imported is not set
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Generating GL entries for imported loans causes double-posting since legacy system already contains accounting
      records, resulting in duplicated transactions and irreconcilable general ledger
    derived_from_bd_id: BD-061
  - id: finance-C-284
    when: When computing EMI amounts and interest accrual for loans
    action: Verify PMT formula convention, 30-day override convention, and month-end accrual frequency are aligned; EMI calculated
      with actual/365 must not apply 30-day override, and accrual must use matching convention
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Misaligned conventions cause systematic imbalance between borrower EMI amount and interest recognized, compounding
      over loan tenure and resulting in either over-collection or under-recognition of interest income
    derived_from_bd_id: BD-106
  - id: finance-C-285
    when: When implementing or refactoring account validation in loan product configuration
    action: Allow loan_account and payment_account to be the same account — the validate_accounts function must reject identical
      accounts
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Same loan and payment account causes offset entries to cancel each other, creating phantom transactions that
      corrupt accounting records and make loan balances unreconcilable
    derived_from_bd_id: BD-067
  - id: finance-C-286
    when: When implementing or refactoring interest rate validation in loan product configuration
    action: Accept negative values for interest_rate — the validate_rates function must reject negative interest rates
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Negative interest rates cause reverse interest calculations where borrowers are paid to borrow, creating
      systematic financial losses that compound over loan tenure
    derived_from_bd_id: BD-068
  - id: finance-C-292
    when: When implementing or refactoring LoanRepaymentSchedule status transition logic
    action: Implement backward status transitions allowing Active→Initiated or Closed→Active state reversals — status must
      only progress forward through Initiated→Active→Outdated/Closed/Cancelled
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Backward status transitions compromise financial record integrity, allowing cancelled or closed loans to
      be reopened and their accounting entries retroactively modified — a critical audit and regulatory violation
    derived_from_bd_id: BD-090
  - id: finance-C-341
    when: When implementing disbursement validation for Line of Credit loan types
    action: Validate that disbursement request date falls within the LoC validity period by checking disbursement_date >=
      limit_start_date AND disbursement_date <= limit_end_date; reject disbursements outside this window
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Disbursements outside the LoC validity period are not legally permitted under loan facility agreements, causing
      regulatory violations and potential default on facility terms
    derived_from_bd_id: BD-038
  - id: finance-C-342
    when: When processing interest accrual submission for NPA classified loans
    action: Post uncollected NPA interest to suspense journal entry instead of recognizing as income; set loan status to NPA
      before accrual processing to trigger suspense account routing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Recognizing uncollected NPA interest as income violates IRAC income recognition rules; regulatory auditors
      will flag this as non-performing asset income misclassification
    derived_from_bd_id: BD-043
  - id: finance-C-344
    when: When implementing accrual submission and repayment allocation logic
    action: Allow accrual GL entries to be created without ensuring corresponding loan demands are generated first — BD-086
      requires loan demand as prerequisite for repayment allocation; BD-007 separates accrual from demand creation creating
      hidden dependency
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: 'Silent failure mode: accruals post interest to GL without creating corresponding demands; repayments allocate
      zero amounts while GL shows income recognition, violating IRAC compliance and income accuracy requirements'
    derived_from_bd_id: BD-099
  - id: finance-C-345
    when: When validating repayment allocation and demand generation sequence
    action: 'Enforce explicit demand generation before repayment allocation by adding a prerequisite check: loan_demand records
      must exist for the accrual period before repayment can allocate amounts; log warning when accrual posts without matching
      demand'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without demand prerequisite validation, repayments silently allocate zero amounts while GL records show income,
      creating accounting mismatches that violate regulatory reporting requirements
    derived_from_bd_id: BD-099
  regular:
  - id: finance-C-004
    when: When processing secured loan applications
    action: require proposed_pledges table to have at least one entry when is_secured_loan is true
    severity: high
    kind: domain_rule
    modality: must
    consequence: A secured loan without pledged securities violates loan classification, potentially causing incorrect risk
      weighting and regulatory non-compliance
    stage_ids:
    - loan_application
  - id: finance-C-005
    when: When creating loan application for Customer applicant type
    action: require applicant_email_address and applicant_phone_number fields to be populated
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing contact information prevents customer outreach for loan servicing, causing payment reminders and
      notices to fail delivery
    stage_ids:
    - loan_application
  - id: finance-C-006
    when: When validating loan product selection
    action: enforce loan product's company matches the loan application's company
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cross-company loan product selection causes incorrect chart of accounts posting, resulting in misclassified
      accounting entries and financial reporting errors
    stage_ids:
    - loan_application
  - id: finance-C-007
    when: When validating Employee applicant type
    action: enforce employee's company matches the loan application's company
    severity: high
    kind: domain_rule
    modality: must
    consequence: Processing loans for employees outside the company's payroll violates internal lending policies and may cause
      salary deduction conflicts
    stage_ids:
    - loan_application
  - id: finance-C-009
    when: When validating loan security prices for pledged securities
    action: require non-null loan_security_price from Loan Security Price table with valid time window
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pledging securities without valid prices causes maximum_loan_amount calculation to fail or become zero, preventing
      secured loan origination
    stage_ids:
    - loan_application
  - id: finance-C-010
    when: When validating loan security price dates
    action: enforce valid_from date is less than valid_upto date for security prices
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid date ranges cause get_loan_security_price to return incorrect prices or None, corrupting collateral
      valuation calculations
    stage_ids:
    - loan_application
  - id: finance-C-011
    when: When calculating maximum loan amount from proposed securities
    action: apply haircut percentage reduction to security value before calculating maximum loan amount
    severity: high
    kind: domain_rule
    modality: must
    consequence: Lending against full collateral value without haircut exposes lender to market downturn losses when security
      values decline
    stage_ids:
    - loan_application
  - id: finance-C-013
    when: When auto-creating Customer records for Customer-type applications
    action: save Customer document before creating linked Contact and Address records
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Creating Contact or Address before Customer exists causes link_doctype and link_name references to fail,
      resulting in orphaned contact/address records
    stage_ids:
    - loan_application
  - id: finance-C-015
    when: When validating repayment method for term loans
    action: only apply repayment calculation logic when is_term_loan is true
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Attempting to calculate repayment schedule for non-term loans causes incorrect calculations and validation
      errors
    stage_ids:
    - loan_application
  - id: finance-C-016
    when: When setting pledge amounts for secured loans
    action: require qty (quantity) field for each proposed pledge entry
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pledges without quantity cannot be valued, causing maximum loan calculation to fail and blocking secured
      loan applications
    stage_ids:
    - loan_application
  - id: finance-C-017
    when: When generating repayment schedule preview using PMT formula
    action: round up monthly repayment amount using math.ceil to verify complete loan payoff
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without rounding up, floating-point calculation errors may cause final payment amounts to be fractionally
      short, leaving small unpaid balances
    stage_ids:
    - loan_application
  - id: finance-C-018
    when: When handling zero interest rate in repayment calculations
    action: use simple division (loan_amount / periods) instead of PMT formula
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying PMT formula with zero interest rate causes division by zero or incorrect calculations, producing
      invalid repayment schedules
    stage_ids:
    - loan_application
  - id: finance-C-019
    when: When calculating loan amounts based on security pledges
    action: auto-populate loan_amount from maximum_loan_amount when loan_amount is empty for secured loans
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Not auto-populating loan amount requires manual entry for every secured loan, causing user friction and potential
      input errors
    stage_ids:
    - loan_application
  - id: finance-C-020
    when: When generating flat rate repayment schedules
    action: calculate interest on original loan amount (not reducing balance) for flat rate products
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using reducing balance for flat rate loans undercharges interest, reducing lender revenue and violating flat
      rate loan terms
    stage_ids:
    - loan_application
  - id: finance-C-021
    when: When calculating repayment periods using fixed repayment method
    action: use logarithm formula (log-based calculation) to derive periods from fixed repayment amount
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Incorrect period calculation causes loan payoff date misprediction, affecting borrower expectations and accounting
      schedules
    stage_ids:
    - loan_application
  - id: finance-C-022
    when: When validating proposed pledges for secured loan applications
    action: check for duplicate loan security price date ranges before saving
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Overlapping security price validity periods cause ambiguous pricing, potentially using outdated prices for
      collateral valuation
    stage_ids:
    - loan_application
  - id: finance-C-023
    when: When creating loan security assignments from applications
    action: require either loan_application, loan, or explicit applicant details to be provided
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing all reference parameters causes security assignment without loan link, breaking audit trails and
      repayment allocation
    stage_ids:
    - loan_application
  - id: finance-C-024
    when: When calculating total payable amount for term loans
    action: sum loan_amount and total_payable_interest after iterating through each repayment periods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect total payable calculation causes incorrect borrower disclosure, potentially leading to regulatory
      compliance issues
    stage_ids:
    - loan_application
  - id: finance-C-025
    when: When checking for duplicate customers during application
    action: validate applicant phone and email against existing Customer records to prevent duplicates
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Duplicate customer records cause fragmented transaction history and reporting inaccuracies across multiple
      customer profiles
    stage_ids:
    - loan_application
  - id: finance-C-026
    when: When presenting repayment schedule preview from loan application
    action: present the preview as guaranteed final terms since actual disbursement may differ
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Displaying application-stage repayment projections as final loan terms misleads borrowers about actual payable
      amounts, causing disputes when disbursed loan terms differ
    stage_ids:
    - loan_application
  - id: finance-C-027
    when: When claiming sanctioned amount limit enforcement
    action: claim that sanctioned limit check prevents borrower default risk
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Sanctioned amount limits only control aggregate loan exposure, not individual loan quality. Claiming limit
      enforcement prevents defaults misrepresents credit risk management
    stage_ids:
    - loan_application
  - id: finance-C-033
    when: When implementing BPI calculation for monthly disbursements
    action: Calculate broken period interest when first repayment date is not at month start
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing BPI calculation when disbursement date precedes first EMI causes interest undercharging, resulting
      in revenue loss
    stage_ids:
    - disbursement
  - id: finance-C-035
    when: When implementing BPI upfront deduction GL entries
    action: Validate broken_period_interest_recovery_account is configured in loan product for upfront BPI deduction
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing BPI recovery account causes GL entry creation to fail, preventing disbursement submission
    stage_ids:
    - disbursement
  - id: finance-C-036
    when: When implementing security deposit withholding
    action: Create security deposit GL entry only when security_deposit_account is configured in loan product
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing security deposit account causes GL entry creation to fail during disbursement submission
    stage_ids:
    - disbursement
  - id: finance-C-037
    when: When implementing Line of Credit disbursement
    action: Create loan limit change log when disbursing against Line of Credit
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing limit change log entry fails to track utilized credit, causing incorrect available limit calculations
    stage_ids:
    - disbursement
  - id: finance-C-038
    when: When implementing disbursement submission
    action: Create repayment schedule as draft during validation, submit during on_submit for term loans
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping draft schedule creation prevents preview and adjustment, committing incorrect repayment terms
    stage_ids:
    - disbursement
  - id: finance-C-039
    when: When implementing BPI processing for Upfront Deduction method
    action: Apply BPI as upfront deduction with difference entry when actual BPI differs from estimated
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing BPI difference entry causes accounting mismatch between estimated and actual BPI amounts
    stage_ids:
    - disbursement
  - id: finance-C-040
    when: When implementing disbursement cancellation
    action: Reverse utilized limit amount and restore available limit when cancelling Line of Credit disbursement
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing limit restoration on cancel causes available limit to remain reduced incorrectly, blocking legitimate
      future disbursements
    stage_ids:
    - disbursement
  - id: finance-C-041
    when: When implementing security deposit handling
    action: Delete security deposit records when disbursement is cancelled
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Orphaned security deposit records after disbursement cancellation cause accounting and audit inconsistencies
    stage_ids:
    - disbursement
  - id: finance-C-042
    when: When presenting disbursement results
    action: Claim disbursement GL entries exist when loan_accounting_enabled is False for the company
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting disbursement as creating GL entries when accounting is disabled misleads users about accounting
      treatment
    stage_ids:
    - disbursement
  - id: finance-C-043
    when: When implementing BPI handling
    action: Assume BPI is always applicable - BPI calculation depends on disbursement date relative to first repayment date
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Assuming BPI applies to all loans causes incorrect interest calculations when disbursement coincides with
      month start
    stage_ids:
    - disbursement
  - id: finance-C-044
    when: When implementing BPI calculation
    action: Apply BPI using the configured recovery method (Upfront Deduction, Amortized Over Tenure, Add to First EMI, or
      Add to Last EMI)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect BPI recovery method application causes interest miscalculation, leading to revenue loss or borrower
      overcharging
    stage_ids:
    - disbursement
  - id: finance-C-045
    when: When implementing BPI interest calculation
    action: Calculate BPI interest using annual rate divided by 365 days for daily accrual
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect day count basis (e.g., 360 days) in BPI calculation causes interest miscalculation
    stage_ids:
    - disbursement
  - id: finance-C-049
    when: When calculating per-day interest amounts
    action: apply the correct year_divisor based on the company's interest_day_count_convention setting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect day-count conventions produce wrong interest amounts, causing regulatory compliance failures and
      disputes with borrowers
    stage_ids:
    - accrual
  - id: finance-C-052
    when: When accrual processing runs for a company
    action: verify loan_accounting_enabled returns True for GL entries to be generated
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without accounting enabled, accruals are created but no GL entries are recorded, causing mismatches between
      accrual documents and ledger balances
    stage_ids:
    - accrual
  - id: finance-C-053
    when: When calculating penal interest for loans with unpaid demands
    action: apply grace_period_in_days before starting penal interest accrual calculations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Accruing penal interest before the grace period elapses violates lending regulations and creates disputes
      with borrowers over premature penalty charges
    stage_ids:
    - accrual
  - id: finance-C-054
    when: When processing term loan interest accrual
    action: exclude accrual dates that fall on or after the maturity_date of the repayment schedule
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Accruing interest beyond loan maturity produces incorrect interest calculations and creates inconsistent
      loan balance records
    stage_ids:
    - accrual
  - id: finance-C-056
    when: When accrual document submission completes
    action: process penal interest accrual before normal interest accrual in the batch processing sequence
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reversing the accrual order can cause incorrect interest calculations since penal interest depends on unpaid
      demand status that may be affected by normal interest processing
    stage_ids:
    - accrual
  - id: finance-C-057
    when: When GL entries are created for accrual
    action: claim real-time GL posting capability for accrual batch processing
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Accrual is processed via batch jobs (enqueue with queue='long'), not real-time; claiming real-time capability
      misleads users about when entries are actually recorded
    stage_ids:
    - accrual
  - id: finance-C-058
    when: When accrual processing completes for NPA loans
    action: present suspense journal entries as recognized income in reports
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Interest routed to suspense accounts is unearned per IFRS9; reporting it as income misrepresents financial
      performance and violates accounting standards
    stage_ids:
    - accrual
  - id: finance-C-059
    when: When accrual GL entries are generated
    action: use currency precision (default 2 decimal places) for each monetary calculations to avoid floating-point errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Rounding errors in interest calculations accumulate over time, causing small discrepancies in GL entries
      and loan balances that are difficult to reconcile
    stage_ids:
    - accrual
  - id: finance-C-060
    when: When NPA loans are unmarked via unmark_npa flag
    action: create suspense journal entries for accrued interest
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: When unmarking NPA, previously suspended interest should follow suspense routing rules to maintain proper
      income recognition sequence per regulatory requirements
    stage_ids:
    - accrual
  - id: finance-C-061
    when: When additional interest amounts are accrued
    action: validate that additional_interest_income and additional_interest_accrued accounts are configured in Loan Product
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing additional interest accounts cause accrual submission to fail when additional_interest_amount is
      present, blocking complete interest recording
    stage_ids:
    - accrual
  - id: finance-C-062
    when: When accrual documents are cancelled
    action: cancel associated GL entries and suspense journal entries when loan_accounting_enabled is True
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Failing to cancel GL entries on accrual cancellation creates orphaned ledger entries, causing reconciliation
      failures and audit discrepancies
    stage_ids:
    - accrual
  - id: finance-C-063
    when: When freeze_date is set on a loan
    action: use freeze_date instead of posting_date for accrual processing to prevent backdated entries
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Processing accruals at current posting_date when a freeze_date exists causes entries to be created beyond
      the freeze point, violating loan freeze requirements
    stage_ids:
    - accrual
  - id: finance-C-066
    when: When submitting a Loan Demand document
    action: create GL entries for receivables via make_gl_entries() method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without GL entries on demand submission, the receivable amounts are not recorded in the general ledger, causing
      accounting imbalance and missing trail for auditors
    stage_ids:
    - demand
  - id: finance-C-067
    when: When creating GL entries for demand submissions
    action: validate accrual_account and receivable_account exist in Loan Product before generating GL entries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without account validation, GL entry creation will fail with unhandled exception, causing demand submission
      to abort and delaying loan recovery actions
    stage_ids:
    - demand
  - id: finance-C-068
    when: When updating repayment schedule after demand submission
    action: set demand_generated flag to 1 on the repayment_schedule_detail row
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without setting demand_generated=1, the same installment will generate duplicate demands on the next processing
      run, causing financial record inflation
    stage_ids:
    - demand
  - id: finance-C-069
    when: When processing demand loans for interest demands
    action: query Loan Interest Accrual entries after last_demand_date to aggregate pending interest
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without filtering by last_demand_date, accumulated interest from previously demanded periods will be double-counted,
      resulting in overbilling of borrowers
    stage_ids:
    - demand
  - id: finance-C-070
    when: When creating demands for BPI (Broken Period Interest)
    action: set demand_type=BPI when disbursement date precedes first EMI date
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without BPI demand type, broken period interest will not be properly classified and recovered, causing revenue
      leakage for the lending institution
    stage_ids:
    - demand
  - id: finance-C-071
    when: When processing demand generation for a loan
    action: check freeze_date and skip demand creation if payment_date >= freeze_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without freeze_date check, demands will be created for frozen loans, violating account freezing policies
      and potentially causing legal compliance issues
    stage_ids:
    - demand
  - id: finance-C-072
    when: When creating GL entries for Loan Demand
    action: create GL entries for demand_type=Charges or demand_subtype=Principal
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Creating GL entries for charges would double-count revenue, while Principal demands should not generate receivable
      entries as they represent principal repayment not income
    stage_ids:
    - demand
  - id: finance-C-073
    when: When handling batch processing errors
    action: log error with frappe.log_error and rollback transaction when processing multiple loans
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without proper error handling, a single loan failure will abort the entire batch, losing all progress and
      requiring complete reprocessing
    stage_ids:
    - demand
  - id: finance-C-074
    when: When generating demands for term loans
    action: use SELECT FOR UPDATE lock on repayment schedule rows during processing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without row-level locking, concurrent demand processing can cause race conditions resulting in duplicate
      demands or inconsistent demand_generated flags
    stage_ids:
    - demand
  - id: finance-C-075
    when: When submitting demand for EMI or Normal loan with Interest subtype
    action: trigger process_loan_interest_accrual_for_loans from add_days(demand_date, -1) to continue accrual
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without triggering post-demand accrual, interest calculation gaps will occur at period boundaries, causing
      underaccrual of interest income
    stage_ids:
    - demand
  - id: finance-C-076
    when: When creating Loan Demand with zero or negative amount
    action: create Loan Demand document when amount parameter is falsy
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Creating zero-amount demands clutters the database with meaningless records and causes downstream processing
      to waste resources
    stage_ids:
    - demand
  - id: finance-C-077
    when: When configuring Loan Product for demand generation
    action: set broken_period_interest_recovery_account for BPI demand type
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without BPI recovery account, broken period interest demands cannot be properly recorded in GL, causing revenue
      leakage
    stage_ids:
    - demand
  - id: finance-C-078
    when: When canceling a Loan Demand
    action: reset demand_generated flag to 0 and create reversal GL entries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without resetting demand_generated flag, the installment remains marked as demanded preventing legitimate
      future demands; without reversal GL entries, accounting records become unbalanced
    stage_ids:
    - demand
  - id: finance-C-079
    when: When creating demands for charges via Sales Invoice override
    action: skip demand creation when loan_accounting is disabled for the company
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Creating demands without accounting enabled causes mismatch between operational records and accounting records
    stage_ids:
    - demand
  - id: finance-C-080
    when: When reversing demands for loan repayment or closure
    action: cancel each demands with demand_date >= posting_date for the loan
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without canceling future demands, previously demanded amounts will remain outstanding even after loan closure,
      causing incorrect receivable balances
    stage_ids:
    - demand
  - id: finance-C-081
    when: When the lending system claims real-time demand generation capability
    action: claim true real-time capability since batch processing uses queue-based polling
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting queue-based batch processing as real-time would mislead users about system capabilities; actual
      demand creation depends on job queue processing
    stage_ids:
    - demand
  - id: finance-C-082
    when: When presenting demand generation test results
    action: present simulated demand amounts as guaranteed collection amounts
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Simulated demand generation does not account for borrower payment behavior, collections effort, or market
      conditions; actual recovery rates will differ from generated demands
    stage_ids:
    - demand
  - id: finance-C-083
    when: When configuring batch processing for demand generation
    action: set batch_size below 100 or above 10000 without performance testing
    severity: low
    kind: resource_boundary
    modality: must_not
    consequence: Untested batch sizes may cause either transaction timeouts (too large) or excessive queue overhead (too small),
      degrading system performance
    stage_ids:
    - demand
  - id: finance-C-087
    when: When calculating monetary amounts for loan repayment
    action: apply currency_precision via cint(frappe.db.get_default('currency_precision')) or 2 using flt() for each financial
      computations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper currency precision, floating-point rounding errors accumulate in principal/interest/penalty
      allocations, causing penny-wise discrepancies that compound across large repayment volumes
    stage_ids:
    - repayment
  - id: finance-C-089
    when: When implementing repayment allocation customization
    action: use the replaceable allocation_order field that defaults to collection_offset_sequence_for_standard_asset
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Skipping the replaceable allocation_order abstraction couples repayment logic directly to specific offset
      sequences, making it impossible to customize allocation order without code changes
    stage_ids:
    - repayment
  - id: finance-C-093
    when: When validating repayment during on_submit flow
    action: complete allocate_amounts() within validate() before reaching on_submit()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without pre-validation allocation, repayment_details table remains empty during submission, causing silent
      failure where paid amounts are not attributed to specific demands
    stage_ids:
    - repayment
  - id: finance-C-094
    when: When determining repayment processing behavior
    action: call check_future_entries() during validate() to set is_backdated flag before on_submit()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Repayments with future-dated siblings are processed as current-date transactions without triggering repost,
      causing accrual/demand double-processing when the future repayment is submitted
    stage_ids:
    - repayment
  - id: finance-C-095
    when: When processing loan repayment transactions
    action: claim real-time trading capability or present backtest simulation results as live trading proof
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting simulated repayment results as verified live execution misleads stakeholders about actual fund
      flows and system performance in production environments
    stage_ids:
    - repayment
  - id: finance-C-096
    when: When processing loan repayment allocations
    action: enforce for_update database locking when reading unpaid demands to prevent concurrent modification race conditions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without row-level locking, concurrent repayment submissions for the same loan cause demand allocation conflicts
      where the same demand is partially paid by multiple repayments
    stage_ids:
    - repayment
  - id: finance-C-098
    when: When submitting a loan repayment
    action: update Loan and Loan Disbursement paid_amount fields via update_paid_amounts() to maintain cumulative tracking
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cumulative paid_amount fields become stale, causing incorrect outstanding principal calculations and potential
      over-disbursement or under-collection scenarios
    stage_ids:
    - repayment
  - id: finance-C-106
    when: When validating restructure date for Normal Restructure
    action: allow restructure_date to be before the maximum posting_date of Loan Interest Accrual records
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Restructuring before interest accruals are complete can cause interest calculation gaps and incorrect interest
      capitalization
    stage_ids:
    - restructure
  - id: finance-C-107
    when: When validating repayment start date in Loan Restructure
    action: allow repayment_start_date to be before restructure_date
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Setting repayment start date before restructure date creates invalid repayment schedules with negative tenor
      or incorrect EMI calculations
    stage_ids:
    - restructure
  - id: finance-C-108
    when: When processing Loan Restructure
    action: apply security deposit allocation for non-Normal Restructure types (Pre Payment, Advance Payment)
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Applying security deposit for non-Normal Restructure can cause incorrect principal adjustments and violate
      accounting treatment rules
    stage_ids:
    - restructure
  - id: finance-C-109
    when: When calculating new loan amount in Loan Restructure
    action: add balance_interest_amount to new_loan_amount for non-Normal Restructure types
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Capitalizing interest for Pre Payment or Advance Payment can incorrectly inflate the loan principal and misrepresent
      loan terms
    stage_ids:
    - restructure
  - id: finance-C-110
    when: When setting adjusted_interest in Loan Repayment Schedule
    action: set adjusted_interest to the computed adjusted_interest value only for Normal Restructure type, and set to 0 for
      other types
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incorrect adjusted_interest values in repayment schedule can cause wrong EMI calculations and interest allocation
      errors
    stage_ids:
    - restructure
  - id: finance-C-111
    when: When applying treatment_of_other_charges for charge items
    action: set treatment_of_other_charges to 'Capitalize' for Normal Restructure and 'Carry Forward' for other restructure
      types
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Incorrect charge treatment assignment can cause charges to be improperly handled in the accounting system
    stage_ids:
    - restructure
  - id: finance-C-114
    when: When executing the Loan Restructure validation sequence
    action: call calculate_balance_amounts after allocate_security_deposit and before calculate_new_loan_amount
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect sequence can cause balance calculations to use stale adjustment values, resulting in wrong new
      loan amounts
    stage_ids:
    - restructure
  - id: finance-C-115
    when: When submitting a Loan Restructure with Normal Restructure type and Approved status
    action: execute make_waiver_and_capitalization_for_interest before restructure_loan
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Executing in wrong order causes interest to be capitalized on incorrect principal amounts, leading to compounding
      errors in the new repayment schedule
    stage_ids:
    - restructure
  - id: finance-C-116
    when: When applying security deposit allocation for Normal Restructure
    action: apply deposit to principal_overdue first, then to interest_overdue, then to penalty_overdue in sequential order
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect allocation order can cause wrong principal reductions and improper interest calculations, violating
      regulatory guidelines for security deposit application
    stage_ids:
    - restructure
  - id: finance-C-117
    when: When calculating new_loan_amount for Normal Restructure with capitalization treatment
    action: add balance_interest_amount to pending_principal_amount only when treatment_of_normal_interest equals 'Capitalize'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrectly capitalizing non-overdue interest inflates loan principal and violates lending regulations on
      interest capitalization
    stage_ids:
    - restructure
  - id: finance-C-118
    when: When updating loan totals after Normal Restructure approval
    action: set days_past_due to zero when restructuring a loan
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Not resetting DPD can cause incorrect NPA classification and watch period calculations, leading to regulatory
      compliance issues
    stage_ids:
    - restructure
  - id: finance-C-119
    when: When creating waivers for Normal Restructure
    action: waive charges that do not exist in unpaid demands
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Waiving non-existent charges can create phantom waiver records and incorrect accounting entries
    stage_ids:
    - restructure
  - id: finance-C-120
    when: When presenting Loan Restructure functionality to users
    action: claim that restructured loan calculations guarantee regulatory compliance for each jurisdictions
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Different regulatory jurisdictions have varying rules on interest capitalization, NPA classification, and
      restructuring limits that may not be fully captured by this implementation
    stage_ids:
    - restructure
  - id: finance-C-121
    when: When validating charge waiver amounts
    action: verify total overdue charges in the charges table matches the actual unpaid demands from the database
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stale or mismatched charge data can cause incorrect waivers and accounting discrepancies if not validated
      against live data
    stage_ids:
    - restructure
  - id: finance-C-122
    when: When fetching and merging charge details for Normal Restructure
    action: remove charge rows from loan_restructure_charges table if they no longer exist in unpaid demands
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Keeping obsolete charge rows can cause incorrect calculations when waivers are applied to non-existent charges
    stage_ids:
    - restructure
  - id: finance-C-123
    when: When setting default repayment values in Loan Restructure
    action: fallback to existing loan values (rate, method, tenure) when new values are not provided
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing fallback can cause None values in repayment schedule calculations, leading to division by zero or
      incorrect EMI calculations
    stage_ids:
    - restructure
  - id: finance-C-126
    when: When creating NPA status change records
    action: create a Loan NPA Log entry with timestamp, classification reason, and event source
    severity: high
    kind: domain_rule
    modality: must
    consequence: NPA history tracking is incomplete, making audit trail impossible and regulatory reporting inaccurate
    stage_ids:
    - classification
  - id: finance-C-127
    when: When determining loan classification code and name
    action: query Loan Classification Range table filtered by company, matching min/max DPD range and write-off status
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect asset classification buckets are assigned, leading to wrong provisioning calculations and regulatory
      non-compliance
    stage_ids:
    - classification
  - id: finance-C-128
    when: When a loan is marked as NPA due to DPD exceeding threshold
    action: move unpaid interest to suspense ledger via journal entry
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unpaid interest income continues to be recognized instead of being moved to suspense, overstating income
      and creating reconciliation issues
    stage_ids:
    - classification
  - id: finance-C-132
    when: When processing classification for Line of Credit loans
    action: use the maximum DPD across each disbursements as the loan-level DPD
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using individual disbursement DPD instead of maximum causes incorrect NPA classification for LOC loans with
      multiple disbursements
    stage_ids:
    - classification
  - id: finance-C-133
    when: When handling manual NPA override
    action: bypass DPD threshold check and directly update NPA status
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Manual override may be applied without proper authorization checks, allowing unauthorized NPA classification
      changes
    stage_ids:
    - classification
  - id: finance-C-135
    when: When a loan has an active freeze date
    action: set DPD to 0 and is_npa to 0 regardless of demand status
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Frozen loans continue to accrue DPD and NPA status, causing incorrect classification after account freeze
      is released
    stage_ids:
    - classification
  - id: finance-C-136
    when: When updating NPA status for a customer
    action: check each linked loans for the same applicant before allowing NPA exit
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Customer NPA status may incorrectly show non-NPA even when one linked loan remains in NPA status
    stage_ids:
    - classification
  - id: finance-C-137
    when: When classifying loans without existing unpaid demands
    action: set DPD to 0 and reset NPA status
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Loans with no outstanding demands incorrectly retain NPA status, causing wrong provisioning and regulatory
      reporting
    stage_ids:
    - classification
  - id: finance-C-138
    when: When backdating classification processing
    action: recalculate DPD based on actual date difference from max_date to posting_date
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Backdated repayments may cause incorrect DPD calculation leading to wrong NPA status changes
    stage_ids:
    - classification
  - id: finance-C-139
    when: When DPD exceeds auto write-off threshold
    action: trigger automatic loan write-off process
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Loans exceeding write-off threshold are not written off, causing inaccurate balance sheet representation
    stage_ids:
    - classification
  - id: finance-C-140
    when: When a linked loan becomes NPA
    action: mark each other active loans for the same customer as NPA
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cross-loan NPA status is not synchronized, leading to inconsistent customer classification and provisioning
    stage_ids:
    - classification
  - id: finance-C-141
    when: When calculating DPD for re-posting historical data
    action: query demands with docstatus=1 and match payments against demands by date
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Historical DPD records are inaccurate, causing incorrect historical classification snapshots
    stage_ids:
    - classification
  - id: finance-C-142
    when: When presenting NPA classification results
    action: claim that backtest or historical DPD calculations represent actual live classification outcomes
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backdated classification processing uses simulated DPD calculations that do not reflect actual system state
      at those historical dates
    stage_ids:
    - classification
  - id: finance-C-143
    when: When a loan has manual_npa flag set
    action: record manual_npa=true in the NPA log entry for audit trail
    severity: high
    kind: domain_rule
    modality: must
    consequence: Manual overrides are not distinguishable from automatic classification in audit records, violating segregation
      of duties requirements
    stage_ids:
    - classification
  - id: finance-C-145
    when: When performing monetary calculations in write-off processing
    action: Use currency_precision from system defaults (fallback to 2 decimal places)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point calculations without precision cause rounding errors in financial records, leading to penny
      discrepancies in GL entries
    stage_ids:
    - write_off
  - id: finance-C-146
    when: When creating waivers for pending amounts during write-off
    action: Create separate Loan Repayment records with is_write_off_waiver=1 for each type (Interest, Penalty, Charges)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Combined waivers violate accounting principles and create audit trail gaps for regulatory compliance verification
    stage_ids:
    - write_off
  - id: finance-C-147
    when: When processing suspense entries for NPA loans
    action: Transfer suspense entries to income/waiver accounts when is_npa is true
    severity: high
    kind: domain_rule
    modality: must
    consequence: NPA suspense not realized during write-off violates regulatory requirements for provisioning and loan classification
    stage_ids:
    - write_off
  - id: finance-C-148
    when: When submitting a Loan Write-Off document
    action: Skip process_write_off_waivers_and_classification when is_settlement_write_off is true
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Processing waivers for settlement write-offs incorrectly reduces settlement recovery amounts
    stage_ids:
    - write_off
  - id: finance-C-149
    when: When posting GL entries for loan write-off
    action: Check loan_accounting_enabled before creating GL entries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: GL entries posted without accounting enabled create orphaned entries that break trial balance
    stage_ids:
    - write_off
  - id: finance-C-150
    when: When processing employee loans during write-off
    action: Close employee loans unless they are repay_from_salary type and secured_loan is false
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Closing non-employee loans or secured employee loans causes incorrect status updates and disrupts salary
      deduction workflows
    stage_ids:
    - write_off
  - id: finance-C-151
    when: When updating loan status after write-off submission
    action: Set status to 'Written Off' for non-settlement write-offs when write_off_count > 1 or cancel is false
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect status prevents proper loan lifecycle tracking and may allow duplicate write-offs or invalid operations
    stage_ids:
    - write_off
  - id: finance-C-152
    when: When canceling a Loan Write-Off document
    action: Only cancel waivers if there is exactly one write-off record remaining
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cancelling waivers when multiple write-offs exist removes valid waivers tied to remaining write-offs
    stage_ids:
    - write_off
  - id: finance-C-153
    when: When recording charges write-off
    action: Use write_off_account instead of income_account when on_write_off is true
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using income account instead of write-off account misclassifies expenses and violates accounting classification
      requirements
    stage_ids:
    - write_off
  - id: finance-C-154
    when: When executing write-off processing asynchronously
    action: Use enqueue with queue='long' for process_write_off_waivers_and_classification
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Processing waivers synchronously blocks the submission request and causes timeout failures for loans with
      many pending items
    stage_ids:
    - write_off
  - id: finance-C-155
    when: When the write-off amount is not provided by user
    action: Auto-populate write_off_amount with pending_principal_amount for non-settlement write-offs
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing write-off amount with no auto-calculation blocks the submission process and requires manual intervention
    stage_ids:
    - write_off
  - id: finance-C-156
    when: When computing waiver amounts during write-off
    action: Include unaccrued_interest and unbooked_interest in interest waiver calculation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incomplete interest waiver calculation leaves unbooked amounts outstanding, creating artificial recovery
      expectations
    stage_ids:
    - write_off
  - id: finance-C-157
    when: When querying GL entries for suspense transfer
    action: Filter by posting_date <= write_off posting_date and is_cancelled == 0
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including future-dated or cancelled entries in suspense transfer causes incorrect income recognition and
      duplicate GL postings
    stage_ids:
    - write_off
  - id: finance-C-158
    when: When writing off interest during loan write-off
    action: Process unbooked interest first via create_loan_demand before writing off
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping unbooked interest processing leaves orphaned demand records that conflict with waiver entries
    stage_ids:
    - write_off
  - id: finance-C-159
    when: When setting default write-off account
    action: Fetch write_off_account from Loan Product when not explicitly provided
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing write-off account causes GL posting failure and blocks write-off submission
    stage_ids:
    - write_off
  - id: finance-C-160
    when: When handling cost centers in GL entries
    action: Fetch default cost center from company settings when not explicitly provided
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Missing cost center in GL entries violates cost allocation requirements and causes audit failures
    stage_ids:
    - write_off
  - id: finance-C-161
    when: When querying waivers for cancellation
    action: Filter waivers by value_date <= cancellation posting_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including future-dated waivers in cancellation causes incorrect reversal and breaks loan balance calculations
    stage_ids:
    - write_off
  - id: finance-C-162
    when: When calculating write-off recovery amounts
    action: Only include repayments with repayment_type in ['Write Off Recovery', 'Write Off Settlement']
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including regular repayments in write-off recovery miscalculates actual recovery rates and distorts reporting
    stage_ids:
    - write_off
  - id: finance-C-163
    when: When calculating accrued interest for write-off recovery
    action: Calculate separate accrued interest for Interest and Penal Interest types
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Combining interest types in recovery calculation causes incorrect waiver amounts and potential under/over
      recovery
    stage_ids:
    - write_off
  - id: finance-C-164
    when: When documenting write-off processing capabilities
    action: Claim that write-off automatically closes the loan (closure depends on closure_on_write_off setting)
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Claiming automatic closure misleads users about loan lifecycle; employee loans require additional conditions
      (pending_principal <= 0, repay_from_salary)
    stage_ids:
    - write_off
  - id: finance-C-165
    when: When describing write-off waiver functionality
    action: Claim that each pending interest/penalty/charges are waived (only amounts calculated at write-off time are waived)
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Overstating waiver scope creates expectation of complete forgiveness when only pre-calculated amounts are
      included
    stage_ids:
    - write_off
  - id: finance-C-173
    when: When cancelling loan balance adjustment
    action: reverse credit adjustment by subtracting amount from credit_adjustment_amount field
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect cancellation logic will cause loan adjustment amounts to be incorrectly tallied, corrupting loan
      balance calculations
    stage_ids:
    - adjustment
  - id: finance-C-174
    when: When updating loan fields after credit adjustment on submit
    action: add amount to credit_adjustment_amount field on the Loan document
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect field updates will cause loan balance tracking to diverge from actual GL entries, leading to reconciliation
      failures
    stage_ids:
    - adjustment
  - id: finance-C-176
    when: When GL entry creation is gated by loan accounting flag
    action: skip GL entries when loan_accounting_enabled returns false for the company
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Creating GL entries when accounting is disabled will cause duplicate or inconsistent accounting records
    stage_ids:
    - adjustment
  - id: finance-C-182
    when: When cancelling refund with excess amount type
    action: add refund amount back to excess_amount_paid field on the Loan document
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect cancellation will cause excess amount tracking to diverge from actual refund reversals
    stage_ids:
    - adjustment
  - id: finance-C-183
    when: When processing refund with is_excess_amount_refund flag
    action: reduce excess_amount_paid field and set fieldname = 'excess_amount_paid'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Wrong field update will cause loan excess amount tracking to diverge from actual refund records
    stage_ids:
    - adjustment
  - id: finance-C-184
    when: When closing loan after full excess amount refund
    action: mark loan status as Closed and update closure_date when excess_amount_paid becomes zero
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Loan remaining open after full refund will cause incorrect loan portfolio reporting and stale outstanding
      records
    stage_ids:
    - adjustment
  - id: finance-C-185
    when: When using this lending system
    action: claim real-time transaction processing capability for balance adjustments and refunds
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: This is a Frappe/ERPNext document-based system with batch processing; balance adjustments require document
      submission and may not reflect instantly in all views
    stage_ids:
    - adjustment
  - id: finance-C-186
    when: When GL entries are generated
    action: modify GL entry accounts after submission to avoid audit trail corruption
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Modifying GL entries post-submission violates audit trail integrity and may cause regulatory compliance issues
    stage_ids:
    - adjustment
  - id: finance-C-187
    when: When handling cancel operation for loan refund
    action: reverse security deposit available_amount in Loan Security Deposit table during cancellation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cancelled security deposit refund will incorrectly reduce available security deposit balance without reversal
    stage_ids:
    - adjustment
  - id: finance-C-192
    when: When validating loan security price data
    action: Verify valid_from timestamp is less than or equal to valid_upto timestamp and prevent overlapping price records
      for the same security
    severity: high
    kind: domain_rule
    modality: must
    consequence: Overlapping or invalid date ranges cause the system to retrieve incorrect security prices, corrupting LTV
      calculations and loan valuations
    stage_ids:
    - security_management
  - id: finance-C-193
    when: When implementing security pledging validation
    action: Require non-zero qty for each security and prevent duplicate security entries in the same pledge
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing qty causes zero-value collateral entries; duplicate securities cause over-counting of collateral
      value and incorrect LTV calculations
    stage_ids:
    - security_management
  - id: finance-C-194
    when: When maintaining security value accounting
    action: Verify available_security_value equals original_security_value minus utilized_security_value at each times
    severity: high
    kind: domain_rule
    modality: must
    consequence: Account balance inconsistency leads to incorrect collateral availability calculations and improper loan limit
      determinations
    stage_ids:
    - security_management
  - id: finance-C-195
    when: When implementing haircut fallback logic
    action: Fall back to Loan Security Type haircut when pledge-level haircut is not specified
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing haircut fallback results in zero haircut (full collateral value), artificially inflating loan limits
      and eliminating risk buffer
    stage_ids:
    - security_management
  - id: finance-C-196
    when: When implementing LTV shortfall processing scope
    action: Only process loans with status in ('Disbursed', 'Partially Disbursed') and is_secured_loan=1
    severity: high
    kind: domain_rule
    modality: must
    consequence: Processing unsecured loans or non-disbursed loans for LTV shortfall creates false alerts and wastes system
      resources
    stage_ids:
    - security_management
  - id: finance-C-198
    when: When implementing security release upon loan settlement
    action: Mark loan as Closed when each pledged securities are released (pledged_qty reaches zero)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Loan remains in active status after full repayment causes accounting mismatches and prevents proper loan
      closure workflows
    stage_ids:
    - security_management
  - id: finance-C-199
    when: When implementing security linking to loans
    action: Link Loan Security Assignment to Loan via loan_application when available, falling back to direct loan reference
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Improper security-to-loan linkage breaks LTV tracking, shortfall alerts, and loan closure workflows
    stage_ids:
    - security_management
  - id: finance-C-200
    when: When updating sanctioned loan amounts
    action: Recalculate and update Sanctioned Loan Amount based on current security values and LTV ratio when security is
      pledged, released, or shortfall is detected
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Outdated sanctioned limits allow borrowers to exceed safe borrowing levels or incorrectly restrict legitimate
      credit access
    stage_ids:
    - security_management
  - id: finance-C-202
    when: When implementing security validation for pledge
    action: Require either loan_application or loan reference when creating Loan Security Assignment; create Sanctioned Loan
      Amount only when neither exists
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Ambiguous security-to-loan linkage causes tracking errors and prevents proper loan-to-collateral reconciliation
    stage_ids:
    - security_management
  - id: finance-C-205
    when: When implementing haircut calculation as a replaceable module
    action: Expose haircut calculation method as a configurable/replaceable component to support different risk methodologies
      per security type
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Hardcoded haircut logic prevents adapting to market volatility changes or regulatory requirements without
      code modifications
    stage_ids:
    - security_management
  - id: finance-C-206
    when: When implementing LTV shortfall monitoring
    action: Process LTV shortfall checks as a scheduled batch job (daily_long), not as real-time transaction processing
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Real-time LTV monitoring expectation vs batch processing reality causes false claims of continuous monitoring
      capability
    stage_ids:
    - security_management
  - id: finance-C-207
    when: When claiming security management capabilities
    action: Claim real-time LTV monitoring or immediate shortfall detection capabilities
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: System processes shortfall checks daily at most, meaning hours of collateral value drift can occur between
      checks
    stage_ids:
    - security_management
  - id: finance-C-208
    when: When implementing LTV ratio precision in shortfall checks
    action: Use 6 decimal place precision (flt(value, 6)) when comparing current_ratio against ltv_ratio
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Insufficient precision causes borderline LTV ratios to be incorrectly evaluated, either triggering or missing
      critical shortfall alerts
    stage_ids:
    - security_management
  - id: finance-C-209
    when: When processing security release for loan closure
    action: Mark loan status as Closed and set closure_date when each pledged securities are released
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Loan remains in active/partial disbursed state despite full collateral release, causing incorrect reporting
      and preventing loan lifecycle completion
    stage_ids:
    - security_management
  - id: finance-C-210
    when: When updating shortfall status after security value recovery
    action: Set shortfall status to Completed and reset shortfall_amount and shortfall_percentage to zero when security value
      covers the outstanding amount
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stale pending shortfall records cause incorrect risk reporting and may incorrectly block disbursements
    stage_ids:
    - security_management
  - id: finance-C-212
    when: When implementing applicant-level shortfall processing
    action: Aggregate each secured loans for an applicant and compare total pending principal against total pledged security
      value to detect cross-loan shortfalls
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single-loan LTV checks miss portfolio-level collateral shortfalls where aggregate exposure exceeds aggregate
      collateral
    stage_ids:
    - security_management
  - id: finance-C-215
    when: When creating Loan Security Assignment from Loan Application
    action: Proposed pledges must be populated for secured loans before security assignment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing proposed pledges will result in Loan Security Assignment with zero security value, allowing disbursements
      beyond collateral coverage
  - id: finance-C-217
    when: When creating Loan Disbursement for Line of Credit loans
    action: Disbursement date must be within limit_applicable_start and limit_applicable_end dates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Disbursements outside approved limit dates violate credit facility terms and regulatory guidelines
  - id: finance-C-218
    when: When creating Loan Disbursement
    action: Repayment Start Date must be on or after Disbursement Date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid repayment schedule dates create impossible EMI timelines causing payment processing failures
  - id: finance-C-219
    when: When Loan Disbursement is submitted
    action: process_loan_interest_accrual_for_loans must be triggered with accrual_type=Disbursement for Partially Disbursed
      term loans
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing interest accrual on partial disbursement causes incorrect interest calculations for subsequent EMIs
  - id: finance-C-221
    when: When creating Loan Demand from Loan Interest Accrual
    action: Total pending interest from accruals must be aggregated since last demand date before creating new demand
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incomplete interest aggregation causes demands to be understated, leading to under-collection from borrowers
  - id: finance-C-222
    when: When Loan Repayment is processed
    action: Loan Demand entries must be allocated in FIFO order based on demand_date before closing demands
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect demand allocation causes wrong payment sequencing, potentially misapplying repayments to written-off
      amounts
  - id: finance-C-223
    when: When allocating Loan Repayment to demands
    action: repayment_schedule_detail field must link repayments to specific schedule rows for term loans
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing schedule row linkage causes incorrect EMI tracking and breaks demand-to-payment audit trail
  - id: finance-C-224
    when: When Loan Repayment with is_backdated=true is submitted
    action: process_loan_classification must be called with is_backdated=1 and loan parameter mandatory
    severity: high
    kind: domain_rule
    modality: must
    consequence: Improper backdated classification processing causes incorrect NPA staging and regulatory reporting errors
  - id: finance-C-225
    when: When processing Loan Repayment for Full Settlement or Write Off Settlement
    action: each future accruals must be reversed before classification processing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unreversed future accruals cause phantom interest liabilities after loan settlement, corrupting closed loan
      balances
  - id: finance-C-226
    when: When Loan Repayment triggers restructure via Advance Payment or Pre Payment
    action: create_update_loan_reschedule must be called with principal_adjusted >= pending_principal_amount
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect principal adjustment causes rescheduled EMIs to be miscalculated, leading to over or under-payment
      schedules
  - id: finance-C-227
    when: When Loan Restructure is submitted with Normal Restructure type
    action: New Loan Repayment Schedule must replace active schedule with status transition from Active to Outdated
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing schedule replacement causes duplicate EMI generation and borrower confusion about payment obligations
  - id: finance-C-229
    when: When Loan Security Assignment is submitted
    action: Loan Security available_security_value must be reduced by the pledged amount
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unupdated security values allow double-pledging of same collateral across multiple loans
  - id: finance-C-230
    when: When Loan Security Assignment is cancelled
    action: Loan Security available_security_value must be restored by the pledged amount
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unreleased security values remain incorrectly marked as unavailable, preventing legitimate collateral use
  - id: finance-C-232
    when: When processing Loan Write Off for non-settlement scenarios
    action: make_loan_waivers must be called to create Interest Waiver, Penalty Waiver, and Charges Waiver repayment entries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing waivers leave outstanding interest/penalty/charges on written-off loans, corrupting financial records
  - id: finance-C-233
    when: When creating Loan Balance Adjustment
    action: Amount must be positive (non-zero, non-negative) and cannot be zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero or negative adjustments corrupt loan ledger balances and cause accounting reconciliation failures
  - id: finance-C-234
    when: When creating Loan Balance Adjustment while Loan Restructure is in Initiated status
    action: Adjustment must not be created when any Loan Restructure with status=Initiated exists for the loan
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Concurrent adjustments during restructure corrupt loan balance calculations and violate segregation of duties
  - id: finance-C-235
    when: When submitting Loan Balance Adjustment
    action: Loan.credit_adjustment_amount or Loan.debit_adjustment_amount must be updated based on adjustment_type
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unupdated adjustment amounts break loan balance audit trail and cause incorrect outstanding calculations
  - id: finance-C-236
    when: When calculating pending_principal_amount across each stages
    action: Numeric precision must use currency_precision from frappe.db.get_default or fallback to 2 decimal places
    severity: high
    kind: domain_rule
    modality: must
    consequence: Insufficient precision causes rounding errors in principal calculations, leading to incorrect EMI amounts
      and payment shortfalls
  - id: finance-C-237
    when: When processing backdated transactions
    action: Backdated repayments must enqueue repost processing asynchronously via frappe.enqueue, not execute synchronously
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Synchronous backdated processing blocks HTTP requests and causes timeout failures for complex loan portfolios
  - id: finance-C-238
    when: When linking Loan Security Assignment to Loan
    action: Loan.is_secured_loan flag must be set to 1 when security assignment is linked
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing is_secured_loan flag bypasses security validation during disbursement, allowing unsecured disbursements
      against secured facilities
  - id: finance-C-239
    when: When implementing monetary calculations across the loan management system
    action: Use precision from frappe.db.get_default('currency_precision') with a default of 2 decimal places for each Currency
      fields and flt() operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point precision errors accumulate across loan lifecycle calculations, causing incorrect interest
      accrual, repayment allocation, and principal tracking that compounds over time
  - id: finance-C-243
    when: When enqueuing batch loan processing jobs for demand generation or interest accrual
    action: Limit each enqueue job to maximum 5000 loans per batch to prevent database lock contention and memory exhaustion
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Processing unlimited loans in single job causes database locks, timeout errors, and system unavailability
      for all users during batch processing
    stage_ids:
    - demand
  - id: finance-C-244
    when: When implementing idempotent batch processing via Process doctypes
    action: Implement per-loan commits within batch loops; each loan iteration must be independent with its own db.commit()
      to verify partial success recovery
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Single transaction for all loans causes complete rollback on any failure, leaving zero progress and requiring
      full reprocessing after fix
  - id: finance-C-247
    when: When creating a new loan application or loan
    action: Restrict applicant_type to only 'Customer' or 'Employee' as defined by the loan_product and company policies
    severity: high
    kind: domain_rule
    modality: must
    consequence: Loans issued to unsupported applicant types violate KYC/AML requirements and company lending policies, exposing
      organization to regulatory penalties
  - id: finance-C-249
    when: When presenting or reporting this system's capabilities to users or stakeholders
    action: Claim that the system supports real-time trading, algorithmic trading execution, or live market integration —
      Frappe Lending is a loan lifecycle management system with no trading execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users build systems expecting trade execution capabilities that don't exist, leading to failed integrations,
      missed market opportunities, and broken system dependencies
  - id: finance-C-250
    when: When presenting or reporting this system's capabilities to users or stakeholders
    action: Claim that the system supports cryptocurrency platforms, blockchain-based lending, or crypto-collateralized loans
      — the system is designed for fiat currency loan operations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users implement cryptocurrency integrations that are fundamentally incompatible with the system's accounting
      model, GL structure, and regulatory compliance framework
  - id: finance-C-251
    when: When presenting or reporting this system's capabilities to users or stakeholders
    action: Claim that the system supports organizations without accounting infrastructure — loan accounting requires enable_loan_accounting
      flag and configured chart of accounts
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Organizations deploy the system expecting standalone loan tracking, but all financial entries require GL
      integration, causing complete accounting failure without ERPNext accounting infrastructure
  - id: finance-C-252
    when: When presenting or reporting this system's capabilities to users or stakeholders
    action: Claim that the system functions as a general financial application without banking/NBFC regulatory compliance
      requirements — Frappe Lending targets regulated financial institutions requiring audit trails
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Organizations deploy the system without implementing required compliance controls (audit trails, GL reconciliation,
      IRAC classification), leading to regulatory violations and potential license revocation
  - id: finance-C-254
    when: When configuring accounting dimensions for loan transactions
    action: Include each loan doctypes (Loan, Loan Disbursement, Loan Interest Accrual, Loan Demand, Loan Repayment, Loan
      Refund) in accounting_dimension_doctypes for dimension filtering in GL entries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing accounting dimensions causes incorrect cost center/department allocation in GL, breaking segment
      reporting and regulatory filings for multi-department/segment organizations
  - id: finance-C-256
    when: When integrating loan repayments with bank reconciliation
    action: Process repayments through bank reconciliation only when repay_from_salary=0 to exclude salary-deducted repayments
      from duplicate clearing
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Salary-deducted repayments cleared through bank reconciliation cause double-counting, inflating cleared balances
      and creating reconciliation mismatches
  - id: finance-C-257
    when: When implementing loan initialization or disbursement logic in backtesting
    action: Generate standard repayment schedules for Line of Credit (LOC) loans — LOC loans must skip schedule creation and
      use cyclic billing date for interest accrual instead
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Creating fixed repayment schedules for LOC loans causes incorrect accounting treatment; LOC is demand-based
      with flexible drawdown/paydown patterns, and schedule-based processing will cause interest calculation errors and balance
      mismatches
    derived_from_bd_id: BD-005
  - id: finance-C-258
    when: When implementing payment allocation logic for loan repayments
    action: Apply payment amounts following the configured allocation sequence from loan product (typically Principal → Interest
      → Penalty order) — verify allocation order is read from loan_product configuration and not hardcoded
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying payment allocation sequence without configuration causes regulatory violations; payments applied
      to wrong liability buckets result in incorrect tax reporting, NPA classification errors, and audit failures
    derived_from_bd_id: BD-048
  - id: finance-C-259
    when: When implementing Days Past Due (DPD) calculation for NPA classification
    action: Calculate DPD from the last payment date — verify regular payments reset DPD to zero even if older dues remain
      outstanding; must_not use cumulative missed payment tracking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calculating DPD from first missed payment contradicts RBI NPA norms and causes incorrect NPA classification;
      loans may be prematurely marked as NPA or fail to be classified on time, leading to regulatory violations and incorrect
      risk reporting
    derived_from_bd_id: BD-019
  - id: finance-C-262
    when: When implementing loan restructure logic for distressed borrower scenarios
    action: Support capitalization of unpaid charges (processing fees, penalties) into principal balance during restructure
      — verify loan_product allows charge capitalization before applying
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Forcing immediate charge collection during restructure worsens borrower distress and reduces recovery probability;
      without capitalization support, restructuring becomes ineffective and NPA resolution fails
    derived_from_bd_id: BD-018
  - id: finance-C-263
    when: When implementing NPA classification logic using DPD thresholds
    action: Read days_past_due_threshold_for_npa from loan_product configuration (not a global constant) — verify the field
      exists in loan_product.py and is properly configured per product; some products have RBI exemptions requiring different
      bucket definitions
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using hardcoded global DPD threshold causes systematic NPA misclassification across all loans; products with
      RBI exemptions or different risk profiles will be incorrectly classified, leading to regulatory reporting errors
    derived_from_bd_id: BD-021
  - id: finance-C-264
    when: When calculating partner payment distributions for multi-lender loan arrangements
    action: Check loan_partner field before generating Co-Lender Schedule — if loan_partner is set, generate proportional
      repayment schedule for partner payments; if null, fall back to single-lender logic
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Missing Co-Lender Schedule for multi-partner loans causes incorrect payment distribution; partner allocations
      default incorrectly or are skipped entirely, leading to accounting errors and partner disputes
    derived_from_bd_id: BD-091
  - id: finance-C-265
    when: When configuring grace period before first repayment in loan disbursement
    action: 'Check min_days_first_repayment in this order: Loan Product config → Company settings → system default (0); verify
      the effective value is intentionally configured — silent fallthrough to 0-day default violates most regional lending
      regulations'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Silent fallthrough to 0-day grace period default violates regional lending regulations; without explicit
      configuration at product or company level, loans may require immediate repayment causing borrower hardship and regulatory
      non-compliance
    derived_from_bd_id: BD-093
  - id: finance-C-266
    when: When implementing stochastic operations (random number generation, Monte Carlo simulations, ML models) in backtesting
    action: Assume the framework handles random seed initialization for each stochastic operations — the framework does not
      enforce random seed setting; stochastic code paths may produce non-deterministic results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Non-deterministic stochastic operations cause backtest results to vary across runs, making strategy performance
      evaluation unreliable and creating inconsistencies between backtest and live trading
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-267
    when: When implementing any stochastic operation in the loan module
    action: Explicitly set random seed (random.seed() or framework equivalent) at the start of each stochastic code paths
      — document the seed value used and implement reproducibility checks in unit tests to catch non-deterministic behavior
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit random seed setting, backtest results vary across runs, making it impossible to reproduce
      strategy performance; live trading decisions based on non-reproducible backtests lead to unexpected outcomes
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-268
    when: When implementing loan exposure validation logic
    action: Aggregate sanctioned amounts across each active loans for the same applicant and compare against the applicant-level
      sanctioned amount limit — check must be independent of outstanding balances
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without aggregating sanctioned amounts across all active loans, the system may allow over-lending to a single
      applicant beyond regulatory exposure limits, causing capital at risk and potential regulatory penalties
    derived_from_bd_id: BD-032
  - id: finance-C-269
    when: When implementing loan import or migration functionality
    action: Create GL opening entries for migrated balances only when is_imported=1 flag is set on the loan; regular new loans
      must skip GL opening entry creation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Importing loans without creating GL opening entries breaks accounting continuity for legacy migrations, causing
      balances to be untraceable in historical reporting and audit trails
    derived_from_bd_id: BD-034
  - id: finance-C-270
    when: When calculating EMI for reducing-balance loans
    action: Use the standard PMT formula (P*r*(1+r)^n)/((1+r)^n - 1) where P is principal, r is monthly rate, n is tenure
      in months — verify interest rate remains constant throughout loan tenure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect EMI formula or variable rate without recalculation produces wrong repayment amounts, causing
      either borrower overpayment or lender revenue shortfall that accumulates over loan tenure
    derived_from_bd_id: BD-071
  - id: finance-C-271
    when: When calculating per-day interest accrual
    action: Derive daily interest rate from the configured year divisor (365, 360, or 365.25) as explicitly set per loan product
      — convention must be explicitly configured; mixing conventions across products requires clear audit trail
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect day-count convention produces wrong daily interest calculations, causing interest accrual
      discrepancies that compound over loan tenure and create audit failures during regulatory reviews
    derived_from_bd_id: BD-073
  - id: finance-C-272
    when: When calculating interest for the broken period (disbursement-to-first-EMI gap)
    action: Charge broken period interest using annual rate divided by 36500, multiplied by outstanding balance and pending
      days — broken period interest is due immediately with first EMI or separately per product terms
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect broken period interest calculation using monthly instead of annual rate basis causes revenue leakage
      or borrower overcharge, creating disputes and accounting reconciliation failures
    derived_from_bd_id: BD-075
  - id: finance-C-275
    when: When implementing or refactoring loan state machine transitions
    action: 'Enforce strict linear state progression: Draft → Sanctioned → Disbursed → Active → Closed/WrittenOff — prohibit
      backward transitions, state skips, and direct transitions from Draft to Disbursed; Closed/WrittenOff are terminal states'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allowing invalid state transitions bypasses stage-gate controls designed for regulatory compliance, enabling
      loans to be recorded as disbursed without proper sanctioning or creating orphaned Active loans without disbursement
      records
    derived_from_bd_id: BD-087
  - id: finance-C-276
    when: When implementing repayment processing logic for loans
    action: Trigger async repost processing when repayment_date is less than current_date; current and future dated repayments
      must process synchronously
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backdated repayments processed synchronously would incorrectly post GL entries to current period instead
      of the affected historical periods, corrupting accounting records across multiple fiscal periods
    derived_from_bd_id: BD-051
  - id: finance-C-277
    when: When implementing write-off validation in loan write-off processing
    action: Validate write_off_amount equals pending_principal_amount exactly with no tolerance; reject any write-off where
      write_off_amount deviates from pending_principal_amount
    severity: high
    kind: domain_rule
    modality: must
    consequence: Relaxing this validation allows partial principal write-offs which violate the full principal write-off policy,
      potentially causing unauthorized debt forgiveness and direct financial loss
    derived_from_bd_id: BD-054
  - id: finance-C-278
    when: When implementing loan restructure date validation
    action: Validate restructure_date is greater than or equal to last_due_date; reject any restructure request where restructure_date
      precedes last_due_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allowing restructure before current obligations are fulfilled corrupts chronological loan history, making
      it impossible to reconcile past payments and causing incorrect future payment calculations
    derived_from_bd_id: BD-055
  - id: finance-C-279
    when: When generating co-lender repayment schedules for multi-lender loan arrangements
    action: Determine schedule generation logic from loan_product_partner.repayment_schedule_type field; apply the corresponding
      schedule type methodology for co-lender portion calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect schedule type causes co-lender portions to be calculated under wrong methodology, resulting
      in incorrect payment allocations and potential breach of partner agreement terms
    derived_from_bd_id: BD-059
  - id: finance-C-281
    when: When calculating Loan Partner payment ratios for multi-lender arrangements
    action: Calculate payment sharing ratio using the methodology corresponding to the loan's repayment_schedule_type; apply
      different allocation logic based on schedule type
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a single calculation methodology regardless of schedule type causes incorrect payment allocations across
      partners, leading to disputes and potential breach of co-lending agreements
    derived_from_bd_id: BD-063
  - id: finance-C-282
    when: When implementing auto-close functionality with write-off limit tolerance
    action: Handle the edge case where pending principal after tolerance is within write-off limit but rounding differences
      from accrued interest or penalties prevent exact equality; add explicit handling or validation bypass logic
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without handling this contradiction, auto-close cannot complete when pending amount is within tolerance due
      to the strict equality requirement rejecting write-offs with rounding differences, leaving loans in an unresolved state
    derived_from_bd_id: BD-104
  - id: finance-C-283
    when: When validating repayment start date against minimum days requirement from Company settings
    action: Validate that user-entered Repayment Start Date respects the minimum days requirement derived from Company settings,
      not just the explicit Repayment Start Date against Disbursement Date
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Only validating explicit Repayment Start Date against Disbursement Date allows users to enter values that
      violate Company minimum days requirement, creating loans with terms inconsistent with organizational policy
    derived_from_bd_id: BD-105
  - id: finance-C-287
    when: When implementing or refactoring loan freeze operation logic
    action: Reverse only entries with posting_date strictly greater than freeze_date (posting_date > freeze_date) — entries
      on or before freeze date must remain unaffected
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reversing entries on or before the freeze date corrupts the loan state history and causes incorrect accounting
      entries that cannot be reconciled with the freeze snapshot
    derived_from_bd_id: BD-069
  - id: finance-C-288
    when: When implementing or refactoring loan tenure calculation in repayment period computation
    action: Compute loan tenure using the inverse EMI formula n = log(R/P*r)/log(1+r) where R=EMI, P=principal, r=monthly
      rate — round result to whole months and handle fractional months with partial payment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect tenure calculation using simple division or approximate methods causes mismatched EMI amounts,
      leading to either customer overpayment or lender revenue loss
    derived_from_bd_id: BD-072
  - id: finance-C-289
    when: When implementing or refactoring penal interest accrual calculation
    action: Calculate daily penal interest as pending_amount * penal_rate / 36500 applied only to the unpaid EMI demand amount
      — exclude full loan principal during moratorium periods from penal calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calculating penal interest on full principal instead of demand amount overcharges borrowers during moratorium,
      while failing to charge on actual unpaid demands causes revenue leakage
    derived_from_bd_id: BD-074
  - id: finance-C-290
    when: When implementing or refactoring loan balance update logic in repayment processing
    action: Update loan outstanding as previous_balance + accrued_interest - repayment_amount in that exact order — verify
      balance cannot go negative (handle overpayment separately) and trigger loan closure when balance reaches zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reversing the calculation order or subtracting before adding causes balance corruption, leading to incorrect
      interest capitalization and loan accounts that never close or show phantom balances
    derived_from_bd_id: BD-077
  - id: finance-C-291
    when: When implementing or refactoring demand outstanding calculation in loan demand processing
    action: Calculate outstanding demand as demand_amount minus paid_amount — apply partial payments proportionally reducing
      outstanding and trigger penal interest for unpaid demands past due date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect outstanding calculation corrupts NPA day calculations and collection priorities, causing delayed
      recognition of defaults and incorrect demand notices to borrowers
    derived_from_bd_id: BD-080
  - id: finance-C-293
    when: When implementing or refactoring loan restructure initiation logic
    action: Check for existing active restructure with status=Initiated before allowing new restructure — reject new restructure
      initiation if another restructure with status=Initiated exists (Draft/Submitted/Cancelled statuses do not block)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Concurrent restructures without validation allow multiple term modifications to proceed simultaneously, causing
      conflicting accounting entries and loan state that cannot be reconciled
    derived_from_bd_id: BD-092
  - id: finance-C-294
    when: When implementing or refactoring demand generation logic in loan repayment schedule processing
    action: Check the demands_generated flag on LoanRepaymentSchedule before creating new demands — reset the flag when regenerating
      the schedule to maintain idempotent demand generation and prevent duplicate demands
    severity: high
    kind: domain_rule
    modality: must
    consequence: Bypassing the demands_generated flag causes duplicate demand records, leading to borrowers being charged
      multiple times for the same installment and subsequent refund disputes
    derived_from_bd_id: BD-094
  - id: finance-C-295
    when: When implementing loan disbursement and demand generation processing in the loan management system
    action: Verify term loan repayment schedule creation (BD-003) completes successfully before batch demand generation (BD-011)
      executes — schedule creation is an atomic prerequisite; demand generation must not proceed if schedule creation fails
      or is delayed
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If schedule creation fails silently, demand generation produces no results, causing payment holidays or missed
      billing. The tight coupling means schedule failure cascades directly to demand generation failure with no fallback
    derived_from_bd_id: BD-096
  - id: finance-C-296
    when: When implementing payment allocation logic with both IRAC-based and asset-classification-based configurations
    action: Define explicit precedence rules for payment allocation when both collection_offset_sequence (BD-013) and asset-classification-based
      allocation (BD-048) are configured — one must take absolute priority over the other
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit precedence, the system may apply payments in unintended sequence, potentially violating
      IRAC norms or misclassifying principal recovery, leading to incorrect ledger entries and regulatory compliance issues
    derived_from_bd_id: BD-098
  - id: finance-C-297
    when: When processing co-lender loan disbursement with loan_partner field set
    action: Validate repayment_schedule_type is present and valid when loan_partner is set — the system must raise a validation
      error and halt processing rather than silently generating incomplete schedules
    severity: high
    kind: domain_rule
    modality: must
    consequence: When loan_partner triggers co-lender logic but repayment_schedule_type is null, the system generates incomplete
      or incorrect schedules without error. This causes silent failure in multi-lender P&L allocation, leading to partner
      payment mismatches that only surface during reconciliation
    derived_from_bd_id: BD-101
  - id: finance-C-298
    when: When implementing loan accrual and NPA classification processing with mid-period status transitions
    action: Implement accrual reversal validation that captures correct GL amounts and timing when loan transitions to NPA
      — verify NPA status check occurs at batch boundary or accrual entry references NPA status at time of recognition, not
      time of posting
    severity: high
    kind: domain_rule
    modality: must
    consequence: When a loan transitions to NPA mid-accrual period, normal and penal interest may have already posted to income
      GL before NPA classification. BD-043 requires reversal to suspense, but if accrual GL entry was created before NPA classification,
      reversal logic may capture incorrect amounts or timing, causing income misstatement
    derived_from_bd_id: BD-103
  - id: finance-C-299
    when: When implementing large-scale NPA classification and automatic write-off processing
    action: Implement idempotent write-off processing with state checkpointing — when processing large NPA portfolios, verify
      each loan's write-off status is persisted before moving to the next batch to prevent inconsistent state on timeout and
      to allow safe retry without duplicate entries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hardcoded 5000 batch size causes timeout during large NPA classification runs. Partial write-offs leave loans
      in inconsistent state, and retry logic may duplicate write-off entries for accounts already partially processed, causing
      accounting errors
    derived_from_bd_id: BD-107
  - id: finance-C-300
    when: When implementing P&L reporting and portfolio valuation in the loan management system
    action: Assume the framework provides built-in PnL conservation validation between realized and unrealized gains/losses
      — the framework does not implement this capability; realized PnL and unrealized PnL are tracked separately without automatic
      reconciliation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without PnL conservation validation, realized gains may not align with unrealized mark-to-market changes,
      causing audit failures and incorrect financial reporting. Errors accumulate silently until audit discovery
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-301
    when: When implementing signal processing and feature generation for loan scoring models
    action: Implement explicit signal time alignment validation — verify each input signals are aligned to the same timestamp,
      apply shift/lag corrections for delayed data feeds, and document the alignment methodology in model configuration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without signal time alignment, features may include look-ahead bias or stale data, causing model predictions
      to be inaccurate and leading to incorrect loan approval decisions with financial losses
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-302
    when: When implementing train/test data splitting for model development and validation
    action: Assume the framework enforces train/test time split integrity — the framework does not implement temporal data
      leakage prevention; time-based splitting must be implemented explicitly with proper boundary enforcement
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without train/test time split integrity enforcement, future data may leak into training sets, causing model
      overfitting that makes backtest results non-reproducible in live trading
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-303
    when: When implementing train/test data splitting for loan prediction models
    action: Implement temporal splitting with explicit timestamp boundaries — use chronological cutoff dates where each training
      samples have timestamps strictly less than each test samples, and validate no temporal overlap exists in feature data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without train/test time split integrity, the model may be trained on future data, producing artificially
      inflated performance metrics that do not generalize to production
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-304
    when: When implementing model evaluation and backtesting workflows
    action: Assume the framework provides built-in train/test time split integrity checks — temporal leakage prevention must
      be implemented explicitly in the data pipeline with boundary validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit train/test time split integrity enforcement, the evaluation pipeline may include future
      information in training data, causing models to appear more accurate than they actually are in production
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-305
    when: When implementing model training with time-series features
    action: Implement temporal boundary enforcement in data splitting — verify training data end_date < test data start_date,
      validate feature computation timestamps do not extend into the test period, and log split boundaries for audit
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without train/test time split integrity, backtest results will show inflated performance that cannot be replicated
      in live trading, leading to incorrect business decisions and financial losses
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-306
    when: When implementing volatility modeling for option pricing or risk calculation
    action: Assume the framework provides built-in volatility model and distribution selection — the framework does not implement
      volatility modeling or distribution fitting; explicit model selection and validation must be implemented
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without volatility model selection, the system may use default assumptions that do not match the underlying
      distribution, causing systematic mispricing of options or incorrect risk calculations
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-307
    when: When implementing factor-based models with IC (Information Coefficient) calculations
    action: Assume the framework provides built-in factor IC demeaning and group alignment — the framework does not implement
      IC calculation or factor alignment; explicit demeaning and grouping must be implemented
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without factor IC demeaning, cross-sectional factor IC calculations may be biased by market-wide movements,
      leading to incorrect factor efficacy assessment and suboptimal model weights
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-308
    when: When implementing factor IC calculations for model factor selection
    action: Implement explicit factor IC demeaning and group alignment — subtract cross-sectional mean from factor values
      before IC calculation, align factor groups (e.g., size, value, momentum) to verify independent evaluation, and validate
      IC significance against benchmarks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without factor IC demeaning and group alignment, factor IC calculations are contaminated by market-wide effects,
      causing incorrect factor selection that degrades model performance
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-309
    when: When implementing position or inventory tracking logic
    action: Assume the framework handles cost basis calculations — the framework does not implement FIFO, LIFO, or ACB algorithms
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit cost basis implementation, the framework may use inconsistent or incorrect cost basis methods,
      leading to misstated inventory values and potential audit failures
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-310
    when: When calculating cost basis for inventory or portfolio positions
    action: Specify and implement a cost basis algorithm (FIFO, LIFO, or ACB); use context-specific fields (trade_date, quantity,
      cost) to calculate cost basis consistently across the application
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent cost basis methods cause misaligned inventory valuation, incorrect P&L reporting, and potential
      non-compliance with accounting standards
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-311
    when: When calculating or reporting GHG emissions for loan applications
    action: Assume the framework defines GHG emission scope boundaries (Scope 1, 2, 3) — the framework does not implement
      emission scope categorization
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without scope boundaries, emissions data is miscategorized, leading to non-compliant reports that fail regulatory
      audits and misrepresent financed emissions
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-312
    when: When processing loan applications involving emissions-related data
    action: Define and validate GHG scope boundaries using explicit scope fields (scope_1, scope_2, scope_3); verify emission
      values are tagged with correct scope classification before calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Untagged emissions data causes scope misclassification, invalidating GHG reports and creating regulatory
      non-compliance for PCAF-aligned lending
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-313
    when: When applying emission factors to calculate GHG impact
    action: Assume emission factors are versioned or sourced correctly — the framework does not track emission factor version,
      source, or validity date
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Unversioned emission factors cause inconsistent calculations over time, leading to non-reproducible results
      and audit failures when factor sources cannot be verified
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-314
    when: When configuring emission calculations for regulatory or audit purposes
    action: Document emission factor version, source (e.g., DEFRA, EPA, GHG Protocol), and validity date; store factors with
      explicit metadata fields (factor_version, factor_source, effective_date)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing factor provenance causes audit failures, as regulators require traceable emission factor sources
      and version documentation for verification
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-315
    when: When generating PCAF-compliant financed emissions reports
    action: Assume the framework computes or stores PCAF data quality scores — the framework does not implement PCAF scoring
      methodology
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without PCAF scoring, financed emissions reports cannot meet PCAF methodology requirements, causing regulatory
      rejection and reputational damage for the lending institution
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-316
    when: When preparing PCAF-aligned financed emissions calculations
    action: Implement PCAF data quality scoring using PCAF methodology (1-5 scale); calculate and store quality scores in
      explicit fields (pcaf_score, data_source_type, data_quality_grade) for audit traceability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reports without PCAF data quality scores fail PCAF alignment requirements, making the institution ineligible
      for certain green financing instruments and sustainability-linked loans
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-317
    when: When implementing any matrix operations in loan application risk calculations
    action: Assume the framework handles matrix ill-conditioning and stability checks — matrices used in credit risk calculations
      are not validated for numerical stability by the framework
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Ill-conditioned matrices in covariance or credit risk calculations produce numerically unstable inversions,
      causing silent corruption of probability outputs and materially incorrect risk assessments
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-318
    when: When performing matrix inversion, Cholesky decomposition, or eigenvalue computation in loan application calculations
    action: Validate matrix condition number before computation; if condition_number >= 1000, apply Tikhonov regularization,
      use SVD-based pseudo-inverse, or reject the calculation with an error — do not proceed with ill-conditioned matrices
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Computing with ill-conditioned matrices propagates numerical errors exponentially, leading to unreliable
      credit risk scores and incorrect loan approval decisions
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-319
    when: When implementing Markov chain or state transition logic in credit scoring
    action: Assume transition matrices remain time-homogeneous — the framework does not validate temporal stability of transition
      matrices and treats each periods as having identical transition probabilities
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using time-inhomogeneous transition probabilities as if constant distorts default probability estimates,
      leading to underpriced risk and potential losses on loans approved based on incorrect credit state predictions
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-320
    when: When processing any price or quantity fields in loan disbursement or repayment calculations
    action: Assume the framework handles tick size or lot precision rounding — the framework does not implement price/quantity
      precision validation; raw decimal values are used directly without rounding to valid increments
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Disbursement amounts not rounded to valid precision units will cause settlement mismatches with payment processors
      and GL reconciliation failures
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-321
    when: When formatting disbursement amounts, repayment values, or fee calculations for loan transactions
    action: Round each price and quantity values to the configured tick_size and lot_size before submission — use currency
      precision (2 decimals for INR) for amounts; validate precision does not alter value by more than 0.1%
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unrounded currency values cause payment processor rejections, failed bank transfers, and GL posting mismatches
      that require manual reconciliation
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-322
    when: When implementing loan application workflow and loan creation logic
    action: Maintain separate draft loan creation from active loan disbursement — LoanApplication.create_loan() must create
      loans in draft/pending status without GL entries; active loan with financial postings must only be created upon explicit
      disbursement_loan() call
    severity: high
    kind: domain_rule
    modality: must
    consequence: Merging draft and active loan creation creates premature GL entries before credit approval finalization,
      violating separation of concerns and causing audit trail gaps in financial records
    derived_from_bd_id: BD-001
  - id: finance-C-323
    when: When implementing interest calculation logic for loan accrual
    action: Use per-day interest calculation with configurable day count convention (Actual/365, 30/360, Actual/360, 30E/360)
      — must NOT use monthly approximation or annual-rate-divided-by-12 methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Monthly approximation violates RBI daily accrual verification requirements and introduces compounding errors
      that accumulate over loan tenor, causing regulatory audit failures
    derived_from_bd_id: BD-008
  - id: finance-C-324
    when: When configuring interest calculation parameters for a new loan product
    action: Verify that day_count_convention parameter matches the regulatory requirement for the loan type — for India lending,
      Actual/365 is commonly required; document the selected convention in loan product configuration for audit purposes
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect day count convention causes systematic interest miscalculation that compounds over loan tenure,
      leading to regulatory reporting errors and potential penalties
    derived_from_bd_id: BD-008
  - id: finance-C-325
    when: When implementing security price tracking and loan limit calculations in lending applications
    action: Maintain security price updates separately from loan-security assignments; store historical assignments with their
      original values for audit integrity while using the latest available price for current limit calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without separate price tracking, historical loan positions would display current prices instead of values
      at the time of loan origination, breaking audit trails and regulatory reporting requirements
    derived_from_bd_id: BD-025
  - id: finance-C-326
    when: When processing loan repayments with multiple LoanPartners in co-lending arrangements
    action: Calculate each LoanPartner's proportional share during repayment allocation and store it in the repayment record;
      do not defer share calculation to post-reconciliation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without stored partner shares, partial payments cannot be allocated proportionally across syndication arrangements,
      causing P&L misattribution and GL posting errors that accumulate in multi-lender loans
    derived_from_bd_id: BD-015
  - id: finance-C-327
    when: When setting up loans with multiple lenders using the LoanPartner mechanism
    action: Configure each LoanPartner's payment and interest share at loan level and validate combined shares equal 100%
      before finalizing; shares must be validated before any disbursement
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without share validation, co-lender arrangements may have total shares not equal to 100%, causing payment
      shortfalls or over-payments that create accounting reconciliation failures in syndication
    derived_from_bd_id: BD-002
  - id: finance-C-328
    when: When implementing disbursement submission logic for term loans
    action: Create and submit LoanRepaymentSchedule atomically with disbursement submission — verify schedule exists and is
      in submitted state before any demand generation logic can execute
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without atomic schedule creation, demands could be generated without corresponding schedule rows, causing
      data inconsistency where the system references non-existent repayment entries
    derived_from_bd_id: BD-003
  - id: finance-C-329
    when: When implementing loan disbursement and EMI schedule creation logic
    action: Calculate Broken Period Interest (BPI) covering the gap between disbursement and first repayment before creating
      the EMI schedule — verify BPI is included in first EMI or amortized according to configured method
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calculating BPI after schedule creation causes retroactive income recognition, violating accounting standards
      and creating regulatory compliance issues with incorrect loan valuation
    derived_from_bd_id: BD-004
  - id: finance-C-330
    when: When implementing loan interest accrual logic for NPA accounts
    action: Process penal interest as a separate calculation after normal accrual completes — use different rates, apply only
      after DPD threshold is exceeded, and route to separate GL accounts for NPA compliance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Combining penal and normal interest calculation violates RBI NPA income recognition norms and causes incorrect
      NPA staging classification for accounts past due threshold
    derived_from_bd_id: BD-009
  - id: finance-C-331
    when: When implementing payment allocation logic for loan repayments
    action: Allocate payments in IRAC sequence order (Fees -> Penal Interest -> Interest -> Principal) — for NPA accounts,
      amounts must be applied to recover interest income before principal as per India RBI regulatory requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using pro-rata or alternative allocation sequences violates India RBI IRAC recovery waterfall requirements,
      causing regulatory non-compliance and incorrect NPA account recovery sequencing
    derived_from_bd_id: BD-013
  - id: finance-C-332
    when: When implementing or refactoring accrual and repayment date handling logic
    action: Use posting_date as value_date for accrual entries (same-day recognition), but allow value_date to differ from
      posting_date for actual payment entries to support bank reconciliation flexibility and regulatory reporting requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Confusing posting_date with value_date in accruals or payments causes incorrect regulatory reporting dates,
      leading to compliance violations and audit findings
    derived_from_bd_id: BD-014
  - id: finance-C-333
    when: When implementing repayment schedule validation for term loans
    action: Enforce repayment_periods field as required only when repayment_method equals 'Repay Over Number of Periods';
      other repayment methods have different validation requirements and must not be blocked by this rule
    severity: high
    kind: domain_rule
    modality: must
    consequence: Enforcing repayment_periods universally or missing this validation for the specific method causes invalid
      loan schedules to be created, resulting in incorrect payment calculations and potential financial loss
    derived_from_bd_id: BD-028
  - id: finance-C-334
    when: When implementing or modifying loan restructure logic that changes loan tenure
    action: Recalculate BPI (Broken Period Interest) when restructure modifies loan tenure or disbursement timing; do not
      preserve the original BPI value across tenure changes
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Preserving static BPI across tenure changes causes incorrect income recognition in the restructured loan,
      leading to revenue accounting errors that accumulate until the next audit
    derived_from_bd_id: BD-017
  - id: finance-C-335
    when: When processing loan applications in production
    action: Assume the framework implements stale data detection and expiry policy — the framework lacks automatic stale record
      identification and lifecycle expiration handling for loan applications
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without stale data detection, abandoned loan applications remain active indefinitely, causing data bloat,
      incorrect reporting, and potential security vulnerabilities from orphaned records
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-336
    when: When managing loan application records in production
    action: Implement stale data detection by adding last_activity_timestamp field to loan_application, setting application_expiry_days
      based on loan_type configuration, and creating a scheduled job to mark records as 'Expired' when current_date > last_activity_date
      + application_expiry_days
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without expiry policy implementation, stale loan applications accumulate in the database causing reporting
      inaccuracies and operational confusion about application status
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-337
    when: When implementing loan model deployment or data migration processes
    action: Assume the framework maintains model and data version snapshot binding — the framework does not implement version
      tracking between deployed models and their training/inference data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without version snapshot binding, model inference may use mismatched data versions, causing incorrect loan
      decisions and regulatory compliance violations when audited
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-338
    when: When deploying loan models to production
    action: Implement model-data version binding by recording both model version hash and data version timestamp in the loan_decision
      record before approval
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit version binding in the decision record, auditors cannot trace which model version processed
      which data snapshot, making compliance audits and error investigations impossible
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-339
    when: When implementing portfolio rebalancing logic
    action: Assume the framework provides an automatic rebalancing trigger mechanism — the framework does not implement rebalancing
      triggers; rebalancing must be initiated externally or custom-coded
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without rebalancing triggers, loan portfolios may drift from target allocation, causing regulatory capital
      requirement violations and unexpected risk exposure
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-340
    when: When implementing loan portfolio rebalancing automation
    action: Implement external rebalancing trigger based on schedule (cron job) or threshold (drift percentage), and verify
      the trigger records rebalance_reason and target_allocation in the portfolio_rebalance_log
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without a documented rebalancing trigger, portfolio drift may go unnoticed until regulatory examination,
      causing compliance violations and capital misallocation
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-343
    when: When implementing loan status transition logic for demand or Line of Credit loans
    action: Set loan status to 'Active' when excess payment is received on demand/LoC loans; verify this status transition
      is completed before processing subsequent drawdown requests
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping the Active status transition prevents proper loan lifecycle management; subsequent drawdowns may
      be incorrectly processed without resetting the loan to active state
    derived_from_bd_id: BD-062
  - id: finance-C-346
    when: When validating loan repayment terms during loan booking for flat interest rate loans
    action: Allow 'Repay Fixed Amount per Period' as the repayment method for loans with flat interest rate type — flat interest
      calculation requires original principal basis which is incompatible with reducing balance fixed amount allocation
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using fixed amount repayment with flat interest causes incorrect interest amortization; interest gets calculated
      on original principal but repayment allocation uses reducing balance assumption, leading to over-collection or under-collection
    derived_from_bd_id: BD-029
  - id: finance-C-347
    when: When implementing repayment schedule generation for flat interest rate loans
    action: Allow repayment frequencies other than Monthly or Yearly for flat interest rate loan products — flat interest
      calculations are designed for monthly/yearly payment cycles only
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Flat interest loans calculate total interest as principal × rate × tenor; allowing weekly or bi-weekly frequencies
      breaks this methodology, producing incorrect interest amounts and corrupted repayment schedules
    derived_from_bd_id: BD-030
  - id: finance-C-348
    when: When implementing loan creation and disbursement processing
    action: Enforce loan amount against maximum limit defined in loan product configuration before proceeding to disbursement
      — reject or adjust any loan exceeding the product-level limit
    severity: high
    kind: domain_rule
    modality: must
    consequence: Disbursing loans beyond configured product limits causes uncontrolled credit exposure; the system may disburse
      amounts that violate institutional risk policies and regulatory lending caps
    derived_from_bd_id: BD-031
  - id: finance-C-349
    when: When validating loan repayment schedule generation
    action: Verify that broken_period_interest_recovery_method is configured in loan product — if not configured or not found,
      explicitly set a recovery method (upfront/differential) rather than assuming default behavior
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without explicit recovery method configuration, partial period interest calculations may vary inconsistently
      across loans, causing silent interest miscalculation that accumulates over the loan tenor
    derived_from_bd_id: BD-064
  - id: finance-C-350
    when: When implementing or refactoring loan interest accrual validation logic
    action: Validate that new accrual entries do not have date ranges overlapping with existing accruals for the same loan
      — reject overlapping accruals via validate_overlapping_accruals before submission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Overlapping accruals cause double-counting of interest income within the same accounting period, resulting
      in incorrect interest calculations and potential regulatory compliance issues with financial reporting
    derived_from_bd_id: BD-044
  - id: finance-C-351
    when: When implementing or refactoring bulk loan demand processing logic
    action: Enforce a maximum batch size of 5000 loans per processing cycle — when total loans exceed this limit, split into
      multiple sequential batches rather than increasing batch size
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Increasing batch size beyond 5000 causes memory exhaustion or timeout failures in production environments
      with large loan datasets, preventing bulk operations from completing and delaying critical loan demand generation
    derived_from_bd_id: BD-045
  - id: finance-C-352
    when: When implementing or refactoring interest demand generation logic for demand loans
    action: For demand loan types, calculate interest demand from accumulated accruals since the last demand date — do not
      use fixed schedule-based demand generation even if it appears more efficient
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching demand loans to schedule-based demand generation fundamentally changes their interest calculation
      behavior, making backtested results non-reproducible and causing incorrect interest collection in live operations
    derived_from_bd_id: BD-046
  - id: finance-C-353
    when: When implementing or refactoring repayment schedule status update logic
    action: 'Enforce valid state transitions only: Initiated -> Active -> Closed/Outdated — reject any invalid transition
      attempts (e.g., Closed to Active, Active to Initiated) via update_repayment_schedule_status validation'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allowing invalid repayment schedule status transitions corrupts the loan lifecycle state machine, potentially
      reactivating closed loans or prematurely closing active ones, causing incorrect loan accounting and compliance violations
    derived_from_bd_id: BD-047
  - id: finance-C-354
    when: When implementing or refactoring advance payment validation logic
    action: Validate advance payment amounts are >= 1x monthly EMI and <= 2x monthly EMI — reject payments outside this range
      via validate_advance_payment before processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accepting advance payments outside the 1x-2x EMI range allows prepayment abuse and exposes the lending system
      to liquidity mismatches, as payments below minimum reduce expected interest income and payments above maximum may indicate
      fraudulent activity
    derived_from_bd_id: BD-049
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
