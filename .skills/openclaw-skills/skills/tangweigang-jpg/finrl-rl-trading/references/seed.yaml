resources:
  packages:
  - name: numpy>=1.17.3
    version_pin: latest
  - name: pandas>=1.1.5
    version_pin: latest
  - name: torch
    version_pin: latest
  - name: stable-baselines3[extra]>=2.0.0a5
    version_pin: latest
  - name: elegantrl
    version_pin: latest
  - name: ray[default,tune]>=2.0
    version_pin: latest
  - name: gymnasium
    version_pin: latest
  - name: pandas_market_calendars
    version_pin: latest
  - name: stockstats>=0.4.0
    version_pin: latest
  - name: pyfolio-reloaded>=0.9
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy>=1.17.3
    - python3 -m pip install pandas>=1.1.5
    - python3 -m pip install torch
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing data download for market data acquisition
    action: 'Normalize column names to FinRL standard: date/timestamp, tic, open, high, low, close, volume'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream stages (feature engineering, environment simulation) expect specific column names and will fail
      or produce incorrect results if columns are named differently across data sources
    stage_ids:
    - data_download
  - id: finance-C-002
    when: When implementing data download for US equity markets
    action: Handle timezone as America/New_York (NYSE timezone) for each timestamp operations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Timestamp misalignment with NYSE trading hours causes incorrect alignment of price data with trading sessions,
      corrupting backtest results
    stage_ids:
    - data_download
  - id: finance-C-004
    when: When downloading 1-minute interval data via yfinance API
    action: Download data day-by-day in a loop due to yfinance 7-day calendar limit for intraday data
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Requesting more than 7 calendar days of 1-minute data returns incomplete data or empty DataFrames, causing
      gaps in the training dataset
    stage_ids:
    - data_download
  - id: finance-C-010
    when: When using DataProcessor factory pattern
    action: 'Use only supported data sources: alpaca, wrds, yahoofinance'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Attempting to use an unsupported data source triggers ValueError at runtime, requiring code modification
      and breaking the pluggable data source architecture
    stage_ids:
    - data_download
  - id: finance-C-012
    when: When converting time intervals for Yahoo Finance API
    action: Convert FinRL interval formats (1Min, 1D, 1W) to yfinance-compatible formats before API call
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Passing FinRL-native interval formats directly to yfinance causes ValueError('wrong time_interval') and data
      retrieval failure
    stage_ids:
    - data_download
  - id: finance-C-017
    when: When implementing data cleaning that handles missing OHLCV values
    action: Forward-fill NaN price values using the previous close price
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing price data without forward-fill causes technical indicators to produce NaN or zero values, corrupting
      the state space and leading to invalid trading decisions
    stage_ids:
    - data_cleaning
  - id: finance-C-018
    when: When forward-filling NaN data with previous close prices
    action: Allow a NaN close price to propagate when the previous close is also NaN
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: A chain of NaN prices propagates through the entire dataset if the first NaN is not properly handled, making
      all subsequent filled values also NaN
    stage_ids:
    - data_cleaning
  - id: finance-C-021
    when: When aligning data to a trading calendar
    action: Use the exchange trading calendar (NYSE) rather than natural calendar days
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using natural calendar days includes weekends and holidays where no trading occurs, creating artificial time
      gaps that distort time-series features and indicator calculations
    stage_ids:
    - data_cleaning
  - id: finance-C-023
    when: When specifying time intervals for data cleaning
    action: Limit supported time intervals to '1d' (daily) or '1m' (minute) only
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Using unsupported time intervals causes ValueError exceptions and terminates the data cleaning pipeline before
      any processing occurs
    stage_ids:
    - data_cleaning
  - id: finance-C-024
    when: When producing cleaned data for downstream processing
    action: Verify every ticker has an identical number of rows (aligned to trading calendar)
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Misaligned ticker rows cause array reshaping failures and index errors when converting DataFrame to numpy
      arrays for the RL environment
    stage_ids:
    - data_cleaning
  - id: finance-C-025
    when: When cleaning data for technical indicator calculation
    action: Verify the cleaned DataFrame has zero NaN values in each price columns before computing indicators
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: NaN values in price data cause technical indicators to produce NaN outputs, corrupting the state space and
      producing zero or NaN reward signals in the RL environment
    stage_ids:
    - data_cleaning
  - id: finance-C-031
    when: When computing technical indicators with stockstats
    action: use Sdf.retype() to convert DataFrame to StockDataFrame per ticker before indicator calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Technical indicators will be incorrectly computed or raise errors if raw DataFrame is passed directly to
      stockstats without proper ticker-wise conversion
    stage_ids:
    - feature_engineering
  - id: finance-C-032
    when: When calculating daily returns
    action: use pct_change(1) to compute single-period returns without including current period data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Daily returns will include current period data, causing look-ahead bias in backtest results and potentially
      misleading live trading signals
    stage_ids:
    - feature_engineering
  - id: finance-C-033
    when: When computing turbulence index
    action: use 252-day rolling historical window for covariance matrix estimation to verify statistically significant risk
      regime detection
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Covariance matrix will be unreliable with insufficient historical data, causing turbulence index to fail
      detecting risk regimes accurately during market stress periods
    stage_ids:
    - feature_engineering
  - id: finance-C-035
    when: When handling missing values after feature engineering
    action: apply forward-fill then backward-fill (ffill().bfill()) to handle NaN values at beginning and end of time series
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: RL agent will receive invalid zero or missing feature values, causing incorrect state representation and
      potentially catastrophic trading decisions
    stage_ids:
    - feature_engineering
  - id: finance-C-036
    when: When turbulence is enabled in feature engineering
    action: verify input data spans at least 252 trading days to compute valid Mahalanobis distance
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Turbulence calculation will fail or produce invalid results when data window is shorter than 252 days, causing
      ValueError exception at runtime
    stage_ids:
    - feature_engineering
  - id: finance-C-046
    when: When converting feature-enriched DataFrame to numpy arrays via df_to_array
    action: Replace NaN values in tech_array with 0 to prevent numerical instability in neural network training
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NaN values in technical indicator arrays cause gradient computation to fail or produce invalid Q-values during
      DRL training, corrupting the learned policy
    stage_ids:
    - data_preprocessing
  - id: finance-C-047
    when: When converting feature-enriched DataFrame to numpy arrays via df_to_array
    action: Replace Inf values in tech_array with 0 to prevent overflow errors in float32 computations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Infinite values in technical indicator arrays cause float32 overflow or division-by-zero errors in reward
      calculations, corrupting state values
    stage_ids:
    - data_preprocessing
  - id: finance-C-049
    when: When constructing arrays in df_to_array method
    action: Verify price_array shape is (timesteps, stock_dim) with timesteps from date rows and stock_dim from unique tickers
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched array shapes cause dimension mismatch errors when environment computes state_dim = 1 + 2 + 3*stock_dim
      + tech_dim, leading to training failures
    stage_ids:
    - data_preprocessing
  - id: finance-C-055
    when: When data_cleaning stage produces data for df_to_array
    action: Validate that no NaN values exist in price columns before array conversion to avoid silent data corruption
    severity: fatal
    kind: domain_rule
    modality: must
