      and producing meaningless backtest results
    stage_ids:
    - data_preprocessing
  - id: finance-C-061
    when: When passing config dictionaries to StockTradingEnv
    action: 'Verify each three required keys exist in config: price_array, tech_array, and turbulence_array'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing array keys cause KeyError exceptions during environment initialization, halting the entire training
      or inference pipeline
    stage_ids:
    - data_preprocessing
  - id: finance-C-064
    when: When implementing environment step function for trading
    action: execute trades when current price equals zero or is negative
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Trading with zero or negative prices produces invalid portfolio states and corrupts asset calculations, causing
      the environment to enter an undefined state with NaN or negative holdings values
    stage_ids:
    - environment_simulation
  - id: finance-C-065
    when: When initializing StockTradingEnv numpy environment
    action: 'set state dimension using formula: 1 + 2 + 3*stock_dim + tech_dim'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect state dimension causes neural network input/output mismatch, leading to training failures or undefined
      behavior in DRL agents
    stage_ids:
    - environment_simulation
  - id: finance-C-068
    when: When validating Gym environment compatibility
    action: define observation_space and action_space attributes matching gym.spaces specification
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing or incorrect space definitions cause DRL libraries (Stable Baselines3, ElegantRL) to reject the environment,
      preventing training initialization
    stage_ids:
    - environment_simulation
  - id: finance-C-070
    when: When implementing environment step function
    action: return 5-tuple (state, reward, terminated, truncated, info) for Gymnasium or 4-tuple for legacy Gym
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched step return signature causes Stable Baselines3 training loops to crash with unpacking errors
    stage_ids:
    - environment_simulation
  - id: finance-C-077
    when: When executing backtest evaluation with trained DRL agent
    action: present backtest returns as guaranteed live trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as expected live returns violates financial regulations and misleads investors
      about actual expected performance, which typically differs by 20-50% due to slippage, liquidity, and market impact
    stage_ids:
    - environment_simulation
  - id: finance-C-078
    when: When using FinRL environment for live trading decisions
    action: claim environment provides real-time market data or executes actual trades
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: FinRL is a backtesting framework using historical data; claiming live trading capability misleads users about
      actual system capabilities and can result in significant financial losses if deployed without proper live trading infrastructure
    stage_ids:
    - environment_simulation
  - id: finance-C-079
    when: When validating environment state space dimension
    action: 'verify state dimension equals calculated formula: 1 + 2 + 3*stock_dim + tech_dim'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: State dimension mismatch causes neural network input layer incompatibility, resulting in training failures
      or silent data corruption during state passing
    stage_ids:
    - environment_simulation
  - id: finance-C-084
    when: When selecting a DRL model for training
    action: specify a model name from the supported set (a2c, ddpg, td3, sac, ppo)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Training will fail with ValueError if an unsupported model name is passed to get_model(), causing pipeline
      interruption and wasted computation time
    stage_ids:
    - model_training
  - id: finance-C-085
    when: When passing hyperparameters to ElegantRL get_model()
    action: include eval_times parameter in model_kwargs to prevent KeyError during training
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ElegantRL training will crash with KeyError for eval_times, documented as a past bug fix requiring explicit
      inclusion in the parameter dict
    stage_ids:
    - model_training
  - id: finance-C-088
    when: When implementing DRL agent classes for FinRL
    action: implement get_model(), train_model(), and DRL_prediction() methods to maintain library-agnostic agent interface
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Application code expecting these three methods will break if any are missing, preventing algorithm swapping
      without code changes
    stage_ids:
    - model_training
  - id: finance-C-089
    when: When selecting a DRL library backend
    action: 'choose from supported libraries: elegantrl, rllib, or stable_baselines3'
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: An unsupported drl_lib parameter will cause ValueError at train.py:100, preventing any model training from
      occurring
    stage_ids:
    - model_training
  - id: finance-C-096
    when: When setting up ElegantRL training configuration
    action: correctly compute state_dim as 1 + 2 + 3*stock_dim + tech_indicators_count and action_dim as stock_dim
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect state/action dimensions cause dimension mismatch errors when the neural network tries to process
      environment observations and actions
    stage_ids:
    - model_training
  - id: finance-C-110
    when: When implementing action processing in trading environment step function
    action: convert actions to integer type before executing trades
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Fractional share orders will cause ValueError or silent truncation, producing incorrect trade quantities
      and corrupted action history
    stage_ids:
    - model_inference
  - id: finance-C-113
    when: When setting trade_mode parameter for model inference
    action: 'use only supported modes: ''backtesting'' or ''paper_trading'''
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Invalid trade_mode triggers ValueError at runtime, preventing inference from completing and losing intermediate
      results
    stage_ids:
    - model_inference
  - id: finance-C-115
    when: When initializing AlpacaPaperTrading for live inference
    action: provide valid API credentials and base URL
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Invalid or expired API credentials cause connection failures, preventing any orders from being submitted
      during paper trading
    stage_ids:
    - model_inference
  - id: finance-C-119
    when: When loading trained model for inference
    action: validate model file exists and is compatible with DRL library
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Failed model loading causes inference to crash, losing any partial results and requiring full restart of
      backtest
    stage_ids:
    - model_inference
  - id: finance-C-120
    when: When presenting backtesting results as model inference output
    action: claim backtest returns equal expected live trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting backtest as live performance misleads stakeholders; real trading incurs slippage, liquidity
      constraints, and market impact not modeled in backtest
    stage_ids:
    - model_inference
  - id: finance-C-121
    when: When executing paper trading mode
    action: claim paper trading results as real capital gains or losses
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Paper trading uses simulated fills without real market impact; presenting paper results as actual trading
      proof is misleading about actual investment outcomes
    stage_ids:
    - model_inference
  - id: finance-C-127
    when: When calculating daily returns for performance evaluation
    action: Use pct_change(1) or equivalent 1-period lag to avoid look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Daily return calculation with incorrect lag creates look-ahead bias, causing Sharpe ratios and returns to
      appear artificially inflated in backtests while failing in live trading
    stage_ids:
    - performance_evaluation
  - id: finance-C-132
    when: When pyfolio generates full tear sheet reports
    action: Present pyfolio backtest outputs as guaranteed future trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results from pyfolio are historical simulations that do not account for slippage, liquidity constraints,
      and market impact, leading to overestimated live performance
    stage_ids:
    - performance_evaluation
  - id: finance-C-133
    when: When generating performance statistics for strategy selection
    action: Claim backtest returns as expected live trading returns without qualification
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest equity curves as expected live returns misleads stakeholders and violates regulatory
      guidance on disclosure of simulated results
    stage_ids:
    - performance_evaluation
  - id: finance-C-144
    when: When adding technical indicators via stockstats
    action: Verify the 'close' column exists in the DataFrame with numeric dtype before calling Sdf.retype(), as stockstats
      requires 'close' for each indicator calculations
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: stockstats.Sdf.retype() raises KeyError when 'close' column is missing, crashing the feature_engineering
      stage
  - id: finance-C-145
    when: When converting DataFrame to numpy arrays for environment simulation
    action: Fill NaN and Inf values in tech_array with 0 before passing to environment, as gym spaces cannot handle NaN/Inf
      in observations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Gymnasium spaces.Box with NaN values causes environment reset/step failures, preventing RL training from
      starting
  - id: finance-C-146
    when: When creating price_array, tech_array, and turbulence_array from DataFrame
    action: Verify arrays are constructed in ticker order matching the environment's stock_dim configuration to maintain state-action
      alignment
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched ticker order causes wrong prices to be assigned to wrong stocks, corrupting portfolio state and
      causing incorrect trading decisions
  - id: finance-C-147
    when: When initializing Gym environment with numpy arrays
    action: Verify price_array, tech_array, and turbulence_array have matching first-dimension lengths (number of timesteps)
      and that tech_array columns match tech_indicator_list length
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Array shape mismatch causes IndexError during environment step when accessing state features, crashing RL
      training loop
  - id: finance-C-153
    when: When loading model for inference from checkpoint
    action: Load the exact same model architecture that was trained, as PyTorch models require matching architecture for state_dict
      loading
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: State dict loading with mismatched architecture raises RuntimeError, preventing model inference from running
  - id: finance-C-162
    when: When validating ensemble models on historical data
    action: Verify validation period does not overlap with training period temporally, as overlapping data causes look-ahead
      bias in model selection
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Temporal data leakage during validation causes inflated Sharpe ratios that do not reflect out-of-sample performance
  - id: finance-C-165
    when: When implementing data preprocessing across each pipeline stages
    action: Verify DataFrame contains 'date' and 'tic' columns as the fundamental schema for each trading environments
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Pipeline stages fail when DataFrame lacks required 'date' and 'tic' columns, causing downstream data joins
      and technical indicator calculations to crash
  - id: finance-C-167
    when: When constructing price arrays for stock trading environments
    action: Verify price array has shape (timesteps, stock_dim) where stock_dim equals number of tickers
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: State dimension calculations and trading logic produce incorrect results when price array dimensions don't
      match expected (timesteps, stock_dim) shape
  - id: finance-C-168
    when: When calculating state dimension for StockTradingEnv_np
    action: Use formula state_dim = 1 + 2 + 3*stock_dim + tech_dim (amount + turbulence + price/stocks/cd + technical indicators)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Neural network input layer size mismatches environment state dimension, causing training to fail or produce
      NaN losses
  - id: finance-C-176
    when: When splitting data for train/test/trade phases
    action: Sort data by date and ticker before temporal splitting to prevent look-ahead bias from data leakage
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Agent gains unfair advantage by accessing future price information, producing inflated backtest results that
      don't generalize to live trading
  - id: finance-C-179
    when: When marketing or documenting FinRL's trading capabilities
    action: Claim support for live trading execution with real money — the system only supports paper trading via Alpaca
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy real capital expecting automated execution that doesn't exist, resulting in financial losses
      or legal liability for misrepresenting system capabilities
  - id: finance-C-213
    when: When implementing buy/sell order execution logic in stock trading environments
    action: Validate that price > 0 before executing any trade; explicitly check for NaN, None, zero, and negative values
      and reject orders with invalid prices
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Executing trades on invalid prices (zero, negative, NaN) causes incorrect position sizing and capital allocation,
      leading to financial losses and corrupted portfolio state that cannot be recovered
    derived_from_bd_id: BD-107
  - id: finance-C-214
    when: When implementing TRF commission fee calculations in portfolio optimization environments
    action: Implement convergence checking for the mu calculation fixed-point iteration loop; verify mu has converged within
      acceptable tolerance before using the value in commission calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using unconverged mu values in commission calculations introduces numerical instability that compounds over
      trading days, causing progressively larger fee calculation errors and portfolio value distortion
    derived_from_bd_id: BD-109
  - id: finance-C-224
    when: When implementing order execution logic in StockTradingEnv.step()
    action: Execute sell orders first before buy orders using argsort with sell_index < buy_index ordering — the argsort approach
      depends on this specific ordering to flatten short positions before opening new long positions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Changing execution order to buy-before-sell creates unintended leverage when capital is insufficient, potentially
      triggering margin cascade scenarios where new buy orders execute on borrowed capital before shorts are closed
    derived_from_bd_id: BD-100
  - id: finance-C-225
    when: When implementing turbulence threshold for live trading inference
    action: Use the same turbulence threshold quantile (90th percentile) during live trading that was used during training
      — do not use 99th percentile or any other threshold value without retraining the agent
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Training uses 90th percentile threshold (more cautious) while trading uses 99th percentile (less cautious),
      causing the agent to fail to activate risk-off behavior during actual turbulent market conditions learned in training,
      leading to large drawdowns during regime shifts
    derived_from_bd_id: BD-103
  - id: finance-C-248
    when: When implementing position management and risk control logic in backtesting
    action: Modify the stop-loss threshold from 90% of purchase price or change the profit/loss ratio from 2 — these values
      define the fundamental risk-reward profile of the trading strategy
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Changing stop-loss to a tighter level like 85% increases liquidation frequency and transaction costs; changing
      PnL ratio to 1 reduces expected return per unit risk, fundamentally altering the strategy's risk-adjusted performance
      characteristics
    derived_from_bd_id: BD-088
  - id: finance-C-253
    when: When implementing turbulence-based risk management in production trading
    action: Use a fixed turbulence threshold (e.g., 70) in production that differs from the training distribution — training
      uses 90th quantile while trading uses fixed threshold, creating systematic under-protection during market stress
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Training classifies more states as turbulent (90th percentile) than live trading (fixed 70), causing the
      agent to learn conservative risk-off behavior that underactivates in production; during volatile periods, the agent
      expects turbulence-based exits to trigger earlier than they will, potentially allowing excessive drawdowns before risk
      controls engage
    derived_from_bd_id: BD-115
  - id: finance-C-254
    when: When computing TRF commission fees using fixed-point iteration for mu values
    action: Implement explicit convergence checking for fixed-point iteration before using mu values in commission calculations
      — verify iteration has converged or fall back to conservative estimates
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without convergence checking, non-converged mu values produce incorrect commission estimates that accumulate
      across trades; for high-turnover strategies or volatile positions, unconverged iterations systematically underestimate
      costs by 5-20%, inflating apparent strategy profitability and creating regulatory compliance risk
    derived_from_bd_id: BD-118
  regular:
  - id: finance-C-003
    when: When implementing data cleaning logic for YahooFinance processor
    action: Raise ValueError when encountering consecutive NaN values with no valid prior close for interpolation
    severity: high
    kind: domain_rule
    modality: must
    consequence: If the first close price is NaN and all subsequent prices are also NaN, the NaN-forward-fill strategy produces
      invalid data that corrupts downstream calculations
    stage_ids:
    - data_download
  - id: finance-C-005
    when: When using Yahoo Finance as the data source
    action: Accept that Yahoo Finance data has a minimum 15-minute delay from real-time market data
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using Yahoo Finance for live trading claims creates misleading expectations of real-time data, but actual
      data is delayed, causing suboptimal execution timing
    stage_ids:
    - data_download
  - id: finance-C-006
    when: When using WRDS as the data source
    action: Verify WRDS database connection is established and date format matches '%Y-%m-%d' SQL format
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing WRDS credentials or incorrect date formatting causes 'Empty Data under input parameters' error, halting
      the entire data pipeline
    stage_ids:
    - data_download
  - id: finance-C-007
    when: When using Alpaca as the data source
    action: Provide valid API_KEY, API_SECRET, and API_BASE_URL for Alpaca data access
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid or missing Alpaca credentials cause ValueError('Wrong Account Info!'), preventing any market data
      retrieval from Alpaca
    stage_ids:
    - data_download
  - id: finance-C-008
    when: When filtering intraday data for US stocks
    action: Filter out times outside NYSE trading hours (09:30 to 15:59) for intervals less than 1 day
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Including pre-market or after-hours data in training without proper handling causes model to learn price
      patterns from non-liquid periods, degrading live trading performance
    stage_ids:
    - data_download
  - id: finance-C-009
    when: When handling empty DataFrames during data download
    action: Return non-empty DataFrame or raise ValueError for valid ticker/date combinations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Returning an empty DataFrame for a valid ticker and date range silently corrupts downstream training, producing
      models trained on incomplete data without any error signal
    stage_ids:
    - data_download
  - id: finance-C-011
    when: When downloading Yahoo Finance data for price alignment with Alpaca format
    action: Drop 'Adj Close' column after column name normalization to match Alpaca output format
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Keeping Adj Close column alongside close causes confusion in downstream calculations and breaks feature engineering
      that expects consistent column sets across data sources
    stage_ids:
    - data_download
  - id: finance-C-013
    when: When claiming real-time data capability
    action: Claim real-time trading data capability when using Yahoo Finance as data source
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting Yahoo Finance delayed data as real-time misleads users into believing they have live market access,
      causing poor execution decisions during fast-moving market conditions
    stage_ids:
    - data_download
  - id: finance-C-014
    when: When presenting downloaded data as equivalent to live trading execution
    action: Present historical backtest data as proof of live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Showing backtest returns from downloaded historical data as expected live trading results ignores market
      impact, slippage, and liquidity constraints, misleading users about actual strategy profitability
    stage_ids:
    - data_download
  - id: finance-C-015
    when: When encountering multiple failed downloads during batch processing
    action: Silently skip failed ticker downloads without raising any warning or error
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Silently failing to download data for some tickers produces incomplete training datasets where the agent
      never learns to trade certain assets, causing portfolio imbalance in live trading
    stage_ids:
    - data_download
  - id: finance-C-016
    when: When downloading data for a large number of tickers
    action: Assume unlimited API rate limits from data providers without implementing retry logic
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Hitting API rate limits causes data download failures mid-pipeline, resulting in incomplete datasets and
      requiring manual restart of the entire download process
    stage_ids:
    - data_download
  - id: finance-C-019
    when: When filling missing price data
    action: Set volume to 0.0 for each filled NaN price rows
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting filled price rows with non-zero volume creates artificial trading volume signals, causing the agent
      to make decisions based on fabricated market activity
    stage_ids:
    - data_cleaning
  - id: finance-C-020
    when: When processing tickers with all-NaN prices (delisted or never traded)
    action: Drop the ticker from the dataset entirely rather than filling with zeros
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including delisted tickers with zero prices corrupts portfolio calculations and causes division-by-zero errors
      in normalization layers
    stage_ids:
    - data_cleaning
  - id: finance-C-022
    when: When cleaning Yahoo Finance data
    action: Present Yahoo Finance data as real-time trading data
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Yahoo Finance data may be delayed by 15 minutes or more depending on the exchange, presenting it as real-time
      leads to trades based on stale prices and guaranteed slippage
    stage_ids:
    - data_cleaning
  - id: finance-C-026
    when: When filtering tickers from the dataset
    action: Preserve the filtered ticker list so output ticker count equals input minus removed delisted tickers
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect ticker filtering causes portfolio allocation to include or exclude tickers not matching the cleaned
      dataset, leading to position sizing errors and unauthorized holdings
    stage_ids:
    - data_cleaning
  - id: finance-C-027
    when: When implementing the DataProcessor interface for data cleaning
    action: Delegate the clean_data call to the specific processor's clean_data method (YahooFinance, Alpaca, etc.)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing the processor delegation breaks the abstraction layer, causing unsupported data sources to be processed
      with incorrect logic
    stage_ids:
    - data_cleaning
  - id: finance-C-028
    when: When timezone-aligning timestamps from Yahoo Finance
    action: Convert each timestamps to America/New_York timezone before timestamp matching
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Timezone-naive or incorrectly timezone-converted timestamps cause silent misalignment between expected trading
      hours and actual data points, producing empty DataFrames after merge
    stage_ids:
    - data_cleaning
  - id: finance-C-029
    when: When producing cleaned data output
    action: Claim that backtest results equal expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest returns as expected live returns ignores transaction costs, slippage, execution delays,
      and liquidity constraints that only manifest in live trading
    stage_ids:
    - data_cleaning
  - id: finance-C-030
    when: When validating data cleaning output against acceptance criteria
    action: Skip validation of output DataFrame row count uniformity across tickers
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping row uniformity validation allows misaligned data to proceed to feature engineering, causing silent
      shape mismatches in numpy array conversion
    stage_ids:
    - data_cleaning
  - id: finance-C-034
    when: When cleaning data before feature computation
    action: filter DataFrame to only include tickers present on each dates using pivot table dropna(axis=1)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Technical indicator calculations will produce NaN values or incorrect results for stocks with missing data,
      breaking downstream RL state representation
    stage_ids:
    - feature_engineering
  - id: finance-C-037
    when: When downloading VIX data from Yahoo Finance
    action: claim VIX data is real-time or use it as real-time market fear/greed indicator
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: VIX data from Yahoo Finance has 15-30 minute delay, claiming real-time availability will mislead users about
      market sentiment accuracy
    stage_ids:
    - feature_engineering
  - id: finance-C-038
    when: When enabling turbulence feature
    action: provide data with at least 252 trading days of continuous price history for each tickers
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Turbulence index will be set to 0 for first 252 days and cannot detect risk regimes accurately, breaking
      risk-aware trading strategies
    stage_ids:
    - feature_engineering
  - id: finance-C-039
    when: When processing technical indicators for multiple tickers
    action: iterate over each unique ticker and compute indicators separately before merging back to main DataFrame
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Technical indicators will be incorrectly calculated across tickers instead of within each ticker's time series,
      producing meaningless feature values
    stage_ids:
    - feature_engineering
  - id: finance-C-040
    when: When executing feature engineering pipeline
    action: 'follow strict execution order: clean_data → add_technical_indicator → add_vix → add_turbulence → add_user_defined_feature'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping or reordering pipeline steps will cause incorrect data alignment, missing features, or computation
      failures
    stage_ids:
    - feature_engineering
  - id: finance-C-041
    when: When merging VIX or turbulence data with stock prices
    action: merge on 'date' column to align external indicators with stock price data at daily granularity
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: VIX or turbulence values will be misaligned with stock prices, causing incorrect market context in RL state
      representation
    stage_ids:
    - feature_engineering
  - id: finance-C-042
    when: When calculating Mahalanobis distance for turbulence
    action: use np.linalg.pinv() (pseudo-inverse) instead of np.linalg.inv() for singular covariance matrix inversion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Covariance matrix may be singular during low-volatility periods, causing LinAlgError and turbulence calculation
      failure
    stage_ids:
    - feature_engineering
  - id: finance-C-043
    when: When presenting backtest results from feature-engineered data
    action: claim that simulated backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not account for slippage, liquidity constraints, and market impact that occur in live
      trading, misleading users about expected performance
    stage_ids:
    - feature_engineering
  - id: finance-C-044
    when: When turbulence is negative during calculation
    action: clamp turbulence value to 0 to verify non-negative risk metric
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative turbulence values will confuse risk assessment logic, as turbulence is defined as Mahalanobis distance
      which should always be non-negative
    stage_ids:
    - feature_engineering
  - id: finance-C-045
    when: When turbulence calculation just begins (count <= 2)
    action: set turbulence value to 0 to avoid large outliers from unstable covariance estimates
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Initial turbulence values will be extreme outliers due to insufficient data for reliable covariance estimation,
      corrupting RL training
    stage_ids:
    - feature_engineering
  - id: finance-C-048
    when: When scaling features with GroupByScaler
    action: Scale features independently per ticker to prevent high-price stocks from dominating the state space
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without per-ticker scaling, stock prices of $500+ dominate the state vector, causing neural network gradients
      to prioritize high-price assets and underweight economically significant low-price stocks
    stage_ids:
    - data_preprocessing
  - id: finance-C-050
    when: When initializing StockTradingEnv with config arrays
    action: Convert each arrays to np.float32 to avoid float64 precision issues with power-of-2 scaling factors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Float64 arrays with power-of-2 scaling (2**-7, 2**-5) cause cumulative rounding errors in state values, degrading
      neural network convergence
    stage_ids:
    - data_preprocessing
  - id: finance-C-051
    when: When selecting a normalization method for features
    action: Use MaxAbsScaler as the default scaler to bound scaled values within [-1, 1] range per feature
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using unscaled or improperly bounded features causes neural network activations to saturate, severely degrading
      training convergence speed and stability
    stage_ids:
    - data_preprocessing
  - id: finance-C-052
    when: When preparing turbulence_array for the environment
    action: Apply sigmoid_sign transformation scaled by 2**-5 to bound turbulence values in a safe numerical range
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Raw turbulence values exceeding the observation space bounds (-3000 to 3000) cause state overflow, producing
      undefined behavior in the RL environment step function
    stage_ids:
    - data_preprocessing
  - id: finance-C-053
    when: When preparing tech_array for the environment
    action: Scale tech_array by 2**-7 to avoid floating-point precision issues with binary fractions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unscaled technical indicators with varying magnitudes cause gradient explosion or vanishing in LSTM/MLP layers,
      preventing effective policy learning
    stage_ids:
    - data_preprocessing
  - id: finance-C-054
    when: When constructing turbulence_bool array
    action: Convert turbulence boolean comparison to np.float32 for consistent state concatenation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Boolean dtype turbulence_bool cannot be concatenated with float32 state components, causing dtype mismatch
      errors in the state array construction
    stage_ids:
    - data_preprocessing
  - id: finance-C-056
    when: When selecting turbulence data source based on if_vix flag
    action: Select VIXY column when if_vix=True and turbulence column when if_vix=False
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect turbulence source causes market regime detection to use wrong risk metric, leading to inappropriate
      trading behavior during high-volatility periods
    stage_ids:
    - data_preprocessing
  - id: finance-C-057
    when: When running environment inference with preprocessed arrays
    action: Handle NaN/Inf values at runtime in state construction to prevent crashes when edge cases occur
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Runtime NaN/Inf in state causes inference to crash mid-trading-session, losing position tracking and requiring
      manual intervention to restart the system
    stage_ids:
    - data_preprocessing
  - id: finance-C-058
    when: When extracting arrays from DataFrame per ticker
    action: Stack arrays horizontally using np.hstack to maintain consistent column ordering across tickers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent column ordering causes feature misalignment between price and technical indicator arrays, producing
      incorrect state vectors with swapped stock features
    stage_ids:
    - data_preprocessing
  - id: finance-C-059
    when: When scaling technical indicators with power-of-2 factors
    action: Skip the 2**-7 scaling factor on tech_array before passing to environment
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Unscaled technical indicators with magnitude > 1000 cause activation saturation in neural networks, preventing
      gradient-based learning from effective feature updates
    stage_ids:
    - data_preprocessing
  - id: finance-C-060
    when: When claiming array outputs meet acceptance criteria
    action: Claim that each scaled values strictly fall within [-1, 1] when using MaxAbsScaler without verification
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: MaxAbsScaler normalizes per-feature to [-1, 1] during fit, but the environment applies additional 2**-7 and
      2**-5 scaling, producing values outside [-1, 1] in the final state
    stage_ids:
    - data_preprocessing
  - id: finance-C-062
    when: When selecting the scaler implementation
    action: Replace the default scaler parameter with StandardScaler only if range normalization is specifically required
      for the use case
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: StandardScaler produces unbounded values that may exceed the neural network's observation space limits (-3000
      to 3000), causing gradient instability
    stage_ids:
    - data_preprocessing
  - id: finance-C-063
    when: When implementing df_to_array for a new data source
    action: Handle the if_vix parameter to select the correct turbulence column from the DataFrame
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hardcoding turbulence column selection without checking if_vix causes KeyError for data sources without the
      expected column, or uses wrong risk metric
    stage_ids:
    - data_preprocessing
  - id: finance-C-066
    when: When implementing environment reward calculation
    action: apply reward_scaling factor to prevent gradient explosion in neural networks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unscaled rewards cause gradient instability during neural network training, resulting in divergence or convergence
      to suboptimal policies
    stage_ids:
    - environment_simulation
  - id: finance-C-067
    when: When calculating cumulative gamma-weighted rewards at episode termination
    action: apply gamma discounting before returning terminal reward
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing gamma-weighted cumulative reward causes RL agent to prioritize short-term gains over long-term portfolio
      performance, misaligning with investment horizon objectives
    stage_ids:
    - environment_simulation
  - id: finance-C-069
    when: When implementing environment reset function
    action: return (state, info) tuple following Gymnasium API or state only for legacy Gym
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incompatible return signature causes training loop failures when switching between Gym and Gymnasium environments
    stage_ids:
    - environment_simulation
  - id: finance-C-071
    when: When initializing environment with config dict
    action: extract price_array, tech_array, turbulence_array, and if_train from config keys
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing config keys cause KeyError exceptions during environment initialization, preventing backtesting pipeline
      from starting
    stage_ids:
    - environment_simulation
  - id: finance-C-072
    when: When configuring turbulence-based risk management
    action: trigger forced liquidation of each positions when turbulence exceeds turbulence_thresh threshold
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without forced liquidation during high market stress, portfolio can suffer catastrophic losses exceeding
      50% during market crashes or liquidity crises
    stage_ids:
    - environment_simulation
  - id: finance-C-073
    when: When defining continuous action space for stock trading environments
    action: bound action space to [-1, 1] range for normalized continuous actions across each stock dimensions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unbounded action space causes neural network output scaling issues, leading to undefined trade quantities
      and numerical instability
    stage_ids:
    - environment_simulation
  - id: finance-C-074
    when: When creating Gym environment for FinRL
    action: support backward compatibility via new_gym_api flag for Gymnasium migration
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without backward compatibility flag, existing code using legacy Gym API breaks when upgrading to Gymnasium,
      preventing researchers from using updated dependencies
    stage_ids:
    - environment_simulation
  - id: finance-C-075
    when: When configuring environment for training mode
    action: randomize initial stocks and cash within ±5% during training to increase policy robustness
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Deterministic initial states during training cause policy overfitting to specific starting conditions, reducing
      generalization to unseen market conditions
    stage_ids:
    - environment_simulation
  - id: finance-C-076
    when: When preparing input arrays for environment initialization
    action: convert price and technical indicator arrays to numpy float32 dtype for efficient computation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using float64 or untyped arrays causes 2x memory overhead and slower computation in step function, increasing
      training time significantly
    stage_ids:
    - environment_simulation
  - id: finance-C-080
    when: When implementing gamma-weighted cumulative reward at episode termination
    action: replace step reward with cumulative gamma-weighted reward at done=True
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing terminal reward substitution causes agent to undervalue episode-ending actions, leading to premature
      selling or failure to hold profitable positions through full investment horizon
    stage_ids:
    - environment_simulation
  - id: finance-C-081
    when: When checking environment compatibility with Stable Baselines3
    action: verify environment passes gym.check() compatibility validation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Environment failing gym.check() causes Stable Baselines3 to raise assertion errors during VecEnv wrapping,
      preventing training initialization
    stage_ids:
    - environment_simulation
  - id: finance-C-082
    when: When configuring commission fee model for portfolio optimization
    action: validate commission fee percentage is within 0 to 1 range
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Invalid commission fee percentage causes negative portfolio values or overflow errors in TRF/WVM fee calculation
      models
    stage_ids:
    - environment_simulation
  - id: finance-C-083
    when: When implementing portfolio weight normalization in POE environment
    action: apply softmax normalization when portfolio weights do not sum to 1
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-normalized portfolio weights cause incorrect cash allocation calculations, leading to portfolio value
      misrepresentation and training on invalid reward signals
    stage_ids:
    - environment_simulation
  - id: finance-C-086
    when: When configuring action_noise for continuous action algorithms (DDPG, TD3, SAC)
    action: use NormalActionNoise or OrnsteinUhlenbeckActionNoise with correctly sized mean and sigma arrays matching action_space
      shape
    severity: high
    kind: domain_rule
    modality: must
    consequence: Shape mismatch between action_noise configuration and environment action_space will cause training to crash
      with RuntimeError
    stage_ids:
    - model_training
  - id: finance-C-087
    when: When training Stable Baselines 3 models
    action: use CallbackList wrapping TensorboardCallback to verify training metrics are properly logged
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Training will proceed without tensorboard logging, making it impossible to monitor reward trends and diagnose
      training issues
    stage_ids:
    - model_training
  - id: finance-C-090
    when: When saving trained model checkpoints
    action: save ElegantRL models as actor.pth files and Stable Baselines 3 models as .zip files using library-specific save
      methods
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Inconsistent file naming will cause model loading to fail during inference, as DRL_prediction_load_from_file
      expects specific file extensions
    stage_ids:
    - model_training
  - id: finance-C-091
    when: When training for production deployment
    action: claim that backtest results equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest equity curves as live trading proof violates financial regulations and misleads stakeholders
      about actual expected performance
    stage_ids:
    - model_training
  - id: finance-C-092
    when: When using FinRL for trading decisions
    action: claim FinRL provides real-time trading capability or production-ready deployment
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: FinRL is explicitly positioned as an educational and research framework; overclaiming production readiness
      could lead to financial losses from unsupported live trading
    stage_ids:
    - model_training
  - id: finance-C-093
    when: When training DRL models for trading
    action: verify total_timesteps is set to a sufficiently large value (at least 100,000 for meaningful learning) based on
      environment complexity
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Insufficient training timesteps result in underfitted models with poor convergence, yielding sub-optimal
      trading policies that perform worse than baselines
    stage_ids:
    - model_training
  - id: finance-C-094
    when: When configuring reward_scaling for trading environments
    action: use small positive scaling factors (typically 1e-4 to 1e-2) to prevent gradient explosion in deep RL training
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without proper reward scaling, neural network gradients may become unstable, causing training divergence
      or extremely slow convergence
    stage_ids:
    - model_training
  - id: finance-C-095
    when: When using Deterministic action prediction in inference
    action: set deterministic=True when calling model.predict() to obtain reproducible trading decisions from trained models
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Non-deterministic predictions produce varying actions for the same state, making backtesting results inconsistent
      and unreproducible
    stage_ids:
    - model_training
  - id: finance-C-097
    when: When implementing Sharpe ratio calculation for validation
    action: Use 252-day year normalization factor (4**0.5 for quarterly, 252**0.5 for annual)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect Sharpe calculation will lead to wrong model selection, causing suboptimal allocation decisions
      that may result in significant capital losses during live trading
    stage_ids:
    - model_validation
  - id: finance-C-098
    when: When validation daily return variance equals zero
    action: Return infinity when mean is positive, return 0.0 when mean is non-positive
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero will crash the ensemble strategy, causing operational failure during model validation
    stage_ids:
    - model_validation
  - id: finance-C-099
    when: When calculating turbulence threshold for risk control
    action: Use historical turbulence 90th percentile as risk-on/risk-off switch
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper turbulence threshold, the system cannot switch to risk-off mode during volatile markets, leading
      to uncontrolled losses
    stage_ids:
    - model_validation
  - id: finance-C-100
    when: When initializing DRLEnsembleAgent with rolling window
    action: Verify rebalance_window and validation_window are positive integers
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid window values will cause index out of bounds or infinite loops during ensemble iteration
    stage_ids:
    - model_validation
  - id: finance-C-101
    when: When selecting model in ensemble strategy
    action: Iterate over each 5 models (A2C, DDPG, TD3, SAC, PPO) defined in MODELS
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Skipping any model during training and evaluation will cause the ensemble to miss potentially best-performing
      algorithms
    stage_ids:
    - model_validation
  - id: finance-C-102
    when: When running ensemble strategy with rolling window
    action: Start iteration loop at index (rebalance_window + validation_window)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect starting index will cause insufficient training data for the first validation window
    stage_ids:
    - model_validation
  - id: finance-C-103
    when: When feeding initial state between ensemble models
    action: Pass last_state_ensemble from previous iteration to current DRL_prediction call
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without state continuity, the ensemble loses temporal context, causing degraded trading performance in rolling
      window
    stage_ids:
    - model_validation
  - id: finance-C-104
    when: When computing validation window dates
    action: Derive dates from unique_trade_date array to align with trading calendar
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-aligned dates will cause data leakage or gaps in the validation window, compromising model evaluation
      accuracy
    stage_ids:
    - model_validation
  - id: finance-C-105
    when: When selecting best model after validation
    action: Select model with maximum Sharpe ratio using np.argmax
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect model selection will cause the system to use suboptimal algorithms for live trading, resulting
      in underperformance
    stage_ids:
    - model_validation
  - id: finance-C-106
    when: When performing rolling window retraining
    action: Separate training, validation, and trading periods without overlap
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Overlapping periods will cause look-ahead bias, making backtest results unrealistically optimistic compared
      to live trading
    stage_ids:
    - model_validation
  - id: finance-C-107
    when: When presenting ensemble validation results
    action: Claim backtest Sharpe ratio as guaranteed live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as live trading proof will mislead stakeholders and may violate regulatory requirements
      for investment advice disclaimers
    stage_ids:
    - model_validation
  - id: finance-C-108
    when: When using ensemble strategy for live trading
    action: Assume rolling window backtest results directly predict live trading outcomes
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtest performance does not account for execution slippage, market impact, and regime changes, leading
      to overestimation of live returns
    stage_ids:
    - model_validation
  - id: finance-C-109
    when: When implementing DRL prediction loop in model_inference stage
    action: verify account value history length equals test data timesteps plus initial state
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtest equity curve will be misaligned with test data, causing incorrect performance attribution and misleading
      Sharpe ratio calculations
    stage_ids:
    - model_inference
  - id: finance-C-111
    when: When validating trading actions in model inference
    action: enforce sell quantity does not exceed current stock holdings
    severity: high
    kind: domain_rule
    modality: must
    consequence: Overselling leads to negative positions that incur margin calls or failed order rejections in live trading,
      causing realized losses not reflected in backtest
    stage_ids:
    - model_inference
  - id: finance-C-112
    when: When executing paper trading mode via Alpaca API
    action: validate API connection and test latency before initiating live orders
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Network latency or API unavailability causes order submission delays, missed trading windows, and stale price
      fills resulting in execution slippage
    stage_ids:
    - model_inference
  - id: finance-C-114
    when: When running paper trading with Alpaca API
    action: 'use only supported time intervals: 1s, 5s, 1Min, 5Min, 15Min, 1D'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unsupported time interval causes ValueError in AlpacaPaperTrading initialization, halting paper trading execution
    stage_ids:
    - model_inference
  - id: finance-C-116
    when: When running ensemble strategy across multiple rebalancing windows
    action: persist final portfolio state between windows as initial state for next iteration
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Resetting portfolio state between windows causes discontinuous equity curve, incorrect cumulative returns,
      and broken PnL tracking across rebalancing periods
    stage_ids:
    - model_inference
  - id: finance-C-117
    when: When selecting model for deterministic prediction
    action: use deterministic=True parameter to verify reproducible trading actions
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Non-deterministic policy introduces randomness in trade execution, causing inconsistent backtest results
      and making strategy performance unreproducible
    stage_ids:
    - model_inference
  - id: finance-C-118
    when: When processing actions in backtesting environment step function
    action: scale actions by hmax and clip to valid trading range before executing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unclipped actions may attempt trades exceeding portfolio capacity, causing cash overflow in backtest that
      won't execute in live trading
    stage_ids:
    - model_inference
  - id: finance-C-122
    when: When using FinRL for live trading inference
    action: claim real-time trading capability without accounting for data delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Data sources like Alpaca have inherent latency (15-minute delay for free tier); claiming real-time capability
      without acknowledging delay causes look-ahead bias in live trading
    stage_ids:
    - model_inference
  - id: finance-C-123
    when: When deciding to skip latency testing before paper trading
    action: skip API latency validation before initiating live order submission
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: High API latency causes orders to miss trading windows, resulting in stale price fills and degraded strategy
      performance not observed during backtesting
    stage_ids:
    - model_inference
  - id: finance-C-124
    when: When initializing ensemble agent for multi-window inference
    action: load and validate each agent models (A2C, PPO, DDPG, SAC, TD3) before ensemble execution
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing agent model causes ensemble strategy to fail mid-execution, leaving incomplete backtest results across
      trading windows
    stage_ids:
    - model_inference
  - id: finance-C-125
    when: When executing inference loop for each test timestep
    action: verify action history captures every trading decision with correct timestamp alignment
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Misaligned action history causes incorrect trade attribution, making it impossible to reproduce which prices
      triggered which trades
    stage_ids:
    - model_inference
  - id: finance-C-126
    when: When running model inference with turbulence-aware trading
    action: implement turbulence threshold check to trigger risk-off mode when market volatility exceeds threshold
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing turbulence threshold causes continued buying during high-volatility periods, leading to catastrophic
      losses during market crashes not observed in low-turbulence backtests
    stage_ids:
    - model_inference
  - id: finance-C-128
    when: When computing Sharpe ratio for annualized metrics
    action: Use 252 trading days for annualization to match US market convention
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using calendar days (365) instead of trading days (252) for Sharpe annualization produces incorrect risk-adjusted
      return metrics, making strategies appear better or worse than they actually are
    stage_ids:
    - performance_evaluation
  - id: finance-C-129
    when: When normalizing baseline data for strategy comparison
    action: Divide benchmark values by its first value and multiply by initial amount for fair comparison
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without baseline normalization, strategies with different initial capital cannot be fairly compared, leading
      to misleading performance conclusions
    stage_ids:
    - performance_evaluation
  - id: finance-C-130
    when: When handling timezone-aware datetime for pyfolio integration
    action: Localize each datetime indices to UTC before passing to pyfolio functions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pyfolio requires UTC-localized datetime indices; without proper timezone handling, metrics calculation fails
      or produces incorrect results
    stage_ids:
    - performance_evaluation
  - id: finance-C-131
    when: When fetching baseline data from Yahoo Finance for comparison
    action: Treat Yahoo Finance data as real-time; it has a 15-minute market delay
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Assuming Yahoo Finance provides real-time data leads to trades executed at stale prices, causing execution
      gaps and unexpected PnL in live deployment
    stage_ids:
    - performance_evaluation
  - id: finance-C-134
    when: When computing Sharpe ratio with zero or near-zero standard deviation
    action: Handle division by zero when daily return std equals zero (flat equity curve)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero in Sharpe calculation causes runtime errors or returns infinite values, breaking the performance
      evaluation pipeline
    stage_ids:
    - performance_evaluation
  - id: finance-C-135
    when: When filling missing baseline data after merge
    action: Use forward-fill then backward-fill for baseline gaps to avoid artificial data leakage
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Improper NaN handling in merged baseline data creates artificial price points that bias performance comparison
      against the strategy
    stage_ids:
    - performance_evaluation
  - id: finance-C-136
    when: When plotting transaction history on price charts
    action: Use sign of transaction values to identify buy (positive) and sell (negative) signals
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect signal identification leads to misaligned buy/sell markers on price charts, making transaction
      history visualization meaningless
    stage_ids:
    - performance_evaluation
  - id: finance-C-137
    when: When processing pyfolio performance statistics
    action: Pass daily returns as UTC-localized pandas Series to pyfolio.timeseries.perf_stats
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect data format or timezone to pyfolio causes silent failures in metric calculation, producing NaN
      or incorrect Sharpe, Sortino, and max drawdown values
    stage_ids:
    - performance_evaluation
  - id: finance-C-138
    when: When comparing multiple DRL strategy performances
    action: Drop NaN rows before computing per-strategy statistics to avoid biased results
    severity: medium
    kind: domain_rule
    modality: must
    consequence: NaN values in merged strategy results cause Sharpe and return calculations to fail or produce misleading
      averages across strategies
    stage_ids:
    - performance_evaluation
  - id: finance-C-139
    when: When calculating ensemble strategy Sharpe ratio
    action: Use 252**0.5 annualization factor consistently with single-strategy calculations
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Inconsistent annualization factors between ensemble and single-strategy Sharpe calculations make performance
      comparison invalid
    stage_ids:
    - performance_evaluation
  - id: finance-C-141
    when: When processing raw OHLCV data from Yahoo Finance
    action: Normalize column names to lowercase ['timestamp', 'open', 'high', 'low', 'close', 'volume', 'tic'] to verify compatibility
      with downstream processors
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: DataFrame with mismatched column names causes downstream stage failures, as clean_data expects lowercase
      'timestamp' not 'date' for YahooFinance processor
  - id: finance-C-142
    when: When passing DataFrame from data_cleaning to feature_engineering
    action: Verify the DataFrame contains continuous trading calendar dates aligned with NYSE trading days, as stockstats
      requires temporal continuity for technical indicator calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Technical indicators (MACD, Bollinger bands, RSI) produce incorrect values when date gaps cause stockstats
      to compute indicators on non-contiguous price series
  - id: finance-C-143
    when: When filling NaN values in cleaned OHLCV data
    action: Use forward-fill (ffill) for missing OHLCV prices, filling with previous close price, and set volume to 0 for
      missing rows
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN close prices cause technical indicator calculations to fail, producing all-NaN columns for MACD, RSI,
      and Bollinger bands
  - id: finance-C-148
    when: When Yahoo Finance provides delayed data
    action: Use Yahoo Finance data as simulated backtest or paper trading only, not real-time trading, due to inherent 15-minute
      market data delay
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting delayed Yahoo Finance data as real-time trading signals misleads users about execution quality
      and latency expectations
  - id: finance-C-149
    when: When passing Gym environment to model training
    action: Set environment's if_train flag correctly based on whether the environment is for training vs testing, as training
      mode randomizes initial stocks and cash
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Training mode randomization applied during testing causes reproducibility issues; testing mode with deterministic
      initial state during training reduces exploration
  - id: finance-C-150
    when: When saving trained model checkpoints
    action: Save model with .pth extension for ElegantRL/PyTorch models and .zip extension for StableBaselines3 models to
      enable correct model loading during inference
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect file extension causes model loading to fail during inference, preventing backtesting from executing
  - id: finance-C-151
    when: When training ensemble models for validation
    action: Use consistent tech_indicator_list across each ensemble models, as different indicator sets cause state dimension
      mismatch during ensemble evaluation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Ensemble evaluation fails with shape mismatch error when models trained with different technical indicators
      attempt to share validation environment
  - id: finance-C-152
    when: When validating trained models using Sharpe ratio
    action: Calculate Sharpe ratio using annualization factor matching the trading frequency (252 for daily data, 4 for quarterly),
      consistent with the data time_interval
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect Sharpe ratio annualization causes wrong model selection, potentially choosing inferior strategies
      that appear better due to time period mismatch
  - id: finance-C-154
    when: When running DRL prediction in inference mode
    action: Set deterministic=True for model.predict() to verify reproducible actions during backtesting, as stochastic actions
      cause non-deterministic equity curves
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Non-deterministic inference produces inconsistent backtest results, making performance metrics unreproducible
      and invalid for strategy comparison
  - id: finance-C-155
    when: When passing account_value and actions history to performance evaluation
    action: Verify account_value history starts with initial_amount (or initial_total_asset) as the first value, matching
      the environment's initialization for correct return calculation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched starting value causes Sharpe ratio and total return calculations to be incorrect, leading to wrong
      performance assessment
  - id: finance-C-156
    when: When computing performance metrics on backtest results
    action: Use the same baseline ticker date range as the trading period, as pyfolio requires aligned timestamps for benchmark
      comparison
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Misaligned benchmark dates cause pyfolio to fail or produce meaningless comparison metrics between strategy
      and baseline returns
  - id: finance-C-157
    when: When presenting backtest results
    action: Present backtest returns as simulated results, clearly labeling them as backtest performance, as backtest results
      do not guarantee future live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as expected live trading returns misleads users about actual expected performance,
      violating financial advisory regulations
  - id: finance-C-158
    when: When turbulence index is unavailable for early dates
    action: Set turbulence values to 0 for the first 252 trading days (one year lookback period), as turbulence calculation
      requires historical price data
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Zero turbulence values during market regime changes cause the agent to ignore risk management, leading to
      excessive losses during high-volatility periods
  - id: finance-C-159
    when: When training DRL agents in production-like environment
    action: Use if_train=False for production inference, as training mode enables stochastic action noise that introduces
      unintended portfolio drift
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Training noise during production inference causes unexpected position changes, leading to unauthorized trades
      and potential losses
  - id: finance-C-160
    when: When implementing lookback features for technical indicators
    action: Verify the DataFrame contains at least the longest indicator lookback period (typically 200+ rows) before feature
      engineering, as MACD requires 26-period EMA
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient historical data causes MACD and other long-period indicators to produce NaN values for most
      of the training period, degrading model performance
  - id: finance-C-161
    when: When assuming data preprocessing handles each edge cases
    action: Skip manual NaN inspection before passing to df_to_array, assuming the upstream clean_data fully resolves each
      missing values
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Technical indicator NaN values not caught by preprocessing cause environment state to contain NaN, corrupting
      neural network training gradients
  - id: finance-C-163
    when: When reasoning that validation performance equals production performance
    action: Assume models selected by validation Sharpe will perform identically in live trading, overlooking execution latency
      and market impact differences
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Validation-selected models may underperform in production due to execution delays, slippage, and market impact
      not modeled in backtesting
  - id: finance-C-164
    when: When considering technical indicators as sufficient state representation
    action: Assume technical indicators alone provide sufficient market regime information without additional fundamental
      or sentiment features
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Strategies relying solely on technical indicators may fail during regime changes or market stress when fundamental
      factors dominate price movement
  - id: finance-C-166
    when: When configuring date parameters in config.py or meta_config.py
    action: Use 'YYYY-MM-DD' string format for each date parameters (TRAIN_START_DATE, TRAIN_END_DATE, etc.)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Data download fails or produces empty results when date strings don't match the expected '%Y-%m-%d' format
      used by data sources like Yahoo Finance
  - id: finance-C-169
    when: When defining action space for StockTradingEnv_np
    action: Use Box(-1, 1, shape=(stock_dim,)) as action space for normalized continuous trading actions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Actions are interpreted incorrectly when action space bounds don't match the expected [-1, 1] range used
      for stock proportion scaling
  - id: finance-C-170
    when: When implementing reward scaling in trading environments
    action: Apply power-of-2 fractions (2^-N) for reward scaling to maintain numerical stability in neural network training
    severity: high
    kind: domain_rule
    modality: must
    consequence: Training becomes unstable or converges poorly when reward magnitudes are too large for neural network gradient
      computations
  - id: finance-C-171
    when: When processing data through FeatureEngineer.preprocess_data()
    action: Call clean_data() before add_technical_indicator() to verify proper data preparation order
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Technical indicators are calculated on improperly aligned or missing data when clean_data() is skipped, leading
      to NaN values and incorrect state observations
  - id: finance-C-172
    when: When executing trades in StockTradingEnv.step()
    action: Process sell orders before buy orders within each trading step to verify proper cash management
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Agent buys stocks with cash that should have been freed from sells first, violating capital conservation
      and causing incorrect position sizing
  - id: finance-C-173
    when: When executing trades at each timestep in trading environments
    action: Check price > 0 before executing any buy or sell order to handle missing data gracefully
    severity: high
    kind: domain_rule
    modality: must
    consequence: Trades execute with zero/hidden prices during market holidays or data gaps, corrupting portfolio state and
      reward calculations
  - id: finance-C-174
    when: When initializing stock trading environments
    action: Set initial capital to 1e6 ($1,000,000 USD) as the business assumption for portfolio valuation
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Portfolio returns and state normalization produce incorrect results when initial capital differs from the
      expected $1M baseline used in reward calculations
  - id: finance-C-175
    when: When configuring transaction costs in trading environments
    action: Set symmetric transaction costs with buy_cost_pct=sell_cost_pct=0.001 (0.1%) to model realistic bid-ask spread
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Backtest returns are inflated by 0.2% per round-trip trade when transaction costs are misconfigured, overstating
      strategy profitability
  - id: finance-C-177
    when: When configuring training vs testing mode in environments
    action: Set if_train=True during training for stochastic initialization, and if_train=False during testing for deterministic
      reset
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Testing uses stochastic initial states that vary between runs, preventing reproducible performance evaluation
  - id: finance-C-178
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live trading returns — backtesting ignores market impact, financing
      costs, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-180
    when: When describing FinRL's suitability for trading scenarios
    action: Claim support for high-frequency trading — the system is designed for daily-bar backtesting with significant latency
      in data fetching
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users attempt high-frequency strategies that fail due to minute-level data delays, non-realtime execution,
      and missing market microstructure support
  - id: finance-C-181
    when: When promoting FinRL for cryptocurrency trading
    action: Claim production-ready cryptocurrency trading support — the crypto environment is experimental and lacks production-grade
      infrastructure
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy crypto trading strategies that fail due to missing exchange integrations, insufficient liquidity
      modeling, and exchange API rate limiting
  - id: finance-C-182
    when: When deploying FinRL in production environments
    action: Claim production-ready status for real-time quantitative trading — the README explicitly recommends FinRL-X/FinRL-Trading
      for production use
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Production deployments fail due to lack of modular architecture, minimal risk controls, and absence of order/portfolio-level
      safeguards present in FinRL-X
  - id: finance-C-183
    when: When using Yahoo Finance data source
    action: Account for 15-20 minute delay in quote data — Yahoo Finance does not provide real-time market data
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Trading decisions based on stale price data during market hours lead to execution at outdated prices and
      reduced strategy profitability
  - id: finance-C-184
    when: When implementing turbulence-based risk management
    action: Wait at least 252 trading days before calculating turbulence index to verify sufficient historical data for covariance
      estimation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Turbulence index produces extreme outliers during initial calculation period due to insufficient rolling
      window data, triggering erroneous risk sell-offs
  - id: finance-C-185
    when: When implementing turbulence calculation for portfolio risk assessment
    action: Use Mahalanobis distance with covariance-weighted distance from historical mean — must not replace with simple
      volatility or single-stock measures that miss cross-asset contagion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing Mahalanobis distance with simple volatility misses cross-asset contagion during market crises,
      causing portfolio to underestimate correlated extreme moves and over-expose to systematic risk
    derived_from_bd_id: BD-006
  - id: finance-C-186
    when: When setting initial capital for portfolio initialization
    action: Verify initial capital of $1,000,000 matches strategy optimization assumptions — changes require recalibrating
      position sizing formulas and diversification calculations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Changing initial capital without recalibrating position sizing causes misaligned risk exposure; strategies
      optimized for $1M may under- or over-allocate when capital differs, causing live trading performance to diverge from
      backtest results
    derived_from_bd_id: BD-030
  - id: finance-C-187
    when: When implementing data source instantiation
    action: Use factory pattern with DataProcessor interface for data provider selection — must not hard-code specific provider
      instantiation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hard-coding data provider eliminates runtime flexibility, requiring code changes to switch between Alpaca,
      WRDS, and YahooFinance sources and breaking the principle of separating data retrieval from training pipeline
    derived_from_bd_id: BD-001
  - id: finance-C-188
    when: When handling missing data in price time series
    action: Use forward-fill with previous close for price continuity, but explicitly mark volume NaN as 0 — verify volume-based
      indicators correctly handle zero-volume bars representing non-trading periods
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Forward-fill creates artificial price continuity distorting technical indicators during data gaps, while
      silently converting missing volume to zero causes volume-based indicators to misinterpret non-trading periods as zero-activity
    derived_from_bd_id: BD-004
  - id: finance-C-189
    when: When calculating turbulence using rolling window for covariance matrix estimation
    action: Use 252-day rolling window (one trading year) for covariance matrix estimation — verify window provides statistically
      significant sample (~252 trading days) while remaining responsive to regime changes
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect window size causes either noisy short-term covariance estimates or stale long-term estimates, both
      distorting turbulence-based risk assessment and potentially causing misallocation during market regime changes
    derived_from_bd_id: BD-007
  - id: finance-C-190
    when: When processing data from any source for downstream consumption
    action: Normalize each data sources to standard FinRL schema [timestamp, open, high, low, close, volume, tic] — any source
      returning non-standard columns must be transformed before use
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-standard column names causes cryptic downstream failures when modules expect exact schema [timestamp,
      open, high, low, close, volume, tic], breaking feature engineering and environment observation construction
    derived_from_bd_id: BD-002
  - id: finance-C-191
    when: When preprocessing ticker data for portfolio construction
    action: Remove tickers with more than 50% NaN values before portfolio construction — prevents delisted/illiquid securities
      from contaminating training
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including tickers with >50% NaN values introduces artificial price history for non-existent trading periods,
      distorting feature engineering and causing model to learn from incomplete or delisted security patterns
    derived_from_bd_id: BD-005
  - id: finance-C-192
    when: When preprocessing technical indicator arrays for neural network input
    action: Scale technical arrays by powers of 2 (e.g., *2**-7) to verify clean binary representations in float32/64 — avoid
      arbitrary scaling factors that introduce imprecise binary representations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-power-of-2 scaling introduces imprecise binary representations in float32/64, causing neural network
      convergence issues and potential numerical instability in training that manifests as erratic loss curves
    derived_from_bd_id: BD-011
  - id: finance-C-193
    when: When retrieving data with interval specifications across different providers
    action: Use FinRL standard interval names (1D, 1Min, 1H, etc.) and map to provider-specific API parameters — must not
      hard-code provider-specific interval parameters directly
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using provider-specific interval parameters couples training code to data source, preventing runtime provider
      switching and causing runtime exceptions for unsupported interval/provider combinations
    derived_from_bd_id: BD-003
  - id: finance-C-194
    when: When implementing or refactoring risk control logic in stock trading environments
    action: Maintain the stop loss penalty threshold at 0.9 (triggering sell when price < 90% of average buy price) — do not
      adjust to different values during optimization or refactoring
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the stop loss threshold to 95% causes excessive early selling due to normal volatility, while 85%
      exposes 15% more capital to adverse moves; both deviate from the designed 10% maximum per-position loss limit, leading
      to either missed profits or amplified drawdowns in live trading
    derived_from_bd_id: BD-043
  - id: finance-C-195
    when: When implementing or modifying turbulence calculation logic
    action: Verify that turbulence calculation uses a 252-day (1 year) rolling window for stable covariance estimation that
      captures full market cycles
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Changing the turbulence window to shorter periods (e.g., 126-day) introduces noise and instability in risk
      estimation, while longer windows (e.g., 504-day) respond too slowly to regime changes, causing the turbulence signal
      to misrepresent current market conditions and leading to inappropriate leverage during stress periods
    derived_from_bd_id: BD-040
  - id: finance-C-196
    when: When implementing environment initialization logic for backtesting
    action: Randomize the starting point only within the first 50% of training dates — this ensures at least as many future
      timesteps as the lookback period for proper state construction without data leakage from validation period
    severity: high
    kind: domain_rule
    modality: must
    consequence: Starting outside the first 50% creates insufficient future data for lookback calculations, causing state
      construction failures or silent data leakage where the agent accesses validation period data during training, leading
      to overfitted backtest results that don't generalize to live trading
    derived_from_bd_id: BD-042
  - id: finance-C-197
    when: When implementing performance evaluation metrics
    action: Calculate daily return using simple first-difference percentage change of cumulative account value — do not use
      log returns which would complicate interpretation of absolute performance and create inconsistency with the framework's
      expected metric conventions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using log returns changes the aggregation and interpretation of daily performance metrics, creating inconsistency
      with other framework components that expect simple returns and potentially causing misalignment in Sharpe ratio and
      other performance calculations
    derived_from_bd_id: BD-026
  - id: finance-C-198
    when: When implementing Sharpe ratio calculation for performance evaluation
    action: Use (252^0.5) * mean_daily_return / std_daily_return to annualize daily Sharpe ratio — the square root scaling
      is required to convert daily volatility to annual terms
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using a different annualization factor (e.g., 365 instead of 252) misrepresents annualized performance, making
      Sharpe ratios non-comparable with industry benchmarks that use 252 trading days convention and potentially leading to
      incorrect strategy selection based on inflated or deflated risk-adjusted returns
    derived_from_bd_id: BD-048
  - id: finance-C-199
    when: When configuring hyperparameter optimization for DRL agent training
    action: Use TPE (Tree-structured Parzen Estimator) sampler with Hyperband pruner for efficient exploration of high-dimensional
      hyperparameter spaces within fixed compute budgets
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using grid search instead of TPE wastes compute on exhaustive evaluation of all combinations, while random
      search provides less efficient exploration; both alternatives lead to suboptimal hyperparameter settings or excessive
      training time, reducing the practical effectiveness of the hyperparameter tuning process
    derived_from_bd_id: BD-056
  - id: finance-C-200
    when: When configuring PPO exploration hyperparameters in the reinforcement learning training pipeline
    action: Set entropy coefficient to 0.01 — this modest exploration bonus prevents premature convergence to deterministic
      policies while maintaining sufficient policy gradient signal
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting entropy too low (e.g., 0.001) causes premature policy convergence to suboptimal strategies, while
      excessive entropy (e.g., 0.1) overwhelms the policy gradient signal causing erratic, unexploitative behavior
    derived_from_bd_id: BD-059
  - id: finance-C-201
    when: When implementing data preprocessing for financial time series
    action: Fill missing values with 0 instead of forward-fill or mean imputation — zero-fill treats absent data as neutral
      (no price movement), which is semantically correct for returns-based calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Forward-fill introduces lookahead bias by propagating future values backward, while mean imputation distorts
      the data distribution; both cause systematic overestimation of backtest returns
    derived_from_bd_id: BD-061
  - id: finance-C-202
    when: When implementing liquidity management in stock trading environments
    action: Verify cash penalty proportion of 0.1 and threshold of 10% match your broker's margin requirements and risk tolerance
      — these values incentivize maintaining adequate liquidity for transaction costs and unexpected opportunities
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Lower penalty allows excessive capital depletion risking margin calls, while higher penalty reduces capital
      utilization and strategy returns without proportional risk reduction
    derived_from_bd_id: BD-044
  - id: finance-C-203
    when: When implementing or evaluating stop loss trading strategies
    action: Use 2:1 profit-to-loss ratio as the target expectancy framework — winning trades must generate twice the magnitude
      of losing trades to achieve positive expectancy with the 10% stop loss threshold
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using lower ratios (e.g., 1.5:1) reduces expectancy below optimal levels, while higher ratios (e.g., 3:1)
      significantly lower win rates making consistent profitability difficult to achieve in most market conditions
    derived_from_bd_id: BD-045
  - id: finance-C-204
    when: When implementing episode handling logic for stock trading reinforcement learning environments
    action: Use patient mode (skip buying when cash is insufficient) instead of ending episodes early — this provides more
      training samples and teaches agents to wait for favorable capital conditions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Ending episodes prematurely wastes valuable training opportunities and may cause the agent to learn overly
      conservative position sizing to avoid capital depletion scenarios
    derived_from_bd_id: BD-047
  - id: finance-C-205
    when: When implementing discrete action spaces for stock trading backtesting
    action: Use shares_increment=1 to restrict trades to whole share quantities — fractional shares may not be executable
      in real markets and this constraint ensures backtest-live consistency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allowing fractional shares in backtesting creates execution inconsistency where backtested trades cannot
      be replicated in live trading, causing systematic overestimation of achievable returns
    derived_from_bd_id: BD-046
  - id: finance-C-206
    when: When implementing model validation for ensemble training in stock trading
    action: Use 63-day validation window matching the rebalancing frequency — this ensures evaluation periods mirror actual
      deployment conditions and capture recent market regimes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using shorter windows (e.g., 30 days) introduces noisy estimates causing suboptimal model selection, while
      longer windows (e.g., 126 days) evaluate on outdated market regimes leading to poor live performance
    derived_from_bd_id: BD-055
  - id: finance-C-207
    when: When designing or modifying data preprocessing pipelines for stock selection
    action: Define explicit NaN handling strategy with regime detection (suspended vs trading periods) before applying forward-fill
      — differentiate between fillable gaps (temporary data gaps) and non-fillable gaps (delisted/suspended securities) to
      avoid artificial price continuity
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Forward-filling without regime detection creates fake price history for suspended or delisted stocks, producing
      incorrect technical indicators and causing the strategy to select or avoid stocks based on fabricated data
    derived_from_bd_id: BD-122
  - id: finance-C-208
    when: When designing or modifying stock universe filtering logic in preprocessing pipelines
    action: Use a unified ticker quality threshold across each preprocessing stages — do not apply multiple independent ticker
      dropping rules with different thresholds as this creates inconsistent portfolio universe definitions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent ticker removal across pipeline stages causes the same stock to be included or excluded depending
      on which preprocessing variant is used, making strategy comparisons unreliable and backtest results non-reproducible
    derived_from_bd_id: BD-123
  - id: finance-C-209
    when: When implementing or modifying commission/fee calculation logic in portfolio optimization
    action: Use the TRF (Transaction Remainder Factor) fixed-point iteration model for computing transaction costs — do not
      replace with flat fee, closed-form approximation, or tiered structures without validating cost accuracy
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing TRF with simpler models changes transaction cost dynamics; strategies profitable under flat fees
      may become loss-making when realistic frictions are applied, causing backtest-live divergence
    derived_from_bd_id: BD-075
  - id: finance-C-210
    when: When implementing PPO reinforcement learning for trading agents
    action: Implement clipped surrogate objective with GAE (Generalized Advantage Estimation) for policy updates — do not
      replace with vanilla policy gradient or TRPO without re-validating training stability
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using unclipped surrogate objectives or vanilla policy gradient risks destructive policy updates; training
      may diverge or produce unstable strategies that perform erratically in live trading
    derived_from_bd_id: BD-076
  - id: finance-C-211
    when: When implementing experience replay for portfolio optimization training
    action: Store complete return trajectories with automatic eviction of old experiences — do not use prioritized replay
      or episodic memory structures without validating off-policy correction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing replay strategy alters off-policy learning dynamics; prioritized replay without proper correction
      may introduce bias, causing trained policies to underperform or become unstable
    derived_from_bd_id: BD-084
  - id: finance-C-212
    when: When converting policy logits to portfolio weight distributions
    action: Apply softmax normalization to convert raw logits to portfolio weights ensuring sum equals 1 — do not use sigmoid
      with scaling or other methods that allow negative weights
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using sigmoid with scaling allows negative portfolio weights (short positions) or weights summing to non-1
      values; strategies designed for long-only portfolios will malfunction when shorts are introduced unexpectedly
    derived_from_bd_id: BD-053
  - id: finance-C-215
    when: When implementing or refactoring Policy Gradient loss computation for portfolio optimization
    action: Verify the loss function uses negative log-likelihood with gradient ASCENT (not descent); if entropy bonus is
      included, verify it is added, not subtracted
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using gradient descent instead of gradient ascent inverts the optimization direction, causing the policy
      to maximize bad actions rather than good ones; backtest results will show consistent losses
    derived_from_bd_id: BD-068
  - id: finance-C-216
    when: When implementing EI3 policy architecture for financial time series processing
    action: Implement multi-scale convolutional filters capturing short-term momentum, medium-term trends, and long-term mean
      reversion simultaneously; verify filter kernel sizes match the intended temporal scales
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using single-scale convolutions or incorrect filter sizes fails to capture important temporal patterns, reducing
      strategy effectiveness across different market regimes and leading to poor backtest performance
    derived_from_bd_id: BD-072
  - id: finance-C-217
    when: When implementing advantage computation in policy gradient calculations
    action: Normalize advantage values to zero mean and unit variance before policy gradient computation; verify normalization
      is applied after advantage calculation and before loss computation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Skipping advantage normalization causes gradient magnitudes to vary with market volatility, leading to unstable
      training in high-volatility periods and poor convergence to optimal policies
    derived_from_bd_id: BD-077
  - id: finance-C-218
    when: When implementing mean-variance portfolio optimization
    action: Use EfficientFrontier.max_sharpe() for maximum Sharpe ratio optimization; verify expected returns and covariance
      matrix inputs are properly estimated from historical data before optimization
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using minimum variance instead of max Sharpe ratio changes the optimization objective fundamentally, producing
      overly conservative portfolios that don't match the intended risk-adjusted return objectives
    derived_from_bd_id: BD-079
  - id: finance-C-219
    when: When implementing multi-asset portfolio feature normalization in backtesting
    action: Apply independent per-ticker normalization using GroupByScaler — features must be normalized within each asset's
      own historical range, not across each tickers simultaneously
    severity: high
    kind: domain_rule
    modality: must
    consequence: Global cross-ticker normalization mixes price scales from different assets, causing features for low-priced
      stocks to be dwarfed by high-priced ones and leading to systematically biased feature representations that degrade model
      performance
    derived_from_bd_id: BD-082
  - id: finance-C-220
    when: When implementing return calculation in stock trading backtesting
    action: Calculate returns as percentage change between consecutive prices — do not substitute with log returns or other
      return definitions without adjusting strategy logic accordingly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching to log returns changes strategy signal magnitudes and timing, particularly for high-volatility
      stocks where log returns systematically differ from percentage returns, causing backtest-live performance divergence
    derived_from_bd_id: BD-083
  - id: finance-C-221
    when: When implementing turbulence-based risk management in stock trading
    action: Trigger risk-off selling behavior when turbulence index exceeds the defined threshold — the threshold value is
      a critical parameter that must remain consistent with the trained agent's learned behavior
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying the turbulence threshold without retraining causes the agent to switch risk modes at incorrect
      market stress levels, either overselling in mild conditions or failing to protect capital during actual market crashes
    derived_from_bd_id: BD-087
  - id: finance-C-222
    when: When implementing cash reserve management in trading environment
    action: Apply cash penalty proportion for positions that do not maintain minimum cash reserves — verify the penalty discourages
      over-investment without being so severe that the agent avoids each positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing or reducing the cash reserve penalty allows the agent to over-invest, leading to insufficient liquidity
      for new opportunities and potential forced liquidations at unfavorable prices during market gaps
    derived_from_bd_id: BD-089
  - id: finance-C-223
    when: When implementing portfolio state representation in portfolio optimization
    action: Normalize temporal variations relative to the previous time window's value — verify the state representation captures
      relative changes rather than absolute magnitudes to maintain scale invariance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing temporal normalization to absolute values breaks scale invariance, causing the agent to produce
      different portfolio allocations for the same relative market movements at different absolute price levels, degrading
      generalization
    derived_from_bd_id: BD-090
  - id: finance-C-226
    when: When implementing or verifying the reward function in the stock trading environment
    action: Verify that the gamma parameter (discount factor) in the reward calculation matches the intended investment horizon;
      higher gamma values (e.g., 0.99-0.999) prioritize long-term returns while lower values (e.g., 0.9-0.95) incentivize
      short-term profits
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using a gamma value misaligned with investment horizon causes the DRL agent to optimize for the wrong time
      horizon; short-horizon agents generate excessive transactions while long-horizon agents may underreact to short-term
      signals
    derived_from_bd_id: BD-013
  - id: finance-C-227
    when: When preprocessing features for DRL stock trading models
    action: Apply per-ticker feature scaling (normalizing each ticker's features to its own statistical range) rather than
      global scaling across each stocks; verify high-price stocks (e.g., BRK.A) do not dominate the state space over low-price
      stocks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using global feature scaling causes high-price stocks to dominate the state representation, leading the DRL
      agent to allocate disproportionate attention to expensive stocks and underallocate to lower-priced equities, distorting
      learned trading policies
    derived_from_bd_id: BD-010
  - id: finance-C-228
    when: When implementing portfolio allocation policies that may transfer between PortfolioOptimizationEnv and StockTradingEnv
    action: Assume identical policy architectures work across environments without modification — softmax normalization guarantees
      sum-to-one weights in PortfolioOptimizationEnv while Box space in StockTradingEnv allows arbitrary distributions
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Transferring a policy trained with softmax outputs to StockTradingEnv causes invalid portfolio allocations
      since the environment expects unnormalized Box space actions, resulting in undefined behavior or gradient computation
      failures
    derived_from_bd_id: BD-106
  - id: finance-C-229
    when: When integrating training monitoring for Stable Baselines3 agents
    action: Use TensorboardCallback from Stable Baselines3 for standardized training visualization — this callback logs scalar
      metrics and episode stats to tensorboard event files and is required for SB3-compatible agent training monitoring
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper TensorboardCallback integration, training metrics are not logged to tensorboard event files,
      making it impossible to visualize training progress, compare runs, or debug training issues using standard tensorboard
      tools
    derived_from_bd_id: BD-017
  - id: finance-C-230
    when: When implementing risk management logic for market turbulence scenarios
    action: Trigger forced liquidation of each positions when market turbulence exceeds the configured threshold — liquidation
      must execute at the next observation after detecting turbulence > threshold to prevent holding through correlated crash
      scenarios
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without turbulence-triggered liquidation, the strategy holds positions through market crashes, causing catastrophic
      losses as portfolio destruction occurs during correlated crisis events
    derived_from_bd_id: BD-014
  - id: finance-C-231
    when: When implementing or modifying action space definitions for StockTradingEnv
    action: Maintain continuous action space normalized to [-1, 1] range — this normalization is required because A2C/PPO/DDPG
      algorithms each support continuous Box space and discrete action requires internal mapping layer
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the action space from normalized [-1, 1] to algorithm-specific spaces would break compatibility
      with standard DRL algorithms, requiring separate environment implementations per algorithm
    derived_from_bd_id: BD-012
  - id: finance-C-232
    when: When implementing multi-environment training or transferring policies between portfolio optimization and stock trading
      environments
    action: Handle action space incompatibility explicitly — portfolio environment outputs softmax (sum-to-one weights) while
      stock trading uses Box space (unbounded); require environment-specific policy heads or action transformation layer to
      prevent policy transfer failures
    severity: high
    kind: domain_rule
    modality: must
    consequence: Policies trained in portfolio environment produce softmax-transformed outputs incompatible with stock trading
      Box action space, causing training failures or silent policy degradation when transferring across environments
    derived_from_bd_id: BD-117
  - id: finance-C-233
    when: When implementing multi-algorithm DRL training pipeline with model selection
    action: Implement ensemble strategy beyond single best selection — use weighted averaging, minimum-variance portfolio
      selection, or regime-aware model switching instead of argmax Sharpe selection to capture complementary model strengths
      during market regime shifts
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single best Sharpe selection discards complementary information from underperforming models; during regime
      shifts, previously inferior models (e.g., PPO in trending markets) become superior, and argmax selection cannot anticipate
      this, causing systematic underperformance
    derived_from_bd_id: BD-120
  - id: finance-C-234
    when: When implementing portfolio rebalancing logic in backtesting
    action: Rebalance only at unique trade dates within training window boundaries — this prevents look-ahead bias by ensuring
      rebalancing occurs only at window boundaries, forcing the agent to maintain portfolio state between rebalances
    severity: high
    kind: domain_rule
    modality: must
    consequence: Continuous rebalancing creates unrealistic transaction-heavy backtest results; not enforcing window-boundary
      rebalancing allows look-ahead bias where the agent accesses future information to adjust positions mid-window
    derived_from_bd_id: BD-020
  - id: finance-C-235
    when: When implementing risk control logic using turbulence indicators
    action: Compute turbulence threshold from training period distribution only (90th percentile quantile); use this threshold
      at each rebalance point to determine risk-on/risk-off regime — do not use future turbulence data for threshold computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Computing threshold from full dataset including future data causes look-ahead bias in regime detection; the
      risk control switch will appear more accurate in backtesting than in live trading where only historical data is available
    derived_from_bd_id: BD-021
  - id: finance-C-236
    when: When implementing or extending DRL agent training code
    action: Maintain the library-agnostic interface by implementing get_model, train_model, and DRL_prediction methods for
      each agent; use conditional imports to support multiple libraries without modifying existing training scripts
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Breaking the library-agnostic interface by using direct library imports forces refactoring of all training
      scripts when switching algorithms, increasing maintenance burden and preventing algorithm comparison experiments
    derived_from_bd_id: BD-016
  - id: finance-C-237
    when: When implementing execution logic for order processing
    action: Maintain strict separation between test mode (using historical data only) and trade mode (requiring API credentials
      and executing real orders) — never allow a unified execution path
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unified execution paths risk executing live trades during development, causing real financial losses from
      untested order generation logic
    derived_from_bd_id: BD-022
  - id: finance-C-238
    when: When implementing position liquidation logic in backtesting or live trading
    action: Execute sell orders in argsort order (worst performers first) — sort positions by return in ascending order and
      sell the lowest performers first
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing to sell best performers first fundamentally alters the strategy from mean-reversion to momentum,
      causing the backtest to reflect a different trading hypothesis and producing non-reproducible live results
    derived_from_bd_id: BD-041
  - id: finance-C-239
    when: When implementing turbulence-based risk management logic
    action: Use turbulence threshold of 70 to trigger risk-off mode — above this threshold, liquidate each positions to avoid
      tail risk during market stress
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing or modifying the turbulence threshold disables automatic risk-off mode, causing the strategy to
      hold positions during high-volatility periods when covariance matrices become unstable and tail risk is elevated
    derived_from_bd_id: BD-035
  - id: finance-C-240
    when: When configuring training parameters for reinforcement learning models
    action: Use preset training timesteps of 20,000 (quick demo) or 50,000 (serious training) — do not use arbitrary timestep
      values outside these presets without empirical validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Arbitrary timestep values may cause underfitting (too few) or wasted computation with no convergence benefit
      (too many), producing models that either underperform or consume excessive resources
    derived_from_bd_id: BD-039
  - id: finance-C-241
    when: When using the framework's default training timestep parameter for model training
    action: Verify that the default training timesteps (20K or 50K) match the expected convergence requirements for the specific
      strategy and environment complexity
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default timesteps of 20K (demo) and 50K (production) were derived empirically for general environments; strategies
      with higher-dimensional action spaces or more complex reward functions may require more training, resulting in undertrained
      models
    derived_from_bd_id: BD-039
  - id: finance-C-242
    when: When implementing portfolio weight calculation in FinRL portfolio optimization
    action: Apply softmax function to normalize portfolio weights to verify they form a valid probability distribution (sum
      to 1, respect long/short constraints)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using hard normalization (divide by sum) or projection methods instead of softmax produces invalid weight
      distributions that violate long/short constraints, leading to incorrect position sizing and degraded policy performance
    derived_from_bd_id: BD-074
  - id: finance-C-243
    when: When running backtesting with MVO baseline comparison
    action: Verify EfficientFrontier parameters (risk_aversion, weight_bounds) match the actual trading universe and broker
      fee structure before using MVO as performance baseline
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: MVO baseline using default EfficientFrontier parameters may not match actual market conditions, causing misleading
      performance comparisons where DRL appears to add or lose value when it actually does not
    derived_from_bd_id: BD-049
  - id: finance-C-244
    when: When implementing backtesting for US large-cap stock trading
    action: Include DJIA (^DJI) benchmark performance in backtest reporting to quantify alpha generation — strategy should
      at minimum match or exceed DJIA returns to justify active management costs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without DJIA comparison, there is no way to determine whether the strategy generates true alpha or simply
      captures market beta, leading to potentially wasteful active management fees
    derived_from_bd_id: BD-050
  - id: finance-C-245
    when: When configuring EIIE policy network for portfolio optimization
    action: Use time_window=50 (approximately 2 months of daily data) for the EIIE convolutional encoder — do not change to
      arbitrary values without validating pattern recognition capability
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Changing time_window to values outside the validated range damages the EIIE architecture's ability to capture
      temporal market patterns, leading to degraded portfolio optimization performance
    derived_from_bd_id: BD-051
  - id: finance-C-247
    when: When implementing or refactoring turbulence index calculation using Mahalanobis distance
    action: Replace the pandas .cov() covariance matrix with exponentially weighted covariance, shrinkage estimators, or any
      other covariance estimator without adjusting the turbulence threshold parameters — different estimators produce materially
      different covariance structures that change regime detection
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Substituting a different covariance estimator changes the eigenvalue distribution of the covariance matrix,
      causing the Mahalanobis distance-based turbulence index to detect different market stress levels and potentially triggering
      false regime switches
    derived_from_bd_id: BD-095
  - id: finance-C-249
    when: When training portfolio optimization agents with epsilon-greedy exploration
    action: Modify the epsilon exploration parameter from its empirically tuned value without re-evaluating convergence behavior
      and final policy performance
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Epsilon values that are too high cause random exploration to dominate, preventing the agent from learning
      meaningful trading patterns; values too low cause premature convergence to suboptimal policies, both leading to significantly
      degraded backtest performance
    derived_from_bd_id: BD-091
  - id: finance-C-250
    when: When implementing GPM policy network and action selection in portfolio optimization
    action: Change the softmax temperature parameter from its calibrated value without validating the resulting action distribution
      matches expected policy behavior
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Temperature values that are too low produce near-deterministic policies that overfit to specific market conditions;
      values too high produce uniform random exploration that ignores learned patterns, both causing backtest-live inconsistency
    derived_from_bd_id: BD-092
  - id: finance-C-251
    when: When implementing or modifying the reward function for portfolio optimization
    action: Replace log returns with simple returns, Sharpe ratio, or Sortino ratio as the reward signal without updating
      each portfolio performance calculations — log returns are additive under continuous compounding, while simple returns
      are not
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using simple returns as reward introduces path-dependent compounding errors where the reward signal does
      not accurately represent portfolio growth, causing the RL agent to optimize for a metric that diverges from actual accumulated
      returns over time
    derived_from_bd_id: BD-094
  - id: finance-C-255
    when: When running hyperparameter search with Ray Tune in distributed or shared cluster environments
    action: 'Verify and explicitly configure max_failures to a non-zero value (recommended: 3 with exponential backoff) if
      trial failures are expected due to resource contention, before starting long-running hyperparameter tuning jobs'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default max_failures=0 causes the entire hyperparameter search to stall indefinitely when any trial encounters
      expected failures (e.g., OOM, resource busy), wasting hours of compute time on shared clusters
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-256
    when: When running long training iterations (100+ epochs) without intermediate checkpointing
    action: Configure checkpoint_freq to a positive integer value (e.g., every 10-20 iterations) before starting long training
      runs, to enable recovery from interruptions without losing significant progress
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Default checkpoint_freq=0 means no intermediate saves occur; a cluster interruption or crash after 100+ iterations
      loses all training progress since the last explicit checkpoint, requiring full restart
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-257
    when: When scaling from single-worker laptop training to multi-worker distributed training
    action: Explicitly set init_ray=True in each entry point scripts that may trigger distributed training, rather than relying
      on the default behavior; document the flag requirement in deployment runbooks
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default init_ray=False silently disables distributed training capabilities; multi-worker training scripts
      fail to spawn additional workers without the explicit flag, causing distributed training attempts to fall back to single-worker
      mode without warning
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-258
    when: When ingesting market data from multiple sources (Alpaca and Yahoo Finance) into backtesting pipelines
    action: 'Implement source-specific data validation and normalization before merging datasets: standardize column names
      (close/adj_close), verify timestamp alignment (timezone, frequency), validate OHLCV relationships (high >= low, volume
      >= 0), and log data source provenance for audit trails'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without source-specific validation, column name mismatches (e.g., Alpaca uses 'close' vs Yahoo 'adj_close')
      or timezone offsets silently corrupt merged datasets, causing strategies to trade on misaligned price data and producing
      incorrect backtest results
    derived_from_bd_id: BD-GAP-007
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
