- id: SHARED-CN-ASTOCK-MKT-003
  statement: '策略拥挤（Strategy Crowding）：大量量化私募使用相似因子模型时， 持仓高度重叠，遇市场冲击时集体卖出形成踩踏。2024年2月 A 股量化危机 是典型案例（小盘股指数单日跌幅超 10%）。需监控因子多头持仓与
    主流量化基金的重叠率。

    '
  severity: high
  capability_tags:
    markets:
    - cn-astock
    activities:
    - backtesting
    - factor-research
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
    - portfolio_simulation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: factor crowding should be measured to avoid strategy overlap risk
  evidence_refs:
  - type: community_validated
    ref: 21世纪经济报道《多重因素致小盘策略失灵》（2024年2月）；中国基金报《史诗级量化巨震！深度解析来了》（2024年2月）
    url: https://www.21jingji.com/article/20240221/herald/f85c309ebeffb53edf282b0c4fa569b6.html
  reference_code:
    bad_example: '# BAD: 选股池与主流量化完全重叠无感知

      selected = factor_ranker.top_decile(universe, factor=''size'')

      '
    good_example: "# GOOD: 计算持仓与基准量化产品的 Jaccard 重叠率，高于 0.6 告警\noverlap = len(set(selected) & set(benchmark_holdings)) / len(set(selected))\n\
      if overlap > 0.6:\n    logger.warning(f\"High strategy crowding: {overlap:.1%} overlap\")\n"
  provenance:
    source: community_validated
  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-MKT-004
  statement: 'A 股量化对冲策略常用 IF/IC/IM 股指期货做多/空对冲系统性风险。 但 A 股股指期货长期处于贴水（远期价格 < 现货），IC 年化贴水可达 10-20%。 回测若仅考虑价格收益而忽略期货贴水/升水，会严重高估对冲策略净收益。

    '
  severity: high
  capability_tags:
    markets:
    - cn-astock
    activities:
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - portfolio_simulation
    - backtesting
  incompatible_with_tags:
    markets:
    - us-equity
    - crypto
  stage_id_remap_hints:
  - from_stage: portfolio_simulation
    constraint_context: futures carry cost (contango/backwardation) must be included in hedge cost
  evidence_refs:
  - type: community_validated
    ref: 中国金融期货交易所 IC/IF/IM 合约规则文件；知乎《A股可以做空的工具有哪些》（2024）
    url: http://mp.cnfol.com/58576/article/1732006910-141567623.html
  reference_code:
    bad_example: '# BAD: 忽略期货贴水成本，纯价格对冲

      hedge_pnl = futures_position * (futures_exit - futures_entry)

      '
    good_example: '# GOOD: 纳入滚仓贴水成本（IC 年化约 -15%）

      carry_cost_annual = 0.15  # IC 期货年化贴水约 15%

      hold_days = (exit_date - entry_date).days

      carry_cost = carry_cost_annual * hold_days / 365

      hedge_pnl = futures_position * (futures_exit - futures_entry) - carry_cost

      '
  provenance:
    source: community_validated
  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-MKT-005
  statement: 'A 股月度动量因子在方向上与美股相反：近1个月表现最好的股票， 下1个月大概率反转（反转效应而非动量）。机构研究（华泰/东吴证券） 与学术论文均验证：直接套用美股月度动量因子在 A 股会产生系统性亏损。

    '
  severity: high
  capability_tags:
    markets:
    - cn-astock
    activities:
    - factor-research
    - backtesting
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
  incompatible_with_tags:
    markets:
    - us-equity
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: momentum factor direction must be reversed for A-share monthly frequency
  evidence_refs:
  - type: academic
    ref: Jegadeesh & Titman (1993) JF（基准研究）；知乎《因子研究系列之二：浅析动量策略在中国A股的应用研究》（2020）；东吴证券《求索动量因子系列研究（二）》
    url: https://zhuanlan.zhihu.com/p/200752762
  reference_code:
    bad_example: '# BAD: 直接套用美股 12-1 月动量因子

      df[''momentum_12_1''] = df[''return''].rolling(12).sum().shift(1)

      df[''signal''] = (df[''momentum_12_1''] > df[''momentum_12_1''].median()).astype(int)

      # A 股结果：多头持仓下个月大概率跑输

      '
    good_example: '# GOOD: A 股使用短期反转因子（1-4周）

      df[''reversal_1m''] = -df[''return''].rolling(20).sum()  # 反转，取负号

      df[''signal''] = (df[''reversal_1m''] > df[''reversal_1m''].median()).astype(int)

      '
  provenance:
    source: academic
  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-BF-001
  statement: '处置效应（Shefrin & Statman 1985）在 A 股散户中尤为显著： 投资者倾向于过早卖出盈利股票、过长持有亏损股票。上交所实证研究证实 超过 90% 的个人账户存在此效应，AI 辅助工具不应迁就"持有亏损等解套"
    的直觉，而应基于量化信号提供纪律性止损止盈建议。

    '
  severity: medium
  capability_tags:
