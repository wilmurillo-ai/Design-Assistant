    url: https://www.stcn.com/article/detail/1398440.html
  reference_code:
    bad_example: '# BAD: 不限制单日成交量比例，假设无限流动性

      fill_qty = target_qty

      '
    good_example: "# GOOD: 限制每日参与率不超过日成交量的 5%\nMAX_PARTICIPATION_RATE = 0.05\navailable = daily_volume * MAX_PARTICIPATION_RATE\n\
      fill_qty = min(target_qty, available)\nif fill_qty < target_qty:\n    unfilled = target_qty - fill_qty\n    carry_forward_to_next_day(stock,\
      \ unfilled)\n"
  provenance:
    source: community_validated
  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-COST-001
  statement: 'A 股完整交易成本结构（2023年8月调整后）：印花税卖出单向 0.05%； 佣金双向约 0.01%（最低5元）；过户费（沪市）0.001%； 滑点/冲击成本小盘股 0.1%-0.5%/次。忽略成本的回测策略年化收益率
    具有欺骗性，高频/高换手策略尤甚。

    '
  severity: fatal
  capability_tags:
