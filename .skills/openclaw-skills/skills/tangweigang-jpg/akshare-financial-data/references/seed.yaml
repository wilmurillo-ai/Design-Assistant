      \    global daily_order_count\n    daily_order_count += 1\n    if daily_order_count > DAILY_ORDER_LIMIT * 0.8:\n   \
      \     logger.warning(\"Approaching daily order limit — review HFT compliance\")\n    broker.send_order(signal)\n"
  provenance:
    source: regulatory_doc
  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-ADJ-001
  statement: '除权除息日股价跳空是账面调整而非真实亏损。复权选择： 不复权会虚增策略亏损；前复权会将历史价格内嵌未来分红信息（lookahead bias）； 后复权以上市首日为基准累积，是量化回测的最优选择。

    '
  severity: fatal
  capability_tags:
