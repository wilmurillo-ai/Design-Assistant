    - signal_generation
    - portfolio_simulation
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: portfolio_simulation
    constraint_context: turnover rate must be tracked and reported as a strategy quality metric
  evidence_refs:
  - type: academic
    ref: Barber & Odean (2000) 'Trading Is Hazardous to Your Wealth' JF；清华五道口金融学院《中国股市T+1交易制度对市场效率的影响》（2022）
    url: https://www.pbcsf.tsinghua.edu.cn/
  reference_code:
    bad_example: '# BAD: 每日换仓，不计算换手率成本影响

      positions = factor_ranker.daily_rebalance(universe)

      '
    good_example: "# GOOD: 控制换手率，计算成本后净收益\nANNUAL_TURNOVER_CAP = 5.0  # 年化换手率上限 500%\npositions = factor_ranker.rebalance_with_turnover_constraint(\n\
      \    universe, max_annual_turnover=ANNUAL_TURNOVER_CAP\n)\nnet_return = gross_return - transaction_cost_estimate(turnover_rate)\n"
  provenance:
    source: academic
  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-BF-004
  statement: 'A 股日历效应：春节效应（节前5日和节后1-3日倾向上涨）、月初效应 （月初第1-5个交易日表现优于月中/月末）已有学术实证（南京财经大学等）。 策略应在日历特殊窗口降低信号置信度，或单独评估日历驱动收益的贡献。

