    stage_ids:
    - http_request
  - id: finance-C-029
    when: When validating external API responses
    action: check for empty response data and raise DataParsingError
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty responses from external APIs will propagate as null values, causing downstream parsing failures and
      corrupted datasets that mask data unavailability
    stage_ids:
