  evidence_refs:
  - type: regulatory_doc
    ref: 上交所《股票上市规则》第13章特别处理制度；证监会《关于改革完善并严格实施上市公司退市制度的意见》（2020年12月）
    url: https://www.sse.com.cn/lawandrules/regulations/listing/
  reference_code:
