  - id: finance-C-007
    when: When handling API responses with rate limit status (429)
    action: Immediately raise RateLimitError without retrying to allow proper backoff handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Retrying on rate limit responses without proper backoff will worsen the situation, potentially getting the
