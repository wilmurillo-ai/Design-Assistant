    kind: resource_boundary
    modality: must
    consequence: Requests without proper Referer headers will be blocked by anti-hotlinking protections, resulting in 403
      Forbidden responses
    stage_ids:
    - data_acquisition
  - id: finance-C-044
    when: When implementing THS data source acquisition
    action: execute embedded JavaScript to obtain verification code before making API requests
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: THS (同花顺) requires JavaScript-obtained verification tokens, direct API calls without valid tokens will be
      rejected
    stage_ids:
    - data_acquisition
  - id: finance-C-045
    when: When implementing paginated data acquisition
    action: calculate total pages from API response metadata before iterating
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Hardcoded page limits will cause incomplete data acquisition or unnecessary requests, resulting in datasets
      with gaps or wasted resources
    stage_ids:
    - data_acquisition
  - id: finance-C-046
    when: When setting HTTP request timeout
    action: use timeout parameter between 10-30 seconds to avoid hanging connections
    severity: medium
    kind: domain_rule
    modality: must
    consequence: No timeout or excessive timeout will cause requests to hang indefinitely, blocking data acquisition pipelines
      and wasting resources
    stage_ids:
    - data_acquisition
  - id: finance-C-047
    when: When implementing pd.read_html for web table extraction
    action: Wrap HTTP response text in StringIO before passing to pd.read_html
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing raw string to pd.read_html may cause parsing failures or unexpected behavior with lxml parser, resulting
      in empty DataFrames or data corruption
    stage_ids:
    - html_table_extraction
  - id: finance-C-048
    when: When selecting a table from pd.read_html result list
    action: Validate table index exists before accessing with hardcoded indices like [0], [1], [2]
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hardcoded table index selection without validation causes IndexError when website structure changes, breaking
      data retrieval for all downstream stages
    stage_ids:
    - html_table_extraction
  - id: finance-C-049
    when: When parsing numeric data from HTML table cells
    action: Apply pd.to_numeric with errors='coerce' to convert string values after table extraction
    severity: high
    kind: domain_rule
    modality: must
    consequence: String values from HTML tables containing spaces, special characters, or formatting artifacts cause type
      coercion errors, resulting in NaN values or silent data loss
    stage_ids:
    - html_table_extraction
  - id: finance-C-050
    when: When setting response encoding for Chinese financial websites
    action: Specify correct encoding (gbk, gb2312, or utf-8) matching the source website charset
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect encoding causes garbled Chinese characters in parsed tables, corrupting all text fields including
      stock codes, names, and financial indicators
    stage_ids:
    - html_table_extraction
  - id: finance-C-051
    when: When handling HTTP requests to unreliable web sources
    action: Implement retry loop with maximum 20 attempts and 5-second sleep intervals
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without retry mechanism, transient network failures or server errors cause complete data retrieval failure,
      breaking dependent analysis pipelines
    stage_ids:
    - html_table_extraction
  - id: finance-C-052
    when: When requesting data from web sources
    action: Set request timeout to 20 seconds to prevent indefinite blocking
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Missing timeout allows requests to hang indefinitely on slow or unresponsive servers, freezing the entire
      data acquisition pipeline
    stage_ids:
    - html_table_extraction
  - id: finance-C-053
    when: When using pd.read_html for HTML table extraction
    action: Use flavor=None or explicit lxml parser for better performance and compatibility
    severity: low
    kind: resource_boundary
    modality: should
    consequence: Default parser may be slower or less reliable for complex Chinese financial websites, causing extended parsing
      times or extraction failures
    stage_ids:
    - html_table_extraction
  - id: finance-C-054
    when: When implementing BeautifulSoup-based table extraction
    action: Check for table existence with explicit error messages when website structure changes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Silent failure when website HTML structure changes causes empty DataFrames to propagate through the system,
      leading to incorrect analysis results without warning
    stage_ids:
    - html_table_extraction
  - id: finance-C-055
    when: When handling empty or failed HTTP responses
    action: Check for empty response data before attempting HTML table parsing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Empty response body passed to pd.read_html produces unexpected empty DataFrames or parsing errors, causing
      silent data loss without clear error indication
    stage_ids:
    - html_table_extraction
  - id: finance-C-056
    when: When extracting table columns with iloc after pd.read_html
    action: Strip whitespace and control characters from column values before type conversion
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: HTML table cells often contain leading/trailing whitespace, non-breaking spaces, or special formatting characters
      that cause type conversion failures or string comparison issues
    stage_ids:
    - html_table_extraction
  - id: finance-C-059
    when: When handling rate limiting responses
    action: Detect HTTP 429 status code and apply exponential backoff retry strategy
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Ignoring rate limit responses causes IP blocking by financial data websites, permanently breaking data access
      for the user
    stage_ids:
    - html_table_extraction
  - id: finance-C-060
    when: When claiming data reliability for financial analysis
    action: Present scraped web data as authoritative or guaranteed accurate
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Web scraping data contains inherent fragility - websites change structure without notice, causing parsing
      failures or silent data corruption that propagates to investment decisions
    stage_ids:
    - html_table_extraction
  - id: finance-C-061
    when: When using HTML table parsing as the sole data extraction method
    action: Rely exclusively on pd.read_html for each data sources without fallback mechanisms
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Websites that switch from HTML tables to JavaScript-rendered content, API endpoints, or different data formats
      become completely inaccessible, breaking all dependent systems
    stage_ids:
    - html_table_extraction
  - id: finance-C-062
    when: When handling encoding errors during web scraping
    action: Provide fallback encoding options (utf-8, gbk, gb2312) rather than failing on first attempt
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Single encoding assumption causes parsing failure when website charset differs, requiring manual code modification
      to recover data access
    stage_ids:
    - html_table_extraction
  - id: finance-C-066
    when: When parsing JSON responses, HTTP 200 responses with invalid JSON MUST raise DataParsingError, not APIError
    action: Distinguish JSON parsing failures (ValueError) from HTTP status errors, raising DataParsingError for the former
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Misclassifying JSON parsing errors as API errors will produce misleading error messages that suggest server-side
      issues when the problem is actually malformed response content
    stage_ids:
    - json_parsing
  - id: finance-C-067
    when: When implementing JSON parsing, callers MUST catch DataParsingError to distinguish empty responses from actual data
      failures
    action: Handle DataParsingError in try-except blocks when calling make_request_with_retry_json
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unhandled DataParsingError will expose internal error messages to end users and prevent graceful degradation
      or fallback mechanisms
    stage_ids:
    - json_parsing
  - id: finance-C-069
    when: When the JSON parsing stage encounters non-200 HTTP status codes other than 429, it MUST raise APIError
    action: Raise APIError for each non-200 status codes except 429
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unmapped HTTP status codes will raise generic Python exceptions instead of descriptive APIError, making debugging
      difficult and error handling fragile
    stage_ids:
    - json_parsing
  - id: finance-C-070
    when: When implementing JSON response parsing, the system MUST use requests.Response.json() method for automatic charset
      detection
    action: Use response.json() which automatically handles Content-Type charset detection and decoding
    severity: high
    kind: domain_rule
    modality: must
    consequence: Manual JSON decoding using json.loads(response.text) without proper encoding handling will corrupt multibyte
      characters in Chinese financial data, producing garbled text or decoding errors
    stage_ids:
    - json_parsing
  - id: finance-C-071
    when: When implementing JSON parsing with retry logic, the system MUST use exponential backoff for retry_delay
    action: Multiply retry_delay by 2 after each failed attempt to implement exponential backoff
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fixed retry intervals will trigger rate limits repeatedly, causing cascading failures and potential temporary
      IP/API key bans from the data provider
    stage_ids:
    - json_parsing
  - id: finance-C-072
    when: When implementing JSON parsing, the system MUST define DataParsingError and RateLimitError as distinct exception
      types in exceptions.py
    action: Create separate exception classes inheriting from AkshareException for DataParsingError and RateLimitError
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using generic exceptions will prevent callers from implementing specific error handling logic for different
      failure modes
    stage_ids:
    - json_parsing
  - id: finance-C-073
    when: When implementing JSON response parsing, the system MUST export error classes in __init__.py for public API access
    action: Re-export DataParsingError and RateLimitError in akshare/__init__.py
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Users cannot catch specific error types without importing them, forcing them to catch generic Exception and
      preventing proper error categorization
    stage_ids:
    - json_parsing
  - id: finance-C-074
    when: When parsing JSON responses, the system MUST distinguish between JSON parsing failures (ValueError) and network
      failures (RequestException)
    action: Use separate try-except blocks to catch ValueError for JSON parsing and RequestException for network issues
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Conflating network errors with JSON parsing errors will cause incorrect error messages and prevent proper
      retry logic for transient network failures
    stage_ids:
    - json_parsing
  - id: finance-C-075
    when: When implementing JSON parsing with retry logic, the system MUST NOT retry DataParsingError as it indicates a permanent
      failure
    action: Re-raise DataParsingError immediately without retry when JSON parsing or empty response is detected
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Retrying requests that return malformed or empty JSON will waste API quota and delay error reporting, extending
      the time before users can diagnose and resolve data source issues
    stage_ids:
    - json_parsing
  - id: finance-C-076
    when: When implementing JSON parsing, the system MUST NOT claim to support real-time data streaming via JSON parsing
    action: Acknowledge that response.json() is a blocking synchronous call that parses complete HTTP response bodies only
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Claiming real-time streaming support when using response.json() will lead users to implement polling patterns
      inappropriate for streaming data sources, causing data latency and increased API load
    stage_ids:
    - json_parsing
  - id: finance-C-078
    when: When handling empty DataFrames in column mapping stage
    action: Return DataFrame with correct column schema when input is empty (shape == (0, 0))
    severity: high
    kind: domain_rule
    modality: must
    consequence: Downstream operations may fail with unexpected column errors or inconsistent schema across function calls
    stage_ids:
    - column_mapping
  - id: finance-C-079
    when: When applying column mapping to paginated data
    action: Apply column names immediately after fetching data via fetch_paginated_data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Data operations will reference non-existent columns causing KeyError exceptions in subsequent processing
    stage_ids:
    - column_mapping
  - id: finance-C-080
    when: When selecting final output columns after mapping
    action: Select only the intended columns and drop placeholder columns (marked with underscore or dash)
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Output DataFrame contains irrelevant columns causing confusion and potential errors in data analysis
    stage_ids:
    - column_mapping
  - id: finance-C-081
    when: When implementing set_df_columns utility function
    action: Check for exact empty shape (0, 0) and assign column names only to non-empty DataFrames
    severity: high
    kind: domain_rule
    modality: must
    consequence: Column assignment will fail on non-empty DataFrames or miss columns on different empty representations
    stage_ids:
    - column_mapping
  - id: finance-C-083
    when: When converting numeric columns after mapping
    action: Apply pd.to_numeric with errors='coerce' to verify non-numeric values become NaN
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixed type columns will cause downstream numerical calculations to fail or produce incorrect results
    stage_ids:
    - column_mapping
  - id: finance-C-084
    when: When handling unmapped or unknown columns
    action: Consistently handle unmapped columns by either preserving them with underscore prefix or dropping them
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Inconsistent column handling will cause unpredictable behavior across different data sources
    stage_ids:
    - column_mapping
  - id: finance-C-085
    when: When using AKShare for production trading systems
    action: Claim real-time data accuracy without accounting for typical web scraping delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Trading decisions based on delayed data will result in financial losses due to stale quotes
    stage_ids:
    - column_mapping
  - id: finance-C-086
    when: When adding English column aliases for international users
    action: Modify core column mapping logic to support dual-language columns without proper testing
    severity: medium
    kind: resource_boundary
    modality: should_not
    consequence: Dual column names will cause downstream code to break due to unexpected column count changes
    stage_ids:
    - column_mapping
  - id: finance-C-089
    when: When handling DataFrames from web sources that may contain empty string values
    action: Replace empty strings with pd.NA or NaN before numeric conversion to prevent empty string values from being treated
      as zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty strings converted to float become 0.0 instead of NaN, causing incorrect financial calculations where
      missing data should propagate as NaN through aggregations
    stage_ids:
    - type_conversion
  - id: finance-C-090
    when: When implementing automatic numeric column detection
    action: Check column dtype is 'object' before attempting numeric conversion to avoid unnecessary type coercion on already-numeric
      columns
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Applying numeric conversion to already-numeric columns wastes CPU cycles and may introduce unexpected dtype
      changes across large datasets with thousands of rows
    stage_ids:
    - type_conversion
  - id: finance-C-091
    when: When converting financial data columns from web scraping
    action: Use pandas float type instead of Python float for financial calculations, as Python float has insufficient precision
      for monetary calculations exceeding 2^53
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Large stock market cap values (e.g., 1,234,567,890,123) lose precision when stored in float64, potentially
      causing incorrect risk calculations and portfolio allocation decisions
    stage_ids:
    - type_conversion
  - id: finance-C-092
    when: When data from a web source changes format and contains unexpected non-numeric characters
    action: Apply errors='coerce' to gracefully handle corrupted data, converting problematic values to NaN and preserving
      the remaining valid data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without error coercion, a single corrupted cell causes the entire DataFrame to fail processing, resulting
      in zero data retrieval when most columns contain valid data
    stage_ids:
    - type_conversion
  - id: finance-C-093
    when: When Chinese financial web sources return percentage strings with '%' suffix
    action: Strip percentage suffixes using str.replace('%', '') before numeric conversion, otherwise percentage values become
      NaN and break ratio calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Columns like '涨跌幅' (change percent) contain values like '5.23%' which cannot be parsed as numeric without
      removing the '%' suffix, corrupting all percentage data
    stage_ids:
    - type_conversion
  - id: finance-C-094
    when: When implementing type conversion in the data pipeline
    action: Apply type conversion AFTER column_mapping and BEFORE any numerical analysis functions to verify correct data
      types enter calculations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Misplaced type conversion after calculations causes type errors or silent coercion bugs where string operations
      produce unexpected results in mathematical expressions
    stage_ids:
    - type_conversion
  - id: finance-C-095
    when: When converting stock code columns to standardized format
    action: Convert stock codes to string with zero-padding (str.zfill(6)) after numeric type conversion, preserving leading
      zeros for codes like '000001'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Numeric conversion drops leading zeros from stock codes, causing incorrect ticker symbols like '000001' becoming
      '1', breaking downstream lookups and comparisons
    stage_ids:
    - type_conversion
  - id: finance-C-096
    when: When presenting processed financial data to users
    action: Claim that numeric-converted data represents actual trading prices without noting that data originates from web
      scraping and may contain delays or inaccuracies
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users may make investment decisions based on unverified scraped data that may be stale, incomplete, or contain
      parsing errors, leading to potential financial losses
    stage_ids:
    - type_conversion
  - id: finance-C-097
    when: When converting financial metrics that require high precision
    action: Round or truncate decimal values during type conversion, as precision loss in financial data leads to compounding
      calculation errors in subsequent analyses
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Truncated price data like 123.456 becoming 123.45 accumulates rounding errors over thousands of trades, causing
      portfolio P&L reports to diverge from actual values
    stage_ids:
    - type_conversion
  - id: finance-C-098
    when: When type conversion fails silently with NaN values
    action: Assume NaN values after conversion indicate missing data rather than parsing errors, as silent failures may mask
      systematic data quality issues requiring upstream fixes
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: High NaN rates after conversion (e.g., >50% of values) indicate source data format changed, requiring investigation
      rather than blind acceptance of incomplete datasets
    stage_ids:
    - type_conversion
  - id: finance-C-099
    when: When applying errors='ignore' parameter during type conversion
    action: Use errors='ignore' as a substitute for proper error handling, as this returns original values without any conversion
      and may propagate string types into downstream numerical operations
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Using errors='ignore' causes mixed-type columns where some rows are strings and others numeric, causing runtime
      errors in pandas operations that expect uniform dtypes
    stage_ids:
    - type_conversion
  - id: finance-C-101
    when: When encountering rows that fail numeric conversion
    action: Delete or drop rows containing NaN values immediately after conversion, as this discards potentially valid data
      and creates survivorship bias in financial time series
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Dropping NaN rows removes trading days with unusual conditions, creating incomplete historical records that
      over-represent normal market conditions and under-represent market stress periods
    stage_ids:
    - type_conversion
  - id: finance-C-104
    when: When implementing paginated data fetching
    action: Copy base_params before modifying to avoid altering the original parameters
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without copying parameters, modifying page numbers will corrupt the original parameter dict, causing incorrect
      pagination in subsequent API calls and data corruption
    stage_ids:
    - pagination
  - id: finance-C-105
    when: When fetching paginated API data
    action: Handle the total page count calculation correctly based on API response structure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect page count calculation causes incomplete data retrieval, missing records from the final pages,
      or failed requests for non-existent pages
    stage_ids:
    - pagination
  - id: finance-C-106
    when: When implementing paginated data fetching
    action: Wrap pagination loop with progress bar using get_tqdm() for user feedback
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without progress indication, long pagination operations appear frozen to users, causing unnecessary support
      requests and perceived application hang
    stage_ids:
    - pagination
  - id: finance-C-107
    when: When making paginated HTTP requests
    action: Use request_with_retry wrapper to handle transient network failures and rate limits
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without retry logic, transient network failures cause pagination to fail midway, resulting in partial or
      missing data
    stage_ids:
    - pagination
  - id: finance-C-108
    when: When implementing paginated data fetching
    action: Set specified timeout value for each page request to prevent indefinite hangs
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without timeout, a slow or unresponsive server causes the entire pagination operation to hang indefinitely,
      blocking the application
    stage_ids:
    - pagination
  - id: finance-C-109
    when: When implementing paginated data fetching
    action: Create new Session for each request instead of reusing connections
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reusing HTTP sessions across requests without proper connection pooling causes connection state contamination
      and potential data leakage between paginated requests
    stage_ids:
    - pagination
  - id: finance-C-110
    when: When implementing multi-page data fetching
    action: Call fetch_paginated_data utility function for standardized pagination behavior
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Reimplementing pagination logic instead of using the utility function leads to inconsistent delay handling,
      retry logic, and error handling across different modules
    stage_ids:
    - pagination
  - id: finance-C-111
    when: When fetching paginated web data
    action: Claim that paginated web scraping results are equivalent to official API data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting web-scraped pagination data as official API data misleads users about data accuracy, completeness,
      and reliability guarantees
    stage_ids:
    - pagination
  - id: finance-C-112
    when: When implementing paginated data fetching
    action: Handle empty or null response data gracefully without crashing
    severity: high
    kind: domain_rule
    modality: must
    consequence: When API returns empty data for a page, attempting to process the empty response causes KeyError or DataFrame
      creation errors, crashing the entire pagination operation
    stage_ids:
    - pagination
  - id: finance-C-113
    when: When calculating total pages for pagination
    action: Use math.ceil to round up page count when total records is not evenly divisible
    severity: high
    kind: domain_rule
    modality: must
    consequence: Integer division or floor division of total records by page size causes the last page to be skipped, resulting
      in missing records
    stage_ids:
    - pagination
  - id: finance-C-114
    when: When implementing paginated data fetching
    action: Reset DataFrame index after concatenation to verify continuous integer indexing
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without resetting the index after concat, non-continuous indices cause issues in downstream operations that
      expect sequential row numbering
    stage_ids:
    - pagination
  - id: finance-C-115
    when: When implementing paginated data fetching
    action: Convert numeric columns with errors='coerce' to handle malformed data
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without error coercion, non-numeric values in API responses cause ValueError exceptions during type conversion,
      breaking pagination
    stage_ids:
    - pagination
  - id: finance-C-116
    when: When implementing date parameter handling in trading functions
    action: normalize each date inputs (YYYYMMDD, YYYY-MM-DD, datetime.date objects) to a consistent internal datetime.date
      format
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent date formats cause downstream processing errors when iterating over date ranges or comparing
      dates in trading calendar validation logic
    stage_ids:
    - trading_calendar
  - id: finance-C-117
    when: When processing dates that fall on non-trading days
    action: issue a warning and skip the trading data fetch without crashing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Functions that fetch data for non-trading days will attempt requests to exchange APIs and return empty or
      error data, corrupting analysis results
    stage_ids:
    - trading_calendar
  - id: finance-C-118
    when: When date parsing encounters invalid format strings
    action: return None from convert_date() and allow calling functions to handle None gracefully
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid date strings that pass through without validation cause TypeError exceptions at strftime() calls,
      crashing the entire data fetching pipeline
    stage_ids:
    - trading_calendar
  - id: finance-C-119
    when: When the calendar.json file becomes outdated
    action: claim calendar data is current without verifying against authoritative exchange sources
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Outdated calendar files cause false non-trading day warnings for newly listed trading days, missing valid
      data and causing incorrect analysis
    stage_ids:
    - trading_calendar
  - id: finance-C-120
    when: When fetching data before 17:00 on a trading day
    action: use the previous trading day's data as the latest available
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Requesting today's data before exchange closing time (17:00) returns incomplete or unavailable data, causing
      gaps in historical datasets
    stage_ids:
    - trading_calendar
  - id: finance-C-121
    when: When integrating external calendar sources
    action: validate calendar coverage includes historical dates before assuming complete date range
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Calendar data sourced from Sina Finance may have gaps in historical coverage, causing false positives for
      valid trading days in historical analysis
    stage_ids:
    - trading_calendar
  - id: finance-C-122
    when: When iterating over date ranges for bulk data downloads
    action: check each date against the trading calendar before attempting data fetch
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Skipping calendar validation before API calls causes repeated failed network requests to exchange websites,
      triggering rate limiting or IP blocking
    stage_ids:
    - trading_calendar
  - id: finance-C-123
    when: When implementing the trading calendar singleton pattern
    action: load the calendar once at module import time to avoid repeated file I/O
    severity: low
    kind: architecture_guardrail
    modality: must
    consequence: Repeated calendar file reads on every function call degrades performance for high-frequency trading data
      applications
    stage_ids:
    - trading_calendar
  - id: finance-C-124
    when: When validating date strings that match DATE_PATTERN regex
    action: accept date separators as hyphen, slash, or nothing (YYYYMMDD/YYYY-MM-DD/YYYY/MM/DD)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Date parsers that only accept one separator format cause silent failures when users pass alternative formats,
      returning None and defaulting to today's date
    stage_ids:
    - trading_calendar
  - id: finance-C-125
    when: When claiming calendar data accuracy
    action: represent the calendar data as official exchange-verified trading dates
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting Sina Finance-derived calendar data as authoritative exchange data misleads users about data reliability
      and compliance requirements
    stage_ids:
    - trading_calendar
  - id: finance-C-126
    when: When relying on trading calendar for critical trading decisions
    action: use the calendar data as the sole source of truth for live trading timing
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Depending solely on this calendar for live trading timing could cause orders to be placed on days not recognized
      by the user's broker or exchange
    stage_ids:
    - trading_calendar
  - id: finance-C-128
    when: When calculating forward-adjusted prices using qfq mode
    action: Return prices adjusted to represent current values retroactively applied to historical data points
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect adjustment mode causes return calculations to be wrong, leading to misleading historical performance
      analysis and flawed trading signals
    stage_ids:
    - adjustment_processing
  - id: finance-C-130
    when: When passing empty string for adjust parameter
    action: Return raw unadjusted prices without any dividend or split adjustments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Raw prices mixed with adjusted prices cause inconsistent return calculations across the dataset, leading
      to incorrect historical performance metrics
    stage_ids:
    - adjustment_processing
  - id: finance-C-131
    when: When using external East Money API for price adjustment
    action: Assume the API provides real-time adjustment data or guarantee adjustment accuracy
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: External API data may be delayed, incomplete, or contain errors; presenting this data as real-time adjustment
      could lead to incorrect trading decisions
    stage_ids:
    - adjustment_processing
  - id: finance-C-133
    when: When implementing price adjustment across multiple stock data functions
    action: Use consistent adjust_dict/adjust_map variable naming and key values across each functions
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent naming (adjust_dict vs adjust_map) across multiple files leads to maintenance confusion and
      potential bugs when modifying adjustment logic
    stage_ids:
    - adjustment_processing
  - id: finance-C-134
    when: When working with adjusted price data for return calculations
    action: Mix qfq-adjusted and hfq-adjusted prices in the same calculation without explicit conversion
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Mixed adjustment modes in return calculations produce meaningless results due to different base prices and
      adjustment factors
    stage_ids:
    - adjustment_processing
  - id: finance-C-135
    when: When using adjustment data from external East Money API
    action: Claim the adjustment data represents real-time or live trading prices
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Historical adjustment data from API is processed with delay; presenting it as real-time could mislead users
      into making trading decisions based on stale information
    stage_ids:
    - adjustment_processing
  - id: finance-C-136
    when: When handling stock symbols for market code determination
    action: Correctly determine market code (1 for Shanghai, 0 for Shenzhen) based on symbol prefix before passing to adjustment
      API
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Wrong market code causes API to return incorrect or no data for the symbol, resulting in failed data retrieval
    stage_ids:
    - adjustment_processing
  - id: finance-C-137
    when: When parsing API response for adjusted price data
    action: Handle cases where data_json['data'] or data_json['data']['klines'] is None/empty
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: KeyError or TypeError when accessing nested API response fields causes function to crash instead of returning
      empty DataFrame
    stage_ids:
    - adjustment_processing
  - id: finance-C-140
    when: When calculating log returns in Yang-Zhang volatility formula
    action: use numpy.float64 or pandas float dtype for price ratios before np.log to avoid precision loss
    severity: high
    kind: domain_rule
    modality: must
    consequence: Float32 or integer overflow in np.log can produce NaN for extreme price ratios, causing volatility calculation
      to fail silently for high-volatility assets
    stage_ids:
    - volatility_calculation
  - id: finance-C-141
    when: When input minute-level OHLC data is aggregated to daily volatility
    action: verify daily grouping by pd.Grouper(freq='1D') has sufficient observations per day
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Days with fewer observations than the minimum required for Yang-Zhang formula will produce unreliable volatility
      estimates due to insufficient sample size for variance calculation
    stage_ids:
    - volatility_calculation
  - id: finance-C-142
    when: When fetching minute-level stock data from Eastmoney via rv_from_stock_zh_a_hist_min_em
    action: request period='1' for date ranges exceeding 5 trading days
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Eastmoney API restricts period='1' data to 5 trading days (ndays='5' parameter at line 1077), causing data
      truncation and incorrect volatility calculation
    stage_ids:
    - volatility_calculation
  - id: finance-C-143
    when: When requesting minute-level futures data from Sina Finance via rv_from_futures_zh_minute_sina
    action: implement rate limiting and retry logic to prevent IP ban
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Sina Finance API blocks excessive requests (documented at akshare/futures/futures_zh_sina.py:7), causing
      data fetching to fail and interrupting volatility calculation pipeline
    stage_ids:
    - volatility_calculation
  - id: finance-C-144
    when: When selecting minute-level period parameter for volatility calculation
    action: restrict period to supported values {'1', '5', '15', '30', '60'} only
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid period values will cause API errors or return malformed data, corrupting the volatility calculation
      results
    stage_ids:
    - volatility_calculation
  - id: finance-C-146
    when: When presenting Yang-Zhang volatility calculation results to stakeholders
    action: claim the calculated volatility equals expected future market volatility or trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Volatility is a backward-looking metric based on historical data; presenting it as predictive of future performance
      misleads stakeholders about risk characteristics
    stage_ids:
    - volatility_calculation
  - id: finance-C-147
    when: When the volatility calculation output index is used in downstream financial analysis
    action: preserve proper datetime index alignment from minute data to daily volatility output
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Index misalignment after pd.to_datetime().dt.date conversion at line 154-156 can cause incorrect temporal
      joins with other financial time series, leading to wrong risk calculations
    stage_ids:
    - volatility_calculation
  - id: finance-C-149
    when: When calculating Yang-Zhang volatility for stocks with adjustment='hfq' or 'qfq'
    action: use consistent adjustment setting across the entire calculation period to avoid discontinuities in price ratios
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mixing adjusted and unadjusted prices creates artificial jumps in Open/Close ratios, corrupting both overnight
      and continuous volatility components
    stage_ids:
    - volatility_calculation
  - id: finance-C-150
    when: When the overnight volatility component requires historical Close prices
    action: verify the input dataset includes at least one additional historical bar before the first calculation period
    severity: medium
    kind: domain_rule
    modality: must
    consequence: The first row's overnight return requires Close[t-1] which is not in the dataset, so the first row will have
      NaN in oi calculation at line 140, causing data[1:] slice to lose the first valid observation unnecessarily
    stage_ids:
    - volatility_calculation
  - id: finance-C-151
    when: When implementing or modifying the volatility calculation pipeline
    action: skip validation of input data continuity and price validity before calling volatility_yz_rv
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Bypassing data validation can cause NaN propagation through all subsequent calculations, producing misleading
      volatility estimates that appear valid but are actually corrupted
    stage_ids:
    - volatility_calculation
  - id: finance-C-173
    when: When implementing or refactoring HTTP request handling in data fetching layer
    action: Use a single unified HTTP client with consistent retry strategy across each data fetching modules - do not maintain
      parallel HTTP request systems with different retry behaviors
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent retry behavior across modules causes unpredictable API success rates, leading to incomplete
      data fetching and corrupted backtest results that don't reflect actual market data availability
    derived_from_bd_id: BD-013
  - id: finance-C-174
    when: When configuring or adjusting strategy signal parameters in backtesting
    action: Verify that SMA period parameter matches intended strategy type before running backtest - 20-period SMA produces
      medium-term trend-following signals with specific entry/exit timing; changing to 5-period increases signal frequency,
      changing to 50-period decreases it
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect SMA period materially changes trading frequency and signal timing, producing different PnL
      outcomes and making backtest results non-reproducible when the parameter is inadvertently changed during refactoring
    derived_from_bd_id: BD-037
  - id: finance-C-175
    when: When running backtests with default commission parameters
    action: Verify that the commission rate of 0.2% excludes stamp tax (0.05% mandatory on sell side for A-shares) and add
      stamp_tax parameter with default 0.0005 for sell transactions to avoid incomplete cost modeling
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing stamp tax underestimates total trading costs by approximately 25% for 100% turnover strategies; high-frequency
      strategies with multiple round trips accumulate compounding errors, causing systematic return overestimation and wrong
      strategy selection
    derived_from_bd_id: BD-086
  - id: finance-C-176
    when: When parsing JSON responses from Sina/JS APIs
    action: Validate that demjson fallback is necessary by testing strict JSON parsing first; implement pre-processing normalization
      or strict validation with error reporting to detect API contract changes
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Implicit assumption that APIs return non-standard JSON is not formally documented; if APIs standardize their
      response format, demjson fallback may silently accept malformed data or mask parsing errors
    derived_from_bd_id: BD-020
  - id: finance-C-177
    when: When implementing or replacing volatility calculation in risk metrics
    action: Use Rogers-Satchell formula RS = ui(ui-ci) + di(di-ci) only with complete OHLC data and only for assets without
      significant overnight gaps; do not substitute for estimators requiring fewer price points
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Rogers-Satchell has zero bias only for geometric Brownian motion without opening jumps; applying it to markets
      with significant overnight gaps (e.g., stocks with after-hours trading) produces biased volatility estimates, causing
      incorrect risk calculations
    derived_from_bd_id: BD-074
  - id: finance-C-178
    when: When calculating returns for realized variance or volatility aggregation
    action: Use logarithmic returns ln(Pt/Pt-1) for time-additive calculations; simple returns do not satisfy time-additivity
      and will produce incorrect variance when squared and summed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Log returns satisfy time-additivity required for realized variance calculations; using simple returns breaks
      the mathematical property, causing volatility estimates to be inconsistent across different time aggregations
    derived_from_bd_id: BD-073
  - id: finance-C-179
    when: When implementing Yang-Zhang realized volatility
    action: Implement the full Yang-Zhang formula RV² = Vo + k*Vc + (1-k)*Vrs with adaptive weighting k=0.34/(1.34+(n+1)/(n-1))
      where n is sample size; do not replace with simpler estimators
    severity: high
    kind: domain_rule
    modality: must
    consequence: Yang-Zhang achieves up to 8x efficiency gain over close-to-close volatility under realistic market conditions
      with overnight gaps; replacing with simpler estimators loses this precision, causing systematic underestimation of true
      volatility
    derived_from_bd_id: BD-071
  - id: finance-C-180
    when: When implementing retry logic and delay strategies in data fetching modules
    action: Implement a unified retry policy with circuit breaker pattern and integrate with distributed caching layer — the
      combination of no caching, fixed 0.5-1.5s delays, and dual independent retry systems creates request volume multiplication
      (3-6x) that risks IP blocking from data providers
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Rate limit exhaustion causes API access failures across all modules; when multiple modules (futures, options,
      stock data) run concurrently with overlapping retries, sustained operation triggers IP blocking making the entire data
      pipeline unusable
    derived_from_bd_id: BD-089
  - id: finance-C-181
    when: When selecting or switching price adjustment modes for historical A-share stock data analysis
    action: Explicitly specify and document which price adjustment mode (no adjustment/空, forward/qfq, backward/hfq) is in
      use — different modes fundamentally change historical price interpretation and return calculations; forward adjustment
      scales past prices up, backward adjustment keeps current prices unchanged
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silent mode switching causes contradictory backtest results; a strategy tested with forward-adjusted prices
      produces different signals than the same strategy with backward-adjusted prices, leading to incorrect strategy selection
      or parameter optimization
    derived_from_bd_id: BD-036
  - id: finance-C-182
    when: When analyzing futures daily bar data or developing multi-asset strategies
    action: Verify data scope covers required instrument types — IO (index options), MO (mid-term options), and HO (treasury
      bonds) are filtered out from futures data; if analyzing these financial futures instruments, use alternative data sources
      or acknowledge the scope limitation
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Assuming futures data includes all instrument types when IO/MO/HO are excluded leads to incomplete analysis;
      multi-asset strategies may silently miss exposure to index options, mid-term options, or treasury bond futures
    derived_from_bd_id: BD-041
  - id: finance-C-183
    when: When calling DataApi endpoints using dynamic method binding
    action: Verify endpoint method names before calling — the __getattr__ pattern enables 300+ dynamic endpoints but returns
      None for typos without raising errors, causing silent failures where wrong endpoints are called or data is silently
      empty
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Typo in endpoint names (e.g., stock_basic instead of stock_zh_a_spot_em) silently returns None or empty data,
      causing backtest calculations to use null/missing values without any exception or warning
    derived_from_bd_id: BD-024
  - id: finance-C-184
    when: When initializing the akshare pro_api for authenticated data access
    action: Set authentication token before any pro_api calls — token initialization is a prerequisite contract not enforced
      at API level; calling pro_api without token raises authentication errors that may appear as generic network failures
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Calling pro_api before setting token causes authentication failures that manifest as confusing network or
      data errors rather than clear auth messages, making debugging time-consuming especially in automated pipelines
    derived_from_bd_id: BD-025
  - id: finance-C-185
    when: When performing historical backtesting with stock universe selection
    action: Assume the framework provides point-in-time consistent data — the framework lacks PIT data capability, meaning
      historical backtests include survivorship bias by showing only currently-trading stocks at each point in time
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtests without point-in-time data systematically overstate returns by including stocks that survived to
      present day while excluding delisted/bankrupt stocks that would have been in the universe historically
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-186
    when: When selecting historical stock universe for backtesting
    action: Use point-in-time consistent historical data sources or implement stock list snapshot at each historical date
      — for each backtest date, filter the stock universe to only those stocks that existed and were tradeable at that specific
      time point
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without PIT-aware data, momentum strategies selecting top-performing stocks at each historical date inadvertently
      include stocks that survived to today, inflating backtest returns by 2-5% on average
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-187
    when: When using fetched market data for trading decisions or calculations
    action: Assume the framework detects and warns about stale data — the framework lacks stale data detection; calculations
      proceed with outdated values without any indicator when data is delayed, missing, or no longer fresh
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Trading on stale data produces incorrect signals; when market data feed is delayed or missing, strategy calculations
      use outdated prices leading to wrong orders and potential financial loss
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-188
    when: When receiving and processing market data feeds
    action: Implement staleness detection comparing data timestamp against expected update time — flag data as stale when
      timestamp exceeds threshold (e.g., 5 minutes for intraday data), trigger warning or halt calculations when data age
      exceeds tolerance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without staleness checks, strategies execute based on outdated prices without any warning; for time-sensitive
      strategies, this causes orders based on prices that no longer reflect market conditions
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-189
    when: When implementing or using iterative numerical algorithms
    action: Assume convergence is guaranteed without explicit criteria — the framework lacks convergence criteria implementation;
      iterative algorithms may run indefinitely or terminate without verifying solution quality
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Algorithms without convergence criteria may fail to converge, producing meaningless results that appear valid,
      or waste compute resources running indefinitely when early termination would be appropriate
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-190
    when: When implementing iterative algorithms for optimization, root-finding, or numerical solving
    action: Define explicit convergence criteria including maximum iterations, tolerance value, and tolerance type (absolute/relative)
      — algorithm must check criteria at each iteration and terminate when satisfied or when max_iterations reached
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without convergence criteria, algorithms may produce inaccurate results or hang indefinitely; for financial
      calculations like option pricing or portfolio optimization, wrong convergence causes pricing errors or optimization
      failures
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-191
    when: When performing matrix operations for regression, optimization, or linear algebra calculations
    action: Assume matrix operations produce reliable results without ill-conditioning checks — the framework lacks matrix
      ill-conditioning detection; numerically unstable matrices produce unreliable results that appear valid
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Ill-conditioned matrices cause numerical instability where small input changes produce large output errors;
      for portfolio optimization or regression calculations, this leads to completely wrong weight allocations or parameter
      estimates
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-192
    when: When performing matrix inversion, linear regression, or eigenvalue decomposition
    action: Calculate and check condition number before matrix operations — warn when condition_number > 1e10 (ill-conditioned),
      use pseudo-inverse or regularization when condition_number indicates instability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without ill-conditioning checks, portfolio optimization with near-singular covariance matrices produces extreme
      weights; regression with multicollinear predictors yields unstable coefficients that fail out-of-sample
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-193
    when: When calculating and reporting risk metrics for strategy evaluation
    action: Calculate max drawdown as percentage of peak value (high-water mark), not as absolute currency amount or relative
      to initial capital; use this scale-independent metric for cross-strategy comparison
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using absolute drawdown or drawdown vs initial capital produces inconsistent risk metrics across strategies
      with different capital levels, leading to incorrect capital allocation decisions
    derived_from_bd_id: BD-055
  - id: finance-C-194
    when: When ranking strategies or making capital allocation decisions
    action: Use Sharpe ratio (mean excess return / std of returns) as the primary risk-adjusted performance metric; when comparing
      to Sortino or Calmar ratios, document the rationale and verify consistent metric usage across each compared strategies
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixing Sharpe with Sortino or Calmar ratios without documentation causes inconsistent strategy rankings;
      a strategy that appears superior under Sortino may rank lower under Sharpe due to different volatility penalization
    derived_from_bd_id: BD-058
  - id: finance-C-195
    when: When analyzing futures Commitments of Traders data for market positioning signals
    action: Collect COT data at multiple granularity levels (top 5, 10, 15, 20 member positions) to capture both dominant
      trader behavior and broader market positioning; do not rely solely on top-5 or top-20 alone
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using only top-5 COT data misses mid-tier positioning signals that may indicate early trend changes; top-20
      alone dilutes the most influential positions with noise from smaller traders
    derived_from_bd_id: BD-042
  - id: finance-C-196
    when: When calculating futures commission costs for different contract types
    action: Support both fixed fee (per-lot in 元) and percentage fee (万分之) calculation modes; determine which mode applies
      based on exchange-specific fee structures for each futures contract
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using only fixed fees understates costs for high-value contracts; using only percentage fees misses contracts
      with fixed pricing; both errors cause P&L calculations to be incorrect
    derived_from_bd_id: BD-043
  - id: finance-C-197
    when: When making repeated API calls for market data within the same session
    action: Implement a caching layer (Redis, memcached, or in-process LRU cache with configurable TTL) to reduce repeated
      API calls; if caching is not implemented, account for cumulative latency and potential rate limiting in system design
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Without caching, repeated data fetches cause cumulative latency delays and may trigger exchange rate limiting,
      causing data retrieval failures during critical trading windows
    derived_from_bd_id: BD-026
  - id: finance-C-198
    when: When implementing order execution logic in backtesting
    action: Assume a default execution order (buy-first or sell-first) without explicit specification — the framework must
      enforce the business rule for order sequencing
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Incorrect execution order creates hidden leverage when capital is insufficient; buy-before-sell may rely
      on unconfirmed funds, causing live trading rejections and backtest-live divergence
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-199
    when: When implementing order execution logic in backtesting
    action: Explicitly specify and validate execution order (sell-before-buy or buy-before-sell), ensuring capital is released
      before new positions are acquired; document the rationale and verify against trading rules
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit execution order specification, the framework may execute orders in a sequence that violates
      capital constraints or margin requirements, causing live trading failures
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-200
    when: When selecting pricing models for derivatives valuation
    action: Assume a pricing model without validating its applicability boundaries — models have specific assumptions about
      option style, dividend treatment, and volatility dynamics
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using Black-Scholes for American options underestimates value by 5-10% for deep ITM puts; using European
      models on American exercises causes systematic mispricing
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-201
    when: When implementing derivatives pricing in backtesting
    action: 'Document and validate the pricing model choice against contract specifications: check option_style (European/American),
      dividend_policy (discrete/continuous), and volatility assumption; if model_type == ''BlackScholes'' then option_style
      must be ''European'''
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unvalidated model selection leads to systematic mispricing; American option values can be underestimated
      by 5-10%, causing strategies to select suboptimal positions
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-202
    when: When interpolating volatility surface across strikes and maturities
    action: Assume a default interpolation method without specifying the methodology — different interpolation schemes (spline,
      SVI, SABR) produce materially different implied volatilities for out-of-sample strikes
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Linear interpolation of volatility surface can produce kinked IV curves, causing Greeks to be unstable near
      interpolation boundaries and leading to incorrect hedge ratios
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-203
    when: When building volatility surface for options pricing
    action: Specify and document the interpolation method (e.g., cubic spline, SVI, SABR) with explicit handling for edge
      cases; validate interpolated IVs against observed market prices at calibration tenors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without validated interpolation, Greeks calculations become unstable at boundaries, causing hedging errors
      that accumulate into significant P&L deviation from expected values
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-204
    when: When solving for implied volatility from market prices
    action: Assume the implied volatility solver converges reliably for each contracts — solvers may fail to converge for
      illiquid options, far OTM strikes, or near-expiry contracts
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Non-converging solver produces NaN or invalid IV values, causing downstream Greeks calculations to fail silently
      and produce zero or infinite hedge ratios
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-205
    when: When implementing implied volatility calculation for options
    action: Implement solver convergence checks with max_iterations limit (recommend >= 100); if solver fails to converge,
      return a fallback IV (e.g., nearby tenor/moneyness IV) or mark contract as non-solvable
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without convergence handling, NaN IV values propagate through Greeks calculations, causing position-level
      calculations to fail or produce invalid hedge ratios
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-206
    when: When using equity curve R² as the primary strategy stability metric
    action: Validate that R² adequately captures strategy stability for the specific strategy type; strategies with positive
      skew but irregular returns may have high R² despite poor risk-adjusted performance; cross-validate with max_drawdown
      and Calmar ratio
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: High R² strategies may exhibit tail risk that R² doesn't capture, leading to capital allocation to strategies
      that underperform during stress periods
    derived_from_bd_id: BD-063
  - id: finance-C-207
    when: When loading factor exposure data from Ken French's database
    action: 'Verify factor data completeness and currency: check for missing values in factor columns (SMB, HML, RMW, CMA),
      validate date ranges align with strategy backtest period, and log warnings for stale factor data'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stale or incomplete factor data causes incorrect risk attribution; missing factor observations may silently
      bias alpha estimates upward by underestimating systematic risk exposure
    derived_from_bd_id: BD-067
  - id: finance-C-210
    when: When using Ken French's Fama-French factor data for portfolio construction
    action: Validate factor definitions match the intended factor model version; different database versions may have varying
      factor constructions; check factor return series for continuity at known structural breaks
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using mismatched factor definitions changes portfolio construction decisions; strategies optimized for 3-factor
      model may be sub-optimal under 5-factor model exposure constraints
    derived_from_bd_id: BD-049
  - id: finance-C-211
    when: When using exchange-provided option Greeks from SSE data
    action: 'Verify SSE Greeks methodology matches strategy assumptions: confirm option_style (European), dividend treatment,
      and volatility calculation; if SSE Greeks differ from model Greeks by > 5%, investigate source of discrepancy'
    severity: medium
    kind: domain_rule
    modality: should
    consequence: SSE Greeks are calculated under specific exchange assumptions that may differ from user's pricing model;
      discrepancies in delta hedging cause accumulated P&L deviation from expected values
    derived_from_bd_id: BD-052
  - id: finance-C-212
    when: When implementing or using numerical pricing models (finite difference, binomial tree, Monte Carlo)
    action: Assume the framework implements model calibration residual tracking and convergence diagnostics — the framework
      lacks these production-critical diagnostics capabilities
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without convergence diagnostics, failed model calibrations produce silently incorrect option prices that
      pass all checks; deep ITM options priced with unconverged parameters show 5-15% valuation errors, creating systematic
      mispricing in live trading
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-213
    when: When implementing finite difference pricing methods for options
    action: 'Implement grid stability validation with CFL condition check: dt <= (dx/sigma)^2 for diffusion equations; require
      maximum dt < critical_timestep before execution; output stability metrics in diagnostic logs'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unstable finite difference grids produce exponentially growing oscillations in option prices; for HO treasury
      options with high volatility, unstable grids can produce prices 10x or 100x actual values, completely corrupting hedge
      ratios and position values
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-214
    when: When implementing finite difference option pricing methods
    action: Assume the framework validates finite difference grid stability — the framework does not implement CFL condition
      checks or stability metrics; unstable grids execute without warning
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Unstable finite difference grids produce exponentially growing numerical oscillations; without stability
      checks, option prices diverge to infinity or become NaN, causing portfolio valuation failures in live trading systems
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-215
    when: When running finite difference option pricing calculations
    action: 'Validate grid stability before pricing: check CFL condition (dt <= dx^2 / (2*sigma^2) for explicit scheme), verify
      grid refinement produces convergent results, reject unstable parameter sets with tolerance < 1e-6'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Running finite difference on unstable grids produces meaningless oscillating prices; for high-volatility
      options, prices can overflow to NaN or infinity, corrupting all downstream risk calculations and hedge ratios
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-216
    when: When pricing options in PRC markets using the framework
    action: Assume the framework validates no-arbitrage constraints for option pricing — the framework (AKShare as data interface
      library) does not implement no-arbitrage validation; put-call parity violations are not detected
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without no-arbitrage validation, inconsistent market data produces systematically biased option prices that
      violate put-call parity; strategies based on mispriced options incur predictable losses to arbitrageurs
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-217
    when: When validating option prices before trading or risk calculation
    action: 'Verify put-call parity holds: C - P ≈ S - K*exp(-rT) within bid-ask spread tolerance; validate option price bounds
      (intrinsic value <= price <= S for calls, intrinsic value <= price <= K for puts); flag violations exceeding 0.1% as
      data errors'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Trading options that violate no-arbitrage bounds exposes strategies to immediate arbitrage losses; counterparties
      will exploit any put-call parity violations, causing systematic bleeding of capital in high-frequency option strategies
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-218
    when: When implementing portfolio optimization or risk models using covariance matrices
    action: Assume the framework handles covariance estimator selection and shrinkage automatically — the framework does not
      implement covariance estimator logic; raw sample covariance is used without regularization
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Raw sample covariance matrices with high-dimensional assets (100+ stocks) are singular or near-singular,
      causing portfolio optimization to produce extreme long/short positions; without shrinkage, optimized portfolios have
      200-500% higher variance than expected
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-219
    when: When building covariance matrices for portfolio optimization with more than 50 assets
    action: Implement covariance shrinkage using Ledoit-Wolf or Oracle Approximating Shrinkage (OAS) method; minimum shrinkage
      intensity of 0.2 for illiquid stocks; validate condition number < 1000 before optimization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using unshrunk sample covariance with many assets produces ill-conditioned matrices that amplify estimation
      errors; optimized portfolios show 3-5x higher turnover and 30-50% lower Sharpe ratios in out-of-sample testing compared
      to properly shrunk estimates
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-220
    when: When implementing position sizing logic with A-share stocks
    action: Verify position sizing calculations account for 100-share lot minimum and 1,000,000 initial capital constraint;
      validate that calculated share counts are divisible by 100; for stocks priced below 1000 RMB, verify minimum lot cost
      does not fragment capital below diversification threshold
    severity: high
    kind: domain_rule
    modality: must
    consequence: Position sizing that ignores 100-share lot constraint produces fractional share orders rejected by exchanges;
      for high-priced stocks (100+ RMB), one lot = 10,000, limiting diversification to 100 stocks maximum; strategies violate
      capital efficiency targets and diversification goals
    derived_from_bd_id: BD-088
  - id: finance-C-221
    when: When loading or updating trading calendar data for futures or COT data processing
    action: 'Implement calendar integrity validation: verify holiday dates against exchange official announcements, validate
      date range completeness, cross-check with at least two independent calendar sources before loading; reject calendars
      with gaps exceeding 3 consecutive trading days'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Corrupted calendar data causes COT data fetching on non-reporting days to return empty results treated as
      zero positions; strategy logic executes on invalid dates, mixing historical backtests with non-trading days as if markets
      operated; results are completely non-reproducible in live trading
    derived_from_bd_id: BD-091
  - id: finance-C-222
    when: When implementing A-share order execution for stock trading
    action: Round each share quantities to integer multiples of 100 (one lot) before order submission; reject any calculated
      position size not divisible by 100 with clear error message; for stocks where calculated position < 100 shares, either
      skip the position or allocate minimum lot
    severity: high
    kind: domain_rule
    modality: must
    consequence: A-share market requires trading in integer multiples of 100 shares; submitting orders with non-compliant
      share counts are rejected by exchanges, causing failed trades and missed entries in live trading while backtests assume
      successful execution
    derived_from_bd_id: BD-056
  - id: finance-C-223
    when: When implementing multi-agent trading systems or portfolio-level decision making
    action: Assume the framework provides multi-agent decision consensus or risk veto mechanisms — the framework (AKShare)
      is a data library only; it does not implement multi-agent coordination, voting, or risk veto logic
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without multi-agent consensus, independent agents may execute conflicting trades; in live trading, this causes
      margin calls, position conflicts, and regulatory compliance violations when multiple strategies manage the same account
    derived_from_bd_id: BD-GAP-031
  - id: finance-C-224
    when: When designing multi-agent trading architectures using this framework
    action: Implement an external multi-agent orchestration layer with decision consensus and risk veto rights — define agent
      roles, voting thresholds, and risk veto conditions in configuration; verify each agent decisions pass through a central
      risk controller before order submission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing multi-agent consensus leads to conflicting orders from different agents; in live trading, this causes
      position overselling, margin violations, and potential regulatory breaches when automated systems make inconsistent
      decisions
    derived_from_bd_id: BD-GAP-031
  - id: finance-C-226
    when: When calculating interest accrual, bond pricing, duration, or any time-weighted financial metric in the backtesting
      framework
    action: Assume the framework implements day count convention calculations automatically — the framework does not implement
      day count convention, and no default convention is applied
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit day count convention, accrued interest and bond pricing calculations may use inconsistent
      or incorrect conventions, causing systematic valuation errors that accumulate over time
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-227
    when: When implementing any fixed-income, interest, or time-weighted calculation in the backtesting framework
    action: Explicitly specify and document the day count convention (ACT/365, ACT/360, 30/360, 30E/360) for each time calculations
      involving dates, and validate that the convention matches the market standard for the instrument being modeled
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing day count convention leads to inconsistent accrued interest calculations, bond pricing errors, and
      potentially wrong strategy signals based on incorrectly valued positions
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-228
    when: When calculating economic indicator growth rates (YoY/MoM) for trading signal generation
    action: 'Use YoY formula (current - same_period_last_year) / same_period_last_year for trend analysis (removes seasonality,
      more stable) and MoM formula (current - previous_month) / previous_month for turning point detection (faster but noisier)
      — verify period alignment is correct: YoY requires same calendar period last year, MoM requires consecutive periods'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect period alignment in YoY calculations causes seasonal mismatches, producing spurious growth signals
      and false economic cycle transitions that lead to mistimed trading entries and exits
    derived_from_bd_id: BD-078
  - id: finance-C-229
    when: When implementing Yang-Zhang realized variance combining overnight, Rogers-Satchell, and open-close variance components
    action: Validate that overnight variance uses correct n-1 denominator and weighting coefficient k=0.34/(1.34+(n+1)/(n-1))
      is computed accurately — for small samples (n < 30), the n-1 denominator creates significant weighting coefficient bias
      that amplifies through the composite estimate
    severity: high
    kind: domain_rule
    modality: must
    consequence: A 5% bias in overnight variance contributes 0.05*(1-k)*Vrs to final RV through the Yang-Zhang composite,
      multiplying downstream through position sizing and risk calculations and causing systematic over/under-allocation
    derived_from_bd_id: BD-090
  - id: finance-C-230
    when: When calculating fashion index returns using percentage change formula (current - previous) / previous
    action: 'Verify pct_change() usage: percentage change is additive across assets but NOT across time — for multi-period
      aggregation, use log returns instead of percentage change to avoid compounding errors'
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using simple percentage change for time-additive returns produces compounding errors that accumulate over
      multiple periods, causing systematic overestimation of cumulative returns and incorrect strategy performance comparisons
    derived_from_bd_id: BD-083
  - id: finance-C-231
    when: When retrieving futures market data and distinguishing symbol types for analysis
    action: Correctly distinguish between variety (continuous series), specific contract (expiring), and main contract data
      retrieval — verify symbol type parameter matches intended data use case, as wrong symbol type returns incorrect price
      series leading to data contamination
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using variety symbol retrieves continuous series instead of specific contract data, causing price mismatches
      between backtest and live trading where expiring contract prices differ from continuous approximations
    derived_from_bd_id: BD-016
  - id: finance-C-232
    when: When calculating strategy profitability metrics for viability assessment
    action: Calculate profit factor as gross_profit divided by gross_loss (not net profit ratio or win/loss ratio) — strategies
      with PF < 1 are unprofitable regardless of win rate, and using wrong formula produces different strategy rankings
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using net profit instead of gross profit/loss ratio misclassifies strategies with high gross profits but
      low net due to costs as unprofitable, leading to incorrect elimination of viable strategies and missed trading opportunities
    derived_from_bd_id: BD-070
  - id: finance-C-233
    when: When implementing portfolio rebalancing logic
    action: Assume the framework provides an automatic rebalancing trigger mechanism — the framework does not implement rebalancing
      triggers; portfolio drift will accumulate unchecked without explicit intervention
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without a rebalancing trigger, portfolio allocations drift from targets over time, causing unintended risk
      concentration and deviation from the investment mandate
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-234
    when: When implementing portfolio management and rebalancing logic
    action: Implement a rebalancing trigger that monitors drift_percentage from target allocation; trigger rebalancing when
      drift exceeds a configurable threshold (e.g., drift > 0.05 for 5% deviation)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping rebalancing trigger implementation allows allocations to drift indefinitely, leading to unintended
      risk exposure and potential regulatory violations
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-235
    when: When implementing volatility modeling or risk calculation
    action: Assume the framework provides volatility model family selection and distribution choice — the framework does not
      implement volatility model parameterization; GARCH, stochastic volatility, or fat-tailed distributions are not available
      by default
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit volatility model selection, strategies relying on variance estimates will use naive assumptions,
      leading to mispriced options and underestimated risk
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-236
    when: When implementing volatility modeling for risk or pricing calculations
    action: Explicitly select and configure volatility model (e.g., GARCH(1,1), Heston, EWMA) and distribution (e.g., normal,
      t-distribution, skewed normal) with validated parameters for the asset class
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using default Gaussian assumptions on fat-tailed return distributions underestimates tail risk, causing VaR
      and expected shortfall calculations to be dangerously optimistic
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-237
    when: When computing factor IC (Information Coefficient) for factor analysis
    action: Assume the framework automatically handles IC demean and group alignment — the framework does not implement cross-sectional
      IC calculation with proper alignment; raw factor values may be used without normalization
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without IC demean and group alignment, cross-sectional factor rankings are distorted by outliers, producing
      misleading IC values that misrepresent factor predictive power
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-238
    when: When computing factor IC for factor research and selection
    action: Implement IC calculation with cross-sectional demean (subtract cross-sectional mean) and group alignment (align
      factor deciles with return distribution), validated by checking IC_sign matches expected_direction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping IC demean causes factors with positive mean shifts to appear artificially predictive, leading to
      incorrect factor selection and wasted research effort
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-239
    when: When processing PCAF data quality assessments
    action: Assume the framework provides PCAF data quality scoring — the framework does not implement PCAF-compliant data
      quality scoring; data quality issues will pass undetected into calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without PCAF data quality scoring, corrupted or incomplete data sources are processed without flags, propagating
      errors into risk calculations and regulatory reports
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-240
    when: When ingesting data from PCAF-regulated data sources
    action: 'Implement PCAF data quality scoring with dimensions: completeness (>95%), timeliness (<T+1 lag), accuracy (vs.
      reference source), consistency (cross-source alignment); flag records below threshold as invalid'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing PCAF scoring causes regulatory non-compliance, as data governance requirements mandate quality metrics
      for all inputs used in risk calculations
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-241
    when: When implementing feature extraction for machine learning models
    action: Assume the framework automatically handles feature extraction time boundaries — the framework does not implement
      look-ahead protection or boundary handling; features may inadvertently include future information
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without feature extraction time boundaries, ML models are trained on features that include future data, creating
      look-ahead bias that makes backtest results unreproducible in live trading
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-242
    when: When implementing feature extraction for ML-based trading strategies
    action: Enforce feature extraction boundaries by ensuring timestamp(feature) <= timestamp(label) - min_lookback_period;
      validate no feature value depends on data after the prediction timestamp
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping time boundary enforcement introduces look-ahead bias where models learn from future information,
      causing live trading performance to diverge dramatically from backtested results
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-243
    when: When implementing train/test/trade time period splitting or validation
    action: Assume the framework handles training/testing/trading time period boundaries correctly — the framework does not
      enforce temporal separation between train/test/trade phases
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper time period boundary handling, test set data can leak into training features, causing look-ahead
      bias that makes backtest results far more optimistic than live trading performance
    derived_from_bd_id: BD-GAP-026
  - id: finance-C-244
    when: When setting up backtest or live trading with train/test/trade periods
    action: Explicitly validate that train_end < test_start and test_end < live_start, and verify no data from test or live
      periods appears in training feature windows
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit temporal boundary validation, data leakage silently inflates backtest returns, causing live
      trading to underperform expectations significantly
    derived_from_bd_id: BD-GAP-026
  - id: finance-C-245
    when: When implementing RL agent training or evaluation
    action: Assume the framework's RL reward calculation accounts for transaction costs — the framework does not model transaction
      costs in the RL reward function
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without transaction cost modeling in RL rewards, the agent learns to trade excessively since it perceives
      zero-cost trades as free profit opportunities, causing massive losses in live trading
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-246
    when: When designing RL reward functions for trading strategies
    action: Subtract transaction costs from raw portfolio returns when computing RL rewards (reward = portfolio_return - transaction_cost),
      incorporating bid-ask spread, commission, and slippage estimates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without subtracting transaction costs from RL rewards, the agent over-trades to maximize unadjusted returns,
      incurring losses that erode or eliminate profits in live trading
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-247
    when: When defining state space features for RL agents
    action: Include features in the state space that contain future information relative to the decision timestamp — the framework
      does not prevent future data leakage into state features
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Including future-leaked features in state space causes the RL agent to learn patterns dependent on information
      unavailable at decision time, making learned policies useless in live trading
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-248
    when: When constructing state features for RL training
    action: Validate each state features are available at the decision timestamp (t <= current_time), verify lookback windows
      are properly aligned with historical data boundaries, and exclude any feature containing future values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without validating feature temporal alignment, future data leaks into training, producing RL policies that
      exploit look-ahead patterns and fail catastrophically in live trading
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-249
    when: When executing data pipelines during training and inference
    action: Reuse fitted transformers across train/test boundaries or assume pipeline fit state is properly isolated — the
      framework does not enforce fit/transform isolation between data splits
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper fit/transform isolation, scalers or encoders leak information across train/test splits, causing
      data leakage that makes model performance appear inflated during validation
    derived_from_bd_id: BD-GAP-029
  - id: finance-C-250
    when: When designing data pipelines for RL trading systems
    action: Create separate pipeline instances for each data split (train pipeline fits on train data only, inference pipeline
      fits on data up to current time), ensuring fit statistics from test/live data never leak into training transforms
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without isolated pipeline instances per data split, normalization parameters or encoding statistics from
      test data contaminate training features, producing models that fail to generalize to truly unseen data
    derived_from_bd_id: BD-GAP-029
  - id: finance-C-251
    when: When constructing state features from covariates in RL or ML pipelines
    action: Include covariate values in state features before those covariates are temporally available — the framework does
      not enforce time-based availability constraints on covariates
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using temporally unavailable covariates in state space introduces look-ahead bias, causing RL policies to
      appear highly profitable in backtesting but lose money in live trading where those values don't exist yet
    derived_from_bd_id: BD-GAP-030
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
