    action: Remove or reduce retry attempts to make tests pass faster
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Reducing retry logic to speed up tests creates production code that fails on real network issues
    stage_ids:
    - http_request
  - id: finance-C-025
