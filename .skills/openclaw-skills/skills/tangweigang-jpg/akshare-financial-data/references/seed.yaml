        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install pandas>=2.0.0
    - python3 -m pip install requests>=2.22.0
    - python3 -m pip install beautifulsoup4>=4.9.1
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing HTTP request functions that fetch external data
    action: Implement retry logic with exponential backoff to handle transient network failures
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without retry logic, transient network failures or temporary server issues will cause complete request failures,
      resulting in missing data and failed workflows
    stage_ids:
    - http_request
  - id: finance-C-002
    when: When implementing HTTP request functions
    action: Set a timeout value for each HTTP request to prevent indefinite hanging
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without timeout, a blocked connection can hang indefinitely, freezing the entire application and preventing
      data collection from other sources
    stage_ids:
    - http_request
  - id: finance-C-003
    when: When implementing HTTP request functions
    action: Validate that HTTP response status codes indicate success before processing data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without status code validation, error responses (404, 500, etc.) may be processed as valid data, leading
      to corrupted downstream analysis and incorrect financial calculations
    stage_ids:
    - http_request
  - id: finance-C-017
    when: When using AKShare to make investment decisions
    action: Present the data as guaranteed accurate or real-time without proper caveats
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: AKShare data is scraped from third-party sources and may contain delays, errors, or gaps; presenting it as
      guaranteed accurate could lead to financial losses
    stage_ids:
    - http_request
  - id: finance-C-027
    when: When implementing scraping functions for data acquisition
    action: implement retry logic with exponential backoff for failed HTTP requests
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Network requests to external sources (Sina, Eastmoney, THS, Jin10) will fail intermittently, causing data
      gaps in acquired datasets and disrupting downstream analysis workflows
    stage_ids:
    - data_acquisition
  - id: finance-C-028
    when: When implementing HTTP request handling
    action: check for HTTP 429 status code and raise RateLimitError specifically
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Continuous requests without respecting rate limits will result in IP blocking by data sources (Sina, Eastmoney),
      causing complete data acquisition failure
    stage_ids:
    - data_acquisition
  - id: finance-C-032
    when: When fetching A-share real-time data from Sina
    action: repeat calls without delay - Sina temporarily blocks IPs on repeated requests
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Sina Finance blocks IP addresses when detecting repeated rapid requests, causing complete data unavailability
      until the block is lifted
    stage_ids:
    - data_acquisition
  - id: finance-C-033
    when: When using Eastmoney data source
    action: handle HTTP 429 rate limit responses with specified backoff
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Eastmoney enforces API rate limits that return HTTP 429, causing data acquisition failures if not properly
      handled with backoff and retry
    stage_ids:
    - data_acquisition
  - id: finance-C-035
    when: When implementing symbol parameter mapping for different sources
    action: map stock symbols to source-specific formats (sh/sz prefixes for Sina, numeric market codes for THS)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect symbol mapping will cause API calls to return empty results or wrong data, corrupting financial
      datasets with missing or incorrect records
    stage_ids:
    - data_acquisition
  - id: finance-C-063
    when: When implementing JSON response parsing, response.json() MUST be wrapped in try-except to catch ValueError from
      malformed JSON
    action: Wrap response.json() in try-except block catching ValueError and raise DataParsingError
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Malformed JSON responses will cause unhandled ValueError exceptions, crashing downstream data processing
      and leaving the program in an inconsistent state
    stage_ids:
    - json_parsing
  - id: finance-C-064
    when: When parsing JSON responses, empty or falsy JSON data MUST raise DataParsingError with a descriptive message
    action: Check if parsed JSON data is falsy (empty dict, empty list, null, empty string) and raise DataParsingError
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Empty JSON responses masquerading as valid data will cause silent failures in downstream processing, producing
      empty DataFrames or misleading empty results instead of alerting users to the data issue
    stage_ids:
    - json_parsing
  - id: finance-C-065
    when: When receiving HTTP 429 status code, the JSON parsing stage MUST raise RateLimitError for explicit handling by callers
    action: Check for status_code == 429 and raise RateLimitError instead of treating it as a generic API error
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Rate-limited responses misidentified as generic API errors will cause callers to implement incorrect retry
      logic and delay, leading to extended downtime instead of proper rate-limit cooldown
    stage_ids:
    - json_parsing
  - id: finance-C-068
    when: When handling rate-limited responses (429), the system MUST NOT retry immediately but propagate RateLimitError to
      callers
    action: Immediately raise RateLimitError without retry when status code is 429
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Retrying rate-limited requests without cooldown will worsen the rate limit situation, potentially causing
      temporary or permanent API access loss
    stage_ids:
    - json_parsing
  - id: finance-C-077
    when: When implementing column mapping for DataFrame transformations
    action: Map raw source field names (f1, f2, f12) to meaningful Chinese column names (最新价, 涨跌幅)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream processing will fail with KeyError when trying to access columns like 最新价 if raw field names are
      not mapped
    stage_ids:
    - column_mapping
  - id: finance-C-082
    when: When defining column mapping constants
    action: Verify column name list length matches the actual data columns from API response
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Column assignment will raise ValueError if column list length does not match DataFrame columns
    stage_ids:
    - column_mapping
  - id: finance-C-087
    when: When converting string numeric columns to numeric types
    action: Use pd.to_numeric() with errors='coerce' to convert numeric columns, ensuring invalid values become NaN instead
      of raising exceptions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Uncoerced conversion raises ValueError when encountering malformed data like '-' or '--' in financial columns,
      causing the entire function to fail and preventing any data from being returned to the user
    stage_ids:
    - type_conversion
  - id: finance-C-088
    when: When preparing string columns containing comma-separated numbers for numeric conversion
    action: Remove thousand-separator commas using str.replace(',', '') before applying pd.to_numeric(), otherwise numeric
      parsing fails silently producing NaN for valid numbers
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Chinese financial data commonly uses comma separators (e.g., '1,234,567') which causes pd.to_numeric() to
      fail and convert all values to NaN, corrupting entire financial columns
    stage_ids:
    - type_conversion
  - id: finance-C-100
    when: When implementing type conversion for a new data function
    action: Skip type conversion assuming web data arrives as proper numeric types, as each AKShare data originates from HTML
      tables or JSON which always contain string representations
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping type conversion causes pandas to infer object dtype for numeric columns, leading to type errors
      when performing arithmetic operations or aggregations
    stage_ids:
    - type_conversion
  - id: finance-C-102
    when: When implementing paginated data fetching
    action: Use fetch_paginated_data utility function or implement pagination with ignore_index=True in pd.concat
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without ignore_index=True, row indices from different pages will be duplicated in the combined DataFrame,
      causing downstream column mapping errors and incorrect data alignment
    stage_ids:
    - pagination
  - id: finance-C-103
    when: When implementing paginated data fetching
    action: Add random delay between page requests to prevent rate limiting and server overload
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without random delays, consecutive page requests will trigger 429 RateLimitError exceptions, causing the
      entire data fetch operation to fail and potentially getting the IP address temporarily blocked
    stage_ids:
    - pagination
  - id: finance-C-127
    when: When passing adjust parameter with invalid value to stock_zh_a_hist() or similar functions
    action: 'Use only valid adjustment mode values: qfq (forward-adjusted), hfq (backward-adjusted), or empty string for no
      adjustment'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Dictionary KeyError exception is raised when adjust value is not in the valid set {'qfq', 'hfq', ''}, causing
      function execution to fail and returning no data
    stage_ids:
    - adjustment_processing
  - id: finance-C-132
    when: When requesting historical price data with adjustment parameters
    action: Pass correct fqt parameter value to East Money API based on adjustment mode (0=none, 1=qfq, 2=hfq)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Wrong fqt parameter causes API to return unadjusted data instead of adjusted, or vice versa, corrupting the
      entire dataset
    stage_ids:
    - adjustment_processing
  - id: finance-C-138
    when: When calculating Yang-Zhang realized volatility with overnight component
    action: verify input DataFrame contains continuous trading sessions with no missing periods between consecutive Close[i-1]
      and Open[i] candles
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Overnight volatility calculation uses ratio Open[i]/Close[i-1] (line 140), so missing periods will incorrectly
      compute overnight returns and corrupt the realized volatility estimate
    stage_ids:
    - volatility_calculation
  - id: finance-C-139
    when: When input data contains zero or missing Open prices
    action: filter out rows where Open equals zero before calculating volatility
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Division by zero in np.log(np.divide(data['High'], data['Open'])) and np.log(np.divide(data['Low'], data['Open']))
      will produce NaN values, corrupting all subsequent volatility calculations
    stage_ids:
    - volatility_calculation
  - id: finance-C-145
    when: When using the Yang-Zhang volatility calculation for live trading decisions
    action: use realized volatility as a forward-looking volatility forecast without additional modeling
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Realized volatility measures historical price variation only; using it as a prediction without proper forecasting
      model will lead to incorrect position sizing and trading losses
    stage_ids:
    - volatility_calculation
  - id: finance-C-148
    when: When the wrapper functions rv_from_stock_zh_a_hist_min_em or rv_from_futures_zh_minute_sina are called
    action: verify the returned DataFrame has DateTime index and columns renamed to Open/High/Low/Close before passing to
      volatility_yz_rv
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: volatility_yz_rv expects specific column names (Open, High, Low, Close) and datetime index; mismatches will
      cause KeyError or incorrect calculation
    stage_ids:
    - volatility_calculation
  - id: finance-C-172
    when: When implementing trading logic that depends on valid trading days
    action: Use the official trading calendar data file from the framework to determine valid trading days — do not hardcode
      date ranges or assume consecutive weekdays are trading days
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Trading on exchange holidays or non-settlement days causes order rejection in live trading, breaking backtest-live
      consistency and potentially violating exchange rules
    derived_from_bd_id: BD-032
  - id: finance-C-208
    when: When backtesting strategies that combine stop loss rules with A-share T+1 settlement constraints
    action: Assume stop loss and T+1 settlement operate independently — these constraints interact critically in limit-down
      scenarios where stop loss cannot execute same-day
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: In limit-down scenarios, T+1 settlement prevents selling shares bought the same day, so 10% stop loss cannot
      execute; position remains locked through subsequent limit-down days, compounding loss far beyond nominal 10%
    derived_from_bd_id: BD-085
  - id: finance-C-209
    when: When implementing stop loss logic for A-share strategies
    action: Detect when stop loss trigger coincides with T+1 locked positions (position_bought_today == True); if triggered,
      log warning that same-day exit is impossible, mark position as 'stop-loss-pending', and re-evaluate on next available
      trading day
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without T+1 aware stop loss handling, backtest shows instant exit at stop price but live trading fails to
      execute; this creates false confidence in strategy performance metrics
    derived_from_bd_id: BD-085
  - id: finance-C-225
    when: When implementing position management logic for A-share backtesting
    action: Verify stocks bought today cannot be sold on the same day — control available quantity via trading_t attribute
      to enforce T+1 settlement rule
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the T+1 rule causes the backtest to include same-day round-trip trades prohibited in A-share markets,
      making backtest results completely non-reproducible in live trading
    derived_from_bd_id: BD-030
  regular:
  - id: finance-C-004
    when: When implementing HTTP request functions
    action: Check for empty response data and raise an error instead of returning empty results
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty responses masked as successful requests will cause downstream pandas operations to fail with cryptic
      errors or produce empty DataFrames that corrupt analysis pipelines
    stage_ids:
    - http_request
  - id: finance-C-005
    when: When handling HTTP responses with JSON data
    action: Wrap JSON parsing in try-except to catch ValueError from malformed JSON
    severity: high
    kind: domain_rule
    modality: must
    consequence: Malformed JSON responses will cause unhandled ValueError exceptions, crashing the entire data collection
      process and leaving partial data unprocessed
    stage_ids:
    - http_request
  - id: finance-C-006
    when: When implementing HTTP request functions
    action: Set default User-Agent header to mimic browser behavior and avoid being blocked
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper User-Agent headers, requests may be rejected by web servers that block bot or script access,
      resulting in complete data unavailability
    stage_ids:
