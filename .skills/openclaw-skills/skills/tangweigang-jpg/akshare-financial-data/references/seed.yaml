    stage_ids:
    - http_request
  - id: finance-C-011
    when: When creating new HTTP request functions in any module
    action: Use raw requests.get() without timeout and retry logic for production data fetching
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Direct requests.get() calls without retry will fail on transient issues, and without timeout they may hang
