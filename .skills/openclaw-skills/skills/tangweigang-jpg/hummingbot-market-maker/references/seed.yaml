resources:
  packages:
  - name: pandas
    version_pin: ==1.5.3
  - name: numpy
    version_pin: ==1.24.4
  - name: matplotlib
    version_pin: '>=2'
  - name: requests
    version_pin: ==2.31.0
  - name: scipy
    version_pin: '>=1.3.0'
  - name: scikit-learn
    version_pin: '>1.4.2'
  - name: pytest
    version_pin: '>=8.3'
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-018
    when: When implementing position tracking for perpetual derivatives
    action: use trading_pair only as the position key for ONEWAY mode and trading_pair+side for HEDGE mode
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Position collision occurs when different position sides overwrite each other, causing incorrect position
      tracking and potential financial loss when orders are matched against wrong positions
    stage_ids:
    - position_management
  - id: finance-C-019
    when: When tracking unrealized PnL in position objects
    action: use Decimal type for each monetary calculations including unrealized_pnl and entry_price
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Floating-point precision errors cause incorrect PnL calculations, leading to wrong profit/loss reporting
      and potentially oversized orders that exceed available margin
    stage_ids:
    - position_management
  - id: finance-C-021
    when: When validating order candidates against available balance
    action: check collateral requirements including order collateral, percent fees, and fixed fees before order execution
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Orders exceed available margin, causing immediate liquidation or forced position closure at unfavorable prices
      with partial loss of collateral
    stage_ids:
    - position_management
  - id: finance-C-034
    when: When using BudgetChecker to validate perpetual orders
    action: use PerpetualBudgetChecker instead of base BudgetChecker to handle perpetual-specific collateral logic
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Incorrect collateral calculation for perpetual orders causes margin over-reservation or under-reservation,
      leading to capital inefficiency or forced liquidation
    stage_ids:
    - position_management
  - id: finance-C-039
    when: When implementing financial PnL calculations in executor calculations
    action: Use Decimal type for each monetary values to avoid floating-point precision errors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using float for monetary values causes rounding errors in PnL calculations, leading to incorrect performance
      reporting and potentially incorrect trading decisions
    stage_ids:
    - execution_control
  - id: finance-C-041
    when: When configuring TripleBarrierConfig for PositionExecutor
    action: Set stop_loss_order_type and time_limit_order_type to MARKET order type only
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-MARKET order types for stop_loss or time_limit barriers cause ValueError during executor initialization,
      preventing position protection
    stage_ids:
    - execution_control
  - id: finance-C-043
    when: When creating CreateExecutorAction messages
    action: Include valid controller_id in the action for proper executor routing
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Actions with controller_id=None cause error logging and executor creation failure, breaking controller-executor
      communication
    stage_ids:
    - execution_control
  - id: finance-C-053
    when: When handling position executor config validation
    action: Use LIMIT order type for time_limit or stop_loss barrier execution
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Using LIMIT for time_limit or stop_loss barriers causes ValueError, preventing proper position risk management
      and potential large losses
    stage_ids:
    - execution_control
  - id: finance-C-055
    when: When defining custom controller configurations
    action: Include controller_type in configuration to enable proper controller class loading
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Missing controller_type causes ImportError in get_controller_class, preventing controller instantiation
    stage_ids:
    - execution_control
  - id: finance-C-061
    when: When validating stop_loss and take_profit values
    action: Verify stop_loss and take_profit values are greater than zero
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero or negative barrier values cause incorrect position sizing or immediate position closure, leading to
      losses
    stage_ids:
    - execution_control
  - id: finance-C-062
    when: When implementing PositionExecutor, the close order must only be placed after the open order is fully filled
    action: Check open_filled_amount against amount_to_close before placing close order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Placing a close order before the open order fills causes mismatched position sizes, leading to unintended
      exposure and potential losses exceeding configured risk parameters
    stage_ids:
    - executor_execution
  - id: finance-C-063
    when: When implementing DCAExecutor, each DCA level amount must respect exchange minimum order size constraints
    action: Validate amounts_quote against min_notional_size and amounts_quote/prices against min_order_size before executing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Submitting orders below exchange minimum order size causes rejected orders, breaking the DCA strategy and
      potentially leaving positions partially unfilled at unfavorable prices
    stage_ids:
    - executor_execution
  - id: finance-C-064
    when: When implementing ArbitrageExecutor, token interchangeability must be validated before executing any trades
    action: Validate base assets are interchangeable using the predefined interchangeable token pairs list
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Executing arbitrage between non-interchangeable tokens causes permanent loss of funds, as the received tokens
      cannot be used to close the opposing position
    stage_ids:
    - executor_execution
  - id: finance-C-065
    when: When implementing executor barrier controls, stop-loss, take-profit, and time-limit barriers must each be evaluated
      each control cycle
    action: Invoke control_stop_loss, control_take_profit, and control_time_limit in each control_barriers call
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Skipping barrier evaluations allows losses to exceed configured thresholds, causing positions to remain open
      beyond risk tolerance and resulting in amplified financial losses
    stage_ids:
    - executor_execution
  - id: finance-C-066
    when: When implementing PositionExecutor triple barriers, only MARKET order types are supported for stop-loss and time-limit
    action: Configure stop_loss_order_type and time_limit_order_type to OrderType.MARKET
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Using LIMIT orders for stop-loss or time-limit causes unpredictable execution timing, potentially allowing
      price to slip beyond the intended exit level before the limit order fills
    stage_ids:
    - executor_execution
  - id: finance-C-067
    when: When implementing DCAExecutor, the amounts_quote and prices lists must have identical lengths
    action: Validate len(amounts_quote) == len(prices) during initialization
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched list lengths cause index errors when iterating during order creation, leading to crashes or incorrect
      position sizing across DCA levels
    stage_ids:
    - executor_execution
  - id: finance-C-071
    when: When placing orders, DCAExecutor and PositionExecutor must respect exchange min_order_size and min_notional_size
    action: Check order amounts against trading_rules.min_order_size and trading_rules.min_notional_size before placement
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Submitting orders below exchange minimums causes immediate rejection, breaking execution flow and potentially
      leaving partial positions exposed
    stage_ids:
    - executor_execution
  - id: finance-C-074
    when: When implementing executor lifecycle, ExecutorOrchestrator must be the sole creator of executor instances
    action: each executor instantiation must go through create_executor method with proper config validation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Direct executor instantiation bypasses config validation and event registration, causing silent failures
      in event handling and incorrect executor state
    stage_ids:
    - executor_execution
  - id: finance-C-075
    when: When implementing executor event handling, each order events must be registered through ExecutorBase event forwarders
    action: Use SourceInfoEventForwarder instances for order created, filled, completed, cancelled, and failed events
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Skipping event registration causes executor to miss order status updates, leading to stale tracked order
      state and incorrect barrier evaluations
    stage_ids:
    - executor_execution
  - id: finance-C-079
    when: When implementing ArbitrageExecutor, profitability calculation must include transaction costs
    action: Calculate net profitability as trade_pnl_pct minus tx_cost_pct before comparing to min_profitability
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Ignoring transaction costs causes false profitability signals, executing trades that lose money after fees
      and resulting in net losses
    stage_ids:
    - executor_execution
  - id: finance-C-086
    when: When implementing PositionHold.get_position_summary with NaN quote amounts
    action: calculate quote amounts lazily from mid_price before performing PnL division
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Division by zero or NaN will crash the PnL calculation when buy/sell base amounts are non-zero but quote
      amounts are NaN, causing position reports to fail
    stage_ids:
    - orchestration
  - id: finance-C-088
    when: When implementing on_stop sequence in StrategyV2Base
    action: stop controllers BEFORE stopping executor_orchestrator to prevent new executor actions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: New executor actions may be created after the stop signal, causing resource leaks or inconsistent state when
      the executor orchestrator is shut down
    stage_ids:
    - orchestration
  - id: finance-C-106
    when: When implementing DCA break-even price calculation
    action: use volume-weighted average formula (total_quote / total_amount) for break-even accuracy
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: DCA break-even price incorrectly reflects average entry cost, causing stop-loss and take-profit levels to
      trigger at wrong price points
    stage_ids:
    - backtesting
  - id: finance-C-108
    when: When validating BacktestingDataProvider DataFrame input
    action: verify executor_simulation parameter is a pandas DataFrame before processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TypeError at runtime when non-DataFrame value is passed to ExecutorSimulation, crashing the backtest
    stage_ids:
    - backtesting
  - id: finance-C-109
    when: When creating ExecutorSimulation for backtesting
    action: verify DataFrame has monotonic increasing epoch-based timestamp index for correct time-series operations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: searchsorted in get_executor_info_at_timestamp returns incorrect position, causing wrong executor state retrieval
      and incorrect PnL reporting
    stage_ids:
    - backtesting
  - id: finance-C-111
    when: When configuring DCA executor simulator
    action: set DCAMode.TAKER as the execution mode
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: NotImplementedError is raised at runtime when TAKER mode is used in DCAExecutorSimulator, preventing backtest
      from running
    stage_ids:
    - backtesting
  - id: finance-C-112
    when: When configuring backtesting resolution
    action: use a valid candle interval from the supported set (1s, 1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h, 6h, 8h, 12h, 1d, 3d,
      1w, 1M)
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Backtest fails to initialize because the candle feed cannot be created for unsupported intervals
    stage_ids:
    - backtesting
  - id: finance-C-114
    when: When implementing BacktestingEngineBase subclass
    action: implement the update_processed_data method to handle row-level data updates
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: NotImplementedError is raised during backtest execution, preventing the simulation from running
    stage_ids:
    - backtesting
  - id: finance-C-115
    when: When loading controller configuration for backtesting
    action: include both controller_type and controller_name in the configuration dictionary
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: ValueError is raised during config loading, preventing backtest from starting
    stage_ids:
    - backtesting
  - id: finance-C-116
    when: When implementing executor simulators
    action: subclass ExecutorSimulatorBase and implement the simulate method
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Backtest execution fails when calling simulate on a base class instance that raises NotImplementedError
    stage_ids:
    - backtesting
  - id: finance-C-121
    when: When presenting backtesting results
    action: claim that simulated results represent actual live trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users may deploy strategies believing backtest returns will replicate in live trading, leading to financial
      losses when slippage, liquidity, and execution delays differ
    stage_ids:
    - backtesting
  - id: finance-C-124
    when: When configuring backtesting data provider connector
    action: pass valid connector_name that exists in AllConnectorSettings and matches supported CONNECTOR_TYPES
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: ValueError is raised when attempting to backtest with unsupported or misspelled connector name
    stage_ids:
    - backtesting
  - id: finance-C-126
    when: When implementing gateway connector registration in CLI commands
    action: check gateway_status is ONLINE before registering connectors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Attempting to register gateway connectors while gateway is OFFLINE causes connector metadata to be incomplete,
      leading to trading failures when strategies attempt to use those connectors
    stage_ids:
    - cli_interface
  - id: finance-C-129
    when: When attempting runtime configuration changes via CLI config command
    action: modify strategy configuration while a strategy is running
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Attempting to modify strategy configuration while strategy is running causes 'Configuring the strategy while
      it is running is not currently supported' error, and the configuration change is rejected without saving
    stage_ids:
    - cli_interface
  - id: finance-C-131
    when: When validating connector configuration via CLI
    action: check connector exists in valid connector set including GATEWAY_CONNECTORS
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Specifying an invalid connector name in configuration causes validation error and prevents strategy from
      starting, requiring users to reconfigure with valid connector names
    stage_ids:
    - cli_interface
  - id: finance-C-157
    when: When implementing gateway chain and network auto-detection
    action: fetch chain and network configuration from gateway before initializing connectors
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing chain/network configuration causes incorrect blockchain targeting, routing transactions to wrong
      networks and permanent fund loss
    stage_ids:
    - gateway_integration
  - id: finance-C-165
    when: When MarketDataProvider is used to retrieve price data for signal generation in execution_control
    action: Verify market_data_provider.ready returns True before consuming price data or candles for trading decisions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Execution control generates signals using stale or incomplete market data, causing orders to execute at incorrect
      prices or on outdated information
    stage_ids:
    - market_data
    - execution_control
  - id: finance-C-166
    when: When controllers send ExecutorAction messages to the orchestration layer
    action: Use only CreateExecutorAction, StopExecutorAction, or StoreExecutorAction with valid executor_config containing
      required fields (id, type, controller_id)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Orchestrator fails to process executor actions, causing orders to never execute or hang indefinitely in pending
      state
    stage_ids:
    - execution_control
    - orchestration
  - id: finance-C-168
    when: When ExecutorOrchestrator creates an executor from CreateExecutorAction
    action: Pass the StrategyV2Base instance to the executor constructor for market data and connector access
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Executor cannot access market data or execute orders, causing all trading operations to fail silently
    stage_ids:
    - orchestration
    - executor_execution
  - id: finance-C-172
    when: When backtesting engine receives executor configurations from orchestration
    action: Use BacktestingDataProvider instead of live MarketDataProvider to verify simulated price data and no real API
      calls
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Live data feed during backtesting causes real API calls, rate limit violations, and non-deterministic backtest
      results
    stage_ids:
    - orchestration
    - backtesting
  - id: finance-C-173
    when: When backtesting engine simulates executor execution
    action: Set market_data_provider.prices using Decimal(row['close_bt']) for simulation, not live market prices
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using live prices during backtesting introduces look-ahead bias and invalidates backtest results
    stage_ids:
    - orchestration
    - backtesting
  - id: finance-C-193
    when: When implementing controllers or strategies in Hummingbot
    action: Use Decimal type for each prices and amounts to avoid floating-point errors in financial calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Floating-point arithmetic causes rounding errors in order sizing and PnL calculations, leading to order rejections,
      incorrect position sizing, or financial discrepancies in live trading
  - id: finance-C-194
    when: When tracking order state transitions in Hummingbot
    action: 'Follow the InFlightOrder state machine: PENDING_CREATE -> OPEN -> FILLED/CANCELLED/FAILED'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the state machine causes incorrect order tracking, potential double-sends, or orphaned orders that
      are not properly reconciled with the exchange
  - id: finance-C-195
    when: When configuring executor timestamps in Hummingbot
    action: Use seconds since epoch (float) for each timestamp fields in ExecutorConfig
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using non-epoch timestamps causes executor identification failures, incorrect backtest alignment, and inability
      to correlate events across the trading system
  - id: finance-C-196
    when: When placing orders through the Hummingbot execution layer
    action: Lock collateral via BudgetChecker before any order placement attempt to prevent overspending
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without budget checking, strategies may attempt orders exceeding available balance, causing rejected orders,
      partial fills, or in severe cases, account liquidations on leveraged positions
  - id: finance-C-197
    when: When implementing custom controllers in Hummingbot Strategy V2
    action: Implement update_processed_data() method to update indicators before determine_executor_actions() is called
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Skipping indicator updates causes stale signals to be used for trading decisions, leading to trades based
      on outdated market conditions and potential significant losses
  - id: finance-C-215
    when: When implementing performance tracking in executor orchestration
    action: Replace in-memory caching with database writes on every tick — the framework relies on in-memory caching for performance
      during the tick loop and persists only on graceful shutdown
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Adding database writes to the tick loop introduces ~10ms overhead per tick, causing backtest loop degradation
      and live trading latency spikes that exceed timing requirements
    derived_from_bd_id: BD-021
  - id: finance-C-218
    when: When implementing statistical arbitrage pair selection
    action: Use sklearn LinearRegression for cointegration analysis — the model choice is mandatory for statistical validity;
      do not replace with simpler rolling correlation methods
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using rolling correlation instead of LinearRegression-based cointegration produces false pair selection signals
      during mean-reversion regime changes, causing the strategy to trade non-cointegrated pairs that diverge and result in
      losses
    derived_from_bd_id: BD-011
  - id: finance-C-219
    when: When implementing grid executor order generation
    action: Generate buy order levels below mid-price and sell order levels above mid-price symmetrically — verify zero net
      delta when grid is perfectly centered
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Asymmetric grid levels introduce directional bias where the executor accumulates net long or short exposure,
      causing the strategy to lose money on directional moves it should be market-neutral on
    derived_from_bd_id: BD-017
  - id: finance-C-231
    when: When implementing stop loss evaluation in DCA executor MAKER mode
    action: Trigger stop loss when net_pnl_pct <= -stop_loss (comparing net percentage against negative threshold) — verify
      the stop_loss value is stored as positive and the comparison negates it
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using net_pnl_pct >= stop_loss without negation triggers stop on profits instead of losses; using absolute
      values causes position exit at wrong thresholds, leading to premature forced liquidation in profitable trades
    derived_from_bd_id: BD-035
  - id: finance-C-237
    when: When initializing perpetual market making with leverage and position mode settings
    action: 'Set leverage value before setting position mode — the sequence must be: set_leverage() then set_position_mode()
      to verify margin calculations use correct leverage from initialization'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Setting position mode before leverage causes margin calculations to use incorrect leverage assumptions, resulting
      in either insufficient margin being reserved or excessive capital being locked, leading to position sizing errors and
      potential forced liquidations
    derived_from_bd_id: BD-058
  - id: finance-C-260
    when: When implementing close order logic in HEDGE mode position management
    action: 'Calculate close_order_side as the opposite of config.side: LONG positions close with SELL orders, SHORT positions
      close with BUY orders — do not use hardcoded side values'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect close order side causes positions to open instead of closing, doubling exposure and potentially
      triggering unintended liquidation when AI refactors order logic
    derived_from_bd_id: BD-103
  - id: finance-C-262
    when: When running strategies with default configurations in HEDGE mode
    action: Explicitly set leverage to conservative values (1x-2x) for HEDGE mode controllers — do not rely on PositionExecutor's
      default leverage=1 if using DirectionalTradingControllerConfigBase or MarketMakingControllerConfigBase which default
      to 20x
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Controller-level 20x leverage overrides executor's 1x safety default, turning a 5% adverse move into 100%
      loss vs 5% loss at 1x leverage, causing rapid liquidation for uninformed users
    derived_from_bd_id: BD-112
  - id: finance-C-266
    when: When initializing position tracking for perpetual connectors
    action: 'Verify position mode (HEDGE/ONEWAY) is set after market ready with retry logic, and leverage is set before position
      mode — verify position keying structure (HEDGE: trading_pair+side, ONEWAY: trading_pair) matches current mode to prevent
      silent tracking corruption'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Initialization ordering failure causes position tracking to use wrong keying structure, resulting in close
      orders using incorrect close_order_side and reduce_only flags, silently corrupting position management across all perpetual
      connectors
    derived_from_bd_id: BD-119
  - id: finance-C-307
    when: When implementing TripleBarrier configuration for position protection
    action: Keep stop_loss_order_type and time_limit_order_type defaulting to MARKET — any custom order type override must
      explicitly document the non-execution risk during adverse market conditions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Changing to LIMIT orders creates non-guaranteed execution risk during fast market moves; partial fills or
      non-execution of barrier protection leads to unlimited loss exposure in live trading
    derived_from_bd_id: BD-097
  regular:
  - id: finance-C-001
    when: When implementing price calculation in the market data layer
    action: Use Decimal type for each price and rate calculations to avoid floating-point precision errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point calculations can introduce rounding errors that cause incorrect price values, leading to wrong
      trading decisions and financial loss
    stage_ids:
    - market_data
  - id: finance-C-002
    when: When validating rate source price data
    action: Validate that bid_price > 0 and bid_price <= ask_price before accepting price data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid price data with zero or inverted bid/ask values causes incorrect portfolio valuation and wrong trade
      sizing
    stage_ids:
    - market_data
  - id: finance-C-003
    when: When parsing candle data from exchange APIs
    action: Verify candle timestamps are in seconds and sorted in ascending order (oldest first, newest last)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unsorted or incorrectly formatted timestamps cause indicators to use wrong data points, producing invalid
      trading signals
    stage_ids:
    - market_data
  - id: finance-C-004
    when: When processing order book data
    action: Verify order book snapshots contain non-zero bid and ask levels before using the data for trading decisions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty or stale order book data causes incorrect mid-price calculation and may trigger trades at extreme prices
    stage_ids:
    - market_data
  - id: finance-C-005
    when: When making HTTP requests to Gateway API
    action: Set a 30-second timeout on each API requests to prevent indefinite blocking
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without timeout protection, a stalled Gateway connection freezes the trading strategy, missing market opportunities
    stage_ids:
    - market_data
  - id: finance-C-006
    when: When caching rate source price data
    action: Use a 30-second TTL cache for rate source prices to balance freshness and API load
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Stale cached prices older than 30 seconds cause outdated portfolio valuations and incorrect trade sizing
    stage_ids:
    - market_data
  - id: finance-C-007
    when: When monitoring Gateway connectivity status
    action: Poll Gateway status every 2 seconds with 1 second timeout per ping
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Slow polling intervals delay detection of Gateway outages, causing strategies to operate with stale market
      data
    stage_ids:
    - market_data
  - id: finance-C-008
    when: When initializing order book tracking for a trading pair
    action: Wait with a 30-second timeout for order book to receive at least one snapshot with bids and asks
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Attempting to trade before order book initialization completes results in trades at stale or zero prices
    stage_ids:
    - market_data
  - id: finance-C-009
    when: When creating non-trading connectors for public data access
    action: Initialize non-trading connectors with at least one trading pair to maintain WebSocket subscription
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without a trading pair subscription, exchanges close WebSocket connections, causing data feed to stop receiving
      updates
    stage_ids:
    - market_data
  - id: finance-C-010
    when: When starting Gateway monitoring loop
    action: Verify Gateway is ONLINE before marking any connector status as ONLINE
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Reporting connector as ONLINE while Gateway is OFFLINE causes trading strategies to attempt operations that
      will fail
    stage_ids:
    - market_data
  - id: finance-C-011
    when: When adding trading pairs to non-trading connectors
    action: Add the trading pair to connector._trading_pairs BEFORE calling start_network
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling start_network before adding trading pair causes WebSocket to initialize without subscriptions, leading
      to data feed failure
    stage_ids:
    - market_data
  - id: finance-C-012
    when: When accessing connector data through MarketDataProvider
    action: Use get_connector_with_fallback to prefer trading connectors over non-trading connectors
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Directly accessing non-trading connector bypasses trading connector with API keys, causing authentication
      failures for protected endpoints
    stage_ids:
    - market_data
  - id: finance-C-013
    when: When caching non-trading connectors
    action: Use LazyDict to lazily create non-trading connector instances only when first accessed
    severity: low
    kind: architecture_guardrail
    modality: must
    consequence: Creating non-trading connectors eagerly wastes memory and network resources when only trading connector data
      is needed
    stage_ids:
    - market_data
  - id: finance-C-014
    when: When checking candle data integrity
    action: Verify candle timestamps are equidistant and match the specified interval
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-equidistant candles indicate data gaps or missing candles, causing indicators to produce incorrect values
    stage_ids:
    - market_data
  - id: finance-C-015
    when: When retrieving prices for configured trading pairs
    action: Claim real-time data availability when using polling-based market data
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Market data retrieved via REST polling has inherent delay, cannot be presented as true real-time data for
      trading decisions
    stage_ids:
    - market_data
  - id: finance-C-016
    when: When processing network error during data fetch
    action: Wait 60 seconds before retrying after network error to avoid hammering failing endpoints
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Immediate retry of failed network requests amplifies load on failing endpoints, potentially extending outages
    stage_ids:
    - market_data
  - id: finance-C-017
    when: When fetching price data from rate sources
    action: Return Decimal('0') as fallback price instead of None to prevent arithmetic errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Multiplying None by Decimal causes TypeError, crashing price-dependent calculations and freezing strategies
    stage_ids:
    - market_data
  - id: finance-C-020
    when: When emitting funding payment events in the polling loop
    action: only fire FundingPaymentCompletedEvent when timestamp strictly increases from previous value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate funding payment events are emitted, causing strategies to incorrectly count funding fees and report
      inflated costs or double-process funding receipts
    stage_ids:
    - position_management
  - id: finance-C-022
    when: When processing perpetual order candidates with leverage
    action: divide collateral requirement by leverage factor and set order collateral to zero for position_close orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect margin calculation causes either over-reservation of collateral (reducing capital efficiency) or
      under-reservation leading to forced liquidation
    stage_ids:
    - position_management
  - id: finance-C-023
    when: When setting position mode on a perpetual connector
    action: verify the target mode is in the supported_position_modes() list before executing exchange API call
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unsupported position mode rejection causes order placement failures and strategy execution halts
    stage_ids:
    - position_management
  - id: finance-C-024
    when: When adding trading pairs dynamically to a perpetual connector
    action: initialize funding_info for the trading pair before adding it to the tracked pairs list
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Uninitialized funding info causes position calculations to fail or use stale data, resulting in incorrect
      unrealized PnL and margin calculations
    stage_ids:
    - position_management
  - id: finance-C-025
    when: When removing trading pairs from a perpetual connector
    action: clean up funding_info, leverage settings, and trading_pairs list together atomically
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Partial cleanup leaves orphaned funding info or leverage settings, causing memory leaks and stale data affecting
      subsequent calculations
    stage_ids:
    - position_management
  - id: finance-C-026
    when: When polling for position updates in the status polling loop
    action: call _update_positions() together with _update_balances() and _update_order_status() in the same polling cycle
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Stale position data causes strategies to make decisions based on outdated information, leading to incorrect
      order sizing or timing
    stage_ids:
    - position_management
  - id: finance-C-027
    when: When tracking order leverage during order creation
    action: fetch current leverage setting from the connector and attach it to the in-flight order before submission
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Order submitted with wrong leverage, causing incorrect margin calculation and potential immediate liquidation
    stage_ids:
    - position_management
  - id: finance-C-028
    when: When starting and stopping perpetual connector network
    action: start PerpetualTrading task and funding info listener when network starts, and cancel tasks and clear data when
      network stops
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Orphaned tasks continue running after connector shutdown, causing resource leaks and potential race conditions
      during reconnection
    stage_ids:
    - position_management
  - id: finance-C-029
    when: When calculating position key for position mode switching scenarios
    action: migrate existing positions to new key format when switching from ONEWAY to HEDGE mode or vice versa
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Positions become inaccessible after mode switch because keys change format, causing position loss and incorrect
      PnL tracking
    stage_ids:
    - position_management
  - id: finance-C-030
    when: When handling position updates where amount equals zero
    action: remove the position from account_positions dictionary instead of keeping zero-amount entries
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Zero-amount positions persist in tracking, causing strategies to incorrectly assume active positions exist
      and miscalculate margin requirements
    stage_ids:
    - position_management
  - id: finance-C-031
    when: When processing funding info updates for uninitialized trading pairs
    action: apply funding info updates to trading pairs that have not been initialized with initialize_funding_info()
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: KeyError or stale funding data causes crash or incorrect calculations for dynamically added trading pairs
    stage_ids:
    - position_management
  - id: finance-C-032
    when: When validating position action against supported actions
    action: raise ValueError if position_action is not PositionAction.OPEN or PositionAction.CLOSE
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid position action causes unexpected order behavior and potential position tracking corruption
    stage_ids:
    - position_management
  - id: finance-C-033
    when: When setting position mode that fails on exchange
    action: revert to previous successful position mode for each trading pairs and trigger PositionModeChangeFailed event
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Partial mode change leaves connector in inconsistent state with mixed position modes across trading pairs
    stage_ids:
    - position_management
  - id: finance-C-035
    when: When claiming position summaries reflect exchange state
    action: claim position summaries are real-time or accurate between exchange polling intervals
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Strategies execute trades based on stale position data, causing orders that exceed margin limits or trade
      against already-filled positions
    stage_ids:
    - position_management
  - id: finance-C-036
    when: When recording funding payment events for historical analysis
    action: claim funding payment records represent exact exchange settlement timestamps
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Funding payment timestamps are based on polling results, which may not match exact exchange settlement times
      due to polling interval delays
    stage_ids:
    - position_management
  - id: finance-C-037
    when: When tracking leverage settings
    action: default leverage to 1 when not explicitly set for a trading pair
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing leverage defaults cause division by zero or incorrect margin calculations
    stage_ids:
    - position_management
  - id: finance-C-038
    when: When implementing controller signal generation logic
    action: Use threshold-based conditions before emitting CreateExecutorAction signals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Controllers emitting actions without threshold validation cause excessive executor creation, leading to overtrading,
      increased fees, and degraded portfolio performance
    stage_ids:
    - execution_control
  - id: finance-C-040
    when: When implementing ExecutorFilter matching logic
    action: Apply non-list criteria with AND logic and list criteria with OR logic
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect filter logic causes executors to be incorrectly included or excluded, breaking strategy execution
      and causing unintended position management
    stage_ids:
    - execution_control
  - id: finance-C-042
    when: When implementing OrderExecutor with LIMIT or LIMIT_MAKER execution strategy
    action: Provide price parameter when using LIMIT or LIMIT_MAKER execution strategies
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing price for LIMIT order causes ValueError validation failure, preventing order placement
    stage_ids:
    - execution_control
  - id: finance-C-044
    when: When implementing market making controller order placement logic
    action: Check position rebalance before creating new level executor actions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping position rebalance check causes inventory imbalance, leading to unintended directional exposure
      and potential losses
    stage_ids:
    - execution_control
  - id: finance-C-045
    when: When implementing position rebalance threshold validation
    action: Calculate threshold as required_base_amount multiplied by position_rebalance_threshold_pct before comparing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect threshold calculation causes position rebalancing at wrong times, leading to excessive or insufficient
      inventory management
    stage_ids:
    - execution_control
  - id: finance-C-046
    when: When creating executor actions through controller methods
    action: Use actions queue for communication rather than direct executor instantiation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct executor creation bypasses action queue, breaking orchestrator's central execution control and causing
      state inconsistencies
    stage_ids:
    - execution_control
  - id: finance-C-047
    when: When implementing custom controller subclasses
    action: Override determine_executor_actions method to return properly typed ExecutorAction lists
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect action types cause executor_orchestrator to fail executing actions, breaking the controller-executor
      communication chain
    stage_ids:
    - execution_control
  - id: finance-C-048
    when: When implementing trading logic in DirectionalTradingController
    action: Verify signal is non-zero before calling can_create_executor to create executors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Creating executors without signal check causes inappropriate position entries, leading to losses on random
      market movements
    stage_ids:
    - execution_control
  - id: finance-C-049
    when: When handling executor state updates
    action: Initialize cached_performance for each controller_id before processing actions
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing cached performance initialization causes KeyError or incorrect performance aggregation, breaking
      reporting functionality
    stage_ids:
    - execution_control
  - id: finance-C-050
    when: When processing StopExecutorAction messages
    action: Verify executor exists in active_executors list before attempting to stop it
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Stopping non-existent executor causes error logging and returns silently, potentially masking logic errors
      in controller
    stage_ids:
    - execution_control
  - id: finance-C-051
    when: When creating LimitChaser execution strategy
    action: Provide chaser_config with distance and refresh_threshold parameters
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing chaser_config causes ValueError validation failure, preventing LIMIT_CHASER order execution
    stage_ids:
    - execution_control
  - id: finance-C-052
    when: When implementing cooldown logic between executor creations
    action: Calculate cooldown condition as time elapsed since last executor timestamp exceeds configured cooldown_time
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect cooldown calculation allows rapid executor creation, causing overtrading, excessive fees, and potential
      market impact
    stage_ids:
    - execution_control
  - id: finance-C-054
    when: When implementing market making create_actions_proposal
    action: Skip check_position_rebalance when creating new level executors
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Skipping position rebalance causes inventory drift from target allocation, leading to unintended directional
      exposure and losses
    stage_ids:
    - execution_control
  - id: finance-C-056
    when: When handling executor position summaries with NaN values
    action: Calculate quote amounts lazily when base amounts are valid and quote amounts are NaN
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using NaN quote amounts in PnL calculations produces incorrect position summaries, leading to wrong trading
      decisions
    stage_ids:
    - execution_control
  - id: finance-C-057
    when: When using trading clock for temporal calculations
    action: Use current_timestamp from strategy clock rather than system time for backtesting compatibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using system time in backtesting causes look-ahead bias and incorrect simulation results, leading to overestimated
      strategy performance
    stage_ids:
    - execution_control
  - id: finance-C-058
    when: When creating position rebalance executor for spot trading
    action: Trigger position rebalance for perpetual contract connectors
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Position rebalancing on perpetual connectors is unnecessary and may interfere with hedge mode position management
    stage_ids:
    - execution_control
  - id: finance-C-059
    when: When implementing executor type validation
    action: Verify executor config type exists in executor_mapping before instantiation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unsupported executor type causes ValueError during executor creation, breaking strategy execution
    stage_ids:
    - execution_control
  - id: finance-C-060
    when: When tracking position amounts across multiple executors
    action: Process each held_position_orders entry only once by tracking order_ids
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate order processing causes incorrect position accumulation, leading to wrong PnL calculations and
      incorrect rebalancing decisions
    stage_ids:
    - execution_control
  - id: finance-C-068
    when: When creating PositionExecutor, maximum retries defaults to 10 reflecting the longer tolerance window for position
      management
    action: Use default max_retries=10 for position executors to handle order lifecycle delays
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Setting max_retries too low causes premature executor termination during exchange latency, leaving positions
      unclosed and risking extended adverse price movement
    stage_ids:
    - executor_execution
  - id: finance-C-069
    when: When creating ArbitrageExecutor, maximum retries defaults to 3 reflecting the time-sensitive nature of arbitrage
      opportunities
    action: Use default max_retries=3 for arbitrage executors due to fleeting profitability windows
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Setting max_retries too high wastes time retrying failed arbitrage attempts while market conditions have
      already shifted, missing better opportunities
    stage_ids:
    - executor_execution
  - id: finance-C-070
    when: When implementing DCAExecutor in TAKER mode, activation_bounds must be set or default values [0.0001, 0.005] will
      be applied
    action: Provide activation_bounds or accept auto-generated 0.01% and 0.5% bounds for safety
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without activation bounds, TAKER mode executes immediately at any market price, bypassing price improvement
      opportunities and potentially entering at unfavorable levels
    stage_ids:
    - executor_execution
  - id: finance-C-072
    when: When implementing DCAExecutor, stop-loss behavior differs between MAKER and TAKER modes
    action: In MAKER mode require all_open_orders_executed before triggering stop-loss; in TAKER mode trigger immediately
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect stop-loss timing causes premature exits in MAKER mode (before all DCA levels fill) or delayed exits
      in TAKER mode (waiting for unfilled levels that will never come)
    stage_ids:
    - executor_execution
  - id: finance-C-073
    when: When implementing any executor, trailing_stop must have both activation_price and trailing_delta specified
    action: Validate trailing_stop configuration has non-null activation_price and trailing_delta values
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing trailing_stop parameters causes division errors or incorrect trigger calculations, leading to exits
      at wrong price levels or no exit at all
    stage_ids:
    - executor_execution
  - id: finance-C-076
    when: When implementing CloseType enum, each executor must set the appropriate close reason before stopping
    action: Assign close_type before calling stop() to preserve termination reason for reporting
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing close_type prevents proper performance reporting and audit trails, making it impossible to distinguish
      between stop-loss exits and other termination reasons
    stage_ids:
    - executor_execution
  - id: finance-C-077
    when: When implementing TrackedOrder, order state must be synchronized with connector's InFlightOrder
    action: Update TrackedOrder.order with InFlightOrder reference on order created and fill events
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Stale TrackedOrder state causes incorrect is_done, is_filled, and executed_amount_base calculations, leading
      to wrong barrier evaluations and premature or delayed exits
    stage_ids:
    - executor_execution
  - id: finance-C-078
    when: When implementing executor PnL calculations, realized fees must be subtracted from gross PnL
    action: Calculate net_pnl_quote as trade_pnl_quote minus cum_fees_quote
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ignoring fees in PnL causes inflated profit estimates, leading to incorrect stop-loss and take-profit trigger
      levels that do not account for actual net returns
    stage_ids:
    - executor_execution
  - id: finance-C-080
    when: When implementing executor shutdown, each pending open orders must be cancelled before executor terminates
    action: Call cancel_open_orders during shutdown process before setting status to TERMINATED
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Orphaned open orders after executor termination cause ghost positions that continue accumulating exposure
      while the executor is no longer managing risk
    stage_ids:
    - executor_execution
  - id: finance-C-081
    when: When implementing PositionExecutor shutdown process, executor must wait for each orders completed before stopping
    action: Check all_orders_completed before setting status to TERMINATED in shutdown process
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Stopping before order completion causes premature status reporting and potential double-execution when manual
      intervention attempts to close the position
    stage_ids:
    - executor_execution
  - id: finance-C-082
    when: When implementing DCAExecutor MAKER mode, order_type must be LIMIT not MARKET
    action: Set open_order_type to OrderType.LIMIT when mode equals DCAMode.MAKER
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using MARKET orders in MAKER mode defeats the purpose of DCA price averaging, causing immediate execution
      at unfavorable prices instead of limit fills
    stage_ids:
    - executor_execution
  - id: finance-C-083
    when: When running backtests with executors, simulated execution results must not be presented as live trading proof
    action: Label each backtest reports as simulated and include disclaimer about forward-looking nature
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as guaranteed live performance causes users to deploy strategies with unvalidated
      risk parameters, leading to unexpected losses when real market conditions differ
    stage_ids:
    - executor_execution
  - id: finance-C-084
    when: When evaluating executor performance, users must understand realized and unrealized PnL are estimates pending final
      settlement
    action: Display unrealized PnL with clear indication it is mark-to-market and subject to slippage
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Treating unrealized PnL as guaranteed profit causes premature take-profit exits or excessive risk-taking
      based on temporarily favorable but unrealized positions
    stage_ids:
    - executor_execution
  - id: finance-C-085
    when: When implementing executor price calculations, Decimal must be used for monetary values to avoid floating-point
      errors
    action: Use Decimal type for each PnL, price, and amount calculations instead of float
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point calculations cause rounding errors in monetary values, leading to accumulated discrepancies
      in PnL reporting and potentially incorrect barrier trigger points
    stage_ids:
    - executor_execution
  - id: finance-C-087
    when: When implementing ExecutorOrchestrator routing logic for CreateExecutorAction
    action: validate executor config type against _executor_mapping before instantiation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unsupported executor config type will raise ValueError, causing the entire action execution to fail and leaving
      the strategy in an inconsistent state
    stage_ids:
    - orchestration
  - id: finance-C-089
    when: When generating unified reports via get_all_reports
    action: call _update_positions_from_done_executors before generating executors and positions reports
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Position holds from terminated executors will not be reflected in unified reports, causing stale position
      views and incorrect performance calculations
    stage_ids:
    - orchestration
  - id: finance-C-090
    when: When creating PositionHold objects from database positions
    action: reconstruct buy/sell amounts from net position side and amount with breakeven price
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect reconstruction will cause position tracking to diverge from actual database state, leading to PnL
      miscalculation over restarts
    stage_ids:
    - orchestration
  - id: finance-C-091
    when: When executing StoreExecutorAction
    action: store an executor that is still marked as active
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Storing active executors prematurely will remove them from active tracking, causing gaps in position management
      and duplicate execution attempts
    stage_ids:
    - orchestration
  - id: finance-C-092
    when: When aggregating same-side executors into PositionHold
    action: match executors by connector_name and trading_pair with same position side
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cross-matching different position sides will cause incorrect net position calculation, inflating or deflating
      the aggregated position view
    stage_ids:
    - orchestration
  - id: finance-C-093
    when: When initializing ExecutorOrchestrator with initial_positions_by_controller
    action: skip database position loading for controllers that have initial position overrides
    severity: high
    kind: domain_rule
    modality: must
    consequence: Loading database positions when initial positions are provided will cause duplicate position tracking, leading
      to PnL double-counting
    stage_ids:
    - orchestration
  - id: finance-C-094
    when: When using backtesting_engine for historical strategy validation
    action: present simulated executor results as real execution proof
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtesting results are based on historical data without slippage modeling and order fill simulation, which
      do not reflect actual live trading conditions
    stage_ids:
    - orchestration
  - id: finance-C-095
    when: When calculating PerformanceReport global_pnl_pct
    action: handle division by zero when volume_traded is zero to avoid NaN percentages
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero will produce NaN values in performance reports, causing display issues and incorrect strategy
      analysis
    stage_ids:
    - orchestration
  - id: finance-C-096
    when: When processing actions in listen_to_executor_actions loop
    action: properly handle asyncio.CancelledError to allow clean task cancellation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Uncaught cancellation exceptions will cause the action listener task to crash, preventing new executor actions
      from being processed
    stage_ids:
    - orchestration
  - id: finance-C-097
    when: When generating performance reports with cached_performance
    action: add realized PnL from executors that are closed as POSITION_HOLD
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Double-counting will inflate the realized PnL since PositionHold separately calculates and reports realized
      PnL from matched trades
    stage_ids:
    - orchestration
  - id: finance-C-098
    when: When validating controller_id in executor actions
    action: check for None controller_id and log error without crashing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Actions with None controller_id will cause KeyError exceptions when accessing cached_performance or active_executors
      dictionaries
    stage_ids:
    - orchestration
  - id: finance-C-099
    when: When loading positions from database during initialization
    action: verify connector/trading_pair exists in current strategy markets before loading
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Loading positions from removed or unavailable markets will cause KeyError when accessing market data provider,
      breaking position reporting
    stage_ids:
    - orchestration
  - id: finance-C-100
    when: When storing positions via MarketsRecorder
    action: skip storing positions for unavailable connectors/trading_pairs in current strategy
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Attempting to record positions for unavailable markets will cause exceptions during persistence, potentially
      losing valid position data
    stage_ids:
    - orchestration
  - id: finance-C-101
    when: When implementing determine_executor_actions in strategy subclasses
    action: 'implement each three action proposal methods: create, stop, and store'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing any proposal method will cause NotImplementedError at runtime, preventing the strategy from managing
      executor lifecycle
    stage_ids:
    - orchestration
  - id: finance-C-102
    when: When handling PositionHold for perpetual connectors in hedge mode
    action: determine position side based on PositionAction (OPEN/CLOSE) in addition to executor side
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect side determination will cause position aggregation to mismatch with exchange records, leading to
      position tracking errors
    stage_ids:
    - orchestration
  - id: finance-C-104
    when: When reporting performance metrics to controllers
    action: update each controller's executors_info, positions_held, and performance_report fields individually
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Controllers will operate with stale or missing report data, causing incorrect trading decisions based on
      outdated executor state
    stage_ids:
    - orchestration
  - id: finance-C-105
    when: When storing executors and positions on strategy stop
    action: call store_all_positions and store_all_executors before clearing internal state
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Clearing state before persistence will cause permanent loss of trading history and performance data for strategy
      analysis
    stage_ids:
    - orchestration
  - id: finance-C-107
    when: When implementing financial calculations in backtesting
    action: use Decimal type for monetary values (net_pnl_quote, cum_fees_quote, filled_amount_quote)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point rounding errors accumulate in PnL calculations, causing small discrepancies that compound
      over many trades
    stage_ids:
    - backtesting
  - id: finance-C-110
    when: When using backtesting data provider
    action: use connectors that are not supported (hyperliquid_perpetual, dydx_perpetual, cube, vertex, coinbase_advanced_trade,
      kraken, dydx_v4_perpetual, hitbtc, hyperliquid, injective_v2_perpetual, injective_v2, or testnet variants)
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Backtest silently fails or returns empty results because unsupported connectors are excluded from BacktestingDataProvider
      initialization
    stage_ids:
    - backtesting
  - id: finance-C-113
    when: When fetching historical candle data for backtesting
    action: request a buffer period before start_time equal to max_records * interval_seconds to verify warm-up data availability
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Indicators or strategies requiring warm-up period receive incomplete historical data, causing incorrect signal
      generation in early backtest period
    stage_ids:
    - backtesting
  - id: finance-C-117
    when: When running backtesting simulation
    action: call run_backtesting asynchronously and pass trade_cost parameter matching live trading fees
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Backtest results become incomparable to live trading if different trade_cost values are used, invalidating
      strategy evaluation
    stage_ids:
    - backtesting
  - id: finance-C-118
    when: When executing backtest simulation loop
    action: process market data row-by-row in chronological order using iterrows
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Temporal ordering violation causes executors to receive prices out of sequence, corrupting PnL calculations
      and state tracking
    stage_ids:
    - backtesting
  - id: finance-C-119
    when: When summarizing backtest results
    action: calculate accuracy (win rate) as win_signals divided by total_positions when positions exist
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero error when calculating accuracy with zero positions, or incorrect accuracy being reported
    stage_ids:
    - backtesting
  - id: finance-C-120
    when: When computing cumulative returns in backtest simulators
    action: apply trade_cost as a deduction after cumprod calculation, not as a multiplicative factor
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cumulative returns are miscalculated, overstating or understating actual PnL due to incorrect fee application
      methodology
    stage_ids:
    - backtesting
  - id: finance-C-122
    when: When filtering historical candles for backtesting
    action: drop NaN values after merging features with candle data to verify clean time-series
    severity: medium
    kind: domain_rule
    modality: must
    consequence: NaN values in features cause incorrect signal processing or executor state corruption during backtest simulation
    stage_ids:
    - backtesting
  - id: finance-C-123
    when: When accessing candle data in backtest simulation
    action: use candle suffix columns (close_bt, open_bt, high_bt, low_bt) rather than original columns after merge
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Executor simulators receive wrong price values due to column name collision, causing incorrect entry/exit
      decisions
    stage_ids:
    - backtesting
  - id: finance-C-125
    when: When calculating max_drawdown in backtest summary
    action: track peak value using cummax and compute drawdown as (cumulative_returns - peak) for accurate risk metrics
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Max drawdown calculation produces incorrect values, misrepresenting strategy risk profile and potentially
      leading to improper capital allocation
    stage_ids:
    - backtesting
  - id: finance-C-127
    when: When configuring rate source with CoinCapRateSource
    action: set quote_token to USD for CoinCap rate source
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting a non-USD quote token with CoinCapRateSource returns empty price dictionaries, causing rate oracle
      to have missing conversion rates and incorrect quote currency calculations
    stage_ids:
    - cli_interface
  - id: finance-C-128
    when: When configuring rate source with PacificaPerpetualRateSource
    action: set quote_token to USDC for Pacifica Perpetual rate source
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting a non-USDC quote token with PacificaPerpetualRateSource raises ValueError, causing rate oracle initialization
      to fail and strategy startup to abort
    stage_ids:
    - cli_interface
  - id: finance-C-130
    when: When starting a strategy that uses gateway connectors
    action: wait for gateway to be ready within the GATEWAY_READY_TIMEOUT window
    severity: high
    kind: resource_boundary
    modality: must
    consequence: If gateway service does not come online within 300 seconds during strategy startup, the start command times
      out and the strategy fails to start, requiring manual restart
    stage_ids:
    - cli_interface
  - id: finance-C-132
    when: When running gateway-related CLI commands
    action: check gateway status is ONLINE before executing gateway operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Executing gateway commands when gateway is offline causes 'Gateway is offline' error messages and command
      failure, preventing users from performing DEX operations
    stage_ids:
    - cli_interface
  - id: finance-C-133
    when: When creating wizard configurations for controllers
    action: load valid controller module and configuration class before prompting user
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Creating a controller configuration with invalid module causes 'InvalidController' exception, and the wizard
      aborts without saving any configuration
    stage_ids:
    - cli_interface
  - id: finance-C-134
    when: When creating wizard configurations for script strategies
    action: validate script module contains valid BaseClientModel subclass before prompting
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Creating script configuration from invalid module causes 'InvalidScriptModule' exception, and the wizard
      aborts without saving any configuration
    stage_ids:
    - cli_interface
  - id: finance-C-135
    when: When saving configuration files via wizard
    action: check for duplicate file names before saving configuration
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Saving a configuration with an existing file name without user confirmation causes the wizard to recursively
      prompt for a new file name until user provides unique name
    stage_ids:
    - cli_interface
  - id: finance-C-136
    when: When registering gateway connectors dynamically
    action: build connector names with trading type appended for each connector
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Registering gateway connectors without trading type suffix causes connector lookup failures when strategies
      attempt to instantiate connectors with full connector names
    stage_ids:
    - cli_interface
  - id: finance-C-137
    when: When loading gateway connector list during monitor loop
    action: clear existing connector collections when gateway transitions from OFFLINE to ONLINE
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Failure to clear stale connector collections on gateway reconnection causes outdated connector lists to persist,
      leading to trading failures with deprecated connectors
    stage_ids:
    - cli_interface
  - id: finance-C-138
    when: When using the rate_source replaceable point for quote currency calculations
    action: validate rate source supports the configured quote token before strategy startup
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using a rate source that does not support the configured quote token causes empty price results, leading
      to incorrect position sizing and potential financial losses in live trading
    stage_ids:
    - cli_interface
  - id: finance-C-139
    when: When implementing CLI command error handling
    action: use fail_silently parameter appropriately for non-critical gateway API calls
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using fail_silently=False for optional gateway API calls during monitoring causes unnecessary error logs
      and potential command timeouts when gateway is temporarily unavailable
    stage_ids:
    - cli_interface
  - id: finance-C-140
    when: When validating decimal configuration values via CLI
    action: enforce min_value and max_value bounds when specified in validator
    severity: high
    kind: domain_rule
    modality: must
    consequence: Providing out-of-bounds decimal values for strategy parameters causes validation errors, preventing configuration
      from being saved and strategy from starting with potentially incorrect parameters
    stage_ids:
    - cli_interface
  - id: finance-C-141
    when: When using gateway connector registration in CLI interface
    action: claim gateway connector registration succeeds when gateway is unavailable
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting successful connector registration when gateway is offline creates misleading user expectations,
      leading to confusion when trading operations fail immediately after
    stage_ids:
    - cli_interface
  - id: finance-C-142
    when: When creating controller configurations via wizard
    action: claim generated configuration is immediately valid for trading without review
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Claiming wizard-generated configurations are production-ready without user review leads to poorly tuned parameters
      causing excessive trading losses
    stage_ids:
    - cli_interface
  - id: finance-C-143
    when: When performing runtime configuration updates
    action: allow configuration changes that would require strategy restart without user confirmation
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Allowing silent configuration changes that affect running strategy behavior causes unexpected trading behavior
      changes without operator awareness
    stage_ids:
    - cli_interface
  - id: finance-C-144
    when: When validating color configuration values
    action: enforce hex color code format (#RRGGBB) for each color settings
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Providing invalid color codes causes pydantic ValidationError, preventing configuration from being saved
      and displaying error to users
    stage_ids:
    - cli_interface
  - id: finance-C-145
    when: When implementing swap quote functions
    action: use Decimal type for monetary amounts and convert to float before gateway API transmission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point conversion without Decimal precision handling causes rounding errors in swap pricing calculations,
      leading to incorrect quote amounts and potential financial loss in DeFi operations
    stage_ids:
    - gateway_integration
  - id: finance-C-146
    when: When implementing token swap operations
    action: validate trade side is only BUY or SELL before gateway API calls
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid trade side passed to gateway causes ValueError with unclear error message, breaking swap execution
      flow and potentially leaving orders in inconsistent state
    stage_ids:
    - gateway_integration
  - id: finance-C-147
    when: When implementing gateway HTTP requests
    action: handle gateway timeout errors by checking for 'timeout' keyword in exception message
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent timeout error reporting from gateway libraries causes silent failures, leading to indefinite
      waits for blockchain operations that have actually timed out
    stage_ids:
    - gateway_integration
  - id: finance-C-148
    when: When implementing gateway connector initialization
    action: use GatewayHttpClient singleton pattern with shared aiohttp session for connection pooling
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Multiple GatewayHttpClient instances create separate aiohttp sessions, exhausting file descriptors and causing
      connection pool exhaustion under high throughput
    stage_ids:
    - gateway_integration
  - id: finance-C-150
    when: When implementing gateway API calls
    action: respect the 30-second HTTP request timeout limit for each gateway operations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Requests exceeding the timeout cause connection pool exhaustion, blocking subsequent gateway operations and
      freezing the trading system
    stage_ids:
    - gateway_integration
  - id: finance-C-151
    when: When implementing gateway connection pooling
    action: respect connection pool limits of 100 total connections and 30 per host
    severity: high
    kind: resource_boundary
    modality: must
    consequence: 'Exceeding connection pool limits causes ''RuntimeError: TCPConnector limit exceeded'' errors, preventing
      new gateway operations'
    stage_ids:
    - gateway_integration
  - id: finance-C-152
    when: When implementing CLMM position filtering
    action: rely on pool_address filtering in clmm_positions_owned API call
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Client-side filtering requirement is violated if server-side filtering is assumed, causing all CLMM positions
      to be fetched instead of filtered subset
    stage_ids:
    - gateway_integration
  - id: finance-C-153
    when: When implementing gateway token approval caching
    action: cache allowances locally and only request approval when allowance is insufficient
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Redundant approval transactions waste gas fees on blockchain networks, causing unnecessary transaction costs
      for every swap operation
    stage_ids:
    - gateway_integration
  - id: finance-C-154
    when: When implementing gateway status monitoring
    action: wait for gateway online status before performing trading operations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Operations against offline gateway cause cascading failures and cryptic error messages, requiring manual
      intervention to recover
    stage_ids:
    - gateway_integration
  - id: finance-C-155
    when: When implementing gateway swap execution
    action: handle non-200 HTTP responses with specific error code parsing from gateway
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unparsed gateway errors cause silent failures or cryptic exceptions, preventing proper error recovery and
      user notification
    stage_ids:
    - gateway_integration
  - id: finance-C-156
    when: When implementing gateway connector parsing
    action: parse connector names using '/' delimiter to extract connector name and type
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Invalid connector format causes KeyError or incorrect API path construction, leading to 404 errors for all
      DeFi operations
    stage_ids:
    - gateway_integration
  - id: finance-C-158
    when: When implementing gateway DEX trading
    action: assume transaction completion without waiting for blockchain confirmation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Unconfirmed transactions may revert on-chain, causing funds to be returned but creating confusion about actual
      position state and balances
    stage_ids:
    - gateway_integration
  - id: finance-C-159
    when: When implementing gateway swap quotes
    action: present quoted prices as guaranteed execution prices
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: DeFi quote prices are estimates that change with blockchain state; executing at quoted prices is not guaranteed
      and may result in significant slippage
    stage_ids:
    - gateway_integration
  - id: finance-C-160
    when: When implementing gateway position queries
    action: use specified position info methods for CLMM versus AMM connector types
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using wrong position info method causes TypeError or incorrect data parsing, leading to failed position tracking
      and incorrect P&L calculations
    stage_ids:
    - gateway_integration
  - id: finance-C-161
    when: When implementing gateway token balance retrieval
    action: include native token in balance query tokens list when fetching wallet balances
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing native token causes incorrect balance calculations, preventing proper gas fee estimation and causing
      failed transactions
    stage_ids:
    - gateway_integration
  - id: finance-C-162
    when: When implementing gateway certificate reload
    action: call reload_certs() when SSL certificates are updated to reinitialize the session
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Stale SSL certificates cause connection rejections, preventing gateway operations until certificates are
      reloaded
    stage_ids:
    - gateway_integration
  - id: finance-C-163
    when: When implementing gateway error handling
    action: log specific gateway error codes from GatewayError enum for diagnostic purposes
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unlogged gateway errors prevent troubleshooting of swap failures, liquidity issues, and blockchain connectivity
      problems
    stage_ids:
    - gateway_integration
  - id: finance-C-164
    when: When implementing gateway balance polling
    action: poll wallet balances at configured interval to detect external changes
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Stale balance data causes incorrect order sizing, failed transactions due to insufficient funds, and incorrect
      P&L reporting
    stage_ids:
    - gateway_integration
  - id: finance-C-167
    when: When controllers place ExecutorAction messages in the asyncio.Queue
    action: Set controller_id field on ExecutorAction to match the sending controller's config.id for proper routing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Executor actions are routed to wrong controller or ignored, causing position mismatches and incorrect PnL
      attribution
    stage_ids:
    - execution_control
    - orchestration
  - id: finance-C-169
    when: When executor calculates PnL and financial metrics
    action: Use Decimal type for each monetary calculations including net_pnl_quote, cum_fees_quote, and filled_amount_quote
      to avoid floating-point precision errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point rounding errors accumulate over many trades, causing incorrect PnL calculations and potentially
      funding wrong positions
    stage_ids:
    - executor_execution
    - orchestration
  - id: finance-C-170
    when: When executor_execution queries market data for order placement
    action: Use MarketDataProvider.get_price_by_type() or MarketDataProvider.get_order_book() instead of direct connector
      access for unified data interface
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct connector access bypasses caching and unified data management, causing inconsistent price data across
      the system
    stage_ids:
    - executor_execution
    - market_data
  - id: finance-C-171
    when: When executor_execution reports status back to orchestration
    action: 'Populate ExecutorInfo with each required fields: id, timestamp, type, status, config, net_pnl_pct, net_pnl_quote,
      cum_fees_quote, filled_amount_quote, is_active, is_trading'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incomplete ExecutorInfo causes performance reporting failures and inability to filter executors by status
      or PnL thresholds
    stage_ids:
    - executor_execution
    - orchestration
  - id: finance-C-174
    when: When strategy configuration is loaded from CLI interface
    action: Use StrategyV2ConfigBase.parse_controllers_config() to properly parse controller configurations with correct id
      field assignment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid controller configs cause runtime errors during strategy initialization or controllers silently fail
      to start
    stage_ids:
    - cli_interface
    - orchestration
  - id: finance-C-175
    when: When Gateway integration provides swap execution results to executor_execution
    action: Verify GatewayHttpClient connection is established before executing DeFi operations via gateway-based executors
    severity: high
    kind: resource_boundary
    modality: must
    consequence: AMM/DEX orders fail without proper gateway connection, leaving positions open at incorrect prices or unfilled
    stage_ids:
    - gateway_integration
    - executor_execution
  - id: finance-C-176
    when: When position_management provides position state to executor_execution for perpetual markets
    action: Verify connector's position_mode matches executor config (HEDGE vs ONEWAY) before placing orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Position mode mismatch causes orders to open opposite positions instead of hedging, resulting in unintended
      directional exposure
    stage_ids:
    - position_management
    - executor_execution
  - id: finance-C-177
    when: When controllers check market data readiness before generating trading signals
    action: Verify each candle feeds in market_data_provider.candles_feeds have reached max_records (ready=True) before processing
      trading signals
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Trading on incomplete candle data causes incorrect signal generation, leading to orders at wrong prices or
      wrong directions
    stage_ids:
    - market_data
    - execution_control
  - id: finance-C-178
    when: When backtesting engine processes historical candle data
    action: Use timestamp from historical data (row['timestamp_bt']) as the simulation time, not system clock time
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using system time during backtesting causes incorrect timestamp attribution and potential look-ahead bias
      in indicator calculations
    stage_ids:
    - orchestration
    - backtesting
  - id: finance-C-179
    when: When executor_execution places orders through connectors
    action: Quantize order price and amount using connector's trading rules before placing orders to avoid exchange rejections
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-quantized orders are rejected by exchange, causing missed trades and position entry failures
    stage_ids:
    - executor_execution
    - market_data
  - id: finance-C-180
    when: When StopExecutorAction is sent to orchestrator
    action: Include correct executor_id matching the active executor's config.id to properly terminate the intended executor
    severity: high
    kind: domain_rule
    modality: must
    consequence: Wrong executor_id causes wrong executor to be stopped or no executor to stop, leading to orphaned positions
      or continued unwanted trading
    stage_ids:
    - execution_control
    - orchestration
  - id: finance-C-181
    when: When storing executor results for persistence
    action: Pass the executor's current ExecutorInfo snapshot to MarketsRecorder, not a reference that may change
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Storing mutable references causes final PnL state to be incorrectly recorded or lost when executor continues
      trading
    stage_ids:
    - executor_execution
    - orchestration
  - id: finance-C-182
    when: When backtesting engine simulates PositionExecutorConfig
    action: Use position_executor_simulator or dca_executor_simulator matching the config.type for accurate simulation results
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Wrong simulator causes incorrect fill simulation, PnL calculation, and barrier evaluation, producing unreliable
      backtest results
    stage_ids:
    - orchestration
    - backtesting
  - id: finance-C-183
    when: When performance metrics are reported from orchestration to CLI
    action: Calculate global_pnl_quote as unrealized_pnl_quote + realized_pnl_quote - cum_fees_quote for conservation verification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect PnL calculation causes misrepresentation of trading performance and potential funding allocation
      errors
    stage_ids:
    - orchestration
    - cli_interface
  - id: finance-C-184
    when: When controllers determine executor actions based on market data
    action: Process data through update_processed_data() before calling determine_executor_actions() to verify indicators
      are current
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Actions based on stale indicator values cause incorrect trading decisions, potentially opening positions
      at wrong entry points
    stage_ids:
    - market_data
    - execution_control
  - id: finance-C-185
    when: When reporting backtest results as if they were live trading
    action: Present backtest results with clear indication they are simulated, not real execution proof
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest returns as live trading proof misleads stakeholders about actual strategy performance
      and real-world viability
    stage_ids:
    - orchestration
    - backtesting
  - id: finance-C-186
    when: When Gateway connector is used for DeFi operations
    action: Use connector format 'chain/protocol' (e.g., 'uniswap/amm', 'jupiter/router') when initializing Gateway data feeds
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid connector format causes Gateway API calls to fail, preventing AMM trading and LP operations
    stage_ids:
    - gateway_integration
    - executor_execution
  - id: finance-C-187
    when: When strategies are initialized and started
    action: Initialize each controllers via initialize_controllers() before starting them via controller.start() to verify
      proper state
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Starting uninitialized controllers causes NullReference errors and strategy failure at runtime
    stage_ids:
    - cli_interface
    - orchestration
  - id: finance-C-188
    when: When position state is tracked across executor lifecycle
    action: Track positions in PositionHold objects with correct connector_name, trading_pair, and side for accurate PnL aggregation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect position tracking causes PnL to be misattributed or double-counted across controllers and executors
    stage_ids:
    - position_management
    - executor_execution
  - id: finance-C-189
    when: When orchestrator handles executor actions from multiple controllers
    action: Route executor actions to the correct controller_id's active_executors list to maintain proper isolation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cross-controller executor mixing causes position confusion and incorrect PnL reporting per controller
    stage_ids:
    - execution_control
    - orchestration
  - id: finance-C-190
    when: When strategy developer assumes backtest optimization will transfer to live trading
    action: Claim backtest-optimized parameters will produce similar results in live trading without accounting for execution
      differences
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Overfitting to historical data produces parameters that fail in live markets due to slippage, latency, and
      changing market microstructure
    stage_ids:
    - orchestration
    - backtesting
  - id: finance-C-191
    when: When MarketDataProvider is queried for prices during live trading
    action: Use connector's get_price_by_type() method which accesses cached/fresh order book data, not stale internal state
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using stale cached prices causes orders to execute at outdated prices, reducing profitability and potentially
      crossing spread
    stage_ids:
    - market_data
    - execution_control
  - id: finance-C-192
    when: When determining stop loss or take profit actions for executors
    action: Verify triple_barrier_config fields (stop_loss, take_profit, time_limit) are properly evaluated against current
      market price using Decimal comparison
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect barrier evaluation causes premature or delayed position closure, resulting in unnecessary losses
      or missed profits
    stage_ids:
    - market_data
    - execution_control
  - id: finance-C-198
    when: When using PositionExecutor for perpetual or spot position management
    action: Use PositionAction.OPEN when opening positions and PositionAction.CLOSE when closing positions for side-aware
      tracking
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect PositionAction causes position tracking failures, inability to calculate correct PnL, and potential
      double-position or missed close scenarios
  - id: finance-C-199
    when: When exchanging actions between Controllers and Strategy in Hummingbot V2
    action: Use asyncio.Queue as the communication channel for Controller -> Strategy action dispatching
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing the action queue causes race conditions, lost executor actions, and inconsistent state between
      controller decisions and strategy execution
  - id: finance-C-200
    when: When tracking perpetual futures positions
    action: Maintain position state in both the connector and database for consistency
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Single-source position tracking causes discrepancies between actual exchange positions and local state, leading
      to incorrect risk calculations and potential overexposure
  - id: finance-C-201
    when: When generating executor IDs
    action: Generate unique IDs via ExecutorConfig.set_id() when not provided, using timestamp and random component with SHA256
      hash
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate executor IDs cause action targeting failures, incorrect order cancellations, and inability to track
      individual executor performance
  - id: finance-C-202
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live trading returns — backtesting ignores market impact, financing
      costs, slippage modeling approximations, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss when actual execution differs from simulation assumptions
  - id: finance-C-203
    when: When presenting Hummingbot's capabilities for trading strategies
    action: Claim support for high-frequency trading requiring sub-millisecond latency — the framework uses Python asyncio
      polling and REST/WebSocket API polling, not true low-latency execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy Hummingbot for latency-sensitive strategies where Python's GIL, network round-trips, and polling
      intervals cause significant slippage, leading to strategy failure and financial losses
  - id: finance-C-204
    when: When promoting Hummingbot for non-trading financial applications
    action: Claim Hummingbot as suitable for non-trading financial applications — the framework is architected specifically
      for exchange trading with order book integration, position management, and trade execution pipelines
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users build financial applications (e.g., payment systems, portfolio reporting) on Hummingbot's trading-centric
      abstractions, leading to architectural misfit, maintenance burden, or incorrect financial calculations
  - id: finance-C-205
    when: When offering Hummingbot to users without basic trading knowledge
    action: Claim Hummingbot is suitable for users without basic trading knowledge — the system requires understanding of
      order types, position sizing, risk management, and exchange mechanics
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Inexperienced users misconfigure strategies, ignore risk parameters, or misunderstand order behavior, leading
      to rapid account depletion, liquidations, or unintended positions
  - id: finance-C-206
    when: When presenting Hummingbot's market making capabilities
    action: Claim real-time market making with exchange-wide priority — Hummingbot uses REST/WebSocket polling and cannot
      achieve true exchange-native priority for market making strategies
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy Hummingbot as a market maker expecting to be first in queue, but polling delays and API latencies
      cause adverse selection, inventory accumulation, and systematic losses
  - id: finance-C-207
    when: When configuring time-related parameters in Hummingbot
    action: Use the TimeSynchronizer to align local clock with exchange servers before placing time-sensitive orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Clock skew causes order rejections for time-in-force orders, incorrect stop-loss trigger times, and failed
      API authentication due to timestamp mismatches
  - id: finance-C-208
    when: When implementing custom exchange connectors
    action: Quantize order prices and amounts according to exchange trading rules to prevent rejection
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unquantized orders violate exchange minimum tick size or lot size requirements, causing order rejection and
      missed trading opportunities
  - id: finance-C-209
    when: When running backtests in Hummingbot
    action: Use trade_cost parameter to account for trading fees — default trade_cost of 0.0006 (0.06%) is a minimum approximation
      that may underestimate actual costs
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Underestimating trading costs causes backtest results to overstate profitability; live trading with higher
      fees leads to losses where backtests showed gains
    stage_ids:
    - orchestration
  - id: finance-C-210
    when: When submitting pull requests to Hummingbot
    action: Achieve minimum 80% unit test coverage for each new testable behavior
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Untested code paths cause regressions, undetected bugs in production, and decreased confidence in system
      reliability
  - id: finance-C-211
    when: When deploying Hummingbot in production
    action: Run in dry-run/paper trading mode for at least 72 hours before live deployment to verify configuration stability
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Deploying without adequate dry-run testing risks misconfigured strategies, API connectivity issues, or unintended
      position openings causing immediate financial losses
  - id: finance-C-212
    when: When using the connector_name+trading_pair pattern for market identification
    action: Use the ConnectorPair frozen model or combine connector_name and trading_pair as '{connector_name}_{trading_pair}'
      for consistent market key generation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent market key formatting causes market data lookup failures, incorrect order routing, and inability
      to correlate positions across modules
  - id: finance-C-213
    when: When implementing order placement logic in execution control
    action: Lock collateral atomically via BudgetChecker before submitting any order — the locking operation must complete
      and succeed before the order is dispatched to the exchange
    severity: high
    kind: domain_rule
    modality: must
    consequence: Placing orders without pre-lock causes race conditions where concurrent executors collectively place orders
      exceeding available balance, resulting in partial fills and position inconsistencies that lock user capital in unresolved
      states
    derived_from_bd_id: BD-005
  - id: finance-C-214
    when: When implementing lost order detection logic in market data handling
    action: Verify that the lost_order_limit parameter matches the specific exchange reliability characteristics — configure
      per-connector rather than relying on global defaults for production use
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using an incorrect lost order detection limit causes either infinite retry loops exhausting API rate limits
      or premature order state changes that leave funds locked in unresolved states
    derived_from_bd_id: BD-003
  - id: finance-C-216
    when: When implementing position tracking in perpetual trading
    action: Use trading_pair plus side (long/short) as the composite position key — verify position lookups and updates include
      the side dimension to maintain independent tracking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using only trading_pair as the key collapses long and short positions into a single net position, causing
      erroneous PnL calculations and position sizing errors that result in incorrect strategy behavior
    derived_from_bd_id: BD-004
  - id: finance-C-217
    when: When configuring trade cost parameters for backtesting
    action: Verify that the trade cost flat percentage matches actual broker fee structures — confirm the 0.06% default captures
      the maker/taker blend for the target exchange and adjust for tier-based or per-exchange variations if needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default trade cost of 0.06% may not reflect actual fees for all exchanges, causing backtest results to diverge
      from live trading by 2-5% per side and leading to strategies that appear profitable in backtesting but lose money live
    derived_from_bd_id: BD-025
  - id: finance-C-220
    when: When implementing TWAP executor order splitting
    action: Split total order amount into time-based slices using TWAP methodology — child orders must be distributed evenly
      across the execution time window
    severity: high
    kind: domain_rule
    modality: must
    consequence: Executing single large orders without TWAP slicing causes significant market impact and price slippage, making
      execution costs 3-8% higher than anticipated and destroying strategy edge
    derived_from_bd_id: BD-018
  - id: finance-C-221
    when: When implementing position management logic in PositionExecutor
    action: Track open and close orders as separate TrackedOrder objects with independent state management (pending/filled/failed)
      — do not merge into single order tracking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Merging open and close order tracking breaks hedge position management where closing an existing position
      must not interfere with the opening order's fill tracking, causing position state cross-contamination
    derived_from_bd_id: BD-014
  - id: finance-C-222
    when: When implementing strategy configuration storage
    action: Use Pydantic models (BaseClientModel) for strategy config storage to enable automatic runtime validation — do
      not use raw dict storage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using dict storage loses runtime validation, causing invalid trading_pair formats, out-of-range risk parameters,
      or type mismatches to fail silently at startup and produce cryptic errors during execution
    derived_from_bd_id: BD-026
  - id: finance-C-223
    when: When implementing risk management for position executors
    action: Use TripleBarrierConfig for per-executor stop-loss/take-profit/time-limit configuration — do not implement global
      hard-coded risk limits
    severity: high
    kind: domain_rule
    modality: must
    consequence: Global hard-coded limits eliminate per-strategy and per-executor risk differentiation, preventing sophisticated
      strategies that adjust risk tolerance by market condition or signal strength
    derived_from_bd_id: BD-009
  - id: finance-C-224
    when: When implementing DCA executor order placement logic
    action: Validate min_order_size before placing each DCA level using is_any_amount_lower_than_min_order_size check — do
      not skip pre-placement validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping pre-validation allows partial fills below exchange minimums that skew the volume-weighted average
      price, invalidating break-even calculations and causing incorrect stop-loss/take-profit triggers
    derived_from_bd_id: BD-015
  - id: finance-C-225
    when: When implementing controller to executor action dispatch
    action: Use asyncio.Queue for action dispatch between controllers and executors — do not use synchronous calls or blocking
      patterns
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Synchronous calls create hard coupling where slow executor initialization (gateway API calls) blocks controller
      evaluation cycles, breaking the ~100ms tick rate target and causing signals to be evaluated on stale data
    derived_from_bd_id: BD-007
  - id: finance-C-226
    when: When implementing connector lifecycle management in StrategyV2Base or ExecutorOrchestrator
    action: Use NetworkBase inherited APIs (start/stop/check) for connector lifecycle management — do not implement connector-specific
      lifecycle handling branches
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Connector-specific lifecycle handling introduces branching code and integration complexity; without unified
      NetworkBase patterns, StrategyV2Base cannot reliably manage diverse connector types
    derived_from_bd_id: BD-027
  - id: finance-C-227
    when: When implementing DCA executor simulators for backtesting
    action: 'Compute break-even price using weighted average formula: sum(level_price × level_amount) / total_filled_amount
      — do not use simple arithmetic mean'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Simple arithmetic mean produces incorrect break-even prices when DCA levels have varying fill sizes, causing
      systematic errors in stop-loss and take-profit trigger accuracy during backtesting
    derived_from_bd_id: BD-024
  - id: finance-C-228
    when: When implementing early stop logic in DCA executor
    action: Support the keep_position flag to cancel open orders while maintaining filled positions — do not force liquidation
      when early stop is triggered with keep_position=True
    severity: high
    kind: domain_rule
    modality: must
    consequence: Forcing liquidation instead of maintaining filled positions causes irreversible trades that cannot be undone,
      resulting in loss of accumulated positions and preventing manual strategy adjustment
    derived_from_bd_id: BD-042
  - id: finance-C-229
    when: When calculating close order amount in DCA executor
    action: Calculate close order amount as delta between open_filled_amount and close_filled_amount (net position) — do not
      use original configured amount or current total position
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using original configured amount or current total position instead of net delta causes over-closing or under-closing
      after partial closes, leading to forced liquidation of unfilled positions or incomplete exit
    derived_from_bd_id: BD-045
  - id: finance-C-230
    when: When implementing inventory skew calculation for order sizing
    action: Use linear interpolation to calculate bid/ask adjustment ratios based on base asset value vs target value — do
      not use step functions or exponential methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Step function creates abrupt sizing changes causing market impact; exponential method may be too aggressive
      causing over-correction and inventory imbalance that increases adverse selection risk
    derived_from_bd_id: BD-046
  - id: finance-C-232
    when: When implementing trailing stop activation logic in DCA executor
    action: Activate trailing stop only when net_pnl_pct > activation_price threshold — do not activate immediately upon position
      open
    severity: high
    kind: domain_rule
    modality: must
    consequence: Immediate trailing stop activation without profit threshold causes premature stop triggers during position
      establishment, locking in losses before meaningful gains are achieved
    derived_from_bd_id: BD-036
  - id: finance-C-233
    when: When calculating spread for liquidity mining orders
    action: Use max(base_spread, volatility * multiplier) formula for spread calculation — do not use fixed spread or max(volatility
      * multiplier) alone
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fixed spread without volatility adaptation causes inadequate compensation during volatile periods,
      leading to adverse selection losses; using max without base_spread could result in zero spread with zero volatility
    derived_from_bd_id: BD-054
  - id: finance-C-234
    when: When managing multiple same-side executors for the same trading pair in ExecutorOrchestrator
    action: Aggregate multiple same-side executors into a single PositionHold — do not track positions independently per executor
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Independent per-executor position tracking fragments portfolio view, causing incorrect portfolio risk assessment,
      duplicate position warnings, and inability to properly evaluate aggregate exposure across multiple controllers
    derived_from_bd_id: BD-019
  - id: finance-C-235
    when: When processing CLMM and AMM positions in gateway integration
    action: Use separate position APIs for CLMM (Uniswap V3-style) and AMM positions — CLMM requires tick_range, liquidity_amount,
      and fee_tier parameters distinct from standard AMM position models
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using unified position model for CLMM ignores tick ranges and concentrated liquidity parameters, causing
      incorrect position size calculation and impossible liquidation threshold computation for concentrated positions
    derived_from_bd_id: BD-030
  - id: finance-C-236
    when: When implementing spread calculation logic in liquidity mining
    action: Apply max_spread cap to prevent volatility multipliers from creating spreads that exceed the maximum threshold
      — verify calculated spread is clamped to max_spread value before order submission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without max spread cap enforcement, volatility multipliers could create prohibitively wide spreads that render
      all orders uncompetitive and unexecutable, causing the strategy to fail to provide liquidity while still consuming capital
    derived_from_bd_id: BD-055
  - id: finance-C-238
    when: When implementing or modifying the order proposal generation pipeline
    action: 'Maintain the exact pipeline sequence: create_base_proposal -> apply_order_levels_modifiers -> apply_order_price_modifiers
      -> apply_budget_constraint — each stage must complete before the next begins'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reordering the pipeline stages causes budget constraints to be applied before price modifiers or order levels,
      resulting in incorrect order sizes and prices that cannot be executed within available capital
    derived_from_bd_id: BD-059
  - id: finance-C-239
    when: When calculating buy budget allocation in liquidity mining
    action: 'Subtract existing base asset holdings value from market portion before determining quote budget — formula must
      be: quote_budget = market_portion - (existing_base_holdings * current_price)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failing to subtract existing base holdings causes the strategy to over-allocate capital to buy orders for
      assets already exceeding target allocation, leading to portfolio imbalance and excessive capital deployment
    derived_from_bd_id: BD-050
  - id: finance-C-240
    when: When implementing order refresh tolerance comparison logic
    action: Use strict inequality (>) for tolerance comparison — must NOT use >= or == to compare price deviation against
      order_refresh_tolerance_pct
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using non-strict inequality (>=) or equality (==) for tolerance comparison causes unnecessary order refresh
      loops at exact boundary values due to floating-point precision errors, resulting in excessive order churn and increased
      exchange fees
    derived_from_bd_id: BD-051
  - id: finance-C-241
    when: When validating budget for perpetual market orders
    action: Use PerpetualOrderCandidate with leverage parameter for budget validation — must NOT use non-leveraged OrderCandidate
      which ignores margin requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-leveraged OrderCandidate for budget validation ignores margin requirements in perpetual markets,
      allowing orders that exceed available margin to pass validation and cause margin liquidation events
    derived_from_bd_id: BD-074
  - id: finance-C-242
    when: When processing MARKET orders that would cross the spread
    action: When take_if_crossed flag is enabled and a MARKET order would cross the spread, convert the order to a LIMIT order
      at the current market price instead of executing at worse price
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without take-if-crossed conversion, MARKET orders that cross the spread execute at worse prices than necessary,
      increasing slippage costs and reducing strategy profitability on fast-moving markets
    derived_from_bd_id: BD-081
  - id: finance-C-243
    when: When implementing the controller action evaluation loop
    action: Execute create_actions_proposal before stop_actions_proposal on every tick — this ordering enforces signal priority
      hierarchy and prevents stop conditions from overriding primary signals without explicit coordination flags
    severity: high
    kind: domain_rule
    modality: must
    consequence: Running stop_actions before create_actions causes signal precedence inversion where stop conditions override
      primary trading signals, leading to premature position closures and missed trading opportunities
    derived_from_bd_id: BD-100
  - id: finance-C-244
    when: When implementing or modifying ExecutorFilter filtering logic
    action: Apply AND logic between different criteria fields while using OR logic within list-based criteria — filtering
      must return empty set if ANY AND condition fails, not partial matches
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect AND/OR logic in ExecutorFilter causes wrong executors to be selected or excluded, resulting in
      positions being managed by incorrect executors or valid executors being filtered out
    derived_from_bd_id: BD-104
  - id: finance-C-245
    when: When implementing the StrategyV2Base control loop or action processing
    action: Bypass the ExecutorOrchestrator for controller action processing — each actions MUST flow through actions_queue
      to the central ExecutorOrchestrator, direct controller-to-executor communication is prohibited
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Bypassing ExecutorOrchestrator breaks the central coordination architecture, causing race conditions when
      multiple controllers issue conflicting actions and making it impossible to enforce global constraints consistently
    derived_from_bd_id: BD-108
  - id: finance-C-246
    when: When implementing CLOSE position actions in perpetual connectors
    action: Set reduce_only=true for each CLOSE position actions — verify orders only reduce existing positions and cannot
      open new ones
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without reduce_only flag, CLOSE orders may inadvertently open new positions in the opposite direction when
      no existing position exists, causing unintended directional exposure and potential losses
    derived_from_bd_id: BD-107
  - id: finance-C-247
    when: When implementing budget validation for perpetual orders with leverage parameter
    action: Account for leverage discount when validating budget — BudgetChecker locks collateral at 1x equivalent but with
      leverage>1 the actual margin requirement is 1/leverage; validate that margin requirements at fill-time do not exceed
      available margin
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: When leverage exceeds 1, BudgetChecker may show sufficient locked collateral while actual margin requirements
      at higher leverage create hidden shortfalls; positions may be underwater at fill-time causing realized losses
    derived_from_bd_id: BD-113
  - id: finance-C-248
    when: When implementing HEDGE mode position tracking and close order logic
    action: Derive close_order_side as the opposite of config.side — verify BUY closes LONG positions and SELL closes SHORT
      positions; validate side derivation produces correct opposite values before order submission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect close_order_side derivation causes BUY orders to close LONG positions or SELL orders to close SHORT
      positions instead of their intended targets, opening larger unintended positions and corrupting position tracking records
    derived_from_bd_id: BD-117
  - id: finance-C-249
    when: When initializing price band configurations for perpetual market making
    action: Validate that price_ceiling >= price_floor at initialization time — reject configurations where ceiling is below
      floor before any trading occurs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid price band configurations where ceiling is below floor cause strategies to operate in impossible
      price ranges, leading to nonsensical order pricing and potential losses
    derived_from_bd_id: BD-075
  - id: finance-C-250
    when: When configuring hanging order cancellation for pure market making strategies
    action: Verify that hanging_orders_cancel_pct=0.1 (10%) matches the strategy's liquidity assumptions — adjust threshold
      if market volatility or spread patterns require more aggressive or conservative cancellation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 10% threshold may leave non-competitive orders in the book too long in volatile markets, or cancel
      valid orders too aggressively in trending markets, reducing overall strategy profitability
    derived_from_bd_id: BD-077
  - id: finance-C-251
    when: When implementing interest calculations in fixed income, swaps, or any instrument requiring day fraction computation
    action: Assume a universal day count convention across each instruments — the framework does not implement default day
      count logic; ACT/365, ACT/360, 30/360, and 30E/360 produce materially different interest amounts for the same nominal
      principal and rate
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using wrong day count convention causes systematic mispricing of fixed income instruments, swaps, and options;
      a 30-year bond using ACT/365 vs 30/360 accumulates ~2% valuation error over its lifetime
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-252
    when: When implementing any financial calculation involving time fractions or accrued interest
    action: 'Explicitly specify day_count_convention parameter for each instrument class: ACT/365 for T-bills, ACT/360 for
      money markets, 30/360 for corporate bonds, 30E/360 for European bonds, and document the convention choice in instrument
      initialization'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit convention specification, different modules use inconsistent day count methods, causing
      systematic valuation errors in multi-instrument portfolios
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-253
    when: When implementing interest rate derivatives, bond pricing, or any calculation involving compound growth
    action: Assume a single compounding convention applies universally — the framework does not implement default compounding
      logic; annual, semi-annual, quarterly, monthly, and continuous compounding produce materially different accumulated
      values
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using wrong compounding convention causes systematic misvaluation of bonds, swaps, and structured products;
      continuous vs annual compounding on a 10% rate over 30 years produces ~175% difference in accumulated value
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-254
    when: When implementing any financial calculation involving compound interest or exponential growth
    action: 'Explicitly specify compounding_frequency parameter for each instrument: ''annual'', ''semi-annual'', ''quarterly'',
      ''monthly'', ''continuous'' for bonds and swaps; use day_count_convention field in combination with compounding_convention
      field for full specification'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit compounding specification, accumulated values differ significantly across instruments, causing
      portfolio-level misvaluation and incorrect P&L attribution
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-255
    when: When implementing options pricing or any calculation requiring implied volatility input
    action: Assume the framework computes implied volatility from market prices — the framework does not implement implied
      volatility solver; manual input of historical or assumed volatility is required for each option pricing calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without implied volatility solver, strategies requiring market-implied volatility must use manual inputs,
      causing systematic mispricing when assumed volatility diverges from actual market implied volatility by more than 5
      vol points
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-256
    when: When calibrating quantitative models to market data for options pricing or volatility strategies
    action: Assume the framework outputs model calibration residuals — the framework does not implement calibration residual
      tracking; without residuals, there is no visibility into model fit quality or market regime changes
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without calibration residuals, model degradation goes undetected; stale calibrations produce systematically
      biased Greeks, causing delta hedging errors and incorrect risk management in options portfolios
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-257
    when: When implementing quantitative model calibration for options or volatility-based strategies
    action: Implement calibration_residuals field to store vector of (observed - model) differences after each calibration;
      compute RMSE and maximum absolute residual; trigger recalibration alert when RMSE exceeds threshold or residual pattern
      indicates structural break
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without residual tracking, calibration quality degrades silently, producing systematically biased volatility
      surface estimates that cause 5-15% pricing errors in edge cases and market regime shifts
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-258
    when: When implementing or modifying statistical arbitrage strategy logic using Z-score thresholds
    action: Verify that z_score_threshold=2.0 and lookback_period=1000 match the strategy's target risk tolerance and market
      microstructure; test sensitivity by running backtests with thresholds of 1.5, 2.0, 2.5, and 3.0 to identify optimal
      threshold for the specific trading pair and market conditions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Z-score threshold of 2.0 assumes normal distribution but financial returns exhibit fat tails; in volatile
      markets, this threshold triggers trades that fail to revert, causing cumulative losses of 10-30% in stress periods
    derived_from_bd_id: BD-086
  - id: finance-C-259
    when: When setting or adjusting arbitrage executor profitability thresholds
    action: Verify that profitability_threshold=0.003 (0.3%) accounts for each execution costs including maker/taker fees,
      slippage estimates, and network latency; recalibrate threshold when fee structures change or trading on new exchanges
      with different fee schedules
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Fixed 0.3% threshold becomes unprofitable when fees increase or liquidity decreases; sub-threshold trades
      accumulate small losses that erode arbitrage strategy returns by 20-40% over extended backtest periods
    derived_from_bd_id: BD-091
  - id: finance-C-261
    when: When configuring DirectionalTradingController with default settings
    action: Verify that 300-second (5 minute) cooldown between signals matches your strategy's signal cadence; increase cooldown
      for low-liquidity pairs or decrease for high-frequency strategies while monitoring for signal spam
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 5-minute cooldown silently filters valid signals when market conditions change, causing strategies
      to miss entry points and underperform during fast-moving markets
    derived_from_bd_id: BD-111
  - id: finance-C-263
    when: When configuring TripleBarrierConfig with trailing stop and position sizing
    action: Use consistent volatility timeframes across trailing stop delta (instant volatility) and position sizing (historical
      volatility) — either standardize both to 90-day EWMA or both to 12-period rolling window
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched volatility timescales cause trailing stops to trigger on intraday noise while position sizing
      uses slow trend volatility, creating conflicting signals in trending markets that cause premature exits or oversized
      positions
    derived_from_bd_id: BD-114
  - id: finance-C-264
    when: When calculating inventory skew with default total_amount_quote=$100
    action: Set total_amount_quote to actual portfolio value before running strategies — verify inventory skew calculations
      produce correct ratios for your capital size (e.g., $10,000 capital with $100 default produces 100x inflated adjustment
      ratios)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hardcoded $100 baseline causes inventory skew calculations to produce incorrect adjustment ratios when actual
      capital differs, leading to over-concentrated or under-concentrated positions that systematically deviate from intended
      risk management
    derived_from_bd_id: BD-115
  - id: finance-C-265
    when: When configuring order refresh intervals and max order age for market making strategies
    action: 'Align refresh_time (default 300s) with max_order_age (default 1800s) based on strategy frequency: high-frequency
      strategies should use shorter refresh intervals, while slow strategies should use longer max_age — avoid the 6:1 ratio
      that causes excessive API calls or stale order accumulation'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 300s refresh against 1800s max_age causes excessive API calls during high-volatility periods risking
      rate limits, while creating stale order accumulation far from mid-price during low-volatility periods
    derived_from_bd_id: BD-116
  - id: finance-C-267
    when: When backtesting strategies with production configurations
    action: Replace flat 0.06% fee assumption with tiered fee model matching target exchange fee schedule — verify maker/rebates
      and taker fees reflect actual costs for your trading frequency and volume tier
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Flat 0.06% fee assumption creates systematic backtest outperformance illusion that collapses in live trading
      where tiered fees can be 17x higher for high-frequency strategies, making backtest results non-reproducible
    derived_from_bd_id: BD-120
  - id: finance-C-268
    when: When implementing order submission logic with perpetual budget checker
    action: Validate that order fill timing matches collateral lock expiration and verify collateral_token matches before
      locking — implement atomic lock-and-submit or immediate lock release on fill to prevent lock expiry gaps
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Collateral lock expires before order fill or collateral token mismatch causes lock release without order
      cancellation, creating over-leverage exposure and potential liquidation cascades when multiple orders fill during lock
      expiry
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-269
    when: When integrating third-party libraries or logging mechanisms into the Hummingbot CLI
    action: Bypass stdout/stderr — do not write directly to terminal file descriptors (e.g., os.write to /dev/tty, termios,
      or direct file handle access); each output must flow through stdout/stderr to be captured by StdoutProxy
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Third-party libraries that bypass stdout break the StdoutProxy capture mechanism, causing output to be silently
      lost or displayed outside the terminal UI — users see incomplete or missing command results without any error message
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-270
    when: When implementing output capture and logging in Hummingbot CLI
    action: Implement fallback logging or detection for StdoutProxy bypass — log a warning when output operations are detected
      on non-stdout file descriptors to alert operators of potential capture failures
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without bypass detection, output capture failures are silent — the framework continues running while important
      command outputs are lost, making debugging and audit trails incomplete
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-271
    when: When implementing stop loss or take profit triggers in DCA executor MAKER mode
    action: Check all_open_orders_executed == True before evaluating or executing any stop loss or take profit actions — only
      proceed with exit conditions when every DCA leg has been filled
    severity: high
    kind: domain_rule
    modality: must
    consequence: Triggering stop loss or take profit before all DCA legs fill exits with an incomplete position that may recover,
      locking in losses or forfeiting potential gains from remaining unfilled legs
    derived_from_bd_id: BD-039
  - id: finance-C-272
    when: When implementing take profit evaluation logic in DCA executor MAKER mode
    action: Verify all_open_orders_executed == True before calculating take profit conditions or closing positions — only
      evaluate take profit when the full intended position size has been established through each DCA legs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Taking profit on a partial position before all DCA legs fill closes the position early, forfeiting potential
      gains from remaining legs that would have accumulated profits
    derived_from_bd_id: BD-040
  - id: finance-C-273
    when: When configuring TripleBarrierConfig for position opening orders
    action: Use LIMIT order type as the default for opening positions to achieve better entry prices and reduce trading fees
      — only use MARKET orders when immediate execution certainty outweighs price optimization
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using MARKET orders by default increases trading fees and produces worse entry prices, eroding strategy profitability
      especially in high-frequency or market-making scenarios
    derived_from_bd_id: BD-033
  - id: finance-C-274
    when: When implementing position executor initialization for spot or linear perpetual trading
    action: Use leverage greater than 1 as the default configuration — the framework MUST default to leverage=1 (no leverage)
      for spot/linear trading; any use of leverage > 1 requires explicit user configuration
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Defaulting to leverage > 1 exposes users to liquidation risk without their explicit consent, causing catastrophic
      losses in volatile markets where amplified positions can be liquidated instantly
    derived_from_bd_id: BD-034
  - id: finance-C-275
    when: When implementing or refactoring retry logic for close order failures
    action: Increment _current_retries counter on each close order failure to track retry attempts and enable termination
      of stuck executors after max retries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing the retry counter increment would cause the framework to either hang indefinitely on persistent
      failures (infinite loop) or fail silently without logging retry attempts, making debugging impossible
    derived_from_bd_id: BD-044
  - id: finance-C-276
    when: When calculating inventory range for order sizing in pure market making strategies
    action: Cap inventory range at 50% of total_portfolio_value to prevent extreme inventory concentration that could result
      in catastrophic single-asset exposure
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Removing the 50% cap allows unlimited inventory concentration; a single asset price drop would wipe out the
      entire portfolio, causing losses far exceeding normal market-making variance
    derived_from_bd_id: BD-047
  - id: finance-C-277
    when: When running multi-asset grid strategies with QuantumGridAllocator
    action: Group active grids by asset for portfolio-level tracking using update_portfolio_metrics — verify total exposure
      and realized PnL are calculated per asset across multiple grid instances
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Per-grid isolation prevents portfolio-level risk assessment; without asset grouping, running multiple grid
      strategies can over-concentrate exposure in a single asset without detection
    derived_from_bd_id: BD-012
  - id: finance-C-278
    when: When configuring retry behavior for position orders vs arbitrage orders
    action: Set max_retries=10 for position orders and max_retries=3 for arbitrage orders — arbitrage opportunities decay
      in seconds while positions have minutes of validity
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using position retry counts (10) for arbitrage causes missed opportunities as profitable windows close; using
      arbitrage retry counts (3) for positions causes unnecessary failures on slow exchanges
    derived_from_bd_id: BD-016
  - id: finance-C-279
    when: When creating new strategies extending StrategyV2Base
    action: Rely on automatic initialization of controllers and MarketDataProvider via initialize_controllers — manual re-initialization
      may cause duplicate instantiation or queue connection conflicts
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Explicitly re-initializing controllers or MarketDataProvider after StrategyV2Base initialization can cause
      duplicate instantiations or queue connection conflicts, leading to unpredictable behavior or data corruption
    derived_from_bd_id: BD-020
  - id: finance-C-284
    when: When configuring executor parameters for both backtesting and live trading
    action: Use identical executor configurations between backtesting and live trading environments — never modify parameters
      between modes without explicit documentation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using different executor configs in backtesting vs live trading creates parameter drift where backtest results
      don't reflect actual live behavior, causing strategies to underperform post-deployment
    derived_from_bd_id: BD-023
  - id: finance-C-285
    when: When implementing order age cancellation logic
    action: Use strictly greater than (>) comparison when checking max order age — verify orders are only cancelled when age
      exceeds the limit, not at the boundary
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using greater-than-or-equal (>=) causes immediate cancellation of newly placed orders with age ~0, while
      using less-than (<) would never trigger cancellation, both breaking the max order age safety limit
    derived_from_bd_id: BD-052
  - id: finance-C-286
    when: When implementing order execution placement logic
    action: 'Check both conditions before placing orders: (1) no active orders exist AND (2) refresh time has elapsed — both
      conditions must be satisfied simultaneously'
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Removing either condition breaks order placement: missing active order check allows duplicate orders, while
      missing refresh time check causes excessive order churn and pollutes the order book'
    derived_from_bd_id: BD-053
  - id: finance-C-287
    when: When implementing or modifying grid executor take profit logic with coerce_tp_to_step enabled
    action: Verify that take profit uses max(step_size, configured_take_profit) rather than configured_take_profit alone —
      the implementation takes the maximum of these two values when coercion is enabled
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Misunderstanding this default can create take profit levels smaller than grid spacing, resulting in inconsistent
      price targets that don't align with the grid structure and cause execution mismatches
    derived_from_bd_id: BD-065
  - id: finance-C-288
    when: When implementing position executor close order logic
    action: Verify close_order_price=None or NaN defaults to MARKET order execution at current price — do not default to zero
      or require explicit current price lookup
    severity: high
    kind: domain_rule
    modality: must
    consequence: Defaulting close price to zero creates invalid orders that will be rejected; requiring real-time price lookup
      adds failure points during market dislocations when risk management is most critical
    derived_from_bd_id: BD-066
  - id: finance-C-289
    when: When implementing or configuring position executor trailing stop logic
    action: Use ATR-based trailing stop with 2% delta for trailing component and 5% fixed stop loss — fixed percentage trailing
      stops that ignore volatility must not be used
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Fixed percentage trailing stops cannot adapt to varying asset volatility profiles, causing premature exits
      in high-volatility assets and insufficient downside protection in low-volatility assets
    derived_from_bd_id: BD-089
  - id: finance-C-290
    when: When implementing liquidity mining spread adjustment logic
    action: Use 5-minute volatility measurement with 10-period averaging for spread adjustment calculation — shorter averaging
      periods must not be used as they cause excessive spread oscillation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Shorter averaging periods introduce excessive spread oscillation from volatility noise, harming market-making
      relationships and increasing adverse selection costs during high-frequency price movements
    derived_from_bd_id: BD-093
  - id: finance-C-291
    when: When implementing or refactoring MarketMakingController create_actions_proposal method
    action: Execute position_rebalance check BEFORE creating order levels in create_actions_proposal — maintain this ordering
      contract and do not evaluate position rebalance and level creation in parallel
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reversing the order or evaluating in parallel causes order levels to be generated based on imbalanced positions
      instead of target allocation, breaking state consistency and creating orders that contradict portfolio targets
    derived_from_bd_id: BD-110
  - id: finance-C-292
    when: When implementing or configuring order placement timing in backtesting or live trading
    action: Verify that cooldown_time=0 matches the strategy's intended order frequency. For high-frequency strategies, verify
      this default is explicitly intentional. For strategies requiring order spacing, explicitly configure cooldown to a non-zero
      value based on exchange latency and fill confirmation requirements
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Zero cooldown default allows immediate order placement after fill, which may cause over-trading in live trading
      due to exchange latency, resulting in duplicate orders and excessive fees. In backtesting, this can underestimate realistic
      fill delays and overestimate strategy profitability
    derived_from_bd_id: BD-071
  - id: finance-C-293
    when: When implementing or modifying stop loss logic for perpetual market executors
    action: Use net_pnl_quote (absolute PnL in quote currency) for stop loss comparison against max_loss_quote. Do NOT implement
      percentage-only stop loss that compares against stop_loss * max_amount — this changes risk measurement from dollar terms
      to percentage terms, altering the strategy's risk profile
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Switching from absolute to percentage-based stop loss fundamentally changes risk management: a percentage
      stop depends on entry price while an absolute stop ensures consistent dollar risk regardless of entry variations. Strategies
      designed for absolute loss limits will experience unpredictable maximum losses when the calculation basis changes'
    derived_from_bd_id: BD-073
  - id: finance-C-294
    when: When implementing or configuring TripleBarrier trailing stop with volatility adjustment in high-frequency trading
    action: Apply volatility smoothing or use a rolling window for volatility calculation when evaluation frequency is high.
      Avoid using instant/volatile volatility samples that cause trailing stop distance to oscillate. Implement minimum evaluation
      intervals or smoothing factors to prevent path-dependent stop behavior
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: When volatility is evaluated every tick and trailing stop is recalculated, the stop distance varies continuously.
      Under high-frequency evaluation (100ms ticks), trailing stop can oscillate between narrow and wide as instant volatility
      fluctuates, causing inconsistent stop behavior that differs from expected strategy risk management
    derived_from_bd_id: BD-124
  - id: finance-C-295
    when: When implementing factor-based trading strategies that use IC (Information Coefficient) metrics
    action: Assume the framework automatically performs cross-sectional IC demeaning per factor — the framework does not implement
      factor IC demeaning, IC values may retain cross-sectional mean bias
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without IC demeaning, factor IC values retain cross-sectional mean that biases multi-factor portfolio construction;
      strategies may over-weight factors with systematic positive IC, underestimating true alpha decay
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-296
    when: When calculating rolling IC metrics for factor evaluation in backtesting
    action: Implement cross-sectional mean subtraction for IC values at each timestamp-period combination; verify IC computation
      uses historical data only (exclude current timestamp) to prevent look-ahead bias
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing IC demeaning causes factor IC values to retain cross-sectional mean bias, leading to systematic over-weighting
      of factors with persistent positive IC and incorrect strategy allocation
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-297
    when: When implementing market data pipelines with fit and transform operations
    action: Assume the framework properly isolates pipeline fit and transform operations during cross-validation or backtesting
      — the framework does not implement fit/transform isolation, fitted parameters may leak from test data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without fit/transform isolation, scaler or encoder fit parameters computed on test data leak into training;
      backtest results exhibit artificially inflated performance due to data leakage, causing live trading to underperform
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-298
    when: When implementing custom pipeline components for feature transformation
    action: 'Separate pipeline operations: fit_transform on training data only, transform on test data; cache fitted parameters
      and apply them consistently across train/test splits to prevent data leakage'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing fit/transform isolation allows scaler statistics from test data to influence training, inflating
      backtest Sharpe ratios by 10-30% and causing live strategy performance to diverge significantly from backtest
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-299
    when: When implementing multi-agent trading strategies or LLM-based decision systems
    action: Assume the framework implements multi-agent decision consensus or LLM-based decision systems — the framework does
      not implement ML/AI training or LLM-based systems; each trading decisions are rule-based
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming multi-agent consensus capability leads to code that references non-existent AI components; strategy
      logic will fail at runtime with AttributeError when attempting to access consensus methods
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-300
    when: When implementing multi-agent trading strategies requiring decision coordination
    action: Implement custom consensus mechanism using external coordination tools (message queues, distributed locks) if
      multi-agent coordination is required; note this is outside Hummingbot core scope
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Multi-agent consensus patterns are not supported by Hummingbot; strategies requiring agent coordination will
      fail unless custom coordination logic is implemented outside the framework
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-301
    when: When implementing lending strategies or fixed-income instruments requiring payment schedules
    action: Assume the framework generates loan repayment schedules or implements amortization calculations — the framework
      does not implement loan amortization or fixed-income pricing models
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming repayment schedule capability leads to strategy code that references non-existent amortization functions;
      lending strategies will fail with AttributeError when calculating payment schedules
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-302
    when: When implementing lending strategies that require repayment schedule calculations
    action: Implement custom repayment schedule generation using principal, interest_rate, and term parameters; use industry-standard
      amortization formulas or external financial calculation libraries
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Missing repayment schedule generation causes lending strategies to lack payment timing logic; backtest cannot
      accurately calculate interest accrual or principal reduction, producing unreliable P&L projections
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-303
    when: When implementing credit risk management or lending strategies with delinquency tracking
    action: Assume the framework defines delinquency thresholds (DPD 30/60/90) or implements days-past-due tracking — the
      framework does not implement credit risk metrics or delinquency definitions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming delinquency capability leads to code referencing non-existent DPD tracking functions; credit risk
      strategies will fail with AttributeError when evaluating loan portfolio health or triggering default events
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-304
    when: When implementing credit risk management or loan portfolio monitoring
    action: Define delinquency thresholds as DPD >= 30 (subprime), DPD >= 60 (delinquent), DPD >= 90 (default); implement
      tracking logic that calculates days past due from payment due_date relative to current_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing delinquency definitions causes credit risk strategies to lack standardized default triggers; loan
      portfolio health assessment cannot categorize borrowers by risk level, leading to incorrect loss provisioning
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-305
    when: When implementing or refactoring grid executor position management logic
    action: Use arithmetic grid spacing with 0.05% price interval and 0% size volatility adjustment — do not change to geometric
      spacing or modify volatility parameters without explicit justification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Geometric spacing creates excessive order concentration at extreme price levels, causing liquidity fragmentation
      and adverse fill prices in live trading while backtest shows uniform distribution
    derived_from_bd_id: BD-092
  - id: finance-C-306
    when: When implementing cross-exchange market making trade eligibility checks
    action: Calculate minimum profitability threshold as (profitability / 100) — the divisor of 100 is mandatory and cannot
      be simplified or removed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing the divisor of 100 creates an impossibly high threshold, filtering out all valid arbitrage opportunities;
      using a fixed percentage ignores the normalization across different asset valuations and price levels
    derived_from_bd_id: BD-094
  - id: finance-C-308
    when: When configuring ControllerConfigBase for strategy initialization
    action: Verify that total_amount_quote=100 matches actual starting capital and override if needed — the $100 default encodes
      a capital baseline assumption that affects each position sizing calculations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: If actual starting capital differs from $100 and this default is not overridden, position sizes will be systematically
      miscalculated throughout the controller lifecycle, causing either insufficient capital usage or over-leveraged positions
    derived_from_bd_id: BD-101
  - id: finance-C-309
    when: When configuring directional trading or market making controllers
    action: Verify that position_mode='HEDGE' and leverage=20 match the intended risk profile — these aggressive perpetual
      trading defaults require explicit review for conservative strategies
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using 20x leverage with HEDGE mode significantly amplifies both gains and losses; new users accepting these
      defaults without understanding risk exposure may experience margin calls and forced liquidations in volatile market
      conditions
    derived_from_bd_id: BD-102
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
