resources:
  packages:
  - name: scikit-learn>=0.23.2
    version_pin: latest
  - name: numpy>=1.19.5,<2.0.0
    version_pin: latest
  - name: scipy>=1.5.2
    version_pin: latest
  - name: pandas>=1.5.3
    version_pin: latest
  - name: optbinning>=0.8.0
    version_pin: latest
  - name: category_encoders>=2.2.2
    version_pin: latest
  - name: pyyaml
    version_pin: latest
  - name: dash>=1.21.0
    version_pin: latest
  - name: jupyter-dash>=0.4.0
    version_pin: latest
  - name: dash_bootstrap_components>=0.13
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install scikit-learn>=0.23.2
    - python3 -m pip install numpy>=1.19.5,<2.0.0
    - python3 -m pip install scipy>=1.5.2
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-002
    when: When preparing input data for bucketing
    action: pass an empty DataFrame with zero rows or zero columns
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Empty datasets cause immediate ValueError at validation stage, preventing any downstream processing
    stage_ids:
    - data_preparation
  - id: finance-C-003
    when: When providing target variable y to bucketers
    action: normalize y to 1D numpy array through _check_y validation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Multi-dimensional y arrays cause downstream Weight of Evidence calculations to fail with shape mismatches
    stage_ids:
    - data_preparation
  - id: finance-C-004
    when: When specifying columns to bucket via variables parameter
    action: verify each specified column names exist in the input DataFrame columns
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-existent columns cause AttributeError during fit, breaking the entire bucketing pipeline
    stage_ids:
    - data_preparation
  - id: finance-C-005
    when: When fitting bucketers with supervised learning
    action: verify target y has the same number of samples as feature matrix X
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched y and X lengths cause index alignment errors during WoE bucket table construction
    stage_ids:
    - data_preparation
  - id: finance-C-012
    when: When implementing fit() for any bucketer with special values
    action: Filter special values from X before computing bin boundaries using _filter_specials_for_fit()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Outlier special values will distort optimal bin boundaries, causing incorrect weight-of-evidence calculations
      and unreliable credit risk scores
    stage_ids:
    - special_values_handling
  - id: finance-C-013
    when: When defining special values in the specials dictionary
    action: 'Use nested dictionary format {column_name: {bucket_label: [list_of_values]}} with string keys and list values'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid specials format causes ValueError or silent misclassification of special values during transform
    stage_ids:
    - special_values_handling
  - id: finance-C-014
    when: When assigning special bucket IDs during BucketMapping initialization
    action: Assign special buckets with negative IDs starting at -3 and decrementing (-4, -5, etc.)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Special bucket ID collision with missing (-1) or other (-2) reserved buckets causes data corruption in bucket
      assignment
    stage_ids:
    - special_values_handling
  - id: finance-C-015
    when: When defining specials columns in the specials dictionary
    action: Verify each special value column names are present in the variables list or dataframe columns
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Specials referencing undefined features causes ValueError during fit, preventing pipeline execution
    stage_ids:
    - special_values_handling
  - id: finance-C-024
    when: When implementing prebucketing for OptimalBucketer on numerical features
    action: Reduce numerical features to at most 100 unique values before passing to OptimalBucketer
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: OptimalBucketer raises NotPreBucketedError when receiving numerical features with more than 100 unique values,
      blocking the bucketing pipeline from executing
    stage_ids:
    - prebucketing
  - id: finance-C-025
    when: When using AsIsNumericalBucketer for feature bucketing
    action: Verify input numerical features have at most 100 unique values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: AsIsNumericalBucketer raises NotPreBucketedError when the column has more than 100 unique values, preventing
      feature transformation
    stage_ids:
    - prebucketing
  - id: finance-C-026
    when: When fitting a BucketingProcess with two-phase bucketing
    action: Fit the prebucketing_pipeline before fitting the bucketing_pipeline
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without proper two-phase ordering, special value remapping fails because pre-bucket labels are unavailable,
      causing incorrect bucket assignments for special values
    stage_ids:
    - prebucketing
  - id: finance-C-027
    when: When defining special values in prebucketing pipeline
    action: Remap special value bucket assignments after prebucketing using _find_remapped_specials()
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Special values lose their correct bucket mappings if not remapped to pre-bucket space, causing runtime errors
      when the bucketing pipeline cannot find the expected special value bucket
    stage_ids:
    - prebucketing
  - id: finance-C-028
    when: When configuring DecisionTreeBucketer for prebucketing numerical features
    action: Set max_n_bins to at least number_of_special_bins + 2 to accommodate special value buckets
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: DecisionTreeClassifier requires max_leaf_nodes >= 2, so with special bins defined, insufficient max_n_bins
      causes ValueError and prevents bucketer from fitting
    stage_ids:
    - prebucketing
  - id: finance-C-029
    when: When validating BucketingProcess after fitting
    action: Verify each numerical columns in bucketing_pipeline have corresponding pre-buckets
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: NotPreBucketedError is raised for numerical columns that are bucketed but not pre-bucketed, blocking pipeline
      execution
    stage_ids:
    - prebucketing
  - id: finance-C-034
    when: When validating BucketingProcess column coverage consistency
    action: Verify each pre-bucketed numerical columns are also included in bucketing_pipeline
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: NotBucketedError is raised when numerical columns are prebucketed but not bucketed, causing pipeline execution
      failure
    stage_ids:
    - prebucketing
  - id: finance-C-036
    when: When implementing optimal bucketing for numerical features with high cardinality
    action: Pre-bucket numerical features to <=100 unique values before OptimalBucketer
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NotPreBucketedError is raised at fit time, causing pipeline failure. Performance degrades significantly with
      high-cardinality features due to solver complexity.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-042
    when: When calling OptimalBucketer without optbinning installed
    action: Install optbinning package via pip install optbinning
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: OptimalBucketer fails to import or raises NotInstalledError at runtime, blocking the entire bucketing pipeline
      execution.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-047
    when: When implementing scorecard bucketing workflow
    action: Use BucketingProcess pipeline to chain prebucketing before optimal bucketing
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing the BucketingProcess pipeline causes NotPreBucketedError when OptimalBucketer encounters features
      with >100 unique values, breaking the entire workflow.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-056
    when: When using 'most_risky' or 'least_risky' missing_treatment without target variable y
    action: Pass target variable y to the fit method to determine bucket event rates
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: AttributeError is raised because the system cannot determine risk rates without target variable y, breaking
      the missing bucket assignment logic
    stage_ids:
    - missing_value_assignment
  - id: finance-C-057
    when: When implementing missing value assignment in the fit process
    action: Recalculate bucket statistics after assigning missings to their target bucket
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Bucket statistics will reflect incorrect counts and WoE values since missings would still appear as a separate
      bucket when they have been reassigned
    stage_ids:
    - missing_value_assignment
  - id: finance-C-062
    when: When defining the allowed missing_treatment options
    action: 'Accept any missing_treatment value outside the predefined set: separate, most_frequent, most_risky, least_risky,
      neutral, similar, passthrough'
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: AssertionError or ValueError is raised for invalid missing_treatment values, preventing the bucketer from
      functioning
    stage_ids:
    - missing_value_assignment
  - id: finance-C-065
    when: When implementing the missing value assignment architecture
    action: Execute missing bucket assignment AFTER initial binning but BEFORE final bucket table calculation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: The missing bucket will be determined using stale bucket statistics, leading to incorrect bucket assignment
      based on pre-missing-treatment data
    stage_ids:
    - missing_value_assignment
  - id: finance-C-066
    when: When transforming new data with missing values
    action: Apply the assigned missing_bucket from the fitted BucketMapping to transform missing values
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing values will not be properly mapped to their assigned bucket during transformation, causing inconsistent
      behavior between fit and transform
    stage_ids:
    - missing_value_assignment
  - id: finance-C-069
    when: When creating a BucketMapping object with type='numerical'
    action: Provide map as a list of numerical boundaries
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Map must be list type for numerical BucketMapping, otherwise __post_init__ assertion fails and no binning
      can occur
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-070
    when: When creating a BucketMapping object with type='categorical'
    action: Provide map as a dictionary mapping category values to bucket integers
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Map must be dict type for categorical BucketMapping, otherwise __post_init__ assertion fails and categorical
      mapping breaks
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-071
    when: When defining specials dictionary in BucketMapping
    action: Use string keys and list values in the specials dictionary
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Specials with non-string keys or non-list values causes assertion error, preventing special value handling
      from working
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-074
    when: When defining categorical BucketMapping map dictionary
    action: Verify map values start at 0 and are contiguous integers
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Categorical maps must be incremental from 0, otherwise _validate_categorical_map raises ValueError breaking
      transformation
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-078
    when: When loading bucket mappings from YAML for deployment
    action: Use UserInputBucketer with yaml.safe_load instead of FeaturesBucketMapping.load_yml
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: load_yml is NotImplementedError, so YAML loading only works through UserInputBucketer which accepts YAML
      dict directly
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-097
    when: When computing Weight of Evidence for a bucket
    action: Add epsilon smoothing to both Event and NonEvent counts before division to prevent log(0) undefined values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Empty buckets produce log(0) = -inf or division by zero, corrupting all downstream WoE-based calculations
      and causing logistic regression training to fail or produce invalid coefficients
    stage_ids:
    - bucket_reporting
  - id: finance-C-098
    when: When computing Information Value for a bucket
    action: Apply absolute value to the (%Non-event - %Event) × WoE product before summing across buckets
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: IV values become negative when %Non-event < %Event in any bucket, producing incorrect feature importance
      rankings and potentially excluding valid predictive features from the scorecard
    stage_ids:
    - bucket_reporting
  - id: finance-C-100
    when: When generating bucket_table output columns
    action: 'Include each 11 required columns: bucket_id, label, Count, Count (%), Non-event, Event, % Event, % Non-event,
      Event Rate, WoE, IV'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required columns causes downstream stage failures (woe_encoding, logistic_regression_training) which
      depend on specific column names and ordering
    stage_ids:
    - bucket_reporting
  - id: finance-C-102
    when: When validating y length against X for reporting
    action: Assert that len(y) equals X.shape[0] to verify sample alignment before WoE/IV computation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Misaligned y causes row-wise computation against wrong observations, producing garbage WoE and IV values
      that corrupt the entire scorecard model
    stage_ids:
    - bucket_reporting
  - id: finance-C-121
    when: When implementing WoE formula for credit scoring
    action: calculate WoE as ln(Distribution of Goods / Distribution of Bads)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect WoE formula will produce invalid weight-of-evidence values that misrepresent the predictive power
      of buckets, leading to flawed credit scoring model coefficients
    stage_ids:
    - woe_encoding
  - id: finance-C-122
    when: When fitting WoE encoder on training data
    action: use epsilon >= 0 to prevent division by zero in WoE calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero or negative epsilon causes ZeroDivisionError when a bucket has zero occurrences of either class, breaking
      the training pipeline and preventing scorecard model development
    stage_ids:
    - woe_encoding
  - id: finance-C-123
    when: When validating target variable for WoE encoding
    action: verify target y contains exactly 2 unique classes (binary classification)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Multi-class targets produce mathematically invalid WoE values, as the WoE formula relies on binary good/bad
      distribution ratios, resulting in nonsensical feature weights
    stage_ids:
    - woe_encoding
  - id: finance-C-124
    when: When computing WoE values during fit_transform
    action: validate that WoE calculation produces no NaN values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NaN WoE values propagate through the logistic regression, corrupting model coefficients and producing undefined
      predictions for affected buckets
    stage_ids:
    - woe_encoding
  - id: finance-C-126
    when: When constructing the scorecard training pipeline
    action: order WoE encoding step after bucketing step (bucketer -> encoder -> model)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: WoE encoding on unbucketed features produces meaningless weight-of-evidence values, as WoE requires pre-computed
      bucket IDs to measure predictive power per bin
    stage_ids:
    - woe_encoding
  - id: finance-C-134
    when: When preparing input data for LogisticRegression.fit()
    action: use binary target values (0/1 only)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The WOE calculation and logistic regression assume binary classification. Non-binary targets cause NaN in
      WoE computations and undefined model behavior for scorecards designed for binary credit risk outcomes.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-136
    when: When fitting LogisticRegression on WoE-encoded features
    action: fit on raw features without WOE encoding
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Scorecards require monotonic WoE-transformed features for interpretability. Raw features violate the fundamental
      design of weight-of-evidence based scorecards and produce non-monotonic, non-interpretable risk scores.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-137
    when: When features exhibit multi-collinearity in WoE-encoded space
    action: handle multi-collinearity before fitting (combine correlated features or adjust bucketing)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Multi-collinear variables cause np.linalg.LinAlgError during covariance matrix inversion, producing singular
      matrix errors and preventing model convergence. Coefficients may also have unexpected signs contrary to WoE ordering.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-150
    when: When initializing ScoreCardPoints with a skorecard_model argument
    action: pass a fitted Skorecard model that has been fitted with .fit() method
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ScoreCardPoints will raise NotFittedError because check_is_fitted(skorecard_model) will fail, preventing
      scorecard rescaling from occurring
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-151
    when: When building the scorecard formula for scaling points
    action: calculate factor as pdo divided by natural log of 2 (np.log(2))
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The PDO doubling property will not hold - doubling odds will not increase score by exactly the specified
      PDO value, breaking industry-standard credit scoring semantics
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-153
    when: When initializing ScoreCardPoints
    action: validate that the skorecard_model is an instance of Skorecard class
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Passing a non-Skorecard model will cause AttributeError when accessing pipeline_.named_steps['encoder'] since
      the object lacks the expected pipeline structure
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-154
    when: When extracting pipeline elements for scorecard rescaling
    action: validate that the pipeline has a WoE encoder (WoeEncoder or WOEEncoder)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without a WoE encoder, the scorecard cannot correctly map features to Weight of Evidence values, producing
      meaningless point contributions
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-155
    when: When validating the model in the scorecard pipeline
    action: verify the model has a predict_proba method for probability-based scoring
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without predict_proba, the ScoreCardPoints cannot extract coefficients and intercept for calculating score
      contributions, causing AttributeError
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-156
    when: When building the scorecard pipeline in Skorecard
    action: 'maintain hard-coded pipeline order: bucketer → encoder → column_selector → model'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Changing encoder position or inserting steps between pipeline elements will break the WoE transform chain,
      causing incorrect feature encodings and invalid scorecard points
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-157
    when: When accessing pipeline elements in ScoreCardPoints
    action: 'use the correct named_steps keys: ''bucketer'', ''encoder'', ''model'''
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using incorrect pipeline step names will raise KeyError, preventing extraction of bucket mappings, WoE encodings,
      and model coefficients
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-165
    when: When data flows from data_preparation to special_values_handling
    action: X must be a pandas DataFrame and y must be a 1-dimensional array convertible via BaseBucketer._check_y
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-DataFrame X or non-1D y causes index misalignment in downstream bucket statistics calculation, leading
      to incorrect WoE values and invalid scorecard
    stage_ids:
    - data_preparation
    - special_values_handling
  - id: finance-C-166
    when: When data flows from special_values_handling to prebucketing
    action: specials dictionary keys must correspond to columns in X and values must be lists of unique values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched specials keys cause KeyError during fit_transform, breaking the entire bucketing pipeline execution
    stage_ids:
    - special_values_handling
    - prebucketing
  - id: finance-C-168
    when: When data flows from optimal_bucketing to missing_value_assignment
    action: BucketMapping objects must preserve the feature type (numerical/categorical) through merge_bucket_mapping
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Type mismatch between prebucketing and bucketing BucketMapping causes incorrect bucket boundaries and invalid
      scorecard points
    stage_ids:
    - optimal_bucketing
    - missing_value_assignment
  - id: finance-C-169
    when: When data flows from missing_value_assignment to bucket_mapping_storage
    action: missing_bucket must be a valid bucket ID within the range defined by the optimal splits map
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid missing_bucket value causes out-of-range bucket assignment during transform, corrupting downstream
      statistics
    stage_ids:
    - missing_value_assignment
    - bucket_mapping_storage
  - id: finance-C-171
    when: When data flows from bucket_mapping_storage to woe_encoding
    action: FeaturesBucketMapping must NOT contain NaN values in the source X (WoE encoder requires no NaN input)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NaN values in FeaturesBucketMapping cause WoE calculation to produce NaN outputs, breaking logistic regression
      training
    stage_ids:
    - bucket_mapping_storage
    - woe_encoding
  - id: finance-C-172
    when: When data flows from woe_encoding to logistic_regression_training
    action: 'target y must be binary (contain exactly two unique values: 0 and 1)'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-binary target causes WoE calculation to produce invalid values and LogisticRegression to fail with misleading
      errors
    stage_ids:
    - woe_encoding
    - logistic_regression_training
  - id: finance-C-173
    when: When data flows from logistic_regression_training to scorecard_rescaling
    action: LogisticRegression coefficients must NOT exhibit multi-collinearity (causing LinAlgError)
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Multi-collinear WoE features cause singular matrix inversion failure during LogisticRegression fit, producing
      uninterpretable coefficients and incorrect scorecard points
    stage_ids:
    - logistic_regression_training
    - scorecard_rescaling
  - id: finance-C-175
    when: When processing categorical features through special_values_handling
    action: categorical feature map must start at 0 and be incrementally ordered for BucketMapping to validate
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-incremental categorical map causes ValueError in _validate_categorical_map, breaking bucket transformation
      for all categorical features
    stage_ids:
    - special_values_handling
    - prebucketing
  - id: finance-C-176
    when: When transforming data through the complete bucketing pipeline
    action: transform() must receive DataFrame with same columns as fit() (n_train_features_ must match)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Column mismatch during transform causes ValueError or silent wrong bucket assignment, producing incorrect
      scorecard
    stage_ids:
    - bucket_mapping_storage
    - woe_encoding
  - id: finance-C-177
    when: When implementing any bucketer in skorecard
    action: Verify the target variable y contains only binary values (0 and 1) as the system is designed exclusively for binary
      classification
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: 'Skorecard estimators are tagged with ''binary_only: True'' and WoE calculations assume binary target. Non-binary
      targets cause undefined WoE values and model training failures'
  - id: finance-C-178
    when: When implementing WoE (Weight of Evidence) calculations
    action: Add epsilon of at least 1e-5 to relative counts before computing log ratio to prevent division by zero
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Division by zero occurs when any bucket has zero events or non-events, causing NaN WoE values that corrupt
      the logistic regression model coefficients
  - id: finance-C-181
    when: When building the Skorecard pipeline
    action: 'Maintain the hard-coded pipeline order: bucketer → encoder → column_selector → model'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: WoEEncoder requires bucketed inputs, ColumnSelector expects WoE-encoded features, and LogisticRegression
      expects encoded features. Reordering breaks the data transformation contract
  - id: finance-C-182
    when: When instantiating ScoreCardPoints transformer
    action: Verify the pipeline contains a WoeEncoder (from skorecard.preprocessing or category_encoders.woe) before the model
      step
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: ScoreCardPoints extracts WoE values from the encoder to calculate points. Without WoE encoding, feature contributions
      cannot be computed and points mapping fails
  - id: finance-C-195
    when: When implementing Weight of Evidence calculations for credit scorecard features
    action: 'Use the industry-standard WoE formula: WoE = ln(Distribution of Goods / Distribution of Bads) — verify both distributions
      are non-zero before logarithm and WoE values remain bounded for valid risk interpretation'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-standard WoE formulations violate regulatory requirements for compliant credit scorecards; incorrect
      WoE calculations systematically misalign feature values with risk levels, causing inaccurate probability of default
      estimates and potential fair lending violations
    derived_from_bd_id: BD-020
  - id: finance-C-248
    when: When implementing score rescaling logic for credit scorecard models
    action: Use the Basel-aligned formula Score = factor × ln(odds) + offset for score transformation — this ensures linear
      relationship between log-odds and points where doubling odds adds exactly PDO points
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using non-standard score formulas fails Basel regulatory requirements for credit scorecard models, making
      the model non-compliant for production deployment in regulated financial institutions
    derived_from_bd_id: BD-028
  - id: finance-C-255
    when: When implementing WoE encoding in production pipelines
    action: Replace the category_encoders library WoE encoder with a custom implementation — the package delegates encoding
      to category_encoders for proper handling of unseen categories, sparse matrices, and cross-validation
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Custom encoders lack the edge case handling of category_encoders, leading to incorrect encoding for unseen
      categories in live data and improper cross-validation splits
    derived_from_bd_id: BD-022
  - id: finance-C-256
    when: When selecting classification approach for a scoring problem
    action: Apply skorecard package to multi-class classification problems — the package is designed exclusively for binary
      classification (default/no-default use cases)
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Using skorecard for multi-class problems produces undefined behavior since all internal logic assumes binary
      targets, causing incorrect WoE calculations and invalid model coefficients
    derived_from_bd_id: BD-030
  regular:
  - id: finance-C-001
    when: When fitting or transforming data with a bucketer
    action: convert input X to pandas DataFrame format using ensure_dataframe
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-DataFrame inputs will lose column name information when silently converted, causing downstream feature
      identification failures
    stage_ids:
    - data_preparation
  - id: finance-C-006
    when: When initializing a missing_treatment strategy
    action: use only pre-defined missing value handling strategies
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid missing_treatment values cause ValueError during fit, blocking all downstream operations
    stage_ids:
    - data_preparation
  - id: finance-C-007
    when: When using skorecard bucketers for classification
    action: attempt multi-class classification with non-binary y values
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Multi-class problems may fail silently producing incorrect WoE values or raise ZeroDivisionError during weight
      calculations
    stage_ids:
    - data_preparation
  - id: finance-C-008
    when: When configuring the variables parameter for bucketers
    action: use empty list [] to automatically select each DataFrame columns for bucketing
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Passing None or omitting the parameter causes assertion failure preventing fit execution
    stage_ids:
    - data_preparation
  - id: finance-C-009
    when: When preparing data for transform phase after fit
    action: pass DataFrame with same number of features as used during fit
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Transform with different feature count causes ValueError, breaking pipeline consistency
    stage_ids:
    - data_preparation
  - id: finance-C-010
    when: When applying skorecard bucketers to new datasets
    action: claim that backtest/bucketed results represent live production performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Scorecard binning is optimized on training data and may overfit; live distribution shifts invalidate backtest
      WoE and IV metrics
    stage_ids:
    - data_preparation
  - id: finance-C-011
    when: When bucketing credit risk features
    action: present bucket statistics without including missing value counts
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Unreported missing values in buckets cause incomplete credit scoring with biased risk estimates
    stage_ids:
    - data_preparation
  - id: finance-C-016
    when: When applying BucketMapping.transform() to new data
    action: Apply special value mapping after digitize/categorical mapping and after missing value handling
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect order of operations causes special values to be assigned to wrong buckets, corrupting feature values
      fed to downstream models
    stage_ids:
    - special_values_handling
  - id: finance-C-017
    when: When handling special values in BucketingProcess pipelines
    action: Remap special values after prebucketing to reflect new bucket assignments from prebucketer
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Special values get double-assigned or lost when moving from prebucketing to bucketing stage, breaking pipeline
      consistency
    stage_ids:
    - special_values_handling
  - id: finance-C-018
    when: When building bucket labels in BucketMapping
    action: 'Assign label names prefixed with ''Special: '' followed by the bucket label key'
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Special bucket labels are not identifiable in bucket tables, preventing audit and manual review of special
      value handling
    stage_ids:
    - special_values_handling
  - id: finance-C-019
    when: When a BucketingProcess is configured with specials
    action: Propagate specials to each bucketers in prebucketing_pipeline before fitting
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Prebucketers operate without knowledge of special values, causing outliers to distort prebucketing boundaries
      and invalidate downstream optimal bucketing
    stage_ids:
    - special_values_handling
  - id: finance-C-020
    when: When users define special values to exclude outliers from binning
    action: Document the business rationale for each special value bucket in the bucket label
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Undocumented special value handling creates audit risk in credit risk modeling where regulatory review requires
      explainability
    stage_ids:
    - special_values_handling
  - id: finance-C-021
    when: When verifying acceptance criteria for special values handling
    action: 'Confirm every special value appears in final bucket tables under ''Special: <label>'' labels'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Special values missing from bucket tables indicate transformation errors where special values were either
      lost or incorrectly assigned to regular buckets
    stage_ids:
    - special_values_handling
  - id: finance-C-022
    when: When a bucketer with special values is used with cross-validation
    action: Verify special value handling remains consistent across CV folds by defining specials at initialization
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Inconsistent special value handling across CV folds produces unreliable model validation metrics and may
      lead to selecting suboptimal model parameters
    stage_ids:
    - special_values_handling
  - id: finance-C-023
    when: When excluding special values from bin boundary calculations
    action: Claim that optimal bin boundaries are globally optimal when special values are excluded
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Claiming global optimality misleads stakeholders; excluding special values creates locally optimal boundaries
      for non-special data that may not maximize overall model performance
    stage_ids:
    - special_values_handling
  - id: finance-C-030
    when: When building default prebucketing configuration for Skorecard
    action: Treat low-cardinality features with less than 10 unique values as categorical instead of numerical
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Low-cardinality features bypass prebucketing when treated as categorical, reducing unnecessary computation
      without loss of information
    stage_ids:
    - prebucketing
  - id: finance-C-031
    when: When using optbinning library through OptimalBucketer for performance
    action: Pre-bucket numerical features to maximum 100 unique values before OptimalBinning
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Optbinning's OptimalBinning requires pre-bucketed input for numerical features to avoid performance degradation
      on high-cardinality data
    stage_ids:
    - prebucketing
  - id: finance-C-032
    when: When configuring DecisionTreeBucketer for prebucketing default settings
    action: Set min_bin_size to at least 0.03 (3%) to verify statistical significance in each pre-bin
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pre-bins with too few samples per bin produce unreliable WoE statistics, leading to suboptimal bucketing
      decisions and scorecard instability
    stage_ids:
    - prebucketing
  - id: finance-C-033
    when: When configuring DecisionTreeBucketer prebucketing with max_n_bins
    action: Set max_n_bins=100 for prebucketing to provide sufficient granularity for OptimalBucketer
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Setting max_n_bins below 100 may lose fine-grained information needed by OptimalBucketer to find optimal
      bucket boundaries
    stage_ids:
    - prebucketing
  - id: finance-C-035
    when: When configuring BucketingProcess prebucketing_pipeline
    action: Only include numerical bucketers in prebucketing_pipeline for numerical features
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-numerical bucketers applied to numerical features in prebucketing cause incorrect bucket mappings and
      downstream transformation errors
    stage_ids:
    - prebucketing
  - id: finance-C-037
    when: When configuring OptimalBucketer for categorical variables
    action: Set variables_type='categorical' explicitly for categorical features
    severity: high
    kind: domain_rule
    modality: must
    consequence: Categorical features are silently mis-binned as numerical data, producing incorrect bucket boundaries and
      invalid WoE/IV statistics.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-038
    when: When fitting OptimalBucketer without binary target
    action: Pass binary target y containing 0/1 values to the fit method
    severity: high
    kind: domain_rule
    modality: must
    consequence: WoE calculation and monotonicity constraints fail silently or produce invalid results with non-binary targets,
      corrupting scorecard statistics.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-039
    when: When implementing optimal bucketing with default configuration
    action: Enforce min_bin_size=0.05 to verify each bucket contains >=5% of observations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Buckets with insufficient samples (<5%) produce statistically unreliable WoE values, causing overfitting
      and unstable logistic regression coefficients in downstream scorecard.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-040
    when: When optimizing bucket boundaries for numerical features
    action: Use monotonic_trend constraint to enforce monotonic WoE ordering
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-monotonic WoE values across bins violate credit scoring interpretability requirements, making scorecard
      coefficients difficult to explain to business stakeholders.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-041
    when: When using OptimalBucketer on continuous numerical features
    action: Use pre-bucketing step (DecisionTreeBucketer) before OptimalBucketer
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without pre-bucketing, the constraint programming solver in optbinning runs indefinitely or produces timeout
      errors on high-cardinality features, causing service disruption.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-043
    when: When configuring OptimalBucketer solver parameter
    action: Use solver='cp' (constraint programming) for most use cases
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: MIP solver may take significantly longer for large datasets; LocalSolver requires separate license. CP solver
      provides good balance of speed and optimality for credit scoring binning problems.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-044
    when: When optimizing bucket boundaries with time constraints
    action: Set time_limit parameter to prevent indefinite solver hanging
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without time_limit, the CP/MIP solver may run indefinitely on complex optimization problems, causing application
      hang or timeout failures in production systems.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-045
    when: When bucketing features with special values that need dedicated bins
    action: Define specials dictionary before fitting OptimalBucketer
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Special values (e.g., outliers, missing indicators) are incorrectly merged into regular bins, corrupting
      WoE calculations and reducing predictive power for edge cases.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-046
    when: When using OptimalBucketer with gamma regularization
    action: Use gamma=0 (default) or gamma >= 0; gamma > 0 reduces dominating bins
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Gamma < 0 causes undefined behavior in the optbinning solver. Positive gamma values reduce the number of
      bins that dominate the target variable, potentially under-fitting the model.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-048
    when: When extracting bucket boundaries from OptimalBucketer fit
    action: Access splits via OptimalBinning.splits attribute (not binner.bin_edges_)
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect attribute access causes AttributeError or returns wrong data format, breaking bucket assignment
      in downstream transformation.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-049
    when: When handling missing values during optimal bucketing
    action: Filter missing values before optimization, then assign via missing_treatment strategy
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing values included in binning optimization cause NaN WoE values and violate monotonicity constraints,
      corrupting the entire bucket table statistics.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-050
    when: When requiring interpretable credit scorecard output
    action: Limit max_n_bins to <=10 for credit scorecard interpretability
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: More than 10 bins creates overly complex scorecards that regulators and business stakeholders cannot interpret,
      defeating the purpose of traditional credit scoring models.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-051
    when: When presenting optimal bucketing results to stakeholders
    action: Claim optimal bucket boundaries as globally optimal or regulator-approved
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Optimal bucketing uses heuristic solvers (CP/MIP) that find locally optimal solutions. Results are not guaranteed
      globally optimal and require validation. Presenting as guaranteed optimal misleads stakeholders.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-052
    when: When using WoE/IV metrics from optimal bucketing
    action: Claim WoE/IV metrics as definitive predictor importance measures
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: WoE and IV are univariate metrics that ignore correlations and interactions between features. Using them
      as sole importance measures leads to incorrect feature selection and missed multi-collinearity issues.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-053
    when: When comparing optimal bucketing results across different datasets
    action: Claim that buckets optimized on one population generalize to another
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Bucket boundaries optimized on training data may not maintain monotonicity or minimum bin sizes on different
      populations, causing distribution shift and degraded model performance in production.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-054
    when: When the optbinning solver cannot satisfy each constraints
    action: Relax monotonic_trend or min_bin_size constraints rather than force invalid buckets
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Forcing infeasible constraints causes solver failure or produces degenerate solutions with extreme WoE values.
      Setting monotonic_trend=None disables monotonicity; reducing min_bin_size increases sample per bin at cost of more bins.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-055
    when: When bucketing categorical features with many rare categories
    action: Use cat_cutoff parameter to group rare categories together
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Categories with very few observations (<cat_cutoff ratio) create noisy bins with unreliable WoE values, inflating
      IV calculations and misleading feature selection.
    stage_ids:
    - optimal_bucketing
  - id: finance-C-058
    when: When applying 'passthrough' missing_treatment strategy
    action: Leave missing values as NaN during transformation without assigning them to a bucket
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing values will be assigned to a bucket instead of being preserved as NaN, breaking the expected passthrough
      behavior
    stage_ids:
    - missing_value_assignment
  - id: finance-C-059
    when: When using 'most_frequent' missing_treatment and missings are already the most common bucket
    action: Select the next most frequent bucket instead of assigning missings to themselves
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Missing values would be assigned to themselves creating a logical inconsistency in bucket assignment
    stage_ids:
    - missing_value_assignment
  - id: finance-C-060
    when: When specifying missing_treatment as a dictionary with integer bucket values
    action: Verify each bucket values are non-negative integers
    severity: high
    kind: domain_rule
    modality: must
    consequence: ValueError is raised when bucket values are negative or non-integer, preventing proper missing assignment
    stage_ids:
    - missing_value_assignment
  - id: finance-C-061
    when: When selecting the 'neutral' missing_treatment strategy
    action: Assign missings to the bucket with WoE closest to zero among buckets with positive count
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing values will be assigned to a bucket with non-zero WoE, violating the neutral stance principle where
      WoE=0 indicates no predictive power
    stage_ids:
    - missing_value_assignment
  - id: finance-C-063
    when: When bucket statistics calculation is enabled via get_statistics=True (default)
    action: Calculate WoE/IV tables for each fitted features during the fit process
    severity: high
    kind: resource_boundary
    modality: must
    consequence: WoE and IV values will not be available for downstream credit scoring tasks, breaking the reporting and feature
      selection pipeline
    stage_ids:
    - missing_value_assignment
  - id: finance-C-064
    when: When assigning missings with 'most_risky' strategy in credit risk modeling
    action: Use the bucket with the highest event rate as the conservative assumption
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Assigning missings to low-risk buckets underestimates credit risk, potentially leading to incorrect credit
      approvals and financial losses
    stage_ids:
    - missing_value_assignment
  - id: finance-C-067
    when: When accessing bucket_table after fitting with missing value assignment
    action: Return bucket statistics that include missings in their final assigned bucket counts
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Reported bucket statistics will show missings as a separate bucket despite being assigned elsewhere, causing
      misleading performance metrics and IV calculations
    stage_ids:
    - missing_value_assignment
  - id: finance-C-068
    when: When calculating WoE for the missing bucket after 'neutral' assignment
    action: Reflect the WoE of the assigned neutral bucket (WoE closest to 0), not the original missing-only WoE
    severity: high
    kind: domain_rule
    modality: must
    consequence: The WoE value will incorrectly represent missings as a neutral indicator when they should be assigned based
      on the neutral bucket's WoE characteristics
    stage_ids:
    - missing_value_assignment
  - id: finance-C-072
    when: When initializing a BucketMapping without explicit missing_bucket
    action: Assign missing values to bucket ID -1 as the default sentinel
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing values get bucket -1 as sentinel, making them identifiable in transformed data without explicit handling
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-073
    when: When building labels for numerical BucketMapping
    action: Automatically prepend -inf and append +inf to boundaries list
    severity: high
    kind: domain_rule
    modality: must
    consequence: Labels are generated with infinite boundaries, ensuring all values map to a bucket including extreme values
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-075
    when: When numerical boundaries are empty in BucketMapping
    action: Create a single bucket spanning each values from -inf to +inf
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Empty boundaries create one bucket for all values, preventing any binning differentiation
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-076
    when: When BucketMapping is used to transform numerical data
    action: Use np.digitize with the right parameter controlling interval inclusion
    severity: high
    kind: domain_rule
    modality: must
    consequence: np.digitize with right=True includes right boundary in interval, affecting bucket assignment for boundary
      values
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-077
    when: When BucketMapping contains special values
    action: Assign negative bucket IDs starting from -3 (reserved range -1 to -N)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Special buckets use negative IDs distinct from missing(-1) and other(-2), preventing bucket ID conflicts
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-079
    when: When persisting bucket mappings to file for deployment
    action: Use save_yml method which serializes via yaml.safe_dump(as_dict())
    severity: high
    kind: resource_boundary
    modality: must
    consequence: save_yml uses yaml.safe_dump with dataclasses.asdict, creating human-readable YAML but requires correct loading
      path
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-080
    when: When BucketMapping is created
    action: Use dataclass decorator for immutability and consistent structure
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: dataclass ensures consistent field structure and enables easy serialization via dataclasses.asdict
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-081
    when: When loading YAML files via UserInputBucketer
    action: Pass the loaded dict to FeaturesBucketMapping constructor for reconstruction
    severity: high
    kind: resource_boundary
    modality: must
    consequence: UserInputBucketer constructs FeaturesBucketMapping from loaded YAML dict, preserving all bucket information
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-082
    when: When attempting to serialize bucket mappings
    action: Use YAML or JSON format via as_dict() method
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Only YAML/JSON serialization is supported through as_dict() method, other formats require custom implementation
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-083
    when: When fitting a bucketer before using save_yml
    action: Call fit() or fit_transform() on the bucketer first
    severity: high
    kind: operational_lesson
    modality: must
    consequence: save_yml calls check_is_fitted, which raises error if bucketer has not been fitted, preventing serialization
      of unfitted state
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-084
    when: When round-tripping bucket mappings through YAML serialization
    action: Verify that transformed results are identical before and after serialization
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Serialization round-trip must preserve transform behavior, as tested in test_io.py lines 72-74 which assert
      X_trans.equals(X_trans_yaml)
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-085
    when: When creating BucketMapping for round-trip serialization
    action: Verify as_dict() captures each fields needed to reconstruct identical BucketMapping
    severity: high
    kind: operational_lesson
    modality: must
    consequence: as_dict() uses dataclasses.asdict which captures all fields, enabling exact reconstruction via BucketMapping(**as_dict())
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-086
    when: When using BucketMapping transform() for model inference
    action: Verify same input values produce same bucket IDs consistently
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Deterministic transform is critical for model deployment, tested in test_bucket_mapping.py:155 assert bucket.transform(x)
      == bucket.transform(x)
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-087
    when: When mapping missing values through BucketMapping
    action: Handle missing values separately from other special values
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing values are detected via x.isnull() and assigned _missing_bucket (-1 by default) before special value
      handling
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-088
    when: When bucketer finishes fitting
    action: Store features_bucket_mapping_ as FeaturesBucketMapping type
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: features_bucket_mapping_ must be FeaturesBucketMapping for downstream operations like save_yml and transform
      to work correctly
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-089
    when: When BaseBucketer.transform() processes a DataFrame
    action: Delegate to BucketMapping.transform() for each feature individually
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Separate delegation to per-feature BucketMapping ensures correct binning logic per feature type (numerical
      vs categorical)
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-090
    when: When BucketMapping is the atomic unit for serialization
    action: Verify BucketMapping contains complete bucketing information for one feature
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: BucketMapping is designed as the atomic unit storing feature_name, type, map, specials, missing_bucket, right,
      and labels
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-091
    when: When FeaturesBucketMapping aggregates multiple features
    action: Store BucketMapping objects keyed by feature_name in maps dictionary
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: FeaturesBucketMapping uses internal maps dict to organize per-feature BucketMapping objects for batch operations
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-092
    when: When merging prebucketing and bucketing BucketMapping objects
    action: Validate that both mappings have matching type (numerical/categorical)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Type mismatch between merging BucketMappings raises AssertionError with clear message about variable_type
      settings
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-093
    when: When presenting serialization results to stakeholders
    action: Claim that YAML files are encrypted or access-controlled
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: yaml.safe_dump produces plain text output with no encryption or access control, anyone can read the bucket
      boundaries
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-094
    when: When evaluating backtest or historical performance
    action: Claim that serialized bucket mappings guarantee model accuracy
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Serialization only preserves binning boundaries, not the predictive quality of the scorecard built on those
      buckets
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-095
    when: When deploying bucket mappings to production
    action: Assume YAML files are compatible across library versions
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: No version compatibility guarantee exists, schema changes in future releases may break loading of older YAML
      files
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-096
    when: When loading YAML dictionary into FeaturesBucketMapping
    action: Skip validation of required fields in the loaded dictionary
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: BucketMapping(**bucketmap) in load_dict triggers __post_init__ validation, but if required fields are missing
      the reconstruction will fail
    stage_ids:
    - bucket_mapping_storage
  - id: finance-C-099
    when: When a bucket has zero observations
    action: Assign NaN to the WoE value for that bucket to avoid misleading zero-count indicators
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero-count buckets appear as valid WoE=0, which is indistinguishable from a balanced bucket, masking data
      gaps and potentially misleading downstream feature selection decisions
    stage_ids:
    - bucket_reporting
  - id: finance-C-101
    when: When validating input data before bucket reporting
    action: Assert that the specified column exists in the input DataFrame before any computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing column causes cryptic pandas KeyError deep in computation rather than a clear early validation failure
    stage_ids:
    - bucket_reporting
  - id: finance-C-103
    when: When the target variable y has only one unique class
    action: Raise a descriptive ValueError indicating that WoE requires a binary target with at least two classes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single-class target produces NaN WoE values silently, leading to all-zero or NaN-encoded features that break
      logistic regression training entirely
    stage_ids:
    - bucket_reporting
  - id: finance-C-104
    when: When the iv() or psi() functions are called
    action: Pass bucketed feature values (output from a fitted bucketer), not raw features, to compute meaningful WoE and
      IV
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing raw continuous features to IV calculation treats each unique value as a bucket, producing inflated
      IV values that falsely indicate high predictive power
    stage_ids:
    - bucket_reporting
  - id: finance-C-105
    when: When rendering bucket visualization plots
    action: Use plotly as the rendering library to produce interactive plots compatible with Jupyter environments
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Users without plotly installed receive a cryptic ModuleNotFoundError instead of a clear dependency requirement
      message
    stage_ids:
    - bucket_reporting
  - id: finance-C-106
    when: When exporting plotly figures to static image formats
    action: Install the kaleido package as a dependency for fig.to_image(format=...) calls to succeed
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without kaleido, calling plot_prebucket/plot_bucket with format='png' raises an error and no static image
      is produced
    stage_ids:
    - bucket_reporting
  - id: finance-C-107
    when: When rendering plotly plots in a non-Jupyter environment
    action: Attempt to display interactive plotly HTML output directly in non-interactive terminals or scripts
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Interactive plotly figures fail silently or raise display errors when rendered in non-Jupyter environments,
      leaving users with no visual output
    stage_ids:
    - bucket_reporting
  - id: finance-C-108
    when: When selecting features using Information Value thresholds
    action: 'Apply standard IV thresholds for predictive power classification: IV < 0.02 (non-predictive), 0.02–0.1 (predictive),
      > 0.1 (very predictive)'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without standardized IV thresholds, practitioners may include noisy non-predictive features or exclude genuinely
      useful ones, degrading scorecard model performance
    stage_ids:
    - bucket_reporting
  - id: finance-C-109
    when: When choosing the epsilon smoothing parameter for WoE calculations
    action: 'Select epsilon values carefully as they directly affect WoE numerical stability: smaller values (0.00001) preserve
      more distinction but risk numerical issues, larger values (1.0) smooth more aggressively'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Inappropriate epsilon causes either numerical instability (too small) or excessive smoothing that masks true
      bucket differences (too large), corrupting both WoE values and logistic regression coefficients
    stage_ids:
    - bucket_reporting
  - id: finance-C-110
    when: When generating bucket reports on training data
    action: Distinguish between training IV and validation/test IV to detect overfitting in the bucketing strategy itself
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using the same data for both bucketer fitting and IV calculation produces optimistically biased IV values
      that do not generalize, leading to scorecard models that underperform on unseen data
    stage_ids:
    - bucket_reporting
  - id: finance-C-111
    when: When configuring bucketer parameters
    action: Set get_statistics=False when memory is constrained or when bucket_tables_ are not needed, to avoid retaining
      large statistics tables unnecessarily
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: With get_statistics=True (the default), bucket_tables_ are computed and retained for all features during
      fit(), causing unnecessary memory retention and fit-time performance penalty
    stage_ids:
    - bucket_reporting
  - id: finance-C-112
    when: When calling make_plot_figure with the line parameter
    action: Pass only 'event_rate' or 'woe' as the line parameter; any other value raises AttributeError
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Invalid line parameter causes AttributeError during plot generation, blocking interactive exploration of
      bucket statistics
    stage_ids:
    - bucket_reporting
  - id: finance-C-113
    when: When calling bucket_table() on a fitted bucketer
    action: Verify the bucketer was fitted with y provided, otherwise bucket_table() may lack WoE/IV columns and Event/Non-event
      counts
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Fitting without y produces bucket_tables_ that only contain bucket_id, label, Count, and Count (%), missing
      all WoE-related columns needed for feature selection
    stage_ids:
    - bucket_reporting
  - id: finance-C-114
    when: When generating PSI between two samples
    action: Assert that X1 and X2 have identical column names before computing Population Stability Index
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched column names between expected and actual samples produces incorrect PSI values, masking true population
      shifts and potentially allowing stale scorecards to remain in production
    stage_ids:
    - bucket_reporting
  - id: finance-C-115
    when: When presenting Information Value results for feature selection
    action: Claim that IV values are absolute or universal feature importance metrics, ignoring that IV is both target-dependent
      and bucketing-strategy-dependent
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting IV as a universal metric misleads stakeholders into selecting features that may not generalize
      across time periods, different target definitions, or alternative bucketing schemes
    stage_ids:
    - bucket_reporting
  - id: finance-C-116
    when: When presenting WoE and bucket statistics
    action: Present bucket-level WoE/IV values as stable model parameters without noting their dependence on the training
      sample composition
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: WoE and IV values computed on a specific training sample change when recalculated on new data, so presenting
      them as fixed model parameters misleads stakeholders about scorecard stability
    stage_ids:
    - bucket_reporting
  - id: finance-C-117
    when: When using the passthrough missing value treatment
    action: Recognize that bucket ID 31415926535 serves as a sentinel for passthrough missing values and is replaced with
      'Missing' label and NaN bucket_id in the final output
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Failing to recognize the magic number 31415926535 sentinel causes missing value rows to appear as regular
      buckets with confusing labels and IDs in the output
    stage_ids:
    - bucket_reporting
  - id: finance-C-118
    when: When verifying the consistency of Event counts in bucket_table
    action: Assert that the sum of Event column equals the total number of positive labels in y for the same data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Event count mismatch indicates a bug in bucket assignment logic where some observations are not being counted
      correctly, corrupting all derived WoE/IV calculations
    stage_ids:
    - bucket_reporting
  - id: finance-C-119
    when: When using psi() for population stability monitoring
    action: 'Apply standard PSI thresholds: PSI < 0.1 (stable), 0.1–0.25 (slight drift, investigate), > 0.25 (significant
      drift, retrain)'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without PSI threshold guidelines, practitioners may miss population drift that degrades scorecard performance
      in production, or over-react to minor fluctuations
    stage_ids:
    - bucket_reporting
  - id: finance-C-120
    when: When interpreting IV values from the summary output
    action: Assume IV values above 1.0 are always valid indicators of extremely high predictive power, as IV > 1.0 may indicate
      overfitting or data quality issues
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: IV values exceeding 1.0 are uncommon in practice and often signal that the bucketing was performed on the
      same data used for evaluation, creating look-ahead bias or indicating feature leakage
    stage_ids:
    - bucket_reporting
  - id: finance-C-125
    when: When building production scorecard pipeline
    action: use category_encoders.woe.WOEEncoder instead of deprecated skorecard WoeEncoder
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using the deprecated custom WoeEncoder risks relying on unmaintained code with unresolved issues, while production
      systems require battle-tested libraries
    stage_ids:
    - woe_encoding
  - id: finance-C-127
    when: When transforming new data with unknown categories
    action: apply handle_unknown strategy (return_nan, error, or value/WoE=0)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unmapped categories default to incorrect values without explicit strategy, causing silent prediction errors
      on production data with novel categories
    stage_ids:
    - woe_encoding
  - id: finance-C-128
    when: When preparing input data for WoE encoding
    action: verify input features contain no NaN values before fitting WoeEncoder
    severity: high
    kind: domain_rule
    modality: must
    consequence: WoE encoder does not support NaN inputs, causing fit() to fail and blocking model training; missing values
      must be pre-processed through bucketing
    stage_ids:
    - woe_encoding
  - id: finance-C-129
    when: When setting up WoE encoder parameters
    action: use consistent epsilon value across metrics.py and _WoEEncoder.py
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Inconsistent epsilon values (0.00001 vs 0.0001) between core metrics and encoder produce different WoE values,
      causing validation/reporting discrepancies
    stage_ids:
    - woe_encoding
  - id: finance-C-130
    when: When deploying WoE encoding for production scoring
    action: store the WoE mapping dictionary for deployment inference
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without stored WoE mappings, production scoring cannot replicate training-time encoding, causing prediction
      divergence between development and deployment
    stage_ids:
    - woe_encoding
  - id: finance-C-131
    when: When claiming WoE encoding capabilities
    action: claim support for multi-class classification problems
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: WoE encoding produces undefined results for multi-class targets, as the binary good/bad ratio formula breaks
      down with more than two classes
    stage_ids:
    - woe_encoding
  - id: finance-C-132
    when: When reporting WoE-based scorecard results
    action: present WoE-transformed model weights as equivalent to live trading performance
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: WoE-encoded logistic regression models are trained on historical data without real-time market factors, so
      backtested credit decisions do not guarantee equivalent future performance
    stage_ids:
    - woe_encoding
  - id: finance-C-133
    when: When encountering missing values in input features
    action: skip missing value treatment before WoE encoding
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Failing to handle missing values through bucketing produces encoding errors, as WoeEncoder explicitly checks
      for and blocks NaN inputs
    stage_ids:
    - woe_encoding
  - id: finance-C-135
    when: When fitting LogisticRegression with calculate_stats=True
    action: set calculate_stats=True before calling fit() OR pass calculate_stats=True to fit()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling get_stats() without calculating statistics raises AssertionError. Users expecting coefficient p-values,
      z-statistics, and standard errors will encounter runtime errors.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-138
    when: When computing covariance matrix for coefficient statistics
    action: use Fisher information matrix inversion via np.linalg.inv((X_design * p[..., np.newaxis]).T @ X_design)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect covariance matrix formula produces invalid standard errors, z-statistics, and p-values, compromising
      statistical inference and variable significance testing.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-139
    when: When setting LogisticRegression regularization strength
    action: verify regularization parameter C matches desired model complexity for credit risk
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient regularization (high C) causes overfitting to training data, producing unstable scorecards that
      degrade on new data. Excessive regularization (low C) underfits, losing predictive power.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-140
    when: When optimizing logistic regression with default parameters
    action: verify max_iter >= 100 or adjust based on data complexity
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Default max_iter=100 may be insufficient for complex scorecards, causing sklearn ConvergenceWarning and producing
      suboptimal coefficients. The L-BFGS optimizer may terminate early before reaching optimal solution.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-141
    when: When selecting solver for LogisticRegression
    action: use solver='lbfgs' for L2 penalty with default settings
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incompatible solver-penalty combinations cause ValueError. Using 'liblinear' with L1/L2 requires different
      penalty specification. Wrong solver choice reduces training efficiency or fails entirely.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-142
    when: When training speed is critical
    action: set calculate_stats=False to skip Fisher information matrix computation
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Stats computation via matrix inversion (np.linalg.inv) adds significant computational overhead. Skipping
      stats during iterative development and only enabling for final analysis improves training speed.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-143
    when: When validating trained scorecard coefficients
    action: verify coefficients have expected signs matching WoE ordering
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unexpected coefficient signs indicate multi-collinearity or feature engineering errors. In scorecards, higher
      WoE (better risk) should correspond to lower predicted probability of default, with consistent coefficient direction.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-144
    when: When model needs to pass sklearn compatibility checks
    action: verify binary_only tag is set and n_features_in_, classes_ attributes are populated
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Sklearn compatibility checks fail for estimators that don't implement required attributes (n_features_in_,
      classes_) and tags. Pipeline integration with sklearn cross-validation and grid search requires full compatibility.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-145
    when: When implementing LogisticRegression extension
    action: inherit from sklearn.linear_model.LogisticRegression to leverage battle-tested implementation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reimplementing logistic regression from scratch risks numerical instability, incorrect optimization, and
      missing edge cases. Inheriting from sklearn ensures robust implementation with proven convergence and gradient computation.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-146
    when: When accessing coefficient statistics after fit
    action: call get_stats() which returns DataFrame with columns [Coef., Std.Err, z, P>|z|]
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Accessing stats attributes directly (std_err_coef_, z_coef_, p_val_coef_) without checking existence causes
      AttributeError. get_stats() provides a validated interface with proper error messages.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-147
    when: When presenting model performance metrics to stakeholders
    action: claim backtest AUC/Gini equals expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest metrics are inflated due to overfitting to historical data, look-ahead bias from feature selection,
      and different market conditions. Presenting backtest AUC as expected live performance misleads stakeholders about model
      reliability.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-148
    when: When reporting coefficient statistics with calculate_stats=True
    action: present p-values as definitive significance measures without caveats
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: P-values computed via Gaussian approximation to Fisher information may be inaccurate for small samples or
      non-standard conditions. Overstating statistical significance leads to incorrect variable selection and regulatory compliance
      issues in credit scoring.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-149
    when: When interpreting coefficient magnitude for risk ranking
    action: compare raw coefficient magnitudes across features with different WoE scales
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: WoE-encoded features have different scales (WoE values vary by feature). Raw coefficient magnitude doesn't
      reflect feature importance. Weight plot with confidence intervals should be used for relative importance assessment.
    stage_ids:
    - logistic_regression_training
  - id: finance-C-152
    when: When implementing scorecard point calculations
    action: assign zero points to the intercept term
    severity: high
    kind: domain_rule
    modality: must
    consequence: Intercept points will be incorrectly included in total score, violating the additive model property where
      only feature WoE contributions add points
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-158
    when: When selecting the master scale parameters
    action: use positive values for pdo, ref_score, and ref_odds
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Negative or zero pdo/ref_odds will produce invalid score ranges (division by zero, negative infinite values),
      breaking the scorecard scaling formula
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-159
    when: When using the standard credit scoring defaults
    action: expect scores in the 300-700 range for standard scaling parameters (pdo=20, ref_score=100, ref_odds=1)
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without verifying score range, users may deploy scorecards with unexpected point distributions, complicating
      business interpretation and credit decision thresholds
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-160
    when: When initializing ScoreCardPoints without the WoE encoder in pipeline
    action: skip validation of encoder type even though ValueError is raised
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Skipping the encoder validation would allow ScoreCardPoints to proceed with incorrect or missing WoE mappings,
      producing garbage in point calculations
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-161
    when: When calculating points for features with null WoE values
    action: filter out rows where woe is null before calculating points
    severity: high
    kind: domain_rule
    modality: must
    consequence: Null WoE values (e.g., empty buckets with no observations) will propagate as NaN into points, causing invalid
      score calculations and potential downstream errors
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-162
    when: When presenting scorecard results
    action: claim that backtest scorecard performance equals expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Scorecard points are calibrated from historical logistic regression coefficients; presenting them as guaranteed
      future credit decisions violates financial risk management principles
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-163
    when: When verifying the PDO doubling property
    action: confirm that doubling odds produces approximately PDO increase in score
    severity: high
    kind: operational_lesson
    modality: must
    consequence: If the score increase differs from PDO when odds double, the master scale is miscalibrated, invalidating
      the scorecard's interpretability for credit decisions
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-164
    when: When rounding scorecard points to integers
    action: round points using int(round(x, 0)) for clean integer scores
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-integer points would complicate business interpretation and make scorecard tables harder to read, as
      credit scores are traditionally presented as whole numbers
    stage_ids:
    - scorecard_rescaling
  - id: finance-C-167
    when: When data flows from prebucketing to optimal_bucketing
    action: pre-binned X DataFrame must have <=100 unique values per column (max_n_bins constraint)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding 100 unique values causes OptimalBinning solver timeout or excessive memory usage, degrading pipeline
      performance
    stage_ids:
    - prebucketing
    - optimal_bucketing
  - id: finance-C-170
    when: When data flows from bucket_mapping_storage to bucket_reporting
    action: FeaturesBucketMapping must be a fitted instance with bucket_tables_ attribute for statistics calculation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unfitted FeaturesBucketMapping causes NotFittedError when building bucket tables, preventing reporting generation
    stage_ids:
    - bucket_mapping_storage
    - bucket_reporting
  - id: finance-C-174
    when: When implementing the scorecard rescaling pipeline
    action: ScoreCardPoints must receive a fitted Skorecard model instance
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unfitted model causes check_is_fitted to fail at ScoreCardPoints initialization, preventing scorecard point
      calculation
    stage_ids:
    - logistic_regression_training
    - scorecard_rescaling
  - id: finance-C-179
    when: When assigning bucket IDs in any BucketMapping
    action: Assign bucket ID -1 for missing values, -2 for 'other' (categorical only), and -3 and below for special buckets
      in reverse order
    severity: high
    kind: domain_rule
    modality: must
    consequence: Scorecard reporting, WoE encoding, and pipeline merging assume these reserved bucket IDs. Breaking this convention
      causes incorrect bucketing transforms and invalid WoE calculations
  - id: finance-C-180
    when: When using OptimalBucketer with numerical features
    action: Pre-bucket numerical features to at most 100 unique values before applying OptimalBucketer using DecisionTreeBucketer
      or similar
    severity: high
    kind: resource_boundary
    modality: must
    consequence: OptimalBinning solver experiences severe performance degradation or fails to converge with high-cardinality
      numerical features
  - id: finance-C-183
    when: When building categorical bucket mappings
    action: Verify the categorical map starts at 0 and uses incremental integer values with no gaps
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Categorical encoding and WoE transformation assume contiguous bucket IDs starting from 0. Non-contiguous
      mappings cause index errors and incorrect encoding
  - id: finance-C-184
    when: When using BucketingProcess with two-phase bucketing
    action: Verify each numerical columns that are bucketed are also pre-bucketed, and each pre-bucketed numerical columns
      are also bucketed
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bidirectional validation ensures the two-phase bucketing pipeline maintains consistent bucket mappings. Violations
      cause NotPreBucketedError or NotBucketedError at fit time
  - id: finance-C-185
    when: When presenting or reporting this system's capabilities externally
    action: Claim that skorecard supports multi-class classification or non-binary target variables
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will attempt to use skorecard for multi-class problems where all bucketers and WoE calculations fail
      or produce undefined results, leading to incorrect models and business losses
  - id: finance-C-186
    when: When presenting or reporting this system's capabilities externally
    action: Claim that skorecard supports unsupervised binning without target correlation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: WoE encoding, IV calculations, and optimal binning all require target correlation. Unsupervised use produces
      meaningless bucket statistics and violates credit scoring methodology
  - id: finance-C-187
    when: When presenting or reporting this system's capabilities externally
    action: Claim that skorecard supports real-time streaming data processing
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: skorecard is a batch-oriented scorecard development tool. It requires fitting on historical data with pandas
      DataFrames and does not support streaming inference or real-time data pipelines
  - id: finance-C-188
    when: When presenting or reporting this system's capabilities externally
    action: Claim that skorecard supports deep learning or non-linear models
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: skorecard is specifically designed for traditional logistic regression scorecards with WoE-transformed binned
      features. The internal pipeline and ScoreCardPoints only support linear model coefficients
  - id: finance-C-189
    when: When implementing sklearn-compatible bucketers
    action: Extend both BaseEstimator and TransformerMixin from sklearn, and implement _get_feature_splits() returning (splits,
      right) tuple
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Pipeline compatibility, clone() functionality, and internal bucketing contract require these base classes.
      Violations cause sklearn pipeline failures and serialization errors
  - id: finance-C-190
    when: When handling missing values in bucketing
    action: Verify missing values are either filtered during fit or assigned to a specific bucket after fit — never leave
      NaN values unhandled in the transformation output
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'WoEEncoder explicitly does not support NaN values (tagged ''allow_nan: False''). Unhandled missing values
      in the pipeline cause transformer failures and corrupt downstream calculations'
  - id: finance-C-191
    when: When implementing or modifying bucket assignment logic for missing values in skorecard
    action: Assign bucket_id = 0 or any positive value to missing values — missing values must always receive bucket_id =
      -1 as sentinel value
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using bucket_id = 0 for missing values conflicts with the first bin convention (0-indexed bins), causing
      silent data corruption where missing values are incorrectly treated as valid bin 0 observations in WoE calculations
      and downstream scoring
    derived_from_bd_id: BD-013
  - id: finance-C-192
    when: When initializing bucketer classes in skorecard for production training pipelines
    action: Set get_statistics=False if only transformed values are needed — explicitly opt-out to save O(n*buckets) compute
      overhead per training run; preserve get_statistics=True only when WoE/IV reporting is required
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: With get_statistics=True (default), every fit() call computes full WoE and IV tables, adding significant
      overhead in high-frequency retraining scenarios without providing value when only transformed values are needed
    derived_from_bd_id: BD-072
  - id: finance-C-193
    when: When configuring BucketingProcess with default DecisionTreeBucketer prebucketer
    action: Verify that max_n_bins=50 and min_bin_size=0.02 match the feature's distribution characteristics — for highly
      imbalanced features, adjust thresholds to avoid empty bins or insufficient granularity that distorts WoE calculations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: With min_bin_size=0.02, features containing rare categories may produce fewer than 50 effective bins, and
      sparse distributions may create empty bins, causing WoE calculations to fail or produce unreliable risk scores for minority
      populations
    derived_from_bd_id: BD-083
  - id: finance-C-194
    when: When configuring missing value treatment strategy in production credit scoring models
    action: Select and document a consistent missing value treatment strategy aligned with business risk appetite — if using
      'most_risky', implement controls to prevent strategic data omission manipulation; if using 'neutral', acknowledge that
      signal from deliberate omission is ignored
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 'most_risky' treats applicants strategically omitting data as highest-risk, while 'neutral' ignores
      this signal entirely — inconsistent strategy selection across model versions creates materially different risk assessments
      for the same population and enables outcome manipulation
    derived_from_bd_id: BD-086
  - id: finance-C-196
    when: When implementing or modifying model training logic in skorecard
    action: Apply skorecard to multi-class classification problems — the WoE formula log(p1/p0) only produces valid results
      with binary targets
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using skorecard for multi-class problems produces mathematically invalid WoE values, as the binary WoE formula
      cannot handle more than two classes, causing systematically incorrect scorecard predictions
    derived_from_bd_id: BD-076
  - id: finance-C-197
    when: When detecting categorical features during feature preprocessing
    action: Identify features with exactly 10 unique values as categorical features and apply categorical binning treatment
      (not numerical OptimalBucketer), or provide explicit user override mechanism
    severity: high
    kind: domain_rule
    modality: must
    consequence: Features with exactly 10 unique values are treated as numerical due to the <10 threshold, receiving tree-based
      splits instead of proper categorical treatment, producing meaningless binning for legitimate categorical variables like
      credit_score_bands
    derived_from_bd_id: BD-089
  - id: finance-C-198
    when: When implementing event logging in production systems
    action: Assume the framework provides immutable event logging — the framework does not implement append-only or cryptographically
      chained event logs; events can be modified or deleted after creation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without immutable event logging, audit trails can be altered after the fact, causing compliance violations
      and failed regulatory audits
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-199
    when: When implementing event logging for audit compliance
    action: Implement append-only event logging using cryptographic chaining (hash pointer to previous event) or equivalent
      immutability mechanism that prevents modification or deletion of historical events
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without immutable event logging, audit trails can be altered after the fact, causing compliance violations
      and failed regulatory audits
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-200
    when: When processing monetary or quantitative values in data pipelines
    action: Process financial values without explicit currency or unit metadata attached to them — the framework does not
      enforce currency/unit annotation on data fields
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit currency and unit annotation, calculations may silently mix different currencies (USD vs
      EUR) or units (millions vs thousands), causing undetected calculation errors in production
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-201
    when: When defining data schemas or processing financial values
    action: Annotate each monetary fields with explicit ISO 4217 currency codes and each quantitative fields with explicit
      unit specifications (e.g., 'amount_usd', 'quantity_units') using standardized metadata fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit currency and unit annotation, calculations may silently mix different currencies or units,
      causing undetected financial calculation errors that accumulate over time
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-202
    when: When configuring scorecard rescaling parameters
    action: Verify that Basel parameters (pdo=20, ref_score=100, ref_odds=1) align with business requirements — these parameters
      are not adjustable after model initialization
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Basel parameters produce fixed score ranges that may not align with business score interpretation expectations,
      causing miscommunication of risk levels in operational use
    derived_from_bd_id: BD-038
  - id: finance-C-203
    when: When configuring OptimalBucketer monotonic_trend parameter
    action: Verify that auto_asc_desc detection produces the expected monotonic direction — override manually with 'ascending'
      or 'descending' if domain knowledge contradicts the automatic selection
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Auto-detection may produce incorrect monotonic constraints that force unnatural bin orderings, degrading
      scorecard accuracy by constraining bins to non-intuitive directions
    derived_from_bd_id: BD-042
  - id: finance-C-204
    when: When implementing return calculation logic for backtesting
    action: Assume the framework handles return frequency and annualization factor correctly — the framework does not implement
      annualized return calculations with configurable frequency; default behavior may not match expected annualization methodology
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper annualization, strategies with different holding periods cannot be compared fairly; annualized
      returns may be miscalculated by factors of 252, 365, or other frequency values, leading to incorrect performance attribution
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-205
    when: When configuring portfolio rebalancing rules
    action: Implement explicit rebalancing trigger mechanism using time-based (calendar rebalance) or threshold-based (drift
      percentage) rules; default rebalancing behavior must be documented and verified against strategy objectives
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit rebalancing triggers, portfolio drift may accumulate beyond target allocation, causing unintended
      risk exposure and deviation from strategy objectives
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-206
    when: When implementing portfolio rebalancing logic
    action: Assume the framework implements rebalancing trigger mechanism — the framework does not provide built-in rebalancing
      triggers; positions remain static until manually adjusted
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit rebalancing triggers, portfolio drift accumulates unchecked, causing significant deviation
      from target allocation and unintended risk exposure in live trading
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-208
    when: When implementing volatility calculations or risk metrics
    action: Assume the framework implements a configurable volatility model family and distribution selection — the framework
      does not provide built-in volatility models (GARCH, EWMA, etc.) or distribution assumptions beyond normal
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper volatility modeling, risk metrics underestimate tail risk; strategies using VaR or CVaR with
      normal distribution assumption will systematically underpredict losses during market stress
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-209
    when: When configuring volatility calculations for risk management
    action: Explicitly select and configure volatility model (EWMA with lambda=0.94, or GARCH) and distribution assumption;
      do not rely on default normal distribution for VaR calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using normal distribution with historical volatility underestimates tail risk by 30-50% during market crises;
      strategies relying on these risk estimates may experience margin calls not predicted by backtests
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-210
    when: When configuring data provider connections and credentials
    action: Assume the framework implements provider priority routing or credential isolation — the framework does not provide
      built-in multi-provider failover or credential management; each providers share the same authentication context
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without provider priority and credential isolation, API credentials may leak between providers or fallback
      logic may use wrong credentials, causing authentication failures or data corruption
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-211
    when: When configuring data provider connections for multi-source data feeds
    action: Implement provider priority configuration with explicit credential mapping per provider; use environment variables
      or secret manager for credential isolation rather than shared configuration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without provider priority and credential isolation, primary provider failures cause cascading errors; fallback
      providers may fail with authentication errors, leading to data gaps in live trading
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-212
    when: When implementing feature extraction for time-series data
    action: Assume the framework handles feature extraction time boundaries correctly — DAT Summary shows 0/5 pass, 2/5 partial,
      3/5 absent for time boundary handling; lookahead bias may exist in feature calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper time boundary handling in feature extraction, features may include future information (lookahead
      bias), causing backtest results to overestimate live performance by 10-30%
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-213
    when: When implementing time-series feature extraction
    action: Validate that feature calculations use only data available at prediction time; implement explicit feature horizon
      constraints with timestamp validation to prevent lookahead bias
    severity: high
    kind: domain_rule
    modality: must
    consequence: Features with lookahead bias cause strategies to trade on information not yet available, producing unrealistic
      backtest results; live trading will underperform by the magnitude of the bias
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-214
    when: When implementing OptimalBinning with monotonicity or minimum bin size constraints
    action: Use solver='cp' (constrained programming) for OptimalBinning to guarantee constraint satisfaction — alternative
      solvers ('sic', 'ch', 'иск') do not enforce constraints and may produce invalid scorecard binning
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-cp solvers with constraints may produce non-monotonic bins or bins smaller than minimum size, breaking
      scorecard validity and causing prediction errors in downstream models
    derived_from_bd_id: BD-043
  - id: finance-C-215
    when: When calculating Population Stability Index (PSI) for model monitoring
    action: Use epsilon=0.0001 (not 0.00001 or smaller) for PSI division protection — this value is 10x larger than WoE epsilon
      to handle broader distribution comparisons in PSI calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using smaller epsilon in PSI calculations risks division by zero when actual or expected proportions are
      near-zero, causing NaN or infinite PSI values that break monitoring dashboards
    derived_from_bd_id: BD-046
  - id: finance-C-216
    when: When constructing the scorecard pipeline
    action: 'Maintain pipeline order: bucketer → encoder → column_selector → model — this sequence cannot be reordered; encoders
      require binned inputs from bucketers to compute WoE values correctly'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reordering pipeline steps (e.g., encoding before bucketing) causes WoE calculation to fail or produce meaningless
      values, as WoE requires bin assignments that come from bucketers
    derived_from_bd_id: BD-047
  - id: finance-C-217
    when: When implementing data preprocessing for OrdinalCategoricalBucketer
    action: Treat encoded value 0 as a valid category data point — value 0 is reserved for missing values in the encoding
      scheme
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: If the pipeline encodes a valid category as 0 and another feature uses 0 for missing, downstream logic may
      confuse missing values with valid encoded categories, causing incorrect weight-of-evidence calculations and corrupted
      bucket assignments
    derived_from_bd_id: BD-051
  - id: finance-C-218
    when: When interpreting bucket table reports in credit risk analysis
    action: Recognize that 'Event' column represents the event rate (mean of binary target) where 'event' is the adverse outcome
      — do not confuse with unconditional probability or confuse with WoE values which are on a different scale
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misinterpreting 'Event' as unconditional probability or conflating it with WoE leads to incorrect risk assessment;
      WoE and event rate are related but scaled differently, and event rate alone ignores base rate effects
    derived_from_bd_id: BD-057
  - id: finance-C-219
    when: When interpreting weight plots with dual y-axis visualization
    action: Be aware that Event Rate is displayed on secondary y-axis alongside WoE on primary axis — verify which metric
      is being analyzed when comparing buckets, as they have different scales and interpretations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Confusing Event Rate with WoE when reading plots leads to incorrect bucket analysis; Event Rate is bounded
      [0,1] while WoE can range from negative to positive infinity, causing misaligned risk ordering
    derived_from_bd_id: BD-058
  - id: finance-C-220
    when: When configuring DecisionTreeBucketer prebucketing parameters
    action: Verify that max_n_bins=100 provides sufficient granularity for the feature — tree depth may be constrained by
      bin count in ways that differ from max_depth settings, potentially missing optimal splits for complex features
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Setting max_depth without accounting for max_n_bins may produce shallower trees than expected; max_n_bins=100
      is a practical maximum but may still cause over-discretization for features requiring finer granularity
    derived_from_bd_id: BD-059
  - id: finance-C-221
    when: When processing data in the data_preparation stage
    action: Assume that 'type' field is present and valid in the data schema — the framework does not enforce type validation
      at this stage; missing or invalid type values will pass through silently and may cause downstream processing errors
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Missing type field causes downstream bucketing and encoding logic to fail silently or produce incorrect results;
      the pipeline does not validate type presence, leading to cryptic errors in optimal_bucketing or woe_encoding stages
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-222
    when: When configuring OrdinalCategoricalBucketer or similar bucketers in the credit scoring pipeline
    action: Verify that tol=0.05 matches the business requirement for grouping rare categories; higher tolerance (e.g., 0.10)
      reduces bin count but may miss fine-grained risk distinctions, while lower tolerance (e.g., 0.01) preserves more granularity
      but risks overfitting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using tolerance values that are too aggressive groups dissimilar risk profiles into the same bin, destroying
      the predictive power of fine-grained features; using values that are too conservative creates overfitted bins with unreliable
      event rate estimates
    derived_from_bd_id: BD-062
  - id: finance-C-223
    when: When implementing encoding logic for scorecard feature transformation
    action: Use only Weight of Evidence (WoE) encoding as specified by scorecard methodology; do not substitute with other
      encoders such as target encoding, one-hot encoding, or label encoding
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-WoE encoders produces scorecards that do not follow standard credit scoring interpretation; WoE
      ensures monotonic relationship between features and log-odds, which is fundamental for scorecard explainability and
      regulatory compliance
    derived_from_bd_id: BD-064
  - id: finance-C-224
    when: When configuring DecisionTreeBucketer for prebucketing in the credit scoring pipeline
    action: Verify that min_bin_size=0.05 (5% of observations) aligns with dataset size and desired model complexity; verify
      each bin contains sufficient samples for reliable WoE estimation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: min_bin_size that is too small creates bins with unreliable event rate estimates due to insufficient sample
      size, leading to unstable WoE values and overfitted scorecards; min_bin_size that is too large reduces predictive granularity
      and may miss important risk segments
    derived_from_bd_id: BD-066
  - id: finance-C-225
    when: When setting up the prebucketing stage in the default bucketing pipeline
    action: Use DecisionTreeBucketer (supervised) as the default prebucketing method to leverage target information for finding
      predictive split points; if target leakage is a concern, explicitly document and validate using EqualWidthBucketer or
      EqualFrequencyBucketer instead
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using unsupervised prebucketing methods (EqualWidth/EqualFrequency) ignores predictive value of features,
      producing suboptimal initial bins that reduce the quality of final optimal bucketing; this leads to lower IV features
      and weaker scorecard discrimination power
    derived_from_bd_id: BD-067
  - id: finance-C-226
    when: When configuring the optimal bucketing stage in the credit scoring pipeline
    action: Use OptimalBucketer with monotonic constraints as the default bucketing method to verify WoE-monotonic bins suitable
      for scorecards; when monotonicity cannot be achieved ('auto' mode), verify the deviation is explicitly documented and
      validated
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using unsupervised bucketers (UserBucketer, EqualWidth, etc.) without monotonic constraint enforcement produces
      bins where WoE does not monotonically increase with bin index, violating scorecard methodology assumptions and making
      the scorecard difficult to explain to business stakeholders
    derived_from_bd_id: BD-068
  - id: finance-C-227
    when: When implementing or modifying the bucketing pipeline for credit scoring
    action: Assume that the cardinality reduction cascade (OptimalBucketer <=100 unique values, BucketingProcess max_n_bins=100→50,
      _get_feature_splits 100 unique values enforcement) will always succeed silently; the pipeline can produce fewer bins
      than expected without explicit failure signals
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Silent cardinality reduction failures occur when min_bin_size constraints prevent sufficient cardinality
      reduction, causing the pipeline to produce fewer bins than expected without warning; this degrades model performance
      by truncating the optimization path and produces unreliable scorecards
    derived_from_bd_id: BD-085
  - id: finance-C-228
    when: When implementing the bucketing pipeline with multiple cardinality constraints
    action: 'Add explicit cardinality validation at each pipeline stage: check that each feature has <=100 unique values before
      OptimalBucketer, validate that BucketingProcess max_n_bins is achievable given min_bin_size constraints, and log a warning
      when _get_feature_splits enforces cardinality reduction that changes expected bin count'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit cardinality validation, pipeline failures manifest silently as reduced bin counts, making
      it impossible to distinguish between intentional single-bin features and unintended cardinality-related degradation;
      this produces scorecards with suboptimal feature binning that systematically underperform
    derived_from_bd_id: BD-085
  - id: finance-C-229
    when: When implementing the bucketing pipeline for features requiring cardinality reduction
    action: Verify prebucketing explicitly reduces features to <=100 unique values as required by _get_feature_splits before
      passing to OptimalBucketer; validate cardinality at each stage transition and raise an explicit error if min_bin_size
      prevents sufficient reduction rather than silently proceeding with degraded binning
    severity: high
    kind: operational_lesson
    modality: must
    consequence: When prebucketing fails to reduce cardinality sufficiently due to min_bin_size constraints, the pipeline
      silently proceeds with fewer bins than expected, causing the final scorecard to have fewer features or coarser binning
      than designed; this silent degradation is indistinguishable from intentional single-bin features
    derived_from_bd_id: BD-085
  - id: finance-C-230
    when: When implementing or refactoring the bucketer's random state management
    action: Verify random_state propagation covers each sources of stochasticity, including sklearn internal randomness in
      'lbfgs' solver and any numpy-based random operations — do not rely solely on sklearn's random_state parameter for full
      reproducibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Partial reproducibility in regulated credit scoring causes audit failures when exact score reproduction is
      required; runs with identical random_state may produce slightly different coefficients, WoE boundaries, and scores for
      borderline applicants
    derived_from_bd_id: BD-088
  - id: finance-C-231
    when: When implementing or refactoring minimum bin size thresholds across bucketer stages
    action: Stack multiple min_bin_size constraints independently across bucketer stages without accounting for their compounding
      effect — OptimalBucketer (5%) and DecisionTreeBucketer (3%) both enforce size independently, causing sparse features
      to have at most 2 meaningful bins regardless of true distribution
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: For a 100K sample with a rare category at 2% frequency, stacked constraints produce at most 2 meaningful
      bins regardless of true distribution complexity, distorting feature representation in the final scorecard
    derived_from_bd_id: BD-090
  - id: finance-C-232
    when: When implementing or refactoring suppressor detection or binary-only enforcement logic
    action: Treat suppressor warnings as non-critical noise and continue processing when coefficient sign contradicts WoE
      — the binary-only enforcement must halt or escalate when suppressor patterns are detected to prevent internally contradictory
      reason codes in production scorecards
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Adverse action reason codes become logically inconsistent when suppressor effects occur (negative WoE paired
      with positive coefficient) but processing continues; users trusting the binary-only guarantee may not investigate suppressor
      warnings, leading to production scorecards with contradictory point assignments
    derived_from_bd_id: BD-093
  - id: finance-C-235
    when: When configuring bucketer instances for credit scoring pipelines
    action: Verify that the missing_treatment default ('separate') matches domain requirements; understand that different
      bucketers may use different defaults ('most_risky', 'neutral'), and explicitly configure missing_treatment if a specific
      treatment strategy is required for the business scenario
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using inconsistent or mismatched missing treatment across bucketers leads to unreliable credit scores where
      missing values are handled unpredictably, potentially assigning incorrect risk levels to credit applicants
    derived_from_bd_id: BD-002
  - id: finance-C-236
    when: When configuring OptimalBucketer for credit scorecard development
    action: Use max_n_bins between 5-10 to maintain Basel regulatory compliance and model interpretability for consumer lending
      decisions; exceeding 10 bins reduces explainability while fewer than 5 bins sacrifices predictive power
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using fewer than 5 bins or more than 10 bins compromises model explainability and regulatory compliance,
      potentially resulting in rejected credit decisions that cannot be adequately justified under Basel banking standards
    derived_from_bd_id: BD-010
  - id: finance-C-237
    when: When processing temporal data in credit scoring pipelines
    action: Assume the framework automatically distinguishes between as-of dates (event timestamps) and processing dates (system
      timestamps) - this capability is not implemented in the current framework architecture
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper as-of vs processing time handling, credit scoring uses incorrect temporal reference points,
      causing data leakage or stale feature values that distort model predictions and risk assessments
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-238
    when: When loading temporal data for credit scoring pipelines
    action: Explicitly specify as_of_date and processing_date fields in data loading configuration; implement temporal joins
      using as_of_date to verify features are computed at correct historical observation points rather than data ingestion
      timestamps
    severity: high
    kind: domain_rule
    modality: must
    consequence: Implementing explicit as-of date handling prevents data leakage and ensures feature values reflect the correct
      historical state at prediction time, improving model accuracy and regulatory compliance for credit decisions
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-239
    when: When modifying the bucketer inheritance hierarchy or base classes
    action: Maintain the correct mixin order in Python MRO - PlotBucketMethod must appear before BucketTableMethod in the
      inheritance chain; the mixins (PlotBucketMethod, BucketTableMethod, SummaryMethod, PlotPreBucketMethod) must remain
      injected before base transformation classes to preserve reporting capabilities
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect mixin ordering or removing mixins from the inheritance chain breaks method resolution order, causing
      visualization and reporting methods to fail or behave unexpectedly in credit scoring pipelines
    derived_from_bd_id: BD-074
  - id: finance-C-240
    when: When calculating date ranges or time-based features for financial time series analysis
    action: Assume the framework handles trading calendar distinctions — the framework does not distinguish between trading
      days and natural calendar days; using natural calendar dates with trading day logic causes off-by-one errors in feature
      calculation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without trading calendar awareness, date-based features computed on natural calendar days produce incorrect
      results when market holidays or weekends create gaps, causing systematic feature calculation errors in backtesting and
      live trading
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-241
    when: When implementing date-based features for financial backtesting or live trading systems
    action: Integrate a trading calendar library (such as pandas_market_calendars or exchange_calendars) to map natural calendar
      dates to trading days; use business_day_offset or similar functions to align date calculations with actual market operating
      days
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping trading calendar integration causes features to include non-trading days (weekends, holidays) as
      if they were valid trading periods, distorting return calculations and position sizing in backtesting results
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-242
    when: When configuring credit scorecard PDO (Points to Double Odds) scaling parameters
    action: Verify that pdo=20, ref_score=100, ref_odds=1 defaults match Basel banking standards and institutional requirements;
      adjust if score comparison across institutions is needed or if regulatory requirements differ
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using non-standard PDO values (e.g., pdo=15 or pdo=30) creates score distributions that cannot be compared
      against Basel-compliant models, causing regulatory audit failures and potentially invalidating credit decisions
    derived_from_bd_id: BD-027
  - id: finance-C-243
    when: When implementing scorecard feature contribution calculation
    action: Calculate each feature's contribution as WoE multiplied by its logistic regression coefficient, then sum each
      contributions with the intercept to produce the final score — do not use alternative weighting schemes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing WoE×coef with equal weights or raw values breaks additive decomposition needed for adverse action
      reason codes, violating ECOA and FCRA disclosure requirements and causing regulatory non-compliance
    derived_from_bd_id: BD-029
  - id: finance-C-244
    when: When configuring monotonic trend detection for credit scorecard bucketing
    action: Verify that monotonic_trend='auto_asc_desc' correctly detects the relationship direction from training data; validate
      that auto-detected monotonicity aligns with domain knowledge about credit risk before production deployment
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Auto-detected monotonicity may conflict with domain knowledge or regulatory expectations, causing scorecards
      that are harder to explain in adverse action notices and potentially violating consumer credit scoring fairness requirements
    derived_from_bd_id: BD-012
  - id: finance-C-245
    when: When configuring column transformers in credit scorecard pipelines
    action: Verify column name uniqueness before using remainder='passthrough'; explicitly list each required columns or drop
      passthrough columns to prevent undefined behavior from column name collisions between transformed and passthrough columns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passthrough columns with names matching transformed column names cause undefined ColumnTransformer behavior,
      leading to corrupted output DataFrames with duplicate columns and unpredictable model predictions
    derived_from_bd_id: BD-079
  - id: finance-C-246
    when: When implementing missing value handling in credit scorecard bucketing
    action: Assign missing values to the bucket with WoE closest to zero using the 'neutral' strategy — do not assign to extreme
      WoE buckets or create separate missing buckets unless domain evidence supports it
    severity: high
    kind: domain_rule
    modality: must
    consequence: Assigning missings to extreme WoE buckets artificially inflates or deflates risk scores for records with
      missing values, causing systematic prediction bias that leads to incorrect credit decisions and financial losses
    derived_from_bd_id: BD-016
  - id: finance-C-247
    when: When training logistic regression models with skorecard
    action: Verify that calculate_stats=True when WoE values, event rates, or per-bucket statistics are needed for model inspection
      or reporting — the default calculate_stats=False skips these computations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: With calculate_stats=False, model inspection reports will show missing WoE and event rate statistics, causing
      users to rely on incomplete diagnostic information during model validation
    derived_from_bd_id: BD-025
  - id: finance-C-249
    when: When using OptimalBucketer for features with categorical data types
    action: Explicitly set variables_type='categorical' for categorical features before fitting — the default variables_type='numerical'
      applies decision tree binning which produces meaningless splits on categorical data
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Forgetting to set variables_type='categorical' causes the bucketer to apply numerical binning algorithms
      to categorical features, producing invalid splits and degraded model performance in production scoring
    derived_from_bd_id: BD-071
  - id: finance-C-250
    when: When processing buy/sell orders or position data in backtesting
    action: Assume the framework handles versioned writes and snapshot semantics for data persistence — the framework does
      not implement transactional versioning or point-in-time snapshots
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without versioned writes, concurrent backtest runs may overwrite shared state, and point-in-time recovery
      is impossible when data corruption occurs in production
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-251
    when: When implementing data persistence layer for backtest results
    action: Implement versioned writes using optimistic locking (version column) or append-only immutable event logs with
      timestamps, and create snapshots before major state transitions
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without proper versioning, concurrent backtests overwrite each other's results, and recovery from corrupted
      state requires manual intervention instead of point-in-time rollback
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-252
    when: When implementing bucketer logic for credit scorecard feature binning
    action: Exclude special values (0, negative amounts, NaN) from bin boundary calculations by calling _filter_specials_for_fit
      before computing WoE — assign special values to dedicated buckets separate from regular numeric ranges
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including special values in bin boundary calculations distorts WoE computation for regular values, causing
      incorrect risk predictions and invalid credit scores in production scoring
    derived_from_bd_id: BD-039
  - id: finance-C-253
    when: When implementing WoE calculation logic in the metrics module
    action: Use epsilon=0.00001 to prevent division by zero when either event or non-event count is zero in a bin — do not
      use 0 or larger values like 0.001 which would distort WoE values for small bins
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without epsilon protection, WoE calculations crash with division by zero when binning sparse categories with
      zero event or non-event counts, causing the entire scoring pipeline to fail
    derived_from_bd_id: BD-040
  - id: finance-C-254
    when: When implementing WoE formula calculations
    action: Use np.log(non_event%/event%) formula — do not use alternative transforms like logit, as WoE is the industry standard
      for scorecards
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a different WoE formula changes how event probability is measured relative to non-event probability,
      making model coefficients incompatible with industry-standard scorecard interpretation and reporting requirements
    derived_from_bd_id: BD-041
  - id: finance-C-257
    when: When implementing or modifying validation logic in the scorecard pipeline
    action: Issue a warning (not an error) when logistic regression coefficient signs contradict WoE values, indicating potential
      multi-collinearity where a variable appears protective but the model assigns negative weight
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing or converting this warning to silent behavior causes multi-collinearity issues to go undetected,
      leading to unstable model coefficients and unreliable credit risk predictions in production
    derived_from_bd_id: BD-045
  - id: finance-C-258
    when: When implementing bucket assignment logic in the bucketing module
    action: 'Use negative indices for special buckets: Missing=-1, Other=-2, Specials=-3 and below; positive indices for data-driven
      bins numbered 0 and above'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-negative indices for special buckets causes confusion between data-driven bins and edge cases,
      breaking downstream WoE calculations and model training exclusion logic
    derived_from_bd_id: BD-048
  - id: finance-C-259
    when: When processing features with missing values without explicit missing_treatment parameter specification
    action: Apply 'separate' missing_treatment to place missing values in bucket -1, keeping them isolated from regular bin
      calculations and enabling independent missingness pattern tracking
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using imputation or including missings in regular bins distorts WoE calculations and bin boundaries, causing
      credit scoring model to misrepresent risk for records with missing values
    derived_from_bd_id: BD-031
  - id: finance-C-260
    when: When encoding categorical features for the logistic regression scorecard model
    action: Use WoE (Weight of Evidence) encoding exclusively — it provides monotonic transformation aligned with credit risk
      intuition, converts categorical features to continuous form, and captures event rate differential; do not substitute
      one-hot, label, or target encoding
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using alternative encodings (one-hot, label, target) changes the model structure and destroys scorecard interpretability,
      making the resulting model incompatible with credit risk reporting requirements
    derived_from_bd_id: BD-032
  - id: finance-C-261
    when: When building the default bucketing process without explicit feature type specification
    action: 'Auto-detect feature types using threshold of 10 unique values: features with fewer than 10 unique values are
      treated as categorical, triggering categorical bucketing strategies; features with 10 or more unique values are treated
      as numerical'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrectly classifying a feature type causes wrong bucketing strategy application, leading to either overfitting
      (categorical treated as numerical with too many bins) or loss of granularity (numerical treated as categorical with
      too few bins), distorting credit risk predictions
    derived_from_bd_id: BD-033
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
