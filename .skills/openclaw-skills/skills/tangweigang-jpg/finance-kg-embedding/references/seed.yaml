    modality: must
    consequence: Incorrect operation order causes feature leakage from dropout on static embeddings affecting dynamic embeddings,
      or graph conv not being applied to combined representation
    stage_ids:
    - embedding_combination
  - id: finance-C-070
    when: When configuring multi-head attention for embedding combination
    action: Set num_attn_heads to 8 for default KGTransformer configuration
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Non-8 head configuration may not capture all relation patterns optimally, as the model is designed with 8-head
      default based on empirical evaluation
    stage_ids:
    - embedding_combination
  - id: finance-C-073
    when: When truncating backpropagation in RNN-based embedding updates
    action: Detach dynamic embeddings every rnn_truncate_every batches to prevent full history backprop
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without detachment, backprop through time grows unbounded, causing memory exhaustion and training instability
      on long sequences
    stage_ids:
    - embedding_combination
  - id: finance-C-074
    when: When evaluating with cumulative graph embeddings
    action: Set model to eval mode and use torch.no_grad context before combining embeddings
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Training mode dropout and batch norm affect embedding values differently than eval mode, producing inconsistent
      link prediction scores
    stage_ids:
    - embedding_combination
  - id: finance-C-076
    when: When using clamp_preserve_gradients utility
    action: Apply gradient-preserving clamp instead of standard clamp to maintain gradient flow through embedding values
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Standard clamp detaches gradients in the clamped region, breaking backpropagation through the embedding combination
      stage
    stage_ids:
    - embedding_combination
  - id: finance-C-077
    when: When setting dropout rate for Combiner
    action: Use dropout=0.2 default or explicitly configure to avoid overfitting on sparse temporal knowledge graphs
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Zero dropout may cause overfitting on sparse financial knowledge graphs; excessive dropout may prevent learning
      temporal patterns
    stage_ids:
    - embedding_combination
  - id: finance-C-078
    when: When configuring graph convolution with RGCN in Combiner
    action: Set num_bases=100 for non-GDELT datasets to balance expressiveness and regularization
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Insufficient bases reduces relation modeling capacity; excessive bases increases computation without proportional
      accuracy gain
    stage_ids:
    - embedding_combination
  - id: finance-C-079
    when: When applying the Combiner in training loop
    action: Pass the DGLGraph G to Combiner.forward() for optional graph convolution step
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Omitting graph G causes do_graph_conv to receive None, skipping RGCN convolution and producing degraded embeddings
      without structural information
    stage_ids:
    - embedding_combination
  - id: finance-C-080
    when: When combining static and dynamic embeddings for static-only mode
    action: Return only static_emb and set use_static_emb=True, use_dynamic_emb=False in StaticDynamicCombiner
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect configuration causes dynamic embeddings to be processed unnecessarily or combined embeddings to
      have wrong dimension
    stage_ids:
    - embedding_combination
  - id: finance-C-082
    when: When computing combined embedding dimension dynamically
    action: Use the combiner.combined_emb_dim property instead of hardcoding the expected dimension
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hardcoded dimensions become inconsistent when combine mode changes, causing shape mismatches in downstream
      EdgeModel layers
    stage_ids:
    - embedding_combination
  - id: finance-C-083
    when: When extracting last hidden state from RNN for embedding combination
    action: Use [:, -1, :] indexing to extract final timestep from dynamic embeddings before combination
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect slicing produces wrong temporal context, causing embeddings to contain non-final state information
      degrading link prediction accuracy
    stage_ids:
    - embedding_combination
  - id: finance-C-084
    when: When using multi-head attention heads in KGTransformer
    action: Verify hid_dim is divisible by num_heads to compute valid head_size
    severity: high
    kind: domain_rule
    modality: must
    consequence: Integer division failure causes head_size=0 or runtime error, preventing KGTransformer from producing valid
      embeddings
    stage_ids:
    - embedding_combination
  - id: finance-C-085
    when: When designing replacement points for embedding combination
    action: Make combination_mode configurable through args to support ablation studies
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Hardcoded combination modes prevent systematic evaluation of static vs dynamic embedding contributions to
      model performance
    stage_ids:
    - embedding_combination
  - id: finance-C-090
    when: When computing graph context embeddings for link prediction
    action: use GraphReadout with graph_emb_dim matching the transform layer input dimensions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Dimension mismatch between graph_emb_dim and Linear layer input causes runtime errors or degraded performance
      due to incorrect feature aggregation
    stage_ids:
    - link_prediction
  - id: finance-C-091
    when: When performing edge prediction evaluation
    action: keep dynamic_entity_emb on CPU device during evaluation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Moving large dynamic embeddings to GPU causes CUDA memory exhaustion on large graphs, leading to OOM errors
      or significantly reduced evaluation throughput
    stage_ids:
    - link_prediction
  - id: finance-C-092
    when: When evaluating full graph link prediction
    action: respect MAX_EDGES memory limits (num_nodes*10 for CPU, 400000 for GPU)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding MAX_EDGES causes CPU or GPU memory exhaustion, leading to crashes or swap thrashing that makes
      evaluation impractical
    stage_ids:
    - link_prediction
  - id: finance-C-093
    when: When selecting edge model type
    action: choose between EdgeModel (dynamic) and StaticEdgeModel based on temporal prediction requirements
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Using wrong edge model type leads to either missing temporal dynamics or unnecessary computational overhead,
      resulting in suboptimal prediction quality
    stage_ids:
    - link_prediction
  - id: finance-C-097
    when: When extracting relation destination embeddings for dynamic EdgeModel
    action: use the relation destination context slice [:, :, 1] from dynamic_relation_emb
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Wrong slice index causes incorrect relation context to be used, leading to degraded tail prediction quality
      and incorrect temporal relationship modeling
    stage_ids:
    - link_prediction
  - id: finance-C-098
    when: When reporting link prediction evaluation results
    action: claim that backtest ranking metrics guarantee equivalent live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting evaluation metrics as predictive of live trading performance misleads stakeholders, as backtest
      results do not account for execution latency, market impact, or non-stationary data distributions
    stage_ids:
    - link_prediction
  - id: finance-C-100
    when: When verifying embedding dimensions for EdgeModel
    action: assert rel_embed_dim is an integer type
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-integer rel_embed_dim causes incorrect embedding table creation or dimension mismatches in subsequent
      Linear layers, leading to runtime errors
    stage_ids:
    - link_prediction
  - id: finance-C-101
    when: When initializing prediction tensors for evaluation
    action: fill uncomputable log probabilities with -1e20 to represent negative infinity
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using 0 or other values instead of -1e20 causes incorrect probability rankings when combining predictions
      across nodes, leading to false positive or false negative link rankings
    stage_ids:
    - link_prediction
  - id: finance-C-102
    when: When computing embedding dimensions for relation prediction
    action: set transform_rel input dimension to combined_emb_dim + graph_emb_dim
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect dimension causes Linear layer initialization with wrong weight matrix size, leading to dimension
      mismatch errors or degraded relation prediction
    stage_ids:
    - link_prediction
  - id: finance-C-103
    when: When validating static entity embedding device placement
    action: assert static_entity_emb is on CPU during static evaluation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: GPU placement causes CUDA memory allocation issues during large-scale static evaluation, leading to OOM errors
      or reduced evaluation throughput
    stage_ids:
    - link_prediction
  - id: finance-C-126
    when: When implementing training loop for knowledge graph models
    action: Set random seed before initializing model and optimizer to verify reproducibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without reproducible random seeds, experiments cannot be replicated, leading to inconsistent results and
      inability to debug training issues or validate model improvements
    stage_ids:
    - training_pipeline
  - id: finance-C-127
    when: When configuring the training optimizer for financial knowledge graphs
    action: Use weight_decay of 0.00001 for AdamW to provide light regularization on small temporal KG datasets
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Excessive weight decay causes underfitting on small temporal knowledge graph datasets, while zero weight
      decay leads to overfitting, degrading model's generalization to unseen financial events
    stage_ids:
    - training_pipeline
  - id: finance-C-128
    when: When training RNN-based knowledge graph models without gradient clipping
    action: Skip gradient clipping when RNN truncate_every is set too large relative to sequence length
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Unchecked gradients over long BPTT windows cause exploding gradients, leading to numerical instability and
      NaN losses that corrupt the model state and require full retraining
    stage_ids:
    - training_pipeline
  - id: finance-C-129
    when: When using GPU for training knowledge graph models
    action: Verify CUDA availability and set device appropriately before model initialization
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Training on CPU when GPU is available causes 5-10x slowdown, while attempting GPU training without CUDA causes
      runtime crashes and training failure
    stage_ids:
    - training_pipeline
  - id: finance-C-130
    when: When configuring early stopping patience for temporal knowledge graphs
    action: Set patience value between 10-30 epochs to balance between overfitting prevention and training completion
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Too-small patience causes premature stopping before convergence on small temporal KG datasets; too-large
      patience wastes GPU compute on redundant epochs without validation improvement
    stage_ids:
    - training_pipeline
  - id: finance-C-131
    when: When validating model checkpoint loading after training interruption
    action: Load best checkpoint from disk and verify model state before proceeding to test evaluation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using untrained or corrupted model state for test evaluation produces meaningless metrics, wasting GPU compute
      and providing false performance estimates
    stage_ids:
    - training_pipeline
  - id: finance-C-132
    when: When implementing checkpoint packing for model state persistence
    action: Save model weights, optimizer states, embeddings, and hyperparameters together in checkpoint
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing optimizer state in checkpoint causes training restart from random momentum, delaying convergence;
      missing embeddings lose temporal knowledge learned during training
    stage_ids:
    - training_pipeline
  - id: finance-C-133
    when: When saving checkpoints during early stopping tracking
    action: Track both run-best and overall-best checkpoints to preserve best validation performance across each runs
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Saving only run-best checkpoint risks losing the globally best model if later runs achieve worse validation
      scores, requiring full retraining to recover optimal model
    stage_ids:
    - training_pipeline
  - id: finance-C-134
    when: When performing loss computation across multiple optimization targets
    action: Accumulate loss terms and perform single backward pass to avoid gradient conflicts
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Performing multiple backward passes on shared parameters causes gradient accumulation conflicts, leading
      to unstable training and suboptimal model convergence
    stage_ids:
    - training_pipeline
  - id: finance-C-135
    when: When tracking early stopping criterion
    action: Use MRR (Mean Reciprocal Rank) as the primary validation metric for link prediction tasks
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using inappropriate early stopping metric (e.g., loss instead of MRR) may stop training at point of low training
      error but poor generalization, wasting resources on suboptimal model deployment
    stage_ids:
    - training_pipeline
  - id: finance-C-136
    when: When detaching dynamic embeddings after truncated BPTT
    action: Call detach_() on dynamic entity and relation embeddings to truncate gradient flow when using GCN components
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without detaching embeddings, gradients backpropagate through entire historical sequence causing vanishing
      gradients and memory exhaustion on long temporal sequences
    stage_ids:
    - training_pipeline
  - id: finance-C-137
    when: When evaluating model performance after training
    action: Load and use the best checkpoint with highest validation MRR for test evaluation
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Evaluating with non-optimal checkpoint produces misleading test metrics that do not reflect the model's true
      capability, leading to incorrect conclusions about model quality
    stage_ids:
    - training_pipeline
  - id: finance-C-138
    when: When reporting model performance metrics
    action: Claim that validation MRR equals expected test MRR without accounting for temporal distribution shift
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Temporal knowledge graphs have time-varying edge distributions; validation MRR measured on earlier time periods
      does not predict test MRR on later periods, leading to overconfident performance claims
    stage_ids:
    - training_pipeline
  - id: finance-C-139
    when: When handling training interruption or early termination
    action: Always attempt to load and evaluate best checkpoint found before termination to verify test metrics are available
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without fallback to best checkpoint after interruption, training failures leave no usable model or metrics,
      wasting all compute resources spent during training
    stage_ids:
    - training_pipeline
  - id: finance-C-140
    when: When configuring the number of epochs for training
    action: Set epochs between 100-300 with early stopping to allow sufficient convergence while preventing overfitting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Too few epochs prevent model convergence on temporal patterns; too many epochs without early stopping cause
      overfitting to training temporal patterns, reducing generalization
    stage_ids:
    - training_pipeline
  - id: finance-C-141
    when: When implementing multi-optimizer training for edge and time prediction
    action: Use separate optimizers for edge and time prediction components when optimizing both tasks
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using a single optimizer for heterogeneous tasks causes gradient interference, where edge prediction gradients
      conflict with time prediction gradients, degrading both objectives
    stage_ids:
    - training_pipeline
  - id: finance-C-142
    when: When clearing GPU memory during training loop
    action: Call torch.cuda.empty_cache() after optimizer step and gradient zeroing to release GPU memory
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without explicit GPU memory cleanup, memory fragmentation causes OOM errors on long training runs, terminating
      training before early stopping can trigger
    stage_ids:
    - training_pipeline
  - id: finance-C-143
    when: When validating model checkpoint compatibility
    action: Verify checkpoint contains each required keys before unpacking to prevent KeyError crashes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing checkpoint keys cause KeyError exceptions during unpacking, preventing model loading and test evaluation
      after training completes
    stage_ids:
    - training_pipeline
  - id: finance-C-146
    when: When evaluating edge link prediction
    action: reset node_latest_event_time to initial state before running time prediction evaluation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Time prediction evaluation will use stale event time state from previous evaluation phases, causing incorrect
      expected_event_time computations and unreliable MAE/RMSE metrics
    stage_ids:
    - evaluation
  - id: finance-C-148
    when: When evaluating link prediction with args.eval='edge'
    action: set log_prob_weights_list to [(1.0, 0.0)] to evaluate edge prediction only without time component
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Joint evaluation mode will be incorrectly activated if eval parameter handling is wrong, mixing time prediction
      weights into edge prediction scoring and corrupting MRR metrics
    stage_ids:
    - evaluation
  - id: finance-C-149
    when: When managing GPU memory during batched evaluation
    action: call torch.cuda.empty_cache() before starting evaluation loop to free GPU memory
    severity: high
    kind: resource_boundary
    modality: must
    consequence: GPU out-of-memory errors will occur during batched evaluation if CUDA cache is not cleared, especially when
      running edge scoring across all entities with multiple batches
    stage_ids:
    - evaluation
  - id: finance-C-151
    when: When aggregating evaluation ranks across batches
    action: assert that rank dictionary keys match across batches before extending rank lists
    severity: high
    kind: domain_rule
    modality: must
    consequence: Rank aggregation will silently fail or produce corrupted results if batch_eval_ranks_dict keys do not match
      eval_ranks_dict keys, leading to incorrect final MRR and Recall@k computations
    stage_ids:
    - evaluation
  - id: finance-C-152
    when: When initializing evaluation phase
    action: assert phase is one of 'Train', 'Validation', 'Test' to verify valid evaluation context
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid phase parameter will cause unpredictable behavior in conditional evaluation logic, particularly in
      the validation batch sampling intervals (e.g., i % 6 == 0 for ICEWS18)
    stage_ids:
    - evaluation
  - id: finance-C-153
    when: When performing time interval scoring in EdgeEvaluator
    action: set specified MAX_EDGES chunk size based on device type to prevent memory overflow
    severity: high
    kind: resource_boundary
    modality: must
    consequence: OOM errors will occur on CPU evaluation if MAX_EDGES is set too high for GPU memory, or evaluation will be
      extremely slow if set too low for CPU memory constraints
    stage_ids:
    - evaluation
  - id: finance-C-155
    when: When claiming evaluation metric capabilities
    action: claim that MRR and Recall@k values represent expected live trading performance
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest evaluation metrics as indicative of live trading results misleads stakeholders about
      actual model performance in production environments where execution, latency, and market conditions differ significantly
    stage_ids:
    - evaluation
  - id: finance-C-156
    when: When validating reproducibility of evaluation results
    action: set random seed before evaluation to verify consistent metric values across runs
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Non-deterministic evaluation results will occur if random seed is not set, causing MRR and Recall@k to vary
      across runs and making it impossible to reliably compare model improvements
    stage_ids:
    - evaluation
  - id: finance-C-157
    when: When evaluating time prediction on batched data
    action: accumulate time_diffs across each batches before computing final MAE and RMSE
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Time prediction metrics will be computed on the last batch only instead of the full evaluation set, producing
      unreliable MAE/RMSE values that do not represent overall time prediction performance
    stage_ids:
    - evaluation
  - id: finance-C-158
    when: When computing edge ranking scores
    action: fill score tensor with -1e20 to verify true entity rank is not masked by equal scores during ranking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Edge ranking computation will produce incorrect ranks if unfilled tensor positions have value 0 instead of
      -inf, causing the ground truth entity to be ranked lower than nonexistent entities with zero score
    stage_ids:
    - evaluation
  - id: finance-C-160
    when: When implementing dynamic entity embedding updates in the EmbeddingUpdater
    action: Keep dynamic entity embeddings on CPU memory except during batch forward passes to GPU
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Keeping embeddings on GPU causes excessive VRAM consumption for large temporal graphs, leading to out-of-memory
      errors or degraded training throughput
  - id: finance-C-163
    when: When storing time values in DGLGraph edge data or edge mask tensors
    action: Store time values as float32 tensors and edge masks as boolean tensors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-float32 time values cause numerical precision errors in temporal ordering comparisons; non-boolean masks
      cause incorrect train/val/test splits during evaluation
  - id: finance-C-167
    when: When training or evaluating the EdgeModel
    action: Modify the hardcoded edge loss weight ratios of tail=1.0, rel=0.2, head=0.1 without corresponding code changes
      — these weights are baked into the forward method
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Changing only the config or hyperparameter settings without modifying the code causes the model to optimize
      with unexpected loss ratios, leading to degraded link prediction performance
  - id: finance-C-168
    when: When presenting or reporting this system's temporal link prediction capabilities to users
    action: Claim that the system supports static knowledge graphs without temporal dimensions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will attempt to apply the system to static graphs, producing undefined behavior since all model components
      (TPP, temporal embeddings, node_latest_event_time tracking) require temporal event sequences
  - id: finance-C-169
    when: When presenting or reporting this system's temporal link prediction capabilities to users
    action: Claim that the system supports real-time streaming predictions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will deploy the system in live trading environments expecting real-time inference, but the system uses
      batch evaluation on historical snapshots with no streaming inference capability, causing severe delays in production
  - id: finance-C-170
    when: When presenting or reporting this system's temporal link prediction capabilities to users
    action: Claim that the system supports non-graph-based time series forecasting
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will attempt to apply the system to non-graph time series data, but the model architecture (EdgeModel,
      EmbeddingUpdater, RGCN/KGTransformer GNNs) is fundamentally designed for entity-relationship knowledge graphs with no
      adaptation for standalone time series
  - id: finance-C-171
    when: When presenting or reporting this system's temporal link prediction capabilities to users
    action: Claim that the system supports interpretable rule-based reasoning
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users will expect human-readable explanations for predictions, but the system uses deep neural networks (KGTransformer,
      RGCN, RNN) that produce opaque embedding-based predictions with no rule extraction or explanation mechanism
  - id: finance-C-172
    when: When presenting or reporting this system's backtested temporal link prediction results
    action: Claim that historical evaluation results equal expected real-time performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will allocate capital based on inflated historical metrics, but temporal link prediction accuracy in
      production degrades due to market regime changes, data quality differences, and execution latencies not captured in
      historical evaluation
  - id: finance-C-173
    when: When using the node_latest_event_time tensor indexing
    action: Access recipient-direction inter-event times via index 0 and sender-direction times via index 1 on the last dimension
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect indexing swaps recipient and sender temporal contexts, causing reversed temporal dependency modeling
      that produces meaningless or inverted temporal predictions
  - id: finance-C-174
    when: When processing subgraph operations involving reverse graphs
    action: Preserve num_relations and num_all_nodes attributes on reversed graph objects
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing attributes on reversed graphs cause downstream TPP and embedding operations to fail with AttributeError
      during temporal message passing on reverse edges
  - id: finance-C-176
    when: When implementing node feature processing in FinDKG knowledge graph models
    action: 'Preserve separate node_type handling for FinDKG''s heterogeneous entity types (12 types: companies, events, metrics,
      etc.) — do not consolidate or normalize node types to a single uniform representation'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Uniform node type handling loses critical type semantics in financial knowledge graphs, causing the model
      to treat fundamentally different entity types (e.g., companies vs. events) as equivalent, which degrades link prediction
      accuracy
    derived_from_bd_id: BD-002
  - id: finance-C-177
    when: When implementing edge prediction logic in financial knowledge graph models
    action: Include graph-level context via readout mechanism for edge predictions — aggregate node embeddings to form a global
      graph embedding and incorporate it into prediction scores
    severity: high
    kind: domain_rule
    modality: must
    consequence: Local-only edge predictions miss macroeconomic trends and market-wide dynamics visible only through global
      context, causing predictions to ignore sector-level patterns that are critical for financial analysis
    derived_from_bd_id: BD-019
  - id: finance-C-178
    when: When computing temporal probabilities for discrete-timestamp financial event data
    action: Use interval-based probability calculation via CDF differences rather than point probability evaluation — compute
      P(t ∈ [t_i, t_{i+1}]) = F(t_{i+1}) - F(t_i) where F is the cumulative distribution
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Point probability evaluation at discrete timestamps causes numerical instability and misaligns with actual
      time granularity in financial event data, leading to inaccurate temporal predictions
    derived_from_bd_id: BD-024
  - id: finance-C-179
    when: When implementing temporal feature storage for entity dynamics tracking
    action: Store node_latest_event_time as a [num_nodes, num_nodes+1, 2] tensor with dimensions [entity, counterpart_entity,
      direction] where direction [..,0] tracks events as recipient and [..,1] tracks events as sender
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using scalar per-node representation loses the sender/recipient asymmetry critical for financial event modeling,
      causing temporal features to conflate receiving information versus initiating actions
    derived_from_bd_id: BD-005
  - id: finance-C-180
    when: When implementing residual connections in knowledge graph transformer layers
    action: Use learnable skip weights per node type rather than fixed skip connections — initialize with type-specific default
      values and allow gradient-based adaptation during training
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Fixed skip connections prevent the model from adapting gradient flow to type-specific needs, leading to suboptimal
      training convergence for heterogeneous entity types like metrics versus events
    derived_from_bd_id: BD-011
  - id: finance-C-181
    when: When implementing embedding combination logic for knowledge graph inference
    action: Support at least one valid combination mode from {concat, static_only, dynamic_only} — verify the mode parameter
      is validated against supported values before use in embedding fusion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid or unsupported combination mode causes embedding fusion to fail, resulting in prediction errors across
      all downstream link prediction tasks
    derived_from_bd_id: BD-013
  - id: finance-C-182
    when: When configuring early stopping criteria for knowledge graph model training
    action: Use MRR (Mean Reciprocal Rank) as the early stopping criterion — configure early_stop_criterion='MRR' to verify
      stopping based on ranking quality rather than raw loss values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Loss-based early stopping is less robust and may halt training at local minima that do not correspond to
      optimal ranking performance, causing suboptimal link prediction results
    derived_from_bd_id: BD-030
  - id: finance-C-183
    when: When computing joint entity-time prediction scores during evaluation
    action: Use weighted combination of entity and time prediction scores with configurable weight parameter — allow alpha
      tuning based on application requirements for entity vs. temporal prediction importance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fixed equal weighting between entity and time scores ignores application-specific tradeoffs, leading to suboptimal
      evaluation when one prediction aspect is more critical than the other
    derived_from_bd_id: BD-032
  - id: finance-C-184
    when: When implementing time interval feature processing for neural network input in FinDKG
    action: Apply log transform to time intervals before feeding into neural network layers — this normalizes the right-skewed
      distribution with heavy tails, ensuring gradients flow properly through the network
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without log transform, the network struggles with wide range of interval values and concentration of small
      values near zero, causing gradient issues that lead to poor convergence or training instability
    derived_from_bd_id: BD-007
  - id: finance-C-185
    when: When implementing linear transformations for entity embeddings in KGTransformer
    action: Use type-specific linear projections (TypedLinear) for different entity types — company, event, metric, and executive
      embeddings must be transformed separately before aggregation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using shared linear projections confounds type-specific semantic spaces, reducing representation quality
      and causing the model to learn suboptimal embeddings that degrade downstream prediction accuracy
    derived_from_bd_id: BD-008
  - id: finance-C-186
    when: When evaluating link prediction on large-scale FinDKG knowledge graphs
    action: Process edges in batches respecting MAX_EDGES memory limit — split full matrix computation into chunks that fit
      in available CPU/GPU memory to prevent out-of-memory errors
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without memory-aware batching, evaluation on large graphs causes OOM crashes that halt the pipeline; with
      too-small batch limits, evaluation becomes inefficient and may timeout on production systems
    derived_from_bd_id: BD-034
  - id: finance-C-187
    when: When implementing the temporal normalization pipeline for FinDKG
    action: Compute time_interval as the minimum difference between unique timestamps (BD-003) before applying log transform
      (BD-085) — this sequence ensures intervals are positive and span multiple orders of magnitude for proper normalization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Applying log transform before computing minimum timestamp differences produces numerical instability or loses
      temporal resolution, causing temporal features to be incomparable across datasets with different granularities
    derived_from_bd_id: BD-132
  - id: finance-C-188
    when: When implementing the loss function for entity/relation classification in FinDKG
    action: Use cross-entropy loss for multi-class entity and relation classification — the softmax formulation provides well-calibrated
      probability estimates essential for confidence-based decision-making in downstream applications
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using margin-based or ranking losses for multi-class classification fails to provide calibrated probability
      estimates, preventing confidence-based filtering and leading to poor decision-making in downstream trading applications
    derived_from_bd_id: BD-020
  - id: finance-C-189
    when: When loading and processing time fields from multiple data sources in FinDKG
    action: Assume time fields have consistent timezone interpretation across each data sources — the framework does not implement
      automatic timezone normalization, so time comparisons without explicit UTC normalization produce incorrect results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit timezone annotation, time comparisons across different data sources produce incorrect results
      causing event ordering errors, backtest timeline mismatches, and corrupted temporal features in the knowledge graph
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-190
    when: When loading timestamp data from any source into FinDKG
    action: Normalize each timestamps to UTC with explicit timezone annotation before any time field comparison or storage
      — check that each time field includes a timezone indicator and convert to UTC if missing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without UTC normalization, timestamp comparisons across sources with different timezone offsets produce incorrect
      event ordering and temporal relationships, corrupting the knowledge graph's temporal consistency
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-191
    when: When implementing link prediction output logic in DKG/model/model.py
    action: Compute log_prob_head, log_prob_rel, and log_prob_tail as separate prediction outputs — maintain three independent
      prediction heads rather than merging into a single combined probability distribution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Merging prediction heads eliminates granular error analysis capability, preventing identification of which
      component (head, relation, or tail prediction) fails during prediction, making debugging prediction errors difficult
      for financial analysts who need actionable insights
    derived_from_bd_id: BD-017
  - id: finance-C-192
    when: When implementing context construction for temporal prediction in event sequence modeling
    action: Construct context as a 4-element tuple containing [sender_emb, recipient_emb, rel_emb, dyn_rel_emb] — include
      each four embedding components representing sender, recipient, static relation, and dynamic relation information
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Omitting any context component from the context tuple loses critical temporal signals, causing prediction
      accuracy degradation for event timing since the model cannot properly capture who interacts with whom and the evolving
      relationship dynamics
    derived_from_bd_id: BD-023
  - id: finance-C-193
    when: When configuring the training pipeline optimizer mode
    action: Set optimizer mode to 'edge' for primary link prediction optimization — use edge-only mode to focus computational
      resources on link prediction rather than splitting between edge and time prediction
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using 'both' mode splits optimization focus between edge and time prediction tasks, potentially reducing
      link prediction accuracy compared to edge-only optimization where all resources target core prediction quality
    derived_from_bd_id: BD-052
  - id: finance-C-194
    when: When implementing early stopping logic in training loop
    action: Monitor validation MRR and halt training when MRR plateaus for 10 consecutive epochs — use MRR-based early stopping
      rather than fixed epoch counts to prevent overfitting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fixed epoch counts without early stopping risks overfitting when validation MRR plateaus, wasting computational
      resources and producing models that generalize poorly to live trading scenarios
    derived_from_bd_id: BD-096
  - id: finance-C-195
    when: When implementing embedding architecture for the dynamic knowledge graph model
    action: Maintain separate structural and temporal embeddings (BD-004 separation) and use concatenation mode for combining
      them (BD-089) — do not use addition or averaging fusion methods as they conflate fundamentally different signal types
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using addition or averaging to combine separate structural and temporal embeddings conflate fundamentally
      different information types (who connects vs when events occur), losing type-specific semantic information and reducing
      downstream prediction accuracy
    derived_from_bd_id: BD-128
  - id: finance-C-196
    when: When implementing backpropagation through time (BPTT) for temporal sequence training
    action: 'Configure hierarchical gradient management: BD-026 (truncate BPTT at 100 batches), BD-057 (truncate RNN gradient
      flow at 20 batches), BD-115 (use detach_() at truncation points) — each three mechanisms must be applied together to
      prevent memory exhaustion'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing any of the three BPTT truncation components breaks the gradient management hierarchy, either exhausting
      memory (without truncation) or allowing gradient flow across truncation boundaries (without detach), making long financial
      event sequence training infeasible
    derived_from_bd_id: BD-131
  - id: finance-C-197
    when: When implementing multi-task loss aggregation in training with weighted priorities
    action: Normalize loss components before aggregation when using weighted loss hierarchy (tail=1.0, rel=0.2, head=0.1)
      — implement loss normalization before BD-122's sum(dict.values()) to verify weighted priorities are respected regardless
      of loss magnitude differences
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Equal-weight aggregation via sum(dict.values()) overrides the intended weighted priority hierarchy where
      tail prediction is 10x more important than head prediction, causing intended optimization priorities to not materialize
      when loss scales differ significantly across tasks
    derived_from_bd_id: BD-137
  - id: finance-C-198
    when: When initializing TimeIntervalTransform for temporal encoding in model architecture
    action: Change log_transform default from True without verifying the inter-event time distribution matches log-normal
      assumption — any non-log-scaled time data must explicitly pass log_transform=False after validation
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Disabling log transform on data with log-normal inter-event times breaks the learned temporal representation
      assumption, causing incorrect time predictions where large intervals are not properly compressed and relative ordering
      information is distorted
    derived_from_bd_id: BD-119
  - id: finance-C-199
    when: When initializing embeddings in the dynamic knowledge graph model
    action: Use Xavier initialization (zero_init=False) for static embeddings to preserve learned representations and zero
      initialization (zero_init=True) for dynamic embeddings to verify clean slate for temporal updates — follow type-specific
      initialization strategy
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using incorrect initialization strategies swaps Xavier (variance-preserving) with zeros for static embeddings
      disrupting learned representations, and zeros with Xavier for dynamic embeddings introducing unintended initial state
      that degrades temporal update convergence
    derived_from_bd_id: BD-120
  - id: finance-C-200
    when: When implementing graph construction or data loading logic in temporal knowledge graph modeling
    action: 'Maintain three separate subgraph types: prior graph (historical context without targets), batch graph (target
      edges to predict), and cumulative graph (persistent entity state) — do not merge into a single graph'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Merging context and target edges into a single graph causes data leakage where the model sees future information
      during training, making predictions systematically overconfident and backtest results non-reproducible
    derived_from_bd_id: BD-035
  - id: finance-C-201
    when: When implementing early stopping logic for temporal link prediction training
    action: Use MRR (Mean Reciprocal Rank) as the primary early stopping criterion for ranking-based tasks — do not replace
      with loss-based or accuracy-based stopping
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using loss-based or accuracy-based early stopping for link prediction tasks causes premature or delayed termination
      because these metrics do not directly measure ranking quality, resulting in underfit or overfit models
    derived_from_bd_id: BD-038
  - id: finance-C-202
    when: When implementing loss computation logic in EdgeModel for temporal knowledge graph training
    action: Change the hardcoded loss combination weights (tail=1.0, rel=0.2, head=0.1) without documented empirical justification
      — these weights define the optimization objective
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Altering loss weights without justification changes the optimization objective, causing the model to optimize
      for incorrect priorities — reducing tail weight de-emphasizes the primary prediction target, degrading ranking performance
      silently
    derived_from_bd_id: BD-121
  - id: finance-C-203
    when: When modifying model architecture parameters for attention-based temporal knowledge graph
    action: When changing embedding dimension, adjust the number of attention heads proportionally to maintain per-head dimension
      of approximately 25 (e.g., dim=200 with heads=8, or dim=400 with heads=16) — per-head dimension below 10 or above 50
      requires architectural review
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Changing embedding dimension without adjusting attention heads misallocates per-head representational capacity
      — too few dimensions causes heads to compete for limited space (losing pattern diversity), too many adds computation
      without proportional benefit
    derived_from_bd_id: BD-130
  - id: finance-C-204
    when: When implementing FinDKG knowledge graph embedding layers
    action: Use entity and relation embedding dimensions of exactly 200 — this provides sufficient expressiveness for complex
      financial entity semantics while maintaining computational tractability
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Changing embedding dimensions away from 200 may cause model capacity issues: smaller dimensions reduce expressiveness
      for financial entity complexity, while larger dimensions increase memory footprint without proportional benefit'
    derived_from_bd_id: BD-042
  - id: finance-C-205
    when: When implementing temporal dynamics modeling with RNN components
    action: Use exactly 1 RNN layer for temporal sequence modeling — this provides minimal sufficient capacity for event time
      patterns without adding unnecessary complexity that could cause overfitting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using multiple RNN layers may cause overfitting on limited historical sequences, while removing RNN entirely
      loses temporal dependency capture for financial event patterns
    derived_from_bd_id: BD-044
  - id: finance-C-206
    when: When implementing KGTransformer attention mechanism
    action: Use exactly 8 attention heads in KGTransformer — this enables parallel learning of diverse attention patterns
      for different relationship types while maintaining computational efficiency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fewer than 8 attention heads reduces attention diversity for relationship types; using more than 8
      increases computation without proportional benefit to the model's ability to capture financial entity relationships
    derived_from_bd_id: BD-045
  - id: finance-C-207
    when: When implementing temporal point process modeling with LogNormal mixture
    action: Use exactly 128 mixture components in LogNormal mixture TPP — this provides high-fidelity temporal distribution
      modeling for diverse inter-event time patterns without excessive inference cost
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fewer than 128 mixture components limits temporal pattern expressiveness for complex financial event
      sequences, while more components would increase memory usage without proportional modeling benefit
    derived_from_bd_id: BD-046
  - id: finance-C-208
    when: When implementing temporal dynamics in knowledge graph event sequences
    action: Use 'node2node_inter_event_times' mode for temporal modeling — this captures entity-specific temporal patterns
      by tracking time intervals between specific entity pairs rather than global time patterns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using global inter-event times instead of node2node mode loses entity-specific temporal signals that are
      crucial for financial forecasting, causing systematic degradation in prediction quality for entity-specific events
    derived_from_bd_id: BD-048
  - id: finance-C-209
    when: When setting training epochs for FinDKG model convergence
    action: Verify that 300 epochs is sufficient for convergence on your specific dataset size — the framework uses early
      stopping but the baseline epoch count should match your temporal knowledge graph complexity
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 300 epochs may cause underfitting on complex temporal patterns if early stopping triggers too early,
      or waste compute if the model converges faster but training continues, silently distorting backtest results
    derived_from_bd_id: BD-069
  - id: finance-C-210
    when: When deploying FinDKG training on different hardware configurations
    action: Verify GPU availability and CUDA installation before relying on automatic device selection — the framework defaults
      to GPU when available but assumes proper CUDA setup and sufficient GPU memory for the model
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default GPU selection with CPU fallback assumes CUDA compatibility; if GPU drivers are outdated or memory
      is insufficient, silent fallback to CPU may cause training to run 10-50x slower than expected, extending runtime beyond
      practical limits
    derived_from_bd_id: BD-071
  - id: finance-C-211
    when: When implementing evaluation metrics for top-k entity prediction
    action: Use multi-granularity Recall@k evaluation with k values of 1, 3, 10, and 100 — single k metrics provide insufficient
      granularity for production deployment scenarios with varying candidate pool sizes in knowledge graph applications
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using single k=10 metric may mask poor performance at common retrieval horizons (k=1 for top-1 accuracy,
      k=100 for candidate pool coverage), causing misleading evaluation of model quality for financial entity prediction tasks
    derived_from_bd_id: BD-074
  - id: finance-C-212
    when: When managing memory during FinDKG training with high-capacity model components
    action: Assume the framework provides automatic memory management for embedding transfers between CPU and GPU — the 200-dim
      embeddings with 8 attention heads create O(batch_size × seq_len² × dim) memory pressure that requires explicit CPU/GPU
      boundary management
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming automatic memory management while using high-capacity components (BD-042 dim=200, BD-045 8 heads)
      may cause dynamic embeddings to accidentally migrate to GPU, triggering OOM errors and training failures during production
      deployment scaling
    derived_from_bd_id: BD-136
  - id: finance-C-213
    when: When configuring memory-aware batching for FinDKG evaluation
    action: Set MAX_EDGES=400000 limit for memory batching and verify this threshold matches your available GPU memory when
      using 200-dim embeddings with 8 attention heads — the fixed limit must be adjusted when scaling to larger datasets or
      longer sequences
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The fixed MAX_EDGES=400000 limit may become insufficient when FinDKG grows or when experimenting with larger
      models, causing OOM errors during evaluation and interrupting production batch processing pipelines
    derived_from_bd_id: BD-136
  - id: finance-C-214
    when: When implementing or refactoring activation functions in KGTransformer layers
    action: Use SiLU (Swish) activation function instead of ReLU to avoid dying neuron problems in graph neural networks
    severity: high
    kind: domain_rule
    modality: must
    consequence: ReLU activation causes dying neuron issues where neurons stop learning, leading to degraded model performance
      and reduced feature representation quality in knowledge graph embeddings
    derived_from_bd_id: BD-050
  - id: finance-C-215
    when: When implementing loss computation in knowledge graph link prediction training
    action: Maintain asymmetric loss weighting with tail prediction weight 1.0, relation prediction weight 0.2, and head prediction
      weight 0.1 — do not use equal weighting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Equal weighting dilutes tail prediction focus, causing the model to allocate learning capacity equally across
      all prediction heads instead of prioritizing the primary link prediction task
    derived_from_bd_id: BD-051
  - id: finance-C-216
    when: When implementing training pipeline with multiple prediction heads
    action: Use separate AdamW optimizers for edge and time prediction components to prevent gradient interference between
      tasks
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Single shared optimizer causes gradient interference where edge prediction updates disrupt time prediction
      optimization and vice versa, leading to training instability and suboptimal convergence
    derived_from_bd_id: BD-053
  - id: finance-C-217
    when: When implementing RNN-based temporal modeling in training loops
    action: Set rnn_truncate_every=20 to limit backpropagation-through-time depth, preventing gradient explosion while preserving
      temporal context
    severity: high
    kind: domain_rule
    modality: must
    consequence: Shorter truncation loses essential temporal context needed for learning long-range dependencies; longer truncation
      risks gradient explosion causing numerical instability and training failure
    derived_from_bd_id: BD-057
  - id: finance-C-218
    when: When using the framework's default evaluation metrics for temporal prediction
    action: Verify that RMSE is computed alongside MAE to detect models with occasional large temporal mispredictions — RMSE
      penalizes outliers more heavily than MAE
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using MAE alone misses temporal anomaly behavior where occasional large prediction errors may have disproportionate
      impact on downstream trading decisions
    derived_from_bd_id: BD-076
  - id: finance-C-219
    when: When tuning edge and time prediction loss weights during hyperparameter search
    action: Use systematic linear interpolation across 11 discrete values from 1.0 (edge-only) to 0.0 (time-only) rather than
      binary or random weighting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Binary weighting misses optimal tradeoffs between edge and time prediction; linear interpolation provides
      smooth coverage of the weight space for discovering the optimal task balance
    derived_from_bd_id: BD-078
  - id: finance-C-220
    when: When implementing time interval preprocessing for temporal knowledge graph modeling
    action: Apply log transformation to time intervals to compress wide-ranging values and align with exponential or log-normal
      temporal distributions observed in knowledge graphs
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without log transformation, extreme time interval values dominate gradient updates, causing unstable temporal
      feature learning and degraded temporal prediction performance
    derived_from_bd_id: BD-085
  - id: finance-C-221
    when: When implementing time prediction inference using log-normal mixture models
    action: Use analytical expected value formula with closed-form transformed distribution instead of Monte Carlo sampling
      for O(1) inference speed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Monte Carlo sampling adds significant latency during both training and prediction phases; analytical expected
      value provides fast inference without approximation errors from sampling
    derived_from_bd_id: BD-095
  - id: finance-C-222
    when: When implementing temporal encoding and aggregation logic in dynamic knowledge graph models
    action: Process temporal dynamics separately for sender and recipient directions using directional temporal encoding —
      do not merge or share parameters between forward and reverse temporal batches
    severity: high
    kind: domain_rule
    modality: must
    consequence: Merging directional temporal dynamics would lose asymmetric information flow signals, systematically reducing
      predictive accuracy for directional event prediction where source and target entities exhibit different temporal characteristics
    derived_from_bd_id: BD-060
  - id: finance-C-223
    when: During temporal encoding computation for dynamic knowledge graphs
    action: Clamp edge norms to maximum value of 10.0 before applying sinusoidal time encoding to prevent extreme values from
      dominating the representation space
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without edge norm clamping, extreme temporal encodings can dominate the representation space, causing numerical
      instability that corrupts temporal features and degrades model performance
    derived_from_bd_id: BD-061
  - id: finance-C-224
    when: When computing log-space temporal transformations using time intervals
    action: Apply epsilon clamp of 1e-10 to time intervals before computing logarithm to prevent log(0) errors that cause
      runtime exceptions or return -inf values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Computing log(0) causes runtime errors or returns -inf values, corrupting temporal representations and breaking
      gradient flow during backpropagation which prevents model training
    derived_from_bd_id: BD-065
  - id: finance-C-225
    when: When configuring the KGTransformer model optimizer for training
    action: Use learning rate 0.0005 for stable convergence; verify convergence behavior by monitoring loss curves when changing
      to different learning rates
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect learning rates cause training instability or poor convergence, leading to suboptimal model performance
      and unreliable predictions in production deployments
    derived_from_bd_id: BD-106
  - id: finance-C-226
    when: When configuring entity and relation embedding dimensions for KGTransformer
    action: Use embedding dimension 200 for sufficient representational capacity; verify that dimension changes maintain adequate
      expressiveness for complex financial relations without overfitting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Insufficient embedding dimensions limit representational capacity for complex financial relations, causing
      underfitting and poor prediction accuracy; excessive dimensions waste resources and risk overfitting
    derived_from_bd_id: BD-107
  - id: finance-C-227
    when: When implementing or optimizing GraphTransformer model architecture
    action: Verify layer normalization (use_norm=True) remains enabled during training — do not disable layer norm for regularization
      or computational efficiency gains
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Disabling layer normalization causes internal covariate shift in transformer attention mechanisms, leading
      to training instability, gradient explosion/vanishing, and model divergence in deeper architectures
    derived_from_bd_id: BD-070
  - id: finance-C-228
    when: When implementing or modifying MRR computation logic in evaluation code
    action: Use average rank for ties when computing MRR — do not implement random tie-breaking or single-rank assignment
      for duplicate prediction scores
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying tie-breaking logic introduces non-determinism into evaluation metrics, making backtest results
      non-reproducible and preventing fair model comparison across experiments
    derived_from_bd_id: BD-079
  - id: finance-C-231
    when: When implementing or refactoring provider/credential management in the data loading pipeline
    action: Assume that provider priority and credential isolation are handled by default framework behavior — the framework
      does not implement provider priority or credential isolation mechanisms
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without provider priority and credential isolation, requests may be routed to the wrong provider, credentials
      may leak across provider boundaries, causing production failures and potential security incidents
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-232
    when: When configuring provider settings in the data loading pipeline
    action: Implement explicit provider priority ordering (e.g., priority field in provider config) and credential isolation
      (e.g., separate credential stores per provider using provider_id as namespace key)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit provider priority and isolated credentials, production reliability is at risk due to ambiguous
      routing and potential credential cross-contamination between providers
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-233
    when: When implementing temporal feature encoding in the neural network training pipeline
    action: Compute time_interval as the minimum difference between unique timestamps in the dataset, using this as the fundamental
      time unit for temporal encoding normalization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using mean, median, or fixed time intervals instead of minimum timestamp difference causes temporal features
      to be on inconsistent scales across datasets, leading to numerical instability during neural network training where
      gradient magnitudes become unpredictable
    derived_from_bd_id: BD-003
  - id: finance-C-234
    when: When implementing temporal feature engineering for inter-event time calculations
    action: Verify that time_interval matches the fundamental time unit of the dataset by checking min(diff(unique_timestamps))
      against known data granularity (e.g., tick data=seconds, daily data=days)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: If time_interval is not aligned with actual data granularity, neural network temporal features will have
      undefined scales causing training divergence or poor convergence, with errors accumulating silently across epochs
    derived_from_bd_id: BD-003
  - id: finance-C-235
    when: When processing dynamic knowledge graph data for link prediction or event forecasting
    action: Assume the framework provides point-in-time data availability checking — the framework does not implement PIT
      data validation; raw data may include information not available at prediction time
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time data validation, backtested strategy performance includes look-ahead bias where predictions
      use future information not available at signal generation time, making live trading results fall far below backtested
      performance
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-236
    when: When loading historical data for model training or evaluation in dynamic knowledge graph forecasting
    action: Implement point-in-time validation by comparing each data point's timestamp against the model's knowledge cutoff,
      ensuring only information available before prediction time is used for feature computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without PIT data filtering, the model ingests future information during training leading to overfitted results
      that cannot replicate in live trading where only historical data is available at each decision point
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-237
    when: When configuring training pipeline for link prediction and temporal point process models
    action: Instantiate separate optimizer instances for edge prediction and time prediction tasks with independently configurable
      learning rates, rather than sharing a single optimizer across both tasks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a shared optimizer forces edge and time predictions to compete for gradient updates with incompatible
      learning rate requirements, causing one task to dominate training while the other fails to converge properly
    derived_from_bd_id: BD-027
  - id: finance-C-238
    when: When setting up loss weight optimization for multi-task learning in dynamic knowledge graphs
    action: Perform grid search over edge/time loss weight combinations on validation data rather than using fixed manual
      weights, ensuring optimal task balance for each specific dataset
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fixed loss weights cause suboptimal task balance where one prediction task dominates gradient updates, leading
      to models that excel at one task but fail at the other, reducing overall prediction quality
    derived_from_bd_id: BD-033
  - id: finance-C-239
    when: When configuring grid search for automatic loss weight discovery
    action: Define explicit grid search ranges with minimum 3 candidate values per task weight, and use nested cross-validation
      or held-out validation set to prevent overfitting loss weights to validation noise
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Unbounded or narrowly defined grid search causes loss weights to overfit validation set noise, producing
      weights that maximize validation metrics but generalize poorly to test data
    derived_from_bd_id: BD-033
  - id: finance-C-240
    when: When implementing embedding update mechanisms in dynamic knowledge graph models
    action: Use separate embedding spaces and update mechanisms for structural patterns (who connects to whom) and temporal
      patterns (when events occur), with distinct GraphStructuralRNNConv and GraphTemporalRNNConv modules
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Joint embeddings force structural and temporal dynamics to compete in the same representation space, causing
      persistent structural relationships to be overwritten by transient temporal patterns and reducing link prediction accuracy
    derived_from_bd_id: BD-004
  - id: finance-C-241
    when: When configuring the temporal mixture model for financial event prediction
    action: Verify that 128 mixture components are sufficient for the diversity of temporal patterns in the data - for datasets
      with many distinct event types (earnings, regulatory, macro), increase to 256-512 components; for simpler datasets,
      64 may suffice
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 128 mixture components may be insufficient for datasets with high temporal pattern diversity, causing
      distinct patterns to merge and reducing prediction accuracy for rare but important financial events like earnings surprises
      or regulatory filings
    derived_from_bd_id: BD-022
  - id: finance-C-242
    when: When configuring knowledge graph link prediction loss weights
    action: Change the default loss weighting scheme (tail=1.0, rel=0.2, head=0.1) without empirical validation - the weighting
      reflects task priorities where tail prediction is primary
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Modifying loss weights without validation causes the model to overfit to easier prediction tasks (head prediction)
      while underfitting to critical tail entity predictions, resulting in incomplete or incorrect knowledge graph completion
      that propagates errors to downstream trading decisions
    derived_from_bd_id: BD-018
  - id: finance-C-243
    when: When implementing loss computation for multi-component training objectives
    action: Verify that loss component scales are comparable before using equal weighting via sum(dict.values()) — inspect
      raw loss values for temporal, edge, and relation components and apply normalization if scales differ by more than 10x
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Equal weighting of loss components without scale verification causes the optimizer to privilege high-magnitude
      components while under-optimizing others, leading to biased representations where some objectives (e.g., temporal vs
      relation prediction) are systematically neglected during training
    derived_from_bd_id: BD-122
  - id: finance-C-244
    when: When implementing or verifying graph convolution layers in the transformer architecture
    action: Assume the model architecture defaults provide optimal GCN depth — explicitly verify that num_gconv_layers is
      set to 2 (the validated configuration for second-order neighborhood capture without over-smoothing)
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Using incorrect GCN depth (single layer misses second-order neighbors; 3+ layers risks over-smoothing) causes
      node representations to either lack sufficient receptive field or become indistinguishable, degrading edge prediction
      accuracy and ranking performance
    derived_from_bd_id: BD-108
  - id: finance-C-245
    when: When implementing or modifying temporal prediction model evaluation logic
    action: Use log_prob_density method for continuous-time evaluation metrics; use log_prob_interval method for discrete-time
      training — these methods MUST NOT be merged or substituted for each other
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using interval-based evaluation on continuous-time metrics produces systematically biased results that cannot
      be compared with other temporal models, leading to incorrect strategy selection based on flawed evaluation metrics
    derived_from_bd_id: BD-025
  - id: finance-C-246
    when: When implementing the RGCN degree normalization computation
    action: Pre-compute degree normalization once before training and reuse across each GNN layers — degree normalization
      MUST NOT be recomputed on every forward pass
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Recomputing degree normalization on every forward pass wastes computational resources on invariant values
      without improving model quality, causing unnecessary training time inflation
    derived_from_bd_id: BD-037
  - id: finance-C-247
    when: When implementing knowledge graph convolution layers
    action: Use relation-aware attention with separate key/value projections per relation type — attention computation MUST
      NOT be relation-agnostic
    severity: high
    kind: domain_rule
    modality: must
    consequence: Relation-agnostic attention treats all edges equivalently, losing critical relational semantics in financial
      KGs where 'acquires' and 'mentions' relations carry fundamentally different predictive weight, causing the model to
      learn suboptimal attention patterns
    derived_from_bd_id: BD-009
  - id: finance-C-248
    when: When implementing temporal graph convolution for financial entity updates
    action: Apply edge normalization with time decay factor during temporal convolution — distant interactions MUST contribute
      proportionally less than recent ones
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without time decay normalization, stale and recent financial interactions are treated equally, reducing temporal
      sensitivity and causing entity states to be contaminated by outdated information that no longer reflects market conditions
    derived_from_bd_id: BD-012
  - id: finance-C-249
    when: When configuring training regularization hyperparameters
    action: Use weight_decay=0.00001 (1e-5) for this architecture — verify that higher values are not applied without explicit
      justification, as this architecture relies on multiple regularization mechanisms (early stopping, model capacity limits)
      that work synergistically with this conservative weight decay
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Increasing weight decay to 0.001 or 0.01 over-regularizes the model, impairing capacity needed for complex
      financial patterns and degrading strategy performance below expected backtest levels
    derived_from_bd_id: BD-041
  - id: finance-C-250
    when: When implementing context construction for temporal prediction in DKG.model.tpp
    action: Concatenate source/destination embeddings with relation and dynamic relation embeddings to preserve entity identity
      information required for entity-specific timing patterns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing concatenation with average pooling loses entity identity information, breaking entity-specific
      timing patterns and causing incorrect temporal predictions for different entity pairs
    derived_from_bd_id: BD-094
  - id: finance-C-251
    when: When implementing optimizer configuration for embedding model training in DKG.train
    action: Use AdamW with decoupled weight decay — do not substitute standard Adam with L2 regularization or SGD with momentum
      for embedding model training
    severity: high
    kind: domain_rule
    modality: must
    consequence: Standard Adam with L2 regularization interacts improperly with adaptive learning rate scheduling, causing
      degraded generalization in embedding models and lower quality entity representations
    derived_from_bd_id: BD-097
  - id: finance-C-252
    when: When implementing gradient clipping for RNN training in DKG.utils.train_utils
    action: Use gradient-preserving clipping that clamps large gradients while maintaining gradient direction information
      — do not substitute hard clipping that discards directional signal
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hard clipping loses gradient direction information that RNNs rely on for stable training, causing unstable
      gradients and degraded temporal modeling performance
    derived_from_bd_id: BD-098
  - id: finance-C-253
    when: When implementing message passing for RGCN in DKG.utils.model_utils
    action: Normalize incoming messages by in-degree using comp_deg_norm function to prevent high-degree hub nodes from dominating
      aggregated representations — verify zero-handling for nodes without incoming edges
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting in-degree normalization causes high-degree hub nodes to dominate aggregated node representations,
      leading to representation collapse and degraded graph modeling performance
    derived_from_bd_id: BD-099
  - id: finance-C-254
    when: When implementing RNN training for temporal modeling in DKG.train
    action: Use truncated backpropagation through time (BPTT) with fixed truncation length N to bound memory usage — do not
      use full BPTT for long sequences
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Full BPTT grows memory linearly with sequence length, making training on long temporal histories computationally
      infeasible and causing out-of-memory errors
    derived_from_bd_id: BD-101
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
