resources:
  packages:
  - name: torch
    version_pin: latest
  - name: dgl
    version_pin: latest
  - name: torch-scatter
    version_pin: latest
  - name: numpy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: tqdm
    version_pin: latest
  - name: dill
    version_pin: latest
  - name: torch-distributions
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install torch
    - python3 -m pip install dgl
    - python3 -m pip install torch-scatter
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing temporal data splitting for knowledge graphs
    action: use time-ordered train/val/test split with train_edges occurring before val_edges and test_edges temporally
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Temporal knowledge graphs will suffer from look-ahead bias where model sees future events during training,
      causing inflated metrics that do not reflect real-world temporal prediction performance
    stage_ids:
    - data_loading
  - id: finance-C-002
    when: When storing temporal edge data in DGLGraph edata
    action: convert time values to float32 dtype to verify numerical precision for time interval calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Time interval calculations (G.time_interval = min(time_diff)) will produce incorrect or inconsistent results
      due to dtype mismatches, breaking the time interval transform pipeline in DKG/model/time_interval_transform.py
    stage_ids:
    - data_loading
  - id: finance-C-003
    when: When storing node type identifiers in DGLGraph ndata
    action: convert node type values to integer type matching the graph idtype to verify consistent graph operations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Graph operations (edge_subgraph, degree calculations) will fail or produce incorrect results due to dtype
      mismatch between node indices and node type identifiers
    stage_ids:
    - data_loading
  - id: finance-C-004
    when: When creating edge masks for train/val/test splits
    action: use boolean dtype (torch.bool) for mask tensors to verify correct tensor indexing behavior in DGL operations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Edge selection operations in collate_fn (DKG/utils/model_utils.py:9-11) will produce incorrect subgraph results
      due to non-boolean mask interpretation, breaking temporal ordering guarantees
    stage_ids:
    - data_loading
  - id: finance-C-005
    when: When validating input knowledge graph dataset names
    action: check that graph_name is in the predefined ALL_GRAPHS list to prevent invalid dataset errors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Data loading will fail with cryptic file-not-found errors if an invalid graph_name is provided, causing training
      pipeline to crash before any computation occurs
    stage_ids:
    - data_loading
  - id: finance-C-006
    when: When configuring DataLoader for temporal knowledge graph training
    action: set shuffle=True for any temporal split DataLoader, as shuffling breaks temporal ordering required for temporal
      knowledge graph learning
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Temporal ordering will be violated, causing the model to receive edges in non-chronological order which breaks
      the cumulative graph construction (prior_G, batch_G, cumul_G) in collate_fn and introduces look-ahead bias
    stage_ids:
    - data_loading
  - id: finance-C-007
    when: When loading knowledge graph data from TSV files
    action: 'use tab-separated value format with exactly 5 columns: head, rel, tail, time, and an ignored fifth column'
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Pandas read_table will misalign column assignments causing head/rel/tail/time values to be swapped or truncated,
      resulting in invalid graph edges with garbage entity/relation IDs
    stage_ids:
    - data_loading
  - id: finance-C-008
    when: When accessing DGL library functionality for temporal knowledge graphs
    action: use DGL (Deep Graph Library) version 0.8+ as the underlying graph representation framework
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Graph operations (dgl.graph, dgl.edge_subgraph) will fail with compatibility errors, preventing any graph
      construction or temporal processing
    stage_ids:
    - data_loading
  - id: finance-C-009
    when: When organizing knowledge graph dataset files on disk
    action: place train.txt, valid.txt, and test.txt files in a subdirectory named after the graph_name within the data_root
      directory
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: File path construction (os.path.join(data_root, graph_name, file_name)) will fail with FileNotFoundError,
      causing data loading to crash before any processing
    stage_ids:
    - data_loading
  - id: finance-C-011
    when: When implementing temporal knowledge graph data collation
    action: propagate graph attributes (num_relations, num_all_nodes, time_interval) to each subgraph variants created by
      collate_fn
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Downstream model components (EmbeddingUpdater, EdgeModel) will encounter missing attribute errors when accessing
      G.num_relations or G.time_interval, causing training to crash
    stage_ids:
    - data_loading
  - id: finance-C-012
    when: When constructing subgraphs for temporal batch processing
    action: use time-based edge selection with edges_before_batch (< time_from), edges_in_batch (time_from <= time <= time_to),
      and edges_until_batch (<= time_to) to create prior_G, batch_G, cumul_G
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Temporal ordering guarantees will be violated, allowing future edges to leak into training batches and breaking
      the temporal knowledge graph learning objective
    stage_ids:
    - data_loading
  - id: finance-C-014
    when: When validating edge mask index bounds in get_edge_mask
    action: assert that 0 <= edge_index_from < edge_index_until <= num_edges to prevent out-of-bounds tensor indexing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: PyTorch will raise IndexError during tensor slicing mask[edge_index_from:edge_index_until], crashing the
      data loading pipeline with cryptic tensor dimension errors
    stage_ids:
    - data_loading
  - id: finance-C-015
    when: When validating graph attributes after loading temporal knowledge graph
    action: verify that DGLGraph has num_relations, num_all_nodes, and time_interval attributes set from the loaded data
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Downstream model components will fail with AttributeError when accessing graph metadata, as they expect these
      attributes to be present on all graph objects (including subgraphs from collate_fn)
    stage_ids:
    - data_loading
  - id: finance-C-018
    when: When considering skipping temporal data validation
    action: skip validation of time ordering between train/val/test splits due to time pressure or confidence in data quality
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Temporal ordering violations will silently propagate through the pipeline, causing look-ahead bias that inflates
      evaluation metrics and produces models that fail catastrophically in live deployment
    stage_ids:
    - data_loading
  - id: finance-C-019
    when: When loading data for temporal knowledge graph construction
    action: verify train.txt edges have strictly earlier timestamps than val.txt edges and val.txt edges have strictly earlier
      timestamps than test.txt edges
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Temporal knowledge graph training will experience data leakage from future events, causing overfit models
      that cannot generalize to actual temporal prediction tasks in live deployment
    stage_ids:
    - data_loading
  - id: finance-C-020
    when: When implementing the collate_fn for temporal knowledge graph training
    action: Use strict inequality (G.edata['time'] < time_from) for selecting prior_G edges
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Temporal knowledge graph will exhibit look-ahead bias, causing embeddings to use future information and leading
      to inflated evaluation metrics that do not reflect real-world prediction performance
    stage_ids:
    - collation
  - id: finance-C-022
    when: When implementing the collate_fn for temporal knowledge graph training
    action: Copy graph attributes (num_relations, num_all_nodes, time_interval) to each subgraph view
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream model components will receive subgraphs without critical metadata, causing attribute access errors
      or using undefined attributes during embedding computation
    stage_ids:
    - collation
  - id: finance-C-024
    when: When configuring DataLoader for temporal knowledge graph batches
    action: Enable shuffling (shuffle=True) on temporal timestamp sequences
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Randomized batch ordering will break temporal causality, allowing the model to learn from future events before
      past events, completely invalidating the knowledge graph dynamics
    stage_ids:
    - collation
  - id: finance-C-027
    when: When implementing temporal knowledge graph collation
    action: Verify cumul_G is a superset of both prior_G and batch_G
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Cumulative graph will not contain all necessary edges for temporal reasoning, causing incomplete inter-event
      time calculations and incorrect entity state updates
    stage_ids:
    - collation
  - id: finance-C-029
    when: When computing degree normalization for subgraphs
    action: Handle isolated nodes by replacing zero in-degrees with 1 before normalization
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Division by zero will occur during graph convolution for isolated nodes, producing NaN embeddings that corrupt
      the entire batch
    stage_ids:
    - collation
  - id: finance-C-034
    when: When initializing MultiAspectEmbedding namedtuple
    action: include both structural and temporal fields as required by the embedding updater's dual-aspect architecture
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The embedding updater produces MultiAspectEmbedding with separate structural and temporal components that
      downstream stages (gnn_convolution, embedding_combination) expect to access via .structural and .temporal attributes,
      causing AttributeError if either field is missing
    stage_ids:
    - embedding_updater
  - id: finance-C-035
    when: When completing the forward pass of EmbeddingUpdater
    action: move updated dynamic entity and relation embeddings back to CPU device
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: The evaluation stage (eval.py:175) and subsequent training steps (train.py:386) assert that dynamic embeddings
      must be on CPU; failure to move embeddings to CPU causes assertion errors and prevents proper graph state management
      across batches
    stage_ids:
    - embedding_updater
  - id: finance-C-036
    when: When creating node_latest_event_time tensor
    action: allocate tensor with shape [num_nodes, num_nodes+1, 2] to store bidirectional latest event times
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The EventTimeHelper methods (embedding.py:431-440) access node_latest_event_time with index [..., 0] for
      recipient times and [..., 1] for sender times; incorrect shape causes index out of bounds or silent data corruption
      during temporal encoding
    stage_ids:
    - embedding_updater
  - id: finance-C-037
    when: When computing inter-event times for temporal encoding
    action: apply clamping with minimum 1e-10 and maximum 10.0 to prevent numerical instability
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Division by inter-event time without clamping causes infinity or NaN values when inter-event time approaches
      zero, corrupting edge normalization factors and causing gradient explosion in RNN layers
    stage_ids:
    - embedding_updater
  - id: finance-C-038
    when: When configuring graph structural or temporal convolution
    action: use graph_conv values other than 'KGT+GRU', 'KGT+RNN', 'RGCN+GRU', 'RGCN+RNN', or None
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Invalid graph_conv string causes ValueError during EmbeddingUpdater initialization, preventing model construction
      and blocking the entire training pipeline
    stage_ids:
    - embedding_updater
  - id: finance-C-039
    when: When implementing temporal dynamics for entities
    action: maintain bidirectional [sender, recipient] pair structure in temporal embeddings as required by the TPP model
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: The RelationRNN (embedding.py:409-410) and TPP model (log_norm_mix_tpp.py) expect temporal entity embeddings
      with [..., 0] for recipient and [..., 1] for sender roles; mismatched indexing causes incorrect temporal context aggregation
      and broken link prediction
    stage_ids:
    - embedding_updater
  - id: finance-C-040
    when: When configuring RNN cell type for embedding updates
    action: use rnn values other than 'GRU' or 'RNN'
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Invalid rnn string causes ValueError during GraphStructuralRNNConv or GraphTemporalRNNConv initialization,
      preventing model construction
    stage_ids:
    - embedding_updater
  - id: finance-C-044
    when: When processing batch graphs through EmbeddingUpdater
    action: pass dynamic_entity_emb with pre-existing structural and temporal fields on CPU before GPU computation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without pre-existing CPU embeddings, the forward pass assertion fails and the stateful RNN cannot properly
      initialize hidden states for temporal sequence modeling
    stage_ids:
    - embedding_updater
  - id: finance-C-045
    when: When accessing node_latest_event_time tensor
    action: index with out-of-bounds dimensions that exceed [num_nodes, num_nodes+1, 2]
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Out-of-bounds indexing causes IndexError during EventTimeHelper.get_inter_event_times computation, crashing
      the batch processing pipeline
    stage_ids:
    - embedding_updater
  - id: finance-C-047
    when: When processing cumulative graph (cumul_G) through embedding updater
    action: not modify node_latest_event_time indices beyond [num_nodes, num_nodes+1, 2] boundaries
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Index out of bounds causes runtime IndexError or silent memory corruption, making temporal predictions unreliable
      across subsequent batches
    stage_ids:
    - embedding_updater
  - id: finance-C-049
    when: When implementing GraphTransformer layer with multi-head attention
    action: Verify hid_dim is evenly divisible by num_heads to compute head_size without remainder
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Integer division with remainder causes mismatched tensor view shapes, leading to runtime crashes or corrupted
      gradient flows during backpropagation
    stage_ids:
    - gnn_convolution
