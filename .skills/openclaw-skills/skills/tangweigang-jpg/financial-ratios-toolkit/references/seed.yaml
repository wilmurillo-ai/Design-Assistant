    - id: BD-060
      type: B
      summary: ROE calculation normalizes by average shareholders equity (beginning + ending)/2
    - id: BD-061
      type: B/BA
      summary: Debt-to-Equity uses total liabilities / total equity
    - id: BD-072
      type: B
      summary: Average True Range (ATR) uses Wilder's smoothing method (exponential)
    - id: BD-075
      type: B/DK
      summary: Maximum Drawdown calculated as largest peak-to-trough decline in period
    - id: BD-050
      type: B/BA
      summary: Stock screener caps results at 1000 companies
    - id: BD-011
      type: M/BA
      summary: Cornish-Fisher expansion for non-normal return distributions
    - id: BD-012
      type: M
      summary: Alpha constraint 0.5 for CVaR optimization
    - id: BD-034
      type: B/BA
      summary: VaR calculation uses 252 trading days (1 year) for confidence intervals
    - id: BD-054
      type: B/BA
      summary: Sharpe ratio calculation uses risk-free rate from treasury models
    - id: BD-073
      type: B/BA
      summary: Sortino ratio uses downside deviation (only negative returns) vs total std
    - id: BD-045
      type: B/BA
      summary: Yield to Maturity uses Newton-Raphson iteration with tolerance=0.0001, max_iterations=100
    - id: BD-059
      type: B
      summary: Auto-detect API plan (Free vs Premium) by testing endpoint
    - id: BD-047
      type: B
      summary: Premium API plan unlocks quarterly data access
    - id: BD-013
      type: BA/DK
      summary: scipy.signal for local extrema in support/resistance
    - id: BD-014
      type: M/DK
      summary: Window default of 14 for most indicators
    - id: BD-067
      type: B/BA
      summary: Collect each 4 indicator types (breadth, momentum, overlap, volatility) in single call
    - id: BD-032
      type: B/RC
      summary: 'Support 6 period types for historical data: intraday, daily, weekly, monthly, quarterly, yearly'
    - id: BD-056
      type: B/BA
      summary: Positive volume = buy, negative volume = sell for portfolio transactions
    - id: BD-039
      type: B
      summary: Load example portfolio template when no dataset provided
    - id: BD-065
      type: B/BA
      summary: VaR supports Historical, Parametric (variance-covariance), and Monte Carlo methods
    - id: BD-071
      type: B/BA
      summary: Bollinger Bands default to 20-period MA with 2 standard deviations
resources:
  packages:
  - name: pandas>=2.2
    version_pin: latest
  - name: scikit-learn>=1.6
    version_pin: latest
  - name: requests>=2.32
    version_pin: latest
  - name: yfinance
    version_pin: latest
  - name: openpyxl>=3.1
    version_pin: latest
  - name: tqdm>=4.67
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: numpy
    version_pin: latest
  - name: pytest>=8.3
    version_pin: latest
  - name: pylint>=3.3
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install pandas>=2.2
    - python3 -m pip install scikit-learn>=1.6
    - python3 -m pip install requests>=2.32
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When initializing Toolkit with start_date or end_date parameters
    action: use date strings formatted as YYYY-MM-DD
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid date format causes ValueError, preventing data acquisition from proceeding
    stage_ids:
    - data_acquisition
  - id: finance-C-002
    when: When specifying start_date and end_date together
    action: verify start_date chronologically precedes end_date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid date range causes ValueError, resulting in empty datasets and failed financial analysis
    stage_ids:
    - data_acquisition
  - id: finance-C-003
    when: When requesting financial statements
    action: specify statement parameter as exactly 'balance', 'income', or 'cashflow'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid statement type raises ValueError, blocking retrieval of balance sheets, income statements, or cash
      flow statements
    stage_ids:
    - data_acquisition
  - id: finance-C-004
    when: When providing tickers to the Toolkit
    action: pass tickers as string or list of strings, not other types
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid ticker type raises TypeError, preventing any financial data retrieval
    stage_ids:
    - data_acquisition
  - id: finance-C-014
    when: When initializing the Toolkit
    action: pass API key if enforce_source is set to FinancialModelingPrep
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing API key with enforced FMP source raises ValueError, blocking all data retrieval
    stage_ids:
    - data_acquisition
  - id: finance-C-017
    when: When enforcing a single data source
    action: set enforce_source parameter to either 'FinancialModelingPrep' or 'YahooFinance'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Invalid enforce_source value raises ValueError, preventing Toolkit initialization
    stage_ids:
    - data_acquisition
  - id: finance-C-025
    when: When normalizing financial statement dates
    action: Convert column labels to pd.PeriodIndex with frequency 'Q' for quarterly or 'Y' for yearly
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Financial ratio calculations will fail or produce incorrect results if date columns are not properly indexed
      as pd.Period objects
    stage_ids:
    - normalization
  - id: finance-C-026
    when: When reading normalization format files
    action: Provide an invalid statement type to read_normalization_file
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Normalization will fail silently, returning an empty Series and causing downstream ratio calculations to
      produce NaN or zero values
    stage_ids:
    - normalization
  - id: finance-C-040
    when: When normalizing date columns
    action: Preserve date string format without converting to PeriodIndex
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Ratio calculations will fail because pandas cannot perform time-based operations on string date columns;
      period comparisons and aggregations will not work
    stage_ids:
    - normalization
  - id: finance-C-053
    when: When implementing Sharpe or Sortino ratio calculations
    action: subtract risk-free rate from asset returns before dividing by volatility
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Sharpe and Sortino ratios will be incorrect without risk-free rate subtraction, causing misleading risk-adjusted
      return calculations that could lead to poor investment decisions
    stage_ids:
    - performance_analysis
  - id: finance-C-054
    when: When initializing the Toolkit class
    action: validate risk_free_rate parameter against allowed values ['13w', '5y', '10y', '30y']
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid risk_free_rate values will cause ValueError and crash, preventing any performance calculations from
      executing
    stage_ids:
    - performance_analysis
  - id: finance-C-055
    when: When calculating CAPM beta against benchmark
    action: exclude benchmark ticker from the asset ticker list before beta calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Including benchmark in the asset list causes circular correlation, producing meaningless beta values of approximately
      1.0 for the benchmark itself
    stage_ids:
    - performance_analysis
  - id: finance-C-061
    when: When requiring Treasury yield data
    action: use Treasury maturities outside ['13w', '5y', '10y', '30y']
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Unsupported Treasury maturities will raise ValueError and prevent any Treasury rate data retrieval
    stage_ids:
    - performance_analysis
  - id: finance-C-066
    when: When performing performance analysis calculations
    action: verify benchmark returns data is available in historical_data before metric calculations
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing benchmark data causes KeyError exceptions in beta, CAPM, alpha, and other benchmark-relative metrics,
      preventing portfolio performance analysis
    stage_ids:
    - performance_analysis
  - id: finance-C-071
    when: When calculating VaR/CVaR at different confidence levels
    action: Set alpha parameter to values representing tail probability (e.g., 0.05 for 95%, 0.01 for 99%)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect alpha values produce misleading risk estimates, causing either underestimation of tail risk or
      overly conservative risk reporting
    stage_ids:
    - risk_analysis
  - id: finance-C-073
    when: When implementing GARCH volatility calculations
    action: Set GARCH p or q parameters to values other than 1
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: GARCH(p,q) implementation only supports p=1, q=1, using different values raises ValueError and returns no
      volatility forecast
    stage_ids:
    - risk_analysis
  - id: finance-C-077
    when: When configuring GARCH optimization constraints
    action: Verify alpha + beta < 1 constraint is enforced during optimization
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violation of GARCH stationarity constraint (alpha + beta < 1) produces non-stationary volatility forecasts
    stage_ids:
    - risk_analysis
  - id: finance-C-106
    when: When implementing any Greeks calculation (delta, gamma, theta, vega, rho, etc.)
    action: Calculate d1 using black_scholes_model.get_d1() before calculating d2 or any Greek value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect d1/d2 values will propagate errors through all Greeks calculations, causing fundamentally wrong
      option sensitivity measures that could lead to incorrect hedging decisions and financial losses
    stage_ids:
    - options_pricing
  - id: finance-C-107
    when: When initializing Options class and receiving daily volatility data
    action: Annualize daily volatility by multiplying with sqrt(252) to convert from daily to annual terms
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unannualized volatility will underestimate option prices significantly (by factor of sqrt(252) ≈ 15.87),
      leading to systematic mispricing and incorrect risk assessments
    stage_ids:
    - options_pricing
  - id: finance-C-111
    when: When calculating time_to_expiration in Black-Scholes formulas
    action: Convert days to expiration to years by dividing by 365 before passing to d1 calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using days instead of years will cause d1 to be 365x too large, resulting in wildly incorrect option prices
      and Greeks that don't match market values
    stage_ids:
    - options_pricing
  - id: finance-C-113
    when: When using Black-Scholes model for option pricing
    action: Apply Black-Scholes formula to American-style options that can be exercised before expiration
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: American options have early exercise premium that Black-Scholes doesn't capture, leading to systematic underpricing
      of put options and overpricing of deep-in-the-money calls
    stage_ids:
    - options_pricing
  - id: finance-C-119
    when: When calculating Greeks values
    action: Pass each required parameters (stock_price, strike_price, time_to_expiration, risk_free_rate, volatility, dividend_yield)
      to Greek calculation functions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing required parameters will cause TypeError exceptions or incorrect default values being used, breaking
      option sensitivity calculations
    stage_ids:
    - options_pricing
  - id: finance-C-124
    when: Implementing Dupont analysis
    action: Calculate Return on Equity as the product of Net Profit Margin, Asset Turnover, and Equity Multiplier
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Misaligned ROE calculation produces incorrect profitability assessments, leading to flawed investment recommendations
      based on wrong decomposition of return drivers
    stage_ids:
    - modeling
  - id: finance-C-125
    when: Implementing Extended Dupont analysis
    action: Calculate Return on Equity as the product of Interest Burden Ratio, Tax Burden Ratio, Operating Profit Margin,
      Asset Turnover, and Equity Multiplier
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect ROE decomposition in extended Dupont breaks down profitability analysis, obscuring true drivers
      of return across leverage, tax, and operational efficiency dimensions
    stage_ids:
    - modeling
  - id: finance-C-126
    when: Implementing Piotroski F-score year-over-year comparison
    action: Apply shift(1) to align current period with prior period for each change-based criteria
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without proper temporal alignment via shift(1), the F-score compares incorrect periods, producing invalid
      financial health assessments that misrepresent company performance trends
    stage_ids:
    - modeling
  - id: finance-C-127
    when: Calculating Piotroski F-score
    action: Assign binary values (0 or 1) to each of nine criteria following classic financial scoring methodology
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-binary scoring breaks the Piotroski scoring convention, producing non-standard results that cannot be
      compared against academic benchmarks or historical validation studies
    stage_ids:
    - modeling
  - id: finance-C-128
    when: Calculating WACC cost of equity
    action: 'Apply CAPM formula: risk_free_rate + beta * (benchmark_returns - risk_free_rate)'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect CAPM implementation produces wrong cost of equity, distorting WACC calculation and leading to mispriced
      valuation models and investment decisions
    stage_ids:
    - modeling
  - id: finance-C-130
    when: Calculating Altman Z-Score
    action: 'Apply the correct weighted formula: 1.2*WC/TA + 1.4*RE/TA + 3.3*EBIT/TA + 0.6*MVE/TL + 1.0*S/TA'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect Z-Score coefficients produce invalid bankruptcy predictions, potentially leading to wrong risk
      assessments and investment decisions based on flawed financial distress indicators
    stage_ids:
    - modeling
  - id: finance-C-131
    when: Calculating DCF terminal value
    action: Allow perpetual_growth_rate to equal or exceed weighted_average_cost_of_capital
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Terminal value calculation becomes mathematically undefined (division by zero or negative infinity) when
      perpetual growth rate meets or exceeds discount rate, producing meaningless valuation results
    stage_ids:
    - modeling
  - id: finance-C-132
    when: Calculating Gordon Growth Model
    action: Allow rate_of_return to equal growth_rate in denominator
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Division by zero produces infinite or undefined intrinsic value, rendering dividend discount model calculations
      meaningless for any rate-growth combination
    stage_ids:
    - modeling
  - id: finance-C-142
    when: Computing CAPM betas for WACC
    action: Calculate beta from covariance of asset returns with benchmark returns divided by benchmark variance
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect beta calculation produces wrong cost of equity estimates, propagating errors through WACC and all
      downstream valuation models dependent on discount rates
    stage_ids:
    - modeling
  - id: finance-C-147
    when: When initializing the Discovery module for security search
    action: proceed without providing a valid FinancialModelingPrep API key
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Discovery module cannot fetch any securities data from FinancialModelingPrep API, causing all discovery operations
      to fail immediately
    stage_ids:
    - discovery
  - id: finance-C-149
    when: When implementing search_instruments with search_method parameter
    action: 'restrict search_method to only accepted values: ''symbol'', ''name'', ''cik'', ''cusip'', ''isin'''
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid search_method values cause API endpoint failures resulting in malformed URL construction for FinancialModelingPrep
      search API
    stage_ids:
    - discovery
  - id: finance-C-166
    when: When implementing bond price calculation
    action: use present value discounting of coupon and principal payments over each periods
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Bond prices will be incorrectly valued, leading to erroneous investment decisions and potential financial
      loss when using mispriced bonds for portfolio allocation or hedging
    stage_ids:
    - fixed_income
  - id: finance-C-167
    when: When implementing Macaulay's duration calculation
    action: weight each cash flow by its present value divided by total bond price
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Duration will misrepresent bond sensitivity to interest rate changes, causing incorrect hedging ratios and
      unexpected portfolio risk exposure
    stage_ids:
    - fixed_income
  - id: finance-C-168
    when: When implementing yield-to-maturity calculation
    action: use iterative convergence method with tolerance checking and max iteration guard
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: YTM solver may enter infinite loop or return invalid results without convergence criteria, causing application
      hangs or incorrect bond valuations
    stage_ids:
    - fixed_income
  - id: finance-C-208
    when: When implementing portfolio data parsing
    action: enforce volume positive=buy, negative=sell convention in transaction parsing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Return calculations produce incorrect results when buy/sell volume convention is violated, causing the invested
      amount and current value to be incorrectly computed, leading to false portfolio performance metrics
    stage_ids:
    - portfolio_management
  - id: finance-C-209
    when: When implementing transaction data validation
    action: 'require portfolio dataset to contain mandatory columns: Date, Identifier, Price, Volume'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Portfolio analysis fails with ValueError when mandatory columns are missing, preventing any portfolio performance
      calculations and requiring manual dataset correction
    stage_ids:
    - portfolio_management
  - id: finance-C-211
    when: When implementing portfolio data parsing
    action: parse date columns using configured format options to verify temporal consistency
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Portfolio transactions are misaligned with historical price data when date parsing fails, causing incorrect
      return calculations and NaN values in performance metrics
    stage_ids:
    - portfolio_management
  - id: finance-C-212
    when: When implementing portfolio-weighted metrics calculation
    action: exclude Benchmark column from weighted average calculation to prevent double-counting
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Portfolio weighted average metrics are inflated when Benchmark is included, causing false overperformance
      claims and incorrect portfolio analytics
    stage_ids:
    - portfolio_management
  - id: finance-C-213
    when: When accessing Portfolio.toolkits property
    action: call collect_historical_data() before creating Toolkit instance to verify data availability
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Toolkit metrics return empty DataFrames or incorrect calculations when historical data has not been collected,
      causing downstream portfolio analytics to fail silently
    stage_ids:
    - portfolio_management
  - id: finance-C-215
    when: When implementing duplicate transaction handling
    action: exclude price column from aggregation when merging duplicate transactions on same day
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: False investment amounts are calculated when duplicate prices are summed instead of averaged, causing inflated
      invested values and incorrect return percentages
    stage_ids:
    - portfolio_management
  - id: finance-C-217
    when: When implementing portfolio returns calculation
    action: use Latest Value divided by Invested minus 1 to calculate return percentage
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Return calculations produce mathematically incorrect results when alternative formulas are used, leading
      to misleading portfolio performance comparisons
    stage_ids:
    - portfolio_management
  - id: finance-C-218
    when: When implementing YAML configuration loading
    action: enforce configuration file to be in .yaml format only
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Portfolio module fails to initialize with non-YAML configuration files, requiring users to convert or correct
      their configuration format
    stage_ids:
    - portfolio_management
  - id: finance-C-219
    when: When implementing transaction data import
    action: accept only .xlsx, .xls, or .csv file extensions for portfolio data
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Portfolio data import fails for unsupported file formats, requiring users to convert their portfolio exports
      to valid spreadsheet or CSV formats
    stage_ids:
    - portfolio_management
  - id: finance-C-220
    when: When implementing PnL calculation
    action: support FIFO, LIFO, and AVERAGE inventory valuation methods
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: PnL calculations fail with ValueError when unsupported inventory methods are specified, preventing users
      from comparing different cost basis approaches
    stage_ids:
    - portfolio_management
  - id: finance-C-221
    when: When implementing portfolio period calculations
    action: 'validate period parameter against allowed values: yearly, quarterly, monthly, weekly, daily'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Portfolio performance calculations raise ValueError for invalid period specifications, preventing users from
      generating reports for custom time frames
    stage_ids:
    - portfolio_management
  - id: finance-C-245
    when: When presenting backtested returns from this toolkit
    action: Claim that historical backtest returns equal expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users will make investment decisions based on unrealistic expectations, leading to financial loss when live
      trading exhibits slippage, fees, and market impact
  - id: finance-C-253
    when: When a developer thinks the look-ahead bias check 'looks unnecessary'
    action: Skip verification that financial statement dates use PeriodIndex instead of actual timestamp values
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Ratios will be computed using future data visible in the DataFrame index, causing look-ahead bias that inflates
      backtested returns
  - id: finance-C-298
    when: When implementing financial ratio calculations
    action: Call initialize_statements_and_normalization before any ratio calculation methods — verify financial statements
      are in standardized format
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calling ratio calculations before statement normalization causes formula errors due to missing or incorrectly
      formatted financial data, producing NaN or infinite values in ratio outputs
    derived_from_bd_id: BD-131
  - id: finance-C-316
    when: When processing portfolio transaction data with volume fields
    action: Interpret positive volume as buy transactions and negative volume as sell transactions; do not reverse this sign
      convention as it aligns with financial accounting standards where positive represents inflows and negative represents
      outflows
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Reversing the volume sign convention flips all trade directions, causing portfolio holdings, P&L, and risk
      calculations to be completely inverted and resulting in fundamentally wrong trading decisions
    derived_from_bd_id: BD-056
  - id: finance-C-320
    when: When pricing European options using the Black-Scholes model
    action: Use Black-Scholes only for European options with constant volatility; verify the assumptions hold (no dividends,
      continuous trading, log-normal distribution). For American options, dividend-paying assets, or assets with stochastic
      volatility, use binomial tree or finite difference methods instead
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Black-Scholes systematically underprices deep in-the-money American puts by 5-10% due to ignoring early exercise
      premium, and misprices options with jumps or stochastic vol by 10-20%, causing significant hedging errors and losses
    derived_from_bd_id: BD-076
  - id: finance-C-366
    when: When implementing batch API request logic for data retrieval
    action: Exceed 20 tickers per single API batch request — implement request chunking to respect rate limits and prevent
      429 Too Many Requests errors
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Exceeding the 20-ticker batch limit triggers rate limit violations, causing API requests to fail with 429
      errors that halt data retrieval and prevent backtesting from completing
    derived_from_bd_id: BD-028
  - id: finance-C-380
    when: When retrieving historical financial data across different investment horizons
    action: 'Support each 6 period types for historical data: intraday, daily, weekly, monthly, quarterly, yearly — verify
      data availability aligns with API subscription tier (Premium required for quarterly/intraday)'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incomplete period type support limits analysis to specific investment horizons, making the Toolkit unsuitable
      for strategies spanning from high-frequency trading to long-term strategic planning
    derived_from_bd_id: BD-032
  - id: finance-C-382
    when: When pricing American-style options in backtesting or live trading
    action: Apply Black-Scholes analytical formula to American-style options — this model ignores early exercise premium and
      will produce systematically incorrect prices
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Black-Scholes systematically underprices deep in-the-money American puts by 5-10% due to ignored early exercise
      premium; strategies using BS-priced American options will show inflated theoretical profits that cannot be realized
    derived_from_bd_id: BD-035
  - id: finance-C-392
    when: When using Portfolio.toolkits in any backtesting or analysis workflow
    action: Call collect_historical_data() and verify it completes successfully BEFORE creating the Toolkit instance; the
      Toolkit initialization depends on pre-loaded historical data for each time-series calculations
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Reversing the order causes Toolkit methods to return empty or None values for all ratio and time-series dependent
      calculations, creating silent data failures where the system appears to run without errors but produces no meaningful
      output
    derived_from_bd_id: BD-126
  regular:
  - id: finance-C-005
    when: When using the FMP Free plan for data acquisition
    action: request data beyond 5 years of history or quarterly financial statements
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: FMP Free plan limits data to 5 years and excludes quarterly data, causing incomplete datasets and incorrect
      ratio calculations
    stage_ids:
    - data_acquisition
  - id: finance-C-006
    when: When using the FMP Free plan
    action: exceed 250 API requests per day
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Daily request limit exceeded causes API to return LIMIT REACH errors, resulting in empty DataFrames and failed
      analysis
    stage_ids:
    - data_acquisition
  - id: finance-C-007
    when: When using the FMP Free plan
    action: request non-US exchange tickers
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: FMP Free plan only covers US exchanges, causing US STOCKS ONLY errors and empty datasets for international
      securities
    stage_ids:
    - data_acquisition
  - id: finance-C-008
    when: When making API requests to FMP or Yahoo Finance
    action: respect a 60-second timeout per request
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Requests without proper timeout can hang indefinitely, blocking the entire data acquisition process
    stage_ids:
    - data_acquisition
  - id: finance-C-009
    when: When encountering connection errors during FMP API calls
    action: retry up to 12 times before returning empty data
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Insufficient retry attempts can result in premature failure when network connectivity issues are temporary
    stage_ids:
    - data_acquisition
  - id: finance-C-010
    when: When making multiple ticker requests
    action: wait 0.1 seconds between each request to prevent rate limiting
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without sleep intervals, rapid successive requests trigger rate limiting causing data retrieval failures
    stage_ids:
    - data_acquisition
  - id: finance-C-011
    when: When retrieving data for multiple tickers
    action: batch each tickers in a single Toolkit initialization call
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Initializing Toolkit separately for each ticker prevents threading optimization, causing 10+ minutes of unnecessary
      waiting time
    stage_ids:
    - data_acquisition
  - id: finance-C-012
    when: When making repeated data requests for the same tickers
    action: enable use_cached_data parameter to reduce API calls
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Repeated API calls without caching exhaust rate limits faster and increase data retrieval latency unnecessarily
    stage_ids:
    - data_acquisition
  - id: finance-C-013
    when: When data acquisition completes
    action: check DataFrames for error message columns like LIMIT REACH, INVALID API KEY
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Silent errors in DataFrames propagate to downstream ratio calculations causing NaN values or incorrect financial
      metrics
    stage_ids:
    - data_acquisition
  - id: finance-C-015
    when: When FMP API is unavailable or returns empty data
    action: automatically fall back to Yahoo Finance as secondary data source
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without automatic fallback, single-source failures cause complete data acquisition failure
    stage_ids:
    - data_acquisition
  - id: finance-C-018
    when: When caching data for reuse
    action: use pandas pickle for financial data and python pickle for configuration
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent pickle method causes cache read/write failures, defeating the purpose of caching
    stage_ids:
    - data_acquisition
  - id: finance-C-019
    when: When claiming the FinanceToolkit provides data accuracy guarantees
    action: claim responsibility for data accuracy from external APIs
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Over-promising data accuracy leads to user trust issues when data discrepancies are discovered
    stage_ids:
    - data_acquisition
  - id: finance-C-020
    when: When presenting data retrieved from Yahoo Finance fallback
    action: present Yahoo Finance data as Financial Modeling Prep data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting data source causes user confusion when methodology differences lead to divergent results
    stage_ids:
    - data_acquisition
  - id: finance-C-021
    when: When using cached data with different parameters
    action: warn users when cached configurations override initialization parameters
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Silent parameter overrides from cache cause unexpected analysis results that differ from intended parameters
    stage_ids:
    - data_acquisition
  - id: finance-C-022
    when: When FMP rate limit is reached with Premium subscription
    action: wait 5 seconds before retrying, up to 12 retry attempts
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without proper sleep intervals on rate limit, Premium users still encounter repeated LIMIT REACH errors
    stage_ids:
    - data_acquisition
  - id: finance-C-023
    when: When Yahoo Finance is unavailable due to rate limiting
    action: treat rate limit as permanent failure without additional retry attempts
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Yahoo Finance rate limit indicates temporary unavailability; treating as permanent error causes unnecessary
      data gaps
    stage_ids:
    - data_acquisition
  - id: finance-C-024
    when: When Yahoo Finance returns empty data
    action: mark the ticker as no_data when both FMP and Yahoo Finance return empty
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without proper no_data tracking, failed tickers are silently excluded from analysis
    stage_ids:
    - data_acquisition
  - id: finance-C-027
    when: When processing custom financial statement data
    action: Handle missing fields gracefully by filling with 0 when adjust_financial_statements is True
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ratio calculations will crash with division by zero or KeyError when expected line items are missing from
      custom datasets
    stage_ids:
    - normalization
  - id: finance-C-028
    when: When converting financial statement data types
    action: Convert each financial data to float64 for numerical consistency in ratio calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mathematical operations in ratio calculations will fail when string or non-numeric values are present in
      financial statement data
    stage_ids:
    - normalization
  - id: finance-C-029
    when: When handling duplicate date columns in financial statements
    action: Drop duplicate period columns, keeping only the first occurrence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate columns cause misalignment in ratio calculations across time periods, producing incorrect financial
      metrics
    stage_ids:
    - normalization
  - id: finance-C-030
    when: When providing the format_location parameter
    action: Verify the directory contains each required CSV files (balance.csv, income.csv, cash.csv, statistics.csv, and
      _yf variants)
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Normalization will fall back to bundled default files, potentially missing custom field mappings that the
      user intended to use
    stage_ids:
    - normalization
  - id: finance-C-031
    when: When customizing normalization field mappings
    action: 'Verify custom CSV files have exactly two columns: source field name and standardized field name'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Custom field mappings will not be applied correctly, causing ratio calculations to use wrong field names
      and produce incorrect results
    stage_ids:
    - normalization
  - id: finance-C-032
    when: When using the reverse_dates parameter
    action: Set reverse_dates=True to verify chronological ordering (oldest first) for time-series analysis patterns
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Financial trend analysis and period-over-period comparisons will produce reversed results, breaking expected
      chronological patterns
    stage_ids:
    - normalization
  - id: finance-C-033
    when: When a KeyError occurs during field name mapping
    action: Skip the unmapped field and continue processing remaining fields silently
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unmapped fields are silently dropped, potentially causing important financial data to be excluded from analysis
      without user notification
    stage_ids:
    - normalization
  - id: finance-C-034
    when: When processing custom datasets that lack each expected fields
    action: Populate missing line items with 0 values instead of raising exceptions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Ratio calculations will encounter division by zero errors or KeyError exceptions when expected financial
      fields are absent from custom datasets
    stage_ids:
    - normalization
  - id: finance-C-035
    when: When error handling during statement processing
    action: Catch each exceptions and return empty DataFrame instead of propagating errors to the caller
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Any normalization error will crash the entire financial analysis pipeline, preventing users from accessing
      any results
    stage_ids:
    - normalization
  - id: finance-C-036
    when: When deriving statistics from financial statements
    action: Load statistics from cached data rather than through separate API calls
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Making additional API calls for statistics increases network latency and can hit rate limits, slowing down
      financial analysis workflows
    stage_ids:
    - normalization
  - id: finance-C-037
    when: When normalizing financial data from multiple sources
    action: Apply consistent standardized field names across balance sheet, income statement, and cash flow statements
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Ratio calculations will fail or produce incorrect results when field names are inconsistent across the three
      financial statements
    stage_ids:
    - normalization
  - id: finance-C-038
    when: When presenting normalized financial data to users
    action: Claim the normalized data has higher accuracy than the source data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will make incorrect financial decisions based on false assumptions about data reliability; the toolkit
      is only a calculation engine, not a data validation system
    stage_ids:
    - normalization
  - id: finance-C-039
    when: When handling data from Financial Modeling Prep vs Yahoo Finance
    action: Apply the correct normalization format based on the data source (FMP vs Yahoo Finance)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Field names from Yahoo Finance will not match FMP normalization format, causing all ratio calculations to
      fail or produce zeros
    stage_ids:
    - normalization
  - id: finance-C-041
    when: When calculating financial ratios with zero denominators
    action: raise errors or warnings for division by zero in ratio calculations
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Financial ratios produce inf/nan values for legitimate business scenarios like companies with zero debt or
      no inventory, causing incomplete ratio DataFrames and misleading analytical results
    stage_ids:
    - ratio_calculation
  - id: finance-C-042
    when: When implementing ratio calculation functions
    action: accept pd.Series inputs and return pd.Series outputs for vectorized computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-vectorized calculations require row-by-row iteration, causing severe performance degradation when processing
      multiple tickers or time periods
    stage_ids:
    - ratio_calculation
  - id: finance-C-043
    when: When calculating quarterly efficiency ratios with days parameter
    action: use 365/4 (91.25) as default days value for annualization of interest coverage and turnover ratios
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect annualization of quarterly ratios produces misleading year-over-year comparisons and wrong profitability
      assessments
    stage_ids:
    - ratio_calculation
  - id: finance-C-044
    when: When combining quarterly financial statements with daily prices
    action: map period data to daily via backward fill followed by forward fill to handle data alignment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect data alignment causes ratio calculations to mix time periods, producing invalid financial metrics
      and misleading investment signals
    stage_ids:
    - ratio_calculation
  - id: finance-C-045
    when: When initializing the Ratios class
    action: normalize each ticker inputs to uppercase list with duplicates removed
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Duplicate or inconsistent ticker casing causes redundant API calls, data corruption from mixed ticker symbols,
      and incorrect portfolio aggregations
    stage_ids:
    - ratio_calculation
  - id: finance-C-046
    when: When benchmark ticker is provided in the tickers list
    action: exclude the benchmark ticker from the main tickers list to prevent data duplication
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Benchmark ticker appearing in both main list and as separate benchmark causes double-counting in portfolio
      calculations and distorted comparative metrics
    stage_ids:
    - ratio_calculation
  - id: finance-C-047
    when: When ratio calculation methods are not accessed
    action: perform expensive ratio calculations before they are requested
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Eager computation of all 50+ ratios consumes significant CPU and memory even when only specific ratios are
      needed for analysis
    stage_ids:
    - ratio_calculation
  - id: finance-C-048
    when: When calculating custom ratio formulas
    action: evaluate user-defined formulas only using available financial statement line items and ratio names
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Invalid formula syntax or referencing non-existent financial line items causes runtime errors or silent calculation
      of incorrect custom ratios
    stage_ids:
    - ratio_calculation
  - id: finance-C-049
    when: When presenting ratio calculation results
    action: claim accuracy of third-party financial data sources as the toolkit's own accuracy
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting third-party data quality as toolkit-verified misleads users about data reliability and creates
      legal liability for incorrect investment decisions
    stage_ids:
    - ratio_calculation
  - id: finance-C-050
    when: When displaying calculated financial ratios as predictive indicators
    action: represent historical ratio values as guarantees of future financial performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Claims of guaranteed future performance based on historical ratios violate securities regulations and mislead
      investors about investment risk
    stage_ids:
    - ratio_calculation
  - id: finance-C-051
    when: When ratio calculations produce infinite or NaN values
    action: silently pass RuntimeWarnings for division by zero operations in financial ratio contexts
    severity: low
    kind: architecture_guardrail
    modality: must
    consequence: Raising errors for legitimate zero-denominator cases prevents analysis of financially distressed companies
      with zero revenue, debt, or equity
    stage_ids:
    - ratio_calculation
  - id: finance-C-052
    when: When rounding ratio calculation results
    action: default to 4 decimal places for ratio values with per-method override capability
    severity: low
    kind: domain_rule
    modality: must
    consequence: Inconsistent decimal precision across ratios makes comparison difficult and may mask subtle but significant
      financial differences between companies
    stage_ids:
    - ratio_calculation
  - id: finance-C-056
    when: When calculating within-period performance metrics
    action: verify MultiIndex structure has exactly 2 levels for period-specific risk calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper MultiIndex structure (MULTI_PERIOD_INDEX_LEVELS=2), within-period calculations like quarterly
      VaR will produce incorrect or aggregated results instead of period-specific metrics
    stage_ids:
    - performance_analysis
  - id: finance-C-057
    when: When obtaining Fama-French factor data
    action: download from Kenneth French's official Dartmouth repository (https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using unofficial Fama-French data sources may introduce inconsistent factor values, leading to incorrect
      multi-factor model regression results and misleading alpha attribution
    stage_ids:
    - performance_analysis
  - id: finance-C-058
    when: When performing volatility calculations for daily data
    action: calculate daily Sharpe/Beta/Treynor ratios as primary outputs
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Daily standard deviation approaches zero, producing unreliable ratio values with high variance and low statistical
      significance
    stage_ids:
    - performance_analysis
  - id: finance-C-059
    when: When configuring Treasury yield data source
    action: use 10-year Treasury Bond as the default risk-free rate benchmark
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using non-standard risk-free rates may produce inconsistent Sharpe ratios that cannot be compared across
      academic literature or industry benchmarks
    stage_ids:
    - performance_analysis
  - id: finance-C-060
    when: When selecting benchmark ticker for CAPM calculations
    action: use 'SPY' (S&P 500 Index) as the default benchmark
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Non-benchmark-appropriate tickers produce beta values relative to an unsuitable market proxy, reducing the
      interpretability of systematic risk measurements
    stage_ids:
    - performance_analysis
  - id: finance-C-062
    when: When running performance calculations with limited data
    action: handle insufficient samples gracefully in Fama-French regression (minimum 2 samples for R-squared)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Regression with fewer than 2 samples causes undefined R-squared, returning NaN values that propagate through
      multi-factor model results
    stage_ids:
    - performance_analysis
  - id: finance-C-063
    when: When fetching Fama-French factor data
    action: account for data update lag of up to one month in the Kenneth French repository
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Stale Fama-French factor data causes regression coefficients to be calculated with outdated market premiums,
      leading to inaccurate factor attribution
    stage_ids:
    - performance_analysis
  - id: finance-C-064
    when: When calculating performance ratios for single assets
    action: pass pd.Series input types to single-asset calculation functions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect input types cause TypeError exceptions, preventing single-ticker performance metric calculations
    stage_ids:
    - performance_analysis
  - id: finance-C-065
    when: When computing beta and CAPM metrics
    action: call performance_model.get_beta before CAPM calculation to obtain correct beta values
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: CAPM expected returns depend on correct beta; using unverified beta values produces incorrect expected return
      estimates that misguide investment decisions
    stage_ids:
    - performance_analysis
  - id: finance-C-067
    when: When presenting portfolio performance metrics
    action: claim that historical performance calculations equal expected future returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Past performance does not guarantee future results; presenting calculated metrics as predictions misleads
      investors about future portfolio performance
    stage_ids:
    - performance_analysis
  - id: finance-C-068
    when: When interpreting Sortino ratio calculations
    action: interpret Sortino ratio denominator as total volatility instead of downside volatility
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Sortino ratio uses only negative returns in denominator; comparing it to Sharpe ratio (which uses total volatility)
      leads to incorrect risk assessment
    stage_ids:
    - performance_analysis
  - id: finance-C-069
    when: When using Factor Asset Correlations instead of Fama-French regression
    action: use correlation values as direct substitutes for factor betas in high-accuracy applications
    severity: medium
    kind: claim_boundary
    modality: should_not
    consequence: Correlation measures linear relationship but not explanatory power; using correlations instead of regression
      betas can misrepresent factor exposure in quantitative models
    stage_ids:
    - performance_analysis
  - id: finance-C-070
    when: When implementing annualized volatility calculations
    action: multiply daily standard deviation by sqrt(252) for annualization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper annualization factor, annualized volatility values are severely underestimated, causing incorrect
      risk assessment and portfolio allocation decisions
    stage_ids:
    - performance_analysis
  - id: finance-C-072
    when: When calculating CVaR using Laplace distribution
    action: Set alpha parameter above 0.5 for Laplace CVaR
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Laplace CVaR formula is mathematically undefined for alpha > 0.5, returning zero instead of valid risk measure
    stage_ids:
    - risk_analysis
  - id: finance-C-074
    when: When handling multi-period index data structures
    action: Verify DataFrame index has exactly 2 levels when calculating risk metrics within specific periods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Risk calculations fail silently or produce incorrect results when multi-index structure is not properly maintained
    stage_ids:
    - risk_analysis
  - id: finance-C-075
    when: When calculating drawdowns in financial time series
    action: Use cumulative returns divided by cumulative maximum (not simple minimum) to identify drawdowns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect drawdown calculation using min instead of cummax produces wrong peak-to-trough measurements
    stage_ids:
    - risk_analysis
  - id: finance-C-076
    when: When applying Cornish-Fisher expansion for VaR
    action: Include both skewness and excess kurtosis adjustments in the quantile formula
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incomplete Cornish-Fisher formula excluding kurtosis or skewness terms produces inaccurate tail risk estimates
    stage_ids:
    - risk_analysis
  - id: finance-C-078
    when: When handling division by zero in ratio calculations
    action: Rely on RuntimeWarning suppression as the sole error handling mechanism
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Silent RuntimeWarning suppression without proper zero-handling produces NaN values that propagate through
      risk calculations
    stage_ids:
    - risk_analysis
  - id: finance-C-079
    when: When calculating daily risk metrics from periodic data
    action: Apply forward-fill between reporting periods to maintain daily granularity
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without forward-fill, daily risk metrics show gaps between reporting periods, breaking time-series continuity
      for risk monitoring
    stage_ids:
    - risk_analysis
  - id: finance-C-080
    when: When requesting daily risk calculations
    action: Provide intraday historical data as input
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Daily VaR/CVaR calculations without intraday data raise ValueError and abort risk analysis
    stage_ids:
    - risk_analysis
  - id: finance-C-081
    when: When calculating GARCH volatility with zero returns
    action: Replace zero returns with a very small value (1e-100) before optimization
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Zero returns cause GARCH log-likelihood calculation to produce -inf, corrupting volatility estimates
    stage_ids:
    - risk_analysis
  - id: finance-C-082
    when: When specifying period for risk calculations
    action: 'Use one of: daily, weekly, monthly, quarterly, or yearly'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid period values raise ValueError and prevent any risk metric from being calculated
    stage_ids:
    - risk_analysis
  - id: finance-C-083
    when: When accessing historical data in risk calculations
    action: Access data only through the historical_data DataFrame passed to the Risk controller
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct data access bypasses data validation and preprocessing, causing incorrect risk calculations
    stage_ids:
    - risk_analysis
  - id: finance-C-084
    when: When calculating historical VaR/CVaR
    action: Claim historical VaR as a prediction of future risk
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Historical VaR based on past returns does not guarantee similar future losses, especially during regime changes
      or crises
    stage_ids:
    - risk_analysis
  - id: finance-C-085
    when: When presenting GARCH volatility forecasts
    action: Claim GARCH forecasts as certain predictions of future volatility
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: GARCH forecasts are conditional variance estimates with inherent model uncertainty, especially for longer
      time horizons
    stage_ids:
    - risk_analysis
  - id: finance-C-086
    when: When calculating standard deviation in VaR formulas
    action: Use ddof=0 (population standard deviation) instead of sample standard deviation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using sample standard deviation (ddof=1) in VaR/CVaR formulas produces systematically biased risk estimates
    stage_ids:
    - risk_analysis
  - id: finance-C-087
    when: When selecting distribution for VaR/CVaR calculation
    action: 'Choose from: historic, gaussian, cf, studentt (for VaR) or historic, gaussian, studentt, laplace, logistic (for
      CVaR)'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid distribution name raises ValueError and prevents risk calculation from completing
    stage_ids:
    - risk_analysis
  - id: finance-C-088
    when: When calculating maximum drawdown
    action: Return both the magnitude and identify the period of the largest peak-to-trough decline
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Max drawdown without duration tracking fails to capture recovery time, critical for risk-adjusted performance
      evaluation
    stage_ids:
    - risk_analysis
  - id: finance-C-089
    when: When calculating Ulcer Index with rolling window
    action: Set rolling parameter to specified window size (default 14 periods)
    severity: low
    kind: domain_rule
    modality: must
    consequence: Incorrect rolling window produces either noisy (too short) or lagged (too long) Ulcer Index values
    stage_ids:
    - risk_analysis
  - id: finance-C-090
    when: When optimizing GARCH parameters
    action: Provide sufficient time steps (optimization_t) for stable parameter estimation
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Insufficient time steps for GARCH optimization produces unreliable volatility parameters and forecasts
    stage_ids:
    - risk_analysis
  - id: finance-C-091
    when: When calculating True Range or ATR
    action: use previous close via shift(1) for continuity calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: True Range will incorrectly exclude gap movements between consecutive sessions, causing ATR to underestimate
      actual market volatility especially after overnight news events
    stage_ids:
    - technical_analysis
  - id: finance-C-092
    when: When calculating Balance of Power
    action: fill NaN values with 0 when high equals low to prevent division errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero will produce NaN/Inf values that propagate through indicator calculations, corrupting downstream
      signals
    stage_ids:
    - technical_analysis
  - id: finance-C-093
    when: When implementing technical indicator calculations
    action: apply fill_nan interpolation before indicator calculations using interpolate(limit_area='inside')
    severity: medium
    kind: domain_rule
    modality: must
    consequence: NaN values in OHLCV data will cause rolling window calculations to produce incorrect results or partial window
      outputs, distorting indicator values especially at data boundaries
    stage_ids:
    - technical_analysis
  - id: finance-C-094
    when: When validating period parameter
    action: 'restrict period to allowed values: intraday, daily, weekly, monthly, quarterly, yearly'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid period values will cause data retrieval failures or incorrect frequency aggregations, producing meaningless
      indicator results
    stage_ids:
    - technical_analysis
  - id: finance-C-095
    when: When annualizing volatility for options pricing
    action: multiply daily volatility by sqrt(252) to annualize for consistent comparison
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent annualization will cause mispriced options and incorrect Greeks calculations, leading to systematic
      losses or gains that are not justified by actual volatility
    stage_ids:
    - technical_analysis
  - id: finance-C-096
    when: When requesting intraday historical data
    action: provide Financial Modeling Prep API key due to data source requirements
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Intraday data will not be available without API key, causing indicator calculations to fail for high-frequency
      trading strategies
    stage_ids:
    - technical_analysis
  - id: finance-C-097
    when: When selecting window parameter for indicators
    action: use default window of 14 periods as industry-standard for 2 trading weeks
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Non-standard window values may produce indicators that don't align with market expectations and published
      trading systems, reducing signal reliability
    stage_ids:
    - technical_analysis
  - id: finance-C-098
    when: When calculating support and resistance levels
    action: use scipy.signal.argrelextrema for efficient local extrema identification
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Pure Python loop implementations for finding local maxima/minima would be significantly slower for large
      datasets, degrading analysis performance
    stage_ids:
    - technical_analysis
  - id: finance-C-099
    when: When implementing new technical indicators
    action: follow MVC architecture by placing calculations in model modules and orchestrating in controller
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mixing calculation logic with orchestration will break modularity, make testing difficult, and prevent reusable
      indicator calculations across the toolkit
    stage_ids:
    - technical_analysis
  - id: finance-C-100
    when: When implementing technical indicator methods
    action: apply @handle_errors decorator to catch KeyError, ValueError, AttributeError, ZeroDivisionError
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unhandled exceptions will crash the entire analysis pipeline, preventing users from calculating multiple
      indicators when one fails
    stage_ids:
    - technical_analysis
  - id: finance-C-101
    when: When using breadth indicators for market analysis
    action: claim technical indicators predict future price movements with certainty
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting technical indicators as predictive guarantees will lead to poor trading decisions and financial
      losses when market conditions change
    stage_ids:
    - technical_analysis
  - id: finance-C-102
    when: When comparing historical volatility to forward-looking implied volatility
    action: equate realized historical volatility calculations with options-implied forward volatility
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Historical volatility measures past price dispersion while implied volatility reflects market expectations;
      conflating them leads to incorrect options pricing and hedging ratios
    stage_ids:
    - technical_analysis
  - id: finance-C-103
    when: When implementing technical indicator wrappers
    action: apply @handle_portfolio decorator to aggregate portfolio-level indicators from individual asset data
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Portfolio-level analysis will produce incorrect weighted averages when individual asset indicators are not
      properly aggregated, leading to misleading portfolio signals
    stage_ids:
    - technical_analysis
  - id: finance-C-104
    when: When calculating McClellan Oscillator breadth indicators
    action: use separate short_ema_window and long_ema_window parameters defaulting to 19 and 39 respectively
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Incorrect EMA windows will produce oscillator values that don't match market convention, causing misaligned
      buy/sell signals for breadth-based trading strategies
    stage_ids:
    - technical_analysis
  - id: finance-C-105
    when: When requesting historical data for technical analysis
    action: verify data provider fallback from Financial Modeling Prep to Yahoo Finance when primary source fails
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Single-source dependency will cause complete data retrieval failures when primary API is unavailable or rate-limited,
      preventing any technical analysis
    stage_ids:
    - technical_analysis
  - id: finance-C-108
    when: When calculating Black-Scholes option prices and Greeks
    action: Use continuous dividend yield derived from historical data, not discrete dividend adjustments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Discrete dividend adjustments violate the continuous dividend yield assumption in Black-Scholes, causing
      pricing errors especially for options near ex-dividend dates
    stage_ids:
    - options_pricing
  - id: finance-C-109
    when: When defining strike prices for option pricing
    action: Validate strike_price_range is between 0 and 1, and strike_step_size is greater than 0
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid strike price parameters will cause incorrect strike price generation, resulting in misaligned option
      chains that don't properly span the stock price range
    stage_ids:
    - options_pricing
  - id: finance-C-110
    when: When calculating implied volatility for option chains
    action: Use scipy.optimize.minimize with specified initial guess (current volatility) and verify convergence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-converged implied volatility values will be reported as current volatility, silently masking solver failures
      and leading to misleading volatility estimates for illiquid options
    stage_ids:
    - options_pricing
  - id: finance-C-112
    when: When computing d1 and d2 for option pricing
    action: Suppress numpy divide-by-zero and invalid operation warnings globally during calculations
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Silently ignoring division by zero and invalid operations will hide numerical edge cases (like zero volatility
      or zero time to expiration) that require special handling
    stage_ids:
    - options_pricing
  - id: finance-C-114
    when: When calculating implied volatility
    action: Claim implied volatility values for illiquid options where the numerical solver failed to converge
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Reporting non-converged implied volatility values as actual market expectations will mislead users about
      true market uncertainty for illiquid or deep out-of-the-money options
    stage_ids:
    - options_pricing
  - id: finance-C-115
    when: When retrieving option chain data from Yahoo Finance
    action: Assume option chain data is real-time or current; Yahoo Finance data has delays
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Using delayed option chain data for real-time implied volatility calculations will produce stale volatility
      estimates that don't reflect current market conditions
    stage_ids:
    - options_pricing
  - id: finance-C-116
    when: When presenting Black-Scholes theoretical option prices to users
    action: Present theoretical option prices as guaranteed market prices without acknowledging model assumptions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Black-Scholes theoretical prices are estimates based on idealized assumptions (lognormal returns, constant
      volatility, continuous trading) that don't hold in real markets, potentially leading users to make trades based on incorrect
      value expectations
    stage_ids:
    - options_pricing
  - id: finance-C-117
    when: When calculating option Greeks and presenting them to users
    action: Claim that theoretical Greeks exactly match market Greeks without acknowledging formula limitations
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Actual market Greeks differ from Black-Scholes theoretical values due to volatility smile, discrete dividends,
      and transaction costs, leading to hedge ratios that don't achieve intended risk reduction
    stage_ids:
    - options_pricing
  - id: finance-C-118
    when: When accessing option pricing functionality
    action: Access option pricing through the Options class interface defined in options_controller.py
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct access to underlying models bypasses proper initialization of volatility annualization and dividend
      yield calculation, producing incorrect option prices
    stage_ids:
    - options_pricing
  - id: finance-C-120
    when: When calculating implied volatility from market option prices
    action: Initialize the scipy minimize solver with the current historical volatility as the starting guess
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Poor initial guesses may cause slow convergence or convergence to local minima, producing implied volatility
      values that don't match market expectations for liquid options
    stage_ids:
    - options_pricing
  - id: finance-C-121
    when: When calculating implied volatility for a specific expiration date
    action: Calculate days_to_expiration from today's date to the expiration date using calendar days
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect time-to-expiration calculation will produce wrong d1 values, leading to systematic errors in implied
      volatility that don't reflect actual time decay
    stage_ids:
    - options_pricing
  - id: finance-C-122
    when: When encountering numerical issues during implied volatility calculation
    action: Handle cases where implied volatility cannot be resolved by excluding those strike prices from results
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Including non-converged implied volatility values will pollute volatility surface data with NaN or misleading
      values that break downstream analysis
    stage_ids:
    - options_pricing
  - id: finance-C-123
    when: When generating option chains with strikes around current price
    action: Use strike_price_range of at least 0.25 (25%) to verify coverage of both in-the-money and out-of-the-money options
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Insufficient strike price range will omit important in-the-money or out-of-the-money options needed for volatility
      smile analysis and risk assessment
    stage_ids:
    - options_pricing
  - id: finance-C-129
    when: Calculating WACC market value of debt
    action: Use total debt book value as approximation for market value of debt
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect debt valuation in WACC weighting produces misleading capital structure assessment, affecting
      cost of capital estimates for valuation and investment decisions
    stage_ids:
    - modeling
  - id: finance-C-133
    when: Handling zero total debt in WACC
    action: Replace infinite cost of debt with zero when total debt equals zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unchecked infinity values propagate through WACC calculation, corrupting downstream valuation models and
      producing unusable financial outputs
    stage_ids:
    - modeling
  - id: finance-C-134
    when: Using DCF intrinsic value calculation
    action: Supply the discount_rate parameter as a replaceable input value
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Hardcoded discount rate prevents sensitivity analysis and model customization, limiting the flexibility required
      for different valuation scenarios and investor assumptions
    stage_ids:
    - modeling
  - id: finance-C-135
    when: Calculating Piotroski F-score
    action: Exclude the first time period from results due to shift(1) producing NaN values
    severity: high
    kind: operational_lesson
    modality: must
    consequence: First period F-scores contain meaningless zeros from NaN comparisons, contaminating financial health rankings
      with invalid baseline data
    stage_ids:
    - modeling
  - id: finance-C-136
    when: Interpreting Altman Z-Score
    action: Apply Z-Score thresholds specified for manufacturing companies with assets exceeding $1 million
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Misapplied Z-Score thresholds on non-manufacturing or small companies produce unreliable bankruptcy predictions
      that could lead to inappropriate investment or credit decisions
    stage_ids:
    - modeling
  - id: finance-C-137
    when: Using Piotroski F-score for sector comparison
    action: Compare companies within the same industry sector to account for sector-specific norms
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Cross-sector F-score comparisons ignore industry-specific practices (e.g., share buybacks vs. issuances),
      producing misleading financial health rankings that mischaracterize company performance
    stage_ids:
    - modeling
  - id: finance-C-138
    when: Using intrinsic valuation models
    action: Recognize that results are highly dependent on input assumptions provided by the user
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Overconfident reliance on intrinsic value estimates without recognizing assumption sensitivity leads to misguided
      investment decisions based on mathematically correct but contextually flawed valuations
    stage_ids:
    - modeling
  - id: finance-C-139
    when: Using 10-year Treasury as risk-free rate
    action: Use the default 10-year Treasury yield for WACC cost of equity calculation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect risk-free rate assumption propagates through CAPM and WACC calculations, distorting discount rates
      and producing systematically biased valuation models
    stage_ids:
    - modeling
  - id: finance-C-140
    when: Calculating Dupont analysis
    action: 'Source component ratios from specialized modules: profit_margin from profitability_model, asset_turnover from
      efficiency_model, equity_multiplier from solvency_model'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct inline calculations bypass validated component modules, risking inconsistent ratio definitions and
      breaking the modular architecture that ensures calculation consistency across the toolkit
    stage_ids:
    - modeling
  - id: finance-C-141
    when: Accessing financial data for models
    action: Use the Models controller as the sole data entry point, not access exchange or data provider directly
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies bypassing the controller access data inconsistently, breaking the centralized data flow architecture
      and potentially using stale or incorrectly normalized inputs
    stage_ids:
    - modeling
  - id: finance-C-143
    when: Presenting DCF intrinsic value results
    action: Present calculated intrinsic values as guaranteed or definitive market values
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting model outputs as definitive valuations misleads stakeholders, potentially causing significant
      financial losses from overconfident investment decisions based on scenario-dependent calculations
    stage_ids:
    - modeling
  - id: finance-C-144
    when: Using Altman Z-Score for bankruptcy prediction
    action: Claim Z-Score provides definitive bankruptcy prediction for each company types
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Overgeneralizing Z-Score validity leads to inappropriate risk assessments for non-manufacturing companies
      or those below asset thresholds, potentially causing credit or investment losses
    stage_ids:
    - modeling
  - id: finance-C-145
    when: Interpreting Piotroski F-score
    action: Claim F-score provides universal financial health assessment without sector context
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Sector-agnostic F-score interpretation mischaracterizes companies in industries with different capital structures
      or dividend policies, leading to incorrect value investing decisions
    stage_ids:
    - modeling
  - id: finance-C-146
    when: When implementing ISIN code validation for security discovery
    action: validate ISIN format using regex pattern ^([A-Z]{2})([A-Z0-9]{9})([0-9])$ to verify correct ISO 6166 standard
      compliance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid ISIN format acceptance leads to malformed queries sent to Yahoo Finance API, resulting in failed
      ticker conversion and degraded discovery functionality
    stage_ids:
    - discovery
  - id: finance-C-148
    when: When calling search_instruments with a query parameter
    action: pass an empty or None query string to the search function
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Empty query triggers API errors or returns irrelevant results, preventing effective security discovery
    stage_ids:
    - discovery
  - id: finance-C-150
    when: When ISIN to ticker conversion encounters network failure or no matching quotes
    action: gracefully return the original ISIN code instead of raising an unhandled exception
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unhandled network exceptions crash the calling code, preventing security discovery workflows from completing
    stage_ids:
    - discovery
  - id: finance-C-151
    when: When using the FinancialModelingPrep stock screener functionality
    action: narrow search criteria when result set exceeds 1000 companies to prevent incomplete data
    severity: high
    kind: resource_boundary
    modality: must
    consequence: API returns only first 1000 results without warning, causing companies to be arbitrarily excluded from screening
      results
    stage_ids:
    - discovery
  - id: finance-C-152
    when: When making API requests to FinancialModelingPrep or Yahoo Finance
    action: implement 60-second timeout to prevent indefinite hanging on slow or unreachable endpoints
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Requests without timeout can hang indefinitely, blocking application threads and degrading user experience
    stage_ids:
    - discovery
  - id: finance-C-153
    when: When using ISIN to ticker conversion via Yahoo Finance search
    action: assume Yahoo Finance conversion always succeeds and returns a valid ticker symbol
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Conversion failures silently pass through the original ISIN, which then fails when used as a ticker in subsequent
      FMP API calls
    stage_ids:
    - discovery
  - id: finance-C-154
    when: When operating with a Free tier FinancialModelingPrep subscription
    action: respect the 250 requests per day API limit to avoid service disruption
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding 250 daily requests causes rate limit errors, preventing further data retrieval for the remainder
      of the day
    stage_ids:
    - discovery
  - id: finance-C-155
    when: When using the Discovery module with Free tier subscription
    action: attempt to search for non-US securities as the Free plan only supports US exchanges
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Non-US security queries return empty results or US_STOCKS_ONLY error, misleading users into thinking securities
      don't exist
    stage_ids:
    - discovery
  - id: finance-C-156
    when: When implementing ISIN to ticker conversion
    action: apply graceful degradation pattern where Yahoo Finance failures return original ISIN rather than raising errors
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Hard failures prevent batch processing workflows from completing, requiring manual retry or error handling
    stage_ids:
    - discovery
  - id: finance-C-157
    when: When screening stocks with multiple filter criteria
    action: combine filters using AND logic to narrow results rather than OR logic which would broaden them
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unexpected filter behavior causes screener to return unintended results, leading to incorrect investment
      analysis
    stage_ids:
    - discovery
  - id: finance-C-158
    when: When performing security discovery searches with empty results
    action: log an informative error message guiding users to try different query terms
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Silent empty results confuse users about whether the search worked correctly or if securities truly don't
      exist
    stage_ids:
    - discovery
  - id: finance-C-159
    when: When using the Discovery module architecture
    action: route each API calls through discovery_model layer which abstracts FMP API interactions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct API calls bypass error handling and subscription management, causing inconsistent behavior and potential
      data corruption
    stage_ids:
    - discovery
  - id: finance-C-160
    when: When implementing the Discovery class initialization
    action: perform API key validation by making a test request to determine subscription tier before any data operations
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Unvalidated API key causes operations to fail mid-execution with cryptic errors instead of failing fast at
      initialization
    stage_ids:
    - discovery
  - id: finance-C-161
    when: When handling subscription tier detection for Discovery operations
    action: cache the subscription plan detection result to avoid redundant API validation calls
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Repeated subscription detection wastes API quota (critical for Free tier) and adds unnecessary latency to
      each request
    stage_ids:
    - discovery
  - id: finance-C-162
    when: When presenting stock screener results to users
    action: claim that screener results are complete when they exceed 1000 companies limit
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Incomplete results lead users to make investment decisions based on a partial dataset, potentially excluding
      relevant securities
    stage_ids:
    - discovery
  - id: finance-C-163
    when: When using Discovery module data for investment decisions
    action: assume discovery search results represent real-time market availability of securities
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Stale or delayed data from FMP API leads to trading decisions based on outdated information, potentially
      at unfavorable prices
    stage_ids:
    - discovery
  - id: finance-C-164
    when: When ISIN to ticker conversion returns a symbol
    action: assume the converted ticker is currently traded or has available financial data in FMP
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Delisted or inactive securities may return valid ticker symbols from Yahoo Finance but have no current data
      in FMP
    stage_ids:
    - discovery
  - id: finance-C-165
    when: When implementing security search functionality
    action: assume search queries are case-sensitive as FMP API handles normalization internally
    severity: low
    kind: domain_rule
    modality: must_not
    consequence: Case-sensitive comparisons waste processing and create unnecessary code complexity without improving search
      accuracy
    stage_ids:
    - discovery
  - id: finance-C-169
    when: When processing OAS data from FRED
    action: multiply OAS values by 100 to convert from percentage to basis points
    severity: high
    kind: domain_rule
    modality: must
    consequence: OAS spreads will be reported 100x smaller than industry standard, causing mispricing of credit risk and incorrect
      relative value analysis
    stage_ids:
    - fixed_income
  - id: finance-C-170
    when: When processing yield data from FRED
    action: divide yield values by 100 to convert from percentage to decimal representation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Yield rates will be 100x larger than correct values, causing all bond calculations to fail and produce nonsensical
      results
    stage_ids:
    - fixed_income
  - id: finance-C-171
    when: When validating start_date and end_date parameters
    action: validate date format matches YYYY-MM-DD pattern and start_date precedes end_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid date inputs will cause data retrieval failures or return empty datasets, breaking downstream bond
      analysis workflows
    stage_ids:
    - fixed_income
  - id: finance-C-172
    when: When fetching data from FRED API
    action: exceed 60-second timeout or skip HTTP error handling
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Network timeouts will crash the application without graceful error handling, preventing users from accessing
      critical fixed income data
    stage_ids:
    - fixed_income
  - id: finance-C-173
    when: When performing YTM numerical root-finding
    action: limit iterations to 100 and check convergence tolerance of 0.0001 before returning result
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Non-converging bonds will cause CPU-spinning infinite loops, freezing the application during batch bond analysis
    stage_ids:
    - fixed_income
  - id: finance-C-174
    when: When handling missing values in FRED data
    action: replace '.' placeholder values with np.nan before converting to float
    severity: high
    kind: domain_rule
    modality: must
    consequence: Placeholder values will propagate through calculations as literal strings, corrupting all downstream bond
      statistics and yields
    stage_ids:
    - fixed_income
  - id: finance-C-175
    when: When interpolating ECB time series data
    action: use inside-only interpolation to avoid extrapolating beyond available data
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Extrapolated values will introduce fabricated interest rate data, causing incorrect risk-free rate assumptions
      for bond pricing
    stage_ids:
    - fixed_income
  - id: finance-C-176
    when: When specifying Euribor maturity parameters
    action: use only valid maturity codes from the set {1M, 3M, 6M, 1Y}
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid maturity codes will cause API errors or return incorrect tenor data, breaking interest rate curve
      construction
    stage_ids:
    - fixed_income
  - id: finance-C-177
    when: When configuring derivative pricing model
    action: use only 'black' or 'bachelier' model names, case-insensitive
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid model names will raise ValueError, breaking swaption and interest rate derivative valuation workflows
    stage_ids:
    - fixed_income
  - id: finance-C-178
    when: When configuring duration type parameter
    action: use valid duration type from {macaulay, modified, effective, dollar}, case-insensitive
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid duration type will raise ValueError, preventing bond sensitivity analysis and interest rate risk
      management
    stage_ids:
    - fixed_income
  - id: finance-C-179
    when: When calculating effective duration
    action: price the bond at both initial yield and yield plus yield_change to compute price sensitivity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Effective duration will be zero or undefined without pricing at perturbed yields, losing ability to measure
      embedded option risk
    stage_ids:
    - fixed_income
  - id: finance-C-180
    when: When configuring Federal Reserve rate type
    action: use valid rate codes from {EFFR, OBFR, TGCR, BGCR, SOFR}, case-insensitive
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid rate codes will raise ValueError, preventing access to critical overnight financing rate data for
      risk-free rate benchmarks
    stage_ids:
    - fixed_income
  - id: finance-C-181
    when: When configuring ECB rate parameter
    action: use valid ECB rate names from {refinancing, lending, deposit} or None for each rates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid ECB rate names will raise ValueError, preventing access to European central bank policy rates for
      bond valuation
    stage_ids:
    - fixed_income
  - id: finance-C-182
    when: When the YTM secant method fails to converge within max_iterations
    action: return np.nan instead of an invalid approximate value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-converged YTM values will propagate through portfolio analysis, causing incorrect expected returns and
      misallocated capital
    stage_ids:
    - fixed_income
  - id: finance-C-183
    when: When OAS calculation is used to evaluate callable bonds
    action: claim OAS fully isolates credit risk from interest rate risk without acknowledging embedded option impact
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: OAS methodology as implemented separates interest rate risk via Treasury curve but the resulting spread still
      contains compensation for liquidity, market risk, and model uncertainty
    stage_ids:
    - fixed_income
  - id: finance-C-184
    when: When presenting duration calculations to end users
    action: claim duration provides exact price change prediction without acknowledging convexity adjustment
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Duration-based price estimates are linear approximations; large yield changes require convexity adjustment
      for accuracy, and the toolkit also provides convexity metrics
    stage_ids:
    - fixed_income
  - id: finance-C-185
    when: When accessing OAS data via get_ice_bofa_option_adjusted_spread
    action: expect real-time or intraday OAS data since FRED publishes with delays
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: FRED data updates are delayed; users requiring real-time OAS for live trading will receive stale spreads
      that do not reflect current market conditions
    stage_ids:
    - fixed_income
  - id: finance-C-186
    when: When performing derivative pricing with Black or Bachelier models
    action: use model-implied prices as actual market quotes without volatility surface calibration
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Black/Bachelier models require calibrated volatility inputs; using default or static volatility produces
      theoretical values not matching traded swaption prices
    stage_ids:
    - fixed_income
  - id: finance-C-187
    when: When initializing the FixedIncome controller
    action: import and orchestrate bond_model, fred_model, ecb_model, euribor_model, fed_model, and derivative_model modules
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper module orchestration, users cannot access bond pricing, central bank rates, and derivative
      valuation through the unified controller interface
    stage_ids:
    - fixed_income
  - id: finance-C-188
    when: When applying the @handle_errors decorator to FRED data methods
    action: wrap data fetching methods to catch KeyError, ValueError, AttributeError, ZeroDivisionError, and IndexError
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unhandled exceptions in data retrieval will crash the application instead of gracefully returning empty series
      with error logging
    stage_ids:
    - fixed_income
  - id: finance-C-189
    when: When handling empty government bond yield data from OECD
    action: raise ValueError when no data is available for the selected period instead of returning empty DataFrame
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty data returned silently will cause downstream calculations to fail with cryptic errors or produce invalid
      results
    stage_ids:
    - fixed_income
  - id: finance-C-190
    when: When calculating DV01
    action: use symmetric yield changes of exactly 1 basis point (0.0001) in both directions
    severity: high
    kind: domain_rule
    modality: must
    consequence: DV01 will be incorrectly computed without symmetric basis point shocks, producing wrong hedge ratios and
      P&L predictions
    stage_ids:
    - fixed_income
  - id: finance-C-191
    when: When initializing Economics with date parameters
    action: provide dates in YYYY-MM-DD format with start_date before end_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid date format causes ValueError and prevents economic data retrieval, resulting in incomplete macroeconomic
      analysis
    stage_ids:
    - economics
  - id: finance-C-192
    when: When requesting period-based economic indicators
    action: specify period as 'monthly', 'quarterly', or 'yearly' only
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid period parameter causes ValueError, preventing unemployment, interest rate, and other periodic indicator
      retrieval
    stage_ids:
    - economics
  - id: finance-C-193
    when: When requesting inflation-adjusted GDP
    action: expect OECD source to provide real GDP data directly
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: OECD does not provide inflation-adjusted GDP, so expecting it from OECD results in incorrect nominal GDP
      being used instead of real GDP with deflation
    stage_ids:
    - economics
  - id: finance-C-194
    when: When specifying gender parameter for population data
    action: use 'men' or 'women' as valid gender values
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Invalid gender parameter causes ValueError, preventing population demographic data retrieval
    stage_ids:
    - economics
  - id: finance-C-195
    when: When accessing OECD API for economic data
    action: expect response within 300 seconds (5 minutes)
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: OECD API request timeout of 300 seconds may cause requests to fail during network congestion, resulting in
      incomplete economic data retrieval
    stage_ids:
    - economics
  - id: finance-C-196
    when: When initializing Economics without start_date
    action: expect default 100-year lookback period for historical comparisons
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Default 100-year lookback ensures historical comparisons work but may include outdated economic data if user
      needs only recent periods
    stage_ids:
    - economics
  - id: finance-C-197
    when: When requesting GDP data from OECD
    action: expect GDP data to be per-capita values
    severity: high
    kind: resource_boundary
    modality: must
    consequence: OECD GDP data is per-capita (divided by population), not total GDP, which can cause significant misinterpretation
      in economic analysis
    stage_ids:
    - economics
  - id: finance-C-198
    when: When using GMDB source for economic data
    action: expect data frequency to be yearly only
    severity: high
    kind: resource_boundary
    modality: must
    consequence: GMDB provides only annual data (freq='Y'), so quarterly analysis requires using OECD source instead
    stage_ids:
    - economics
  - id: finance-C-199
    when: When requesting inflation-adjusted economic data
    action: use GMDB source since OECD only provides nominal values
    severity: high
    kind: operational_lesson
    modality: must
    consequence: OECD provides only nominal GDP, requiring separate GMDB source for inflation-adjusted (real) GDP, causing
      analysis errors if wrong source is used
    stage_ids:
    - economics
  - id: finance-C-200
    when: When analyzing GDP growth with lag parameter
    action: specify lag >= 1 for correct temporal alignment
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Lag parameter must be >= 1 to calculate period-over-period growth correctly, preventing division errors
    stage_ids:
    - economics
  - id: finance-C-201
    when: When requesting economic indicators for specific countries
    action: use OECD country codes that exist in CODE_TO_COUNTRY mapping
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Country codes not in CODE_TO_COUNTRY mapping result in missing or unnamed columns in returned DataFrame
    stage_ids:
    - economics
  - id: finance-C-202
    when: When retrieving GMDB economic data
    action: handle NaN values that occur for countries/years with missing data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: GMDB dataset contains NaN values for countries and years without available data, requiring filtering to avoid
      misleading analysis
    stage_ids:
    - economics
  - id: finance-C-203
    when: When combining quarterly and yearly economic data
    action: mix quarterly and yearly period indices without conversion
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: OECD quarterly data uses 'Q' period index while GMDB uses 'Y' yearly index; mixing without conversion causes
      temporal misalignment
    stage_ids:
    - economics
  - id: finance-C-204
    when: When claiming real-time capabilities for economic data
    action: claim economic data is available in real-time
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: OECD and GMDB economic indicators are released with significant delays (quarters/years), not real-time, so
      claiming real-time support misleads users about data freshness
    stage_ids:
    - economics
  - id: finance-C-205
    when: When presenting GMDB economic data coverage
    action: claim universal country coverage for each years
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: GMDB has incomplete coverage for many countries and years, with NaN values appearing frequently; presenting
      as complete coverage misleads users about data availability
    stage_ids:
    - economics
  - id: finance-C-206
    when: When comparing economic data across data sources
    action: directly compare OECD nominal GDP with GMDB real GDP without adjustment
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: OECD provides per-capita nominal GDP while GMDB provides total real GDP; direct comparison without conversion
      produces incorrect economic conclusions
    stage_ids:
    - economics
  - id: finance-C-207
    when: When dividing economic rate values by 100
    action: divide percentage-based indicators (unemployment, interest rates, CPI) by 100 for decimal representation
    severity: high
    kind: domain_rule
    modality: must
    consequence: OECD returns rates as percentages (e.g., 5.5 for 5.5%) but users expect decimal form (0.055); failing to
      divide produces values 100x larger than expected
    stage_ids:
    - economics
  - id: finance-C-210
    when: When implementing portfolio data conversion
    action: enforce currency codes to be exactly 3 letters in length
    severity: high
    kind: domain_rule
    modality: must
    consequence: Currency conversion and display fails when non-3-letter currency codes are provided, causing incorrect monetary
      value aggregation across international portfolios
    stage_ids:
    - portfolio_management
  - id: finance-C-214
    when: When implementing transaction current value calculation
    action: set current value to np.nan for positions with zero or negative volume
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sold positions display misleading current values, causing portfolio overview to show phantom holdings and
      distort total portfolio value calculations
    stage_ids:
    - portfolio_management
  - id: finance-C-216
    when: When implementing portfolio toolkits integration
    action: claim real-time trading capability for the portfolio module
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users may attempt to use the toolkit for live trading decisions based on delayed historical data, leading
      to financial losses due to stale price information
    stage_ids:
    - portfolio_management
  - id: finance-C-222
    when: When implementing numeric string parsing
    action: handle locale-specific decimal separators (dot for thousands, comma for decimals or vice versa)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Portfolio transaction values are incorrectly parsed when CSV files use European decimal formatting, causing
      silent data corruption in return calculations
    stage_ids:
    - portfolio_management
  - id: finance-C-223
    when: When implementing volatility calculations
    action: annualize volatility by multiplying daily volatility by sqrt(252) trading days
    severity: high
    kind: domain_rule
    modality: must
    consequence: Volatility metrics are understated when not annualized, causing incorrect risk assessments and improper benchmark
      comparisons
    stage_ids:
    - portfolio_management
  - id: finance-C-224
    when: When implementing portfolio weight calculation
    action: calculate asset weight as Latest Value divided by sum of each Latest Values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Portfolio allocation percentages do not sum to 100% when incorrect normalization is used, causing misleading
      diversification recommendations
    stage_ids:
    - portfolio_management
  - id: finance-C-225
    when: When implementing transaction data parsing
    action: skip transaction validation when portfolio_dataset is None without providing example
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Portfolio initialization fails silently when no dataset and no example flag are provided, leaving users with
      empty portfolios and no clear error message
    stage_ids:
    - portfolio_management
  - id: finance-C-226
    when: When implementing sold position filtering
    action: exclude zero-volume positions from portfolio overview by default
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Portfolio overview displays phantom holdings for fully sold positions, distorting historical performance
      analysis and allocation calculations
    stage_ids:
    - portfolio_management
  - id: finance-C-227
    when: When normalizing raw financial statements from data_acquisition
    action: Convert date columns to pd.PeriodIndex with frequency 'Y' (yearly) or 'Q' (quarterly) as specified by the quarterly
      flag
    severity: high
    kind: domain_rule
    modality: must
    consequence: Financial ratios requiring aligned time periods will compute incorrect values, causing fundamentally wrong
      investment recommendations based on misaligned balance sheet and income statement periods
  - id: finance-C-228
    when: When converting financial statement data to float64
    action: Verify each financial statement values can be converted to float64 without ValueError
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ratios will silently produce NaN values for non-numeric fields, leading to missing profitability metrics
      and incorrect financial analysis results
  - id: finance-C-229
    when: When passing normalized financial statements to ratio_calculation
    action: Verify each three statements (balance, income, cash) have matching ticker indices and period columns
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cross-statement ratios like ROIC (requiring both income and balance sheet data) will fail or produce misleading
      results due to index misalignment
  - id: finance-C-230
    when: When passing historical price data for valuation ratio calculation
    action: Pass price data with 'Adj Close' column as the primary price reference for P/E, P/B, and EPS calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Valuation ratios will be calculated using split-unadjusted prices, causing artificially high P/E ratios for
      stocks with repeated splits
  - id: finance-C-231
    when: When converting daily historical data to other periods for performance analysis
    action: Calculate period returns using (current_period_close / previous_period_close) - 1 with proper shift alignment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Performance metrics like Sharpe Ratio will use incorrect period returns, leading to misaligned risk-adjusted
      return calculations
  - id: finance-C-232
    when: When passing Treasury yields to fixed_income analysis
    action: Use US Treasury yields (13w, 5y, 10y, 30y) from FRED as the risk-free rate, not interpolated or estimated rates
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Bond pricing and WACC calculations using incorrect risk-free rates will misvalue fixed income instruments
      and cost of capital estimates
    stage_ids:
    - performance_analysis
  - id: finance-C-233
    when: When data_acquisition retrieves FMP data but FMP plan is Free
    action: Bypass FMP data for non-US tickers or switch to Yahoo Finance automatically
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Financial analysis will use empty datasets for international tickers, producing meaningless ratios and models
  - id: finance-C-234
    when: When risk_free_rate data is empty during performance analysis
    action: Gracefully handle empty risk_free_rate by setting Excess Return and Excess Volatility to 0
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Sharpe Ratio and Sortino Ratio will silently compute without risk-free rate adjustment, overstating risk-adjusted
      returns
  - id: finance-C-235
    when: When calculating daily returns from historical prices for VaR analysis
    action: Use pct_change() on Adj Close prices with forward-fill (ffill) before calculation to handle missing values
    severity: high
    kind: domain_rule
    modality: must
    consequence: VaR calculations will produce NaN values for days with missing price data, corrupting tail risk measurements
  - id: finance-C-236
    when: When intraday period is specified for technical analysis
    action: Validate intraday_period is one of '1min', '5min', '15min', '30min', '1hour' before data retrieval
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Technical indicator calculations will fail with ValueError for invalid intraday periods, breaking automated
      trading signal generation
    stage_ids:
    - technical_analysis
  - id: finance-C-237
    when: When passing CAPM betas from performance_analysis to modeling for WACC
    action: Verify beta values are computed against the same benchmark ticker specified in the Toolkit initialization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: WACC calculations using inconsistent betas will produce wrong cost of equity, leading to incorrect DCF valuations
      and investment decisions
  - id: finance-C-238
    when: When passing profitability and solvency ratios to Altman Z-score or Piotroski F-score
    action: Verify ratios are computed with consistent period alignment (each quarterly or each yearly) before scoring models
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Credit risk scores will be incorrectly computed mixing quarterly and annual data, giving false bankruptcy
      probability signals
  - id: finance-C-239
    when: When passing dividend yields and volatility to options pricing
    action: Pass annual historical data with 'Dividends' column for dividend yield and 'Volatility' for implied volatility
      estimation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Black-Scholes and Greeks calculations using zero dividend yield will overprice call options, causing systematic
      overpayment for dividend-paying stocks
  - id: finance-C-240
    when: When discovery module returns ticker symbols to data_acquisition
    action: Convert ISIN codes to ticker symbols via Yahoo Finance search before passing to data retrieval
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Data retrieval will fail for ISIN-format identifiers, preventing portfolio analysis for users with ISIN-based
      holdings
  - id: finance-C-241
    when: When portfolio positions are converted to tickers for historical data collection
    action: Deduplicate ticker list and remove the benchmark ticker to avoid double-counting in portfolio analysis
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Portfolio returns will be double-counted for benchmark tickers included in user positions, inflating portfolio
      performance metrics
  - id: finance-C-242
    when: When GDP and CPI data are passed to economics analysis
    action: Use OECD-sourced data as primary source, with GMDB fallback only for inflation-adjusted GDP
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Macroeconomic analysis will use inconsistent data sources, causing conflicting signals when comparing GDP
      growth rates across countries
  - id: finance-C-243
    when: When technical analysis requires daily OHLCV data at various timeframes
    action: Support multiple timeframes (intraday, daily, weekly, monthly, quarterly, yearly) with consistent column naming
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Technical indicators like RSI and MACD will fail or produce wrong signals when timeframe conversion produces
      inconsistent column names
  - id: finance-C-244
    when: When the Toolkit initializes with both FMP API key and custom datasets
    action: Prioritize custom datasets (balance, income, cash) over API-retrieved data when both are provided
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Financial analysis will silently use API data instead of user-provided custom datasets, undermining the purpose
      of custom dataset support
  - id: finance-C-246
    when: When the toolkit retrieves data from Yahoo Finance
    action: Claim that Yahoo Finance data is real-time without specifying the 15-minute delay
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Intraday trading strategies will execute on stale prices, resulting in filled orders at significantly different
      prices than expected
  - id: finance-C-247
    when: When using Financial Modeling Prep as the sole data source
    action: Claim that FMP Free plan provides full historical coverage without specifying limits
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Analysis will produce incomplete results for non-US tickers without clear indication of data gaps
  - id: finance-C-248
    when: When FMP API returns rate limit errors
    action: Automatically switch to Yahoo Finance as fallback data source
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Analysis will fail completely without data when FMP rate limits are hit, preventing automated reporting workflows
  - id: finance-C-249
    when: When Portfolio module calculates weighted averages for aggregated metrics
    action: Exclude 'Benchmark' ticker from weighted average calculations to prevent benchmark contamination
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Portfolio-level metrics will be artificially influenced by benchmark performance, misrepresenting actual
      portfolio alpha
  - id: finance-C-250
    when: When calculating volatility for options pricing
    action: Annualize daily volatility by multiplying with sqrt(252) trading days
    severity: high
    kind: domain_rule
    modality: must
    consequence: Black-Scholes option pricing will use incorrect implied volatility input, causing systematic mispricing of
      options contracts
  - id: finance-C-251
    when: When date validation is performed during Toolkit initialization
    action: Enforce YYYY-MM-DD format for start_date and end_date with regex validation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Invalid date formats will cause cryptic errors during data retrieval or filtering, requiring extensive debugging
  - id: finance-C-252
    when: When NaN values exist in historical price data
    action: Use interpolate(limit_area='inside') to fill NaN values without extrapolating beyond available data
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Price-based calculations will produce incorrect cumulative returns when NaN values are forward-filled beyond
      data boundaries
  - id: finance-C-254
    when: When a developer thinks RuntimeWarning suppression is unnecessary
    action: Remove warnings.filterwarnings('ignore', category=RuntimeWarning) from controller files
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Financial calculations will throw distracting RuntimeWarnings for expected division-by-zero scenarios (e.g.,
      zero revenue), breaking automated workflows
  - id: finance-C-256
    when: When processing financial statements for quarterly and yearly data
    action: Index period data by pd.Period using YYYY-Q or YYYY-MM format to verify consistent temporal granularity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent date indexing would break cross-ticker comparisons and temporal aggregations, causing incorrect
      ratio calculations
  - id: finance-C-257
    when: When handling missing or invalid financial data in any calculation
    action: Return pd.Series(dtype='object') instead of raising exceptions for graceful degradation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Raising exceptions would crash batch processing pipelines when a single ticker has data issues, preventing
      analysis of remaining tickers
  - id: finance-C-258
    when: When normalizing ticker inputs at Toolkit initialization
    action: Convert ticker inputs to uppercase list with duplicates removed before any data operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Case-sensitive or duplicate tickers would cause duplicate API calls, wasted rate limits, and potential incorrect
      data associations
  - id: finance-C-259
    when: When configuring benchmark ticker for comparative analysis
    action: Exclude benchmark ticker from main ticker list to prevent data duplication and incorrect calculations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Including benchmark in ticker list would cause duplicate data, inflated portfolio weights, and incorrect
      CAPM/Alpha/Beta calculations
  - id: finance-C-260
    when: When calculating within-period risk metrics like quarterly VaR
    action: Use MultiIndex with MULTI_PERIOD_INDEX_LEVELS=2 to enable period-day hierarchical calculations
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without MultiIndex structure, within-period risk aggregation would be impossible, breaking VaR and drawdown
      calculations for sub-periods
  - id: finance-C-261
    when: When performing financial calculations that legitimately produce inf/nan values
    action: Suppress RuntimeWarnings globally since division by zero and similar errors are expected in financial analysis
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unsuppressed warnings would flood console output during legitimate calculations like P/E with negative earnings,
      making output unusable
  - id: finance-C-262
    when: When converting ISIN codes to ticker symbols for international securities
    action: Detect ISIN format via regex '^([A-Z]{2})([A-Z0-9]{9})([0-9])$' and query Yahoo Finance for ticker lookup
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Invalid ISIN format without regex validation would cause malformed API queries and incorrect ticker resolution
  - id: finance-C-263
    when: When initializing the Toolkit with an API key
    action: Detect API plan at initialization to configure sleep_timer and data access decisions without repeated API calls
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Repeated plan detection would waste API rate limits and cause unnecessary delays during data collection
  - id: finance-C-264
    when: When calculating growth rates on sparse quarterly financial data
    action: Apply forward-fill (ffill) after pct_change to verify continuous series on sparse quarterly data
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without ffill, sparse quarterly data with NaN gaps would produce misleading growth calculations showing false
      zero changes
  - id: finance-C-265
    when: When annualizing volatility across options, technicals, and portfolio modules
    action: Use std * sqrt(252) for consistent annualization based on trading days per year
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent annualization factors would produce incomparable volatility metrics across different modules
      and incorrect risk assessments
  - id: finance-C-266
    when: When collecting metrics for a portfolio with multiple tickers
    action: Add weighted Portfolio row/column via @handle_portfolio decorator to each metrics result including ratios, technicals,
      and risk
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing portfolio aggregation would prevent users from comparing portfolio-level metrics against individual
      holdings
  - id: finance-C-267
    when: When defaulting days parameter for period-based calculations
    action: Use 365/4 (91.25) for quarterly calculations and 365 for yearly to verify correct annualization
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Incorrect day counts would produce wrong annualized returns and misaligned period comparisons
  - id: finance-C-268
    when: When returning numeric results from any calculation module
    action: Apply rounding to 4 decimal places as default to verify consistent numeric precision across each outputs
    severity: low
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent precision would make cross-module comparisons difficult and create readability issues in large
      DataFrames
  - id: finance-C-269
    when: When collecting data for multiple tickers in parallel
    action: Use threading worker pattern with 0.1s sleep between requests to respect API rate limits
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without rate limiting, parallel requests would trigger API rate limits, causing request failures and data
      collection interruptions
  - id: finance-C-270
    when: When using FinancialModelingPrep Free plan
    action: Claim real-time data capability, historical data beyond 5 years, or non-US equity coverage
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Users relying on Free plan limitations would make incorrect assumptions about data availability and analytical
      capabilities
  - id: finance-C-271
    when: When retrieving historical data from Yahoo Finance
    action: Claim Yahoo Finance data is real-time — it has approximately 15-minute delay for most instruments
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Users expecting real-time data would make trading decisions based on stale prices, leading to incorrect entry/exit
      points
  - id: finance-C-272
    when: When presenting or reporting this system's calculated financial metrics
    action: Claim that historical analysis equals expected live trading performance — metrics are mathematical calculations
      on historical data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users making capital allocation decisions based on historical metrics would face severe underperformance
      due to execution slippage, market impact, and changing market regimes
  - id: finance-C-273
    when: When using FinanceToolkit for investment decision-making
    action: Claim the system is suitable for real-time trading systems, high-frequency trading, or production automated trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users building live trading systems would experience data latency issues, lack of order execution capabilities,
      and potential regulatory violations
  - id: finance-C-274
    when: When relying on external data sources for financial analysis
    action: Claim the FinanceToolkit is responsible for data accuracy — it only provides access to data from FinancialModelingPrep
      and Yahoo Finance
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users blaming the toolkit for data inaccuracies would misallocate support requests and miss opportunities
      to correct data issues at the source
  - id: finance-C-275
    when: When processing ticker lists exceeding TICKER_LIMIT
    action: Expect consistent performance with large ticker batches — system is optimized for batches up to 20 tickers
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Large ticker batches would cause excessive API calls, potential rate limiting, memory issues, and extended
      processing times
  - id: finance-C-276
    when: When encountering API rate limit errors with Premium FMP plan
    action: Enable sleep_timer to automatically retry requests after 5 second delays up to RETRY_LIMIT=12 attempts
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without retry logic, rate-limited requests would fail silently, causing incomplete data collection and analysis
      gaps
  - id: finance-C-277
    when: When converting fiscal year company data to calendar year
    action: Reindex fiscal quarter data to align with calendar quarter for consistent cross-company comparison
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without fiscal-to-calendar conversion, companies with different fiscal years would show non-comparable quarterly
      metrics
  - id: finance-C-278
    when: When using the framework's default rounding parameter for financial ratio and model outputs
    action: Verify that 4 decimal places matches the precision requirements for your analysis; for regulatory reporting, explicitly
      set the rounding parameter to the required precision instead of relying on the default
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 4-decimal precision may introduce rounding errors that accumulate in regulatory filings where exact
      values are required, leading to compliance issues or audit failures
    derived_from_bd_id: BD-029
  - id: finance-C-279
    when: When calculating maximum drawdown for portfolio risk assessment
    action: Calculate maximum drawdown as the largest peak-to-trough decline within the analysis period; measure from any
      local maximum to any subsequent local minimum
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using average drawdown or time-under-water instead of peak-to-trough understates maximum losses and leads
      to inadequate risk management decisions, potentially causing significant capital losses in volatile markets
    derived_from_bd_id: BD-075
  - id: finance-C-280
    when: When calculating multi-period risk metrics such as quarterly VaR using MULTI_PERIOD_INDEX_LEVELS
    action: Verify that MULTI_PERIOD_INDEX_LEVELS configuration aligns with your reporting period requirements; the default
      index levels may not match your specific quarterly or annual reporting needs
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using incorrect multi-period index levels produces risk metrics that don't align with actual reporting periods,
      leading to misaligned risk assessments and potential compliance failures in regulatory submissions
    derived_from_bd_id: BD-010
  - id: finance-C-281
    when: When pricing options using Black-Scholes model with continuous dividend yield
    action: Verify that historical dividend yield data is complete and accurate; verify dividend data covers the full historical
      period with no gaps before using for Black-Scholes continuous dividend yield input
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incomplete or inaccurate historical dividend data leads to incorrect continuous dividend yield estimates,
      causing systematic mispricing of options that can result in significant trading losses when the model is used for live
      option pricing
    derived_from_bd_id: BD-016
  - id: finance-C-282
    when: When evaluating callable bonds and structured fixed income instruments for credit risk analysis
    action: Use Option-Adjusted Spread (OAS) methodology to isolate credit risk from interest rate risk; do not use simple
      Z-spread for callable bonds as it conflates the two risk components and overstates the true credit spread
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Z-spread instead of OAS for callable bonds incorrectly values embedded options as credit spread, leading
      to systematic overvaluation and poor investment decisions on callable bond portfolios
    derived_from_bd_id: BD-020
  - id: finance-C-283
    when: When calculating Piotroski F-score for financial health and bankruptcy prediction assessment
    action: Apply binary thresholds (0/1) for each of the 9 Piotroski criteria; each criterion must be evaluated as discrete
      pass/fail, not continuous scoring with fractional values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using continuous thresholds instead of binary pass/fail alters the F-score distribution and changes the fundamental
      bankruptcy prediction model calibration, reducing its effectiveness as a financial health indicator
    derived_from_bd_id: BD-017
  - id: finance-C-284
    when: When implementing effective yield calculations in bond or fixed income analysis
    action: Use continuous compounding approximation for yield equivalence calculations to verify mathematically consistent
      yield comparisons across different compounding frequencies
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using discrete compounding (e.g., semi-annual) introduces yield quote inconsistencies, causing portfolio
      optimization to select bonds with systematically miscalculated yields and leading to suboptimal allocation decisions
    derived_from_bd_id: BD-046
  - id: finance-C-285
    when: When calculating technical indicators using default framework settings
    action: Verify that 'Adj Close' column is being used for technical indicator calculations, especially for dividend-paying
      stocks where raw Close would misrepresent true return potential; use raw Close parameter only when explicitly required
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using raw Close for dividend-paying stocks causes indicators to reflect price-only movements, missing the
      dividend return component that accounts for 20-40% of total historical returns in many equity strategies
    derived_from_bd_id: BD-030
  - id: finance-C-286
    when: When using the @handle_portfolio decorator for portfolio-level aggregation
    action: Pass consistent weight parameters through each decorated method; any change to the aggregation formula requires
      updating each decorators, not just the calculation method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent weight parameter passing through the decorator pattern causes portfolio-level calculations to
      silently use incorrect weights, leading to misreported portfolio returns and risk metrics that diverge from actual performance
    derived_from_bd_id: BD-120
  - id: finance-C-287
    when: When using momentum or volatility indicators with default parameters in technical analysis
    action: Verify that the 14-period default window aligns with your strategy requirements; 14-period matches RSI convention
      but may introduce excess noise (7-period rejected) or sluggish response (28-period rejected)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default 14-period window without validation may produce indicators with suboptimal sensitivity for
      the specific trading strategy, leading to delayed signals or false signals that reduce strategy profitability
    derived_from_bd_id: BD-031
  - id: finance-C-288
    when: When calculating Value at Risk using Student-t distribution
    action: Verify sufficient observations are available for MLE estimation and monitor degrees of freedom parameter stability;
      degrees of freedom become unstable for very fat tails and may produce unreliable VaR estimates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unstable degrees of freedom estimation in Student-t VaR produces unreliable risk estimates, potentially underestimating
      tail risk during crises when accurate VaR is most critical
    derived_from_bd_id: BD-083
  - id: finance-C-289
    when: When calculating implied volatility using numerical optimization
    action: Verify convergence of scipy.optimize.minimize for implied volatility calculation; implement fallback or explicit
      error handling when the solver fails to converge
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Non-convergent scipy.optimize.minimize produces invalid implied volatility values that silently propagate
      through options pricing calculations, leading to incorrect strategy signals
    derived_from_bd_id: BD-015
  - id: finance-C-290
    when: When implementing or modifying calculation logic in the framework
    action: Place any calculation logic in controller files; each calculation logic must reside in Model files as pure functions
      to maintain testability and avoid implicit dependencies
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Placing calculation logic in controllers violates Controller-Model separation, breaking pure-function assumptions
      in models and reducing testability, leading to hidden bugs that are difficult to detect
    derived_from_bd_id: BD-121
  - id: finance-C-291
    when: When implementing annualized return calculation logic in performance measurement
    action: Use geometric mean ((1+r1)*(1+r2)*...*(1+rn))^(1/n) - 1 for annualized returns instead of arithmetic mean — geometric
      mean correctly accounts for compounding effects
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using arithmetic mean for annualized returns overstates compounding effects, causing backtest results to
      show higher returns than investors would actually experience due to volatility drag
    derived_from_bd_id: BD-053
  - id: finance-C-292
    when: When implementing maximum drawdown calculation for risk evaluation
    action: Calculate maximum drawdown as (cumulative / cummax - 1) taking the minimum — this measures peak-to-trough decline
      accurately
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect drawdown calculation either overstates or understates portfolio risk, leading to improper strategy
      selection based on misleading risk-adjusted return metrics
    derived_from_bd_id: BD-086
  - id: finance-C-293
    when: When implementing portfolio CSV/XLSX file parsing for transaction data
    action: 'Require exactly six columns: Date, Identifier, Currency, Volume, Price, Costs — reject files missing any required
      column with clear error message'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing required columns causes incomplete P&L calculations and performance attribution errors that silently
      propagate to downstream reports with no indication of data quality issues
    derived_from_bd_id: BD-055
  - id: finance-C-294
    when: When converting ISIN to ticker symbols for European and international securities
    action: Verify Yahoo Finance search API availability before ISIN conversion — implement fallback mechanism or explicit
      error handling for API failures
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: ISIN to ticker conversion without API availability check causes securities data acquisition failures, leaving
      international positions without price data and breaking portfolio-level calculations
    derived_from_bd_id: BD-019
  - id: finance-C-295
    when: When implementing risk-free rate inputs for options pricing and fixed income calculations
    action: Use authoritative central bank sources (FRED, ECB, Euribor) for risk-free rate data — validate rate source availability
      before calculations that depend on it
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-authoritative or stale risk-free rates introduces systematic pricing errors in options and bonds,
      causing strategies to execute at incorrect valuations with predictable losses
    derived_from_bd_id: BD-021
  - id: finance-C-296
    when: When implementing ticker ordering logic in data acquisition pipelines
    action: Use deterministic ticker ordering via reorder_tickers before any DataFrame operations — verify consistent column
      order across each runs
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-deterministic ticker ordering causes DataFrame column positions to vary between runs, breaking code that
      relies on specific column positions and causing unnecessary diffs in saved results that complicate debugging
    derived_from_bd_id: BD-135
  - id: finance-C-297
    when: When calculating WACC with market value weights for equity
    action: Verify debt input type consistency — if using book value for debt in WACC calculation, explicitly label the output
      as 'hybrid WACC' rather than market-weight WACC
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Mixing market-weight WACC labeling with book-value debt inputs produces internally inconsistent capital cost
      estimates, leading to incorrect investment decisions for companies with significant market-to-book value divergence
    derived_from_bd_id: BD-144
  - id: finance-C-299
    when: When instantiating portfolio Toolkit for historical data analysis
    action: 'Follow three-stage initialization sequence: (1) collect_historical data, (2) instantiate Toolkit, (3) normalize
      statements before ratio calculations — implement explicit stage tracking'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping initialization stages causes cascading failures where downstream calculations receive incomplete
      data, and users cannot diagnose which initialization step failed without deep module knowledge
    derived_from_bd_id: BD-143
  - id: finance-C-300
    when: When implementing or refactoring option Greeks calculation
    action: 'Use analytical Black-Scholes formulas: Delta via norm.cdf(d1) and Vega via norm.pdf(d1) * S * sqrt(T) — do not
      replace with finite difference numerical differentiation'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Numerical Greeks require small epsilon perturbations which introduce discretization noise; analytical Greeks
      provide exact instantaneous sensitivities for delta hedging without extra computation
    derived_from_bd_id: BD-078
  - id: finance-C-301
    when: When implementing option Greeks calculation
    action: Rely on analytical Greeks near expiration or at deep in-the-money boundaries where digital-like behavior emerges
      — use numerical methods for these edge cases
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Analytical Greeks become ill-defined near expiration with near-zero time value and at deep ITM boundaries
      where the cumulative distribution approaches a step function, causing hedging errors
    derived_from_bd_id: BD-078
  - id: finance-C-302
    when: When implementing Triangular Moving Average calculation
    action: 'Apply double smoothing: first compute SMA of period n, then compute SMA of that result — do not replace with
      single-pass smoothing algorithms like DEMA or EMA'
    severity: high
    kind: domain_rule
    modality: must
    consequence: DEMA and EMA provide faster response than Triangular MA, changing signal timing and lag characteristics;
      replacing the double smoothing invalidates the enhanced noise reduction property
    derived_from_bd_id: BD-089
  - id: finance-C-303
    when: When implementing Triangular Moving Average
    action: Use Triangular MA for short-term trading signals requiring fast response — double smoothing significantly increases
      lag beyond acceptable thresholds for intraday or scalping strategies
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: High lag means entry and exit signals fire too late, causing strategies to buy at peaks and sell at troughs,
      systematically reducing profit margins in fast-moving markets
    derived_from_bd_id: BD-089
  - id: finance-C-304
    when: When fitting AR(p) autoregressive models for time series forecasting
    action: 'Validate order selection p against sample size: verify p < len(series)/3 to prevent overfitting — use information
      criteria (AIC/BIC) for automatic selection'
    severity: high
    kind: domain_rule
    modality: must
    consequence: High p relative to sample size causes overfitting where the model learns noise rather than signal, producing
      forecasts that extrapolate historical noise patterns leading to large prediction errors
    derived_from_bd_id: BD-094
  - id: finance-C-305
    when: When fitting MA(q) moving average models via Maximum Likelihood
    action: Enforce invertibility constraints on MA coefficients during L-BFGS-B optimization — constrain parameter space
      to roots of characteristic polynomial lying outside unit circle
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-invertible MA models produce non-casual forecasts where future innovations depend on past residuals,
      making the model theoretically invalid and forecasts unstable
    derived_from_bd_id: BD-095
  - id: finance-C-306
    when: When processing model output DataFrames
    action: Return DataFrames with years as index and tickers as columns — do not restructure to multi-index panel format
      which breaks standard time-series operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Multi-index panel format requires different access patterns and breaks existing plotting functions and analytical
      operations that expect rows=time, columns=tickers layout
    derived_from_bd_id: BD-051
  - id: finance-C-307
    when: When performing DCF valuation without user-supplied growth rate
    action: Use Duff & Phelps (formerly KRM) as authoritative third-party growth rate source — do not substitute with analyst
      consensus (coverage gaps) or GDP growth (too macro)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using non-authoritative growth rates reduces valuation defensibility in professional settings and may produce
      systematically biased valuations
    derived_from_bd_id: BD-052
  - id: finance-C-308
    when: When calculating Sharpe ratio for risk-adjusted performance
    action: Use current treasury-derived risk-free rates — verify treasury data freshness is validated and stale rates trigger
      warning or use of user-supplied fallback
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Stale risk-free rates during interest rate changes cause Sharpe ratio to reflect outdated market conditions,
      making strategies appear more or less attractive than reality
    derived_from_bd_id: BD-054
  - id: finance-C-309
    when: When implementing Piotroski F-Score year-over-year comparison
    action: Use shift(1, axis=1) for period-over-period comparison — do not use shift(4) which compares to same quarter last
      year, fundamentally changing F-Score time window
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Using shift(4) for quarterly data compares Q1 2023 to Q1 2022 instead of Q4 2022, creating different signal:
      F-Score captures annual trends instead of quarter-over-quarter momentum changes'
    derived_from_bd_id: BD-128
  - id: finance-C-310
    when: When processing multi-period index detection
    action: Verify MULTI_PERIOD_INDEX_LEVELS constant matches actual DataFrame index structure — validate index.nlevels against
      this constant before applying multi-period calculation paths
    severity: high
    kind: domain_rule
    modality: must
    consequence: If MULTI_PERIOD_INDEX_LEVELS=2 but data has single-level index, beta and performance calculations use incorrect
      branching logic producing invalid metrics
    derived_from_bd_id: BD-132
  - id: finance-C-311
    when: When combining portfolio risk metrics with economic indicators for macro-adjusted risk assessment
    action: 'Explicitly document and validate the temporal horizon mismatch: 5yr lookback (ratios) × 100yr (economics) × 252-day
      (VaR) — flag when combining metrics spanning different historical regimes'
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Economic cycle analysis using century-long data references fundamentally different market regimes than single-year
      VaR; combining them produces risk estimates that reference contradictory historical contexts
    derived_from_bd_id: BD-140
  - id: finance-C-312
    when: When implementing macro-adjusted portfolio risk assessment
    action: Standardize temporal horizons across risk modules or add explicit regime labels to metrics — verify economic indicators
      and VaR metrics are mapped to consistent historical context before combining
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Fragmented temporal horizons cause risk estimates from different components to reference contradictory market
      regimes, leading to overconfident or inconsistent risk assessments
    derived_from_bd_id: BD-140
  - id: finance-C-313
    when: When implementing correlation analysis between financial time series
    action: Use Spearman rank correlation with rank transformation before Pearson formula for monotonic relationship analysis;
      do not replace with raw Pearson correlation without understanding the trade-off — Pearson captures linear relationships
      while Spearman captures monotonic relationships robust to outliers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing Spearman with Pearson correlation without justification changes the statistical interpretation
      of relationships, potentially leading to incorrect variable selection in factor models or strategy signals based on
      false linear assumptions
    derived_from_bd_id: BD-096
  - id: finance-C-314
    when: When pricing swaptions using mathematical models
    action: Use Bachelier model with normal distribution only when forward rates may be negative or in low-rate regimes; avoid
      using Bachelier in normal-rate environments where normal distribution underestimates tail risk
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using Bachelier model in normal-rate environments underestimates tail risk and produces systematically incorrect
      swaption prices, leading to valuation errors and potential hedging failures
    derived_from_bd_id: BD-098
  - id: finance-C-315
    when: When calculating intrinsic value using discounted cash flow analysis
    action: Use Gordon Growth model for terminal value only when company has stable, perpetual dividend growth; be aware that
      terminal value dominates total DCF value and small changes in growth rate or WACC cause large valuation swings
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying Gordon Growth to companies without stable growth patterns produces unreliable valuations dominated
      by terminal value sensitivity, leading to investment decisions based on mathematically unstable intrinsic value estimates
    derived_from_bd_id: BD-100
  - id: finance-C-317
    when: When calculating Debt-to-Equity ratios for leverage analysis
    action: Calculate Debt-to-Equity using total liabilities divided by total equity; be aware that operating leases and off-balance
      sheet items are not included and require manual adjustment for comprehensive leverage measurement
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using inconsistent debt definitions changes leverage interpretation, causing incorrect risk assessments and
      potentially leading to over-leveraged positions or missed investment opportunities based on misleading leverage ratios
    derived_from_bd_id: BD-061
  - id: finance-C-318
    when: When calculating intrinsic value using dividend discount models
    action: Use next expected dividend (forward-looking) as DDM input; be aware that historical dividend growth may not predict
      future dividends and requires explicit forecast input for theoretically correct valuation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using trailing twelve months dividends instead of forward-looking expected dividends misaligns DDM with present
      value of future cash flows principles, producing systematically incorrect valuations that misrepresent true equity worth
    derived_from_bd_id: BD-063
  - id: finance-C-319
    when: When selecting Value at Risk calculation methods for risk measurement
    action: 'Match VaR method to data profile: Historical VaR for regulatory compliance and fat tails, Parametric (variance-covariance)
      for normal market assumptions, Monte Carlo for complex distributions; understand that method selection impacts risk
      estimates significantly'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using an inappropriate VaR method for the given risk profile produces unreliable risk estimates, potentially
      leading to inadequate capital reserves against losses or excessive risk-taking based on falsely confident measurements
    derived_from_bd_id: BD-065
  - id: finance-C-321
    when: When calculating expected returns using CAPM for portfolio analysis
    action: Recognize that CAPM is a single-factor model using linear regression of asset returns on benchmark returns; verify
      the assumptions hold (investors hold market portfolio, no idiosyncratic risk, normal return distributions). For portfolios
      with significant idiosyncratic risk or non-normal returns, use multi-factor models instead
    severity: high
    kind: domain_rule
    modality: must
    consequence: CAPM's single-factor assumption causes expected return estimates to be systematically wrong for portfolios
      with significant alpha or factor exposures, leading to incorrect asset allocation decisions and underperformance against
      benchmarks
    derived_from_bd_id: BD-079
  - id: finance-C-322
    when: When implementing train/test data split logic in backtesting
    action: Assume the framework handles train/test time split integrity — the framework does not enforce temporal ordering
      of data splits; future data may leak into training sets
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without train/test time split integrity, future market information leaks into historical training data, causing
      look-ahead bias where backtested returns are artificially inflated compared to live trading
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-323
    when: When implementing data pipeline for backtesting or live trading
    action: Implement time-based data validation that ensures training data end_date < test data start_date, with explicit
      checks that no future timestamps exist in historical datasets
    severity: high
    kind: domain_rule
    modality: must
    consequence: Data leakage from future to past corrupts model training, producing overfitted models that perform well in
      backtesting but fail in live markets due to non-existent predictive patterns
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-324
    when: When implementing audit trail and event tracking for compliance
    action: Assume the framework provides immutable event logging — the framework does not implement append-only logging or
      tamper-evident event storage; events can be modified or deleted
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without immutable event logging, audit trails can be altered, causing regulatory compliance failures and
      inability to reconstruct historical decision sequences during investigations
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-325
    when: When implementing audit trail and event tracking for compliance
    action: Implement immutable event logging with append-only storage and cryptographic checksums or hash chaining to verify
      events cannot be modified or deleted after recording
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifiable event logs enable tampering with audit trails, causing regulatory violations during compliance
      audits and inability to prove system behavior at specific timestamps
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-326
    when: When implementing order tracking in backtesting or live trading
    action: Assume the framework implements an Order Lifecycle State Machine — the framework does not define explicit order
      states or validate state transitions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without a defined state machine, orders may be processed in invalid sequences (e.g., cancelling already-filled
      orders), causing incorrect position tracking and incorrect backtest equity curves
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-327
    when: When implementing order tracking in backtesting or live trading
    action: Define explicit state machine with valid states (pending, submitted, filled, partially_filled, cancelled, rejected)
      and validate state transitions before executing operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit state validation, invalid order operations (e.g., cancelling filled orders) cause position
      tracking errors that compound over time, producing unreliable backtest results
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-328
    when: When selecting stocks for A-share backtesting
    action: Assume the framework handles ST/*ST stock restrictions — ST (Special Treatment) and *ST (risk warning) stocks
      have trading restrictions including 5% price limits and mandatory disclosure requirements
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without ST/*ST handling, backtesting treats these special stocks as normal equities, misrepresenting execution
      feasibility since ST/*ST stocks have restricted price movements and mandatory trading conditions
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-329
    when: When implementing subscription tier enforcement and rate limiting
    action: Verify plan detection (BD-001), premium gating (BD-047), and sleep timer (BD-048) operate independently with explicit
      fallback mechanisms — if plan detection fails, default to most restrictive tier rather than propagating the failure
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cascading failures in the tier enforcement chain cause incorrect rate limiting (either too permissive or
      too restrictive) and data access violations, breaking both performance and compliance requirements simultaneously
    derived_from_bd_id: BD-138
  - id: finance-C-330
    when: When implementing multi-factor regression models
    action: Use OLS LinearRegression for Fama-French 5-factor model with the understanding that factors must be empirically
      validated for the specific market regime; factors may not persist across different market conditions
    severity: high
    kind: domain_rule
    modality: must
    consequence: OLS LinearRegression assumes linear factor relationships and stable coefficients; when market regime changes,
      factor loadings shift causing systematic misestimation of factor exposure
    derived_from_bd_id: BD-080
  - id: finance-C-331
    when: When using the Fama-French 5-factor model for factor analysis
    action: Verify factor persistence by performing rolling window stability tests or structural break tests; if factors have
      shifted (p < 0.05 for break test), recalibrate factor weights or switch to regime-switching models
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Factor instability causes OLS model to systematically misestimate factor loadings, leading to incorrect risk
      attribution and misallocated capital in factor-based strategies
    derived_from_bd_id: BD-080
  - id: finance-C-332
    when: When implementing Value at Risk calculations
    action: Use empirical percentile for historical VaR and Gaussian VaR with optional Cornish-Fisher expansion; empirical
      percentile requires sufficient lookback window, Gaussian underestimates tail risk for non-normal distributions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Gaussian VaR assumes normal distribution and systematically underestimates tail risk for fat-tailed return
      distributions common in financial markets
    derived_from_bd_id: BD-082
  - id: finance-C-333
    when: When calculating historical VaR using empirical percentile
    action: Verify distribution stationarity by checking if recent returns align with the lookback window distribution; perform
      Kolmogorov-Smirnov test and if p < 0.05, the distribution has shifted requiring window adjustment
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Non-stationary distributions cause historical VaR to misrepresent current tail risk, leading to insufficient
      capital reserves during market stress when VaR looks adequate
    derived_from_bd_id: BD-082
  - id: finance-C-334
    when: When calculating CVaR for risk management and regulatory reporting
    action: Validate CVaR stability by testing across multiple window lengths (e.g., 125, 250, 500 days) and checking coefficient
      of variation; if CVaR varies significantly (>20%), the estimate is unstable and should not be used for limit setting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Unstable CVaR estimates lead to incorrect risk capital allocation, causing either excessive capital holdback
      reducing returns or insufficient reserves leading to losses beyond expectations
    derived_from_bd_id: BD-084
  - id: finance-C-335
    when: When implementing volatility forecasting with GARCH models
    action: Use GARCH(1,1) with dual_annealing optimization recognizing that it assumes symmetric response to positive/negative
      shocks of equal magnitude; this assumption fails during market regime changes
    severity: high
    kind: domain_rule
    modality: must
    consequence: GARCH(1,1) assumes volatility responds symmetrically to positive and negative shocks; during market stress
      when negative shocks trigger higher volatility, this causes systematic underestimation
    derived_from_bd_id: BD-085
  - id: finance-C-336
    when: When forecasting volatility using GARCH(1,1) models
    action: Implement regime detection to identify market stress periods; if asymmetric volatility clustering is detected
      (e.g., via Engle's ARCH test), switch to asymmetric GARCH variants (EGARCH, GJR-GARCH) or add regime-switching
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Symmetric GARCH underestimates downside volatility during market stress, causing inadequate hedging and risk
      management that leads to larger-than-expected losses
    derived_from_bd_id: BD-085
  - id: finance-C-337
    when: When pricing swaptions using interest rate derivative models
    action: Use Black's model for swaption pricing with log-normal forward rate assumption; log-normal assumption breaks down
      when forward rates approach zero or become negative (post-2015 environment), requiring floor adjustments or alternative
      models
    severity: high
    kind: domain_rule
    modality: must
    consequence: Black's model assumes log-normal forward rates; when rates are near zero or negative, mathematical artifacts
      cause pricing errors and hedging ratio miscalculations
    derived_from_bd_id: BD-097
  - id: finance-C-338
    when: When pricing swaptions in low or negative rate environments
    action: Check if forward rates are approaching the zero lower bound (within 1% or negative); if so, switch to Bachelier
      model (normal distribution) which handles negative rates correctly, or apply rate floors before using Black's model
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using Black's model when rates are negative causes significant swaption mispricing, leading to hedging errors
      that produce material capital losses when positions are rebalanced
    derived_from_bd_id: BD-097
  - id: finance-C-339
    when: When implementing stock selection or backtesting logic for Chinese A-shares
    action: Assume the framework handles new stock (IPO) and secondary new stock (subsequent listing) trading restrictions
      — the framework does not implement new stock restriction logic; these stocks are treated as regular tradable assets
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest will incorrectly assume new stocks are freely tradeable from listing date, ignoring listing-day
      price limits, 5-day price limits, and lock-up periods for original shareholders
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-340
    when: When processing Chinese A-share stocks in backtesting
    action: 'Implement new stock filtering logic: exclude stocks within 20 trading days of IPO (IPO lock-up period) and mark
      stocks within 5 listing days as non-tradable due to price limit restrictions'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without filtering, momentum strategies will assume full execution at up-limit prices during new stock's explosive
      early sessions, making backtest results completely unreproducible in live trading
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-341
    when: When implementing index-based stock universe selection in backtesting
    action: Assume the framework handles index constituent adjustments — the framework does not implement index rebalancing
      logic; stocks are treated as static holdings based on historical composition
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest will include stocks that have been removed from the index (phantom holdings) and exclude newly added
      constituents, causing significant tracking error and incorrect performance attribution
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-342
    when: When implementing index-based stock universe selection
    action: 'Implement index rebalancing handling: maintain index constituent change history and adjust holdings on effective
      rebalancing dates (quarterly for major indices like CSI 300,沪深300)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without rebalancing, strategy will hold stocks that have been removed from index and miss new constituents,
      diverging from index performance and invalidating backtest results
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-343
    when: When implementing order execution logic in backtesting
    action: Assume the framework handles execution feasibility or liquidity constraints — the framework does not implement
      position size limits, ADV checks, or market impact models; each orders are treated as fully executable
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest will assume full position entry/exit regardless of market liquidity, leading to significant performance
      overestimation in illiquid stocks or large portfolio rebalancing scenarios
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-344
    when: When implementing order sizing in backtesting
    action: 'Implement liquidity constraints: check order_size <= 0.01 * ADV (average daily volume) as a threshold, reject
      or scale orders exceeding this limit to avoid market impact'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without liquidity constraints, strategies assume instantaneous execution at requested prices, significantly
      overestimating returns for high-turnover strategies in mid/small-cap stocks
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-345
    when: When implementing finite difference methods for option pricing
    action: Assume the framework handles finite difference grid stability — the framework does not implement grid parameter
      validation or stability checks; improper grids may produce oscillatory or divergent solutions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Improper grid parameters cause numerical oscillation or divergence in finite difference solutions, producing
      option prices that are physically impossible or exhibit wild swings near expiry
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-346
    when: When implementing finite difference option pricing models
    action: 'Validate grid parameters: verify S_max >= 3 * strike_price, dt <= (dS/S)^2 / sigma^2 (CFL stability condition),
      and verify convergence by comparing adjacent grid refinements'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without grid stability validation, finite difference solutions exhibit spurious oscillations or divergence,
      producing invalid option prices that would cause incorrect hedging decisions
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-347
    when: When implementing portfolio optimization or risk calculation requiring covariance matrices
    action: Assume the framework handles covariance estimator selection — the framework does not implement estimator choice
      logic; sample covariance is implicitly used without explicit configuration
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Sample covariance matrix may be singular or ill-conditioned for high-dimensional portfolios, causing portfolio
      optimization to fail or produce numerically unstable allocations
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-348
    when: When implementing portfolio optimization or risk calculations
    action: 'Explicitly specify covariance estimator: for n_assets > n_periods/2, use shrinkage estimator (Ledoit-Wolf) or
      robust estimator; validate matrix conditioning (minimum eigenvalue > 1e-10) before optimization'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit estimator selection, high-dimensional portfolios suffer from covariance matrix singularity,
      causing optimization failure or extreme concentrated allocations
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-349
    when: When calculating Entropic VaR for risk measurement
    action: Apply Entropic VaR to distributions with fat tails (leptokurtic returns, financial crisis periods) without warning
      — Gaussian assumption in EVaR underestimates tail risk for these distributions
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Gaussian-based EVaR systematically underestimates Value at Risk for fat-tailed assets, leading to insufficient
      capital reserves and potential losses exceeding risk limits
    derived_from_bd_id: BD-099
  - id: finance-C-350
    when: When calculating multi-period growth rates for financial analysis
    action: Check for trailing incomplete periods (last N periods with missing forward data) before applying forward-fill
      growth calculation; use geometric averaging for multi-period aggregation instead of arithmetic
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Forward-fill assumes continuity in missing periods, distorting growth calculations for companies with seasonal
      patterns or data reporting gaps, leading to incorrect performance attribution
    derived_from_bd_id: BD-102
  - id: finance-C-351
    when: When calculating implied volatility for deep in-the-money options
    action: Trust single-solution implied volatility output for deep ITM options without verification — multiple solutions
      exist in these regions causing potential misidentification of the correct volatility
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Implied volatility calculation may converge to incorrect local minimum for deep ITM options, producing volatility
      values far from market expectations and causing mispriced hedges
    derived_from_bd_id: BD-103
  - id: finance-C-352
    when: When using Stochastic Oscillator for high-volatility instruments
    action: Adjust overbought/oversold thresholds from default 80/20 when annualized volatility exceeds 50% — use 85/15 or
      90/10 to avoid whipsaw signals in high-volatility regimes
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default Stochastic Oscillator thresholds produce excessive whipsaw signals in high-volatility instruments,
      causing overtrading and transaction costs that erode strategy profitability
    derived_from_bd_id: BD-105
  - id: finance-C-353
    when: When calculating annualized volatility across options, technicals, and portfolio modules
    action: Annualize volatility using sqrt(252) — do not use calendar days (sqrt(365)) or custom trading day counts unless
      explicitly required by the specific regulatory jurisdiction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using calendar days for annualized volatility produces values ~20% higher than industry-standard 252 trading
      days, causing option prices to be mispriced and risk limits to be incorrectly calibrated
    derived_from_bd_id: BD-122
  - id: finance-C-354
    when: When fetching historical financial data without specifying enforce_source parameter
    action: Verify that FMP data coverage is complete for the tickers being analyzed — if FMP returns incomplete data for
      any ticker, explicitly set enforce_source='YahooFinance' to verify complete historical coverage
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: When FMP has missing data for a ticker and enforce_source is not set, the system uses incomplete FMP data
      without falling back to Yahoo Finance, causing NaN values in price series that propagate into incorrect calculations
    derived_from_bd_id: BD-125
  - id: finance-C-355
    when: When creating or processing transactions in the Portfolio module
    action: Use positive volume for buy orders and negative volume for sell orders — never pass sell orders with positive
      volume or buy orders with negative volume
    severity: high
    kind: domain_rule
    modality: must
    consequence: Violating the volume sign convention causes phantom holdings for sell orders and negative position amounts
      for buy orders, resulting in completely incorrect portfolio valuations and double-counted transactions
    derived_from_bd_id: BD-133
  - id: finance-C-356
    when: When managing cache files for financial statements
    action: Use standardized cache file naming conventions (balance_sheet_statement.pickle, income_statement.pickle, etc.)
      — do not rename cache file types without updating each code paths that load cached data
    severity: low
    kind: domain_rule
    modality: must
    consequence: Renaming cache file types without updating all loading code paths creates orphaned cache files that are never
      loaded, causing stale or missing data to be used in calculations without any error indication
    derived_from_bd_id: BD-136
  - id: finance-C-357
    when: When running portfolio analysis containing both equities and fixed income instruments
    action: Explicitly align frequency parameters across modules — set quarterly=False for equity analysis AND quarterly=True
      for fixed income analysis (or vice versa) to verify consistent data frequency, never rely on module defaults
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using inconsistent data frequencies across equity and fixed income modules causes ratio comparisons and cross-module
      analytics to mix annual and quarterly data, producing incorrect comparative metrics and misleading portfolio performance
      figures
    derived_from_bd_id: BD-137
  - id: finance-C-358
    when: When calculating OAS (Option-Adjusted Spread) for fixed income instruments with annual coupon payments using continuous
      compounding yield calculations
    action: Verify consistency of day count conventions across the OAS methodology, coupon frequency settings, and yield calculation
      methods — explicitly document which convention is used and avoid mixing annual discrete cash flows with continuous discounting
      without clear justification
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using mixed day count conventions produces OAS values that differ from both pure annual-compound and pure
      continuous models, causing incorrect bond relative value comparisons and potentially misleading trading decisions based
      on flawed spread analysis
    derived_from_bd_id: BD-141
  - id: finance-C-359
    when: When computing Sharpe ratio alongside options pricing calculations that may use fallback rate values
    action: Verify consistent risk-free rate assumptions across each portfolio calculations — use the same treasury-derived
      rate source for both performance metrics and derivatives pricing, and implement explicit warnings when rate fallback
      values diverge from treasury-based methodology
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Stale treasury data creates misaligned risk-adjusted return estimates when options pricing falls back to
      the fixed 5% default while Sharpe calculation uses real-time treasury rates, causing distorted portfolio performance
      evaluation and potentially inappropriate risk-adjusted positioning
    derived_from_bd_id: BD-142
  - id: finance-C-360
    when: When running DCF intrinsic value calculations that chain multiple growth-related assumptions together
    action: Document and verify consistency across each growth rate assumptions (Duff & Phelps terminal growth rate, Gordon
      Growth perpetuity formula, and forward dividend inputs) — explicitly calculate and report the combined sensitivity multiplier
      showing how small changes in growth rates affect terminal value which typically represents 60-80% of total DCF value
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Growth assumption compounding amplifies terminal value sensitivity through the Gordon Growth formula, causing
      large valuation swings from small input changes and potentially leading to incorrect buy/sell recommendations based
      on inflated or deflated intrinsic value estimates
    derived_from_bd_id: BD-145
  - id: finance-C-361
    when: When pricing swaptions or interest rate derivatives near zero or negative rate boundaries
    action: Monitor interest rate levels and implement explicit model regime detection — switch from Black's log-normal model
      to Bachelier normal model when rates approach zero, and generate warning notifications when model transitions occur
      to prevent discontinuous pricing at the zero boundary
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Model switching at the zero boundary creates discontinuous pricing results where identical swaptions receive
      different valuations depending on which model is used, creating potential arbitrage opportunities or hedging gaps that
      could result in significant unexpected trading losses
    derived_from_bd_id: BD-146
  - id: finance-C-362
    when: When downloading Fama-French factor data for performance analysis
    action: Download factors exclusively from Kenneth French's official Data Library repository (https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/ftp/)
      — do not use third-party mirrors or cached datasets that may contain stale or modified factor values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-official factor sources introduces data inconsistency with published academic benchmarks, causing
      backtested alpha/beta calculations to diverge from expected values when comparing against research literature
    derived_from_bd_id: BD-009
  - id: finance-C-363
    when: When processing trades and positions in backtesting
    action: Assume the framework handles settlement and delivery time conventions — the framework does not implement settlement
      date tracking; trade_date is treated as both trade and settlement date
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without settlement convention handling, backtests assume same-day settlement for all asset classes, violating
      T+1/T+2 settlement rules for equities and causing cash flow timing errors in margin calculations
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-364
    when: When implementing trade execution tracking in backtesting
    action: 'Implement explicit settlement date calculation based on asset class: for equities use trade_date + 1 (T+1 settlement),
      for options use trade_date + 1, for futures use trade_date + 0 (same-day); track cash flow timing separately from trade
      execution'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failing to implement settlement tracking causes margin requirement calculations to use wrong cash availability
      dates, potentially allowing backtest to execute trades that would be rejected due to unsettled funds in live trading
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-365
    when: When implementing date/time series operations in backtesting
    action: Verify date sequences are ordered chronologically with oldest dates processed first (reverse_dates=True by default)
      — required for correct rolling calculations, trend detection, and technical indicator computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reversing date order breaks rolling window calculations and trend detection logic, causing technical indicators
      like SMA and momentum to produce incorrect values that would invalidate backtest results and lead to incorrect trading
      signals
    derived_from_bd_id: BD-005
  - id: finance-C-367
    when: When implementing or modifying the caching layer for data persistence
    action: 'Maintain separate pickle serialization strategies: config data must use python pickle for flexibility, financial
      data must use pandas pickle for cross-version compatibility — do not interchange the two'
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using the wrong pickle type causes silent deserialization failures when cached data is loaded in different
      pandas versions, leading to missing or corrupted financial metrics that produce incorrect backtest results without obvious
      errors
    derived_from_bd_id: BD-002
  - id: finance-C-368
    when: When using the framework's default CSV normalization mappings for financial statement data
    action: Verify that default field mappings in the normalization CSV match the user's actual data provider format before
      running analysis; mismatched mappings will silently produce incorrect financial metrics
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default normalization mappings may not match the user's specific data provider format, causing field misalignment
      that produces incorrect financial ratios, valuations, and risk estimates without any error message
    derived_from_bd_id: BD-004
  - id: finance-C-369
    when: When implementing or modifying financial statement normalization logic
    action: Use CSV-based field mapping instead of hardcoded mappings; the system must load mappings from the normalization
      CSV file via read_normalization_file function at line 190
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hardcoded field mappings prevent users from supporting different financial statement formats, requiring code
      changes for each new data provider instead of simple CSV configuration
    derived_from_bd_id: BD-004
  - id: finance-C-370
    when: When processing data acquisition logic for backtesting or live trading
    action: Assume the framework provides point-in-time data availability checks — the framework does not implement point-in-time
      reconciliation, potentially serving stale or unavailable data points as current
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time data handling, backtests may use data that was not available at the time of decision,
      introducing look-ahead bias that makes backtest results non-reproducible in live trading
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-371
    when: When acquiring financial data for backtesting or analysis
    action: Implement point-in-time data availability verification by checking data timestamp against analysis timestamp,
      flagging or excluding data points where effective_date > as_of_date, and maintaining data revision history for reconciliation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without point-in-time checks, strategies may execute based on data that was not yet published, causing backtest
      results to diverge significantly from live trading performance
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-372
    when: When implementing CVaR optimization in risk analysis
    action: Set ALPHA_CONSTRAINT to 0.5 to constrain CVaR optimization to the worst 50% of cases, preventing extreme tail
      estimates from dominating the calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without alpha=0.5 constraint, CVaR optimization may become numerically unstable or dominated by outlier tail
      events, producing risk estimates that are either too conservative or unreliably extreme
    derived_from_bd_id: BD-012
  - id: finance-C-373
    when: When calculating Value at Risk for assets with non-normal return distributions
    action: Use Cornish-Fisher expansion instead of Gaussian VaR; adjust VaR calculation for skewness and kurtosis using the
      get_var_gaussian function's Cornish-Fisher modification at line 58
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Gaussian VaR ignores skewness and kurtosis common in financial returns, systematically misestimating risk
      for assets with asymmetric or fat-tailed distributions
    derived_from_bd_id: BD-011
  - id: finance-C-374
    when: When calculating risk metrics using Cornish-Fisher expansion
    action: Verify that input return distributions have sufficient sample size (>100 observations) for reliable skewness and
      kurtosis estimation before applying Cornish-Fisher adjustment
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: With small sample sizes, skewness and kurtosis estimates become unreliable, causing Cornish-Fisher adjustment
      to amplify estimation noise rather than correct distribution misspecification
    derived_from_bd_id: BD-011
  - id: finance-C-375
    when: When processing price and quantity data in trading or backtesting operations
    action: Assume the framework handles price and quantity precision correctly — the framework does not implement explicit
      decimal precision handling for financial calculations, potentially causing rounding errors in accumulated positions
      and P&L
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper precision handling, floating-point arithmetic errors in price and quantity calculations accumulate
      over many trades, causing P&L discrepancies and position mismatches between backtest and live trading
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-376
    when: When implementing price and quantity data handling in trading systems
    action: 'Use Decimal type with explicit precision (e.g., Decimal(''0.01'' for prices, Decimal(''100'') for lot sizes)
      for each financial calculations; apply proper rounding to exchange-specified decimal places (prices: 2 decimals, quantities:
      0 decimals for shares) before storing and after calculation'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without decimal precision handling, accumulated rounding errors from float arithmetic cause systematic P&L
      discrepancies, position mismatches, and potentially rejected orders due to precision violations
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-377
    when: When implementing financial statement data acquisition in the Toolkit
    action: Use FinancialModelingPrep API exclusively as the sole data source for each financial statement data — do not introduce
      additional data providers that require reconciliation of currency, fiscal periods, or format normalization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Adding alternative data sources introduces currency mismatches, fiscal period misalignment, and format inconsistencies
      that corrupt ratio calculations and financial metrics
    derived_from_bd_id: BD-027
  - id: finance-C-378
    when: When initializing the Toolkit for financial analysis
    action: Verify that quarterly=False (annual data default) matches the intended analysis period — explicitly set quarterly=True
      in Toolkit initialization if quarterly analysis is required
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using annual data for strategies expecting quarterly granularity causes systematic under-sampling of price
      movements, making backtested Sharpe ratios and returns significantly overstated
    derived_from_bd_id: BD-026
  - id: finance-C-379
    when: When calculating breadth indicators (advance/decline, new highs/lows)
    action: Pass market-level index data or a universe of tickers to breadth indicator functions — single security ticker
      inputs will produce null/empty results
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling breadth indicators with a single ticker returns null/empty values without raising an error, causing
      silent failures in strategy calculations that depend on these metrics
    derived_from_bd_id: BD-068
  - id: finance-C-381
    when: When configuring VaR model parameters for risk analysis in backtesting
    action: Verify that the default 252 trading days lookback period matches your regulatory framework (Basel standards use
      1-year) and strategy requirements; custom periods may be needed for stress testing but require documented justification
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using non-standard VaR lookback periods causes regulatory capital misalignment; shorter periods (126 days)
      risk insufficient sample size for tail risk estimation while longer periods (504 days) may include stale data, leading
      to under- or over-estimation of risk exposure
    derived_from_bd_id: BD-034
  - id: finance-C-383
    when: When pricing European-style options using Black-Scholes model
    action: Use Black-Scholes closed-form solution which provides fast computation for European options under standard assumptions
      (no early exercise, constant volatility, no transaction costs); verify underlying assumptions hold or switch to alternative
      models
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: 'Black-Scholes pricing becomes inaccurate when underlying assumptions are violated: dividend payments, stochastic
      volatility (VIX smile), or transaction costs cause systematic pricing errors that accumulate in high-frequency strategies'
    derived_from_bd_id: BD-035
  - id: finance-C-386
    when: When implementing or modifying volatility calculation logic in backtesting strategies
    action: Use ATR formula max(H-L, |H-PC|, |L-PC|) — do not replace with standard deviation of returns; when using ATR for
      position sizing or stop-loss, recognize ATR is directionless and requires additional directional indicators for entry
      signals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing ATR with standard deviation changes volatility estimation methodology, causing position sizing
      and stop-loss calculations to differ; strategies calibrated for ATR will produce incorrect risk management signals when
      standard deviation is substituted
    derived_from_bd_id: BD-090
  - id: finance-C-387
    when: When implementing Bollinger Bands in mean-reversion trading strategies
    action: Calculate Bollinger Bands as k standard deviations around rolling SMA; do not replace with Keltner Channels; band
      penetration signals must be confirmed with additional indicators (such as %B, bandwidth, or RSI) before generating entry
      signals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Band penetration alone produces false signals in trending markets; mean-reversion strategies using unconfirmed
      Bollinger Band signals generate excessive losses during strong directional moves
    derived_from_bd_id: BD-091
  - id: finance-C-388
    when: When running backtests or demos without providing an explicit portfolio dataset
    action: Verify whether loaded data is the auto-downloaded example portfolio or user-provided data before drawing conclusions;
      check that portfolio selection or loading logic explicitly confirms user intent when real data is required
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Example portfolio data produces non-reproducible results in live trading; backtests run on demo data create
      false confidence in strategy performance, leading to significant financial losses when deployed with real capital
    derived_from_bd_id: BD-025
  - id: finance-C-389
    when: When calling ratio collection methods in the ratios controller
    action: Call collect_efficiency_ratios() before collect_all_ratios() — efficiency ratios initialize the caching mechanism
      required by subsequent ratio calculations; never call collect_all_ratios() as the first ratio collection method
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling collect_all_ratios() before collect_efficiency_ratios() causes uninitialized cache access, resulting
      in KeyError exceptions or incomplete cached results that silently corrupt subsequent ratio calculations
    derived_from_bd_id: BD-124
  - id: finance-C-390
    when: When implementing or selecting an RSI calculation method in backtesting
    action: Verify that RSI calculations use Wilder's smoothing (EMA-based smoothing of average gains/losses over 14 periods)
      rather than simple moving average or other exponential variants; the smoothing method directly affects RSI output values
      and signal generation timing
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Different RSI smoothing methods produce materially different values; using simple EMA instead of Wilder's
      smoothing can shift overbought/oversold signals by several periods, causing strategies to enter/exit positions at different
      times and significantly affecting backtest results
    derived_from_bd_id: BD-092
  - id: finance-C-391
    when: When implementing or configuring MACD indicator calculations
    action: Verify that MACD uses the standard 12/26/9 configuration (fast=12, slow=26, signal=9) with EMA-based calculations;
      the MACD histogram is computed as the difference between fast and slow EMAs, with the signal line as the 9-period EMA
      of the MACD itself
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Non-standard MACD parameters produce different crossover signals and histogram values; backtest results are
      highly sensitive to this specific 12/26/9 configuration, and using alternative parameters without adjusting strategy
      thresholds will cause significant live trading divergence
    derived_from_bd_id: BD-093
  - id: finance-C-393
    when: When configuring FMP API access for data fetching
    action: Verify that FMP subscription tier auto-detection correctly identifies the account type; if using Premium features,
      confirm the detected plan matches actual access level to avoid sleep_timer misbehavior
    severity: high
    kind: operational_lesson
    modality: must
    consequence: 'Incorrect plan detection causes two distinct failures: free-tier users with Premium credentials face unnecessary
      waiting delays, while Premium users with free-tier detection face API rejections; both scenarios degrade data fetching
      reliability and speed'
    derived_from_bd_id: BD-129
  - id: finance-C-394
    when: When implementing or refactoring ratio collection functions that utilize lazy computation
    action: 'Verify and document the correct calling order for ratio functions: collect_efficiency_ratios must be called before
      collect_all_ratios to avoid triggering errors or uninitialized cache access'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Calling collect_all_ratios before collect_efficiency_ratios triggers errors or accesses uninitialized cache,
      breaking the lazy evaluation contract and causing runtime failures that are difficult to debug
    derived_from_bd_id: BD-139
  - id: finance-C-395
    when: When implementing or refactoring Average True Range (ATR) calculation logic
    action: Use Wilder's smoothing method (modified exponential moving average with alpha=1/period) — do not replace with
      simple moving average or standard exponential smoothing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple MA or standard EMA instead of Wilder's smoothing produces different ATR values, causing incorrect
      volatility-based stop losses and position sizing that deviates from expected trading behavior
    derived_from_bd_id: BD-072
  - id: finance-C-396
    when: When implementing information ratio calculation in portfolio performance evaluation
    action: Calculate information ratio as (portfolio_return - benchmark_return) / tracking_error — use excess return (not
      absolute return) as the numerator
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using absolute portfolio return instead of excess return produces meaningless IR values, making backtested
      performance evaluation completely invalid for active management assessment
    derived_from_bd_id: BD-074
  - id: finance-C-397
    when: When implementing option pricing for American-style options with early exercise premium
    action: Use Cox-Ross-Rubinstein (CRR) binomial tree with recombining nodes — verify node count balances accuracy and performance;
      convergence improves with more steps
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using European option pricing models (Black-Scholes) for American options ignores early exercise premium,
      systematically underpricing deep in-the-money puts by 5-10%
    derived_from_bd_id: BD-077
  - id: finance-C-398
    when: When calculating bond valuations using the default coupon frequency parameter
    action: Verify that frequency=1 (annual coupons) matches the bond being valued — for US Treasuries (semi-annual) or corporate
      bonds with quarterly/monthly coupons, explicitly set frequency to 2, 4, or 12 respectively
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using annual frequency default for semi-annual bonds misprices by approximately half the coupon period effect,
      causing systematic over/under-valuation errors that accumulate in portfolio-level bond positions
    derived_from_bd_id: BD-043
  - id: finance-C-399
    when: When calculating Yield to Maturity for bonds with high convexity or unusual cash flow patterns
    action: Verify Newton-Raphson convergence with tolerance=0.0001 and max_iterations=100 — for highly convex bonds (e.g.,
      callable, putable), implement Bisection method fallback to prevent non-convergence
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Newton-Raphson may fail to converge for highly convex bonds after 100 iterations, causing YTM calculation
      to return incorrect values or throw exceptions, silently corrupting bond portfolio analytics
    derived_from_bd_id: BD-045
  - id: finance-C-400
    when: When implementing or configuring automatic plan detection with sleep timer integration
    action: Implement explicit tier logging and fallback logic when plan detection fails — log detected tier and verify detection
      success before applying sleep timer delays; if detection fails, default to conservative behavior (Free tier delays)
      and alert the user
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Silent detection failure creates a critical ambiguity where the system claims Premium rate limits but operates
      under Free tier delays, causing unexpected timeouts for large operations; conversely, false Premium detection attempts
      Free tier API calls without rate limiting, risking 429 rejections
    derived_from_bd_id: BD-148
  - id: finance-C-401
    when: When implementing or using the Commodity Channel Index (CCI) indicator for assets other than commodities
    action: Verify that the 0.015 constant and 20-day lookback period match the cyclical characteristics of the specific asset
      being analyzed; adjust period for assets with different cycle lengths (e.g., 10-day for short-cycle, 30-day for long-cycle
      assets)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The 0.015 CCI constant was calibrated for commodities with 20-day cycles; applying it to equities, crypto,
      or forex with different cyclical patterns produces inaccurate overbought/oversold signals, causing momentum strategies
      to enter or exit positions at suboptimal times
    derived_from_bd_id: BD-106
  - id: finance-C-402
    when: When using Money Flow Index (MFI) to generate trading signals
    action: Combine MFI with trend confirmation indicators (such as moving averages, ADX, or price trend analysis) to validate
      overbought/oversold signals; do not use MFI as a standalone entry/exit trigger during strong trends
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: MFI can remain in overbought territory for extended periods during strong uptrends and oversold during downtrends;
      using MFI alone causes strategies to prematurely exit winning positions or enter losing positions against the dominant
      trend
    derived_from_bd_id: BD-111
  - id: finance-C-403
    when: When performing cross-module ratio calculations or merging DataFrames from different controllers
    action: Maintain rounding=4 decimal places consistently across each ratio calculations and outputs; any module that requires
      different precision must explicitly override the rounding parameter to verify aligned DataFrame columns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent rounding precision across modules produces misaligned DataFrame columns when merging results,
      causing silent data corruption where ratios from different sources cannot be directly compared or analyzed together
    derived_from_bd_id: BD-114
  - id: finance-C-404
    when: When implementing or modifying data pipeline stages in data_acquisition
    action: Assume the framework provides fit/transform isolation — the framework does not enforce separation between pipeline
      fitting (learning parameters from training data) and transform (applying learned parameters to new data); fit operations
      may leak information into transform operations if not explicitly isolated
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without fit/transform isolation, the pipeline may apply learned parameters (e.g., scaler means, encoder mappings)
      to training data itself, causing look-ahead bias that inflates backtest performance and produces non-reproducible live
      results
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-405
    when: When implementing multi-agent trading strategies in data_acquisition
    action: 'Implement explicit consensus mechanism with versioned decision records: each agent must submit signed decisions
      with timestamp, and final execution decision requires quorum agreement (e.g., majority vote or weighted consensus threshold)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without multi-agent decision consensus, conflicting agent decisions may be processed in unpredictable order,
      causing inconsistent position sizing and order execution that differs between backtest and live trading
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-406
    when: When implementing or modifying data pipeline stages in data_acquisition
    action: Assume the framework handles multi-agent decision consensus — the framework does not implement consensus mechanisms;
      agent decisions are processed independently without coordination or agreement validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without multi-agent decision consensus, conflicting agent decisions may be processed in unpredictable order,
      causing inconsistent position sizing and order execution that differs between backtest and live trading
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-408
    when: When implementing or modifying data pipeline stages in data_acquisition
    action: Assume the framework handles reserve adequacy methods — the framework does not implement actuarial reserve calculation
      methods; reserves must be calculated externally and provided as input parameters
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without reserve adequacy methods, the system may understate required capital reserves for insurance or pension
      liabilities, leading to regulatory violations and potential insolvency risk
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-409
    when: When processing reserve adequacy calculations in data_acquisition
    action: 'Integrate external reserve adequacy calculation service: pass policy_data and assumption_data fields to certified
      reserve calculator, and validate output against regulatory minimum thresholds (reserve >= best_estimate * risk_margin_multiplier)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper reserve adequacy validation, insufficient reserves may be reported to regulators, causing
      compliance violations and potential fines or license revocation
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-410
    when: When implementing or modifying data pipeline stages in data_acquisition
    action: Assume the framework handles mortality table version management — the framework does not track or validate mortality
      table versions; stale or mismatched mortality tables may be used without warning
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using incorrect mortality table version causes systematic miscalculation of life expectancy and death probabilities,
      leading to reserves being overstated or understated by 5-15% for long-duration policies
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-411
    when: When loading mortality tables for actuarial calculations in data_acquisition
    action: 'Implement mortality table version control: store table version in metadata, validate version matches regulatory
      filing version, and reject calculations with version mismatch (version field must equal approved_version from regulatory
      registry)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect mortality table version causes systematic miscalculation of life expectancy and death probabilities,
      leading to reserves being overstated or understated by 5-15% for long-duration policies
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-412
    when: When implementing or modifying data pipeline stages in data_acquisition
    action: Assume the framework calculates best estimate and risk margin — the framework does not implement actuarial valuation
      methods; best estimate and risk margin must be calculated externally and provided as input parameters
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without best estimate and risk margin, the system may use arbitrary discount rates or assumption margins,
      causing reported liabilities to deviate from regulatory requirements by 10-30%
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-413
    when: When processing actuarial valuation inputs in data_acquisition
    action: 'Integrate external actuarial valuation service: receive best_estimate and risk_margin fields from certified valuation
      system, validate risk_margin >= best_estimate * regulatory_minimum_percentage, and log valuation_version for audit trail'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper best estimate and risk margin validation, reported liabilities may violate regulatory minimum
      requirements, causing compliance violations and potential regulatory sanctions
    derived_from_bd_id: BD-GAP-024
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
