resources:
  packages:
  - name: numpy>=1.23
    version_pin: latest
  - name: pandas>=2.0,<3.0
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: matplotlib
    version_pin: latest
  - name: plotly>=4.12.0
    version_pin: latest
  - name: ipywidgets>=7.0.0
    version_pin: latest
  - name: anywidget
    version_pin: latest
  - name: numba>=0.60
    version_pin: latest
  - name: dill
    version_pin: latest
  - name: tqdm
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy>=1.23
    - python3 -m pip install pandas>=2.0,<3.0
    - python3 -m pip install scipy
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing Data.download_symbol or Data.update_symbol
    action: Override the abstract method with source-specific implementation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Base class raises NotImplementedError, preventing any data download operation. The plugin architecture requires
      subclass implementation for each data source (Yahoo Finance, Binance, CCXT, Alpaca, synthetic).
    stage_ids:
    - data_ingestion
  - id: finance-C-002
    when: When downloading multiple symbols into Data object
    action: Verify each symbols share the same temporal index after alignment
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: VectorBT performs vectorized matrix operations across symbols. Misaligned indexes cause incorrect broadcast
      calculations, producing wrong trading signals and invalid backtest results. Matrix operations require uniform index
      across all symbols.
    stage_ids:
    - data_ingestion
  - id: finance-C-003
    when: When downloading price data for indicator computation
    action: Include OHLCV columns (Open, High, Low, Close, Volume) in the downloaded data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: OHLCV accessors (pd.DataFrame.vbt.ohlcv.*) return None for missing columns, causing indicators like SMA,
      EMA, MACD to receive empty data and produce NaN results. Downstream portfolio simulation fails with no signals generated.
    stage_ids:
    - data_ingestion
  - id: finance-C-004
    when: When creating Data instance with multiple symbols
    action: Pass a dictionary data structure keyed by symbol name
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Data.__init__ expects dict type (line 317 checks.assert_instance_of(data, dict)). Non-dict data causes AssertionError.
      Each symbol's data must be accessible via symbol key for vectorized operations.
    stage_ids:
    - data_ingestion
  - id: finance-C-008
    when: When providing symbols to Data.download method
    action: Verify symbols are hashable (single symbol) or sequence of hashable (multiple symbols)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-hashable symbol causes TypeError at line 576. The symbol dict requires hashable keys for symbol identification.
      Tuples are accepted as single symbols since they are hashable.
    stage_ids:
    - data_ingestion
  - id: finance-C-014
    when: When initializing BinanceData for data download
    action: Provide a valid Binance client instance to download_symbol
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: BinanceData.download_symbol raises ValueError('client must be provided') if client is None. This prevents
      any data retrieval from Binance, blocking the entire backtesting workflow for Binance-based strategies.
    stage_ids:
    - data_ingestion
  - id: finance-C-017
    when: When implementing from_apply_func with Numba-compiled functions
    action: Pass variable keyword arguments to Numba-compiled apply functions
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Numba does not support variable keyword arguments, causing runtime errors when the function is executed with
      **kwargs
    stage_ids:
    - indicators
  - id: finance-C-025
    when: When implementing look-ahead bias prevention in trading signals
    action: Shift signals forward by one tick when using close price for signal generation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Signals generated on close price without shifting expose the strategy to look-ahead bias, causing backtest
      returns to overstate actual trading performance
    stage_ids:
    - indicators
  - id: finance-C-028
    when: When validating IndicatorBase instantiation
    action: Verify input arrays, output arrays, and parameter arrays match wrapper shape dimensions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Shape mismatches cause data corruption in indicator outputs, leading to incorrect signal generation and portfolio
      simulation results
    stage_ids:
    - indicators
  - id: finance-C-029
    when: When using price indicators for trading decisions
    action: Claim that backtest returns equal expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as expected live trading returns misleads users about actual strategy performance,
      ignoring slippage, latency, and market impact realities
    stage_ids:
    - indicators
    - signal_generation
  - id: finance-C-030
    when: When presenting indicator results to stakeholders
    action: Present simulated indicator outputs as proof of real execution or actual market analysis
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting simulated indicator outputs as real market analysis misleads decision-makers and violates
      financial regulations against misleading performance claims
    stage_ids:
    - indicators
  - id: finance-C-031
    when: When creating indicators that reference future data
    action: Claim the indicator provides non-repaintable real-time signals without proper lag compensation
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Indicators using future data without lag compensation cannot produce valid real-time signals, causing users
      to act on information not yet available in live trading
    stage_ids:
    - indicators
  - id: finance-C-034
    when: When using var_args and keyword_only_args together in from_custom_func
    action: Set both var_args=True and keyword_only_args=True simultaneously
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Mutually exclusive argument styles cause ValueError at runtime, preventing indicator class creation
    stage_ids:
    - indicators
  - id: finance-C-035
    when: When defining an IndicatorFactory without outputs
    action: Create indicator with zero output_names and zero in_output_names
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Indicator must have at least one output to return meaningful results; empty outputs cause runtime errors
      during indicator execution
    stage_ids:
    - indicators
  - id: finance-C-036
    when: When initializing SignalsAccessor with signal data
    action: pass boolean (np.bool_) dtype arrays to the accessor
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: SignalsAccessor enforces dtype=np.bool_ check at initialization. Non-boolean arrays will raise an assertion
      error, preventing invalid signal data from entering the pipeline.
    stage_ids:
    - signal_generation
  - id: finance-C-037
    when: When implementing custom choice_func_nb for signal generation
    action: return indices strictly within [from_i, to_i) bounds
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Returning out-of-bounds indices causes ValueError exceptions in the signal generation pipeline. The code
      explicitly checks and raises 'Returned indices are out of bounds' or 'First returned index is out of bounds' errors.
    stage_ids:
    - signal_generation
  - id: finance-C-038
    when: When creating custom signal choice functions
    action: compile functions with @njit decorator for Numba compatibility
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Functions passed as choice_func_nb must be Numba-compiled. The accessor calls checks.assert_numba_func()
      which raises TypeError for non-Numba functions, breaking signal generation entirely.
    stage_ids:
    - signal_generation
  - id: finance-C-040
    when: When generating signals that will be used for backtesting
    action: apply fshift(1) to shift signals forward by one bar to prevent look-ahead bias
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without fshift(1), signal generation uses current bar data to generate signals for the same bar, introducing
      look-ahead bias. This causes live trading returns to fall far below backtested results.
    stage_ids:
    - signal_generation
  - id: finance-C-045
    when: When using VectorBT for live trading decisions
    action: rely solely on VectorBT outputs without independent verification
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Using unverified backtest signals for live trading risks significant financial loss. The software carries
      no warranty and authors assume no responsibility for trading outcomes.
    stage_ids:
    - signal_generation
  - id: finance-C-051
    when: When implementing order processing in portfolio simulation
    action: validate order.price is finite and greater than 0 before execution
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid order prices (NaN, zero, or negative) cause simulation to produce undefined behavior or silent failures
      in trade record calculations
    stage_ids:
    - portfolio_simulation
  - id: finance-C-052
    when: When initializing portfolio state in simulation
    action: validate cash is non-NaN and non-negative before simulation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NaN or negative initial cash causes cascade failures in cash flow calculations and produces invalid portfolio
      value series
    stage_ids:
    - portfolio_simulation
  - id: finance-C-053
    when: When validating position state during order execution
    action: validate position is finite during each order processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Infinite or NaN positions cause arithmetic failures in size calculations and corrupt trade PnL records
    stage_ids:
    - portfolio_simulation
  - id: finance-C-054
    when: When tracking short position debt in portfolio simulation
    action: maintain debt as finite and non-negative value throughout simulation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative or infinite debt corrupts free_cash calculations and enables impossible trading scenarios where
      borrowed capital exceeds collateral
    stage_ids:
    - portfolio_simulation
  - id: finance-C-055
    when: When validating order parameters before execution
    action: validate slippage is finite and non-negative before applying to order price
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative or infinite slippage causes price adjustments in wrong direction, producing unrealistic filled prices
      that corrupt trade records and PnL
    stage_ids:
    - portfolio_simulation
  - id: finance-C-056
    when: When processing trade records and calculating PnL
    action: negate val_diff for short trades to correctly compute profit/loss
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Short trade PnL calculation without sign flip produces inverse returns - profits appear as losses and losses
      as profits, completely misrepresenting short position performance
    stage_ids:
    - portfolio_simulation
  - id: finance-C-057
    when: When processing order records to build trade records
    action: validate order size is greater than zero before creating trade records
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero or negative order sizes in trade generation produce invalid trade records with corrupted size fields
      and incorrect PnL calculations
    stage_ids:
    - portfolio_simulation
  - id: finance-C-058
    when: When enforcing direction constraints during order processing
    action: reject LongOnly orders when current position is negative (short)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Attempting to go long while holding a short position without proper exit creates conflicting position states
      that corrupt cash and position tracking
    stage_ids:
    - portfolio_simulation
  - id: finance-C-059
    when: When enforcing direction constraints during order processing
    action: reject ShortOnly orders when current position is positive (long)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Attempting to go short while holding a long position without proper exit creates conflicting position states
      that corrupt cash and position tracking
    stage_ids:
    - portfolio_simulation
  - id: finance-C-062
    when: When initializing portfolio with cash sharing enabled
    action: provide init_cash array length matching the number of groups
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Mismatch between init_cash length and group count causes ValueError during simulation initialization, preventing
      portfolio from running
    stage_ids:
    - portfolio_simulation
  - id: finance-C-063
    when: When initializing portfolio with cash sharing disabled
    action: provide init_cash array length matching the number of columns
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Mismatch between init_cash length and column count causes ValueError during simulation initialization, preventing
      portfolio from running
    stage_ids:
    - portfolio_simulation
  - id: finance-C-071
    when: When processing entry and exit trade records
    action: verify entry_trades.pnl.sum() equals exit_trades.pnl.sum() equals positions.pnl.sum() for consistency
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: PnL inconsistency between entry trades, exit trades, and positions indicates calculation error in trade pairing
      or PnL aggregation, producing unreliable performance metrics
    stage_ids:
    - portfolio_simulation
  - id: finance-C-072
    when: When validating order IDs in trade generation
    action: verify order IDs come in ascending order per column during trade pairing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-ascending order IDs cause trade pairing to fail, producing incorrect entry/exit matches and corrupted
      PnL calculations
    stage_ids:
    - portfolio_simulation
  - id: finance-C-074
    when: When processing flexible order functions in simulation
    action: validate order size_type is within valid range before size conversion logic
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid size_type causes incorrect size conversions and potentially wrong order sizes being executed
    stage_ids:
    - portfolio_simulation
  - id: finance-C-075
    when: When processing order records to create entry/exit trades
    action: validate order prices are greater than zero before calculating trade statistics
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero or negative order prices in trade record generation cause division by zero or inverse PnL calculations
    stage_ids:
    - portfolio_simulation
  - id: finance-C-076
    when: When implementing custom Records subclasses
    action: define records_arr as a structured NumPy array with dtype.fields not None
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Records initialization will raise TypeError if records_arr lacks structured dtype fields, causing data pipeline
      failure
    stage_ids:
    - records_analysis
  - id: finance-C-077
    when: When creating Records instances
    action: include 'id' and 'col' fields in records_arr structured dtype
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Field mapping and column lookup operations will fail when 'id' and 'col' fields are missing, breaking all
      record-to-column associations
    stage_ids:
    - records_analysis
  - id: finance-C-078
    when: When mapping arrays to Records
    action: verify mapped array length equals records array length
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Shape mismatch causes undefined behavior in MappedArray operations; indexing and grouping will produce incorrect
      results
    stage_ids:
    - records_analysis
  - id: finance-C-079
    when: When field_config specifies dtype with required fields
    action: verify each fields defined in dtype.names exist in records_arr.dtype.names
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TypeError raised when field from dtype cannot be found in records or config, halting execution
    stage_ids:
    - records_analysis
  - id: finance-C-080
    when: When validating Records class decorators
    action: verify field_config has dtype with dtype.fields not None for @attach_fields decorator
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Decorator validation fails if dtype.fields is None, preventing field property attachment
    stage_ids:
    - records_analysis
  - id: finance-C-081
    when: When implementing Drawdowns or Ranges subclasses
    action: include each fields defined in drawdown_dt or range_dt structured dtype
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Drawdown calculations fail when required fields like peak_idx, valley_idx, status are missing from records_arr
    stage_ids:
    - records_analysis
  - id: finance-C-084
    when: When implementing Records.replace
    action: invalidate col_mapper when records_arr or wrapper changes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Stale col_mapper causes incorrect column-to-record mapping after records_arr modification, producing wrong
      statistics
    stage_ids:
    - records_analysis
  - id: finance-C-085
    when: When inheriting from Ranges for duration analysis
    action: implement start_idx, end_idx, and status fields per range_dt
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Duration calculations (avg_duration, max_duration, coverage) fail without proper range boundary fields
    stage_ids:
    - records_analysis
  - id: finance-C-091
    when: When using Records.map_array method
    action: verify array being mapped has shape matching records.values
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Shape mismatch causes assertion error in assert_shape_equal, preventing mapped array creation
    stage_ids:
    - records_analysis
  - id: finance-C-092
    when: When validating mapped array construction in MappedArray
    action: verify mapped_arr and col_arr have equal length at axis 0
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Shape assertion fails if mapped_arr length does not match col_arr length, breaking per-record mapping
    stage_ids:
    - records_analysis
  - id: finance-C-096
    when: When calculating Sharpe/Sortino ratios
    action: deduct risk-free rate from returns before computing mean and standard deviation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Sharpe ratio will be incorrectly calculated if risk-free rate is not subtracted from returns first, inflating
      the risk-adjusted return metric and misrepresenting strategy performance
    stage_ids:
    - performance_metrics
  - id: finance-C-097
    when: When annualizing Sharpe/Sortino/omega ratios
    action: multiply mean excess return and divide standard deviation by specified annualization factor (sqrt for Sharpe,
      no sqrt for Sortino/omega)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Annualized Sharpe ratio formula is mean/std * sqrt(ann_factor); using wrong exponent causes misaligned risk-adjusted
      return comparisons across different asset classes
    stage_ids:
    - performance_metrics
  - id: finance-C-098
    when: When computing beta coefficient
    action: use covariance of excess returns with benchmark divided by variance of benchmark returns
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Beta calculation using OLS formula cov(portfolio_rets, benchmark_rets) / var(benchmark_rets) ensures statistical
      alignment with CAPM; incorrect formula produces wrong market sensitivity measure
    stage_ids:
    - performance_metrics
  - id: finance-C-099
    when: When implementing rolling performance metrics
    action: align window to current timestep without including future data using i+1-window slicing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Rolling window must use past data only (current index excluded) to avoid look-ahead bias; using current or
      future data in rolling calculation inflates metric accuracy and produces misleading live trading signals
    stage_ids:
    - performance_metrics
  - id: finance-C-103
    when: When requiring annualization-based metrics
    action: verify both index frequency (freq) and year_freq are set; raise error if either is missing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Annualization factor depends on both daily frequency and year frequency; missing either causes metrics like
      Sharpe/Sortino to fail with unclear error message
    stage_ids:
    - performance_metrics
  - id: finance-C-106
    when: When computing beta/alpha/information ratio
    action: broadcast benchmark returns to match shape of portfolio returns before passing to Numba functions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Beta calculation requires aligned time series; mismatched shapes cause incorrect element-wise operations
      or runtime errors in Numba-compiled functions
    stage_ids:
    - performance_metrics
  - id: finance-C-116
    when: When implementing a class using StatsBuilderMixin or PlotsBuilderMixin
    action: inherit from vectorbt.base.array_wrapper.Wrapping base class
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Mixins fail initialization with assertion error because the mixin __init__ calls checks.assert_instance_of(self,
      Wrapping) which will raise AssertionError
    stage_ids:
    - statistics_plotting
  - id: finance-C-117
    when: When implementing a custom calc_func for a metric
    action: return a scalar for one column/group, pd.Series for multiple columns/groups, or dict of such values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TypeError raised at runtime when calc_func returns an array type that is neither a scalar nor pd.Series
    stage_ids:
    - statistics_plotting
  - id: finance-C-118
    when: When defining custom metrics via the metrics Config
    action: verify each metric has a calc_func defined either directly or via resolve_path
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: KeyError raised when stats() attempts to access calc_func from metric settings
    stage_ids:
    - statistics_plotting
  - id: finance-C-119
    when: When implementing a custom plot_func for a subplot
    action: verify the plot_func is callable
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TypeError raised when plot_func is not callable, preventing plot generation
    stage_ids:
    - statistics_plotting
  - id: finance-C-121
    when: When passing metrics parameter to .stats()
    action: pass either a string, tuple, iterable of strings/tuples, or a dict of metric configurations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TypeError raised when metrics is not one of the accepted types, breaking the stats calculation pipeline
    stage_ids:
    - statistics_plotting
  - id: finance-C-122
    when: When configuring metric_settings for .stats()
    action: provide keys in metric_settings that do not match any defined metric name
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: ValueError raised indicating which keys could not be matched with any metric
    stage_ids:
    - statistics_plotting
  - id: finance-C-123
    when: When using filter functions that reference filter names in metric settings
    action: verify referenced filters are defined in the filters configuration
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ValueError raised indicating the required filter is not defined in the filters configuration
    stage_ids:
    - statistics_plotting
  - id: finance-C-131
    when: When creating new classes that need stats functionality
    action: inherit from StatsBuilderMixin in addition to any other required base classes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing StatsBuilderMixin inheritance results in AttributeError when .stats() is called
    stage_ids:
    - statistics_plotting
  - id: finance-C-132
    when: When creating new classes that need plotting functionality
    action: inherit from PlotsBuilderMixin in addition to any other required base classes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing PlotsBuilderMixin inheritance results in AttributeError when .plot() is called
    stage_ids:
    - statistics_plotting
  - id: finance-C-142
    when: When passing entry/exit signals to Portfolio.from_signals without temporal alignment
    action: Shift signal arrays forward by 1 using fshift(1) before passing them to the portfolio simulator
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Backtest equity curve exhibits look-ahead bias because signals generated at time t can execute at price at
      time t, causing simulated returns to be artificially inflated compared to actual trading conditions where execution
      happens at time t+1 or later
  - id: finance-C-148
    when: When using VectorBT for financial decision-making
    action: Claim or imply that backtested results represent actual trading performance or guarantee future returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as proof of trading capability misleads stakeholders about actual expected performance,
      violating regulatory standards and creating legal liability for misrepresentation
  - id: finance-C-152
    when: When documenting or presenting VectorBT backtest results
    action: Include the software disclaimer and clearly distinguish simulated results from live trading performance
    severity: fatal
    kind: claim_boundary
    modality: must
    consequence: Failure to distinguish backtest from live trading results creates misleading representation of trading ability,
      potentially violating securities regulations and causing financial harm to investors
  - id: finance-C-156
    when: When selling products or services derived from VectorBT
    action: Offer VectorBT-derived software or consulting services for commercial fee without proper licensing exception from
      the author
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Commercial use violates Apache 2.0 with Commons Clause license, exposing the organization to legal liability
      and copyright infringement claims
  - id: finance-C-158
    when: When creating record arrays for trades, positions, or other financial records
    action: Include 'id' (record index) and 'col' (column index) fields in the structured NumPy array
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Records class cannot properly index and map records to columns, breaking all record-based analysis
  - id: finance-C-161
    when: When organizing column-based data structures in VectorBT
    action: Use 2D NumPy arrays internally with rows representing time and columns representing assets
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Vectorized operations and portfolio simulation will fail since all internal functions expect 2D array format
  - id: finance-C-177
    when: When implementing data ingestion and symbol processing in backtesting
    action: Align each symbol data to a shared temporal index using align_index/align_columns before performing matrix operations
      — verify each symbol shares the same datetime index
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without index alignment, element-wise operations across symbols fail or produce incorrect results due to
      misaligned timestamps, causing silent data corruption in backtest calculations
    derived_from_bd_id: BD-001
  - id: finance-C-190
    when: When implementing position sizing logic
    action: Use SizeType enum values (Amount/Value/Percent/TargetPercent/TargetValue) instead of string-based types to verify
      IDE autocomplete support and prevent typo-related bugs
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: String-based position sizing types without enum validation are typo-prone and lack IDE support, causing runtime
      errors that could halt backtesting or produce incorrect position sizes
    derived_from_bd_id: BD-012
  - id: finance-C-191
    when: When defining record type schemas for analysis and visualization
    action: 'Define field_config for each record type containing required metadata: name, title, and mapping properties to
      enable auto-generated documentation and interactive visualization'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing field_config definitions break auto-generated documentation and UI visualization, making it difficult
      to interpret backtest results and analyze strategy performance
    derived_from_bd_id: BD-016
  - id: finance-C-204
    when: When implementing ATR (Average True Range) volatility calculations
    action: 'Use True Range calculation: max(high-low, |high-prev_close|, |low-prev_close|) — this comprehensive approach
      captures overnight gaps and limit moves'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using simplified high-low range ignores overnight gaps and limit moves; for gap-prone assets like A-shares,
      this underestimates volatility by 15-30%, causing ATR-based strategies to generate wrong entry/exit signals
    derived_from_bd_id: BD-070
  - id: finance-C-216
    when: When implementing signal generation logic for production trading
    action: Use the bshift function to shift signals backward in time for live trading signal generation - bshift is designed
      for backtesting signal alignment only and creates look-ahead bias when applied to real-time contexts
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: bshift accesses future information by shifting signals backward in time; using it in live trading causes
      the system to make decisions based on data not yet available, making backtest results completely non-reproducible in
      live trading
    derived_from_bd_id: BD-113
  regular:
  - id: finance-C-005
    when: When downloading data from Yahoo Finance source
    action: Use YFData as a reliable production data source
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: 'Yahoo Finance data is unstable: it may be manipulated, contain noise, or return missing data points (e.g.,
      zero volume). Using this for live trading produces incorrect signals and financial losses. The warning explicitly states
      it is for demonstration only.'
    stage_ids:
    - data_ingestion
  - id: finance-C-006
    when: When fetching OHLCV data from a CCXT exchange
    action: Verify the exchange supports fetchOHLCV capability before downloading
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Calling download_symbol on an exchange without fetchOHLCV support raises ValueError. The system cannot proceed
      without verifying capability first, causing download failure and breaking the entire data pipeline.
    stage_ids:
    - data_ingestion
  - id: finance-C-007
    when: When using exchange data with emulated OHLCV capability
    action: Accept that emulated candles differ from real exchange-captured candles
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Emulated OHLCV candles are reconstructed from trades, not directly captured from the exchange. This introduces
      data quality differences that may affect indicator calculations and trading signal accuracy. A warning is issued to
      alert users.
    stage_ids:
    - data_ingestion
  - id: finance-C-009
    when: When handling missing_index parameter in align operations
    action: Configure missing_index handling explicitly (nan, drop, or raise) based on trading requirements
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Default missing_index='nan' silently fills gaps with NaN values. This causes indicators to produce NaN results
      for missing periods, leading to no trading signals during market gaps or exchange downtime. Using 'raise' prevents silent
      data corruption.
    stage_ids:
    - data_ingestion
  - id: finance-C-010
    when: When updating Data with new market data
    action: Align new data to existing index using same missing_index strategy
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Update operation concatenates old and new data (line 653). Without proper alignment, mismatched indexes cause
      index duplication issues (line 654 removes duplicates) and potential signal misalignment in subsequent portfolio simulation.
    stage_ids:
    - data_ingestion
  - id: finance-C-011
    when: When aligning columns across multiple symbols
    action: Handle column mismatches using missing_columns setting (nan, drop, or raise)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Default missing_columns='raise' throws ValueError if symbols have different columns. Silent 'nan' or 'drop'
      modes may cause indicator failures when expected columns are missing, leading to incomplete portfolio analysis.
    stage_ids:
    - data_ingestion
  - id: finance-C-012
    when: When providing different kwargs for different symbols
    action: Wrap per-symbol kwargs in symbol_dict container for the download method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without symbol_dict wrapper, same kwargs are passed to all symbols. This breaks multi-symbol downloads where
      each symbol requires different parameters (e.g., different start dates for symbols with different listing dates).
    stage_ids:
    - data_ingestion
  - id: finance-C-013
    when: When working with timezone-aware market data
    action: Specify tz_localize or tz_convert to normalize timezone handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: DatetimeIndex operations without timezone handling cause inconsistent time representations. Default tz_localize=get_utc_tz()
      (vectorbt/_settings.py:162-163) converts naive indexes to UTC. Mixing timezone-aware and naive indexes causes comparison
      errors in portfolio simulation.
    stage_ids:
    - data_ingestion
  - id: finance-C-015
    when: When requiring index frequency for time-series operations
    action: Set explicit freq parameter during download for consistent time-series frequency
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without explicit frequency, inferred_freq may be None for irregular data. This breaks time-series operations
      that depend on frequency (e.g., resample, rolling windows) and causes errors in indicator calculations.
    stage_ids:
    - data_ingestion
  - id: finance-C-016
    when: When implementing custom indicator functions with rolling windows
    action: Set minp parameter to match the window size to verify minimum data points before output begins
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect minp setting causes premature non-NaN values in rolling calculations, breaking the standard 'window
      size data points before valid output' domain invariant and corrupting early-indicator backtests
    stage_ids:
    - indicators
  - id: finance-C-018
    when: When defining apply_func outputs in from_apply_func
    action: Verify each output array has exactly the same shape as the input array
    severity: high
    kind: domain_rule
    modality: must
    consequence: Shape mismatch between outputs and inputs causes broadcast errors during concatenation, producing incorrect
      multi-index column structures for parameter combinations
    stage_ids:
    - indicators
  - id: finance-C-019
    when: When implementing custom_func in from_custom_func
    action: Verify output arrays have columns equal to input_columns × parameter_combinations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect output column count breaks multi-index column structure, causing parameter scanning to produce
      misaligned or corrupted DataFrames
    stage_ids:
    - indicators
  - id: finance-C-020
    when: When using IndicatorFactory with TA-Lib integration
    action: Install TA-Lib library before using from_talib method
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing TA-Lib dependency causes ImportError when attempting to create TA-Lib-based indicators
    stage_ids:
    - indicators
  - id: finance-C-021
    when: When broadcasting large parameter grids to input arrays
    action: Use keep_raw=True in broadcast_kwargs to avoid materializing huge intermediate arrays
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Broadcasting without keep_raw=True causes massive memory consumption for large parameter grids, potentially
      crashing the process
    stage_ids:
    - indicators
  - id: finance-C-022
    when: When running indicators with many repeated parameter combinations
    action: Enable run_unique=True to avoid redundant calculations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without run_unique=True, identical parameter combinations are recalculated multiple times, wasting computational
      resources and slowing backtests
    stage_ids:
    - indicators
  - id: finance-C-023
    when: When using backward-fill operations (bfill) on time series
    action: Use bfill functions in production indicator calculations
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: bfill operations look ahead to future values, introducing look-ahead bias that causes live trading results
      to differ significantly from backtests
    stage_ids:
    - indicators
  - id: finance-C-024
    when: When using labels/future indicators for feature generation
    action: Use look-ahead indicator functions from labels module for building model features
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Look-ahead indicators introduce look-ahead bias into ML models, causing real-time predictions to underperform
      compared to backtested feature effectiveness
    stage_ids:
    - indicators
  - id: finance-C-026
    when: When running indicator with multiple parameter values
    action: Verify multi-index columns correctly represent each parameter combinations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect multi-index column structure causes misaligned parameter results, making it impossible to correctly
      analyze parameter sensitivity
    stage_ids:
    - indicators
  - id: finance-C-027
    when: When re-running indicator with identical parameters
    action: Return cached results without recalculating when using from_apply_func with cache_func
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without caching, identical parameter combinations are repeatedly recalculated, causing unnecessary computation
      and inconsistent results for the same inputs
    stage_ids:
    - indicators
  - id: finance-C-032
    when: When setting the wait parameter in future look-ahead indicators
    action: Set wait >= 1 to exclude current value from future value calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: wait=0 includes current bar data in future calculations, creating look-ahead bias that corrupts signal validity
      in live trading scenarios
    stage_ids:
    - indicators
  - id: finance-C-033
    when: When implementing indicators with random components
    action: Set seed parameter to verify reproducible results
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without seed, random components produce different outputs each run, preventing result reproducibility and
      making backtest validation impossible
    stage_ids:
    - indicators
  - id: finance-C-039
    when: When using wait parameter in exit signal generation
    action: set wait=0 or wait=False in production backtests
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Setting wait to 0 or False allows entry and exit signals to occur at the same timestamp, violating the 'No
      conflicting signals at same timestamp' acceptance criterion and breaking backtest integrity.
    stage_ids:
    - signal_generation
  - id: finance-C-041
    when: When using bshift for signal processing
    action: recognize that bshift(-n) = pd.shift(n) and this operation looks ahead into future data
    severity: high
    kind: domain_rule
    modality: must
    consequence: bshift is an explicit look-ahead operation. Using it without understanding the temporal shift can create
      false confidence in backtest results when the same logic fails in live trading.
    stage_ids:
    - signal_generation
  - id: finance-C-042
    when: When using until_next=False in exit generation
    action: implement explicit tracking mechanism to correlate exits with their corresponding entries
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: When until_next=False, the exit-to-entry association becomes ambiguous. Without tracking, backtest metrics
      (trade duration, PnL per trade) become unreliable and may corrupt performance analysis.
    stage_ids:
    - signal_generation
  - id: finance-C-043
    when: When requiring non-conflicting signals at the same timestamp
    action: enable pick_first=True to select only the first signal when multiple candidates exist
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without pick_first=True, multiple signals at the same timestamp create ambiguous portfolio states. The backtest
      cannot resolve whether to enter, exit, or do both, leading to undefined behavior.
    stage_ids:
    - signal_generation
  - id: finance-C-046
    when: When implementing signal generation with stop-loss or take-profit
    action: place signaling logic at the very end of the bar processing to prevent look-ahead bias
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Stop price hits invalidate other signals at the same bar. If signaling logic uses future-available data within
      the bar, it introduces look-ahead bias causing unrealistic backtest performance.
    stage_ids:
    - signal_generation
  - id: finance-C-047
    when: When using skip_until_exit=True in exit generation
    action: implement explicit entry-exit pairing logic as the system cannot track which exit belongs to which entry
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: skip_until_exit skips entry processing until next exit, making entry-exit correlation impossible. Without
      explicit pairing logic, trade-level metrics become unreliable.
    stage_ids:
    - signal_generation
  - id: finance-C-048
    when: When generating signals from 2D arrays
    action: 'use 2-dimensional arrays (shape: rows x columns) as vectorbt treats matrices as first-class citizens'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Most signal functions expect 2D arrays where axis 0 is time/index and axis 1 is columns. Using 1D arrays
      without the _1d suffix causes shape mismatches and crashes.
    stage_ids:
    - signal_generation
  - id: finance-C-049
    when: When implementing signal cleaning for entry/exit pairs
    action: pass exactly one or two arrays to the clean function; passing more raises ValueError
    severity: medium
    kind: domain_rule
    modality: must
    consequence: The clean function only accepts 1 or 2 arrays (signals alone or entry+exit pairs). Passing wrong number of
      arrays causes ValueError exception.
    stage_ids:
    - signal_generation
  - id: finance-C-050
    when: When using trailing stop with wait > 0
    action: recognize that trailing stop will not update at bars before the wait period
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: When exit_wait > 0 with trailing stops, the trailing level remains fixed during the wait period. This can
      result in exits that trigger later than expected in volatile markets.
    stage_ids:
    - signal_generation
  - id: finance-C-060
    when: When configuring portfolio simulation parameters
    action: set max_orders to accommodate expected number of orders to prevent IndexError
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient max_orders causes IndexError when order count exceeds allocation, terminating simulation with
      no results
    stage_ids:
    - portfolio_simulation
  - id: finance-C-061
    when: When enabling order logging in portfolio simulation
    action: set max_logs to accommodate expected number of log entries to prevent IndexError
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient max_logs causes IndexError when log count exceeds allocation, terminating simulation with incomplete
      diagnostic records
    stage_ids:
    - portfolio_simulation
  - id: finance-C-064
    when: When using SizeType.Percent for order sizing
    action: account for fees and slippage in percentage calculations as these are not known beforehand in live trading
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Percentage-based sizing that ignores fees/slippage executes more orders than intended, reducing final portfolio
      value below expected levels in live execution
    stage_ids:
    - portfolio_simulation
  - id: finance-C-065
    when: When implementing custom order_func_nb callbacks
    action: issue replacement orders after rejection in the same callback function
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Attempting to resubmit orders within the rejection callback causes undefined behavior as the order processing
      cycle has already advanced
    stage_ids:
    - portfolio_simulation
  - id: finance-C-066
    when: When controlling order execution sequence within segments
    action: use call_seq to define custom order execution order for sell-before-buy or capital constraint scenarios
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Default call sequence processes columns left-to-right without considering capital dependencies, potentially
      causing sell orders to fail when buy orders consume available cash first
    stage_ids:
    - portfolio_simulation
  - id: finance-C-067
    when: When implementing pre_segment or post_segment hooks
    action: perform group-level operations like rebalancing through the segment lifecycle hooks
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing segment hooks for group-level operations causes state inconsistencies as position and cash updates
      happen out of expected order
    stage_ids:
    - portfolio_simulation
  - id: finance-C-068
    when: When using Portfolio.from_signals or from_orders for simulation
    action: claim backtest results represent expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest returns as guaranteed live trading results misleads users about expected performance,
      ignoring real-world factors like execution latency, slippage variation, and market impact
    stage_ids:
    - portfolio_simulation
  - id: finance-C-069
    when: When presenting portfolio simulation results
    action: claim simulated execution proves real trading capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Simulated order fills use ideal or slightly adjusted prices that do not reflect actual market conditions,
      order queue position, or fill probability in live trading
    stage_ids:
    - portfolio_simulation
  - id: finance-C-070
    when: When using reject_prob to simulate order rejections
    action: set raise_reject=True only when rejection should halt the entire simulation
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using raise_reject=True without understanding that rejected orders terminate simulation leads to unexpected
      early termination with incomplete results
    stage_ids:
    - portfolio_simulation
  - id: finance-C-073
    when: When handling short selling with lock_cash disabled
    action: allow free_cash to become negative when shorting without cash lock
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Negative free_cash from unlocked short selling indicates one column used collateral from another column in
      cash sharing mode, violating capital isolation assumptions
    stage_ids:
    - portfolio_simulation
  - id: finance-C-082
    when: When implementing custom record types
    action: use field_config as the replaceable point for field definitions and mappings
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Custom record types cannot define field metadata declaratively without field_config, breaking auto-generated
      docs and UI
    stage_ids:
    - records_analysis
  - id: finance-C-083
    when: When sorting Records for performance
    action: pre-sort records by column index to enable col_range optimization path
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Unsorted records use slower col_map path instead of optimized col_range; ColumnMapper falls back to nb.col_map_select_nb
    stage_ids:
    - records_analysis
  - id: finance-C-086
    when: When accessing drawdown metrics without filtering
    action: query 'recovered' attribute explicitly to exclude active drawdowns
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Performance metrics are skewed by including unresolved active drawdowns, leading to overestimated portfolio
      recovery
    stage_ids:
    - records_analysis
  - id: finance-C-087
    when: When calculating trade statistics with incl_open parameter
    action: pass incl_open=True explicitly if open trades/positions should be included in metrics
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Default incl_open=False excludes active positions from win_rate, profit_factor, expectancy, and SQN calculations
    stage_ids:
    - records_analysis
  - id: finance-C-088
    when: When calculating drawdown statistics with incl_active parameter
    action: pass incl_active=True explicitly to include active drawdowns in max_dd and avg_dd
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Default incl_active=False excludes unresolved drawdowns from max_drawdown and avg_drawdown calculations
    stage_ids:
    - records_analysis
  - id: finance-C-089
    when: When analyzing trade PnL sums across record types
    action: verify entry_trades.pnl.sum() equals exit_trades.pnl.sum() equals positions.pnl.sum()
    severity: high
    kind: operational_lesson
    modality: must
    consequence: PnL inconsistency indicates bug in trade aggregation; wrong sums lead to incorrect performance reporting
    stage_ids:
    - records_analysis
  - id: finance-C-090
    when: When grouping drawdown statistics
    action: group active_drawdown, active_duration, active_recovery metrics
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Grouping active drawdown metrics raises ValueError; active-only metrics require per-column computation
    stage_ids:
    - records_analysis
  - id: finance-C-093
    when: When presenting backtested PnL results
    action: claim simulated trade PnL equals expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not account for slippage, liquidity constraints, or market impact; live trading returns
      will differ materially
    stage_ids:
    - records_analysis
  - id: finance-C-094
    when: When using active drawdown metrics for decision-making
    action: treat active drawdown status as final portfolio performance indicator
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Active drawdowns are unresolved; portfolio may recover or deepen before closure; current drawdown is not
      final
    stage_ids:
    - records_analysis
  - id: finance-C-095
    when: When reporting trade win rate and profit factor
    action: present incl_open=False metrics as inclusive of each positions
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Metrics exclude open positions by default; reporting them as complete ignores unresolved trades
    stage_ids:
    - records_analysis
  - id: finance-C-100
    when: When calculating Value at Risk (VaR)
    action: use percentile corresponding to cutoff probability (100 * cutoff) from the left tail of returns distribution
    severity: high
    kind: domain_rule
    modality: must
    consequence: VaR must represent the loss threshold at a given confidence level (e.g., 5% VaR means 95% confidence losses
      won't exceed threshold); using wrong percentile calculation produces incorrect risk measurement
    stage_ids:
    - performance_metrics
  - id: finance-C-101
    when: When calculating Conditional VaR (CVaR/Expected Shortfall)
    action: compute mean of returns below the VaR cutoff threshold, not just the VaR value itself
    severity: high
    kind: domain_rule
    modality: must
    consequence: CVaR measures average loss beyond VaR threshold; returning only VaR understates tail risk and provides incomplete
      picture of extreme loss scenarios
    stage_ids:
    - performance_metrics
  - id: finance-C-102
    when: When using year_freq for annualization
    action: set year_freq to 252 for stock markets (252 trading days) or 365 for crypto markets (365 calendar days)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using wrong year_freq produces incorrect annualized metrics; 252 vs 365 difference causes ~5% error in annualization
      factor, leading to incorrect cross-asset performance comparisons
    stage_ids:
    - performance_metrics
  - id: finance-C-104
    when: When calculating Sortino ratio
    action: compute downside deviation using only returns below required_return threshold, not full standard deviation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sortino ratio measures return per unit of downside risk; using total volatility instead of downside deviation
      misrepresents risk-adjusted performance and inflates the ratio
    stage_ids:
    - performance_metrics
  - id: finance-C-105
    when: When initializing ReturnsAccessor
    action: accept only pre-calculated return series, not raw price data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: ReturnsAccessor is designed for return series; passing raw prices produces incorrect metric calculations
      since cumulative/product operations assume returns as input
    stage_ids:
    - performance_metrics
  - id: finance-C-107
    when: When using default year_freq configuration
    action: recognize that default year_freq of 365 days is specified for crypto but not for stock markets
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Default year_freq of 365 days assumes continuous trading; stocks trade 252 days/year so using default produces
      underestimated annualization factor by ~4.5%
    stage_ids:
    - performance_metrics
  - id: finance-C-108
    when: When computing Sharpe/Sortino/beta with insufficient data
    action: return NaN when returns have fewer than 2 observations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Statistical metrics require minimum sample size; returning values with 0-1 data points produces undefined
      or infinite results that corrupt downstream analysis
    stage_ids:
    - performance_metrics
  - id: finance-C-109
    when: When computing rolling performance metrics
    action: enforce minimum periods (minp) threshold to avoid metric instability with sparse data
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Rolling metrics with very few valid observations produce noisy/infinite values; minp parameter prevents instability
      by requiring minimum valid data points in window
    stage_ids:
    - performance_metrics
  - id: finance-C-110
    when: When calculating alpha
    action: annualize the mean excess return minus beta-adjusted benchmark excess return using compound formula (1 + mean)^ann_factor
      - 1
    severity: high
    kind: domain_rule
    modality: must
    consequence: Alpha must represent excess return above CAPM-predicted return; using simple arithmetic instead of geometric
      annualization underestimates true annualized alpha
    stage_ids:
    - performance_metrics
  - id: finance-C-111
    when: When using benchmark-requiring metrics without benchmark returns
    action: raise warning or error when alpha/beta/information_ratio/capture metrics are requested without benchmark_rets
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Benchmark-relative metrics require benchmark returns; computing without them produces NaN or misleading absolute
      metrics instead of relative performance
    stage_ids:
    - performance_metrics
  - id: finance-C-112
    when: When computing Calmar ratio with zero or positive drawdown
    action: return positive infinity for Calmar ratio when max_drawdown equals zero
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Strategy with zero maximum drawdown has infinite risk-adjusted return by definition; returning NaN or 0 misrepresents
      the exceptional risk characteristics
    stage_ids:
    - performance_metrics
  - id: finance-C-113
    when: When presenting backtested performance metrics
    action: claim that backtested Sharpe/Sortino/Calmar ratios guarantee equivalent live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtested metrics reflect idealized execution without slippage, latency, or liquidity constraints; presenting
      them as guaranteed live results violates regulatory standards and user expectations
    stage_ids:
    - performance_metrics
  - id: finance-C-114
    when: When computing rolling performance metrics
    action: use same ann_factor throughout rolling window calculation to maintain temporal consistency
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Annualization factor must remain constant across all rolling windows; variable ann_factor during calculation
      produces inconsistent metric scaling and invalid cross-period comparisons
    stage_ids:
    - performance_metrics
  - id: finance-C-115
    when: When handling NaN values in return series
    action: ignore NaN values in each statistical calculations using nan-aware NumPy functions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing return data should not corrupt entire metric calculation; NaN propagation would produce misleading
      NaN results for entire series when only sparse data is missing
    stage_ids:
    - performance_metrics
  - id: finance-C-120
    when: When defining metric names in the metrics Config
    action: use duplicate metric names without unique suffixes when multiple metrics share the same name
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Duplicate metric titles cause warnings and data overwriting in the returned stats DataFrame/Series
    stage_ids:
    - statistics_plotting
  - id: finance-C-124
    when: When calculating stats on grouped data
    action: use metrics that are compatible with grouped data or use the is_not_grouped filter to exclude them
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Metrics that do not support grouped data produce incorrect or undefined results when applied to grouped analysis
    stage_ids:
    - statistics_plotting
  - id: finance-C-125
    when: When overriding stats_defaults in a subclass
    action: return a dict-like configuration that includes freq from wrapper when no other settings exist
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing frequency information causes metrics that depend on freq to fail or produce incorrect time-based
      calculations
    stage_ids:
    - statistics_plotting
  - id: finance-C-127
    when: When implementing a metric that requires frequency
    action: use the has_freq filter to verify the metric is only calculated when frequency is set
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Metric produces invalid results or crashes when frequency is not set on the wrapped data
    stage_ids:
    - statistics_plotting
  - id: finance-C-128
    when: When calling .stats() with multiple columns and no aggregation function
    action: pass agg_func=None to get a DataFrame with one column per metric instead of aggregated Series
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default aggregation with np.mean may produce misleading single-value summary instead of detailed per-column
      results
    stage_ids:
    - statistics_plotting
  - id: finance-C-129
    when: When displaying statistics in a non-interactive environment
    action: use the silence_warnings parameter to suppress warnings about missing metrics or data
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Unsuppressed warnings may interrupt automated pipelines or appear in log files unnecessarily
    stage_ids:
    - statistics_plotting
  - id: finance-C-130
    when: When rendering plots in Jupyter notebooks
    action: call fig.show() or return the plotly Figure object for display
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Plots do not render automatically in non-notebook environments or when show() is not called
    stage_ids:
    - statistics_plotting
  - id: finance-C-133
    when: When using the .stats() method
    action: claim that backtest statistics represent actual live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results are simulated based on historical data and do not account for slippage, liquidity constraints,
      or market impact that occur in live trading
    stage_ids:
    - statistics_plotting
  - id: finance-C-134
    when: When presenting portfolio simulation results
    action: claim that simulated wallet/portfolio balances will be achieved in live trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Simulated balances use idealized fills at specified prices without accounting for partial fills, order rejections,
      or market gaps that occur in live trading
    stage_ids:
    - statistics_plotting
  - id: finance-C-135
    when: When using the default aggregation function np.mean
    action: apply mean aggregation without understanding that it may mask significant variance across columns
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Mean aggregation across multiple strategy instances can hide poor-performing strategies within an overall
      positive average
    stage_ids:
    - statistics_plotting
  - id: finance-C-136
    when: When configuring the group_by parameter for stats or plots
    action: verify the grouper configuration supports the requested grouping operation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid group_by parameter causes KeyError or incorrect grouping behavior in statistics and plots
    stage_ids:
    - statistics_plotting
  - id: finance-C-137
    when: When implementing custom post_calc_func for a metric
    action: verify the function returns a value compatible with the calc_func return type requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: post_calc_func that returns incompatible types causes downstream type checking to fail
    stage_ids:
    - statistics_plotting
  - id: finance-C-138
    when: When resolving calc_func via attribute path
    action: verify the attribute path exists and is accessible on the object instance
    severity: high
    kind: domain_rule
    modality: must
    consequence: AttributeError raised when the specified calc_func path cannot be resolved on the object
    stage_ids:
    - statistics_plotting
  - id: finance-C-139
    when: When implementing plot_func that modifies the figure in-place
    action: write traces to the supplied fig object rather than creating and returning a new figure
    severity: high
    kind: domain_rule
    modality: must
    consequence: plot_func that returns a new figure instead of modifying the supplied fig causes the plot to be lost or incomplete
    stage_ids:
    - statistics_plotting
  - id: finance-C-141
    when: When implementing a custom metric calculator
    action: modify the original object state during calculation
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Mutating the object during metric calculation corrupts cached state and produces inconsistent results on
      subsequent calls
    stage_ids:
    - statistics_plotting
  - id: finance-C-143
    when: When passing price data to the portfolio simulator
    action: Verify close price arrays have consistent datetime index and float64 dtype across each symbols
    severity: high
    kind: domain_rule
    modality: must
    consequence: Portfolio simulation may produce incorrect trade records and position valuations when price arrays have mismatched
      indexes, causing financial calculation errors in PnL and returns
  - id: finance-C-144
    when: When passing signal arrays to signals accessor methods
    action: Verify signal arrays have boolean dtype (np.bool_) as required by SignalsAccessor
    severity: high
    kind: domain_rule
    modality: must
    consequence: Signals accessor will raise AssertionError when processing non-boolean arrays, causing the signal processing
      pipeline to fail
  - id: finance-C-145
    when: When extracting order_records and trade_records from portfolio simulation
    action: Pass order_records and position data with consistent init_cash values used during simulation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Returns calculation will produce incorrect financial metrics when init_cash used for returns differs from
      init_cash used during simulation, causing misreported Sharpe ratio, total return, and other performance metrics
  - id: finance-C-146
    when: When calculating performance metrics from portfolio returns
    action: Set frequency (freq) on the returns DataFrame/Series before computing Sharpe ratio, Calmar ratio, and other time-dependent
      metrics
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Annualization calculations will produce NaN or infinite values when freq is not set, causing key performance
      metrics to be missing or invalid
  - id: finance-C-147
    when: When passing indicator outputs to signal generation or portfolio simulation
    action: Handle NaN values in indicator outputs that appear in initial lookback periods before passing to signal processing
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Trading signals generated from NaN indicator values will produce false signals at the beginning of backtests,
      causing incorrect trade execution and inflated/deflated returns
  - id: finance-C-149
    when: When calculating alpha, beta, and benchmark-related metrics
    action: Provide benchmark_rets when requesting stats that depend on benchmark comparisons (alpha, beta, benchmark_return)
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Alpha and beta metrics will be reported as NaN or trigger UserWarning when benchmark returns are not provided,
      preventing proper risk-adjusted performance assessment
  - id: finance-C-150
    when: When simulating portfolio with stop-loss or take-profit orders
    action: Use the close price array from the same data source for both signal generation and order execution to verify consistent
      valuation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Stop-loss and take-profit orders will execute at incorrect prices when using different price arrays for signals
      versus execution, causing position sizing and PnL calculations to be inconsistent with actual trading
  - id: finance-C-151
    when: When broadcasting input arrays to indicators and portfolio simulator
    action: Verify each input arrays share compatible shapes through vectorbt's broadcasting system before passing to computational
      stages
    severity: high
    kind: domain_rule
    modality: must
    consequence: Portfolio simulation will fail with shape mismatch errors or produce incorrect results when arrays of different
      shapes are passed without proper broadcasting
  - id: finance-C-153
    when: When creating multi-index record structures for visualization
    action: Flatten multi-index labels using to_flat_index() before passing to Plotly visualization functions
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Plotly visualization will fail with errors when receiving MultiIndex labels from parameter-swept backtests,
      preventing generation of performance charts and heatmaps
  - id: finance-C-154
    when: When using yfinance or similar external data sources
    action: Account for data delay (yfinance has 15-minute delay for US stocks) when comparing backtest timing to live trading
      expectations
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Backtest execution timing will be inaccurate when assuming real-time data availability, causing execution
      price discrepancies between simulated and live trading
  - id: finance-C-155
    when: When validating portfolio simulation results
    action: Skip validation checks or assume backtest results are correct without cross-verifying with benchmark calculations
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Incorrect backtest implementation will go undetected, leading to false confidence in trading strategies and
      potential financial losses when deploying strategies based on invalid backtests
  - id: finance-C-157
    when: When implementing financial calculations that require floating-point comparison
    action: Use the global float tolerance defaults (rel_tol=1e-9, abs_tol=1e-12) defined in is_close_nb for position/cash/debt
      zero checks
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Trades and positions may fail to close properly due to accumulated floating-point errors causing improper
      zero-value detection
  - id: finance-C-159
    when: When performing timedelta calculations on time-indexed data
    action: Set the freq attribute on ArrayWrapper to enable timedelta calculations between index entries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Time-based calculations such as trade duration, drawdown period, and performance metrics will fail or produce
      incorrect results
  - id: finance-C-160
    when: When implementing or using Wrapping subclasses (Portfolio, Indicators, Signals, etc.)
    action: Support .iloc/.loc indexing that returns a new instance of the same class with transformed data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Pandas-style indexing will fail, breaking data selection, grouping, and portfolio analysis operations
  - id: finance-C-162
    when: When defining column groups for grouped operations
    action: Verify group columns are coherent and sorted in ascending order (such as [0, 0, 1, 2, 2, ...])
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: get_group_lens_nb raises ValueError and all grouped portfolio operations fail
  - id: finance-C-163
    when: When processing signals and stop orders at the same bar
    action: Execute stop signals BEFORE user-defined signals when they occur at the same time step
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Look-ahead bias occurs when using closing price with stop orders - the stop signal must be evaluated first
      to avoid using future information
  - id: finance-C-164
    when: When using bshift (backward shift) function on signal or price arrays
    action: Use bshift output as features for strategy generation without understanding it looks ahead into future information
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Backtest equity curve exhibits look-ahead bias causing live trading returns to fall far below backtested
      results
  - id: finance-C-165
    when: When using labels/indicators module functions for building ML features
    action: Use labels.nb functions directly as features without understanding they may introduce look-ahead bias
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Machine learning model trained on look-ahead biased features will fail in live trading with degraded prediction
      accuracy
  - id: finance-C-166
    when: When executing many sequential buy/sell transactions in the portfolio simulator
    action: Be aware of floating-point rounding error accumulation that may prevent positions from closing properly
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Positions fail to close due to accumulated rounding errors (e.g., sum of 0.1 repeated 1M times has +1.33e-06
      error), causing incorrect performance metrics
  - id: finance-C-167
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-168
    when: When presenting or reporting this system's simulated portfolio results
    action: Present simulated wallet/dry-run results as proof of real execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users trust the system for live trading before adequate validation, leading to unexpected losses when execution
      realities differ from simulation
  - id: finance-C-169
    when: When marketing or describing VectorBT's capabilities
    action: Claim VectorBT supports production trading systems requiring real-time order execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users building production trading systems based on this claim will experience critical failures due to lack
      of real-time execution infrastructure
  - id: finance-C-170
    when: When marketing or describing VectorBT's capabilities
    action: Claim VectorBT supports strategies requiring sub-bar granularity or complex order types
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting TWAP/VWAP, conditional orders, or iceberg orders will have unsupported expectations leading
      to implementation failures
  - id: finance-C-171
    when: When marketing or describing VectorBT's capabilities
    action: Claim VectorBT supports high-frequency trading where latency matters more than research speed
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users building HFT systems will face critical latency issues as VectorBT is optimized for research speed,
      not execution latency
  - id: finance-C-172
    when: When marketing or describing VectorBT's capabilities
    action: Claim VectorBT supports market microstructure modeling
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting market microstructure modeling will face critical capability gaps causing significant financial
      analysis errors
  - id: finance-C-173
    when: When marketing or describing VectorBT's capabilities
    action: Claim VectorBT supports regulatory reporting requirements
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users relying on VectorBT for compliance reporting face regulatory violations due to missing reporting infrastructure
  - id: finance-C-174
    when: When using or distributing VectorBT
    action: Acknowledge that this software is for educational purposes only and use it at your own risk
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Failure to acknowledge the educational purpose may lead to misuse in production environments and potential
      regulatory/legal issues
  - id: finance-C-175
    when: When implementing signal generation in backtesting
    action: Use Numba-compiled signal generation functions (vectorbt/signals/nb.py) for hot path processing — do not replace
      with pure Python row-by-row iteration
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Replacing Numba signals with pure Python iteration causes backtesting to become prohibitively slow for large
      datasets with millions of rows, making interactive parameter scanning infeasible
    derived_from_bd_id: BD-007
  - id: finance-C-176
    when: When using the framework's default slippage parameter for backtesting
    action: Verify that slippage=0.0 matches the expected execution assumptions for the strategy; if the strategy trades liquid
      assets with negligible market impact, the default is acceptable; otherwise adjust slippage to reflect realistic market
      conditions
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using zero slippage default causes backtest results to overestimate returns by assuming orders execute at
      reported prices without market impact; live trading will incur actual slippage causing performance gap
    derived_from_bd_id: BD-026
  - id: finance-C-178
    when: When calculating annualized returns using the framework's default parameters
    action: 'Verify year_freq matches the actual data frequency: use ''365 days'' for calendar-day data or ''252 days'' for
      trading-day data — default ''365 days'' is only valid for daily calendar data'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using wrong year_freq causes incorrect annualization of returns; 365 vs 252 day difference introduces ~30%
      error in annualized metrics, distorting strategy performance comparisons
    derived_from_bd_id: BD-112
  - id: finance-C-179
    when: When using risk-free rate and levy_alpha default parameters
    action: Verify risk_free=0.0 and levy_alpha=2.0 match the strategy's assumptions; for Sharpe/Sortino calculations, explicitly
      set risk_free to the current benchmark rate; for tail risk analysis, validate levy_alpha against historical return distributions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default zero risk-free rate underestimates Sharpe ratios when benchmark yields are positive; default levy_alpha=2.0
      assumes normal distribution which underestimates tail risk for assets with fat tails
    derived_from_bd_id: BD-112
  - id: finance-C-180
    when: When concatenating multi-symbol data
    action: Use the concat method returning dict keyed by column name for O(1) symbol lookup — do not flatten to a single
      DataFrame requiring O(n) column search
    severity: high
    kind: domain_rule
    modality: must
    consequence: Converting dict-based symbol storage to flat DataFrame causes O(n) column search overhead for symbol access,
      degrading performance for portfolios with many symbols
    derived_from_bd_id: BD-003
  - id: finance-C-181
    when: When implementing parameter scanning across multiple parameter combinations
    action: Use multi-index columns to organize parameter combinations — each parameter combo must occupy its own column level
      enabling vectorized broadcasting across the parameter space
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Splitting parameter combinations into separate DataFrames loses vectorization benefits, causing O(n) overhead
      for each param combo instead of O(1) matrix operations across the entire parameter space
    derived_from_bd_id: BD-005
  - id: finance-C-182
    when: When implementing order execution within a time segment
    action: Configure call_seq to define explicit execution order within each segment — verify sell orders are processed before
      buy orders for capital-constrained strategies requiring sell-before-buy precedence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using default sequential execution order causes buy orders to consume capital before sells release it, potentially
      triggering margin calls or rejected orders in live pairs trading
    derived_from_bd_id: BD-013
  - id: finance-C-184
    when: When loading or using models and data in production backtesting pipelines
    action: Assume the framework automatically binds model and data versions - version snapshot binding is not implemented
      and must be handled externally
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without version snapshot binding, production backtests may run with mismatched model-data versions, causing
      subtle result drift that is difficult to diagnose and potentially leading to incorrect trading decisions
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-185
    when: When setting up data ingestion and model loading in production backtesting pipelines
    action: Implement external version tracking by capturing model checksum (e.g., SHA256 of model artifact) and data version/timestamp
      at pipeline initialization, storing them alongside backtest results for audit trail and reproducibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without external version tracking, production incidents cannot be traced to specific model-data version combinations,
      making debugging and regulatory compliance significantly harder
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-192
    when: When using the framework's default reject_prob=0.0 parameter for backtesting
    action: Verify that reject_prob=0.0 matches actual market microstructure — for live trading scenarios, adjust reject_prob
      to match actual fill probability based on order type, market conditions, and liquidity
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Default reject_prob=0.0 assumes all orders fill without rejection, but in live trading orders can be rejected
      due to price gaps, liquidity constraints, or exchange rules; strategies appearing profitable in backtest may be untradeable
      in live markets
    derived_from_bd_id: BD-032
  - id: finance-C-193
    when: When using the framework's default lock_cash=False parameter for backtesting
    action: Explicitly verify that lock_cash=False aligns with your risk tolerance — if margin exposure must be controlled,
      set lock_cash=True and only enable margin/short strategies with explicit configuration
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Default lock_cash=False permits negative cash balances enabling margin and short positions without explicit
      enablement; in live trading, insufficient margin triggers margin calls or forced liquidation with potential losses exceeding
      initial capital
    derived_from_bd_id: BD-033
  - id: finance-C-194
    when: When calculating returns using the framework's returns functions
    action: 'Use percentage change returns formula: (current_price - previous_price) / previous_price, with zero division
      returning 0 or NaN — do not use log returns (ln(Pt/Pt-1)) as the primary format'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using log returns when the framework expects percentage change will cause systematic miscalculation of cumulative
      returns, Sharpe ratio, max drawdown, and other performance metrics, leading to incorrect strategy evaluation
    derived_from_bd_id: BD-092
  - id: finance-C-195
    when: When implementing or modifying the Trades class for trade duration analysis
    action: Maintain Trades class inheritance from Ranges — the duration analysis, coverage statistics, and overlap calculations
      depend on Range parent class functionality; do not refactor to standalone implementation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Trades class relies on Range inheritance for duration analysis; breaking this inheritance (e.g., making Trades
      standalone) will cause loss of coverage, duration, and overlap statistics, breaking trade analysis functionality
    derived_from_bd_id: BD-018
  - id: finance-C-196
    when: When implementing or modifying the Drawdowns class for peak-to-recovery analysis
    action: Maintain Drawdowns class inheritance from Ranges — the peak-to-recovery analysis, coverage statistics, and duration
      calculations depend on Range parent class functionality; do not refactor to standalone implementation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Drawdowns class relies on Range inheritance for peak-to-recovery analysis; breaking this inheritance (e.g.,
      making Drawdowns standalone) will cause loss of coverage and duration statistics, breaking drawdown analysis functionality
    derived_from_bd_id: BD-019
  - id: finance-C-197
    when: When implementing signal generation logic that may produce contradictory signals within the same bar
    action: Implement each five ConflictMode options (Ignore, Entry, Exit, Adjacent, Opposite) to handle contradictory signals
      — do not simplify, remove, or change conflict resolution modes as they handle essential signal management
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect conflict mode selection or removal of conflict resolution modes causes contradictory signals to
      be mishandled, potentially triggering unintended trades in the wrong direction or missing valid trading signals
    derived_from_bd_id: BD-043
  - id: finance-C-198
    when: When implementing signal conflict resolution in order generation
    action: Process exit signals before entry signals when both are present simultaneously — maintain stop_conflict_mode='exit'
      to verify stop-loss orders execute before new position entries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Processing entry signals before exits creates unintended leverage by opening new positions before stops close
      existing ones; in live trading, insufficient margin causes order rejection and portfolio exposure exceeds risk limits
    derived_from_bd_id: BD-060
  - id: finance-C-199
    when: When implementing price data preprocessing in backtesting pipelines
    action: Replace NaN close prices with forward-filled values from previous bars — fillna_close=True only applies to valuation
      calculations, not to actual execution price determination
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using forward-filled prices for trade execution introduces look-ahead bias; strategy enters positions at
      prices that would not have been available at signal time, making backtest results non-reproducible in live trading
    derived_from_bd_id: BD-062
  - id: finance-C-200
    when: When implementing moving average calculations for signal generation
    action: Use SMA (simple moving average) with equal weighting across lookback periods — ewm=False ensures each price observation
      contributes equally to the MA value
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Switching from SMA to EMA changes indicator sensitivity by exponentially weighting recent prices; crossover
      strategies produce different timing signals, causing strategy behavior to diverge from original design expectations
    derived_from_bd_id: BD-066
  - id: finance-C-201
    when: When implementing MACD indicator calculations
    action: Use standard MACD configuration with fast_period=12, slow_period=26, signal_period=9 — these parameters define
      MACD line, signal line, and histogram calculations per Gerald Appel's specification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing MACD periods alters signal sensitivity and crossover frequency; strategies calibrated for 12/26/9
      produce materially different signals with alternative configurations, causing backtest-live divergence
    derived_from_bd_id: BD-069
  - id: finance-C-202
    when: When calculating annualized performance metrics such as Sharpe ratio
    action: Verify year_freq=365 days matches the intended annualization approach; if calculating trading-year metrics, adjust
      to 252 days to reflect actual trading days in most markets
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default year_freq=365 underestimates annualized returns and Sharpe ratio by ~30% compared to 252-day calculation;
      strategies appear less attractive than warranted, leading to suboptimal allocation decisions
    derived_from_bd_id: BD-052
  - id: finance-C-203
    when: When calculating risk-adjusted performance metrics such as Sharpe ratio or Sortino ratio
    action: Verify risk_free=0.0 matches the intended benchmark rate; for accurate risk-adjusted metrics, set to current market
      rate (e.g., 10-year treasury yield) in the same currency as the strategy
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Zero risk-free rate inflates Sharpe ratios by not subtracting the risk-free baseline return; strategies appear
      more attractive relative to safe alternatives, potentially causing over-allocation to risky strategies
    derived_from_bd_id: BD-053
  - id: finance-C-205
    when: When implementing EWM (Exponential Weighted Moving) standard deviation
    action: Derive EWM standard deviation from EWM covariance formula using the same decay parameter as the mean — verify
      statistical coherence by sharing exponential weights between mean and variance calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using naive EWM-std with separate mean calculations introduces statistical incoherence; the mean and standard
      deviation use different exponential weights, causing inconsistent volatility estimates that distort risk-adjusted performance
      metrics
    derived_from_bd_id: BD-088
  - id: finance-C-206
    when: When implementing Information Ratio for performance evaluation
    action: Calculate Information Ratio as Mean(active_return) / Std(active_return) using active return std (tracking error)
      in denominator — do not use simplified total return std
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using total return std instead of tracking error in the denominator misrepresents risk-adjusted outperformance;
      the strategy may appear to have high Sharpe but low benchmark-relative performance, leading to wrong allocation decisions
    derived_from_bd_id: BD-095
  - id: finance-C-207
    when: When implementing signal generation logic
    action: Respect wait_period (minimum bars between signals) and pick_first (deterministic ordering for equal candidates)
      constraints — do not remove or randomize these controls
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing wait_period causes signal overtrading with excessive entries/exits on short-term noise; random pick_first
      breaks determinism and makes results non-reproducible; both changes inflate backtest returns while degrading live performance
      through transaction costs
    derived_from_bd_id: BD-097
  - id: finance-C-208
    when: When implementing trade PnL calculation logic in backtesting
    action: 'Use size-weighted average prices for PnL calculation: PnL = (Exit_Avg_Price - Entry_Avg_Price) * Position_Size.
      Do not use FIFO or LIFO cost basis methods without explicit configuration.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching to FIFO or LIFO changes cost basis calculation methodology, causing PnL reports to diverge from
      actual trading results and making performance attribution inaccurate
    derived_from_bd_id: BD-098
  - id: finance-C-209
    when: When calculating variance or standard deviation for financial returns
    action: Use ddof=0 (population variance) for indicator calculations and ddof=1 (sample variance) for returns calculations.
      Do not mix ddof values inconsistently across these domains.
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using inconsistent ddof values across calculations introduces systematic statistical bias, causing risk metrics
      like volatility to be misestimated and leading to incorrect portfolio risk assessments
    derived_from_bd_id: BD-099
  - id: finance-C-210
    when: When implementing order execution sequence in portfolio simulation
    action: Execute sell orders first at each bar to release capital before executing buy orders. Ensure no reliance on intraday
      credit or leverage for order execution.
    severity: high
    kind: domain_rule
    modality: must
    consequence: Executing buy orders before sells creates hidden leverage when capital is insufficient; in live trading,
      buy orders may be rejected due to insufficient funds, causing backtest-live inconsistency
    derived_from_bd_id: BD-100
  - id: finance-C-211
    when: When implementing signal processing logic at each bar
    action: Process stop signals first with temporal priority over user-generated signals at the same bar index. Do not process
      user signals before or simultaneously with stop signals.
    severity: high
    kind: domain_rule
    modality: must
    consequence: User signals processed before stops may override protective risk management decisions, allowing unauthorized
      positions to accumulate and losses to exceed intended limits
    derived_from_bd_id: BD-101
  - id: finance-C-212
    when: When resolving signal conflicts in portfolio simulation
    action: Apply the ConflictMode enum hierarchy for deterministic signal resolution. Do not average or merge competing boolean
      signals—use the enum-defined precedence rules.
    severity: high
    kind: domain_rule
    modality: must
    consequence: Averaging or merging conflicting boolean signals creates ambiguous execution states with non-deterministic
      behavior, causing backtest results that cannot be reliably reproduced
    derived_from_bd_id: BD-105
  - id: finance-C-213
    when: When configuring signal generation parameters for backtesting
    action: Verify that signal_direction='longonly' matches the intended strategy design. For bidirectional strategies requiring
      short exposure, explicitly set signal_direction to 'both' or 'shortonly'.
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using the long-only default for a strategy requiring short exposure causes all short entry signals to be
      silently ignored, producing backtest returns that significantly diverge from actual strategy intent
    derived_from_bd_id: BD-063
  - id: finance-C-214
    when: When configuring portfolio groups with shared capital allocation
    action: Set init_cash at the group level, not per column. Columns within a group share the group's init_cash proportionally
      based on their position sizing.
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting init_cash per column without proper group-level configuration creates ambiguous capital allocation,
      causing over-allocation or under-allocation of capital across grouped strategies
    derived_from_bd_id: BD-064
  - id: finance-C-215
    when: When calculating RSI indicator for strategy entry/exit signals
    action: Use Wilder's smoothing method (EMA-based with smoothing factor 1/period) for RSI calculation. Do not substitute
      with SMA-based RSI as it produces different overbought/oversold threshold crossings.
    severity: high
    kind: domain_rule
    modality: must
    consequence: SMA-based RSI introduces higher noise compared to Wilder's smoothing, causing different threshold crossings
      at 30/70 levels and changing entry/exit timing decisions that significantly affect strategy performance
    derived_from_bd_id: BD-067
  - id: finance-C-217
    when: When configuring multi-asset backtesting with cash_sharing enabled
    action: Verify correct group-level init_cash specification and verify group boundaries are coherent - validate that CallSeqType.Auto
      reordering produces expected sell-before-buy cash release within each bar
    severity: high
    kind: domain_rule
    modality: must
    consequence: Enabling cash_sharing with CallSeqType.Auto creates cross-asset cash dependencies where released cash from
      sells is immediately available for buys; misconfigured group boundaries cause cash availability calculations to silently
      propagate incorrect values through the simulation
    derived_from_bd_id: BD-117
  - id: finance-C-218
    when: When implementing reversal strategies with stop signals
    action: Validate that stop signals firing in the same bar as new entries do not cause unintended position reductions -
      review ConflictMode hierarchy to verify protective actions are not over-prioritized for reversal patterns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stop signals have temporal priority and exit signals win conflicts; when combined with ConflictMode hierarchy,
      protective actions systematically take precedence, causing reversal strategies to suffer unintended position reductions
      when stops fire in the same bar as new entries
    derived_from_bd_id: BD-118
  - id: finance-C-219
    when: When comparing volatility estimates from indicators with risk metrics
    action: Use consistent DDOF (degrees of freedom) across each statistical calculations - indicators must use ddof=1 if
      metrics use ddof=1, or explicitly document when DDOF differs between indicator calculations and risk metric calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Indicators use ddof=0 (population variance) while metrics use ddof=1 (sample variance); Bollinger Bands use
      population std while Sharpe Ratio uses sample std, causing band widths and risk estimates to be calculated differently,
      making strategies appear more or less risky than actual
    derived_from_bd_id: BD-122
  - id: finance-C-220
    when: When using the Stochastic Oscillator indicator
    action: Verify that %K window period (default N) and %D smoothing period (typically 3) match the intended strategy - fast
      %K (raw) provides more signals while slow %K (smoothed) reduces noise but delays crossovers
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The Stochastic Oscillator formulation captures momentum relative to N-period high-low range; using fast %K
      produces more frequent crossovers than slow %K, causing strategies to generate false signals or miss actual momentum
      shifts if the wrong smoothness level is chosen
    derived_from_bd_id: BD-071
  - id: finance-C-221
    when: When computing Sharpe Ratio across different data frequencies
    action: Apply sqrt(ann_factor) to volatility for annualization but do NOT apply sqrt to returns - returns are already
      annualized through compounding while volatility scales with sqrt of time
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sharpe Ratio annualization uses sqrt(ann_factor) for volatility (vol scales with sqrt of time) but not for
      returns (compounding already annualizes); applying sqrt to returns incorrectly inflates the Sharpe value while omitting
      sqrt from volatility understates risk
    derived_from_bd_id: BD-072
  - id: finance-C-222
    when: When computing Sortino Ratio for risk-adjusted performance
    action: Use semi-deviation (downside deviation) of negative returns only, not full standard deviation - semi-deviation
      measures harmful volatility (drawdowns) separately from beneficial upside
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sortino Ratio replaces standard deviation with semi-deviation to capture only downside volatility; using
      full std instead of semi-deviation includes upside volatility, overstating risk for strategies with positive skew and
      making Sortino equivalent to a lower Sharpe Ratio
    derived_from_bd_id: BD-073
  - id: finance-C-223
    when: When computing Omega Ratio for non-normal return distributions
    action: Verify that the threshold parameter (default 0 = MAR) matches the strategy's minimum acceptable return target
      - Omega captures the entire return distribution unlike Sharpe which assumes normality
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Omega Ratio calculates probability-weighted ratio of gains to losses below threshold; if threshold is misaligned
      with strategy targets, the ratio misrepresents actual risk-adjusted performance, especially for hedge fund strategies
      with fat-tailed distributions
    derived_from_bd_id: BD-074
  - id: finance-C-224
    when: When computing Value at Risk for risk management
    action: Use empirical percentile (historical VaR) rather than parametric assumptions - the percentile threshold (typically
      1%, 5%, 10%) defines the loss boundary that is exceeded with specified probability based on actual return distribution
      shape
    severity: high
    kind: domain_rule
    modality: must
    consequence: Historical VaR uses empirical percentile capturing actual tail shape without normality assumption; using
      parametric VaR with fat-tailed distributions underestimates tail risk by 20-50%, causing insufficient capital reserves
      and potential margin calls during market stress
    derived_from_bd_id: BD-076
  - id: finance-C-225
    when: When implementing or modifying order execution logic in backtesting
    action: 'Apply slippage as fixed percentage of price: buy_at = price * (1 + slippage), sell_at = price * (1 - slippage).
      Do not attempt to implement volume-dependent or volatility-scaled slippage models unless market microstructure data
      (order book depth, spread distribution) is explicitly available in the dataset'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Modifying slippage to volume-dependent or volatility-scaled models without supporting market microstructure
      data causes the framework to produce non-reproducible backtest results that cannot be validated against actual execution
      quality in live trading
    derived_from_bd_id: BD-090
  - id: finance-C-226
    when: When calculating risk-adjusted performance metrics (Sharpe, Sortino, Calmar) for equity strategies
    action: Set Year_freq=252 for stock/ETF strategies to align with industry benchmarks. Reserve Year_freq=365 only for continuous-asset
      strategies (crypto, forex). Verify annualization matches the asset class convention before comparing to external benchmarks
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using 365-day annualization for equity strategies understates Sharpe ratios by sqrt(365/252) ≈ 1.2x, causing
      strategies to appear 20% worse than industry benchmarks which use 252-day convention. Users may abandon viable strategies
      based on misleading comparisons
    derived_from_bd_id: BD-115
  - id: finance-C-227
    when: When configuring multi-asset portfolio backtesting with group-based column handling
    action: Only enable cash_sharing=true after explicitly confirming intentional cross-asset capital pooling across columns
      within each group. When cash_sharing=false, each asset maintains isolated cash balance. Document group structure before
      enabling cash sharing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Enabling cash_sharing=true creates cross-asset cash flow dependencies where one asset's trades affect another
      asset's available capital. Strategies that appear profitable when analyzed independently may fail or show different
      behavior when cash sharing couples their capital pools, causing unexpected order rejections or over-leveraging
    derived_from_bd_id: BD-106
  - id: finance-C-228
    when: When implementing order fill and quantity allocation logic in portfolio backtesting
    action: Implement roundtrip tolerance validation for order quantities using compile_tolerance_nb, deriving tolerance threshold
      from min_size. Validate that accumulated floating-point rounding errors do not cause order rejection or invalid fills
    severity: medium
    kind: domain_rule
    modality: must
    consequence: 'Without tolerance validation, accumulated floating-point rounding errors cause micro-transaction failures:
      orders for small quantities are rejected due to precision mismatch, or fills execute at slightly different quantities
      than specified. This creates silent backtest-live discrepancy where small-position trades fail in live trading while
      backtests show successful execution'
    derived_from_bd_id: BD-110
  - id: finance-C-229
    when: When setting up portfolio backtesting with default parameters
    action: 'Replace zero-slippage and zero-fee defaults with realistic cost parameters (minimum recommended: 0.001 round-trip).
      Enable stop-loss mechanisms unless testing pure momentum hypothesis. Set Year_freq=252 for equity strategies'
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Combined zero-slippage, zero-fees, disabled stops, and long-only defaults create an unrealistic frictionless
      trading environment. Strategies that appear profitable under these conditions may be completely unviable when realistic
      costs and risk controls are applied, inflating Sharpe ratios by 20-50% or more and causing live trading returns to fall
      far below backtested results
    derived_from_bd_id: BD-114
  - id: finance-C-230
    when: When computing annualized metrics for stock/ETF backtesting strategies
    action: Override the default Year_freq=365 with Year_freq=252 for equity strategies to match financial industry convention.
      Verify that Sharpe, Sortino, and Calmar ratios use the same annualization factor as the benchmark being compared
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Year_freq=365 annualization systematically understates equity risk-adjusted returns by sqrt(365/252) ≈ 1.2x,
      creating misleading comparisons with industry benchmarks that use 252 trading days. Strategies may appear inferior when
      they meet or exceed benchmark performance on a properly annualized basis
    derived_from_bd_id: BD-093
  - id: finance-C-231
    when: When processing data for backtesting where point-in-time correctness is required
    action: Assume the framework automatically enforces point-in-time data correctness — the framework does not implement
      point-in-time (PIT) data validation; historical data may contain look-ahead bias
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without PIT enforcement, backtests may use data that wasn't available at the simulation time, causing look-ahead
      bias that inflates returns by 5-20% in volatile periods
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-232
    when: When ingesting historical data for backtesting
    action: Implement point-in-time data verification by comparing data timestamps against the simulation point — filter or
      flag records where timestamp > simulation_time to prevent look-ahead contamination
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without PIT verification, strategies using event-driven data (earnings, splits) will incorporate information
      before it was publicly available, creating unrealistic backtest performance
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-233
    when: When processing live or near-real-time data feeds
    action: Assume the framework automatically detects and handles stale data — the framework does not implement staleness
      detection; stale data is treated as fresh without warning
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: When data feeds miss updates, stale values propagate through calculations undetected, causing positions to
      be managed based on outdated prices and leading to losses in fast-moving markets
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-234
    when: When monitoring data feed health during live trading or near-real-time backtesting
    action: Implement staleness detection by comparing data timestamp against expected_update_interval — flag or halt processing
      when data_age exceeds threshold (e.g., 5 minutes for intraday data)
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Without staleness checks, trading decisions continue based on stale prices after feed interruptions, potentially
      executing trades at prices that no longer exist in the market
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-235
    when: When computing technical indicators (MACD, RSI, Bollinger Bands, etc.)
    action: Use TA-Lib, pandas-ta, or ta library functions for indicator calculations — do not implement custom pure-Python
      indicator logic; these libraries provide optimized implementations validated against industry benchmarks
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Pure-Python reimplementations run 10-100x slower and may introduce numerical precision errors, causing indicators
      to diverge from expected values and signal generation to produce incorrect entries/exits
    derived_from_bd_id: BD-006
  - id: finance-C-236
    when: When implementing signal generation where multiple conditions may trigger at the same timestamp
    action: Use pick_first conflict resolution when multiple signals occur simultaneously — select the signal with the lowest
      condition index to verify deterministic, reproducible behavior
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without pick_first semantics, signal resolution becomes non-deterministic across runs, causing backtest results
      to vary between executions and making strategy behavior unpredictable in production
    derived_from_bd_id: BD-008
  - id: finance-C-237
    when: When aligning signals across different time periods using shift operations
    action: Use bshift(n) for backward shift and fshift(n) for forward shift — bshift(-n) equals pd.shift(n); fshift(n) equals
      pd.shift(-n); do not use pd.shift directly for signal alignment
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using pd.shift directly causes sign confusion errors where signals are shifted in the opposite direction
      than intended, leading to entries/exits occurring on wrong dates and destroying strategy performance
    derived_from_bd_id: BD-009
  - id: finance-C-238
    when: When implementing risk metric calculations for time-series analysis in portfolio backtesting
    action: Use rolling window variants for time-series risk metrics (e.g., rolling_sharpe_ratio, rolling_sortino_ratio) to
      capture regime changes; point-in-time-only metrics are insufficient for dynamic strategy evaluation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using only point-in-time metrics misses time-varying risk dynamics, leading to incorrect strategy evaluation
      and significant losses when market regimes shift without detection
    derived_from_bd_id: BD-022
  - id: finance-C-239
    when: When implementing metric and plot definitions in vectorbt framework
    action: Use config-driven metric and plot definitions via vectorbt._settings; hardcoded definitions prevent runtime customization
      and theming without subclassing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hardcoded metric definitions block runtime customization and theming capabilities, forcing users to subclass
      for simple configuration changes
    derived_from_bd_id: BD-024
  - id: finance-C-240
    when: When implementing position building and scaling logic in portfolio simulation
    action: Use proper AccumulationMode enum values (Disabled, Both, AddOnly, RemoveOnly) to control whether positions can
      grow or shrink over time; accumulation affects position building but NOT exit-only position reduction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect accumulation mode causes position sizing to diverge from expected strategy behavior, leading to
      materially different backtest results and live trading losses
    derived_from_bd_id: BD-044
  - id: finance-C-241
    when: When implementing short position tracking and debt calculation in portfolio simulation
    action: 'Calculate short debt using average entry cost formula: debt = abs(position) * avg_entry_price; use average cost
      method rather than FIFO lot tracking for debt calculation'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using FIFO debt tracking instead of average cost causes margin calculations to diverge from broker practices,
      potentially triggering incorrect margin calls or allowing unauthorized trades
    derived_from_bd_id: BD-047
  - id: finance-C-242
    when: When configuring portfolio simulation with cash_sharing parameter
    action: Verify cash_sharing setting matches strategy requirements before running backtests; cash_sharing=False enables
      independent cash per column for parallel strategy testing without cross-contamination; cash_sharing affects group-level
      constraints only
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Incorrect cash_sharing setting causes cross-contamination between strategy columns or prevents proper capital
      sharing in group-level constraints, silently distorting backtest results
    derived_from_bd_id: BD-034
  - id: finance-C-243
    when: When using the framework's default sl_stop parameter for backtesting
    action: Verify that sl_stop=np.nan (no stop loss by default) matches strategy intent; if stop loss is needed, explicitly
      set sl_stop to the desired threshold value
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Default sl_stop=np.nan disables stop loss entirely, so backtested strategies show performance without risk
      controls; live trading with stop loss will have different results, causing backtest-live inconsistency
    derived_from_bd_id: BD-035
  - id: finance-C-244
    when: When using bshift for signal alignment combined with stop loss or trailing stop signals in backtesting
    action: Verify that bshift usage does not create look-ahead bias when combined with stop signals receiving temporal priority;
      review signal construction to verify no exploitation of future data through the bshift+stop interaction
    severity: medium
    kind: domain_rule
    modality: should
    consequence: bshift provides future information access for signal alignment, and combined with stop signals receiving
      temporal priority, strategies can exploit future data creating dangerous look-ahead bias that systematically inflates
      backtest returns
    derived_from_bd_id: BD-116
  - id: finance-C-245
    when: When defining custom record types or extending the framework for structured array operations
    action: Verify custom record types include 'id' and 'col' fields as required by ArrayWrapper integration and structured
      array storage; these fields are enforced requirements but validation occurs at runtime
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Records without 'id' and 'col' fields cause silent failures until downstream operations execute at runtime,
      creating delayed bug discovery that may corrupt data processing pipelines
    derived_from_bd_id: BD-120
  - id: finance-C-246
    when: When implementing or configuring risk management parameters for a backtesting strategy
    action: Verify that the default tp_stop=np.nan (no take profit) matches strategy intent — for mean-reversion strategies,
      explicitly set a take profit threshold to avoid positions running indefinitely and distorting backtest results
    severity: medium
    kind: domain_rule
    modality: should
    consequence: With tp_stop=np.nan by default, positions remain open until stop-loss or signal reversal, allowing oversized
      winners to reverse and distort mean-reversion strategy performance metrics
    derived_from_bd_id: BD-036
  - id: finance-C-247
    when: When calculating Deflated Sharpe Ratio for strategy performance evaluation
    action: Verify that return distributions are approximately normal using statistical tests (skewness near 0, kurtosis near
      3); if non-normality is detected, must_not use normal-distribution-based deflated_sharpe_ratio and should implement
      non-parametric bootstrap methods instead
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using normal-distribution-based Deflated Sharpe Ratio on non-normal returns systematically overestimates
      strategy performance by 15-30%, leading to overconfidence in backtest results and poor capital allocation decisions
      in live trading
    derived_from_bd_id: BD-084
  - id: finance-C-248
    when: When implementing options pricing or Greeks calculation in backtesting
    action: Assume the framework provides volatility surface interpolation capability — the framework does not implement this
      feature; single-tenor or flat-volatility assumptions will be used instead
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without volatility surface interpolation, multi-strike options pricing relies on flat or single-point volatility,
      causing systematic pricing errors of 5-20% for out-of-the-money options and incorrect Greeks hedging
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-249
    when: When implementing options pricing or Greeks calculation in backtesting
    action: 'Implement volatility surface interpolation using cubic spline or SABR model to interpolate implied volatility
      across strikes and maturities; required fields: spot_price, strike_prices[], tenor/expiry_dates[], implied_volatilities
      matrix'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without volatility surface interpolation, multi-strike options pricing relies on flat or single-point volatility,
      causing systematic pricing errors of 5-20% for out-of-the-money options and incorrect Greeks hedging
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-250
    when: When calibrating options pricing models to market data in backtesting
    action: Assume the framework provides model calibration residual analysis — the framework does not implement this feature;
      calibration quality must be assessed manually or through external tools
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without calibration residual tracking, systematic model mis-specification goes undetected, causing persistent
      pricing biases that accumulate over time and degrade strategy performance
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-251
    when: When calibrating options pricing models to market data in backtesting
    action: 'Implement calibration residual tracking by computing and logging differences between model prices and observed
      market prices for each calibration point; required fields: model_price, market_price, timestamp, strike, tenor for each
      calibration observation'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without calibration residual tracking, systematic model mis-specification goes undetected, causing persistent
      pricing biases that accumulate over time and degrade strategy performance
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-252
    when: When implementing multi-agent trading systems with independent agent signals in backtesting
    action: Assume the framework provides multi-agent decision consensus mechanisms — the framework does not implement this
      feature; conflicting agent signals will be processed without automated resolution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without multi-agent consensus, conflicting agent signals result in unpredictable system behavior, potential
      race conditions in order generation, and backtest-live inconsistency when agents disagree
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-253
    when: When implementing multi-agent trading systems with independent agent signals in backtesting
    action: 'Implement a consensus mechanism for resolving conflicting agent signals using majority voting, confidence-weighted
      aggregation, or conflict resolution protocol; required implementation: consensus_score = sum(agent_signal * confidence_weight)
      / sum(confidence_weight) with threshold-based execution'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without multi-agent consensus, conflicting agent signals result in unpredictable system behavior, potential
      race conditions in order generation, and backtest-live inconsistency when agents disagree
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-254
    when: When using symmetric return threshold functions (get_symmetric_pos_th_nb, get_symmetric_neg_th_nb) for trend labeling
    action: Verify that input returns are arithmetic (not logarithmic) — log returns already have inherent symmetry so explicit
      symmetric calculation produces incorrect threshold pairs
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using symmetric threshold functions with log returns miscalculates recovery thresholds by ~0.69% per unit,
      causing bullish/bearish labels to be systematically inverted for volatile assets and corrupting downstream ML training
      data
    derived_from_bd_id: BD-LBL-001
  - id: finance-C-255
    when: When encoding binary trend labels (bn_trend_labels_nb) with multi-column DataFrames
    action: Verify column ordering is preserved as expected — alphabetical sorting of column names causes 0=H-L (bearish)
      and 1=L-H (bullish) labels to appear in unexpected column positions, breaking alignment with original data
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Alphabetical column sorting misaligns trend labels with their corresponding price series, causing bearish/bullish
      labels to be attributed to the wrong assets and producing incorrect backtest signals
    derived_from_bd_id: BD-LBL-002
  - id: finance-C-256
    when: When applying local extrema detection (local_extrema_apply_nb) to 2D arrays
    action: Verify that flex_2d=True behavior matches requirements — when strict per-column application is needed with 2D
      arrays, explicitly set flex_2d=False to verify thresholds are applied column-wise rather than broadcasting
    severity: medium
    kind: domain_rule
    modality: should
    consequence: With flex_2d=True, threshold arrays broadcast across dimensions instead of applying per-column, causing extrema
      labels to be computed against the wrong reference values and producing incorrect trend signals
    derived_from_bd_id: BD-LBL-003
  - id: finance-C-257
    when: When generating labels using future_mean/std/min/max functions (future_mean_apply_nb, etc.)
    action: Verify that wait=1 matches the prediction horizon requirements — for studying longer-term patterns, set wait >
      1 to look ahead beyond the immediately next period
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Default wait=1 generates labels only for the immediate next bar, missing medium-term patterns and causing
      momentum or mean-reversion strategies optimized for wait=1 to underperform on multi-day holding periods
    derived_from_bd_id: BD-LBL-004
  - id: finance-C-258
    when: When using EWM calculations (via future_mean_apply_nb and similar) in label generation
    action: Verify that adjust=False behavior is acceptable for early period NaN handling — for mathematically precise exponentially-weighted
      weights in early windows, set adjust=True to avoid division-by-zero correction issues
    severity: medium
    kind: domain_rule
    modality: should
    consequence: With adjust=False, EWM weights in early window periods are not normalized, causing exponentially-weighted
      labels to be systematically biased and producing inaccurate mean/std/min/max estimates that corrupt strategy signals
    derived_from_bd_id: BD-LBL-005
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
