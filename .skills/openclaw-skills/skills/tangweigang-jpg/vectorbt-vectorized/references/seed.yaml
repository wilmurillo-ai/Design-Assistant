  required_objects:
    business_decisions_count: 140
    fatal_constraints_count: 70
    non_fatal_constraints_count: 180
    use_cases_count: 23
    semantic_locks_count: 12
    preconditions_count: 4
    evidence_quality_rules_count: 2
