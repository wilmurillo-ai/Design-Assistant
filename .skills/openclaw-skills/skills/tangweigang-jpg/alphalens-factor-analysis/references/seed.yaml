resources:
  packages:
  - name: numpy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: matplotlib
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: seaborn
    version_pin: latest
  - name: statsmodels
    version_pin: latest
  - name: IPython
    version_pin: latest
  - name: empyrical-reloaded
    version_pin: latest
  - name: pyfolio-reloaded
    version_pin: latest
  - name: zipline-reloaded
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy
    - python3 -m pip install pandas
    - python3 -m pip install matplotlib
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When aligning factor and price data for forward returns computation
    action: verify factor and prices DatetimeIndex share identical timezone
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatched timezones cause NonMatchingTimezoneError and produce incorrect forward return calculations, leading
      to flawed factor analysis results
    stage_ids:
    - data_preparation
  - id: finance-C-002
    when: When constructing factor_data output
    action: use MultiIndex with levels named 'date' (level 0) and 'asset' (level 1)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream functions relying on MultiIndex levels named 'date' and 'asset' will fail or produce incorrect
      results when index structure is non-compliant
    stage_ids:
    - data_preparation
  - id: finance-C-003
    when: When naming forward return columns
    action: use pd.Timedelta-compatible format (e.g., 1D, 5D, 30m, 3h15m)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-compliant column names cause get_forward_returns_columns pattern matching to fail, resulting in missing
      forward returns in analysis
    stage_ids:
    - data_preparation
  - id: finance-C-005
    when: When dropping NaN values during data cleaning
    action: exceed max_loss threshold (default 35%) of original factor entries
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Excessive data loss invalidates statistical significance of factor analysis; MaxLossExceededError prevents
      silent data degradation
    stage_ids:
    - data_preparation
  - id: finance-C-007
    when: When providing price data to compute_forward_returns
    action: include price entries extending beyond factor period by at least max(periods) timestamps
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Insufficient price buffer causes NaN forward returns for final periods; shift(-period) indexing exceeds available
      price data
    stage_ids:
    - data_preparation
  - id: finance-C-009
    when: When computing forward returns
    action: use prices that reflect entry price AFTER factor observation (not prices used in factor computation)
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Using factor-computed prices for forward returns introduces look-ahead bias; factor should be observed at
      timestamp N while forward return starts from N+1
    stage_ids:
    - data_preparation
  - id: finance-C-011
    when: When calling get_clean_factor_and_forward_returns
    action: pass factor as MultiIndex Series with levels [date, asset]
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Non-MultiIndex factor input causes AttributeError on .index.levels[0] access; required for factor_dateindex
      extraction
    stage_ids:
    - data_preparation
  - id: finance-C-021
    when: When implementing Information Coefficient computation using Spearman correlation
    action: use Spearman rank correlation (stats.spearmanr) instead of Pearson correlation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Pearson correlation fails to capture non-linear monotonic relationships between factor and forward returns,
      causing valid alpha factors to be incorrectly rejected during factor screening
    stage_ids:
    - performance_analysis
  - id: finance-C-023
    when: When computing factor portfolio weights for a dollar-neutral long-short portfolio
    action: normalize weights so that the sum of absolute values equals 1.0 (gross leverage of 1)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Failure to normalize to gross leverage of 1.0 results in unbounded portfolio exposure, potentially causing
      unlimited financial losses or margin calls in live trading
    stage_ids:
    - performance_analysis
  - id: finance-C-025
    when: When computing alpha and beta via factor_alpha_beta function
    action: use OLS regression from statsmodels with t-statistics for significance testing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect regression methodology produces unreliable alpha/beta estimates, causing investors to over- or
      under-weight factors based on statistically insignificant results
    stage_ids:
    - performance_analysis
  - id: finance-C-026
    when: When computing forward returns from price data
    action: use shift(-period) to correctly align future prices with current factor values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using shift(period) instead of shift(-period) introduces look-ahead bias, causing future information to be
      used in historical analysis and producing backtests that cannot be replicated in live trading
    stage_ids:
    - performance_analysis
  - id: finance-C-028
    when: When implementing Information Coefficient computation
    action: use Pearson correlation as a substitute for Spearman correlation
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Pearson correlation is sensitive to outliers and assumes linear relationships, producing incorrect IC values
      for factors with non-linear but monotonic relationships to returns
    stage_ids:
    - performance_analysis
  - id: finance-C-030
    when: When implementing the weighting_scheme replaceable point
    action: verify the replacement scheme produces weights where abs().sum() equals 1.0 for gross leverage normalization
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Custom weighting schemes that don't normalize to gross leverage of 1.0 produce portfolios with uncontrolled
      leverage, risking margin calls or regulatory violations
    stage_ids:
    - performance_analysis
  - id: finance-C-034
    when: When evaluating factors with small or near-zero IC values
    action: skip statistical significance testing (t-statistics) based on IC magnitude alone
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Small IC values may be statistically significant while large IC values may be due to chance, leading to incorrect
      factor selection decisions without proper significance testing
    stage_ids:
    - performance_analysis
  - id: finance-C-055
    when: When computing vertical_sections for GridFigure layout
    action: use integer arithmetic when calculating rows to prevent matplotlib GridSpec error
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: 'GridSpec requires integer values for rows and cols. Fractional row calculations cause ValueError: GridSpec
      index must be int, resulting in plots that fail to render with overlapping or missing subplots.'
    stage_ids:
    - reporting
  - id: finance-C-056
    when: When building GridFigure with column layout
    action: enforce column boundary check in next_cell() before accessing GridSpec index
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Accessing GridSpec with out-of-bounds column index raises IndexError, causing tear sheet rendering to crash.
      The boundary check at line 48-50 ensures wrapping to next row before accessing the grid.
    stage_ids:
    - reporting
  - id: finance-C-067
    when: When presenting backtest results from tear sheets
    action: claim that historical factor performance guarantees future returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting tear sheet results as predictive guarantees violates basic quantitative finance principles. Alphalens
      analyzes historical factor behavior which does not ensure persistence in live trading due to market regime changes,
      transaction costs, and slippage not modeled in the analysis.
    stage_ids:
    - reporting
  - id: finance-C-070
    when: When constructing factor_data DataFrames for Alphalens analysis
    action: Use MultiIndex with levels ordered as ['date', 'asset'] (date level first, asset level second)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Alphalens functions expect MultiIndex in specific level order; mismatched ordering causes index alignment
      errors and incorrect performance metrics computation
  - id: finance-C-071
    when: When creating forward return columns in factor_data
    action: Name forward return columns using pd.Timedelta-compatible string format matching regex ^(\d+([D|h|m|s|ms|us|ns]))+$
      (e.g., '1D', '5D', '30m', '3h15m')
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Column name parsing fails silently, forward returns are not detected, and all performance metrics produce
      NaN or empty results
  - id: finance-C-072
    when: When providing factor and prices data to Alphalens
    action: Verify factor DatetimeIndex and prices DatetimeIndex have identical timezone (or both are timezone-naive)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Timezone mismatch causes NonMatchingTimezoneError at runtime, preventing any analysis from completing
  - id: finance-C-076
    when: When interpreting or providing return data to Alphalens
    action: Express returns as decimals where 0.01 represents 1% return (not as percentages like 1.0 or basis points like
      100)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Return values interpreted with wrong scale cause all performance metrics to be off by a factor of 100, producing
      meaningless analysis results
  - id: finance-C-077
    when: When computing portfolio weights from factor values
    action: Normalize portfolio weights to gross leverage of 1.0 by dividing by the sum of absolute weight values (weights.abs().sum()
      == 1.0)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unnormalized weights create incorrect position sizing, leading to portfolio returns that do not match the
      intended long-short or long-only strategy exposure
  - id: finance-C-078
    when: When aligning factor data with price data for forward return computation
    action: Verify factor timestamps precede or equal the price timestamps used for forward return calculation (no look-ahead
      bias)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Factor timestamps that lag behind price data cause look-ahead bias, where the analysis uses future information
      to generate past signals, invalidating all performance conclusions
  - id: finance-C-085
    when: When implementing factor return alignment in backtesting to prevent lookahead bias
    action: Apply shift(-period) to forward returns to align future returns backward with current factor signal dates — this
      ensures only information available at signal time is used for portfolio construction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Removing the shift operation introduces lookahead bias where future returns are used to evaluate current
      signals, causing backtest results to be non-reproducible in live trading and overestimating alpha by 5-20% in high-turnover
      strategies
    derived_from_bd_id: BD-006
  - id: finance-C-088
    when: When computing quantile turnover for transaction cost estimation and rebalancing decisions
    action: Define quantile turnover as the proportion of new names entering or exiting each quantile (normalized by quantile
      size) — absolute security counts must not be used as they do not normalize for cardinality differences across quantiles
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using absolute counts instead of proportions causes transaction cost estimates to be incomparable across
      quantiles, leading to suboptimal rebalancing decisions and unexpected portfolio turnover in live trading
    derived_from_bd_id: BD-037
  - id: finance-C-092
    when: When implementing or extending factor analysis functions that accept demeaned (long_short) and group_adjust (group_neutral)
      parameters
    action: Verify demeaned and group_adjust parameters propagate consistently across each functions in the analysis pipeline
      — if one function applies these adjustments, each relevant functions must apply them identically to maintain portfolio
      construction consistency
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inconsistent application of demeaned and group_adjust across functions causes mixed market exposure and sector
      effects in portfolio returns, making long-short returns non-zero and group-neutral returns non-neutral, leading to incorrect
      strategy evaluation
    derived_from_bd_id: BD-089
  - id: finance-C-102
    when: When applying both demeaned=True and group_adjust=True in factor returns calculation
    action: 'Establish and document explicit operation precedence: universe-wide demean must be applied before group_adjust
      to maintain consistent long-short spread calculation; implement operation ordering explicitly in code'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Applying group_adjust before universe-wide demean produces approximately zero mean for long-short spread,
      making factor performance appear non-existent when it actually exists; the operation order is implementation-dependent,
      causing silent inconsistency between backtest runs
    derived_from_bd_id: BD-098
  - id: finance-C-104
    when: When implementing forward return calculation for factor-price alignment
    action: Use pct_change(period) shifted by -period to compute forward returns — negative shift aligns current factor values
      with future realized returns without lookahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Removing the negative shift creates catastrophic lookahead bias where current factor values are aligned with
      current prices instead of future prices, causing backtest results to be completely non-reproducible in live trading
    derived_from_bd_id: BD-031
  - id: finance-C-108
    when: When aligning factor signals with price data in Alphalens factor analysis
    action: Verify factor timestamps precede or equal the corresponding price/execution timestamps; factor at time T must
      represent the investment decision and price at T+period is the execution point
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using future prices for factor signal alignment creates look-ahead bias, causing backtest performance to
      be systematically inflated and unreproducible when deploying the strategy in live trading
    derived_from_bd_id: BD-085
  - id: finance-C-147
    when: When implementing data alignment with max_loss tolerance and subsequently applying dropna() for missing value handling
    action: 'Track cumulative data loss across the alignment-dropna pipeline: log initial row count, rows removed by max_loss
      filtering, and rows removed by dropna(); alert when total loss exceeds max_loss threshold (accounting for compound effects)'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: With max_loss=0.35 allowing 35% initial data loss and dropna() subsequently removing rows with any remaining
      NaN, compound data loss can reach 40%+ in sparse markets without triggering max_loss guard, creating survivorship bias
      where only liquid securities survive analysis
    derived_from_bd_id: BD-097
  - id: finance-C-162
    when: When constructing factor weights using the factor_weights function for long-short portfolios
    action: Understand that L1 normalized weights sum to 2 (not 1); longs sum to 1 and shorts sum to -1; to achieve dollar-neutral
      position sizing, apply additional scaling factor of 0.5 to the normalized weights
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Treating L1-normalized weights as summing to 1 causes 2x position sizing error; portfolio assumes $200 exposure
      for every $100 capital allocated, introducing hidden leverage
    derived_from_bd_id: BD-067
  regular:
  - id: finance-C-004
    when: When computing factor_quantile values
    action: produce integer values starting from 1 (not 0-based) for quantile buckets
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero-based quantile indexing causes off-by-one errors in quantile-based analysis and incorrect factor ranking
      interpretation
    stage_ids:
    - data_preparation
  - id: finance-C-006
    when: When setting trading calendar on factor_data
    action: assign freq property to date index level (factor_data.index.levels[0].freq)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing trading calendar freq causes cumulative returns computation to fail and produces incorrect annualized
      performance metrics
    stage_ids:
    - data_preparation
  - id: finance-C-008
    when: When using filter_zscore parameter
    action: rely on default value of 20 without understanding its lookahead bias risk
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Default filter_zscore=20 uses entire period's mean/std for outlier detection, incorporating future information
      into current period's filtering decision
    stage_ids:
    - data_preparation
  - id: finance-C-010
    when: When mapping assets to groups via groupby parameter
    action: include each assets present in factor index in the group mapping
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing asset-to-group mappings cause KeyError; all factor assets must have group assignments
    stage_ids:
    - data_preparation
  - id: finance-C-012
    when: When executing forward returns computation pipeline
    action: compute timezone check before any index intersection or return calculation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Timezone mismatch after index operations causes silent data corruption; timezone validation must occur first
    stage_ids:
    - data_preparation
  - id: finance-C-013
    when: When using quantile or bins parameter
    action: provide exclusively either quantiles OR bins, never both simultaneously
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Conflicting quantile and bins parameters cause ValueError; mutual exclusivity is enforced
    stage_ids:
    - data_preparation
  - id: finance-C-014
    when: When presenting alphalens analysis results
    action: claim forward return predictions represent actual achievable trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Alphalens computes theoretical returns without transaction costs, slippage, or market impact; presenting
      these as achievable returns is misleading
    stage_ids:
    - data_preparation
  - id: finance-C-015
    when: When interpreting factor_information_coefficient results
    action: assume high IC values guarantee profitable trading strategies
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: High IC indicates predictive correlation in historical data but does not account for implementation costs,
      market impact, or regime changes
    stage_ids:
    - data_preparation
  - id: finance-C-016
    when: When backtesting with filter_zscore enabled
    action: report filtered results as unbiased backtest performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: filter_zscore uses lookahead-biased mean/std from entire period, artificially improving reported returns
    stage_ids:
    - data_preparation
  - id: finance-C-017
    when: When data quality issues appear minor
    action: skip max_loss validation or set it to 1.0 to suppress each data quality errors
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Allowing 100% data loss hides critical data pipeline failures; silent data dropping invalidates analysis
      conclusions
    stage_ids:
    - data_preparation
  - id: finance-C-018
    when: When timezone mismatch error occurs
    action: ignore the error and proceed with manual tz_convert bypassing the library's validation
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Bypassing timezone validation leads to misaligned data alignment where dates appear correct but represent
      different market hours
    stage_ids:
    - data_preparation
  - id: finance-C-019
    when: When choosing quantiles parameter
    action: select very high quantile count (e.g., 100+) without considering bin edge uniqueness
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: High quantile count with continuous factor values causes duplicate values spanning multiple quantiles, triggering
      Bin edges must be unique error
    stage_ids:
    - data_preparation
  - id: finance-C-020
    when: When working with intraday factor data
    action: verify prices span includes sufficient granularity for sub-daily forward return periods
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Intraday periods like 1h require corresponding price timestamps; insufficient granularity causes NaN returns
    stage_ids:
    - data_preparation
  - id: finance-C-022
    when: When computing Information Coefficient values
    action: validate that IC values fall within the mathematical bounds of -1 and 1
    severity: high
    kind: domain_rule
    modality: must
    consequence: IC values outside [-1, 1] indicate corrupted data or computation errors, leading to incorrect factor ranking
      and potentially deploying unprofitable strategies
    stage_ids:
    - performance_analysis
  - id: finance-C-024
    when: When computing factor returns for a demeaned (dollar-neutral) portfolio
    action: verify long and short weights sum to equal magnitude so that portfolio returns sum to approximately zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Asymmetric long-short weights cause unintended market exposure, violating the dollar-neutral assumption and
      producing misleading backtest results that cannot be replicated in live trading
    stage_ids:
    - performance_analysis
  - id: finance-C-027
    when: When implementing quantile-level return analysis
    action: validate that quantile returns show monotonic progression (Q5 > Q4 > Q3 > Q2 > Q1) for long factors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-monotonic quantile returns indicate a broken factor or data quality issue, leading to incorrect factor
      interpretation and suboptimal portfolio construction
    stage_ids:
    - performance_analysis
  - id: finance-C-029
    when: When implementing the IC_computation replaceable point
    action: maintain the constraint that output values must be bounded within [-1, 1]
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Replacing IC_computation with an unbounded correlation metric breaks downstream assumption validation and
      can cause numerical instability in portfolio optimization
    stage_ids:
    - performance_analysis
  - id: finance-C-031
    when: When implementing the portfolio_type replaceable point
    action: maintain support for both long-only and long-short portfolio construction modes
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Removing long-short support breaks compatibility with the demeaning logic and prevents analysis of market-neutral
      factor strategies
    stage_ids:
    - performance_analysis
  - id: finance-C-032
    when: When analyzing factor performance using backtested IC values
    action: present IC results as guaranteed predictive power for live trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Claiming that historical IC values predict future performance violates the fundamental principle that past
      performance does not guarantee future results, potentially misleading investors about expected returns
    stage_ids:
    - performance_analysis
  - id: finance-C-033
    when: When presenting factor portfolio backtest returns
    action: claim that simulated portfolio returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest returns ignore transaction costs, slippage, and market impact that significantly reduce live trading
      performance, leading to disappointed expectations and potential regulatory issues
    stage_ids:
    - performance_analysis
  - id: finance-C-035
    when: When analyzing turnover metrics for factor deployment
    action: consider turnover costs alongside IC when evaluating factor viability
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: High-turnover factors with moderate IC may produce negative net returns after transaction costs, making them
      unsuitable for live trading despite positive backtest IC
    stage_ids:
    - performance_analysis
  - id: finance-C-036
    when: When using group_adjust or group_neutral parameters
    action: verify group mappings remain constant throughout the analysis period
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Changing sector classifications during the analysis period causes incorrect group-level normalization, producing
      unreliable group-adjusted IC and returns
    stage_ids:
    - performance_analysis
  - id: finance-C-037
    when: When considering deploying a factor with IC above a threshold
    action: skip validation that IC is consistent across multiple time periods and market conditions
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Single-period IC can be dominated by specific market conditions; factors must demonstrate consistency across
      bull/bear markets, high/low volatility periods
    stage_ids:
    - performance_analysis
  - id: finance-C-038
    when: When converting decimal returns to basis points for plotting
    action: multiply values by DECIMAL_TO_BPS constant (10000) before displaying on y-axis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Basis points will be displayed incorrectly (100x off), causing readers to misinterpret return magnitude by
      orders of magnitude
    stage_ids:
    - visualization
  - id: finance-C-039
    when: When calculating y-axis limits using ylim_percentiles
    action: apply np.nanpercentile to data values before multiplying by DECIMAL_TO_BPS
    severity: high
    kind: domain_rule
    modality: must
    consequence: Y-axis limits will be scaled incorrectly, causing plot to display wrong range or clip important data points
    stage_ids:
    - visualization
  - id: finance-C-040
    when: When data input contains each NaN values
    action: call np.nanpercentile on entirely NaN data arrays
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: np.nanpercentile on all-NaN data produces NaN limits, causing matplotlib to render plots with undefined y-axis
      bounds
    stage_ids:
    - visualization
  - id: finance-C-041
    when: When modifying pandas DataFrames or Series in-place during plotting
    action: call .copy() on input data before any modifications
    severity: high
    kind: domain_rule
    modality: must
    consequence: Original input data will be mutated, corrupting data structures passed to subsequent functions in the tear
      sheet pipeline
    stage_ids:
    - visualization
  - id: finance-C-042
    when: When creating matplotlib subplots without providing an ax parameter
    action: call plt.subplots() and pass returned axes to callers of the plotting function
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Plot will be created in separate figure, disconnected from GridFigure layout management, causing visual chaos
      in tear sheets
    stage_ids:
    - visualization
  - id: finance-C-043
    when: When implementing GridFigure.next_row() after exhausting column layout
    action: increment curr_row and reset curr_col to 0 before creating next subplot
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Subplot index will go out of bounds in GridSpec, causing IndexError and preventing tear sheet generation
    stage_ids:
    - visualization
  - id: finance-C-044
    when: When implementing GridFigure.next_cell() after reaching last column
    action: increment curr_row and reset curr_col to 0 before creating next subplot cell
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Column index will exceed GridSpec bounds, causing matplotlib layout error and incomplete tear sheet
    stage_ids:
    - visualization
  - id: finance-C-045
    when: When closing GridFigure after rendering tear sheet plots
    action: call gf.close() after plt.show() to clean up figure resources
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Matplotlib figure objects will leak memory, causing resource exhaustion during batch tear sheet generation
    stage_ids:
    - visualization
  - id: finance-C-046
    when: When using matplotlib in headless/server environments
    action: set matplotlib backend to Agg or verify display backend is available before calling plt.show()
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Plot rendering will fail with 'no display name' error, preventing automated tear sheet generation on servers
    stage_ids:
    - visualization
  - id: finance-C-047
    when: When applying seaborn styling via @customize decorator
    action: use colorblind palette and call sns.despine(left=True) within plotting_context and axes_style contexts
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Tear sheets will render with inconsistent styling, making cross-plot comparisons difficult for color-blind
      readers
    stage_ids:
    - visualization
  - id: finance-C-048
    when: When creating seaborn plotting context
    action: 'merge rc_default {''lines.linewidth'': 1.5} into rc dict using setdefault'
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Line widths will vary across plots, reducing visual consistency in tear sheet presentations
    stage_ids:
    - visualization
  - id: finance-C-049
    when: When running tests for visualization functions
    action: mock matplotlib.pyplot.show to prevent display during test execution
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Tests will attempt to display plots, causing test suite to hang or fail in headless CI/CD environments
    stage_ids:
    - visualization
  - id: finance-C-050
    when: When displaying y-axis labels for BPS-converted plots
    action: label y-axis as 'Return (bps)' or 'Mean Return (bps)' not 'Return (%)' or 'Return (decimal)'
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Readers will misinterpret return values as percentages when they are actually basis points, leading to 100x
      overestimation of returns
    stage_ids:
    - visualization
  - id: finance-C-051
    when: When comparing IC values across different forward return periods
    action: present IC values without normalizing for different time periods
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: IC values for different forward periods will appear comparable when longer-period ICs naturally inflate due
      to compounding effects
    stage_ids:
    - visualization
  - id: finance-C-052
    when: When labeling cumulative return plots
    action: label plots as 'Cumulative Returns' and include starting_value=1 normalization note
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Cumulative returns will be misinterpreted as total returns from initial investment rather than relative performance
      starting at 1.0
    stage_ids:
    - visualization
  - id: finance-C-053
    when: When displaying mean quantile returns with error bands
    action: label y-axis as 'Mean Return (bps)' and display standard error bands with explicit bandwidth parameter
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Uncertainty in mean returns will be misinterpreted as narrower than actual due to missing confidence interval
      notation
    stage_ids:
    - visualization
  - id: finance-C-057
    when: When implementing next_row() while in middle of a row
    action: reset column position to 0 before advancing to the next full-width row
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without resetting curr_col to 0, subsequent full-width subplots would misalign and overlap. This causes visual
      corruption where plots do not occupy their intended grid cells.
    stage_ids:
    - reporting
  - id: finance-C-058
    when: When creating aggregate tear sheet functions
    action: pass set_context=False to sub tear sheet calls to prevent duplicate seaborn context stacking
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without set_context=False, each nested tear sheet applies seaborn context again, causing double font scaling
      and style resets that corrupt the final plot layout and appearance.
    stage_ids:
    - reporting
  - id: finance-C-059
    when: When using event study tear sheets with separate returns DataFrame
    action: validate that returns DataFrame has date index matching factor_data asset columns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing mismatched returns DataFrame causes KeyError or silent misalignment in common_start_returns(), producing
      incorrect cumulative return calculations for event windows.
    stage_ids:
    - reporting
  - id: finance-C-060
    when: When rendering tear sheets in Jupyter notebooks
    action: call plt.show() to trigger IPython display pipeline for matplotlib output
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without plt.show(), matplotlib figures remain in buffer and are not displayed in notebook cells, causing
      tear sheets to render nothing despite successful computation.
    stage_ids:
    - reporting
  - id: finance-C-061
    when: When creating summary statistics tables
    action: wrap display() call with pandas display.float_format restoration to avoid global state pollution
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: IPython display() calls pd.set_option which persists across notebook cells. Without restoring the previous
      format, subsequent DataFrame displays in unrelated cells use wrong formatting.
    stage_ids:
    - reporting
  - id: finance-C-062
    when: When factor_data index frequency is not set
    action: assume BDay() business day calendar and emit UserWarning for missing freq
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Silent default to business day calendar without warning may cause incorrect cumulative return calculations
      for non-trading-day holidays, producing misleading performance visualizations.
    stage_ids:
    - reporting
  - id: finance-C-063
    when: When displaying plots with overlapping data series
    action: skip null/empty data series to prevent matplotlib ValueError in plotting functions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing all-null Series to matplotlib plotting functions raises ValueError, causing the entire tear sheet
      to fail rendering instead of gracefully skipping empty series.
    stage_ids:
    - reporting
  - id: finance-C-064
    when: When grouping plots by factor quantile or sector
    action: handle single-quantile and single-group edge cases with correct column layout
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Passing cols=0 or cols=2 for single-quantile event studies raises ValueError in GridSpec, causing rendering
      failure. The code uses conditional: cols = 2 if num_quantiles != 1 else 1.'
    stage_ids:
    - reporting
  - id: finance-C-065
    when: When implementing visualization layer
    action: decorate each tear sheet entry points with @plotting.customize to verify consistent style
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without the customize decorator, seaborn context settings are not applied, causing inconsistent font sizes
      and style compared to expected colorblind-friendly output.
    stage_ids:
    - reporting
  - id: finance-C-066
    when: When computing rate of return for event studies
    action: apply rate_of_return transformation using the first period column as base_period
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting rate_of_return or using wrong base_period produces annualized returns that do not match simple returns,
      causing inconsistency in mean period-wise returns comparison tables.
    stage_ids:
    - reporting
  - id: finance-C-068
    when: When displaying factor information coefficient metrics
    action: interpret high IC values as actionable trading signals without additional risk controls
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: High IC values in tear sheet IC plots do not account for transaction costs, market impact, or risk limits.
      Presenting IC-based rankings as tradeable signals without acknowledging these limitations leads to live trading losses.
    stage_ids:
    - reporting
  - id: finance-C-073
    when: When computing cumulative returns from factor_data
    action: Set factor_data.index.levels[0].freq to a valid trading calendar (pandas DateOffset) for cumulative return calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cumulative returns computation fails or produces incorrect results when the trading calendar frequency is
      not set on the date index
  - id: finance-C-074
    when: When using quantile-based performance metrics
    action: Verify factor_quantile values are consecutive integers starting from 1 (1 to N where N is the number of quantiles)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Quantile aggregation functions receive non-integer quantile values, producing incorrect groupby results and
      misleading performance analysis
  - id: finance-C-075
    when: When providing group mappings to Alphalens
    action: Convert group column to categorical dtype using .astype('category') when including groups in analysis
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Non-categorical group data causes inefficient groupby operations and potential ordering issues in grouped
      analysis
  - id: finance-C-079
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live trading returns — backtesting ignores market impact, financing
      costs, slippage, and execution delays that occur in live trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-080
    when: When describing this system's capabilities
    action: Claim real-time trading support — Alphalens is an analysis-only library that computes performance metrics from
      historical factor and price data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users attempt to deploy Alphalens for live trading, creating systems that cannot execute orders, manage positions,
      or interface with exchanges
  - id: finance-C-081
    when: When using the filter_zscore parameter to clean forward returns
    action: Treat filtered results as free from lookahead bias — the filter_zscore parameter computes mean and std using the
      full return distribution including future values
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Outlier filtering introduces lookahead bias, as the filter decision uses information not yet available at
      signal generation time
  - id: finance-C-082
    when: When using Alphalens to analyze non-tabular data
    action: Claim support for image, text, or other non-tabular data types — Alphalens requires structured DataFrame input
      with numeric factor values and price time series
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users attempt to apply Alphalens to unstructured data types that are fundamentally incompatible with its
      MultiIndex DataFrame architecture
  - id: finance-C-083
    when: When describing Alphalens's portfolio modeling capabilities
    action: Claim support for portfolio execution or transaction cost modeling — Alphalens only computes theoretical portfolio
      weights and returns without modeling order execution
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users rely on Alphalens for portfolio construction and execution, not understanding that it produces theoretical
      weights only with no actual position management
  - id: finance-C-084
    when: When applying Alphalens to multi-asset class analysis
    action: Claim support for multi-asset class analysis beyond equities — Alphalens's return normalization, trading calendar
      inference, and quantile bucketing are designed specifically for equity factors
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users apply cross-asset strategies with incompatible return conventions, settlement cycles, and factor constructions
      that produce misleading comparative analysis
  - id: finance-C-086
    when: When processing factor and price data for alignment operations
    action: Verify input data uses MultiIndex (date, asset) structure — this structure is required for proper groupby operations
      on both time and asset dimensions, and aligns with alphalens groupby conventions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using flat DataFrame or incorrect index structure causes alignment failures between factor and price data,
      leading to incorrect return attribution and missing factor signals during cross-sectional analysis
    derived_from_bd_id: BD-001
  - id: finance-C-087
    when: When computing factor autocorrelation to measure signal persistence
    action: Use rank-based autocorrelation (factor_rank_autocorrelation) instead of value-based autocorrelation — ranks isolate
      true signal persistence from changing absolute factor magnitudes caused by market regime changes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Value-based autocorrelation conflates regime changes with signal persistence, causing strategies to appear
      more stable than they are and leading to overconfident position sizing that increases drawdown risk
    derived_from_bd_id: BD-011
  - id: finance-C-089
    when: When inferring trading calendar from factor and prices index overlap
    action: Verify that the inferred trading calendar correctly captures weekdays and holidays for the specific market — check
      for unexpected data gaps that may indicate calendar inference errors, and explicitly specify calendar parameter when
      accuracy is critical
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Calendar inference errors cause misalignment between factor signals and price data on non-trading days, leading
      to incorrect return calculations and potentially excluding valid trading signals or including invalid ones
    derived_from_bd_id: BD-003
  - id: finance-C-090
    when: When computing factor alpha and beta using factor_alpha_beta function
    action: Use OLS regression with annualized adjustment via statsmodels — this enables proper t-statistic testing for alpha
      significance and allows fair comparison across different return frequencies through frequency normalization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple return ratios without OLS ignores sampling uncertainty, causing false confidence in factor alpha
      and potentially deploying capital to strategies with statistically insignificant or negative alpha
    derived_from_bd_id: BD-012
  - id: finance-C-091
    when: When converting returns of different periods (1D, 5D, 10D forward returns) to a common frequency
    action: Use geometric compounding for rate-of-return conversion — compound returns to the desired period length rather
      than using arithmetic aggregation which overstates multi-period returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Arithmetic aggregation of returns overstates multi-period performance by ignoring compounding effects, leading
      to backtest results that show higher cumulative returns than would be achieved in live trading
    derived_from_bd_id: BD-013
  - id: finance-C-093
    when: When implementing factor weight calculation in portfolio construction
    action: Use factor_value / sum(|factor|) normalization to verify weights sum to 1 in absolute value for gross leverage=1
      — positive values represent long positions, negative values represent short positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using raw factor values without normalization creates unbounded leverage exposure that exceeds intended portfolio
      limits, causing backtest results to misrepresent actual trading performance and risking margin calls in live trading
    derived_from_bd_id: BD-008
  - id: finance-C-094
    when: When configuring factor quantile analysis parameters
    action: Use 5 quantile buckets as the default setting for factor analysis to balance statistical significance and interpretability;
      verify universe size supports chosen granularity before increasing to deciles
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using fewer buckets (4) reduces power to detect factor effects, while increasing to 10 buckets without sufficient
      universe size fragments the analysis and introduces estimation noise in mean return estimates per bucket
    derived_from_bd_id: BD-021
  - id: finance-C-095
    when: When calculating equal-weighted portfolio returns in performance analysis
    action: Use median for cross-sectional demeaning in equal-weighted portfolio calculations instead of mean — this provides
      robustness to outlier constituent returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using mean for demeaning makes equal-weight returns sensitive to extreme constituent returns, causing backtest
      results to diverge from live trading where outlier positions have disproportionate impact on portfolio performance
    derived_from_bd_id: BD-046
  - id: finance-C-096
    when: When quantizing factors that cross zero in factor analysis
    action: Apply zero-aware quantile binning that separates positive and negative signals into different buckets to preserve
      directional information for zero-centered factors like mean-reversion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Standard equal-quintile binning merges positive and negative signals into the same bucket for zero-centered
      factors, destroying directional information and causing mean-reversion strategies to fail by incorrectly grouping long
      and short signals
    derived_from_bd_id: BD-005
  - id: finance-C-097
    when: When displaying Information Coefficient (IC) metrics in reports or dashboards
    action: Display IC values using 2-3 decimal places (e.g., 0.52) or as percentage without basis point terminology — avoid
      multiplying correlation by 10000 which produces misleading 'bps IC' labels
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Displaying IC in basis points (e.g., '50 bps IC') implies a return percentage magnitude rather than correlation
      strength, misleading stakeholders about factor effectiveness and potentially causing incorrect investment allocation
      decisions
    derived_from_bd_id: BD-102
  - id: finance-C-098
    when: When using factor and price data for backtesting
    action: Assume the framework provides point-in-time (PIT) data availability — the framework does not implement lookahead
      bias prevention through PIT data; do not assume data is free from future information leakage
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time data handling, backtests inadvertently include information that would not have been
      available at the signal date due to earnings announcements, splits, or other corporate actions, causing look-ahead bias
      that makes backtest results unrealistically optimistic
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-099
    when: When preparing factor and price data for backtesting
    action: Integrate a point-in-time data source (e.g., Bloomberg PIT, Refinitiv Tick History, or proprietary equity database)
      that timestamps corporate action adjustments and ensures data reflects only information available at each historical
      date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without PIT data integration, backtest results systematically overestimate strategy performance due to look-ahead
      bias from unadjusted corporate action data, leading to significant live trading losses when strategies fail to achieve
      expected returns
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-100
    when: When implementing or using numerical methods in the framework
    action: Assume the framework implements explicit convergence criteria for numerical methods — no convergence checks with
      tolerance and max_iter parameters are implemented; implement your own guards when using numerical algorithms
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Without explicit convergence criteria, numerical methods may enter infinite loops causing service disruption,
      or terminate prematurely yielding incorrect factor calculations that propagate silently through backtests and produce
      misleading performance results
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-101
    when: When implementing numerical methods in the framework
    action: 'Implement explicit convergence criteria for each numerical methods: set tolerance (e.g., 1e-6 for pricing, 1e-4
      for factor analysis) and max_iter (e.g., 100-1000) parameters; use while loop with convergence check and iteration counter
      to verify finite execution with accurate results'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without implementing convergence criteria, numerical methods may run indefinitely causing service disruption
      or produce inaccurate results that cause silent failures in factor analysis and backtesting, leading to undetected production
      losses from incorrect strategy evaluations
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-103
    when: When implementing Information Coefficient (IC) calculation for factor performance evaluation
    action: Use Spearman rank correlation to compute IC — Spearman measures monotonic relationship and is robust to outliers,
      whereas Pearson correlation is sensitive to outliers and magnitude distortions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Pearson correlation for IC produces misleading factor evaluations when factor predictions have outliers
      or non-normal distributions, causing suboptimal strategy selection and allocation decisions
    derived_from_bd_id: BD-027
  - id: finance-C-105
    when: When using the framework's default max_loss parameter for data filtering
    action: Verify that max_loss=0.35 matches actual data quality requirements — empirical testing showed this threshold captures
      99.5%+ of legitimate data gaps; lower values risk excessive row removal, higher values admit corrupted data
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using incorrect max_loss threshold either removes legitimate data points reducing statistical power, or admits
      corrupted prices from failed stocks, corporate actions, or data errors that distort factor performance analysis
    derived_from_bd_id: BD-023
  - id: finance-C-106
    when: When calculating return spread between top and bottom factor quantiles
    action: Calculate spread as mean returns of upper quantile minus mean returns of lower quantile — do not use median-to-median
      spread which was rejected for inconsistency with IC and mean-variance optimization conventions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using median-to-median spread breaks consistency with Information Coefficient and mean-variance optimization
      frameworks, producing misleading factor profitability comparisons that may cause poor investment decisions
    derived_from_bd_id: BD-048
  - id: finance-C-107
    when: When evaluating zero-centered factors with quintile binning
    action: Account for reduced effective bucket sizes when using zero-aware binning with quintiles — for factors with asymmetric
      positive/negative distributions, the bottom quintile may contain only ~13% of data instead of expected 20%, reducing
      statistical power for negative-tail analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ignoring the bucket size reduction from zero-aware binning causes underpowered tail analysis, leading to
      false conclusions about negative factor performance and incorrect risk assessments
    derived_from_bd_id: BD-100
  - id: finance-C-109
    when: When using factor data in Alphalens for production analysis and automated decision-making
    action: Assume the framework automatically detects and warns about stale or outdated factor data; the framework does not
      implement stale data detection or cache validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using outdated factor data without detection leads to production decisions based on stale information, causing
      incorrect investment signals and potential significant financial loss from delayed or wrong portfolio adjustments
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-110
    when: When implementing factor data pipelines for production use with Alphalens
    action: Implement explicit stale data detection with configurable max_age and cache_ttl policy; validate data freshness
      timestamps before each factor analysis run and raise warnings or errors for data exceeding defined staleness thresholds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without stale data detection, production systems may use outdated factor values, leading to stale signals
      propagating through the portfolio construction process and causing systematic underperformance that accumulates silently
      over time
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-111
    when: When implementing forward return calculation logic in factor analysis
    action: Use cumulative percentage change method (pct_change or equivalent compounding) to compute forward returns — verify
      daily returns are chained multiplicatively, not summed arithmetically
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple summation instead of compounding produces systematically different returns; for a 3-day period
      with 1%, 2%, 1% daily returns, summation yields 4% while compounding yields 4.0603%, causing cumulative backtest error
    derived_from_bd_id: BD-062
  - id: finance-C-112
    when: When computing Information Coefficient to evaluate factor predictive power
    action: Use Spearman rank correlation (not Pearson) to measure the monotonic relationship between factor ranks and forward
      returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pearson correlation misses monotonic nonlinear relationships and is sensitive to outliers; a factor with
      perfect rank monotonicity but non-linear returns scores IC<1 with Pearson, causing underestimation of factor predictive
      power and potentially wrong strategy selection
    derived_from_bd_id: BD-066
  - id: finance-C-113
    when: When validating Information Coefficient distribution for statistical significance testing
    action: Use Q-Q plot against normal or t-distribution to visually assess IC distribution properties before applying parametric
      statistical tests
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Parametric statistical tests (t-tests, p-values) on IC series with fat tails or skewness produce unreliable
      p-values, leading to false conclusions about factor statistical significance and potentially deploying ineffective factors
    derived_from_bd_id: BD-078
  - id: finance-C-114
    when: When constructing group-neutral portfolios to isolate factor returns
    action: Weight each sector/group equally in group-neutral portfolios to prevent sector allocation decisions from contaminating
      factor performance attribution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using market-cap or other unequal group weights reintroduces sector rotation effects into factor returns,
      making it impossible to isolate pure factor performance; backtest results conflate factor alpha with sector bets, causing
      live trading allocation errors
    derived_from_bd_id: BD-034
  - id: finance-C-115
    when: When annualizing performance metrics for comparison across strategies with different observation frequencies
    action: Use 252 trading days as the annualization factor for US equity strategies, converting daily/weekly returns to
      annual equivalents
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different annualization factors (250, 260, 365) produces inconsistent annualized returns, making cross-strategy
      comparison unreliable; mixing factors in reporting causes misleading performance attribution
    derived_from_bd_id: BD-035
  - id: finance-C-116
    when: When computing factor autocorrelation to measure factor ranking stability over time
    action: Compute factor autocorrelation on rank-transformed values (not raw factor scores) to verify scale-invariant persistence
      measurement
    severity: high
    kind: domain_rule
    modality: must
    consequence: Computing autocorrelation on raw factor values makes persistence measurements sensitive to factor scaling
      and outliers; two identical factors with different scales (0-1 vs 0-100) show different autocorrelation properties even
      though rankings are identical
    derived_from_bd_id: BD-036
  - id: finance-C-117
    when: When converting rates of return across different time periods for strategy reporting
    action: Verify that returns follow compound return properties (multiplicative chaining) before applying geometric mean
      conversion; do not apply geometric mean to arithmetic (non-compounding) return series
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Geometric mean overstates performance when applied to non-compounding returns or short-horizon additive returns;
      strategy reporting using geometric mean for inappropriately additive return series produces misleading annual performance
      figures
    derived_from_bd_id: BD-038
  - id: finance-C-118
    when: When comparing Information Coefficient (IC) metrics across different forward return horizons in factor research
    action: Verify that IC comparisons use consistent annualization methodology — for short-horizon factors (1D-5D returns),
      recognize that annualization amplifies variance by sqrt(252) ≈ 16x, potentially making annualized IC appear 94% worse
      than daily IC for factors with realistic IC_mean=0.05 and IC_std=0.03
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Comparing annualized IC across different horizons without normalization creates misleading impressions about
      factor quality, causing researchers to reject short-horizon factors that appear to have poor risk-adjusted IC when in
      fact they outperform long-horizon factors on a daily basis
    derived_from_bd_id: BD-099
  - id: finance-C-119
    when: When implementing or modifying position PnL calculation logic in backtesting
    action: Assume the framework automatically conserves total PnL across realized and unrealized components — the framework
      does not implement PnL conservation tracking between realized gains/losses from closed positions and unrealized mark-to-market
      values
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without PnL conservation, backtest results may show inconsistent total PnL that does not reconcile with individual
      trade records, causing audit failures and incorrect strategy performance reporting in production
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-120
    when: When calculating position PnL in backtesting
    action: Implement explicit PnL conservation by tracking realized_pnl (from closed positions) and unrealized_pnl (mark-to-market),
      and verify total_pnl == realized_pnl + unrealized_pnl at each timestamp with tolerance < 1e-6
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit PnL conservation tracking, discrepancies between realized and unrealized PnL remain undetected,
      causing audit failures when live trading records cannot be reconciled with backtest projections
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-121
    when: When implementing or modifying data annotation logic in backtesting
    action: Assume the framework provides explicit currency and unit annotations for monetary values — the framework does
      not implement currency/unit metadata, treating each values as dimensionless numbers
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit currency annotations, multi-currency portfolios mix values without conversion, causing systematic
      over/under-reporting of total portfolio value when assets are denominated in different currencies
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-122
    when: When annotating monetary values in backtest reports
    action: Add explicit currency_code field (e.g., 'CNY', 'USD', 'HKD') to each monetary value annotations and verify that
      cross-currency aggregations apply proper exchange rate conversions before summing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit currency annotations, backtest reports cannot distinguish CNY from USD positions, causing
      incorrect portfolio totals when aggregating multi-currency holdings in cross-border trading strategies
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-123
    when: When using the framework's default trading calendar inference for non-US markets or holiday variations
    action: Verify that the fallback calendar (pd.tseries.offsets.BDay()) matches the actual exchange trading schedule — for
      A-shares, Hong Kong, or European markets, the standard business day calendar misaligns with actual trading days and
      holiday schedules
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using BDay() fallback for non-US markets causes misaligned factor returns with price data, as the calendar
      includes non-trading days (Chinese holidays, HK holidays) causing return calculations to span incorrect date ranges
    derived_from_bd_id: BD-042
  - id: finance-C-124
    when: When using Information Coefficient rolling average with default 22-day window
    action: Verify that 22-day (approximately one trading month) window matches the intended analysis horizon — shorter windows
      (5-day) capture noise while longer windows (60-day) smooth out regime changes; adjust based on factor rebalance frequency
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using 22-day IC rolling window without considering factor rebalance frequency causes smoothed IC to misrepresent
      factor effectiveness, as the rolling average blends periods with different market regimes
    derived_from_bd_id: BD-044
  - id: finance-C-125
    when: When implementing event study signal processing logic
    action: Verify positive event values are interpreted as long-entry signals and negative event values are interpreted as
      short-entry signals — do not use magnitude-based event detection without explicit sign handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reversing the event sign convention causes the strategy to enter short positions when expecting long entries
      and vice versa, producing inverted returns that systematically lose money in the opposite direction of the intended
      event study
    derived_from_bd_id: BD-045
  - id: finance-C-126
    when: When calculating factor portfolio positions and return attribution
    action: Use active weights that track position entry and exit over time with proper signal expiry tracking — do not use
      static weights from formation date, as they misattribute returns when factor signals change
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using static weights instead of active weights misattributes returns to factors that have already exited
      positions, causing incorrect performance attribution and leading to retention of underperforming factor strategies
    derived_from_bd_id: BD-047
  - id: finance-C-127
    when: When interpreting factor quantile results or constructing quantile-based portfolios
    action: Use 1-indexed quantiles where quantile 1 represents lowest factor values and the highest number represents highest
      factor values — do not assume zero-indexed quantiles (0 to N-1) without explicit conversion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using zero-indexed quantile interpretation inverts portfolio construction, causing the strategy to take long
      positions on the lowest factor quantiles and short positions on the highest quantiles, systematically reversing expected
      factor returns
    derived_from_bd_id: BD-049
  - id: finance-C-128
    when: When processing multi-currency financial data in the framework
    action: Assume the framework handles currency and denomination differences — the framework does not implement currency
      annotation on financial quantities; mixed-currency operations produce mathematically incorrect results without explicit
      currency tracking
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Multi-currency portfolio analysis without currency annotation produces incorrect aggregate values when summing
      positions in different currencies, causing misstated portfolio values and improper risk assessment
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-129
    when: When defining financial data structures or API schemas for cross-currency operations
    action: Add currency_code and denomination fields to each financial quantity fields (amount, value, price, return, cost),
      and implement validation that prevents mixed-currency operations or converts to a common base currency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit currency annotation, multi-currency portfolios aggregate incompatible values, leading to
      systematically wrong portfolio totals and incorrect strategy performance attribution
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-130
    when: When aligning price data with factor signals for forward return calculation
    action: Verify price data starts at factor index plus one row (iloc[1:]) to pair current factor signals with future price
      changes — using same-day pricing (iloc[0:]) introduces look-ahead bias
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using same-day pricing pairs current factors with current prices, causing information leakage from future
      prices in the factor signal, making backtest results statistically invalid and inconsistent with live trading
    derived_from_bd_id: BD-060
  - id: finance-C-131
    when: When creating factor quantile buckets for decile analysis
    action: Use pd.qcut for equal-frequency quantile bucketing based on empirical data percentiles — avoid pd.cut with fixed
      thresholds which creates unequal group sizes with real-world factor distributions
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using fixed-width bins instead of equal-frequency quantile buckets creates unbalanced group sizes, causing
      sparse edge buckets to distort mean-return comparisons and produce misleading factor rankings
    derived_from_bd_id: BD-061
  - id: finance-C-132
    when: When applying Z-score outlier filtering to forward returns
    action: Explicitly set and validate the filter_zscore parameter based on the expected return distribution — values too
      low lose valid data from extreme-but-real events, values too high preserve noise from corporate actions and data errors
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using an inappropriate Z-score threshold either removes legitimate extreme returns or fails to filter outliers
      from corporate actions, distorting quantile mean return calculations and compromising factor analysis validity
    derived_from_bd_id: BD-063
  - id: finance-C-133
    when: When computing factor portfolio returns from weighted forward returns
    action: Explicitly define and justify the weighting method (weighted sum vs equal weighting) based on whether factor signal
      strength is available — weighted sum produces factor-specific P&L, equal weighting ignores signal magnitude
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using equal-weighted returns instead of weighted sum fundamentally changes portfolio construction, ignoring
      factor signal strength and producing different P&L attribution that misrepresents factor effectiveness
    derived_from_bd_id: BD-068
  - id: finance-C-134
    when: When annualizing factor returns using the compound geometric formula
    action: Verify that returns are approximately i.i.d. before relying on annualized figures — volatile strategies with path
      dependency may have misleading annualized values that overstate true expected returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Geometric annualization assumes i.i.d. returns, but volatile strategies exhibit serial correlation and path
      dependency, causing annualized figures to overstate expected performance and mislead strategy comparison
    derived_from_bd_id: BD-070
  - id: finance-C-135
    when: When calculating standard error of quantile mean returns via SE = std/sqrt(n)
    action: Verify return normality assumption before using classical SE formula — heavy-tailed distributions require bootstrap
      or robust SE methods; the classical formula underestimates uncertainty for fat-tailed returns
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: The classical SE formula assumes normally distributed returns, but return distributions typically exhibit
      heavy tails and skewness, causing underestimated confidence intervals and false statistical significance conclusions
    derived_from_bd_id: BD-071
  - id: finance-C-136
    when: When implementing or refactoring spread standard error calculations in quantile performance analysis
    action: Use sqrt(SE1² + SE2²) formula for joint standard error of quantile spread — this assumes independence between
      top and bottom quantile groups
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect SE formula or ignoring independence assumption causes misaligned statistical significance
      estimates, leading to trades being wrongly classified as significant or insignificant based on flawed confidence intervals
    derived_from_bd_id: BD-072
  - id: finance-C-137
    when: When implementing cumulative return calculations for strategy comparison
    action: Use empyrical.cum_returns with starting_value=1 to normalize strategies to a common 1.0 starting point, ensuring
      fair comparison across different capital bases
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple cumulative sum instead of properly compounded returns ignores the compounding effect, causing
      backtested results to diverge significantly from actual realized returns in live trading
    derived_from_bd_id: BD-073
  - id: finance-C-138
    when: When computing risk-adjusted IC metrics for factor quality assessment
    action: Calculate risk-adjusted IC as IC_mean divided by IC_std (Sharpe-like ratio), which annualizes consistency and
      captures both magnitude and stability of factor predictive power
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using raw IC_mean without normalization by volatility misleads factor quality assessment; a high mean but
      volatile IC may indicate an unreliable factor that appears strong on average but fails in live trading
    derived_from_bd_id: BD-075
  - id: finance-C-139
    when: When performing hypothesis testing on IC mean to determine factor statistical significance
    action: Use one-sample t-test (ttest_1samp) to assess whether IC mean is statistically distinguishable from zero, accounting
      for IC time-series variability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting t-test or using improper hypothesis testing causes inability to distinguish genuine factor predictive
      power from random noise, leading to deployment of factors with no real signal or abandonment of valid factors
    derived_from_bd_id: BD-076
  - id: finance-C-140
    when: When smoothing daily IC values using rolling window for trend analysis
    action: Use 22-day rolling window (approximately 1 trading month) for IC moving average, and verify the window aligns
      with actual trading calendar when analyzing regimes
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using non-standard window sizes or assuming adaptive behavior causes IC trends to be misaligned with actual
      monthly patterns, leading to incorrect regime detection and timing-based strategy errors
    derived_from_bd_id: BD-077
  - id: finance-C-141
    when: When implementing quantile-based ranking for factor analysis across mean returns, turnover, and IC calculations
    action: Use quantile-based ranking with factor_quantile buckets (default 5) for ordered grouping of securities by factor
      value, enabling top-vs-bottom performance analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect bucket count degrades statistical significance through sparse groups (too many buckets) or
      masks non-linear factor relationships (too few buckets), causing misaligned factor selection and suboptimal strategy
      performance
    derived_from_bd_id: BD-088
  - id: finance-C-142
    when: When implementing or refactoring tear sheet plot functions in backtesting visualization
    action: Use GridFigure.get_grid() to obtain axes in sequence rather than manually tracking figure handles or subplot indices
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Bypassing GridFigure.get_grid() and manually tracking figure handles or subplot indices breaks the abstraction,
      causing inconsistent plot layouts across different tear sheet functions and potential axis conflicts
    derived_from_bd_id: BD-094
  - id: finance-C-143
    when: When processing timestamped events or aligning datasets by time in backtesting
    action: Assume the framework automatically distinguishes between as-of time (when an event occurred) and processing time
      (when the system handles it) — this distinction is not implemented
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit as-of vs processing time distinction, lookahead bias may occur when events are timestamped
      with processing time instead of actual event time, causing the backtest to use information before it was actually available
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-144
    when: When implementing data alignment or timestamp handling in backtesting
    action: 'Explicitly declare and validate the timestamp semantics: distinguish as_of_time (event occurrence) from processing_time
      (system ingestion), use temporal joins with explicit alignment markers, and log timestamp lineage for audit trail'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit timestamp semantic declaration, data alignment operations may silently use processing time,
      creating hard-to-detect lookahead bias that inflates backtest performance by 5-15%
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-145
    when: When implementing or configuring iterative optimization or simulation convergence in backtesting
    action: Assume convergence is achieved without explicit declaration — the framework does not implement automatic convergence
      criteria validation; iterations may stop prematurely or run indefinitely without documented thresholds
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit convergence criteria declaration, iterative models may terminate before reaching actual
      convergence, producing unreliable parameter estimates that diverge from true optimal values
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-146
    when: When configuring iterative optimization, simulation, or model fitting in backtesting
    action: 'Declare explicit convergence criteria with specific thresholds: specify max_iterations (hard stop), relative_tolerance
      (e.g., 1e-6), absolute_tolerance, and validation_frequency; implement convergence status logging and raise warnings
      when criteria are not met'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit convergence criteria, iterative methods may produce unstable results where parameter estimates
      differ significantly between runs, making backtest results non-reproducible and strategy performance unreliable
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-148
    when: When implementing information coefficient (IC) calculation for factor performance evaluation
    action: Use Spearman rank correlation (scipy.stats.spearmanr) for IC calculation — Pearson correlation is sensitive to
      outliers and assumes linear relationships, producing distorted IC values for factor returns with non-linear monotonic
      patterns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Pearson instead of Spearman for IC calculation distorts the true predictive signal, causing factors
      with genuine monotonic but non-linear relationships to appear weaker, leading to suboptimal factor selection and reduced
      strategy returns
    derived_from_bd_id: BD-007
  - id: finance-C-149
    when: When using the framework's default forward return column naming convention or implementing custom period specifications
    action: Use pd.Timedelta-compatible string formats for forward return column names (e.g., '1D', '5D', '3h15m'); validate
      column names against the regex pattern from utils.get_forward_returns_columns before using them in factor calculations
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using non-standard column names (integer days, datetime objects, or custom strings) breaks compatibility
      with framework's column matching logic, causing forward return data to be silently ignored or mismatched in factor analysis
      pipelines
    derived_from_bd_id: BD-002
  - id: finance-C-150
    when: When implementing data ingestion and storage logic in the framework
    action: Assume the framework handles stale data detection and expiry policy — stale data detection and expiry policy are
      not implemented in the current codebase
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without stale data detection, the framework may process outdated market data causing strategies to trade
      on expired information, leading to significant financial losses in live trading while backtest results remain falsely
      confident
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-151
    when: When implementing data preparation and validation logic
    action: Implement data freshness checks using timestamp comparisons — flag or exclude records where timestamp exceeds
      freshness_threshold (e.g., market_close_time + grace_period), and log age metrics for audit trail
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit stale data detection, the framework processes outdated market data as current, causing strategies
      to generate signals from expired prices and fundamentally breaking the data integrity assumptions required for reliable
      backtesting
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-152
    when: When implementing any stochastic components (Monte Carlo, bootstrapping, randomization) in the framework
    action: Assume the framework has consistent random seed management across each components — random seed handling is not
      uniformly covered in the current implementation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit random seed coverage, backtest results become non-reproducible across runs, causing different
      equity curves for the same strategy and making it impossible to validate strategy performance or compare modifications
      reliably
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-153
    when: When implementing stochastic components that require reproducibility
    action: Set random seeds explicitly for each random number generators (numpy.random, random, TensorFlow/PyTorch) at initialization
      — use framework_provided_seed parameter or global seed setter function to verify full reproducibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without consistent random seed management, Monte Carlo simulations, bootstrapping, or any stochastic optimization
      produce non-deterministic results, making backtests unreproducible and invalidating performance claims
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-154
    when: When configuring outlier filtering in factor analysis or when using max_loss data quality validation
    action: Verify filter_zscore is set to an effective threshold (recommended 3.0) OR implement independent outlier detection
      before max_loss validation — do not rely on filter_zscore=20 which filters virtually nothing (20-sigma captures 99.9999%
      of normal distribution)
    severity: high
    kind: domain_rule
    modality: must
    consequence: With filter_zscore=20 and max_loss=0.35, users receive false security that outlier filtering is active when
      corrupted data points pass through; these corrupted points then count toward max_loss, potentially triggering incorrect
      dataset rejection or accepting corrupted datasets as valid
    derived_from_bd_id: BD-101
  - id: finance-C-155
    when: When calling create_event_returns_tear_sheet for event study analysis
    action: Pass a separate daily price returns DataFrame (not pre-computed forward returns) to create_event_returns_tear_sheet
      — event studies require backward-looking price history around events, not forward-looking returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using pre-computed forward returns with create_event_returns_tear_sheet causes the function to analyze wrong
      data types, producing invalid event study results with look-ahead bias and incorrect cumulative abnormal return calculations
    derived_from_bd_id: BD-019
  - id: finance-C-156
    when: When configuring forward return calculation parameters in get_clean_factor_and_forward_returns or compute_forward_returns
    action: Use the default forward return periods (1, 5, 10 days) unless explicitly overriding — these periods span intraday
      to biweekly horizons required for standard factor research
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing default forward return periods without understanding factor decay characteristics produces misleading
      alpha estimates and invalid factor rankings that do not translate to actual trading horizons
    derived_from_bd_id: BD-022
  - id: finance-C-157
    when: When using default forward return periods for factor analysis
    action: Verify that (1, 5, 10) day forward return horizons match your strategy's actual holding period and rebalancing
      frequency — adjust periods to match trading constraints (e.g., T+1 settlement, weekly rebalancing) if the strategy differs
      from standard factor research assumptions
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Default (1,5,10) day forward returns may not align with actual trading execution delays or rebalancing schedules,
      causing backtested factor performance to overestimate live results when strategies cannot be executed at assumed horizons
    derived_from_bd_id: BD-022
  - id: finance-C-158
    when: When adding or refactoring any stochastic operations in the backtesting framework
    action: Assume the framework automatically ensures reproducibility for stochastic operations — random seed coverage is
      not implemented; each run may produce different IC values and factor rankings
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit random seed coverage, stochastic elements like bootstrap sampling or Monte Carlo simulations
      produce different IC values on each run, causing factor rankings to shift unpredictably and making backtest results
      non-reproducible
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-159
    when: When implementing or modifying any stochastic operations in the backtesting framework
    action: Set random seed explicitly (np.random.seed(42) or equivalent) before executing stochastic operations, ensuring
      deterministic behavior across runs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit random seed coverage, stochastic elements produce non-deterministic results that undermine
      backtest reproducibility and make it impossible to compare strategy performance reliably across runs
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-160
    when: When implementing long-short portfolio analysis using the framework
    action: Verify that demeaned=True matches the strategy objective (market-neutral factor evaluation); if absolute returns
      are needed, explicitly set demeaned=False
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using demeaned=True for absolute return strategies systematically removes market-wide returns, causing backtest
      results to diverge from live trading where market drift contributes to actual returns
    derived_from_bd_id: BD-028
  - id: finance-C-161
    when: When running event studies for fundamental events (earnings, dividends, corporate actions)
    action: Preserve the default long_short=False for event studies; do not change to long_short=True unless hedge ratio determination
      and hedge universe selection are explicitly modeled
    severity: high
    kind: domain_rule
    modality: must
    consequence: Enabling long_short=True for event studies requires additional assumptions about hedge ratios and hedge universe,
      which obscures the primary security-specific event reaction signal
    derived_from_bd_id: BD-029
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
