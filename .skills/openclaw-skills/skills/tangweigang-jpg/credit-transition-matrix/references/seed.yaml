resources:
  packages:
  - name: pandas
    version_pin: latest
  - name: numpy
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: statsmodels
    version_pin: latest
  - name: matplotlib
    version_pin: latest
  - name: jinja2
    version_pin: latest
  - name: requests
    version_pin: latest
  - name: pillow
    version_pin: latest
  - name: pytest
    version_pin: latest
  - name: Sphinx
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install pandas
    - python3 -m pip install numpy
    - python3 -m pip install scipy
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When defining a StateSpace with an explicit definition list
    action: verify state indices in each tuple are 0-based contiguous integers starting from 0
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Transition matrix estimators and downstream stages use 0-based integer indexing. Non-contiguous or non-zero-based
      indices will cause index out-of-bounds errors or misaligned matrix operations when accessing rows and columns
    stage_ids:
    - state_space_definition
  - id: finance-C-002
    when: When accessing states.cardinality for transition matrix operations
    action: verify cardinality is an integer equal to the number of states in the definition list
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TransitionMatrix validation and estimator loops depend on cardinality matching the definition length. Mismatch
      causes index errors or uninitialized matrix dimensions
    stage_ids:
    - state_space_definition
  - id: finance-C-010
    when: When estimators use state space cardinality for matrix initialization
    action: verify the transition matrix dimension matches state space cardinality
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Estimators like SimpleEstimator and AalenJohansen use states.cardinality to create numpy arrays. Mismatch
      between matrix dimension and state cardinality causes index errors during estimation
    stage_ids:
    - state_space_definition
  - id: finance-C-018
    when: When generating synthetic Markov chain data with transition probabilities
    action: Use only transition probabilities within [0, 1] and verify row sums equal exactly 1.0
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid transition probabilities cause np.random.choice to raise ValueError or generate non-Markovian paths
      that invalidate estimator results
    stage_ids:
    - data_generation
  - id: finance-C-019
    when: When generating data in Canonical format
    action: Encode the first event per entity as identity transition (From=To=initial_state) at Time=0
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing identity transition at t=0 breaks to_canonical() bootstrapping, causing incorrect From state derivation
      for subsequent events
    stage_ids:
    - data_generation
  - id: finance-C-021
    when: When generating discrete-time Markov chain paths
    action: Sample the next state using state index (integer) rather than state label, then look up the label
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Sampling by label causes misalignment between probability vector indexing and state representation, leading
      to incorrect transition path generation
    stage_ids:
    - data_generation
  - id: finance-C-023
    when: When feeding generated data to cohort or duration estimators
    action: Sort data by entity ID first, then by ascending time before passing to estimators
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Unsorted data causes incorrect timepoint assignment in estimators, leading to wrong transition counts and
      invalid transition matrix estimates
    stage_ids:
    - data_generation
  - id: finance-C-032
    when: When implementing transition matrix estimation from event data
    action: verify each transition probabilities fall between 0 and 1 inclusive
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Probability values outside [0,1] violate the fundamental mathematical definition of a stochastic transition
      matrix, producing invalid matrices that downstream credit risk calculations cannot use
    stage_ids:
    - matrix_estimation
  - id: finance-C-033
    when: When validating estimated transition matrices
    action: verify each row sum equals 1.0 within accuracy tolerance of 1e-3
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Row sums not equal to 1.0 indicate violated probability conservation, causing incorrect downstream calculations
      in Markov chain modeling and credit curve generation
    stage_ids:
    - matrix_estimation
  - id: finance-C-034
    when: When normalizing counts to produce transition probabilities
    action: divide transition counts by the source state population count when the count is greater than zero
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Division by zero when source state population is zero causes NaN values in the transition matrix, corrupting
      all downstream matrix operations
    stage_ids:
    - matrix_estimation
  - id: finance-C-037
    when: When configuring confidence interval parameters
    action: verify CI alpha value is strictly between 0 and 1.0 (exclusive of boundaries)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Alpha values outside (0, 1) produce undefined confidence intervals, causing statsmodels to raise exceptions
      or produce NaN bounds
    stage_ids:
    - matrix_estimation
  - id: finance-C-038
    when: When configuring confidence interval method
    action: 'use only supported CI methods: goodman, sison-glaz, or binomial'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unsupported CI methods cause statsmodels to raise ValueError, breaking the estimation pipeline
    stage_ids:
    - matrix_estimation
  - id: finance-C-039
    when: When running Aalen-Johansen estimator on event history data
    action: pre-sort data in ascending time order before fitting
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unsorted data causes the Aalen-Johansen algorithm to process events out of temporal order, producing incorrect
      transition matrices that violate the Markov property
    stage_ids:
    - matrix_estimation
  - id: finance-C-053
    when: When implementing generator() method
    action: Use scipy.linalg.logm for matrix logarithm computation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using numpy.log or other approximation methods produces invalid generator matrices with row sums not equal
      to zero, causing incorrect credit risk calculations
    stage_ids:
    - matrix_operations
  - id: finance-C-054
    when: When computing generator from transition matrix
    action: Verify resulting Q matrix has row sums equal to zero
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Generator Q matrix with non-zero row sums is mathematically invalid, causing incorrect continuous-time Markov
      chain modeling
    stage_ids:
    - matrix_operations
  - id: finance-C-055
    when: When computing power() of transition matrix
    action: Verify resulting matrix has row sums equal to one
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Powered matrix with row sums not equal to 1 violates stochastic matrix properties, causing invalid multi-period
      transition probability calculations
    stage_ids:
    - matrix_operations
  - id: finance-C-060
    when: When performing matrix logarithm (logm) computation
    action: Use scipy.linalg.logm instead of numpy.log
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: numpy.log performs element-wise logarithm which is mathematically incorrect for matrix logarithm, producing
      invalid generator matrices
    stage_ids:
    - matrix_operations
  - id: finance-C-066
    when: When performing matrix exponentiation for generator
    action: Use scipy.linalg.expm for matrix exponential computation
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Using numpy.exp element-wise is mathematically incorrect for matrix exponential, producing invalid transition
      matrices
    stage_ids:
    - matrix_operations
  - id: finance-C-068
    when: When implementing credit curve validation
    action: Check cumulative PD values are monotonically non-decreasing across periods
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Cumulative default probability that decreases over time violates the fundamental property that defaults accumulate.
      This produces invalid credit risk calculations and incorrect probability of default term structures.
    stage_ids:
    - credit_curves
  - id: finance-C-069
    when: When implementing credit curve validation
    action: Validate hazard rate non-negativity using iPD / (1 - cPD[k-1]) formula
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative hazard rates indicate invalid probability calculations where incremental default probability exceeds
      survival probability, producing mathematically impossible conditional default rates.
    stage_ids:
    - credit_curves
  - id: finance-C-070
    when: When extracting credit curves from transition matrix set
    action: Verify CreditCurve column count matches the number of periods in the matrix set
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: A credit curve with incorrect number of periods produces misaligned probability arrays when used in downstream
      calculations, causing dimension mismatch errors or silent incorrect results.
    stage_ids:
    - credit_curves
  - id: finance-C-071
    when: When computing survival rates from cumulative PD
    action: Verify sR[k] = 1.0 - cPD[k] for each periods k to verify probability conservation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the constraint sR + cPD = 1 means probability mass is not conserved. At period T with certainty
      of outcome (default or survival), the probabilities must sum to exactly 1.
    stage_ids:
    - credit_curves
  - id: finance-C-072
    when: When validating credit curve probability bounds
    action: Reject cumulative PD values outside the range [0, 1] to maintain valid probability semantics
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Cumulative default probabilities outside [0,1] represent invalid probability distributions, either negative
      mass or exceeding certainty of default, corrupting all downstream risk calculations.
    stage_ids:
    - credit_curves
  - id: finance-C-074
    when: When building CreditCurve from transition matrix set
    action: Limit curve rows to dimension-1 excluding the absorbing default state
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Including the default state itself in credit curves produces meaningless 100% default probability row. Credit
      curves are meaningful only for transient states that can transition to default.
    stage_ids:
    - credit_curves
  - id: finance-C-075
    when: When calling default_curves with cumulative temporal type
    action: Pass temporal_type='Incremental' as it is not implemented and causes no-op
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Calling default_curves with temporal_type='Incremental' returns zeroed arrays due to the empty pass statement,
      producing silent zero-valued probabilities that corrupt all downstream calculations.
    stage_ids:
    - credit_curves
  - id: finance-C-083
    when: When passing StateSpace to estimator constructor
    action: verify StateSpace.cardinality equals the dimension of the transition matrix being estimated
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Dimension mismatch between StateSpace and data causes incorrect matrix shape allocation, leading to index
      errors or silent data corruption in estimation results
    stage_ids:
    - state_space_definition
    - matrix_estimation
  - id: finance-C-084
    when: When passing binned cohort data from preprocessing to matrix_estimation
    action: verify the data DataFrame has columns ['ID', 'Time', 'State', 'EventTime', 'Count']
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required columns cause KeyError exceptions when cohort estimator attempts to access entity_id, state_label,
      or timestep_label
    stage_ids:
    - data_preprocessing
    - matrix_estimation
  - id: finance-C-085
    when: When passing sorted cohort data to CohortEstimator.fit()
    action: verify data is sorted by ['ID', 'Time'] in ascending order before passing to estimator
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unsorted data causes incorrect transition counting as the estimator assumes sequential observations per entity,
      producing invalid transition matrices with row sums deviating from 1
    stage_ids:
    - data_preprocessing
    - matrix_estimation
  - id: finance-C-086
    when: When passing synthetic data from generators to matrix_estimation
    action: 'verify synthetic DataFrame uses correct format columns: ''ID'', ''Time'', ''State'' for Compact or ''ID'', ''Time'',
      ''From'', ''To'' for Canonical'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect column names cause KeyError or silent misassignment of entity_id, state transitions, leading to
      garbage-in garbage-out in matrix estimation
    stage_ids:
    - data_generation
    - matrix_estimation
  - id: finance-C-087
    when: When passing estimated matrix_set from matrix_estimation to matrix_representation
    action: validate each TransitionMatrix entries have row sums equal to 1.0 before downstream use
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unvalidated matrices with row sums deviating from 1.0 produce incorrect probability calculations in downstream
      credit curve analysis, violating conservation of probability
    stage_ids:
    - matrix_estimation
    - matrix_representation
  - id: finance-C-088
    when: When converting estimated data to TransitionMatrix objects
    action: pass unvalidated probability values outside [0, 1] range to TransitionMatrix
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Negative probabilities or values exceeding 1.0 indicate estimation errors that corrupt downstream risk calculations
      and credit curve analysis
    stage_ids:
    - matrix_estimation
    - matrix_representation
  - id: finance-C-089
    when: When passing TransitionMatrix/TransitionMatrixSet to matrix operations
    action: verify TransitionMatrix is square (rows == columns) before matrix operations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-square matrices cause linear algebra errors in multiplication and cumulation operations, producing NaN
      values or silent incorrect results
    stage_ids:
    - matrix_representation
    - matrix_operations
  - id: finance-C-094
    when: When passing canonical form data to Aalen-Johansen estimator
    action: verify data is sorted in ascending time order before passing to fit() method
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unsorted data causes incorrect timepoint indexing, leading to invalid transition density calculations and
      corrupted empirical transition matrices
    stage_ids:
    - data_preprocessing
    - matrix_estimation
  - id: finance-C-101
    when: When creating TransitionMatrixSet for credit curve analysis
    action: set temporal_type to 'Cumulative' or call cumulate() before calling default_curve_set()
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Non-cumulative matrices produce incorrect credit curves as default_curve_set() directly indexes the highest-indexed
      column assuming cumulative probabilities
    stage_ids:
    - matrix_operations
    - credit_curves
  - id: finance-C-102
    when: When implementing or validating a transition matrix in the system
    action: Verify each row sums equal 1.0 within the specified accuracy tolerance (default 1e-3)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid transition matrices produce incorrect probability calculations, leading to flawed credit risk assessments
      and regulatory non-compliance
  - id: finance-C-103
    when: When implementing or validating a transition matrix in the system
    action: Verify each transition matrix values are within the closed interval [0, 1] representing valid probabilities
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative probabilities or values exceeding 1.0 invalidate the matrix as a proper probability distribution,
      corrupting downstream risk calculations
  - id: finance-C-104
    when: When implementing or validating a transition matrix in the system
    action: Verify transition matrices are square (n×n dimensions with equal row and column count)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-square matrices cannot represent valid state transition probabilities and cause matrix multiplication
      failures in multi-period calculations
  - id: finance-C-110
    when: When calling Aalen-Johansen fit() method for duration-based estimation
    action: Pre-sort input data in ascending time order before passing to the estimator
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Unsorted data causes incorrect observation time extraction and produces invalid transition probability estimates
      with look-ahead bias
  - id: finance-C-111
    when: When calling CohortEstimator fit() method
    action: Set cohort_bounds parameter before invoking fit() on the CohortEstimator
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Fitting without cohort bounds causes array index errors or division-by-zero when calculating transition frequencies
  - id: finance-C-112
    when: When processing data with the CohortEstimator
    action: Verify input data is sorted by entity ID first, then by ascending time within each entity's observations
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Unsorted data causes incorrect entity transition tracking and produces wrong cohort migration counts due
      to sequential row comparison assumptions
  - id: finance-C-151
    when: When computing period-specific default probabilities from survival curve data
    action: Calculate incremental default probability as iPD[k] = cPD[k] - cPD[k-1], where cPD is cumulative default probability
      at period boundaries
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using hazard-based calculation or alternative formulas produces inconsistent single-period default measures
      that do not match actuarial survival curve derivatives, causing misinterpretation of period-specific default risk
    derived_from_bd_id: BD-094
  - id: finance-C-160
    when: When processing compact format data that relies on sequential ordering to infer From states
    action: Validate that compact data is sorted by entity ID and time before format conversion; if gaps or out-of-sequence
      events are detected, explicitly reject or log discrepancies rather than relying on implicit bootstrap fallback from
      to_canonical()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Compact format relies on sequential ordering to infer From states, and the to_canonical bootstrap assumption
      amplifies data quality issues; out-of-sequence compact data produces incorrect canonical format with silent corruption
      that accumulates across datasets in automated pipelines
    derived_from_bd_id: BD-111
  - id: finance-C-161
    when: When performing long-term actuarial projections using matrix logarithm and exponential operations
    action: Use expm(n * logm(P)) for multi-period projections only when n <= 10; for longer projection periods (10-30 years
      typical in credit risk), use analytical eigenvalue methods, high-precision libraries, or adaptive error bounds to avoid
      compounding numerical errors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Matrix logarithm and exponential operations form an inverse pair where numerical errors from logm compound
      during expm projections; for 10-30 year credit risk projections, this causes measurable error accumulation in reserve
      calculations and regulatory capital requirements
    derived_from_bd_id: BD-114
  - id: finance-C-168
    when: When implementing TransitionMatrixSet for regulatory credit risk reporting under CRR/IRB frameworks
    action: Distinguish between temporal_type='Incremental' (single-period transitions) and temporal_type='Cumulative' (multi-period
      from inception) based on regulatory reporting requirements; Incremental is for period-by-period analysis, Cumulative
      is for horizon-based projections
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using the wrong temporal_type causes incorrect regulatory capital calculations; cumulative matrices from
      inception vs incremental single-period transitions produce materially different probability distributions affecting
      IRB capital requirements
    derived_from_bd_id: BD-015
  - id: finance-C-178
    when: When implementing or refactoring transition matrix validation logic
    action: 'Validate each three constraints: (1) matrix squareness (n×n), (2) each elements in [0,1] bounds, (3) each row
      sums to exactly 1.0 — reject matrices failing any constraint'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid transition matrices with non-square dimensions, out-of-bounds probabilities, or rowsum≠1 propagate
      invalid state transition probabilities through Markov chain computations, causing silent numerical errors in downstream
      calculations
    derived_from_bd_id: BD-059
  - id: finance-C-190
    when: When implementing generator calculation for continuous-time Markov chains using matrix logarithm
    action: Validate that the input transition matrix P is a valid stochastic matrix with no negative eigenvalues before applying
      logm(P); if eigenvalues are negative or complex, reject the matrix with an explicit error rather than falling back to
      approximation methods
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Computing matrix logarithm on an invalid stochastic matrix produces undefined or incorrect generator values,
      causing the entire continuous-time Markov chain model to be mathematically unsound and producing incorrect transition
      probability predictions
    derived_from_bd_id: BD-055
  regular:
  - id: finance-C-003
    when: When providing cqs_mapping with StateSpace
    action: verify cqs_mapping dictionary keys are string representations of state indices matching the state space
    severity: high
    kind: domain_rule
    modality: must
    consequence: The cqs_map method uses integer state indices to look up cqs_mapping keys, but keys are strings. Lookup fails
      silently returning None when key types don't match
    stage_ids:
    - state_space_definition
  - id: finance-C-004
    when: When inferring state space from transition_data using the _infer method
    action: verify transition_data contains a 'State' column as the method requires hardcoded column name
    severity: high
    kind: domain_rule
    modality: must
    consequence: The _infer method at line 78 hardcodes 'State' as the column name. If the data uses a different column name
      without passing labels parameter, KeyError is raised
    stage_ids:
    - state_space_definition
  - id: finance-C-005
    when: When implementing state inference with ASCII character labels
    action: rely on _infer for production systems with ASCII state labels as order becomes arbitrary
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: The _infer method uses Python's sorted() function which orders ASCII characters alphabetically, not by credit
      rating quality. AAA may sort after BBB, breaking rating hierarchy assumptions
    stage_ids:
    - state_space_definition
  - id: finance-C-006
    when: When using cqs_map method for rating harmonization
    action: present CQS mappings as statistically validated alignment rather than nominal mappings
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: CQS mappings are defined by regulation convention, not statistical correlation. Presenting them as validated
      alignment misleads users about regulatory compliance
    stage_ids:
    - state_space_definition
  - id: finance-C-007
    when: When calling cqs_map with a label not present in the state space
    action: handle the None return value explicitly as mapping failure indicator
    severity: medium
    kind: domain_rule
    modality: must
    consequence: When cqs_map fails to find a mapping, it returns None silently. Downstream code treating None as a valid
      CQS value causes incorrect rating harmonization results
    stage_ids:
    - state_space_definition
  - id: finance-C-008
    when: When validating dataset against state space using validate_dataset
    action: provide explicit labels parameter when dataset uses non-standard column names
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without labels parameter, validate_dataset defaults to 'State' column name. Data with different column names
      passes validation without checking any states
    stage_ids:
    - state_space_definition
  - id: finance-C-009
    when: When initializing StateSpace with both definition and transition_data
    action: verify explicit definition takes precedence over inferred definition from data
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: The __init__ method at lines 56-57 documents that explicitly provided definition takes precedence. Violating
      this contract causes state space to differ from user expectations
    stage_ids:
    - state_space_definition
  - id: finance-C-011
    when: When working with empty transition_data and undefined definition
    action: allow creation of empty state space with cardinality 0
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Empty state space with cardinality 0 causes division by zero in estimators when normalizing transition counts,
      producing NaN values
    stage_ids:
    - state_space_definition
  - id: finance-C-012
    when: When creating transition matrices with predefined credit rating scales
    action: verify matrix dimensions are consistent with the credit rating scale cardinality
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Predefined rating scales like SnP and Moodys have different granularities. Using mismatched matrix dimensions
      causes incorrect transition probability calculations and validation failures
    stage_ids:
    - state_space_definition
  - id: finance-C-013
    when: When implementing estimators that iterate over state space
    action: use states.cardinality as the loop bound, not hardcoded constants
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hardcoded loop bounds create brittle code that breaks when state space definition changes. Dynamic cardinality-based
      loops ensure correct matrix dimensions across different rating scales
    stage_ids:
    - state_space_definition
  - id: finance-C-014
    when: When the LLM assumes state indices match alphabetical order of labels
    action: skip explicit validation of state index to label mapping
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Alphabetical sorting puts 'AAA' after 'BBB' and 'D' before 'CCC'. Skipping validation allows inverted rating
      scales to propagate through all downstream calculations
    stage_ids:
    - state_space_definition
  - id: finance-C-015
    when: When the LLM sees similar-looking cqs_mapping patterns across multiple rating agencies
    action: assume cqs_mapping structure is identical across different rating scales
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Different rating agencies have different numbers of fine-grained ratings mapped to the same coarse CQS scale.
      Copying mapping structure causes index mismatches and incorrect harmonization
    stage_ids:
    - state_space_definition
  - id: finance-C-016
    when: When creating generic state spaces for testing
    action: use Generic_SS for production credit calculations as it lacks CQS mapping
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Generic_SS at line 47 of creditsystems.py has cqs_mapping=None. Using it for regulatory calculations fails
      CQS harmonization requirements
    stage_ids:
    - state_space_definition
  - id: finance-C-017
    when: When using get_states() method for state space inspection
    action: understand it returns only indices (0, 1, 2...) not the full (index, label) tuples
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Code expecting (index, label) tuples from get_states() receives only integers, causing attribute errors or
      unexpected iteration behavior
    stage_ids:
    - state_space_definition
  - id: finance-C-020
    when: When using exponential_transitions() for continuous-time simulation
    action: Generate inter-event times using scipy.stats.expon.rvs() with the memoryless property matching homogeneous Poisson
      process
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a non-exponential distribution breaks the memoryless property assumption of continuous-time Markov
      chain simulation, invalidating duration-based estimators
    stage_ids:
    - data_generation
  - id: finance-C-022
    when: When implementing a custom time_distribution for continuous-time generation
    action: Verify the distribution preserves the memoryless property required by homogeneous Poisson processes
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Custom distributions without memoryless property invalidate the theoretical foundation of continuous-time
      Markov chain simulation and duration-based estimators
    stage_ids:
    - data_generation
  - id: finance-C-024
    when: When using exponential_transitions() for testing cohorting algorithms
    action: Accept that the function may generate successive events in the same state (no transition)
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Ignoring this property causes confusion when count of state changes is less than total events; sticky=False
      assumption is violated without explicit handling
    stage_ids:
    - data_generation
  - id: finance-C-025
    when: When choosing timesteps parameter for Markov chain generation
    action: Include the initial state observation in the timesteps count (timesteps includes k=0)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Misunderstanding timesteps counting causes off-by-one error in number of state observations per entity, breaking
      estimator event count assertions
    stage_ids:
    - data_generation
  - id: finance-C-026
    when: When validating generated synthetic data
    action: Verify that estimated transition matrix from generated data closely matches the generating matrix within sampling
      error
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Generated data that doesn't reproduce the generating matrix indicates bugs in data generation logic, not
      just sampling variance
    stage_ids:
    - data_generation
  - id: finance-C-027
    when: When presenting synthetic data generation results
    action: Present synthetic backtest results as evidence of real trading or actuarial performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Synthetic data reflects idealized assumptions and cannot substitute for empirical evidence; presenting it
      as proof violates financial analysis standards
    stage_ids:
    - data_generation
  - id: finance-C-028
    when: When using transitionMatrix for continuous-time Markov chain simulation
    action: Claim support for non-homogeneous Poisson processes without explicit time-varying rate implementation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: exponential_transitions() uses homogeneous rate parameter; claiming NHPP support leads to incorrect modeling
      of time-dependent transition intensities
    stage_ids:
    - data_generation
  - id: finance-C-029
    when: When considering skipping validation of generated data
    action: Skip the step of validating that generated data follows Markov chain properties
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Invalid generated data used in estimator testing creates false confidence; subtle bugs in generation logic
      remain undetected until live deployment
    stage_ids:
    - data_generation
  - id: finance-C-030
    when: When data generation produces unexpected results due to time pressure
    action: Skip investigating why the initial state encoding doesn't match expected identity transition pattern
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Incorrect initial state encoding propagates through all downstream estimators, corrupting all transition
      matrix estimates without obvious error messages
    stage_ids:
    - data_generation
  - id: finance-C-031
    when: When the generated data has small sample size causing high variance
    action: Attribute discrepancies between generating and estimated matrices to bugs rather than sampling error without statistical
      analysis
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Incorrectly attributing sampling variance to implementation bugs leads to unnecessary debugging and potential
      overcorrection of working code
    stage_ids:
    - data_generation
  - id: finance-C-035
    when: When computing confidence intervals using the Goodman method
    action: verify each count values are greater than or equal to 5 for valid chi-squared approximation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Goodman confidence intervals become unreliable when counts are below 5, producing statistically invalid confidence
      bounds that misrepresent estimation uncertainty
    stage_ids:
    - matrix_estimation
  - id: finance-C-036
    when: When computing confidence intervals using the sison-glaz method
    action: verify the counts array has 7 or more categories for valid sison-glaz approximation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sison-Glaz confidence intervals require at least 7 categories, otherwise the method produces invalid confidence
      bounds with incorrect coverage
    stage_ids:
    - matrix_estimation
  - id: finance-C-040
    when: When fitting cohort estimator on event data
    action: verify cohort_bounds contains at least two distinct timepoints (initial and final)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single timepoint cohort bounds produce degenerate matrices with zero periods, making transition estimation
      impossible
    stage_ids:
    - matrix_estimation
  - id: finance-C-041
    when: When computing confidence intervals for transition matrix estimation
    action: expect CI computation if statsmodels library is not installed
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Attempting CI computation without statsmodels raises ImportError, breaking the estimation pipeline when CI
      parameters are provided
    stage_ids:
    - matrix_estimation
  - id: finance-C-042
    when: When estimating matrices from small sample datasets
    action: expect high statistical uncertainty in estimated transition probabilities
    severity: medium
    kind: resource_boundary
    modality: should_not
    consequence: Small samples produce high-variance estimates where estimated row sums deviate significantly from 1.0 and
      individual probabilities fall outside valid bounds
    stage_ids:
    - matrix_estimation
  - id: finance-C-043
    when: When using the Aalen-Johansen estimator
    action: expect confidence intervals to be computed automatically
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Aalen-Johansen CI computation is not yet implemented (marked TODO in source), so providing CI parameters
      has no effect
    stage_ids:
    - matrix_estimation
  - id: finance-C-044
    when: When using Aalen-Johansen estimator
    action: expect censored data handling to be implemented
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Censored data handling is not yet implemented, so right-censored observations are processed incorrectly,
      biasing transition probability estimates
    stage_ids:
    - matrix_estimation
  - id: finance-C-045
    when: When running cohort estimator on production data
    action: validate that estimated row sums equal 1.0 within accuracy tolerance before use
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Row sums deviating from 1.0 indicate data quality issues or numerical precision problems, leading to incorrect
      probability distributions in downstream Markov chain simulations
    stage_ids:
    - matrix_estimation
  - id: finance-C-046
    when: When preparing data for cohort estimator
    action: sort data by entity ID first, then by time within each entity
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unsorted data causes the estimator to incorrectly match non-consecutive observations as transitions, producing
      inflated off-diagonal probabilities
    stage_ids:
    - matrix_estimation
  - id: finance-C-047
    when: When performing cohort estimation on entities with only one observation
    action: expect transition counts to be recorded for these entities
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Single-observation entities cannot contribute to transition counts since they have no subsequent state to
      transition to, reducing effective sample size
    stage_ids:
    - matrix_estimation
  - id: finance-C-048
    when: When inheriting from BaseEstimator to implement new estimators
    action: 'follow the inheritance hierarchy: BaseEstimator -> DurationEstimator -> AalenJohansenEstimator'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect inheritance breaks the method resolution order, causing AttributeError when accessing matrix_set,
      count_set, and confidence interval attributes
    stage_ids:
    - matrix_estimation
  - id: finance-C-049
    when: When implementing fit() method in new estimator classes
    action: populate matrix_set, count_set, and count_normalization lists in the correct order
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect population order causes TransitionMatrixSet.matrix_set to contain wrong number of period matrices,
      breaking downstream matrix_representation stage
    stage_ids:
    - matrix_estimation
  - id: finance-C-050
    when: When validating transition matrix estimation results
    action: check that TransitionMatrixSet.matrix_set contains the correct number of period matrices
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect matrix count indicates failed estimation or data preprocessing issues, causing matrix_representation
      stage to produce incomplete output
    stage_ids:
    - matrix_estimation
  - id: finance-C-051
    when: When presenting transition matrix estimation results to stakeholders
    action: claim that estimated transition probabilities equal expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Historical estimation results do not guarantee future transition behavior due to regime changes, population
      drift, and sampling uncertainty
    stage_ids:
    - matrix_estimation
  - id: finance-C-052
    when: When using cohort estimator results for regulatory reporting
    action: present estimation confidence intervals as precise uncertainty bounds
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Goodman/sison-glaz confidence intervals are approximations that may understate or overstate true uncertainty,
      especially with small samples or sparse categories
    stage_ids:
    - matrix_estimation
  - id: finance-C-056
    when: When computing cumulative transition matrix set
    action: Set temporal_type to 'Cumulative' after cumulation completes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing temporal_type update causes incorrect type tracking, leading to wrong assumptions in downstream credit
      curve calculations
    stage_ids:
    - matrix_operations
  - id: finance-C-058
    when: When computing default_curves for a rating
    action: Identify absorbing state as the highest matrix index (dimension - 1)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect absorbing state identification causes wrong default probability calculations, producing invalid
      credit risk metrics
    stage_ids:
    - matrix_operations
  - id: finance-C-059
    when: When using incremental() method on cumulative matrix set
    action: Validate each cumulative matrices are invertible before computing inverse
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Computing inverse of singular or near-singular matrix causes numerical instability and incorrect incremental
      transition probabilities
    stage_ids:
    - matrix_operations
  - id: finance-C-061
    when: When handling generator matrices with negative off-diagonal elements
    action: Use fix_negative=True parameter to flip negative elements and adjust diagonal
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Generator with negative off-diagonal elements violates intensity matrix properties, causing invalid continuous-time
      credit risk calculations
    stage_ids:
    - matrix_operations
  - id: finance-C-062
    when: When validating transition matrices before matrix operations
    action: Check each entries are probabilities between 0 and 1
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid probability values cause mathematically undefined behavior in matrix logarithm and power operations
    stage_ids:
    - matrix_operations
  - id: finance-C-063
    when: When computing credit curves via default_curve_set()
    action: Return CreditCurve object with proper dimension (dimension-1 x periods)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect credit curve dimensions cause mismatched downstream calculations and invalid probability of default
      time series
    stage_ids:
    - matrix_operations
  - id: finance-C-064
    when: When computing hazard rates from cumulative probabilities
    action: Handle zero denominator case to avoid division by zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero in hazard rate calculation (1 - cPD[k-1]) causes runtime error or infinite hazard rate for
      fully defaulted states
    stage_ids:
    - matrix_operations
  - id: finance-C-065
    when: When using TransitionMatrixSet operations
    action: Verify input matrix set is validated before cumulate/incremental operations
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Operating on invalid matrices produces cascading errors in cumulative/incremental calculations with no early
      detection
    stage_ids:
    - matrix_operations
  - id: finance-C-067
    when: When removing states from transition matrix
    action: Distribute probability mass proportionally to preserve stochastic properties
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-proportional redistribution violates stochastic matrix constraints, causing invalid transition probabilities
      after state removal
    stage_ids:
    - matrix_operations
  - id: finance-C-073
    when: When deriving incremental PD from cumulative PD
    action: Compute iPD[k] = cPD[k] - cPD[k-1] ensuring incremental probabilities are non-negative
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative incremental default probability indicates cumulative PD decreased between periods, which is mathematically
      impossible and indicates corrupted transition matrix data.
    stage_ids:
    - credit_curves
  - id: finance-C-076
    when: When calling hazard_curve method on CreditCurve
    action: Use the unimplemented CreditCurve.hazard_curve() method which returns None
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Calling the hazard_curve() method returns None (empty pass statement), causing AttributeError or TypeError
      when downstream code tries to use the returned hazard rates.
    stage_ids:
    - credit_curves
  - id: finance-C-077
    when: When accessing credit curve data without calling validate()
    action: Explicitly call CreditCurve.validate() before using credit curves in production calculations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: CreditCurve does not auto-validate at initialization (per docstring 'initialization in itself does not validate').
      Using unvalidated curves risks propagating invalid probabilities throughout the system.
    stage_ids:
    - credit_curves
  - id: finance-C-078
    when: When implementing credit curve extraction
    action: Assume absorbing default state is at index dimension-1 (last row/column)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The absorbing state detection is hardcoded to 'Default = self.dimension - 1' (model.py:662, 686). Using a
      different state ordering produces incorrect credit curves with wrong default probabilities extracted.
    stage_ids:
    - credit_curves
  - id: finance-C-079
    when: When using transition matrix set for credit curves
    action: Expect CreditCurve to auto-detect period count from TransitionMatrixSet dimensions
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: The CreditCurve shape must match the matrix set periods but this requires explicit construction through default_curve_set().
      Direct instantiation does not perform this validation.
    stage_ids:
    - credit_curves
  - id: finance-C-080
    when: When deriving hazard rates for period zero
    action: Set hR[0] = cPD[0] for the first period since no prior period exists
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hazard rate at period 0 cannot use the conditional formula (division by zero). Using cPD[0] as hR[0] is the
      correct approximation for the initial period's unconditional default probability.
    stage_ids:
    - credit_curves
  - id: finance-C-081
    when: When implementing credit curve characterize method
    action: Call CreditCurve.characterize() as it is not implemented and returns None
    severity: low
    kind: resource_boundary
    modality: must_not
    consequence: The characterize() method contains only 'pass' with TODO markers. Calling it returns None, causing downstream
      code failures when trying to process classification results.
    stage_ids:
    - credit_curves
  - id: finance-C-082
    when: When implementing synthetic data generators using StateSpace.get_states()
    action: use only state indices returned by get_states() for generating transitions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using state labels directly may cause index/label mismatches when StateSpace definition contains non-sequential
      or non-numeric state identifiers
    stage_ids:
    - state_space_definition
    - data_generation
  - id: finance-C-090
    when: When converting TransitionMatrixSet between temporal types (Incremental/Cumulative)
    action: call incremental() on a Cumulative set or cumulate() on an Incremental set without proper type checking
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Redundant conversion operations produce warning messages and may introduce floating-point rounding errors
      in matrix values
    stage_ids:
    - matrix_representation
    - matrix_operations
  - id: finance-C-091
    when: When passing TransitionMatrixSet to credit_curves for default probability calculation
    action: verify temporal_type is 'Cumulative' when calling default_curves() method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling default_curves() with Incremental temporal_type produces incorrect cumulative default probabilities,
      as the method directly indexes cumulative default states without conversion
    stage_ids:
    - matrix_operations
    - credit_curves
  - id: finance-C-092
    when: When computing credit curves from TransitionMatrixSet
    action: verify the default (absorbing) state is positioned as the highest-indexed state (dimension - 1)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect default state indexing produces wrong default probability curves, corrupting risk assessments and
      regulatory capital calculations
    stage_ids:
    - matrix_operations
    - credit_curves
  - id: finance-C-093
    when: When validating CreditCurve values
    action: verify credit curve values are non-decreasing across time periods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Decreasing cumulative default probabilities violate financial mathematics principles, producing physically
      impossible negative hazard rates
    stage_ids:
    - matrix_operations
    - credit_curves
  - id: finance-C-095
    when: When passing canonical form data with 'From'/'To' columns
    action: provide labels dictionary mapping column names to ['ID', 'Time', 'From', 'To'] when column names deviate from
      defaults
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect column name mapping causes ValueError or silent misassignment of from_state/to_state, corrupting
      transition counting
    stage_ids:
    - data_preprocessing
    - matrix_estimation
  - id: finance-C-096
    when: When binning timestamps into cohorts in data_preprocessing
    action: apply remove_stale=True when entities should not have repeat observations in the same state
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without removing stale events, cohort assignments preserve identical consecutive states, producing biased
      transition counts that overcount self-transitions
    stage_ids:
    - data_preprocessing
    - matrix_estimation
  - id: finance-C-097
    when: When converting compact format data to canonical format
    action: include final state observation for each entity at end of observation window
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing final state observations cause incomplete transition chains, as the 'To' state cannot be inferred
      from subsequent records
    stage_ids:
    - data_preprocessing
    - matrix_estimation
  - id: finance-C-098
    when: When validating StateSpace against dataset states
    action: call StateSpace.validate_dataset() to check data consistency before matrix estimation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Unvalidated state space mismatches cause silent column access errors or incorrect transition counting, producing
      invalid transition matrices
    stage_ids:
    - state_space_definition
    - matrix_estimation
  - id: finance-C-099
    when: When handling NaN values in cohort data
    action: pass NaN state values directly to cohort estimator without proper handling
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: NaN states cause ValueError in cohort estimator row iteration, setting erroneous sentinel values (-99999)
      that corrupt transition counting
    stage_ids:
    - data_preprocessing
    - matrix_estimation
  - id: finance-C-100
    when: When passing transition data with string date formats
    action: convert datetime strings to float representation using datetime_to_float() before passing to estimators
    severity: high
    kind: resource_boundary
    modality: must
    consequence: String dates cause type mismatch errors in numeric comparisons, producing incorrect timestamp ordering and
      invalid transition calculations
    stage_ids:
    - data_preprocessing
    - matrix_estimation
  - id: finance-C-105
    when: When computing default curves or identifying absorbing states in credit migration analysis
    action: Use the convention that the default/absorbing state has index equal to (dimension - 1), the highest-indexed state
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect absorbing state identification leads to wrong default probability calculations and erroneous credit
      curve generation
  - id: finance-C-106
    when: When processing transition data in compact format
    action: Use DataFrame columns named 'ID', 'Time', and 'State' for compact format input
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect column names cause KeyError exceptions or silent data misalignment during transition matrix estimation
  - id: finance-C-107
    when: When processing transition data in canonical format for duration-based estimators
    action: Use DataFrame columns named 'ID', 'Time', 'From', and 'To' for canonical format input
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect column names cause KeyError exceptions or incorrect transition tracking in Aalen-Johansen estimation
  - id: finance-C-108
    when: When defining or inferring a state space from data
    action: Use 0-based contiguous integer indices for state space definitions (state 0, state 1, ..., state n-1)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-contiguous or non-zero-based indices cause array indexing errors and incorrect matrix access patterns
  - id: finance-C-109
    when: When calling cumulate() or incremental() on a TransitionMatrixSet
    action: Set temporal_type attribute to either 'Cumulative' or 'Incremental' before invoking cumulate() or incremental()
      methods
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling temporal conversion methods without setting temporal_type causes attribute errors or incorrect matrix
      accumulation behavior
  - id: finance-C-113
    when: When using datetime_to_float() or generate_cohort_bounds() conversion utilities
    action: Convert time column to float format before passing to cohorting functions that expect numerical timestamps
    severity: high
    kind: operational_lesson
    modality: must
    consequence: String date columns cause TypeError in timestamp arithmetic operations during cohort interval calculation
  - id: finance-C-114
    when: When calling bin_timestamps() for cohort discretization
    action: Pre-sort input data by ID and Time before invoking bin_timestamps() function
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unsorted data produces incorrect cohort assignments and loses intermediate state transitions due to incorrect
      binning order
  - id: finance-C-115
    when: When presenting or reporting this system's estimated transition matrices to users
    action: Claim that empirically estimated transition matrices represent true population parameters without uncertainty
      quantification
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users allocate capital or set risk parameters based on point estimates that lack confidence intervals, leading
      to inadequate risk buffers and potential regulatory violations
  - id: finance-C-116
    when: When presenting or reporting this system's transition matrix estimation results
    action: Claim that estimated matrices are valid for periods outside the observation window without temporal homogeneity
      testing
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users extend matrices to future periods assuming stationarity that may not hold, resulting in materially
      incorrect risk assessments during market regime changes
  - id: finance-C-117
    when: When describing the capabilities of this library to stakeholders
    action: Claim support for real-time streaming data processing or live trading execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users build real-time risk systems expecting live data integration that the library cannot support, leading
      to system failures and incorrect risk calculations
  - id: finance-C-118
    when: When describing the capabilities of this library to stakeholders
    action: Claim support for continuous state spaces or non-Markov transition processes requiring memory
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users attempt to model continuous phenomena or processes with path dependency using discrete Markov framework,
      producing fundamentally incorrect models
  - id: finance-C-119
    when: When describing the capabilities of this library to stakeholders
    action: Claim support for high-frequency event processing with millisecond-level timestamps
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users process high-frequency data assuming timestamp precision is preserved, when the library uses float
      normalization that loses granularity
  - id: finance-C-120
    when: When building production systems using this library
    action: Treat the API as stable without accounting for breaking changes between versions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Production systems relying on undocumented behavior break when upgrading library versions, causing analysis
      pipeline failures
  - id: finance-C-121
    when: When claiming capabilities of the EmpiricalTransitionMatrix class
    action: Claim that EmpiricalTransitionMatrix provides continuously observed transition matrix functionality
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users attempt to use EmpiricalTransitionMatrix for continuous-time analysis when the class is explicitly
      marked as not implemented
  - id: finance-C-122
    when: When claiming capabilities of the confidence interval functionality
    action: Claim that transition matrix estimators provide confidence intervals by default
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users expect uncertainty quantification in production systems when confidence intervals are optional and
      require explicit configuration with unsupported methods
  - id: finance-C-123
    when: When implementing credit migration matrix estimation for competing risks data with right-censoring
    action: Use the Aalen-Johansen estimator (aalen_johansen_estimator.py module) as the non-parametric generalization of
      Kaplan-Meier, NOT alternative estimators like Cox regression or Kaplan-Meier alone
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Kaplan-Meier alone ignores competing risks, systematically overestimating transition probabilities
      to absorbing states; using Cox regression imposes proportional hazards assumptions invalid for credit migration data
    derived_from_bd_id: BD-042
  - id: finance-C-124
    when: When computing state counts for transition probability estimation
    action: Normalize state counts by the population at risk per timepoint, excluding individuals who have already transitioned
      or been censored from the denominator
    severity: high
    kind: domain_rule
    modality: must
    consequence: Crude count normalization produces biased transition probability estimates because it includes already-transitioned
      individuals in the denominator, inflating denominator and underestimating transition rates to non-default states
    derived_from_bd_id: BD-044
  - id: finance-C-125
    when: When implementing cumulative transition matrix computation for multi-period projections
    action: Use the recursive product-limit formula P(t_k) = P(t_{k-1}) + P(t_{k-1}) * dQ(t_k), NOT direct matrix multiplication
    severity: high
    kind: domain_rule
    modality: must
    consequence: Direct matrix multiplication does not handle censoring correctly and will produce transition matrices that
      violate probability constraints, causing cumulative errors in long-term projections
    derived_from_bd_id: BD-046
  - id: finance-C-126
    when: When using CohortEstimator with cohort boundary conditions
    action: Apply the documented time index SHIFT operation at cohort boundary conditions (ATTN comment at cohort_estimator.py:152)
      to align observation timestamps with discrete cohort intervals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting the SHIFT operation produces off-by-one or misaligned cohort assignments, particularly for entities
      with observations near cohort boundaries, causing systematic misclassification in empirical transition matrices
    derived_from_bd_id: BD-106
  - id: finance-C-127
    when: When applying matrix validation or correction methods to ensure transition matrix validity
    action: Apply matrix correction methods (fix_negativerates, fix_rowsums, diagonal fixes) in the documented order with
      explicit logging; verify a single unified correction pass or explicit correction ordering contract rather than ad-hoc
      reordering
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sequential corrections in different orders produce non-commutative results where earlier fixes are partially
      undone by later ones; for regulatory matrices requiring documented validity procedures, this creates audit trail ambiguity
      about which correction took precedence
    derived_from_bd_id: BD-115
  - id: finance-C-128
    when: When using default_curves() or default_curve_set() functions to generate default/absorbing state curves
    action: Verify that absorbing states occupy the highest index position in the state space definition; for state spaces
      with non-terminal absorbing states (e.g., intermediate recovery states), explicitly parameterize the default state rather
      than relying on hardcoded dimension-1 assumption
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Hardcoded dimension-1 assumption silently treats the highest-index state as absorbing; for state spaces where
      absorbing states are not at the highest index, default curves will reference wrong states causing silent calculation
      errors
    derived_from_bd_id: BD-108
  - id: finance-C-129
    when: When preparing data for empirical transition matrix estimation using Aalen-Johansen or CohortEstimator
    action: 'Validate data sorting at pipeline entry: Aalen-Johansen requires time-sorted data, CohortEstimator requires ID-then-Time
      sorting; implement upstream validation or internal sorting at each stage'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Multi-stage sorting dependencies across BD-010, BD-042, BD-043, BD-083, BD-097, BD-107 mean that violation
      of any single sorting requirement causes silent incorrect transition matrices without raising errors; cascade failures
      produce wrong credit migration estimates
    derived_from_bd_id: BD-113
  - id: finance-C-130
    when: When refactoring TransitionMatrix class inheritance structure
    action: Replace numpy.matrix inheritance with numpy.ndarray subclass — numpy.matrix is deprecated and removed in newer
      NumPy versions, breaking matrix arithmetic compatibility
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Replacing numpy.matrix inheritance with ndarray subclass would break matrix-specific operations like .I for
      inverse and .T for transpose that rely on numpy.matrix semantics, causing runtime AttributeErrors in credit migration
      calculations
    derived_from_bd_id: BD-057
  - id: finance-C-131
    when: When implementing generator matrix computation from transition matrices
    action: Use scipy.linalg.logm for matrix logarithm computation — eigenvalue decomposition approximation methods MUST NOT
      be used due to sensitivity to matrix structure and numerical instability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using eigenvalue decomposition instead of scipy.linalg.logm produces numerically unstable generator matrices,
      causing credit migration probabilities to diverge from Markov chain predictions by 2-15% in real-world transition matrices
    derived_from_bd_id: BD-061
  - id: finance-C-132
    when: When implementing generator matrix validation and correction logic
    action: Fix negative transition rates by flipping to diagonal and zeroing off-diagonal elements — preserving total exit
      rate while redirecting negative mass to maintain row sum constraints of 0
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying the negative rate correction to set all off-diagonal values to zero would incorrectly imply no
      transitions occur, producing invalid generator matrices that violate Markov chain properties and produce nonsensical
      credit migration probabilities
    derived_from_bd_id: BD-065
  - id: finance-C-133
    when: When implementing multi-period transition matrix generation for discrete time steps
    action: Use iterative matrix multiplication via repeated squaring for computing multi-period powers — eigenvalue decomposition
      methods MUST NOT be used due to numerical instability for non-symmetric credit migration matrices
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing iterative multiplication with eigenvalue decomposition causes numerical instability in non-symmetric
      credit transition matrices, producing probability matrices with rows that do not sum to 1.0 and introduce 1-5% errors
      in multi-period forecasts
    derived_from_bd_id: BD-066
  - id: finance-C-134
    when: When implementing Aalen-Johansen estimator for transition intensity calculation
    action: Calculate transition intensities as dA[m,n,k] = dN[m,n,k] / y[m,k] for off-diagonal elements — MUST normalize
      by exposure time (time at risk), count-based rates without normalization MUST NOT be used
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting exposure time normalization produces biased transition intensity estimates, systematically underestimating
      transition rates for entities with shorter observation windows and overestimating for longer ones, causing 10-30% error
      in calibrated credit migration models
    derived_from_bd_id: BD-068
  - id: finance-C-135
    when: When initializing TransitionMatrixSet without explicit temporal_type specification
    action: Verify that temporal_type='incremental' matches the expected data format — if using cumulative matrices, explicitly
      specify temporal_type='cumulative' to avoid systematic miscalculation of multi-period probabilities
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using cumulative matrices with the default incremental setting causes double-counting of transition probabilities,
      producing transition matrices with values exceeding 1.0 and invalid multi-period forecasts that misrepresent credit
      risk
    derived_from_bd_id: BD-030
  - id: finance-C-136
    when: When generating multi-period transition matrices using matrix power method
    action: Verify time-homogeneity assumption holds — use separate transition matrices per period for time-inhomogeneous
      credit migration data instead of power method extrapolation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying matrix power method to time-inhomogeneous credit migration data assumes constant transition rates
      across all periods, producing invalid multi-period forecasts that do not reflect actual credit cycle dynamics during
      stress periods
    derived_from_bd_id: BD-031
  - id: finance-C-137
    when: When implementing credit rating scale definitions for production credit risk systems
    action: Use the standard 8-state rating scale (AAA, AA, A, BBB, BB, B, CCC, D) as the canonical default classification
      — any deviation from this industry-standard scale must be explicitly configured and documented in production code
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using non-standard or arbitrary rating scales breaks interoperability with real-world credit migration data
      and prevents direct comparison with S&P/Moody's industry benchmarks, causing misaligned risk assessments and potential
      regulatory violations
    derived_from_bd_id: BD-038
  - id: finance-C-139
    when: When implementing state-space definition logic for portfolio rebalancing
    action: Assume the framework implements a rebalancing trigger mechanism — the framework does not provide built-in rebalancing
      logic; you must implement custom trigger conditions (e.g., drift threshold, calendar-based, or threshold-based rules)
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without an explicit rebalancing trigger, the portfolio will never rebalance even when asset allocations drift
      beyond acceptable thresholds, leading to uncontrolled tracking error in live production
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-140
    when: When implementing portfolio rebalancing logic for production reliability
    action: Implement a rebalancing trigger mechanism with explicit conditions (e.g., drift_threshold > max_drift OR rebalance_date
      == schedule_date), and verify the trigger is tested with edge cases where drift is exactly at the threshold
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing rebalancing trigger causes portfolio to accumulate unintended risk exposure over time as weights
      drift from targets, potentially causing catastrophic losses if risk limits are breached
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-141
    when: When classifying credit migration matrices for portfolio risk assessment
    action: Use diagonal dominance classification with threshold exactly 0.5 — matrices where diagonal element exceeds 0.5
      indicate high-persistence transition patterns where staying in the same state is more likely than transitioning
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using a different threshold (e.g., 0.9) misclassifies credit migration patterns, causing high-persistence
      patterns to be treated as volatile, leading to incorrect risk estimates and insufficient capital reserves
    derived_from_bd_id: BD-063
  - id: finance-C-142
    when: When enforcing stochastic constraints on transition probability matrices
    action: Fix row sums by adjusting the diagonal element — increase diagonal to absorb any row sum deficit while preserving
      off-diagonal transition probabilities that encode business-relevant credit migration dynamics
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using proportional scaling of all elements distorts relative transition probabilities, causing systematic
      mispricing of credit risk and incorrect regulatory capital calculations
    derived_from_bd_id: BD-064
  - id: finance-C-143
    when: When estimating transition probabilities from censored duration data in credit migration studies
    action: Use the Aalen-Johansen estimator — it properly handles right-censoring and competing risks for multi-state survival
      analysis; do not use simple frequency-based estimators which ignore censoring
    severity: high
    kind: domain_rule
    modality: must
    consequence: Frequency-based estimators that ignore censoring produce biased transition probability estimates, systematically
      underestimating survival times and overestimating transition rates in credit migration analysis
    derived_from_bd_id: BD-067
  - id: finance-C-144
    when: When computing average transition matrices across cohorts for baseline risk modeling
    action: Assume temporal homogeneity across cohorts when computing average matrices — use this as the null model baseline
      for testing temporal stability; if time-varying effects are significant, this assumption will be rejected by stability
      tests
    severity: high
    kind: domain_rule
    modality: must
    consequence: Computing non-homogeneous averages without accounting for time-varying effects produces an inconsistent baseline,
      causing incorrect hypothesis tests and wrong conclusions about transition rate stability
    derived_from_bd_id: BD-072
  - id: finance-C-145
    when: When estimating transitions from point-in-time data without duration information
    action: Use the single-period simple estimator with optional multinomial confidence intervals for uncertainty reporting
      — do not use bootstrap confidence intervals due to computational overhead
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using bootstrap confidence intervals without understanding the computational cost causes performance issues
      in production pipelines, and they may not converge properly with limited data
    derived_from_bd_id: BD-074
  - id: finance-C-146
    when: When validating credit default probability curves
    action: Enforce probability bounds [0,1] and check monotonicity — curves must be non-decreasing from 1 to 0 to represent
      valid survival structures; reject curves that violate these constraints
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accepting curves outside [0,1] bounds or non-monotonic curves produces negative hazard rates, which are economically
      impossible and lead to incorrect default probability calculations and mispriced credit instruments
    derived_from_bd_id: BD-075
  - id: finance-C-147
    when: When generating continuous-time events for Markov chain simulation testing
    action: Use exponential distribution for inter-event times to verify memoryless transition behavior consistent with continuous-time
      Markov chain theory — exponential draws preserve the Markov property required for estimator testing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using uniform distribution for inter-event times violates the memoryless property, producing non-Markovian
      data that cannot validly test Markov chain estimators, causing false validation of broken estimator implementations
    derived_from_bd_id: BD-076
  - id: finance-C-148
    when: When assigning event times within discrete observation intervals for simulation
    action: 'Assign event times using uniform distribution within discrete timesteps: event_time = k - uniform(0,1) — this
      properly reflects equally-likely event occurrence anywhere in the interval when only endpoints are observed'
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using midpoint assignment loses temporal variation information, causing systematic bias in estimated transition
      probabilities and incorrect survival time distributions
    derived_from_bd_id: BD-078
  - id: finance-C-149
    when: When binning temporal data into cohort intervals for transition rate estimation
    action: 'Use equal-width cohort intervals: dt = (t_max - t_min) / cohorts — this provides uniform statistical power across
      cohort periods enabling fair comparison; adaptive binning requires additional smoothing assumptions not supported'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using adaptive binning without clear smoothing assumptions produces inconsistent cohort definitions, causing
      unreliable transition rate comparisons across time periods with varying statistical power
    derived_from_bd_id: BD-080
  - id: finance-C-150
    when: When implementing continuous-time Markov chain transition matrix computation for non-integer time periods
    action: Use matrix exponentiation expm(t * G) where G is the generator matrix and t is the time horizon — compute 0.2-year
      transition matrix as expm(0.2 * G) to produce valid Markov chain transition probabilities for fractional periods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using linear interpolation on transition matrices violates Markov chain properties, producing transition
      probabilities that do not conserve row sums and introduce non-Markovian artifacts into survival analysis
    derived_from_bd_id: BD-085
  - id: finance-C-152
    when: When computing instantaneous default intensity from discrete survival curve data
    action: Calculate hazard rate as hR[k] = iPD[k] / (1.0 - cPD[k-1]), dividing incremental default probability by prior
      period survival probability to yield the instantaneous default intensity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using log-survival or alternative approaches obscures the continuous-time interpretation and produces hazard
      rate estimates inconsistent with the incremental probability derivation, causing misinterpretation of default intensity
    derived_from_bd_id: BD-095
  - id: finance-C-153
    when: When implementing cohort interval state assignment for multi-state survival analysis
    action: Assign entity state to cohort interval using the LAST observation within the interval (last-observation-carried-forward)
      — do not use first-observation or mid-interval assignment which may misclassify transitions occurring early in the interval
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using first-observation assignment misclassifies early-interval transitions, causing systematic bias in estimated
      transition matrices that leads to inaccurate survival probability estimates and incorrect credit risk pricing
    derived_from_bd_id: BD-081
  - id: finance-C-154
    when: When processing S&P rating transition data for credit migration modeling
    action: Scale S&P matrix entries by 0.01 to convert from percentage format to probability format before using in probability-based
      calculations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Omitting the 0.01 scaling factor causes all transition probabilities to be 100x larger than actual values,
      leading to transition matrices with row sums exceeding 100 and completely invalid downstream credit risk calculations
    derived_from_bd_id: BD-086
  - id: finance-C-155
    when: When initializing a TransitionMatrix without explicit arguments
    action: Verify TransitionMatrix dimensions match expected input before use — the default creates a 2x2 identity matrix,
      which will cause silent dimension mismatches in downstream matrix operations if larger or non-square matrices are expected
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Relying on the default 2x2 identity matrix without verification causes dimension mismatches that produce
      computational errors or silent failures in matrix multiplication operations, leading to incorrect transition probability
      calculations
    derived_from_bd_id: BD-098
  - id: finance-C-156
    when: When implementing CohortEstimator workflow with fit() method
    action: Set cohort_bounds property BEFORE calling fit() — the fit() method directly accesses self.cohort_bounds without
      null-checking, and omitting this initialization causes AttributeError at runtime
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling fit() without setting cohort_bounds triggers AttributeError, causing immediate program termination
      and preventing any cohort-based transition matrix estimation from completing
    derived_from_bd_id: BD-099
  - id: finance-C-157
    when: When implementing state space definition or matrix operations in transition matrix workflows
    action: Explicitly specify state ordering via ordering parameter rather than relying on alphabetical inference — if ordering
      is not explicitly set, verify the alphabetical default matches expected state sequence and document this assumption
      in code
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Alphabetically inferred state ordering causes matrix row/column semantics to silently depend on alphabetical
      state label ordering, potentially misattributing transitions to wrong states and producing incorrect credit migration
      matrices
    derived_from_bd_id: BD-100
  - id: finance-C-158
    when: When implementing data processing pipelines that feed into CohortEstimator
    action: Verify input data is pre-sorted by entity ID ascending, then by time ascending within each entity, before passing
      to CohortEstimator; add explicit validation that data ordering contract is satisfied
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unsorted input causes CohortEstimator to misidentify entity boundaries due to the entity_id[i+1] comparison
      at line 143, potentially splitting entities across incorrect cohorts and corrupting transition probability calculations
      with silent data corruption
    derived_from_bd_id: BD-107
  - id: finance-C-159
    when: When converting entity histories to canonical format using to_canonical()
    action: Verify that entities have known initial states before conversion; entities without recorded history or with unknown
      initial states receive synthetic bootstrap self-loop events at time zero which may bias transition probability calculations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The to_canonical() bootstrap assumption inserts synthetic self-loop events (From=To=self state) at time zero
      for all entities, potentially biasing transition probability calculations for entities with unknown or unrecorded initial
      states
    derived_from_bd_id: BD-109
  - id: finance-C-162
    when: When identifying absorbing states for credit curve generation or hazard rate calculations
    action: Do not rely on alphabetical state ordering to determine absorbing states; explicitly validate that the highest-index
      state is intended as absorbing before using it in credit curve generation or hazard rate calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Alphabetical state ordering inference determines which state index maps to which label, and absorbing state
      identification hardcodes the highest index as absorbing; if alphabetical sorting places a non-terminal state at the
      highest index, credit curve generation and hazard rate calculations will target the wrong state, producing incorrect
      reserve and capital estimates
    derived_from_bd_id: BD-116
  - id: finance-C-163
    when: When generating synthetic entity histories with continuous-time event modeling
    action: 'Verify consistent time representation assumptions across the pipeline: if exponential inter-event times are used
      for continuous-time memoryless generation, avoid placing events uniformly within discrete time bins; use fully continuous-time
      tracking or implement consistent discrete-time binning throughout'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Exponential inter-event time generation assumes memoryless continuous time, but uniform intra-period placement
      assumes equally likely events in discrete intervals; when exponential samples fall into discrete bins, this creates
      systematic bias in event timing that distorts empirical intensity estimates and transition rate calculations
    derived_from_bd_id: BD-117
  - id: finance-C-164
    when: When generating synthetic test data for unit tests or integration tests
    action: Initialize random seed explicitly before synthetic data generation using numpy.random.seed() or random state objects;
      verify test fixtures set reproducible seeds so that unit test failures are reproducible and integration test comparisons
      are deterministic
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Synthetic data generators (exponential inter-event times, Markov state transitions, uniform initial state,
      uniform intra-period placement) use numpy random functions without seeding; each run produces different datasets making
      unit test failures non-reproducible and integration test comparisons impossible, creating flaky tests that pass or fail
      based on random chance
    derived_from_bd_id: BD-119
  - id: finance-C-165
    when: When performing multiple sequential matrix operations (power, exponentiation, logm) that feed into stochastic constraint
      validation
    action: Track floating-point error accumulation across matrix operations; if results must satisfy stochastic constraints
      at 1e-3 threshold, validate intermediate results or use higher-precision array types (float128 or decimal) for critical
      paths
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hardcoded 1e-3 stochastic validation thresholds create an implicit numerical contract across modules, but
      numpy array operations accumulate floating-point errors that eventually violate this threshold after multiple matrix
      operations (power, exponentiation, logm), causing matrix equality checks to fail and tests to become flaky
    derived_from_bd_id: BD-120
  - id: finance-C-166
    when: When processing timestamp data in the transition matrix library
    action: Assume timestamps are timezone-aware or that the framework handles timezone conversion — the framework does not
      implement explicit timezone annotation for timestamp fields
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Mixing timezone-aware and naive timestamps causes silent data corruption when comparing or aggregating time
      series across different time zones, producing incorrect transition probabilities
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-167
    when: When processing timestamp data in the transition matrix library
    action: Use timezone-aware datetime objects (pytz or zoneinfo) for each timestamp fields, or add an explicit tzinfo annotation
      field to data structures, ensuring each datetime comparisons account for timezone differences
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit timezone annotation, timestamp comparisons across systems in different timezones produce
      incorrect results, corrupting transition probability calculations that depend on accurate time intervals
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-169
    when: When implementing credit risk models with StateSpace for regulatory compliance reporting
    action: Verify the CQS mapping dictionary completeness and correctness before use; verify each fine-grained ratings in
      the model map to valid coarse rating scales per Basel/EBA regulatory requirements
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using an incomplete or incorrect CQS mapping silently produces wrong regulatory coarse ratings, leading to
      compliance violations in CRR/IRB reporting and potential regulatory penalties
    derived_from_bd_id: BD-003
  - id: finance-C-170
    when: When implementing custom StateSpace configurations for credit risk models
    action: Verify the default absorbing state location; by convention Default = dimension - 1 (highest index), typically
      representing default/failure state; explicitly configure if a different absorbing state is needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Relying on implicit default state convention without verification causes wrong absorbing state assumption,
      leading to incorrect default probability calculations and distorted credit risk metrics
    derived_from_bd_id: BD-014
  - id: finance-C-171
    when: When aggregating or removing states from transition matrices for regulatory category consolidation
    action: 'Use proportional redistribution when removing states: P_remaining[i][j] = P_original[i][j] / sum_row(i) for each
      remaining indices; do not use uniform redistribution across remaining states'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using uniform redistribution instead of proportional redistribution distorts the original transition dynamics
      structure, causing systematic errors in credit risk calculations that propagate through regulatory capital computations
    derived_from_bd_id: BD-018
  - id: finance-C-172
    when: When implementing portfolio management applications requiring periodic rebalancing
    action: Assume the framework provides rebalancing trigger mechanisms — the framework does not implement calendar-based
      or drift-threshold rebalancing; these must be implemented externally
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without implementing external rebalancing triggers, portfolio management applications have no mechanism to
      maintain target allocations, leading to portfolio drift and loss of risk control in production systems
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-173
    when: When implementing portfolio rebalancing logic for production credit risk applications
    action: 'Implement external rebalancing trigger mechanism using either: (1) calendar-based triggers on fixed schedule
      (e.g., monthly/quarterly rebalancing dates), or (2) drift-threshold triggers monitoring position weights deviation exceeding
      configured threshold (e.g., 5% drift from target allocation); trigger rebalancing functions to restore target portfolio
      weights'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without external rebalancing implementation, credit risk portfolios drift from target allocations, causing
      persistent tracking error and degraded risk management in production systems
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-174
    when: When implementing or refactoring transition matrix initialization code
    action: Automatically invoke validation within the matrix __new__ or __init__ method — explicit validate() calls must
      be used to trigger validation checks
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Automatic validation at construction time introduces unacceptable performance overhead for performance-critical
      scenarios and prevents creation of intentionally invalid matrices required for testing edge cases and stress scenarios
    derived_from_bd_id: BD-012
  - id: finance-C-175
    when: When implementing or refactoring row sum correction logic for stochastic matrices
    action: Adjust the diagonal element to fix rowsum=1 constraint — do NOT apply proportional adjustment across each elements
      in the row
    severity: high
    kind: domain_rule
    modality: must
    consequence: Proportional adjustment across all elements would alter relative transition rates between states, corrupting
      the Markov chain's behavioral semantics and producing mathematically incorrect transition probabilities
    derived_from_bd_id: BD-013
  - id: finance-C-176
    when: When implementing or refactoring cohort construction logic for credit risk or survival analysis
    action: Use equal-width (equally spaced) time bins for cohort bounds — do NOT use quantile-based or variable-width binning
      that creates unequal observation windows
    severity: high
    kind: domain_rule
    modality: must
    consequence: Quantile-based binning creates unequal observation windows that distort transition rate estimates and compromise
      statistical comparability between cohorts, leading to biased parameter estimates in downstream models
    derived_from_bd_id: BD-005
  - id: finance-C-177
    when: When implementing or refactoring event sequence processing for entity tracking in cohort analysis
    action: Include identity transition (From=To=State) as the first event per entity — do NOT use implicit initialization
      that omits the initial state record
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting the identity transition breaks entity tracking algorithms and cohort/duration estimation, as entities
      lack valid initial conditions required by the canonical data format for transition analysis
    derived_from_bd_id: BD-019
  - id: finance-C-179
    when: When implementing transition matrix decomposition or computing period-specific transition intensities from cumulative
      matrices
    action: 'Use matrix division via left multiplication by inverse: T(k) = T(k-1)^-1 * T(k), where T(k-1)^-1 is computed
      via matrix inverse and left-multiplied'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Element-wise division produces mathematically incorrect results for non-commuting matrices, causing systematic
      errors in the generator that propagate to all credit migration calculations
    derived_from_bd_id: BD-017
  - id: finance-C-180
    when: When correcting transition matrices with negative off-diagonal rates
    action: Add negative off-diagonal values to the largest diagonal element to maintain row-sum constraint, ensuring only
      off-diagonal negative values are corrected
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting negatives to zero violates the row-sum constraint, producing invalid generator matrices that cause
      credit migration models to violate probability conservation laws
    derived_from_bd_id: BD-032
  - id: finance-C-181
    when: When implementing or modifying credit risk calculations that use hazard rate formulas
    action: Use the conditional probability hazard rate formula h(k) = iPD(k) / (1 - cPD(k-1)) for calculating instantaneous
      default rates — do NOT use discrete approximation h(k) = cPD(k) - cPD(k-1) which lacks conditional interpretation and
      may produce negative or infinite hazard rates
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using discrete approximation for hazard rates produces incorrect instantaneous default rate interpretation,
      causing credit risk models to misquantify time-to-default probabilities and potentially misprice credit derivatives
    derived_from_bd_id: BD-022
  - id: finance-C-182
    when: When validating absorbing states in multi-state credit migration models
    action: Validate absorbing states by checking for zero outbound transition probability from the claimed absorbing state
      — verify that no transitions exist from the absorbing state to any other state (excluding self-loop)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without checking outbound transitions, a misidentified absorbing state causes terminal states to be incorrectly
      treated as transient, leading to infinite loop calculations in state projection and incorrect probability distributions
      in multi-state credit models
    derived_from_bd_id: BD-082
  - id: finance-C-183
    when: When calling cumulate() or incremental() methods on TransitionMatrixSet objects
    action: Set temporal_type property on TransitionMatrixSet before calling cumulate() or incremental() — these methods require
      temporal_type to determine time scaling factors and will raise AttributeError if called without it
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling cumulate() or incremental() without setting temporal_type first causes AttributeError at runtime,
      halting backtesting workflows and potentially corrupting intermediate state in batch processing pipelines
    derived_from_bd_id: BD-096
  - id: finance-C-184
    when: When performing element-wise array operations on TransitionMatrix objects
    action: Be aware that TransitionMatrix inherits from deprecated np.matrix (NumPy 1.15+) — verify element-wise operations
      produce expected results as np.matrix broadcasts differently than np.ndarray; migration to np.ndarray should be planned
      to avoid future compatibility issues
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: 'np.matrix inheritance causes subtle broadcasting differences: ''each numpy matrix semantics'' means * operator
      performs matrix multiplication, .T returns transpose, and shape is always (n,1) for column vectors; code expecting array
      semantics will produce incorrect results'
    derived_from_bd_id: BD-011
  - id: finance-C-185
    when: When maintaining or extending credit transition matrix code that uses matrix operations
    action: Plan migration from np.matrix inheritance to np.ndarray — np.matrix has been deprecated since NumPy 1.15 and will
      be removed; during transition, verify each code using * operator, .T transpose, or column vector shapes explicitly handles
      array vs matrix semantics
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Continuing to build on deprecated np.matrix foundation creates technical debt; when NumPy removes np.matrix
      support, credit risk calculations requiring matrix multiplication (* operator) and transpose (.T) will fail, requiring
      emergency migration during live trading system maintenance
    derived_from_bd_id: BD-101
  - id: finance-C-186
    when: When estimating confidence intervals for credit transition matrices using the Goodman method
    action: Verify that alpha=0.05 matches the required confidence level for the specific use case; regulatory reporting may
      require different confidence levels (e.g., 99% for Basel III capital calculations)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 95% CI by default may lead to incorrect statistical conclusions about transition probability accuracy,
      causing underestimation of credit risk volatility in stress scenarios
    derived_from_bd_id: BD-025
  - id: finance-C-187
    when: When generating credit curves from transition matrices
    action: Treat the highest-indexed state (index n-1) as the absorbing Default state; verify any custom absorbing state
      implementation preserves this index-based convention
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the absorbing state convention breaks S&P/Moody's rating alignment, causing credit curve generation
      to produce incorrect default probability term structures that misrepresent actual credit risk exposure
    derived_from_bd_id: BD-026
  - id: finance-C-188
    when: When implementing cohort assignment logic for timestamp binning in survival analysis
    action: Assign each observation to its cohort interval using the last-observation convention (observation_endpoint); do
      not use first-observation or average assignment methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using first-observation or average assignment shifts cohort membership earlier, causing systematic look-ahead
      bias in right-censored survival data that underestimates time-to-default for longer-duration credits
    derived_from_bd_id: BD-028
  - id: finance-C-189
    when: When implementing or extending credit curve validation logic involving BD-022, BD-036, BD-075, BD-037, or BD-095
    action: Verify that each curve timestamps are normalized to a consistent timezone (preferably UTC) before performing probability
      consistency checks; add explicit timezone validation in the validation chain
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Credit curve validation may pass probability consistency checks while temporal alignment is fundamentally
      wrong, causing silent incorrectness in cross-currency or multi-system credit risk calculations that accumulate without
      obvious error signals
    derived_from_bd_id: BD-118
  - id: finance-C-191
    when: When initializing a transition matrix for continuous-time Markov chain estimation
    action: Initialize the matrix as identity at t=0 to reflect the deterministic boundary condition where no transitions
      can occur at the exact reference time
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero initialization would violate the boundary condition for cumulative probabilities, causing the Markov
      chain to incorrectly assume transitions exist at the reference time, corrupting all downstream probability calculations
    derived_from_bd_id: BD-045
  - id: finance-C-192
    when: When scaling transition matrix values for S&P credit spread data
    action: Scale S&P transition rates by 0.01 (divide by 100) to convert from percentages to probabilities; verify data source
      uses percentage convention before applying this scaling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying 0.01 scaling to data already in basis points (0.001 scale) or normalized form produces incorrect
      transition probabilities, causing credit migration models to underestimate or overestimate default risk by orders of
      magnitude
    derived_from_bd_id: BD-048
  - id: finance-C-193
    when: When normalizing datetime values to [0,1] range for cross-temporal comparison
    action: Use CDF-based normalization mapping dates to their empirical quantile position; dates outside the observed range
      must return edge values (0 or 1) rather than extrapolated values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Linear min-max scaling would distort the temporal distribution for irregular date sequences, causing strategies
      that rely on temporal normalization to misweight historical observations and produce inconsistent backtest results
    derived_from_bd_id: BD-051
  - id: finance-C-194
    when: When generating event times for state transitions in continuous-time Markov chain simulations
    action: Use exponential distribution for waiting time generation to maintain memoryless property required by the Markov
      assumption; time-homogeneity must hold for the data being modeled
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using uniform or non-exponential distributions violates the Markov property assumptions, causing simulated
      transition timings to diverge from the theoretical model and producing invalid risk estimates
    derived_from_bd_id: BD-052
  - id: finance-C-195
    when: When preprocessing sequential state observation data for transition matrix estimation
    action: Apply stale event removal (filtering consecutive same-state observations) only when the observation artifacts
      hypothesis holds; verify that removing identical consecutive states does not discard semantically meaningful repeated
      observations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Blindly removing consecutive identical states may discard informative long-duration state episodes, causing
      underestimation of time-in-state for strategies that depend on state persistence metrics
    derived_from_bd_id: BD-053
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
