    narrative:
      does_what: 'Invariants and utilities that span multiple pipeline stages — collected from 42 source groups: annualization(1),
        api_resilience(1), backtest_analysis(7), chan_analysis(6), config_validation(1), cost_estimation(1), and 36 more.'
