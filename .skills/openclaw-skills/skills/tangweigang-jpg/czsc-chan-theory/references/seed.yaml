      summary: 止损判定:多头price/开仓价-1<-(stop_loss/10000)
    - id: BD-057
      type: B
      summary: 品种列表使用KQ.m@交易所.合约格式
    - id: BD-066
      type: B
      summary: 使用datetime类型存储时间
    - id: BD-043
      type: B
      summary: 权重digits默认2位小数
resources:
  packages:
  - name: pandas>=1.0.0
    version_pin: latest
  - name: numpy
    version_pin: latest
  - name: pyarrow
    version_pin: latest
  - name: requests>=2.24.0
    version_pin: latest
  - name: loguru
    version_pin: latest
  - name: dill
    version_pin: latest
  - name: pytz
    version_pin: latest
  - name: redis
    version_pin: latest
  - name: clickhouse_connect
    version_pin: latest
  - name: oss2
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install pandas>=1.0.0
    - python3 -m pip install numpy
    - python3 -m pip install pyarrow
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing BarGenerator.update() with a RawBar input
    action: validate that bar.freq.value equals base_freq before processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Frequency mismatch causes incorrect bar aggregation across all time frequencies, corrupting OHLCV synthesis
      for daily, weekly, and monthly bars
    stage_ids:
    - data_collection
  - id: finance-C-002
    when: When implementing BarGenerator initialization with base_freq parameter
    action: validate that base_freq exists in sorted_freqs list before accepting
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid base_freq causes KeyError when accessing freq_map dictionary, crashing the entire bar generation
      pipeline
    stage_ids:
    - data_collection
  - id: finance-C-004
    when: When implementing DataClient._get_cache() to read cached API responses
    action: acquire thread lock before reading pickle cache file to prevent race conditions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Concurrent read/write access to pickle cache files causes corrupted DataFrames and silent data loss during
      multi-process backtests
    stage_ids:
    - data_collection
  - id: finance-C-005
    when: When implementing DataClient._set_cache() to write API responses to disk
    action: acquire thread lock before writing pickle cache file to prevent partial writes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Concurrent writes without locking produce corrupted pickle files that cannot be deserialized, causing DataClient
      to return empty DataFrames
    stage_ids:
    - data_collection
  - id: finance-C-006
    when: When implementing BarGenerator with dict-of-lists structure using freq strings as keys
    action: use freq.value string when accessing self.bars dictionary, not Freq enum directly
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using Freq enum as dict key causes KeyError because bars dictionary uses string keys, breaking bar synthesis
      for all frequencies
    stage_ids:
    - data_collection
  - id: finance-C-026
    when: When implementing RawBar data ingestion into CZSC
    action: verify datetime timestamps are strictly ascending without duplicates or gaps
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Time regression causes ValueError to be raised during CZSC.update() at analyze.py:301, halting all analysis
      and preventing pattern recognition from functioning
    stage_ids:
    - chan_analysis
  - id: finance-C-027
    when: When implementing remove_include tri-bar resolution
    action: allow direction parameter to be anything other than Direction.Up or Direction.Down
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Invalid direction value causes ValueError to be raised at analyze.py:71, breaking the inclusion removal process
      and corrupting all subsequent pattern analysis
    stage_ids:
    - chan_analysis
  - id: finance-C-028
    when: When implementing check_bi fracture identification
    action: allow fx_a.mark to be anything other than Mark.D or Mark.G
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Invalid fracture mark causes ValueError to be raised at analyze.py:192, preventing any bi (stroke) identification
      from occurring
    stage_ids:
    - chan_analysis
  - id: finance-C-029
    when: When implementing FX (fracture) validation
    action: verify FX.elements contains exactly 3 NewBar objects
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Assertion failure at objects.py:130,141,153,159 causes program to crash when power_str, power_volume, or
      has_zs properties are accessed on malformed fractures
    stage_ids:
    - chan_analysis
  - id: finance-C-030
    when: When implementing create_fake_bis function
    action: allow consecutive fractures to have the same mark type
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Assertion failure at objects.py:192 causes program to crash when adjacent fractures have identical marks,
      breaking virtual bi creation
    stage_ids:
    - chan_analysis
  - id: finance-C-037
    when: When implementing bar update processing order
    action: process bars in strict chronological order ensuring bar.dt equals last_bars[-1].dt for time extensions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Time misalignment between bar timestamps causes ValueError to be raised, corrupting the bar sequence and
      breaking all downstream pattern analysis
    stage_ids:
    - chan_analysis
  - id: finance-C-039
    when: When implementing tri-bar inclusion resolution
    action: apply remove_include in sliding window comparing k1, k2 (processed) with k3 (raw) sequentially
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect tri-bar window processing breaks inclusion removal logic, causing wrong direction detection and
      corrupted NewBar sequence
    stage_ids:
    - chan_analysis
  - id: finance-C-042
    when: When implementing signal functions that compute technical analysis signals
    action: Return OrderedDict with 7-part underscore naming convention following format k1_k2_k3_v1_v2_v3_score
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Signal key must have exactly 3 underscore-separated parts and value must have 4 parts, otherwise signal pattern
      matching and event triggers will fail to parse signals correctly
    stage_ids:
    - signal_computation
  - id: finance-C-043
    when: When creating Signal objects for signal computation
    action: Verify score parameter is between 0 and 100 inclusive
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Signal score outside 0-100 range causes ValueError during signal initialization, breaking signal computation
      pipeline
    stage_ids:
    - signal_computation
  - id: finance-C-044
    when: When implementing signal functions that access historical bars
    action: Use di parameter with value >= 1 to access historical bars via c.bars_raw[-di]
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using di < 1 or accessing future data via shift(-n) introduces look-ahead bias, causing backtest results
      to be unrealistically optimistic and live trading to fail
    stage_ids:
    - signal_computation
  - id: finance-C-045
    when: When passing bars to signal computation
    action: Verify bars are sorted in ascending time order (bars[0] is earliest, bars[-1] is latest)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unsorted bars cause incorrect indicator calculations and signal generation, leading to wrong trading decisions
      based on misaligned price data
    stage_ids:
    - signal_computation
  - id: finance-C-046
    when: When computing technical analysis signals
    action: Use shift(-n) to access future data in signal computation paths
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: shift(-n) in signal computation introduces look-ahead bias, causing backtest equity curve to show unrealistic
      returns that will not match live trading
    stage_ids:
    - signal_computation
  - id: finance-C-052
    when: When returning signal tuples from signal functions
    action: Return (key, value) tuples with non-empty string values for both key and value
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Empty key or value strings cause KeyError during signal lookup and event matching, breaking the signal-driven
      trading system
    stage_ids:
    - signal_computation
  - id: finance-C-058
    when: When implementing signal functions that compute bar-level patterns
    action: Check len(c.bars_raw) is sufficient before accessing historical bars with di parameter
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Accessing c.bars_raw[-di] with insufficient bars causes IndexError, crashing signal computation
    stage_ids:
    - signal_computation
  - id: finance-C-060
    when: When implementing Event.is_match logic
    action: evaluate signals_not before signals_all before signals_any in correct order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Wrong evaluation order causes incorrect event matching, leading to trades executed at wrong times or in wrong
      directions
    stage_ids:
    - event_position
  - id: finance-C-061
    when: When updating Position state with new signals
    action: validate that signal datetime is strictly greater than previous signal datetime
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Regressing timestamps corrupt position state history, causing incorrect trade pairing and distorted backtest
      performance metrics
    stage_ids:
    - event_position
  - id: finance-C-062
    when: When implementing T0 trading constraint
    action: prevent same-bar close when T0=False by checking if current dt date equals open_dt date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violation of T+1 rule causes regulatory compliance failure; Chinese A-shares require T+1 settlement
    stage_ids:
    - event_position
  - id: finance-C-063
    when: When managing position state after any update
    action: verify position value remains in {-1, 0, 1} representing short/empty/long
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid position state causes undefined trading behavior and corrupts trade record history
    stage_ids:
    - event_position
  - id: finance-C-064
    when: When creating Position with trading events
    action: use only LO, LE, SO, SE operate types for opens and exits (not HL, HS, HO)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using hold operations in trading events causes assertion error or incorrect position state transitions
    stage_ids:
    - event_position
  - id: finance-C-068
    when: When configuring Position for Chinese A-shares trading
    action: set T0=False to comply with Chinese stock T+1 settlement rule
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: T0=True on Chinese stocks violates T+1 trading rules and causes regulatory violations
    stage_ids:
    - event_position
  - id: finance-C-070
    when: When implementing position exit logic
    action: check T0 constraint before executing any close operation (LE or SE)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Closing position without T0 check violates Chinese stock T+1 settlement rules
    stage_ids:
    - event_position
  - id: finance-C-071
    when: When updating last_event during position open operations
    action: only update last_event timestamp when operate is LO (long open) or SO (short open)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Updating last_event on close operations corrupts stop loss and timeout calculations based on wrong entry
      price
    stage_ids:
    - event_position
  - id: finance-C-075
    when: When implementing Event.is_match return
    action: return tuple of (bool match, str matched_signal_value) for correct signal tracking
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect return type causes downstream position update failures and missing trade descriptions
    stage_ids:
    - event_position
  - id: finance-C-076
    when: When implementing CzscTrader.update() method
    action: call self.update_signals(bar) BEFORE updating any position objects via position.update(self.s)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Position objects rely on current signals (self.s) for decision-making; calling position.update before signals
      are updated causes stale signal processing and incorrect trading decisions based on previous bar's signals
    stage_ids:
    - trading_execution
  - id: finance-C-079
    when: When initializing BarGenerator with frequency parameters
    action: pass frequencies that are contained in sorted_freqs list and in ascending order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: BarGenerator.__validate_freqs raises ValueError when base_freq is not in sorted_freqs or when freqs contain
      unsupported periods, preventing strategy initialization
    stage_ids:
    - trading_execution
  - id: finance-C-086
    when: When configuring ensemble_method for CzscTrader
    action: 'use only supported methods: ''mean'', ''vote'', ''max'', or a callable that accepts dict[str, float] and returns
      float'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Passing unsupported ensemble_method strings causes ValueError to be raised at runtime; invalid callable signatures
      cause TypeError when attempting to combine position values
    stage_ids:
    - trading_execution
  - id: finance-C-091
    when: When creating CzscStrategyBase subclasses
    action: verify positions property returns list[Position] and that unique_signals is correctly aggregated from each positions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect positions return type or missing signal aggregation causes init_bar_generator to fail, preventing
      strategy initialization and blocking all backtesting and live trading workflows
    stage_ids:
    - trading_execution
  - id: finance-C-092
    when: When implementing performance metrics with yearly_days parameter
    action: Use yearly_days=252 for annualization calculations in Chinese stock market
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Annualized returns, Sharpe ratio, and volatility calculations will be incorrect, causing misleading performance
      comparisons across different trading periods
    stage_ids:
    - backtest_analysis
  - id: finance-C-094
    when: When calculating max drawdown in performance analysis
    action: Use cumulative maximum minus current value pattern to identify peak-to-trough decline
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Max drawdown calculation will fail to identify the true peak-to-trough decline, leading to incorrect risk
      assessment and Calmar ratio
    stage_ids:
    - backtest_analysis
  - id: finance-C-097
    when: When using n1b (next-bar return) in edge calculations
    action: Use shift(-1) to compute next-bar return from current-bar price
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Edge calculation will use current-bar return instead of next-bar return, violating the one-bar delay principle
      and introducing look-ahead bias
    stage_ids:
    - backtest_analysis
  - id: finance-C-136
    when: When configuring position management for Chinese stock markets
    action: Set T0=True for same-day closing logic; T0=False is the regulatory-compliant default for A-share markets reflecting
      T+1 settlement requirements
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Setting T0=True for A-share stocks violates T+1 settlement rules, allowing same-day round-trip trades that
      are prohibited in live trading, making backtest results non-reproducible
    derived_from_bd_id: BD-020
  - id: finance-C-141
    when: When calculating feature returns for factor risk models
    action: Use cross-sectional OLS regression for feature return calculation; do not substitute with time-series regression
      or panel regression methods
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using time-series or panel regression instead of cross-sectional OLS introduces methodological errors in
      factor return decomposition, compromising factor risk model accuracy and performance attribution validity
    derived_from_bd_id: BD-089
  - id: finance-C-157
    when: When implementing position management logic in backtesting or live trading
    action: Use exactly 1 for long positions, 0 for neutral, and -1 for short positions — the Position class requires discrete
      integer values for correct position state determination throughout the risk control and trading execution pipeline
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using non-discrete values (e.g., floats, enums, or other encodings) causes position state determination to
      fail silently, leading to incorrect risk calculations and potentially catastrophic position mismatches in live trading
    derived_from_bd_id: BD-032
  - id: finance-C-158
    when: When setting stop_loss parameters in Position initialization
    action: Convert stop_loss values to BP (basis points) where 1BP = 0.01% (e.g., 1% loss = 100BP, 5% loss = 500BP) — the
      framework stores stop_loss in BP units and internal price comparison logic divides by 10000
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Passing stop_loss as percentage instead of BP (e.g., 5 instead of 500) causes the framework to interpret
      a 0.05% stop as 5%, triggering premature exits and systematically cutting profits while providing inadequate risk protection
    derived_from_bd_id: BD-033
  - id: finance-C-165
    when: When implementing signal matching logic in Event.is_match
    action: 'Process signals in strict order: signals_not first, then signals_all, then signals_any — maintain this NOT→ALL→ANY
      precedence for deterministic event resolution'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Changing signal processing order produces different matching results, violating expected event semantics
      and causing incorrect trading signals that may trigger unintended positions
    derived_from_bd_id: BD-120
  - id: finance-C-171
    when: When modifying CzscTrader.update() method or parallelizing signal computation
    action: 'Reorder or parallelize signal and position update operations - maintain sequential execution: update_signals()
      must be called before positions.update()'
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Parallelizing signal computation or reordering update operations breaks DummyBacktest chronological reproducibility
      and violates the hidden coupling assumption between BD-129 and BD-135, causing backtest-live inconsistency
    derived_from_bd_id: BD-149
  - id: finance-C-186
    when: When implementing BarGenerator signal processing logic
    action: Sort signals by frequency before passing to BarGenerator — verify base_freq is processed first to properly aggregate
      higher-frequency bars
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unsorted frequencies cause incorrect bar composition and invalid signal generation, leading to strategies
      operating on malformed price data with incorrect aggregation results
    derived_from_bd_id: BD-131
  - id: finance-C-188
    when: When implementing Position.update signal processing
    action: Validate datetime monotonicity — new signal timestamp must be strictly greater than previous signal timestamp;
      reject out-of-order signals to prevent backdated trades
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Out-of-order signals introduce backdated trades into the position history, corrupting trade records and causing
      incorrect equity calculations that cannot be reconciled with actual market data
    derived_from_bd_id: BD-133
  - id: finance-C-189
    when: When implementing DummyBacktest signal processing
    action: Process signals in strict chronological order — call on_sig sequentially with timestamps increasing monotonically;
      do not parallelize or reorder signal processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Parallel or out-of-order signal processing introduces non-deterministic backtest behavior, causing reproducibility
      failures where identical strategy parameters produce different results across runs
    derived_from_bd_id: BD-135
  - id: finance-C-193
    when: When implementing signal caching with on_sig bypass for pre-computed signals
    action: Use pre-computed signal cache only when signal sources are verified free of look-ahead bias — cached signals must
      not contain shift(-n) operations that would violate the shift restriction invariant; validate each cached signal sources
      before enabling on_sig bypass
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Using cached signals with look-ahead bias propagates shift(-n) violations into live trading without detection,
      causing strategies to trade on future information that would not be available in actual market conditions
    derived_from_bd_id: BD-144
  - id: finance-C-218
    when: When implementing or refactoring any signal generation code
    action: Introduce shift(-n) or any future-looking data access in signals/ directory or any module outside czsc/features/ret.py
      and designated backtest paths — use grep to verify zero occurrences before commit
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Look-ahead bias from shift(-n) in signal code causes historical backtests to use future information, making
      equity curves unrealistically positive and live trading results far below backtested performance
    derived_from_bd_id: BD-122
  regular:
  - id: finance-C-003
    when: When implementing BarGenerator initialization with freqs parameter
    action: validate that each frequencies in freqs list exist in sorted_freqs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unsupported frequency in freqs causes ValueError during bar synthesis, preventing multi-frequency analysis
    stage_ids:
    - data_collection
  - id: finance-C-007
    when: When implementing BarGenerator.update() for duplicate bar detection
    action: check if bar.dt matches the last bar's dt in self.bars[base_freq] and skip update if duplicate
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate bars with same timestamp cause incorrect OHLCV aggregation, doubling volume and corrupting price
      calculations
    stage_ids:
    - data_collection
  - id: finance-C-008
    when: When implementing DataClient.post_request() to query Tushare API
    action: validate api_name is a non-empty string before constructing request parameters
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid api_name causes malformed API requests that return errors or empty DataFrames, breaking all downstream
      data processing
    stage_ids:
    - data_collection
  - id: finance-C-009
    when: When implementing DataClient._validate_response() to parse API JSON
    action: check that response JSON contains 'code' field equal to 0 before extracting data
    severity: high
    kind: domain_rule
    modality: must
    consequence: API errors with non-zero code values cause empty DataFrames silently returned, leading to missing data in
      backtests without error indication
    stage_ids:
    - data_collection
  - id: finance-C-010
    when: When implementing DataClient with default max_count=5000 for in-memory bar storage
    action: exceed max_count bars in memory per frequency, silently discard oldest bars beyond limit
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Unlimited bar accumulation causes OOM errors during long-running backtests with multiple symbols and frequencies
    stage_ids:
    - data_collection
  - id: finance-C-011
    when: When implementing FeishuApiBase.get_access_token() for OAuth token management
    action: refresh access token when current time exceeds 80% of token expiry threshold
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Token expiry without proactive refresh causes HTTP 401 errors mid-session, breaking file upload/download
      operations to Feishu cloud storage
    stage_ids:
    - data_collection
  - id: finance-C-012
    when: When implementing DataClient to cache API responses on disk
    action: respect TTL parameter and skip cache if file age exceeds TTL seconds
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Stale cached data older than TTL causes backtests to use outdated prices, producing incorrect trading signals
      and PnL calculations
    stage_ids:
    - data_collection
  - id: finance-C-013
    when: When implementing check_kline_quality() to validate RawBar DataFrames
    action: raise ValueError when required columns are missing from input DataFrame
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing columns cause KeyError or incorrect calculations in downstream signal computation, producing invalid
      trading signals
    stage_ids:
    - data_collection
  - id: finance-C-014
    when: When implementing check_volume_amount() to validate OHLCV data integrity
    action: detect and report records where vol equals zero but amount is non-zero
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Zero-volume bars with non-zero amount cause incorrect backtest results, artificially inflating trading costs
      and reducing apparent returns
    stage_ids:
    - data_collection
  - id: finance-C-015
    when: When implementing format_kline() to convert Tushare data to RawBar objects
    action: sort kline DataFrame by datetime in ascending order before creating RawBar list
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unsorted data causes bar IDs to be assigned out of temporal order, breaking Chan analysis which requires
      strictly ascending bar.id sequence
    stage_ids:
    - data_collection
  - id: finance-C-016
    when: When implementing RawBar object creation with id field assignment
    action: assign bar.id as ascending sequence starting from 0 based on chronological order
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-sequential or duplicate bar.id values break Chan analysis algorithms that rely on strictly monotonic
      ID progression
    stage_ids:
    - data_collection
  - id: finance-C-017
    when: When implementing DataClient._request_api() with retry mechanism
    action: implement exponential backoff with increasing delay between retry attempts
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Constant retry interval without backoff causes API rate limit violations, leading to temporary IP bans and
      data fetch failures
    stage_ids:
    - data_collection
  - id: finance-C-018
    when: When implementing BarGenerator init_freq_bars() for batch bar initialization
    action: assert that target frequency's bars list is empty before batch initialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Appending to non-empty bars list causes duplicate bars with same timestamp, corrupting OHLCV synthesis for
      all higher frequencies
    stage_ids:
    - data_collection
  - id: finance-C-019
    when: When implementing _update_freq() to aggregate base_freq bars into higher frequencies
    action: calculate freq_edt using freq_end_time() to determine correct period boundary
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect period boundary calculation causes bars to be assigned to wrong time periods, corrupting daily/weekly/monthly
      OHLCV data
    stage_ids:
    - data_collection
  - id: finance-C-020
    when: When implementing BarGenerator.update() for bar aggregation across frequencies
    action: update bar id as last.id + 1 when creating a new bar at period boundary
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate bar.id values break Chan analysis signal computation, causing incorrect trend detection and trading
      signals
    stage_ids:
    - data_collection
  - id: finance-C-021
    when: When implementing DataClient to store API responses in cache directory
    action: create cache subdirectory using url_hash and api_name before writing cache files
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Missing cache directory causes FileNotFoundError, preventing cache writes and causing repeated API calls
      for same data
    stage_ids:
    - data_collection
  - id: finance-C-022
    when: When implementing DataClient._validate_response() to parse API JSON structure
    action: verify response JSON contains both 'items' and 'fields' keys in data dict
    severity: high
    kind: domain_rule
    modality: must
    consequence: Malformed API response without required structure causes KeyError in DataFrame construction, returning empty
      data silently
    stage_ids:
    - data_collection
  - id: finance-C-023
    when: When implementing DiskCache.is_found() to check cached data availability
    action: remove expired cache file when TTL has elapsed before returning False
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Expired cache files remaining on disk cause subsequent cache hits with stale data, leading to incorrect backtest
      results
    stage_ids:
    - data_collection
  - id: finance-C-024
    when: When implementing clear_api_cache() to remove expired cache entries
    action: acquire cache lock before deleting cache files to prevent race conditions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Deleting cache files without locking during concurrent read causes FileNotFoundError or corrupted reads
    stage_ids:
    - data_collection
  - id: finance-C-025
    when: When implementing DataClient to generate cache key from request parameters
    action: use MD5 hash of parameter string for cache key to verify deterministic file names
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Non-deterministic cache keys cause cache misses for identical requests, increasing API calls and violating
      reproducibility
    stage_ids:
    - data_collection
  - id: finance-C-031
    when: When processing bi identification with Rust implementation
    action: expect serialization to work on Rust CZSC objects
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Rust CZSC objects may not support serialization, causing dump/load operations to fail and preventing strategy
      state persistence
    stage_ids:
    - chan_analysis
  - id: finance-C-032
    when: When selecting implementation via CZSC_USE_PYTHON flag
    action: verify check_bi, check_fx, check_fxs, remove_include use Python implementation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Core Chan analysis functions (check_bi, check_fx, check_fxs, remove_include) are not implemented in Rust
      and fall back to Python, so disabling CZSC_USE_PYTHON has no performance benefit for these hot-path functions
    stage_ids:
    - chan_analysis
  - id: finance-C-033
    when: When configuring CZSC analysis parameters
    action: set min_bi_len below 6 or above 7 for new笔 standard
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: min_bi_len controls bi formation threshold; values outside 6-7 range violate Chan theory requirements and
      produce non-standard patterns
    stage_ids:
    - chan_analysis
  - id: finance-C-034
    when: When implementing signals requiring historical context
    action: handle edge cases where historical bi data exceeds max_bi_num limit
    severity: high
    kind: operational_lesson
    modality: must
    consequence: max_bi_num=50 causes oldest bi_list and bars_raw entries to be trimmed, so signals expecting complete historical
      data will fail or produce incorrect results
    stage_ids:
    - chan_analysis
  - id: finance-C-035
    when: When implementing remove_include tri-bar sliding window
    action: maintain at least 3 bars in bars_ubi for valid tri-bar comparison
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Insufficient bars in bars_ubi causes __update_bi to return early without identifying any patterns, resulting
      in empty bi_list and failed analysis
    stage_ids:
    - chan_analysis
  - id: finance-C-036
    when: When implementing signal calculations dependent on bars_ubi
    action: expect bars_ubi to contain complete historical bars when max_bi_num is active
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: max_bi_num trimming causes bars_ubi to start from a later date than bars_raw beginning, potentially causing
      index errors or incomplete analysis for early timestamps
    stage_ids:
    - chan_analysis
  - id: finance-C-038
    when: When implementing BI linear regression caching
    action: use get_cache_with_default for expensive computations like get_price_linear
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: O(n) linear regression on each BI property access without caching causes severe performance degradation for
      long bi sequences
    stage_ids:
    - chan_analysis
  - id: finance-C-040
    when: When presenting Chan analysis results
    action: claim that backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results are simulated with perfect execution and no slippage; presenting them as real returns violates
      financial compliance and misleads users about actual strategy performance
    stage_ids:
    - chan_analysis
    - signal_computation
  - id: finance-C-041
    when: When upgrading CZSC version
    action: expect API compatibility between major versions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Version 0.10+ introduces breaking changes with Rust implementation; upgrading without code review causes
      import errors and runtime failures
    stage_ids:
    - chan_analysis
  - id: finance-C-047
    when: When loading signal functions via configuration
    action: Use import_by_name for dynamic function loading to support plugin architecture
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Failing to use import_by_name causes circular import issues and breaks the declarative signal configuration
      system that enables JSON-based strategy definition
    stage_ids:
    - signal_computation
  - id: finance-C-048
    when: When computing ta-lib technical indicators repeatedly
    action: Cache computed indicators on RawBar.cache dict to avoid recomputation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Recomputing ta-lib indicators for every bar causes significant performance degradation, especially with multiple
      signal functions requiring the same indicators
    stage_ids:
    - signal_computation
  - id: finance-C-049
    when: When implementing bar signal functions with layering parameters
    action: Limit n parameter to maximum of 20 for layering to avoid overfitting
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Excessive layering (n > 20) creates too many signal permutations, increasing overfitting risk and degrading
      signal statistical significance
    stage_ids:
    - signal_computation
  - id: finance-C-050
    when: When configuring multiple frequency signals
    action: Sort frequencies according to sorted_freqs list with base_freq as first element
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unsorted frequencies cause incorrect signal computation order, potentially leading to wrong cross-frequency
      signal generation and position decisions
    stage_ids:
    - signal_computation
  - id: finance-C-051
    when: When implementing cross-frequency signal functions
    action: Validate that freq1 < freq2 according to sorted_freqs order
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Invalid frequency ordering in cross-frequency signals causes incorrect signal computation or runtime errors
    stage_ids:
    - signal_computation
  - id: finance-C-053
    when: When storing computed signals in CzscSignals
    action: Store signals in OrderedDict to preserve insertion order for event matching sequence
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using regular dict instead of OrderedDict breaks signal precedence order, causing incorrect event matching
      sequence in multi-signal strategies
    stage_ids:
    - signal_computation
  - id: finance-C-054
    when: When computing cross-frequency signals that require CzscSignals object
    action: Pass CzscSignals object (cat) to cross-frequency signal functions instead of single CZSC object
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Passing wrong object type causes AttributeError when accessing cat.kas for multi-frequency data access in
      cross-frequency signals
    stage_ids:
    - signal_computation
  - id: finance-C-056
    when: When presenting signal computation results
    action: Claim real-time trading support if system uses polling-based data collection
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Polling-based data has inherent delay, claiming real-time support misleads users about actual system capabilities
    stage_ids:
    - signal_computation
  - id: finance-C-057
    when: When signal functions return early due to insufficient data
    action: Return valid signal with '其他' (other) as default value instead of None
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning None instead of valid signal causes KeyError when event matching tries to access signal, breaking
      downstream signal processing
    stage_ids:
    - signal_computation
  - id: finance-C-059
    when: When implementing stop loss calculation
    action: use basis points (BP) divided by 10000 for stop loss threshold comparison
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point percentage calculations cause precision errors leading to incorrect stop loss triggers, resulting
      in unexpected trading losses or missed exits
    stage_ids:
    - event_position
  - id: finance-C-065
    when: When implementing stop loss default configuration
    action: set stop_loss default to 1000BP (10%) for conservative position risk management
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Excessive default stop loss causes oversized losses per trade in live trading
    stage_ids:
    - event_position
  - id: finance-C-066
    when: When implementing timeout default configuration
    action: set timeout default to 1000 bars as essentially no timeout for long-term trend following
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Timeout too small causes premature position exits and missed long-term trends
    stage_ids:
    - event_position
  - id: finance-C-067
    when: When implementing interval default configuration
    action: set interval default to 0 seconds to allow immediate same-direction re-entry after close
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Non-zero interval delays signal responsiveness and may cause missed trading opportunities
    stage_ids:
    - event_position
  - id: finance-C-069
    when: When configuring Position for futures or same-day tradable instruments
    action: set T0=True to enable same-bar open and close operations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: T0=False on intraday instruments unnecessarily restricts trading flexibility
    stage_ids:
    - event_position
  - id: finance-C-072
    when: When validating long position exit conditions
    action: verify last_event timestamp is not earlier than last_lo_dt before executing exit
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Time validation failure causes assertion error and prevents position from closing correctly
    stage_ids:
    - event_position
  - id: finance-C-074
    when: When presenting backtest trading results
    action: claim that simulated backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results overestimate live trading performance due to lack of slippage, liquidity constraints, and
      execution delays in simulation
    stage_ids:
    - event_position
  - id: finance-C-077
    when: When initializing CzscTrader with multiple positions
    action: allow duplicate position names in the positions list
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Duplicate position names cause ambiguity in get_position() lookups and ensemble weight calculations, leading
      to undefined behavior when retrieving specific position strategies
    stage_ids:
    - trading_execution
  - id: finance-C-078
    when: When updating Position with signal dictionaries
    action: pass signals with dt (datetime) strictly greater than previous signal's end_dt
    severity: high
    kind: domain_rule
    modality: must
    consequence: Out-of-order signals cause Position.update() to return early without processing, silently skipping critical
      trading events and corrupting backtest results
    stage_ids:
    - trading_execution
  - id: finance-C-080
    when: When using CzscStrategyBase as base class for trading strategies
    action: implement ONLY the positions property as @abstractmethod; each other properties have concrete implementations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Attempting to use abstractmethod on other properties causes TypeError at instantiation; the framework intentionally
      provides concrete implementations for symbol, unique_signals, signals_config, freqs, sorted_freqs, and base_freq
    stage_ids:
    - trading_execution
  - id: finance-C-081
    when: When using create_symbol_trader for Tianqin execution
    action: pass TargetPosTask symbol parameter as contract code, not as quote symbol with @ prefix
    severity: high
    kind: operational_lesson
    modality: must
    consequence: TargetPosTask requires contract code format; passing quote symbol with @ suffix (e.g., 'KQ.m@SHFE.rb') causes
      order execution failure or incorrect position targeting
    stage_ids:
    - trading_execution
  - id: finance-C-082
    when: When loading position configurations from JSON files
    action: enable MD5 hash verification via check=True parameter to validate configuration integrity
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Skipping MD5 verification allows modified position configs to load silently; tampered configurations can
      cause incorrect position sizing, wrong stop-loss levels, or unauthorized strategy behavior
    stage_ids:
    - trading_execution
  - id: finance-C-083
    when: When initializing CzscTrader with the init_trader method
    action: expect init_trader to only initialize trader state without performing any backtesting
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: init_trader internally calls on_bar for all bars after sdt, which computes signals AND executes position
      updates; treating this as pure initialization causes double-counting of trades when combined with subsequent backtest
      runs
    stage_ids:
    - trading_execution
  - id: finance-C-084
    when: When using Tianqin free tier for historical data retrieval
    action: request more than 8000 bars of K-line data in a single request
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Tianqin API silently truncates requests exceeding 8000 bars for free accounts; insufficient warmup data causes
      incomplete indicator calculations and unreliable trading signals in strategy initialization
    stage_ids:
    - trading_execution
  - id: finance-C-085
    when: When executing trades via adjust_portfolio or create_symbol_trader
    action: implement timeout handling for TargetPosTask.set_target_volume as this function blocks until position adjustment
      completes
    severity: high
    kind: resource_boundary
    modality: must
    consequence: TargetPosTask blocks the calling thread until all orders are filled or cancelled; without timeout handling,
      the trading thread hangs indefinitely on connectivity issues or illiquid contracts
    stage_ids:
    - trading_execution
  - id: finance-C-087
    when: When using on_sig method for backtesting
    action: expect on_sig to perform bar processing, indicator updates, or multi-frequency signal synthesis
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: on_sig is designed for signal-cached backtests (10-100x faster than on_bar) and skips BarGenerator updates
      entirely; using it without pre-computed signals results in None signals and no position changes
    stage_ids:
    - trading_execution
  - id: finance-C-088
    when: When presenting CzscTrader backtest results to stakeholders
    action: claim that backtest returns represent expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not account for slippage, latency, market impact, or broker fees; presenting them as
      live expectations misleads stakeholders and violates financial compliance standards
    stage_ids:
    - trading_execution
  - id: finance-C-089
    when: When using CTAResearch backtest for strategy evaluation
    action: claim that CTAResearch backtest results reflect real-time execution capability
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: CTAResearch uses on_bar and on_sig methods which process historical data; this is a simulation framework
      that cannot verify order fill timing, network latency effects, or exchange connectivity issues present in live trading
    stage_ids:
    - trading_execution
  - id: finance-C-090
    when: When using parallel backtesting with CTAResearch.backtest
    action: set max_workers parameter based on available CPU cores; default value of 3 may not optimally utilize resources
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Setting max_workers too high causes CPU contention and context switching overhead; setting too low underutilizes
      available parallelism, extending backtest duration unnecessarily
    stage_ids:
    - trading_execution
  - id: finance-C-093
    when: When implementing fee calculations in backtest analysis
    action: Use 2 BP (0.0002) as the default single-side fee rate
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtest results will underestimate transaction costs, leading to inflated Sharpe/Calmar ratios that do not
      reflect real trading conditions
    stage_ids:
    - backtest_analysis
  - id: finance-C-095
    when: When implementing PairsPerformance aggregation
    action: Validate required columns exist and filter by trade_dir before aggregation
    severity: high
    kind: domain_rule
    modality: must
    consequence: PairsPerformance aggregation will fail or produce invalid statistics if required columns are missing or trade_dir
      validation is skipped
    stage_ids:
    - backtest_analysis
  - id: finance-C-096
    when: When representing returns in backtest reports
    action: Use BP (Basis Points) notation consistently where 1BP = 0.0001
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Inconsistent unit representation will cause confusion and potential misinterpretation of trading performance
      metrics
    stage_ids:
    - backtest_analysis
  - id: finance-C-098
    when: When validating input data for backtest analysis
    action: Check for null values and required columns before processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Null values in weight or price data will cause downstream calculations to fail or produce NaN results in
      performance metrics
    stage_ids:
    - backtest_analysis
  - id: finance-C-099
    when: When computing Calmar ratio in evaluate_holds
    action: Use 252 as yearly_n and divide annual return by max drawdown
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calmar ratio will be incorrectly calculated, leading to wrong risk-adjusted performance assessment
    stage_ids:
    - backtest_analysis
  - id: finance-C-100
    when: When using WeightBacktest for backtest analysis
    action: Import WeightBacktest lazily via safe_import_weight_backtest()
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Direct import of WeightBacktest will fail if rs_czsc is not installed, causing the entire backtest analysis
      to crash
    stage_ids:
    - backtest_analysis
  - id: finance-C-101
    when: When validating holds_performance input data
    action: Check that weight column sums to 1 in each cross-section for portfolio analysis
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Portfolio weights not summing to 1 will cause incorrect edge calculations and misleading performance metrics
    stage_ids:
    - backtest_analysis
  - id: finance-C-102
    when: When reporting backtest results
    action: Present backtest returns as guaranteed expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results include look-ahead bias and do not account for slippage, liquidity constraints, and market
      impact that occur in live trading
    stage_ids:
    - backtest_analysis
  - id: finance-C-103
    when: When using Streamlit components for backtest visualization
    action: Display fee and yearly_days parameters in the UI for transparency
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Users will not understand the cost assumptions behind performance metrics, leading to unrealistic expectations
    stage_ids:
    - backtest_analysis
  - id: finance-C-104
    when: When computing trading costs in holds_performance
    action: Use change * fee / 10000 formula to calculate turnover costs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect fee calculation formula will cause NetEdge to be wrong, affecting the final performance assessment
    stage_ids:
    - backtest_analysis
  - id: finance-C-105
    when: When filtering drawdown peaks in top_drawdowns
    action: Use cummax() to track running maximum before computing underwater values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect peak identification will cause drawdown analysis to miss the true peak-to-trough decline periods
    stage_ids:
    - backtest_analysis
  - id: finance-C-106
    when: When generating output reports from backtest analysis
    action: Support both HTML and PDF formats as specified in output requirements
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Report generation will fail for unsupported file formats, preventing users from obtaining backtest analysis
      results
    stage_ids:
    - backtest_analysis
  - id: finance-C-108
    when: When implementing signal functions and naming conventions
    action: 'Follow the 7-part underscore naming pattern: {freq}_{di}_{feature}_V{version}_{v1}_{v2}_{score} — enables programmatic
      parsing and version tracking'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Signal names that don't conform to the 7-part pattern will break signal parsing, matching logic in Event.is_match,
      and programmatic signal configuration loading in CzscSignals and CzscTrader
  - id: finance-C-109
    when: When creating or validating RawBar objects
    action: Verify RawBar.dt is a timezone-naive datetime object — tz-naive datetimes verify consistency across each data
      processing modules
    severity: high
    kind: domain_rule
    modality: must
    consequence: Timezone-aware datetimes in RawBar will cause comparison failures with internally managed timestamps, incorrect
      bar alignment in BarGenerator, and silent data corruption in backtest results
  - id: finance-C-110
    when: When updating Position state with new signals
    action: Verify new signal dt must be strictly greater than the previous signal dt — out-of-order signal injection causes
      state corruption
    severity: high
    kind: domain_rule
    modality: must
    consequence: Out-of-order dt values will corrupt Position state, causing incorrect trade pair matching, wrong PnL calculations,
      and invalid backtest results where opening and closing trades appear in wrong chronological order
  - id: finance-C-111
    when: When initializing BarGenerator with multiple timeframes
    action: Pass freqs in sorted_freqs order (ascending by time period) — validated at init; wrong order breaks multi-timeframe
      synchronization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: BarGenerator initialized with unsorted freqs will produce incorrect bar synthesis for higher timeframes,
      causing incorrect fractal pattern recognition (分型/笔/中枢) and wrong trading signals across multiple timeframes
  - id: finance-C-112
    when: When calling CzscTrader.update() or CzscSignals.update_signals()
    action: Execute signal computation before position update — signal computation must complete before position decisions
      are made
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Position decisions made before signals are computed will use stale signal state, causing incorrect trade
      executions, wrong position sizing, and invalid backtest performance metrics
  - id: finance-C-113
    when: When configuring CzscSignals or CzscTrader with signals
    action: Provide signals_config as a list of dicts with required keys 'name' and 'freq' — declarative signal configuration
      format
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Invalid signals_config format will cause KeyError during signal loading, breaking all signal generation and
      backtest execution
  - id: finance-C-114
    when: When matching Event conditions against signal dictionaries
    action: 'Process Event.is_match evaluation in strict order: signals_not → signals_all → signals_any — signals_not should
      block even if signals_all would match'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Wrong evaluation order will allow blocked signals to trigger events they should exclude, causing incorrect
      trade executions and invalid position changes in backtesting
  - id: finance-C-115
    when: When representing position state across the system
    action: 'Encode position state using ternary values: pos ∈ {-1, 0, 1} representing short, empty, long — consistent throughout
      system'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Position values outside {-1, 0, 1} will cause incorrect trading logic in Position.update, wrong ensemble
      position calculations in CzscTrader.get_ensemble_pos, and invalid backtest statistics
  - id: finance-C-116
    when: When managing BarGenerator memory across multiple timeframes
    action: Limit stored bars to max_count by truncating oldest bars from the left — prevents unbounded memory growth in long-running
      analysis
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without truncation, BarGenerator memory usage grows unbounded, eventually causing out-of-memory errors in
      long-running backtests or live analysis sessions
  - id: finance-C-117
    when: When using CZSC environment variable configuration
    action: Set CZSC_USE_PYTHON=true to force Python implementation when rs-czsc is installed — default behavior prefers Rust
      implementation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without CZSC_USE_PYTHON set, the Rust implementation may lack certain features like dill serialization support,
      causing trader serialization to fail in CTA backtest results
  - id: finance-C-118
    when: When using Operate enum values for trading operations
    action: 'Use Operate enum values: LO (开多/long open), LE (平多/long exit), SO (开空/short open), SE (平空/short exit), HO (持币/hold)
      — standardized operation types'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using raw string values instead of Operate enum will cause ValueError in Position validation and incorrect
      trading operation execution
  - id: finance-C-119
    when: When using timestamps for human-readable display in signals and operates
    action: Use dt (datetime) for timestamps in signals/operates display, not bid (bar index) — dt provides human-readable
      timestamps; bid is reserved for timeout calculations
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using bid instead of dt for display will show cryptic bar indices instead of readable timestamps, making
      backtest logs and reports incomprehensible
  - id: finance-C-120
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live trading returns — backtesting ignores market impact, financing
      costs, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-121
    when: When describing this system's capabilities to users or stakeholders
    action: Claim real-time high-frequency trading support with sub-second execution — this system uses polling-based bar
      updates and is a pure backtesting framework
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploying the system for sub-second trading will experience severe latency, missed executions, and
      catastrophic financial losses due to the polling-based architecture
  - id: finance-C-122
    when: When applying this library to non-Chinese stock/futures markets
    action: Claim the library works out-of-box for markets other than Chinese stocks/futures without modifying hardcoded assumptions
      like 252 trading days/year
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users applying Chinese market assumptions to other markets will get incorrect return calculations, wrong
      trading day count, and invalid backtest performance metrics
  - id: finance-C-123
    when: When using this library for pure fundamental analysis or algorithmic trading without technical indicators
    action: Claim the library provides standalone fundamental analysis or pure algorithmic trading capabilities without technical
      indicators
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting fundamental analysis features will find no such capabilities; the library is specifically
      designed for 缠论 technical analysis and signal-based trading
  - id: finance-C-124
    when: When integrating this library into production trading systems
    action: Claim this library alone is sufficient for production trading — the library only supports Tianqin connector for
      broker API integration
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users attempting to connect to brokers other than Tianqin will find no supported integration, preventing
      any live trading execution
  - id: finance-C-125
    when: When running initial testing before live deployment
    action: Run dry-run/backtesting for at least 72 hours to validate signal stability before any live trading
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Skipping dry-run validation may lead to unexpected behavior in live markets, causing financial losses due
      to unvalidated signal behavior
  - id: finance-C-126
    when: When using indicator-based signals that require historical context
    action: Verify startup_candle_count is greater than or equal to the longest indicator period — insufficient warmup bars
      will produce incorrect signals
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Signals requiring historical indicators will return invalid '其他' (other) values when warmup period is insufficient,
      causing missed trading opportunities or incorrect trades
  - id: finance-C-127
    when: When reading the README before using this library in production
    action: 'Read and acknowledge the README disclaimers: (1) active development with API breaking changes, (2) personal project
      with potential bugs, (3) insufficient documentation for casual users'
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Using this library without understanding its development status may lead to unexpected API changes, unhandled
      edge cases, and production failures
  - id: finance-C-128
    when: When running backtest calculations involving return statistics
    action: Use 252 trading days per year for Chinese stock/futures markets — hardcoded in evaluate_holds; this assumption
      is valid only for A-share markets
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Applying 252 trading days/year to markets with different trading calendars will produce incorrect annualized
      returns, Sharpe ratios, and other performance metrics
  - id: finance-C-129
    when: When constructing signal matching dictionaries
    action: Event.is_match must return tuple[bool, str] with (match status, matched_signal_value) — contract enforced by calling
      code
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Returning incorrect tuple format will cause TypeError in CzscTrader position update logic, breaking all trading
      operations
  - id: finance-C-130
    when: When calculating position timeout based on bar count
    action: Use bid (bar id) for timeout calculation, not dt (datetime) — bid provides consistent bar-counting regardless
      of trading calendar gaps
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using datetime for timeout will produce inconsistent timeout behavior due to weekends, holidays, and market
      closures, causing premature or delayed position exits
  - id: finance-C-131
    when: When implementing or refactoring bar data collection logic
    action: Use dict-of-lists data structure with frequency strings as keys for BarGenerator, enabling O(1) lookup per frequency
      and lazy initialization of empty lists per frequency
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Switching to single list with filter would cause O(n) scan overhead per frequency lookup, degrading batch
      processing performance by orders of magnitude
    derived_from_bd_id: BD-001
  - id: finance-C-132
    when: When using the framework's default min_bi_len=6 parameter for笔/BI construction
    action: Verify that min_bi_len=6 matches your trading strategy requirements; switch to min_bi_len=7 for old笔 convention
      via czsc_min_bi_len environment variable when targeting traditional analysis
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default min_bi_len=6 produces more trading signals than traditional 7-bar standard, potentially causing overtrading
      and increased transaction costs if strategy was designed for old笔 conventions
    derived_from_bd_id: BD-008
  - id: finance-C-133
    when: When implementing Rust extension auto-detection logic in chan_analysis
    action: Verify Rust implementation is auto-detected when installed via check_rs_czsc; use CZSC_USE_PYTHON=false to explicitly
      enable Rust for production batch workloads requiring 10-50x speedup
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing Rust auto-detection causes Python fallback to be used even when Rust extension is installed, resulting
      in 10-50x slower batch processing for high-volume backtesting workloads
    derived_from_bd_id: BD-010
  - id: finance-C-134
    when: When implementing factor normalization in czsc.features
    action: Use rolling percentile rank for factor normalization to achieve [0,1] range scaling that handles non-normal distributions;
      do NOT use z-score (assumes normality) or min-max scaling (sensitive to outliers)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using z-score normalization on non-normal factor distributions produces incorrect scaling, causing cross-sectional
      comparison errors and potentially flipping factor signal direction
    derived_from_bd_id: BD-084
  - id: finance-C-135
    when: When implementing parallel backtesting in CTAResearch
    action: Use concurrent.futures for multi-process execution to scale CPU-bound backtests across available cores; do NOT
      use sequential execution for parameter optimization workloads
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Sequential backtesting execution creates unacceptable latency for parameter optimization, making interactive
      strategy research infeasible and extending batch backtest time by order of magnitude
    derived_from_bd_id: BD-027
  - id: finance-C-137
    when: When implementing cost calculation for stock trading backtesting
    action: Assume the framework calculates stamp duty (印花税); the framework does not include stamp duty in default cost calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results will systematically underestimate transaction costs for sell transactions since stamp duty
      (0.05-0.1% for A-shares) is not included, creating false confidence in strategy profitability
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-138
    when: When implementing transaction cost calculations for A-share backtesting
    action: Add stamp duty (印花税) calculation with 0.001 (0.1%) rate for sell transactions only; integrate into Position.calculate_trade_cost
      by adding sell_cost component for stamp duty
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without stamp duty, sell transaction costs are underestimated by 0.1%, causing strategies that rely on frequent
      selling to show inflated backtest returns not achievable in live trading
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-139
    when: When implementing or refactoring data collection in multi-process backtesting
    action: Use DataClient TTL-based file caching with thread-safe locks; do not replace with in-memory-only caching or remove
      locking mechanisms
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing TTL caching or thread-safe locks causes API rate limit violations in multi-process workers and risks
      cache file corruption through race conditions during concurrent access
    derived_from_bd_id: BD-002
  - id: finance-C-140
    when: When implementing or refactoring BI (笔) calculations in Chan analysis
    action: Use get_cache_with_default for expensive linear regression in BI calculations; do not remove caching mechanism
      or inline the regression computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing BI caching causes O(n) repeated computation of linear regression on each bar update, severely degrading
      backtest performance and making real-time updates impractical
    derived_from_bd_id: BD-006
  - id: finance-C-142
    when: When implementing event logging for backtesting or live trading systems
    action: Assume the framework provides immutable event log functionality; the framework currently lacks audit-grade event
      logging with write-once protection
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without immutable event logging, backtest results and trading decisions lack tamper-evident audit trail required
      for regulatory compliance and dispute resolution
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-143
    when: When implementing audit trail functionality for production trading systems
    action: Implement append-only event log with cryptographic hash chaining (previous_hash -> event_data -> current_hash)
      to verify tamper-evident records; use write-once storage or WAL (write-ahead log) pattern
    severity: high
    kind: domain_rule
    modality: must
    consequence: Implementing immutable event log provides regulatory-compliant audit trail for strategy decisions and enables
      backtest reproducibility verification through verifiable event history
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-144
    when: When implementing or refactoring Position.update method
    action: Retain the datetime (dt) sequence validation that raises an error when dt regresses; do not replace with silent
      ignore or log-and-continue patterns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without dt regression validation, stale bars silently overwrite fresher data, causing P&L calculations to
      use out-of-sequence information and producing incorrect backtest results that cannot be reproduced in live trading
    derived_from_bd_id: BD-022
  - id: finance-C-145
    when: When implementing signal loading via get_signals_by_conf
    action: Use dynamic import_by_name for runtime signal loading to support plugin architecture; do not use static imports
      that require pre-registration of each signals
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Static imports require pre-registration of all signals, eliminating the plugin flexibility that allows new
      signals to be added to the codebase without modifying trader initialization logic
    derived_from_bd_id: BD-013
  - id: finance-C-146
    when: When using bars_raw and bars_ubi in backtesting or live trading
    action: Use bars_ubi for live signal computation (unidirectional processed bars) and bars_raw for post-hoc analysis/replay
      only (raw bar data); do not substitute one for the other
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using bars_raw for signal computation introduces bar direction inconsistency, while using bars_ubi for analysis/replay
      loses raw bar information needed for accurate backtest reconstruction
    derived_from_bd_id: BD-007
  - id: finance-C-147
    when: When calculating returns in Pairs.evaluate
    action: Use basis point returns (1BP = 0.0001) for Pairs returns, not decimal percent; verify consistency with Position.stop_loss
      BP unit convention
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using percent returns (0.01) instead of BP returns (0.0001) causes 100x scaling error in spread calculations,
      leading to incorrect pair selection and risk management decisions
    derived_from_bd_id: BD-028
  - id: finance-C-148
    when: When calculating Calmar ratio using daily_performance metrics
    action: Use 252 as the annualization factor for Chinese stock market calculations (252 trading days per year); do not
      use Western standard 250 or calendar days 365
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 250 (Western) underestimates annualization for Chinese A-shares by 0.8%, while 365 overestimates by
      44%, causing systematic misranking of strategy performance and incorrect risk metrics
    derived_from_bd_id: BD-030
  - id: finance-C-149
    when: When implementing backtesting logic with pre-computed signal cache
    action: Verify on_sig method bypasses CZSC bar update when using signal_cache=True to achieve 10-100x speedup; do NOT
      add redundant bar processing in on_sig
    severity: high
    kind: domain_rule
    modality: must
    consequence: Adding bar processing to on_sig during signal-cached backtests destroys the 10-100x speedup, making parameter
      optimization with thousands of iterations prohibitively slow or infeasible
    derived_from_bd_id: BD-025
  - id: finance-C-150
    when: When implementing Tianqin order management integration
    action: Use TargetPosTask for position synchronization via create_symbol_trader; do NOT implement manual order management
      as a replacement
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing TargetPosTask with manual order management breaks Tianqin position synchronization, causing backtest-live
      execution gaps where orders are rejected or positions become inconsistent
    derived_from_bd_id: BD-026
  - id: finance-C-151
    when: When evaluating strategy profitability using break-even win rate calculation
    action: Verify that cost parameters (sell_cost, buy_cost) match actual broker fees for the traded instrument; adjust from
      defaults if actual costs differ
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default cost parameters that diverge from actual broker fees causes break-even win rate thresholds
      to be inaccurate, leading to strategy acceptance when actual trading would be unprofitable
    derived_from_bd_id: BD-101
  - id: finance-C-152
    when: When monitoring production trading systems for model degradation
    action: Define and document PSI thresholds for population drift detection (e.g., PSI < 0.1 = stable, 0.1-0.25 = warning,
      > 0.25 = action required) based on backtesting validation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without defined PSI thresholds, population drift warnings go unheeded, causing strategies to trade on degraded
      signals until performance collapse is obvious and costly
    derived_from_bd_id: BD-102
  - id: finance-C-153
    when: When configuring position timeout for long-duration trades
    action: 'Set timeout based on strategy time horizon (e.g., swing trades: 50-200 bars, momentum: 20-100 bars); verify 1000-bar
      default matches expected holding period'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default timeout of 1000 bars (effectively no timeout) fails to provide fail-safe exit for stuck positions,
      allowing losses to accumulate indefinitely when position tracking logic fails
    derived_from_bd_id: BD-019
  - id: finance-C-154
    when: When configuring interval parameter for re-entry after close signals
    action: Set interval > 0 (e.g., 1-5 bars) when strategy is prone to whipsaw signals; validate that interval=0 does not
      cause overtrading by checking average trade frequency in backtest
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Zero-bar interval allows immediate re-entry after close, causing overtrading on choppy markets where whipsaw
      signals trigger frequent round-trip trades with cumulative cost drag
    derived_from_bd_id: BD-021
  - id: finance-C-155
    when: When processing position updates with dt (datetime) field validation
    action: Handle AssertionError from dt monotonicity check gracefully without blocking Position.update; implement fallback
      behavior (e.g., skip update, log warning) to prevent position freeze
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unhandled AssertionError on dt regression halts Position.update entirely, freezing the position indefinitely
      since timeout counter never advances while update() never completes, causing persistent stale positions with accumulating
      losses
    derived_from_bd_id: BD-146
  - id: finance-C-156
    when: When calculating annual performance metrics (Sharpe, Calmar, returns)
    action: Verify 252 trading days assumption matches the target market calendar; for markets with different trading day
      counts, replace hardcoded 252 with market-specific value
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Hardcoded 252 assumes Chinese trading calendar with standard holidays; using this for other markets (US:
      252-253, different holiday calendars) causes annualization errors in Sharpe ratio, Calmar ratio, and return calculations,
      producing misleading performance comparisons'
    derived_from_bd_id: BD-148
  - id: finance-C-159
    when: When configuring timeout parameters in Position initialization
    action: Set timeout values in K-line count units (not time duration) — timeout represents the number of bars to wait before
      exiting position, and actual elapsed time depends on the K-line period setting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing timeout as seconds or minutes instead of K-line count causes the timeout mechanism to trigger orders
      of magnitude earlier or later than intended, destroying strategy timing assumptions and causing premature or delayed
      exits
    derived_from_bd_id: BD-034
  - id: finance-C-160
    when: When selecting or configuring moving average types for trend calculation
    action: Verify MA type parameter is explicitly specified and validated against supported types (SMA, EMA, WMA, etc.) —
      different MA types produce significantly different trend signals due to varying smoothing and lag characteristics
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Defaulting to an unspecified or incorrect MA type produces trend signals that differ substantially from intended
      strategy behavior, causing signal crossovers at different points and degrading strategy performance unpredictably
    derived_from_bd_id: BD-095
  - id: finance-C-161
    when: When initializing Position objects with risk parameters
    action: 'Verify risk parameter defaults match intended risk architecture: timeout=1000 K-lines (max wait), stop_loss=1000BP
      (10% cap), T0=False (no same-day close) — changing these conservative defaults requires explicit risk committee approval'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Overriding position defaults without risk committee approval exposes the strategy to unbounded loss (stop_loss
      too high), indefinite holding (timeout too high), or margin call risk (T0 enabled), causing losses far exceeding expected
      maximum drawdown
    derived_from_bd_id: BD-121
  - id: finance-C-162
    when: When implementing position opening interval logic
    action: Use seconds as the unit for interval parameter; verify interval value is a positive integer and validate against
      0 (which causes infinite loop risk)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using interval as minutes or other units causes orders to execute at wrong frequencies, either creating excessive
      positions in high-frequency scenarios or missing trading opportunities in low-frequency scenarios
    derived_from_bd_id: BD-035
  - id: finance-C-163
    when: When naming trading signals
    action: Format signal names as k1_k2_k3_v1_v2_v3_score with exactly 7 underscore-separated parts (6 parameters plus 1
      score)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect signal naming format causes parsing failures, breaking signal storage, retrieval, and downstream
      analysis that depend on the fixed underscore-separated structure
    derived_from_bd_id: BD-036
  - id: finance-C-164
    when: When implementing stop-loss logic for directional positions
    action: Use cumulative returns threshold for directional stop-loss decisions; do not use fixed percentage stop as it ignores
      trend context
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fixed percentage stop-loss ignores trend context, causing premature exits in trending moves and reducing
      potential gains while failing to protect against adverse reversals in the opposite direction
    derived_from_bd_id: BD-119
  - id: finance-C-166
    when: When initializing BarGenerator with max_count parameter
    action: Verify that max_count=5000 is sufficient for indicator lookback requirements; verify the value accommodates the
      longest indicator window plus buffer; increase with explicit memory monitoring if needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Insufficient max_count causes bars to be dropped before indicator calculations complete, leading to incorrect
      technical indicator values and flawed trading signals
    derived_from_bd_id: BD-130
  - id: finance-C-167
    when: When configuring WeightBacktest commission fee
    action: Verify that fee=2 BP (single-leg) matches actual broker commission structure; for multi-leg strategies, the actual
      cost may be significantly higher due to compounding effects across legs
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Single-leg fee calculation underestimates actual transaction costs in multi-leg strategies, inflating backtest
      performance and causing live trading returns to fall below expectations
    derived_from_bd_id: BD-134
  - id: finance-C-169
    when: When configuring BarGenerator's internal BarGenerator for long-running backtests
    action: Remove or arbitrarily increase the bg_max_count memory limit from its default value
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Removing memory bounds causes unbounded memory growth during long backtests, eventually triggering out-of-memory
      errors and crashing the backtest process
    derived_from_bd_id: BD-038
  - id: finance-C-176
    when: When implementing signal ensemble logic in backtesting
    action: 'Use one of the three supported ensemble methods: mean (signal smoothing), vote (majority consensus), or max (strongest
      signal). Custom ensemble functions require direct source code modification in czsc/traders/base.py'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing ensemble method affects signal aggregation logic fundamentally; mean/vote/max produce different
      trade signals and positions, leading to inconsistent backtest results when switching between methods without revalidation
    derived_from_bd_id: BD-040
  - id: finance-C-177
    when: When calculating annualized returns in backtest reporting
    action: Use yearly_n=252 for A-share stocks, yearly_n=365 for futures/cryptocurrencies that trade year-round. Verify the
      asset type before applying annualization to avoid systematic return distortion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 252 for non-stock assets underestimates annual returns by 31% for futures/crypto; using 365 for A-shares
      overestimates annual returns by 4.8%, causing strategy selection errors and incorrect live performance expectations
    derived_from_bd_id: BD-041
  - id: finance-C-178
    when: When estimating transaction costs in backtest reporting
    action: Use default fee_rate=0.0002 (2BP single-side) for stock backtesting, but verify actual broker fee structure since
      stamp duty (0.1%), commission, and transfer fees vary by account type and volume
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default fee_rate of 0.02% underestimates actual costs for high-frequency strategies where stamp duty alone
      is 0.1%; accumulated cost errors over thousands of trades cause backtest P&L to differ significantly from live trading
    derived_from_bd_id: BD-042
  - id: finance-C-179
    when: When implementing position close logic for settlement compliance
    action: 'Enforce T0 settlement rule via _can_close_today() flag: T0=False prevents same-day position closes (A-share T+1
      compliance), T0=True allows intraday closes for futures'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allowing same-bar closes when T0=False violates A-share T+1 settlement rules; backtest results become non-reproducible
      in live trading as broker rejects same-day sell orders
    derived_from_bd_id: BD-124
  - id: finance-C-180
    when: When implementing same-bar close prevention with interval=0 re-entry logic
    action: Set T0=True explicitly when using interval=0 for immediate re-entry after close; the combination of T0=False with
      interval=0 creates contradictory behavior where same-bar close is blocked while immediate reopen is permitted
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: T0=False blocks same-bar position closes while interval=0 permits immediate reopen on next bar, creating
      silent position state inconsistencies that cause incorrect capital calculations and duplicate signals in intraday strategies
    derived_from_bd_id: BD-142
  - id: finance-C-181
    when: When restoring Position state from dill serialization
    action: Verify T0 flag integrity after deserialization; futures traders using Position class must explicitly set T0=True
      after state restoration since T0=False defaults during serialization may block legitimate intraday closes
    severity: high
    kind: operational_lesson
    modality: must
    consequence: T0 flag corruption during dill serialization causes _can_close_today() to block same-bar closes that should
      be allowed for futures trading, leading to settlement finality errors and incorrect position tracking
    derived_from_bd_id: BD-145
  - id: finance-C-182
    when: When implementing single-bar trend factor calculation
    action: Use the formula (close/open - 1) / volume for bar trend factor — do not simplify or re-order this calculation,
      as it normalizes price change rate by volume to identify healthy price-volume coordination
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the formula order or removing volume normalization breaks the bar quality factor, causing false
      signals for volume-thin stocks and missing fake breakouts that have abnormally high volume
    derived_from_bd_id: BD-063
  - id: finance-C-183
    when: When implementing volume surge detection logic
    action: Set volume surge threshold to 2-4x of N-bar average volume — use range [2.0, 4.0] as the acceptable multiplier
      boundary for filtering excessive or insufficient volume changes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting threshold below 2x includes false surge signals from mild volume increases; setting above 4x misses
      significant volume spikes, both causing momentum strategies to enter or exit at suboptimal prices
    derived_from_bd_id: BD-064
  - id: finance-C-184
    when: When implementing long position exit priority logic
    action: 'Execute exit conditions in strict priority order: existing close signals first, then stop-loss triggers, then
      timeout exits — do not allow lower-priority conditions to override higher-priority ones'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reordering exit priorities can cause stop-loss to trigger before a pending close signal is processed, resulting
      in premature exits and missed profit opportunities; or timeout exits overriding stop-loss, causing unnecessary losses
    derived_from_bd_id: BD-067
  - id: finance-C-185
    when: When implementing ensemble strategies in CzscTrader backtesting
    action: Keep ensemble methods (mean/vote/max) within CzscTrader core — do not extract ensemble logic to external plugins
      as this would break real-time backtesting behavior and position update synchronization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Extracting ensemble methods to plugins breaks real-time aggregation and position update synchronization,
      causing backtest results to diverge from expected ensemble behavior and potentially executing invalid position combinations
    derived_from_bd_id: BD-127
  - id: finance-C-187
    when: When processing CZSC price structure updates with bi_list
    action: Verify bi_list auto-truncation behavior is accounted for — when max_bi_num is exceeded, oldest BIs are silently
      removed; implement explicit data preservation logic if historical BIs are needed for analysis
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Automatic truncation silently removes oldest BIs from the sequence without warning, causing historical price
      structure data loss that may invalidate pattern analysis and strategy signals relying on complete BI history
    derived_from_bd_id: BD-132
  - id: finance-C-190
    when: When implementing strategy position caching
    action: Use MD5 hash of position config for cache key validation — any configuration change must trigger automatic cache
      invalidation to prevent stale position data from being reused across strategy versions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without MD5-based cache invalidation, stale position data from previous strategy versions may be incorrectly
      reused, causing strategies to operate with outdated state and producing invalid backtest results
    derived_from_bd_id: BD-136
  - id: finance-C-191
    when: When implementing Position event operate validation
    action: Enforce directional operation constraints — long positions only accept LO/LE operations, short positions only
      accept SO/SE operations; reject any cross-direction operation calls
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixing long/short operation types in a single call generates contradictory trade instructions that corrupt
      position state and cause undefined trading behavior with potential for unintended position reversals
    derived_from_bd_id: BD-139
  - id: finance-C-192
    when: When configuring memory limits in CzscTrader components
    action: Synchronize each three memory limit configurations — Position max_count (default 5000), BarGenerator max_count
      (default 5000), and trader bg_max_count (default 5000) must be changed together to maintain consistent memory behavior;
      document any deviation from synchronized values
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Changing only one memory limit without adjusting the others creates inconsistent memory consumption patterns,
      potentially causing OOM errors in one component while another has excess capacity, or producing different backtest behavior
      than expected
    derived_from_bd_id: BD-143
  - id: finance-C-194
    when: When configuring parallel processing for backtesting
    action: Use max_workers=3 as the default number of worker processes for multi-process backtesting, ensuring balanced concurrency
      and system resource consumption
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Setting max_workers too high causes excessive context switching overhead and memory pressure, while setting
      it too low underutilizes available CPU cores, leading to significantly slower backtest execution times
    derived_from_bd_id: BD-052
  - id: finance-C-195
    when: When initializing technical indicator calculations for trading signals
    action: Require at least 600 bars of historical data before executing signal analysis, ensuring sufficient sample size
      for long-period indicators like MA250
    severity: high
    kind: domain_rule
    modality: must
    consequence: Processing signals with insufficient bars causes indicators like moving averages to produce unreliable values,
      generating noisy and false trading signals that lead to unprofitable trades in live trading
    derived_from_bd_id: BD-053
  - id: finance-C-196
    when: When implementing periodic signal checking logic for strategy maintenance
    action: Set delta_days=5 as the default signal check interval for daily-level strategies, balancing checking frequency
      with system overhead
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Setting delta_days too large causes missed trading opportunities as signals are not checked frequently enough,
      while setting it too small increases system overhead without proportional benefit
    derived_from_bd_id: BD-054
  - id: finance-C-197
    when: When implementing external API call resilience for Feishu notifications
    action: Implement retry logic with maximum 2 retries and random 1-3 second wait intervals using exponential backoff, avoiding
      excessive load on external services
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Removing or reducing retry attempts causes API call failures to propagate directly, resulting in missed notifications
      and lack of visibility into critical backtest events or trading alerts
    derived_from_bd_id: BD-055
  - id: finance-C-198
    when: When selecting storage format for backtest intermediate data
    action: Use Feather columnar storage format for backtest intermediate data, leveraging its compression and fast read/write
      performance for frequent quantitative backtesting scenarios
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using incompatible storage formats like plain CSV or non-Arrow-compatible formats significantly degrades
      I/O performance and breaks data pipeline compatibility with Arrow ecosystem tools
    derived_from_bd_id: BD-056
  - id: finance-C-199
    when: When implementing or extending strategy classes that inherit from the base strategy abstraction
    action: Implement the positions property as required by @abstractmethod decorator — subclasses MUST provide a valid positions
      attribute returning current position data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing positions implementation causes AttributeError at runtime when backtest accesses position data; the
      error only surfaces during backtest execution, not during development or import
    derived_from_bd_id: BD-072
  - id: finance-C-200
    when: When configuring strategy signal modules in backtesting initialization
    action: Verify signals_module_name points to czsc.signals package for standard strategies — custom modules require full
      interface implementation matching czsc signals API contract
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incompatible signal modules causes KeyError or AttributeError when strategy calls signal functions;
      backtest fails silently or produces incorrect signals
    derived_from_bd_id: BD-073
  - id: finance-C-201
    when: When initializing backtest data collection with default parameters
    action: Set bars_sdt to at least 3 years before backtest start date to verify sufficient historical data for long-term
      indicators like MA720
    severity: high
    kind: domain_rule
    modality: must
    consequence: Insufficient lookback data causes indicators to return NaN or incorrect values in early backtest period,
      systematically distorting strategy performance metrics and causing live trading to underperform backtest
    derived_from_bd_id: BD-074
  - id: finance-C-202
    when: When serializing and deserializing trader objects for persistence or distribution
    action: Use dill library for serialization — pickle cannot handle lambda functions, closures, and complex strategy state,
      resulting in deserialization errors or silent state corruption
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Pickle serialization silently drops unsupported objects like lambdas, causing deserialized trader to have
      missing callbacks and broken strategy logic that only manifests as runtime errors later
    derived_from_bd_id: BD-075
  - id: finance-C-203
    when: When calculating long-short return separation for portfolio analysis
    action: Use clip(lower=0) for long position returns and clip(upper=0) for short position returns — do not use absolute
      values or other transformations that conflate directional returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect separation method causes long and short return statistics to include opposite direction gains/losses,
      producing misleading performance attribution that overstates or understates actual directional profitability
    derived_from_bd_id: BD-076
  - id: finance-C-204
    when: When implementing factor direction judgment logic in backtesting
    action: Use Pearson correlation coefficient to determine factor direction (positive correlation = long, negative = short);
      do not replace with Spearman rank correlation or Granger causality
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Spearman rank correlation instead of Pearson for factor direction judgment changes the strategy signal
      from linear to monotonic relationship, causing position sign errors and potential losses in live trading
    derived_from_bd_id: BD-080
  - id: finance-C-205
    when: When implementing ensemble weight aggregation in multi-model backtesting
    action: Use simple aggregation methods (mean, max, min, voting) for combining model predictions — do not use stacking
      with meta-learner or optimized weight averages
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Stacking with a meta-learner causes overfitting by using in-sample data to learn combination weights, producing
      backtest results that significantly overestimate live trading performance
    derived_from_bd_id: BD-082
  - id: finance-C-206
    when: When calculating time-varying relationships between two financial time series
    action: Use rolling correlation with fixed window size for measuring dynamic relationships — do not replace with exponential
      weighted correlation or full-sample static correlation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using full-sample static correlation ignores time-varying dependencies between financial series, causing
      risk management and pair trading strategies to fail during regime changes
    derived_from_bd_id: BD-083
  - id: finance-C-207
    when: When discretizing continuous factors into signal buckets
    action: Use rolling quantile binning with historical data to determine bucket boundaries — do not use fixed quantile boundaries
      or equal-width bins
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fixed quantile boundaries introduces look-ahead bias by using future data to determine bucket assignments,
      causing signal generation to appear more predictive than it actually is
    derived_from_bd_id: BD-086
  - id: finance-C-208
    when: When comparing evolving relationships between two sequences for pairs trading or mean-reversion strategies
    action: Use rolling linear regression with fixed window to capture time-varying slopes and intercepts — do not use static
      regression or cointegration methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using static regression fails to detect regime changes in pair relationships, causing pairs trading strategies
      to maintain positions during market regime shifts when the historical relationship has broken down
    derived_from_bd_id: BD-087
  - id: finance-C-209
    when: When implementing or modifying MACD indicator calculations
    action: Replace EMA-based signal line with simple moving average or other smoothing methods — MACD must use exponential
      moving averages with standard parameters (fast=12, slow=26, signal=9) unless explicitly overridden with documented justification
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Replacing EMA with SMA reduces responsiveness to recent price changes, causing delayed crossover signals
      that result in later entry/exit points and missed trading opportunities in momentum strategies
    derived_from_bd_id: BD-093
  - id: finance-C-210
    when: When measuring variable relationships in non-normal financial data
    action: Use Normalized Mutual Information (NMI) for non-linear dependency measurement — do not replace with Pearson correlation
      or Spearman correlation alone
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pearson and Spearman correlations miss non-linear dependencies common in financial data, causing predictive
      relationships to go undetected and degrading feature selection quality
    derived_from_bd_id: BD-096
  - id: finance-C-211
    when: When implementing trend analysis and forecasting in quantitative strategies
    action: Use single variable linear regression for trend quantification — do not replace with polynomial fitting or local
      regression methods without explicit justification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Polynomial fitting introduces overfitting risk in trend analysis, producing misleading slope estimates that
      cause incorrect directional bias assessment and poor forecasting
    derived_from_bd_id: BD-097
  - id: finance-C-212
    when: When calculating risk-adjusted performance metrics for strategy evaluation
    action: Use Sharpe ratio as the primary risk-adjusted return metric — do not substitute with Sortino ratio or information
      ratio as the default comparator
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Sortino ratio instead of Sharpe ratio focuses only on downside volatility, missing the risk-adjusted
      comparison standard used across the industry and causing inconsistent strategy ranking
    derived_from_bd_id: BD-099
  - id: finance-C-213
    when: When analyzing temporal dependencies and performing time series model specification
    action: Use both ACF and PACF together for autocorrelation analysis — do not use ACF or PACF alone without the complementary
      analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using only ACF or only PACF fails to distinguish AR and MA components correctly, leading to improper time
      series model specification and degraded forecasting accuracy
    derived_from_bd_id: BD-107
  - id: finance-C-214
    when: When implementing pairs trading or statistical arbitrage strategies
    action: Use cointegration testing (e.g., Engle-Granger or Johansen) to identify mean-reverting pairs before constructing
      spread positions — do not rely on correlation alone
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using correlation instead of cointegration selects pairs that move together but do not converge, causing
      statistical arbitrage strategies to hold positions that never mean-revert, leading to sustained losses when spread diverges
    derived_from_bd_id: BD-108
  - id: finance-C-215
    when: When constructing factor-based portfolios using quantile grouping
    action: Use quantile-based factor layering to bucket assets — do not replace with equal-weight within buckets or full
      optimization weights
    severity: high
    kind: domain_rule
    modality: must
    consequence: Equal-weighting ignores factor magnitude, diluting high-conviction signals and reducing long-short spread;
      full optimization overfits to historical data, causing live trading performance to diverge significantly from backtest
    derived_from_bd_id: BD-109
  - id: finance-C-216
    when: When implementing KDJ-based trading signals
    action: Combine KDJ overbought/oversold conditions with MA direction confirmation — signals must align with trend direction,
      do not generate standalone KDJ reversal signals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Standalone KDJ signals without trend confirmation generate counter-trend trades in established trends, increasing
      whipsaw losses and reducing win rate when market exhibits persistent directional moves
    derived_from_bd_id: BD-116
  - id: finance-C-217
    when: When calculating factor regression coefficients for risk decomposition
    action: Use ordinary linear regression for coefficient estimation — do not substitute with Ridge regression (introduces
      bias) or LASSO (adds feature selection) unless explicitly required
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ridge regression biases coefficients toward zero, understating true factor exposure and causing risk model
      to underestimate portfolio sensitivity; LASSO arbitrarily zeroes coefficients, misrepresenting active risk contributors
    derived_from_bd_id: BD-117
  - id: finance-C-219
    when: When implementing or refactoring bar generation and signal processing logic in CzscTrader
    action: Remove or bypass the dual-layer frequency ordering validation (BD-128 at BarGenerator init + BD-131 at signal
      preparation) — both layers are required for defense in depth
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Removing either validation layer creates a silent path to out-of-order frequency processing errors that only
      manifest as subtle data inconsistencies during live trading, making debugging extremely difficult
    derived_from_bd_id: BD-147
  - id: finance-C-220
    when: When processing buy/sell orders in backtesting
    action: Assume the framework handles suspension/suspension lift events — the framework does not implement suspension detection;
      stocks under suspension are treated as normally tradeable
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without suspension handling, the backtest assumes full execution for stocks that are suspended in live trading,
      causing significant divergence between backtest and live results
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-221
    when: When selecting stocks for trading in A-share backtesting
    action: Check suspension status fields (susp_limit = 1 OR resume_date > current_date) and filter out suspended stocks
      from trading candidates, marking them as non-tradable
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without filtering suspended stocks, the strategy may generate orders for stocks that cannot be traded, causing
      execution failures and portfolio drift in live trading
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-222
    when: When selecting stocks for trading in A-share backtesting
    action: Assume the framework handles ST/*ST stock trading restrictions — the framework does not implement ST status filtering;
      ST/*ST stocks are treated as normal tradeable instruments
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without ST status filtering, the backtest may execute trades in ST/*ST stocks that face trading restrictions
      (5% price limit, margin trading prohibition) in live markets
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-223
    when: When filtering stocks for A-share trading in backtesting
    action: Check ST status fields (st_status = 'ST' OR st_status = '*ST') and exclude ST/*ST stocks from trading candidates,
      as they face special trading rules including 5% daily price limit
    severity: high
    kind: domain_rule
    modality: must
    consequence: ST/*ST stocks have 5% price limits and are excluded from margin trading; failing to filter them causes backtest-live
      execution divergence and potential compliance violations
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-224
    when: When selecting stocks for trading in A-share backtesting
    action: Assume the framework handles new stock trading restrictions — the framework does not implement listing date validation;
      newly listed stocks are treated as fully tradeable from day one
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without new stock restrictions, the backtest may include orders for stocks under trading halts (typically
      first 5-10 trading days) that cannot be executed in live trading
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-225
    when: When selecting stocks for A-share trading in backtesting
    action: Check listing_date and exclude stocks with listing_date within the restricted period (typically first 5-10 trading
      days) from trading candidates for 新股, and validate holding period for 次新股 (typically 6-12 months)
    severity: high
    kind: domain_rule
    modality: must
    consequence: New stocks face mandatory trading halts after listing; failing to filter them causes execution failures and
      potential losses due to inability to exit positions during the restricted period
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-226
    when: When simulating order execution in backtesting
    action: Assume the framework validates execution feasibility and liquidity constraints — the framework does not implement
      liquidity checks; each orders are treated as fully executable at the quoted price regardless of order size
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without liquidity constraints, large orders are assumed fully executable at market price, causing significant
      overestimation of strategy returns when order sizes exceed available market depth
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-227
    when: When executing orders in backtesting
    action: Validate order_size against market liquidity metrics (average_daily_volume, market_cap, order_book_depth) and
      apply volume-based execution probability or slippage models for orders exceeding liquidity thresholds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Large orders in illiquid stocks face significant slippage and partial fills; without liquidity constraints,
      backtested execution prices are unrealistically optimistic, causing live trading performance to fall far below backtested
      results
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-228
    when: When writing tests in the test/ directory
    action: Obtain each test data exclusively from czsc.mock module, specifically the generate_symbol_kines function for reproducible
      random data generation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hardcoded mock data in tests creates non-reproducible test results and violates the standardized data architecture,
      leading to inconsistent test behavior across different test environments and CI/CD pipelines
  - id: finance-C-229
    when: When implementing signals or strategies
    action: Use format_standard_kline to convert DataFrame to RawBar objects before creating CZSC analysis objects
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Creating CZSC objects from improperly formatted data causes runtime errors and produces incorrect Chan Theory
      analysis results, corrupting downstream trading signals
  - id: finance-C-230
    when: When configuring the runtime environment
    action: Use Rust-based rs-czsc as the primary implementation, falling back to Python only when Rust is unavailable or
      CZSC_USE_PYTHON is set
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Running Python implementation when Rust is available results in 10-100x slower execution for core Chan Theory
      analysis operations, making large-scale backtesting impractical
    stage_ids:
    - runtime
  - id: finance-C-231
    when: When modifying public APIs
    action: Break existing public API signatures or remove deprecated functions without providing migration paths
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Breaking API changes cause existing user strategies and integrations to fail silently, requiring costly rewrites
      and destroying trust in the library's stability
    stage_ids:
    - api_design
  - id: finance-C-232
    when: When writing public functions
    action: Provide complete docstrings documenting parameters, return values, and usage examples for each public functions
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Missing docstrings prevent users from understanding function behavior, leading to incorrect usage that produces
      wrong analysis results or trading losses
  - id: finance-C-233
    when: When managing repeated code patterns
    action: Extract repeated code into helper functions following DRY principle to eliminate duplication
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Duplicated code leads to inconsistent behavior when fixes are applied to some copies but not others, creating
      subtle bugs that are difficult to trace
  - id: finance-C-234
    when: When managing configuration values
    action: Define magic values as module-level constants rather than hardcoding them throughout the codebase
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Magic values scattered in code are difficult to find and modify, causing inconsistent behavior when some
      instances are updated while others are overlooked
  - id: finance-C-235
    when: When performing multi-level market analysis
    action: Use BarGenerator class for K-line synthesis and cross-timeframe analysis instead of manual aggregation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Manual K-line aggregation is error-prone and produces inconsistent results across different analysis runs,
      corrupting Chan Theory signal generation
  - id: finance-C-236
    when: When accessing market data from multiple sources
    action: Use DataClient interface for unified data access rather than calling data source connectors directly
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Direct connector access bypasses caching and error handling, leading to inconsistent data access patterns
      and performance degradation
  - id: finance-C-237
    when: When upgrading to new versions
    action: Upgrade without reading the changelog due to frequent API breaking changes in the 0.10.X development cycle
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Automatic version upgrades cause existing strategies to break silently because APIs have significant changes
      between versions without semantic versioning guarantees
    stage_ids:
    - deployment
  - id: finance-C-238
    when: When using the library for live trading decisions
    action: Trust analysis results without independent verification due to known potential bugs in the personal development
      project
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Relying on unverified analysis for live trading exposes capital to losses from potential bugs in the unverified
      personal development project
    stage_ids:
    - live_trading
  - id: finance-C-239
    when: When distributing or claiming results from this project
    action: Present backtest results as guaranteed future performance since the library carries no performance warranty
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting historical backtest returns as future guarantees violates regulatory principles and misleads users
      about expected live trading performance
    stage_ids:
    - reporting
  - id: finance-C-240
    when: When using plot_backtest module for visualization
    action: Use module-level constants (COLOR_DRAWDOWN, COLOR_RETURN, QUANTILES_DRAWDOWN, MONTH_LABELS) for chart styling
      instead of hardcoded values
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Hardcoded color and styling values create inconsistent visualizations and make theme changes require modifications
      in multiple locations
  - id: finance-C-241
    when: When managing disk cache for repeated computations
    action: Monitor cache size and call czsc.empty_cache_path() when size exceeds 1GB to prevent disk space issues
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unchecked cache growth fills disk space over time, eventually causing service disruption when the system
      runs out of storage
    stage_ids:
    - cache_management
  - id: finance-C-242
    when: When managing project dependencies with UV
    action: Use 'uv sync --extra dev' to synchronize dependencies and install development tools before running tests
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Running tests without proper environment setup leads to missing dependencies, causing test failures and incorrect
      analysis results
    stage_ids:
    - environment_setup
  - id: finance-C-243
    when: When naming signal functions
    action: Use versioned naming convention (e.g., V241013) for signal functions to enable proper version management and compatibility
      tracking
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unversioned signal function names prevent proper tracking of function evolution and break compatibility when
      functions are updated
  - id: finance-C-244
    when: When organizing signal functions in the codebase
    action: Group signal functions by category (bar.py for K-line level, pos.py for position, cxt.py for context, tas.py for
      technical indicators, vol.py for volume)
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Disorganized signal placement makes it difficult to find and maintain functions, leading to code duplication
      and inconsistent implementation patterns
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
