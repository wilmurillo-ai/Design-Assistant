      type: B
      summary: bar_sdt默认提前3年获取数据
    - id: BD-GAP-001
      type: B
      summary: 'Missing: PnL conservation (realized + unrealized = total)'
    - id: BD-GAP-002
      type: DK
      summary: 'Missing: Immutable event log'
    - id: BD-GAP-004
