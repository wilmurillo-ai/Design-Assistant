resources:
  packages:
  - name: pandas
    version_pin: ==1.5.3
  - name: numpy
    version_pin: ==1.24.4
  - name: matplotlib
    version_pin: '>=2'
  - name: requests
    version_pin: ==2.31.0
  - name: scipy
    version_pin: '>=1.3.0'
  - name: scikit-learn
    version_pin: '>1.4.2'
  - name: pytest
    version_pin: '>=8.3'
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing a FundamentalUniverseSelectionModel subclass in C#
    action: Override the Select() method with a fundamental filtering selector or provide it as a constructor parameter
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NotImplementedException will be thrown at runtime when universe selection is attempted, causing the algorithm
      to fail during backtesting or live trading
    stage_ids:
    - universe_selection
  - id: finance-C-002
    when: When implementing a universe selection model in C#
    action: Implement CreateUniverses() method to return IEnumerable<Universe>
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NotImplementedException will be thrown, preventing the algorithm from initializing and starting the backtest
      or live trading session
    stage_ids:
    - universe_selection
  - id: finance-C-006
    when: When using Python selector functions with FundamentalUniverseSelectionModel
    action: Convert Python functions via TrySafeAs() and ConvertToUniverseSelectionSymbolDelegate()
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: PythonNet cannot natively convert python methods to Func delegates, causing the selector to be null and triggering
      NotImplementedException at runtime
    stage_ids:
    - universe_selection
  - id: finance-C-014
    when: When implementing universe selection as part of the framework pipeline
    action: Implement IUniverseSelectionModel interface with CreateUniverses() and GetNextRefreshTimeUtc()
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: The algorithm framework will not recognize the universe selection model, causing initialization failure and
      preventing the algorithm from starting
    stage_ids:
    - universe_selection
  - id: finance-C-016
    when: When defining universe selection models in Python
    action: Implement CreateUniverses method on the Python class
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: UniverseSelectionModelPythonWrapper will throw NotImplementedException at initialization, preventing the
      algorithm from starting
    stage_ids:
    - universe_selection
  - id: finance-C-020
    when: When implementing a custom AlphaModel derived class
    action: override the Update() method with concrete insight generation logic
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The base AlphaModel.Update() throws NotImplementedException at runtime, causing the algorithm to fail without
      generating any trading signals
    stage_ids:
    - alpha_generation
  - id: finance-C-021
    when: When emitting insights for futures or options symbols
    action: emit insights for canonical contract symbols
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Canonical futures and options are non-tradable placeholders; emitting insights for them causes order generation
      failures downstream in portfolio construction
    stage_ids:
    - alpha_generation
  - id: finance-C-022
    when: When creating Insight objects with TimeSpan period
    action: specify a period greater than or equal to one second
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Insight.Price() throws ArgumentOutOfRangeException when period is less than TimeSpan.OneSecond, causing alpha
      model execution to halt
    stage_ids:
    - alpha_generation
  - id: finance-C-023
    when: When creating Insight objects with barCount parameter
    action: specify a barCount value of at least 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Insight.Price() throws ArgumentOutOfRangeException when barCount is less than 1, causing alpha model execution
      to halt
    stage_ids:
    - alpha_generation
  - id: finance-C-025
    when: When implementing alpha generation strategy
    action: override Update() method using any combination of data sources and prediction models
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Update() is the sole extensibility point for alpha generation; without overriding it, the base class throws
      NotImplementedException and no insights are produced
    stage_ids:
    - alpha_generation
  - id: finance-C-036
    when: When implementing custom portfolio construction models
    action: Override DetermineTargetPercent() method to define weighting logic
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Portfolio construction model will throw NotImplementedException because the base class DetermineTargetPercent()
      is abstract and requires concrete implementation for computing target weights
    stage_ids:
    - portfolio_construction
  - id: finance-C-037
    when: When creating portfolio targets with percentage-based sizing
    action: Verify target percentage magnitude falls within algorithm settings bounds (MinAbsolutePortfolioTargetPercentage
      to MaxAbsolutePortfolioTargetPercentage)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: PortfolioTarget.Percent returns null for out-of-bounds percentages, causing positions to be silently skipped
      and portfolio allocation to become incomplete or incorrect
    stage_ids:
    - portfolio_construction
  - id: finance-C-039
    when: When portfolio construction receives zero-price securities
    action: Skip target creation for symbols with zero security price to avoid division-by-zero
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Zero-price securities cause division by zero in PortfolioTarget.Percent, leading to NaN quantities or runtime
      exceptions that corrupt order generation
    stage_ids:
    - portfolio_construction
  - id: finance-C-044
    when: When BlackLittermanOptimizationPortfolioConstructionModel processes insights
    action: Accept null Insight.Magnitude values as the model requires numerical magnitude for equilibrium return calculations
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Null magnitude insights cause ArgumentNullException in Black-Litterman model, corrupting portfolio optimization
      and returning no targets
    stage_ids:
    - portfolio_construction
  - id: finance-C-052
    when: When implementing IPortfolioConstructionModel interface
    action: Implement CreateTargets() method accepting algorithm and insight array, returning IEnumerable<IPortfolioTarget>
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing or incorrect interface implementation causes compilation failure or runtime dispatch errors in the
      algorithm framework execution pipeline
    stage_ids:
    - portfolio_construction
  - id: finance-C-063
    when: When implementing TrailingStopRiskManagementModel drawdown calculation
    action: apply Math.Abs to the maximumDrawdownPercent parameter to verify sign insensitivity for both long and short positions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without Math.Abs, a negative drawdown input would reverse the risk threshold direction, allowing unlimited
      losses instead of limiting them
    stage_ids:
    - risk_management
  - id: finance-C-064
    when: When implementing TrailingStopRiskManagementModel trailing high/low tracking
    action: track high water marks separately for long positions (max) and low water marks for short positions (min)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using a single trailing value without distinguishing position direction would cause incorrect drawdown calculation,
      preventing liquidation for short positions when prices rise
    stage_ids:
    - risk_management
  - id: finance-C-065
    when: When implementing risk management drawdown percentage initialization
    action: allow non-positive values for maximumDrawdownPercent or maximumSectorExposure
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Non-positive risk thresholds would cause division by zero or invalid ratio calculations, crashing the algorithm
      or allowing unlimited losses
    stage_ids:
    - risk_management
  - id: finance-C-066
    when: When implementing ManageRisk method
    action: return risk-adjusted targets that override portfolio targets before execution
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: If risk management does not return adjusted targets, positions exceeding risk thresholds would not be liquidated,
      leading to excessive losses
    stage_ids:
    - risk_management
  - id: finance-C-076
    when: When implementing MaximumDrawdownPercentPerSecurity
    action: negate the maximum drawdown percentage for comparison since losses are negative
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without negation, a 5% max drawdown would trigger liquidation only when unrealized profit exceeds +5%, not
      when losses reach -5%
    stage_ids:
    - risk_management
  - id: finance-C-078
    when: When implementing PriceIsFavorable logic for VWAP-based execution
    action: evaluate BidPrice against VWAP for buys and AskPrice against VWAP for sells using correct comparison direction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Algorithm submits orders at unfavorable prices, causing buys to execute above VWAP or sells below VWAP, directly
      reducing net realized profits
    stage_ids:
    - execution
  - id: finance-C-079
    when: When calculating order sizes for VWAP-based execution
    action: apply MaximumOrderQuantityPercentVolume limit (default 1%) to cap order quantity as percentage of bar volume
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Large orders move market price adversely, causing slippage that exceeds expected execution costs and degrades
      backtest performance relative to realistic market impact
    stage_ids:
    - execution
  - id: finance-C-081
    when: When implementing custom execution models
    action: implement the Execute(QCAlgorithm, IPortfolioTarget[]) method with full order submission logic
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Base ExecutionModel throws NotImplementedException, leaving portfolio targets unexecuted and strategy positions
      perpetually at zero
    stage_ids:
    - execution
  - id: finance-C-099
    when: When checking buying power for order execution
    action: Use IBuyingPowerModel.HasSufficientBuyingPowerForOrder before order submission
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without buying power validation, orders may execute exceeding available capital, causing margin calls, forced
      liquidations, or account overdraft
    stage_ids:
    - order_lifecycle
  - id: finance-C-111
    when: When creating custom buying power models
    action: Implement each IBuyingPowerModel interface methods completely
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Partial interface implementation causes NotImplementedException at runtime when margin operations are attempted,
      preventing order execution
    stage_ids:
    - order_lifecycle
  - id: finance-C-118
    when: When setting algorithm datetime during execution
    action: Set algorithm time via SetDateTime before invoking user code callbacks
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Indicators, scheduled events, and user callbacks will operate on incorrect time context, causing misaligned
      signals and stale data usage
    stage_ids:
    - algorithm_manager
  - id: finance-C-119
    when: When executing backtest with zero or negative portfolio value
    action: Continue algorithm execution when Portfolio.TotalPortfolioValue <= 0 in backtest mode
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Algorithm continues running with no capital, producing invalid backtest results and potentially placing orders
      that cannot be filled
    stage_ids:
    - algorithm_manager
  - id: finance-C-120
    when: When implementing framework pipeline execution in OnFrameworkData
    action: 'Execute framework stages in canonical MPT order: UniverseSelection -> Alpha -> PortfolioConstruction -> RiskManagement
      -> Execution'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect pipeline order causes data dependency violations where downstream stages receive inputs in wrong
      sequence, corrupting alpha generation and portfolio construction
    stage_ids:
    - algorithm_manager
  - id: finance-C-135
    when: When presenting backtest results as live trading performance
    action: Claim backtest returns equal expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not account for slippage, fill latency, broker fees, and market impact that occur in
      live trading, misleading users about expected performance
    stage_ids:
    - algorithm_manager
  - id: finance-C-136
    when: When presenting simulated order fills as real execution proof
    action: Present simulated fills from ProcessSynchronousEvents as proof of live order execution
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Simulated fills assume immediate execution at current price without accounting for order latency, fill probability,
      and partial fills that occur in live trading
    stage_ids:
    - algorithm_manager
  - id: finance-C-142
    when: When alpha model generates Insights for portfolio construction
    action: Set GeneratedTimeUtc to algorithm.UtcTime before emitting insights to prevent look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backtest equity curve exhibits look-ahead bias when GeneratedTimeUtc is not properly set to algorithm.UtcTime,
      causing live trading returns to fall far below backtested results
  - id: finance-C-146
    when: When IPortfolioTarget[] flows from risk_management to execution
    action: Return targets with Quantity=0 for securities requiring liquidation due to risk limits
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Risk management fails to emit liquidation targets with zero quantity, allowing positions to remain open despite
      risk threshold violations
  - id: finance-C-148
    when: When OrderStatus updates flow from order_lifecycle to algorithm_manager
    action: Propagate OrderEvent with Status=OrderStatus.Filled to update Portfolio holdings before next alpha generation
      cycle
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Portfolio holdings remain stale after order fills, causing alpha model to generate signals based on incorrect
      position sizes
  - id: finance-C-151
    when: When implementing custom IAlphaModel that generates Insights
    action: Access future price data (look-ahead bias) by using any data with timestamp greater than algorithm.UtcTime
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Alpha model consumes future price data during backtesting, producing unrealistic backtest results that cannot
      be replicated in live trading
  - id: finance-C-171
    when: When implementing coarse universe selection functions that use price data
    action: Use coarse data only after it has been emitted — coarse prices are emitted for the previous day to prevent look-ahead
      bias, not the current day
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backtest equity curve exhibits look-ahead bias causing live trading returns to fall far below backtested
      results
  - id: finance-C-191
    when: When implementing multi-leg option orders
    action: Use OptionStrategies helper to batch multiple option legs into strategy-level orders — individual leg orders must
      not be submitted separately as they cause incorrect margin requirements and margin fragmentation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Submitting individual option legs without using OptionStrategies causes incorrect margin calculations, potential
      margin calls, and rejected orders in live trading while producing inconsistent backtest results
    derived_from_bd_id: BD-023
  - id: finance-C-199
    when: When calculating implied volatility for option pricing
    action: Use Brent root-finding method for Black-Scholes implied volatility extraction — Newton-Raphson is prohibited due
      to divergence risk
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using Newton-Raphson may cause divergence when volatility bounds are violated, producing NaN or infinite
      IV values that corrupt pricing calculations and risk management
    derived_from_bd_id: BD-100
  - id: finance-C-200
    when: When pricing American-style options
    action: Use Black-Scholes analytical formula — Black-Scholes cannot handle early exercise premium and systematically underprices
      American options
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Black-Scholes ignores early exercise premium, systematically underpricing deep in-the-money American puts
      by 5-10% and causing strategies to misvalue options and misallocate capital
    derived_from_bd_id: BD-100
  - id: finance-C-241
    when: When implementing multi-symbol trading strategies with indicators or rolling windows
    action: Use per-symbol state tracking (e.g., SymbolData pattern with dictionary keyed by symbol) — verify each security
      has isolated rolling window, consolidator, and historical data state
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without per-symbol state isolation, indicators will bleed data across different securities causing incorrect
      signal generation; rolling windows would contain mixed security data, producing wrong entry/exit decisions
    derived_from_bd_id: BD-007
  - id: finance-C-245
    when: When implementing trailing stop risk management for directional positions
    action: Track separate high/low watermarks per position based on direction — longs use high watermark for drawdown, shorts
      use low watermark — do NOT use unified tracking across long and short positions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unified high/low watermark tracking causes trailing stops to trigger incorrectly for one direction; long
      positions would use low watermark (wrong reference) and short positions would use high watermark (wrong reference),
      resulting in premature or delayed stop exits
    derived_from_bd_id: BD-017
  - id: finance-C-257
    when: When implementing or validating option pricing models that compute Greeks
    action: Verify that delta is within [-1, 1], rho sign matches the option right (negative for put, positive for call),
      and theta, vega, and gamma are non-negative for each computed option prices
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid Greeks bounds indicate theoretical inconsistencies in the pricing model implementation, causing option
      prices to violate fundamental financial constraints and leading to systematically incorrect hedge ratios and premium
      estimates
    derived_from_bd_id: BD-067
  - id: finance-C-277
    when: When computing Black-Litterman equilibrium returns for portfolio optimization
    action: Use equal-weighted portfolio returns as the neutral reference point (π = δΣw_eq); verify tau parameter is calibrated
      relative to this equal-weighted equilibrium and document any deviation from equal weights as a view override
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using market-cap weights or other weighting schemes as the equilibrium reference without proper justification
      causes Black-Litterman posterior returns to reflect unintended market views rather than neutral equilibrium, distorting
      portfolio optimization results
    derived_from_bd_id: BD-082
  - id: finance-C-279
    when: When normalizing weights in minimum variance portfolio optimization
    action: When using absolute weight normalization (weights sum to 1 in absolute terms), verify that long and short positions
      offset exactly — long weights must equal short weights in magnitude to verify fully invested capital base
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Absolute normalization without exact long-short offsetting creates degenerate weight solutions where gross
      exposure drifts from intended capital base, causing leverage ratios and risk metrics to diverge from expected portfolio
      behavior
    derived_from_bd_id: BD-085
  - id: finance-C-284
    when: When applying Scikit-learn linear regression to financial time series
    action: Apply linear regression only after confirming data stationarity using ADF test and linearity of relationships
      — do not use on raw price data without preprocessing
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Linear regression assumes linear relationships and stationary data; applying it to non-stationary financial
      time series produces spurious trend coefficients, causing systematic misprediction of price direction
    derived_from_bd_id: BD-098
  regular:
  - id: finance-C-003
    when: When implementing QC500 universe selection with fine fundamental data
    action: Filter securities by USA country_id, NYSE/NASDAQ exchange, 180+ days since IPO, and >$500M market cap
    severity: high
    kind: domain_rule
    modality: must
    consequence: Universe will include ineligible securities (non-USA, non-primary exchange, newly IPO'd, or low market cap),
      causing incorrect backtest results and potential strategy performance degradation
    stage_ids:
    - universe_selection
  - id: finance-C-004
    when: When implementing QC500 universe coarse selection
    action: Filter securities requiring HasFundamentalData=true, Volume > 0, and Price > 0
    severity: high
    kind: domain_rule
    modality: must
    consequence: Universe will include securities with missing data or zero volume/price, causing data access errors and potential
      division-by-zero or null reference exceptions during alpha generation
    stage_ids:
    - universe_selection
  - id: finance-C-005
    when: When implementing universe selection and no securities meet the filtering criteria
    action: Return Universe.Unchanged to skip the update without throwing an error
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Returning empty collection or null may trigger unintended security removal; returning nothing allows retry
      on next iteration without state corruption
    stage_ids:
    - universe_selection
  - id: finance-C-007
    when: When implementing FutureUniverseSelectionModel
    action: Pass a TimeSpan refreshInterval parameter to control universe refresh timing
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without a refresh interval, GetNextRefreshTimeUtc may never be updated, preventing the universe from ever
      being refreshed
    stage_ids:
    - universe_selection
  - id: finance-C-008
    when: When implementing FutureUniverseSelectionModel chain selector
    action: Return only Symbol objects with SecurityType.Future
    severity: high
    kind: resource_boundary
    modality: must
    consequence: ArgumentException will be thrown at runtime, preventing the algorithm from creating future chain universes
    stage_ids:
    - universe_selection
  - id: finance-C-009
    when: When implementing OptionUniverseSelectionModel chain selector
    action: Return only Symbol objects with option security types (equity options, index options, or futures options)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: ArgumentException will be thrown at runtime, preventing the algorithm from creating option chain universes
    stage_ids:
    - universe_selection
  - id: finance-C-010
    when: When implementing a monthly rebalancing universe like QC500
    action: Track month changes via _lastMonth and update it only after each criteria checks pass
    severity: high
    kind: operational_lesson
    modality: must
    consequence: If _lastMonth is updated before all checks complete, a new selection will be attempted on the same day before
      _dollarVolumeBySymbol is properly populated, causing inconsistent universe selections
    stage_ids:
    - universe_selection
  - id: finance-C-011
    when: When using CompositeUniverseSelectionModel
    action: Pass at least one universe selection model to the constructor
    severity: high
    kind: operational_lesson
    modality: must
    consequence: ArgumentException will be thrown at initialization, preventing the algorithm from starting
    stage_ids:
    - universe_selection
  - id: finance-C-012
    when: When implementing custom universe selection that doesn't need periodic refresh
    action: Let GetNextRefreshTimeUtc() return DateTime.MaxValue (the default) to disable automatic refresh
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Universe may be unnecessarily refreshed, causing extra computational overhead and potential position churn
      if the selection logic is called repeatedly
    stage_ids:
    - universe_selection
  - id: finance-C-013
    when: When implementing universe selection with async/asynchronous universe settings
    action: Use async universe settings with coarse and fine two-pass selection
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: ArgumentException will be thrown indicating asynchronous universe setting is not supported for coarse and
      fine selections
    stage_ids:
    - universe_selection
  - id: finance-C-015
    when: When creating universes via the framework
    action: Call UniverseSelection.CreateUniverses() during FrameworkPostInitialize, not directly from Initialize
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Universes will be created at the wrong time in the pipeline lifecycle, potentially causing securities to
      not be properly subscribed or causing null reference exceptions
    stage_ids:
    - universe_selection
  - id: finance-C-017
    when: When relying on universe selection to filter securities
    action: Claim that universe selection guarantees complete data availability for each selected securities
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Selected securities may have missing historical data due to IPO timing, delistings, or data provider gaps,
      causing indicator calculation errors or null reference exceptions during alpha generation
    stage_ids:
    - universe_selection
  - id: finance-C-018
    when: When presenting universe selection backtest results
    action: Claim that the selected universe will remain constant across live trading
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Live trading may return different securities due to data timing differences, missing fundamental data for
      some securities, or different market conditions, causing live performance to diverge from backtest
    stage_ids:
    - universe_selection
  - id: finance-C-019
    when: When setting the universe selection model
    action: Claim that universe selection runs synchronously with OnData for intraday algorithms
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Universe selection typically runs on a scheduled basis or daily, not synchronously with each data tick, so
      securities may not be added/removed mid-day even if their fundamental criteria change
    stage_ids:
    - universe_selection
  - id: finance-C-024
    when: When generating insights based on technical indicators
    action: check that indicator.IsReady is true before emitting signals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Emitting insights before indicators have accumulated sufficient data produces invalid signals based on insufficient
      samples, corrupting the alpha stream
    stage_ids:
    - alpha_generation
  - id: finance-C-026
    when: When building multi-symbol alpha models with indicators
    action: create and maintain per-symbol SymbolData instances in a Dictionary keyed by Symbol
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without per-symbol SymbolData tracking, indicator state bleeds across different securities, causing incorrect
      signal generation for multi-symbol strategies
    stage_ids:
    - alpha_generation
  - id: finance-C-027
    when: When handling security universe changes
    action: properly dispose and remove per-symbol state for removed securities
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Failure to clean up symbol-specific state on security removal causes memory leaks and stale indicator data
      that corrupts future signal generation
    stage_ids:
    - alpha_generation
  - id: finance-C-028
    when: When implementing pairs trading or stateful signal logic
    action: enforce state machine transitions to prevent re-emitting the same direction
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without state machine enforcement, the same directional signal is emitted repeatedly, causing excessive trading,
      commission waste, and portfolio construction conflicts
    stage_ids:
    - alpha_generation
  - id: finance-C-029
    when: When the alpha model receives zero-price securities
    action: skip insight generation for securities with Price equal to zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero-price securities produce invalid magnitude calculations, causing division-by-zero or infinity values
      in downstream portfolio construction
    stage_ids:
    - alpha_generation
  - id: finance-C-030
    when: When implementing custom alpha model strategy
    action: implement warmup by calling algorithm.History() to seed indicators with historical data
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without warmup, indicators start with no historical data, causing the alpha model to remain inactive until
      sufficient bars accumulate, missing early trading opportunities
    stage_ids:
    - alpha_generation
  - id: finance-C-031
    when: When adding securities to a multi-symbol alpha model
    action: check if SymbolData already exists before creating a new instance
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate SymbolData creation causes duplicate indicator registration, memory leaks, and conflicting signal
      generation from the same symbol
    stage_ids:
    - alpha_generation
  - id: finance-C-032
    when: When using the LEAN alpha framework for live trading
    action: claim that alpha insights are guaranteed predictions of market movement
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting generated insights as guaranteed predictions misleads users about the probabilistic nature of
      trading signals, leading to inappropriate risk-taking and regulatory compliance issues
    stage_ids:
    - alpha_generation
  - id: finance-C-033
    when: When backtesting alpha models
    action: present backtest results as expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results include look-ahead bias, survivorship bias, and lack of slippage/fee modeling; presenting
      them as expected live results creates false expectations and potential regulatory violations
    stage_ids:
    - alpha_generation
  - id: finance-C-034
    when: When implementing custom alpha models in Python
    action: assign a unique Name property to enable proper identification in the framework
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without an explicit Name, Python-wrapped models default to Guid.NewGuid(), making debugging and logging difficult
      and potentially causing framework identification issues
    stage_ids:
    - alpha_generation
  - id: finance-C-035
    when: When adding securities that were previously removed and re-added
    action: reset or reinitialize indicators for re-added securities
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Re-added securities retain stale indicator state from previous subscription, causing incorrect signal generation
      based on outdated historical data
    stage_ids:
    - alpha_generation
  - id: finance-C-038
    when: When implementing EqualWeighting or InsightWeighting portfolio construction
    action: Normalize target weights proportionally when sum exceeds 1.0 to maintain valid allocation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Portfolio targets summing to greater than 1 cause over-allocation beyond 100% portfolio value, resulting
      in margin calls or execution failures for orders exceeding available buying power
    stage_ids:
    - portfolio_construction
  - id: finance-C-040
    when: When configuring rebalancing behavior
    action: Set RebalanceOnSecurityChanges=true to trigger portfolio adjustment on universe changes
    severity: high
    kind: domain_rule
    modality: must
    consequence: With RebalanceOnSecurityChanges=false, universe changes leave portfolio at wrong allocation, causing unintended
      sector exposures and risk profile deviation
    stage_ids:
    - portfolio_construction
  - id: finance-C-041
    when: When configuring rebalancing behavior for dynamic insight-driven strategies
    action: Set RebalanceOnInsightChanges=true to recalculate targets when insights arrive or expire
    severity: high
    kind: domain_rule
    modality: must
    consequence: With RebalanceOnInsightChanges=false, new or expired insights do not trigger rebalancing, leaving portfolio
      aligned with stale signals and causing performance loss
    stage_ids:
    - portfolio_construction
  - id: finance-C-042
    when: When implementing PortfolioBias filtering
    action: Respect portfolio bias enum (Short=-1, LongShort=0, Long=1) to filter insight directions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-LongShort bias configurations that ignore insight direction cause incorrect long/short position sizing,
      violating portfolio strategy intent and potentially creating margin violations
    stage_ids:
    - portfolio_construction
  - id: finance-C-043
    when: When AccumulativeInsightPortfolioConstructionModel constructs targets
    action: Use Math.Abs(percent) to verify incremental sizing remains positive regardless of input sign
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Negative percent values cause position sizing to decrease unexpectedly, producing wrong directional allocations
      or position blow-up scenarios
    stage_ids:
    - portfolio_construction
  - id: finance-C-045
    when: When optimizing portfolios with numerical solvers
    action: Check for NaN/Infinity in optimizer solutions and replace with zero weights to avoid corrupted orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN weights from failed optimization produce invalid order quantities causing execution errors or complete
      portfolio construction failure
    stage_ids:
    - portfolio_construction
  - id: finance-C-046
    when: When rebalancing function returns null
    action: Set rebalancing time to null and enable immediate rebalance trigger on next loop iteration
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Improper null handling in rebalancing function causes continuous rebalancing or complete stalling of portfolio
      adjustment
    stage_ids:
    - portfolio_construction
  - id: finance-C-047
    when: When expired insights exist for symbols with no active insights
    action: Create flatten targets (quantity=0) for symbols with expired insights to close positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing flatten targets for expired insights leaves orphaned positions open, causing unintended exposure
      and PnL leakage
    stage_ids:
    - portfolio_construction
  - id: finance-C-048
    when: When BlackLitterman master formula encounters singular covariance matrix
    action: Proceed with optimization using equilibrium returns only if determinant equals zero
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Singular matrix with determinant=0 causes matrix inverse to fail, returning no optimal weights and degrading
      portfolio to uniform allocation
    stage_ids:
    - portfolio_construction
  - id: finance-C-049
    when: When using Python portfolio construction models from C#
    action: Set PythonWrapper to enable correct method resolution for overridden Python methods
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without PythonWrapper set, PythonNet cannot resolve overridden methods in Python, causing C# base class implementations
      to execute instead of Python overrides
    stage_ids:
    - portfolio_construction
  - id: finance-C-050
    when: When subclassing PortfolioConstructionModel for custom weighting
    action: Call FilterInvalidInsightMagnitude before computing target percentages to prevent extreme positions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unfiltered extreme insight magnitudes produce oversized position targets that violate algorithm risk settings,
      potentially causing margin calls or catastrophic losses
    stage_ids:
    - portfolio_construction
  - id: finance-C-051
    when: When portfolio construction model computes weights from expired or removed securities
    action: Remove symbols from internal data structures when securities are removed from universe
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Stale symbol data from removed securities causes KeyNotFoundException or incorrect weight calculations for
      securities no longer tradeable
    stage_ids:
    - portfolio_construction
  - id: finance-C-053
    when: When creating portfolio targets for minimum order margin filtering
    action: Use MinimumOrderMarginPortfolioPercentage setting to filter out economically insignificant positions
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Tiny positions below minimum order margin generate excessive small orders, increasing transaction costs and
      creating operational noise without meaningful portfolio impact
    stage_ids:
    - portfolio_construction
  - id: finance-C-054
    when: When running optimization-based portfolio construction models
    action: Verify optimizer fallback to equal-weight allocation when optimization fails
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Failed optimization without fallback returns uniform allocation vector (1/N), preventing complete portfolio
      construction failure during market stress or numerical instability
    stage_ids:
    - portfolio_construction
  - id: finance-C-055
    when: When using InsightWeighting or ConfidenceWeighted models
    action: Provide insights with valid Weight/Confidence values since null values are silently ignored
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Insights with null Weight/Confidence produce zero targets, causing positions to be silently skipped and portfolio
      allocation to be incomplete
    stage_ids:
    - portfolio_construction
  - id: finance-C-056
    when: When optimizing with covariance matrices
    action: Verify historical return matrix has sufficient samples for reliable covariance estimation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient historical samples produce ill-conditioned covariance matrices, causing numerical instability
      in optimization and unreliable portfolio weights
    stage_ids:
    - portfolio_construction
  - id: finance-C-057
    when: When creating custom portfolio construction models inheriting from EqualWeightingPortfolioConstructionModel
    action: Override RespectPortfolioBias() method to properly filter insights by direction when using Long or Short bias
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inherited models without proper RespectPortfolioBias implementation violate portfolio bias constraints, creating
      unintended long or short positions
    stage_ids:
    - portfolio_construction
  - id: finance-C-058
    when: When handling timestamps in portfolio construction
    action: Convert security exchange timestamps to UTC before storing or comparing with algorithm.UtcTime
    severity: high
    kind: domain_rule
    modality: must
    consequence: Local timezone timestamps compared with UTC times cause incorrect insight validity checks and stale/future
      insight inclusion in portfolio targets
    stage_ids:
    - portfolio_construction
  - id: finance-C-059
    when: When backtesting portfolio construction models
    action: Claim that backtest returns equal expected live trading returns due to slippage and execution differences
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as guaranteed live trading performance misleads users about expected returns,
      violating financial disclosure standards and causing regulatory/compliance issues
    stage_ids:
    - portfolio_construction
  - id: finance-C-060
    when: When presenting portfolio construction results
    action: Present simulated backtest portfolio allocation as proof of real execution capability
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Simulated portfolio targets from backtesting do not constitute proof of live trading system capability, as
      actual execution depends on market conditions and broker connectivity
    stage_ids:
    - portfolio_construction
  - id: finance-C-061
    when: When AccumulativeInsightPortfolioConstructionModel calculates position sizing
    action: Clamp position target to zero when adding/subtracting percent would cross the zero boundary
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without proper zero-boundary clamping, incremental position sizing can produce tiny incorrect directional
      positions near zero, causing unnecessary small trades
    stage_ids:
    - portfolio_construction
  - id: finance-C-062
    when: When selecting last active insight per symbol
    action: Order by GeneratedTimeUtc and take the last insight for each symbol to verify most recent prediction drives allocation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper temporal ordering, stale insights may override recent predictions, causing portfolio to follow
      outdated signals
    stage_ids:
    - portfolio_construction
  - id: finance-C-067
    when: When implementing risk management liquidation logic
    action: cancel active insights for the symbol being liquidated to prevent new position entries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without insight cancellation, alpha generation could immediately re-enter positions in symbols that risk
      management just liquidated, defeating the risk control
    stage_ids:
    - risk_management
  - id: finance-C-068
    when: When implementing risk management position state tracking
    action: reset trailing state when position direction changes from long to short or vice versa
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using stale trailing state from a previous position direction would calculate drawdown incorrectly, potentially
      triggering premature liquidation or missing real drawdown
    stage_ids:
    - risk_management
  - id: finance-C-069
    when: When implementing risk management security iteration
    action: skip non-invested securities and remove their trailing state entries
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Iterating over non-invested securities without cleanup would accumulate stale state entries, causing memory
      leaks and incorrect calculations when securities are re-traded
    stage_ids:
    - risk_management
  - id: finance-C-070
    when: When implementing IRiskManagementModel derivative classes
    action: override the ManageRisk method or throw NotImplementedException if left abstract
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: A risk management model that doesn't override ManageRisk will throw NotImplementedException at runtime, stopping
      the algorithm framework pipeline
    stage_ids:
    - risk_management
  - id: finance-C-071
    when: When configuring TrailingStopRiskManagementModel default threshold
    action: use the conservative default of 5% (0.05m) maximum drawdown for most strategies
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Using too loose a threshold (e.g., 20%) would allow significant drawdowns before risk controls trigger, potentially
      exceeding account risk tolerance
    stage_ids:
    - risk_management
  - id: finance-C-072
    when: When composing multiple risk management models
    action: use CompositeRiskManagementModel to chain multiple IRiskManagementModel implementations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Directly replacing a single risk model with multiple models would break the framework contract, causing only
      one model to be called
    stage_ids:
    - risk_management
  - id: finance-C-073
    when: When implementing risk management for sectors
    action: require fundamental data from universe selection for sector classification
    severity: high
    kind: resource_boundary
    modality: must
    consequence: MaximumSectorExposureRiskManagementModel without fundamental data cannot determine sector assignments, causing
      exceptions during risk management
    stage_ids:
    - risk_management
  - id: finance-C-074
    when: When using risk management in backtesting
    action: claim that backtest risk limits will exactly match live trading execution prices
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest risk limits execute at simulated prices without slippage, but live trading may experience significant
      slippage during rapid market moves, causing actual losses to exceed backtested limits
    stage_ids:
    - risk_management
  - id: finance-C-075
    when: When evaluating MaximumDrawdownPercentPortfolio with isTrailing=true
    action: update the portfolio high water mark only when current value exceeds it
    severity: high
    kind: domain_rule
    modality: must
    consequence: If the portfolio high is updated unconditionally, the trailing drawdown would be calculated from an incorrect
      baseline, causing premature or delayed liquidations
    stage_ids:
    - risk_management
  - id: finance-C-077
    when: When implementing MaximumUnrealizedProfitPercentPerSecurity
    action: liquidate when unrealized profit exceeds the threshold to protect gains
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without profit-taking logic, paper gains could evaporate during reversals, turning profitable positions into
      losses
    stage_ids:
    - risk_management
  - id: finance-C-080
    when: When submitting market orders
    action: pass the Asynchronous flag from ExecutionModel base class to algorithm.MarketOrder() calls
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Orders execute synchronously when asynchronous mode is expected, causing backtest to stall and throughput
      to degrade significantly
    stage_ids:
    - execution
  - id: finance-C-082
    when: When calculating order quantities
    action: adjust quantities by calling OrderSizing.AdjustByLotSize to respect security lot size requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Orders rejected by exchange due to quantity not matching required lot size increments, causing position targets
      to never be reached
    stage_ids:
    - execution
  - id: finance-C-083
    when: When implementing SpreadExecutionModel
    action: use minute or higher resolution (not Daily) since Exchange.ExchangeOpen check fails at Daily resolution
    severity: high
    kind: resource_boundary
    modality: must
    consequence: SpreadExecutionModel never executes orders at Daily resolution because ExchangeOpen is always false, causing
      strategy to fail silently
    stage_ids:
    - execution
  - id: finance-C-084
    when: When managing symbol data in execution models
    action: check _symbolData dictionary for symbol existence before accessing, skipping missing symbols
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: KeyNotFoundException thrown for newly added symbols that have not yet had their SymbolData created in OnSecuritiesChanged
    stage_ids:
    - execution
  - id: finance-C-085
    when: When removing securities from execution model
    action: verify symbol is not a universe member via IsSafeToRemove before removing SymbolData and deregistering consolidator
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Premature removal of SymbolData causes KeyNotFoundException when universe member signals trigger execution
      after removal
    stage_ids:
    - execution
  - id: finance-C-086
    when: When implementing StandardDeviationExecutionModel
    action: check STD.IsReady before evaluating PriceIsFavorable to prevent execution on uninitialized indicators
    severity: high
    kind: domain_rule
    modality: must
    consequence: Orders execute based on zero/uninitialized STD values during warmup period, causing incorrect price deviation
      comparisons
    stage_ids:
    - execution
  - id: finance-C-087
    when: When validating spread execution conditions
    action: check that Price, AskPrice, and BidPrice are each greater than zero before calculating spread percentage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero or negative prices cause division errors or false spread comparisons, leading to incorrect order execution
      decisions
    stage_ids:
    - execution
  - id: finance-C-088
    when: When presenting execution model backtest results
    action: claim that simulated execution fill prices and timing equal actual live trading performance
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtest assumes instant fills at bid/ask midpoints with no slippage, market impact, or partial fills, overstating
      expected live returns
    stage_ids:
    - execution
  - id: finance-C-089
    when: When warmup period is insufficient for indicator period
    action: skip warmup or use insufficient history count for STD/SMA indicators
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: STD and SMA indicators produce unreliable values before IsReady, causing execution to trigger on noise rather
      than validated statistical signals
    stage_ids:
    - execution
  - id: finance-C-090
    when: When calculating order value for non-USD portfolios
    action: apply quote currency conversion rate and contract multiplier to price before computing maximum order size
    severity: high
    kind: domain_rule
    modality: must
    consequence: MaximumOrderValue limit applies to wrong currency, allowing orders far exceeding intended dollar limit in
      multi-currency accounts
    stage_ids:
    - execution
  - id: finance-C-091
    when: When computing VWAP for intraday execution
    action: reset volume and price-time sums on daily boundaries to maintain intraday VWAP accuracy
    severity: high
    kind: domain_rule
    modality: must
    consequence: VWAP accumulates across multiple days, causing stale volume-weighted averages to distort price comparisons
      and trigger incorrect execution signals
    stage_ids:
    - execution
  - id: finance-C-092
    when: When combining execution models with other framework modules
    action: embed risk control logic or place orders directly in alpha/portfolio models
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Violates separation of concerns, causing duplicate risk checks or inconsistent order sizing across different
      execution paths
    stage_ids:
    - execution
  - id: finance-C-093
    when: When building execution models for Python algorithms
    action: include both execute and on_securities_changed methods in Python execution model implementations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing on_securities_changed causes symbol data to never be initialized, resulting in no orders being submitted
    stage_ids:
    - execution
  - id: finance-C-094
    when: When using fill-forward data in VWAP calculations
    action: exclude bars with IsFillForward=true from VWAP volume and price accumulation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fill-forward bars artificially inflate VWAP volume with synthetic prices, causing PriceIsFavorable to evaluate
      stale or interpolated data
    stage_ids:
    - execution
  - id: finance-C-095
    when: When implementing VolumeShareSlippageModel.get_slippage_approximation
    action: Use quadratic volume_share calculation with volume_limit cap
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without quadratic relationship and volume limit cap, slippage estimates become unbounded for large orders,
      causing backtest results to significantly underestimate trading costs and overestimate strategy profitability
    stage_ids:
    - order_lifecycle
  - id: finance-C-096
    when: When calculating slippage for Forex, CFD, or Crypto securities
    action: Return zero slippage with error logging
    severity: high
    kind: domain_rule
    modality: must
    consequence: Continuous market securities (Forex/CFD/Crypto) lack volume bars, causing slippage model to produce invalid
      results or throw exceptions if volume-based calculation is attempted
    stage_ids:
    - order_lifecycle
  - id: finance-C-097
    when: When implementing a custom slippage model
    action: Implement ISlippageModel interface with GetSlippageApproximation method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Custom slippage model will not be recognized by the order processing system, causing the default NullSlippageModel
      to be used and slippage to be incorrectly estimated as zero
    stage_ids:
    - order_lifecycle
  - id: finance-C-098
    when: When implementing a custom fee model
    action: Extend FeeModel base class and override GetOrderFee method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper fee calculation override, the base FeeModel returns zero fees, causing algorithm to underestimate
      transaction costs and show inflated profits in backtests
    stage_ids:
    - order_lifecycle
  - id: finance-C-100
    when: When creating option strategy orders
    action: Use OptionStrategies helper class to batch multiple legs
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Submitting individual leg orders separately bypasses OptionStrategyPositionGroupBuyingPowerModel, resulting
      in incorrect margin calculations and potential margin calls or rejected orders
    stage_ids:
    - order_lifecycle
  - id: finance-C-101
    when: When verifying order completion status
    action: Check OrderStatus transitions through valid lifecycle states
    severity: high
    kind: domain_rule
    modality: must
    consequence: Order may remain in intermediate state (New/Submitted/PartiallyFilled) indefinitely, causing algorithm logic
      errors and position tracking inconsistencies
    stage_ids:
    - order_lifecycle
  - id: finance-C-102
    when: When using VolumeShareSlippageModel with volume data
    action: Allow bar_volume to be zero or negative without capping slippage
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Zero or negative volume causes division errors or infinite slippage estimates, corrupting order fill calculations
    stage_ids:
    - order_lifecycle
  - id: finance-C-103
    when: When calculating initial margin for orders
    action: Include fees in total margin requirement via GetInitialMarginRequiredForOrder
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fees not included in margin calculation may cause account to fall below minimum margin requirement, triggering
      margin calls or forced liquidation
    stage_ids:
    - order_lifecycle
  - id: finance-C-104
    when: When processing market data types for slippage
    action: Use VolumeShareSlippageModel with non-tradebar/non-quotebar data
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: InvalidOperationException is thrown when market data type is not TRADE_BAR or QUOTE_BAR, halting order processing
    stage_ids:
    - order_lifecycle
  - id: finance-C-105
    when: When backtesting with VolumeShareSlippageModel
    action: Claim backtest slippage results represent live trading execution
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtest slippage models use historical bar volume which differs from real-time order book dynamics, causing
      live trading costs to significantly exceed backtest estimates
    stage_ids:
    - order_lifecycle
  - id: finance-C-106
    when: When using MarketImpactSlippageModel
    action: Use default latency and impact parameters without recalibration
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Default parameters calibrated in 2005 market conditions underestimate modern high-frequency trading impact,
      causing live execution costs to exceed backtest estimates
    stage_ids:
    - order_lifecycle
  - id: finance-C-107
    when: When implementing option strategy buying power model
    action: Use OptionStrategyPositionGroupBuyingPowerModel for multi-leg positions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Individual leg margin models understate required margin for spreads, potentially allowing over-leveraged
      positions that trigger margin calls
    stage_ids:
    - order_lifecycle
  - id: finance-C-108
    when: When setting volume_limit in VolumeShareSlippageModel
    action: Set volume_limit to values outside 0.0 to 1.0 range
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: volume_limit > 1.0 causes min() function to always return the order volume, creating unrealistic slippage
      estimates; volume_limit < 0 causes invalid negative values
    stage_ids:
    - order_lifecycle
  - id: finance-C-109
    when: When evaluating order fill status
    action: Use OrderExtensions.IsFill() for partial and full fill checks
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Manual equality checks against OrderStatus may miss edge cases or become inconsistent with framework updates,
      causing fill events to be ignored
    stage_ids:
    - order_lifecycle
  - id: finance-C-110
    when: When calculating slippage for option strategies
    action: Apply individual leg slippage instead of strategy-level calculation
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Per-leg slippage ignores correlation effects and creates inconsistent market impact estimates across related
      option positions
    stage_ids:
    - order_lifecycle
  - id: finance-C-112
    when: When calculating order fees
    action: Return fees in account currency via OrderFee.Value.Amount
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fee returned in non-account currency causes portfolio cash balance discrepancies and incorrect PnL calculations
    stage_ids:
    - order_lifecycle
  - id: finance-C-113
    when: When submitting combo market orders
    action: Pass GroupOrderManager to associate multiple legs
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without GroupOrderManager, combo legs are processed as independent orders, causing partial fills and position
      inconsistencies
    stage_ids:
    - order_lifecycle
  - id: finance-C-114
    when: When filling orders with stale price data
    action: Log warning when fill occurs with outdated market data
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without stale price warnings, algorithm may not recognize data quality issues causing fills at unrealistic
      prices
    stage_ids:
    - order_lifecycle
  - id: finance-C-115
    when: When running backtest order lifecycle simulation
    action: Claim backtest order fills are guaranteed in live trading
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtest fills assume immediate execution at model prices, while live trading faces order rejection, partial
      fills, slippage variation, and brokerage limitations
    stage_ids:
    - order_lifecycle
  - id: finance-C-116
    when: When handling option exercise orders
    action: Process OptionExerciseOrder type through specialized exercise handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Exercise orders have unique settlement rules and timing that differ from regular trades, requiring special
      OrderType.OptionExercise handling
    stage_ids:
    - order_lifecycle
  - id: finance-C-117
    when: When using quote bars for fill estimation
    action: Use specified bid/ask size based on order direction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using wrong quote side causes volume share calculation to be inverted, underestimating buy orders and overestimating
      sell orders
    stage_ids:
    - order_lifecycle
  - id: finance-C-121
    when: When invoking OnFrameworkData in the main execution loop
    action: Call OnFrameworkData on every time step even when slice has no data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Universe selection models fail to function properly on day boundaries without data, preventing proper universe
      refresh and symbol updates
    stage_ids:
    - algorithm_manager
  - id: finance-C-122
    when: When processing margin calls in backtest mode
    action: Check for margin calls at least every 5 minutes to prevent cascade margin failures
    severity: high
    kind: domain_rule
    modality: must
    consequence: Algorithm accumulates excessive margin debt between checks, causing forced liquidation at unfavorable prices
      and potential account liquidation
    stage_ids:
    - algorithm_manager
  - id: finance-C-123
    when: When processing consolidator updates during time step
    action: Scan consolidators for completed bars immediately after pumping each data points through each consolidator
    severity: high
    kind: domain_rule
    modality: must
    consequence: Consolidated bars remain incomplete until next data point arrives, causing indicators and OnData handlers
      to receive stale bar data with missing final tick
    stage_ids:
    - algorithm_manager
  - id: finance-C-124
    when: When invoking ProcessSynchronousEvents for transaction handling
    action: Call transactions.ProcessSynchronousEvents before OnData and again after OnData to simulate immediate fill for
      market orders
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Market orders placed by algorithm in same time step fail to fill, causing position discrepancies between
      expected and actual portfolio state
    stage_ids:
    - algorithm_manager
  - id: finance-C-125
    when: When streaming time slices in backtest warmup mode
    action: Use algorithm.StartDate as warmup end boundary in backtest mode
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Historical indicator warmup uses wrong time reference, causing indicators to be considered warm before sufficient
      historical data has been processed
    stage_ids:
    - algorithm_manager
  - id: finance-C-126
    when: When streaming time slices in live warmup mode
    action: Use DateTime.UtcNow as warmup end boundary in live mode to catch up to real time
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Live algorithm never exits warmup state, preventing trading and causing missed opportunities while waiting
      for non-existent historical start date
    stage_ids:
    - algorithm_manager
  - id: finance-C-127
    when: When processing SecurityChanges for user algorithm callbacks
    action: Filter custom and internal securities from SecurityChanges passed to user algorithm callbacks
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: User algorithms receive internal security universe changes they cannot trade, causing confusion and potential
      errors when attempting to add internal symbols
    stage_ids:
    - algorithm_manager
  - id: finance-C-128
    when: When handling time pulses in the execution loop
    action: Shortcut the loop and continue when IsTimePulse is true without executing OnData
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Time pulses without data trigger unnecessary user callbacks, degrading algorithm performance and causing
      spurious OnData invocations
    stage_ids:
    - algorithm_manager
  - id: finance-C-129
    when: When creating AlgorithmTimeLimitManager for loop execution
    action: Configure time loop maximum from algorithm-manager-time-loop-maximum config (default 20 minutes)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Algorithm time loop exceeds reasonable limits, triggering Isolator to terminate algorithm, losing all backtest
      progress
    stage_ids:
    - algorithm_manager
  - id: finance-C-130
    when: When using transaction handler as replaceable execution component
    action: Inject ITransactionHandler implementation via constructor to enable custom order processing
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Algorithm cannot use custom transaction models for order simulation, limiting ability to test specific execution
      scenarios
    stage_ids:
    - algorithm_manager
  - id: finance-C-131
    when: When accessing performance metrics per pipeline stage
    action: Track performance via PerformanceTrackingTool using PerformanceTarget enum values
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without per-stage performance tracking, bottlenecks in specific framework stages remain undetected, degrading
      overall algorithm efficiency
    stage_ids:
    - algorithm_manager
  - id: finance-C-132
    when: When scanning past events in realtime handler
    action: Call realtime.ScanPastEvents to fire scheduled events that missed firing during market closed hours
    severity: high
    kind: domain_rule
    modality: must
    consequence: Scheduled events configured to run when markets are closed never fire, breaking event-driven logic that depends
      on time-based scheduling
    stage_ids:
    - algorithm_manager
  - id: finance-C-133
    when: When invoking user OnData callback
    action: Only call OnData when slice has actual data (HasData is true)
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Empty OnData calls cause unnecessary user code execution and potential errors when processing non-existent
      data
    stage_ids:
    - algorithm_manager
  - id: finance-C-134
    when: When initializing PerformanceTrackingTool
    action: Enable sampling only when PerformanceSamplePeriod is greater than zero
    severity: low
    kind: resource_boundary
    modality: must
    consequence: Performance tracking overhead impacts algorithm execution speed even when sampling is disabled by user configuration
    stage_ids:
    - algorithm_manager
  - id: finance-C-137
    when: When configuring live mode warmup
    action: Process volatility model history requirements before exiting warmup in live mode
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Volatility models lack historical data context on first live trades, causing incorrect margin calculations
      and position sizing
    stage_ids:
    - algorithm_manager
  - id: finance-C-138
    when: When registering custom data event handlers
    action: Verify method invoker exists before invoking custom data callback to prevent null reference
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attempting to invoke non-existent OnData handler causes runtime exception, stopping algorithm execution
    stage_ids:
    - algorithm_manager
  - id: finance-C-139
    when: When handling runtime errors in algorithm callbacks
    action: Catch exceptions and call SetRuntimeError to gracefully stop algorithm
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Uncaught exceptions in user callbacks cause unhandled exceptions that corrupt backtest state and may crash
      the entire engine
    stage_ids:
    - algorithm_manager
  - id: finance-C-140
    when: When scheduling daily sampling event
    action: Schedule daily sampling event at midnight to capture end-of-day portfolio state
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Daily portfolio statistics miss the final end-of-day snapshot, causing incomplete performance metrics and
      incorrect equity curve
    stage_ids:
    - algorithm_manager
  - id: finance-C-141
    when: When applying security price updates
    action: Update security prices before invoking user callbacks to verify indicators see current market data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Indicators and OnData handlers operate on stale security prices, causing delayed signal generation and incorrect
      trading decisions
    stage_ids:
    - algorithm_manager
  - id: finance-C-143
    when: When SecurityChanges flow from universe_selection to alpha_generation
    action: Filter out securities not in current Slice data before passing to Alpha.OnSecuritiesChanged
    severity: high
    kind: domain_rule
    modality: must
    consequence: Alpha model receives SecurityChanges for securities without available price data, causing indicator calculations
      to fail or produce NaN values
  - id: finance-C-144
    when: When IPortfolioTarget[] flows from portfolio_construction to risk_management
    action: Include each active insights in CreateTargets even if their weight is zero or undefined
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Portfolio construction produces inconsistent target sets when insights with zero weight are excluded, causing
      risk management to receive incomplete position data
  - id: finance-C-145
    when: When IPortfolioTarget[] flows from portfolio_construction to execution (bypassing risk_management)
    action: Skip risk management evaluation for securities not present in risk-adjusted targets
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Risk management is bypassed for securities with unchanged targets, leaving positions exposed to risk limits
      that should have been enforced
  - id: finance-C-147
    when: When Order requests flow from execution to order_lifecycle
    action: Assign unique OrderId and set Order.Time to algorithm.UtcTime before submission
    severity: high
    kind: domain_rule
    modality: must
    consequence: Orders without proper timestamps or IDs cause transaction handler to reject or misattribute order events,
      breaking portfolio position tracking
  - id: finance-C-149
    when: When Slice data flows from algorithm_manager to universe_selection
    action: Pass Slice with Time property set to the current algorithm time step before universe selection runs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Universe selection receives stale or misaligned Slice timestamps, causing securities to be added or removed
      at incorrect market times
  - id: finance-C-150
    when: When SecurityChanges flow from algorithm_manager to alpha_generation
    action: Create filtered SecurityChanges with FilterCustomSecurities=true for user-facing OnSecuritiesChanged callbacks
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Alpha model receives custom securities in SecurityChanges that should have been filtered, causing unexpected
      behavior with non-standard data types
  - id: finance-C-152
    when: When PortfolioConstruction creates IPortfolioTarget from expired Insights
    action: Create portfolio targets for Insights where IsActive(algorithm.UtcTime) returns false
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Portfolio construction generates targets for expired insights, causing execution to maintain positions that
      should have been closed
  - id: finance-C-153
    when: When executing orders with market data delay
    action: Claim real-time execution capability when using polling-based data feeds with inherent delay
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: System misrepresents execution latency characteristics, causing users to expect performance that cannot be
      delivered by the underlying data feed architecture
  - id: finance-C-154
    when: When risk management evaluates portfolio targets during market open
    action: Check security.Exchange.ExchangeOpen before issuing liquidation orders to avoid rejected market orders
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Risk management issues market orders when exchange is closed, causing order rejections and failed liquidation
      during market hours transitions
  - id: finance-C-155
    when: When IPortfolioTarget.Quantity is used for order sizing calculations
    action: Convert target Quantity to integer lot multiples using security.SymbolProperties.LotSize before submitting orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Order sizing ignores lot size constraints, causing fractional share orders that are rejected by brokerages
      requiring whole lot execution
  - id: finance-C-156
    when: When processing margin calls from order_lifecycle to algorithm_manager
    action: Execute margin call orders only after confirming Exchange.ExchangeOpen for affected securities
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Margin calls execute during market closure, producing prices outside normal trading ranges and causing unnecessary
      losses
  - id: finance-C-157
    when: When insights with decimal Magnitude are generated
    action: Use decimal precision for reference value and magnitude to avoid floating-point rounding errors in financial calculations
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Portfolio targets computed from double-precision insights accumulate rounding errors over many trades, causing
      actual position sizes to diverge from intended targets
  - id: finance-C-158
    when: When Slice data contains multiple timezone securities
    action: Normalize each price data timestamps to UTC using algorithm.UtcTime before passing to framework models
    severity: high
    kind: domain_rule
    modality: must
    consequence: Multi-timezone portfolio construction receives inconsistent timestamps, causing position rebalancing at wrong
      market times for international securities
  - id: finance-C-159
    when: When backtest results are compared to live trading performance
    action: Claim that backtest returns accurately predict live trading returns without accounting for slippage, fees, and
      execution latency
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users receive misleading performance expectations when backtest results are presented as expected live trading
      returns, leading to insufficient risk management
  - id: finance-C-160
    when: When processing symbol changes during slice delivery
    action: Cancel each open orders for symbols before applying symbol changes to avoid order routing to non-existent symbols
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Orders remain pending for renamed symbols, causing fills on deprecated symbols and failed order updates that
      corrupt portfolio state
  - id: finance-C-161
    when: When security additions/removals are propagated through the framework
    action: Propagate SecurityChanges to each framework models (Alpha, PortfolioConstruction, Execution, RiskManagement) in
      the same time step
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Framework models receive inconsistent security universe states, causing alpha models to generate signals
      for securities no longer in the universe
  - id: finance-C-162
    when: When implementing a framework module (AlphaModel, PortfolioConstructionModel, ExecutionModel, or RiskManagementModel)
    action: Implement the OnSecuritiesChanged(QCAlgorithm, SecurityChanges) method inherited from INotifiedSecurityChanges
      interface
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The framework will fail to properly manage security lifecycle events, causing missing data initialization
      for newly added securities and memory leaks for removed securities
  - id: finance-C-163
    when: When generating insights in any AlphaModel implementation
    action: Skip generating insights for canonical futures and options symbols (symbol.IsCanonical() returns true) as they
      are non-tradable
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Algorithms will attempt to trade non-tradable canonical symbols, causing order failures and incorrect portfolio
      construction model behavior
  - id: finance-C-164
    when: When storing per-symbol state in framework modules
    action: Use per-symbol dictionaries (e.g., Dictionary<Symbol, SymbolData>) to isolate state and prevent cross-symbol data
      leakage
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Per-symbol state contamination causes incorrect indicator values and trading signals based on other symbols'
      historical data
  - id: finance-C-165
    when: When passing datetime to rebalancing functions or accessing algorithm time in framework modules
    action: Use UTC datetime consistently — rebalancingFunc receives UTC DateTime and algorithm.UtcTime returns UTC
    severity: high
    kind: domain_rule
    modality: must
    consequence: Rebalancing events fire at incorrect times causing portfolio drift and missed rebalance opportunities when
      timezone conversions are inconsistent
  - id: finance-C-166
    when: When creating portfolio targets in any PortfolioConstructionModel implementation
    action: Express portfolio targets as decimal percentages where 0.25 represents 25% of portfolio equity
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Portfolio targets will be misinterpreted causing massive over/under-allocation relative to intended position
      sizes
  - id: finance-C-167
    when: When implementing a rebalancing function that returns DateTime?
    action: Return null to indicate 'do not rebalance this period' — the caller handles null by skipping rebalancing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Rebalancing function returning null without proper handling causes null reference exceptions in the framework
      loop
  - id: finance-C-168
    when: When validating insight magnitude in portfolio construction models
    action: Filter out insights where absolute magnitude exceeds MaxAbsolutePortfolioTargetPercentage or falls below MinAbsolutePortfolioTargetPercentage
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Extreme insight magnitudes cause unrealistic portfolio allocations that cannot be properly risk-managed and
      may exceed available capital
  - id: finance-C-169
    when: When tracking position direction in pairs trading or spread trading strategies
    action: Track PositionSide (Long/Short) separately from order direction — use security.Holdings.IsLong to determine current
      position side
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect position tracking causes trailing stop to fire in wrong direction and liquidate positions incorrectly
      during pairs trading
  - id: finance-C-170
    when: When using PortfolioBias in portfolio construction models
    action: Respect the PortfolioBias enum value (Long, Short, LongShort) to constrain target generation — LongOnly must not
      generate short targets, ShortOnly must not generate long targets
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: PortfolioBias constraint violation causes directional bets opposite to intended strategy, leading to losses
      in directional strategies
  - id: finance-C-172
    when: When backtesting algorithms with options or futures strategies
    action: Generate insights for canonical futures/options symbols — these symbols represent the entire contract chain and
      are not directly tradeable
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Algorithms fail to execute with 'non-tradable security' errors when attempting to trade canonical symbols
  - id: finance-C-173
    when: When setting IAlgorithmSettings.MinAbsolutePortfolioTargetPercentage
    action: Set to a positive decimal value greater than zero to filter out noise insights — default is 0.0000000001m
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Extremely small or zero minimum percentage allows micro-position sizing that triggers excessive transaction
      costs and order execution failures
  - id: finance-C-174
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live returns — backtesting ignores market impact, financing costs,
      and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-175
    when: When presenting paper trading or dry-run results as system performance
    action: Present simulated wallet/dry-run results as proof of live execution capability — simulated results use idealized
      fills and ignore network latency
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users invest real capital based on paper trading performance claims, leading to losses when actual execution
      differs from simulation due to latency, slippage, or liquidity constraints
  - id: finance-C-176
    when: When describing the system's capability for high-frequency trading
    action: Claim ultra-low latency execution support — LEAN is an event-driven backtesting framework with polling-based data
      feed architecture that does not provide HFT-grade latency guarantees
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy HFT strategies expecting quant finance latency levels (microseconds) when the framework operates
      at millisecond granularity, causing systematic losses in latency-sensitive strategies
  - id: finance-C-177
    when: When marketing the system for discretionary trading use cases
    action: Claim the system supports manual discretionary trading — LEAN is an algorithmic trading platform requiring systematic
      rule-based strategies
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users attempt to use the platform for manual order placement expecting framework features like portfolio
      construction and risk management, leading to workflow mismatches and support escalations
  - id: finance-C-178
    when: When applying the system to financial prediction problems without systematic rules
    action: Claim the system provides validated predictive signals for fundamental analysis — LEAN requires systematic rule-based
      entry/exit conditions with backtest validation
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users implement unvalidated fundamental screens expecting the framework to provide prediction confidence,
      causing allocation decisions based on unverified signals
  - id: finance-C-179
    when: When using the system for non-financial time series prediction
    action: Claim the system provides production-grade ML forecasting for non-financial domains — LEAN's data models (OHLCV,
      fundamental data) are financial-domain specific
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy the platform for general ML forecasting workloads with inappropriate financial data conventions,
      producing meaningless predictions due to domain mismatch
  - id: finance-C-180
    when: When deploying the system for real-time market making
    action: Claim the system supports live market making without prior backtesting validation — market making requires precise
      order book modeling and inventory risk management
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy market making strategies without backtest validation, leading to adverse selection losses and
      inventory blowups due to unmodeled bid-ask spreads
  - id: finance-C-181
    when: When using daily-resolution coarse universe selection
    action: Account for the daily coarse data emission timing — coarse fine function receives prices from the previous trading
      day, not the current day
    severity: high
    kind: domain_rule
    modality: must
    consequence: Universe selection logic uses stale price data causing incorrect security filtering and unintended universe
      composition changes
  - id: finance-C-182
    when: When contributing new framework modules to LEAN
    action: Include logging, debugging, or charting code in framework modules — production framework code must remain silent
      except for fatal exceptions
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Framework modules consuming excessive resources through logging/charting degrade algorithm performance and
      violate community expectations of silent modules
  - id: finance-C-183
    when: When handling securities across timezone boundaries in daily resolution
    action: Properly convert between DataTimeZone and ExchangeTimeZone — US equities data uses Eastern time while futures
      may use exchange-specific timezones
    severity: high
    kind: domain_rule
    modality: must
    consequence: Daily bars from different timezone exchanges get misaligned causing incorrect price data alignment and wrong
      trade signals
  - id: finance-C-184
    when: When migrating universe selection code to use FundamentalUniverseSelectionModel
    action: Use deprecated SelectCoarse/SelectFine methods — these are marked [Obsolete] and will be removed; use unified
      Select() method instead for single-pass selection efficiency
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Using deprecated SelectCoarse/SelectFine methods causes maintenance issues and may break in future framework
      versions; deprecated methods indicate migration path completion requirement
    derived_from_bd_id: BD-001
  - id: finance-C-185
    when: When implementing rate-of-change momentum calculations in energy trading strategies
    action: Use exactly 5-period lookback for rate-of-change calculation as specified for short-term momentum identification
      without excessive lag
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the lookback period from 5 to a different value alters momentum signal responsiveness and lag characteristics,
      causing strategy behavior to diverge from original design specifications for energy price movements
    derived_from_bd_id: BD-035
  - id: finance-C-186
    when: When implementing correlation pair updates in energy correlation strategies
    action: Update correlation pairs every 30 days to balance responsiveness to changing correlations against transaction
      costs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the correlation update frequency alters regime awareness and transaction cost balance, causing strategy
      to either incur excessive turnover or lose regime responsiveness
    derived_from_bd_id: BD-036
  - id: finance-C-187
    when: When implementing order submission logic in backtesting
    action: Verify the async_mode setting matches the intended execution behavior — async=true improves throughput but may
      cause timing inconsistencies in fill simulation; use synchronous mode when precise order-level timing matters
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using async mode when precise fill timing is required causes order-level timing inconsistencies between backtest
      and live execution, making backtest results unreliable for strategies dependent on fill order
    derived_from_bd_id: BD-013
  - id: finance-C-188
    when: When implementing maximum Sharpe Ratio portfolio optimization
    action: Assume SLSQP provides global optimization — SLSQP is a local optimizer that finds the nearest optimum from the
      starting point; convergence to global optimum is not guaranteed and depends critically on starting point quality
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Treating SLSQP as a global optimizer causes suboptimal portfolio weights when the starting point is not near
      the global optimum, leading to lower risk-adjusted returns than theoretically achievable
    derived_from_bd_id: BD-083
  - id: finance-C-189
    when: When configuring portfolio construction with FilterInvalidInsightMagnitude
    action: Verify that min/max insight magnitude bounds in algorithm settings match intended position size limits — improper
      bounds may allow runaway leverage or negligible positions that destabilize backtesting or live execution
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Unbounded or improperly configured insight magnitude limits allow extreme positions that either create leverage
      explosions or produce negligible allocations, corrupting portfolio construction results
    derived_from_bd_id: BD-012
  - id: finance-C-190
    when: When configuring TrailingStopRiskManagementModel for portfolio risk management
    action: Verify that maximum_drawdown_percent=0.05 (5%) aligns with the strategy's risk tolerance and volatility profile
      — higher volatility strategies may need adjusted thresholds to avoid false stops while volatile markets may need tighter
      thresholds for protection
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using the default 5% drawdown threshold without adjustment causes either excessive stop-outs in volatile
      strategies or insufficient capital protection in risk-sensitive strategies, leading to suboptimal risk-adjusted returns
    derived_from_bd_id: BD-111
  - id: finance-C-192
    when: When implementing optimization algorithms in the framework
    action: Assume convergence criteria are implicitly defined — the framework must not use implicit convergence criteria
      for optimization algorithms
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Missing explicit convergence criteria causes optimization to run indefinitely or stop prematurely without
      consistent criteria, producing unreliable or non-reproducible optimization results across different runtime conditions
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-193
    when: When implementing or configuring optimization algorithms
    action: Explicitly declare convergence criteria for each optimization algorithm — include maximum iterations, tolerance
      threshold (e.g., 1e-6), and convergence verification method
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit convergence criteria, optimization results are non-reproducible and may converge to suboptimal
      solutions depending on runtime conditions, affecting production reliability
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-194
    when: When implementing or refactoring the EMA cross alpha model
    action: Use 12-period fast EMA and 26-period slow EMA for cross signals — do not change these parameters without separate
      validation evidence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing EMA periods alters signal timing and crossover frequency, causing strategies to generate different
      trading signals than validated in backtesting and potentially underperforming in live trading
    derived_from_bd_id: BD-038
  - id: finance-C-195
    when: When implementing drawdown-based risk management logic
    action: Use Math.Abs for _maximumDrawdownPercent to verify sign insensitivity — apply the same percentage threshold regardless
      of position direction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing Math.Abs creates signed thresholds where long and short positions have different drawdown behaviors,
      breaking consistent risk management assumptions and causing strategies to perform differently than validated
    derived_from_bd_id: BD-018
  - id: finance-C-196
    when: When configuring risk management drawdown thresholds
    action: Verify that _maximumDrawdownPercent configuration aligns with intended risk tolerance for both long and short
      positions — single threshold covers both directions due to absolute value behavior
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Misunderstanding the absolute value behavior may lead to incorrectly sized thresholds that trigger stop-outs
      at wrong price levels for either long or short positions
    derived_from_bd_id: BD-018
  - id: finance-C-197
    when: When implementing pair selection correlation logic
    action: Use Kendall tau correlation for pair selection — do not substitute Pearson or other methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Pearson correlation instead of Kendall tau exposes pair selection to distortion from extreme values
      in financial returns, causing wrong pairs to be identified and strategies to fail in live trading
    derived_from_bd_id: BD-034
  - id: finance-C-198
    when: When selecting pairs for energy market correlation analysis
    action: Verify that 90-day lookback period captures seasonal energy patterns without stale data — adjust based on specific
      asset characteristics
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using a lookback period incompatible with energy market seasonality may identify spurious correlations or
      miss genuine ones, leading to unprofitable pair trades in live trading
    derived_from_bd_id: BD-034
  - id: finance-C-201
    when: When implementing pairs trading signal emission logic
    action: Use three-state pairs trading machine (SHORT→FLAT→LONG→FLAT→SHORT) with FLAT as mandatory intermediate state for
      direction changes — do not implement direct SHORT/LONG transitions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Direct state transitions without FLAT intermediate cause signal oscillation where the strategy rapidly re-enters
      and exits positions, accumulating trading costs and generating losses in live trading
    derived_from_bd_id: BD-114
  - id: finance-C-202
    when: When calculating slippage using VolumeShareSlippageModel
    action: 'Use squared volume_share formula: slippage = volume_share² × price_impact — do not use linear volume_share'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using linear volume_share underestimates market impact for large orders, causing backtests to show lower
      execution costs than actually incurred and strategies to appear more profitable than they would be in live trading
    derived_from_bd_id: BD-124
  - id: finance-C-203
    when: When implementing portfolio construction weight normalization
    action: Normalize InsightWeightingPortfolioConstructionModel weights to sum=1 when individual weights exceed 1 — prevent
      weights greater than 1 without normalization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Omitting normalization when weights exceed 1 amplifies conviction signals through over-leverage, causing
      inconsistent portfolio sizing across varying insight magnitudes and risk of margin calls in live trading
    derived_from_bd_id: BD-116
  - id: finance-C-204
    when: When implementing or refactoring trailing stop risk management logic
    action: Track absolute holdings value (abs(holdings_value)) for both long and short positions when calculating trailing
      high/low thresholds — do not use signed net value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using signed net value for trailing stop causes asymmetric P&L handling where short positions are treated
      inversely to longs, leading to incorrect stop triggers and either premature exits or missed stops
    derived_from_bd_id: BD-047
  - id: finance-C-205
    when: When implementing trailing stop breach handling in risk management
    action: Execute both cancellation of active insights AND complete liquidation of each positions when trailing stop is
      breached — do not implement partial exit or only cancel insights
    severity: high
    kind: domain_rule
    modality: must
    consequence: Partial exit or only canceling insights leaves open positions that generate conflicting signals after stop
      breach, causing compounding losses and unpredictable portfolio state
    derived_from_bd_id: BD-048
  - id: finance-C-206
    when: When initializing indicators for strategy backtesting or live trading
    action: Verify indicator warm-up period equals or exceeds the maximum lookback period of any indicator being used — consult
      indicator documentation for warmup requirements
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Insufficient warm-up causes spurious trading signals during initial trading days when history is insufficient,
      leading to invalid entries and exits that distort backtest results and live performance
    derived_from_bd_id: BD-039
  - id: finance-C-207
    when: When selecting or configuring portfolio construction model for framework algorithms
    action: Verify EqualWeightingPortfolioConstructionModel is intentionally selected — confirm no optimized weights are needed;
      equal weighting serves as transparent baseline for regression testing
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Switching to optimized weights without explicit rationale introduces overfitting risk to historical data,
      making performance comparison across alpha models unreliable
    derived_from_bd_id: BD-040
  - id: finance-C-208
    when: When configuring mean-variance optimization portfolio construction
    action: Verify lookback_period equals 63 (approximately 3 months of trading data) for variance estimation — confirm longer
      lookback periods are not used which would cause slow regime adaptation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 252-period lookback instead of 63-period causes variance estimates to be stale during regime changes,
      leading to suboptimal portfolio weights and reduced risk-adjusted returns
    derived_from_bd_id: BD-041
  - id: finance-C-209
    when: When configuring universe selection refresh schedule
    action: Verify universe refresh occurs monthly (minimum 1 day between refresh cycles) — confirm refresh frequency matches
      turnover tolerance and avoids daily updates which increase costs
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Daily universe refresh causes excessive portfolio turnover in thin markets, accumulating unnecessary transaction
      costs and potentially triggering wash sale rule violations
    derived_from_bd_id: BD-052
  - id: finance-C-210
    when: When configuring alpha model rebalancing timing for leveraged ETF strategies
    action: Verify rebalancing is scheduled at 14:15 ET with 105-minute insight horizon — confirm timing avoids pre-market
      low liquidity and extends through market close for extended trading opportunity
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Pre-market rebalancing timing exposes orders to lower liquidity conditions, causing wider spreads and higher
      execution costs for leveraged ETF rebalancing trades
    derived_from_bd_id: BD-059
  - id: finance-C-211
    when: When configuring portfolio rebalancing triggers for algorithm execution
    action: Verify RebalanceOnSecurityChanges and RebalanceOnInsightChanges settings — both defaulting to true causes aggressive
      rebalancing; explicitly set to false if transaction cost minimization is priority
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Both triggers defaulting to true causes rebalancing on every security or insight change, accumulating high
      transaction costs through frequent small trades unless explicitly disabled
    derived_from_bd_id: BD-108
  - id: finance-C-212
    when: When configuring minimum order margin filter for portfolio orders
    action: Verify minimum_order_margin_portfolio_percentage is intentionally set to 0 — setting to 0 disables order filtering
      allowing very small positions; set to 0.001-0.01 to filter noise orders if cost efficiency is priority
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Disabling order margin filtering with 0% allows minute position sizing that generates excessive transaction
      costs relative to position value, silently eroding returns
    derived_from_bd_id: BD-113
  - id: finance-C-213
    when: When implementing alpha generation logic for share class arbitrage strategies
    action: Calculate alpha/beta weights to achieve exactly 50/50 dollar weighting between share classes — do not optimize
      for maximum returns or minimum volatility without explicit requirement change
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing from 50/50 dollar weighting to optimized weights alters the risk profile and can create unintended
      concentration risk, causing backtest results to diverge from live trading behavior where balanced exposure is maintained
    derived_from_bd_id: BD-058
  - id: finance-C-214
    when: When implementing data input handling for futures and leveraged ETF strategies
    action: Use exactly 1-minute resolution for futures and leveraged ETF data — do not switch to higher granularity (e.g.,
      tick-by-tick) or lower granularity (e.g., 5-minute) without recalibrating rebalancing logic
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 5-minute resolution causes same-day rebalancing signals to miss intraday price movements, leading to
      delayed execution and reduced returns for leveraged ETF strategies that require precise timing
    derived_from_bd_id: BD-061
  - id: finance-C-215
    when: When implementing implied volatility calculation for options pricing
    action: Use Brentq root-finding algorithm with bounds [1e-7, 2.0] for implied volatility calculation — do not replace
      with unconstrained methods or Newton-Raphson without bounds checking
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Newton-Raphson without proper bounds may diverge to extreme IV values (NaN or infinite) when initial estimates
      are poor, causing options pricing to fail entirely or produce unrealistic values
    derived_from_bd_id: BD-062
  - id: finance-C-216
    when: When implementing pair selection logic for energy or commodity strategies
    action: Verify Kendall tau correlation is used for pair selection instead of Pearson — Kendall tau is robust to outliers
      and handles monotonic relationships common in commodity markets
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using Pearson correlation instead of Kendall tau introduces sensitivity to extreme values and non-normal
      distributions, causing incorrect pair selection and reducing mean reversion strategy profitability
    derived_from_bd_id: BD-054
  - id: finance-C-217
    when: When implementing natural gas momentum insight generation
    action: Verify the UP insight emission threshold is set to 0.75% for natural gas returns — this threshold is calibrated
      to natural gas typical daily volatility to filter noise and avoid overtrading
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Lowering the threshold below 0.75% increases false signals and transaction costs due to natural gas noise,
      while raising it reduces the strategy's ability to capture meaningful upward momentum
    derived_from_bd_id: BD-055
  - id: finance-C-218
    when: When implementing leveraged ETF rebalancing signal generation
    action: Verify the return threshold for rebalancing signal is set to 1% — this threshold is calibrated to leveraged ETF
      volatility profile to avoid whipsaw from excessive rebalancing
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using a 0.5% threshold causes excessive rebalancing due to leveraged ETF volatility, increasing transaction
      costs and reducing net returns from whipsaw losses
    derived_from_bd_id: BD-060
  - id: finance-C-219
    when: When implementing risk management drawdown controls
    action: Apply 5% maximum drawdown limit per security independently — do not replace with portfolio-wide drawdown calculation
      which would allow single-position concentration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Portfolio-wide drawdown calculation allows individual positions to exceed 5% loss while keeping total portfolio
      within limits, creating concentrated risk that defeats per-position loss control
    derived_from_bd_id: BD-079
  - id: finance-C-220
    when: When implementing energy ETF pair selection for correlation analysis
    action: Use Kendall tau correlation for energy ETF pair selection — Kendall tau handles rank correlation robustly, important
      for commodity markets exhibiting nonlinear dependencies from contango/backwardation dynamics
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using Pearson correlation fails to detect nonlinear relationships common in energy ETFs, causing missed pair
      opportunities and incorrect correlation estimates in contango/backwardation market conditions
    derived_from_bd_id: BD-089
  - id: finance-C-221
    when: When implementing triple-leveraged ETF pair trading strategies
    action: Generate DOWN insights for both ETFs in a triple-leveraged pair — the strategy profits from volatility decay caused
      by daily rebalancing, which creates path-dependent losses even when underlying index ends flat
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failing to account for volatility decay mechanism causes the strategy to miss profitable short opportunities;
      in high volatility periods, triple-leveraged ETF pairs lose value from daily reset even without directional movement
    derived_from_bd_id: BD-103
  - id: finance-C-222
    when: When implementing VWAP execution price comparison logic
    action: Compare bid price against VWAP for buy orders (execute only when bid < VWAP) and compare ask price against VWAP
      for sell orders (execute only when ask > VWAP) — order direction determines favorable price boundary
    severity: high
    kind: domain_rule
    modality: must
    consequence: Swapping bid/ask comparisons for buy/sell orders reverses the favorable price contract, causing executions
      at prices worse than VWAP and systematically reducing backtest alpha
    derived_from_bd_id: BD-109
  - id: finance-C-223
    when: When implementing universe selection logic that produces no changes
    action: Return Universe.UNCHANGED sentinel value (not null, not empty list) to signal the universe manager to preserve
      existing holdings and skip rebalancing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning null or empty universe causes the universe manager to interpret it as an explicit universe change,
      triggering unintended portfolio rebalancing and transaction costs during periods of no selection changes
    derived_from_bd_id: BD-112
  - id: finance-C-224
    when: When implementing intraday VWAP reset logic
    action: Reset VWAP at calendar midnight (00:00 UTC) regardless of algorithm timezone or trading session boundaries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Resetting VWAP on algorithm time boundaries instead of midnight creates VWAP discontinuities for round-the-clock
      algorithms, causing execution quality to vary unexpectedly across timezone boundaries
    derived_from_bd_id: BD-121
  - id: finance-C-225
    when: When testing algorithms using hourly resolution with RAW normalization
    action: Validate VWAP calculations account for midnight reset boundaries in the algorithm's configured timezone; hourly
      bars align with calendar hours and will not expose timezone-related VWAP discontinuities that occur at midnight
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Hourly resolution testing masks the VWAP midnight reset incompatibility with non-US timezones; algorithms
      using different timezones or intraday resolutions will experience VWAP discontinuities that regression tests never validate
    derived_from_bd_id: BD-132
  - id: finance-C-226
    when: When processing fixed income, derivative, or any instrument requiring day count calculations
    action: Assume the framework provides consistent day count and compounding conventions — the framework lacks explicit
      day count and compounding convention support
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Missing day count conventions cause incorrect interest accrual, yield calculations, and bond pricing; accumulated
      errors in fixed income backtesting lead to inflated or deflated returns that do not match live trading
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-227
    when: When implementing fixed income or derivative calculations requiring interest accrual or yield computation
    action: Implement explicit day count convention (e.g., 30/360, Act/365, Act/360) and compounding frequency (annual, semi-annual,
      quarterly) for each interest, yield, and present value calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit day count and compounding conventions, accrued interest and yield calculations use inconsistent
      defaults, causing bond pricing errors and strategy performance discrepancies between backtest and live trading
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-228
    when: When implementing mean-variance portfolio optimization
    action: Verify that analytical unconstrained optimization produces acceptable position bounds; add long-only or weight
      constraints if extreme positions occur, as unconstrained solutions may produce leveraged or implausible allocations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Unconstrained mean-variance optimization produces mathematically optimal but practically infeasible allocations
      with extreme long/short positions that would be rejected by risk managers and cause margin calls in live trading
    derived_from_bd_id: BD-087
  - id: finance-C-229
    when: When using Contingent Claims Analysis for default probability estimation
    action: Verify that firm assets follow Geometric Brownian Motion and debt structure is zero-coupon before applying Black-Scholes
      Merton model; for stochastic interest rates or jump-to-default risks, use intensity-based credit models instead
    severity: high
    kind: domain_rule
    modality: must
    consequence: Black-Scholes Merton assumes GBM asset returns and zero-coupon debt; violations cause systematic misestimation
      of default probability, leading to incorrect credit risk pricing and potential large losses on credit-sensitive positions
    derived_from_bd_id: BD-088
  - id: finance-C-230
    when: When using 2-sigma bands around SMA for mortgage rate volatility signal generation
    action: Monitor signal accuracy during high-volatility regimes (financial crises); 2-sigma bands widen significantly during
      market stress, producing excessive false signals when actual volatility exceeds the calibrated threshold
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Static 2-sigma bands calibrated for normal volatility produce excessive false breakouts during crises, causing
      momentum strategies to fade legitimate trends and accumulate losses from whipsaw trades
    derived_from_bd_id: BD-090
  - id: finance-C-231
    when: When implementing maximum drawdown risk management with per-security loss limits
    action: Consider that static drawdown thresholds do not adapt to volatility regimes; in high-volatility periods, the same
      drawdown percentage may represent normal fluctuation rather than a true risk event, while in low-volatility periods
      it may indicate severe stress
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Static maximum drawdown thresholds trigger false liquidations during volatile periods (stopping out profitable
      positions prematurely) and fail to liquidate during calm periods when drawdown signals are masked by low volatility
    derived_from_bd_id: BD-092
  - id: finance-C-232
    when: When implementing or modifying the VolumeShareSlippageModel slippage calculation
    action: Use any formula other than square of volume ratio for price impact—the quadratic relationship reflects empirical
      observation that impact grows more than proportionally with order size. Linear impact models MUST NOT be used as they
      systematically underestimate large order costs
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Linear impact models underestimate market impact costs for large orders by 30-50% compared to quadratic models,
      causing systematic backtest overestimation of profitability for institutional-sized strategies
    derived_from_bd_id: BD-099
  - id: finance-C-233
    when: When configuring MACD parameters for bubble detection entry/exit signals
    action: Use MACD parameters of fast=12, slow=26, signal=9 with crossover logic for SPY entry/exit decisions. Alternative
      parameter sets may increase false signal rate or lag, causing mistimed entries and exits
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-standard MACD parameters without validation may increase false signal rate or lag, causing mistimed
      entries and exits that reduce strategy alpha or increase drawdowns during regime changes
    derived_from_bd_id: BD-101
  - id: finance-C-234
    when: When implementing CAPE ratio regime change detection in BubbleAlgorithm
    action: Use CAPE threshold of 20 for bubble detection—CAPE below 20 indicates normal valuations, CAPE making new quarter-low
      below 20 signals potential bubble conditions. CAPE is a 10-year earnings metric not suited for short-horizon signals
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using trailing PE or other short-horizon metrics for regime detection introduces business cycle distortion—quarterly
      CAPE signals may also introduce noise and miss rapid valuation changes characteristic of bubbles
    derived_from_bd_id: BD-102
  - id: finance-C-235
    when: When implementing Bollinger Bands in IndicatorSuiteAlgorithm
    action: Use 20-period SMA with 1 standard deviation bands for Bollinger Bands calculation. 1 SD is narrower than conventional
      2 SD to generate more frequent signals for shorter-horizon strategies
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 2 SD bands instead of 1 SD reduces signal frequency but may miss shorter-horizon opportunities; conversely,
      using 1 SD increases false signals in fast-moving markets due to tighter band width
    derived_from_bd_id: BD-104
  - id: finance-C-236
    when: When implementing or refactoring PortfolioConstructionModels
    action: Verify PortfolioBias.LONG_SHORT is the default setting to enable short selling without explicit configuration.
      Algorithms can hold negative positions by default unless developers actively configure bias to LONG-only
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Changing default to LONG-only prevents algorithms from utilizing short-side opportunities in bear markets;
      developers expecting long-short capability may inadvertently run conservative strategies with reduced alpha
    derived_from_bd_id: BD-107
  - id: finance-C-237
    when: When implementing EqualWeighting portfolio construction logic
    action: Allocate 1/N to each non-FLAT insight, excluding FLAT direction insights from position sizing. Total portfolio
      weight may fall below 100% when PortfolioBias filters some signals—do not redistribute excluded weight to remaining
      symbols as this preserves insight signal integrity
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Redistributing FLAT-excluded weight would violate insight signal integrity and cause unintended concentration
      risk in remaining positions, changing portfolio construction behavior from expected design
    derived_from_bd_id: BD-115
  - id: finance-C-238
    when: When implementing AccumulativeInsightPortfolioConstructionModel
    action: Use 0.03 (3%) as the default accumulation percentage for incremental position sizing. AccumulativeInsightModel
      extends EqualWeighting but overrides allocation logic to build positions gradually rather than immediately
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using full position sizing instead of incremental 3% accumulation would eliminate gradual position building,
      reducing adaptability to changing market conditions and increasing execution risk
    derived_from_bd_id: BD-118
  - id: finance-C-239
    when: When implementing portfolio construction using LONG_SHORT bias with EqualWeighting
    action: Handle under-allocation when EqualWeighting with LONG_SHORT bias excludes FLAT insights—the portfolio may fall
      below 100% allocation with hidden cash drag. Explicitly configure residual allocation logic or warn users about potential
      unallocated capital
    severity: high
    kind: domain_rule
    modality: must
    consequence: Portfolios with LONG_SHORT bias and 1/N excluding FLAT may leave 10-30% capital unallocated when multiple
      symbols show no direction, causing unintended cash drag that reduces returns compared to expected full exposure
    derived_from_bd_id: BD-129
  - id: finance-C-240
    when: When handling slippage calculation for Forex/CFD securities
    action: For Forex/CFD securities where volume data is unavailable (zero volume), the VolumeShareSlippageModel returns
      zero slippage with a warning. Do not assume slippage is properly modeled for Forex strategies—implement spread-based
      alternative cost estimation when volume is missing
    severity: high
    kind: operational_lesson
    modality: must
    consequence: When volume is zero or missing for Forex/CFD, the volume_share² model silently returns zero slippage instead
      of applying alternative cost estimation; users may incorrectly assume slippage is properly modeled, causing backtest-live
      inconsistency
    derived_from_bd_id: BD-130
  - id: finance-C-242
    when: When implementing VolumeShareSlippageModel for order execution
    action: 'Apply quadratic market impact formula: impact = volume_share^2 * price_impact_coefficient — do NOT use linear
      volume_share scaling, as linear models systematically underestimate impact for large orders'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Linear slippage models underestimate market impact by up to 10x for large institutional orders; backtests
      will show artificially low transaction costs, causing live trading to consume significantly more alpha than backtested
    derived_from_bd_id: BD-021
  - id: finance-C-243
    when: When implementing margin call logic in backtesting engine
    action: Modify the 5-minute margin call frequency to shorter intervals (e.g., 1 minute) — this magic number is a deliberate
      performance trade-off, not an arbitrary value
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Reducing margin call frequency below 5 minutes causes unnecessary backtest slowdowns without meaningful risk
      improvement; conversely, increasing it beyond 5 minutes risks cascade margin call failures in volatile markets
    derived_from_bd_id: BD-026
  - id: finance-C-244
    when: When creating custom AlphaModel implementations
    action: Override the Update() method explicitly — do NOT leave the default NotImplementedException behavior; verify alpha
      generation logic is intentionally implemented
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Failing to override Update() causes the alpha model to throw exceptions at runtime; strategies would crash
      during alpha generation phase, preventing any insight production
    derived_from_bd_id: BD-004
  - id: finance-C-246
    when: When implementing universe selection logic for the 500-stock universe
    action: Verify sector balancing by selecting top dollar-volume stocks within each sector, with at least one stock per
      sector represented to avoid coverage gaps
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without sector balancing, the universe may concentrate in few high-volume sectors, reducing diversification
      and increasing correlation risk across the portfolio
    derived_from_bd_id: BD-051
  - id: finance-C-247
    when: When configuring portfolio construction with RebalanceOnInsightChanges parameter
    action: Verify that RebalanceOnInsightChanges=true matches strategy intent; for low-frequency or long-horizon strategies,
      explicitly set to false to avoid unnecessary turnover and transaction costs
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default rebalancing on every insight change may cause excessive portfolio turnover and transaction costs,
      especially for strategies with frequent but low-conviction signals
    derived_from_bd_id: BD-009
  - id: finance-C-248
    when: When calculating slippage for Forex or CFD instruments in backtesting
    action: Assume volume-based slippage models (VolumeShareSlippageModel) produce accurate slippage estimates for Forex/CFD
      — these instruments lack reliable volume data; use spread-based assumptions instead
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Applying volume-based slippage to Forex/CFD generates unreliable estimates (often zero with only a warning),
      causing underestimation of trading costs and overstatement of strategy performance
    derived_from_bd_id: BD-024
  - id: finance-C-249
    when: When implementing risk management liquidation logic
    action: Call algorithm.Insights.Cancel() for each active insights on symbols being liquidated to prevent portfolio construction
      model from generating conflicting signals during position unwind
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without cancelling insights during risk-triggered liquidation, portfolio construction continues to generate
      buy signals for symbols being unwound, causing conflicting position building and potential overtrading
    derived_from_bd_id: BD-019
  - id: finance-C-250
    when: When implementing price gap mean reversion alpha model
    action: 'Use 3-sigma volatility threshold for outlier detection: only flag price gaps where abs(100*price_jump) > 3*volatility
      as mean-reversion candidates; do not modify this threshold without validating against historical false positive rates'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a different threshold (e.g., 2-sigma) significantly increases false positive signals, causing the strategy
      to act on normal price fluctuations rather than true outliers, degrading alpha quality
    derived_from_bd_id: BD-119
  - id: finance-C-251
    when: When implementing rebalancing scheduling logic in PortfolioConstructionModel
    action: 'Honor the dual-mode rebalancing contract: null return from rebalancingFunc must trigger immediate rebalancing;
      non-null DateTime must schedule rebalancing for that specific time. Do not modify the function signature or return value
      interpretation.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Breaking the null=immediate contract causes rebalancing to be skipped or delayed unexpectedly, leading to
      portfolio drift that accumulates silently over backtest periods
    derived_from_bd_id: BD-010
  - id: finance-C-252
    when: When implementing bond pricing, interest accrual, or option pricing calculations
    action: Assume the framework implements day count convention calculations — the framework does not implement day count
      convention; interest accrual and discount factor calculations will be incorrect without explicit convention specification
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without day count convention, bond pricing uses wrong day counts causing systematic pricing errors of 0.1-0.5%
      in accrued interest calculations, leading to incorrect P&L attribution
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-253
    when: When implementing or modifying bond pricing, interest calculations, or derivative pricing
    action: 'Explicitly specify and implement day count convention for each financial instrument: ACT/365 for money market
      and government bonds, ACT/360 for short-term instruments, 30/360 for corporate bonds, 30E/360 for Eurobond conventions.
      Document the convention used in each pricing method.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing day count convention causes bond pricing errors, incorrect interest accrual, and wrong option pricing
      that compounds over time and across instruments
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-254
    when: When implementing or refactoring AlgorithmManager data processing and event scanning logic
    action: Verify consolidator scan occurs after each data points for each time step are fully processed through the consolidator
      pipeline — do not reorder or interleave scan operations with data pumping
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reordering consolidator scan breaks indicator consistency by causing indicators to miss aggregated values
      from the current time step, leading to incorrect trading signals that diverge from expected backtest behavior
    derived_from_bd_id: BD-028
  - id: finance-C-255
    when: When implementing AlphaModel instantiation without explicit name parameter
    action: Generate a unique GUID-based name for each AlphaModel instance when no explicit name is provided — do not default
      to null, empty string, or class name as identifier
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using null or generic names in multi-model algorithms causes insight attribution failures, making it impossible
      to track which model generated each signal during debugging and performance analysis
    derived_from_bd_id: BD-006
  - id: finance-C-256
    when: When using default sell_cost parameter for backtesting Chinese A-share stocks
    action: Verify that default sell_cost=0.001 matches actual broker fees (stamp duty 0.05% + transfer fee + commission),
      and adjust to actual values for different account types or broker tiers
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default sell_cost of 0.1% overestimates fees for some accounts (if commission is 0.03%) and underestimates
      for others, causing backtest returns to deviate from actual trading results by 0.01-0.05% per trade
    derived_from_bd_id: BD-006
  - id: finance-C-258
    when: When configuring portfolio construction model without explicit PortfolioBias specification
    action: Verify that PortfolioBias.LongShort default is intentional for the strategy; if long-only or short-only behavior
      is required, explicitly set PortfolioBias.Long or PortfolioBias.Short to override the permissive default
    severity: high
    kind: operational_lesson
    modality: must
    consequence: The default PortfolioBias.LongShort enables both long and short positions, which may cause unintended short
      selling in strategies designed for long-only operation, leading to negative positions and margin requirements not accounted
      for in backtesting assumptions
    derived_from_bd_id: BD-011
  - id: finance-C-259
    when: When configuring TrailingStopRiskManagementModel without explicit maximumDrawdownPercent
    action: Verify that the 5% default maximumDrawdownPercent aligns with strategy risk tolerance; for higher volatility strategies,
      explicitly configure a tighter threshold (e.g., 2-3%) to protect capital, or for conservative strategies, configure
      lower (e.g., 1-2%)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The 5% default drawdown threshold may be too permissive for volatile strategies, allowing 5% losses before
      risk management triggers exit, or too restrictive for low-volatility strategies, causing premature stop-outs during
      normal price fluctuations
    derived_from_bd_id: BD-020
  - id: finance-C-260
    when: When implementing or refactoring the algorithm execution pipeline
    action: 'Maintain the canonical pipeline order: Universe → Alpha → Portfolio → Risk → Execute — each stage must execute
      sequentially and Risk stage must be able to override any prior stage decisions'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the pipeline order can cause risk management to not properly override alpha signals or portfolio
      construction, potentially allowing positions that violate risk constraints to remain open
    derived_from_bd_id: BD-025
  - id: finance-C-261
    when: When using VolumeWeightedAveragePriceExecutionModel's default execution parameters
    action: Verify that maximum_order_quantity_percent_volume=1% matches the actual trading strategy's liquidity requirements;
      higher participation rates (5-10%) execute faster but increase market impact
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 1% volume participation may be too conservative for time-sensitive strategies or too aggressive for
      illiquid securities, causing either delayed fills or excessive market impact
    derived_from_bd_id: BD-126
  - id: finance-C-262
    when: When implementing trailing stop risk management with insight-generating strategies
    action: 'Implement a cooldown period after TrailingStopRiskManagementModel triggers to prevent the cascade: stop trigger
      → insight cancellation → PortfolioConstructionModel generates new weights → RebalanceOnInsightChanges rebalances → new
      insights generated → re-entry near stop price'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: The risk cascade loop amplifies losses in volatile markets by repeatedly triggering stops, cancelling insights,
      and re-entering positions at unfavorable prices close to the stop level
    derived_from_bd_id: BD-128
  - id: finance-C-263
    when: When implementing or modifying volume-based execution parameters
    action: Verify each three volume limit configurations (VWAP ExecutionModel, VolumeWeightedAveragePriceExecutionModel,
      and regression algorithm setting) are synchronized to the same 1% volume threshold — any change to one must be propagated
      to the others
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent volume limits across execution models create unpredictable market impact behavior; changing
      one limit without updating others breaks the defense-in-depth strategy and may cause execution failures or excessive
      impact
    derived_from_bd_id: BD-127
  - id: finance-C-264
    when: When configuring execution model parameters
    action: Use a consistent volume participation percentage across each execution models; document the chosen value explicitly
      and validate that settings in VWAP ExecutionModel, VolumeWeightedAveragePriceExecutionModel, and any regression algorithm
      are identical
    severity: high
    kind: domain_rule
    modality: must
    consequence: Multiple independent 1% defaults that are not explicitly synchronized create maintenance risk; if one is
      changed without updating the others, execution behavior becomes inconsistent and unpredictable
    derived_from_bd_id: BD-127
  - id: finance-C-265
    when: When configuring MaximumDrawdownPercentPortfolio for risk reporting in backtesting
    action: Explicitly specify the is_trailing parameter (True/False) based on whether drawdown should measure from initial
      peak or rolling high; verify the chosen methodology matches the intended risk metric interpretation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using is_trailing=False measures drawdown from initial peak requiring recovery to original value, while is_trailing=True
      uses rolling high enabling earlier recovery recognition; mismatched configuration causes risk reports to misrepresent
      actual portfolio recovery requirements
    derived_from_bd_id: BD-125
  - id: finance-C-266
    when: When implementing universe selection for pair trading strategies
    action: Use ManualUniverseSelectionModel for custom symbol lists to verify specific instrument pairs are available for
      trading; do not substitute with dynamic universe selection that may exclude required symbols
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pair trading strategies require specific instrument pairs (e.g., Gas/Crude Oil correlations); dynamic universe
      selection may exclude required symbols, causing the strategy to fail or trade incorrect substitutes, breaking the intended
      correlation analysis
    derived_from_bd_id: BD-053
  - id: finance-C-267
    when: When implementing pair switching logic in correlation-based alpha strategies
    action: Liquidate each positions of the previous pair before opening positions in the new highest-correlation pair; maintain
      single active pair per asset to verify directional clarity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without liquidating previous pair positions, multiple active pairs create conflicting signals on the same
      asset; holding opposing positions simultaneously introduces unintended directional exposure and may exceed position
      limits
    derived_from_bd_id: BD-056
  - id: finance-C-268
    when: When implementing mean reversion alpha signals for share class arbitrage
    action: Use SimpleMovingAverage with exactly 10 periods (SMA(10)) for mean reversion detection; do not substitute with
      different window sizes without re-evaluating strategy responsiveness and signal noise tradeoffs
    severity: high
    kind: domain_rule
    modality: must
    consequence: SMA(10) balances responsiveness and smoothness for short-term share class arbitrage; using SMA(20) would
      be too slow for mean reversion detection while shorter windows may introduce excessive noise, both degrading strategy
      alpha generation
    derived_from_bd_id: BD-057
  - id: finance-C-269
    when: When configuring execution model for time-sensitive alpha strategies
    action: When using ImmediateExecutionModel, verify that margin check is enabled and the minimum order margin threshold
      matches the strategy's capital allocation requirements; confirm available buying power validation occurs before order
      submission
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: ImmediateExecutionModel provides instant fills but without margin verification may submit undercapitalized
      orders that get rejected in live trading; this creates backtest-live execution inconsistency where backtest assumes
      fill but live trading fails
    derived_from_bd_id: BD-045
  - id: finance-C-270
    when: When implementing or refactoring the insight period parameter for short-term option trade signals
    action: Maintain 0.5-hour insight period for short-term option trades — this specific duration matches the weekly options
      theta decay profile and allows sufficient time for signal execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing to a longer insight period (e.g., 1 hour) causes the strategy to enter trades too early, missing
      optimal theta capture points on weekly options and reducing overall strategy returns
    derived_from_bd_id: BD-076
  - id: finance-C-271
    when: When implementing or refactoring slippage calculation logic for order execution
    action: 'Use the logarithmic slippage formula: price * 0.0001 * log10(2*quantity) — maintain the log function to prevent
      extreme slippage values for very large orders'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing logarithmic slippage with linear calculation causes unrealistic slippage overestimation for large
      orders, distorting execution cost estimates and leading to strategies that underperform live trading
    derived_from_bd_id: BD-078
  - id: finance-C-272
    when: When implementing or refactoring the risk parity portfolio optimizer
    action: Use Newton-CG optimizer with log-barrier objective for risk parity calculations — the log-barrier specifically
      prevents weight boundary violations and the Newton-CG method ensures fast convergence for smooth optimization problems
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Replacing Newton-CG with alternative solvers (e.g., SQP, naive gradient descent) causes either optimization
      failures for certain correlation structures or significantly slower convergence, resulting in suboptimal risk parity
      weights
    derived_from_bd_id: BD-086
  - id: finance-C-273
    when: When implementing or refactoring the RSI indicator configuration
    action: Use 14-period RSI with Simple Moving Average smoothing — the 14-period SMA is the standard Wilder RSI setting
      that balances responsiveness with noise reduction and provides equal weight to historical periods
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Changing RSI period to shorter values (e.g., 7 periods) introduces excessive sensitivity and false signals;
      switching to EMA alters the smoothing characteristics and deviates from the standard Wilder RSI calibration
    derived_from_bd_id: BD-105
  - id: finance-C-274
    when: When implementing or refactoring the ATR volatility indicator configuration
    action: Use 14-period ATR with Simple Moving Average smoothing of true range values — 14-period SMA is the standard setting
      that reveals underlying volatility trends while the absolute ATR preserves volatility interpretation in dollar terms
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Changing ATR period or smoothing method alters the volatility signal characteristics; using standard deviation
      instead loses gap information critical for complete volatility measurement
    derived_from_bd_id: BD-106
  - id: finance-C-275
    when: When calculating MACD signals for cross-asset alpha generation
    action: Specify a bounce_threshold parameter to filter minor price fluctuations and prevent false signals from noise;
      validate that bounce_threshold is set to a non-zero value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without bounce threshold filtering, backtested MACD signals appear cleaner than in live trading where minor
      price fluctuations generate actual false signals, causing strategy performance to degrade post-deployment
    derived_from_bd_id: BD-080
  - id: finance-C-276
    when: When selecting pairs for pairs trading using correlation analysis
    action: Use Pearson correlation alone for pair selection without supplementing with cointegration testing — Pearson captures
      only linear dependencies and misses nonlinear cointegration relationships
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Pairs selected purely by Pearson correlation may exhibit nonlinear cointegration that breaks down during
      regime changes, causing mean-reversion strategies to experience larger drawdowns than backtested results suggest
    derived_from_bd_id: BD-081
  - id: finance-C-278
    when: When implementing mean-variance portfolio optimization with a target return constraint
    action: Treat the target return as a hard constraint requiring minimum variance at that return level; validate target
      return against maximum achievable return before optimization and fail gracefully if target exceeds feasible range
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using target return as a soft objective rather than a hard constraint causes the optimizer to expose more
      risk than intended, resulting in portfolio volatility exceeding strategy risk limits and unexpected drawdowns in live
      trading
    derived_from_bd_id: BD-084
  - id: finance-C-280
    when: When configuring Keras neural network for price prediction
    action: Use SGD optimizer with learning_rate=0.01 and exactly 200 training steps — do not modify hyperparameters without
      documented justification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing learning rate or training steps without validation causes the model to converge to suboptimal weights,
      degrading price prediction accuracy and leading to poor trading decisions
    derived_from_bd_id: BD-095
  - id: finance-C-281
    when: When implementing PyTorch neural network for trading signals
    action: Use SGD optimizer with learning_rate=0.2 and MSE loss — document the complete network architecture including layer
      sizes, activation functions, and dropout in the configuration
    severity: high
    kind: domain_rule
    modality: must
    consequence: High learning rate of 0.2 combined with unspecified architecture creates instability risk in volatile market
      conditions, potentially causing the model to overshoot optimal weights and generate erratic trading signals
    derived_from_bd_id: BD-096
  - id: finance-C-282
    when: When training PyTorch neural network
    action: Verify convergence by monitoring loss curve after each training run — stop only when loss plateaus or use early
      stopping with minimum improvement threshold
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without convergence verification, fixed training iterations may stop before optimal weights are found, leading
      to suboptimal trading signal quality
    derived_from_bd_id: BD-096
  - id: finance-C-283
    when: When configuring TensorFlow neural network for price forecasting
    action: Use GradientDescentOptimizer with learning_rate=0.1 and verify convergence by monitoring loss trajectory — do
      not assume 200 iterations is sufficient without loss plateau confirmation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Aggressive 0.1 learning rate on low signal-to-noise financial data risks overshooting optimal weights; fixed
      200 iterations without convergence check produces unreliable price forecasts
    derived_from_bd_id: BD-097
  - id: finance-C-285
    when: When using the framework's default MaximumUnrealizedProfitPercentPerSecurity parameter for backtesting
    action: Verify that the default profit-taking threshold matches current market volatility characteristics — adjust for
      different asset classes (5% may be unreachable in low-vol, too aggressive in high-vol)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Fixed percentage thresholds do not adapt to volatility; in low-volatility assets the strategy may never trigger
      profit-taking, while in high-volatility assets 5% may exit too early, both causing significant backtest-live inconsistency
    derived_from_bd_id: BD-094
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
