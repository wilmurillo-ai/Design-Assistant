- id: SHARED-CN-ASTOCK-MKT-003
  statement: '策略拥挤（Strategy Crowding）：大量量化私募使用相似因子模型时， 持仓高度重叠，遇市场冲击时集体卖出形成踩踏。2024年2月 A 股量化危机 是典型案例（小盘股指数单日跌幅超 10%）。需监控因子多头持仓与
    主流量化基金的重叠率。

    '
  severity: high
