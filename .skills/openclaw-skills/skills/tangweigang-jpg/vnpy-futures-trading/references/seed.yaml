resources:
  packages:
  - name: PySide6==6.8.2.1
    version_pin: latest
  - name: numpy>=2.2.3
    version_pin: latest
  - name: pandas>=2.2.3
    version_pin: latest
  - name: ta-lib>=0.6.4
    version_pin: latest
  - name: deap>=1.4.2
    version_pin: latest
  - name: pyzmq>=26.3.0
    version_pin: latest
  - name: tzlocal>=5.3.1
    version_pin: latest
  - name: loguru>=0.7.3
    version_pin: latest
  - name: tqdm>=4.67.1
    version_pin: latest
  - name: nbformat>=5.10.4
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install PySide6==6.8.2.1
    - python3 -m pip install numpy>=2.2.3
    - python3 -m pip install pandas>=2.2.3
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-003
    when: When registering event handlers
    action: use a handler function signature compatible with Callable[[Event], None]
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incompatible handler signature causes TypeError at runtime when event engine attempts to invoke the handler
    stage_ids:
    - event_driven_core
  - id: finance-C-004
    when: When instantiating EventEngine
    action: call start() method before putting any events into the queue
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Events put before start() are either lost or processed after unexpected delay, causing missed trading signals
      or delayed order execution
    stage_ids:
    - event_driven_core
  - id: finance-C-006
    when: When creating an app that integrates with the platform
    action: define engine_class attribute pointing to the corresponding BaseEngine subclass
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing engine_class causes AttributeError when MainEngine.add_app() attempts to instantiate the engine,
      breaking app integration
    stage_ids:
    - event_driven_core
  - id: finance-C-012
    when: When implementing a gateway
    action: verify each methods are thread-safe with no mutable shared properties between objects
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Non-thread-safe gateway methods cause race conditions when called concurrently from multiple components,
      leading to data corruption or inconsistent state
    stage_ids:
    - event_driven_core
  - id: finance-C-018
    when: When implementing TickData or any market data objects
    action: inherit BaseData and include gateway_name field for data origin tracing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without gateway_name tracing, market data from multiple gateways becomes indistinguishable during multi-gateway
      debugging and causes incorrect routing of downstream processing
    stage_ids:
    - market_data_gateway
  - id: finance-C-020
    when: When constructing unique contract identifiers
    action: use vt_symbol composite key in format f'{symbol}.{exchange.value}' for cross-exchange contract identification
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Symbol collisions will occur when same symbol is traded on multiple exchanges, causing incorrect contract
      resolution and potential cross-contamination of trading decisions
    stage_ids:
    - market_data_gateway
  - id: finance-C-023
    when: When implementing BaseGateway
    action: implement all @abstractmethod methods (connect, close, subscribe, send_order, cancel_order, query_account, query_position)
      for gateway interface compliance
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incomplete gateway implementation will cause runtime errors when trading operations are attempted, preventing
      the trading system from functioning
    stage_ids:
    - market_data_gateway
  - id: finance-C-025
    when: When implementing gateway connectivity layer
    action: make gateway class thread-safe with each methods thread-safe and no mutable shared properties between objects
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Race conditions during concurrent market data processing will corrupt internal state, causing duplicate orders,
      missed fills, or incorrect position tracking
    stage_ids:
    - market_data_gateway
  - id: finance-C-033
    when: When implementing order status state machine logic
    action: 'restrict order status transitions to follow legal path: SUBMITTING -> NOTTRADED/PARTTRADED -> ALLTRADED/CANCELLED/REJECTED'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid order state transitions cause incorrect position tracking, leading to margin calculation errors and
      potential over-trading
    stage_ids:
    - order_management
  - id: finance-C-034
    when: When implementing frozen volume calculation in PositionHolding
    action: enforce frozen volume ceiling at total position volume (td_frozen <= td, yd_frozen <= yd)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Frozen volume exceeding available position causes negative available volume, leading to incorrect margin
      requirements and potential margin calls
    stage_ids:
    - order_management
  - id: finance-C-035
    when: When implementing position update logic for SHFE/INE exchanges
    action: use CLOSETODAY/CLOSEYESTERDAY distinction instead of generic CLOSE
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using generic CLOSE on SHFE/INE causes incorrect day-session position tracking, resulting in exchange rejection
      of close orders or position mismatch
    stage_ids:
    - order_management
  - id: finance-C-036
    when: When implementing order request conversion for SHFE/INE
    action: split close orders into CLOSETODAY and CLOSEYESTERDAY based on available volumes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Failing to split close orders causes exchange rejection for SHFE/INE exchanges which require specific today/yesterday
      close instructions
    stage_ids:
    - order_management
  - id: finance-C-038
    when: When implementing frozen amount release on order state change
    action: recalculate frozen volumes when order becomes inactive (ALLTRADED/CANCELLED/REJECTED)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Stale frozen amounts prevent subsequent close orders from executing, causing missed liquidation opportunities
    stage_ids:
    - order_management
  - id: finance-C-040
    when: When implementing trade event processing
    action: update position holdings immediately after trade execution
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Trade not reflected in position state causes incorrect available volume for subsequent orders, risking double-position
      or insufficient margin
    stage_ids:
    - order_management
  - id: finance-C-044
    when: When calculating available position for close orders
    action: subtract frozen volume from total position before allowing close
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Close order exceeding available position causes exchange rejection and potential position over-close, resulting
      in negative position
    stage_ids:
    - order_management
  - id: finance-C-046
    when: When implementing order request for offset conversion
    action: reject close orders that exceed available position
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Close order exceeding available position causes exchange rejection and potential negative position exposure
    stage_ids:
    - order_management
  - id: finance-C-048
    when: When implementing active order tracking
    action: remove orders from active_orders dictionary when status transitions to terminal state
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Stale active orders prevent new close orders from executing due to incorrect frozen volume calculation
    stage_ids:
    - order_management
  - id: finance-C-051
    when: When processing trade fills for position updates
    action: increment today position for OPEN trades and decrement for CLOSE trades
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect position update direction causes position sign inversion, leading to wrong risk calculations and
      potential margin issues
    stage_ids:
    - order_management
  - id: finance-C-054
    when: When defining the label expression
    action: use ts_delay(close, -N) with negative shift for future return calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using positive shift in label definition causes look-ahead bias - the label would use future data that's
      not available at prediction time, making the model unusable for live trading
    stage_ids:
    - alpha_research_data
  - id: finance-C-058
    when: When implementing time-series operators
    action: use polars .over('vt_symbol') for groupby partition to verify per-symbol calculations
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without proper vt_symbol partitioning, rolling window calculations mix data across different securities,
      producing meaningless cross-symbol correlations and rankings
    stage_ids:
    - alpha_research_data
  - id: finance-C-059
    when: When implementing cross-sectional operators
    action: use polars .over('datetime') for groupby partition to verify per-timestamp calculations
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without proper datetime partitioning, cross-sectional rankings/aggregations mix data across different time
      periods, producing meaningless rankings that span across time
    stage_ids:
    - alpha_research_data
  - id: finance-C-076
    when: When implementing alpha prediction models for regression
    action: Use MSE (mean squared error) as the objective function for continuous return prediction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using classification objectives like logloss or accuracy would fundamentally misinterpret alpha modeling
      as categorical classification instead of continuous value regression, producing nonsensical trading signals
    stage_ids:
    - alpha_modeling
  - id: finance-C-077
    when: When calling predict() before model training
    action: Call predict() on an unfitted model instance
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Attempting prediction without training raises ValueError, halting the pipeline and producing no alpha signals
      for downstream backtesting
    stage_ids:
    - alpha_modeling
  - id: finance-C-078
    when: When training models with early stopping
    action: Use separate TRAIN and VALID data segments to prevent look-ahead bias in early stopping
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Training on validation data inflates performance metrics, causing early stopping to trigger on data it was
      trained on, producing overfitted models with inflated backtest results
    stage_ids:
    - alpha_modeling
  - id: finance-C-080
    when: When implementing ML models for alpha prediction
    action: Inherit from AlphaModel base class and implement fit(), predict(), detail() methods
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Custom models not following the AlphaModel interface would break the pipeline orchestration in lab.py, preventing
      model save/load and signal generation workflows
    stage_ids:
    - alpha_modeling
  - id: finance-C-091
    when: When implementing daily PnL calculations
    action: propagate pre_closes and end_poses across trading days as close_prices and start_poses
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Daily PnL will be calculated incorrectly because holding PnL depends on pre_close * position * price_change;
      incorrect propagation breaks the continuity of position tracking across trading days
    stage_ids:
    - alpha_backtesting
  - id: finance-C-097
    when: When using BacktestingEngine for live trading
    action: claim BacktestingEngine provides real-time execution capability
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Orders are simulated with limit price matching; fills will not match actual market execution, causing significant
      discrepancy between backtest and live results
    stage_ids:
    - alpha_backtesting
  - id: finance-C-099
    when: When loading bar data into backtesting engine
    action: verify signal_df datetime column matches bar datetime without timezone information
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: get_signal() will return empty DataFrame for every bar because tzinfo mismatch prevents datetime equality
      comparison, causing strategy to receive no signals
    stage_ids:
    - alpha_backtesting
  - id: finance-C-100
    when: When running backtesting pipeline
    action: 'execute methods in order: run_backtesting, then calculate_result, then calculate_statistics'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: calculate_statistics will crash or produce empty results because daily_df and trades are not populated yet;
      the engine requires sequential data flow
    stage_ids:
    - alpha_backtesting
  - id: finance-C-101
    when: When executing trading via AlphaStrategy
    action: route each orders through BacktestingEngine.send_order, not directly to exchange
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Orders will bypass commission calculation, position tracking, and trade recording, corrupting all downstream
      PnL calculations
    stage_ids:
    - alpha_backtesting
  - id: finance-C-106
    when: When presenting backtesting results
    action: claim backtest returns equal expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results exclude slippage from order delays, market impact from large orders, and liquidity constraints
      that cause live returns to deviate significantly from simulated results
    stage_ids:
    - alpha_backtesting
  - id: finance-C-111
    when: When calculating daily portfolio balance
    action: use cum_sum of net_pnl plus initial capital to build equity curve
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Equity curve will be flat or incorrect, breaking all performance visualization and statistics that depend
      on balance progression
    stage_ids:
    - alpha_backtesting
  - id: finance-C-113
    when: When filtering trades into daily results
    action: group trades by trade.datetime.date() to verify each trade is assigned to correct trading day
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Trades will be assigned to wrong daily result buckets, corrupting daily PnL and commission calculations
    stage_ids:
    - alpha_backtesting
  - id: finance-C-175
    when: When implementing or extending AlphaModel classes for return prediction
    action: 'Enforce strict column contract for input DataFrames: column 0 must be datetime (pandas Timestamp), column 1 must
      be vt_symbol (string identifier), columns 2 through -2 must be numeric features, column -1 must be the label; validate
      schema at runtime before processing'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the column contract causes index errors at runtime or silently trains on wrong columns (e.g., using
      vt_symbol as a feature), producing meaningless predictions that cannot be explained
    derived_from_bd_id: BD-082
  - id: finance-C-184
    when: When implementing order routing for Chinese futures products via CtpGateway
    action: 'Enforce trading hours boundaries: day session orders accepted 08:45-15:00, night session orders accepted 20:45-02:45;
      reject or queue orders outside these windows with explicit timestamp validation'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Submitting orders outside Chinese futures trading hours causes immediate rejection by exchange gateways,
      leading to missed trades and strategy execution failures during pre-market and after-hours periods
    derived_from_bd_id: BD-003
  - id: finance-C-187
    when: When executing backtesting workflows with BacktestingEngine
    action: 'Execute the 5-step pipeline in strict order: set_parameters → add_strategy → load_data → run_backtesting → calculate_result
      → calculate_statistics — each step produces state required by the next; skipping or reordering causes AttributeError
      from missing attributes'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Skipping or reordering backtesting steps causes AttributeError from missing expected attributes, making backtest
      execution fail or produce incorrect results due to uninitialized global settings or unattached strategy instances
    derived_from_bd_id: BD-077
  - id: finance-C-195
    when: When implementing close order conversion logic for Chinese futures exchanges
    action: Apply exchange-specific close sequence for SHFE and INE exchanges as required by their unique order handling rules;
      do not use standard close sequence or generic exchange logic
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using standard close sequence for SHFE/INE violates their exchange-specific order handling requirements,
      potentially causing order rejection, position mismatches, or regulatory violations during live trading
    derived_from_bd_id: BD-030
  - id: finance-C-203
    when: When implementing RPC communication between client and server components
    action: Use REP/REQ socket pairs for synchronous request-response calls and PUB/SUB socket pairs for asynchronous push
      notifications — never mix socket types within a single connection channel
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Sending a sync request via PUB socket or async push via REP socket causes ZMQ protocol errors, resulting
      in connection failures and complete breakdown of RPC communication between components
    derived_from_bd_id: BD-085
  regular:
  - id: finance-C-001
    when: When implementing a gateway callback handler (on_tick, on_trade, etc.)
    action: modify the data object passed to the callback after passing it
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Data object modification causes inconsistent state across handlers, leading to hard-to-debug race conditions
      where different handlers see different data values
    stage_ids:
    - event_driven_core
  - id: finance-C-002
    when: When implementing gateway methods (connect, send_order, etc.)
    action: block the calling thread for any operation longer than trivial duration
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Blocking gateway methods freeze the entire event processing loop, causing event backlog and timer drift for
      all registered handlers
    stage_ids:
    - event_driven_core
  - id: finance-C-005
    when: When shutting down the trading system
    action: call event_engine.stop() before closing any gateways or engines
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Closing gateways first allows timer events to continue generating during shutdown, causing events to be processed
      after handlers are unregistered
    stage_ids:
    - event_driven_core
  - id: finance-C-007
    when: When adding a gateway to MainEngine
    action: use the gateway's default_name when no explicit name is provided
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using empty string as gateway name causes key collisions in gateways dict, overwriting previous gateway instances
      silently
    stage_ids:
    - event_driven_core
  - id: finance-C-008
    when: When dispatching events from gateway callbacks
    action: use the gateway's on_event/on_tick/on_trade methods instead of directly calling event_engine.put()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct event_engine.put() bypasses gateway's type-specific event routing, causing vt_symbol-specific events
      to not be published
    stage_ids:
    - event_driven_core
  - id: finance-C-009
    when: When processing high-volume event streams
    action: assume event dispatch latency is bounded by a specific guarantee
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Queue backlog under high load causes event processing delays beyond acceptable latency, leading to missed
      trading opportunities or stale market data processing
    stage_ids:
    - event_driven_core
  - id: finance-C-010
    when: When implementing real-time trading logic
    action: claim the system provides hard real-time event delivery guarantees
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Single-threaded polling-based design cannot provide real-time guarantees; timer drift accumulates over time
      and queue processing adds non-deterministic delays
    stage_ids:
    - event_driven_core
  - id: finance-C-011
    when: When evaluating trading strategy performance
    action: equate backtest event processing timing with live trading timing
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Event engine in backtesting runs synchronously without network latency, causing backtest results to show
      better execution timing than live trading would achieve
    stage_ids:
    - event_driven_core
  - id: finance-C-013
    when: When caching data objects in gateway for callbacks
    action: use copy.copy to create a new object before passing to on_xxxx callbacks
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Passing cached references directly means handlers may modify data that subsequent handlers or future callbacks
      will see, causing data corruption
    stage_ids:
    - event_driven_core
  - id: finance-C-014
    when: When registering the same handler function multiple times
    action: expect the handler to be invoked multiple times per event
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Duplicate handler invocation causes double processing of trading signals, potentially sending duplicate orders
      or miscalculating position sizes
    stage_ids:
    - event_driven_core
  - id: finance-C-015
    when: When designing event handlers that require per-event-type filtering
    action: use type-specific registration (register) instead of general registration (register_general)
    severity: low
    kind: architecture_guardrail
    modality: must
    consequence: General handlers receive every event regardless of type, causing unnecessary function call overhead for events
      not relevant to the handler
    stage_ids:
    - event_driven_core
  - id: finance-C-016
    when: When configuring EventEngine interval parameter
    action: verify interval value is a positive integer representing seconds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-positive interval causes immediate timer event flooding or no timer events; zero or negative values cause
      infinite loop in _run_timer or sleep with undefined behavior
    stage_ids:
    - event_driven_core
  - id: finance-C-017
    when: When implementing multi-threaded components that interact with EventEngine
    action: assume EventEngine provides thread-safety for handler implementations
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: EventEngine only provides thread-safe event queue access; handlers that are not thread-safe cause race conditions
      when invoked from the worker thread
    stage_ids:
    - event_driven_core
  - id: finance-C-019
    when: When implementing TickData structure
    action: contain exactly 5 levels of bid and ask prices/volumes (bid_price_1-5, ask_price_1-5, bid_volume_1-5, ask_volume_1-5)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Level-based market analysis requiring full orderbook depth will receive incomplete data, breaking strategies
      that rely on multi-level orderbook analysis
    stage_ids:
    - market_data_gateway
  - id: finance-C-021
    when: When passing data objects to gateway callbacks
    action: use copy.copy to create new objects before passing data to on_xxxx callbacks to verify immutability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Data mutation by downstream handlers will corrupt tick/order state in gateway cache, causing unpredictable
      trading behavior when stale data is reprocessed
    stage_ids:
    - market_data_gateway
  - id: finance-C-022
    when: When implementing SubscribeRequest
    action: initiate tick data subscription flow through gateway and generate correct vt_symbol for routing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Market data subscription will fail to route to correct gateway or exchange, preventing strategies from receiving
      required price updates
    stage_ids:
    - market_data_gateway
  - id: finance-C-024
    when: When pushing tick events through EventEngine
    action: push both generic EVENT_TICK and symbol-specific EVENT_TICK+vt_symbol events for flexible event handling
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies and applications relying on symbol-specific event filtering will not receive tick updates, breaking
      symbol-specific market data processing
    stage_ids:
    - market_data_gateway
  - id: finance-C-026
    when: When implementing gateway methods
    action: verify each gateway methods are non-blocking to prevent event engine starvation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Blocking gateway operations will stall the event processing loop, causing market data delays, missed ticks,
      and degraded trading performance
    stage_ids:
    - market_data_gateway
  - id: finance-C-027
    when: When implementing gateway connection handling
    action: automatically reconnect if connection to trading system is lost to maintain data continuity
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Loss of connection without automatic reconnection will halt market data flow, causing strategies to miss
      critical price movements and fail to manage positions
    stage_ids:
    - market_data_gateway
  - id: finance-C-028
    when: When using EventEngine for market data distribution
    action: understand that tick delivery involves queue-based asynchronous processing with inherent latency
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Strategies expecting synchronous tick delivery will experience unpredictable delays, causing order timing
      issues and potential fill price degradation
    stage_ids:
    - market_data_gateway
  - id: finance-C-029
    when: When deploying gateway implementations
    action: verify tick arrival latency meets exchange-specific requirements as the system relies on gateway-specific protocol
      implementations
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Tick data arriving beyond acceptable latency thresholds will cause stale quotes, missed trading opportunities,
      and incorrect market state interpretation
    stage_ids:
    - market_data_gateway
  - id: finance-C-030
    when: When connecting to different trading systems
    action: select specified gateway implementation as the system supports multiple broker protocols (CTP, IB, ESunny, etc.)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using incompatible gateway for a trading system will prevent connection, causing complete failure of market
      data retrieval and trading operations
    stage_ids:
    - market_data_gateway
  - id: finance-C-031
    when: When presenting market data capabilities
    action: claim true real-time streaming capability as the system uses polling-based mechanisms through gateway-specific
      protocols
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting polling-based tick delivery as true streaming will lead to incorrect latency expectations,
      causing user dissatisfaction and potential trading losses due to timing assumptions
    stage_ids:
    - market_data_gateway
  - id: finance-C-032
    when: When designing tick data processing
    action: always use TickData.datetime for timestamp-aware processing rather than relying solely on local arrival time
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using local arrival time instead of exchange timestamp will cause incorrect timestamp correlation, breaking
      time-sensitive analysis and backtesting accuracy
    stage_ids:
    - market_data_gateway
  - id: finance-C-037
    when: When implementing close order conversion for non-SHFE/INE exchanges
    action: prioritize CLOSETODAY before CLOSEYESTERDAY to match exchange priority rules
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect close order priority causes position mismatch when yesterday's position remains after close operations
    stage_ids:
    - order_management
  - id: finance-C-039
    when: When implementing position data event processing
    action: update OffsetConverter position state before executing new order requests
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using stale position data causes incorrect available volume calculation, leading to over-ordering and exchange
      rejection
    stage_ids:
    - order_management
  - id: finance-C-041
    when: When implementing order request conversion for net position mode
    action: bypass offset conversion when contract.net_position is True
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Net position mode contracts use unified position tracking; applying offset conversion causes incorrect position
      state
    stage_ids:
    - order_management
  - id: finance-C-042
    when: When implementing lock mode for SHFE hedger positions
    action: handle yesterday position closure first before opening new locked positions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Lock mode requires closing opposite yesterday position before opening new bidirectional positions; incorrect
      order causes position conflict and margin issues
    stage_ids:
    - order_management
  - id: finance-C-043
    when: When implementing order/trade data storage in OmsEngine
    action: use vt_orderid/vt_tradeid as unique keys for dictionary storage
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using non-vt_orderid keys causes duplicate order tracking and incorrect order state retrieval across multiple
      gateways
    stage_ids:
    - order_management
  - id: finance-C-045
    when: When implementing gateway order submission
    action: set OrderData.status to SUBMITTING after successful request send, REJECTED on failure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect status assignment causes order tracking confusion and prevents proper cancellation or retry logic
    stage_ids:
    - order_management
  - id: finance-C-047
    when: When presenting order management system outputs to users
    action: claim backtest order fills represent actual market execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest fills using bar open price do not reflect actual slippage, latency, or market impact; presenting
      these as real trades misleads users about strategy viability
    stage_ids:
    - order_management
  - id: finance-C-049
    when: When implementing offset converter creation per gateway
    action: maintain separate PositionHolding instances per vt_symbol within gateway-scoped OffsetConverter
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Shared position state across gateways causes cross-contamination of position data, leading to incorrect position
      tracking and risk management
    stage_ids:
    - order_management
  - id: finance-C-050
    when: When implementing order/trade data structure initialization
    action: generate vt_orderid combining gateway_name and orderid
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing vt_orderid prefix prevents cross-gateway order tracking and causes order ID collisions
    stage_ids:
    - order_management
  - id: finance-C-052
    when: When calculating position holding state after trade updates
    action: recalculate total position as sum of today and yesterday positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Manual position calculation without aggregation causes position drift from exchange records, eventually leading
      to position mismatch
    stage_ids:
    - order_management
  - id: finance-C-053
    when: When adding factor features to AlphaDataset
    action: use the add_feature() method with expression strings or pre-computed DataFrames
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Features added through other means will not be registered in feature_expressions or feature_results dictionaries,
      causing prepare_data() to skip them entirely and produce incomplete training datasets
    stage_ids:
    - alpha_research_data
  - id: finance-C-055
    when: When implementing ternary conditional logic
    action: cast comparison results to Int32 in DataProxy comparison operators
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without Int32 casting, boolean comparisons produce boolean Series which cannot be used correctly in quesval/quesval2
      conditional branching, resulting in incorrect factor values
    stage_ids:
    - alpha_research_data
  - id: finance-C-056
    when: When writing factor expressions with division
    action: add epsilon (1e-12) to denominators to prevent divide-by-zero errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero (e.g., high-low when price is flat, or volume when zero) produces NaN/Inf values that corrupt
      subsequent rolling window calculations and propagate throughout the dataset
    stage_ids:
    - alpha_research_data
  - id: finance-C-057
    when: When processing data with rolling window functions
    action: handle NaN propagation from rolling operations using fill_nan(None) or drop_nulls()
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN values from rolling calculations (e.g., window start, division by zero, or suspended trading days) propagate
      through factor calculations, corrupting feature values and model training data
    stage_ids:
    - alpha_research_data
  - id: finance-C-060
    when: When using ts_delay with positive window
    action: verify the requested historical data exists within the loaded dataset window
    severity: high
    kind: domain_rule
    modality: must
    consequence: If the lookback window exceeds the pre-loaded historical data, ts_delay returns NULL for early periods, corrupting
      factor values for all securities during the warmup period
    stage_ids:
    - alpha_research_data
  - id: finance-C-061
    when: When loading bar data for factor research
    action: set extended_days parameter large enough to cover the longest rolling window used
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Insufficient extended_days causes NaN values for early dates due to incomplete rolling windows, requiring
      data imputation or losing the initial training period
    stage_ids:
    - alpha_research_data
  - id: finance-C-062
    when: When implementing pow2 power operation
    action: check for NaN before casting to integer for exponent validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using cast(Int64) on NaN values raises an error; must use floor() method instead to safely detect integer
      exponents while handling NaN gracefully
    stage_ids:
    - alpha_research_data
  - id: finance-C-063
    when: When defining features that use IndNeutralize
    action: include IndNeutralize in factor expressions as it is not implemented
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Factor expressions with IndNeutralize will cause runtime errors or produce incorrect results since the operator
      is not available in the expression engine
    stage_ids:
    - alpha_research_data
  - id: finance-C-064
    when: When defining features that require cap/market_cap field
    action: include cap field in factor expressions as it is not available in the dataset schema
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Alpha56 requires market cap data which is not part of the standard OHLCV data schema, so this factor cannot
      be computed without adding cap data
    stage_ids:
    - alpha_research_data
  - id: finance-C-065
    when: When using the alpha factor research module
    action: claim that backtested factor returns equal expected live trading performance
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results include ideal execution, no slippage modeling, and survivorship bias; live trading faces
      transaction costs, market impact, and execution delays that cause performance divergence
    stage_ids:
    - alpha_research_data
  - id: finance-C-066
    when: When validating DataFrame column structure
    action: verify result DataFrame contains datetime and vt_symbol as the first two columns
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper index columns, expression engine cannot partition data correctly by security and time, causing
      incorrect factor calculations
    stage_ids:
    - alpha_research_data
  - id: finance-C-067
    when: When executing factor expressions via eval
    action: import operators locally to avoid polluting the global namespace
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using __import__ or global imports can cause namespace conflicts and security issues; operators must be injected
      into the local scope for safe eval() execution
    stage_ids:
    - alpha_research_data
  - id: finance-C-068
    when: When handling suspended trading days
    action: convert zero-value rows to NaN to represent non-trading periods
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Zeros in price/volume columns for suspended stocks are treated as valid data, corrupting ratios and rolling
      calculations; must be NaN to indicate no trading activity occurred
    stage_ids:
    - alpha_research_data
  - id: finance-C-069
    when: When calling add_feature with both expression and result
    action: provide both expression and result parameters simultaneously
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Providing both parameters creates ambiguity and the code explicitly raises ValueError to prevent this configuration
      error
    stage_ids:
    - alpha_research_data
  - id: finance-C-070
    when: When computing rolling correlation with insufficient data
    action: set min_samples parameter to handle edge cases at window start
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Insufficient samples in rolling window causes correlation to return NaN or infinite values; setting min_samples=1
      allows partial window calculation with available data
    stage_ids:
    - alpha_research_data
  - id: finance-C-071
    when: When computing standard deviation in rolling windows
    action: use ddof=0 (population standard deviation) for consistency with financial factor definitions
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using sample std (ddof=1) produces different values than expected by WorldQuant/Qlib factor definitions,
      causing factor mismatches and incorrect rankings
    stage_ids:
    - alpha_research_data
  - id: finance-C-072
    when: When processing infinite values from statistical calculations
    action: convert infinite values to None to prevent propagation in subsequent calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Infinite correlation values from constant series corrupt factor calculations and downstream model training;
      must be explicitly handled
    stage_ids:
    - alpha_research_data
  - id: finance-C-073
    when: When using multiprocessing for feature calculation
    action: use 'spawn' context to verify clean process state for polars operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using fork context can cause polars memory corruption and deadlock; spawn context creates fresh Python processes
      that properly initialize polars DataFrames
    stage_ids:
    - alpha_research_data
  - id: finance-C-074
    when: When performing cross-sectional scale normalization
    action: handle division by zero when sum_abs equals zero for each securities
    severity: medium
    kind: domain_rule
    modality: must
    consequence: If all securities have zero values in a cross-section, cs_scale division by zero produces NaN; explicit zero-check
      prevents this edge case
    stage_ids:
    - alpha_research_data
  - id: finance-C-075
    when: When defining the test dataset
    action: include the label column at the last position in the DataFrame schema
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Label at non-final position causes confusion in feature/label separation; the code explicitly moves label
      to last column after merge operations
    stage_ids:
    - alpha_research_data
  - id: finance-C-079
    when: When extracting features from AlphaDataset
    action: Extract features from DataFrame columns starting at index 2 up to but excluding the last column (label)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect column slicing would include datetime/vt_symbol as features or exclude the label column, corrupting
      the feature matrix and producing invalid model inputs
    stage_ids:
    - alpha_modeling
  - id: finance-C-081
    when: When accessing data for model training or inference
    action: Use AlphaDataset interface methods (fetch_learn/fetch_infer) instead of direct data access
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing the AlphaDataset interface would skip data processing pipelines (normalization, feature engineering),
      producing predictions on raw unprocessed data that differ from expected behavior
    stage_ids:
    - alpha_modeling
  - id: finance-C-082
    when: When sorting data before model processing
    action: Sort DataFrame by [datetime, vt_symbol] before feature extraction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unsorted data would cause features extracted from columns[2:-1] to be misaligned with their corresponding
      labels, corrupting the temporal ordering required for time-series models
    stage_ids:
    - alpha_modeling
  - id: finance-C-083
    when: When training MLP models
    action: Normalize features before MLP training to prevent gradient explosion
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unnormalized features cause gradient explosion in MLP, leading to NaN losses, divergence, and failed training
      that produces no useful alpha signals
    stage_ids:
    - alpha_modeling
  - id: finance-C-084
    when: When configuring early stopping for model training
    action: Set early_stopping_rounds to a value greater than 0 to prevent indefinite training
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Zero early stopping rounds would train until max iterations, wasting compute resources and risking overfitting
      without validation-based stopping
    stage_ids:
    - alpha_modeling
  - id: finance-C-085
    when: When requiring reproducible model training
    action: Set random seed in model constructor when reproducibility is required
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without seed setting, each training run produces different model weights and predictions, preventing result
      reproducibility and debugging
    stage_ids:
    - alpha_modeling
  - id: finance-C-086
    when: When generating predictions from trained alpha models
    action: Present backtest predictions as guaranteed live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Claiming backtest alpha predictions as live trading results ignores market regime changes, transaction costs,
      slippage, and execution delays that cause significant performance divergence
    stage_ids:
    - alpha_modeling
  - id: finance-C-087
    when: When interpreting MLP feature importance values
    action: Treat perturbation-based feature importance as ground-truth causal factors
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: MLP feature importance calculated via input perturbation is numerically unstable and does not indicate true
      causal importance, potentially misleading factor analysis
    stage_ids:
    - alpha_modeling
  - id: finance-C-088
    when: When selecting MLP architecture hyperparameters
    action: Use ReduceLROnPlateau scheduler with specified patience (10) to avoid suboptimal convergence
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without learning rate reduction, MLP may converge to suboptimal local minima, producing weaker alpha signals
      compared to properly scheduled training
    stage_ids:
    - alpha_modeling
  - id: finance-C-089
    when: When training LASSO models
    action: Merge TRAIN and VALID segments before fitting to maximize training data
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: LASSO lacks early stopping mechanism, so training only on TRAIN segment wastes VALID data that could improve
      coefficient estimates
    stage_ids:
    - alpha_modeling
  - id: finance-C-090
    when: When using LgbModel early stopping
    action: Access best_iteration attribute after training to determine optimal rounds
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Not checking best_iteration means training may run unnecessary boost rounds, wasting compute without improving
      model quality
    stage_ids:
    - alpha_modeling
  - id: finance-C-092
    when: When calculating daily return using pct_change
    action: use shift(1) on balance before pct_change to avoid look-ahead bias
    severity: high
    kind: domain_rule
    modality: must
    consequence: First day's return will be calculated as current_balance / 0 or infinity, corrupting Sharpe ratio and all
      return-based statistics
    stage_ids:
    - alpha_backtesting
  - id: finance-C-093
    when: When computing Sharpe ratio denominator
    action: check return_std is non-zero before dividing to avoid division by zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sharpe ratio will be set to infinity or NaN when return_std is zero, corrupting performance metrics output
    stage_ids:
    - alpha_backtesting
  - id: finance-C-094
    when: When calculating max drawdown
    action: find drawdown minimum to identify worst peak-to-trough loss
    severity: high
    kind: domain_rule
    modality: must
    consequence: Max drawdown will be incorrectly calculated, showing positive values instead of negative, breaking return_drawdown_ratio
      calculation
    stage_ids:
    - alpha_backtesting
  - id: finance-C-095
    when: When processing orders in limit market
    action: check bar.low_price and bar.high_price against limit thresholds to detect full-day limit-up/down markets
    severity: high
    kind: domain_rule
    modality: must
    consequence: Orders will incorrectly fill during full-day limit-up or limit-down markets when no actual trading occurred
    stage_ids:
    - alpha_backtesting
  - id: finance-C-096
    when: When implementing backtesting for non-Chinese markets
    action: use annual_days=240 for annualized return calculations
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: 'Annualized returns will be miscalculated: US markets with 252 days will show ~5% lower annual return; markets
      with fewer trading days will show inflated returns'
    stage_ids:
    - alpha_backtesting
  - id: finance-C-098
    when: When setting initial capital for backtesting
    action: assume 1,000,000 CNY default capital suits each portfolio sizes
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Strategy allocation percentages will be wrong; a small-cap strategy using default capital will show unrealistic
      position sizes; large-cap strategy will show unrealistic concentration
    stage_ids:
    - alpha_backtesting
  - id: finance-C-102
    when: When managing positions during bar processing
    action: update self.pre_closes before strategy.on_bars for correct limit price calculation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Limit up/down prices will be calculated with stale pre_close values, causing incorrect order crossing decisions
    stage_ids:
    - alpha_backtesting
  - id: finance-C-103
    when: When calculating commission for equity trades
    action: apply max(turnover * rate, min_commission) to prevent tiny-order commission abuse
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Tiny orders will generate commission below broker minimums, inflating net PnL by small amounts that accumulate
      over many micro-trades
    stage_ids:
    - alpha_backtesting
  - id: finance-C-104
    when: When filling missing bar data
    action: use previous close_price as each OHLC values to maintain price continuity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing bars will introduce spurious high/low prices that trigger incorrect limit order crossings, generating
      fake fills
    stage_ids:
    - alpha_backtesting
  - id: finance-C-105
    when: When handling first trading day without pre_close
    action: set pre_close to 0 and accept zero holding PnL for first day
    severity: low
    kind: domain_rule
    modality: must
    consequence: First day holding PnL will be zero regardless of position; this is intentional to avoid division by zero
      but must be documented
    stage_ids:
    - alpha_backtesting
  - id: finance-C-107
    when: When presenting Sharpe ratio and drawdown metrics
    action: claim these statistics represent actual risk characteristics of live trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Sharpe ratio assumes normal distribution of returns which does not hold for live trading; max drawdown is
      backward-looking and does not predict future worst-case losses
    stage_ids:
    - alpha_backtesting
  - id: finance-C-108
    when: When executing limit order crossing
    action: use min(order_price, bar.open_price) for long crosses and max(order.price, bar.open_price) for short crosses
    severity: high
    kind: domain_rule
    modality: must
    consequence: Trade price will exceed limit price for long orders, violating limit order semantics; worse fill prices will
      artificially reduce PnL
    stage_ids:
    - alpha_backtesting
  - id: finance-C-109
    when: When updating daily close prices
    action: use bar.close_price when available, otherwise fall back to pre_close to handle suspended trading days
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Suspended trading days with no close price will cause zero holding PnL, but the code falls back to pre_close
      to avoid this issue
    stage_ids:
    - alpha_backtesting
  - id: finance-C-110
    when: When calculating net PnL
    action: subtract commission from total_pnl to get net_pnl for final portfolio value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Final balance will include gross PnL without transaction costs, overstating returns by total commission paid
      over the backtest period
    stage_ids:
    - alpha_backtesting
  - id: finance-C-112
    when: When calculating annualized return
    action: multiply daily return by annual_days rather than using calendar days
    severity: high
    kind: domain_rule
    modality: must
    consequence: Annualized return will be incorrect for non-daily frequencies or markets with different trading day counts;
      Sharpe ratio will also be miscalculated
    stage_ids:
    - alpha_backtesting
  - id: finance-C-114
    when: When converting infinite or NaN values in statistics
    action: replace inf and -inf with 0, then apply nan_to_num to sanitize each statistics
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Statistics dict will contain non-serializable inf values causing JSON export failures or downstream calculations
      to fail
    stage_ids:
    - alpha_backtesting
  - id: finance-C-115
    when: When calculating return_drawdown_ratio
    action: check max_drawdown is non-zero and negative before dividing to avoid infinity results
    severity: medium
    kind: domain_rule
    modality: must
    consequence: If max_drawdown is 0 (no drawdown occurred), return_drawdown_ratio becomes infinity; if max_drawdown is positive,
      ratio becomes negative incorrectly
    stage_ids:
    - alpha_backtesting
  - id: finance-C-117
    when: When implementing an RpcServer subclass
    action: call register() for each remote functions before calling start()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Remote function calls will fail with KeyError because the function lookup in self._functions dictionary will
      return nothing
    stage_ids:
    - rpc_communication
  - id: finance-C-118
    when: When implementing an RpcClient subclass
    action: call start() before invoking any proxy method calls via __getattr__
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: ZMQ socket operations will fail because sockets are only connected in start() method at lines 100-101
    stage_ids:
    - rpc_communication
  - id: finance-C-119
    when: When implementing an RpcClient subclass
    action: override the callback() method to handle pushed data from server
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pushed data will raise NotImplementedError at runtime when server publishes data to subscribed topics
    stage_ids:
    - rpc_communication
  - id: finance-C-120
    when: When creating an RpcServer
    action: pass matching address pairs to rep_address and pub_address parameters
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Client will fail to connect or receive data because ZMQ REQ/REP and PUB/SUB address pairs must correspond
      between server and client
    stage_ids:
    - rpc_communication
  - id: finance-C-121
    when: When connecting RpcClient to RpcServer
    action: call subscribe_topic() before start() to receive pushed data on that topic
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Subscription filters are only active after connecting to socket, so messages published before start() will
      be missed
    stage_ids:
    - rpc_communication
  - id: finance-C-122
    when: When making remote function calls
    action: use the timeout parameter or accept default 30000ms timeout for blocking operations
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Long-running server functions will block the client indefinitely without explicit timeout handling
    stage_ids:
    - rpc_communication
  - id: finance-C-123
    when: When running distributed RPC over network
    action: deploy this RPC module in unreliable WAN or internet environments
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: ZMQ PUB/SUB has no delivery guarantee and TCP keepalive may not maintain connections over NAT/firewalls
    stage_ids:
    - rpc_communication
  - id: finance-C-124
    when: When implementing callback for pushed data
    action: process heartbeat topic in callback logic as regular data
    severity: low
    kind: architecture_guardrail
    modality: must_not
    consequence: Heartbeat messages will be incorrectly processed as application data since they are filtered at line 142
      in client.py run() method
    stage_ids:
    - rpc_communication
  - id: finance-C-125
    when: When expecting real-time market data delivery
    action: rely on ZMQ PUB/SUB for guaranteed message delivery
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: PUB socket is fire-and-forget; subscribers may miss messages if not connected when published (slow subscriber
      problem)
    stage_ids:
    - rpc_communication
  - id: finance-C-126
    when: When requiring authentication or encryption
    action: expect built-in authentication or encryption in the base vnpy.rpc module
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: 'RPC module was explicitly designed without authentication support (CHANGELOG: 移除rpc子模块对于鉴权的支持)'
    stage_ids:
    - rpc_communication
  - id: finance-C-127
    when: When monitoring client connection health
    action: override on_disconnected() callback to handle heartbeat loss detection
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Connection failures will only print a message without triggering recovery actions
    stage_ids:
    - rpc_communication
  - id: finance-C-128
    when: When using TCP transport protocol
    action: specify exact port numbers in address strings since dynamic port binding is not supported
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using dynamic ports (* or 0) on server side will cause client connection failures due to address mismatch
    stage_ids:
    - rpc_communication
  - id: finance-C-129
    when: When debugging RPC communication failures
    action: skip verifying address consistency between server bind() and client connect() calls
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: RPC calls will timeout silently if addresses don't match; most common misconfiguration error
    stage_ids:
    - rpc_communication
  - id: finance-C-130
    when: When running the heartbeat mechanism
    action: verify client poll timeout (HEARTBEAT_TOLERANCE * 1000) is longer than server heartbeat interval
    severity: low
    kind: resource_boundary
    modality: must
    consequence: False disconnection detection will trigger on_disconnected() callbacks repeatedly (tolerance=30s > interval=10s
      gives 3x margin)
    stage_ids:
    - rpc_communication
  - id: finance-C-131
    when: When implementing thread-safe RPC calls from multiple threads
    action: use the lock mechanism (self._lock) since ZMQ sockets are not inherently thread-safe
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Concurrent sends on REQ socket from multiple threads will corrupt message framing and cause protocol errors
    stage_ids:
    - rpc_communication
  - id: finance-C-136
    when: When implementing balance/equity checks in backtesting loop
    action: Reject and terminate the backtest when account balance <= 0 — implement bankruptcy detection that halts simulation
      when account is wiped out
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without bankruptcy detection, strategies that violate risk controls continue running with depleted capital,
      producing meaningless backtest results that don't reflect live trading behavior where margin calls or forced liquidations
      occur
    derived_from_bd_id: BD-011
  - id: finance-C-137
    when: When initializing RpcServer and registering service handlers
    action: Call register() for each service handlers before calling start() — the start() method enters an infinite blocking
      run loop that processes RPC requests, and any handlers registered after start() are never invoked because the registration
      code becomes unreachable
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Registering handlers after start() causes them to never be invoked since the blocking loop is already running
      — services silently fail with no error messages, making this initialization order bug hard to diagnose
    derived_from_bd_id: BD-081
  - id: finance-C-138
    when: When calling calculate_pnl() on PortfolioDailyResult across multiple trading days
    action: Verify trading days are processed in strict date-ascending order — pre_closes and start_poses dictionaries carry
      state forward from previous day, and out-of-order processing causes stale pre_closes to be used with current prices,
      producing incorrect PnL
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Processing days out of order causes stale previous-day closing prices to be used with current prices, resulting
      in incorrect daily PnL calculations that accumulate silently over time and make backtest results unreliable for strategy
      evaluation
    derived_from_bd_id: BD-079
  - id: finance-C-139
    when: When using Alpha101 expression language functions for factor calculation
    action: Use cs_ prefix functions (cs_rank, cs_zscore) with groupby on vt_symbol within each timestamp for cross-sectional
      normalization; use ts_ prefix functions (ts_mean, ts_std) with rolling window specs for time-series calculations — never
      interchange cs_ and ts_ function types
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using cs_ functions without proper grouping produces factor values normalized across wrong units; using ts_
      functions without sufficient history produces NaN or stale values — both errors silently corrupt factor quality and
      degrade strategy performance
    derived_from_bd_id: BD-087
  - id: finance-C-140
    when: When implementing or extending Alpha101 factor expressions in the expression language
    action: Verify new functions follow cs_ (cross-sectional, requires groupby context) vs ts_ (time-series, requires window
      spec) naming convention and documentation — adding functions that don't follow this distinction will confuse users and
      cause incorrect factor calculations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Functions without proper cs_/ts_ classification may be used incorrectly by strategy developers, producing
      factors with wrong normalization semantics and silently degrading model training quality
    derived_from_bd_id: BD-087
  - id: finance-C-141
    when: When designing event-driven trading systems with high-frequency event streams
    action: Verify each event listeners are non-blocking — avoid synchronous I/O, complex computation, or any operation that
      may cause latency spikes within the listener callback
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Synchronous listeners block subsequent events of the same type in the FIFO queue, causing latency spikes
      that compound in high-frequency scenarios and potentially missing time-critical trading signals
    derived_from_bd_id: BD-091
  - id: finance-C-142
    when: When implementing or depending on order event timestamps in production trading
    action: Assume the framework distinguishes between as-of time (when the market event occurred) and processing time (when
      the system received the event) — the framework does not implement this distinction
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without as-of vs processing time differentiation, order matching and latency calculations use system receive
      time instead of market event time, causing incorrect signal attribution and degraded execution quality analysis in production
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-143
    when: When processing order events in production trading systems
    action: Implement a custom timestamp tracking mechanism that captures both event_time (as-of) and process_time (receipt),
      using event_time for order matching decisions and process_time for system performance monitoring
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without explicit as-of time tracking, production order matching uses stale processing timestamps, causing
      incorrect latency measurements and potentially mismatched signals in high-frequency trading scenarios
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-144
    when: When implementing feature calculation logic in the market data gateway
    action: Convert zero-sum rows to NaN during factor calculations — suspended trading days must not produce factor signals
      from zero-volume data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without NaN conversion, zero-sum rows from suspended trading days create misleading factor signals that propagate
      through the entire backtest, causing strategies to behave unrealistically around market suspensions
    derived_from_bd_id: BD-018
  - id: finance-C-145
    when: When configuring initial capital for backtesting using the framework's default
    action: Verify that initial_capital=1000000 matches your actual available capital and trading scale — the default 1M RMB
      may not reflect real account constraints or optimal position sizing
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using the default 1M RMB capital without adjustment causes position sizing errors in live trading; strategies
      optimized for 1M with 10% allocation (100K per position) will underperform if actual capital differs significantly
    derived_from_bd_id: BD-007
  - id: finance-C-146
    when: When calculating Sharpe ratio for strategy evaluation using the framework's default risk-free rate
    action: Verify that risk_free_rate=0 aligns with your trading context — futures traders may accept 0 due to margin requirements,
      but equity strategies should use benchmark rates (e.g., 0.03-0.05 annual) for accurate risk-adjusted performance
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using risk_free_rate=0 inflates Sharpe ratios for positive-return strategies; long-only equity strategies
      may show Sharpe 2.0 instead of realistic 1.2 when compared against actual opportunity cost of capital
    derived_from_bd_id: BD-009
  - id: finance-C-147
    when: When implementing daily return calculation logic for backtest performance reporting
    action: Include commission costs in daily return calculations — use NetPnL plus commission as the final daily return metric
      to verify backtest reflects realistic net profitability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calculating returns without commission causes backtest to overestimate profitability by transaction cost
      margin; high-frequency strategies may show 15-20% returns that become breakeven after actual commission deductions in
      live trading
    derived_from_bd_id: BD-010
  - id: finance-C-148
    when: When implementing the 5-step pipeline or loading data for backtesting
    action: Assume that strict pipeline ordering (set_parameters→add_strategy→load_data→run_backtesting→calculate_statistics)
      guarantees train/test temporal integrity — the pipeline enforces method sequence, NOT data segment boundaries
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Relying on pipeline ordering for temporal integrity causes data leakage where training and validation sets
      share overlapping time periods, systematically inflating backtest performance metrics by 10-30%
    derived_from_bd_id: BD-103
  - id: finance-C-149
    when: When calculating annualized performance metrics (Sharpe ratio, annual return) for non-Chinese markets
    action: Assume the framework's default annual_days=240 applies to your market — US equities use 252, crypto uses 365,
      and using 240 for non-A-share markets produces systematically incorrect annualized metrics
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Using annual_days=240 for US stock backtests underestimates annual volatility by 5% and misrepresents Sharpe
      ratio, causing strategies to appear less attractive than they truly are or vice versa when comparing across markets
    derived_from_bd_id: BD-086
  - id: finance-C-150
    when: When calling model.predict() via AlphaLab.backtest() or get_infer_dataset()
    action: Verify model.fit() has been called before any model.predict() invocation — the AlphaLab enforces this ordering
      contract; using an untrained model produces predictions equivalent to random noise
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling predict() without prior fit() produces random predictions that corrupt backtest results; strategies
      will appear profitable by chance, leading to complete failure in live trading
    derived_from_bd_id: BD-089
  - id: finance-C-151
    when: When processing historical market data for event-driven backtesting
    action: Assume point-in-time data availability is complete across each historical periods — the framework does not implement
      point-in-time data integrity checks; survivorship bias and look-ahead bias may exist in historical datasets
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time data verification, backtests include delisted stocks and adjusted prices that were
      unavailable at trading time, causing look-ahead bias where strategies exploit future information
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-152
    when: When preparing historical datasets for backtesting in event-driven systems
    action: Verify data vendor provides point-in-time correct data fields including торговая_дата (trading date), list_date
      (inclusion date), and delist_date (removal date) — filter to торговая_дата >= list_date and торговая_дата <= delist_date
      for each instrument
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-point-in-time data causes survivorship bias where delisted companies are excluded from historical
      analysis, making strategies appear more robust than they would have been during actual trading periods
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-156
    when: When implementing volatility-adjusted position sizing and stop-loss logic
    action: Use Talib's ta_atr function for ATR calculation to verify consistency with standard volatility proxies and proper
      gap/limit-move handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using custom ATR implementation risks inconsistency with standard volatility proxies used by other systems,
      potentially causing position sizing and stop-loss orders to deviate from expected risk management parameters
    derived_from_bd_id: BD-060
  - id: finance-C-157
    when: When implementing factor confidence scoring for rolling regressions
    action: Calculate rolling R-squared from regression statistics to measure relationship strength between factors and predictions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without rolling R-squared calculation, factor weighting cannot adapt to regime changes or noise periods,
      causing strategies to maintain positions in deteriorating relationships
    derived_from_bd_id: BD-062
  - id: finance-C-158
    when: When normalizing factor values for cross-factor comparison or machine learning model inputs
    action: Calculate rolling percentile rank using scipy percentileofscore to transform absolute values to bounded [0,1]
      signals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without rolling percentile rank normalization, heterogeneous factor values cannot be directly compared, and
      machine learning models receive unbounded inputs causing prediction degradation
    derived_from_bd_id: BD-063
  - id: finance-C-159
    when: When training machine learning models for strategy predictions
    action: Implement early stopping with patience=50 rounds to halt training when validation loss fails to improve, preventing
      overfitting while allowing sufficient tolerance for noisy validation curves
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without early stopping at 50-round patience, models may overfit to training data causing poor generalization,
      or stopping too early may result in underfitted models with suboptimal predictive performance
    derived_from_bd_id: BD-074
  - id: finance-C-160
    when: When analyzing feature importance to understand model behavior or perform feature selection
    action: Apply Gaussian noise perturbation to each feature and measure prediction degradation for model-agnostic importance
      scoring
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without noise perturbation feature importance, gradient-based methods may miss non-differentiable feature
      effects, leading to incorrect feature removal or failure to identify harmful features
    derived_from_bd_id: BD-076
  - id: finance-C-161
    when: When measuring portfolio risk using peak-to-trough decline
    action: Calculate drawdown as current balance minus running maximum (peak) — drawdowns persist until new equity highs
      are achieved, not reset by rolling windows
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using rolling window drawdown instead of running maximum incorrectly resets peak tracking, causing underestimation
      of actual portfolio decline and premature stop-loss triggering
    derived_from_bd_id: BD-056
  - id: finance-C-162
    when: When converting daily or periodic returns to annualized equivalents for performance comparison
    action: Use 240 trading days annualization factor for equity markets; verify market-specific holiday calendars for non-standard
      markets and adjust accordingly
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Annualizing with 240 days may under/overestimate for markets with different holiday schedules or trading
      frequencies, causing unfair strategy comparison across markets
    derived_from_bd_id: BD-057
  - id: finance-C-163
    when: When constructing equity curves for NAV reporting or downstream metric calculations
    action: Initialize balance from known starting capital and accumulate net PnL over time; do not account for intraday cash
      flows, dividends, or funding costs in basic balance calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Balance calculation that includes intraday cash flows or ignores dividends causes NAV reporting to diverge
      from actual portfolio value, leading to incorrect performance attribution
    derived_from_bd_id: BD-058
  - id: finance-C-164
    when: When modifying trading hours definitions or process lifecycle management logic
    action: Modify BD-003 (trading hours) or BD-004 (process lifecycle) without explicit verification that both systems remain
      synchronized — trading hours definition is a gate for process management
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Changing trading hours without verifying process lifecycle logic causes child process startup timing errors,
      potentially launching processes outside valid trading windows or missing trading session initialization
    derived_from_bd_id: BD-098
  - id: finance-C-165
    when: When implementing event-driven core components with monetary or measurement values
    action: Assume the framework automatically handles currency and unit annotation — the framework does not implement explicit
      currency/unit metadata; each numeric values are treated as dimensionless
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit currency annotation, multi-currency portfolios cannot differentiate between USD/CNY/EUR
      positions, causing incorrect PnL aggregation and margin calculations in live trading
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-166
    when: When defining position or balance fields in event-driven core
    action: Implement explicit currency metadata (e.g., currency field or enum) and unit specification for each monetary/measurement
      fields; verify currency conversion is applied before any cross-currency aggregation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without currency annotation, positions in different currencies are incorrectly summed, leading to margin
      calculation errors and potential forced liquidation warnings in live trading
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-167
    when: When processing signals in bar-based event-driven backtesting
    action: 'Implement explicit signal-execution timing: queue signals generated during bar N and execute them at bar N+1
      open (next-bar execution) or explicitly mark same-bar execution mode with timestamp validation'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper signal-execution timing, backtests exhibit look-ahead bias where trades execute at prices
      that would not have been available at signal time in live trading
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-168
    when: When implementing carry and funding cost calculations in event-driven strategies
    action: Assume the framework automatically models funding costs and carry for positions — the framework does not implement
      funding cost modeling; positions are treated as costless carries
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without funding cost modeling, long-short strategies appear more profitable than in live trading where short
      borrow costs and margin interest significantly reduce returns
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-169
    when: When backtesting long-short or margin-financed strategies
    action: 'Implement funding cost calculation: deduct short borrow rate from short positions, apply margin interest rate
      to long positions financed by margin, using daily_cost = position_value * (borrow_rate + margin_rate) / 365'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without carry modeling, long-short strategies show inflated returns; in live trading, short borrow costs
      of 3-8% annually for stocks eliminate strategy profitability
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-170
    when: When implementing portfolio rebalancing logic in event-driven backtesting
    action: Assume the framework automatically handles rebalancing trigger conditions — the framework does not implement rebalancing
      trigger mechanism; portfolio weights remain static unless manually adjusted
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without rebalancing triggers, portfolio drift is not detected or corrected, causing strategies to drift from
      target allocations and accumulate unintended risk
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-171
    when: When implementing portfolio management in event-driven strategies
    action: 'Implement explicit rebalancing trigger mechanism: define drift_threshold (e.g., 5% deviation from target weights)
      or time-based intervals (e.g., daily/weekly/monthly), and verify trigger conditions are evaluated at each bar close'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without rebalancing triggers, portfolio weights drift significantly over time, causing actual risk exposure
      to diverge from strategy design and backtest assumptions
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-172
    when: When configuring data provider connections in event-driven core
    action: Assume the framework automatically handles provider priority and credential isolation — the framework does not
      implement provider priority or credential management; each providers share the same connection context
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without provider priority, backtests fail completely when a single data provider is unavailable; without
      credential isolation, API keys may be exposed across different provider configurations
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-173
    when: When configuring multiple data providers in event-driven backtesting
    action: 'Implement provider priority: create fallback chain (primary, secondary, tertiary providers) with credential isolation
      using environment-specific config or secrets manager; verify graceful degradation when primary fails'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without provider priority and credential isolation, backtests fail on any single provider outage and credentials
      may leak across environments
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-174
    when: When using ReduceLROnPlateau scheduler for model training
    action: Verify that plateau detection threshold (factor to monitor) and reduction factor are tuned for the specific loss
      landscape; for volatile financial time series, set patience=3-5 epochs and factor=0.5 to avoid premature LR reduction
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without proper plateau detection tuning, learning rate may reduce too early (insufficient exploration) or
      too late (wasted training time), leading to suboptimal model convergence
    derived_from_bd_id: BD-072
  - id: finance-C-176
    when: When calculating annualized performance metrics (Sharpe, volatility, Sortino) in BacktestingEngine
    action: Use hardcoded annualization_factor=240 for Sharpe/volatility/Sortino calculations — this is only valid for Chinese
      A-share markets; for US markets use 252, for crypto use 365
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Hardcoded 240-day annualization silently biases all performance metrics; US strategies appear 5% worse (240/252)
      and crypto strategies appear 34% worse (240/365), causing incorrect strategy comparison
    derived_from_bd_id: BD-097
  - id: finance-C-177
    when: When initializing BacktestingEngine for non-Chinese market backtesting
    action: 'Configure market-specific annualization factor at BacktestingEngine initialization: pass annualization_factor=252
      for US equities, 365 for crypto, or use market calendar lookup; do not rely on default 240'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using the hardcoded 240-day factor for non-Chinese markets causes systematic bias in all performance reports,
      leading to incorrect strategy selection based on inflated/deflated Sharpe ratios
    derived_from_bd_id: BD-097
  - id: finance-C-178
    when: When implementing matrix operations in production quantitative strategies
    action: Assume the framework handles matrix ill-conditioning and numerical stability internally — matrix operations (e.g.,
      covariance matrix inversion, linear regression) may fail silently or produce unreliable results under ill-conditioned
      inputs
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Ill-conditioned matrices cause numerical overflow, NaN propagation, or silently incorrect results that corrupt
      portfolio optimization and risk calculations, leading to wrong trading signals
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-179
    when: When implementing quantitative models that require matrix operations
    action: 'Implement explicit numerical stability checks: (1) compute condition number before matrix inversion, reject if
      condition_number > 1e10, (2) use SVD-based pseudoinverse instead of direct inversion for near-singular matrices, (3)
      add eigenvalue stability validation for covariance matrices'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit stability checks, ill-conditioned matrices cause portfolio optimization to fail or produce
      degenerate solutions, leading to incorrect position sizing and catastrophic losses
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-180
    when: When processing timestamps from cross-exchange data feeds
    action: Assume timestamps are timezone-aware or consistently normalized — the framework does not implement explicit timezone
      normalization; raw timestamps from different exchanges may be in local timezones causing silent timing errors
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without timezone normalization, cross-exchange strategies execute orders at wrong times due to UTC offset
      mismatches, causing orders to be rejected or filled at incorrect prices when markets are closed
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-181
    when: When implementing cross-exchange trading strategies with multi-timezone data
    action: 'Normalize each timestamp fields to UTC at data ingestion: (1) parse timestamps with explicit timezone information,
      (2) convert to UTC datetime64[ns] before storage, (3) validate timestamp ranges against expected market hours for each
      timezone'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failing to normalize timestamps to UTC causes cross-exchange timing misalignment, leading to orders submitted
      outside valid market hours or filled at stale prices due to daylight saving transitions
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-182
    when: When implementing server process management in no_ui trading mode
    action: Use multiprocessing.Process for server process spawning — ensures complete process isolation preventing GIL contention
      and shared state corruption between the main trading engine and child server processes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using threading instead of multiprocessing causes GIL contention and potential state corruption in no_ui
      mode, leading to race conditions, data corruption, or deadlocks during high-frequency server operations
    derived_from_bd_id: BD-002
  - id: finance-C-183
    when: When configuring database connectivity for backtesting with missing drivers
    action: Verify that SQLite fallback produces functionally equivalent results to the intended database driver — SQLite
      has different transaction isolation, concurrency limits, and may cause silent behavioral differences in high-frequency
      strategies
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Silent SQLite fallback masks driver configuration issues and may produce backtest results inconsistent with
      live trading, where PostgreSQL/MySQL behavior differs in transaction handling and connection pooling
    derived_from_bd_id: BD-001
  - id: finance-C-185
    when: When using RpcClient proxy methods in backtesting or live trading
    action: Call RpcClient.start() to establish ZMQ connection BEFORE invoking any proxy method calls — lru_cache on __getattr__
      caches proxy objects before connection is established, causing ENOTSOCK errors if methods are called prematurely
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Calling proxy methods before start() causes ZMQ to attempt sending over uninitialized sockets, resulting
      in ENOTSOCK errors and complete communication failure between components
    derived_from_bd_id: BD-080
  - id: finance-C-186
    when: When implementing or extending AlphaStrategy subclasses
    action: Execute on_init() callback before on_start() — verify each technical indicators (moving averages, RSI, Bollinger
      Bands) are initialized as instance attributes in on_init() before strategy starts receiving market data in on_start()
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Running on_start() before on_init() causes AttributeError or returns None when accessing uninitialized indicator
      attributes, corrupting trading signals and producing invalid strategy output
    derived_from_bd_id: BD-078
  - id: finance-C-188
    when: When implementing cross-sectional factor normalization in alpha module
    action: Apply both MAD-based normalization and Z-score normalization to the same factor pipeline without resolving the
      contradictory statistical assumptions about factor distribution
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using MAD normalization and Z-score normalization on the same factor creates conflicting statistical assumptions—if
      factors have outliers requiring MAD robustness, they violate Z-score normality assumptions, causing unpredictable and
      potentially inverted factor values that corrupt strategy rankings
    derived_from_bd_id: BD-101
  - id: finance-C-189
    when: When implementing event-driven data processing in backtesting or live trading
    action: Assume the framework automatically handles stale data detection and expiry policy — the framework lacks built-in
      stale data detection and automatic data expiry handling
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without stale data detection, outdated market data events trigger incorrect strategy calculations, causing
      orders to be placed based on stale prices that no longer reflect current market conditions
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-190
    when: When implementing event-driven data processing
    action: 'Implement data timestamp validation before processing events: check event_timestamp is within [data_fetch_time,
      current_time] with configurable max_age threshold per data source type'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit stale data handling, outdated prices in event streams cause strategies to react to expired
      data, leading to failed order executions or incorrect position calculations that diverge from expected backtest results
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-191
    when: When implementing lookback period calculation for historical data retrieval in market_data_gateway
    action: Extend data fetch start date using timedelta(extended_days) beyond analysis period start to verify technical indicators
      have sufficient warmup data — do not remove or replace with fixed buffer without validating each indicators have sufficient
      lookback
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a fixed or insufficient lookback buffer causes early indicator values to be NaN or truncated during
      warmup period, leading to delayed or missed entry signals in live trading that differ from backtest results
    derived_from_bd_id: BD-019
  - id: finance-C-192
    when: When implementing close order generation for non-SHFE/INE futures in order_management
    action: 'Generate close orders in sequence: close today positions first, then close yesterday positions — maintain this
      order for non-SHFE/INE Chinese futures exchanges'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reversing the close order (closing yesterday positions before today positions) violates Chinese exchange
      priority rules, potentially causing insufficient margin for today positions and rejected close orders in live trading
    derived_from_bd_id: BD-029
  - id: finance-C-193
    when: When implementing multi-symbol price comparison or normalization in backtesting
    action: Verify that normalization uses the first close price of each symbol's data series as baseline, and confirm this
      matches the strategy's intended comparison methodology (not Z-score or percentage returns from initial price)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using different normalization methods (Z-score, percentage returns) produces incompatible comparison results
      across symbols; strategies expecting first-close normalization will misjudge relative performance, leading to incorrect
      symbol selection and suboptimal allocation
    derived_from_bd_id: BD-017
  - id: finance-C-194
    when: When configuring connection monitoring or heartbeat timeout parameters
    action: Verify that 30-second tolerance for heartbeat loss detection matches actual network latency characteristics; adaptive
      timeout or reduced tolerance may be needed for high-frequency trading where delayed failure detection causes missed
      signals
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using fixed 30-second heartbeat tolerance may cause delayed detection of true connection failures; in high-frequency
      strategies, this delay results in stale order execution attempts and potential financial loss from unfilled or incorrectly
      priced orders
    derived_from_bd_id: BD-023
  - id: finance-C-196
    when: When processing market data ticks in backtesting or live trading
    action: Filter out ticks with last_price=0 during preprocessing before they enter calculation pipelines; zero-price ticks
      represent invalid or stale market data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including zero-price ticks in calculations produces invalid price indicators and corrupts strategy signals;
      in backtesting, this causes systematic errors where strategies build positions based on phantom prices, leading to unrealistic
      performance metrics
    derived_from_bd_id: BD-037
  - id: finance-C-197
    when: When implementing or modifying order cancellation functionality in trading UI
    action: Consider using confirmation dialogs or separate cancel widgets for order cancellation to prevent accidental double-click
      cancellations; evaluate regulatory compliance requirements for cancellation workflows in your jurisdiction
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Double-click cancellation without confirmation risks accidental order cancellation, potentially closing positions
      prematurely or missing profit opportunities; in jurisdictions requiring audit trails for cancellations, this pattern
      may violate compliance requirements
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-198
    when: When implementing or refactoring genetic algorithm reproduction operators in optimization logic
    action: Maintain crossover probability at 0.95 and mutation rate computed as 1-crossover — preserve the complementary
      relationship between crossover and mutation rates; do not modify the crossover probability value or swap the roles of
      crossover and mutation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying crossover probability or mutation rate changes the exploration-exploitation balance of the genetic
      algorithm; lower crossover or higher mutation causes the optimizer to explore more but converge slower, while higher
      crossover reduces diversity and risks premature convergence to suboptimal solutions
    derived_from_bd_id: BD-033
  - id: finance-C-199
    when: When implementing or refactoring MLP training loop logic
    action: Use Adam optimizer with ReduceLROnPlateau scheduler for MLP training — do not replace with SGD+momentum, RMSprop,
      or other optimizer-scheduler combinations; maintain the adaptive learning rate adjustment behavior
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the optimizer alters the weight update dynamics and convergence behavior of the neural network;
      SGD with momentum may converge to different local minima, RMSprop may exhibit different oscillation patterns, and removing
      ReduceLROnPlateau prevents dynamic learning rate adjustment, resulting in model quality degradation
    derived_from_bd_id: BD-034
  - id: finance-C-200
    when: When implementing training validation loop in MLP model training
    action: Maintain early stopping patience at 50 epochs without improvement — do not reduce below 50 epochs or remove early
      stopping entirely; verify the patience threshold is applied consistently to validation metrics
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reducing early stopping patience causes premature training termination and model underfitting; removing early
      stopping allows training to continue indefinitely, risking severe overfitting where the model memorizes training data
      instead of learning generalizable patterns
    derived_from_bd_id: BD-036
  - id: finance-C-201
    when: When using the framework's default ArrayManager size=100 for indicator calculation
    action: Verify that the default ArrayManager size=100 buffer is sufficient for each indicators used in the strategy —
      check indicator maximum lookback requirements (e.g., 200-day MA requires at least 200 bars); configure a larger size
      if indicators need more historical data than the default provides
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default size=100 buffer cannot accommodate indicators requiring more than 100 historical bars; using 200-day
      MA with default ArrayManager produces incorrect calculations using insufficient data, causing indicator values to be
      invalid or NaN during initial warmup periods and distorting trading signals
    derived_from_bd_id: BD-039
  - id: finance-C-202
    when: When implementing rolling volatility calculations in vnpy.alpha.dataset.ts_function
    action: Use ddof=0 (population standard deviation) for rolling window standard deviation — the denominator is N, not N-1
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using sample std (ddof=1) when the window represents a complete population causes systematic underestimation
      of volatility by factor sqrt(N/(N-1)), leading to misaligned risk calculations and incorrect position sizing
    derived_from_bd_id: BD-066
  - id: finance-C-204
    when: When preparing datasets for machine learning model training and validation
    action: Split data temporally into TRAIN, VALID, TEST segments using date range boundaries — verify each TRAIN timestamps
      precede VALID, which precedes TEST
    severity: high
    kind: domain_rule
    modality: must
    consequence: Random or incorrect temporal splitting introduces look-ahead bias where future information leaks into training
      data, causing backtest results to significantly overestimate live trading performance
    derived_from_bd_id: BD-045
  - id: finance-C-205
    when: When implementing position management and close order generation logic
    action: Track long and short frozen quantities separately by position age (today/yesterday) in PositionConverter — use
      separate counters for each combination
    severity: high
    kind: domain_rule
    modality: must
    consequence: Aggregating frozen tracking without age distinction causes incorrect close order sequencing, potentially
      closing today's positions before yesterday's positions in violation of settlement rules, resulting in execution errors
      and financial losses
    derived_from_bd_id: BD-050
  - id: finance-C-206
    when: When using RSI technical indicator for alpha factor construction in backtesting
    action: Verify that input price data (open, high, low, close, volume) has been adjusted for stock splits, dividends, and
      bonus issues before passing to Talib's RSI calculation — unadjusted prices will produce RSI values that do not reflect
      true price momentum
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using unadjusted prices causes RSI to generate false overbought/oversold signals around corporate action
      dates, leading to trades based on artificial price discontinuities that do not exist in live trading
    derived_from_bd_id: BD-059
  - id: finance-C-207
    when: When configuring rolling linear regression slope calculation for trend factor construction
    action: Verify that the time series exhibits approximately linear relationships within the chosen window — test for non-linearity
      using residual analysis or alternative estimators (Theil-Sen) if price dynamics are known to be non-linear
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Applying linear regression to non-linear price dynamics produces systematically biased slope estimates, causing
      momentum factors to misidentify trend direction and magnitude, leading to suboptimal position sizing
    derived_from_bd_id: BD-061
  - id: finance-C-208
    when: When fitting LASSO regression with fit_intercept=False for alpha factor prediction
    action: Center each factor input features to zero mean before LASSO fitting — verify that mean(factors) ≈ 0 for each factor
      columns; if factors are not centered, disable intercept will introduce systematic prediction bias
    severity: high
    kind: domain_rule
    modality: must
    consequence: Disabling intercept without centering factors causes LASSO to systematically over-predict or under-predict
      expected returns when factor distributions are asymmetric, producing biased alpha estimates that do not generalize to
      live trading
    derived_from_bd_id: BD-069
  - id: finance-C-209
    when: When deploying MLP neural network for alpha factor prediction in production
    action: Implement rigorous hyperparameter validation using walk-forward testing — test architecture sensitivity across
      layer depths [1,2,3] and widths [32,64,128,256]; MLP predictions are highly sensitive to hyperparameter choices and
      overfit easily on in-sample data
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unvalidated MLP architectures exhibit severe overfitting, with backtested Sharpe ratios 2-3x higher than
      live trading performance; hyperparameter sensitivity causes strategy failure within weeks of deployment
    derived_from_bd_id: BD-070
  - id: finance-C-210
    when: When implementing async push message handlers using RpcClient
    action: Subclass RpcClient and implement the callback() method to handle pushed data — the base class defines callback()
      as NotImplementedError and cannot process async notifications from RpcServer PUB/SUB sockets
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without implementing callback(), any pushed data from RpcServer triggers NotImplementedError, breaking async
      notification handling and potentially causing silent message drops in live trading scenarios
    derived_from_bd_id: BD-084
  - id: finance-C-211
    when: When modifying position close logic for Chinese futures (any of BD-028, BD-029, or BD-030)
    action: 'Verify compatibility with the other two decisions in the dependency chain: BD-028 (today/yesterday frozen tracking),
      BD-029 (default close order: today first for non-SHFE/INE), and BD-030 (SHFE/INE exchange-specific exceptions). each
      three decisions must remain mutually consistent'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Modifying any single decision without verifying the others introduces subtle bugs in position close sequence,
      causing wrong close order execution for Chinese futures contracts and potential financial losses due to incorrect position
      liquidation
    derived_from_bd_id: BD-099
  - id: finance-C-212
    when: When implementing RPC client/server initialization code
    action: 'Follow the complete three-way initialization ordering contract: (1) RpcServer.register() before RpcServer.start(),
      (2) RpcClient.start() before any proxy calls, (3) verify REP/REQ and PUB/SUB socket pairing per BD-085. Violating any
      step causes ZMQ errors or silent message drops'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Violating the three-way ordering contract triggers ZMQ errors or causes silent message drops to wrong socket
      types, making the RPC layer unreliable and causing operational failures in distributed backtesting components
    derived_from_bd_id: BD-100
  - id: finance-C-213
    when: When calculating annualized performance metrics (Sharpe ratio, volatility, annualized returns) using hardcoded annualization
    action: Verify that annual_days=240 matches the actual trading calendar for the target market. The hardcoded 240-day factor
      assumes 5 trading days per week excluding holidays, but without explicit DayCounter implementation (act360, thirty360,
      day_count not found), different instruments or jurisdictions may use invalid day count assumptions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Hardcoded 240-day annualization creates systemic miscalculation risk across all performance metrics including
      Sharpe ratio, volatility, and annualized returns. When actual trading days differ significantly, backtest results become
      misleading and live trading decisions based on these metrics will underperform
    derived_from_bd_id: BD-102
  - id: finance-C-214
    when: When implementing data loading or streaming logic that injects bars into BarManager
    action: Verify that bars arrive in temporal order (ascending timestamps) and detect/handle duplicate timestamps explicitly
      rather than relying on BarManager's implicit ordering assumption
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Out-of-order or duplicate timestamps silently break BarManager's dual index mapping, causing datetime lookups
      to return incorrect bars or raise unexpected exceptions during backtesting analysis
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-215
    when: When implementing P&L display logic in trading UI widgets
    action: Replace the sign-based (positive/negative) color assignment with threshold-based or percentage-based coloring
      that accounts for position size significance — the current binary green/red approach breaks for near-zero values and
      relative P&L comparison
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Sign-only coloring makes it impossible to distinguish small profitable trades from large ones, and near-zero
      values get arbitrary coloring, obscuring actual P&L significance during strategy analysis
    derived_from_bd_id: BD-GAP-008
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
