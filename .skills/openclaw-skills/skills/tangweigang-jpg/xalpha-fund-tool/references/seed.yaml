      type: B/RC
      summary: Position tracking via nested list (date, share) for FIFO calculations
    - id: BD-064
      type: B
      summary: Net value of 0 treated as sellout signal when no shares held at date
    - id: BD-071
      type: B/BA
      summary: 'Fund conversion (折算) handling: positions scaled by conversion factor on conversion date'
    - id: BD-024
      type: B
      summary: indicator as mixin not base class
    - id: BD-025
      type: BA
      summary: bcmkset required before indicator use
    - id: BD-026
      type: M/BA
      summary: scipy.optimize for XIRR
    - id: BD-011
      type: B
      summary: TradeBehaviorError on sell-before-buy
    - id: BD-012
      type: M
      summary: 'Binary encoding for fractional fee (issue #59)'
    - id: BD-013
      type: BA/DK
      summary: Date shifting for non-trading days
    - id: BD-014
      type: B
      summary: cftable and remtable must both be provided or both None
    - id: BD-027
      type: B/DK
      summary: Non-trading day trade requests are forward-adjusted to the next valid trading day
    - id: BD-028
      type: B
      summary: Round half-up with Decimal for each monetary calculations to avoid floating point errors
    - id: BD-029
      type: B/BA
      summary: Round down option for share calculation for specific funds that truncate fractional shares
    - id: BD-031
      type: B
      summary: Prevent selling before any buying - validate trade sequence
    - id: BD-034
      type: B
      summary: Partial sell by proportion using values between -0.005 and 0 (0.005=100%)
    - id: BD-063
      type: B/DK
      summary: 'Fund share rounding: 1e-6 epsilon added before int conversion to handle floating point'
    - id: BD-065
      type: B/DK
      summary: Sell more than owned clamps to total holdings (no short selling)
resources:
  packages:
  - name: pandas
    version_pin: latest
  - name: numpy
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: matplotlib
    version_pin: latest
  - name: requests
    version_pin: latest
  - name: beautifulsoup4
    version_pin: latest
  - name: lxml
    version_pin: latest
  - name: sqlalchemy
    version_pin: latest
  - name: xlrd
    version_pin: latest
  - name: pyecharts
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install pandas
    - python3 -m pip install numpy
    - python3 -m pip install scipy
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing get_daily return logic
    action: Return DataFrame with date and close columns as minimum required schema
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream components expecting OHLCV columns will raise KeyError when date or close fields are missing from
      returned DataFrame
    stage_ids:
    - data_acquisition
  - id: finance-C-014
    when: When implementing fundinfo.price DataFrame structure
    action: verify DataFrame contains date, netvalue, totvalue, and comment columns
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required columns causes downstream trade and backtest calculations to fail with KeyError or NaN values,
      corrupting financial analysis results
    stage_ids:
    - info_and_pricing
  - id: finance-C-015
    when: When initializing fundinfo with code parameter
    action: validate that fund code is exactly 6 digits and normalized with zero-padding
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid fund codes cause API requests to fail with 404 errors or return incorrect data, leading to ParserFailure
      exceptions during data acquisition
    stage_ids:
    - info_and_pricing
  - id: finance-C-016
    when: When filtering price data by date
    action: verify price data only includes dates up to yesterday to prevent look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Including future dates causes look-ahead bias in backtesting, making simulated returns artificially higher
      than actual live trading results
    stage_ids:
    - info_and_pricing
  - id: finance-C-029
    when: When implementing buy operations on remtable
    action: Enforce strictly increasing date order for position entries
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Out-of-order date inserts cause incorrect FIFO calculations and wrong redemption fee computation for Chinese
      funds with holding-period-based fees
    stage_ids:
    - position_tracking
  - id: finance-C-032
    when: When implementing FIFO sell logic
    action: Process positions in chronological order from earliest to latest
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect sell order causes wrong holding period calculation, resulting in incorrect redemption fee being
      applied (Chinese funds have tiered fees by holding period)
    stage_ids:
    - position_tracking
  - id: finance-C-035
    when: When modifying remtable data
    action: Use the copy() function to create independent copies before mutation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Direct mutation of input remtable causes side effects that corrupt position tracking across multiple operations
      in the same session
    stage_ids:
    - position_tracking
  - id: finance-C-044
    when: When implementing cash flow calculations for trade accounting
    action: Use myround with Decimal for each monetary rounding to avoid floating-point errors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Floating-point rounding errors will cause share miscalculation and incorrect cost basis, leading to inaccurate
      XIRR and portfolio valuation
    stage_ids:
    - trade_accounting
  - id: finance-C-045
    when: When initializing trade with incremental accounting
    action: Provide both cftable and remtable or provide both as None
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Providing only one table breaks the incremental accounting invariant, causing FIFO position tracking to diverge
      from cash flows
    stage_ids:
    - trade_accounting
  - id: finance-C-046
    when: When processing first transaction in status table
    action: Reject any attempt to sell before buying with TradeBehaviorError
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Selling before buying represents an impossible scenario that corrupts position tracking and breaks FIFO cost
      basis calculation
    stage_ids:
    - trade_accounting
  - id: finance-C-048
    when: When converting status table to cash flow records
    action: Mark cash outflows as negative and cash inflows as positive in cftable
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect cash flow signs cause NPV calculation to invert, producing negative returns for profitable trades
      and vice versa
    stage_ids:
    - trade_accounting
  - id: finance-C-052
    when: When maintaining remtable for FIFO position tracking
    action: Keep purchase positions ordered by date and apply FIFO logic on sell operations
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: FIFO violation causes incorrect cost basis assignment, leading to inaccurate realized gains/losses and wrong
      XIRR calculation
    stage_ids:
    - trade_accounting
  - id: finance-C-062
    when: When calculating combined XIRR for multiple funds
    action: pass the merged totcftable from _mergecftb() and each fundtradeobj to xirrcal()
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: XIRR will be calculated only on individual fund cashflows instead of combined portfolio, producing incorrect
      annualized return that does not reflect actual investment performance
    stage_ids:
    - portfolio_management
  - id: finance-C-064
    when: When initializing mulfix for closed investment system
    action: verify totmoney is greater than or equal to the bottleneck (maximum historical cash input)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: System will raise TradeBehaviorError and prevent portfolio analysis from completing when initial capital
      is insufficient to cover historical outflows
    stage_ids:
    - portfolio_management
  - id: finance-C-070
    when: When mulfix initializes with totmoney parameter
    action: append the cashobj-based cashtrade to fundtradeobj tuple after calling parent __init__
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Virtual cash positions will not be tracked in the portfolio, breaking unitvalue() and other mulfix-specific
      calculations
    stage_ids:
    - portfolio_management
  - id: finance-C-077
    when: When implementing status_gen in policy subclasses
    action: Return float values where positive represents buying money and negative represents selling shares
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Returning non-numeric values or inverting the sign convention causes the status table to be misinterpreted
      by the trade module, resulting in incorrect backtesting results with purchases treated as sales and vice versa
    stage_ids:
    - policy_generation
  - id: finance-C-078
    when: When generating status DataFrame with sell actions
    action: Multiply negative action values by 0.005 before storing in status table to encode dividend reinvestment flag
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without the 0.005 multiplier on negative values, the trade module cannot distinguish between dividend reinvestment
      markers and regular sell amounts, causing incorrect position calculations during backtesting
    stage_ids:
    - policy_generation
  - id: finance-C-079
    when: When implementing grid strategy status_gen
    action: Initialize and maintain self.pos counter across status_gen calls to track grid position state
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Grid positions not maintaining state across calls causes incorrect buy/sell decisions, as the grid strategy
      requires tracking accumulated positions to determine which levels have been filled
    stage_ids:
    - policy_generation
  - id: finance-C-080
    when: When initializing policy base class
    action: Use record class inheritance and set self.status DataFrame with date and code columns
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without proper record inheritance and status DataFrame structure, downstream modules (trade, backtest) cannot
      consume the policy output, causing AttributeError or TypeError during backtesting
    stage_ids:
    - policy_generation
  - id: finance-C-089
    when: When presenting policy-based backtesting results
    action: Claim backtest returns as expected live trading performance or present virtual policy status as real execution
      proof
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting simulated backtest results as real trading performance misleads investors and violates financial
      compliance principles, potentially causing significant financial loss
    stage_ids:
    - policy_generation
  - id: finance-C-093
    when: When using base policy class status_gen method
    action: Implement status_gen in concrete subclasses rather than calling base class method directly
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Calling policy.status_gen() raises NotImplementedError, preventing any policy from generating status tables
      without concrete implementation
    stage_ids:
    - policy_generation
  - id: finance-C-094
    when: When implementing backtest run() method in subclass
    action: Access price data with date filtering to prevent look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backtest results will be artificially inflated due to look-ahead bias, causing live trading returns to fall
      far below backtested performance
    stage_ids:
    - backtesting
  - id: finance-C-095
    when: When implementing subclass of BTE
    action: Call prepare() method before run() in backtest sequence
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Subclass may access uninitialized attributes (infos, trades, lastdates), causing AttributeError or incorrect
      trading decisions with empty state
    stage_ids:
    - backtesting
  - id: finance-C-096
    when: When creating trade objects with incremental data
    action: Provide both cftable and remtable arguments together or neither
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Cash flow and position tracking tables will become inconsistent, causing incorrect XIRR calculations and
      P&L reports
    stage_ids:
    - backtesting
  - id: finance-C-099
    when: When implementing backtest iteration
    action: Filter dates against opendate_set to execute only on Chinese trading days
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backtest will attempt trades on non-trading days (weekends, holidays), causing failures when fund prices
      are unavailable
    stage_ids:
    - backtesting
  - id: finance-C-100
    when: When selling a fund that has not been purchased
    action: Raise TradeBehaviorError exception to prevent short selling
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Negative positions will be created, causing incorrect P&L calculations and unrealistic short positions in
      the simulation
    stage_ids:
    - backtesting
  - id: finance-C-102
    when: When implementing backtest run() method
    action: Raise NotImplementedError in base BTE class to enforce subclass implementation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Strategy will run without actual trading logic, producing empty results without clear error indication
    stage_ids:
    - backtesting
  - id: finance-C-106
    when: When presenting backtest results
    action: Present simulated portfolio results as guaranteed future returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users will make incorrect investment decisions based on unrealistic expectations; backtest performance does
      not predict future returns due to market volatility and model limitations
    stage_ids:
    - backtesting
  - id: finance-C-110
    when: When implementing indicator analysis using the indicator MixIn class
    action: Call bcmkset() method to set benchmark before using any indicator functions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Indicator functions will raise ValueError if bcmkset() has not been called, as self.bmprice and self.riskfree
      attributes are undefined, causing AttributeError or KeyError in methods like beta(), alpha(), sharpe(), and information_ratio()
    stage_ids:
    - technical_indicators
  - id: finance-C-111
    when: When passing a price DataFrame to indicator functions
    action: Verify the price DataFrame contains 'date' and 'netvalue' columns with aligned dates
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Indicator calculations will raise KeyError or produce incorrect results if required columns are missing,
      as methods like ratedaily(), volatility(), and all technical indicators reference self.price['netvalue'] and self.price['date']
    stage_ids:
    - technical_indicators
  - id: finance-C-112
    when: When setting benchmark via bcmkset() method
    action: Verify benchmark infoobj has a price DataFrame with 'date' column for date alignment
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: bcmkset() will raise KeyError when accessing benchmark.price['date'] if the benchmark object does not have
      a properly structured price DataFrame, preventing indicator calculations that require benchmark comparison (beta, alpha,
      information_ratio, correlation_coefficient)
    stage_ids:
    - technical_indicators
  - id: finance-C-124
    when: When writing status DataFrame from policy_generation to trade_accounting
    action: Verify status DataFrame contains date column in pandas.Timestamp format and code column with 6-digit zero-padded
      fund codes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Trade class will fail to filter trades correctly, causing cftable generation to miss or duplicate entries,
      leading to incorrect cash flow calculations and XIRR results
    stage_ids:
    - policy_generation
    - trade_accounting
  - id: finance-C-125
    when: When creating trade objects from trade_accounting to portfolio_management
    action: Provide both cftable and remtable together, never one without the other
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: ValueError raised at runtime; incremental trade engine cannot function with partial data, preventing portfolio
      aggregation and XIRR calculation
    stage_ids:
    - trade_accounting
    - portfolio_management
  - id: finance-C-131
    when: When using xalpha for live trading decisions based on backtesting results
    action: Claim backtest returns as expected live trading returns without substantial safety margins and dry-run validation
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users suffer significant financial losses when live execution reveals slippage, liquidity constraints, and
      fee impacts not captured in backtesting simulation
    stage_ids:
    - backtesting
    - portfolio_management
  - id: finance-C-135
    when: When implementing trade operations in trade.py and backtest.py
    action: Enforce buy-before-sell ordering; selling before buying MUST raise TradeBehaviorError
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Selling securities before purchasing them produces invalid cash flow tables and unreal trade scenarios that
      corrupt portfolio accounting
  - id: finance-C-141
    when: When using xalpha for data acquisition and analysis
    action: Claim real-time trading execution capability — xalpha is a backtesting and analysis framework only
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users may allocate real capital believing the system can execute trades automatically, leading to financial
      losses from missed or failed trade execution
  - id: finance-C-142
    when: When presenting or reporting backtested returns to users
    action: Claim that backtested returns equal expected live returns — backtesting ignores market impact, financing costs,
      and execution delays
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-144
    when: When building production systems using xalpha's policy and backtest modules
    action: Claim the system is suitable for high-frequency trading strategies — xalpha processes only daily data
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: High-frequency strategies require tick-level data and sub-second execution that xalpha cannot provide, leading
      to complete strategy failure
  - id: finance-C-151
    when: When implementing position tracking logic for FIFO cost basis calculations in xalpha/remain.py:49(sell)
    action: Maintain nested list structure with (date, share) tuples for position tracking — each tuple must preserve chronological
      purchase order to enable accurate tax lot identification for redemptions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Altering the FIFO position tracking structure causes incorrect cost basis calculations and tax lot identification;
      audit trails become unreliable and regulatory tax reporting may contain errors
    derived_from_bd_id: BD-048
  - id: finance-C-162
    when: When implementing redemption logic for non-monetary funds
    action: Use share-based redemption (round_label handling) for non-monetary funds — do not apply value_label=1 (amount-based
      redemption) to funds other than monetary funds, as it causes precision loss in cost basis tracking
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Using amount-based redemption for non-monetary funds causes NAV precision errors, leading to incorrect cost
      basis calculations and tax reporting discrepancies in live trading
    derived_from_bd_id: BD-007
  - id: finance-C-178
    when: When implementing or modifying trade execution logic involving sell signals
    action: Define clear disambiguation rules for the -0.005 boundary value — either verify policy layer never generates -0.005
      as a sell marker (use a different value like -0.999), or verify trade layer interprets -0.005 as a sell signal trigger
      rather than 100% proportional sell
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: 'The -0.005 value has conflicting semantics: policy layer interprets it as sell signal (BD-019) while trade
      layer interprets it as ''sell 100% of holdings'' (BD-034), causing unexpected full liquidations when policies intended
      partial profit-taking'
    derived_from_bd_id: BD-124
  - id: finance-C-212
    when: When pricing options using Black-Scholes formula (d1/d2, CND for N(d1)/N(d2))
    action: Apply Black-Scholes only for European options with constant volatility assumption; for American options or instruments
      with volatility smile/skew, MUST use binomial tree or finite difference methods
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Black-Scholes assumes GBM dynamics, constant volatility, and European exercise; applying it to American options
      ignores early exercise premium (underpricing deep ITM puts by 5-10%), and constant volatility assumption causes systematic
      mispricing due to volatility smile/skew
    derived_from_bd_id: BD-094
  - id: finance-C-214
    when: When implementing or refactoring trade._arrange ordering logic
    action: Verify buy operations must precede sell operations within trade._arrange; the validation that triggers TradeBehaviorError
      when SellFirst is attempted must be preserved during any code refactoring
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Removing or bypassing the buy-before-sell validation would allow sell-before-buy execution, potentially creating
      invalid short positions and breaking ledger consistency; backtest results would not match live trading behavior
    derived_from_bd_id: BD-099
  - id: finance-C-228
    when: When using indicator functions for performance analysis in backtesting
    action: Call bcmkset() to establish an explicit benchmark before any indicator computation — never rely on implicit default
      benchmarks; verify benchmark is set via explicit initialization before indicator use
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using indicators without explicit benchmark selection causes comparisons against an unintended or null baseline,
      making alpha/beta calculations meaningless; strategies may appear profitable when they actually underperform a relevant
      benchmark, leading to poor investment decisions
    derived_from_bd_id: BD-025
  - id: finance-C-265
    when: When modifying data classes that persist to local cache
    action: Update both _save_csv/_sql and _fetch_csv/_sql methods together to maintain schema consistency
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: New attributes will fail to load from cached data, causing AttributeError or missing data in analysis pipelines
    stage_ids:
    - data_persistence
  - id: finance-C-270
    when: When implementing data scraping logic for HTML reports
    action: Verify updated scraping logic exactly restores the original DataFrame schema expected by xalpha
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Schema mismatches will corrupt downstream analysis, causing wrong financial metrics in reports and backtests
    stage_ids:
    - data_ingestion
    - data_persistence
  regular:
  - id: finance-C-002
    when: When fetching real-time data from FT source
    action: Treat FT data as real-time for trading decisions
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: FT (Financial Times) data source has inherent 10-20 minute delay, causing stale price data to be used in
      trading logic
    stage_ids:
    - data_acquisition
  - id: finance-C-003
    when: When using Yahoo Finance historical data
    action: Apply data cleaning to handle NaN values and weekend entries before using data
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Yahoo Finance data may contain NaN values and weekend entries that cause incorrect calculation results in
      backtesting and analysis
    stage_ids:
    - data_acquisition
  - id: finance-C-004
    when: When implementing custom data handler
    action: Return None from handler to trigger fallback to default provider chain
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Handler that returns non-None values blocks the default data source fallback, potentially returning stale
      or incomplete data
    stage_ids:
    - data_acquisition
  - id: finance-C-005
    when: When claiming real-time data capability
    action: Claim true real-time without latency for any data source
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: All data sources have inherent delays (15 minutes for HK stocks per comment, FT has 10-20 min delay), presenting
      simulated real-time as actual real-time violates data accuracy requirements
    stage_ids:
    - data_acquisition
  - id: finance-C-006
    when: When using Base64-encoded JQ credentials
    action: Rely on Base64 encoding as secure credential protection
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Base64 encoding provides no encryption, credentials stored in jq_auth.txt are easily decoded, creating security
      vulnerability
    stage_ids:
    - data_acquisition
  - id: finance-C-007
    when: When enabling double_check for real-time data
    action: Set double_check_threshold appropriately for cross-validation accuracy
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Inappropriate threshold causes false DataPossiblyWrong exceptions when data sources have legitimate price
      differences
    stage_ids:
    - data_acquisition
  - id: finance-C-008
    when: When setting up data source handlers
    action: Use set_handler function to inject custom data provider logic
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct attribute modification bypasses handler mechanism, causing custom provider logic to be ignored
    stage_ids:
    - data_acquisition
  - id: finance-C-009
    when: When accessing data requiring authentication
    action: Check JQ authentication status before using JQ data source
    severity: high
    kind: resource_boundary
    modality: must
    consequence: DataSourceNotFound exception raised when accessing JQ-dependent features without authentication
    stage_ids:
    - data_acquisition
  - id: finance-C-010
    when: When making financial decisions based on fetched data
    action: Present scraped data as guaranteed accurate or reliable
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: xalpha only provides example code for accessing public data without data storage or service provision, users
      must verify accuracy independently
    stage_ids:
    - data_acquisition
  - id: finance-C-011
    when: When parsing numeric values from scraped data
    action: Handle K/M/G/B suffixes and edge cases in _float conversion
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Numeric parsing failures cause ValueError when data contains non-standard number formats like '1.5K' or missing
      values
    stage_ids:
    - data_acquisition
  - id: finance-C-012
    when: When handling data source provider errors
    action: Implement graceful fallback to alternative data sources
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Single-source dependency causes complete data acquisition failure when primary source becomes unavailable
    stage_ids:
    - data_acquisition
  - id: finance-C-013
    when: When caching daily data for repeated calls
    action: Use cachedio or reset_cache functions to manage in-memory cache
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Unmanaged cache grows indefinitely causing memory exhaustion and stale data issues
    stage_ids:
    - data_acquisition
  - id: finance-C-017
    when: When parsing redemption fee information from Chinese text
    action: handle feeinfo list as alternating [description, percentage] pairs with correct length validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect fee parsing causes wrong redemption fee calculations, leading to inaccurate PnL reports and potential
      financial loss in backtest simulations
    stage_ids:
    - info_and_pricing
  - id: finance-C-018
    when: When implementing monetary fund redemption by value
    action: only use value_label=1 for mfundinfo class, not for regular fundinfo
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using value-based redemption for non-monetary funds causes incorrect share calculations, leading to under/over-redemption
      and real financial losses in live trading
    stage_ids:
    - info_and_pricing
  - id: finance-C-019
    when: When handling dividend reinvestment via comment column
    action: use magic value 0.05 in comment column to signal dividend reinvestment override
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect dividend handling causes dividend payouts to be misclassified, leading to wrong share count calculations
      and inaccurate portfolio valuations
    stage_ids:
    - info_and_pricing
  - id: finance-C-020
    when: When implementing fetch and save IO pattern
    action: respect fetch=True to load from local cache first, fetch=False to force remote fetch
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect fetch behavior causes unnecessary network requests, slowing down data loading and potentially hitting
      API rate limits
    stage_ids:
    - info_and_pricing
  - id: finance-C-021
    when: When implementing increment IO pattern for price updates
    action: fetch existing data first, then call update() to get incremental changes, then append delta to saved file
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Skipping incremental update causes full data re-download, wasting bandwidth and API quota while slowing down
      initialization
    stage_ids:
    - info_and_pricing
  - id: finance-C-022
    when: When handling closed-end funds, ETFs, or interval-opening funds
    action: expect accurate fee parsing for 定开基金, 封闭基金, or 场内 ETF
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Fee parsing for these fund types produces invalid or empty feeinfo lists, causing default fallback fees to
      be used instead of actual fees
    stage_ids:
    - info_and_pricing
  - id: finance-C-023
    when: When fetching fund data from eastmoney API
    action: expect real-time data - each fund data has inherent delay from official sources
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting delayed data as real-time causes incorrect trading decisions and potential financial losses when
      acting on stale price information
    stage_ids:
    - info_and_pricing
  - id: finance-C-024
    when: When using price DataFrame from fundinfo for calculations
    action: claim calculations produce identical results to actual live trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest calculations ignore slippage, liquidity constraints, and timing delays that occur in live trading,
      causing simulated returns to differ significantly from actual returns
    stage_ids:
    - info_and_pricing
  - id: finance-C-025
    when: When handling special fund types that may have empty price tables
    action: raise ParserFailure exception when price table is empty after filtering
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty price table causes downstream calculations to fail with IndexError or return NaN values, corrupting
      portfolio analysis
    stage_ids:
    - info_and_pricing
  - id: finance-C-026
    when: When parsing Chinese fee tier descriptions
    action: handle date unit conversions (天, 月, 年) and strip Chinese characters correctly
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect parsing of time units causes wrong fee tier boundaries, leading to incorrect redemption fee calculations
      and financial discrepancies
    stage_ids:
    - info_and_pricing
  - id: finance-C-027
    when: When using Decimal for monetary calculations
    action: use Decimal with ROUND_HALF_UP for share calculations and ROUND_DOWN for specific funds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using float arithmetic for monetary calculations introduces rounding errors, causing share count discrepancies
      and inaccurate financial reporting
    stage_ids:
    - info_and_pricing
  - id: finance-C-028
    when: When dealing with QDII fund price data
    action: expect additional delay in price data updates compared to domestic funds
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: QDII fund data may be incomplete or missing recent prices, causing incorrect portfolio valuation and timing
      errors in trade execution
    stage_ids:
    - info_and_pricing
  - id: finance-C-033
    when: When implementing sell operations
    action: Raise an error when attempting to sell more shares than available
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Silent clipping of excess sells causes position tracking discrepancy and incorrect remaining share counts
      in subsequent operations
    stage_ids:
    - position_tracking
  - id: finance-C-034
    when: When handling share amounts in position tracking
    action: Round each share amounts to 2 decimal places using myround() before calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unrounded float values cause accumulation errors in cumulative share calculations, leading to incorrect FIFO
      position splits
    stage_ids:
    - position_tracking
  - id: finance-C-036
    when: When working with remtable nested list structure
    action: Use module functions (copy, buy, sell, trans) exclusively for each rem operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct manipulation of nested list structure causes unpredictable behavior and data corruption due to the
      fragile nature of this data structure
    stage_ids:
    - position_tracking
  - id: finance-C-037
    when: When converting dates in position tracking
    action: Normalize each date inputs to datetime objects using convert_date() before comparison
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mixed date format comparisons produce incorrect ordering results, causing FIFO violations and incorrect position
      splits
    stage_ids:
    - position_tracking
  - id: finance-C-038
    when: When applying fund merger/split coefficient
    action: Scale each historical share counts proportionally using the trans coefficient
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping coefficient application causes position value mismatch with actual fund holdings after merger/split
      events
    stage_ids:
    - position_tracking
  - id: finance-C-039
    when: When applying trans on empty remtable
    action: Return empty list immediately without date validation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Empty remtable with date validation causes unnecessary exception when no positions exist to adjust
    stage_ids:
    - position_tracking
  - id: finance-C-040
    when: When tracking positions for Chinese fund redemption fees
    action: Claim FIFO position tracking produces exact holding-period fee calculations
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Position tracking tracks purchase dates but actual redemption fees depend on fund-specific rules and T+1
      NAV date conventions that may differ from trade record dates
    stage_ids:
    - position_tracking
  - id: finance-C-041
    when: When tracking positions
    action: Preserve the nested list format [[date, share], ...] across each operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Breaking the nested list format causes downstream functions to fail when reading remtable DataFrame columns
    stage_ids:
    - position_tracking
  - id: finance-C-042
    when: When merging share purchases on the same date
    action: Aggregate shares into existing position instead of creating duplicate entries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate date entries cause FIFO calculation errors as cumulative sums count same-date purchases multiple
      times
    stage_ids:
    - position_tracking
  - id: finance-C-043
    when: When handling selling each remaining shares
    action: Return empty newrem list to indicate complete position liquidation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-empty newrem after selling all positions causes position tracking to show phantom holdings
    stage_ids:
    - position_tracking
  - id: finance-C-047
    when: When calculating XIRR for trade portfolio
    action: Provide valid cash flow sequence with at least one negative and one positive value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid cash flow sequences cause scipy.optimize.newton to fail to converge, resulting in XIRR returning
      NaN or incorrect values
    stage_ids:
    - trade_accounting
  - id: finance-C-049
    when: When handling dates not in trading calendar
    action: Shift transaction date to next valid trading day with warning if conflict occurs
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unresolved date conflicts cause transaction processing to overwrite or ignore records, leading to incomplete
      cash flow history
    stage_ids:
    - trade_accounting
  - id: finance-C-050
    when: When performing multiple operations on same day
    action: Have both buy and sell operations recorded on the same trading day
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Same-day buy+sell operations are not handled by the trade engine, causing position and cash flow miscalculation
    stage_ids:
    - trade_accounting
  - id: finance-C-051
    when: When encoding fractional fee in status table
    action: Use 0.5 in third decimal position to indicate fractional fee (e.g., 100.005 means 100 + 0.5% fee)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect fee encoding causes wrong fee rates to be applied, distorting net purchase amount and share calculation
    stage_ids:
    - trade_accounting
  - id: finance-C-053
    when: When using XIRR algorithm for return calculation
    action: Claim XIRR calculation provides guaranteed convergence for each cash flow patterns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: scipy.optimize.newton may fail to converge for certain cash flow patterns, producing NaN or mathematically
      undefined results
    stage_ids:
    - trade_accounting
  - id: finance-C-054
    when: When processing redemption by ratio in status table
    action: Encode ratio as negative decimal where absolute value <= 0.005 (e.g., -0.001 = 20% of position)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect ratio encoding causes wrong share amount to be redeemed, breaking position tracking and cash flow
      accuracy
    stage_ids:
    - trade_accounting
  - id: finance-C-055
    when: When handling dividend reinvestment marking
    action: Use 0.5 in first decimal position on dividend days to toggle dividend reinvestment (e.g., 10.05 = 10 + dividend
      reinvestment)
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Incorrect dividend reinvestment marking causes wrong share acquisition logic, breaking cost basis and yield
      calculation
    stage_ids:
    - trade_accounting
  - id: finance-C-056
    when: When calculating share quantity from purchase amount
    action: Apply fund-specific rounding rule (round_half_up or round_down) based on fund property
    severity: high
    kind: domain_rule
    modality: must
    consequence: Wrong rounding rule causes share quantity discrepancy with actual fund statement, affecting cost basis accuracy
    stage_ids:
    - trade_accounting
  - id: finance-C-057
    when: When fetching net value for transaction date
    action: Select the first available net value on or after transaction date
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Wrong net value selection causes incorrect share calculation and cash flow amount, corrupting position tracking
    stage_ids:
    - trade_accounting
  - id: finance-C-058
    when: When processing special dates (dividend, split)
    action: Skip buy/sell operations on fund split dates as split dates are closed for subscription/redemption
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Processing trades on split dates causes incorrect share calculation since split dates have no valid trading
    stage_ids:
    - trade_accounting
  - id: finance-C-059
    when: When providing custom fee in status table
    action: Verify custom fee value is positive (non-negative)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative fee values cause assertion failure and break transaction processing pipeline
    stage_ids:
    - trade_accounting
  - id: finance-C-060
    when: When calculating net asset value for trade
    action: Claim calculated returns represent actual investment performance without data quality disclaimer
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: XIRR calculation depends on accurate transaction records, net value data, and proper date handling; errors
      in any input propagate to results
    stage_ids:
    - trade_accounting
  - id: finance-C-061
    when: When processing sell operation with partial position
    action: Calculate sold shares by FIFO from remtable and update remaining positions correctly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect FIFO sell calculation causes wrong cost basis assignment and distorts realized gains reporting
    stage_ids:
    - trade_accounting
  - id: finance-C-063
    when: When implementing get_stock_holdings() for fund combination
    action: use quarterly report data with 120-day lookback from the target date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stock holdings will be fetched from incorrect reporting period, causing stale or unavailable data to be returned
      for positions held less than 120 days
    stage_ids:
    - portfolio_management
  - id: finance-C-065
    when: When accessing fund holdings through get_stock_holdings()
    action: expect accurate holdings data for funds without quarterly disclosure (e.g., bond funds, money market funds, ETFs)
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Method returns None or empty DataFrame for funds without stock holdings, breaking downstream aggregation
      logic that assumes all positions have stock data
    stage_ids:
    - portfolio_management
  - id: finance-C-066
    when: When using mulfix with virtual cash (mf)
    action: treat 'mf' code as monetary fund holding in get_stock_holdings() and get_portfolio()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Virtual cash will be incorrectly processed as stock holdings or cause lookup errors in get_fund_holdings()
      API calls
    stage_ids:
    - portfolio_management
  - id: finance-C-067
    when: When calculating sector allocation via get_industry()
    action: expect industry data for non-A股 (non-mainland China) stock holdings
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Method will skip non-A股 holdings entirely, resulting in incomplete sector allocation that underrepresents
      international exposure
    stage_ids:
    - portfolio_management
  - id: finance-C-068
    when: When using property bitmask for fund characteristics
    action: combine round_label=1, dividend_label=2, and value_label=4 as powers of 2
    severity: high
    kind: domain_rule
    modality: must
    consequence: Property values will be incorrectly parsed, causing wrong rounding behavior (分位全舍 vs 四舍五入) or dividend handling
      (现金分红 vs 分红再投)
    stage_ids:
    - portfolio_management
  - id: finance-C-069
    when: When aggregating portfolio through _mergecftb()
    action: sum cash flows on the same date before creating the merged DataFrame
    severity: high
    kind: domain_rule
    modality: must
    consequence: XIRR calculation will double-count or miss cash flows on overlapping dates, producing incorrect internal
      rate of return
    stage_ids:
    - portfolio_management
  - id: finance-C-071
    when: When presenting portfolio analysis results to users
    action: claim that simulated XIRR returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users may make incorrect investment decisions based on backtested returns that do not account for slippage,
      liquidity, or market impact
    stage_ids:
    - portfolio_management
  - id: finance-C-072
    when: When handling category 'others' in v_category_positions()
    action: log a warning to alert users that the fund type could not be determined
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Portfolio allocation percentages will include an 'others' category that should be manually verified to ensure
      accurate asset classification
    stage_ids:
    - portfolio_management
  - id: finance-C-073
    when: When the industry sum in get_industry_holdings() is less than 1.0
    action: attempt to calculate industry allocation when most stock positions lack industry information
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Industry allocation will be calculated from incomplete data, producing misleading sector distribution that
      underrepresents actual holdings
    stage_ids:
    - portfolio_management
  - id: finance-C-074
    when: When processing fund codes with ttjjcode() normalization
    action: handle HK codes ending with .HK, US codes ending with .US, and 5-digit HK codes correctly
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Stock holdings will be assigned incorrect exchange prefixes, causing lookup failures in get_rt() and misaligned
      industry/sector data
    stage_ids:
    - portfolio_management
  - id: finance-C-075
    when: When evaluating imul (场内投资组合) combined with regular funds
    action: expect get_industry_holdings() and get_portfolio() to work when mixing itrade and trade objects
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Methods will raise NotImplementedError or return incomplete data when analyzing mixed exchange-traded and
      OTC fund positions
    stage_ids:
    - portfolio_management
  - id: finance-C-076
    when: When combining multiple XIRR calculation parameters
    action: use Newton-Raphson optimization with a numeric guess parameter to find IRR root
    severity: medium
    kind: domain_rule
    modality: must
    consequence: XIRR convergence may fail or take excessive iterations without a proper initial guess, especially for portfolios
      with irregular cash flow patterns
    stage_ids:
    - portfolio_management
  - id: finance-C-081
    when: When rounding monetary amounts in policy actions
    action: Use myround() function instead of built-in round() for proper financial rounding (half-up to 2 decimals)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect rounding causes precision errors in financial calculations, leading to cumulative discrepancies
      in backtesting results that compound over many transactions
    stage_ids:
    - policy_generation
  - id: finance-C-082
    when: When implementing status_gen for scheduled_window policy
    action: Skip dates in the first window range (0 to window + window_dist - 1) to avoid insufficient historical data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper window boundary handling, scheduled_window generates incorrect buy decisions due to incomplete
      historical data, causing unrealistic trading signals at the strategy start
    stage_ids:
    - policy_generation
  - id: finance-C-083
    when: When implementing indicator_cross policy status_gen
    action: Return 0 when len(rows) <= 1 to avoid index errors and verify sufficient historical data for crossover detection
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without row count validation, indicator_cross causes IndexError when accessing iloc[-2] on single-row DataFrames,
      crashing the backtesting process
    stage_ids:
    - policy_generation
  - id: finance-C-084
    when: When implementing grid policy status_gen
    action: Filter dates using opendate to skip non-trading days and avoid incorrect grid triggers
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Grid strategy generates incorrect buy/sell triggers on non-trading days, causing position mismatches and
      unrealistic trading signals in the backtest
    stage_ids:
    - policy_generation
  - id: finance-C-085
    when: When using opendate trading calendar
    action: Understand opendate only covers domestic Chinese A-share stock market trading days
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Applying Chinese stock market calendar to international or OTC products generates incorrect status tables
      with non-existent trading dates, invalidating backtest results
    stage_ids:
    - policy_generation
  - id: finance-C-086
    when: When generating policy status tables for backtesting
    action: Update caldate.csv annually to verify trading calendar coverage is current
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Outdated trading calendar causes status_gen to skip valid trading days or include invalid dates, distorting
      backtest results and portfolio calculations
    stage_ids:
    - policy_generation
  - id: finance-C-087
    when: When implementing scheduled_window policy parameters
    action: Enforce window >= 1 and window_dist >= 1 using assertions to prevent invalid sliding window configurations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Invalid window parameters cause negative array indexing or division by zero errors in scheduled_window status_gen,
      crashing backtesting
    stage_ids:
    - policy_generation
  - id: finance-C-088
    when: When implementing buyandhold policy dividend reinvestment
    action: Return 0.05 (representing 5% of totmoney) for dividend reinvestment, not the 0.005 sell ratio
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 0.005 for dividend reinvestment instead of 0.05 causes insufficient reinvestment amount (1% instead
      of 100% of dividend), significantly understating reinvestment returns in backtest
    stage_ids:
    - policy_generation
  - id: finance-C-090
    when: When implementing indicator-based policies
    action: Use past price data (iloc[-2]) for crossover detection to avoid look-ahead bias in backtesting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using current price for crossover detection introduces look-ahead bias, causing backtest returns to exceed
      what would be achievable in live trading where signals are delayed by one period
    stage_ids:
    - policy_generation
  - id: finance-C-091
    when: When initializing scheduled policy with times parameter
    action: Pass times list as dates within the price data range to verify policy has valid trading dates
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Scheduling trades on dates without price data causes KeyError or empty DataFrame issues in status_gen, preventing
      backtesting from running
    stage_ids:
    - policy_generation
  - id: finance-C-092
    when: When grid policy initialization
    action: Assert buypercent and sellpercent lists have equal length to verify grid levels are symmetrically defined
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched grid level lists cause index out of bounds errors during status_gen sell logic, crashing backtesting
      when accessing sellpts[i]
    stage_ids:
    - policy_generation
  - id: finance-C-097
    when: When using F-prefixed backtest codes
    action: Resolve F-prefix codes to fundinfo object (tries fundinfo, falls back to mfundinfo)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Wrong fund type object will be used, causing incorrect fee calculations and share rounding for the trading
      simulation
    stage_ids:
    - backtesting
  - id: finance-C-098
    when: When using M-prefixed backtest codes
    action: Resolve M-prefix codes to mfundinfo (monetary fund) object
    severity: high
    kind: domain_rule
    modality: must
    consequence: Wrong monetary fund object will be used, causing incorrect dividend processing and valuation for money market
      funds
    stage_ids:
    - backtesting
  - id: finance-C-101
    when: When performing financial calculations for fund transactions
    action: Use Decimal with proper rounding mode instead of floating-point arithmetic
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Floating-point rounding errors will cause incorrect share calculations, leading to small but cumulative discrepancies
      in backtest results
    stage_ids:
    - backtesting
  - id: finance-C-103
    when: When using example backtest strategy classes
    action: Use Scheduled, Tendency28, Balance, Grid classes in production environment
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: API instability will cause unexpected behavior when upgrading the library, as these classes are explicitly
      marked unstable
    stage_ids:
    - backtesting
  - id: finance-C-104
    when: When updating trade calendar data
    action: Update xalpha annually via pip install -U xalpha to refresh Chinese trading calendar
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Backtest will miss recent trading days or include incorrect dates, causing incomplete or incorrect simulation
      results for current year
    stage_ids:
    - backtesting
  - id: finance-C-105
    when: When trading QDII funds in backtest
    action: Account for delayed NAV publication (T-1 or earlier) in date handling
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtest will use incorrect NAV values or fail to find prices for QDII funds due to international market
      timing differences
    stage_ids:
    - backtesting
  - id: finance-C-107
    when: When using the backtesting framework
    action: Claim backtest execution equals live trading capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will misunderstand simulation as actual trading; the backtest engine only processes historical data
      and cannot execute real trades
    stage_ids:
    - backtesting
  - id: finance-C-108
    when: When processing share calculation with round down funds
    action: Use round_label=2 for funds in droplist to enable share rounding down
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Incorrect share calculation will cause mismatch between expected and actual investment amounts for funds
      like 003318, 000311 that always round down
    stage_ids:
    - backtesting
  - id: finance-C-109
    when: When handling multiple operations on the same trading day
    action: Rely on automatic handling of multiple buy/sell operations on same day
    severity: low
    kind: domain_rule
    modality: must_not
    consequence: Backtest may produce incorrect share calculations with 0.01 error tolerance issues; program ignores buys/sells
      on split-conversion days when no trading is allowed
    stage_ids:
    - backtesting
  - id: finance-C-113
    when: When calculating daily returns via ratedaily() static method
    action: Pass a price DataFrame with at least 2 rows to verify pct_change() produces valid output
    severity: high
    kind: domain_rule
    modality: must
    consequence: ratedaily() returns an empty list if the DataFrame has fewer than 2 rows, causing volatility() and other
      dependent calculations (sharpe, information_ratio) to fail or produce NaN/division by zero errors
    stage_ids:
    - technical_indicators
  - id: finance-C-114
    when: When calculating ROC (Rate of Change) technical indicator
    action: Verify the price column has at least 'window' rows to avoid division by zero in ROC calculation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: ROC calculation uses shift(window) which produces NaN for the first 'window' rows, and dividing by these
      NaN values or encountering zero denominators will produce invalid results or runtime warnings
    stage_ids:
    - technical_indicators
  - id: finance-C-115
    when: When calculating KDJ and Williams %R indicators
    action: Claim these indicators use intraday high/low prices for RSV calculation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: KDJ and WNR indicators explicitly use closing price as proxy for both high and low prices (rolling min/max
      over closing prices), which differs from standard KDJ calculations that use intraday OHLC data, producing different
      results from other software
    stage_ids:
    - technical_indicators
  - id: finance-C-116
    when: When using the indicator MixIn for strategy analysis
    action: Present backtest indicator results as guaranteed future trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Historical technical indicator analysis and backtest results do not guarantee future performance due to market
      conditions, transaction costs, slippage, and other live trading factors not fully captured in historical simulations
    stage_ids:
    - technical_indicators
  - id: finance-C-117
    when: When calculating volatility for Sharpe ratio and information ratio
    action: Use sqrt(250.0) as the days-in-year constant, not calendar days
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sharpe ratio and information ratio will be incorrectly scaled if a calendar-based days constant is used instead
      of trading days, leading to misaligned risk-adjusted return calculations compared to standard practice
    stage_ids:
    - technical_indicators
  - id: finance-C-118
    when: When using technical indicator library as a replaceable component
    action: Design custom indicator implementations to extend price DataFrame with new columns
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The indicator MixIn adds calculated columns directly to self.price DataFrame; custom indicators must follow
      this pattern to integrate with existing visualization and analysis methods (v_techindex, ma, ema, macd, etc.)
    stage_ids:
    - technical_indicators
  - id: finance-C-119
    when: When calculating MTM (Momentum) indicator
    action: Understand that diff(window) naturally creates NaN values in the first 'window' rows
    severity: low
    kind: domain_rule
    modality: must
    consequence: MTM calculation uses diff(window) which produces NaN for the first 'window' rows; these NaN values may propagate
      to dependent calculations or visualization if not properly handled
    stage_ids:
    - technical_indicators
  - id: finance-C-120
    when: When extending indicator functionality via MixIn inheritance
    action: Verify the class providing price data includes basicinfo or equivalent interface with price attribute
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The indicator MixIn relies on multiple inheritance with basicinfo classes (fundinfo, indexinfo, mulfix, etc.)
      which provide the self.price DataFrame; using indicator with incompatible classes will cause AttributeError
    stage_ids:
    - technical_indicators
  - id: finance-C-121
    when: When implementing custom rounding for financial calculations in indicator-related code
    action: Use Decimal with proper rounding mode (ROUND_HALF_UP or ROUND_DOWN) instead of float
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Float-based rounding can produce inconsistent results due to floating-point representation; Decimal with
      explicit rounding ensures consistent financial precision matching the codebase's convention
    stage_ids:
    - technical_indicators
  - id: finance-C-122
    when: When running bcmkset() with default start parameter
    action: Consider providing explicit start date to avoid data alignment issues with funds lacking netvalues
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: When start is None, bcmkset() uses the first available date which may differ between fund and benchmark,
      causing unequal date lengths and incorrect indicator calculations; the docstring explicitly warns about this issue
    stage_ids:
    - technical_indicators
  - id: finance-C-123
    when: When extending technical indicators with custom window parameters
    action: Verify the price DataFrame has sufficient rows for the rolling window size
    severity: low
    kind: domain_rule
    modality: must
    consequence: Rolling window calculations (ma, md, ema, boll, bias, rsi, kdj, wnr, dma, bbi, trix, psy) produce NaN values
      until enough data points accumulate, which may cause unexpected results in early-period analysis
    stage_ids:
    - technical_indicators
  - id: finance-C-126
    when: When transferring mul/mulfix objects from portfolio_management to backtesting
    action: Verify mul objects have populated fundtradeobj tuple with valid trade objects, and mulfix objects have valid totcftable
      with cash column
    severity: high
    kind: domain_rule
    modality: must
    consequence: get_current_mul() returns None or empty object; backtesting results show zero positions and incorrect performance
      metrics
    stage_ids:
    - portfolio_management
    - backtesting
  - id: finance-C-127
    when: When passing trade objects from backtesting to portfolio_management
    action: Verify trade objects maintain consistent date alignment between cftable, remtable, and infoobj.price within the
      same trading calendar
    severity: high
    kind: domain_rule
    modality: must
    consequence: FIFO position tracking fails; remain module encounters date ordering violations causing 'One cannot move
      share before the latest operation' exceptions
    stage_ids:
    - backtesting
    - portfolio_management
  - id: finance-C-128
    when: When setting up benchmark via bcmkset() from info_and_pricing to technical_indicators
    action: Verify benchmark infoobj has price DataFrame with 'date' and 'netvalue' columns aligned to opendate_set trading
      calendar
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: bcmkset() inner join on dates produces empty DataFrames, causing all technical indicators (sharpe, alpha,
      beta, max_drawdown) to return NaN or raise index errors
    stage_ids:
    - info_and_pricing
    - technical_indicators
  - id: finance-C-129
    when: When passing mulfix with indicator mixin from portfolio_management to technical_indicators
    action: Call bcmkset() before using any indicator methods (sharpe, alpha, beta, max_drawdown, ma, ema, macd, etc.)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Most indicator functions raise AttributeError or return incorrect results because benchmark is not set, leading
      to invalid portfolio performance metrics
    stage_ids:
    - portfolio_management
    - technical_indicators
  - id: finance-C-130
    when: When transferring price DataFrames from data_acquisition to info_and_pricing or trade_accounting
    action: Verify price DataFrame has date column as pandas.Timestamp, netvalue as float, and optional comment/totvalue columns
      in correct units
    severity: high
    kind: domain_rule
    modality: must
    consequence: Price lookups fail with KeyError; trade cost calculations produce NaN; XIRR Newton iteration diverges due
      to invalid cash flow sign patterns
    stage_ids:
    - data_acquisition
    - info_and_pricing
    - trade_accounting
  - id: finance-C-133
    when: When implementing any financial calculation involving monetary values
    action: Use Decimal for rounding and precision-critical calculations to avoid floating-point errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point arithmetic may introduce rounding errors in fund share calculations, causing discrepancies
      between expected and actual share quantities worth fractions of yuan
  - id: finance-C-134
    when: When processing price DataFrames across each modules
    action: Use date column as primary key, formatted as pd.Timestamp or string YYYY-MM-DD
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent date formats across modules will cause join/merge failures and incorrect date-based filtering
      in trade and backtest operations
  - id: finance-C-136
    when: When calculating XIRR internal rate of return
    action: Order cashflow list by date with final redemption appended last
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect XIRR calculation ordering produces wrong investment return estimates, leading to flawed capital
      allocation decisions
  - id: finance-C-137
    when: When running backtest simulation over date ranges
    action: Process only Chinese trading days (opendate_set) and skip holidays loaded from holiday.json
    severity: high
    kind: domain_rule
    modality: must
    consequence: Processing non-trading days in backtest produces trades on exchange-closed dates, invalidating simulation
      results and causing data lookup failures
  - id: finance-C-138
    when: When implementing subclasses of policy.py base class
    action: Implement run logic in subclasses — status_gen is a template method requiring override
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling status_gen on the base policy class raises NotImplementedError, preventing policy generation and
      backtesting
  - id: finance-C-139
    when: When implementing subclasses of backtest.py BTE class
    action: Implement run(date) method in subclass — BTE.run is a template requiring override
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling backtest() on a BTE subclass without implementing run() raises NotImplementedError, preventing strategy
      execution
  - id: finance-C-140
    when: When using indicator mixin class for quantitative analysis
    action: Verify host object has price attribute with date-based index before calling bcmkset
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Missing price attribute causes AttributeError when computing indicators, preventing quantitative analysis
  - id: finance-C-143
    when: When using data fetched via xalpha's universal.py and info.py modules
    action: Claim the data is real-time or current — each data sources have inherent delays (15-min to T+1 for funds)
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Trading decisions based on stale data cause users to buy/sell at incorrect prices, resulting in financial
      losses from delayed or mispriced executions
  - id: finance-C-145
    when: When using xalpha for non-Chinese market analysis
    action: Claim comprehensive non-Chinese market support — xalpha's primary focus is Chinese financial markets
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Building non-Chinese market systems on xalpha leads to incomplete data coverage, incorrect trading calendar
      handling, and failed trade execution on foreign exchanges
  - id: finance-C-146
    when: When using xalpha's data scraping and web API fetching capabilities
    action: Handle upstream HTML/API changes gracefully — xalpha relies on external public data sources without data storage
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Upstream website changes cause ParserFailure exceptions, breaking data fetching and leaving users without
      market data for analysis
  - id: finance-C-147
    when: When initializing trade objects with cftable and remtable
    action: Provide both cftable and remtable together — partial initialization raises ValueError
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Providing only one of cftable or remtable corrupts trade accounting, causing incorrect portfolio valuation
      and share tracking
  - id: finance-C-148
    when: When implementing or refactoring data acquisition logic in xalpha/universal.py
    action: Maintain the multiple provider fallback chain after custom handler execution — verify default providers are tried
      when custom handler returns None or empty result; never short-circuit the fallback chain to a single provider
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing the provider fallback chain creates single points of failure; when primary data providers change
      APIs or become unavailable, backtesting will fail silently with empty data instead of automatically switching to alternative
      sources
    derived_from_bd_id: BD-002
  - id: finance-C-149
    when: When implementing custom data fetchers via set_handler injection
    action: Return None from custom handler to signal fallback to default sources — never return empty data as a final result
      without exhausting default provider options first
    severity: high
    kind: domain_rule
    modality: must
    consequence: Custom handlers that return empty results without falling back to default providers cause incomplete or missing
      price data in backtesting, leading to calculation errors and incorrect portfolio valuations
    derived_from_bd_id: BD-001
  - id: finance-C-150
    when: When implementing trade request processing in xalpha/info.py:371(shengou)
    action: Forward-adjust trade request dates that fall on non-trading days (weekends, holidays) to the next valid trading
      day — do not reject orders or leave them unprocessed
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Rejecting or misprocessing non-trading day requests breaks investment scheduling consistency; orders scheduled
      for holidays would fail and create gaps in portfolio state, causing backtest-live execution mismatches
    derived_from_bd_id: BD-027
  - id: finance-C-152
    when: When implementing data refresh logic in xalpha/info.py
    action: Verify date parameters in data fetch requests align with the last known update timestamp to enable incremental
      fetches — compare request start_date with cached end_date before initiating full history downloads
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Performing full history downloads instead of incremental updates wastes bandwidth and exhausts API rate limits;
      strategies requiring frequent data refreshes will hit rate limits faster and experience longer update cycles
    derived_from_bd_id: BD-004
  - id: finance-C-153
    when: When processing user-recorded trade dates in xalpha/trade.py
    action: Shift user-provided calendar dates to the next valid trading day when they fall on non-trading days — issue a
      warning when date shifting occurs to alert users of timing mismatches
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Silently accepting non-trading day dates creates execution timing mismatches between user records and actual
      trades; performance attribution becomes inaccurate and tax lot identification may reference wrong settlement dates
    derived_from_bd_id: BD-013
  - id: finance-C-154
    when: When implementing mulfix unit value calculations in xalpha/multiple.py:611(_vcash)
    action: Model uninvested cash as a monetary fund position (virtual cash mf) to enable continuous NAV calculation — the
      _vcash field must exist and be included in unitvalue calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting virtual cash handling from mulfix calculations understates portfolio NAV when cash is not fully
      invested; performance metrics become incorrect and fund share pricing diverges from actual portfolio value
    derived_from_bd_id: BD-015
  - id: finance-C-155
    when: When implementing relative date calculations in xalpha/cons.py
    action: Verify that yesterdayobj() usage is limited to China-related data processing — implement explicit timezone conversion
      at system boundaries when processing data from non-Asia/Shanghai timezones
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Hardcoded UTC+8 timezone in date calculations produces incorrect previous-day references for US, Europe,
      or other markets; strategies comparing overnight returns across international assets will have systematic date mismatches
    derived_from_bd_id: BD-109
  - id: finance-C-156
    when: When implementing dividend detection and reinvestment logic in xalpha/policy.py
    action: Check for magic value 0.05 in status table comment column to signal dividend reinvestment — preserve this convention
      during data processing; do not strip or ignore comment column values during data transformation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting the magic value 0.05 detection breaks dividend reinvestment logic; cash dividends will be processed
      as regular trades instead of automatic reinvestments, causing NAV calculation errors and incorrect portfolio composition
    derived_from_bd_id: BD-006
  - id: finance-C-157
    when: When implementing position adjustment or trade execution order validation in backtesting
    action: Enforce sell-before-buy order validation — verify sell orders are processed and validated before buy orders execute,
      preventing impossible sell-before-buy scenarios that violate Chinese mutual fund accounting principles
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allowing buy-before-sell creates impossible trading scenarios in fund accounting, causing NAV calculation
      errors that make backtest results non-reproducible in live trading where fund accounts strictly enforce share ownership
      constraints
    derived_from_bd_id: BD-011
  - id: finance-C-158
    when: When implementing share calculation for fund redemption or purchase
    action: Check if the fund is in the truncation droplist before applying round-down logic — verify round_label parameter
      matches fund requirements; do not assume each funds use standard rounding
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Applying standard rounding to truncation-required funds over-allocates shares, causing actual share count
      to exceed purchased amount and leading to reconciliation failures or unexpected redemption shortfalls
    derived_from_bd_id: BD-029
  - id: finance-C-159
    when: When implementing sell order processing where quantity may exceed available shares
    action: Verify the silent clipping behavior matches expected backtest semantics — when selling more than owned, confirm
      that clipped execution (selling available shares only) is the intended behavior rather than an error condition requiring
      explicit handling
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Silent clipping causes backtest positions to differ from expected sell orders, accumulating discrepancies
      in high-frequency strategies where partial fills significantly alter capital utilization and final returns
    derived_from_bd_id: BD-009
  - id: finance-C-160
    when: When adding or modifying fund entries in the droplist at xalpha/cons.py
    action: Verify round_label=1 is correctly set for each funds requiring round-down share calculation — missing round_label
      for truncation funds causes systematic share miscalculation that propagates to NAV and redemption errors
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Adding funds to droplist without correct round_label causes silent share miscalculation, where allocated
      shares differ from purchased amount by the fractional truncation amount, accumulating across multiple transactions
    derived_from_bd_id: BD-101
  - id: finance-C-161
    when: When parsing fee information from Chinese text strings for fund redemption calculation
    action: Implement robust text parsing validation for redemption tiers — verify parsed fee values fall within expected
      ranges (typically 0-5% for front-end load, 0-3% for backend load by year); reject or flag parsed values outside normal
      ranges
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrectly parsed fee strings produce wrong redemption cost calculations, systematically overestimating
      or underestimating actual charges and causing backtest returns to diverge from live trading reality
    derived_from_bd_id: BD-005
  - id: finance-C-163
    when: When processing status table values for policy generation
    action: Apply sign convention correctly — negative status values indicate sell actions while positive values indicate
      buy; verify sign interpretation matches the 0.005 multiplier convention for dividend reinvestment detection
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misinterpreting status sign convention causes opposite trading actions to be generated, executing sells when
      buys were intended or vice versa, resulting in catastrophic portfolio position errors
    derived_from_bd_id: BD-019
  - id: finance-C-164
    when: When implementing or refactoring monetary calculation logic
    action: Use Decimal with ROUND_HALF_UP for each monetary calculations including fees, dividends, share prices, and portfolio
      valuations — do not use floating-point arithmetic or banker's rounding
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using floating-point arithmetic or ROUND_HALF_EVEN for monetary calculations introduces cumulative rounding
      errors that cause portfolio value discrepancies; over time, the accumulated error can cause significant divergence between
      backtest equity and actual account balance
    derived_from_bd_id: BD-028
  - id: finance-C-165
    when: When implementing sell order processing logic
    action: Clamp each sell orders to the available holding quantity — reject or limit any sell request that exceeds current
      holdings to prevent short positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing the sell clamp allows short positions to form in a long-only fund management system; this violates
      regulatory requirements for long-only portfolios and creates positions that cannot be settled in live trading, causing
      backtest-live execution gaps
    derived_from_bd_id: BD-065
  - id: finance-C-166
    when: When adding new fund types or modifying fund property encoding
    action: Maintain the 3-bit bitmask encoding for round_label (bit 0), dividend_label (bit 1), and value_label (bit 2) —
      only use values 0-7; any fund additions must explicitly document the bitmask value and update each code that checks
      fund properties via bitwise operations
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Incorrect bitmask encoding causes fund properties to be misinterpreted silently; a value of 3 could mean
      (round=1, dividend=1) or be read as a single label depending on parsing logic, causing wrong dividend treatment or valuation
      method selection
    derived_from_bd_id: BD-100
  - id: finance-C-167
    when: When implementing random operations in backtesting or simulation
    action: Assume each random operations in the framework have deterministic seeding — not each modules set random seeds,
      leading to non-reproducible backtest results across different runs
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Non-deterministic random operations cause backtest results to vary between runs; strategies that appear profitable
      in one run may fail in another due to random order execution or simulation variance, making it impossible to verify
      strategy consistency
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-168
    when: When implementing backtesting reproducibility requirements
    action: Implement random seed configuration that covers each random operations in the pipeline — set seed at the start
      of each backtest run and verify each numpy.random, random, and library-specific random generators use the configured
      seed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without full random seed coverage, backtest results cannot be reproduced exactly; this breaks the ability
      to verify strategy performance, compare parameter changes, or debug issues reliably across different machines or time
      periods
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-169
    when: When implementing model or data versioning in production backtesting
    action: Assume the framework automatically snapshots model or data versions — the framework does not track which version
      of price data, factor models, or strategy parameters was used for each backtest run
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without model/data version tracking, backtest results become unreproducible as underlying data or models
      change over time; a backtest run today with different data versions produces different results than the same strategy
      run last month
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-170
    when: When implementing backtest reproducibility requirements
    action: Implement model and data version snapshot at the start of each backtest run — record timestamps, data source versions,
      and strategy parameter hashes; store these alongside backtest results to enable exact reproduction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without version snapshots, changing data sources or model updates invalidate previous backtest comparisons;
      strategies cannot be properly audited, compliance reports cannot reproduce historical performance, and parameter optimization
      results become meaningless
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-171
    when: When encoding fee values with fractional components
    action: Use the binary encoding scheme that places fractional fee values (0.5) in a designated position to distinguish
      between amounts like 10000.50 vs 10000.005 — do not rely solely on floating-point representation for fee disambiguation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point fee representation causes ambiguity in fee parsing; 10000.50 and 10000.005 may become indistinguishable
      due to float precision issues, leading to incorrect fee calculations and portfolio balance errors
    derived_from_bd_id: BD-012
  - id: finance-C-172
    when: When encoding or parsing fund property fields
    action: Use additive bitmask encoding where round_label=1 (bit 0), dividend_label=2 (bit 1), value_label=4 (bit 2) — valid
      values are 0-7; use bitwise operations to check individual properties rather than equality comparisons
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect property encoding or parsing causes fund characteristics to be misidentified; a fund with dividend=1,
      round=1 (value=3) may be read as value=3 if parsed incorrectly, causing wrong dividend reinvestment or NAV calculation
      logic
    derived_from_bd_id: BD-016
  - id: finance-C-173
    when: When implementing position/liquidation logic with proportional sell quantities
    action: Use negative decimal values in the range (-0.005, 0] to represent 0-100% proportional sell orders, where -0.005
      = 100% of holdings
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the proportional sell encoding range could cause position sizing to exceed available holdings, resulting
      in rejected orders in live trading or incorrect backtest results that don't match actual execution
    derived_from_bd_id: BD-034
  - id: finance-C-174
    when: When implementing return calculation logic for portfolios with irregular investment timelines
    action: Use XIRR (Extended IRR) instead of standard IRR for calculating returns when cash flows occur at irregular intervals
      — standard IRR assumes regular intervals which do not match real investment schedules
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using standard IRR on irregular cash flows produces incorrect performance metrics that misrepresent actual
      investment returns, leading to poor allocation decisions based on inaccurate performance data
    derived_from_bd_id: BD-035
  - id: finance-C-175
    when: When using rsi() function without explicit period parameter
    action: Verify that the 14-day default period balances signal reliability and responsiveness for the target strategy —
      shorter periods (7-day) increase responsiveness but reduce reliability; longer periods (21-day) increase reliability
      but reduce responsiveness
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 14-day RSI may generate delayed signals in fast-moving markets or false signals in ranging markets,
      causing strategies to miss profitable entries or enter losing positions
    derived_from_bd_id: BD-042
  - id: finance-C-176
    when: When implementing exponential moving average calculations using pandas ewm
    action: Use span=window parameter with alpha=2/(window+1) for EMA calculations — this maintains consistency with pandas
      ewm implementation where alpha = 2/(span+1), ensuring correct smoothing factor (e.g., window=12 gives alpha=0.1538)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using inconsistent alpha formulas produces EMA values that differ from expected pandas ewm output, causing
      indicator-based strategies to generate different signals than intended
    derived_from_bd_id: BD-085
  - id: finance-C-177
    when: When implementing or modifying grid trading policy
    action: Change the sell_threshold to be >= buy_threshold in the grid definition — the invariant sell_threshold < buy_threshold
      defines profit zones and must be maintained for grid strategy to generate returns
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Changing to sell_threshold >= buy_threshold eliminates the profit zone entirely, causing the grid strategy
      to generate no profits or losses from price oscillations across grid levels
    derived_from_bd_id: BD-111
  - id: finance-C-179
    when: When calculating redemption fees for funds with tiered early redemption penalties
    action: Parse redemption fee text into day-based tiers using the feedecision function (xalpha/info.py:786) before performing
      any fee calculations — do not assume a flat fee structure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Assuming flat redemption fee structure for tiered penalty funds causes incorrect fee calculations, leading
      to backtest results that misrepresent actual redemption costs by potentially 50-100% for short holding periods
    derived_from_bd_id: BD-046
  - id: finance-C-180
    when: When implementing grid strategy execution logic in policy.py
    action: Execute buy orders when price crosses below a grid line and sell orders when price crosses above a grid line —
      orders must trigger on boundary crossings, not price proximity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using proximity-based grid triggers instead of cross-based triggers causes excessive unnecessary trading
      near grid lines, significantly increasing transaction costs and reducing net strategy returns
    derived_from_bd_id: BD-057
  - id: finance-C-181
    when: When implementing indicator cross strategy signals in policy.py
    action: Trigger indicator cross signals on day-after confirmation — execute trades the day following the confirmed cross
      signal, not on the same day as the cross occurs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Executing on same-day indicator crosses causes whipsaw trades from intraday price reversals that don't persist
      to close, leading to buying at highs and selling at lows
    derived_from_bd_id: BD-058
  - id: finance-C-182
    when: When implementing value averaging (AverageScheduled) strategy in backtest.py
    action: Execute buy orders when current value is below the target and sell orders when above target — allocation must
      increase for underperforming positions and decrease for outperforming positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Implementing trend-following instead of contrarian value averaging eliminates the mean-reversion properties,
      causing portfolio to buy high and sell low during market reversals
    derived_from_bd_id: BD-060
  - id: finance-C-183
    when: When using the KDJ indicator without explicitly specifying parameters
    action: Verify KDJ parameters (n, m, k) match regional trading conventions (9, 3, 3) — if different parameters are used,
      document the deviation as it affects signal interpretation for Chinese market traders
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using non-standard KDJ parameters without documentation causes confusion for regional traders expecting (9,
      3, 3) convention, potentially leading to misinterpreted signals and incorrect trading decisions
    derived_from_bd_id: BD-044
  - id: finance-C-184
    when: When calculating portfolio turnover rate using trade.py:91
    action: 'Verify turnover_rate formula uses 2 * peak_capital as divisor (not average_capital) — confirm the formula matches:
      total_trade_amount / (2 * peak_capital) / years'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using average capital instead of peak capital in turnover formula understates trading activity, misrepresenting
      the actual capital deployment and risk exposure of the portfolio
    derived_from_bd_id: BD-045
  - id: finance-C-185
    when: When estimating QDII fund net asset value for next-day trading
    action: Use US market close prices and FX rates for T-1 NAV estimation — do not attempt same-day QDII estimation as US
      market data is unavailable during China trading hours
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Attempting same-day QDII NAV estimation fails due to US market data unavailability, causing stale price execution
      that systematically misprices QDII fund trades by 0.5-2% on volatile days
    derived_from_bd_id: BD-047
  - id: finance-C-186
    when: When performing portfolio optimization with mulfix calculations
    action: Include virtual cash fund (_vcash at xalpha/multiple.py:611) as placeholder for uninvested capital — do not exclude
      uninvested capital from portfolio value tracking
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Excluding virtual cash for uninvested capital misrepresents total portfolio value, causing optimization algorithms
      to overallocate and misrepresent actual cash drag on returns
    derived_from_bd_id: BD-050
  - id: finance-C-187
    when: When implementing trade calculations involving monetary values and share counts
    action: Use Decimal with ROUND_HALF_UP for monetary calculations AND apply epsilon (1e-6) before integer conversion for
      share counts — both mechanisms must be active for precision assurance
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Omitting Decimal rounding causes monetary calculation errors that accumulate to penny-level discrepancies
      in fee and NAV calculations; omitting epsilon handling causes 0.999999 shares to truncate to 0 instead of rounding to
      1 share
    derived_from_bd_id: BD-119
  - id: finance-C-188
    when: When performing matrix operations in portfolio optimization or risk calculations
    action: Assume the framework handles matrix ill-conditioning automatically — matrices near singularity will produce unreliable
      inverse results without explicit regularization or condition number checks
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Operating on ill-conditioned matrices without regularization produces numerically unstable inversions, causing
      portfolio optimization to fail silently with NaN or overflow values in weight calculations
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-189
    when: When performing matrix operations in portfolio optimization or risk calculations
    action: Check matrix condition number before inversion operations — if condition_number > threshold (typically 1e10),
      apply Tikhonov regularization by adding lambda * I to the matrix before inversion, or use pseudo-inverse methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failing to detect and handle ill-conditioned matrices causes portfolio optimization to produce unstable weight
      allocations that vary wildly with small input changes, making strategies non-reproducible
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-190
    when: When implementing grid sell calculations in xalpha/policy.py
    action: Calculate grid sell amount as total shares divided by current grid level, not as equal shares per level
    severity: high
    kind: domain_rule
    modality: must
    consequence: Equal share quantities create unequal value exposure across grid levels, with smaller positions at lower
      prices and larger positions at higher prices, breaking the grid's risk management logic and potentially causing significant
      capital inefficiency
    derived_from_bd_id: BD-061
  - id: finance-C-191
    when: When processing portfolio state in xalpha/trade.py dailyreport
    action: Treat net value of 0 with zero shares held as a valid sellout/position closure signal, not as a data error
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrectly flagging zero-holding zero-nav as an error causes false portfolio state tracking, leading to
      incorrect performance calculations and potentially triggering unintended rebalancing or capital allocation decisions
    derived_from_bd_id: BD-064
  - id: finance-C-192
    when: When implementing fund performance comparison charts
    action: Normalize net values to 1.0 on the start date for each funds being compared to verify fair performance comparison
      regardless of initial investment amount
    severity: high
    kind: domain_rule
    modality: must
    consequence: Comparing non-normalized absolute values favors funds with larger initial investments, distorting relative
      performance assessment and potentially leading to incorrect fund selection decisions
    derived_from_bd_id: BD-052
  - id: finance-C-193
    when: When calculating investment return rate in xalpha/trade.py dailyreport
    action: Calculate return rate as earnings divided by peak capital占用 (peak capital), not average capital or initial capital
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using average capital instead of peak capital inflates return rates by ignoring capital deployment timing,
      potentially causing overestimation of strategy performance by 10-30% for strategies with gradual capital deployment
    derived_from_bd_id: BD-054
  - id: finance-C-194
    when: When implementing balance strategy rebalancing logic in xalpha/backtest.py run
    action: Trigger rebalancing when any single asset drifts from target allocation beyond the threshold, not aggregate drift
      or calendar-based triggers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using aggregate drift or calendar-based rebalancing reduces allocation precision, causing individual assets
      to deviate significantly from targets and increasing portfolio risk exposure beyond intended levels
    derived_from_bd_id: BD-055
  - id: finance-C-195
    when: When implementing trend rotation signal logic in xalpha/backtest.py run
    action: Require both momentum vs threshold AND relative performance conditions to be met simultaneously for trend rotation,
      not single-criteria decisions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single-criteria trend rotation significantly increases false signal rate, causing unnecessary trades and
      reducing strategy returns in live trading by 15-25% compared to backtested results
    derived_from_bd_id: BD-056
  - id: finance-C-196
    when: When implementing portfolio valuation and reconciliation logic
    action: 'Verify PnL conservation properties are maintained: total realized PnL must equal sum of individual trade PnLs,
      and unrealized PnL changes must reconcile with price movements'
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Violating PnL conservation produces materially incorrect equity curves that cannot be reconciled to source
      trade data, causing significant discrepancies in performance reporting and regulatory audits
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-197
    when: When implementing portfolio valuation and reconciliation logic
    action: 'Implement PnL reconciliation checks: portfolio total valuation must equal sum of individual position valuations
      within bounded rounding tolerance, with discrepancies logged and reconciled end-of-day'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without PnL reconciliation, silent arithmetic errors accumulate over time, causing reported equity to diverge
      from actual position values by amounts that may not be detected until significant losses occur
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-198
    when: When implementing audit trail logging for trading events
    action: Assume a mutable event log for audit trails — the system must not modify or delete historical events once recorded;
      the event log must be append-only
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Mutable event logs allow historical records to be altered retroactively, causing regulatory audit failures
      and enabling hidden trade manipulations or PnL adjustments that go undetected
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-199
    when: When implementing audit trail logging for trading events
    action: 'Implement immutable event logging: log each critical events (trades, valuations, rebalances) to append-only storage
      with cryptographic integrity verification (e.g., hash chaining or signed logs)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without immutable event logs, audit trails lose legal validity; regulators and internal auditors cannot verify
      the integrity of historical trading records, leading to compliance violations
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-200
    when: When implementing position cost and return calculations for long-short portfolios
    action: Assume carry/funding costs are zero when modeling positions — the framework does not automatically account for
      borrowing costs on short positions or yield on long positions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Ignoring carry costs produces inflated backtest returns by 1-5% annually for high-carry currency pairs and
      3-8% for short equity positions, causing strategies to appear profitable when they would lose money after real costs
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-201
    when: When implementing position cost and return calculations for long-short portfolios
    action: 'Explicitly model carry/funding costs: calculate daily carry cost for short positions as (benchmark_rate + spread)
      × position_value / 365, and funding yield for long positions as benchmark_rate × position_value / 365; verify accruals
      match position size and benchmark rates'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without carry cost modeling, backtests misrepresent true strategy performance; strategies that appear profitable
      after carry costs may actually be loss-making, leading to unexpected live trading losses
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-202
    when: When implementing strategy development and backtesting workflows
    action: Assume in-sample backtest performance predicts out-of-sample performance without statistical validation — the
      framework does not implement overfitting detection
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Strategies optimized purely on historical data without overfitting protection frequently fail in live trading,
      with out-of-sample Sharpe ratios 50-90% lower than in-sample values, causing significant trading losses
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-203
    when: When implementing strategy development and backtesting workflows
    action: 'Implement out-of-sample validation: use walk-forward analysis or hold-out testing with minimum 70/30 in-sample/out-of-sample
      split; report out-of-sample Sharpe, max drawdown, and win rate alongside in-sample metrics'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without out-of-sample validation, overfitted strategies appear profitable in backtests but fail in live trading,
      wasting capital on strategies with no real edge
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-204
    when: When implementing data acquisition and feature engineering for strategy development
    action: Assume temporal data boundaries are enforced without explicit checks — the framework does not implement train/test/trade
      boundary enforcement or look-ahead bias detection
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit temporal boundaries, future data may leak into training sets causing look-ahead bias, making
      backtests unrealistically profitable and strategies fail catastrophically in live trading
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-205
    when: When implementing data acquisition and feature engineering for strategy development
    action: 'Enforce temporal boundaries: implement explicit train/test/trade date separation with no data leakage; add look-ahead
      bias checks that verify no feature uses data with timestamp after the model''s as-of date'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without temporal boundary enforcement, strategies use future information during training, creating look-ahead
      bias that makes backtests appear profitable but live trading results diverge significantly
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-206
    when: When inferring stock holdings from fund reports using the get_stock_holdings function in multiple.py
    action: Use exactly 120-day lookback window for last report date inference — this captures multiple quarterly reporting
      cycles while avoiding stale data
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using a shorter lookback (e.g., 60-day) may miss delayed quarterly reports, causing incomplete stock holdings
      data; using a longer lookback may include stale holdings data from expired reports
    derived_from_bd_id: BD-070
  - id: finance-C-207
    when: When processing fund conversion events in remain.trans
    action: Scale position quantities and prices by the conversion factor on the conversion date to maintain equivalent position
      value across fund conversion events
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ignoring fund conversions causes significant portfolio value discrepancies after conversion events, as share
      counts and NAVs change while position value must be preserved
    derived_from_bd_id: BD-071
  - id: finance-C-208
    when: When computing internal rate of return using xirr function
    action: Use scipy.optimize.newton with initial_guess=0.1 for IRR calculation — this provides rapid convergence for typical
      IRR values in the 0-50% range
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using different initial guesses or alternative solvers without proper convergence handling may fail to find
      IRR for extreme values (IRR < -90% or > 500%), causing calculation errors in edge cases
    derived_from_bd_id: BD-072
  - id: finance-C-209
    when: When computing net present value using xnpv function
    action: Use 365-day year division (days/365.0) for annualization in exponential discounting — this provides consistent
      present value computation with ~0.27% error during leap years which is immaterial for most instruments
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using calendar-day year (365.25) or ACT/ACT day count adds unnecessary complexity for negligible precision
      gain; switching to 30/360 is unsuitable for variable cash flows
    derived_from_bd_id: BD-073
  - id: finance-C-210
    when: When annualizing daily volatility for risk reporting using sqrt_days_in_year parameter
    action: Use sqrt(250.0) for trading-day annualization of daily volatility — actual trading days vary 245-253 annually
      but the 2% variation is immaterial for standard risk reporting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using calendar-day annualization (sqrt(252)) overstates volatility for inactive periods; using 252-254 trading
      days requires dynamic updates that add maintenance burden without material benefit
    derived_from_bd_id: BD-074
  - id: finance-C-211
    when: When implementing KDJ indicator (RSV=(C-min)/(max-min), K=MA3(RSV), D=MA3(K), J=3K-2D)
    action: Verify that the 9-period lookback matches target asset volatility characteristics; implement bounds or smoothing
      on %J values to prevent extreme readings during volatile periods
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: KDJ uses fixed 9-period lookback assuming consistent market dynamics, which may not adapt to high-volatility
      regimes; unbounded %J produces extreme values that generate false overbought/oversold signals during volatile markets
    derived_from_bd_id: BD-090
  - id: finance-C-213
    when: When calculating bond yield-to-maturity using xirr with guess=0.01
    action: Verify that 0.01 initial guess converges for target bonds; for high-yield bonds with YTM potentially > 20%, use
      a higher initial guess (e.g., 0.15) or bisection method to verify convergence
    severity: high
    kind: operational_lesson
    modality: must
    consequence: XIRR with 0.01 initial guess may fail to converge for high-yield bonds with YTM significantly above 1%, causing
      pricing failures and inability to compare bond values accurately
    derived_from_bd_id: BD-095
  - id: finance-C-215
    when: When implementing or extending policy subclasses
    action: Any subclass of policy must implement the run() method; document the mandatory contract in class docstrings to
      prevent AttributeError at runtime when status_gen invokes run()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: policy.status_gen uses template method pattern invoking abstract run() at line 54; subclasses without run()
      implementation will raise AttributeError at runtime, causing strategy execution to fail silently
    derived_from_bd_id: BD-103
  - id: finance-C-216
    when: When implementing XIRR calculation with irregular cash flows
    action: Use scipy.optimize with Newton-Raphson numerical method for XIRR — manual implementations or approximation methods
      are not acceptable due to convergence and accuracy requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Manual Newton-Raphson implementation lacks scipy's tested convergence handling, potentially causing infinite
      loops or incorrect IRR values for pathological cash flow patterns
    derived_from_bd_id: BD-026
  - id: finance-C-217
    when: When initializing incremental accounting with cftable and remtable parameters
    action: Pass cftable and remtable together — either provide both table objects or pass both as None; never initialize
      one without the other
    severity: high
    kind: domain_rule
    modality: must
    consequence: Partial initialization where only one table is provided corrupts accounting state, causing inconsistent position
      tracking and incorrect portfolio valuations during incremental processing
    derived_from_bd_id: BD-014
  - id: finance-C-218
    when: When processing redemption requests in remain.py
    action: Apply FIFO (First-In-First-Out) ordering — sell oldest acquired positions first to verify tax-compliant cost basis
      tracking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-FIFO redemption ordering produces incorrect cost basis calculations, leading to wrong capital gains estimates
      and potential tax compliance violations under regulatory requirements
    derived_from_bd_id: BD-030
  - id: finance-C-219
    when: When calculating fees using custom fee encoding logic
    action: Check third decimal position value of 5 to identify custom fee interpretation triggers — apply custom fee handling
      logic when detected
    severity: high
    kind: domain_rule
    modality: must
    consequence: Custom fee encoding via decimal position fails silently if third decimal equals 5 is not detected, causing
      incorrect fee calculations that result in systematic financial discrepancies
    derived_from_bd_id: BD-032
  - id: finance-C-220
    when: When implementing backtest date filtering logic
    action: Filter backtest iterations to China's trading calendar business days only — do not execute trades on non-trading
      days (weekends, public holidays)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtesting on non-trading days produces unrealistic trade schedules where buy/sell orders execute on market-closed
      dates, causing backtest results that cannot be reproduced in live trading
    derived_from_bd_id: BD-049
  - id: finance-C-221
    when: When accessing fund holdings data for position analysis
    action: Verify holdings data represents the most recent quarterly disclosure date — positions between disclosure dates
      are estimates, not actual holdings
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using quarterly holdings as current positions causes position estimation errors that accumulate between disclosure
      dates; strategies relying on exact holdings weights will show backtest-live divergence
    derived_from_bd_id: BD-017
  - id: finance-C-222
    when: When processing real-time market data feeds for order execution
    action: Assume market data timestamps represent as-of times — the framework does not distinguish between data timestamp
      and processing timestamp, treating each data as immediately available
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without as-of vs processing time distinction, backtests may use data that was not yet published at the claimed
      timestamp, introducing look-ahead bias that causes live trading underperformance
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-223
    when: When validating position data integrity during trade execution
    action: Implement explicit validation checks for position share values — verify share quantities remain non-negative and
      within reasonable bounds after each FIFO operation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Nested list position tracking lacks DataFrame validation; FIFO operations may silently produce invalid negative
      share quantities or data corruption, causing incorrect position sizing in subsequent trades
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-224
    when: When implementing position tracking data structures for FIFO trade execution
    action: Replace nested list position tracking with DataFrame or validated data structure — nested [[date, share], ...]
      lacks built-in validation and may cause silent data corruption during edge cases
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Nested list FIFO implementation provides no structural validation; incorrect trade sequences may produce
      negative share values or corrupted queue state that persists until detected
    derived_from_bd_id: BD-008
  - id: finance-C-225
    when: When calculating risk metrics or displaying maximum drawdown in backtest results
    action: Calculate maximum drawdown as worst peak-to-trough over the entire backtest period — must track cumulative peak
      equity and measure maximum decline from each peak, not average or recent period
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using average drawdown instead of maximum drawdown underestimates tail risk, leading to strategies that appear
      safer than they actually are; in live trading, unexpected large drawdowns can trigger margin calls or forced liquidation
    derived_from_bd_id: BD-053
  - id: finance-C-226
    when: When converting fund share quantities in trade accounting operations
    action: Add 1e-6 epsilon before integer conversion for share count calculations — use round(x + 1e-6) instead of direct
      int() or round() to prevent 0.999999 truncation errors
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct int() conversion truncates 0.999999 to 0 shares, causing systematic undercounting of fund shares;
      errors accumulate in high-frequency rebalancing, leading to fractional share losses and backtest-live reconciliation
      discrepancies
    derived_from_bd_id: BD-063
  - id: finance-C-227
    when: When implementing or refactoring policy and record type relationships in the trade accounting system
    action: Verify policy.status maintains inheritance or compatibility with record.status — do not decouple policy types
      from record types without an explicit adapter layer; policy objects must produce status entries that the trade module
      can process
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Separating policy from record types without an adapter causes silent type incompatibility errors; automated
      trading policies fail to generate tradable status entries, resulting in strategies that generate signals but cannot
      execute trades
    derived_from_bd_id: BD-018
  - id: finance-C-229
    when: When processing transaction dates in trade._addrow that conflict with existing entries
    action: Apply forward date shifting preference — attempt to move conflicting transaction dates forward first; only fall
      back to backward shifting when forward shift is impossible; maintain consistent directional priority across each trade
      processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent date shifting direction causes historical record modification in unpredictable ways, leading
      to incorrect position tracking; trades may be assigned to wrong dates, corrupting P&L attribution and causing backtest-live
      execution mismatches
    derived_from_bd_id: BD-108
  - id: finance-C-230
    when: When using BTE.get_code to fetch fund information
    action: 'Use correct prefix: ''F'' prefix for standard funds, ''M'' prefix for money market funds (mfundinfo), any other
      prefix defaults to variable info (vinfo). Verify prefix matches intended data source before calling get_code'
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Incorrect prefix causes silent fallback to wrong info type - standard fund data returned when mfundinfo expected,
      or vice versa, corrupting backtest calculations with incorrect NAV or price data
    derived_from_bd_id: BD-115
  - id: finance-C-231
    when: When processing fund data or calculating positions at historical dates
    action: Assume the framework provides point-in-time data - the framework lacks historical snapshot capability and uses
      current data for historical calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time data, historical backtests use current fund information for past dates, causing look-ahead
      bias where fund mergers, splits, or fee changes are incorrectly applied retroactively
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-237
    when: When implementing data persistence or state management in production systems
    action: Assume the framework implements versioned write and snapshot capabilities — the framework lacks native support
      for atomic versioned writes and point-in-time snapshots, treating each write operations as immediate and unversioned
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without versioned write and snapshot support, data corruption during write failures cannot be recovered;
      production systems risk permanent data loss during crashes or partial writes
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-238
    when: When implementing production data persistence with recovery requirements
    action: Implement external versioning layer using database transactions or file versioning — use write-ahead logging (WAL)
      pattern with atomic file operations (rename) to verify point-in-time recovery capability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without external versioning, any write failure or crash leaves data in inconsistent state with no recovery
      path; strategies relying on historical data may use corrupted snapshots
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-240
    when: When calculating performance metrics for active manager evaluation
    action: Calculate Information Ratio as (rp - rm) / tracking_error_vol exactly — do not substitute with Excess Return /
      VaR or other alternatives that incorporate tail risk or change the risk normalization basis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative IR formulations changes how active managers are evaluated; strategies that appear inferior
      under one metric may rank higher under another, leading to suboptimal manager selection and allocation decisions
    derived_from_bd_id: BD-083
  - id: finance-C-241
    when: When implementing position adjustment logic with quarterly rebalancing
    action: Apply position smoothing formula new_pos = (0.92+o)/2 exactly — maintain the 0.92 coefficient that creates 50%
      weight on new signal and 50% on prior position; do not replace with exponential smoothing, Kalman filter, or adaptive
      smoothing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the smoothing mechanism alters transaction cost profiles and signal dampening characteristics; exponential
      or adaptive smoothing would weight recent observations differently, causing backtest results to diverge from production
      behavior
    derived_from_bd_id: BD-097
  - id: finance-C-242
    when: When implementing percentile rank calculations for mean-reversion signal generation
    action: Calculate percentile rank as count(values < current) / len(values) * 100 using strict 'fewer than' comparison
      — do not use scipy's percentileofscore with 'average' interpolation which handles ties differently
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 'average' interpolation for ties produces different percentile values for discrete distributions with
      repeated values, causing mean-reversion signals to fire at different thresholds and generating inconsistent trading
      decisions
    derived_from_bd_id: BD-098
  - id: finance-C-243
    when: When processing buy and sell orders in remain.py position management
    action: Enforce chronological monotonicity by requiring new transaction dates to be strictly later than existing position
      dates — reject or error on any transaction with an earlier or equal date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allowing out-of-order transactions creates contradictory position states where historical positions are modified
      after subsequent trades, causing backtest results to diverge from sequential order execution in live trading
    derived_from_bd_id: BD-102
  - id: finance-C-244
    when: When parsing irecord format transaction files in record.py
    action: Enforce strict 5-column schema [date, code, value, share, fee] in exact positional order — reject any deviation
      including extra columns, missing columns, or reordered fields before processing begins
    severity: high
    kind: domain_rule
    modality: must
    consequence: Relaxing schema validation causes fixed-width parsing to misalign fields, corrupting transaction data interpretation
      and leading to incorrect position calculations in backtesting
    derived_from_bd_id: BD-110
  - id: finance-C-245
    when: When implementing or refactoring ScheduledSellonXIRR exit logic
    action: Verify both holding period AND annualized return threshold conditions are checked together — positions exit only
      when BOTH criteria are satisfied, not as alternative conditions
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Refactoring to single-condition exit (either holding period OR return threshold) causes premature profit-taking
      or extended holding of underperforming positions, leading to significant deviation from expected strategy returns
    derived_from_bd_id: BD-059
  - id: finance-C-246
    when: When implementing scheduled investment window comparisons in policy.py
    action: Use average price within the scheduled window as the baseline for comparison — calculate mean of each prices in
      the window period, not point-in-time snapshot prices
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using point-in-time price instead of window average causes overreaction to temporary price spikes or dips,
      leading to suboptimal timing decisions that deviate from the smoothed investment strategy intent
    derived_from_bd_id: BD-062
  - id: finance-C-247
    when: When processing dividend events in buy-and-hold strategies
    action: Check the dividend comment field value — when comment > 0, the dividend must be automatically reinvested (DRIP
      behavior); verify this check is implemented in status_gen function
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Omitting the comment > 0 check causes dividends to remain as cash instead of being reinvested, systematically
      underestimating total returns for dividend-paying holdings by the compounding amount
    derived_from_bd_id: BD-068
  - id: finance-C-248
    when: When setting up benchmark comparisons without explicit cash interest rate
    action: Verify that default cash fund rate of 0.0002 daily (approximately 7% annually) matches the actual cash alternative
      being benchmarked against; adjust if the actual cash rate differs significantly
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 7% annual default cash rate when actual cash alternatives yield 4-5% causes overestimated benchmark
      alpha, making strategies appear more profitable relative to cash than they actually are
    derived_from_bd_id: BD-069
  - id: finance-C-249
    when: When calculating annualized volatility using sample standard deviation
    action: Verify volatility calculations require at least 30 days of daily returns before annualizing; skip or warn if the
      lookback window is insufficient since sample standard deviation systematically underestimates true population volatility
      for small samples
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Sample standard deviation underestimates population volatility when calculated over fewer than 30 days of
      data, causing risk metrics to appear lower than actual market risk and leading to under-sized position limits
    derived_from_bd_id: BD-081
  - id: finance-C-250
    when: When calculating Sharpe ratio for strategy evaluation
    action: Verify that returns approximately follow a normal distribution before using Sharpe ratio; check for negative Sharpe
      values and display warnings when skewness or kurtosis significantly deviate from normal distribution assumptions (skew
      != 0, excess kurtosis != 0)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Sharpe ratio assumes normally distributed returns; when returns have negative skew or fat tails, the ratio
      systematically mismeasures risk-adjusted performance, leading to strategies that appear attractive in backtests but
      underperform in live trading
    derived_from_bd_id: BD-082
  - id: finance-C-251
    when: When calculating maximum drawdown for risk assessment
    action: Note that max drawdown calculated from daily closing prices underestimates true drawdown; actual intra-day drawdown
      may exceed reported value; for strategies with significant intraday exposure, supplement with tick-level or minute-bar
      drawdown analysis
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Maximum drawdown calculated from daily discrete samples misses intra-day peak-to-trough swings, systematically
      understating worst-case capital impairment for intraday strategies and leading to inadequate risk capital reserves
    derived_from_bd_id: BD-084
  - id: finance-C-252
    when: When implementing or refactoring backtest execution logic in the BTE class
    action: Verify prepare() is called and completes successfully before run() is invoked — enforce strict two-phase execution
      contract with explicit ordering validation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling run() without prior prepare() produces undefined behavior including incorrect backtest results, uninitialized
      state access, or silent data corruption that is hard to diagnose
    derived_from_bd_id: BD-104
  - id: finance-C-253
    when: When processing buy and sell transactions in the Trade class backtesting logic
    action: Process multiple same-day trades (buy+buy or sell+sell) or opposing trades (buy+sell) on the same date for the
      same stock — enforce single daily transaction per direction rule
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Multiple same-day trades create ambiguous position state during daily reconciliation, causing incorrect position
      tracking and potentially executing trades that violate market rules or produce unrealistic backtest results
    derived_from_bd_id: BD-113
  - id: finance-C-254
    when: When using the xirrcal function for internal rate of return calculation
    action: Verify cashflow vectors are ordered strictly by transaction date with the terminal redemption appearing as the
      final element before passing to xirrcal — verify ascending date order and final redemption position
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misordered cashflows passed to xirrcal produce mathematically incorrect XIRR values or cause non-convergence
      in the numerical solver, leading to wrong investment performance assessment and flawed strategy evaluation
    derived_from_bd_id: BD-114
  - id: finance-C-255
    when: When implementing or modifying XIRR calculation logic using scipy.optimize
    action: Implement convergence verification with explicit fallback mechanisms (e.g., bisection method) when scipy.optimize
      fails to converge, and surface NaN values clearly rather than allowing silent propagation into downstream performance
      metrics
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Non-convergence silently returns NaN or wrong values that cascade into incorrect IRR calculations, alpha
      computation, and Sharpe ratios; users may not notice when performance metrics look reasonable but were computed from
      local minima
    derived_from_bd_id: BD-122
  - id: finance-C-256
    when: When annualizing volatility calculations across different framework modules
    action: Standardize on a single trading day convention (either 250 for standard markets or 244 for Asian markets) and
      document which convention each module uses; when comparing volatility figures from different modules, normalize to the
      same annualization factor
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Trading day convention fragmentation (250 vs 244) causes ~2% systematic underestimation of annualized volatility
      when data flows between modules; comparing portfolio views with different conventions produces misleading risk assessments
    derived_from_bd_id: BD-123
  - id: finance-C-257
    when: When using cached financial data for strategy execution or backtesting
    action: Verify cache freshness requirements match the trading context (real-time data requires seconds-level freshness
      for intraday strategies; bar data may tolerate minutes-level staleness for daily rebalancing); implement explicit staleness
      checks or refresh triggers for time-sensitive operations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Cached financial data may be stale relative to live market conditions; mean reversion or momentum strategies
      using stale prices execute on outdated signals, causing trades at unfavorable prices that reduce or eliminate strategy
      profitability
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-258
    when: When implementing or extending caching logic for financial data retrieval
    action: Maintain separate cache semantics for real-time (rt) and bar data with independent TTL policies; real-time cache
      keys should enforce near-immediate freshness requirements, while bar data cache keys can allow longer staleness periods;
      do not apply bar-level staleness assumptions to real-time data retrieval
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Confusing cache types causes execution delays for real-time operations (using stale bar-level cached prices)
      or excessive API calls for bar operations (applying rt-level freshness to cached bars); both scenarios produce backtest-live
      execution inconsistencies
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-259
    when: When writing pandas DataFrame parsing code with pd.read_html()
    action: Wrap HTML strings in io.StringIO() before pd.read_html()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Parsing will fail without io.StringIO() wrapper, causing data ingestion errors and breaking downstream analysis
      pipelines
    stage_ids:
    - data_ingestion
  - id: finance-C-260
    when: When parsing HTML tables that may contain float type values
    action: Use explicit strict type casting with .astype(float) to avoid LossySetitemError
    severity: high
    kind: domain_rule
    modality: must
    consequence: Silent type coercion failures will produce incorrect numerical data, corrupting financial calculations like
      XIRR and volatility
    stage_ids:
    - data_parsing
  - id: finance-C-261
    when: When handling pandas frequency format strings in date operations
    action: Handle frequency format changes between Pandas 1.x ('M') and 3.x ('ME') using explicit format handling
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Frequency parsing will raise errors or produce incorrect date periods, breaking time-series analysis and
      backtesting
    stage_ids:
    - data_ingestion
    - feature_engineering
  - id: finance-C-262
    when: When updating NumPy-based code
    action: Use deprecated NumPy aliases like np.float — use float or np.float64 instead
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Code will raise DeprecationWarning in NumPy 2.x and will break in future versions, causing CI/CD failures
    stage_ids:
    - code_quality
  - id: finance-C-263
    when: When scraping web data with BeautifulSoup
    action: Use fragile exact string matches like soup.find(string='text') for HTML parsing
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Parser will silently fail when upstream HTML structure changes, producing empty or corrupted DataFrames
    stage_ids:
    - data_ingestion
  - id: finance-C-264
    when: When parsing HTML with BeautifulSoup
    action: Use iterative tag searching with get_text(strip=True) instead of exact string matching
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Data extraction will break silently when upstream HTML changes, corrupting financial metrics
    stage_ids:
    - data_ingestion
  - id: finance-C-266
    when: When loading data from legacy cache stores
    action: Handle missing keys defensively using .get('new_key', 'default') pattern for backward compatibility
    severity: high
    kind: operational_lesson
    modality: must
    consequence: KeyError exceptions will crash data loading, breaking cached fundinfo retrieval and historical analysis
    stage_ids:
    - data_persistence
  - id: finance-C-267
    when: When implementing exception handling around data fetching operations
    action: Write over-protective code with blanket try-except or returning empty DataFrames that swallows original errors
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Root cause of data failures becomes invisible, delaying debugging and allowing corrupted data to propagate
      through analysis
    stage_ids:
    - data_ingestion
  - id: finance-C-268
    when: When debugging data fetching KeyError or NoneType errors
    action: Investigate the upstream response and patch the parsers or input normalizers at the source
    severity: high
    kind: rationalization_guard
    modality: must
    consequence: Workarounds will mask upstream API changes, causing silent data corruption that propagates to financial calculations
    stage_ids:
    - data_ingestion
  - id: finance-C-269
    when: When fixing bugs in the library core
    action: Make the smallest possible change to fix the bug — avoid unnecessary refactoring of legacy code
    severity: medium
    kind: rationalization_guard
    modality: must
    consequence: Large refactoring introduces new bugs in working code, breaking existing functionality and increasing regression
      risk
    stage_ids:
    - code_quality
  - id: finance-C-271
    when: When modifying code in the xalpha/ directory
    action: Maintain Pylint score of 10.00/10 for each code in the xalpha/ directory
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Code quality violations will cause CI/CD pipeline failures, blocking deployment and slowing development velocity
    stage_ids:
    - code_quality
  - id: finance-C-272
    when: When running tests for xalpha
    action: Verify each tests pass using pytest with pytest.importorskip for optional dependencies
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Test failures will block CI/CD pipeline, preventing code deployment and indicating potential regressions
    stage_ids:
    - code_quality
  - id: finance-C-273
    when: When generating HTML reports or dashboards
    action: Offload rendering logic to JS/CSS while keeping Python focused on data processing
    severity: low
    kind: architecture_guardrail
    modality: must
    consequence: Heavy rendering logic in Python will slow report generation and increase memory usage in dashboard generation
    stage_ids:
    - reporting
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
