resources:
  packages:
  - name: numpy>=2.2.0
    version_pin: latest
  - name: pandas>=2.2.0
    version_pin: latest
  - name: xarray>=0.17.0
    version_pin: latest
  - name: scipy>=1.3.2
    version_pin: latest
  - name: scikit-learn>=1.6.0
    version_pin: latest
  - name: statsmodels>=0.14.0
    version_pin: latest
  - name: matplotlib>=3.3.0
    version_pin: latest
  - name: requests>=2.22.0
    version_pin: latest
  - name: tqdm>=4.60.0
    version_pin: latest
  - name: joblib>=0.16.0
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy>=2.2.0
    - python3 -m pip install pandas>=2.2.0
    - python3 -m pip install xarray>=0.17.0
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When constructing a TimeSeries with values array input
    action: Expand the values array to exactly 3 dimensions (time×component×sample) using numpy array shape operations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TimeSeries operations will fail with shape mismatches, causing downstream models to receive incorrectly formatted
      data tensors
    stage_ids:
    - data_representation
  - id: finance-C-002
    when: When setting the TimeSeries values dtype
    action: Cast values to float64 or float32 to verify numerical precision for financial calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Numerical operations may produce incorrect results with integer or non-floating-point dtypes, leading to
      inaccurate forecasts
    stage_ids:
    - data_representation
  - id: finance-C-003
    when: When setting the TimeSeries time index
    action: Verify time index is strictly monotonically increasing with a well-defined frequency and no holes by default
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream models will produce incorrect forecasts due to temporal misalignment, and gap detection methods
      will fail
    stage_ids:
    - data_representation
  - id: finance-C-004
    when: When setting the TimeSeries shape property
    action: Return values array shape as tuple of (n_timesteps, n_components, n_samples)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: All downstream model operations expecting the standard 3D shape will fail with dimension mismatches
    stage_ids:
    - data_representation
  - id: finance-C-005
    when: When checking if a TimeSeries is deterministic
    action: Return True when n_samples equals 1, otherwise return False
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Methods requiring deterministic series (like to_json, gaps) will execute incorrectly on probabilistic data
    stage_ids:
    - data_representation
  - id: finance-C-006
    when: When setting the time index and values length
    action: Verify the time index length equals the values array first dimension length
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: TimeSeries construction fails with ValueError, preventing data from being loaded
    stage_ids:
    - data_representation
  - id: finance-C-007
    when: When setting TimeSeries components
    action: Verify the number of component names matches the values array second dimension size
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Component indexing and multivariate operations will reference wrong columns, causing data corruption
    stage_ids:
    - data_representation
  - id: finance-C-010
    when: When providing a time index type
    action: Use only pandas.RangeIndex, pandas.DatetimeIndex, or integer Index convertible to RangeIndex
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: TimeSeries construction fails with ValueError, preventing non-compliant time index types from being loaded
    stage_ids:
    - data_representation
  - id: finance-C-011
    when: When using fill_missing_dates to infer frequency
    action: Provide at least 3 time steps to enable unique frequency inference from consecutive timestamps
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Frequency inference fails with ValueError when fewer than 3 elements are provided
    stage_ids:
    - data_representation
  - id: finance-C-019
    when: When filling missing dates with inferred frequency
    action: Verify the inferred frequency is unique and constant across each consecutive timestamp triples
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Non-unique frequency inference fails with ValueError, preventing gap filling for irregular time series
    stage_ids:
    - data_representation
  - id: finance-C-020
    when: When creating integer-indexed series without explicit frequency
    action: Verify integer index has constant step size to enable RangeIndex conversion
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Non-constant step sizes prevent RangeIndex conversion, causing ValueError at construction time
    stage_ids:
    - data_representation
  - id: finance-C-021
    when: When implementing ForecastingModel subclasses
    action: Implement fit() method returning self for method chaining
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: The fit() method will not support method chaining, breaking the fluent interface pattern expected by users
      and causing AttributeError at line 209, 2932, 3069
    stage_ids:
    - forecasting_base
  - id: finance-C-022
    when: When calling predict() before fit()
    action: Call predict() on an unfitted model
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Calling predict() before fit() raises ValueError with message 'The model must be fit before calling predict()'
      at forecasting_model.py:381-389
    stage_ids:
    - forecasting_base
  - id: finance-C-024
    when: When implementing ForecastingModel subclasses
    action: 'Implement abstract methods: fit, predict, min_train_samples, _target_window_lengths, extreme_lags, supports_multivariate,
      supports_transferable_series_prediction'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing abstract method implementations will cause TypeError at instantiation time due to ABC abstractmethod
      enforcement
    stage_ids:
    - forecasting_base
  - id: finance-C-025
    when: When fitting a ForecastingModel with a training series
    action: Provide a series with length >= min_train_series_length
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Training with insufficient data raises ValueError with message about required minimum length at forecasting_model.py:195-202
    stage_ids:
    - forecasting_base
  - id: finance-C-027
    when: When creating a ForecastingModel subclass
    action: Pass add_encoders parameter to the base class __init__
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing add_encoders parameter raises NotImplementedError at forecasting_model.py:160-166, preventing model
      instantiation
    stage_ids:
    - forecasting_base
  - id: finance-C-034
    when: When designing forecasting models to prevent data leakage
    action: Make it hard for users to introduce future data leakage
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Future data leakage leads to overestimated model performance and incorrect trading signals that cause financial
      losses in live deployment
    stage_ids:
    - forecasting_base
  - id: finance-C-035
    when: When implementing FutureCovariatesLocalForecastingModel subclasses
    action: Implement _fit() and _predict() abstract methods for dual covariates models
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing implementation raises TypeError due to @abstractmethod enforcement; these methods contain the actual
      model training and prediction logic
    stage_ids:
    - forecasting_base
  - id: finance-C-038
    when: When implementing a TorchForecastingModel subclass
    action: extract and set pl_module_params by calling self._extract_pl_module_params(**self.model_params) before calling
      super().__init__()
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: The nn.Module will not be properly initialized during lazy model creation, causing fit_from_dataset to raise
      an error about pl_module_params being None at line 454.
    stage_ids:
    - torch_forecasting
  - id: finance-C-039
    when: When implementing a TorchForecastingModel subclass
    action: implement the abstract _create_model(train_sample) method that instantiates a PLForecastingModule based on input
      tensor dimensions
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: TorchForecastingModel is abstract and cannot be instantiated directly; subclasses must provide _create_model
      for lazy model initialization.
    stage_ids:
    - torch_forecasting
  - id: finance-C-041
    when: When training a TorchForecastingModel with sample_weight
    action: use a loss function with a 'reduction' attribute that can be set to 'none' (e.g., torch.nn.MSELoss, torch.nn.L1Loss)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Sample weight functionality will fail because the code cannot set criterion.reduction to 'none' for weighted
      loss computation. Training with sample weights will raise ValueError at line 1361-1368.
    stage_ids:
    - torch_forecasting
  - id: finance-C-042
    when: When preparing time series data for TorchForecastingModel
    action: cast each input series to float16, float32, or float64 dtype using TimeSeries.astype() before training
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Model initialization will raise ValueError at line 505-509 because invalid data type is detected. Training
      cannot proceed with non-float data types.
    stage_ids:
    - torch_forecasting
  - id: finance-C-043
    when: When creating a TorchTrainingDataset or TorchInferenceDataset with stride parameter
    action: use stride values that are positive integers greater than 0
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Dataset initialization will raise ValueError at line 141-145. Dataset will have zero or invalid samples.
    stage_ids:
    - torch_forecasting
  - id: finance-C-044
    when: When creating model_kwargs for TorchForecastingModel subclasses
    action: verify each kwargs are valid parameters for the model class, PLForecastingModule, or TorchForecastingModel base
      class
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Model creation will raise ValueError listing invalid parameters at line 405-408. The model cannot be instantiated.
    stage_ids:
    - torch_forecasting
  - id: finance-C-051
    when: When validating covariates for a TorchForecastingModel
    action: provide only the covariate types that the specific model subclass supports (past_covariates, future_covariates,
      or both)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Model will raise ValueError at line 774-779 because it received covariates it cannot process. The error message
      lists which covariates are invalid and what the model supports.
    stage_ids:
    - torch_forecasting
  - id: finance-C-053
    when: When training a TorchForecastingModel
    action: verify the training series length is sufficient to generate at least one training sample (>= input_chunk_length
      + shift + output_chunk_length)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Training will fail at line 1299-1303 with error message 'training time series dataset is too short for obtaining
      even one training point'.
    stage_ids:
    - torch_forecasting
  - id: finance-C-058
    when: When implementing ARIMA, ExponentialSmoothing, FFT, or Theta models
    action: Accept only univariate TimeSeries input; reject multivariate series with ValueError
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Multivariate series passed to univariate models causes ValueError at fit time, breaking the forecasting pipeline
      and requiring code changes to fix
    stage_ids:
    - statistical_forecasting
  - id: finance-C-059
    when: When implementing VARIMA model
    action: Accept only multivariate TimeSeries input; reject univariate series with ValueError
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Univariate series passed to multivariate VARIMA model causes ValueError, breaking the pipeline with misleading
      error messages
    stage_ids:
    - statistical_forecasting
  - id: finance-C-060
    when: When implementing NaiveDrift model
    action: Accept only deterministic TimeSeries (n_samples == 1); reject probabilistic series
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Probabilistic series (multiple samples) passed to NaiveDrift causes assertion error, as drift calculation
      requires single deterministic trajectory
    stage_ids:
    - statistical_forecasting
  - id: finance-C-061
    when: When implementing VARIMA with differencing parameter
    action: Set differencing parameter d greater than 1; enforce d <= 1 via assertion
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Setting d > 1 causes unstable optimizer results and assertion failure, producing unreliable or divergent
      forecasts
    stage_ids:
    - statistical_forecasting
  - id: finance-C-063
    when: When using statistical forecasting models
    action: Install statsmodels as the underlying computation engine; wrap statsmodels implementations
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Without statsmodels, ARIMA, VARIMA, ExponentialSmoothing, and Theta models fail to import and cannot perform
      any forecasting operations
    stage_ids:
    - statistical_forecasting
  - id: finance-C-069
    when: When implementing statistical forecasting models
    action: Extend LocalForecastingModel abstract base class; implement fit() and predict() methods
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Failing to extend the correct base class or implement required methods causes TypeError at instantiation
      and runtime failures
    stage_ids:
    - statistical_forecasting
  - id: finance-C-072
    when: When presenting statistical forecasting model results
    action: Claim that backtest or historical simulation results equal expected live trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting simulated backtest returns as expected live trading performance misleads stakeholders about actual
      expected returns and risk, violating financial transparency principles
    stage_ids:
    - statistical_forecasting
  - id: finance-C-078
    when: When implementing a SKLearnModel, SKLearnClassifierModel, or their subclasses
    action: specify at least one of `lags`, `lags_past_covariates`, or `lags_future_covariates` as non-None values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: SKLearnModel raises ValueError if no lags are specified for any input. The model requires at least one lag
      configuration to create lagged features for training the tabular regression/classification model.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-079
    when: When constructing SKLearnModel with output_chunk_length > 1
    action: set multi_models=True when using SKLearnClassifierModel with output_chunk_length > 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: SKLearnClassifierModel with multi_models=False and output_chunk_length > 1 causes estimators for the same
      target component to receive different class labels during training, resulting in inconsistent predictions across horizons
      for multivariate classification.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-080
    when: When using ShapExplainer for model interpretability
    action: use SKLearnModel (or subclass) with multi_models=True as the model argument
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: ShapExplainer raises ValueError when multi_models=False or when used with non-SKLearnModel types. The explainer
      relies on per-horizon estimators created by multi_models=True to compute SHAP values for individual forecast horizons.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-081
    when: When providing lags_future_covariates as a tuple
    action: verify the tuple contains exactly two positive integers with at least one non-zero value
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid tuple format for lags_future_covariates causes ValueError. The tuple (0, 0) is invalid because it
      corresponds to an empty lag list, and non-integer values or negative values are rejected.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-082
    when: When providing lags as a list for target or past_covariates
    action: verify each list elements are strictly negative integers (no zero or positive values)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Lists containing zero or positive integers for target/past_covariates lags cause ValueError. Only strictly
      negative integers are valid for historical lag features.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-083
    when: When providing lags as an integer for target or past_covariates
    action: verify the integer value is strictly positive (> 0)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Integer lags with value <= 0 cause ValueError. Positive integer n is converted to range(-n, 0), generating
      n negative lag values.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-084
    when: When constructing SKLearnModel
    action: verify output_chunk_length is an integer greater than 0
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid output_chunk_length values (<=0 or non-integer) cause ValueError at model construction time. This
      parameter defines the number of time steps predicted at once.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-085
    when: When fitting SKLearnModel with covariates
    action: verify covariates provided at fit() match the lags configuration specified at model construction
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mismatch between covariates presence and lags specification causes ValueError. If lags_past_covariates is
      specified, past_covariates must be provided at fit() and vice versa.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-086
    when: When predicting with SKLearnModel
    action: verify the input series length is sufficient given lags and output_chunk_length
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Insufficient series length relative to lag requirements causes ValueError. The series must be long enough
      to extract lagged features from min(lags) through the prediction horizon.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-087
    when: When using quantile forecasting with likelihood='quantile'
    action: verify the quantile parameter passed to get_estimator matches a fitted quantile
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid quantile values cause ValueError. Quantile must be one of the fitted quantiles stored in _model_container.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-088
    when: When SKLearnModel has multi_models=False with output_chunk_length > 1
    action: expect ShapExplainer to work correctly with a single multi-output estimator
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: ShapExplainer does not support multi_models=False because it relies on accessing individual per-horizon estimators.
      This configuration raises ValueError during ShapExplainer initialization.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-090
    when: When accessing per-horizon estimators via get_estimator
    action: verify horizon index is within valid range [0, output_chunk_length) and target_dim is valid
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Invalid horizon or target_dim values cause ValueError. The estimator index calculation depends on multi_models
      being True for proper per-horizon estimation.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-098
    when: When creating component-wise lags dictionary
    action: include each components of the target series or provide a 'default_lags' fallback key
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing lags for any component without 'default_lags' fallback causes ValueError. Component-specific lags
      must cover all series components or use the default mechanism.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-113
    when: When initializing a ConformalModel with quantiles parameter
    action: include the median quantile q=0.5 in the quantiles list
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without the median quantile, the interval sampling logic fails and produces incorrect calibrated predictions.
      The sample_from_quantiles function requires symmetric quantiles around the median to generate valid prediction intervals.
    stage_ids:
    - conformal_prediction
  - id: finance-C-114
    when: When setting the quantiles list for a ConformalModel
    action: verify each quantile values are strictly between 0 and 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Quantiles outside (0,1) produce invalid probability intervals that cannot properly calibrate prediction coverage,
      breaking the conformal guarantee.
    stage_ids:
    - conformal_prediction
  - id: finance-C-115
    when: When constructing quantile intervals for conformal prediction
    action: maintain symmetry around the median quantile (q=0.5)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Asymmetric quantiles break the sampling logic in sample_from_quantiles and produce incorrect coverage levels,
      invalidating the conformal guarantee.
    stage_ids:
    - conformal_prediction
  - id: finance-C-116
    when: When using a ConformalQRModel
    action: wrap a deterministic base model that lacks probabilistic prediction support
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: ConformalQRModel requires quantile predictions from the base model to calibrate asymmetric intervals. Without
      probabilistic support, the model cannot compute incs_qr non-conformity scores and will raise ValueError.
    stage_ids:
    - conformal_prediction
  - id: finance-C-117
    when: When setting cal_length parameter for calibration
    action: set cal_length to either None or a positive integer >= 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: cal_length < 1 produces insufficient calibration residuals, causing the model to fail with 'Could not build
      the minimum required calibration input' error.
    stage_ids:
    - conformal_prediction
  - id: finance-C-118
    when: When providing the base model to ConformalModel
    action: pass a pre-trained GlobalForecastingModel with _fit_called=True
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: An untrained model produces meaningless calibration residuals and invalid conformal predictions with no coverage
      guarantee.
    stage_ids:
    - conformal_prediction
  - id: finance-C-119
    when: When calibrating predictions for production deployment
    action: use a calibration series that is temporally separate from the training data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using overlapping data for calibration violates the exchangeability assumption and invalidates the coverage
      guarantee, causing prediction intervals to be under- or over-confident in production.
    stage_ids:
    - conformal_prediction
  - id: finance-C-123
    when: When calibrating conformal intervals using residuals
    action: use only residuals from before the conformal forecast start point to avoid look-ahead bias
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Including future residuals in calibration creates look-ahead bias, causing the conformal intervals to be
      over-confident and invalidating the coverage guarantee.
    stage_ids:
    - conformal_prediction
  - id: finance-C-124
    when: When calling predict() on a ConformalModel
    action: pass a calibration series (not the training series) as the series parameter
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using the training series for prediction breaks the train/calibration separation, invalidating the coverage
      guarantee and producing intervals that appear more accurate than they truly are.
    stage_ids:
    - conformal_prediction
  - id: finance-C-131
    when: When comparing backtest returns with expected live trading returns
    action: present simulated conformal prediction intervals as actual trading performance proof
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results reflect historical patterns under the exchangeability assumption. Live trading involves
      real execution, slippage, and distribution shifts that invalidate the coverage guarantee comparison.
    stage_ids:
    - conformal_prediction
  - id: finance-C-133
    when: When implementing a custom data transformer inheriting from BaseDataTransformer or FittableDataTransformer
    action: Declare ts_transform as a static method using @staticmethod decorator to enable efficient multiprocessing without
      pickling instance data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using instance methods for ts_transform would copy the entire transformer instance (including large data)
      across processes during parallel execution, creating a severe bottleneck that nullifies parallelization benefits and
      causes memory exhaustion for large transformers.
    stage_ids:
    - data_transformation
  - id: finance-C-134
    when: When implementing a custom data transformer inheriting from FittableDataTransformer
    action: Call fit() before calling transform() or inverse_transform() to verify _fit_called flag is set to True
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calling transform() or inverse_transform() without first calling fit() causes a ValueError at runtime because
      _fit_called flag remains False, and the transformer has no fitted parameters to apply to the data.
    stage_ids:
    - data_transformation
  - id: finance-C-135
    when: When defining a custom data transformer's __init__ method
    action: Define each fixed parameter attributes before calling super().__init__ so they are captured by vars(self).copy()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Fixed parameters defined after super().__init__() are not captured in _fixed_params, causing the parameter
      detection mechanism to miss these attributes and resulting in missing parameters when ts_transform is called.
    stage_ids:
    - data_transformation
  - id: finance-C-136
    when: When implementing ts_transform for a FittableDataTransformer subclass
    action: Access fitted parameters via params['fitted'] dictionary, not as direct instance attributes
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Fitted parameters are passed as dictionary entries in params['fitted'] when ts_transform is called. Accessing
      them as self attributes results in AttributeError since fitted parameters are not stored as instance attributes on the
      transformer object.
    stage_ids:
    - data_transformation
  - id: finance-C-148
    when: When implementing past covariates encoders
    action: specify covariate lags as negative integers only
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Past covariates with non-negative lag values cause misalignment with the forecasting point, producing invalid
      covariate encodings that do not align with model input requirements
    stage_ids:
    - encoding
  - id: finance-C-149
    when: When specifying covariates lag parameters
    action: verify min_covariates_lag is less than or equal to max_covariates_lag
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid lag range causes incorrect covariate index generation, leading to misaligned training samples and
      potentially incorrect model predictions
    stage_ids:
    - encoding
  - id: finance-C-150
    when: When specifying covariates lag parameters
    action: set min_covariates_lag and max_covariates_lag to both None or both integers
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Mixed None/integer lag specification causes ValueError during encoder initialization, preventing model from
      building covariate index
    stage_ids:
    - encoding
  - id: finance-C-153
    when: When validating CovariatesIndexGenerator parameters
    action: match parameter combinations to one of three valid scenarios (A/B/C)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid parameter combinations raise ValueError, preventing encoder from determining correct covariate index
      generation strategy
    stage_ids:
    - encoding
  - id: finance-C-154
    when: When calling encode_inference on fittable encoders
    action: call encode_train before encode_inference
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Calling encode_inference before encode_train raises ValueError, as the encoder requires training to properly
      initialize its internal state
    stage_ids:
    - encoding
  - id: finance-C-166
    when: When implementing hierarchical reconciliation for TimeSeries
    action: validate that the series has a hierarchy dict defined via has_hierarchy property
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calling reconciliation transformers on a TimeSeries without hierarchy will raise ValueError with message
      'The provided series must have a hierarchy defined for reconciliation to be performed', causing the pipeline to fail
      silently or partially process data.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-167
    when: When defining a hierarchy dict for TimeSeries
    action: verify hierarchy keys (non-top components) are actual component names in the series
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: If hierarchy keys don't match component names, the TimeSeries constructor raises ValueError 'The keys of
      the hierarchy must be time series components', preventing the series from being created.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-168
    when: When defining a hierarchy dict for TimeSeries
    action: verify hierarchy values (parent component names) are actual component names in the series
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: If hierarchy values contain names not in components, the TimeSeries constructor raises ValueError 'The values
      of the hierarchy must only contain component names matching those of the series', preventing hierarchical reconciliation
      from functioning.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-169
    when: When defining a hierarchy dict for TimeSeries
    action: verify exactly one top-level component exists (a component not appearing as a key)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: If zero or multiple top-level components are defined, the TimeSeries constructor raises ValueError 'The hierarchy
      must be such that only one component does not appear as a key (the top level component)', breaking hierarchical reconciliation.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-171
    when: When performing hierarchical reconciliation
    action: preserve sum consistency across hierarchy levels (bottom components sum to parent components)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: If reconciliation fails to preserve additive consistency, the reconciled forecast will violate the hierarchical
      constraints, leading to inconsistent aggregate predictions and incorrect business decisions.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-172
    when: When deriving the S summation matrix from hierarchy
    action: map each child component to its parent(s) using the hierarchy dict recursively
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: If the S matrix is incorrectly derived, the reconciled values will not properly aggregate through the hierarchy,
      causing forecast inconsistencies at higher levels.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-174
    when: When using TopDownReconciliator or MinTReconciliator
    action: call fit() before transform() to compute the projection matrix G
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: These reconciliators are FittableDataTransformers that store fitted parameters in params['fitted']. Calling
      transform() without fit() will fail because G matrix won't be computed from the training data.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-181
    when: When initializing AnomalyScorer with window parameter
    action: set window parameter to strictly positive integer (window > 0)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ValueError is raised with message 'Parameter `window` must be strictly greater than 0, found `{value}`.'
      causing the scorer initialization to fail
    stage_ids:
    - anomaly_detection
  - id: finance-C-182
    when: When computing anomaly scores from predictions
    action: verify series and pred_series have matching length and overlapping time index
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ValueError is raised if series and pred_series lengths differ, causing score computation to fail
    stage_ids:
    - anomaly_detection
  - id: finance-C-183
    when: When using FittableAggregator.fit()
    action: verify anomalies and series parameters have the same number of series elements
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ValueError is raised with '`anomalies` and `series` must contain the same number of series' causing fit to
      fail
    stage_ids:
    - anomaly_detection
  - id: finance-C-184
    when: When evaluating anomaly detection metrics
    action: verify anomaly ground truth series are binary (contain only 0 and 1 values)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ValueError is raised if anomalies series contains non-binary values, causing metric evaluation to fail
    stage_ids:
    - anomaly_detection
  - id: finance-C-185
    when: When using NLLScorer with probabilistic predictions
    action: verify pred_series contains stochastic (probabilistic) data with n_samples > 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: 'ValueError is raised with ''Scorer is expecting `pred_series` to be a stochastic timeseries (number of samples
      must be higher than 1, found: X)'''
    stage_ids:
    - anomaly_detection
  - id: finance-C-187
    when: When using FittableDetector.detect() method
    action: call fit() before detect() to train the detector on the training series
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: ValueError is raised with 'Detector has not been fitted yet. Call `fit()` first.' causing detection to fail
    stage_ids:
    - anomaly_detection
  - id: finance-C-188
    when: When using FittableAnomalyScorer.score() method
    action: call fit() or fit_from_prediction() before score() to train the scorer
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: ValueError is raised with 'The Scorer X has not been fitted yet. Call `fit()` first.' causing scoring to
      fail
    stage_ids:
    - anomaly_detection
  - id: finance-C-189
    when: When creating AnomalyModel instance
    action: pass only AnomalyScorer instances to the scorer parameter
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: ValueError is raised with 'all scorers must be of instance darts.ad.scorers.AnomalyScorer' causing model
      creation to fail
    stage_ids:
    - anomaly_detection
  - id: finance-C-200
    when: When using FittableAggregator.predict() method
    action: call fit() before predict() to train the aggregator on anomaly labels
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: ValueError is raised with 'Aggregator has not been fitted yet. Call `fit()` first.' causing prediction to
      fail
    stage_ids:
    - anomaly_detection
  - id: finance-C-202
    when: When using KalmanFilter for state estimation
    action: Call fit() method before calling filter() on any series
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Filter returns incorrect or undefined results when called before N4SID system identification initializes
      state-space model and covariance matrices.
    stage_ids:
    - filtering
  - id: finance-C-203
    when: When applying Kalman filter to time series data
    action: Verify input series width matches fitted filter output dimensionality
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Dimension mismatch causes crash or silent incorrect filtering due to matrix shape incompatibility between
      observations and state-space model.
    stage_ids:
    - filtering
  - id: finance-C-209
    when: When integrating filtering models with anomaly detection
    action: Pass FilteringModel subclass instances to FilteringAnomalyModel constructor
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Non-FilteringModel passed to FilteringAnomalyModel causes type error as the anomaly scoring expects filter
      interface with filter() method.
    stage_ids:
    - filtering
  - id: finance-C-231
    when: When instantiating ShapExplainer with a forecasting model
    action: use only SKLearnModel as the model type
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ShapExplainer will raise ValueError with message 'Invalid `model` type. Currently, only models of type `SKLearnModel`
      are supported.' when non-SKLearnModel is passed.
    stage_ids:
    - explainability
  - id: finance-C-232
    when: When creating ShapExplainer with an SKLearnModel
    action: set multi_models=True on the underlying SKLearnModel
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ShapExplainer raises ValueError 'Invalid `multi_models` value `False`. Currently, ShapExplainer only supports
      SKLearnModels with `multi_models=True`.' and fails to initialize.
    stage_ids:
    - explainability
  - id: finance-C-233
    when: When calling explain() with horizons parameter
    action: specify horizons values that are >= 1 and <= output_chunk_length
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ShapExplainer raises ValueError 'At least one of the `horizons` is larger than `output_chunk_length`' or
      'All `horizons` must be `>=1`' when invalid horizon values are provided.
    stage_ids:
    - explainability
  - id: finance-C-234
    when: When creating background dataset for ShapExplainer
    action: verify background dataset contains at least MIN_BACKGROUND_SAMPLE (10) samples
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ShapExplainer raises ValueError 'The number of samples in the background dataset is too small to compute
      shap values.' when background data is insufficient.
    stage_ids:
    - explainability
  - id: finance-C-235
    when: When specifying target_components in explain() call
    action: provide valid component names that exist in the background series
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: ShapExplainer raises ValueError listing invalid components and valid options when invalid target component
      names are provided.
    stage_ids:
    - explainability
  - id: finance-C-236
    when: When providing foreground and covariates to explain()
    action: maintain equal length between foreground series and each covariates sequence
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Explainer raises ValueError stating 'The number of {background/foreground} series and past covariates must
      be the same.' when lengths mismatch.
    stage_ids:
    - explainability
  - id: finance-C-241
    when: When instantiating any ForecastingModelExplainer
    action: call model.fit() before creating the explainer instance
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Explainer raises ValueError 'The model must be fitted before instantiating a {ExplainerName}.' when called
      on unfitted model.
    stage_ids:
    - explainability
  - id: finance-C-249
    when: When implementing a new likelihood distribution class inheriting from TorchLikelihood
    action: implement the _params_from_output abstract method to transform raw model output into distribution parameters
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The likelihood will fail during training because compute_loss cannot extract distribution parameters from
      model output, causing runtime errors or NaN losses
    stage_ids:
    - likelihood
  - id: finance-C-250
    when: When implementing a new likelihood distribution class inheriting from TorchLikelihood
    action: implement the _distr_from_params abstract method to construct a torch.distributions.Distribution object from parameters
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Loss computation will fail because _nllloss cannot build a distribution object to compute log probability,
      preventing training
    stage_ids:
    - likelihood
  - id: finance-C-252
    when: When using QuantileRegression as a likelihood
    action: expect NLL loss computation to work since QuantileRegression uses pinball loss instead
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Loss values will be incorrect because QuantileRegression computes pinball loss (asymmetric absolute errors),
      not the negative log-likelihood that other likelihoods use
    stage_ids:
    - likelihood
  - id: finance-C-253
    when: When validating distribution parameter constraints for a new likelihood
    action: enforce domain constraints on distribution parameters (e.g., positive standard deviations, probabilities in [0,1])
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Distribution construction will fail with invalid parameters, causing runtime errors during training or prediction
    stage_ids:
    - likelihood
  - id: finance-C-254
    when: When training a probabilistic model with TorchLikelihood
    action: verify target tensor values fall within the distribution's support
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Training will fail with invalid log probability computation when target values are outside the distribution's
      valid support (e.g., negative counts for Poisson, values outside [0,1] for Beta)
    stage_ids:
    - likelihood
  - id: finance-C-279
    when: When forecasting models use past observed covariates
    action: Verify past covariate lags are negative integers (before current time) — past covariates represent historical
      data available at prediction time
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using non-negative or invalid past covariate lags causes look-ahead bias where the model uses future information
      not available at prediction time, invalidating forecast accuracy metrics
  - id: finance-C-280
    when: When forecasting models use future known covariates
    action: Verify future covariate lags are non-negative integers (at or after current time) — future covariates represent
      known data available at prediction time
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using negative future covariate lags causes data mismatch errors where the model expects historical data
      marked as future-known, breaking the covariate availability contract
  - id: finance-C-286
    when: When implementing new forecasting models that extend ForecastingModel
    action: Implement the abstract methods fit() and predict() with correct temporal semantics — predictions must start after
      the end of training data and use proper lag alignment
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect temporal alignment causes look-ahead bias where model uses future information during training or
      invalid predictions that overlap with training data
  - id: finance-C-321
    when: When implementing or using forecasting models that require fitting before prediction
    action: Track _fit_called state flag for each fittable component — enforce fit validation at method entry points (predict/transform)
      to prevent calling unfitted models; use the shared _fit_called mechanism across each component types
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calling predict or transform on unfitted models produces silent incorrect results or crashes at runtime,
      causing backtest failures that are difficult to diagnose without explicit fit state checking
    derived_from_bd_id: BD-144
  - id: finance-C-361
    when: When implementing cyclic encoding for periodic features
    action: Return exactly two components (sin, cos) as paired features; the sine-cosine encoding preserves continuity at
      period boundaries where hour 23 and hour 0 are adjacent values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Single value encoding breaks continuity at period boundaries, causing the model to treat hour 23 and hour
      0 as maximally distant values (0.0 vs 1.0) when they should be adjacent, degrading periodic pattern recognition
    derived_from_bd_id: BD-032
  - id: finance-C-377
    when: When using per-component MinMaxScaler on heterogeneous multivariate series
    action: Apply MinMaxScaler per-component across each dimensions — this destroys original magnitude relationships in heterogeneous
      multivariate series (e.g., temperature 0-40 with humidity 0-100, or price hundreds with volume millions)
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Per-component scaling normalizes each dimension to [0,1] independently, eliminating the original magnitude
      relationships that may be physically or financially meaningful; distance-based models (DTW, anomaly detection) will
      produce systematically distorted results
    derived_from_bd_id: BD-169
  regular:
  - id: finance-C-008
    when: When setting TimeSeries component names
    action: Verify each component names are unique strings, renaming duplicates with suffixes if needed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate component names cause column selection ambiguity and incorrect data extraction in downstream operations
    stage_ids:
    - data_representation
  - id: finance-C-009
    when: When providing a DatetimeIndex with timezone information
    action: Pass timezone-aware DatetimeIndex directly to TimeSeries constructor
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Timezone information is silently dropped with a warning, potentially causing timezone conversion errors in
      downstream operations
    stage_ids:
    - data_representation
  - id: finance-C-012
    when: When calling TimeSeries constructor directly
    action: Use TimeSeries.__init__ directly; use factory methods like from_csv, from_dataframe, from_series instead
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Direct __init__ calls bypass proper data format inference, leading to incorrectly constructed TimeSeries
      objects
    stage_ids:
    - data_representation
  - id: finance-C-013
    when: When using rescale_with_value with large values
    action: Pass value_at_first_step greater than 1e+24 to rescale_with_value
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Numerical precision errors appear when rescaling with extremely large values, causing forecast inaccuracies
    stage_ids:
    - data_representation
  - id: finance-C-014
    when: When providing static covariates as DataFrame with multiple rows
    action: Verify the number of DataFrame rows matches the number of TimeSeries components exactly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Static covariate mapping to components fails, causing incorrect model training with mismatched feature vectors
    stage_ids:
    - data_representation
  - id: finance-C-015
    when: When providing a hierarchy dictionary
    action: Verify exactly one top-level component exists and each ancestor names reference valid component names
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hierarchical reconciliation operations fail with incorrect forecast aggregation across hierarchy levels
    stage_ids:
    - data_representation
  - id: finance-C-016
    when: When calling methods that require deterministic series
    action: Only invoke methods like to_json, to_csv, gaps, or strip on TimeSeries with exactly 1 sample
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Methods execute incorrectly or raise AssertionError when called on probabilistic series with multiple samples
    stage_ids:
    - data_representation
  - id: finance-C-017
    when: When working with TimeSeries data
    action: Assume TimeSeries provides real-time or streaming data capabilities
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: TimeSeries is a batch-oriented data container with no streaming or real-time capabilities
    stage_ids:
    - data_representation
  - id: finance-C-018
    when: When using copy=False in TimeSeries construction
    action: Avoid mutating original numpy arrays or pandas Index objects after TimeSeries construction
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Mutating original data objects directly affects the TimeSeries internal state, corrupting the time series
    stage_ids:
    - data_representation
  - id: finance-C-023
    when: When calling historical_forecasts() with last_points_only parameter
    action: Return list of TimeSeries forecasts when last_points_only=False, single TimeSeries when last_points_only=True
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect return type will break downstream code expecting either list or single series, causing TypeError
      in calling code
    stage_ids:
    - forecasting_base
  - id: finance-C-026
    when: When implementing LocalForecastingModel subclasses
    action: Handle only single univariate time series
    severity: high
    kind: domain_rule
    modality: must
    consequence: LocalForecastingModel is designed for single univariate series only; multivariate input causes ValueError
      at _assert_univariate() or _assert_multivariate()
    stage_ids:
    - forecasting_base
  - id: finance-C-028
    when: When using output_chunk_shift with autoregressive predictions
    action: Perform autoregressive prediction (n > output_chunk_length) with output_chunk_shift > 0
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Autoregressive prediction with shifted output raises ValueError at forecasting_model.py:395-402 because output_chunk_shift
      moves predictions into the future and cannot be combined with recursive forecasting
    stage_ids:
    - forecasting_base
  - id: finance-C-029
    when: When calling predict() with num_samples > 1 on a deterministic model
    action: Request multiple samples from a non-probabilistic model
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Non-probabilistic models cannot generate multiple samples; raises ValueError at forecasting_model.py:404-410
    stage_ids:
    - forecasting_base
  - id: finance-C-030
    when: When using historical_forecasts() with retrain=False
    action: Use only pre-trained global forecasting models that support non-retrainable historical forecasts
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Pre-trained mode without proper model support causes runtime errors; default returns False at forecasting_model.py:237-245
      for _supports_non_retrainable_historical_forecasts
    stage_ids:
    - forecasting_base
  - id: finance-C-032
    when: When presenting backtest or historical forecast results
    action: Claim that backtest performance equals expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results reflect historical performance on historical data and do not account for market conditions,
      transaction costs, and slippage that affect live trading
    stage_ids:
    - forecasting_base
  - id: finance-C-033
    when: When using predict_likelihood_parameters=True
    action: Set num_samples=1 and verify n <= output_chunk_length for probabilistic models with likelihood
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Likelihood parameter prediction requires specific conditions; violates them raises ValueError at forecasting_model.py:2865-2896
    stage_ids:
    - forecasting_base
  - id: finance-C-036
    when: When training LocalForecastingModel
    action: Assert that the input series is deterministic (has only one sample)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-deterministic series causes assertion failure at forecasting_model.py:2931, preventing training on stochastic
      time series
    stage_ids:
    - forecasting_base
  - id: finance-C-037
    when: When using past or future covariates that the model does not support
    action: Pass covariates to fit() or predict() when supports_covariate_type returns False
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Passing unsupported covariates raises ValueError at forecasting_model.py:437-440 or 466-473, preventing training/prediction
      with incompatible covariate types
    stage_ids:
    - forecasting_base
  - id: finance-C-040
    when: When calling fit(), predict(), or lr_find() on TorchForecastingModel
    action: invoke these methods directly (not through proxy) so the @random_method decorator properly manages random state
      via fork_rng()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Random state isolation will be bypassed, causing non-deterministic training results even when random_state
      is set. Model weights and predictions will vary between runs.
    stage_ids:
    - torch_forecasting
  - id: finance-C-045
    when: When training with stride parameter in TorchForecastingModel.fit()
    action: be aware that stride may introduce bias in forecasts due to non-uniform sampling from time series
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Forecasts will be biased because stride creates non-uniform sampling from time series, potentially under-sampling
      certain time periods and over-sampling others.
    stage_ids:
    - torch_forecasting
  - id: finance-C-046
    when: When retraining a TorchForecastingModel without loading from checkpoint
    action: call fit() on a previously trained model without loading weights from checkpoint first
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Model will start from current weights without proper checkpoint restoration, leading to undefined training
      behavior and potential degradation of model performance.
    stage_ids:
    - torch_forecasting
  - id: finance-C-047
    when: When using float16 dtype with TorchForecastingModel
    action: expect stable training with 16-bit time series data without proper dtype handling
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Training may exhibit numerical instability with float16 precision. The system automatically casts to bfloat16
      but warns that 16-bit training may cause issues at line 497-501.
    stage_ids:
    - torch_forecasting
  - id: finance-C-048
    when: When using TorchForecastingModel
    action: expect live trading capability — Darts is a pure backtesting and forecasting library without live exchange connectivity
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using the library for live trading without proper infrastructure will result in financial losses because
      the system has no exchange connectivity, order execution, or real-time data streaming capabilities.
    stage_ids:
    - torch_forecasting
  - id: finance-C-049
    when: When using TorchForecastingModel for backtesting
    action: claim that backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as live trading proof violates financial modeling principles. Backtest results
      include look-ahead bias, no transaction costs, perfect fill assumptions, and survivorship bias.
    stage_ids:
    - torch_forecasting
  - id: finance-C-050
    when: When loading a cleaned model (saved with clean=True)
    action: pass a series to predict() after loading, as the cleaned model has no stored training data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Prediction will fail because the cleaned model has no access to the original training series and requires
      a new series to be passed for inference.
    stage_ids:
    - torch_forecasting
  - id: finance-C-052
    when: When ensuring reproducibility across PyTorch operations
    action: set random_state parameter in model constructor or predict() method to enable the @random_method decorator's fork_rng()
      isolation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without random_state, the decorator generates a random seed at line 81-82, leading to non-deterministic results
      across training runs.
    stage_ids:
    - torch_forecasting
  - id: finance-C-054
    when: When claiming reproducibility guarantees for TorchForecastingModel
    action: claim deterministic results without setting random_state when using features like dropout, probabilistic predictions,
      or parallel data loading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Results will vary between runs due to random initialization, dropout sampling, and data loader shuffling.
      Claiming deterministic results without proper random_state is misleading.
    stage_ids:
    - torch_forecasting
  - id: finance-C-055
    when: When using load_best=True with TorchForecastingModel.fit()
    action: provide save_checkpoints=True in model constructor AND pass val_series to fit() for checkpointing to be active
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: load_best will be silently ignored at line 1468-1474 because checkpointing requires both save_checkpoints
      and validation series. The model will not load the best checkpoint after training.
    stage_ids:
    - torch_forecasting
  - id: finance-C-056
    when: When encountering model creation or training errors
    action: skip dtype validation by assuming float64 will always work without checking if input series are compatible
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Training will fail with cryptic dtype mismatch errors when input series are integers or objects, even if
      float64 precision is set.
    stage_ids:
    - torch_forecasting
  - id: finance-C-057
    when: When training produces unexpected results with TorchForecastingModel
    action: blame the neural network architecture before verifying that pl_module_params was properly extracted and set
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Model initialization will fail or produce incorrect dimensions because pl_module_params contains critical
      shape information for the nn.Module. Skipping this verification leads to wasted debugging time.
    stage_ids:
    - torch_forecasting
  - id: finance-C-062
    when: When implementing statistical forecasting models
    action: Claim probabilistic prediction support without enabling simulation or quantile methods
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Claiming probabilistic support when only deterministic forecasts are available leads to misleading uncertainty
      quantification and incorrect risk assessment
    stage_ids:
    - statistical_forecasting
  - id: finance-C-064
    when: When using FFT model for forecasting
    action: Provide datetime-indexed TimeSeries for automatic seasonality detection; set seasonal_periods manually for range-indexed
      series
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Range-indexed series without explicit seasonal_periods falls back to default value of 12, causing incorrect
      seasonality handling and degraded forecasts
    stage_ids:
    - statistical_forecasting
  - id: finance-C-065
    when: When using VARIMA with non-constant trend
    action: Use range-indexed series with trend parameter; raise ValueError for range index with non-constant trend
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Range index with non-constant trend causes ValueError at prediction time, breaking the forecasting pipeline
    stage_ids:
    - statistical_forecasting
  - id: finance-C-066
    when: When evaluating statistical forecasting models
    action: Compare against naive baseline models as reference points for forecast quality
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without baseline comparison, cannot determine if complex statistical models provide meaningful improvement
      over simple naive forecasts
    stage_ids:
    - statistical_forecasting
  - id: finance-C-067
    when: When performing probabilistic forecasting with ARIMA and trend
    action: Set num_samples=1 or remove trend parameter; log warning for trends with num_samples > 1
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Probabilistic forecasting with trend parameter produces unreliable uncertainty estimates due to unsupported
      trend simulation in statsmodels
    stage_ids:
    - statistical_forecasting
  - id: finance-C-068
    when: When using ExponentialSmoothing with automatic seasonal period inference
    action: Provide sufficient historical data or explicitly set seasonal_periods; handle inference failures on short series
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Short series without explicit seasonal_periods causes automatic inference to fail, leading to estimation
      errors or runtime exceptions
    stage_ids:
    - statistical_forecasting
  - id: finance-C-070
    when: When implementing VARIMA fit method
    action: Call parent fit() after differencing series; differentiate before passing to statsmodels VARMAX
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping differencing step causes VARIMA to fit on non-stationary data, producing non-invertible models and
      unreliable forecasts
    stage_ids:
    - statistical_forecasting
  - id: finance-C-071
    when: When implementing statistical forecasting models
    action: Return TimeSeries forecasts via _build_forecast_series(); do not return raw numpy arrays
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Returning raw arrays instead of TimeSeries objects breaks pipeline integration and causes type errors in
      downstream components
    stage_ids:
    - statistical_forecasting
  - id: finance-C-073
    when: When presenting statsmodels-based forecasting results
    action: Present deterministic single-sample forecasts as probabilistic uncertainty estimates without Monte Carlo sampling
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting point forecasts as probabilistic forecasts misrepresents forecast uncertainty, leading to poor
      risk management and incorrect decision-making
    stage_ids:
    - statistical_forecasting
  - id: finance-C-074
    when: When using statistical forecasting for trading signals
    action: Claim real-time trading capability based on statistical forecasting models designed for batch offline analysis
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Claiming real-time capability for batch-oriented statistical models misleads users about latency, data requirements,
      and execution feasibility
    stage_ids:
    - statistical_forecasting
  - id: finance-C-075
    when: When optimizing ARIMA order parameters
    action: Skip parameter validation and use excessive (p,d,q) orders without cross-validation
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Unvalidated high-order ARIMA models overfit to training data, producing excellent in-sample fit but poor
      out-of-sample generalization
    stage_ids:
    - statistical_forecasting
  - id: finance-C-076
    when: When analyzing seasonal patterns with ExponentialSmoothing
    action: Assume multiplicative seasonality is always specified; validate seasonality mode choice
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Using multiplicative seasonality on non-ratio data produces nonsensical forecasts (e.g., negative predictions
      for positive data), while additive seasonality on ratio data underestimates variance
    stage_ids:
    - statistical_forecasting
  - id: finance-C-077
    when: When handling VARIMA prediction with differencing
    action: Skip back-transformation step after differencing; return differenced forecast directly
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping invert_transformation causes forecast to be in differenced space rather than original scale, producing
      forecasts offset by the cumulative sum of the last observed value
    stage_ids:
    - statistical_forecasting
  - id: finance-C-089
    when: When using multioutput regression without native support
    action: wrap the underlying model in MultiOutputMixin for proper multi-horizon forecasting
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper wrapping, models that don't support multi-output natively fail to predict multiple horizons
      correctly. The framework automatically wraps such models, but manual overrides can cause incorrect predictions.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-091
    when: When working with categorical features in SKLearnModelWithCategoricalFeatures
    action: properly encode categorical columns as integers before training
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-integer categorical values cause ValueError during fit. The mixin expects categorical covariates to be
      integer-encoded so sklearn can properly process them.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-092
    when: When using probabilistic forecasting with quantile likelihood
    action: store quantile models in _QuantileModelContainer for organized access
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without proper container organization, quantile predictions become disorganized and difficult to access.
      The container groups estimators by quantile value.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-093
    when: When historical forecasting with multi_models=False
    action: account for additional lookback required due to shifted feature alignment
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Multi_models=False shifts feature alignment by (output_chunk_length - 1), requiring additional lookback for
      historical forecasts. Failing to account for this causes incorrect historical prediction boundaries.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-094
    when: When predicting with n > output_chunk_length requiring autoregression
    action: verify past_covariates and future_covariates extend far enough into the future for iterative predictions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Insufficient covariate length for autoregressive forecasting causes prediction to fail or produce incorrect
      results. Covariates must cover all steps needed for the recursive prediction loop.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-095
    when: When using sample_weight with multioutput models
    action: verify multi_models=True when providing 2D sample/time weights
    severity: high
    kind: operational_lesson
    modality: must
    consequence: 2D sample weights (per observation, per horizon, per component) are only supported with multi_models=True.
      This is because the weight shape must match the per-horizon model structure.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-096
    when: When forecasting beyond one-shot prediction
    action: expect backtested returns to equal expected live trading returns
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results represent historical performance under idealized conditions (no slippage, instant execution,
      perfect data). Live trading involves transaction costs, market impact, and execution uncertainty that backtests cannot
      capture.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-097
    when: When using SKLearnModel for financial predictions
    action: claim real-time trading capability for a batch-only forecasting framework
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Darts is a batch forecasting library that processes historical data and produces fixed predictions. It does
      not support streaming predictions, real-time model updates, or live order execution.
    stage_ids:
    - sklearn_forecasting
  - id: finance-C-099
    when: When implementing an EnsembleModel with pre-trained models
    action: set train_forecasting_models=False or reset each models with untrained_model() before passing them to EnsembleModel
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Attempting to use train_forecasting_models=True with already-fitted models raises ValueError, causing the
      ensemble creation to fail
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-100
    when: When instantiating an EnsembleModel
    action: provide a non-empty list of forecasting_models containing either each LocalForecastingModels or each GlobalForecastingModels
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty forecasting_models list raises ValueError; mixed local/global models also raise ValueError at ensemble
      instantiation time
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-101
    when: When using train_forecasting_models=False with EnsembleModel
    action: verify each forecasting_models are already trained GlobalForecastingModels
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using train_forecasting_models=False with unfitted or non-global models raises ValueError, blocking ensemble
      prediction
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-102
    when: When implementing EnsembleModel.fit()
    action: call fit on individual forecasting_models only if train_forecasting_models=True, not automatically in base class
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Base EnsembleModel.fit() does not call fit() on constituent models; derived classes must implement this behavior,
      skipping it causes untrain ensemble
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-103
    when: When adding encoders to an ensemble workflow
    action: add encoders directly to EnsembleModel, instead add them to underlying forecasting_models
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: EnsembleModels do not support encoders; attempting to use them raises NotImplementedError
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-104
    when: When using past_covariates or future_covariates with EnsembleModel
    action: pass covariates only to models that support them, or verify at least one model in the ensemble supports the covariate
      type
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Covariates are silently filtered to models supporting them; using covariates with no supporting models raises
      ValueError
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-105
    when: When using RegressionEnsembleModel with probabilistic base models
    action: set train_num_samples > 1 only when each forecasting_models support probabilistic_prediction
    severity: high
    kind: domain_rule
    modality: must
    consequence: train_num_samples > 1 with only deterministic models raises ValueError at ensemble creation
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-106
    when: When using train_using_historical_forecasts=True with RegressionEnsembleModel
    action: verify each forecasting_models are GlobalForecastingModels
    severity: high
    kind: resource_boundary
    modality: must
    consequence: train_using_historical_forecasts=True is only available for global models; using with local models raises
      ValueError
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-107
    when: When fitting ensemble models on multiple time series
    action: verify each forecasting_models are global models if training on sequences of TimeSeries
    severity: high
    kind: domain_rule
    modality: must
    consequence: LocalForecastingModels do not support training on multiple series; attempting this raises ValueError
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-108
    when: When predicting with NaiveEnsembleModel
    action: average predictions from each constituent models with equal weighting
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: NaiveEnsembleModel implements simple averaging with equal weights; deviating from this ensemble method produces
      incorrect results
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-109
    when: When calling historical_forecasts on ensemble models
    action: expect optimized historical forecast performance; EnsembleModel always returns False for supports_optimized_historical_forecasts
    severity: low
    kind: resource_boundary
    modality: must_not
    consequence: EnsembleModels do not support optimized historical forecasts, falling back to non-optimized path with degraded
      performance
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-110
    when: When using predict_likelihood_parameters with NaiveEnsembleModel
    action: verify each forecasting_models are probabilistic with the same likelihood type before predicting likelihood parameters
    severity: high
    kind: domain_rule
    modality: must
    consequence: predict_likelihood_parameters=True requires all models to be probabilistic and fit the same likelihood; violating
      this raises ValueError
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-111
    when: When using regression ensemble models with pre-trained models
    action: use pre-trained GlobalForecastingModels only; foundation models must be pre-trained before ensembling
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Ensemble with unfitted base models and train_forecasting_models=False raises ValueError, preventing ensemble
      prediction
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-112
    when: When setting regression_train_n_points=-1 in RegressionEnsembleModel
    action: use only with pre-trained GlobalForecastingModels and train_forecasting_models=False
    severity: high
    kind: domain_rule
    modality: must
    consequence: regression_train_n_points=-1 without pre-trained models or with train_forecasting_models=True raises ValueError
    stage_ids:
    - ensemble_forecasting
  - id: finance-C-120
    when: When deploying conformal predictions to live trading
    action: claim the coverage guarantee applies when data distribution may shift from calibration
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Conformal prediction coverage guarantees are distribution-free only under exchangeability. Claiming valid
      coverage when the live data distribution differs from calibration data misrepresents the model's reliability.
    stage_ids:
    - conformal_prediction
  - id: finance-C-121
    when: When using ConformalQRModel
    action: use a base model that has been trained with a likelihood/quantile objective
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without quantile-based training, the base model's point predictions cannot be conformalized effectively,
      leading to poor interval quality even with correct calibration.
    stage_ids:
    - conformal_prediction
  - id: finance-C-122
    when: When computing historical forecasts with conformal models
    action: use retrain=True which is currently ignored by conformal models
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Conformal models ignore the retrain parameter and always use retrain=False. Setting retrain=True creates
      confusion and may cause users to expect behavior that conformal models do not implement.
    stage_ids:
    - conformal_prediction
  - id: finance-C-125
    when: When generating conformal predictions in a backtest
    action: expect backtest coverage to exactly equal the nominal coverage level
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtest coverage may deviate from nominal coverage due to finite calibration set variance and temporal dependencies.
      Exact equality is not guaranteed even under correct implementation.
    stage_ids:
    - conformal_prediction
  - id: finance-C-126
    when: When setting cal_num_samples for probabilistic base models
    action: set cal_num_samples >= 1 to generate sufficient samples for quantile estimation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Low cal_num_samples produces noisy quantile estimates during calibration, reducing interval quality and coverage
      accuracy.
    stage_ids:
    - conformal_prediction
  - id: finance-C-127
    when: When applying conformal calibration across multiple series
    action: verify cal_stride is a round divisor of the stride parameter in downstream tasks
    severity: high
    kind: resource_boundary
    modality: must
    consequence: If stride is not a multiple of cal_stride, the calibration indices become misaligned, producing incorrect
      interval widths for some predictions.
    stage_ids:
    - conformal_prediction
  - id: finance-C-128
    when: When using ConformalNaiveModel for interval estimation
    action: expect ConformalNaiveModel to handle heteroscedastic uncertainty as well as ConformalQRModel
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: ConformalNaiveModel uses symmetric absolute error calibration which cannot adapt to varying uncertainty across
      different prediction points, unlike ConformalQRModel's asymmetric quantile regression approach.
    stage_ids:
    - conformal_prediction
  - id: finance-C-129
    when: When interpreting conformal prediction coverage guarantees
    action: assume the guarantee applies to any arbitrary subset of predictions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Conformal coverage guarantees are marginal (over the calibration distribution), not conditional on specific
      prediction characteristics. Claiming valid coverage for selected subsets overstates the model's reliability.
    stage_ids:
    - conformal_prediction
  - id: finance-C-130
    when: When using cal_stride > 1 for efficiency
    action: verify sufficient historical data exists to generate the required calibration set
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using cal_stride > 1 requires proportionally longer historical series to achieve the same calibration set
      size, otherwise the model raises 'Could not build the minimum required calibration input' error.
    stage_ids:
    - conformal_prediction
  - id: finance-C-132
    when: When setting up covariates for conformal prediction
    action: verify past_covariates and future_covariates dimensions match those used during training
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Mismatched covariate dimensions cause the underlying model to fail during historical forecast generation,
      preventing conformal calibration from completing.
    stage_ids:
    - conformal_prediction
  - id: finance-C-137
    when: When defining fixed parameters for a custom transformer
    action: Prefix fixed parameter attribute names with underscore (e.g., self._scale, self._method) to indicate they are
      internal parameters
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: The fixed parameter detection mechanism uses the attribute names as keys in the params['fixed'] dictionary.
      Using non-underscore-prefixed names may cause confusion with public API parameters and could conflict with base class
      parameter names.
    stage_ids:
    - data_transformation
  - id: finance-C-138
    when: When inheriting from both FittableDataTransformer and InvertibleDataTransformer
    action: Define class inheritance as FittableDataTransformer first, then InvertibleDataTransformer (e.g., class MyTransformer(FittableDataTransformer,
      InvertibleDataTransformer))
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reversing the inheritance order prevents the global_fit parameter from being correctly passed to FittableDataTransformer's
      constructor, causing the transformer to behave incorrectly when fitting multiple series.
    stage_ids:
    - data_transformation
  - id: finance-C-139
    when: When setting parallel_params with per-series values
    action: Verify the length of each parallel_params list equals the number of TimeSeries being processed
    severity: high
    kind: resource_boundary
    modality: must
    consequence: If parallel_params specifies a list with fewer values than the number of TimeSeries, a ValueError is raised
      stating the mismatch between provided TimeSeries count and specified parameter values.
    stage_ids:
    - data_transformation
  - id: finance-C-140
    when: When using small amounts of data with parallel processing
    action: Set n_jobs to 1 (sequential processing) instead of using parallelization for small datasets
    severity: low
    kind: resource_boundary
    modality: should_not
    consequence: For small datasets, the overhead of spawning multiple processes and copying transformer data through pickling
      exceeds the parallelization benefit, causing slower overall execution time.
    stage_ids:
    - data_transformation
  - id: finance-C-141
    when: When processing multiple TimeSeries with a FittableDataTransformer that has global_fit=False
    action: Pass the same number of TimeSeries to transform() as were used during fit()
    severity: high
    kind: operational_lesson
    modality: must
    consequence: If transform() receives fewer TimeSeries than fit() was called with, the system logs a warning about potential
      mismatch between series and underlying transformers. If it receives more, a ValueError is raised.
    stage_ids:
    - data_transformation
  - id: finance-C-142
    when: When implementing ts_fit for a FittableDataTransformer
    action: Return a tuple of values when global_fit=False, or a single computed value when global_fit=True
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The fit() method expects ts_fit to return fitted parameter values that are stored and later passed to ts_transform
      via params['fitted']. Returning in the wrong format causes downstream errors in transform().
    stage_ids:
    - data_transformation
  - id: finance-C-143
    when: When implementing a custom invertible transformer
    action: Implement ts_inverse_transform as a static method that reverses the transformation applied by ts_transform
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: ts_inverse_transform must be a static method to maintain consistency with ts_transform's static design. Using
      instance methods would break the parallel execution model and cause pickling errors.
    stage_ids:
    - data_transformation
  - id: finance-C-144
    when: When using component masking with mask_components=True
    action: Pass component_mask as a keyword argument to transform() when mask_components is True
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: When mask_components=True, the component_mask is automatically applied before calling ts_transform. Passing
      it as a keyword argument causes an assertion error since component_mask is already applied.
    stage_ids:
    - data_transformation
  - id: finance-C-145
    when: When creating a data transformer that needs to be fit before transformation
    action: Inherit from FittableDataTransformer (not just BaseDataTransformer) to get the fit/transform lifecycle management
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: BaseDataTransformer does not implement the _fit_called flag or fit() method. Attempting to use fit() on a
      BaseDataTransformer instance causes AttributeError.
    stage_ids:
    - data_transformation
  - id: finance-C-146
    when: When checking if columns specified in a transformer exist in the TimeSeries
    action: Verify specified column names match actual TimeSeries component names
    severity: high
    kind: domain_rule
    modality: must
    consequence: If columns parameter specifies component names that don't exist in the input TimeSeries, a ValueError is
      raised listing the missing columns and available components.
    stage_ids:
    - data_transformation
  - id: finance-C-147
    when: When passing both columns and component_mask to transform()
    action: Pass only one of columns or component_mask, not both simultaneously
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Passing both columns and component_mask raises a ValueError since these are mutually exclusive ways to specify
      which components to transform.
    stage_ids:
    - data_transformation
  - id: finance-C-151
    when: When implementing custom encoder callables
    action: use lambda functions as encoder attributes
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Lambda functions cannot be pickled for model serialization, causing serialization failures and preventing
      model persistence
    stage_ids:
    - encoding
  - id: finance-C-152
    when: When specifying encoder attributes in add_encoders
    action: use only string or Sequence types for encoder attributes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid attribute types cause ValueError during encoder initialization, preventing proper covariate encoding
      configuration
    stage_ids:
    - encoding
  - id: finance-C-155
    when: When generating encoded covariates for inference
    action: provide correct forecast horizon parameter n to generate proper future index
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect n parameter causes misaligned covariate index generation, leading to wrong temporal features for
      prediction period
    stage_ids:
    - encoding
  - id: finance-C-156
    when: When encoding cyclic temporal features
    action: generate both sine and cosine components to preserve periodicity
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing sine or cosine component breaks periodicity continuity at period boundaries, causing discontinuities
      in temporal features
    stage_ids:
    - encoding
  - id: finance-C-157
    when: When using user-supplied covariates with encoders
    action: verify covariates index covers target index plus specified lag offsets
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Insufficient covariate coverage causes index generation failures when encoder attempts to extract required
      temporal features
    stage_ids:
    - encoding
  - id: finance-C-158
    when: When configuring add_encoders for model creation
    action: use only valid encoder type keys (cyclic, datetime_attribute, position, custom, transformer, tz)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid encoder type keys cause ValueError at model creation, preventing proper encoder configuration
    stage_ids:
    - encoding
  - id: finance-C-159
    when: When configuring temporal encoder types
    action: use only valid temporal parameters (past or future)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid temporal parameters cause ValueError during encoder validation, preventing proper past/future covariate
      classification
    stage_ids:
    - encoding
  - id: finance-C-160
    when: When using encoders that require transformation
    action: call transform() method which fits the transformer on first invocation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Transformer not fitted causes incorrect covariate scaling, leading to degraded model performance due to improperly
      normalized features
    stage_ids:
    - encoding
  - id: finance-C-161
    when: When calling encode_train multiple times on same encoder
    action: drop previously encoded components before adding new encodings
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate encoded components accumulate causing feature pollution and incorrect model inputs
    stage_ids:
    - encoding
  - id: finance-C-162
    when: When using encoders with models that support limited covariate types
    action: check model takes_past_covariates or takes_future_covariates before specifying encoders
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Mismatch between encoder types and model covariate support causes warning and silent ignoring of specified
      encoders
    stage_ids:
    - encoding
  - id: finance-C-163
    when: When processing multiple targets with encoders
    action: convert single TimeSeries to sequence before encoding
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Single TimeSeries not converted to sequence causes processing failure when _encode_sequence expects list
      of targets
    stage_ids:
    - encoding
  - id: finance-C-164
    when: When encoding time features from TimeSeries with DatetimeIndex
    action: use CyclicTemporalEncoder for cyclic attributes (month, dayofweek, hour, etc.)
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-cyclic encoding of cyclic features causes discontinuity at period boundaries, leading to incorrect temporal
      pattern capture
    stage_ids:
    - encoding
  - id: finance-C-165
    when: When generating integer index encodings
    action: use 'relative' attribute for position-based encoding
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid integer index attribute causes ValueError, preventing proper positional encoding
    stage_ids:
    - encoding
  - id: finance-C-170
    when: When using MinTReconciliator with method='wls_var' or 'mint_cov'
    action: provide a deterministic series containing residuals to the fit() method
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing a stochastic series to fit() with these methods raises ValueError 'When used with method wls_var
      or mint_cov, the MinT reconciliator has to be fit on a deterministic series containing residuals', preventing proper
      covariance estimation.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-173
    when: When using BottomUpReconciliator
    action: call fit() before transform — this reconciliator is stateless and doesn't require fitting
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Calling fit() on BottomUpReconciliator is unnecessary and may cause confusion about the reconciliator's state.
      It is a BaseDataTransformer (not FittableDataTransformer) that operates without fit parameters.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-175
    when: When using MinTReconciliator with method='ols'
    action: use np.linalg.inv(S.T @ S) @ S.T for computing G projection matrix
    severity: high
    kind: resource_boundary
    modality: must
    consequence: The OLS method requires inverting S.T @ S. If S is not full column rank (e.g., redundant hierarchy paths),
      np.linalg.inv will raise LinAlgError, causing reconciliation to fail.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-176
    when: When using MinTReconciliator with wls methods
    action: verify the Wh covariance matrix diagonal has non-zero values before inversion
    severity: high
    kind: resource_boundary
    modality: must
    consequence: If any diagonal entry in Wh is zero, np.linalg.inv(Wh) will raise LinAlgError. This can happen with wls_var
      if a component has zero variance residuals, preventing reconciliation.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-177
    when: When using MinTReconciliator with method='mint_cov'
    action: provide residuals with linearly independent samples (at least n_components samples)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: The mint_cov method computes empirical covariance using np.cov(). If residuals are linearly dependent (fewer
      samples than components), the covariance matrix will be singular, causing np.linalg.inv to fail during G matrix computation.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-178
    when: When performing hierarchical reconciliation
    action: retain the hierarchy and other _attrs when reconstructing reconciled TimeSeries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If the hierarchy is not preserved in the output TimeSeries, subsequent reconciliation operations will fail
      because the reconciled series lacks the required hierarchy information.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-179
    when: When applying reconciliation to forecast TimeSeries
    action: expect reconciliation to improve forecast accuracy — it only ensures consistency
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Reconciliation is a post-hoc adjustment that ensures hierarchical sum consistency, not a forecast improvement
      technique. Using it to 'fix' bad forecasts or claiming accuracy improvements will mislead stakeholders.
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-180
    when: When defining hierarchy for TimeSeries
    action: verify the top-level component appears as an ancestor (value) in the hierarchy dict
    severity: high
    kind: domain_rule
    modality: must
    consequence: If the top-level component does not appear as a parent of any other component, it will be detected as orphan
      and raise ValueError 'Invalid hierarchy. Component {} appears as it should be top-level, but does not appear as an ancestor
      in the hierarchy dict.'
    stage_ids:
    - hierarchical_reconciliation
  - id: finance-C-191
    when: When using FittableDetector.fit_detect() method
    action: use fit_detect() for train/test evaluation due to data leakage risk
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: fit_detect() trains the detector on the same series it then detects anomalies on, causing data leakage. This
      inflates evaluation metrics (AUC, precision, recall) as the detector has seen the test data during fitting. Use fit()
      on training data and detect() on test data instead.
    stage_ids:
    - anomaly_detection
  - id: finance-C-192
    when: When using FittableAnomalyScorer with multivariate series
    action: verify component-wise models are trained when is_univariate=False
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: WindowedAnomalyScorer trains separate sub-models per component for multivariate series, enabling component-wise
      anomaly detection for better contextual understanding
    stage_ids:
    - anomaly_detection
  - id: finance-C-193
    when: When validating anomaly detection accuracy metrics
    action: verify ground truth anomalies series contains both anomaly and non-anomaly samples
    severity: high
    kind: domain_rule
    modality: must
    consequence: ValueError is raised if anomalies series contains only anomalies or no anomalies, making metric computation
      impossible (division by zero in precision/recall)
    stage_ids:
    - anomaly_detection
  - id: finance-C-194
    when: When using Aggregators for multivariate anomaly combination
    action: verify series parameter is multivariate (width > 1) for FittableAggregator
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: ValueError is raised if series is univariate when aggregating is unnecessary, causing the aggregator to fail
    stage_ids:
    - anomaly_detection
  - id: finance-C-196
    when: When using window_agg=True with WindowedAnomalyScorer
    action: understand window aggregation transforms window-wise scores to point-wise scores
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Window aggregation converts per-window anomaly scores to per-timestamp scores by taking the mean of scores
      for all windows containing each point. This provides interpretable point-level anomaly signals.
    stage_ids:
    - anomaly_detection
  - id: finance-C-197
    when: When using WindowedAnomalyScorer._tabularize_series()
    action: verify series length is >= window size for proper tabularization
    severity: high
    kind: domain_rule
    modality: must
    consequence: ValueError is raised with 'Window size X is greater than the targeted series length Y' causing tabularization
      and scoring to fail
    stage_ids:
    - anomaly_detection
  - id: finance-C-199
    when: When using AnomalyModel.eval_metric() with univariate scorers
    action: verify anomalies parameter is univariate when model contains univariate scorers
    severity: high
    kind: domain_rule
    modality: must
    consequence: ValueError is raised if multivariate anomalies are passed to evaluation with univariate scorers, causing
      metric computation to fail
    stage_ids:
    - anomaly_detection
  - id: finance-C-201
    when: When implementing filtering model integration
    action: Pass only deterministic TimeSeries to filter() method
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-deterministic input series causes undefined behavior in state estimation, as the Kalman filter and Gaussian
      Process assume single-sample observations representing noisy measurements of true states.
    stage_ids:
    - filtering
  - id: finance-C-204
    when: When initializing KalmanFilter with covariates
    action: Provide covariates during both fit() and filter() calls consistently
    severity: high
    kind: domain_rule
    modality: must
    consequence: Covariate mismatch between fitting and filtering causes dimension or alignment errors in state estimation.
    stage_ids:
    - filtering
  - id: finance-C-205
    when: When fitting filtering models for anomaly detection
    action: Use anomaly-free training series to learn normal behavior baseline
    severity: high
    kind: domain_rule
    modality: must
    consequence: Filter learns contaminated baseline from anomalous training data, causing false negatives where genuine anomalies
      are not detected as deviations.
    stage_ids:
    - filtering
  - id: finance-C-206
    when: When processing long time series with GaussianProcessFilter
    action: Apply GP filter to series exceeding a few thousand data points
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: GaussianProcessFilter has O(n³) complexity from matrix inversion in GP inference, causing severe performance
      degradation or memory exhaustion with long series.
    stage_ids:
    - filtering
  - id: finance-C-207
    when: When using N4SID algorithm for Kalman filter initialization
    action: Fit Kalman filter on multiple time series simultaneously
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: N4SID implementation only supports single-series identification; attempting multi-series fitting causes incorrect
      state-space model estimation or runtime errors.
    stage_ids:
    - filtering
  - id: finance-C-208
    when: When selecting filter type for state estimation
    action: Prefer KalmanFilter over GaussianProcessFilter for long series
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: KalmanFilter with N4SID scales linearly after model identification, while GP filter becomes computationally
      prohibitive for series with thousands of points.
    stage_ids:
    - filtering
  - id: finance-C-210
    when: When building filtering-based anomaly detection pipelines
    action: Verify filter is fitted or set allow_model_training=True in anomaly model fit()
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unfitted filter in anomaly detection pipeline produces meaningless anomaly scores as deviation baseline is
      undefined.
    stage_ids:
    - filtering
  - id: finance-C-212
    when: When using KalmanFilter with covariates
    action: Verify covariates series is deterministic and matches time index
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-deterministic covariates cause incorrect control signal injection; time index mismatch leads to misaligned
      state updates.
    stage_ids:
    - filtering
  - id: finance-C-213
    when: When using GaussianProcessFilter for missing value imputation
    action: Verify kernel hyperparameters are specified for data scale
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Mismatched kernel scale causes GP to either overfit noise or underfit signal, resulting in poor imputation
      quality.
    stage_ids:
    - filtering
  - id: finance-C-214
    when: When claiming filtering model capabilities in documentation
    action: Claim real-time state estimation capability for batch filtering models
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Darts filtering models process series in batch mode; presenting batch filtering as real-time capability misleads
      users about system latency and responsiveness.
    stage_ids:
    - filtering
  - id: finance-C-215
    when: When using FilteringAnomalyModel for production anomaly detection
    action: Assume filtered baseline equals optimal anomaly threshold
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Filter output is prediction baseline, not classification boundary; users must configure scorers and thresholds
      based on operational requirements.
    stage_ids:
    - filtering
  - id: finance-C-216
    when: When considering filter-based anomaly detection for critical systems
    action: Claim deterministic anomaly detection without threshold validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without validated thresholds from eval_metric() on labeled data, anomaly scores are not actionable and may
      cause alert fatigue or missed detections.
    stage_ids:
    - filtering
  - id: finance-C-217
    when: When computing MAPE/APE or related percentage metrics
    action: pass actual_series containing zero values to percentage-based metrics
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Division by zero error occurs when actual_series contains zero values, causing the metric computation to
      crash with a ValueError exception
    stage_ids:
    - metrics_evaluation
  - id: finance-C-218
    when: When implementing new metrics with stochastic predictions
    action: default to median (q=0.5) for stochastic predictions when no quantile is specified
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without defaulting to median, stochastic predictions with multiple samples would produce undefined behavior
      or incorrect metric aggregations across sample dimensions
    stage_ids:
    - metrics_evaluation
  - id: finance-C-219
    when: When specifying quantile parameters for metrics
    action: verify each q values are within the range [0, 1] with strictly increasing and unique values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid quantile values would cause incorrect quantile extraction from stochastic predictions, leading to
      nonsensical metric values
    stage_ids:
    - metrics_evaluation
  - id: finance-C-220
    when: When computing interval metrics (IC, MIW, IWS, etc.)
    action: use q_interval parameter instead of q, ensuring lower bound quantile is strictly less than upper bound
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using q parameter with interval metrics raises ValueError, and inverted interval bounds would produce invalid
      coverage calculations
    stage_ids:
    - metrics_evaluation
  - id: finance-C-221
    when: When evaluating metrics on time series with misaligned time indices
    action: set intersect=True to compare only overlapping time points (this is the default behavior)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misaligned time indices without intersect=True would compare values at wrong timestamps, producing meaningless
      metric results
    stage_ids:
    - metrics_evaluation
  - id: finance-C-222
    when: When applying decorators to new metric functions
    action: apply @multi_ts_support as the outer decorator before @multivariate_support
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect decorator order would cause multi-series input handling to fail, as multivariate_support expects
      already-transformed single-series inputs
    stage_ids:
    - metrics_evaluation
  - id: finance-C-223
    when: When implementing interval metrics that require q_interval
    action: apply @interval_support decorator before @multi_ts_support and @multivariate_support
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without interval_support decorator, q_interval validation would be bypassed, allowing invalid parameter combinations
      that cause runtime errors
    stage_ids:
    - metrics_evaluation
  - id: finance-C-224
    when: When implementing classification metrics
    action: apply @classification_support decorator before @multi_ts_support and @multivariate_support
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without classification_support decorator, classification-specific validation and label handling would be
      bypassed, causing incorrect results for categorical data
    stage_ids:
    - metrics_evaluation
  - id: finance-C-225
    when: When using metrics with Series sequences
    action: verify actual_series and pred_series sequences have equal length
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched sequence lengths would cause iteration errors or index out of bounds when computing pairwise metrics
      across multiple series
    stage_ids:
    - metrics_evaluation
  - id: finance-C-226
    when: When using percentage-based metrics with actual values containing zeros
    action: use MASE (Mean Absolute Scaled Error) or other scale-independent metrics as alternatives to MAPE
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: MAPE fails with division by zero on zero actuals; MASE provides a normalized error metric that avoids this
      issue while maintaining interpretability
    stage_ids:
    - metrics_evaluation
  - id: finance-C-227
    when: When using QR (Quantile Risk) metric
    action: verify pred_series is stochastic (contains multiple samples), not deterministic
    severity: high
    kind: domain_rule
    modality: must
    consequence: QR metric requires multiple samples to compute quantile-based risk; deterministic predictions would cause
      incorrect division or runtime errors
    stage_ids:
    - metrics_evaluation
  - id: finance-C-228
    when: When using scaled error metrics (MASE, MSSE, RMSSE, ASE, SSE)
    action: verify insample series starts before pred_series and extends at least until one time step before pred_series starts
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid insample alignment would cause incorrect naive forecast scaling calculation, producing meaningless
      normalized error values
    stage_ids:
    - metrics_evaluation
  - id: finance-C-229
    when: When comparing metrics across different time series
    action: claim that higher metric scores directly translate to better live trading performance
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Metrics computed on historical backtest data do not account for real-world factors like execution slippage,
      market impact, regime changes, or transaction costs that significantly affect live trading outcomes
    stage_ids:
    - metrics_evaluation
  - id: finance-C-230
    when: When using metrics to evaluate probabilistic forecasting models
    action: present single deterministic metric values as complete representation of probabilistic forecast quality
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Single summary metrics like MAE or RMSE at median hide the full distribution of forecast uncertainty; quantile-based
      metrics and interval coverage should be reported alongside to characterize prediction reliability
    stage_ids:
    - metrics_evaluation
  - id: finance-C-237
    when: When using ShapExplainer with a model trained on multiple series
    action: provide background_series explicitly
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Explainer raises ValueError when background_series is not provided for multi-series models, as there is no
      single fallback training series available.
    stage_ids:
    - explainability
  - id: finance-C-238
    when: When explaining with TFTExplainer
    action: pass horizons or target_components parameters to explain()
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: TFTExplainer ignores horizons and target_components parameters with a logger.warning, and these values have
      no effect on the explanation output.
    stage_ids:
    - explainability
  - id: finance-C-239
    when: When using TFTExplainer
    action: install darts[torch] or darts[all] to enable TFTExplainer
    severity: high
    kind: resource_boundary
    modality: must
    consequence: TFTExplainer is a NotImportedModule placeholder when PyTorch is not installed, causing AttributeError on
      any usage attempt.
    stage_ids:
    - explainability
  - id: finance-C-240
    when: When using ShapExplainer for computational efficiency
    action: use reduced background samples via background_num_samples parameter
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without sampling, computing SHAP values on large background datasets becomes prohibitively slow, especially
      with kernel or permutation SHAP methods.
    stage_ids:
    - explainability
  - id: finance-C-242
    when: When computing SHAP explanations
    action: use background_series for expected value computation as ShapExplainer requires it
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper background series, SHAP expected values are incorrect, leading to misleading feature attribution
      values in the explanation output.
    stage_ids:
    - explainability
  - id: finance-C-243
    when: When explaining multiple series with TFTExplainer
    action: verify number of foreground series does not exceed model's batch_size
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: TFTExplainer raises ValueError stating series count exceeds batch_size when this constraint is violated,
      preventing explanation generation.
    stage_ids:
    - explainability
  - id: finance-C-244
    when: When interpreting ShapExplainer results
    action: claim that SHAP values capture indirect influence between correlated lags
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: ShapExplainer is subject to features independence assumption used to compute shap values. It does not capture
      potential indirect influence that some lags may have on the target by influencing other lags, leading to incorrect feature
      importance interpretations.
    stage_ids:
    - explainability
  - id: finance-C-246
    when: When explaining probabilistic models with ShapExplainer
    action: expect num_samples=1 to be used regardless of model's probabilistic capability
    severity: medium
    kind: claim_boundary
    modality: must
    consequence: Logger.warning states 'The model is probabilistic, but num_samples=1 will be used for explainability.' This
      means only single deterministic predictions are explained, not the full predictive distribution.
    stage_ids:
    - explainability
  - id: finance-C-247
    when: When data appears simple enough to skip stationarity checks
    action: skip investigation of why ShapExplainer produces unexpected results on trending or seasonal data
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: A TODO comment in shap_explainer.py:128-133 explicitly acknowledges that de-trending is not implemented.
      Users who skip root cause investigation will get misleading explanations for non-stationary series.
    stage_ids:
    - explainability
  - id: finance-C-248
    when: When TFTExplainer is needed for attention weight extraction
    action: use only TFTModel with TFTExplainer, not generic forecasting models
    severity: high
    kind: resource_boundary
    modality: must
    consequence: TFTExplainer requires TFTModel type as documented in class docstring. Using other model types will cause
      type errors since TFTExplainer accesses TFT-specific attributes like _attn_out_weights.
    stage_ids:
    - explainability
  - id: finance-C-251
    when: When implementing a new likelihood distribution class inheriting from TorchLikelihood
    action: implement the sample abstract method to draw predictions from the fitted distribution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sampling-based uncertainty propagation will fail, preventing Monte Carlo prediction methods from working
    stage_ids:
    - likelihood
  - id: finance-C-255
    when: When using probabilistic forecasting with Darts TorchLikelihood models
    action: claim that backtest or simulated probabilistic forecasts guarantee exact future prediction accuracy
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Uncertainty estimates from probabilistic forecasts represent model uncertainty, not guaranteed coverage of
      actual future values, and should be presented as conditional distributions rather than certain predictions
    stage_ids:
    - likelihood
  - id: finance-C-256
    when: When using PyTorch-based likelihood models
    action: install the darts[torch] or darts[all] extra to verify torch dependencies are available
    severity: high
    kind: resource_boundary
    modality: must
    consequence: TorchLikelihood classes will not be importable, causing ImportError when attempting to use probabilistic
      forecasting with neural network models
    stage_ids:
    - likelihood
  - id: finance-C-257
    when: When using QuantileRegression for probabilistic prediction
    action: call _distr_from_params or _params_from_output since they return None
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Calling these methods on QuantileRegression will return None, breaking any code that assumes a valid distribution
      object
    stage_ids:
    - likelihood
  - id: finance-C-258
    when: When implementing a new TorchLikelihood that supports priors
    action: override the _prior_params property to return the prior parameter values
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Prior regularization will not be applied during training, and the likelihood will behave as plain maximum
      likelihood estimation instead of Bayesian-inspired regularization
    stage_ids:
    - likelihood
  - id: finance-C-259
    when: When overriding compute_loss in a custom likelihood
    action: still call _params_from_output to extract distribution parameters from model output first
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Custom loss will operate on raw model output without proper parameter transformation, leading to incorrect
      loss values or shape mismatches
    stage_ids:
    - likelihood
  - id: finance-C-260
    when: When specifying quantile values for QuantileRegression
    action: provide quantiles in the range (0, 1) with _check_quantiles validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Quantile computation will produce invalid results or fail with assertion errors if quantiles outside (0,1)
      are provided
    stage_ids:
    - likelihood
  - id: finance-C-261
    when: When adding a new likelihood to the Darts library
    action: skip implementing _params_from_output with the justification that the problem looks simple
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Even seemingly simple distributions require proper parameter transformation (e.g., Softplus for positive
      parameters, Sigmoid for probabilities), and skipping this will cause numerical instability or invalid distributions
    stage_ids:
    - likelihood
  - id: finance-C-277
    when: When creating a TimeSeries with non-floating point numeric values
    action: Cast values to numpy.float32 or numpy.float64 before passing to TimeSeries — non-float dtypes are automatically
      cast to float64 but may cause functional issues
    severity: high
    kind: domain_rule
    modality: must
    consequence: TimeSeries operations may fail or produce incorrect results when using non-floating point numeric types,
      as many internal computations require float precision arithmetic
  - id: finance-C-278
    when: When creating a TimeSeries with a DatetimeIndex that has timezone (tz) information
    action: Expect timezone information to persist in the TimeSeries — Darts strips timezone information from DatetimeIndex
      during TimeSeries creation
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Timezone-aware DatetimeIndex timestamps lose their timezone information when converted to TimeSeries, potentially
      causing data interpretation errors when working across multiple time zones
  - id: finance-C-281
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live returns — backtesting ignores market impact, financing costs,
      execution delays, and slippage that occur in live trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss when actual execution costs and market impact are incurred
  - id: finance-C-282
    when: When users claim Darts can perform real-time streaming data processing
    action: Claim real-time streaming data processing support — Darts is designed for batch offline forecasting on historical
      time series data, not for real-time data ingestion
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting real-time forecasting capability will experience critical failures as Darts models require
      complete historical data for training and cannot process streaming observations incrementally without full dataset reloads
  - id: finance-C-283
    when: When users claim Darts can handle non-time-series ML tasks
    action: Claim support for non-time-series machine learning tasks — Darts is specialized for time series forecasting and
      anomaly detection, not general ML classification or regression on non-sequential data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will encounter errors or nonsensical results when attempting to apply time series forecasting models
      to non-temporal data structures, as the core assumption of temporal dependency is violated
  - id: finance-C-284
    when: When users claim Darts supports deep customization of underlying model architectures
    action: Claim support for deep customization of neural network architectures — Darts wraps forecasting models with fixed
      interfaces that limit access to internal architecture details like layer configurations
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting to customize internal model architectures (e.g., modifying layer depths, activation functions,
      attention mechanisms) will be blocked by the abstraction layer that does not expose these parameters
  - id: finance-C-285
    when: When users claim Darts forecasts are accurate for live trading without validation
    action: Claim forecast accuracy guarantees without out-of-sample validation — prediction accuracy degrades in live markets
      due to regime changes, concept drift, and distribution shift not present in historical training data
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy models to live trading based on in-sample accuracy metrics, leading to catastrophic losses when
      the model encounters market conditions fundamentally different from the training distribution
  - id: finance-C-287
    when: When training global models (GlobalForecastingModel) on multiple series
    action: Verify each input series have consistent frequency or resample before training — global models assume uniform
      temporal resolution across series for batch training
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent frequencies cause misaligned training samples where observations from different series are incorrectly
      matched in time, producing invalid model weights and nonsensical predictions
  - id: finance-C-288
    when: When using TimeSeries with DatetimeIndex that lacks a determinable frequency
    action: Explicitly set the freq parameter or set fill_missing_dates=True — TimeSeries without determinable frequency cannot
      properly align predictions with the time axis
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing frequency information causes unpredictable behavior in historical_forecasts and backtest methods,
      potentially producing forecasts with incorrect time indices or raising exceptions during prediction
  - id: finance-C-289
    when: When implementing new encoders for covariate transformation
    action: Follow the SequentialEncoder pattern with proper lag validation — encoder settings must be consistent with the
      forecasting model's extreme_lags definition
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent encoder settings cause covariate misalignment where the encoded features do not match the temporal
      windows expected by the model, producing garbage predictions
  - id: finance-C-290
    when: When claiming Darts supports minimal dependency deployments
    action: Claim Darts has minimal dependencies — Darts requires numpy, pandas, matplotlib, and optionally torch/prophet/statsmodels,
      creating substantial dependency trees
    severity: low
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting lightweight deployment will encounter bloated container images and installation times, with
      conflicts when Darts' dependency version requirements clash with existing project dependencies
  - id: finance-C-291
    when: When using foundation models (Chronos2, TimesFM) without understanding their limitations
    action: Understand that foundation models are pre-trained zero-shot forecasters with specific input requirements — they
      do not learn from user data and require specific frequency/content formats
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Misunderstanding foundation model behavior leads to applying them incorrectly (e.g., expecting them to fine-tune
      on local data) or getting poor results due to mismatched input formatting
  - id: finance-C-292
    when: When evaluating model performance using MAPE or similar percentage-based metrics
    action: Verify series values are non-zero and positive — MAPE division by actual values causes infinite or undefined metrics
      when series contains zeros
    severity: high
    kind: domain_rule
    modality: must
    consequence: Percentage metrics produce undefined results (infinity, NaN) for zero-value observations, corrupting backtest
      results and making model comparison impossible
  - id: finance-C-293
    when: When implementing TimeSeries data storage or accessing series values
    action: Maintain 3D value structure (time×component×sample) where deterministic series use sample=1 and probabilistic
      series use sample>1 — do not flatten to 2D or split into separate classes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Breaking the unified 3D structure would cause all downstream operations to fail or require branching logic
      for deterministic vs probabilistic series, destroying the clean API boundary that unifies both series types
    derived_from_bd_id: BD-001
  - id: finance-C-294
    when: When constructing TimeSeries objects
    action: Mix DatetimeIndex and RangeIndex within a single TimeSeries instance — index type must be determined at construction
      and remain consistent throughout the series
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Mixing datetime and integer indexes within a single series causes type confusion in downstream operations,
      potentially corrupting time-based calculations or sequence position logic in forecasting models
    derived_from_bd_id: BD-055
  - id: finance-C-295
    when: When defining hierarchical aggregation structures for TimeSeries
    action: Verify that hierarchy is encoded as dict mapping child→parents and that the structure supports arbitrary DAG shapes
      (not limited to fixed-level trees)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using a fixed-level hierarchy structure assumption would cause silent aggregation errors for complex organizational
      hierarchies, producing incorrect rollup values in backtest results
    derived_from_bd_id: BD-003
  - id: finance-C-296
    when: When configuring DataTransformers with global_fit parameter
    action: Verify that global_fit=True is intentional for cross-series normalization — verify series share compatible statistical
      distributions before pooling, otherwise per-series fitting may produce more accurate results
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Applying global fitting across heterogeneous series can distort normalization statistics, causing transformer
      parameters to be suboptimal for individual series and degrading backtest accuracy
    derived_from_bd_id: BD-029
  - id: finance-C-297
    when: When implementing model cloning or serialization in darts forecasting models
    action: Use ModelMeta's metaclass-based parameter extraction to capture original __init__ parameters at model creation
      time for reliable model lifecycle management
    severity: high
    kind: domain_rule
    modality: must
    consequence: Breaking metaclass-based parameter extraction breaks model cloning and serialization, causing configuration
      loss and requiring manual parameter tracking that is error-prone
    derived_from_bd_id: BD-005
  - id: finance-C-298
    when: When implementing covariate encoding logic for forecasting models
    action: Use separate encode_train for historical index encoding and encode_inference for future index encoding with correct
      index range boundaries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using unified encoding or mixing train/inference methods violates covariate availability constraints, causing
      out-of-bounds access or incorrect forecast values during backtesting
    derived_from_bd_id: BD-030
  - id: finance-C-299
    when: When implementing training data generation for TorchForecastingModel
    action: Use sliding window approach with properly configured input_chunk_length and output_chunk_length parameters to
      generate overlapping training samples respecting temporal boundaries
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-sliding window approaches break temporal ordering assumptions and may introduce look-ahead bias or insufficient
      training samples, degrading model performance
    derived_from_bd_id: BD-066
  - id: finance-C-300
    when: When implementing differencing transformations for non-stationary time series
    action: Use sequential lagged differencing with cumulative sum as inverse transformation; verify configurable lags match
      the underlying trend frequency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect differencing approach breaks stationarity assumptions required by many forecasting models, causing
      systematic prediction errors and non-recoverable forecast interpretability
    derived_from_bd_id: BD-125
  - id: finance-C-301
    when: When using historical_forecasts() for rolling window backtesting evaluation
    action: Verify retrain callable correctly handles rolling window boundaries and retraining frequency; verify custom retrain
      strategy does not introduce look-ahead bias
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect retrain callable in rolling window backtesting causes systematic performance overestimation when
      retrain logic uses future data or fails to reset model state properly
    derived_from_bd_id: BD-008
  - id: finance-C-302
    when: When managing random state in PyTorch deep learning forecasting models
    action: Use random_method decorator for consistent reproducibility across PyTorch operations, data loading, and NumPy/SciPy
      calls within model methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Manual random state management per operation causes reproducibility failures where only some random components
      are seeded, leading to inconsistent model training results across runs
    derived_from_bd_id: BD-010
  - id: finance-C-303
    when: When initializing PyTorch forecasting models
    action: Verify lazy initialization behavior and verify training data dimensions are provided before nn.Module construction;
      avoid hardcoding input shapes that may not match actual data
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Explicit dimension parameters at construction time that do not match actual training data cause shape mismatch
      errors or silent performance degradation when input dimensions vary
    derived_from_bd_id: BD-011
  - id: finance-C-304
    when: When backtesting with historical data in production-like scenarios
    action: Assume the framework provides point-in-time data verification — the codebase contains no release_date/publish_date/point_in_time
      markers; users cannot verify that data was actually available at specific historical timestamps
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without point-in-time verification, backtests may include data that was not yet published at the simulated
      historical time, creating look-ahead bias that makes live trading results diverge significantly from backtest performance
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-305
    when: When loading historical data for backtesting or production inference
    action: Implement point-in-time verification by adding release_date/publish_date fields to data sources and validating
      that loaded data's timestamp is after its release_date before using it in backtesting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping point-in-time verification allows look-ahead bias where backtests use data that wasn't publicly
      available at the simulated time, causing live results to underperform backtests
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-306
    when: When using live or streaming data in production forecasting
    action: Assume the framework automatically checks data freshness or enforces cache TTL — the codebase has no staleness
      checking or cache TTL mechanisms; stale cached data will be returned without warning
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without staleness checking, production systems may silently use outdated cached data causing forecasts to
      be based on stale information, leading to incorrect trading decisions and potential financial losses
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-307
    when: When configuring data loading for production or near-real-time scenarios
    action: Implement data freshness validation by adding TTL/freshness checking to data loaders and rejecting or flagging
      data older than the configured maximum age threshold
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Skipping freshness validation causes production systems to use stale data without warning, resulting in forecasts
      that don't reflect current market conditions and leading to suboptimal trading decisions
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-308
    when: When implementing model-covariate integration in PyTorch deep learning forecasting
    action: Verify the chosen covariate type (PastCovariates, FutureCovariates, DualCovariates, SharedCovariates, MixedCovariates)
      is compatible with the target model architecture requirements — verify the model class explicitly supports the covariate
      class before passing data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing incompatible covariate types to a model causes runtime errors or silently produces incorrect forecasts,
      breaking backtest reproducibility and strategy reliability
    derived_from_bd_id: BD-012
  - id: finance-C-309
    when: When configuring ARIMA model parameters in statistical forecasting
    action: Verify the differencing parameter d accepts only non-negative integer values (0, 1, 2, ...) — reject float values,
      negative values, or fractional orders as they violate ARIMA specification and produce undefined model behavior
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-integer differencing order causes the ARIMA model to fail during fitting or produce mathematically invalid
      results, making backtest equity curves unreliable for strategy evaluation
    derived_from_bd_id: BD-013
  - id: finance-C-310
    when: When loading time series data via TimeSeries.from_csv()
    action: Explicitly specify the date column name using the header_time parameter rather than relying on the default 'Month'
      — verify the CSV header matches the expected date column name before ingestion
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Relying on default 'Month' column causes silent parsing failures when the actual date column has a different
      name, resulting in incorrect data ingestion and corrupted time series that produce wrong backtest results
    derived_from_bd_id: BD-056
  - id: finance-C-311
    when: When fitting FittableAggregator with anomaly detection data
    action: Verify the anomalies array and series have identical lengths before calling fit() — aggregation operations (AND,
      OR, threshold-based) require positional correspondence between anomaly flags and series values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched lengths between anomalies and series cause undefined aggregation behavior, producing incorrect
      anomaly scores and false positives or false negatives in backtest anomaly detection
    derived_from_bd_id: BD-150
  - id: finance-C-312
    when: When training sklearn-based classifiers with multi_models=True and output_chunk_length > 1
    action: Verify class labels remain consistent across each prediction chunks — the _ClassifierMixin enforces this validation
      to prevent scenarios where different chunks predict different label sets
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent class labels across prediction chunks breaks downstream code that relies on uniform label sets,
      causing undefined behavior in classification aggregation and reporting
    derived_from_bd_id: BD-149
  - id: finance-C-313
    when: When implementing custom data transformer subclasses that override __init__
    action: Register parameters explicitly using the framework's parameter registration mechanism rather than relying on __init__
      attribute order detection — verify fixed parameters are captured before calling super().__init__
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Parameter detection based on __init__ order breaks when subclasses reorder initialization calls or use alternative
      parameter passing, causing transformers to use incorrect default values or fail silently during fitting
    derived_from_bd_id: BD-027
  - id: finance-C-314
    when: When using NLLScorer for anomaly detection scoring
    action: Verify the NLLScorer has a fitted distribution before computing scores — the negative log-likelihood scoring requires
      fitted distribution parameters to quantify how anomalous observed values are
    severity: high
    kind: domain_rule
    modality: must
    consequence: Computing NLL scores without a fitted distribution produces undefined anomaly scores, causing unreliable
      anomaly detection results in backtesting and live monitoring
    derived_from_bd_id: BD-039
  - id: finance-C-315
    when: When implementing or modifying IndexGenerator lag boundary logic in covariate encoding
    action: Maintain lag boundary enforcement for covariate alignment — verify covariate values are only available at valid
      time steps based on established lag boundaries; do not replace with runtime lag checking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect lag boundaries cause temporal misalignment between covariates and targets, leading to look-ahead
      bias or feature leakage that makes backtest results unreproducible in live trading
    derived_from_bd_id: BD-033
  - id: finance-C-316
    when: When implementing hierarchical reconciliation in forecasting pipelines
    action: Compute G matrix from fit data for MinT-style reconciliation optimization — do not use fixed reconciliation coefficients;
      G matrix establishes data-driven optimal hierarchical reconciliation coefficients
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fixed reconciliation coefficients bypasses data-driven optimization, leading to suboptimal hierarchical
      forecasts that fail to minimize reconciled covariance trace, causing performance degradation in aggregated predictions
    derived_from_bd_id: BD-035
  - id: finance-C-317
    when: When implementing multivariate anomaly detection aggregation logic
    action: Use AND/OR aggregation logic for combining component-level anomaly signals — AND means each components must be
      anomalous, OR means any component anomalous; do not replace with weighted aggregation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Weighted aggregation changes anomaly detection semantics, causing different components to be flagged as anomalous
      under the same conditions, leading to inconsistent anomaly detection results
    derived_from_bd_id: BD-038
  - id: finance-C-318
    when: When configuring TFTModel hyperparameters for forecasting
    action: Verify that hidden_size=16 default matches dataset complexity — increase hidden_size for complex patterns requiring
      more model capacity, decrease for faster training on simpler datasets; default of 16 may underfit complex multivariate
      time series
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default hidden_size=16 may provide insufficient model capacity for complex patterns, causing the model to
      underfit and produce forecasts that fail to capture important temporal dependencies, leading to poor backtest results
    derived_from_bd_id: BD-069
  - id: finance-C-319
    when: When configuring TFTModel attention mechanism
    action: Verify num_attention_heads divides hidden_size evenly — with default hidden_size=16, num_attention_heads must
      be a divisor of 16 (1, 2, 4, 8, or 16); invalid configurations cause runtime errors or degraded attention mechanism
      performance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attention heads that do not evenly divide hidden_size cause runtime exceptions or silent performance degradation
      in the transformer attention mechanism, leading to failed training runs or suboptimal temporal relationship capture
    derived_from_bd_id: BD-070
  - id: finance-C-320
    when: When loading built-in datasets for backtesting or model training
    action: Use dataset loaders that inherit from DatasetLoaderCSV and trigger on-demand download — do not assume datasets
      are bundled; handle download failures gracefully; verify dataset availability before use in critical pipelines
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: On-demand download failures cause pipeline interruptions when bundled datasets are expected but not present,
      leading to failed backtests or training runs without clear error messages
    derived_from_bd_id: BD-051
  - id: finance-C-322
    when: When implementing or extending anomaly detectors (ThresholdDetector or QuantileDetector)
    action: Use _BoundedDetectorMixin for shared boundary validation logic between detector types — do not duplicate boundary
      validation logic across detector implementations; maintain the mixin pattern for flexible composition
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Duplicating boundary validation logic across detector types causes inconsistent bounded behavior, leading
      to undetected edge cases where anomaly bounds are not properly enforced
    derived_from_bd_id: BD-145
  - id: finance-C-323
    when: When implementing or refactoring Kalman filter state estimation in darts/models/filtering/kalman_filter.py
    action: Use N4SID (Numerical Subspace State Space Identification) for automatic system identification to establish state-space
      model parameters from data without manual tuning
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching from N4SID to manual state-space specification introduces manual parameter tuning requirements
      and breaks the black-box identification boundary that the framework provides
    derived_from_bd_id: BD-040
  - id: finance-C-324
    when: When computing point metrics on probabilistic forecast series
    action: Extract deterministic series using quantile=0.5 (median) from probabilistic outputs to verify robust point estimate
      computation that is resilient to outliers
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using mean extraction instead of median introduces sensitivity to outliers, causing systematic overestimation
      of error metrics when forecast distributions are skewed
    derived_from_bd_id: BD-043
  - id: finance-C-325
    when: When training probabilistic forecasting models with uncertainty estimation
    action: Use negative log-likelihood (NLL) as the loss function for probabilistic models in darts/utils/likelihood_models/torch.py
      compute_loss method to provide principled uncertainty-aware training
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using MSE-based uncertainty loss instead of NLL breaks the probabilistic training paradigm, causing improper
      uncertainty quantification that misrepresents prediction confidence in live trading decisions
    derived_from_bd_id: BD-047
  - id: finance-C-326
    when: When implementing or modifying the TimeSeries internal data structure
    action: Store values internally using pandas DataFrame with column index for component names, maintaining pandas ecosystem
      compatibility and column-wise operations capability
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Replacing pandas DataFrame with numpy arrays removes column labeling and pandas indexing capabilities, breaking
      multi-component time series operations and TimeSeries public API contracts
    derived_from_bd_id: BD-054
  - id: finance-C-327
    when: When configuring RegressionModel predictor inputs for forecasting
    action: Use past_covariates as the default predictor input since they are available at prediction time without requiring
      future information; fallback to target-only prediction when covariates are unavailable
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using future covariates as default causes prediction failures when future information is unavailable, leading
      to backtest-live inconsistency where backtest uses full data but live trading fails
    derived_from_bd_id: BD-074
  - id: finance-C-328
    when: When training multi-output forecasting models (TFT, N-BEATS) with evaluation sets
    action: Slice eval_set by output index at MultiOutputMixin.fit() to enable per-output early stopping and evaluation in
      multi-output forecasting models
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a shared eval_set without per-output slicing prevents proper early stopping per output head, causing
      suboptimal training convergence and degraded prediction quality for individual outputs
    derived_from_bd_id: BD-151
  - id: finance-C-329
    when: When implementing transformer models for probabilistic forecasting requiring uncertainty quantification
    action: Override PyTorch standard feed-forward block with MonteCarloDropout in CustomFeedForwardEncoder and CustomFeedForwardDecoderLayers
      to enable MC Dropout inference for prediction intervals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using standard PyTorch dropout instead of MC Dropout at inference time removes uncertainty quantification
      capability, causing point predictions without confidence intervals that are essential for risk management
    derived_from_bd_id: BD-154
  - id: finance-C-330
    when: When implementing or modifying metric evaluation functions for time series forecasting
    action: Apply stacked decorators @multi_ts_support and @multivariate_support (in that order) to enable metrics handling
      both multiple time series and multivariate series without modifying core metric logic
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing decorator pipeline breaks metrics capability to handle multiple time series or multivariate series,
      causing TypeError exceptions when applying metrics to non-standard input formats
    derived_from_bd_id: BD-157
  - id: finance-C-331
    when: When implementing or refactoring GlobalForecastingModel.fit() for single-series scenarios
    action: Fit a separate model instance for each TimeSeries in single-series mode; do not share parameters across series
    severity: high
    kind: domain_rule
    modality: must
    consequence: Shared model parameters for single-series predictions alters the expected behavior where each series is treated
      independently, causing predictions to differ from documentation and potentially breaking strategies relying on independent
      model fitting
    derived_from_bd_id: BD-067
  - id: finance-C-332
    when: When processing covariate data in time series forecasting pipelines
    action: 'Correctly identify and handle three covariate types: past_covariates (available only in historical/past periods),
      future_covariates (known ahead of time), and static_covariates (per-series constants); do not interchange them'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Conflating covariate types causes prediction failures and incorrect forecasts, as past_covariates cannot
      provide values for future timestamps and using them where future_covariates are expected leads to missing data errors
    derived_from_bd_id: BD-075
  - id: finance-C-333
    when: When implementing or refactoring linear_timeseries generation logic
    action: Use numpy.linspace for uniform value distribution between start and end values — do NOT use cumsum of increments
      or other cumulative approaches
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing linspace with cumsum introduces floating-point accumulation errors that cause the generated series
      to deviate from perfectly linear, making backtest equity curves and signal processing tests unreliable
    derived_from_bd_id: BD-110
  - id: finance-C-334
    when: When implementing or refactoring random_walk_timeseries generation logic
    action: Use np.cumsum of normal increments to produce correlated random walk — do NOT replace with direct np.random.normal
      samples which are independent and un correlated
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching from cumsum to independent normal samples destroys autocorrelation between adjacent steps, causing
      backtests of momentum strategies to fail and producing results inconsistent with stock price behavior
    derived_from_bd_id: BD-113
  - id: finance-C-335
    when: When implementing or refactoring gaussian_timeseries generation logic
    action: Generate white noise by sampling independently at each step using np.random.normal — do NOT use np.cumsum which
      creates a random walk with autocorrelation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using cumsum instead of independent sampling creates temporal correlation between adjacent values, making
      the generated series unsuitable for testing model independence assumptions and breaking statistical tests that expect
      white noise
    derived_from_bd_id: BD-112
  - id: finance-C-336
    when: When loading datasets in darts using the default dataset path configuration
    action: Verify internet connectivity before dataset download and implement fallback or error handling for GitHub raw content
      unavailability — do NOT assume datasets are always accessible from https://raw.githubusercontent.com/unit8co/darts/master/datasets
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Hardcoded GitHub URLs create implicit dependencies on internet access and repository availability; network
      failures or repository changes silently prevent dataset loading, breaking automated testing and reproducible workflows
    derived_from_bd_id: BD-106
  - id: finance-C-337
    when: When implementing data preprocessing transformations for time series
    action: Use Box-Cox power transformation with MLE or Pearsonr optimization for lambda parameter — do not use fixed lambda
      values (e.g., lambda=-1 for log transform) without domain justification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing Box-Cox with fixed lambda transforms alters data normalization, degrading model fit for data whose
      optimal lambda differs from -1; downstream models assuming Gaussian errors produce systematically biased predictions
    derived_from_bd_id: BD-124
  - id: finance-C-338
    when: When implementing hierarchical forecast reconciliation
    action: Use MinT optimal reconciliation (OLS/WLS/MinT-Cov methods) for coherent hierarchical aggregation — do not replace
      with bottom-up or top-down methods that ignore base forecast information or aggregation constraints
    severity: high
    kind: domain_rule
    modality: must
    consequence: Bottom-up reconciliation ignores base forecast information, causing aggregate forecasts to lose statistical
      efficiency; top-down ignores aggregation constraints, producing incoherent hierarchies that degrade downstream decision-making
    derived_from_bd_id: BD-127
  - id: finance-C-339
    when: When implementing OLS-based forecast reconciliation
    action: Use the projection matrix formula G = inv(S'S)S for OLS reconciliation — do not use simplified or approximate
      alternatives without mathematical validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect projection matrix implementation produces mathematically incoherent hierarchical forecasts; the
      reconciliation becomes invalid and aggregate predictions systematically diverge from the optimal solution
    derived_from_bd_id: BD-128
  - id: finance-C-340
    when: When implementing temporal feature encoding for periodic patterns
    action: Use sine/cosine cyclic encoding for temporal periodicity (hour, day, week) — do not use integer encoding or one-hot
      encoding that introduce arbitrary ordering artifacts
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Integer encoding creates discontinuous representations where hour 23 is far from hour 0, breaking temporal
      model ability to capture cyclical patterns; weekend and Monday become distant despite being adjacent in reality
    derived_from_bd_id: BD-129
  - id: finance-C-341
    when: When integrating high-frequency predictors into low-frequency forecasting models
    action: Use MIDAS (Mixed-data sampling) for high-to-low frequency conversion — do not use simple last() aggregation or
      linear interpolation that loses fine-grained signal or introduces artifacts
    severity: high
    kind: domain_rule
    modality: must
    consequence: Simple last() aggregation discards daily predictor variations within monthly periods, reducing model predictive
      power; interpolation introduces artificial data points without real information, causing miscalibrated coefficients
    derived_from_bd_id: BD-132
  - id: finance-C-342
    when: When configuring QuantileRegression for uncertainty estimation
    action: Evaluate whether default quantiles [0.05, 0.1, 0.5, 0.9, 0.95] provide sufficient tail resolution — add [0.02,
      0.98] or [0.01, 0.99] if detecting extreme anomalies is critical
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default quantiles miss tail behavior between 0.05-0.1 and 0.9-0.95, causing extreme events to fall outside
      prediction intervals without warning; strategies relying on these intervals underprepare for black swan events
    derived_from_bd_id: BD-117
  - id: finance-C-343
    when: When modeling count data forecasts with PoissonLikelihood
    action: Test for overdispersion (variance significantly exceeding mean) before applying PoissonLikelihood — use Negative
      Binomial if variance/mean ratio exceeds 1.5
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Poisson assumes equal mean and variance; overdispersed count data (common in event counts, insurance claims)
      causes systematic underestimation of prediction intervals, leading to overconfident forecasts and insufficient risk
      buffers
    derived_from_bd_id: BD-118
  - id: finance-C-344
    when: When using k-means clustering for anomaly scoring in windowed subsequences
    action: Evaluate whether k=8 clusters match the data complexity — test k values (3, 5, 10) and compare anomaly detection
      precision; adjust based on empirical validation of detection boundaries
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default k=8 may produce too many clusters for simple data (overfitting anomaly boundaries) or too few for
      complex data (merging distinct patterns), causing either excessive false positives or missed anomalies
    derived_from_bd_id: BD-119
  - id: finance-C-345
    when: When implementing model configuration management in production
    action: Assume the framework implements parameter versioning for model configurations — the framework lacks effective_date,
      valid_from, or param_change patterns for tracking model configuration changes
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without parameter versioning, model configurations cannot be tracked, audited, or rolled back. Production
      issues caused by configuration changes cannot be diagnosed, leading to extended downtime and unreliable model deployment
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-346
    when: When implementing model configuration management in production
    action: Implement parameter versioning with effective_date, valid_from, and param_change patterns for each model configurations
      used in production environments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit versioning, configuration changes cannot be audited, reproduced, or rolled back in production
      environments, causing reliability and compliance issues
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-347
    when: When implementing fixed income, options, or derivatives pricing logic
    action: Assume the framework handles market conventions for fixed income, options, or derivatives pricing — Darts is a
      general-purpose forecasting library that does not implement these financial instrument pricing features
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using general-purpose forecasting methods for derivatives pricing produces incorrect valuations since market
      conventions for options (Black-Scholes, binomial trees) and fixed income (yield curves, duration) are not implemented
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-348
    when: When implementing fixed income, options, or derivatives pricing logic
    action: Use dedicated financial instrument pricing libraries for fixed income, options, or derivatives pricing; do not
      rely on Darts forecasting methods for instrument valuation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtesting derivatives strategies using Darts produces incorrect valuations because the library lacks support
      for early exercise premium, implied volatility, yield curves, and other market conventions required for accurate instrument
      pricing
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-349
    when: When loading CSV datasets for backtesting or model training
    action: Load CSV datasets from the centralized GitHub URI (https://raw.githubusercontent.com/unit8co/darts/master/datasets)
      with SHA hash validation enabled; do not use alternative sources without equivalent integrity verification mechanisms
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using datasets from unverified sources may introduce corrupted or tampered data, breaking reproducibility
      and potentially causing incorrect model training or backtesting results
    derived_from_bd_id: BD-162
  - id: finance-C-351
    when: When implementing conformal calibration models in darts
    action: Retrain or modify the underlying pre-trained model weights during calibration — conformal calibration must only
      compute calibration parameters without altering the original model's learned parameters
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: If the fit method retrains the underlying model, the conformal prediction intervals will be calibrated on
      a different model than the one used for inference, causing prediction intervals to be miscalibrated and systematically
      under- or over-covering actual values
    derived_from_bd_id: BD-025
  - id: finance-C-352
    when: When selecting features or training models in darts forecasting pipelines
    action: Implement point-in-time data availability checks — only use features that were observable at the prediction time;
      exclude features whose publication dates are after the current simulation timestamp
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Without point-in-time filtering, backtests include features that would not have been available to live trading
      at that time, causing look-ahead bias where strategies appear profitable but cannot be replicated in production
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-353
    when: When building features or datasets for live-trading-ready backtesting
    action: Add timestamp fields to each feature row indicating earliest availability date, and implement filtering logic
      to exclude observations where prediction_timestamp < feature_availability_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper point-in-time data filtering, backtested strategies exhibit look-ahead bias and live trading
      performance will diverge significantly from backtested results, potentially causing unexpected losses
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-354
    when: When implementing forecasting models with categorical features
    action: Use SKLearnModelWithCategoricalFeatures mixin for categorical feature handling — do not implement inline encoding
      logic that bypasses the mixin
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing the mixin and implementing inline encoding logic breaks the separation of concerns between encoding
      and core regression, causing inconsistent categorical handling across sklearn-based models
    derived_from_bd_id: BD-018
  - id: finance-C-355
    when: When configuring ensemble forecasting models with default settings
    action: Verify that base models are pre-fitted before using default ensemble configuration (train_forecasting_models=False);
      explicitly set train_forecasting_models=True if retraining is required
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default non-retraining behavior assumes pre-fitted models; if base models are unfitted, ensemble will produce
      no predictions or incorrect forecasts silently, wasting backtesting compute time
    derived_from_bd_id: BD-020
  - id: finance-C-356
    when: When implementing or classifying forecasting models with covariates
    action: Maintain distinct covariate type classification (past, future, dual, mixed) in model interfaces — do not merge,
      remove, or bypass type distinctions during refactoring
    severity: high
    kind: domain_rule
    modality: must
    consequence: Collapsing covariate type distinctions breaks model data routing logic, causing temporal misalignment where
      past covariates are incorrectly applied to future time steps or vice versa
    derived_from_bd_id: BD-006
  - id: finance-C-357
    when: When implementing or using hierarchical reconciliation transformers
    action: Use the S matrix computed by reconciliation transformer for hierarchical consistency — do not compute bottom-level
      aggregations at runtime
    severity: high
    kind: domain_rule
    modality: must
    consequence: Computing aggregations at runtime bypasses the pre-computed summation structure, producing reconciled forecasts
      that do not sum correctly to parent levels and misrepresenting hierarchical business metrics
    derived_from_bd_id: BD-034
  - id: finance-C-358
    when: When configuring anomaly detection models for sustained anomaly identification
    action: Use sliding window aggregation when converting point anomaly scores to labels — do not use point-based labeling
      for sustained anomaly detection workflows
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Point-based labeling introduces noise from transient deviations, causing false positives for brief spikes
      and reducing detection reliability for sustained anomalies that indicate real issues
    derived_from_bd_id: BD-097
  - id: finance-C-359
    when: When implementing or modifying ForecastingModel subclasses
    action: Preserve the default=True encoder initialization behavior in __init__; if encoders parameter is None, automatically
      enable default encoders (typically 'past_covariates' encoder) unless explicitly overridden
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Disabling default encoder initialization removes automatic covariate generation, causing model inputs to
      differ from expected baseline and producing inconsistent results across different ForecastingModel usage patterns
    derived_from_bd_id: BD-163
  - id: finance-C-360
    when: When configuring SequentialEncoder for covariate encoding
    action: Use dict-based add_encoders configuration format; the encoder_map tracks original config for reproducibility,
      ensuring encoder setup is flexible yet auditable
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-dict encoder configuration bypasses the encoder_map tracking, breaking reproducibility and preventing
      users from inspecting or reproducing the original encoder setup
    derived_from_bd_id: BD-031
  - id: finance-C-362
    when: When evaluating probabilistic forecasts using interval metrics
    action: Pass q_interval as a tuple of two quantile values (lower, upper) for coverage calculation; the metric checks if
      actuals fall between the specified quantiles
    severity: high
    kind: domain_rule
    modality: must
    consequence: Passing q_interval as a scalar or non-tuple value causes coverage calculation to fail, producing NaN or incorrect
      forecast quality scores that cannot be used for strategy validation
    derived_from_bd_id: BD-044
  - id: finance-C-363
    when: When selecting and configuring VARIMA for multivariate time series forecasting
    action: Use VARIMA only when multivariate series should be treated as a single entity for joint modeling; VARIMA's local
      interface does not train independently on multiple series
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using VARIMA with the expectation of global model behavior (independent per-series training) causes all series
      to be modeled jointly, leading to suboptimal forecasts and strategy losses when independent modeling was intended
    derived_from_bd_id: BD-014
  - id: finance-C-364
    when: When using QuantileRegression for probabilistic forecasting
    action: Treat QuantileRegression outputs as true probability distributions — it uses pinball loss and does not compute
      actual likelihood; quantile estimates represent conditional quantiles only
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using QuantileRegression outputs for likelihood-based model selection or Bayesian updating produces incorrect
      results since pinball loss does not estimate probability density; strategies optimized based on these 'probabilities'
      may underperform
    derived_from_bd_id: BD-050
  - id: finance-C-365
    when: When implementing multi-step forecasting with sklearn models that have multioutput regression
    action: Use per-horizon estimator pattern when model lacks native multioutput support — do not refactor to wrapper-based
      approach; train separate estimators for each forecast horizon to maintain consistent multi-step behavior
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing to wrapper-based multioutput handling causes inconsistent behavior across different scikit-learn
      estimator types, potentially breaking backtest results for models that were trained with per-horizon pattern
    derived_from_bd_id: BD-016
  - id: finance-C-366
    when: When training sklearn-based forecasting models in backtesting
    action: Generate lagged features from target and covariates at fit time — do not refactor to static pre-extracted features;
      lagged feature generation is fundamental for transforming time series into tabular format for regression
    severity: high
    kind: domain_rule
    modality: must
    consequence: Moving lagged feature generation to static pre-processing breaks sklearn model compatibility and changes
      the temporal relationship between features and targets, causing backtest-live inconsistency
    derived_from_bd_id: BD-017
  - id: finance-C-367
    when: When initializing TorchForecastingModel subclasses for time series forecasting
    action: Explicitly set input_chunk_length (historical context) and output_chunk_length (future steps) at initialization;
      these parameters define the sequence-to-sequence architecture and training data generation for each TorchForecastingModel
      subclasses
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Omitting or incorrectly setting input_chunk_length/output_chunk_length causes the neural network to use undefined
      or default chunk lengths, producing incorrect sequence-to-sequence forecasts that don't match the intended prediction
      horizon
    derived_from_bd_id: BD-063
  - id: finance-C-368
    when: When configuring conformal prediction for prediction interval estimation
    action: 'Diagnose data characteristics before selecting conformal prediction variant: if data exhibits heteroscedasticity,
      use QR asymmetric variant with sufficient quantile coverage; do not use naive symmetric variant with heteroscedastic
      data as it produces under-covered tails'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using naive symmetric conformal variant with heteroscedastic data produces under-covered prediction intervals,
      causing actual outcomes to fall outside the stated confidence range more frequently than advertised, leading to incorrect
      risk assessments and potential financial losses
    derived_from_bd_id: BD-166
  - id: finance-C-369
    when: When applying MinT reconciliation for hierarchical forecast aggregation
    action: Apply shrinkage estimators or ridge regularization to the S'S matrix before computing the inverse; verify matrix
      condition number before reconciliation to avoid numerical instability from highly correlated series
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without regularization, the OLS projection matrix inverse becomes numerically unstable when series are highly
      correlated or S'S approaches singularity, causing inflated reconciliation weights and distorted hierarchical forecasts
      that diverge significantly from base predictions
    derived_from_bd_id: BD-165
  - id: finance-C-370
    when: When generating lagged features for RegressionModel with covariates
    action: Validate covariate temporal availability at fit time by checking that past_covariates are actually available at
      prediction time; enforce runtime validation that future covariate values are not required for lagged features
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Misclassifying future-available covariates as past_covariates produces look-ahead features at prediction
      time that don't exist, causing silent prediction failures when future covariate values are not provided while training
      shows misleadingly good metrics
    derived_from_bd_id: BD-168
  - id: finance-C-371
    when: When configuring anomaly detection scoring using windowed scorers
    action: Use windowed per-component modeling for contextual anomaly detection; each component requires its own windowed
      model to capture local temporal context patterns rather than global scoring
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-windowed or global anomaly scoring ignores temporal locality of contextual anomalies, causing anomalies
      to be misclassified as normal or vice versa, leading to unreliable anomaly detection results
    derived_from_bd_id: BD-037
  - id: finance-C-372
    when: When implementing anomaly detection using FilteringAnomalyModel
    action: Use filter output as the prediction baseline for anomaly detection — anomalies must be defined as deviation from
      filter-generated expected values, not raw model predictions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrectly using raw predictions as baseline causes miscalibrated anomaly scores; the FilteringAnomalyModel
      architecture expects anomaly = deviation from filter output
    derived_from_bd_id: BD-041
  - id: finance-C-373
    when: When computing metrics for time series evaluation
    action: Use component_reduction and series_reduction parameters for metric aggregation — configure reduction functions
      for fine-grained component-wise and series-wise evaluation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using fixed mean reduction prevents customizable aggregation across components and series, losing the ability
      to evaluate metrics at different granularity levels
    derived_from_bd_id: BD-042
  - id: finance-C-374
    when: When initializing SHAP explainer for time series model explainability
    action: Provide background series parameter during SHAP explainer initialization — background distribution is mandatory
      for expected value (base value) computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting background series causes SHAP expected value computation to fail; without a defined background distribution,
      feature attribution values cannot be calculated correctly
    derived_from_bd_id: BD-045
  - id: finance-C-375
    when: When creating forecasting model instances that require cloning or serialization
    action: Capture each __init__ parameters at model creation time and store in cls._model_call — parameters must be captured
      at creation, not deferred to fit time
    severity: high
    kind: domain_rule
    modality: must
    consequence: Capturing parameters at fit time instead of creation time breaks model cloning and serialization workflows,
      causing reproducibility failures when transferring models between sessions
    derived_from_bd_id: BD-152
  - id: finance-C-376
    when: When implementing uncertainty quantification calibration for forecasting models
    action: Use residuals between predictions and actuals as the calibration signal — conformal prediction requires residual-based
      interval estimation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing residual-based calibration with alternative approaches breaks the distribution-free conformal prediction
      guarantee, producing statistically incorrect coverage intervals
    derived_from_bd_id: BD-023
  - id: finance-C-378
    when: When applying MinMaxScaler per-component to multivariate series in financial applications
    action: Verify that per-component scaling preserves meaningful relationships for your use case, or use global scaling
      for heterogeneous components (e.g., price and volume in the same series)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Financial series with heterogeneous dimensions (price vs volume) suffer magnitude distortion when scaled
      per-component; DTW-based strategies and anomaly detection will produce misleading results based on distorted feature
      relationships
    derived_from_bd_id: BD-169
  - id: finance-C-379
    when: When using transition matrices in Markov chain models
    action: Assume transition matrices are time-homogeneous without explicit validation — transition matrices may vary over
      time in real financial regimes
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming time-homogeneous transition matrices without validation causes incorrect state transition probabilities,
      leading to unreliable Markov chain predictions in non-stationary market regimes
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-380
    when: When implementing Markov chain transition matrix estimation
    action: Validate transition matrix time-homogeneity using statistical tests (e.g., Chi-square test for stationarity across
      time windows) and document whether homogeneity assumption holds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without time-homogeneity validation, non-stationary transition matrices produce incorrect probability estimates,
      causing Markov chain models to fail when market regimes shift
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-381
    when: When implementing iterative models (EM algorithm, Baum-Welch, gradient descent optimization)
    action: Assume models converge without explicit convergence monitoring — iterative models may converge to wrong solutions
      or fail to converge
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit convergence parameters (tolerance, max_iter, convergence check), iterative models may run
      indefinitely or stop prematurely, producing unreliable parameter estimates
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-382
    when: When implementing iterative optimization models
    action: 'Add explicit convergence parameters: tolerance (e.g., 1e-6), max_iter (e.g., 1000), and convergence_status flag;
      implement early stopping with logging when convergence fails'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing convergence parameters causes silent non-convergence or infinite loops in production, leading to
      timeout failures or inaccurate model parameters without warning
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-383
    when: When creating TimeSeries objects with irregular time intervals
    action: Provide explicit freq parameter when TimeSeries has irregular time intervals — automatic frequency inference will
      fail or produce incorrect frequency for irregular series
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit freq parameter for irregular series, frequency-based operations (resampling, lagged features)
      produce misaligned data or incorrect results, breaking time-dependent strategy logic
    derived_from_bd_id: BD-057
  - id: finance-C-384
    when: When implementing or refactoring TimeSeries static covariate handling
    action: Store static covariates as pd.DataFrame with categorical dtype — do not replace with dict, separate arrays, or
      other structures; models expecting DataFrame access will break
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing DataFrame storage with dict or separate arrays breaks models relying on DataFrame operations for
      static covariates, causing AttributeError or incorrect covariate access in hierarchical models
    derived_from_bd_id: BD-060
  - id: finance-C-385
    when: When implementing or refactoring TimeSeries hierarchy structure
    action: Store hierarchy as dict mapping component names to parent aggregations — do not replace with nested structures,
      lists, or other formats; reconciliation transformers expect dict O(1) lookup
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing dict hierarchy with nested or flat structures breaks O(1) hierarchy lookup in reconciliation, causing
      performance degradation and incorrect bottom-up/top-down aggregation in hierarchical models
    derived_from_bd_id: BD-061
  - id: finance-C-386
    when: When implementing or modifying data transformation operations in backtesting
    action: Change the copy=False parameter in transformer internal operations — transformers must maintain the copy=False
      contract to verify time series immutability and external reference validity
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Changing copy=False to copy=True doubles memory usage for large time series operations, causing potential
      out-of-memory errors and significantly degrading backtest performance for high-frequency or large datasets
    derived_from_bd_id: BD-082
  - id: finance-C-387
    when: When implementing hierarchical forecast reconciliation logic
    action: Switch the reconciliator from BottomUp aggregation to TopDown or Optimal methods — BottomUp ensures parent forecasts
      equal the mathematical sum of children forecasts, maintaining hierarchical consistency
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using TopDown or Optimal reconciliators breaks the fundamental hierarchical consistency property where parent
      = sum(children), causing forecast aggregation errors that compound through the hierarchy
    derived_from_bd_id: BD-083
  - id: finance-C-388
    when: When processing time series with missing values for model training
    action: Remove the min_gap_size parameter or hardcode a fixed threshold in extract_subseries — min_gap_size must remain
      configurable to properly split discontinuous segments and prevent gap corruption of continuous models
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Hardcoding or removing min_gap_size either fragments valid continuous series with too-small thresholds or
      corrupts models with discontinuous data when threshold is too large, degrading forecast accuracy
    derived_from_bd_id: BD-087
  - id: finance-C-389
    when: When implementing or configuring DTW alignment with Itakura parallelogram window
    action: Remove the max_slope parameter or hardcode it to extreme values in Itakura parallelogram — max_slope controls
      slope deviation from 45 degrees and must remain tunable to prevent excessive compression or expansion in alignment
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Removing slope constraints or using extreme values allows alignment compression/expansion extremes, causing
      misaligned time series that distort similarity measurements and degrade pattern matching accuracy
    derived_from_bd_id: BD-092
  - id: finance-C-390
    when: When implementing multivariate anomaly detection aggregation
    action: Replace OR logic with AND logic or voting mechanisms in the anomaly score aggregator — OR logic ensures maximum
      sensitivity (recall) by flagging anomalies when any detector identifies them, which is critical when missing anomalies
      is costly
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Switching to AND or voting reduces anomaly detection recall, causing true anomalies to be missed when only
      one detector flags them, leading to undetected risk events and potential financial losses in live trading
    derived_from_bd_id: BD-096
  - id: finance-C-391
    when: When implementing or refactoring ConformalPrediction calibration logic
    action: Use calibration_series parameter to compute nonconformity scores on held-out data — do not use training or test
      data for calibration to prevent information leakage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper calibration_series separation, prediction intervals achieve incorrect coverage, causing systematic
      under or over-confidence in forecast uncertainty estimates and potentially poor risk management decisions
    derived_from_bd_id: BD-100
  - id: finance-C-392
    when: When implementing metric computation functions for time series evaluation
    action: Support both deterministic (single-value) and stochastic (multi-sample) TimeSeries inputs — apply sample aggregation
      for stochastic series to produce unified metric outputs
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Dropping stochastic series support breaks evaluation for probabilistic forecasting models, causing metric
      computation failures when comparing probabilistic and point forecast approaches
    derived_from_bd_id: BD-101
  - id: finance-C-393
    when: When implementing or modifying MAPE metric calculation in the evaluation module
    action: 'Use symmetric MAPE formula: 2*|actual-pred|/(|actual|+|pred|) — maintain this exact formulation to handle near-zero
      values without division errors and verify fair penalization of over and under-predictions'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching to asymmetric standard MAPE causes division errors near zero and biased model selection that systematically
      favors over-predicting models, leading to suboptimal trading strategy choices
    derived_from_bd_id: BD-102
  - id: finance-C-394
    when: When implementing dataset loading and caching infrastructure
    action: Include DatasetLoaderMetadata with uri, hash, and format specifications for each dataset — use hash for cache
      validation and format for parsing configuration
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without metadata structure, dataset caching becomes unreliable and reproducibility is lost; repeated downloads
      occur for unchanged datasets and data integrity cannot be verified
    derived_from_bd_id: BD-105
  - id: finance-C-395
    when: When defining or modifying monthly time series dataset specifications
    action: Use header_time='Month' with format_time='%Y-%m' for monthly datasets — this ISO-style format ensures unambiguous
      parsing independent of locale settings
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using locale-specific or inconsistent date formats causes monthly dataset parsing failures or incorrect date
      interpretation on systems with different regional settings
    derived_from_bd_id: BD-107
  - id: finance-C-396
    when: When implementing or replacing distance calculations in time series comparison
    action: Maintain L1 norm (absolute difference) as the default distance metric for univariate series and sum of L1 for
      multivariate series — verify outlier robustness is preserved in any refactoring
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching to L2 (Euclidean) distance without explicit consideration introduces quadratic sensitivity to outliers,
      causing distance-based methods to over-weight extreme values and produce incorrect similarity measurements for noisy
      financial time series
    derived_from_bd_id: BD-123
  - id: finance-C-397
    when: When processing static covariates before feeding into forecasting models
    action: Use MinMaxScaler for numerical static covariates and OrdinalEncoder for categorical static covariates — do not
      apply one-hot encoding without explicit justification as it causes dimensionality explosion for high-cardinality categorical
      features
    severity: high
    kind: domain_rule
    modality: must
    consequence: One-hot encoding categorical static covariates with high cardinality (e.g., industry codes, country identifiers)
      dramatically increases feature dimensionality, causing memory overflow and training degradation in large-scale backtesting
      scenarios
    derived_from_bd_id: BD-131
  - id: finance-C-398
    when: When implementing monetary calculations and data storage in backtesting
    action: Assume the framework annotates currency and unit for each monetary values implicitly — currency/unit metadata
      is absent and must be explicitly provided
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit currency/unit annotations, cross-currency calculations produce incorrect results (e.g.,
      USD and CNY amounts added together), leading to systematic mispricing in portfolio valuations that accumulate silently
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-399
    when: When implementing monetary calculations or data storage
    action: 'Add explicit currency field (e.g., ''currency'': ''CNY'' or ''USD'') and unit field to each monetary value parameters;
      validate matching currencies before arithmetic operations across different values'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Cross-currency operations without validation cause portfolio P&L to be calculated incorrectly, with losses
      accumulating silently until discovered in audit review
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-400
    when: When implementing market order execution logic in backtesting
    action: Assume market orders are filled instantly at the exact quoted price without any fill assumption modeling — the
      framework does not implement fill assumptions for market orders
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Treating market orders as instantaneous perfect fills ignores liquidity constraints and partial fill scenarios,
      causing backtests to overstate returns for large order sizes in illiquid markets
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-401
    when: When executing market orders in backtesting
    action: Implement fill assumption logic by checking available_volume against order_size; if order_size exceeds available_volume,
      apply partial fill percentage and reject or queue remaining volume; add slippage_model parameter for price impact estimation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without fill assumption modeling, large market orders assume full execution at expected prices when actual
      fills experience partial fills or price impact, causing live P&L to diverge significantly from backtested results
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-402
    when: When implementing multi-provider data source configuration
    action: Assume a single credential set works uniformly across each providers without priority ranking or isolation — the
      framework does not implement provider priority or credential isolation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using undifferentiated credentials across providers without priority ranking causes auth failures when providers
      have different key formats or rate limits, leading to cascading operation failures
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-403
    when: When configuring multiple data providers
    action: Implement provider priority configuration with ordered fallback list (e.g., primary_provider, backup_provider);
      each provider must have isolated credential storage with separate keys and namespaces; implement fail-over logic to
      next provider when primary fails authentication
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without provider isolation and priority ranking, credential rotation or revocation affects all providers
      simultaneously, causing cascading service failures across all connected data sources
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-404
    when: When implementing trade authorization logic
    action: Assume single-agent approval is sufficient for trade execution without multi-agent consensus or independent risk
      verification — the framework does not implement multi-agent consensus or risk veto
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Single-agent authorization creates a single point of failure where a compromised or erroneous agent can execute
      unauthorized large trades, amplifying losses without any independent check or veto
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-405
    when: When implementing trade authorization and risk management
    action: Implement multi-agent consensus requiring at least 2 independent agents to approve high-value trades (define threshold,
      e.g., notional > $100,000); risk veto agent must independently verify position limits and exposure before execution;
      dissenting votes trigger alert and block execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without multi-agent consensus and risk veto, runaway or compromised agents can execute large directional
      trades causing catastrophic losses that independent risk review could have prevented
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-406
    when: When implementing transaction status management
    action: Assume the framework maintains mutable state for transaction status without append-only logging — the framework
      does not implement immutable transformation logs for data lineage
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Mutable status fields without append-only logs allow transaction status to be retroactively modified, destroying
      audit trail integrity and enabling fraud or accidental data tampering to go undetected
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-407
    when: When implementing transaction status tracking
    action: Implement append-only transformation log for each status changes; each status update must create a new immutable
      log entry containing timestamp, previous_status, new_status, and actor_id; verify log entries are write-once and cannot
      be updated or deleted
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without immutable transformation logs, regulatory audits cannot verify transaction lineage, potentially resulting
      in compliance violations, failed audits, and regulatory penalties
    derived_from_bd_id: BD-GAP-014
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
