anti_patterns:
- id: AP-TIME-SERIES-ML-001
  title: TimeSeries values array dimensionality mismatch
  description: When constructing a TimeSeries with a values array that is not expanded to exactly 3 dimensions (time×component×sample),
    downstream model operations expecting the standard 3D shape will fail with dimension mismatches. This causes all downstream
    models to receive incorrectly formatted data tensors, leading to complete pipeline failure or silent data corruption.
  project_source: finance-bp-102--Darts
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-002
  title: Non-floating-point dtype in TimeSeries values
  description: When setting TimeSeries values dtype to integer or non-floating-point types, numerical operations produce incorrect
    results during financial calculations. Financial forecasts require float64 or float32 precision to handle decimal computations
    accurately; integer dtypes truncate precision and cause accumulation of rounding errors that compound across time steps.
  project_source: finance-bp-102--Darts
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-003
  title: Irregular or non-monotonic time index
  description: When TimeSeries time index is not strictly monotonically increasing with a well-defined frequency and no gaps,
    downstream models produce incorrect forecasts due to temporal misalignment. Gap detection methods fail, and any temporal
    aggregation or differencing operations will produce meaningless results.
  project_source: finance-bp-102--Darts
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-004
  title: Time index and values length mismatch at construction
  description: When the time index length does not equal the values array first dimension length, TimeSeries construction
    fails with ValueError at construction time, preventing any data from being loaded into the system. This typically occurs
    when importing data from CSV or DataFrame sources where column alignment assumptions are incorrect.
  project_source: finance-bp-102--Darts
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-005
  title: Missing abstract method implementations in ForecastingModel subclasses
  description: When implementing ForecastingModel subclasses without implementing all required abstract methods (fit, predict,
    min_train_samples, _target_window_lengths, extreme_lags, supports_multivariate, supports_transferable_series_prediction),
    Python's ABC abstractmethod enforcement causes TypeError at instantiation time, preventing any model from being created.
  project_source: finance-bp-102--Darts
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-006
  title: fit() method not returning self for chaining
  description: When fit() method does not return self for method chaining, the fluent interface pattern expected by users
    breaks at lines 209, 2932, and 3069 where chaining is attempted. Users encounter AttributeError when trying to chain operations
    like model.fit(series).predict(n_periods).
  project_source: finance-bp-102--Darts
  severity: medium
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-007
  title: Frequency inference failure with insufficient timesteps
  description: When using fill_missing_dates with fewer than 3 time steps, frequency inference fails with ValueError because
    at least 3 consecutive timestamps are required to determine a unique constant frequency. Irregular time series cannot
    be gap-filled without this minimum data.
  project_source: finance-bp-102--Darts
  severity: medium
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-008
  title: Look-ahead bias from random train/test splits
  description: When implementing cross-validation for financial time series using random K-fold or standard train_test_split
    without temporal ordering, future information leaks into training data. This look-ahead bias artificially inflates backtest
    performance metrics and leads to significant live trading losses when the model encounters truly unseen data.
  project_source: finance-bp-121--machine-learning-for-trading
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-009
  title: Missing purge gap contaminating validation results
  description: When using walking forward split without an embargo gap between train and test periods, overlapping outcomes
    between training and test periods contaminate validation results. Without purge gap, seemingly good backtest results do
    not generalize to live performance due to information leakage across the split boundary.
  project_source: finance-bp-121--machine-learning-for-trading
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-010
  title: Hardcoded credentials in source code
  description: When scraping content from websites requiring authentication by hardcoding credentials in source code files,
    exposed credentials lead to unauthorized access, potential account termination, and security breaches. Credentials should
    be loaded from environment variables or secure configuration files, never committed to version control.
  project_source: finance-bp-121--machine-learning-for-trading
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-011
  title: TA-Lib infinite values causing ML model failures
  description: When computing technical indicators using TA-Lib (RSI, MACD, ATR) without handling edge cases, division-by-zero
    produces infinite values that corrupt the feature DataFrame. Gradient-based ML models (neural networks) cannot process
    infinite values, causing training to fail or produce NaN gradients.
  project_source: finance-bp-121--machine-learning-for-trading
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-012
  title: MultiIndex structure lost during feature engineering
  description: When flattening or renaming the (ticker, date) MultiIndex during feature engineering for multi-ticker trading,
    downstream stages (prediction_modeling, backtesting) fail because they expect MultiIndex for proper temporal train/test
    splits. Data corruption occurs silently when multi-ticker data is treated as single-ticker.
  project_source: finance-bp-121--machine-learning-for-trading
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-013
  title: Missing TA-Lib C library dependency
  description: When installing TA-Lib via pip install ta-lib alone without compiling the underlying C library, import fails
    because the Python package is merely a wrapper around compiled native code. This causes immediate runtime failure for
    any code attempting to import talib for technical indicator computation.
  project_source: finance-bp-121--machine-learning-for-trading
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-014
  title: Trading calendar minutes_per_day mismatch
  description: When configuring extended-hours trading calendar with incorrect minutes_per_day (e.g., using 960 for extended
    hours instead of 1600), minute bar alignment with the calendar fails. Backtest prices do not correspond to actual trading
    times, producing meaningless results that don't reflect real market microstructure.
  project_source: finance-bp-121--machine-learning-for-trading
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
- id: AP-TIME-SERIES-ML-015
  title: Zipline bundle ingest function signature mismatch
  description: When implementing Zipline bundle ingest function with incorrect parameter count or order, Zipline fails with
    TypeError during bundle ingest because the ingestion pipeline expects exactly 9 parameters in a specific order. Backtesting
    cannot run at all when bundle ingestion fails, blocking all downstream work.
  project_source: finance-bp-121--machine-learning-for-trading
  severity: high
  applicable_to_tags:
    markets:
    - multi-market
    activities:
    - time-series-ml
  _source_file: anti-patterns/time-series-ml.yaml
cross_project_wisdom:
- wisdom_id: CW-TIME-SERIES-ML-001
  source_project: finance-bp-102--Darts
  pattern_name: 3D TimeSeries dimensionality invariant
  description: Always expand TimeSeries values to exactly 3 dimensions (n_timesteps, n_components, n_samples) regardless of
    input format. This invariant enables uniform downstream processing regardless of whether the data is univariate (1 component),
    single-sample, or multivariate probabilistic series with multiple samples.
  applicable_to_activity: time-series-ml
  _source_file: cross-project-wisdom/time-series-ml.yaml
- wisdom_id: CW-TIME-SERIES-ML-002
  source_project: finance-bp-102--Darts
  pattern_name: Strict time index validation
  description: 'Validate time index at construction: must be strictly monotonically increasing, have a well-defined frequency,
    no holes by default, and length must match values first dimension. This prevents silent data corruption in all downstream
    temporal operations.'
  applicable_to_activity: time-series-ml
  _source_file: cross-project-wisdom/time-series-ml.yaml
- wisdom_id: CW-TIME-SERIES-ML-003
  source_project: finance-bp-121--machine-learning-for-trading
  pattern_name: MultiIndex preservation in multi-ticker pipelines
  description: Maintain (ticker, date) MultiIndex structure throughout the entire feature engineering and prediction pipeline
    for multi-ticker trading systems. Downstream stages depend on this structure for proper temporal train/test splits that
    respect per-ticker time boundaries.
  applicable_to_activity: time-series-ml
  _source_file: cross-project-wisdom/time-series-ml.yaml
- wisdom_id: CW-TIME-SERIES-ML-004
  source_project: finance-bp-121--machine-learning-for-trading
  pattern_name: Purged walking forward cross-validation
  description: Use purged walking forward split with embargo gap for financial time series validation. Random splits cause
    look-ahead bias, while splits without purge gaps contaminate results with overlapping outcomes. The purge gap prevents
    information leakage across train/test boundaries.
  applicable_to_activity: time-series-ml
  _source_file: cross-project-wisdom/time-series-ml.yaml
- wisdom_id: CW-TIME-SERIES-ML-005
  source_project: finance-bp-121--machine-learning-for-trading
  pattern_name: TA-Lib edge case sanitization
  description: Always replace infinite values with NaN and call dropna before ML model training when using TA-Lib technical
    indicators. RSI, MACD, ATR and other indicators produce inf values during division-by-zero edge cases, which corrupt gradient-based
    model training.
  applicable_to_activity: time-series-ml
  _source_file: cross-project-wisdom/time-series-ml.yaml
- wisdom_id: CW-TIME-SERIES-ML-006
  source_project: finance-bp-102--Darts
  pattern_name: Fluent forecasting model interface
  description: Implement fit() returning self and predict() on ForecastingModel subclasses to support method chaining. This
    fluent interface pattern is expected by users for idiomatic usage like model.fit(series).predict(n_periods).
  applicable_to_activity: time-series-ml
  _source_file: cross-project-wisdom/time-series-ml.yaml
- wisdom_id: CW-TIME-SERIES-ML-007
  source_project: finance-bp-121--machine-learning-for-trading
  pattern_name: Zipline bundle signature contract
  description: 'When implementing Zipline bundle ingest functions, the function must accept exactly 9 parameters in the specified
    order: environ, asset_db_writer, minute_bar_writer, daily_bar_writer, adjustment_writer, calendar, start_session, end_session,
    cache. This contract is enforced by Zipline''s ingestion pipeline.'
  applicable_to_activity: time-series-ml
  _source_file: cross-project-wisdom/time-series-ml.yaml
- wisdom_id: CW-TIME-SERIES-ML-008
  source_project: finance-bp-121--machine-learning-for-trading
  pattern_name: Calendar minutes_per_day alignment
  description: When configuring trading calendars for backtesting, set minutes_per_day to match the total trading minutes
    including extended hours (960 for regular NYSE, 1600 for extended hours starting 4:00 AM). This ensures minute bar alignment
    with actual trading times in the backtest.
  applicable_to_activity: time-series-ml
  _source_file: cross-project-wisdom/time-series-ml.yaml
- wisdom_id: CW-TIME-SERIES-ML-009
  source_project: finance-bp-121--machine-learning-for-trading
  pattern_name: Deterministic series detection
  description: A TimeSeries is deterministic when n_samples equals 1, otherwise probabilistic. This distinction matters for
    methods like to_json and gaps detection which execute differently depending on whether the series contains probabilistic
    predictions or point estimates.
  applicable_to_activity: time-series-ml
  _source_file: cross-project-wisdom/time-series-ml.yaml
- wisdom_id: CW-TIME-SERIES-ML-010
  source_project: finance-bp-102--Darts
  pattern_name: Minimum training sample enforcement
  description: Enforce min_train_series_length at fit time to prevent underfitting with insufficient historical data. Models
    should raise ValueError with clear messaging when training series length is below the model's minimum requirement, preventing
    silent poor forecasts.
  applicable_to_activity: time-series-ml
  _source_file: cross-project-wisdom/time-series-ml.yaml
