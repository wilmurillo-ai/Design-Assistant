resources:
  packages:
  - name: pandas
    version_pin: ==1.5.3
  - name: numpy
    version_pin: ==1.24.4
  - name: matplotlib
    version_pin: '>=2'
  - name: requests
    version_pin: ==2.31.0
  - name: scipy
    version_pin: '>=1.3.0'
  - name: scikit-learn
    version_pin: '>1.4.2'
  - name: pytest
    version_pin: '>=8.3'
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When importing CSV portfolio files with special characters
    action: use 'utf-8-sig' encoding to handle BOM markers in CSV files
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: CSV files with UTF-8 BOM markers will fail to parse correctly, causing KeyError exceptions when reading row
      fields and preventing portfolio data from loading
    stage_ids:
    - data_import
  - id: finance-C-002
    when: When parsing date fields from CSV input files
    action: use the exact date format '%d/%m/%Y' for each date parsing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Date fields with inconsistent format will raise ValueError during parsing, causing the entire model run to
      fail at data import stage
    stage_ids:
    - data_import
  - id: finance-C-003
    when: When reading EIOPA parameter and curve files
    action: use CSV files with columns matching pattern '{country}_Maturities' and '{country}_Values'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Column selection using non-existent country columns will raise KeyError, causing the Smith-Wilson calibration
      to fail with no risk-free curve data
    stage_ids:
    - data_import
  - id: finance-C-004
    when: When configuring portfolio data in ALM.ini
    action: 'include each required INI sections: [TRACE], [LOGGING], [INTERMEDIATE], [INPUT]'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing INI sections will cause KeyError exceptions, preventing configuration from loading and halting all
      downstream calculations
    stage_ids:
    - data_import
  - id: finance-C-005
    when: When defining portfolio CSV columns
    action: include each required column names matching the expected field access in ImportData.py
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing CSV columns will cause KeyError exceptions when ImportData.py attempts row['column_name'] access,
      preventing portfolio loading
    stage_ids:
    - data_import
  - id: finance-C-007
    when: When validating bond portfolio data after CSV import
    action: verify Asset_ID is greater than 0, coupon_rate and recovery_rate are between 0 and 1, and maturity_date is after
      issue_date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid bond parameters will cause CorpBond.__post_init__ to raise ValueError, stopping the model with uncaught
      exceptions in production
    stage_ids:
    - data_import
  - id: finance-C-009
    when: When loading EIOPA parameter files with Smith-Wilson calibration data
    action: verify the Param_no_VA.csv file contains rows 0-5 for extra parameters (Coupon_freq, LLP, Convergence, UFR, alpha,
      CRA)
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Missing parameter rows will cause index errors when extra_param = param_raw.loc[:, country + '_Values'].iloc[:6]
      is accessed
    stage_ids:
    - data_import
  - id: finance-C-012
    when: When loading the ALM.ini configuration file
    action: provide a valid INI file path that exists and is readable
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Missing or unreadable INI file will cause configparser.ParseError or FileNotFoundError, preventing any model
      execution
    stage_ids:
    - data_import
  - id: finance-C-013
    when: When importing EIOPA curve data for a specific country
    action: verify the country name exactly matches a column header in Curves_no_VA.csv
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Mismatched country name causes KeyError when selecting curve_country = curve_raw.loc[:, country], halting
      risk-free rate construction
    stage_ids:
    - data_import
  - id: finance-C-014
    when: When loading Settings from Parameters.csv
    action: 'verify the Parameters.csv file contains each required parameters: EIOPA_param_file, EIOPA_curves_file, country,
      run_type, n_proj_years, Precision, Tau, compounding, Modelling_Date'
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Missing parameters cause KeyError when read_dict[row['Parameter']] is accessed, stopping the entire model
      initialization
    stage_ids:
    - data_import
  - id: finance-C-015
    when: When initializing Settings object with n_proj_years
    action: convert n_proj_years to integer using int() before passing to Settings constructor
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Float n_proj_years causes TypeError in relativedelta(years=) which requires integer, causing model initialization
      failure
    stage_ids:
    - data_import
  - id: finance-C-023
    when: When implementing the Smith-Wilson algorithm
    action: Use EIOPA technical specification paragraphs for each formula implementations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-EIOPA compliant formulas will fail regulatory audits for Solvency II insurance liability calculations
      and produce incorrect risk-free rates
    stage_ids:
    - curve_construction
  - id: finance-C-024
    when: When calculating the convergence point T
    action: Use max(U + 40, 60) years as the convergence point per EIOPA paragraph 120
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using a non-compliant convergence point will produce incorrect extrapolated rates and violate EIOPA Solvency
      II specifications
    stage_ids:
    - curve_construction
  - id: finance-C-026
    when: When retrieving discount factors
    action: Return discount factors that strictly decrease with increasing maturity
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-decreasing discount factors violate time value of money principles, causing all downstream asset and
      liability valuations to be incorrect
    stage_ids:
    - curve_construction
  - id: finance-C-030
    when: When calling the curve construction workflow
    action: Execute SetObservedTermStructure before CalcFwdRates
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Calling CalcFwdRates without first setting observations will use empty DataFrames, producing all NaN forward
      rates and corrupting all downstream calculations
    stage_ids:
    - curve_construction
