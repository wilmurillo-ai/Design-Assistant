    modality: must
    consequence: Changing UFR values without validating against long-duration pension liabilities causes 30-40% present value
      errors in tail extrapolation region; EIOPA annual UFR updates directly impact BEL/SCR calculations for non-compliant
      regulatory reports
    derived_from_bd_id: BD-101
  - id: finance-C-239
    when: When configuring projection horizon (BD-060) and time steps (BD-020, BD-068) for bond pricing operations
    action: Verify proj_step values remain within the calibrated range required by RetrieveRates; validate time step configuration
      against calibration bounds before executing price_bond_portfolio
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Out-of-range proj_step causes IndexError in RetrieveRates, cascading into price_bond_portfolio failure; this
      blocks BD-029 output generation and halts automated regulatory reporting in production environment
    derived_from_bd_id: BD-102
  - id: finance-C-255
    when: When implementing rate extrapolation beyond observed data in CurvesClass
    action: 'Use Wilson formula with UFR convergence: p = exp(-log(1+UFR)*m_target) + diag*HQb, where m_target >= max observed
      maturity to verify extrapolation occurs only beyond data range'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using incorrect extrapolation formula violates EIOPA regulatory requirements for Solvency II SCR calculations;
      non-converging rates cause systematic mispricing of long-term insurance liabilities
    derived_from_bd_id: BD-075
  - id: finance-C-256
    when: When implementing Smith-Wilson curve calibration in CurvesClass
    action: Set convergence point T = max(UFR_maturity + 40, 60) years — this defines when extrapolated rates reach UFR and
      ensures regulatory compliance with EIOPA 40-year spread specification
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect convergence point causes extrapolated rates to deviate from UFR at wrong maturities, violating
      Solvency II technical provisions requirements and causing incorrect SCR calculations
    derived_from_bd_id: BD-076
  regular:
  - id: finance-C-006
    when: When loading CSV files with pandas or csv module
    action: use comma as the separator (sep=',') for each CSV file reads
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect separator will cause misalignment between columns and data, leading to corrupted portfolio objects
      with wrong field values
    stage_ids:
    - data_import
  - id: finance-C-008
    when: When configuring the logging level in ALM.ini
    action: 'use only valid logging level values: DEBUG, INFO, WARNING, ERROR, or CRITICAL'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid logging level will cause ValueError in get_logging_level function, preventing proper log output for
      troubleshooting
    stage_ids:
    - data_import
  - id: finance-C-010
    when: When setting n_proj_years for projection horizon
    action: set n_proj_years to zero or negative value
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Zero projection years produces no forward projection, resulting in empty time series and misleading results
      showing zero-length balance sheet evolution
    stage_ids:
    - data_import
  - id: finance-C-011
    when: When running the OSEM model on different operating systems
    action: verify ALM.ini and CSV file paths use OS-compatible path separators
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Hardcoded Windows paths will fail on Linux/Mac systems and vice versa, causing FileNotFoundError for all
      input files
    stage_ids:
    - data_import
  - id: finance-C-016
    when: When executing data_import stage in the model pipeline
    action: load Configuration before loading Settings and load Settings before loading any portfolio data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect loading order causes NameError or FileNotFoundError because portfolio file paths depend on Configuration.input_path
    stage_ids:
    - data_import
  - id: finance-C-017
    when: When configuring base_folder for file path resolution
    action: use os.getcwd() as default base_folder when [BASE] section is not present in ALM.ini
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing base_folder causes all file path resolutions to fail with incorrect relative paths, causing FileNotFoundError
      for all input files
    stage_ids:
    - data_import
  - id: finance-C-018
    when: When validating bond frequency parameter during portfolio loading
    action: convert frequency integer to Frequency enum before CorpBond constructor
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Integer frequency without enum conversion causes ValueError in CorpBond.__post_init__, rejecting valid bond
      data
    stage_ids:
    - data_import
  - id: finance-C-019
    when: When creating portfolio dictionaries from CSV imports
    action: use generator objects from get_EquityShare and get_corporate_bonds and convert to dictionaries immediately
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Generator exhaustion or improper dictionary construction causes missing portfolio positions, leading to incomplete
      balance sheet calculations
    stage_ids:
    - data_import
  - id: finance-C-020
    when: When presenting the OSEM model capabilities
    action: claim real-time market data support when each input data comes from static CSV files
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Static CSV imports with historical dates will mislead users into expecting live trading capabilities, causing
      inappropriate use in production trading
    stage_ids:
    - data_import
  - id: finance-C-021
    when: When using EIOPA curve data for interest rate projections
    action: claim that EIOPA curve data provides current real-time risk-free rates
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: EIOPA publishes quarterly curves with inherent publication delay; presenting historical EIOPA curves as current
      rates leads to incorrect risk-free rate assumptions
    stage_ids:
    - data_import
  - id: finance-C-022
    when: When configuring INI files for OSEM runs
    action: modify ALM.ini while a model run is in progress
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Concurrent INI file modification during model run causes unpredictable configuration loading behavior and
      potential data corruption
    stage_ids:
    - data_import
  - id: finance-C-025
    when: When implementing alpha calibration
    action: Verify calibrated alpha parameter is positive and less than 1.0
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative or excessive alpha causes curve instability, producing nonsensical discount factors and incorrect
      liability valuations
    stage_ids:
    - curve_construction
  - id: finance-C-027
    when: When implementing the bisection root-finding algorithm
    action: Implement a maximum iteration limit to prevent infinite loops
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without max_iter, a non-converging calibration will cause the entire ALM run to hang indefinitely, consuming
      CPU resources with no result
    stage_ids:
    - curve_construction
  - id: finance-C-028
    when: When the bisection algorithm fails to converge
    action: Use None as the alpha value for downstream calculations
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Passing None alpha to SWCalibrate will cause TypeError exceptions in matrix operations, breaking all subsequent
      pricing calculations
    stage_ids:
    - curve_construction
  - id: finance-C-029
    when: When setting up observed term structure
    action: Provide yields for every year from time 0 to the end of the modelling window
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing yields in the observation vector will cause misaligned matrix operations in SWCalibrate, producing
      incorrect calibration vectors
    stage_ids:
    - curve_construction
  - id: finance-C-031
    when: When performing alpha calibration
    action: Execute CalibrateProjected after ProjectForwardRate to verify maturities and yields are projected
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calibrating before projection will use only time-0 observed data, missing all forward curve dynamics needed
      for ALM projections
    stage_ids:
    - curve_construction
  - id: finance-C-032
    when: When accessing yield curve data externally
    action: Use RetrieveRates method as the sole interface for obtaining yields, discount factors, or capitalisation factors
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Direct access to internal properties like r_obs or alpha bypasses the SWExtrapolate calculation, returning
      uncalibrated values and breaking pricing consistency
    stage_ids:
    - curve_construction
  - id: finance-C-033
    when: When performing matrix inversion for calibration
    action: Allow singular or near-singular H matrix to pass without raising error
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Ill-conditioned Wilson function matrix produces unstable calibration vector b, causing wildly oscillating
      extrapolated rates and incorrect valuations
    stage_ids:
    - curve_construction
  - id: finance-C-034
    when: When configuring calibration precision
    action: Set precision to at least 1E-10 to verify regulatory-quality calibration
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient precision (e.g., 1E-3) will produce alpha values that do not meet tau tolerance, violating EIOPA
      convergence requirements for Solvency II reporting
    stage_ids:
    - curve_construction
  - id: finance-C-035
    when: When configuring tau tolerance parameter
    action: Use tau=0.0001 (10 basis points) as the maximum allowable discrepancy between UFR and extrapolated curve
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using incorrect tau will produce curves that do not meet EIOPA accuracy requirements, invalidating Solvency
      II technical provisions calculations
    stage_ids:
    - curve_construction
  - id: finance-C-036
    when: When using the Smith-Wilson calibration for Solvency II
    action: Claim the calibrated curve represents actual market prices or real-time data
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting EIOPA Smith-Wilson extrapolated rates as observed market data misrepresents the regulatory methodology
      used for liability discounting
    stage_ids:
    - curve_construction
  - id: finance-C-037
    when: When presenting forward rates to stakeholders
    action: Present projected forward rates as guaranteed future market rates
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Forward rates are model-based projections subject to model uncertainty; presenting them as predictions misleads
      stakeholders about uncertainty levels
    stage_ids:
    - curve_construction
  - id: finance-C-039
    when: When reviewing calibration results
    action: Skip validation that alpha is positive before using it in matrix operations
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Using non-positive alpha produces incorrect Wilson function values, corrupting the entire calibration and
      extrapolation process
    stage_ids:
    - curve_construction
  - id: finance-C-042
    when: When implementing terminal amount calculation for equity shares
    action: verify terminal amounts are positive scalar values based on market price
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative terminal cash flows will cause incorrect portfolio valuation and可能导致资产负债表不平衡 in actuarial calculations
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-045
    when: When implementing coupon rate validation for corporate bonds
    action: reject coupon rates outside the range [0, 1] at initialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid coupon rates will cause nonsensical coupon amounts that corrupt the entire bond cash flow schedule
      and invalidate pricing calculations
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-046
    when: When implementing notional amount validation for corporate bonds
    action: reject notional amounts that are zero or negative at initialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero or negative notional values will cause coupon and maturity cash flows to be zero or negative, corrupting
      the portfolio cash flow schedule
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-047
    when: When implementing maturity date validation for corporate bonds
    action: reject maturity dates that are before or equal to the issue date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid maturity dates will cause coupon schedules to be empty or incorrect, and terminal cash flow dates
      to be before issue dates
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-048
    when: When implementing dividend yield validation for equity shares
    action: verify dividend yield is non-negative to produce valid dividend amounts
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Negative dividend yields will produce incorrect negative dividend cash flows, misrepresenting equity income
      and corrupting portfolio returns
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-049
    when: When implementing unique dates aggregation for portfolio cash flows
    action: include each dates from modelling_date to end_date in the unique dates list
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing dates from the unique dates list will cause the cash flow DataFrame to have incomplete columns, leading
      to incorrect time-series analysis and portfolio valuations
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-050
    when: When generating dividend dates for equities
    action: use generator-based iteration to yield dates incrementally for memory efficiency
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Non-generator approach would load all dividend dates into memory simultaneously, causing performance degradation
      for large equity portfolios with many dividend events
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-051
    when: When calculating terminal value for equity shares at end_date
    action: apply Gordon growth model formulas without proper convergence criteria
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Improper Gordon model implementation will produce unrealistic terminal values or cause division-by-zero errors
      when terminal_rate equals growth_rate
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-052
    when: When calculating bond coupon amounts
    action: implement daily accrual calculations for coupon amounts
    severity: low
    kind: resource_boundary
    modality: must_not
    consequence: Daily accrual would add unnecessary computational complexity for a model designed to use scheduled coupon
      dates only, slowing down large portfolio simulations
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-053
    when: When implementing bond instrument validation
    action: freeze bond terms after initialization to prevent accidental modification
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Modification of bond terms during simulation will cause inconsistent cash flow calculations and invalidation
      of previously priced instruments
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-054
    when: When implementing cash flow generation across multiple assets
    action: aggregate individual asset cash flows through portfolio class methods before passing to downstream calculations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct access to individual asset cash flows without portfolio aggregation will cause duplicate or missing
      cash flows in the main simulation loop
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-055
    when: When implementing date fraction calculations for discount factors
    action: verify date fractions are non-negative and within expected projection period bounds
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Negative date fractions will cause incorrect discount factor calculations, leading to systematic mispricing
      of assets and liabilities
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-056
    when: When presenting terminal equity value calculations
    action: claim that terminal values equal Gordon growth model present values
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting the simplified terminal value (market price at end_date) as Gordon model results will mislead
      stakeholders about the model's assumptions and accuracy
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-057
    when: When presenting bond coupon calculations
    action: claim that coupon amounts include daily accrual adjustments
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Claiming daily accrual support when the model only calculates scheduled coupon amounts will cause incorrect
      actuarial valuations for mid-coupon valuation dates
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-059
    when: When implementing asset ID validation for corporate bonds
    action: reject asset IDs that are zero or negative at initialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid asset IDs will cause dictionary key collisions or missing entries in portfolio-level aggregation,
      corrupting portfolio-level cash flow tracking
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-060
    when: When validating frequency parameter for bonds and equities
    action: accept only predefined Frequency enum values (MONTHLY, QUARTERLY, TRIANNUAL, BIANNUAL, ANNUAL)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid frequency values will cause incorrect date interval calculations in relativedelta, generating wrong
      dividend or coupon payment schedules
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-061
    when: When validating recovery rate and default probability for bonds
    action: verify recovery rate and default probability are within [0, 1] range
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Invalid recovery or default probability values will cause incorrect expected loss calculations and misrepresent
      bond risk profiles in portfolio-level calculations
    stage_ids:
    - asset_cashflow_generation
  - id: finance-C-066
    when: When processing liability dates in the projection loop
    action: Filter liability cash flow dates to only include dates within the modelling window
    severity: high
    kind: domain_rule
    modality: must
    consequence: Liability dates before the modelling date will cause KeyError when accessing DataFrame columns, while dates
      after the end date will never be processed, leaving obligations unmet and creating false projection results
    stage_ids:
    - liability_cashflow_generation
  - id: finance-C-068
    when: When implementing multiple liability support
    action: Hardcode liability_id to a single value of 1
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Only a single liability stream can be processed; multiple insurance products or policy cohorts cannot be
      modeled, severely limiting the model's applicability to real-world insurance portfolios with diverse liability structures
    stage_ids:
    - liability_cashflow_generation
  - id: finance-C-070
    when: When removing expired liability dates from the DataFrame
    action: Assign the result of drop() back to the DataFrame variable
    severity: high
    kind: operational_lesson
    modality: must
    consequence: The drop() method returns a new DataFrame without modifying the original; expired dates will remain in the
      unique_dates list but cause KeyError when trying to drop non-existent columns, corrupting the liability cash flow tracking
    stage_ids:
    - liability_cashflow_generation
  - id: finance-C-071
    when: When running liability cash flow projections over extended periods
    action: Verify liability dates list is properly maintained during iteration
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Modifying a list while iterating over it (unique_dates.remove(expired_date) inside loop) can cause skipped
      elements or IndexError, leading to incorrect cash flow processing and inconsistent liability tracking across projection
      periods
    stage_ids:
    - liability_cashflow_generation
  - id: finance-C-072
    when: When processing liability cash flows in the main loop
    action: Apply negative sign to liability cash flows before recording in summary
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The summary report will show positive liability cash flows instead of outflows, misrepresenting the portfolio's
      liquidity requirements and potentially misleading risk management decisions
    stage_ids:
    - liability_cashflow_generation
  - id: finance-C-074
    when: When integrating liability dates with asset cash flow timeline
    action: Merge liability unique dates into the unified date list for consistent timeline alignment
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The liability obligations will not be processed at the correct time points, causing missed or delayed liability
      payments and incorrect portfolio rebalancing decisions based on incomplete cash flow information
    stage_ids:
    - liability_cashflow_generation
  - id: finance-C-075
    when: When modeling insurance or annuity products
    action: Claim the liability cash flow model handles stochastic mortality or lapse assumptions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: The current model only supports deterministic fixed cash flow schedules. Presenting it as capable of modeling
      stochastic insurance products would mislead users about the model's capabilities and lead to incorrect ALM conclusions
    stage_ids:
    - liability_cashflow_generation
  - id: finance-C-076
    when: When presenting liability cash flow projections
    action: Claim liability amounts are certain if the model uses simplified deterministic assumptions
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Real-world liabilities are subject to policyholder behavior, mortality rates, and other uncertainties. Presenting
      deterministic projections as certain values would violate actuarial principles and regulatory requirements for ALM models
    stage_ids:
    - liability_cashflow_generation
  - id: finance-C-079
    when: When calibrating z-spread using bisection_spread
    action: search within [-0.2, 0.2] bounds to verify converged spreads represent valid credit risk premiums
    severity: high
    kind: domain_rule
    modality: must
    consequence: Spreads outside [-0.2, 0.2] indicate calibration failure or unrealistic credit assumptions, leading to mispriced
      bonds and potential investment losses
    stage_ids:
    - pricing
  - id: finance-C-082
    when: When calibrating bond spreads with bisection
    action: use precision of 0.00000001 (1e-8) and max_iter of 100000 to verify convergence accuracy
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient precision or iteration limits cause inaccurate spread calibration, leading to bond prices that
      deviate from market prices and incorrect portfolio values
    stage_ids:
    - pricing
  - id: finance-C-083
    when: When pricing equity shares
    action: use combined spread = spread_country + spread_sector + spread_stress to enable stress testing
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Omitting spread components causes incorrect equity pricing and prevents proper stress testing scenarios,
      reducing risk management effectiveness
    stage_ids:
    - pricing
  - id: finance-C-084
    when: When calculating equity market value appreciation
    action: 'use exponential growth formula: market_price × (1+growth_rate)^t with t in years (days/365.5)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect time convention causes misaligned discount factors and prices, leading to inconsistent pricing
      across different time periods and maturities
    stage_ids:
    - pricing
  - id: finance-C-085
    when: When computing discount factors for bond pricing
    action: calculate date fractions using (cash_flow_date - modelling_date).days/365.25 for accurate time value of money
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect day count convention causes systematic pricing errors that compound over longer maturities,
      resulting in significant valuation discrepancies
    stage_ids:
    - pricing
  - id: finance-C-089
    when: When presenting backtest pricing results
    action: claim that simulated prices equal expected live trading execution prices
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest pricing as live execution proof misleads stakeholders about actual trading performance
      and violates financial modeling best practices
    stage_ids:
    - pricing
  - id: finance-C-090
    when: When extrapolating rates beyond liquid maturities
    action: claim Smith-Wilson extrapolation provides exact market prices for illiquid maturities
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Smith-Wilson extrapolation introduces model uncertainty beyond liquid maturities; presenting extrapolated
      rates as definitive values overstates model accuracy
    stage_ids:
    - pricing
  - id: finance-C-091
    when: When validating z-spread calibration results
    action: check that calibrated z-spreads fall within [-0.2, 0.2] bounds before using them for pricing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using out-of-bounds spreads causes physically unrealistic credit assumptions, producing bond prices that
      deviate significantly from market values
    stage_ids:
    - pricing
  - id: finance-C-093
    when: When implementing time fraction calculation for equity price growth
    action: Use 365.5 days as the year divisor to account for leap years in actuarial convention
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Time fractions will be slightly inaccurate if using 365 days, causing equity prices to diverge from actuarial
      expectations over multi-year projections. The model will misvalue portfolio positions by 0.14% per year on average.
    stage_ids:
    - time_loop
  - id: finance-C-096
    when: When calculating equity price growth for each time period
    action: Apply continuous growth using the formula price[t] = price[t-1] × (1+g)^time_frac with time_frac from the actuarial
      convention
    severity: high
    kind: domain_rule
    modality: must
    consequence: Equity prices will grow with incorrect discretization, causing the portfolio market value to diverge from
      expected actuarial calculations. Long-term projections will compound this error significantly.
    stage_ids:
    - time_loop
  - id: finance-C-097
    when: When executing the trade function to rebalance the portfolio
    action: Verify bank account balance is non-negative before making sell decisions (checking bank_account[current_date][0]
      < 0 condition)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: A negative bank account balance triggers the sell branch without proper validation, potentially selling assets
      when cash is merely being held for upcoming liabilities. This leads to unnecessary transaction costs and tax events.
    stage_ids:
    - time_loop
  - id: finance-C-099
    when: When setting the bond price for the current period
    action: Claim mark-to-market pricing for bonds as this is a placeholder implementation that copies previous period prices
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Bond prices are NOT repriced using the current yield curve (as TODO comment at main.py:239 indicates). This
      means interest rate risk on the bond portfolio is not captured, and reported values will not reflect current market
      conditions.
    stage_ids:
    - time_loop
  - id: finance-C-101
    when: When configuring the time step frequency for the model
    action: Use annual time steps (days_interval=365) as specified in design decisions rather than monthly steps
    severity: low
    kind: resource_boundary
    modality: should
    consequence: Monthly time steps would increase computational complexity 12x without significant accuracy improvement for
      annual reporting. The EIOPA standard uses annual reporting periods, so monthly granularity is unnecessary overhead.
    stage_ids:
    - time_loop
  - id: finance-C-103
    when: When logging summary results for each period in the main loop
    action: Record Start cash, End cash, Start market value, After growth market value, and End market value for every current_date
      in summary_df
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without proper summary logging, the simulation results cannot be audited or analyzed. Important metrics like
      portfolio return and cash flow attribution would be missing, making it impossible to validate the model's correctness.
    stage_ids:
    - time_loop
  - id: finance-C-108
    when: When verifying trading acceptance criteria
    action: Allow any asset to have negative units after trading
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Negative units represent a logical impossibility where the portfolio owes more than it owns, breaking the
      physical interpretation of the asset model
    stage_ids:
    - trading
  - id: finance-C-109
    when: When allocating new cash investments proportionally
    action: Split cash equally between equity and bond units using identical proportions
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unequal allocation breaks the constant asset allocation policy documented in the ALM design, causing inconsistent
      risk exposure across simulation periods
    stage_ids:
    - trading
  - id: finance-C-110
    when: When performing portfolio rebalancing calculations
    action: Use total market value sum including both equity and bond positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using only partial portfolio value causes incorrect percentage calculations, resulting in over-trading or
      under-trading relative to actual portfolio size
    stage_ids:
    - trading
  - id: finance-C-113
    when: When executing the trading stage in the time loop
    action: Call trade function only after processing each expired cash flows
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Trading before cash flow processing causes the model to trade on incorrect cash balances, corrupting the
      ALM simulation with timing errors
    stage_ids:
    - trading
  - id: finance-C-114
    when: When returning adjusted positions from trade function
    action: Return modified units DataFrames and updated bank_account in correct order
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect return order causes the time loop to unpack values into wrong variables, corrupting the portfolio
      state for all subsequent periods
    stage_ids:
    - trading
  - id: finance-C-115
    when: When implementing asset allocation strategy
    action: Claim equal proportional split between equity and bonds produces optimal allocation
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Equal split is a simplification documented as TODO for factor-based trading; presenting it as optimal misleads
      users about the sophistication of the ALM model
    stage_ids:
    - trading
  - id: finance-C-116
    when: When presenting trading simulation results
    action: Claim trading outcomes reflect actual market execution prices or timing
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: OSEM is a backtesting model using theoretical pricing; presenting simulation trades as real execution proof
      violates financial modeling ethics
    stage_ids:
    - trading
  - id: finance-C-117
    when: When validating trading stage implementation
    action: Skip checking that bank account after trading is zero or near-zero
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Acceptance criteria requires zero-cash policy verification; skipping this check allows trading failures to
      go undetected, compromising ALM policy compliance
    stage_ids:
    - trading
  - id: finance-C-118
    when: When implementing trading with equal equity/bond split
    action: Assume equal split is a permanent optimal solution without factor inputs
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Blueprint design_decisions explicitly marks equal split as TODO simplification; hardcoding it as permanent
      design prevents future improvements
    stage_ids:
    - trading
  - id: finance-C-119
    when: When testing trading logic
    action: 'Test boundary conditions: zero cash, zero market value, and exact 100% sell'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing boundary tests allows division-by-zero and edge cases to cause production errors, corrupting portfolio
      calculations without detection
    stage_ids:
    - trading
  - id: finance-C-120
    when: When considering adjusting trading parameters
    action: Skip adding validation that percent_to_sell is non-negative before applying
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Negative percent_to_sell causes units to increase when selling should occur, inverting the trading logic
      and corrupting portfolio state
    stage_ids:
    - trading
  - id: finance-C-123
    when: When writing CSV output
    action: Specify output encoding compatible with downstream systems (UTF-8 recommended)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Special characters in financial data (e.g., currency symbols, international names) will be corrupted, causing
      silent data loss in downstream Excel/spreadsheet imports
    stage_ids:
    - export
  - id: finance-C-125
    when: When implementing results export
    action: Use the ExportData.py save_matrices_to_csv function for consistency
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: The reusable ExportData.py function exists with proper directory creation logic but is bypassed, leading
      to inconsistent export behavior and potential maintenance issues
    stage_ids:
    - export
  - id: finance-C-126
    when: When saving simulation results
    action: Verify the output file has the exact filename 'Results.csv' as configured
    severity: high
    kind: domain_rule
    modality: must
    consequence: Downstream reporting scripts expecting 'Results.csv' will fail to find the output file, breaking automated
      analysis pipelines
    stage_ids:
    - export
  - id: finance-C-127
    when: When writing CSV with numerical financial data
    action: Allow scientific notation for very small floating-point values in cash columns
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Scientific notation like '-1.4551915228366852e-11' in cash columns represents numerical precision errors,
      not actual cash values, and will confuse downstream spreadsheet users
    stage_ids:
    - export
  - id: finance-C-128
    when: When exporting results for downstream analysis
    action: Present floating-point precision artifacts as actual financial data
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Values like '-1.4551915228366852e-11' for cash are artifacts of floating-point arithmetic, not genuine near-zero
      cash balances, and presenting them as such misrepresents the simulation
    stage_ids:
    - export
  - id: finance-C-130
    when: When validating the output file for downstream use
    action: Verify the output CSV contains the correct number of rows matching projection periods plus header
    severity: high
    kind: domain_rule
    modality: must
    consequence: If the CSV has unexpected row counts, downstream analysis will process incomplete data, leading to incorrect
      financial projections and reporting
    stage_ids:
    - export
  - id: finance-C-131
    when: When exporting results for audit or compliance purposes
    action: Claim CSV export provides data integrity verification
    severity: low
    kind: claim_boundary
    modality: must_not
    consequence: The CSV export has no checksum, hash, or digital signature, so downstream users cannot verify the file hasn't
      been modified after export
    stage_ids:
    - export
  - id: finance-C-139
    when: When passing the calibrated Curves object from curve_construction to pricing
    action: Verify the Curves object has been calibrated with CalibrateProjected() method called before pricing operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If Curves.alpha and Curves.b are not populated, RetrieveRates() will access undefined calibration vectors,
      producing NaN prices and incorrect valuations
  - id: finance-C-140
    when: When passing cash flow dictionaries from asset_cashflow_generation to pricing
    action: Verify cash flow dictionaries have date objects as keys (not strings or timestamps) matching the modelling_date
      reference
    severity: high
    kind: domain_rule
    modality: must
    consequence: BondClasses.py:226 and EquityClasses.py:238 perform (key-modelling_date).days/365.25 calculations, which
      will fail or produce incorrect results if date types are inconsistent
  - id: finance-C-141
    when: When passing cash flow dictionaries from asset_cashflow_generation to pricing
    action: Verify the Curves object passed to pricing contains projected rates for each cash flow maturities up to end_date
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: If cash flow dates extend beyond the projection horizon (n_proj_years+1), SWExtrapolate may produce unreliable
      extrapolation results from the Smith-Wilson algorithm
  - id: finance-C-142
    when: When passing unique dates and DataFrames from asset_cashflow_generation to time_loop
    action: Verify unique dates lists are sorted in ascending chronological order
    severity: high
    kind: domain_rule
    modality: must
    consequence: MainLoop.py:124-126 uses process_expired_cf which relies on sorted dates to correctly identify and remove
      expired cash flows; unsorted dates cause incorrect cash flow timing
  - id: finance-C-143
    when: When passing DataFrames to time_loop from asset_cashflow_generation
    action: Verify DataFrame row indices are asset_id values and column names are date objects matching unique_dates
    severity: high
    kind: domain_rule
    modality: must
    consequence: MainLoop.py:28-31 assigns cash flows using cash_flows[key].loc[asset_id], which requires consistent index/column
      alignment; mismatch causes KeyError or incorrect cash flows
  - id: finance-C-144
    when: When passing the Liability DataFrame from liability_cashflow_generation to time_loop
    action: Verify Liability DataFrame has liability_id as row index and cash_flow_dates as column names
    severity: high
    kind: domain_rule
    modality: must
    consequence: MainLoop.py:155 calls sum(cash_flows[expired_date]) which requires column names to be date objects; incorrect
      format causes KeyError
  - id: finance-C-145
    when: When passing price DataFrames from pricing to time_loop
    action: Verify equity and bond price DataFrames share identical row indices (asset_ids) for correct market value calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: main.py:195 calculates sum(eq_price_df[previous_date] * eq_units_df[previous_date]) which requires aligned
      indices; index mismatch causes NaN multiplication
  - id: finance-C-146
    when: When passing DataFrames from pricing to time_loop
    action: Verify column names in price DataFrames are date objects representing valid modelling periods within the modelling
      window
    severity: high
    kind: domain_rule
    modality: must
    consequence: main.py:195 uses eq_price_df[previous_date] and eq_price_df[current_date] to access price columns; string
      or timestamp column names cause KeyError
  - id: finance-C-147
    when: When passing z-spread DataFrame from pricing to time_loop
    action: Verify z-spread DataFrame has asset_id row indices matching the bond price DataFrame, and calibrated spread values
      are within reasonable range [-0.2, 0.2]
    severity: high
    kind: domain_rule
    modality: must
    consequence: BondClasses.py:533 uses bond_zspread_df.loc[asset_id].iloc[0] for pricing; mismatched indices or NaN values
      cause incorrect bond pricing or KeyError
  - id: finance-C-148
    when: When passing current units and prices from time_loop to trading
    action: Verify units and price DataFrames share the same column name (current_date) for correct valuation
    severity: high
    kind: domain_rule
    modality: must
    consequence: MainLoop.py:183 calculates total_market_value = sum(eq_units[current_date]*eq_price[current_date]); column
      name mismatch causes KeyError
  - id: finance-C-149
    when: When passing bank account balance from time_loop to trading
    action: Verify bank_account DataFrame contains the current period balance accessible via bank_account[current_date][0]
    severity: high
    kind: domain_rule
    modality: must
    consequence: MainLoop.py:191,199 access bank_account[current_date][0] for trading decisions; incorrect DataFrame structure
      causes IndexError
  - id: finance-C-150
    when: When passing adjusted units and bank balance from trading back to time_loop
    action: Verify the returned bank account balance is approximately zero (near-zero tolerance) after proportional trading
      rebalancing
    severity: high
    kind: domain_rule
    modality: must
    consequence: If bank account balance is not zero after trading, the proportional rebalancing algorithm in MainLoop.py:193-205
      has failed, indicating incorrect cash flow management
  - id: finance-C-151
    when: When passing adjusted units from trading back to time_loop
    action: Verify equity and bond units remain non-negative after proportional trading adjustments
    severity: medium
    kind: domain_rule
    modality: must
    consequence: MainLoop.py:194-195 uses (1 - percent_to_sell) multiplier which produces negative units if percent_to_sell
      > 1, violating physical constraint of negative asset holdings
  - id: finance-C-152
    when: When passing the Summary DataFrame from time_loop to export
    action: Verify the output directory path exists and is writable before saving results
    severity: high
    kind: resource_boundary
    modality: must
    consequence: main.py:271 calls summary_df.to_csv() which raises FileNotFoundError if the output directory does not exist,
      preventing results from being saved
  - id: finance-C-153
    when: When exporting summary results to CSV
    action: 'Verify Summary DataFrame has dates as row index matching the modelling periods and includes required columns:
      Start cash, End cash, Start market value, End market value, Portfolio return'
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Missing required columns cause KeyError when other analysis tools try to access summary metrics, breaking
      downstream reporting workflows
  - id: finance-C-154
    when: When calculating date fractions for discount factor computation
    action: Use day-count convention 365.25 consistently for time fraction calculations between modelling_date and cash flow
      dates
    severity: medium
    kind: domain_rule
    modality: must
    consequence: EquityClasses.py:238 and BondClasses.py:226 use .days/365.25 for discounting; using different day-count conventions
      would cause inconsistent present value calculations
  - id: finance-C-155
    when: When performing time-stepping iterations in the main loop
    action: Verify previous_date is correctly updated to current_date at the end of each iteration before the next period's
      calculations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: main.py:265 sets previous_date = current_date; if omitted, the next iteration would use stale previous_date
      causing duplicate cash flows or incorrect price calculations
  - id: finance-C-156
    when: When importing equity position data from CSV files
    action: Verify dividend_yield values are non-negative for correct dividend amount calculations
    severity: medium
    kind: domain_rule
    modality: must
    consequence: EquityClasses.py:59 calculates dividend_size = market_price * self.dividend_yield; negative yield would produce
      negative dividend cash flows, violating financial constraints
  - id: finance-C-157
    when: When passing bond coupon DataFrames to the bond pricing function
    action: Verify coupon DataFrame index matches the corporate_bonds dictionary keys for correct per-bond pricing
    severity: high
    kind: domain_rule
    modality: must
    consequence: BondClasses.py:531-534 iterates over coupon_df.index and accesses self.corporate_bonds[asset_id]; index mismatch
      causes KeyError during bond portfolio pricing
  - id: finance-C-161
    when: When representing monetary values for individual asset positions
    action: Store each monetary value as a scalar float per asset, not as arrays
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Per-unit calculations collapse to incorrect results when arrays are used instead of scalars, corrupting dividend
      amounts, coupon sizes, and terminal values across the portfolio
  - id: finance-C-163
    when: When executing the trade function at each modelling period
    action: Target a bank account balance of zero by proportionally buying or selling equity and bond units
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-zero cash holdings represent uninvested capital subject to zero return, reducing overall portfolio yield
      and violating fiduciary duty to maximize returns
  - id: finance-C-169
    when: When validating logging level input in main()
    action: Raise ValueError if logging_level is not one of DEBUG, INFO, WARNING, ERROR, CRITICAL
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid logging level causes cryptic Python logging errors, obscuring audit trail and making troubleshooting
      impossible during production runs
  - id: finance-C-170
    when: When initializing Smith-Wilson curves with EIOPA parameters
    action: Use UFR, precision, and tau parameters from the EIOPA parameter file for the specified country
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect EIOPA parameters cause wrong convergence behavior in the Smith-Wilson calibration, producing biased
      forward rates that violate EIOPA technical specifications
  - id: finance-C-171
    when: When presenting or reporting this system's projected returns to users
    action: Claim that deterministic single-path projections equal expected live trading returns — the model ignores market
      impact, financing costs, execution delays, and liquidity constraints
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users allocate capital based on inflated single-scenario returns, leading to severe portfolio underperformance
      when actual market conditions diverge from the deterministic projection assumptions
  - id: finance-C-172
    when: When presenting or reporting this system's portfolio modeling to users
    action: Claim that the model supports real-time trading execution — OSEM is a deterministic projection framework with
      no live market connectivity
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users attempt to connect OSEM to live trading systems, experiencing system failures due to absence of exchange
      APIs, order management, and execution reporting
  - id: finance-C-175
    when: When modeling equity or bond returns
    action: Use only the constant growth_rate (equities) or pre-calibrated zspread (bonds) for return projections — OSEM does
      not generate stochastic return scenarios
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing stochastic return model causes all assets to follow deterministic paths, misrepresenting portfolio
      risk distribution and return variance over the projection horizon
  - id: finance-C-177
    when: When generating the dates_of_interest vector for the simulation loop
    action: Include only dates where next_date_of_interest <= end_date to avoid off-by-one errors in the projection horizon
    severity: high
    kind: domain_rule
    modality: must
    consequence: Off-by-one errors extend or truncate the simulation window, causing cash flow mismatches and portfolio valuation
      discrepancies at the terminal date
  - id: finance-C-178
    when: When implementing or refactoring CorpBond dataclass in bond pricing modules
    action: Keep the CorpBond dataclass frozen=True to verify immutability; must_not allow modification of bond contract terms
      after instantiation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mutable bond contract terms can corrupt portfolio valuation calculations, leading to incorrect risk metrics
      and potentially catastrophic trading decisions based on wrong valuations
    derived_from_bd_id: BD-012
  - id: finance-C-179
    when: When implementing terminal value calculation in equity valuation
    action: Use market price as terminal value at modelling end_date; must_not apply Gordon growth model or perpetual yield
      for finite horizon projections
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Gordon growth model introduces terminal growth rate uncertainty that can systematically overestimate
      or underestimate equity valuations, leading to mispriced investment decisions
    derived_from_bd_id: BD-009
  - id: finance-C-180
    when: When implementing equity spread calculation for pricing and stress testing
    action: 'Decompose combined spread into additive components: country_spread + sector_spread + stress_spread; maintain
      separate stress component for scenario-based adjustments'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a single blended spread prevents granular stress testing; inability to adjust stress component independently
      breaks regulatory stress test requirements and internal risk limits
    derived_from_bd_id: BD-016
  - id: finance-C-181
    when: When implementing convergence loop logic for calibration procedures
    action: 'Enforce iteration caps: alpha calibration must terminate at 1000 iterations, bond spread calibration must terminate
      at 100000 iterations; treat hitting the cap without convergence as a model or data issue requiring investigation'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing iteration caps risks infinite loops causing service disruption; incorrect caps (e.g., using 100K
      for alpha) waste computation or fail to converge, producing inaccurate calibration results
    derived_from_bd_id: BD-038
  - id: finance-C-182
    when: When setting up projection parameters for liability-driven investment modelling
    action: Derive end_date from modelling_date plus n_proj_years; verify that end_date ensures each liability cash flows
      fall within the modelled projection period for EIOPA-compliant valuation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using a fixed or miscalculated end_date can cause cash flows to fall outside the projection period, silently
      truncating liability obligations and producing incorrect present values and SCR calculations
    derived_from_bd_id: BD-002
  - id: finance-C-183
    when: When implementing dividend and coupon date generation for equity and bond cash flows
    action: Use generator pattern yielding only future dates relative to current modelling_date; implement lazy evaluation
      to avoid memory allocation for full date arrays spanning projection horizon
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pre-computing full date arrays allocates excessive memory for long projections, potentially causing out-of-memory
      errors in large portfolios with varying dividend schedules
    derived_from_bd_id: BD-008
  - id: finance-C-184
    when: When implementing z-spread calibration for bond pricing
    action: Use bisection root-finding algorithm; verify monotonic price-spread relationship holds before applying; bisection
      guarantees convergence only when the objective function is monotonic
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying bisection without monotonicity verification risks non-convergence or incorrect calibration when
      the price-spread relationship is non-monotonic, producing systematically wrong bond valuations
    derived_from_bd_id: BD-017
  - id: finance-C-186
    when: When implementing or modifying time fraction calculations for interest accrual and discounting
    action: Use 365.5 days per year (actuarial day count convention) rather than 365 or 365.25; verify that each interest
      calculations, discount factors, and time-value computations use this convention consistently
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 365 or 365.25 instead of 365.5 introduces systematic bias in interest accrual calculations over multi-year
      horizons; 365 underestimates leap year impact while 365.25 over-corrects, leading to materially different liability
      valuations that fail regulatory audit
    derived_from_bd_id: BD-019
  - id: finance-C-187
    when: When calibrating alpha parameters in the CurvesClass module
    action: Use bisection root-finding algorithm with convergence criterion |(x_end-x_start)/2| < precision (where precision=1E-10);
      do not substitute Newton-Raphson or other iterative methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Substituting Newton-Raphson for bisection may cause non-convergence due to sensitivity to initial guesses,
      producing non-deterministic calibration results that fail regulatory audit requirements
    derived_from_bd_id: BD-072
  - id: finance-C-188
    when: When configuring time stepping for liability projection in the main loop
    action: Use annual time steps (days_interval=365) for alignment with EIOPA reporting frequency under Solvency II; if monthly
      or quarterly steps are needed, explicitly parameterize and document the deviation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Monthly stepping introduces unnecessary complexity for annual reporting models, while inconsistent time steps
      may cause misalignment with EIOPA's regulatory reporting requirements
    derived_from_bd_id: BD-020
  - id: finance-C-190
    when: When importing and processing datetime data in data_import stage
    action: Assume datetime values are timezone-aware without explicit timezone annotation; do not rely on implicit timezone
      handling
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Missing timezone explicit annotation causes datetime values to be misinterpreted across different system
      environments, leading to incorrect time calculations in multi-timezone portfolios and potential regulatory reporting
      errors
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-191
    when: When defining datetime fields in data structures during data_import stage
    action: Add explicit timezone annotation using standard library (e.g., pytz.timezone, ZoneInfo) to each datetime fields;
      store each timestamps in UTC internally and convert to local time only at the display/output layer
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit timezone handling, datetime values are processed without timezone context, causing systematic
      errors in time-based calculations across global portfolios that accumulate silently
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-193
    when: When implementing cash flow processing logic for coupon and dividend income
    action: Record coupon and dividend cash inflows as positive cash flows that increase the bank account balance, maintaining
      symmetry with outflows for cash conservation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Treating cash inflows as outflows causes systematic cash conservation violations, leading to understated
      account balances and incorrect surplus calculations that propagate through the entire projection
    derived_from_bd_id: BD-058
  - id: finance-C-194
    when: When implementing position tracking logic at period boundaries
    action: Carry equity and bond units forward between periods unchanged without automatic trading or reinvestment, maintaining
      constant position sizes for clear performance attribution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying units during carry-forward conflates price returns with trading activity, breaking performance
      attribution and potentially triggering unintended rebalancing that distorts backtest results
    derived_from_bd_id: BD-066
  - id: finance-C-195
    when: When implementing forward rate calculation logic for yield curve construction
    action: 'Use compound interest forward rate formula: fwd = ((1+r_t)^T_t)/((1+r_{t-1})^T_{t-1}) — must NOT use simple linear
      interpolation or arithmetic methods'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using linear interpolation for forward rates creates arbitrage opportunities and economically nonsensical
      rates, causing incorrect pricing of interest rate derivatives and yield curve inconsistency
    derived_from_bd_id: BD-070
  - id: finance-C-196
    when: When implementing spot rate projection logic from forward curve
    action: 'Use geometric averaging of forward rates: ((1+f1)(1+f2)...)^{1/T} - 1 — must NOT use arithmetic averaging'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Arithmetic averaging of forward rates produces implausible long-term spot rates, causing systematic overestimation
      of long-duration bond prices and incorrect liability valuations
    derived_from_bd_id: BD-071
  - id: finance-C-197
    when: When initializing liability cash flow projections at the modelling date
    action: Exclude cash flows at the valuation date from liability projections — first liability payment must be deferred
      to the next period end (end-of-period payment standard)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including cash flows at the modelling date would distort initial cash position and first-period surplus calculations,
      causing inconsistency with standard insurance valuation practices
    derived_from_bd_id: BD-053
  - id: finance-C-198
    when: When pricing bonds between coupon payment dates
    action: Assume bond prices remain constant between coupon dates — must NOT perform continuous mark-to-market or daily
      revaluation
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Implementing continuous mark-to-market between coupon dates adds unnecessary computational complexity and
      introduces valuation noise from temporary price fluctuations that don't affect fixed-coupon bond pricing
    derived_from_bd_id: BD-054
  - id: finance-C-199
    when: When projecting equity prices between valuation dates
    action: 'Project equity prices using geometric growth scaled by time fraction: price(t) = price(t-1) * (1 + initial_growth_rate)^time_fraction
      — must NOT use discrete annual growth or stochastic paths'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using discrete annual growth creates price discontinuities at year boundaries, while stochastic paths exceed
      the deterministic modelling scope and introduce randomness inconsistent with actuarial projections
    derived_from_bd_id: BD-055
  - id: finance-C-200
    when: When initializing assets for risk-adjusted pricing and regulatory reporting
    action: Assign NACE sector classification code to each assets at initialization — must NOT use ICB classification or custom
      sector schemes for Solvency II alignment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-NACE classifications breaks Solvency II alignment and regulatory reporting consistency, potentially
      causing compliance violations and sector concentration risk analysis failures
    derived_from_bd_id: BD-059
  - id: finance-C-201
    when: When configuring the projection horizon for cash flow and solvency calculations
    action: Use 50-year projection horizon aligned with Solvency II best estimate liability calculations — verify horizon
      covers long-dated insurance liabilities (typically 30+ years) before reducing
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using shorter horizons leaves long-dated liabilities unmodelled, understating solvency capital requirements
      and creating asset-liability mismatches for long-duration insurance products
    derived_from_bd_id: BD-060
  - id: finance-C-202
    when: When calibrating swap yield curves from market instruments
    action: Use bootstrap (heart) method for swap curve calibration — must NOT use parametric curve fitting (Nelson-Siegel)
      as the primary method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using Nelson-Siegel parametric fitting instead of bootstrap breaks the direct market-observable relationship,
      introducing model risk and reducing accuracy especially for long-dated swap instruments
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-203
    when: When implementing signal generation and order execution logic
    action: Assume the framework handles bar execution timing — the framework does not implement bar-level synchronization
      for signal-to-order timing; signals may be processed without proper bar alignment
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without bar execution timing control, orders may execute on stale bars or with look-ahead bias, causing backtest
      results to diverge from live trading execution
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-204
    when: When designing signal-to-order pipeline in backtesting
    action: 'Implement bar alignment validation: verify orders reference signals from prior completed bars only, not the current
      incomplete bar'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Signals processed without bar alignment may reference incomplete price data, causing execution on hypothetical
      current prices that differ from actual fills in live trading
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-205
    when: When running backtesting with parameter optimization
    action: Assume the framework provides inherent overfitting protection — the framework does not implement walk-forward
      analysis, out-of-sample testing, or cross-validation for strategy parameters
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without overfitting protection, optimized parameters may overfit to historical data, causing strategies to
      fail catastrophically when deployed live
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-206
    when: When designing backtesting methodology
    action: Implement walk-forward analysis with out-of-sample testing ratio >= 30%, or use nested walk-forward validation
      to prevent parameter overfitting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategies with overfit parameters exhibit high backtest returns but fail in live trading due to spurious
      historical correlations that do not persist
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-207
    when: When implementing portfolio optimization logic
    action: Assume the framework provides complete optimization constraint handling — the framework may not validate constraint
      consistency, feasibility, or bound satisfaction for each optimization problems
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without constraint validation, optimization may produce infeasible portfolios that violate regulatory limits,
      causing execution failures or compliance violations
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-208
    when: When implementing portfolio optimization
    action: 'Validate each optimization constraints: check weight bounds (0-100%), sector limits, position limits, and regulatory
      constraints before accepting optimization output'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Infeasible optimization outputs may violate position limits or regulatory constraints, causing execution
      rejection and unexpected portfolio composition
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-209
    when: When selecting volatility models for option pricing or risk calculations
    action: 'Explicitly document and validate volatility model selection: GARCH for time-varying volatility, local volatility
      for path-dependent options, and validate distribution assumptions (normal vs. lognormal vs. t-distribution) against
      empirical returns'
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Wrong volatility model selection causes systematic mispricing: constant volatility underprices out-of-the-money
      options during high-volatility regimes'
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-210
    when: When calculating factor IC (Information Coefficient) for factor investing
    action: Assume the framework handles IC demean and group alignment automatically — the framework does not implement cross-sectional
      demean or temporal alignment for factor IC calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without IC demean, factor IC calculations include market-wide movements, overstating true factor predictive
      power and causing spurious strategy signals
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-211
    when: When calculating factor IC for factor investing strategies
    action: 'Apply cross-sectional demean to factor values before IC calculation: subtract cross-sectional mean from each
      factor observation to remove market-wide effects, then validate IC against demeaned benchmark'
    severity: high
    kind: domain_rule
    modality: must
    consequence: IC calculated without demean includes market beta exposure, overstating factor alpha and leading to overconfident
      backtest results that fail in live trading
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-212
    when: When implementing equity price projection calculations
    action: Use geometric compounding formula (1+g)^t for equity growth projections — apply growth rate to the power of elapsed
      time, not linear addition
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using linear growth (g*t) instead of compound growth underestimates long-term equity values and causes valuation
      errors in portfolio NAV calculations
    derived_from_bd_id: BD-069
  - id: finance-C-213
    when: When aggregating cash flows across portfolio positions
    action: Use linear aggregation formula cash += units * cash_flow for each maturity bucket — verify additive combination
      without non-linear transformations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-linear aggregation distorts portfolio cash flow totals, causing incorrect NAV calculation and regulatory
      reporting errors
    derived_from_bd_id: BD-079
  - id: finance-C-214
    when: When performing rate-based discounting or capitalization
    action: Use power law transformation (1+yield)^target_mat for accumulation and (1+yield)^(-target_mat) for discounting
      — exponent must be positive for accumulation, negative for discounting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple interest instead of compound interest causes time-inconsistent valuations, systematically mispricing
      bonds and miscalculating discounted cash flows
    derived_from_bd_id: BD-082
  - id: finance-C-215
    when: When calculating time-weighted returns or day-count fractions across asset classes
    action: Use 365.25 day-count convention (actual/365.25) consistently across EquityClasses, BondClasses, and MainLoop —
      maintain leap year adjustment in annualised return calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using 365-day convention instead of 365.25 introduces systematic 0.07% error in annualised returns; using
      360-day introduces 0.14% error, accumulating over long horizons
    derived_from_bd_id: BD-088
  - id: finance-C-216
    when: When processing cash flows in the time-value core calculations where both MainLoop and BondClasses are applied
    action: Use inconsistent day-count conventions between modules — BD-019 mandates 365.5 day year in MainLoop while BD-031
      specifies 365.25 act/365 in BondClasses and EquityClasses
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Day-count contradiction compounds through each discounting and accumulation calculation, creating 0.14% systematic
      valuation bias that propagates to NAV, SCR, and regulatory reporting
    derived_from_bd_id: BD-095
  - id: finance-C-217
    when: When processing Solvency II capital requirement calculations in the data_import stage
    action: Assume the framework implements Solvency II SCR (Solvency Capital Requirement) standard formula — the framework
      lacks SCR calculation capability and requires manual configuration
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without SCR calculation, the system cannot determine minimum regulatory capital under Solvency II; this causes
      regulatory non-compliance for European insurance operations and potential supervisory intervention
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-218
    when: When configuring Solvency II SCR calculations for insurance portfolio
    action: 'Implement SCR standard formula calculation with risk_submodule parameters: market_risk, life_underwriting_risk,
      health_underwriting_risk, non_life_underwriting_risk, cat_risk, and correlation_matrix coefficients per EIOPA guidelines;
      configure diversification_effect parameter based on correlation assumptions'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing SCR calculation means the system cannot determine minimum regulatory capital; this causes Solvency
      II non-compliance and potential regulatory sanctions for the insurance entity
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-219
    when: When processing reinsurance data in the data_import stage
    action: Assume the framework implements reinsurance contract mapping — the framework lacks treaty mapping capability and
      treats reinsurance records as unrelated entries
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without reinsurance contract mapping, premium and loss cessions cannot be correctly attributed to treaties;
      this causes technical provisions to be overstated and P&L misattribution between ceded and retained portions
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-220
    when: When importing reinsurance data for treaty-level accounting
    action: 'Configure treaty mapping with fields: reinsurer_id, treaty_type, quota_share_percentage or excess_of_loss_attachment_point
      and limit, inception_date, expiry_date, and ceding_commission_rate; verify each reinsurance record matches a configured
      treaty before processing'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing treaty mapping causes reinsurance recoverables to be unallocated, resulting in technical provisions
      that cannot be validated and financial statements with unattributable ceded amounts
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-221
    when: When processing catastrophe risk data in the data_import stage
    action: Assume the framework implements built-in catastrophe model selection and calibration — the framework lacks CAT
      model capability and treats each locations with uniform loss assumptions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without CAT model calibration, aggregate exceedance curves are incorrect, causing material underestimation
      of PML and inadequate reinsurance pricing; the company may face solvency issues after major catastrophe events
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-222
    when: When configuring catastrophe risk calculations for portfolio risk management
    action: 'Configure at least one CAT model with vendor parameters: model_name (RMS/AIR/CoreLogic), model_version, return_period_table,
      zone_mapping_to_insurance_portfolio; calibrate intensity curves and damage ratios per modeled peril (wind, flood, earthquake)
      using historical loss data or vendor standards'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing CAT model calibration causes incorrect PML estimates, leading to underpriced reinsurance programs
      and inadequate SCR catastrophe submodule capital allocation, potentially causing solvency issues post-catastrophe
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-223
    when: When implementing CSV portfolio loading for large datasets
    action: Use generator-based streaming pattern for CSV loading instead of pandas read_csv full-file loading; process records
      incrementally as they are consumed rather than loading entire dataset into memory
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Loading entire portfolio CSV files into memory via pandas read_csv causes memory exhaustion for production
      portfolios with thousands of positions, leading to out-of-memory errors or swap-induced performance degradation
    derived_from_bd_id: BD-003
  - id: finance-C-225
    when: When implementing bisection-based convergence in any calculation module
    action: Implement custom bisection logic with ad-hoc bounds and tolerance parameters; inconsistent convergence criteria
      across CurvesClass, BondClasses, and other modules creates pricing arbitrage risk
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Inconsistent bisection bounds across asset classes cause pricing inconsistency within the same projection
      period, creating measurable arbitrage opportunities in portfolio valuations during market stress
    derived_from_bd_id: BD-097
  - id: finance-C-226
    when: When implementing any bisection-based convergence solver
    action: Use centralized BisectionSolver class with parameterized bounds and convergence criteria; verify each four bisection
      implementations (BD-005 in CurvesClass, BD-017 in BondClasses, BD-072 in CurvesClass alpha calibration, BD-090 across
      classes) share consistent convergence parameters including ±20% bounds for bond spreads
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without centralized bisection solver, market stress causing one bisection to fail indicates similar failure
      risk across all implementations, leading to cascade pricing errors in portfolio valuations
    derived_from_bd_id: BD-097
  - id: finance-C-230
    when: When implementing bond cash flow generation with coupon payments
    action: Verify that coupon calculation matches the specific bond's accrual convention; for annual-reporting alignment
      use coupon_rate × notional, but for daily accrual accounting, implement day-count fraction × coupon_rate × notional
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Omitting daily accrual causes timing mis-match in cash flow dates; for bonds with multi-period coupon windows,
      accumulated accrual differences can cause 0.01-0.05% pricing errors in long-duration portfolios
    derived_from_bd_id: BD-011
  - id: finance-C-231
    when: When calculating forward rates from spot rates for yield curve construction
    action: Use bootstrapping methodology to verify consistency between spot and forward term structures; verify input spot
      rates cover the complete term structure without gaps; if data gaps exist, use interpolation before bootstrapping
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Bootstrapping with incomplete term structure or data gaps produces inconsistent forward rates; forward rate
      errors propagate to option pricing and SCR calculations, causing systematic valuation bias
    derived_from_bd_id: BD-006
  - id: finance-C-233
    when: When initializing stochastic model components or running production simulations
    action: Assume the framework provides complete random seed coverage for each stochastic processes; not each random number
      generators are seeded by default
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without complete random seed coverage, stochastic model components produce non-reproducible results across
      runs, making it impossible to reproduce model outputs for audit, validation, or regulatory review purposes
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-235
    when: When calculating time fractions for discounting or present value computations in insurance liability projections
    action: Verify that the day-count convention is set to act/365 (365.25 days per year); confirm that 365/360 or actual/actual
      conventions are not inadvertently substituted — use explicit validation to verify Solvency II alignment for long-dated
      liability calculations
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 365/360 or actual/actual instead of act/365 produces materially different present values for long-dated
      insurance liabilities, causing systematic under- or over-reserving that misrepresents the insurer's financial position
      under Solvency II
    derived_from_bd_id: BD-031
  - id: finance-C-236
    when: When implementing liability cash flow processing in the actuarial projection framework
    action: Verify that liability payments are treated as negative cash contributions (subtracted from bank account balance),
      not as separate liability tracking or positive additions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect sign convention on liability cash flows causes liquidity miscalculation, leading to insufficient
      funds for liability payments and potential regulatory reporting errors in BEL calculations
    derived_from_bd_id: BD-014
  - id: finance-C-237
    when: When implementing equity market value projection using exponential growth formula
    action: 'Use continuous compounding formula: market_value × (1+growth_rate)^t for deterministic equity projections; validate
      growth_rate against historical equity return benchmarks before use'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using discrete annual steps instead of exponential growth creates pricing discontinuity; growth_rate values
      outside [-5%, 15%] may diverge significantly from actuarial discounting convention, causing NPV calculation errors
    derived_from_bd_id: BD-018
  - id: finance-C-240
    when: When implementing rebalancing logic and cash position management in the trading stage
    action: Execute sell orders first when bank_account < 0 (to release capital), then execute buy orders when bank_account
      > 0; maintain zero-cash policy without idle cash buffer or reliance on leverage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reversing the execution order (buy-before-sell) when capital is insufficient creates hidden leverage; in
      live trading, buy orders may be rejected due to insufficient funds, causing backtest-live inconsistency in liability-driven
      investment mandates
    derived_from_bd_id: BD-027
  - id: finance-C-241
    when: When calibrating Smith-Wilson discount curves using the framework's tau parameter
    action: Verify that tau=0.0001 tolerance matches the required pricing precision for the bond portfolio — check convergence
      by comparing extrapolated forwards against UFR within tolerance, and adjust if higher precision is needed for long-dated
      instruments
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 0.0001 tau tolerance without verification may introduce numerical noise in discount factors for long-dated
      bonds, causing systematic pricing errors that accumulate across portfolios and lead to incorrect valuation in stress
      testing
    derived_from_bd_id: BD-035
  - id: finance-C-242
    when: When implementing portfolio position management logic
    action: Treat cash as a fungible scalar quantity supporting additive aggregation for netted calculations; implement equity
      positions as individually tracked position objects for dividend and tax lot accounting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixing cash and equity in the same container or applying additive aggregation to equity shares causes dividend
      calculations and tax lot tracking to produce incorrect results, leading to regulatory compliance violations and inaccurate
      P&L reporting
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-243
    when: When implementing sell quantity calculation in trading logic
    action: Apply min(1, abs(cash/mv)) cap to bound the sell ratio to [0, 1] range — calculate sell_quantity = min(available_position,
      target_ratio * current_holding) ensuring no position is oversold
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without the min(1, abs(cash/mv)) cap, the backtest may execute sell orders for more shares than available
      in the portfolio, creating phantom liquidity that produces unrealistically profitable trades incompatible with live
      trading constraints
    derived_from_bd_id: BD-028
  - id: finance-C-244
    when: When initializing the framework's file path system
    action: Verify that base_path exists and has write permissions before creating layered subdirectories (base→intermediate→input/output),
      and create missing directories proactively
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: If base path doesn't exist or permissions restrict subdirectory creation, the data pipeline fails at runtime
      instead of startup, potentially corrupting intermediate data or losing simulation results
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-245
    when: When implementing equity price projection logic
    action: Use the exponential growth formula price[t] = price[t-1] × (1+g)^time_frac with time_frac representing the fractional
      period between time steps
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using linear or simple annual growth instead of exponential time-fraction growth distorts equity valuations
      across different simulation frequencies, making long-term projections unreliable for asset-liability matching
    derived_from_bd_id: BD-022
  - id: finance-C-246
    when: When implementing bond pricing in the main simulation loop
    action: Reset bond price to the previous period's price (constant-price assumption) — do not apply mark-to-market repricing
      in basic deterministic runs
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Constant bond pricing ignores interest rate sensitivity; portfolios with significant bond allocation will
      show inaccurate valuations when interest rates change, leading to misaligned asset-liability projections
    derived_from_bd_id: BD-023
  - id: finance-C-247
    when: When processing buy/sell orders in backtesting
    action: Assume the framework enforces price tick size and quantity lot size precision — the framework does not implement
      price/quantity rounding; orders are treated as fully executable at any decimal precision
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without tick/lot enforcement, backtests assume fills at arbitrary decimal prices and quantities that cannot
      execute in real markets, making results non-reproducible in live trading
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-248
    when: When validating order prices and quantities before execution
    action: Round order prices to the nearest tick size (e.g., 0.01 for most stocks) and round quantities to the nearest lot
      size (e.g., 100 shares for A-shares); filter or reject orders that cannot meet precision requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper tick/lot rounding, simulated fills use fractional prices or quantities unavailable in actual
      markets, creating systematic discrepancies between backtest and live execution results
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-249
    when: When implementing the rebalancing trade function
    action: Execute sell orders for over-weighted assets first to release capital, then execute buy orders for under-weighted
      assets — maintain zero bank account balance throughout the trading sequence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Buying before selling creates hidden leverage when capital is insufficient; in live trading, buy orders may
      be rejected due to insufficient funds, causing backtest-live inconsistency and potential margin calls
    derived_from_bd_id: BD-039
  - id: finance-C-250
    when: When implementing terminal cash flow handling for bond or liability instruments
    action: Cap maturity dates at the modelling end date for terminal cash flows — truncate any cash flow with maturity >
      end_date to the end_date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without maturity date capping, terminal cash flows extend beyond the projection horizon, causing numerical
      instability and infinite-horizon complications in valuations that make results non-reproducible
    derived_from_bd_id: BD-048
  - id: finance-C-251
    when: When constructing bootstrapped yield curves from spot rates
    action: 'Calculate forward rates using the compound interest formula: (1+r_m)^m / (1+r_{m-1})^(m-1) - 1 — verify internal
      consistency between spot and forward rates across the curve'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative forward rate formulas introduces systematic errors in yield curve construction that propagate
      into incorrect discount factors, causing mispriced instruments and hedging failures in live trading
    derived_from_bd_id: BD-049
  - id: finance-C-252
    when: When calculating dividend cash flows at each scheduled dividend date
    action: Calculate dividend amount as dividend_yield * market_price — verify dividend amounts scale proportionally with
      equity value at each payment date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fixed dividend amounts instead of yield-based sizing breaks yield consistency across different price
      levels, causing equity valuations to diverge from expected returns and misrepresenting dividend reinvestment assumptions
    derived_from_bd_id: BD-041
  - id: finance-C-253
    when: When calculating equity discount rate adjustments from risk premium components
    action: 'Aggregate equity discount spread additively: spread_country + spread_sector + spread_stress — maintain independence
      assumption between spread components for risk decomposition reporting'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using multiplicative aggregation instead of additive changes the fundamental risk premium structure, causing
      equity discount rates to be systematically miscalculated and producing incorrect valuations across the portfolio
    derived_from_bd_id: BD-042
  - id: finance-C-254
    when: When implementing bond coupon payment calculations in bond_cashflows stage
    action: 'Calculate coupon amount as coupon_rate multiplied by notional_amount per period, using the formula: coupon =
      self.coupon_rate * self.notional_amount'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect coupon calculation causes all bond cashflow projections to be wrong, leading to inaccurate portfolio
      valuations and potential misallocation in live trading strategies
    derived_from_bd_id: BD-045
  - id: finance-C-257
    when: When calculating total market value in MainLoop
    action: Calculate total market value as equity_units * price plus bond_units * price — validate that each price inputs
      are positive before aggregation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative bond prices indicate distressed or erroneous data; including them in portfolio valuation distorts
      NAV calculation and may misrepresent solvency position to regulators
    derived_from_bd_id: BD-081
  - id: finance-C-258
    when: When calibrating bond portfolio using bisection_spread in BondClasses
    action: When calibration converges to boundary value (x_start=-0.2 or x_end=0.2), detect non-convergence and trigger recalibration
      with expanded bounds or flag position as requiring manual review — do not silently return boundary value
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Silently returning ±20% boundary value for distressed credits causes bond valuation errors of hundreds of
      basis points, distorting NAV and potentially misrepresenting solvency position to regulators
    derived_from_bd_id: BD-091
  - id: finance-C-259
    when: When implementing bond price handling across the calibration-pricing pipeline
    action: Implement periodic fresh calibration or fallback pricing with mandatory staleness detection — explicitly document
      behavior when calibration fails in stress periods, as BD-023/BD-054 perpetuate stale prices causing cascading valuation
      errors through BD-052 spreads to BD-081 market value and BD-029 NAV output
    severity: high
    kind: operational_lesson
    modality: must
    consequence: In volatile credit markets, stale bond prices from failed calibration can misrepresent solvency position
      by hundreds of basis points in NAV output, causing regulatory reporting errors and incorrect risk management decisions
    derived_from_bd_id: BD-099
  - id: finance-C-260
    when: When implementing spot rate calculation in curve construction
    action: Calculate projected spot rate as the cumulative product of forward rates raised to power (1/maturity) — use geometric
      averaging, NOT linear interpolation or simple averaging across maturity points
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Linear interpolation of forward rates violates no-arbitrage consistency across maturities, creating pricing
      discrepancies that can lead to artificial arbitrage opportunities in backtested portfolio valuations
    derived_from_bd_id: BD-050
  - id: finance-C-261
    when: When aggregating cash flows across multiple assets for portfolio valuation
    action: Use unique dates profile to consolidate each asset cash flow dates into a unified sorted list with duplicates
      eliminated — do NOT process assets individually
    severity: high
    kind: domain_rule
    modality: must
    consequence: Processing cash flows asset-by-asset misses period-end synchronization opportunities and causes accounting
      inconsistencies when aggregating portfolio-level NAV calculations
    derived_from_bd_id: BD-051
  - id: finance-C-262
    when: When processing liability cash outflows in portfolio accounting
    action: Record liability payments as negative cash flows that directly reduce the portfolio bank account balance — maintain
      single cash identity for the entire portfolio
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a separate liability account breaks cash conservation principles and creates tracking gaps in liquidity
      calculations, causing portfolio NAV discrepancies and inaccurate liquidity reporting
    derived_from_bd_id: BD-057
  - id: finance-C-263
    when: When generating cash flow date schedules for bonds and dividend-paying instruments
    action: Verify that first coupon/dividend date calculation starts at issue_date minus one period, then advances forward
      — confirm this aligns with standard bond conventions for the instrument type
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using forward-only scheduling for first coupon date causes misalignment with standard bond distribution conventions,
      producing incorrect cash flow timing that propagates into valuation errors
    derived_from_bd_id: BD-047
  - id: finance-C-264
    when: When pricing corporate bonds using credit spread methodology
    action: Apply z-spread over the risk-free curve for corporate bond pricing — retrieve risk-free rates and augment with
      issuer-specific z-spread during discount factor calculation. Do NOT use creditrisks models or CDS-adjusted curves
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative credit pricing methods without proper calibration causes bond valuation errors and credit
      risk decomposition inaccuracies that misrepresent portfolio exposure to credit events
    derived_from_bd_id: BD-052
  - id: finance-C-265
    when: When implementing Smith-Wilson interpolation for yield curve construction
    action: Use the exact Wilson function formula H(u,v) = 0.5*(α*(u+v)+exp(-α*(u+v))-α*|u-v|-exp(-α*|u-v|)) — the exponential
      decay term α controls convergence to UFR and boundary conditions enforce symmetry H(u,v)=H(v,u)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect implementation of the Wilson function causes yield curve to produce negative forward rates in low-liquidity
      regions, leading to systematic mispricing of interest rate derivatives and hedging instruments
    derived_from_bd_id: BD-073
  - id: finance-C-266
    when: When implementing time discretization for cash flow scheduling
    action: Use fixed 365-day interval for year fraction calculations — interval must be positive integer days, ensuring consistent
      day-count regardless of leap years
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing day-count convention to ACT/365 or ACT/ACT introduces date-based calculation artifacts that break
      regulatory reporting consistency and backtest reproducibility across different calendar periods
    derived_from_bd_id: BD-078
  - id: finance-C-267
    when: When implementing rebalancing logic to raise cash when bank account is negative
    action: Calculate percent_to_sell = -bank_account / total_value and sell proportionally across each holdings — ratio must
      be bounded by [0,1] to prevent over-selling; do not use FIFO or position-age-based liquidation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using FIFO or age-based liquidation instead of proportional selling creates preferential treatment of certain
      positions, causing live trading to differ from backtest and potentially triggering margin calls on different positions
      than expected
    derived_from_bd_id: BD-080
  - id: finance-C-268
    when: When modifying asset dataclass definitions in the framework
    action: Change EquityShare to frozen=True without auditing each post-construction modifications — EquityShare intentionally
      allows mutation for position updates while CorpBond uses frozen=True for thread-safety
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Standardizing EquityShare to frozen=True breaks existing code that modifies positions after construction,
      potentially invalidating cached calculations and causing runtime errors in position management workflows
    derived_from_bd_id: BD-092
  - id: finance-C-269
    when: When implementing corporate bond cashflow generation logic
    action: Generate coupon dates separately from maturity cashflows — maintain separate handling for periodic coupons (annual,
      semi-annual) and principal repayment to verify accurate bond portfolio analytics
    severity: high
    kind: domain_rule
    modality: must
    consequence: Aggregating coupon and maturity cashflows breaks bond portfolio analytics when coupon frequency doesn't align
      with standard periods, causing incorrect cashflow projections and misaligned payment schedules
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-270
    when: When implementing or refactoring liquidation logic in the trading stage
    action: 'Use the proportional asset sale formula: percent_to_sell = min(1, -bank_account / total_market_value), where
      negative bank_account triggers liquidation proportional to portfolio value, capping at 100% of total market value'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Refactoring to fixed liquidation queues or alternative liquidation strategies introduces non-linear capital
      recovery patterns that can cause insufficient cash coverage or forced over-selling, breaking live trading compatibility
    derived_from_bd_id: BD-061
  - id: finance-C-271
    when: When configuring credit loss parameters for corporate bond positions
    action: Verify that Recovery_Rate=0.4 (40%) matches the actual bond's seniority and collateral structure, as this default
      represents senior unsecured bond conventions; adjust for subordinated debt (typically 20-30%) or secured bonds (typically
      50-60%)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 40% recovery for subordinated or secured bonds systematically miscalculates expected loss, underestimating
      risk for subordinated bonds and overestimating for secured bonds; errors propagate through capital requirement calculations
    derived_from_bd_id: BD-063
  - id: finance-C-272
    when: When configuring credit risk parameters for corporate bond positions
    action: Verify that Default_Probability=0.03 (3% annual) matches the actual bond's credit rating, as this default represents
      approximate BBB-rated corporate bond historical default rates; adjust for other ratings (AAA ~0.02%, A ~0.05%, BB ~0.40%,
      B ~1.50%)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 3% annual PD for investment-grade bonds overestimates default risk, causing excessive provisions; using
      it for high-yield bonds underestimates risk, leading to insufficient capital buffers and potential losses exceeding
      expectations
    derived_from_bd_id: BD-064
  - id: finance-C-273
    when: When implementing or modifying yield curve construction in the curve_construction stage
    action: Use compound discounting formula (1+r)^(-M) for each discount factor calculations at each maturity point; do not
      substitute simple interest (1+r*M) or force of interest (e^(-δ*M))
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple interest systematically overestimates discount factors for longer maturities, causing bond portfolio
      valuations to diverge from observable market prices and breaking arbitrage-free consistency requirements
    derived_from_bd_id: BD-065
  - id: finance-C-274
    when: When defining time boundaries for training, testing, and trading periods in data_import stage
    action: Assume the framework automatically enforces train/test/trade time period boundaries — the framework does not implement
      time boundary validation between data splits
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without time boundary enforcement, data leakage occurs across train/test periods causing look-ahead bias;
      trading period may overlap with historical data causing non-reproducible results
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-275
    when: When implementing data pipeline in data_import stage
    action: 'Validate time boundaries explicitly: training_period end < testing_period start, testing_period end < trading_period
      start; enforce non-overlapping by checking max(training_dates) < min(testing_dates) and max(testing_dates) < min(trading_dates)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit time boundary validation, data from future periods may leak into training causing severe
      overfitting and false confidence in backtest results
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-276
    when: When designing or implementing RL reward functions in data_import stage
    action: Assume the RL reward function automatically accounts for transaction costs — the framework does not model transaction
      costs within the reward function
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without transaction cost modeling in RL rewards, the agent learns to overtrade to maximize nominal returns;
      live trading incurs substantial costs causing real losses not reflected in training
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-277
    when: When implementing RL training pipeline in data_import stage
    action: 'Incorporate transaction costs into reward function: reward = gross_return - (position_value * buy_cost + position_value
      * sell_cost + fixed_fee_per_trade); use actual broker fee parameters from production environment'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without modeling transaction costs in rewards, RL agent optimizes for unrealistic high-frequency trading
      strategies that are unprofitable after costs in live execution
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-278
    when: When implementing data preprocessing pipelines in data_import stage
    action: Assume the framework automatically isolates fit operations from transform operations — the framework does not
      enforce fit/transform separation in pipelines
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without fit/transform isolation, scalers or encoders fit on test data leak information about test distribution,
      causing inflated performance metrics that do not generalize to live trading
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-279
    when: When building data transformation pipelines in data_import stage
    action: 'Separate fit and transform explicitly: fit pipeline must use only training data, transform pipeline must use
      fitted parameters from training; use sklearn.pipeline.Pipeline with separate fit_transform calls and save fitted parameters
      for production transform'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper fit/transform isolation, preprocessing parameters leak from test period into training, causing
      data leakage that makes backtest results overly optimistic
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-280
    when: When using covariate features for prediction in data_import stage
    action: Assume the framework automatically enforces temporal availability constraints on covariates — the framework does
      not validate that covariates were available at prediction time
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without temporal availability constraints, future covariate values may be used in historical predictions
      causing look-ahead bias; strategy performance appears inflated and is not reproducible in live trading
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-281
    when: When engineering covariate features in data_import stage
    action: 'Enforce temporal availability by aligning covariate timestamps with their earliest computable time: for each
      covariate, set feature_available_date = signal_date + data_delay; filter training samples where prediction_date >= feature_available_date'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without enforcing temporal availability constraints, model uses prematurely available data causing systematic
      overestimation of strategy performance in backtesting versus live trading
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-282
    when: When implementing insurance/life insurance actuarial calculations
    action: Assume the framework provides mortality table version control or source validation — the framework does not implement
      mortality table management; no version tracking, no source verification, no validation against known mortality standards
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using unversioned mortality tables without source validation causes actuarial calculations to use incorrect
      mortality rates, leading to premium miscalculation and reserve insufficiency in life insurance products
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-283
    when: When configuring actuarial calculations for life insurance products
    action: Explicitly specify mortality table version (e.g., CSO 1980, CSO 2001, CI 2001) and document data source (e.g.,
      China Insurance Regulatory Commission, Society of Actuaries); validate that selected mortality rates match the claimed
      version and source before production use
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without explicit mortality table version and source specification, actuarial calculations may silently use
      incorrect mortality rates, causing premium miscalculation, reserve insufficiency, or regulatory non-compliance
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-284
    when: When implementing proportional rebalancing logic with zero-cash policy
    action: 'Implement safeguards against liquidity cliff: add minimum cash buffer, implement threshold-based rebalancing,
      or add guardrails to prevent percent_to_sell from exceeding safe liquidation thresholds during market downturns when
      total_value collapses'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: 'Proportional rebalancing with zero-cash policy creates liquidity cliff effect: when total_value collapses
      during equity crash, percent_to_sell exceeds 100% causing near-complete portfolio liquidation even for small liability
      payments at depressed prices'
    derived_from_bd_id: BD-103
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
