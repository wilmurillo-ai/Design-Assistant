resources:
  packages:
  - name: pandas
    version_pin: ==1.5.3
  - name: numpy
    version_pin: ==1.24.4
  - name: matplotlib
    version_pin: '>=2'
  - name: requests
    version_pin: ==2.31.0
  - name: scipy
    version_pin: '>=1.3.0'
  - name: scikit-learn
    version_pin: '>1.4.2'
  - name: pytest
    version_pin: '>=8.3'
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing exchange market loading
    action: Call load_markets() before any market lookups to verify self.markets is populated
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Any attempt to look up a market via this.market(symbol) will fail with 'markets not loaded' ExchangeError,
      causing all trading operations to break
    stage_ids:
    - market_currency_loading
  - id: finance-C-002
    when: When parsing exchange market data
    action: Verify each market dict contains symbol, base, quote, precision, and limits fields with None defaults
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Trading operations will fail with KeyError when accessing market properties that were not initialized, causing
      order placement and data retrieval to crash
    stage_ids:
    - market_currency_loading
  - id: finance-C-009
    when: When converting exchange-specific market-ids to unified symbols
    action: Send unified symbols directly to exchange API endpoints that require exchange-specific market-ids
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Exchange will reject requests with invalid symbol format, returning BadSymbol errors and causing all API
      calls to fail
    stage_ids:
    - market_currency_loading
  - id: finance-C-013
    when: When implementing HTTP requests to exchange APIs
    action: respect the exchange's rate limit by using enableRateLimit=True by default
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violation causes the exchange to block or ban the API key, resulting in service disruption for trading operations.
      Exchange APIs enforce rate limits per IP/API key and exceeding them returns HTTP 429 or bans.
    stage_ids:
    - network_request
  - id: finance-C-014
    when: When executing network requests to exchange APIs
    action: implement a timeout mechanism to prevent indefinite blocking of requests
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without timeout enforcement, a stalled network connection causes the trading system to hang indefinitely,
      preventing order placement, cancellation, or market data retrieval during critical trading windows.
    stage_ids:
    - network_request
  - id: finance-C-016
    when: When making network requests without rate limiting enabled
    action: skip rate limiting to maximize throughput when accessing exchange APIs
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Disabling rate limiting causes HTTP 429 responses, temporary IP bans, or permanent API key suspension, preventing
      any trading activity until the exchange lifts the restriction.
    stage_ids:
    - network_request
  - id: finance-C-019
    when: When calling fetch2 method for API requests
    action: pass through the throttle() gate when enableRateLimit is configured
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing throttle() causes immediate rate limit violations, resulting in HTTP 429 responses and potential
      temporary or permanent API key suspension by exchanges.
    stage_ids:
    - network_request
  - id: finance-C-025
    when: When implementing parse_* methods for exchange-specific response formats
    action: extract numeric values using safe_string before performing Precise string arithmetic
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Direct float operations on exchange data cause floating-point precision errors, leading to incorrect financial
      calculations for trades, costs, and balances that may result in financial losses
    stage_ids:
    - response_parsing
  - id: finance-C-026
    when: When performing financial arithmetic on parsed exchange data
    action: use Precise.string_* static methods (string_mul, string_div, string_add, string_sub) for each monetary calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Standard Python float arithmetic causes rounding errors in high-precision financial calculations, resulting
      in incorrect order costs, fee calculations, and balance computations that compound over many trades
    stage_ids:
    - response_parsing
  - id: finance-C-027
    when: When defining precision for decimal rounding operations
    action: cap decimal precision at Python's decimal precision minus 2 (context.prec - 2)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Exceeding Python's decimal precision causes decimal.Underflow exceptions and crashes when processing high-precision
      exchange data, preventing order execution and data parsing
    stage_ids:
    - response_parsing
  - id: finance-C-031
    when: When calculating contract cost for perpetual swap trades
    action: apply inverse price adjustment (1/price) before multiplying by contractSize for inverse contracts
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect cost calculation for inverse perpetual contracts causes wrong position sizing, leading to unexpected
      liquidation or insufficient margin
    stage_ids:
    - response_parsing
  - id: finance-C-037
    when: When implementing WebSocket OrderBook streaming
    action: 'populate OrderBook dicts with required keys: ''bids'', ''asks'', ''timestamp'', ''nonce'', ''symbol'''
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required OrderBook keys causes downstream trading logic to receive incomplete market depth data,
      leading to incorrect price levels and potential financial loss from wrong order placement
    stage_ids:
    - websocket_streaming
  - id: finance-C-038
    when: When implementing WebSocket connection lifecycle
    action: 'follow strict execution order: connect -> on_connected_callback -> subscriptions -> on_close_callback'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect callback ordering causes subscriptions to be sent before connection is established, resulting in
      connection errors and failed market data streaming
    stage_ids:
    - websocket_streaming
  - id: finance-C-039
    when: When handling WebSocket message responses
    action: use message_hash to resolve futures, not message content directly
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Direct message content resolution bypasses the subscription routing mechanism, causing messages to be delivered
      to wrong handlers and losing real-time market data
    stage_ids:
    - websocket_streaming
  - id: finance-C-056
    when: When implementing market-specific order operations (create_order, cancel_order, fetch_orders)
    action: Call load_markets() before accessing market data or executing trading operations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Order operations will fail with KeyError or BadSymbol because self.markets is empty when load_markets() has
      not been called first
    stage_ids:
    - trading_operations
  - id: finance-C-057
    when: When implementing or consuming balance structures from fetch_balance()
    action: Always access balance['free'], balance['used'], and balance['total'] top-level keys
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Balance calculations will produce incorrect results because the top-level free/used/total dictionaries are
      missing
    stage_ids:
    - trading_operations
  - id: finance-C-059
    when: When validating order arguments before creating an order
    action: Reject limit orders without a price argument and amounts <= 0
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid orders will be sent to the exchange API, potentially wasting API quota and causing unexpected rejections
    stage_ids:
    - trading_operations
  - id: finance-C-066
    when: When implementing trading strategies that require market data
    action: Verify load_markets() has completed successfully before using self.market() lookup
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Symbol lookups via self.market() will raise KeyError because markets are not loaded
    stage_ids:
    - trading_operations
  - id: finance-C-071
    when: When constructing authenticated API requests (sign function)
    action: load markets before signing requests to populate symbol->marketId mappings
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Request construction uses undefined market mappings, causing BadRequest errors when exchange rejects orders
      with invalid or missing symbol IDs
    stage_ids:
    - market_currency_loading
    - request_construction
  - id: finance-C-072
    when: When parsing exchange API responses (parse_order, parse_trade, parse_balance)
    action: pass market dict to parser functions to enable symbol context resolution
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Parser returns malformed structures with unresolved symbol/price fields, causing downstream order tracking
      and PnL calculation failures
    stage_ids:
    - market_currency_loading
    - response_parsing
  - id: finance-C-075
    when: When preparing signed request headers for authenticated API calls
    action: check required credentials are set before signing (apiKey, secret, passphrase as applicable)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Requests fail with AuthenticationError, causing missed trading opportunities and potential liquidation in
      volatile markets
    stage_ids:
    - request_construction
    - network_request
  - id: finance-C-076
    when: When constructing order parameters (amount, price, symbol)
    action: validate order amount is greater than 0 and price is provided for limit orders
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Exchange rejects orders with InvalidOrder errors, causing trading strategy failures and potential margin
      calls
    stage_ids:
    - request_construction
    - network_request
  - id: finance-C-079
    when: When handling HTTP error status codes from exchange APIs
    action: check response against known HTTP exception codes before returning data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Error responses are misinterpreted as successful, causing trading operations to execute on stale or invalid
      data
    stage_ids:
    - network_request
    - response_parsing
  - id: finance-C-082
    when: When returning unified Order/Trade/Balance structures to trading operations
    action: populate each required TypedDict fields including info, id, symbol, timestamp, datetime
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing required fields cause KeyError exceptions in downstream trading operations when accessing order status
      or trade history
    stage_ids:
    - response_parsing
    - trading_operations
  - id: finance-C-084
    when: When calculating trade cost (amount * price) for derivatives trading
    action: apply contract size and inverse/linear multiplier when computing trade cost
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect cost calculation leads to wrong position sizing, margin requirement errors, and potential forced
      liquidations
    stage_ids:
    - response_parsing
    - trading_operations
  - id: finance-C-088
    when: When parsing balance responses from exchange APIs
    action: populate Balance TypedDict with free, used, total, and optionally debt fields
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing balance fields cause incorrect margin calculations, leading to over-trading and potential forced
      liquidations
    stage_ids:
    - response_parsing
    - trading_operations
  - id: finance-C-090
    when: When retrying failed network requests
    action: only retry on OperationFailed exceptions (network errors), not on validation errors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Retrying validation errors (InsufficientFunds, InvalidOrder) causes duplicate orders and potential over-trading
    stage_ids:
    - request_construction
    - network_request
    - response_parsing
  - id: finance-C-092
    when: When handling position data from derivatives exchanges
    action: populate Position TypedDict with unrealizedPnl, realizedPnl, entryPrice, markPrice fields for risk calculations
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing PnL fields cause incorrect risk assessment and failed stop-loss execution
    stage_ids:
    - response_parsing
    - trading_operations
  - id: finance-C-094
    when: When working with cryptocurrency trading where past performance does not guarantee future results
    action: claim that simulated backtest returns equal expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users make financial decisions based on unrealistic expectations, leading to significant financial losses
      when live trading underperforms backtests
    stage_ids:
    - response_parsing
    - trading_operations
  - id: finance-C-098
    when: When constructing signed requests for exchange authentication
    action: use exchange-specific nonce/timestamp in correct format (milliseconds or seconds per exchange)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid nonce format causes authentication failures, blocking all subsequent API requests
    stage_ids:
    - request_construction
    - network_request
  - id: finance-C-100
    when: When representing time in any CCXT operation (timestamps, order times, trade times, etc.)
    action: Use milliseconds since Unix epoch as the standard time representation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: All timestamps are milliseconds since Unix epoch; mixing seconds and milliseconds causes data misalignment
      across the entire system
  - id: finance-C-101
    when: When specifying market symbols in any CCXT operation
    action: Use uppercase BASE/QUOTE format (e.g., BTC/USDT, ETH/USDT)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Market symbols must be uppercase BASE/QUOTE format; using lowercase or incorrect separator causes BadSymbol
      errors and breaks all trading operations
  - id: finance-C-102
    when: When performing financial calculations involving monetary values
    action: Use string arithmetic via Precise class to avoid floating-point precision errors
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Floating-point arithmetic causes precision loss in financial calculations; using float directly leads to
      rounding errors that accumulate into significant monetary discrepancies
  - id: finance-C-105
    when: When defining OHLCV (candlestick) data arrays
    action: Structure OHLCV arrays as [timestamp, open, high, low, close, volume] in this exact order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: OHLCV arrays must follow [timestamp, open, high, low, close, volume] order; incorrect ordering corrupts all
      technical analysis and indicator calculations
  - id: finance-C-107
    when: When making any market-specific API call (fetching orders, trades, tickers, etc.)
    action: Call loadMarkets() first to verify markets are loaded before any market-specific API operation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Markets must be lazy-loaded via loadMarkets(); calling market-specific APIs without loading markets first
      causes symbol resolution failures
  - id: finance-C-108
    when: When implementing authentication for private API endpoints
    action: Return (url, method, headers, body) tuple from sign() method for each exchange implementations
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: sign() method must return (url, method, headers, body) tuple; incorrect return format causes authentication
      failures across all private API calls
  - id: finance-C-119
    when: When handling financial calculations in Python
    action: Use native Python float for monetary/financial calculations
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Using float for financial calculations causes precision loss due to IEEE 754 representation; small rounding
      errors accumulate into significant monetary discrepancies
  - id: finance-C-131
    when: When making any market-specific API call
    action: Call loadMarkets() before any market-specific API call to verify the markets{} dictionary is populated, because
      lazy loading creates temporal coupling that causes KeyError or incorrect order sizing without prior loading
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calling market-specific APIs without loadMarkets() causes incomplete data returns or KeyError exceptions,
      making backtests fail or produce incorrect results due to missing market metadata
    derived_from_bd_id: BD-081
  - id: finance-C-135
    when: When implementing WebSocket callback handlers for connection state management
    action: 'Execute callbacks strictly in order: on_message_callback first, then on_error_callback, then on_close_callback
      — never skip or reorder callbacks in the chain'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Skipping or reordering callbacks breaks the error-before-cleanup contract, causing errors to be lost or messages
      to be processed on corrupted state after error callbacks have already cleaned up resources
    derived_from_bd_id: BD-079
  - id: finance-C-138
    when: When implementing WebSocket connection initialization in trading systems
    action: 'Follow the required lifecycle sequence: connect first, then invoke on_connected_callback, then activate subscriptions,
      and finally execute on_close_callback for cleanup — never skip or reorder lifecycle steps'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Skipping or reordering WebSocket lifecycle steps causes race conditions where subscriptions activate before
      connection is ready or cleanup occurs before subscriptions are deactivated, breaking protocol integrity and causing
      message loss
    derived_from_bd_id: BD-090
  - id: finance-C-139
    when: When implementing address validation for Bitcoin Bech32 addresses
    action: Use BECH32M encoding for Bech32m addresses (bc1q...) and BECH32 for legacy Bech32 addresses (BCH 1...) - per BIP-350
      checksum constants; do not use BECH32 for Bech32m addresses
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using BECH32 for Bech32m addresses (bc1q...) causes address validation bypass vulnerabilities where invalid
      addresses pass validation, enabling transactions to irrecoverable addresses and loss of funds
    derived_from_bd_id: BD-104
  - id: finance-C-140
    when: When implementing Bitcoin address generation from public keys
    action: Apply Hash160 as RIPEMD160(SHA256(pubkey)) in that exact order - first SHA256 hash, then RIPEMD160 hash of the
      SHA256 output
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Reversing the hash order produces non-standard Bitcoin addresses incompatible with BIP44 derivation paths,
      causing wallet software to reject generated addresses or send funds to unrecoverable locations
    derived_from_bd_id: BD-105
  - id: finance-C-151
    when: When configuring SSL verification for secure exchange API communications
    action: Disable SSL certificate verification in production environments — verification must remain enabled to prevent
      API key exposure and transaction data interception
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Disabling SSL verification exposes API keys and transaction data to man-in-the-middle attacks, allowing attackers
      to intercept credentials and manipulate trading communications
    derived_from_bd_id: BD-027
  - id: finance-C-183
    when: When processing position quantities from Bitmex exchange
    action: Divide lot counts by the market precision value to obtain actual contract amounts — Bitmex expresses positions
      as integer lot counts, not real amounts
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Failing to divide by precision causes positions to be 100x to 10000x oversized depending on contract configuration,
      leading to catastrophic overtrading and potential account liquidation
    derived_from_bd_id: BD-055
  - id: finance-C-187
    when: When implementing any Exchange subclass configuration in CCXT framework
    action: Call deep_extend(super().describe(), {...}) in the describe() static property for every Exchange subclass; do
      not omit super().describe() as this breaks the entire configuration inheritance chain
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Omitting super().describe() causes all inherited configuration fields (rate limits, timeouts, feature flags)
      to be lost, breaking core functionality like order placement, balance queries, and API authentication
    derived_from_bd_id: BD-071
  - id: finance-C-204
    when: When validating cryptocurrency wallet addresses before withdrawal or transfer operations
    action: Use Double-SHA256 checksum validation for Base58-encoded addresses and raise Base58ChecksumError on validation
      failure
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without checksum validation, funds may be sent to addresses with transcription errors or corruption; the
      transaction is irreversible on-chain, and Double-SHA256 provides second-preimage resistance to prevent address collision
      attacks
    derived_from_bd_id: BD-102
  regular:
  - id: finance-C-003
    when: When defining unified symbols
    action: Use uppercase BASE/QUOTE format with forward slash separator (e.g., BTC/USDT, ETH/USD)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Symbol lookups will fail with BadSymbol error because market() cannot find lowercase or non-standard formatted
      symbols in the markets dictionary
    stage_ids:
    - market_currency_loading
  - id: finance-C-004
    when: When loading market data from exchanges
    action: Respect exchange-specific rate limits by caching markets in memory after first load
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Repeated API calls without caching will exhaust rate limits, causing ExchangeError exceptions and preventing
      further market data retrieval
    stage_ids:
    - market_currency_loading
  - id: finance-C-005
    when: When implementing custom exchange market fetching
    action: Override fetch_markets() to return exchange-specific market data in the correct format
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Market loading will fail because set_markets() expects properly formatted market data to build the unified
      markets dictionary
    stage_ids:
    - market_currency_loading
  - id: finance-C-006
    when: When resolving marketId conflicts between spot and derivatives
    action: Insert spot markets first in the sorted order to verify they resolve by default
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Symbol lookups may resolve to derivatives markets instead of spot, causing incorrect price data and trading
      operations to use wrong market parameters
    stage_ids:
    - market_currency_loading
  - id: finance-C-007
    when: When handling marketId ambiguity during safe_market lookups
    action: Provide marketType parameter to disambiguate when multiple markets share the same exchange-specific id
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: safeMarket() will throw ArgumentsRequired exception when the same marketId exists for spot/swap/future and
      no disambiguation is provided
    stage_ids:
    - market_currency_loading
  - id: finance-C-008
    when: When using load_markets with reload parameter
    action: Only set reload=True when exchange market data has changed or is stale
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Unnecessary reloads will consume rate limit quota, potentially blocking legitimate API calls and triggering
      RateLimitExceeded errors
    stage_ids:
    - market_currency_loading
  - id: finance-C-010
    when: When calling market lookups without proper context
    action: Pass marketType parameter to safe_market() when marketId may be ambiguous
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: safe_market() will raise ArgumentsRequired exception, halting execution when the same marketId exists for
      different market types
    stage_ids:
    - market_currency_loading
  - id: finance-C-011
    when: When accessing currencies before they are loaded
    action: Call load_markets() or verify fetchCurrencies has been invoked before accessing currency data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Currency lookups will fail with 'currencies not loaded' ExchangeError, breaking deposit/withdrawal operations
      and balance queries
    stage_ids:
    - market_currency_loading
  - id: finance-C-012
    when: When accessing non-existent market symbols
    action: Use safe_market() or marketOrNull() instead of market() to handle missing symbols gracefully
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: market() throws BadSymbol exception for invalid symbols, causing program termination instead of graceful
      handling
    stage_ids:
    - market_currency_loading
  - id: finance-C-015
    when: When configuring proxy settings for exchange API requests
    action: detect and use HTTP_PROXY and HTTPS_PROXY environment variables for proxy routing
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Failure to respect environment proxy variables causes requests to bypass user-configured proxies, potentially
      exposing API credentials in corporate/regulated environments or failing in network-restricted setups.
    stage_ids:
    - network_request
  - id: finance-C-017
    when: When using SOCKS proxy support in asynchronous exchange clients
    action: install the 'aiohttp_socks' package to enable SOCKS proxy functionality
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without aiohttp_socks installed, SOCKS proxy connections fail with NotSupported exception, breaking all network
      requests when SOCKS proxy is configured.
    stage_ids:
    - network_request
  - id: finance-C-018
    when: When configuring multiple proxy settings simultaneously
    action: combine proxyUrl with httpProxy/httpsProxy/socksProxy or mix different proxy types
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Conflicting proxy configurations cause InvalidProxySettings exception, preventing all network requests from
      executing until the conflict is resolved.
    stage_ids:
    - network_request
  - id: finance-C-020
    when: When executing REST API requests
    action: track lastRestRequestTimestamp to enforce minimum interval between requests
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without timestamp tracking, the synchronous throttle() mechanism cannot calculate elapsed time, causing rate
      limiting to malfunction and potential API violations.
    stage_ids:
    - network_request
  - id: finance-C-021
    when: When presenting network request performance results
    action: claim that simulated network request latency equals live trading execution speed
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtested network request timings do not reflect real-world latency variations, exchange processing times,
      or network jitter, leading to unrealistic trading performance expectations.
    stage_ids:
    - network_request
  - id: finance-C-022
    when: When implementing rate limiting for exchange API access
    action: assume the default rateLimit of 2000ms is sufficient for each exchanges
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Each exchange has unique rate limits; using the conservative 2000ms default may still violate stricter exchange
      limits, causing HTTP 429 errors or API key suspension.
    stage_ids:
    - network_request
  - id: finance-C-023
    when: When handling network request failures
    action: raise specified NetworkError subclasses with informative messages
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Generic error handling masks specific issues like RequestTimeout, DDoSProtection, or ExchangeNotAvailable,
      preventing proper retry logic and causing trading failures to go unaddressed.
    stage_ids:
    - network_request
  - id: finance-C-024
    when: When implementing retry logic for failed network requests
    action: only retry on OperationFailed subclasses and honor maxRetriesOnFailure parameter
    severity: high
    kind: domain_rule
    modality: must
    consequence: Retrying non-recoverable errors (authentication failures, invalid parameters) causes unnecessary API load,
      delays error detection, and may trigger additional rate limit violations.
    stage_ids:
    - network_request
  - id: finance-C-028
    when: When parsing OHLCV candle data from any exchange
    action: normalize OHLCV arrays to [timestamp, open, high, low, close, volume] six-element format
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent OHLCV array indexing across exchanges causes indicator calculations to use wrong price values,
      leading to incorrect trading signals and strategy failures
    stage_ids:
    - response_parsing
  - id: finance-C-029
    when: When implementing safe_* extraction methods for exchange response fields
    action: return None as default value when key is missing instead of raising exceptions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Raising exceptions on missing optional fields causes the entire parsing pipeline to fail, resulting in complete
      data loss when exchanges omit optional fields in responses
    stage_ids:
    - response_parsing
  - id: finance-C-030
    when: When deriving missing balance components from available values
    action: derive missing free/used/total balance fields using Precise.string_add and string_sub
    severity: high
    kind: domain_rule
    modality: must
    consequence: Different exchanges return different balance field combinations; missing derivation logic causes incomplete
      balance data that breaks portfolio calculations and margin checks
    stage_ids:
    - response_parsing
  - id: finance-C-032
    when: When storing numeric values internally after parsing exchange responses
    action: convert numeric values to strings using self.number (number_to_string) before internal storage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Storing float values internally causes precision loss and inconsistent behavior when self.number is configured
      for string representation, leading to silent data corruption in financial calculations
    stage_ids:
    - response_parsing
  - id: finance-C-033
    when: When implementing exchange-specific parse_* methods
    action: override base parse_* methods in derived exchange classes for unique API response formats
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using generic parsing when exchange returns non-standard format causes field misalignment, resulting in orders
      being created with wrong prices or amounts
    stage_ids:
    - response_parsing
  - id: finance-C-034
    when: When using parse_number to convert string values back to numeric types
    action: route conversion through self.number (which may be float or number_to_string) to maintain consistency
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Direct float conversion bypasses the number configuration, causing inconsistency between internal representation
      and external API calls that use number_to_string
    stage_ids:
    - response_parsing
  - id: finance-C-035
    when: When parsing numeric fee values from exchange responses
    action: handle division by zero gracefully and return None when divisor is zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero exception when parsing fee rates crashes the order parsing pipeline, preventing order history
      retrieval and trade reporting
    stage_ids:
    - response_parsing
  - id: finance-C-036
    when: When implementing safe_* methods for response parsing
    action: check for both KeyError and empty string values before returning extracted data
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Exchanges that return empty strings instead of null cause silent failures where empty string '""' is used
      in calculations, producing invalid numeric results
    stage_ids:
    - response_parsing
  - id: finance-C-040
    when: When implementing Future.race() with empty futures list
    action: raise an exception immediately, not return a pending future
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning a pending future for empty race causes caller to hang indefinitely, blocking the entire WebSocket
      event loop from processing other messages
    stage_ids:
    - websocket_streaming
  - id: finance-C-041
    when: When implementing OHLCV candle caching per symbol per timeframe
    action: default to OHLCVLimit=1000 entries maximum per cache
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unlimited cache growth causes unbounded memory consumption during extended streaming sessions, eventually
      leading to out-of-memory crashes
    stage_ids:
    - websocket_streaming
  - id: finance-C-042
    when: When implementing exchange-specific message parsing
    action: extend handle_* methods for per-exchange message format handling
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exchanges with non-standard message formats cause parsing failures when handle_* methods are not properly
      extended, resulting in lost market data
    stage_ids:
    - websocket_streaming
  - id: finance-C-043
    when: When implementing WebSocket OrderBook variants
    action: select correct OrderBook variant based on exchange delta format (absolute volume vs order counts vs order IDs)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using wrong OrderBook variant causes order book state to become corrupted as deltas are applied with incorrect
      semantics, leading to incorrect pricing data
    stage_ids:
    - websocket_streaming
  - id: finance-C-044
    when: When implementing WebSocket reconnection logic
    action: apply exponential backoff delay on subsequent connection attempts
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Repeated immediate reconnection attempts flood the exchange API, triggering rate limit bans and causing extended
      service disruption
    stage_ids:
    - websocket_streaming
  - id: finance-C-045
    when: When sending WebSocket subscription messages
    action: apply rate limiting via throttle() before sending subscription requests
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding exchange rate limits causes subscription failures and potential temporary IP bans from the exchange
    stage_ids:
    - websocket_streaming
  - id: finance-C-046
    when: When implementing WebSocket connection keepalive
    action: set keepAlive interval and maxPingPongMisses threshold to detect stale connections
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without keepalive monitoring, dead connections go undetected, causing the system to block indefinitely waiting
      for market data that never arrives
    stage_ids:
    - websocket_streaming
  - id: finance-C-047
    when: When implementing WebSocket Future.race() for multiple subscriptions
    action: use done-callback pattern instead of create_task(wait) to avoid asyncio Task churn
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: High-frequency message updates create excessive asyncio Task overhead, causing CPU starvation and message
      processing delays during peak market activity
    stage_ids:
    - websocket_streaming
  - id: finance-C-048
    when: When implementing WebSocket connection timeout
    action: enforce connectionTimeout of 10000ms as default connection establishment deadline
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without connection timeout, failed connections block indefinitely, preventing failover to alternative connections
      during exchange connectivity issues
    stage_ids:
    - websocket_streaming
  - id: finance-C-049
    when: When implementing WebSocket message sending
    action: send messages after connection is closed
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Attempting to send on a closed connection raises ConnectionError, breaking the subscription loop and losing
      market data stream
    stage_ids:
    - websocket_streaming
  - id: finance-C-050
    when: When implementing WebSocket order book nonce validation
    action: reject delta updates with nonce less than current nonce to prevent stale data application
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying stale deltas with older nonces causes order book state to regress, resulting in incorrect bid/ask
      prices and failed trade execution
    stage_ids:
    - websocket_streaming
  - id: finance-C-051
    when: When handling WebSocket ping/pong keepalive messages
    action: disable aiohttp autoping and respond to server pings with pong manually
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: With aiohttp autoping enabled, pong responses are consumed internally, preventing WSMsgType.PONG events and
      breaking keepalive detection
    stage_ids:
    - websocket_streaming
  - id: finance-C-052
    when: When implementing WebSocket order book depth limiting
    action: enforce depth limit by pruning price levels beyond configured depth
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unlimited order book growth causes memory exhaustion and degraded performance during high-liquidity market
      conditions
    stage_ids:
    - websocket_streaming
  - id: finance-C-053
    when: When using WebSocket streaming for market data
    action: claim WebSocket data provides identical results to live trading execution
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting real-time market data as execution proof misleads stakeholders about actual trading performance
      and violates financial transparency requirements
    stage_ids:
    - websocket_streaming
  - id: finance-C-054
    when: When implementing WebSocket subscription deduplication
    action: check if subscription_hash already exists before creating duplicate subscription
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate subscriptions cause double message delivery and increased rate limit consumption, potentially triggering
      exchange rate limit bans
    stage_ids:
    - websocket_streaming
  - id: finance-C-055
    when: When implementing WebSocket binary message decompression
    action: apply gunzip or inflate decompression based on connection configuration before parsing
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Compressed binary messages parsed as raw data cause JSON decode errors and complete loss of market data for
      exchanges requiring decompression
    stage_ids:
    - websocket_streaming
  - id: finance-C-058
    when: When calculating fees using calculate_fee() or calculate_fee_with_rate()
    action: Use market['feeSide'] to determine the correct fee currency (quote, base, get, give, settle)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fee calculations will be in the wrong currency, causing incorrect PnL reporting and potential account balance
      mismatches
    stage_ids:
    - trading_operations
  - id: finance-C-060
    when: When creating market orders with calculate_fee_with_rate()
    action: Override takerOrMaker parameter to 'taker' for market orders, regardless of input value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fee calculations will be incorrect because market orders cannot be maker orders
    stage_ids:
    - trading_operations
  - id: finance-C-061
    when: When using create_market_order_with_cost() or related methods
    action: Pass non-spot market symbols to createMarketOrderWithCost functions
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Order creation will fail with NotSupported exception because these functions only support spot markets
    stage_ids:
    - trading_operations
  - id: finance-C-062
    when: When implementing rate limiting for trading operations
    action: Respect the exchange-specific rateLimit (default 2000ms) and enableRateLimit flag
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Excessive API requests will trigger rate limit exceptions, causing trading operations to fail and potential
      account restrictions
    stage_ids:
    - trading_operations
  - id: finance-C-063
    when: When using create_orders() for batch order creation
    action: Pass spot market symbols to createOrders() which only supports contract trading
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Batch order creation will fail with NotSupported exception for spot market symbols
    stage_ids:
    - trading_operations
  - id: finance-C-064
    when: When calling set_margin_mode() on Binance
    action: Provide a symbol argument when changing margin mode
    severity: high
    kind: domain_rule
    modality: must
    consequence: Margin mode change will fail with ArgumentsRequired exception because symbol is required
    stage_ids:
    - trading_operations
  - id: finance-C-065
    when: When calling set_position_mode() or set_margin_mode()
    action: Verify no open positions exist before changing position mode or margin type
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Position mode or margin type changes will fail with error code -4048 if positions are open, preventing trading
      operations
    stage_ids:
    - trading_operations
  - id: finance-C-067
    when: When implementing check_order_arguments validation
    action: Execute validation before any API call to verify fail-fast behavior
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Invalid order parameters will be sent to exchange, consuming API quota and causing unnecessary network requests
    stage_ids:
    - trading_operations
  - id: finance-C-068
    when: When implementing fee calculations for derivatives
    action: Use 'settle' currency for fee instead of quote/base for non-spot markets
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fee calculations for futures/perpetual contracts will be in wrong currency, causing incorrect cost tracking
    stage_ids:
    - trading_operations
  - id: finance-C-069
    when: When calculating fee costs for market orders
    action: Calculate cost as amount multiplied by price when using quote currency for fees
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fee cost will be calculated incorrectly, causing misreported trading costs and PnL
    stage_ids:
    - trading_operations
  - id: finance-C-070
    when: When representing balance values after calling safe_balance()
    action: Verify free + used equals total for each currency code, computing missing values from known values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Balance accounting will be inconsistent if free, used, total do not sum correctly, causing incorrect available
      balance calculations
    stage_ids:
    - trading_operations
  - id: finance-C-073
    when: When parsing order book, trades, or positions without explicit market context
    action: use safe_market() with marketId to lookup symbol context from loaded markets
    severity: high
    kind: domain_rule
    modality: must
    consequence: safe_market returns incomplete structure (all None values) causing null reference errors in price precision
      and fee calculations
    stage_ids:
    - market_currency_loading
    - response_parsing
  - id: finance-C-077
    when: When executing rate-limited API requests
    action: respect exchange rate limits by calling throttle() before fetching
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exchange rate limits trigger DDoSProtection errors, temporarily blocking all API access for the exchange
    stage_ids:
    - request_construction
    - network_request
  - id: finance-C-078
    when: When receiving HTTP responses from exchange APIs
    action: parse JSON responses only when Content-Type indicates JSON format
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-JSON responses (HTML error pages, empty bodies) cause ValueError exceptions corrupting response handling
    stage_ids:
    - network_request
    - response_parsing
  - id: finance-C-080
    when: When parsing JSON responses containing numeric trade/order values
    action: convert numeric strings to proper numeric types using parse_number()
    severity: high
    kind: domain_rule
    modality: must
    consequence: String values used in arithmetic operations cause TypeError exceptions in PnL and position size calculations
    stage_ids:
    - network_request
    - response_parsing
  - id: finance-C-081
    when: When parsing timestamp values from exchange responses
    action: convert timestamps to integer milliseconds since epoch
    severity: high
    kind: domain_rule
    modality: must
    consequence: Timestamp mismatch between trading operations causes incorrect order matching and position tracking
    stage_ids:
    - network_request
    - response_parsing
  - id: finance-C-083
    when: When parsing orders from response arrays or dictionaries
    action: handle both array and dictionary response formats and normalize to list of orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Trading operations receive incorrect order counts causing portfolio tracking errors and missed fills
    stage_ids:
    - response_parsing
    - trading_operations
  - id: finance-C-085
    when: When establishing WebSocket connections for real-time streaming
    action: maintain persistent connection and handle reconnection with sequence number continuity
    severity: high
    kind: resource_boundary
    modality: must
    consequence: WebSocket disconnection causes missed market data updates, leading to stale order books and incorrect trade
      signals
    stage_ids:
    - network_request
    - websocket_streaming
  - id: finance-C-086
    when: When using WebSocket streaming for order book or trade data
    action: pass loaded market context to WebSocket message parsers for symbol normalization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: WebSocket messages parsed without market context cause symbol mismatches in multi-symbol subscriptions
    stage_ids:
    - market_currency_loading
    - network_request
    - websocket_streaming
  - id: finance-C-087
    when: When constructing numeric values for fee calculations and trade costs
    action: use Precise class for decimal arithmetic to avoid floating-point precision errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Floating-point rounding errors in fee calculations accumulate over time, causing balance discrepancies and
      accounting errors
    stage_ids:
    - response_parsing
    - trading_operations
  - id: finance-C-089
    when: When handling order book snapshots and incremental updates
    action: apply delta updates to existing order book state before returning to trading operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Order book state corruption causes incorrect price discovery and failed limit order fills
    stage_ids:
    - response_parsing
    - trading_operations
  - id: finance-C-091
    when: When fetching market data without authentication
    action: load markets first to enable public market data parsing with symbol context
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Public endpoints return market data without symbol normalization, causing inconsistent price/volume data
      across exchanges
    stage_ids:
    - market_currency_loading
    - request_construction
  - id: finance-C-093
    when: When parsing trading fee rates from exchange responses
    action: normalize fee rates to decimal format (0.001 = 0.1%) for consistent calculation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Incorrect fee rate interpretation causes revenue accounting errors and incorrect profit calculations
    stage_ids:
    - network_request
    - response_parsing
  - id: finance-C-095
    when: When network latency causes order fill delays
    action: implement order timeout and cancellation retry logic to prevent duplicate executions
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Duplicate order submissions from network timeouts cause unintended position sizes and potential margin calls
    stage_ids:
    - request_construction
    - network_request
  - id: finance-C-096
    when: When parsing liquidation data from exchange responses
    action: calculate baseValue and quoteValue from contracts, contractSize, and price when not provided
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing liquidation value calculations cause incorrect risk monitoring and failed auto-deleveraging detection
    stage_ids:
    - response_parsing
    - trading_operations
  - id: finance-C-097
    when: When handling OHLCV candle construction from trade data
    action: filter trades by timestamp >= since parameter and respect limit constraints
    severity: medium
    kind: domain_rule
    modality: must
    consequence: OHLCV candles include trades outside requested time range, causing incorrect technical indicator calculations
    stage_ids:
    - response_parsing
    - trading_operations
  - id: finance-C-099
    when: When the code looks simple and seems to not need testing
    action: skip data validation tests that verify market loading and response parsing correctness
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Unvalidated data flows cause cascading failures when market symbols or response formats change between exchange
      API versions
    stage_ids:
    - market_currency_loading
    - response_parsing
  - id: finance-C-103
    when: When accessing account balance information
    action: Access balance via the 'free', 'used', 'total' keys at the top level of balance dictionaries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Balance dicts must have 'free', 'used', 'total' at top level; accessing wrong keys causes KeyError or returns
      None
  - id: finance-C-104
    when: When working with order book data
    action: Use OrderBook dicts containing 'bids', 'asks', 'timestamp', 'nonce', 'symbol' keys
    severity: high
    kind: domain_rule
    modality: must
    consequence: OrderBook structure must contain 'bids', 'asks', 'timestamp', 'nonce', 'symbol'; missing keys cause KeyError
      in order book processing
  - id: finance-C-106
    when: When configuring exchange-specific settings via describe() method
    action: Use deep_extend(super().describe(), {...}) pattern for configuration inheritance
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Configuration must use deep_extend pattern; incorrect inheritance causes settings to override parent class
      defaults improperly
  - id: finance-C-109
    when: When using rate limiting for API requests
    action: Enable rate limiting with enableRateLimit=True as a global business assumption for each exchanges
    severity: high
    kind: resource_boundary
    modality: must
    consequence: All exchanges enforce rate limits; disabling rate limiting causes RateLimitExceeded errors and potential
      account suspension or IP bans from exchanges
    stage_ids:
    - network_request
  - id: finance-C-110
    when: When making API requests to cryptocurrency exchanges
    action: Respect exchange rate limits (default 2000 milliseconds between requests) and use specified rate limiter algorithm
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exchanges enforce rate limits to protect infrastructure; exceeding limits causes RateLimitExceeded or DDoSProtection
      errors and temporary or permanent API access loss
    stage_ids:
    - network_request
  - id: finance-C-111
    when: When authenticating with exchanges that require nonce/timestamp
    action: Verify system clock is NTP-synchronized and use only one exchange instance per API key to prevent InvalidNonce
      errors
    severity: high
    kind: resource_boundary
    modality: must
    consequence: InvalidNonce errors occur from clock desynchronization or nonce collisions from multiple instances sharing
      the same API key
  - id: finance-C-112
    when: When managing WebSocket connections
    action: 'Follow WS connection lifecycle: connect -> on_connected_callback -> subscriptions -> on_close_callback and properly
      close connections when done'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Improper WebSocket lifecycle management causes memory leaks, zombie connections, and eventual connection
      failures
  - id: finance-C-113
    when: When requiring real-time market data updates
    action: Use WebSocket (watch*) methods instead of polling REST (fetch*) methods for real-time monitoring
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Using REST polling for real-time data causes high latency, rate limit exhaustion, and excessive network traffic
      compared to WebSocket subscriptions
  - id: finance-C-114
    when: When presenting CCXT capabilities to users or in documentation
    action: Claim that CCXT is a trading service, custody solution, or financial advisor
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: CCXT is free open source non-custodian API broker software; claiming it provides trading services, holds
      user funds, or offers financial advice violates the MIT license and misrepresents the software's nature
  - id: finance-C-115
    when: When users build trading systems based on CCXT
    action: Claim that CCXT provides guarantees against financial losses or market volatility
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: CCXT provides an API interface only; it cannot guarantee trading profitability, protect against market losses,
      or predict market movements
  - id: finance-C-116
    when: When building automated trading systems for non-cryptocurrency markets
    action: Claim CCXT supports non-cryptocurrency trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: CCXT is designed exclusively for cryptocurrency exchanges; using it for non-crypto markets causes failures
      and unsupported behavior
  - id: finance-C-117
    when: When users lack technical development skills and attempt to use CCXT
    action: Claim CCXT is suitable for users without technical development skills
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: CCXT is a developer library requiring programming skills; non-technical users will encounter API errors,
      configuration issues, and unable to troubleshoot problems
  - id: finance-C-118
    when: When requiring sub-millisecond latency for real-time trading
    action: Claim CCXT alone provides sub-millisecond latency for real-time trading without additional infrastructure
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: CCXT is an API library with network overhead; achieving sub-millisecond latency requires specialized infrastructure
      (co-location, FPGA, direct exchange feeds) beyond CCXT's capabilities
  - id: finance-C-120
    when: When using multiple exchange instances with the same API credentials
    action: Share a single exchange instance across multiple concurrent operations using the same API key pair
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Multiple instances sharing API keys cause nonce collisions resulting in InvalidNonce errors and failed orders
  - id: finance-C-121
    when: When using Python async code with CCXT
    action: Close the exchange instance properly with await exchange.close() when done using ccxt.async_support
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Not closing async exchange instances causes resource leaks, hanging connections, and eventual memory exhaustion
  - id: finance-C-122
    when: When checking if an exchange supports a particular feature
    action: Verify feature availability by checking exchange.has['methodName'] before calling any exchange method
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Calling unsupported methods causes NotSupported errors; checking exchange.has prevents failures from unavailable
      features
  - id: finance-C-123
    when: When executing private API calls without API keys
    action: Obtain API keys from exchange websites before using private APIs (trading, balance, order management)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Private APIs require authentication; calling them without valid API keys causes AuthenticationError
  - id: finance-C-124
    when: When implementing PostOnly order submission in trading strategy code
    action: Verify PostOnly orders automatically set timeInForce to PO, which causes the order to be cancelled if it would
      take liquidity instead of filling as maker
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without automatic timeInForce=PO setting, PostOnly orders may accidentally take liquidity and incur maker-to-taker
      fees, causing live trading costs to exceed backtest estimates
    derived_from_bd_id: BD-030
  - id: finance-C-125
    when: When resolving marketId conflicts between spot and derivatives markets
    action: Explicitly qualify non-spot markets (futures, swaps, options) with full symbol specification when duplicate marketIds
      exist, because spot markets are inserted first by default
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit qualification, spot markets are silently selected over derivatives causing orders to execute
      on wrong asset class, producing completely incorrect PnL and position calculations
    derived_from_bd_id: BD-002
  - id: finance-C-126
    when: When processing response data from safe_* methods (safe_float, safe_integer, etc.)
    action: Verify that None values returned by safe_* methods are properly distinguished from zero values in financial calculations,
      as None indicates missing data rather than zero
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Treating None as 0 in cost or position calculations silently propagates missing data, causing incorrect order
      sizing and PnL reporting that may remain undetected until significant losses accumulate
    derived_from_bd_id: BD-010
  - id: finance-C-127
    when: When configuring decimal precision for price and quantity rounding
    action: Use precisionMode=TRUNCATE for financial calculations where truncation is required, because the default precisionMode=ROUND
      rounds to nearest integer which may introduce rounding bias in price precision
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: ROUND mode with DECIMAL_PLACES rounds price precision to nearest step, potentially rounding up costs for
      sell orders or increasing slippage on buys, systematically overestimating profits in backtests
    derived_from_bd_id: BD-076
  - id: finance-C-128
    when: When handling high-precision numeric values in financial calculations
    action: Implement explicit precision validation for very high-precision assets (e.g., DeFi tokens with many decimal places)
      because decimal_to_precision caps precision at context.prec - 2
    severity: high
    kind: domain_rule
    modality: must
    consequence: Precision cap causes trailing digits to be lost for high-precision tokens, resulting in rounding errors in
      order sizing and cost calculations that accumulate in high-frequency strategies
    derived_from_bd_id: BD-076
  - id: finance-C-129
    when: When processing values in decimal_to_precision function
    action: Validate that numeric precision requirements do not exceed context.prec - 2 because the function caps precision
      at this threshold to prevent floating-point overflow
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Exceeding context.prec - 2 precision causes trailing digit loss, leading to incorrect price normalization
      for high-precision assets and potential order rejection due to invalid precision
    derived_from_bd_id: BD-108
  - id: finance-C-130
    when: When implementing order sizing and cost calculations in financial operations
    action: Use the Precise class with string representation for order sizing and cost calculations requiring precision, because
      floating-point arithmetic introduces rounding errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using native float arithmetic for cost calculations introduces rounding errors that accumulate in high-frequency
      trading, causing small but systematic discrepancies between expected and actual costs
    derived_from_bd_id: BD-011
  - id: finance-C-132
    when: When implementing heartbeat or timeout mechanisms in trading strategy initialization
    action: Execute cancelAllOrdersAfter to cancel each open orders upon heartbeat timeout failure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping the dead man's switch allows strategies to continue executing with lost network connectivity or
      stale market data, potentially causing unlimited losses as positions remain open without proper risk controls
    derived_from_bd_id: BD-037
  - id: finance-C-133
    when: When implementing fee-sensitive trading strategies that rely on maker fee capture
    action: Replace PostOnly orders with standard limit orders — PostOnly ensures orders only execute as makers and cancel
      if they would take liquidity
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Using regular limit orders instead of PostOnly allows orders to take liquidity, causing taker fee payments
      (typically 2-5x maker fees) which erode strategy margins and make backtest results non-reproducible in live trading
    derived_from_bd_id: BD-043
  - id: finance-C-134
    when: When implementing network request logic in restricted network environments
    action: Verify that proxy environment variables (HTTP_PROXY, HTTPS_PROXY, SOCKS_PROXY) are properly detected and utilized
      for network requests to prevent connection failures in corporate firewalls or geographic restrictions
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Without leveraging the framework's proxy detection mechanism, network requests in restricted environments
      will fail silently, causing trading bots to lose connectivity and miss market opportunities during critical periods
    derived_from_bd_id: BD-008
  - id: finance-C-136
    when: When initializing trading bots that check exchange capabilities during setup
    action: Call loadMarkets() before any has{} capability checks — capabilities are only accurately known after markets are
      loaded; checking capabilities before market load returns stale or incomplete information
    severity: high
    kind: domain_rule
    modality: must
    consequence: Checking capabilities before loadMarkets() returns stale has{} values, causing code to incorrectly enable
      methods that will fail or disable methods that would work, leading to runtime errors during trading operations
    derived_from_bd_id: BD-114
  - id: finance-C-137
    when: When implementing HTTP request logic with exchange API calls
    action: Verify that timeout=10000ms (10 seconds) is sufficient for your network conditions and operation types — long-running
      operations like large order book sync may require higher timeout values configured per-call
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using the default 10-second timeout for operations requiring longer response times causes premature request
      termination, exhausting connection pools and causing trading failures during critical data synchronization
    derived_from_bd_id: BD-082
  - id: finance-C-141
    when: When implementing multi-order execution logic in backtesting
    action: Use batch order creation (create_orders) for multi-leg strategies to reduce API calls and maintain execution atomicity;
      do not convert to sequential individual create_order calls
    severity: high
    kind: domain_rule
    modality: must
    consequence: Converting batch orders to sequential calls introduces execution latency and breaks atomicity for spread/arbitrage
      strategies; price slippage between sequential orders causes backtest-live inconsistency
    derived_from_bd_id: BD-048
  - id: finance-C-142
    when: When implementing multi-leg order submission logic
    action: Use batch submission (create_orders) for sending multiple orders in a single request; do not split into individual
      create_order calls which adds latency and loses atomicity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Splitting batch orders into individual calls adds network round-trip latency and breaks atomicity; spread
      strategies may receive partial fills at worse prices, causing backtest results to overestimate live performance
    derived_from_bd_id: BD-019
  - id: finance-C-143
    when: When implementing market order sizing in backtesting
    action: Use the 'cost' parameter for quote-currency sizing (USD, not BTC) for market orders only; limit orders must use
      'amount' parameter in base currency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using cost parameter for limit orders or amount for market orders produces incorrect order sizes; strategies
      expecting $1000 orders may receive 1000 BTC orders, causing catastrophic position sizing errors
    derived_from_bd_id: BD-020
  - id: finance-C-144
    when: When configuring rate limiting for OKX exchange integration
    action: Set rateLimit to 110ms with 10% tolerance buffer (effective 121ms ceiling); verify this matches your API tier
      limits before backtesting
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default 2000ms rate limit for OKX severely underutilizes API capacity and slows execution; using tighter
      110ms without tolerance risks intermittent 429 errors during peak latency causing missed signals
    derived_from_bd_id: BD-023
  - id: finance-C-145
    when: When configuring WebSocket connection health monitoring
    action: Set max ping/pong misses to 2 for connection health detection; verify this balances failure sensitivity with network
      jitter tolerance for your use case
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Setting misses to 1 causes false positive disconnections during normal network jitter; setting to 3+ delays
      critical reconnection during actual failures, causing extended data gaps in live trading
    derived_from_bd_id: BD-025
  - id: finance-C-146
    when: When using the framework's default rate limit parameter for exchange initialization
    action: Verify rateLimit=2000ms matches your exchange's actual rate limit tier; high-frequency strategies should override
      with exchange-specific values (e.g., 110ms for OKX with tolerance)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Default 2000ms severely throttles exchanges with higher rate limits (e.g., Binance allows 1200 req/min);
      backtests run 6-10x slower than possible, causing strategies to miss time-sensitive signals
    derived_from_bd_id: BD-073
  - id: finance-C-147
    when: When configuring demo trading URLs for strategy testing before live deployment
    action: Use demo trading URLs only for API integration testing and strategy dry runs; do NOT use demo data for backtesting
      as it may lag production by minutes to hours
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Backtesting on demo data that lags production causes strategies to execute on stale prices; live trading
      results will diverge significantly from backtested performance due to liquidity and price differences
    derived_from_bd_id: BD-050
  - id: finance-C-148
    when: When implementing balance parsing and debt calculation logic in margin trading
    action: Use Precise.string_add for debt calculations (borrowed + interest) to maintain exact decimal representation, not
      standard float arithmetic
    severity: high
    kind: domain_rule
    modality: must
    consequence: Float arithmetic on accumulated interest and borrowed principal causes sub-cent precision errors that cascade
      into incorrect margin assessments, potentially triggering premature or missed liquidation events
    derived_from_bd_id: BD-052
  - id: finance-C-149
    when: When implementing ledger entry parsing for credit/debit classification
    action: Use Precise.string_le for comparing income amounts to zero to determine ledger entry direction, not standard float
      comparison operators
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using float comparison for income direction causes incorrect classification of funding transactions, fee
      payments, and PnL movements, corrupting ledger history with reversed debit/credit entries
    derived_from_bd_id: BD-062
  - id: finance-C-150
    when: When implementing Binance portfolio margin mode PNL aggregation
    action: Use string-based addition for aggregating totalWalletBalance and totalUnrealizedPNL, not float arithmetic, to
      maintain precision for margin ratio calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Float truncation in PNL aggregation causes margin ratio miscalculations by fractions of cents, leading to
      incorrect buying power and margin capacity assessments for new positions
    derived_from_bd_id: BD-063
  - id: finance-C-152
    when: When creating orders on OKX exchange without explicit time-in-force specification
    action: Verify that GTC (Good Till Cancelled) default behavior matches trading strategy requirements, and explicitly set
      timeInForce if IOC or FOK order behavior is needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: GTC orders persist indefinitely until filled or cancelled; without proper cancel handling, stale orders may
      execute at unfavorable prices or block capital allocation unexpectedly
    derived_from_bd_id: BD-028
  - id: finance-C-153
    when: When implementing Bitmex position sizing with precision conversion and contract multiplier
    action: Validate precision conversion AND multiplier together; apply dual-check validation where lot-to-real conversion
      (dividing by precision) is verified against a known quantity before the 100x multiplier is applied
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Precision conversion error gets amplified 100x by the Bitmex contract multiplier — a 0.01 BTC conversion
      error becomes a 1 BTC margin error in high-leverage scenarios, creating catastrophic position sizing risk
    derived_from_bd_id: BD-113
  - id: finance-C-154
    when: When deploying the framework in corporate environments with SSL inspection proxies
    action: Include OS certificates as a compatibility layer while maintaining SSL verification enforcement; do not disable
      verification for proxy compatibility — instead verify OS cert store is properly configured
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Disabling SSL verification for corporate proxy compatibility exposes API keys to interception, while strict
      verification without OS certs causes silent connection failures breaking all exchange communications
    derived_from_bd_id: BD-115
  - id: finance-C-155
    when: When implementing balance calculation logic in spot account order validation
    action: Calculate total balance as free + used (locked) — do not use separate total tracking
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing balance calculation breaks order placement validation, allowing orders that exceed available funds
      to be placed; in live trading this causes rejected orders and potential margin issues
    derived_from_bd_id: BD-065
  - id: finance-C-156
    when: When implementing order book indexing and sort operations
    action: Modify the OrderBookSide.side class attribute (True=bids, False=asks) or refactor to enum at runtime — the attribute
      is a compile-time constant
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Changing the side attribute value or refactoring to enum after instantiation corrupts existing order book
      state, causing bid/ask arrays to be swapped and all subsequent trading decisions to use wrong price levels
    derived_from_bd_id: BD-074
  - id: finance-C-157
    when: When parsing order responses from exchanges
    action: Derive missing order amount as filled + remaining when amount field is absent — validate this reconstruction against
      order modification events
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing amount reconstruction assumes no order modifications occurred; modified orders show incorrect totals,
      causing position tracking errors that accumulate over time
    derived_from_bd_id: BD-032
  - id: finance-C-158
    when: When calculating average price for futures contracts
    action: Use inverse formula (notional = 1/price) for inverse contracts and linear formula (notional = price * quantity)
      for linear contracts — do not use a single formula for both
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying the wrong formula for contract type causes systematic P&L miscalculation; inverse contracts show
      wrong profit/loss that accumulates significantly in high-volume trading
    derived_from_bd_id: BD-033
  - id: finance-C-159
    when: When calculating net P&L with reduceFees option enabled
    action: Apply fee reduction per-currency when reduceFees flag is set — verify currency-specific rebate settlement, not
      global fee reduction
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Applying global fee reduction instead of per-currency loses rebate specificity; net P&L calculations show
      incorrect profitability, especially for multi-currency portfolios with different rebate rates
    derived_from_bd_id: BD-036
  - id: finance-C-160
    when: When submitting market orders to exchanges
    action: Automatically set TimeInForce to IOC (Immediate Or Cancel) for market orders — partial fills are expected and
      no unfilled portion should remain on the book
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting GTC for market orders leaves unfilled portions on the book at market price, causing unexpected positions
      and potential adverse fills when prices move
    derived_from_bd_id: BD-029
  - id: finance-C-161
    when: When parsing balance responses from heterogeneous exchanges
    action: Derive missing balance fields from available fields (total = free + used, or free = total - used) to normalize
      heterogeneous exchange responses
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning null for missing balance fields breaks all downstream calculations that depend on balance data,
      causing position sizing and order validation to fail silently
    derived_from_bd_id: BD-031
  - id: finance-C-162
    when: When processing market order fills with empty price field
    action: Use average price from trades when explicit price is unavailable — do not leave price as null
    severity: high
    kind: domain_rule
    modality: must
    consequence: Null price for market orders breaks cost basis tracking and all price-based calculations, causing incorrect
      realized P&L and position valuation
    derived_from_bd_id: BD-035
  - id: finance-C-163
    when: When encoding or decoding Ethereum ABI types using the predicate registry
    action: Verify only one predicate matches each type string — if multiple predicates could match the same type, catch MultipleEntriesFound
      error explicitly
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Multiple matching predicates raises MultipleEntriesFound error, breaking all encoding/decoding for that type
      and causing transaction failures for affected contracts
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-164
    when: When deserializing Ethereum ABI-encoded data using frame-based stream reading
    action: Validate incoming contract data for ABI compliance before deserialization — do not assume each contracts produce
      valid ABI-encoded output
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Malformed contract data causes deserialization to fail silently or produce incorrect values, leading to wrong
      parameter interpretation in smart contract calls
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-165
    when: When implementing HD wallet derivation paths using BIP44 path levels
    action: Use named constants Bip44Levels (MASTER=0, PURPOSE=1, COIN=2, ACCOUNT=3, CHANGE=4, ADDRESS_INDEX=5) rather than
      direct integer values to prevent off-by-one errors and maintain BIP-44 compatibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using hardcoded integers (e.g., 0, 1, 2) instead of named constants risks off-by-one errors in path construction,
      causing funds to be derived from wrong derivation paths and breaking wallet interoperability with BIP-44 compliant wallets
    derived_from_bd_id: BD-078
  - id: finance-C-166
    when: When implementing concurrent WebSocket message handling with Future.race()
    action: Handle CancellationError from losing futures when race() cancels them - implement proper cleanup in try-except
      blocks around race() calls to prevent unhandled exceptions from crashing the WebSocket connection handler
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Race semantics cancel losing futures; unhandled CancellationError propagates as unhandled exception, causing
      WebSocket connection to crash and disrupting real-time data feed subscriptions
    derived_from_bd_id: BD-091
  - id: finance-C-167
    when: When implementing HD wallet coin type derivation using SLIP-0044 constants
    action: Use official SLIP-0044 registry constants (ETH=60, BTC=0, ATOM=118, etc.) - never use unregistered coin types
      or custom integer values to verify cross-wallet address generation compatibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using unregistered coin types or non-standard values causes addresses to be generated with incompatible derivation
      paths, breaking interoperability with other HD wallets and potentially sending funds to non-recoverable addresses
    derived_from_bd_id: BD-092
  - id: finance-C-168
    when: When implementing MEXC WebSocket message deserialization with protobuf message names
    action: Assume stable message names across API versions - code must handle deserialization failures gracefully and update
      proto definitions when MEXC server-side message names change (PublicDealsV3Api, PrivateOrdersV3Api, etc.)
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Protobuf message names are the exact API contract with MEXC servers; server-side message name changes cause
      silent deserialization failures, resulting in missing order and trade data without obvious error indication
    derived_from_bd_id: BD-093
  - id: finance-C-169
    when: When using Binance exchange's fetchDepositWithdrawFee for cost estimation in trading strategies
    action: Verify emulated fee values match actual Binance fee schedule before executing large transactions - cross-reference
      with Binance official fee page as emulated fees may differ from actual charges by significant margins
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Emulated deposit/withdrawal fees may significantly differ from actual Binance charges, causing strategies
      to underestimate transaction costs by 10-50% for large withdrawals, leading to unprofitable trades that appear profitable
      in backtest
    derived_from_bd_id: BD-039
  - id: finance-C-170
    when: When using Binance exchange's fetchLeverage for margin risk assessment
    action: Verify emulated leverage values against actual position leverage before margin call scenarios - emulated leverage
      may not reflect actual account leverage setting, creating false sense of risk safety
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Emulated leverage values that don't match actual account settings cause incorrect margin calculations, potentially
      allowing positions that trigger unexpected margin calls or liquidations when actual leverage is higher than assumed
    derived_from_bd_id: BD-041
  - id: finance-C-171
    when: When retrieving OHLCV data without explicitly specifying timeframe parameter
    action: Verify the 1-minute default timeframe matches strategy requirements before data retrieval - strategies requiring
      longer timeframes (swing trading, position trading) should explicitly set timeframe to avoid excessive API calls and
      unintended data granularity
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 1-minute OHLCV data may be too granular for longer-term strategies, causing unnecessary API rate
      consumption and data processing overhead, or alternatively strategies that need finer granularity may not realize the
      default is already optimal
    derived_from_bd_id: BD-051
  - id: finance-C-172
    when: When calculating notional value and margin requirements for Bitmex perpetual swap positions
    action: Modify the multiplier parameter from its hardcoded value of 100 — the multiplier is fixed by Bitmex exchange specification
      and directly determines displayed leverage ratios and margin requirements
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Changing multiplier=100 causes incorrect notional value calculations; a 1 BTC position would be miscalculated,
      leading to wrong margin requirements and position sizing that either rejects valid trades or creates excessive leverage
      exposure beyond the intended 100x
    derived_from_bd_id: BD-056
  - id: finance-C-173
    when: When implementing margin calculation and liquidation logic for Bitmex perpetual swap positions
    action: Modify initMargin (0.03) or maintMargin (0.015) from their hardcoded exchange-specific values — these margin rates
      determine maximum leverage (33.33x initial) and the liquidation threshold
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using incorrect margin rates causes either premature liquidations (if margin requirements are overstated)
      or delayed liquidations (if understated), creating false safety assumptions in backtesting that cannot be reproduced
      in live trading where actual exchange margins apply
    derived_from_bd_id: BD-057
  - id: finance-C-174
    when: When fetching OHLCV historical data from Bitbank exchange without explicit limit parameter
    action: Verify that the limit parameter is explicitly set in API calls — if omitted, Bitbank defaults to 1000 candles
      which balances rate limits against data completeness; for complete historical analysis, verify pagination handles full
      date ranges
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Relying on implicit defaults without verification risks incomplete backtest data when fetching historical
      OHLCV; strategies may miss significant price action in date ranges beyond the 1000-candle window, causing backtest results
      that cannot be reproduced in live trading with full historical data
    derived_from_bd_id: BD-060
  - id: finance-C-175
    when: When implementing take-profit and stop-loss order creation for Bybit exchange
    action: Use the native createOrderWithTakeProfitAndStopLoss combined order function to verify atomic execution of both
      TP and SL legs — do not implement TP/SL using separate sequential orders
    severity: high
    kind: domain_rule
    modality: must
    consequence: Implementing TP/SL as separate orders leaves partial positions exposed when one leg executes without the
      other; in fast markets, slippage differences between separate orders create inconsistent exit pricing that cannot be
      reproduced in backtesting assuming atomic execution
    derived_from_bd_id: BD-045
  - id: finance-C-176
    when: When implementing BIP-32 hierarchical deterministic key derivation
    action: Use HMAC-SHA512 for key derivation and split the 64-byte output into IL (first 32 bytes as child key) and IR (last
      32 bytes as chain code) — IL must not be 0 or >= curve order n, and IR determines child key's derivation capability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect key derivation parameters causes child keys to be invalid or insecure, potentially resulting
      in loss of funds when derived addresses are used for transactions
    derived_from_bd_id: BD-106
  - id: finance-C-178
    when: When calculating contract cost and P&L for inverse perpetual swaps
    action: For inverse contracts, apply cost = contracts * contractSize / averagePrice using 1/price consistently from average
      price calculation — the formula must align with BD-033 inverse average price method
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatch between inverse average price formula and contract cost formula causes P&L calculation errors during
      fill reconstruction, leading to incorrect profit/loss reporting
    derived_from_bd_id: BD-117
  - id: finance-C-179
    when: When calling BingX exchange API with a since parameter
    action: Apply max(since-1, 0) to verify startTime is non-negative — BingX rejects negative startTime parameters and a
      value of 0 may cause unexpected behavior
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without max(since-1, 0), negative timestamps cause API rejection or data fetching failures, breaking historical
      data retrieval for strategies relying on since-based pagination
    derived_from_bd_id: BD-061
  - id: finance-C-180
    when: When signing Backpack exchange API requests
    action: Include nonce, timestamp, and recvWindow parameters in request signing for replay attack prevention — requests
      outside the recvWindow tolerance are rejected by the exchange
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without nonce-based signing, requests are vulnerable to replay attacks and requests outside recvWindow are
      rejected, causing silent order execution failures or stale orders
    derived_from_bd_id: BD-064
  - id: finance-C-181
    when: When fetching funding rates for perpetual contracts
    action: Extract lastFundingRate from the mark price response endpoint rather than polling a separate funding rate endpoint
      — this is the canonical source for funding cost forecasting
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using a separate funding rate endpoint increases API load without improving accuracy, and using incorrect
      rate values causes funding cost forecasting errors affecting position carry calculations
    derived_from_bd_id: BD-066
  - id: finance-C-182
    when: When parsing balance timestamps from Arkham exchange
    action: Multiply Arkham timestamps by 0.001 to convert from milliseconds to Unix epoch seconds — this conversion is required
      for consistent timestamp representation across internal data structures
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping the 0.001 millisecond-to-seconds conversion causes balance staleness detection to fail and sync
      logic to malfunction, leading to stale data being treated as current
    derived_from_bd_id: BD-054
  - id: finance-C-184
    when: When calculating trading profitability for Bitmex orders
    action: Account for Bitmex negative maker fee (-0.0001) where market makers receive rebates while takers pay 0.0005 —
      fee calculations must handle negative values correctly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ignoring negative maker fees causes profitability calculations to overstate trading costs, incorrectly marking
      maker strategies as unprofitable when they actually generate rebates
    derived_from_bd_id: BD-058
  - id: finance-C-185
    when: When implementing or extending ABI parsing for Starknet contracts
    action: Use separate parser and serializer implementations for each ABI version (v0, v1, v2); do not attempt to unify
      v0, v1, and v2 parsing into a single parser
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unifying ABI parsers creates version branching complexity that causes parsing failures for v0 contracts with
      simple types and v1/v2 contracts with complex types, leading to failed contract interactions
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-186
    when: When implementing or configuring margin trading functionality for exchanges supporting isolated and cross margin
      modes
    action: Explicitly determine and set the margin mode (isolated or cross) before executing margin trades; do not assume
      the default mode — verify through the exchange API or explicit configuration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect margin mode assumption causes miscalculated liquidation thresholds and collateral allocation, leading
      to unexpected liquidations or account health misrepresentation in live trading
    derived_from_bd_id: BD-070
  - id: finance-C-188
    when: When setting up or modifying Pro WebSocket test infrastructure structure
    action: Maintain the Exchange/ and base/ subdirectory structure mirroring REST test organization; do not flatten or reorganize
      test directories as automated test discovery depends on this layout
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Deviating from the expected test directory structure breaks automated test discovery and CI/CD pipelines,
      causing tests to be skipped and bugs to go undetected
    derived_from_bd_id: BD-088
  - id: finance-C-189
    when: When configuring rate-limiting for high-frequency exchanges (Bybit, Binance) in backtesting
    action: 'Override the default rateLimit=2000ms by setting exchange-specific values (Bybit: 20ms, Binance: 50ms) OR disabling
      enableRateLimit if targeting high-frequency trading performance'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Default 2000ms rate limiting causes 40-100x throughput loss on fast exchanges; users lose significant backtesting
      speed potential without realizing the optimization opportunity exists
    derived_from_bd_id: BD-111
  - id: finance-C-190
    when: When routing orders for accounts with both spot and derivatives capabilities in Binance portfolio margin mode
    action: Check account type via market type determination from account category before applying spot-first conflict resolution;
      for cross-margin portfolio margin accounts, defer to market type determination instead of defaulting to spot-first routing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Spot-first conflict resolution incorrectly routes spot orders to derivatives account modes in portfolio margin
      accounts, causing orders to execute in wrong mode or be rejected, leading to backtest-live inconsistency
    derived_from_bd_id: BD-116
  - id: finance-C-191
    when: When encoding smart contract function calls for Ethereum-based transactions
    action: Explicitly select either standard ABI encoding (32-byte zero-padded words) or packed encoding (tight concatenation)
      based on the target contract's expectations; must_not attempt mixed encoding which is not supported
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using the wrong encoding mode causes contract calls to fail or execute with corrupted parameters; silent
      failures occur when transactions appear to succeed but contract logic rejects the malformed input
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-192
    when: When implementing or refactoring BIP32 key derivation logic in the cryptocurrency library
    action: Maintain both SLIP-0010 (secp256k1 for Bitcoin/ETH) and Khovratovich/Law (ed25519 for ADA/Solana) key derivation
      algorithms through separate implementation paths
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Removing either algorithm breaks support for entire cryptocurrency families (ed25519 chains like Cardano/Solana
      or secp256k1 chains like Bitcoin/Ethereum), causing the framework to fail for affected exchanges and requiring significant
      rework
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-193
    when: When implementing or refactoring elliptic curve cryptography interfaces in the ECDSA module
    action: Maintain a unified curve abstraction interface supporting NIST p192/p224/p256 and secp256k1 curves through a common
      API, not curve-specific classes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Replacing the unified interface with curve-specific classes eliminates cross-chain compatibility, forcing
      separate implementations for Bitcoin (secp256k1) and traditional PKI (NIST curves), increasing code duplication and
      maintenance burden
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-194
    when: When implementing or refactoring exchange data parsing logic using the Lark parser library
    action: Maintain each three parsing algorithm options (Earley for ambiguous grammars, LALR for deterministic languages,
      CYK for simple parsing) and use algorithm selection based on grammar complexity requirements
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Defaulting to a single parsing algorithm (e.g., LALR for speed) causes parsing failures for complex or ambiguous
      exchange-specific grammars, leading to data parsing errors and incorrect market data interpretation
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-195
    when: When implementing or refactoring WebSocket subscription logic for real-time market data streaming
    action: Implement nested exchange→method→symbol subscription loops for parallel streaming, but include connection pooling
      and throttling to handle exchange WebSocket connection limits
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Removing the nested loop pattern or consolidating to single connections without proper throttling causes
      connection exhaustion errors, preventing the system from receiving market data updates for monitored symbols
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-196
    when: When implementing or refactoring any code involving stochastic processes in backtesting
    action: Assume the framework provides comprehensive random seed coverage for each stochastic components (NumPy random,
      Python random, trading simulators)
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit random seed management, backtest results become non-reproducible; running the same strategy
      twice produces different equity curves, making it impossible to validate strategy performance or debug issues
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-197
    when: When setting up any backtesting or simulation environment
    action: Define and explicitly set random seeds for each stochastic components (np.random.seed(), random.seed(), trading
      simulator seed) before running backtests; document which components use random number generation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unseeded stochastic components cause non-reproducible backtest results; strategies may appear profitable
      due to lucky random sequences rather than genuine edge
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-198
    when: When implementing or using any optimization routine in the framework
    action: Assume optimization routines will detect or handle convergence automatically without explicit convergence criteria
      configuration
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Optimizers without explicit convergence criteria may run indefinitely, converge to incorrect local minima,
      or terminate prematurely, producing invalid strategy parameters that fail in live trading
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-199
    when: When configuring any optimization algorithm (genetic algorithms, gradient descent, grid search)
    action: 'Define explicit convergence criteria including: maximum iterations, minimum improvement threshold (e.g., 1e-6),
      maximum runtime, and validation checks; log convergence status after each optimization run'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit convergence criteria, optimization may produce overfitted parameters that perform well on
      historical data but fail in live trading due to insufficient sampling of the parameter space
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-200
    when: When implementing exchange authentication or request signing logic
    action: Define a nonce() function for each exchange that returns a unique value per request within the signing window
      (monotonically increasing integer or timestamp-based); verify nonce collisions are prevented
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing or colliding nonces cause authentication failures and rejected orders; in live trading, this results
      in missed trade opportunities and potential financial losses from failed order execution
    derived_from_bd_id: BD-084
  - id: finance-C-201
    when: When implementing or modifying rate limiting logic in the exchange API client
    action: Preserve the leaky bucket algorithm as the default rate limiting strategy; any deviation must maintain exchange
      compliance and throughput optimization properties equivalent to leaky bucket
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Changing the rate limiting algorithm to fixed delay or token bucket without equivalent compliance guarantees
      risks exchange API violations, causing request rejections, temporary bans, and data gaps during critical trading windows
    derived_from_bd_id: BD-007
  - id: finance-C-202
    when: When processing exchange balance responses in backtesting or live trading
    action: Apply safe_balance derivation logic to reconstruct missing free/used/total fields from available values; do not
      assume exchange responses contain complete balance schema
    severity: high
    kind: domain_rule
    modality: must
    consequence: If balance derivation is skipped and exchanges return partial data, position sizing uses None or zero values,
      causing incorrect leverage calculations, margin call errors, or missed trading opportunities in live execution
    derived_from_bd_id: BD-012
  - id: finance-C-203
    when: When configuring exchange rate limits for API requests
    action: Verify that rateLimit=2000ms matches the target exchange's actual rate limit specification, and override via exchange-specific
      describe() method if needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using the default 2000ms rate limit may cause unnecessary throttling on faster exchanges or trigger rate
      limit violations on slower exchanges, leading to failed API requests and strategy execution interruption
    derived_from_bd_id: BD-009
  - id: finance-C-205
    when: When configuring exchange instances for backtesting or live trading
    action: Verify that enableRateLimit=True matches the actual exchange API rate limits; if running high-frequency strategies,
      explicitly evaluate whether rate limiting should be adjusted per exchange
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default enableRateLimit=True assumes all exchanges enforce rate limits uniformly; disabling this without
      understanding exchange-specific limits risks API bans and account restrictions, causing missed trades and operational
      disruption
    derived_from_bd_id: BD-072
  - id: finance-C-206
    when: When implementing exchange classes that use deep_extend(super().describe()) configuration inheritance
    action: Verify exchange classes follow single-inheritance chain only; deep_extend does not correctly handle multiple inheritance
      (MRO), which causes silent configuration field omission or duplication
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Multiple inheritance with deep_extend causes Method Resolution Order issues where configuration fields may
      be missed or duplicated; the code appears to work until specific edge cases surface with missing market parameters or
      duplicated fee structures
    derived_from_bd_id: BD-118
  - id: finance-C-207
    when: When implementing or refactoring decimal precision logic for financial calculations
    action: Maintain decimal.ROUND_HALF_UP as the rounding mode for each price and quantity calculations — do not replace
      with ROUND_HALF_EVEN or other rounding modes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing rounding mode causes cumulative discrepancies in profit/loss calculations and position sizing; strategies
      optimized under one rounding mode may show different results when rounding mode changes, leading to backtest-live inconsistency
    derived_from_bd_id: BD-089
  - id: finance-C-208
    when: When using the framework's default derivation path parameters for wallet address generation
    action: Verify that derivation paths (m/0'/0'/0' for hardened, m/0'/0/0 for non-hardened) match the target BIP-44 compliant
      wallet software requirements
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using incompatible derivation paths generates addresses that cannot be imported into standard BIP-44 wallets;
      funds sent to these addresses become unrecoverable, causing permanent loss of assets
    derived_from_bd_id: BD-095
  - id: finance-C-209
    when: When generating or validating P2PKH Bitcoin addresses
    action: Enforce exactly 25-byte address structure (net_ver_bytes + 20-byte Hash160 + 4-byte checksum) — reject addresses
      not matching this length
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accepting non-standard address lengths causes malformed transactions that are rejected by the Bitcoin network;
      funds may be lost if the framework attempts to send to invalid addresses
    derived_from_bd_id: BD-099
  - id: finance-C-210
    when: When implementing limit order price and quantity submission logic
    action: Use exchange-provided tickSize for price precision and stepSize for quantity precision — do not assume a fixed
      precision value across each exchanges
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fixed precision (e.g., 2 decimal places for all exchanges) causes orders to be rejected by exchanges
      requiring different tick sizes; rejected orders prevent strategy execution, creating divergence between backtest and
      live trading results
    derived_from_bd_id: BD-069
  - id: finance-C-211
    when: When implementing REST API rate limiting logic
    action: Configure enableRateLimit option or implement manual delays to avoid RateLimitExceeded errors
    severity: high
    kind: resource_boundary
    modality: must
    consequence: REST API requests will be rejected with RateLimitExceeded error, causing operations to fail and requiring
      exponential backoff retry logic
    stage_ids:
    - network_request
  - id: finance-C-212
    when: When writing C# CCXT code
    action: Use PascalCase method naming convention (FetchTicker not fetchTicker)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Lowercase method calls will cause compilation errors or runtime failures in C# due to language conventions
  - id: finance-C-215
    when: When synchronizing time for exchange API calls
    action: Verify system clock is NTP-synchronized to prevent InvalidNonce errors
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unsynchronized system clock causes timestamp-based nonce validation to fail, resulting in InvalidNonce errors
      and rejected requests
  - id: finance-C-216
    when: When checking method availability before calling exchange methods
    action: Query exchange.has dictionary to verify method support before calling exchange-specific methods
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Calling unsupported methods causes NotSupported exceptions since different exchanges support different feature
      sets
  - id: finance-C-217
    when: When writing Go CCXT code
    action: Always check error returns from each API calls and use the correct import path with /v4 version suffix
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Ignoring errors causes nil pointer dereferences, and wrong import paths cause compilation failures
  - id: finance-C-218
    when: When using unified symbol format across CCXT
    action: Use forward slash separator with uppercase letters (BTC/USDT) not dash, no separator, or lowercase
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Wrong symbol format causes InvalidOrder errors or market lookup failures across all languages
  - id: finance-C-219
    when: When writing PHP CCXT code
    action: Set date_default_timezone_set('UTC') before any CCXT operations and use leading backslash in namespace
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing timezone causes Invalid datetime errors, and missing leading backslash causes class not found errors
  - id: finance-C-220
    when: When running PHP CCXT applications
    action: Verify required PHP extensions (cURL, mbstring, iconv, gmp) are loaded before running
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing extensions cause fatal errors at runtime, preventing exchange connectivity
  - id: finance-C-221
    when: When placing orders on Gemini exchange
    action: Use 'limit' as the order type since Gemini does not support market orders
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using market order type on Gemini causes InvalidOrder errors as the exchange only accepts limit orders
  - id: finance-C-222
    when: When monitoring real-time market data with CCXT
    action: Use REST polling loops for real-time monitoring - switch to WebSocket API instead
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: REST polling wastes rate limits and provides slow, delayed data instead of real-time updates
  - id: finance-C-223
    when: When performing authenticated operations with CCXT
    action: Verify API credentials have required permissions for create*, cancel*, edit*, fetchMy*, withdraw, transfer, and
      deposit operations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using credentials with insufficient permissions causes AuthenticationError and failed operations
  - id: finance-C-224
    when: When handling errors in production CCXT applications
    action: Implement retry logic with exponential backoff for NetworkError exceptions only, not ExchangeError
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Retrying ExchangeError (AuthenticationError, InsufficientFunds, InvalidOrder) causes duplicate orders and
      wasted API calls
  - id: finance-C-225
    when: When using multiple exchange instances with async programming
    action: Use sync imports for sync mode and async_support imports for async mode - do not mix blocking sync calls in async
      code
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Mixing sync exchange in async code blocks the event loop, preventing concurrent operations and causing deadlocks
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
