cross_project_wisdom:
- wisdom_id: CW-BT-001
  source_project: backtrader
  pattern_name: Cerebro 统一编排引擎
  description: 'backtrader 用 Cerebro 作为单一入口，统一管理 data feeds、strategies、analyzers、 observers 的生命周期，支持一次 cerebro.run() 跑多策略+多数据源。
    zvt 的 StockTrader 目前每次实例化只绑定一套因子，缺乏统一的多策略组合编排层； 借鉴 Cerebro 模式可让用户把多个 Trader 实例组合到一个 runner 中对比评估。

    '
  applicable_to_activity: backtesting
  _source_file: cross-project-wisdom/backtest-framework.yaml
- wisdom_id: CW-BT-002
  source_project: backtrader
  pattern_name: Analyzer 插件化绩效评估
  description: 'backtrader 提供 SharpeRatio、DrawDown、TimeReturn、TradeAnalyzer 等即插即用 的 Analyzer，可在不修改策略代码的情况下附加任意绩效指标。 zvt 当前绩效评估能力较弱，没有标准化的
    Analyzer 接口； 借鉴此模式可让用户 cerebro.addanalyzer(SharpeRatio) 即得风险调整收益报告。

    '
  applicable_to_activity: backtesting
  _source_file: cross-project-wisdom/backtest-framework.yaml
- wisdom_id: CW-BT-003
  source_project: backtrader
  pattern_name: Sizer 仓位管理分离
  description: 'backtrader 将仓位管理（每次开仓买多少股/多大比例）单独抽象为 Sizer， 与信号逻辑完全解耦；内置 FixedSize、PercentSizer 等，用户可自定义。 zvt 目前没有显式的 Sizer
    概念，仓位控制逻辑散落在 Trader.on_profit_control 等钩子中； 引入 Sizer 接口可使策略信号与资金管理规则独立演化和组合复用。

    '
  applicable_to_activity: backtesting
  _source_file: cross-project-wisdom/backtest-framework.yaml
- wisdom_id: CW-BT-004
  source_project: backtrader
  pattern_name: Order 类型全集（Limit/Stop/OCO/Bracket）
  description: 'backtrader 支持 Market、Limit、Stop、StopLimit、OCO（二选一）、 Bracket（止盈止损一对订单）等丰富订单类型，并模拟成交滑点和手续费方案。 zvt 回测目前主要支持市价成交，缺乏限价委托和组合订单模拟；
    对于高频或实盘对接场景，完善订单类型将大幅提升回测真实性。

    '
  applicable_to_activity: backtesting
  _source_file: cross-project-wisdom/backtest-framework.yaml
- wisdom_id: CW-BT-005
  source_project: backtrader
  pattern_name: 数据重采样与重播（Resampling & Replaying）
  description: 'backtrader 可将低级别数据（如 1 min）实时 resample 为高级别（如 1 day）并同步驱动策略， 或 replay 逐 tick 模拟 OHLC 形成过程，实现日内精细回测。 zvt 目前多时间框架通过预录入不同级别
    K 线实现，缺少运行时动态重采样； 借鉴此模式可在不重复录入数据的前提下支持任意时间粒度组合回测。

    '
  applicable_to_activity: backtesting
  _source_file: cross-project-wisdom/backtest-framework.yaml
- wisdom_id: CW-VN-003
  source_project: vnpy
  pattern_name: CTA 回测引擎内置可视化
  description: 'vnpy 的 cta_backtester 提供图形界面直接展示策略净值曲线、最大回撤、 每日盈亏、成交明细，无需 Jupyter Notebook。 zvt 目前回测结果可视化依赖 draw_result 方法调用
    Plotly，但无统一的回测报告页面； 借鉴此模式可打包一个开箱即用的策略绩效仪表盘。

    '
  applicable_to_activity: backtesting
  _source_file: cross-project-wisdom/backtest-framework.yaml
- wisdom_id: CW-VN-004
  source_project: vnpy
  pattern_name: vnpy.alpha ML 因子研究实验室（Lab）
  description: 'vnpy 4.0 的 vnpy.alpha.lab 提供数据管理、模型训练、信号生成、策略回测一体化工作流， 支持 Lasso/LightGBM/MLP 等算法的标准化训练接口和可视化对比。 zvt 的 ML 能力目前仅有
    MaStockMLMachine 一个入口，缺乏规范化 Lab 框架； 借鉴 Lab 模式可建立"特征工程→训练→信号→回测"的标准流水线，降低 ML 实验门槛。

    '
  applicable_to_activity: factor-research
  _source_file: cross-project-wisdom/backtest-framework.yaml
- wisdom_id: CW-QL-001
  source_project: qlib
  pattern_name: Point-in-Time 数据库（防未来数据泄漏）
  description: 'qlib 的 Point-in-Time Provider 保证在给定时间点 t 的查询只返回 t 时刻 真实可知的数据（财报发布延迟、修订历史均被正确处理）， 彻底消除回测中的 look-ahead bias。
    zvt 目前财务数据以报告期为 timestamp，缺少"发布日"维度， 存在用未来财报数据做选股的潜在偏差；引入 PIT 模式可大幅提升回测可信度。

    '
  applicable_to_activity: backtesting
  _source_file: cross-project-wisdom/backtest-framework.yaml
- wisdom_id: CW-QL-002
  source_project: qlib
  pattern_name: Recorder + Experiment 实验管理（MLflow 风格）
  description: 'qlib 的 workflow 模块提供 Experiment/Recorder，自动记录每次模型训练的 超参数、特征、指标、预测结果，支持跨实验比较和模型版本管理。 zvt 目前缺乏 ML 实验追踪机制，每次重跑结果会覆盖前次；
    借鉴 Recorder 模式可将每次因子实验的参数和结果持久化，支持快速复现和版本对比。

    '
  applicable_to_activity: factor-research
  _source_file: cross-project-wisdom/backtest-framework.yaml
- wisdom_id: CW-QL-003
  source_project: qlib
  pattern_name: Nested Decision Framework（多层嵌套决策执行）
  description: 'qlib 支持将高频执行层（分钟级委托拆单）嵌套在低频决策层（日级组合调仓）中， 两层独立优化且可组合运行，实现日内最优执行算法（如 TWAP、VWAP 调仓）。 zvt 目前回测仅有日线级别的成交假设，缺乏执行算法建模；
    借鉴嵌套框架可让 zvt 区分"何时持有哪些股"与"如何以最小冲击成本建仓"两个问题。

    '
  applicable_to_activity: backtesting
  _source_file: cross-project-wisdom/backtest-framework.yaml
domain_constraints_injected:
- id: SHARED-CN-ASTOCK-T1-001
  statement: 'A 股股票实行 T+1 交收制度：T 日买入的股票最早 T+1 日方可卖出。 T 日卖出所得资金可当日再用于买入。回测框架若未施加 T+1 持仓锁定， 将高估换手率与策略胜率，尤其损害日内反转类策略的真实性。

    '
  severity: fatal
  capability_tags:
    markets:
    - cn-astock
    activities:
    - backtesting
    - live-trading
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
    - order_execution
    - portfolio_simulation
  incompatible_with_tags:
    markets:
    - us-equity
    - crypto
  stage_id_remap_hints:
  - from_stage: order_execution
    constraint_context: T+1 lock must be enforced in position tracking layer
  - from_stage: portfolio_simulation
    constraint_context: holdings bought today cannot be counted as sellable today
  evidence_refs:
  - type: regulatory_doc
    ref: 中国证券登记结算有限责任公司《证券登记结算业务规则》；上交所《交易规则》第4.2节；深交所《交易规则》第4.2节
    url: https://www.szse.cn/lawandrules/rules/trading/
  reference_code:
    bad_example: "# BAD: 当日买入当日即可卖出 — 违反 T+1\ndef generate_signals(df):\n    df['signal'] = df['close'].pct_change() > 0.02\n\
      \    df['position'] = df['signal'].astype(int)\n    return df  # 当日开仓，当日可平\n"
    good_example: "# GOOD: 使用 shift(1) 确保 T+1 交收约束\ndef generate_signals(df):\n    df['signal'] = df['close'].pct_change()\
      \ > 0.02\n    # 今日信号 → 明日才可建仓; 今日建仓 → 明日才可平\n    df['can_sell'] = df['position'].shift(1).fillna(0)\n    return df\n"
  provenance:
    source: regulatory_doc
    independence_note: 'T+1 来源于证监会/结算公司的法定交收规则，不来自 zvt 项目本身； zvt README 仅提及数据获取，不强制说明 T+1 lock 的代码实现。

      '
  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-T1-002
  statement: '沪深主板股票日涨跌幅上限为 ±10%（ST/SST 股票 ±5%）。 涨停封板时买方消失、跌停封板时卖方消失；回测若假设当日可以任意价格 成交，会系统性高估可执行性。封板检测应在成交模拟层强制实施。

    '
  severity: fatal
  capability_tags:
    markets:
    - cn-astock
    activities:
    - backtesting
    - live-trading
  applicable_conditions:
    blueprint_has_stage:
    - backtesting
    - order_execution
  incompatible_with_tags:
    markets:
    - us-equity
    - crypto
  stage_id_remap_hints:
  - from_stage: backtesting
    constraint_context: order fill logic must check limit-up/limit-down before accepting fills
  evidence_refs:
  - type: regulatory_doc
    ref: 上交所《交易规则》第4.5节涨跌幅限制；深交所《交易规则》第4.5节
    url: https://www.sse.com.cn/lawandrules/regulations/
  reference_code:
    bad_example: "# BAD: 按收盘价直接成交，忽略涨跌停\ndef fill_order(price, close):\n    return close  # 直接用收盘价，可能是涨停价但买不到\n"
    good_example: "# GOOD: 涨停时拒绝买单，跌停时拒绝卖单\nLIMIT_RATE = {'normal': 0.10, 'st': 0.05, 'star': 0.20}\n\ndef fill_order(price,\
      \ prev_close, order_side, st_status, board_type):\n    limit = LIMIT_RATE.get(board_type, 0.10)\n    upper = round(prev_close\
      \ * (1 + limit), 2)\n    lower = round(prev_close * (1 - limit), 2)\n    if price >= upper and order_side == 'buy':\n\
      \        return None  # 涨停，买单无法成交\n    if price <= lower and order_side == 'sell':\n        return None  # 跌停，卖单无法成交\n\
      \    return price\n"
  provenance:
    source: regulatory_doc
  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-T1-003
  statement: '科创板和创业板（2020年8月改革后）正常交易日涨跌幅为 ±20%； 北交所 ±30%；新股上市后前5个交易日不设涨跌幅限制。 回测若对所有股票统一套用 ±10% 过滤逻辑，会错误剔除或错误包含这些板块的成交。

