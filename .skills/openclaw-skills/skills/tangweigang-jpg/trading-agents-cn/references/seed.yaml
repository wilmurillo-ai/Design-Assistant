resources:
  packages:
  - name: fastapi
    version_pin: latest
  - name: uvicorn[standard]
    version_pin: latest
  - name: pydantic>=2.0.0
    version_pin: latest
  - name: motor>=3.3.0
    version_pin: latest
  - name: pymongo>=4.0.0
    version_pin: latest
  - name: redis>=6.2.0
    version_pin: latest
  - name: openai>=1.0.0,<2.0.0
    version_pin: latest
  - name: langchain-openai>=0.3.23
    version_pin: latest
  - name: langchain-anthropic>=0.3.15
    version_pin: latest
  - name: langchain-google-genai>=2.1.12
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install fastapi
    - python3 -m pip install uvicorn[standard]
    - python3 -m pip install pydantic>=2.0.0
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing data source fallback logic
    action: 'Use the defined fallback chain: MongoDB → Tushare → AKShare → BaoStock for CN stocks; MongoDB → yfinance → Alpha
      Vantage → Finnhub for US stocks'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without the fallback chain, data collection fails entirely when the primary source is unavailable, causing
      the entire analysis pipeline to stall and users to receive no market data
    stage_ids:
    - data_collection
  - id: finance-C-005
    when: When validating received market data
    action: Check data is not empty and does not contain error markers ('❌', '错误', '获取失败') before processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Processing empty or error data causes downstream analysts to receive invalid inputs, producing garbage output
      and corrupting analysis results
    stage_ids:
    - data_collection
  - id: finance-C-006
    when: When standardizing DataFrame column names from different providers
    action: 'Map each provider outputs to standard columns: open, high, low, close, vol, amount, date'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Different provider column naming (Open vs open, Volume vs vol, trade_date vs date) causes technical indicator
      calculations to fail silently or produce wrong results
    stage_ids:
    - data_collection
  - id: finance-C-021
    when: When implementing analyst tool call loop prevention
    action: Enforce max_tool_calls threshold to prevent infinite loops
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without bounded tool calls, agents enter infinite loops consuming unlimited tokens and causing the analysis
      pipeline to hang indefinitely without completing
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-023
    when: When configuring the multi-analyst pipeline graph
    action: Allow selected_analysts list to be empty
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: An empty analyst list causes ValueError and pipeline fails to initialize, blocking all downstream stages
      from executing
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-028
    when: When implementing analyst conditional flow logic
    action: Check both tool_call_count and report_content existence before continuing loop
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Conditional logic that only checks tool_calls causes infinite loops even after report generation, as tool_calls
      may remain in message history after tool execution
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-037
    when: When implementing debate flow control
    action: enforce alternating turn order between Bull Researcher and Bear Researcher
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without strict alternation, the debate loses its adversarial structure, resulting in one-sided analysis that
      fails to present genuinely opposing viewpoints
    stage_ids:
    - investment_debate
  - id: finance-C-039
    when: When handling memory in bull/bear researcher
    action: perform null check on memory object before calling get_memories()
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Calling get_memories() on a None memory object throws AttributeError, causing the entire investment_debate
      stage to crash
    stage_ids:
    - investment_debate
  - id: finance-C-047
    when: When generating investment plans for users
    action: claim that investment_plan results guarantee actual trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting simulated investment plans as guaranteed results misleads users about the reliability of AI-generated
      financial recommendations
    stage_ids:
    - investment_debate
  - id: finance-C-048
    when: When displaying investment debate results
    action: present investment_plan as financial advice or professional investment recommendation
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Framing AI-generated investment plans as professional advice may violate financial regulations and create
      liability for the platform operators
    stage_ids:
    - investment_debate
  - id: finance-C-051
    when: When implementing debate turn alternation
    action: base the next speaker decision on the current_response prefix (Bull/Bear)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using speaker alternation logic that doesn't check current_response prefix causes incorrect routing, breaking
      the debate flow and potentially causing infinite loops
    stage_ids:
    - investment_debate
  - id: finance-C-052
    when: When updating investment_debate_state
    action: increment count field after each researcher response
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without count increment, the debate control logic cannot track round progress, leading to either premature
      termination or infinite looping
    stage_ids:
    - investment_debate
  - id: finance-C-058
    when: When building investment_plan for output
    action: return both investment_debate_state and investment_plan in the node output
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing investment_plan in output causes downstream stages (trading_decision) to receive incomplete data,
      breaking the analysis pipeline
    stage_ids:
    - investment_debate
  - id: finance-C-059
    when: When generating trading decisions for China A-shares
    action: Use Chinese Yuan (¥) as the price currency unit
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Trading decisions with incorrect currency units (e.g., USD for A-shares) will cause confusion and potentially
      disastrous financial losses when the plan is executed with wrong price expectations
    stage_ids:
    - trading_decision
  - id: finance-C-060
    when: When generating trading decisions for Hong Kong stocks
    action: Use Hong Kong Dollar (HK$) as the price currency unit
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Trading decisions with incorrect currency units for HK stocks will cause price misinterpretation and potential
      financial losses due to currency confusion
    stage_ids:
    - trading_decision
  - id: finance-C-061
    when: When generating trading decisions for US stocks
    action: Use US Dollar ($) as the price currency unit
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Trading decisions with incorrect currency units for US stocks will cause price misinterpretation and potential
      financial losses
    stage_ids:
    - trading_decision
  - id: finance-C-062
    when: When the trader agent generates investment recommendations
    action: Provide specific target prices with concrete numerical values, not null or empty
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without concrete target prices, trading decisions become non-actionable. The system explicitly requires specific
      price targets for buy/hold/sell recommendations, otherwise execution will fail due to missing entry/exit parameters
    stage_ids:
    - trading_decision
  - id: finance-C-063
    when: When generating trading decisions
    action: Use the correct company name from the fundamentals report, never fabricate or guess company names
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using incorrect company names will corrupt the investment decision record and may cause execution on wrong
      securities, leading to financial losses
    stage_ids:
    - trading_decision
  - id: finance-C-065
    when: When passing trading decisions through the agent graph
    action: Output the trading plan as 'trader_investment_plan' field for consumption by the risk debate stage
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Risk debate nodes (Risky Analyst, Safe Analyst, Neutral Analyst, Risk Judge) expect trader_investment_plan
      as input. Incorrect field name will break the graph execution flow
    stage_ids:
    - trading_decision
  - id: finance-C-069
    when: When interpreting trading decision outputs
    action: Present backtest or simulated trading results as equivalent to live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Simulated results do not account for real-world execution factors such as slippage, liquidity constraints,
      and market impact, leading to unrealistic performance expectations
    stage_ids:
    - trading_decision
  - id: finance-C-070
    when: When using the trading decision system
    action: Claim the system provides real-time trading capabilities or live market execution
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: The system is a pure backtesting and research framework without live trading integration. Claiming real-time
      capabilities would be misleading and potentially dangerous for actual trading
    stage_ids:
    - trading_decision
  - id: finance-C-074
    when: When implementing the three-way risk debate workflow
    action: maintain separate conversation history for each debater perspective (Risky, Safe, Neutral) in RiskDebateState
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: If debater perspectives are not tracked separately, the Risk Judge cannot properly synthesize all viewpoints,
      leading to incomplete risk assessment and potentially dangerous trading decisions
    stage_ids:
    - risk_debate
  - id: finance-C-075
    when: When configuring risk debate round count
    action: verify max_count equals 3 multiplied by max_risk_discuss_rounds (one turn per debater)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect round calculation causes the debate to terminate prematurely or exceed expected duration, violating
      the three-debater participation guarantee
    stage_ids:
    - risk_debate
  - id: finance-C-076
    when: When the Risk Judge synthesizes final_trade_decision
    action: incorporate risk-adjusted recommendations that consider each three debater perspectives
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: If the final decision ignores one or more debater perspectives, the risk assessment becomes lopsided, potentially
      causing losses from overly aggressive or overly conservative positioning
    stage_ids:
    - risk_debate
  - id: finance-C-082
    when: When presenting TradingAgents-CN analysis results
    action: claim that backtested returns equal expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting simulated results as proof of real trading performance constitutes false advertising and may cause
      users to make poor financial decisions
    stage_ids:
    - risk_debate
  - id: finance-C-083
    when: When using risk_debate output for actual trading decisions
    action: treat AI-generated risk recommendations as guaranteed financial advice
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Over-trusting AI risk assessment may lead to significant financial losses when market conditions diverge
      from model assumptions
    stage_ids:
    - risk_debate
  - id: finance-C-087
    when: When implementing signal processing input validation
    action: Validate full_signal is a non-empty string and return default '持有' decision on invalid input
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid signals cause unexpected exceptions or crash the trading pipeline, breaking downstream signal consumers
    stage_ids:
    - signal_processing
  - id: finance-C-088
    when: When implementing signal processing output schema
    action: 'Return JSON with required fields: action, target_price, confidence, risk_score, reasoning'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream trading systems receive malformed JSON lacking required fields, causing KeyError or TypeError
      in trading execution
    stage_ids:
    - signal_processing
  - id: finance-C-089
    when: When normalizing trading action values
    action: 'Map action to one of the three Chinese values: 买入, 持有, 卖出 — never English buy/hold/sell'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: English action values leak into downstream trading systems, causing logic errors in trading execution modules
      that expect Chinese values
    stage_ids:
    - signal_processing
  - id: finance-C-090
    when: When extracting target prices for different markets
    action: Use currency-aware price extraction that matches the stock market currency (CNY for A-share, USD for US, HKD for
      HK)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Target price in wrong currency (e.g., USD price for Chinese A-share) causes execution at incorrect price
      levels, resulting in direct financial loss
    stage_ids:
    - signal_processing
  - id: finance-C-095
    when: When implementing signal processing error handling
    action: Propagate exceptions to upstream callers — each errors must be caught and converted to default decisions
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Uncaught exceptions bubble up to trading graph, terminating the entire trading pipeline and preventing all
      trade execution
    stage_ids:
    - signal_processing
  - id: finance-C-104
    when: When implementing reflection after trading execution
    action: Store memory vectors through add_situations() after each analysis cycle
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without storing memory vectors after each cycle, the system loses the ability to learn from past trading
      decisions, causing the reflection mechanism to degrade over time and eventually fail to provide relevant historical
      insights
    stage_ids:
    - reflection_memory
  - id: finance-C-107
    when: When initializing ChromaDB for concurrent agent operations
    action: Use ChromaDBManager singleton pattern with threading.Lock to prevent collection conflicts
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without the singleton pattern, concurrent reflection calls from multiple agents create conflicting ChromaDB
      collections, causing data corruption and memory retrieval failures
    stage_ids:
    - reflection_memory
  - id: finance-C-108
    when: When memory_enabled configuration is set to False
    action: Set agent memory objects to None and skip each memory operations gracefully
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: If memory objects are not set to None when disabled, agent nodes will attempt to call get_memories() on None,
      causing AttributeError and crashing the analysis pipeline
    stage_ids:
    - reflection_memory
  - id: finance-C-113
    when: When using reflection prompts for continuous learning
    action: Claim that memory-derived insights guarantee profitable trading outcomes
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting memory-based insights as guarantees of profitable trades violates financial regulations and misleads
      users about the system's actual predictive capabilities, potentially causing financial harm
    stage_ids:
    - reflection_memory
  - id: finance-C-120
    when: When memory retrieval returns results for trading decisions
    action: Use memory recommendations as sole basis for trading decisions without human oversight
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Relying exclusively on memory-based recommendations without human validation ignores market regime changes,
      causing the system to apply outdated lessons inapplicable to current conditions
    stage_ids:
    - reflection_memory
  - id: finance-C-147
    when: When implementing API key validation for LLM providers
    action: accept placeholder values as valid API keys
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Accepting placeholder keys like 'your_api_key_here' or keys with '...' will cause authentication failures
      with the LLM provider, resulting in runtime errors when attempting to call the API
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-148
    when: When creating LLM instances for trading agents
    action: use create_llm_by_provider() as the single entry point for each LLM creation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing the factory function will break token tracking, cost logging, and provider-specific configuration
      handling, causing inconsistent behavior across different LLM providers
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-150
    when: When configuring Qianfan (Baidu) LLM provider
    action: validate that QIANFAN_API_KEY follows the bce-v3/ALTAK-xxx/xxx format
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using an incorrectly formatted API key for Qianfan will cause authentication failures since the newer API
      requires the bce-v3 format for proper BCE-V3 authentication
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-152
    when: When adding support for new OpenAI-compatible LLM providers
    action: register the provider in OPENAI_COMPATIBLE_PROVIDERS dictionary with adapter_class
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Skipping registration will cause create_openai_compatible_llm() to raise ValueError for the unsupported provider,
      breaking any code that tries to use it
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-157
    when: When deploying the trading agents system in production
    action: claim that AI-generated analysis equals financial advice or trading recommendations
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting AI analysis outputs as actionable trading signals without proper financial advisory disclosures
      violates regulatory requirements and exposes users to financial risk based on unverified AI predictions
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-163
    when: When implementing or configuring the multi-agent analysis workflow
    action: Enforce AgentState TypedDict as the single state carrier across each graph nodes — no module may maintain parallel
      state stores
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Parallel state stores cause analyst reports to be lost or overwritten, producing inconsistent analysis results
      across stages
  - id: finance-C-164
    when: When initializing any analysis workflow
    action: Require company_of_interest and trade_date in the initial AgentState — no analyst may proceed without these fields
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Analysts generate meaningless or market-mismatched reports when trade_date is missing, causing incorrect
      investment signals for the wrong time period
  - id: finance-C-168
    when: When executing analyst tool calls in the graph nodes
    action: Enforce max_tool_calls = 3 per analyst to prevent infinite loops — the graph must terminate after 3 tool invocations
      per analyst regardless of report completion
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Infinite tool-call loops exhaust API rate limits, consume excessive tokens, and hang the analysis workflow
      indefinitely without producing any investment signal
  - id: finance-C-169
    when: When configuring the LangGraph recursion limit
    action: Set max_recur_limit = 100 in the LangGraph configuration to prevent runaway recursion across the analyst-debate-risk
      pipeline
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Unbounded recursion causes the process to hang or crash when the analyst-debate pipeline exceeds expected
      depth, making the entire analysis unavailable
  - id: finance-C-170
    when: When managing data persistence and transient state
    action: Use MongoDB exclusively for persistent data (tasks, configs, results); use Redis exclusively for transient state
      (progress, queue) — these roles must not be reversed
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Storing transient state in MongoDB causes stale progress data and race conditions; storing persistent data
      in Redis causes permanent data loss on restart
  - id: finance-C-175
    when: When executing the analysis workflow graph
    action: 'Follow the strict stage order: Market Analyst → Social Analyst → News Analyst → Fundamentals Analyst → Bull/Bear
      Researchers → Investment Judge → Trader → Risk Debate → Risk Judge — no stage may be skipped or reordered'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Skipping or reordering stages causes upstream analysts to receive incomplete context, producing reports that
      lack critical cross-signal validation and lead to incorrect trading signals
  - id: finance-C-180
    when: When implementing position management logic for A-share backtesting
    action: Verify stocks bought today cannot be sold on the same day (T+1 settlement rule) — control available quantity via
      trading_t attribute. Available quantity must exclude positions purchased within the same trading session.
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the T+1 rule causes the backtest to include same-day round-trip trades prohibited in A-share markets,
      making backtest results completely non-reproducible in live trading and exposing the strategy to regulatory violations
    derived_from_bd_id: BD-087
  - id: finance-C-199
    when: When configuring LLM adapters inheriting from OpenAICompatibleBase for financial trading analysis
    action: Set temperature to 0.1 in each LLM adapter implementations inheriting from OpenAICompatibleBase — verify consistent
      randomness control across quick_think and deep_think pathways
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inconsistent temperature values between adapter-level (0.1) and config-level (0.7) settings cause unpredictable
      LLM outputs in graph node invocations vs direct calls
    derived_from_bd_id: BD-099
  - id: finance-C-206
    when: When processing market value data from frontend to backend
    action: Convert frontend market value from 万元 to backend 亿元 by dividing by 10000; verify conversion is applied before
      storage or API response
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing or incorrect conversion causes stock market cap to be misinterpreted by factor of 10,000, leading
      to fundamentally flawed stock valuation and wrong investment decisions
    derived_from_bd_id: BD-094
  - id: finance-C-234
    when: When configuring middleware stack in the application initialization
    action: 'Enforce exact middleware ordering: RateLimitMiddleware → QuotaMiddleware → ErrorHandlerMiddleware; rate limiting
      and quota checks must execute before error handling to prevent abuse from reaching error paths'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating middleware order allows rate limit violations to trigger error handlers first, bypassing quota
      enforcement and enabling denial-of-service attacks against the trading system
    derived_from_bd_id: BD-106
  - id: finance-C-236
    when: When processing trading signals that default to '持有' (hold) in the signal validation layer
    action: Implement a default target_price calculation when hold signal is triggered (e.g., use current market price + 1%
      buffer) OR modify BD-044 validation to accept null target_price for hold signals; the fail-safe mechanism must produce
      executable decisions end-to-end
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The contradiction between hold-default and price-required creates an impossible state where the trader node
      cannot proceed, causing the entire trading pipeline to deadlock and miss execution opportunities
    derived_from_bd_id: BD-122
  - id: finance-C-239
    when: When implementing financial calculations involving currency values
    action: Use Decimal type with sufficient precision (min 4 decimal places) for each monetary calculations including prices,
      commissions, P&L, and position values; avoid float for any value appearing in financial reports or trading decisions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using float for currency causes precision errors that accumulate in P&L calculations and commission estimates,
      potentially causing live trading decisions to differ from backtested results
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-250
    when: When processing orders for different stock markets in trading decision logic
    action: 'Verify currency unit matches the target market: RMB for A-shares (China), USD for US stocks and HK stocks; validate
      currency-market alignment before order submission to prevent routing failures'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Currency mismatch causes order rejection by brokers and potential significant financial errors (e.g., submitting
      $100 order intended as $100 RMB equals only $14, causing massive order size miscalculation)
    derived_from_bd_id: BD-045
  - id: finance-C-272
    when: When implementing agent tool calling loops
    action: Implement tool call counters in AgentState to prevent infinite loops, maximum 3 calls
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Agent will enter infinite calling loops consuming excessive API calls and potentially causing service disruption
  - id: finance-C-274
    when: When using SSE with Redis PubSub for notifications
    action: Use SSE + Redis PubSub architecture for long-running connections
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Redis connection leaks will accumulate causing 'Too many connections' errors and complete service outage
  - id: finance-C-283
    when: When presenting analysis results to users
    action: Claim analysis results are investment advice suitable for live trading
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users may make actual investment decisions based on simulated analysis, leading to potential financial losses
      and compliance issues
  regular:
  - id: finance-C-002
    when: When storing provider tokens for runtime configuration
    action: Store tokens in database first with environment variable fallback, enabling Web UI configuration changes without
      code deployment
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hardcoded tokens require code deployment for configuration changes, blocking runtime adjustments and creating
      security risks from exposing credentials in source code
    stage_ids:
    - data_collection
  - id: finance-C-003
    when: When implementing caching for market data
    action: Set cache max_age_hours to 24 hours to verify cached data freshness while reducing API calls
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without proper cache TTL, stale data causes incorrect analysis results, or excessive API calls trigger rate
      limits and slow response times
    stage_ids:
    - data_collection
  - id: finance-C-004
    when: When accessing data through DataSourceManager
    action: Access market data only through DataSourceManager singleton, never directly from individual providers
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct provider access bypasses fallback logic and caching, causing inconsistent data across analysts and
      potential overwriting of valid cached data
    stage_ids:
    - data_collection
  - id: finance-C-007
    when: When configuring API timeout for data providers
    action: Set provider timeout to 30 seconds to prevent blocking on unresponsive APIs
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without timeout limits, a single unresponsive API blocks the entire data collection thread, causing complete
      system hang during analysis
    stage_ids:
    - data_collection
  - id: finance-C-008
    when: When rate limiting API calls
    action: 'Enforce rate limits per provider: Tushare 0.1/s, AKShare 0.2/s, BaoStock 0.1/s, yfinance 0.5/s, Finnhub 1.0/s'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding rate limits causes API key suspension or temporary bans, blocking all future data collection from
      that provider until limit reset
    stage_ids:
    - data_collection
  - id: finance-C-009
    when: When detecting API rate limit errors
    action: Check for rate limit keywords including '每分钟最多访问', 'rate limit', 'too many requests', '请求过于频繁'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without rate limit detection, the system continues retrying blocked APIs, exacerbating the ban and delaying
      fallback to alternative sources
    stage_ids:
    - data_collection
  - id: finance-C-010
    when: When returning cached data for performance requirement
    action: Return cached market data within 100ms to meet the <100ms latency acceptance criterion
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Cache misses on fresh data requests exceed the 30s target, but serving stale cached data beyond 100ms violates
      the performance SLA and degrades user experience
    stage_ids:
    - data_collection
  - id: finance-C-011
    when: When fetching fresh data for performance requirement
    action: Complete fresh data retrieval within 30 seconds to meet the <30s latency acceptance criterion
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Data sources with 30s timeout may not complete within the 30s SLA when including connection, transfer, and
      processing overhead, causing timeout failures
    stage_ids:
    - data_collection
  - id: finance-C-012
    when: When implementing multi-market data collection
    action: Retrieve market data for CN/HK/US markets through the unified DataSourceManager without manual intervention
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Manual configuration per market creates operational burden and error-prone processes, violating the 'without
      manual intervention' acceptance criterion
    stage_ids:
    - data_collection
  - id: finance-C-013
    when: When implementing the DataCompletenessChecker
    action: Validate data completeness by checking row count >= 50% of expected, includes latest trade date, and has < 10%
      gaps
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Incomplete data with missing days or outdated records produces inaccurate technical indicators and misleads
      investment analysis
    stage_ids:
    - data_collection
  - id: finance-C-014
    when: When handling stock symbol formats
    action: Normalize stock codes to provider-specific formats (e.g., 000001 → 000001.SZ for Tushare)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Wrong stock code format causes the provider to return empty data or wrong stock data, leading to completely
      incorrect analysis
    stage_ids:
    - data_collection
  - id: finance-C-015
    when: When swapping data provider implementations
    action: Verify new providers implement BaseStockDataProvider abstract interface for connect, get_stock_basic_info, get_stock_quotes,
      get_historical_data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-compliant providers break the DataSourceManager contract, causing AttributeError or wrong return types
      in downstream analysis
    stage_ids:
    - data_collection
  - id: finance-C-016
    when: When using yfinance for US stock data
    action: Claim real-time data support from yfinance since it provides delayed market data (typically 15-20 minutes)
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting yfinance delayed data as real-time misleads users about data freshness, potentially causing trading
      decisions based on stale price information
    stage_ids:
    - data_collection
  - id: finance-C-017
    when: When configuring MongoDB connection
    action: Set MongoDB server_selection_timeout to 5000ms, connect_timeout to 30000ms, socket_timeout to 60000ms
    severity: high
    kind: resource_boundary
    modality: must
    consequence: MongoDB connection timeouts without proper configuration cause the entire data pipeline to hang indefinitely
      when database is unreachable
    stage_ids:
    - data_collection
  - id: finance-C-018
    when: When retrieving news data with time constraints
    action: Filter news by hours_back parameter to verify relevance to current analysis period
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Including outdated news articles pollutes analysis context, causing sentiment analysis to reflect historical
      events rather than current market conditions
    stage_ids:
    - data_collection
  - id: finance-C-019
    when: When parsing AKShare stock data requiring market suffix
    action: Append proper market suffix (.SH/.SZ/.BJ) to stock codes when calling AKShare, otherwise it misidentifies stocks
      as indices
    severity: high
    kind: domain_rule
    modality: must
    consequence: AKShare returns index data instead of stock data when suffix is missing (e.g., 000001 returns Shenzhen Component
      Index instead of Ping An Bank)
    stage_ids:
    - data_collection
  - id: finance-C-020
    when: When using historical data for technical indicators
    action: Verify sufficient historical data length (at least 60 days for MA60) for accurate indicator calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Short data windows produce NaN or misleading moving average values, causing incorrect trend analysis and
      wrong trading signals
    stage_ids:
    - data_collection
  - id: finance-C-022
    when: When implementing analyst report completion validation
    action: Check report length >= 100 characters to confirm analysis completion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without report length validation, analysts may prematurely exit without generating meaningful analysis content,
      resulting in empty or truncated reports
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-024
    when: When configuring analyst tool call limits
    action: Set max_tool_calls to 1 for fundamentals analyst due to single data fetch design
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Fundamentals data is fetched in one call with all financial metrics; excessive calls waste API quota and
      extend analysis time unnecessarily
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-025
    when: When configuring analyst tool call limits for data-gathering analysts
    action: Set max_tool_calls to 3 for market, social, and news analysts
    severity: high
    kind: resource_boundary
    modality: must
    consequence: These analysts require multiple data fetches across different sources; lower limits cause premature termination
      with incomplete analysis
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-026
    when: When using analyst pipeline for stock analysis
    action: Synchronize stock data before running analysis
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without pre-synchronized data, analysts receive empty or stale data leading to incorrect analysis and misleading
      investment recommendations
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-027
    when: When implementing analyst sequential execution
    action: Insert MsgClear nodes between consecutive analysts to clear message history
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without MsgClear nodes, message history from previous analysts pollutes subsequent analyst context, causing
      cross-contamination of analysis results
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-029
    when: When defining AgentState for analyst pipeline
    action: Maintain separate tool_call_count counters for each analyst type
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Shared tool call counter across analysts causes incorrect loop termination; each analyst must track its own
      call count independently
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-030
    when: When using multi-analyst pipeline for investment decisions
    action: Claim real-time trading capability or live market execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: This is a research and learning platform for multi-agent stock analysis; presenting simulated analysis as
      live trading signals misleads users about actual market execution capability
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-031
    when: When presenting analyst pipeline analysis results
    action: Imply that backtest analysis results guarantee future investment returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Past performance of AI-generated analysis does not guarantee future returns; presenting historical analysis
      accuracy as predictive certainty violates financial advisory regulations
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-032
    when: When analyst reports are empty after max_tool_calls
    action: Skip retry or fallback mechanism when analyst generates empty report
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Empty reports propagate to downstream debate and decision stages, corrupting the entire investment analysis
      pipeline with invalid data
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-033
    when: When connecting analysts in the workflow graph
    action: Connect last analyst's MsgClear to Bull Researcher node
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Workflow graph requires explicit edge from final analyst's MsgClear to the debate stage; missing this edge
      causes pipeline to terminate prematurely without investment debate
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-034
    when: When implementing analyst market detection
    action: Use StockUtils.get_market_info() for multi-market ticker classification
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without proper market detection, analysts use incorrect data sources for wrong markets (e.g., US data for
      China stocks), producing fundamentally flawed analysis
    stage_ids:
    - multi_analyst_pipeline
  - id: finance-C-035
    when: When implementing bull_researcher node logic
    action: retrieve historical memory via memory.get_memories() before generating bull case
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without historical context from past similar situations, bull researcher may repeat previous investment mistakes
      and generate arguments that lack learned lessons from historical failures
    stage_ids:
    - investment_debate
  - id: finance-C-036
    when: When implementing bear_researcher node logic
    action: retrieve historical memory via memory.get_memories() before generating bear case
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without historical context, bear researcher cannot leverage lessons learned from past market downturns and
      may generate incomplete risk assessments
    stage_ids:
    - investment_debate
  - id: finance-C-038
    when: When implementing Research Manager synthesis
    action: incorporate both bull_history and bear_history in the investment_plan synthesis
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Research Manager synthesis that ignores either perspective produces biased investment plans that misrepresent
      the true risk-reward profile
    stage_ids:
    - investment_debate
  - id: finance-C-040
    when: When configuring ChromaDB for vector similarity search
    action: disable anonymized_telemetry in ChromaDB Settings to prevent data leakage
    severity: high
    kind: domain_rule
    modality: must
    consequence: ChromaDB telemetry enabled by default may send query embeddings and financial data to external servers, violating
      data privacy requirements for investment research
    stage_ids:
    - investment_debate
  - id: finance-C-041
    when: When managing debate state across rounds
    action: maintain InvestDebateState with bull_history and bear_history as separate fields
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Merging bull and bear histories prevents proper reflection on individual researcher performance during the
      reflection_memory stage
    stage_ids:
    - investment_debate
  - id: finance-C-042
    when: When controlling debate round execution
    action: terminate debate after count >= 2 * max_debate_rounds and transition to Research Manager
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without round limit enforcement, the debate may continue indefinitely causing excessive LLM calls, increased
      latency, and higher API costs without additional insight
    stage_ids:
    - investment_debate
  - id: finance-C-043
    when: When configuring the investment debate system
    action: set max_debate_rounds to balance thoroughness with latency tradeoffs
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Setting max_debate_rounds too high increases latency without proportional insight improvement; setting too
      low reduces debate quality and opposing viewpoint coverage
    stage_ids:
    - investment_debate
  - id: finance-C-044
    when: When embedding long text for memory retrieval
    action: exceed max_embedding_length limit (default 50000 characters) for ChromaDB vector generation
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Text exceeding the embedding length limit causes get_embedding() to return zero vectors, resulting in failed
      memory retrieval and loss of historical context
    stage_ids:
    - investment_debate
  - id: finance-C-045
    when: When integrating memory with LLM providers
    action: proceed without API key verification for embedding generation
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Without API key verification, get_embedding() silently returns zero vectors causing memory retrieval to fail
      without clear error indication
    stage_ids:
    - investment_debate
  - id: finance-C-046
    when: When designing Research Manager prompt
    action: require explicit target price analysis with specific price targets rather than generic responses
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Research Manager that provides vague price targets (e.g., 'cannot determine') produces investment plans that
      lack actionable guidance for trading decisions
    stage_ids:
    - investment_debate
  - id: finance-C-049
    when: When initializing Bull and Bear researchers
    action: pass separate memory instances for bull_memory and bear_memory
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using a shared memory instance for both researchers causes cross-contamination of historical lessons, reducing
      the distinctiveness of bull and bear perspectives
    stage_ids:
    - investment_debate
  - id: finance-C-050
    when: When processing empty ChromaDB collection
    action: return empty list when situation_collection.count() equals zero
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Querying an empty ChromaDB collection without proper handling causes unexpected results or errors in memory
      retrieval for new users with no historical data
    stage_ids:
    - investment_debate
  - id: finance-C-053
    when: When handling ChromaDB singleton collection access
    action: use thread-safe get_or_create_collection with locking mechanism
    severity: high
    kind: domain_rule
    modality: must
    consequence: Concurrent collection creation without proper locking causes ChromaDB to throw duplicate collection errors,
      breaking memory retrieval in multi-threaded scenarios
    stage_ids:
    - investment_debate
  - id: finance-C-054
    when: When designing bull_researcher and bear_researcher prompts
    action: include current_response from the opposing researcher for responsive debate
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Bull and bear researchers that don't see opposing arguments generate isolated monologues instead of interactive
      debate, reducing the quality of investment thesis evaluation
    stage_ids:
    - investment_debate
  - id: finance-C-055
    when: When using embedding provider fallback
    action: check DashScope API key availability before attempting TextEmbedding.call
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Calling DashScope API without verified API key causes authentication errors and complete memory feature failure
    stage_ids:
    - investment_debate
  - id: finance-C-056
    when: When swapping vector store backend
    action: maintain compatibility with FinancialSituationMemory interface (add_situations, get_memories)
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Replacing ChromaDB with an incompatible vector store breaks memory retrieval, causing loss of historical
      learning capability
    stage_ids:
    - investment_debate
  - id: finance-C-057
    when: When initializing ChromaDBManager singleton
    action: implement double-check locking pattern to prevent multiple instances
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without double-check locking, concurrent initialization may create multiple ChromaDBManager instances causing
      collection access conflicts
    stage_ids:
    - investment_debate
  - id: finance-C-064
    when: When implementing the trader agent
    action: Use quick_thinking_llm for trading plan generation since it is template-driven and doesn't require deep reasoning
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using deep_thinking_llm for trader decisions would be inefficient and unnecessarily costly. The design decision
      explicitly requires quick_thinking_llm for trading decisions as per the architecture specification
    stage_ids:
    - trading_decision
  - id: finance-C-066
    when: When processing trading decisions for downstream consumption
    action: Include confidence score in range 0-1 and risk score in range 0-1 in the structured output
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Downstream components expect confidence and risk scores for decision ranking. Missing or out-of-range scores
      will corrupt the decision quality assessment system
    stage_ids:
    - trading_decision
  - id: finance-C-067
    when: When configuring the trading agent system
    action: Allow the trader_llm to be configurable as a replaceable point for different LLM models
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Hardcoding the trader LLM would prevent customization for different trading strategies, market conditions,
      or cost optimization requirements
    stage_ids:
    - trading_decision
  - id: finance-C-068
    when: When the trader agent has access to memory
    action: Incorporate past trading memories and lessons into current decision-making
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Without leveraging historical trading experience, the system will repeat past mistakes and miss learning
      opportunities from previous trading cycles
    stage_ids:
    - trading_decision
  - id: finance-C-071
    when: When the signal processor extracts trading decisions
    action: Map action field to Chinese buy/hold/sell terminology (买入/持有/卖出) exclusively
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using English terminology (buy/hold/sell) or other variants would cause inconsistency in the Chinese-language
      trading system and potential execution errors
    stage_ids:
    - trading_decision
  - id: finance-C-072
    when: When generating trading decisions
    action: Calculate target prices based on fundamentals analysis (P/E, P/B, DCF) and technical analysis (support/resistance
      levels)
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Arbitrary target prices without analytical basis will produce unreliable trading signals that cannot be validated
      or improved through backtesting
    stage_ids:
    - trading_decision
  - id: finance-C-073
    when: When trading decisions are generated with insufficient data
    action: Claim inability to determine target price or request more information as a reason to skip the decision
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: The system explicitly requires concrete trading decisions. Claiming inability to provide target prices would
      violate the mandatory requirement and prevent the trading pipeline from completing
    stage_ids:
    - trading_decision
  - id: finance-C-077
    when: When calling LLM for risk analyst responses
    action: validate that LLM response contains meaningful content (length > 10 characters)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Empty or invalid LLM responses result in blank debate history, corrupting the Risk Judge's synthesis and
      producing unreliable final_trade_decision
    stage_ids:
    - risk_debate
  - id: finance-C-078
    when: When memory system returns None in risk analysis
    action: fall back to empty past_memories list and log warning without crashing
    severity: high
    kind: domain_rule
    modality: must
    consequence: If memory None causes exception, the entire risk_debate stage fails, preventing final_trade_decision from
      being generated
    stage_ids:
    - risk_debate
  - id: finance-C-079
    when: When each LLM retry attempts fail in risk_debate
    action: generate default hold (持有) decision with clear indication of technical failure
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without fallback decision, the system produces no trading signal, leaving the portfolio unmanaged and missing
      market opportunities
    stage_ids:
    - risk_debate
  - id: finance-C-080
    when: When determining risk debate conversation flow
    action: enforce Risky Analyst speaks first, followed by Safe Analyst, then Neutral Analyst (round-robin)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Disrupting the controlled debate sequence breaks the expected dialog flow, causing analysts to respond to
      wrong or missing previous arguments
    stage_ids:
    - risk_debate
  - id: finance-C-081
    when: When setting risk_score in signal processing
    action: default to 0.5 when no explicit risk assessment is provided in final_trade_decision
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Invalid or missing risk_score causes downstream position sizing to fail, potentially allowing unbounded leverage
      or zero exposure
    stage_ids:
    - risk_debate
  - id: finance-C-084
    when: When deploying TradingAgents-CN in production
    action: obtain human review of final_trade_decision before executing any trades
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Bypassing human oversight of AI-generated trading decisions may result in unexpected losses from model hallucinations
      or edge case failures
    stage_ids:
    - risk_debate
  - id: finance-C-085
    when: When selecting max_risk_discuss_rounds configuration value
    action: set max_risk_discuss_rounds to 0 (disables risk debate)
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Setting max_risk_discuss_rounds=0 bypasses the entire risk debate mechanism, sending the workflow directly
      from Trader to Risk Judge without risk assessment
    stage_ids:
    - risk_debate
  - id: finance-C-086
    when: When constructing RiskDebateState history field
    action: append new arguments with speaker prefix (Risky Analyst:, Safe Analyst:, Neutral Analyst:) to maintain traceability
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without speaker prefixes, the Risk Judge cannot distinguish which debater made each argument, compromising
      synthesis quality
    stage_ids:
    - risk_debate
  - id: finance-C-091
    when: When implementing signal processing default values
    action: Use confidence=0.5 and risk_score=0.5 for default invalid-input decisions, not exception-throwing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Raising exceptions on invalid inputs halts the trading pipeline, preventing any trade execution when graceful
      degradation is possible
    stage_ids:
    - signal_processing
  - id: finance-C-092
    when: When implementing LLM-based signal extraction
    action: Implement regex fallback to extract JSON from LLM response when direct parsing fails
    severity: high
    kind: resource_boundary
    modality: must
    consequence: LLM response without valid JSON structure causes complete signal processing failure, preventing trade decisions
    stage_ids:
    - signal_processing
  - id: finance-C-093
    when: When implementing LLM signal extraction
    action: Assume LLM will always return valid JSON — implement multiple fallback layers
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Over-reliance on LLM JSON output causes service unavailability when LLM produces unstructured text, even
      when trading signal is valid
    stage_ids:
    - signal_processing
  - id: finance-C-094
    when: When implementing smart price estimation fallback
    action: 'Use market-specified multipliers for price estimation: China 1.15/0.95, US 1.12/0.92 for buy/sell'
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using wrong market multipliers causes target prices far from reasonable values for the market, leading to
      poor trade entry/exit decisions
    stage_ids:
    - signal_processing
  - id: finance-C-096
    when: When implementing signal processing fallback hierarchy
    action: 'Follow strict fallback order: LLM JSON parsing → regex extraction → simple text extraction → smart estimation
      → default decision'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping fallback levels causes premature failure, rejecting valid trading signals that could be extracted
      with deeper analysis
    stage_ids:
    - signal_processing
  - id: finance-C-097
    when: When setting confidence and risk_score values
    action: Clamp confidence and risk_score to [0, 1] range using float() conversion with default values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Out-of-range confidence/risk values cause incorrect position sizing and risk management calculations in downstream
      trading systems
    stage_ids:
    - signal_processing
  - id: finance-C-098
    when: When the LLM returns unstructured text
    action: Use regex pattern matching on response text to extract action and price as fallback
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unstructured LLM responses without JSON cause signal processing to return empty/default decisions, losing
      valid trading opportunities
    stage_ids:
    - signal_processing
  - id: finance-C-099
    when: When choosing default confidence values
    action: Use 0.5 for invalid/unknown inputs, not 0.7 — lower confidence signals uncertainty without rejecting valid signals
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Overconfident default values (0.7) for truly invalid signals cause aggressive position sizing on bad signals,
      amplifying losses
    stage_ids:
    - signal_processing
  - id: finance-C-100
    when: When the system receives invalid/malformed trading signals
    action: Return '持有' action with confidence=0.5 and risk_score=0.5, never raise exceptions or return null actions
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Exceptions or null actions on malformed input halt the trading pipeline entirely, preventing any trade execution
      even when other signals are valid
    stage_ids:
    - signal_processing
  - id: finance-C-101
    when: When presenting signal processing results
    action: Present target_price=None as valid output — the system cannot guarantee price extraction from each inputs
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Claiming all signals have extractable target prices over-promises system capability, causing downstream systems
      to expect prices that do not exist
    stage_ids:
    - signal_processing
  - id: finance-C-102
    when: When evaluating signal confidence values
    action: Treat confidence values as suggestions, not guarantees — LLM-extracted confidence may not reflect actual prediction
      accuracy
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting LLM confidence scores as calibrated probability estimates causes incorrect risk assessment and
      position sizing in live trading
    stage_ids:
    - signal_processing
  - id: finance-C-103
    when: When interpreting extracted target prices
    action: Treat target prices as analyst estimates, not guaranteed future prices — prices may differ from actual execution
      prices
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Assuming extracted target prices will be achieved causes incorrect profit/loss expectations and poor trade
      timing decisions
    stage_ids:
    - signal_processing
  - id: finance-C-105
    when: When embedding generation fails in memory operations
    action: Return 1024-dimensional zero vectors as fallback instead of raising exceptions
    severity: high
    kind: domain_rule
    modality: must
    consequence: If embedding generation throws exceptions instead of returning fallback vectors, the entire reflection pipeline
      fails, preventing memory storage and breaking the learning loop for all agents
    stage_ids:
    - reflection_memory
  - id: finance-C-106
    when: When storing financial situations in ChromaDB
    action: Use FinancialSituationMemory as the sole interface for each memory operations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct ChromaDB access bypassing FinancialSituationMemory breaks the embedding abstraction, causing embedding
      provider mismatches and preventing the fallback chain from functioning correctly
    stage_ids:
    - reflection_memory
  - id: finance-C-109
    when: When configuring embedding provider for memory operations
    action: Set DASHSCOPE_API_KEY environment variable when using dashscope, alibaba, qianfan, google, or openrouter LLM providers
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without DASHSCOPE_API_KEY for embedding, the memory system falls back to zero vectors, preventing storage
      and retrieval of historical situations, effectively disabling the reflection learning capability
    stage_ids:
    - reflection_memory
  - id: finance-C-110
    when: When text content exceeds embedding provider token limits
    action: Return zero vectors instead of truncating text to preserve analysis accuracy
    severity: high
    kind: domain_rule
    modality: must
    consequence: If text is truncated before embedding, the semantic meaning changes, causing incorrect similarity matches
      and storing corrupted memory vectors that lead to wrong trading insights
    stage_ids:
    - reflection_memory
  - id: finance-C-111
    when: When retrieving similar memories with n_matches parameter
    action: Limit n_matches to actual collection count to prevent query errors
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: If n_matches exceeds collection count, ChromaDB throws exception, causing memory retrieval to fail and breaking
      the reflection feedback loop that depends on past experiences
    stage_ids:
    - reflection_memory
  - id: finance-C-112
    when: When memory retrieval returns zero embedding vectors
    action: Return empty list instead of attempting similarity search with zero vectors
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Searching with zero vectors returns meaningless similarity scores, causing agents to receive irrelevant or
      incorrect historical memories that degrade analysis quality
    stage_ids:
    - reflection_memory
  - id: finance-C-114
    when: When retrieving semantically similar past situations
    action: Claim that semantic similarity implies market correlation or predictive value
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: ChromaDB similarity scores only measure textual semantic similarity, not actual market correlation. Mispresenting
      this as market prediction capability misleads users about system accuracy
    stage_ids:
    - reflection_memory
  - id: finance-C-115
    when: When executing reflection with returns_losses parameter
    action: Pass returns_losses to reflect_on_component for outcome-based learning
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without returns_losses in the reflection prompt, the system cannot learn from actual trading outcomes, causing
      the memory to store context without outcome-reward associations and degrading learning effectiveness
    stage_ids:
    - reflection_memory
  - id: finance-C-116
    when: When reflection generates insights for storage
    action: Generate insights as situation-recommendation tuples through LLM reflection
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Storing raw reports without LLM-generated reflection loses the structured learning mechanism. Without extracted
      insights, memory retrieval cannot provide actionable recommendations from past trading experiences
    stage_ids:
    - reflection_memory
  - id: finance-C-117
    when: When creating memory collections for each agent type
    action: Initialize separate memory collections for bull_researcher, bear_researcher, trader, invest_judge, and risk_manager
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without separate collections per agent type, different domain experiences mix together, causing cross-contamination
      where bull market insights pollute bear market learning and vice versa
    stage_ids:
    - reflection_memory
  - id: finance-C-118
    when: When embedding API calls fail with length limit errors
    action: Check for fallback_available flag and use OpenAI fallback client if present
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Without attempting fallback when primary embedding service hits limits, the memory system degrades unnecessarily,
      reducing the system's ability to learn from longer analysis sessions
    stage_ids:
    - reflection_memory
  - id: finance-C-119
    when: When reflection produces output for each agent
    action: Skip reflection for any agent when returns_losses is provided
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping reflection for any agent loses domain-specific learning, causing incomplete memory that fails to
      capture insights from bull/bear/trader/judge/risk perspectives, degrading multi-agent learning effectiveness
    stage_ids:
    - reflection_memory
  - id: finance-C-121
    when: When ChromaDB is initialized with is_persistent=False
    action: Claim that memory persists across application restarts without explicit persistence configuration
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: With is_persistent=False, all learned memories are lost on restart, misrepresenting the system's learning
      persistence capability to users expecting accumulated knowledge
    stage_ids:
    - reflection_memory
  - id: finance-C-122
    when: When creating analysis tasks via the REST API
    action: Return task_id immediately without waiting for analysis completion
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: HTTP requests will timeout or block the event loop if the API waits for long-running analysis to complete,
      causing degraded user experience and potential connection pool exhaustion
    stage_ids:
    - web_api_service
  - id: finance-C-123
    when: When resolving LLM API keys for analysis requests
    action: 'Apply priority order: model_config > provider_config > env_var'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using wrong API key priority causes authentication failures with the intended provider, leading to analysis
      task failures and wasted computational resources
    stage_ids:
    - web_api_service
  - id: finance-C-124
    when: When API key values are stored in MongoDB configuration
    action: Accept placeholder strings like 'your-api-key' as valid credentials
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using placeholder API keys causes authentication failures with external LLM providers, resulting in failed
      analysis tasks and misleading error messages for users
    stage_ids:
    - web_api_service
  - id: finance-C-125
    when: When Redis is unavailable or REDIS_ENABLED=false
    action: Fall back to file-based progress storage in ./data/progress/
    severity: high
    kind: resource_boundary
    modality: must
    consequence: System will fail completely if Redis unavailability is not handled, preventing users from tracking analysis
      progress and causing complete service outage
    stage_ids:
    - web_api_service
  - id: finance-C-126
    when: When initializing Redis progress tracker
    action: Check REDIS_ENABLED environment variable before attempting Redis connection
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without checking REDIS_ENABLED flag, the system will attempt Redis connections even when intentionally disabled,
      causing unnecessary connection errors and degraded performance
    stage_ids:
    - web_api_service
  - id: finance-C-127
    when: When updating task progress during analysis execution
    action: Update memory state, MongoDB, and trigger WebSocket push simultaneously
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent state across memory, database, and WebSocket causes frontend to display stale or incorrect progress
      information, confusing users about actual task status
    stage_ids:
    - web_api_service
  - id: finance-C-128
    when: When creating RedisProgressTracker in async context
    action: Create tracker in thread pool via asyncio.to_thread to avoid event loop blocking
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Creating RedisProgressTracker synchronously in async context blocks the event loop, causing all concurrent
      HTTP requests to stall and reducing throughput to sequential execution
    stage_ids:
    - web_api_service
  - id: finance-C-129
    when: When executing analysis in the shared thread pool
    action: Reuse TradingAgentsGraph instances across concurrent tasks
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: TradingAgentsGraph contains mutable state (ticker, curr_state) that causes data corruption when shared across
      threads, leading to incorrect analysis results for multiple concurrent users
    stage_ids:
    - web_api_service
  - id: finance-C-130
    when: When initializing MemoryStateManager for thread-safe operations
    action: Use threading.Lock instead of asyncio.Lock for synchronization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using asyncio.Lock in threads spawned by ThreadPoolExecutor causes 'is bound to a different event loop' errors,
      crashing analysis tasks and leaving tasks in undefined state
    stage_ids:
    - web_api_service
  - id: finance-C-131
    when: When handling concurrent analysis requests
    action: Allow more than 3 concurrent analysis tasks in the shared thread pool
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Exceeding the configured max_workers=3 causes thread pool exhaustion, leading to analysis task queuing, increased
      latency, and potential memory pressure from queued work items
    stage_ids:
    - web_api_service
  - id: finance-C-132
    when: When connecting to MongoDB during analysis task creation
    action: Create upsert record in analysis_tasks collection with task_id and user_id
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing MongoDB task record causes status queries to fail, making it impossible for users to track task progress
      through the REST API
    stage_ids:
    - web_api_service
  - id: finance-C-133
    when: When validating stock codes before analysis execution
    action: Call prepare_stock_data_async to verify stock code validity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping stock validation allows invalid stock codes to proceed to the analysis pipeline, causing cryptic
      errors from data fetching layers and wasting LLM API tokens
    stage_ids:
    - web_api_service
  - id: finance-C-134
    when: When handling WebSocket connections for progress updates
    action: Use async lock to synchronize access to active_connections dictionary
    severity: high
    kind: domain_rule
    modality: must
    consequence: Race conditions in WebSocket connection management cause connection state corruption, leading to progress
      updates being sent to wrong clients or lost updates
    stage_ids:
    - web_api_service
  - id: finance-C-135
    when: When catching exceptions during progress tracker creation
    action: Propagate Redis connection failures that prevent progress tracking
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Uncaught Redis connection exceptions crash the entire analysis task, leaving users with no progress information
      and requiring manual cleanup of orphaned tasks
    stage_ids:
    - web_api_service
  - id: finance-C-136
    when: When providing WebSocket task progress endpoint
    action: Send connection confirmation message before entering message loop
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Frontend cannot confirm successful connection, causing retry loops and user confusion about whether real-time
      updates are active
    stage_ids:
    - web_api_service
  - id: finance-C-137
    when: When updating task status in memory during background execution
    action: Create new event loop via asyncio.new_event_loop() instead of reusing the main loop
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reusing the async event loop in a thread pool context causes 'attached to a different loop' errors, breaking
      progress updates and leaving tasks in inconsistent state
    stage_ids:
    - web_api_service
  - id: finance-C-138
    when: When claiming response time performance for task submission
    action: Claim sub-second response times if synchronous operations exist in submission path
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Marketing sub-second SLA while having blocking MongoDB or logging operations causes perception gap, as actual
      response times can exceed 1 second under load, violating stated SLAs
    stage_ids:
    - web_api_service
  - id: finance-C-139
    when: When claiming real-time WebSocket progress delivery
    action: Claim guaranteed 1-second delivery latency if Redis pub/sub is not implemented
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Stating guaranteed 1-second WebSocket delivery without Redis pub/sub means polling is used, which cannot
      guarantee latency and may consume excessive resources
    stage_ids:
    - web_api_service
  - id: finance-C-140
    when: When saving analysis results to MongoDB
    action: Implement fallback save strategy when primary save fails
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Failed result save without fallback loses analysis output, requiring users to re-run expensive LLM-based
      analysis and incurring additional API costs
    stage_ids:
    - web_api_service
  - id: finance-C-141
    when: When handling task status queries for completed/failed tasks
    action: Merge data from both memory cache and MongoDB to verify consistency
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Querying only memory for completed tasks loses data after service restart; querying only MongoDB may miss
      recent in-memory updates, causing users to see stale or missing results
    stage_ids:
    - web_api_service
  - id: finance-C-142
    when: When considering skipping stock code validation
    action: Skip prepare_stock_data_async validation due to perceived simplicity of the operation
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping stock validation because the input 'looks like a valid stock code' causes downstream data fetching
      to fail with cryptic errors from the trading agents library
    stage_ids:
    - web_api_service
  - id: finance-C-143
    when: When Redis appears to be available during tracker initialization
    action: Skip the file fallback path because Redis connectivity check passed once
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Assuming Redis stays connected throughout task execution causes silent progress loss if Redis becomes unavailable
      mid-analysis, leaving users with no progress visibility
    stage_ids:
    - web_api_service
  - id: finance-C-144
    when: When creating MongoDB connections in thread pool execution
    action: Use synchronous MongoClient instead of async client to avoid event loop conflicts
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using async MongoDB client in a thread causes event loop assertion errors, breaking progress tracking and
      leaving tasks in inconsistent database state
    stage_ids:
    - web_api_service
  - id: finance-C-145
    when: When processing WebSocket messages from connected clients
    action: Handle WebSocketDisconnect exception to gracefully clean up connections
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Unhandled WebSocketDisconnect causes connection leak, accumulating stale connections that consume memory
      and prevent proper task-to-connection mapping
    stage_ids:
    - web_api_service
  - id: finance-C-149
    when: When implementing token tracking across LLM providers
    action: integrate token tracking into the _generate() method for consistent cost logging
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without token tracking in _generate(), the system will not record API usage costs, making it impossible to
      monitor expenses and detect abnormal spending patterns
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-151
    when: When using Qianfan models with long input sequences
    action: truncate messages to fit within the token limit before generation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without truncation, Qianfan models will reject requests exceeding their context window (5120 tokens for ernie-3.5-8k),
      causing analysis failures for stocks with extensive historical data
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-153
    when: When implementing mixed-mode (quick/deep LLMs from different providers)
    action: check if quick_provider differs from deep_provider before creating instances
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without provider comparison, the system may create duplicate LLM instances or miss the performance/cost benefits
      of using cheap fast models for simple tasks and expensive deep models for synthesis
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-154
    when: When the token_tracker import fails
    action: fail silently without crashing the application
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Failing hard when config_manager is unavailable will prevent the entire trading agents system from starting,
      even though token tracking is optional functionality
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-156
    when: When creating adapters for OpenAI-compatible providers
    action: inherit from OpenAICompatibleBase for unified interface implementation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Creating a custom adapter without inheriting from OpenAICompatibleBase will break the unified token tracking,
      provider identification, and LangChain compatibility that all adapters depend on
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-158
    when: When calculating or estimating token usage for Chinese text
    action: use the conservative ratio of 2 characters per token
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using incorrect token estimation ratios (e.g., 1 character/token for Chinese) may cause underestimation of
      token usage, leading to inaccurate cost calculations and potential truncation issues with providers that have strict
      token limits
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-159
    when: When configuring timeout values for LLM API calls
    action: use reasonable timeout defaults (180 seconds) to prevent indefinite blocking
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without timeout protection, LLM API calls that hang (due to network issues or provider problems) will block
      the entire trading analysis pipeline indefinitely, causing system unavailability
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-160
    when: When estimating output token count
    action: estimate based on actual message content length, not hardcoded values
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using hardcoded token estimates will cause inaccurate cost tracking, making it impossible to properly budget
      for API usage or detect abnormal spending patterns in production
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-161
    when: When handling DeepSeek API responses without token usage metadata
    action: fall back to token estimation when actual token counts are unavailable
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Silently failing to track token usage when metadata is missing will result in incomplete cost records, making
      it impossible to generate accurate billing reports or detect unauthorized API usage
    stage_ids:
    - llm_provider_abstraction
  - id: finance-C-165
    when: When processing trading signals from the investment and risk debate outputs
    action: Output only Chinese action labels (买入/持有/卖出) in SignalProcessor — English buy/hold/sell labels are prohibited
    severity: high
    kind: domain_rule
    modality: must
    consequence: English action labels violate the Chinese-language-first design contract, causing regulatory and UI display
      inconsistencies for Chinese users
  - id: finance-C-166
    when: When selecting LLM models for agent operations
    action: Use quick_think_llm for data collection and report generation; use deep_think_llm for synthesis and judgment —
      these model roles must not be swapped
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using deep_think_llm for data collection wastes tokens and dramatically slows analysis; using quick_think_llm
      for synthesis degrades judgment quality, producing inferior investment decisions
  - id: finance-C-167
    when: When configuring LLM temperature parameters
    action: Set temperature to 0.1 (very low) across each LLM adapters for deterministic, reproducible output
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: High temperature causes non-deterministic analyst outputs, making backtest results unreproducible and analysis
      signals inconsistent across repeated runs
  - id: finance-C-171
    when: When presenting or reporting this system's analysis outputs to users
    action: Claim that analysis signals or simulated trading results equal expected live trading returns — the system uses
      historical data approximations and simulated execution that ignore market impact, financing costs, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make real capital allocation decisions based on inflated simulated returns, leading to severe underperformance
      when deploying live capital and potential financial loss
  - id: finance-C-172
    when: When deploying or promoting this system externally
    action: Claim real-time trading support — the system does not support live market execution and is explicitly unsuitable
      for production deployment without proper configuration
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy the system for live trading with real money, causing direct financial losses due to execution
      delays, missing order book data, and lack of exchange connectivity
  - id: finance-C-173
    when: When presenting simulated (paper) trading results
    action: Present simulated trading wallet results as proof of real execution capability or as validated investment performance
      — simulated execution lacks slippage modeling, margin requirements, and order fill guarantees
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users believe their strategy is proven when simulated fills never fail and ignore the realities of live order
      execution, position sizing limits, and margin calls
  - id: finance-C-174
    when: When using LLM-generated market analysis for investment decisions
    action: Claim or imply that AI model predictions have guaranteed accuracy — LLM outputs for financial analysis carry inherent
      uncertainty and prediction accuracy degrades in live markets due to regime changes
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users rely on AI outputs as if they were statistical certainty, leading to overconfident position sizing
      and catastrophic losses when market conditions shift beyond training data patterns
  - id: finance-C-176
    when: When detecting market type from a stock ticker
    action: Use StockUtils.get_market_info() to determine {is_china, is_hk, is_us, currency_name, currency_symbol} — strategies
      must not hardcode market assumptions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hardcoded market assumptions cause incorrect currency formatting, wrong data source selection, and invalid
      price ranges for the detected market, corrupting investment analysis
  - id: finance-C-177
    when: When configuring debate round parameters
    action: Set max_debate_rounds and max_risk_discuss_rounds to their configured values (default 1) — the conditional logic
      uses these values to determine when Bull/Bear and Risky/Safe/Neutral debates terminate
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Infinite debates consume tokens and API rate limits without producing a final trading decision; incorrect
      round counts cause premature or delayed termination
  - id: finance-C-178
    when: When generating LLM prompts for any analyst or researcher node
    action: Generate each LLM output text in Chinese — prompts must not allow English-only responses for Chinese-market-focused
      analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: English outputs violate the Chinese-localization contract, making results unusable for the target Chinese
      user base and breaking the signal processing pipeline's action label validation
  - id: finance-C-179
    when: When integrating third-party data sources (FinnHub, Yahoo Finance, Tushare, AKShare)
    action: Respect rate limits defined in providers_config.py for each data source — exceeding rate limits causes API access
      revocation and data gaps in analysis
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Rate limit violations cause API key bans, resulting in missing market data, sentiment data, and news data
      that degrades or invalidates the entire multi-agent analysis
  - id: finance-C-181
    when: When refactoring data access layer or introducing dependency injection patterns
    action: Replace the global DataSourceManager singleton with multiple distributed instances — the singleton pattern ensures
      single-source-of-truth for data acquisition logic and consistent caching behavior across consumers
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Distributed data managers introduce source priority conflicts and cache fragmentation, breaking consistent
      data acquisition behavior across all data consumers and potentially returning stale or conflicting data
    derived_from_bd_id: BD-003
  - id: finance-C-182
    when: When configuring the investment debate stage parameters
    action: Increase max_debate_rounds beyond the configured default without explicit performance justification — each additional
      round multiplies latency proportionally and increases API costs without proportional analytical improvement
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Increasing debate rounds beyond the default threshold causes exponential latency growth and unnecessary cost
      accumulation without commensurate analytical benefit for structured rapid analysis tasks
    derived_from_bd_id: BD-007
  - id: finance-C-183
    when: When implementing price extraction and position sizing logic for multi-market stocks
    action: Apply market-aware currency context (CNY/USD/HKD) based on the stock's exchange — extract currency from market_info
      before any price comparison or position calculation to prevent cross-currency comparison errors
    severity: high
    kind: domain_rule
    modality: must
    consequence: Assuming single currency causes incorrect position sizing for cross-market stocks, leading to portfolio imbalances
      and fundamentally wrong risk calculations across the multi-market portfolio
    derived_from_bd_id: BD-015
  - id: finance-C-184
    when: When configuring LLM parameters for quick analysis tasks
    action: Use temperature=0.7, max_tokens=4000, and timeout=180 seconds for quick analysis mode — higher temperature values
      increase unpredictability without commensurate benefit for rapid analysis tasks
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using temperature above 0.7 for quick analysis introduces unpredictable responses and incoherent outputs,
      causing analysis quality degradation and potentially incorrect trading signals
    derived_from_bd_id: BD-030
  - id: finance-C-185
    when: When implementing data source fallback logic in DataSourceManager
    action: 'Query data sources in strict priority order: MongoDB (cached) → Tushare (paid API) → AKShare (free) → BaoStock
      (free) — changing this order disrupts the cost-latency tradeoff and may exceed rate limits on free sources'
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Reordering the fallback chain causes stale data to be used over fresh data, increases costs by unnecessarily
      hitting paid APIs, and risks rate limiting on free data sources causing service disruption
    derived_from_bd_id: BD-001
  - id: finance-C-186
    when: When implementing market classification logic for multi-market stocks (China/US/HK)
    action: Use StockUtils.get_market_info() utility to obtain boolean flags (is_china/is_hk/is_us) — do not implement per-agent
      market detection logic that risks inconsistent classification across modules
    severity: high
    kind: domain_rule
    modality: must
    consequence: Per-agent market detection without centralized utility causes inconsistent classification across modules,
      leading to incorrect data source routing and currency handling that silently corrupts analysis results
    derived_from_bd_id: BD-006
  - id: finance-C-187
    when: When configuring the Trader node's LLM model for trading plan generation
    action: Use quick_thinking_llm for trading plan generation — deep reasoning models are overkill for template-driven task
      generation and significantly increase API costs without proportional output quality improvement
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using deep reasoning models for trading plan generation increases API costs substantially without producing
      meaningfully better outputs for structured template-driven generation tasks
    derived_from_bd_id: BD-010
  - id: finance-C-188
    when: When implementing numerical computations involving matrix operations in the data collection pipeline
    action: Assume the framework handles matrix ill-conditioning and numerical stability automatically — matrix operations
      lack stability checks and condition number validation; matrices can become near-singular causing computational failures
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Matrix operations without ill-conditioning checks produce numerical instability that accumulates silently,
      causing incorrect calculations in portfolio optimization and risk management that may not be obvious until significant
      losses occur
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-189
    when: When implementing matrix operations in the data collection pipeline
    action: Implement condition number validation before matrix inversion or decomposition — reject or regularize matrices
      with condition number > 1e10 using Tikhonov regularization; use numpy.linalg.slogdet for log-determinant calculations
      to avoid numerical overflow
    severity: high
    kind: domain_rule
    modality: must
    consequence: Matrices with high condition numbers cause numerical overflow/underflow during inversion and decomposition,
      leading to incorrect portfolio optimizations and fundamentally wrong risk calculations in production systems
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-190
    when: When configuring debate and agent parameters in the investment debate stage
    action: Set max_debate_rounds=1 (minimum enforced) and max_tool_calls=3 per analyst — validate these boundaries using
      validate_debate_rounds() function and per-agent node initialization checks; dynamic rounds based on disagreement intensity
      must not be implemented without explicit architectural approval
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting max_debate_rounds below 1 causes infinite loops, while unlimited max_tool_calls causes resource exhaustion
      and degraded system performance with no analytical improvement
    derived_from_bd_id: BD-103
  - id: finance-C-191
    when: When configuring API key resolution in multi-provider LLM setups
    action: 'Resolve API keys using the hierarchical priority: model_config → provider_config → env_var — do not collapse
      to single-level lookup or hardcode keys at provider level'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect API key resolution causes authentication failures or wrong provider charges, breaking cost optimization
      routing where different models should use different API keys
    derived_from_bd_id: BD-021
  - id: finance-C-192
    when: When configuring LLM parameters for stock analysis in financial trading applications
    action: Set temperature to 0.1 for stock analysis to verify highly deterministic outputs — do not increase to 0.7 or higher
      which introduces randomness into financial recommendations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Higher temperature produces inconsistent trading signals across identical inputs, making backtest results
      non-reproducible and analyst comparisons unreliable
    derived_from_bd_id: BD-032
  - id: finance-C-193
    when: When setting up the data collection stage for LLM-powered trading agents
    action: Verify ONLINE_TOOLS_ENABLED defaults to false for production deployments — explicitly enable only when real-time
      external data is required with controlled API costs
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Online tools enabled by default cause uncontrolled API costs, rate limiting failures, and non-deterministic
      behavior in production environments
    derived_from_bd_id: BD-028
  - id: finance-C-194
    when: When configuring news data fetching for sentiment analysis in momentum trading strategies
    action: Verify ONLINE_NEWS_ENABLED defaults to true for momentum-driven strategies — verify news APIs are properly configured
      with rate limit handling before disabling
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Disabling online news reduces analysis quality for momentum strategies, causing outdated sentiment signals
      that lead to delayed or missed trading opportunities
    derived_from_bd_id: BD-029
  - id: finance-C-195
    when: When implementing stock screening logic for financial criteria filtering
    action: 'Implement each 12 operator types: GT, LT, GTE, LTE, EQ, NE, BETWEEN, IN, NOT_IN, CONTAINS, CROSS_UP, CROSS_DOWN
      — do not omit technical signal operators CROSS_UP/CROSS_DOWN'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing CROSS_UP/CROSS_DOWN operators prevents common technical screening patterns like price crossover signals,
      creating gaps in financial screening expressiveness
    derived_from_bd_id: BD-062
  - id: finance-C-196
    when: When designing database queries for stock screening operations
    action: Use MongoDB view joining stock_basic_info, market_quotes, stock_financial_data for screening queries — do not
      replace with application-side joins which cause unacceptable query latency
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Application-side joins on normalized tables cause excessive network round-trips and query latency, making
      real-time screening impractical for time-sensitive trading decisions
    derived_from_bd_id: BD-071
  - id: finance-C-197
    when: When implementing market detection, price extraction, or trading validation modules
    action: Consolidate currency/market validation into a shared service to avoid triple-validation overhead — if separate
      validators are maintained, verify they produce consistent results
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Triple currency validation across StockUtils.get_market_info(), SignalProcessor, and Trader adds latency
      and risks divergent results if implementations diverge
    derived_from_bd_id: BD-118
  - id: finance-C-198
    when: When setting up multi-provider LLM routing with cross-provider key management
    action: Implement provider-specific rate limiting, latency monitoring, and fallback logic before enabling cross-provider
      routing — document failure modes per provider
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Cross-provider routing amplifies operational complexity with different rate limits, latency profiles, and
      failure modes per provider — unhandled failures cascade unpredictably
    derived_from_bd_id: BD-123
  - id: finance-C-200
    when: When implementing model selection logic for multi-level analysis tasks
    action: Use model capability level system (1-5) with role matching (QUICK_ANALYSIS vs DEEP_ANALYSIS) and enforce ANALYSIS_DEPTH_REQUIREMENTS
      mapping — trigger fallback or error on capability mismatch
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Model capability mismatches cause over-provisioning (excessive cost) or under-provisioning (poor analysis
      quality) for tasks that require specific capability levels
    derived_from_bd_id: BD-110
  - id: finance-C-201
    when: When implementing batch analysis request handling logic
    action: Enforce a maximum of 10 stocks per batch analysis request; reject or partition batches exceeding this limit
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Batches exceeding 10 stocks consume unbounded memory and CPU, risking OOM crashes or timeout failures that
      cascade to other users
    derived_from_bd_id: BD-060
  - id: finance-C-202
    when: When implementing failed analysis retry logic
    action: Exceed 3 retry attempts for failed analysis operations; implement circuit-breaking after 3 failures
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Excessive retries accumulate exponential latency, degrade user experience, and waste resources on failures
      unlikely to succeed
    derived_from_bd_id: BD-061
  - id: finance-C-203
    when: When implementing the memory system's vector storage layer
    action: Use ChromaDB for vector storage of past decisions; do not substitute with alternative vector databases without
      verifying consistency model compatibility
    severity: high
    kind: domain_rule
    modality: must
    consequence: Alternative databases like Pinecone or Weaviate have different consistency models and metadata handling that
      breaks memory retrieval assumptions, causing retrieval failures or silent data loss
    derived_from_bd_id: BD-046
  - id: finance-C-204
    when: When initializing the memory embedding system
    action: Use DashScope text-embedding-v3 for Chinese text embeddings; do not substitute OpenAI or other embedding models
      without verifying Chinese financial document semantic accuracy
    severity: high
    kind: domain_rule
    modality: must
    consequence: OpenAI embeddings underperform on Chinese text, causing degraded semantic similarity detection for Chinese
      financial documents and introducing foreign API dependency
    derived_from_bd_id: BD-047
  - id: finance-C-205
    when: When calculating RSI indicators for A-share market analysis
    action: Use exponential weighted moving average with com=n-1 and adjust=True parameters to match TongDaXin and 同花顺 platform
      calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Standard pandas ewm without com parameter produces RSI values different from Chinese trading platforms, causing
      backtest-to-live inconsistency when comparing against TongDaXin
    derived_from_bd_id: BD-089
  - id: finance-C-207
    when: When implementing moving average and Bollinger Bands calculations
    action: Set pandas min_periods=1 to enable indicator calculation from the first available data point; if using a different
      value, document the impact on early-period indicator availability
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using min_periods=window causes empty leading periods with no indicator values, reducing usability for shorter
      datasets and potentially causing reference errors in downstream strategy logic
    derived_from_bd_id: BD-098
  - id: finance-C-208
    when: When constructing SignalProcessor with action_map
    action: Require Chinese action labels (买入/持有/卖出) and validate currency match to stock market at SignalProcessor construction
      time; throw ValueError for mismatches
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping currency validation allows cross-market signal errors, such as sending Hong Kong currency signals
      for Shanghai-listed stocks, causing order rejection in live trading
    derived_from_bd_id: BD-102
  - id: finance-C-209
    when: When implementing or refactoring news relevance scoring logic
    action: Maintain the three-component weighted average combining rule-based keyword scores, semantic embedding similarity,
      and ML classification probabilities — verify each three signal types are incorporated before final relevance determination
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing or replacing any signal component alters the relevance threshold, causing trading signals to include
      false positives (missing keyword filtering) or exclude valid signals (losing semantic/ML components), degrading strategy
      accuracy
    derived_from_bd_id: BD-080
  - id: finance-C-210
    when: When implementing semantic relevance matching between news and companies
    action: Use cosine similarity for comparing text embeddings with company embeddings — do not substitute with dot product,
      euclidean distance, or BM25/keyword matching as these fail to capture semantic relationships and miss paraphrased or
      indirect mentions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching to dot product or euclidean distance alters the similarity distribution, causing the relevance
      threshold to miss semantically related news that uses different vocabulary, reducing signal coverage
    derived_from_bd_id: BD-081
  - id: finance-C-211
    when: When implementing commission calculation in paper trading
    action: Apply rate-based commission with a minimum fee floor per trade — verify commissions for small trades are capped
      at the configured minimum, not calculated as pure percentage which would allow artificially profitable micro-trades
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pure percentage commission allows micro-trades with negligible fees that don't exist in real markets, creating
      backtest profits that cannot be replicated in live trading due to broker minimum fee structures
    derived_from_bd_id: BD-085
  - id: finance-C-212
    when: When implementing cost basis tracking for multi-entry positions
    action: 'Calculate cost basis using quantity-weighted average formula: new_avg = (old_cost * old_qty + price * qty) /
      new_qty — do not switch to FIFO or LIFO which impose strict ordering assumptions'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using FIFO/LIFO changes average cost calculation for averaging-in positions, causing P&L discrepancies where
      exit decisions based on cost basis thresholds will be incorrect, leading to premature or delayed exits
    derived_from_bd_id: BD-086
  - id: finance-C-213
    when: When configuring stock screening for non-A-share markets or adjusting prices
    action: Verify the market type and adjustment type match the intended analysis — A-shares require qfq (forward-adjusted)
      for accurate historical returns; other markets (HK, US) or dividend impact analysis may require different adj types
      (hfq, None)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using qfq-adjusted A-share prices on other markets produces incorrect historical data; using unadjusted prices
      on A-shares distorts historical returns by including dividend drops, causing strategies to appear more or less profitable
      than actual performance
    derived_from_bd_id: BD-063
  - id: finance-C-214
    when: When implementing reflection or learning-from-mistakes logic that queries historical memory
    action: Verify memory retrieval n_matches is sufficient for pattern recognition — if n_matches is limited (e.g., 2), implement
      adaptive retrieval that fetches additional matches when query similarity scores indicate high relevance, or increase
      n_matches for reflection-specific queries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fixed n_matches limit prevents reflection from surfacing enough historical context when analysts make repeated
      errors in a specific domain, causing the system to fail at its stated learning goal while still consuming memory retrieval
      resources
    derived_from_bd_id: BD-119
  - id: finance-C-215
    when: When splitting historical data into training and testing sets
    action: Assume train/test time split is automatically handled by the framework — the framework lacks explicit train/test
      time split validation and may allow temporal data leakage
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit train/test time split integrity validation, the backtest may include future information
      in training data, causing look-ahead bias that makes live trading results fall far below backtested performance
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-216
    when: When performing train/test split for strategy backtesting
    action: Validate temporal split integrity by ensuring each training data timestamps precede test data timestamps, checking
      for zero overlap between train and test date ranges, and verifying chronological ordering before any data split operation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing train/test split validation allows temporal leakage where the model learns from future data, systematically
      inflating backtest returns and creating false confidence in strategy performance
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-217
    when: When implementing or modifying position cost and return calculations
    action: Assume the framework handles carry or funding cost modeling — the framework does not implement explicit cost-of-carry
      calculations for positions held overnight or borrowed funds
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without carry/funding cost modeling, long-short strategies that rely on overnight borrowing costs will show
      inflated returns in backtesting compared to live trading, where these costs are mandatory
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-218
    when: When backtesting strategies that hold positions overnight or use leverage
    action: Implement explicit carry/funding cost deduction by adding daily interest accrual for borrowed funds (typically
      annualized rate / 365 per day) and subtracting from strategy returns when positions are held overnight
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting carry costs causes long-short strategies to overestimate annual returns by 2-8% depending on interest
      rates, leading to strategies appearing profitable in backtest that lose money in live trading
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-219
    when: When implementing or optimizing stock screening logic
    action: Remove or bypass the 120-stock sample cap — the cap exists to prevent resource exhaustion and unbounded query
      execution
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Removing the screening sample cap causes the system to process thousands of symbols simultaneously, leading
      to memory exhaustion, query timeouts, and potential service unavailability during real-time screening operations
    derived_from_bd_id: BD-092
  - id: finance-C-220
    when: When implementing position tracking and PnL reporting
    action: 'Calculate unrealized PnL using the formula: pnl = (last_price - avg_cost) * quantity — do not substitute entry
      price only, mark-to-market without averaging, or simplified approximations'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using entry price instead of average cost ignores partial position averaging, causing incorrect PnL for multi-entry
      positions and leading to wrong position sizing decisions that may exceed risk limits
    derived_from_bd_id: BD-097
  - id: finance-C-222
    when: When implementing credit risk classification in the framework
    action: Assume the framework implements IFRS 9 default definition and three-stage classification (Stage 1/Stage 2/Stage
      3) — the framework does not have this capability; each loans default to Stage 1 regardless of credit risk changes
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without IFRS 9 staging, the ECL calculation will not reflect credit risk deterioration, causing regulatory
      capital to be understated and leading to compliance violations during external audits
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-223
    when: When implementing Expected Credit Loss (ECL) calculation for loan portfolios
    action: 'Implement IFRS 9 three-stage classification model with explicit criteria for Stage 1 (S1: initial recognition),
      Stage 2 (S2: significant credit risk increase), and Stage 3 (S3: credit-impaired) based on 30-day past due, credit rating
      downgrade >2 notches, or other quantitative thresholds'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing IFRS 9 staging causes ECL to be calculated as if all positions are current, severely underestimating
      loss provisions and violating Basel/IFRS 9 regulatory requirements
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-224
    when: When implementing credit risk parameter estimation in the framework
    action: Assume the framework provides PD/LGD/EAD estimation methods — the framework lacks these credit risk parameter
      estimation capabilities; each positions use placeholder values
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using placeholder PD/LGD/EAD values causes ECL calculations to be meaningless, leading to either massive
      over-provisioning (capital inefficiency) or under-provisioning (regulatory breach) depending on placeholder magnitudes
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-225
    when: When calculating Expected Credit Loss (ECL) for regulatory reporting
    action: 'Implement PD/LGD/EAD estimation using at least one of: historical cohort default rates (minimum 5-year window),
      external credit ratings mapping, or statistical models (logistic regression for PD, loss-given-default studies for LGD);
      document methodology and validation results'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper PD/LGD/EAD estimation, the ECL model produces unreliable loss provisions, causing mispriced
      risk and potential regulatory sanctions during model validation reviews
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-226
    when: When implementing portfolio credit risk models in the framework
    action: Assume the framework implements Vasicek single-factor asset correlation assumptions for portfolio credit risk
      — the framework does not have this capability; portfolio diversification effects are not modeled
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without asset correlation modeling, the framework underestimates portfolio diversification benefits and overestimates
      capital requirements by 15-30% for well-diversified portfolios, leading to unnecessary capital allocation
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-227
    when: When implementing Basel/credit risk portfolio models for capital calculation
    action: 'Implement Vasicek single-factor model for asset correlation: rho = 0.12 * (1 - exp(-50*PD)) / (1 - exp(-50))
      + 0.24 * (1 - (1 - exp(-50*PD)) / (1 - exp(-50))) per IRB formula; validate correlation estimates against industry benchmarks'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing Vasicek correlation model causes incorrect portfolio risk aggregation, leading to either insufficient
      capital buffers (underestimation) or excessive capital allocation (overestimation), both with regulatory and profitability
      implications
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-228
    when: When implementing stress testing scenarios in the framework
    action: Assume the framework generates or applies stress test scenario macro driving variables (GDP growth, interest rates,
      unemployment) — the framework does not have this capability; each scenarios use flat line projections
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without macro scenario drivers, stress testing produces unrealistic flat projections that do not capture
      economic cycle effects, leading to inadequate capital buffers during downturns and regulatory rejection of stress test
      results
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-229
    when: When implementing regulatory stress testing (DFAST/EBA) for capital planning
    action: 'Define at least three macro scenarios (baseline, adverse, severely adverse) with explicit values for: GDP growth
      rate delta (-2% to -8%), unemployment rate increase (3-8 pp), interest rate shock (+/-200 bps), and credit spread widening
      (100-300 bps); map to affected portfolio segments'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing macro scenario definitions causes stress testing to fail regulatory requirements, resulting in rejection
      by supervisors and potential capital surcharge orders
    derived_from_bd_id: BD-GAP-015
  - id: finance-C-230
    when: When submitting NPL portfolio data to EBA for regulatory reporting
    action: Assume the framework validates EBA NPL portfolio field completeness — the framework does not implement EBA field
      validation; missing mandatory fields are not detected and submissions proceed with errors
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without EBA field validation, NPL submissions contain missing mandatory fields (e.g., collateral values,
      default dates, cure status), causing regulatory rejections and potential supervisory sanctions
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-231
    when: When preparing NPL portfolio data exports for EBA supervisory reporting
    action: 'Validate each required EBA NPL fields are present before export: loan_id, default_date, collateral_type, collateral_value,
      secured_exposure, cure_status, workout_strategy, and provisioning_rate; reject exports with missing mandatory fields'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incomplete NPL data submissions trigger EBA data quality breaches, leading to mandatory remediation plans
      and potential capital add-on requirements from supervisors
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-232
    when: When training or evaluating reinforcement learning trading agents
    action: Assume the RL reward function in the framework accounts for transaction costs (commission, slippage, spread) —
      the framework does not model trading costs in the reward function; agents optimize for gross returns only
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without transaction cost modeling, RL agents learn strategies that generate high gross returns but negative
      net returns after costs, resulting in significant losses when deployed to live trading
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-233
    when: When implementing or training reinforcement learning trading strategies
    action: 'Modify the RL reward function to subtract transaction costs per trade: reward = gross_pnl - commission - slippage_cost
      - spread_cost; track net_pnl, gross_pnl, and cost_components separately for performance attribution'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without cost-aware reward functions, RL agents overtrade to maximize gross returns, resulting in negative
      net returns in live trading due to accumulated transaction costs of 50-200 bps per trade
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-235
    when: When instantiating LLM adapters or configuring graph nodes for trading agent logic
    action: Explicitly specify temperature parameter at both adapter and graph levels to avoid cascade conflicts; for quick_think_llm
      use temperature=0.7 (creative), for analysis_llm use temperature=0.1 (deterministic); never rely on adapter defaults
      alone
    severity: high
    kind: domain_rule
    modality: must
    consequence: Temperature cascade inconsistency causes quick_think_llm to run at 0.1 determinism instead of 0.7 creativity,
      producing repetitive trading suggestions that fail to adapt to market regime changes
    derived_from_bd_id: BD-115
  - id: finance-C-237
    when: When implementing portfolio optimization or risk calculation that involves covariance matrices
    action: Assume the framework provides a PSD (positive semi-definite) repair strategy for covariance matrices — the framework
      does not implement any covariance matrix repair mechanism
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without PSD repair, covariance matrix inversion fails during portfolio optimization or risk calculations,
      causing NaN values that corrupt downstream calculations and produce invalid portfolio weights
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-238
    when: When implementing portfolio optimization or risk calculation involving covariance matrices
    action: Implement a PSD repair strategy such as nearest correlation matrix (Higham 2002), eigenvalue clipping, or regularization
      before matrix inversion; validate result with np.linalg.cholesky or np.linalg.eigvalsh
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without PSD repair, covariance matrix inversion fails during portfolio optimization, producing NaN weights
      that cause downstream calculations to fail or produce invalid allocations
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-240
    when: When implementing price extraction logic in signal processing
    action: Verify that regex patterns capture each price formats in LLM outputs (decimal notation, Chinese yuan symbols,
      percentage forms); validate against test cases covering structured JSON, narrative responses, and edge cases
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Price extraction failures lead to incorrect trading signals; when regex fails silently, the system uses zero
      or stale prices, causing buy/sell decisions based on wrong data that accumulate losses over time
    derived_from_bd_id: BD-013
  - id: finance-C-241
    when: When implementing hybrid price extraction combining LLM and regex methods
    action: Apply regex validation to sanity-check LLM extraction outputs; if discrepancy exceeds threshold, flag for manual
      review rather than using potentially hallucinated price values
    severity: high
    kind: domain_rule
    modality: must
    consequence: LLM-only price extraction without regex validation produces inconsistent results across runs; when LLM generates
      hallucinated prices, strategies execute trades at incorrect price levels causing systematic financial losses
    derived_from_bd_id: BD-013
  - id: finance-C-242
    when: When configuring LLM provider and model selection via Web UI using MongoDB lookup
    action: Validate MongoDB system_configs document structure before runtime lookup; verify required fields (provider, model_name,
      cost_per_token) exist; implement fallback to static config if MongoDB lookup fails
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: MongoDB schema mismatch causes config lookup failures at runtime; the system may fall back to incorrect model
      configurations, causing all LLM calls to use wrong API credentials or unexpected models
    derived_from_bd_id: BD-020
  - id: finance-C-243
    when: When implementing configuration management in web_api_service with MongoDB dynamic config
    action: 'Implement graceful degradation: if MongoDB system_configs lookup fails, fall back to static configuration; never
      allow the service to start with missing critical config fields (provider, model_name)'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing MongoDB config causes service startup failure or runtime crashes; without fallback logic, every model
      change becomes a single point of failure affecting all trading operations
    derived_from_bd_id: BD-020
  - id: finance-C-244
    when: When building or using transition matrices in regime detection or state modeling
    action: Assume the framework implements time-homogeneous transition matrices with conditional adjustment — this capability
      is confirmed missing; each transition matrices assume stationary conditions without regime-dependent adjustments
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using time-varying transition matrices as if they were stationary causes systematic misclassification of
      market regimes; strategies relying on regime detection produce incorrect signals during market structure breaks
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-245
    when: When implementing regime detection or state-based trading logic in data_collection stage
    action: 'Implement time-homogeneous transition matrix validation: calculate transition probabilities for each rolling
      window (minimum 30 periods), compare with overall stationary estimates using chi-square test; if p < 0.05 indicates
      non-stationarity, use regime-specific matrices instead'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategies without regime-adjusted transition matrices misidentify market states during structural breaks;
      mean-reversion strategies execute incorrectly during trending markets, causing accumulated losses across multiple trades
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-246
    when: When implementing multi-analyst pipeline execution in tradingagents/graph
    action: Execute analysts sequentially in order (bull research → bear research → trading decision); use MsgClear nodes
      between analyst turns to prevent context pollution; maintain execution order even during optimization refactoring
    severity: high
    kind: domain_rule
    modality: must
    consequence: Parallel analyst execution breaks the context dependency chain; bull and bear researchers generate independent
      opinions without synthesizing each other's findings, producing disconnected investment theses that lack coherent reasoning
    derived_from_bd_id: BD-005
  - id: finance-C-247
    when: When implementing investment debate prompts for bull and bear researchers
    action: Include past_memory_str from reflection module in prompt context; verify historical failure patterns are accessible
      to each analyst; maintain retrieval-augmented generation pipeline even during prompt simplification refactoring
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Removing past memory from prompts causes agents to repeat historical analysis mistakes; without RAG context,
      bull researcher recommends previously failed trades, degrading strategy performance over time
    derived_from_bd_id: BD-009
  - id: finance-C-248
    when: When configuring LLM provider and model selection for financial analysis tasks
    action: Verify that the default OpenAI models (o4-mini for deep analysis, gpt-4o-mini for quick responses) match the specific
      task requirements; evaluate alternative models (Claude, Gemini) for specialized financial domain tasks
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default LLM models without verification may produce suboptimal analysis quality for specialized financial
      tasks, leading to poor trading decisions and financial losses due to inaccurate signal extraction
    derived_from_bd_id: BD-026
  - id: finance-C-249
    when: When configuring debate and risk discussion parameters for financial analysis depth
    action: Verify that default debate rounds (1 round) and risk discuss rounds (1 round) match the required analysis depth;
      increase rounds for high-stakes decisions where thorough risk assessment justifies higher latency
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Single-round debate may miss critical risk factors in complex trading scenarios, causing insufficient contrarian
      viewpoints and leading to undetected risk exposure that results in financial losses
    derived_from_bd_id: BD-027
  - id: finance-C-251
    when: When selecting and prioritizing data sources for China market data retrieval
    action: 'Follow the data source priority cascade: MongoDB (cached/curated data) first, then AKShare (free public API),
      then Tushare (professional rate-limited data), then BaoStock (backup); verify primary source availability before falling
      back'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect data source priority may cause reliance on stale or unavailable data, leading to inaccurate market
      analysis and trading decisions based on incomplete or outdated information
    derived_from_bd_id: BD-056
  - id: finance-C-252
    when: When implementing middleware fallback logic for Redis-dependent services
    action: Verify that Redis failure triggers quota bypass (not request rejection) and document the in-memory counter fallback
      behavior for rate limiting continuity
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without proper fallback verification, quota enforcement silently bypasses on Redis failure, allowing unlimited
      requests to reach the trading system and potentially causing resource exhaustion
    derived_from_bd_id: BD-107
  - id: finance-C-253
    when: When routing LLM requests to different providers based on task complexity
    action: Route simple tasks (data extraction, formatting) to fast/cheap models (e.g., local llama) and reserve deep models
      (e.g., claude-3) for complex synthesis and judgment tasks; verify cost tracking works per provider
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using expensive deep models for all tasks or failing to track per-provider costs causes 50-70% unnecessary
      spending on LLM API calls, eroding strategy profits
    derived_from_bd_id: BD-025
  - id: finance-C-254
    when: When initializing SignalProcessor with trading signal action labels
    action: Enforce Chinese action labels (买入/持有/卖出) in action_map; reject non-Chinese labels with ValueError at SignalProcessor
      init
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accepting non-Chinese labels causes ambiguity between English/Chinese trading instructions, potentially triggering
      wrong trade actions in live execution
    derived_from_bd_id: BD-113
  - id: finance-C-255
    when: When implementing LLM generation with token usage tracking
    action: Call _track_token_usage() within _generate() for unified token tracking across each provider adapters; enable
      cost allocation, budget enforcement, and model downgrading analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting token tracking prevents cost allocation per analysis and model, blocking budget enforcement and
      opportunities for cost optimization through model downgrading
    derived_from_bd_id: BD-024
  - id: finance-C-256
    when: When implementing reflection logic in the agent architecture
    action: Implement per-agent reflection loops (bull/bear/trader/judge/risk) to enable domain-specific learning; each agent
      must extract lessons from its own mistakes including research errors, trading oversights, and risk miscalculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Generalizing reflection across all agents loses domain-specific learning granularity; specialized knowledge
      from each agent domain (market research, trade execution, risk management) gets diluted or lost
    derived_from_bd_id: BD-016
  - id: finance-C-257
    when: When implementing or refactoring signal processing logic in trading_decision stage
    action: 'Verify signal processing extracts exactly four fields: action (买入/持有/卖出), target_price, confidence (0-1), and
      risk_score (0-1) — each four fields are required for complete trading signal specification'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Dropping any signal field (action, target_price, confidence, risk_score) breaks downstream trading logic
      that depends on complete signal tuples; strategies may execute trades without entry levels or risk-adjusted sizing
    derived_from_bd_id: BD-039
  - id: finance-C-258
    when: When configuring analysis focus types or adding new analysis modes
    action: 'Verify that analysis focus types match the supported taxonomy: comprehensive, technical, fundamental, risk, comparison
      — any additions must be explicitly validated against the framework''s agent routing logic'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using unsupported analysis types causes agent routing failures or returns empty results; adding new types
      without framework support silently breaks analysis pipeline execution
    derived_from_bd_id: BD-031
  - id: finance-C-259
    when: When implementing backtesting strategies
    action: Assume the framework provides backtest overfitting protection — the framework does not implement overfitting safeguards
      such as train/test split, walk-forward analysis, or cross-validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without overfitting protection, strategies optimized on historical data appear profitable but fail in live
      trading, causing significant financial losses when deployed to production
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-260
    when: When developing backtesting strategies
    action: Implement overfitting protection safeguards including train/test split with out-of-sample testing, walk-forward
      analysis, or k-fold cross-validation before strategy deployment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper overfitting protection, backtested strategies with inflated Sharpe ratios fail in live trading,
      leading to significant capital losses
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-261
    when: When processing orders in backtesting
    action: Assume the framework handles execution feasibility and liquidity constraints — the framework does not implement
      market impact models, volume limits, or order sizing based on average daily volume
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without liquidity constraints, backtests assume full order execution at market prices regardless of available
      volume, causing massive slippage and inability to fill orders in live trading
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-262
    when: When implementing order execution logic in backtesting
    action: Check average daily volume (ADV) and limit order size to a fraction of market volume (typically 1-5%), and apply
      market impact estimation for large orders during execution feasibility analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ignoring liquidity constraints leads to backtest results showing full execution at desired prices while live
      trading encounters partial fills, price slippage, and increased transaction costs
    derived_from_bd_id: BD-GAP-006
  - id: finance-C-263
    when: When estimating covariance matrices for portfolio optimization
    action: Assume the framework enforces covariance estimator selection with shrinkage and annualization factor validation
      — RSK-3 requires proper scaling of return frequency to annualized values
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without annualization factor enforcement, daily and monthly covariance estimates are mixed incorrectly, producing
      portfolio weights optimized for the wrong risk level and causing severe allocation errors
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-264
    when: When computing covariance matrices for portfolio construction
    action: 'Apply annualization factor validation: daily returns require sqrt(252), monthly returns require sqrt(12), and
      use Ledoit-Wolf or OAS shrinkage estimator for high-dimensional covariance matrices'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent annualization of covariance estimates causes incorrect portfolio risk assessment, leading to
      under or over-hedged positions and significant unexpected losses in volatile markets
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-265
    when: When selecting volatility models for option pricing or risk management
    action: Assume the framework provides automated volatility model family and distribution selection — the framework does
      not implement GARCH, EWMA, or stochastic volatility model selection with distribution fitting (normal, t-dist, skewed-t)
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper volatility model selection, strategies using constant volatility assumptions underestimate
      tail risk and misprice options, causing significant losses during market regime changes
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-266
    when: When calculating factor IC (Information Coefficient) for stock screening
    action: Assume the framework handles factor IC demeaning and group alignment — the framework does not implement cross-sectional
      mean removal or quintile/decile group boundary synchronization
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without IC demeaning, raw IC values include systematic market bias, causing factor rankings to shift incorrectly
      across market regimes and leading to suboptimal stock selection
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-267
    when: When computing factor IC for multi-factor models
    action: Demean IC values by subtracting cross-sectional mean and align group boundaries (quintiles/deciles) across factors
      to verify consistent ranking and prevent systematic bias from market-wide moves
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without IC demeaning and group alignment, factor rankings shift systematically during bull/bear markets,
      causing strategies to buy high and sell low relative to factor signals
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-268
    when: When using covariate data in strategy signal generation during backtesting
    action: Assume the framework handles covariate time availability constraints — the framework does not implement timestamp
      alignment validation for covariates; covariates with future timestamps relative to signal timestamps may be used without
      restriction
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without covariate time availability validation, look-ahead bias occurs where signals inadvertently use future
      covariate values, causing backtest returns to significantly exceed live trading performance
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-269
    when: When generating signals in the data_collection stage that use covariate data
    action: Validate that each covariate's timestamp <= corresponding signal timestamp before using covariate values; filter
      out or mark signals as invalid when covariate data with timestamp > signal timestamp is detected
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing timestamp validation causes look-ahead bias where strategy uses future covariate values, inflating
      backtest performance and causing live trading to underperform
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-270
    when: When implementing stock market data analysis
    action: Use forward-adjusted prices (前复权) for technical analysis calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Technical indicators will be inconsistent with mainstream Chinese market tools like 同花顺, leading to inaccurate
      trading signals and potential financial losses from incorrect analysis
  - id: finance-C-271
    when: When calculating RSI indicators for Chinese stocks
    action: Use Chinese-style SMA algorithm (ewm with com=N-1, adjust=True) instead of standard rolling mean
    severity: high
    kind: domain_rule
    modality: must
    consequence: RSI values will differ from mainstream Chinese market tools like 同花顺/通达信, causing misleading overbought/oversold
      signals
  - id: finance-C-273
    when: When implementing bulk analysis features
    action: Exceed 10 stocks per bulk analysis request or 3 concurrent tasks
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: System will experience resource exhaustion, degraded performance, or potential service disruption for all
      users
  - id: finance-C-275
    when: When storing stock trading dates in database
    action: Store dates in YYYY-MM-DD string format, not numeric indices
    severity: high
    kind: domain_rule
    modality: must
    consequence: 82,631+ invalid records with dates like '0', '1', '2' will be stored, causing all data queries to return
      empty results
  - id: finance-C-276
    when: When implementing market data lookback for technical analysis
    action: Request at least 250 days of historical data for MACD calculations
    severity: high
    kind: resource_boundary
    modality: must
    consequence: MACD EMA(26) will not have sufficient warm-up period, producing inaccurate trend signals
  - id: finance-C-277
    when: When implementing Tushare data integration
    action: Use pro_bar API with adj='qfq' parameter instead of daily API
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Tushare daily API does not support adjustment, returning unadjusted prices inconsistent with other data sources
  - id: finance-C-278
    when: When implementing unified data tools
    action: Route to correct data source based on stock type detection before formatting output
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Analysts will receive data without technical indicators when switching between data sources, degrading analysis
      quality
  - id: finance-C-279
    when: When implementing Chinese stock data formatting
    action: Include MA, RSI, MACD, and BOLL indicators in the output for market analysts
    severity: high
    kind: domain_rule
    modality: must
    consequence: Market analyst will perform non-technical analysis based only on basic OHLC prices, producing low-quality
      signals
  - id: finance-C-280
    when: When configuring LLM providers
    action: Prioritize MongoDB database configuration over environment variables for API keys
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Configuration inconsistency will cause API keys to be ignored, breaking LLM functionality
  - id: finance-C-281
    when: When using pandas DataFrame iterrows for date extraction
    action: Extract date from DataFrame column, not from RangeIndex
    severity: high
    kind: domain_rule
    modality: must
    consequence: DataFrame iteration returns RangeIndex (0,1,2...) which will be incorrectly used as dates, corrupting 82,631+
      records
  - id: finance-C-282
    when: When implementing LLM tool calling for Chinese models
    action: Implement forced tool calling fallback mechanism for models like 阿里百炼
    severity: medium
    kind: domain_rule
    modality: must
    consequence: LLM will not call required data tools, causing analysts to generate hallucinated analysis based on no real
      data
  - id: finance-C-284
    when: When using multi-source data architecture
    action: Perform data source priority and fallback logic for each data request
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Analysis will fail or return empty data when primary data source is unavailable, degrading system reliability
  - id: finance-C-285
    when: When configuring WebSocket connections behind Nginx
    action: Set proxy_read_timeout and proxy_send_timeout to at least 3600 seconds
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Nginx will close idle WebSocket connections after default timeout, disrupting real-time notification delivery
  - id: finance-C-286
    when: When implementing FinnHub API integration
    action: Implement rate limiter with maximum 60 calls per minute for free tier
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: API rate limit exceeded will cause data fetching failures and analysis degradation
  - id: finance-C-287
    when: When deprecating configuration systems
    action: Continue developing new features using deprecated JSON config system
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: New code will need migration after 2025-12-31 deprecation deadline, incurring technical debt and potential
      migration issues
  - id: finance-C-288
    when: When implementing data caching strategy
    action: Set cache duration specified to market data type (5 minutes for prices, longer for fundamentals)
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Stale data served to analysts will produce outdated analysis, or excessive API calls will degrade performance
  - id: finance-C-289
    when: When implementing multi-agent state management
    action: Define each state fields explicitly in AgentState TypedDict class
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: State updates for undefined fields will be silently ignored by LangGraph, breaking agent coordination and
      counter mechanisms
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
