  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-MKT-005
  statement: 'A 股月度动量因子在方向上与美股相反：近1个月表现最好的股票， 下1个月大概率反转（反转效应而非动量）。机构研究（华泰/东吴证券） 与学术论文均验证：直接套用美股月度动量因子在 A 股会产生系统性亏损。

