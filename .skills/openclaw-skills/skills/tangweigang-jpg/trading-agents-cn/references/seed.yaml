      '
    good_example: "# GOOD: 用实际披露日期构建 point-in-time 数据集\n# 一季报最晚 4/30, 半年报最晚 8/31, 三季报最晚 10/31, 年报最晚次年 4/30\npe = financial_db.get_as_of(stock,\
