    - id: BD-011
      type: B/BA
      summary: min_pct=0.05 for dropping rare labels
    - id: BD-037
      type: B
      summary: Use Campbell-Liu-Harvey Haircut Sharpe Ratio with multiple testing adjustment
    - id: BD-038
      type: B/BA
      summary: Use Lo autocorrelation-adjusted Sharpe ratio for annualized performance
    - id: BD-070
      type: B/BA
      summary: Use Sequential Bootstrapping within bagging for financial data
    - id: BD-065
      type: B
      summary: Use D-vine and C-vine copula methods for correlation matrix generation
    - id: BD-066
      type: B/BA
      summary: Use HCBM (Hierarchical Correlation Block Model) for structured correlation generation
    - id: BD-067
      type: B/BA
      summary: Use CorrGAN (GAN-based sampling) for realistic correlation matrices
    - id: BD-046
      type: B
      summary: Use angular distance for correlation-based metrics that satisfies metric conditions
    - id: BD-047
      type: B
      summary: Use distance correlation for non-linear dependence detection
    - id: BD-052
      type: B
      summary: Use Kullback-Leibler divergence for comparing correlation matrices
    - id: BD-048
      type: B
      summary: Use Spearman's rho as robust copula-based dependence measure
    - id: BD-049
      type: B
      summary: Use GNPR (Generic Non-Parametric Representation) distance with Optimal Transport
    - id: BD-050
      type: B
      summary: Use mutual information with optimal binning for entropy-based dependence
    - id: BD-051
      type: B/BA
      summary: Use optimal copula transport for measuring dependence against target copulas
    - id: BD-071
      type: B
      summary: Use variation of information (VI) for symmetric dependence measurement
    - id: BD-039
      type: B
      summary: Fit mixture of 2 Gaussians using EF3M (Exact Fit of First 3 Moments)
    - id: BD-040
      type: B/BA
      summary: Use Kernel Density Estimation (KDE) for most likely parameter selection
    - id: BD-058
      type: B
      summary: Use Average Linkage Minimum Spanning Tree (ALMST) for graph construction
    - id: BD-068
      type: B/BA
      summary: Use Partial Dependence-based model fingerprinting for feature importance
    - id: BD-061
      type: B/BA
      summary: Use Matrix Flag template matching for bull/bear pattern recognition
    - id: BD-059
      type: B/DK
      summary: Use Fisher Information Matrix-weighted relevance for historically weighted regression
    - id: BD-060
      type: B/BA
      summary: Use Mahalanobis-like similarity based on Fisher Information Matrix
    - id: BD-063
      type: B
      summary: Use row bootstrapping preserving temporal structure
    - id: BD-064
      type: B
      summary: Use block bootstrap for time series with local dependencies
    - id: BD-053
      type: B/BA
      summary: Use Herfindahl-Hirschman Index for return concentration measurement
    - id: BD-054
      type: B/BA
      summary: Use probabilistic Sharpe ratio accounting for skewness and kurtosis
    - id: BD-055
      type: B/BA
      summary: Use weighted average entry time algorithm for holding period estimation
    - id: BD-072
      type: B/DK
      summary: Use drawdown and time-under-water for risk measurement
    - id: BD-073
      type: B/BA
      summary: Use minimum track record length (MinTRL) for confidence in Sharpe ratio
    - id: BD-062
      type: B/BA
      summary: Use tail set classification with volatility-adjusted returns
    - id: BD-069
      type: B/DK
      summary: Use Perron-Frobenius eigenvector for verifying correlation matrix properties
    - id: BD-GAP-001
      type: B/BA
      summary: MDA feature importance defaults to n_repeat=1 (single evaluation), bypassing averaging over multiple random
        seeds that would reduce variance in importance estimates
    - id: BD-GAP-002
      type: B/BA
      summary: log_loss is hardcoded as default scoring metric for MDA and SFI, forcing probability-based evaluation even
        for models where raw accuracy or custom metrics may be more appropriate
    - id: BD-GAP-003
      type: B/BA
      summary: PCA orthogonal features use 0.95 variance threshold as default, retaining 95% of information while discarding
        components that may contain signal for rare events
    - id: BD-GAP-004
      type: B/BA
      summary: Model fingerprint sampling uses num_values=50 as default, estimating linear/nonlinear effects from 50 discrete
        feature value points
    - id: BD-GAP-015
      type: T
      summary: Random state fixed at 42 across feature importance, sampling, and fingerprint modules for reproducibility,
        but this value is never exposed as a configurable parameter in most functions
    - id: BD-GAP-005
      type: B/BA
      summary: Every first and second generation microstructural estimators (Roll, Corwin-Schultz, Amihud, Kyle, Hasbrouck)
        use window=20 as default rolling window
    - id: BD-GAP-006
      type: B/BA
      summary: VPIN uses window=1 default, treating each bar independently without temporal smoothing despite literature suggesting
        smoothing for noisy estimates
    - id: BD-GAP-007
      type: B
      summary: Feature generator processes tick data in 20M-row batches (batch_size=20000000.0), requiring memory proportional
        to 20M trades
    - id: BD-GAP-008
      type: B/BA
      summary: Tick rule encoding uses 26-letter alphabet for quantile-based encoding, mapping features to alphabetic strings
        without semantic meaning
    - id: BD-GAP-009
      type: B/BA
      summary: MST defaults to 'kruskal' algorithm despite 'prim' being more efficient for dense correlation matrices typical
        in portfolio contexts
    - id: BD-GAP-010
      type: B
      summary: ALMST only supports distance input matrices despite correlation matrices being primary use case for portfolio
        analysis
    - id: BD-GAP-011
      type: B/BA
      summary: Edge values in visualization dashboards are rounded to 4 decimal places (dps=4) by default
    - id: BD-GAP-014
      type: BA/DK
      summary: Central-peripheral ranking combines multiple centrality measures without weighting, treating degree, betweenness,
        and eigenvector centrality as equally important
    - id: BD-GAP-012
      type: B/BA
      summary: Sequential bootstrapping disables i.i.d. comparison by default (compare=False), masking whether sequential
        sampling actually differs from i.i.d.
    - id: BD-GAP-013
      type: B/BA
      summary: Sequential bootstrapping uses warmup_samples=None by default, beginning uniqueness calculations from first
        sample without accounting for cold-start bias
    - id: BD-077
      type: BA
      summary: Sequential bootstrapping requires samples_info_sets for temporal dependency constraints
    - id: BD-080
      type: B/RC
      summary: Meta-labeling transforms bin values from {-1,0,1} to {0,1} when side_prediction is provided
    - id: BD-081
      type: BA
      summary: Meta-labeling architecture enables two-stage classification pipeline
    - id: BD-086
      type: BA/M
      summary: Bet sizing architecture requires samples_info_sets for probability-based position sizing
    - id: BD-088
      type: B/DK
      summary: mp_pandas_obj molecule partitioning must complete before results stitched
    - id: BD-079
      type: DK
      summary: Factory functions (get_ema_*, get_const_*) wrap class constructors hiding complexity
    - id: BD-085
      type: DK/B
      summary: 'Bet sizing uses strategy pattern: ''sigmoid'' vs ''power'' functions selectable'
    - id: BD-012
      type: B/BA
      summary: decay=0.5 default for time decay sample weights
    - id: BD-031
      type: B/BA
      summary: min_length=20 for SADF minimum observations
    - id: BD-032
      type: B
      summary: phi=0 for SADF (no penalty for sample length)
    - id: BD-098
      type: B
      summary: 'GAPS: Timezone explicit annotation + UTC conversion infrastructure entirely absent'
    - id: BD-099
      type: B
      summary: 'GAPS: Trading calendar vs natural calendar conventions entirely absent'
    - id: BD-100
      type: B
      summary: 'GAPS: Point-in-time data availability and stale data detection entirely absent'
    - id: BD-101
      type: B
      summary: 'GAPS: Day count convention, currency/unit annotation, and settlement time entirely absent'
    - id: BD-102
      type: B
      summary: 'GAPS: Immutable audit trail and parameter change version tracking entirely absent'
resources:
  packages:
  - name: numpy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: scikit-learn
    version_pin: latest
  - name: scipy
    version_pin: latest
  - name: statsmodels
    version_pin: latest
  - name: cython
    version_pin: latest
  - name: numba
    version_pin: latest
  - name: POT
    version_pin: latest
  - name: networkx
    version_pin: latest
  - name: joblib
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy
    - python3 -m pip install pandas
    - python3 -m pip install scikit-learn
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing data ingestion for financial bars
    action: 'validate CSV input contains exactly 3 columns in order: date_time, price, and volume'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The bar construction pipeline will fail with incorrect column indices, producing bars with swapped price/volume
      data and corrupting downstream analysis
    stage_ids:
    - data_ingestion
  - id: finance-C-002
    when: When validating CSV price column format
    action: verify price column values are float type
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-float price values will cause numerical computation errors in OHLC aggregation and bar threshold calculations,
      leading to NaN values in output bars
    stage_ids:
    - data_ingestion
  - id: finance-C-003
    when: When validating CSV volume column format
    action: verify volume column values are numeric (int or float), not string type
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: String volume values will cause aggregation failures, producing bars with string volume instead of numeric
      cum_buy_volume and volume totals
    stage_ids:
    - data_ingestion
  - id: finance-C-004
    when: When parsing CSV datetime column
    action: validate date_time column contains parseable datetime values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unparseable datetime values will cause ValueError exception, preventing any bar generation from the dataset
    stage_ids:
    - data_ingestion
  - id: finance-C-005
    when: When constructing output bar DataFrame
    action: 'verify output contains exactly 9 columns: date_time, open, high, low, close, volume, cum_buy_volume, cum_ticks,
      cum_dollar_value'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing or extra columns will break downstream pipeline components expecting these specific column names
      and positions, causing AttributeError in feature engineering stages
    stage_ids:
    - data_ingestion
  - id: finance-C-006
    when: When updating high/low prices during bar construction
    action: verify High >= Open, High >= Close, Low <= Open, Low <= Close for each bar
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid OHLC relationships indicate data corruption or algorithmic errors, causing incorrect volatility estimates
      and faulty trading signals in downstream analysis
    stage_ids:
    - data_ingestion
  - id: finance-C-007
    when: When implementing batch processing for large datasets
    action: set batch_size parameter to control memory usage per batch iteration
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Without proper batch sizing, datasets exceeding available RAM will cause MemoryError, preventing completion
      of bar construction on >100M row datasets
    stage_ids:
    - data_ingestion
  - id: finance-C-011
    when: When implementing bar type subclasses
    action: implement abstract _extract_bars method to define bar-type-specific extraction logic
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing _extract_bars implementation will cause TypeError at instantiation, preventing any bar generation
      for custom bar types
    stage_ids:
    - data_ingestion
  - id: finance-C-012
    when: When implementing bar type subclasses
    action: implement abstract _reset_cache method to define cache reset logic per bar
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing _reset_cache implementation causes state leakage between bars, resulting in cumulative imbalance
      values bleeding into subsequent bars
    stage_ids:
    - data_ingestion
  - id: finance-C-016
    when: When using bar construction for backtesting
    action: claim that backtest returns equal expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest equity curves as expected live trading results violates financial regulations and misleadingly
      inflates expected performance by ignoring slippage, latency, and market impact
    stage_ids:
    - data_ingestion
  - id: finance-C-020
    when: When initializing expected number of ticks for bar construction
    action: set exp_num_ticks_init to a value >= the longest indicator period used in downstream analysis
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Initial tick count smaller than indicator lookback causes NaN values in early bars, requiring data exclusion
      and causing lookback period wastage
    stage_ids:
    - data_ingestion
  - id: finance-C-021
    when: When implementing event filtering functions
    action: Return a DateTimeIndex sorted in ascending order with no duplicate timestamps
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream labeling functions like get_events expect chronological event timestamps without duplicates. Duplicates
      cause multiple triple barrier computations for the same event, distorting labels.
    stage_ids:
    - event_filtering
  - id: finance-C-022
    when: When implementing CUSUM filter algorithm
    action: Reset cumulative sum to zero after each event trigger to prevent multiple triggers from price hovering near threshold
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without reset, raw_time_series hovering around threshold triggers spurious repeated events, violating the
      acceptance criteria of 'no events in flat periods' and inflating event count.
    stage_ids:
    - event_filtering
  - id: finance-C-027
    when: When designing event filtering for financial time series
    action: Verify filter detects events in trending or volatile periods while producing no events in flat/unchanged price
      periods
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Filter failing to distinguish trending from flat periods produces either too many events (noise) or too few
      events (missed opportunities), undermining the mean-shifting detection purpose.
    stage_ids:
    - event_filtering
  - id: finance-C-029
    when: When designing event filter integration
    action: Verify filter output (t_events) is compatible as input to labeling.get_events() triple barrier computation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incompatible t_events format causes get_events() to fail, preventing triple barrier labeling from executing
      and breaking the entire labeling pipeline.
    stage_ids:
    - event_filtering
  - id: finance-C-033
    when: When using event filtering for live trading systems
    action: Claim that detected events are trading signals; events are labels for machine learning, not trade recommendations
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting ML-labeled events as trading signals without proper backtesting and risk management causes financial
      losses and regulatory compliance issues.
    stage_ids:
    - event_filtering
  - id: finance-C-038
    when: When implementing triple barrier labeling logic
    action: Verify barrier touch time t1 is always greater than or equal to the event timestamp
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: If t1 is less than the event timestamp, the triple barrier labels will exhibit temporal causality violation,
      causing the ML model to learn from future information and produce misleading backtest results that cannot be replicated
      in live trading
    stage_ids:
    - labeling
  - id: finance-C-039
    when: When implementing get_bins function for triple barrier labeling
    action: Return bin values in {-1, 0, 1} when side_prediction is not provided, and in {0, 1} when side_prediction is provided
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect bin values will cause the ML classifier to receive malformed labels, resulting in models that predict
      incorrect directions or fail to converge during training due to unexpected label cardinality
    stage_ids:
    - labeling
  - id: finance-C-045
    when: When implementing barrier_touched to identify which barrier was hit first
    action: Return 1 for top horizontal barrier (profit taking), -1 for bottom horizontal barrier (stop loss), and 0 for vertical
      barrier (timeout)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect barrier identification codes will cause misclassification of trade outcomes, leading to wrong ML
      training labels where winning trades are labeled as losses and vice versa
    stage_ids:
    - labeling
  - id: finance-C-046
    when: When implementing time-based labeling functions
    action: Apply lag=True by default to make returns forward-looking and prevent look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: If lag is not applied by default, returns will be labeled using current-period prices instead of next-period
      prices, causing look-ahead bias where the ML model learns from future information that is not available at prediction
      time
    stage_ids:
    - labeling
  - id: finance-C-054
    when: When implementing apply_pt_sl_on_t1 for triple barrier computation
    action: Return timestamps of when first barrier was touched for each molecule in the molecule array
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: If apply_pt_sl_on_t1 does not return correct barrier touch timestamps, the get_events orchestrator will receive
      incorrect t1 values, corrupting the entire labeling output and causing cascading errors in sample_weighting and bet_sizing
      stages
    stage_ids:
    - labeling
  - id: finance-C-057
    when: When configuring pt_sl (profit taking, stop loss) levels
    action: Pass pt_sl as a 2-element array where element 0 is profit taking multiple and element 1 is stop loss multiple
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect pt_sl array ordering will cause profit taking and stop loss barriers to be applied to wrong price
      levels, inverting the risk-reward profile and potentially causing losses where profits were expected
    stage_ids:
    - labeling
  - id: finance-C-062
    when: When computing sample weights with time decay
    action: produce negative weight values
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Negative weights cause undefined behavior in sklearn classifiers, leading to invalid training outcomes or
      runtime exceptions when sample_weight is passed to fit methods
    stage_ids:
    - sample_weighting
  - id: finance-C-064
    when: When generating indicator matrix for sequential bootstrap
    action: use timestamp alignment between price_bars and triple_barrier_events
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without proper timestamp alignment, indicator matrix links wrong price bars to labels, causing bootstrapped
      samples to include look-ahead bias from information leakage
    stage_ids:
    - sample_weighting
  - id: finance-C-067
    when: When applying sequential bootstrap sampling
    action: accumulate concurrency from previously selected samples
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without accumulated concurrency tracking, bootstrap over-represents overlapping events, causing trained models
      to overweight crowded market periods
    stage_ids:
    - sample_weighting
  - id: finance-C-070
    when: When returning sample weights from any weighting function
    action: align weight indices to input triple_barrier_events DataFrame indices
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Misaligned weight indices cause wrong samples to receive incorrect weights during model training, producing
      models trained on mismatched feature-weight pairs
    stage_ids:
    - sample_weighting
  - id: finance-C-074
    when: When applying sample weights to model training
    action: claim that weighted backtest returns predict live trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting weighted backtest results as indicative of live trading causes regulatory compliance issues and
      user financial losses when live execution differs from historical simulation
    stage_ids:
    - sample_weighting
  - id: finance-C-078
    when: When implementing fractional differentiation for stationarity
    action: achieve stationarity validated by ADF test with p-value < 0.05
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-stationary fractionally differentiated series violates the fundamental requirement for valid statistical
      inference in machine learning models, leading to spurious relationships and unreliable predictions
    stage_ids:
    - feature_engineering
  - id: finance-C-082
    when: When implementing MDA feature importance calculations
    action: use PurgedKFold cross-validation generator with proper samples_info_sets
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Standard sklearn KFold allows training samples to overlap with test label intervals, causing information
      leakage that inflates feature importance estimates and produces misleading rankings
    stage_ids:
    - feature_engineering
  - id: finance-C-088
    when: When implementing MDA feature importance
    action: pass samples_info_sets containing t1 end times for proper information boundary detection
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without t1 end times, the purging logic cannot identify which training samples overlap with test label intervals,
      defeating the purpose of purged cross-validation
    stage_ids:
    - feature_engineering
  - id: finance-C-089
    when: When implementing labeling functions for feature engineering
    action: lag returns with lag=True to prevent look-ahead bias
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Unlagged returns use current bar information to label the current bar, creating look-ahead bias where the
      model trains on information not yet available at prediction time
    stage_ids:
    - feature_engineering
  - id: finance-C-092
    when: When implementing sequential bootstrap bagging training
    action: pass samples_info_sets parameter with temporal boundaries (index=start_time, value=end_time)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Sequential bootstrap requires indicator matrix construction from samples_info_sets; missing temporal bounds
      causes look-ahead bias in label uniqueness calculations
    stage_ids:
    - model_training
  - id: finance-C-093
    when: When implementing sequential bootstrap bagging training
    action: pass price_bars DataFrame aligned with samples_info_sets timestamps
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Indicator matrix construction requires price_bars for concurrency calculations; misaligned timestamps produce
      incorrect sample uniqueness weights
    stage_ids:
    - model_training
  - id: finance-C-094
    when: When implementing purged cross-validation
    action: respect samples_info_sets temporal boundaries during train/test split purging
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: PurgedKFold must remove training observations that overlap with test-label intervals; failure causes look-ahead
      bias contaminating cross-validation results
    stage_ids:
    - model_training
  - id: finance-C-095
    when: When configuring purged cross-validation generator
    action: set shuffle=True in PurgedKFold or CombinatorialPurgedKFold
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Shuffling destroys temporal ordering required for financial time series; test sets must be contiguous without
      interleaved training samples
    stage_ids:
    - model_training
  - id: finance-C-107
    when: When implementing bet_size_dynamic function
    action: enforce target position to stay within max_pos bounds
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without enforcing max_pos bounds, the strategy could exceed position limits, leading to regulatory violations,
      margin calls, or excessive risk exposure that causes significant financial loss
    stage_ids:
    - bet_sizing
  - id: finance-C-108
    when: When implementing bet_size output range
    action: bound bet_size output values between 0 and 1 (or max_pos when scaled)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unbounded bet sizes can cause invalid position sizing, division by zero in subsequent calculations, or positions
      exceeding maximum allowed size in live trading
    stage_ids:
    - bet_sizing
  - id: finance-C-109
    when: When implementing bet_size_power function
    action: validate price_divergence parameter stays within [-1, 1] range inclusive
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Price divergence outside [-1, 1] causes undefined behavior in power function, producing NaN or invalid bet
      sizes that corrupt downstream calculations
    stage_ids:
    - bet_sizing
  - id: finance-C-114
    when: When implementing bet sizing with side predictions
    action: 'match side prediction convention: 1 for long positions, -1 for short positions'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Incompatible side conventions between labeling and bet sizing modules causes incorrect position direction,
      leading to losses on trades that should have been gains
    stage_ids:
    - bet_sizing
  - id: finance-C-120
    when: When implementing bet_size_probability
    action: return doubled-length series when average_active=True to capture open and close averaging
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect output length when average_active=True causes index misalignment with downstream processes, leading
      to NaN values or incorrect position assignments
    stage_ids:
    - bet_sizing
  - id: finance-C-122
    when: When calculating Sharpe ratio with sharpe_ratio function
    action: Set entries_per_year parameter to match the actual sampling frequency of returns (252 for daily, 52 for weekly,
      12 for monthly, 4 for quarterly, 1 for annual)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Sharpe ratio will be incorrectly annualized, producing misleading strategy performance estimates that cannot
      be compared across different sampling frequencies
    stage_ids:
    - backtesting
  - id: finance-C-126
    when: When applying multiple testing corrections via haircut_sharpe_ratios
    action: Reduce Sharpe ratios through haircut methods (Bonferroni, Holm, BHY, or Average) to account for multiplicity
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Uncorrected Sharpe ratios suffer from selection bias, overstating true strategy performance and leading to
      poor investment allocation decisions
    stage_ids:
    - backtesting
  - id: finance-C-133
    when: When interpreting haircut Sharpe ratio results
    action: Claim adjusted Sharpe ratio guarantees live trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest-adjusted Sharpe ratios as guaranteed live performance misleads stakeholders and violates
      financial regulation principles
    stage_ids:
    - backtesting
  - id: finance-C-137
    when: When comparing multiple strategy Sharpe ratios
    action: Skip multiple testing correction because it reduces Sharpe ratios
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Selecting strategies based on uncorrected Sharpe ratios introduces selection bias, leading to choosing strategies
      that appear good by chance
    stage_ids:
    - backtesting
  - id: finance-C-139
    when: When implementing get_dependence_matrix to compute pairwise dependence scores
    action: Verify the resulting dependence matrix is symmetric with diagonal entries equal to 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Asymmetric dependence matrices violate the mathematical definition of codependence and cause incorrect clustering,
      network analysis, and portfolio construction results
    stage_ids:
    - correlation_analysis
  - id: finance-C-140
    when: When implementing get_distance_matrix to transform dependence into distance
    action: 'Verify distance matrix satisfies metric properties: d(i,i)=0, d(i,j)>0 for i≠j, and triangle inequality holds'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-metric distance matrices cause MST and PMFG network constructions to produce invalid or meaningless graphs,
      corrupting clustering analysis
    stage_ids:
    - correlation_analysis
  - id: finance-C-156
    when: When implementing Minimum Spanning Tree creation
    action: Verify MST contains exactly N-1 edges for N nodes to maintain tree property
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: A Minimum Spanning Tree with incorrect edge count violates the fundamental tree property, producing an invalid
      graph structure that cannot correctly represent hierarchical relationships between assets or features
    stage_ids:
    - clustering_networks
  - id: finance-C-157
    when: When implementing Planar Maximally Filtered Graph construction
    action: Verify PMFG contains approximately 3N-6 edges for N nodes to satisfy planarity constraints
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: PMFG with incorrect edge count violates planarity requirements, causing the graph to fail proper information
      filtering and potentially including non-planar edges that distort network structure analysis
    stage_ids:
    - clustering_networks
  - id: finance-C-158
    when: When constructing MST, PMFG, or ALMST networks
    action: Verify the resulting graph is connected with no isolated components
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Disconnected networks produce isolated clusters that cannot participate in correlation-based portfolio analysis,
      leading to incomplete risk assessment and missing diversification signals
    stage_ids:
    - clustering_networks
  - id: finance-C-159
    when: When generating cluster assignments via ONC or hierarchical clustering
    action: Verify cluster assignments are non-overlapping with each feature assigned to exactly one cluster
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Overlapping or duplicate cluster assignments cause features to be included multiple times in portfolio construction,
      violating mutual exclusivity and producing double-counted risk exposure
    stage_ids:
    - clustering_networks
  - id: finance-C-161
    when: When using ALMST algorithm
    action: Pass correlation matrix as input - ALMST only accepts distance matrices
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: ALMST with correlation input produces meaningless results because the algorithm expects distance values where
      smaller means closer, but correlation values have opposite semantics
    stage_ids:
    - clustering_networks
  - id: finance-C-172
    when: When assigning features to clusters via ONC
    action: Assign the same feature to multiple clusters even if it spans clusters
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: ONC is designed for non-overlapping assignments; forcing multi-cluster assignment breaks the algorithm's
      assumptions and produces invalid cluster structures
    stage_ids:
    - clustering_networks
  - id: finance-C-177
    when: When generating synthetic correlation matrices using vine methods
    action: Verify output matrices are positive semi-definite by using Beta(1,1) uniform prior on partial correlations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid correlation matrices with negative eigenvalues will cause Cholesky decomposition failures when used
      for multivariate sampling, producing NaN values in generated time series
    stage_ids:
    - data_generation
  - id: finance-C-179
    when: When validating generated correlation matrices
    action: Verify matrices are symmetric, positive semi-definite, and have diagonal equal to 1
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Invalid correlation matrices cause downstream multivariate sampling to fail with singular matrix errors or
      produce mathematically incorrect synthetic data
    stage_ids:
    - data_generation
  - id: finance-C-180
    when: When generating time series from correlation matrices
    action: Verify the input correlation matrix is positive semi-definite before applying multivariate sampling
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-positive semi-definite correlation matrix causes Cholesky decomposition to fail, producing invalid time
      series
    stage_ids:
    - data_generation
  - id: finance-C-181
    when: When sampling from CorrGAN model
    action: Verify dimension parameter is within the supported range [2, 200]
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Dimension outside [2, 200] causes CorrGAN model loading failure or produces invalid correlation matrices
    stage_ids:
    - data_generation
  - id: finance-C-182
    when: When configuring HCBM correlation bounds
    action: Verify rho_low >= 0 and rho_high <= 1 with rho_low <= rho_high
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Invalid correlation bounds produce mathematically impossible correlation values outside [-1, 1] range
    stage_ids:
    - data_generation
  - id: finance-C-209
    when: When implementing data flow from data_ingestion to labeling stages
    action: verify close prices align with the same timestamps used for barrier distance calculations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Volatility estimation via get_daily_vol and triple barrier calculations require timestamp-aligned data; misalignment
      causes incorrect barrier widths and invalid labels
  - id: finance-C-210
    when: When implementing data flow from event_filtering to labeling stages
    action: verify t_events timestamps are provided as DatetimeIndex and used directly as seeds for triple barrier application
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Triple barrier method get_events requires t_events as pd.Series with DatetimeIndex; incorrect format causes
      ValueError or barrier misalignment
  - id: finance-C-213
    when: When implementing data flow from sample_weighting to model_training stages
    action: verify sample_weight array aligns with X features and y labels by index position
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Sequential bootstrap bagging classifier fit requires sample_weight length matching X rows; mismatch causes
      array dimension error or incorrect sample weighting
  - id: finance-C-220
    when: When implementing data flow from model_training to backtesting stages
    action: verify predictions are converted to position and return series using the same price series used for label computation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backtesting statistics require consistent price series; using different price sources corrupts return calculations
      and invalidates performance metrics
  - id: finance-C-224
    when: When computing sample weights for concurrent events
    action: use different close_series sources between triple barrier labeling and uniqueness calculation
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Using different price sources for labeling and uniqueness calculation causes timestamp misalignment and corrupts
      sample weight attribution
  - id: finance-C-225
    when: When training sequential bootstrap bagging classifier
    action: provide samples_info_sets as pd.Series with start time as index and t1 end time as values
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Sequential bootstrapping requires samples_info_sets structure for indicator matrix computation; incorrect
      format causes sampling bias or memory errors
  - id: finance-C-227
    when: When passing features to cross-validation for purged split
    action: verify X DataFrame and y Series share the same index as samples_info_sets for proper embargo application
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: PurgedKFold split requires index alignment between features, labels, and sample info sets; misalignment causes
      information leakage in cross-validation
  - id: finance-C-228
    when: When providing input CSV files for data ingestion
    action: 'Structure CSV files with exactly 3 columns in order: date_time, price, volume — price must be float type and
      volume must be numeric'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Bar construction will fail or produce incorrect results if input CSV does not match the required date_time,
      price, volume schema
  - id: finance-C-229
    when: When constructing bar DataFrames from any bar type
    action: 'Output DataFrames must contain exactly 9 columns in order: date_time, open, high, low, close, volume, cum_buy_volume,
      cum_ticks, cum_dollar_value'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream feature engineering, labeling, and cross-validation functions will fail due to missing cumulative
      fields
  - id: finance-C-230
    when: When using PurgedKFold cross-validation or sequential bootstrap
    action: Pass samples_info_sets as pd.Series where index equals event start time and value equals event end time (t1)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: PurgedKFold will incorrectly purge training samples causing information leakage or data corruption in CV
      results
  - id: finance-C-231
    when: When constructing triple barrier events via get_events
    action: Set events.index to event start time and events['t1'] to event end time — this links labeling to cross-validation
      properly
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Sequential bootstrap and purged cross-validation will fail or produce incorrect results due to missing temporal
      linking between samples
  - id: finance-C-239
    when: When describing this library's capabilities to stakeholders
    action: Claim this library is suitable for real-time production trading systems — MlFinLab is research-focused and does
      not support live trading execution
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users will attempt to deploy research code directly into production, causing system failures, financial losses,
      and potential regulatory violations
  - id: finance-C-243
    when: When implementing custom labeling functions for use with mlfinlab cross-validation
    action: Return samples_info_sets as a dict where index equals event_start and value equals event_end (t1 expiration),
      ensuring O(1) lookup for purge zone computation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Violating the samples_info_sets contract causes incorrect train/test boundary computation, leading to temporal
      leakage where test data includes information from future events that have not yet expired
    derived_from_bd_id: BD-074
  - id: finance-C-249
    when: When subclassing SequentiallyBootstrappedBaseBagging or modifying its inheritance hierarchy
    action: Verify method resolution order (MRO) correctly routes super() calls through both BaseBagging and BaggingClassifier;
      maintain the diamond inheritance pattern for sklearn interface compatibility
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect MRO in triple inheritance causes attribute lookup failures or method shadowing, leading to RuntimeError
      or incorrect bagging behavior when sklearn compatibility is broken
    derived_from_bd_id: BD-084
  - id: finance-C-274
    when: When implementing or modifying any data ingestion or signal generation logic in backtesting
    action: Assume data is simultaneously available without accounting for staggered data releases — the framework contains
      no mechanism to prevent look-ahead bias from using data before its public availability timestamp
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Backtests systematically include look-ahead bias by using price/volume data before it would have been publicly
      available, causing live trading returns to fall far below backtested results
    derived_from_bd_id: BD-100
  - id: finance-C-275
    when: When processing data feeds in backtesting
    action: Implement data availability validation by tracking each data point's publication timestamp and filtering out any
      data used before its release time — reject or flag signals that rely on look-ahead information
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without data availability validation, backtests produce inflated returns that cannot be replicated in live
      trading due to information not yet available at signal generation time
    derived_from_bd_id: BD-100
  - id: finance-C-302
    when: When implementing bagging ensemble for time series prediction models
    action: Disable bootstrap sampling in sequential bootstrapping — the bootstrap=True setting is mandatory and must not
      be changed to False, as disabling it bypasses the core randomization mechanism and reverts to standard bagging with
      information leakage
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Setting bootstrap=False reverts to standard i.i.d. bagging which violates temporal ordering assumptions in
      financial time series, causing information leakage that makes backtest results non-reproducible in live trading
    derived_from_bd_id: BD-078
  - id: finance-C-310
    when: When implementing correlation analysis using fractional differentiation in the pipeline
    action: Validate d-parameter for fractional differentiation produces stationarity without excessive memory loss; verify
      d falls within (0, 1) and run ADF test to confirm stationarity before proceeding to correlation analysis
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Improper d-parameter selection either leaves non-stationarity corrupting correlation analysis or strips too
      much memory reducing predictive signal, leading to unreliable hierarchical clustering structures
    derived_from_bd_id: BD-096
  - id: finance-C-316
    when: When implementing cross-validation for financial time series models
    action: Use PurgedKFold instead of standard KFold to remove observations in the embargo period between train/test sets
      and prevent look-ahead bias from future to past observations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Standard KFold violates temporal ordering and allows information leakage from future to past observations,
      causing backtested performance to appear inflated and unreproducible in live trading execution
    derived_from_bd_id: BD-041
  regular:
  - id: finance-C-008
    when: When selecting batch_size for datasets >100M rows
    action: configure batch_size smaller than default to prevent memory exhaustion
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Processing 100M+ rows in a single batch without reducing batch_size will cause OutOfMemoryError, requiring
      reprocessing from scratch
    stage_ids:
    - data_ingestion
  - id: finance-C-009
    when: When calculating expected imbalance using EWMA
    action: set expected_imbalance_window parameter to control adaptation speed to non-stationary order flow
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Incorrect EWMA window causes poor adaptation to regime changes, producing bars with suboptimal information-driven
      sampling frequency
    stage_ids:
    - data_ingestion
  - id: finance-C-010
    when: When processing tick data for bar construction
    action: apply tick rule to infer trade direction when buy/sell indicator is not explicitly provided
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without tick rule application, buy/sell classification defaults to zero for all trades, causing cum_buy_volume
      to be zero and losing directional information essential for imbalance bars
    stage_ids:
    - data_ingestion
  - id: finance-C-013
    when: When creating user-facing API functions
    action: wrap class constructors with factory functions (get_*_bars) to hide implementation complexity
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Direct class instantiation bypasses default parameter values, causing TypeError with missing required arguments
      for users unfamiliar with internal API
    stage_ids:
    - data_ingestion
  - id: finance-C-014
    when: When constructing bar output values
    action: verify OHLC columns (open, high, low, close) contain no NaN values
    severity: high
    kind: domain_rule
    modality: must
    consequence: NaN values in OHLC columns propagate to downstream feature engineering, causing model training failures and
      incorrect backtest results
    stage_ids:
    - data_ingestion
  - id: finance-C-015
    when: When generating information-driven bars (imbalance/run bars)
    action: verify bar count is approximately uniform across information measures rather than time
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: If bar counts vary significantly across information measures, the sampling mechanism is not information-driven,
      defeating the purpose of imbalance/run bars and producing inferior statistical properties
    stage_ids:
    - data_ingestion
  - id: finance-C-017
    when: When documenting bar construction capabilities
    action: claim real-time trading support when using historical batch processing
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Claiming real-time capability when the library uses batch processing with polling introduces unrealistic
      expectations, causing live trading systems to miss time-sensitive execution opportunities
    stage_ids:
    - data_ingestion
  - id: finance-C-018
    when: When setting time bar resolution parameter
    action: 'use valid resolution types: ''D'' (day), ''H'' (hour), ''MIN'' (minute), or ''S'' (second)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid resolution string will cause unexpected parsing behavior or runtime errors, producing time bars with
      incorrect interval widths
    stage_ids:
    - data_ingestion
  - id: finance-C-019
    when: When selecting bar type metric parameter
    action: 'use supported metric types: dollar_imbalance, volume_imbalance, tick_imbalance, dollar_run, volume_run, or tick_run'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unsupported metric type will cause KeyError or unexpected behavior in bar threshold calculation, producing
      malformed bars or silent failures
    stage_ids:
    - data_ingestion
  - id: finance-C-023
    when: When validating input parameters for event filter functions
    action: Accept threshold as either float (fixed) or pd.Series (dynamic), performing type validation to verify proper event
      detection
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid threshold type causes runtime exceptions or silent failures in event detection, producing empty or
      incorrect event lists that break the labeling pipeline.
    stage_ids:
    - event_filtering
  - id: finance-C-024
    when: When implementing event filter functions
    action: Verify raw_time_series input is validated as pd.Series with proper index to align with threshold pd.Series when
      using dynamic thresholding
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched indices between raw_time_series and dynamic threshold Series causes element-wise operations to
      fail or produce misaligned event timestamps.
    stage_ids:
    - event_filtering
  - id: finance-C-025
    when: When using CUSUM filter for event detection
    action: Set threshold value greater than zero to avoid detecting noise from microstructure fluctuations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero or near-zero threshold triggers events on every price tick, defeating the purpose of event filtering
      and causing the system to process microstructure noise instead of meaningful price moves.
    stage_ids:
    - event_filtering
  - id: finance-C-026
    when: When implementing z_score_filter
    action: Use positive z_score parameter (default 3) to trigger events only when price deviations exceed specified standard
      deviations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative z_score inverts the filter logic, triggering events for normal price movements instead of outliers,
      producing false event signals.
    stage_ids:
    - event_filtering
  - id: finance-C-028
    when: When implementing event filter output interface
    action: Support both DateTimeIndex (time_stamps=True) and list return types based on time_stamps parameter
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent output type breaks downstream consumers. get_events() expects pd.Series of t_events, while other
      code may expect list format.
    stage_ids:
    - event_filtering
  - id: finance-C-031
    when: When selecting filter threshold values
    action: Calibrate threshold based on volatility estimates rather than arbitrary values for regime-aware filtering
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Fixed threshold without volatility adjustment triggers too many events in high-volatility regimes and too
      few in low-volatility regimes, reducing strategy effectiveness.
    stage_ids:
    - event_filtering
  - id: finance-C-032
    when: When using z_score_filter
    action: Set mean_window and std_window parameters to values greater than 1 to verify sufficient statistical samples
    severity: high
    kind: domain_rule
    modality: must
    consequence: Window size of 1 or less produces unreliable rolling statistics with high variance, causing spurious z-score
      outliers and incorrect event detection.
    stage_ids:
    - event_filtering
  - id: finance-C-034
    when: When evaluating event filter performance
    action: Claim events detected by CUSUM filter guarantee profitable trades or mean reversion will occur
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: CUSUM detects statistical mean shifts but does not guarantee the shift persists or reverses. Claiming otherwise
      misleads users into overconfident strategies.
    stage_ids:
    - event_filtering
  - id: finance-C-035
    when: When documenting event filter capabilities
    action: Overstate filter's ability to eliminate microstructure noise; filter detects significant changes but does not
      perform sophisticated noise cancellation
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting microstructure noise elimination may apply CUSUM inappropriately, producing events that include
      noise-triggered signals in high-frequency data.
    stage_ids:
    - event_filtering
  - id: finance-C-036
    when: When implementing event filtering
    action: Skip output deduplication assuming downstream consumers will handle duplicates
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Relying on downstream code to handle duplicates creates fragile pipeline. If any downstream function doesn't
      deduplicate, triple barriers get computed multiple times per event.
    stage_ids:
    - event_filtering
  - id: finance-C-037
    when: When threshold parameter is a pd.Series for dynamic filtering
    action: Validate that threshold Series index aligns with raw_time_series index to prevent misaligned event detection
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misaligned indices cause events to be detected at wrong timestamps, corrupting the temporal ordering of events
      and breaking downstream triple barrier calculations.
    stage_ids:
    - event_filtering
  - id: finance-C-040
    when: When implementing triple barrier with profit taking and stop loss levels
    action: Disable the profit taking barrier when pt_sl[0] equals 0, and disable the stop loss barrier when pt_sl[1] equals
      0
    severity: high
    kind: domain_rule
    modality: must
    consequence: If barriers are not properly disabled when pt_sl values are 0, the labeling will incorrectly apply barriers
      that should be inactive, producing labels that do not match the intended pure horizontal or pure vertical barrier strategy
    stage_ids:
    - labeling
  - id: finance-C-041
    when: When implementing drop_labels for rare label elimination
    action: Recursively eliminate labels that occur less than min_pct threshold of total observations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failure to recursively eliminate rare labels will cause ML models to overfit to rare patterns, resulting
      in poor generalization and degraded live trading performance when those rare patterns do not recur
    stage_ids:
    - labeling
  - id: finance-C-042
    when: When implementing vertical barrier creation
    action: Calculate vertical barrier times as timestamps at or immediately after the specified time delta from each t_event
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect vertical barrier calculation will cause events to resolve at wrong timestamps, corrupting the labeling
      output and leading to incorrect sample weights and backtest statistics in downstream stages
    stage_ids:
    - labeling
  - id: finance-C-043
    when: When implementing labeling with side prediction for meta-labeling
    action: Use side_prediction from primary model to determine position direction before computing binary meta-labels
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If meta-labeling does not properly separate directional prediction (primary model) from execution decision
      (secondary model), the approach loses its core benefit of reducing false positives and separating concerns between prediction
      and execution
    stage_ids:
    - labeling
  - id: finance-C-044
    when: When implementing get_events as the labeling orchestrator
    action: Return events DataFrame with columns t1 (barrier touch time), bin (label), side (optional), pt (profit taking
      multiple), sl (stop loss multiple), and index matching t_events
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If the events DataFrame structure does not match the expected interface, downstream stages (sample_weighting,
      bet_sizing) will fail to consume the output, causing data pipeline breakage and runtime errors
    stage_ids:
    - labeling
  - id: finance-C-047
    when: When implementing add_vertical_barrier function
    action: Accept vertical_barrier_times as a Series of timestamps or False to disable vertical barriers
    severity: high
    kind: resource_boundary
    modality: must
    consequence: If vertical barriers are not properly handled when passed as False, the get_events function will fail to
      disable vertical barriers, causing all labels to resolve at unexpected times regardless of horizontal barrier touches
    stage_ids:
    - labeling
  - id: finance-C-048
    when: When implementing drop_labels with min_pct parameter
    action: Eliminate labels occurring in less than min_pct (default 0.05) fraction of total observations
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using an inappropriate min_pct threshold will either leave rare labels that cause overfitting, or eliminate
      too many labels and reduce the training dataset size below useful levels for ML model convergence
    stage_ids:
    - labeling
  - id: finance-C-049
    when: When implementing triple barrier with min_ret threshold
    action: Only create triple barrier labels for events where expected return exceeds min_ret threshold
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without min_ret filtering, the labeling will create barriers for low-expected-return events, leading to noisy
      labels where most barriers are never touched, wasting computational resources and potentially degrading model signal
      quality
    stage_ids:
    - labeling
  - id: finance-C-050
    when: When validating labeling output before passing to ML training
    action: Verify that events DataFrame contains no NaN values in output columns after drop_labels
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: NaN values in labeling output will cause downstream ML models to receive incomplete training data, resulting
      in unexpected model behavior, training failures, or silent corruption of learning where NaN entries are treated as a
      separate class
    stage_ids:
    - labeling
  - id: finance-C-051
    when: When using triple barrier labeling for backtesting
    action: Claim that backtest labels equal expected live trading labels or guarantee live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest labels as equivalent to live trading labels is misleading because backtest execution
      assumes instant fills at close prices without slippage, transaction costs, or market impact, causing real-world returns
      to diverge significantly from backtested results
    stage_ids:
    - labeling
  - id: finance-C-052
    when: When using meta-labeling for execution decisions
    action: Claim that meta-labeling guarantees elimination of each false positive trades
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Meta-labeling reduces but does not eliminate false positives; if claimed as guaranteed, users will make risky
      live trades based on flawed confidence, potentially resulting in significant financial losses when secondary model predictions
      are incorrect
    stage_ids:
    - labeling
  - id: finance-C-053
    when: When implementing labeling for production deployment
    action: Validate that label distribution meets minimum percentage threshold after drop_labels
    severity: high
    kind: operational_lesson
    modality: must
    consequence: If label distribution after drop_labels does not meet the minimum percentage threshold, the ML model will
      train on imbalanced data, leading to biased predictions that favor majority class and underperform on minority class
      patterns
    stage_ids:
    - labeling
  - id: finance-C-055
    when: When implementing sample_weighting that consumes triple barrier events
    action: Verify triple barrier events DataFrame has required columns t1 (label endtime) and optionally side
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If sample_weighting functions receive events DataFrame without proper t1 column, the uniqueness calculation
      will fail or produce garbage weights, corrupting the ML sample weighting scheme and degrading model quality
    stage_ids:
    - labeling
  - id: finance-C-056
    when: When implementing bet_sizing that consumes triple barrier events
    action: Verify triple barrier events DataFrame has t1 column with correct datetime index alignment
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If bet_sizing functions receive events with incorrect t1 alignment, position sizing will be computed for
      wrong time horizons, leading to over- or under-sized positions that increase risk and reduce strategy profitability
    stage_ids:
    - labeling
  - id: finance-C-058
    when: When implementing get_bins for meta-labeling with side
    action: Label outcomes as 1 when predicted side matches actual return direction, and 0 otherwise
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect meta-labeling logic will create binary labels that do not represent whether the bet should have
      been taken, defeating the purpose of meta-labeling and producing incorrect execution signals
    stage_ids:
    - labeling
  - id: finance-C-059
    when: When implementing barrier_touched for vertical barrier priority
    action: Return 0 (vertical barrier touched) when vertical barrier is the first barrier reached chronologically
    severity: high
    kind: domain_rule
    modality: must
    consequence: If vertical barrier is not correctly identified as touched first, events will be misclassified as hits or
      misses when they actually timed out, corrupting ML training labels and causing incorrect strategy evaluation
    stage_ids:
    - labeling
  - id: finance-C-060
    when: When implementing multiprocessing with mp_pandas_obj for labeling
    action: Process molecules (datetime subsets) independently to enable parallel barrier computation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: If molecule processing is not independent, multiprocessing will produce incorrect results or race conditions,
      causing barrier touch times to be calculated incorrectly or randomly corrupted
    stage_ids:
    - labeling
  - id: finance-C-061
    when: When implementing fixed_time_horizon labeling with threshold parameter
    action: Return 1 for returns exceeding threshold, -1 for returns below negative threshold, and 0 for returns within threshold
      bounds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect threshold-based labeling will cause the classifier to receive wrong ternary labels, training models
      that make incorrect predictions for boundary cases near the threshold
    stage_ids:
    - labeling
  - id: finance-C-063
    when: When implementing get_weights_by_time_decay with decay parameter
    action: use float type for decay parameter instead of int annotation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using int type annotation causes type coercion errors when passing decimal values like 0.5, breaking the
      intended linear decay behavior described in the documentation
    stage_ids:
    - sample_weighting
  - id: finance-C-065
    when: When computing sample weights from triple barrier events
    action: normalize weights so sum equals approximately n_samples
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper normalization, sample weights distort the effective sample size used in model training, causing
      overfitting or underfitting compared to expected behavior
    stage_ids:
    - sample_weighting
  - id: finance-C-066
    when: When using sequential bootstrap for sampling
    action: provide a random_state for reproducible results across runs
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without explicit random_state, bootstrap samples are non-deterministic, preventing reproducible model training
      and debugging of overfitting issues
    stage_ids:
    - sample_weighting
  - id: finance-C-068
    when: When computing sample weights by return attribution
    action: assign higher weights to events with higher absolute returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Return-based weighting that inverts the expected relationship causes the model to underweight high-return
      events, reducing strategy performance and predictive power
    stage_ids:
    - sample_weighting
  - id: finance-C-069
    when: When computing weights for concurrent events
    action: assign lower weights to events with more concurrent overlapping positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without concurrency-adjusted weighting, crowded periods receive disproportionately high influence in model
      training, amplifying overfitting to market conditions during high-activity periods
    stage_ids:
    - sample_weighting
  - id: finance-C-071
    when: When using sequential bootstrap without random_state
    action: expect different sample distributions on each run
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without fixed random_state, sequential bootstrap produces non-reproducible samples, making it impossible
      to debug model behavior or compare experimental results
    stage_ids:
    - sample_weighting
  - id: finance-C-072
    when: When using multiprocessing for weight computation
    action: pass non-thread-safe objects across parallel workers
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Passing non-thread-safe objects like RandomState across multiprocessing workers causes race conditions, producing
      corrupted or NaN weight values
    stage_ids:
    - sample_weighting
  - id: finance-C-073
    when: When computing stacked sample weights for multi-asset datasets
    action: verify dictionary keys (asset names) are consistent across events and close_series inputs
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent dictionary keys between events and price inputs cause KeyError exceptions or silent misalignments
      where weights are computed for wrong assets
    stage_ids:
    - sample_weighting
  - id: finance-C-075
    when: When using sample weights in cross-validation
    action: pass matching weight arrays to both train and score functions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched train/score weights cause evaluation metrics to reflect different sample importance than training,
      producing misleading performance estimates
    stage_ids:
    - sample_weighting
  - id: finance-C-076
    when: When implementing time decay weighting
    action: verify decay values in (0, 1] range maintain positive weights
    severity: high
    kind: domain_rule
    modality: must
    consequence: Decay values outside (0, 1] produce zero or negative weights for older observations, eliminating their contribution
      to model training and reducing effective sample diversity
    stage_ids:
    - sample_weighting
  - id: finance-C-077
    when: When computing indicator matrix for bootstrapping
    action: use numba JIT compilation for _bootstrap_loop_run performance
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without JIT compilation, sequential bootstrap loops over large datasets become prohibitively slow, making
      the technique impractical for production workloads
    stage_ids:
    - sample_weighting
  - id: finance-C-079
    when: When computing FFD weights for fractional differentiation
    action: use thresh parameter (default 1e-5) to remove negligible weights
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without threshold-based weight removal, negligible weights accumulate and cause numerical instability, potentially
      generating NaN values or infinite series that corrupt downstream ML features
    stage_ids:
    - feature_engineering
  - id: finance-C-080
    when: When computing MDI feature importance values
    action: produce non-negative importance values bounded between 0 and 1
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative MDI values indicate corrupted impurity calculations, producing meaningless rankings that mislead
      feature selection decisions
    stage_ids:
    - feature_engineering
  - id: finance-C-081
    when: When using fractional differentiation on time series
    action: use FFD method to avoid NaN values at the start of the output series
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Expanding window frac_diff produces NaN values at the start due to cumulative weight effects, corrupting
      ML training data and causing downstream model failures
    stage_ids:
    - feature_engineering
  - id: finance-C-083
    when: When using PurgedKFold for cross-validation
    action: set shuffle=False to verify contiguous test sets without random sampling
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Random shuffling breaks temporal ordering of financial data, allowing future information to leak into training
      sets and invalidating the purging mechanism
    stage_ids:
    - feature_engineering
  - id: finance-C-084
    when: When computing MDA feature importance with correlated features
    action: apply clustered_subsets to prevent substitution effects from diluting importance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without clustering, MDA/MDI systematically underestimates importance of correlated feature groups, causing
      critical predictive features to appear irrelevant and leading to suboptimal feature selection
    stage_ids:
    - feature_engineering
  - id: finance-C-085
    when: When computing MDA feature importance
    action: apply embargo percentage (pct_embargo > 0) to prevent leakage after test periods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without embargo, samples immediately following test periods leak information through label dependencies,
      inflating importance scores for features that exploit temporal autocorrelation
    stage_ids:
    - feature_engineering
  - id: finance-C-086
    when: When interpreting MDI feature importance results
    action: claim MDI as a generalizable predictive importance method
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: MDI is computed in-sample from training data and is specific to tree-based classifiers, claiming it as a
      general method misleads stakeholders about feature predictive power
    stage_ids:
    - feature_engineering
  - id: finance-C-087
    when: When presenting feature importance results to stakeholders
    action: claim that backtested importance rankings equal expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Feature importance rankings derived from historical backtests do not account for market regime changes, transaction
      costs, and execution slippage that materially affect live trading results
    stage_ids:
    - feature_engineering
  - id: finance-C-090
    when: When determining minimum fractional differentiation order d
    action: skip ADF statistical validation based solely on visual correlation inspection
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Visual inspection via plot_min_ffd correlation graph cannot replace ADF statistical test; insufficient differencing
      leads to non-stationary features with unit roots
    stage_ids:
    - feature_engineering
  - id: finance-C-091
    when: When time is constrained and quick results are needed
    action: skip clustered feature importance analysis with correlated features
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping clustered_subsets with correlated features causes misleading importance rankings that lead to poor
      feature selection and degraded model performance in live trading
    stage_ids:
    - feature_engineering
  - id: finance-C-096
    when: When configuring PurgedKFold for cross-validation
    action: explicitly set pct_embargo > 0 for safety; default of 0.0 provides no embargo buffer
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without embargo buffer, observations immediately after test periods leak information; pct_embargo=0.0 is
      conservative but potentially unsafe for live trading evaluation
    stage_ids:
    - model_training
  - id: finance-C-097
    when: When configuring PurgedKFold or CombinatorialPurgedKFold
    action: expect sklearn's default n_splits=5; this implementation defaults to n_splits=3
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Fewer CV folds (3 vs 5) reduces validation granularity and may miss model instability; fewer splits means
      less robust performance estimation
    stage_ids:
    - model_training
  - id: finance-C-098
    when: When computing out-of-bag scores
    action: set oob_score=True to enable OOB estimation; default is False
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without oob_score=True, OOB score attribute remains unset; downstream code expecting oob_score_ attribute
      will fail or return None
    stage_ids:
    - model_training
  - id: finance-C-099
    when: When running sequential bootstrap bagging without reproducibility requirements
    action: set random_state parameter for reproducible OOB sets across runs
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without random_state, sequential bootstrap produces different OOB sets on each execution; results become
      irreproducible and debugging becomes difficult
    stage_ids:
    - model_training
  - id: finance-C-100
    when: When using CombinatorialPurgedKFold for evaluation
    action: understand that CPCV generates combinatorial test paths; n_test_splits controls path count
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: CPCV with n_test_splits=2 and n_splits=3 generates multiple backtest paths; computation time grows combinatorially;
      wrong parameter causes unexpected evaluation scope
    stage_ids:
    - model_training
  - id: finance-C-101
    when: When using ml_cross_val_score function
    action: pass a cv_gen object explicitly; default CV generator is not provided
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unlike the book implementation, this function requires explicit CV object; passing None causes AttributeError
    stage_ids:
    - model_training
  - id: finance-C-102
    when: When inheriting from sklearn's BaseBagging
    action: leverage sklearn's parallel estimator building, OOB scoring, and warm start mechanisms
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Overriding sklearn's base implementation without leveraging existing parallel/OOB mechanisms duplicates code
      and loses sklearn optimizations
    stage_ids:
    - model_training
  - id: finance-C-103
    when: When presenting model training results
    action: claim that OOB scores guarantee live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: OOB scores are computed on training data subsets; they estimate in-sample generalization error, not future
      live trading returns
    stage_ids:
    - model_training
  - id: finance-C-104
    when: When presenting cross-validation scores
    action: claim that purged cross-validation scores equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Purged CV removes overlapping observations but cannot account for all market regime changes, transaction
      costs, and slippage that affect live trading
    stage_ids:
    - model_training
  - id: finance-C-105
    when: When verifying model training acceptance criteria
    action: skip checking temporal stability of cross-validation scores due to time pressure
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Temporal instability in CV scores indicates model overfitting to historical patterns; skipping validation
      under time pressure produces unreliable backtest results
    stage_ids:
    - model_training
  - id: finance-C-106
    when: When training models on overlapping triple-barrier labels
    action: skip sequential bootstrapping and use standard random sampling
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Standard bootstrap on overlapping labels gives equal probability to all samples, ignoring label concurrency;
      sequential bootstrap down-weights concurrent labels, producing more accurate OOB estimates
    stage_ids:
    - model_training
  - id: finance-C-110
    when: When implementing EF3M M2N fitting
    action: use numba JIT-compiled iter_4_jit and iter_5_jit for EF3M variants
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without JIT compilation, EF3M fitting becomes prohibitively slow for real-time applications, making the reserve-based
      sizing unusable in production trading systems
    stage_ids:
    - bet_sizing
  - id: finance-C-112
    when: When implementing bet_size_reserve
    action: set default epsilon=1e-5 for EF3M fitting tolerance
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incorrect fitting tolerance causes poor mixture distribution convergence, leading to incorrect bet sizes
      that don't properly account for concurrent position risk
    stage_ids:
    - bet_sizing
  - id: finance-C-113
    when: When implementing concurrent bet averaging
    action: properly average active signals when average_active=True is set
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect averaging of concurrent bet signals leads to position size miscalculation, potentially doubling
      position sizes incorrectly or losing signal information
    stage_ids:
    - bet_sizing
  - id: finance-C-115
    when: When implementing bet_size_dynamic
    action: validate func parameter accepts only 'sigmoid' or 'power' values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid func parameter causes AttributeError or undefined behavior in dynamic bet sizing calculation, breaking
      position sizing entirely
    stage_ids:
    - bet_sizing
  - id: finance-C-116
    when: When implementing EF3M variant selection
    action: restrict variant parameter to 1 (4 moments) or 2 (5 moments) only
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid variant selection causes incorrect EF3M algorithm execution or array indexing errors, producing meaningless
      mixture parameters
    stage_ids:
    - bet_sizing
  - id: finance-C-117
    when: When implementing get_concurrent_sides
    action: correctly interpret sides as positive for long, negative for short
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect side interpretation leads to wrong concurrent bet counting, corrupting c_t values that feed into
      the M2N mixture fitting
    stage_ids:
    - bet_sizing
  - id: finance-C-118
    when: When using bet sizing outputs in backtesting
    action: claim backtest bet sizes equal expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest bet sizing does not account for slippage, market impact, or execution delays that occur in live
      trading, causing expected returns to be significantly overestimated
    stage_ids:
    - bet_sizing
  - id: finance-C-119
    when: When implementing bet_size_reserve with EF3M
    action: use at least 100 fit_runs to verify robust M2N parameter estimation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Insufficient fit runs produces unreliable mixture parameters, causing inconsistent bet sizes that vary significantly
      between runs on the same data
    stage_ids:
    - bet_sizing
  - id: finance-C-121
    when: When implementing cdf_mixture
    action: 'accept parameters in exact order: [mu_1, mu_2, sigma_1, sigma_2, p_1]'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect parameter ordering causes wrong CDF calculation for mixture distribution, leading to incorrect
      bet sizing that doesn't match expected probability distributions
    stage_ids:
    - bet_sizing
  - id: finance-C-123
    when: When computing probabilistic_sharpe_ratio or deflated_sharpe_ratio
    action: Verify the returned value is within [0, 1] range as it represents a probability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Probability outside [0,1] range indicates numerical instability or incorrect implementation, making the statistical
      test result unreliable
    stage_ids:
    - backtesting
  - id: finance-C-124
    when: When computing drawdown_and_time_under_water
    action: Verify drawdown values are non-positive (<= 0) relative to running maximum
    severity: high
    kind: domain_rule
    modality: must
    consequence: Positive drawdown values would violate the mathematical definition of drawdown as loss from peak, indicating
      incorrect cumulative return calculation
    stage_ids:
    - backtesting
  - id: finance-C-125
    when: When computing minimum_track_record_length
    action: Return a positive integer value representing minimum number of observations required
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative or zero track record length would make no logical sense and would not properly guide investment
      decisions
    stage_ids:
    - backtesting
  - id: finance-C-127
    when: When using CampbellBacktesting class for Haircut Sharpe Ratios
    action: Set simulations >= 2000 to achieve adequate convergence of p-value distribution
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient simulations (< 2000) lead to unstable p-value distributions, causing unreliable Sharpe ratio
      haircuts and incorrect strategy evaluation
    stage_ids:
    - backtesting
  - id: finance-C-128
    when: When using CampbellBacktesting profit_hurdle method
    action: Apply autocorrelation correction as this method does not support it
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Attempting to use autocorrelation-adjusted returns with profit_hurdle will produce incorrect minimum required
      returns due to unsupported calculation path
    stage_ids:
    - backtesting
  - id: finance-C-129
    when: When setting risk_free_rate for sharpe_ratio calculation
    action: Use risk-free rate for the same time period as the input returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched risk-free rate period causes Sharpe ratio to misrepresent risk-adjusted returns, leading to incorrect
      strategy ranking
    stage_ids:
    - backtesting
  - id: finance-C-130
    when: When providing skewness and kurtosis for Sharpe ratio adjustments
    action: Use actual sample statistics rather than defaults when available for non-normal returns
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Default values (skewness=0, kurtosis=3 for normal distribution) produce incorrect probabilistic/deflated
      Sharpe ratios for non-normal returns, overstating or understating significance
    stage_ids:
    - backtesting
  - id: finance-C-131
    when: When using CampbellBacktesting with Sharpe ratio inputs
    action: Set sampling_frequency parameter as one of ['D','W','M','Q','A'] to match return frequency
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Invalid sampling frequency string causes incorrect monthly observation conversion and wrong annualized Sharpe
      ratios
    stage_ids:
    - backtesting
  - id: finance-C-132
    when: When using information_ratio function
    action: Provide benchmark returns for the same time interval as input returns
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mismatched benchmark frequency causes incorrect tracking error calculation and misleading information ratio
    stage_ids:
    - backtesting
  - id: finance-C-134
    when: When interpreting probabilistic Sharpe ratio results
    action: Treat PSR values as definitive proof of strategy viability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: PSR is a probability estimate subject to model assumptions; treating it as certainty ignores estimation uncertainty
      and model risk
    stage_ids:
    - backtesting
  - id: finance-C-135
    when: When reporting minimum track record length results
    action: Present MinTRL as a guaranteed investment horizon requirement
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: MinTRL is a statistical minimum based on specific assumptions; actual required track record may be longer
      due to changing market conditions, model instability, or non-stationarity
    stage_ids:
    - backtesting
  - id: finance-C-136
    when: When strategy passes Haircut Sharpe ratio test
    action: Skip investigating why the original Sharpe ratio was high (rationalize as valid strategy)
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Passing the haircut test without root cause analysis ignores potential data mining overfitting, survivorship
      bias, or regime-specific performance
    stage_ids:
    - backtesting
  - id: finance-C-138
    when: When backtest shows positive Sharpe ratio
    action: Conclude strategy is profitable without MinTRL validation
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Positive Sharpe ratio on short track record may be due to luck; insufficient data cannot distinguish skill
      from random variation
    stage_ids:
    - backtesting
  - id: finance-C-141
    when: When calling pairwise codependence functions with input vectors
    action: Verify that input vectors x and y have the same number of observations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched vector lengths cause index misalignment in copula ranking and distance calculations, producing
      invalid dependence scores that corrupt downstream portfolio analysis
    stage_ids:
    - correlation_analysis
  - id: finance-C-142
    when: When using gpr_distance or gnpr_distance with theta parameter
    action: Verify theta parameter value falls within [0, 1] range
    severity: high
    kind: domain_rule
    modality: must
    consequence: Theta values outside [0, 1] violate the mathematical proof that GPR/GNPR distances are valid metrics, producing
      distances outside the [0, 1] range and breaking downstream metric-dependent algorithms
    stage_ids:
    - correlation_analysis
  - id: finance-C-143
    when: When implementing optimal_transport_dependence function
    action: Require POT library >= 0.7.0 as specified in dependencies
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without the POT (Python Optimal Transport) library, optimal_transport_dependence cannot execute, breaking
      any pipeline that uses this method for copula-based codependence analysis
    stage_ids:
    - correlation_analysis
  - id: finance-C-144
    when: When using gnpr_distance with large n_bins values
    action: Account for exponential computational complexity where calculation time grows significantly with n_bins
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Large n_bins values cause optimal transport calculations to become computationally prohibitive, potentially
      causing timeouts or memory exhaustion in production pipelines
    stage_ids:
    - correlation_analysis
  - id: finance-C-145
    when: When using information-theoretic methods (information_variation, mutual_information)
    action: Verify sufficient sample size for reliable binning discretization
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient observations relative to bin count causes sparse binning, leading to unreliable mutual information
      estimates that corrupt portfolio risk calculations
    stage_ids:
    - correlation_analysis
  - id: finance-C-146
    when: When using gpr_distance for non-Gaussian heavy-tailed distributions
    action: Rely on gpr_distance as an accurate distance measure for heavy-tailed financial return data
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: GPR assumes Gaussian distributions and produces inaccurate distances for heavy-tailed financial returns,
      corrupting correlation matrices and leading to suboptimal portfolio allocations
    stage_ids:
    - correlation_analysis
  - id: finance-C-147
    when: When computing angular distance from correlation values
    action: Use angular distance (not raw correlation) as input for MST and PMFG network construction
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Raw correlation values do not satisfy metric conditions required for MST/PMFG, causing invalid network topology
      and incorrect asset clustering
    stage_ids:
    - correlation_analysis
  - id: finance-C-148
    when: When using distance_correlation for dependency detection
    action: Remember that distance_correlation captures both linear and non-linear dependencies unlike Pearson correlation
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using distance_correlation results interchangeably with Pearson correlation without understanding its broader
      detection scope leads to inflated dependence estimates and incorrect risk assessment
    stage_ids:
    - correlation_analysis
  - id: finance-C-149
    when: When presenting codependence analysis results to stakeholders
    action: Claim that backtest portfolio performance based on codependence analysis guarantees live trading results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as indicative of future live performance violates financial regulations and misleads
      stakeholders about expected returns
    stage_ids:
    - correlation_analysis
  - id: finance-C-150
    when: When using non-linear codependence methods (distance_correlation, mutual_info)
    action: Validate that non-linear methods detect dependencies not captured by linear correlation in your specific dataset
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Assuming non-linear methods always add value without validation may lead to detecting spurious dependencies
      in noise, corrupting portfolio construction with unnecessary diversification or concentrated positions
    stage_ids:
    - correlation_analysis
  - id: finance-C-151
    when: When assuming default theta=0.5 for GPR/GNPR is universally optimal
    action: Assume theta=0.5 is optimal for each use cases without considering the specific analysis goal
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Theta=0.5 balances distribution and dependence testing, but may not capture the specific relationship of
      interest, leading to suboptimal distance estimates for clustering or portfolio construction
    stage_ids:
    - correlation_analysis
  - id: finance-C-152
    when: When working with Output DataFrames from codependence functions
    action: Verify that output DataFrames have proper index/column alignment before using in downstream analysis
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Misaligned indices or columns in dependence/distance matrices cause incorrect pairwise calculations in clustering
      and network analysis, producing invalid asset groupings
    stage_ids:
    - correlation_analysis
  - id: finance-C-153
    when: When skipping input DataFrame validation checks
    action: Skip validating that the input DataFrame contains only numeric columns for codependence computation
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Non-numeric columns cause vectorized operations to fail or produce NaN values, corrupting the entire dependence
      matrix with uncaught errors
    stage_ids:
    - correlation_analysis
  - id: finance-C-154
    when: When using default n_bins for small sample sizes
    action: Accept default n_bins=50 without considering sample size effects on binning reliability
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Over-binning small samples produces sparse contingency tables, causing unreliable mutual information estimates
      that corrupt risk analysis and portfolio construction
    stage_ids:
    - correlation_analysis
  - id: finance-C-155
    when: When using angular distance instead of absolute_angular distance
    action: Assume angular distance preserves dependence direction without considering that it treats positive and negative
      correlations symmetrically
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Angular distance conflates positive and negative correlations, causing incorrect portfolio diversification
      when assets have negative correlations that provide hedging benefits
    stage_ids:
    - correlation_analysis
  - id: finance-C-160
    when: When creating network graphs from input matrices
    action: Preserve input asset/feature names as node identifiers to verify traceability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Network nodes without matching input names cause misattribution of risk signals to wrong assets, making portfolio
      construction and risk management decisions based on incorrect instrument identification
    stage_ids:
    - clustering_networks
  - id: finance-C-162
    when: When selecting distance metric for network construction
    action: 'Use only supported metrics: angular, squared_angular, or absolute_angular'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unsupported distance metrics produce non-metric distance matrices that violate triangle inequality requirements,
      causing incorrect hierarchical clustering and unreliable correlation network structures
    stage_ids:
    - clustering_networks
  - id: finance-C-163
    when: When selecting MST algorithm
    action: Prefer Kruskal's algorithm as the default MST construction method
    severity: medium
    kind: resource_boundary
    modality: should
    consequence: Non-Kruskal algorithms without proper configuration may produce suboptimal MSTs or require additional preprocessing,
      increasing computational overhead without benefit
    stage_ids:
    - clustering_networks
  - id: finance-C-164
    when: When ONC algorithm detects features with low silhouette scores
    action: Apply regression residual transformation to replace redundant features
    severity: high
    kind: domain_rule
    modality: must
    consequence: Features with low silhouette scores indicate multicollinearity where one feature is a linear combination
      of others, causing overfitting and inflated feature importance in ML models
    stage_ids:
    - clustering_networks
  - id: finance-C-165
    when: When clustering features for portfolio construction
    action: Use critical_threshold parameter to detect features requiring transformation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Features with silhouette scores below critical_threshold indicate problematic clustering that causes incorrect
      feature selection and leads to suboptimal portfolio diversification
    stage_ids:
    - clustering_networks
  - id: finance-C-166
    when: When determining optimal number of clusters via ONC
    action: Evaluate cluster quality using t-statistics of silhouette scores, not just count
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using fixed cluster count without silhouette evaluation produces suboptimal clustering that fails to capture
      natural data groupings, leading to poor feature groupings and incorrect risk attribution
    stage_ids:
    - clustering_networks
  - id: finance-C-167
    when: When calculating PMFG edge weights
    action: Use disparity measure to quantify edge significance for clique determination
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Edges without disparity weighting cannot be properly filtered, causing PMFG to include less significant correlations
      and lose the maximally filtered property essential for meaningful network analysis
    stage_ids:
    - clustering_networks
  - id: finance-C-168
    when: When converting correlation to distance matrix
    action: Apply angular distance transformation to convert correlation to proper metric
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct use of correlation values violates distance metric properties, causing hierarchical clustering to
      produce invalid ultrametric structures that misrepresent asset relationships
    stage_ids:
    - clustering_networks
  - id: finance-C-169
    when: When reconstructing hierarchical tree from MST
    action: Preserve ultrametric structure induced by MST for top-down tree reconstruction
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Breaking ultrametric structure destroys the hierarchical relationship between asset clusters, causing loss
      of multi-scale correlation information essential for regime-aware portfolio construction
    stage_ids:
    - clustering_networks
  - id: finance-C-170
    when: When presenting correlation network analysis results
    action: Claim that network structure guarantees live trading performance or alpha generation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting correlation networks as predictive tools overstates their capability; networks describe historical
      relationships that may not persist, violating regulatory standards and misleading investment decisions
    stage_ids:
    - clustering_networks
  - id: finance-C-171
    when: When using PMFG for portfolio construction
    action: Interpret edge weights as direct trading signals without additional validation
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: PMFG edges represent filtered correlation structure, not directional predictions; treating them as trading
      signals ignores transaction costs, regime changes, and liquidity constraints
    stage_ids:
    - clustering_networks
  - id: finance-C-173
    when: When combining features within a cluster
    action: Use minimum variance weighting scheme where weights sum to one
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-minimum-variance or non-normalized weights produce biased feature combinations that distort the original
      signal and lead to incorrect portfolio factor exposures
    stage_ids:
    - clustering_networks
  - id: finance-C-174
    when: When comparing MST and ALMST graphs
    action: Account for ALMST's disconnect threshold which may produce disconnected components
    severity: high
    kind: resource_boundary
    modality: must
    consequence: ALMST with disconnect threshold can produce isolated components; treating these as fully connected networks
      causes missing diversification analysis for disconnected asset groups
    stage_ids:
    - clustering_networks
  - id: finance-C-175
    when: When selecting linkage method for hierarchical clustering
    action: 'Use only supported methods: single, complete, average, weighted, centroid, median, or ward'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unsupported linkage methods cause scipy.cluster.hierarchy.linkage to raise exceptions, breaking the clustering
      pipeline and preventing feature grouping analysis
    stage_ids:
    - clustering_networks
  - id: finance-C-176
    when: When implementing PMFG clique generation
    action: Verify generated cliques form a valid planar graph structure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid cliques that violate planarity break the PMFG property, causing incorrect edge filtering and distorted
      correlation network visualization
    stage_ids:
    - clustering_networks
  - id: finance-C-178
    when: When implementing HCBM matrix generation with depth parameter
    action: Recursively assign correlation values at each depth level matching the depth parameter specification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Block structure does not match specified depth, causing incorrect hierarchical clustering representation
      in downstream analysis
    stage_ids:
    - data_generation
  - id: finance-C-183
    when: When generating time series with student-t distribution
    action: Provide valid degrees of freedom parameter (deg_free >= 1) for student-t distribution
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid degrees of freedom causes undefined behavior in multivariate_t_rvs sampling, producing NaN or infinite
      values
    stage_ids:
    - data_generation
  - id: finance-C-184
    when: When sampling time series using vine methods
    action: Use uniform beta distribution for partial correlations to verify valid correlation matrix output
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-uniform beta distribution produces invalid correlation matrices that violate mathematical constraints
    stage_ids:
    - data_generation
  - id: finance-C-185
    when: When requiring reproducible synthetic data generation
    action: Set random seed before calling generation functions to verify reproducibility
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Without fixed random seed, generated correlation matrices and time series vary between runs, preventing reproducible
      backtesting and simulation results
    stage_ids:
    - data_generation
  - id: finance-C-186
    when: When using HCBM matrix for time series generation
    action: Use time_series_from_dist function to convert correlation matrix to time series, not access sampling functions
      directly
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct access to sampling functions bypasses correlation matrix validation, producing mathematically invalid
      time series
    stage_ids:
    - data_generation
  - id: finance-C-187
    when: When validating synthetic correlation matrix generation
    action: 'Verify stylized facts: positive pairwise correlation shift, Marchenko-Pastur eigenvalues, Perron-Frobenius property,
      hierarchical structure'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Generated correlation matrices that lack financial stylized facts produce unrealistic backtest results that
      do not reflect real market behavior
    stage_ids:
    - data_generation
  - id: finance-C-188
    when: When using synthetic data for backtesting decisions
    action: Claim synthetic data results equal to expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Synthetic data is generated from statistical models and does not capture real market microstructure, liquidity
      effects, or regime changes that affect live trading
    stage_ids:
    - data_generation
  - id: finance-C-189
    when: When generating correlated random walks
    action: Verify rho_main + rho_corr <= 1 to leave valid proportion for distribution clusters
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid rho proportions cause negative variance components in generated time series, producing mathematically
      undefined results
    stage_ids:
    - data_generation
  - id: finance-C-190
    when: When configuring block bootstrap sampling
    action: Generate bootstrapped matrix larger than the original matrix
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Bootstrap sampling cannot generate more information than the original data, producing invalid bootstrapped
      matrices with undefined values
    stage_ids:
    - data_generation
  - id: finance-C-191
    when: When selecting distribution type for time series generation
    action: 'Use only supported distribution values: ''normal'' or ''student'' for dist parameter'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unsupported distribution types cause AttributeError or return invalid samples from incorrect sampling methods
    stage_ids:
    - data_generation
  - id: finance-C-192
    when: When generating HCBM matrices with permutation
    action: Use hierarchical clustering to arrange matrix to maximize sum of similarities between adjacent leaves after permutation
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Without proper reordering, permuted HCBM matrices lose their interpretable block structure, reducing their
      utility for sector-based stress testing
    stage_ids:
    - data_generation
  - id: finance-C-193
    when: When implementing SADF inner loop computation
    action: return supremum of ADF statistics ensuring non-negative output values
    severity: high
    kind: domain_rule
    modality: must
    consequence: SADF statistics represent supremum of potentially negative ADF values; returning negative values indicates
      implementation error in supremum calculation and breaks bubble detection logic
    stage_ids:
    - structural_breaks
  - id: finance-C-194
    when: When implementing SADF rolling window computation
    action: enforce min_length constraint preventing estimation on sequences shorter than minimum threshold
    severity: high
    kind: domain_rule
    modality: must
    consequence: ADF regression becomes unreliable for small samples; using sequences below min_length produces statistically
      insignificant statistics that can lead to false break detection signals
    stage_ids:
    - structural_breaks
  - id: finance-C-195
    when: When validating phi parameter for SMT penalization
    action: restrict phi coefficient to range [0, 1] inclusive
    severity: high
    kind: domain_rule
    modality: must
    consequence: Phi coefficient outside [0, 1] range causes incorrect ADF penalization formula, biasing bubble detection
      towards long-run or short-run bubbles inappropriately
    stage_ids:
    - structural_breaks
  - id: finance-C-196
    when: When implementing break point timestamp output
    action: verify break timestamps fall within valid window range defined by min_length constraints
    severity: high
    kind: domain_rule
    modality: must
    consequence: Break timestamps outside valid window range indicate look-ahead bias or index alignment errors, causing incorrect
      regime change identification in live trading systems
    stage_ids:
    - structural_breaks
  - id: finance-C-197
    when: When returning SADF statistics series
    action: align output series index to input series index
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Misaligned output index causes incorrect timestamp association with SADF values, breaking downstream regime
      detection and trading signal generation
    stage_ids:
    - structural_breaks
  - id: finance-C-198
    when: When validating model type parameter
    action: 'accept only documented model types: linear, quadratic, sm_poly_1, sm_poly_2, sm_exp, sm_power'
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unsupported model type causes regression specification error or undefined behavior in ADF fitting, producing
      NaN or infinite SADF statistics
    stage_ids:
    - structural_breaks
  - id: finance-C-199
    when: When implementing SADF multiprocessing parallelization
    action: use mp_pandas_obj with molecule index parameter for parallel computation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Without proper molecule-based parallelization, SADF computation becomes prohibitively slow for long time
      series, making real-time regime detection infeasible
    stage_ids:
    - structural_breaks
  - id: finance-C-200
    when: When applying phi penalization to ADF statistics
    action: use power-law scaling formula ADF / (sample_length ^ phi) for long-run bubble bias correction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect penalization formula fails to correct long-run bubble bias, causing the method to favor detection
      of long-run bubbles over short-run bubbles of equal strength
    stage_ids:
    - structural_breaks
  - id: finance-C-201
    when: When interpreting SADF statistics for bubble detection
    action: claim SADF as definitive bubble predictor without statistical significance testing
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting SADF values as guaranteed bubble signals without critical value comparison leads to false trading
      decisions; SADF only indicates explosive behavior potential requiring validation
    stage_ids:
    - structural_breaks
  - id: finance-C-202
    when: When using SADF output for trading signal generation
    action: treat SADF regime changes as guaranteed return direction predictors
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Structural break detection identifies regime changes but does not predict market direction; assuming break
      implies favorable move causes systematic trading losses
    stage_ids:
    - structural_breaks
  - id: finance-C-203
    when: When applying SADF to financial time series
    action: use price series with sufficient history for reliable ADF estimation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Short price histories produce unreliable ADF statistics with high variance, causing spurious break detection
      that leads to unnecessary trading actions and losses
    stage_ids:
    - structural_breaks
  - id: finance-C-204
    when: When implementing lag application for ADF regression
    action: apply lag operator to dataframe columns using _lag_df with proper index alignment
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Improper lag application breaks ADF regression specification, producing incorrect statistics that indicate
      false explosiveness or miss genuine bubbles
    stage_ids:
    - structural_breaks
  - id: finance-C-205
    when: When implementing Chow-Type Dickey-Fuller test
    action: use default min_length of 20 as minimum sample threshold for estimation
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Setting min_length below 20 produces unreliable Chow statistics that may indicate false structural breaks,
      causing premature or incorrect regime change signals
    stage_ids:
    - structural_breaks
  - id: finance-C-206
    when: When implementing CUSUM test for regime detection
    action: validate test_type parameter is either one_sided or two_sided
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Invalid test_type causes undefined CUSUM statistics computation, producing NaN values that break downstream
      regime detection pipeline
    stage_ids:
    - structural_breaks
  - id: finance-C-207
    when: When computing ADF beta estimates for regression
    action: return both beta coefficients and variance estimates from get_betas function
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing variance estimates breaks SADF statistic computation which requires beta variance for t-statistic
      calculation, producing incomplete or NaN SADF values
    stage_ids:
    - structural_breaks
  - id: finance-C-208
    when: When implementing data flow from data_ingestion to event_filtering stages
    action: verify input close prices are provided as pd.Series with DatetimeIndex for CUSUM and z-score filter functions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Filter functions cusum_filter and z_score_filter expect pd.Series input with DatetimeIndex; incorrect type
      causes TypeError or silent data misalignment
  - id: finance-C-211
    when: When implementing data flow from labeling to sample_weighting stages
    action: verify triple_barrier_events DataFrame contains t1 column with event endtimes matching close_series timestamps
      for uniqueness calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Sample weight computation via get_av_uniqueness_from_triple_barrier requires matching label_endtime and close_series;
      mismatch causes incorrect uniqueness values
  - id: finance-C-212
    when: When implementing data flow from labeling to model_training stages
    action: verify bin labels are binary (0,1) for meta-labeling or trinary (-1,0,1) for direct labeling with correct side
      information
    severity: high
    kind: domain_rule
    modality: must
    consequence: Classifier training expects specific label values; incorrect bin values cause model training failure or invalid
      predictions
  - id: finance-C-214
    when: When implementing data flow from data_ingestion to sample_weighting stages
    action: verify price_bars DataFrame contains the same close prices used for triple barrier event generation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Indicator matrix get_ind_matrix links price bars to label timestamps; using different price sources corrupts
      uniqueness calculation
  - id: finance-C-215
    when: When implementing data flow from data_ingestion to feature_engineering stages
    action: verify close series input to fractional differentiation has DatetimeIndex for proper alignment
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Fractional differentiation frac_diff_ffd requires datetime-indexed series; incorrect index causes shifted
      or misaligned features
  - id: finance-C-216
    when: When implementing data flow from feature_engineering to model_training stages
    action: verify feature DataFrame X has columns matching expected feature names for MDI/MDA importance calculations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Feature importance methods require feature_names alignment with DataFrame columns; mismatch causes incorrect
      importance attribution
  - id: finance-C-217
    when: When implementing data flow from feature_engineering to clustering_networks stages
    action: verify feature DataFrame has matching columns between clustering and original feature computation for grouped
      importance analysis
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Clustered feature importance requires feature names to match across modules; column mismatch causes KeyError
      or incorrect cluster assignment
  - id: finance-C-218
    when: When implementing data flow from model_training to bet_sizing stages
    action: verify prediction probabilities are provided as pd.Series indexed by event timestamps matching bet sizing requirements
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bet sizing bet_size_probability requires prob Series indexed by datetime; mismatched index causes incorrect
      position sizing
  - id: finance-C-219
    when: When implementing data flow from labeling to bet_sizing stages
    action: verify events_t1 and sides Series share identical DatetimeIndex for concurrent bet analysis
    severity: high
    kind: domain_rule
    modality: must
    consequence: Concurrent bet analysis functions require index alignment between t1 expiry times and bet sides; index mismatch
      causes incorrect concurrency calculations
  - id: finance-C-221
    when: When implementing data flow from data_ingestion to correlation_analysis stages
    action: verify multiple asset price series share aligned DatetimeIndex for codependence matrix computation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Codependence matrix get_dependence_matrix requires aligned time series across assets; index misalignment
      corrupts dependence calculations
  - id: finance-C-222
    when: When implementing data flow from correlation_analysis to clustering_networks stages
    action: verify distance matrix is square symmetric with asset names as row and column indices
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: MST/PMFG network construction requires symmetric distance matrix; incorrect format causes graph construction
      failure
  - id: finance-C-223
    when: When implementing data flow from clustering_networks to feature_engineering stages
    action: verify clustered_subsets format is list of lists with feature names matching original DataFrame columns
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Clustered feature importance requires specific list-of-lists format; incorrect structure causes KeyError
      or zero importance assignment
  - id: finance-C-232
    when: When creating imbalance bars or run bars
    action: Use expected_imbalance_window=10000 and exp_num_ticks_init=20000 as default parameters to verify bar convergence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Bars will not converge properly to expected statistical properties without correct imbalance window and initial
      tick count
  - id: finance-C-233
    when: When computing daily volatility for triple barrier scaling
    action: Use lookback=100 for exponentially weighted moving standard deviation to match the standard implementation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Triple barrier profit-taking and stop-loss levels will be miscalibrated, leading to incorrect risk-adjusted
      labels
  - id: finance-C-234
    when: When eliminating rare labels via drop_labels
    action: Use min_pct=0.05 as default threshold to remove observations occurring in less than 5% of cases
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Rare class imbalance will cause model training to overfit to majority class, degrading prediction accuracy
  - id: finance-C-235
    when: When using bet sizing functions with side predictions
    action: 'Encode side predictions as: negative values for short positions, positive values for long positions, None for
      no position'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bet sizing calculations will misinterpret position direction, causing incorrect position sizing and financial
      losses
  - id: finance-C-236
    when: When processing large tick data files
    action: Use batch_size=2e7 default to balance memory usage with processing performance across each bar constructors
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Insufficient batch size will cause out-of-memory errors; excessive batch size will degrade performance without
      benefit
  - id: finance-C-237
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live trading returns — backtesting ignores market impact, financing
      costs, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-238
    when: When presenting simulated or dry-run trading results
    action: Present simulated wallet or paper trading results as proof of live execution capability or real market performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will believe the system has proven live execution capability when only simulated results exist, leading
      to incorrect confidence in the system's production readiness
  - id: finance-C-240
    when: When describing this library's capabilities to stakeholders
    action: Claim this library is suitable for low-latency execution environments — the library uses batch processing with
      no latency guarantees
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will deploy the library in HFT or latency-sensitive applications where batch processing delays cause
      missed opportunities and financial losses
  - id: finance-C-241
    when: When describing this library's capabilities to stakeholders
    action: Claim this library provides pre-trained models or trading predictions — the library provides algorithms only
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users will expect working prediction models without understanding they must train models on their own data,
      leading to failed deployments
  - id: finance-C-242
    when: When describing this library's capabilities to stakeholders
    action: Claim this library is suitable for non-financial time series analysis — each implementations assume financial
      market data conventions
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users will apply financial ML techniques to non-financial domains where assumptions like OHLCV format, triple
      barriers, and market microstructure do not apply
  - id: finance-C-244
    when: When implementing cross-validation with CombinatorialPurgedKFold
    action: Use n_test_splits=2 to generate sufficient test coverage without exponentially increasing computational cost;
      changing this value alters backtest robustness evaluation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting n_test_splits > 2 exponentially increases CV iterations and computational cost; setting n_test_splits=1
      eliminates combinatorial coverage, reducing backtest robustness validation
    derived_from_bd_id: BD-008
  - id: finance-C-245
    when: When implementing meta-labeling with side_prediction parameter
    action: Transform get_bins output from tri-class {-1,0,1} to binary {0,1} when side_prediction is non-empty; return original
      tri-class values when side_prediction is absent
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning tri-class labels when side_prediction exists causes meta-classifier to receive 3 classes instead
      of 2, breaking probability calibration and primary signal quality classification
    derived_from_bd_id: BD-080
  - id: finance-C-246
    when: When initializing sequential bootstrapping for bagging
    action: Compute samples_info_sets before passing to SequentialBootstrapBagging.__init__; populating samples_info_sets
      after initialization causes undefined temporal dependency behavior
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Initializing sequential bootstrapping without samples_info_sets causes temporal leakage constraints to be
      violated, leading to overfit bootstrap samples that contain overlapping observations
    derived_from_bd_id: BD-077
  - id: finance-C-247
    when: When selecting bootstrap method for financial time series with autocorrelation or heteroskedasticity
    action: Use block bootstrap instead of row bootstrap for autocorrelated financial time series; row bootstrap underestimates
      variance by ignoring local dependency structure
    severity: high
    kind: domain_rule
    modality: must
    consequence: Row bootstrapping for autocorrelated financial time series produces variance estimates that systematically
      underestimate true uncertainty, causing overconfident statistical inference and potentially invalid strategy conclusions
    derived_from_bd_id: BD-097
  - id: finance-C-248
    when: When implementing probability-based bet sizing
    action: Compute samples_info_sets before calling bet_size_probability; the function requires temporal boundaries to compute
      probability distributions over active signal windows
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calling bet_size_probability without samples_info_sets causes undefined behavior since the function relies
      on event expiration boundaries to compute probability distributions correctly
    derived_from_bd_id: BD-086
  - id: finance-C-250
    when: When implementing or refactoring the meta-labeling pipeline in get_bins function
    action: Determine the pipeline branch (meta-labeling vs standard) before downstream components consume bin labels — verify
      side_prediction availability check executes prior to any bin transformation logic
    severity: high
    kind: domain_rule
    modality: must
    consequence: If AI restructures the pipeline or changes execution order during refactoring, downstream components may
      receive incorrect bin labels when side_prediction is unavailable, causing silent failures in meta-labeling classification
      results
    derived_from_bd_id: BD-081
  - id: finance-C-251
    when: When implementing bet sizing strategy selection in position management
    action: Select bet sizing strategy ('sigmoid' or 'power') at initialization time only — do not attempt to switch strategies
      after position establishment without full position rebalancing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Switching bet sizing strategies mid-position creates inconsistent risk models between historical and live
      states, causing backtest-live divergence where live positions receive different bet sizes than backtest predicted
    derived_from_bd_id: BD-085
  - id: finance-C-252
    when: When using the framework's default exp_num_ticks_init=20000 parameter for imbalance bar creation
    action: Verify that exp_num_ticks_init=20000 matches the expected tick frequency of your specific dataset — adjust for
      higher-frequency data (microstructure) or lower-frequency data to prevent excessive bar fragmentation during warm-up
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default 20000 ticks with high-frequency data causes excessive bar fragmentation during warm-up, while
      low-frequency data may experience premature bar closure, distorting bar statistics and affecting strategy signals
    derived_from_bd_id: BD-003
  - id: finance-C-253
    when: When computing probabilistic Sharpe ratio for strategy evaluation
    action: Assume kurtosis=3 (normal distribution) for probabilistic Sharpe ratio calculation when evaluating strategies
      with fat-tailed returns — use empirical kurtosis from actual return samples
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Probabilistic Sharpe ratio using kurtosis=3 underestimates tail risk for leptokurtic strategies, systematically
      overstating statistical significance and leading to premature deployment of strategies that will underperform in live
      trading
    derived_from_bd_id: BD-090
  - id: finance-C-254
    when: When implementing fractional differentiation (ARFIMA) for financial time series stationarity
    action: Verify the differencing parameter d remains within the validated range [0.1, 0.9] and provide at least 100 observations
      for FFD method convergence
    severity: high
    kind: domain_rule
    modality: must
    consequence: Values outside 0.1-0.9 produce numerically unstable FFD weights that corrupt downstream feature engineering,
      leading to spurious stationarity and invalid statistical inference on financial time series
    derived_from_bd_id: BD-036
  - id: finance-C-255
    when: When evaluating Sharpe ratio for trading strategies with non-normal return distributions
    action: Apply Campbell-Liu-Harvey Haircut Sharpe Ratio adjustment for strategies exhibiting skewness or kurtosis deviation
      from normal distribution, and use multiple testing correction (Holm or BHY methods) when evaluating multiple strategy
      variants to avoid selection bias
    severity: high
    kind: domain_rule
    modality: must
    consequence: Standard Sharpe ratio underestimates true risk in the presence of skewness and kurtosis common in trading
      strategies, leading to overconfident strategy selection and potential capital deployment in strategies with inferior
      risk-adjusted returns
    derived_from_bd_id: BD-037
  - id: finance-C-256
    when: When using PurgedKFold cross-validation with the default pct_embargo=0.0 setting
    action: Explicitly set pct_embargo > 0 when features contain information from temporally adjacent observations, as zero
      embargo allows overlapping information to appear in both training and test sets
    severity: high
    kind: domain_rule
    modality: must
    consequence: Zero embargo combined with small pct_purge creates information leakage windows where test-period observations
      influence training features, causing cross-validation metrics to overestimate live trading performance
    derived_from_bd_id: BD-006
  - id: finance-C-257
    when: When implementing codependence matrix normalization for correlation-based analysis
    action: Use Euclidean distance (L2 norm, r_val=2) for matrix normalization in correlation space, as this provides intuitive
      geometric interpretation for clustering and hierarchical correlation-based portfolio construction
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-Euclidean distance metrics in correlation space alter the geometric interpretation of similarity between
      assets, potentially causing misaligned clusters and suboptimal portfolio construction
    derived_from_bd_id: BD-035
  - id: finance-C-258
    when: When applying hierarchical clustering to correlation matrices for portfolio construction
    action: Use Ward linkage with Euclidean distance metric for correlation-based clustering, verify minimum 5 assets for
      meaningful dendrogram interpretation, and apply domain knowledge for dendrogram cutoff selection
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Single linkage produces chaining effects, complete linkage creates imbalanced clusters, and non-Ward methods
      minimize within-cluster variance suboptimally, leading to poor portfolio groupings that fail to capture market regime
      structures
    derived_from_bd_id: BD-044
  - id: finance-C-259
    when: When using PurgedKFold with pct_purge configured for cross-validation
    action: Do not rely solely on PurgedKFold's purge mechanism for temporal leakage protection — explicitly set non-zero
      pct_embargo when features contain information from temporally adjacent observations
    severity: high
    kind: domain_rule
    modality: must
    consequence: The pct_embargo=0.0 default undermines PurgedKFold protection by allowing temporally adjacent observations
      with overlapping information to appear in both training and test sets, causing inflated validation metrics that do not
      reflect live trading performance
    derived_from_bd_id: BD-089
  - id: finance-C-260
    when: When implementing sequential bootstrapping for bagging ensembles
    action: Verify that samples_info_sets is pre-computed with proper temporal constraints before running sequential bootstrapping,
      and verify non-zero embargo settings are applied to prevent temporal leakage from contaminating bootstrap samples
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Sequential bootstrapping silently depends on samples_info_sets temporal constraints that may not be properly
      enforced with zero embargo default, causing bagging ensembles to violate their own temporal integrity guarantees and
      produce overconfident predictions
    derived_from_bd_id: BD-091
  - id: finance-C-261
    when: When computing bet sizing using functions that depend on samples_info_sets
    action: Use bet sizing functions with contaminated samples_info_sets (computed with zero embargo) — position sizes computed
      from temporally contaminated probability distributions will be systematically biased
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Bet sizing depends on samples_info_sets computed with proper embargo/purge settings; when zero embargo default
      is used, position sizing incorporates information from temporally adjacent events, and reserve-based sizing amplifies
      this by using mixture parameters estimated from contaminated data
    derived_from_bd_id: BD-092
  - id: finance-C-262
    when: When using probabilistic Sharpe ratio for strategy evaluation with small sample sizes
    action: Verify sample adequacy (minimum 1000 observations) before relying on probabilistic Sharpe estimates, and validate
      that kurtosis=3 assumption matches actual return distribution characteristics — if returns exhibit non-normal kurtosis,
      do not apply the probabilistic Sharpe adjustment without correction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Undersized backtests with normal-kurtosis assumption produce overconfident Sharpe ratios, causing inflated
      confidence in strategy edge; these biased estimates feed into bet sizing calibration with cal_bet_size=0.95, resulting
      in aggressively oversized positions based on false confidence in strategy performance
    derived_from_bd_id: BD-095
  - id: finance-C-263
    when: When implementing cross-validation logic for backtesting strategies with variable holding periods
    action: Use Combinatorial Purged Cross-Validation (CPCV) with at least 3 non-overlapping test paths, ensuring n_test_bars
      divides evenly for combinatorial splitting and proper purge/emgobo zones
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using single-path walk-forward validation causes higher variance in performance estimates, leading to strategy
      selection based on lucky or unlucky splits and potentially deploying underperforming strategies
    derived_from_bd_id: BD-042
  - id: finance-C-264
    when: When computing correlation-based distance metrics for clustering or optimization algorithms
    action: Use angular distance for metric-satisfying distance calculations; verify each input vectors are unit-normalized
      before computation; reject zero vectors as invalid inputs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using raw correlation or 1-correlation as distance violates metric axioms (identity and symmetry), causing
      incorrect clustering results and optimization convergence to wrong solutions
    derived_from_bd_id: BD-046
  - id: finance-C-265
    when: When analyzing dependence between financial variables that may have non-linear relationships
    action: Use distance correlation for dependence detection; verify sample size n>=50 for unbiased estimation; avoid Pearson
      correlation which only detects linear dependencies
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Pearson correlation for non-linear dependencies (e.g., option payoff structures) produces zero correlation
      for strongly dependent variables, causing wrong variable selection and strategy signals
    derived_from_bd_id: BD-047
  - id: finance-C-266
    when: When comparing return distributions where tail behavior affects risk calculations
    action: Use GNPR distance with Optimal Transport for distribution comparison; apply rank transform to achieve uniform
      marginals before computation; verify ot library is installed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using KL divergence without rank normalization produces asymmetric and undefined results for non-overlapping
      supports, causing incorrect distribution comparisons and flawed risk estimates
    derived_from_bd_id: BD-049
  - id: finance-C-267
    when: When using the framework's default require_proba=True for cross-validation scoring functions
    action: Verify that classifiers provide calibrated probability estimates; if switching to require_proba=False, explicitly
      acknowledge the loss of probability-based position sizing capability
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Defaulting to hard class labels without probability estimates breaks downstream position sizing and risk
      management calculations that depend on calibrated probabilities
    derived_from_bd_id: BD-010
  - id: finance-C-268
    when: When calculating annualized Sharpe ratio using entries_per_year=252
    action: Verify that 252 trading days matches your instrument's actual trading frequency; for instruments with different
      schedules (crypto 365, forex 252-260), adjust accordingly to avoid misaligned annualization
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 252 for non-A-share instruments misaligns annualization with actual trading opportunities, causing
      Sharpe ratios to be systematically overestimated or underestimated
    derived_from_bd_id: BD-013
  - id: finance-C-269
    when: When implementing parallel molecule processing with mp_pandas_obj
    action: Verify each molecule partition completes fully and returns before any concat operation; never stitch partial molecules;
      validate completeness of each partitions before aggregation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Premature aggregation of partial molecules produces corrupted output data with missing values and incorrect
      ordering, causing downstream analysis to fail or produce invalid results
    derived_from_bd_id: BD-088
  - id: finance-C-270
    when: When implementing entropy-based dependence analysis using mutual information
    action: Use optimal binning with sufficient samples per bin (minimum 5 per bin recommended) to prevent over/under-estimation
      from arbitrary discretization choices
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fixed bin counts without optimal selection cause either loss of information with too few bins or noise introduction
      with too many bins, leading to unreliable dependency measurements between variables
    derived_from_bd_id: BD-050
  - id: finance-C-271
    when: When implementing dynamic bet sizing with sigmoid function
    action: Calibrate the sigmoid parameters (inflection point via cal_bet_size, slope via cal_divergence) to match the signal
      distribution, and enforce bounded range [-1, 1] to prevent extreme positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Uncalibrated sigmoid parameters cause either excessive position sizing leading to large losses during signal
      reversals or overly conservative sizing missing profit opportunities
    derived_from_bd_id: BD-056
  - id: finance-C-272
    when: When constructing hierarchical correlation graphs using Minimum Spanning Tree
    action: Use Average Linkage for MST construction to balance edge contributions, and verify the correlation matrix is positive
      semi-definite with complete distance matrix
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using alternative linkage methods (single or complete) produces either chaining artifacts or overly compact
      structures, distorting correlation network visualization and community detection results
    derived_from_bd_id: BD-058
  - id: finance-C-273
    when: When bootstrapping time series data for sampling variability estimation
    action: Preserve row integrity during bootstrapping to maintain temporal structure and autocorrelation within observations,
      using row-level sampling with replacement
    severity: high
    kind: domain_rule
    modality: must
    consequence: Shuffling observations during bootstrap destroys temporal dependencies, causing look-ahead bias and invalid
      statistical inference for time series strategies
    derived_from_bd_id: BD-063
  - id: finance-C-276
    when: When building multi-currency or cross-instrument portfolios in backtesting
    action: Assume the framework annotates currency, unit denomination, or settlement time — the codebase performs no currency
      or unit annotation, and day count conventions and settlement times are not tracked
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Multi-currency portfolio valuations produce incorrect results because currency conversions and unit normalization
      are not handled, leading to miscalculated portfolio values and incorrect risk metrics
    derived_from_bd_id: BD-101
  - id: finance-C-277
    when: When initializing instruments in the backtesting framework
    action: Provide explicit currency codes, unit denominations, day count conventions, and settlement time specifications
      for each instrument — especially for fixed income, derivatives, and multi-currency instruments
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without explicit financial metadata, bond interest accrual calculations, FX conversions, and derivatives
      pricing produce systematically incorrect results
    derived_from_bd_id: BD-101
  - id: finance-C-278
    when: When running backtesting experiments or evaluating strategy performance
    action: Assume backtest results are immutable or that parameter values remain traceable — the framework contains no mechanism
      to track parameter changes or verify result immutability across runs
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results can be silently modified without detection, causing reproducibility failures where different
      runs produce inconsistent results for the same strategy parameters
    derived_from_bd_id: BD-102
  - id: finance-C-279
    when: When setting up experiment tracking for strategy development
    action: Implement an immutable audit log using content-addressable storage or append-only databases to capture every parameter
      modification, execution timestamp, and result hash — enable full reproducibility verification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without immutable audit trails, performance changes cannot be attributed to specific parameter modifications,
      and regulatory compliance requirements for strategy auditability cannot be met
    derived_from_bd_id: BD-102
  - id: finance-C-280
    when: When configuring the feature generator for tick data processing
    action: Assume batch_size can be set arbitrarily without memory constraints — the 20M-row batch requires memory proportional
      to 20M trades and will cause out-of-memory errors on memory-constrained systems
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Processing large tick datasets with fixed batch_size=20000000 causes memory exhaustion on systems with insufficient
      RAM, resulting in job failures during feature engineering
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-281
    when: When configuring batch processing for feature generation
    action: Implement dynamic batch sizing based on available system memory — calculate batch_size as min(20000000, memory_bytes
      * 0.8 / bytes_per_row) to verify processing fits within memory constraints
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fixed batch_size causes out-of-memory failures when processing tick data for assets with high event density
      or on memory-constrained hardware, preventing feature engineering completion
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-282
    when: When using ALMST for correlation-based portfolio analysis
    action: Pass correlation matrices directly to the ALMST function — the implementation only supports distance input matrices
      and will produce mathematically incorrect minimum spanning trees when correlation values are treated as distances
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Passing correlation matrices without conversion produces invalid clustering trees because correlation and
      distance are inverse relationships — high correlation maps to low distance, not high distance
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-283
    when: When computing minimum spanning trees for portfolio correlation matrices
    action: Convert correlation matrix to distance matrix before calling ALMST using dist = sqrt(2 * (1 - corr)) — apply this
      transformation to each correlation inputs to verify mathematically valid tree construction
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without correlation-to-distance conversion, ALMST produces inverted clustering results where highly correlated
      assets are placed far apart in the tree, corrupting portfolio diversification analysis
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-284
    when: When configuring sequential bootstrapping bagging for financial prediction models
    action: Change max_samples from 1.0 to a lower value — the ensemble relies on sequential bootstrapping ordering for diversity,
      not on subsampling observations; reducing max_samples eliminates the bootstrap ordering mechanism
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Setting max_samples < 1.0 removes sequential bootstrapping diversity because base learners see identical
      sample sets with only ordering differences, reducing ensemble effectiveness
    derived_from_bd_id: BD-024
  - id: finance-C-285
    when: When configuring sequential bootstrapping bagging with financial features
    action: Maintain max_features=1.0 to verify each base learner sees complete feature sets — this preserves inter-feature
      correlations that carry predictive information critical for financial prediction
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Subsampling features breaks inter-feature correlation structure that carries predictive information, causing
      base learners to miss relationships that financial features encode about market dynamics
    derived_from_bd_id: BD-025
  - id: finance-C-286
    when: When configuring the sequentially bootstrapped base bagging ensemble
    action: Maintain bootstrap_features=False to preserve complete feature availability per base learner — this complements
      max_features=1.0 and ensures sequential bootstrapping handles ensemble diversity
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Enabling bootstrap_features with max_features=1.0 creates redundancy while changing either parameter disrupts
      the ensemble diversity mechanism designed for financial time series
    derived_from_bd_id: BD-026
  - id: finance-C-287
    when: When applying fractional differentiation to financial time series using expanding window method
    action: Use thresh=0.01 for the expanding window fracdiff method — this threshold balances stationarity achievement against
      information retention for financial series
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-0.01 thresholds with expanding window fracdiff either loses critical autocorrelation structure
      (thresh < 0.01) or fails to achieve weak stationarity (thresh > 0.01), degrading feature predictive power
    derived_from_bd_id: BD-027
  - id: finance-C-288
    when: When applying fractional differentiation using fixed window FFD method
    action: Use thresh=1e-5 for the fixed window fracdiff method — this micro-precision threshold ensures exact filter design
      where tiny coefficients do not accumulate into significant errors over long series
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using looser thresholds with FFD causes filter instability where accumulated tiny coefficients produce unreliable
      fractional differencing, corrupting the stationarity of the transformed series
    derived_from_bd_id: BD-028
  - id: finance-C-289
    when: When implementing feature grouping for dimensionality reduction in clustering_networks
    action: Use ONC (Optimal Number of Clusters) algorithm for feature grouping — ONC provides principled determination of
      optimal cluster count based on correlation structure rather than arbitrary thresholds; alternative methods like PCA
      lose interpretability
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing ONC with arbitrary K-means or PCA reduces feature grouping quality, causing information loss and
      degraded downstream ML model performance due to uninterpretable or suboptimal feature clusters
    derived_from_bd_id: BD-043
  - id: finance-C-290
    when: When implementing cluster transformation to handle multicollinearity in clustering_networks
    action: Use OLS regression for cluster transformation — OLS combines correlated features into orthogonal factors while
      maintaining interpretability through regression weights, essential for linear ML models suffering from multicollinearity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using PCA for cluster transformation loses feature semantics and interpretability, making it impossible to
      trace transformed features back to original domain-specific meanings required for financial analysis
    derived_from_bd_id: BD-045
  - id: finance-C-291
    when: When measuring dependence structure between financial variables in mlfinlab.dependence
    action: Use optimal copula transport for measuring dependence against target copulas — provides geometric distance between
      empirical copula and reference families (Gaussian, Clayton, Gumbel) enabling data-driven copula selection without parametric
      fitting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using maximum likelihood fitting or AIC/BIC selection for copula selection misses tail dependence behavior
      critical for risk modeling, leading to systematic underestimation of co-crash probabilities in portfolios
    derived_from_bd_id: BD-051
  - id: finance-C-292
    when: When measuring portfolio return concentration in mlfinlab.statistics
    action: Use Herfindahl-Hirschman Index (HHI) for return concentration measurement — HHI provides normalized concentration
      measure (0 to 1 scale) for portfolio returns indicating diversification quality and strategy capacity constraints; standard
      deviation alone misses concentration in return sign or timing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple position count or return variance for concentration measurement misses actual return concentration
      structure, leading to incorrect diversification assessment and over-concentrated portfolios
    derived_from_bd_id: BD-053
  - id: finance-C-293
    when: When calculating risk-adjusted performance metrics for skewed strategies in mlfinlab.statistics
    action: Use probabilistic Sharpe ratio accounting for skewness and kurtosis — provides probability that observed Sharpe
      exceeds threshold rather than point estimate, critical for skewed strategies where standard Sharpe is misleading
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using standard Sharpe ratio for skewed strategies misrepresents risk-adjusted performance by ignoring tail
      risk and serial correlation, leading to incorrect strategy selection and allocation decisions
    derived_from_bd_id: BD-054
  - id: finance-C-294
    when: When estimating holding periods from trade-level data in mlfinlab.statistics
    action: Use weighted average entry time algorithm for holding period estimation — accounts for position size at each entry
      providing more accurate holding period than simple time-between-trades, essential for strategies with variable position
      sizing
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using simple average holding period ignores position size weighting, misrepresenting actual capital commitment
      and risk exposure for strategies with variable position sizing
    derived_from_bd_id: BD-055
  - id: finance-C-295
    when: When implementing reserve-based bet sizing in bet_sizing
    action: Use EF3M mixture model with sigmoid for reserve-based bet sizing — allocates capital reserves inversely to predicted
      adverse selection risk estimated via EF3M mixture parameters, providing sophisticated sizing that accounts for uncertainty
      regime
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fixed percentage or Kelly sizing for bet sizing ignores adverse selection risk and uncertainty regime
      changes, leading to over-sizing in high-risk periods and potential catastrophic losses
    derived_from_bd_id: BD-057
  - id: finance-C-296
    when: When implementing similarity measures for clustering or matching in mlfinlab.regression
    action: Use Mahalanobis-like similarity based on Fisher Information Matrix — accounts for correlation structure and parameter
      uncertainty providing scale-invariant similarity measure, essential when features are correlated and uncertainty varies
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using Euclidean or correlation distance ignores feature correlation structure and parameter uncertainty,
      leading to incorrect similarity assessments in clustered financial data with heterogeneous uncertainty
    derived_from_bd_id: BD-060
  - id: finance-C-297
    when: When implementing pattern recognition for market state classification in mlfinlab.pattern_recognition
    action: Use Matrix Flag template matching for bull/bear pattern recognition — captures multi-dimensional price-volume
      configurations distinguishing market states beyond single-indicator approaches, providing interpretable classification
      without black-box ML
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using single indicator rules or deep learning for pattern recognition reduces robustness or interpretability,
      leading to inconsistent market state classification or unexplainable trading decisions
    derived_from_bd_id: BD-061
  - id: finance-C-298
    when: When implementing tail set classification for event studies or tail risk management
    action: 'Verify volatility-adjusted return classification assumptions: verify i.i.d. returns within the volatility window,
      and calibrate tail threshold to match the target volatility regime rather than using fixed defaults'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without verifying volatility-adjusted return assumptions, high-volatility periods will be misclassified as
      tail events, causing event studies to produce false signals and tail risk models to overestimate or underestimate exposure
      during volatile markets
    derived_from_bd_id: BD-062
  - id: finance-C-299
    when: When generating structured correlation matrices using HCBM for backtesting or stress testing
    action: 'Verify HCBM preconditions before use: verify block structure is correctly pre-specified based on sector or factor
      groupings, validate that intra-block correlations are positive semi-definite, and confirm that block assignments remain
      stationary during the analysis period'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using HCBM without validating block structure assumptions produces invalid correlation matrices that distort
      portfolio optimization and stress test results, leading to under-diversified portfolios with hidden concentration risk
    derived_from_bd_id: BD-066
  - id: finance-C-300
    when: When using CorrGAN for sampling correlation matrices in backtesting
    action: 'Verify CorrGAN preconditions: verify sufficient training data to prevent mode collapse (minimum recommended:
      1000 historical correlation matrices), and validate that nearest correlation projection is applied to each generated
      samples to guarantee positive semi-definiteness'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using CorrGAN with insufficient training data causes mode collapse, producing correlation matrices that misrepresent
      real market structures and lead to systematic errors in portfolio VaR and risk attribution calculations
    derived_from_bd_id: BD-067
  - id: finance-C-301
    when: When interpreting ML model predictions using partial dependence-based fingerprinting
    action: 'Verify partial dependence assumptions: verify feature independence when marginalizing, account for computational
      cost scaling as O(n × p), and use subgroup-specific PD rather than global PD when data exhibits heterogeneity across
      market regimes or asset classes'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Partial dependence fingerprinting assumes feature independence which is violated in correlated feature sets,
      producing misleading feature importance rankings that cause misallocated risk management resources and failed regulatory
      explanations
    derived_from_bd_id: BD-068
  - id: finance-C-303
    when: When configuring imbalance bar generation parameters (expected_imbalance_window and exp_num_ticks_init)
    action: 'Maintain the 2:1 ratio constraint: expected_imbalance_window must be at least half of exp_num_ticks_init (window
      >= exp_num_ticks_init / 2) to prevent premature threshold triggering during warmup period'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting expected_imbalance_window below half of exp_num_ticks_init causes premature threshold triggering
      during warmup, resulting in bars that do not reflect true information imbalance and distorting subsequent feature calculations
    derived_from_bd_id: BD-076
  - id: finance-C-304
    when: When implementing multi-asset position attribution with time decay weighting
    action: Use decay=0.5 for multi-asset stacked attribution, not decay=1 from single-asset mode — the different decay rates
      reflect that portfolio-level risk contribution decay is faster than individual position decay; substituting single-asset
      decay overestimates historical multi-asset contributions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using decay=1 (single-asset default) in multi-asset attribution retains stale multi-asset correlations, overestimating
      historical risk contributions and causing misallocation of risk budget across asset classes
    derived_from_bd_id: BD-082
  - id: finance-C-305
    when: When implementing history-weighted regression in the backtesting pipeline
    action: Use Fisher Information Matrix-weighted regression to downweight observations from unstable periods where parameter
      estimates are less reliable; verify the covariance matrix is invertible before computing Fisher information
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using standard OLS or ad-hoc exponential weighting ignores parameter uncertainty, leading to overweighted
      unstable periods and biased parameter estimates that degrade out-of-sample performance in live trading
    derived_from_bd_id: BD-059
  - id: finance-C-306
    when: When implementing correlation matrix verification in data validation logic
    action: Compute Perron-Frobenius eigenvector to identify the dominant eigenvalue and its corresponding eigenvector; verify
      the dominant eigenvalue exceeds 1 for correlated matrices; verify the matrix is positive definite
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without Perron-Frobenius verification, correlation matrix defects go undetected, potentially causing numerical
      instability in downstream calculations and incorrect covariance estimates that corrupt risk and portfolio optimization
      results
    derived_from_bd_id: BD-069
  - id: finance-C-307
    when: When implementing risk statistics calculation for strategy evaluation and investor reporting
    action: Define drawdown as the difference between running maximum and current value; measure time-under-water as periods
      between peak and recovery; compute maximum drawdown as the worst-case point-in-time loss from running maximum
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect drawdown calculation produces misleading risk reports, causing investors to underestimate downside
      exposure and make poor allocation decisions based on understated historical loss metrics
    derived_from_bd_id: BD-072
  - id: finance-C-308
    when: When using meta-labeling pipeline or calling get_bins API for downstream classification
    action: Verify that side_prediction is explicitly provided before meta-labeling; validate that downstream classifiers
      receive consistent label schema {0,1} rather than tri-class {-1,0,1}; add runtime validation to confirm label type matches
      downstream expectations
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Downstream classifiers silently receiving tri-class labels from {-1,0,1} instead of expected {0,1} binary
      labels causes classification failures, misaligned predictions, and corrupted backtest results that appear valid without
      raising errors
    derived_from_bd_id: BD-093
  - id: finance-C-309
    when: When configuring ML pipeline components for backtesting (PurgedKFold, sequential bootstrapping, bet sizing, reserve
      calculations)
    action: Explicitly configure embargo parameters for each pipeline stage; validate samples_info_sets are properly set before
      sequential bootstrapping; verify bet sizing and reserve calculations use leak-free probability estimates by checking
      performance on held-out validation sets
    severity: high
    kind: domain_rule
    modality: must
    consequence: Information leakage from zero-embargo default compounds through each pipeline stage, causing overfitted probability
      estimates and overstated backtest returns that fail to replicate in live trading due to look-ahead bias accumulating
      across PurgedKFold splits, sequential bootstrapping, and bet sizing
    derived_from_bd_id: BD-094
  - id: finance-C-311
    when: When implementing the correlation analysis pipeline combining fracdiff, distance correlation, and hierarchical clustering
    action: Run stationarity test (e.g., ADF test with p-value < 0.05) before distance correlation computation; if stationarity
      fails, apply additional fractional differentiation with adjusted d-parameter
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without stationarity validation between pipeline stages, non-stationary data produces unreliable distance
      correlation values that corrupt hierarchical clustering structures propagating through portfolio construction
    derived_from_bd_id: BD-096
  - id: finance-C-312
    when: When validating the complete correlation analysis pipeline for portfolio construction
    action: 'Verify each three components meet their requirements: fracdiff produces stationarity, distance correlation inputs
      are properly characterized for non-linear dependence, and correlation clustering receives only stationary inputs'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The interaction effect between BD-036, BD-047, and BD-044 creates a fragile pipeline where any single component
      failure cascades through subsequent stages, corrupting portfolio construction with unreliable hierarchical structures
    derived_from_bd_id: BD-096
  - id: finance-C-313
    when: When tuning the d-parameter for fractional differentiation in the correlation analysis pipeline
    action: Use a grid search or validation approach to find the optimal d that achieves stationarity without excessive memory
      loss; avoid both under-differencing (non-stationarity) and over-differencing (excessive memory loss)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect d-parameter selection either leaves non-stationarity corrupting correlation analysis or strips
      too much memory reducing predictive signal, leading to poor portfolio construction decisions based on unreliable structures
    derived_from_bd_id: BD-096
  - id: finance-C-314
    when: When implementing Gaussian mixture model fitting for return distribution modeling
    action: Use EF3M (Exact Fit of First 3 Moments) for 2-Gaussian mixtures to leverage closed-form solutions that avoid iterative
      optimization convergence issues; do not replace with EM algorithm or other iterative methods without explicit validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Replacing EF3M with EM algorithm or other iterative methods introduces slower convergence, potential local
      minima, and numeric instability that corrupts return distribution modeling and regime detection for bimodal strategies
    derived_from_bd_id: BD-039
  - id: finance-C-315
    when: When using EF3M for mixture model fitting
    action: Apply EF3M only to 2-component Gaussian mixtures with discriminant validity (means sufficiently separated); do
      not use for mixtures with more than 2 components or highly overlapping distributions without separate validation
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: EF3M is designed for exactly 2 components and assumes discriminant validity; applying to multi-component
      or overlapping mixtures produces undefined or incorrect parameter estimates that corrupt regime detection
    derived_from_bd_id: BD-039
  - id: finance-C-317
    when: When configuring PurgedKFold for financial time series backtesting
    action: Set purge gap to exceed the maximum holding period plus transaction delay; numBars embargo parameter must be at
      least 1 to prevent information leakage through overlapping observation windows
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Insufficient purge gap allows partial information leakage through overlapping observation windows, undermining
      the purpose of purged cross-validation and producing over-optimistic backtest results
    derived_from_bd_id: BD-041
  - id: finance-C-318
    when: When configuring cross-validation folds for financial time series strategy evaluation
    action: Consider increasing n_splits beyond the default of 3 when sufficient data is available (typically 5-10 splits)
      to reduce variance in performance estimates; verify sample size justifies the split count
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using n_splits=3 with sufficient data produces high-variance performance estimates, potentially accepting
      strategies with lucky test sets or rejecting strategies with unlucky test sets, leading to poor strategy selection
    derived_from_bd_id: BD-007
  - id: finance-C-319
    when: When using log_loss as the default scoring metric for ml_cross_val_score
    action: Verify that log_loss aligns with specific risk management requirements and downstream calibration needs of the
      trading strategy; log_loss may not capture domain-specific costs of misclassification
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Defaulting to log_loss without domain-specific validation may lead to models optimized for general classification
      accuracy rather than trading-specific objectives that consider asymmetric costs and risk-adjusted returns
    derived_from_bd_id: BD-009
  - id: finance-C-320
    when: When running the SADF (Supremum Augmented Dickey-Fuller) structural break test
    action: Verify dataset has at least min_length=20 observations before applying SADF test; reject test results or flag
      as unreliable when sample size approaches the minimum threshold
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using SADF with fewer than 20 observations produces unreliable test statistics and unstable parameter estimates,
      causing strategies to incorrectly identify or miss structural breaks in market regimes
    derived_from_bd_id: BD-031
  - id: finance-C-321
    when: When calculating annualized Sharpe ratio using Lo's autocorrelation-adjusted method
    action: Verify dataset has at least 252 observations for annualization and 100 observations for stable autocovariance
      estimation; use standard Sharpe ratio only if autocorrelation correction is demonstrably unnecessary
    severity: high
    kind: domain_rule
    modality: must
    consequence: Lo's adjusted Sharpe ratio with insufficient observations produces unstable autocovariance estimates, causing
      strategies to appear more or less attractive than they actually are due to systematically biased risk-adjusted performance
      metrics
    derived_from_bd_id: BD-038
  - id: finance-C-322
    when: When using the framework's default min_pct=0.05 parameter in drop_labels for label filtering
    action: Verify that min_pct=0.05 matches the actual rare event frequency in your dataset; labels with frequency below
      5% of mean label frequency will be silently dropped
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Silent label dropping eliminates rare observations that may represent significant trading signals (e.g.,
      extreme events, black swan scenarios), causing backtest to overestimate strategy robustness
    derived_from_bd_id: BD-083
  - id: finance-C-323
    when: When using PurgedKFold cross-validation with the default n_splits=3 parameter
    action: Verify that n_splits=3 provides sufficient training observations per fold for your dataset size; with purge zones
      consuming portions of data, 3 splits may create smaller training sets than sklearn's n_splits=5
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Insufficient training observations per fold due to n_splits=3 with large purge zones reduces cross-validation
      reliability, potentially accepting underfitting models that fail in live trading
    derived_from_bd_id: BD-087
  - id: finance-C-324
    when: When computing MDA feature importance using default n_repeat=1
    action: Increase n_repeat to at least 5-10 for stable feature importance rankings; single evaluation with n_repeat=1 produces
      high-variance estimates unreliable for financial datasets with noisy inputs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Single-iteration MDA produces unstable feature importance rankings that vary significantly across random
      seeds, leading to inconsistent feature selection and potentially dropping truly predictive features
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-325
    when: When using model fingerprint sampling for feature importance analysis with nonlinear relationships
    action: Verify that num_values=50 provides sufficient discretization for the feature space; test with higher values (100-200)
      when feature effects appear discontinuous or non-monotonic
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 50 discrete points for highly nonlinear functions causes coarse approximation of feature effects, leading
      to incorrect feature ranking and suboptimal strategy parameter selection
    derived_from_bd_id: BD-GAP-004
  - id: finance-C-326
    when: When computing microstructural estimators (Roll, Corwin-Schultz, Amihud, Kyle, Hasbrouck) on non-daily frequency
      data
    action: 'Scale window parameter proportionally: window = 20 * (bar_frequency / daily_frequency); for example, use window=4800
      for 5-minute bars to maintain equivalent daily coverage'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using window=20 on 5-minute bars means 20 bars represents only 100 minutes, introducing noise and inaccurate
      liquidity measurement compared to the daily-bar context the estimators were designed for
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-327
    when: When applying tick rule encoding with quantile-based feature mapping
    action: Verify that the number of quantile buckets does not exceed 26; if more buckets are needed, implement dynamic alphabet
      size or alternative tokenization before encoding features for downstream NLP tools
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using 26-letter alphabet when features require more than 26 quantile buckets causes encoding collisions or
      silent truncation, corrupting feature representations used by downstream NLP models
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-328
    when: When constructing Minimum Spanning Trees for portfolio correlation networks with dense correlation matrices
    action: Consider switching to 'prim' algorithm for dense matrices (when E > V log V) to improve computational efficiency;
      for portfolios with >500 assets, Prim typically provides 2-5x speedup over Kruskal
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using Kruskal algorithm on dense correlation matrices causes O(E log E) complexity overhead; for large portfolios
      (500+ assets), MST construction becomes a bottleneck in iterative portfolio rebalancing workflows
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-329
    when: When using sequential bootstrapping with default compare=False
    action: Explicitly verify that your data exhibits serial dependence rather than i.i.d. characteristics before relying
      on sequential sampling benefits; set compare=True to confirm sequential sampling actually differs from simple i.i.d.
      bootstrap
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying sequential bootstrap to i.i.d. data provides no benefit over simple sampling, but compare=False
      hides this, leading users to trust inflated performance metrics that won't replicate in live trading
    derived_from_bd_id: BD-GAP-012
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
