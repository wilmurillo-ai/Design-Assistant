- id: AP-ZIPLINE-240
  title: 回测日期时区必须为 UTC，传入 naive datetime 引发深层 AssertionError
  description: 'Zipline 内部强制要求所有时间戳为 UTC aware datetime。当用户传入 naive datetime （无时区信息，如 pd.Timestamp(''2020-01-01'')）时，不在入口处报错，而是在
    算法执行深处触发 AssertionError: Algorithm should have a utc datetime，栈深 难以定位。A 股开发者从本地 CST 时间导入数据时极易触发此陷阱，需在 bundle 注册时显式 tz_localize(''UTC'')。

