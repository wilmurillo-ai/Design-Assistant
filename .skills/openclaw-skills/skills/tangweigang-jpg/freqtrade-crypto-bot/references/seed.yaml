resources:
  packages:
  - name: ccxt>=4.5.4
    version_pin: latest
  - name: SQLAlchemy>=2.0.6
    version_pin: latest
  - name: python-telegram-bot>=20.1
    version_pin: latest
  - name: numpy>2.0,<3.0
    version_pin: latest
  - name: pandas>=2.2.0,<3.0
    version_pin: latest
  - name: TA-Lib<0.7
    version_pin: latest
  - name: fastapi
    version_pin: latest
  - name: pyjwt
    version_pin: latest
  - name: websockets
    version_pin: latest
  - name: uvicorn
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install ccxt>=4.5.4
    - python3 -m pip install SQLAlchemy>=2.0.6
    - python3 -m pip install python-telegram-bot>=20.1
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing OHLCV data loading and storage
    action: 'Use exactly 6 columns in DEFAULT_DATAFRAME_COLUMNS order: date, open, high, low, close, volume'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Downstream components expect specific column positions; wrong column order causes indicator calculations
      to fail and produces incorrect trading signals
    stage_ids:
    - data_ingestion
  - id: finance-C-002
    when: When loading OHLCV data with load_data or DataProvider.get_pair_dataframe
    action: Return DataFrames with exactly the same column structure during both live and backtest modes
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Strategies that expect consistent OHLCV structure will fail silently or produce incorrect signals when column
      order differs between execution modes, causing live trading losses
    stage_ids:
    - data_ingestion
  - id: finance-C-007
    when: When configuring startup_candle_count for a strategy
    action: Set startup_candle_count higher than 5x the exchange's ohlcv_candle_limit
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: Strategy startup validation throws ConfigurationError when required startup candles exceed 5x candle limit,
      preventing backtesting and live trading
    stage_ids:
    - data_ingestion
  - id: finance-C-009
    when: When running backtest with downloaded data
    action: Present backtest returns as guaranteed future trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not account for slippage variability, liquidity constraints, and market impact that cause
      live returns to differ significantly from simulated results
    stage_ids:
    - data_ingestion
  - id: finance-C-010
    when: When implementing data storage backends
    action: Implement IDataHandler interface with each required abstract methods
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Strategies expecting consistent data access across formats will fail when pluggable data handlers omit required
      methods like ohlcv_load/ohlcv_store
    stage_ids:
    - data_ingestion
  - id: finance-C-011
    when: When loading data during backtest
    action: Apply time-based slicing to prevent look-ahead bias in informative pairs
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without proper date cutoff, strategies using informative pairs will see future data during callbacks, causing
      unrealistic backtest results that cannot be reproduced in live trading
    stage_ids:
    - data_ingestion
  - id: finance-C-015
    when: When downloading futures data
    action: Use CandleType.FUTURES instead of CandleType.SPOT for futures trading mode
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Fetching spot candles for futures pairs returns incorrect price data, causing strategies to trade at wrong
      prices with guaranteed losses
    stage_ids:
    - data_ingestion
  - id: finance-C-018
    when: When populating entry signals in populate_entry_trend
    action: set enter_long, enter_short columns to binary integer values {0, 1}
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: The get_entry_signal method at interface.py:1366-1369 expects enter_long/enter_short to equal exactly 1 for
      signal detection. Non-integer or out-of-range values cause the signal to be silently ignored, resulting in no trading
      entries despite valid indicator conditions.
    stage_ids:
    - strategy_analysis
  - id: finance-C-019
    when: When implementing populate_entry_trend or populate_exit_trend
    action: verify populate_indicators completes first within the same pair's analysis pipeline
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Entry and exit signals depend on indicators populated by populate_indicators. Calling populate_entry_trend
      before indicators are calculated produces signals based on missing data, causing incorrect trading decisions and unpredictable
      backtest results.
    stage_ids:
    - strategy_analysis
  - id: finance-C-020
    when: When designing a strategy with short or leverage trading
    action: set INTERFACE_VERSION to 3
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: INTERFACE_VERSION=2 lacks short/leverage support. Strategies with can_short=True using INTERFACE_VERSION=2
      may load but short signals will be ignored or produce undefined behavior. The framework explicitly documents INTERFACE_VERSION=3
      as the first version supporting futures features (interface.py:66-67).
    stage_ids:
    - strategy_analysis
  - id: finance-C-024
    when: When configuring a strategy with can_short=True
    action: verify trading_mode is set to 'futures' in the configuration
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Strategies with can_short=True fail to load in SPOT trading mode (strategy_resolver.py:167-173). The bot
      raises ImportError 'Short strategies cannot run in spot markets'. Short signals are only processed when trading_mode
      is futures, not spot.
    stage_ids:
    - strategy_analysis
  - id: finance-C-028
    when: When defining labels in set_freqai_targets(), labels MUST use negative shift (shift(-n)) to look backward in time
    action: shift label targets backward to prevent look-ahead bias by using negative shift values
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Labels containing future price information cause look-ahead bias, leading to unrealistically optimistic backtest
      results that fail in live trading
    stage_ids:
    - ml_training_inference
  - id: finance-C-030
    when: When setting train_period_days configuration, the value must be a positive integer
    action: use positive integer values for train_period_days to define the training window size
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-integer or zero train_period_days causes OperationalException during split_timerange(), preventing any
      training from occurring
    stage_ids:
    - ml_training_inference
  - id: finance-C-033
    when: When running FreqAI strategies, process_only_new_candles must be set to True
    action: set process_only_new_candles=True in strategy configuration to enable FreqAI live/dry trading
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Setting process_only_new_candles=False causes OperationalException and FreqAI aborts, preventing any live
      or dry-run trading from occurring
    stage_ids:
    - ml_training_inference
  - id: finance-C-040
    when: When attaching predictions to strategy DataFrame, columns must be merged on date to avoid misalignment
    action: use pd.merge() with left_on='date' and right_on='date_pred' to attach predictions to strategy DataFrame
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without proper date-based merging, predictions become misaligned with candles, causing incorrect trading
      signals and losses
    stage_ids:
    - ml_training_inference
  - id: finance-C-041
    when: When claiming prediction accuracy, backtest performance must not be presented as guaranteed live trading results
    action: claim backtest results equal expected live trading performance or guarantee future returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as live performance guarantees ignores market regime changes, slippage, and execution
      differences causing significant financial losses
    stage_ids:
    - ml_training_inference
  - id: finance-C-042
    when: When setting include_shifted_candles > 0, features from previous candles are included as lagged values
    action: verify shifted candle features use positive n in shift(n) to look backward, not negative (look-ahead)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Using negative shift in include_shifted_candles introduces look-ahead bias, making backtest results unrealistically
      optimistic
    stage_ids:
    - ml_training_inference
  - id: finance-C-046
    when: When model metadata lacks class_names, prediction raises ValueError
    action: verify model_meta_data['class_names'] is populated in the trained model for classifier predictions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing class_names causes ValueError during predict() for classifiers, breaking the prediction pipeline
      entirely
    stage_ids:
    - ml_training_inference
  - id: finance-C-048
    when: When implementing entry orders for long positions
    action: Use BuySell side as 'buy' for long signals and 'sell' for short signals
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Orders placed with incorrect direction will result in losing positions being opened instead of profitable
      ones, causing immediate financial loss to the trading account
    stage_ids:
    - order_execution
  - id: finance-C-050
    when: When calculating profit for trade reporting
    action: Include exchange fees in the final profit calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Profit calculations excluding fees misrepresent actual trading performance, leading to incorrect strategy
      evaluation and potential financial loss from underestimated costs
    stage_ids:
    - order_execution
  - id: finance-C-051
    when: When persisting trade state to the database
    action: Commit trade changes to the database before updating wallet state
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Trade state changes without database commits cause data inconsistency where wallet balances don't match trade
      records, potentially leading to incorrect stake calculations and overtrading
    stage_ids:
    - order_execution
  - id: finance-C-052
    when: When configuring stoploss placement
    action: Only use stoploss_on_exchange for exchanges that support OCO orders
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Using stoploss_on_exchange on unsupported exchanges causes order placement failures, leaving trades unprotected
      against adverse price movements
    stage_ids:
    - order_execution
  - id: finance-C-053
    when: When executing position adjustments via DCA
    action: Respect the max_entry_position_adjustment limit to prevent unlimited position sizing
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Exceeding position adjustment limits leads to excessive stake allocation on single trades, concentrating
      risk and potentially exhausting available capital
    stage_ids:
    - order_execution
  - id: finance-C-055
    when: When handling multiple open orders
    action: Process trades sequentially to avoid race conditions and deadlocks
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Concurrent trade processing causes race conditions where order modifications conflict, potentially leaving
      orders in inconsistent states or causing exchanges to reject duplicate order submissions
    stage_ids:
    - order_execution
  - id: finance-C-057
    when: When maintaining trade state across bot restarts
    action: Use SQLite database persistence to verify trade state survives restarts
    severity: fatal
    kind: operational_lesson
    modality: must
    consequence: Without proper database persistence, trade state is lost on restart, causing orphaned orders and inconsistent
      trade tracking that leads to financial losses
    stage_ids:
    - order_execution
  - id: finance-C-060
    when: When executing trades in live or dry-run mode
    action: Claim backtest returns as equivalent to live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as guaranteed live trading performance misleads users about expected returns,
      as backtests cannot account for slippage, liquidity constraints, and market impact
    stage_ids:
    - order_execution
  - id: finance-C-064
    when: When managing open trades for exit
    action: Protect exit logic with _exit_lock to prevent concurrent modification conflicts
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without exit lock protection, concurrent exit operations cause race conditions where trades may be double-closed
      or exits may conflict with force-sell commands
    stage_ids:
    - order_execution
  - id: finance-C-065
    when: When updating trade state from exchange order responses
    action: Validate order ID matches before updating trade state
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Updating trade state with mismatched order ID causes incorrect trade amounts and prices, leading to profit
      calculation errors and database inconsistency
    stage_ids:
    - order_execution
  - id: finance-C-068
    when: When implementing backtesting engine
    action: Force dry_run=True in config to prevent accidental exchange interaction
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Live trading without dry_run could result in real financial losses when the intention was simulation only
    stage_ids:
    - backtesting
  - id: finance-C-069
    when: When configuring detail timeframe for backtesting
    action: Set detail timeframe equal to or larger than strategy timeframe
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Backtest will fail with OperationalException when detail timeframe is not smaller than main strategy timeframe
    stage_ids:
    - backtesting
  - id: finance-C-070
    when: When configuring pairlists for backtesting
    action: Include VolumePairList in pairlist configuration
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: VolumePairList requires live market data which is unavailable during historical backtesting, causing OperationalException
    stage_ids:
    - backtesting
  - id: finance-C-071
    when: When running backtesting with multiple strategies
    action: Include PrecisionFilter in pairlist configuration
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: PrecisionFilter is stateful and cannot be shared across multiple strategy backtests, causing OperationalException
    stage_ids:
    - backtesting
  - id: finance-C-073
    when: When defining LocalTrade class for backtesting
    action: Keep LocalTrade fields aligned with Trade class exactly
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Field misalignment between LocalTrade and Trade causes incorrect trade data serialization and analysis failures
    stage_ids:
    - backtesting
  - id: finance-C-075
    when: When preparing historical data for backtesting
    action: Verify startup candle count equals or exceeds longest indicator lookback period
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Insufficient startup candles cause indicators to reference future data, introducing look-ahead bias that
      inflates backtest performance
    stage_ids:
    - backtesting
  - id: finance-C-076
    when: When simulating entry signals in backtesting
    action: Process entry signals at current candle open price, not future candles
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Entry signals using future price data create look-ahead bias, causing backtest results to be unrealistically
      profitable
    stage_ids:
    - backtesting
  - id: finance-C-077
    when: When simulating exit signals in backtesting
    action: Execute exit signals at next candle open price, not current candle
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Exit signals using current candle prices create look-ahead bias, causing trades to exit at unrealistically
      good prices
    stage_ids:
    - backtesting
  - id: finance-C-088
    when: When implementing a custom IHyperOptLoss loss function
    action: Return smaller float values for better (more optimal) results
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Loss function returning larger values for better results will invert the optimization objective, causing
      hyperopt to select the worst performing parameters
    stage_ids:
    - hyperoptimization
  - id: finance-C-089
    when: When implementing a strategy with inheritance across files for hyperoptimization
    action: Register strategy base class modules with cloudpickle.register_pickle_by_value()
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Worker processes will fail with pickle errors when trying to deserialize strategy objects, preventing hyperopt
      trials from executing
    stage_ids:
    - hyperoptimization
  - id: finance-C-090
    when: When configuring hyperopt loss function
    action: Specify a valid hyperopt loss class via --hyperopt-loss parameter
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Hyperopt will raise OperationalException with usage instructions, preventing any optimization from running
    stage_ids:
    - hyperoptimization
  - id: finance-C-091
    when: When implementing a custom loss function
    action: Extend IHyperOptLoss abstract base class with hyperopt_loss_function() method
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Custom loss class will fail to load via resolver, throwing AttributeError during hyperopt initialization
    stage_ids:
    - hyperoptimization
  - id: finance-C-094
    when: When selecting optuna sampler for hyperoptimization
    action: 'Use only supported sampler names: TPESampler, GPSampler, CmaEsSampler, NSGAIISampler, NSGAIIISampler, QMCSampler'
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Unsupported sampler name causes OperationalException at optimizer initialization, blocking hyperopt execution
    stage_ids:
    - hyperoptimization
  - id: finance-C-101
    when: When distributing hyperopt across multiple CPU cores
    action: Verify HyperOptimizer.generate_optimizer_wrapped is decorated with @delayed and @wrap_non_picklable_objects
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Worker function without proper joblib decorators fails to execute in parallel, forcing sequential evaluation
      and negating multiprocessing benefits
    stage_ids:
    - hyperoptimization
  - id: finance-C-104
    when: When hyperopt search space includes unsupported dimension types
    action: Use only CategoricalDistribution, IntDistribution, FloatDistribution, or SKDecimal for parameter spaces
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unsupported dimension types raise OperationalException during dimension-to-optuna conversion, halting optimization
    stage_ids:
    - hyperoptimization
  - id: finance-C-109
    when: When validating trade state before force entry operations
    action: check force_entry_enable config flag before allowing force entry
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Force entry without force_entry_enable check allows unauthorized manual trading bypassing configuration controls
    stage_ids:
    - rpc_communication
  - id: finance-C-110
    when: When validating trade state before force entry operations
    action: verify bot state is RUNNING before allowing force entry
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Force entry when bot is not RUNNING causes orders to be placed without proper bot state management, leading
      to inconsistent trade tracking
    stage_ids:
    - rpc_communication
  - id: finance-C-111
    when: When validating force entry on spot markets
    action: reject SHORT direction when trading_mode is SPOT
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Allowing SHORT positions on spot markets creates impossible trade conditions leading to data corruption and
      exchange rejection errors
    stage_ids:
    - rpc_communication
  - id: finance-C-136
    when: When configuring stoploss value
    action: set stoploss to 0
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Sell orders will fail to place because stoploss=0 creates division-by-zero or invalid order price calculations
    stage_ids:
    - configuration
  - id: finance-C-137
    when: When both max_open_trades and stake_amount are configured
    action: set max_open_trades to -1 (unlimited) while also setting stake_amount to 'unlimited'
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Bot may open unlimited trades with unlimited stake amount, leading to complete loss of all capital
    stage_ids:
    - configuration
  - id: finance-C-150
    when: When passing OHLCV data from data_ingestion to strategy_analysis
    action: 'include DataFrame columns in the exact fixed order: date, open, high, low, close, volume'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Strategy indicators and signals will fail to compute correctly if column order or names are incorrect, leading
      to invalid trading decisions based on misaligned price data
    stage_ids:
    - data_ingestion
    - strategy_analysis
  - id: finance-C-151
    when: When processing entry/exit signals through backtesting
    action: shift each signal columns (enter_long, exit_long, enter_short, exit_short, enter_tag, exit_tag) by 1 to prevent
      look-ahead bias
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Backtest results will exhibit look-ahead bias, causing live trading returns to fall far below backtested
      results because the strategy would be using future information
    stage_ids:
    - strategy_analysis
    - order_execution
  - id: finance-C-154
    when: When LocalTrade is used across backtesting and live trading
    action: maintain identical Trade schema with each required fields including open_rate, close_rate, stake_amount, leverage,
      is_short
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Backtest results will not match live trading behavior, causing significant discrepancies in P&L calculations
      and position sizing
    stage_ids:
    - order_execution
    - backtesting
  - id: finance-C-159
    when: When validating configuration with FreqAI enabled
    action: allow process_only_new_candles to be False when FreqAI is enabled
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: FreqAI will abort execution because it requires process_only_new_candles=True to function correctly with
      its sliding window training paradigm
    stage_ids:
    - configuration
    - data_ingestion
  - id: finance-C-164
    when: When backtest results indicate signal misalignment
    action: use unshifted signals directly for trade execution without the mandatory shift(1) delay
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Backtest equity curve will exhibit look-ahead bias, making live trading returns appear significantly worse
      than backtested results
    stage_ids:
    - strategy_analysis
    - order_execution
  - id: finance-C-166
    when: When backtest results are presented as live trading proof
    action: claim that backtest returns equal expected live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Users will risk real capital expecting the same returns as backtesting, leading to financial losses when
      live execution differs due to slippage, fees, and market conditions
    stage_ids:
    - order_execution
    - hyperoptimization
  - id: finance-C-171
    when: When creating OHLCV DataFrames for strategy processing
    action: 'Maintain columns in exact order: date, open, high, low, close, volume as defined in freqtrade/constants.py:84'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Strategies will fail to produce valid signals or crash when accessing columns by position, causing backtesting
      failures and incorrect trading decisions in live mode
  - id: finance-C-172
    when: When defining stoploss in strategy configuration
    action: Express stoploss as a positive decimal number (e.g., 0.05 for 5% loss threshold) as specified in freqtrade/strategy/interface.py:75
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Stoploss orders will execute at wrong prices or fail entirely, potentially causing unlimited losses in leveraged
      futures trading
  - id: finance-C-173
    when: When implementing entry/exit signal generation methods
    action: Return integer values in {-1, 0, 1} for entry and exit signals representing short, none, and long respectively
      as defined in freqtrade/strategy/interface.py:1347
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Signal processing will misinterpret trade directions, causing unintended short positions in spot markets
      or missing entry opportunities
  - id: finance-C-177
    when: When implementing or loading strategies
    action: Define each REQUIRED_ORDERTYPES keys (entry, exit, stoploss, stoploss_on_exchange) as specified in freqtrade/constants.py:24
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Strategy will fail to load with ImportError, preventing any trading operations in both backtest and live
      modes
  - id: finance-C-185
    when: When deploying to spot markets with can_short=True
    action: Attempt short positions in spot trading mode — can_short with TradingMode.SPOT raises ImportError as enforced
      in freqtrade/resolvers/strategy_resolver.py:167-173
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Strategy fails to load entirely; if bypassed, system would attempt impossible short sells in spot markets
      causing trade execution failures
  - id: finance-C-190
    when: When adding support for a new exchange in Freqtrade
    action: Use ccxt abstraction with _ft_has capability dict for per-exchange feature flags rather than creating per-exchange
      subclasses; define exchange-specific limitations (order types, endpoints) in _ft_has, not in embedded code paths
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Per-exchange subclasses would cause code duplication explosion across 50+ supported exchanges, making maintenance
      infeasible and creating divergent behavior that breaks the uniform trading logic contract
    derived_from_bd_id: BD-003
  - id: finance-C-191
    when: When configuring Freqtrade with sensitive credentials or runtime overrides
    action: 'Load secrets from environment variables (never store in config files), use CLI arguments for runtime experimentation,
      and apply deep merge with precedence: env vars > CLI args > config files'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Storing secrets in version-controlled config files exposes trading credentials to unauthorized access; incorrect
      merge precedence causes configuration to silently use wrong values, leading to trades on wrong accounts or with unintended
      parameters
    derived_from_bd_id: BD-041
  - id: finance-C-196
    when: When implementing label encoding for categorical trading direction classes in ML models
    action: Save and load class-to-index mapping consistently between training and inference — verify integer mapping preserved
      during model serialization and deserialization
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Label misalignment between training and inference causes the model to predict wrong trading directions, e.g.,
      'long' decoded as 'short', resulting in systematically losing positions
    derived_from_bd_id: BD-117
  - id: finance-C-197
    when: When implementing custom exit logic or modifying exit priority evaluation
    action: 'Evaluate exit conditions in priority order: custom_exit first, then exit_signal, then roi, then stoploss, then
      trailing — do not evaluate simultaneously or change the priority sequence'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Changing exit priority order causes strategies to exit positions based on wrong conditions, e.g., trailing
      stop triggering before custom exit logic, breaking the designed risk management hierarchy
    derived_from_bd_id: BD-012
  - id: finance-C-198
    when: When validating strategy configuration for spot market trading
    action: Allow can_short=True when TradingMode.SPOT — the strategy validation must reject this combination with ImportError
      at startup
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Attempting short positions in spot markets results in unsupported order types that the exchange will reject,
      causing order failures and position tracking errors in live trading
    derived_from_bd_id: BD-132
  - id: finance-C-200
    when: When implementing hyperopt parallelization or multiprocessing
    action: Use loky process spawn method (joblib.externals.loky) for hyperopt parallelization — do not use fork-based multiprocessing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Fork-based multiprocessing causes thread-unsafe logging in child processes, resulting in frozen subprocesses
      and hyperopt jobs that hang indefinitely without completing
    derived_from_bd_id: BD-037
  - id: finance-C-207
    when: When implementing or modifying strategy indicator population methods
    action: Execute populate_indicators before populate_entry_trend, and populate_exit_trend last — each method depends on
      data produced by the previous one; violating this sequence causes entry/exit signals to reference undefined or stale
      data
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Executing indicator methods out of sequence causes entry and exit signals to reference undefined indicators
      or stale cached values, resulting in incorrect trading decisions based on missing data
    derived_from_bd_id: BD-122
  - id: finance-C-218
    when: When implementing or modifying FreqAI data pipeline components
    action: Violate DataFrame column ordering contracts — the framework's positional tuple indices (BD-133) depend on fixed
      column positions; any column deviation silently corrupts OHLCV prices, signals, and profit calculations simultaneously
      with no runtime errors
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Column order violations combined with hardcoded tuple indices cause all downstream calculations to reference
      wrong data fields — backtest equity curves become meaningless and live trading executes on corrupted price/signal data
    derived_from_bd_id: BD-147
  - id: finance-C-219
    when: When modifying temporal data splitting in FreqAI backtesting
    action: Maintain temporal boundary integrity across train_period_days (BD-069), sliding window paradigm (BD-095), and
      sklearn train_test_split (BD-093) — verify shuffle=False is used and no temporal boundary violations occur that would
      include future information in training features
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Temporal boundary violations in the sliding window paradigm cause look-ahead bias where training features
      include future market information, resulting in backtest equity curves that significantly overstate live trading returns
    derived_from_bd_id: BD-153
  - id: finance-C-221
    when: When implementing or modifying backtesting data structures in FreqAI
    action: 'Modify the hardcoded tuple index contract: DATE=0, OPEN=1, HIGH=2, LOW=3, CLOSE=4, LONG=5, ELONG=6, SHORT=7,
      ESHORT=8 — these indices are the invariant contract between data generation and consumption in tight backtesting loops'
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Modifying tuple indices corrupts data interpretation so that wrong prices or signals are used for backtesting
      calculations — profit calculations use wrong price data while signal processing references incorrect columns, producing
      completely invalid backtest results
    derived_from_bd_id: BD-133
  - id: finance-C-224
    when: When processing column-ordered data for profit calculations
    action: Assume column positions are stable across data sources or transformations — column ordering violations propagate
      through the entire metrics subsystem, corrupting CAGR, Sharpe, Sortino, MaxDrawdown, and other performance ratios that
      appear numerically valid
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: If column ordering is violated (e.g., BD-001 feeds wrong values into BD-028), profit calculations receive
      incorrect price data, causing all downstream metrics to be corrupted while appearing legitimate, leading to fundamentally
      flawed strategy decisions based on false performance data
    derived_from_bd_id: BD-154
  - id: finance-C-225
    when: When validating column positions before passing data to profit calculations
    action: Implement explicit column position validation at the entry point of profit calculation logic, verifying that price
      columns (open, high, low, close) are in expected positions before processing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without column position validation, corrupted profit figures silently propagate through CAGR, Sharpe, Sortino,
      MaxDrawdown, and other metrics, causing strategy selection based on backtest results that bear no relation to actual
      expected performance
    derived_from_bd_id: BD-154
  - id: finance-C-229
    when: When implementing or modifying exit evaluation logic in the should_exit method
    action: 'Maintain the hardcoded exit evaluation sequence: exit_signal checked first, then stoploss, then ROI, then trailing_stoploss
      — do not refactor to simultaneous evaluation or change the precedence order'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Changing the exit evaluation order causes stoploss to execute after ROI or trailing stoploss, potentially
      allowing larger losses before mandatory protection triggers, or causing premature exits when optional conditions should
      have taken precedence
    derived_from_bd_id: BD-136
  - id: finance-C-230
    when: When configuring the stoploss parameter in strategy settings
    action: Set stoploss to a positive decimal value (e.g., -0.05 for 5% stoploss) — using 0.0 causes ConfigurationError and
      leaves positions completely unprotected; if disabling stoploss is intentional, use a very large positive value or explicit
      disabled flag
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Configuring stoploss=0.0 triggers ConfigurationError and prevents backtesting, while accidental use of 0
      in live trading leaves all positions without loss protection, causing unlimited downside exposure on losing trades
    derived_from_bd_id: BD-137
  - id: finance-C-240
    when: When creating or accessing pair-timeframe identifiers in backtesting or live trading
    action: 'Always include CandleType in the PairWithTimeframe tuple — verify the identifier includes each three components:
      pair (str), timeframe (str), and candle_type (CandleType). Never strip or omit CandleType when creating identifiers'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without CandleType, data for different candle types (spot vs funding/mark) overwrites each other, corrupting
      historical backtests for futures strategies and causing incorrect signal generation
    derived_from_bd_id: BD-005
  - id: finance-C-243
    when: When implementing or migrating strategies that use short positions or leverage features
    action: Set INTERFACE_VERSION=3 in strategy configuration to explicitly opt-in to futures/leverage features — legacy strategies
      without this version continue running without leverage support
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without INTERFACE_VERSION=3, strategies using leverage or short positions are silently rejected or mishandled,
      potentially causing strategies to run with wrong position sizing or preventing execution entirely
    derived_from_bd_id: BD-008
  - id: finance-C-260
    when: When implementing training and backtesting pipeline using sliding window paradigm
    action: Implement sliding window where fixed-size windows move forward through time, ensuring train_end strictly precedes
      test_start with no temporal overlap; window must be large enough to capture market cycles (recommended minimum 90 days)
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Non-sliding windows or overlapping train/test periods cause look-ahead bias, allowing the model to use future
      information during training, making backtest results unrepresentative of actual live trading performance
    derived_from_bd_id: BD-095
  - id: finance-C-279
    when: When configuring trading mode in strategy or exchange configuration
    action: Set dry_run to False only after explicit user confirmation and documented risk acknowledgment; the framework's
      safe default of dry_run=True must not be silently overridden by configuration inheritance or template propagation
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Disabling dry_run mode causes the bot to place real orders with actual funds; strategies tested only in dry_run
      mode may behave differently with live market conditions, risking capital without adequate testing
    derived_from_bd_id: BD-124
  regular:
  - id: finance-C-003
    when: When converting exchange data to DataFrame
    action: Convert OHLCV columns to float type before any indicator calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: TA-LIB indicators assume float inputs and will raise exceptions when receiving integer timestamps or volumes,
      causing backtesting to crash
    stage_ids:
    - data_ingestion
  - id: finance-C-004
    when: When storing OHLCV data to disk
    action: Select only DEFAULT_DATAFRAME_COLUMNS columns before persisting to storage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Extra columns appended by strategies will be persisted and cause load_data to return malformed DataFrames
      with duplicate/misaligned columns
    stage_ids:
    - data_ingestion
  - id: finance-C-005
    when: When downloading historical OHLCV data
    action: Validate that exchange supports the requested CandleType before attempting download
    severity: high
    kind: domain_rule
    modality: must
    consequence: Attempting to fetch unsupported candle types (MARK/INDEX/FUNDING_RATE) causes OperationalException and halts
      the entire download process
    stage_ids:
    - data_ingestion
  - id: finance-C-006
    when: When fetching OHLCV data from ccxt exchange API
    action: Request more candles than the exchange's ohlcv_candle_limit per API call
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Exchanges enforce per-request candle limits; exceeding this causes API errors and data download failures
    stage_ids:
    - data_ingestion
  - id: finance-C-008
    when: When downloading data via exchange API
    action: Claim real-time data access when using polling-based fetch_ohlcv
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: freqtrade uses REST polling which has inherent delays (typically 1-15 minutes depending on exchange), not
      true real-time streaming; presenting this as real-time misleads users about execution quality
    stage_ids:
    - data_ingestion
  - id: finance-C-012
    when: When accessing OHLCV data
    action: Use DataProvider or load_data as the sole data entry point, not direct exchange access
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies bypassing DataProvider lose caching, backtest simulation, and data consistency guarantees built
      into the framework architecture
    stage_ids:
    - data_ingestion
  - id: finance-C-013
    when: When downloading data for pairs that already have cached data
    action: Continue downloading from the end of existing data to avoid creating gaps
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Redownloading from an earlier timestamp creates overlapping data that causes duplicate candles and incorrect
      indicator calculations
    stage_ids:
    - data_ingestion
  - id: finance-C-014
    when: When using FreqAI data kitchen with backtested OHLCV data
    action: Verify Feather/Parquet files are readable by both load_data and FreqAI data kitchen
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incompatible data formats between backtesting and FreqAI training cause data loading failures and wasted
      computation cycles
    stage_ids:
    - data_ingestion
  - id: finance-C-016
    when: When reducing DataFrame memory footprint
    action: Preserve precision for OHLCV price columns (open, high, low, close, volume) during float conversion
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Converting price columns to float32 when float64 is expected causes rounding errors in high-value assets,
      leading to incorrect order sizing and execution prices
    stage_ids:
    - data_ingestion
  - id: finance-C-017
    when: When downloading data with --prepend flag
    action: Set download end date to the start of existing cached data to avoid overlaps
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without proper prepend handling, newly downloaded older data overlaps with existing data creating duplicate
      candles and corrupting time-series integrity
    stage_ids:
    - data_ingestion
  - id: finance-C-021
    when: When defining the minimal_roi attribute in a strategy
    action: leave minimal_roi as an empty dict {} unless disabling ROI-based exits is intentional
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Empty minimal_roi dict {} causes min_roi_reached_entry to return None for all durations (interface.py:1681-1687),
      which makes min_roi_reached always return False (interface.py:1705-1708). This silently disables all ROI-based exits,
      causing trades to remain open indefinitely unless stopped by other mechanisms.
    stage_ids:
    - strategy_analysis
  - id: finance-C-022
    when: When calling lock_pair to prevent entries during cooldown
    action: pass a timezone-aware UTC datetime as the until parameter
    severity: high
    kind: domain_rule
    modality: must
    consequence: PairLocks.lock_pair expects timezone-aware datetime (datetime.now(timezone.utc)). Using naive datetime causes
      the lock comparison at pairlock.py:50 to compare timezone-naive times with UTC-aware query times, making pair locks
      ineffective or prematurely expiring, allowing entries during cooldown periods.
    stage_ids:
    - strategy_analysis
  - id: finance-C-023
    when: When implementing informative_pairs for cross-pair analysis
    action: use the informative_pairs() method or @informative decorator to cache cross-pair data
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Strategies fetching informative data without using the caching mechanism cause redundant exchange API calls.
      The informative_pairs mechanism (interface.py:853-864) caches pair/timeframe combinations, avoiding duplicate fetches.
      Uncached cross-pair data fetching significantly increases API rate consumption and latency.
    stage_ids:
    - strategy_analysis
  - id: finance-C-025
    when: When evaluating exit conditions in should_exit
    action: 'follow the exit priority sequence: custom_exit > exit_signal > stoploss > roi > trailing_stoploss'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The should_exit method (interface.py:1496-1514) processes exit conditions in a specific priority order. Custom
      exit logic is evaluated first (lines 1465-1494), then stoploss (lines 1502-1504), then ROI (lines 1506-1508), then trailing
      stoploss (lines 1510-1512). Deviating from this sequence in custom implementations causes incorrect exit decisions.
    stage_ids:
    - strategy_analysis
  - id: finance-C-026
    when: When presenting backtest results to users or stakeholders
    action: claim that backtested returns represent expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results do not account for slippage, liquidity constraints, market impact, or execution delays that
      occur in live trading. Presenting backtest equity curves as expected live returns misleads users about potential profitability,
      violating the standard financial disclaimer that past performance does not guarantee future results.
    stage_ids:
    - strategy_analysis
  - id: finance-C-027
    when: When using informative pairs with timeframe mismatches
    action: align lock_end_time with the next candle boundary of the strategy timeframe
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Pair locks checked without candle_date alignment can leave a gap between lock_end_time and the next candle
      arrival (interface.py:1171-1174 docstring). An order could be placed at 14:00:00 while the next candle arrives at 14:00:02,
      creating a 2-second window for entries on an old signal. Using is_pair_locked with candle_date parameter ensures alignment.
    stage_ids:
    - strategy_analysis
  - id: finance-C-029
    when: When creating training/test split, test_size parameter controls whether train-only or train+test mode is used
    action: set test_size to 0 in data_split_parameters when only training is needed (backtesting speed)
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Backtesting without train/test split defaults to test_size=0.1 which creates unnecessary test set, slowing
      down backtest runs where only training data is needed
    stage_ids:
    - ml_training_inference
  - id: finance-C-031
    when: When managing prediction data across model runs, DataKitchen is ephemeral but DataDrawer persists
    action: use DataDrawer.historic_predictions for cross-run persistence, while DataKitchen holds only current pair data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Attempting to persist data in DataKitchen causes data loss as it is reinstantiated per coin/per inference
      cycle. Predictions from previous runs are lost if not stored in DataDrawer
    stage_ids:
    - ml_training_inference
  - id: finance-C-032
    when: When loading historic predictions from disk during backtesting, statistics may be inaccurate if bot was offline
    action: claim prediction statistics are accurate when loaded from disk after extended offline periods
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting loaded historic predictions as statistically accurate when bot was offline leads to incorrect
      strategy decisions based on incomplete or stale prediction distributions
    stage_ids:
    - ml_training_inference
  - id: finance-C-034
    when: When training models on Apple Silicon hardware, PyTorch prioritizes MPS over CUDA
    action: use MPS device when available (torch.backends.mps.is_available() and torch.backends.mps.is_built()) before falling
      back to CUDA or CPU
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Using wrong device priority causes sub-optimal training performance on Apple Silicon, as CUDA is unavailable
      and CPU training is significantly slower
    stage_ids:
    - ml_training_inference
  - id: finance-C-035
    when: When using sliding window backtesting, historic predictions must be loaded from disk to avoid retraining
    action: load historic predictions via load_historic_predictions_from_disk() to enable fast backtesting without re-training
      each window
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Backtesting without pre-loaded historic predictions requires training each sliding window from scratch, exponentially
      increasing backtest runtime
    stage_ids:
    - ml_training_inference
  - id: finance-C-036
    when: When buffering timerange for indicators with rolling periods, additional historical data must be loaded
    action: extend data_load_timerange by max_period * max_tf_seconds (startup_candle_count * 2) to verify rolling indicators
      have warmup data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without adequate buffer, rolling indicators produce NaN values at the start of training data, reducing effective
      training set size and model quality
    stage_ids:
    - ml_training_inference
  - id: finance-C-037
    when: When configuring backtest predictions, check_if_backtest_prediction_is_valid() must pass before using cached predictions
    action: validate backtest prediction length matches expected backtest dataframe length before loading from cache
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Loading invalid cached predictions causes misaligned prediction data, corrupting backtest results with missing
      or incorrect prediction values
    stage_ids:
    - ml_training_inference
  - id: finance-C-038
    when: When predicting maxima/minima with argrelextrema, buffer_train_data_candles must be configured to cut off edges
    action: set buffer_train_data_candles in feature_parameters to handle edge effects when using argrelextrema or similar
      edge-sensitive indicators
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without proper buffering, argrelextrema produces incorrect results at timerange edges, corrupting training
      labels and model predictions
    stage_ids:
    - ml_training_inference
  - id: finance-C-039
    when: When using backtest_period_days in configuration, the value must be a non-negative integer
    action: use non-negative integer values for backtest_period_days to define the sliding window test period
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative backtest_period_days raises OperationalException during create_fulltimerange(), breaking the sliding
      window backtest paradigm
    stage_ids:
    - ml_training_inference
  - id: finance-C-043
    when: When shuffling data after train/test split, weights must be shuffled in sync with features and labels
    action: apply the same random_state to shuffle weights alongside features and labels to maintain training alignment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Misaligned shuffling causes weights to be applied to wrong training samples, corrupting the weighted training
      process and model quality
    stage_ids:
    - ml_training_inference
  - id: finance-C-044
    when: When monitoring model freshness, check_if_new_training_required() must be called before each prediction cycle
    action: check if elapsed time since last training exceeds live_retrain_hours to determine if retraining is needed
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using stale models beyond their expiration period leads to degraded prediction accuracy as market conditions
      change, causing poor trading decisions
    stage_ids:
    - ml_training_inference
  - id: finance-C-045
    when: When setting up feature pipeline, VarianceThreshold(threshold=0) removes zero-variance features
    action: include VarianceThreshold step in data pipeline to remove features with no variance (constant values)
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Including zero-variance features wastes model capacity and training time on non-informative features that
      cannot contribute to prediction
    stage_ids:
    - ml_training_inference
  - id: finance-C-047
    when: When cleaning up after inference, DataKitchen reference should be cleared to allow garbage collection
    action: set model and dk to None in clean_up() method to explicitly release memory between coins
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Failing to clear DataKitchen references causes memory accumulation, leading to out-of-memory errors during
      extended live trading sessions
    stage_ids:
    - ml_training_inference
  - id: finance-C-049
    when: When placing orders for new trades or position adjustments
    action: Use the correct EntryExecuteMode ('initial', 'pos_adjust', or 'replace') for order validation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect EntryExecuteMode causes wrong validation logic to be applied, potentially allowing invalid orders
      or rejecting valid ones
    stage_ids:
    - order_execution
  - id: finance-C-054
    when: When placing entry orders via execute_entry
    action: Return immediately after placing the order, not after order fill completion
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Blocking execution until order fill prevents the bot from managing multiple orders in flight, causing signal
      delays and missed trading opportunities
    stage_ids:
    - order_execution
  - id: finance-C-056
    when: When managing partial fills on exchange orders
    action: Handle partially filled orders without deadlocks by using proper lock sequencing
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Improper partial fill handling causes deadlocks where orders remain stuck in intermediate states, preventing
      both order completion and cancellation
    stage_ids:
    - order_execution
  - id: finance-C-058
    when: When processing exit decisions for trades
    action: Use centralized should_exit logic for each exit evaluation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Decentralized exit logic causes inconsistent exit behavior where some exits are evaluated correctly while
      others are missed, leading to unmanaged positions and losses
    stage_ids:
    - order_execution
  - id: finance-C-059
    when: When managing Order to Trade relationships
    action: Maintain full order audit trail with one-to-many Order-to-Trade relationship
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Breaking order relationships causes broken audit trails where trade history cannot be reconstructed, preventing
      proper performance analysis and compliance reporting
    stage_ids:
    - order_execution
  - id: finance-C-061
    when: When presenting dry-run or simulated trading results
    action: Present simulated wallet results as proof of real exchange execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Marketing simulated results as real execution proof falsely claims trading capability, potentially attracting
      users who misunderstand the experimental nature of dry-run mode
    stage_ids:
    - order_execution
  - id: finance-C-062
    when: When placing stoploss orders on exchange
    action: Cancel existing stoploss before placing new trailing stoploss orders
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Attempting to modify stoploss without canceling first causes exchange rejections and leaves trades unprotected
      during critical market movements
    stage_ids:
    - order_execution
  - id: finance-C-063
    when: When handling the order fill lifecycle
    action: Update liquidation prices immediately after order fills
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stale liquidation price after fills causes incorrect stoploss calculations, potentially allowing losses beyond
      intended risk parameters
    stage_ids:
    - order_execution
  - id: finance-C-066
    when: When determining if position adjustments are allowed
    action: Only enable DCA when position_adjustment_enable is set to True in strategy
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Enabling DCA without explicit strategy configuration causes unexpected position sizing behavior that diverges
      from user expectations and risk parameters
    stage_ids:
    - order_execution
  - id: finance-C-067
    when: When fetching and using exchange rates
    action: Use current market rates with specified caching to avoid stale price data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using stale cached rates for entry/exit pricing causes orders to execute at unintended prices, potentially
      entering at unfavorable rates or exiting prematurely
    stage_ids:
    - order_execution
  - id: finance-C-072
    when: When implementing backtesting loop
    action: Optimize backtest_loop for hyperopt which calls it millions of times
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unoptimized backtest_loop causes hyperopt to run excessively slow, making parameter optimization impractical
    stage_ids:
    - backtesting
  - id: finance-C-074
    when: When running backtesting for futures
    action: Apply funding fees from historical funding_rate data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping funding fee calculation results in inaccurate profit simulation for futures contracts which regularly
      receive funding payments
    stage_ids:
    - backtesting
  - id: finance-C-078
    when: When presenting backtesting results
    action: Claim backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtesting assumes perfect fills and lacks intra-candle price information, making backtest returns significantly
      higher than actual live trading
    stage_ids:
    - backtesting
  - id: finance-C-079
    when: When running backtesting for futures pairs
    action: Verify leverage tiers are available for each trading pairs
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing leverage tiers cause OperationalException making backtesting impossible for affected pairs
    stage_ids:
    - backtesting
  - id: finance-C-080
    when: When using dynamic pairlists in backtesting
    action: Expect reproducible backtesting results
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Dynamic pairlists use current market conditions rather than historical data, preventing result reproducibility
    stage_ids:
    - backtesting
  - id: finance-C-081
    when: When calculating performance metrics in backtesting
    action: Use starting_balance for relative drawdown calculation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Missing starting_balance causes inaccurate relative drawdown calculation, overstating risk metrics
    stage_ids:
    - backtesting
  - id: finance-C-082
    when: When managing open trades at backtesting end
    action: Force exit each open positions at last candle open price
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unclosed positions cause incomplete trade tracking and incorrect final balance calculation
    stage_ids:
    - backtesting
  - id: finance-C-083
    when: When backtesting with position_stacking disabled
    action: Prevent opening new trades on pair when existing position is open
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Position stacking without proper support causes duplicate positions on same pair, violating trading constraints
    stage_ids:
    - backtesting
  - id: finance-C-084
    when: When evaluating stoploss in backtesting
    action: Evaluate stoploss before ROI within same candle
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Incorrect evaluation order causes stoploss exits to be missed when ROI triggers on same candle, overstating
      profits
    stage_ids:
    - backtesting
  - id: finance-C-085
    when: When calculating Sharpe ratio in backtesting
    action: Return -100 for zero standard deviation to indicate non-optimal result
    severity: low
    kind: domain_rule
    modality: must
    consequence: Zero standard deviation with positive Sharpe indicates insufficient data quality, must be flagged as non-optimal
    stage_ids:
    - backtesting
  - id: finance-C-086
    when: When setting stoploss_on_exchange in backtesting
    action: Disable stoploss_on_exchange to use simulated perfect stoploss exits
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Keeping stoploss_on_exchange enabled in backtesting causes incorrect simulation since exchange stoploss orders
      are not supported
    stage_ids:
    - backtesting
  - id: finance-C-087
    when: When using intra-candle price simulation
    action: Assume high occurs before low for stoploss calculations
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Backtesting cannot know intra-candle price movement; assuming wrong order causes inaccurate stoploss simulation
    stage_ids:
    - backtesting
  - id: finance-C-092
    when: When running hyperopt with multiprocessing on Unix systems
    action: Use loky process launcher (spawn method) instead of fork for logging compatibility
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Fork-based multiprocessing with thread-unsafe logging causes deadlock in child processes, hanging hyperopt
      trials indefinitely
    stage_ids:
    - hyperoptimization
  - id: finance-C-093
    when: When configuring early stopping in hyperopt
    action: Set early_stop epochs to at least 20% of total epochs for meaningful convergence detection
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Early stop with insufficient epochs relative to total trials may terminate optimization prematurely before
      finding optimal parameters
    stage_ids:
    - hyperoptimization
  - id: finance-C-095
    when: When optimizing sell/exit parameters
    action: Enable use_exit_signal configuration flag
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Sell space optimization produces no meaningful results when exit signals are disabled, wasting computational
      resources
    stage_ids:
    - hyperoptimization
  - id: finance-C-096
    when: When hyperopt detects duplicate parameter combinations across trials
    action: Increase search space size or reduce number of requested points per batch
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Duplicate trials waste compute resources and reduce effective exploration of parameter space, potentially
      missing optimal parameters
    stage_ids:
    - hyperoptimization
  - id: finance-C-097
    when: When loading hyperopt results for production use
    action: Claim hyperopt-optimized parameters will replicate backtested returns in live trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Hyperopt overfits parameters to historical data; live trading conditions (slippage, liquidity, exchange behavior)
      differ, causing significant return deviation
    stage_ids:
    - hyperoptimization
  - id: finance-C-098
    when: When hyperopt optimization completes with no good results
    action: Review search space configuration and timerange data quality before retrying
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: No improvement over MAX_LOSS (100000) indicates fundamental issues with strategy, data, or loss function
      configuration
    stage_ids:
    - hyperoptimization
  - id: finance-C-099
    when: When exporting hyperopt parameters to strategy file
    action: Manually copy exported .json parameters into strategy class attributes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hyperopt only exports parameter files when FTHYPT_FILEVERSION >= 2 and disableparamexport is not set; parameters
      are not automatically loaded for live trading
    stage_ids:
    - hyperoptimization
  - id: finance-C-100
    when: When implementing IHyperOptLoss with timeframe-dependent calculations
    action: Set hyperoptloss.__class__.timeframe from config before use in trials
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Loss function receives incorrect timeframe value, causing time-dependent calculations (e.g., SharpeRatioDaily)
      to produce invalid results
    stage_ids:
    - hyperoptimization
  - id: finance-C-102
    when: When customizing hyperopt for a new strategy
    action: Verify strategy space parameters are registered in HyperStrategyMixin or HyperOpt class
    severity: high
    kind: domain_rule
    modality: must
    consequence: Parameters not registered in optimization space are ignored during hyperopt, resulting in unchanged strategy
      behavior despite optimization
    stage_ids:
    - hyperoptimization
  - id: finance-C-103
    when: When restarting hyperopt with different configuration
    action: Clean hyperopt pickle files before starting new optimization run
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Stale pickle data causes worker processes to use outdated market data, producing incorrect optimization results
    stage_ids:
    - hyperoptimization
  - id: finance-C-105
    when: When presenting hyperopt backtest results as proof of live trading capability
    action: Claim hyperopt-optimized backtest results represent expected live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Hyperopt results are simulated on historical data with perfect fill assumptions; live trading involves slippage,
      latency, and partial fills that significantly degrade returns
    stage_ids:
    - hyperoptimization
  - id: finance-C-106
    when: When selecting loss function for multi-objective optimization
    action: Use MultiMetricHyperOptLoss for Pareto-optimal multi-objective evaluation
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Single-objective loss functions (Sharpe, Sortino, Calmar) optimize for one metric at the expense of others,
      potentially missing balanced optimal solutions
    stage_ids:
    - hyperoptimization
  - id: finance-C-107
    when: When strategy parameters require pickle serialization across processes
    action: Implement __getstate__ and __setstate__ methods for proper unpickling of class attributes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Class attributes like timeframe (set dynamically by resolver) fail to restore correctly in worker processes,
      causing AttributeError during optimization
    stage_ids:
    - hyperoptimization
  - id: finance-C-108
    when: When implementing RPC methods for bot state queries
    action: prefix method names with _rpc_ and raise RPCException for invalid bot states
    severity: high
    kind: domain_rule
    modality: must
    consequence: RPC methods without _rpc_ prefix may not properly raise RPCException, causing clients to receive generic
      errors instead of formatted RPC error messages
    stage_ids:
    - rpc_communication
  - id: finance-C-112
    when: When validating pair for force entry operations
    action: verify pair exists in tradable markets and matches stake currency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Force entry with invalid pair or wrong stake currency causes exchange order rejections and broken trade state
    stage_ids:
    - rpc_communication
  - id: finance-C-113
    when: When validating trade state before force exit operations
    action: check bot state is RUNNING before allowing force exit
    severity: high
    kind: domain_rule
    modality: must
    consequence: Force exit when trader is stopped causes orders to be placed without proper state management
    stage_ids:
    - rpc_communication
  - id: finance-C-115
    when: When handling Telegram messages
    action: catch RPCException in handlers and send formatted message to user
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Uncaught RPCException in Telegram handlers causes silent failures where users receive no feedback on command
      errors
    stage_ids:
    - rpc_communication
  - id: finance-C-116
    when: When streaming analyzed dataframes via WebSocket
    action: enforce candle limit cap of 1500 per dataframe request
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unlimited dataframe streaming causes memory exhaustion and WebSocket timeouts when clients request large
      historical windows
    stage_ids:
    - rpc_communication
  - id: finance-C-118
    when: When executing forcebuy/forcesell via RPC
    action: require force_entry_enable configuration to be true
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Force trading without explicit configuration enablement violates operational safety practices, allowing uncontrolled
      manual intervention
    stage_ids:
    - rpc_communication
  - id: finance-C-119
    when: When implementing Telegram bot responses
    action: respond to /status, /profit, /balance commands with formatted messages
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Bot not responding to standard status commands prevents traders from monitoring their positions and performance
    stage_ids:
    - rpc_communication
  - id: finance-C-120
    when: When executing forcebuy/forcesell commands
    action: bypass normal signal processing and directly place orders
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Force commands using normal signal path may be blocked by protective mechanisms, failing to execute trader
      intentions
    stage_ids:
    - rpc_communication
  - id: finance-C-121
    when: When using RPC methods for state changes
    action: check current state before transitioning to avoid redundant operations
    severity: medium
    kind: domain_rule
    modality: must
    consequence: State transitions without pre-check cause redundant operations and potentially conflicting state management
    stage_ids:
    - rpc_communication
  - id: finance-C-122
    when: When checking max open trades before force entry
    action: enforce max_open_trades limit before allowing new positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Force entry exceeding max_open_trades violates trading capital management and causes over-leveraged positions
    stage_ids:
    - rpc_communication
  - id: finance-C-123
    when: When validating partial exit amounts
    action: verify remaining stake amount meets exchange minimum requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Partial exit with too small remaining amount causes exchange rejections and stuck orders
    stage_ids:
    - rpc_communication
  - id: finance-C-124
    when: When validating trade_id parameters
    action: verify trade exists in database before operations
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Operations on non-existent trades cause misleading error messages and potential database corruption
    stage_ids:
    - rpc_communication
  - id: finance-C-125
    when: When checking for existing open positions before force entry
    action: reject force entry if position already open (unless position_adjustment_enable)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Duplicate entries on same pair without position adjustment creates conflicting positions and accounting errors
    stage_ids:
    - rpc_communication
  - id: finance-C-126
    when: When handling canceled open orders
    action: reject cancel request if no open orders exist for trade
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Cancel request on trade without open orders causes misleading success messages and potential state confusion
    stage_ids:
    - rpc_communication
  - id: finance-C-127
    when: When streaming WebSocket messages
    action: check channel subscription before sending analyzed dataframe updates
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Broadcasting to unsubscribed channels wastes bandwidth and may expose sensitive data unnecessarily
    stage_ids:
    - rpc_communication
  - id: finance-C-128
    when: When sending Telegram messages
    action: respect message loudness settings (on/off/silent) before sending
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Ignoring message loudness settings causes unwanted notifications, especially during sensitive trading operations
    stage_ids:
    - rpc_communication
  - id: finance-C-129
    when: When handling trade status requests with no active trades
    action: raise RPCException with 'no active trade' message
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Silent return on empty trade status causes clients to misinterpret data, expecting empty array vs error state
    stage_ids:
    - rpc_communication
  - id: finance-C-130
    when: When implementing RPC communication for trading bots
    action: claim real-time capability for polling-based data delivery
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Presenting polling-based RPC data as real-time creates false expectations for latency-sensitive trading strategies
    stage_ids:
    - rpc_communication
  - id: finance-C-131
    when: When displaying balance and profit metrics
    action: present simulated balances as real exchange funds without dry_run indicator
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Showing simulated wallet balances without dry_run warning misleads traders about actual exchange holdings
    stage_ids:
    - rpc_communication
  - id: finance-C-132
    when: When logging and responding to RPC errors
    action: catch generic Exception and silently swallow RPC errors
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Silent exception swallowing prevents error diagnosis and hides critical failures from operators
    stage_ids:
    - rpc_communication
  - id: finance-C-134
    when: When initializing dry-run mode without explicit dry_run_wallet value
    action: default dry_run_wallet to 1000 units of stake currency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Accidental live trading may occur if dry_run_wallet is not set, causing real money loss with an empty or
      misconfigured wallet
    stage_ids:
    - configuration
  - id: finance-C-135
    when: When trailing_stop is enabled in configuration
    action: set trailing_stop_positive to 0 or set trailing_stop_positive_offset to a value less than or equal to trailing_stop_positive
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Trailing stop will fail to activate properly, causing orders to execute at incorrect profit levels or fail
      entirely
    stage_ids:
    - configuration
  - id: finance-C-138
    when: When loading nested config files via add_config_files
    action: exceed config include depth of 5 levels
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Config loop detection raises ConfigurationError, preventing bot startup
    stage_ids:
    - configuration
  - id: finance-C-139
    when: When executing commands that do not require existing configuration
    action: skip environment variable processing for NO_CONF_ALLOWED commands
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Commands like create-userdir, list-exchanges, new-strategy may fail or behave unexpectedly if env vars are
      processed without a config file present
    stage_ids:
    - configuration
  - id: finance-C-140
    when: When setting exchange credentials or secrets
    action: use environment variables with FREQTRADE__ prefix for sensitive configuration values
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Secrets in config files may be committed to version control, exposing API keys and enabling unauthorized
      exchange access
    stage_ids:
    - configuration
  - id: finance-C-141
    when: When processing environment variables for configuration
    action: convert environment variables with FREQTRADE__ prefix into nested dict structure following section__key pattern
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Environment variables with incorrect prefix or format are silently ignored, causing configuration gaps
    stage_ids:
    - configuration
  - id: finance-C-142
    when: When merging configuration from multiple sources
    action: 'apply deep merge with priority order: environment variables > CLI arguments > config files (last file wins)'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect merge order causes environment variables or CLI args to be overridden by config file values, leading
      to unexpected runtime behavior
    stage_ids:
    - configuration
  - id: finance-C-143
    when: When loading strategy list for backtesting
    action: create a deepcopy of config for each strategy to prevent strategy_list contamination between strategies
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without deepcopy, modifying one strategy's config affects all strategies in strategy_list, corrupting backtest
      results
    stage_ids:
    - configuration
  - id: finance-C-144
    when: When preserving original configuration for debugging
    action: store original_config using deepcopy to prevent reference sharing with modified config
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without deepcopy, modifications to config also modify original_config, eliminating ability to restore or
      debug original state
    stage_ids:
    - configuration
  - id: finance-C-145
    when: When validating configuration schema
    action: apply runmode-specific required field lists (SCHEMA_TRADE_REQUIRED, SCHEMA_BACKTEST_REQUIRED, SCHEMA_MINIMAL_REQUIRED)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing required fields for the current runmode cause ConfigurationError at startup, preventing trading operations
    stage_ids:
    - configuration
  - id: finance-C-146
    when: When presenting backtest results or dry-run trading outcomes
    action: claim that simulated results guarantee equivalent live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest and dry-run results do not account for slippage, exchange liquidity, network latency, and market
      impact that occur in live trading
    stage_ids:
    - configuration
  - id: finance-C-147
    when: When first deploying or testing the bot
    action: start in dry-run mode and verify expected behavior before engaging real capital
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Deploying directly to live trading without dry-run testing may result in immediate financial losses from
      misconfigured settings
    stage_ids:
    - configuration
  - id: finance-C-148
    when: When contributing code using AI assistance
    action: disclose AI usage in PR description and perform thorough human review before submission
    severity: medium
    kind: rationalization_guard
    modality: must
    consequence: Unreviewed AI-generated code may introduce subtle bugs, security vulnerabilities, or style violations that
      fail CI checks or cause production issues
    stage_ids:
    - configuration
  - id: finance-C-149
    when: When modifying configuration loading or validation logic
    action: run each unit tests after changes to verify config validation is not broken
    severity: high
    kind: rationalization_guard
    modality: must
    consequence: Breaking config validation may cause silent misconfigurations to pass through, leading to unexpected trading
      behavior or losses
    stage_ids:
    - configuration
  - id: finance-C-152
    when: When FreqAI appends predictions to the DataFrame
    action: append columns containing direction and confidence from ML model predictions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategy will not receive directional signals from ML predictions, causing FreqAI-enabled strategies to fail
      without prediction columns
    stage_ids:
    - ml_training_inference
    - strategy_analysis
  - id: finance-C-153
    when: When FreqAI requires strategy indicators for feature engineering
    action: pass the DataFrame through populate_indicators method before using for ML training
    severity: high
    kind: domain_rule
    modality: must
    consequence: ML model will train on raw OHLCV data without user-defined indicators, causing poor prediction quality and
      incorrect directional signals
    stage_ids:
    - strategy_analysis
    - ml_training_inference
  - id: finance-C-155
    when: When passing backtest results to hyperoptimization
    action: include complete trades list and equity curve for loss function calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hyperoptimization cannot compute loss metrics, causing optimization to fail without complete trade records
      and equity curve
    stage_ids:
    - order_execution
    - hyperoptimization
  - id: finance-C-156
    when: When loading hyperopt parameters into strategy for execution
    action: load optimal parameters from .json file via ft_load_hyper_params and apply to strategy attributes (minimal_roi,
      stoploss, trailing parameters)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategy will use default parameters instead of optimized ones, causing poor trading performance after hyperoptimization
    stage_ids:
    - hyperoptimization
    - strategy_analysis
  - id: finance-C-157
    when: When sending trade updates and order status through RPC
    action: send RPC messages with type ENTRY/ENTRY_FILL/ENTRY_CANCEL/EXIT/EXIT_FILL/EXIT_CANCEL containing trade and order
      state
    severity: high
    kind: domain_rule
    modality: must
    consequence: Users will not receive real-time notifications about trade state changes via Telegram or web UI, breaking
      operational awareness
    stage_ids:
    - order_execution
    - rpc_communication
  - id: finance-C-158
    when: When loading historical OHLCV data for backtesting
    action: load data with startup_candles >= strategy's startup_candle_count to verify indicators have sufficient history
    severity: high
    kind: domain_rule
    modality: must
    consequence: Indicators requiring historical data will compute incorrect values due to insufficient startup period, causing
      false entry/exit signals
    stage_ids:
    - data_ingestion
    - backtesting
  - id: finance-C-160
    when: When using VolumePairList in backtesting mode
    action: use VolumePairList as it introduces look-ahead bias in backtesting
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Backtest results will be artificially inflated because VolumePairList uses future volume data to select pairs,
      creating a look-ahead bias
    stage_ids:
    - configuration
    - data_ingestion
  - id: finance-C-161
    when: When backtesting with FreqAI enabled
    action: verify each strategies in strategy_list have identical feature_engineering_* functions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: FreqAI training will fail or produce incorrect results because models trained with different features cannot
      be compared across strategies
    stage_ids:
    - configuration
    - data_ingestion
  - id: finance-C-162
    when: When FreqAI strategies use pretrained models
    action: use identical feature set as the original model training or retrain from scratch
    severity: high
    kind: domain_rule
    modality: must
    consequence: Model predictions will be meaningless because features passed to a pretrained model must match the training
      feature set exactly
    stage_ids:
    - strategy_analysis
    - ml_training_inference
  - id: finance-C-163
    when: When passing validated config to data ingestion
    action: pass configuration through config_validation.validate_config_schema and validate_config_consistency before use
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bot will use invalid configuration parameters, causing runtime errors and unpredictable trading behavior
    stage_ids:
    - configuration
    - data_ingestion
  - id: finance-C-165
    when: When system clock is not NTP-synchronized
    action: run the bot in live trading mode without accurate system time
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Order timestamps and candle data will be incorrect, causing failed order placements and data mismatches with
      exchange records
    stage_ids:
    - order_execution
    - rpc_communication
  - id: finance-C-167
    when: When using FreqAI without understanding its sliding window paradigm
    action: skip understanding train_period_days and live_retrain_hours parameters
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: FreqAI model will be retrained at inappropriate intervals, causing either overfitting (too frequent) or stale
      predictions (too infrequent)
    stage_ids:
    - strategy_analysis
    - ml_training_inference
  - id: finance-C-168
    when: When optimizing hyperparameters with small epoch count
    action: expect reliable optimization results with fewer than recommended epochs
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Hyperoptimization will converge to suboptimal parameters due to insufficient exploration of the parameter
      space, leading to poor trading performance
    stage_ids:
    - order_execution
    - hyperoptimization
  - id: finance-C-169
    when: When strategy startup_candle_count is too small
    action: set startup_candle_count >= the longest indicator lookback period to verify valid signal computation
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Indicators will produce NaN or invalid values during startup period, causing incorrect entry/exit signals
      and financial losses
    stage_ids:
    - configuration
    - data_ingestion
  - id: finance-C-170
    when: When implementing strategies or validating data pipelines
    action: Use UTC timezone for each datetime operations via datetime.now(UTC) as specified in freqtrade/strategy/interface.py:8
    severity: high
    kind: domain_rule
    modality: must
    consequence: Trades and candles will have inconsistent timezone handling, causing incorrect pairing lock calculations,
      stale candle detection, and corrupted historical analysis across all trading modes
  - id: finance-C-174
    when: When defining minimal_roi dictionary in strategy
    action: Use duration keys in minutes and profit ratio values as specified in freqtrade/constants.py:71
    severity: high
    kind: domain_rule
    modality: must
    consequence: ROI exits will trigger at incorrect profit targets or fail to trigger, causing trades to hold positions far
      beyond intended profit targets
  - id: finance-C-175
    when: When representing time ranges for backtesting or data loading
    action: Use timestamps in seconds (not milliseconds) as defined in freqtrade/configuration/timerange.py:1
    severity: high
    kind: domain_rule
    modality: must
    consequence: TimeRange calculations will be off by factor of 1000, causing incorrect backtest date ranges and data loading
      failures
  - id: finance-C-176
    when: When validating trailing stoploss configuration
    action: Verify trailing_stop_positive_offset is strictly greater than trailing_stop_positive as validated in freqtrade/configuration/config_validation.py:146-150
    severity: high
    kind: domain_rule
    modality: must
    consequence: Trailing stoploss will never activate or will immediately trigger, defeating the purpose of trailing stop
      protection
  - id: finance-C-178
    when: When implementing strategy indicator processing
    action: Execute populate_indicators before populate_entry_trend, which executes before populate_exit_trend as enforced
      in freqtrade/strategy/interface.py:1202
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Entry/exit signals will use unprocessed or stale indicator data, causing incorrect trading signals and degraded
      strategy performance
  - id: finance-C-179
    when: When running freqtrade in live or dry-run mode
    action: Synchronize system clock to NTP server frequently enough to maintain accurate time as recommended in README.md:220
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Exchange API communication will fail due to timestamp verification errors; orders may be rejected or executed
      at wrong prices due to stale data
  - id: finance-C-180
    when: When configuring strategy with indicators
    action: Set startup_candle_count to at least the longest indicator lookback period to verify indicators calculate correctly
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Early trades will execute with incomplete or incorrect indicator values, producing invalid signals until
      warmup period completes
  - id: finance-C-181
    when: When presenting or reporting this system's backtested returns to users
    action: Claim that backtested returns equal expected live returns — backtesting ignores market impact, financing costs,
      and execution delays as stated in README.md:13-21
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users make live capital allocation decisions based on inflated backtest returns, leading to severe underperformance
      in live trading and potential financial loss
  - id: finance-C-182
    when: When presenting dry-run mode results as evidence of trading capability
    action: Claim that dry-run simulation results demonstrate live execution capability — dry-run uses simulated fills and
      wallet without real exchange order book dynamics
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users trust a system that has never executed real orders; when switching to live mode, execution quality
      may differ significantly due to real market conditions
  - id: finance-C-183
    when: When using freqtrade for any trading purpose
    action: Claim this system is suitable for stock trading, forex trading, or high-frequency scalping — freqtrade is designed
      for cryptocurrency spot and futures markets only
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy the system in unsuitable markets where exchange APIs, order types, and trading conventions differ,
      leading to operational failures and financial losses
  - id: finance-C-184
    when: When presenting hyperopt optimization results
    action: Claim hyperopt-optimized parameters are guaranteed to perform well on future data — hyperopt optimizes for historical
      data and risks overfitting
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users deploy overfitted strategies that perform well in backtests but fail catastrophically on live market
      data due to curve-fitting to historical noise
  - id: finance-C-186
    when: When backtesting with incomplete or discontinuous data
    action: Detect and report look-ahead bias using the built-in lookahead-analysis command as referenced in README.md:137
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Strategies will appear profitable in backtesting but fail in live trading due to using future information
      inadvertently, causing losses
  - id: finance-C-187
    when: When deploying to live trading without prior dry-run testing
    action: Bypass dry-run testing phase — users without dry-run experience may misconfigure the bot, leading to unintended
      real trades and financial loss
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Untested configurations cause orders at wrong prices, incorrect stake amounts, or trades on unintended pairs,
      resulting in immediate financial losses
  - id: finance-C-188
    when: When calculating profit and loss in backtesting mode
    action: Claim backtest PnL equals real trading profitability — backtesting uses simplified fee models and assumes instant
      fill at candle close prices
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Real trading incurs maker/taker fee differences, slippage from order book depth, and partial fills that significantly
      reduce actual profitability vs backtested results
  - id: finance-C-189
    when: When configuring FreqAI machine learning models
    action: Set startup_candle_count >= 300 for FreqAI strategies as required for model training data preparation as seen
      in tests/freqai/test_freqai_backtesting.py
    severity: high
    kind: operational_lesson
    modality: must
    consequence: FreqAI models will train on insufficient historical data, producing poorly calibrated predictions that fail
      to generalize to live market conditions
  - id: finance-C-192
    when: When implementing strategy signal generation logic
    action: Respect startup_candle_count warmup period before activating indicator-based signals — verify no trading signals
      are generated until the warmup period has elapsed
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without startup_candle_count warmup, indicators produce garbage values from insufficient historical data,
      generating false signals that cause the strategy to enter incorrect positions with real capital
    derived_from_bd_id: BD-011
  - id: finance-C-193
    when: When implementing feature engineering or ML data preprocessing classes
    action: Maintain DataKitchen as pair-scoped ephemeral state and DataDrawer as persistent cross-run state — do not merge
      into a single class or make DataKitchen persistent
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Merging DataKitchen and DataDrawer would cause per-pair feature engineering state to persist across pairs,
      contaminating multi-pair strategies with cross-contaminated features and producing incorrect model predictions
    derived_from_bd_id: BD-015
  - id: finance-C-194
    when: When implementing entry order execution logic
    action: Block execute_entry until order fill — the function must return immediately after placing the order to allow concurrent
      in-flight orders
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Blocking until fill serializes all entry orders, preventing concurrent position establishment across multiple
      pairs and reducing capital efficiency by forcing sequential order waiting
    derived_from_bd_id: BD-022
  - id: finance-C-195
    when: When processing candle data for futures markets with funding rate or mark price data
    action: Separate candle types using CandleType enum — verify SPOT price candles are not conflated with FUNDING_RATE or
      MARK candles during data ingestion and indicator calculation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mixing candle types produces incorrect technical indicators with wrong price semantics and update frequencies,
      causing strategies to generate signals based on funding rate data instead of spot prices
    derived_from_bd_id: BD-004
  - id: finance-C-199
    when: When configuring hyperopt loss functions for strategy optimization
    action: Verify the selected loss function matches the desired risk profile — Sharpe for return vs volatility balance,
      Sortino for downside protection, Calmar for drawdown recovery, MaxDrawDown for capital preservation, OnlyProfit for
      return-only focus
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using OnlyProfit loss function ignores risk entirely, optimizing toward strategies that may have extreme
      drawdowns, while using Sharpe may penalize high-return strategies with acceptable volatility
    derived_from_bd_id: BD-062
  - id: finance-C-201
    when: When configuring ROI exit behavior in strategy code
    action: Change ignore_roi_if_entry_signal from False to True — ROI timers must continue tracking even when exit signals
      fire to prevent premature exits from conflicting signals
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Setting ignore_roi_if_entry_signal=True causes exit signals to reset ROI timers prematurely, leading to positions
      exiting before reaching profit targets when conflicting technical indicators fire
    derived_from_bd_id: BD-084
  - id: finance-C-202
    when: When defining entry signal logic in strategy populate_entry_trend method
    action: 'Require each four conditions simultaneously: RSI crossing above buy_rsi threshold, TEMA below Bollinger middle
      band, TEMA rising, and volume greater than zero — short-circuiting any condition changes the entry signal behavior'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing or weakening any entry condition (RSI, TEMA/BB position, TEMA direction, volume) causes the strategy
      to enter positions under different market conditions than backtested, producing unreproducible results
    derived_from_bd_id: BD-055
  - id: finance-C-203
    when: When implementing short position entry logic in populate_entry_trend
    action: 'Implement short entries using mirror-image conditions: RSI above short_rsi threshold and TEMA falling — this
      inverted logic enables bidirectional trading during downtrends'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing or altering short entry conditions causes the strategy to miss bearish opportunities or enter shorts
      under incorrect conditions, breaking the bidirectional trading assumption
    derived_from_bd_id: BD-057
  - id: finance-C-204
    when: When configuring backtest cache settings for strategy optimization
    action: Verify that BACKTEST_CACHE_DEFAULT='day' matches your strategy's update frequency — stale cached results may persist
      across weekend gaps causing misleading optimization decisions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: One-day backtest cache may cause stale results to be reused when optimizing strategies with frequent parameter
      changes, leading to overfitted parameters based on outdated market conditions
    derived_from_bd_id: BD-058
  - id: finance-C-205
    when: When selecting transformer architecture for time series forecasting models
    action: Verify positional encoding is included when using Transformer architecture for time series — positional encoding
      is required to preserve temporal order information in self-attention mechanisms
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Transformer without positional encoding treats time series as unordered sets, losing critical temporal sequence
      information and producing predictions that ignore order-dependent market patterns
    derived_from_bd_id: BD-100
  - id: finance-C-206
    when: When selecting ensemble learning classifiers for trading signal prediction
    action: Verify that ensemble methods like Random Forest use proper cross-validation with time-series splits — the algorithm's
      variance reduction benefits require stable feature distributions across training folds
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Random Forest trained with standard K-fold cross-validation on non-stationary financial data creates trees
      that overfit to historical patterns, producing live trading signals that diverge significantly from backtested predictions
    derived_from_bd_id: BD-107
  - id: finance-C-208
    when: When configuring strategy minimal_roi parameter for profit-taking
    action: Explicitly configure minimal_roi dictionary if profit-target exits are required — the default empty dict {} disables
      ROI-based exits; if no ROI is configured, positions will be held indefinitely unless stoploss or exit signals trigger
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Strategies relying on implicit ROI profit targets but failing to configure minimal_roi will hold positions
      indefinitely, missing profit-taking opportunities and accumulating larger drawdowns than expected from backtests
    derived_from_bd_id: BD-123
  - id: finance-C-209
    when: When implementing RL reward calculation logic in Freqtrade backtesting
    action: Calculate reward based on unrealized profit (current position value minus entry cost) rather than realized profit
      — this provides immediate feedback aligning agent incentives with trading objectives
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using realized profit instead of unrealized profit delays learning feedback, causing the RL agent to learn
      suboptimal trading patterns that don't respond quickly to market changes
    derived_from_bd_id: BD-102
  - id: finance-C-210
    when: When initializing dry-run wallet for backtesting simulations
    action: Verify that dry_run_wallet starting balance matches intended backtest capital; if testing with different capital,
      explicitly override DRY_RUN_WALLET in configuration rather than relying on the 1000-unit default
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using the 1000-unit default for strategies designed around different capital bases causes position sizing
      to be incorrect, producing misleading profit/loss percentages and unrealistic drawdown calculations
    derived_from_bd_id: BD-060
  - id: finance-C-211
    when: When configuring stake amount for position sizing in trading strategies
    action: Verify that the 5% default reserve (DEFAULT_AMOUNT_RESERVE_PERCENT) matches your exchange's actual minimum order
      requirements and fee structures; adjust if trading assets with higher minimums or lower liquidity
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: The 5% reserve may be insufficient for exchanges with high minimum order amounts, causing insufficient funds
      errors and preventing trade execution during volatile market conditions
    derived_from_bd_id: BD-061
  - id: finance-C-212
    when: When configuring trailing stop parameters in Freqtrade strategies
    action: Verify trailing_stop_positive_offset is strictly greater than trailing_stop_positive (offset > positive, NOT >=)
      — the config validation raises ConfigurationError for tsl_offset <= tsl_positive
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting offset equal to or less than the trailing stop trigger causes immediate trailing stop activation,
      exiting positions at the first favorable price movement without capturing any profit
    derived_from_bd_id: BD-125
  - id: finance-C-213
    when: When implementing or refactoring the FreqtradeBot main loop execution order
    action: 'Preserve the exact execution sequence: check_open_trades → analyze_pairs → enter_positions → handle_open_trades
      → exit_positions — this order ensures PairLocks/exclusions are checked before create_trade and newly entered positions
      don''t immediately trigger exit logic'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the execution order causes race conditions where newly entered positions bypass PairLock exclusions,
      potentially creating conflicting trades or violating trading frequency constraints
    derived_from_bd_id: BD-126
  - id: finance-C-214
    when: When migrating or maintaining trading strategies in Freqtrade
    action: Use strategy interface v1 (2-argument populate methods without metadata dict) — this version is no longer supported
      and raises OperationalException; strategies must use v3 with metadata dict as third argument
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Attempting to use v1 strategy interface causes OperationalException, breaking strategy loading and preventing
      any backtesting or live trading from executing
    derived_from_bd_id: BD-128
  - id: finance-C-215
    when: When configuring model training in FreqAI backtesting
    action: Verify that train_period_days parameter matches the intended historical data window for model training — shorter
      windows capture recent market regimes but risk overfitting to noise, while longer windows may blend contradictory patterns
      from different market conditions
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect train_period_days causes model to train on mismatched historical data, leading to backtest results
      that do not reflect live trading performance; strategies optimized on wrong windows will fail when market regimes shift
    derived_from_bd_id: BD-069
  - id: finance-C-216
    when: When setting up FreqAI indicator warmup periods
    action: Verify that the framework applies a 1.5x multiplier to startup candles for indicator warmup — this safety factor
      ensures indicators have sufficient data without edge-case NaN values in model features
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without the 1.5x safety factor, indicators may have insufficient warmup data causing NaN values in model
      features, leading to model training failures or corrupted predictions that produce incorrect trading signals
    derived_from_bd_id: BD-070
  - id: finance-C-217
    when: When configuring Reinforcement Learning reward function in FreqAI
    action: 'Verify that RL reward values match the intended trading behavior: +25 for trade entry, -2 for invalid actions,
      -1 for neutral/hold — asymmetric reward shaping prioritizes trade execution over neutrality while penalizing forbidden
      states'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect reward function parameters cause RL agent to optimize for unintended behavior — underweighting
      entry rewards makes agent hesitant while overweighting penalties causes excessive idleness, leading to strategies that
      miss profitable opportunities
    derived_from_bd_id: BD-071
  - id: finance-C-220
    when: When configuring exit signal behavior in FreqAI strategies
    action: Verify that use_exit_signal and exit_profit_only defaults match strategy requirements — use_exit_signal=True allows
      exits on any signal while exit_profit_only=False allows exits regardless of profit state; explicitly configure these
      if conservative exit behavior is needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Relying on default exit signal behavior causes positions to exit even when unprofitable if use_exit_signal=True
      and exit_profit_only=False — strategies may close positions at losses instead of waiting for profit conditions
    derived_from_bd_id: BD-130
  - id: finance-C-222
    when: When configuring RL training with the framework's default max_trade_duration parameter
    action: Verify that max_trade_duration=300 candles and reward_factor=1.5 match the strategy's expected holding period
      and risk profile; adjust based on timeframe (e.g., 1h candles may need longer duration than 5m candles)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default RL parameters without verification causes the agent to optimize for 300-candle holding windows,
      which may be too short or long for the strategy's timeframe, leading to suboptimal trade timing and reduced returns
      in live trading
    derived_from_bd_id: BD-072
  - id: finance-C-223
    when: When configuring RL reward parameters for trade training
    action: Verify that win_reward_factor=2.0 aligns with the strategy's profit_aim and risk-reward ratio targets; the 2x
      bonus for meeting risk-reward thresholds should match actual trading objectives
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without verifying the reward factor, the RL agent may prioritize trades that achieve profit_aim with risk-reward
      over other profitable patterns, causing behavioral drift that leads to missed opportunities or excessive risk-taking
      in live trading
    derived_from_bd_id: BD-073
  - id: finance-C-226
    when: When using tick size precision data for order sizing or price filtering
    action: Assume tick_size precision is accurate at per-candle granularity — the framework uses monthly maximum aggregation,
      which smooths temporary precision spikes but loses accuracy when precision degrades permanently within a month
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Relying on candle-level tick size precision causes incorrect order sizing when temporary exchange corrections
      inflate precision readings, leading to orders that violate exchange minimum tick requirements or fail due to precision
      mismatches
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-227
    when: When performing precise order sizing or price calculations in backtesting
    action: Use the monthly tick_size maximum rather than per-candle values, and implement validation to detect permanent
      precision degradation within a month (e.g., compare weekly averages against monthly maximum to identify sustained changes)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without awareness of the monthly aggregation approach, calculations may use inflated precision values that
      don't reflect actual exchange tick sizes, causing order rejections or incorrect sizing that accumulates over many trades
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-228
    when: When configuring multiple protection plugins with different lock scopes
    action: Verify protection plugin configurations are compatible — specifically verify that global_stop cooldown periods
      are longer than stop_per_pair drawdown lock durations; conflicting configurations cause undefined lock behavior
    severity: high
    kind: domain_rule
    modality: must
    consequence: When global cooldown is shorter than per-pair drawdown lock, the pair remains locked even after global cooldown
      expires, causing missed trading opportunities; conversely, shorter per-pair locks allow re-entry before global protection
      fully expires
    derived_from_bd_id: BD-GAP-007
  - id: finance-C-231
    when: When implementing multi-pair trading logic with async order placement
    action: Maintain sequential trade processing within each iteration to verify safe single-threaded state modification,
      while allowing concurrent order placement via async entry returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing to parallel processing breaks the thread-safety guarantee that prevents race conditions in shared
      state modification during order status updates
    derived_from_bd_id: BD-151
  - id: finance-C-232
    when: When implementing or modifying WebSocket channel throttling logic
    action: Monitor avg_send_time for zero values during disconnect scenarios and implement fallback logic to prevent division-by-zero
      errors in _calc_send_limit
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: When avg_send_time is zeroed by disconnects, the calculated send limit becomes infinite, causing adaptive
      throttling to fail and potentially blocking fast clients
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-233
    when: When implementing strategy name verification logic
    action: Reject strategy names that are purely base64-encoded without also implementing an allowlist of allowed characters
      or mandatory strategy file existence check
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Binary rejection of base64-encoded names blocks legitimate strategies with base64-like naming conventions,
      preventing valid strategy uploads
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-234
    when: When configuring REST client connection pooling for high-concurrency scenarios
    action: Monitor pool utilization and dynamically adjust pool_connections and pool_maxsize beyond the default of 10 when
      concurrency increases, or implement connection timeout handling for pool saturation scenarios
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: With pool_connections=10 and pool_maxsize=10, high-concurrency scenarios cause connection saturation, leading
      to request queuing or timeout failures in live trading API calls
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-235
    when: When modifying JSON serialization for API responses or implementing new logging output
    action: Replace rapidjson with a strict JSON encoder without also updating downstream parsers to handle NaN/Inf values,
      as JS-compatible serialization prevents malformed response errors
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Strict JSON encoders that reject NaN/Inf cause serialization errors in API responses, leading to failed downstream
      parsing and broken client integrations
    derived_from_bd_id: BD-GAP-014
  - id: finance-C-236
    when: When implementing feature preprocessing for ML training or inference
    action: Use the datasieve pipeline abstraction (freqtrade/freqai/freqai_interface.py define_data_pipeline) to verify consistent
      preprocessing at training and inference time — do not apply manual preprocessing transforms directly on raw data
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without pipeline abstraction, preprocessing differences between train and inference code paths cause train-test
      distribution shift, leading to models that perform well in backtesting but fail in live trading
    derived_from_bd_id: BD-018
  - id: finance-C-237
    when: When storing OHLCV price data in memory during backtesting or live trading
    action: Use float32 data type for OHLCV columns — float32 provides sufficient decimal precision for price data while reducing
      memory footprint by ~50% compared to float64
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using float64 unnecessarily doubles memory consumption, causing out-of-memory errors on large historical
      datasets; using float16 causes accumulated rounding errors in profit calculations, distorting strategy performance metrics
    derived_from_bd_id: BD-002
  - id: finance-C-238
    when: When processing financial data where currency precision matters
    action: Assume the framework handles currency precision correctly using float types — the framework lacks explicit Decimal
      handling for monetary values, causing potential floating-point rounding errors in currency calculations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using float for currency operations introduces binary floating-point representation errors (e.g., 0.1 + 0.2
      != 0.3), causing silent discrepancies in profit calculations and account balance tracking that accumulate over many
      transactions
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-239
    when: When implementing any currency or monetary value handling in the trading system
    action: Use Python Decimal type with explicit precision context for each currency calculations — convert float price data
      to Decimal before monetary arithmetic, and format output as string to avoid float representation issues
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit Decimal handling, currency calculations suffer from float rounding errors that cause account
      balance discrepancies, incorrect P&L reporting, and potential margin calculation failures in live trading
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-241
    when: When implementing or interpreting entry signals in strategy analysis
    action: Encode entry signals using the {-1, 0, 1} scheme where -1=short, 0=none, 1=long — this compact integer representation
      enables vectorized pandas operations across entire DataFrames without row-by-row iteration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the signal encoding scheme without updating all consuming code breaks signal interpretation throughout
      the strategy pipeline, causing positions to be taken in wrong directions or at wrong times
    derived_from_bd_id: BD-013
  - id: finance-C-242
    when: When implementing or refactoring dataframe processing logic in data_ingestion
    action: Verify dataframe columns are ordered as [date, open, high, low, close, volume] matching DEFAULT_DATAFRAME_COLUMNS
      — use named column access or verify column order before vectorized operations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reordering or renaming columns without updating all downstream consumers breaks vectorized data access patterns,
      causing strategies to use wrong price data (e.g., reading volume as close price), silently corrupting signals
    derived_from_bd_id: BD-001
  - id: finance-C-244
    when: When downloading or extending historical data for backtesting
    action: Use prepend mode when available to extend historical datasets with newly available older data — verify exchange
      supports backfill and check for existing data gaps before appending
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Missing prepend mode causes backtest to have data gaps when exchanges extend historical availability, making
      long-term backtesting inaccurate and potentially causing strategies to trade on stale signals
    derived_from_bd_id: BD-006
  - id: finance-C-245
    when: When configuring or implementing machine learning model training pipelines
    action: Call check_if_new_training_required() to determine retraining need rather than continuous retraining — verify
      training threshold configuration matches market volatility characteristics
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Continuous model retraining wastes compute resources and causes overfitting to recent market noise, degrading
      live trading performance below backtested results
    derived_from_bd_id: BD-016
  - id: finance-C-246
    when: When implementing strategies that use cross-pair indicators or correlated asset data
    action: Define informative_pairs() to cache correlated pair data at strategy initialization — avoid fetching or recalculating
      the same indicators multiple times per trading pair
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Without informative_pairs(), strategies recalculate correlated pair indicators N times for N trading pairs,
      causing excessive API calls to exchange and significant latency in hot-path execution
    derived_from_bd_id: BD-009
  - id: finance-C-247
    when: When configuring stoploss_on_exchange=True in strategy or bot settings
    action: Verify exchange OCO order support via exchange._ft_has_default('stoploss_on_exchange') capability check before
      enabling exchange-managed stops
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without OCO capability verification, the bot falls back to client-side stop monitoring during network issues,
      causing increased polling overhead, API rate limit violations, and potential slippage from delayed stop placement
    derived_from_bd_id: BD-024
  - id: finance-C-248
    when: When performing sliding window backtesting using historic predictions loaded from disk
    action: Validate model training configuration metadata (feature columns, lookback period, model type) matches current
      backtest configuration before using loaded predictions — verify no staleness or configuration drift occurred between
      prediction generation and backtest execution
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without configuration metadata validation, predictions generated with different model training settings are
      loaded and applied to incompatible backtest scenarios, causing backtest results to diverge silently from true strategy
      performance
    derived_from_bd_id: BD-019
  - id: finance-C-249
    when: When implementing trade processing logic in handle_trade
    action: Process trades sequentially one at a time and evaluate each exits through centralized should_exit function — do
      not introduce parallel or concurrent trade processing that modifies shared state simultaneously
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Concurrent trade processing introduces race conditions when modifying shared trade state, potentially causing
      deadlocks during order status updates or incorrect exit decisions due to inconsistent priority ordering
    derived_from_bd_id: BD-023
  - id: finance-C-250
    when: When implementing FreqAI strategy lifecycle hooks or extending the FreqAI framework
    action: 'Follow the strict lifecycle sequence: set_pair_dict_info → start_live/start_backtesting → extract_data_and_train
      → predict → remove_features_from_df. Do not skip, reorder, or parallelize any step in this sequence.'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping feature cleanup causes memory leaks in persistent training loops. Reordering extract_data_and_train
      before start_live causes model training on empty data, producing invalid predictions with no obvious error messages.
    derived_from_bd_id: BD-144
  - id: finance-C-251
    when: When running backtesting with default test_size=0 for performance optimization
    action: Set test_size > 0 to enable model degradation detection; if using test_size=0 for hyperopt speed, explicitly document
      that model validation is disabled and add external monitoring for live deployment
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Backtest shows profitable strategies with fee-inclusive calculations but provides zero warning when models
      overfit to training data. Live trading results diverge silently from backtested results with no backtest-level indication
      of degradation.
    derived_from_bd_id: BD-148
  - id: finance-C-252
    when: When implementing or refactoring trade data models in backtesting
    action: 'Maintain Trade-to-Order one-to-many relationship: a Trade object must be able to contain multiple Order records
      representing entries, exits, partial fills, order replacements, and DCA adjustments'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Collapsing to single-order-per-trade loses critical audit trail for partial fills, order replacements, and
      DCA adjustments, making trade reconstruction impossible and hiding execution details that affect profit calculations.
    derived_from_bd_id: BD-027
  - id: finance-C-253
    when: When implementing or replacing profit calculation logic in order execution
    action: Include each trading fees (maker/taker fees, stamp duty, transfer fees) in the final profit calculation via calc_profit;
      net profit must reflect actual realized returns after costs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fee-exclusive profit calculations give unrealistic performance estimates that significantly diverge from
      actual trading returns, especially for high-frequency strategies where fees compound across hundreds of daily trades.
    derived_from_bd_id: BD-028
  - id: finance-C-254
    when: When configuring pairlists for backtesting
    action: Use VolumePairList in backtesting configurations; if VolumePairList is detected during backtest initialization,
      it must be replaced or the backtest must abort with explicit error
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: VolumePairList requires live exchange data unavailable during backtesting, producing invalid pair rankings
      that diverge from live execution and creating false confidence in backtested pair selection strategies.
    derived_from_bd_id: BD-033
  - id: finance-C-255
    when: When configuring pairlists for multi-strategy backtesting
    action: Use PrecisionFilter only in single-strategy backtesting; for multi-strategy configurations, replace PrecisionFilter
      with alternative pairlist or disable sorting-dependent filtering
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: PrecisionFilter maintains stateful sorting that cannot be properly initialized from historical candles in
      multi-strategy scenarios, causing inconsistent pair rankings between backtest and live execution.
    derived_from_bd_id: BD-033
  - id: finance-C-256
    when: When configuring the trading framework for dry-run or live mode backtesting
    action: Verify that dry_run_wallet=1000 default aligns with intended strategy capital sizing; when transitioning to live
      trading, explicitly configure the actual wallet amount to match real capital constraints
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Strategies optimized with DRY_RUN_WALLET=1000 default may be calibrated to incorrect position sizing ratios;
      in live trading with different capital, risk management parameters become misaligned, causing either excessive risk
      exposure or suboptimal capital utilization
    derived_from_bd_id: BD-044
  - id: finance-C-257
    when: When implementing or modifying strategies that use position_adjustment_enable for dollar-cost averaging
    action: Verify that adjust_trade_position hook is properly configured and DCA parameters (maximum additional position
      size, DCA triggers) are explicitly set; strategies relying on DCA behavior will produce materially different results
      if this capability is disabled or misconfigured
    severity: high
    kind: operational_lesson
    modality: must
    consequence: DCA-enabled strategies exhibit different equity curves than fixed-position strategies; disabling position_adjustment_enable
      without adjusting position sizing will cause backtest-live divergence where live trading fails to match expected average-down
      behavior
    derived_from_bd_id: BD-025
  - id: finance-C-258
    when: When configuring RSI hyperparameters for hyperopt optimization
    action: Verify RSI buy zone bounds (1-50) and sell zone bounds (50-100) maintain no overlap, with buy thresholds strictly
      below 50 and sell thresholds strictly above 50 to prevent contradictory signals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Overlapping RSI buy/sell zones cause contradictory signals where the same price level triggers both buy and
      sell, leading to excessive trading, commission waste, and losses in both backtesting and live trading
    derived_from_bd_id: BD-049
  - id: finance-C-259
    when: When calculating Calmar ratio for strategy evaluation
    action: Calculate Calmar ratio as total_return divided by absolute_max_drawdown, where total_return is cumulative return
      and max_drawdown is the maximum peak-to-trough decline over the evaluation period
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using annualized return in Calmar ratio creates inconsistent comparisons between strategies with different
      evaluation periods, overstating performance for short evaluation windows and leading to suboptimal strategy selection
    derived_from_bd_id: BD-089
  - id: finance-C-261
    when: When implementing dashboard integration for live dataframe updates
    action: Use WebSocket push-based updates for analyzed_dataframe stream instead of REST polling; implement reconnection
      logic and buffer data during connection drops to maintain dashboard accuracy
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Polling-based status queries create higher API load and visible lag in dashboard updates, reducing the effectiveness
      of real-time monitoring and delaying trader awareness of signal changes
    derived_from_bd_id: BD-040
  - id: finance-C-262
    when: When modifying configuration during runtime via environment variables or CLI commands
    action: Preserve original_config separately from current runtime config; use the preserved copy for rollback when runtime
      changes fail, ensuring recovery without requiring bot restart
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Missing original_config preservation prevents recovery from bad configuration changes, requiring full bot
      restart and losing the ability to rollback to known-good state, causing operational disruption during live trading
    derived_from_bd_id: BD-042
  - id: finance-C-263
    when: When implementing or modifying hyperopt loss functions that optimize Calmar ratio
    action: Return -calmar_ratio (negative) to achieve maximization through minimization — the Freqtrade hyperopt framework
      minimizes loss, so Calmar must be negated to select for higher Calmar values
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without negation, the optimizer minimizes Calmar ratio, selecting strategies with worst risk-adjusted returns
      instead of best — backtested optimal parameters will underperform live trading
    derived_from_bd_id: BD-080
  - id: finance-C-264
    when: When implementing custom exit signal logic in trading strategies
    action: Enable use_exit_signal=True to allow custom exit signals to trigger exits independently of ROI targets — do not
      disable or override this flag without explicit strategy justification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Disabling use_exit_signal prevents technical indicator-based exits from closing positions early during momentum
      reversals, causing strategies to hold through adverse moves and miss profit opportunities
    derived_from_bd_id: BD-082
  - id: finance-C-265
    when: When configuring exit conditions for trading strategies
    action: Maintain exit_profit_only=False to allow exits when technical signals warrant even if below ROI target — the exit
      signal takes precedence over profit targets for loss prevention
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting exit_profit_only=True forces adherence to ROI targets, causing positions to hold through adverse
      technical conditions that warrant early exit, accumulating larger losses than anticipated in backtests
    derived_from_bd_id: BD-083
  - id: finance-C-266
    when: When configuring order type parameters for trading strategies
    action: Use limit orders for entry and exit with market stoploss — do not replace stoploss with limit orders; market stoploss
      ensures execution certainty during gap-down events at the cost of potential slippage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using limit orders for stoploss risks non-execution during sudden gap-down events, leaving positions unprotected
      when prices skip past the limit price, causing losses far exceeding backtested expectations
    derived_from_bd_id: BD-050
  - id: finance-C-267
    when: When setting startup_candle_count for strategies using long-period indicators
    action: Verify that startup_candle_count=200 provides sufficient warmup for the slowest indicator (MACD with 26-period
      default) — adjust upward if custom indicators require longer initialization periods
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Insufficient startup candles cause indicators to generate signals during the warmup period when values are
      unreliable, producing trades based on incomplete data that systematically underperform during initial strategy deployment
    derived_from_bd_id: BD-053
  - id: finance-C-268
    when: When configuring VolumePairList in backtesting or live trading
    action: Verify that number_assets=30 matches the strategy's diversification requirements; adjust based on available capital
      and risk tolerance (e.g., use higher values for large capital, lower for small capital to avoid excessive position dilution)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default of 30 pairs may overdiversify small capital accounts (diluting returns per trade) or underdiversify
      large accounts (concentration risk), causing backtest results to not match live trading performance
    derived_from_bd_id: BD-075
  - id: finance-C-269
    when: When configuring VolumePairList refresh intervals in backtesting or live trading
    action: Verify that refresh_period=1800 (30 minutes) aligns with the strategy's trading frequency; for high-frequency
      strategies trading on short timeframes, use shorter refresh periods to verify pairlist reflects current market volume
      conditions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 30-minute refresh creates stale pairlists in fast-moving markets, causing the strategy to trade on
      outdated volume rankings and miss significant market structure changes, leading to suboptimal trade selection
    derived_from_bd_id: BD-076
  - id: finance-C-270
    when: When using Bollinger Bands for volatility-based entry signals in strategy development
    action: 'Verify that bollinger_bands parameters match the intended trading logic: window=20 aligns with approximately
      monthly trading days, and stds=2 captures ~95% price distribution under normal conditions; adjust parameters only after
      backtesting multiple configurations'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using incorrect Bollinger Bands parameters (wrong window or std) causes the strategy to generate entry/exit
      signals at wrong price levels, systematically trading against mean reversion or breakout expectations
    derived_from_bd_id: BD-077
  - id: finance-C-271
    when: When implementing cooldown protection logic in trading strategies
    action: Use max(unlock_time, stop_duration) to determine lock end time — the cooldown duration must unlock based on whichever
      condition is satisfied later; verify either time-based or candle-based unlocking is properly configured
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect cooldown unlock logic causes premature re-entry into positions after losses, violating the intended
      protection mechanism and amplifying drawdowns in losing streaks
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-272
    when: When configuring position adjustment (DCA/grid trading) in strategy settings
    action: Set position_adjustment_enable=True to enable DCA; set max_entry_position_adjustment to a finite positive value
      (e.g., 2-5) to limit additional entries — default -1 means unlimited entries which can accumulate excessive positions
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Leaving position_adjustment_enable=False prevents intentional position building; setting max_entry_position_adjustment=-1
      allows unlimited DCA entries that can accumulate into positions far exceeding risk tolerance, causing catastrophic losses
      in volatile markets
    derived_from_bd_id: BD-140
  - id: finance-C-273
    when: When resolving strategy configuration attributes during bot initialization
    action: 'Follow the three-tier attribute override precedence: config values override strategy attributes, which override
      hardcoded defaults — debug configuration issues by tracing this cascade'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Ignoring the attribute precedence precedence causes configuration values to be silently overridden, leading
      to strategies using unexpected parameter values and producing backtest results that differ from live trading
    derived_from_bd_id: BD-142
  - id: finance-C-274
    when: When defining order types in strategy configuration
    action: 'Verify each four required order types are defined in the strategy or config: ''entry'', ''exit'', ''stoploss'',
      ''stoploss_on_exchange'' — validation checks each four exist before strategy loading'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing any required order type causes strategy validation to fail at startup, preventing the bot from loading
      and trading; runtime errors occur if order placement is attempted without proper type definitions
    derived_from_bd_id: BD-145
  - id: finance-C-275
    when: When implementing custom strategies that add or modify indicator columns
    action: Verify columns are populated at the exact positions expected by the hardcoded index access in entry/exit methods
      — do not reorder, rename, or add columns at positions that would shift the expected index values
    severity: high
    kind: domain_rule
    modality: must
    consequence: Custom strategies that add columns in wrong positions will silently produce incorrect trading signals because
      the hardcoded column index access will retrieve wrong data, leading to incorrect entry/exit decisions that don't match
      the intended strategy logic
    derived_from_bd_id: BD-152
  - id: finance-C-276
    when: When using the framework's default MACD parameters for backtesting
    action: Verify that MACD parameters (fast=12, slow=26, signal=9) match the strategy's intended market behavior and asset
      class; do not assume these defaults are optimal — document why these values were chosen or selected
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default MACD parameters without verification may produce backtest results that do not reflect the strategy's
      true performance, as different asset classes and market conditions require different EMA lookback periods
    derived_from_bd_id: BD-078
  - id: finance-C-277
    when: When modifying the sample strategy or configuring trading mode
    action: Disable can_short safety default for spot trading strategies — short selling requires proper margin configuration
      that may not be available on each exchanges and introduces leverage risk for beginners
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Enabling short selling without proper margin configuration could cause the strategy to attempt short positions
      that are rejected or executed with unintended leverage, creating backtest-live inconsistency and potential margin calls
    derived_from_bd_id: BD-085
  - id: finance-C-278
    when: When configuring fee parameters for backtesting accuracy
    action: Verify that 'worst-case' fee selection matches your actual exchange fee tier and rebate structure; document the
      specific fee values used and compare against real trading confirmations to verify backtest realism
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Worst-case fee assumption may not match actual trading costs; high-volume traders with fee rebates face different
      economics than the worst-case assumption, leading to strategies that appear profitable in backtest but underperform
      live
    derived_from_bd_id: BD-121
  - id: finance-C-280
    when: When configuring a strategy that requires real-time indicator updates on every price tick
    action: Verify that process_only_new_candles=True matches strategy requirements; for high-frequency strategies requiring
      indicator recalculation on every update, set to False explicitly
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Strategies expecting real-time indicator updates will use stale indicator values when process_only_new_candles
      defaults to True, causing entry/exit signals to fire with outdated data and significantly degrading backtest accuracy
    derived_from_bd_id: BD-135
  - id: finance-C-281
    when: When implementing or migrating populate_buy_trend, populate_sell_trend, or populate_indicators methods in a custom
      strategy
    action: Verify INTERFACE_VERSION=3 is explicitly set or accept the default; when using INTERFACE_VERSION=2 strategies,
      include metadata dict as the third argument to each populate_* methods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using v2 interface without metadata dict causes runtime errors or silent data corruption in backtesting,
      as the method signature differs from v3 and Freqtrade expects different argument counts
    derived_from_bd_id: BD-146
  - id: finance-C-282
    when: When configuring a FreqAI-enabled strategy with custom startup_candle_count
    action: Verify that startup_candle_count is greater than or equal to the FreqAI expected warmup period (max_period * 1.5);
      if custom startup_candle_count is smaller, explicitly set it to max_period * 1.5 or higher to avoid feature NaN values
      in training data
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Strategies with startup_candle_count smaller than FreqAI's max_period * 1.5 calculation will have insufficient
      historical data for model features, producing NaN values in training data that silently corrupt model training without
      explicit error messages
    derived_from_bd_id: BD-149
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
