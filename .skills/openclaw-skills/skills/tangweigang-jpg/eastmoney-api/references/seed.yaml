resources:
  packages:
  - name: pandas
    version_pin: ==1.5.3
  - name: numpy
    version_pin: ==1.24.4
  - name: matplotlib
    version_pin: '>=2'
  - name: requests
    version_pin: ==2.31.0
  - name: scipy
    version_pin: '>=1.3.0'
  - name: scikit-learn
    version_pin: '>1.4.2'
  - name: pytest
    version_pin: '>=8.3'
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-004
    when: When calling TuShare Pro API
    action: Enforce rate limiting with sliding window algorithm before each API call using rate_limiter.acquire()
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Exceeding TuShare rate limits (120 calls/minute for free tier) will trigger API blocking, causing data fetching
      failures and service unavailability
    stage_ids:
    - data_collection
  - id: finance-C-018
    when: When storing factor data in database
    action: convert trade_date from YYYYMMDD to YYYY-MM-DD format
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Database will reject date format causing factor persistence failure and downstream recommendation queries
      will return empty results
    stage_ids:
    - factor_computation
  - id: finance-C-021
    when: When processing stock universe for factor computation
    action: load entire stock list into memory at once
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: 2H4G server will experience out-of-memory error, causing factor computation to fail and no recommendations
      available for that trading day
    stage_ids:
    - factor_computation
  - id: finance-C-022
    when: When calling TuShare API for market data
    action: respect per-interface rate limits based on TUSHARE_POINTS tier
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: API calls will be rejected or IP may be temporarily blocked, causing incomplete factor data for that trading
      day
    stage_ids:
    - factor_computation
  - id: finance-C-026
    when: When computing factors for any stock or fund
    action: include short_term_score and long_term_score fields in output
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Recommendation ranking will fail because scoring algorithms depend on both score types to generate buy/sell
      signals
    stage_ids:
    - factor_computation
  - id: finance-C-027
    when: When persisting computed factors to cache and database
    action: sanitize NaN/Inf values before storage
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NaN/Inf values will cause database serialization errors and corrupt factor data, making it impossible to
      rank stocks or generate recommendations
    stage_ids:
    - factor_computation
  - id: finance-C-028
    when: When executing scheduled daily factor computation
    action: run at 6:00 AM before market open using APScheduler CronTrigger
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Factors will not be pre-computed when market opens, leaving users without recommendation signals during trading
      hours when TuShare API limits make on-demand computation infeasible
    stage_ids:
    - factor_computation
  - id: finance-C-033
    when: When computing recommendation scores for stocks and funds
    action: Normalize each factor scores to 0-100 range before final ranking
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Scores outside 0-100 range cause incorrect ranking and potentially misleading recommendations with inflated
      or deflated values
    stage_ids:
    - recommendation
  - id: finance-C-034
    when: When generating stock and fund recommendations
    action: Return recommendations sorted by score in descending order
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Unsorted or incorrectly sorted recommendations confuse users and break expected ranking behavior for top-N
      selection
    stage_ids:
    - recommendation
  - id: finance-C-035
    when: When implementing stock or fund selection logic
    action: Use LLM outputs to determine which stocks or funds are selected
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: LLM-driven selection introduces hallucination risk and removes auditability of investment decisions, violating
      core design principle
    stage_ids:
    - recommendation
  - id: finance-C-036
    when: When generating long-term stock recommendations
    action: Apply ROE/PEG quality gates to filter out stocks with ROE < 10%, OCF/Profit < 0.5, or Debt ratio > 80%
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without quality gates, low-quality stocks with poor fundamentals may be recommended for long-term positions,
      leading to investment losses
    stage_ids:
    - recommendation
  - id: finance-C-038
    when: When generating LLM explanations for recommendations
    action: Limit LLM calls to maximum 2 per cycle, processing 10 candidates per call (max 20 explanations)
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Unlimited LLM calls cause excessive token costs and response latency, making the system economically unviable
    stage_ids:
    - recommendation
  - id: finance-C-061
    when: When calculating Sharpe ratio for portfolio risk metrics
    action: Use RISK_FREE_RATE=0.02 (2% annual) for risk-adjusted return calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect risk-free rate would produce invalid Sharpe ratios, causing misvaluation of portfolio performance
      and potentially leading to poor investment decisions
    stage_ids:
    - portfolio_management
  - id: finance-C-072
    when: When presenting portfolio analysis results to users
    action: Claim that analysis outputs constitute investment advice or guarantee future returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting simulated analysis as investment advice would violate licensing terms and potentially expose
      users to regulatory violations and financial harm
    stage_ids:
    - portfolio_management
  - id: finance-C-077
    when: When implementing scheduler singleton pattern
    action: Verify SchedulerManager uses __new__ singleton pattern to prevent duplicate job registration across request threads
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Multiple scheduler instances would cause duplicate job registration, leading to duplicate task execution,
      data corruption, and resource exhaustion from running the same job multiple times
    stage_ids:
    - scheduling
  - id: finance-C-078
    when: When implementing trading calendar caching
    action: Cache trading calendar once per day and skip redundant AkShare API calls
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Unrestricted AkShare API calls would hit rate limits within hours, causing calendar refresh failures and
      breaking all scheduled job execution
    stage_ids:
    - scheduling
  - id: finance-C-079
    when: When implementing portfolio snapshot price fetching
    action: Use avg_cost as price fallback when current_price is unavailable
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Using avg_cost as fallback would corrupt P&L calculations by showing false unrealized gains, causing portfolio
      valuation errors and misleading investment decisions
    stage_ids:
    - scheduling
  - id: finance-C-082
    when: When implementing Agent Loop for LLM function calling
    action: Terminate Agent Loop after 5 iterations maximum to prevent infinite loops
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Unlimited agent loops would cause infinite LLM tool-calling chains, exhausting API quotas, blocking user
      requests, and potentially crashing the service
    stage_ids:
    - scheduling
  - id: finance-C-094
    when: When initializing GoogleGeminiClient
    action: provide GEMINI_API_KEY environment variable
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Application raises ValueError at startup, preventing the AI assistant from functioning for Gemini users
    stage_ids:
    - llm_services
  - id: finance-C-095
    when: When initializing OpenAIClient
    action: provide OPENAI_API_KEY environment variable
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Application raises ValueError at startup, preventing the AI assistant from functioning for OpenAI users
    stage_ids:
    - llm_services
  - id: finance-C-096
    when: When configuring LLM provider via environment
    action: 'set LLM_PROVIDER to one of: gemini, openai, openai_compatible'
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Factory function raises ValueError with unsupported provider name, breaking all LLM functionality
    stage_ids:
    - llm_services
  - id: finance-C-117
    when: When scheduling triggers portfolio snapshots at 11PM
    action: Portfolio snapshot must skip recording if current prices are unavailable for any held asset, and must NOT use
      average cost as fallback
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Using average cost instead of current prices corrupts PnL calculations, producing inaccurate cumulative and
      daily PnL figures in portfolio history
  - id: finance-C-124
    when: When LLM generates portfolio rebalancing suggestions
    action: LLM must NOT present simulated portfolio backtest results as if they were live trading performance
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting simulated results as live performance constitutes false advertising and may mislead users into
      making risky investment decisions
  - id: finance-C-125
    when: When LLM explains quantitative model recommendations
    action: LLM must NOT participate in stock or fund selection - it may only explain selections made by the quantitative
      model
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: LLM-generated stock selection bypasses the quantitative model's risk controls, potentially recommending high-risk
      investments without proper factor validation
  - id: finance-C-138
    when: When configuring TuShare API integration
    action: Set TUSHARE_API_TOKEN environment variable with a valid TuShare Pro token to access market data
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Missing or invalid API token causes ValueError during data fetch operations, preventing stock/fund data retrieval
      and breaking all analysis features
  - id: finance-C-148
    when: When implementing or refactoring the data source fallback logic
    action: Remove or bypass the TuShare→AkShare fallback chain — the multi-source fallback architecture prevents single API
      failure from blocking operations; removing it creates a single point of failure
    severity: fatal
    kind: architecture_guardrail
    modality: must_not
    consequence: Removing the multi-source fallback chain means any TuShare API outage would completely block data collection,
      halting factor computation and portfolio recommendations with no recovery path
    derived_from_bd_id: BD-001
  - id: finance-C-160
    when: When implementing or refactoring BaseAnalyst subclasses that override analyze_fund()
    action: Call BaseAnalyst._reset_sources() before each analyze_fund() invocation to clear previous data source tracking
      state
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Skipping the reset introduces stale source metadata that gets incorrectly attributed to subsequent fund analyses,
      compromising audit trail integrity and report reproducibility
    derived_from_bd_id: BD-166
  - id: finance-C-174
    when: When implementing batch processing with SQLite WAL mode on memory-constrained servers (2H4G)
    action: Monitor SQLite WAL busy timeout events and implement safeguards against silent data loss — when IO operations
      approach 60-second timeout, reduce batch size or implement explicit error handling instead of relying on skip-on-missing-price
      behavior
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Silent data loss during IO timeout cascades causes incomplete portfolios with no user indication, leading
      to incorrect performance attribution and potential compliance issues with regulatory reporting
    derived_from_bd_id: BD-187
  - id: finance-C-259
    when: When configuring the Gemini model for production trading decisions
    action: Implement a fallback mechanism for when gemini-2.0-flash-exp becomes unavailable or deprecated; do not hardcode
      experimental model names without version pinning or availability checking
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Experimental model gemini-2.0-flash-exp may be deprecated without notice, causing AI-powered trading features
      to fail completely and leaving positions unmanaged until manual intervention
    derived_from_bd_id: BD-106
  regular:
  - id: finance-C-001
    when: When storing stock codes in the database
    action: Normalize stock codes to 6-digit format without exchange suffix using normalize_stock_code()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent stock code formats (with/without .SH/.SZ suffix) will cause duplicate entries, lookup failures,
      and incorrect data association in the database
    stage_ids:
    - data_collection
  - id: finance-C-002
    when: When validating fund codes before API calls
    action: Append .OF suffix for open-ended funds, .SH/.SZ suffix for ETFs when calling TuShare API
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fund codes without proper suffix will cause TuShare API to return empty results, leading to missing NAV history
      and failed fund analysis
    stage_ids:
    - data_collection
  - id: finance-C-003
    when: When validating asset codes before data fetching
    action: Verify asset codes are exactly 6 digits using is_valid_stock_code() or is_valid_fund_code()
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid asset codes (wrong length, non-numeric) will cause API errors, returned empty datasets, and downstream
      analysis failures
    stage_ids:
    - data_collection
  - id: finance-C-005
    when: When API failure threshold is exceeded
    action: Open circuit breaker after 5 consecutive failures to prevent cascading API overload
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without circuit breaker, repeated API failures will continue consuming rate limit quota, causing prolonged
      service outages and quota exhaustion
    stage_ids:
    - data_collection
  - id: finance-C-006
    when: When circuit breaker is in OPEN state
    action: Use fallback data source (AkShare) instead of primary (TuShare) to maintain data availability
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Calling primary API when circuit is open will waste rate limit quota on failing calls, extending data unavailability
      period
    stage_ids:
    - data_collection
  - id: finance-C-007
    when: When initializing database connections
    action: Configure SQLite with WAL journal mode and 60-second busy_timeout to enable concurrent reads during writes
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Without WAL mode and proper timeout, concurrent database operations will cause 'database locked' errors,
      blocking data collection on the 2H4G server
    stage_ids:
    - data_collection
  - id: finance-C-008
    when: When fetching OHLCV data from external providers
    action: Route each data requests through DataSourceManager as single entry point, not directly to providers
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct provider access bypasses fallback logic, rate limiting, and circuit breaker, causing data inconsistency
      and resilience mechanism failures
    stage_ids:
    - data_collection
  - id: finance-C-009
    when: When calling TuShare fund API with .OF suffix
    action: Assume .OF failure means fund doesn't exist - the fund might be an ETF requiring .SH/.SZ suffix
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Incorrectly assuming fund doesn't exist will result in missing ETF NAV data, causing incomplete fund analysis
      and incorrect portfolio calculations
    stage_ids:
    - data_collection
  - id: finance-C-010
    when: When documenting data collection capabilities
    action: Claim 'real-time' data delivery when the system uses polling-based API calls with 30-60 second cache intervals
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting polling as real-time will mislead users about data freshness, causing incorrect trading decisions
      based on stale price information
    stage_ids:
    - data_collection
  - id: finance-C-011
    when: When executing database write operations
    action: Wrap database operations in execute_with_retry() with exponential backoff for lock errors
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without retry logic, database lock errors will cause data collection failures, resulting in missing historical
      data and incomplete reports
    stage_ids:
    - data_collection
  - id: finance-C-012
    when: When processing data from TuShare or AkShare
    action: Normalize each API response timestamps to consistent format before storage or processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent timestamp formats (YYYYMMDD vs YYYY-MM-DD) will cause sorting errors, incorrect date range filtering,
      and corrupted historical data
    stage_ids:
    - data_collection
  - id: finance-C-013
    when: When retrieving data from cache
    action: Check cache expiration before returning cached data to prevent stale data usage
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Returning expired cached data will cause analysis based on outdated prices, leading to incorrect trading
      signals and financial losses
    stage_ids:
    - data_collection
  - id: finance-C-014
    when: When selecting data source provider
    action: Default to hybrid mode (TuShare + yFinance + AkShare fallback) for maximum reliability
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Single-source mode (tushare or akshare only) will cause complete data unavailability when that source fails,
      breaking all downstream analysis
    stage_ids:
    - data_collection
  - id: finance-C-015
    when: When claiming data freshness guarantees
    action: Claim data accuracy equals exchange-traded systems when using third-party aggregators with inherent delays
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Overstating data accuracy will cause user dissatisfaction when they discover data lags behind actual market
      prices during fast-moving markets
    stage_ids:
    - data_collection
  - id: finance-C-016
    when: When handling TuShare API rate limit errors
    action: Apply exponential backoff and respect rate limit margin (0.8-0.95 of threshold) before retrying
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Aggressive retry without backoff will extend rate limit blocking, causing prolonged data collection failures
      during critical market hours
    stage_ids:
    - data_collection
  - id: finance-C-017
    when: When storing fund NAV data
    action: Extract plain fund code (remove .OF/.SH/.SZ suffix) before database insertion to match lookup key
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fund codes with suffix stored in database will cause lookup failures, resulting in missing NAV history and
      failed fund analysis
    stage_ids:
    - data_collection
  - id: finance-C-019
    when: When computing factor scores
    action: clamp composite scores to 0-100 range
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unbounded scores will cause incorrect ranking and potentially corrupt downstream recommendation algorithms
      expecting normalized 0-100 values
    stage_ids:
    - factor_computation
  - id: finance-C-020
    when: When computing risk-adjusted return metrics
    action: use RISK_FREE_RATE = 0.02 hardcoded value for Sharpe and Sortino ratios
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Risk-adjusted performance metrics will be incorrect, leading to misleading fund rankings and recommendations
    stage_ids:
    - factor_computation
  - id: finance-C-023
    when: When caching hot factor data in memory
    action: set TTL to 300 seconds (5 minutes) for frequently accessed data
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Cache hit rate will drop below 50ms threshold, causing repeated database queries and degraded recommendation
      system responsiveness
    stage_ids:
    - factor_computation
  - id: finance-C-024
    when: When completing daily factor computation for full universe
    action: finish within 30 minutes to complete before market opens
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Users will have no factor-based recommendations available at market open, forcing fallback to less accurate
      or manual selection methods
    stage_ids:
    - factor_computation
  - id: finance-C-025
    when: When returning cached factor results for repeated queries
    action: respond within 50ms from memory cache
    severity: high
    kind: operational_lesson
    modality: must
    consequence: User-facing recommendation latency will exceed acceptable threshold, degrading trading experience and potentially
      losing user engagement
    stage_ids:
    - factor_computation
  - id: finance-C-029
    when: When running factor computation on non-trading days
    action: skip computation and log informational message
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Wasted API quota and computation resources on days with no market data, potentially depleting rate limit
      tokens before critical trading days
    stage_ids:
    - factor_computation
  - id: finance-C-030
    when: When claiming risk-adjusted performance metrics
    action: present RISK_FREE_RATE = 0.02 as market-observed rate rather than assumption
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Investors will have misleading expectations about fund performance, as Sharpe/Sortino ratios depend on this
      hardcoded Chinese market assumption which may not reflect actual risk-free opportunities
    stage_ids:
    - factor_computation
  - id: finance-C-031
    when: When displaying factor-based recommendations to users
    action: guarantee specific price targets or returns based on factor scores
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users may make investment decisions based on false expectations; factor scores are model outputs indicating
      relative ranking potential, not financial predictions with certainty
    stage_ids:
    - factor_computation
  - id: finance-C-032
    when: When comparing factor scores across different computation dates
    action: directly compare raw scores without normalizing for market regime changes
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Cross-temporal ranking will be misleading as factor distributions shift with market volatility; a score of
      70 in high-volatility markets is not equivalent to 70 in low-volatility periods
    stage_ids:
    - factor_computation
  - id: finance-C-037
    when: When generating recommendations without pre-computed factors in cache
    action: Return empty list instead of attempting real-time factor computation
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Blocking with real-time computation causes request timeouts and system instability; empty result allows graceful
      degradation
    stage_ids:
    - recommendation
  - id: finance-C-039
    when: When filtering short-term stock recommendations
    action: Apply minimum score threshold of 60 for stocks
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Stocks below score 60 lack sufficient technical signals for short-term breakout prediction, increasing false
      positive recommendations
    stage_ids:
    - recommendation
  - id: finance-C-040
    when: When filtering short-term fund recommendations
    action: Apply minimum score threshold of 55 for funds
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Funds below score 55 lack sufficient momentum signals; funds are less volatile than stocks, warranting lower
      threshold (55 vs 60)
    stage_ids:
    - recommendation
  - id: finance-C-041
    when: When filtering recommendations with user sector preferences
    action: Map sector names using SECTOR_KEYWORDS dict to match database industry codes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without keyword mapping, sector preferences fail to match industry variations (e.g., '医药' must match '生物制药',
      '中药', etc.)
    stage_ids:
    - recommendation
  - id: finance-C-042
    when: When presenting recommendation results to users
    action: Claim that backtest or simulated returns guarantee future investment performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Past performance does not guarantee future results; claiming otherwise violates regulatory requirements and
      exposes system to legal liability
    stage_ids:
    - recommendation
  - id: finance-C-043
    when: When generating explanations for recommendations
    action: Represent LLM-generated explanations as objective facts rather than model-assisted interpretations
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: LLM explanations are synthetic interpretations of quantitative factors, not verified financial advice; presenting
      them as facts misleads users
    stage_ids:
    - recommendation
  - id: finance-C-044
    when: When computing long-term strategy scores for stocks with ROE below threshold
    action: Apply hard cap of 30.0 score for stocks with ROE < 10% instead of full weighted calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without hard cap, low-quality companies may receive inflated scores through other factor components, bypassing
      quality gate intent
    stage_ids:
    - recommendation
  - id: finance-C-045
    when: When implementing source tracking in analyst classes
    action: deduplicate sources by checking both title AND URL to prevent duplicate entries
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Reports will contain duplicate source references, reducing credibility and confusing readers with redundant
      citations
    stage_ids:
    - analysis_reporting
  - id: finance-C-046
    when: When analyzing a new fund or item in the analysis loop
    action: reset sources list before starting new analysis to prevent cross-contamination
    severity: high
    kind: domain_rule
    modality: must
    consequence: Each fund/stock report will incorrectly include sources from previously analyzed items, creating misleading
      attribution
    stage_ids:
    - analysis_reporting
  - id: finance-C-047
    when: When generating API response data structures
    action: format timestamps using ISO 8601 format via datetime.now().isoformat()
    severity: high
    kind: domain_rule
    modality: must
    consequence: API consumers expecting ISO format timestamps will receive incompatible date strings, causing parsing failures
      in downstream systems
    stage_ids:
    - analysis_reporting
  - id: finance-C-048
    when: When implementing GoldSilverAnalyst.analyze() pipeline
    action: 'execute analysis steps in mandatory sequence: Data Collection → Macro Analysis → Quantitative Backtest → Research/Web
      Search → Technical Analysis → LLM Synthesis'
    severity: high
    kind: domain_rule
    modality: must
    consequence: LLM synthesis will receive incomplete or incorrectly ordered data, producing reports with missing context
      or logical inconsistencies that reduce analytical value
    stage_ids:
    - analysis_reporting
  - id: finance-C-049
    when: When implementing strategy classes for fund/stock analysis
    action: implement collect_data and generate_report abstract methods enforcing pre/post mode interface
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies will not properly handle pre-market vs post-market analysis modes, causing data collection errors
      or report generation failures
    stage_ids:
    - analysis_reporting
  - id: finance-C-050
    when: When delegating analysis to strategies in PreMarketAnalyst/PostMarketAnalyst
    action: delegate to specified strategy via StrategyFactory pattern, not directly in analyst classes
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Analysis logic will be duplicated across analyst classes, breaking strategy pattern and making maintenance
      difficult
    stage_ids:
    - analysis_reporting
  - id: finance-C-051
    when: When integrating Tavily web search into analysis pipeline
    action: implement graceful degradation so web search failures do not block report generation
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Entire report generation will fail when Tavily API is unavailable, blocking all fund/stock analysis even
      when local data is sufficient
    stage_ids:
    - analysis_reporting
  - id: finance-C-052
    when: When initializing WebSearch class for analysis
    action: handle missing TAVILY_API_KEY gracefully by printing warning and disabling search capabilities
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Analysis will crash at initialization if API key is missing, preventing any fund/stock analysis from running
    stage_ids:
    - analysis_reporting
  - id: finance-C-053
    when: When handling source titles in _add_source method
    action: truncate source titles to 100 characters to prevent excessively long source entries
    severity: low
    kind: architecture_guardrail
    modality: must
    consequence: Very long source titles will cause formatting issues in markdown reports, potentially breaking report generation
      or creating unreadable output
    stage_ids:
    - analysis_reporting
  - id: finance-C-054
    when: When using Tavily API for web search
    action: implement key rotation and invalidation to handle API usage limits
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: When one API key hits usage limits, all subsequent searches will fail, halting market research and news collection
    stage_ids:
    - analysis_reporting
  - id: finance-C-055
    when: When generating investment analysis reports
    action: include disclaimer that reports are AI-generated based on historical data and do not constitute absolute investment
      advice
    severity: high
    kind: claim_boundary
    modality: must
    consequence: Reports may be misinterpreted as guaranteed investment recommendations, potentially leading to regulatory
      issues and user financial losses
    stage_ids:
    - analysis_reporting
  - id: finance-C-056
    when: When analyzing Gold/Silver commodities using the multi-agent system
    action: append collected sources to the final report using _format_sources method
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Report readers will not know which sources were used for claims, undermining transparency and analytical
      credibility
    stage_ids:
    - analysis_reporting
  - id: finance-C-057
    when: When implementing BaseAnalyst._build_prompt for LLM synthesis
    action: correctly incorporate strategy compute_score results into the prompt template
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: LLM will generate reports without quantitative scoring context, reducing analytical depth and recommendation
      quality
    stage_ids:
    - analysis_reporting
  - id: finance-C-058
    when: When implementing stock analysis strategy
    action: track sources using _add_source with category, title, and URL parameters
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Stock analysis reports will lack proper source attribution, making it impossible to verify claims or trace
      information origins
    stage_ids:
    - analysis_reporting
  - id: finance-C-059
    when: When implementing exception handling in analyst workflow
    action: catch exceptions and return partial report with error message instead of raising
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Single fund analysis failure will halt entire batch processing, preventing analysis of remaining funds in
      the list
    stage_ids:
    - analysis_reporting
  - id: finance-C-060
    when: When implementing signal strength normalization in SignalGenerator
    action: Cap signal strength at maximum 1.0 using min(1.0, score) before returning
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unbounded signal strength values would cause UI rendering issues and incorrect signal classification thresholds,
      leading to misleading investment recommendations
    stage_ids:
    - portfolio_management
  - id: finance-C-062
    when: When calculating position concentration risk
    action: Flag position as concentrated when weight exceeds 20% threshold
    severity: high
    kind: domain_rule
    modality: must
    consequence: Failure to detect concentrated positions would expose portfolio to excessive single-asset risk, potentially
      causing significant losses during adverse market conditions
    stage_ids:
    - portfolio_management
  - id: finance-C-063
    when: When analyzing correlation between portfolio positions
    action: Flag high correlation when pairwise correlation exceeds 0.7 threshold
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing high-correlation detection would fail to warn about inadequate diversification, leading to concentrated
      risk during sector-wide drawdowns
    stage_ids:
    - portfolio_management
  - id: finance-C-064
    when: When returning risk metrics for empty portfolio data
    action: Return health_score of 50 with health_grade C as expected default behavior
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Returning incorrect default values would break frontend expectations and cause inconsistent UI behavior when
      displaying empty portfolio analysis
    stage_ids:
    - portfolio_management
  - id: finance-C-065
    when: When configuring signal generation thresholds
    action: Set opportunity_threshold and risk_threshold both to 0.6 as default sensitivity
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Incorrect threshold values would cause signals to be either too sensitive (noise) or too insensitive (missed
      opportunities), degrading analytical effectiveness
    stage_ids:
    - portfolio_management
  - id: finance-C-066
    when: When calculating technical indicators
    action: Require at least 20 price history data points for valid technical analysis
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient data would produce unreliable RSI and moving average calculations, generating misleading trading
      signals that could cause financial losses
    stage_ids:
    - portfolio_management
  - id: finance-C-067
    when: When computing correlation matrix for portfolio
    action: Require at least 2 positions to compute meaningful correlation analysis
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Computing correlation with fewer positions would produce meaningless results or errors, causing API failures
      when single-position portfolios are analyzed
    stage_ids:
    - portfolio_management
  - id: finance-C-068
    when: When calculating portfolio daily returns
    action: Require at least 50% valid weight coverage (valid_weight > 0.5) for each calculation day
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Including days with insufficient position coverage would distort return calculations, producing unreliable
      portfolio performance metrics
    stage_ids:
    - portfolio_management
  - id: finance-C-069
    when: When computing diversification score from correlation matrix
    action: Exclude diagonal elements (self-correlations) using upper triangle iteration range(i+1, n)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Including self-correlations (diagonal=1.0) would artificially inflate average correlation, producing misleadingly
      low diversification scores
    stage_ids:
    - portfolio_management
  - id: finance-C-070
    when: When calculating annual portfolio returns and volatility
    action: Apply TRADING_DAYS=252 multiplier for annualization (mean*252, std*sqrt(252))
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect trading day count would produce wrong annualization, causing miscalculation of Sharpe ratio
      and other risk-adjusted return metrics
    stage_ids:
    - portfolio_management
  - id: finance-C-071
    when: When applying stress test scenarios to positions
    action: Apply sector-specific sensitivities from SECTOR_SENSITIVITIES dictionary to shock calculations
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Ignoring sector sensitivities would produce inaccurate stress test results, giving false confidence in portfolio
      resilience during specific market events
    stage_ids:
    - portfolio_management
  - id: finance-C-073
    when: When displaying correlation matrix visualization
    action: Acknowledge that diagonal values equal 1.0 (self-correlation) and represent notional relationships
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Presenting self-correlations as meaningful diversification indicators would mislead users into thinking diagonal
      positions provide diversification benefits
    stage_ids:
    - portfolio_management
  - id: finance-C-074
    when: When handling portfolios with insufficient data for risk calculation
    action: Return empty risk summary with message indicating insufficient data rather than throwing errors
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Raising exceptions on edge cases would cause API failures, preventing users from accessing portfolio analysis
      features
    stage_ids:
    - portfolio_management
  - id: finance-C-075
    when: When calculating beta from portfolio returns
    action: Return default beta=1.0 when insufficient data or zero benchmark variance exists
    severity: high
    kind: domain_rule
    modality: must
    consequence: Returning None or error on edge cases would break downstream calculations and cause cascading failures in
      health score computation
    stage_ids:
    - portfolio_management
  - id: finance-C-076
    when: When modeling unified positions for both stocks and funds
    action: Use asset_type field to distinguish position types for specified factor sensitivity application
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Applying wrong asset type sensitivities would distort stress test results and risk metrics for mixed stock-fund
      portfolios
    stage_ids:
    - portfolio_management
  - id: finance-C-080
    when: When scheduling portfolio snapshot jobs
    action: Skip portfolio snapshots on non-trading days by checking trading calendar first
    severity: high
    kind: domain_rule
    modality: must
    consequence: Taking snapshots on non-trading days with stale prices would corrupt historical P&L records and create misleading
      daily performance metrics
    stage_ids:
    - scheduling
  - id: finance-C-081
    when: When scheduling factor computation jobs
    action: Skip factor computation on non-trading days by checking trading calendar first
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Computing factors on non-trading days would waste computational resources and produce stale factor values
      based on outdated market data
    stage_ids:
    - scheduling
  - id: finance-C-083
    when: When Agent Loop reaches maximum iterations
    action: Return partial response with tools_used list instead of blocking indefinitely
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Blocking indefinitely would freeze user sessions; returning partial response with apology message allows
      graceful degradation and user retry
    stage_ids:
    - scheduling
  - id: finance-C-084
    when: When implementing portfolio snapshot with unavailable prices
    action: Skip portfolio entirely from snapshot creation when no valid prices can be fetched
    severity: high
    kind: domain_rule
    modality: must
    consequence: Creating snapshots with zero value would corrupt portfolio history with invalid records, breaking P&L tracking
      and creating misleading equity curves
    stage_ids:
    - scheduling
  - id: finance-C-085
    when: When implementing price fetching with retries
    action: Limit price fetch retries to 2 attempts maximum to avoid blocking snapshot creation
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Excessive retries would cause snapshot creation to timeout, missing the 23:00 daily deadline and creating
      gaps in portfolio history
    stage_ids:
    - scheduling
  - id: finance-C-086
    when: When scheduling Chinese trading calendar dependent jobs
    action: Use Chinese trading calendar (A-share) from AkShare for each market-dependent scheduled tasks
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Using Western trading calendar would schedule jobs on Chinese holidays when markets are closed, creating
      invalid snapshots and factor computations based on stale data
    stage_ids:
    - scheduling
  - id: finance-C-087
    when: When adding scheduled jobs to BackgroundScheduler
    action: Use replace_existing=True when adding jobs to prevent duplicate registration on scheduler restart
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate job registration would cause jobs to execute multiple times simultaneously, doubling API calls
      and corrupting data with duplicate snapshots
    stage_ids:
    - scheduling
  - id: finance-C-088
    when: When implementing trading calendar singleton
    action: Verify TradingCalendar uses singleton pattern to share cached calendar across each components
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Multiple calendar instances would each make AkShare API calls independently, multiplying API usage and increasing
      rate limit risk
    stage_ids:
    - scheduling
  - id: finance-C-089
    when: When claiming real-time data capabilities
    action: Claim real-time trading or live price updates for scheduled snapshots
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting delayed data as real-time would mislead users about portfolio accuracy and violate regulatory
      expectations about data timeliness disclosure
    stage_ids:
    - scheduling
  - id: finance-C-090
    when: When claiming Agent Loop completeness
    action: Claim Agent Loop produces complete responses for each complex queries within single turn
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Agent Loop intentionally terminates at 5 iterations with partial responses; claiming completeness would mislead
      users about query handling capabilities
    stage_ids:
    - scheduling
  - id: finance-C-091
    when: When scheduling dashboard refresh jobs
    action: Set max_instances=3 for dashboard refresh to allow concurrent execution while preventing resource exhaustion
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Setting max_instances=1 would queue missed executions causing dashboard data staleness; unlimited instances
      would exhaust server resources
    stage_ids:
    - scheduling
  - id: finance-C-092
    when: When scheduling daily batch jobs
    action: Set max_instances=1 for daily batch jobs (factor computation, portfolio snapshots) to prevent duplicate execution
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate daily batch job execution would double computational load and create conflicting data writes to
      the same snapshot date
    stage_ids:
    - scheduling
  - id: finance-C-093
    when: When implementing trading calendar API fallback
    action: Assume weekdays are trading days when AkShare API fails to prevent complete system failure
    severity: low
    kind: domain_rule
    modality: should
    consequence: Treating all days as non-trading days when API fails would skip critical daily computations; fallback to
      weekday assumption is conservative but maintains system operation
    stage_ids:
    - scheduling
  - id: finance-C-097
    when: When executing tool calls via ToolExecutor
    action: respect the 10-second timeout limit per tool
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Tool execution blocks indefinitely when data APIs hang, causing the entire agent loop to stall
    stage_ids:
    - llm_services
  - id: finance-C-098
    when: When configuring ToolExecutor concurrent execution
    action: limit ThreadPoolExecutor to max_workers=5
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Unlimited concurrent tool calls can exhaust system resources and trigger rate limits on data APIs
    stage_ids:
    - llm_services
  - id: finance-C-099
    when: When running the agent loop in AssistantService
    action: limit loop iterations to 5 to prevent infinite loops
    severity: high
    kind: resource_boundary
    modality: must
    consequence: LLM may repeatedly call tools in a loop without termination, consuming API quota and blocking the application
    stage_ids:
    - llm_services
  - id: finance-C-100
    when: When LLM service becomes unavailable during implementation
    action: return a fallback Chinese explanation instead of raising an exception
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unhandled exceptions propagate to the API layer, returning HTTP 500 errors to clients instead of graceful
      degradation
    stage_ids:
    - llm_services
  - id: finance-C-101
    when: When LLM API call fails during chat_with_tools
    action: catch exceptions and return ChatResponse with error content instead of propagating exception
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Unhandled LLM API exceptions crash the agent loop, leaving the user without any response
    stage_ids:
    - llm_services
  - id: finance-C-102
    when: When lazy loading the LLM client
    action: delay client initialization until first use to avoid startup failures
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Eager initialization with missing API keys crashes the entire application at startup, blocking all functionality
    stage_ids:
    - llm_services
  - id: finance-C-103
    when: When converting messages for different LLM providers
    action: transform OpenAI format to Gemini format with correct role mappings
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect role mapping causes the LLM to misinterpret conversation turns, producing nonsensical or repetitive
      responses
    stage_ids:
    - llm_services
  - id: finance-C-104
    when: When creating tool call identifiers
    action: generate unique IDs for each tool call using format call_{name}_{index}
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate or missing tool call IDs cause the LLM to receive malformed tool responses, breaking the agent
      loop
    stage_ids:
    - llm_services
  - id: finance-C-105
    when: When executing tool calls from LLM responses
    action: route each tool executions through the ToolExecutor singleton
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct service calls bypass timeout handling and error formatting, causing unhandled hangs and inconsistent
      error responses
    stage_ids:
    - llm_services
  - id: finance-C-106
    when: When switching LLM providers
    action: use factory pattern via get_llm_client() to instantiate the correct provider
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hardcoded provider instantiation requires code changes when switching between Gemini and OpenAI, risking
      runtime errors
    stage_ids:
    - llm_services
  - id: finance-C-107
    when: When the system claims to provide real-time data access
    action: claim real-time streaming capability since it uses polling-based data fetching
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users expecting true real-time streaming will experience stale data due to polling intervals and API delays
    stage_ids:
    - llm_services
  - id: finance-C-108
    when: When tool execution times out
    action: return error message indicating timeout and mark execution as failed
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Silent timeout failures cause the LLM to proceed with stale or missing data, producing unreliable analysis
    stage_ids:
    - llm_services
  - id: finance-C-109
    when: When cleaning LLM-generated responses
    action: strip thinking/reasoning tags and markdown code blocks from output
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Raw LLM responses containing thinking tags or markdown confuse users and break the chat UI rendering
    stage_ids:
    - llm_services
  - id: finance-C-110
    when: When scheduling triggers data_collection at 6AM
    action: DataSourceManager must verify current date is a trading day before fetching OHLCV, NAV, and money flow data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Fetching data for non-trading days produces stale or incorrect market snapshots, corrupting downstream factor
      calculations and recommendation quality
  - id: finance-C-111
    when: When data_collection stores raw market data into SQLite
    action: Database operations must use WAL journal mode with 60-second busy_timeout to prevent lock contention during concurrent
      reads
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Concurrent read/write operations without WAL mode cause database lock errors, blocking data retrieval and
      causing service timeouts
  - id: finance-C-112
    when: When factor_computation processes batch of 100 stocks/funds
    action: DailyFactorComputer must process stocks/funds in batches of exactly 100 with maximum 4 concurrent threads
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding thread limits or batch sizes causes memory exhaustion on 2H4G server, leading to OOM crashes and
      failed computations
  - id: finance-C-113
    when: When computed factors flow from factor_computation to recommendation
    action: FactorCache must enforce 5-minute TTL for memory cache and 1-day TTL for database cache before returning factors
      to recommendation engine
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Stale factor data with expired TTL causes recommendation engine to make decisions based on outdated technical/risk/sentiment
      scores
  - id: finance-C-114
    when: When recommendation stage sends factor scores to LLM services
    action: LLM must NOT exceed 2 batched API calls with maximum 10 candidates per call when generating explanations
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Unlimited LLM API calls accumulate excessive token costs, and processing more than 20 candidates reduces
      per-item explanation quality
  - id: finance-C-115
    when: When recommendation engine generates top candidate lists
    action: Recommendation engine must limit top candidates to 20 stocks/funds maximum per recommendation cycle
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Processing more than 20 candidates causes exponential increase in LLM token usage and response latency, degrading
      user experience
  - id: finance-C-116
    when: When portfolio_management generates position signals
    action: SignalGenerator must output signal strength as float in range 0.0 to 1.0 inclusive
    severity: high
    kind: domain_rule
    modality: must
    consequence: Out-of-range signal strength values (negative or greater than 1.0) cause LLM rebalancing suggestions to generate
      invalid or extreme portfolio adjustments
  - id: finance-C-118
    when: When portfolio snapshots skip recording due to missing prices
    action: Skipped snapshots must log is_complete=False and list missing_assets to preserve data quality metadata
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Silent failures without metadata tracking cause downstream systems to misinterpret incomplete portfolio snapshots
      as valid data points
  - id: finance-C-119
    when: When analysis_reporting stage collects data from external Tavily web search
    action: 'WebSearch must perform layered search with priority order: official announcements > analyst reports > industry
      chain > general news'
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Mixing lower-priority news with higher-priority announcements dilutes signal quality and produces unreliable
      market sentiment analysis
  - id: finance-C-120
    when: When analysis_reporting synthesizes data for LLM report generation
    action: BaseAnalyst must include money flow data, sentiment scores, and technical indicators in report synthesis input
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Incomplete input data causes LLM to generate reports with missing sections, undermining the credibility and
      utility of analysis reports
  - id: finance-C-121
    when: When DataSourceManager fetches data with TuShare as primary provider
    action: Data source operations must implement fallback to AkShare when TuShare fails, with automatic retry and caching
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Single-source dependency causes data fetching failures when TuShare API is unavailable, breaking downstream
      factor computation and recommendations
  - id: finance-C-122
    when: When market data timestamps are stored or retrieved
    action: Stock factors must store trade_date in YYYYMMDD string format matching TuShare convention
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mismatched date formats cause factor lookup failures and incorrect historical factor retrieval, corrupting
      time-series analysis
  - id: finance-C-123
    when: When GoldSilverAnalyst calculates technical indicators
    action: Technical indicator calculations must use shift(1) to align previous period values correctly
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing shift(1) causes current and previous values to align incorrectly, producing invalid RSI, MACD, and
      MA crossover signals
  - id: finance-C-126
    when: When database operations encounter lock contention
    action: execute_with_retry must implement exponential backoff with maximum 5 retries before raising OperationalError
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Immediate retries without backoff cause thundering herd problem, perpetuating database locks and causing
      cascading timeouts
  - id: finance-C-127
    when: When processing price history data for technical analysis
    action: Price history must contain at least 20 data points to compute valid MA5, MA10, MA20, and RSI indicators
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Insufficient price history causes RSI to return neutral default value and MA calculations to produce meaningless
      short-period averages
  - id: finance-C-128
    when: When analysis_reporting generates market analysis reports
    action: Reports must include data source citations for each market data, news, and research information
    severity: low
    kind: domain_rule
    modality: must
    consequence: Missing source citations undermine report credibility and may violate financial information disclosure requirements
  - id: finance-C-129
    when: When data passes through FactorCache memory layer
    action: Memory cache must thread-safely handle concurrent reads and writes using RLock mechanism
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Race conditions in memory cache cause intermittent factor data corruption, leading to inconsistent recommendations
      across concurrent requests
  - id: finance-C-130
    when: When implementing data access for Chinese A-share markets
    action: Use YYYYMMDD format for trade dates in API/data layer inputs, and convert to YYYY-MM-DD format for database storage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Trade date format inconsistency causes date parsing failures across the system, leading to incorrect historical
      data queries and corrupted portfolio snapshots
  - id: finance-C-131
    when: When storing stock codes in the database
    action: Store stock codes as 6 digits without exchange suffix; append .SH/.SZ exchange suffix only when calling TuShare
      API
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stock codes with inconsistent exchange suffixes cause duplicate entries, failed API lookups, and broken portfolio
      position tracking
  - id: finance-C-132
    when: When computing risk-adjusted return metrics (Sharpe, Sortino, Calmar ratios)
    action: Use RISK_FREE_RATE = 0.02 (2% annual) consistently across each risk calculation modules
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inconsistent risk-free rate across modules produces incompatible Sharpe/Sortino ratios, misleading portfolio
      health scores and fund comparison rankings
  - id: finance-C-133
    when: When serializing data for API responses or JSON output
    action: Sanitize NaN/Inf float values to None before JSON serialization to prevent API response failures
    severity: high
    kind: domain_rule
    modality: must
    consequence: API endpoints return 500 errors or malformed JSON when NaN/Inf values are present in response data, breaking
      frontend rendering and third-party integrations
  - id: finance-C-134
    when: When returning timestamps in any API response
    action: Format each timestamps using ISO 8601 format (YYYY-MM-DDTHH:MM:SS) in API responses
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-ISO timestamp formats cause frontend parsing failures, inconsistent timezone handling, and broken date-based
      filtering in UI components
  - id: finance-C-135
    when: When computing composite recommendation scores in stock or fund engines
    action: Produce short_term_score and long_term_score fields with values clamped to 0-100 range for UI compatibility
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent score field names between stock and fund engines break frontend dashboard components that expect
      uniform field structure
  - id: finance-C-136
    when: When recording any transaction in the portfolio system
    action: 'Use only the defined transaction type enum: buy, sell, dividend, split, transfer_in, transfer_out'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid transaction types cause database constraint violations, broken transaction history queries, and incorrect
      PnL calculations
  - id: finance-C-137
    when: When calling TuShare API for market data
    action: Acquire rate limit permission through tushare_rate_limiter.acquire() before each API call to prevent quota exhaustion
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Exceeding TuShare API rate limits causes temporary API access suspension, failed factor computations, and
      incomplete daily data updates
  - id: finance-C-139
    when: When accessing Chinese A-share market data through TuShare or AkShare
    action: Claim or present the data as real-time — these data sources have inherent delays (typically 15-60 minutes for
      end-of-day data)
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users rely on delayed data believing it is current, making trading decisions on stale prices and suffering
      unexpected losses from price gaps
  - id: finance-C-140
    when: When presenting portfolio analysis or stress test results to users
    action: Claim or imply that simulated portfolio returns equal expected live trading results — backtesting ignores market
      impact, financing costs, slippage, and execution delays
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users allocate capital based on inflated simulated returns, experiencing severe underperformance when executing
      live trades at market prices
  - id: finance-C-141
    when: When displaying or marketing the system's analysis capabilities
    action: Claim support for real-time trading execution — this system only provides analysis and recommendations, not order
      execution
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users expect automated trade execution that is not supported, leading to missed opportunities or manual trading
      errors when the system fails to execute predicted trades
  - id: finance-C-142
    when: When users consider deploying this system for markets outside China
    action: Claim full functionality for non-Chinese markets without significant adaptation — data sources, stock code conventions,
      and sector classifications are China A-share specific
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users attempt to use China-specific data conventions for US/HK/etc markets, receiving no data or incorrect
      results, leading to analysis failures
  - id: finance-C-143
    when: When using factor computation batch processing
    action: Process stocks in batches of 100 with maximum 4 parallel workers to respect system resource constraints and prevent
      memory exhaustion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unbounded parallel processing exhausts memory/CPU, causing OOM kills or system instability during large-scale
      factor computation
  - id: finance-C-144
    when: When accessing the database from multiple threads
    action: Use WAL mode with busy_timeout of 60 seconds and check_same_thread=False to enable safe concurrent access
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: SQLite database locks cause 'database is locked' errors in multi-threaded operations, resulting in failed
      writes and incomplete data persistence
  - id: finance-C-145
    when: When computing technical factor scores
    action: Clamp each individual factor scores and composite scores to the 0-100 range using max(0, min(100, value))
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Unbounded factor scores cause score normalization failures, breaking UI thresholds and recommendation logic
      that expect 0-100 range
  - id: finance-C-146
    when: When running the system in a multi-user environment
    action: Claim this system is suitable for institutional-grade multi-currency portfolio management requiring simultaneous
      CNY/HKD/USD support
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Institutional users deploy system expecting multi-currency reconciliation that is not implemented, causing
      incorrect PnL reporting and compliance failures
  - id: finance-C-147
    when: When implementing or refactoring the factor computation scheduling logic
    action: Change the pre-computation schedule from 6AM to on-demand computation — TuShare API rate limits make on-demand
      computation infeasible at scale, and the 6AM schedule ensures factors exist before market opens for sub-second response
      times
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Switching to on-demand factor computation would cause rate limit errors during peak usage times, resulting
      in missing factors for user requests and failed portfolio recommendations during critical market hours
    derived_from_bd_id: BD-005
  - id: finance-C-149
    when: When configuring rate limiting for TuShare API integration
    action: Verify that TUSHARE_POINTS environment variable is properly configured for the subscription tier (120/2000/5000/10000),
      and validate that rate limits match the actual API subscription to prevent quota exhaustion
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default or misconfigured rate limits without TUSHARE_POINTS may cause API quota exhaustion, resulting
      in rate limit errors that block data collection during critical market hours
    derived_from_bd_id: BD-002
  - id: finance-C-150
    when: When calculating risk-adjusted returns (Sharpe/Sortino ratios) for Chinese market portfolios
    action: Verify that RISK_FREE_RATE=0.02 (2% annual) matches current Chinese market conditions — review and adjust if market
      rates have changed significantly, as using an outdated rate distorts risk-adjusted performance metrics
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using a hardcoded 2% risk-free rate when actual rates differ causes Sharpe/Sortino ratios to misrepresent
      true risk-adjusted returns, potentially leading to suboptimal strategy selection based on inflated or deflated metrics
    derived_from_bd_id: BD-008
  - id: finance-C-151
    when: When implementing or modifying signal generation and opportunity detection logic
    action: Normalize signal strength to [0,1] range and apply 0.6 opportunity threshold — signals below 0.6 must be filtered
      as noise, only signals >=0.6 qualify as actionable opportunities
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the signal normalization or threshold would alter the strategy's sensitivity to opportunities —
      lower threshold increases false signals causing unnecessary trades, higher threshold misses valid opportunities
    derived_from_bd_id: BD-018
  - id: finance-C-152
    when: When implementing stock recommendation logic
    action: Allow LLM to select or generate stock recommendations — quantitative models must perform each stock selection;
      LLM role is limited to natural language explanation of quantitative outputs only
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Allowing LLM to generate stock selections introduces hallucination risk where fabricated financial data or
      invalid reasoning leads to unsound investment recommendations, causing direct financial losses to users
    derived_from_bd_id: BD-009
  - id: finance-C-153
    when: When implementing source tracking in analyst modules
    action: Use title+URL combination for source deduplication within each analyst — verify _add_source deduplicates by both
      title and URL to prevent duplicate citations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping title+URL deduplication inflates source counts with identical citations, corrupting analysis quality
      and misleading users about the breadth of research conducted
    derived_from_bd_id: BD-014
  - id: finance-C-154
    when: When generating long-term stock recommendations
    action: Apply ROE/PEG quality gate thresholds before issuing long-term recommendations — verify fundamental health metrics
      pass the gate before including stocks in long-term portfolios
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without ROE/PEG quality gates, long-term recommendations may include fundamentally weak stocks, leading to
      poor performance and losses in extended holding periods
    derived_from_bd_id: BD-011
  - id: finance-C-155
    when: When implementing valuation scoring in stock recommendations
    action: 'Apply fixed valuation score weights: PEG at 50%, PE percentile at 25%, PB percentile at 25% — weights verify
      meaningful cross-industry valuation comparisons'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying valuation weights alters scoring methodology, causing inconsistent cross-industry comparisons and
      potentially misleading valuation signals that affect investment decisions
    derived_from_bd_id: BD-045
  - id: finance-C-156
    when: When implementing analysis with real-time context in analyst modules
    action: Use combined WebSearch (Tavily) + LLM synthesis for real-time context — Tavily provides current market events;
      LLM synthesizes with historical data to verify analysis captures both breaking news and historical patterns
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Using only historical data or LLM training data without Tavily web search produces stale analysis that misses
      material breaking news events, leading to outdated investment recommendations
    derived_from_bd_id: BD-016
  - id: finance-C-157
    when: When calculating correlation for position diversification analysis
    action: Use 0.7 as the correlation threshold for diversification alerts — flag pairs with correlation > 0.7 as diversification
      concerns indicating portfolio concentration risk
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect correlation thresholds either flags too many pairs (lower threshold) or misses moderately
      correlated positions (higher threshold), undermining diversification analysis and portfolio risk management
    derived_from_bd_id: BD-020
  - id: finance-C-158
    when: When initializing any stochastic component in backtesting (random number generators, Monte Carlo simulations, bootstrap
      sampling)
    action: Assume backtest results are reproducible without explicit random seed initialization — stochastic components without
      seeds produce non-deterministic outputs
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without setting a random seed, each backtest run produces different equity curves and performance metrics,
      making it impossible to verify strategy improvements or reproduce historical results for audit purposes
    derived_from_bd_id: BD-GAP-035
  - id: finance-C-159
    when: When setting up backtest initialization in any analysis module
    action: Set random seed via numpy.random.seed() and random.seed() at the start of each backtest run; expose seed as a
      configurable parameter (--seed flag or config file) to enable result verification and regression testing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without reproducible random seeds, backtest results cannot be compared across code changes, strategy iterations
      become unverifiable, and audit trails cannot confirm that reported performance matches actual calculations
    derived_from_bd_id: BD-GAP-035
  - id: finance-C-161
    when: When implementing scheduler initialization or DI container configuration for scheduling services
    action: Maintain singleton pattern for SchedulerManager instance - verify exactly one scheduler exists per application
      lifecycle to prevent duplicate job registration
    severity: high
    kind: domain_rule
    modality: must
    consequence: Multiple scheduler instances cause duplicate job registration and repeated task execution, creating data
      inconsistency and potential over-trading across concurrent requests
    derived_from_bd_id: BD-022
  - id: finance-C-162
    when: When implementing price data retrieval for position valuation in portfolio analysis
    action: Use average cost, model price, or any fallback valuation when price data is unavailable - skip the position entirely
      instead
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Using average cost or model price as fallback introduces fictitious valuations that corrupt P&L calculations
      and cause material misstatements in performance attribution
    derived_from_bd_id: BD-024
  - id: finance-C-163
    when: When configuring risk monitoring or implementing drawdown alerts in portfolio analysis
    action: Use 5% as the drawdown threshold for triggering detailed analysis and alerts - verify this matches the target
      portfolio's risk tolerance before applying
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Setting a different threshold changes when risk alerts trigger; 3% generates excessive noise while 10% misses
      early warning signals for stressed portfolios
    derived_from_bd_id: BD-033
  - id: finance-C-164
    when: When implementing volatility classification in fund risk analysis
    action: 'Apply the standardized volatility categories: <10% excellent, <15% good, <20% average, <25% below_average, >=25%
      poor - annualized via sqrt(252) from daily returns'
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Different thresholds misclassify fund volatility profiles, leading to incorrect risk categorization and potentially
      unsuitable recommendations for end users
    derived_from_bd_id: BD-034
  - id: finance-C-165
    when: When configuring recommendation thresholds for stock and fund short-term recommendations
    action: 'Use differentiated minimum scores: 60 for stocks, 55 for funds in short-term recommendations - verify these align
      with target asset class volatility'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using equal thresholds causes higher false positive rates for funds or over-restricted recommendations for
      stocks, leading to missed opportunities or unsuitable allocations
    derived_from_bd_id: BD-013
  - id: finance-C-166
    when: When implementing or refactoring position_pct calculation in technical analysis
    action: Use 60-day lookback period with quintile zone thresholds (90/70/50/30/10) for position_pct calculation - changing
      to 30 or 120 days requires revalidation
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Different lookback periods produce materially different zone classifications; 30-day creates excessive volatility
      while 120-day reduces responsiveness to recent price action
    derived_from_bd_id: BD-169
  - id: finance-C-167
    when: When implementing or modifying market data caching in dashboard services
    action: Use indefinite caching when market is closed and TTL-based caching when market is open to balance resource efficiency
      and data freshness
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Indefinite caching during market hours serves stale data to users; always-TTL caching wastes resources with
      unnecessary overnight API calls
    derived_from_bd_id: BD-062
  - id: finance-C-168
    when: When configuring LLM synthesis parameters in recommendation engine
    action: Set MAX_CALLS_PER_CYCLE=2 and BATCH_SIZE=10 - LLM must only explain quantitative selections, not generate independent
      recommendations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Increasing MAX_CALLS allows LLM to generate recommendations beyond explainability scope, risking hallucination
      and non-quantitative advice being presented to users
    derived_from_bd_id: BD-172
  - id: finance-C-169
    when: When implementing portfolio concentration analysis in fund risk metrics
    action: Set CONCENTRATION_THRESHOLD=0.05 (5%) - trigger concentration warnings when any single position exceeds this threshold
      of portfolio value
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using a different threshold either generates excessive warnings at 3% or misses concentration risk at 10%,
      leading to improper diversification oversight and concentrated position losses
    derived_from_bd_id: BD-177
  - id: finance-C-170
    when: When implementing or refactoring LLM client instantiation logic
    action: Use the factory pattern with LLM_PROVIDER environment variable for provider instantiation — do not hardcode provider
      selection or bypass the factory
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Hardcoding a provider removes the ability to switch between vendors (Gemini/OpenAI), breaking vendor diversity,
      cost optimization, and resilience against single-provider outages
    derived_from_bd_id: BD-026
  - id: finance-C-171
    when: When implementing or modifying volume-based accumulation signal detection
    action: Use exactly 1.3x volume increase threshold with price change less than 5% for accumulation signal — do not change
      these thresholds without domain expert approval
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing volume thresholds alters accumulation signal detection, potentially introducing false signals from
      liquidity events or missing institutional accumulation patterns that drive trading decisions
    derived_from_bd_id: BD-038
  - id: finance-C-172
    when: When configuring market indices cache TTL
    action: Change market indices cache TTL without understanding the balance between real-time awareness and API efficiency
      — 60-second TTL is calibrated for minute-level index movements
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Arbitrarily reducing cache TTL may cause excessive API calls depleting rate limits; increasing TTL may cause
      stale index data during critical market periods
    derived_from_bd_id: BD-065
  - id: finance-C-173
    when: When implementing or modifying alpha strategy weight configuration
    action: Maintain alpha strategy weights at risk-adjusted 35%, drawdown 25%, manager 25%, holdings 15% — do not change
      weights without domain expert approval as they reflect alpha-seeking investor priorities
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing alpha strategy weights alters investment priorities, potentially misaligning portfolio construction
      with investor objectives and risk preferences, leading to suboptimal returns
    derived_from_bd_id: BD-078
  - id: finance-C-175
    when: When implementing portfolio concentration risk management
    action: Verify concentration threshold matches investor risk preferences — 20% per position is calibrated for standard
      diversification; adjust based on investor-specific constraints if needed
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Incorrect concentration threshold leads to either excessive diversification reducing potential returns or
      insufficient diversification increasing downside risk exposure
    derived_from_bd_id: BD-019
  - id: finance-C-176
    when: When using the framework's default LLM agent iteration limit for complex reasoning tasks
    action: Verify max_iterations=5 matches your API quota budget and query complexity requirements — adjust if processing
      highly complex queries or operating with limited API quotas
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Insufficient iteration limit causes incomplete query processing, while excessive limits risk API quota exhaustion
      blocking all subsequent requests from the system
    derived_from_bd_id: BD-025
  - id: finance-C-177
    when: When designing or modifying the 6AM batch processing pipeline with TuShare rate limits configured at 90% utilization
    action: 'Implement safeguards against cascade failures: use staggered computation, reserve rate limit margin exceeding
      10%, or add retry logic with exponential backoff — verify single component failure does not cause complete service outage
      during market open'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Cascade failure from rate limit exhaustion during 6AM pre-computation window causes complete service outage
      when users expect working system during market open, leading to user trust loss
    derived_from_bd_id: BD-182
  - id: finance-C-178
    when: When implementing or modifying signal analysis sequence and weights in SignalGenerator
    action: 'Preserve SignalGenerator analyze sequence order: technical(0.3) then fund_flow(0.25) then sentiment(0.2) then
      concentration(0.15) then correlation(0.15) then news(0.2) — sequence reflects time-sensitivity with price data first
      and news last; weights sum to 1.05 reflecting importance distribution'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reordering signal analysis sequence delays actionable signals arriving late to users; changing weights alters
      signal composition, both leading to incorrect trading decisions based on wrong signal priority
    derived_from_bd_id: BD-180
  - id: finance-C-179
    when: When implementing or optimizing technical indicator calculations for trend analysis
    action: Use exactly 5/10/20/60 day moving averages for MA convergence/divergence calculations - these specific window
      sizes align with weekly, biweekly, monthly, and quarterly trading cycles
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different MA windows (e.g., 50-day instead of 60-day) fundamentally changes trend signal generation,
      causing the backtested strategy behavior to diverge from expected results and potentially missing quarterly rebalancing
      alignment
    derived_from_bd_id: BD-037
  - id: finance-C-180
    when: When implementing earnings quality scoring in fundamental analysis
    action: Enforce OCF/Net profit ratio >= 0.8 as minimum threshold for positive earnings quality assessment - stocks below
      this ratio receive negative scoring for earnings quality concerns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without enforcing the 0.8 minimum ratio, stocks with poor earnings quality (where cash flow significantly
      lags accounting profits) receive inflated quality scores, potentially leading to investment in companies with accounting-manipulated
      earnings
    derived_from_bd_id: BD-042
  - id: finance-C-181
    when: When implementing debt/leverage scoring in fundamental analysis
    action: Apply 70% debt ratio as maximum threshold - stocks exceeding this threshold receive additional risk premium and
      negative scoring for refinancing risk during market downturns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without the 70% debt threshold, high-leverage companies receive favorable scores despite elevated refinancing
      risk, leading to portfolio concentration in financially vulnerable stocks that underperform during downturns
    derived_from_bd_id: BD-041
  - id: finance-C-182
    when: When implementing quality score computation for stock ranking
    action: 'Apply quality score weights as exactly: ROE 35%, OCF 25%, margin stability 20%, debt 20% - weights must sum to
      100% and maintain this specific allocation to verify correct composite scoring'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Modifying quality score weights without understanding the model's calibration causes ranking order changes
      that invalidate backtested performance expectations, as the current allocation reflects empirical correlation with stock
      outperformance
    derived_from_bd_id: BD-043
  - id: finance-C-183
    when: When implementing alpha manager evaluation scoring
    action: 'Apply alpha manager score weights as exactly: tenure 35%, bull alpha 25%, bear alpha 25%, consistency 15% - these
      weights balance manager experience with market-cycle performance'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing manager score weights alters fund rankings, potentially selecting managers with poor long-term track
      records or inadequate bear-market performance that would be eliminated under the calibrated weight scheme
    derived_from_bd_id: BD-081
  - id: finance-C-184
    when: When implementing stress test scenario generation for portfolio analysis
    action: 'Use the predefined scenario set: Fed hike/cut 50bp, CNY ±2%, Index ±5%/10%, sector/commodity shocks - these specific
      scenarios cover major risk factors without exceeding the validated extreme-but-non-crisis range'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Expanding scenarios to more extreme events (e.g., 20% index drop) overestimates tail risk and underestimates
      normal portfolio performance, while narrower scenarios miss material risk factors that affect real portfolio outcomes
    derived_from_bd_id: BD-089
  - id: finance-C-185
    when: When configuring fund evaluation weights for AlphaStrategy
    action: Verify that fund evaluation uses risk_adjusted(35%), drawdown(25%), manager(25%), holdings(15%) weights - these
      differ from stock strategy weights and reflect risk-first fund selection philosophy
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using stock strategy weights for fund evaluation overemphasizes technical factors and underweights risk-adjusted
      returns, causing misaligned fund recommendations that favor high-volatility funds unsuitable for risk-aware investors
    derived_from_bd_id: BD-165
  - id: finance-C-186
    when: When implementing factor data caching for the recommendation system
    action: 'Verify that the two-tier caching architecture is implemented: MemoryCache with 5min TTL for freshness, then Database
      with 1day TTL for persistence - single-tier approaches will cause either excessive API calls or data staleness issues'
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Using only database caching without memory tier increases database load by approximately 10x during peak
      processing, while using only memory cache risks data inconsistency after restarts and exceeds API rate limits
    derived_from_bd_id: BD-170
  - id: finance-C-187
    when: When implementing stock screening and recommendation logic
    action: Filter stocks by minimum 1亿 (100 million) daily liquidity before including in recommendations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using stocks with daily liquidity below 1亿 causes large orders to move prices unfavorably during entry/exit,
      resulting in significant slippage that exceeds backtest transaction costs and causes live trading returns to fall below
      backtested results
    derived_from_bd_id: BD-074
  - id: finance-C-188
    when: When computing momentum scores in the fund recommendation engine
    action: 'Use exact momentum component weights: 1-week 30%, 1-month 40%, Sharpe 30% in _compute_momentum_score'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying momentum weights without backtesting changes the ranking of stocks by momentum quality; overweighting
      short-term momentum causes excessive trading while underweighting it reduces trend capture, both degrading strategy
      performance
    derived_from_bd_id: BD-076
  - id: finance-C-189
    when: When configuring portfolio position limits using framework defaults
    action: Verify that max_single_position=0.15 (15%) matches the intended risk tolerance, and adjust if strategy requires
      different concentration limits
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using default 15% single-position limit without verification creates over-concentration risk; if actual strategy
      allows 20% positions, backtest will underestimate drawdowns and overestimate live portfolio capacity
    derived_from_bd_id: BD-050
  - id: finance-C-190
    when: When configuring sector allocation limits using framework defaults
    action: Verify that max_sector_position=0.30 (30%) matches the intended sector diversification strategy, and adjust if
      sector conviction plays require different limits
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using default 30% sector limit without verification creates sector concentration risk; strategies targeting
      sector momentum may require 25% limits for defensive positioning or 40% for conviction plays, causing backtest-live
      divergence
    derived_from_bd_id: BD-051
  - id: finance-C-191
    when: When using the ShortTermStrategy's default score thresholds for stock recommendations
    action: Verify that MIN_SCORE_THRESHOLD=60 and HIGH_SCORE_THRESHOLD=80 match current market volatility conditions; static
      thresholds may filter valid signals in high-volatility markets or include noise in low-volatility markets
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Default score thresholds create three recommendation tiers (avoid below 60, buy 60-80, strong buy above 80);
      in trending markets, valid opportunities with scores 50-60 are missed, while in volatile markets, scores 60-80 may represent
      low-conviction signals that underperform
    derived_from_bd_id: BD-175
  - id: finance-C-192
    when: When computing sentiment factors using accumulation and trend patterns
    action: Verify that FLOW_DAYS=5 and TREND_DAYS=10 match the intended pattern recognition strategy; fixed windows may misidentify
      patterns in stocks with unusual trading activity cycles
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using 5-day flow window and 10-day trend window conflates short-term noise with trend signals in stocks with
      longer accumulation cycles; this reduces predictive accuracy for reversal and momentum patterns, causing suboptimal
      entry/exit timing
    derived_from_bd_id: BD-176
  - id: finance-C-193
    when: When configuring batch processing parameters in DataComputer for daily factor computation
    action: Verify that BATCH_SIZE=100 and MAX_WORKERS=4 match the deployment server's memory and CPU specifications; these
      values are optimized for 2-core, 4GB servers
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Default batch size of 100 with 4 workers may cause memory exhaustion on servers with less than 4GB RAM or
      CPU context-switching overhead on single-core systems, leading to failed daily factor computation and missing trading
      signals
    derived_from_bd_id: BD-178
  - id: finance-C-194
    when: When implementing or refactoring correlation analysis logic
    action: Use exactly 90 days as the correlation lookback period to capture approximately 3 months of trading history
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the lookback period alters correlation stability estimates; shorter periods introduce statistical
      noise while longer periods lag regime changes, causing inconsistent diversification signals
    derived_from_bd_id: BD-083
  - id: finance-C-195
    when: When implementing portfolio diversification scoring
    action: 'Calculate diversification score using the formula: 100 * (1 - avg_correlation), where 0 correlation yields score
      of 100 and 1 correlation yields score of 0'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Altering the diversification scoring formula produces different portfolio rankings, leading to suboptimal
      asset allocation decisions that misrepresent true portfolio diversification
    derived_from_bd_id: BD-086
  - id: finance-C-196
    when: When implementing stress test calculations for portfolio positions
    action: Apply index beta of 1.0 for stocks and 0.85 for funds when calculating position losses in stress scenarios
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect beta values distort stress test loss estimates; funds with wrong beta will show inaccurate market
      sensitivity, leading to improper capital allocation during market stress
    derived_from_bd_id: BD-088
  - id: finance-C-197
    when: When implementing or configuring stop-loss parameters in trading strategies
    action: Verify that stop_loss_percentage=8% aligns with the target market's volatility characteristics before applying;
      Chinese stocks swing 5-10% daily during volatility periods
    severity: medium
    kind: domain_rule
    modality: should
    consequence: An 8% stop loss that's too tight triggers premature exits during normal market volatility, while too loose
      delays loss-cutting in genuine downturns, both scenarios causing suboptimal trading outcomes
    derived_from_bd_id: BD-052
  - id: finance-C-198
    when: When implementing portfolio recommendation logic
    action: Verify recommendation counts match target investor profile; default 8 stocks and 5 funds is designed for retail
      investor manageability and attention capacity
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Recommendation counts that don't match investor capacity lead to over-diversification with diluted returns
      or under-diversification with concentrated risk, reducing strategy effectiveness
    derived_from_bd_id: BD-053
  - id: finance-C-199
    when: When implementing signal generation and filtering logic
    action: Verify signal thresholds match strategy requirements; 0.6 threshold represents strong consensus and filters neutral
      scores below this value as noise
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Thresholds that don't match strategy sensitivity produce either too many false signals leading to overtrading
      or miss actionable opportunities causing missed gains
    derived_from_bd_id: BD-054
  - id: finance-C-200
    when: When calculating or interpreting Sortino Ratio for portfolio performance evaluation
    action: Use only negative returns (downside volatility) in the Sortino Ratio denominator; do not include upside volatility
      in risk calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Including upside volatility in Sortino denominator misrepresents risk-adjusted returns, causing incorrect
      strategy comparison and suboptimal portfolio selection
    derived_from_bd_id: BD-123
  - id: finance-C-201
    when: When calculating portfolio beta for systematic market risk assessment
    action: 'Calculate beta using the CAPM formula: Covariance(Rp,Rm) / Variance(Rm)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using an incorrect beta calculation produces wrong market sensitivity estimates, leading to improper risk
      management and over/under-hedging of market exposure
    derived_from_bd_id: BD-129
  - id: finance-C-202
    when: When implementing sentiment analysis using money flow factors
    action: 'Verify money flow factors distinguish volume tiers: retail (buy_sm_vol/sell_sm_vol) vs institutional (buy_lg_vol/sell_lg_vol)
      vs major institutional (buy_elg_vol)'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without retail/institutional distinction in money flow analysis, retail trading noise dilutes institutional
      signals, reducing sentiment prediction accuracy and causing poor trading decisions
    derived_from_bd_id: BD-179
  - id: finance-C-203
    when: When implementing or extending analyst subclasses that require fund lists
    action: Use BaseAnalyst._load_funds() to read fund list from FUNDS_FILE; verify each analysts reference the same centralized
      fund universe for consistency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Subclasses loading fund lists from different sources cause inconsistent recommendations and reporting gaps
      across the platform, leading to unreliable portfolio analysis
    derived_from_bd_id: BD-181
  - id: finance-C-204
    when: When implementing portfolio tracking and transaction recording logic
    action: 'Support exactly six transaction types: buy, sell, dividend, split, transfer_in, transfer_out — do not merge types
      or introduce non-standard transaction types'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying transaction types breaks portfolio tracking integrity; buy/sell/dividend/split/transfer_in/transfer_out
      are distinct activities with different financial impacts
    derived_from_bd_id: BD-102
  - id: finance-C-205
    when: When implementing portfolio correlation analysis and position flagging logic
    action: Flag positions as high correlation when correlation exceeds 0.7 threshold — do not change this threshold without
      re-evaluating the portfolio diversification strategy
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the correlation threshold alters diversification decisions; lowering it may over-diversify positions
      while raising it may under-diversify, reducing risk-adjusted returns
    derived_from_bd_id: BD-057
  - id: finance-C-206
    when: When implementing sentiment-based trading signal generation logic
    action: 'Classify sentiment scores: >=70 triggers positive opportunity signal, <=30 triggers negative risk signal — do
      not adjust these thresholds without validating against historical sentiment distributions'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing sentiment thresholds alters trading signal generation timing and frequency; tightening thresholds
      increases false signals while loosening thresholds delays market response
    derived_from_bd_id: BD-058
  - id: finance-C-207
    when: When implementing precious metals mean reversion trading logic for gold/silver ratio
    action: Generate long silver signal when gold/silver ratio exceeds 80 — do not modify this threshold as it is calibrated
      to historical silver undervaluation patterns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the gold/silver ratio threshold alters mean reversion signal timing; lowering it generates premature
      signals while raising it misses valid mean reversion opportunities
    derived_from_bd_id: BD-059
  - id: finance-C-208
    when: When implementing fund risk scoring logic for drawdown evaluation
    action: Weight MaxDD at 60% and Recovery speed at 40% in drawdown score calculation — do not alter these weights as they
      reflect specific investment risk philosophy where loss severity matters more than recovery speed
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Changing drawdown score weights alters risk assessment ranking; equalizing weights would underweight loss
      severity while over-weighting recovery would misrepresent investor experience
    derived_from_bd_id: BD-144
  - id: finance-C-209
    when: When implementing stock valuation scoring logic using fundamental factors
    action: Weight PEG ratio at 50%, PE percentile at 25%, and PB percentile at 25% in valuation score — do not change these
      weights as they reflect specific fundamental analysis philosophy prioritizing growth-adjusted metrics
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Changing valuation score weights alters stock ranking and selection; over-weighting growth metrics may overvalue
      speculative stocks while under-weighting them may miss growth opportunities
    derived_from_bd_id: BD-150
  - id: finance-C-210
    when: When implementing technical consolidation pattern detection logic
    action: Use 20-day lookback period with volatility at 40%, contraction at 35%, proximity at 25% in consolidation score
      calculation — do not modify these parameters as they are calibrated to specific short-term consolidation patterns
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Changing consolidation scoring parameters alters pattern detection sensitivity; shorter lookbacks introduce
      noise while longer lookbacks miss quick consolidation opportunities
    derived_from_bd_id: BD-151
  - id: finance-C-211
    when: When implementing report generation logic that requires transactional consistency with database records
    action: Use database BLOBs or implement separate transaction management for reports requiring consistency with database
      records — evaluate trade-offs before using file-based storage for operations requiring ACID properties
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: File-based report storage breaks transactional consistency; reports may become orphaned or inconsistent with
      database records during rollback scenarios
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-212
    when: When implementing growth score calculation in fundamental factor analysis
    action: Apply exactly 40% weight to revenue_cagr, 40% to profit_cagr, and 20% to acceleration_subscore — do not modify
      these weights without re-tuning
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying growth score weights changes the quality-growth balance; overweighting revenue_cagr introduces
      unprofitable growth stocks while underweighting it excludes early-stage high-growers, resulting in recommendations misaligned
      with the intended strategy
    derived_from_bd_id: BD-149
  - id: finance-C-213
    when: When implementing MA convergence detection for trend change identification
    action: Use exactly 5, 10, 20, and 60 day periods for MA convergence calculation — do not substitute other MA periods
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using different MA periods breaks the multi-timeframe confirmation logic; fewer periods miss structural trend
      confirmation while more periods add complexity without accuracy benefit, causing trend change signals to fire at wrong
      timing
    derived_from_bd_id: BD-153
  - id: finance-C-214
    when: When implementing technical sub-score calculation in short-term strategy
    action: Increase volume weight beyond 35% of technical sub-score — maintain consolidation at 40%, volume at 35%, and MA
      convergence at 25%
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Increasing volume weight above 35% amplifies sensitivity to artificial volume spikes and short-term market
      manipulation, undermining the hierarchical approach designed to reduce false breakout signals
    derived_from_bd_id: BD-156
  - id: finance-C-215
    when: When implementing risk sub-score calculation for entry zone identification
    action: Tighten RSI zone below 35-65 or Bollinger zone below 30-70 — maintain RSI 35-65 optimal zone, Bollinger 30-70
      zone, and debt ratio <50%
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Tightening technical zones excludes valid entry opportunities without reducing false signal rates; the 35-65
      RSI and 30-70 Bollinger boundaries are tuned to balance quality with opportunity, and narrower ranges would eliminate
      valid entries
    derived_from_bd_id: BD-157
  - id: finance-C-216
    when: When configuring default fund screening parameters for cost-conscious investors
    action: Verify that max_fund_management_fee=0.015 matches actual broker fee structure and adjust if needed
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Default 1.5% fee cap may be too high for cost-sensitive investors who typically use index funds with 0.5%
      fees; incorrectly allowing high-fee funds erodes long-term returns through compounding management costs
    derived_from_bd_id: BD-071
  - id: finance-C-217
    when: When filtering stock universe using default risk-exclusion settings
    action: Verify that avoid_st_stocks and avoid_new_stocks filters match the target market's risk profile — A-shares have
      different IPO lockup rules than assumed
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Default exclusion of ST stocks and IPOs under 1 year assumes A-share lockup rules, but may be overly conservative
      or insufficient for other markets; incorrectly including distressed or newly liquid stocks introduces high-risk positions
    derived_from_bd_id: BD-072
  - id: finance-C-218
    when: When configuring profitability filter for default stock universe selection
    action: Verify that require_profitable=PE>0 aligns with the investment strategy — growth-oriented strategies may want
      to include high-growth unprofitable companies
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Default PE>0 filter excludes early-stage companies with high growth potential but negative earnings; for
      strategies seeking turnaround opportunities or high-growth speculative plays, this filter eliminates valid candidates
    derived_from_bd_id: BD-073
  - id: finance-C-219
    when: When implementing momentum strategy weighting for fund recommendations
    action: Verify that momentum=40%, sector=30%, flow=20%, manager=10% aligns with strategy goals — increasing manager weight
      shifts toward qualitative over quantitative
    severity: medium
    kind: domain_rule
    modality: should
    consequence: The 40% momentum weight drives trend-following behavior; increasing manager weight above 10% shifts the strategy
      from quantitative momentum toward qualitative judgment, contradicting the momentum-focused fund selection objective
    derived_from_bd_id: BD-075
  - id: finance-C-220
    when: When modifying or refactoring any risk analysis, portfolio scoring, or fund diagnosis module that uses the risk-free
      rate constant
    action: Update each four hardcoded RISK_FREE_RATE=0.02 instances atomically across BD-008 (Data Collection), BD-030 (risk_analysis),
      BD-119 (fund/diagnosis), and BD-140 (fund_engine), or use a centralized shared constant; after any change, verify fund
      rankings remain consistent across each modules by comparing top fund lists
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing RISK_FREE_RATE in only one location without updating all four locations causes fund rankings to
      diverge from reports, with users seeing different top-ranked funds depending on which module they query, leading to
      suboptimal or contradictory investment recommendations
    derived_from_bd_id: BD-183
  - id: finance-C-221
    when: When implementing or refactoring date parsing logic in the portfolio router
    action: Maintain support for multiple date formats (YYYY-MM-DD, YYYYMMDD, and int formats) as defined in parse_snapshot_date
      function
    severity: high
    kind: domain_rule
    modality: must
    consequence: Restricting date parsing to a single format breaks existing integrations with data sources using alternative
      date format conventions, causing runtime parsing failures
    derived_from_bd_id: BD-GAP-018
  - id: finance-C-222
    when: When processing order state transitions in the backtesting framework
    action: Assume the framework implements a complete order lifecycle state machine with proper state transitions (pending,
      submitted, filled, partially_filled, cancelled, rejected)
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without order lifecycle state tracking, partial fills and cancellations are not properly recorded, causing
      incorrect position calculations and unreliable backtest equity curves
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-223
    when: When implementing order lifecycle management in the backtesting framework
    action: 'Implement a state machine tracking order lifecycle states: pending, submitted, filled, partially_filled, cancelled,
      rejected — verify each state transitions are validated and events are logged'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without proper state machine implementation, order state transitions are inconsistent, causing position tracking
      errors that accumulate over time in backtesting
    derived_from_bd_id: BD-GAP-022
  - id: finance-C-224
    when: When calculating portfolio returns or strategy performance in the backtesting framework
    action: Assume the framework automatically accounts for carry and funding costs in return calculations — these costs must
      be explicitly modeled
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Ignoring carry and funding costs systematically overstates returns for leveraged strategies and long-short
      portfolios, causing significant live trading performance deviation
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-225
    when: When computing portfolio returns in leveraged or margin trading backtesting
    action: 'Explicitly model carry/funding costs using the formula: carry_cost = leverage * daily_funding_rate * position_value
      — apply to long and short positions separately based on their respective rates'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit carry modeling, backtest returns for leveraged strategies overstate actual returns by the
      cumulative funding cost, which can be 3-8% annually for margin positions
    derived_from_bd_id: BD-GAP-023
  - id: finance-C-226
    when: When implementing position adjustment logic in the backtesting framework
    action: Assume the framework handles sell-before-buy vs buy-before-sell execution order automatically or that both orderings
      produce equivalent results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Changing execution order without understanding capital implications introduces hidden leverage when capital
      is insufficient, causing backtest-live inconsistency in margin scenarios
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-227
    when: When implementing order execution logic in the backtesting framework
    action: Document and implement the specific execution order (sell-before-buy or buy-before-sell) with explicit capital
      checking before each order — verify no reliance on implicit leverage
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit execution order documentation and capital validation, order execution may succeed in backtesting
      but fail in live trading due to insufficient funds
    derived_from_bd_id: BD-GAP-024
  - id: finance-C-228
    when: When computing correlation matrices for portfolio optimization or risk models
    action: Assume the framework provides covariance estimator selection and shrinkage methods — the sample covariance matrix
      is singular for high-dimensional problems
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using unshrunk sample covariance for portfolios with many assets leads to singular matrices, causing portfolio
      optimization failures and unreliable risk estimates
    derived_from_bd_id: BD-GAP-025
  - id: finance-C-229
    when: When configuring data source cache settings for the backtesting framework
    action: Verify that DATA_SOURCE_CACHE_TTL=60 seconds meets the data freshness requirements for each strategy type — high-frequency
      strategies may need shorter TTLs (5-15 seconds)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default 60-second cache TTL for high-frequency strategies causes stale price data to be used in calculations,
      distorting backtest results and causing signal decay
    derived_from_bd_id: BD-094
  - id: finance-C-230
    when: When implementing portfolio concentration analysis
    action: Flag any single stock exceeding 5% of total portfolio value as concentrated position — trigger review or rebalancing
      action
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allowing positions beyond 5% concentration exposes portfolio to single-stock events; a 20% decline in a 10%
      position causes 2% portfolio loss versus 1% with 5% limit
    derived_from_bd_id: BD-158
  - id: finance-C-231
    when: When calculating Sharpe/Sortino ratios for fund recommendations
    action: Document the RISK_FREE_RATE assumption (default 2%) and its impact on threshold classifications; verify thresholds
      remain valid under current market rate environment or implement rate-relative calibration
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Rising risk-free rates from 2% to 4.5% causes Sharpe ratios to drop 0.25-0.5 units, systematically reclassifying
      'good' funds as 'average' and 'average' as 'below_average' without any change in fund performance
    derived_from_bd_id: BD-189
  - id: finance-C-232
    when: When performing cross-asset performance comparison or attribution analysis
    action: Use consistent lookback period across each asset types — either standardize on 90-day default or explicitly document
      and validate different defaults (funds 100-day, stocks 90-day, indices 30-day) before comparison
    severity: medium
    kind: architecture_guardrail
    modality: should
    consequence: Inconsistent history windows (30-day indices vs 100-day funds) distort cross-asset performance attribution
      and risk calculations, causing misallocation decisions based on non-comparable data windows
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-233
    when: When implementing recommendation scoring logic
    action: Verify that stock minimum score of 60 and fund minimum score of 55 align with current user risk tolerance settings;
      make thresholds configurable rather than hardcoded to accommodate changing risk profiles
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hardcoded recommendation thresholds ignore user risk tolerance settings, producing recommendations that are
      either too conservative or too aggressive, leading to unsuitable investment suggestions
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-234
    when: When implementing widget news feed retrieval
    action: Verify that 'sina' as the default news source is operational before relying on it; implement fallback logic or
      multi-source capability to verify news availability during Sina service disruptions
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Widget news feeds defaulting to Sina produce no results during Sina service disruptions, leaving users with
      empty news widgets and lost market information access
    derived_from_bd_id: BD-GAP-019
  - id: finance-C-235
    when: When implementing correlation calculations in portfolio analysis
    action: Enforce a minimum of 20 data points before calculating correlation; reject or flag correlations with insufficient
      data
    severity: high
    kind: domain_rule
    modality: must
    consequence: Correlation calculations with fewer than 20 data points produce noisy, statistically meaningless estimates
      that can mislead portfolio optimization decisions and cause unexpected clustering
    derived_from_bd_id: BD-085
  - id: finance-C-236
    when: When analyzing portfolio correlation for concentration risk detection
    action: Use correlation threshold of 0.7 as the HIGH_POSITIVE_THRESHOLD for triggering concentration risk warnings; asset
      pairs with correlation >= 0.7 must be flagged as inadequately diversified
    severity: high
    kind: domain_rule
    modality: must
    consequence: Setting the threshold below 0.7 generates excessive warnings that desensitize analysts; setting it above
      0.7 misses meaningful concentration risk where asset pairs move too closely together
    derived_from_bd_id: BD-168
  - id: finance-C-237
    when: When processing pre-market analysis for different asset types
    action: Route fund analysis requests through NAV-based metrics path and stock analysis requests through price-based indicators
      path; maintain separate analytical paths for each asset class
    severity: high
    kind: domain_rule
    modality: must
    consequence: Applying price-based indicators to fund NAV data or NAV-based metrics to stock prices produces fundamentally
      incorrect analysis, causing wrong trading signals and potential financial losses
    derived_from_bd_id: BD-017
  - id: finance-C-238
    when: When calculating and classifying Sharpe ratio for fund performance reporting
    action: Apply the fixed Sharpe ratio classification thresholds (>=2 excellent, >=1 good, >=0.5 average, >=0 below_average,
      <0 poor) for per-fund risk-adjusted return assessments; do not substitute with dynamic thresholds based on category
      averages
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using variable thresholds tied to category averages creates inconsistent fund classification messaging, misleading
      investors about absolute fund quality regardless of market conditions
    derived_from_bd_id: BD-031
  - id: finance-C-239
    when: When checking Chinese A-share market trading hours for real-time data updates and trading signal activation
    action: Use 09:30-15:00 as the active Chinese A-share trading window; exclude lunch break hours; do not include extended
      pre/post market hours as Chinese A-shares have limited after-hours trading
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect market hours causes trading signals and data updates to fire at wrong times, resulting in
      missed trading opportunities or attempted trades outside valid market hours
    derived_from_bd_id: BD-061
  - id: finance-C-240
    when: When implementing concentration risk detection across portfolio signals, fund portfolio analysis, and portfolio
      management modules
    action: Unify concentration threshold definitions to a single constant value — either 5% or 20% — applied consistently
      across each modules; do not allow contradictory thresholds (5% in some modules, 20% in others)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: 'Contradictory concentration thresholds create enforcement gaps: portfolios flagged as concentrated by fund
      analysis won''t trigger warnings in portfolio tracking, leaving investors exposed to concentration risk the system should
      but fails to detect uniformly'
    derived_from_bd_id: BD-184
  - id: finance-C-241
    when: When implementing short-term stock screening and recommendation logic
    action: Apply the same quality gates (ROE >= 10%, cash flow adequacy) used for long-term recommendations to short-term
      recommendations — do not allow stocks with ROE < 10% or weak cash flow to pass screening based solely on favorable technical
      indicators
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Short-term recommendations with low technical threshold (60) and high technical weight (40%) allow stocks
      with ROE=5% and weak fundamentals to pass screening, creating risky buy recommendations that the quality gate was specifically
      designed to prevent for long-term positions
    derived_from_bd_id: BD-185
  - id: finance-C-242
    when: When implementing or refactoring RSI calculation in technical analysis modules
    action: Use 14-period Wilder smoothing RSI (exponential moving average with alpha=1/14) — do not replace with Cutler RSI,
      EMA-based RSI, or other variants without explicit business approval
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-Wilder RSI variants produces different overbought/oversold signals, causing the strategy to enter
      or exit positions at different times than designed; backtest results become incomparable with industry-standard charting
      platforms
    derived_from_bd_id: BD-110
  - id: finance-C-243
    when: When implementing fund diagnosis scoring logic
    action: Apply exactly 20% weight to each of the five fund evaluation dimensions (profitability, risk resistance, manager
      quality, trend, valuation) — do not adjust individual dimension weights based on backtest optimization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Adjusting individual dimension weights changes the fund evaluation methodology, allowing fund managers to
      game single metrics; this undermines the balanced assessment designed to prevent gaming and produces unreliable backtest
      results
    derived_from_bd_id: BD-117
  - id: finance-C-244
    when: When implementing earnings quality screening in fundamental analysis
    action: Enforce OCF/Profit minimum ratio threshold of 0.8 — do not change to 1.0 or other values without explicit business
      approval; values below 0.8 indicate earnings not well-supported by cash generation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the threshold alters earnings quality screening, potentially including stocks with accounting manipulation
      risk; a threshold of 1.0 excludes valid businesses with legitimate working capital requirements
    derived_from_bd_id: BD-147
  - id: finance-C-245
    when: When implementing quality score calculation for stock recommendations
    action: 'Apply the fixed quality score weights: ROE 35%, Margin stability 20%, Cash flow 25%, Debt 20% — do not modify
      these weights to improve backtest correlation without explicit business approval'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying quality score weights changes the fundamental evaluation criteria, potentially favoring different
      types of stocks and causing backtest results to reflect an optimized rather than realistic evaluation methodology
    derived_from_bd_id: BD-148
  - id: finance-C-246
    when: When configuring mean reversion strategy parameters for backtesting
    action: Verify that the default holding_period=30 days matches actual portfolio rebalancing frequency requirements; if
      adjusting, verify transaction cost model is updated accordingly as shorter periods increase trading frequency
    severity: medium
    kind: domain_rule
    modality: should
    consequence: The 30-day default represents a deliberate tradeoff between reversion speed and transaction costs; using
      shorter periods (e.g., 20 days) increases trading frequency and costs, while longer periods may miss reversion opportunities,
      causing significant divergence between backtest and live performance
    derived_from_bd_id: BD-060
  - id: finance-C-247
    when: When implementing data collection and feature engineering for ML/AI trading models
    action: Assume the framework enforces training/test/trading time boundary separation — the framework does not implement
      time-based data partitioning controls; training data may leak into test or trading periods
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without time boundary controls, training data may leak into test periods causing look-ahead bias where the
      model appears to outperform but fails in live trading due to information not available at prediction time
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-248
    when: When implementing data preprocessing pipelines for ML/AI trading models
    action: Implement time-based data partitioning with explicit training period, test period, and trading period boundaries;
      use temporal indexing to verify no future data leaks into training set
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without explicit time boundary enforcement, features computed across the full dataset may include future
      information in training periods, creating systematic overestimation of model performance
    derived_from_bd_id: BD-GAP-027
  - id: finance-C-249
    when: When implementing data preprocessing pipelines with sklearn-compatible transformers
    action: Assume the framework enforces fit/transform isolation between training and test data — the framework does not
      implement pipeline isolation controls; transformers may be fit on test data causing data leakage
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: When scalers, encoders, or feature transformers are fit on the full dataset including test data, the model
      receives information about test set distribution, causing systematic overestimation of backtest performance
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-250
    when: When implementing sklearn transformers (StandardScaler, MinMaxScaler, LabelEncoder, OneHotEncoder) in data preprocessing
    action: Fit transformers exclusively on training data split (train_indices), then apply fitted transformers to transform
      test/trading data (transform_only); use sklearn Pipeline or ColumnTransformer with train-only fitting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without fit/transform isolation, scalers learn test set statistics and inflate feature values during training,
      causing unrealistic backtest performance that cannot be reproduced in live trading
    derived_from_bd_id: BD-GAP-028
  - id: finance-C-251
    when: When implementing AI/ML-driven trading signal generation without human oversight
    action: Assume the framework implements multi-agent decision consensus or risk veto controls — the framework does not
      enforce consensus requirements; AI-generated signals execute without validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without consensus or veto mechanisms, AI-generated signals can override risk controls and execute trades
      that violate portfolio-level risk limits, potentially causing significant financial losses
    derived_from_bd_id: BD-GAP-029
  - id: finance-C-252
    when: When implementing AI/ML-driven trading signal generation
    action: 'Implement a mandatory two-step approval gate: AI-generated signals must pass through either (1) human trader
      approval or (2) automated risk system veto check before order submission; log each signal approvals and vetoes'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without a consensus gate, AI signals can trigger trades that exceed position limits or violate volatility
      constraints, causing losses that would not occur with proper risk oversight
    derived_from_bd_id: BD-GAP-029
  - id: finance-C-253
    when: When implementing ML/AI components (prediction models, pattern recognition, reinforcement learning agents) in trading
      strategies
    action: Assume ML/AI components are properly validated with training/test split or walk-forward validation — the framework
      does not implement validation controls; AI models may be overfitted to historical patterns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper train/test split or walk-forward validation, ML/AI models memorize historical patterns and
      appear profitable in backtesting but fail in live trading due to overfitting
    derived_from_bd_id: BD-GAP-032
  - id: finance-C-254
    when: When implementing any ML/AI model for trading signal generation
    action: Implement temporal train/test split with non-overlapping time windows or walk-forward validation with expanding/sliding
      windows; evaluate model performance on out-of-sample periods before deployment
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without validation, overfitted models produce unrealistic backtest returns that cannot be achieved in live
      trading, leading to deployment of models that lose money in production
    derived_from_bd_id: BD-GAP-032
  - id: finance-C-255
    when: When implementing order execution and position tracking logic
    action: Assume the framework implements order state machine with fill tracking — the framework does not track order execution
      states; each orders are treated as immediately filled at submission
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without order state tracking, the system assumes immediate fill causing ghost positions where the backtest
      shows positions that never actually existed in live trading due to execution latency or rejection
    derived_from_bd_id: BD-GAP-034
  - id: finance-C-256
    when: When implementing order submission and position management
    action: 'Implement an order state machine with states: PENDING, PARTIAL_FILLED, FILLED, REJECTED, CANCELLED; update position
      only upon FILLED confirmation; record submission_time and fill_time for latency tracking'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without state machine tracking, backtest results assume zero execution latency and ignore order rejections,
      causing systematic overestimation of returns when actual fills are delayed or rejected in live trading
    derived_from_bd_id: BD-GAP-034
  - id: finance-C-257
    when: When analyzing Chinese financial market content using AI-powered features
    action: Set LLM_PROVIDER to 'gemini' for Chinese market content analysis; if using a different provider, verify analysis
      quality matches Gemini's Chinese market knowledge coverage
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using non-Gemini LLM providers for Chinese market analysis may produce inaccurate or incomplete analysis
      due to insufficient Chinese content training, leading to poor investment decisions based on flawed AI-generated insights
    derived_from_bd_id: BD-104
  - id: finance-C-258
    when: When selecting an OpenAI model for analysis tasks
    action: Verify the selected OpenAI model is gpt-4o or a comparable latest stable model; check model availability as OpenAI
      frequently deprecates older models
    severity: low
    kind: domain_rule
    modality: should
    consequence: Using outdated OpenAI models may produce lower quality analysis compared to gpt-4o, and model deprecation
      without updating the default can cause API failures in production
    derived_from_bd_id: BD-105
  - id: finance-C-260
    when: When implementing or modifying ATR calculation in commodities analysis
    action: Use 14-period SMA of True Range for ATR calculation following Wilder's specification; do not substitute EMA, different
      window sizes, or alternative smoothing methods without explicit rationale
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect ATR parameters cascade into stop-loss and position sizing calculations; using a different ATR window
      or smoothing method changes volatility estimates, causing systematically wrong risk management and potential significant
      losses
    derived_from_bd_id: BD-108
  - id: finance-C-261
    when: When implementing factor computation for high-dimensional portfolios (>50 assets)
    action: Assume the framework implements covariance shrinkage (Ledoit-Wolf) — the framework uses sample correlation without
      shrinkage, leading to unstable covariance estimates in high-dimensional portfolios
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Unstable covariance matrices produce unreliable portfolio weights, causing suboptimal diversification and
      significant losses when high-dimensional portfolios experience correlated drawdowns
    derived_from_bd_id: BD-GAP-036
  - id: finance-C-262
    when: When configuring portfolio optimization for high-dimensional portfolios
    action: Implement or configure Ledoit-Wolf covariance shrinkage — apply oracle approximating shrinkage (OAS) or analytical
      shrinkage to stabilize the covariance matrix when estimating correlations across more than 50 assets
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without shrinkage, sample covariance becomes singular or near-singular in high dimensions, causing numerical
      instability and portfolio weights that are hypersensitive to small correlation changes
    derived_from_bd_id: BD-GAP-036
  - id: finance-C-263
    when: When implementing long-short strategy backtesting with leveraged positions
    action: Assume the framework models funding costs for leveraged positions — the framework does not implement carry/funding
      cost modeling, causing long-short strategies to show inflated returns that cannot be replicated in live trading
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without funding cost modeling, long-short strategies appear more profitable in backtests than in live trading;
      the spread between borrowing costs and lending returns is ignored, leading to overestimated Sharpe ratios by 20-40%
    derived_from_bd_id: BD-GAP-037
  - id: finance-C-264
    when: When running backtests for long-short strategies with leveraged positions
    action: Manually subtract funding costs from strategy returns — apply an estimated borrowing rate (e.g., 1-3% above risk-free
      rate) on net short exposure and lending rate on net long exposure to produce realistic net returns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Inflated backtest returns without funding costs lead to strategies that appear profitable but lose money
      in live trading after accounting for the cost of borrowing margin positions
    derived_from_bd_id: BD-GAP-037
  - id: finance-C-265
    when: When calculating price correlation between gold and silver for pair trading
    action: Verify the correlation calculation uses exactly 60-day rolling window on returns — if using pandas rolling, explicitly
      specify window=60; do not use default or shorter windows that would introduce noise into the co-movement signal
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using a shorter window (e.g., 20-day default) introduces noise that weakens correlation signals, causing
      premature or delayed mean reversion trades in gold-silver spread strategies
    derived_from_bd_id: BD-109
  - id: finance-C-266
    when: When implementing Bollinger Bands for commodity price analysis
    action: Configure Bollinger Bands with exactly 20-day window and 2 standard deviations — verify the implementation matches
      Bollinger's original specification; narrower bands (1.5SD) generate unreliable signals while wider bands (3SD) miss
      moderate opportunities
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using non-standard Bollinger Band parameters changes the statistical containment properties, causing strategies
      to trigger on signals that fall outside the intended 95% price distribution range
    derived_from_bd_id: BD-111
  - id: finance-C-267
    when: When implementing Gold/Silver Ratio mean reversion trading signals
    action: Configure mean reversion threshold at exactly 80 with 30-day holding period — verify the threshold matches historical
      extreme ratio levels; using a lower threshold (70) increases signal frequency but weakens edge, while 90 reduces frequency
      significantly
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using incorrect threshold values causes the strategy to enter positions at suboptimal ratio levels, reducing
      the probability of successful mean reversion and increasing trade frequency without corresponding edge
    derived_from_bd_id: BD-112
  - id: finance-C-268
    when: When implementing recovery speed analysis in fund diagnosis
    action: Change the 5% drawdown threshold used to identify significant drawdown periods without explicit business justification
      — the threshold distinguishes meaningful corrections from normal market fluctuations
    severity: medium
    kind: domain_rule
    modality: must_not
    consequence: Modifying the 5% drawdown threshold without understanding its purpose causes recovery metrics to be calculated
      over incorrect baseline periods, leading to misleading fund resilience assessments and inappropriate investor communications
    derived_from_bd_id: BD-122
  - id: finance-C-269
    when: When implementing VaR calculation for risk reporting
    action: Calculate VaR at both 95% and 99% confidence levels using historical percentile method — 95% VaR serves moderate
      tail risk reporting while 99% VaR addresses regulatory capital requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Calculating only a single VaR level omits either moderate tail risk visibility (95%) or fails regulatory
      capital adequacy requirements (99%), causing either inadequate risk monitoring or non-compliance with regulatory frameworks
    derived_from_bd_id: BD-124
  - id: finance-C-270
    when: When configuring DrawdownAnalyzer for portfolio risk assessment
    action: Verify that the 5% drawdown threshold matches the fund's risk tolerance definition before using default values
      — the threshold filters normal market noise from actionable drawdown analysis
    severity: medium
    kind: domain_rule
    modality: should
    consequence: Using a mismatched drawdown threshold causes either over-triggering on minor fluctuations or missing early
      warning signals of significant corrections, resulting in delayed risk intervention or alert fatigue
    derived_from_bd_id: BD-125
  - id: finance-C-271
    when: When implementing correlation matrix calculation for portfolio analysis
    action: Use 90-day lookback period with pairwise Pearson correlation method — the 90-day window captures approximately
      one quarter of market behavior without stale data distortion
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a shorter lookback (30-day) introduces volatile correlation estimates while longer windows (180-day)
      lag regime changes, both causing incorrect portfolio diversification assessments and concentration risk underestimation
    derived_from_bd_id: BD-126
  - id: finance-C-272
    when: When implementing concentration risk detection in portfolio analysis
    action: Change the high correlation threshold from 0.7 without documented justification — pairs with correlation above
      0.7 provide limited diversification benefit and warrant concentration review
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Lowering the threshold (e.g., to 0.5) causes alert fatigue from over-flagging normal co-movement, while raising
      it (e.g., to 0.85) misses significant correlation risks, resulting in undetected concentration in live portfolios
    derived_from_bd_id: BD-127
  - id: finance-C-273
    when: When implementing or refactoring portfolio diversification analysis logic
    action: 'Calculate diversification score using formula: (1 - average_correlation) * 100, capped at 100 for interpretability'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Changing the diversification formula alters portfolio risk assessment, causing strategies based on diversification
      scores to make incorrect allocation decisions and potentially over-concentrate or under-diversify positions
    derived_from_bd_id: BD-128
  - id: finance-C-274
    when: When implementing VaR calculation logic for portfolio risk metrics
    action: Require at least 50% portfolio weight with valid data before computing VaR — exclude calculations when insufficient
      liquid positions exist
    severity: high
    kind: domain_rule
    modality: must
    consequence: VaR computed with insufficient valid weight includes thinly traded positions that distort risk estimates,
      causing underestimation of portfolio risk and potential margin call surprises in live trading
    derived_from_bd_id: BD-131
  - id: finance-C-275
    when: When implementing RSI signal generation in technical analysis
    action: Use 14-period RSI calculation with oversold threshold at 30 and overbought threshold at 70 — these boundaries
      represent statistically significant deviation triggering reversal signals
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using non-standard RSI parameters (different period or thresholds) changes signal frequency and accuracy,
      causing strategies to generate either excessive whipsaws or miss critical reversal points, degrading backtest and live
      performance
    derived_from_bd_id: BD-132
  - id: finance-C-276
    when: When implementing portfolio concentration risk monitoring
    action: Flag concentration risk when any single position exceeds 20% of total portfolio value — trigger monitoring and
      potential rebalancing review
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect concentration threshold causes either false positives (lower threshold) or missed risk detection
      (higher threshold), leading to unhedged concentration exposure that significantly impacts total portfolio performance
      during adverse events
    derived_from_bd_id: BD-133
  - id: finance-C-277
    when: When implementing composite signal generation logic for trading opportunities
    action: Use opportunity_threshold=0.6 and risk_threshold=0.6 — signals only trigger when composite indicator exceeds 0.5,
      indicating convincing directional pressure
    severity: high
    kind: domain_rule
    modality: must
    consequence: 'Using non-standard signal thresholds changes trade frequency and entry quality: lower thresholds increase
      whipsaws from minor fluctuations, higher thresholds miss legitimate opportunities, degrading strategy performance and
      increasing transaction costs'
    derived_from_bd_id: BD-134
  - id: finance-C-278
    when: When starting any task in the repository
    action: Read the GEMINI.md file first to identify applicable skills and rules
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Without reading GEMINI.md, the agent may load incorrect or irrelevant skills, causing response format inconsistencies
      and violation of project-specific constraints
    stage_ids:
    - all
  - id: finance-C-279
    when: When determining which skill to load for a task
    action: Verify that the task's trigger condition matches the skill's defined trigger condition before loading
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Loading an unmatched skill results in irrelevant process guidance, producing responses that do not address
      the actual task requirements
    stage_ids:
    - all
  - id: finance-C-280
    when: When a skill file has been loaded for a task
    action: Follow the process and output format exactly as defined in the loaded skill file
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Deviating from the skill-defined process and output format breaks the response contract, making responses
      inconsistent with project expectations
    stage_ids:
    - all
  - id: finance-C-281
    when: When drafting any response or recommendation
    action: Verify each recommendations comply with the rules loaded from .agents/rules/
    severity: high
    kind: domain_rule
    modality: must
    consequence: Non-compliant recommendations may violate API guidelines, React component practices, or other domain-specific
      constraints established by the project
    stage_ids:
    - all
  - id: finance-C-282
    when: When providing any response to a task
    action: Explicitly state which skills and rules are in effect for that response
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Without explicit disclosure, downstream systems or human reviewers cannot verify that the correct constraints
      were applied, compromising auditability
    stage_ids:
    - all
  - id: finance-C-284
    when: When a task touches domains covered by rules files
    action: Preload the corresponding rule files under .agents/rules/ before drafting any response
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping rule preloading means recommendations may violate domain-specific constraints like API guidelines
      or component practices
    stage_ids:
    - all
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
