      backtest_result = engine.run(start=''2015-01-01'', end=''2024-12-31'')

      '
    good_example: '# GOOD: 拆分日历窗口分析绩效

      normal_days = df[~df[''is_lunar_new_year_window''] & ~df[''is_month_start'']]

      calendar_days = df[df[''is_lunar_new_year_window''] | df[''is_month_start'']]

      print(f"Normal Sharpe: {calc_sharpe(normal_days):.2f}")

      print(f"Calendar Sharpe: {calc_sharpe(calendar_days):.2f}")

      '
  provenance:
