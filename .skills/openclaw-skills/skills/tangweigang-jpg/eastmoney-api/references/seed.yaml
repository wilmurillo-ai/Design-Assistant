      engine = BacktestEngine(commission=0, slippage=0)

      '
    good_example: "# GOOD: A 股标准成本配置（2023年8月后）\nengine = BacktestEngine(\n    stamp_duty=0.0005,      # 印花税 0.05%，卖出单向\n \
      \   commission=0.0001,      # 佣金 0.01% 双向（最低5元）\n    transfer_fee=0.00001,   # 沪市过户费 0.001%（单向）\n    slippage=0.0005,\
      \        # 滑点 0.05%（大盘股估算）\n)\n"
  provenance:
