  evidence_refs:
  - type: academic
    ref: 北京理工大学《基于多属性羊群行为的股票风险及其传染》（2017）；东方财富证券金工《基于市场羊群效应的股票alpha探究》（2019）
    url: http://journal.bit.edu.cn/sk/cn/article/pdf/preview/10.15918/j.jbitss1009-3370.2017.0109.pdf
  reference_code:
    bad_example: '# BAD: 用热度排行榜作为核心选股因子（典型羊群信号）

      hot_stocks = eastmoney.get_hot_rank(top_n=50)

      '
    good_example: '# GOOD: 使用基本面/量价因子，热度作为风险调整因子而非选股主因子

      factor_score = 0.7 * value_factor + 0.3 * momentum_factor

      risk_adjust = 1 - 0.2 * herding_index  # 高羊群指数时降低仓位

      '
  provenance:
    source: academic
  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-BF-003
  statement: '过度自信效应（Barber & Odean 2000）在 A 股散户中更严重：散户年均换手率 超 500%，机构长期收益显著优于散户。高换手率策略经交易成本后净收益往往 更低。AI 不应鼓励"频繁操作"，而应推荐低频高质信号驱动交易。

    '
