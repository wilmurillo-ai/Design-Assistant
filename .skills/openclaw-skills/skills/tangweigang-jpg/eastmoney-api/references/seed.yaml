    - cn-astock
    activities:
    - backtesting
    - live-trading
  applicable_conditions:
    blueprint_has_stage:
    - signal_generation
    - order_execution
  incompatible_with_tags: {}
  stage_id_remap_hints:
  - from_stage: signal_generation
    constraint_context: stop-loss rules must be enforced; user emotional override is an anti-pattern
  evidence_refs:
  - type: academic
    ref: Shefrin & Statman (1985) JF；汉斯出版《对上海股市投资者处置效应的实证研究》（2022）
    url: https://image.hanspub.org/Html/5-1140388_30054.htm
  reference_code:
    bad_example: "# BAD: 允许用户手动豁免止损规则（强化处置效应）\nif user_override and position_loss > 0.1:\n    hold_position()  # \"等回来\" 的心态\n"
    good_example: "# GOOD: 纪律性止损，不因情绪豁免\nMAX_LOSS = 0.08\nif (current_price / entry_price - 1) < -MAX_LOSS:\n    execute_stop_loss(stock)\n\
      \    log_decision(reason=\"systematic_stop_loss\")\n"
  provenance:
    source: academic
  _source_file: cn-astock/constraints.yaml
- id: SHARED-CN-ASTOCK-BF-002
  statement: 'A 股以散户为主（个人账户交易量占比超 80%），羊群效应显著：散户倾向于 跟风操作，导致价格非理性波动（如 2015年杠杆牛熊）。量化策略应避免 使用成交量排行/热度排行等可能强化羊群信号的指标作为主要因子。

    '
  severity: medium
  capability_tags:
