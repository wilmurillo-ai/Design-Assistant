    kind: resource_boundary
    modality: must_not
    consequence: Incorrect margin requirements lead to wrong position sizing and potential margin call failures during live
      trading
    stage_ids:
    - data_layer
  - id: finance-C-011
    when: When running backtests with RQAlpha
    action: update data bundle periodically to include latest corporate actions and trading dates
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Stale dividend and split data causes incorrect price adjustments, leading to inaccurate historical performance
      calculations
    stage_ids:
    - data_layer
  - id: finance-C-012
    when: When processing adjustment for weekly bars
    action: apply adjustment before resampling weekly bars to maintain correct temporal alignment
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Incorrect bar resampling with adjustment causes OHLCV values to be misaligned with actual trading days
    stage_ids:
    - data_layer
  - id: finance-C-013
    when: When using get_instruments with both id_or_syms and types parameters
    action: prioritize id_or_syms lookup over type filtering as specified in interface contract
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Instrument lookup returns unexpected results when both parameters are provided, causing order routing failures
    stage_ids:
    - data_layer
  - id: finance-C-014
    when: When implementing custom DataSource
    action: inherit from AbstractDataSource and implement each required methods for data access
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing interface implementation causes AttributeError during backtest execution when unsupported methods
      are called
    stage_ids:
    - data_layer
  - id: finance-C-015
    when: When implementing custom PriceBoard
    action: inherit from AbstractPriceBoard and implement get_last_price, get_limit_up, get_limit_down methods
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing PriceBoard implementation causes order validation and execution failures during simulation
    stage_ids:
    - data_layer
  - id: finance-C-016
    when: When accessing trading calendar for futures
    action: account for night trading sessions that span calendar day boundaries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect trading date calculation for futures night session causes orders to be rejected or executed on
      wrong day
    stage_ids:
    - data_layer
  - id: finance-C-017
    when: When caching instrument lookups
    action: include listed_date and market in cache key to handle code reuse scenarios correctly
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Cache collision for reused order_book_id causes wrong instrument data for different listing periods like
      Hong Kong stocks
    stage_ids:
    - data_layer
  - id: finance-C-018
    when: When running backtests with RQAlpha
    action: claim backtest results represent actual trading performance with certainty
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting backtest results as guaranteed future performance violates financial regulations and misleads
      investors about expected returns
    stage_ids:
    - data_layer
  - id: finance-C-019
    when: When using RQData connection for live data
    action: expect RQAlpha's PriceBoard to provide real-time data with zero latency
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Strategies assuming zero-latency data may fail during live trading when data delivery delays occur
    stage_ids:
    - data_layer
  - id: finance-C-024
    when: When registering event listeners for Order/Trade/Position objects
    action: register bound methods of these transient objects as event handlers
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Registering bound methods of Order/Trade/Position objects causes reference retention issues and memory leaks,
      as these objects may be garbage collected while still registered as listeners
    stage_ids:
    - event_system
  - id: finance-C-025
    when: When implementing a system listener that should stop propagation
    action: return True from the listener to stop event propagation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without returning True, subsequent system listeners will continue processing, potentially causing duplicate
      order matching or inconsistent state updates
    stage_ids:
    - event_system
  - id: finance-C-027
    when: When using NEXT_BAR_OPEN matching type with 1d frequency
    action: expect automatic degradation to CURRENT_BAR_CLOSE
    severity: high
    kind: resource_boundary
    modality: must
    consequence: NEXT_BAR_OPEN signals execute immediately at current bar close instead of next bar open, causing look-ahead
      bias and incorrect strategy behavior
    stage_ids:
    - event_system
  - id: finance-C-029
    when: When registering strategy handle_bar function
    action: pass user=True to add_listener
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Strategy handle_bar registered as user listener executes after broker.on_bar, breaking the correct order
      where broker must process bar events before strategy
    stage_ids:
    - event_system
  - id: finance-C-030
    when: When relying on event listener execution order
    action: understand that mod.start_up registration occurs before strategy registration
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Misunderstanding registration order leads to incorrect assumptions about when broker.on_bar executes relative
      to strategy.handle_bar
    stage_ids:
    - event_system
  - id: finance-C-036
    when: When representing backtest results as trading performance
    action: claim backtest returns equal expected live trading returns
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest simulation omits slippage, liquidity constraints, and market impact, making backtest returns materially
      different from actual trading
    stage_ids:
    - event_system
  - id: finance-C-037
    when: When describing event-driven simulation capabilities
    action: claim the event system provides real-time trading capabilities
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Event-driven backtesting uses historical data replay and cannot execute orders in real-time market conditions
    stage_ids:
    - event_system
  - id: finance-C-038
    when: When implementing event handlers
    action: skip root cause investigation when event ordering appears incorrect
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Assuming event order is correct without verification leads to missed bugs in custom EventSource implementations
      or listener registration
    stage_ids:
    - event_system
  - id: finance-C-039
    when: When debugging event listener execution order
    action: skip logging listener execution when order matters
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Without logging, incorrect listener ordering is difficult to diagnose, especially when mod registration order
      affects execution sequence
    stage_ids:
    - event_system
  - id: finance-C-043
    when: When implementing get_open_orders() API for strategy access
    action: Return empty list when called during BEFORE_TRADING phase since no orders have been matched yet
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategies expecting to see pending orders from previous days during before_trading() will incorrectly see
      empty lists, causing logic errors in pre-market analysis and order management decisions.
    stage_ids:
    - strategy_execution
  - id: finance-C-044
    when: When implementing history_bars() API for strategy access
    action: Return T-1 historical data during BEFORE_TRADING phase regardless of requested frequency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategies expecting current day data during before_trading() will receive stale prices, causing incorrect
      signal generation and potential financial losses from trades based on outdated information.
    stage_ids:
    - strategy_execution
  - id: finance-C-045
    when: When using RQAlpha for live trading or production systems
    action: Claim backtest results as equivalent to live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting simulated backtest returns as expected live trading results misleads stakeholders and may violate
      regulatory requirements. Backtest results include look-ahead bias, survivorship bias, and lack of slippage/commission
      modeling that affects live execution.
    stage_ids:
    - strategy_execution
  - id: finance-C-048
    when: When implementing or using strategy API functions
    action: Use @ExecutionContext.enforce_phase decorator to restrict API calls to valid execution phases
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: API functions callable during invalid phases may produce incorrect results (e.g., history_bars returning
      future data) or access uninitialized state, corrupting strategy logic and portfolio calculations.
    stage_ids:
    - strategy_execution
  - id: finance-C-051
    when: When executing strategy callbacks during development or testing
    action: Wrap callback execution in EXECUTION_PHASE context using ExecutionContext() for proper API availability
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Callbacks executing outside proper ExecutionContext phases will fail when calling APIs restricted by @enforce_phase,
      or may access uninitialized data, causing cryptic RuntimeError or incorrect market data.
    stage_ids:
    - strategy_execution
  - id: finance-C-052
    when: When implementing signal-based brokers or custom order matching
    action: Return empty list from get_open_orders() since signal mode does not track pending orders
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: get_open_orders() returning non-empty lists in signal mode misleads strategies about order status, causing
      incorrect logic when strategies expect to see and manage pending orders.
    stage_ids:
    - strategy_execution
  - id: finance-C-053
    when: When implementing or extending AbstractBroker for live trading
    action: Implement order lifecycle tracking (submit, match, cancel, settle) for proper get_open_orders() support
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Brokers without proper order lifecycle tracking cannot provide accurate pending order information to strategies,
      causing failures in order management and cancellation logic during live trading.
    stage_ids:
    - strategy_execution
  - id: finance-C-054
    when: When developing custom StrategyLoader for notebooks or interactive environments
    action: Use UserFuncStrategyLoader pattern for passing user-defined functions directly
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Custom loaders not following the scope compilation pattern may fail to inject API functions into strategy
      scope, causing AttributeError when strategies call submit_order, history_bars, etc.
    stage_ids:
    - strategy_execution
  - id: finance-C-058
    when: When implementing stamp tax calculation
    action: apply stamp tax to BUY orders or non-CS instrument types
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Incorrectly charging stamp tax on buy orders inflates transaction costs, causing strategy returns to be artificially
      lowered and misrepresenting actual trading costs
    stage_ids:
    - order_execution
  - id: finance-C-059
    when: When implementing slippage price adjustment
    action: constrain slippage-adjusted price within limit_up and limit_down bounds
    severity: high
    kind: domain_rule
    modality: must
    consequence: Slippage-adjusted price exceeding price limits causes impossible execution prices, violating Chinese stock
      market trading rules and producing invalid backtest fills
    stage_ids:
    - order_execution
  - id: finance-C-062
    when: When using SignalBroker for order execution
    action: submit exercise orders or call cancel_order in signal mode
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: SignalBroker raises NotImplementedError for exercise orders and cancel_order is a no-op, causing strategies
      to fail silently or behave unexpectedly
    stage_ids:
    - order_execution
  - id: finance-C-063
    when: When configuring matching_type based on frequency
    action: use only tick-compatible matching types (NEXT_TICK_*) for tick frequency, and bar-compatible types (CURRENT_BAR_CLOSE/VWAP/NEXT_BAR_OPEN)
      for bar frequency
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incompatible matching type causes RuntimeError and prevents backtest from starting, wasting development time
    stage_ids:
    - order_execution
  - id: finance-C-064
    when: When using algorithm orders (TWAP/VWAP)
    action: use algo order styles with 1m or tick frequency
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Algo orders raise RuntimeError when frequency is 1m or tick, causing strategy initialization to fail
    stage_ids:
    - order_execution
  - id: finance-C-065
    when: When executing orders with price_limit enabled
    action: reject orders that would execute at or beyond limit_up (for BUY) or limit_down (for SELL) prices
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Filling orders at price limit violations produces physically impossible trades, corrupting backtest results
      and violating Chinese exchange rules
    stage_ids:
    - order_execution
  - id: finance-C-066
    when: When setting transaction cost deciders
    action: register deciders keyed by (INSTRUMENT_TYPE, MARKET) tuple for each supported instrument types
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Missing transaction cost decider raises NotImplementedError at match time, causing all trades to fail
    stage_ids:
    - order_execution
  - id: finance-C-067
    when: When configuring margin_multiplier for futures trading
    action: set margin_multiplier to zero or negative value
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Zero or negative margin multiplier disables margin requirements, allowing infinite position sizing and causing
      unrealistic backtest results
    stage_ids:
    - order_execution
  - id: finance-C-068
    when: When configuring slippage rate for PriceRatioSlippage
    action: verify slippage rate is in range [0, 1)
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Invalid slippage rate causes ValueError, preventing backtest initialization, or produces unrealistic execution
      prices outside valid trading range
    stage_ids:
    - order_execution
  - id: finance-C-069
    when: When running backtests with Chinese stocks across 2023-08-28
    action: use correct stamp tax rate (0.001 before 2023-08-28, 0.0005 from 2023-08-28) when pit_tax is enabled
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using single stamp tax rate for entire period causes incorrect transaction cost calculation, over/undercharging
      taxes and distorting returns
    stage_ids:
    - order_execution
  - id: finance-C-071
    when: When submitting orders in the trading system
    action: route each order submissions through broker.submit_order() with frontend validation, not directly to matching
      engine
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing broker layer skips risk checks and frontend validators, allowing invalid orders that could cause
      account overdraft or position errors
    stage_ids:
    - order_execution
  - id: finance-C-072
    when: When implementing order matching in SimulationBroker
    action: filter out final orders before matching and move them to final_orders list for event publishing
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Processing final orders causes redundant event publication and potential double-counting of trades in account
      updates
    stage_ids:
    - order_execution
  - id: finance-C-073
    when: When presenting backtest execution results
    action: claim that simulated fill prices equal actual live trading execution prices
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest fills use hypothetical matching with slippage, not actual market execution, so presenting them as
      live proof misleads stakeholders about strategy viability
    stage_ids:
    - order_execution
  - id: finance-C-074
    when: When using SignalBroker mode (signal=True)
    action: present orders as being matched according to market microstructure rules
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Signal mode bypasses all matching logic (volume limits, liquidity checks, order book simulation), so presenting
      fills as market-matched is false advertising
    stage_ids:
    - order_execution
  - id: finance-C-075
    when: When interpreting backtest performance metrics
    action: claim that backtest returns guarantee equivalent live trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest results exclude slippage model limitations, liquidity constraints, and market impact that differ
      in live trading, causing expectation gap when going live
    stage_ids:
    - order_execution
  - id: finance-C-076
    when: When encountering order submission errors
    action: skip investigation of root cause because the order code looks simple
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Simple-looking orders can fail due to complex interactions with price limits, position effects, or market
      state that are not immediately obvious
    stage_ids:
    - order_execution
  - id: finance-C-077
    when: When time is constrained during backtest development
    action: skip validation of transaction cost calculations by assuming default rates are correct
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Default commission multipliers and tax rates may not match actual trading costs, causing strategies to appear
      profitable when they would lose money in live trading
    stage_ids:
    - order_execution
  - id: finance-C-078
    when: When slippage configuration produces unexpected fill prices
    action: dismiss the issue by assuming the price board data is wrong without checking slippage bounds
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Slippage-adjusted prices exceeding limit bounds indicate implementation bug in slippage model, not data quality
      issue, leading to persistent incorrect fills
    stage_ids:
    - order_execution
  - id: finance-C-081
    when: When processing dividend cash flows
    action: use payable_date not record_date for cash receipt timing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Dividend cash appears on wrong date, causing PnL calculations to be misaligned with actual market settlement
      dates
    stage_ids:
    - portfolio_accounting
  - id: finance-C-083
    when: When calculating portfolio unit_net_value
    action: match sum of position values plus account cash across each accounts
    severity: high
    kind: domain_rule
    modality: must
    consequence: Portfolio NAV mismatch causes incorrect performance reporting and risk metrics
    stage_ids:
    - portfolio_accounting
  - id: finance-C-084
    when: When implementing fast_forward to restore position state
    action: process OPEN trades before CLOSE trades to preserve FIFO order
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Wrong trade processing order causes position state corruption when reopening and closing same instruments
    stage_ids:
    - portfolio_accounting
  - id: finance-C-086
    when: When implementing stock position direction
    action: allow SHORT direction on StockPosition
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: StockPosition with SHORT direction causes incorrect T+1 settlement handling and dividend processing
    stage_ids:
    - portfolio_accounting
  - id: finance-C-087
    when: When persisting and restoring account state
    action: include dividend_receivable and non_closable in state serialization
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing dividend or non_closable state causes cash and position availability to be incorrect after restore
    stage_ids:
    - portfolio_accounting
  - id: finance-C-088
    when: When defining Position model
    action: use Position class for stock instruments via POSITION_TYPE_MAP registration
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Wrong position type mapping causes instrument-specific features (T+1, dividends) to be unavailable
    stage_ids:
    - portfolio_accounting
  - id: finance-C-090
    when: When handling account cash for margin trading
    action: calculate total_cash = total_cash - margin for margin accounts
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Incorrect total_cash causes margin ratio calculations to be wrong, affecting risk management decisions
    stage_ids:
    - portfolio_accounting
  - id: finance-C-091
    when: When publishing backtest results
    action: present simulated results as real trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest returns do not equal expected live trading returns due to slippage, liquidity, and execution differences
      not fully modeled
    stage_ids:
    - portfolio_accounting
  - id: finance-C-092
    when: When implementing futures settlement
    action: use daily_settlement_price (not last_price) for marking positions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using last_price instead of settlement_price causes PnL to differ from exchange settlement, creating discrepancies
      at month-end
    stage_ids:
    - portfolio_accounting
  - id: finance-C-093
    when: When processing stock splits
    action: adjust both quantity and avg_price using split ratio
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing split adjustment causes positions and average prices to be stale, corrupting PnL calculations after
      ex-date
    stage_ids:
    - portfolio_accounting
  - id: finance-C-094
    when: When handling dividend reinvestment
    action: convert cash dividend to new shares using last_price with round_lot adjustment
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Incorrect dividend reinvestment calculation causes position quantity mismatch and cash tracking error
    stage_ids:
    - portfolio_accounting
  - id: finance-C-097
    when: When strategy_execution submits order requests to risk_mods via submit_order API
    action: 'include required Order fields: order_book_id (str), quantity (int), side (SIDE enum), style (OrderStyle), position_effect
      (POSITION_EFFECT enum)'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Order validation fails silently or raises TypeError, preventing intended trades from being submitted
  - id: finance-C-098
    when: When risk_mods validates order submissions before passing to order_execution
    action: pass Order object with valid status (not PENDING_NEW, ACTIVE, PENDING_CANCEL final states) to AbstractBroker.submit_order
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Re-submitting already final orders causes duplicate execution or corrupted order tracking state
  - id: finance-C-102
    when: When event_system dispatches AFTER_TRADING events to trigger analyser collection and SETTLEMENT events for daily
      processing in risk_mods
    action: execute AFTER_TRADING event handlers before SETTLEMENT event handlers, ensuring each daily trading activity is
      finalized
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Analyser captures incomplete daily results because position settlement happens before trade accounting is
      finalized
  - id: finance-C-103
    when: When strategy_execution queries portfolio state via context.portfolio and context.account during handle_bar execution
    action: modify portfolio state (submit orders) that would affect the current bar's PnL calculation before the bar closes
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Intra-bar order submissions cause circular position updates and inconsistent equity calculations within the
      same time period
  - id: finance-C-104
    when: When risk_mods validates cash sufficiency for OPEN position_effect orders
    action: use account.available_cash_for(instrument) which excludes frozen_cash from pending orders, not raw account.cash
      property
    severity: high
    kind: domain_rule
    modality: must
    consequence: Order passes cash validation but later fails during execution due to double-frozen cash from multiple concurrent
      orders
  - id: finance-C-105
    when: When price_validator in risk_mods validates limit order prices against BarDictPriceBoard limit_up/limit_down
    action: round limit prices to 4 decimal places before comparison to match price board precision
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Valid limit orders are rejected or invalid ones pass due to floating-point precision mismatch with exchange
      price ticks
  - id: finance-C-106
    when: When submitting orders during OPEN_AUCTION execution phase
    action: route OPEN_AUCTION orders to _open_auction_orders list, not _open_orders list, ensuring proper auction matching
      logic
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Auction orders are matched at wrong prices or rejected entirely because they bypass open auction matching
      rules
  - id: finance-C-107
    when: When risk_mods validates that instruments are actively trading before passing to order_execution
    action: reject orders for instruments where get_active_instrument returns None or is_suspended returns True for current
      trading_dt
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategy submits orders for delisted, suspended, or non-existent securities, causing execution failures and
      corrupted backtest results
  - id: finance-C-108
    when: When order_execution publishes ORDER_PENDING_NEW event after broker receives order but before validation
    action: publish ORDER_PENDING_NEW with both account and order objects before any validation or matching occurs
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Account cannot update frozen cash before order reaches execution, causing incorrect available cash calculations
      for subsequent orders
  - id: finance-C-110
    when: When data_layer provides bar data during BEFORE_TRADING execution phase
    action: use bar data with calendar_dt matching the upcoming trading day, not the previous day's bars
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Strategy trades on stale price data, causing position mismatches and incorrect signal generation at market
      open
  - id: finance-C-111
    when: When ticker frequency is set to tick-level simulation
    action: subscribe each order_book_ids to tick events via env.get_universe() before submitting tick-frequency orders
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Tick-frequency orders fail with RuntimeError because tick data is not available for unsubscribed instruments
  - id: finance-C-112
    when: When account handles order cancellation pass events in portfolio_accounting
    action: unfreeze cash proportionally based on filled vs unfilled quantity using the ratio unfilled_quantity/quantity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Cancelled orders incorrectly unfreeze full order amount causing cash to appear higher than actual, leading
      to over-trading
  - id: finance-C-114
    when: When submitting orders with position_effect CLOSE or CLOSE_TODAY
    action: verify existing position quantity is sufficient to cover the close order quantity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Close orders exceed available position causing rejected trades or unintended position opening
  - id: finance-C-121
    when: When implementing Persistable subclasses for state serialization
    action: Implement both get_state() and set_state() methods; classes are auto-detected via __subclasshook__ duck-typing
      regardless of inheritance from AbstractPersistable
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategy state (positions, orders, portfolio) fails to persist across sessions, causing cold-start of strategy
      on restart and loss of open positions
  - id: finance-C-122
    when: When calling get_open_orders() API to retrieve pending orders
    action: Filter out each orders with position_effect == POSITION_EFFECT.EXERCISE; only return trading-related pending orders
      (OPEN, CLOSE, CLOSE_TODAY)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Exercise orders for options/derivatives leak into strategy's open order list, causing confusion in position
      management and potential double-exercise of contracts
  - id: finance-C-124
    when: When performing lookups for instrument metadata via data_proxy.instrument()
    action: Always use data_proxy.instrument() or data_proxy.instrument_not_none() which return Instrument objects with .type
      attribute guaranteed to be populated
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Strategies accessing instruments through non-data_proxy paths may receive incomplete Instrument objects,
      causing TypeError when accessing .type for account routing or commission calculation
  - id: finance-C-125
    when: When presenting or reporting RQAlpha's backtested returns to investors, clients, or the public
    action: Claim that backtested returns equal expected live trading returns — backtesting ignores market impact, financing
      costs, execution delays, and slippage model limitations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Users allocate live capital based on inflated backtest returns, experiencing severe underperformance when
      market impact and execution costs are realized in live trading
  - id: finance-C-126
    when: When presenting RQAlpha's simulated trading (paper trading) results as proof of live execution capability
    action: Claim that simulated trading results demonstrate the system's ability to execute live orders — simulated trading
      uses ideal fill models, not actual exchange matching
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Third parties invest real capital believing the system has proven live execution capability, when simulated
      fills ignore exchange reject rates, network timeouts, and broker-specific constraints
  - id: finance-C-128
    when: When claiming RQAlpha supports real-time production trading
    action: Claim real-time live trading capability — RQAlpha is a backtesting and simulation framework; production live trading
      requires additional infrastructure (broker API integration, risk management, monitoring) not provided by the core package
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Organizations deploy RQAlpha for live trading expecting real-time capabilities, but face system failures
      due to lack of exchange connectivity, OMS/EMS integration, and real-time risk controls
  - id: finance-C-129
    when: When performing minute-level or tick-level backtesting
    action: Claim minute/tick backtest accuracy without sourcing specified high-frequency data — the open-source bundle contains
      only A-share daily data; minute/tick data requires RQData Pro subscription or custom data source implementation
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: Users run minute/tick backtests expecting realistic high-frequency results but lack the underlying tick data,
      causing the backtest to fail or produce meaningless results from downsampled data
  - id: finance-C-130
    when: When configuring slippage models in backtest or simulation
    action: Acknowledge that slippage is a model approximation; default slippage=0 means zero slippage assumed — real execution
      will have unpredictable slippage based on market conditions
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Backtests show inflated returns by assuming zero or fixed slippage, while actual live execution suffers variable
      slippage that degrades strategy performance significantly
  - id: finance-C-132
    when: When writing strategy lifecycle methods (init, before_trading, handle_bar, after_trading)
    action: 'Follow the mandated lifecycle order: init() is called once before backtesting; before_trading() runs before market
      open each day; handle_bar() processes each bar; after_trading() runs after market close; never attempt synchronous cross-phase
      communication'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Strategies accessing data across phases cause timing violations (e.g., accessing handle_bar data in before_trading),
      leading to incorrect signal generation or data leakage
  - id: finance-C-134
    when: When using price data from the free bundle for strategy research
    action: Claim that free A-share daily data is sufficient for each strategy types — minute/tick/fundamental strategies
      require proprietary data not available in the free bundle
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Researchers build strategies on insufficient data granularity, producing backtests that cannot be replicated
      in live trading where higher-frequency data is unavailable or expensive
  - id: finance-C-135
    when: When implementing order submission logic in backtesting
    action: Verify frontend validators execute before orders reach the broker — the validation boundary is at order submission
      time, before any matching logic executes
    severity: high
    kind: domain_rule
    modality: must
    consequence: Bypassing frontend validation allows invalid orders to reach the matching engine, corrupting backtest simulation
      integrity and producing non-reproducible results that do not match live trading behavior
    derived_from_bd_id: BD-028
  - id: finance-C-136
    when: When running backtests that should validate strategy resilience under stress conditions
    action: Incorporate pressure testing with the hardcoded periods (打击壳价值, 公募基金抱团, 行业风格切换, 小盘踩踏危机) AND configure additional
      stress scenarios relevant to the specific strategy being tested
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Strategies validated only against these four hardcoded periods may fail to account for crisis conditions
      outside their scope, causing overestimated stress test performance that does not reflect actual market vulnerability
    derived_from_bd_id: BD-048
  - id: finance-C-137
    when: When implementing limit order price validation in A-share backtesting
    action: Validate limit order prices against price_board limit-up/limit-down computed from previous close before submission
      — reject orders where price > prev_close * 1.1 (up-limit) or price < prev_close * 0.9 (down-limit)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without price limit validation, backtests assume execution at theoretically valid but practically untradeable
      prices at circuit breaker limits, causing severe divergence between backtest and live trading results
    derived_from_bd_id: BD-038
  - id: finance-C-138
    when: When calculating returns in backtesting for comparison across different holding periods
    action: 'Apply the compound annualization formula: annualized_returns = unit_net_value ^ (252 / trading_days) - 1, using
      Chinese market''s 252 trading days for normalization'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple returns or calendar-day annualization distorts strategy comparison, especially for high-frequency
      strategies where 252 vs 365 days significantly changes annualized figures and misleads performance attribution
    derived_from_bd_id: BD-043
  - id: finance-C-141
    when: When implementing or refactoring strategy event handlers in backtesting
    action: Verify phase enforcement wrappers (wrap_user_event_handler) remain intact — strategy code must only execute during
      designated phases, preventing execution during initialization, teardown, or other forbidden phases
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Removing phase enforcement wrappers allows strategies to access partially-initialized state or execute during
      framework teardown, causing unpredictable execution semantics and potential data corruption in backtest results
    derived_from_bd_id: BD-023
  - id: finance-C-142
    when: When processing orders in backtesting
    action: Execute the FrontendValidator chain through Environment before broker logic — this validation layer catches obvious
      errors (insufficient capital, position limits) before expensive broker-side processing
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Skipping FrontendValidator chain allows obviously invalid orders to reach broker logic, wasting processing
      resources on orders destined to fail while delaying clear rejection feedback to users
    derived_from_bd_id: BD-025
  - id: finance-C-143
    when: When running backtests spanning August 2023 or analyzing strategy performance across different market regimes
    action: 'Account for stamp duty rate discontinuity: 0.001 before August 2023, 0.0005 after August 2023 — apply correct
      rate based on trade date to avoid artificial performance inflection points'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtests spanning the August 2023 tax regime change show discontinuous transaction costs without proper
      date-based rate handling, causing misattributed performance changes and strategies optimized on pre-2023 data may underperform
      post-2023
    derived_from_bd_id: BD-138
  - id: finance-C-144
    when: When processing buy orders for A-share securities in backtesting
    action: Apply automatic rounding down to 100-share lots in target-value strategies — rounding down systematically discards
      leftover cash that should be used for additional shares
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Rounding down to the nearest 100-share lot discards remaining cash that could purchase additional shares,
      causing target-value strategies to accumulate significant cash drag over time and underperform their intended allocation
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-145
    when: When implementing order sizing logic for A-share target-value strategies
    action: 'Verify lot size handling: check if order quantities will be rounded down to 100-share multiples; for fractional
      lots, either reject with warning or calculate exact cash impact and report to user'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Target-value strategies assuming exact share quantities without lot size adjustment systematically under-allocate
      capital, with error accumulating silently over long backtest periods without obvious signs of malfunction
    derived_from_bd_id: BD-GAP-003
  - id: finance-C-146
    when: When implementing close-today order validation for intraday trading
    action: Validate close orders against position.today_closable attribute (not generic closable) to verify only shares purchased
      today can be closed intraday
    severity: high
    kind: domain_rule
    modality: must
    consequence: Breaking today_closable validation allows closing historical shares as intraday trades, violating Chinese
      A-share T+0 rules and causing backtest-live execution mismatch
    derived_from_bd_id: BD-037
  - id: finance-C-147
    when: When implementing trade execution logic in the matcher module
    action: Trigger POST_TRADE event after trade execution completes to notify downstream modules (portfolio, risk) of state
      changes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping POST_TRADE event causes account state updates to be missed by event-driven listeners, leading to
      stale portfolio values and incorrect risk calculations
    derived_from_bd_id: BD-039
  - id: finance-C-148
    when: When implementing order_target_portfolio operations
    action: Process close orders before open orders to verify proper cash utilization and prevent over-positioning
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reversing the close-then-open sequence causes cash calculation errors where new positions are sized based
      on insufficient capital, resulting in rejected orders or margin calls in live trading
    derived_from_bd_id: BD-040
  - id: finance-C-149
    when: When configuring stock transaction costs in backtesting
    action: Apply commission (BY_MONEY rate) on both buy and sell sides, plus stamp tax (0.1%) on sell side only, with minimum
      commission floor enforced per order
    severity: high
    kind: domain_rule
    modality: must
    consequence: Omitting stamp tax underestimates sell-side costs by 0.1%, making backtest returns systematically inflated
      by 0.1-0.2% per round-trip trade in Chinese A-share markets
    derived_from_bd_id: BD-049
  - id: finance-C-150
    when: When implementing tick-level order matching
    action: Use NEXT_TICK_BEST_OWN price for order execution, taking liquidity from the opposite side's best price in the
      subsequent tick
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using current tick price for execution overestimates fill rates and underestimates market impact, causing
      backtest returns to exceed realistic live trading performance by 0.1-0.5% for liquid stocks
    derived_from_bd_id: BD-064
  - id: finance-C-151
    when: When calculating risk metrics (Sharpe, Sortino, MaxDrawdown)
    action: Delegate risk calculations to the rqrisk library interface rather than implementing custom statistical calculations
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Custom risk implementations often mishandle negative returns, non-symmetric distributions, or irregular time
      series, producing incorrect risk-adjusted performance metrics that mislead strategy evaluation
    derived_from_bd_id: BD-045
  - id: finance-C-152
    when: When calculating portfolio turnover rate
    action: Compute turnover as sum(trade_values) / mean(market_values) / 2 to account for buy+sell representing one round-trip
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Omitting the division by 2 doubles the reported turnover rate, misrepresenting trading activity and causing
      incorrect strategy comparison with industry benchmarks
    derived_from_bd_id: BD-047
  - id: finance-C-153
    when: When fast-forwarding account state through historical data
    action: Process OPEN position trades before CLOSE position trades to verify deterministic state transitions matching exchange
      semantics
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reversing the OPEN-before-CLOSE order causes non-deterministic position state when opening and closing the
      same instrument on the same bar, making backtest results unreproducible across runs
    derived_from_bd_id: BD-116
  - id: finance-C-154
    when: When implementing or extending the Persistable interface
    action: Implement get_state() and set_state() methods with matching signatures; the Persistable interface uses __subclasshook__
      for duck-typing without runtime signature verification
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Incorrect method signatures on Persistable implementations cause silent serialization failures during state
      persistence, resulting in lost or corrupted account state on reload
    derived_from_bd_id: BD-117
  - id: finance-C-155
    when: When implementing or refactoring division operations in backtesting calculations
    action: Use the safe_div utility function for each division operations — it returns NaN when divisor is zero instead of
      raising exceptions or returning infinity
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division-by-zero without safe_div causes exceptions to halt backtest execution or returns infinity, propagating
      invalid values through equity curve calculations and producing NaN results that corrupt downstream analysis
    derived_from_bd_id: BD-105
  - id: finance-C-156
    when: When implementing or refactoring date-based resampling logic for monthly frequency calculations
    action: 'Use version-aware month-end frequency: ''ME'' for pandas >=2.2.0, ''M'' for older versions — check pandas.__version__
      to select correct alias'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using incorrect month-end frequency causes stocks to be included/excluded based on wrong timestamp anchoring,
      producing different backtest results depending on pandas version and potentially misaligning signals near month boundaries
    derived_from_bd_id: BD-106
  - id: finance-C-157
    when: When implementing position calculation logic in backtesting
    action: Verify that decimal rounding uses ROUND_FLOOR for position quantities to verify consistent truncation — check
      that buy/sell quantity calculations round down to prevent over-allocation of shares
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using different rounding modes (ROUND_HALF_UP, ROUND_CEILING) causes position quantities to round up, potentially
      requesting more shares than available capital allows and causing execution failures in live trading
    derived_from_bd_id: BD-107
  - id: finance-C-158
    when: When implementing or modifying scheduler execution order in the event lifecycle
    action: Verify scheduler internal state updates (next_day_) execute in PRE_BEFORE_TRADING phase BEFORE user before_trading
      callbacks are invoked — maintain this execution order contract
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Modifying the scheduler execution order causes user before_trading callbacks to run before scheduler state
      is updated, making scheduler metadata stale or undefined when user code expects it to be current
    derived_from_bd_id: BD-113
  - id: finance-C-159
    when: When implementing or refactoring strategy initialization and state persistence logic
    action: Verify strategy init() executes BEFORE persist.restore() is called — any state set in init() will be overwritten
      by restored state; defer initialization logic to __init__ or accept init() is for registration/setup only
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reordering execution so that persist.restore() runs before init() causes user-defined initialization logic
      to fight against already-restored state, leading to unexpected behavior where init() modifications are silently discarded
    derived_from_bd_id: BD-115
  - id: finance-C-160
    when: When implementing or refactoring the daily_returns calculation in the backtesting framework
    action: Verify the daily_returns calculation depends on static_unit_net_value being freshly updated at PRE_BEFORE_TRADING;
      add state freshness validation to detect when the timing contract is violated
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: If PRE_BEFORE_TRADING is skipped, suppressed, or runs out of order, static_unit_net_value retains stale values
      causing return calculations to reference incorrect prior NAV, creating silent data corruption that amplifies over time
      without obvious errors
    derived_from_bd_id: BD-132
  - id: finance-C-161
    when: When implementing or modifying annualized return calculation logic
    action: Use the TRADING_DAYS_A_YEAR constant reference instead of hardcoding 252; verify the formula unit_net_value^(252/days)-1
      stays synchronized with the global constant
    severity: high
    kind: domain_rule
    modality: must
    consequence: Hardcoding 252 creates hidden coupling where changing TRADING_DAYS_A_YEAR doesn't automatically update the
      annualized return formula, causing inconsistent annualization across different calculation paths and potentially misleading
      strategy performance metrics
    derived_from_bd_id: BD-136
  - id: finance-C-162
    when: When configuring or modifying decimal precision settings for trade cost calculations
    action: Maintain decimal precision of at least 10 decimals when computing commission on trades; verify precision is sufficient
      for commission rates as small as 0.0008 (8 bps) to prevent rounding error accumulation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Lower precision (e.g., 2 decimals) causes rounding errors to accumulate across repeated trades; a 1,000,000
      CNY trade with 0.08% commission = 800 CNY, and repeated trades with insufficient precision cause cash account drift
      from true values
    derived_from_bd_id: BD-139
  - id: finance-C-163
    when: When accessing historical bar data during the before_trading phase
    action: Expect to receive current incomplete bar data from history_bars; the function forces include_now=False during
      before_trading regardless of requested frequency, returning only data up to T-1
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Strategies attempting to access current bar data during before_trading will receive stale T-1 data, causing
      look-ahead bias in pre-market calculations and potentially incorrect signal generation before market open
    derived_from_bd_id: BD-121
  - id: finance-C-164
    when: When calculating margin requirements for futures positions with both long and short legs
    action: Calculate margin requirements independently for long and short positions in the same instrument; do not net opposing
      positions unless exchange-specific margin offset rules are explicitly implemented
    severity: high
    kind: domain_rule
    modality: must
    consequence: Netted margin calculation undercounts requirements for hedged positions where long and short partially offset,
      potentially causing margin calls during live trading that were not predicted in backtesting; highest risk for calendar
      spreads and intra-commodity spreads
    derived_from_bd_id: BD-134
  - id: finance-C-165
    when: When implementing or using market order handling with volume limits
    action: Assume unfilled portions of market orders persist across bars when exceeding volume limits; the framework cancels
      the entire unfilled portion rather than carrying it to the next bar
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Aggressive strategies expecting partial fills to persist across bars will be surprised by total cancellation
      when orders exceed 25% volume limit, creating non-granular fill behavior and potentially missing execution opportunities
    derived_from_bd_id: BD-135
  - id: finance-C-166
    when: When passing order style parameters to the order API
    action: Pass None as order style; explicitly specify OrderStyle object (limit_order or market_order) to avoid silent conversion
      to MarketOrder type
    severity: medium
    kind: operational_lesson
    modality: should_not
    consequence: Passing None for order style silently converts to MarketOrder, causing strategies expecting limit orders
      to receive immediate market fills at potentially unfavorable prices, leading to backtest-live execution discrepancy
    derived_from_bd_id: BD-GAP-002
  - id: finance-C-167
    when: When calculating daily PnL for futures positions
    action: Use settlement price (exchange-determined) rather than last traded price for daily PnL calculation with formula
      (close - settlement) * multiplier
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using last price instead of settlement price for mark-to-market creates inconsistency with exchange settlement
      procedures, causing daily PnL figures that differ from actual account equity changes during overnight rollovers
    derived_from_bd_id: BD-111
  - id: finance-C-168
    when: When scheduling minute-frequency events for non-Chinese stock markets
    action: Use the framework's default scheduler minute offsets (571, 690, 780, 900) for Chinese A-share markets; these hardcoded
      values represent Chinese stock trading minutes from open and are incorrect for other markets
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using Chinese market minute offsets for non-Chinese stocks causes scheduled events to fire at wrong times
      relative to actual market hours, creating timing errors in strategy execution and backtest results that are difficult
      to diagnose
    derived_from_bd_id: BD-125
  - id: finance-C-171
    when: When implementing universe update logic in strategy initialization or rebalancing
    action: Use update_universe with full instrument list replacement — do not rely on incremental accumulation; after calling
      update_universe, the new list completely replaces the previous list
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Relying on incremental universe expansion causes subscription state to remain at the original set; new instruments
      are not tracked, leading to missing signals and incorrect backtest results
    derived_from_bd_id: BD-GAP-001
  - id: finance-C-172
    when: When implementing dynamic subscription management logic for temporary universe changes
    action: Unsubscribe from each instruments (leaving universe empty) — doing so triggers immediate strategy exit, not graceful
      degradation or warning
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Calling unsubscribe on the last instrument causes immediate strategy termination without cleanup or warning;
      strategies expecting temporary empty states will exit unexpectedly
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-173
    when: When implementing order percentage validation in trading strategy
    action: Enforce order_percent value <= 1.0 using explicit rounding or floor operation — do not rely solely on float comparison
      (e.g., use min(value, 1.0) or decimal.Decimal)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Float precision errors may allow order_percent values like 1.0000001 to pass validation, causing attempted
      purchase of more than available capital and potential margin calls in margin-enabled strategies
    derived_from_bd_id: BD-GAP-011
  - id: finance-C-174
    when: When implementing handle_bar callback for multi-asset or basket trading strategies
    action: Access bar data via dictionary keys — handle_bar receives a dict keyed by instrument, iterate with for ins, bar
      in bars.items() rather than assuming list input
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Assuming handle_bar receives a list of bars causes TypeError when the framework passes a dict; multi-asset
      strategies expecting batch processing fail silently or raise AttributeError
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-175
    when: When implementing futures trading order logic with hedged positions
    action: Execute futures orders with positive quantity first to close existing short positions, then open new long positions;
      for negative quantity, close longs first then open shorts — do not assume separate buy_close/sell_open functions
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Incorrect order of close-then-open operations causes fill price differences when bid-ask spread changes;
      closing shorts at mid then opening longs at ask increases transaction costs
    derived_from_bd_id: BD-GAP-005
  - id: finance-C-176
    when: When implementing historical data bundle download in automated deployment or CI/CD pipeline
    action: 'Implement URL fallback logic: maintain a list of mirror URLs and retry with next mirror on HTTP 404 or timeout;
      do not rely solely on a single exact URL match for bundle downloads'
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Relying on single URL for bundle download causes deployment failures when the mirror is down; strategies
      cannot initialize without historical data, blocking backtesting and live trading
    derived_from_bd_id: BD-GAP-012
  - id: finance-C-177
    when: When calculating factor Information Coefficient (IC) in factor research or backtesting
    action: Assume the framework automatically performs factor IC demeaning and grouping alignment — the framework does not
      implement this capability; factor IC calculations will use raw, non-demeaned values with unaligned grouping
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper IC demeaning and grouping alignment, cross-sectional factor IC values will be systematically
      biased, causing strategies to select wrong factors and generate trading signals that underperform or produce losses
      in live trading
    derived_from_bd_id: BD-GAP-026
  - id: finance-C-178
    when: When implementing factor IC calculation in factor research or backtesting
    action: Implement factor IC demeaning by subtracting the cross-sectional mean from factor values before IC calculation
      ( demeaned_ic = corr(factor - mean(factor), forward_return) ), and verify factor values are aligned with the analysis
      grouping structure (same date range and stock universe)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping IC demeaning and grouping alignment causes IC values to reflect market-wide movements rather than
      stock-level factor signals, leading to incorrect factor rankings and suboptimal portfolio allocations in live trading
    derived_from_bd_id: BD-GAP-026
  - id: finance-C-179
    when: When implementing or modifying account margin calculation logic in portfolio accounting
    action: Verify margin calculation is bypassed (returns 0) for stock-only accounts that never incur margin requirements;
      do not add conditional overhead to every margin access
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Adding conditional checks to margin calculation for every access introduces unnecessary overhead for equity-only
      accounts, degrading backtesting performance significantly in long-running strategies
    derived_from_bd_id: BD-018
  - id: finance-C-180
    when: When implementing return calculation in risk analytics module
    action: 'Use pandas shift(1) with fillna(1) for first bar return calculation: returns = nav/nav.shift(1).fillna(1) - 1;
      first bar must be treated as 0% return to prevent NaN propagation'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using alternative return calculation methods (e.g., pct_change() or loop-based) may not handle the first
      bar edge case correctly, causing NaN values to propagate through downstream analytics and corrupting risk metrics
    derived_from_bd_id: BD-027
  - id: finance-C-184
    when: When accessing current or in-progress bar prices in backtesting
    action: Use PriceBoard (BarDictPriceBoard) for in-progress bar prices and DataSource for historical point-in-time data
      — must NOT use DataSource for current bar prices
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using DataSource for current bar prices returns stale historical data while backtest expects real-time behavior,
      causing strategies to execute on outdated price information and producing misleading backtest results
    derived_from_bd_id: BD-005
  - id: finance-C-185
    when: When implementing price limit checks for limit orders in order_execution
    action: Apply price limit rejection at broker match time, not at order creation/submission time — verify limit orders
      are accepted by the system but may be rejected when price limits are hit during execution
    severity: high
    kind: domain_rule
    modality: must
    consequence: Implementing price limit rejection at order creation time overstates order failure rates for limit-order-heavy
      strategies, causing backtest to show more rejections than would occur in live trading with realistic exchange behavior
    derived_from_bd_id: BD-014
  - id: finance-C-186
    when: When processing timestamps across the backtesting framework
    action: Assume the framework provides explicit timezone annotation for timestamps — the framework does not implement timezone
      handling; naive datetime objects may be interpreted as local time, UTC, or exchange time without explicit declaration
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without timezone annotation, timestamps from different data sources may be misaligned during strategy execution,
      causing orders to be placed at wrong times and corrupting historical signal generation
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-187
    when: When configuring data sources and price feeds in backtesting
    action: Explicitly declare timezone for each timestamp fields using standard timezone-aware datetime objects (e.g., pytz.UTC
      or zoneinfo.ZoneInfo), ensuring each data sources use consistent timezone references
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing timezone declarations cause cross-market strategies to misinterpret trading hours and event timestamps,
      leading to incorrect signal generation and position sizing based on wrong temporal alignment
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-188
    when: When running optimization or parameter sweep in backtesting
    action: Assume the framework declares explicit convergence criteria for optimization algorithms — the framework does not
      implement explicit convergence threshold declarations; optimization may terminate without clear stopping conditions
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without explicit convergence criteria, optimization may stop prematurely at suboptimal parameter combinations
      or run indefinitely without achieving actual convergence, producing unreliable strategy parameters
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-189
    when: When implementing or configuring optimization algorithms in backtesting
    action: 'Define explicit convergence criteria for each optimization runs including: maximum iterations (max_iter), minimum
      improvement threshold (min_improvement), and function value tolerance (ftol) — validate convergence status after optimization
      completes'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Running optimization without declared convergence criteria produces unreliable parameters, causing strategies
      to underperform in live trading compared to backtested results due to non-converged optimization runs
    derived_from_bd_id: BD-GAP-017
  - id: finance-C-190
    when: When implementing order execution logic in China A-share backtesting simulation
    action: Cancel limit orders when their limit price touches the circuit breaker limit-up or limit-down price — do not allow
      orders to remain active when market trading is halted at the limit price
    severity: high
    kind: domain_rule
    modality: must
    consequence: When the market hits circuit breaker limits, trading halts and orders cannot execute at limit prices; leaving
      orders active creates false execution expectations in backtesting that cannot occur in live trading
    derived_from_bd_id: BD-030
  - id: finance-C-192
    when: When implementing strategy event handling in the framework
    action: Verify PRE_BAR and POST_BAR hooks execute before and after every strategy handle_bar call respectively, maintaining
      proper execution order for each registered hook handlers
    severity: high
    kind: domain_rule
    modality: must
    consequence: If hooks are bypassed or execute out of order, injected logic such as risk checks, logging, and monitoring
      mods will not run as expected, potentially allowing strategies to execute without necessary validation safeguards
    derived_from_bd_id: BD-006
  - id: finance-C-193
    when: When implementing or configuring transaction cost calculation for A-share stock backtesting
    action: 'Use date-based tax rate switching: 0.001 (0.1%) for sell transactions before August 27, 2023, and 0.0005 (0.05%)
      for sell transactions on or after August 27, 2023 — apply only to sell-side transactions'
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using a single flat tax rate ignores the stamp duty reduction from 0.1% to 0.05% on August 27, 2023, causing
      backtested transaction costs to be systematically overestimated for post-2023 periods or underestimated for pre-2023
      periods, leading to inaccurate strategy performance metrics
    derived_from_bd_id: BD-081
  - id: finance-C-194
    when: When implementing limit order placement with slippage in A-share backtesting
    action: Assume slippage can be freely added to limit orders without triggering price limit interactions — validate that
      adjusted prices (limit_price ± slippage) do not cross the price limit boundary and trigger unexpected order cancellations
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Slippage pushing a valid limit order to exactly the limit price triggers cancellation, but the cancellation
      message may not indicate slippage-price limit interaction; users misconfigure slippage models, causing backtest-live
      execution mismatch
    derived_from_bd_id: BD-133
  - id: finance-C-195
    when: When implementing algorithmic execution strategies (TWAP, VWAP)
    action: Use AlgoOrder class for algorithmic execution styles, keeping execution algorithms decoupled from order routing
      infrastructure — implement TWAP/VWAP logic in AlgoOrder subclasses, not in broker-specific order handlers
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Coupling TWAP/VWAP logic directly into broker order handlers duplicates order handling logic across brokers
      and breaks consistency; adding a new algorithmic style requires modifying multiple broker implementations
    derived_from_bd_id: BD-012
  - id: finance-C-196
    when: When implementing market order execution logic in backtesting
    action: Cancel the unfilled portion of a market order when volume limit is exceeded — do NOT convert to limit order or
      keep it active
    severity: high
    kind: domain_rule
    modality: must
    consequence: Keeping unfilled market order portions active introduces stale orders that may execute at unexpected future
      prices, causing the backtest to violate market order semantics and produce non-reproducible results
    derived_from_bd_id: BD-029
  - id: finance-C-197
    when: When implementing slippage calculation for trade execution
    action: 'Apply directional slippage: ADD positive slippage to BUY orders (execution at higher price) and SUBTRACT from
      SELL orders (execution at lower price)'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Symmetric or reversed slippage underestimates BUY costs and overestimates SELL proceeds, making backtest
      returns systematically optimistic and unrepresentative of actual market impact
    derived_from_bd_id: BD-032
  - id: finance-C-200
    when: When implementing event listener ordering for account updates
    action: Verify account listeners are prepended to event chain so position state reflects latest prices BEFORE strategy
      code executes — verify listener order via event registration checks
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without prepend ordering, strategy code may execute with stale position state, causing incorrect signal generation
      and accumulated calculation errors that are difficult to diagnose
    derived_from_bd_id: BD-008
  - id: finance-C-201
    when: When implementing or calling scheduler-registered functions during the before_trading phase in backtesting
    action: Attempt to access bar data through bar_dict parameter — scheduler functions receive None as bar_dict during before_trading
      phase, while broker callbacks receive actual bar data during trading phases
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Accessing bar_dict in before_trading context returns None, causing silent data absence; strategies expecting
      bar data in before_trading handlers will produce incorrect results or raise AttributeError
    derived_from_bd_id: BD-114
  - id: finance-C-203
    when: When implementing model training, data versioning, or experiment tracking in the backtesting framework
    action: Assume the framework implements model and data version snapshot binding — this capability is missing from the
      current implementation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without model and data version snapshot binding, experiments cannot be reliably reproduced; parameter combinations
      may drift from the exact model weights and dataset versions used, making backtest results non-reproducible
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-204
    when: When implementing model training, data versioning, or experiment tracking workflows
    action: 'Implement external version snapshot binding: record model hash (e.g., SHA256 of model file), dataset version/tag
      (e.g., git commit hash or dataset version identifier), and feature pipeline configuration at experiment initialization;
      store these in experiment metadata for reproducibility'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without version snapshot binding, model improvements cannot be attributed to specific data changes; backtest
      results may reflect stale models or datasets, causing live trading to underperform expected backtest performance
    derived_from_bd_id: BD-GAP-021
  - id: finance-C-205
    when: When implementing buy order logic that checks available cash
    action: Calculate available cash by subtracting frozen cash (from pending sell orders) from total cash balance — do not
      use total cash for buying decisions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using total cash instead of available cash allows orders exceeding actual purchasable value; in live trading,
      buy orders may be rejected due to insufficient funds, causing backtest-live inconsistency
    derived_from_bd_id: BD-035
  - id: finance-C-206
    when: When implementing portfolio NAV calculation or unit net value computation
    action: Calculate unit net value as total_value divided by units; initialize units as the sum of starting cash across
      each accounts — do not use a fixed unit count or alternative initialization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using fixed units or wrong initialization breaks NAV scaling; strategies with different initial capital will
      show incorrect relative performance, and unit-based calculations become incomparable
    derived_from_bd_id: BD-041
  - id: finance-C-208
    when: When implementing portfolio daily snapshot collection for analysis and reporting
    action: Collect portfolio state at POST_SETTLEMENT event only — verify snapshot captures complete end-of-day data including
      each trade executions, corporate actions, and final cash adjustments
    severity: high
    kind: domain_rule
    modality: must
    consequence: Collecting snapshot before settlement (PRE_SETTLEMENT) omits final cash adjustments; historical portfolio
      records will show incorrect equity and NAV figures that don't reflect actual end-of-day positions
    derived_from_bd_id: BD-062
  - id: finance-C-209
    when: When integrating custom functions or external libraries into strategy execution environment
    action: Verify that strategy code executes within scope-based sandbox with explicit API whitelist — do not grant access
      to internal framework APIs or global namespace
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without proper sandboxing, buggy or malicious strategy code can corrupt system state or access internal APIs,
      leading to unpredictable backtest results and potential security vulnerabilities
    derived_from_bd_id: BD-022
  - id: finance-C-210
    when: When implementing order_target_percent position sizing logic
    action: Calculate target quantity as total_value multiplied by percent, NOT as current_position * percent — verify target
      represents share of total portfolio value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using current_position * percent instead of total_value * percent creates position sizes that scale with
      current holdings rather than total portfolio, causing inconsistent sizing across different portfolio values and balance
      states
    derived_from_bd_id: BD-069
  - id: finance-C-211
    when: When implementing annualized return or risk calculations in the backtesting framework
    action: Use TRADING_DAYS_A_YEAR = 252 for annualization calculations — verify the constant is correctly applied to convert
      daily/periodic returns to annualized values
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Using incorrect trading days (250, 365, or 244) instead of 252 produces wrong annualized Sharpe ratios and
      return metrics, leading to flawed strategy comparisons and incorrect live trading allocation decisions
    derived_from_bd_id: BD-074
  - id: finance-C-212
    when: When calculating net returns for dividend-paying stocks in backtesting
    action: Verify dividend_tax_rate setting matches the investor's tax jurisdiction and account type — adjust from default
      0 to applicable rate (10-20% common) if the strategy targets taxable accounts
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default dividend_tax_rate=0 overestimates net returns for taxable accounts; strategies optimized on gross
      dividends will underperform live when actual taxes are withheld
    derived_from_bd_id: BD-075
  - id: finance-C-213
    when: When implementing futures transaction cost calculation
    action: Calculate futures commission using BY_VOLUME per-contract pricing with multiplier — do NOT use percentage-of-notional
      methods which don't match exchange fee structures
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using percentage-based futures costs instead of per-lot volume-based commission miscalculates actual transaction
      costs, leading to overestimated strategy profitability that won't match live trading P&L
    derived_from_bd_id: BD-050
  - id: finance-C-214
    when: When implementing order quantity validation for exchange submissions
    action: 'Round order quantities to round_lot units: 100 shares for A-share stocks, 1 contract for futures — verify quantities
      match exchange standardized lot requirements'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Submitting orders with non-round-lot quantities causes exchange rejections for A-share orders (100-share
      minimum lot), resulting in failed trades and strategy execution gaps
    derived_from_bd_id: BD-053
  - id: finance-C-217
    when: When implementing or modifying order validation logic in the framework
    action: Verify validators short-circuit on the first non-None rejection reason — downstream validators must not execute
      after a rejection is returned
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Running all validators after a rejection returns misleading error messages and contradicts the expected short-circuit
      behavior, confusing users about which validation actually failed
    derived_from_bd_id: BD-118
  - id: finance-C-218
    when: When implementing or modifying order management logic in the framework
    action: Assume EXERCISE orders appear in get_open_orders results — exercise orders are excluded via hardcoded filter and
      cannot be cancelled or modified via standard order management
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Attempting to cancel exercise orders via get_open_orders will silently fail since exercise orders are invisible
      to standard order management APIs
    derived_from_bd_id: BD-120
  - id: finance-C-220
    when: When implementing or modifying benchmark return calculation logic for multi-component indices
    action: Calculate benchmark daily returns as weighted sum of constituent returns using dynamic constituent weights — must
      NOT use equal weighting
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using equal weighting for multi-component benchmarks misrepresents actual index performance, causing strategy
      performance attribution to be systematically misaligned with real benchmark behavior
    derived_from_bd_id: BD-044
  - id: finance-C-222
    when: When implementing risk-adjusted performance metrics in pressure test scenarios
    action: Fetch risk-free rate per-year to match each historical pressure test period — use the period-specific rate rather
      than a single global rate
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using a fixed risk-free rate across all test periods misrepresents historical risk-adjusted performance,
      causing Sharpe ratios to be systematically incorrect and leading to suboptimal strategy selection
    derived_from_bd_id: BD-060
  - id: finance-C-224
    when: When calculating futures margin requirements in backtesting
    action: Calculate futures margin as margin_ratio × margin_multiplier × market_value — verify margin_multiplier matches
      the broker-specific configuration (typically 1.0-1.2) rather than assuming a fixed default value
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using an incorrect margin_multiplier causes margin requirements to diverge from actual broker collateral
      requirements, leading to either excessive leverage or unnecessarily blocked capital in live trading
    derived_from_bd_id: BD-078
  - id: finance-C-225
    when: When using the framework's default stock commission rate for backtesting
    action: Verify that the default stock commission rate of 0.0008 (0.08%) matches actual broker fees — the default combines
      exchange fees and typical commission but actual rates range from 0.03% (ETF) to 0.3% (options)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default commission rate of 0.08% overestimates costs for discount brokers and underestimates for premium
      brokers; errors accumulate significantly in high-frequency strategies, causing backtest returns to diverge materially
      from actual trading outcomes
    derived_from_bd_id: BD-080
  - id: finance-C-226
    when: When implementing order matching logic for call auction periods (opening/closing)
    action: Limit each order to exactly one fill during call auction, using uniform price determined by maximizing volume
      matching at a single price
    severity: high
    kind: domain_rule
    modality: must
    consequence: Allowing multiple fills during call auction violates the Chinese exchange mechanism where each order executes
      exactly once at the uniform clearing price, causing backtest fills to differ from actual exchange execution
    derived_from_bd_id: BD-065
  - id: finance-C-227
    when: When implementing order submission and validation logic
    action: Verify that risk validation executes BEFORE broker order submission in the submit_order flow; be aware of dual
      validation layers with different error messages (risk rejection vs broker rejection)
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Risk validation passing but broker validation failing produces a different error message than risk rejection;
      users must handle both validation layers or orders may be silently submitted to broker with unexpected rejection responses
    derived_from_bd_id: BD-128
  - id: finance-C-228
    when: When implementing end-of-day position reconciliation and callback sequencing
    action: Verify settlement executes AFTER after_trading callback but BEFORE next day's before_trading callback; user code
      in after_trading sees unsettled positions, while before_trading sees fully settled positions
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: User code executing during after_trading will see unsettled positions (pre-reconciliation state), which can
      cause incorrect trading decisions based on stale position data that differs from the settled state seen next morning
    derived_from_bd_id: BD-129
  - id: finance-C-229
    when: When implementing daily NAV calculation and return computation logic
    action: Update static_unit_net_value at PRE_BEFORE_TRADING event, ensuring previous day's final NAV becomes the base for
      next day's return calculation and avoids circular dependency
    severity: high
    kind: domain_rule
    modality: must
    consequence: Updating static_unit_net_value at end-of-day creates circular dependency with daily return calculation, causing
      return values to be incorrect and equity curve to exhibit systematic bias
    derived_from_bd_id: BD-063
  - id: finance-C-230
    when: When processing stock split adjustments in position management
    action: Use ROUND_HALF_UP rounding mode for stock split quantity adjustments to verify position quantities remain integers
      after split processing
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using ROUND_HALF_EVEN or other rounding modes for stock splits may produce non-integer share counts, causing
      position quantity mismatches with broker records and incorrect P&L calculations in live trading
    derived_from_bd_id: BD-077
  - id: finance-C-231
    when: When implementing monthly return calculation logic in performance analytics
    action: 'Calculate monthly geometric excess returns using the compound product formula: (1+p_prod)/(1+b_prod) - 1, where
      p_prod and b_prod are cumulative products of monthly simple returns. Do NOT use simple subtraction of monthly returns.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using simple subtraction instead of geometric compounding produces inaccurate excess return calculations,
      causing strategies with similar nominal returns to appear incorrectly ranked by risk-adjusted performance
    derived_from_bd_id: BD-087
  - id: finance-C-232
    when: When implementing currency conversion logic for multi-currency portfolio calculations
    action: 'Calculate exchange rate as the midpoint: (bid + ask) / 2. Do NOT use bid-only or ask-only rates, which introduce
      systematic conversion bias.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using bid-only rates systematically overvalues foreign holdings while ask-only rates systematically undervalue
      them, causing persistent currency conversion errors that accumulate over time in multi-currency portfolios
    derived_from_bd_id: BD-097
  - id: finance-C-233
    when: When implementing order quantity rounding logic for odd lot handling
    action: Use half-min_qty as the rounding threshold and round to step_size increments for odd lot quantities. Apply this
      exact rounding behavior for fractional shares; standard lots must use exact quantities without rounding.
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect rounding causes order rejections from exchanges when quantities don't meet lot size requirements,
      breaking backtest execution and causing live trading failures
    derived_from_bd_id: BD-098
  - id: finance-C-235
    when: When implementing order_target_value functionality for position adjustment
    action: 'Calculate the delta as: desired_market_value - current_market_value, using current market_value as the reference
      point. Do NOT use cost basis or book value as the reference for target value calculations.'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using cost basis instead of market value causes incorrect order sizing directions when positions have unrealized
      gains or losses, potentially doubling position size or trading in the wrong direction
    derived_from_bd_id: BD-068
  - id: finance-C-236
    when: When configuring volume limit for order execution in backtesting
    action: Verify that volume_percent=0.25 (25% of bar volume) matches the instrument's liquidity profile; for illiquid stocks,
      this limit may cause significant underfill and should be adjusted based on historical ADV
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Default 25% volume limit per bar may cause aggressive orders to partially execute across multiple bars, accumulating
      significant slippage and changing strategy performance from backtest to live trading
    derived_from_bd_id: BD-100
  - id: finance-C-237
    when: When configuring slippage model for backtesting execution prices
    action: Verify that PriceRatioSlippage ratio matches actual market impact costs; ratios exceeding 0.1% are unrealistic
      for liquid instruments and should be validated against historical fill data
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Symmetrical slippage with large ratios causes systematic P&L distortion in backtests; overestimating slippage
      makes strategies appear less profitable than live trading, while underestimating creates false confidence
    derived_from_bd_id: BD-101
  - id: finance-C-238
    when: When implementing order_value execution logic with cash constraints
    action: Implement iterate-down loop to reduce order quantity until transaction cost fits within available cash; do not
      reject the entire order when partial execution is possible
    severity: high
    kind: domain_rule
    modality: must
    consequence: Rejecting entire orders when transaction cost slightly exceeds cash prevents any execution, causing strategies
      to miss opportunities and produce backtest results inconsistent with live trading where partial fills are common
    derived_from_bd_id: BD-070
  - id: finance-C-239
    when: When implementing lot-based order sizing in exchange-traded instruments
    action: Multiply user-specified lots by round_lot size to calculate total share/contract quantity; orders must be rounded
      to valid exchange lot multiples
    severity: high
    kind: domain_rule
    modality: must
    consequence: Removing the round_lot multiplier causes orders to be submitted with incorrect quantities (1 lot = 1 share
      instead of 1 lot = 100 shares), resulting in order rejection or unauthorized position sizing
    derived_from_bd_id: BD-071
  - id: finance-C-240
    when: When implementing limit order price handling in order execution logic
    action: Apply floor rounding for buy order prices and ceiling rounding for sell order prices to verify compliance with
      exchange tick size requirements
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect rounding direction causes limit orders to be submitted at non-exchange-compliant price levels;
      buy orders rounded up may exceed available funds and sell orders rounded down may receive suboptimal fills
    derived_from_bd_id: BD-073
  - id: finance-C-241
    when: When using the framework's default price adjustment parameter for backtesting
    action: Verify that adjustment='pre' matches the strategy's requirements; for dividend reinvestment strategies, explicitly
      set adjustment='none' to reflect actual trading P&L
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Default back-adjustment systematically inflates historical returns by adjusting prices downward after corporate
      events, causing backtest results to significantly overestimate actual strategy performance
    derived_from_bd_id: BD-GAP-008
  - id: finance-C-242
    when: When implementing benchmark return calculation in backtesting analytics
    action: Use np.roll(close_prices, 1) before pct_change to calculate benchmark returns, ensuring no look-ahead bias; drop
      the first bar (NaN return) from metrics calculation
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using unshifted close prices in benchmark calculation introduces look-ahead bias, causing the first benchmark
      return to include information not yet available at trade execution time
    derived_from_bd_id: BD-090
  - id: finance-C-243
    when: When implementing annualized return calculation for strategy performance metrics
    action: 'Use geometric annualization formula: NAV^(252/days) - 1 where days is calendar days elapsed; do NOT substitute
      trading days as this overstates annualization for gaps'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using trading days instead of calendar days in annualization formula overstates annualized returns during
      market holidays and weekends, creating misleading performance comparisons
    derived_from_bd_id: BD-092
  - id: finance-C-244
    when: When configuring backtesting simulation mode
    action: Use default signal=False (standard mode with discrete order placement) unless continuous portfolio-weighted rebalancing
      is explicitly required; be aware that signal=True has fundamentally different execution semantics and generates continuous
      orders based on portfolio weights
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Enabling signal mode without understanding different execution semantics causes unexpected continuous order
      generation, potentially leading to excessive trading, degraded performance, and backtest-live inconsistency
    derived_from_bd_id: BD-102
  - id: finance-C-245
    when: When implementing or modifying order execution logic in backtesting
    action: Disable price_limit parameter or set it to False — price limit validation must remain enabled to prevent unrealistic
      fills at prices beyond daily 涨跌停 limits (±10% for stocks, ±20% for certain instruments)
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Disabling price limit validation allows orders to execute at prices beyond exchange-mandated limits, creating
      unrealistic execution scenarios where backtested fills cannot be replicated in live A-share trading
    derived_from_bd_id: BD-103
  - id: finance-C-246
    when: When using the framework's default is_valid_price function for data quality checks
    action: Verify that the data provider properly filters stale prices and extreme outliers before data reaches the framework
      — the is_valid_price function only checks for None/NaN/<=0 values and assumes data provider handles staleness and outlier
      filtering
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Stale prices passing through validation can cause incorrect signal generation; extreme outliers (e.g., 10x
      normal price due to data errors) may trigger wrong trading decisions with accumulated losses in high-frequency strategies
    derived_from_bd_id: BD-104
  - id: finance-C-247
    when: When implementing price-based calculations (signal generation, order pricing, PnL computation)
    action: Implement staleness checks before using price values — compare price timestamp against current bar timestamp and
      reject or flag stale prices; the framework's is_valid_price only validates value types, not temporal freshness
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Using stale prices without timestamp validation causes strategies to trade on outdated information; in live
      trading this results in execution at prices that no longer reflect current market conditions
    derived_from_bd_id: BD-104
  - id: finance-C-248
    when: When implementing stock identification in strategies
    action: Use the correct stock code format with exchange suffix (e.g., '000001.XSHE')
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid stock codes will cause data lookup failures and strategy execution errors
  - id: finance-C-249
    when: When specifying dates in configuration or API calls
    action: Use the ISO 8601 date format 'YYYY-MM-DD'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect date formats will cause parsing errors or silently incorrect date ranges
  - id: finance-C-251
    when: When debugging or logging in strategies
    action: Use logger.info() for logging instead of print() statements
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: print() statements do not work properly in backtest environments and output is lost
  - id: finance-C-252
    when: When adding new features or modifying code
    action: Run pytest tests to verify each tests pass before committing
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Breaking changes will be merged and cause failures in CI/CD pipelines
    stage_ids:
    - all
  - id: finance-C-253
    when: When reproducing bugs or writing tests
    action: Write minimal reproducible examples with the smallest possible strategy
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Large complex strategies for bug reproduction waste time and obscure the root cause
  - id: finance-C-254
    when: When accessing environment state or system components
    action: Access the Environment singleton via Environment.get_instance() method
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Direct instantiation bypasses the singleton pattern causing state inconsistencies
    stage_ids:
    - all
  - id: finance-C-255
    when: When managing configuration and runtime settings
    action: 'Respect the config priority hierarchy: CLI args > strategy __config__ > config file > defaults'
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Bypassing the config hierarchy causes unpredictable behavior and hard-to-debug issues
    stage_ids:
    - all
  - id: finance-C-256
    when: When extending the system with custom functionality
    action: Implement the AbstractMod interface for mod extensions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-compliant mods will not be loaded by the mod system
    stage_ids:
    - all
  - id: finance-C-257
    when: When using the data bundle for historical data access
    action: Use the HDF5-formatted bundle stored in ~/.rqalpha/bundle/
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Data access will fail if bundle is not downloaded or has incompatible format
    stage_ids:
    - data
  - id: finance-C-259
    when: When writing or modifying strategies
    action: Consult documentation (docs/source/intro/tutorial.rst, docs/source/api/base_api.rst) before implementing
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Implementing without checking documentation leads to incorrect API usage and silent failures
  - id: finance-C-260
    when: When testing strategies during development iteration
    action: Use short date ranges (1-3 months) for faster test iteration
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Long date ranges slow down development feedback cycles significantly
  - id: finance-C-261
    when: When writing Chinese comments for domain-specific logic
    action: Use Chinese comments for domain-specific logic as an acceptable practice
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Not using Chinese for domain logic may reduce code readability for Chinese-speaking developers
    stage_ids:
    - all
  - id: finance-C-262
    when: When ensuring data completeness in strategies
    action: Check that history_bars() returns valid data before using it
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using None or empty data causes index errors and incorrect trading decisions
  - id: finance-C-263
    when: When writing new mods or extending functionality
    action: 'Follow the mod creation workflow: create package, implement AbstractMod, define __config__, implement load_mod(),
      register in config'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect mod structure will cause import failures or silent loading failures
    stage_ids:
    - all
  - id: finance-C-264
    when: When adding assertions in test code
    action: Include assertions to verify expected behavior in test code
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Tests without assertions pass even when the code is broken
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
