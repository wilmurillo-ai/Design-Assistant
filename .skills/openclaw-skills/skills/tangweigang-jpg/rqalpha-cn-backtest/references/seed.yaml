resources:
  packages:
  - name: numpy
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: requests
    version_pin: latest
  - name: python-dateutil
    version_pin: latest
  - name: six
    version_pin: latest
  - name: logbook
    version_pin: latest
  - name: click
    version_pin: latest
  - name: jsonpickle
    version_pin: latest
  - name: simplejson
    version_pin: latest
  - name: PyYAML
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install numpy
    - python3 -m pip install pandas
    - python3 -m pip install requests
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When looking up an instrument by order_book_id or symbol
    action: return the same Instrument object with matching metadata
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Inconsistent instrument lookup causes incorrect trading decisions, as strategies may retrieve different instrument
      objects for the same security code
    stage_ids:
    - data_layer
  - id: finance-C-002
    when: When getting trading dates between start_date and end_date
    action: return only dates that fall on exchange trading days excluding weekends and holidays
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Strategy executes on non-trading days causing order failures and incorrect backtest results that don't match
      real market conditions
    stage_ids:
    - data_layer
  - id: finance-C-003
    when: When retrieving history_bars with adjust_type parameter
    action: apply correct price and volume adjustments for splits and dividends based on the specified adjustment type
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect adjustment causes historical returns to be miscalculated, leading to flawed strategy performance
      evaluation and wrong position sizing
    stage_ids:
    - data_layer
  - id: finance-C-005
    when: When initializing BaseDataSource with data_bundle_path
    action: verify the bundle path exists and contains valid HDF5 files before proceeding
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: System crashes with cryptic error when bundle is missing, making debugging difficult for users without proper
      error handling
    stage_ids:
    - data_layer
  - id: finance-C-020
    when: When checking instrument existence at a specific datetime
    action: consider both listed_date and de_listed_date boundaries for temporal validity
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Allowing orders for delisted instruments causes execution failures and potential legal compliance issues
    stage_ids:
    - data_layer
  - id: finance-C-021
    when: When implementing event listener registration in EventBus
    action: process system listeners (_listeners) before user listeners (_user_listeners)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: If user listeners execute before system listeners, risk checks and broker order matching may occur after
      strategy signals are generated, leading to incorrect order execution timing or missed risk controls
    stage_ids:
    - event_system
  - id: finance-C-022
    when: When accessing ExecutionContext.stack.top
    action: access the stack when it is empty
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Accessing an empty stack raises RuntimeError with 'stack is empty' message, causing the strategy execution
      to crash
    stage_ids:
    - event_system
  - id: finance-C-023
    when: When popping ExecutionContext from the stack
    action: verify the popped context matches the expected context
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: If nested ExecutionContexts are incorrectly nested, popping the wrong context corrupts the phase tracking,
      causing enforce_phase to check the wrong execution phase
    stage_ids:
    - event_system
  - id: finance-C-026
    when: When creating custom EventSource implementations
    action: 'support only the three documented frequencies: 1d, 1m, and tick'
    severity: fatal
    kind: resource_boundary
    modality: must
