[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ok-skills"
version = "0.1.0"
description = "OK.com 分类信息自动化 Skills，基于 Chrome Extension Bridge 浏览器自动化"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "requests>=2.28.0",
    "websockets>=12.0",
    "playwright>=1.40.0",
    "playwright-stealth==2.0.2",
    "setuptools",
]

[project.scripts]
ok-cli = "ok.cli:main"

[project.optional-dependencies]
dev = [
    "ruff>=0.9.0",
    "pytest>=8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["scripts/ok"]
sources = ["scripts"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E402",   # module-level imports not at top
]

[tool.ruff.lint.isort]
known-first-party = ["ok_skills"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["scripts"]
markers = [
    "browser: tests that require a browser environment (Bridge/CDP/Playwright)",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.15.8",
]
