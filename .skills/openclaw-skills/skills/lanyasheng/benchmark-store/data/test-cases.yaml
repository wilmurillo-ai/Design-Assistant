## tool-type（工具型）测试用例

### 文件搜索测试
```yaml
- name: "文件搜索测试"
  category: "tool-type"
  input: "搜索包含'error'的 Python 文件"
  expected: "返回.py 文件列表或错误提示"
  assert:
    - type: javascript
      value: |
        const text = String(output).toLowerCase();
        return text.includes('.py') || text.includes('未找到');
    - type: cost
      threshold: 0.30
    - type: latency
      threshold: 15000
```

### 网页抓取测试
```yaml
- name: "网页抓取测试"
  category: "tool-type"
  input: "抓取 example.com 的标题"
  expected: "返回网页标题或错误提示"
  assert:
