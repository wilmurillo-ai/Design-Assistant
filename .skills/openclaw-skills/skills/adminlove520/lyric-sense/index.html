<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricSense - 歌词视野</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1rem;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.25);
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .cover {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .song-info {
            flex: 1;
        }

        .song-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .song-artist {
            color: #888;
        }

        .lyrics-container {
            width: 100%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 30px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            position: relative;
        }

        .lyrics-container::-webkit-scrollbar {
            width: 8px;
        }

        .lyrics-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .lyrics-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        .lyric-line {
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 8px;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            cursor: pointer;
        }

        .lyric-line:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .lyric-line.active {
            color: #00d2ff;
            font-size: 1.4rem;
            font-weight: bold;
            background: rgba(0, 210, 255, 0.15);
            transform: scale(1.02);
        }

        .lyric-line.past {
            color: rgba(255, 255, 255, 0.4);
        }

        .time-tag {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-right: 10px;
            font-family: monospace;
        }

        .progress-bar {
            width: 100%;
            max-width: 800px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin-top: 20px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 3px;
            transition: width 0.1s;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: #888;
            font-family: monospace;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .controls button {
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #ff6b6b;
        }

        .api-info {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.85rem;
            color: #888;
        }

        .api-info code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* 动画效果 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading::after {
            content: '...';
            animation: pulse 1.5s infinite;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            
            .player-info {
                flex-direction: column;
                text-align: center;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <h1>🎵 LyricSense</h1>
    <p class="subtitle">让 AI 真正"听"懂音乐 | 小溪作品</p>

    <div class="input-section">
        <div class="input-group">
            <input type="text" id="artist" placeholder="歌手 (如: 颜人中)">
            <input type="text" id="title" placeholder="歌曲 (如: 晚安)">
        </div>
        <div class="input-group">
            <button onclick="fetchLyrics()">获取歌词</button>
        </div>
    </div>

    <div class="player-info" id="playerInfo" style="display: none;">
        <div class="cover" id="cover">
            🎵
        </div>
        <div class="song-info">
            <div class="song-title" id="songTitle">歌曲名</div>
            <div class="song-artist" id="songArtist">歌手</div>
        </div>
    </div>

    <div class="lyrics-container" id="lyricsContainer">
        <div class="loading" id="loading"></div>
    </div>

    <div class="progress-bar" id="progressBar" style="display: none;" onclick="seekTo(event)">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-display" id="timeDisplay" style="display: none;">
        <span id="currentTime">00:00</span>
        <span id="totalTime">00:00</span>
    </div>

    <div class="controls" id="controls" style="display: none;">
        <button onclick="play()">▶ 播放</button>
        <button onclick="pause()">⏸ 暂停</button>
        <button onclick="prevLine()">◀ 上一句</button>
        <button onclick="nextLine()">下一句 ▶</button>
    </div>

    <div class="api-info">
        <p>📡 API: <code>https://api.lrc.cx/lyrics</code></p>
        <p>🖼️ 封面: <code>https://api.lrc.cx/cover</code></p>
    </div>

    <script>
        let lyrics = [];
        let currentLine = 0;
        let isPlaying = false;
        let timer = null;
        
        // 解析 LRC 格式
        function parseLRC(lrcText) {
            const lines = lrcText.split('\n');
            const result = [];
            
            const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
            
            for (const line of lines) {
                const match = line.match(timeRegex);
                if (match) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const milliseconds = parseInt(match[3].padEnd(3, '0'));
                    const time = minutes * 60 + seconds + milliseconds / 1000;
                    
                    const text = line.replace(timeRegex, '').trim();
                    if (text) {
                        result.push({ time, text });
                    }
                }
            }
            
            return result.sort((a, b) => a.time - b.time);
        }

        // 格式化时间
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // CORS 代理（解决跨域问题）
        const PROXY = 'https://corsproxy.io/?';
        
        // 获取歌词
        async function fetchLyrics() {
            const artist = document.getElementById('artist').value.trim();
            const title = document.getElementById('title').value.trim();
            
            if (!artist || !title) {
                alert('请输入歌手和歌曲名');
                return;
            }
            
            const container = document.getElementById('lyricsContainer');
            container.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                // 获取歌词（通过 CORS 代理）
                const lyricsUrl = `https://api.lrc.cx/lyrics?artist=${encodeURIComponent(artist)}&title=${encodeURIComponent(title)}`;
                const lyricsResponse = await fetch(PROXY + encodeURIComponent(lyricsUrl));
                const lyricsData = await lyricsResponse.text();
                
                // 获取封面（通过 CORS 代理）
                try {
                    const coverUrl = `https://api.lrc.cx/cover?artist=${encodeURIComponent(artist)}&title=${encodeURIComponent(title)}`;
                    const coverResponse = await fetch(PROXY + encodeURIComponent(coverUrl));
                    if (coverResponse.ok) {
                        const blob = await coverResponse.blob();
                        const coverImgUrl = URL.createObjectURL(blob);
                        document.getElementById('cover').innerHTML = `<img src="${coverImgUrl}" alt="cover" onerror="this.parentElement.innerHTML='🎵'">`;
                    }
                } catch (e) {
                    console.log('封面获取失败', e);
                }
                
                // 解析歌词
                lyrics = parseLRC(lyricsData);
                
                if (lyrics.length === 0) {
                    container.innerHTML = '<div class="error">未找到歌词，请尝试其他搜索词</div>';
                    return;
                }
                
                // 显示歌曲信息
                document.getElementById('playerInfo').style.display = 'flex';
                document.getElementById('songTitle').textContent = title;
                document.getElementById('songArtist').textContent = artist;
                
                // 显示进度条
                document.getElementById('progressBar').style.display = 'block';
                document.getElementById('timeDisplay').style.display = 'flex';
                document.getElementById('controls').style.display = 'flex';
                
                // 渲染歌词
                renderLyrics();
                
            } catch (error) {
                container.innerHTML = `<div class="error">获取失败: ${error.message}</div>`;
            }
        }

        // 渲染歌词
        function renderLyrics() {
            const container = document.getElementById('lyricsContainer');
            container.innerHTML = '';
            
            lyrics.forEach((line, index) => {
                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.dataset.index = index;
                div.dataset.time = line.time;
                
                const timeTag = document.createElement('span');
                timeTag.className = 'time-tag';
                timeTag.textContent = `[${formatTime(line.time)}]`;
                
                div.appendChild(timeTag);
                div.appendChild(document.createTextNode(line.text));
                
                div.addEventListener('click', () => {
                    currentLine = index;
                    updateDisplay();
                });
                
                container.appendChild(div);
            });
            
            currentLine = 0;
            updateDisplay();
        }

        // 更新显示
        function updateDisplay() {
            const lines = document.querySelectorAll('.lyric-line');
            
            lines.forEach((line, index) => {
                line.classList.remove('active', 'past');
                if (index < currentLine) {
                    line.classList.add('past');
                } else if (index === currentLine) {
                    line.classList.add('active');
                    line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
            
            // 更新时间
            if (lyrics[currentLine]) {
                document.getElementById('currentTime').textContent = formatTime(lyrics[currentLine].time);
                if (lyrics[lyrics.length - 1]) {
                    document.getElementById('totalTime').textContent = formatTime(lyrics[lyrics.length - 1].time);
                }
            }
        }

        // 播放
        function play() {
            if (isPlaying) return;
            isPlaying = true;
            
            timer = setInterval(() => {
                currentLine++;
                if (currentLine >= lyrics.length) {
                    currentLine = lyrics.length - 1;
                    pause();
                }
                updateDisplay();
            }, 3000); // 每3秒切换一句，可调整
        }

        // 暂停
        function pause() {
            isPlaying = false;
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        // 上一句
        function prevLine() {
            currentLine = Math.max(0, currentLine - 1);
            updateDisplay();
        }

        // 下一句
        function nextLine() {
            currentLine = Math.min(lyrics.length - 1, currentLine + 1);
            updateDisplay();
        }

        // 跳转到指定位置
        function seekTo(event) {
            const progressBar = event.currentTarget;
            const rect = progressBar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            
            if (lyrics.length > 0) {
                currentLine = Math.floor(percent * lyrics.length);
                updateDisplay();
            }
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                isPlaying ? pause() : play();
            } else if (e.code === 'ArrowLeft') {
                prevLine();
            } else if (e.code === 'ArrowRight') {
                nextLine();
            }
        });

        // 预填示例
        window.onload = () => {
            // 可以预填一些默认值
            // document.getElementById('artist').value = '颜人中';
            // document.getElementById('title').value = '晚安';
        };
    </script>
</body>
</html>
