/orgs/{org_id}/reports:
  get:
    operationId: listReports
    parameters:
      - name: org_id
        in: path
        required: true
        schema:
          type: string
      - name: version
        in: query
        required: true
        schema:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
    responses:
      '200':
        description: List of reports
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
      '400':
        description: Invalid version format
      '401':
        description: Unauthorized
      '404':
        description: Org not found
