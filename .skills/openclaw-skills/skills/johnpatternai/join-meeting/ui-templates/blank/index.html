<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AgentCall</title>
<style>
  * { margin: 0; }
  body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .name { color: #444; font-family: system-ui; font-size: 24px; font-weight: 300; }
</style>
</head>
<body>
<div class="name" id="name"></div>
<script src="agentcall-audio.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const wsURL = params.get('ws');
let ws = null;

const audioPlayer = new AgentCallAudio({
  onInterrupted: (info) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'tts.interrupted', ...info }));
    }
  }
});

document.getElementById('name').textContent = params.get('name') || 'Agent';

if (wsURL) {
  ws = new WebSocket(wsURL);
  ws.onmessage = (e) => {
    audioPlayer.handleEvent(JSON.parse(e.data));
  };
}
</script>
</body>
</html>
