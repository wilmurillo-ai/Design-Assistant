# Example: Acme Corp — Nevada C-Corp with super voting preferred + vesting

company_name: "Acme Corp, Inc."
entity_type: "C-Corp"
state: "Nevada"
fiscal_year_end: "December 31"

registered_agent:
  name: "YOUR REGISTERED AGENT NAME"       # Get one first — see references/nevada-corp.md
  street: "YOUR RA STREET ADDRESS"
  city: "Las Vegas"
  state: "NV"
  zip: "89101"

directors:
  - name: "Jane Smith"
    titles: ["CEO", "Secretary", "Treasurer", "Director"]
    is_incorporator: true
    address: "123 Main St, Austin, TX 78701"  # Can use RA address for privacy
  - name: "John Doe"
    titles: ["Chairman", "Director"]
    address: "456 Oak Ave, Miami, FL 33101"
  - name: "Alice Johnson"
    titles: ["CFO", "Secretary", "Treasurer", "Director"]
    address: "789 Pine Rd, Denver, CO 80202"

stock:
  common:
    authorized: 10000000
    par_value: 0.00001
    voting_rights: 1
  preferred:
    - class_name: "Series A Super Voting Preferred"
      authorized: 1000000
      par_value: 0.00001
      voting_rights: 100           # 100:1 super voting (100 votes per share)
      convertible: false
      dividends: false
      notes: "Non-convertible, no dividends, 100:1 super voting, transfer restricted"

shareholders:
  common:
    - name: "Jane Smith"
      shares: 3000000
      percentage: "30%"
      consideration: "Services"
    - name: "John Doe"
      shares: 3000000
      percentage: "30%"
      consideration: "Services"
    - name: "Alice Johnson"
      shares: 2000000
      percentage: "20%"
      consideration: "Services"
    - name: "Bob Williams"
      shares: 1500000
      percentage: "15%"
      consideration: "Services"
    - name: "Employee Stock Option Pool"
      shares: 500000
      percentage: "5%"
      consideration: "Reserved"
  preferred:
    - name: "Jane Smith"
      class: "Series A Super Voting Preferred"
      shares: 250000
      consideration: "Services"
    - name: "John Doe"
      class: "Series A Super Voting Preferred"
      shares: 250000
      consideration: "Services"
    - name: "Alice Johnson"
      class: "Series A Super Voting Preferred"
      shares: 250000
      consideration: "Services"
    - name: "Bob Williams"
      class: "Series A Super Voting Preferred"
      shares: 250000
      consideration: "Services"

filing_date: "TBD"  # Fill in after SilverFlume confirms

options:
  consideration_default: "Services"
  highlight_pending: true
  output_format: "docx"
  vesting_period: "4 years"        # Standard startup vesting
  cliff_period: "1 year"           # Standard 1-year cliff
