[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rurussian-mcp"
version = "1.0.7"
description = "MCP server for rurussian.com with OpenClaw-ready Russian learning, Rusvibe flows, and hosted checkout"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "rurussian", email = "support@rurussian.com"}
]
dependencies = [
    "mcp>=1.0.0",
    "httpx",
    "pydantic"
]

[project.urls]
Homepage = "https://github.com/shuyueW1991/rurussian-mcp"
Repository = "https://github.com/shuyueW1991/rurussian-mcp"
Documentation = "https://github.com/shuyueW1991/rurussian-mcp#readme"

[project.scripts]
rurussian-mcp = "rurussian_mcp.server:main"

[tool.setuptools]
packages = ["rurussian_mcp"]
