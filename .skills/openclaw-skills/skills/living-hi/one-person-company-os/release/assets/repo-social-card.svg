  <rect width="1600" height="900" fill="#f4efe7"/>
  <rect x="70" y="70" width="1460" height="760" rx="36" fill="#ffffff" stroke="#171717" stroke-width="4"/>
  <text x="120" y="220" fill="#171717" font-family="'Trebuchet MS', Arial, sans-serif" font-size="76" font-weight="700">One Person Company OS</text>
