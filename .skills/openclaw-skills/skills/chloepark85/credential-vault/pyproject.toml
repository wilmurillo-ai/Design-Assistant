[project]
name = "credential-vault"
version = "0.1.0"
description = "Encrypted credential storage for OpenClaw agents"
requires-python = ">=3.11"
dependencies = [
    "cryptography>=43.0.0",
]

[project.scripts]
vault = "scripts.vault:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lib", "scripts"]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]
