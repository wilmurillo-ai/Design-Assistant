feedback: |
  虽然 C1-C4 都满足，但合同交付仍未完全达标，不能判定为 pass。

  具体问题在构建产物的 evaluator 模板：`packages/prompts/package.json:14-16` 的 build 脚本使用 `cp -r src/templates dist/templates`，在 `dist/templates` 已存在时会留下旧文件并额外生成 `dist/templates/templates/*`。当前实际被导出包读取的是 `packages/prompts/dist/templates/evaluator.md:20-30`，其内容仍要求“以 JSON 格式写入”；而源模板 `packages/prompts/src/templates/evaluator.md:20-30` 和本次合同都要求 YAML。`renderEvaluatorPrompt()` 通过 `packages/prompts/src/renderer.ts:54-58` 加载的正是这个顶层 `dist/templates/evaluator.md`，因此导出包的 evaluator 行为与合同不一致。

  期望行为：构建后的导出包应输出要求 YAML 的 evaluator prompt。实际行为：构建后的导出包仍输出要求 JSON 的 evaluator prompt。修复建议：在 build 前清理 `dist` 或至少清理 `dist/templates`，避免旧模板残留；同时补一个针对构建产物 `renderEvaluatorPrompt()` 的断言测试。当前测试 `packages/prompts/src/__tests__/renderer.test.ts:114-129` 只检查 criteria/path，没有覆盖构建产物 evaluator 模板的输出格式。
