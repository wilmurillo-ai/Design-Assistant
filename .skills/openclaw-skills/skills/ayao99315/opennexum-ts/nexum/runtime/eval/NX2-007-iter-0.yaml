feedback: "NX2-007 does not pass as submitted. The source-level additions for `GeneratorDone` and `init` callback-block upsert are present, but the shipped `@nexum/core` dist artifacts are stale: they omit `GeneratorDone`, which makes `@nexum/cli` fail to build and causes the current runtime `callback` command to remove `status` instead of setting it to `generator_done`."
