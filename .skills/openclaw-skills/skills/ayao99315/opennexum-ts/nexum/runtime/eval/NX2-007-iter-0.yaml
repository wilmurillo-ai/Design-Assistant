        evidence: 'Integration run in a temp project with `node packages/cli/dist/index.js callback NX2-007 --project <tmp>` printed `{"ok":true,"taskId":"NX2-007"}`, but the resulting `nexum/active-tasks.json` lost the `status` field entirely instead of updating it to `generator_done`. The runtime root cause is that [packages/core/dist/types.js](/Users/tongyaojin/code/nexum-ts/packages/core/dist/types.js#L4) and [packages/core/dist/types.d.ts](/Users/tongyaojin/code/nexum-ts/packages/core/dist/types.d.ts#L31) do not include `TaskStatus.GeneratorDone`, even though [packages/cli/src/commands/callback.ts](/Users/tongyaojin/code/nexum-ts/packages/cli/src/commands/callback.ts#L11) writes it.'
