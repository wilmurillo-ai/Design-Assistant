feedback: |
  The build and unit tests pass, but the delivered package is not usable because the markdown templates are never copied into `dist/`.

  Fix the packaging path first:
  1. Make the published runtime able to read templates after build, either by copying `src/templates/*.md` into `dist/templates/` during `pnpm build`, or by changing the runtime/template loading strategy so exported `dist/index.js` does not depend on missing files.
  2. Add a test that imports from the built artifact (or otherwise simulates the packaged entrypoint) and calls `renderGeneratorPrompt()` / `renderRetryPrompt()` so this regression is caught.
  3. Re-run `pnpm build` and `pnpm test`, then verify both `coding` and `creative` rendering work through the exported package, not only through source-level Vitest transforms.
