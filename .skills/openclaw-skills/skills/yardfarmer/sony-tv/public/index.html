<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sony TV 遥控器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="remote">
    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <span class="sony-logo">SONY</span>
        <span class="tv-model">BRAVIA</span>
      </div>
      <div class="status" id="status">
        <span class="status-dot"></span>
        <span class="status-text">已连接</span>
      </div>
    </header>

    <!-- Power Row -->
    <section class="section">
      <div class="power-row">
        <button class="btn btn-power" data-action="powerOff">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18.36 6.64A9 9 0 1 1 5.64 6.64"/>
            <line x1="12" y1="2" x2="12" y2="12"/>
          </svg>
          关机
        </button>
        <button class="btn btn-power-on" data-action="powerOn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18.36 6.64A9 9 0 1 1 5.64 6.64"/>
            <line x1="12" y1="2" x2="12" y2="12"/>
          </svg>
          开机
        </button>
      </div>
    </section>

    <!-- D-Pad -->
    <section class="section">
      <div class="dpad-container">
        <button class="btn btn-dpad btn-up" data-action="up">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="18 15 12 9 6 15"/>
          </svg>
        </button>
        <button class="btn btn-dpad btn-left" data-action="left">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <button class="btn btn-confirm" data-action="confirm">OK</button>
        <button class="btn btn-dpad btn-right" data-action="right">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
        <button class="btn btn-dpad btn-down" data-action="down">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- Function Buttons -->
    <section class="section">
      <div class="func-row">
        <button class="btn btn-func" data-action="home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          </svg>
          主页
        </button>
        <button class="btn btn-func" data-action="back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 14 4 9 9 4"/>
            <path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
          </svg>
          返回
        </button>
        <button class="btn btn-func" data-action="options">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
          </svg>
          选项
        </button>
      </div>
      <div class="func-row">
        <button class="btn btn-func" data-action="exit">退出</button>
        <button class="btn btn-func" data-action="mute">静音</button>
      </div>
    </section>

    <!-- Volume Control -->
    <section class="section">
      <div class="volume-row">
        <button class="btn btn-vol" data-action="volumeDown">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
          音量 -
        </button>
        <div class="volume-display" id="volumeDisplay">
          <span id="volumeText">--</span>
        </div>
        <button class="btn btn-vol" data-action="volumeUp">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          音量 +
        </button>
      </div>
    </section>

    <!-- Channel Control -->
    <section class="section">
      <div class="channel-row">
        <button class="btn btn-ch" data-action="channelDown">频道 -</button>
        <button class="btn btn-ch" data-action="channelUp">频道 +</button>
      </div>
    </section>

    <!-- Input Selection -->
    <section class="section">
      <div class="section-label">输入源</div>
      <div class="input-grid">
        <button class="btn btn-input" data-action="hdmi1">HDMI 1</button>
        <button class="btn btn-input" data-action="hdmi2">HDMI 2</button>
        <button class="btn btn-input" data-action="hdmi3">HDMI 3</button>
        <button class="btn btn-input" data-action="hdmi4">HDMI 4</button>
      </div>
    </section>

    <!-- Media Playback -->
    <section class="section">
      <div class="section-label">播放控制</div>
      <div class="media-row">
        <button class="btn btn-media" data-action="rewind">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="19 20 9 12 19 4 19 20"/>
            <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
        <button class="btn btn-media" data-action="stop">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="1"/>
          </svg>
        </button>
        <button class="btn btn-media btn-play" data-action="play">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>
        <button class="btn btn-media" data-action="pause">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button class="btn btn-media" data-action="forward">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 4 15 12 5 20 5 4"/>
            <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- Tools -->
    <section class="section">
      <div class="section-label">工具</div>
      <div class="func-row">
        <button class="btn btn-func" onclick="openDiag()" style="flex:1;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
          打开诊断页面
        </button>
      </div>
    </section>
  </div>

  <!-- Feedback overlay -->
  <div class="feedback" id="feedback"></div>

  <script src="app.js"></script>
</body>
</html>
