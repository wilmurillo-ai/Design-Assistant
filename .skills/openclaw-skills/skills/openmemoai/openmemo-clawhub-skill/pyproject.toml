[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "openmemo-clawhub-skill"
version = "1.0.0"
description = "OpenMemo Bootstrap Skill for ClawHub — persistent memory for OpenClaw agents"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.9"
authors = [
    {name = "OpenMemo", email = "hello@openmemo.ai"},
]
keywords = ["openmemo", "clawhub", "openclaw", "memory", "ai-agent", "skill"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "requests>=2.28.0",
]

[project.optional-dependencies]
full = [
    "openmemo>=0.11.0",
    "openmemo-openclaw>=0.5.0",
]

[project.urls]
Homepage = "https://github.com/openmemoai/openmemo-clawhub-skill"
Repository = "https://github.com/openmemoai/openmemo-clawhub-skill"

[tool.setuptools.packages.find]
include = ["openmemo_clawhub_skill*"]
