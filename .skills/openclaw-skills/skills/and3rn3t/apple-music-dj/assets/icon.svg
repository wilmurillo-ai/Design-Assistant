  <!-- Right ear cup -->
  <rect x="360" y="240" width="48" height="80" rx="16" fill="#eaeaea"/>
  <!-- Music note -->
  <g transform="translate(220, 220)">
    <rect x="24" y="0" width="6" height="64" rx="3" fill="#eaeaea"/>
    <rect x="60" y="8" width="6" height="56" rx="3" fill="#eaeaea"/>
    <path d="M27 0 C27 0, 40 -12, 63 8" fill="none" stroke="#eaeaea" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="20" cy="64" rx="16" ry="12" fill="#eaeaea"/>
    <ellipse cx="56" cy="64" rx="16" ry="12" fill="#eaeaea"/>
  </g>
