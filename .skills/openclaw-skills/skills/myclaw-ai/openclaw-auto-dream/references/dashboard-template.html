<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 记忆健康报告</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a14;--surface:#12121f;--card:#181830;--border:#252545;--gold:#D4AF37;--teal:#4ECDC4;--purple:#A855F7;--red:#FF6B6B;--green:#51CF66;--orange:#FF9F43;--text:#e8e8f0;--dim:#6a6a8a;--radius:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}

/* Layout */
.page{max-width:800px;margin:0 auto;padding:20px 16px 60px}

/* Header */
.header{text-align:center;padding:40px 0 32px}
.header .emoji{font-size:48px;margin-bottom:8px}
.header h1{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
.header .sub{color:var(--dim);font-size:14px}
.header .date{color:var(--dim);font-size:12px;margin-top:8px;opacity:.7}

/* Score Ring */
.score-section{display:flex;flex-direction:column;align-items:center;padding:24px 0 32px}
.score-ring{position:relative;width:180px;height:180px}
.score-ring canvas{width:180px;height:180px}
.score-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-number{font-size:52px;font-weight:800;letter-spacing:-2px}
.score-label{font-size:13px;color:var(--dim);margin-top:-4px}
.score-verdict{margin-top:16px;font-size:16px;font-weight:600;padding:6px 20px;border-radius:20px;display:inline-block}

/* Metrics Strip */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:28px}
.metric{background:var(--card);border-radius:12px;padding:14px 8px;text-align:center;border:1px solid var(--border)}
.metric .icon{font-size:20px;margin-bottom:4px}
.metric .val{font-size:22px;font-weight:700;margin:2px 0}
.metric .name{font-size:11px;color:var(--dim);line-height:1.3}
.metric .bar{height:4px;border-radius:2px;background:#1a1a30;margin-top:8px;overflow:hidden}
.metric .bar-fill{height:100%;border-radius:2px}

/* Section */
.section{margin-bottom:24px}
.section-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title .icon{font-size:20px}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:12px}

/* Summary Cards */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.summary-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);text-align:center}
.summary-card .num{font-size:28px;font-weight:800;margin:4px 0}
.summary-card .label{font-size:12px;color:var(--dim)}
.summary-card.gold .num{color:var(--gold)}
.summary-card.teal .num{color:var(--teal)}
.summary-card.purple .num{color:var(--purple)}
.summary-card.green .num{color:var(--green)}

/* Insight */
.insight{background:linear-gradient(135deg,#D4AF3708,var(--card));border:1px solid #D4AF3733;border-radius:14px;padding:16px 18px;margin-bottom:10px;font-size:14px;line-height:1.7}
.insight .tag{display:inline-block;background:#D4AF3722;color:var(--gold);font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;margin-bottom:6px}

/* Change list */
.change-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #1a1a2a}
.change-item:last-child{border-bottom:none}
.change-badge{flex-shrink:0;width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px}
.change-badge.new{background:#51CF6620}
.change-badge.updated{background:#4ECDC420}
.change-content .title{font-size:14px;font-weight:600}
.change-content .desc{font-size:13px;color:var(--dim);margin-top:2px}

/* Stale */
.stale-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#FF6B6B08;border-left:3px solid var(--red);border-radius:0 12px 12px 0;margin-bottom:8px}
.stale-item .info{flex:1}
.stale-item .name{font-size:14px;font-weight:600}
.stale-item .detail{font-size:12px;color:var(--dim);margin-top:2px}
.stale-item .days{color:var(--red);font-weight:700;font-size:13px;flex-shrink:0;margin-left:12px}

/* Suggestion */
.suggestion{padding:12px 16px;background:#D4AF3708;border-left:3px solid var(--gold);border-radius:0 12px 12px 0;margin-bottom:8px;font-size:14px}

/* Graph */
.graph-wrap{position:relative;width:100%;aspect-ratio:4/3;max-height:400px;border-radius:12px;overflow:hidden;background:#0d0d18}
.graph-wrap canvas{width:100%;height:100%}
.graph-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;justify-content:center;font-size:12px;color:var(--dim)}
.graph-legend span::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}

/* Chart */
.chart-wrap{position:relative;width:100%;height:200px}
.chart-wrap canvas{width:100%;height:100%}

/* Footer */
.footer{text-align:center;padding:32px 0;color:var(--dim);font-size:12px}
.footer a{color:var(--gold);text-decoration:none}

/* Mobile */
@media(max-width:600px){
  .page{padding:12px 12px 40px}
  .header{padding:24px 0 20px}
  .header .emoji{font-size:36px}
  .header h1{font-size:20px}
  .metrics{grid-template-columns:repeat(3,1fr)}
  .metrics .metric:nth-child(n+4){grid-column:span 1}
  .summary-grid{grid-template-columns:1fr 1fr}
  .score-ring{width:150px;height:150px}
  .score-ring canvas{width:150px;height:150px}
  .score-number{font-size:42px}
  .graph-wrap{aspect-ratio:1/1}
}
@media(max-width:380px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .summary-grid{grid-template-columns:1fr}
  .metric .val{font-size:18px}
}
</style>
</head>
<body>
<div class="page">

<div class="header">
  <div class="emoji">🧠</div>
  <h1>记忆健康报告</h1>
  <div class="sub" id="instanceName"></div>
  <div class="date" id="genTime"></div>
</div>

<div class="score-section">
  <div class="score-ring"><canvas id="ringCanvas" width="360" height="360"></canvas>
    <div class="score-center">
      <div class="score-number" id="scoreNum">0</div>
      <div class="score-label">健康分</div>
    </div>
  </div>
  <div class="score-verdict" id="verdict"></div>
</div>

<div class="metrics" id="metricsRow"></div>

<div class="summary-grid" id="summaryGrid"></div>

<div class="section" id="insightSection">
  <div class="section-title"><span class="icon">💡</span>本次洞察</div>
  <div id="insightList"></div>
</div>

<div class="section" id="changeSection">
  <div class="section-title"><span class="icon">📝</span>本次变更</div>
  <div class="card" id="changeList"></div>
</div>

<div class="section" id="suggestSection">
  <div class="section-title"><span class="icon">🎯</span>下一步建议</div>
  <div id="suggestList"></div>
</div>

<div class="section" id="staleSection">
  <div class="section-title"><span class="icon">⏰</span>需要关注的搁置项</div>
  <div id="staleList"></div>
</div>

<div class="section" id="graphSection">
  <div class="section-title"><span class="icon">🕸️</span>知识关联图</div>
  <div class="card" style="padding:12px">
    <div class="graph-wrap"><canvas id="graphCanvas"></canvas></div>
    <div class="graph-legend" id="graphLegend"></div>
  </div>
</div>

<div class="section" id="trendSection">
  <div class="section-title"><span class="icon">📈</span>健康趋势</div>
  <div class="card" style="padding:16px 12px">
    <div class="chart-wrap"><canvas id="trendCanvas"></canvas></div>
  </div>
</div>

<div class="footer">
  <a href="https://myclaw.ai">MyClaw.ai</a> · openclaw-auto-dream v3.3<br>
  Auto-Dream 认知记忆系统自动生成
</div>

</div>

<script>
// ===== DATA =====
const D = __DREAM_DATA_PLACEHOLDER__;

// ===== HELPERS =====
const dpr = window.devicePixelRatio || 1;
function hiDpi(cv, w, h) {
  cv.width = w * dpr; cv.height = h * dpr;
  cv.style.width = w + 'px'; cv.style.height = h + 'px';
  const c = cv.getContext('2d'); c.scale(dpr, dpr); return c;
}
function scoreColor(v) { return v >= 80 ? '#51CF66' : v >= 60 ? '#D4AF37' : v >= 40 ? '#FF9F43' : '#FF6B6B'; }
function pctColor(v) { return scoreColor(v * 100); }
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    r=Math.min(r,w/2,h/2);this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();return this;
  };
}

// ===== HEADER =====
document.getElementById('instanceName').textContent = D.instanceName || '';
document.getElementById('genTime').textContent = D.generatedAt ? '生成于 ' + new Date(D.generatedAt).toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'}) : '';

// ===== SCORE RING =====
(function(){
  const cv = document.getElementById('ringCanvas');
  const size = 180, cSize = size * 2;
  const ctx = hiDpi(cv, size, size);
  const cx = size/2, cy = size/2, r = size/2 - 16;
  const score = D.health.score;
  const sc = scoreColor(score);
  let anim = 0;
  function draw() {
    anim = Math.min(anim + 1.5, score);
    ctx.clearRect(0, 0, size, size);
    // bg
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.lineWidth = 12; ctx.strokeStyle = '#1a1a30'; ctx.stroke();
    // value
    const start = -Math.PI / 2;
    const end = start + (anim / 100) * Math.PI * 2;
    ctx.beginPath(); ctx.arc(cx, cy, r, start, end);
    ctx.lineWidth = 12; ctx.strokeStyle = sc; ctx.lineCap = 'round'; ctx.stroke();
    // glow
    ctx.shadowColor = sc; ctx.shadowBlur = 16;
    ctx.beginPath(); ctx.arc(cx, cy, r, start, end);
    ctx.lineWidth = 3; ctx.strokeStyle = sc; ctx.stroke();
    ctx.shadowBlur = 0;
    document.getElementById('scoreNum').textContent = Math.round(anim);
    document.getElementById('scoreNum').style.color = sc;
    if (anim < score) requestAnimationFrame(draw);
  }
  draw();
  // verdict
  const vd = document.getElementById('verdict');
  let text, bg;
  if (score >= 80) { text = '✨ 记忆状态优秀'; bg = '#51CF6620'; vd.style.color = '#51CF66'; }
  else if (score >= 60) { text = '👍 状态良好，有提升空间'; bg = '#D4AF3720'; vd.style.color = '#D4AF37'; }
  else if (score >= 40) { text = '⚠️ 需要关注'; bg = '#FF9F4320'; vd.style.color = '#FF9F43'; }
  else { text = '🚨 需要立即处理'; bg = '#FF6B6B20'; vd.style.color = '#FF6B6B'; }
  vd.textContent = text; vd.style.background = bg;
})();

// ===== METRICS =====
(function(){
  const metrics = [
    {icon:'🌱', name:'时效性', desc:'最近是否有整理', key:'freshness'},
    {icon:'📋', name:'覆盖度', desc:'记忆覆盖了多少话题', key:'coverage'},
    {icon:'🔗', name:'连贯性', desc:'记忆之间是否有关联', key:'coherence'},
    {icon:'⚡', name:'精简度', desc:'有无冗余重复', key:'efficiency'},
    {icon:'🕸️', name:'连通性', desc:'知识网络是否互联', key:'reachability'}
  ];
  const row = document.getElementById('metricsRow');
  metrics.forEach(m => {
    const v = D.health[m.key]; const pct = Math.round(v * 100); const c = pctColor(v);
    row.innerHTML += `<div class="metric"><div class="icon">${m.icon}</div><div class="val" style="color:${c}">${pct}</div><div class="name">${m.name}</div><div class="bar"><div class="bar-fill" style="width:${pct}%;background:${c}"></div></div></div>`;
  });
})();

// ===== SUMMARY =====
(function(){
  const grid = document.getElementById('summaryGrid');
  const items = [
    {num: D.layers.longterm.entries, label:'条长期记忆', cls:'gold'},
    {num: D.layers.longterm.lines, label:'行 MEMORY.md', cls:'teal'},
    {num: D.layers.procedural.entries, label:'条操作习惯', cls:'purple'},
    {num: D.totalDailyLogs || 16, label:'篇日志已整理', cls:'green'}
  ];
  items.forEach(i => {
    grid.innerHTML += `<div class="summary-card ${i.cls}"><div class="num">${i.num}</div><div class="label">${i.label}</div></div>`;
  });
})();

// ===== INSIGHTS =====
(function(){
  const list = document.getElementById('insightList');
  const sec = document.getElementById('insightSection');
  if (!D.insights || !D.insights.length) { sec.style.display = 'none'; return; }
  D.insights.forEach(text => {
    // Extract emoji prefix as tag if present
    const match = text.match(/^([\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}])\s*(.+)/u);
    const tag = match ? match[1] : '💡';
    const body = match ? match[2] : text;
    list.innerHTML += `<div class="insight"><div class="tag">${tag} 洞察</div><div>${body}</div></div>`;
  });
})();

// ===== CHANGES =====
(function(){
  const list = document.getElementById('changeList');
  const sec = document.getElementById('changeSection');
  if (!D.recentChanges || !D.recentChanges.length) { sec.style.display = 'none'; return; }
  const icons = {new:'✨', updated:'🔄', archived:'📦'};
  D.recentChanges.forEach(c => {
    list.innerHTML += `<div class="change-item"><div class="change-badge ${c.type}">${icons[c.type]||'📝'}</div><div class="change-content"><div class="title">${c.id}</div><div class="desc">${c.summary}</div></div></div>`;
  });
})();

// ===== SUGGESTIONS =====
(function(){
  const list = document.getElementById('suggestList');
  const sec = document.getElementById('suggestSection');
  if (!D.suggestions || !D.suggestions.length) { sec.style.display = 'none'; return; }
  D.suggestions.forEach(s => { list.innerHTML += `<div class="suggestion">${s}</div>`; });
})();

// ===== STALE =====
(function(){
  const list = document.getElementById('staleList');
  const sec = document.getElementById('staleSection');
  if (!D.staleEntries || !D.staleEntries.length) { sec.style.display = 'none'; return; }
  D.staleEntries.forEach(s => {
    list.innerHTML += `<div class="stale-item"><div class="info"><div class="name">${s.id}</div><div class="detail">${s.summary}</div></div><div class="days">${s.daysSinceReferenced}天未提及</div></div>`;
  });
})();

// ===== KNOWLEDGE GRAPH =====
(function(){
  const sec = document.getElementById('graphSection');
  const g = D.memoryGraph;
  if (!g || !g.nodes || !g.nodes.length) { sec.style.display = 'none'; return; }
  const wrap = document.querySelector('.graph-wrap');
  const cv = document.getElementById('graphCanvas');
  const W = wrap.clientWidth || 360, H = wrap.clientHeight || 300;
  const ctx = hiDpi(cv, W, H);
  const layerInfo = {longterm:{color:'#D4AF37',label:'长期记忆'},procedural:{color:'#A855F7',label:'操作习惯'},episodic:{color:'#4ECDC4',label:'项目经历'},archive:{color:'#555577',label:'归档'}};
  const nodes = g.nodes.map((n, i) => ({...n, x: W/2 + Math.cos(i*2.2)*W*0.3 + (Math.random()-.5)*40, y: H/2 + Math.sin(i*2.2)*H*0.3 + (Math.random()-.5)*40, vx:0, vy:0}));
  const nodeMap = {}; nodes.forEach(n => nodeMap[n.id] = n);
  const edges = (g.edges||[]).filter(e => nodeMap[e.from] && nodeMap[e.to]);
  let hover = null;

  function simulate() {
    for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
      let dx=nodes[j].x-nodes[i].x, dy=nodes[j].y-nodes[i].y;
      let d=Math.sqrt(dx*dx+dy*dy)||1, f=600/(d*d);
      nodes[i].vx-=dx/d*f; nodes[i].vy-=dy/d*f;
      nodes[j].vx+=dx/d*f; nodes[j].vy+=dy/d*f;
    }
    edges.forEach(e => {
      const a=nodeMap[e.from],b=nodeMap[e.to];
      let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-100)*.02;
      a.vx+=dx/d*f; a.vy+=dy/d*f; b.vx-=dx/d*f; b.vy-=dy/d*f;
    });
    nodes.forEach(n => {
      n.vx+=(W/2-n.x)*.004; n.vy+=(H/2-n.y)*.004;
      n.vx*=.82; n.vy*=.82; n.x+=n.vx; n.y+=n.vy;
      n.x=Math.max(50,Math.min(W-50,n.x)); n.y=Math.max(40,Math.min(H-40,n.y));
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    edges.forEach(e => {
      const a=nodeMap[e.from],b=nodeMap[e.to];
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle='#2a2a4a'; ctx.lineWidth=1.5; ctx.stroke();
    });
    nodes.forEach(n => {
      const r = 8 + n.importance * 14;
      const c = (layerInfo[n.layer]||layerInfo.longterm).color;
      ctx.shadowColor=c; ctx.shadowBlur=hover===n?18:6;
      ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
      ctx.fillStyle=c+'55'; ctx.fill();
      ctx.beginPath(); ctx.arc(n.x,n.y,r*.65,0,Math.PI*2);
      ctx.fillStyle=c; ctx.fill();
      ctx.shadowBlur=0;
      // label
      ctx.fillStyle=hover===n?'#fff':'#aaa'; ctx.font=(hover===n?'bold ':'')+`${hover===n?13:11}px -apple-system,sans-serif`;
      ctx.textAlign='center'; ctx.fillText(n.label, n.x, n.y - r - 6);
    });
  }
  cv.addEventListener('mousemove', e => {
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    hover=null;
    nodes.forEach(n => { if(Math.hypot(mx-n.x,my-n.y)<20+n.importance*14) hover=n; });
    cv.style.cursor=hover?'pointer':'default';
  });
  // Touch support
  cv.addEventListener('touchstart', e => {
    const rect=cv.getBoundingClientRect();
    const t=e.touches[0]; const mx=t.clientX-rect.left, my=t.clientY-rect.top;
    hover=null;
    nodes.forEach(n => { if(Math.hypot(mx-n.x,my-n.y)<25+n.importance*14) hover=n; });
  }, {passive:true});

  let frame=0;
  function loop(){ if(frame<250)simulate(); draw(); frame++; requestAnimationFrame(loop); }
  loop();
  // legend
  const leg = document.getElementById('graphLegend');
  Object.values(layerInfo).forEach(l => {
    leg.innerHTML += `<span style="--dot:${l.color}"><span style="background:${l.color}" class=""></span>${l.label}</span>`;
  });
  // Fix legend dots with inline style
  leg.querySelectorAll('span > span').forEach(s => { s.style.cssText='display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;background:'+s.parentElement.style.getPropertyValue('--dot'); });
})();

// ===== TREND (skip if < 2 data points) =====
(function(){
  const sec = document.getElementById('trendSection');
  const hist = D.healthHistory || [];
  if (hist.length < 2) { sec.style.display = 'none'; return; }
  const wrap = document.querySelector('.chart-wrap');
  const cv = document.getElementById('trendCanvas');
  const W = wrap.clientWidth || 360, H = 200;
  const ctx = hiDpi(cv, W, H);
  const pad = {l:36,r:16,t:16,b:28}, pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  ctx.strokeStyle='#1a1a30'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+ph*(1-i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#4a4a6a';ctx.font='11px sans-serif';ctx.textAlign='right';ctx.fillText(i*25,pad.l-6,y+4);
  }
  const pts=hist.map((h,i)=>({x:pad.l+i/(hist.length-1)*pw,y:pad.t+ph*(1-h.score/100)}));
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,'#4ECDC422');grad.addColorStop(1,'#4ECDC400');
  ctx.beginPath();ctx.moveTo(pts[0].x,H-pad.b);pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H-pad.b);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.strokeStyle='#4ECDC4';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();
  pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle='#4ECDC4';ctx.fill();});
  ctx.fillStyle='#4a4a6a';ctx.font='11px sans-serif';ctx.textAlign='center';
  hist.forEach((h,i)=>{if(i%(Math.ceil(hist.length/6))===0||i===hist.length-1)ctx.fillText(h.date.slice(5),pts[i].x,H-pad.b+14);});
})();
</script>
</body>
</html>
