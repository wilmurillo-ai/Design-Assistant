# AI-Лиды PRO — настройки
# Чем точнее заполнено — тем точнее работает система
# YAML-ключи на английском, комментарии на русском
#
# OBLIGATORY ПОЛЯ (заполните при первом запуске — 5 минут):
# company.name, company.industry, company.avg_deal_size,
# company.monthly_lead_goal, sales.team_size
# Остальные поля — OPTIONAL (улучшают точность, но не обязательны) # ═══════════════════════════════════════════════════
# ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ
# ═══════════════════════════════════════════════════ leader: role: "Собственник / Маркетолог" # кто использует продукт marketing_experience: "средний" # начинающий / средний / опытный / эксперт team_size: 3 # сколько человек занимается привлечением personal_lead_gen: true # ищет ли лидов сам hour_cost_rub: 2500 # стоимость часа собственника/маркетолога, руб main_pain: "лиды приходят хаотично, нет системы" current_tools: - "Excel / Google Sheets" - "Telegram-рассылка вручную" - "Яндекс.Директ / VK Реклама" style: "системный" # интуитивный / системный / агрессивный / аналитический # ═══════════════════════════════════════════════════
# КОМПАНИЯ КЛИЕНТА
# ═══════════════════════════════════════════════════ company: name: "Название компании" # [OBLIGATORY] — замените на ваше industry: "IT-услуги" # [OBLIGATORY] — ниша: B2B-услуги / e-commerce / стройка / ... model: "B2B" # [OBLIGATORY] — B2B / B2C / B2B2C avg_deal_size: 15000 # [OBLIGATORY] — средний чек, руб monthly_lead_goal: 50 # [OBLIGATORY] — цель: сколько лидов/мес нужно deal_cycle_days: 14 # OPTIONAL — цикл сделки, дней revenue_monthly: 3000000 # OPTIONAL — выручка в месяц, руб website: "" # OPTIONAL crm: "" # OPTIONAL — amoCRM / Bitrix24 / HubSpot / нет # ═══════════════════════════════════════════════════
# БИЗНЕС
# ═══════════════════════════════════════════════════ business: name: "Название компании" product: "Ваш продукт / услуга" niche: "Ваша ниша" # IT / услуги / производство / торговля / агентство price_min: 5000 # минимальный чек руб price_avg: 15000 # средний чек руб price_max: 50000 # максимальный чек руб currency: "RUB" geo: "Россия" usp: "Главное конкурентное преимущество" # 1 предложение guarantees: - "бесплатная консультация 30 мин" - "первый результат за 7 дней" - "возврат если не подошло" # ═══════════════════════════════════════════════════
# ЦЕЛЕВАЯ АУДИТОРИЯ
# ═══════════════════════════════════════════════════ target: avatar: "предприниматели 30-50 лет" age_range: "30-50" gender: "все" income: "от 100000 руб/мес" company_size: "5-50 сотрудников" decision_maker: "Собственник / Директор / Руководитель маркетинга" pain_primary: "лиды приходят хаотично, нет предсказуемого потока" pain_secondary: "бюджет на рекламу тратится без аналитики и ROI" objection_main: "дорого / нет времени разбираться / мы пробовали" trigger: "потерял крупного клиента / CPL вырос / бюджет кончился без результата" trigger_words: - "нет клиентов" - "лиды дорогие" - "откуда брать лидов" - "реклама не работает" - "база мёртвая" - "нет воронки" # ═══════════════════════════════════════════════════
# КАНАЛЫ ПРИВЛЕЧЕНИЯ
# ═══════════════════════════════════════════════════ channels: primary: "telegram" # главный канал secondary: "vk" # второй канал outreach: "telegram DM" # канал холодного outreach budget_total: 30000 # общий бюджет руб/мес budget_primary: 20000 # бюджет на главный канал budget_secondary: 10000 # бюджет на второй канал target_leads_month: 50 # цель лидов/мес lead_sources: - "telegram таргет" - "VK реклама" - "холодный outreach" - "SEO/органика" - "партнёрства" - "рекомендации" # ═══════════════════════════════════════════════════
# ВОРОНКА
# ═══════════════════════════════════════════════════ funnel: lead_magnet_type: "чек-лист" # чек-лист / гайд / калькулятор / демо / вебинар lead_magnet_name: "" # название лид-магнита nurture_days: 14 # длина прогрева в днях max_touches: 5 # максимум касаний до архива touch_intervals_days: [0, 1, 3, 5, 7, 10, 14] # тайминги касаний follow_up_delay_days: 3 # задержка follow-up outreach follow_up_max: 2 # максимум follow-up reactivation_pause_days: 30 # пауза перед реактивацией archive_after_days: 90 # архивировать через N дней без ответа stages: - name: "захват" action: "лид-магнит / подписка / заявка" kpi: "CR лендинг→лид ≥15%" - name: "знакомство" action: "welcome-цепочка, первое касание" kpi: "open rate ≥40%" - name: "прогрев" action: "контент + кейсы + триггеры" kpi: "reply rate ≥10%" - name: "предложение" action: "оффер + дедлайн + бонус" kpi: "CR прогрев→оффер ≥20%" - name: "оплата" action: "дожим + устранение возражений" kpi: "CR оффер→оплата ≥30%" - name: "cross-sell" action: "допродажа через 30-60 дней" kpi: "повторная покупка ≥20%" # ═══════════════════════════════════════════════════
# СЕГМЕНТАЦИЯ И КВАЛИФИКАЦИЯ
# ═══════════════════════════════════════════════════ segmentation: hot_bant_min: 70 # минимальный BANT-балл для горячего warm_bant_min: 40 # минимальный BANT-балл для тёплого cool_bant_min: 20 # минимальный BANT-балл для прохладного hot_criteria: "задал вопрос о цене / был на демо / сказал «интересно»" warm_criteria: "открывает сообщения / скачал лид-магнит / отвечает" cool_criteria: "подписался, редко открывает, нет реакций" cold_criteria: "только контакт, ни одного взаимодействия >14 дней" # ═══════════════════════════════════════════════════
# КРИТЕРИИ КВАЛИФИКАЦИИ — КОМУ ПОДХОДИТ / НЕ ПОДХОДИТ
# ═══════════════════════════════════════════════════ qualification_criteria: ideal_revenue_range: "1-20 млн/мес" # целевой диапазон выручки клиента min_budget_monthly: 20000 # минимальный бюджет на привлечение, руб/мес min_deal_size: 10000 # минимальный средний чек клиента, руб ideal_for: - "собственник который сам ищет клиентов или контролирует маркетинг" - "маркетолог B2B/B2C которому нужна система а не разовые акции" - "руководитель отдела продаж с потоком лидов но без квалификации" - "B2B компании с циклом сделки 7-90 дней" - "бизнес с бюджетом на привлечение 20-200К руб/мес" not_for: - "нет продукта — нечего продвигать" - "нет бюджета на привлечение — система не генерирует лиды из воздуха" - "ожидает что AI сам найдёт клиентов без данных" - "разовые продажи с чеком <3000 руб — unit-экономика не сходится" - "нет готовности работать с воронкой и касаниями" # ═══════════════════════════════════════════════════
# UNIT-ЭКОНОМИКА (цели)
# ═══════════════════════════════════════════════════ economics: target_cpl: 500 # целевая стоимость лида руб target_cac: 5000 # целевая стоимость клиента руб target_ltv: 30000 # целевой LTV клиента руб target_ltv_cac_ratio: 3.0 # минимальный LTV/CAC target_payback_months: 3 # целевой срок окупаемости CAC target_cr_lead_to_client: 0.10 # 10% лид → клиент target_roi: 3.0 # ROI x (3.0 = 300%) avg_client_lifespan_months: 12 # средний срок жизни клиента в мес monthly_leads: 50 # лидов в месяц lead_to_deal_rate: 0.10 # конверсия лид → сделка (10%) # ═══════════════════════════════════════════════════
# A/B ТЕСТИРОВАНИЕ
# ═══════════════════════════════════════════════════ ab_testing: enabled: true min_sample_per_group: 100 # минимальная выборка на группу min_test_duration_days: 7 # минимальный срок теста significance_threshold: 0.10 # минимальный значимый прирост (10%) current_open_rate: 0.25 # текущий open rate current_reply_rate: 0.10 # текущий reply rate current_cr_to_offer: 0.05 # текущий CR в оффер # ═══════════════════════════════════════════════════
# ОТДЕЛ ПРОДАЖ
# ═══════════════════════════════════════════════════ sales: team_size: 2 # [OBLIGATORY] — кол-во менеджеров по продажам rop_name: "" # OPTIONAL — имя РОПа для отчётов crm_system: "" # OPTIONAL — amoCRM / Bitrix24 / HubSpot / нет telegram_alert_hot_leads: false # OPTIONAL — слать алёрт в TG когда горячий лид bant_min_score: 60 # OPTIONAL — минимальный BANT-балл для передачи менеджеру qualification_sla_hours: 2 # OPTIONAL — SLA квалификации горячего лида в часах # ═══════════════════════════════════════════════════
# ОТЧЁТНОСТЬ
# ═══════════════════════════════════════════════════ reporting: report_day: "понедельник" # день недели для отчёта report_period: "week" # week / month ceo_report_day: 1 # день месяца для CEO-отчёта track_sources: true # считать ROI по источникам track_ab_tests: true # логировать A/B тесты forecast_months: 3 # горизонт прогноза выручки # ═══════════════════════════════════════════════════
# ПЛАН ВНЕДРЕНИЯ
# ═══════════════════════════════════════════════════ implementation: day_1: - "заполнить config.yaml — ниша, продукт, каналы, бюджет" - "построить аватар: аватар: [ваша ниша]" - "найти каналы: где брать лидов для [ниша], бюджет [N] руб/мес" - "первый лид-магнит: лид-магнит для [аудитория]" week_1: - "первое касание по горячим лидам из базы" - "сегментация базы по BANT + температуре" - "квалификация топ-лидов (BANT-скоринг)" - "запуск первой цепочки прогрева (14 дней)" - "построение автоворонки под основной продукт" month_1: - "unit-экономика по всем каналам (CPL/CAC/LTV/ROI)" - "первый CEO-отчёт с прогнозом выручки" - "реактивация спящей базы" - "первый A/B тест (тема/оффер/канал)" - "корректировка каналов — отключить слабые, масштабировать сильные" quarter_1: - "все каналы протестированы A/B — CPL оптимизирован" - "автоворонка генерирует клиентов без ручного участия" - "unit-экономика стабильна — масштабирование предсказуемо" - "pipeline управляемый — прогноз выручки ±15%" # ═══════════════════════════════════════════════════
# ROI-МОДЕЛЬ (формула окупаемости)
# ═══════════════════════════════════════════════════ roi_model: formula: "доп. клиенты в месяц × средний чек − CAC × кол-во клиентов" example: product_cost: 30000 # стоимость AI-Лиды PRO, руб avg_deal_size: 15000 # средний чек клиента, руб cpl: 500 # стоимость лида, руб cr_lead_to_client: 0.10 # конверсия 10% cac: 5000 # стоимость клиента, руб additional_clients_per_month: 3 # доп. клиентов в месяц monthly_return: 45000 # доход от доп. клиентов, руб payback_days: 20 # окупаемость за 20 дней annual_roi_percent: 1700 # (45000×12 - 30000) / 30000 × 100 conservative: cpl_reduction_percent: 20 # снижение CPL на 20% cr_uplift_percent: 15 # рост конверсии +15% additional_clients: 2 monthly_return: 30000 optimistic: cpl_reduction_percent: 50 # снижение CPL на 50% cr_uplift_percent: 30 # рост конверсии +30% additional_clients: 5 monthly_return: 75000 annual_roi_percent: 2900 # ═══════════════════════════════════════════════════
# ANTI-FAIL — КОГДА НЕ ПОМОЖЕТ
# ═══════════════════════════════════════════════════ anti_fail: requires: - "реальный продукт/услуга с понятным чеком" - "бюджет на привлечение от 20К руб/мес" - "готовность работать с лидами (звонить, писать, встречаться)" - "честные данные в config.yaml (не выдуманные)" - "кто-то обрабатывает лидов после квалификации" will_not_help_if: - "нет продукта — нечего продвигать" - "нет бюджета — система не генерирует лиды из воздуха" - "данные вымышленные — garbage in garbage out" - "никто не работает с лидами — квалификация без действий бесполезна" - "ожидание магии — AI усиливает процесс, не заменяет его" garbage_in_garbage_out: - "аватар без реальных данных о клиентах → общий портрет" - "каналы без бюджета → теоретический план" - "прогрев без контента → пустые сообщения" - "unit-экономика с выдуманными цифрами → ложные выводы" # ═══════════════════════════════════════════════════
# КОНКУРЕНТЫ (для анализа каналов)
# ═══════════════════════════════════════════════════ competitors: - name: "Конкурент 1" channels: "telegram, VK, SEO" strength: "большой бюджет на рекламу" weakness: "нет персонализации, шаблонный outreach" counter: "BANT-квалификация + персональное первое касание" - name: "Конкурент 2" channels: "холодные звонки, email" strength: "агрессивный outreach, большая команда" weakness: "низкая конверсия, нет прогрева" counter: "прогрев 14 дней + автоворонка = выше конверсия при меньших затратах"
