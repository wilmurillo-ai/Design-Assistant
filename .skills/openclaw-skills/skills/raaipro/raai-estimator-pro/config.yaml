# AI-Сметчик PRO — Глубокая настройка сметного контура
# Заполняется под конкретный бизнес, регион и тип объектов
# Поля с пометкой (опционально) можно пропустить на старте # ═══════════════════════════════════════════════════
# ПРОФИЛЬ РУКОВОДИТЕЛЯ
# ═══════════════════════════════════════════════════ leader: name: "Имя Отчество" role: "Прораб" # Прораб / Сметчик / Генподрядчик / Собственник / Техзаказчик language_mode: "вы" # "ты" или "вы" timezone: "Europe/Moscow" # Стиль управления management_style: "прямой" # "прямой" / "аналитический" / "партнёрский" decision_speed: "быстрая" # "медленная" / "средняя" / "быстрая" # ROI-привязка hour_cost_rub: 0 # Стоимость часа сметчика/прораба в рублях hours_lost_per_week: 0 # Часов теряется на ручные расчёты и споры # Зона перегруза overload_zone: "сметы" # "сметы" / "документы" / "переговоры" / "контроль" overload_description: "" # "Сметы делаем 3 дня вместо 1, теряем тендеры" # Сильные стороны (опционально) strengths: - "" # "переговоры с заказчиком", "знание норм", "скорость" # Зоны развития (опционально) growth_areas: - "" # "аудит подрядчиков", "тендерная аналитика" # ═══════════════════════════════════════════════════
# КОМПАНИЯ — ПРОФИЛЬ БИЗНЕСА
# ═══════════════════════════════════════════════════ company: name: "Название компании" legal_form: "ООО" # ООО / ИП / АО company_type: "подрядчик" # "подрядчик" / "генподрядчик" / "заказчик" / "техзаказчик" / "сметный отдел" main_object_type: "квартира" # "квартира" / "офис" / "дом" / "коммерция" / "инженерка" / "промышленность" geography: "Россия" timezone: "Europe/Moscow" # Финансовые параметры бизнеса annual_turnover_rub: 0 # Годовой оборот, руб (для ICP-квалификации) monthly_turnover_rub: 0 # Месячный оборот, руб target_annual_turnover_rub: 0 # Целевой оборот # Стадия бизнеса stage: "growth" # "launch" / "early" / "growth" / "mature" # ═══════════════════════════════════════════════════
# КВАЛИФИКАЦИЯ — КОМУ ПОДХОДИТ / НЕ ПОДХОДИТ
# ═══════════════════════════════════════════════════ qualification: ideal_annual_turnover_from_rub: 5000000 ideal_annual_turnover_to_rub: 300000000 requires_object_description: true requires_works_composition: true requires_region_known: true requires_volumes_confirmed: true requires_responsible_person: true not_for: - "Проект без исходных данных" - "Бизнес, где объёмы никто не подтверждает" - "Тот, кто хочет цену без состава работ" - "Замена техобследованию" # ═══════════════════════════════════════════════════
# РЕГИОН И НОРМАТИВНАЯ БАЗА
# ═══════════════════════════════════════════════════ region: name: "Москва / МО" ter_code: "MSK" # Код региона для ТЕР/ФЕР material_coeff: 1.00 # Региональный коэффициент на материалы labor_coeff: 1.00 # Коэффициент на труд equipment_coeff: 1.00 # Коэффициент на механизмы district_wage_coeff: 1.00 # Районный коэффициент к зарплате logistics_markup: 0.05 # Наценка на логистику, доли # Индексы пересчёта из базисного уровня 2001 г. (Минстрой 2026) index_build_works: 11.2 index_install_works: 9.8 index_equipment: 2.0 index_other: 9.0 # ═══════════════════════════════════════════════════
# НОРМАТИВНАЯ БАЗА
# ═══════════════════════════════════════════════════ normatives: base_methodology: "МДС 81-35.2004" # Основная методика составления смет overhead_source: "МДС 81-33.2004" # Нормативы накладных расходов profit_source: "МДС 81-25.2001" # Нормативы сметной прибыли pricing_base: "ТЕР-2001" # ТЕР-2001 / ФЕР-2001 / ГЭСН / ТСН vat: 0.20 # НДС contingency: 0.02 # Непредвиденные расходы, доли waste_general: 0.10 # Общий коэффициент на потери материалов structure_rule: "итоговая смета раскрывается как ПЗ → НР → СП → непредвиденные → НДС" note: "Накладные расходы и сметная прибыль начисляются на ФОТ рабочих и механизаторов" # ═══════════════════════════════════════════════════
# КОНТРОЛЬНЫЕ РАСЦЕНКИ (для быстрой проверки)
# ═══════════════════════════════════════════════════ pricing: baseline_city: "Москва" control_rates: # Работы (руб/ед, Москва 2026) plaster_wall_m2: 620 # Штукатурка стен, руб/м² screed_50mm_m2: 500 # Стяжка 50 мм, руб/м² tile_floor_m2: 1100 # Укладка плитки пол, руб/м² tile_wall_m2: 1300 # Укладка плитки стена, руб/м² electrical_point: 2500 # Электроточка, руб/шт plumbing_point: 3500 # Сантехническая точка, руб/шт drywall_partition_m2: 900 # Перегородка ГКЛ, руб/м² painting_m2: 350 # Окраска стен, руб/м² flooring_laminate_m2: 400 # Укладка ламината, руб/м² ceiling_gkl_m2: 850 # Потолок ГКЛ, руб/м² rule: "Контрольные расценки не подменяют итоговую смету — используются для быстрой проверки порядка цифр" # ═══════════════════════════════════════════════════
# БИЗНЕС-МЕТРИКИ — СПЕЦИФИКА СМЕТЧИКА
# ═══════════════════════════════════════════════════ business_metrics: # Ключевые операционные показатели avg_project_size_rub: 0 # Средний размер проекта, руб avg_margin_percent: 0 # Средняя маржа по проектам, % num_active_projects: 0 # Количество активных объектов overrun_percent: 0 # Средний перерасход бюджета, % estimate_time_days: 0 # Среднее время подготовки сметы, дней tender_win_rate: 0 # Процент выигранных тендеров # Целевые показатели target_margin_percent: 15 # Целевая маржа, % target_overrun_max_percent: 5 # Максимально допустимый перерасход, % target_estimate_time_days: 1 # Цель: смета за N дней # Антипаттерны для мониторинга contractor_overpricing_alert_percent: 10 # Алерт при превышении контрольных расценок на N% materiality_threshold_percent: 5 # Порог существенности для замечаний в аудите # ═══════════════════════════════════════════════════
# ТИПОВЫЕ ОБЪЕКТЫ
# ═══════════════════════════════════════════════════ typical_objects: - type: "Квартира (чистовая)" avg_area_m2: 60 avg_budget_rub: 1200000 avg_duration_days: 45 main_works: ["штукатурка", "стяжка", "плитка", "электрика", "сантехника", "чистовые"] - type: "Офис (под ключ)" avg_area_m2: 150 avg_budget_rub: 4500000 avg_duration_days: 90 main_works: ["перегородки ГКЛ", "потолки", "плитка", "ламинат", "электрика", "вентиляция"] - type: "Коммерция" avg_area_m2: 300 avg_budget_rub: 9000000 avg_duration_days: 120 main_works: ["демонтаж", "перепланировка", "инженерные системы", "отделка"] # ═══════════════════════════════════════════════════
# ДОКУМЕНТЫ
# ═══════════════════════════════════════════════════ documents: required_outputs: - "локальная смета (по МДС)" - "объёмная ведомость" - "дефектная ведомость" - "КС-2 (акт выполненных работ)" - "КС-3 (справка о стоимости)" - "коммерческое предложение" - "тендерное КП" - "сравнение вариантов (TCO)" signatory_role: "директор / прораб / сметчик" ks2_ks3_template: "унифицированная форма" note: "Документы генерируются из данных сметы — не вводятся вручную" # ═══════════════════════════════════════════════════
# АУДИТ СМЕТ
# ═══════════════════════════════════════════════════ audit: check_for: - "завышенные расценки относительно контрольных" - "скрытые коэффициенты НР и СП" - "дубли строк и позиций" - "пропущенные работы (hidden gaps)" - "ошибки в объёмах и единицах измерения" - "некорректные коэффициенты зон производства" - "завышенный расход материалов" materiality_threshold_percent: 5 output_rule: "каждое замечание должно влиять на деньги, срок или риск" priority_levels: critical: "влияет >10% бюджета" major: "влияет 5–10% бюджета" minor: "влияет <5% но системная ошибка" # ═══════════════════════════════════════════════════
# ТЕНДЕРНЫЙ КОНТУР
# ═══════════════════════════════════════════════════ tender: typical_margin_for_tender_percent: 12 # Целевая маржа при тендерном ценообразовании dumping_alert_percent: 20 # Алерт если цена ниже контрольной на N% kp_structure: - "краткое описание объекта" - "состав работ" - "основание расценок" - "смета по укрупнённым позициям" - "сроки" - "условия платежей" - "гарантийные обязательства" win_criteria: - "цена обоснована нормами, а не «взята из головы»" - "есть альтернативные варианты материалов с ценой" - "включены непредвиденные и запас на изменения" # ═══════════════════════════════════════════════════
# ПЛАН ВНЕДРЕНИЯ
# ═══════════════════════════════════════════════════ implementation: day_1: - "Заполнить регион, нормативы, типовые объекты" - "Задать контрольные расценки под регион" - "Настроить НДС, непредвиденные и коэффициенты" - "Собрать 1 эталонную смету по типовому объекту" week_1: - "Подготовить шаблоны КС-2, КС-3, дефектовки и КП" - "Прогнать аудит 2–3 смет подрядчиков" - "Собрать объёмную ведомость по типовым объектам" - "Сделать первое тендерное КП" month_1: - "Снизить среднее время подготовки сметы" - "Собрать библиотеку типовых объектов и проверок" - "Увязать смету с графиком и материалами" - "Сформировать стандарт аудита подрядчиков" quarter_1: - "Перевести сметный процесс в системный контур" - "Снизить потери на недосчётах и завышениях" - "Поднять процент выигрыша тендеров" - "Превратить смету в инструмент управления маржой" # ═══════════════════════════════════════════════════
# ROI-МОДЕЛЬ
# ═══════════════════════════════════════════════════ roi_model: enabled: true estimator_hour_cost_rub: 0 # Стоимость часа сметчика hours_saved_per_estimate: 4 # Экономия на одной смете, часов estimates_per_month: 0 # Смет в месяц avg_project_budget_rub: 0 # Средний бюджет объекта overpricing_detection_rate: 0.07 # Типовой процент завышения, выявляемый аудитом formula: "estimates * hours_saved * hour_cost + avg_budget * overpricing_rate" example_payback: > 1 смета 1.5 млн руб: аудит нашёл 7% завышений = 105 000 руб. Окупаемость продукта = 30 000 / 105 000 = 0.29 объекта. # ═══════════════════════════════════════════════════
# ANTI-FAIL
# ═══════════════════════════════════════════════════ anti_fail: required_inputs: - "описание объекта и тип работ" - "состав основных работ" - "регион и ценовая база" - "объёмы / замеры (хотя бы приблизительные)" hard_limits: - "не заменяет инженерное обследование" - "не спасает при кривых вводных данных" - "не лечит хаос без фиксации изменений" - "не считает честно без подтверждённых объёмов" requires_clean_volumes: true requires_works_composition: true requires_region: true warning: > Если исходные данные слабые, объёмы не подтверждены и состав работ туманный — система покажет структуру, но не защитит от ошибок. Garbage in → garbage out в строительстве = деньги, суды, переделки. # ═══════════════════════════════════════════════════
# ФОРМАТ И ИНТЕРФЕЙС
# ═══════════════════════════════════════════════════ format: emoji: false tables: true show_formula_breakdown: true # Показывать раскладку ПЗ → НР → СП → НДС show_control_comparison: true # Сравнивать с контрольными расценками currency: "руб" decimal_separator: "," thousands_separator: " " report_style: "professional" # "professional" / "brief" show_norms_references: true # Ссылки на нормативные источники # ═══════════════════════════════════════════════════
# ИНТЕГРАЦИИ (опционально)
# ═══════════════════════════════════════════════════ integrations: grand_smeta: enabled: false note: "Экспорт в формат Гранд-Сметы — XML/ARPS" rik: enabled: false note: "Совместимость с РИК" crm: enabled: false type: "" accounting: enabled: false type: "" # 1c / моёдело
