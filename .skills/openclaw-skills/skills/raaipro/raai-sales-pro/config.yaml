# AI-Продажник PRO — настройки
# Чем точнее заполнено — тем точнее работает система
# YAML-ключи на английском, комментарии на русском
#
# ══════════════════════════════════════════════════
# ОБЯЗАТЕЛЬНЫЕ ПОЛЯ [OBLIGATORY] — заполните при первом запуске
# 1. leader.role
# 2. company.industry
# 3. business.product
# 4. business.niche
# 5. sales_metrics.monthly_leads
# Остальное — OPTIONAL, можно заполнять по мере использования
# ══════════════════════════════════════════════════ # ═══════════════════════════════════════════════════
# ПРОФИЛЬ РОПа / СОБСТВЕННИКА
# ═══════════════════════════════════════════════════ leader: role: "РОП / Собственник" # [OBLIGATORY] кто использует продукт sales_experience: "средний" # начинающий / средний / опытный / эксперт team_size: 5 # сколько менеджеров в команде personal_sales: true # продаёт ли сам руководитель hour_cost_rub: 3000 # стоимость часа РОПа/собственника, руб main_pain: "менеджеры работают без системы" current_tools: - "Excel / Google Sheets" - "WhatsApp для переписки" - "CRM базовая (amoCRM / Битрикс)" style: "системный" # интуитивный / системный / агрессивный / консультативный # ═══════════════════════════════════════════════════
# КОМПАНИЯ КЛИЕНТА
# ═══════════════════════════════════════════════════ company: industry: "IT-услуги" # ниша клиента model: "B2B" # B2B / B2C / B2B2C avg_deal_size: 45000 # средний чек, руб deal_cycle_days: 21 # цикл сделки, дней revenue_monthly: 5000000 # выручка в месяц, руб lead_sources: - "сайт" - "холодные звонки" - "рекомендации" - "LinkedIn" sales_channels: - "телефон" - "telegram" - "email" - "встречи" # ═══════════════════════════════════════════════════
# БИЗНЕС
# ═══════════════════════════════════════════════════ business: name: "Название компании" product: "Ваш продукт / услуга" niche: "Ваша ниша" # IT / услуги / производство / торговля / агентство price_range: "от 15000 до 150000 руб" currency: "RUB" usp: "Главное конкурентное преимущество" # 1 предложение guarantees: - "бесплатная консультация 30 мин" - "возврат в течение 14 дней" - "SLA: ответ в течение 2 часов" # ═══════════════════════════════════════════════════
# ЦЕЛЕВОЙ КЛИЕНТ
# ═══════════════════════════════════════════════════ target: who: "Собственники малого и среднего бизнеса" company_size: "5-100 сотрудников" decision_maker: "Собственник / Директор / Руководитель продаж" pain_primary: "Теряют клиентов и выручку из-за неработающей системы продаж" pain_secondary: "Нет времени выстраивать процессы, менеджеры работают хаотично" budget_range: "15000-150000 руб" trigger_words: - "хочу увеличить продажи" - "менеджеры плохо закрывают" - "теряем клиентов" - "нужна система" - "конкуренты обгоняют" # ═══════════════════════════════════════════════════
# СТИЛЬ ПРОДАЖ
# ═══════════════════════════════════════════════════ sales_style: tone: "уверенный дружелюбный" # уверенный / мягкий / экспертный / напористый language: "вы" # ты / вы channel_primary: "telegram" # telegram / whatsapp / email / phone channel_secondary: "phone" methodology: "SPIN+Challenger" # SPIN / Challenger / классический / BANT # ═══════════════════════════════════════════════════
# FOLLOW-UP
# ═══════════════════════════════════════════════════ follow_up: max_touches: 7 interval_days: [1, 3, 7, 14, 21, 30, 90] stop_on_no: true reactivation_days: 90 # через сколько дней реактивировать value_per_touch: # что давать в каждом касании touch_1: "резюме разговора + обещанный материал" touch_2: "кейс из ниши клиента" touch_3: "бесплатный инструмент / чек-лист" touch_4: "инсайт / статистика по их рынку" touch_5: "мягкий дожим + новое условие" touch_6: "последний шанс" touch_7: "реактивация через 90 дней" # ═══════════════════════════════════════════════════
# КВАЛИФИКАЦИЯ
# ═══════════════════════════════════════════════════ qualification: method: "BANT+MEDDIC" # BANT / MEDDIC / BANT+MEDDIC / simple auto_score: true min_score_to_work: 2.0 # минимальный BANT score для активной работы disqualify_below: 0.5 # дисквалификация если ниже # ═══════════════════════════════════════════════════
# КРИТЕРИИ КВАЛИФИКАЦИИ — КОМУ ПОДХОДИТ / НЕ ПОДХОДИТ
# ═══════════════════════════════════════════════════ qualification_criteria: ideal_revenue_range: "3-30 млн/мес" # целевой диапазон выручки клиента min_team_size: 2 # минимум менеджеров в команде клиента min_deal_size: 15000 # минимальный средний чек клиента, руб min_deal_cycle_days: 7 # минимальный цикл сделки, дней ideal_for: - "собственник который сам продаёт или контролирует продажи" - "РОП которому нужна система а не интуиция" - "B2B компании с циклом сделки 7-180 дней" - "отдел продаж 2-15 человек" not_for: - "фрилансеры без клиентов" - "компании без продукта" - "бизнес с чеком <5000 руб и разовыми продажами" - "те кто хочет волшебный скрипт вместо системы" # ═══════════════════════════════════════════════════
# ВОРОНКА ПРОДАЖ
# ═══════════════════════════════════════════════════ funnel_stages: - name: "новый лид" probability: 0.08 sla_days: 1 # максимум дней на реакцию action: "квалификационный звонок" - name: "квалификация" probability: 0.20 sla_days: 3 action: "SPIN-сессия, выявить всех стейкхолдеров" - name: "КП отправлено" probability: 0.35 sla_days: 1 action: "follow-up звонок через 24 часа" - name: "переговоры" probability: 0.60 sla_days: 2 action: "дожим, устранить блокер" - name: "договор" probability: 0.85 sla_days: 1 action: "контроль подписания, выставить счёт" - name: "оплата" probability: 1.0 sla_days: 0 action: "подтвердить получение, запустить онбординг" - name: "повторная покупка" probability: 0.40 sla_days: 30 action: "допродажа через 30-60 дней после старта" # ═══════════════════════════════════════════════════
# МЕТРИКИ ПРОДАЖ — ВОРОНКА С КОНВЕРСИЯМИ
# ═══════════════════════════════════════════════════ sales_metrics: monthly_leads: 30 # лидов в месяц lead_to_qualification: 0.30 # конверсия лид → квалификация (30%) qualification_to_meeting: 0.50 # конверсия квалификация → встреча (50%) meeting_to_kp: 0.70 # конверсия встреча → КП (70%) kp_to_deal: 0.30 # конверсия КП → сделка (30%) overall_conversion: 0.10 # общая конверсия лид → сделка (10%) target_monthly_revenue: 5000000 # целевая выручка в месяц, руб target_deals_per_month: 10 # целевое число сделок в месяц cac: 8500 # стоимость привлечения клиента, руб ltv: 270000 # lifetime value клиента, руб ltv_cac_ratio: 31.8 # соотношение LTV / CAC avg_touches_to_close: 5 # среднее число касаний до закрытия pipeline_coverage: 3.0 # pipeline / план (x3 = норма) # ═══════════════════════════════════════════════════
# UNIT-ЭКОНОМИКА (заполнить реальными данными)
# ═══════════════════════════════════════════════════ unit_economics: avg_deal_size: 45000 # средний чек, руб sales_cycle_days: 21 # средний цикл сделки monthly_leads: 30 # лидов в месяц lead_to_deal_rate: 0.10 # конверсия лид → сделка (10%) sales_team_cost_monthly: 80000 # зарплата продавцов, руб/мес tools_cost_monthly: 5000 # CRM и инструменты, руб/мес avg_client_lifetime_months: 12 # средний срок жизни клиента monthly_purchases_per_client: 1.5 # покупок в месяц на клиента churn_rate_monthly: 0.08 # ежемесячный отток # ═══════════════════════════════════════════════════
# КОНКУРЕНТЫ (для win/loss анализа)
# ═══════════════════════════════════════════════════ competitors: - name: "Конкурент 1" strength: "Цена ниже на 30%" weakness: "Нет поддержки, долго внедряют" counter: "Показывать TCO (стоимость владения), не только цену" - name: "Конкурент 2" strength: "Известный бренд" weakness: "Негибкие условия, дорогая кастомизация" counter: "Гибкость + скорость + личное внимание" # ═══════════════════════════════════════════════════
# КЕЙСЫ (для скриптов и КП)
# ═══════════════════════════════════════════════════ case_studies: - niche: "торговля" company: "Компания А" problem: "менеджеры закрывали 8% лидов" solution: "внедрили систему скриптов + SPIN" result: "конверсия выросла до 18% за 2 месяца" timeline: "2 месяца" - niche: "услуги" company: "Агентство Б" problem: "цикл сделки 45 дней, клиенты уходили к конкурентам" solution: "pipeline management + follow-up цепочки" result: "цикл сократился до 18 дней, +40% выручки" timeline: "3 месяца" # ═══════════════════════════════════════════════════
# ПЛАН ВНЕДРЕНИЯ
# ═══════════════════════════════════════════════════ implementation: day_1: - "заполнить config.yaml под свой бизнес" - "первый скрипт звонка: скрипт звонка: [ваш продукт]" - "SPIN под вашу нишу: SPIN для [ниша]" - "квалификация тестового лида: квалифицируй: [описание]" week_1: - "все менеджеры переведены на единый скрипт" - "follow-up цепочки настроены для 3 типов касаний" - "pipeline заведён: все текущие сделки по стадиям" - "обработаны топ-5 возражений с ветвлениями" - "первый Challenger-питч подготовлен" month_1: - "первый win/loss анализ за месяц" - "unit-экономика рассчитана" - "скрипты скорректированы по данным (что работает / нет)" - "pipeline report еженедельный" - "КП шаблон адаптирован под бизнес" quarter_1: - "полная система продаж работает как машина" - "конверсия лид→сделка выросла на 20-40%" - "win/loss паттерны видны — управляемые причины устранены" - "pipeline предсказуем — прогноз выручки ±15%" # ═══════════════════════════════════════════════════
# ROI-МОДЕЛЬ (формула окупаемости)
# ═══════════════════════════════════════════════════ roi_model: formula: "доп. сделки в месяц × средний чек" example: product_cost: 30000 # стоимость AI-Продажник PRO, руб avg_deal_size: 45000 # средний чек клиента, руб additional_deals_per_month: 1 # минимум 1 доп. сделка в месяц monthly_return: 45000 # доход от 1 доп. сделки, руб payback_days: 20 # окупаемость за 20 дней annual_roi_percent: 1700 # (45000×12 - 30000) / 30000 × 100 conservative: conversion_uplift_percent: 15 # рост конверсии +15% additional_deals: 1.5 monthly_return: 67500 optimistic: conversion_uplift_percent: 30 # рост конверсии +30% additional_deals: 3 monthly_return: 135000 annual_roi_percent: 5300 # ═══════════════════════════════════════════════════
# ANTI-FAIL — КОГДА НЕ ПОМОЖЕТ
# ═══════════════════════════════════════════════════ anti_fail: requires: - "реальный продукт/услуга (не идея)" - "хотя бы 10 лидов в месяц" - "менеджеры готовые работать по скрипту" - "РОП/собственник контролирует pipeline еженедельно" - "честные данные в config.yaml (не выдуманные)" will_not_help_if: - "нет продукта — нечего продавать" - "нет лидов — pipeline пуст" - "менеджеры саботируют — система без людей не работает" - "данные вымышленные — garbage in garbage out" - "РОП не смотрит pipeline — система без контроля деградирует" garbage_in_garbage_out: - "скрипт без адаптации под нишу → шаблонный результат" - "КП без данных клиента → общий документ" - "win/loss без реальных причин → бесполезный отчёт"
