# AI-Поддержка PRO — Глубокая настройка под бизнес клиента
# Чем точнее заполнено — тем точнее работает система
# Поля с пометкой (опционально) можно пропустить на старте # ═══════════════════════════════════════════════════
# ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ
# ═══════════════════════════════════════════════════ leader: name: "Имя Отчество" role: "Руководитель поддержки" # Руководитель поддержки / COO / CEO / Head of Support language_mode: "вы" # "ты" или "вы" telegram_id: "" timezone: "Europe/Moscow" # Стиль управления management_style: "прямой" # "прямой" / "аналитический" / "партнёрский" decision_speed: "быстрая" # Зона перегруза overload_zone: "SLA" # "SLA" / "angry clients" / "эскалации" / "онбординг операторов" overload_description: "" # "каждую неделю разбираю просрочки вручную" # ROI-привязка hour_cost_rub: 0 # Стоимость часа руководителя поддержки hours_lost_per_week: 0 # Часов в неделю теряется на хаос в поддержке # ═══════════════════════════════════════════════════
# КОМПАНИЯ — ПРОФИЛЬ БИЗНЕСА
# ═══════════════════════════════════════════════════ company: name: "Название компании" legal_form: "ООО" industry: "SaaS" # SaaS / eCommerce / Marketplace / Услуги / EdTech business_model: "SaaS" # "SaaS" / "ecommerce" / "marketplace" / "service" geography: "Россия" timezone: "Europe/Moscow" # Стадия бизнеса stage: "growth" # "early" / "growth" / "mature" monthly_revenue_rub: 0 # Параметры поддержки type: "ecommerce" # ecommerce / saas / service / marketplace working_hours: weekdays: "09:00-20:00" saturday: "10:00-18:00" sunday: "выходной" emergency_hours: "24/7" # ═══════════════════════════════════════════════════
# КВАЛИФИКАЦИЯ — КОМУ ПОДХОДИТ / НЕ ПОДХОДИТ
# ═══════════════════════════════════════════════════ qualification: ideal_tickets_per_month_from: 100 ideal_tickets_per_month_to: 10000 min_team_size: 2 requires_sla: true requires_repeatable_ticket_types: true not_for: - "Микробизнес с 10-20 сообщениями в день" - "Поддержка без очереди и без SLA" - "Разовые обращения без повторяемых сценариев" - "Бизнес без готовности фиксировать категории тикетов" # ═══════════════════════════════════════════════════
# ФИНАНСЫ
# ═══════════════════════════════════════════════════ finance: current_monthly_revenue: 0 monthly_revenue_target: 0 gross_margin_percent: 0 # ═══════════════════════════════════════════════════
# МЕТРИКИ ПОДДЕРЖКИ — КЛЮЧЕВЫЕ KPI
# ═══════════════════════════════════════════════════ business_metrics: # Главная метрика north_star_metric: "SLA первого ответа" north_star_current: 0 # % тикетов с ответом в срок — текущее north_star_target: 95 # % — целевое # Специфичные метрики AI-Поддержки tickets_per_month: 0 # Тикетов в месяц sla_first_response_minutes: 0 # Текущее фактическое время первого ответа (мин) sla_resolution_hours: 0 # Текущее среднее время решения (часы) nps_current: 0 # Текущий NPS agents_count: 0 # Количество агентов поддержки l1_to_l2_escalation_percent: 0 # Доля эскалаций L1→L2 (%) # Ежедневные метрики daily_metrics: - name: "Тикетов сегодня" unit: "шт" target: 0 source: "CRM / тикет-система" - name: "SLA compliance" unit: "%" target: 95 source: "расчёт" - name: "Angry clients" unit: "шт" target: 0 source: "sentiment-анализ" - name: "L2 эскалации" unit: "шт" target: 0 source: "журнал эскалаций" # KPI для weekly review weekly_kpi: - "Количество тикетов" - "SLA compliance первого ответа (%)" - "SLA compliance решения (%)" - "Доля эскалаций L1→L2" - "Angry clients / публично опасные кейсы" - "NPS / CSAT за неделю" - "Повторные обращения по той же теме" - "Время онбординга нового оператора" # ═══════════════════════════════════════════════════
# КОМАНДА ПОДДЕРЖКИ
# ═══════════════════════════════════════════════════ support_team: team_size: 0 team_lead: "Имя руководителя" l1_agents_count: 0 l2_agents_count: 0 l3_owner_role: "Head of Support / COO / CEO" onboarding_days_target: 0 # Целевое время онбординга нового оператора (дни) quality_control_owner: "Руководитель поддержки" # ═══════════════════════════════════════════════════
# SLA
# ═══════════════════════════════════════════════════ sla: target_first_response_percent: 95 target_resolution_percent: 90 critical: first_response_min: 15 resolution_hours: 2 notify_before_breach_min: 10 high: first_response_hours: 1 resolution_hours: 8 notify_before_breach_min: 15 medium: first_response_hours: 4 resolution_hours: 24 notify_before_breach_min: 30 low: first_response_hours: 8 resolution_hours: 72 notify_before_breach_hours: 2 # ═══════════════════════════════════════════════════
# КАНАЛЫ ПОДДЕРЖКИ
# ═══════════════════════════════════════════════════ channels: telegram: enabled: true priority: 1 email: enabled: false priority: 2 website_chat: enabled: false priority: 2 phone: enabled: false priority: 1 marketplace_chat: enabled: false priority: 2 # ═══════════════════════════════════════════════════
# ЭСКАЛАЦИЯ
# ═══════════════════════════════════════════════════ escalation: l2_manager: telegram: "@manager_username" phone: "+7XXXXXXXXXX" notify_method: "telegram" l3_director: telegram: "@director_username" phone: "+7XXXXXXXXXX" notify_method: "telegram" emergency_contact: "@director_username" escalation_rules: angry_client_to_l2: true legal_threat_to_l3: true vip_client_to_l2: true mass_incident_to_l3: true # ═══════════════════════════════════════════════════
# АВТОЭСКАЛАЦИЯ — ПРАВИЛА
# ═══════════════════════════════════════════════════ auto_escalation: sentiment_threshold_l2: -0.7 sentiment_threshold_l3: -0.9 max_bot_messages_before_l2: 5 return_amount_l2_rub: 5000 return_amount_l3_rub: 15000 vip_ltv_threshold_rub: 50000 repeat_issue_count: 2 legal_keywords: - "суд" - "прокуратура" - "роспотребнадзор" - "юрист" - "адвокат" - "иск" media_keywords: - "СМИ" - "журналист" - "напишу везде" - "отзыв опубликую" - "пресса" # ═══════════════════════════════════════════════════
# TONE-OF-VOICE
# ═══════════════════════════════════════════════════ tone: default: "дружелюбный деловой" on_negative_sentiment: "спокойный эмпатичный" on_vip: "персональный профессиональный" on_legal_threat: "нейтральный официальный" address_form: "вы" use_emoji: false response_length: "medium" # ═══════════════════════════════════════════════════
# ВОЗВРАТЫ
# ═══════════════════════════════════════════════════ returns: return_policy_days: 14 return_processing_days: "5-7 рабочих" auto_approve_return_under_rub: 1000 requires_reason_code: true # ═══════════════════════════════════════════════════
# CRM-ИНТЕГРАЦИЯ (опционально)
# ═══════════════════════════════════════════════════ crm: enabled: false type: "bitrix24" # bitrix24 / amocrm / hubspot / freshdesk / zendesk api_url: "" api_key: "" auto_create_ticket: true auto_update_client_card: true required_fields: - "client_id" - "ticket_category" - "priority" - "channel" - "status" # ═══════════════════════════════════════════════════
# КАЧЕСТВО И NPS/CSAT
# ═══════════════════════════════════════════════════ kpi: target_csat: 4.2 # Целевой CSAT (из 5) target_nps: 50 # Целевой NPS target_first_response_min: 30 # Целевое время первого ответа (мин) target_reopen_rate_percent: 5 # Целевой % повторных открытий тикета target_escalation_rate_percent: 20 # Целевой % эскалаций L1→L2 target_bot_resolution_percent: 60 # Целевой % решений без эскалации # ═══════════════════════════════════════════════════
# ОТЧЁТЫ
# ═══════════════════════════════════════════════════ reports: daily_report_time: "20:00" report_recipient: "@manager_username" weekly_report_day: "monday" monthly_report_day: 1 include_sla_breaches: true include_top_ticket_categories: true include_angry_clients: true include_nps_csat: true # ═══════════════════════════════════════════════════
# ПЛАН ВНЕДРЕНИЯ
# ═══════════════════════════════════════════════════ implementation: day_1: - "Заполнить business, support_team, channels, sla" - "Определить 5 основных типов обращений" - "Назначить ответственных L2 и L3" - "Настроить правила auto-escalation" week_1: - "Запустить категоризацию и SLA-контроль" - "Проверить angry client, refund, VIP и legal threat сценарии" - "Утвердить единый стандарт ответов" - "Запустить daily report" month_1: - "Собрать статистику по очередям и breach" - "Пересобрать слабые шаблоны ответов" - "Проверить нагрузку L2 и онбординг новых операторов" - "Запустить NPS/CSAT мониторинг" quarter_1: - "Довести SLA до устойчивого ритма" - "Снизить долю хаотичных эскалаций" - "Ускорить онбординг новых операторов" - "NPS стал инструментом управления, а не декорацией" # ═══════════════════════════════════════════════════
# ROI-МОДЕЛЬ
# ═══════════════════════════════════════════════════ roi_model: enabled: true product_cost_rub: 30000 formula: "senior_agents * hours_saved * hour_cost_rub + sla_improvement_value" # Экономия на рутине старших операторов senior_agents_count: 0 hours_per_day_on_routine: 1.5 # Часов в день на рутину (которую можно автоматизировать) avg_hour_cost_rub: 1500 # Стоимость часа оператора # Пример: 2 агента × 1.5 ч × 22 дня × 1500 руб = 99 000 руб/мес # ROI от снижения оттока через улучшение NPS monthly_churn_from_bad_support: 0 # Клиентов в месяц теряем из-за плохой поддержки avg_client_ltv_rub: 0 # Средний LTV клиента # Консервативная окупаемость payback_month: 1 # ═══════════════════════════════════════════════════
# ANTI-FAIL
# ═══════════════════════════════════════════════════ anti_fail: requires_real_sla: true requires_clean_ticket_data: true requires_named_l2_l3_owners: true requires_repeatable_categories: true requires_daily_report_discipline: true hard_limits: - "Не заменяет руководителя поддержки" - "Не работает если SLA формально есть, но не считается реально" - "Не исправляет хаотичные тикеты без категорий" - "Не снимает ответственность за политику сервиса" warning: > Если тикеты хаотичны, SLA не считается и owner'ы не назначены, качество выводов резко падает. Garbage in → garbage out. # ═══════════════════════════════════════════════════
# ФОРМАТ И ИНТЕРФЕЙС
# ═══════════════════════════════════════════════════ format: emoji: false tables: true progress_bars: false brief_mode: false report_style: "operational" # "operational" / "detailed" currency: "руб" language: "ru" # ═══════════════════════════════════════════════════
# ИНТЕГРАЦИИ (опционально)
# ═══════════════════════════════════════════════════ integrations: crm: enabled: false type: "" # bitrix24 / amocrm / hubspot webhook_url: "" helpdesk: enabled: false type: "" # freshdesk / zendesk / jira api_key: "" telegram_bot: enabled: false bot_token: "" group_id: "" analytics: enabled: false type: "" # amplitude / mixpanel / ga4
