# AI-Прораб PRO — Глубокая настройка контура управления объектом
# Заполняется под конкретный объект, команду и стандарты
# Поля с пометкой (опционально) можно пропустить на старте # ═══════════════════════════════════════════════════
# ПРОФИЛЬ РУКОВОДИТЕЛЯ
# ═══════════════════════════════════════════════════ leader: name: "Имя Отчество" role: "Прораб" # Прораб / Начальник участка / Технадзор / Собственник language_mode: "вы" # "ты" или "вы" timezone: "Europe/Moscow" # Стиль управления management_style: "прямой" # "прямой" / "партнёрский" / "жёсткий" decision_speed: "быстрая" # "медленная" / "средняя" / "быстрая" # ROI-привязка hour_cost_rub: 0 # Стоимость часа прораба в рублях hours_lost_per_week: 0 # Часов теряется на хаос и тушение пожаров # Зона перегруза overload_zone: "документы" # "документы" / "бригады" / "поставки" / "качество" / "сроки" overload_description: "" # "Исполнительная документация не ведётся в ритме объекта" # Количество объектов active_objects: 0 # Сколько объектов ведётся сейчас # Сильные стороны (опционально) strengths: - "" # "контроль качества", "переговоры с заказчиком", "скорость" # Зоны развития (опционально) growth_areas: - "" # "документация", "управление несколькими объектами" # ═══════════════════════════════════════════════════
# КОМПАНИЯ — ПРОФИЛЬ БИЗНЕСА
# ═══════════════════════════════════════════════════ company: name: "Название компании" legal_form: "ООО" company_type: "подрядчик" # "подрядчик" / "генподрядчик" / "заказчик" / "девелопер" main_work_type: "ремонт" # "ремонт" / "строительство" / "инженерные системы" / "отделка" geography: "Россия" timezone: "Europe/Moscow" # Финансовые параметры avg_project_value_rub: 0 # Средний бюджет объекта, руб avg_margin_percent: 0 # Средняя маржа, % rework_percent: 0 # Процент переделок от бюджета (целевой: <3%) incidents_per_month: 0 # Инцидентов по качеству/безопасности в месяц # ═══════════════════════════════════════════════════
# КВАЛИФИКАЦИЯ — КОМУ ПОДХОДИТ / НЕ ПОДХОДИТ
# ═══════════════════════════════════════════════════ qualification: icp: who: "прораб / начальник участка / подрядчик / техзаказчик" ideal_active_objects_from: 2 ideal_active_objects_to: 20 maturity_signals: - "есть объект и этапность" - "есть бригады и/или субподрядчики" - "нужны акты, журналы, приёмка" - "важно держать сроки и качество" disqualifiers: - "нет ответственного по объекту" - "нет этапов и сроков" - "не ведут документы вообще" - "игнорируют ТБ и входной контроль" # ═══════════════════════════════════════════════════
# ОБЪЕКТ — ТЕКУЩИЙ/ОСНОВНОЙ
# ═══════════════════════════════════════════════════ object: name: "Название объекта" type: "квартира" # квартира / дом / офис / коммерция / промышленность address: "" area_m2: 0 stage: "в работе" # "начало" / "в работе" / "финиш" deadline: "" # ГГГГ-ММ-ДД contract_value_rub: 0 # Стоимость по договору critical_path: "" # "Какой этап сейчас определяет срок сдачи" client_name: "" client_contact: "" # ═══════════════════════════════════════════════════
# КОМАНДА
# ═══════════════════════════════════════════════════ team: foreman: "ФИО прораба" brigade_size: 0 # Количество человек в основной бригаде crew_count: 0 # Всего бригад/субподрядчиков на объекте specialties: - "универсал" - "электрик" - "сантехник" - "плиточник" subcontractors: - name: "" type: "" # "электрика" / "сантехника" / "вентиляция" contact: "" performance_score: 0 # 1–5 оценка надёжности rule: "у каждого этапа и замечания должен быть owner" delegation_rules: mandatory_checkpoint: true default_checkpoint_gap_days: 2 require_acceptance_criteria: true # ═══════════════════════════════════════════════════
# СТАНДАРТ КАЧЕСТВА
# ═══════════════════════════════════════════════════ quality: standard: "улучшенная" # "эконом" / "улучшенная" / "высококачественная" / "элит" photo_report_required: true hidden_works_act_required: true acceptance_by_norms: true main_norms: - "СП 71.13330.2017 — Изоляционные и отделочные покрытия" - "СП 29.13330.2011 — Полы" - "СП 48.13330.2019 — Организация строительства" - "СП 63.13330.2018 — Бетонные и железобетонные конструкции" - "ПУЭ 7 — Правила устройства электроустановок" - "СП 30.13330.2020 — Внутренний водопровод и канализация" acceptance_criteria: # Допуски по основным видам работ (мм) plaster_deviation_mm: 3 # Отклонение штукатурки на 2 м рейке screed_deviation_mm: 4 # Неровность стяжки tile_joint_mm: 2 # Перепад плиточных швов drywall_level_mm: 2 # Вертикаль ГКЛ flooring_gap_mm: 1 # Зазор ламинат/паркет у стен # KPI качества rework_target_percent: 3 # Целевой процент переделок defect_per_acceptance_max: 5 # Максимум замечаний при сдаче этапа # ═══════════════════════════════════════════════════
# БЕЗОПАСНОСТЬ
# ═══════════════════════════════════════════════════ safety: daily_briefing_required: true ppe_required: true # СИЗ обязательны fire_extinguisher_required: true first_aid_required: true high_risk_rule: "работы повышенной опасности — только с нарядом-допуском и инструктажем" incident_tracking: true incidents_per_month: 0 # Текущий показатель incidents_target: 0 # Цель: 0 high_risk_types: - "работы на высоте >1.8 м" - "сварочные работы" - "работы в траншеях" - "монтаж конструкций под напряжением" # ═══════════════════════════════════════════════════
# ДОКУМЕНТАЦИЯ
# ═══════════════════════════════════════════════════ documentation: ks6a_journal: true # Журнал производства работ КС-6а tb_journal: true # Журнал инструктажей по ТБ incoming_control_journal: true # Журнал входного контроля executive_docs_required: true # Исполнительная документация as_built_required: true # Исполнительные схемы photo_archive: true # Фотоархив по этапам report_rule: "нет записи/акта — работа юридически и управленчески не существует" required_at_closing: - "Журнал производства работ КС-6а" - "Акты скрытых работ (все критичные этапы)" - "Акты освидетельствования ответственных конструкций" - "Исполнительные схемы" - "Журнал входного контроля" - "Журнал инструктажей по ТБ" # ═══════════════════════════════════════════════════
# ПОСТАВКИ И ВХОДНОЙ КОНТРОЛЬ
# ═══════════════════════════════════════════════════ supplies: primary_supplier: "" delivery_lead_days: 3 # Срок поставки по умолчанию, дней certificates_required: true # Сертификаты и паспорта качества single_lot_required: true # Однородная партия (особенно для плитки, ламината) input_control_required: true incoming_control_checklist: - "Соответствие спецификации (артикул, цвет, формат)" - "Паспорт качества / сертификат" - "Целостность упаковки" - "Визуальный контроль 10% партии" - "Однородность партии по артикулу и дате производства" acceptance_speed_days: 0 # Среднее время от сдачи до подписания акта # ═══════════════════════════════════════════════════
# БИЗНЕС-МЕТРИКИ
# ═══════════════════════════════════════════════════ business_metrics: # Ключевые KPI объекта active_objects: 0 # Объектов в работе crew_count: 0 # Бригад/субподрядчиков incidents_per_month: 0 # Инцидентов (ТБ + качество) в месяц rework_percent: 0 # Переделки, % от бюджета acceptance_speed_days: 0 # Дней от сдачи до подписания акта # Целевые значения target_rework_percent: 3 target_incidents_per_month: 0 target_acceptance_speed_days: 3 target_docs_completeness_percent: 100 # Еженедельные метрики weekly_kpi: - "Выполнение плана по этапам, %" - "Простои бригад (ч)" - "Задержки поставок (шт)" - "Замечания при приёмке (шт)" - "Несоблюдения ТБ (шт)" - "Акты скрытых работ (подписано за неделю)" # ═══════════════════════════════════════════════════
# ПЛАН ВНЕДРЕНИЯ
# ═══════════════════════════════════════════════════ implementation: day_1: - "Заполнить object, team, quality, safety" - "Запустить первый план дня: `план дня`" - "Настроить базовый журнал: `журнал`" - "Проверить входной контроль на текущих материалах" week_1: - "Запустить акты скрытых работ на текущих этапах" - "Настроить входной контроль для всех поставок" - "Первый недельный отчёт прораба: `отчёт прораба`" - "Гант по объекту: `гант`" month_1: - "Снизить число срывов по срокам" - "Собрать библиотеку чек-листов по этапам" - "Встроить документы в ежедневный ритм" - "Первая полная исполнительная документация" quarter_1: - "Перевести управление объектом в системный режим" - "Снизить rework_percent до целевого" - "Обеспечить закрытие объектов без документальных хвостов" - "Управлять несколькими объектами без хаоса" # ═══════════════════════════════════════════════════
# ROI-МОДЕЛЬ
# ═══════════════════════════════════════════════════ roi_model: enabled: true foreman_hour_cost_rub: 0 hours_saved_per_week_planning: 3 # Экономия на планировании hours_saved_per_week_docs: 4 # Экономия на документах rework_prevented_estimate_rub: 0 # Оценка предотвращённых переделок formula: "(hours_planning + hours_docs) * hour_cost * 4 + rework_prevented" example_payback: > 1 предотвращённая переделка на объекте 3 млн руб (типично 5% = 150 000 руб) Окупаемость: 30 000 / 150 000 = 0.2 объекта. # ═══════════════════════════════════════════════════
# ANTI-FAIL
# ═══════════════════════════════════════════════════ anti_fail: required_inputs: - "объект с этапами и сроками" - "бригада / субподрядчики" - "стандарт качества" - "ответственный прораб на площадке" hard_limits: - "не заменяет физическое присутствие прораба на площадке" - "не спасает без фиксации факта выполненных работ" - "не лечит игнорирование ТБ" - "не исправляет хаос без owner'ов по задачам" requires_responsible_foreman: true requires_stages_and_deadlines: true requires_photo_fixation: true warning: > Если прораб не выходит на площадку, факты работ не фиксируются, а документы ведутся «потом» — система покажет проблему, но не замаскирует её. Garbage in → garbage out: переделки и споры с заказчиком неизбежны. # ═══════════════════════════════════════════════════
# ФОРМАТ И ИНТЕРФЕЙС
# ═══════════════════════════════════════════════════ format: emoji: false tables: true show_norm_references: true # Ссылки на СП/ГОСТ при приёмке show_risk_level: true # Уровень риска (критичный / высокий / средний / низкий) currency: "руб" decimal_separator: "," thousands_separator: " " report_style: "operational" # "operational" / "executive" / "brief" daily_report_time: "17:00" # Время ежедневного отчёта прораба # ═══════════════════════════════════════════════════
# ИНТЕГРАЦИИ (опционально)
# ═══════════════════════════════════════════════════ integrations: photo_storage: enabled: false type: "" # google_drive / yandex_disk / telegram task_tracker: enabled: false type: "" # notion / trello / bitrix24 accounting: enabled: false type: "" # 1c / моёдело
