# AI-Монитор PRO — Глубокая настройка под инфраструктуру клиента
# Чем точнее заполнено — тем точнее работает система
#
# ОБЯЗАТЕЛЬНЫЕ поля (OBLIGATORY) — заполнить до первого запуска:
# leader.name, leader.role, company.name, company.hourly_revenue_rub, servers[0]
# Остальные поля — опциональные, пропустить на старте. # ═══════════════════════════════════════════════════
# ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ
# ═══════════════════════════════════════════════════ leader: name: "Имя Отчество" # [OBLIGATORY] Ваше имя role: "CTO" # [OBLIGATORY] CTO / Директор стройки / Прораб / DevOps Lead language_mode: "вы" # "ты" или "вы" telegram_id: "" timezone: "Europe/Moscow" # Стиль управления management_style: "аналитический" # "прямой" / "аналитический" / "процессный" decision_speed: "быстрая" # Зона перегруза overload_zone: "инциденты" # "инциденты" / "алерты" / "capacity" / "on-call" overload_description: "" # "on-call выгорает, каждый раз разбираем с нуля" # ROI-привязка hour_cost_rub: 0 # Стоимость часа CTO/SRE hours_lost_per_week: 0 # Часов в неделю теряется на инциденты и alert-шум # ═══════════════════════════════════════════════════
# КОМПАНИЯ — ПРОФИЛЬ ИНФРАСТРУКТУРЫ
# ═══════════════════════════════════════════════════ company: name: "Название проекта/компании" # [OBLIGATORY] название компании или объекта legal_form: "ООО" industry: "SaaS" # SaaS / eCommerce / Marketplace / FinTech / EdTech / Healthtech business_model: "SaaS" # "SaaS" / "ecommerce" / "marketplace" / "platform" / "enterprise" geography: "Россия" timezone: "Europe/Moscow" # Стадия бизнеса stage: "growth" # "early" / "growth" / "mature" monthly_revenue_rub: 0 # Инфраструктурные параметры app_type: "SaaS" # "SaaS" / "eCommerce" / "Marketplace" / "Internal Platform" rps_current: 0 # Текущий RPS в prod rps_peak: 0 # Пиковый RPS users_dau: 0 # Ежедневных активных пользователей hourly_revenue_rub: 0 # [OBLIGATORY] Выручка в час — основа для расчёта цены простоя # ═══════════════════════════════════════════════════
# КВАЛИФИКАЦИЯ — КОМУ ПОДХОДИТ / НЕ ПОДХОДИТ
# ═══════════════════════════════════════════════════ qualification: min_servers: 3 min_critical_services: 5 requires_sla: true requires_cost_of_downtime: true not_for: - "Один сервер без заметной нагрузки" - "Проект без продакшн-контуров" - "Команда без готовности вести playbook и post-mortem" - "Инфраструктура без SLA и бизнес-метрик" # ═══════════════════════════════════════════════════
# ФИНАНСЫ
# ═══════════════════════════════════════════════════ finance: current_monthly_revenue: 0 monthly_revenue_target: 0 gross_margin_percent: 0 infra_budget_rub_per_month: 0 # Текущий бюджет на инфраструктуру # ═══════════════════════════════════════════════════
# МЕТРИКИ МОНИТОРИНГА — КЛЮЧЕВЫЕ KPI
# ═══════════════════════════════════════════════════ business_metrics: # Главная метрика north_star_metric: "MTTR" # Mean Time To Recovery north_star_current: 60 # минут — текущее время восстановления north_star_target: 15 # минут — целевое время восстановления # Специфичные метрики AI-Монитора active_alerts: 0 # Текущее количество активных алертов mttr_minutes: 60 # Среднее время восстановления (минуты) — было sla_target_percent: 99.9 # Целевой SLA uptime (%) incidents_per_month: 0 # Среднее число инцидентов в месяц capacity_headroom_percent: 0 # Запас мощности (% до насыщения ресурсов) alert_noise_ratio: 0 # Доля «шумных» алертов без action # Ежедневные метрики daily_metrics: - name: "Активные алерты" unit: "шт" target: 0 source: "мониторинг" - name: "SLA буфер" unit: "%" target: 0 source: "SLA-контур" - name: "Инциденты за сутки" unit: "шт" target: 0 source: "журнал инцидентов" - name: "Стоимость простоя сегодня" unit: "руб" target: 0 source: "расчёт" # KPI для weekly review weekly_kpi: - "Количество инцидентов" - "Средний MTTR" - "SLA compliance %" - "Alert noise ratio" - "Количество post-mortem" - "Capacity headroom %" - "Стоимость простоя за неделю" # ═══════════════════════════════════════════════════
# OWNERSHIP — ОТВЕТСТВЕННОСТЬ
# ═══════════════════════════════════════════════════ ownership: cto_name: "Имя CTO" devops_lead_name: "Имя DevOps Lead" ceo_visibility_required: true incident_commander_role: "CTO / DevOps Lead" postmortem_owner: "CTO" # ═══════════════════════════════════════════════════
# СЕРВЕРЫ
# ═══════════════════════════════════════════════════ servers: - id: prod-01 hostname: "prod-01.example.com" ip: "x.x.x.x" role: "app" # "app" / "db" / "cache" / "lb" / "worker" provider: "Hetzner" specs: cpu_cores: 4 ram_gb: 16 disk_gb: 200 sla_weight: 100 # Вес в общем SLA (0-100) business_criticality: "critical" # "critical" / "high" / "medium" / "low" - id: db-primary hostname: "db-01.example.com" ip: "x.x.x.x" role: "db" provider: "Hetzner" specs: cpu_cores: 8 ram_gb: 32 disk_gb: 500 sla_weight: 100 business_criticality: "critical" # ═══════════════════════════════════════════════════
# СЕРВИСЫ
# ═══════════════════════════════════════════════════ services: - id: api-gateway name: "API Gateway" url: "https://api.example.com/health" server: prod-01 critical: true business_impact: "high" # "high" / "medium" / "low" revenue_dependency: "direct" # "direct" / "indirect" / "none" - id: payment-service name: "Платёжный сервис" url: "" server: prod-01 critical: true business_impact: "high" revenue_dependency: "direct" - id: auth-service name: "Авторизация" url: "" server: prod-01 critical: true business_impact: "high" revenue_dependency: "indirect" - id: postgresql name: "База данных" url: "" server: db-primary critical: true business_impact: "high" revenue_dependency: "direct" # ═══════════════════════════════════════════════════
# ПОРОГИ АЛЕРТОВ
# ═══════════════════════════════════════════════════ thresholds: defaults: cpu_warning: 80 cpu_critical: 95 ram_warning: 85 ram_critical: 95 disk_warning: 90 disk_critical: 95 response_time_warning_ms: 1000 response_time_critical_ms: 2000 error_rate_warning_percent: 1.0 error_rate_critical_percent: 5.0 ssl_expiry_warning_days: 30 ssl_expiry_critical_days: 7 db_connections_warning_percent: 70 db_connections_critical_percent: 90 overrides: {} # Переопределение для конкретных сервисов # ═══════════════════════════════════════════════════
# SLA
# ═══════════════════════════════════════════════════ sla: default_target: 99.9 # % uptime (99.9% = ~43 мин простоя в месяц) measurement_period: monthly alert_at_buffer_percent: 70 # Предупреждение при использовании 70% SLA-буфера ceo_alert_on_breach: true # Примеры бюджета простоя # 99.9% в месяц = 43.8 минуты # 99.5% в месяц = 219 минут (3.6 часа) # ═══════════════════════════════════════════════════
# БИЗНЕС-ВЛИЯНИЕ
# ═══════════════════════════════════════════════════ business_impact: cost_of_1h_major_downtime_rub: 0 # Стоимость 1 часа полного простоя cost_of_1h_partial_downtime_rub: 0 # Стоимость 1 часа частичной деградации critical_services_weight: api-gateway: 100 payment-service: 100 auth-service: 80 postgresql: 100 ceo_report_needs_money_language: true include_reputational_risk: true # ═══════════════════════════════════════════════════
# ЭСКАЛАЦИЯ
# ═══════════════════════════════════════════════════ escalation: critical: - role: "CTO" telegram: "@username" email: "cto@example.com" phone: "+7XXXXXXXXXX" - role: "DevOps Lead" telegram: "@username" phone: "+7XXXXXXXXXX" high: - role: "DevOps Lead" telegram: "@username" medium: - role: "Dev Team" telegram: "@team_channel" sla_breach: - role: "CTO" telegram: "@username" - role: "CEO" telegram: "@username" # ═══════════════════════════════════════════════════
# ОТЧЁТЫ
# ═══════════════════════════════════════════════════ reports: morning_briefing: enabled: false time: "08:00" recipients: ["CTO", "DevOps Lead"] evening_summary: enabled: false time: "19:00" recipients: ["CTO"] weekly_ceo: enabled: false day: "пятница" time: "17:00" recipients: ["CEO", "CTO"] include_cost_of_downtime: true include_top_risks: true include_capacity_forecast: true # ═══════════════════════════════════════════════════
# CAPACITY PLANNING
# ═══════════════════════════════════════════════════ capacity: alert_days_until_90: 90 # Предупреждение за N дней до достижения 90% ресурсов expected_growth_percent: 10 # Ожидаемый рост нагрузки в %/мес budget_owner: "CTO" infra_budget_rub_per_month: 0 planning_horizons: short_term_weeks: 4 mid_term_months: 3 long_term_months: 12 # ═══════════════════════════════════════════════════
# POST-MORTEM
# ═══════════════════════════════════════════════════ postmortem: required_for: ["critical", "high"] deadline_hours: 48 storage: "файл" storage_path: "memory/postmortems/" action_items_required: true review_in_days: 30 # Ревью выполнения action items через N дней template: sections: - "timeline" - "root_cause" - "5_whys" - "business_impact" - "action_items" - "owners_and_deadlines" # ═══════════════════════════════════════════════════
# ПЛАН ВНЕДРЕНИЯ
# ═══════════════════════════════════════════════════ implementation: day_1: - "Зафиксировать критичные сервисы и ownership" - "Назначить эскалацию по severity" - "Определить baseline стоимости простоя" - "Привязать сервисы к бизнес-влиянию" week_1: - "Настроить пороги алертов под реальные паттерны" - "Протестировать 3 типовых playbook" - "Запустить daily briefing для техкоманды" - "Утвердить формат CEO-отчёта" month_1: - "Собрать статистику по алертам и инцидентам" - "Пересобрать шумные алерты" - "Закрепить post-mortem дисциплину" - "Оценить capacity headroom" quarter_1: - "Перейти от реактивного реагирования к предсказуемому контролю" - "Снизить долю хаотичных реакций на сбои" - "Довести MTTR с 60 до 15 минут" - "Capacity planning = основание бюджета, а не догадка" # ═══════════════════════════════════════════════════
# ROI-МОДЕЛЬ
# ═══════════════════════════════════════════════════ roi_model: enabled: true product_cost_rub: 30000 formula: "incidents_prevented * cost_per_incident + mttr_saved_hours * hourly_cost" # Прямая экономия на инцидентах incidents_per_month: 0 avg_incident_cost_rub: 0 # Средняя стоимость инцидента (простой + время команды) target_incident_reduction_percent: 30 # Экономия на MTTR current_mttr_minutes: 60 target_mttr_minutes: 15 mttr_saved_minutes: 45 engineer_hour_cost_rub: 0 # Экономия на alert fatigue engineers_on_call: 0 hours_lost_to_noise_per_week: 0 # ═══════════════════════════════════════════════════
# ANTI-FAIL
# ═══════════════════════════════════════════════════ anti_fail: requires_defined_criticality: true requires_named_owners: true requires_cost_of_downtime: true requires_postmortem_discipline: true requires_sla_definition: true hard_limits: - "Не заменяет инженерную зрелость команды" - "Не чинит слабую архитектуру" - "Не работает без определённой стоимости простоя" - "Не даёт результата без post-mortem дисциплины" warning: > Если карта критичности, ownership и стоимость простоя не определены, сильного операционного контура не получится. Garbage in → garbage out. # ═══════════════════════════════════════════════════
# ФОРМАТ И ИНТЕРФЕЙС
# ═══════════════════════════════════════════════════ format: emoji: false tables: true progress_bars: true brief_mode: false report_style: "executive" # "executive" / "technical" currency: "руб" language: "ru" include_severity_icons: true # ═══════════════════════════════════════════════════
# ИНТЕГРАЦИИ (опционально)
# ═══════════════════════════════════════════════════ integrations: prometheus: enabled: false url: "" grafana: enabled: false url: "" api_key: "" pagerduty: enabled: false api_key: "" slack: enabled: false channel: "#incidents" webhook_url: "" telegram: enabled: false bot_token: "" chat_id: ""
