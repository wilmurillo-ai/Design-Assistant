# AI-офис PRO — Глубокая настройка под бизнес клиента
# Чем точнее заполнено — тем точнее работает система
# Поля с пометкой (опционально) можно пропустить на старте # ═══════════════════════════════════════════════════
# ПРОФИЛЬ РУКОВОДИТЕЛЯ
# ═══════════════════════════════════════════════════ leader: name: "Имя Отчество" role: "CEO" # CEO / Собственник / Управляющий директор / Партнёр language_mode: "вы" # "ты" или "вы" telegram_id: "" timezone: "Europe/Moscow" # Стиль управления — влияет на тон рекомендаций management_style: "прямой" # "прямой" / "партнёрский" / "жёсткий" / "аналитический" / "коучинговый" decision_speed: "быстрая" # "медленная" / "средняя" / "быстрая" planning_horizon: "quarter" # "week" / "month" / "quarter" / "year" # Зона перегруза — что отнимает больше всего энергии CEO overload_zone: "операционка" # "операционка" / "продажи" / "команда" / "финансы" / "продукт" overload_description: "" # Пример: "80% времени уходит на тушение пожаров" # ROI-привязка hour_cost_rub: 0 # Стоимость часа CEO в рублях (для расчёта ROI) hours_lost_per_week: 0 # Сколько часов в неделю теряется на хаос # Сильные стороны CEO (опционально) strengths: - "" # "переговоры", "стратегическое мышление", "продукт" # Зоны развития (опционально, для честных рекомендаций) growth_areas: - "" # "делегирование", "финансовый контроль", "найм" # ═══════════════════════════════════════════════════
# КОМПАНИЯ — ПРОФИЛЬ БИЗНЕСА
# ═══════════════════════════════════════════════════ company: name: "Название компании" legal_form: "ООО" # ООО / ИП / АО / другое industry: "Отрасль" # IT / Розница / Услуги / Производство / HoReCa / EdTech business_model: "услуги" # "услуги" / "продукт" / "SaaS" / "marketplace" / "производство" / "розница" / "подписка" geography: "Россия" timezone: "Europe/Moscow" # Стадия бизнеса — влияет на приоритеты и рекомендации stage: "growth" # "launch" / "early" / "growth" / "mature" / "transformation" founded_year: "" # (опционально) # Продуктовые линейки product_lines: - name: "" # Пример: "Разработка на заказ" share_of_revenue: "" # Пример: "70%" # ═══════════════════════════════════════════════════
# КВАЛИФИКАЦИЯ — КОМУ ПОДХОДИТ / НЕ ПОДХОДИТ
# ═══════════════════════════════════════════════════ qualification: ideal_revenue_from_rub: 5000000 ideal_revenue_to_rub: 50000000 min_team_size: 5 max_team_size: 50 requires_kpi: true requires_owners: true not_for: - "Фриланс без команды" - "Стартап без выручки и процессов" - "Роль без полномочий по людям, деньгам и целям" # ═══════════════════════════════════════════════════
# ФИНАНСЫ
# ═══════════════════════════════════════════════════ finance: current_monthly_revenue: 0 monthly_revenue_target: 0 daily_revenue_target: 0 # обычно месяч/22 gross_margin_percent: 0 net_margin_percent: 0 # (опционально) last_year_annual_revenue: 0 # (опционально) cash_runway_months: 0 # (опционально) # ═══════════════════════════════════════════════════
# БИЗНЕС-МЕТРИКИ — НАСТРОЙКА KPI
# ═══════════════════════════════════════════════════ business_metrics: # Главная метрика бизнеса north_star_metric: "" # "MRR", "Кол-во активных клиентов", "Средний чек" north_star_current: 0 north_star_target: 0 # Ежедневные метрики для брифинга daily_metrics: - name: "Выручка" unit: "руб" target: 0 source: "" # "ручной ввод" / "CRM" / "1C" / "Битрикс24" - name: "Новые лиды" unit: "шт" target: 0 source: "ручной ввод" - name: "Конверсия в оплату" unit: "%" target: 0 source: "ручной ввод" # Метрики для weekly review weekly_kpi: - "Выручка за неделю" - "Новые клиенты" - "Средний чек" - "Конверсия воронки" - "Маржа" - "Дебиторка" - "NPS / Удовлетворённость" # ═══════════════════════════════════════════════════
# ОРГСТРУКТУРА И КОМАНДА
# ═══════════════════════════════════════════════════ organization: total_headcount: 0 org_structure: "линейная" # "линейная" / "функциональная" / "матричная" # Отделы departments: - name: "Продажи" head: "" headcount: 0 - name: "Маркетинг" head: "" headcount: 0 - name: "Производство / Разработка" head: "" headcount: 0 - name: "Операции" head: "" headcount: 0 - name: "Финансы / Бухгалтерия" head: "" headcount: 0 # Прямые подчинённые CEO direct_reports: - name: "" role: "" # Открытые вакансии open_positions: - role: "" priority: "" # "критично" / "важно" / "желательно" # Ритм встреч meeting_rhythm: daily_standup: false weekly_team: "" # "понедельник 10:00" weekly_one_on_ones: false monthly_all_hands: false quarterly_strategy: "" # Дата ближайшей стратсессии # ═══════════════════════════════════════════════════
# СТРАТЕГИЯ И ЦЕЛИ
# ═══════════════════════════════════════════════════ strategy: annual_goal: "" # "Выйти на 50 млн/мес и запустить SaaS-продукт" quarterly_goals: - "" - "" - "" # Текущие узкие места (bottlenecks) bottlenecks: - "" # "Продажи зависят от одного менеджера" - "" # "CEO замыкает на себе все решения по ценам" - "" # "Нет системы онбординга — новый сотрудник учится 3 месяца" competitive_advantage: "" # "Скорость доставки 2 часа в Москве" main_threat: "" # "Конкурент X поднял $5M и демпингует на 30%" # ═══════════════════════════════════════════════════
# КОМАНДА — ДЛЯ ДЕЛЕГИРОВАНИЯ
# ═══════════════════════════════════════════════════ team: members: - name: "Имя Фамилия" role: "Должность" department: "Отдел" telegram: "@username" strengths: - "продажи" - "переговоры" maturity_level: "middle" # "junior" / "middle" / "senior" / "lead" autonomy_level: 3 # 1-5 (по шкале режима делегирования) delegation_rules: mandatory_checkpoints: true default_checkpoint_gap_days: 2 require_acceptance_criteria: true require_named_owner: true # ═══════════════════════════════════════════════════
# OKR — НАСТРОЙКА СИСТЕМЫ ЦЕЛЕЙ
# ═══════════════════════════════════════════════════ okr: current_quarter: "Q2-2026" quarter_start: "2026-04-01" quarter_end: "2026-06-30" quarter_theme: "" # "Собрать систему управления и убрать перегруз CEO" max_objectives: 3 max_key_results_per_objective: 4 success_threshold_percent: 70 # по Doerr: 70% = успех, 100% = цель слабая weekly_tracking_day: "пятница" lag_alert_percent: 15 # предупреждение при отставании > N% # ═══════════════════════════════════════════════════
# РАСПИСАНИЕ И РИТМ
# ═══════════════════════════════════════════════════ rhythm: morning_briefing: enabled: true time: "09:00" days: ["пн", "вт", "ср", "чт", "пт"] weekly_review: enabled: true day: "пятница" time: "17:00" okr_tracking: enabled: true day: "пятница" time: "16:00" delegation_reminders: enabled: true time: "10:00" decision_review: enabled: true remind_days_before: 3 strategy_session: enabled: true frequency: "quarterly" reminder_days_before: 7 # ═══════════════════════════════════════════════════
# ПЛАН ВНЕДРЕНИЯ
# ═══════════════════════════════════════════════════ implementation: day_1: - "Заполнить company, leader, business_metrics" - "Определить 3 главные боли CEO" - "Провести стратегическую сессию" - "Первый брифинг" week_1: - "Запустить утренний брифинг ежедневно" - "Провести первое weekly review" - "Завести минимум 3 записи в decision log" - "Прогнать 3 задачи через делегирование" month_1: - "Проверить KPI-ритм" - "Проверить качество делегирования по checkpoint" - "Отсечь ручные действия CEO без необходимости" - "Первые ревью решений из Decision Log" # ═══════════════════════════════════════════════════
# DECISION LOG — НАСТРОЙКИ
# ═══════════════════════════════════════════════════ decision_log: mandatory_documentation_above_rub: 50000 review_schedule_days: small: 30 medium: 60 major: 90 categories: - "Найм и команда" - "Продукт и разработка" - "Продажи и маркетинг" - "Финансы и инвестиции" - "Операции и процессы" - "Стратегия и партнёрства" # ═══════════════════════════════════════════════════
# ROI-МОДЕЛЬ
# ═══════════════════════════════════════════════════ roi_model: enabled: true ceo_hour_cost_rub: 0 # = leader.hour_cost_rub target_hours_saved_per_week: 6 target_monthly_value_rub: 0 # = ceo_hour_cost_rub * hours_saved * 4 formula: "ceo_hour_cost_rub * target_hours_saved_per_week * 4" # ═══════════════════════════════════════════════════
# МАТРИЦА ЭЙЗЕНХАУЭРА
# ═══════════════════════════════════════════════════ eisenhower: urgent_keywords: - "сегодня" - "срочно" - "горит" - "дедлайн" - "клиент ждёт" - "оплата" - "кризис" important_keywords: - "OKR" - "стратегия" - "ключевой клиент" - "команда" - "инвестор" - "запуск" - "партнёрство" auto_suggest_delegation: true # ═══════════════════════════════════════════════════
# INVESTOR UPDATE
# ═══════════════════════════════════════════════════ reporting: investor_update_frequency: "quarterly" has_board: false board_meeting_frequency: "" report_recipients: - name: "" role: "Инвестор" email: "" compare_with_previous: true # ═══════════════════════════════════════════════════
# ANTI-FAIL
# ═══════════════════════════════════════════════════ anti_fail: requires_clean_data: true requires_weekly_review: true requires_real_kpi: true requires_named_owners: true warning: "Если KPI фиктивны или owner'ы не определены, качество выводов резко падает." # ═══════════════════════════════════════════════════
# ФОРМАТ И ИНТЕРФЕЙС
# ═══════════════════════════════════════════════════ format: emoji: false tables: true progress_bars: true brief_mode: false report_style: "executive" # "executive" / "detailed" currency: "руб" decimal_separator: "," thousands_separator: " " # ═══════════════════════════════════════════════════
# ИНТЕГРАЦИИ (опционально)
# ═══════════════════════════════════════════════════ integrations: crm: enabled: false type: "" # bitrix24 / amocrm / hubspot webhook_url: "" analytics: enabled: false type: "" calendar: enabled: false type: "" accounting: enabled: false type: "" # 1c / moedelo
