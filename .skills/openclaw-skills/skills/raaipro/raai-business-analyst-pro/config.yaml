# AI-Аналитик бизнеса PRO — Глубокая настройка аналитического контура
# Чем точнее заполнено — тем точнее работает система
# [OBLIGATORY] — 5 обязательных полей при первом запуске (5 минут)
# Поля без пометки (опционально) можно пропустить на старте # ═══════════════════════════════════════════════════
# ПРОФИЛЬ РУКОВОДИТЕЛЯ
# ═══════════════════════════════════════════════════ leader: name: "Имя Отчество" role: "CEO" # CEO / Собственник / CFO / Коммерческий директор language_mode: "вы" # "ты" или "вы" timezone: "Europe/Moscow" # Стиль управления — влияет на формат аналитики management_style: "аналитический" # "прямой" / "партнёрский" / "жёсткий" / "аналитический" decision_speed: "средняя" # "медленная" / "средняя" / "быстрая" planning_horizon: "quarter" # "week" / "month" / "quarter" / "year" # Зона перегруза overload_zone: "финансы" # "операционка" / "продажи" / "команда" / "финансы" / "продукт" overload_description: "" # "Нет ясной картины по марже и cash flow" # ROI-привязка hour_cost_rub: 0 # Стоимость часа CEO/CFO в рублях hours_lost_per_week: 0 # Часов теряется на ручную аналитику # Сильные стороны (опционально) strengths: - "" # "продажи", "переговоры", "стратегия" # Зоны развития (опционально) growth_areas: - "" # "финансовый контроль", "unit-экономика", "прогнозирование" # ═══════════════════════════════════════════════════
# КОМПАНИЯ — ПРОФИЛЬ БИЗНЕСА
# ═══════════════════════════════════════════════════ company: name: "Название компании" legal_form: "ООО" # ООО / ИП / АО industry: "Отрасль" # IT / Розница / Услуги / EdTech / SaaS / HoReCa / Производство business_model: "услуги" # "услуги" / "продукт" / "SaaS" / "marketplace" / "подписка" / "гибрид" geography: "Россия" timezone: "Europe/Moscow" # Стадия бизнеса stage: "growth" # "launch" / "early" / "growth" / "mature" / "transformation" founded_year: "" # (опционально) # Продуктовые линейки product_lines: - name: "" # Пример: "Подписка PRO" share_of_revenue: "" # "60%" - name: "" share_of_revenue: "" # ═══════════════════════════════════════════════════
# КВАЛИФИКАЦИЯ — КОМУ ПОДХОДИТ / НЕ ПОДХОДИТ
# ═══════════════════════════════════════════════════ qualification: ideal_revenue_from_rub: 5000000 ideal_revenue_to_rub: 100000000 min_team_size: 3 max_team_size: 200 requires_regular_revenue: true requires_cost_tracking: true requires_product_structure: true requires_owner_for_metrics: true not_for: - "Проект без регулярной выручки" - "Бизнес без учёта расходов" - "Команда без ответственного за цифры" - "Тот, кто хочет красивые отчёты вместо правды" # ═══════════════════════════════════════════════════
# ФИНАНСЫ — КЛЮЧЕВЫЕ ПОКАЗАТЕЛИ
# ═══════════════════════════════════════════════════ finance: current_monthly_revenue: 0 # Текущая выручка, руб/мес monthly_revenue_target: 0 # Плановая выручка, руб/мес daily_revenue_target: 0 # обычно месяч/22 gross_margin_percent: 0 # Валовая маржа, % ebitda_margin_percent: 0 # EBITDA маржа, % (опционально) net_margin_percent: 0 # Чистая маржа, % (опционально) last_year_annual_revenue: 0 # Годовая выручка прошлого года (опционально) cash_runway_months: 0 # Запас денег в месяцах (опционально) monthly_fixed_costs: 0 # Постоянные расходы, руб/мес monthly_variable_costs_percent: 0 # Переменные расходы, % от выручки # ═══════════════════════════════════════════════════
# БИЗНЕС-МЕТРИКИ — НАСТРОЙКА KPI
# ═══════════════════════════════════════════════════ business_metrics: # Главная метрика бизнеса north_star_metric: "" # "MRR", "Кол-во клиентов", "Средний чек", "ARPU" north_star_current: 0 north_star_target: 0 # Финансовые KPI (специфика BA-pro) gross_margin_norm: 0.55 # Норма валовой маржи ebitda_margin_norm: 0.20 # Норма EBITDA маржи net_margin_norm: 0.12 # Норма чистой маржи # Unit-экономика cac_current: 0 # Текущий CAC, руб cac_target: 0 # Целевой CAC, руб ltv_current: 0 # Текущий LTV, руб ltv_cac_ratio_healthy: 3.0 # Здоровое соотношение LTV/CAC ltv_cac_ratio_warning: 1.5 # Предупреждение при LTV/CAC ниже payback_period_months: 0 # Текущий payback, мес payback_months_max: 6 # Максимально допустимый payback # Retention и churn churn_rate_current: 0 # Текущий churn, % churn_rate_b2b_max: 0.03 # Максимально допустимый churn B2B churn_rate_b2c_max: 0.07 # Максимально допустимый churn B2C retention_m1_norm: 0.80 # Retention через 1 мес retention_m3_norm: 0.65 # Retention через 3 мес retention_m6_norm: 0.55 # Retention через 6 мес retention_m12_norm: 0.45 # Retention через 12 мес # Выручка по продуктам revenue_by_product: - product: "" monthly_revenue: 0 margin_percent: 0 # Ежедневные метрики для дашборда daily_metrics: - name: "Выручка" unit: "руб" target: 0 source: "ручной ввод" - name: "Новые клиенты" unit: "шт" target: 0 source: "CRM" - name: "Конверсия в оплату" unit: "%" target: 0 source: "ручной ввод" - name: "Средний чек" unit: "руб" target: 0 source: "CRM" # KPI для weekly review weekly_kpi: - "Выручка за неделю" - "Новые клиенты" - "Средний чек" - "Конверсия воронки" - "Gross margin %" - "CAC" - "Churn rate" - "Cash runway" - "Дебиторская задолженность" # ═══════════════════════════════════════════════════
# ВОРОНКА ПРОДАЖ
# ═══════════════════════════════════════════════════ funnel: stages: - name: "Лиды" monthly_volume: 0 conversion_to_next: 0 # % - name: "Квалификация" monthly_volume: 0 conversion_to_next: 0 - name: "Переговоры" monthly_volume: 0 conversion_to_next: 0 - name: "КП/Оффер" monthly_volume: 0 conversion_to_next: 0 - name: "Оплата" monthly_volume: 0 conversion_to_next: 0 bottleneck_stage: "" # На каком этапе теряем больше всего avg_deal_cycle_days: 0 # Средний цикл сделки # ═══════════════════════════════════════════════════
# ПРОДУКТЫ И КАНАЛЫ
# ═══════════════════════════════════════════════════ products: - name: "Продукт 1" price: 0 variable_cost: 0 category: "subscription" # subscription / one-time / service margin_target_percent: 60 monthly_sales_volume: 0 - name: "Продукт 2" price: 0 variable_cost: 0 category: "one-time" margin_target_percent: 55 monthly_sales_volume: 0 channels: - name: "Telegram / SMM" monthly_budget: 0 target_leads: 0 current_cac: 0 - name: "Контекстная реклама" monthly_budget: 0 target_leads: 0 current_cac: 0 - name: "Рекомендации / сарафан" monthly_budget: 0 target_leads: 0 current_cac: 0 # ═══════════════════════════════════════════════════
# РАСХОДЫ
# ═══════════════════════════════════════════════════ fixed_costs: salaries_fixed: 0 # ФОТ фиксированный rent_and_office: 0 servers_and_infra: 0 ai_and_saas: 0 marketing_fixed: 0 other_fixed: 0 variable_cost_items: - name: "Комиссии с продаж" percent_of_revenue: 0 - name: "Платёжные системы" percent_of_revenue: 0 - name: "Прочие переменные" percent_of_revenue: 0 # ═══════════════════════════════════════════════════
# СТРАТЕГИЯ И ЦЕЛИ
# ═══════════════════════════════════════════════════ strategy: annual_goal: "" # "Выйти на 50 млн/мес и улучшить gross margin до 65%" quarterly_goals: - "" # Q2: Поднять LTV/CAC до 3.5 - "" # Q3: Снизить churn до 2% - "" bottlenecks: - "" # "Не знаем CAC по каналам" - "" # "Маржа считается только раз в квартал" - "" # "Cash flow не прогнозируем" competitive_advantage: "" main_threat: "" # ═══════════════════════════════════════════════════
# ПЛАН ВНЕДРЕНИЯ
# ═══════════════════════════════════════════════════ implementation: day_1: - "Заполнить company, leader, finance, business_metrics" - "Определить 5 главных метрик бизнеса" - "Запустить дашборд: команда `дашборд`" - "Проверить KPI-панель: команда `покажи KPI`" week_1: - "Построить unit-экономику по продуктам и каналам" - "Разобрать воронку продаж по этапам" - "Сверить план/факт за последние 4 недели" - "Утвердить формат прогноза" month_1: - "Собрать отклонения и аномалии за месяц" - "Выявить где бизнес реально теряет деньги" - "Пересобрать слабые KPI и пороги" - "Построить финмодель на квартал" quarter_1: - "Довести аналитический контур до устойчивого ритма" - "Снизить число решений, принятых без данных" - "Investor-ready отчёт на реальных данных" - "Связать стратегию роста с экономикой" # ═══════════════════════════════════════════════════
# ROI-МОДЕЛЬ
# ═══════════════════════════════════════════════════ roi_model: enabled: true ceo_hour_cost_rub: 0 # = leader.hour_cost_rub hours_saved_per_week_analytics: 5 # Экономия на ручной аналитике hours_saved_per_week_meetings: 2 # Экономия на «цифровых» разборах target_monthly_value_rub: 0 # = ceo_hour_cost_rub * hours_saved * 4 error_prevention_estimate_rub: 200000 # Консервативная оценка предотвращённых ошибок/квартал formula: "ceo_hour_cost_rub * (hours_analytics + hours_meetings) * 4 + error_prevention / 3" # Типичный ROI: 11–100x за первый квартал # ═══════════════════════════════════════════════════
# НАСТРОЙКИ ПРОГНОЗА
# ═══════════════════════════════════════════════════ forecast: method: "linear" # "linear" / "exponential" / "seasonal" alpha: 0.3 # Коэффициент сглаживания scenarios: optimistic_growth_percent: 20 base_growth_percent: 10 pessimistic_growth_percent: -5 horizon_months: 3 show_confidence_intervals: true # ═══════════════════════════════════════════════════
# НАСТРОЙКИ ОТЧЁТНОСТИ
# ═══════════════════════════════════════════════════ reporting: compare_with: "previous_month" show_formulas: true ceo_report_style: "executive" # "executive" / "detailed" investor_report_style: "board-ready" has_investors: false investor_reporting_frequency: "quarterly" report_recipients: - name: "" role: "Инвестор" email: "" # ═══════════════════════════════════════════════════
# KPI-ПОРОГИ И СВЕТОФОР
# ═══════════════════════════════════════════════════ kpi_thresholds: green: 0.90 # ≥90% от плана — зелёный yellow: 0.70 # 70–89% — жёлтый red: 0.70 # <70% — красный anomaly_threshold: 0.20 # Отклонение >20% = аномалия # ═══════════════════════════════════════════════════
# ANTI-FAIL
# ═══════════════════════════════════════════════════ anti_fail: requires_clean_data: true requires_full_cost_tracking: true requires_product_and_channel_structure: true requires_metrics_owner: true requires_regular_data_input: true warning: > Если данные грязные, расходы частичные и никто не отвечает за цифры — система выдаст шаблоны, а не управленческую аналитику. Garbage in → garbage out. Честные данные = честная картина. # ═══════════════════════════════════════════════════
# ФОРМАТ И ИНТЕРФЕЙС
# ═══════════════════════════════════════════════════ format: emoji: false tables: true progress_bars: true brief_mode: false report_style: "executive" # "executive" / "detailed" currency: "руб" decimal_separator: "," thousands_separator: " " show_benchmarks: true # Показывать отраслевые бенчмарки # ═══════════════════════════════════════════════════
# ИНТЕГРАЦИИ (опционально)
# ═══════════════════════════════════════════════════ integrations: crm: enabled: false type: "" # bitrix24 / amocrm / hubspot webhook_url: "" analytics: enabled: false type: "" # GA4 / Metrika accounting: enabled: false type: "" # 1c / moedelo / finolog bi: enabled: false type: "" # PowerBI / Looker / DataLens
