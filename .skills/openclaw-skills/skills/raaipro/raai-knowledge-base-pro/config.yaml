# AI-База знаний PRO.0 — настройка под компанию
# Чем точнее заполнено — тем точнее работает система.
# OBLIGATORY — заполните ДО первого запуска (без них работает в демо-режиме).
# Остальные поля — на первом запуске можно пропустить. # ═══════════════════════════════════════════════════
# БАЗА ЗНАНИЙ (OBLIGATORY — заполнить при первом запуске)
# ═══════════════════════════════════════════════════ kb: storage_type: "local" # [OBLIGATORY] local / notion / confluence / google_drive / combined language: "rus" # [OBLIGATORY] rus / eng / bilingual company_context: "" # [OBLIGATORY] Краткое описание компании (2-3 предложения) team_size: 0 # [OBLIGATORY] Количество сотрудников # Настройки поиска search_max_results: 5 # Топ-N результатов поиска search_freshness_days: 90 # Записи старше N дней помечать "может быть неактуально" # Версионирование versioning_enabled: true archive_on_delete: true # При удалении — в архив, не полное удаление # Уровни доступа по умолчанию default_access_level: 1 # 0=публичный, 1=сотрудники, 2=отдел, 3=руководство, 4=конфиденциально # ═══════════════════════════════════════════════════
# ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ
# ═══════════════════════════════════════════════════ leader: name: "Имя Отчество" role: "HR-директор" # HR-директор / Операционный директор / CEO / Руководитель подразделения language_mode: "вы" # "ты" или "вы" telegram_id: "" timezone: "Europe/Moscow" # Стиль управления management_style: "аналитический" # "прямой" / "партнёрский" / "жёсткий" / "аналитический" / "коучинговый" decision_speed: "средняя" # Зона перегруза — что отнимает больше всего времени overload_zone: "повторные вопросы" # "повторные вопросы" / "онбординг" / "регламенты" / "поиск информации" overload_description: "" # Пример: "каждый день отвечаю на одно и то же по 2 часа" # ROI-привязка hour_cost_rub: 0 # Стоимость часа руководителя в рублях hours_lost_per_week: 0 # Сколько часов в неделю теряется на повторные ответы # ═══════════════════════════════════════════════════
# КОМПАНИЯ — ПРОФИЛЬ БИЗНЕСА
# ═══════════════════════════════════════════════════ company: name: "Название компании" legal_form: "ООО" industry: "Отрасль" # IT / Услуги / Розница / Производство / HoReCa / EdTech / HR business_model: "услуги" # "услуги" / "продукт" / "SaaS" / "marketplace" / "производство" geography: "Россия" timezone: "Europe/Moscow" # Стадия бизнеса stage: "growth" # "launch" / "early" / "growth" / "mature" / "transformation" founded_year: "" # Размер команды team_size: 0 # Текущее количество сотрудников new_hires_per_month: 0 # Средний найм новых людей в месяц onboarding_days_current: 30 # Сколько дней сейчас занимает онбординг onboarding_days_target: 10 # Целевой срок онбординга после внедрения # Отделы с активными знаниями knowledge_departments: - name: "" # "Продажи" headcount: 0 repeating_questions_per_week: 0 # ═══════════════════════════════════════════════════
# КВАЛИФИКАЦИЯ — КОМУ ПОДХОДИТ / НЕ ПОДХОДИТ
# ═══════════════════════════════════════════════════ qualification: ideal_team_size_from: 5 ideal_team_size_to: 500 min_repeating_questions_per_week: 10 requires_knowledge_owners: true requires_onboarding_need: true not_for: - "Соло-проекты без команды и процессов" - "Компании без готовности назначать owner'ов знаний" - "Команды, где никто не будет поддерживать актуальность базы" - "Тем, кто хочет просто склад документов без ревизии" # ═══════════════════════════════════════════════════
# ФИНАНСЫ — БАЗОВЫЕ МЕТРИКИ
# ═══════════════════════════════════════════════════ finance: current_monthly_revenue: 0 monthly_revenue_target: 0 gross_margin_percent: 0 # ═══════════════════════════════════════════════════
# МЕТРИКИ БАЗЫ ЗНАНИЙ — КЛЮЧЕВЫЕ KPI
# ═══════════════════════════════════════════════════ business_metrics: # Главная метрика north_star_metric: "Время онбординга нового сотрудника" north_star_current: 30 # дней — текущее время до самостоятельной работы north_star_target: 10 # дней — целевое время # Специфичные метрики базы знаний docs_count: 0 # Количество активных документов/записей в базе search_queries_per_day: 0 # Поисковых запросов в базу в день onboarding_days_current: 30 # Текущее время онбординга (дни) repeated_questions_per_week: 0 # Повторных вопросов в неделю, которые жгут команду # Ежедневные метрики daily_metrics: - name: "Поисковых запросов" unit: "шт/день" target: 0 source: "аналитика базы" - name: "No-answer queries" unit: "шт/день" target: 0 source: "аналитика базы" - name: "Обновлено записей" unit: "шт/нед" target: 0 source: "ручной ввод" # KPI для weekly review weekly_kpi: - "Количество новых записей" - "Количество устаревших (stale) записей" - "Топ-5 no-answer queries" - "Покрытие knowledge-gap зон" - "Среднее время онбординга" - "Количество повторных вопросов" - "Количество записей без owner'а" # ═══════════════════════════════════════════════════
# СТРУКТУРА БАЗЫ ЗНАНИЙ
# ═══════════════════════════════════════════════════ knowledge_structure: # Основные категории categories: - "FAQ" - "Регламент" - "SOP" - "Инструкция" - "Онбординг" - "Справка" - "Шаблон" - "Политика" - "Контакты и эскалации" # Уровни доступа access_levels: - level: 0 name: "Публичный" description: "Доступен всем, включая клиентов" - level: 1 name: "Сотрудники" description: "Все сотрудники компании" - level: 2 name: "Отдел" description: "Только конкретный отдел" - level: 3 name: "Руководство" description: "Руководители и директора" - level: 4 name: "Конфиденциально" description: "Ограниченный круг лиц" # Правила владения ownership_rule: "У каждой критичной записи должен быть owner" revision_cycle_days: 90 # Цикл ревизии в днях stale_warning_days: 90 # После N дней без обновления — stale-warning # ═══════════════════════════════════════════════════
# ПОИСК — НАСТРОЙКИ
# ═══════════════════════════════════════════════════ search: mode: "semantic + keyword + filters" max_results: 5 relevance_threshold: 0.65 semantic_weight: 0.7 keyword_weight: 0.3 show_related: true freshness_boost: 0.1 popularity_boost: 0.1 filter_by_access_level: true show_source: true # ═══════════════════════════════════════════════════
# ОНБОРДИНГ — НАСТРОЙКИ ПО РОЛЯМ
# ═══════════════════════════════════════════════════ onboarding: primary_roles: - "Менеджер по продажам" - "Менеджер поддержки" - "Операционный менеджер" - "Маркетолог" - "Руководитель" path_structure: day_1: "Базовые правила, доступы, инструменты, главные контакты" week_1: "Ключевые процессы, FAQ, продукт, команда" month_1: "KPI, типичные ошибки, самостоятельная работа" success_metric: "Время до самостоятельной полезной работы" current_onboarding_days: 30 target_onboarding_days: 10 onboarding_bottlenecks: - "" # "Нет структурированного маршрута — новичок сам ищет инфо" - "" # "Сильные сотрудники тратят 2-3 часа в день на устные объяснения" # ═══════════════════════════════════════════════════
# ИНДЕКСАЦИЯ ДОКУМЕНТОВ
# ═══════════════════════════════════════════════════ indexing: supported_formats: - "pdf" - "docx" - "md" - "txt" - "html" chunk_size_tokens: 400 chunk_overlap_tokens: 50 auto_categorize: true auto_tag: true duplicate_threshold: 0.92 embedding_model: "text-embedding-3-large" # Источники для первичной загрузки priority_sources: - "" # "Notion-пространство команды" - "" # "Google Drive с регламентами" - "" # "Telegram-каналы с объявлениями" # ═══════════════════════════════════════════════════
# АНАЛИТИКА И ВЫЯВЛЕНИЕ ПРОБЕЛОВ
# ═══════════════════════════════════════════════════ analytics: log_searches: true gap_threshold: 3 # N незакрытых запросов = gap-сигнал weekly_report: true report_channel: "telegram" main_metrics: - "top searched topics" - "no-answer queries" - "stale entries" - "popular records" - "onboarding gaps" - "access violations" gap_zones: - "" # "Процесс возвратов" - "" # "Эскалации и исключения" - "" # "Онбординг в отделе поддержки" # ═══════════════════════════════════════════════════
# ПЛАН ВНЕДРЕНИЯ
# ═══════════════════════════════════════════════════ implementation: day_1: - "Зафиксировать 5 самых дорогих повторных вопросов команды" - "Определить owner'ов по ключевым разделам" - "Создать базовую таксономию и уровни доступа" - "Загрузить 10 самых частых вопросов и 5 ключевых SOP" week_1: - "Собрать FAQ по команде и клиентам" - "Создать онбординг для 2-3 ключевых ролей" - "Разложить по категориям регламенты и инструкции" - "Запустить первый аудит базы" month_1: - "Удалить дубли и устаревшие записи" - "Донастроить поиск, теги и экспорт" - "Сопоставить реальные запросы с пробелами в базе" - "Ввести цикл ревизии контента" quarter_1: - "Превратить базу в рабочий стандарт команды" - "Снизить ручную нагрузку на сильных сотрудников" - "Выстроить обновление знаний как процесс" - "Связать базу с онбордингом, поддержкой и операционкой" # ═══════════════════════════════════════════════════
# ROI-МОДЕЛЬ
# ═══════════════════════════════════════════════════ roi_model: enabled: true product_cost_rub: 30000 formula: "hours_saved_per_month * avg_hour_cost_rub" # Экономия времени на повторных ответах team_members_answering_repeats: 0 # Сколько сильных сотрудников отвечают повторно minutes_per_day_on_repeats: 20 # Минут в день на повторные ответы (на человека) avg_hour_cost_rub: 2000 # Средняя стоимость часа сотрудника # Расчёт # hours_lost_per_month = team_members * minutes_per_day * 22 / 60 # При 5 чел × 20 мин × 22 дня / 60 = 36.6 часов/мес # 36.6 × 2000 = 73 200 руб/мес скрытых потерь # Ускорение онбординга new_hires_per_month: 0 onboarding_days_saved: 20 # 30 дней → 10 дней = 20 рабочих дней экономии onboarding_cost_per_day_rub: 0 # Стоимость одного дня онбординга (наставник + время) # Консервативная окупаемость payback_month: 1 # Окупаемость уже в первый месяц при базовом эффекте # ═══════════════════════════════════════════════════
# ANTI-FAIL
# ═══════════════════════════════════════════════════ anti_fail: requires_knowledge_owners: true requires_real_content: true # Не пустые заглушки, а реальные FAQ и SOP requires_revision_discipline: true # Кто-то должен обновлять записи requires_active_usage: true # Команда должна пользоваться базой, не обходить её requires_prioritization: true # Не складывать всё подряд, начать с критичного hard_limits: - "Не заменяет дисциплину актуализации" - "Не спасает при полном хаосе без owner'ов" - "Не лечит отсутствие процессов" - "Не исправляет культуру, где знания не фиксируют" warning: > Если в базу складывают мусор, не обновляют записи и не следят за доступами, продукт покажет проблему, но не замаскирует её. Garbage in → garbage out. # ═══════════════════════════════════════════════════
# ФОРМАТ И ИНТЕРФЕЙС
# ═══════════════════════════════════════════════════ format: emoji: false tables: true progress_bars: false brief_mode: false report_style: "operational" # "operational" / "detailed" currency: "руб" language: "ru" # ═══════════════════════════════════════════════════
# ИНТЕГРАЦИИ (опционально)
# ═══════════════════════════════════════════════════ integrations: notion: enabled: false workspace_url: "" api_key: "" google_drive: enabled: false folder_id: "" telegram_bot: enabled: false bot_token: "" channel_id: "" confluence: enabled: false space_key: "" slack: enabled: false channel: ""
