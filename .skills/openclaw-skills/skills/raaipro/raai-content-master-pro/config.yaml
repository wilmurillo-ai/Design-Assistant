# Контент-мастер PRO — настройки
# Чем точнее заполнено — тем точнее работает система
# YAML-ключи на английском, комментарии на русском # ═══════════════════════════════════════════════════
# ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ
# ═══════════════════════════════════════════════════ leader: role: "Маркетолог / Собственник" # кто использует продукт content_experience: "средний" # начинающий / средний / опытный / эксперт team_size: 2 # сколько человек занимается контентом writes_content_personally: true # пишет ли контент сам hour_cost_rub: 2000 # стоимость часа, руб hours_per_week_on_content: 15 # сколько часов/нед тратит на контент сейчас main_pain: "контент выходит хаотично, нет стратегии и TOV" current_tools: - "Canva" - "ChatGPT (разово)" - "Google Docs" - "SMMplanner / Отложенный постинг" style: "системный" # интуитивный / системный / креативный / аналитический # ═══════════════════════════════════════════════════
# КОМПАНИЯ КЛИЕНТА
# ═══════════════════════════════════════════════════ company: industry: "Онлайн-образование" # ниша клиента model: "B2C" # B2B / B2C / B2B2C avg_deal_size: 15000 # средний чек, руб revenue_monthly: 5000000 # выручка в месяц, руб website: "" content_budget_monthly: 100000 # бюджет на контент (включая время команды), руб/мес # ═══════════════════════════════════════════════════
# БИЗНЕС
# ═══════════════════════════════════════════════════ business: name: "Название компании / личный бренд" product: "Ваш продукт / услуга" niche: "Ваша ниша" # образование / услуги / eCommerce / IT / агентство price_min: 5000 # минимальный чек руб price_avg: 15000 # средний чек руб price_max: 50000 # максимальный чек руб currency: "RUB" geo: "Россия" usp: "Главное конкурентное преимущество — одной строкой" brand_promise: "Что клиент получает всегда — одной строкой" # ═══════════════════════════════════════════════════
# ЦЕЛЕВАЯ АУДИТОРИЯ
# ═══════════════════════════════════════════════════ target: avatar: "предприниматели / маркетологи 28-45 лет" age_range: "28-45" gender: "все" income: "от 80000 руб/мес" decision_maker: "Собственник / Руководитель маркетинга / Контент-менеджер" pain_primary: "контент выходит хаотично, нет системы и стратегии" pain_secondary: "каждый пост пишется с нуля, нет шаблонов" objection_main: "ChatGPT и так пишет / есть SMM-щик / контент не продаёт" trigger: "ER упал / подписчики не растут / контент-менеджер уволился / запуск нового продукта" trigger_words: - "контент не работает" - "нет стратегии" - "ER упал" - "не знаю что постить" - "email не открывают" - "контент не продаёт" - "каждый пост с нуля" # ═══════════════════════════════════════════════════
# ПЛОЩАДКИ И КАНАЛЫ
# ═══════════════════════════════════════════════════ channels: telegram: enabled: true channel_link: "@ваш_канал" post_length: "medium" # short (до 500) / medium (500-1500) / long (1500+) posts_per_week: 5 target_er: 10 # целевой ER, % target_subscribers_growth: 200 # рост подписчиков/мес kpi: "ER ≥8%, охват поста ≥30% базы" instagram: enabled: true account: "@ваш_аккаунт" formats: ["post", "carousel", "reels", "stories"] posts_per_week: 4 reels_per_week: 2 stories_per_day: 3 hashtags_count: 20 hashtags_in: "first_comment" # caption / first_comment target_er: 5 # целевой ER, % target_reach_per_post: 1000 kpi: "ER ≥4%, reach/post ≥1000, saves ≥2%" email: enabled: true platform: "GetResponse" # GetResponse / MailChimp / Unisender / другой sender_name: "Имя Фамилия" sender_email: "you@domain.ru" sends_per_week: 2 target_open_rate: 30 # целевой open rate, % target_click_rate: 5 # целевой CTR, % target_unsubscribe_rate_max: 0.5 # макс. отписка, % kpi: "Open rate ≥25%, CTR ≥4%, отписка <0.5%" youtube: enabled: false channel: "" videos_per_month: 4 target_views: 1000 kpi: "views ≥500, CTR обложки ≥5%" vk: enabled: false group: "" posts_per_week: 3 target_er: 3 # ═══════════════════════════════════════════════════
# TONE OF VOICE
# ═══════════════════════════════════════════════════ tone_of_voice: style: "деловая прямая" # деловая прямая / живая личная / провокационная / обучающая adjectives: # 3 слова, описывающих голос бренда - "прямой" - "экспертный" - "живой" addressing: "ты" # ты / вы / нейтрально emoji_level: "умеренно" # нет / умеренно / много cta_style: "мягкий" # мягкий / прямой / срочный forbidden_words: - "революционный" - "уникальный" - "инновационный" - "в современном мире" - "не секрет что" - "все мы знаем" - "осуществлять" - "в рамках" - "является" - "комплексный подход" - "широкий спектр услуг" allowed_words: [] # слова-маркеры бренда # ═══════════════════════════════════════════════════
# КОНТЕНТ-СТРАТЕГИЯ
# ═══════════════════════════════════════════════════ content_strategy: content_mix: educational: 40 # % обучающего контента selling: 20 # % продающего engaging: 25 # % вовлекающего personal: 15 # % личного posting_frequency: 5 # публикаций в неделю (рекомендуется 4-7) best_time_post: "18:00-20:00" # время по МСК content_pillars: # 3-5 контентных столбов - "экспертиза в [теме]" - "кейсы и результаты" - "закулисье и процессы" - "обучающий контент" - "мнения и провокации" # ═══════════════════════════════════════════════════
# SEO
# ═══════════════════════════════════════════════════ seo: region: "Россия" # регион для подбора ключей primary_keyword: "" # главный ключ ниши brand_keywords: [] # брендовые запросы competitor_domains: [] # домены конкурентов для анализа target_organic_growth: 40 # целевой рост органики, % за 3 мес # ═══════════════════════════════════════════════════
# EMAIL-ЦЕПОЧКИ
# ═══════════════════════════════════════════════════ email_sequences: welcome: enabled: true length: 5 # количество писем interval_days: [0, 2, 4, 6, 7] lead_magnet: "Название лид-магнита" goal: "знакомство + доверие + первый оффер" nurture: enabled: true length: 5 interval_days: [0, 3, 7, 10, 14] goal: "экспертность + кейсы + мягкий оффер" sales: enabled: false length: 5 product_name: "Название продукта" deadline_days: 7 goal: "анонс → контент → кейс → возражения → дожим" reactivation: enabled: true length: 3 trigger_days_inactive: 30 goal: "вернуть спящих подписчиков" # ═══════════════════════════════════════════════════
# КОНКУРЕНТЫ
# ═══════════════════════════════════════════════════ competitors: - name: "Конкурент 1" telegram: "@ник" instagram: "@ник" strength: "много контента, высокая частота" weakness: "нет TOV, контент однотипный" - name: "Конкурент 2" telegram: "@ник" instagram: "@ник" strength: "сильный визуал" weakness: "нет SEO, не используют email" - name: "Конкурент 3" telegram: "@ник" instagram: "@ник" strength: "большая база" weakness: "низкий ER, нет вовлечения" # ═══════════════════════════════════════════════════
# КРИТЕРИИ КВАЛИФИКАЦИИ — КОМУ ПОДХОДИТ / НЕ ПОДХОДИТ
# ═══════════════════════════════════════════════════ qualification_criteria: ideal_revenue_range: "2-20 млн/мес" min_content_budget: 50000 # минимальный бюджет на контент, руб/мес min_channels: 3 # минимум каналов контента ideal_for: - "маркетолог с 3+ каналами, который не успевает и тратит 15+ часов/нед" - "собственник, который сам пишет контент — нужна система, не тексты" - "контент-менеджер, которому нужна стратегия и шаблоны" - "агентство, стандартизирующее производство контента для клиентов" - "бизнес с контентом, но без TOV, SEO и аналитики" not_for: - "нет продукта — нечего продвигать контентом" - "нет аудитории и каналов — система не создаёт подписчиков из воздуха" - "хочет '1 пост = миллион' — контент-маркетинг это система, не волшебство" - "не готов к дисциплине — план, ритм, аналитика требуют регулярности" - "бюджет 0 на контент — даже с шаблонами нужны ресурсы" # ═══════════════════════════════════════════════════
# МЕТРИКИ КОНТЕНТА (KPI)
# ═══════════════════════════════════════════════════ content_metrics: er_telegram: 10 # целевой ER Telegram, % er_instagram: 5 # целевой ER Instagram, % reach_per_post: 1000 # средний охват поста ctr_email: 5 # CTR email-рассылок, % open_rate_email: 30 # open rate email, % conversion_content_to_lead: 3 # конверсия контент→лид, % monthly_posts: 30 # постов в месяц monthly_emails: 8 # email-рассылок в месяц new_subscribers_monthly: 200 # новых подписчиков/мес content_leads_monthly: 20 # лидов из контента/мес # ═══════════════════════════════════════════════════
# ПЛАН ВНЕДРЕНИЯ
# ═══════════════════════════════════════════════════ implementation: day_1: - "заполнить config.yaml — ниша, продукт, каналы, TOV" - "стратегия контента для [ниша] — получить TOV и контент-микс" - "SEO-ядро для [ниша] — получить ключи и кластеры" - "первый пост по шаблону — увидеть формат и качество" week_1: - "контент-план на месяц по 3 каналам" - "5-7 постов по разным форматам — набить руку" - "анализ конкурентов — найти незанятые ниши" - "первый рерайт ×5 — один текст на все площадки" - "запуск welcome email-цепочки" month_1: - "все 30 постов вышли по плану и по TOV" - "воронка TOFU/MOFU/BOFU запущена" - "email-цепочки (welcome + nurture) работают" - "первый отчёт: ER, охваты, топ-посты" - "A/B тесты заголовков — первые данные" quarter_1: - "контент-машина работает автономно" - "SEO-контент даёт органический трафик" - "email-база реактивирована, open rate стабильный" - "A/B тесты оптимизировали заголовки и CTA" - "контент-воронка генерирует лиды предсказуемо" # ═══════════════════════════════════════════════════
# ROI-МОДЕЛЬ (формула окупаемости)
# ═══════════════════════════════════════════════════ roi_model: formula: "сэкономленные часы × стоимость часа + доп. лиды × средний чек × конверсия" example: product_cost: 30000 # стоимость Контент-мастер PRO, руб hours_saved_per_week: 10 # сэкономленных часов/нед hour_cost: 2000 # стоимость часа, руб weekly_savings: 20000 # экономия в неделю, руб monthly_savings: 80000 # экономия в месяц, руб payback_days: 11 # окупаемость за 11 дней additional_leads_monthly: 15 # доп. лидов из контента/мес lead_to_client_rate: 0.10 # конверсия лид→клиент 10% avg_deal: 15000 # средний чек, руб additional_revenue: 22500 # доп. выручка/мес от лидов total_monthly_return: 102500 # экономия + выручка annual_roi_percent: 3900 # (102500×12 - 30000) / 30000 × 100 conservative: hours_saved: 8 additional_leads: 10 monthly_return: 56000 payback_days: 16 optimistic: hours_saved: 15 additional_leads: 25 monthly_return: 157500 annual_roi_percent: 6200 # ═══════════════════════════════════════════════════
# ANTI-FAIL — КОГДА НЕ ПОМОЖЕТ
# ═══════════════════════════════════════════════════ anti_fail: requires: - "реальный продукт/услуга с понятным чеком" - "аудитория и хотя бы 1 активный канал контента" - "готовность выполнять контент-план (дисциплина)" - "честные данные в config.yaml (не выдуманные)" - "ресурсы на производство (дизайн, фото, видео или бюджет на них)" will_not_help_if: - "нет продукта — нечего продвигать контентом" - "нет аудитории — система не создаёт подписчиков из воздуха" - "данные вымышленные — garbage in garbage out" - "контент-план не выполняется — стратегия без дисциплины бесполезна" - "ожидание магии — AI усиливает процесс, не заменяет маркетолога" garbage_in_garbage_out: - "ниша без реальных данных → общая стратегия" - "TOV без примеров → шаблонный голос" - "SEO без конкурентов → неполное ядро" - "email без базы → цепочки в пустоту" - "отчёт без данных → теоретические рекомендации" # ═══════════════════════════════════════════════════
