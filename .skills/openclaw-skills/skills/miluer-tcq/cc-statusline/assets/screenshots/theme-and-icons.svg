      <stop offset="0%" stop-color="#0b1020" />
      <stop offset="55%" stop-color="#10192b" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  
<style>
  .bg { fill: url(#bg); }
