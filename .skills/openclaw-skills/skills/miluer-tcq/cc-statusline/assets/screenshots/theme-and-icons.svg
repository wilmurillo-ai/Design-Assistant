  .panel-muted { fill: #0b1220; stroke: #1f2937; stroke-width: 1.2; }
  .terminal { fill: #0b1020; stroke: #334155; stroke-width: 1.2; }
  .title { fill: #f8fafc; font: 700 34px 'Segoe UI', 'Inter', Arial, sans-serif; }
