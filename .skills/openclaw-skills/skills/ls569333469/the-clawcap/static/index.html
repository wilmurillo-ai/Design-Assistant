<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The ClawCap 🦞🧠 龙虾脑控帽</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* 纯粹的暗黑极简与协议警告红 */
            --primary: #FF453A;
            --primary-hover: #D70015;
            --bg-deep: #0B0E17;
            --bg-card: rgba(255, 255, 255, 0.02);
            --bg-card-hover: rgba(255, 255, 255, 0.04);
            --text-primary: #F0F0F5;
            --text-secondary: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(255, 69, 58, 0.5);
            --radius: 8px;
            /* 更锋利的边角 */
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* ── 背景装饰：极其克制的中心暗红微光 ── */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 69, 58, 0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 680px;
            padding: 40px 24px 80px;
        }

        /* ── 新版 HEADER (瑞士国际极简 + 重磅中文) ── */
        .cc-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem 0 4rem 0;
        }

        .cc-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 18px;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .cc-badge-divider {
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        /* ── 主标题：保持绝对力量感 ── */
        .cc-title {
            font-size: 4.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .cc-title span {
            color: var(--primary);
        }

        /* ── 中文名：大幅放大，加粗，作为绝对的核心视觉 ── */
        .cc-subtitle {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.25em;
            color: #F0F0F5;
            margin: 1.2rem 0 3.5rem 0;
            padding-left: 0.25em;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* ── 赛博宣言区块：加固红线，压住上面变大的标题 ── */
        .cc-quote-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .cc-quote-box::before {
            content: "";
            width: 40px;
            height: 3px;
            background: var(--primary);
            margin-bottom: 2rem;
        }

        .cc-quote-cn {
            font-size: 1.15rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            margin: 0 0 0.6rem 0;
            letter-spacing: 0.08em;
        }

        .cc-quote-en {
            font-family: "JetBrains Mono", monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin: 0;
        }

        /* ── CARD (机器面板质感) ── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            margin-bottom: 24px;
            transition: border-color 0.2s, background 0.2s;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: var(--bg-card-hover);
        }

        .card-title {
            font-family: "JetBrains Mono", monospace;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
        }

        /* ── 上传区 ── */
        .upload-zone {
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: rgba(0, 0, 0, 0.2);
            min-height: 124px;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(255, 69, 58, 0.05);
        }

        .upload-zone.has-image {
            padding: 8px;
            border-style: solid;
            border-color: var(--border);
            background: transparent;
        }

        .upload-zone .hint {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }

        .upload-zone .hint strong {
            color: var(--text-primary);
            font-weight: 500;
        }

        .upload-zone img {
            max-width: 100%;
            max-height: 280px;
            border-radius: 4px;
            display: block;
            margin: 0 auto;
        }

        #file-input {
            display: none;
        }

        /* ── 输入框 (等宽代码字体，终端感) ── */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--primary);
            font-size: 13px;
            font-family: "JetBrains Mono", monospace;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--border-focus);
            background: rgba(0, 0, 0, 0.5);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.5;
        }

        /* ── 按钮 (干掉渐变，纯粹的力量感) ── */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        .btn-primary:disabled {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }

        /* ── 加载动画 ── */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading .spinner {
            display: inline-block;
        }

        .loading .btn-text {
            display: none;
        }

        /* ── 进度条 ── */
        .progress-bar {
            display: none;
            margin-top: 20px;
        }

        .progress-bar .track {
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .progress-bar .label {
            font-family: "JetBrains Mono", monospace;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: center;
            text-transform: uppercase;
        }

        /* ── 结果区 ── */
        .result-area {
            display: none;
            text-align: center;
        }

        .result-area img {
            max-width: 100%;
            max-height: 400px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .result-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-secondary {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        /* ── 元数据 (协议日志感) ── */
        .metadata {
            margin-top: 24px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: "JetBrains Mono", monospace;
            font-size: 11px;
            color: var(--text-secondary);
            text-align: left;
            line-height: 1.8;
        }

        .metadata span {
            color: var(--primary);
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 12px 24px;
            background: var(--text-primary);
            color: var(--bg-deep);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 999;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 540px) {
            .cc-title {
                font-size: 2.8rem;
            }

            .cc-subtitle {
                font-size: 1.4rem;
            }

            .card {
                padding: 20px;
            }

            .result-actions {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="cc-header">
            <div class="cc-badge">
                <span>🦞</span>
                <div class="cc-badge-divider"></div>
                <span>🧠</span>
            </div>
            <h1 class="cc-title">The ClawCap<span>.</span></h1>
            <div class="cc-subtitle">龙虾脑控帽</div>
            <div class="cc-quote-box">
                <p class="cc-quote-cn">戴上 ClawCap，不是为了自己思考，而是放弃思考。</p>
                <p class="cc-quote-en">You put on the ClawCap not to think, but to stop thinking.</p>
            </div>
        </div>

        <div class="card">
            <div class="card-title">TARGET_PFP // 上传目标宿主</div>
            <div class="upload-zone" id="upload-zone">
                <div class="hint">
                    <strong>[+] 点击或拖拽传入宿主影像</strong><br>
                    支持 PNG / JPG，分辨率 256–2048px
                </div>
            </div>
            <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp">
        </div>

        <div class="card">
            <div class="card-title">NEURAL_OVERRIDE // 神经覆写参数</div>
            <div class="input-group">
                <label for="accessory-input">潜意识植入 (Subconscious Implant)</label>
                <textarea
                    id="accessory-input">a red beanie hat with two curved red lobster pincers sticking up from the top, two large round white googly eyes with black pupils on the front, compact snug-fitting novelty costume hat</textarea>
            </div>
            <div class="input-group">
                <label for="negative-input">思维防火墙 (Mental Firewall)</label>
                <input type="text" id="negative-input"
                    value="crown, tiara, metallic, gold, jewelry, full body animal, realistic animal, oversized, distorted face, low quality, blurry">
            </div>
        </div>

        <button class="btn-primary" id="generate-btn" disabled>
            <span class="btn-text">INITIATE CLAWLINK // 物理接管大脑</span>
            <div class="spinner"></div>
        </button>

        <div class="progress-bar" id="progress-bar">
            <div class="track">
                <div class="fill" id="progress-fill"></div>
            </div>
            <div class="label" id="progress-label">ESTABLISHING CONNECTION...</div>
        </div>

        <div class="card result-area" id="result-area">
            <div class="card-title">INFECTION_COMPLETE // 脑控完成</div>
            <img id="result-img" alt="Generated avatar">
            <div class="result-actions">
                <button class="btn-secondary" id="download-btn">DOWNLOAD_SPECIMEN // 下载标本</button>
                <button class="btn-secondary" id="retry-btn">RE_INFECT // 重新寄生</button>
            </div>
            <div class="metadata" id="metadata"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const generateBtn = document.getElementById('generate-btn');
        const accessoryInput = document.getElementById('accessory-input');
        const negativeInput = document.getElementById('negative-input');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');
        const progressLabel = document.getElementById('progress-label');
        const resultArea = document.getElementById('result-area');
        const resultImg = document.getElementById('result-img');
        const metadataEl = document.getElementById('metadata');
        const downloadBtn = document.getElementById('download-btn');
        const retryBtn = document.getElementById('retry-btn');

        let imageBase64 = null;

        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.style.borderColor = 'var(--primary)';
        });
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.style.borderColor = '';
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.style.borderColor = '';
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) handleFile(fileInput.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast('ERR: 宿主基因不兼容 (仅支持图像)');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                imageBase64 = e.target.result.split(',')[1];
                uploadZone.innerHTML = `<img src="${e.target.result}" alt="avatar">`;
                uploadZone.classList.add('has-image');
                generateBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        generateBtn.addEventListener('click', generate);
        retryBtn.addEventListener('click', generate);

        async function generate() {
            if (!imageBase64) return;

            const accessory = accessoryInput.value.trim();
            if (!accessory) { showToast('ERR: 潜意识指令为空'); return; }

            generateBtn.classList.add('loading');
            generateBtn.disabled = true;
            resultArea.style.display = 'none';
            progressBar.style.display = 'block';

            updateProgress(10, 'SCANNING HOST BIOMETRICS... // 扫描宿主生物特征');
            const progressTimer = setTimeout(() => updateProgress(40, 'BREACHING CORTEX... // 突破大脑皮层'), 3000);
            const progressTimer2 = setTimeout(() => updateProgress(70, 'INJECTING CLAW ENTITY... // 注入龙虾寄生体'), 6000);

            try {
                const body = {
                    image_base64: imageBase64,
                    accessory_prompt: accessory,
                    preserve_style: true,
                };
                const neg = negativeInput.value.trim();
                if (neg) body.negative_prompt = neg;

                const resp = await fetch('/api/skill/alpha-equip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                clearTimeout(progressTimer);
                clearTimeout(progressTimer2);

                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || `HTTP ${resp.status}`);
                }

                const data = await resp.json();
                if (data.status !== 'success') {
                    throw new Error(data.error_message || 'FAILED');
                }

                updateProgress(100, 'HOST OVERRIDDEN // 宿主已被接管');
                resultImg.src = `data:image/png;base64,${data.result_image_base64}`;
                resultArea.style.display = 'block';

                const fp = data.metadata.detected_fingerprint;
                metadataEl.innerHTML = `
                > ART_STYLE: <span>${fp.art_style}</span><br>
                > FACE_ANGLE: <span>${fp.face_angle}</span><br>
                > LIGHTING: <span>${fp.lighting_environment}</span><br>
                > LATENCY: <span>${data.metadata.processing_time_ms}ms</span>
            `;

                showToast('SUCCESS: SUBJECT ASSIMILATED');

            } catch (err) {
                showToast(`ERR: ${err.message}`);
                updateProgress(0, '');
                progressBar.style.display = 'none';
            } finally {
                generateBtn.classList.remove('loading');
                generateBtn.disabled = false;
            }
        }

        downloadBtn.addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = resultImg.src;
            a.download = `infected-specimen-${Date.now()}.png`;
            a.click();
            showToast('SPECIMEN DOWNLOADED // 标本已下载');
        });

        function updateProgress(pct, text) {
            progressFill.style.width = pct + '%';
            progressLabel.textContent = text;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>

</body>

</html>
