name: 马卡龙蓝
description: 清新宁静的马卡龙蓝色系，适合旅行、自然、放松向文章
keywords:
  - 清新
  - 宁静
  - 放松
  - 旅行
  - 自然
  - 海洋
  - 天空
  - 平静
  - 治愈
  - 海边
  - 度假
  - 慢生活
  - 蓝天
  - 大海
colors:
  primary: "#4299e1"
  accent: "#3182ce"
  secondary: "#dbeafe"
  background: "#f0f9ff"
  text: "#4a5568"
  text_light: "#4a5568"
  border: "#93c5fd"
styles:
  body:
    font_size: "16px"
    line_height: "1.8"
    letter_spacing: "0.3px"
    padding: "0 16px"
