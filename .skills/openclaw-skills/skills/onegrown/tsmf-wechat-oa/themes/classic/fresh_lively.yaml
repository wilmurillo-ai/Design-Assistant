name: 活泼清新
description: 明亮年轻，适合生活方式、美食、旅行类文章
keywords:
  - 美食
  - 旅行
  - 探店
  - 打卡
  - 穿搭
  - 时尚
  - 护肤
  - 美妆
  - 健身
  - 运动
  - 瑜伽
  - 跑步
  - 咖啡
  - 甜品
  - 餐厅
  - 景点
  - 攻略
  - 推荐
  - 种草
colors:
  primary: "#ff6b6b"
  accent: "#4ecdc4"
  text: "#3d3d3d"
  text_light: "#5a5a5a"
  background: "#ffffff"
  code_bg: "#f0f7fa"
  blockquote_bg: "#fff9e6"
  border: "#e0f0f5"
styles:
  body:
    font_size: "16px"
    line_height: "1.75"
    letter_spacing: "0.3px"
    padding: "0 16px"
    margin: "0 0 16px 0"
  h1:
    font_size: "22px"
    font_weight: "bold"
    margin: "24px 0 16px 0"
    padding: "0 16px"
    text_align: "center"
  h2:
    font_size: "17px"
    font_weight: "bold"
    margin: "20px 0 12px 0"
    padding: "0 16px 0 10px 16px"
    border_left: "3px solid #4ecdc4"
  h3:
    font_size: "16px"
    font_weight: "bold"
    margin: "16px 0 10px 0"
    padding: "0 16px"
  blockquote:
    font_size: "15px"
    padding: "12px 16px"
    margin: "16px 0"
    border_left: "3px solid #ffd93d"
    border_radius: "0 10px 10px 0"
    line_height: "1.75"
  code_inline:
    font_size: "14px"
    padding: "1px 4px"
    border_radius: "4px"
  code_block:
    font_size: "13px"
    padding: "12px 16px"
    margin: "16px 0"
    border_radius: "10px"
    border: "1px solid #e0f0f5"
    line_height: "1.6"
  list:
    font_size: "16px"
    margin: "12px 0"
    padding: "0 16px"
    line_height: "1.75"
  separator:
    border_top: "1px dashed #ffd93d"
    margin: "24px 20%"
  image:
    border_radius: "10px"