name: 杂志高级
description: 精致设计感，适合时尚、艺术、深度阅读类文章
keywords:
  - 时尚
  - 奢侈品
  - 设计
  - 建筑
  - 摄影
  - 艺术
  - 展览
  - 博物馆
  - 深度
  - 长文
  - 专访
  - 人物
  - 品牌
  - 文化
  - 历史
  - 哲学
  - 思考
  - 观察
  - 评论
colors:
  primary: "#1a1a1a"
  accent: "#c0a080"
  text: "#2c2c2c"
  text_light: "#5a5a5a"
  background: "#ffffff"
  code_bg: "#faf8f5"
  blockquote_bg: "transparent"
  border: "#e8e4e0"
styles:
  body:
    font_size: "16px"
    line_height: "1.8"
    letter_spacing: "0.3px"
    padding: "0 20px"
    margin: "0 0 16px 0"
  h1:
    font_size: "22px"
    font_weight: "300"
    margin: "24px 0 16px 0"
    padding: "0 20px"
    text_align: "center"
    letter_spacing: "1px"
  h2:
    font_size: "17px"
    font_weight: "400"
    margin: "20px 0 12px 0"
    padding: "0 20px 8px 20px"
    border_bottom: "1px solid #c0a080"
  h3:
    font_size: "16px"
    font_weight: "500"
    margin: "16px 0 10px 0"
    padding: "0 20px"
    font_style: "italic"
  blockquote:
    font_size: "15px"
    padding: "16px 20px"
    margin: "16px 0"
    border_top: "1px solid #d0c0a0"
    border_bottom: "1px solid #d0c0a0"
    text_align: "center"
    font_style: "italic"
    line_height: "1.8"
  code_inline:
    font_size: "14px"
    padding: "1px 4px"
    border_radius: "3px"
  code_block:
    font_size: "13px"
    padding: "12px 16px"
    margin: "16px 0"
    border_radius: "4px"
    border: "1px solid #e8e4e0"
    line_height: "1.7"
  list:
    font_size: "16px"
    margin: "12px 0"
    padding: "0 20px"
    line_height: "1.8"
  separator:
    border_top: "none"
    border_bottom: "1px solid #e0d8d0"
    margin: "24px 25%"
  image:
    border_radius: "4px"