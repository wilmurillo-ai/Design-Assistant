name: 数据洞察
description: 数据驱动设计，适合数据报告、趋势分析、可视化展示类文章
keywords:
  - 数据
  - 图表
  - 统计
  - 趋势
  - 报告
  - 可视化
  - 分析
  - 大数据
  - 洞察
  - 研究
  - 调研
colors:
  primary: "#2563eb"
  accent: "#3b82f6"
  text: "#1e293b"
  text_light: "#475569"
  background: "#ffffff"
  code_bg: "#f1f5f9"
  blockquote_bg: "#f1f5f9"
  border: "#e2e8f0"
styles:
  body:
    font_size: "15px"
    line_height: "1.75"
    letter_spacing: "0.3px"
    padding: "0 16px"
    margin: "0 0 16px 0"
  h1:
    font_size: "20px"
    font_weight: "bold"
    margin: "24px 0 16px 0"
    padding: "0 16px 10px 16px"
    border_bottom: "3px solid #2563eb"
  h2:
    font_size: "17px"
    font_weight: "bold"
    margin: "20px 0 12px 0"
    padding: "10px 16px"
    background_color: "#eff6ff"
    border_radius: "6px"
  h3:
    font_size: "16px"
    font_weight: "bold"
    margin: "16px 0 10px 0"
    padding: "0 16px"
  blockquote:
    font_size: "14px"
    padding: "12px 16px"
    margin: "16px 0"
    border_left: "4px solid #3b82f6"
    line_height: "1.7"
  code_inline:
    font_size: "13px"
    padding: "2px 5px"
    border_radius: "4px"
  code_block:
    font_size: "13px"
    padding: "12px 16px"
    margin: "16px 0"
    border_radius: "6px"
    border: "1px solid #e2e8f0"
    line_height: "1.6"
  list:
    font_size: "15px"
    margin: "12px 0"
    padding: "0 16px"
    line_height: "1.75"
  separator:
    border_top: "2px solid #e2e8f0"
    margin: "24px 15%"
  image:
    border_radius: "8px"