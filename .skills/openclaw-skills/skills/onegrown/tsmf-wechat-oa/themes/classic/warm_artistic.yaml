name: 温暖文艺
description: 柔和有温度，适合生活、情感、读书类文章
keywords:
  - 生活
  - 情感
  - 读书
  - 文学
  - 散文
  - 随笔
  - 故事
  - 人生
  - 感悟
  - 思考
  - 阅读
  - 书籍
  - 电影
  - 音乐
  - 艺术
  - 美学
  - 生活方式
  - 慢生活
  - 治愈
colors:
  primary: "#8b6914"
  accent: "#9c7c2e"
  text: "#4a4a4a"
  text_light: "#6b5b3d"
  background: "#ffffff"
  code_bg: "#faf8f5"
  blockquote_bg: "#faf8f5"
  border: "#e8dcc8"
styles:
  body:
    font_size: "16px"
    line_height: "1.8"
    letter_spacing: "0.5px"
    padding: "0 16px"
    margin: "0 0 16px 0"
  h1:
    font_size: "21px"
    font_weight: "normal"
    margin: "24px 0 16px 0"
    padding: "0 16px 10px 16px"
    text_align: "center"
    border_bottom: "1px solid #d4c4a8"
  h2:
    font_size: "17px"
    font_weight: "normal"
    margin: "20px 0 12px 0"
    padding: "0 16px"
    text_align: "center"
  h3:
    font_size: "16px"
    font_weight: "bold"
    margin: "16px 0 10px 0"
    padding: "0 16px"
  blockquote:
    font_size: "15px"
    padding: "14px 16px"
    margin: "16px 0"
    border_top: "1px solid #e8dcc8"
    border_bottom: "1px solid #e8dcc8"
    text_align: "center"
    line_height: "1.75"
  code_inline:
    font_size: "14px"
    padding: "1px 4px"
    border_radius: "3px"
  code_block:
    font_size: "13px"
    padding: "12px 16px"
    margin: "16px 0"
    border_radius: "8px"
    border: "1px solid #e8dcc8"
    line_height: "1.6"
  list:
    font_size: "16px"
    margin: "12px 0"
    padding: "0 16px"
    line_height: "1.8"
  separator:
    border_top: "1px dashed #d4c4a8"
    margin: "24px 20%"
  image:
    border_radius: "8px"