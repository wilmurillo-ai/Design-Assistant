name: 自然清新
description: 绿意盎然风格，适合环保、户外、植物类文章
keywords:
  - 自然
  - 环保
  - 户外
  - 植物
  - 绿色
  - 生态
  - 森林
  - 田园
  - 有机
  - 可持续
colors:
  primary: "#059669"
  accent: "#10b981"
  text: "#064e3b"
  text_light: "#065f46"
  background: "#ffffff"
  code_bg: "#ecfdf5"
  blockquote_bg: "#ecfdf5"
  border: "#a7f3d0"
styles:
  body:
    font_size: "16px"
    line_height: "1.8"
    letter_spacing: "0.3px"
    padding: "0 16px"
    margin: "0 0 16px 0"
  h1:
    font_size: "20px"
    font_weight: "bold"
    margin: "24px 0 16px 0"
    padding: "0 16px"
    text_align: "center"
  h2:
    font_size: "17px"
    font_weight: "bold"
    margin: "20px 0 12px 0"
    padding: "10px 16px"
    background_color: "#ecfdf5"
    border_radius: "8px"
  h3:
    font_size: "16px"
    font_weight: "bold"
    margin: "16px 0 10px 0"
    padding: "0 16px"
  blockquote:
    font_size: "15px"
    padding: "12px 16px"
    margin: "16px 0"
    border_left: "4px solid #10b981"
    line_height: "1.7"
  code_inline:
    font_size: "14px"
    padding: "1px 4px"
    border_radius: "4px"
  code_block:
    font_size: "13px"
    padding: "12px 16px"
    margin: "16px 0"
    border_radius: "8px"
    border: "1px solid #a7f3d0"
    line_height: "1.6"
  list:
    font_size: "16px"
    margin: "12px 0"
    padding: "0 16px"
    line_height: "1.8"
  separator:
    border_top: "2px solid #a7f3d0"
    margin: "24px 20%"
  image:
    border_radius: "12px"