name: 学术专业
description: 严谨学术风格，适合论文、研究报告、学术分析类文章
keywords:
  - 论文
  - 学术
  - 研究
  - 分析
  - 报告
  - 学位
  - 毕业
  - 科研
  - 大学
  - 学院
  - 教授
  - 博士
  - 硕士
  - 期刊
  - 发表
  - 实验
  - 数据
  - 方法
  - 结论
colors:
  primary: "#1a365d"
  accent: "#4299e1"
  text: "#2c3e50"
  text_light: "#4a5568"
  background: "#ffffff"
  code_bg: "#f7fafc"
  blockquote_bg: "#f7fafc"
  border: "#e2e8f0"
styles:
  body:
    font_size: "15px"
    line_height: "1.8"
    letter_spacing: "0.3px"
    padding: "0 20px"
    margin: "0 0 16px 0"
  h1:
    font_size: "20px"
    font_weight: "bold"
    margin: "28px 0 16px 0"
    padding: "0 20px 8px 20px"
    border_bottom: "2px solid #2c5282"
  h2:
    font_size: "17px"
    font_weight: "bold"
    margin: "22px 0 12px 0"
    padding: "0 20px 0 12px 20px"
    border_left: "4px solid #4299e1"
  h3:
    font_size: "15px"
    font_weight: "bold"
    margin: "18px 0 10px 0"
    padding: "0 20px"
  blockquote:
    font_size: "14px"
    padding: "12px 16px"
    margin: "16px 0"
    border_left: "4px solid #4299e1"
    font_style: "italic"
    line_height: "1.7"
  code_inline:
    font_size: "13px"
    padding: "2px 5px"
    border_radius: "3px"
  code_block:
    font_size: "13px"
    padding: "14px 16px"
    margin: "16px 0"
    border_radius: "4px"
    border: "1px solid #e2e8f0"
    line_height: "1.6"
  list:
    font_size: "15px"
    margin: "12px 0"
    padding: "0 20px"
    line_height: "1.8"
  separator:
    border_top: "1px solid #e2e8f0"
    margin: "24px 20%"
  image:
    border_radius: "4px"