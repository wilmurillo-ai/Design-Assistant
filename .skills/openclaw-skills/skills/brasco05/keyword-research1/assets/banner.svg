<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="200" fill="url(#accent)" rx="2"/>

  <!-- Search icon -->
  <circle cx="72" cy="95" r="22" fill="none" stroke="#6366f1" stroke-width="3"/>
  <line x1="88" y1="111" x2="102" y2="125" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>

  <!-- Title -->
  <text x="130" y="85" font-family="ui-monospace, monospace" font-size="28" font-weight="700" fill="#f8fafc">keyword-research</text>

  <!-- Subtitle -->
  <text x="130" y="118" font-family="ui-sans-serif, sans-serif" font-size="15" fill="#94a3b8">Multi-source keyword autocomplete · Google · YouTube · Amazon · DuckDuckGo</text>

  <!-- Tags -->
  <rect x="130" y="138" width="56" height="22" rx="4" fill="#1e3a5f"/>
  <text x="158" y="153" font-family="ui-sans-serif, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">SEO</text>

  <rect x="194" y="138" width="100" height="22" rx="4" fill="#2d1f5e"/>
  <text x="244" y="153" font-family="ui-sans-serif, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">No API Key</text>

  <rect x="302" y="138" width="120" height="22" rx="4" fill="#1a3a2a"/>
  <text x="362" y="153" font-family="ui-sans-serif, sans-serif" font-size="11" fill="#4ade80" text-anchor="middle">Expand Mode 10x</text>

  <rect x="430" y="138" width="110" height="22" rx="4" fill="#2d2515"/>
  <text x="485" y="153" font-family="ui-sans-serif, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">Multi-language</text>

  <!-- by brasco05 -->
  <text x="776" y="180" font-family="ui-sans-serif, sans-serif" font-size="12" fill="#475569" text-anchor="end">by brasco05</text>
</svg>
