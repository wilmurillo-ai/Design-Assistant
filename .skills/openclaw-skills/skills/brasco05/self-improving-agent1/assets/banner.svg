<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Glow circle -->
  <circle cx="600" cy="280" r="200" fill="#6366f1" opacity="0.06"/>

  <!-- Brain emoji / icon area -->
  <text x="600" y="220" text-anchor="middle" font-size="80">🧠</text>

  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="900" fill="white" letter-spacing="-1">Self-Improving Agent</text>

  <!-- Accent line -->
  <rect x="480" y="330" width="240" height="4" rx="2" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#94a3b8">Your AI agent learns from every mistake — automatically</text>

  <!-- Tags -->
  <g transform="translate(310, 440)">
    <rect width="140" height="36" rx="18" fill="#1e293b" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="70" y="23" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a5b4fc">corrections</text>
  </g>
  <g transform="translate(465, 440)">
    <rect width="120" height="36" rx="18" fill="#1e293b" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="60" y="23" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a5b4fc">memory</text>
  </g>
  <g transform="translate(600, 440)">
    <rect width="160" height="36" rx="18" fill="#1e293b" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="80" y="23" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a5b4fc">auto-learning</text>
  </g>
  <g transform="translate(775, 440)">
    <rect width="120" height="36" rx="18" fill="#1e293b" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="60" y="23" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a5b4fc">openclaw</text>
  </g>

  <!-- Bottom author -->
  <text x="600" y="590" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#475569">by brasco05 · ClawhHub</text>
</svg>
