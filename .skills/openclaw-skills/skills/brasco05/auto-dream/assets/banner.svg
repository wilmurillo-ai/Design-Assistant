<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1a1035"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="300" cy="200" r="180" fill="#6366f1" opacity="0.08" filter="url(#blur)"/>
  <circle cx="900" cy="400" r="200" fill="#a855f7" opacity="0.08" filter="url(#blur)"/>
  <circle cx="600" cy="315" r="220" fill="#818cf8" opacity="0.05" filter="url(#blur)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.4">
    <circle cx="120" cy="80" r="1.5"/>
    <circle cx="250" cy="150" r="1"/>
    <circle cx="450" cy="60" r="1.5"/>
    <circle cx="700" cy="100" r="1"/>
    <circle cx="950" cy="70" r="2"/>
    <circle cx="1100" cy="120" r="1"/>
    <circle cx="80" cy="300" r="1"/>
    <circle cx="1150" cy="280" r="1.5"/>
    <circle cx="180" cy="450" r="1"/>
    <circle cx="1050" cy="500" r="1.5"/>
    <circle cx="380" cy="520" r="1"/>
    <circle cx="820" cy="560" r="1"/>
  </g>

  <!-- Moon emoji -->
  <text x="600" y="210" text-anchor="middle" font-size="72">🌙</text>

  <!-- Title -->
  <text x="600" y="295" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="900" fill="white" letter-spacing="-1">Auto Dream</text>

  <!-- Accent line -->
  <rect x="460" y="315" width="280" height="3" rx="2" fill="url(#glow)"/>

  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#94a3b8">Memory Consolidation · Repliziert Anthropic's Auto Dream</text>

  <!-- 4 phases -->
  <g transform="translate(160, 415)">
    <rect width="190" height="44" rx="22" fill="#1e293b" stroke="#818cf8" stroke-width="1" opacity="0.9"/>
    <text x="95" y="27" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#a5b4fc">🔍 Orient</text>
  </g>
  <g transform="translate(365, 415)">
    <rect width="190" height="44" rx="22" fill="#1e293b" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
    <text x="95" y="27" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#d8b4fe">📡 Gather</text>
  </g>
  <g transform="translate(570, 415)">
    <rect width="190" height="44" rx="22" fill="#1e293b" stroke="#818cf8" stroke-width="1" opacity="0.9"/>
    <text x="95" y="27" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#a5b4fc">🔀 Merge</text>
  </g>
  <g transform="translate(775, 415)">
    <rect width="190" height="44" rx="22" fill="#1e293b" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
    <text x="95" y="27" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#d8b4fe">✂️ Prune</text>
  </g>

  <!-- Author -->
  <text x="600" y="590" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#475569">by brasco05 · ClawhHub</text>
</svg>
