# ClawHub 技能配置
name: comfyui-markhub
slug: comfyui-markhub
version: 1.1.0
displayName: ComfyUI MarkHub - 全平台智能创作系统
description: 全平台智能创作系统 - 支持所有主流 ComfyUI 云平台 (RunPod, Vast.ai, Massed, Thinking Machines, 本地)
author: yun520-1
license: MIT
category: ai-creation

# 技能入口文件
main: markhub_core.py

# 依赖
dependencies:
  - requests
  - websocket-client
  - Pillow

# 系统要求
requirements:
  - Python 3.8+
  - python3
  - curl

# 标签
tags:
  - comfyui
  - ai-art
  - image-generation
  - video-generation
  - cloud-platform
  - runpod
  - vast-ai
  - stable-diffusion

# 使用示例
examples:
  - "python3 markhub_core.py -p \"A beautiful woman, cinematic lighting, 4k\""
  - "python3 markhub_core.py -p \"A woman dancing\" --video --duration 10"
  - "python3 markhub_core.py -p \"A cat playing\" --auto"

