<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试外部 CSS 嵌入</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f3f4f6;
}

.slide {
    width: 1280px;
    height: 720px;
    background: white;
    padding: 80px;
}

.title {
    font-size: 64px;
    font-weight: bold;
    color: #2563eb;
    margin-bottom: 40px;
}

.content {
    font-size: 24px;
    color: #4b5563;
    line-height: 1.8;
}

</style>
    <style>
:root {
    --primary-color: #2563eb;
    --secondary-color: #7c3aed;
    --text-color: #1f2937;
}

.slide {
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
}

</style>
</head>
<body>
    <section class="slide">
        <h1 class="title">测试页面</h1>
        <p class="content">这个页面的 CSS 是外部引用的。</p>
    </section>
</body>
</html>
