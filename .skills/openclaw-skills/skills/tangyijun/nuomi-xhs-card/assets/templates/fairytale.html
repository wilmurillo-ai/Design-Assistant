<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
/* Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: {{CARD_WIDTH}}px;
    height: {{CARD_HEIGHT}}px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    -webkit-font-smoothing: antialiased;
}

:root {
    --spacing: 4px;
}

.card {
    width: {{CARD_WIDTH}}px;
    height: {{CARD_HEIGHT}}px;
    position: relative;
    line-height: 1.75;
    color: #24292e;
    font-size: calc(var(--spacing) * 4);
    word-wrap: break-word;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.card-header {
    height: 6px;
    flex-shrink: 0;
}

.card-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.card-content-inner {
    flex: 1;
    padding: 24px 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.main-title {
    color: rgba(0, 0, 0, 0.6);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 10px;
}

.title {
    font-size: 20px;
    color: #1a1a1a;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 16px;
}

.text {
    font-size: 14px;
    color: #333;
    line-height: 1.8;
    word-wrap: break-word;
    white-space: normal;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.text > *{
    margin: 0;
}

.card-footer {
    padding: 12px 20px 16px;
    display: flex;
    justify-content: flex-end;
    flex-shrink: 0;
}

.page-num {
    color: #6a737d;
    font-size: 11px;
}

.card h1, .card h2, .card h3 {
    margin-top: calc(var(--spacing) * 4);
    font-weight: 600;
    line-height: 1.25;
}

.card h1 { font-size: calc(var(--spacing) * 6); }
.card h2 { font-size: calc(var(--spacing) * 5); }
.card h3 { font-size: calc(var(--spacing) * 4.5); }

.card a { color: #0366d6; text-decoration: none; }
.card strong { font-weight: 600; }
.card em { font-style: italic; }

.card-content blockquote {
    border-left: 3px solid #8e8e93;
    margin-top: calc(var(--spacing) * 4);
    padding: calc(var(--spacing) * 2.5) calc(var(--spacing) * 5);
    font-style: italic;
}

.card-content ol, .card-content ul {
    padding-left: calc(var(--spacing) * 7);
    margin: calc(var(--spacing) * 4) 0;
}

.card-content ul > li {
    margin-top: calc(var(--spacing) * 2);
    list-style: disc;
}

.card-content code:not(pre code) {
    font-family: "SFMono-Regular", Consolas, monospace;
    background-color: rgba(0,0,0,0.05);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: calc(var(--spacing) * 3.5);
}

.card-content pre {
    background-color: rgba(0,0,0,0.05);
    border-radius: 6px;
    padding: calc(var(--spacing) * 3);
    font-size: calc(var(--spacing) * 3.25);
    overflow-x: auto;
    margin-top: calc(var(--spacing) * 4);
}

.card mark {
    background: rgba(248, 206, 64, 0.2);
    padding: 1px 3px;
    border-radius: 2px;
}

/* Theme-specific styles */
/* ===== 儿童童话风格 ===== */
/* 封面样式 */
.card-cover-fairytale {
  background: #fff9f9;
  position: relative;
  overflow: hidden;
}

/* 彩虹边框效果 */
.card-cover-fairytale:before {
  content: "";
  position: absolute;
  top: calc(var(--spacing) * -0.75);
  left: calc(var(--spacing) * -0.75);
  right: calc(var(--spacing) * -0.75);
  bottom: calc(var(--spacing) * -0.75);
  background: linear-gradient(
    45deg,
    #ffb7c5,
    #ffcc66,
    #a5c7fe,
    #c4a1ff,
    #ffb7c5
  );
  z-index: -1;
  border-radius: 23px;
}

/* 星星装饰 */
.card-cover-fairytale:after {
  content: "✨";
  position: absolute;
  top: calc(var(--spacing) * 2.5);
  right: calc(var(--spacing) * 3.75);
  font-size: calc(var(--spacing) * 6);
  color: #ffcc66;
  text-shadow: 0 0 5px rgba(255, 204, 102, 0.5);
  z-index: 30;
}

.card-cover-fairytale .cover-overlay {
  background: linear-gradient(
    to bottom,
    rgba(255, 255, 255, 0.1),
    rgba(255, 183, 197, 0.2)
  );
  z-index: 2;
}

/* 覆盖式布局 */
.card-cover-overlay.card-cover-fairytale .cover-content {
  background: linear-gradient(
    to top,
    rgba(255, 249, 249, 0.95),
    rgba(255, 249, 249, 0.8) 50%,
    rgba(255, 249, 249, 0) 100%
  );
  padding-top: calc(var(--spacing) * 15);
  z-index: 10;
}

/* 分离式布局 */
.card-cover-separate.card-cover-fairytale .cover-content {
  padding: calc(var(--spacing) * 6);
  z-index: 10;
  background: #f8f0ff; /* 柔和的淡紫色背景 */
  position: relative;
}

.card-cover-fairytale .cover-title {
  color: #5e7cff;
  letter-spacing: 1px;
  font-weight: 600;
  text-align: center;
  position: relative;
  padding-bottom: calc(var(--spacing) * 3.75);
}

.card-cover-fairytale .cover-title:after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: calc(var(--spacing) * 20);
  height: calc(var(--spacing) * 0.75);
  background: linear-gradient(to right, #ffb7c5, #a5c7fe);
  border-radius: 3px;
}

.card-cover-fairytale .cover-description {
  color: #555;
  text-align: center;
}

.card-cover-fairytale .cover-tag {
  background: rgba(165, 199, 254, 0.2);
  color: #7a6cb0;
  border: 1px solid rgba(165, 199, 254, 0.4);
  border-radius: 20px;
  transition: all 0.3s ease;
}

.card-cover-fairytale .cover-tag:hover {
  background: rgba(165, 199, 254, 0.3);
  transform: translateY(-2px) rotate(-2deg);
  box-shadow: 0 4px 8px rgba(165, 199, 254, 0.3);
}

.card-cover-fairytale .cover-date {
  color: #888;
  font-style: italic;
}

.card-fairytale {
  width: 100%;
  background: #f8f0ff; /* 柔和的淡紫色背景 */
  padding: calc(var(--spacing) * 7.5) calc(var(--spacing) * 6.25);
  position: relative;
  box-shadow: 0 10px 25px rgba(150, 180, 255, 0.2);
  --highlight-color: #5e7cff;
  --highlight-bg-color: rgba(94, 124, 255, 0.1);
}

/* 童话书页边框效果 */
.card-fairytale:before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  border: 15px solid transparent;
  border-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M0,0 C20,10 30,30 20,50 C10,70 30,90 50,100 C70,90 90,70 80,50 C70,30 80,10 100,0 C90,20 70,30 50,20 C30,30 10,20 0,0 Z" fill="none" stroke="%23a5c7fe" stroke-width="2"/></svg>')
    30 stretch;
  pointer-events: none;
  z-index: 2;
}

/* 右上角童话星星装饰 */
.card-fairytale:after {
  content: "★";
  position: absolute;
  top: calc(var(--spacing) * 3.75);
  right: calc(var(--spacing) * 5);
  font-size: calc(var(--spacing) * 6);
  color: #ffcc66;
  text-shadow: 0 0 5px rgba(255, 204, 102, 0.5);
  z-index: 3;
}

/* 左下角云朵装饰 */
.card-fairytale .card-content:before {
  content: "";
  position: absolute;
  bottom: calc(var(--spacing) * -2.5);
  left: calc(var(--spacing) * -2.5);
  width: calc(var(--spacing) * 25);
  height: calc(var(--spacing) * 15);
  background: radial-gradient(
    50px 30px at 30px 30px,
    rgba(255, 255, 255, 0.8) 10%,
    rgba(255, 255, 255, 0.4) 60%,
    transparent 80%
  );
  border-radius: 50%;
  z-index: 1;
  transform: rotate(-5deg);
}

/* 右下角彩虹装饰 */
.card-fairytale .card-content:after {
  content: "";
  position: absolute;
  bottom: calc(var(--spacing) * 2.5);
  right: calc(var(--spacing) * 2.5);
  width: calc(var(--spacing) * 20);
  height: calc(var(--spacing) * 10);
  background: linear-gradient(
    to bottom,
    rgba(255, 183, 197, 0.3),
    rgba(255, 204, 102, 0.3),
    rgba(165, 199, 254, 0.3)
  );
  border-radius: 40px 40px 0 0;
  z-index: 1;
  opacity: 0.7;
}

.card-fairytale .card-content-inner {
  position: relative;
  z-index: 3;
}

.card-fairytale .card-content {
  position: relative;
  background: rgba(255, 255, 255, 0.7);
  padding: calc(var(--spacing) * 5);
  height: calc(var(--card-height) - calc(var(--spacing) * 20));
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(165, 199, 254, 0.2);
}

/* 主标题样式 - 童话风格 */
.card-fairytale h1 {
  font-size: calc(var(--spacing) * 7);
  position: relative;
  color: #5e7cff;
  margin-bottom: calc(var(--spacing) * 3.75);
  letter-spacing: 1px;
  font-weight: 600;
  text-align: center;
  padding: calc(var(--spacing) * 1.25) 0;
  text-shadow: 1px 1px 2px rgba(165, 199, 254, 0.5);
}

/* 标题童话装饰 */
.card-fairytale h1:before {
  content: "✿";
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  color: #ffb7c5;
  font-size: calc(var(--spacing) * 5);
}

.card-fairytale h1:after {
  content: "✿";
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  color: #ffb7c5;
  font-size: calc(var(--spacing) * 5);
}

/* 副标题样式 */
.card-fairytale h2 {
  font-size: calc(var(--spacing) * 4.5);
  color: #7a6cb0;
  margin-bottom: calc(var(--spacing) * 5);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-align: center;
  position: relative;
  padding-bottom: calc(var(--spacing) * 3.75);
}

.card-fairytale h2:after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: calc(var(--spacing) * 20);
  height: calc(var(--spacing) * 0.75);
  background: linear-gradient(to right, #ffb7c5, #a5c7fe);
  border-radius: 3px;
}

/* 段落样式 */
.card-fairytale li,
.card-fairytale p {
  color: #555;
}

.card-fairytale strong {
  color: #5e7cff;
  font-weight: 600;
}

.card-fairytale em {
  color: #ff8eb2;
  font-style: italic;
}

.card-fairytale p a {
  color: #7a6cb0;
  text-decoration: none;
  border-bottom: 1px dashed #a5c7fe;
  transition: all 0.3s ease;
}

.card-fairytale p a:hover {
  color: #5e7cff;
  border-bottom: 1px solid #5e7cff;
}

/* 有序列表样式 - 童话风格数字 */
.card-fairytale li {
  position: relative;
  list-style: none;
  margin-bottom: calc(var(--spacing) * 5);
  color: #555;
  font-size: inherit;
}

/* 序号童话风格 */
.card-fairytale li:before {
  content: attr(data-index);
  position: absolute;
  left: calc(var(--spacing) * -7);
  top: calc(var(--spacing) * 0.5);
  width: calc(var(--spacing) * 6);
  height: calc(var(--spacing) * 6);
  border-radius: 50%;
  background: linear-gradient(135deg, #ffb7c5, #a5c7fe);
  color: white;
  text-align: center;
  line-height: calc(var(--spacing) * 6);
  font-weight: bold;
  box-shadow: 0 2px 5px rgba(165, 199, 254, 0.3);
}

/* 小标题样式 */
.card-fairytale h3 {
  display: block;
  color: #5e7cff;
  margin-bottom: calc(var(--spacing) * 1.5);
  font-size: calc(var(--spacing) * 4.25);
  font-weight: 600;
}

/* 表格样式 */
.card-fairytale table {
  box-shadow: 0 4px 15px rgba(165, 199, 254, 0.2);
  border-radius: 10px;
  overflow: hidden;
  border-collapse: collapse;
  margin: calc(var(--spacing) * 5) 0;
  border: 2px dashed #a5c7fe;
}

.card-fairytale th {
  background-color: rgba(165, 199, 254, 0.2);
  color: #5e7cff;
  padding: calc(var(--spacing) * 2.5) calc(var(--spacing) * 3.75);
  text-align: left;
  border-bottom: 2px dashed #a5c7fe;
}

.card-fairytale td {
  color: #555;
  padding: calc(var(--spacing) * 2.5) calc(var(--spacing) * 3.75);
  border-bottom: 1px dashed #a5c7fe;
}

.card-fairytale tr:nth-child(even) {
  background-color: rgba(248, 240, 255, 0.5);
}

/* 代码块样式 */
.card-fairytale pre {
  border: 2px dashed #a5c7fe;
  box-shadow: 0 4px 15px rgba(165, 199, 254, 0.1);
  background-color: rgba(248, 240, 255, 0.7);
  border-radius: 10px;
  padding: calc(var(--spacing) * 3.75);
  overflow-x: auto;
}

.card-fairytale code:not(pre code) {
  background-color: rgba(165, 199, 254, 0.2);
  color: #7a6cb0;
  padding: calc(var(--spacing) * 0.5) calc(var(--spacing) * 1.25);
  border-radius: 4px;
}

/* 引用块样式 */
.card-fairytale blockquote {
  background-color: rgba(248, 240, 255, 0.7);
  border-left: 4px solid #ffb7c5;
  color: #7a6cb0;
  padding: calc(var(--spacing) * 3.75) calc(var(--spacing) * 5);
  margin: calc(var(--spacing) * 5) 0;
  border-radius: 0 10px 10px 0;
  font-style: italic;
}

.card-content ol,
.card-content ul {
  padding-left: calc(var(--spacing) * 9);
}
.card-fairytale ul > li:before {
  content: "✧";
  color: #ffcc66;
  font-size: calc(var(--spacing) * 4);
}

/* 水平线样式 */
.card-fairytale hr {
  height: calc(var(--spacing) * 0.75);
  border: none;
  background: repeating-linear-gradient(
    90deg,
    #ffb7c5,
    #ffb7c5 10px,
    #a5c7fe 10px,
    #a5c7fe 20px
  );
  border-radius: 3px;
  margin: calc(var(--spacing) * 6.25) 0;
}

/* 图片样式 */
.card-fairytale img {
  border: 3px solid white;
  box-shadow: 0 5px 15px rgba(165, 199, 254, 0.3);
  border-radius: 15px;
  max-width: 100%;
  height: auto;
  transition: transform 0.3s ease;
}

/* 添加童话风格的页脚装饰 */
.card-fairytale .card-footer {
  text-align: center;
  margin-top: calc(var(--spacing) * 2.5);
  font-size: calc(var(--spacing) * 3.5);
  color: #7a6cb0;
  position: relative;
}

.card-fairytale .card-footer:before {
  content: "~ ✧ ~";
  display: block;
  color: #ffcc66;
  margin-bottom: calc(var(--spacing) * 1.25);
}

.card-fairytale .card-footer .page {
  font-size: calc(var(--spacing) * 3);
  color: #6a737d;
  position: absolute;
  right: calc(var(--spacing) * 2.5);
  bottom: calc(var(--spacing) * 2.5);
  line-height: 1.5;
}

    </style>
</head>
<body>
    <div class="card card-fairytale">
        <div class="card-header"></div>
        <div class="card-content">
            <div class="card-content-inner">
                {{MAIN_TITLE}}
                {{TITLE}}
                <div class="text">{{TEXT}}</div>
            </div>
        </div>
        <div class="card-footer">
            <span class="page-num">{{PAGE_NUM}}</span>
        </div>
    </div>
</body>
</html>
