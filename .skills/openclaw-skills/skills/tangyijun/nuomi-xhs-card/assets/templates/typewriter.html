<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
/* Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: {{CARD_WIDTH}}px;
    height: {{CARD_HEIGHT}}px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    -webkit-font-smoothing: antialiased;
}

:root {
    --spacing: 4px;
}

.card {
    width: {{CARD_WIDTH}}px;
    height: {{CARD_HEIGHT}}px;
    position: relative;
    line-height: 1.75;
    color: #24292e;
    font-size: calc(var(--spacing) * 4);
    word-wrap: break-word;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.card-header {
    height: 6px;
    flex-shrink: 0;
}

.card-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.card-content-inner {
    flex: 1;
    padding: 24px 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.main-title {
    color: rgba(0, 0, 0, 0.6);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 10px;
}

.title {
    font-size: 20px;
    color: #1a1a1a;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 16px;
}

.text {
    font-size: 14px;
    color: #333;
    line-height: 1.8;
    word-wrap: break-word;
    white-space: normal;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.text > *{
    margin: 0;
}

.card-footer {
    padding: 12px 20px 16px;
    display: flex;
    justify-content: flex-end;
    flex-shrink: 0;
}

.page-num {
    color: #6a737d;
    font-size: 11px;
}

.card h1, .card h2, .card h3 {
    margin-top: calc(var(--spacing) * 4);
    font-weight: 600;
    line-height: 1.25;
}

.card h1 { font-size: calc(var(--spacing) * 6); }
.card h2 { font-size: calc(var(--spacing) * 5); }
.card h3 { font-size: calc(var(--spacing) * 4.5); }

.card a { color: #0366d6; text-decoration: none; }
.card strong { font-weight: 600; }
.card em { font-style: italic; }

.card-content blockquote {
    border-left: 3px solid #8e8e93;
    margin-top: calc(var(--spacing) * 4);
    padding: calc(var(--spacing) * 2.5) calc(var(--spacing) * 5);
    font-style: italic;
}

.card-content ol, .card-content ul {
    padding-left: calc(var(--spacing) * 7);
    margin: calc(var(--spacing) * 4) 0;
}

.card-content ul > li {
    margin-top: calc(var(--spacing) * 2);
    list-style: disc;
}

.card-content code:not(pre code) {
    font-family: "SFMono-Regular", Consolas, monospace;
    background-color: rgba(0,0,0,0.05);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: calc(var(--spacing) * 3.5);
}

.card-content pre {
    background-color: rgba(0,0,0,0.05);
    border-radius: 6px;
    padding: calc(var(--spacing) * 3);
    font-size: calc(var(--spacing) * 3.25);
    overflow-x: auto;
    margin-top: calc(var(--spacing) * 4);
}

.card mark {
    background: rgba(248, 206, 64, 0.2);
    padding: 1px 3px;
    border-radius: 2px;
}

/* Theme-specific styles */
/* ===== 复古打字机风格 ===== */
/* 封面样式*/
.card-cover-typewriter {
  background: #f8f3e3;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
  position: relative;
  overflow: hidden;
  border: 1px solid #d3c6a6;
}

/* 纸张纹理效果 */
.card-cover-typewriter:before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23d3c6a6' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
  opacity: 0.5;
  z-index: 1;
}

/* 纸张边缘效果 */
.card-cover-typewriter:after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: calc(var(--spacing) * 1.25);
  background-image: linear-gradient(
    90deg,
    transparent 0%,
    rgba(0, 0, 0, 0.05) 50%,
    transparent 100%
  );
  z-index: 30;
}

.card-cover-typewriter .cover-overlay {
  background: linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0.05),
    rgba(0, 0, 0, 0.2)
  );
  z-index: 2;
}

/* 覆盖式布局 */
.card-cover-overlay.card-cover-typewriter .cover-content {
  background: linear-gradient(
    to top,
    rgba(248, 243, 227, 0.95),
    rgba(248, 243, 227, 0.8) 50%,
    rgba(248, 243, 227, 0) 100%
  );
  padding-top: calc(var(--spacing) * 15);
  z-index: 10;
}

/* 分离式布局 */
.card-cover-separate.card-cover-typewriter .cover-content {
  background: rgba(248, 243, 227, 0.9);
  border-top: 1px solid #d3c6a6;
  padding: calc(var(--spacing) * 6);
  position: relative;
  z-index: 10;
}

.card-cover-typewriter .cover-title {
  color: #3a3a3a;
  letter-spacing: -0.5px;
  font-weight: 600;
  text-align: center;
  position: relative;
  padding-bottom: calc(var(--spacing) * 2.5);
}

.card-cover-typewriter .cover-title:after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: calc(var(--spacing) * 25);
  height: calc(var(--spacing) * 0.5);
  background: rgba(58, 58, 58, 0.2);
}

.card-cover-typewriter .cover-description {
  color: #5a5a5a;
  text-align: center;
  font-style: italic;
  letter-spacing: -0.3px;
}

.card-cover-typewriter .cover-tag {
  background: rgba(211, 198, 166, 0.3);
  color: #8b4513;
  border: 1px solid rgba(139, 69, 19, 0.3);
  border-radius: 2px;
  letter-spacing: -0.3px;
  transition: all 0.3s ease;
}

.card-cover-typewriter .cover-tag:hover {
  background: rgba(211, 198, 166, 0.5);
  transform: translateY(-2px);
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}

.card-cover-typewriter .cover-date {
  color: #5a5a5a;
  font-style: italic;
  letter-spacing: -0.3px;
}

/* 卡片样式*/
.card-typewriter {
  width: 100%;
  background: #f8f3e3;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
  padding: calc(var(--spacing) * 7.5) calc(var(--spacing) * 6.25);
  position: relative;
  border: 1px solid #d3c6a6;
  --highlight-color: #8b4513;
  --highlight-bg-color: rgba(211, 198, 166, 0.3);
}

/* 纸张纹理效果 */
.card-typewriter:before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23d3c6a6' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
  opacity: 0.5;
  z-index: 0;
}

/* 纸张边缘效果 */
.card-typewriter:after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: calc(var(--spacing) * 1.25);
  background-image: linear-gradient(
    90deg,
    transparent 0%,
    rgba(0, 0, 0, 0.05) 50%,
    transparent 100%
  );
}

.card-typewriter .card-content {
  position: relative;
  z-index: 1;
  background: rgba(248, 243, 227, 0.7);
  border: 1px solid rgba(211, 198, 166, 0.3);
  padding: calc(var(--spacing) * 5);
  border-radius: 2px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  height: 100%;
}

.card-typewriter .card-content-inner {
  position: relative;
  z-index: 1;
}

/* 主标题样式 */
.card-typewriter h1 {
  font-size: calc(var(--spacing) * 6);
  color: #3a3a3a;
  margin-bottom: calc(var(--spacing) * 3.75);
  letter-spacing: -0.5px;
  font-weight: 600;
  text-align: center;
  position: relative;
  padding-bottom: calc(var(--spacing) * 2.5);
}

.card-typewriter h1:after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: calc(var(--spacing) * 25);
  height: calc(var(--spacing) * 0.5);
  background: rgba(58, 58, 58, 0.2);
}

/* 副标题样式 */
.card-typewriter h2 {
  font-size: calc(var(--spacing) * 4);
  color: #5a5a5a;
  margin-bottom: calc(var(--spacing) * 6);
  font-weight: 400;
  letter-spacing: -0.5px;
  text-align: center;
  font-style: italic;
}

/* 段落样式 */
.card-typewriter p {
  color: #3a3a3a;
  font-size: inherit;
  position: relative;
}

.card-typewriter strong {
  color: #000;
  font-weight: 600;
}

.card-typewriter em {
  color: #5a5a5a;
  font-style: italic;
}

.card-typewriter p a {
  color: #8b4513;
  text-decoration: none;
  border-bottom: 1px dashed #8b4513;
  transition: all 0.3s ease;
  position: relative;
}

.card-typewriter p a:hover {
  color: #5e2f0d;
  border-bottom: 1px solid #5e2f0d;
}

/* 有序列表样式 */

.card-typewriter li {
  position: relative;
  counter-increment: item;
  list-style: none;
  margin-bottom: calc(var(--spacing) * 4);
  color: #3a3a3a;
  line-height: 1.6;
  font-size: inherit;
  letter-spacing: -0.3px;
}

/* 序号样式 */
.card-typewriter li:before {
  content: attr(data-index);
  position: absolute;
  left: calc(var(--spacing) * -9);
  top: calc(var(--spacing) * 0.5);
  width: calc(var(--spacing) * 7);
  height: calc(var(--spacing) * 7);
  background: rgba(211, 198, 166, 0.3);
  border: 1px solid rgba(139, 69, 19, 0.3);
  color: #8b4513;
  text-align: center;
  line-height: calc(var(--spacing) * 6.5);
  font-weight: bold;
  border-radius: 50%;
}

/* 小标题样式 */
.card-typewriter h3 {
  display: block;
  color: #3a3a3a;
  margin-bottom: calc(var(--spacing) * 1.5);
  font-size: calc(var(--spacing) * 4);
  font-weight: 600;
  letter-spacing: -0.5px;
  text-decoration: underline;
  text-decoration-color: rgba(139, 69, 19, 0.3);
  text-underline-offset: 3px;
}

/* 表格样式 */
.card-typewriter table {
  width: 100%;
  border-collapse: collapse;
  margin: calc(var(--spacing) * 5) 0;
  background: rgba(248, 243, 227, 0.5);
  border: 1px solid #d3c6a6;
}

.card-typewriter th {
  background: rgba(211, 198, 166, 0.2);
  color: #3a3a3a;
  border-bottom: 1px solid #d3c6a6;
  padding: calc(var(--spacing) * 2.5);
  font-weight: 600;
  text-align: left;
  letter-spacing: -0.5px;
}

.card-typewriter td {
  color: #3a3a3a;
  padding: calc(var(--spacing) * 2.5);
  border-bottom: 1px solid rgba(211, 198, 166, 0.5);
  letter-spacing: -0.3px;
}

.card-typewriter tr:nth-child(even) {
  background: rgba(211, 198, 166, 0.1);
}

/* 代码块样式 */
.card-typewriter pre {
  background: rgba(211, 198, 166, 0.2);
  border: 1px solid #d3c6a6;
  border-radius: 2px;
  padding: calc(var(--spacing) * 3.75);
  overflow-x: auto;
  position: relative;
}

.card-typewriter code:not(pre code) {
  background: rgba(211, 198, 166, 0.2);
  color: #8b4513;
  padding: calc(var(--spacing) * 0.5) calc(var(--spacing) * 1.25);
  border-radius: 2px;
  font-size: calc(var(--spacing) * 3.6);
  border: 1px solid rgba(211, 198, 166, 0.5);
}

/* 引用块样式 */
.card-typewriter blockquote {
  background: rgba(211, 198, 166, 0.1);
  border-left: 3px solid #d3c6a6;
  color: #5a5a5a;
  padding: calc(var(--spacing) * 3.75) calc(var(--spacing) * 5);
  margin: calc(var(--spacing) * 5) 0;
  font-style: italic;
  position: relative;
  border-radius: 0 2px 2px 0;
}

.card-typewriter blockquote:before {
  content: "“";
  position: absolute;
  left: calc(var(--spacing) * 1.25);
  top: calc(var(--spacing) * 1.25);
  color: rgba(139, 69, 19, 0.3);
  font-size: calc(var(--spacing) * 6);
}

.card-content ol,
.card-content ul {
  padding-left: calc(var(--spacing) * 10);
}
.card-typewriter ul > li {
  position: relative;
  list-style: none;
  margin-bottom: calc(var(--spacing) * 3);
  line-height: 1.6;
}

.card-typewriter ul > li:before {
  content: "✓";
  color: #8b4513;
  font-weight: bold;
  font-size: calc(var(--spacing) * 3);
}

/* 水平线样式 */
.card-typewriter hr {
  border: 0;
  height: calc(var(--spacing) * 0.25);
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 5px,
    #d3c6a6 5px,
    #d3c6a6 10px
  );
  margin: calc(var(--spacing) * 6.25) 0;
  opacity: 0.7;
}

/* 图片样式 */
.card-typewriter img {
  max-width: 100%;
  border: 1px solid #d3c6a6;
  border-radius: 2px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  padding: calc(var(--spacing) * 1.25);
  background: #fff;
}

/* 打字机笔记效果 */
.card-typewriter .typed-note {
  background: rgba(211, 198, 166, 0.2);
  border: 1px solid #d3c6a6;
  border-radius: 2px;
  padding: calc(var(--spacing) * 3.75);
  margin: calc(var(--spacing) * 5) 0;
  position: relative;
  color: #3a3a3a;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
}

.card-typewriter .typed-note:before {
  content: "NOTE";
  position: absolute;
  top: calc(var(--spacing) * -2);
  left: calc(var(--spacing) * 2.5);
  background: #f8f3e3;
  color: #8b4513;
  font-size: calc(var(--spacing) * 2.5);
  padding: 0 calc(var(--spacing) * 1.25);
  border: 1px solid #d3c6a6;
}

.card-typewriter .card-footer {
  text-align: right;
}

.card-typewriter .card-footer .page {
  font-size: calc(var(--spacing) * 3);
}

    </style>
</head>
<body>
    <div class="card card-typewriter">
        <div class="card-header"></div>
        <div class="card-content">
            <div class="card-content-inner">
                {{MAIN_TITLE}}
                {{TITLE}}
                <div class="text">{{TEXT}}</div>
            </div>
        </div>
        <div class="card-footer">
            <span class="page-num">{{PAGE_NUM}}</span>
        </div>
    </div>
</body>
</html>
