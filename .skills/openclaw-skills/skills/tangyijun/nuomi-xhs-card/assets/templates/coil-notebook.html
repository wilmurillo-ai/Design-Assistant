<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
/* Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: {{CARD_WIDTH}}px;
    height: {{CARD_HEIGHT}}px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    -webkit-font-smoothing: antialiased;
}

:root {
    --spacing: 4px;
}

.card {
    width: {{CARD_WIDTH}}px;
    height: {{CARD_HEIGHT}}px;
    position: relative;
    line-height: 1.75;
    color: #24292e;
    font-size: calc(var(--spacing) * 4);
    word-wrap: break-word;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.card-header {
    height: 6px;
    flex-shrink: 0;
}

.card-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.card-content-inner {
    flex: 1;
    padding: 24px 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.main-title {
    color: rgba(0, 0, 0, 0.6);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 10px;
}

.title {
    font-size: 20px;
    color: #1a1a1a;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 16px;
}

.text {
    font-size: 14px;
    color: #333;
    line-height: 1.8;
    word-wrap: break-word;
    white-space: normal;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.text > *{
    margin: 0;
}

.card-footer {
    padding: 12px 20px 16px;
    display: flex;
    justify-content: flex-end;
    flex-shrink: 0;
}

.page-num {
    color: #6a737d;
    font-size: 11px;
}

.card h1, .card h2, .card h3 {
    margin-top: calc(var(--spacing) * 4);
    font-weight: 600;
    line-height: 1.25;
}

.card h1 { font-size: calc(var(--spacing) * 6); }
.card h2 { font-size: calc(var(--spacing) * 5); }
.card h3 { font-size: calc(var(--spacing) * 4.5); }

.card a { color: #0366d6; text-decoration: none; }
.card strong { font-weight: 600; }
.card em { font-style: italic; }

.card-content blockquote {
    border-left: 3px solid #8e8e93;
    margin-top: calc(var(--spacing) * 4);
    padding: calc(var(--spacing) * 2.5) calc(var(--spacing) * 5);
    font-style: italic;
}

.card-content ol, .card-content ul {
    padding-left: calc(var(--spacing) * 7);
    margin: calc(var(--spacing) * 4) 0;
}

.card-content ul > li {
    margin-top: calc(var(--spacing) * 2);
    list-style: disc;
}

.card-content code:not(pre code) {
    font-family: "SFMono-Regular", Consolas, monospace;
    background-color: rgba(0,0,0,0.05);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: calc(var(--spacing) * 3.5);
}

.card-content pre {
    background-color: rgba(0,0,0,0.05);
    border-radius: 6px;
    padding: calc(var(--spacing) * 3);
    font-size: calc(var(--spacing) * 3.25);
    overflow-x: auto;
    margin-top: calc(var(--spacing) * 4);
}

.card mark {
    background: rgba(248, 206, 64, 0.2);
    padding: 1px 3px;
    border-radius: 2px;
}

/* Theme-specific styles */
/* 颜色变量定义 */
.card-coil-notebook {
  /* 基础颜色 */
  --coil-text: #24292e;
  --coil-border: #a6a6a6;

  /* 背景模式变量 */
  --coil-bg-color: #5271ff;
  --coil-grid-color: rgba(255, 255, 255, 0.2);
  --coil-content-bg: #fff;
  --coil-list-bg: rgba(255, 255, 255, 0.7);
  --coil-shadow: rgba(0, 0, 0, 0.1);
}

/* 小红书粉色主题 */
.card-coil-notebook.pink-mode {
  --coil-bg-color: #ff4e79;
}

/* 小红书薄荷绿主题 */
.card-coil-notebook.mint-mode {
  --coil-bg-color: #7fd1ae;
}

/* 小红书暖黄主题 */
.card-coil-notebook.yellow-mode {
  --coil-bg-color: #ffd666;
  --coil-grid-color: rgba(0, 0, 0, 0.1);
  --coil-list-bg: rgba(255, 255, 255, 0.9);
}

/* 线圈笔记本样式 */
.card-coil-notebook {
  background-color: var(--coil-bg-color) !important;
  background-image:
    linear-gradient(var(--coil-grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--coil-grid-color) 1px, transparent 1px);
  background-size: 20px 20px;
  background-position: -5px -5px;
  padding: calc(var(--spacing) * 5);
}

.card-content {
  background-image: url("/img/assets/img/coil-bg.png");
  background-position: top left;
  background-repeat: repeat-y;
  background-size: calc(var(--spacing) * 10);
  padding-left: calc(var(--spacing) * 9);
  box-shadow: 0 2px 10px var(--coil-shadow);
}
.card-content-inner {
  height: calc(var(--card-height) - calc(var(--spacing) * 10));
  background: var(--coil-content-bg);
  padding: calc(var(--spacing) * 5) calc(var(--spacing) * 5)
    calc(var(--spacing) * 5) 0;
}

/* 列表样式 */
.card-content ul,
.card-content ol {
  background-color: var(--coil-list-bg);
  padding: calc(var(--spacing) * 3.75) calc(var(--spacing) * 3.75)
    calc(var(--spacing) * 3.75) calc(var(--spacing) * 9);
  border: 1px dashed var(--coil-border);
  border-radius: 8px;
}
.card-content li {
  margin: calc(var(--spacing) * 2.5) 0;
  position: relative;
}
.card-content li::before {
  background: #ffd666;
  position: absolute;
  left: calc(var(--spacing) * -7);
  top: calc(var(--spacing) * 0.5);
}
.card-content ul li::before {
  content: "★";
  color: var(--coil-text);
  font-size: calc(var(--spacing) * 3.5);
  background-size: 24px;
  background-repeat: no-repeat;
  background-position: center;
  width: calc(var(--spacing) * 6);
  height: calc(var(--spacing) * 6);
  border-radius: 50%;
  text-align: center;
  line-height: calc(var(--spacing) * 6);
}

.card-content ol li::before {
  content: attr(data-index);
  background-size: 24px;
  background-repeat: no-repeat;
  background-position: center;
  color: var(--coil-text);
  font-weight: 700;
  width: calc(var(--spacing) * 6);
  height: calc(var(--spacing) * 6);
  border-radius: 50%;
  text-align: center;
  line-height: calc(var(--spacing) * 6);
}

/* 响应式调整 */
@media (prefers-color-scheme: dark) {
  .card-coil-notebook {
    --coil-grid-color: rgba(255, 255, 255, 0.15);
    --coil-content-bg: #ffffff;
    --coil-list-bg: rgba(255, 255, 255, 0.8);
    --coil-shadow: rgba(0, 0, 0, 0.2);
  }
}

.card-coil-notebook .card-footer {
  position: relative;
}

.card-coil-notebook .card-footer .page {
  font-size: calc(var(--spacing) * 3);
  position: absolute;
  right: calc(var(--spacing) * 2.5);
  bottom: calc(var(--spacing) * 2.5);
}

    </style>
</head>
<body>
    <div class="card card-coil-notebook">
        <div class="card-header"></div>
        <div class="card-content">
            <div class="card-content-inner">
                {{MAIN_TITLE}}
                {{TITLE}}
                <div class="text">{{TEXT}}</div>
            </div>
        </div>
        <div class="card-footer">
            <span class="page-num">{{PAGE_NUM}}</span>
        </div>
    </div>
</body>
</html>
