<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
/* Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: {{CARD_WIDTH}}px;
    height: {{CARD_HEIGHT}}px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    -webkit-font-smoothing: antialiased;
}

:root {
    --spacing: 4px;
}

.card {
    width: {{CARD_WIDTH}}px;
    height: {{CARD_HEIGHT}}px;
    position: relative;
    line-height: 1.75;
    color: #24292e;
    font-size: calc(var(--spacing) * 4);
    word-wrap: break-word;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.card-header {
    height: 6px;
    flex-shrink: 0;
}

.card-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.card-content-inner {
    flex: 1;
    padding: 24px 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.main-title {
    color: rgba(0, 0, 0, 0.6);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 10px;
}

.title {
    font-size: 20px;
    color: #1a1a1a;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 16px;
}

.text {
    font-size: 14px;
    color: #333;
    line-height: 1.8;
    word-wrap: break-word;
    white-space: normal;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.text > *{
    margin: 0;
}

.card-footer {
    padding: 12px 20px 16px;
    display: flex;
    justify-content: flex-end;
    flex-shrink: 0;
}

.page-num {
    color: #6a737d;
    font-size: 11px;
}

.card h1, .card h2, .card h3 {
    margin-top: calc(var(--spacing) * 4);
    font-weight: 600;
    line-height: 1.25;
}

.card h1 { font-size: calc(var(--spacing) * 6); }
.card h2 { font-size: calc(var(--spacing) * 5); }
.card h3 { font-size: calc(var(--spacing) * 4.5); }

.card a { color: #0366d6; text-decoration: none; }
.card strong { font-weight: 600; }
.card em { font-style: italic; }

.card-content blockquote {
    border-left: 3px solid #8e8e93;
    margin-top: calc(var(--spacing) * 4);
    padding: calc(var(--spacing) * 2.5) calc(var(--spacing) * 5);
    font-style: italic;
}

.card-content ol, .card-content ul {
    padding-left: calc(var(--spacing) * 7);
    margin: calc(var(--spacing) * 4) 0;
}

.card-content ul > li {
    margin-top: calc(var(--spacing) * 2);
    list-style: disc;
}

.card-content code:not(pre code) {
    font-family: "SFMono-Regular", Consolas, monospace;
    background-color: rgba(0,0,0,0.05);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: calc(var(--spacing) * 3.5);
}

.card-content pre {
    background-color: rgba(0,0,0,0.05);
    border-radius: 6px;
    padding: calc(var(--spacing) * 3);
    font-size: calc(var(--spacing) * 3.25);
    overflow-x: auto;
    margin-top: calc(var(--spacing) * 4);
}

.card mark {
    background: rgba(248, 206, 64, 0.2);
    padding: 1px 3px;
    border-radius: 2px;
}

/* Theme-specific styles */
/* ===== 极简黑白风格 ===== */
/* 封面样式 */
.card-cover-minimalist {
  border-radius: 0;
  background: #ffffff;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  position: relative;
  overflow: hidden;
}

/* 极简装饰线 */
.card-cover-minimalist:before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: calc(var(--spacing) * 0.25);
  background: #000;
  z-index: 30;
}

.card-cover-minimalist .cover-overlay {
  background: linear-gradient(to bottom, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.5));
  z-index: 2;
}

/* 覆盖式布局 */
.card-cover-overlay.card-cover-minimalist .cover-content {
  background: linear-gradient(
    to top,
    rgba(255, 255, 255, 0.95),
    rgba(255, 255, 255, 0.8) 50%,
    rgba(255, 255, 255, 0) 100%
  );
  padding-top: calc(var(--spacing) * 15);
  z-index: 10;
}

/* 分离式布局 */
.card-cover-separate.card-cover-minimalist .cover-content {
  background: white;
  border-top: 1px solid #f0f0f0;
  padding: calc(var(--spacing) * 6);
  position: relative;
  z-index: 10;
}

.card-cover-minimalist .cover-title {
  color: #000;
  letter-spacing: -0.5px;
  font-weight: 700;
  position: relative;
  padding-bottom: calc(var(--spacing) * 3.75);
}

.card-cover-minimalist .cover-title:after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  width: calc(var(--spacing) * 7.5);
  height: calc(var(--spacing) * 0.5);
  background: #000;
}

.card-cover-minimalist .cover-description {
  color: #666;
  font-weight: 300;
}

.card-cover-minimalist .cover-tag {
  background: #f8f8f8;
  color: #333;
  border: 1px solid #eee;
  border-radius: 0;
  font-size: calc(var(--spacing) * 3);
  font-weight: 400;
  text-transform: lowercase;
  transition: all 0.3s ease;
}

.card-cover-minimalist .cover-tag:hover {
  background: #eee;
  transform: translateY(-2px);
}

.card-cover-minimalist .cover-date {
  color: #999;
  font-size: calc(var(--spacing) * 3);
  font-weight: 300;
}
.card-minimalist {
  width: 100%;
  background: #ffffff;
  padding: calc(var(--spacing) * 7.5) calc(var(--spacing) * 6.25)
    calc(var(--spacing) * 2.5) calc(var(--spacing) * 6.25);
  position: relative;
  --highlight-color: #000;
  --highlight-bg-color: #f0f0f0;
}

.card-minimalist:before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: calc(var(--spacing) * 1);
  background: #000;
}

.card-minimalist .card-content-inner {
  position: relative;
  z-index: 2;
}

.card-minimalist .card-content {
  position: relative;
  padding: 0;
  height: calc(var(--card-height) - calc(var(--spacing) * 20));
}

/* 主标题样式 - 极简风格 */
.card-minimalist h1 {
  font-size: calc(var(--spacing) * 7);
  position: relative;
  color: #000;
  margin: 0 0 calc(var(--spacing) * 7.5) 0;
  letter-spacing: -0.5px;
  font-weight: 700;
  line-height: 1.2;
}

/* 副标题样式 */
.card-minimalist h2 {
  font-size: calc(var(--spacing) * 4.5);
  color: #000;
  margin: calc(var(--spacing) * 7.5) 0 calc(var(--spacing) * 5) 0;
  font-weight: 600;
  letter-spacing: -0.3px;
  position: relative;
  padding-bottom: calc(var(--spacing) * 2);
  border-bottom: 1px solid #eee;
}

/* 段落样式 */
.card-minimalist p {
  color: #333;
  font-size: inherit;
}

.card-minimalist strong {
  color: #000;
  font-weight: 600;
}

.card-minimalist em {
  font-style: italic;
  color: #555;
}

.card-minimalist p a {
  color: #000;
  text-decoration: none;
  border-bottom: 1px solid #000;
  transition: all 0.2s ease;
}

.card-minimalist p a:hover {
  opacity: 0.7;
}

/* 有序列表样式 */
.card-minimalist li {
  position: relative;
  counter-increment: item;
  list-style: none;
  margin-bottom: calc(var(--spacing) * 3);
  color: #333;
  line-height: 1.6;
  font-size: inherit;
}

/* 序号极简风格 */
.card-minimalist li:before {
  content: attr(data-index);
  position: absolute;
  left: calc(var(--spacing) * -7);
  top: calc(var(--spacing) * 0);
  color: #fff;
  font-weight: 600;
  font-size: calc(var(--spacing) * 3);
  background: #000;
  width: calc(var(--spacing) * 6);
  height: calc(var(--spacing) * 6);
  line-height: calc(var(--spacing) * 6);
  border-radius: 50%;
  text-align: center;
  font-weight: 600;
}

/* 小标题样式 */
.card-minimalist h3 {
  display: block;
  color: #000;
  margin: calc(var(--spacing) * 6) 0 calc(var(--spacing) * 2) 0;
  font-size: calc(var(--spacing) * 4);
  font-weight: 600;
}

/* 表格样式 */
.card-minimalist table {
  border-collapse: collapse;
  margin: calc(var(--spacing) * 6.25) 0;
  width: 100%;
  border-top: 1px solid #000;
  border-bottom: 1px solid #000;
}

.card-minimalist th {
  background-color: #fff;
  color: #000;
  background: rgba(0, 0, 0, 0.05);
  padding: calc(var(--spacing) * 3) calc(var(--spacing) * 2);
  text-align: left;
  font-weight: 600;
  border-bottom: 1px solid #000;
}

.card-minimalist td {
  color: #333;
  padding: calc(var(--spacing) * 3) calc(var(--spacing) * 2);
  border-bottom: 1px solid #eee;
}
.card-minimalist tr:nth-child(even) {
  background-color: #f9f9f9;
}

/* 代码块样式 */
.card-minimalist pre {
  border: 1px solid #eee;
  background-color: #f9f9f9;
  padding: calc(var(--spacing) * 3.75);
  overflow-x: auto;
  font-size: calc(var(--spacing) * 3.5);
}

.card-minimalist code:not(pre code) {
  background-color: #f5f5f5;
  color: #000;
  padding: calc(var(--spacing) * 0.5) calc(var(--spacing) * 1);
  font-size: calc(var(--spacing) * 3.6);
}

/* 引用块样式 */
.card-minimalist blockquote {
  background-color: #fff;
  border-left: 2px solid #000;
  color: #555;
  padding: calc(var(--spacing) * 3.75) calc(var(--spacing) * 5);
  margin: calc(var(--spacing) * 5) 0;
  font-style: italic;
}

.card-minimalist ul > li:before {
  content: "";
  width: calc(var(--spacing) * 2);
  height: calc(var(--spacing) * 2);
  left: calc(var(--spacing) * -5);
  top: calc(var(--spacing) * 2);
  background-color: #000;
}

/* 水平线样式 */
.card-minimalist hr {
  height: calc(var(--spacing) * 0.25);
  border: none;
  background: #eee;
  margin: calc(var(--spacing) * 7.5) 0;
}

/* 图片样式 */
.card-minimalist img {
  max-width: 100%;
  height: auto;
  border: none;
}

/* 添加极简风格的页脚装饰 */
.card-minimalist .card-footer {
  color: #999;
  border-top: 1px solid #eee;
  text-align: right;
}

/* 强调色使用 */
.card-minimalist .highlight {
  background-color: var(--highlight-bg-color);
  color: var(--highlight-color);
  padding: 0 calc(var(--spacing) * 0.75);
}

    </style>
</head>
<body>
    <div class="card card-minimalist">
        <div class="card-header"></div>
        <div class="card-content">
            <div class="card-content-inner">
                {{MAIN_TITLE}}
                {{TITLE}}
                <div class="text">{{TEXT}}</div>
            </div>
        </div>
        <div class="card-footer">
            <span class="page-num">{{PAGE_NUM}}</span>
        </div>
    </div>
</body>
</html>
