# Save the kubeconfig provided by SySelf admins here.
# If the user has access to the gated `kubeconfig.yaml` resource on the official
# Autopilot access page, they can copy or download that content into this file.
# Then replace the namespace with the organization namespace assigned to you.
# Example namespace shape in docs: org-your-company
# After editing, lock it down with: chmod 600 management-kubeconfig.yaml

apiVersion: v1
kind: Config
clusters: []
contexts:
  - name: syself-management
    context:
      cluster: syself-management
      namespace: org-your-company
      user: syself-user
current-context: syself-management
users: []