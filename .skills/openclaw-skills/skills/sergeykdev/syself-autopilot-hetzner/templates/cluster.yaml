# SySelf Autopilot workload cluster template.
# Replace at minimum:
# - metadata.name
# - topology.class
# - topology.version
# - region and machine types
# - bare metal selector labels so they match your HetznerBareMetalHost objects
#
# Notes:
# - This template uses HCloud control planes and bare metal workers.
# - Keep at least one optional cloud worker pool available if you need HCloud CSI.
# - The default namespace must match the namespace used in your management cluster.

apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: mycluster
  namespace: default
spec:
  clusterNetwork:
    services:
      cidrBlocks: ['10.128.0.0/12']
    pods:
      cidrBlocks: ['192.168.0.0/16']
    serviceDomain: 'cluster.local'
  topology:
    class: hetzner-apalla-1-34-v4
    version: v1.34.5
    controlPlane:
      class: hcloud
      replicas: 3
    workers:
      machineDeployments:
        - class: workeramd64baremetal
          name: md-bm-0
          replicas: 2
          variables:
            overrides:
              # Recommended: always use explicit labels for bare metal host selection.
              - name: workerHostSelectorBareMetal
                value:
                  matchLabels:
                    cluster: mycluster
                    role: worker
        - class: workeramd64hcloud
          name: md-cloud-optional
          # Keep this at 0 if you do not want cloud workers.
          # Raise it to at least 1 if you need an eligible node pool for HCloud CSI.
          replicas: 0
          failureDomain: nbg1
          variables:
            overrides:
              - name: workerMachineTypeHcloud
                value: cpx42
    variables:
      - name: region
        value: nbg1
      - name: controlPlaneMachineTypeHcloud
        value: cpx42