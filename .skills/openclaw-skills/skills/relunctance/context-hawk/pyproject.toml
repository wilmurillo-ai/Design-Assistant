[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "context-hawk"
version = "1.0.0"
description = "🦅 AI Context Memory Guardian — auto-capture, auto-recall, 4-tier decay"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "relunctance", email = "334136724@qq.com"}
]
keywords = ["memory", "context", "agent", "openclaw", "hawk", "lancedb"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "lancedb>=0.10",
    "rank-bm25>=0.2",
    "tiktoken>=0.7",
]

[project.optional-dependencies]
api = ["openai>=1.0"]
all = [
    "openai>=1.0",
    "sentence-transformers>=2.0",
    "httpx>=0.25",
]

[project.urls]
Homepage = "https://github.com/relunctance/context-hawk"
Documentation = "https://github.com/relunctance/context-hawk#readme"

[project.scripts]
hawk-memory = "hawk.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["hawk*"]
exclude = ["tests*"]

[tool.setuptools.package-data]
hawk = ["py.typed"]
