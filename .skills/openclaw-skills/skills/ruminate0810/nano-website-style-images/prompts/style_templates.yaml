templates:
  - id: hero_banner
    name: "Hero Banner"
    filename: "01_hero_banner"
    prompt: >
      Generate a wide hero banner image ({dimensions} pixels, landscape orientation, ~3.2:1 aspect ratio).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - Wide panoramic composition suitable for a website header section
      - Strong visual hierarchy with a single clear focal point
      - Leave negative space on one side (left or right third) for potential text overlay
      - The composition should guide the eye from the focal point across the image
      - High resolution with crisp, sharp details
      - No placeholder text, lorem ipsum, or watermarks
      - The image should feel like a premium website hero section

  - id: social_square
    name: "Social Media Square"
    filename: "02_social_square"
    prompt: >
      Generate a square social media post image ({dimensions} pixels, 1:1 aspect ratio).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - Square composition optimized for Instagram and Facebook feeds
      - Eye-catching design that immediately stands out in a scrolling feed
      - Subject centered or positioned using rule-of-thirds
      - Bold, clear visual message readable at small sizes (mobile thumbnail)
      - Strong contrast between foreground and background elements
      - No placeholder text — only include text if explicitly described in content
      - Should feel native to social media while maintaining brand consistency

  - id: social_story
    name: "Social Media Story"
    filename: "03_social_story"
    prompt: >
      Generate a vertical social media story image ({dimensions} pixels, 9:16 portrait orientation).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - Tall vertical composition for Instagram/TikTok stories
      - Keep safe zones: top 15% and bottom 15% should be less critical content (UI overlays)
      - Primary content in the center 70% of the vertical space
      - Immersive, full-bleed design that fills the entire frame
      - Mobile-first visual impact — must look stunning on phone screens
      - No placeholder text — only include text if explicitly described in content
      - Should feel dynamic, engaging, and scroll-stopping

  - id: social_landscape
    name: "Social Media Landscape"
    filename: "04_social_landscape"
    prompt: >
      Generate a landscape social media image ({dimensions} pixels, ~1.91:1 aspect ratio).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - Landscape composition for Facebook/LinkedIn sharing and link previews
      - Subject clearly visible even when cropped to slightly different ratios
      - Professional appearance suitable for business social media
      - Balanced layout that works both standalone and as a link preview card
      - No placeholder text — only include text if explicitly described in content
      - Clean, uncluttered composition with clear visual hierarchy

  - id: product_display
    name: "Product Display"
    filename: "05_product_display"
    prompt: >
      Generate a product display image ({dimensions} pixels, 1:1 square aspect ratio).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - Clean product showcase with the item as the unambiguous focal point
      - Professional product photography aesthetic with studio-quality lighting
      - Subtle background that complements without competing with the product
      - Product should occupy 60-80% of the frame
      - Fine detail visible on the product (textures, materials, finishes)
      - No placeholder text — only include text if explicitly described in content
      - Lighting should reveal form, depth, and material quality

  - id: blog_header
    name: "Blog Header"
    filename: "06_blog_header"
    prompt: >
      Generate a blog header image ({dimensions} pixels, ~1.91:1 landscape aspect ratio).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - Wide composition suitable for a blog post header or article hero
      - Conceptual or illustrative — should visually communicate the topic
      - Include a region (darker or lighter area) suitable for title text overlay
      - Not too busy — should work as a backdrop for overlaid text
      - Editorial, magazine-quality polish
      - No placeholder text — only include text if explicitly described in content
      - Evocative and atmospheric rather than literal

  - id: ad_banner
    name: "Ad Banner"
    filename: "07_ad_banner"
    prompt: >
      Generate a digital advertising banner image ({dimensions} pixels, ~1.91:1 landscape aspect ratio).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - High-impact advertising composition designed to capture attention
      - Clear visual focal point that communicates the message instantly
      - Reserved space for a call-to-action button (lower-right or center-right)
      - Bold, attention-grabbing design within the brand style guidelines
      - Must be effective at various display sizes (responsive)
      - No placeholder text — only include text if explicitly described in content
      - Should feel like a premium digital advertisement, not a stock photo

  - id: email_header
    name: "Email Header"
    filename: "09_email_header"
    prompt: >
      Generate an email marketing header image ({dimensions} pixels, 3:1 wide aspect ratio).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - Ultra-wide composition for email header (600×200)
      - Must be visually impactful at small size — emails are read on mobile
      - Simple, bold design with one clear focal point
      - Avoid fine details that get lost at small rendering sizes
      - No placeholder text — only include text if explicitly described in content
      - Should feel like a premium email campaign header

  - id: app_splash
    name: "App Splash Screen"
    filename: "10_app_splash"
    prompt: >
      Generate a mobile app splash/launch screen image ({dimensions} pixels, 9:19.5 portrait).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - Full-screen mobile portrait composition
      - Center the brand visual or logo concept in the middle 60% of the screen
      - Top and bottom 20% should be clean for status bar and loading indicator
      - Immersive, polished, app-quality visual
      - Should feel like opening a premium mobile application
      - No placeholder text — only include text if explicitly described in content

  - id: presentation_slide
    name: "Presentation Slide"
    filename: "11_presentation_slide"
    prompt: >
      Generate a presentation slide background ({dimensions} pixels, 16:9 landscape).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - Widescreen 16:9 composition suitable as a slide background
      - Leave large areas of low-contrast space for text overlay (especially left or center)
      - Subtle, professional — should not compete with slide content
      - Works both as a full-bleed background and with a white content area overlay
      - No placeholder text — the image is a BACKGROUND, not a complete slide
      - Professional, keynote-quality visual polish

  - id: xiaohongshu
    name: "小红书封面"
    filename: "12_xiaohongshu"
    prompt: >
      Generate a Xiaohongshu (小红书) cover image ({dimensions} pixels, 3:4 portrait).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - 3:4 portrait composition optimized for Xiaohongshu feed
      - Eye-catching, scroll-stopping design for mobile browsing
      - Subject centered or positioned in upper 2/3 for maximum feed visibility
      - Vibrant, aspirational, lifestyle-oriented aesthetic
      - Leave bottom area relatively clean for title overlay
      - No placeholder text — only include text if explicitly described in content
      - Should feel native to Xiaohongshu's visual culture

  - id: taobao_main
    name: "淘宝主图"
    filename: "13_taobao_main"
    prompt: >
      Generate a Taobao/Tmall product main image ({dimensions} pixels, 1:1 square).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - Square product showcase optimized for e-commerce listing
      - Product should be the undeniable focal point, occupying 70-85% of the frame
      - Clean, professional product photography aesthetic
      - White or very light background preferred for e-commerce compliance
      - Fine product details clearly visible (textures, materials, finishes)
      - No placeholder text — only include text if explicitly described in content
      - Should compete effectively in a grid of product thumbnails

  - id: wechat_article
    name: "公众号头图"
    filename: "14_wechat_article"
    prompt: >
      Generate a WeChat article cover image ({dimensions} pixels, ~2.35:1 landscape).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - Wide landscape composition for WeChat Official Account article cover
      - Must be visually compelling at small thumbnail size in subscription list
      - Include a region suitable for title text overlay (darker or lighter area)
      - Editorial, magazine-quality polish
      - Not too busy — should work as a backdrop for overlaid Chinese text
      - No placeholder text — only include text if explicitly described in content

  - id: custom
    name: "Custom"
    filename: "15_custom"
    prompt: >
      Generate an image with custom specifications ({dimensions} pixels).

      Content: {content_description}

      {style_instructions}

      COMPOSITION REQUIREMENTS:
      - Follow the content description precisely and faithfully
      - Maintain consistent visual style throughout the entire image
      - High resolution with crisp, professional-quality details
      - No placeholder text — only include text if explicitly described in content
      - Cohesive color usage following the specified palette
