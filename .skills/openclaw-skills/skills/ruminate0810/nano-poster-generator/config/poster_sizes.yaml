    category: print

  a4_landscape:
    name: "A4 Landscape"
    width: 3508
    height: 2480
    aspect_ratio: "1.414:1"
    category: print

  a3_portrait:
    name: "A3 Portrait"
    width: 3508
    height: 4961
    aspect_ratio: "1:1.414"
    category: print

  a3_landscape:
    name: "A3 Landscape"
    width: 4961
    height: 3508
    aspect_ratio: "1.414:1"
    category: print

  movie_poster:
    name: "Movie Poster (27x40 in)"
    width: 2700
    height: 4000
