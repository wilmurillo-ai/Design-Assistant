  wechat_moments:
    name: "微信朋友圈"
    width: 1080
    height: 1080
    aspect_ratio: "1:1"
    category: social

  # General purpose
  widescreen:
    name: "Widescreen (16:9)"
    width: 1920
    height: 1080
    aspect_ratio: "16:9"
    category: general

  square:
    name: "Square"
    width: 2000
    height: 2000
    aspect_ratio: "1:1"
    category: general

  portrait_2x3:
    name: "Portrait (2:3)"
    width: 2000
    height: 3000
    aspect_ratio: "2:3"
