  portrait_3x4:
    name: "Portrait (3:4)"
    width: 2000
    height: 2667
    aspect_ratio: "3:4"
    category: general

default: portrait_2x3

# Output format settings per category
format_settings:
  print:
    format: PNG
    color_mode: RGB
    embed_icc: true
  social:
    format: JPEG
    color_mode: RGB
    jpeg_quality: 92
    max_file_size_mb: 5
    embed_icc: false
  general:
    format: PNG
    color_mode: RGB
    embed_icc: true
