<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark theme background circle for better visibility -->
  <circle cx="16" cy="16" r="15" fill="#0d1117" opacity="0.8"/>
  
  <!-- Tree trunk - representing the orchard aspect -->
  <rect x="14" y="20" width="4" height="8" fill="#3fb950" opacity="0.9"/>
  
  <!-- Tree canopy - stylized as connected nodes representing agents/network -->
  <g fill="#58a6ff" opacity="0.8">
    <!-- Main canopy node -->
    <circle cx="16" cy="14" r="3"/>
    <!-- Secondary nodes -->
    <circle cx="10" cy="12" r="2"/>
    <circle cx="22" cy="12" r="2"/>
    <circle cx="16" cy="8" r="2"/>
  </g>
  
  <!-- Connections between nodes - representing the agentic/technical network -->
  <g stroke="#e6edf3" stroke-width="1" fill="none" opacity="0.6">
    <line x1="16" y1="14" x2="10" y2="12"/>
    <line x1="16" y1="14" x2="22" y2="12"/>
    <line x1="16" y1="14" x2="16" y2="8"/>
  </g>
  
  <!-- Circuit-like details - reinforcing the technical/agentic theme -->
  <g stroke="#e6edf3" stroke-width="0.5" fill="none" opacity="0.4">
    <path d="M8 20 L12 16 L16 18 L20 14 L24 18"/>
    <circle cx="12" cy="16" r="0.5" fill="#58a6ff"/>
    <circle cx="16" cy="18" r="0.5" fill="#3fb950"/>
    <circle cx="20" cy="14" r="0.5" fill="#58a6ff"/>
  </g>
  
  <!-- Small accent dots for visual interest -->
  <g fill="#e6edf3" opacity="0.3">
    <circle cx="6" cy="6" r="0.8"/>
    <circle cx="26" cy="6" r="0.8"/>
    <circle cx="6" cy="26" r="0.8"/>
    <circle cx="26" cy="26" r="0.8"/>
  </g>
</svg>