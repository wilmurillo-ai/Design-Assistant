    async function createProject() {
      try {
        const name = document.getElementById('project-name').value.trim();
        const inputId = document.getElementById('project-id').value.trim();
        const goal = document.getElementById('project-goal').value.trim();
        const completion_temperature = Number(document.getElementById('project-temp').value || 0.7);
        const id = inputId || slugify(name);
        if (!name || !goal) throw new Error('Name and goal are required');
        await api('/projects', { method: 'POST', body: JSON.stringify({ id, name, goal, completion_temperature }) });
        closePanel();
        await loadProjects();
        navigate(`#project/${id}`);
        showToast('Project created', 'success');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function createTask() {
      try {
        if (!state.currentProject) throw new Error('No active project');
        const title = document.getElementById('task-title').value.trim();
        const description = document.getElementById('task-description').value.trim();
        const acceptance_criteria = document.getElementById('task-criteria').value.trim();
        const priority = document.getElementById('task-priority').value;
        const model_override = document.getElementById('task-model').value.trim();
        if (!title) throw new Error('Title is required');
        await api(`/projects/${encodeURIComponent(state.currentProject.id)}/tasks`, {
          method: 'POST',
          body: JSON.stringify({ title, description, acceptance_criteria, priority, model_override: model_override || null }),
        });
        closePanel();
        await loadProjectContext(state.currentProject.id, state.currentTab);
        renderProjectDetail();
        showToast('Task created', 'success');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function createKnowledge() {
      try {
        if (!state.currentProject) throw new Error('No active project');
        const content = document.getElementById('knowledge-content').value.trim();
        if (!content) throw new Error('Knowledge content is required');
        await api(`/projects/${encodeURIComponent(state.currentProject.id)}/knowledge`, {
          method: 'POST',
          body: JSON.stringify({ content }),
        });
        closePanel();
        await loadKnowledge(state.currentProject.id);
        if (state.currentTab === 'knowledge') renderTabContent();
        showToast('Knowledge added', 'success');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function saveTaskTextFields() {
      try {
        if (!state.currentTask) throw new Error('No task loaded');
        const description = document.getElementById('edit-task-description').value;
        const acceptance_criteria = document.getElementById('edit-task-criteria').value;
        await api(`/tasks/${state.currentTask.id}`, { method: 'PUT', body: JSON.stringify({ description, acceptance_criteria }) });
        closePanel();
        await loadTaskDetail(state.currentTask.id);
        renderTaskDetail();
        showToast('Task updated', 'success');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function updateTaskField(field, value) {
      try {
        if (!state.currentTask) return;
        await api(`/tasks/${state.currentTask.id}`, { method: 'PUT', body: JSON.stringify({ [field]: value }) });
        state.currentTask[field] = value;
        const idx = state.currentTasks.findIndex((task) => task.id === state.currentTask.id);
        if (idx >= 0) state.currentTasks[idx][field] = value;
        renderTaskDetail();
        showToast('Task updated', 'success');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function submitComment() {
      try {
        if (!state.currentTask) throw new Error('No task loaded');
        const content = document.getElementById('comment-input').value.trim();
        if (!content) throw new Error('Comment cannot be empty');
        await api(`/tasks/${state.currentTask.id}/comments`, { method: 'POST', body: JSON.stringify({ author: 'user', content }) });
        await loadTaskDetail(state.currentTask.id);
        renderTaskDetail();
        showToast('Comment posted', 'success');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function wakeQueue() {
      try {
        const res = await api('/wake', { method: 'POST' });
        await refreshDebugState();
        showToast(res.triggered ? 'Queue wake triggered' : (res.message || 'Queue not available'), res.triggered ? 'dispatch' : 'warning');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    // Safe wrappers that read project IDs from data-* attributes instead of onclick strings
    function debugControlFromEl(el, action, extraFn) {
      const projectId = el.dataset.projectId || '';
      sendDebugControl(action, extraFn ? extraFn(projectId) : { projectId });
    }
    function circuitControlFromEl(el, action, reason) {
      const projectId = el.dataset.projectId || '';
      const scope = `project:${projectId}`;
      sendDebugControl(action, reason ? { scope, reason } : { scope });
    }

    async function sendDebugControl(action, extra = {}) {
      try {
        const res = await api('/debug/control', {
          method: 'POST',
          body: JSON.stringify({ action, ...extra }),
        });
        await refreshDebugState();
        if (state.panel === 'debug-controls') openPanel('debug-controls');
        showToast(res.note || `Debug action: ${action}`, 'success');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function loadProjects() {
      state.loading.projects = true;
      renderProjectsPage();
      try {
        state.projects = await api('/projects');
      } catch (error) {
        showToast(error.message, 'error');
        state.projects = [];
      } finally {
        state.loading.projects = false;
        renderSidebar();
        renderProjectsPage();
      }
      // Background: fetch counts for project cards — non-blocking
      if (state.projects.length) {
        Promise.all(state.projects.map(async (p) => {
          try {
            const tasks = await api(`/projects/${encodeURIComponent(p.id)}/tasks`);
            const arr = Array.isArray(tasks) ? tasks : [];
            state.taskCounts[p.id] = {
              total: arr.length,
              ready:   arr.filter(t => t.status === 'ready').length,
              running: arr.filter(t => t.status === 'running').length,
              done:    arr.filter(t => t.status === 'done').length,
            };
          } catch { state.taskCounts[p.id] = null; }
        })).then(() => { renderProjectsPage(); renderSidebar(); });
      }
    }

    async function loadKnowledge(projectId) {
      try {
        state.knowledge = await api(`/projects/${encodeURIComponent(projectId)}/knowledge`);
      } catch {
        state.knowledge = [];
      }
    }

    async function loadProjectContext(projectId, tab = 'tasks') {
      state.loading.page = true;
      try {
        const [project, tasks] = await Promise.all([
          api(`/projects/${encodeURIComponent(projectId)}`),
          api(`/projects/${encodeURIComponent(projectId)}/tasks`),
        ]);
        state.currentProject = project;
        state.currentTasks = Array.isArray(tasks) ? tasks : [];
        // Compute counts from already-fetched tasks — no extra request
        const arr = state.currentTasks;
        state.taskCounts[projectId] = {
          total: arr.length,
          ready:   arr.filter(t => t.status === 'ready').length,
          running: arr.filter(t => t.status === 'running').length,
          done:    arr.filter(t => t.status === 'done').length,
        };
        state.currentTask = null;
        state.statusFilter = 'all';
        state.priorityFilter = '';
        state.currentTab = tab;
        state.projectRuns = [];
        state.kbSearchQuery = '';
        if (tab === 'knowledge') await loadKnowledge(projectId); else state.knowledge = [];
        renderSidebar();
      } finally {
        state.loading.page = false;
      }
    }

    async function loadTaskDetail(taskId) {
      const task = await api(`/tasks/${taskId}`);
      state.currentTask = task;
      if (!state.currentProject || state.currentProject.id !== task.project_id) {
        try {
          state.currentProject = await api(`/projects/${encodeURIComponent(task.project_id)}`);
          state.currentTasks = await api(`/projects/${encodeURIComponent(task.project_id)}/tasks`);
        } catch {}
      }
      const [runs, comments] = await Promise.all([
        api(`/tasks/${taskId}/runs`).catch(() => []),
        api(`/tasks/${taskId}/comments`).catch(() => []),
      ]);
      state.taskRuns = runs;
      state.comments = comments;
      renderSidebar();
    }

    // ── Sessions page ─────────────────────────────────────────────────────────
    let sessionsAutoRefresh = null;
    let elapsedTickerHandle = null;
    let outputPollerHandle = null;

    function stopOutputPoller() {
      if (outputPollerHandle) { clearInterval(outputPollerHandle); outputPollerHandle = null; }
    }

    function formatElapsed(isoOrDate) {
      const since = isoOrDate instanceof Date ? isoOrDate : new Date(String(isoOrDate).includes('T') ? isoOrDate : isoOrDate + 'Z');
      if (isNaN(since.getTime())) return '?';
      const ms = Date.now() - since.getTime();
      const s = Math.floor(ms / 1000);
      if (s < 60) return `${s}s`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ${s % 60}s`;
      const h = Math.floor(m / 60);
      return `${h}h ${m % 60}m`;
    }

    function updateSessionPill(count) {
      const pill = document.getElementById('session-pill');
      const text = document.getElementById('session-pill-text');
      const badge = document.getElementById('sessions-nav-badge');
      if (text) text.textContent = `${count} active`;
      if (pill) pill.classList.toggle('has-active', count > 0);
      if (badge) {
        badge.textContent = String(count);
        badge.style.display = count > 0 ? 'inline' : 'none';
      }
    }

    function startElapsedTickers() {
      if (elapsedTickerHandle) clearInterval(elapsedTickerHandle);
      elapsedTickerHandle = setInterval(() => {
        document.querySelectorAll('[data-elapsed]').forEach(el => {
          const since = el.dataset.elapsed;
          if (since) el.textContent = '⏱ ' + formatElapsed(since);
        });
      }, 1000);
    }

    function stopSessionsAutoRefresh() {
      if (sessionsAutoRefresh) { clearInterval(sessionsAutoRefresh); sessionsAutoRefresh = null; }
      if (elapsedTickerHandle) { clearInterval(elapsedTickerHandle); elapsedTickerHandle = null; }
    }

    function renderSessionCard(r) {
      const model = escapeHtml(r.model || 'default');
      const sessionKey = escapeHtml(r.sessionKey || '—');
      const timeout = r.timeoutAt ? escapeHtml(formatDate(r.timeoutAt)) : '—';
      const taskTitle = escapeHtml(r.title || 'Unknown task');
      const projId = escapeHtml(r.projectId || '');
      // parse task prompt from input JSON
      let promptPreview = '';
      try {
        const inp = JSON.parse(r.inputJson || '{}');
        promptPreview = inp.title ? escapeHtml(inp.title) : '';
      } catch {}

      return `
        <div class="card session-card" onclick="openSessionOutput(${r.taskId}, '${escapeHtml(r.sessionKey || '')}', ${r.runId || 'null'}, '${escapeHtml(r.title || '')}')">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
            <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
              <span class="session-live-dot"></span>
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${taskTitle}</div>
                <div style="color:var(--muted);font-size:11px;margin-top:2px">
                  <span>Project: ${projId}</span>
                  ${sessionKey !== '—' ? `<span style="margin-left:8px;font-family:var(--mono)">${sessionKey}</span>` : ''}
                </div>
              </div>
            </div>
            <span class="badge badge-running" style="flex-shrink:0">Running</span>
          </div>

          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="badge" style="border-color:var(--info);color:var(--info);background:rgba(59,130,246,0.08)">⚡ ${model}</span>
            <span style="color:var(--muted);font-size:11px" data-elapsed="${escapeHtml(r.startedAt || '')}">⏱ ${escapeHtml(formatElapsed(r.startedAt || new Date()))}</span>
            <span style="color:var(--muted);font-size:11px">⏳ Timeout: ${timeout}</span>
          </div>

          <div class="session-ticker">
            <span class="session-waiting">
              <span class="session-waiting-dot">●</span>
              <span class="session-waiting-dot">●</span>
              <span class="session-waiting-dot">●</span>
              <span style="margin-left:4px">waiting for output</span>
            </span>
          </div>
        </div>`;
    }

    function renderRecentSessionCard(r) {
      const isDone = r.status === 'done';
      const dotClass = isDone ? 'session-done-dot' : 'session-failed-dot';
      const output = String(r.output || '');
      // Build a double-copy for seamless ticker scroll if long enough
      const ticker = output.replace(/\s+/g, ' ').trim().slice(-300);
      const doScroll = ticker.length > 80;
      const tickerContent = doScroll ? escapeHtml(ticker) + '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;' + escapeHtml(ticker) : escapeHtml(ticker);

      return `
        <div class="card session-card" onclick="openSessionOutput(${r.taskId}, '${escapeHtml(r.sessionKey || '')}', null, '${escapeHtml(r.title || '')}')">
          <div style="display:flex;align-items:center;gap:10px">
            <span class="${dotClass}"></span>
            <div style="flex:1;min-width:0">
              <span style="font-weight:600;color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block">${escapeHtml(r.title || 'Unknown task')}</span>
              <span style="color:var(--muted);font-size:11px">Project: ${escapeHtml(r.projectId || '')} · ${escapeHtml(r.model || 'default')} · ${escapeHtml(formatDate(r.endedAt))}</span>
            </div>
            ${badge(r.status)}
          </div>
          ${ticker ? `
            <div class="session-ticker">
              <span class="session-ticker-inner ${doScroll ? 'scrolling' : ''}">${tickerContent}</span>
            </div>
          ` : ''}
        </div>`;
    }

    async function openSessionOutput(taskId, sessionKey, runId, title) {
      stopOutputPoller();
      els.panelTitle.textContent = title || `Session #${taskId}`;
      els.panelSubtitle.textContent = sessionKey || `task-${taskId}`;
      els.panelContent.innerHTML = '<div class="section">' + skeleton(3) + '</div>';
      els.panelFooter.innerHTML = '';
      els.panelRoot.classList.add('open');
      state.panel = 'session-output';

      async function loadAndRender() {
        const runs = await api(`/tasks/${taskId}/runs`);
        const run = runs[0];
        const output = run?.output || '';
        const isRunning = run?.status === 'running';

        // Update output box in-place if it already exists (polling refresh)
        const existingBox = document.getElementById('session-output-box');
        if (existingBox) {
          const atBottom = existingBox.scrollHeight - existingBox.scrollTop <= existingBox.clientHeight + 40;
          existingBox.textContent = output || '';
          if (!output) existingBox.innerHTML = '<span style="color:var(--muted)">No output yet — session still running…</span>';
          if (atBottom) existingBox.scrollTop = existingBox.scrollHeight;
          // Update live indicator
          const liveEl = document.getElementById('session-live-label');
          if (liveEl) liveEl.style.display = isRunning ? '' : 'none';
          if (!isRunning) stopOutputPoller();
          return;
        }

        els.panelContent.innerHTML = `
          <div style="display:flex;flex-direction:column;gap:14px">
            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
              ${badge(run?.status || 'running')}
              <span class="badge" style="border-color:var(--info);color:var(--info);background:rgba(59,130,246,0.08)">⚡ ${escapeHtml(run?.model || 'default')}</span>
              ${run?.started_at ? `<span style="color:var(--muted);font-size:11px">Started: ${escapeHtml(formatDate(run.started_at))}</span>` : ''}
              ${run?.ended_at ? `<span style="color:var(--muted);font-size:11px">Ended: ${escapeHtml(formatDate(run.ended_at))}</span>` : ''}
              ${sessionKey ? `<span style="color:var(--muted);font-size:11px;font-family:var(--mono)">${escapeHtml(sessionKey)}</span>` : ''}
            </div>

            <div>
              <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">
                Output <span id="session-live-label" style="color:var(--warn);${isRunning ? '' : 'display:none'}">● live</span>
              </div>
              <div id="session-output-box" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:var(--mono);font-size:12px;white-space:pre-wrap;word-break:break-word;min-height:120px;max-height:55vh;overflow-y:auto;color:var(--text);line-height:1.6">
                ${output ? escapeHtml(output) : '<span style="color:var(--muted)">No output yet — session still running…</span>'}
              </div>
            </div>

            ${run?.input ? `
              <details>
                <summary style="cursor:pointer;color:var(--muted);font-size:12px;padding:6px 0">▶ Input prompt</summary>
                <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:var(--mono);font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:30vh;overflow-y:auto;color:var(--muted);margin-top:8px">
                  ${escapeHtml(formatRunField(run.input))}
                </div>
              </details>
            ` : ''}
          </div>`;

        els.panelFooter.innerHTML = `
          <button class="btn" onclick="navigate('#task/${taskId}')">View Task →</button>`;

        if (isRunning) {
          outputPollerHandle = setInterval(async () => {
            if (state.panel !== 'session-output') { stopOutputPoller(); return; }
            try { await loadAndRender(); } catch { /* non-fatal */ }
          }, 10000);
        }
      }

      try {
        await loadAndRender();
      } catch (e) {
        els.panelContent.innerHTML = `<div class="card empty">${escapeHtml(e.message)}</div>`;
      }
    }

    function renderCapacityPanel(cap, runningCount) {
      if (!cap) return '';
      const { maxConcurrent, maxPerHour, maxPerProject, limitsEnabled, spawnsEnabled, queuePaused, logOnly, disableAllSpawns, disableExecutorSpawns, spreadTasksOverPeriod, minNextDelayMs, spreadIntervalMs } = cap;
      const atConcurrencyLimit = limitsEnabled && runningCount >= maxConcurrent;
      const concurrencyPct = limitsEnabled ? Math.min(100, Math.round((runningCount / maxConcurrent) * 100)) : 0;
      const concurrencyColor = atConcurrencyLimit ? 'var(--danger)' : runningCount > 0 ? 'var(--warn)' : 'var(--ok)';

      // Build status flags
      const flags = [];
      if (!spawnsEnabled) {
        if (logOnly) flags.push({ label: 'Log-only mode', color: 'var(--warn)', icon: '⚠' });
        if (disableAllSpawns) flags.push({ label: 'All spawns disabled', color: 'var(--danger)', icon: '⛔' });
        else if (disableExecutorSpawns) flags.push({ label: 'Executor spawns disabled', color: 'var(--danger)', icon: '⛔' });
        if (queuePaused) flags.push({ label: 'Queue paused', color: 'var(--warn)', icon: '⏸' });
      }
      if (atConcurrencyLimit) flags.push({ label: `At concurrency limit (${runningCount}/${maxConcurrent})`, color: 'var(--danger)', icon: '🔴' });

      // Format spread interval for display
      function fmtMs(ms) {
        if (!ms) return null;
        if (ms < 60000) return `${Math.round(ms/1000)}s`;
        if (ms < 3600000) return `${Math.round(ms/60000)}m`;
        return `${(ms/3600000).toFixed(1)}h`;
      }
      const pacingLabel = spreadTasksOverPeriod && spreadIntervalMs
        ? `${fmtMs(spreadIntervalMs)} between slots`
        : minNextDelayMs > 0
          ? `${fmtMs(minNextDelayMs)} min delay`
          : null;

      return `
        <div class="card" style="padding:16px;display:flex;flex-direction:column;gap:12px">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
            <div style="font-size:13px;font-weight:600;color:var(--text-strong)">Capacity</div>
            <span style="font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid;${spawnsEnabled ? 'border-color:var(--ok);color:var(--ok);background:rgba(34,197,94,0.08)' : 'border-color:var(--danger);color:var(--danger);background:rgba(239,68,68,0.08)'}">
              ${spawnsEnabled ? '● Spawning enabled' : '○ Spawning disabled'}
            </span>
          </div>

          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px">
            <div class="card meta-card" style="padding:12px">
              <div class="meta-label">Concurrent sessions</div>
              <div style="margin-top:6px;display:flex;align-items:baseline;gap:6px">
                <span style="font-size:22px;font-weight:700;color:${concurrencyColor}">${runningCount}</span>
                <span style="color:var(--muted);font-size:13px">/ ${limitsEnabled ? maxConcurrent : '∞'}</span>
              </div>
              ${limitsEnabled ? `
                <div style="margin-top:6px;height:4px;background:var(--bg-elevated);border-radius:99px;overflow:hidden">
                  <div style="height:100%;width:${concurrencyPct}%;background:${concurrencyColor};border-radius:inherit;transition:width 0.3s"></div>
                </div>
              ` : ''}
            </div>
            <div class="card meta-card" style="padding:12px">
              <div class="meta-label">Per-project max</div>
              <div style="margin-top:6px;font-size:22px;font-weight:700;color:var(--text-strong)">${limitsEnabled ? maxPerProject : '∞'}</div>
              <div style="color:var(--muted);font-size:11px;margin-top:2px">subagents / project</div>
            </div>
            <div class="card meta-card" style="padding:12px">
              <div class="meta-label">Hourly rate limit</div>
              <div style="margin-top:6px;font-size:22px;font-weight:700;color:var(--text-strong)">${limitsEnabled ? maxPerHour : '∞'}</div>
              <div style="color:var(--muted);font-size:11px;margin-top:2px">dispatches / hour</div>
            </div>
            <div class="card meta-card" style="padding:12px">
              <div class="meta-label">Task pacing</div>
              <div style="margin-top:6px;font-size:${pacingLabel ? '15px' : '22px'};font-weight:700;color:${pacingLabel ? 'var(--accent)' : 'var(--muted)'}">
                ${pacingLabel ? escapeHtml(pacingLabel) : '—'}
              </div>
              <div style="color:var(--muted);font-size:11px;margin-top:2px">
                ${spreadTasksOverPeriod ? 'spread evenly' : minNextDelayMs > 0 ? 'min next delay' : 'none'}
              </div>
            </div>
          </div>

          ${flags.length ? `
            <div style="display:flex;flex-direction:column;gap:6px">
              ${flags.map(f => `
                <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:rgba(0,0,0,0.15);border:1px solid ${f.color}33">
                  <span>${f.icon}</span>
                  <span style="color:${f.color};font-weight:600;font-size:12px">${escapeHtml(f.label)}</span>
                  ${f.label.includes('Log-only') ? `<button class="btn" style="margin-left:auto;height:26px;padding:0 10px;font-size:11px" onclick="quickToggleSetting('debug.logOnly',false)">Disable log-only</button>` : ''}
                  ${f.label.includes('paused') ? `<button class="btn" style="margin-left:auto;height:26px;padding:0 10px;font-size:11px" onclick="quickControlAction('resumeQueue')">Resume queue</button>` : ''}
                </div>
              `).join('')}
            </div>
          ` : ''}
        </div>`;
    }

    async function quickToggleSetting(key, value) {
      try {
        await api('/settings', { method: 'PUT', body: JSON.stringify({ key, value }) });
        showToast(`${key} → ${value}`, 'success');
        renderSessionsPage();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function quickControlAction(action, opts = {}) {
      try {
        await api('/debug/control', { method: 'POST', body: JSON.stringify({ action, ...opts }) });
        showToast(`${action} ok`, 'success');
        renderSessionsPage();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function renderSessionsPage() {
      stopSessionsAutoRefresh();
      renderBreadcrumb([{ label: 'Sessions', hash: '#sessions' }]);
      renderTopbarActions([{ label: '↺ Refresh', onclick: 'renderSessionsPage()' }]);
      document.getElementById('sessions-nav-btn')?.classList.add('active');

      let data = { running: [], recent: [], counts: { running: 0, total: 0 }, capacity: null };
      try { data = await api('/activity'); } catch (e) { showToast(e.message, 'error'); }

      updateSessionPill(data.counts.running);
      const running = data.running || [];
      const recent = data.recent || [];
      const cap = data.capacity || null;

      els.content.innerHTML = `
        <div class="section">
          <div class="page-header">
            <div>
              <div class="page-title">
                Sessions
                ${running.length > 0 ? `<span style="font-size:16px;font-weight:500;color:var(--warn);margin-left:10px">${running.length} active</span>` : ''}
              </div>
              <div class="page-subtitle">Live executor sessions · auto-refreshes every 5s</div>
            </div>
          </div>

          ${renderCapacityPanel(cap, running.length)}

          ${running.length ? `
            <div style="display:flex;flex-direction:column;gap:12px">
              ${running.map(r => renderSessionCard(r, cap)).join('')}
            </div>
          ` : `
            <div class="card empty" style="padding:28px;text-align:center">
              <div style="font-size:28px;margin-bottom:8px">○</div>
              <div style="color:var(--muted)">No active sessions right now.</div>
            </div>
          `}

          ${recent.length ? `
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px">Recent completions · last 30 min</div>
              <div style="display:flex;flex-direction:column;gap:8px">
                ${recent.map(r => renderRecentSessionCard(r)).join('')}
              </div>
            </div>
          ` : ''}
        </div>`;

      startElapsedTickers();

      // Auto-refresh every 5s while on sessions page
      sessionsAutoRefresh = setInterval(() => {
        if (location.hash === '#sessions') {
          renderSessionsPage();
        } else {
          stopSessionsAutoRefresh();
        }
      }, 5000);
    }

    // ── Watchdog panel ──────────────────────────────────────────────
    let watchdogRefreshTimer = null;

    async function wdogFetch(path, opts) {
      const res = await fetch(path, opts || {});
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function renderWatchdogPage() {
      renderBreadcrumb([{ label: 'Watchdog', hash: '#watchdog' }]);
      renderTopbarActions([{ label: '↺ Refresh', onclick: 'renderWatchdogPage()' }]);
      document.getElementById('watchdog-nav-btn')?.classList.add('active');

      els.content.innerHTML = `
        <div class="section">
          <div id="wdog-status-card" class="card" style="padding:16px">${skeleton(2)}</div>
          <div id="wdog-log-card" class="card" style="padding:16px;margin-top:0">${skeleton(5)}</div>
        </div>`;

      let status = {}, log = { lines: [] };
      try { status = await wdogFetch('/wdog/status'); } catch (e) { status = { error: e.message }; }
      try { log = await wdogFetch('/wdog/log?lines=25'); } catch (e) { log = { lines: [] }; }

      const healthy = status.healthy;
      const healthColor = status.error ? 'var(--muted)' : (healthy ? 'var(--ok)' : '#e05252');
      const healthLabel = status.error ? '⚠ unreachable' : (healthy ? '✓ healthy' : '✗ unhealthy');
      const lastSnapshot = status.lastSnapshot || '—';
      const backupCount = status.backupCount ?? '—';
      const lastCheck = status.lastCheck ? new Date(status.lastCheck).toLocaleTimeString() : '—';
      const failures = status.consecutiveFailures ?? 0;

      document.getElementById('wdog-status-card').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div style="font-size:15px;font-weight:600">🛡 Gateway Watchdog</div>
          <span style="color:${healthColor};font-weight:600;font-size:14px">${escapeHtml(healthLabel)}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px">
          <div class="card meta-card"><div class="meta-label">Last Check</div><div class="meta-value">${escapeHtml(lastCheck)}</div></div>
          <div class="card meta-card"><div class="meta-label">Failures</div><div class="meta-value">${escapeHtml(String(failures))}</div></div>
          <div class="card meta-card"><div class="meta-label">Backups</div><div class="meta-value">${escapeHtml(String(backupCount))}</div></div>
          <div class="card meta-card"><div class="meta-label">Last Snapshot</div><div class="meta-value font-mono" style="font-size:11px;word-break:break-all">${escapeHtml(lastSnapshot)}</div></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="wdogSafeRestart(this)">⟳ Safe Restart</button>
          <button class="btn" onclick="wdogSnapshot(this)">📸 Snapshot Now</button>
        </div>
      `;

      const logLines = (log.lines || []);
      document.getElementById('wdog-log-card').innerHTML = `
        <div style="font-size:13px;font-weight:600;margin-bottom:10px">Recent Log</div>
        <pre style="font-size:11px;line-height:1.6;overflow-x:auto;white-space:pre-wrap;color:var(--text);margin:0;padding:10px;background:var(--bg-hover);border-radius:6px;max-height:320px;overflow-y:auto">${
          logLines.length ? escapeHtml(logLines.join('\n')) : '(no log entries)'
        }</pre>
      `;

      if (watchdogRefreshTimer) clearTimeout(watchdogRefreshTimer);
      watchdogRefreshTimer = setTimeout(() => {
        if (location.hash === '#watchdog') renderWatchdogPage();
      }, 15000);
    }

    async function wdogSafeRestart(btn) {
      if (!confirm('Trigger a safe gateway restart? Active sessions will be saved first.')) return;
      btn.disabled = true; btn.textContent = '⟳ Restarting…';
      try {
        const result = await wdogFetch('/wdog/safe-restart', { method: 'POST' });
        alert(`Restart complete.\nState saved: ${result.stateSaved}\nRestarted: ${result.restarted}\nRespawned: ${result.respawned}\nTook: ${result.tookMs}ms`);
      } catch (e) {
        alert('Safe restart failed: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = '⟳ Safe Restart';
        renderWatchdogPage();
      }
    }

    async function wdogSnapshot(btn) {
      btn.disabled = true; btn.textContent = '📸 Saving…';
      try {
        const result = await wdogFetch('/wdog/snapshot', { method: 'POST' });
        alert('Snapshot saved: ' + (result.file || JSON.stringify(result)));
      } catch (e) {
        alert('Snapshot failed: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = '📸 Snapshot Now';
        renderWatchdogPage();
      }
    }
    // ──────────────────────────────────────────────────────────────────────

    async function route() {
      if (!state.projects.length && !state.loading.projects) await loadProjects();
      const hash = location.hash || '#projects';
      const path = hash.slice(1).split('/').filter(Boolean);
      // Stop sessions auto-refresh when leaving the sessions page
      if (path[0] !== 'sessions') stopSessionsAutoRefresh();
      // Clear active state on nav buttons
      document.getElementById('sessions-nav-btn')?.classList.remove('active');
      document.getElementById('activity-nav-btn')?.classList.remove('active');
      document.getElementById('watchdog-nav-btn')?.classList.remove('active');
      try {
        if (!path.length || path[0] === 'projects') {
          state.currentProject = null;
          state.currentTask = null;
          renderSidebar();
          renderProjectsPage();
          return;
        }
        if (path[0] === 'project' && path[1]) {
          const projectId = decodeURIComponent(path[1]);
          const tab = path[2] === 'board' || path[2] === 'knowledge' || path[2] === 'activity' ? path[2] : 'tasks';
          const needsReload = !state.currentProject || state.currentProject.id !== projectId || state.currentTab !== tab;
          if (needsReload) await loadProjectContext(projectId, tab);
          if (tab === 'activity') await loadActivityForProject(projectId);
          renderProjectDetail();
          return;
        }
        if (path[0] === 'task' && path[1]) {
          await loadTaskDetail(Number(path[1]));
          renderTaskDetail();
          return;
        }
        if (path[0] === 'watchdog') {
          state.currentProject = null;
          state.currentTask = null;
          renderSidebar();
          await renderWatchdogPage();
          return;
        }
        if (path[0] === 'activity') {
          state.currentProject = null;
          state.currentTask = null;
          renderSidebar();
          await renderGlobalActivityPage();
          return;
        }
        if (path[0] === 'sessions') {
          state.currentProject = null;
          state.currentTask = null;
          renderSidebar();
          await renderSessionsPage();
          return;
        }
        navigate('#projects');
      } catch (error) {
        renderTopbarActions([]);
        renderBreadcrumb([{ label: 'Error' }]);
        els.content.innerHTML = `<div class="card empty">${escapeHtml(error.message || 'Failed to load page.')}</div>`;
      }
    }

    const sidebarToggleBtn = document.getElementById('sidebar-toggle');
    function updateSidebarToggle() {
      sidebarToggleBtn.textContent = state.sidebarCollapsed ? '☰' : '✕';
      sidebarToggleBtn.title = state.sidebarCollapsed ? 'Show sidebar' : 'Hide sidebar';
    }
    sidebarToggleBtn.addEventListener('click', () => {
      state.sidebarCollapsed = !state.sidebarCollapsed;
      els.sidebar.classList.toggle('collapsed', state.sidebarCollapsed);
      localStorage.setItem('orchard-sidebar', state.sidebarCollapsed ? '1' : '0');
      updateSidebarToggle();
    });

    document.querySelectorAll('.theme-btn').forEach((btn) => {
      btn.addEventListener('click', () => setTheme(btn.dataset.theme));
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closePanel();
    });

    window.addEventListener('hashchange', route);

    async function refreshDashboardDataSilently() {
      try {
        const currentProjectId = state.currentProject?.id;
        if (currentProjectId) {
          await loadProjectContext(currentProjectId, state.currentTab || 'tasks');
          if (state.currentTask?.id) {
            await loadTaskDetail(state.currentTask.id);
            renderTaskDetail();
          } else if (location.hash.startsWith('#project/')) {
            renderProjectDetail();
          }
        } else if (location.hash.startsWith('#activity')) {
          await renderGlobalActivityPage();
        } else if (location.hash.startsWith('#watchdog')) {
          await renderWatchdogPage();
        } else if (location.hash.startsWith('#sessions')) {
          // sessions page has its own 5s poller — skip the 30s poll
        } else {
          await loadProjects();
        }
        // Always refresh the session pill count in the background
        try {
          const activitySnap = await api('/activity');
          updateSessionPill(activitySnap?.counts?.running ?? 0);
        } catch {}
        updateLastUpdated();
      } catch (error) {
        console.warn('auto-refresh failed', error);
      }
    }

    // 30-second auto-refresh: silently refresh dashboard data in place
    setInterval(() => {
      refreshDashboardDataSilently();
    }, 30000);
    state.sidebarCollapsed = localStorage.getItem('orchard-sidebar') === '1';
    setTheme(state.theme);
    els.sidebar.classList.toggle('collapsed', state.sidebarCollapsed);
    updateSidebarToggle();
    if (!getStoredToken()) {
      showLoginScreen('');
    } else {
      route();
      updateLastUpdated();
    }
  </script>
</body>
</html>
