# Reference notes:
# - references/overview.md
# - references/mysql.md
# - references/kafka.md

sources:
- source:
    type: mysql
    name: MySQL Source
    hostname: ${mysql_hostname}
    port: ${mysql_port}
    username: ${mysql_username}
    password: ${mysql_password}
    tables: ${mysql_tables}
    server-id: ${mysql_server_id}
    schema-change.enabled: true

sink:
  type: kafka
  name: Kafka Sink
  properties.bootstrap.servers: ${kafka_properties_bootstrap_servers}
  topic: ${kafka_topic}
  # Built-in formats: debezium-json (default) / canal-json
  value.format: debezium-json
  sink.add-tableId-to-header-enabled: ${kafka_sink_add_tableId_to_header_enabled}
  sink.custom-header: ${kafka_sink_custom_header}

route:
- source-table: ${route_source_table}
  sink-table: ${route_sink_table}
  description: ${route_description}

pipeline:
  name: ${pipeline_name}
  parallelism: ${pipeline_parallelism}
