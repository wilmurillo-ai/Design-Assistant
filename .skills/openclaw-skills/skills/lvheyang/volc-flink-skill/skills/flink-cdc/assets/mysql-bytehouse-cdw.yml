# Reference notes:
# - references/overview.md
# - references/mysql.md
# - references/bytehouse-cdw.md

sources:
- source:
    type: mysql
    name: MySQL Source
    hostname: ${mysql_hostname}
    port: ${mysql_port}
    username: ${mysql_username}
    password: ${mysql_password}
    tables: ${mysql_tables}
    server-id: ${mysql_server_id}
    schema-change.enabled: true

sink:
  type: bytehouse-cdw
  name: ByteHouse CDW Sink
  # VOLCANO_PRIVATE: requires ByteHouse CDW and Flink in the same VPC
  region: VOLCANO_PRIVATE
  host: ${bytehouse_cdw_host}
  port: 19000
  virtual-warehouse: ${bytehouse_cdw_virtual_warehouse}
  api-token: ${bytehouse_cdw_api_token}
  # Recommended defaults from docs; tune based on throughput/latency.
  sink.buffer-flush.interval: 10s
  sink.buffer-flush.max-rows: 10000
  # For China regions (UTC+8), sink parses timestamps as UTC, so -8h is often needed.
  timestamp-offset: -8h
  table.create.settings: ${bytehouse_cdw_table_create_settings}

route:
- source-table: ${route_source_table}
  sink-table: ${route_sink_table}
  description: ${route_description}

pipeline:
  name: ${pipeline_name}
  parallelism: ${pipeline_parallelism}
