# config/design-mapping.yaml
# Design MD 关键词映射配置
# 用户可根据业务需求自由修改
# 基于 Awesome Design MD 项目 (https://github.com/VoltAgent/awesome-design-md)

version: "1.0.0"

# 默认设计系统（当无匹配时使用）
default: linear

# 关键词映射规则
# 格式：关键词 -> 设计系统名称
# 支持中英文，支持正则表达式
keywords:
  # AI / 科技 (优先级 1 - 最高)
  "人工智能|chatbot|对话|助手": claude
  "大模型|llm|gpt|生成式": claude
  "ai\b|AI\b": claude
  "大模型": claude
  "chatbot|聊天机器人": claude
  "llm|LLM": claude
  
  # 开发者工具 (优先级 2)
  "cursor|代码编辑器|IDE": cursor
  "终端|terminal|命令行|cli": warp
  "文档|docs|documentation": mintlify
  "开发工具": cursor
  
  # 设计工具 (优先级 3)
  "原型|figma": figma
  "设计工具": figma
  "创意|creative|艺术|art": clay
  "设计\b": figma
  
  # 消费电子 (优先级 4)
  "iOS|苹果|apple|手机端|移动端|iPhone": apple
  "mac|ipad|watch|macbook": apple
  "苹果风格": apple
  
  # 支付 / 金融 (优先级 5)
  "支付|payment|checkout|下单|购物车|收银": stripe
  "金融|finance|银行|banking|证券|保险": stripe
  "表单|form|提交|submit|输入": stripe
  "支付系统": stripe
  
  # 娱乐 / 社交 (优先级 6)
  "音乐|music|播客|podcast|音频": spotify
  "社交|social|社区|community|聊天": spotify
  "播放器": spotify
  
  # 基础设施 (优先级 7)
  "数据库|database|mongo|nosql": mongodb
  "云服务|cloud|基础设施|infra": hashicorp
  "监控|monitoring|错误|error": sentry
  
  # 营销 / 品牌 (优先级 8)
  "营销|landing|落地页|品牌|brand|官网": vercel
  "homepage|企业官网|展示页": vercel
  
  # SaaS / 生产力工具 (优先级 9)
  "saas|SaaS|生产力|效率|modern|现代|项目管理": linear
  "dashboard|仪表盘|数据看板|analytics": linear
  "后台管理|admin|cms|管理后台": linear

# 排除规则（优先级高于关键词）
# 当某些关键词不应该触发映射时使用
excludes:
  - pattern: "不要.*linear|不用.*linear|别用.*linear"
    design: linear
  - pattern: "不要.*stripe|不用.*stripe|别用.*stripe"
    design: stripe
  - pattern: "不要.*vercel|不用.*vercel|别用.*vercel"
    design: vercel
  - pattern: "不要.*apple|不用.*apple|别用.*apple"
    design: apple

# 设计系统别名（用户可使用简称）
aliases:
  linear: ["linear", "lin", "线性"]
  stripe: ["stripe", "str", "条纹"]
  apple: ["apple", "苹果", "水果", "苹果风格", "apple风格"]
  spotify: ["spotify", "spot", "音乐"]
  vercel: ["vercel", "ver", "维尔"]
  claude: ["claude", "cl", "克劳德"]
  cursor: ["cursor", "cur", "光标"]
  figma: ["figma", "fig", "菲格玛"]
  mintlify: ["mintlify", "mint", "薄荷"]
  warp: ["warp", "warp", "弯曲"]
  mongodb: ["mongodb", "mongo", "芒果"]
  hashicorp: ["hashicorp", "hashi", "哈希"]
  sentry: ["sentry", "sen", "哨兵"]

