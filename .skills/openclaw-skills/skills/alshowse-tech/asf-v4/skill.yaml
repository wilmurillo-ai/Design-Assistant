      reason: 视频帧提取
      priority: P2

# OpenClaw 兼容性
compatibility:
  minOpenClawVersion: 2026.3.24
  maxOpenClawVersion: "*"
  nodeVersion: ">=20.0.0"

# 技能类型
type: skill

# 入口文件
main: index.ts

# V1.5.0: GenUI Skill version requirements
genuiSkill:
  minVersion: 1.1.0
  required: true
  features:
    - assetManifest
    - criticalCSSInlining
    - styleValidation
  compatibility:
    - v1.0.0: false  # v1.0.0 does not support assetManifest
    - v1.1.0: true   # v1.1.0+ required

# 导出工具
tools:
  - name: veto-check
    description: 硬/软否决权检查 - 验证变更是否满足治理规则
    category: governance
    parameters:
      - name: changes
        type: array
        required: true
        description: 变更列表
      - name: approvals
        type: array
        required: false
        description: 审批记录列表
    returns:
      type: object
      description: "{ passed: boolean, reason?: string, requiredRole?: string, warnings?: string[] }"
    examples:
      - description: 检查 API 变更是否满足 veto 规则
        input:
          changes:
            - resourceType: contract
              resourcePath: /orders
              action: update
          approvals:
            - authority: architect
              scope: "contract:OpenAPI:*"
              status: approved
        output:
          passed: true

  - name: ownership-proof
    description: 生成可验证的 single-writer ownership 证明
    category: governance
    parameters:
      - name: resources
        type: array
        required: true
        description: 资源列表
      - name: roles
        type: array
        required: true
        description: 角色列表
      - name: rules
        type: array
        required: false
        description: 所有权规则列表
    returns:
      type: object
      description: "{ proofs: [], valid: boolean, invalidCount: number }"
    examples:
      - description: 生成 API 资源的 ownership 证明
        input:
          resources:
            - type: contract
              path: /orders#POST
              format: openapi
          roles:
            - id: backend-team
            - id: architect
        output:
          valid: true
          invalidCount: 0

  - name: economics-score
    description: 计算角色分配的经济学评分
    category: optimization
    parameters:
      - name: assignment
        type: object
        required: true
        description: 任务到角色的分配映射
      - name: dag
        type: object
        required: true
        description: 任务 DAG (tasks + edges)
      - name: roles
        type: array
        required: true
        description: 角色列表
    returns:
      type: object
      description: "{ interfaceCost, bottleneck, skillMatch, parallelismGain, totalScore }"

  - name: interface-budget
    description: 计算跨角色依赖成本
    category: optimization
    parameters:
      - name: roleId
        type: string
        required: true
      - name: assignment
        type: object
        required: true
      - name: dag
        type: object
        required: true
      - name: roles
        type: array
        required: true
    returns:
      type: object
      description: "{ baseCost, dependencyCost, totalCost, concurrentCap }"

  - name: rework-risk
    description: 预测任务返工风险
    category: optimization
    parameters:
      - name: task
        type: object
        required: true
        description: 任务信息
      - name: contractChanges
        type: array
        required: true
        description: 契约变更列表
      - name: historicalData
        type: array
        required: false
        description: 历史数据
    returns:
      type: object
      description: "{ score: number (0-1), factors: string[], mitigation?: string }"

  - name: hot-contract
    description: 分析热契约并建议角色数量
    category: analysis
    parameters:
      - name: tasks
        type: array
        required: true
        description: 任务列表
      - name: constraints
        type: object
        required: false
        description: "约束条件 { kMin, kMax }"
    returns:
      type: object
      description: "{ theoreticalMin, practicalMax, optimal, hotContracts: [], recommendation }"

  - name: conflict-resolve
    description: 预算驱动的所有权冲突解决
    category: governance
    parameters:
      - name: resource
        type: object
        required: true
      - name: conflictingRoles
        type: array
        required: true
      - name: currentBudget
        type: number
        required: true
      - name: budgetLimit
        type: number
        required: true
    returns:
      type: object
      description: "{ action: 'merge_roles' | 'introduce_contract', reason, contractCost }"

  - name: safe-optimize
    description: 安全在线优化 (带回滚和冷却)
    category: optimization
    parameters:
      - name: current
        type: object
        required: true
        description: 当前配置
      - name: metrics
        type: object
        required: true
        description: 运行时指标
      - name: projectId
        type: string
        required: true
    returns:
      type: object
      description: "{ optimized, knobApplied, rolledBack, cooldownUntil }"

  # UI/UX Tools
  - name: ui-synthesize
    description: 从 PRD 需求生成 UI 组件代码
    category: ui
    parameters:
      - name: requirement
        type: object
        required: true
        description: UI 需求
      - name: config
        type: object
        required: false
        description: "配置 { framework, uiLibrary, styling }"
    returns:
      type: object
      description: "{ componentName, code, props, dependencies, a11yScore }"

  - name: ui-layout
    description: 从用户流程生成页面布局
    category: ui
    parameters:
      - name: userFlow
        type: array
        required: true
        description: 用户流程列表
      - name: requirements
        type: array
        required: true
        description: UI 需求列表
    returns:
      type: object
      description: "{ id, type, sections, breakpoints, visualHierarchy }"

  - name: ui-design-tokens
    description: 从 PRD 提取设计令牌
    category: ui
    parameters:
      - name: prd
        type: object
        required: true
        description: PRD 文档
    returns:
      type: object
      description: "{ colors, typography, spacing, shadows, radii }"

  - name: ui-interaction
    description: 从用户流程生成交互流程
    category: ui
    parameters:
      - name: userFlow
        type: object
        required: true
        description: 用户流程
    returns:
      type: array
      description: "InteractionFlow[]"

  - name: ui-prototype
    description: 从 PRD 生成完整可交互原型
    category: ui
    parameters:
      - name: prd
        type: object
        required: true
        description: PRD 文档
      - name: config
        type: object
        required: false
        description: 生成配置
    returns:
      type: object
      description: "{ id, pages, flows, designTokens, previewUrl, shareUrl }"

# 导出命令
commands:
  - name: anfsf:status
    description: 检查 ANFSF V1.0 技能状态
    usage: anfsf:status

  - name: anfsf:veto
    description: 运行否决检查
    usage: anfsf:veto --changes='[...]' --approvals='[...]'

  - name: anfsf:proof
    description: 生成所有权证明
    usage: anfsf:proof --resources='[...]' --roles='[...]'

  - name: anfsf:score
    description: 计算经济学评分
    usage: anfsf:score --assignment='...' --dag='...' --roles='[...]'

  - name: anfsf:risk
    description: 预测返工风险
    usage: anfsf:risk --task='...' --changes='[...]'

  - name: anfsf:hot-contracts
    description: 分析热契约
    usage: anfsf:hot-contracts --tasks='[...]'

  # Layer 8.5 Governance Control Plane Commands
  - name: anfsf:cli
    description: 'Layer 8.5 - 运行 CLI 命令 (synthesize|preview|verify|role|ui|skill|harness|mcp)'
    usage: anfsf:cli --command=synthesize --k-auto --dry-run

  - name: anfsf:deploy
    description: 'Layer 8.5 - 金丝雀部署策略'
    usage: anfsf:deploy --policy='...' --canary-options='...'

  - name: anfsf:test
    description: 'Layer 8.5 - 运行测试场景'
    usage: anfsf:test --scenario='...'

  - name: anfsf:load-skill
    description: 'Layer 8.5 - 加载技能'
    usage: anfsf:load-skill --skillName=utils --version=1.0.0

  - name: anfsf:mcp-send
    description: 'Layer 8.5 - 发送 MCP 消息'
    usage: anfsf:mcp-send --from=agent1 --to=agent2 --type=command --payload='...'

  - name: anfsf:mcp-broadcast
    description: 'Layer 8.5 - 广播 MCP 消息'
    usage: anfsf:mcp-broadcast --from=agent1 --type=proposal --payload='...'

