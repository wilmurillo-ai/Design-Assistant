mixed-port: 7890
allow-lan: false
bind-address: "*"
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# 代理配置占位符，初始化时会替换
proxies: []
proxy-groups: []

rules:
  - DOMAIN-KEYWORD,google,代理
  - DOMAIN-KEYWORD,youtube,代理
  - DOMAIN-KEYWORD,facebook,代理
  - DOMAIN-KEYWORD,twitter,代理
  - DOMAIN-KEYWORD,instagram,代理
  - DOMAIN-KEYWORD,github,代理
  - DOMAIN-KEYWORD,openai,代理
  - DOMAIN-SUFFIX,anthropic.com,代理
  - GEOIP,CN,DIRECT
  - MATCH,代理

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
