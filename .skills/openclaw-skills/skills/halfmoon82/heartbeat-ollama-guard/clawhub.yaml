name: heartbeat-ollama-guard
version: 1.0.0
metadata:
  title: "Heartbeat Ollama Guard — 本地心跳守卫"
  description: |
    将 OpenClaw 心跳切换为本地 Ollama 模型，并部署配置守卫防止被静默修改。

    核心能力：
    💰 零成本心跳 — 用本地 Ollama 替代付费云端模型，彻底消除心跳 token 消耗
    🛡️ 配置守卫 — 60s 轮询，检测到未授权修改立即回滚并发出系统通知
    📦 一键安装 — 自动检测 Ollama、拉取模型、配置所有实例、部署 LaunchAgent
    🔒 授权流程 — 先改 conf.json 签字授权，再改 openclaw.json，守卫自动放行
    🔁 幂等部署 — 重复运行安全，已是目标值时跳过，版本相同时不覆盖
  powered_by: "halfmoon82"
license:
  spdx: MIT-0
  url: https://opensource.org/licenses/MIT-0
