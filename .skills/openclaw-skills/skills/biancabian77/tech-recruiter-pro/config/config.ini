# TechRecruiter Pro 配置文件

# ==================== 搜索配置 ====================

[search]
# 默认最小引用数
default_min_citations = 50

# 默认最小 H-index
default_min_h_index = 10

# 每次搜索最大结果数
max_results_per_search = 100

# 搜索超时（秒）
search_timeout = 30

# 是否启用缓存
enable_cache = true

# 缓存过期时间（小时）
cache_expire_hours = 24


# ==================== 平台配置 ====================

[platforms.github]
enabled = true
# GitHub API Token（可选，用于提高 rate limit）
api_token = ""
# 每秒请求数限制
rate_limit = 10

[platforms.google_scholar]
enabled = true
# 使用代理（如需要）
proxy = ""
# 请求延迟（秒）
request_delay = 2

[platforms.aminer]
enabled = true
# AMiner API（如有）
api_key = ""

[platforms.arxiv]
enabled = true
# 最大结果数
max_results = 50

[platforms.linkedin]
enabled = false
# LinkedIn API（需要申请）
api_key = ""
api_secret = ""

[platforms.linkedin]
enabled = true
# LinkedIn API（需要申请）
api_key = ""
api_secret = ""

[platforms.reddit]
enabled = true
# Reddit API (PRAW)
client_id = ""
client_secret = ""
user_agent = "TechRecruiterPro/1.0"

[platforms.discord]
enabled = true
# Discord API（需要加入服务器）
bot_token = ""

[platforms.huggingface]
enabled = true
# Hugging Face API
api_token = ""

[platforms.twitter]
enabled = true
# Twitter API v2（需要申请）
bearer_token = ""
# 最小粉丝数过滤
min_followers = 1000
# 是否只要认证用户
verified_only = false


# ==================== 邮件配置 ====================

[email]
# 默认语言
default_language = zh-CN

# 签名
signature = "招聘团队"

# 公司名称
company_name = "某某 AI"

# 联系人邮箱
contact_email = "recruiting@company.com"

# 日历链接（可选）
calendar_link = ""


# ==================== Pipeline 配置 ====================

[pipeline]
# 默认状态流转
default_statuses = ["发现", "初筛", "已联系", "面试中", "Offer", "已入职", "已拒绝"]

# 自动跟进间隔（天）
auto_followup_days = 5

# 最大跟进次数
max_followups = 3

# 优先级规则
[pipeline.priority]
high_min_citations = 500
high_min_h_index = 20
high_min_match_score = 80


# ==================== 飞书集成配置 ====================

[feishu]
enabled = true
# Bitable App Token（用于候选人数据库）
bitable_app_token = ""
# Bitable Table ID
bitable_table_id = ""
# 消息通知
notify_enabled = true


# ==================== 日志配置 ====================

[logging]
level = INFO
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
file = "logs/recruiter.log"
max_size_mb = 10
backup_count = 5


# ==================== 高级配置 ====================

[advanced]
# 并行搜索线程数
parallel_threads = 5

# 是否启用 AI 分析
enable_ai_analysis = true

# 匹配度算法权重
[advanced.match_weights]
papers = 0.3
citations = 0.2
github = 0.2
skills = 0.2
experience = 0.1

# 数据导出格式
export_formats = ["md", "csv", "json"]
