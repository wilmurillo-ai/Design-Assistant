# aicoin-monitor 简报配置文件
# 编辑此文件可自定义简报内容和格式

briefing:
  # 启用/禁用各个模块
  enabled_modules:
    prices: true           # 行情速览
    onchain: true          # 链上健康度
    institutions: true     # 机构风向
    macro: true            # 宏观环境
    sentiment: true        # 市场情绪
    narratives: true       # 热点叙事
    derivatives: true      # 衍生品数据
    exchange_flows: true   # 交易所资金流
    whales: true           # 巨鲸动向
    smart_money: true      # 聪明钱
    news: true             # 新闻快讯
    macro_calendar: true   # 宏观日历
  
  # 自定义显示顺序（按此顺序排列）
  module_order:
    - prices
    - onchain
    - institutions
    - macro
    - sentiment
    - narratives
    - derivatives
    - exchange_flows
    - whales
    - smart_money
    - news
    - macro_calendar
  
  # 每个模块的详细配置
  module_config:
    prices:
      symbols: ['BTC', 'ETH', 'SOL', 'DOGE']  # 监控的币种
      show_24h_change: true
      show_volume: true
    
    onchain:
      chains: ['bitcoin']  # 监控的链
      show_active_addresses: true
      show_transactions: true
      show_gas: true
      show_new_addresses: true
    
    institutions:
      show_etf: true
      show_cme: true
      show_corporate: true
      show_gbtc: false
    
    macro:
      show_dxy: true
      show_treasury: true
      show_liquidity: true
      show_inflation: true
    
    narratives:
      show_top: 5  # 显示前N个热点
    
    derivatives:
      symbols: ['BTC']
      show_ls_ratio: true
      show_funding: true
      show_liquidation_map: true
      show_perpetual_oi: true
      show_dex_cex_ratio: true
    
    exchange_flows:
      exchanges: ['binance', 'okx', 'bybit']
    
    whales:
      min_usd: 1000000
      limit: 3
    
    smart_money:
      limit: 3
    
    news:
      limit: 5
    
    macro_calendar:
      days: 7