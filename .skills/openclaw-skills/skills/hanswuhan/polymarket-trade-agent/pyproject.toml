[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "polymarket-trade-agent"
version = "0.2.0"
description = "Polymarket trading agent with complete implementation"
readme = "SKILL.md"
requires-python = ">=3.9"
dependencies = [
    "py-clob-client>=0.34.0",
    "requests>=2.28.0",
    "rich>=13.0.0",
    "typer>=0.9.0",
    "eth-account>=0.9.0",
    "web3>=6.0.0",
]

[project.scripts]
polymarket = "cli:app"

[tool.setuptools]
py-modules = ["cli"]
