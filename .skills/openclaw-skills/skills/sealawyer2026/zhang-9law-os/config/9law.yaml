# 九章法律智能操作系统配置

9law:
  # 基础信息
  info:
    name: "九章法律智能操作系统"
    version: "1.0.0"
    codename: "龙虾"
    author: "九章科技"
    
  # 核心配置
  core:
    # 智能路由
    router:
      enabled: true
      strategy: intelligent  # intelligent | rule_based | random
      fallback: general      # 无法匹配时的默认专家
      
    # 会话管理
    session:
      timeout: 3600          # 会话超时时间（秒）
      max_history: 100       # 最大历史记录数
      persist: true          # 是否持久化
      
    # 记忆系统
    memory:
      enabled: true
      type: hybrid           # short_term | long_term | hybrid
      storage: openclaw      # openclaw | local | redis

  # 平台一：AI法律服务
  platform_legal:
    enabled: true
    
    experts:
      count: 36
      categories:
        - corporate      # 公司法
        - labor          # 劳动法
        - marriage       # 婚姻家事
        - ip             # 知识产权
        - criminal       # 刑事辩护
        - property       # 房产纠纷
        - contract       # 合同纠纷
        - debt           # 债权债务
        - tax            # 税法
        - compliance     # 合规
        - foreign        # 外商投资
        - energy         # 能源法
        - environment    # 环保法
        - healthcare     # 医疗法
        - gaming         # 游戏法
        - entertainment  # 娱乐法
        
    consultation:
      enabled: true
      max_rounds: 50
      free_quota: 3          # 每日免费咨询次数
      
    documents:
      enabled: true
      templates:
        - labor_contract
        - equity_transfer
        - house_lease
        - house_sale
        - divorce_agreement
        - prenuptial
        - iou
        - trademark_license

  # 平台二：技能进化系统 (SSE)
  platform_sse:
    enabled: true
    
    tracker:
      enabled: true
      metrics:
        - usage_count
        - response_time
        - user_rating
        - error_rate
        
    analyzer:
      enabled: true
      frequency: daily       # daily | weekly | monthly
      
    evolver:
      enabled: true
      auto_evolve: false     # 自动进化开关
      review_required: true  # 是否需要人工审核

  # 平台三：知识数据底座
  platform_data:
    enabled: true
    
    cases:
      count: 22316
      update_frequency: weekly
      
    laws:
      count: 85
      update_frequency: monthly
      
    knowledge_graph:
      enabled: true
      entities: 10000
      relations: 50000

  # OpenClaw 集成配置
  openclaw:
    integration: deep
    
    router:
      enabled: true
      priority: high
      
    memory:
      enabled: true
      namespace: 9law
      
    tools:
      enabled: true
      register_as: 9law_tools

# 日志配置
logging:
  level: info              # debug | info | warn | error
  output: console          # console | file | both
  
# 性能配置
performance:
  max_concurrent: 100
  timeout: 30000           # 30秒
  cache_ttl: 3600          # 1小时
