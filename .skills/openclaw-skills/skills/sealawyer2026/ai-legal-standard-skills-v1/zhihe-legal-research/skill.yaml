## 注意事项

1. **不要尝试自动轮询**：提交问题后，你无法自动等待结果。必须等用户再次发送消息才能继续。这是架构限制，不是 bug。
2. **必须明确引导用户**：提交后务必告诉用户"3分半钟后发送'查看结果'"，否则用户不知道怎么获取结果。这是最重要的一步。
3. **隐私保护**：手机号仅用于平台鉴权，不要在对话中完整展示用户手机号。
4. **会员要求**：此服务要求智合AI平台会员资格，非会员用户请引导至 https://www.zhiexa.com 开通。
5. **频率限制**：每分钟仅可提交1个问题，上一个问题完成前不可提交新问题。
6. **Token 管理**：Token 有效期72小时，过期需重新登录。
7. **报告链接**：报告下载链接有效期7天，过期后可重新调用接口获取（会自动刷新签名）。

## 错误处理

| HTTP 状态码 | 含义 | 处理方式 |
|-------------|------|---------|
| 400 | 参数错误 | 检查输入格式 |
| 401 | 未认证/Token过期 | 引导重新登录 |
| 403 | 非会员/无权限 | 提示开通会员 |
| 404 | 任务不存在 | 通过 history 接口查最近任务 |
| 429 | 频率限制/任务进行中 | 告知用户稍后再试 |
| 502 | 上游服务错误 | 稍后重试 |
