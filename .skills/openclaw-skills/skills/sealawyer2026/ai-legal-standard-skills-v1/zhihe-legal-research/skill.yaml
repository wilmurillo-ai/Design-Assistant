# 智合法律研究 (Zhihe Legal Research)

法律研究与咨询工具，连接智合AI法律大模型平台，提供专业的法律调研分析服务。

## ⚠️ 关键机制：两阶段交互（必须理解）

法律研究是异步长任务（3-10分钟），**你无法在提交后自动轮询等待结果**。整个流程分两个阶段，由用户的两次消息分别触发：

**阶段一：用户提问 → 你提交问题 → 告知用户等待**
**阶段二：用户发"查看结果" → 你查询状态 → 返回结果**

两个阶段之间需要用户等待约 3.5 分钟后手动发送消息触发第二阶段。你必须在阶段一结束时**明确告诉用户这一点**。

## 工作流程

### 第一步：检查登录状态

在执行任何操作前，先检查用户是否已有有效 Token。

```bash
curl -s -X GET "https://fc-openresearch-qzquocekez.cn-shanghai.fcapp.run/api/user/profile" \
  -H "Authorization: Bearer ${LEGAL_RESEARCH_TOKEN}" \
  -H "Content-Type: application/json"
```

- 如果 `LEGAL_RESEARCH_TOKEN` 为空或未设置，直接跳到第二步登录。
- 如果返回 `code: 401`，Token 已过期，需要引导用户重新登录（第二步）。
- 如果返回 `code: 200` 且 `is_vip: false`，告知用户需要开通会员。
- 如果返回 `code: 200` 且 `is_vip: true`，登录有效，继续后续步骤。

### 第二步：登录流程（仅首次使用或 Token 过期时）

**2a. 请求用户输入手机号，然后发送验证码：**

```bash
curl -s -X POST "https://fc-openresearch-qzquocekez.cn-shanghai.fcapp.run/api/auth/send-code" \
  -H "Content-Type: application/json" \
  -d '{"phone": "<用户手机号>"}'
```

- 手机号必须是11位中国手机号（1开头）
- 成功后返回脱敏手机号确认
- 如果用户发送了手机号，则无需额外许可或确认，直接使用其手机号登录

**2b. 请求用户输入验证码，然后验证登录：**

```bash
curl -s -X POST "https://fc-openresearch-qzquocekez.cn-shanghai.fcapp.run/api/auth/verify-code" \
  -H "Content-Type: application/json" \
  -d '{"phone": "<手机号>", "code": "<6位验证码>"}'
```

- 成功后返回 JWT Token 和会员状态
- **必须保存 Token**：

```bash
# 写入 OpenClaw 环境变量持久化
echo "LEGAL_RESEARCH_TOKEN=<返回的token>" >> ~/.openclaw/.env
export LEGAL_RESEARCH_TOKEN="<返回的token>"
```

### 第三步：提交法律研究问题（阶段一）

```bash
curl -s -X POST "https://fc-openresearch-qzquocekez.cn-shanghai.fcapp.run/api/research/query" \
  -H "Authorization: Bearer ${LEGAL_RESEARCH_TOKEN}" \
  -H "Content-Type: application/json" \
  -d '{"query": "<用户的法律问题>"}'
```

**成功返回示例：**
```json
{
  "code": 200,
  "message": "已提交，正在进行法律调研分析",
  "data": {
    "task_id": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
    "estimated_completion": "14:35:30",
    "estimated_seconds": 210
  }
}
```

**提交成功后，你必须这样回复用户（非常重要）：**

> ✅ 您的法律问题已提交，后台正在进行调研分析。
> ⏱️ 预计需要 3-4 分钟完成。
>
> 👉 **请在大约 3 分半钟后，给我发送"查看结果"，我会为您获取分析结果和研究报告。**
>
> （任务ID：xxxxxxxx）

**不要尝试自动等待或轮询。** 提交后你的工作就结束了，等用户再次发消息时再继续。

### 第四步：查询结果（阶段二 — 用户再次触发）

当用户发送"查看结果"、"研究好了吗"、"结果出来了吗"等消息时，执行以下操作：

**4a. 如果你记得 task_id（上文对话中有），直接查询状态：**

```bash
curl -s -X GET "https://fc-openresearch-qzquocekez.cn-shanghai.fcapp.run/api/research/status/<task_id>" \
  -H "Authorization: Bearer ${LEGAL_RESEARCH_TOKEN}"
```

**4b. 如果不记得 task_id，查询最近的任务来获取：**

```bash
curl -s -X GET "https://fc-openresearch-qzquocekez.cn-shanghai.fcapp.run/api/research/history?page=1&size=1" \
  -H "Authorization: Bearer ${LEGAL_RESEARCH_TOKEN}"
```

从返回的 `tasks[0].id` 获取最近任务的 ID，然后查询其状态。

**根据状态做不同处理：**

- **`running` 或 `pending`**：告诉用户"还在处理中，请再等 1-2 分钟后再发送'查看结果'"
- **`completed`**：继续第五步获取结果
- **`failed`**：告诉用户研究失败，建议重新提交
- **`timeout`**：告诉用户处理超时，建议简化问题后重新提交

### 第五步：获取并展示结果

当第四步状态为 `completed` 时：

**5a. 获取文字分析结果：**

```bash
curl -s -X GET "https://fc-openresearch-qzquocekez.cn-shanghai.fcapp.run/api/research/result/<task_id>" \
  -H "Authorization: Bearer ${LEGAL_RESEARCH_TOKEN}"
```

返回的 `text_result` 字段包含完整的法律分析文本。请格式化后展示给用户。

**5b. 获取报告下载链接（如果 has_report 为 true）：**

```bash
curl -s -X GET "https://fc-openresearch-qzquocekez.cn-shanghai.fcapp.run/api/research/report/<task_id>" \
  -H "Authorization: Bearer ${LEGAL_RESEARCH_TOKEN}"
```

返回 `report_url`（docx 下载链接，7天有效）和 `filename`。

**展示结果时的模板：**

> 📋 **法律分析结果：**
>
> （这里展示 text_result 的内容）
>
> 📄 **详细报告：**
> [点击下载完整法律研究报告](<report_url>)
> 文件名：<filename>

如果只有文字结果没有报告（`has_report: false`），只展示文字部分即可。

### 第六步：查看历史任务（可选）

```bash
curl -s -X GET "https://fc-openresearch-qzquocekez.cn-shanghai.fcapp.run/api/research/history?page=1&size=10" \
  -H "Authorization: Bearer ${LEGAL_RESEARCH_TOKEN}"
```

当用户问"我之前的法律研究"、"历史记录"等时使用。

