[project]
name = "claw-compactor"
version = "7.0.0"
description = "14-stage Fusion Pipeline for LLM token compression — 54% average reduction, zero LLM inference cost, reversible compression, AST-aware code analysis"
license = "MIT"
requires-python = ">=3.9"
readme = "README.md"
keywords = [
    "token-compression",
    "llm",
    "prompt-compression",
    "context-compression",
    "ai-agent",
    "token-optimization",
    "token-reduction",
    "cost-reduction",
    "context-window",
    "workspace-compression",
    "memory-compression",
    "openclaw",
    "llm-tools",
    "ai-cost-saving",
    "context-pruning",
    "tree-sitter",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Text Processing :: General",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Software Development :: Pre-processors",
    "Operating System :: OS Independent",
    "Typing :: Typed",
]

[[project.authors]]
name = "Bot777"

[[project.authors]]
name = "OpenClaw Contributors"

[project.urls]
Homepage = "https://github.com/aeromomo/claw-compactor"
Documentation = "https://docs.openclaw.ai"
Repository = "https://github.com/aeromomo/claw-compactor"
"Bug Tracker" = "https://github.com/aeromomo/claw-compactor/issues"
Changelog = "https://github.com/aeromomo/claw-compactor/releases"
"Community" = "https://discord.com/invite/clawd"

[project.optional-dependencies]
accurate = ["tiktoken>=0.5.0"]
dev = ["pytest>=7.0", "pyyaml>=6.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.setuptools.packages.find]
exclude = ["proxy*", "assets*", "references*", "docs*"]
