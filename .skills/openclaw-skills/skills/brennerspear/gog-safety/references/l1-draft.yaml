# Safety Profile: L1 — Draft & Organize
#
# Philosophy: Do anything to YOUR OWN stuff. Nothing outbound.
# Create drafts, organize inbox, edit docs, manage files — but never
# send a message, comment, RSVP, or share in a way that notifies others.
#
# Key principle: if an action could cause a notification to another human,
# it's blocked. Everything else is allowed.

gmail:
  search: true
  get: true
  messages: true
  attachment: true
  url: true
  history: true
  thread:
    get: true
    modify: true             # Label/archive threads
    attachments: true
  labels:
    list: true
    get: true
    create: true             # Create labels for triage
    modify: true             # Apply/remove labels
    delete: true             # Delete labels (your own labels)
  batch:
    modify: true             # Bulk label changes for triage
    delete: false            # Permanent delete — L4 only
  send: false                # OUTBOUND — blocked
  track: false               # Tracking has outbound side effects
  drafts:
    list: true
    get: true
    create: true             # Create drafts for human review
    update: true             # Edit drafts
    delete: true             # Delete your own drafts
    send: false              # OUTBOUND — blocked
  settings: false            # Admin settings blocked (vacation, sendas, delegates, forwarding, autoforward, watch)
  watch: false
  autoforward: false
  delegates: false
  filters: true              # Legacy alias — points to settings.filters
