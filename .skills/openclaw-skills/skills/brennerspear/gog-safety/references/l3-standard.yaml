# Safety Profile: L3 — Full Write (No Admin)
#
# Philosophy: Everything in L2, PLUS direct messaging (email send, chat send).
# The only things blocked are destructive admin/settings operations.
#
# Key principle: full operational capability — send emails, chat messages,
# RSVP, comment — but no dangerous admin ops (delegates, forwarding, batch delete).

