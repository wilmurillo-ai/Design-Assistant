# Safety Profile: L2 — Draft & Collaborate
#
# Philosophy: Everything in L1, PLUS collaborative actions within shared workspaces.
# Comment on docs, RSVP to events, run scripts — but NO direct messaging.
#
# Key principle: you can participate in shared work (comments, calendar responses),
# but you cannot initiate direct communication (email send, chat send).

