version: 1
runtime:
  prompt_execution_mode: "reference_only"
  structured_renderer: "template_fill_structured_fields"
  pure_free_text_generation: false
groups:
  extractive_only:
    exact_fields:
      - "section_1.product_identifier"
      - "section_1.product_name"
      - "section_1.product_number"
      - "section_1.cas_number"
      - "section_1.ec_number"
      - "section_1.molecular_formula"
      - "section_1.molecular_weight"
      - "section_2.ghs_classifications"
      - "section_2.signal_word"
      - "section_2.pictograms"
      - "section_2.hazard_statements"
      - "section_3.substance_or_mixture"
      - "section_3.chemical_name"
      - "section_3.common_name_and_synonyms"
      - "section_3.cas_number"
      - "section_3.ec_number"
      - "section_3.formula"
      - "section_3.molecular_weight"
      - "section_14.transport_modes"
      - "section_14.un_number"
      - "section_14.un_proper_shipping_name"
      - "section_14.transport_hazard_class"
      - "section_14.packing_group"
      - "section_15.inventory_statuses"
    prefix_fields:
      - "section_9."
      - "section_11."
  normalized_phrasing:
    exact_fields:
      - "section_1.relevant_identified_uses"
      - "section_1.uses_advised_against"
      - "section_2.precautionary_prevention"
      - "section_2.precautionary_response"
      - "section_2.precautionary_storage"
      - "section_2.precautionary_disposal"
      - "section_2.hazards_not_otherwise_classified"
      - "section_2.summary_of_emergency"
      - "section_2.physical_hazards"
      - "section_2.health_hazards"
      - "section_2.environmental_hazards"
      - "section_2.other_hazards"
      - "section_3.disclosure_statement"
      - "section_14.transport_general_statement"
      - "section_14.special_precautions"
      - "section_14.transport_in_bulk"
      - "section_16.additional_information"
      - "section_16.references"
    prefix_fields:
      - "section_4."
      - "section_5."
      - "section_6."
      - "section_7."
      - "section_8."
      - "section_10."
      - "section_12."
      - "section_13."
      - "section_15."
  controlled_boilerplate:
    exact_fields:
      - "section_1.supplier_company_name"
      - "section_1.supplier_address"
      - "section_1.supplier_telephone"
      - "section_1.supplier_fax"
      - "section_1.supplier_website"
      - "section_1.supplier_email"
      - "section_1.emergency_telephone"
      - "section_1.prepared_by"
      - "section_16.disclaimer"
approved_template_defaults:
  section_1.relevant_identified_uses: "Laboratory chemicals / Industrial use"
template_static_blocks:
  - label: "Section 16 disclaimer paragraph"
    governed_by: "client_template"
  - label: "Header/footer tables"
    governed_by: "client_template"
  - label: "Cover page static identity text"
    governed_by: "client_template"
