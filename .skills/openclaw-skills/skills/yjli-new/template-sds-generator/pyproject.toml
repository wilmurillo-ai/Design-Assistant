[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sds-generator"
version = "0.2.1"
description = "Deterministic, traceable SDS generator for OpenClaw"
readme = "SKILL.md"
requires-python = ">=3.11"
dependencies = [
  "jsonschema==4.23.0",
  "lxml==5.3.0",
  "pdfplumber==0.11.5",
  "Pillow==11.1.0",
  "pydantic==2.10.6",
  "PyMuPDF==1.25.3",
  "PyYAML==6.0.2",
  "python-docx==1.1.2",
  "rapidfuzz==3.11.0",
]

[project.optional-dependencies]
dev = [
  "pytest==8.3.4",
]

[project.scripts]
sds-generator = "sds_generator.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
