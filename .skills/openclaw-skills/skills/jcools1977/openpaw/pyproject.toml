[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openpaw"
version = "0.1.0"
description = "ResonanceEngine — Conversational Frequency Matching for Bots. Zero-cost. Universal. Revenue-amplifying."
readme = "SKILL.md"
license = {text = "MIT"}
requires-python = ">=3.10"
keywords = ["bot", "conversational-ai", "engagement", "conversion", "resonance", "openclaw", "moltbot"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Communications :: Chat",
]

[project.urls]
Homepage = "https://github.com/jcools1977/Openpaw-"
Repository = "https://github.com/jcools1977/Openpaw-"

[tool.setuptools.packages.find]
include = ["openpaw*"]
