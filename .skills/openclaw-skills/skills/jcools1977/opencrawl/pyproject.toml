[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "convoyield"
version = "1.0.0"
description = "Conversational Yield Optimization Engine — Extract maximum value from every bot conversation using zero-cost behavioral algorithms"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "J. DeVere Cooley"}]
requires-python = ">=3.9"
keywords = ["bot", "chatbot", "conversational-ai", "yield-optimization", "micro-conversion", "sentiment-arbitrage", "nlp"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Communications :: Chat",
]
# ZERO external dependencies — runs on pure Python stdlib
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov>=4.0"]
cloud = ["fastapi>=0.100.0", "uvicorn>=0.20.0", "pydantic>=2.0"]
all = ["convoyield[dev,cloud]"]

[project.scripts]
convoyield = "convoyield.cli:main"

[tool.setuptools.packages.find]
include = ["convoyield*"]
