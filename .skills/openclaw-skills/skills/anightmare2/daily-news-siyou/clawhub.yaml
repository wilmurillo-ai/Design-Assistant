# ClawHub Skill Manifest
name: daily-news-siyou
display_name: Daily News Skill - 每日新闻播报
version: 1.1.0
description: 自定义新闻类型，自动从互联网抓取最新消息，语音播报（多源聚合）
author: 司幼 (SiYou)
license: MIT

tags:
  - news
  - broadcast
  - feishu
  - voice
  - tts
  - chinese
  - 新闻
  - 播报

category: news

requirements:
  - jq
  - python3
  - curl
  - ffmpeg

env_vars:
