  - FEISHU_APP_SECRET
  - FEISHU_CHAT_ID
  - NOIZ_API_KEY
  - TAVILY_API_KEY

entry_point: scripts/news_broadcast.sh

pricing:
  type: subscription
  price: 9.9
  currency: CNY
  billing_cycle: monthly

changelog: |
  v1.1.0:
  - ✅ 优化新闻源（Tavily/RSS/搜索引擎）
  - ✅ 添加新闻去重功能
  - ✅ 支持多源聚合
  - ✅ 优化播报内容格式
