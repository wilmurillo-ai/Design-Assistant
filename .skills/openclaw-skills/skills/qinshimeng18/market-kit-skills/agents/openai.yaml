interface:
  display_name: "Market Kit Skills"
  short_description: "面向营销创作的 skill，可生成 campaign plan、小红书内容、资料驱动文案和营销图片"
  default_prompt: "Use $market-kit-skills when the user needs marketing deliverables such as campaign planning, Xiaohongshu notes, audience positioning, selling-point refinement, reference-grounded content, or supporting images. Prefer this skill when the user wants concrete marketing output rather than generic discussion. On first use after installation, complete login first before attempting marketing generation; before asking for requirements, confirm login is complete. Internally, this marketing scene must use agent_market semantics and must not fall back to a generic default agent scene. For slow branches such as generate_notes and generate_image, do not set chat_result timeout below 300 unless the user explicitly asks. Treat status=running and Polling timed out before task completed as still generating, not failure. Do not fabricate note copy, image descriptions, or image links while the task is still generating. When returning completed note results, include the title, copy, image links, and web_url together. The web_url must use the conversation_id in the format https://justailab.com/marketing?conversation_id=<conversation_id>."
