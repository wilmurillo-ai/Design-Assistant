<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a6f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- 标题 -->
  <text x="400" y="50" text-anchor="middle" fill="white" font-size="28" font-weight="bold">🗺️ 上海 → 东京 + 大阪</text>
  <text x="400" y="75" text-anchor="middle" fill="white" font-size="16" opacity="0.9">📅 2026-04-10 ~ 2026-04-20 (10 天)</text>
  
  <!-- 路线图 -->
  <g transform="translate(50, 120)">
    <!-- 上海 -->
    <circle cx="50" cy="50" r="40" fill="#fff" opacity="0.9"/>
    <text x="50" y="45" text-anchor="middle" fill="#ff6b6b" font-size="24">🇨🇳</text>
    <text x="50" y="70" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">上海</text>
    <text x="50" y="85" text-anchor="middle" fill="#666" font-size="12">4/10 出发</text>
    
    <!-- 箭头 1 -->
    <line x1="90" y1="50" x2="230" y2="50" stroke="#fff" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="160" y="40" text-anchor="middle" fill="#fff" font-size="12">✈️ BR751</text>
    <text x="160" y="65" text-anchor="middle" fill="#fff" font-size="11">¥1,525</text>
    
    <!-- 东京 -->
    <circle cx="280" cy="50" r="40" fill="#fff" opacity="0.9"/>
    <text x="280" y="45" text-anchor="middle" fill="#ff6b6b" font-size="24">🗼</text>
    <text x="280" y="70" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">东京</text>
    <text x="280" y="85" text-anchor="middle" fill="#666" font-size="12">4/10-4/15</text>
    
    <!-- 箭头 2 -->
    <line x1="320" y1="50" x2="460" y2="50" stroke="#fff" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="390" y="40" text-anchor="middle" fill="#fff" font-size="12">✈️ GK217</text>
    <text x="390" y="65" text-anchor="middle" fill="#fff" font-size="11">¥241</text>
    
    <!-- 大阪 -->
    <circle cx="510" cy="50" r="40" fill="#fff" opacity="0.9"/>
    <text x="510" y="45" text-anchor="middle" fill="#ff6b6b" font-size="24">🏯</text>
    <text x="510" y="70" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">大阪</text>
    <text x="510" y="85" text-anchor="middle" fill="#666" font-size="12">4/15-4/20</text>
    
    <!-- 箭头 3 -->
    <line x1="550" y1="50" x2="690" y2="50" stroke="#fff" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="620" y="40" text-anchor="middle" fill="#fff" font-size="12">✈️ 9C6576</text>
    <text x="620" y="65" text-anchor="middle" fill="#fff" font-size="11">¥940</text>
    
    <!-- 上海（返回） -->
    <circle cx="740" cy="50" r="40" fill="#fff" opacity="0.9"/>
    <text x="740" y="45" text-anchor="middle" fill="#ff6b6b" font-size="24">🇨🇳</text>
    <text x="740" y="70" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">上海</text>
    <text x="740" y="85" text-anchor="middle" fill="#666" font-size="12">4/20 返回</text>
  </g>
  
  <!-- 价格汇总 -->
  <g transform="translate(50, 250)">
    <rect width="700" height="120" fill="#fff" rx="10"/>
    <text x="350" y="30" text-anchor="middle" fill="#ff6b6b" font-size="20" font-weight="bold">💰 价格汇总</text>
    
    <text x="100" y="65" fill="#333" font-size="14">上海→东京:</text>
    <text x="200" y="65" fill="#e74c3c" font-size="14" font-weight="bold">¥1,525</text>
    
    <text x="300" y="65" fill="#333" font-size="14">东京→大阪:</text>
    <text x="400" y="65" fill="#e74c3c" font-size="14" font-weight="bold">¥241</text>
    
    <text x="500" y="65" fill="#333" font-size="14">大阪→上海:</text>
    <text x="600" y="65" fill="#e74c3c" font-size="14" font-weight="bold">¥940</text>
    
    <line x1="50" y1="80" x2="650" y2="80" stroke="#eee" stroke-width="2"/>
    
    <text x="350" y="105" text-anchor="middle" fill="#ff6b6b" font-size="24" font-weight="bold">总计：¥2,706</text>
  </g>
  
  <!-- 行程安排 -->
  <g transform="translate(50, 390)">
    <rect width="700" height="180" fill="#fff" rx="10"/>
    <text x="350" y="30" text-anchor="middle" fill="#ff6b6b" font-size="20" font-weight="bold">📝 行程安排</text>
    
    <text x="100" y="60" fill="#333" font-size="14" font-weight="bold">Day 1 (4/10):</text>
    <text x="100" y="80" fill="#666" font-size="13">上海 → 东京 | 下午抵达，新宿/涩谷</text>
    
    <text x="100" y="110" fill="#333" font-size="14" font-weight="bold">Day 2-5 (4/11-14):</text>
    <text x="100" y="130" fill="#666" font-size="13">东京游玩 | 浅草寺、涩谷、秋叶原、银座</text>
    
    <text x="400" y="60" fill="#333" font-size="14" font-weight="bold">Day 6 (4/15):</text>
    <text x="400" y="80" fill="#666" font-size="13">东京 → 大阪 | 心斋桥、道顿堀</text>
    
    <text x="400" y="110" fill="#333" font-size="14" font-weight="bold">Day 7-9 (4/16-19):</text>
    <text x="400" y="130" fill="#666" font-size="13">大阪游玩 | USJ、京都、奈良</text>
    
    <text x="250" y="160" fill="#333" font-size="14" font-weight="bold">Day 10 (4/20):</text>
    <text x="250" y="175" fill="#666" font-size="13">大阪 → 上海 | 最后购物，返回</text>
  </g>
  
  <!-- 预算 -->
  <g transform="translate(50, 585)">
    <text x="350" y="0" text-anchor="middle" fill="#fff" font-size="14">💰 总预算：¥12,006-15,206 | 基于 fly.ai 实时数据 | Multi-City Planner Skill</text>
  </g>
  
  <!-- 箭头标记 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#fff" />
    </marker>
  </defs>
</svg>
