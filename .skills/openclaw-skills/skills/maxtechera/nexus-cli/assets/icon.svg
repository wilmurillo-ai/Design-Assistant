  <path d="M19 27 Q20 19 32 16 Q44 19 45 27" fill="none" stroke="url(#icoHatGold)" stroke-width="0.8"/>

  <!-- Hat cockade -->
  <circle cx="32" cy="20" r="2.2" fill="#D4A843"/>
  <circle cx="32" cy="20" r="1.3" fill="#0A1628"/>
  <circle cx="32" cy="20" r="0.6" fill="#D4A843"/>

