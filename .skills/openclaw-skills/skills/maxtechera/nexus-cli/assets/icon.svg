  <path d="M42 44 Q45 52 47 58 Q48 61 46 59 Q44 55 42 50 Q41 46 41 44" fill="#0D1D35" opacity="0.8"/>
  <path d="M37 45 Q39 53 40 58 Q41 61 39 59 Q37 55 36 50 Q36 47 36 45" fill="#0F2040"/>

