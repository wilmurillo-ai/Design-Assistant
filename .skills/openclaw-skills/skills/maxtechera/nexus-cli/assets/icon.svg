  <ellipse cx="38" cy="36" rx="3.5" ry="4" fill="#071020"/>
  <ellipse cx="26" cy="36" rx="2.5" ry="3" fill="#00BCD4"/>
  <ellipse cx="38" cy="36" rx="2.5" ry="3" fill="#00BCD4"/>
  <!-- Pupils -->
  <ellipse cx="27" cy="35.5" rx="1.2" ry="1.8" fill="#0A1628"/>
  <ellipse cx="39" cy="35.5" rx="1.2" ry="1.8" fill="#0A1628"/>
  <!-- Eye shine -->
  <circle cx="25" cy="34.5" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="37" cy="34.5" r="0.8" fill="white" opacity="0.7"/>

  <!-- Tricorn Hat -->
  <path d="M14 28 Q18 32 32 31 Q46 32 50 28 Q48 26 32 27 Q16 26 14 28Z" fill="#0A1628" stroke="#D4A843" stroke-width="0.5"/>

