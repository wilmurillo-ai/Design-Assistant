  <path d="M32 18 Q33.5 14 35 11 Q35.5 9.5 34.5 10.5 Q33.5 12 32 16" fill="#D4A843" opacity="0.9"/>
  <path d="M32 18 Q31 15 32 12 Q32.3 10.5 31 11.5 Q30.2 13 31 17" fill="#F0D080" opacity="0.7"/>
