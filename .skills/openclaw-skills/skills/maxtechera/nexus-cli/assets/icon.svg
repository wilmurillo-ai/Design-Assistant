  <path d="M30 46 Q29 52 29 57 Q29 60 31 58 Q32 54 31 49 Q31 47 30 46" fill="#0F2040"/>
  <path d="M34 46 Q35 52 35 57 Q35 60 33 58 Q32 54 33 49 Q33 47 34 46" fill="#0F2040"/>

  <!-- Octopus Head -->
