ocui_version: "1.0"
skill: educlaw-statereport
skill_version: "1.0.0"
display_name: EduClaw State Reporting
icon: file-check
color: "#6366f1"
default_entity: collection_window

domains:
  - key: demographics
    label: Demographics & EL/SPED
  - key: discipline
    label: Discipline
  - key: ed_fi
    label: Ed-Fi Integration
  - key: state_reporting
    label: State Reporting
  - key: data_validation
    label: Data Validation
  - key: submission_tracking
    label: Submission Tracking

dashboard:
  kpis:
    - key: open_windows
      label: "Open Windows"
      type: count
      action: list-collection-windows
      filter: { window_status: open }
      severity: info
      icon: calendar-check
      drill_action: list-collection-windows
      drill_filter: { window_status: open }
    - key: open_errors
      label: "Open Errors"
      type: count
      action: list-submission-errors
      filter: { resolution_status: open }
      severity: warning
      icon: alert-triangle
      drill_action: list-submission-errors
      drill_filter: { resolution_status: open }
    - key: pending_submissions
      label: "Pending Submissions"
      type: count
      action: list-submissions
      filter: { submission_status: pending }
      severity: warning
      icon: send
      drill_action: list-submissions
      drill_filter: { submission_status: pending }
    - key: missing_ssid
      label: "Missing SSIDs"
      type: count
      action: list-student-supplements
      filter: { missing_ssid: 1 }
      severity: warning
      icon: alert-circle
      drill_action: list-student-supplements
      drill_filter: { missing_ssid: 1 }
  quick_actions:
    - action: add-collection-window
      label: "New Collection Window"
      icon: calendar-plus
    - action: add-student-supplement
      label: "New Student Supplement"
      icon: user-plus
    - action: apply-validation
      label: "Run Validation"
      icon: shield-check

workflows:
  - after: add-collection-window
    suggest:
      - action: apply-window-status
        label: "Advance window status"
        pass: { window-id: id }
      - action: import-validation-rules
        label: "Load validation rules"
  - after: apply-window-status
    suggest:
      - action: apply-validation
        label: "Run data validation"
        pass: { window-id: id }
      - action: create-snapshot
        label: "Freeze snapshot"
        pass: { window-id: id }
  - after: create-snapshot
    suggest:
      - action: add-submission
        label: "Record submission"
        pass: { window-id: window_id, snapshot-id: id }
  - after: add-submission
    suggest:
      - action: approve-submission
        label: "Certify submission"
        pass: { submission-id: id }
  - after: add-discipline-incident
    suggest:
      - action: add-discipline-student
        label: "Add involved student"
        pass: { incident-id: id }
  - after: add-discipline-student
    suggest:
      - action: add-discipline-action
        label: "Add disciplinary action"
        pass: { discipline-student-id: id }
  - after: add-edfi-config
    suggest:
      - action: get-edfi-connection-test
        label: "Test ODS connectivity"
        pass: { config-id: id }
      - action: add-org-mapping
        label: "Map LEA/school identifiers"
  - after: add-student-supplement
    suggest:
      - action: assign-ssid
        label: "Assign state SSID"
        pass: { student-id: student_id }
      - action: add-sped-placement
        label: "Add SPED placement"
        pass: { student-id: student_id }

