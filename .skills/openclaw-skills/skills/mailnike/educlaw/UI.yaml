ocui_version: "1.0"
skill: educlaw
skill_version: "1.0.0"
display_name: EduClaw
icon: graduation-cap
color: "#6366f1"
default_entity: student

domains:
  - key: students
    label: Students
    entities: [student, student_applicant, guardian, consent_record]
  - key: academics
    label: Academics
    entities: [academic_year, academic_term, program, course, section, room]
  - key: enrollment
    label: Enrollment
    entities: [program_enrollment, course_enrollment, waitlist]
  - key: grading
    label: Grading
    entities: [grading_scale, assessment_plan, assessment]
  - key: attendance
    label: Attendance
    entities: [student_attendance]
  - key: staff
    label: Staff
    entities: [instructor]
  - key: fees
    label: Fees
    entities: [fee_category, fee_structure, scholarship]
  - key: communications
    label: Communications
    entities: [announcement, notification]

dashboard:
  kpis:
    - key: total_students
      label: "Students"
      type: count
      action: list-students
      icon: users
      drill_action: list-students
    - key: active_enrollments
      label: "Active Enrollments"
      type: count
      action: list-enrollments
      filter: { enrollment_status: enrolled }
      severity: success
      icon: book-open
      drill_action: list-enrollments
      drill_filter: { enrollment_status: enrolled }
    - key: pending_applicants
      label: "Pending Applications"
      type: count
      action: list-applicants
      filter: { applicant_status: applied }
      severity: warning
      icon: user-plus
      drill_action: list-applicants
      drill_filter: { applicant_status: applied }
    - key: outstanding_fees
      label: "Outstanding Fees"
      type: count
      action: get-outstanding-fees
      severity: warning
      icon: dollar-sign
      drill_action: get-outstanding-fees
  quick_actions:
    - action: add-student-applicant
      label: "New Applicant"
      icon: user-plus
    - action: add-student
      label: "New Student"
      icon: user
    - action: add-course
      label: "New Course"
      icon: book
    - action: record-attendance
      label: "Record Attendance"
      icon: check-square

workflows:
  - after: approve-applicant
    suggest:
      - action: convert-applicant-to-student
        label: "Convert to Student"
        pass: { applicant-id: id }
  - after: convert-applicant-to-student
    suggest:
      - action: create-program-enrollment
        label: "Enroll in Program"
        pass: { student-id: id }
      - action: create-section-enrollment
        label: "Enroll in Section"
        pass: { student-id: id }
  - after: add-section
    suggest:
      - action: activate-section
        label: "Activate Section"
        pass: { section-id: id }
      - action: add-assessment-plan
        label: "Create Assessment Plan"
        pass: { section-id: id }
  - after: create-section-enrollment
    suggest:
      - action: generate-fee-invoice
        label: "Generate Fee Invoice"
        pass: { student-id: student_id }
  - after: submit-grades
    suggest:
      - action: generate-gpa
        label: "Recalculate GPA"
        pass: { student-id: student_id }
      - action: generate-transcript
        label: "Generate Transcript"
        pass: { student-id: student_id }

