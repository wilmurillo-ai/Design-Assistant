    label: Instructor Constraint
    label_plural: Instructor Constraints
    table: educlaw_instructor_constraint
    id_col: id
    name_col: id
    primary_field: id
    identifier_field: id
    status_field: is_active
    status_colors:
      "1": green
      "0": gray
    fields:
      id:
        type: text
        label: ID
        read_only: true
        hidden: true
      instructor_id:
        type: text
        label: Instructor ID
        required: true
        in_list_view: true
        in_form_view: true
        form_group: references
        form_order: 1
      academic_term_id:
        type: text
        label: Academic Term ID
        required: true
        in_list_view: true
        in_form_view: true
        form_group: references
        form_order: 2
      constraint_type:
        type: select
        label: Constraint Type
        required: true
        options:
          - value: "unavailable"
            label: "Unavailable"
          - value: "preferred"
            label: "Preferred"
          - value: "max_periods_per_day"
            label: "Max Periods Per Day"
          - value: "max_consecutive_periods"
            label: "Max Consecutive Periods"
          - value: "requires_prep_period"
            label: "Requires Prep Period"
          - value: "preferred_building"
            label: "Preferred Building"
        in_list_view: true
        in_form_view: true
        form_group: details
        form_order: 3
      day_type_id:
        type: link
        label: Day Type
        link_entity: educlaw_day_type
        link_display_field: name
        link_search_action: list-day-types
        in_form_view: true
        form_group: details
        form_order: 4
      bell_period_id:
        type: link
        label: Bell Period
        link_entity: educlaw_bell_period
        link_display_field: period_name
        link_search_action: list-bell-periods
        in_form_view: true
        form_group: details
        form_order: 5
      constraint_value:
        type: text
        label: Constraint Value
        in_form_view: true
        form_group: details
        form_order: 6
      priority:
        type: select
        label: Priority
        options:
          - value: "hard"
            label: "Hard"
          - value: "soft"
            label: "Soft"
          - value: "preference"
            label: "Preference"
        in_list_view: true
        in_form_view: true
        form_group: details
        form_order: 7
      is_active:
        type: integer
        label: Active
        in_list_view: true
        in_form_view: true
        form_group: header
        form_order: 8
      constraint_notes:
        type: textarea
        label: Notes
        in_form_view: true
        form_group: notes
        form_order: 9
    form_groups:
      header:
        label: Status
        order: 1
        columns: 2
      references:
        label: References
        order: 2
        columns: 2
      details:
        label: Details
        order: 3
        columns: 2
      notes:
        label: Notes
        order: 4
        columns: 1

action_map:

  # ── Schedule Patterns ──────────────────────────────────────────────────────
  add-schedule-pattern:
    component: FormView
    entity: educlaw_schedule_pattern
    mode: create

  update-schedule-pattern:
    component: FormView
    entity: educlaw_schedule_pattern
    mode: edit

  get-schedule-pattern:
    component: DetailView
    entity: educlaw_schedule_pattern

  list-schedule-patterns:
    component: DataTable
    entity: educlaw_schedule_pattern
    default_sort: created_at
    default_sort_dir: desc
    searchable: true
    add_action: add-schedule-pattern

  activate-schedule-pattern:
    component: WizardFlow
    entity: educlaw_schedule_pattern
    steps:
      - label: Review Pattern
        type: detail
      - label: Confirm Activation
        type: confirmation
        message: "Activate this schedule pattern? It will be available for master schedules."

  add-day-type:
    component: FormView
    entity: educlaw_day_type
    mode: create

  add-bell-period:
    component: FormView
    entity: educlaw_bell_period
    mode: create

  map-day-type-to-dates:
    component: FormView
    mode: create

  get-pattern-calendar:
    component: DetailView
    entity: educlaw_schedule_pattern

  calculate-contact-hours:
    component: FormView
    mode: create

  # ── Master Schedule ────────────────────────────────────────────────────────
  create-master-schedule:
    component: FormView
    entity: educlaw_master_schedule
    mode: create

  update-master-schedule:
    component: FormView
    entity: educlaw_master_schedule
    mode: edit

  get-master-schedule:
    component: DetailView
    entity: educlaw_master_schedule

  list-master-schedules:
    component: DataTable
    entity: educlaw_master_schedule
    default_sort: created_at
    default_sort_dir: desc
    searchable: true
    add_action: create-master-schedule

  add-section-to-schedule:
    component: FormView
    mode: create

  place-section-meeting:
    component: FormView
    entity: educlaw_section_meeting
    mode: create

  remove-section-meeting:
    component: WizardFlow
    entity: educlaw_section_meeting
    steps:
      - label: Review Meeting
        type: detail
      - label: Confirm Removal
        type: confirmation
        message: "Remove this section meeting? This will also cancel any room bookings."

  list-section-meetings:
    component: DataTable
    entity: educlaw_section_meeting
    default_sort: created_at
    default_sort_dir: desc
    searchable: true

  get-schedule-matrix:
    component: FormView
    mode: create

  run-conflict-check:
    component: WizardFlow
    steps:
      - label: Select Schedule
        type: form
      - label: Running Checks
        type: confirmation
        message: "Run all 11 conflict checks for this master schedule?"

  publish-master-schedule:
    component: WizardFlow
    entity: educlaw_master_schedule
    steps:
      - label: Review Schedule
        type: detail
      - label: Pre-Publish Check
        type: confirmation
        message: "Publish this master schedule? Sections will be marked as scheduled and the academic term opened for enrollment."

  lock-master-schedule:
    component: WizardFlow
    entity: educlaw_master_schedule
    steps:
      - label: Review Schedule
        type: detail
      - label: Confirm Lock
        type: confirmation
        message: "Lock this master schedule? No further changes will be permitted."

  clone-master-schedule:
    component: FormView
    mode: create

  # ── Course Requests ────────────────────────────────────────────────────────
  open-course-requests:
    component: WizardFlow
    steps:
      - label: Select Term
        type: form
      - label: Confirm
        type: confirmation
        message: "Open course request collection for this term?"

  submit-course-request:
    component: FormView
    entity: educlaw_course_request
    mode: create

  approve-course-requests:
    component: WizardFlow
    steps:
      - label: Select Term
        type: form
      - label: Confirm Approval
        type: confirmation
        message: "Bulk-approve all submitted course requests for this term?"

  update-course-request:
    component: FormView
    entity: educlaw_course_request
    mode: edit

  get-course-request:
    component: DetailView
    entity: educlaw_course_request

  list-course-requests:
    component: DataTable
    entity: educlaw_course_request
    default_sort: created_at
    default_sort_dir: desc
    searchable: true
    add_action: submit-course-request

  close-course-requests:
    component: WizardFlow
    steps:
      - label: Select Term
        type: form
      - label: Confirm Close
        type: confirmation
        message: "Close the course request window for this term?"

  get-demand-report:
    component: FormView
    mode: create

  get-singleton-analysis:
    component: FormView
    mode: create

  analyze-course-demand:
    component: FormView
    mode: create

  get-fulfillment-report:
    component: FormView
    mode: create

  get-load-balance-report:
    component: FormView
    mode: create

  # ── Conflict Resolution ────────────────────────────────────────────────────
  list-conflicts:
    component: DataTable
    entity: educlaw_schedule_conflict
    default_sort: created_at
    default_sort_dir: desc
    searchable: true

  get-conflict:
    component: DetailView
    entity: educlaw_schedule_conflict

  resolve-conflict:
    component: WizardFlow
    entity: educlaw_schedule_conflict
    steps:
      - label: Review Conflict
        type: detail
      - label: Enter Resolution
        type: form
      - label: Confirm
        type: confirmation
        message: "Mark this conflict as resolved?"

  accept-conflict:
    component: WizardFlow
    entity: educlaw_schedule_conflict
    steps:
      - label: Review Conflict
        type: detail
      - label: Confirm Acceptance
        type: confirmation
        message: "Accept this conflict as a known exception? (Not available for CRITICAL severity)"

  get-conflict-summary:
    component: FormView
    mode: create

  get-singleton-conflict-map:
    component: FormView
    mode: create

  get-student-conflict-report:
    component: FormView
    mode: create

  # ── Room Assignment ────────────────────────────────────────────────────────
  assign-room:
    component: FormView
    entity: educlaw_room_booking
    mode: create

  unassign-room:
    component: WizardFlow
    steps:
      - label: Select Meeting
        type: form
      - label: Confirm Unassignment
        type: confirmation
        message: "Remove this room assignment?"

  block-room:
    component: FormView
    entity: educlaw_room_booking
    mode: create

  swap-rooms:
    component: WizardFlow
    steps:
      - label: Select Meetings
        type: form
      - label: Confirm Swap
        type: confirmation
        message: "Swap room assignments between these two section meetings?"

  suggest-room:
    component: FormView
    mode: create

  bulk-assign-rooms:
    component: WizardFlow
    steps:
      - label: Select Schedule
        type: form
      - label: Confirm Auto-Assign
        type: confirmation
        message: "Auto-assign rooms to all unassigned meetings in this master schedule?"

  get-room-availability:
    component: FormView
    mode: create

  get-room-utilization-report:
    component: FormView
    mode: create

  search-rooms-by-features:
    component: FormView
    mode: create

  emergency-reassign-room:
    component: WizardFlow
    steps:
      - label: Select Rooms
        type: form
      - label: Confirm Emergency Reassignment
        type: confirmation
        message: "Move ALL bookings from the source room to the target room?"

  # ── Instructor Constraints ─────────────────────────────────────────────────
  add-instructor-constraint:
    component: FormView
    entity: educlaw_instructor_constraint
    mode: create

  update-instructor-constraint:
    component: FormView
    entity: educlaw_instructor_constraint
    mode: edit

  list-instructor-constraints:
    component: DataTable
    entity: educlaw_instructor_constraint
    default_sort: created_at
    default_sort_dir: desc
    searchable: true
    add_action: add-instructor-constraint

  delete-instructor-constraint:
    component: WizardFlow
    entity: educlaw_instructor_constraint
    steps:
      - label: Review Constraint
        type: detail
      - label: Confirm Delete
        type: confirmation
        message: "Permanently delete this instructor constraint?"
