ocui_version: "1.0"
skill: educlaw-scheduling
skill_version: "1.0.0"
display_name: EduClaw Advanced Scheduling
icon: calendar
color: "#6366f1"
default_entity: educlaw_master_schedule
domains:
  - key: schedule_patterns
    label: Schedule Patterns
    entities: [educlaw_schedule_pattern, educlaw_day_type, educlaw_bell_period]
  - key: master_schedule
    label: Master Schedule
    entities: [educlaw_master_schedule, educlaw_section_meeting]
  - key: course_requests
    label: Course Requests
    entities: [educlaw_course_request]
  - key: conflict_resolution
    label: Conflict Resolution
    entities: [educlaw_schedule_conflict]
  - key: room_assignment
    label: Room Assignment
    entities: [educlaw_room_booking, educlaw_instructor_constraint]

dashboard:
  kpis:
    - key: total_master_schedules
      label: "Master Schedules"
      type: count
      action: list-master-schedules
      drill_action: list-master-schedules
    - key: draft_master_schedules
      label: "Drafts"
      type: count
      action: list-master-schedules
      filter: { schedule_status: draft }
      severity: info
      drill_action: list-master-schedules
      drill_filter: { schedule_status: draft }
    - key: open_conflicts
      label: "Open Conflicts"
      type: count
      action: list-conflicts
      filter: { conflict_status: open }
      severity: error
      drill_action: list-conflicts
      drill_filter: { conflict_status: open }
    - key: pending_course_requests
      label: "Pending Requests"
      type: count
      action: list-course-requests
      filter: { request_status: submitted }
      severity: warning
      drill_action: list-course-requests
      drill_filter: { request_status: submitted }
  quick_actions:
    - action: add-schedule-pattern
      label: "New Schedule Pattern"
    - action: create-master-schedule
      label: "New Master Schedule"
    - action: submit-course-request
      label: "Submit Course Request"
    - action: run-conflict-check
      label: "Run Conflict Check"

workflows:
  - after: add-schedule-pattern
    suggest:
      - action: add-day-type
        label: "Add Day Types"
        pass: { schedule-pattern-id: id }
      - action: add-bell-period
        label: "Add Bell Periods"
        pass: { schedule-pattern-id: id }
  - after: add-day-type
    suggest:
      - action: add-bell-period
        label: "Add Bell Period"
        pass: { schedule-pattern-id: schedule_pattern_id }
      - action: activate-schedule-pattern
        label: "Activate Pattern"
        pass: { pattern-id: schedule_pattern_id }
  - after: create-master-schedule
    suggest:
      - action: add-section-to-schedule
        label: "Add Sections"
        pass: { master-schedule-id: id }
      - action: place-section-meeting
        label: "Place Section Meeting"
        pass: { master-schedule-id: id }
  - after: place-section-meeting
    suggest:
      - action: assign-room
        label: "Assign Room"
        pass: { section-meeting-id: id }
      - action: run-conflict-check
        label: "Check Conflicts"
        pass: { master-schedule-id: master_schedule_id }
  - after: run-conflict-check
    suggest:
      - action: get-conflict-summary
        label: "View Conflict Summary"
        pass: { master-schedule-id: master_schedule_id }
      - action: list-conflicts
        label: "View All Conflicts"
  - after: resolve-conflict
    suggest:
      - action: publish-master-schedule
        label: "Publish Schedule"
  - after: submit-course-request
    suggest:
      - action: get-demand-report
        label: "View Demand Report"
  - after: open-course-requests
    suggest:
      - action: submit-course-request
        label: "Submit Requests"
  - after: approve-course-requests
    suggest:
      - action: get-demand-report
        label: "View Demand"
      - action: close-course-requests
        label: "Close Requests"

