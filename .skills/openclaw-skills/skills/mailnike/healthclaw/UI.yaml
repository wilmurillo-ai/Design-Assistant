ocui_version: "1.0"
skill: healthclaw
skill_version: "1.0.0"
display_name: Healthcare ERP
icon: heart-pulse
color: "#ef4444"
default_entity: patient

domains:
  - key: patients
    label: Patients
    entities: [patient, patient_insurance, allergy, medical_history, consent]
  - key: appointments
    label: Appointments
    entities: [appointment, provider_schedule, schedule_block, waitlist]
  - key: clinical
    label: Clinical
    entities: [encounter, vitals, diagnosis, prescription, procedure, clinical_note, clinical_order]
  - key: billing
    label: Billing
    entities: [fee_schedule, fee_schedule_item, charge, claim, claim_line, payment_posting]
  - key: inventory
    label: Pharmacy
    entities: [formulary, formulary_item, dispensing]
  - key: lab
    label: Lab & Imaging
    entities: [lab_order, lab_test, lab_result, imaging_order, imaging_result]
  - key: referrals
    label: Referrals
    entities: [referral, prior_auth, auth_usage]

dashboard:
  kpis:
    - key: total_patients
      label: "Patients"
      type: count
      action: list-patients
      icon: users
      drill_action: list-patients
    - key: today_appointments
      label: "Today's Appointments"
      type: count
      action: list-appointments
      filter: { status: scheduled }
      icon: calendar
      drill_action: list-appointments
    - key: open_encounters
      label: "Open Encounters"
      type: count
      action: list-encounters
      filter: { status: open }
      severity: warning
      icon: stethoscope
      drill_action: list-encounters
      drill_filter: { status: open }
    - key: pending_claims
      label: "Pending Claims"
      type: count
      action: list-claims
      filter: { status: draft }
      severity: warning
      icon: file-text
      drill_action: list-claims
      drill_filter: { status: draft }
    - key: pending_lab_orders
      label: "Pending Labs"
      type: count
      action: list-lab-orders
      filter: { status: ordered }
      severity: info
      icon: flask-conical
      drill_action: list-lab-orders
      drill_filter: { status: ordered }
    - key: pending_auths
      label: "Pending Auths"
      type: count
      action: list-prior-auths
      filter: { status: pending }
      severity: warning
      icon: shield-check
      drill_action: list-prior-auths
      drill_filter: { status: pending }
  quick_actions:
    - action: add-patient
      label: "New Patient"
      icon: user-plus
    - action: add-appointment
      label: "New Appointment"
      icon: calendar-plus
    - action: add-encounter
      label: "New Encounter"
      icon: stethoscope
    - action: add-claim
      label: "New Claim"
      icon: file-text
    - action: add-lab-order
      label: "New Lab Order"
      icon: flask-conical
    - action: add-referral
      label: "New Referral"
      icon: arrow-right-circle

workflows:
  - after: add-patient
    suggest:
      - action: add-patient-insurance
        label: "Add insurance coverage"
        pass: { patient-id: id }
      - action: add-allergy
        label: "Record allergies"
        pass: { patient-id: id }
      - action: add-appointment
        label: "Schedule appointment"
        pass: { patient-id: id }
  - after: add-appointment
    suggest:
      - action: add-encounter
        label: "Start clinical encounter"
        pass: { patient-id: patient_id, appointment-id: id }
  - after: add-encounter
    suggest:
      - action: add-vitals
        label: "Record vitals"
        pass: { encounter-id: id }
      - action: add-diagnosis
        label: "Add diagnosis"
        pass: { encounter-id: id, patient-id: patient_id }
  - after: add-vitals
    suggest:
      - action: add-diagnosis
        label: "Add diagnosis"
        pass: { encounter-id: encounter_id }
  - after: add-diagnosis
    suggest:
      - action: add-prescription
        label: "Write prescription"
        pass: { encounter-id: encounter_id, patient-id: patient_id }
      - action: add-procedure
        label: "Record procedure"
        pass: { encounter-id: encounter_id, patient-id: patient_id }
      - action: add-lab-order
        label: "Order lab tests"
        pass: { encounter-id: encounter_id, patient-id: patient_id }
  - after: add-prescription
    suggest:
      - action: add-dispensing
        label: "Dispense medication"
        pass: { prescription-id: id, patient-id: patient_id }
  - after: add-charge
    suggest:
      - action: add-claim
        label: "Create insurance claim"
        pass: { encounter-id: encounter_id, patient-id: patient_id }
  - after: add-claim
    suggest:
      - action: add-claim-line
        label: "Add claim line"
        pass: { claim-id: id }
  - after: add-claim-line
    suggest:
      - action: submit-claim
        label: "Submit claim"
        pass: { claim-id: claim_id }
  - after: add-lab-order
    suggest:
      - action: add-lab-test
        label: "Add test to order"
        pass: { lab-order-id: id }
  - after: add-lab-test
    suggest:
      - action: add-lab-result
        label: "Record result"
        pass: { lab-test-id: id }
  - after: add-referral
    suggest:
      - action: add-prior-auth
        label: "Request prior authorization"
        pass: { patient-id: patient_id, insurance-id: insurance_id }

