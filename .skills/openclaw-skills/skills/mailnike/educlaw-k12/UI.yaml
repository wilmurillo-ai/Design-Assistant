ocui_version: "1.0"
skill: educlaw-k12
skill_version: "1.0.0"
display_name: EduClaw K-12 Extensions
icon: shield
color: "#6366f1"
default_entity: educlaw_k12_discipline_incident

domains:
  - key: discipline
    label: Discipline
    entities: [educlaw_k12_discipline_incident, educlaw_k12_discipline_student, educlaw_k12_discipline_action, educlaw_k12_manifestation_review]
  - key: health_records
    label: Health Records
    entities: [educlaw_k12_health_profile, educlaw_k12_health_visit, educlaw_k12_student_medication, educlaw_k12_medication_log, educlaw_k12_immunization, educlaw_k12_immunization_waiver]
  - key: special_education
    label: Special Education
    entities: [educlaw_k12_sped_referral, educlaw_k12_sped_eligibility, educlaw_k12_iep, educlaw_k12_iep_goal, educlaw_k12_iep_service, educlaw_k12_iep_service_log, educlaw_k12_iep_team_member, educlaw_k12_iep_progress, educlaw_k12_sped_evaluation, educlaw_k12_504_plan]
  - key: grade_promotion
    label: Grade Promotion
    entities: [educlaw_k12_promotion_review, educlaw_k12_promotion_decision, educlaw_k12_intervention_plan]

dashboard:
  kpis:
    - key: open_incidents
      label: "Open Incidents"
      type: count
      action: list-discipline-incidents
      filter: { incident_status: open }
      severity: warning
      drill_action: list-discipline-incidents
      drill_filter: { incident_status: open }
    - key: iep_deadlines
      label: "IEP Deadlines (30 days)"
      type: count
      action: list-iep-deadlines
      severity: error
      drill_action: list-iep-deadlines
    - key: active_sped_referrals
      label: "Active SpEd Referrals"
      type: count
      action: list-sped-referrals
      filter: { referral_status: evaluation_in_progress }
      severity: info
      drill_action: list-sped-referrals
      drill_filter: { referral_status: evaluation_in_progress }
    - key: pending_reviews
      label: "Pending Promotion Reviews"
      type: count
      action: list-promotion-reviews
      filter: { review_status: pending }
      severity: info
      drill_action: list-promotion-reviews
      drill_filter: { review_status: pending }
  quick_actions:
    - action: add-discipline-incident
      label: "New Incident"
    - action: add-health-profile
      label: "New Health Profile"
    - action: create-sped-referral
      label: "New SpEd Referral"
    - action: create-promotion-review
      label: "New Promotion Review"

workflows:
  - after: add-discipline-incident
    suggest:
      - action: add-discipline-student
        label: "Add Student Involvement"
        pass: { incident-id: id }
      - action: get-discipline-incident
        label: "View Incident"
        pass: { incident-id: id }
  - after: add-discipline-student
    suggest:
      - action: add-discipline-action
        label: "Add Consequence"
        pass: { discipline-student-id: id }
      - action: notify-guardians-discipline
        label: "Notify Guardians"
        pass: { incident-id: incident_id }
  - after: add-discipline-action
    suggest:
      - action: close-discipline-incident
        label: "Close Incident"
        pass: { incident-id: incident_id }
      - action: add-manifestation-review
        label: "MDR (IDEA Students)"
        pass: { discipline-student-id: discipline_student_id }
  - after: close-discipline-incident
    suggest:
      - action: generate-discipline-report
        label: "View Discipline Report"
  - after: add-health-profile
    suggest:
      - action: add-immunization
        label: "Add Immunization"
        pass: { student-id: student_id }
      - action: add-student-medication
        label: "Add Medication"
        pass: { student-id: student_id }
  - after: add-immunization
    suggest:
      - action: check-immunization-compliance
        label: "Check Compliance"
        pass: { student-id: student_id }
  - after: check-immunization-compliance
    suggest:
      - action: add-immunization-waiver
        label: "Add Waiver (Exemption)"
        pass: { student-id: student_id }
      - action: verify-health-profile
        label: "Verify Health Profile"
        pass: { student-id: student_id }
  - after: add-student-medication
    suggest:
      - action: log-medication-admin
        label: "Log Administration"
        pass: { student-medication-id: id }
  - after: create-sped-referral
    suggest:
      - action: update-sped-referral
        label: "Request Consent"
        pass: { referral-id: id }
      - action: add-sped-evaluation
        label: "Add Evaluation"
        pass: { referral-id: id }
  - after: add-sped-evaluation
    suggest:
      - action: record-sped-eligibility
        label: "Record Eligibility"
        pass: { referral-id: referral_id }
  - after: record-sped-eligibility
    suggest:
      - action: add-iep
        label: "Create IEP"
        pass: { student-id: student_id }
  - after: add-iep
    suggest:
      - action: add-iep-goal
        label: "Add IEP Goal"
        pass: { iep-id: id }
      - action: add-iep-service
        label: "Add IEP Service"
        pass: { iep-id: id }
      - action: add-iep-team-member
        label: "Add Team Member"
        pass: { iep-id: id }
  - after: add-iep-service
    suggest:
      - action: activate-iep
        label: "Activate IEP"
        pass: { iep-id: iep_id }
      - action: log-iep-service-session
        label: "Log Service Session"
        pass: { iep-service-id: id }
  - after: activate-iep
    suggest:
      - action: get-active-iep
        label: "View Active IEP"
        pass: { student-id: student_id }
      - action: list-iep-deadlines
        label: "View Upcoming Deadlines"
  - after: add-iep-goal
    suggest:
      - action: record-iep-progress
        label: "Record Progress"
        pass: { iep-goal-id: id }
  - after: create-promotion-review
    suggest:
      - action: create-intervention-plan
        label: "Create Intervention Plan"
        pass: { student-id: student_id }
      - action: update-promotion-review
        label: "Add Recommendations"
        pass: { review-id: id }
  - after: update-promotion-review
    suggest:
      - action: submit-promotion-decision
        label: "Submit Decision"
        pass: { review-id: id }
  - after: submit-promotion-decision
    suggest:
      - action: notify-promotion-decision
        label: "Notify Guardians"
        pass: { decision-id: id }
      - action: batch-promote-grade
        label: "Batch Promote Grade"
  - after: batch-promote-grade
    suggest:
      - action: generate-promotion-report
        label: "View Promotion Report"

