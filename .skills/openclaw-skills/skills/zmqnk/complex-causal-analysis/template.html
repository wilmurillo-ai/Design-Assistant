<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秦朝灭亡因果网络</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        #main { width: 100vw; height: 100vh; position: relative; }
        
        #graph { width: 100%; height: 100%; cursor: grab; }
        #graph:active { cursor: grabbing; }
        
        .link-path { fill: none; opacity: 0.6; transition: opacity 0.3s; }
        .link-path:hover { opacity: 1; }
        
        .node { cursor: pointer; }
        .node circle { stroke: #fff; stroke-width: 2px; transition: all 0.3s; }
        .node:hover circle { stroke-width: 4px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        .node text { text-shadow: 0 0 4px #000; font-weight: 500; }
        
        .sidebar {
            position: fixed;
            right: 20px;
            top: 20px;
            bottom: 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            overflow-y: auto;
        }
        
        .sidebar-title { font-size: 11px; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; position: sticky; top: 0; background: rgba(0,0,0,0.6); padding: 4px 0; }
        .node-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; margin: 4px 0; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .node-item:hover { background: rgba(255,255,255,0.15); }
        .node-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        
        #detail-panel {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%) translateX(-120%);
            width: 300px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.3s ease;
            z-index: 100;
            max-height: 80vh;
            overflow-y: auto;
        }
        #detail-panel.show { transform: translateY(-50%) translateX(0); }
        #detail-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        #detail-type { font-size: 12px; color: #94a3b8; margin-bottom: 12px; }
        #detail-desc { font-size: 14px; line-height: 1.5; margin-bottom: 16px; color: #e2e8f0; }
        .section-title { font-size: 12px; color: #fbbf24; margin: 12px 0 6px; font-weight: 600; }
        .cause-item, .result-item { padding: 6px 10px; margin: 3px 0; background: rgba(255,255,255,0.05); border-radius: 4px; font-size: 13px; }
        .cause-item::before { content: "↑ "; color: #22c55e; }
        .result-item::before { content: "↓ "; color: #ef4444; }
        
        .close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #94a3b8; font-size: 18px; cursor: pointer; }
        .close-btn:hover { color: #fff; }
        
        .legend { position: absolute; left: 20px; bottom: 20px; background: rgba(0,0,0,0.5); padding: 10px 14px; border-radius: 8px; font-size: 12px; }
        .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
        .legend-color { width: 16px; height: 3px; border-radius: 2px; }
        
        .layer-label { position: absolute; right: 280px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="main">
        <svg id="graph">
            <defs>
                <marker id="arrow-strong" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
                </marker>
                <marker id="arrow-medium" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
                </marker>
            </defs>
        </svg>
        
        <div class="layer-label" style="right: 280px; top: 18%;">深层原因</div>
        <div class="layer-label" style="right: 280px; top: 42%;">中间因素</div>
        <div class="layer-label" style="right: 280px; top: 66%;">直接原因</div>
        <div class="layer-label" style="right: 280px; top: 87%;">结果</div>
        
        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background: #22c55e;"></div><span>强因果 (8-10)</span></div>
            <div class="legend-item"><div class="legend-color" style="background: #fbbf24;"></div><span>中因果 (5-7)</span></div>
        </div>
        
        <div class="sidebar">
            <div class="sidebar-title">全部节点</div>
            <div id="node-list"></div>
        </div>
        
        <div id="detail-panel">
            <button class="close-btn" onclick="closeDetail()">×</button>
            <div id="detail-title"></div>
            <div id="detail-type"></div>
            <div id="detail-desc"></div>
            <div class="section-title">原因</div>
            <div id="detail-causes"></div>
            <div class="section-title">结果</div>
            <div id="detail-results"></div>
        </div>
    </div>

    <script>
        // 秦朝灭亡因果网络
        const nodes = [
            // Layer3: 深层原因
            { id: "法家暴政", layer: 3, color: "#dc2626", type: "政治", 
              desc: "商鞅韩非法家思想主导，严刑峻法、刻薄寡恩",
              evidence: [{text: "秦法繁苛，赭衣塞路", source: "《汉书·刑法志》"}] },
            { id: "统一进程过急", layer: 3, color: "#f97316", type: "政治", 
              desc: "六年统一六国，未及消化吸收，统治基础不稳",
              evidence: [{text: "商君死而秦法未败", source: "《史记》"}] },
            { id: "文字货币不统一遗留", layer: 3, color: "#a3e635", type: "文化", 
              desc: "六国旧地文化差异大，认同感缺失",
              evidence: [{text: "山东六国怀恋故国", source: "《过秦论》"}] },
            { id: "徭役赋税沉重", layer: 3, color: "#f59e0b", type: "经济", 
              desc: "修长城、建阿房宫、骊山陵，徭役无度",
              evidence: [{text: "丁男被甲，丁女转输", source: "《汉书》"}] },
            
            // Layer2: 中间因素
            { id: "秦始皇之死", layer: 2, color: "#8b5cf6", type: "事件", 
              desc: "公元前210年秦始皇病逝于沙丘",
              evidence: [{text: "七月丙寅，始皇崩于沙丘", source: "《史记·秦始皇本纪》"}] },
            { id: "储位之争", layer: 2, color: "#ec4899", type: "政治", 
              desc: "胡亥篡位、赵高专权",
              evidence: [{text: "赵高、李斯篡遗诏", source: "《史记》"}] },
            { id: "六国旧贵族复辟", layer: 2, color: "#22c55e", type: "社会", 
              desc: "六国贵族趁机起兵反秦",
              evidence: [{text: "项梁、项羽起江东", source: "《史记·项羽本纪》"}] },
            { id: "秦军主力北上", layer: 2, color: "#64748b", type: "军事", 
              desc: "秦军主力驻守北方防御匈奴，国内空虚",
              evidence: [{text: "王离率北方军", source: "《史记》"}] },
            
            // Layer1: 直接原因
            { id: "陈胜吴广起义", layer: 1, color: "#eab308", type: "直接原因", 
              desc: "公元前209年大泽乡起义，天下响应",
              evidence: [{text: "斩木为兵，揭竿为旗", source: "《过秦论》"}] },
            { id: "刘邦入关", layer: 1, color: "#14b8a6", type: "直接原因", 
              desc: "公元前207年刘项联军攻入咸阳",
              evidence: [{"text": "约法三章", source: "《史记·高祖本纪》"}] },
            { id: "秦军主力覆灭", layer: 1, color: "#ef4444", type: "直接原因", 
              desc: "巨鹿之战秦军被项羽击败",
              evidence: [{text: "破釜沉舟，大破秦军", source: "《史记·项羽本纪》"}] },
            
            // Layer0: 结果
            { id: "秦朝灭亡", layer: 0, color: "#1e293b", type: "结果", 
              desc: "公元前207年秦朝灭亡，仅存15年",
              evidence: [{text: "子婴降刘邦，秦亡", source: "《史记》"}] }
        ];
        
        // 连线（只保留中强因果）
        const links = [
            // 深层 -> 中间
            { source: "法家暴政", target: "储位之争", strength: 7 },
            { source: "法家暴政", target: "六国旧贵族复辟", strength: 9 },
            { source: "统一进程过急", target: "六国旧贵族复辟", strength: 8 },
            { source: "统一进程过急", target: "储位之争", strength: 6 },
            { source: "文字货币不统一遗留", target: "六国旧贵族复辟", strength: 8 },
            { source: "徭役赋税沉重", target: "六国旧贵族复辟", strength: 9 },
            { source: "徭役赋税沉重", target: "陈胜吴广起义", strength: 9 },
            
            // 中间 -> 直接
            { source: "秦始皇之死", target: "储位之争", strength: 10 },
            { source: "储位之争", target: "秦军主力覆灭", strength: 7 },
            { source: "储位之争", target: "陈胜吴广起义", strength: 8 },
            { source: "六国旧贵族复辟", target: "刘邦入关", strength: 8 },
            { source: "六国旧贵族复辟", target: "秦军主力覆灭", strength: 9 },
            { source: "秦军主力北上", target: "刘邦入关", strength: 7 },
            
            // 直接 -> 结果
            { source: "陈胜吴广起义", target: "秦朝灭亡", strength: 8 },
            { source: "秦军主力覆灭", target: "秦朝灭亡", strength: 10 },
            { source: "刘邦入关", target: "秦朝灭亡", strength: 9 }
        ];
        
        const svg = d3.select("#graph");
        const container = document.getElementById("main");
        let width = container.clientWidth;
        let height = container.clientHeight;
        
        svg.attr("width", width).attr("height", height);
        
        const zoom = d3.zoom().scaleExtent([0.3, 2]).on("zoom", e => g.attr("transform", e.transform));
        svg.call(zoom);
        
        const g = svg.append("g");
        
        const layerY = [height * 0.88, height * 0.68, height * 0.42, height * 0.16];
        
        const nodePositions = {};
        
        function getNodesAtLayer(layer) { return nodes.filter(n => n.layer === layer); }
        
        [3, 2, 1, 0].forEach(layer => {
            const layerNodes = getNodesAtLayer(layer);
            const spacing = (layer === 0 ? 0.3 : 0.5) * width / (layerNodes.length + 1);
            const startX = layer === 0 ? width * 0.35 : width * 0.25;
            const offsets = layerNodes.map((_, i) => (i % 2 === 0 ? 1 : -1) * 12 * Math.ceil((i + 1) / 2));
            
            layerNodes.forEach((n, i) => {
                nodePositions[n.id] = { x: startX + spacing * (i + 1), y: layerY[layer] + (offsets[i] || 0) };
            });
        });
        
        nodes.forEach(n => { n.x = nodePositions[n.id].x; n.y = nodePositions[n.id].y; });
        
        function drawLink(source, target, strength) {
            const sx = source.x, sy = source.y, tx = target.x, ty = target.y;
            const my = (sy + ty) / 2;
            const path = `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`;
            
            const color = strength >= 8 ? "#22c55e" : "#fbbf24";
            const strokeWidth = 3 + (strength / 10) * 5;
            
            g.append("path")
                .attr("class", "link-path")
                .attr("d", path)
                .attr("stroke", color)
                .attr("stroke-width", strokeWidth)
                .attr("data-source", source.id)
                .attr("data-target", target.id);
            
            // Middle arrow with unique identifier
            const t = 0.5;
            const midX = Math.pow(1-t,3)*sx + 3*Math.pow(1-t,2)*t*sx + 3*(1-t)*Math.pow(t,2)*tx + Math.pow(t,3)*tx;
            const midY = Math.pow(1-t,3)*sy + 3*Math.pow(1-t,2)*t*my + 3*(1-t)*Math.pow(t,2)*my + Math.pow(t,3)*ty;
            const angle = Math.atan2(ty - my, tx - sx) * 180 / Math.PI;
            
            g.append("polygon")
                .attr("points", "0,-4 8,0 0,4")
                .attr("fill", color)
                .attr("transform", `translate(${midX},${midY}) rotate(${angle})`)
                .attr("class", "link-arrow")
                .attr("data-source", source.id)
                .attr("data-target", target.id);
        }
        
        links.forEach(l => { const s = nodes.find(n => n.id === l.source), t = nodes.find(n => n.id === l.target); if (s && t) drawLink(s, t, l.strength); });
        
        const nodeG = g.append("g").attr("class", "nodes");
        const nodeGroups = nodeG.selectAll("g").data(nodes).join("g").attr("class", "node").attr("transform", d => `translate(${d.x},${d.y})`).on("click", (e, d) => showDetail(d));
        
        nodeGroups.append("circle").attr("r", d => d.layer === 0 ? 32 : d.layer === 1 ? 24 : d.layer === 2 ? 20 : 18).attr("fill", d => d.color);
        nodeGroups.append("text").attr("dy", d => d.layer === 0 ? 48 : d.layer === 1 ? 38 : d.layer === 2 ? 34 : -30).attr("fill", "#fff").attr("font-size", d => d.layer === 0 ? "14px" : "12px").attr("text-anchor", "middle").text(d => d.id);
        
        // 拖动功能
        const drag = d3.drag()
            .on("start", function(event, d) {
                d3.select(this).raise().attr("cursor", "grabbing");
            })
            .on("drag", function(event, d) {
                d.x = event.x;
                d.y = event.y;
                d3.select(this).attr("transform", `translate(${d.x},${d.y})`);
                updateLinks();
            })
            .on("end", function(event, d) {
                d3.select(this).attr("cursor", "grab");
            });
        
        nodeGroups.call(drag);
        
        // 存储所有连线
        const linkData = [];
        links.forEach(l => {
            const s = nodes.find(n => n.id === l.source);
            const t = nodes.find(n => n.id === l.target);
            if (s && t) {
                const pathEl = g.select(`.link-path[data-source="${l.source}"][data-target="${l.target}"]`);
                const arrowEl = g.select(`.link-arrow[data-source="${l.source}"][data-target="${l.target}"]`);
                linkData.push({ source: s, target: t, link: l, path: pathEl, arrow: arrowEl });
            }
        });
        
        function updateLinks() {
            linkData.forEach(item => {
                const s = item.source;
                const t = item.target;
                const sx = s.x, sy = s.y, tx = t.x, ty = t.y;
                const my = (sy + ty) / 2;
                const path = `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`;
                item.path.attr("d", path);
                
                // 更新中间箭头位置
                const t2 = 0.5;
                const midX = Math.pow(1-t2,3)*sx + 3*Math.pow(1-t2,2)*t2*sx + 3*(1-t2)*Math.pow(t2,2)*tx + Math.pow(t2,3)*tx;
                const midY = Math.pow(1-t2,3)*sy + 3*Math.pow(1-t2,2)*t2*my + 3*(1-t2)*Math.pow(t2,2)*my + Math.pow(t2,3)*ty;
                const angle = Math.atan2(ty - my, tx - sx) * 180 / Math.PI;
                
                item.arrow.attr("transform", `translate(${midX},${midY}) rotate(${angle})`);
            });
        }
        
        nodes.forEach(node => {
            const div = document.createElement("div");
            div.className = "node-item";
            div.innerHTML = `<div class="node-dot" style="background:${node.color}"></div>${node.id}`;
            div.onclick = () => showDetail(node);
            document.getElementById("node-list").appendChild(div);
        });
        
        function highlightConnected(nodeId) {
            d3.selectAll(".link-path").attr("opacity", 0.1);
            d3.selectAll(".node circle").attr("opacity", 0.3);
            d3.selectAll(`.link-path[data-source="${nodeId}"], .link-path[data-target="${nodeId}"]`).attr("opacity", 1);
            d3.selectAll(".node").filter(d => d.id === nodeId).select("circle").attr("opacity", 1);
            const connectedIds = new Set();
            links.forEach(l => { if (l.source === nodeId) connectedIds.add(l.target); if (l.target === nodeId) connectedIds.add(l.source); });
            d3.selectAll(".node").filter(d => connectedIds.has(d.id)).select("circle").attr("opacity", 1);
        }
        
        function resetHighlight() { d3.selectAll(".link-path").attr("opacity", 0.6); d3.selectAll(".node circle").attr("opacity", 1); }
        
        function showDetail(d) {
            highlightConnected(d.id);
            const panel = document.getElementById("detail-panel");
            panel.classList.add("show");
            document.getElementById("detail-title").textContent = d.id;
            const layerNames = {0: "结果", 1: "直接原因", 2: "中间因素", 3: "深层原因"};
            document.getElementById("detail-type").textContent = `${layerNames[d.layer]} · ${d.type}`;
            document.getElementById("detail-desc").textContent = d.desc;
            
            const causes = links.filter(l => l.target === d.id);
            document.getElementById("detail-causes").innerHTML = causes.length ? causes.map(l => `<div class="cause-item">${l.source} (${l.strength >= 8 ? "强" : "中"}${l.strength})</div>`).join("") : "<div style='color:#666;font-size:12px;'>无直接原因</div>";
            
            const results = links.filter(l => l.source === d.id);
            document.getElementById("detail-results").innerHTML = results.length ? results.map(l => `<div class="result-item">${l.target} (${l.strength >= 8 ? "强" : "中"}${l.strength})</div>`).join("") : "<div style='color:#666;font-size:12px;'>无直接结果</div>";
        }
        
        function closeDetail() { document.getElementById("detail-panel").classList.remove("show"); resetHighlight(); }
        svg.on("click", e => { if (e.target === svg.node()) closeDetail(); });
        window.addEventListener("resize", () => { width = container.clientWidth; svg.attr("width", width).attr("height", container.clientHeight); });
    </script>
</body>
</html>
