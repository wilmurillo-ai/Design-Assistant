# Copy this template to:
#   ~/.openclaw/workspace/audiobook-library/voice-reviews.yaml
#
# Purpose of this file:
# - human review entry for clone voices
# - manual override area for the fields that should actually take effect
#
# Important:
# - manual is the only area users are expected to edit regularly
# - model_analysis and archived_analysis are normally generated by sync_voice_library.py
# - effective clone profile follows:
#     manual > archived_analysis > empty
#
# This file may be created automatically on first sync, so using this template is optional.
# It is most useful when you want a documented skeleton before the first ingest.

version: "1"
generated_at: ""

clones: {}

