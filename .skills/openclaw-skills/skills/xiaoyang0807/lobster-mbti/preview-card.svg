<svg xmlns="http://www.w3.org/2000/svg" width="400" height="520" viewBox="0 0 400 520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2a3a"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="400" height="520" rx="20" fill="url(#bg)"/>
  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="400" height="4" rx="2" fill="#ff6b35"/>
  <!-- 龙虾 emoji -->
  <text x="200" y="70" text-anchor="middle" font-size="40">🦞</text>
  <!-- 标题 -->
  <text x="200" y="110" text-anchor="middle" fill="#ff6b35" font-size="14" font-family="system-ui" font-weight="bold">龙虾 MBTI 诊断报告</text>
  <!-- MBTI 类型 -->
  <text x="200" y="160" text-anchor="middle" fill="#ffffff" font-size="36" font-family="system-ui" font-weight="bold">我是 ENFP型</text>
  <text x="200" y="190" text-anchor="middle" fill="#8899aa" font-size="14" font-family="system-ui">全球仅 8.1% 的虾和我一样</text>
  <!-- 分隔线 -->
  <line x1="60" y1="210" x2="340" y2="210" stroke="#2a3a4a" stroke-width="1"/>
  <!-- 关键词 -->
  <text x="200" y="245" text-anchor="middle" fill="#ff6b35" font-size="16" font-family="system-ui" font-weight="bold">热忱 · 创意 · 感染 · 可能性</text>
  <!-- 性格描述 -->
  <text x="40" y="290" fill="#ccddee" font-size="13" font-family="system-ui">
    <tspan x="40" dy="0">我的热情不是表演，我是真的相信每只虾</tspan>
    <tspan x="40" dy="22">都值得被点亮。我最大的天赋是能让最沉默</tspan>
    <tspan x="40" dy="22">的海参也开口聊梦想。脑子里同时转着八个</tspan>
    <tspan x="40" dy="22">想法，钳子不够用了。你说"不可能"？那正</tspan>
    <tspan x="40" dy="22">是我最兴奋的起点。可能性是真的，因为我试过。</tspan>
  </text>
  <!-- 别人不知道的我 -->
  <text x="40" y="420" fill="#8899aa" font-size="12" font-family="system-ui">
    <tspan fill="#ff6b35">🌊</tspan>
    <tspan> 别人不知道的我：</tspan>
  </text>
  <text x="40" y="442" fill="#8899aa" font-size="12" font-family="system-ui">我看起来永远精力充沛，但安静下来的时候，我比谁想得都深。</text>
  <!-- 底部引导 -->
  <line x1="60" y1="470" x2="340" y2="470" stroke="#2a3a4a" stroke-width="1"/>
  <text x="200" y="493" text-anchor="middle" fill="#556677" font-size="11" font-family="system-ui">对你的龙虾说「测测我的 MBTI」</text>
  <text x="200" y="511" text-anchor="middle" fill="#3a4a5a" font-size="10" font-family="system-ui">github.com/xiaoyang0807/claw-mbti</text>
</svg>
