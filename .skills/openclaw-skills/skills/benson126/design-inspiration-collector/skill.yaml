name: design-inspiration-collector
description: |
  多平台设计灵感收集技能。当用户需要设计参考、UI灵感、视觉创意时触发。
  用户提出设计方向（如"医疗App"、"移动端UI"、"金融Dashboard"等），技能负责：
  (1) 使用Tavily搜索Behance、Dribbble、Pinterest三个平台的相关内容
  (2) 整理内容并附上链接
  (3) 生成腾讯文档，文档命名为"关键词+日期时间"格式
  (4) 发送文档链接给用户
  (5) 推荐其他相关方向（不带链接）
version: 1.0.0
author: ""
category: productivity
tags:
  - design
  - ui
  - ux
  - inspiration
  - behance
  - dribbble
  - pinterest
  - tencent-docs
emoji: 🎨
triggers:
  - 找灵感
  - 收集灵感
  - 设计参考
  - UI参考
  - 视觉灵感
  - 设计趋势
  - Behance
  - Dribbble
  - Pinterest
requirements:
  env:
    - TAVILY_API_KEY
  tools:
    - tavily-python
    - tencent-docs
dependencies:
  pip:
    - tavily-python
