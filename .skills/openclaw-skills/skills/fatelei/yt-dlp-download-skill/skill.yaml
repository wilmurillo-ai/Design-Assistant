name: yt-dlp-download-skill
version: 1.0.0
author: fatelei
description: yt-dlp-powered downloader for YouTube, Bilibili, X (Twitter), TikTok/Douyin, and more; given a URL, download video (720p/1080p/best), extract MP3/audio-only, fetch subtitles (specify languages), and optionally download playlists; auto-merges audio/video.
license: MIT

permissions:
  - shell
  - filesystem
  - network

config:
  download_path:
    type: string
    required: false
    default: "~/Downloads/yt-dlp"
    description: Default directory to save downloads

entryPoint:
  type: natural
  prompt: |
    You are a video downloader skill that uses yt-dlp.
    When the user provides a video URL, generate a safe yt-dlp command.
    If the site is YouTube, prefer adding --cookies-from-browser chrome to avoid 403.
    Support:
    - video download (best available)
    - audio-only extraction (-x --audio-format mp3)
    - subtitles (--write-subs --sub-langs all)
    - specific quality via format filters (e.g., height<=720)
    Use the configured download_path unless the user specifies another safe path.
    Validate URLs are http(s) and avoid executing arbitrary untrusted shell.

triggers:
  keywords:
    - yt-dlp
    - ytdlp
    - download
    - download video
    - download this video
    - save video
    - 1080p
    - 720p
    - best quality
    - subtitles
    - download subtitles
    - playlist
    - download playlist
    - extract audio
    - mp3
    - audio only
    - YouTube
    - youtube
    - shorts
    - youtube.com/shorts
    - Bilibili
    - B站
    - X
    - Twitter
    - TikTok
    - 抖音
    - Douyin
    - 下载视频
    - 下载 1080p
    - 下载 720p
    - 下载 best
    - 下载字幕
    - 下载播放列表
    - 播放列表
    - 提取音频
    - 提取 MP3
    - 仅音频
