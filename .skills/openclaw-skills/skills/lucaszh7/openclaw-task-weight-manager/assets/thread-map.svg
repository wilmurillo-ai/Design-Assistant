  <text x="640" y="190" fill="#f7fbff" font-size="38" font-weight="700" font-family="Arial, Helvetica, sans-serif">Priority Router</text>
  <text x="640" y="234" fill="#96b5cd" font-size="22" font-family="Arial, Helvetica, sans-serif">Weights, urgency, dependency, intent.</text>

  <rect x="640" y="276" width="270" height="74" rx="18" fill="#102438"/>
  <text x="672" y="322" fill="#f1fbff" font-size="24" font-family="Arial, Helvetica, sans-serif">User intent signal</text>

