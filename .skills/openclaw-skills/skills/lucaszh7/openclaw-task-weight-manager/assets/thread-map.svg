  <rect width="1400" height="760" rx="32" fill="url(#bg2)"/>
  <text x="70" y="90" fill="#f6fbff" font-size="46" font-weight="700" font-family="Arial, Helvetica, sans-serif">One Conversation. Five Live Threads.</text>
  <text x="70" y="132" fill="#95b8d1" font-size="24" font-family="Arial, Helvetica, sans-serif">The skill does not flatten context. It routes it.</text>

  <rect x="80" y="210" width="250" height="108" rx="20" fill="#17283d"/>
