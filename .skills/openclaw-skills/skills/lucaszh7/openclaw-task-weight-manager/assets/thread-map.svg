  <path d="M340 264 C490 264 460 220 600 220" fill="none" stroke="#3b82f6" stroke-width="4"/>
  <path d="M340 414 C490 414 460 380 600 380" fill="none" stroke="#38bdf8" stroke-width="4"/>
  <path d="M340 564 C490 564 460 540 600 540" fill="none" stroke="#60a5fa" stroke-width="4"/>

