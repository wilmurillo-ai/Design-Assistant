  <text x="672" y="514" fill="#f1fbff" font-size="24" font-family="Arial, Helvetica, sans-serif">Dependency signal</text>

  <path d="M950 380 H1040" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>

