  <text x="112" y="293" fill="#f7fbff" font-size="28" font-weight="700" font-family="Arial, Helvetica, sans-serif">Product Strategy</text>

  <rect x="80" y="360" width="250" height="108" rx="20" fill="#17283d"/>
  <text x="112" y="405" fill="#8edcff" font-size="18" font-family="Arial, Helvetica, sans-serif" letter-spacing="2">THREAD B</text>
  <text x="112" y="443" fill="#f7fbff" font-size="28" font-weight="700" font-family="Arial, Helvetica, sans-serif">Skill Design</text>

