<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="12"/>

  <!-- Floating multilingual terms — actual semiconductor search terms -->
  <g fill="#818cf8" fill-opacity="0.18" font-family="system-ui, -apple-system, sans-serif" font-weight="400">
    <!-- Korean -->
    <text x="55" y="32" font-size="11">공급업체</text>
    <text x="365" y="28" font-size="10">국산화</text>
    <text x="715" y="38" font-size="11">소부장</text>
    <text x="820" y="25" font-size="9">식각</text>
    <!-- Japanese -->
    <text x="145" y="45" font-size="10">仕入先</text>
    <text x="490" y="35" font-size="11">半導体材料</text>
    <text x="600" y="25" font-size="9">歩留まり</text>
    <!-- Chinese Simplified -->
    <text x="270" y="38" font-size="10">卡脖子</text>
    <text x="760" y="48" font-size="10">国产替代</text>
    <text x="42" y="48" font-size="9">前五名供应商</text>
    <!-- Chinese Traditional -->
    <text x="440" y="48" font-size="9">供應鏈</text>
    <text x="570" y="45" font-size="10">晶圓代工</text>
    <text x="160" y="25" font-size="9">主要販売先</text>
    <text x="680" y="30" font-size="9">先進製程</text>
  </g>

  <!-- Subtle circuit traces -->
  <g stroke="#6366f1" stroke-opacity="0.08" stroke-width="1" fill="none">
    <line x1="40" y1="60" x2="200" y2="60"/>
    <line x1="220" y1="60" x2="340" y2="60"/>
    <line x1="40" y1="220" x2="160" y2="220"/>
    <line x1="180" y1="220" x2="300" y2="220"/>
    <line x1="600" y1="50" x2="750" y2="50"/>
    <line x1="770" y1="50" x2="860" y2="50"/>
    <line x1="620" y1="230" x2="780" y2="230"/>
    <line x1="800" y1="230" x2="860" y2="230"/>
    <line x1="200" y1="40" x2="200" y2="60"/>
    <line x1="340" y1="60" x2="340" y2="90"/>
    <line x1="160" y1="200" x2="160" y2="220"/>
    <line x1="300" y1="220" x2="300" y2="245"/>
    <line x1="750" y1="30" x2="750" y2="50"/>
    <line x1="860" y1="50" x2="860" y2="75"/>
    <line x1="780" y1="210" x2="780" y2="230"/>
    <line x1="620" y1="230" x2="620" y2="255"/>
    <circle cx="200" cy="60" r="2.5" fill="#6366f1" fill-opacity="0.12"/>
    <circle cx="340" cy="60" r="2.5" fill="#6366f1" fill-opacity="0.12"/>
    <circle cx="160" cy="220" r="2.5" fill="#6366f1" fill-opacity="0.12"/>
    <circle cx="300" cy="220" r="2.5" fill="#6366f1" fill-opacity="0.12"/>
    <circle cx="750" cy="50" r="2.5" fill="#6366f1" fill-opacity="0.12"/>
    <circle cx="860" cy="50" r="2.5" fill="#6366f1" fill-opacity="0.12"/>
    <circle cx="780" cy="230" r="2.5" fill="#6366f1" fill-opacity="0.12"/>
    <circle cx="620" cy="230" r="2.5" fill="#6366f1" fill-opacity="0.12"/>
  </g>

  <!-- Pipeline: SEARCH → VERIFY → TRIANGULATE → REPORT -->
  <g transform="translate(450, 70)">
    <!-- Flow line -->
    <line x1="-310" y1="0" x2="310" y2="0" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="5 3"/>

    <!-- Node: SEARCH -->
    <g transform="translate(-245, 0)">
      <rect x="-42" y="-15" width="84" height="30" rx="5" fill="#1e1b4b" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
      <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" fill="#a5b4fc" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="1">SEARCH</text>
      <text x="0" y="28" text-anchor="middle" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif" font-size="8">5 languages</text>
    </g>

    <!-- Arrow -->
    <polygon points="-168,-3 -162,0 -168,3" fill="#6366f1" fill-opacity="0.5"/>

    <!-- Node: VERIFY -->
    <g transform="translate(-105, 0)">
      <rect x="-38" y="-15" width="76" height="30" rx="5" fill="#1e1b4b" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
      <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" fill="#a5b4fc" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="1">VERIFY</text>
      <text x="0" y="28" text-anchor="middle" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif" font-size="8">registry-first</text>
    </g>

    <!-- Arrow -->
    <polygon points="-32,-3 -26,0 -32,3" fill="#7c3aed" fill-opacity="0.5"/>

    <!-- Node: TRIANGULATE -->
    <g transform="translate(45, 0)">
      <rect x="-52" y="-15" width="104" height="30" rx="5" fill="#1e1b4b" stroke="#7c3aed" stroke-opacity="0.5" stroke-width="1"/>
      <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" fill="#c4b5fd" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="1">TRIANGULATE</text>
      <text x="0" y="28" text-anchor="middle" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif" font-size="8">cross-reference</text>
    </g>

    <!-- Arrow -->
    <polygon points="132,-3 138,0 132,3" fill="#a78bfa" fill-opacity="0.5"/>

    <!-- Node: REPORT -->
    <g transform="translate(205, 0)">
      <rect x="-42" y="-15" width="84" height="30" rx="5" fill="#1e1b4b" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="1"/>
      <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" fill="#ddd6fe" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="1">REPORT</text>
      <text x="0" y="28" text-anchor="middle" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif" font-size="8">zero hallucination</text>
    </g>
  </g>

  <!-- Title -->
  <text x="450" y="162" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" letter-spacing="-1">chip<tspan fill="url(#accent)">Chain</tspan></text>

  <!-- Tagline -->
  <text x="450" y="195" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" letter-spacing="0.5">Trace the chain. From mine to fab. In five languages.</text>

  <!-- Methodology pills -->
  <g transform="translate(450, 228)">
    <g transform="translate(-180, 0)">
      <rect x="-55" y="-11" width="110" height="22" rx="11" fill="#1e1b4b" stroke="#4f46e5" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="10">registry-first citing</text>
    </g>
    <g transform="translate(-35, 0)">
      <rect x="-55" y="-11" width="110" height="22" rx="11" fill="#1e1b4b" stroke="#4f46e5" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="10">6-level confidence</text>
    </g>
    <g transform="translate(110, 0)">
      <rect x="-55" y="-11" width="110" height="22" rx="11" fill="#1e1b4b" stroke="#4f46e5" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="10">mandatory search log</text>
    </g>
  </g>

  <!-- Built by -->
  <text x="450" y="265" text-anchor="middle" fill="#4b5563" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400">built by Leonardo Boquillon</text>
</svg>
