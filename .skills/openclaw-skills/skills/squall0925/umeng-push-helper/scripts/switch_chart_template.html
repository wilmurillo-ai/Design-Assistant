<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开关统计报告 - {{appkey}}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 3px solid #f0f0f0;
        }
        
        .header h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header .appkey {
            color: #718096;
            font-size: 16px;
            font-family: monospace;
            background: #f7fafc;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
        }
        
        .header .date-range {
            color: #4a5568;
            font-size: 18px;
            margin-top: 15px;
            font-weight: 500;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            padding: 25px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card.blue { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .card.green { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .card.purple { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card.orange { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        
        .card-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .card-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .card-subtitle {
            font-size: 13px;
            opacity: 0.8;
        }
        
        .charts-section {
            margin-bottom: 30px;
        }
        
        .chart-title {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 20px;
            padding-left: 15px;
            border-left: 4px solid #667eea;
        }
        
        .chart-container {
            position: relative;
            height: 350px;
            margin-bottom: 40px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .data-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: right;
            font-weight: 600;
        }
        
        .data-table th:first-child {
            text-align: left;
            border-radius: 10px 0 0 0;
        }
        
        .data-table th:last-child {
            border-radius: 0 10px 0 0;
        }
        
        .data-table td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .data-table td:first-child {
            text-align: left;
            font-weight: 500;
            color: #2d3748;
        }
        
        .data-table tr:hover {
            background: #f7fafc;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
            color: #718096;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 开关统计报告</h1>
            <div class="appkey">{{appkey}}</div>
            <div class="date-range">📅 {{start_date}} 至 {{end_date}}</div>
        </div>
        
        <div class="summary-cards">
            <div class="card blue">
                <div class="card-title">累计新增关闭设备数</div>
                <div class="card-value">{{total_add_close}}</div>
                <div class="card-subtitle">台</div>
            </div>
            <div class="card green">
                <div class="card-title">累计新增打开设备数</div>
                <div class="card-value">{{total_add_open}}</div>
                <div class="card-subtitle">台</div>
            </div>
            <div class="card purple">
                <div class="card-title">平均 DAU</div>
                <div class="card-value">{{avg_dau}}</div>
                <div class="card-subtitle">人</div>
            </div>
            <div class="card orange">
                <div class="card-title">平均日关闭率</div>
                <div class="card-value">{{avg_ratio}}</div>
                <div class="card-subtitle">%</div>
            </div>
        </div>
        
        <div class="charts-section">
            <div class="chart-title">📈 核心指标趋势</div>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
        
        <div class="charts-section">
            <div class="chart-title">🔍 新增关闭与打开对比</div>
            <div class="chart-container">
                <canvas id="compareChart"></canvas>
            </div>
        </div>
        
        <div class="charts-section">
            <div class="chart-title">📊 日关闭率变化趋势</div>
            <div class="chart-container">
                <canvas id="ratioChart"></canvas>
            </div>
        </div>
        
        <table class="data-table">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>新增关闭</th>
                    <th>新增打开</th>
                    <th>DAU</th>
                    <th>关闭设备数</th>
                    <th>关闭率</th>
                </tr>
            </thead>
            <tbody>
                {{table_rows}}
            </tbody>
        </table>
        
        <div class="footer">
            生成时间：{{generated_time}} | 数据来源：友盟推送
        </div>
    </div>
    
    <script>
        // 全局配置
        Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto';
        Chart.defaults.color = '#4a5568';
        
        // 主图表 - 多指标趋势
        const mainCtx = document.getElementById('mainChart').getContext('2d');
        const mainChart = new Chart(mainCtx, {
            type: 'line',
            data: {
                labels: {{labels}},
                datasets: [
                    {
                        label: '新增关闭设备数',
                        data: {{addClose_data}},
                        borderColor: '#f5576c',
                        backgroundColor: 'rgba(245, 87, 108, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        pointBackgroundColor: '#f5576c',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    },
                    {
                        label: '新增打开设备数',
                        data: {{addOpen_data}},
                        borderColor: '#43e97b',
                        backgroundColor: 'rgba(67, 233, 123, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        pointBackgroundColor: '#43e97b',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    },
                    {
                        label: 'DAU',
                        data: {{dau_data}},
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: true,
                        position: 'top',
                        labels: {
                            usePointStyle: true,
                            padding: 15,
                            font: {
                                size: 13,
                                weight: '500'
                            }
                        }
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#2d3748',
                        bodyColor: '#4a5568',
                        borderColor: '#e2e8f0',
                        borderWidth: 1,
                        padding: 15,
                        displayColors: true,
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) {
                                    label += ': ';
                                }
                                if (context.parsed.y !== null) {
                                    label += new Intl.NumberFormat('zh-CN').format(context.parsed.y);
                                }
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            font: {
                                size: 12
                            }
                        }
                    },
                    y: {
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        },
                        ticks: {
                            callback: function(value) {
                                if (value >= 10000) {
                                    return (value / 10000).toFixed(1) + '万';
                                }
                                return value.toLocaleString();
                            },
                            font: {
                                size: 12
                            }
                        }
                    }
                },
                interaction: {
                    mode: 'nearest',
                    axis: 'x',
                    intersect: false
                }
            }
        });
        
        // 对比图表
        const compareCtx = document.getElementById('compareChart').getContext('2d');
        const compareChart = new Chart(compareCtx, {
            type: 'bar',
            data: {
                labels: {{labels}},
                datasets: [
                    {
                        label: '新增关闭设备数',
                        data: {{addClose_data}},
                        backgroundColor: 'rgba(245, 87, 108, 0.8)',
                        borderColor: '#f5576c',
                        borderWidth: 2,
                        borderRadius: 8,
                        borderSkipped: false
                    },
                    {
                        label: '新增打开设备数',
                        data: {{addOpen_data}},
                        backgroundColor: 'rgba(67, 233, 123, 0.8)',
                        borderColor: '#43e97b',
                        borderWidth: 2,
                        borderRadius: 8,
                        borderSkipped: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: true,
                        position: 'top',
                        labels: {
                            usePointStyle: true,
                            padding: 15,
                            font: {
                                size: 13,
                                weight: '500'
                            }
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#2d3748',
                        bodyColor: '#4a5568',
                        borderColor: '#e2e8f0',
                        borderWidth: 1,
                        padding: 15,
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) {
                                    label += ': ';
                                }
                                if (context.parsed.y !== null) {
                                    label += new Intl.NumberFormat('zh-CN').format(context.parsed.y);
                                }
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            font: {
                                size: 12
                            }
                        }
                    },
                    y: {
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        },
                        ticks: {
                            callback: function(value) {
                                if (value >= 10000) {
                                    return (value / 10000).toFixed(1) + '万';
                                }
                                return value.toLocaleString();
                            }
                        }
                    }
                }
            }
        });
        
        // 关闭率图表
        const ratioCtx = document.getElementById('ratioChart').getContext('2d');
        const ratioChart = new Chart(ratioCtx, {
            type: 'line',
            data: {
                labels: {{labels}},
                datasets: [{
                    label: '日关闭率 (%)',
                    data: {{ratio_data}},
                    borderColor: '#fa709a',
                    backgroundColor: 'rgba(250, 112, 154, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    pointBackgroundColor: '#fa709a',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#2d3748',
                        bodyColor: '#4a5568',
                        borderColor: '#e2e8f0',
                        borderWidth: 1,
                        padding: 15,
                        callbacks: {
                            label: function(context) {
                                return '日关闭率：' + context.parsed.y.toFixed(2) + '%';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false
                        }
                    },
                    y: {
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        },
                        ticks: {
                            callback: function(value) {
                                return value.toFixed(0) + '%';
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
