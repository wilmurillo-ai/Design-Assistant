# AutoResearchClaw Configuration Template
# 复制此文件为 config.yaml 并修改配置

# =============================================================================
# 项目配置
# =============================================================================
project:
  name: "my-autonomous-research"
  output_dir: "./artifacts"

# =============================================================================
# 研究主题（运行时覆盖）
# =============================================================================
research:
  topic: "Your research topic here"  # 运行时指定，此处为默认值

# =============================================================================
# LLM 配置（必需）
# =============================================================================
llm:
  # API 端点（OpenAI 兼容）
  base_url: "https://api.openai.com/v1"
  
  # API Key（二选一：使用环境变量或直接填写）
  api_key_env: "OPENAI_API_KEY"  # 推荐：使用环境变量
  api_key: ""                    # 或在此直接填写 API Key
  
  # 模型配置
  primary_model: "gpt-4o"        # 主模型
  fallback_models:               # 备用模型（按顺序尝试）
    - "gpt-4.1"
    - "gpt-4o-mini"
  
  # 可选：Semantic Scholar API Key（提高限额）
  s2_api_key: ""
  
  # 可选：思考模式（某些模型支持）
  thinking: false
  thinking_budget: 10000

# =============================================================================
# 实验配置
# =============================================================================
experiment:
  # 执行模式
  # - simulated: LLM 生成模拟结果（快速，无需执行）
  # - sandbox: 本地沙盒执行（需要 Python 环境）
  # - ssh_remote: 远程 GPU 服务器执行
  mode: "simulated"
  
  # 沙盒配置（mode: sandbox 时使用）
  sandbox:
    python_path: "python"        # Python 可执行文件路径
    timeout: 1800                # 单次执行超时（秒）
    max_retries: 3               # 最大重试次数
  
  # 远程配置（mode: ssh_remote 时使用）
  ssh:
    host: ""                     # 远程服务器地址
    user: ""                     # 用户名
    python_path: "/usr/bin/python3"
    
# =============================================================================
# 论文配置
# =============================================================================
paper:
  # 目标会议模板
  # 可选：neurips, icml, iclr
  template: "neurips"
  
  # 目标年份
  year: 2026
  
  # 可选：指定审稿维度权重
  review_weights:
    novelty: 0.3
    technical_quality: 0.25
    evaluation: 0.2
    clarity: 0.15
    significance: 0.1

# =============================================================================
# 流水线配置
# =============================================================================
pipeline:
  # 网关阶段是否需要人工审批
  # false = 全自动（--auto-approve）
  # true = 在阶段 5/9/20 暂停等待审批
  require_approval: false
  
  # 最大重试次数
  max_retries: 3
  
  # 是否启用 MetaClaw 跨跑学习
  metaclaw_enabled: false
  
  # 超时配置（毫秒）
  timeout: 86400000  # 24 小时

# =============================================================================
# 日志配置
# =============================================================================
logging:
  level: "INFO"      # DEBUG, INFO, WARNING, ERROR
  file: "researchclaw.log"
  
# =============================================================================
# 高级配置（一般不需要修改）
# =============================================================================
advanced:
  # 文献搜索配置
  literature:
    max_papers: 50           # 最多收集文献数
    year_min: 2020           # 最小年份
    deduplicate: true        # 自动去重
  
  # 验证配置
  verification:
    check_citations: true    # 验证引用真实性
    check_consistency: true  # 检查论文 - 证据一致性
  
  # 归档配置
  archive:
    enabled: true            # 启用知识归档
    retention_days: 30       # 经验保留天数
