<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Train 饮食数据报告</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(17, 153, 142, 0.3);
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .subtitle {
            opacity: 0.9;
            font-size: 16px;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .summary-card {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .summary-card .value {
            font-size: 36px;
            font-weight: bold;
            display: block;
        }

        .summary-card .label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* 控制栏 */
        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }

        select, input[type="date"] {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            min-width: 150px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #11998e;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(17, 153, 142, 0.4);
        }

        /* 统计卡片 */
        .stats-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .stat-card.active {
            border-color: #11998e;
            background: #f0fdf9;
        }

        .stat-card .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .stat-card .count {
            font-size: 28px;
            font-weight: bold;
            color: #11998e;
        }

        .stat-card .calories {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .stat-card .label {
            font-size: 14px;
            color: #333;
            margin-top: 5px;
            font-weight: 600;
        }

        /* 图表区域 */
        .chart-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }

        /* 食物记录列表 */
        .records-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .record-card {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid #e0e0e0;
        }

        .record-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        .record-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        .record-content {
            padding: 15px;
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .record-type {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
            color: #333;
        }

        .record-date {
            font-size: 12px;
            color: #666;
        }

        .record-calories {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .record-foods {
            margin: 10px 0;
        }

        .food-item {
            display: inline-block;
            background: white;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 13px;
            margin: 2px;
            border: 1px solid #e0e0e0;
        }

        .record-nutrition {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
        }

        .nutrition-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .nutrition-item {
            display: flex;
            justify-content: space-between;
        }

        .nutrition-label {
            color: #666;
        }

        .nutrition-value {
            font-weight: 600;
            color: #11998e;
        }

        .record-recommendation {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 12px;
            color: #2e7d32;
        }

        .record-recommendation-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        /* 隐藏类 */
        .hidden {
            display: none !important;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .summary-cards {
                grid-template-columns: repeat(2, 1fr);
            }

            .records-grid {
                grid-template-columns: 1fr;
            }

            .nutrition-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🍽️ V-Train 饮食数据报告</h1>
            <p class="subtitle">记录每一餐，关注健康饮食</p>
            <div class="summary-cards">
                <div class="summary-card">
                    <span class="value" id="totalCount">0</span>
                    <div class="label">总记录数</div>
                </div>
                <div class="summary-card">
                    <span class="value" id="totalCalories">0</span>
                    <div class="label">总热量 (kcal)</div>
                </div>
                <div class="summary-card">
                    <span class="value" id="avgCalories">0</span>
                    <div class="label">平均每餐 (kcal)</div>
                </div>
                <div class="summary-card">
                    <span class="value" id="daysCount">0</span>
                    <div class="label">记录天数</div>
                </div>
            </div>
        </div>

        <!-- 控制栏 -->
        <div class="controls">
            <div class="control-group">
                <label>餐型筛选</label>
                <select id="mealTypeFilter">
                    <option value="all">全部餐型</option>
                    <option value="早餐">早餐</option>
                    <option value="午餐">午餐</option>
                    <option value="晚餐">晚餐</option>
                    <option value="正餐">正餐</option>
                    <option value="零食">零食</option>
                    <option value="甜品">甜品</option>
                    <option value="夜宵">夜宵</option>
                </select>
            </div>
            <div class="control-group">
                <label>开始日期</label>
                <input type="date" id="startDate">
            </div>
            <div class="control-group">
                <label>结束日期</label>
                <input type="date" id="endDate">
            </div>
            <button class="btn btn-primary" onclick="resetFilters()">重置筛选</button>
        </div>

        <!-- 餐型统计 -->
        <div class="stats-section">
            <div class="section-title">📊 餐型统计</div>
            <div class="stats-grid" id="statsGrid">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 热量趋势图 -->
        <div class="chart-section">
            <div class="section-title">📈 每日热量趋势</div>
            <div class="chart-container">
                <canvas id="calorieChart"></canvas>
            </div>
        </div>

        <!-- 食物记录 -->
        <div class="records-section">
            <div class="section-title">📝 饮食记录</div>
            <div class="records-grid" id="recordsGrid">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // AGENT 数据注入区域 - 请在此处替换数据
        // ============================================
        const FOOD_DATA = {
            "analyses": [
                // 示例数据，Agent 获取真实数据后替换此处
                {
                    "id": "example-id",
                    "meal_type": "早餐",
                    "meal_date": "2026-01-15",
                    "food_items": [
                        {"name": "燕麦", "description": "50g"},
                        {"name": "牛奶", "description": "250ml"}
                    ],
                    "calories": "320",
                    "ai_analysis": {
                        "carbohydrates": "45g",
                        "fat": "8g",
                        "protein": "12g",
                        "fiber": "5g",
                        "vitamins_and_minerals": "富含维生素B族和钙"
                    },
                    "next_meal_recommendation": ["建议午餐增加蛋白质摄入", "适量增加蔬菜"],
                    "image_urls": [],
                    "created_at": "2026-01-15T08:30:00.000Z"
                }
            ],
            "stats": {
                "早餐": {"count": 15, "totalCalories": 4800, "items": []},
                "午餐": {"count": 12, "totalCalories": 7200, "items": []}
            },
            "totalCount": 27,
            "totalCalories": 12000
        };

        // 用户邮箱（可选，用于显示）
        const USER_EMAIL = "user@example.com";

        // 日期范围（可选）
        const DATE_RANGE = {
            start: "2026-01-01",
            end: "2026-01-31"
        };
        // ============================================

        // 餐型图标映射
        const mealTypeIcons = {
            '早餐': '🌅',
            'breakfast': '🌅',
            '午餐': '☀️',
            'lunch': '☀️',
            '晚餐': '🌙',
            'dinner': '🌙',
            'supper': '🌙',
            '甜品': '🍰',
            'dessert': '🍰',
            '零食': '🍿',
            'snack': '🍿',
            '夜宵': '🌃',
            'midnight snack': '🌃',
            '正餐': '🍽️',
            'mainMeal': '🍽️'
        };

        // 当前筛选状态
        let currentFilter = {
            mealType: 'all',
            startDate: null,
            endDate: null
        };

        // 图表实例
        let calorieChart = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initDateInputs();
            renderAll();
            setupEventListeners();
        });

        // 初始化日期输入
        function initDateInputs() {
            if (DATE_RANGE.start) {
                document.getElementById('startDate').value = DATE_RANGE.start;
                currentFilter.startDate = DATE_RANGE.start;
            }
            if (DATE_RANGE.end) {
                document.getElementById('endDate').value = DATE_RANGE.end;
                currentFilter.endDate = DATE_RANGE.end;
            }
        }

        // 设置事件监听
        function setupEventListeners() {
            document.getElementById('mealTypeFilter').addEventListener('change', function(e) {
                currentFilter.mealType = e.target.value;
                renderRecords();
            });

            document.getElementById('startDate').addEventListener('change', function(e) {
                currentFilter.startDate = e.target.value;
                renderRecords();
            });

            document.getElementById('endDate').addEventListener('change', function(e) {
                currentFilter.endDate = e.target.value;
                renderRecords();
            });
        }

        // 重置筛选
        function resetFilters() {
            currentFilter = {
                mealType: 'all',
                startDate: DATE_RANGE.start,
                endDate: DATE_RANGE.end
            };
            document.getElementById('mealTypeFilter').value = 'all';
            document.getElementById('startDate').value = DATE_RANGE.start || '';
            document.getElementById('endDate').value = DATE_RANGE.end || '';
            renderRecords();
        }

        // 渲染所有内容
        function renderAll() {
            renderSummary();
            renderStats();
            renderChart();
            renderRecords();
        }

        // 渲染汇总数据
        function renderSummary() {
            const analyses = FOOD_DATA.analyses || [];
            const totalCount = analyses.length;
            const totalCalories = analyses.reduce((sum, a) => sum + parseInt(a.calories || 0), 0);
            const avgCalories = totalCount > 0 ? Math.round(totalCalories / totalCount) : 0;

            // 计算记录天数
            const dates = new Set();
            analyses.forEach(a => {
                const date = a.meal_date || a.created_at.substring(0, 10);
                dates.add(date);
            });
            const daysCount = dates.size;

            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('totalCalories').textContent = totalCalories.toLocaleString();
            document.getElementById('avgCalories').textContent = avgCalories;
            document.getElementById('daysCount').textContent = daysCount;

            // 更新页面标题
            if (USER_EMAIL && USER_EMAIL !== "user@example.com") {
                document.title = `V-Train 饮食报告 - ${USER_EMAIL}`;
            }
        }

        // 渲染餐型统计
        function renderStats() {
            const statsGrid = document.getElementById('statsGrid');
            const stats = FOOD_DATA.stats || {};

            let html = '';
            for (const [mealType, stat] of Object.entries(stats)) {
                const icon = mealTypeIcons[mealType] || '🍽️';
                html += `
                    <div class="stat-card" onclick="filterByMealType('${mealType}')">
                        <div class="icon">${icon}</div>
                        <div class="count">${stat.count}</div>
                        <div class="calories">${stat.totalCalories} kcal</div>
                        <div class="label">${mealType}</div>
                    </div>
                `;
            }

            statsGrid.innerHTML = html || '<div class="empty-state">暂无统计数据</div>';
        }

        // 按餐型筛选
        function filterByMealType(mealType) {
            document.getElementById('mealTypeFilter').value = mealType;
            currentFilter.mealType = mealType;
            renderRecords();

            // 滚动到记录区域
            document.getElementById('recordsGrid').scrollIntoView({ behavior: 'smooth' });
        }

        // 渲染图表
        function renderChart() {
            const ctx = document.getElementById('calorieChart').getContext('2d');
            const analyses = FOOD_DATA.analyses || [];

            // 按日期汇总热量
            const dailyCalories = {};
            analyses.forEach(a => {
                const date = a.meal_date || a.created_at.substring(0, 10);
                dailyCalories[date] = (dailyCalories[date] || 0) + parseInt(a.calories || 0);
            });

            // 排序日期
            const sortedDates = Object.keys(dailyCalories).sort();
            const calories = sortedDates.map(d => dailyCalories[d]);

            // 如果已有图表，先销毁
            if (calorieChart) {
                calorieChart.destroy();
            }

            calorieChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedDates.map(d => d.substring(5)), // 只显示 MM-DD
                    datasets: [{
                        label: '每日热量 (kcal)',
                        data: calories,
                        borderColor: '#11998e',
                        backgroundColor: 'rgba(17, 153, 142, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#11998e',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    return `热量: ${context.parsed.y} kcal`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0,0,0,0.05)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        // 渲染食物记录
        function renderRecords() {
            const recordsGrid = document.getElementById('recordsGrid');
            let analyses = FOOD_DATA.analyses || [];

            // 应用筛选
            analyses = analyses.filter(a => {
                // 餐型筛选
                if (currentFilter.mealType !== 'all' && a.meal_type !== currentFilter.mealType) {
                    return false;
                }

                // 日期筛选
                const date = a.meal_date || a.created_at.substring(0, 10);
                if (currentFilter.startDate && date < currentFilter.startDate) {
                    return false;
                }
                if (currentFilter.endDate && date > currentFilter.endDate) {
                    return false;
                }

                return true;
            });

            // 按日期排序（最新的在前）
            analyses.sort((a, b) => {
                const dateA = a.meal_date || a.created_at;
                const dateB = b.meal_date || b.created_at;
                return new Date(dateB) - new Date(dateA);
            });

            if (analyses.length === 0) {
                recordsGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">🍽️</div>
                        <h3>没有找到匹配的记录</h3>
                        <p>尝试调整筛选条件</p>
                    </div>
                `;
                return;
            }

            let html = '';
            analyses.forEach(item => {
                html += createRecordCard(item);
            });

            recordsGrid.innerHTML = html;
        }

        // 创建记录卡片
        function createRecordCard(item) {
            const icon = mealTypeIcons[item.meal_type] || '🍽️';
            const date = item.meal_date || item.created_at.substring(0, 10);
            const time = item.created_at.substring(11, 16);

            // 食物列表
            const foods = item.food_items || [];
            const foodsHtml = foods.length > 0
                ? foods.map(f => `<span class="food-item">${f.name}</span>`).join('')
                : '<span class="food-item">无详细记录</span>';

            // AI 营养分析
            let nutritionHtml = '';
            if (item.ai_analysis) {
                nutritionHtml = `
                    <div class="record-nutrition">
                        <div class="nutrition-grid">
                            <div class="nutrition-item">
                                <span class="nutrition-label">蛋白质</span>
                                <span class="nutrition-value">${item.ai_analysis.protein || '-'}</span>
                            </div>
                            <div class="nutrition-item">
                                <span class="nutrition-label">脂肪</span>
                                <span class="nutrition-value">${item.ai_analysis.fat || '-'}</span>
                            </div>
                            <div class="nutrition-item">
                                <span class="nutrition-label">碳水</span>
                                <span class="nutrition-value">${item.ai_analysis.carbohydrates || '-'}</span>
                            </div>
                            <div class="nutrition-item">
                                <span class="nutrition-label">纤维</span>
                                <span class="nutrition-value">${item.ai_analysis.fiber || '-'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }

            // AI 建议
            let recommendationHtml = '';
            if (item.next_meal_recommendation && item.next_meal_recommendation.length > 0) {
                const recs = item.next_meal_recommendation.map(r => `<div>• ${r}</div>`).join('');
                recommendationHtml = `
                    <div class="record-recommendation">
                        <div class="record-recommendation-title">💡 AI 建议</div>
                        ${recs}
                    </div>
                `;
            }

            // 图片
            let imageHtml = '';
            if (item.image_urls && item.image_urls.length > 0) {
                imageHtml = `<img src="${item.image_urls[0]}" class="record-image" alt="食物图片" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`;
            }

            return `
                <div class="record-card">
                    ${imageHtml}
                    <div class="record-image" style="${imageHtml ? 'display:none;' : ''}">${icon}</div>
                    <div class="record-content">
                        <div class="record-header">
                            <div>
                                <div class="record-type">
                                    <span>${icon}</span>
                                    <span>${item.meal_type}</span>
                                </div>
                                <div class="record-date">${date} ${time}</div>
                            </div>
                            <div class="record-calories">${item.calories || 0} kcal</div>
                        </div>
                        <div class="record-foods">
                            ${foodsHtml}
                        </div>
                        ${nutritionHtml}
                        ${recommendationHtml}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
