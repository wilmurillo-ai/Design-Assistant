<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Context Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    padding: 20px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #58a6ff;
  }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .refresh-info { font-size: 12px; color: #8b949e; }
  #sessions { display: flex; flex-direction: column; gap: 10px; }
  
  .session-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .session-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .session-key {
    font-size: 13px;
    font-weight: 600;
    color: #f0f6fc;
    font-family: 'Courier New', monospace;
  }
  .session-meta { font-size: 11px; color: #8b949e; display: flex; gap: 12px; align-items: center; }
  .bar-container {
    position: relative;
    height: 24px;
    background: #21262d;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .bar-fill.low    { background: linear-gradient(90deg, #238636, #2ea043); }
  .bar-fill.medium { background: linear-gradient(90deg, #9e6a03, #d29922); }
  .bar-fill.high   { background: linear-gradient(90deg, #bf4b4b, #f85149); }
  .bar-fill.critical { background: linear-gradient(90deg, #a01010, #f85149); animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .bar-label {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center;
    padding-left: 10px;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    color: #f0f6fc;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  .session-stats { display: flex; gap: 16px; font-size: 11px; color: #8b949e; font-family: 'Courier New', monospace; }
  .stat { display: flex; gap: 4px; }
  .stat-label { color: #6e7681; }
  .stat-val { color: #58a6ff; }
  .stat-val.warn { color: #d29922; }
  .stat-val.danger { color: #f85149; }
  .compact-btn {
    background: #1f6feb;
    border: none;
    border-radius: 4px;
    color: white;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    margin-top: 6px;
    font-family: inherit;
  }
  .compact-btn:hover { background: #388bfd; }
  .compact-btn:disabled { background: #3d4a5c; color: #6e7681; cursor: default; }
  .compact-btn.running { background: #d29922; }
  
  .history-label { font-size: 10px; color: #6e7681; margin-top: 10px; margin-bottom: 4px; }
  .history-dots { display: flex; gap: 3px; align-items: flex-end; }
  .history-dot {
    width: 14px; height: 14px;
    border-radius: 3px;
    background: #21262d;
    border: 1px solid #30363d;
    position: relative;
    overflow: hidden;
  }
  .history-dot-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    transition: height 0.3s;
  }
  .history-dot-fill.low { background: #238636; }
  .history-dot-fill.medium { background: #d29922; }
  .history-dot-fill.high { background: #f85149; }
  .history-dot-fill.critical { background: #a01010; }

  .compaction-dot {
    display: inline-block;
    width: 8px; height: 8px; border-radius: 50%;
    background: #d29922; margin-left: 6px; vertical-align: middle;
  }
  .error { color: #f85149; font-size: 13px; padding: 20px; text-align: center; }
  .loading { color: #8b949e; font-size: 13px; padding: 20px; text-align: center; }

  /* Compact Modal */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    display: none;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 24px;
    width: 500px;
    max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 16px; margin-bottom: 12px; color: #f0f6fc; }
  .modal p { font-size: 12px; color: #8b949e; margin-bottom: 12px; }
  .modal textarea {
    width: 100%; height: 100px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 10px;
    resize: vertical;
    margin-bottom: 12px;
  }
  .modal textarea::placeholder { color: #6e7681; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn {
    border: none; border-radius: 6px;
    font-size: 13px; padding: 8px 16px;
    cursor: pointer; font-family: inherit;
  }
  .modal-btn.primary { background: #238636; color: white; }
  .modal-btn.primary:hover { background: #2ea043; }
  .modal-btn.primary:disabled { background: #3d4a5c; color: #6e7681; cursor: default; }
  .modal-btn.secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
  .modal-btn.secondary:hover { background: #30363d; }
  .modal-error { color: #f85149; font-size: 12px; margin-bottom: 10px; display: none; }
  .modal-success { color: #238636; font-size: 12px; margin-bottom: 10px; display: none; }
  .modal-files { margin-top: 10px; }
  .modal-files a { color: #58a6ff; font-size: 12px; text-decoration: none; margin-right: 12px; }
  .modal-files a:hover { text-decoration: underline; }

  /* Transcript Viewer */
  .transcript-panel {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    margin-top: 16px;
    display: none;
  }
  .transcript-panel.active { display: block; }
  .transcript-panel h3 { font-size: 14px; margin-bottom: 12px; color: #f0f6fc; }
  .transcript-panel .close-btn {
    float: right; background: none; border: none; color: #8b949e;
    font-size: 18px; cursor: pointer;
  }
  .transcript-panel .close-btn:hover { color: #f0f6fc; }
  .transcript-content {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: 12px;
    max-height: 400px;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #c9d1d9;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .transcript-toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
  }
  .transcript-toolbar select {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 4px;
    color: #c9d1d9;
    font-size: 12px;
    padding: 4px 8px;
  }
</style>
</head>
<body>
<div class="header-row">
  <h1>📊 Session Context Monitor</h1>
  <div class="refresh-info" id="refreshInfo">connecting...</div>
</div>
<div id="sessions"><div class="loading">Connecting to Gateway...</div></div>

<!-- Transcript Viewer -->
<div class="transcript-panel" id="transcriptPanel">
  <button class="close-btn" onclick="closeTranscript()">×</button>
  <h3 id="transcriptTitle">Transcript</h3>
  <div class="transcript-toolbar">
    <select id="transcriptSelect" onchange="loadSelectedTranscript()">
      <option value="">Select a file...</option>
    </select>
  </div>
  <div class="transcript-content" id="transcriptContent">Select a file to view...</div>
</div>

<!-- Compact Modal -->
<div class="modal-overlay" id="compactModal">
  <div class="modal">
    <h2>🗜️ Compact Session</h2>
    <p>输入你要保留的内容指令（如"保留所有代码决策和技术方案"）。<br>compact 后会生成压缩摘要，旧内容会保存为文件。</p>
    <div class="modal-error" id="modalError"></div>
    <div class="modal-success" id="modalSuccess"></div>
    <textarea id="compactInstructions" placeholder="例如：保留所有代码修改决策、文件路径、技术方案描述。丢弃中间调试过程和无效尝试。"></textarea>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" id="compactSubmitBtn" onclick="submitCompact()">执行 Compact</button>
    </div>
    <div class="modal-files" id="modalFiles" style="display:none">
      <span>文件：</span>
      <a id="preFileLink" href="#" target="_blank">压缩前</a>
      <a id="postFileLink" href="#" target="_blank">压缩后</a>
    </div>
  </div>
</div>

<script>
const API_URL = 'http://127.0.0.1:18790';
const REFRESH_MS = 5000;

const CONTEXT_WINDOWS = {
  'MiniMax-M2': 100000,
  'MiniMax-M2.7': 1000000,
  'MiniMax-M3': 1000000,
  'gpt-4o': 128000,
  'gpt-4o-mini': 128000,
  'claude-sonnet-4-5': 200000,
  'claude-opus-4-6': 200000,
};

let sessionHistory = {};
let currentCompactSession = null;
let transcriptFiles = [];

function getContextWindow(model) {
  if (!model) return 200000;
  // Check longer prefixes first to avoid 'M2' matching 'M2.7'
  const entries = Object.entries(CONTEXT_WINDOWS);
  entries.sort((a, b) => b[0].length - a[0].length);
  for (const [prefix, val] of entries) {
    if (model.includes(prefix)) return val;
  }
  if (model.includes('opus') || model.includes('sonnet')) return 200000;
  if (model.includes('haiku') || model.includes('mini')) return 100000;
  return 200000;
}

function getLevel(pct) {
  if (pct < 50) return 'low';
  if (pct < 75) return 'medium';
  if (pct < 90) return 'high';
  return 'critical';
}

function fmtNum(n) {
  if (!n && n !== 0) return '—';
  return Number(n).toLocaleString();
}

function timeAgo(ts) {
  if (!ts) return '—';
  const diff = Date.now() - ts;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  return Math.floor(diff/3600000) + 'h ago';
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

async function fetchSessions() {
  try {
    const resp = await fetch(API_URL + '/sessions.json?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const sessions = await resp.json();
    renderSessions(sessions);
    document.getElementById('refreshInfo').textContent =
      'Last updated: ' + new Date().toLocaleTimeString() + ' | ' + sessions.length + ' sessions';
  } catch (e) {
    document.getElementById('sessions').innerHTML =
      '<div class="error">获取Session失败: ' + e.message + '<br><br>请确认 Gateway 运行中，或手动启动代理：<br><code>python3 session-monitor-with-proxy.py</code></div>';
  }
}

async function loadTranscriptFiles() {
  try {
    const resp = await fetch(API_URL + '/transcripts/');
    if (resp.ok) {
      transcriptFiles = await resp.json();
    }
  } catch (e) {
    console.log('Failed to load transcript files:', e);
  }
}

function buildDotMatrix(history, win) {
  return history.slice(-20).map(h => {
    const pct = Math.min(100, (h.used / win) * 100);
    const level = getLevel(pct);
    return '<div class="history-dot" title="' + fmtNum(h.used) + ' tok (' + pct.toFixed(1) + '%)"><div class="history-dot-fill ' + level + '" style="height:' + pct + '%"></div></div>';
  }).join('');
}

function renderSessions(sessions) {
  const container = document.getElementById('sessions');
  if (!sessions || sessions.length === 0) {
    container.innerHTML = '<div class="loading">暂无 Session，或 Gateway 未运行</div>';
    return;
  }

  container.innerHTML = sessions.map(s => {
    const model = s.model || '—';
    const win = getContextWindow(model);
    const used = (s.inputTokens || 0) + (s.outputTokens || 0);
    const pct = Math.min(100, (used / win) * 100);
    const level = getLevel(pct);

    const key = s.key || s.sessionId || Math.random();
    if (!sessionHistory[key]) sessionHistory[key] = [];
    sessionHistory[key].push({ used, timestamp: Date.now() });
    if (sessionHistory[key].length > 20) sessionHistory[key].shift();

    const dotsHtml = buildDotMatrix(sessionHistory[key], win);
    const shortKey = (s.key || s.sessionId || '—').split(':').pop().slice(0, 12);

    return '<div class="session-card" id="card-' + key.replace(/[^a-z0-9]/gi,'_') + '">' +
      '<div class="session-top">' +
        '<span class="session-key">' + escHtml(shortKey) + '</span>' +
        '<div class="session-meta">' +
          '<span>' + escHtml(model) + '</span>' +
          (s.compactionCount > 0 ? '<span class="compaction-dot" title="Compacted ' + s.compactionCount + 'x"></span>' : '') +
          '<span>' + timeAgo(s.updatedAt) + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="bar-container">' +
        '<div class="bar-fill ' + level + '" style="width:' + pct + '%"></div>' +
        '<div class="bar-label">' + fmtNum(used) + ' / ' + fmtNum(win) + ' tok   ' + pct.toFixed(1) + '%</div>' +
      '</div>' +
      '<div class="session-stats">' +
        '<div class="stat"><span class="stat-label">in:</span><span class="stat-val ' + (level==='high'||level==='critical'?'danger':'') + '">' + fmtNum(s.inputTokens) + '</span></div>' +
        '<div class="stat"><span class="stat-label">out:</span><span class="stat-val">' + fmtNum(s.outputTokens) + '</span></div>' +
        '<div class="stat"><span class="stat-label">win:</span><span class="stat-val">' + fmtNum(win) + '</span></div>' +
        '<div class="stat"><span class="stat-label">compact:</span><span class="stat-val ' + (s.compactionCount>0?'warn':'') + '">' + (s.compactionCount || 0) + '</span></div>' +
      '</div>' +
      '<div class="history-label">最近 20 次采样</div>' +
      '<div class="history-dots">' + dotsHtml + '</div>' +
      '<div style="margin-top:8px">' +
        '<button class="compact-btn" onclick="openCompactModal(\'' + escHtml(s.key || '') + '\', \'' + escHtml(s.sessionId || '') + '\')">🗜️ Compact</button>' +
        ' <button class="compact-btn" style="background:#2d333b" onclick="openTranscriptPanel(\'' + escHtml(s.key || '') + '\')">📄 Transcript</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// Modal functions
function openCompactModal(sessionKey, sessionId) {
  currentCompactSession = { key: sessionKey, sessionId: sessionId };
  document.getElementById('compactInstructions').value = '';
  document.getElementById('modalError').style.display = 'none';
  document.getElementById('modalSuccess').style.display = 'none';
  document.getElementById('modalFiles').style.display = 'none';
  document.getElementById('compactSubmitBtn').disabled = false;
  document.getElementById('compactSubmitBtn').textContent = '执行 Compact';
  document.getElementById('compactModal').classList.add('active');
}

function closeModal() {
  document.getElementById('compactModal').classList.remove('active');
  currentCompactSession = null;
}

async function submitCompact() {
  if (!currentCompactSession) return;
  const instructions = document.getElementById('compactInstructions').value.trim();
  const btn = document.getElementById('compactSubmitBtn');
  const errorEl = document.getElementById('modalError');
  const successEl = document.getElementById('modalSuccess');
  const filesEl = document.getElementById('modalFiles');

  btn.disabled = true;
  btn.textContent = '执行中...';
  errorEl.style.display = 'none';
  successEl.style.display = 'none';
  filesEl.style.display = 'none';

  try {
    const resp = await fetch(API_URL + '/compact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionKey: currentCompactSession.key,
        sessionId: currentCompactSession.sessionId,
        instructions: instructions
      })
    });
    const result = await resp.json();
    
    if (result.success) {
      successEl.textContent = '✓ Compaction 完成！';
      successEl.style.display = 'block';
      filesEl.style.display = 'block';
      document.getElementById('preFileLink').href = '/transcript/' + result.pre_file;
      document.getElementById('preFileLink').textContent = '📤 压缩前 (' + result.pre_file + ')';
      document.getElementById('postFileLink').href = '/transcript/' + result.post_file;
      document.getElementById('postFileLink').textContent = '📥 压缩后 (' + result.post_file + ')';
      btn.textContent = '完成';
      // Refresh sessions after compaction
      setTimeout(fetchSessions, 2000);
    } else {
      errorEl.textContent = '失败: ' + (result.error || 'Unknown error');
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '重试';
    }
  } catch (e) {
    errorEl.textContent = '请求失败: ' + e.message;
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '重试';
  }
}

// Transcript viewer functions
function openTranscriptPanel(sessionKey) {
  loadTranscriptFiles().then(() => {
    const select = document.getElementById('transcriptSelect');
    select.innerHTML = '<option value="">Select a file...</option>';
    // Filter files by session key
    const safeKey = sessionKey.replace(/[:_]/g, '_');
    transcriptFiles.forEach(f => {
      if (f.name.includes(safeKey) || safeKey === '') {
        select.innerHTML += '<option value="' + f.name + '">' + f.name + ' (' + (f.size/1024).toFixed(1) + 'KB)</option>';
      }
    });
    if (select.options.length === 1) {
      select.innerHTML = '<option value="">No transcripts for this session yet</option>';
    }
    document.getElementById('transcriptTitle').textContent = 'Transcript: ' + sessionKey.split(':').pop().slice(0,12);
    document.getElementById('transcriptContent').textContent = 'Select a file to view...';
    document.getElementById('transcriptPanel').classList.add('active');
  });
}

async function loadSelectedTranscript() {
  const select = document.getElementById('transcriptSelect');
  const filename = select.value;
  if (!filename) {
    document.getElementById('transcriptContent').textContent = 'Select a file to view...';
    return;
  }
  document.getElementById('transcriptContent').textContent = 'Loading...';
  try {
    const resp = await fetch(API_URL + '/transcript/' + encodeURIComponent(filename));
    if (resp.ok) {
      const content = await resp.text();
      document.getElementById('transcriptContent').textContent = content.slice(0, 50000);
    } else {
      document.getElementById('transcriptContent').textContent = 'Failed to load file';
    }
  } catch (e) {
    document.getElementById('transcriptContent').textContent = 'Error: ' + e.message;
  }
}

function closeTranscript() {
  document.getElementById('transcriptPanel').classList.remove('active');
}

// Init
fetchSessions();
loadTranscriptFiles();
setInterval(fetchSessions, REFRESH_MS);
</script>
</body>
</html>
