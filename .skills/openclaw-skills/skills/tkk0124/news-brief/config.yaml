# ============================================================
# News Brief Skill 配置文件（由 setup.py 自动生成）
# 如需修改，直接编辑本文件后重新运行 run.py
# ============================================================

# 新闻分类（最多3个）
# 可选：时政 / 经济 / 社会 / 国际 / 科技 / 体育 / 文娱 / 军事 / 教育 / 法治 / 环境 / 农业
categories:
  - 经济
  - 国际
  - 军事

# 新闻时间范围：24h=过去24小时 / 48h=过去48小时
time_range: "24h"

# 每个分类抓取几条新闻（3-10）
news_per_category: 5

# 每日推送时间（用于定时任务参考）
push_time: "08:00"

# 简报语言：zh=纯中文 / en=纯英文 / both=中英双语
language: zh

# 输出文件保存路径（留空则只打印到终端）
output_dir: "./output"

# 是否包含「今日概览」（3句话总结全部新闻）
include_overview: true

# 是否包含「今日洞察」（趋势分析1句话）
include_insight: true
