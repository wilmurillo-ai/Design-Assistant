# =====================================================
# Design Brief · 设计日报 配置文件
# 只需改这里，其他文件不用动
# =====================================================

# ── 你的岗位 ──────────────────────────────────────
# 取消注释你的岗位（去掉前面的 # 号即可）
#
# 💡 选择建议：
#   选 1~2 个 → 内容更聚焦，每条都和你强相关
#   选 3~5 个 → 兼顾多个方向，适合 lead 或跨角色
#   全选     → 信息面最广，但每条针对性会降低
#
# ——【设计执行层】——
#   - UI设计师          专注视觉还原、组件、设计规范
#   - UX设计师          专注流程、体验、可用性
#   - 视觉设计师         专注品牌、排版、图形语言
#   - 交互设计师         专注逻辑、状态、原型
#   - 服务设计师         专注线上线下全链路
#   - 设计系统工程师      专注组件库、Token、规范维护
#   - 动效设计师         专注微交互、过渡动画
#   - 内容设计师         专注界面文案、UX Writing
#   - 可访问性设计师      专注无障碍、包容性设计
#
# ——【策略研究层】——
#   - 用户研究员         专注访谈、问卷、数据洞察
#   - 增长设计师         专注转化、漏斗、A/B 实验
#   - 产品设计师         设计 + 产品决策合并角色
#
# ——【新兴/前沿工种】——
#   - AI产品设计师       专注 AI 交互范式、prompt UI
#   - 设计工程师         设计 × 代码交叉，能写组件
#   - 零界面设计师        语音、手势、对话式交互
#   - 空间计算设计师      visionOS、AR/VR 空间 UI
#
# ——【其他】——
#   - 产品经理           关注设计决策与产品协作
# ──────────────────────────────────────────────────

roles:
  - UI设计师
  - UX设计师
  # - 视觉设计师
  # - 交互设计师
  # - 服务设计师
  # - 设计系统工程师
  # - 动效设计师
  # - 内容设计师
  # - 可访问性设计师
  # - 用户研究员
  # - 增长设计师
  # - 产品设计师
  # - AI产品设计师
  # - 设计工程师
  # - 零界面设计师
  # - 空间计算设计师
  # - 产品经理

# ── 每日条数（3~10）────────────────────────────────
# 3=精简  5=标准（推荐）  8=扩展  10=全量（设计总监/管理者）
items_per_day: 5

# ── 信息时间范围 ─────────────────────────────────────
# 搜索多长时间内的内容？设计行业更新慢，建议 1w 或 2w
# 可选值：
#   24h → 过去 24 小时（适合关注 Figma 等高频更新）
#   2d  → 过去 2 天
#   3d  → 过去 3 天
#   1w  → 过去 1 周（推荐默认）
#   2w  → 过去 2 周
#   1m  → 过去 1 个月（适合捕捉行业大事件、知名人物动态）
time_range: "1w"

# ── 日报标题（可自定义）─────────────────────────
brief_title: "Design Daily"

# ── 关注的设计师（选填，1~2 个）─────────────────────
# 填写你感兴趣的设计师，日报会优先抓取他们的最新动态。
# name：设计师名字（中文艺名/真名/英文名都行）
# url ：主页链接（Dribbble / X / 个人网站，任意一个）
# focus：你关注他/她的哪个方向（品牌设计/交互/插画 等，可不填）
#
# 示例：
# favorite_designers:
#   - name: "Paco Coursey"
#     url: "https://paco.me"
#     focus: "设计工程师"
#   - name: "小马过河"          # 国内设计师艺名也可以
#     focus: "插画风格"
#
favorite_designers: []
