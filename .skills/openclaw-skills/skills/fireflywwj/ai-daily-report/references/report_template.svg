<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="1120" xmlns="http://www.w3.org/2000/svg" version="1.1">
  <style>
    .title { font: bold 28px sans-serif; fill: #333; }
    .subtitle { font: 16px sans-serif; fill: #555; }
    .section { font: 18px sans-serif; fill: #222; }
    .item { font: 14px sans-serif; fill: #000; }
    .border { stroke: #ddd; stroke-width: 1; fill: none; }
  </style>
  <rect class="border" x="20" y="20" width="760" height="1080" rx="10" ry="10"/>
  <text x="400" y="60" text-anchor="middle" class="title">AI 每日报告 – {{date}}</text>
  <text x="40" y="100" class="subtitle">新闻摘要</text>
  {% for n in news %}
    <text x="60" y="{{120 + loop.index0 * 30}}" class="item">• {{n.title}}</text>
    <text x="80" y="{{135 + loop.index0 * 30}}" class="item" fill="#555">{{n.source}} | {{n.date[:10]}}</text>
  {% endfor %}

  <text x="40" y="{{180 + news|length * 30}}" class="subtitle">开源 AI 项目精选</text>
  {% for p in projects %}
    <text x="60" y="{{200 + news|length * 30 + loop.index0 * 30}}" class="item">• {{p.name}} ({{p.stars}}★)</text>
    <text x="80" y="{{215 + news|length * 30 + loop.index0 * 30}}" class="item" fill="#555">{{p.description}}</text>
  {% endfor %}
</svg>