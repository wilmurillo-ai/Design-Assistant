[pytest]
# 测试路径
testpaths = tests

# 将 pytest 自身缓存移到 cache 下，避免污染源码目录
cache_dir = ../cache/pytest

# Python 文件模式
python_files = test_*.py

# 忽略历史缓存临时目录，避免其被 pytest 误收集
norecursedirs =
    pytest-cache-files-*
    .pytest_cache

# Python 类模式
python_classes = Test*

# Python 函数模式
python_functions = test_*

# 命令行选项
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
    --cov=scripts
    --cov-report=term-missing
    --cov-report=html:reports/htmlcov
    -p tests.conftest

# 标记
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (moderate speed)
    e2e: End-to-end tests (slow, requires environment)
    slow: Slow tests (run separately)
    requires_jdk17: Requires JDK 17 or higher
    requires_android_sdk: Requires Android SDK
    p0: Critical priority tests
    p1: High priority tests
    p2: Medium priority tests

# 最小版本
minversion = 7.0

# 日志配置
log_cli = false
log_cli_level = INFO

# 警告过滤
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 将内建 tmp_path/TemporaryDirectory 收敛到仓库目录，减少系统临时目录权限问题
tmp_path_retention_policy = failed
