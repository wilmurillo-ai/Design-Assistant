<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洒洒·房车陪伴助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }

  /* 顶部英雄区 */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px 40px;
    text-align: center;
    position: relative;
  }

  .avatar-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    margin-bottom: 24px;
  }

  .avatar-wrap img {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 4px solid #e8a838;
    box-shadow: 0 0 30px rgba(232,168,56,0.5), 0 0 60px rgba(232,168,56,0.2);
    object-fit: cover;
  }

  .status-dot {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 20px;
    height: 20px;
    background: #4cff91;
    border-radius: 50%;
    border: 3px solid #16213e;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(76,255,145,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(76,255,145,0); }
  }

  .hero h1 {
    font-size: 2.4rem;
    font-weight: 700;
    color: #e8a838;
    letter-spacing: 4px;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(232,168,56,0.4);
  }

  .hero .tagline {
    font-size: 1rem;
    color: #a0b4cc;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .wake-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(232,168,56,0.15);
    border: 1px solid rgba(232,168,56,0.4);
    border-radius: 30px;
    padding: 8px 20px;
    font-size: 0.9rem;
    color: #e8a838;
    margin-top: 8px;
  }

  .wake-badge .mic-icon {
    font-size: 1.1rem;
    animation: micPulse 1.5s infinite;
  }

  @keyframes micPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* 聊天区 */
  .chat-container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 120px;
  }

  .chat-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 24px;
    min-height: 320px;
    max-height: 420px;
    overflow-y: auto;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .chat-box::-webkit-scrollbar { width: 4px; }
  .chat-box::-webkit-scrollbar-track { background: transparent; }
  .chat-box::-webkit-scrollbar-thumb { background: rgba(232,168,56,0.3); border-radius: 4px; }

  /* 消息气泡 */
  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .msg.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    object-fit: cover;
    border: 2px solid rgba(232,168,56,0.4);
  }

  .msg-avatar.user-avatar {
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    border: 2px solid rgba(102,126,234,0.4);
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .msg.sasa .bubble {
    background: rgba(232,168,56,0.12);
    border: 1px solid rgba(232,168,56,0.25);
    color: #f0e0b0;
    border-bottom-left-radius: 4px;
  }

  .msg.user .bubble {
    background: rgba(102,126,234,0.2);
    border: 1px solid rgba(102,126,234,0.3);
    color: #d0d8ff;
    border-bottom-right-radius: 4px;
  }

  .bubble .cmd-tag {
    display: inline-block;
    background: rgba(232,168,56,0.2);
    border-radius: 6px;
    padding: 1px 6px;
    font-size: 0.85rem;
    color: #e8a838;
    margin: 2px 0;
  }

  /* 打字动效 */
  .typing {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: rgba(232,168,56,0.08);
    border: 1px solid rgba(232,168,56,0.2);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing span {
    width: 7px;
    height: 7px;
    background: #e8a838;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* 输入区 */
  .input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, #1a1a2e 80%, transparent);
    padding: 16px 20px 24px;
  }

  .input-wrap {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .input-wrap input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(232,168,56,0.3);
    border-radius: 30px;
    padding: 14px 20px;
    color: #fff;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-wrap input:focus {
    border-color: rgba(232,168,56,0.7);
    background: rgba(255,255,255,0.1);
  }

  .input-wrap input::placeholder { color: rgba(255,255,255,0.3); }

  .btn-send, .btn-voice {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }

  .btn-send {
    background: linear-gradient(135deg, #e8a838, #c8841a);
    color: #fff;
    box-shadow: 0 4px 15px rgba(232,168,56,0.4);
  }

  .btn-send:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(232,168,56,0.6); }

  .btn-voice {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #a0b4cc;
  }

  .btn-voice:hover { background: rgba(255,255,255,0.14); color: #fff; }
  .btn-voice.listening { background: rgba(255,60,60,0.2); border-color: rgba(255,60,60,0.5); color: #ff6060; animation: micPulse 0.8s infinite; }

  /* 快捷指令 */
  .quick-cmds {
    max-width: 680px;
    margin: 0 auto 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .quick-cmd {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.82rem;
    color: #a0b4cc;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .quick-cmd:hover {
    background: rgba(232,168,56,0.12);
    border-color: rgba(232,168,56,0.35);
    color: #e8a838;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="avatar-wrap">
    <img src="sasa_avatar.png" alt="洒洒">
    <div class="status-dot"></div>
  </div>
  <h1>洒洒</h1>
  <div class="tagline">会说话的德牧导航官 · 净如姐房车旅途的小狗搭子</div>
  <div class="wake-badge">
    <span class="mic-icon">🎙️</span>
    唤醒口令：洒洒，洒洒
  </div>
</div>

<div class="chat-container">
  <div class="chat-box" id="chatBox">
    <!-- 初始欢迎消息 -->
    <div class="msg sasa">
      <img src="sasa_avatar.png" class="msg-avatar" alt="洒洒">
      <div class="bubble">
        汪！我在！🐕<br>
        我是洒洒，净如姐的房车专属导航搭子。<br>
        说「<span class="cmd-tag">洒洒，洒洒</span>」叫醒我，或者直接打字告诉我你要做什么！
      </div>
    </div>
  </div>

  <!-- 快捷指令 -->
  <div class="quick-cmds" id="quickCmds">
    <div class="quick-cmd" onclick="sendQuick('导航去西安北站')">🗺️ 导航去西安北站</div>
    <div class="quick-cmd" onclick="sendQuick('现在堵车吗')">🚦 现在堵车吗</div>
    <div class="quick-cmd" onclick="sendQuick('附近有加油站吗')">⛽ 附近有加油站</div>
    <div class="quick-cmd" onclick="sendQuick('帮我查一下新邮件')">📧 查新邮件</div>
    <div class="quick-cmd" onclick="sendQuick('打开腾讯会议')">📹 打开腾讯会议</div>
    <div class="quick-cmd" onclick="sendQuick('打开相机拍一张')">📷 拍张照片</div>
  </div>
</div>

<!-- 输入区 -->
<div class="input-area">
  <div class="input-wrap">
    <button class="btn-voice" id="voiceBtn" onclick="toggleVoice()" title="语音输入">🎙️</button>
    <input type="text" id="userInput" placeholder="说出指令，或打字告诉洒洒…" onkeydown="if(event.key==='Enter') sendMsg()">
    <button class="btn-send" onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
const AGENT_ID = "sasa";

// 洒洒的回复库
const responses = {
  "导航": (msg) => {
    const dest = msg.replace(/.*导航去|.*去/, "").trim() || "目的地";
    return `收到！🗺️ 正在为您规划前往「${dest}」的路线...\n\n📍 高德导航已启动\n预计为您规划最优路线，出发！`;
  },
  "堵车": () => `正在查询实时路况...🚦\n\n当前主干道畅通，预计行驶顺畅。如需绕行建议，说「换条路走」即可！`,
  "加油站": () => `正在搜索附近加油站... ⛽\n\n已找到3个加油站：\n• 中石化·前方1.2km\n• 中石油·前方2.8km\n• 壳牌·前方4.1km\n\n需要导航过去吗？`,
  "邮件": () => `正在检查邮箱... 📧\n\n您有 2 封未读邮件\n• 来自：张总（今天 13:42）\n• 来自：会议通知（今天 10:15）\n\n需要帮您回复吗？`,
  "腾讯会议": (msg) => {
    const meetId = msg.match(/\d{6,}/)?.[0];
    return meetId
      ? `收到！📹 正在打开腾讯会议，加入会议号：${meetId}...`
      : `收到！📹 正在打开腾讯会议...\n\n请说「加入会议 + 会议号」直接加入！`;
  },
  "相机": () => `收到！📷 正在打开相机...\n\n准备好了，说「拍照」我帮您拍！`,
  "拍照": () => `咔嚓！📸 已拍摄并保存到相册！`,
  "百度": (msg) => {
    const query = msg.replace(/.*百度搜|.*百度/, "").trim();
    return `收到！🔍 正在百度搜索「${query || "关键词"}」...\n\n已打开百度，为您展示搜索结果。`;
  },
  "谷歌": (msg) => {
    const query = msg.replace(/.*谷歌搜|.*谷歌/, "").trim();
    return `收到！🔍 正在用谷歌搜索「${query || "关键词"}」...`;
  },
  "搜": (msg) => {
    const query = msg.replace(/.*搜一下|.*搜搜|.*搜/, "").trim();
    return `收到！正在搜索「${query}」...🔍`;
  },
  "default": () => {
    const replies = [
      "收到！帮您搞定！🐕",
      "明白！马上执行！",
      "汪！好的！正在处理...",
      "收到！目的地已设好，出发！🚐"
    ];
    return replies[Math.floor(Math.random() * replies.length)];
  }
};

function getReply(msg) {
  for (const [key, fn] of Object.entries(responses)) {
    if (key !== "default" && msg.includes(key)) return fn(msg);
  }
  return responses.default();
}

function appendMsg(text, role) {
  const box = document.getElementById("chatBox");
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  if (role === "sasa") {
    div.innerHTML = `
      <img src="sasa_avatar.png" class="msg-avatar" alt="洒洒">
      <div class="bubble">${text.replace(/\n/g, "<br>")}</div>`;
  } else {
    div.innerHTML = `
      <div class="msg-avatar user-avatar">👤</div>
      <div class="bubble">${text}</div>`;
  }

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById("chatBox");
  const div = document.createElement("div");
  div.className = "msg sasa";
  div.id = "typingIndicator";
  div.innerHTML = `
    <img src="sasa_avatar.png" class="msg-avatar" alt="洒洒">
    <div class="typing"><span></span><span></span><span></span></div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typingIndicator");
  if (t) t.remove();
}

function sendMsg() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";

  appendMsg(text, "user");
  showTyping();

  setTimeout(() => {
    removeTyping();
    appendMsg(getReply(text), "sasa");
  }, 900 + Math.random() * 600);
}

function sendQuick(text) {
  document.getElementById("userInput").value = text;
  sendMsg();
}

// 语音输入
let isListening = false;
let recognition = null;

function toggleVoice() {
  const btn = document.getElementById("voiceBtn");

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert("您的浏览器暂不支持语音输入，请打字输入指令");
    return;
  }

  if (isListening) {
    recognition?.stop();
    isListening = false;
    btn.classList.remove("listening");
    btn.textContent = "🎙️";
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "zh-CN";
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById("userInput").value = transcript;
    sendMsg();
  };

  recognition.onend = () => {
    isListening = false;
    btn.classList.remove("listening");
    btn.textContent = "🎙️";
  };

  recognition.start();
  isListening = true;
  btn.classList.add("listening");
  btn.textContent = "⏹️";
}
</script>

</body>
</html>
