display_name: LOFTER Fic Writer
short_description: Turn fandom prompts into 5 brainwave options, chaptered drafts, and revisions using a built-in LOFTER sample library.
default_prompt: Use this skill to take an IP, CP, and core brainwave through a full LOFTER workflow: analyze fandom fit, generate exactly 5 distinct viral-ready brainwaves, let the user choose one, design title/preface/opening hooks, consult the bundled sample library when stronger blast traits are needed, build an emotional outline, draft the body in no more than 4 chapters labeled 01-04, review it against blast standards, and revise into a stronger final post.
