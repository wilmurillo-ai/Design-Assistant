# ClawHub Skill 发布配置
name: aliossupload
version: 1.0.0
description: 阿里云 OSS 文件上传工具。支持单文件上传，适用于将本地文件上传到阿里云 OSS 并获取访问链接。

# 分类标签
categories:
  - storage
  - cloud
  - aliyun

tags:
  - aliyun
  - oss
  - storage
  - upload
  - 阿里云
  - 对象存储

# 作者信息
author: 野哥
license: MIT

# 运行时要求
runtime:
  type: python
  min_version: "3.8"
  
# 依赖
requirements:
  - oss2>=2.18.0

# 环境变量
env:
  required:
    - ALIYUN_OSS_ACCESS_KEY_ID
    - ALIYUN_OSS_ACCESS_KEY_SECRET
    - ALIYUN_OSS_ENDPOINT
    - ALIYUN_OSS_BUCKET

# 入口文件
entry: aliossupload.py

# 图标
icon: ☁️

# 使用示例
examples:
  - command: "帮我把 /path/to/file.mp4 上传到 OSS"
    description: 上传本地文件到阿里云 OSS
  - command: "上传这个视频到云存储"
    description: 上传视频并获取访问链接

# 截图/预览（可选）
# screenshots:
#   - url: https://example.com/screenshot1.png

# 相关链接
links:
  - name: 阿里云 OSS 文档
    url: https://help.aliyun.com/product/31815.html
  - name: OpenClaw 文档
    url: https://docs.openclaw.ai

# 更新日志
changelog:
  - version: 1.0.0
    date: 2026-03-22
    changes:
      - 初始版本发布
      - 支持单文件上传
      - 自动读取环境变量配置
