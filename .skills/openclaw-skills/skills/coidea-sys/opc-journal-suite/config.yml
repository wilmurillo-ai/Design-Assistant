# OPC Journal Suite Configuration
# Version: 2.3.0

# IMPORTANT: This is a LOCAL-ONLY journaling system.
# No network calls, no external APIs, no data sharing.
# All data is stored in customer-scoped local directories only.

journal:
  storage_path: "customers/{customer_id}/journal/"
  retention_days: 365
  privacy_level: "standard"  # standard / sensitive / vault
  
  # Auto-compaction settings (local only)
  # This is a prompt-based feature that reminds users to save important memories
  # No automatic network calls or external sharing
  compaction:
    enabled: true
    reserve_tokens_floor: 40000
    memory_flush:
      soft_threshold_tokens: 4000
      system_prompt: "Session nearing compaction. Store durable memories now."
      prompt: "Write any lasting notes to memory/YYYY-MM-DD.md; reply with NO_REPLY if nothing to store."

pattern_recognition:
  analysis_frequency: "weekly"
  insight_depth: "detailed"  # brief / detailed / deep
  dimensions:
    - work_hours
    - decision_style
    - stress_triggers
    - productivity_patterns

milestone:
  auto_detect: true
  celebration_enabled: true
  min_confidence: 0.7
  
  # Milestone types for local tracking only
  types:
    - product_launch
    - first_customer
    - revenue_milestone
    - team_expansion
    - feature_completion

async_task:
  max_concurrent: 5
  default_timeout: "8h"
  retry_policy:
    max_retries: 3
    backoff: "exponential"
  # NOTE: Notification channels are reserved for future versions
  # Current implementation is local-only (no network calls)
  # notification_channels: []  # Future: feishu, email

insight:
  generation_frequency: "daily"
  include_recommendations: true
  personalization_enabled: true

# Cron scheduler configuration (v2.3 feature)
# Enables autonomous task triggering for scheduled journal operations
cron_scheduler:
  enabled: true
  check_interval: "5m"  # How often to check for triggers
  
  # Pre-configured schedules
  schedules:
    daily_summary:
      enabled: true
      schedule: "0 8 * * *"      # 8:00 AM daily
      description: "Generate daily summary"
      target_skill: "opc-insight-generator"
      
    weekly_pattern:
      enabled: true
      schedule: "0 9 * * 0"      # 9:00 AM Sunday
      description: "Weekly pattern analysis"
      target_skill: "opc-pattern-recognition"
      
    milestone_check:
      enabled: true
      schedule: "0 21 * * *"     # 9:00 PM daily
      description: "Daily milestone detection"
      target_skill: "opc-milestone-tracker"
      
    memory_compaction:
      enabled: true
      schedule: "0 23 * * *"     # 11:00 PM daily
      description: "Daily memory compaction"
      target_skill: "opc-journal-core"

# Logging configuration (local only)
logging:
  level: "info"
  format: "json"
  retention_days: 30
  # No external log aggregation - all logs are local
