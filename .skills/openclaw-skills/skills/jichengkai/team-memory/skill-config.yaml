# 系统配置
settings:
  # 数据存储路径
  data-path: "~/.config/opencode/skills/team-memory/data"
  
  # 备份设置
  backup:
    enabled: true
    frequency: "daily"
    retention: "90days"
    cloud-sync: false  # 是否自动同步到网盘
  
  # 提醒设置
  reminders:
    weekly-report: "friday-17:00"    # 周五下午5点提醒生成本周报告
    monthly-review: "last-day"        # 月末提醒月度回顾
    quarterly-assessment: "quarter-end" # 季度末提醒评估
    
  # 输出格式偏好
  output:
    default-format: "markdown"
    include-charts: false  # 是否生成图表（需额外依赖）
    language: "zh-CN"
