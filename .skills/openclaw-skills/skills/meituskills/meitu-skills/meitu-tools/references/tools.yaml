# ============================================================
# tools.yaml — 工具集唯一源文件 (SSOT)
#
# 维护规则：
#   1. 所有工具信息只在此文件中维护
#   2. 运行 node scripts/generate.js（或 npm run generate）自动生成：
#      - commands-data.json (CLI 注册表数据)
#      - manifest.json
#      - SKILL.md 能力目录段
#      - agent-descriptions.yaml
#      - tools-overview.csv
#      - disambiguation-matrix.md
#   3. 禁止手动编辑生成产物
#
# 字段说明：
#   summary        — 一句话功能描述(<=40字)，Agent粗筛用
#   triggers       — 触发条件列表，何时该选此工具
#   prefer_over    — 与哪些工具容易混淆，选当前工具的判断条件
#   input          — 输入规格
#   output         — 输出规格
#   params         — 额外参数(如子模型选择)，无则省略
#   constraints    — 硬性约束/前置依赖，无则省略
#   not_for        — 不适用场景 + 应转向的工具
#   cli            — CLI 注册表数据（有此字段的工具才进入 CLI 管线）
#     command          — 实际 CLI 命令名（省略则用 id）
#     requiredKeys     — 必填输入键
#     optionalKeys     — 可选输入键
#     arrayKeys        — 值为数组的键
#     commandAliases   — 命令别名
#     inputAliases     — 输入键别名映射
# ============================================================

tools:

  # ── 视频类 ──────────────────────────────

  - id: video-motion-transfer
    name: 视频动作迁移
    summary: 将参考视频中的人物动作迁移到目标人物/角色上，驱动目标执行相同动作。
    triggers:
      - 用户提供动作参考视频，要求目标人物/角色模仿该动作
      - 用户要求"动作迁移"、"动作驱动"、"动作复刻"
    prefer_over:
      - tool: image-to-video
        when: 核心需求是复刻特定动作，而非从图片生成视频或对口型
    input:
      - type: video
        count: "1"
        note: 动作参考视频
      - type: image|video
        count: "1"
        note: 目标人物/角色
    output:
      type: video
    not_for:
      - 人物说话/对口型 → image-to-video
      - 纯文字生成视频 → text-to-video
    cli:
      requiredKeys: [image_url, video_url, prompt]
      optionalKeys: []
      arrayKeys: []
      commandAliases: [motion-transfer, 视频动作迁移]
      inputAliases:
        image: image_url
        图片: image_url
        图片url: image_url
        图片链接: image_url
        video: video_url
        视频: video_url
        视频url: video_url
        视频链接: video_url
        提示词: prompt
        描述: prompt


  - id: image-to-video
    name: 图生视频
    summary: 基于图片生成高保真视频，支持超大动作幅度与精细运镜，具备极强的人物动态一致性与物理规律模拟。支持原生音画同步，适合说话、唱歌、对口型类视频生成
    triggers:
      - 用户提供图片 + 要求人物说话、唱歌、对口型
      - 用户提供图片 + 要求声音与画面原生同步
      - 用户提供图片 + 要求进行复杂的肢体动作（如奔跑、跳舞、大幅度转身等）
      - 用户提供图片 + 要求中高动态画面与明显的运镜控制（如大师级平移、推拉、环绕镜头等）
      - 用户提供图片 + 需要视频时长达 5-10 秒的长序列生成
    prefer_over:
      - tool: text-to-video
        when: 用户已有明确的视觉主体（图片），且希望视频核心需求是对口型、语言表演
      - tool: video-motion-transfer
        when: 追求创作的自由度，而非严格限定在某个参考视频的动作轨迹内
    input:
      - type: image
        count: "1"
        note: 首帧图片
      - type: text
        count: "1"
        note: 视频描述 prompt
      - type: audio
        count: "0..1"
        note: 可选，驱动对口型
    output:
      type: video
      note: 含原生音轨
    not_for:
      - 无首帧图片 → text-to-video
      - 仅需复刻特定参考动作 → video-motion-transfer
      - 仅需轻微动效且无音画同步需求
    cli:
      requiredKeys: [image, prompt]
      optionalKeys: [video_duration, ratio]
      arrayKeys: [image]
      commandAliases: [图生视频]
      inputAliases:
        image_url: image
        图片: image
        图片url: image
        图片链接: image
        提示词: prompt
        描述: prompt
        时长: video_duration
        比例: ratio
        画幅: ratio


  - id: text-to-video
    name: 文生视频
    summary: 纯文字驱动，生成电影氛围感强、运镜丰富的视频片段，可含环境音。
    triggers:
      - 用户无首帧图片，用文字描述期望的视频画面
      - 用户强调氛围感、电影感、运镜美感、音乐节奏感
      - 需求是情绪/展示片段，非完整叙事成片
    prefer_over:
      - tool: image-to-video
        when: 用户未提供首帧图片，且不需要对口型/语音同步
    input:
      - type: text
        count: "1"
        note: 视频描述 prompt
    output:
      type: video
      note: 可含环境音/氛围音
    not_for:
      - 用户已提供首帧图片 → image-to-video
      - 需对白口播准确 → image-to-video
      - 需所有元素逐条落地或完整广告成片
    cli:
      requiredKeys: [prompt]
      optionalKeys: [video_duration, sound]
      arrayKeys: []
      commandAliases: [文生视频]
      inputAliases:
        提示词: prompt
        描述: prompt
        时长: video_duration
        音效: sound


  - id: video-to-gif
    name: 视频转GIF
    summary: 将单个视频转换为GIF动图。
    triggers:
      - 用户要求将视频转为 GIF/动图
      - 用户要求提取视频片段生成 GIF
    input:
      - type: video
        count: "1"
    output:
      type: gif
      note: 等比例，长边最大480px
    constraints:
      - 仅支持单个视频输入
      - 长边最大 480 像素
    not_for:
      - 图片序列合成GIF
      - 视频格式转换（非GIF目标）
    cli:
      requiredKeys: [image]
      optionalKeys: [wechat_gif]
      arrayKeys: []
      commandAliases: [视频转gif]
      inputAliases:
        video_url: image
        video: image
        视频: image
        视频url: image
        视频链接: image


  # ── 图片生成类 ──────────────────────────

  - id: image-generate
    name: 图片生成
    summary: 从文字描述或参考图生成全新图片，擅长主体一致性与风格迁移。
    triggers:
      - 无底图，纯文字从零生图
      - 有参考图，要求保持主体一致 + 风格迁移/元素融合
      - 多张图组合生成新图
      - 新图中需包含指定文字
    prefer_over:
      - tool: image-edit
        when: 核心意图是生成新图，而非修改现有图片
      - tool: image-poster-generate
        when: 目标不是海报/宣传物料
    input:
      - type: text
        count: "1"
        note: 生成描述 prompt
      - type: image
        count: "0+"
        note: 可选参考图
    output:
      type: image
    not_for:
      - 对已有图片局部修改 → image-edit
      - 海报设计（含排版） → image-poster-generate
      - 换脸 → image-face-swap
    cli:
      requiredKeys: [prompt]
      optionalKeys: [image, size, ratio]
      arrayKeys: [image]
      commandAliases: [generate, 图片生成]
      inputAliases:
        image_url: image
        image_list: image
        参考图: image
        参考图片: image
        提示词: prompt
        描述: prompt
        尺寸: size
        分辨率: size
        比例: ratio
        画幅: ratio


  - id: image-poster-generate
    name: 海报生成
    summary: 生成含文字排版的海报，支持中文与非中文，适用于宣传/广告/活动推广。
    triggers:
      - 生成海报/宣传图/广告图
      - 基于图片生成海报
      - 修改已有海报文字/色彩/元素/背景/尺寸
      - 生成系列海报
    prefer_over:
      - tool: image-generate
        when: 输出物明确是海报/宣传物料，需文字排版和版式
      - tool: image-edit
        when: 目标是完整海报设计或系列延展，非单纯局部修改
    input:
      - type: text
        count: "1"
        note: 海报内容/设计要求 prompt
      - type: image
        count: "0+"
        note: 可选素材图
    output:
      type: image
      note: 每次仅1张
    constraints:
      - 每次仅输出1张
      - 中文与非中文自动适配不同模型
    not_for:
      - 通用图片生成（非海报） → image-generate
      - 非海报图片编辑 → image-edit
    cli:
      requiredKeys: [prompt]
      optionalKeys: [image_list, model, size, ratio, output_format, enhance_prompt, enhance_template]
      arrayKeys: [image_list]
      commandAliases: [poster, 海报生成]
      inputAliases:
        image: image_list
        图片: image_list
        素材图: image_list
        提示词: prompt
        描述: prompt
        模型: model
        尺寸: size
        分辨率: size
        比例: ratio
        画幅: ratio
        格式: output_format
        输出格式: output_format


  # ── 图片编辑类 ──────────────────────────

  - id: image-edit
    name: 图片编辑
    summary: 对已有图片进行局部或整体编辑，支持多图参考融合与分析标注。内含三个子模型，需根据编辑目标选择。
    triggers:
      - 修改现有图片局部内容（换背景、改颜色、去除/添加元素）
      - 多张图提取材质/风格/构图融合
      - 在现有图片上渲染文字
      - 图片分析或标注
      - 将人物/宠物照片转为卡通、3D手办、二次元等艺术风格
      - 人像/宠物写真生成、发型调整
    prefer_over:
      - tool: image-generate
        when: 用户有明确底图要编辑，非从零生图
      - tool: image-poster-generate
        when: 编辑目标不是海报，或仅需局部微调
    input:
      - type: image
        count: "1+"
        note: 至少一张底图，可追加参考图
      - type: text
        count: "1"
        note: 编辑指令 prompt
    output:
      type: image
    params:
      - name: model
        type: enum
        values: [nougat, gummy, praline]
        default: praline
        selection_rule: |
          按优先级从高到低判断，先匹配专科模型，都不命中则走全科默认：
          1. nougat — 编辑目标是将照片转为高度风格化的艺术风格时必选：卡通化、3D手办风、二次元、简笔画、概括性可爱风格等艺术再创作。⚠️ 该模型人脸相似度低，不适用于需要保持人脸真实感的场景（证件照、写实肖像等）。
          2. gummy — 编辑目标是人像写真或宠物写真生成、或发型调整时选：基于用户人像照/宠物照生成写真风格图片，调整发型款式、发丝纹理等。支持多图输入。
          3. praline（默认）— 以上都不符合时选：文字操作（修改/添加/消除/替换图中文字、文字渲染、手写体）、换背景、改颜色、添加/去除元素、构图调整、物体替换、多图材质风格融合、跨图风格统一、图片分析标注等所有通用编辑场景。
          ⚠️ 判断要点：nougat 是"变画风"（输出不像真人），gummy 是"拍写真/换发型"（输出像真人），praline 是"改内容"（通用编辑）。
    constraints:
      - ratio 取值因 model 不同：praline 支持 auto/1:1/2:3/3:2/3:4/4:3/4:5/5:4/9:16/16:9/21:9；nougat 支持 auto/1:1/2:3/3:2；gummy 支持 auto/1:1/4:3/3:4/16:9/9:16/3:2/2:3/21:9
    not_for:
      - 无底图纯文字生图 → image-generate
      - 完整海报设计 → image-poster-generate
      - 仅超清 → image-upscale
      - 仅美容 → image-beauty-enhance
    cli:
      requiredKeys: [image, prompt]
      optionalKeys: [model, ratio]
      arrayKeys: [image]
      commandAliases: [edit, 图片编辑]
      inputAliases:
        image_url: image
        image_list: image
        图片: image
        图片url: image
        图片链接: image
        提示词: prompt
        描述: prompt
        模型: model
        比例: ratio
        画幅: ratio


  - id: image-upscale
    name: 图片超清
    summary: 提升图片分辨率和清晰度，消除噪点，增强画质。
    triggers:
      - 图片变清晰/变高清/超分辨率
      - 消除噪点、提升画质
      - 提到"超清"、"高清修复"、"画质放大"
    input:
      - type: image
        count: "1"
        note: 单张待提升画质的图片
    output:
      type: image
      note: 更高清的图片
    params:
      - name: model_type
        type: int
        selection_rule: |
          可选的超清模型选择参数；未提供时由服务端按默认策略处理。
    not_for:
      - 修改图片内容 → image-edit
      - 美颜修饰 → image-beauty-enhance
    cli:
      requiredKeys: [image]
      optionalKeys: [model_type]
      arrayKeys: []
      commandAliases: [upscale, 图片超清]
      inputAliases:
        image_url: image
        图片: image
        图片url: image
        图片链接: image
        模型: model_type


  - id: image-beauty-enhance
    name: 图片美容
    summary: 对清晰的单人人像进行美颜：美肤、减淡瑕疵、提亮肤色、修饰脸型五官。
    triggers:
      - 美颜/变好看/变漂亮/变美丽
      - 修饰皮肤/减淡瑕疵/提亮肤色
      - 修饰脸型或五官
      - 提到"AI美容"、"一键美容"
    prefer_over:
      - tool: image-edit
        when: 需求仅限美颜美肤，不涉及内容修改
      - tool: image-upscale
        when: 目标是面部美化而非纯画质提升
    input:
      - type: image
        count: "1"
        note: 仅支持清晰单人肖像图
    output:
      type: image
      note: 保留高清质感和个人面部特征
    params:
      - name: beatify_type
        type: enum
        values: ["0", "1"]
        default: "0"
        selection_rule: |
          美颜强度档位：0 为默认效果，1 为更强效果。
    constraints:
      - 仅支持清晰单人肖像图，不支持多人
      - 非人像主体、多人图或主体不清晰时可能失败
    not_for:
      - 多人合照美颜（不支持）
      - 修改图片内容 → image-edit
      - 纯画质提升 → image-upscale
      - 换脸 → image-face-swap
    cli:
      requiredKeys: [image]
      optionalKeys: [beatify_type]
      arrayKeys: []
      commandAliases: [beauty-enhance, beauty, 美颜增强]
      inputAliases:
        image_url: image
        图片: image
        图片url: image
        图片链接: image
        beautify_type: beatify_type
        beauty_type: beatify_type
        美颜模式: beatify_type


  - id: image-face-swap
    name: AI换头
    summary: 将图1人物的头部和肤色替换到图2上，保留图2的姿态、服饰和背景。
    triggers:
      - 提供两张人像图，要求换脸/换头
      - 把A的脸放到B的身体/场景上
    prefer_over:
      - tool: image-edit
        when: 需求明确是人脸替换，非通用编辑
      - tool: image-try-on
        when: 目标是换脸而非换装
    input:
      - type: image
        count: "2"
        note: 图1=源脸，图2=目标姿态/场景
    output:
      type: image
      note: 图2构图不变，头部肤色换为图1
    not_for:
      - 替换背景 → image-edit
      - 仅换发型不换脸 → image-edit
      - 虚拟试衣 → image-try-on
    cli:
      requiredKeys: [head_image_url, sence_image_url, prompt]
      optionalKeys: []
      arrayKeys: []
      commandAliases: [face-swap, AI换头]
      inputAliases:
        head_url: head_image_url
        头像图: head_image_url
        头图: head_image_url
        源脸图: head_image_url
        scene_image_url: sence_image_url
        目标图: sence_image_url
        场景图: sence_image_url
        底图: sence_image_url
        提示词: prompt
        描述: prompt


  - id: image-try-on
    name: AI换装
    summary: 将服装图适配到人像上，生成虚拟试穿效果。
    triggers:
      - 提供人像+服装图，要求试穿/换装/看上身效果
    prefer_over:
      - tool: image-face-swap
        when: 目标是换装而非换脸
      - tool: image-edit
        when: 需求明确是虚拟试衣，非通用编辑
    input:
      - type: image
        count: "2"
        note: 人像图1张(不要求完整人像) + 服装图1张(平铺或穿着均可)
    output:
      type: image
    constraints:
      - ⚠️ 调用前必须先调用 image_analysis 分析用户图片
      - 必须同时提供人像图和服装图
    not_for:
      - 换脸 → image-face-swap
      - 仅抠出服装 → image-cutout
    cli:
      command: image-try-on
      requiredKeys: [clothes_image_url, person_image_url]
      optionalKeys: [replace, need_sd]
      arrayKeys: []
      commandAliases: [image-try-on, 试衣, AI换装]
      inputAliases:
        clothes_url: clothes_image_url
        clothes: clothes_image_url
        衣服图: clothes_image_url
        衣服图片: clothes_image_url
        衣服图片url: clothes_image_url
        person_url: person_image_url
        person: person_image_url
        人物图: person_image_url
        人物图片: person_image_url
        人像图: person_image_url


  - id: image-adapt
    name: 智能改尺寸
    summary: 将任意图片智能适配到目标比例，自动重构构图逻辑，保持主体比例不变形、内容完整不丢失，背景自然延展无接缝。
    triggers:
      - 将图片适配到指定平台尺寸（如小红书、抖音、微信公众号等）
      - 改变图片宽高比并智能补全延展区域
      - 图片扩展/外扩/延展/outpaint
      - 将竖图变横图、横图变竖图、正方形适配等
      - 要求主体不变形、内容不丢失地改变画幅
    prefer_over:
      - tool: image-edit
        when: 核心需求是改变画幅尺寸并智能延展背景，而非修改图片内容
      - tool: image-generate
        when: 用户已有底图，只需改变尺寸适配不同平台
    input:
      - type: image
        count: "1"
        note: 待适配的原图
      - type: text
        count: "2"
        note: 目标宽度 width 和高度 height
    output:
      type: image
      note: 适配后的图片，主体保持不变形，背景自然延展无接缝
    constraints:
      - width 和 height 为像素值，默认 1080×1920
    not_for:
      - 修改图片内容或风格 → image-edit
      - 纯画质提升 → image-upscale
      - 简单裁切不需要智能补全 → image-edit
    cli:
      requiredKeys: [image, width, height]
      optionalKeys: []
      arrayKeys: []
      commandAliases: [image-adapt, 图片适配, 图片延展]
      inputAliases:
        image_url: image
        图片: image
        图片url: image
        图片链接: image
        宽: width
        宽度: width
        高: height
        高度: height


  # ── 图片工具类 ──────────────────────────

  - id: image-cutout
    name: 抠图
    summary: 分离前景与背景，提取主体或人物，输出透明背景图。
    triggers:
      - 抠图/去背景/提取主体
      - 获得透明背景的人物/物体图
    input:
      - type: image
        count: "1"
    output:
      type: image
      note: 透明背景的主体图
    not_for:
      - 抠图后换背景 → 先 image-cutout 再 image-edit
      - 宫格拆分 → image-grid-split
    cli:
      requiredKeys: [image]
      optionalKeys: [model_type]
      arrayKeys: []
      commandAliases: [cutout, 抠图]
      inputAliases:
        image_url: image
        图片: image
        图片url: image
        图片链接: image
        模型: model_type


  - id: image-grid-split
    name: 宫格拆分
    summary: 将单张宫格拼接图拆分为多张独立图片。当前支持四宫格(2x2)。
    triggers:
      - 四宫格/九宫格/田字格拼接图要求拆分成单张
      - 将一张图按宫格等分切割
    prefer_over:
      - tool: image-edit
        when: 按宫格等分拆图，非任意裁切
      - tool: image-cutout
        when: 网格切割整张图，非分离前景主体
    input:
      - type: image
        count: "1"
        note: 标准宫格布局的拼接图
    output:
      type: image
      note: 4张独立图片（四宫格模式）
    constraints:
      - 当前仅支持四宫格(2x2)
      - 非宫格图片拆分结果可能不符合预期
    not_for:
      - 任意比例裁切 → image-edit
      - 提取前景主体 → image-cutout
    cli:
      requiredKeys: [image]
      optionalKeys: []
      arrayKeys: []
      commandAliases: [grid-split, 宫格拆分]
      inputAliases:
        image_url: image
        图片: image
        图片url: image
        图片链接: image
