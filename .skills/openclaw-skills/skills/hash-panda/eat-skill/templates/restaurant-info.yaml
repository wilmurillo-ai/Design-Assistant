# ============================================================
# 🍜 干饭.skill — 餐馆信息模板
# ============================================================
# 把这个文件复制一份，填上你常去的餐馆信息，
# 然后用生成器或者直接交给 AI 生成 SKILL.md。
#
# 带 * 的是必填项，其他的能填多少填多少。
# ============================================================

# === 基本信息（必填）===

name: "餐馆名称"                    # * 店名
slug: "restaurant-name"             # * 英文标识（用于目录名，小写+连字符）
category: "品类"                    # * 如：饺子馆/火锅/川菜/烧烤/咖啡馆/面包房/日料...
city: "城市"                        # * 如：北京/上海/杭州
district: "区域"                    # * 如：海淀/朝阳/浦东
address: "详细地址"                  # * 具体地址
hours: "10:00-22:00"                # * 营业时间

# === 消费信息（推荐填）===

price_per_person: "30-50"           # 人均消费范围（元）
payment:                            # 支付方式
  - "微信"
  - "支付宝"
  - "现金"

# === 菜单（推荐填）===

signature_dishes:                   # 招牌菜 / 必点菜
  - name: "招牌菜名称"
    price: 38                       # 价格（元），不知道就不填
    description: "一句话描述"        # 选填
  - name: "第二道招牌"
    price: 25

menu_categories:                    # 菜单分类（选填，能列多少列多少）
  - category: "分类名（如：饺子）"
    items:
      - name: "菜品名"
        price: 20
      - name: "另一个菜品"
        price: 25

# === 到店信息（选填）===

location_tips: "怎么找到这家店"      # 如：北邮西门出来左转100米
nearby_landmarks: "附近地标"         # 如：北邮/五道口地铁站
parking: "停车信息"                  # 如：门口有停车位/商场地下停车场
transit: "公共交通"                  # 如：10号线西土城站B口出

# === 服务信息（选填）===

phone: "联系电话"
wifi:
  name: "Wi-Fi名称"
  password: "密码"
delivery:
  available: true                   # 是否支持外卖
  platforms:                        # 外卖平台
    - "美团外卖"
    - "饿了么"
  range: "约3公里"                  # 配送范围
booking:
  required: false                   # 是否需要预约
  method: "大众点评排队取号"          # 预约/排队方式

# === 氛围和标签（选填，对推荐很有用）===

vibe: "氛围描述"                     # 如：朴素实在/安静文艺/热闹接地气/精致高端
suitable_for:                       # 适合的场景
  - "朋友聚餐"
  - "一个人吃"
  - "带小孩"
  - "约会"
  - "请客"
tags:                               # 标签（用于搜索和筛选）
  - "标签1"
  - "标签2"
meal_types:                         # 适合的餐次
  - "lunch"                         # breakfast / lunch / dinner / late_night / brunch
  - "dinner"

# === 特别说明（选填）===

special_notes: |
  任何其他想说的，比如：
  - 周一休息
  - 现金不收
  - 节假日要排很久的队
  - 某个时段去最好
  - 老板人很好

# === 贡献者信息（选填）===

contributor:
  name: "你的名字或 GitHub ID"
  note: "一句话推荐语"               # 如："吃了五年了，饺子一直稳"
