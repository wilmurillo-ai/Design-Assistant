# OpenClaw 新闻收集示例配置
# 将此文件复制并修改为你自己的目标主体
#
# 使用方式：
# 1. 将本文件复制一份，命名为任意 yaml 文件
# 2. 修改 target 字段为你想关注的主体
# 3. 定时任务触发时，agent 会自动读取此配置

target:
  name: "OpenClaw"
  keywords:
    - "OpenClaw"
    - "clawd"
    - "ClawHub"
    - "龙虾"
  official_urls:
    - https://openclaw.ai
    - https://openclaw.ai/blog
    - https://github.com/openclaw/openclaw/releases
    - https://clawhub.com
