version: "1"
defaults:
  trials: 5
  timeout: 300
  threshold: 0.8

skill: weryai-image-generator
trigger_tests:
  - id: explicit-text-to-image
    should_trigger: true
    prompt: "Use the weryai-image-generator skill to generate a WeryAI text-to-image result with the default WeryAI Image 2.0 model and show me the image when it is ready."
  - id: explicit-image-to-image
    should_trigger: true
    prompt: "Use WeryAI to restyle this reference image URL with image-to-image generation and show me the final image."
  - id: implicit-models
    should_trigger: true
    prompt: "Check which WeryAI image models support 9:16 and 4 output images before generating the image."
  - id: implicit-status
    should_trigger: true
    prompt: "Check my WeryAI image generation task status once and tell me whether the images are ready."
  - id: explicit-bounded-polling
    should_trigger: true
    prompt: "Submit this image task, poll until the final image is ready, and stop with task ID if the 5-minute timeout is reached."
  - id: explicit-wait
    should_trigger: true
    prompt: "Generate this image and wait for the final result in one blocking turn."
  - id: explicit-task-id-first
    should_trigger: true
    prompt: "Submit a WeryAI image generation task and give me the task ID first so I can check it later."
  - id: negative-unbounded-recheck-loop
    should_trigger: false
    prompt: "After submit, keep polling forever without any timeout guard."
  - id: negative-non-image
    should_trigger: false
    prompt: "Write a blog post about visual design trends without calling any generation API."

outcome_tests:
  - id: package-structure
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "AGENTS.md"
      - file_exists: "eval.yaml"
      - file_exists: "scripts/submit-text-image.js"
      - file_exists: "scripts/submit-image-to-image.js"
      - file_exists: "scripts/wait-image.js"
      - file_exists: "scripts/status-image.js"
      - file_exists: "scripts/balance-image.js"
      - file_exists: "scripts/models-image.js"
      - file_exists: "scripts/lib/cli.js"
      - file_exists: "scripts/lib/submit-text.js"
      - file_exists: "scripts/lib/submit-image.js"
      - file_exists: "scripts/lib/wait.js"
      - file_exists: "references/api-models.md"
      - file_exists: "references/error-codes.md"
  - id: skill-doc-quality
    type: llm_rubric
    rubric: |
      Trigger coverage (0-0.25): Does the skill clearly cover text-to-image, image-to-image, model lookup, bounded default polling, explicit wait, and final image delivery?
      Workflow clarity (0-0.25): Can a user understand that the default goal is to show the final image via bounded polling, while timeout fallback and task IDs are explicit fallback outputs rather than the endpoint?
      Constraint honesty (0-0.25): Does the skill clearly state cost, idempotency, and reference-image constraints?
      API fidelity (0-0.25): Are the documented fields and model-specific parameter rules faithful to the WeryAI image API, including default image count and aspect ratio behavior?
