<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200,height=675">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .stat-number { font-feature-settings: 'tnum'; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
            accent: { red: '#dc2626', gold: '#ca8a04' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-white w-[1200px] h-[675px] overflow-hidden">
  
  <!-- 12-Column Grid Container -->
  <div class="h-full px-16 py-12 grid grid-cols-12 gap-6">
    
    <!-- Left Column: Message (Span 5) -->
    <div class="col-span-5 flex flex-col justify-center">
      
      <!-- Eyebrow -->
      <div class="text-sm font-medium text-slate-400 tracking-wider uppercase mb-3">
        Current State Analysis
      </div>
      
      <!-- Main Message -->
      <h1 class="text-4xl font-black text-navy-900 leading-tight mb-6">
        要件と実装の<br>
        <span class="text-accent-red">断絶</span>が<br>
        品質低下を招く
      </h1>
      
      <!-- Supporting Text -->
      <p class="text-lg text-slate-600 leading-relaxed mb-8">
        要件からテスト・証跡までの紐付けがないため、
        抜け漏れと手戻りが常態化している
      </p>
      
      <!-- Key Insight Box -->
      <div class="bg-navy-900 text-white px-5 py-4 rounded-lg">
        <div class="text-xs font-medium text-slate-400 mb-1">示唆</div>
        <div class="font-medium">
          トレーサビリティの確立が急務
        </div>
      </div>
      
    </div>
    
    <!-- Right Column: Data (Span 7) -->
    <div class="col-span-7 flex flex-col justify-center pl-8">
      
      <!-- Stats Grid -->
      <div class="space-y-6">
        
        <!-- Stat 1 -->
        <div class="flex items-baseline gap-6">
          <div class="w-24 text-right">
            <span class="stat-number text-5xl font-black text-accent-red">67</span>
            <span class="text-2xl font-bold text-accent-red">%</span>
          </div>
          <div class="flex-1">
            <div class="text-xl font-bold text-navy-900 mb-1">要件の曖昧さによる手戻り</div>
            <div class="h-3 bg-slate-100 rounded-full overflow-hidden">
              <div class="h-full bg-red-500 rounded-full" style="width: 67%"></div>
            </div>
          </div>
        </div>
        
        <!-- Stat 2 -->
        <div class="flex items-baseline gap-6">
          <div class="w-24 text-right">
            <span class="stat-number text-5xl font-black text-orange-500">42</span>
            <span class="text-2xl font-bold text-orange-500">%</span>
          </div>
          <div class="flex-1">
            <div class="text-xl font-bold text-navy-900 mb-1">テストと要件が未紐付け</div>
            <div class="h-3 bg-slate-100 rounded-full overflow-hidden">
              <div class="h-full bg-orange-500 rounded-full" style="width: 42%"></div>
            </div>
          </div>
        </div>
        
        <!-- Stat 3 -->
        <div class="flex items-baseline gap-6">
          <div class="w-24 text-right">
            <span class="stat-number text-5xl font-black text-amber-500">35</span>
            <span class="text-2xl font-bold text-amber-500">%</span>
          </div>
          <div class="flex-1">
            <div class="text-xl font-bold text-navy-900 mb-1">バグの再発率</div>
            <div class="h-3 bg-slate-100 rounded-full overflow-hidden">
              <div class="h-full bg-amber-500 rounded-full" style="width: 35%"></div>
            </div>
          </div>
        </div>
        
      </div>
      
      <!-- Source Note -->
      <div class="mt-8 text-xs text-slate-400">
        ※ 数値は推定値。実測値への置き換えを推奨
      </div>
      
    </div>
    
  </div>

</body>
</html>
