<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200,height=675">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>body { font-family: 'Noto Sans JP', sans-serif; }</style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-white w-[1200px] h-[675px] overflow-hidden">
  
  <div class="h-full px-16 py-10">
    
    <!-- Header -->
    <div class="mb-8">
      <div class="text-sm font-medium text-slate-400 tracking-wider uppercase mb-2">
        {{EYEBROW}}
      </div>
      <h1 class="text-3xl font-black text-navy-900">
        {{TITLE}}
      </h1>
    </div>
    
    <!-- Definition Box -->
    <div class="inline-flex items-center gap-3 bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 mb-8">
      <span class="text-sm font-bold text-navy-800">{{ACRONYM}}</span>
      <span class="text-slate-400">=</span>
      <span class="text-slate-600">{{ACRONYM_FULL}}</span>
    </div>
    
    <!-- 5-Step Flow -->
    <div class="flex items-stretch gap-3 mb-8">
      
      {{#STEPS}}
      <div class="flex-1 relative">
        <div class="{{BG_CLASS}} text-white rounded-xl p-5 h-full flex flex-col">
          <div class="text-xs font-bold text-slate-400 mb-1">{{NUMBER}}</div>
          <div class="text-lg font-bold mb-2">{{TITLE}}</div>
          <div class="text-sm text-slate-300 mt-auto">{{DETAIL}}</div>
        </div>
        {{#HAS_ARROW}}
        <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 z-10 w-6 h-6 bg-white border-2 border-navy-700 rounded-full flex items-center justify-center text-navy-700 text-xs">→</div>
        {{/HAS_ARROW}}
      </div>
      {{/STEPS}}
      
    </div>
    
    <!-- Benefits Row -->
    <div class="grid grid-cols-3 gap-6">
      {{#BENEFITS}}
      <div class="flex items-center gap-4 bg-emerald-50 border border-emerald-200 rounded-lg px-5 py-4">
        <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white text-lg">{{NUMBER}}</div>
        <div>
          <div class="font-bold text-emerald-800">{{TITLE}}</div>
          <div class="text-sm text-emerald-600">{{DETAIL}}</div>
        </div>
      </div>
      {{/BENEFITS}}
    </div>
    
  </div>

</body>
</html>
