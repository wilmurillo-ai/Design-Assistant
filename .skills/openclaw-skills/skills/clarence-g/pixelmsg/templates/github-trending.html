<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; font-family: 'Inter', -apple-system, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', monospace; }
    .repo-row { border-bottom: 1px solid #161b22; }
    .repo-row:last-child { border-bottom: none; }
  </style>
</head>
<body>

<div x-data="{
  date: 'April 3, 2026',
  repos: [
    { rank: 1,  owner: 'openclaw', name: 'openclaw',       desc: 'Your own personal AI assistant. Any OS. Any Platform.',           lang: 'TypeScript', langColor: '#3178c6', stars: '300.3k', todayStars: '9,080', forks: '56.8k' },
    { rank: 2,  owner: 'msitarzewski', name: 'agency-agents', desc: 'A complete AI agency — frontend wizards to community managers.', lang: 'Shell',      langColor: '#89e051', stars: '26.5k',  todayStars: '6,223', forks: '4.2k' },
    { rank: 3,  owner: '666ghj', name: 'MiroFish',         desc: 'A simple swarm intelligence engine that predicts anything.',       lang: 'Python',     langColor: '#3572A5', stars: '15.1k',  todayStars: '4,504', forks: '1.6k' },
    { rank: 4,  owner: 'bytedance', name: 'deer-flow',     desc: 'Open-source SuperAgent: research, code, and create.',              lang: 'Python',     langColor: '#3572A5', stars: '28.8k',  todayStars: '1,413', forks: '3.4k' },
    { rank: 5,  owner: 'obra', name: 'superpowers',        desc: 'An agentic skills framework and development methodology.',         lang: 'Shell',      langColor: '#89e051', stars: '77.0k',  todayStars: '1,387', forks: '6.0k' },
    { rank: 6,  owner: 'pbakaus', name: 'impeccable',      desc: 'The design language that makes your AI harness better at design.', lang: 'JavaScript', langColor: '#f1e05a', stars: '3.8k',   todayStars: '939',   forks: '143' },
    { rank: 7,  owner: 'alibaba', name: 'page-agent',      desc: 'JavaScript in-page GUI agent. Control web UIs with natural language.', lang: 'TypeScript', langColor: '#3178c6', stars: '3.9k', todayStars: '891', forks: '312' },
    { rank: 8,  owner: 'NousResearch', name: 'hermes-agent', desc: 'The agent that grows with you.',                                lang: 'Python',     langColor: '#3572A5', stars: '4.2k',   todayStars: '781',   forks: '517' },
    { rank: 9,  owner: 'karpathy', name: 'nanochat',       desc: 'The best ChatGPT that $100 can buy.',                             lang: 'Python',     langColor: '#3572A5', stars: '46.4k',  todayStars: '705',   forks: '6.1k' },
    { rank: 10, owner: 'promptfoo', name: 'promptfoo',     desc: 'Test your prompts, agents, and RAGs. AI red teaming for LLMs.',   lang: 'TypeScript', langColor: '#3178c6', stars: '12.1k',  todayStars: '661',   forks: '1.1k' }
  ]
}" id="app">

  <div style="width:800px; background:#0d1117; padding:48px; box-sizing:border-box;">

    <!-- Header -->
    <div style="margin-bottom:24px; display:flex; align-items:flex-end; justify-content:space-between;">
      <div>
        <div style="font-size:11px; color:#484f58; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; font-weight:500;">GitHub</div>
        <div style="font-size:22px; font-weight:700; color:#e6edf3; letter-spacing:-0.3px;">Daily Trending</div>
      </div>
      <div class="mono" style="font-size:12px; color:#484f58;" x-text="date"></div>
    </div>

    <!-- Repo List -->
    <div style="border:1px solid #21262d; border-radius:6px; overflow:hidden;">
      <template x-for="r in repos" :key="r.rank">
        <div class="repo-row" style="padding:14px 16px;">
          <div style="display:flex; align-items:flex-start; gap:12px;">

            <!-- Rank -->
            <div class="mono" style="font-size:11px; color:#484f58; width:18px; flex-shrink:0; padding-top:2px; text-align:right;" x-text="r.rank"></div>

            <!-- Content -->
            <div style="flex:1; min-width:0;">
              <div style="display:flex; align-items:baseline; gap:0; margin-bottom:4px; flex-wrap:nowrap; overflow:hidden;">
                <span style="font-size:13px; color:#8b949e;" x-text="r.owner"></span>
                <span style="font-size:13px; color:#8b949e; margin:0 2px;">/</span>
                <span style="font-size:13px; font-weight:700; color:#58a6ff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" x-text="r.name"></span>
              </div>
              <div style="font-size:12px; color:#8b949e; line-height:1.5; margin-bottom:10px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;" x-text="r.desc"></div>
              <div style="display:flex; align-items:center; gap:14px;">
                <!-- Language -->
                <div style="display:flex; align-items:center; gap:5px;">
                  <div style="width:10px; height:10px; border-radius:50%;" :style="'background:' + r.langColor"></div>
                  <span style="font-size:11px; color:#8b949e;" x-text="r.lang"></span>
                </div>
                <!-- Stars -->
                <div style="display:flex; align-items:center; gap:4px;">
                  <svg width="12" height="12" viewBox="0 0 16 16" fill="#8b949e"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>
                  <span class="mono" style="font-size:11px; color:#8b949e;" x-text="r.stars"></span>
                </div>
                <!-- Today -->
                <div style="display:flex; align-items:center; gap:4px; margin-left:auto;">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
                  <span class="mono" style="font-size:11px; color:#3fb950;" x-text="r.todayStars + ' today'"></span>
                </div>
              </div>
            </div>

          </div>
        </div>
      </template>
    </div>

    <!-- Footer -->
    <div style="margin-top:16px; font-size:11px; color:#30363d; text-align:right;">github.com/trending</div>

  </div>

</div>

</body>
</html>
