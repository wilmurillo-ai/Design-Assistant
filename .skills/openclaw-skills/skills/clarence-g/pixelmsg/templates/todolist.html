<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; padding: 0; background: transparent; }
    #app { display: inline-block; }
  </style>
</head>
<body>

<div x-data="{
  tasks: [
    { title: 'Read Deep Work for 30 min', done: true },
    { title: 'Morning run 5km',           done: true },
    { title: 'Draft Q2 OKR',              done: false },
    { title: 'Review PR #142',            done: false },
    { title: 'Prep Friday talk',          done: false }
  ],
  get done() { return this.tasks.filter(t => t.done).length },
  get total() { return this.tasks.length },
  get pct() { return Math.round(this.done / this.total * 100) },
  checkIcon(done) {
    if (done) return `<svg width='20' height='20' viewBox='0 0 20 20' fill='none'><circle cx='10' cy='10' r='9' fill='rgba(255,255,255,0.5)'/><path d='M6 10l3 3 5-6' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/></svg>`;
    return `<svg width='20' height='20' viewBox='0 0 20 20' fill='none'><circle cx='10' cy='10' r='9' stroke='rgba(255,255,255,0.35)' stroke-width='1.5'/></svg>`;
  }
}" id="app">

  <div style="width:460px; padding:32px; background:linear-gradient(135deg,#1565c0 0%,#0d47a1 100%);">

    <!-- Header -->
    <div style="margin-bottom:20px;">
      <div style="display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px;">
        <div style="font-size:24px; font-weight:700; color:#fff; letter-spacing:-0.3px;">Today's Tasks</div>
        <div style="font-size:14px; color:rgba(255,255,255,0.6);">
          <span x-text="done"></span>/<span x-text="total"></span> done
        </div>
      </div>
      <!-- Progress bar -->
      <div style="height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden;">
        <div style="height:100%; background:rgba(255,255,255,0.6); border-radius:2px; transition:width 0.3s;" :style="'width:' + pct + '%'"></div>
      </div>
    </div>

    <!-- Task list -->
    <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:24px;">
      <template x-for="t in tasks" :key="t.title">
        <div style="display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.08); border-radius:10px; padding:12px 16px;">
          <div style="flex-shrink:0;" x-html="checkIcon(t.done)"></div>
          <div style="font-size:14px; line-height:1.4;"
               :style="t.done ? 'color:rgba(255,255,255,0.45); text-decoration:line-through;' : 'color:#fff;'"
               x-text="t.title"></div>
        </div>
      </template>
    </div>

    <!-- Footer -->
    <div style="font-size:12px; color:rgba(255,255,255,0.4); letter-spacing:0.02em;">April 3, Thursday</div>

  </div>

</div>

</body>
</html>
