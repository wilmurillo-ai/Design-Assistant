<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; padding: 0; background: transparent; }
    #app { display: inline-block; }
  </style>
</head>
<body>

<div x-data="{
  city: 'Shanghai',
  date: 'April 3, 2026',
  current: { temp: 18, condition: 'Cloudy', feelsLike: 16, humidity: 72, wind: 'SE Wind 3' },
  forecast: [
    { day: 'Today', high: 19, low: 13, condition: 'Cloudy' },
    { day: 'Tomorrow', high: 17, low: 11, condition: 'Light Rain' },
    { day: 'Day 3', high: 15, low: 10, condition: 'Showers' },
    { day: 'Mon', high: 18, low: 12, condition: 'Cloudy' },
    { day: 'Tue', high: 21, low: 14, condition: 'Sunny' }
  ],
  conditionIcon(c) {
    const a = &quot;fill='none' stroke='rgba(255,255,255,0.85)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'&quot;;
    const icons = {
      'Sunny':      `<svg width='16' height='16' viewBox='0 0 24 24' ${a}><circle cx='12' cy='12' r='4'/><line x1='12' y1='2' x2='12' y2='5'/><line x1='12' y1='19' x2='12' y2='22'/><line x1='2' y1='12' x2='5' y2='12'/><line x1='19' y1='12' x2='22' y2='12'/><line x1='4.9' y1='4.9' x2='7.1' y2='7.1'/><line x1='16.9' y1='16.9' x2='19.1' y2='19.1'/><line x1='16.9' y1='7.1' x2='19.1' y2='4.9'/><line x1='4.9' y1='19.1' x2='7.1' y2='16.9'/></svg>`,
      'Cloudy':     `<svg width='16' height='16' viewBox='0 0 24 24' ${a}><path d='M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z'/></svg>`,
      'Light Rain': `<svg width='16' height='16' viewBox='0 0 24 24' ${a}><path d='M20 16.2A4.5 4.5 0 0 0 17.5 8h-1.8A7 7 0 1 0 4 14.9'/><line x1='8' y1='19' x2='8' y2='21'/><line x1='12' y1='17' x2='12' y2='21'/><line x1='16' y1='19' x2='16' y2='21'/></svg>`,
      'Showers':    `<svg width='16' height='16' viewBox='0 0 24 24' ${a}><path d='M20 16.2A4.5 4.5 0 0 0 17.5 8h-1.8A7 7 0 1 0 4 14.9'/><line x1='8' y1='19' x2='8' y2='21'/><line x1='12' y1='17' x2='12' y2='21'/><line x1='16' y1='19' x2='16' y2='21'/></svg>`,
      'Overcast':   `<svg width='16' height='16' viewBox='0 0 24 24' ${a}><path d='M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z'/></svg>`
    };
    return icons[c] || icons['Cloudy'];
  },
  tempBarStyle(low, high) {
    const min = 8, max = 24, span = max - min;
    const left = Math.max(0, Math.round((low - min) / span * 100));
    const width = Math.max(8, Math.round((high - low) / span * 100));
    return 'left:' + left + '%; width:' + width + '%';
  }
}" id="app">

  <div style="width:420px; padding:32px; background:linear-gradient(160deg,#0f4c81 0%,#1976d2 50%,#4fc3f7 100%); position:relative; overflow:hidden;">

    <!-- Decorative sun top-right -->
    <div style="position:absolute; top:-12px; right:-12px; opacity:0.15; pointer-events:none;">
      <svg width="140" height="140" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="0.8" stroke-linecap="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </div>

    <!-- City + date -->
    <div style="margin-bottom:24px; position:relative;">
      <div style="font-size:11px; font-weight:600; color:rgba(255,255,255,0.5); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px;" x-text="date"></div>
      <div style="font-size:20px; font-weight:600; color:#fff; letter-spacing:-0.2px;" x-text="city"></div>
    </div>

    <!-- Temperature block -->
    <div style="margin-bottom:28px; position:relative;">
      <div style="display:flex; align-items:flex-start; gap:2px; margin-bottom:6px;">
        <span style="font-size:72px; font-weight:300; color:#fff; line-height:1; letter-spacing:-3px;" x-text="current.temp"></span>
        <span style="font-size:26px; font-weight:300; color:rgba(255,255,255,0.55); margin-top:8px;">°</span>
      </div>
      <div style="font-size:14px; color:rgba(255,255,255,0.7);" x-text="current.condition"></div>
    </div>

    <!-- Stats panel (glassmorphism) -->
    <div style="backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:14px 16px; margin-bottom:12px; display:grid; grid-template-columns:1fr 1fr 1fr;">
      <div style="text-align:center;">
        <div style="font-size:11px; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px;">Humidity</div>
        <div style="font-size:15px; font-weight:600; color:#fff;"><span x-text="current.humidity"></span>%</div>
      </div>
      <div style="text-align:center; border-left:1px solid rgba(255,255,255,0.15); border-right:1px solid rgba(255,255,255,0.15);">
        <div style="font-size:11px; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px;">Feels Like</div>
        <div style="font-size:15px; font-weight:600; color:#fff;"><span x-text="current.feelsLike"></span>°</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:11px; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px;">Wind</div>
        <div style="font-size:15px; font-weight:600; color:#fff;" x-text="current.wind"></div>
      </div>
    </div>

    <!-- 5-day forecast panel (glassmorphism) -->
    <div style="backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:14px 16px;">
      <div style="font-size:11px; font-weight:600; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:12px;">5-Day Forecast</div>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <template x-for="f in forecast" :key="f.day">
          <div style="display:grid; grid-template-columns:40px 24px 52px 1fr 28px; align-items:center; gap:8px;">
            <div style="font-size:12px; font-weight:500; color:rgba(255,255,255,0.7);" x-text="f.day"></div>
            <div style="display:flex; align-items:center;" x-html="conditionIcon(f.condition)"></div>
            <div style="font-size:12px; color:rgba(255,255,255,0.5);" x-text="f.condition"></div>
            <div style="position:relative; height:3px; background:rgba(255,255,255,0.15); border-radius:2px;">
              <div style="position:absolute; height:100%; background:rgba(255,255,255,0.6); border-radius:2px;" :style="tempBarStyle(f.low, f.high)"></div>
            </div>
            <div style="font-size:12px; font-weight:600; color:rgba(255,255,255,0.85); text-align:right;"><span x-text="f.high"></span>°</div>
          </div>
        </template>
      </div>
    </div>

  </div>

</div>

</body>
</html>
