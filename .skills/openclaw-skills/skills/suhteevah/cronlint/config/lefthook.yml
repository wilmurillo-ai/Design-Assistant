# CronLint -- lefthook configuration
# Installed by: cronlint hooks install
# Documentation: https://cronlint.pages.dev/docs/hooks
#
# This configuration integrates CronLint with git hooks via lefthook.
# Pre-commit: scans staged files for scheduling issues (blocks on critical/high)
# Pre-push: runs full scan of the working tree before push

pre-commit:
  parallel: true
  commands:
    cronlint-check:
      run: |
        CRONLINT_SKILL_DIR="${CRONLINT_SKILL_DIR:-$HOME/.openclaw/skills/cronlint}"
        if [[ -f "$CRONLINT_SKILL_DIR/scripts/analyzer.sh" ]]; then
          source "$CRONLINT_SKILL_DIR/scripts/patterns.sh"
          source "$CRONLINT_SKILL_DIR/scripts/analyzer.sh"
          hook_cronlint_check
        else
          echo "[CronLint] Skill not found at $CRONLINT_SKILL_DIR -- skipping scan"
        fi
      fail_text: |
        Scheduling issues detected in staged files!
        Run 'cronlint scan' to see details.
        Or 'git commit --no-verify' to skip (NOT recommended).

pre-push:
  parallel: true
  commands:
    cronlint-full-scan:
      run: |
        CRONLINT_SKILL_DIR="${CRONLINT_SKILL_DIR:-$HOME/.openclaw/skills/cronlint}"
        if [[ -f "$CRONLINT_SKILL_DIR/scripts/dispatcher.sh" ]]; then
          bash "$CRONLINT_SKILL_DIR/scripts/dispatcher.sh" --path . --format text
        else
          echo "[CronLint] Skill not found at $CRONLINT_SKILL_DIR -- skipping scan"
        fi
      fail_text: |
        CronLint detected scheduling quality issues in your codebase.
        Run 'cronlint scan --verbose' for detailed findings.
        Fix critical/high issues before pushing.
