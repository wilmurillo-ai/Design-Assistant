# LogSentry -- lefthook configuration
# Installed by: logsentry hooks install
# Documentation: https://logsentry.pages.dev/docs/hooks
#
# This configuration integrates LogSentry with git hooks via lefthook.
# Pre-commit: scans staged files for logging issues (blocks on critical/high)
# Pre-push: runs full scan of the working tree before push

pre-commit:
  parallel: true
  commands:
    logsentry-check:
      run: |
        LOGSENTRY_SKILL_DIR="${LOGSENTRY_SKILL_DIR:-$HOME/.openclaw/skills/logsentry}"
        if [[ -f "$LOGSENTRY_SKILL_DIR/scripts/analyzer.sh" ]]; then
          source "$LOGSENTRY_SKILL_DIR/scripts/patterns.sh"
          source "$LOGSENTRY_SKILL_DIR/scripts/analyzer.sh"
          hook_logsentry_check
        else
          echo "[LogSentry] Skill not found at $LOGSENTRY_SKILL_DIR -- skipping scan"
        fi
      fail_text: |
        Logging issues detected in staged files!
        Run 'logsentry scan' to see details.
        Or 'git commit --no-verify' to skip (NOT recommended).

pre-push:
  parallel: true
  commands:
    logsentry-full-scan:
      run: |
        LOGSENTRY_SKILL_DIR="${LOGSENTRY_SKILL_DIR:-$HOME/.openclaw/skills/logsentry}"
        if [[ -f "$LOGSENTRY_SKILL_DIR/scripts/dispatcher.sh" ]]; then
          bash "$LOGSENTRY_SKILL_DIR/scripts/dispatcher.sh" --path . --format text
        else
          echo "[LogSentry] Skill not found at $LOGSENTRY_SKILL_DIR -- skipping scan"
        fi
      fail_text: |
        LogSentry detected logging quality issues in your codebase.
        Run 'logsentry scan --verbose' for detailed findings.
        Fix critical/high issues before pushing.
