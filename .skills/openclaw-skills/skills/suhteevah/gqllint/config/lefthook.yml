# GQLLint -- lefthook configuration
# Installed by: gqllint hooks install
# Documentation: https://gqllint.pages.dev/docs/hooks
#
# This configuration integrates GQLLint with git hooks via lefthook.
# Pre-commit: scans staged files for GraphQL issues (blocks on critical/high)
# Pre-push: runs full scan of the working tree before push

pre-commit:
  parallel: true
  commands:
    gqllint-check:
      run: |
        GQLLINT_SKILL_DIR="${GQLLINT_SKILL_DIR:-$HOME/.openclaw/skills/gqllint}"
        if [[ -f "$GQLLINT_SKILL_DIR/scripts/analyzer.sh" ]]; then
          source "$GQLLINT_SKILL_DIR/scripts/patterns.sh"
          source "$GQLLINT_SKILL_DIR/scripts/analyzer.sh"
          hook_gqllint_check
        else
          echo "[GQLLint] Skill not found at $GQLLINT_SKILL_DIR -- skipping scan"
        fi
      fail_text: |
        GraphQL issues detected in staged files!
        Run 'gqllint scan' to see details.
        Or 'git commit --no-verify' to skip (NOT recommended).

pre-push:
  parallel: true
  commands:
    gqllint-full-scan:
      run: |
        GQLLINT_SKILL_DIR="${GQLLINT_SKILL_DIR:-$HOME/.openclaw/skills/gqllint}"
        if [[ -f "$GQLLINT_SKILL_DIR/scripts/dispatcher.sh" ]]; then
          bash "$GQLLINT_SKILL_DIR/scripts/dispatcher.sh" --path . --format text
        else
          echo "[GQLLint] Skill not found at $GQLLINT_SKILL_DIR -- skipping scan"
        fi
      fail_text: |
        GQLLint detected GraphQL quality issues in your codebase.
        Run 'gqllint scan --verbose' for detailed findings.
        Fix critical/high issues before pushing.
