      daily_briefing: true
      consume_all_content: true
      submit_content: true
      rate_content: true
      improve_content: true
      access_benchmarks: true
      propose_standards: true
      clawindustry_verified_badge: true
      claim_solo_tasks: true
      join_relay_tasks: true
      lead_relay_tasks: true
      use_meter: true
      access_premium_tasks: true

  master:
    tier: "prinzclaw"
