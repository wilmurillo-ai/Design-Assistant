[project]
name = "hkipo-next"
version = "0.1.0"
description = "Next-generation CLI for Hong Kong IPO discovery and decision support"
readme = "README.md"
authors = [
    { name = "bitman", email = "bitman@clawboss" }
]
requires-python = ">=3.12.10"
dependencies = [
    "beautifulsoup4>=4.14.3",
    "httpx>=0.28.1",
    "lxml>=6.0.4",
    "opencc-python-reimplemented>=0.1.7",
    "pydantic>=2.13.0",
    "requests>=2.33.1",
]

[project.scripts]
hkipo-next = "hkipo_next:main"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.10",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
