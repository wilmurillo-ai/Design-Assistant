<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 超炫渐变 - 主标题 -->
    <linearGradient id="megaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0080">
        <animate attributeName="stop-color" values="#FF0080;#7928CA;#FF0080" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#7928CA">
        <animate attributeName="stop-color" values="#7928CA;#FF0080;#7928CA" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FF0080">
        <animate attributeName="stop-color" values="#FF0080;#7928CA;#FF0080" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- 青蓝渐变 - 副标题 -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="100%" stop-color="#00FF94"/>
    </linearGradient>

    <!-- 金色渐变 - emoji -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF6347"/>
    </linearGradient>

    <!-- 背景网格 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
    </pattern>

    <!-- 强烈发光 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 文字阴影 -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FF0080" flood-opacity="0.6"/>
    </filter>

    <!-- 脉冲发光 -->
    <filter id="pulseGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur">
          <animate attributeName="stdDeviation" values="3;6;3" dur="2s" repeatCount="indefinite"/>
        </feMergeNode>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 深色背景 -->
  <rect width="800" height="280" fill="#0D0D0D"/>

  <!-- 网格背景 -->
  <rect width="800" height="280" fill="url(#grid)"/>

  <!-- 渐变背景光晕 -->
  <ellipse cx="400" cy="140" rx="400" ry="140" fill="url(#megaGrad)" opacity="0.15"/>
  <ellipse cx="200" cy="100" rx="150" ry="100" fill="#FF0080" opacity="0.08"/>
  <ellipse cx="600" cy="180" rx="180" ry="120" fill="#7928CA" opacity="0.08"/>

  <!-- 动态光点 -->
  <circle cx="100" cy="50" r="4" fill="#00D9FF" opacity="0.8">
    <animate attributeName="cy" values="50;60;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="80" r="5" fill="#FF0080" opacity="0.9">
    <animate attributeName="cy" values="80;70;80" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="230" r="4" fill="#00FF94" opacity="0.7">
    <animate attributeName="cx" values="650;660;650" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="200" r="3" fill="#FFD700" opacity="0.8">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- 主 Emoji 图标 - 带脉冲效果 -->
  <g filter="url(#pulseGlow)">
    <text x="400" y="80" text-anchor="middle" font-size="50">🎯</text>
  </g>

  <!-- 主标题 - 超大超炫 -->
  <text x="400" y="145" text-anchor="middle" font-family="'SF Pro Display', -apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="800" fill="url(#megaGrad)" filter="url(#textShadow)">
    OfferCatcher
  </text>

  <!-- 副标题 -->
  <text x="400" y="185" text-anchor="middle" font-family="'SF Pro Display', -apple-system, 'PingFang SC', sans-serif" font-size="20" fill="url(#cyanGrad)" filter="url(#glow)">
    Turn recruiting emails into native Apple Reminders
  </text>

  <!-- 功能标签 -->
  <g transform="translate(400, 225)">
    <g transform="translate(-160, 0)">
      <rect x="0" y="-14" width="95" height="24" rx="12" fill="#FF0080" opacity="0.2"/>
      <text x="48" y="4" text-anchor="middle" font-size="12" fill="#FF0080" font-weight="600">AI-Powered</text>
    </g>
    <g transform="translate(-45, 0)">
      <rect x="0" y="-14" width="90" height="24" rx="12" fill="#00D9FF" opacity="0.2"/>
      <text x="45" y="4" text-anchor="middle" font-size="12" fill="#00D9FF" font-weight="600">Cross-Device</text>
    </g>
    <g transform="translate(65, 0)">
      <rect x="0" y="-14" width="95" height="24" rx="12" fill="#00FF94" opacity="0.2"/>
      <text x="48" y="4" text-anchor="middle" font-size="12" fill="#00FF94" font-weight="600">All Languages</text>
    </g>
  </g>

  <!-- 装饰线条 -->
  <line x1="200" y1="105" x2="600" y2="105" stroke="url(#megaGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="200" x2="600" y2="200" stroke="url(#cyanGrad)" stroke-width="1" opacity="0.3"/>
</svg>