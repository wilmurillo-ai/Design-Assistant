# 黄历配置文件 V3.0.1
# 修改此文件即可调整黄历生成参数，无需修改代码

# ==================== 输出配置 ====================
output:
  # 默认输出目录
  base_dir: ./reports
  
  # 日期分组格式（用于批量生成）
  # "%Y-%m" = 按年月分组（如 2026-04/）
  # "%Y" = 按年分组（如 2026/）
  date_format: "%Y-%m"
  
  # 图片质量（1-100）
  quality: 95
  
  # 是否覆盖已存在的文件
  overwrite: true

# ==================== 字体配置 ====================
font:
  # 字体大小（像素）
  title: 90        # 主标题
  subtitle: 65     # 副标题（日期）
  section: 60      # 栏目标题
  content: 48      # 正文
  content_large: 44  # 故事/养生正文
  small: 40        # 小字（底部/注释）
  
  # 字体文件路径（Windows 默认）
  # 可替换为其他字体文件
  paths:
    - "C:/Windows/Fonts/simhei.ttf"      # 黑体（主字体）
    - "C:/Windows/Fonts/msyh.ttc"        # 微软雅黑（备用）
    - "C:/Windows/Fonts/simsun.ttc"      # 宋体（备用）

# ==================== 间距配置 ====================
spacing:
  # 页边距（像素）
  margin: 50
  
  # 各区域间距（像素）
  after_title: 15      # 标题后
  after_subtitle: 20   # 副标题后
  after_section: 28    # 栏目标题后
  after_content: 20    # 内容后
  separator_after: 28  # 分隔线后

# ==================== 模板配置 ====================
template:
  # 默认模板
  # 可选：traditional, modern, festive, elegant, fresh
  default: traditional
  
  # 是否启用模板轮换（按日期自动切换）
  rotation: true
  
  # 轮换周期（天）
  # 5 = 5 天一个循环
  rotation_days: 5
  
  # 自定义模板（可选）
  # 可在此添加自定义配色方案
  custom_templates: []

# ==================== 功能开关 ====================
features:
  # 显示节气信息
  show_jieqi: true
  
  # 显示 24 节气故事
  show_story: true
  
  # 显示养生建议
  show_health: true
  
  # 显示穿衣建议
  show_clothing: true
  
  # 显示黄历科普
  show_kepu: true
  
  # 显示生肖图标（Unicode）
  show_shengxiao_icon: true

# ==================== 批量生成配置 ====================
batch:
  # 默认批量生成天数
  default_days: 7
  
  # 最大批量生成天数
  max_days: 365
  
  # 显示进度条
  progress_bar: true

# ==================== 其他配置 ====================
other:
  # 日志级别（DEBUG, INFO, WARNING, ERROR）
  log_level: INFO
  
  # 是否显示详细输出
  verbose: false
  
  # 随机种子（用于可复现的随机选择）
  # null = 每次不同
  # 整数 = 固定种子
  random_seed: null
