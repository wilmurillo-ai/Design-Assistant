name: github-to-rednote
description: Convert GitHub repositories into RedNote style technical articles with cover image generation
version: 1.2.0
author: kevin
type: skill
category: content-generation
tags:
  - github
  - rednote
  - xiaohongshu
  - content
  - article
  - ai
  - image-generation

tools:
  - canvas

commands:
  generate:
    description: Generate RedNote article from GitHub repository with optional cover image
    usage: generate URL [--template TYPE] [--style STYLE] [--output FILE] [--with-image] [--image-output DIR]
    args:
      - name: url
        required: true
        description: GitHub repository URL
      - name: template
        required: false
        default: intro
        description: Article template (intro, review, tutorial, list, release)
      - name: style
        required: false
        default: casual
        description: Writing style (casual, professional, enthusiastic, story, minimal)
      - name: output
        required: false
        description: Output file path (default stdout)
      - name: with-image
        required: false
        description: Generate RedNote cover image (requires --output)
      - name: image-output
        required: false
        description: Directory for cover image output (default: same as --output directory)
      - name: clipboard
        required: false
        description: Copy output to clipboard

env:
  GITHUB_TOKEN:
    required: true
    description: GitHub personal access token for API access

agent:
  description: Uses OpenClaw's built-in agent capability for content generation. No external LLM API keys required.
  capabilities:
    - content_generation
    - markdown_formatting
    - chinese_technical_writing

scripts:
  - scripts/github_api.py
  - scripts/generate_article.py
  - scripts/formatters.py
  - scripts/llm_generator.py
  - scripts/image_generator.py
  - scripts/test_github_api.py

docs:
  - README.md
  - SKILL.md
  - prompts.md
  - rednote-style.md
