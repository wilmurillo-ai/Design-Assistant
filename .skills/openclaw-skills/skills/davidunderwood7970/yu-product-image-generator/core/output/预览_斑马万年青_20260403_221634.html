<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>斑马万年青 - 商品图预览</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .card-info {
            padding: 15px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>斑马万年青 - 商品图预览</h1>
    <div class="grid">

        <div class="card">
            <img src="../../../../../../../../tmp/generated_20260403_214940_1.png" alt="图1">
            <div class="card-info">图1</div>
        </div>

        <div class="card">
            <img src="../../../../../../../../tmp/generated_20260403_215348_1.png" alt="图2">
            <div class="card-info">图2</div>
        </div>

        <div class="card">
            <img src="../../../../../../../../tmp/generated_20260403_215248_1.png" alt="图3">
            <div class="card-info">图3</div>
        </div>

    </div>
</body>
</html>
