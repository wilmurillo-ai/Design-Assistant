[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "contextmachine"
version = "0.1.0"
description = "CXM - The Developer's Context Machine for AI Orchestration"
authors = [
    {name = "Joe", email = "joe@example.com"}
]
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "sentence-transformers>=2.2.0",
    "faiss-cpu>=1.7.4",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "rank-bm25>=0.2.2",
    "pyyaml>=6.0",
    "tqdm>=4.65.0",
    "rich>=13.0.0",
    "pyperclip>=1.8.2",
    "questionary>=2.0.0",
    "flet>=0.21.0"
]

[project.scripts]
cxm = "cli:main"
cxmd = "dashboard:main"
cxmg = "gui:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["*"]

[tool.setuptools.package-data]
"locales" = ["*.yaml"]
