# Basic Flow Example
# This is a simple example demonstrating core Kata Platform concepts
# Schema: kata.ai/schema/kata-ml/1.0

name: exampleBot
version: 1.0.0
schema: kata.ai/schema/kata-ml/1.0

config:
  # Configuration variables - use $(config.variable) to reference
  botName: "Example Bot"
  apiBaseUrl: "https://api.example.com"
  apiToken: "your-secret-token"
  schedulerUrl: "https://scheduler.taptalk.io"

# Intent definitions - how user input is classified
intents:
  # Initial greeting intent - starts conversation
  greet:
    priority: 5
    type: text
    condition: 'content.toLowerCase() == "hi" || content.toLowerCase() == "hello"'
    initial: true

  # Button click intent - handles postback from buttons
  selectOption:
    priority: 3
    type: data
    condition: 'payload.action == "selectOption"'
    attributes:
      data:
        selectedOption: $(payload.option)

  # Keyword intent - matches specific text
  helpIntent:
    priority: 10
    type: text
    condition: 'content.toLowerCase().indexOf("help") >= 0'

  # Command intent - for schedulers
  scheduleRunTimeout:
    priority: 1
    type: command
    condition: 'content == "scheduleRunTimeout"'

  # Fallback intent - catches unmatched input
  fallbackIntent:
    priority: 99
    type: text
    fallback: true
    condition: 'true'

# Action definitions - what the bot does
actions:
  # Simple text response
  welcomeMessage:
    type: text
    options:
      text: |
        Hi! Welcome to $(config.botName).

        I can help you with:
        1. Getting information
        2. Processing requests
        3. Answering questions

        How can I assist you today?

  # Button template - WhatsApp interactive message
  showMenu:
    type: template
    options:
      header: "Main Menu"
      body: "Please select an option below:"
      buttons:
        - type: postback
          label: "Option 1"
          payload:
            action: "selectOption"
            option: "option1"
        - type: postback
          label: "Option 2"
          payload:
            action: "selectOption"
            option: "option2"
        - type: postback
          label: "Help"
          payload:
            action: "selectOption"
            option: "help"

  # Dynamic text with variables
  confirmSelection:
    type: text
    options:
      text: "You selected: $(data.selectedOption)"

  # API call example
  fetchUserData:
    type: api
    options:
      method: GET
      uri: $(config.apiBaseUrl)/users/$(context.userId)
      headers:
        Authorization: "Bearer $(config.apiToken)"
        Content-Type: "application/json"
      mapping:
        context:
          userName: $(result.response.body.name)
          userEmail: $(result.response.body.email)
        data:
          apiSuccess: $(result.response.status == 200)
          apiError: $(result.response.status >= 400)

  # Conditional response - success
  apiSuccessMessage:
    type: text
    condition: 'data.apiSuccess == true'
    options:
      text: "Data retrieved successfully for $(context.userName)!"

  # Conditional response - error
  apiErrorMessage:
    type: text
    condition: 'data.apiError == true'
    options:
      text: "Sorry, I couldn't retrieve your data. Please try again later."

  # Method action example
  validateInput:
    type: method
    method: validateUserInput
    options:
      minLength: 5
      maxLength: 100

  # Create scheduler
  createTimeoutScheduler:
    type: api
    options:
      method: POST
      uri: $(config.schedulerUrl)
      headers:
        Content-Type: application/json
      body:
        scheduleId: timeout_$(metadata.sessionId)
        userId: $(metadata.userId)
        botId: $(config.botId)
        channelId: $(metadata.channelId)
        timeInMinutes: 5
        command: scheduleRunTimeout
      mapping:
        context:
          timeoutScheduled: true

  # Cancel scheduler
  cancelTimeoutScheduler:
    type: api
    options:
      method: DELETE
      uri: $(config.schedulerUrl)/timeout_$(metadata.sessionId)
      headers:
        Content-Type: application/json
      mapping:
        context:
          timeoutScheduled: false

  # Help message
  helpMessage:
    type: text
    options:
      text: |
        Here's how I can help:

        - Type "hi" to start
        - Use the menu to navigate
        - Ask me anything

        If you need further assistance, please contact support.

  # Goodbye message
  byeMessage:
    type: text
    options:
      text: "Thank you for chatting with $(config.botName). Goodbye!"

  # Fallback message
  fallbackMessage:
    type: text
    options:
      text: "I'm sorry, I didn't understand that. Type 'help' for assistance."

# Flow definition - conversation states and transitions
flows:
  mainFlow:
    states:
      # Initial state - greets user
      start:
        initial: true
        intents:
          - greet
        action:
          - name: welcomeMessage
          - name: showMenu
          - name: createTimeoutScheduler
        transitions:
          waitingForSelection:
            condition: 'true'

      # Waiting for user to select option
      waitingForSelection:
        intents:
          - selectOption
          - helpIntent
        action:
          - name: confirmSelection
          - name: validateInput
          - name: fetchUserData
          - name: apiSuccessMessage
          - name: apiErrorMessage
        transitions:
          # Transition based on selection
          processOption1:
            condition: 'data.selectedOption == "option1"'
          processOption2:
            condition: 'data.selectedOption == "option2"'
          help:
            condition: 'data.selectedOption == "help" || intent == "helpIntent"'
          # Fallback transition
          waitingForSelection:
            condition: 'true'

      # Process option 1
      processOption1:
        action:
          - name: confirmSelection
        transitions:
          completed:
            condition: 'true'

      # Process option 2
      processOption2:
        action:
          - name: confirmSelection
        transitions:
          completed:
            condition: 'true'

      # Help state
      help:
        intents:
          - selectOption
        action:
          - name: helpMessage
          - name: showMenu
        transitions:
          waitingForSelection:
            condition: 'true'

      # Completion state
      completed:
        action:
          - name: byeMessage
          - name: cancelTimeoutScheduler
        transitions:
          bye:
            condition: 'true'

      # Bye state - float (accessible from anywhere)
      bye:
        end: true
        float: true
        condition: 'intent == "scheduleRunTimeout"'
        intents:
          - scheduleRunTimeout
        action:
          - name: byeMessage
          - name: cancelTimeoutScheduler

      # Fallback state
      fallback:
        intents:
          - fallbackIntent
        action:
          - name: fallbackMessage
          - name: showMenu
        transitions:
          waitingForSelection:
            condition: 'true'

# ES5 JavaScript methods
methods:
  # Example validation method
  validateUserInput:
    code: |
      function validateUserInput(msg, ctx, dat, opts, cfg, result) {
        var input = msg.content;
        var minLength = opts.minLength || 0;
        var maxLength = opts.maxLength || 1000;

        var isValid = input.length >= minLength && input.length <= maxLength;
        var errorMessage = null;

        if (input.length < minLength) {
          errorMessage = 'Input too short (minimum ' + minLength + ' characters)';
        } else if (input.length > maxLength) {
          errorMessage = 'Input too long (maximum ' + maxLength + ' characters)';
        }

        return {
          command: 'updateData',
          payload: {
            inputValid: isValid,
            inputError: errorMessage
          }
        };
      }

  # Example data transformation method
  formatUserData:
    code: |
      function formatUserData(msg, ctx, dat, opts, cfg, result) {
        var name = ctx.userName || 'Unknown User';
        var email = ctx.userEmail || 'No email';

        var formatted = {
          displayName: name.toUpperCase(),
          emailDomain: email.split('@')[1] || 'unknown',
          greeting: 'Hello, ' + name + '!'
        };

        return {
          command: 'updateContext',
          payload: {
            formattedName: formatted.displayName,
            emailDomain: formatted.emailDomain,
            personalGreeting: formatted.greeting
          }
        };
      }

  # Example phone number validation (Indonesian)
  validatePhoneNumber:
    code: |
      function validatePhoneNumber(msg, ctx, dat, opts, cfg, result) {
        var phone = ctx.phoneNumber;

        // Indonesian phone: starts with 08 or 628, 10-13 digits total
        var regex = /^(08|628)[0-9]{8,11}$/;
        var isValid = regex.test(phone);

        // Normalize to 628 format
        var normalized = phone;
        if (phone.indexOf('08') === 0) {
          normalized = '628' + phone.substring(2);
        }

        return {
          command: 'updateContext',
          payload: {
            phoneValid: isValid,
            phoneNormalized: normalized
          }
        };
      }

# NLU definitions (optional - for natural language understanding)
nlus:
  nluExample:
    type: nl
    options:
      threshold: 0.7
    nlu:
      type: keyword
      profile: exampleProfile
