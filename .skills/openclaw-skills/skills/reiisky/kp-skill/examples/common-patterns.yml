# Common Kata Platform Flow Patterns
# Reusable patterns for common conversational scenarios
# Schema: kata.ai/schema/kata-ml/1.0

# ============================================================================
# PATTERN 1: LINEAR FLOW WITH VALIDATION
# Use case: Collecting user information step-by-step
# ============================================================================

linearFlowExample:
  intents:
    startForm:
      priority: 5
      type: text
      condition: 'content.toLowerCase() == "start"'
      initial: true

    submitName:
      priority: 10
      type: text
      condition: 'context.awaitingName == true'
      attributes:
        context:
          userName: $(content)
          awaitingName: false

    submitEmail:
      priority: 10
      type: text
      condition: 'context.awaitingEmail == true'
      attributes:
        context:
          userEmail: $(content)
          awaitingEmail: false

  states:
    start:
      initial: true
      intents:
        - startForm
      action:
        - name: askName
      transitions:
        awaitName:
          condition: 'true'

    awaitName:
      intents:
        - submitName
      action:
        - name: validateName
        - name: nameInvalid
        - name: askEmail
      transitions:
        awaitName:
          condition: 'data.nameValid == false'
        awaitEmail:
          condition: 'data.nameValid == true'

    awaitEmail:
      intents:
        - submitEmail
      action:
        - name: validateEmail
        - name: emailInvalid
        - name: confirmSubmission
      transitions:
        awaitEmail:
          condition: 'data.emailValid == false'
        completed:
          condition: 'data.emailValid == true'

    completed:
      action:
        - name: thankYou
      transitions:
        bye:
          condition: 'true'

    bye:
      end: true

  actions:
    askName:
      type: text
      options:
        text: "Please enter your full name:"

    validateName:
      type: method
      method: validateUserName

    nameInvalid:
      type: text
      condition: 'data.nameValid == false'
      options:
        text: "Invalid name. Please try again:"

    askEmail:
      type: text
      condition: 'data.nameValid == true'
      options:
        text: "Thanks $(context.userName)! Now please enter your email:"

    validateEmail:
      type: method
      method: validateEmailAddress

    emailInvalid:
      type: text
      condition: 'data.emailValid == false'
      options:
        text: "Invalid email format. Please try again:"

    confirmSubmission:
      type: text
      condition: 'data.emailValid == true'
      options:
        text: "Thank you! Your information has been saved."

    thankYou:
      type: text
      options:
        text: "Form completed successfully!"

# ============================================================================
# PATTERN 2: MENU-BASED NAVIGATION
# Use case: Multi-option menu with sub-menus
# ============================================================================

menuNavigationExample:
  intents:
    mainMenu:
      priority: 5
      type: data
      condition: 'payload.menu == "main"'

    selectOption1:
      priority: 5
      type: data
      condition: 'payload.action == "option1"'

    selectOption2:
      priority: 5
      type: data
      condition: 'payload.action == "option2"'

    backToMenu:
      priority: 3
      type: data
      condition: 'payload.action == "back"'

  states:
    mainMenu:
      initial: true
      intents:
        - mainMenu
      action:
        - name: showMainMenu
      transitions:
        option1:
          condition: 'intent == "selectOption1"'
        option2:
          condition: 'intent == "selectOption2"'
        mainMenu:
          condition: 'true'

    option1:
      intents:
        - backToMenu
      action:
        - name: showOption1Detail
        - name: backButton
      transitions:
        mainMenu:
          condition: 'intent == "backToMenu"'

    option2:
      intents:
        - backToMenu
      action:
        - name: showOption2Detail
        - name: backButton
      transitions:
        mainMenu:
          condition: 'intent == "backToMenu"'

  actions:
    showMainMenu:
      type: template
      options:
        header: "Main Menu"
        body: "Please select an option:"
        buttons:
          - type: postback
            label: "Option 1"
            payload:
              action: "option1"
          - type: postback
            label: "Option 2"
            payload:
              action: "option2"

    showOption1Detail:
      type: text
      options:
        text: "You selected Option 1. Here are the details..."

    showOption2Detail:
      type: text
      options:
        text: "You selected Option 2. Here are the details..."

    backButton:
      type: template
      options:
        body: "What would you like to do?"
        buttons:
          - type: postback
            label: "Back to Menu"
            payload:
              action: "back"

# ============================================================================
# PATTERN 3: ERROR HANDLING WITH RETRY
# Use case: API call with error handling and retry logic
# ============================================================================

errorHandlingExample:
  intents:
    fetchData:
      priority: 5
      type: text
      condition: 'content.toLowerCase() == "fetch"'

    retryFetch:
      priority: 5
      type: data
      condition: 'payload.action == "retry"'

  states:
    fetchData:
      intents:
        - fetchData
        - retryFetch
      action:
        - name: showLoading
        - name: callApi
        - name: handleSuccess
        - name: handleError
      transitions:
        success:
          condition: 'data.apiSuccess == true'
        error:
          condition: 'data.apiError == true'
        fetchData:
          condition: 'true'

    success:
      action:
        - name: displayData
      transitions:
        bye:
          condition: 'true'

    error:
      action:
        - name: showError
        - name: offerRetry
      transitions:
        fetchData:
          condition: 'intent == "retryFetch"'
        bye:
          condition: 'true'

    bye:
      end: true

  actions:
    showLoading:
      type: text
      options:
        text: "Loading data, please wait..."

    callApi:
      type: api
      options:
        method: GET
        uri: $(config.apiUrl)/data
        headers:
          Authorization: "Bearer $(config.apiToken)"
        mapping:
          data:
            apiSuccess: $(result.response.status == 200)
            apiError: $(result.response.status >= 400)
            apiData: $(result.response.body)
            errorMessage: $(result.response.status >= 400 ? result.response.body.message : null)

    handleSuccess:
      type: text
      condition: 'data.apiSuccess == true'
      options:
        text: "Data retrieved successfully!"

    handleError:
      type: text
      condition: 'data.apiError == true'
      options:
        text: "Failed to retrieve data: $(data.errorMessage)"

    displayData:
      type: text
      options:
        text: "Here's your data: $(data.apiData)"

    showError:
      type: text
      options:
        text: "An error occurred. Would you like to try again?"

    offerRetry:
      type: template
      options:
        body: "Choose an action:"
        buttons:
          - type: postback
            label: "Retry"
            payload:
              action: "retry"
          - type: postback
            label: "Cancel"
            payload:
              action: "cancel"

# ============================================================================
# PATTERN 4: CONFIRMATION FLOW
# Use case: Ask for confirmation before critical action
# ============================================================================

confirmationFlowExample:
  intents:
    initiateDelete:
      priority: 5
      type: data
      condition: 'payload.action == "delete"'

    confirmYes:
      priority: 3
      type: data
      condition: 'payload.confirm == "yes"'

    confirmNo:
      priority: 3
      type: data
      condition: 'payload.confirm == "no"'

  states:
    askConfirmation:
      intents:
        - initiateDelete
      action:
        - name: confirmationPrompt
      transitions:
        confirmed:
          condition: 'intent == "confirmYes"'
        cancelled:
          condition: 'intent == "confirmNo"'

    confirmed:
      action:
        - name: performDelete
        - name: deleteSuccess
      transitions:
        bye:
          condition: 'true'

    cancelled:
      action:
        - name: cancelMessage
      transitions:
        bye:
          condition: 'true'

    bye:
      end: true

  actions:
    confirmationPrompt:
      type: template
      options:
        body: "Are you sure you want to delete this item? This action cannot be undone."
        buttons:
          - type: postback
            label: "Yes, Delete"
            payload:
              confirm: "yes"
          - type: postback
            label: "No, Cancel"
            payload:
              confirm: "no"

    performDelete:
      type: api
      options:
        method: DELETE
        uri: $(config.apiUrl)/items/$(data.itemId)
        mapping:
          data:
            deleteSuccess: $(result.response.status == 204)

    deleteSuccess:
      type: text
      options:
        text: "Item deleted successfully."

    cancelMessage:
      type: text
      options:
        text: "Delete cancelled. Your item is safe."

# ============================================================================
# PATTERN 5: SCHEDULER WITH TIMEOUT
# Use case: Timeout user if no response after N minutes
# ============================================================================

schedulerTimeoutExample:
  intents:
    startSession:
      priority: 5
      type: text
      condition: 'content.toLowerCase() == "start"'

    userResponse:
      priority: 10
      type: text
      condition: 'context.awaitingResponse == true'

    scheduleRunTimeout:
      priority: 1
      type: command
      condition: 'content == "scheduleRunTimeout"'

  states:
    start:
      intents:
        - startSession
      action:
        - name: welcomeMessage
        - name: askQuestion
        - name: startTimeoutScheduler
      transitions:
        awaitingResponse:
          condition: 'true'

    awaitingResponse:
      intents:
        - userResponse
      action:
        - name: cancelTimeoutScheduler
        - name: processResponse
      transitions:
        completed:
          condition: 'true'

    completed:
      action:
        - name: thankYou
      transitions:
        bye:
          condition: 'true'

    # Float state - catches timeout from anywhere
    timeout:
      float: true
      condition: 'intent == "scheduleRunTimeout"'
      intents:
        - scheduleRunTimeout
      action:
        - name: timeoutMessage
        - name: cancelTimeoutScheduler
      transitions:
        bye:
          condition: 'true'

    bye:
      end: true

  actions:
    welcomeMessage:
      type: text
      options:
        text: "Welcome! I have a question for you."

    askQuestion:
      type: text
      options:
        text: "What is your favorite color? (You have 5 minutes to respond)"

    startTimeoutScheduler:
      type: api
      options:
        method: POST
        uri: $(config.schedulerUrl)
        body:
          scheduleId: timeout_$(metadata.sessionId)
          userId: $(metadata.userId)
          botId: $(config.botId)
          channelId: $(metadata.channelId)
          timeInMinutes: 5
          command: scheduleRunTimeout
        mapping:
          context:
            timeoutScheduled: true

    cancelTimeoutScheduler:
      type: api
      options:
        method: DELETE
        uri: $(config.schedulerUrl)/timeout_$(metadata.sessionId)
        mapping:
          context:
            timeoutScheduled: false

    processResponse:
      type: text
      options:
        text: "Thanks for your response: $(context.userResponse)"

    timeoutMessage:
      type: text
      options:
        text: "Sorry, you didn't respond in time. Session ended."

    thankYou:
      type: text
      options:
        text: "Thank you for completing the session!"

# ============================================================================
# PATTERN 6: MULTI-STEP API WORKFLOW
# Use case: Chain multiple API calls with dependencies
# ============================================================================

multiStepApiExample:
  states:
    processOrder:
      action:
        - name: step1_validateUser
        - name: step1_success
        - name: step2_checkInventory
        - name: step2_success
        - name: step3_createPayment
        - name: step3_success
        - name: showError
      transitions:
        success:
          condition: 'data.allStepsSuccess == true'
        error:
          condition: 'data.hasError == true'

    success:
      action:
        - name: successMessage
      transitions:
        bye:
          condition: 'true'

    error:
      action:
        - name: errorMessage
      transitions:
        bye:
          condition: 'true'

    bye:
      end: true

  actions:
    # Step 1: Validate user
    step1_validateUser:
      type: api
      options:
        method: GET
        uri: $(config.apiUrl)/users/$(context.userId)
        headers:
          Authorization: "Bearer $(config.apiToken)"
        mapping:
          data:
            step1_success: $(result.response.status == 200)
            userValid: $(result.response.status == 200)
            hasError: $(result.response.status >= 400)
            errorStep: $(result.response.status >= 400 ? "validate_user" : null)

    step1_success:
      type: text
      condition: 'data.step1_success == true'
      options:
        text: "User validated successfully."

    # Step 2: Check inventory (only if step 1 succeeded)
    step2_checkInventory:
      type: api
      condition: 'data.step1_success == true'
      options:
        method: POST
        uri: $(config.apiUrl)/inventory/check
        headers:
          Authorization: "Bearer $(config.apiToken)"
        body:
          product_id: $(data.productId)
          quantity: $(data.quantity)
        mapping:
          data:
            step2_success: $(result.response.status == 200 && result.response.body.available == true)
            inStock: $(result.response.body.available)
            hasError: $(result.response.status >= 400 || result.response.body.available == false)
            errorStep: $(result.response.status >= 400 || result.response.body.available == false ? "check_inventory" : null)

    step2_success:
      type: text
      condition: 'data.step2_success == true'
      options:
        text: "Inventory checked. Item is available."

    # Step 3: Create payment (only if steps 1 & 2 succeeded)
    step3_createPayment:
      type: api
      condition: 'data.step1_success == true && data.step2_success == true'
      options:
        method: POST
        uri: $(config.apiUrl)/payments
        headers:
          Authorization: "Bearer $(config.apiToken)"
        body:
          user_id: $(context.userId)
          product_id: $(data.productId)
          quantity: $(data.quantity)
          amount: $(data.totalAmount)
        mapping:
          data:
            step3_success: $(result.response.status == 201)
            paymentId: $(result.response.body.payment_id)
            paymentUrl: $(result.response.body.payment_url)
            allStepsSuccess: $(result.response.status == 201)
            hasError: $(result.response.status >= 400)
            errorStep: $(result.response.status >= 400 ? "create_payment" : null)

    step3_success:
      type: text
      condition: 'data.step3_success == true'
      options:
        text: "Payment created successfully!"

    showError:
      type: text
      condition: 'data.hasError == true'
      options:
        text: "Error occurred at step: $(data.errorStep)"

    successMessage:
      type: text
      options:
        text: |
          Order completed successfully!
          Payment ID: $(data.paymentId)
          Payment URL: $(data.paymentUrl)

    errorMessage:
      type: text
      options:
        text: "Sorry, we couldn't process your order. Please try again."

# ============================================================================
# PATTERN 7: FALLBACK WITH RETRY COUNTER
# Use case: Limit fallback attempts, then escalate
# ============================================================================

fallbackRetryExample:
  intents:
    fallbackIntent:
      priority: 99
      type: text
      fallback: true
      condition: 'true'
      attributes:
        context:
          fallbackCount: $(context.fallbackCount ? context.fallbackCount + 1 : 1)

  states:
    fallback:
      intents:
        - fallbackIntent
      action:
        - name: fallbackFirst
        - name: fallbackSecond
        - name: fallbackThird
        - name: escalateToHuman
      transitions:
        mainMenu:
          condition: 'context.fallbackCount < 3'
        escalate:
          condition: 'context.fallbackCount >= 3'

    mainMenu:
      action:
        - name: showMenu
      transitions:
        bye:
          condition: 'true'

    escalate:
      action:
        - name: escalationMessage
      transitions:
        bye:
          condition: 'true'

    bye:
      end: true

  actions:
    fallbackFirst:
      type: text
      condition: 'context.fallbackCount == 1'
      options:
        text: "I didn't understand that. Could you please rephrase?"

    fallbackSecond:
      type: text
      condition: 'context.fallbackCount == 2'
      options:
        text: "I'm still not sure what you mean. Let me show you the menu."

    fallbackThird:
      type: text
      condition: 'context.fallbackCount >= 3'
      options:
        text: "I'm having trouble understanding. Let me connect you with a human agent."

    escalateToHuman:
      type: api
      condition: 'context.fallbackCount >= 3'
      options:
        method: POST
        uri: $(config.apiUrl)/escalate
        body:
          user_id: $(context.userId)
          conversation_id: $(metadata.sessionId)
          reason: "fallback_limit_reached"

    showMenu:
      type: template
      options:
        body: "Here are your options:"
        buttons:
          - type: postback
            label: "Option 1"
          - type: postback
            label: "Option 2"

    escalationMessage:
      type: text
      options:
        text: "A human agent will contact you shortly. Thank you for your patience."

# ============================================================================
# PATTERN 8: CONDITIONAL ROUTING BASED ON CONTEXT
# Use case: Different flows for different user types
# ============================================================================

conditionalRoutingExample:
  states:
    router:
      initial: true
      action:
        - name: checkUserType
      transitions:
        premiumFlow:
          condition: 'context.userType == "premium"'
        freeFlow:
          condition: 'context.userType == "free"'
        guestFlow:
          condition: 'typeof context.userType == "undefined"'

    premiumFlow:
      action:
        - name: premiumWelcome
      transitions:
        bye:
          condition: 'true'

    freeFlow:
      action:
        - name: freeWelcome
        - name: upgradeOffer
      transitions:
        bye:
          condition: 'true'

    guestFlow:
      action:
        - name: guestWelcome
        - name: loginPrompt
      transitions:
        bye:
          condition: 'true'

    bye:
      end: true

  actions:
    checkUserType:
      type: method
      method: getUserType

    premiumWelcome:
      type: text
      options:
        text: "Welcome back, Premium Member! You have access to all features."

    freeWelcome:
      type: text
      options:
        text: "Welcome back, Free User! You have limited access."

    upgradeOffer:
      type: template
      options:
        body: "Upgrade to Premium for unlimited access!"
        buttons:
          - type: postback
            label: "Upgrade Now"
            payload:
              action: "upgrade"

    guestWelcome:
      type: text
      options:
        text: "Welcome, Guest! Please login to continue."

    loginPrompt:
      type: template
      options:
        body: "Get started:"
        buttons:
          - type: postback
            label: "Login"
            payload:
              action: "login"
          - type: postback
            label: "Sign Up"
            payload:
              action: "signup"
