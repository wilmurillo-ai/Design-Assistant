# 配置文件示例
# 复制此文件为 config.ini 并填写你的配置

[tos]
# 火山引擎TOS Access Key
ak = 
# 火山引擎TOS Secret Key
sk = 
# TOS区域，例如 cn-beijing
region = cn-beijing
# TOS存储桶名称
bucket = 
# TOS存储桶域名，例如 your-bucket.tos-cn-beijing.volces.com
bucket_domain = 

[asr]
# 火山引擎语音识别 App Key
app_key = 
# 火山引擎语音识别 Access Key
access_key = 
