  /api/v1/env/create:
    post:
      summary: 创建环境
      deprecated: false
      description: 创建环境，支持配置环境的名称、备注、分组和代理信息。创建成功后返回环境ID
      tags:
        - 环境管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                containerName:
                  description: 命名环境，限制60字以内
                  type: string
                remark:
                  description: 环境备注信息
                  type: string
                tagName:
                  description: 指定环境所属分组的名称。若分组名称不存在，将默认环境未分组。
                  type: string
                cookie:
                  description: 支持JSON格式的cookie
                  type: string
                asDynamicType:
                  description: IP变更提醒；1-静态 ，2-动态
                  type: integer
                proxyTypeName:
                  type: string
                  description: >-
                    1、自定义代理类型：HTTP、HTTPS、SSH、Socks5、Oxylabsauto、Lumauto_HTTP
                    、Lumauto_HTTPS 、Luminati_HTTP、Luminati_HTTPS、
                    smartproxy、Iphtml_HTTP、Iphtml_Socks5、IPIDEA、不使用代理             
                    2、API提取代理类型：  Socks5_ROLA_IP、HTTPS_ROLA_IP、
                    Socks5_922S5、HTTP_922S5、HTTPS_922S5、
                    Socks5_通用api、HTTP_通用api、HTTPS_通用api、Socks5_IPIDEA-API、HTTP_IPIDEA-API、HTTPS_IPIDEA-API
                ipGetRuleType:
                  description: IP提取方式，1-IP失效时提取新IP ，2-，每次打开环境时提取新IP。API提取代理时必填
                  type: integer
                linkCode:
                  description: 提取链接。API提取代理时必填
                  type: string
                proxyServer:
                  description: 代理主机，自定义代理时必填
                  type: string
                proxyPort:
                  description: 代理端口，自定义代理时必填
                  type: integer
                proxyAccount:
                  description: 代理帐号
                  type: string
                proxyPassword:
                  description: 代理密码
                  type: string
                referenceCountryCode:
                  description: 环境内帐号需要登录的指定的国家。Oxylabsauto、Lumauto、Smartproxy必须填写国家或者IP
                  type: string
                referenceIp:
                  description: >-
                    将根据IP自动填充环境内帐号需要登录的指定的国家。Oxylabsauto、Lumauto、Smartproxy必须填写国家或者IP
                  type: string
                referenceCity:
                  description: 参考城市
                  type: string
                referenceRegionCode:
                  description: 参考州
                  type: string
                ipDatabaseChannel:
                  description: >-
                    代理查询渠道，当用户未指定时使用全局默认值。支持设置查询渠道选项，1-IP2Location   2-DB-IP  
                    3-MaxMind
                  type: integer
                ipProtocolType:
                  description: >-
                    IP协议选项，支持设置IP协议，新环境默认使用速度优先                                                                           
                    1.速度优先  2.IPv4  3.IPv6
                  type: integer
                type:
                  description: 操作系统参数：windows、android、ios、macos（不传参数默认windows）
                  type: string
                phoneModel:
                  description: >-
                    type选择Android和IOS时，机型必填。机型参数包括：“google Pixel
                    4、红米8、红米7、google Pixel 5a、三星Galaxy Note8、小米10、三星Galaxy
                    S9+、小米9、iPhone 6 Plus、iPhone 8 Plus、iPhone SE 2、iPhone 7
                    Plus、iPhone X、iPhone13 Pro、iPhone XS、iPhone 13 Pro
                    Max、iPhone 12 mini、iPhone 8、iPhone 13 mini、iPhone 6、iPhone
                    12 Pro Max、iPhone 7、iPhone 12 、iPhone 12 Pro、iPhone 11
                    Pro、iPhone 13、iPhone 14、iPhone 14 Pro、iPhone 14 Pro
                    Max、iPhone 15、iPhone 15 Pro、iPhone 15 Pro Max、google Pixel
                    6、google Pixel 6a、google Pixel 6 Pro、google Pixel 7、google
                    Pixel 7 Pro、google Pixel 7a、google Pixel 8、google Pixel 8
                    Pro、google Pixel 8a、Samsung Galaxy S20、Samsung Galaxy S20
                    +、Samsung Galaxy S21、Samsung Galaxy S21 +、Samsung Galaxy S21
                    Ultra、Samsung Galaxy S22、Samsung Galaxy S22 +、Samsung Galaxy
                    S22 Ultra ””
                  type: string
                browser:
                  description: 非必填，可以填firefox/chrome，不填默认创建谷歌环境，
                  type: string
                coreVersion:
                  description: 内核版本号，支持100~126。用selenium时，可以根据这个字段来判断驱动chromedriver的版本号。
                  type: integer
                videoThrottle:
                  description: 视频限流 0关闭 1开启 2跟随团队。不传参默认跟随团队。
                  type: integer
                imgThrottle:
                  description: 图片限流 0关闭 1自定义 2跟随团队。不传参默认跟随团队。
                  type: integer
                imgThrottleSize:
                  description: 图片尺寸大小
                  type: integer
                advancedBo:
                  type: object
                  properties:
                    uaVersion:
                      description: ua版本
                      type: string
                    ua:
                      description: >-
                        自定义UA要求传参格式符合标准。举例：Mozilla/5.0 (Windows NT 10.0; WOW64)
                        AppleWebKit/537.36 (KHTML, like Gecko)
                        Chrome/101.0.4951.67 Safari/537.36
                      type: string
                    languageType:
                      description: 界面语言类型。0-跟随IP，1-自定义，2-跟随电脑
                      type: integer
                    languages:
                      type: array
                      items:
                        type: string
                      description: 默认使用第一个传入的语言作为渲染语言
                    gmt:
                      description: timezone时区，不传参默认使用系统默认。自定义时格式举例：GMT-12:00
                      type: string
                    geography:
                      description: timezone地理，不传参默认使用系统默认。自定义时格式举例： Etc/GMT + 12
                      type: string
                    geoTips:
                      description: 网站请求获取您当前地理位置时的选择，0-ask（询问）、2-block（禁止）
                      type: integer
                    geoRule:
                      description: Geolocation地理位置规则。不传参默认使用系统默认。0-基于IP生成对应位置，1-使用自定义设置的位置
                      type: integer
                    longitude:
                      description: 地理位置自定义时必填，格式如“-40.123”（范围-180到180）
                      type: string
                    latitude:
                      description: 地理位置自定义时必填，格式如“30.123”（范围-90到90）
                      type: string
                    radius:
                      description: 地理位置自定义时必填，，格式如“10“（范围10-5000）
                      type: string
                    height:
                      description: 分辨率-高，type为Android或IOS时，不支持设置分辨率。分辨率高、宽都传-1时，分辨率随机
                      type: string
                    width:
                      description: 分辨率-宽，type为Android或IOS时，不支持设置分辨。分辨率高、宽都传-1时，分辨率随机
                      type: string
                    fontsType:
                      description: 字体列表保护，0-隐私，1-真实
                      type: integer
                    fonts:
                      type: array
                      items:
                        type: string
                      description: 按照字体的英文传入（编辑环境时，请将所有的字体传入。若传入的字体过少，可能会导致网页数据显示不全）
                    fontFingerprint:
                      description: 字体指纹，0-开启ClientRects隐私保护，1-使用电脑默认的ClientRects
                      type: integer
                    webRtc:
                      description: >-
                        0-开启WebRTC，但禁止获取IP，1-开启WebRTC，将公网IP替换为代理IP，2-开启WebRTC，跟随电脑真实IP，3-禁用WebRTC，网站会检测到您关闭了WebRTC，4-转发WebRTC，将公网IP替换为代理IP
                      type: integer
                    webRtcLocalIp:
                      description: >-
                        内网IP。10.0.0.0/8；10.0.0.0 -
                        10.255.255.255；172.16.0.0/12；172.16.0.0 -
                        172.31.255.255；192.168.0.0/16；192.168.0.0 -
                        192.168.255.255
                      type: string
                    canvas:
                      description: 0-开启Canvas隐私保护，1-跟随电脑的Canvas
                      type: integer
                    webgl:
                      description: 0-开启WebGL隐私保护，1-跟随电脑的WebGL
                      type: integer
                    hardwareAcceleration:
                      description: 0-关闭硬件加速，1-开启硬件加速
                      type: integer
                    webglInfo:
                      description: >-
                        开启硬件加速时可传参，不传参默认使用系统默认。0-webglvendor和webglRenderer信息将根据ua进行匹配，1-跟随电脑的WebGL
                        Info
                      type: integer
                    audioContext:
                      description: 0-开启AudioContext隐私保护，1-跟随电脑的AudioContext
                      type: integer
                    speechVoices:
                      description: 0-开启SpeechVoices，1-关闭SpeechVoicess
                      type: integer
                    media:
                      description: 0-开启媒体设备隐私保护，1-使用Chrome原生隐私保护（不授权则不会暴露真实媒体设备数量）
                      type: integer
                    cpu:
                      description: 2,4,6,8，10,12,16,0（0代表真实）
                      type: integer
                    memory:
                      description: 2,4,6,8,0（0代表真实）
                      type: integer
                    doNotTrack:
                      description: 0-默认不设置，1-默认不允许追踪，2-默认允许追踪
                      type: integer
                    battery:
                      description: 0-开启电池隐私保护，1-使用电脑真实的电池信息,2-禁止访问电池信息
                      type: integer
                    portScan:
                      description: 0-不允许网站检测您使用的本地网络端口，1-允许网站检测您使用的本地网络端口
                      type: integer
                    whiteList:
                      type: string
                  description: Hubstudio浏览器高级指纹参数配置
              required:
                - containerName
                - asDynamicType
                - proxyTypeName
            example:
              asDynamicType: '0'
              containerName: 新建环境
              proxyTypeName: 不使用代理
              coreVersion: 112
              advancedBo:
                uaVersion: 112
                uiLanguage: en
                languages:
                  - en
                  - en-US
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                  msg:
                    type: string
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      containerCode:
                        description: 环境ID
                        type: integer
                      coreVersion:
                        description: 环境使用的内核版本，用于匹配对应版本的webdriver
                        type: integer
              example:
                requestId: 8b558e5c5d1c437183c34aa03a09a368
                msg: Success
                code: 0
                data:
                  containerCode: 50591754
                  coreVersion: 100
          headers: {}
      security: []
