  /api/v1/cloud-mobile/upload-file:
    post:
      summary: 公网文件上传文件到云手机
      deprecated: false
      description: 上传文件到云手机
      tags:
        - 云手机/文件管理
      parameters:
        - name: mobileId
          in: query
          description: 云手机ID
          required: false
          schema:
            type: integer
        - name: downloadDest
          in: query
          description: 文件保存地址
          required: true
          example: /Downloads
          schema:
            type: string
        - name: fileName
          in: query
          description: 文件名称
          required: true
          schema:
            type: string
        - name: fileUrl
          in: query
          description: 文件地址
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                downloadDest:
                  type: string
                  description: 如果仅一层目录不存在，将自动创建；如果多层目录不存在，无法自动创建
                  title: 上传至云手机中的目录
                fileUrl:
                  type: string
                  title: 文件地址
                mobileId:
                  type: integer
                  title: 云手机ID
                fileName:
                  type: string
                  title: 文件名称
                  description: 上传后文件叫什么名字
              required:
                - mobileId
            example:
              downloadDest: ''
              fileName: ''
              fileUrl: ''
              mobileId: 0
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    description: 结果码。0表示成功，其余为失败
                    type: string
                  data:
                    description: 业务数据
                    type: boolean
                  msg:
                    description: 结果信息
                    type: string
              example:
                code: ''
                data: true
                msg: ''
          headers: {}
      security: []
  /api/v2/cloud-mobile/upload-file:
    post:
      summary: 选择本地上传文件到云手机
      deprecated: false
      description: 上传文件到云手机
      tags:
        - 云手机/文件管理
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                downloadDest:
                  description: 上传至云手机中的目录，如果仅一层目录不存在，将自动创建；如果多层目录不存在，无法自动创建
                  example: /Download
                  type: string
                fileUrl:
                  format: binary
                  type: string
                  description: 文件地址
                  example: file://C:\Users\Administrator\Desktop\API接口.txt
                mobileId:
                  description: 云手机ID
                  example: '3279080'
                  type: string
                fileName:
                  description: 文件名称，文件上传到云手机的名字，注意包括后缀
                  example: 文件名
                  type: string
              required:
                - fileUrl
                - mobileId
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    description: 结果码。0表示成功，其余为失败
                    type: string
                  data:
                    description: 业务数据
                    type: boolean
                  msg:
                    description: 结果信息
                    type: string
              example:
                code: ''
                data: true
                msg: ''
          headers: {}
      security: []
