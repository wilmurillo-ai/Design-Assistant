  /api/v1/cloud-mobile/app/install:
    post:
      summary: app应用安装
      deprecated: false
      description: |-
        安装指定应用APP
        ```text
        备注：
        1、API安装应用需要手机处于开机状态下才可以安装
        2、暂时无法回传云手机内的APP应用是否安装成功，需在云手机内强刷页面，才能显示
        3、只支持客户端共存的API调用方式使用
        4、每秒只能安装一个应用APP
        ```
      tags:
        - 云手机/应用管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                appVersionId:
                  description: APP版本ID
                  type: string
                isEnablePermission:
                  description: 是否开启应用权限，默认:false
                  type: boolean
                isEnableRoot:
                  description: 是否开启ROOT权限，默认：false
                  type: boolean
                packageName:
                  description: 包名，包名与应用版本号组合使用，如果传appVersionId参数些字段可以不传
                  type: string
                versionCode:
                  description: 应用版本号，包名与应用版本号组合使用，如果传appVersionId参数,该字段可以不传
                  type: string
                mobileId:
                  description: 云手机ID
                  type: integer
              required:
                - mobileId
            example: "{\r\n  \"appVersionId\": \"1895449834868736002\", // APP版本ID\r\n  \"isEnablePermission\": false,   // 是否开启应用权限，默认:false\r\n  \"isEnableRoot\": false, // 是否开启ROOT权限，默认：false\r\n  \"packageName\": \"com.baidu.www\", //包名，包名与应用版本号组合使用，如果传appVersionId参数些字段可以不传\r\n  \"versionCode\": \"2.6.12\", // \t应用版本号，包名与应用版本号组合使用，如果传appVersionId参数,该字段可以不传\r\n  \"mobileId\": 24333 // 云手机ID\r\n}"
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  msg:
                    type: string
                  requestId:
                    type: string
                  timestamp:
                    type: integer
                  data:
                    type: boolean
              example:
                code: 0
                msg: Success
                requestId: 07ece6731a5e4450b9dee2fdb09cb6ee
                timestamp: 1742289013309
                data: true
          headers: {}
      security: []
