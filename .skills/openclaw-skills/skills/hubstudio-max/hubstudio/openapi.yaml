        - 当 siteName 为 "自定义平台" 时，系统会判断此为自定义平台。如果 domainName 相同，则不会新增账号记录。

        - 当 siteName 为官方内置平台名称（如“加拿大亚马逊”）时，系统会判断此为内置平台。需要平台名称 (siteName) 和平台账号
