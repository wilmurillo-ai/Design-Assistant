        content:
          application/json:
            schema:
              type: object
              properties:
                accountName:
                  description: 平台账号
                  type: string
                accountPassword:
                  description: 平台密码
                  type: string
                containerCode:
                  description: 环境编号
                  type: integer
                domainName:
                  description: 自定义平台的域名
                  type: string
                name:
                  description: 自定义账号名称
                  type: string
                otpSecret:
                  description: 2FA密钥
                  type: string
                siteAlias:
                  description: 自定义平台的别名
                  type: string
                siteName:
                  description: 平台名称
                  type: string
              required:
                - accountName
                - siteName
                - accountPassword
                - containerCode
            example: "{\r\n    \"accountName\": \"zhanghao\",  // 平台账号\r\n\r\n    \"accountPassword\": \"password\",  // 平台密码\r\n\r\n    \"containerCode\": 854921712,  // 环境编号\r\n\r\n    \"domainName\": \"https://www.baidu.com\",  // 自定义平台的域名\r\n\r\n    \"name\": \"账号名称\",  // 自定义账号名称\r\n\r\n    \"otpSecret\": \"otpSecret\",  // 2FA密钥\r\n\r\n    \"siteAlias\": \"自定义平台\",  // 自定义平台的别名\r\n\r\n    \"siteName\": \"自定义平台\"  // 平台名称\r\n\r\n}"
      responses:
        '200':
