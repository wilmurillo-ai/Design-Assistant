  /api/v1/cloud-mobile/update-proxy:
    post:
      summary: ' 更新代理'
      deprecated: false
      description: 更新云手机代理
      tags:
        - 云手机
      parameters:
        - name: mobileId
          in: query
          description: 云手机ID
          required: true
          example: 1121
          schema:
            type: integer
        - name: asDynamicType
          in: query
          description: 是否动态（网络设置）。1-静态，2-动态，默认1
          required: false
          example: 1
          schema:
            type: integer
        - name: automaticPositioning
          in: query
          description: 是否自动定位（定位设置）。默认true
          required: false
          example: 'true'
          schema:
            type: boolean
        - name: followIp
          in: query
          description: '跟随ip（时区/语言设置）。默认true '
          required: false
          example: 'true'
          schema:
            type: boolean
        - name: lat
          in: query
          description: 维度（定位设置）
          required: false
          example: 14.222222
          schema:
            type: number
        - name: lng
          in: query
          description: 经度（定位设置）
          required: false
          example: 180.222222
          schema:
            type: number
        - name: proxyTypeId
          in: query
          description: >-
            代理类型（网络设置）。1-HTTP，2-HTTPS，4-Socks5，5-Oxylabsauto，6-Lumauto，7-Luminati，11-smartproxy
          required: true
          example: 4
          schema:
            type: integer
        - name: proxyHost
          in: query
          description: 代理主机地址
          required: true
          example: 192.168.10.1
          schema:
            type: string
        - name: proxyPort
          in: query
          description: 代理端口
          required: true
          example: '8080'
          schema:
            type: string
        - name: proxyAccount
          in: query
          description: 代理账号
          required: false
          example: username
          schema:
            type: string
        - name: proxyPassword
          in: query
          description: 代理密码
          required: false
          example: password
          schema:
            type: string
        - name: referenceCity
          in: query
          description: 参考城市（网络设置）
          required: false
          example: '""'
          schema:
            type: string
        - name: referenceCountryCode
          in: query
          description: 参考国家code（网络设置）
          required: false
          example: '""'
          schema:
            type: string
        - name: referenceRegionCode
          in: query
          description: 参考州code（网络设置）
          required: false
          example: '""'
          schema:
            type: string
        - name: timeZone
          in: query
          description: 时区（时区/语言设置）
          required: false
          example: '""'
          schema:
            type: string
        - name: ysjLanguage
          in: query
          description: 语言（时区/语言设置）
          required: false
          example: en
          schema:
            type: string
        - name: ipDatabaseChannel
          in: query
          description: 代理查询渠道。支持设置查询渠道选项，1-IP2Location 2-DB-IP 3-MaxMind
          required: false
          example: 1
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                asDynamicType:
                  description: 是否动态（网络设置）。1-静态，2-动态，默认1
                  type: integer
                automaticPositioning:
                  description: 是否自动定位（定位设置）。默认true
                  type: boolean
                country:
                  description: 国家code（时区/语言设置）
                  type: string
                dnsStrategy:
                  description: DNS策略（网络设置）。0-跟随IP，1-DNS保护。默认0
                  type: integer
                followIp:
                  description: 跟随ip（时区/语言设置）。默认true
                  type: boolean
                lat:
                  description: 维度（定位设置）
                  type: integer
                lng:
                  description: 经度（定位设置）
                  type: integer
                mobileId:
                  description: 云手机ID
                  type: integer
                proxyAccount:
                  description: 代理账号（网络设置）
                  type: string
                proxyHost:
                  description: 代理主机地址（网络设置）
                  type: string
                proxyPassword:
                  description: 代理密码（网络设置）
                  type: string
                proxyPort:
                  description: 代理端口（网络设置）
                  type: integer
                proxyTypeId:
                  description: >-
                    代理类型（网络设置）。1-HTTP，2-HTTPS，4-Socks5，5-Oxylabsauto，6-Lumauto，7-Luminati，11-smartproxy
                  type: integer
                proxyTypeId2:
                  description: 代理类型2（网络设置）。proxyTypeId = 7时可设置 1-HTTP，2-HTTPS，4-Socks5。默认1
                  type: integer
                referenceCity:
                  description: 参考城市（网络设置）
                  type: string
                referenceCountryCode:
                  description: 参考国家code（网络设置）
                  type: string
                referenceRegionCode:
                  description: 参考州code（网络设置）
                  type: string
                timeZone:
                  description: 时区（时区/语言设置）
                  type: string
                ysjLanguage:
                  description: 语言（时区/语言设置）
                  type: string
                ipDatabaseChannel:
                  type: integer
              required:
                - proxyPort
                - proxyTypeId
                - mobileId
                - proxyHost
            example:
              asDynamicType: 0
              automaticPositioning: true
              country: ''
              dnsStrategy: 0
              followIp: true
              lat: 0
              lng: 0
              mobileId: 0
              proxyAccount: ''
              proxyHost: ''
              proxyPassword: ''
              proxyPort: 0
              proxyTypeId: 0
              proxyTypeId2: 0
              referenceCity: ''
              referenceCountryCode: ''
              referenceRegionCode: ''
              timeZone: ''
              ysjLanguage: ''
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: 结果码。0表示成功，其余为失败
                  data:
                    description: 业务数据
                    type: boolean
                  msg:
                    description: 结果信息
                    type: string
              example:
                code: ''
                data: true
                msg: ''
          headers: {}
      security: []
