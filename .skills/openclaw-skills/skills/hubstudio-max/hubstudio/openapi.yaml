        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type:
                      - string
                      - 'null'
                    description: 结果码。0表示成功，其余表示失败
                  data:
                    type:
                      - object
                      - 'null'
                    properties:
                      list:
                        type:
                          - array
                          - 'null'
                        items:
                          type: object
                          properties:
                            adbStatus:
                              description: ADB状态。0-关闭，1-开启
                              type: integer
                            billingStatus:
                              description: 计费状态。1-正常，2-即将过期，3-已过期
                              type: integer
                            billingType:
                              description: 计费方式：1-按需付费，2-包月
                              type: integer
                            createTime:
                              description: 创建时间
                              type: string
                            expiredTime:
                              description: 过期时间
                              type: string
                            lastPowerOnTime:
                              description: 最后开机时间
                              type: string
                            mobileId:
                              description: 主键
                              type: integer
                            name:
                              description: 手机名称
                              type: string
                            number:
                              description: 序号
                              type: integer
                            proxyTypeId:
                              description: 代理类型id
                              type: integer
                            remark:
                              description: 备注
                              type: string
                            serialNumber:
                              description: 编号
                              type: integer
                            status:
                              description: >-
                                状态。-2-创建失败，-1-初始化状态，0-关机，1-开机使用中，2-设备占用中，3-设备开机未有人使用，4-开机中，5-恢复出厂中，6-重启中
                              type: integer
                            tagId:
                              description: 分组id
                              type: integer
                            tagName:
                              description: 分组
                              type: string
                        description: 返回数组
                      total:
                        type:
                          - integer
                          - 'null'
                        description: 返回数组总数
