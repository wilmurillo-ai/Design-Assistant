        Selenium需要使用到匹配的Webdriver，需更新到应用版本2.4.2及以上版本。返回的debuggingPort参数可用于自动化工具连接。
      tags:
        - 浏览器环境
      parameters:
        - name: Authorization
          in: header
          description: 用户端API使用/服务端API使用      token
          required: false
          example: '{{Authorization}}'
          schema:
            type: string
            default: '{{Authorization}}'
        - name: X-Nonce-Id
          in: header
          description: 用户端API使用     随机
          required: false
          example: '{{X-Nonce-Id}}'
          schema:
            type: string
            default: '{{X-Nonce-Id}}'
        - name: X-Api-Id
          in: header
          description: 用户端API使用     apiId
          required: false
          example: '{{X-Api-Id}}'
          schema:
            type: string
            default: '{{X-Api-Id}}'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                containerCode:
                  description: 环境ID
                  type: string
                isWebDriverReadOnlyMode:
                  description: 是否只读模式，默认false。（true代表只读模式，不会保存cookie等数据）
                  type: boolean
                skipSystemResourceCheck:
                  description: 默认false不跳过系统可用资源检测(仅支持v3.6.0及以上版本)
                  type: boolean
                containerTabs:
                  type: array
                  items:
                    type: string
                  description: 启动url
                cdpHide:
                  description: 是否屏蔽cdp检测，默认false（true代表屏蔽）仅支持ChroBrowser133及以上内核版本
                  type: boolean
                shouldCloseTabsOnOpen:
                  description: >-
                    是否打开历史标签页。需要在客户端 "偏好设置-个人设置-启动环境时" 选项中，选择 "打开上次"，此参数才会生效。当
                    shouldCloseTabsOnOpen 为 true
                    时，会同步服务端的标签页数据到客户端，即打开上次关闭时的标签页。当 shouldCloseTabsOnOpen 为
                    false 时，不会同步服务端的标签页数据，客户端的现有标签页数据不会被覆盖。
                  type: boolean
                pageZoom:
                  description: >-
                    只能传原生支持的比例，原生支持 50%，75%，
                    100%，125%，150%，175%，200%，其它参数不支持，150% 传
                    1.5。此参数仅支持3.46.0及以上版本
                  type: number
                isHeadless:
                  description: >-
                    浏览器无头模式。默认false，设置无头后如无法连接，请使用用"args"参数进行设置:
                    ["--headless=new"]
                  type: boolean
                args:
                  type: array
                  items:
                    type: string
                  description: 启动参数
              required:
                - containerCode
            example: "{\r\n    \"containerCode\": \"223012801\",  // 环境ID\r\n    \"isWebDriverReadOnlyMode\": false,  // 是否只读模式，默认false。（true代表只读模式，不会保存cookie等数据）\r\n    \"skipSystemResourceCheck\":false, // 默认false不跳过系统可用资源检测(仅支持v3.6.0及以上版本)\r\n    \"containerTabs\": [\"https://www.hubstudio.cn/\", \"https://www.baidu.com/\"],  // 启动url\r\n    \"cdpHide\": false, // 是否屏蔽cdp检测，默认false（true代表屏蔽）仅支持ChroBrowser133及以上内核版本\r\n    \"shouldCloseTabsOnOpen\": false, // 是否打开历史标签页。需要在客户端 \"偏好设置-个人设置-启动环境时\" 选项中，选择 \"打开上次\"，此参数才会生效。当 shouldCloseTabsOnOpen 为 true 时，会同步服务端的标签页数据到客户端，即打开上次关闭时的标签页。当 shouldCloseTabsOnOpen 为 false 时，不会同步服务端的标签页数据，客户端的现有标签页数据不会被覆盖。\r\n    \"pageZoom\": 1.5, // 只能传原生支持的比例，原生支持 50%，75%， 100%，125%，150%，175%，200%，其它参数不支持，150% 传 1.5。此参数仅支持3.46.0及以上版本\r\n    \"isHeadless\": false,  // 浏览器无头模式。默认false，设置无头后如无法连接，请使用用\"args\"参数进行设置: [\"--headless=new\"] \r\n    \"args\": [\"--kiosk\"] //启动参数\r\n}"
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                  msg:
                    type: string
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      action:
                        type: string
                      backgroundPluginId:
                        type: string
                      browserID:
                        description: 浏览器id，用于清理缓存接口
                        type: string
                      browserPath:
                        type: string
                      containerCode:
                        type: string
                      containerId:
                        type: integer
                      debuggingPort:
                        description: 浏览器调试端口，用于自动化工具连接
                        type: integer
                      downloadPath:
                        type: string
                      duplicate:
                        type: integer
                      err:
                        type: string
                      ip:
                        type: string
                      isDynamicIp:
                        type: boolean
                      launcherPage:
                        type: string
                      proxyType:
                        type: string
                      requestId:
                        type: string
                      runMode:
                        type: string
                      statusCode:
                        type: integer
                      webdriver:
                        description: 根据当前打开环境的内核返回对应内核webdriver驱动路径
                        type: string
                      accountId:
                        type: 'null'
                      proxyTag:
                        type: string
                      reportPluginId:
                        type: string
              example:
                requestId: 48e54351-2bcc-42e0-945c-1866aa9a17f0
                msg: Success
                code: 0
                data:
                  action: startBrowserByCode
                  backgroundPluginId: hbefgchohflbmmnecchdioangfpcgfjn
                  browserID: 332034
                  browserPath: >-
                    C:\Users\Administrator\AppData\Local\env-kit\Core\chrome_64_130_202411271729\hubstudio
                  containerCode: '11320340'
                  containerId: 332034
                  debuggingPort: '59591'
                  downloadPath: C:\Users\Administrator\Desktop\Hubstudio\万前般清
                  duplicate: 4739
                  err: 成功(Success)
                  ip: 103.136.249.48
                  isDynamicIp: false
                  launcherPage: about:blank
                  proxyType: socks5
                  requestId: 48e54351-2bcc-42e0-945c-1866aa9a17f0
                  runMode: 2
                  statusCode: '0'
                  webdriver: >-
                    C:\Users\Administrator\AppData\Local\env-kit\Core\chrome_64_130_202411271729\webdriver.exe
          headers: {}
      security: []
