                  type: integer
                  description: 查询ADB状态。1-开启 0-关闭
                current:
                  type: integer
                  description: 分页第x页偏移量。默认为1
                mobileIds:
                  type: array
                  items:
                    type: string
                  description: 手机ids
                name:
                  type: string
                  description: 云手机名称
                size:
                  type: integer
                  description: 分页条数。默认10，最多200条
                state:
                  type: boolean
                  description: 云手机状态，true-开机，false-关机
