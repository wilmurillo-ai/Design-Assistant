interface:
  display_name: "Deyo"
  short_description: "使用已安装的 deyo 命令发起链接转写，并在执行过程中向用户同步任务进度"
  default_prompt: "Use the deyo skill to install, configure, or run the published deyo transcription CLI, and keep the user updated on task progress."

# Claude Code 通过 ~/.claude/skills/<name>/SKILL.md 加载 skill。
# 本文件用于与 deyo/agents/openai.yaml 保持平行结构，记录 Claude 侧的元信息。
claude_code:
  skill_id: "deyo"
  skill_path: "~/.claude/skills/deyo/SKILL.md"
  invocation:
    # Claude Code 主要靠 SKILL.md 的 frontmatter description 触发，
    # 用户也可以通过 /deyo 直接显式调用。
    slash_command: "/deyo"
    implicit: true
  required_tools:
    - Bash
  notes:
    - "SKILL.md 的 frontmatter 已符合 Claude Code skill 规范，无需额外转换。"
    - "安装方式：将 deyo/ 目录复制或软链到 ~/.claude/skills/deyo/。"
    - "若希望全项目共享，也可以放到项目内的 .claude/skills/deyo/。"

policy:
  allow_implicit_invocation: true
