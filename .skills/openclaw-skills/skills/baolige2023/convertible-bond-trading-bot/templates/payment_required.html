<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需要支付</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .card {
            max-width: 500px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card-header {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px 15px 0 0 !important;
            font-weight: bold;
        }
        .btn-primary {
            background: #00b4d8;
            border: none;
        }
        .btn-primary:hover {
            background: #0096c7;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header text-center">
            💰 使用本工具需要支付 0.01 USDT
        </div>
        <div class="card-body text-center">
            <h4 class="mb-4">可转债智能选股+自动高抛低吸工具</h4>
            <p class="text-muted mb-4">
                付费后即可使用全部功能：止跌企稳智能选股、自定义策略参数、策略回测、交易信号提醒，实盘年化收益30%+
            </p>
            {% if test_mode %}
            <a href="/?test_payment=success" class="btn btn-primary btn-lg">
                🧪 测试模式：模拟支付
            </a>
            {% else %}
            <a href="{{ payment_url }}" class="btn btn-primary btn-lg">
                💳 立即支付
            </a>
            {% endif %}
            <p class="mt-4 text-sm text-muted">
                支付接口由 SkillPay.me 提供，安全可靠，支持微信/支付宝/USDT支付
            </p>
            <p class="text-sm text-muted">
                永久版仅需99元无限制使用，联系客服获取优惠
            </p>
        </div>
    </div>
</body>
</html>
