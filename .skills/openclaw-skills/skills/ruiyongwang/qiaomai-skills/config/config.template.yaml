# 荞麦饼 Skills 配置文件模板
# 复制此文件到 ~/.qiaomai/config.yaml 并进行自定义配置

# ============================================================
# 核心配置
# ============================================================

# 应用名称
app:
  name: "荞麦饼 Skills"
  version: "1.0.0"
  debug: false
  log_level: info  # debug, info, warning, error

# ============================================================
# 记忆系统配置 (OctoMemory)
# ============================================================

memory:
  # 后端类型: faiss, chroma, pinecone
  backend: faiss
  
  # FAISS 配置
  faiss:
    index_path: "~/.qiaomai/memory/faiss.index"
    dimension: 768
    nlist: 100
    nprobe: 10
  
  # Chroma 配置
  chroma:
    persist_directory: "~/.qiaomai/memory/chroma"
    collection_name: "qiaomai_memories"
  
  # Pinecone 配置 (需要 API Key)
  pinecone:
    api_key: ""  # 从环境变量 QIAOMAI_PINECONE_API_KEY 读取
    environment: "us-east1-gcp"
    index_name: "qiaomai"

# ============================================================
# 知识图谱配置 (DynamicKG)
# ============================================================

knowledge_graph:
  # 后端类型: networkx, neo4j
  backend: networkx
  
  # NetworkX 配置
  networkx:
    persist_path: "~/.qiaomai/kg/graph.pkl"
  
  # Neo4j 配置 (需要连接信息)
  neo4j:
    uri: "bolt://localhost:7687"
    user: "neo4j"
    password: ""  # 从环境变量 QIAOMAI_NEO4J_PASSWORD 读取

# ============================================================
# 数据库配置
# ============================================================

database:
  # 后端类型: sqlite, postgresql
  backend: sqlite
  
  # SQLite 配置
  sqlite:
    path: "~/.qiaomai/data/qiaomai.db"
  
  # PostgreSQL 配置
  postgresql:
    host: "localhost"
    port: 5432
    database: "qiaomai"
    user: "qiaomai"
    password: ""  # 从环境变量 QIAOMAI_DB_PASSWORD 读取

# ============================================================
# 缓存配置
# ============================================================

cache:
  # 后端类型: memory, redis
  backend: memory
  
  # Memory 配置
  memory:
    max_size: 1000
    ttl: 3600  # 秒
  
  # Redis 配置
  redis:
    host: "localhost"
    port: 6379
    db: 0
    password: ""  # 从环境变量 QIAOMAI_REDIS_PASSWORD 读取

# ============================================================
# 执行引擎配置
# ============================================================

executor:
  # 自适应执行
  adaptive: true
  
  # 预测性执行
  predictive: true
  
  # 最大并发数
  max_concurrency: 100
  
  # 超时设置 (秒)
  timeout: 30

# ============================================================
# 报告系统配置
# ============================================================

report:
  # 默认输出格式: markdown, pdf, html, docx, xlsx
  default_format: markdown
  
  # 模板目录
  template_dir: "~/.qiaomai/templates"
  
  # 输出目录
  output_dir: "~/.qiaomai/reports"

# ============================================================
# 类案检索配置
# ============================================================

case_search:
  # 语义检索权重 (0-1)
  semantic_weight: 0.7
  
  # 规则检索权重 (0-1)
  rule_weight: 0.3
  
  # 返回结果数量
  top_k: 10
  
  # 相似度阈值
  similarity_threshold: 0.8

# ============================================================
# 可视化配置
# ============================================================

visualization:
  # 默认主题: light, dark, auto
  theme: auto
  
  # 图表宽度
  width: 1200
  
  # 图表高度
  height: 800
  
  # 3D 知识空间
  enable_3d: true

# ============================================================
# 外部服务配置 (可选)
# ============================================================

# OpenAI API (用于增强功能)
openai:
  api_key: ""  # 从环境变量 OPENAI_API_KEY 读取
  model: "gpt-4"
  temperature: 0.7

# Perplexity API (用于搜索)
perplexity:
  api_key: ""  # 从环境变量 PERPLEXITY_API_KEY 读取
  model: "sonar"

# Grok API (用于实时数据)
grok:
  api_key: ""  # 从环境变量 GROK_API_KEY 读取
  model: "grok-2"

# ============================================================
# 环境变量映射
# ============================================================
# 以下环境变量会覆盖配置文件中的对应值:
#
# QIAOMAI_MEMORY_BACKEND    -> memory.backend
# QIAOMAI_KG_BACKEND        -> knowledge_graph.backend
# QIAOMAI_DB_BACKEND        -> database.backend
# QIAOMAI_CACHE_BACKEND     -> cache.backend
# QIAOMAI_LOG_LEVEL         -> app.log_level
# QIAOMAI_DEBUG             -> app.debug
#
# QIAOMAI_PINECONE_API_KEY  -> memory.pinecone.api_key
# QIAOMAI_NEO4J_PASSWORD    -> knowledge_graph.neo4j.password
# QIAOMAI_DB_PASSWORD       -> database.postgresql.password
# QIAOMAI_REDIS_PASSWORD    -> cache.redis.password
#
# OPENAI_API_KEY            -> openai.api_key
# PERPLEXITY_API_KEY        -> perplexity.api_key
# GROK_API_KEY              -> grok.api_key
# ============================================================
