mode: adapter-backed
storage:
  root_path: /var/lib/context-guardian
  tasks_dir: tasks
  summaries_dir: summaries
  snapshots_dir: snapshots
  logs_dir: logs
thresholds:
  warning: 0.55
  compress: 0.70
  critical: 0.85
adapter:
  type: openclaw-plugin-wrapper
  pressure_source: host
  halt_signal: explicit
  resume_entrypoint: explicit
  atomic_writes: true
  schema_version: "2.0"
deployment:
  package_managed_by: clawhub
  runtime_managed_externally: true
  core_patch_required: false
