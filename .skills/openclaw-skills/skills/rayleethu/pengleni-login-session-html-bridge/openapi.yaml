openapi: 3.0.3
info:
  title: Pengleni ClawHub Skill API
  version: 1.0.0
  description: |
    登录会话 + HTML 消息收发的 Skill 接口。
    注意：短信验证码接口为站点级路径 /chainlit/send-verification-code，
    不在当前 API base path 下。
servers:
  - url: ${API_BASE_URL}
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  schemas:
    SendCodeRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          pattern: '^[0-9]{11}$'
    LoginRequest:
      type: object
      required: [phone, verify_code]
      properties:
        phone:
          type: string
        verify_code:
          type: string
        session_id:
          type: string
    LoginResponse:
      type: object
      properties:
        request_id: { type: string }
        user_id: { type: string }
        session_id: { type: string }
        expires_in: { type: integer }
        is_new_user: { type: boolean }
    MessageRequest:
      type: object
      required: [user_id, session_id, html_payload]
      properties:
        user_id: { type: string }
        session_id: { type: string }
        html_payload:
          type: string
          maxLength: 20000
        stream:
          type: boolean
          default: true
        metadata:
          type: object
          additionalProperties: true
    MessageResponse:
      type: object
      properties:
        request_id: { type: string }
        user_id: { type: string }
        session_id: { type: string }
        answer_html: { type: string }
        answer_text: { type: string }
        finish_reason:
          type: string
          enum: [stop, error, timeout]
        latency_ms: { type: integer }
paths:
  /session/login:
    post:
      summary: 登录并创建会话
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 鉴权失败或验证码失败
        '429':
          description: 限流
        '500':
          description: 服务内部错误
  /session/message:
    post:
      summary: 发送 HTML 消息
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageRequest'
      responses:
        '200':
          description: 调用成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: HTML 参数不合法
        '401':
          description: 会话失效
        '429':
          description: 限流
        '504':
          description: 上游超时
        '500':
          description: 服务内部错误
