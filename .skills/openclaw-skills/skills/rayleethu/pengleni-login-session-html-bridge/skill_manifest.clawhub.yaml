skill:
  id: pengleni-login-session-html-bridge
  name: Login Session HTML Bridge
  version: 1.0.0
  status: ready_for_publish
  owner: pengleni
  category: assistant
  tags:
    - makeup
    - openclaw
    - login-session
    - html-bridge

display:
  title: 登录会话 HTML 桥接
  short_description: 复用登录与会话机制，支持 OpenClaw 调用智能体能力。
  long_description: |
    该 Skill 通过手机号验证码登录，建立用户会话后，提交 HTML 消息并返回智能体回答。
    默认采用非流式输出，满足 OpenClaw 当前接入需求；支持可选流式能力。
  icon: ""
  language: zh-CN

capabilities:
  requires_streaming: false
  supports_streaming: true
  default_streaming: false
  auth_mode: bearer_service_token
  content_types:
    input:
      - application/json
      - text/html
    output:
      - application/json
      - text/html

deployment:
  base_url: ${API_BASE_URL}
  timeout_ms: 30000
  retry:
    max_attempts: 2
    backoff_ms: 500

auth:
  header: Authorization
  scheme: Bearer
  token_env: CLAWHUB_SKILL_TOKEN

entrypoints:
  - name: login_session
    method: POST
    path: /session/login
    required: true
    description: 登录并建立会话
  - name: send_html_message
    method: POST
    path: /session/message
    required: true
    description: 提交 HTML 消息并获取回复

auxiliary_endpoints:
  - name: send_verification_code
    method: POST
    url: ${SITE_BASE_URL}/chainlit/send-verification-code
    required: true
    description: 发送短信验证码（站点级接口，不在 /api/v1/clawhub 下）

input_schema:
  required:
    - phone
    - verify_code
    - html_payload
  properties:
    phone:
      type: string
      pattern: '^[0-9]{11}$'
      description: 手机号
    verify_code:
      type: string
      pattern: '^[0-9]{4,8}$'
      description: 短信验证码
    html_payload:
      type: string
      max_length: 20000
      description: HTML 消息内容
    session_id:
      type: string
      description: 可选，会话 ID，不传则服务端创建
    stream:
      type: boolean
      default: false
      description: 可选流式标记

output_schema:
  properties:
    request_id:
      type: string
    user_id:
      type: string
    session_id:
      type: string
    answer_html:
      type: string
    answer_text:
      type: string
    finish_reason:
      type: string
      enum: [stop, error, timeout]

security:
  html_sanitization:
    mode: whitelist
    allowed_tags: [p, div, span, br, ul, ol, li, strong, em, code, pre, a, img]
    blocked_tags: [script, style, iframe, object, embed, form, input]
    max_payload_bytes: 65536
  session_policy:
    bind_user_and_session: true
    ttl_minutes: 30

error_mapping:
  - code: INVALID_ARGUMENT
    http_status: 400
  - code: INVALID_HTML_PAYLOAD
    http_status: 400
  - code: LOGIN_FAILED
    http_status: 401
  - code: SESSION_EXPIRED
    http_status: 401
  - code: RATE_LIMITED
    http_status: 429
  - code: UPSTREAM_TIMEOUT
    http_status: 504
  - code: INTERNAL_ERROR
    http_status: 500

observability:
  metrics:
    - request_count
    - success_rate
    - p95_latency_ms
    - error_code_distribution
  tracing:
    enabled: true

contact:
  owner_team: pengleni
  email: 19995568071@163.com
