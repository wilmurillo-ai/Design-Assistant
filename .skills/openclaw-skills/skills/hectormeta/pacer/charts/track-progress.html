<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整体进度</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .chart-wrapper {
    position: relative;
    width: 240px;
    height: 240px;
  }
  .center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  .percent-num {
    color: #ffffff;
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    display: block;
  }
  .days-text {
    color: #b0b0b0;
    font-size: 11px;
    margin-top: 6px;
    display: block;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="chart-wrapper">
  <canvas id="progressChart"></canvas>
  <div class="center-text">
    <span class="percent-num" id="percentNum">0%</span>
    <span class="days-text" id="daysText">已在路上 0 天</span>
  </div>
</div>

<script>
  // ============================================================
  // 模板变量说明（AI替换）
  // ============================================================
  // {{percent_done}} → 已完成百分比，整数，如 35
  // {{percent_doing}} → 进行中百分比，整数，如 20
  // {{days_on_road}} → 已在路上天数，整数，如 42

  const percentDone = {{percent_done}};
  const percentDoing = {{percent_doing}};
  const daysOnRoad = {{days_on_road}};
  const percentTodo = Math.max(0, 100 - percentDone - percentDoing);

  document.getElementById('percentNum').textContent = percentDone + '%';
  document.getElementById('daysText').textContent = '已在路上 ' + daysOnRoad + ' 天';

  const ctx = document.getElementById('progressChart').getContext('2d');
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['已完成', '进行中', '未开始'],
      datasets: [{
        data: [percentDone, percentDoing, percentTodo],
        backgroundColor: [
          '#26a69a',
          '#42a5f5',
          'rgba(255,255,255,0.1)'
        ],
        borderColor: [
          '#26a69a',
          '#42a5f5',
          'rgba(255,255,255,0.05)'
        ],
        borderWidth: 1,
        hoverOffset: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      cutout: '75%',
      animation: {
        animateRotate: true,
        duration: 1000,
        easing: 'easeInOutQuart'
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(26,26,46,0.95)',
          titleColor: '#e0e0e0',
          bodyColor: '#b0b0b0',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          callbacks: {
            label: function(context) {
              return context.label + ': ' + context.parsed + '%';
            }
          }
        }
      }
    }
  });
</script>
</body>
</html>
