channel:
  url: https://www.youtube.com/@NateBJones
  uploads_playlist_id: ''
  poll_cron: 5 9 * * *
outputs:
  email:
    enabled: true
    to:
    - richard@saito.tech
    cc: []
  chat:
    enabled: true
    targets:
    - telegram
  doc:
    enabled: false
    type: google-doc
    share_with:
    - richard@saito.tech
