# Copy this file to config.yml and adjust values before running the digest workflow.
channel:
  url: "https://www.youtube.com/@NateBJones"
  uploads_playlist_id: ""  # optional: set if you know the uploads playlist ID (UC...)
  poll_cron: "0 9 * * *"      # run daily at 09:00 local time

outputs:
  email:
    enabled: true
    to:
      - "richard@saito.tech"
    cc: []
  chat:
    enabled: true
    targets:
      - "control-ui"          # options: control-ui, telegram, slack, custom webhook label
  doc:
    enabled: true
    type: "google-doc"        # google-doc | markdown
    share_with:
      - "richard@saito.tech"
    path: "digests/nate-b-jones/{{date}}.md"   # used when type=markdown

transcripts:
  prefer_languages: ["en"]
  whisper_model: "medium"
  keep_audio: false

logging:
  last_video_file: "logs/nate-b-jones-last-video.txt"
  archive_dir: "logs/nate-b-jones-digests"
