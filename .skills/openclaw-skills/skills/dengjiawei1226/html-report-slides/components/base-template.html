<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__REPORT_TITLE__</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0e1a;
    color: #e0e6f0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === SLIDE 基础 === */
  .slide {
    width: 1280px;
    min-height: 720px;
    margin: 40px auto;
    background: linear-gradient(135deg, #0f1629 0%, #1a1f3a 50%, #0f1629 100%);
    border-radius: 20px;
    border: 1px solid rgba(100, 140, 255, 0.15);
    box-shadow: 0 20px 80px rgba(0, 0, 0, 0.5), 0 0 60px rgba(80, 120, 255, 0.08);
    padding: 60px 70px;
    position: relative;
    overflow: hidden;
    page-break-after: always;
  }

  .slide::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -30%;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(80, 120, 255, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* === Cover === */
  .slide-cover {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 600px;
    text-align: center;
  }
  .cover-badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(80,120,255,0.15), rgba(120,80,255,0.15));
    border: 1px solid rgba(80,120,255,0.3);
    border-radius: 30px;
    padding: 8px 24px;
    font-size: 14px;
    font-weight: 500;
    color: #7cacff;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }
  .cover-title {
    font-size: 52px;
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff 0%, #7cacff 50%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.25;
    margin-bottom: 20px;
  }
  .cover-subtitle {
    font-size: 20px;
    color: #8899bb;
    font-weight: 400;
    margin-bottom: 50px;
    max-width: 800px;
    line-height: 1.6;
  }
  .cover-meta {
    display: flex;
    gap: 40px;
    color: #5a6a8a;
    font-size: 14px;
  }

  /* === Slide Header === */
  .slide-header { margin-bottom: 32px; }
  .slide-number {
    font-size: 12px;
    font-weight: 600;
    color: #5070ff;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .slide-title {
    font-size: 34px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
  }
  .slide-title span {
    background: linear-gradient(135deg, #5070ff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .slide-subtitle {
    font-size: 15px;
    color: #8899bb;
    margin-top: 10px;
  }

  /* === Footer === */
  .slide-footer {
    position: absolute;
    bottom: 20px;
    left: 70px;
    right: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #3a4a6a;
    font-size: 11px;
  }

  /* === Print === */
  @media print {
    body { background: #fff; }
    .slide { box-shadow: none; border: 1px solid #ddd; }
  }

  /* === 此处追加组件样式 === */
  /* 可以从 components/ 目录按需复制 */

</style>
</head>
<body>

<!-- SLIDE 1: COVER -->
<div class="slide">
  <div class="slide-cover">
    <div class="cover-badge">__TAGLINE__</div>
    <div class="cover-title">__MAIN_TITLE__</div>
    <div class="cover-subtitle">__SUBTITLE__</div>
    <div class="cover-meta" style="margin-top: 40px;">
      <span>__DATE__</span>
      <span>__DEPT__</span>
      <span>__TOPIC__</span>
    </div>
  </div>
  <div class="slide-footer">
    <span>__BRAND__</span>
    <span>1 / __TOTAL__</span>
  </div>
</div>

<!-- SLIDE 2: 你的内容 -->
<div class="slide">
  <div class="slide-header">
    <div class="slide-number">01 &mdash; __EN_LABEL__</div>
    <div class="slide-title">__PAGE_TITLE__ <span>__HIGHLIGHT__</span></div>
    <div class="slide-subtitle">__PAGE_SUBTITLE__</div>
  </div>

  <!-- 在这里填充组件 -->

  <div class="slide-footer">
    <span>__BRAND__</span>
    <span>2 / __TOTAL__</span>
  </div>
</div>

</body>
</html>
