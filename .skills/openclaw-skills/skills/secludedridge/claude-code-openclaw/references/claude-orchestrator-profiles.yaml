profiles:
  default-safe:
    permission_mode: acceptEdits
    auto_accept_bypass_warning: false
    auto_approve_bash: false
    auto_approve_bash_option: 2
    startup_timeout_s: 30
    idle_timeout_s: 120
    probe_interval_s: 15
    install_hooks: true
    force_single_run: true

  local-bypass:
    permission_mode: bypassPermissions
    auto_accept_bypass_warning: true
    auto_approve_bash: true
    auto_approve_bash_option: 2
    startup_timeout_s: 30
    idle_timeout_s: 120
    probe_interval_s: 15
    install_hooks: true
    force_single_run: true

  alphaclaw-local:
    permission_mode: bypassPermissions
    auto_accept_bypass_warning: true
    auto_approve_bash: true
    auto_approve_bash_option: 2
    startup_timeout_s: 45
    idle_timeout_s: 180
    probe_interval_s: 15
    install_hooks: true
    force_single_run: true

workflows:
  bmad:
    idle_timeout_s: 60
    checkpoint_required: false
    progress_strategy: balanced

  bmad-bmm-create-story:
    expected_story_status: ready-for-dev
    idle_timeout_s: 300
    checkpoint_required: true
    progress_strategy: checkpoint-first
    terminal_story_statuses:
      - ready-for-dev
      - in-progress
      - review
      - done

  bmad-bmm-dev-story:
    expected_story_status: review
    terminal_story_statuses:
      - review
      - done

  bmad-bmm-code-review:
    expected_story_status: review
    terminal_story_statuses:
      - review
      - done
