[project]
name = "xyfcli"
version = "0.1.0"
description = "下单订货 CLI 工具"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28.1",
    "typer>=0.24.1",
]

[project.scripts]
xyfcli = "xyfcli.main:app"

[tool.typer]
run = "xyfcli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["xyfcli"]
