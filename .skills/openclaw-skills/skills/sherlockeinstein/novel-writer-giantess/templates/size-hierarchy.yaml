# 多重大小阶级世界观模板

## 适用场景

女巨人逐步征服全人类，女性越来越巨大、男性越来越微小，形成多重大小族群阶级社会。

---

## 世界观配置

```yaml
world:
  # ===== 大小层级 =====
  tiers:
    - name: 纳米人
      scale: 纳米级（0.1微米以下）
      description: 比细菌还小，寄生于女性身体的微观世界
      power: 无法对任何层级造成伤害
      survival: 依赖女性分泌物维持生命，离开女性身体4小时死亡
      ratio: 全人类缩小后的最底层

    - name: 微人
      scale: 微米级（1-100微米）
      description: 肉眼不可见，需要显微镜观察
      power: 原子级武器对巨人无效
      survival: 依赖巨人环境的残余资源

    - name: 虫人
      scale: 毫米级（0.1-10毫米）
      description: 蚂蚁大小，在巨人的日常环境中挣扎求生
      power: 常规武器对巨人如蚊虫叮咬
      survival: 建立微型文明，但随时可能被巨人无意摧毁

    - name: 小人
      scale: 厘米级（1-30厘米）
      description: 手掌大小，最小的可见人类
      power: 刀剑等冷兵器，对巨人的最强武器也如牙签
      survival: 生活在巨人建筑的缝隙中，随时面临被踩踏的风险

    - name: 普通人
      scale: 正常人类（1.5-2米）
      description: 未受影响或轻微变化的正常体型
      power: 现代武器（枪械、炸弹），但对三阶以上巨人无效
      survival: 面临被更高层级支配的命运

    - name: 巨人
      scale: 10-100米
      description: 第一阶段进化后的女性，通常18-30岁
      power: 轻松碾碎钢铁合金，一脚夷平街区
      survival: 主导社会，普通人完全无法反抗

    - name: 超巨人
      scale: 数百米至数千米
      description: 第二/三阶段进化，城市级体型
      power: 核弹无法造成伤害，一步跨越城市
      survival: 国家级存在，一个小动作就是灾难

    - name: 极巨人
      scale: 数十千米
      description: 第四/五阶段进化，山脉级体型
      power: 大陆级毁灭力，呼吸=飓风，脚步=地震
      survival: 大陆级存在，可俯瞰整个国家

    - name: 女神族
      scale: 百千米以上
      description: 最高进化阶段，星球级体型
      power: 行星级毁灭力，存在本身即是天灾
      survival: 几乎不可挑战，是世界的绝对统治者

  # ===== 阶级体系 =====
  class_system:
    principle: 层级越高权力越大，低层级绝对服从高层级
    hierarchy:
      - 女神族：世界统治者，一切规则由她们制定
      - 极巨人：大陆管理者
      - 超巨人：国家管理者
      - 巨人：城市管理者，日常统治者
      - 普通人：被管理者，自由受限
      - 小人：依附者，无公民权
      - 虫人/微人/纳米人：寄生虫级，不被视为独立生命
    gender_rule: 女性越巨大越强，男性越微小越弱

  # ===== 战力体系 =====
  combat_rules:
    principle: 每个层级对低层级拥有绝对碾压
    defense_scaling: |
      体型越大→防御力指数级增长
      低层级的最强武器无法破防高层级
      层级之间不存在"以弱胜强"的可能
    attack_scaling: |
      体型越大→攻击力指数级增长
      巨人随手一击 = 低层级的灭顶之灾
      高层级对低层级无需刻意攻击，存在本身即是威胁
    examples:
      - 小人的核弹对巨人：无效
      - 巨人可轻松捏扁钢铁合金
      - 超巨人一脚可抹平一座城
      - 极巨人呼吸可吹飞整个城市
      - 女神族的存在改变整个大陆生态

  # ===== 进化/升级规则 =====
  evolution:
    trigger: 未定（可配置为：科技实验/自然突变/特殊物质/基因觉醒等）
    gender_bias: 女性进化概率远高于男性
    stages: 未定（可配置阶段数量和规则）
    irreversible: 进化通常不可逆（可配置例外）

  # ===== 核心矛盾 =====
  core_conflict: 微小者的反抗 vs 巨大者的压迫
  tension_points:
    - 小人试图用智谋对抗绝对的力量差距
    - 利用巨人之间的内部矛盾
    - 穿越不同层级寻找盟友
    - 进化/降级的可能性带来希望和绝望
```

