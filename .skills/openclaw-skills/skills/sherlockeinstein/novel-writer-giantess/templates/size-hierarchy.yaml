## 角色模板

### 女巨人角色卡模板
```yaml
name: [角色名]
gender: 女
age: [年龄]
tier: [层级]
height: [具体身高/体型]
appearance:
  face: [精致/可爱/冷酷/妖艳]
  body: [身材描述，含胸部/腿/臀等]
  clothing: [常穿服装，含高跟鞋/丝袜等]
personality: [性格特征]
abilities: [特殊能力]
relationship: [与其他角色关系]
current_state: [当前状态]
```

