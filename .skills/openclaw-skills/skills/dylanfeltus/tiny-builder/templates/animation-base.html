<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Animation!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            /* CUSTOMIZE: Change background */
            background: linear-gradient(to bottom, #667eea 0%, #764ba2 100%);
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            overflow: hidden;
            min-height: 100vh;
        }
        
        #animation-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 48px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }
        
        /* ============================================
           CUSTOMIZE: Add your animated elements here!
           Examples below show different animation types
           ============================================ */
        
        /* Example 1: Bouncing element */
        .bouncing {
            position: absolute;
            font-size: 60px;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-50px);
            }
        }
        
        /* Example 2: Spinning element */
        .spinning {
            position: absolute;
            font-size: 60px;
            animation: spin 3s linear infinite;
        }
        
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        
        /* Example 3: Floating side to side */
        .floating {
            position: absolute;
            font-size: 60px;
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(100px);
            }
        }
        
        /* Example 4: Fading in and out */
        .fading {
            position: absolute;
            font-size: 60px;
            animation: fade 3s ease-in-out infinite;
        }
        
        @keyframes fade {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        
        /* Example 5: Growing and shrinking */
        .pulsing {
            position: absolute;
            font-size: 60px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }
        
        /* Example 6: Moving in a circle */
        .orbiting {
            position: absolute;
            font-size: 40px;
            animation: orbit 8s linear infinite;
        }
        
        @keyframes orbit {
            from {
                transform: rotate(0deg) translateX(150px) rotate(0deg);
            }
            to {
                transform: rotate(360deg) translateX(150px) rotate(-360deg);
            }
        }
        
        /* Example 7: Sliding across screen */
        .sliding {
            position: absolute;
            font-size: 60px;
            animation: slide 6s linear infinite;
        }
        
        @keyframes slide {
            0% {
                left: -100px;
            }
            100% {
                left: 100%;
            }
        }
        
        /* Example 8: Rainbow color change */
        .rainbow {
            position: absolute;
            font-size: 60px;
            animation: rainbow-color 5s linear infinite;
        }
        
        @keyframes rainbow-color {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="animation-container">
        <!-- CUSTOMIZE: Change the title -->
        <h1 id="title">✨ My Animation! ✨</h1>
        
        <!-- ============================================
             CUSTOMIZE: Add your animated elements here!
             Copy the examples below or create new ones
             ============================================ -->
        
        <!-- Example usage (uncomment and customize): -->
        
        <!-- Bouncing star -->
        <!-- <div class="bouncing" style="top: 50%; left: 20%;">⭐</div> -->
        
        <!-- Spinning sun -->
        <!-- <div class="spinning" style="top: 20%; right: 20%;">☀️</div> -->
        
        <!-- Floating cloud -->
        <!-- <div class="floating" style="top: 30%; left: 10%;">☁️</div> -->
        
        <!-- Fading moon -->
        <!-- <div class="fading" style="top: 15%; left: 30%;">🌙</div> -->
        
        <!-- Pulsing heart -->
        <!-- <div class="pulsing" style="top: 60%; left: 50%;">❤️</div> -->
        
        <!-- Orbiting planet -->
        <!-- <div style="position: absolute; top: 50%; left: 50%;"> -->
        <!--     <div class="orbiting">🌍</div> -->
        <!-- </div> -->
        
        <!-- Sliding rocket -->
        <!-- <div class="sliding" style="top: 40%;">🚀</div> -->
        
        <!-- Rainbow flower -->
        <!-- <div class="rainbow" style="top: 70%; left: 60%;">🌸</div> -->
    </div>

    <script>
        // ============================================
        // JAVASCRIPT ANIMATIONS
        // You can also create animations with JavaScript!
        // ============================================
        
        const container = document.getElementById('animation-container');
        
        // Example: Create falling stars with JavaScript
        function createFallingStar() {
            const star = document.createElement('div');
            star.textContent = '⭐';
            star.style.position = 'absolute';
            star.style.fontSize = (Math.random() * 30 + 20) + 'px';
            star.style.left = Math.random() * window.innerWidth + 'px';
            star.style.top = '-50px';
            star.style.pointerEvents = 'none';
            
            container.appendChild(star);
            
            // Animate falling
            let y = -50;
            const speed = Math.random() * 3 + 2;
            
            const fallInterval = setInterval(() => {
                y += speed;
                star.style.top = y + 'px';
                
                // Remove when off screen
                if (y > window.innerHeight) {
                    clearInterval(fallInterval);
                    star.remove();
                }
            }, 20);
        }
        
        // CUSTOMIZE: Call this function to create falling stars
        // Uncomment to activate:
        // setInterval(createFallingStar, 1000); // Create a star every second
        
        
        // Example: Create random bubbles
        function createBubble() {
            const bubble = document.createElement('div');
            bubble.textContent = '⚪';
            bubble.style.position = 'absolute';
            bubble.style.fontSize = (Math.random() * 40 + 20) + 'px';
            bubble.style.left = Math.random() * window.innerWidth + 'px';
            bubble.style.bottom = '-50px';
            bubble.style.opacity = Math.random() * 0.5 + 0.5;
            bubble.style.pointerEvents = 'none';
            
            container.appendChild(bubble);
            
            // Animate rising
            let y = window.innerHeight + 50;
            const speed = Math.random() * 2 + 1;
            const wobble = Math.random() * 3;
            let wobbleOffset = 0;
            
            const riseInterval = setInterval(() => {
                y -= speed;
                wobbleOffset += wobble;
                const wobbleX = Math.sin(wobbleOffset) * 20;
                
                bubble.style.bottom = (window.innerHeight - y) + 'px';
                bubble.style.transform = `translateX(${wobbleX}px)`;
                
                // Remove when off screen
                if (y < -50) {
                    clearInterval(riseInterval);
                    bubble.remove();
                }
            }, 20);
        }
        
        // CUSTOMIZE: Call this function to create bubbles
        // Uncomment to activate:
        // setInterval(createBubble, 500); // Create a bubble every half second
        
        
        // Example: Click to create explosion effect
        container.addEventListener('click', (e) => {
            // CUSTOMIZE: Change emoji or number of particles
            const emojis = ['✨', '⭐', '💫', '🌟'];
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.textContent = emoji;
                particle.style.position = 'absolute';
                particle.style.left = e.clientX + 'px';
                particle.style.top = e.clientY + 'px';
                particle.style.fontSize = '30px';
                particle.style.pointerEvents = 'none';
                particle.style.transition = 'all 1s ease-out';
                
                container.appendChild(particle);
                
                // Explode in different directions
                setTimeout(() => {
                    const angle = (Math.PI * 2 * i) / 12;
                    const distance = 150;
                    const x = Math.cos(angle) * distance;
                    const y = Math.sin(angle) * distance;
                    
                    particle.style.transform = `translate(${x}px, ${y}px) rotate(${Math.random() * 360}deg)`;
                    particle.style.opacity = '0';
                }, 10);
                
                // Remove after animation
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        });
        
        
        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        
        // Create a random element at a random position
        function createRandomElement(emoji, className) {
            const element = document.createElement('div');
            element.textContent = emoji;
            element.className = className;
            element.style.top = (Math.random() * 80 + 10) + '%';
            element.style.left = (Math.random() * 80 + 10) + '%';
            container.appendChild(element);
            return element;
        }
        
        // Animate element along a custom path
        function animateAlongPath(element, path, duration) {
            const startTime = Date.now();
            
            function update() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const point = path(progress);
                
                element.style.left = point.x + 'px';
                element.style.top = point.y + 'px';
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            update();
        }
    </script>
</body>
</html>
