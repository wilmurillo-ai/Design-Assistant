<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            /* CUSTOMIZE: Change background color/gradient */
            background: linear-gradient(to bottom, #667eea 0%, #764ba2 100%);
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #canvas {
            display: block;
            background: white;
        }
        
        /* Score display in top corner */
        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            z-index: 100;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }
        
        /* Start screen overlay */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        
        #start-screen h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 30px;
        }
        
        #start-btn {
            padding: 20px 50px;
            font-size: 32px;
            font-family: inherit;
            font-weight: bold;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }
        
        #start-btn:hover {
            transform: scale(1.1);
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Canvas for drawing the game -->
        <canvas id="canvas"></canvas>
        
        <!-- Score display -->
        <div id="score-display">Score: <span id="score">0</span></div>
        
        <!-- Start screen -->
        <div id="start-screen">
            <h1>🎮 My Game! 🎮</h1>
            <button id="start-btn">Start Game!</button>
        </div>
    </div>

    <script>
        // ============================================
        // CANVAS SETUP
        // ============================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Make canvas fill the screen
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Resize canvas if window size changes
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // ============================================
        // GAME STATE
        // ============================================
        let gameRunning = false;
        let score = 0;
        let gameObjects = []; // Array to hold things in the game
        
        // ============================================
        // SOUND EFFECTS (Web Audio API)
        // ============================================
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playBeep(frequency = 440, duration = 0.1) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }
        
        // ============================================
        // GAME OBJECT CLASS
        // ============================================
        class GameObject {
            constructor(x, y, size, color) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.color = color;
                this.speedX = 0;
                this.speedY = 0;
            }
            
            // Update position
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
            }
            
            // Draw on canvas
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
            
            // Check if this object collides with another
            collidesWith(other) {
                return this.x < other.x + other.size &&
                       this.x + this.size > other.x &&
                       this.y < other.y + other.size &&
                       this.y + this.size > other.y;
            }
            
            // Check if this object is off screen
            isOffScreen() {
                return this.x < -this.size || 
                       this.x > canvas.width || 
                       this.y < -this.size || 
                       this.y > canvas.height;
            }
        }
        
        // ============================================
        // SCORE MANAGEMENT
        // ============================================
        function updateScore(points) {
            score += points;
            document.getElementById('score').textContent = score;
        }
        
        function resetScore() {
            score = 0;
            document.getElementById('score').textContent = score;
        }
        
        // ============================================
        // START GAME
        // ============================================
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            gameRunning = true;
            resetScore();
            gameObjects = [];
            
            // CUSTOMIZE: Add your game objects here
            // Example: create a player object
            // const player = new GameObject(canvas.width / 2, canvas.height / 2, 50, '#FF6B6B');
            // gameObjects.push(player);
            
            gameLoop();
        }
        
        // ============================================
        // GAME LOOP (runs 60 times per second)
        // ============================================
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear the canvas
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // CUSTOMIZE: Update and draw your game objects
            gameObjects.forEach(obj => {
                obj.update();
                obj.draw();
            });
            
            // CUSTOMIZE: Check for collisions, game over conditions, etc.
            
            // Request next frame
            requestAnimationFrame(gameLoop);
        }
        
        // ============================================
        // INPUT HANDLING
        // ============================================
        
        // Mouse/Touch click
        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;
            
            const x = e.clientX;
            const y = e.clientY;
            
            // CUSTOMIZE: Handle clicks
            console.log('Clicked at:', x, y);
        });
        
        // Mouse/Touch move
        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            
            const x = e.clientX;
            const y = e.clientY;
            
            // CUSTOMIZE: Handle mouse movement
        });
        
        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            // CUSTOMIZE: Handle keyboard input
            // Example: arrow keys
            // if (e.key === 'ArrowLeft') { /* move left */ }
            // if (e.key === 'ArrowRight') { /* move right */ }
            // if (e.key === 'ArrowUp') { /* move up */ }
            // if (e.key === 'ArrowDown') { /* move down */ }
        });
        
        // ============================================
        // SETUP
        // ============================================
        document.getElementById('start-btn').addEventListener('click', startGame);
    </script>
</body>
</html>
