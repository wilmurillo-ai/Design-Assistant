# Risk Limits Configuration
# 风险限制配置

# 仓位限制
max_position_size_pct: 25  # 单个仓位最大占比 (%)
max_total_exposure_pct: 80  # 总敞口最大占比 (%)

# 亏损限制
max_daily_loss: 50  # 日亏损停止线 (U)
max_drawdown_pct: 15  # 最大回撤停止 (%)

# 订单限制
max_order_size: 100  # 单笔最大金额 (U)
max_open_orders: 50  # 最大挂单数

# 止损止盈
stop_loss_pct: 1  # 固定止损 (%)
trailing_stop_pct: 3  # 移动止损 (%)
take_profit_pct: 10  # 止盈 (%)
partial_take_profit_pct: 5  # 部分止盈触发点 (%)

# 杠杆限制
max_leverage: 10  # 最大杠杆
default_leverage: 5  # 默认杠杆

# 交易限制
min_order_size: 10  # 最小订单金额 (U)
max_slippage_pct: 1  # 最大滑点 (%)

# 风控开关
enable_stop_loss: true  # 启用止损
enable_trailing_stop: true  # 启用移动止损
enable_profit_protection: true  # 启用盈利保护
kill_switch_enabled: false  # Kill开关（触发后停止所有交易）
