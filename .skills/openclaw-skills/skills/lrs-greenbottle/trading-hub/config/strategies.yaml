# Trading Strategies Configuration
# 交易策略默认配置

# 网格交易
grid_trading:
  default_num_grids: 10
  grid_spacing_pct: 2  # 网格间距 (%)
  investment_per_grid: 10  # 每格投入 (U)
  auto_rebalance: true
  
# DCA定投
dca:
  default_interval: "daily"  # daily, weekly, monthly
  default_amount: 10  # 每次投入 (U)
  base_currency: "USDT"
  
# 趋势跟踪
trend_following:
  fast_ema: 12
  slow_ema: 26
  signal_ema: 9
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  
# 剥头皮
scalping:
  min_spread_pct: 0.1  # 最小点差 (%)
  target_profit_pct: 0.05  # 目标利润 (%)
  max_hold_seconds: 300  # 最大持仓时间 (秒)
  
# 套利
arbitrage:
  min_profit_pct: 0.5  # 最小利润 (%)
  exchanges: ["binance", "okx", "bybit"]
  check_interval_seconds: 60
  
# 波段交易
swing_trading:
  bollinger_period: 20
  bollinger_std: 2
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  hold_days_min: 2
  hold_days_max: 14
  
# 复制交易
copy_trading:
  max_followers: 10
  min_trade_size: 10
  max_slippage_pct: 1
  
# 再平衡
rebalancing:
  target_allocation:
    BTC: 60
    ETH: 30
    USDT: 10
  rebalance_threshold_pct: 5  # 偏离阈值触发再平衡
  auto_rebalance: false
