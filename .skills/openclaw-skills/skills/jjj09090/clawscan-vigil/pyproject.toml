[project]
name = "clawscan"
version = "0.2.0"
description = "OpenClaw Skill Security Scanner - Premium Edition"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["openclaw", "security", "scanner", "skill", "mcp", "clawscan"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
    "rich>=13.0",
    "requests>=2.28",
    "RestrictedPython>=7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1.0",
]

[project.scripts]
clawscan = "cli:main"

[project.urls]
Homepage = "https://github.com/yourname/clawscan"
Repository = "https://github.com/yourname/clawscan"
Documentation = "https://docs.clawscan.dev"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.black]
line-length = 88
target-version = ["py310"]

[tool.ruff]
line-length = 88
select = ["E", "F", "W", "I"]
