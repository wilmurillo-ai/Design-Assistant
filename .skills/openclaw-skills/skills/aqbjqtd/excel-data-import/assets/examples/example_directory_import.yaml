# Excel 数据导入配置文件示例 - 目录数据源
# 演示如何从整个目录导入多个源文件的数据

# 任务基本信息
task_name: "多文件数据合并导入示例"
description: "从 input 目录中读取所有 Excel 文件，合并数据后导入到目标模板"

# 源数据配置 - 方式1：目录自动遍历
source:
  # 指定目录路径（相对或绝对路径都可以）
  directory_path: "input/"

  # 文件过滤模式（可选，默认 "*.xlsx"）
  # 支持通配符：
  #   "*.xlsx" - 所有 Excel 文件
  #   "*成绩*.xlsx" - 文件名包含"成绩"的 Excel 文件
  #   "班级*.xlsx" - 文件名以"班级"开头的 Excel 文件
  file_pattern: "*.xlsx"

  # 工作表配置（所有源文件应该有相同的结构）
  sheet_name: "Sheet1"
  header_row: 1
  key_field: "学籍号码"

  # 注意：如果使用 directory_path，不要同时指定 file_path

# 目标模板配置
target:
  file_path: "assets/examples/test_template.xlsx"
  sheet_name: "人员信息"
  header_row: 2
  data_start_row: 3
  output_path: "assets/examples/test_output_from_directory.xlsx"

# 字段映射配置（适用于所有源文件）
field_mappings:
  - source: "姓名"
    target: "员工姓名"
    required: true

  - source: "学籍号码"
    target: "身份证号码"
    required: true

  - source: "思品"
    target: "思品成绩"
    required: false

  - source: "历史"
    target: "历史成绩"
    required: false

# 错误处理配置
error_handling:
  backup: true
  backup_path: "assets/examples/backup/"
  stop_on_error: false
  log_errors: true
  error_log_path: "assets/examples/logs/import_errors.log"

# 高级选项
options:
  preserve_formatting: true
  skip_merged_cells: false

  # 字体设置（中文支持）
  font_settings:
    default_font: "微软雅黑"
    fallback_fonts: ["宋体", "黑体"]
    font_size: 11

# 多源文件说明：
#
# 【使用场景】
# 1. 多个班级的成绩单分布在不同的文件中
# 2. 多个部门的数据表需要汇总
# 3. 不同时间段的导出数据需要合并
#
# 【数据处理规则】
# 1. 脚本会按文件名字母顺序依次处理每个源文件
# 2. 所有源文件的数据会根据 key_field（学籍号码）进行匹配
# 3. 如果多个文件包含相同的关键字段值，后读取的会覆盖先读取的
# 4. 最终将所有有效数据合并到目标模板
#
# 【配置优先级】
# sources（显式文件列表） > directory_path（目录遍历） > file_path（单文件）
#
# 【示例文件结构】
# input/
# ├── 701_702班成绩.xlsx
# ├── 703_705班成绩.xlsx
# └── 706_711班成绩.xlsx
#
# 以上三个文件都会被自动处理，数据合并后导入到目标模板
