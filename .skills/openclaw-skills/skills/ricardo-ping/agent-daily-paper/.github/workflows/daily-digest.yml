name: Daily arXiv Digest

on:
  workflow_dispatch:
  schedule:
    # UTC poll only. Actual execution time is decided by subscription timezone + push_time in run_digest.py.
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  run-digest:
    concurrency:
      group: daily-digest-main
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install argostranslate

      - name: Run digest when due
        env:
          TRANSLATE_PROVIDER: ${{ vars.TRANSLATE_PROVIDER || 'auto' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/run_digest.py --only-due-now --due-window-minutes 15

      - name: Commit daily markdown if changed
        run: |
          if [ -n "$(git status --porcelain output/daily data/state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add output/daily data/state.json
            git commit -m "chore: daily arxiv digest $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Handle race with concurrent pushes to main.
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              if [ "$i" -eq 3 ]; then
                echo "Push failed after 3 retries."
                exit 1
              fi
              echo "Retrying push ($i/3)..."
              sleep 3
            done
          else
            echo "No changes to commit."
          fi
