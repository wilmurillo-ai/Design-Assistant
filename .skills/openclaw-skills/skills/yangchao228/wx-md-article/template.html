<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
</head>
<body style="margin:0;padding:0;background:#f7f7f7;font-family:-apple-system,BlinkMacSystemFont,Helvetica Neue,PingFang SC,Hiragino Sans GB,Microsoft YaHei,sans-serif;">

<div style="max-width:680px;margin:0 auto;background:#fff;padding:20px 15px;">

<!-- 标题区 -->
<div style="text-align:center;padding:30px 0;border-bottom:2px solid #07c160;margin-bottom:25px;">
    <h1 style="font-size:22px;color:#1a1a1a;margin:0 0 10px 0;font-weight:bold;line-height:1.4;">{{TITLE}}</h1>
    <p style="font-size:14px;color:#666;margin:0;">{{SUBTITLE}}</p>
    <p style="font-size:12px;color:#999;margin-top:10px;">{{DATE}}</p>
</div>

<!-- 正文 -->
<div style="font-size:16px;line-height:1.8;color:#333;">
{{CONTENT}}
</div>

<!-- 标签 -->
<div style="margin-top:30px;padding-top:20px;border-top:1px solid #eee;text-align:center;">
{{TAGS}}
</div>

</div>
</body>
</html>
