<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ 音乐 - 个性化推荐电台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .player-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2em;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .start-screen {
            text-align: center;
            padding: 60px 20px;
        }

        .start-screen .icon {
            font-size: 6em;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .start-screen h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 15px;
        }

        .start-screen p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .start-btn:active {
            transform: translateY(-1px);
        }

        .album-cover {
            text-align: center;
            margin-bottom: 30px;
        }

        .album-cover img {
            width: 300px;
            height: 300px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            object-fit: cover;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .song-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .song-info h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 10px;
        }

        .song-info p {
            font-size: 1.2em;
            color: #666;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn.large {
            width: 80px;
            height: 80px;
            font-size: 2em;
        }

        .control-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .progress {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            color: #999;
            font-size: 0.9em;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .volume-control span {
            color: #666;
        }

        .volume-slider {
            width: 150px;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .volume-level {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            width: 80%;
        }

        .playlist-section {
            margin-top: 30px;
            max-height: 300px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 15px;
        }

        .playlist-section h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .playlist-item {
            padding: 12px 15px;
            background: white;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playlist-item:hover {
            background: #e8ecf1;
            transform: translateX(5px);
        }

        .playlist-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .playlist-item-info {
            flex: 1;
        }

        .playlist-item-info strong {
            display: block;
            margin-bottom: 3px;
        }

        .playlist-item-info .artist {
            font-size: 0.9em;
            opacity: 0.7;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2em;
        }

        .error, .info {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error {
            background: #ff6b6b;
            color: white;
        }

        .info {
            background: #667eea;
            color: white;
        }

        .fallback-container {
            text-align: center;
            padding: 30px;
        }

        .fallback-container .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .fallback-btn {
            display: inline-block;
            padding: 15px 40px;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            margin: 10px;
            transition: all 0.3s ease;
            border: none;
            font-size: 1em;
            cursor: pointer;
        }

        .fallback-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        audio {
            width: 100%;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .player-card {
                padding: 30px 20px;
            }

            .album-cover img {
                width: 250px;
                height: 250px;
            }

            .song-info h2 {
                font-size: 1.4em;
            }

            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2em;
            }

            .control-btn.large {
                width: 70px;
                height: 70px;
                font-size: 1.8em;
            }

            .start-btn {
                padding: 15px 40px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-card">
            <div class="header">
                <h1>🎵 QQ 音乐电台</h1>
                <p>个性化推荐 · 自动播放</p>
                <div class="status-badge">✨ AI 智能推荐</div>
            </div>

            <div id="message-container"></div>

            <div id="player-content">
                <div class="start-screen">
                    <div class="icon">🎵</div>
                    <h2>准备好开始了吗？</h2>
                    <p>点击按钮，让 AI 为你推荐好听的歌曲</p>
                    <button class="start-btn" id="start-btn">🎧 开始播放</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app-auto.js"></script>
</body>
</html>
