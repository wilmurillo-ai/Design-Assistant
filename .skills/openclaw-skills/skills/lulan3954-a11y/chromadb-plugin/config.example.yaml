vector_store:
  type: chromadb
  path: "./chromadb"
  # 向量模型配置，默认使用BGE-M3中文模型
  model: "BAAI/bge-m3"
  # 是否启用GPU加速
  gpu_accelerate: true
  # 混合检索权重设置
  hybrid_search:
    keyword_weight: 0.3
    vector_weight: 0.7
  # 检索默认配置
  default:
    n_results: 10
    min_score: 0.6
