[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tg-monitor-kit"
version = "0.1.0"
description = "Telegram keyword monitor and group search (Telethon)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "telethon>=1.34.0",
    "openpyxl>=3.1.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
web = [
    "requests>=2.28.0",
    "beautifulsoup4>=4.12.0",
    "pandas>=2.0.0",
    "faker>=20.0.0",
]

[project.scripts]
tg-monitor = "tg_monitor_kit.cli.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
tg_monitor_kit = ["py.typed"]
