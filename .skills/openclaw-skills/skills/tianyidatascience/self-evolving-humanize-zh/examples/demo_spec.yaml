task: 给催进度客户发一条微信回复
goal: >
  更像真人自然发送的中文微信，不要模板腔，不要太像AI润色文案。
  礼貌、清楚、可信，语气稳一点，别过度道歉。
style_notes:
  - 像项目负责人本人发出的微信
  - 口语化一点，但不能太随便
  - 让对方感受到你在跟进，而不是在敷衍
hard_constraints:
  min_chars: 35
  max_chars: 95
  must_include:
    - 明天下午
    - 财务
  banned_phrases:
    - 感谢您的理解与支持
    - 如有任何问题请随时联系
evaluator:
  minimum_improvement: 0.015
