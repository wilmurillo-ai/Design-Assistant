[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-agent-scanner"
version = "0.1.0"
description = "AI Agent Security Scanner - 检测 AI Agent 中的安全风险"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.9.0",
    "rich>=13.0.0",
    "pydantic>=2.0.0",
    "pyyaml>=6.0",
    "requests>=2.28.0",
    "python-dotenv>=1.0.0",
    "httpx>=0.24.0",
    "zhipuai>=2.0.0",
]

[project.scripts]
aascan = "scanner.cli:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["scanner*"]
