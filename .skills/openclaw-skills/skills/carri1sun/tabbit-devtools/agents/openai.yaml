interface:
  display_name: "Tabbit Agent Browser"
  short_description: "指导 agent 找到 Tabbit 的 Chromium DevTools 端点，并把浏览器操作切到 agent-browser"
  default_prompt: "当用户提到“用我的 tabbit 浏览器”、要求在 Tabbit 里执行浏览器任务，或要求连接 Tabbit 时，使用 $tabbit-devtools：先把 Tabbit 当作 Chromium 浏览器处理，读取 DevToolsActivePort，得到 port、browserPath 和 wsEndpoint。优先运行 scripts/run_agent_browser_on_tabbit.py，把当前 Tabbit 的 wsEndpoint 通过 --cdp 注入给 agent-browser，再继续执行 open、snapshot、click、fill、press 等标准 agent-browser CLI 工作流。必要时运行 scripts/discover_tabbit_cdp.py 输出连接信息。不要再承诺 chrome-devtools MCP 会自动重定向到 Tabbit，也不要实现另一套 bridge、daemon 或自定义 CDP 客户端。"
