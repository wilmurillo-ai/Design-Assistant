rules:
  # ============================================
  # P1 - XXE (XML External Entity)
  # ============================================
  
  - id: java-xxe-documentbuilder
    patterns:
      - pattern: DocumentBuilderFactory.newInstance().newDocumentBuilder()
    message: "检测到 DocumentBuilder 使用，可能存在 XXE 漏洞。建议禁用外部实体。"
    severity: ERROR
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-611"

  - id: java-xxe-saxparser
    patterns:
      - pattern: SAXParserFactory.newInstance().newSAXParser()
    message: "检测到 SAXParser 使用，可能存在 XXE 漏洞。建议禁用外部实体。"
    severity: ERROR
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-611"

  - id: java-xxe-xmlreader
    patterns:
      - pattern: XMLReaderFactory.createXMLReader()
    message: "检测到 XMLReader 使用，可能存在 XXE 漏洞。建议禁用外部实体。"
    severity: ERROR
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-611"

  - id: java-xxe-xmlinputfactory
    patterns:
      - pattern: XMLInputFactory.newInstance()
    message: "检测到 XMLInputFactory 使用，可能存在 XXE 漏洞。建议禁用外部实体。"
    severity: ERROR
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-611"

  - id: java-xxe-unmarshaller
    patterns:
      - pattern: JAXBContext.newInstance(...).createUnmarshaller()
    message: "检测到 JAXB Unmarshaller 使用，可能存在 XXE 漏洞。建议禁用外部实体。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-611"

  - id: java-xxe-dom4j
    patterns:
      - pattern: new SAXReader()
    message: "检测到 dom4j SAXReader 使用，可能存在 XXE 漏洞。建议禁用外部实体。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-611"

  - id: java-xxe-jdom
    patterns:
      - pattern: new SAXBuilder()
    message: "检测到 JDOM SAXBuilder 使用，可能存在 XXE 漏洞。建议禁用外部实体。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-611"

  # ============================================
  # P1 - XSS (Cross-Site Scripting)
  # ============================================
  
  - id: java-xss-response-writer
    patterns:
      - pattern: $WRITER.write($USER_INPUT)
      - pattern-not: $WRITER.write("...")
    message: "检测到 Response Writer 直接输出用户输入，可能存在 XSS 漏洞。建议使用 HTML 转义。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-79"

  - id: java-xss-printwriter
    patterns:
      - pattern: $PW.print($USER_INPUT)
      - pattern-not: $PW.print("...")
    message: "检测到 PrintWriter 直接输出用户输入，可能存在 XSS 漏洞。建议使用 HTML 转义。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-79"

  - id: java-xss-jsp-expression
    patterns:
      - pattern-regex: '<%= request\.getParameter\('
    paths:
      include:
        - "*.jsp"
    message: "检测到 JSP 表达式直接输出用户输入，可能存在 XSS 漏洞。建议使用 JSTL <c:out> 标签。"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-79"

  # ============================================
  # P2 - 敏感数据泄露
  # ============================================
  
  - id: java-sensitive-log-password
    patterns:
      - pattern-regex: 'log\.(debug|info|warn|error)\([^)]*password[^)]*\)'
    paths:
      include:
        - "*.java"
    message: "检测到密码被记录到日志，存在敏感信息泄露风险。建议移除密码日志。"
    severity: ERROR
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-532"

  - id: java-sensitive-log-token
    patterns:
      - pattern-regex: 'log\.(debug|info|warn|error)\([^)]*[Tt]oken[^)]*\)'
    paths:
      include:
        - "*.java"
    message: "检测到 Token 被记录到日志，存在敏感信息泄露风险。建议移除 Token 日志。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-532"

  - id: java-sensitive-printstacktrace
    patterns:
      - pattern: $E.printStackTrace()
    message: "检测到 printStackTrace 使用，可能泄露敏感堆栈信息。建议使用日志框架记录异常。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-209"

  - id: java-sensitive-exception-message
    patterns:
      - pattern: return $E.getMessage()
    message: "检测到异常消息直接返回给用户，可能泄露敏感信息。建议返回通用错误消息。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-209"

  # ============================================
  # P1 - 认证授权
  # ============================================
  
  - id: java-auth-permitAll
    patterns:
      - pattern-regex: 'permitAll\(\)'
    paths:
      include:
        - "*.java"
    message: "检测到 permitAll 配置，允许匿名访问。请确认是否为公开资源。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-284"

  - id: java-auth-anonymous
    patterns:
      - pattern-regex: 'anonymous\(\)'
    paths:
      include:
        - "*.java"
    message: "检测到 anonymous 配置，允许匿名用户访问。请确认是否符合安全要求。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-284"

  - id: java-auth-jwt-weak-secret
    patterns:
      - pattern-regex: '"(secret|password|123456|admin|key|test)"'
    paths:
      include:
        - "*.java"
    message: "检测到弱密钥，可能导致 JWT 伪造。建议使用强随机密钥。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-798"

  - id: java-auth-bcrypt-weak-rounds
    patterns:
      - pattern: new BCryptPasswordEncoder(4)
    message: "检测到 BCrypt 迭代轮数为 4，过弱。建议使用默认 10 或更高。"
    severity: INFO
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-916"

  # ============================================
  # P1 - 会话管理
  # ============================================
  
  - id: java-session-cookie-secure-missing
    patterns:
      - pattern-regex: 'session\.setAttribute|HttpSession'
    paths:
      include:
        - "*.java"
    message: "检测到 Session 使用，请确保 Cookie 配置了 Secure 和 HttpOnly 属性。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-614"

  - id: java-session-insecure-id
    patterns:
      - pattern: request.getSession().getId()
    message: "检测到直接获取 Session ID，请确保不在 URL 或日志中暴露。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-200"

  - id: java-session-fixation
    patterns:
      - pattern: request.getSession(true)
    message: "检测到 Session 创建，请确保登录后调用 session.invalidate() 防止 Session 固定攻击。"
    severity: INFO
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-384"

  # ============================================
  # P1 - 日志安全 (Log4j)
  # ============================================
  
  - id: java-log4j-jndi-lookup
    patterns:
      - pattern-regex: '\$\{jndi:'
    paths:
      include:
        - "*.xml"
        - "*.properties"
        - "*.yml"
        - "*.yaml"
    message: "检测到 Log4j JNDI lookup，存在 Log4Shell 漏洞风险。建议升级 Log4j2 到 2.17.1+。"
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-502"
      references:
        - https://logging.apache.org/log4j/2.x/security.html

  - id: java-log4j-context-lookup
    patterns:
      - pattern-regex: '\$\{ctx:'
    paths:
      include:
        - "*.xml"
        - "*.properties"
    message: "检测到 Log4j context lookup，可能存在信息泄露或注入风险。"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-532"

  # ============================================
  # P2 - 配置安全
  # ============================================
  
  - id: java-config-debug-enabled
    patterns:
      - pattern-regex: '(debug|DEBUG)\s*[=:]\s*true'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
        - "*.java"
    message: "检测到开启 debug 模式，生产环境应关闭。"
    severity: WARNING
    languages: [generic, java]
    metadata:
      category: security
      cwe: "CWE-489"

  - id: java-config-actuator-exposed
    patterns:
      - pattern-regex: 'management\.endpoints\.web\.exposure\.include\s*[=:]\s*\*'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Actuator 暴露所有端点，存在信息泄露风险。建议仅暴露 health,info。"
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-489"

  - id: java-config-h2-console
    patterns:
      - pattern-regex: 'spring\.h2\.console\.enabled\s*[=:]\s*true'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 H2 Console 开启，生产环境应禁用。"
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-489"

  # ============================================
  # P1 - 接口安全
  # ============================================
  
  - id: java-api-cors-wildcard
    patterns:
      - pattern-regex: 'allowedOrigins\s*[=:]\s*"\*"|@CrossOrigin\(origins\s*=\s*"\*"\)'
    paths:
      include:
        - "*.java"
        - "*.yml"
        - "*.yaml"
    message: "检测到 CORS 允许所有来源，可能导致跨站请求伪造。建议限制允许的域名。"
    severity: WARNING
    languages: [generic, java]
    metadata:
      category: security
      cwe: "CWE-942"

  - id: java-api-cors-credentials
    patterns:
      - pattern-regex: 'allowCredentials\s*[=:]\s*true'
    paths:
      include:
        - "*.java"
        - "*.yml"
        - "*.yaml"
    message: "检测到 CORS allowCredentials=true，请确保 origins 未使用通配符。"
    severity: WARNING
    languages: [generic, java]
    metadata:
      category: security
      cwe: "CWE-942"

  - id: java-api-request-size-unlimited
    patterns:
      - pattern-regex: 'maxFileSize|maxRequestSize|multipart\.max-file-size'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到文件上传配置，请确保设置了合理的文件大小限制。"
    severity: INFO
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-400"

  # ============================================
  # P1 - 开放重定向
  # ============================================
  
  - id: java-open-redirect
    patterns:
      - pattern: response.sendRedirect($URL)
      - pattern-not: response.sendRedirect("...")
    message: "检测到动态重定向，可能存在开放重定向漏洞。建议使用白名单验证 URL。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-601"

  - id: java-open-redirect-model
    patterns:
      - pattern: 'return "redirect:" + $URL'
    message: "检测到动态重定向，可能存在开放重定向漏洞。建议使用白名单验证 URL。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-601"

  # ============================================
  # P1 - LDAP 注入
  # ============================================
  
  - id: java-ldap-injection
    patterns:
      - pattern: $CTX.search($BASE, $FILTER, ...)
      - pattern-not: $CTX.search($BASE, "...", ...)
    message: "检测到 LDAP 查询使用动态参数，可能存在 LDAP 注入漏洞。建议使用参数化查询。"
    severity: ERROR
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-90"

  # ============================================
  # P1 - EL 注入
  # ============================================
  
  - id: java-el-injection
    patterns:
      - pattern-regex: 'ValueExpression|ExpressionFactory|ELContext'
    paths:
      include:
        - "*.java"
    message: "检测到 EL 表达式处理，如果表达式来自用户输入，可能导致代码执行。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-917"

  # ============================================
  # P1 - JDBC Attack
  # ============================================
  
  - id: java-jdbc-fake-server
    patterns:
      - pattern-regex: 'jdbc:mysql://[^/]+/'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
        - "*.java"
    message: "检测到 MySQL JDBC 连接，可能存在 Fake Server 攻击风险。建议添加 detectCustomCollations=false。"
    severity: WARNING
    languages: [generic, java]
    metadata:
      category: security
      cwe: "CWE-918"

  - id: java-jdbc-postgres-logger
    patterns:
      - pattern-regex: 'jdbc:postgresql://'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
        - "*.java"
    message: "检测到 PostgreSQL JDBC 连接，可能存在 logger RCE 漏洞。建议检查 logger 配置。"
    severity: WARNING
    languages: [generic, java]
    metadata:
      category: security
      cwe: "CWE-918"

  # ============================================
  # P1 - 内存马检测
  # ============================================
  
  - id: java-memshell-filter
    patterns:
      - pattern-regex: 'registerFilter|addFilter|FilterDef|FilterMap'
    paths:
      include:
        - "*.java"
    message: "检测到动态 Filter 注册，可能存在内存马。请确认是否为业务代码。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-94"

  - id: java-memshell-servlet
    patterns:
      - pattern-regex: 'registerServlet|addServlet|ServletRegistration'
    paths:
      include:
        - "*.java"
    message: "检测到动态 Servlet 注册，可能存在内存马。请确认是否为业务代码。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-94"

  - id: java-memshell-listener
    patterns:
      - pattern-regex: 'registerListener|addListener'
    paths:
      include:
        - "*.java"
    message: "检测到动态 Listener 注册，可能存在内存马。请确认是否为业务代码。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-94"

  - id: java-memshell-classloader
    patterns:
      - pattern-regex: 'defineClass|ClassLoader'
    paths:
      include:
        - "*.java"
    message: "检测到动态类加载，可能存在内存马或代码注入。请确认是否为业务代码。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-94"

  # ============================================
  # P2 - 拒绝服务
  # ============================================
  
  - id: java-dos-regex-backtrack
    patterns:
      - pattern-regex: 'Pattern\.compile\([^)]*\*[^)]*\*'
    paths:
      include:
        - "*.java"
    message: "检测到可能存在回溯的正则表达式，可能导致 ReDoS 攻击。建议简化正则。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-1333"

  - id: java-dos-unlimited-loop
    patterns:
      - pattern-regex: 'while\s*\(\s*true\s*\)|for\s*\(\s*;\s*;\s*\)'
    paths:
      include:
        - "*.java"
    message: "检测到无限循环，可能导致 DoS。建议添加退出条件。"
    severity: INFO
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-400"

  - id: java-dos-sleep
    patterns:
      - pattern: Thread.sleep(...)
    message: "检测到 Thread.sleep 调用，可能导致响应延迟。请确认是否为业务需要。"
    severity: INFO
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-400"

  # ============================================
  # P2 - 其他安全问题
  # ============================================
  
  - id: java-hardcoded-ip
    patterns:
      - pattern-regex: '"(?:[0-9]{1,3}\.){3}[0-9]{1,3}"'
    paths:
      include:
        - "*.java"
    message: "检测到硬编码 IP 地址，建议使用配置文件管理。"
    severity: INFO
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-778"

  - id: java-system-exit
    patterns:
      - pattern: System.exit(...)
    message: "检测到 System.exit 调用，可能影响应用稳定性。建议使用受控的关闭方式。"
    severity: INFO
    languages: [java]
    metadata:
      category: best-practice

  - id: java-runtime-gc
    patterns:
      - pattern: System.gc()
    message: "检测到 System.gc() 调用，可能影响性能。建议让 JVM 自行管理垃圾回收。"
    severity: INFO
    languages: [java]
    metadata:
      category: best-practice

  - id: java-deserialize-object
    patterns:
      - pattern: new ObjectInputStream(...)
    message: "检测到 ObjectInputStream 使用，可能存在反序列化漏洞。建议使用白名单验证。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-502"

  - id: java-unsafe-deserialize
    patterns:
      - pattern: $OIS.readObject()
    message: "检测到 readObject 调用，可能存在反序列化 RCE。建议使用安全反序列化方案。"
    severity: ERROR
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-502"

  - id: java-xmldecoder-rce
    patterns:
      - pattern: new XMLDecoder(...)
    message: "检测到 XMLDecoder 使用，存在 RCE 风险。建议禁用或使用安全解析器。"
    severity: ERROR
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-502"

  - id: java-script-engine-rce
    patterns:
      - pattern-regex: 'ScriptEngineManager|ScriptEngine\.eval'
    paths:
      include:
        - "*.java"
    message: "检测到脚本引擎使用，如果脚本来自用户输入，可能导致代码执行。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-94"

  - id: java-temp-file-insecure
    patterns:
      - pattern: File.createTempFile(...)
    message: "检测到临时文件创建，可能存在竞态条件。建议设置适当权限并及时删除。"
    severity: INFO
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-377"

  - id: java-random-insecure
    patterns:
      - pattern: new Random()
    message: "检测到 java.util.Random 使用，不安全。建议使用 SecureRandom。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-338"