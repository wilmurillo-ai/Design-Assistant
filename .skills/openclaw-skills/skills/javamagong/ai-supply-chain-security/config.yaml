# AI Security Scanner v2.0 Configuration
# Cross-platform configuration file, supports Windows/macOS/Linux

# Scan paths (supports multiple)
scan_paths:
  - ./projects
  - ~/work
  - ~/dev

# Exclude patterns (glob style)
exclude_patterns:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.git/**"
  - "**/__pycache__/**"
  - "**/venv/**"
  - "**/.venv/**"
  - "**/vendor/**"
  - "**/*.min.js"
  - "**/*.bundle.js"

# Enabled detection rules
rules:
  enabled:
    # ── Critical: Remote code execution ──
    - HOOK-001  # curl | bash
    - HOOK-002  # wget | bash
    - HOOK-003  # bash -c curl
    # ── Critical: Destructive commands ──
    - HOOK-004  # rm -rf
    - HOOK-005  # del /s /q
    - HOOK-006  # format X:
    # ── Critical: Privilege escalation ──
    - HOOK-007  # chmod 777
    - HOOK-008  # sudo rm/chmod
    # ── Warning: Code execution ──
    - HOOK-010  # eval()
    - HOOK-011  # python -c
    - HOOK-012  # node -e
    - HOOK-013  # powershell
    - HOOK-014  # base64 --decode
    # ── Warning: Network backdoor ──
    - HOOK-020  # nc -e
    - HOOK-021  # bash /dev/tcp
    - HOOK-022  # curl -o *.sh
    # ── Supply chain: npm ──
    - SUPPLY-001  # postinstall dangerous command
    - SUPPLY-002  # preinstall dangerous command
    - SUPPLY-003  # prepare suspicious command
    # ── Supply chain: Python ──
    - SUPPLY-010  # git URL dependency
    - SUPPLY-011  # unofficial PyPI index (dependency confusion)
    - SUPPLY-012  # setup.py cmdclass
    - SUPPLY-013  # setup.py os.system/subprocess
    # ── Supply chain: GitHub Actions ──
    - SUPPLY-020  # Action references unpinned branch (CRITICAL)
    - SUPPLY-021  # Action references short SHA (INFO)
    # ── Claude Code / AI Assistant ──
    - CLAUDE-001  # MCP server external URL
    - CLAUDE-002  # Prompt injection attack
    - CLAUDE-003  # hooks calling external URL
    - CLAUDE-004  # hooks referencing sensitive environment variables
    - CLAUDE-005  # hidden Unicode characters
    # ── Code obfuscation ──
    - OBFUSC-001  # hex-encoded strings
    - OBFUSC-002  # exec/eval + base64 decode
    - OBFUSC-003  # __import__ dynamic import of sensitive modules
    - OBFUSC-004  # chr() building string character by character
    - OBFUSC-005  # exec(compile(...))
    - OBFUSC-006  # exec(bytes.fromhex(...))

  # Info-level rules (disabled by default, enable as needed)
  disabled:
    - HOOK-030  # npm install -g
    - HOOK-031  # pip install
    - HOOK-032  # cargo install

# File types to scan
scan:
  file_types:
    # AI assistant configuration
    - settings.json
    - config.json
    - CLAUDE.md
    - .cursorrules
    # Package managers
    - package.json
    - requirements.txt
    - requirements-dev.txt
    - Pipfile
    - pyproject.toml
    - setup.py
    - setup.cfg
    - Cargo.toml
    # CI/CD
    - "*.yml"
    - "*.yaml"

  # Maximum file size (MB)
  max_file_size: 10

  # Directory recursion depth (-1 for unlimited)
  max_depth: -1

  # Whether to follow symlinks
  follow_symlinks: false

# Report settings
report:
  format: json          # text | json | markdown
  output_dir: ./reports
  retention_days: 30
  include_safe_files: false

# Notification settings
notifications:
  # Email notifications
  email:
    enabled: false
    smtp_server: smtp.example.com
    smtp_port: 587
    use_tls: true
    username: security@example.com
    password_env: SMTP_PASSWORD  # Read from environment variable, do not hardcode
    from_addr: ai-scanner@example.com
    to_addrs:
      - security-team@example.com

  # Webhook notifications (Slack / Discord / DingTalk)
  webhook:
    enabled: false
    url_env: SECURITY_WEBHOOK_URL  # Read from environment variable
    type: slack           # slack | discord | dingtalk | custom

  # Native system notifications
  system:
    enabled: true   # macOS: osascript  Windows: toast  Linux: notify-send

# CI/CD mode
ci:
  fail_on_critical: true   # Return exit code 2 when CRITICAL issues found
  fail_on_warning: false   # Return exit code 1 when WARNING issues found
  output_format: json
  upload_artifact: true

# Performance
performance:
  parallel_files: 4
  use_cache: true
  cache_ttl_hours: 24
