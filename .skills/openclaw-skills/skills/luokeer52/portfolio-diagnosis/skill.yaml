name: portfolio-diagnosis
version: 5.0.0
author: prana
description: 持仓诊断技能(Tushare驱动版)——专为A股投资者设计。当用户说"帮我诊断持仓"、"看看我的股票组合"、"仓位合理吗"、"持仓风险大吗"、"我的组合夏普比率多少"时触发。使用Tushare
  SDK获取实时行情和历史数据，进行包含波动率、Beta、夏普比率、最大回撤在内的量化风险诊断，并生成专业诊断报告,包含：英雄区 + 综合评分环形图;持仓概览关键指标卡片;个股明细表格（含仓位进度条）;四大量化指标卡片（波动率/Beta/夏普/回撤）;四张交互式
  Chart.js 图表（雷达图/饼图/柱状图/盈亏对比）;六维诊断卡片、风险提示、优化建议;得分明细条形图。
license: MIT
permissions:
- network
- filesystem
entryPoint:
  type: shell
  path: scripts/prana_skill_client.py
prana_runners:
  python: scripts/prana_skill_client.py
  node: scripts/prana_skill_client.js
  node_note: 包根目录先执行 npm install（解析 SKILL.md 需 yaml 依赖）
paid_skill:
  order_skills_url: https://claw-uat.ebonex.io/api/order/skills
  after_payment_zh: 付费技能：支付成功后访问 https://claw-uat.ebonex.io/api/order/skills 获取购买记录；请求头
    x-api-key，值为 public_key:secret_key（与 Claw API 一致）。
  authentication:
    header: x-api-key
    value_format: public_key:secret_key
triggers:
  keywords:
  - 帮我诊断持仓
  - 看看我的股票组合
  - 仓位合理吗
  - 我的持仓有没有问题
  - 帮我分析一下我买的股票
  - 持仓风险大吗
  - 帮我做风险分析
  - 我的组合夏普比率多少
  - 诊断一下我的持仓
