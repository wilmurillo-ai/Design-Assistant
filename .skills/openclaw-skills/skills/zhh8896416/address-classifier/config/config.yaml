# 搜索补全配置（用于不完整地址的智能识别）
search_completion:
  enabled: true  # 是否启用搜索补全

  # 补全映射表
  # 格式：关键字: [实际归属, 输出分类]
  mappings:
    西河镇新四村: ["重庆市铜梁区西河镇", "外省重庆市"]
    善广乡三星村: ["重庆市忠县善广乡", "外省重庆市"]
    宝龙镇酢房村: ["重庆市大足区宝龙镇", "外省重庆市"]
    英庄镇张旗营: ["河南省南阳市卧龙区英庄镇", "外省河南省"]
    隆昌县: ["四川省内江市隆昌市", "外省四川省"]
    隆昌市: ["四川省内江市隆昌市", "外省四川省"]

# 外省识别前缀
other_provinces:
  - 山东省
  - 四川省
  - 河南省
  - 广东省
  - 重庆市

# 输出配置
output:
  # 输出格式：txt, csv, json
  format: "txt"

  # 文件编码
  encoding: "utf-8"

  # 分隔符（仅txt格式有效，\t表示制表符）
  delimiter: "\t"

# 日志配置
logging:
  # 日志级别：DEBUG, INFO, WARNING, ERROR
  level: "INFO"

  # 日志文件路径（留空则输出到控制台）
  file: ""
