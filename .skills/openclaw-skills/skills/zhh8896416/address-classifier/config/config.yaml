# 地址分类器配置文件
# Address Classifier Configuration

# 目标区域设置（本省本市的定义）
target_region:
  # 目标省份全称
  province: "贵州省"

  # 目标城市全称
  city: "贵阳市"

  # 目标城市简称（用于输出格式）
  city_short: "贵阳"

  # 目标城市下辖的县/县级市（这些属于本市，但在地址中不直接出现市名）
  # 格式：完整名称: 输出简称
  counties:
    开阳县: "开阳"
    息烽县: "息烽"
    修文县: "修文"
    清镇市: "清镇"

# 省内其他市州配置
