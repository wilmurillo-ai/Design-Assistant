<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide-Writer Before / After</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    padding: 48px;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 32px;
    width: 100%;
    max-width: 1400px;
  }

  /* ── LEFT: Claude Code window ── */
  .panel-before {
    flex: 1;
    background: #1a1a1a;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
  }

  .panel-titlebar {
    background: #242424;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red   { background: #ff5f57; }
  .dot-yellow{ background: #febc2e; }
  .dot-green { background: #28c840; }

  .titlebar-label {
    margin-left: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    font-family: "SF Mono", "Fira Code", monospace;
  }

  /* terminal install section */
  .terminal-section {
    background: #111;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12.5px;
    line-height: 1.9;
  }

  .term-comment { color: rgba(255,255,255,0.28); }
  .term-prompt  { color: #4c8ef7; }
  .term-text    { color: rgba(255,255,255,0.7); }

  /* Claude Code chat UI */
  .chat-section {
    padding: 20px 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .chat-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .avatar-user {
    background: #2d2d2d;
    color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .avatar-claude {
    background: #c17f3a;
    color: #fff;
    font-size: 10px;
  }

  .chat-bubble-user {
    background: #2a2a2a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13.5px;
    color: rgba(255,255,255,0.85);
    line-height: 1.6;
  }

  .chat-bubble-user .slash-cmd {
    color: #a78bfa;
    font-weight: 600;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  .chat-bubble-claude {
    font-size: 12.5px;
    color: rgba(255,255,255,0.55);
    line-height: 1.7;
    padding-top: 2px;
  }

  .chat-bubble-claude .progress {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .spinner {
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #4c8ef7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 13px;
    background: rgba(255,255,255,0.6);
    margin-left: 1px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* ── MIDDLE: arrow ── */
  .arrow-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .arrow-brand {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .arrow-brand span { color: #4c8ef7; }

  .arrow-svg {
    width: 56px;
  }

  .arrow-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    line-height: 1.5;
    white-space: nowrap;
  }

  /* ── RIGHT: multi-slide stack ── */
  .panel-after {
    flex: 1.6;
    position: relative;
    height: 320px;
  }

  .slide-stack {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .slide-card {
    position: absolute;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  }

  .slide-card img { width: 100%; display: block; }

  .slide-card:nth-child(1) {
    width: 78%;
    top: 0;
    left: 11%;
    z-index: 3;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(76,142,247,0.25);
  }

  .slide-card:nth-child(2) {
    width: 70%;
    top: 20px;
    left: 0;
    z-index: 2;
    opacity: 0.75;
    transform: rotate(-4deg);
  }

  .slide-card:nth-child(3) {
    width: 70%;
    top: 20px;
    right: 0;
    z-index: 2;
    opacity: 0.75;
    transform: rotate(4deg);
  }

  .slide-card:nth-child(4) {
    width: 62%;
    top: 38px;
    left: 50%;
    transform: translateX(-50%) rotate(0deg);
    z-index: 1;
    opacity: 0.45;
  }

  .after-badge {
    position: absolute;
    bottom: -8px;
    right: 10%;
    background: rgba(20,20,20,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    font-family: "SF Mono", monospace;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="container">

  <!-- LEFT: Claude Code window -->
  <div class="panel-before">
    <div class="panel-titlebar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <span class="titlebar-label">Claude Code</span>
    </div>

    <!-- terminal: install -->
    <div class="terminal-section">
      <div class="term-comment"># 安装 Slide-Writer skill</div>
      <div>
        <span class="term-prompt">$</span>
        <span class="term-text"> git clone https://github.com/FeeiCN/slide-writer.git ~/.claude/skills/slide-writer</span>
      </div>
    </div>

    <!-- chat: user message -->
    <div class="chat-section">
      <div class="chat-row">
        <div class="avatar avatar-user">你</div>
        <div class="chat-bubble-user">
          <span class="slash-cmd">/slide-writer</span> 帮我生成一个 Agent 的几种协作模式研究 为主题的演讲 PPT。
        </div>
      </div>

      <!-- chat: claude response -->
      <div class="chat-row">
        <div class="avatar avatar-claude">C</div>
        <div class="chat-bubble-claude">
          <div class="progress">
            <div class="spinner"></div>
            <span>正在生成演示文稿…</span>
          </div>
          <div>Phase 0 · 检测主题 → 蚂蚁集团</div>
          <div>Phase 2 · 规划结构 → 10 页</div>
          <div>Phase 3 · 生成 HTML<span class="cursor"></span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MIDDLE: arrow -->
  <div class="arrow-area">
    <div class="arrow-brand">Slide<span>Writer</span></div>
    <svg class="arrow-svg" viewBox="0 0 56 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="12" x2="44" y2="12" stroke="#4c8ef7" stroke-width="2" stroke-linecap="round"/>
      <polyline points="36,4 48,12 36,20" stroke="#4c8ef7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <div class="arrow-sub">自动生成<br>企业级 PPT</div>
  </div>

  <!-- RIGHT: multi-slide stack -->
  <div class="panel-after">
    <div class="slide-stack">
      <div class="slide-card"><img src="examples/slide-writer.png" alt="Slide 1"></div>
      <div class="slide-card"><img src="examples/test-antgroup-eric.png" alt="Slide 2"></div>
      <div class="slide-card"><img src="examples/test-alibaba-jack-ma.png" alt="Slide 3"></div>
      <div class="slide-card"><img src="examples/test-tencent-pony-ma.png" alt="Slide 4"></div>
    </div>
    <div class="after-badge">单文件 HTML · 零依赖</div>
  </div>

</div>
</body>
</html>
