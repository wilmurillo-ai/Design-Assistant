  - interface alignment
  - final assembly
  - dependency stitching
avoid_for:
  - open-ended architecture work
default_model_category: deep
input_contract:
  - module artifacts
  - contract expectations
output_contract:
  - integrated artifact
  - integration notes
  - remaining mismatches
reviewer_for:
  - builder
