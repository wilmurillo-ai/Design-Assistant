workflow_id: review-loop
goal: Bounded builder-reviewer cycle with structured retries
entry_conditions:
  - task has a clear artifact target
  - success criteria are known
phases:
  - id: build
    agent: builder
    output: artifact
  - id: review
    agent: reviewer
    output: structured_review
  - id: route_retry
    orchestrator_decision: true
retry_modes:
  local-defect: fix-loop
  cross-module: partial-rebuild
  architecture-spec: replan
retry_targets:
  local-defect: build
  cross-module: build
  architecture-spec: build
escalation_rules:
  - if_same_failure_repeats_twice: escalate
  - if_iterations_gt: 3
completion_conditions:
  - reviewer_verdict == pass
