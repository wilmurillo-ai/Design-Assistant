[project]
name = "code-review-automation"
version = "1.0.1"
description = "Automated code review for GitHub pull requests using Claude LLM"
requires-python = ">=3.8"
dependencies = [
    "PyGithub>=2.1.0",
    "anthropic>=0.18.0",
    "rich>=13.7.0",
    "typer>=0.12.0",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0.0",
]

[project.optional-dependencies]
test = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["code_review"]

[project.scripts]
code-review = "code_review.cli:app"
