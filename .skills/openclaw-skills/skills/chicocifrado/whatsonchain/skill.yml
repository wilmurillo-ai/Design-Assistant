name: whatsonchain
description: Access WhatsOnChain API for BSV/BTC blockchain data via REST calls. Manual key setup only, no automation.
version: 1.0.0
author: La Garra Cifrada
tags: [bsv, btc, api, blockchain, explorer]

endpoints:
  bsv_main: https://api.whatsonchain.com/v1/bsv/main
  bsv_testnet: https://api.whatsonchain.com/v1/bsv/testnet
  btc_main: https://api.whatsonchain.com/v1/btc/main

endpoints_info:
  bsv_main:
    network: BSV Mainnet
    endpoints:
      - /chain/info
      - /mempool/info
      - /block/headers
      - /block/height/{height}/stats
      - /transactions/{txid}
      - /addresses/{addr}/info
      - /inscriptions
  bsv_testnet:
    network: BSV Testnet
    endpoints:
      - /chain/info
      - /transactions/{txid}
      - /addresses/{addr}/info
  btc_main:
    network: Bitcoin Mainnet
    endpoints:
      - /chain/info
      - /transactions/{txid}
      - /addresses/{addr}/info

auth:
  required: false
  free_tier: 3 requests/sec
  premium: Teranode platform
  api_key_header: Authorization: mainnet_yourapikey
  env_vars:
    - name: WO_API_KEY
      required: false
      description: API key for premium features (optional)
      default: ""

setup:
  platform: https://platform.teranode.group
  api_key_url: https://platform.teranode.group/api-keys
  project_url: https://platform.teranode.group/projects

documentation:
  api_docs: https://docs.whatsonchain.com/
  bsv_docs: https://docs.bsvblockchain.org/
  brc_docs: https://bsv.brc.dev/

examples:
  chain_info: |
    curl -s "https://api.whatsonchain.com/v1/bsv/main/chain/info"
  mempool_info: |
    curl -s "https://api.whatsonchain.com/v1/bsv/main/mempool/info"
  block_stats: |
    curl -s "https://api.whatsonchain.com/v1/bsv/main/block/height/{height}/stats"
  transaction: |
    curl -s "https://api.whatsonchain.com/v1/bsv/main/transactions/{txid}"
  address: |
    curl -s "https://api.whatsonchain.com/v1/bsv/main/addresses/{addr}/info"
  broadcast: |
    curl -s -X POST -H "Content-Type: application/json" \
      -d "{\"txhex\":\"...\"}" \
      "https://api.whatsonchain.com/v1/bsv/main/broadcast"
