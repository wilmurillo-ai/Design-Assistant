skill_id: douyin-price-tracker
name: Douyin Price Tracker & Competitor Monitor
version: 1.0.6
author: yourname
contact: 745934958@qq.com
description: >
  Real-time price monitoring for Douyin products, threshold alerts,
  AI competitor analysis reports, and price trend visualization.
  Perfect for Douyin e-commerce sellers and dropshippers.
tags:
  - douyin
  - ecommerce
  - price-tracking
  - competitor-analysis
  - alert
  - wechat
  - shop-management
  - 抖音电商
  - 价格监控
  - 竞品分析
  - 无货源
  - 小店运营
triggers:
  - monitor douyin product
  - track price
  - competitor analysis
  - price alert
entrypoint: main.py
runtime: python3.8
permissions:
  - network
  - file
  - config
# 【核心修复】只声明代码里实际读取的SKILL_CONFIG变量，完全匹配代码逻辑
env:
  SKILL_CONFIG:
    description: >
      User configuration JSON, supports 3 fields:
      - douyin_cookie: Optional, Douyin web cookie for real product data
      - wechat_webhook: Optional, WeCom webhook URL for price alerts
      - subscription_level: Optional, subscription tier (basic/pro/enterprise), default basic
    required: false
    default: "{}"