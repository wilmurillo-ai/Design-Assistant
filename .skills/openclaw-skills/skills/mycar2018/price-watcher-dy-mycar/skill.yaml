slug: price-watcher-dy-mycar
name: 抖音价格监控助手Pro
version: 2.0.1
author: krys
contact: 微信：krys_zxz | QQ：755934958
description: |
  📊 抖音电商卖家必备工具，实时监控商品价格变动，自动企业微信告警。
  
  ✨ 核心功能：
  - 单品/批量监控抖音商品价格
  - 价格低于/高于阈值自动告警
  - 企业微信实时推送通知
  - 价格历史趋势图表
  
  ⚠️ 免责声明：
  本工具仅供个人学习研究使用，不保证长期可用。
  本技能完全免费，不收取任何费用。

tags:
  - 抖音
  - 电商
  - 价格监控
  - 竞品分析
  - 降价提醒
  - 企业微信
  - 告警
  - 小店运营
  - 无货源
  - 电商工具
triggers:
  - 监控抖音商品
  - 价格告警
  - 降价提醒
  - 竞品分析
  - 查看监控任务
  - 批量监控
  - 价格趋势
  - 价格历史
entrypoint: main.py
runtime: python3.8
permissions:
  - network
  - file
  - config

config_schema:
  title: 抖音价格监控配置
  type: object
  properties:
    douyin_cookie:
      type: string
      title: 抖音网页版 Cookie（可选）
      description: 用于抓取真实商品价格，不配置也能使用
    wechat_webhook:
      type: string
      title: 企业微信机器人 Webhook（可选）
      description: 价格变动时自动推送告警，不配置也能使用

