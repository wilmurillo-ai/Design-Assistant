name: Validate Plugin Structure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          test -f SKILL.md        && echo "✅ SKILL.md"        || (echo "❌ SKILL.md missing" && exit 1)
          test -f plugin.json     && echo "✅ plugin.json"     || (echo "❌ plugin.json missing" && exit 1)
          test -f README.md       && echo "✅ README.md"       || (echo "❌ README.md missing" && exit 1)
          test -f assets/index.html             && echo "✅ assets/index.html" || (echo "❌ assets/index.html missing" && exit 1)
          test -f references/tax-knowledge.md   && echo "✅ references/tax-knowledge.md" || (echo "❌ references/tax-knowledge.md missing" && exit 1)
          test -f scripts/tax_calculator.py     && echo "✅ scripts/tax_calculator.py"   || (echo "❌ scripts/tax_calculator.py missing" && exit 1)

      - name: Validate plugin.json format
        run: |
          python3 -c "
          import json, sys
          with open('plugin.json') as f:
              data = json.load(f)
          required = ['name', 'version', 'description', 'skills']
          for key in required:
              if key not in data:
                  print(f'Missing field: {key}')
                  sys.exit(1)
              print(f'OK: {key}')
          print('plugin.json valid')
          "

      - name: Python syntax check
        run: |
          python3 -m py_compile scripts/tax_calculator.py
          echo "✅ tax_calculator.py syntax OK"
