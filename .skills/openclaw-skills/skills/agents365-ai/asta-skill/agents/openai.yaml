interface:
  display_name: "Asta — Semantic Scholar via MCP"
  short_description: "Academic paper search, citation traversal, and author discovery through Ai2's Asta MCP server (Semantic Scholar corpus)"
  brand_color: "#0FA3B1"

policy:
  allow_implicit_invocation: true

capabilities:
  - Look up papers by DOI, arXiv, PMID, PMCID, CorpusId, MAG, ACL, SHA, or URL
  - Batch-lookup multiple paper IDs in a single call via get_paper_batch
  - Broad keyword search with venue and date filters via search_papers_by_relevance
  - Title-based paper lookup via search_paper_by_title
  - Forward citation traversal via get_citations (paginated)
  - Author profile search and publication listing
  - Full-text snippet search for evidence grounding (~500-word passages)
  - Workflow patterns for topic discovery, seed-paper expansion, author deep-dive, and evidence retrieval
  - Safe field selection — warns against context-blowing fields=citations requests

prerequisites:
  - MCP-capable host (Claude Code, Codex, Cursor, Windsurf, Hermes, OpenClaw)
  - Asta MCP server registered at https://asta-tools.allen.ai/mcp/v1
  - ASTA_API_KEY environment variable (request at https://share.hsforms.com/1L4hUh20oT3mu8iXJQMV77w3ioxm)

mcp_servers:
  - name: asta
    transport: http
    url: https://asta-tools.allen.ai/mcp/v1
    headers:
      x-api-key: ${ASTA_API_KEY}
