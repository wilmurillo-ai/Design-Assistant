interface:
  display_name: "Scholar Deep Research"
  short_description: "End-to-end academic research workflow — multi-source federation (OpenAlex/arXiv/Crossref/PubMed), transparent ranking, citation chasing, mandatory self-critique, and structured cited reports across 5 archetypes"
  brand_color: "#1F6FEB"

policy:
  allow_implicit_invocation: true

capabilities:
  - 8-phase research workflow, Phase 0..7 (scope → discover → triage → deep-read → chase → synthesize → critique → report)
  - Federated search across OpenAlex (primary), arXiv, Crossref, and PubMed — no API keys required
  - Cross-source deduplication (DOI-first, title-similarity fallback)
  - Transparent paper ranking with a published formula (relevance + citations + recency + venue prior)
  - Forward and backward citation graph chasing (snowballing) via OpenAlex
  - Saturation-based stop signal — discovery ends when new papers <20% and no high-citation outlier
  - PDF text extraction with scanned-PDF detection (pypdf)
  - Mandatory Phase 6 self-critique — 14-point adversarial checklist whose findings go in the report appendix
  - 5 report archetypes: literature_review, systematic_review, scoping_review, comparative_analysis, grant_background
  - BibTeX, CSL-JSON, and RIS bibliography export
  - Persistent research_state.json — every query, paper, decision, and phase is auditable and resumable
  - MCP enrichment via Semantic Scholar (asta) and Brave Search when available, never required
  - Citation-anchor enforcement — every claim in the report carries a [^id] anchor or fails the gate

prerequisites:
  - python3 (>= 3.9) on PATH
  - pip install -r requirements.txt (httpx + pypdf)
  - Optional: --email for OpenAlex/Crossref polite-pool, --api-key for NCBI higher rate limit
  - Optional: Semantic Scholar (asta) MCP server for relevance enrichment
  - Optional: Brave Search MCP for non-academic source coverage
