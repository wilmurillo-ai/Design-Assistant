[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "geo-content-writer"
version = "0.7.3"
description = "A fanout-backlog-first GEO writing workflow built on [Dageno](https://dageno.ai/?utm_source=github&utm_medium=social&utm_campaign=official) prompt opportunities, real fanout extraction, citation analysis, and publish-ready article generation."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = ["requests>=2.31.0"]

[project.scripts]
geo-content-writer = "geo_content_writer.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
