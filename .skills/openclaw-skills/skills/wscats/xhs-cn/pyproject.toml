[project]
name = "xiaohongshu-skill"
version = "1.0.0"
description = "Xiaohongshu (Little Red Book) full-pipeline operations skill - search, publish, interact, and analyze."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"

dependencies = [
    "playwright>=1.40.0",
    "httpx>=0.25.0",
    "Pillow>=10.0.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
    "loguru>=0.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.1.0",
]

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["xiaohongshu*"]

[tool.ruff]
line-length = 120
target-version = "py310"
