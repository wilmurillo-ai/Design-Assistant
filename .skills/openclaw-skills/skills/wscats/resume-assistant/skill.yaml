    - "优化简历"
    - "修改简历"
    - "检查简历"
  customize:
    - "create a resume for"
    - "write a resume for"
    - "tailor my resume"
    - "customize my resume"
    - "adapt my resume for"
    - "target this job"
    - "match this job description"
    - "写一份简历"
    - "定制简历"
    - "针对这个职位"
  export:
