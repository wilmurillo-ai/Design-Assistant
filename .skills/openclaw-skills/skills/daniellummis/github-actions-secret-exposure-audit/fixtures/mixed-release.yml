name: Mixed Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: npm run build
      - name: Upload release metadata
        uses: acme/release-uploader@master
        with:
          release_token: ${{ secrets.RELEASE_TOKEN }}
