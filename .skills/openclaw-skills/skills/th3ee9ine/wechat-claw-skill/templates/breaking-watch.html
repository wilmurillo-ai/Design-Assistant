<!--
  快讯追踪微信公众号模板 - THE BREAKING WATCH
  适用于突发快讯、热点追踪、盘中异动拆解

  使用说明：
  - 头条区直接给出事件、影响和当前判断
  - 正文建议按：发生了什么 / 为什么重要 / 接下来怎么看
  - 适合 3-6 个 section，单篇不宜过长
-->

<section style="max-width: 100%; margin: 0 auto; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', sans-serif; background: #f6f3ef;">

<section style="background: linear-gradient(135deg, #2b0b0b 0%, #6e1111 55%, #b91c1c 100%); padding: 36px 20px 28px; text-align: center;">
<p style="font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 8px; text-transform: uppercase; margin: 0 0 8px;">THE BREAKING WATCH</p>
<p style="font-size: 30px; font-weight: 900; color: #ffffff; margin: 0; letter-spacing: 2px;">快讯追踪</p>
<section style="width: 46px; height: 2px; background: #ffd166; margin: 12px auto;"></section>
<p style="font-size: 13px; color: rgba(255,255,255,0.72); margin: 0;">{{DATE_CN}}</p>
<p style="font-size: 11px; color: rgba(255,255,255,0.45); margin: 8px 0 0; letter-spacing: 1px;">热点复盘 · 影响判断 · 关键时间线</p>
</section>

<section style="background: #ffffff; margin: 0; padding: 26px 20px 22px; border-bottom: 3px double #6e1111;">
<p style="font-size: 10px; color: #b91c1c; letter-spacing: 5px; text-transform: uppercase; margin: 0 0 10px; font-weight: 700;">FLASHPOINT · 焦点</p>
<p style="font-size: 25px; font-weight: 900; color: #1f2937; line-height: 1.35; margin: 0 0 12px;">{{HEADLINE_TITLE}}</p>
<p style="font-size: 15px; color: #7c2d12; line-height: 1.9; margin: 0 0 14px; font-weight: 600;">{{SUBTITLE}}</p>
<section style="width: 100%; height: 1px; background: linear-gradient(to right, #ef4444, transparent); margin: 0 0 16px;"></section>
{{HEADLINE_BODY}}
<p style="font-size: 11px; color: #999; margin: 12px 0 0; text-align: right;">{{HEADLINE_SOURCE}}</p>
</section>

{{HEADLINE_IMAGE}}
{{BODY_SECTIONS}}

<section style="background: #ffffff; padding: 22px 20px 10px;">
<section style="background: #fff7ed; border-left: 4px solid #ea580c; padding: 16px 16px 14px;">
<p style="font-size: 16px; font-weight: 800; color: #7c2d12; margin: 0 0 8px;">一句话判断</p>
<p style="font-size: 14px; color: #555; line-height: 1.9; margin: 0;">{{CONCLUSION}}</p>
</section>
</section>

<section style="background: #ffffff; padding: 0 20px 28px;">
<p style="font-size: 14px; color: #3f3f3f; line-height: 1.9; margin: 0;">{{CTA}}</p>
</section>

<section style="background: #2b0b0b; padding: 25px 20px; text-align: center;">
<section style="width: 32px; height: 2px; background: #ffd166; margin: 0 auto 12px;"></section>
<p style="font-size: 12px; color: rgba(255,255,255,0.55); margin: 0 0 5px; letter-spacing: 1px;">THE BREAKING WATCH · 快讯追踪</p>
<p style="font-size: 11px; color: rgba(255,255,255,0.34); margin: 0 0 5px;">第一时间判断影响，不只重复新闻</p>
<p style="font-size: 11px; color: rgba(255,255,255,0.24); margin: 0;">by {{AUTHOR}} · {{DATE_SHORT}}</p>
</section>

</section>
