<!--
  行业雷达微信公众号模板 - THE INDUSTRY RADAR
  适用于行业观察、公司动态汇总、赛道扫描、周度复盘

  使用说明：
  - 头条区给出本期行业主线
  - 正文适合多 section、多卡片编排
  - 可混合使用 card / opinion / image / takeaways
-->

<section style="max-width: 100%; margin: 0 auto; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', sans-serif; background: #f7f5ef;">

<section style="background: linear-gradient(135deg, #1b2430 0%, #2f3e46 55%, #5a6c57 100%); padding: 38px 20px 30px; text-align: center;">
<p style="font-size: 11px; color: rgba(255,255,255,0.56); letter-spacing: 8px; text-transform: uppercase; margin: 0 0 8px;">THE INDUSTRY RADAR</p>
<p style="font-size: 30px; font-weight: 900; color: #ffffff; margin: 0; letter-spacing: 2px;">行业雷达</p>
<section style="width: 44px; height: 2px; background: #f4d35e; margin: 12px auto;"></section>
<p style="font-size: 13px; color: rgba(255,255,255,0.73); margin: 0;">{{DATE_CN}}</p>
<p style="font-size: 11px; color: rgba(255,255,255,0.46); margin: 8px 0 0; letter-spacing: 1px;">赛道扫描 · 公司动态 · 趋势判断</p>
</section>

<section style="background: #ffffff; margin: 0; padding: 28px 20px 24px; border-bottom: 3px double #2f3e46;">
<p style="font-size: 10px; color: #6c7a45; letter-spacing: 5px; text-transform: uppercase; margin: 0 0 10px; font-weight: 700;">RADAR LOCK · 主线</p>
<p style="font-size: 26px; font-weight: 900; color: #1f2933; line-height: 1.35; margin: 0 0 12px;">{{HEADLINE_TITLE}}</p>
<p style="font-size: 15px; color: #556b2f; line-height: 1.9; margin: 0 0 14px;">{{SUBTITLE}}</p>
<section style="width: 100%; height: 1px; background: linear-gradient(to right, #f4d35e, transparent); margin: 0 0 16px;"></section>
{{HEADLINE_BODY}}
<p style="font-size: 11px; color: #999; margin: 12px 0 0; text-align: right;">{{HEADLINE_SOURCE}}</p>
</section>

{{HEADLINE_IMAGE}}
{{BODY_SECTIONS}}

<section style="background: #ffffff; padding: 22px 20px 12px;">
<section style="background: #f9f6e8; border: 1px solid rgba(84,99,44,0.12); border-radius: 10px; padding: 18px;">
<p style="font-size: 16px; font-weight: 800; color: #3f4a1e; margin: 0 0 8px;">本期观察</p>
<p style="font-size: 14px; color: #555; line-height: 1.9; margin: 0;">{{CONCLUSION}}</p>
</section>
</section>

<section style="background: #ffffff; padding: 0 20px 28px;">
<p style="font-size: 14px; color: #3f3f3f; line-height: 1.9; margin: 0;">{{CTA}}</p>
</section>

<section style="background: #1b2430; padding: 25px 20px; text-align: center;">
<section style="width: 32px; height: 2px; background: #f4d35e; margin: 0 auto 12px;"></section>
<p style="font-size: 12px; color: rgba(255,255,255,0.55); margin: 0 0 5px; letter-spacing: 1px;">THE INDUSTRY RADAR · 行业雷达</p>
<p style="font-size: 11px; color: rgba(255,255,255,0.34); margin: 0 0 5px;">抓主线、看变量、筛噪音</p>
<p style="font-size: 11px; color: rgba(255,255,255,0.24); margin: 0;">by {{AUTHOR}} · {{DATE_SHORT}}</p>
</section>

</section>
