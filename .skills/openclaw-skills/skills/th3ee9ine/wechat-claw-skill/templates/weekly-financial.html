<!--
  财经周报微信公众号模板 - THE WEEKLY FINANCIAL REVIEW
  世界级报刊风格 v1.0

  使用说明：
  - 替换 {{DATE_CN}} 为中文日期（如：2026 年 3 月 15 日 · 周末特刊）
  - 替换 {{DATE_SHORT}} 为短日期（如：2026.03.15）
  - 头条区域放最重磅的一条，展开写3段
  - 其余按分区填入卡片
  - 建议分区：全球市场 / 中国经济 / 产业动态 / 下周前瞻
  - 重点条目用红色编号（#e94560），普通用深蓝（#1a1a2e）
  - 建议配图位置：头条后、中国经济区前、下周前瞻区前

  配色方案：
  - 主色：#1a0a0a（深红黑）
  - 渐变：#1a0a0a → #3d0c0c → #5a1a1a
  - 强调色：#e94560（信号红）
  - 正文色：#555
  - 标题色：#1a1a2e
  - 背景色：#f8f7f4（暖白）
-->

<section style="max-width: 100%; margin: 0 auto; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', sans-serif; background: #f8f7f4;">

<!-- ==================== 报头 Masthead ==================== -->
<section style="background: linear-gradient(135deg, #1a0a0a 0%, #3d0c0c 50%, #5a1a1a 100%); padding: 35px 20px 30px; text-align: center;">
<p style="font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 8px; text-transform: uppercase; margin: 0 0 8px;">THE WEEKLY FINANCIAL REVIEW</p>
<p style="font-size: 28px; font-weight: 900; color: #ffffff; margin: 0; letter-spacing: 2px;">财经周报</p>
<section style="width: 40px; height: 2px; background: #e94560; margin: 12px auto;"></section>
<p style="font-size: 13px; color: rgba(255,255,255,0.6); margin: 0; letter-spacing: 3px;">{{DATE_CN}}</p>
<p style="font-size: 11px; color: rgba(255,255,255,0.35); margin: 8px 0 0; letter-spacing: 1px;">全球视野 · 深度解读 · 下周前瞻</p>
</section>

<!-- ==================== 头条 HEADLINE ==================== -->
<section style="background: #ffffff; margin: 0; padding: 25px 20px 20px; border-bottom: 3px double #1a0a0a;">
<p style="font-size: 10px; color: #e94560; letter-spacing: 5px; text-transform: uppercase; margin: 0 0 10px; font-weight: 700;">HEADLINE · 头条</p>
<p style="font-size: 22px; font-weight: 900; color: #1a1a2e; line-height: 1.4; margin: 0 0 12px;">{{HEADLINE_TITLE}}</p>
<section style="width: 100%; height: 1px; background: linear-gradient(to right, #e94560, transparent); margin: 0 0 12px;"></section>
{{HEADLINE_BODY}}
<p style="font-size: 11px; color: #999; margin: 10px 0 0; text-align: right;">{{HEADLINE_SOURCE}}</p>
</section>
{{HEADLINE_IMAGE}}
