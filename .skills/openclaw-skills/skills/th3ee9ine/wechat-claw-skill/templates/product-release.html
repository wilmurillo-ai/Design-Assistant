<!--
  产品发布微信公众号模板 - THE PRODUCT RELEASE
  适用于版本更新、产品上线、功能发布、路线图说明

  使用说明：
  - 头条区说明“这次发了什么”和“用户能得到什么”
  - 正文建议按：核心更新 / 使用场景 / 细节补充 / 价格或计划
  - 适合图文较多的产品文章
-->

<section style="max-width: 100%; margin: 0 auto; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', sans-serif; background: #f3f7f6;">

<section style="background: linear-gradient(135deg, #052e2b 0%, #0f766e 55%, #14b8a6 100%); padding: 38px 20px 30px; text-align: center;">
<p style="font-size: 11px; color: rgba(255,255,255,0.58); letter-spacing: 8px; text-transform: uppercase; margin: 0 0 8px;">THE PRODUCT RELEASE</p>
<p style="font-size: 30px; font-weight: 900; color: #ffffff; margin: 0; letter-spacing: 2px;">产品发布</p>
<section style="width: 44px; height: 2px; background: #fef08a; margin: 12px auto;"></section>
<p style="font-size: 13px; color: rgba(255,255,255,0.75); margin: 0;">{{DATE_CN}}</p>
<p style="font-size: 11px; color: rgba(255,255,255,0.46); margin: 8px 0 0; letter-spacing: 1px;">功能更新 · 场景展示 · 路线图</p>
</section>

<section style="background: #ffffff; margin: 0; padding: 28px 20px 24px; border-bottom: 3px double #115e59;">
<p style="font-size: 10px; color: #0f766e; letter-spacing: 5px; text-transform: uppercase; margin: 0 0 10px; font-weight: 700;">LAUNCH · 发布</p>
<p style="font-size: 26px; font-weight: 900; color: #062c30; line-height: 1.35; margin: 0 0 12px;">{{HEADLINE_TITLE}}</p>
<p style="font-size: 15px; color: #0f766e; line-height: 1.9; margin: 0 0 14px;">{{SUBTITLE}}</p>
<section style="width: 100%; height: 1px; background: linear-gradient(to right, #14b8a6, transparent); margin: 0 0 16px;"></section>
{{HEADLINE_BODY}}
<p style="font-size: 11px; color: #999; margin: 12px 0 0; text-align: right;">{{HEADLINE_SOURCE}}</p>
</section>

{{HEADLINE_IMAGE}}
{{BODY_SECTIONS}}

<section style="background: #ffffff; padding: 22px 20px 12px;">
<section style="background: linear-gradient(135deg, #ecfeff 0%, #f0fdfa 100%); border: 1px solid rgba(15,118,110,0.12); border-radius: 10px; padding: 18px;">
<p style="font-size: 16px; font-weight: 800; color: #134e4a; margin: 0 0 8px;">这次更新最重要的点</p>
<p style="font-size: 14px; color: #555; line-height: 1.9; margin: 0;">{{CONCLUSION}}</p>
</section>
</section>

<section style="background: #ffffff; padding: 0 20px 28px;">
<p style="font-size: 14px; color: #3f3f3f; line-height: 1.9; margin: 0;">{{CTA}}</p>
</section>

<section style="background: #052e2b; padding: 25px 20px; text-align: center;">
<section style="width: 32px; height: 2px; background: #fef08a; margin: 0 auto 12px;"></section>
<p style="font-size: 12px; color: rgba(255,255,255,0.55); margin: 0 0 5px; letter-spacing: 1px;">THE PRODUCT RELEASE · 产品发布</p>
<p style="font-size: 11px; color: rgba(255,255,255,0.34); margin: 0 0 5px;">讲清楚更新，不堆砌功能名词</p>
<p style="font-size: 11px; color: rgba(255,255,255,0.24); margin: 0;">by {{AUTHOR}} · {{DATE_SHORT}}</p>
</section>

</section>
