<!--
  深度分析微信公众号模板 - THE SIGNAL REVIEW
  长文深度分析版 v1.0

  使用说明：
  - 适合单主题深度分析、行业复盘、趋势拆解
  - 头条区放核心结论和问题意识
  - 正文区建议交替使用：段落 / 观点卡 / 引述 / 配图 / 结论框
  - 关键数据依旧使用 <strong style="color: #e94560;">数据</strong> 标红
-->

<section style="max-width: 100%; margin: 0 auto; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', sans-serif; background: #f7f4ef;">

<section style="background: linear-gradient(135deg, #0f172a 0%, #172554 50%, #1e3a8a 100%); padding: 38px 20px 30px; text-align: center;">
<p style="font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 7px; text-transform: uppercase; margin: 0 0 8px;">THE SIGNAL REVIEW</p>
<p style="font-size: 28px; font-weight: 900; color: #ffffff; margin: 0; letter-spacing: 2px;">深度分析</p>
<section style="width: 40px; height: 2px; background: #e94560; margin: 12px auto;"></section>
<p style="font-size: 13px; color: rgba(255,255,255,0.7); margin: 0;">{{DATE_CN}}</p>
<p style="font-size: 12px; color: rgba(255,255,255,0.45); margin: 10px 0 0;">{{AUTHOR}} · 长文拆解</p>
</section>

<section style="background: #ffffff; margin: 0; padding: 28px 20px 24px; border-bottom: 3px double #0f172a;">
<p style="font-size: 10px; color: #e94560; letter-spacing: 5px; text-transform: uppercase; margin: 0 0 10px; font-weight: 700;">ANALYSIS · 深读</p>
<p style="font-size: 26px; font-weight: 900; color: #0f172a; line-height: 1.35; margin: 0 0 12px;">{{HEADLINE_TITLE}}</p>
<p style="font-size: 15px; color: #64748b; line-height: 1.9; margin: 0 0 14px;">{{SUBTITLE}}</p>
<section style="width: 100%; height: 1px; background: linear-gradient(to right, #e94560, transparent); margin: 0 0 16px;"></section>
{{HEADLINE_BODY}}
<p style="font-size: 11px; color: #999; margin: 12px 0 0; text-align: right;">{{HEADLINE_SOURCE}}</p>
</section>

{{HEADLINE_IMAGE}}
{{BODY_SECTIONS}}

<section style="background: #ffffff; padding: 22px 20px 12px;">
<section style="background: #f7f4ef; border-radius: 8px; padding: 18px; border: 1px solid rgba(15,23,42,0.08);">
<p style="font-size: 16px; font-weight: 800; color: #0f172a; margin: 0 0 8px;">结论</p>
<p style="font-size: 14px; color: #555; line-height: 1.9; margin: 0;">{{CONCLUSION}}</p>
</section>
</section>

<section style="background: #ffffff; padding: 0 20px 28px;">
<p style="font-size: 14px; color: #3f3f3f; line-height: 1.9; margin: 0;">{{CTA}}</p>
</section>

<section style="background: #0f172a; padding: 25px 20px; text-align: center;">
<section style="width: 30px; height: 2px; background: #e94560; margin: 0 auto 12px;"></section>
<p style="font-size: 12px; color: rgba(255,255,255,0.5); margin: 0 0 5px; letter-spacing: 1px;">THE SIGNAL REVIEW · 深度分析</p>
<p style="font-size: 11px; color: rgba(255,255,255,0.3); margin: 0 0 5px;">单一主题 · 深入拆解 · 观点提炼</p>
<p style="font-size: 11px; color: rgba(255,255,255,0.25); margin: 0;">by {{AUTHOR}} · {{DATE_SHORT}}</p>
</section>

</section>
