<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, {{bg_start}} 0%, {{bg_end}} 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }
        
        .card {
            width: 800px;
            height: 1000px;
            background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 60px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .tag {
            display: inline-block;
            background: linear-gradient(135deg, {{bg_start}} 0%, {{bg_end}} 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            align-self: flex-start;
            margin-bottom: 24px;
        }
        
        .title {
            font-size: 48px;
            font-weight: 800;
            color: #1a1a2e;
            line-height: 1.2;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #1a1a2e 0%, #4a4a6a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .divider {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, {{bg_start}} 0%, {{bg_end}} 100%);
            border-radius: 2px;
            margin-bottom: 32px;
        }
        
        .content {
            font-size: 22px;
            color: #4a4a6a;
            line-height: 1.8;
            flex: 1;
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 32px;
            border-top: 1px solid #eee;
        }
        
        .author {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, {{bg_start}} 0%, {{bg_end}} 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 700;
        }
        
        .author-info {
            font-size: 16px;
            color: #1a1a2e;
            font-weight: 600;
        }
        
        .date {
            font-size: 14px;
            color: #888;
        }
        
        .emoji {
            font-size: 64px;
            position: absolute;
            bottom: 60px;
            right: 60px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="tag">{{tag}}</span>
        <h1 class="title">{{title}}</h1>
        <div class="divider"></div>
        <div class="content">
            {{content}}
        </div>
        <div class="footer">
            <div class="author">
                <div class="avatar">{{author_initial}}</div>
                <div class="author-info">
                    <div>{{author}}</div>
                    <div class="date">{{date}}</div>
                </div>
            </div>
        </div>
        <div class="emoji">{{emoji}}</div>
    </div>
</body>
</html>
