name: strategic-analyst
description: 麦肯锡风格的战略分析专家，支持多模态数据获取，强制基于网络搜索获取真实数据
version: 0.3.0

# 依赖的其他skills（自动激活）
skills:
  - web-search        # DuckDuckGo搜索（备用）
  - agent-browser     # 浏览器自动化，访问动态网页
  - summarize         # 长文摘要和PDF内容提取

# 原生工具强制要求
# 执行分析时必须优先调用以下原生工具获取真实数据：
# - WebSearch: Claude Code内置网页搜索（通过DuckDuckGo，首选）
# - WebFetch: 抓取并解析特定URL内容
# - mcpServers:
#   - tavily: 深度研究级搜索（用户需在settings.json自行配置Tavily API Key）
#   - open-websearch: 开放网络搜索（settings.json已配置）

# 执行策略
execution:
  # 允许自动调用依赖skills的工具
  auto_invoke_skills: true
  # 数据提取时自动选择合适的工具
  tool_selection: automatic

# 数据获取配置
data_collection:
  # 启用多模态数据提取
  multimodal_enabled: true
  # 强制搜索：若无法获取至少2个独立来源的数据，必须循环搜索直至获得真实数据
  require_real_time_search: true
  # 数据源类型与处理工具映射
  source_handlers:
    pdf_report:
      tool: summarize
      description: 券商研报、咨询机构PDF报告
      extract_target: [表格数据, 关键数字, 图表标题]
    web_page:
      tool: agent-browser
      description: 动态网页、需要交互的数据源网站
      extract_target: [结构化表格, 图表, 交互式数据]
      fallback: WebFetch  # 若agent-browser失败，回退到WebFetch
    image_chart:
      tool: summarize  # 通过URL分析图片内容
      description: 图片格式的图表、信息图
      extract_target: [数字, 趋势, 标签]
    search_result:
      tool: WebSearch  # 首选原生网页搜索工具
      description: 搜索引擎发现的文本数据
      extract_target: [市场规模, 增长率, 竞争数据]
      fallback: web-search

# 输出配置
output:
  # 自动通过质量门禁检查
  quality_gate_enabled: true
  # 标准报告格式
  report_format: standard_structure
  # HTML 风格规范
  html_style:
    # 参考 docs/html_style_guide.md
    color_scheme: 黑红灰  # 主色#000, 强调色#cc0000, 辅助灰阶
    table_style: 金融研报线框  # 白底黑字, 表头底部2px黑线, 无全包围边框
    cover_design: 极简扁平  # 白底左对齐, 底部2px黑线分隔
    content_density: 紧凑  # 小字号(13px), 少留白, 段落优先于表格
    # 核心约束
    avoid_tables_for: [五力综合评估, 竞争者画像, 能力差距分析]  # 这些模块用文字叙述
    required_tables: [数据来源溯源, 市场份额, 增长预测, PESTEL, 机会/风险评估]
    banned_sections: [建议行动清单, 下一步行动]
