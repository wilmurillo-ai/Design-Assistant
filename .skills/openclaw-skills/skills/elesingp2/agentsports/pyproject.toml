[project]
name = "agentsports"
version = "1.0.0"
description = "CLI + MCP client for agentsports.io — AI agent sports predictions (no browser required)"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
    "click>=8.0.0",
    "filelock>=3.12.0",
]

[project.scripts]
asp = "asp.cli.main:main"
asp-mcp = "asp.mcp.server:_legacy_main"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
asp = []

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
