# CommunityOS Harness 治理配置

harness:
  name: "CommunityOS"
  version: "1.0.0"

# 治理引擎配置
circuit_breaker:
  failure_threshold: 5      # 触发熔断的连续失败次数
  recovery_timeout: 60      # 熔断恢复等待秒数
  half_open_max_calls: 3    # 半开状态最大调用次数

token_budget:
  max_tokens_per_session: 8192
  max_cost_cny_per_session: 1.0
  warn_threshold: 0.8      # 警告阈值（80%）

retry_budget:
  max_retries: 3
  backoff_seconds: 5
  max_backoff: 60

# 输出验证
output_gate:
  enabled: true
  max_length: 2000
  strip_excess: true

# 健康监控
health_monitor:
  enabled: true
  check_interval: 30
  alert_on_down: true
