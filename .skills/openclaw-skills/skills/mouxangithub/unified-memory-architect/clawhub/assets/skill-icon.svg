<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a3a"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>
  <!-- Circuit traces -->
  <g stroke="#ffffff08" stroke-width="1" fill="none">
    <path d="M50 100 H150 V200 H200"/>
    <path d="M462 100 H350 V180 H280"/>
    <path d="M50 400 H130 V320 H220"/>
    <path d="M462 420 H360 V350 H280"/>
    <path d="M256 50 V100"/>
    <path d="M256 412 V462"/>
  </g>
  <!-- Brain network nodes and connections -->
  <g fill="none" stroke="url(#nodeGrad)" stroke-width="2" opacity="0.6">
    <!-- Outer connections -->
    <line x1="150" y1="180" x2="256" y2="140"/>
    <line x1="362" y1="180" x2="256" y2="140"/>
    <line x1="150" y1="332" x2="256" y2="372"/>
    <line x1="362" y1="332" x2="256" y2="372"/>
    <line x1="150" y1="180" x2="150" y2="332"/>
    <line x1="362" y1="180" x2="362" y2="332"/>
    <!-- Cross connections -->
    <line x1="150" y1="180" x2="362" y2="332"/>
    <line x1="362" y1="180" x2="150" y2="332"/>
    <!-- Inner connections -->
    <line x1="256" y1="140" x2="256" y2="372"/>
    <line x1="150" y1="180" x2="362" y2="180"/>
    <line x1="150" y1="332" x2="362" y2="332"/>
  </g>
  <!-- Nodes -->
  <g filter="url(#glow)">
    <!-- Center node -->
    <circle cx="256" cy="256" r="40" fill="#1a1a3a" stroke="#00d4ff" stroke-width="3"/>
    <circle cx="256" cy="256" r="20" fill="url(#nodeGrad)"/>
    <!-- Top node -->
    <circle cx="256" cy="140" r="28" fill="#1a1a3a" stroke="#a855f7" stroke-width="2"/>
    <circle cx="256" cy="140" r="12" fill="#a855f7"/>
    <!-- Bottom node -->
    <circle cx="256" cy="372" r="28" fill="#1a1a3a" stroke="#a855f7" stroke-width="2"/>
    <circle cx="256" cy="372" r="12" fill="#a855f7"/>
    <!-- Left top node -->
    <circle cx="150" cy="180" r="24" fill="#1a1a3a" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="150" cy="180" r="10" fill="#00d4ff"/>
    <!-- Right top node -->
    <circle cx="362" cy="180" r="24" fill="#1a1a3a" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="362" cy="180" r="10" fill="#00d4ff"/>
    <!-- Left bottom node -->
    <circle cx="150" cy="332" r="24" fill="#1a1a3a" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="150" cy="332" r="10" fill="#00d4ff"/>
    <!-- Right bottom node -->
    <circle cx="362" cy="332" r="24" fill="#1a1a3a" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="362" cy="332" r="10" fill="#00d4ff"/>
  </g>
  <!-- Label -->
  <text x="256" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" letter-spacing="4">MEMORY ARCHITECT</text>
  <text x="256" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff60" letter-spacing="2">UNIFIED MEMORY SYSTEM</text>
</svg>
