name: enterprise_qualification_ocr
version: 1.0.4
description: 将图片中的文字、营业执照、社会团体法人登记证书、工会法人资格证书、宗教活动场所登记证、民办非企业单位登记证书、事业单位法人证书、统一社会信用代码证书等信息识别并提取出来。本技能应在用户需要 OCR 识别图片中的文字，或识别营业执照、社会团体法人登记证书、工会法人资格证书、宗教活动场所登记证、民办非企业单位登记证书、事业单位法人证书、统一社会信用代码证书时使用。
author: SCNet
license: MIT
tags:
  - ocr
  - 文字提取
# 增加项目主页，解决 missing homepage 警告
homepage: https://github.com/SCNet-sugon/enterprise_qualification_ocr.git  # 请替换为实际仓库地址

dependencies:
  - python3
  - requests