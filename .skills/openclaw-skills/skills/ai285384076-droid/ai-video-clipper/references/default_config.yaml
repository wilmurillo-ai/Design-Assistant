# AI视频剪辑 - 默认配置文件
# 首次使用时请根据需求修改以下配置

# ============ 基础设置 ============
# 素材目录（必填）
input_dir: "D:\电影"

# 输出目录
output_dir: "D:\AI视频剪辑"

# 存储路径（最终成品存放位置）
storage_path: "D:\AI视频剪辑\成品"

# 剪辑主题（用于命名）
theme: "搞笑集锦"

# ============ 剪辑参数 ============
# 目标时长（秒）
target_duration: 180  # 3分钟

# 剪辑风格
# auto: 自动匹配
# quick: 快节奏卡点
# slow: 慢节奏舒缓
# narrative: 叙事风格
style: "auto"

# 转场效果
# fade: 淡入淡出
# dissolve: 叠化
# cut: 直接切换
# flash: 闪白
transition: "fade"

# 转场时长（秒）
transition_duration: 0.5

# 最小/最大片段时长（秒）
min_clip_duration: 2
max_clip_duration: 15

# 淡入淡出时长（秒）
fade_in: 1.0
fade_out: 1.0

# ============ 音频设置 ============
# 背景音乐
bgm_enabled: true
bgm_path: "D:\AI视频剪辑\素材\背景音乐"
bgm_volume: 0.3

# 人声设置
voice_volume: 1.0
noise_reduction: true
enhance_voice: true

# ============ 字幕设置 ============
# 字幕生成
subtitle_enabled: true
subtitle_language: "zh"  # zh: 中文, en: 英文, auto: 自动检测
subtitle_burn: true  # 是否烧录到视频

# 字幕样式
subtitle_style:
  font_size: 36
  color: "white"
  position: "bottom_center"  # bottom_center, top_center, center

# ============ 特效设置 ============
# 滤镜预设
# auto: 自动匹配
# vivid: 鲜艳
# vintage: 复古
# cool: 冷色调
# warm: 暖色调
# bw: 黑白
# cinema: 电影感
filter: "auto"

# 特效列表（可多选）
# vignette: 暗角
# blur: 模糊
# glow: 光晕
# zoom: 缩放
effects: []

# 画面调整
brightness: 0      # -1 to 1
contrast: 1.0       # 0 to 2
saturation: 1.0     # 0 to 2
sharpness: 1.0      # 0 to 2

# ============ 导出设置 ============
# 导出预设
# high: 高质量（慢速编码）
# medium: 标准质量
# low: 低质量（快速编码）
export_preset: "high"

# 导出格式
export_format: "mp4"

# 输出分辨率（空=保持原分辨率）
export_resolution: ""

# 输出帧率（0=保持原帧率）
export_fps: 0

# ============ 高级设置 ============
# 自动清理临时文件
auto_cleanup: true

# 生成预览
generate_preview: false

# ============ 场景预设 ============
# 搞笑集锦
preset_funny:
  target_duration: 180
  style: "quick"
  transition: "cut"
  filter: "vivid"
  effects: []

# 电影解说
preset_movie_review:
  target_duration: 600
  style: "narrative"
  transition: "fade"
  subtitle_enabled: true
  filter: "cinema"

# 短视频
preset_short:
  target_duration: 60
  style: "quick"
  transition: "flash"
  filter: "vivid"
  effects: ["vignette"]

# Vlog
preset_vlog:
  target_duration: 300
  style: "auto"
  transition: "dissolve"
  filter: "warm"
  bgm_enabled: true
