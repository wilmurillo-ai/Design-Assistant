[project]
name = "openclaw-skill-lingua-universale"
version = "0.1.0"
description = "OpenClaw/MCP skill for Lingua Universale protocol verification"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "CervellaSwarm Contributors" }]
keywords = ["mcp", "lingua-universale", "ai-agents", "session-types", "protocol-verification"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0",
    "cervellaswarm-lingua-universale>=0.3.3",
]

[project.urls]
Homepage = "https://github.com/rafapra3008/cervellaswarm"
Repository = "https://github.com/rafapra3008/cervellaswarm"

[project.scripts]
lu-mcp = "lu_mcp_server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["lu_mcp_server.py"]
