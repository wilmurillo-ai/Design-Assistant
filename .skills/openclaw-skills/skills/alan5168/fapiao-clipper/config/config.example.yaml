# ============================================================
# 发票夹子 · 配置文件 (v1.2)
# 使用：cp config/config.yaml.example config/config.yaml 然后填写
# ============================================================

# 存储路径
storage:
  base_dir: ~/Documents/发票夹子
  db_path: ~/Documents/发票夹子/invoices.db

# ============================================================
# PDF 提取引擎 (v1.2 新增)
# ============================================================
pdf_extractor:
  # 引擎选择：
  #   pymupdf      - PyMuPDF（默认，毫秒级速度，无需 Java）
  #   opendataloader - OpenDataLoader（有序输出，表格结构，需 Java）
  engine: pymupdf
  
  # OpenDataLoader 配置（仅在 engine=opendataloader 时生效）
  # 安装：pip install opendataloader-pdf && brew install openjdk@11
  opendataloader:
    # Java 路径（brew 安装后的默认路径）
    java_home: /opt/homebrew/opt/openjdk@11/libexec/openjdk.jdk/Contents/Home
    # 批量处理时一次 JVM 启动处理多文件，减少开销
    batch_size: 10
    # 是否输出 JSON（带 bounding boxes，用于字段定位验证）
    include_json: false

# ============================================================
# AI 识别配置 (v1.1)
# ============================================================
ocr:
  # 引擎选择：
  #   ollama      - 本地 Ollama（完全免费，需安装 ollama）
  #   siliconflow - 基流动（推荐，免费额度够用，新用户送¥16）
  #   paddleocr   - 本地 PaddleOCR（完全免费，无需网络）
  provider: ollama

  # ── 本地 Ollama（完全免费）──────────────────────────────
  # 安装：brew install ollama
  # 拉取模型：ollama pull glm-ocr:latest && ollama pull qwen3-vl:latest
  ollama:
    base_url: http://127.0.0.1:11434
    glm_model: glm-ocr:latest    # 第2级主力 OCR 引擎
    qwen_model: qwen3-vl:latest  # 第4级 fallback 引擎

  # ── TurboQuant Ollama（可选，32GB 内存优化）─────────────
  # KV Cache 压缩 4-5x，适合 32GB 以下机器
  turboquant:
    enabled: false
    base_url: http://127.0.0.1:8080
    glm_model: glm-ocr:latest
    qwen_model: qwen3-vl:latest

  # ── 硅基流动（备选）─────────────────────────────────────
  siliconflow:
    api_key: "YOUR_SILICONFLOW_API_KEY"
    base_url: https://api.siliconflow.cn/v1
    vision_model: "Pro/PaddleOCR-VL-1.5"
    text_model: "Pro/deepseek-ai/DeepSeek-V3.2"

  # ── 本地 PaddleOCR（最终兜底）───────────────────────────
  paddleocr:
    enabled: true

# ============================================================
# 发票监控目录
# ============================================================
watch_dirs:
  - ~/Downloads
  - ~/Desktop/待处理发票

# ============================================================
# 邮件监控（可选）
# ============================================================
email:
  enabled: false
  imap_server: imap.mail.me.com
  imap_port: 993
  username: YOUR_EMAIL@icloud.com
  password: YOUR_APP_PASSWORD
  folder: INBOX
  download_dir: ~/Documents/发票夹子/inbox
  auto_follow_links: true

# ============================================================
# 验真与风控
# ============================================================
verification:
  validity_days: 365
  personal_exceptions:
    - 差旅
    - 交通
    - 住宿
    - 通讯
    - 出行