<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Website description">
  <title>Website Title</title>
  <style>
    /* ==================== 
       CSS Variables (Theme Configuration)
       ==================== */
    :root {
      /* Colors */
      --color-primary: #2563eb;
      --color-primary-dark: #1d4ed8;
      --color-text: #1f2937;
      --color-text-light: #6b7280;
      --color-bg: #ffffff;
      --color-bg-alt: #f9fafb;
      --color-border: #e5e7eb;

      /* Spacing */
      --spacing-xs: 0.25rem;
      --spacing-sm: 0.5rem;
      --spacing-md: 1rem;
      --spacing-lg: 1.5rem;
      --spacing-xl: 2rem;
      --spacing-2xl: 3rem;

      /* Typography */
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-size-sm: 0.875rem;
      --font-size-base: 1rem;
      --font-size-lg: 1.125rem;
      --font-size-xl: 1.25rem;
      --font-size-2xl: 1.5rem;
      --font-size-3xl: 2rem;

      /* Border Radius */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);

      /* Transitions */
      --transition-fast: 150ms ease;
      --transition-base: 200ms ease;
      --transition-slow: 300ms ease;

      /* Layout */
      --header-height: 64px;
      --container-max: 1200px;
    }

    /* ==================== 
       Base Reset
       ==================== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      line-height: 1.6;
      color: var(--color-text);
      background-color: var(--color-bg);
      -webkit-font-smoothing: antialiased;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    ul,
    ol {
      list-style: none;
    }

    button {
      font: inherit;
      cursor: pointer;
      border: none;
      background: none;
    }

    /* ==================== 
       Layout Components
       ==================== */
    .container {
      width: 100%;
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 0 var(--spacing-lg);
    }

    /* ==================== 
       Navigation Bar
       ==================== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      z-index: 100;
    }

    .navbar__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
    }

    .navbar__logo {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--color-primary);
    }

    .navbar__menu {
      display: flex;
      gap: var(--spacing-xl);
    }

    .navbar__link {
      font-weight: 500;
      transition: color var(--transition-base);
    }

    .navbar__link:hover {
      color: var(--color-primary);
    }

    .navbar__toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      padding: var(--spacing-sm);
    }

    .navbar__toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--color-text);
      transition: var(--transition-base);
    }

    /* ==================== 
       Main Content
       ==================== */
    .main {
      padding-top: var(--header-height);
      min-height: 100vh;
    }

    /* Hero Section */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--spacing-2xl);
      min-height: calc(100vh - var(--header-height));
    }

    .hero__title {
      font-size: var(--font-size-3xl);
      font-weight: 700;
      margin-bottom: var(--spacing-md);
    }

    .hero__subtitle {
      font-size: var(--font-size-lg);
      color: var(--color-text-light);
      max-width: 600px;
      margin-bottom: var(--spacing-xl);
    }

    /* ==================== 
       Button Components
       ==================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-md) var(--spacing-xl);
      font-size: var(--font-size-base);
      font-weight: 500;
      border-radius: var(--radius-md);
      transition: all var(--transition-base);
    }

    .btn--primary {
      background: var(--color-primary);
      color: white;
    }

    .btn--primary:hover {
      background: var(--color-primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .btn--outline {
      background: transparent;
      border: 2px solid var(--color-primary);
      color: var(--color-primary);
    }

    .btn--outline:hover {
      background: var(--color-primary);
      color: white;
    }

    /* ==================== 
       Footer
       ==================== */
    .footer {
      background: var(--color-bg-alt);
      padding: var(--spacing-xl) 0;
      text-align: center;
      color: var(--color-text-light);
    }

    /* ==================== 
       Responsive Design
       ==================== */
    @media (max-width: 768px) {
      .navbar__menu {
        display: none;
        position: absolute;
        top: var(--header-height);
        left: 0;
        right: 0;
        flex-direction: column;
        background: var(--color-bg);
        padding: var(--spacing-lg);
        border-bottom: 1px solid var(--color-border);
      }

      .navbar__menu.active {
        display: flex;
      }

      .navbar__toggle {
        display: flex;
      }

      .hero__title {
        font-size: var(--font-size-2xl);
      }
    }
  </style>
</head>

<body>
  <!-- Navigation Bar -->
  <header class="navbar">
    <div class="navbar__inner container">
      <a href="#" class="navbar__logo">Logo</a>
      <nav>
        <ul class="navbar__menu" id="navMenu">
          <li><a href="#" class="navbar__link">Home</a></li>
          <li><a href="#" class="navbar__link">Products</a></li>
          <li><a href="#" class="navbar__link">About</a></li>
          <li><a href="#" class="navbar__link">Contact</a></li>
        </ul>
      </nav>
      <button class="navbar__toggle" id="navToggle" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <section class="hero">
      <h1 class="hero__title">Welcome</h1>
      <p class="hero__subtitle">This is a basic static website template built with pure HTML, CSS, and JavaScript.</p>
      <div class="hero__actions">
        <a href="#" class="btn btn--primary">Get Started</a>
        <a href="#" class="btn btn--outline" style="margin-left: 1rem;">Learn More</a>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Website Name. All rights reserved.</p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script>
    // Mobile menu toggle
    const navToggle = document.getElementById('navToggle');
    const navMenu = document.getElementById('navMenu');

    navToggle.addEventListener('click', () => {
      navMenu.classList.toggle('active');
      navToggle.classList.toggle('active');
    });

    // Close menu when a menu item is clicked
    navMenu.querySelectorAll('.navbar__link').forEach(link => {
      link.addEventListener('click', () => {
        navMenu.classList.remove('active');
        navToggle.classList.remove('active');
      });
    });

    // Add shadow to navigation bar on scroll
    let lastScroll = 0;
    window.addEventListener('scroll', () => {
      const navbar = document.querySelector('.navbar');
      const currentScroll = window.pageYOffset;

      if (currentScroll > 10) {
        navbar.style.boxShadow = 'var(--shadow-sm)';
      } else {
        navbar.style.boxShadow = 'none';
      }

      lastScroll = currentScroll;
    });
  </script>
</body>

</html>
