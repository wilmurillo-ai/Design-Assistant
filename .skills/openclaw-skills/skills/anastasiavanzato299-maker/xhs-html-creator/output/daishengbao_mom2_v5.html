<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1350">
<title>妈妈物品篇 2/2 v5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; background: #FFF5F5; font-family: 'Noto Sans SC', sans-serif; overflow: hidden; position: relative; }
.bg-texture { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(200,100,120,0.05) 28px, rgba(200,100,120,0.05) 29px); }
.tape { position: absolute; width: 150px; height: 36px; background: rgba(255,200,200,0.85); transform: rotate(-2deg); box-shadow: 0 2px 5px rgba(0,0,0,0.12); }
.tape-1 { top: 18px; left: 28px; }
.tape-2 { top: 18px; right: 28px; transform: rotate(2deg); }
.header-bar { position: absolute; top: 0; left: 0; right: 0; height: 130px; background: linear-gradient(135deg, #E87A8A, #D46A7A); display: flex; align-items: center; justify-content: center; }
.header-bar h1 { font-size: 64px; color: white; font-weight: 900; letter-spacing: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
.page-num { position: absolute; top: 140px; right: 50px; font-size: 28px; color: #D46A7A; font-weight: 900; }
.content-area { position: absolute; top: 148px; left: 40px; right: 40px; }
.section-header { font-size: 24px; font-weight: 900; color: white; background: #B85C70; padding: 7px 20px; border-radius: 8px; margin-bottom: 12px; }
.item-row { display: flex; align-items: center; margin-bottom: 14px; background: #FFFDF5; border-radius: 14px; padding: 16px 20px; box-shadow: 0 3px 8px rgba(0,0,0,0.07); }
.item-num { min-width: 42px; height: 42px; background: #B85C70; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; margin-right: 16px; flex-shrink: 0; }
.item-name { font-size: 30px; font-weight: 900; color: #1A1A1A; }
.item-desc { font-size: 21px; color: #3A3A3A; line-height: 1.5; margin-top: 3px; }
.item-qty { margin-left: auto; background: #FFE5E8; color: #B85C70; font-size: 22px; font-weight: 900; padding: 5px 16px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
.bottom-tip { position: absolute; bottom: 40px; left: 40px; right: 40px; background: #FFF0E0; border: 4px dashed #D4A574; border-radius: 14px; padding: 16px 24px; font-size: 24px; color: #8B6914; font-weight: bold; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
<div class="bg-texture"></div>
<div class="tape tape-1"></div>
<div class="tape tape-2"></div>
<div class="header-bar"><h1>🤱 妈妈物品篇</h1></div>
<div class="page-num">2/2 · 喂养+日用</div>

<div class="content-area">
  <div class="section-header">🍼 喂养+日用类</div>

  <div class="item-row">
    <div class="item-num">9</div>
    <div style="flex:1">
      <div class="item-name">吸管杯</div>
      <div class="item-desc">剖腹产妈妈必备！躺着也能喝水</div>
    </div>
    <div class="item-qty">× 1个</div>
  </div>

  <div class="item-row">
    <div class="item-num">10</div>
    <div style="flex:1">
      <div class="item-name">哺乳枕</div>
      <div class="item-desc">喂奶时垫着，省力不手腕酸痛</div>
    </div>
    <div class="item-qty">× 1个</div>
  </div>

  <div class="item-row">
    <div class="item-num">11</div>
    <div style="flex:1">
      <div class="item-name">洗漱用品套</div>
      <div class="item-desc">牙刷、牙膏、毛巾、漱口水</div>
    </div>
    <div class="item-qty">× 1套</div>
  </div>

  <div class="item-row">
    <div class="item-num">12</div>
    <div style="flex:1">
      <div class="item-name">收腹带</div>
      <div class="item-desc">剖腹产妈妈必带，顺产问医生再决定</div>
    </div>
    <div class="item-qty">× 1条</div>
  </div>
</div>

<div class="bottom-tip">💡 吸管杯是剖腹产妈妈必备！产后头几天只能躺床，躺着喝水全靠它</div>
</body>
</html>
