<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1350">
<title>宝宝物品篇 1/2 v2</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; background: #F0FFF9; font-family: 'Noto Sans SC', sans-serif; overflow: hidden; position: relative; }
.bg-texture { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(80,180,140,0.05) 28px, rgba(80,180,140,0.05) 29px); }
.tape { position: absolute; width: 140px; height: 34px; background: rgba(150,220,190,0.8); transform: rotate(-2deg); box-shadow: 0 2px 5px rgba(0,0,0,0.12); }
.tape-1 { top: 18px; left: 28px; }
.tape-2 { top: 18px; right: 28px; transform: rotate(2deg); }
.header-bar { position: absolute; top: 0; left: 0; right: 0; height: 120px; background: linear-gradient(135deg, #5DC8A8, #3DB8A3); display: flex; align-items: center; justify-content: center; }
.header-bar h1 { font-size: 54px; color: white; font-family: 'Ma Shan Zheng', cursive; letter-spacing: 8px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
.page-num { position: absolute; top: 130px; right: 50px; font-size: 22px; color: #3DB8A3; font-weight: bold; }
.cat-label { position: absolute; left: 40px; font-size: 23px; font-weight: 900; color: white; background: #3DB8A3; padding: 7px 20px; border-radius: 8px; }
.item-grid { position: absolute; left: 40px; right: 40px; }
.item-row { display: flex; align-items: center; margin-bottom: 14px; background: #FFFDF5; border-radius: 12px; padding: 13px 17px; border-left: 6px solid #5DC8A8; box-shadow: 0 3px 8px rgba(0,0,0,0.08); }
.item-num { min-width: 40px; height: 40px; background: #5DC8A8; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; margin-right: 16px; flex-shrink: 0; }
.item-name { font-size: 27px; font-weight: 900; color: #1A5C48; }
.item-desc { font-size: 19px; color: #5A8A7A; line-height: 1.45; margin-top: 3px; }
.item-qty { margin-left: auto; background: #E8F8F3; color: #3DB8A3; font-size: 19px; font-weight: bold; padding: 4px 14px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
</style>
</head>
<body>
<div class="bg-texture"></div>
<div class="tape tape-1"></div>
<div class="tape tape-2"></div>
<div class="header-bar"><h1>👶 宝宝物品篇</h1></div>
<div class="page-num">1/2</div>
<div class="cat-label" style="top: 135px;">🧸 衣物类</div>
<div class="item-grid" style="top: 185px;">
  <div class="item-row">
    <div class="item-num">1</div>
    <div style="flex:1"><div class="item-name">半背衣</div><div class="item-desc">52码，选开裆款，方便换纸尿裤</div></div>
    <div class="item-qty">× 3件</div>
  </div>
  <div class="item-row">
    <div class="item-num">2</div>
    <div style="flex:1"><div class="item-name">包被</div><div class="item-desc">1厚1薄，厚的进产房用，薄款出院用</div></div>
    <div class="item-qty">× 2条</div>
  </div>
  <div class="item-row">
    <div class="item-num">3</div>
    <div style="flex:1"><div class="item-name">胎帽</div><div class="item-desc">新生儿头部散热快，多备一顶换洗</div></div>
    <div class="item-qty">× 2顶</div>
  </div>
  <div class="item-row">
    <div class="item-num">4</div>
    <div style="flex:1"><div class="item-name">袜子</div><div class="item-desc">选弹性好的，不勒脚</div></div>
    <div class="item-qty">× 3双</div>
  </div>
</div>
<div class="cat-label" style="top: 490px;">🍼 喂养类</div>
<div class="item-grid" style="top: 540px;">
  <div class="item-row">
    <div class="item-num">5</div>
    <div style="flex:1"><div class="item-name">奶瓶</div><div class="item-desc">选宽口径，玻璃或PPSU材质都可以</div></div>
    <div class="item-qty">× 2个</div>
  </div>
  <div class="item-row">
    <div class="item-num">6</div>
    <div style="flex:1"><div class="item-name">小罐奶粉</div><div class="item-desc">选0-6月一段，有些医院不让自带，先确认</div></div>
    <div class="item-qty">× 1罐</div>
  </div>
  <div class="item-row">
    <div class="item-num">7</div>
    <div style="flex:1"><div class="item-name">SS码奶嘴</div><div class="item-desc">新生儿流量小，S码可能流速太快</div></div>
    <div class="item-qty">× 1-2个</div>
  </div>
  <div class="item-row">
    <div class="item-num">8</div>
    <div style="flex:1"><div class="item-name">奶瓶刷</div><div class="item-desc">海绵刷外面、刷毛细的刷里面</div></div>
    <div class="item-qty">× 1套</div>
  </div>
</div>
<div style="position:absolute;bottom:50px;left:40px;right:40px;background:#FFF9E0;border:3px dashed #D4A574;border-radius:14px;padding:16px 24px;font-size:22px;color:#8B6914;text-align:center;line-height:1.7;font-weight:bold;">
  👶 产房包单独放：宝宝1件半背衣+1片NB码+1条包被，紧急时一目了然
</div>
</body>
</html>
