<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1350">
<title>妈妈物品篇 1/2 v5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; background: #FFF5F5; font-family: 'Noto Sans SC', sans-serif; overflow: hidden; position: relative; }
.bg-texture { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(200,100,120,0.05) 28px, rgba(200,100,120,0.05) 29px); }
.tape { position: absolute; width: 150px; height: 36px; background: rgba(255,200,200,0.85); transform: rotate(-2deg); box-shadow: 0 2px 5px rgba(0,0,0,0.12); }
.tape-1 { top: 18px; left: 28px; }
.tape-2 { top: 18px; right: 28px; transform: rotate(2deg); }
.header-bar { position: absolute; top: 0; left: 0; right: 0; height: 130px; background: linear-gradient(135deg, #E87A8A, #D46A7A); display: flex; align-items: center; justify-content: center; }
.header-bar h1 { font-size: 64px; color: white; font-weight: 900; letter-spacing: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
.page-num { position: absolute; top: 140px; right: 50px; font-size: 28px; color: #D46A7A; font-weight: 900; }
.content-area { position: absolute; top: 148px; left: 40px; right: 40px; }
.section-header { font-size: 24px; font-weight: 900; color: white; padding: 7px 20px; border-radius: 8px; margin-bottom: 10px; }
.item-row { display: flex; align-items: center; margin-bottom: 10px; background: #FFFDF5; border-radius: 14px; padding: 12px 18px; box-shadow: 0 3px 8px rgba(0,0,0,0.07); }
.item-num { min-width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; margin-right: 14px; flex-shrink: 0; color: white; }
.item-name { font-size: 28px; font-weight: 900; color: #1A1A1A; }
.item-desc { font-size: 20px; color: #3A3A3A; line-height: 1.4; margin-top: 2px; }
.item-qty { margin-left: auto; padding: 5px 14px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; font-size: 20px; font-weight: 900; }
.section-gap { height: 12px; }
.bottom-tip { position: absolute; bottom: 40px; left: 40px; right: 40px; background: #FFF0E0; border: 4px dashed #D4A574; border-radius: 14px; padding: 16px 24px; font-size: 24px; color: #8B6914; font-weight: bold; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
<div class="bg-texture"></div>
<div class="tape tape-1"></div>
<div class="tape tape-2"></div>
<div class="header-bar"><h1>🤱 妈妈物品篇</h1></div>
<div class="page-num">1/2 · 衣物+护理</div>

<div class="content-area">
  <div class="section-header" style="background:#E87A8A;">👗 衣物类</div>

  <div class="item-row">
    <div class="item-num" style="background:#E87A8A;">1</div>
    <div style="flex:1"><div class="item-name">月子服</div><div class="item-desc">选开衫款，产后多汗换洗方便</div></div>
    <div class="item-qty" style="background:#FFE5E8;color:#D46A7A;">× 2-3套</div>
  </div>
  <div class="item-row">
    <div class="item-num" style="background:#E87A8A;">2</div>
    <div style="flex:1"><div class="item-name">哺乳内衣</div><div class="item-desc">无钢圈纯棉款，产后涨奶穿着舒服</div></div>
    <div class="item-qty" style="background:#FFE5E8;color:#D46A7A;">× 2件</div>
  </div>
  <div class="item-row">
    <div class="item-num" style="background:#E87A8A;">3</div>
    <div style="flex:1"><div class="item-name">一次性内裤</div><div class="item-desc">用完直接扔，避免别人帮忙洗尴尬</div></div>
    <div class="item-qty" style="background:#FFE5E8;color:#D46A7A;">× 15条+</div>
  </div>
  <div class="item-row">
    <div class="item-num" style="background:#E87A8A;">4</div>
    <div style="flex:1"><div class="item-name">月子帽/发带</div><div class="item-desc">产后头部不能吹风，出院洗澡后要戴</div></div>
    <div class="item-qty" style="background:#FFE5E8;color:#D46A7A;">× 1-2个</div>
  </div>

  <div class="section-gap"></div>
  <div class="section-header" style="background:#D46A7A;">💧 护理类</div>

  <div class="item-row">
    <div class="item-num" style="background:#D46A7A;">5</div>
    <div style="flex:1"><div class="item-name">产褥垫</div><div class="item-desc">进产房就要铺，产后恶露多也要用</div></div>
    <div class="item-qty" style="background:#FFE5E8;color:#D46A7A;">× 15片+</div>
  </div>
  <div class="item-row">
    <div class="item-num" style="background:#D46A7A;">6</div>
    <div style="flex:1"><div class="item-name">刀纸</div><div class="item-desc">比产妇卫生巾透气，医生接生也用</div></div>
    <div class="item-qty" style="background:#FFE5E8;color:#D46A7A;">× 3-4包</div>
  </div>
  <div class="item-row">
    <div class="item-num" style="background:#D46A7A;">7</div>
    <div style="flex:1"><div class="item-name">安睡裤</div><div class="item-desc">产后头两天量大，穿这个比垫产褥垫方便</div></div>
    <div class="item-qty" style="background:#FFE5E8;color:#D46A7A;">× 8条+</div>
  </div>
  <div class="item-row">
    <div class="item-num" style="background:#D46A7A;">8</div>
    <div style="flex:1"><div class="item-name">乳头膏</div><div class="item-desc">喂奶前涂，羊脂膏成分，喂完继续涂</div></div>
    <div class="item-qty" style="background:#FFE5E8;color:#D46A7A;">× 1支</div>
  </div>
</div>

<div class="bottom-tip">💡 一次性内裤多备！产后恶露期方便省心，用完直接扔</div>
</body>
</html>
