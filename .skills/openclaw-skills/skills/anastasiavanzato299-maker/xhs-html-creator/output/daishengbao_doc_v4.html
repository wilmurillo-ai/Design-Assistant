<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1350">
<title>证件物品篇 v4</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; background: #FFF8F0; font-family: 'Noto Sans SC', sans-serif; overflow: hidden; position: relative; }
.bg-texture { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(180,140,100,0.06) 28px, rgba(180,140,100,0.06) 29px); }
.tape { position: absolute; width: 150px; height: 36px; background: rgba(255,230,150,0.85); transform: rotate(-2deg); box-shadow: 0 2px 5px rgba(0,0,0,0.12); }
.tape-1 { top: 18px; left: 28px; }
.tape-2 { top: 18px; right: 28px; transform: rotate(2deg); }
.header-bar { position: absolute; top: 0; left: 0; right: 0; height: 130px; background: linear-gradient(135deg, #E8956E, #D4756B); display: flex; align-items: center; justify-content: center; }
.header-bar h1 { font-size: 64px; color: white; font-weight: 900; letter-spacing: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
.section-icon { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); font-size: 76px; }
.item-list { position: absolute; top: 250px; left: 40px; right: 40px; }
.item-row { display: flex; align-items: flex-start; margin-bottom: 20px; background: #FFFDF5; border-radius: 16px; padding: 20px 26px; border-left: 8px solid #E8956E; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
.item-num { min-width: 56px; height: 56px; background: #E8956E; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; margin-right: 22px; flex-shrink: 0; }
.item-name { font-size: 40px; font-weight: 900; color: #1A0A00; margin-bottom: 8px; }
.item-desc { font-size: 28px; color: #8B6F5C; line-height: 1.6; }
.tag { display: inline-block; background: #E84040; color: white; font-size: 24px; padding: 5px 16px; border-radius: 14px; margin-top: 8px; font-weight: bold; }
.tag-opt { background: #FFA500; }
.bottom-note { position: absolute; bottom: 50px; left: 40px; right: 40px; background: #FFF9E0; border: 4px solid #D4A574; border-radius: 16px; padding: 22px 30px; font-size: 30px; color: #8B6914; text-align: center; font-weight: bold; line-height: 1.7; }
</style>
</head>
<body>
<div class="bg-texture"></div>
<div class="tape tape-1"></div>
<div class="tape tape-2"></div>
<div class="header-bar"><h1>📋 硬核证件篇</h1></div>
<div class="section-icon">📁</div>
<div class="item-list">
  <div class="item-row">
    <div class="item-num">1</div>
    <div class="item-content">
      <div class="item-name">夫妻身份证</div>
      <div class="item-desc">办理住院 + 出生证明，必用</div>
      <span class="tag">必带</span>
    </div>
  </div>
  <div class="item-row">
    <div class="item-num">2</div>
    <div class="item-content">
      <div class="item-name">医保卡</div>
      <div class="item-desc">出院直接报销，不带亏大了</div>
      <span class="tag">必带</span>
    </div>
  </div>
  <div class="item-row">
    <div class="item-num">3</div>
    <div class="item-content">
      <div class="item-name">产检本 + 健康手册</div>
      <div class="item-desc">医生随时看孕期记录</div>
      <span class="tag">必带</span>
    </div>
  </div>
  <div class="item-row">
    <div class="item-num">4</div>
    <div class="item-content">
      <div class="item-name">准生证（生育登记）</div>
      <div class="item-desc">部分医院住院需登记，视医院而定</div>
      <span class="tag tag-opt">⚠️ 视医院</span>
    </div>
  </div>
  <div class="item-row">
    <div class="item-num">5</div>
    <div class="item-content">
      <div class="item-name">银行卡 + 现金</div>
      <div class="item-desc">押金应急，5000-10000不掉链子</div>
      <span class="tag">必带</span>
    </div>
  </div>
</div>
<div class="bottom-note">💡 超实用Tip：所有证件统一装袋，放产房包最外层，随用随拿不手忙脚乱！</div>
</body>
</html>
