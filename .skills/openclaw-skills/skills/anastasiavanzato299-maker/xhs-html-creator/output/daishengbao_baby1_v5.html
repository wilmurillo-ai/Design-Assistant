<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1350">
<title>宝宝物品篇 1/2 v5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; background: #F0FFF9; font-family: 'Noto Sans SC', sans-serif; overflow: hidden; position: relative; }
.bg-texture { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(80,180,140,0.05) 28px, rgba(80,180,140,0.05) 29px); }
.tape { position: absolute; width: 150px; height: 36px; background: rgba(150,220,190,0.85); transform: rotate(-2deg); box-shadow: 0 2px 5px rgba(0,0,0,0.12); }
.tape-1 { top: 18px; left: 28px; }
.tape-2 { top: 18px; right: 28px; transform: rotate(2deg); }
.header-bar { position: absolute; top: 0; left: 0; right: 0; height: 130px; background: linear-gradient(135deg, #5DC8A8, #3DB8A3); display: flex; align-items: center; justify-content: center; }
.header-bar h1 { font-size: 64px; color: white; font-weight: 900; letter-spacing: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
.page-num { position: absolute; top: 140px; right: 50px; font-size: 28px; color: #3DB8A3; font-weight: 900; }
.content-area { position: absolute; top: 148px; left: 40px; right: 40px; }
.cat-label { display: inline-block; font-size: 24px; font-weight: 900; color: white; background: #3DB8A3; padding: 7px 22px; border-radius: 10px; margin-bottom: 12px; }
.item-row { display: flex; align-items: center; margin-bottom: 12px; background: #FFFDF5; border-radius: 14px; padding: 14px 20px; border-left: 8px solid #5DC8A8; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
.item-num { min-width: 46px; height: 46px; background: #5DC8A8; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; margin-right: 18px; flex-shrink: 0; }
.item-name { font-size: 34px; font-weight: 900; color: #1A5C48; }
.item-desc { font-size: 22px; color: #3A5A4A; line-height: 1.5; margin-top: 3px; }
.item-qty { margin-left: auto; background: #E8F8F3; color: #3DB8A3; font-size: 22px; font-weight: 900; padding: 5px 16px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
.section-gap { height: 16px; }
.bottom-tip { position: absolute; bottom: 40px; left: 40px; right: 40px; background: #FFF9E0; border: 4px dashed #D4A574; border-radius: 16px; padding: 18px 26px; font-size: 24px; color: #8B6914; text-align: center; font-weight: bold; line-height: 1.7; }
</style>
</head>
<body>
<div class="bg-texture"></div>
<div class="tape tape-1"></div>
<div class="tape tape-2"></div>
<div class="header-bar"><h1>👶 宝宝物品篇</h1></div>
<div class="page-num">1/2 · 衣物类</div>

<div class="content-area">
  <div class="cat-label">🧸 衣物类</div>

  <div class="item-row">
    <div class="item-num">1</div>
    <div style="flex:1">
      <div class="item-name">半背衣</div>
      <div class="item-desc">52码，选开裆款，方便换纸尿裤</div>
    </div>
    <div class="item-qty">× 3件</div>
  </div>

  <div class="item-row">
    <div class="item-num">2</div>
    <div style="flex:1">
      <div class="item-name">包被</div>
      <div class="item-desc">1厚1薄，厚的进产房，薄款出院用</div>
    </div>
    <div class="item-qty">× 2条</div>
  </div>

  <div class="item-row">
    <div class="item-num">3</div>
    <div style="flex:1">
      <div class="item-name">胎帽</div>
      <div class="item-desc">新生儿头部散热快，多备一顶换洗</div>
    </div>
    <div class="item-qty">× 2顶</div>
  </div>

  <div class="item-row">
    <div class="item-num">4</div>
    <div style="flex:1">
      <div class="item-name">袜子</div>
      <div class="item-desc">选弹性好的，不勒脚</div>
    </div>
    <div class="item-qty">× 3双</div>
  </div>

  <div class="section-gap"></div>
  <div class="cat-label">🍼 喂养类（见下页）</div>
</div>

<div class="bottom-tip">🔥 产房包特别提醒：1件半背衣 + 1片NB码 + 1条包被，单独放最外层！</div>
</body>
</html>
