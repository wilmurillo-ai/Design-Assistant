<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#F8F4FF;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
</style></head><body>
<div style="width:1080px;height:1350px;padding:24px 28px">

<div style="background:#FF6B9D;border-radius:10px 10px 0 0;padding:14px 24px;display:flex;justify-content:space-between;align-items:center">
<div style="font-size:28px;font-weight:800;color:#fff;letter-spacing:3px">宝宝进产房篇</div>
<div style="font-size:14px;color:rgba(255,255,255,0.8)">← 单独打包，发动时直接提走</div>
</div>

<div style="background:#fff;border-radius:0 0 10px 10px;overflow:hidden;box-shadow:0 4px 16px rgba(255,107,157,0.15)">
<table style="width:100%;border-collapse:collapse;font-size:14px">
<tr style="background:#C8E86A">
<td style="padding:8px 10px;border:1px solid #D0C8E0;font-weight:700;text-align:center;width:80px">物品</td>
<td style="padding:8px 10px;border:1px solid #D0C8E0;font-weight:700;text-align:center;width:70px">数量</td>
<td style="padding:8px 10px;border:1px solid #D0C8E0;font-weight:700;text-align:center">备注</td>
</tr>
<tr style="background:#FFE8F5">
<td style="padding:10px 14px;border:1px solid #D0C8E0;font-weight:700;color:#C2185B">包被</td>
<td style="padding:10px 14px;border:1px solid #D0C8E0;text-align:center">1条</td>
<td style="padding:10px 14px;border:1px solid #D0C8E0;color:#666;font-size:13px">进产房必备，护士帮包裹宝宝，选厚薄适中，六层纱布款</td>
</tr>
<tr style="background:#FFE8F5">
<td style="padding:10px 14px;border:1px solid #D0C8E0;font-weight:700;color:#C2185B">包单</td>
<td style="padding:10px 14px;border:1px solid #D0C8E0;text-align:center">1条</td>
<td style="padding:10px 14px;border:1px solid #D0C8E0;color:#666;font-size:13px">纯棉材质，给宝宝擦拭身体后包裹，隔绝温度差</td>
</tr>
<tr style="background:#FFE8F5">
<td style="padding:10px 14px;border:1px solid #D0C8E0;font-weight:700;color:#C2185B">无痕胎帽</td>
<td style="padding:10px 14px;border:1px solid #D0C8E0;text-align:center">1顶</td>
<td style="padding:10px 14px;border:1px solid #D0C8E0;color:#666;font-size:13px">选无骨缝的，不会刮到宝宝娇嫩皮肤，颜色选浅色系</td>
</tr>
<tr style="background:#FFE8F5">
<td style="padding:10px 14px;border:1px solid #D0C8E0;font-weight:700;color:#C2185B">52码半背衣</td>
<td style="padding:10px 14px;border:1px solid #D0C8E0;text-align:center">1件</td>
<td style="padding:10px 14px;border:1px solid #D0C8E0;color:#666;font-size:13px">进产房只需一件，选开裆款，方便护士穿脱，选纯棉A类</td>
</tr>
<tr style="background:#FFE8F5">
<td style="padding:10px 14px;border:1px solid #D0C8E0;font-weight:700;color:#C2185B">NB码纸尿裤</td>
<td style="padding:10px 14px;border:1px solid #D0C8E0;text-align:center">1片</td>
<td style="padding:10px 14px;border:1px solid #D0C8E0;color:#666;font-size:13px">进产房带1片就够了，护士会帮宝宝戴上，不用太多</td>
</tr>
</table>
</div>

<!-- 提示框 -->
<div style="background:#FFF9E6;border-radius:10px;padding:14px 20px;margin-top:16px;border:1px dashed #FFB347;display:flex;align-items:center;gap:12px">
<div style="font-size:16px;color:#B8760A;font-weight:600;flex-shrink:0">⚠️ 小贴士</div>
<div style="font-size:14px;color:#C9903A">产房包单独放一个袋子，发动时拎起来就走，不用翻找</div>
</div>

<!-- 物品图示区 -->
<div style="margin-top:16px;background:#FFF5F8;border-radius:10px;padding:16px 20px">
<div style="font-size:14px;color:#C94B5E;font-weight:600;margin-bottom:10px">以上物品按这个顺序摆放，进产房时交给护士</div>
<div style="font-size:13px;color:#888;line-height:1.8">
<div>① 宝宝衣物（半背衣+胎帽）叠最上面</div>
<div>② 包被+包单铺在下面</div>
<div>③ 纸尿裤单独放一个袋</div>
</div>
</div>

<div style="text-align:center;margin-top:10px;font-size:13px;color:#A8B8D8;letter-spacing:3px">← 宝宝进产房篇 →</div>

</div>
</body></html>
