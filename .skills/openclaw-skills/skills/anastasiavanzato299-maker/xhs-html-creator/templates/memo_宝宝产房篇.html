<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#F5F5F5;font-family:'PingFang SC',-apple-system,sans-serif;overflow:hidden}
</style></head><body>
<div style="width:1080px;height:1350px;padding:0;display:flex;flex-direction:column">

<!-- 备忘录标题栏 -->
<div style="background:#FFDD55;padding:18px 28px 14px;font-size:13px;color:#888;letter-spacing:1px;border-bottom:1px solid #E5E5E5;display:flex;justify-content:space-between;align-items:center">
<span>备忘录</span><span style="font-size:11px">2026-04-06 星期三</span>
</div>

<!-- 页面标题 -->
<div style="padding:32px 40px 16px">
<div style="display:flex;align-items:center;gap:16px">
<div style="background:#FF6B6B;color:#fff;font-size:22px;font-weight:700;padding:8px 20px;border-radius:8px">宝宝进产房篇</div>
<div style="font-size:18px;color:#999">← 单独打包，发动时直接提走</div>
</div>
</div>

<div style="margin:0 40px;border-bottom:1px solid #F0F0F0"></div>

<!-- 物品列表 -->
<div style="padding:20px 40px;flex:1">

<!-- 物品项 -->
<div style="background:#fff;border-radius:14px;padding:22px 24px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border-left:5px solid #FF6B6B">
<div style="font-size:26px;font-weight:700;color:#1D1D1F">🍼 包被 × 1条</div>
<div style="font-size:19px;color:#666;margin-top:6px">进产房必备，护士会帮你包裹宝宝，选厚薄适中的，四层或六层纱布款</div>
</div>

<div style="background:#fff;border-radius:14px;padding:22px 24px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border-left:5px solid #FF6B6B">
<div style="font-size:26px;font-weight:700;color:#1D1D1F">🧸 包单 × 1条</div>
<div style="font-size:19px;color:#666;margin-top:6px">纯棉材质，给宝宝擦拭身体后包裹，隔绝温度差</div>
</div>

<div style="background:#fff;border-radius:14px;padding:22px 24px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border-left:5px solid #FF6B6B">
<div style="font-size:26px;font-weight:700;color:#1D1D1F">👶 无痕胎帽 × 1顶</div>
<div style="font-size:19px;color:#666;margin-top:6px">选无骨缝的，不会刮到宝宝娇嫩皮肤，颜色选浅色系</div>
</div>

<div style="background:#fff;border-radius:14px;padding:22px 24px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border-left:5px solid #FF6B6B">
<div style="font-size:26px;font-weight:700;color:#1D1D1F">👕 52码半背衣 × 1件</div>
<div style="font-size:19px;color:#666;margin-top:6px">进产房只需一件！选开裆款，方便护士穿脱，注意选纯棉A类</div>
</div>

<div style="background:#fff;border-radius:14px;padding:22px 24px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border-left:5px solid #FF6B6B">
<div style="font-size:26px;font-weight:700;color:#1D1D1F">🩷 NB码纸尿裤 × 1片</div>
<div style="font-size:19px;color:#666;margin-top:6px">进产房带1片够了，护士会帮宝宝戴上，不用太多</div>
</div>

<!-- 提示框 -->
<div style="background:#FFF9E6;border-radius:12px;padding:18px 24px;margin-top:8px;border:1px dashed #FFB347">
<div style="font-size:18px;color:#B8760A;font-weight:600">⚠️ 小贴士</div>
<div style="font-size:17px;color:#C9903A;margin-top:4px">产房包单独放一个袋子，发动时拎起来就走，不用翻找</div>
</div>

</div>

</div>
</body></html>
