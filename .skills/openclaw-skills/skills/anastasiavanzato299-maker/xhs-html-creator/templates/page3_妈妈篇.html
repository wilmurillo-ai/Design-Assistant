<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
</style></head><body>
<div style="width:1080px;height:1350px;position:relative">
<div style="position:absolute;top:0;left:0;right:0;height:14px;background:#E85A6B"></div>
<div style="position:absolute;top:70px;left:60px">
<div style="font-size:72px;font-weight:900;color:#E85A6B;letter-spacing:-1px">妈妈篇</div>
<div style="font-size:22px;color:#888;margin-top:10px;letter-spacing:3px">这些真的必备 · 用不上别怪我</div>
</div>
<div style="position:absolute;top:210px;left:60px;right:60px;height:3px;background:linear-gradient(90deg,#E85A6B,#F4A0AA);border-radius:2px"></div>
<div style="position:absolute;top:250px;left:50px;right:50px;bottom:40px;overflow:hidden">

<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#E85A6B;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">1</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">产褥垫 × 15片+</div><div style="font-size:18px;color:#666;margin-top:2px">进产房就要铺上，产后恶露多也要用，多带没坏处</div></div>
</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#E85A6B;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">2</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">刀纸 × 3-4包</div><div style="font-size:18px;color:#666;margin-top:2px">比产妇卫生巾透气，医生接生时也用这个</div></div>
</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#E85A6B;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">3</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">一次性内裤 × 15条+</div><div style="font-size:18px;color:#666;margin-top:2px">用完直接扔，避免别人帮忙洗的尴尬</div></div>
</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#E85A6B;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">4</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">吸管杯 × 1个</div><div style="display:inline-block;background:#E85A6B;color:#fff;font-size:14px;padding:3px 10px;border-radius:12px;margin-top:4px">⭐ 剖腹产必带</div><div style="font-size:18px;color:#666;margin-top:4px">躺着也能喝水，非常重要！</div></div>
</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#E85A6B;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">5</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">乳头膏 × 1支</div><div style="font-size:18px;color:#666;margin-top:2px">喂奶前涂，羊脂膏成分，喂完继续涂</div></div>
</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#E85A6B;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">6</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">洗漱用品套</div><div style="font-size:18px;color:#666;margin-top:2px">牙刷、牙膏、毛巾、漱口水，住院几天要用</div></div>
</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#E85A6B;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">7</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">月子服 × 2-3套</div><div style="font-size:18px;color:#666;margin-top:2px">选开衫款，产后容易出汗需要换洗</div></div>
</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#E85A6B;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">8</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">安睡裤 × 8条+</div><div style="font-size:18px;color:#666;margin-top:2px">产后头两天量大，穿这个比垫产褥垫方便</div></div>
</div>

</div>
</div>
</body></html>
