<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#F5F0FF;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
</style></head><body>
<div style="width:1080px;height:1350px;position:relative">

<!-- 浅紫背景 -->
<div style="position:absolute;inset:0;background:linear-gradient(180deg,#F5F0FF 0%,#EDE6FF 100%)"></div>

<!-- 左侧内容区 -->
<div style="position:absolute;left:60px;top:120px;right:60px">

<!-- 大引号装饰 -->
<div style="font-size:280px;color:rgba(150,130,200,0.15);font-family:Georgia,serif;line-height:1;margin-bottom:-80px;font-weight:900">"</div>

<!-- 标题 -->
<div style="font-size:72px;font-weight:900;color:#4A3A6A;line-height:1.25;letter-spacing:-1px;margin-top:0">
<div>生完才敢说真话：</div>
<div style="position:relative;display:inline-block">
待产包
<div style="position:absolute;left:0;bottom:-8px;width:100%;height:8px;background:#7CB342;border-radius:4px"></div>
</div>
<div>和网上说的根本不一样</div>
</div>

<!-- 副标题小字 -->
<div style="margin-top:24px;font-size:22px;color:#8B7BA8;line-height:1.5">
<div>生了才知道哪些真的有必要</div>
<div>哪些完全没必要囤👊</div>
</div>

</div>

<!-- 底部深色横条 -->
<div style="position:absolute;bottom:0;left:0;right:0;height:220px;background:linear-gradient(180deg,rgba(74,58,106,0) 0%,rgba(74,58,106,0.85) 40%,#4A3A6A 100%)"></div>

<!-- 底部文字 -->
<div style="position:absolute;bottom:50px;left:60px">
<div style="font-size:26px;font-weight:700;color:#fff;letter-spacing:1px">收了这一份就够</div>
<div style="font-size:18px;color:rgba(255,255,255,0.6);margin-top:6px">点击查看完整清单 →</div>
</div>

<!-- 滑动指示线 -->
<div style="position:absolute;bottom:50px;right:60px;width:50px;height:6px;background:rgba(255,255,255,0.3);border-radius:3px"></div>

</div>
</body></html>
