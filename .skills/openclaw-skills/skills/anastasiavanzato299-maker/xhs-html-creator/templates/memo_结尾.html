<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#FFFBF0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
</style></head><body>
<div style="width:1080px;height:1350px;padding:0;display:flex;flex-direction:column">

<!-- 备忘录标题栏 -->
<div style="background:#FFE100;padding:18px 28px 14px;font-size:13px;color:#888;letter-spacing:1px;border-bottom:1px solid #E5D900;display:flex;justify-content:space-between;align-items:center">
<span>备忘录</span><span style="font-size:11px">待产包清单</span>
</div>

<!-- 中央内容 -->
<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px">

<div style="text-align:center;margin-bottom:32px">
<div style="font-size:72px;font-weight:900;color:#1D1D1F;letter-spacing:-1px;line-height:1.1">收藏起来</div>
<div style="font-size:40px;font-weight:600;color:#555;margin-top:10px">让老公照着打包</div>
</div>

<!-- 打包技巧 -->
<div style="background:#fff;border-radius:16px;padding:24px 32px;width:100%;max-width:880px;box-shadow:0 4px 16px rgba(0,0,0,0.08)">
<div style="font-size:20px;font-weight:800;color:#1D1D1F;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #F0F0F0">📦 打包小技巧</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
<div style="background:#E8F5E9;border-radius:10px;padding:14px 16px;border-left:4px solid #4CAF50">
<div style="font-size:17px;font-weight:700;color:#2E7D32;margin-bottom:6px">① 分类装袋</div>
<div style="font-size:14px;color:#555;line-height:1.6">证件 / 宝宝 / 妈妈分开装<br>紧急时一目了然</div>
</div>
<div style="background:#E3F2FD;border-radius:10px;padding:14px 16px;border-left:4px solid #1976D2">
<div style="font-size:17px;font-weight:700;color:#1565C0;margin-bottom:6px">② 产房包单独放</div>
<div style="font-size:14px;color:#555;line-height:1.6">半背衣+纸尿裤+包被+妈妈用品<br>发动即提走</div>
</div>
<div style="background:#FFF3E0;border-radius:10px;padding:14px 16px;border-left:4px solid #FB8C00">
<div style="font-size:17px;font-weight:700;color:#E65100;margin-bottom:6px">③ 清单给老公看</div>
<div style="font-size:14px;color:#555;line-height:1.6">发动时他才知道<br>东西放在哪</div>
</div>
<div style="background:#FCE4EC;border-radius:10px;padding:14px 16px;border-left:4px solid #C2185B">
<div style="font-size:17px;font-weight:700;color:#AD1457;margin-bottom:6px">④ 行李箱贴标签</div>
<div style="font-size:14px;color:#555;line-height:1.6">宝宝 / 妈妈 / 产房<br>护士要什么直接给</div>
</div>
</div>
</div>

<!-- 标签 -->
<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:28px">
<div style="background:#fff;padding:8px 18px;border-radius:18px;font-size:15px;color:#888;box-shadow:0 2px 6px rgba(0,0,0,0.06)">#入院待产包</div>
<div style="background:#fff;padding:8px 18px;border-radius:18px;font-size:15px;color:#888;box-shadow:0 2px 6px rgba(0,0,0,0.06)">#孕产经验分享</div>
<div style="background:#fff;padding:8px 18px;border-radius:18px;font-size:15px;color:#888;box-shadow:0 2px 6px rgba(0,0,0,0.06)">#待产必备</div>
<div style="background:#fff;padding:8px 18px;border-radius:18px;font-size:15px;color:#888;box-shadow:0 2px 6px rgba(0,0,0,0.06)">#待产好物</div>
<div style="background:#fff;padding:8px 18px;border-radius:18px;font-size:15px;color:#888;box-shadow:0 2px 6px rgba(0,0,0,0.06)">#母婴囤货</div>
</div>

<div style="margin-top:24px;font-size:15px;color:#B8A8D0;letter-spacing:5px">关注不迷路 · 小红书同名</div>

</div>
</div>
</body></html>
