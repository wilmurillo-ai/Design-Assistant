<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#F8F4FF;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
</style></head><body>
<div style="width:1080px;height:1350px;padding:40px 44px;display:flex;flex-direction:column;align-items:center;justify-content:center">

<!-- 中央大字 -->
<div style="text-align:center;margin-bottom:24px">
<div style="font-size:72px;font-weight:900;color:#2D1B69;letter-spacing:6px;line-height:1.1">收藏起来</div>
<div style="font-size:40px;font-weight:600;color:#5B4B8A;margin-top:10px">让老公照着打包</div>
</div>

<!-- 打包技巧卡 -->
<div style="background:#fff;border-radius:14px;padding:24px 32px;width:100%;max-width:880px;box-shadow:0 4px 20px rgba(45,27,105,0.1)">
<div style="font-size:20px;font-weight:800;color:#2D1B69;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #E8E0F5">📦 打包小技巧</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
<div style="background:#FFF5F5;border-radius:10px;padding:16px;border-left:4px solid #E85A6B">
<div style="font-size:17px;font-weight:700;color:#C94B5E;margin-bottom:6px">① 分类装袋</div>
<div style="font-size:14px;color:#666;line-height:1.6">证件 / 宝宝 / 妈妈<br>分开装，紧急时一目了然</div>
</div>
<div style="background:#EEF4FF;border-radius:10px;padding:16px;border-left:4px solid #5B8DEF">
<div style="font-size:17px;font-weight:700;color:#1565C0;margin-bottom:6px">② 产房包单独放</div>
<div style="font-size:14px;color:#666;line-height:1.6">半背衣+纸尿裤+包被<br>+妈妈用品，发动即提走</div>
</div>
<div style="background:#FFF9E6;border-radius:10px;padding:16px;border-left:4px solid #FFB347">
<div style="font-size:17px;font-weight:700;color:#B8760A;margin-bottom:6px">③ 清单给老公看</div>
<div style="font-size:14px;color:#666;line-height:1.6">发动时他才知道<br>东西放在哪</div>
</div>
<div style="background:#F0FFF4;border-radius:10px;padding:16px;border-left:4px solid #4ECDC4">
<div style="font-size:17px;font-weight:700;color:#2D8A5F;margin-bottom:6px">④ 行李箱贴标签</div>
<div style="font-size:14px;color:#666;line-height:1.6">宝宝 / 妈妈 / 产房<br>护士要什么直接给</div>
</div>
</div>
</div>

<!-- 标签 -->
<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:24px">
<div style="background:#fff;padding:8px 18px;border-radius:18px;font-size:14px;color:#888;box-shadow:0 2px 6px rgba(0,0,0,0.05)">#待产包清单</div>
<div style="background:#fff;padding:8px 18px;border-radius:18px;font-size:14px;color:#888;box-shadow:0 2px 6px rgba(0,0,0,0.05)">#入院待产包</div>
<div style="background:#fff;padding:8px 18px;border-radius:18px;font-size:14px;color:#888;box-shadow:0 2px 6px rgba(0,0,0,0.05)">#孕妈必备</div>
<div style="background:#fff;padding:8px 18px;border-radius:18px;font-size:14px;color:#888;box-shadow:0 2px 6px rgba(0,0,0,0.05)">#新生儿好物</div>
<div style="background:#fff;padding:8px 18px;border-radius:18px;font-size:14px;color:#888;box-shadow:0 2px 6px rgba(0,0,0,0.05)">#实用待产包分享</div>
</div>

<div style="margin-top:20px;font-size:15px;color:#B8A8D0;letter-spacing:5px">关注不迷路 · 小红书同名</div>

</div>
</body></html>
