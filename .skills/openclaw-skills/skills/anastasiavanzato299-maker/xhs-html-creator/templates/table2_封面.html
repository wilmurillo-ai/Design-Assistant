<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#F8F4FF;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
</style></head><body>
<div style="width:1080px;height:1350px;padding:28px 32px">

<!-- 标题 -->
<div style="text-align:center;margin-bottom:16px">
<div style="font-size:52px;font-weight:900;color:#2D1B69;letter-spacing:6px">待产包清单</div>
<div style="font-size:18px;color:#8B7BA8;margin-top:6px;letter-spacing:3px">精简版 · 一张图搞定</div>
</div>

<!-- 表格 -->
<div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(45,27,105,0.08)">
<table style="width:100%;border-collapse:collapse;font-size:15px">
<!-- 表头 -->
<tr style="background:#C8E86A">
<td style="padding:10px 12px;border:1px solid #D0C8E0;font-weight:700;text-align:center;width:80px">类别</td>
<td style="padding:10px 12px;border:1px solid #D0C8E0;font-weight:700;text-align:center;width:110px">名称</td>
<td style="padding:10px 12px;border:1px solid #D0C8E0;font-weight:700;text-align:center;width:70px">数量</td>
<td style="padding:10px 12px;border:1px solid #D0C8E0;font-weight:700;text-align:center">备注</td>
</tr>
<!-- 证件包篇 -->
<tr style="background:#FFF5F5">
<td rowspan="4" style="padding:8px 10px;border:1px solid #D0C8E0;font-weight:700;text-align:center;color:#D4574A;font-size:14px">证件包篇</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0">身份证</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">2张</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">夫妻双方都要带</td>
</tr>
<tr style="background:#FFF5F5">
<td style="padding:8px 12px;border:1px solid #D0C8E0">结婚证</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">2张</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">部分医院要</td>
</tr>
<tr style="background:#FFF5F5">
<td style="padding:8px 12px;border:1px solid #D0C8E0">社保卡</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">1张</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">出院时报销用</td>
</tr>
<tr style="background:#FFF5F5">
<td style="padding:8px 12px;border:1px solid #D0C8E0">准生证</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">1张</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">视当地政策</td>
</tr>
<!-- 宝宝产房篇 -->
<tr style="background:#FFE8F5">
<td rowspan="5" style="padding:8px 10px;border:1px solid #D0C8E0;font-weight:700;text-align:center;color:#C2185B;font-size:14px">宝宝<br>产房篇</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0">包被</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">1条</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">厚薄适中</td>
</tr>
<tr style="background:#FFE8F5">
<td style="padding:8px 12px;border:1px solid #D0C8E0">包单</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">1条</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">纯棉</td>
</tr>
<tr style="background:#FFE8F5">
<td style="padding:8px 12px;border:1px solid #D0C8E0">无痕胎帽</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">1顶</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">选无骨缝款</td>
</tr>
<tr style="background:#FFE8F5">
<td style="padding:8px 12px;border:1px solid #D0C8E0">52码半背衣</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">1件</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">选开裆款</td>
</tr>
<tr style="background:#FFE8F5">
<td style="padding:8px 12px;border:1px solid #D0C8E0">NB码纸尿裤</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">1片</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">护士会帮戴上</td>
</tr>
<!-- 妈妈产房篇 -->
<tr style="background:#E8F4FF">
<td rowspan="5" style="padding:8px 10px;border:1px solid #D0C8E0;font-weight:700;text-align:center;color:#1565C0;font-size:14px">妈妈<br>产房篇</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0">产褥垫</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">10片+</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">进产房第一件事</td>
</tr>
<tr style="background:#E8F4FF">
<td style="padding:8px 12px;border:1px solid #D0C8E0">刀纸</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">3-4包</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">比卫生巾透气</td>
</tr>
<tr style="background:#E8F4FF">
<td style="padding:8px 12px;border:1px solid #D0C8E0">计量卫生巾</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">1-2片</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">产后24h内用</td>
</tr>
<tr style="background:#E8F4FF">
<td style="padding:8px 12px;border:1px solid #D0C8E0">吸管杯</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">1个</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#E55C00;font-size:13px;font-weight:600">⭐ 必带</td>
</tr>
<tr style="background:#E8F4FF">
<td style="padding:8px 12px;border:1px solid #D0C8E0">充电宝</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;text-align:center">1个</td>
<td style="padding:8px 12px;border:1px solid #D0C8E0;color:#888;font-size:13px">1万毫安以上</td>
</tr>
</table>
</div>

<!-- 底部 -->
<div style="text-align:center;margin-top:12px;font-size:14px;color:#B8A8D0;letter-spacing:4px">← 左滑查看完整清单 →</div>

</div>
</body></html>
