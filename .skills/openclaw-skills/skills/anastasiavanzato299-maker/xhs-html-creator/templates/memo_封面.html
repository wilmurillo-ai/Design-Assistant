<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#FFFBF0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
</style></head><body>
<div style="width:1080px;height:1350px;padding:0;display:flex;flex-direction:column">

<!-- 备忘录标题栏 -->
<div style="background:#FFE100;padding:20px 28px 16px;font-size:14px;color:#888;letter-spacing:1px;border-bottom:1px solid #E5D900;display:flex;justify-content:space-between;align-items:center">
<span>备忘录</span><span style="font-size:11px">待产包清单</span>
</div>

<!-- 标题 -->
<div style="padding:40px 40px 20px">
<div style="font-size:56px;font-weight:900;color:#1D1D1F;line-height:1.2;letter-spacing:-1px">生了才敢说的待产包</div>
<div style="font-size:30px;font-weight:600;color:#555;margin-top:8px">这才是真正需要的</div>
</div>

<div style="margin:0 40px;border-bottom:1px solid #F0F0F0"></div>

<!-- 副标题 -->
<div style="padding:20px 40px 16px;font-size:20px;color:#666;line-height:1.7">
<div>很多孕妈问我待产包到底要准备多少？</div>
<div style="margin-top:6px">网上攻略几十种上百种的也有，我整理了一份<b>产后验证版</b>。</div>
<div style="margin-top:6px">生了才知道哪些真的有必要，哪些完全没必要囤👊</div>
</div>

<!-- 四个篇章预览 -->
<div style="padding:0 40px;flex:1">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
<div style="background:#E8F5E1;border-radius:12px;padding:18px 20px;border-left:4px solid #4CAF50">
<div style="font-size:18px;font-weight:700;color:#2E7D32;margin-bottom:6px">✅ 用上了</div>
<div style="font-size:15px;color:#555;line-height:1.7">
<div>宝宝进产房：包被/包单/半背衣</div>
<div>妈妈进产房：产褥垫/吸管杯</div>
<div>宝宝住院：恒温壶/护臀膏</div>
<div>妈妈住院：安睡裤/乳头膏</div>
</div>
</div>
<div style="background:#FFEBEE;border-radius:12px;padding:18px 20px;border-left:4px solid #E53935">
<div style="font-size:18px;font-weight:700;color:#C62828;margin-bottom:6px">❌ 没用上</div>
<div style="font-size:15px;color:#555;line-height:1.7">
<div>宝宝：袜子/口水巾/护脐贴</div>
<div>妈妈：收腹带/防溢乳垫</div>
<div>实际经验告诉你哪些真的不需要</div>
</div>
</div>
</div>
</div>

<!-- 底部 -->
<div style="padding:16px 40px 30px;font-size:16px;color:#AAA;text-align:center;letter-spacing:4px">
← 左滑查看完整清单 →
</div>

</div>
</body></html>
