<!DOCTYPE html>
<html><head><meta charset="utf-8"></head><body>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Inter:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;background:#fff;font-family:'Noto Sans SC',sans-serif;-webkit-font-smoothing:antialiased;}
.page{width:1080px;position:relative;overflow:hidden;background:#fff;}
.page::before{content:'';position:absolute;top:0;left:32px;bottom:0;width:1.5px;background:#cc0000;z-index:1;}
.hw{font-family:'Ma Shan Zheng',cursive;}
.pagenum{font-size:36px;color:#ccc;font-weight:300;letter-spacing:2px;}
.sec-title{font-size:48px;font-weight:700;color:#111;letter-spacing:1px;}
.sec-sub{font-size:36px;color:#ccc;font-weight:300;letter-spacing:3px;margin-bottom:4px;}
.row{display:flex;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f5f5f5;}
.rname{flex:1;font-size:36px;color:#111;font-family:'Ma Shan Zheng',cursive;}
.rqty{font-size:36px;color:#888;font-weight:300;min-width:130px;text-align:right;padding-top:4px;}
.rimp{color:#cc0000;}
.callout{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid #e0e0e0;border-radius:4px;margin-top:16px;}
.callout-dot{width:6px;height:6px;background:#cc0000;flex-shrink:0;margin-top:8px;}
.callout-title{font-size:36px;color:#999;font-weight:300;letter-spacing:1px;margin-bottom:4px;}
.callout-text{font-size:36px;color:#333;font-family:'Ma Shan Zheng',cursive;line-height:1.6;}
</style>
<div class="page" style="min-height:1443px;padding:48px 60px 48px 56px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-left:16px;">
    <div class="pagenum">PAGE 2 / 5</div>
    <div class="pagenum" style="color:#eee;">待产包清单</div>
  </div>
  <div style="padding-left:16px;margin-bottom:20px;">
    <div class="sec-sub">SECTION 01</div>
    <div class="sec-title hw">证件物品</div>
    <div style="height:1px;background:#eee;margin-top:10px;"></div>
  </div>
  <div style="padding-left:16px;">
    <div class="row"><span class="rname rmp">夫妻双方身份证原件</span><span class="rqty">必带</span></div>
    <div class="row"><span class="rname">医保卡</span><span class="rqty">出院直接结算报销</span></div>
    <div class="row"><span class="rname">产检手册+检查报告单</span><span class="rqty">医生必看</span></div>
    <div class="row"><span class="rname">准生证</span><span class="rqty">部分医院要登记</span></div>
    <div class="row"><span class="rname">银行卡+少量现金</span><span class="rqty">押金5000-1万</span></div>
  </div>
  <div style="padding-left:16px;margin-top:20px;">
    <div class="sec-sub" style="margin-top:16px;">FOLLOW UP</div>
    <div style="font-size:36px;color:#888;font-family:'Noto Sans SC',sans-serif;font-weight:300;line-height:1.8;margin-top:6px;">
      宝宝出生后要办理：出生医学证明 / 户口簿登记 / 新生儿医保卡 / 疫苗接种卡
    </div>
  </div>
  <div class="callout">
    <div class="callout-dot"></div>
    <div>
      <div class="callout-title">过来人叮嘱</div>
      <div class="callout-text">用文件袋统一装，放在产房包最外层</div>
      <div class="callout-text">押金支持银行卡，不一定需要现金</div>
      <div class="callout-text">准生证每城市政策不同，提前问医院</div>
    </div>
  </div>
</div>
</body></html>
