<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#FAFAFA;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
</style></head><body>
<div style="width:1080px;height:1350px;position:relative">

<!-- 渐变背景 -->
<div style="position:absolute;inset:0;background:linear-gradient(160deg,#F5F0FF 0%,#FFF5F8 50%,#F0F8FF 100%)"></div>

<!-- 顶部装饰 -->
<div style="position:absolute;top:0;left:0;right:0;height:8px;background:linear-gradient(90deg,#FF6B9D,#C44FE0,#6B8EFF)"></div>

<!-- 中央内容 -->
<div style="position:absolute;top:80px;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;padding:0 60px">

<!-- 标题 -->
<div style="text-align:center;margin-bottom:24px">
<div style="font-size:28px;font-weight:800;color:#4A3A6A;letter-spacing:4px;margin-bottom:8px">收藏起来</div>
<div style="font-size:40px;font-weight:900;color:#2D1F4E">让老公照着打包</div>
</div>

<!-- 四个打包技巧 -->
<div style="background:rgba(255,255,255,0.85);border-radius:20px;padding:24px 28px;width:100%;box-shadow:0 4px 20px rgba(100,80,160,0.08)">
<div style="font-size:18px;font-weight:800;color:#2D1F4E;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #F0E8FF;letter-spacing:2px">📦 打包小技巧</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">

<div style="background:#FFF0F7;border-radius:12px;padding:16px 18px;border-left:4px solid #FF6B9D">
<div style="font-size:16px;font-weight:800;color:#AD1457;margin-bottom:6px">① 分类装袋</div>
<div style="font-size:14px;color:#555;line-height:1.6">证件 / 宝宝 / 妈妈 分开装<br>紧急时一目了然</div>
</div>

<div style="background:#E8F3FF;border-radius:12px;padding:16px 18px;border-left:4px solid #4A90D9">
<div style="font-size:16px;font-weight:800;color:#1565C0;margin-bottom:6px">② 产房包单独放</div>
<div style="font-size:14px;color:#555;line-height:1.6">半背衣+纸尿裤+妈妈用品<br>发动即提走</div>
</div>

<div style="background:#FFF8E1;border-radius:12px;padding:16px 18px;border-left:4px solid #FFB300">
<div style="font-size:16px;font-weight:800;color:#E65100;margin-bottom:6px">③ 清单给老公看</div>
<div style="font-size:14px;color:#555;line-height:1.6">发动时他才知道<br>东西放在哪、怎么用</div>
</div>

<div style="background:#E8F5E9;border-radius:12px;padding:16px 18px;border-left:4px solid #43A047">
<div style="font-size:16px;font-weight:800;color:#2E7D32;margin-bottom:6px">④ 行李箱贴标签</div>
<div style="font-size:14px;color:#555;line-height:1.6">宝宝 / 妈妈 / 产房<br>护士要什么直接给</div>
</div>

</div>
</div>

<!-- 话题标签 -->
<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:24px">
<div style="background:rgba(255,255,255,0.7);padding:8px 18px;border-radius:18px;font-size:14px;color:#888;border:1px solid #E8E0F0">#入院待产包</div>
<div style="background:rgba(255,255,255,0.7);padding:8px 18px;border-radius:18px;font-size:14px;color:#888;border:1px solid #E8E0F0">#孕产经验分享</div>
<div style="background:rgba(255,255,255,0.7);padding:8px 18px;border-radius:18px;font-size:14px;color:#888;border:1px solid #E8E0F0">#待产必备</div>
<div style="background:rgba(255,255,255,0.7);padding:8px 18px;border-radius:18px;font-size:14px;color:#888;border:1px solid #E8E0F0">#母婴囤货</div>
<div style="background:rgba(255,255,255,0.7);padding:8px 18px;border-radius:18px;font-size:14px;color:#888;border:1px solid #E8E0F0">#坐月子注意事项</div>
</div>

<div style="margin-top:20px;font-size:14px;color:#B8A8D0;letter-spacing:5px">滑动浏览全部章节</div>

</div>

<!-- 底部渐变 -->
<div style="position:absolute;bottom:0;left:0;right:0;height:100px;background:linear-gradient(180deg,rgba(45,31,78,0) 0%,rgba(45,31,78,0.08) 100%)"></div>

</div>
</body></html>
