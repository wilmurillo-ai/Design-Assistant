<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#FAFAFA;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
</style></head><body>
<div style="width:1080px;height:1350px;display:flex;flex-direction:column">

<!-- 表头 -->
<div style="background:linear-gradient(135deg,#FFE8F5,#FFD6EA);padding:18px 36px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #F8BBD9">
<div>
<div style="font-size:28px;font-weight:900;color:#AD1457;letter-spacing:2px">👶 宝宝进产房篇</div>
<div style="font-size:13px;color:#AD1457;opacity:0.7;margin-top:2px">进入产房后宝宝需要这些物品</div>
</div>
<div style="background:#AD1457;color:#fff;font-size:13px;font-weight:700;padding:6px 16px;border-radius:20px">共6项</div>
</div>

<!-- 表格标题行 -->
<div style="display:grid;grid-template-columns:2fr 3fr 1fr 3fr;padding:10px 36px;background:#F5F0F7;border-bottom:2px solid #E8E0F0">
<div style="font-size:13px;font-weight:700;color:#888">状态</div>
<div style="font-size:13px;font-weight:700;color:#888">物品名称</div>
<div style="font-size:13px;font-weight:700;color:#888;text-align:center">数量</div>
<div style="font-size:13px;font-weight:700;color:#888">备注</div>
</div>

<!-- 内容行 -->
<div style="flex:1;overflow:hidden;padding:0 36px">

<!-- 用上了 -->
<div style="display:grid;grid-template-columns:2fr 3fr 1fr 3fr;padding:12px 0;border-bottom:1px solid #F0F0F0">
<div style="display:flex;align-items:center"><span style="background:#4CAF50;color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px">用上了</span></div>
<div style="font-size:17px;font-weight:700;color:#1D1D1F;padding:4px 0">包被</div>
<div style="font-size:15px;color:#555;text-align:center;padding:4px 0">1条</div>
<div style="font-size:14px;color:#888;padding:4px 0">厚的进产房用，选四层或六层纱布款</div>
</div>

<div style="display:grid;grid-template-columns:2fr 3fr 1fr 3fr;padding:12px 0;border-bottom:1px solid #F0F0F0">
<div style="display:flex;align-items:center"><span style="background:#4CAF50;color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px">用上了</span></div>
<div style="font-size:17px;font-weight:700;color:#1D1D1F;padding:4px 0">包单</div>
<div style="font-size:15px;color:#555;text-align:center;padding:4px 0">1条</div>
<div style="font-size:14px;color:#888;padding:4px 0">纯棉，给宝宝擦拭身体后包裹，隔绝温度差</div>
</div>

<div style="display:grid;grid-template-columns:2fr 3fr 1fr 3fr;padding:12px 0;border-bottom:1px solid #F0F0F0">
<div style="display:flex;align-items:center"><span style="background:#4CAF50;color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px">用上了</span></div>
<div style="font-size:17px;font-weight:700;color:#1D1D1F;padding:4px 0">半背衣 / 连体衣</div>
<div style="font-size:15px;color:#555;text-align:center;padding:4px 0">1件</div>
<div style="font-size:14px;color:#888;padding:4px 0">选52码开裆款，方便换纸尿裤</div>
</div>

<div style="display:grid;grid-template-columns:2fr 3fr 1fr 3fr;padding:12px 0;border-bottom:1px solid #F0F0F0">
<div style="display:flex;align-items:center"><span style="background:#4CAF50;color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px">用上了</span></div>
<div style="font-size:17px;font-weight:700;color:#1D1D1F;padding:4px 0">NB码纸尿裤</div>
<div style="font-size:15px;color:#555;text-align:center;padding:4px 0">1～2片</div>
<div style="font-size:14px;color:#888;padding:4px 0">进产房带1片，护士会帮戴上</div>
</div>

<div style="display:grid;grid-template-columns:2fr 3fr 1fr 3fr;padding:12px 0;border-bottom:1px solid #F0F0F0">
<div style="display:flex;align-items:center"><span style="background:#4CAF50;color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px">用上了</span></div>
<div style="font-size:17px;font-weight:700;color:#1D1D1F;padding:4px 0">胎帽</div>
<div style="font-size:15px;color:#555;text-align:center;padding:4px 0">1顶</div>
<div style="font-size:14px;color:#888;padding:4px 0">选纯棉A类，防止宝宝热量散失</div>
</div>

<div style="display:grid;grid-template-columns:2fr 3fr 1fr 3fr;padding:12px 0">
<div style="display:flex;align-items:center"><span style="background:#EF5350;color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px">没用上</span></div>
<div style="font-size:17px;font-weight:700;color:#1D1D1F;padding:4px 0">袜子</div>
<div style="font-size:15px;color:#555;text-align:center;padding:4px 0">—</div>
<div style="font-size:14px;color:#888;padding:4px 0">包被包着就够，不需要额外穿</div>
</div>

</div>

<!-- 底部装饰 -->
<div style="padding:14px 36px;background:#FFF0F7;border-top:1px solid #F8BBD9">
<div style="font-size:14px;color:#AD1457;font-weight:600">💡 小贴士：宝宝衣物选纯棉A类，提前洗好晾干</div>
</div>

</div>
</body></html>
