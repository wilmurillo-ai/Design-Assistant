<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>结尾页</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;background:linear-gradient(160deg,#FFF5F8,#FFF0F5,#F0F4FF);font-family:"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden;position:relative}
.bg{position:absolute;inset:0;pointer-events:none}
.deco1{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(255,182,193,0.2),transparent 70%);top:-100px;right:-100px}
.deco2{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(135,206,250,0.15),transparent 70%);bottom:-50px;left:-80px}
.deco3{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,107,138,0.1),transparent 70%);top:300px;left:50px}
.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:900px}
.big-emoji{font-size:100px;margin-bottom:20px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.title{font-size:56px;font-weight:800;color:#333;margin-bottom:16px;letter-spacing:2px}
.title span{background:linear-gradient(135deg,#FF6B8A,#FF4D6D);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:28px;color:#666;margin-bottom:40px;font-weight:500}
.tips{display:flex;flex-direction:column;gap:16px;margin-bottom:50px;align-items:center}
.tip{background:white;border:2px dashed #FFB6C1;border-radius:16px;padding:14px 36px;font-size:22px;color:#555;font-weight:600;width:600px;display:flex;align-items:center;gap:12px}
.tip-icon{font-size:28px}
.bottom-bar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(135deg,#FF6B8A,#FF8FAB);padding:24px 60px;display:flex;align-items:center;justify-content:space-between}
.bottom-text{color:white;font-size:24px;font-weight:700;letter-spacing:2px}
.tags{display:flex;gap:10px}
.tag{background:rgba(255,255,255,0.25);color:white;font-size:14px;padding:5px 16px;border-radius:12px}
</style></head>
<body>
<div class="bg">
  <div class="deco1"></div>
  <div class="deco2"></div>
  <div class="deco3"></div>
</div>
<div class="center">
  <div class="big-emoji">🎉</div>
  <div class="title">收藏起来<br><span>到时直接抄！</span></div>
  <div class="subtitle">祝所有孕妈超快顺产！母子/母女平安！</div>
  <div class="tips">
    <div class="tip"><div class="tip-icon">✅</div> 提前准备好所有物品</div>
    <div class="tip"><div class="tip-icon">✅</div> 装箱时让宝爸一起参与</div>
    <div class="tip"><div class="tip-icon">✅</div> 保持好心情最重要</div>
  </div>
  <div style="font-size:22px;color:#aaa">🤰 祝所有准妈妈顺利卸货！👶</div>
</div>
<div class="bottom-bar">
  <div class="bottom-text">🙋 觉得有用就收藏！</div>
  <div class="tags">
    <div class="tag">#待产包清单</div>
    <div class="tag">#孕期囤货</div>
    <div class="tag">#母婴好物</div>
    <div class="tag">#坐月子</div>
  </div>
</div>
</body></html>
