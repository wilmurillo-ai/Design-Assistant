<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
</style></head><body>
<div style="width:1080px;height:1350px;padding:0;position:relative">
<div style="position:absolute;top:0;left:0;right:0;height:14px;background:#4A90D9"></div>
<div style="position:absolute;top:70px;left:60px">
<div style="font-size:72px;font-weight:900;color:#1d3a5c;letter-spacing:-1px">宝宝篇</div>
<div style="font-size:22px;color:#888;margin-top:10px;letter-spacing:3px">住院必带 · 一个都不能少</div>
</div>
<div style="position:absolute;top:210px;left:60px;right:60px;height:3px;background:linear-gradient(90deg,#4A90D9,#87CEEB);border-radius:2px"></div>
<div style="position:absolute;top:250px;left:50px;right:50px;bottom:40px;overflow:hidden">

<!-- 衣物类 -->
<div style="font-size:22px;font-weight:700;color:#4A90D9;margin:0 0 8px 0;padding-bottom:6px;border-bottom:2px solid #E8F4FC;letter-spacing:2px">【衣物类】</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#4A90D9;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">1</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">半背衣 × 3件</div><div style="font-size:18px;color:#666;margin-top:2px">52码，选开裆款，方便换纸尿裤</div></div>
</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#4A90D9;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">2</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">包被 × 2条</div><div style="font-size:18px;color:#666;margin-top:2px">1厚1薄，厚的进产房，薄款出院用</div></div>
</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#4A90D9;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">3</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">胎帽 × 2顶</div><div style="font-size:18px;color:#666;margin-top:2px">新生儿头部散热快，多备一顶换洗</div></div>
</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#4A90D9;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">4</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">袜子 × 3双</div><div style="font-size:18px;color:#666;margin-top:2px">选弹性好的，不勒脚</div></div>
</div>

<!-- 喂养类 -->
<div style="font-size:22px;font-weight:700;color:#4A90D9;margin:16px 0 8px 0;padding-bottom:6px;border-bottom:2px solid #E8F4FC;letter-spacing:2px">【喂养类】</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#4A90D9;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">5</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">奶瓶 × 2个</div><div style="font-size:18px;color:#666;margin-top:2px">选宽口径，玻璃或PPSU材质都可以</div></div>
</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#4A90D9;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">6</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">小罐奶粉 × 1罐</div><div style="display:inline-block;background:#fff3f0;color:#e85a1a;font-size:14px;padding:3px 10px;border-radius:12px;margin-top:4px">⚠️ 先确认医院是否允许自带</div></div>
</div>

<!-- 护理类 -->
<div style="font-size:22px;font-weight:700;color:#4A90D9;margin:16px 0 8px 0;padding-bottom:6px;border-bottom:2px solid #E8F4FC;letter-spacing:2px">【护理类】</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#4A90D9;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">7</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">NB码纸尿裤 × 1包</div><div style="font-size:18px;color:#666;margin-top:2px">先买1包！宝宝长得快，很快要换S码，别囤多</div></div>
</div>
<div style="display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0">
<div style="width:32px;height:32px;border-radius:50%;background:#4A90D9;flex-shrink:0;margin-right:16px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700">8</div>
<div><div style="font-size:24px;font-weight:700;color:#1d1d1f">棉柔巾 × 1包</div><div style="font-size:18px;color:#666;margin-top:2px">沾温水擦屁屁，也可以当口水巾用</div></div>
</div>

</div>
</div>
</body></html>
