<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#FAFAFA;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
</style></head><body>
<div style="width:1080px;height:1350px;position:relative">

<!-- 背景 -->
<div style="position:absolute;inset:0;background:linear-gradient(160deg,#FFF8F0 0%,#FFF5F8 50%,#F0F5FF 100%)"></div>

<!-- 顶部标题 -->
<div style="position:absolute;top:0;left:0;right:0;height:320px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:30px">
<div style="font-size:26px;font-weight:700;color:#4A3A6A;letter-spacing:8px;margin-bottom:12px">MUST-HAVE LIST</div>
<div style="font-size:64px;font-weight:900;color:#2D1F4E;letter-spacing:-1px;line-height:1">待产包清单</div>
<div style="font-size:22px;color:#8B7BA8;margin-top:10px">精简不闲置 · 一份就够</div>
</div>

<!-- 四个篇章卡片 -->
<div style="position:absolute;top:340px;left:40px;right:40px;bottom:200px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:16px">

<!-- 宝宝产房篇 - 粉色 -->
<div style="background:linear-gradient(135deg,#FFE8F5 0%,#FFD6EA 100%);border-radius:20px;padding:24px 20px;display:flex;flex-direction:column;justify-content:center;align-items:center;border:2px solid rgba(255,182,210,0.3)">
<div style="font-size:18px;font-weight:800;color:#AD1457;letter-spacing:2px;margin-bottom:8px">宝宝进产房</div>
<div style="font-size:40px;margin-bottom:8px">👶</div>
<div style="font-size:28px;font-weight:800;color:#C2185B;margin-bottom:4px">宝宝产房篇</div>
<div style="font-size:14px;color:#AD1457;opacity:0.7">包被 · 半背衣 · 纸尿裤</div>
<div style="width:60px;height:3px;background:#C2185B;border-radius:2px;margin-top:10px"></div>
</div>

<!-- 妈妈产房篇 - 橙色 -->
<div style="background:linear-gradient(135deg,#FFF3E0 0%,#FFE0B2 100%);border-radius:20px;padding:24px 20px;display:flex;flex-direction:column;justify-content:center;align-items:center;border:2px solid rgba(255,183,77,0.3)">
<div style="font-size:18px;font-weight:800;color:#E65100;letter-spacing:2px;margin-bottom:8px">妈妈进产房</div>
<div style="font-size:40px;margin-bottom:8px">🤰</div>
<div style="font-size:28px;font-weight:800;color:#E65100;margin-bottom:4px">妈妈产房篇</div>
<div style="font-size:14px;color:#E65100;opacity:0.7">产褥垫 · 刀纸 · 吸管杯</div>
<div style="width:60px;height:3px;background:#E65100;border-radius:2px;margin-top:10px"></div>
</div>

<!-- 宝宝住院篇 - 蓝色 -->
<div style="background:linear-gradient(135deg,#E3F2FD 0%,#BBDEFB 100%);border-radius:20px;padding:24px 20px;display:flex;flex-direction:column;justify-content:center;align-items:center;border:2px solid rgba(100,181,246,0.3)">
<div style="font-size:18px;font-weight:800;color:#1565C0;letter-spacing:2px;margin-bottom:8px">宝宝住院期</div>
<div style="font-size:40px;margin-bottom:8px">🍼</div>
<div style="font-size:28px;font-weight:800;color:#1565C0;margin-bottom:4px">宝宝住院篇</div>
<div style="font-size:14px;color:#1565C0;opacity:0.7">恒温壶 · 奶瓶 · 护臀膏</div>
<div style="width:60px;height:3px;background:#1565C0;border-radius:2px;margin-top:10px"></div>
</div>

<!-- 妈妈住院篇 - 绿色 -->
<div style="background:linear-gradient(135deg,#E8F5E9 0%,#C8E6C9 100%);border-radius:20px;padding:24px 20px;display:flex;flex-direction:column;justify-content:center;align-items:center;border:2px solid rgba(129,199,132,0.3)">
<div style="font-size:18px;font-weight:800;color:#2E7D32;letter-spacing:2px;margin-bottom:8px">妈妈住院期</div>
<div style="font-size:40px;margin-bottom:8px">👩</div>
<div style="font-size:28px;font-weight:800;color:#2E7D32;margin-bottom:4px">妈妈住院篇</div>
<div style="font-size:14px;color:#2E7D32;opacity:0.7">安睡裤 · 乳头膏 · 月子服</div>
<div style="width:60px;height:3px;background:#2E7D32;border-radius:2px;margin-top:10px"></div>
</div>

</div>

<!-- 底部 -->
<div style="position:absolute;bottom:0;left:0;right:0;height:180px;background:linear-gradient(180deg,rgba(45,31,78,0) 0%,rgba(45,31,78,0.9) 40%,#2D1F4E 100%);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:35px">
<div style="font-size:24px;font-weight:700;color:#fff;letter-spacing:4px;margin-bottom:8px">点击查看完整清单</div>
<div style="font-size:16px;color:rgba(255,255,255,0.5);letter-spacing:2px">滑动浏览全部章节 →</div>
</div>

</div>
</body></html>
