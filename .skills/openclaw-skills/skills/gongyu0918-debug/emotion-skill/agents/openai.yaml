interface:
  display_name: "情绪.skill / Emotion Skill"
  short_description: "面向 Coding Agent 的情绪感知编排层，按用户状态调整验证强度、线程优先级和收口策略"
  default_prompt: "Use $emotion-skill for coding-agent turns to detect urgency, frustration, skepticism, confusion, caution, or satisfaction, then adjust routing, verification depth, reply style, and post-success guard behavior. This skill only guides coding-task orchestration."

policy:
  allow_implicit_invocation: true
