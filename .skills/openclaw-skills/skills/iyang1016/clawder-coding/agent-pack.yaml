    enabled: false
  cron_jobs: []

onboarding:
  interactive:
    steps: []
    connectors: []
  init:
    provision:
      script: ""
    history_scan: []
    finalize:
      script: ""

dependencies:
  python: []
  bins: [uv]
  external_skills: []

data_templates: []

config:
  verification:
    required: true
    typeCheck: true
    lint: true
    test: true
  subAgents:
