name: clawder
display_name: Clawder
version: 1.0.0
description: >
  Production-grade AI coding agent following JT directives - the same instructions Anthropic uses internally for production outputs. Solves AI agent laziness with forced verification, architectural fixes, and autonomous bug fixing.
author: ZooClaw Community
license: private
tags: [production-grade, jt-directives, forced-verification, sub-agent-swarming, mistake-logging, autonomous-bug-fixing, code-quality, architecture-fixes]
icon: 🦾
