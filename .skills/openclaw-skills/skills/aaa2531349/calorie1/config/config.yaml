# Food Calorie Calculator 配置

# 视觉识别配置
vision:
  # 视觉服务提供商：kimi, openai, claude, qwen
  provider: kimi        # 推荐使用 Kimi（中文识别好，便宜）
  model: moonshot-v1-8k-vision-preview  # Kimi 视觉识别模型（支持图片）
  
# 营养数据配置
nutrition:
  # 营养 API 提供商：nutritionix, fatsecret, local
  provider: local       # 使用本地数据库（免费）
  
# API Keys（从环境变量读取或在此配置）
api_keys:
  # Kimi API Key (推荐，用于视觉识别)
  kimi: ""  # 或从环境变量 KIMI_API_KEY 读取
  
  # OpenAI API Key (备选)
  openai: ""  # 或从环境变量 OPENAI_API_KEY 读取
  
  # Nutritionix API Key (用于营养数据，可选)
  nutritionix_app_id: ""  # 或从环境变量 NUTRITIONIX_APP_ID 读取
  nutritionix_api_key: ""  # 或从环境变量 NUTRITIONIX_API_KEY 读取
  
  # 备选：FatSecret API Key
  fatsecret: ""  # 或从环境变量 FATSECRET_KEY 读取

# 输出配置
output:
  language: zh  # zh=中文，en=英文
  include_macros: true  # 显示宏量营养素（蛋白质/碳水/脂肪）
  include_micros: false  # 显示微量营养素（维生素/矿物质）
  
# 使用限制配置（按量付费模式）
usage:
  # 全局限制
  max_requests_per_day: 200         # 每天全平台最多识别次数
  max_requests_per_hour: 100        # 每小时最多识别次数
  
  # 单用户限制
  max_requests_per_user_per_day: 10 # 每用户每天最多识别次数
  max_requests_per_user_total: 50   # 每用户总共最多识别次数
  
  # 用户自备 API Key（超过限制后可继续使用）
  allow_user_api_key: true          # 允许用户提供自己的 API Key
  user_api_key_env: "USER_KIMI_API_KEY"  # 环境变量名
  
  # 成本提示
  cost_per_request: 0.008           # 每次识别约¥0.008
  daily_budget: 5.0                 # 每日预算上限（¥5，约 625 次）
  
# 日志配置
logging:
  level: INFO
  file: data/calorie.log
  max_size_mb: 10
  backup_count: 3
