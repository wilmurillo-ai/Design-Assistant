[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "osops"
version = "1.0.0"
description = "OS Operations toolkit - Shared CLI for system operations"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "Sysom Team", email = "mfeng@linux.alibaba.com"}
]
dependencies = [
    "httpx>=0.24.0",
    "requests>=2.28.0",
    "alibabacloud-tea-openapi>=0.3.0",
    "alibabacloud-credentials>=0.3.0",
    "alibabacloud-tea-util>=0.3.0",
    "alibabacloud-sysom20231230>=1.14.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1.0",
]

[project.scripts]
osops = "sysom_cli.__main__:main"

[tool.black]
line-length = 100
target-version = ["py39"]

[tool.ruff]
line-length = 100
target-version = "py39"
