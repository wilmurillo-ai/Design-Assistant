version: 1
display_name: Harvard Resume Builder
short_description: Generate polished, role-targeted Harvard-style resumes from candidate descriptions, structured input, or existing resumes in any language.
default_prompt: Create a professional Harvard-style resume from the candidate information provided by the user, whether that comes from notes, structured data, or an existing resume. Generate one or more role-targeted DOCX outputs with stronger summaries, tighter bullets, clean black-and-white layout, and no invented facts.
