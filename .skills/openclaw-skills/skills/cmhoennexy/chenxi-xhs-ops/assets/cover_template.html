<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>XHS Cover 04</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 600px; height: 800px; overflow: hidden; }
.card {
  width: 600px; height: 800px;
  background: #fffef5;
  position: relative; overflow: hidden;
  font-family: 'ZCOOL KuaiLe', cursive;
}
.grid-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-image:
    linear-gradient(rgba(80,140,210,0.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(80,140,210,0.12) 1px, transparent 1px);
  background-size: 28px 28px;
}
.binding { position: absolute; left: 68px; top: 0; bottom: 0; width: 2px; background: rgba(220,80,80,0.3); }
.hole { position: absolute; left: 57px; width: 22px; height: 22px; border-radius: 50%; background: #fffef5; border: 2px solid rgba(160,160,160,0.4); }

.content {
  position: relative; z-index: 10;
  padding: 26px 30px 22px 90px;
  height: 100%;
  display: flex; flex-direction: column; gap: 0;
}

.tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: #ffd166; color: #222; font-size: 14px; font-weight: bold;
  padding: 5px 14px; border-radius: 6px; transform: rotate(-1.5deg);
  box-shadow: 3px 3px 0 rgba(0,0,0,0.12); width: fit-content; margin-bottom: 14px;
}

/* 核心对比 */
.compare {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-bottom: 10px;
}
.time-box {
  display: flex; flex-direction: column; align-items: center;
  border: 2.5px solid #111; border-radius: 12px;
  padding: 6px 20px; box-shadow: 3px 3px 0 #111; background: white;
}
.time-box .t { font-size: 58px; font-weight: 900; line-height: 1; }
.time-box .l { font-size: 14px; color: #888; margin-top: 2px; }
.time-box.old .t { color: #aaa; text-decoration: line-through; text-decoration-color: #ef4444; text-decoration-thickness: 5px; }
.time-box.new { border-color: #2563eb; box-shadow: 3px 3px 0 #2563eb; background: #dbeafe; }
.time-box.new .t { color: #2563eb; }
.vs-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.vs-arrow { font-size: 28px; color: #f59e0b; }
.vs-label { font-size: 13px; color: #f59e0b; font-weight: bold; }

/* 副标题 */
.sub { font-size: 22px; font-weight: 900; color: #111; line-height: 1.3; margin-bottom: 4px; }
.sub span { color: #ef4444; }
.desc { font-size: 14px; color: #999; margin-bottom: 12px; }

/* 插图 */
.illus { display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }

/* 步骤 */
.steps { display: flex; flex-direction: column; gap: 7px; margin-bottom: 8px; }
.step {
  display: flex; align-items: center; gap: 10px;
  background: white; border: 2px solid #e5e7eb;
  border-radius: 10px; padding: 7px 14px;
  font-size: 15px; color: #333; box-shadow: 2px 2px 0 #e5e7eb;
}
.sn {
  background: #2563eb; color: white; width: 22px; height: 22px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}

.footer {
  border-top: 1.5px dashed #ddd; padding-top: 7px;
  display: flex; align-items: center; gap: 8px;
}
.fdot { width: 8px; height: 8px; border-radius: 50%; background: #2563eb; flex-shrink: 0; }
.ftxt { font-size: 12px; color: #bbb; }
</style>
</head>
<body>
<div class="card">
  <div class="grid-bg"></div>
  <div class="binding"></div>
  <div class="hole" style="top:90px"></div>
  <div class="hole" style="top:280px"></div>
  <div class="hole" style="top:480px"></div>

  <div class="content">
    <div class="tag">⚡ AI 效率实测</div>

    <div class="compare">
      <div class="time-box old">
        <div class="t">3天</div>
        <div class="l">以前</div>
      </div>
      <div class="vs-wrap">
        <div class="vs-arrow">→</div>
        <div class="vs-label">用AI</div>
      </div>
      <div class="time-box new">
        <div class="t">3小时</div>
        <div class="l">现在</div>
      </div>
    </div>

    <div class="sub">不是我变强了<br>是<span>方法变了</span></div>
    <div class="desc">搭了一套自动监控系统的全过程 👇</div>

    <div class="illus">
      <svg width="390" height="175" viewBox="0 0 390 175" fill="none">
        <!-- 以前：卡壳的程序员 -->
        <rect x="8" y="8" width="155" height="80" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
        <text x="20" y="30" font-family="'ZCOOL KuaiLe',cursive" font-size="13" fill="#ef4444">😩 以前要3天</text>
        <text x="18" y="50" font-family="'ZCOOL KuaiLe',cursive" font-size="12" fill="#777">写接口 → 清洗数据</text>
        <text x="18" y="66" font-family="'ZCOOL KuaiLe',cursive" font-size="12" fill="#777">写推送 → 测试联调</text>
        <text x="18" y="82" font-family="'ZCOOL KuaiLe',cursive" font-size="12" fill="#f87171">踩无数坑 😵</text>

        <!-- 人物 左（累） -->
        <ellipse cx="76" cy="130" rx="20" ry="22" fill="#ffe0b2" stroke="#222" stroke-width="2"/>
        <path d="M56 120 Q62 104 76 102 Q90 104 96 120" fill="#3d2b1f" stroke="#222" stroke-width="1.5"/>
        <path d="M66 128 Q70 124 74 128" stroke="#222" stroke-width="2" fill="none"/>
        <path d="M79 128 Q83 124 87 128" stroke="#222" stroke-width="2" fill="none"/>
        <path d="M68 138 Q76 134 84 138" stroke="#222" stroke-width="2" fill="none"/>
        <ellipse cx="94" cy="118" rx="4" ry="5" fill="#93c5fd" stroke="#222" stroke-width="1.5"/>
        <rect x="60" y="152" width="32" height="18" rx="6" fill="#fca5a5" stroke="#222" stroke-width="2"/>

        <!-- 闪电 -->
        <text x="166" y="88" font-family="sans-serif" font-size="42">⚡</text>
        <text x="162" y="112" font-family="'ZCOOL KuaiLe',cursive" font-size="13" fill="#f59e0b">AI介入</text>

        <!-- 现在：轻松的程序员 -->
        <rect x="228" y="8" width="155" height="80" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
        <text x="240" y="30" font-family="'ZCOOL KuaiLe',cursive" font-size="13" fill="#16a34a">🎉 现在3小时</text>
        <text x="238" y="50" font-family="'ZCOOL KuaiLe',cursive" font-size="12" fill="#444">说需求 → AI起草 ✅</text>
        <text x="238" y="66" font-family="'ZCOOL KuaiLe',cursive" font-size="12" fill="#444">审逻辑 → 我把关 ✅</text>
        <text x="238" y="82" font-family="'ZCOOL KuaiLe',cursive" font-size="12" fill="#16a34a">跑起来！🚀</text>

        <!-- 人物 右（开心） -->
        <ellipse cx="308" cy="130" rx="20" ry="22" fill="#ffe0b2" stroke="#222" stroke-width="2"/>
        <path d="M288 120 Q294 104 308 102 Q322 104 328 120" fill="#3d2b1f" stroke="#222" stroke-width="1.5"/>
        <circle cx="299" cy="128" r="3.5" fill="#222"/>
        <circle cx="317" cy="128" r="3.5" fill="#222"/>
        <circle cx="300" cy="127" r="1.5" fill="white"/>
        <circle cx="318" cy="127" r="1.5" fill="white"/>
        <path d="M299 140 Q308 148 317 140" stroke="#222" stroke-width="2" fill="none" stroke-linecap="round"/>
        <rect x="292" y="152" width="32" height="18" rx="6" fill="#bfdbfe" stroke="#222" stroke-width="2"/>
        <!-- 星星 -->
        <text x="330" y="122" font-size="16">✨</text>
        <text x="345" y="108" font-size="12">⭐</text>
      </svg>
    </div>

    <div class="steps">
      <div class="step"><div class="sn">1</div>描述需求，不写代码 → AI 给框架</div>
      <div class="step"><div class="sn">2</div>读懂逻辑，不照单全收 → 我审核</div>
      <div class="step"><div class="sn">3</div>跑起来出错 → 丢给 AI 修两轮</div>
    </div>

    <div class="footer">
      <div class="fdot"></div>
      <div class="ftxt">Chenxi · 程序员用 AI 真正干活</div>
    </div>
  </div>
</div>
</body>
</html>
