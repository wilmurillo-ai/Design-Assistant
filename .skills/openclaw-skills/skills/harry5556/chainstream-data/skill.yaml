name: chainstream-data
version: 2.0.0
author: chainstream
description: "On-chain big data infrastructure for AI agents. Real-time trading data, token analytics, wallet PnL, market intelligence, KYT compliance, and WebSocket streaming across Solana, BSC, Base, Ethereum."
permissions: [network]
config:
  api_key:
    type: string
    required: false
    secret: true
    description: "ChainStream API key (Bearer token). Not required if using x402."
  preferred_chain:
    type: string
    required: false
    default: "sol"
    description: "Default chain: sol, bsc, base, eth"
  response_format:
    type: string
    required: false
    default: "concise"
    description: "Default response format: concise, detailed, minimal"
  wallet_address:
    type: string
    required: false
    description: "Wallet address for x402 auth (any EVM or Solana wallet)"
  x402_network:
    type: string
    required: false
    default: "eip155:8453"
    description: "x402 settlement network: eip155:8453 (Base), solana:5eykt4UsFv8P8NJdTREpY1vzqKqZKvdp (Solana)"
  x402_plan:
    type: string
    required: false
    default: "nano"
    description: "x402 quota plan: nano ($1/50K CU), micro ($5/350K), starter ($20/1.5M), growth ($50/4M), pro ($150/15M), business ($500/55M)"
  max_spend_per_session:
    type: number
    required: false
    default: 5
    description: "Maximum USDC spend per session for x402 purchases. Safety limit to prevent unintended costs."
entryPoint:
  type: natural
  path: SKILL.md
