version: '3.8'

services:
  claw-search:
    build: .
    image: claw-search:latest
    container_name: claw-search
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # 可选: 添加 API Keys 以获得更好的搜索结果
      # - TAVILY_API_KEY=your_tavily_key
      # - BRAVE_API_KEY=your_brave_key
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
