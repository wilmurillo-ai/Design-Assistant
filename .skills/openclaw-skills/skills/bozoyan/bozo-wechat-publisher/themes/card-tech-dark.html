---
theme-name: "卡片科技暗色"
theme-id: "card-tech-dark"
theme-author: "bozo"
theme-description: "深色科技感卡片式布局，适合技术文章和 AI 内容展示"
based-on: "design-ads"
card-style: true
---

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡片科技暗色主题</title>
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #141b2d;
            --bg-card: #1a2236;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: rgba(99, 102, 241, 0.3);
            --code-bg: #0d1117;
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.8;
            font-size: 17px;
        }

        /* 封面区域 */
        .cover-section {
            background: var(--bg-secondary);
            padding: 60px 40px;
            text-align: center;
            border-bottom: 3px solid;
            border-image: var(--accent-gradient) 1;
            position: relative;
            overflow: hidden;
        }

        .cover-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--accent-gradient);
            opacity: 0.1;
            z-index: 0;
        }

        .cover-badge {
            display: inline-block;
            padding: 8px 20px;
            background: var(--accent-gradient);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .cover-title {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 16px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
        }

        .cover-description {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 内容区域 */
        .content-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 卡片样式 */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: var(--card-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.2);
        }

        .card-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--accent-gradient);
            border-radius: 2px;
        }

        .card-content {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        /* 列表卡片 */
        .list-card {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .list-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 12px;
            border-left: 3px solid var(--accent-primary);
        }

        .list-item-icon {
            width: 24px;
            height: 24px;
            min-width: 24px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            font-weight: bold;
        }

        .list-item-content {
            flex: 1;
        }

        .list-item-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .list-item-desc {
            font-size: 15px;
            color: var(--text-secondary);
        }

        /* 功能网格 */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .feature-item {
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            background: rgba(99, 102, 241, 0.15);
            transform: translateY(-4px);
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .feature-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .feature-desc {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 代码块 */
        .code-block {
            background: var(--code-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            overflow-x: auto;
            position: relative;
        }

        .code-block::before {
            content: attr(data-language);
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 12px;
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.1);
            padding: 4px 12px;
            border-radius: 12px;
        }

        .code-block code {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #e2e8f0;
        }

        /* 引用块 */
        .quote-block {
            border-left: 4px solid var(--accent-primary);
            padding: 20px 24px;
            margin: 24px 0;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 0 12px 12px 0;
            font-style: italic;
        }

        .quote-block::before {
            content: '"';
            font-size: 48px;
            color: var(--accent-primary);
            opacity: 0.3;
            line-height: 1;
            display: block;
            margin-bottom: 8px;
        }

        /* 提示框 */
        .alert-box {
            padding: 16px 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .alert-box.info {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .alert-box.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .alert-box.warning {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .alert-icon {
            font-size: 20px;
        }

        /* 图片 */
        .content-image {
            width: 100%;
            border-radius: 12px;
            margin: 24px 0;
            box-shadow: var(--card-shadow);
        }

        .image-caption {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
            font-style: italic;
        }

        /* 分隔线 */
        .divider {
            height: 2px;
            background: var(--accent-gradient);
            margin: 40px 0;
            opacity: 0.5;
        }

        /* 底部 */
        .footer-section {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 14px;
            border-top: 1px solid var(--border-color);
            margin-top: 60px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .cover-title {
                font-size: 32px;
            }

            .card {
                padding: 20px;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

</body>
</html>
