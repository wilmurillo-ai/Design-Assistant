<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Georgia', 'Times New Roman', serif; color: #1a1a1a; line-height: 1.5; padding: 40px; max-width: 850px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; color: #111; }
  .contact { font-size: 13px; color: #555; margin-bottom: 20px; }
  .contact span { margin-right: 12px; }
  .section { margin-bottom: 22px; }
  .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #333; border-bottom: 1.5px solid #ccc; padding-bottom: 4px; margin-bottom: 12px; }
  .summary { font-size: 14px; color: #444; line-height: 1.6; }
  .experience-entry { margin-bottom: 16px; }
  .entry-header h3 { font-size: 16px; font-weight: 600; display: inline; }
  .company { font-size: 14px; color: #555; margin-left: 8px; }
  .dates { font-size: 13px; color: #777; float: right; }
  ul { margin: 6px 0 0 20px; }
  li { font-size: 14px; margin-bottom: 4px; color: #333; }
  .education-entry { margin-bottom: 10px; }
  .education-entry h3 { font-size: 15px; font-weight: 600; display: inline; }
  .institution { font-size: 14px; color: #555; margin-left: 8px; }
  .skills-section { font-size: 14px; color: #333; }
</style>
</head>
<body>
  <h1>{{name}}</h1>
  <div class="contact">
    <span>{{contact.email}}</span>
    <span>{{contact.phone}}</span>
    <span>{{contact.location}}</span>
    <span>{{contact.linkedin}}</span>
  </div>

  <div class="section">
    <div class="section-title">Summary</div>
    <p class="summary">{{summary}}</p>
  </div>

  <div class="section">
    <div class="section-title">Experience</div>
    {{experience_section}}
  </div>

  <div class="section">
    <div class="section-title">Education</div>
    {{education_section}}
  </div>

  <div class="section">
    <div class="section-title">Skills</div>
    <p class="skills-section">{{skills_list}}</p>
  </div>
</body>
</html>
