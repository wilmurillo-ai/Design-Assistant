<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Expense Report - {{MONTH}}</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; margin: 40px; }
        h1 { font-size: 28px; margin-bottom: 5px; color: #2c3e50; }
        .header { border-bottom: 2px solid #14b8a6; padding-bottom: 20px; margin-bottom: 30px; }
        .meta { font-size: 14px; color: #7f8c8d; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ecf0f1; }
        th { background-color: #f8f9fa; color: #2c3e50; font-weight: 600; text-transform: uppercase; font-size: 12px; }
        tr:hover { background-color: #f5f5f5; }
        .total-row { font-weight: bold; background-color: #e8f8f5; border-top: 2px solid #14b8a6; }
        .total-row td { font-size: 18px; color: #0e6655; }
        .footer { margin-top: 50px; font-size: 12px; color: #95a5a6; text-align: center; border-top: 1px solid #ecf0f1; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Expense Report</h1>
        <div class="meta">
            Period: {{MONTH}}<br>
            Generated: {{GENERATED_DATE}}
        </div>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Vendor</th>
                <th>Category</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            {{ROWS}}
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="3" style="text-align: right; padding-right: 20px;">Total Expenses:</td>
                <td>{{TOTAL}}</td>
            </tr>
        </tfoot>
    </table>
    
    <div class="footer">
        Generated by Expense Report Pro
    </div>
</body>
</html>
