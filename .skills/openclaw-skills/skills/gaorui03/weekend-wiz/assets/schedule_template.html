<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的日程</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f0f4f8 0%, #e8f0fe 100%);
      min-height: 100vh;
      padding: 30px 20px 40px;
    }
    .container { max-width: 460px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { color: #1e3a5f; font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .header .subtitle { color: #6b8299; font-size: 14px; }
    .legend {
      display: flex; justify-content: center; gap: 20px;
      margin-bottom: 25px; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #5a6c7d; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .legend-dot.fitness { background: #10b981; }
    .legend-dot.health { background: #8b5cf6; }
    .legend-dot.work { background: #f59e0b; }
    .date-group { margin-bottom: 20px; }
    .date-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-left: 5px; }
    .date-day { color: #1e3a5f; font-size: 16px; font-weight: 600; }
    .date-label { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .date-label.today { background: #dcfce7; color: #166534; }
    .date-label.tomorrow { background: #fce7f3; color: #be185d; }
    .date-label.thisweek { background: #dbeafe; color: #1d4ed8; }
    .date-label.upcoming { background: #f3f4f6; color: #6b7280; }
    .card {
      background: #fff; border-radius: 16px; padding: 18px;
      margin-bottom: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex; gap: 14px; border-left: 4px solid #ccc;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .card.fitness { border-left-color: #10b981; }
    .card.health { border-left-color: #8b5cf6; }
    .card.work { border-left-color: #f59e0b; }
    .time-block { background: #f8fafc; border-radius: 12px; padding: 10px 12px; text-align: center; min-width: 60px; }
    .time-block.fitness { background: #ecfdf5; }
    .time-block.health { background: #f5f3ff; }
    .time-block.work { background: #fffbeb; }
    .time-start { font-size: 16px; font-weight: 700; }
    .time-start.fitness { color: #10b981; }
    .time-start.health { color: #8b5cf6; }
    .time-start.work { color: #f59e0b; }
    .time-end { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .event-content { flex: 1; }
    .event-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .event-icon { font-size: 22px; }
    .event-title { color: #1e3a5f; font-size: 16px; font-weight: 600; }
    .event-location { color: #6b8299; font-size: 13px; margin-bottom: 10px; }
    .reminder-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #fef3c7; color: #92400e;
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
    }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, #d1d5db, transparent); margin: 25px 0; }
    .reminder-section { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .section-title { color: #1e3a5f; font-size: 16px; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    .reminder-list { display: flex; flex-direction: column; gap: 10px; }
    .reminder-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #f8fafc; border-radius: 12px; }
    .reminder-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .reminder-icon.fitness { background: #ecfdf5; }
    .reminder-icon.health { background: #f5f3ff; }
    .reminder-icon.work { background: #fffbeb; }
    .reminder-content { flex: 1; }
    .reminder-name { color: #1e3a5f; font-size: 14px; font-weight: 500; }
    .reminder-type { color: #94a3b8; font-size: 12px; margin-top: 2px; }
    .reminder-time { color: #6b8299; font-size: 13px; font-weight: 500; text-align: right; }
    .footer { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📅 日程安排</h1>
      <div class="subtitle" id="current-month">2026年3月</div>
    </div>
    
    <div class="legend">
      <div class="legend-item"><div class="legend-dot fitness"></div>运动健身</div>
      <div class="legend-item"><div class="legend-dot health"></div>医疗健康</div>
      <div class="legend-item"><div class="legend-dot work"></div>工作会议</div>
    </div>

    <!-- SCHEDULE_CONTENT_PLACEHOLDER -->

    <div class="footer">✨ 由 WeekendWiz 魔法生成</div>
  </div>
</body>
</html>
