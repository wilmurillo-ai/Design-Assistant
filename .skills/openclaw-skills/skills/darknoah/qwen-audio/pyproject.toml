[project]
name = "qwen3-audio"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mlx-audio>=0.3.1; platform_system == 'Darwin'",
    "qwen-asr; platform_system != 'Darwin'",
    "qwen-tts>=0.1.1; platform_system != 'Darwin'",
    "torch; platform_system != 'Darwin'"
]

[tool.uv]
extra-index-url = [
    "https://pypi.org/simple"
]
override-dependencies = ["transformers==4.57.6"]

[tool.uv.sources]
torch = [
    { index = "torch-gpu", marker = "platform_system == 'Windows'"},
]

[[tool.uv.index]]
name = "torch-gpu"
url = "https://download.pytorch.org/whl/cu121"
explicit = true
