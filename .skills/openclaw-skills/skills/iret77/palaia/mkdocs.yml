site_name: Palaia
site_description: Local, cloud-free memory for OpenClaw agents.
site_url: https://github.com/iret77/palaia
repo_url: https://github.com/iret77/palaia

theme:
  name: readthedocs

nav:
  - Home: README.md
  - Getting Started: docs/getting-started.md
  - CLI Reference: docs/cli-reference.md
  - Architecture: ARCHITECTURE.md
  - ADRs:
    - 001 - Tiered Semantic Search: docs/adr/001-semantic-search-tiered.md
    - 002 - Scope Tags: docs/adr/002-scope-tags-knowledge-transfer.md
    - 003 - WAL Protocol: docs/adr/003-wal-protocol.md
    - 004 - HOT/WARM/COLD Tiering: docs/adr/004-hot-warm-cold-tiering.md
    - 005 - Git as Knowledge Exchange: docs/adr/005-git-as-knowledge-exchange.md
    - 006 - Memory Entry Format: docs/adr/006-memory-entry-format.md
    - 007 - Concurrent Write Locking: docs/adr/007-concurrent-write-locking.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - codehilite
