<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    margin: 0;
    padding: 0;
    background: #fffdf8;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: #2b2b2b;
  }
  .wrap {
    box-sizing: border-box;
    width: 100%;
    padding: 70px 80px 90px 80px;
  }
  h1 {
    font-size: 42px;
    line-height: 1.3;
    margin: 0 0 36px 0;
    color: #1a1a1a;
  }
  p {
    font-size: 34px;
    line-height: 1.8;
    margin: 0 0 18px 0;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .spacer {
    margin: 0 0 20px 0;
    height: 10px;
  }
  .signature {
    margin-top: 40px;
    font-size: 30px;
    color: #888;
  }
</style>
</head>
<body>
<div class="wrap">
{{CONTENT}}
</div>
</body>
</html>
