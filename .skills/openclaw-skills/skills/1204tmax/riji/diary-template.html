<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    margin: 0;
    padding: 0;
    background: #fffdf8;
    font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: #2b2b2b;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .wrap {
    box-sizing: border-box;
    width: 100%;
    padding: 60px 72px 80px 72px;
  }
  h1 {
    font-size: 36px;
    font-weight: 600;
    line-height: 1.4;
    margin: 0 0 32px 0;
    color: #1a1a1a;
  }
  p {
    font-size: 28px;
    font-weight: 400;
    line-height: 1.9;
    margin: 0 0 16px 0;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .spacer {
    margin: 0 0 18px 0;
    height: 8px;
  }
  .signature {
    margin-top: 40px;
    font-size: 26px;
    color: #888;
  }
</style>
</head>
<body>
<div class="wrap">
{{CONTENT}}
</div>
</body>
</html>
