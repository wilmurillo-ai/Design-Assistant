<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>

  <!-- 装饰圆形 -->
  <circle cx="100" cy="100" r="80" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="1100" cy="300" r="100" fill="#6366f1" opacity="0.1"/>

  <!-- 左侧：海报预览 -->
  <g>
    <!-- 海报框 -->
    <rect x="50" y="80" width="280" height="280" fill="white" rx="12" opacity="0.95"/>

    <!-- 海报内容 -->
    <rect x="70" y="100" width="240" height="50" fill="url(#accentGradient)" rx="8"/>
    <text x="190" y="135" font-size="20" font-weight="bold" fill="white" text-anchor="middle">AI大图生成</text>

    <!-- 内容行 -->
    <line x1="70" y1="160" x2="310" y2="160" stroke="#e5e7eb" stroke-width="2"/>
    <line x1="70" y1="180" x2="310" y2="180" stroke="#e5e7eb" stroke-width="2"/>
    <line x1="70" y1="200" x2="310" y2="200" stroke="#e5e7eb" stroke-width="2"/>
    <line x1="70" y1="220" x2="280" y2="220" stroke="#e5e7eb" stroke-width="2"/>
    <line x1="70" y1="240" x2="290" y2="240" stroke="#e5e7eb" stroke-width="2"/>

    <!-- 底部标签 -->
    <rect x="70" y="270" width="60" height="25" fill="#2563eb" rx="4"/>
    <text x="100" y="288" font-size="12" font-weight="bold" fill="white" text-anchor="middle">4K</text>

    <rect x="145" y="270" width="60" height="25" fill="#8b5cf6" rx="4"/>
    <text x="175" y="288" font-size="12" font-weight="bold" fill="white" text-anchor="middle">8K</text>

    <rect x="220" y="270" width="70" height="25" fill="#06b6d4" rx="4"/>
    <text x="255" y="288" font-size="12" font-weight="bold" fill="white" text-anchor="middle">修图</text>
  </g>

  <!-- 中间：功能列表 -->
  <g>
    <!-- 标题 -->
    <text x="600" y="60" font-size="48" font-weight="bold" fill="white" text-anchor="middle">Digilifeform</text>
    <text x="600" y="110" font-size="36" font-weight="bold" fill="#fbbf24" text-anchor="middle">AI大图生成器</text>

    <!-- 副标题 -->
    <text x="600" y="150" font-size="18" fill="#e0e7ff" text-anchor="middle">一键将文案、文档转换为4K/8K高清信息海报</text>

    <!-- 功能点 -->
    <g>
      <!-- 功能1 -->
      <circle cx="420" cy="210" r="6" fill="#fbbf24"/>
      <text x="440" y="215" font-size="16" fill="white">文本转大图</text>

      <!-- 功能2 -->
      <circle cx="420" cy="250" r="6" fill="#fbbf24"/>
      <text x="440" y="255" font-size="16" fill="white">文件上传支持</text>

      <!-- 功能3 -->
      <circle cx="420" cy="290" r="6" fill="#fbbf24"/>
      <text x="440" y="295" font-size="16" fill="white">多清晰度选择</text>

      <!-- 功能4 -->
      <circle cx="420" cy="330" r="6" fill="#fbbf24"/>
      <text x="440" y="335" font-size="16" fill="white">AI智能修图</text>
    </g>
  </g>

  <!-- 右侧：统计信息 -->
  <g>
    <!-- 统计框1 -->
    <rect x="920" y="80" width="240" height="80" fill="rgba(255,255,255,0.1)" rx="8" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="1040" y="110" font-size="32" font-weight="bold" fill="#fbbf24" text-anchor="middle">1250+</text>
    <text x="1040" y="145" font-size="14" fill="#e0e7ff" text-anchor="middle">用户安装</text>

    <!-- 统计框2 -->
    <rect x="920" y="180" width="240" height="80" fill="rgba(255,255,255,0.1)" rx="8" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="1040" y="210" font-size="32" font-weight="bold" fill="#fbbf24" text-anchor="middle">4.8★</text>
    <text x="1040" y="245" font-size="14" fill="#e0e7ff" text-anchor="middle">用户评分</text>

    <!-- 统计框3 -->
    <rect x="920" y="280" width="240" height="80" fill="rgba(255,255,255,0.1)" rx="8" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="1040" y="310" font-size="32" font-weight="bold" fill="#fbbf24" text-anchor="middle">2-5分钟</text>
    <text x="1040" y="345" font-size="14" fill="#e0e7ff" text-anchor="middle">平均生成时间</text>
  </g>
</svg>
