# Memory Augment Configuration

# Storage settings
storage:
  path: ~/.memory-augment/storage.yaml
  format: yaml

# Core settings
settings:
  max_memories: 1000
  default_expiry: 7  # days for temporary memories
  score_decay: 0.95  # daily decay factor

# Search configuration
search:
  top_k: 20
  min_score: 0.3
  include_tags: true

# Auto-inject settings (for agents)
auto_inject:
  enabled: true
  max_tokens: 5000
  inject_before:
    - "each_turn"
    - "weekly_summary"

# Trigger-based injection (inject memories when discussing these topics)
triggers:
  - "income"
  - "skills"
  - "workspace"
  - "preferences"
  - "decisions"
