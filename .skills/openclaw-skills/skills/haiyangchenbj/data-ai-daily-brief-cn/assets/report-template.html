<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data+AI 全球日报 | {{DATE}}</title>
<style>
  :root {
    --primary: #1a73e8;
    --primary-light: #e8f0fe;
    --accent: #ea4335;
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --green: #34a853;
    --orange: #fbbc04;
    --purple: #9334e6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding: 20px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  
  /* Header */
  .header {
    background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
    color: white;
    padding: 40px;
    border-radius: 16px;
    margin-bottom: 24px;
    box-shadow: 0 4px 20px rgba(26, 115, 232, 0.3);
  }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .header .date { font-size: 16px; opacity: 0.9; }
  
  /* Summary Box */
  .summary-box {
    background: var(--card-bg);
    border-left: 4px solid var(--accent);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .summary-box h2 { font-size: 18px; color: var(--accent); margin-bottom: 16px; }
  .summary-box ol { padding-left: 20px; }
  .summary-box li { margin-bottom: 8px; font-size: 15px; }
  .summary-box .verdict {
    background: var(--primary-light);
    padding: 12px 16px;
    border-radius: 8px;
    margin-top: 16px;
    font-size: 14px;
    color: var(--primary);
    font-weight: 500;
  }
  
  /* Section */
  .section {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }
  .section-header .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
    color: white;
  }
  .badge-a { background: var(--accent); }
  .badge-b { background: var(--primary); }
  .badge-c { background: var(--green); }
  .badge-d { background: var(--purple); }
  .badge-e { background: var(--orange); }
  .section-header h2 { font-size: 18px; font-weight: 600; }
  
  /* Item */
  .item {
    padding: 16px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .item:last-child { border-bottom: none; }
  .item h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }
  .item .source {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .item .source a { color: var(--primary); text-decoration: none; }
  .item .source a:hover { text-decoration: underline; }
  .item .body { font-size: 14px; line-height: 1.7; color: #3c4043; }
  .item .impact {
    background: #f0f7ff;
    padding: 10px 14px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 13px;
    color: #1a56db;
  }
  
  /* Footer */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  
  /* Responsive */
  @media (max-width: 640px) {
    body { padding: 12px; }
    .header { padding: 24px; }
    .header h1 { font-size: 22px; }
    .section, .summary-box { padding: 20px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>📊 Data+AI 全球日报</h1>
    <div class="date">{{DATE}} · 严格只包含过去24小时信息</div>
  </div>

  <!-- 根据实际日报内容填充以下模板 -->
  
  <div class="summary-box">
    <h2>🔥 今日最重要的3个变化</h2>
    <ol>
      <li>{{CHANGE_1}}</li>
      <li>{{CHANGE_2}}</li>
      <li>{{CHANGE_3}}</li>
    </ol>
    <div class="verdict">
      <strong>总判断：</strong>{{VERDICT}}
    </div>
  </div>

  <!-- Section A: Top Signals -->
  <div class="section">
    <div class="section-header">
      <span class="badge badge-a">A</span>
      <h2>Top Signals</h2>
    </div>
    <!-- Items here -->
  </div>

  <!-- Section B: Product & Tech -->
  <div class="section">
    <div class="section-header">
      <span class="badge badge-b">B</span>
      <h2>Product & Tech</h2>
    </div>
    <!-- Items here -->
  </div>

  <!-- Section C: People & Views -->
  <div class="section">
    <div class="section-header">
      <span class="badge badge-c">C</span>
      <h2>People & Views</h2>
    </div>
    <!-- Items here -->
  </div>

  <!-- Section D: Analyst Insights -->
  <div class="section">
    <div class="section-header">
      <span class="badge badge-d">D</span>
      <h2>Analyst Insights</h2>
    </div>
    <!-- Items here -->
  </div>

  <!-- Section E: Watchlist -->
  <div class="section">
    <div class="section-header">
      <span class="badge badge-e">E</span>
      <h2>Watchlist</h2>
    </div>
    <!-- Items here -->
  </div>

  <div class="footer">
    <p>Powered by Data+AI Daily Brief Skill</p>
    <p>信息截至北京时间 {{DATE}} 08:00</p>
  </div>

</div>
</body>
</html>
