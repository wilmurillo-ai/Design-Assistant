<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艾登师傅 - 短信验证码登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .logo span {
            color: #07c160;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
            outline: none;
        }
        input:focus {
            border-color: #07c160;
        }
        input[type="text"] {
            flex: 1;
        }
        .btn {
            background: #07c160;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .btn:hover {
            background: #06ad56;
            transform: translateY(-2px);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #06ad56;
        }
        .btn-login:disabled {
            background: #ccc;
            transform: none;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #999;
            font-size: 14px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        .divider span {
            padding: 0 16px;
        }
        .switch-link {
            color: #1890ff;
            cursor: pointer;
            font-size: 14px;
            text-decoration: underline;
        }
        .hidden { display: none; }
        .success-icon {
            width: 60px;
            height: 60px;
            background: #52c41a;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 16px;
        }
        .success-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }
        .user-info {
            margin-top: 16px;
            color: #52c41a;
            font-weight: 500;
            font-size: 16px;
        }
        .token-display {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            margin: 16px 0;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
        }
        .error-msg {
            color: #ff4d4f;
            font-size: 14px;
            margin-top: 8px;
            text-align: left;
        }
        .phone-display {
            background: #e6f7ff;
            color: #1890ff;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">艾登<span>师傅</span></div>
        <div class="subtitle">短信验证码登录 WorkBuddy</div>
        
        <!-- 登录表单 -->
        <div id="loginForm">
            <div class="form-group">
                <label>手机号</label>
                <input type="text" id="phone" placeholder="请输入手机号" maxlength="11">
            </div>
            
            <div class="form-group">
                <label>验证码</label>
                <div class="input-wrapper">
                    <input type="text" id="verifyCode" placeholder="请输入验证码" maxlength="6">
                    <button class="btn" id="sendBtn" onclick="sendVerifyCode()">发送验证码</button>
                </div>
            </div>
            
            <div id="errorMsg" class="error-msg hidden"></div>
            
            <button class="btn btn-login" onclick="login()">登录</button>
            
            <div class="divider">
                <span>或</span>
            </div>
            
            <div class="switch-link" onclick="switchToQrLogin()">使用微信扫码登录</div>
        </div>
        
        <!-- 成功区域 -->
        <div id="successSection" class="hidden">
            <div class="success-icon">
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
            </div>
            <div class="phone-display" id="loggedPhone"></div>
            <div class="user-info" id="userInfo"></div>
            <div class="token-display" id="tokenDisplay"></div>
            <button class="btn" onclick="copyToken()">复制 Token</button>
            <button class="btn btn-login" style="margin-top: 12px;" onclick="switchLogin()">切换账号</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://mes.dderp.cn/mob';
        let countdown = 0;
        let countdownTimer = null;
        let token = '';
        let userInfo = null;

        // 发送验证码
        async function sendVerifyCode() {
            const phone = document.getElementById('phone').value.trim();
            
            if (!phone) {
                showError('请输入手机号');
                return;
            }
            
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showError('请输入正确的手机号');
                return;
            }
            
            hideError();
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/auth/sendVerifyCode?phoneNumber=${phone}`, {
                    method: 'GET'
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    startCountdown();
                    showError('验证码已发送，请注意查收');
                    document.getElementById('errorMsg').style.color = '#52c41a';
                } else {
                    showError(result.message || '发送失败，请重试');
                    sendBtn.disabled = false;
                }
            } catch (error) {
                showError('网络错误，请检查连接');
                sendBtn.disabled = false;
            }
        }

        // 倒计时
        function startCountdown() {
            countdown = 60;
            const sendBtn = document.getElementById('sendBtn');
            
            countdownTimer = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    sendBtn.textContent = `${countdown}秒后重发`;
                } else {
                    clearInterval(countdownTimer);
                    sendBtn.textContent = '发送验证码';
                    sendBtn.disabled = false;
                }
            }, 1000);
        }

        // 登录
        async function login() {
            const phone = document.getElementById('phone').value.trim();
            const verifyCode = document.getElementById('verifyCode').value.trim();
            
            if (!phone) {
                showError('请输入手机号');
                return;
            }
            
            if (!verifyCode) {
                showError('请输入验证码');
                return;
            }
            
            hideError();
            const loginBtn = document.querySelector('.btn-login');
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            
            try {
                const response = await fetch(`${API_BASE}/auth/sms/login?phoneNumber=${phone}&code=${verifyCode}`, {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                if (result.code === 200 && result.data) {
                    // 登录成功
                    token = result.data.access_token || result.data.token;
                    userInfo = result.data.userInfo || result.data;
                    showSuccess(phone, userInfo);
                    saveToken(token, userInfo);
                } else {
                    showError(result.message || '登录失败，请检查验证码');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                }
            } catch (error) {
                showError('网络错误，请检查连接');
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        }

        // 显示成功
        function showSuccess(phone, userInfo) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('successSection').classList.remove('hidden');
            
            document.getElementById('loggedPhone').textContent = `手机号：${phone}`;
            document.getElementById('userInfo').textContent = 
                `欢迎，${userInfo.nickname || userInfo.realName || '用户'}！`;
            document.getElementById('tokenDisplay').textContent = token;
        }

        // 显示错误
        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        // 隐藏错误
        function hideError() {
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('errorMsg').style.color = '#ff4d4f';
        }

        // 复制Token
        function copyToken() {
            navigator.clipboard.writeText(token).then(() => {
                alert('Token 已复制到剪贴板！');
            });
        }

        // 切换到扫码登录
        function switchToQrLogin() {
            window.location.href = 'qr-login.html';
        }

        // 切换账号
        function switchLogin() {
            // 清除本地存储
            localStorage.removeItem('aiding_shifu_token');
            localStorage.removeItem('aiding_shifu_login_time');
            localStorage.removeItem('aiding_shifu_user_info');
            
            // 重置表单
            document.getElementById('phone').value = '';
            document.getElementById('verifyCode').value = '';
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('successSection').classList.add('hidden');
            
            // 重置按钮状态
            const loginBtn = document.querySelector('.btn-login');
            loginBtn.disabled = false;
            loginBtn.textContent = '登录';
            
            if (countdownTimer) {
                clearInterval(countdownTimer);
            }
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.textContent = '发送验证码';
            sendBtn.disabled = false;
        }

        // 保存Token
        function saveToken(token, userInfo) {
            // 保存到本地存储（仅用于展示）
            localStorage.setItem('aiding_shifu_token', token);
            localStorage.setItem('aiding_shifu_login_time', new Date().toISOString());
            localStorage.setItem('aiding_shifu_user_info', JSON.stringify(userInfo));
            
            // 通知父窗口（如果有的话）
            if (window.opener) {
                window.opener.postMessage({ type: 'LOGIN_SUCCESS', token: token, userInfo: userInfo }, '*');
            }
        }

        // 监听回车键
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
