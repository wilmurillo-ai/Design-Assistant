    - "导演"
    - "编剧"
    - "未完待续"
  phantom_phrases:
    - "字幕编辑"
    - "订阅我们的频道"
    - "ooooooo"
    - "字幕"
    - "电话来电"
    - "铃声"
    - "字幕创建者"
  phantom_patterns:
    - "^um+[mm]*$"
    - "^mm+[mm]*$"
    - "^aa+[aa]*$"
    - "^kiwi[.\\s]*kiwi[.\\s]*kiwi"
    - "^(kiwi[.\\s]*){2,}$"

