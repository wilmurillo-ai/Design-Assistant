# Dangerous command patterns (regexes)
security_patterns:
  critical:
    - "删除\\s+(所有 | 全部 | 文件 | 文件夹 | 目录)"
    - "rm\\s+(-rf|/r|/f|rf)"
    - "format\\s+[a-zA-Z]:"
    - "shutdown\\s+(-h|-s|/s|/h|now)"
    - "重启 | 重新启动"
    - "关闭\\s+(电脑 | 计算机 | 系统)"
    - "发送\\s+(密码 | 密钥 | token|secret|secrets)"
    - "显示\\s+(密码 | 密钥|token)"
    - "告诉\\s+(密码 | 密码 | 代码|pin)"
  dangerous:
    - "sudo\\s+"
    - "chmod\\s+777|chmod\\s+-R"
    - "systemctl\\s+(stop|disable|kill)"
    - "net\\s+stop"
    - "安装\\s+(未知 | 不可信)"
    - "下载\\s+(可执行文件 | 病毒 | 木马)"
  warning:
    - "更改\\s+(设置 | 配置)"
    - "配置\\s+(系统 | 服务器|nginx|apache)"
    - "打开\\s+(端口 | 端口号)"
    - "关闭\\s+(端口 | 端口号 | 防火墙)"
    - "ping\\s+-t"
    - "移动\\s+(文件 | 文件夹)"
    - "复制"

# Dangerous command examples
dangerous_commands:
  critical:
    - "删除所有文件"
    - "格式化 c 盘"
    - "立即关机"
    - "sudo rm -rf"
    - "发送密码"
