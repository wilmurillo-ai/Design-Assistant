<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦞 AUTOCLAW</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 400px;
      max-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', Roboto, sans-serif;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
      padding: 16px 20px;
      text-align: center;
    }

    .header h1 {
      color: white;
      font-size: 16px;
      font-weight: 600;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: #F3F4F6;
      padding: 4px;
      margin: 12px;
      border-radius: 12px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: #6B7280;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: white;
      color: #8B5CF6;
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.15);
    }

    .tab-content {
      display: none;
      padding: 0 16px 16px;
      max-height: 340px;
      overflow-y: auto;
    }

    .tab-content.active {
      display: block;
    }

    /* Status Card */
    .status-card {
      background: rgba(139, 92, 246, 0.08);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid rgba(139, 92, 246, 0.15);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-label {
      color: #6B7280;
      font-size: 12px;
    }

    .status-value {
      color: #1F2937;
      font-size: 13px;
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.connected {
      background: #10B981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    }

    .status-dot.disconnected {
      background: #9CA3AF;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
    }

    .btn-primary.active {
      background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      50% { opacity: 0.8; }
    }

    .btn-secondary {
      background: rgba(139, 92, 246, 0.1);
      color: #8B5CF6;
    }

    .btn-secondary:hover {
      background: rgba(139, 92, 246, 0.2);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      color: #EF4444;
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .btn-small {
      padding: 8px 12px;
      font-size: 12px;
      width: auto;
    }

    .tabs-count {
      background: rgba(139, 92, 246, 0.15);
      color: #8B5CF6;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    /* Debug Panel */
    .debug-panel {
      background: #1F2937;
      border-radius: 12px;
      padding: 12px;
      max-height: 200px;
      overflow-y: auto;
    }

    .debug-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .debug-title {
      color: #10B981;
      font-size: 12px;
      font-weight: 600;
    }

    .log-entry {
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 11px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: #E5E7EB;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-time {
      color: #6B7280;
      margin-right: 6px;
    }

    .log-type {
      color: #8B5CF6;
      margin-right: 6px;
    }

    .log-info .log-type { color: #3B82F6; }
    .log-success .log-type { color: #10B981; }
    .log-error .log-type { color: #EF4444; }
    .log-record .log-type { color: #F59E0B; }
    .log-play .log-type { color: #06B6D4; }
    .log-workflow .log-type { color: #EC4899; }

    /* Recording */
    .record-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .record-status {
      font-size: 12px;
      color: #6B7280;
      text-align: center;
      margin-bottom: 8px;
    }

    .record-status.recording {
      color: #EF4444;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.5; }
    }

    .recorded-steps {
      background: #F9FAFB;
      border-radius: 8px;
      padding: 10px;
      max-height: 120px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .step-item {
      font-size: 11px;
      color: #4B5563;
      padding: 4px 0;
      border-bottom: 1px solid #E5E7EB;
    }

    .step-item:last-child {
      border-bottom: none;
    }

    /* Templates */
    .template-list {
      max-height: 280px;
      overflow-y: auto;
    }

    .template-item {
      background: #F9FAFB;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #E5E7EB;
    }

    .template-name {
      font-size: 13px;
      font-weight: 600;
      color: #1F2937;
      margin-bottom: 4px;
    }

    .template-name span {
      font-weight: 400;
      color: #6B7280;
      font-size: 11px;
    }

    .template-desc {
      font-size: 11px;
      color: #6B7280;
      margin-bottom: 8px;
    }

    .template-actions {
      display: flex;
      gap: 8px;
    }

    .template-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .template-btn.run {
      background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
      color: white;
    }

    .template-btn.run:hover {
      transform: translateY(-1px);
    }

    /* Footer */
    .footer {
      padding: 12px 16px;
      text-align: center;
      border-top: 1px solid rgba(139, 92, 246, 0.1);
    }

    .footer a {
      color: #8B5CF6;
      text-decoration: none;
      font-size: 12px;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8B5CF6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 20px;
      padding: 24px;
      max-width: 280px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(139, 92, 246, 0.3);
      animation: modalIn 0.3s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: #1F2937;
      margin-bottom: 8px;
    }

    .modal-message {
      font-size: 13px;
      color: #6B7280;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .modal-btn {
      background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .modal-btn.success {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
    }

    .modal-btn.error {
      background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
    }

    .modal-btn.info {
      background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦞 AutoClaw v6.0</h1>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="main">Main</button>
    <button class="tab-btn" data-tab="record">Record</button>
    <button class="tab-btn" data-tab="workflows">Workflows</button>
    <button class="tab-btn" data-tab="debug">Debug</button>
  </div>

  <!-- Main Tab -->
  <div class="tab-content active" id="main">
    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-value">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Checking...</span>
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">Tabs</span>
        <span class="tabs-count" id="tabsCount">0</span>
      </div>
    </div>

    <button class="btn btn-primary" id="attachAllBtn">📎 Attach All Tabs</button>
    <button class="btn btn-secondary" id="pickerBtn">🎯 Element Picker</button>
    <button class="btn btn-danger" id="disconnectBtn">✖ Disconnect</button>
    <button class="btn btn-secondary" id="openOptions">⚙️ Settings</button>
  </div>

  <!-- Record Tab -->
  <div class="tab-content" id="record">
    <div class="record-status" id="recordStatus">○ Not recording</div>
    
    <div class="record-controls">
      <button class="btn btn-primary btn-small" id="recordBtn" style="flex:1">🔴 Start Record</button>
      <button class="btn btn-danger btn-small" id="stopRecordBtn" style="flex:1;display:none">⏹ Stop</button>
    </div>
    
    <div class="recorded-steps" id="recordedSteps">
      <div class="step-item">No operations recorded yet</div>
    </div>
    
    <button class="btn btn-primary" id="playRecordBtn">▶️ Play Recording</button>
  </div>

  <!-- Workflows Tab -->
  <div class="tab-content" id="workflows">
    <div class="template-list" id="templateList">
      <!-- Templates will be rendered by JS -->
    </div>
  </div>

  <!-- Debug Tab -->
  <div class="tab-content" id="debug">
    <div class="debug-panel">
      <div class="debug-header">
        <span class="debug-title">📋 Debug Logs</span>
        <button class="btn btn-small btn-secondary" id="clearLogs" style="width:auto;padding:4px 8px;margin:0">Clear</button>
      </div>
      <div id="debugLogs">
        <div class="log-entry log-info">
          <span class="log-time">--:--:--</span>
          <span class="log-type">[INFO]</span>
          <span class="log-message">AutoClaw ready</span>
        </div>
      </div>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span style="color: #6B7280; font-size: 13px;">Connecting...</span>
  </div>

  <div class="footer">
    <a href="#" id="openNewTab">🌐 Open New Tab</a>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <span class="modal-icon" id="modalIcon">✅</span>
      <div class="modal-title" id="modalTitle">Success</div>
      <div class="modal-message" id="modalMessage">Operation completed</div>
      <button class="modal-btn" id="modalBtn">OK</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
