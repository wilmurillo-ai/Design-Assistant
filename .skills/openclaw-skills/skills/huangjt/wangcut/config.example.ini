[wangcut]
# 秦丝智能视频剪辑APP账号配置
username = 你的手机号
password = 你的密码

# API基础URL (通常不需要修改)
base_url = https://cloud.qinsilk.com/aicut/api/v1

# 默认素材文件夹ID (可选，留空表示不限制文件夹)
folder_id = 58

# 视频下载保存目录
download_dir = ./downloads

[task_defaults]
# 默认语音类型
voice_type = f_liuyuxi_20251009
# 语音速度 (0.5-2.0)
voice_speed = 1.3
# 语音音调
voice_pitch = 1
# 视频分辨率宽度
resolution_width = 1080
# 视频分辨率高度
resolution_height = 1920
# 是否启用字幕
subtitle_enabled = true
# 字幕字体大小
subtitle_font_size = 90
# 字幕颜色
subtitle_font_color = yellow
# 字幕字体
subtitle_font = 江城律动宋
# 字幕位置 (0-1之间)
subtitle_position = 0.7
# 是否启用背景音乐
music_enabled = true
# 背景音乐名称
music_name = 夏季有你
# 背景音乐音量 (0-1)
music_volume = 0.4
# 是否需要封面
cover_required = 1
# 计算账号类型
compute_account_type = 2
