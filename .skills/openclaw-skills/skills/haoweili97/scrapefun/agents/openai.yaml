interface:
  display_name: "OpenClaw Scrapefun"
  short_description: "Operate scrapefun through regular business APIs."
  default_prompt: "Use $openclaw-scrapefun with X-OpenClaw-Key or Bearer auth. Prefer the dedicated /api/openclaw/* endpoints: use GET /api/openclaw/libraries/catalog for library contents, GET /api/openclaw/media/:metadataId/state for existing and missing episodes/files, GET /api/openclaw/media/:metadataId/download-target for destination path and storage resolution, POST /api/openclaw/media/:metadataId/download-check before every submission, POST /api/openclaw/downloads/submit for offline download submission, POST /api/openclaw/downloads/:downloadId/confirm-landed after submission, POST /api/openclaw/media/:metadataId/finalize-import for post-download import, and GET /api/openclaw/downloads/:downloadId for workflow status. Use GET /api/libraries, GET /api/scrape/search, or GET /api/scrape/webdav/list only for the narrow fallback cases documented in the skill. Do not fall back to /api/metadata, /api/metadata/stats, /api/settings/webdav/search, or /api/settings/webdav/add_offline_download for normal OpenClaw flows. Do not call OpenClaw task, job, or site endpoints for resource discovery."
