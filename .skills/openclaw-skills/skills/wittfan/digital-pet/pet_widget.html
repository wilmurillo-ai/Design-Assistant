<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字宠物 - Digital Pet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: transparent;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        
        #canvas:active {
            cursor: grabbing;
        }
        
        #status {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }
        
        #status.show {
            opacity: 1;
        }
        
        .tooltip {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .tooltip.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        <div id="status">跟随模式</div>
        <div id="tooltip" class="tooltip">点击互动 | 拖拽移动</div>
    </div>
    
    <script>
        // 全局变量
        let scene, camera, renderer, labubu;
        let followMode = true;
        let isHappy = false;
        let happinessTimer = null;
        
        // 初始化场景
        function init() {
            const canvas = document.getElementById('canvas');
            
            // 场景
            scene = new THREE.Scene();
            
            // 相机
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0.5, 5);
            
            // 渲染器 - 透明背景
            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            
            // 光照
            setupLighting();
            
            // 创建 Labubu
            labubu = new Labubu();
            scene.add(labubu.getMesh());
            
            // 事件监听
            window.addEventListener('resize', onWindowResize);
            canvas.addEventListener('click', onCanvasClick);
            
            // 显示提示
            showTooltip();
            
            // 开始动画
            animate();
        }
        
        function setupLighting() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(3, 5, 5);
            scene.add(mainLight);
            
            const fillLight = new THREE.DirectionalLight(0xccddff, 0.3);
            fillLight.position.set(-3, 2, 3);
            scene.add(fillLight);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function onCanvasClick() {
            // 点击互动
            isHappy = true;
            labubu.jump();
            
            showStatus("开心！❤️");
            
            if (happinessTimer) {
                clearTimeout(happinessTimer);
            }
            
            happinessTimer = setTimeout(() => {
                isHappy = false;
                showStatus(followMode ? "跟随模式" : "固定模式");
            }, 2000);
        }
        
        function showStatus(text) {
            const status = document.getElementById('status');
            status.textContent = text;
            status.classList.add('show');
            
            setTimeout(() => {
                status.classList.remove('show');
            }, 2000);
        }
        
        function showTooltip() {
            const tooltip = document.getElementById('tooltip');
            tooltip.classList.add('show');
            
            setTimeout(() => {
                tooltip.classList.remove('show');
            }, 3000);
        }
        
        // 设置跟随模式（供 Python 调用）
        window.setFollowMode = function(mode) {
            followMode = mode;
            showStatus(mode ? "跟随模式" : "固定模式");
        };
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            if (labubu) {
                if (isHappy) {
                    labubu.happyAnimation(time);
                } else {
                    labubu.breathe(time);
                    labubu.swayHead(time);
                }
            }
            
            renderer.render(scene, camera);
        }
        
        // Labubu 类
        class Labubu {
            constructor() {
                this.group = new THREE.Group();
                this.materials = {};
                this.initMaterials();
                this.createModel();
            }
            
            initMaterials() {
                // 毛发 - 经典棕绿色
                this.materials.fur = new THREE.MeshStandardMaterial({
                    color: 0x6b8e5a,
                    roughness: 0.85,
                    metalness: 0.05
                });
                
                // 浅色毛发
                this.materials.lightFur = new THREE.MeshStandardMaterial({
                    color: 0xd4e4b8,
                    roughness: 0.75,
                    metalness: 0
                });
                
                // 眼睛
                this.materials.eye = new THREE.MeshStandardMaterial({
                    color: 0x111111,
                    roughness: 0.05,
                    metalness: 0.2
                });
                
                // 眼白
                this.materials.eyeWhite = new THREE.MeshStandardMaterial({
                    color: 0xfdfdfd,
                    roughness: 0.15
                });
                
                // 鼻子
                this.materials.nose = new THREE.MeshStandardMaterial({
                    color: 0x1a1a1a,
                    roughness: 0.3
                });
                
                // 牙齿
                this.materials.teeth = new THREE.MeshStandardMaterial({
                    color: 0xfffef5,
                    roughness: 0.25
                });
            }
            
            createModel() {
                this.createBody();
                this.createHead();
                this.createEars();
                this.createLimbs();
            }
            
            createBody() {
                const bodyGeo = new THREE.SphereGeometry(1, 32, 32);
                bodyGeo.scale(0.9, 1.1, 0.8);
                const body = new THREE.Mesh(bodyGeo, this.materials.fur);
                this.group.add(body);
                
                const bellyGeo = new THREE.SphereGeometry(0.65, 32, 32);
                bellyGeo.scale(1, 1.1, 0.5);
                const belly = new THREE.Mesh(bellyGeo, this.materials.lightFur);
                belly.position.set(0, -0.1, 0.55);
                this.group.add(belly);
            }
            
            createHead() {
                this.headGroup = new THREE.Group();
                this.headGroup.position.set(0, 1.2, 0);
                this.group.add(this.headGroup);
                
                // 头部
                const headGeo = new THREE.SphereGeometry(0.9, 32, 32);
                headGeo.scale(1.05, 0.95, 0.95);
                const head = new THREE.Mesh(headGeo, this.materials.fur);
                this.headGroup.add(head);
                
                // 脸部
                const faceGeo = new THREE.SphereGeometry(0.7, 32, 32);
                faceGeo.scale(1.05, 0.9, 0.5);
                const face = new THREE.Mesh(faceGeo, this.materials.lightFur);
                face.position.set(0, -0.05, 0.45);
                this.headGroup.add(face);
                
                this.createEyes();
                this.createNose();
                this.createMouth();
            }
            
            createEyes() {
                // 左眼
                const leftEyeGroup = new THREE.Group();
                leftEyeGroup.position.set(-0.32, 0.1, 0.75);
                this.headGroup.add(leftEyeGroup);
                
                const eyeWhiteGeo = new THREE.SphereGeometry(0.22, 32, 32);
                const eyeWhite = new THREE.Mesh(eyeWhiteGeo, this.materials.eyeWhite);
                eyeWhite.scale.set(1, 1, 0.5);
                leftEyeGroup.add(eyeWhite);
                
                const pupilGeo = new THREE.SphereGeometry(0.13, 32, 32);
                const pupil = new THREE.Mesh(pupilGeo, this.materials.eye);
                pupil.position.z = 0.1;
                leftEyeGroup.add(pupil);
                
                const highlightGeo = new THREE.SphereGeometry(0.05, 16, 16);
                const highlight = new THREE.Mesh(highlightGeo, this.materials.teeth);
                highlight.position.set(0.06, 0.06, 0.16);
                leftEyeGroup.add(highlight);
                
                // 右眼
                const rightEyeGroup = leftEyeGroup.clone();
                rightEyeGroup.position.set(0.32, 0.1, 0.75);
                this.headGroup.add(rightEyeGroup);
            }
            
            createNose() {
                const noseGeo = new THREE.SphereGeometry(0.07, 32, 32);
                const nose = new THREE.Mesh(noseGeo, this.materials.nose);
                nose.position.set(0, -0.05, 0.9);
                nose.scale.set(1.3, 1, 0.8);
                this.headGroup.add(nose);
            }
            
            createMouth() {
                const mouthGroup = new THREE.Group();
                mouthGroup.position.set(0, -0.32, 0.8);
                this.headGroup.add(mouthGroup);
                
                // 上排牙齿
                for (let i = 0; i < 3; i++) {
                    const toothGeo = new THREE.ConeGeometry(0.05, 0.12, 16);
                    const tooth = new THREE.Mesh(toothGeo, this.materials.teeth);
                    tooth.position.set((i - 1) * 0.1, 0, 0);
                    tooth.rotation.x = Math.PI;
                    mouthGroup.add(tooth);
                }
                
                // 下排牙齿
                for (let i = 0; i < 3; i++) {
                    const toothGeo = new THREE.ConeGeometry(0.04, 0.1, 16);
                    const tooth = new THREE.Mesh(toothGeo, this.materials.teeth);
                    tooth.position.set((i - 1) * 0.1, -0.1, 0);
                    mouthGroup.add(tooth);
                }
            }
            
            createEars() {
                // 左耳 - 长兔耳
                const leftEarGroup = new THREE.Group();
                leftEarGroup.position.set(-0.7, 0.5, 0);
                this.headGroup.add(leftEarGroup);
                
                const earGeo = new THREE.ConeGeometry(0.3, 1.2, 32);
                const leftEar = new THREE.Mesh(earGeo, this.materials.fur);
                leftEar.rotation.z = 0.25;
                leftEar.position.set(0, 0.4, 0);
                leftEarGroup.add(leftEar);
                
                // 内耳
                const innerEarGeo = new THREE.ConeGeometry(0.18, 0.8, 32);
                const innerEar = new THREE.Mesh(innerEarGeo, this.materials.lightFur);
                innerEar.rotation.z = 0.25;
                innerEar.position.set(0.05, 0.4, 0.08);
                leftEarGroup.add(innerEar);
                
                // 右耳
                const rightEarGroup = leftEarGroup.clone();
                rightEarGroup.position.set(0.7, 0.5, 0);
                rightEarGroup.children.forEach(child => {
                    child.rotation.z = -0.25;
                    if (child === rightEarGroup.children[1]) {
                        child.position.x = -0.05;
                    }
                });
                this.headGroup.add(rightEarGroup);
            }
            
            createLimbs() {
                // 手臂
                this.createArm(-0.95, 0.15, 0.15, 1);
                this.createArm(0.95, 0.15, 0.15, -1);
                
                // 腿
                this.createLeg(-0.35, -1.1, 0.2);
                this.createLeg(0.35, -1.1, 0.2);
                
                // 尾巴
                this.createTail();
            }
            
            createArm(x, y, z, direction) {
                const armGroup = new THREE.Group();
                armGroup.position.set(x, y, z);
                this.group.add(armGroup);
                
                const armGeo = new THREE.CapsuleGeometry(0.2, 0.5, 8, 16);
                const arm = new THREE.Mesh(armGeo, this.materials.fur);
                arm.rotation.z = direction * 0.3;
                arm.position.set(direction * 0.15, 0.15, 0);
                armGroup.add(arm);
                
                const handGeo = new THREE.SphereGeometry(0.22, 32, 32);
                const hand = new THREE.Mesh(handGeo, this.materials.fur);
                hand.position.set(direction * 0.35, -0.1, 0);
                armGroup.add(hand);
            }
            
            createLeg(x, y, z) {
                const legGroup = new THREE.Group();
                legGroup.position.set(x, y, z);
                this.group.add(legGroup);
                
                const thighGeo = new THREE.CapsuleGeometry(0.22, 0.4, 8, 16);
                const thigh = new THREE.Mesh(thighGeo, this.materials.fur);
                thigh.position.y = -0.15;
                legGroup.add(thigh);
                
                const footGeo = new THREE.SphereGeometry(0.28, 32, 32);
                footGeo.scale(1, 0.6, 1.2);
                const foot = new THREE.Mesh(footGeo, this.materials.fur);
                foot.position.set(0, -0.45, 0.12);
                legGroup.add(foot);
            }
            
            createTail() {
                const tailGroup = new THREE.Group();
                tailGroup.position.set(0, -0.4, -0.75);
                this.group.add(tailGroup);
                
                for (let i = 0; i < 4; i++) {
                    const tailGeo = new THREE.SphereGeometry(0.15 - i * 0.02, 32, 32);
                    const tail = new THREE.Mesh(tailGeo, this.materials.fur);
                    tail.position.set(0, -0.12 * i, -0.08 * i);
                    tailGroup.add(tail);
                }
                
                const tailTipGeo = new THREE.SphereGeometry(0.2, 32, 32);
                const tailTip = new THREE.Mesh(tailTipGeo, this.materials.lightFur);
                tailTip.position.set(0, -0.5, -0.35);
                tailGroup.add(tailTip);
            }
            
            breathe(time) {
                const scale = 1 + Math.sin(time * 2) * 0.015;
                this.group.scale.set(scale, scale, scale);
            }
            
            swayHead(time) {
                if (this.headGroup) {
                    this.headGroup.rotation.z = Math.sin(time * 1.2) * 0.04;
                    this.headGroup.rotation.x = Math.sin(time * 0.8) * 0.03;
                }
            }
            
            happyAnimation(time) {
                // 开心时跳动的动画
                const jump = Math.abs(Math.sin(time * 8)) * 0.3;
                this.group.position.y = jump;
                
                if (this.headGroup) {
                    this.headGroup.rotation.z = Math.sin(time * 10) * 0.1;
                }
            }
            
            jump() {
                // 点击时的跳跃
                this.group.position.y = 0.5;
                setTimeout(() => {
                    this.group.position.y = 0;
                }, 300);
            }
            
            getMesh() {
                return this.group;
            }
        }
        
        // 启动
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
