name: Deploy Subdomain Preview

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate UID (repo-branch, DNS-safe)
        id: uid
        run: |
          slugify() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed -e 's/[^a-z0-9]/-/g' -e 's/--*/-/g' -e 's/^-//' -e 's/-$//'
          }

          REPO_NAME=$(basename "${{ github.repository }}")
          REF_NAME="${{ github.head_ref || github.ref_name }}"

          REPO_SLUG=$(slugify "$REPO_NAME")
          BRANCH_SLUG=$(slugify "$REF_NAME")

          RAW_UID="${REPO_SLUG}-${BRANCH_SLUG}"
          RAW_UID=$(echo "$RAW_UID" | sed -e 's/--*/-/g' -e 's/^-//' -e 's/-$//')

          # DNS label <= 63
          if [ ${#RAW_UID} -gt 63 ]; then
            HASH=$(echo -n "$RAW_UID" | sha1sum | awk '{print $1}' | cut -c1-12)
            PREFIX=$(echo -n "$RAW_UID" | cut -c1-50 | sed -e 's/-$//')
            RAW_UID="${PREFIX}-${HASH}"
          fi

          echo "uid=$RAW_UID" >> $GITHUB_OUTPUT
          echo "container=container-$RAW_UID" >> $GITHUB_OUTPUT
          echo "domain=$RAW_UID.tashan.chat" >> $GITHUB_OUTPUT

      - name: Deploy to Server (subdomain)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEEPSEEK_API_KEY
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            DOCKER_TAG="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"
            docker pull "$DOCKER_TAG"

            bash /var/www/github-actions/configs/scripts/deploy-subdomain.sh \
              "$DOCKER_TAG" \
              "${{ steps.uid.outputs.uid }}" \
              "${{ steps.uid.outputs.container }}" \
              "${{ secrets.DEEPSEEK_API_KEY }}" \
              "" \
              "${{ secrets.DATA_PATH }}"

      - name: Comment Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const url = `https://${{ steps.uid.outputs.domain }}/`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **预览环境已部署（子域名）**\n\n🔗 ${url}`
            });
