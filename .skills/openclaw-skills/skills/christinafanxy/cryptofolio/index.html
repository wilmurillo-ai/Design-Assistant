summary must be a short Chinese confirmation sentence.
Today: ${today()}. RETURN ONLY THE JSON OBJECT.`,
    userText: text || '请识别截图中的交易/持仓记录'
  };
}

// ─── Robustly extract JSON from potentially messy model output ───
function extractJSON(raw){
  if(!raw || !raw.trim()) throw new Error('模型返回了空内容');
  // Try direct parse first
  try{ return JSON.parse(raw.trim()); }catch(e){}
  // Strip markdown code fences
  let s = raw.replace(/```[\w]*\n?/g,'').replace(/```/g,'').trim();
  try{ return JSON.parse(s); }catch(e){}
  // Extract first {...} block
  const m = s.match(/\{[\s\S]*\}/);
  if(m){ try{ return JSON.parse(m[0]); }catch(e){} }
  // Give up with context
  throw new Error(`无法解析模型返回内容：${raw.slice(0,120)}…`);
}

async function callAI(text, fileData, accounts){
  const cfg = getAIConfig();
  if(!cfg.provider || !cfg.key){
    throw new Error('未配置 AI 模型\n请点击右上角「⚠ 设置 AI」按钮选择模型并填入 API Key');
  }

  const {system, userText} = buildPrompt(text, accounts);
  const provider = cfg.provider;
  const p = PROVIDERS[provider];

  // ── Claude：支持浏览器直接调用 ──
  if(provider === 'claude'){
    const content = [];
    if(fileData){
      content.push(fileData.mediaType==='application/pdf'
        ? {type:'document', source:{type:'base64', media_type:'application/pdf', data:fileData.base64}}
        : {type:'image',    source:{type:'base64', media_type:fileData.mediaType, data:fileData.base64}});
    }
    content.push({type:'text', text: userText});

    const res = await fetch(p.url, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': cfg.key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:2048, system, messages:[{role:'user', content}]})
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||`HTTP ${res.status}`); }
    const d = await res.json();
    const raw = (d.content||[]).map(c=>c.text||'').join('');
    return extractJSON(raw);
  }

  // ── MiniMax（标准 OpenAI 兼容格式，无需 Group ID）──
  if(provider === 'minimax'){
    const res = await fetch(p.url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${cfg.key}`,
      },
      body: JSON.stringify({
        model: 'MiniMax-Text-01',
        max_tokens: 2048,
        messages: [
          {role:'system', content: system},
          {role:'user',   content: userText}
        ]
      })
    }).catch(()=>{ throw new Error('MiniMax 请求被浏览器拦截（CORS 限制）\n请部署到 GitHub Pages 后使用，或改用 Claude API'); });

    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||`HTTP ${res.status}`); }
    const d = await res.json();
    const raw = d.choices?.[0]?.message?.content || '';
    return extractJSON(raw);
  }

  // ── OpenAI / DeepSeek ──
  const messages = [{role:'system', content: system}];
  let userMsgContent;
  if(fileData && p.supportsImage){
    userMsgContent = [
      {type:'image_url', image_url:{url:`data:${fileData.mediaType};base64,${fileData.base64}`}},
      {type:'text', text: userText}
    ];
  } else {
    const note = (fileData && !p.supportsImage) ? '[用户上传了图片，但当前模型不支持图片识别，请根据文字描述处理]\n' : '';
    userMsgContent = note + userText;
  }
  messages.push({role:'user', content: userMsgContent});

  const modelMap = {openai:'gpt-4o-mini', minimax:'MiniMax-Text-01', deepseek:'deepseek-chat'};
  const supportsJsonMode = (provider==='openai' || provider==='deepseek');
  const reqBody = {
    model: modelMap[provider],
    max_tokens: 2048,
    messages,
    ...(supportsJsonMode ? {response_format:{type:'json_object'}} : {})
  };

  // 直接调用，不走代理（代理无法转发 Authorization header，必然失败）
  let res;
  try {
    res = await fetch(p.url, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':`Bearer ${cfg.key}`,
      },
      body: JSON.stringify(reqBody)
    });
  } catch(fetchErr) {
    // fetch 本身抛错 = CORS 被浏览器拦截
    throw new Error(
      `❌ 浏览器拦截了请求（CORS 限制）\n\n` +
      `从本地 HTML 文件无法直接调用 ${p.name} 的 API。\n\n` +
      `✅ 解决方法：改用 Claude API\n` +
      `→ 右上角「设置 AI」→ 选择 Claude → 填入 API Key`
    );
  }

  if(!res.ok){
    const e = await res.json().catch(()=>({}));
    throw new Error(e?.error?.message || `HTTP ${res.status}`);
  }

  const d = await res.json().catch(()=>null);
  if(!d) throw new Error('响应为空');
  if(d.error) throw new Error(d.error?.message || JSON.stringify(d.error));

  const raw = d.choices?.[0]?.message?.content||'';
  return extractJSON(raw);
}

let importParsed = null; // {positions, newAccounts}

function importDrop(e){
  e.preventDefault();
  document.getElementById('import-area')?.classList.remove('dragover');
  const file = e.dataTransfer?.files?.[0];
  if(file) processImportFile(file);
}
function importFileChosen(e){ const f=e.target.files?.[0]; if(f) processImportFile(f); }

function parseCSV(text){
  // Handle BOM
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  const lines = text.split(/\r?\n/);
  const headers = lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  const rows = [];
  for(let i=1;i<lines.length;i++){
    const line = lines[i].trim();
    if(!line) continue;
    // Handle quoted fields with commas
    const cols = [];
    let cur='', inQ=false;
    for(let c of line){
      if(c==='"'){ inQ=!inQ; }
      else if(c===','&&!inQ){ cols.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    cols.push(cur.trim());
    const row={};
    headers.forEach((h,i)=>{ row[h]=cols[i]||''; });
    rows.push(row);
  }
  return rows;
}

function cleanNum(s){
  if(!s||s==='—'||s==='-') return '';
  return s.replace(/[$,\s]/g,'').replace(/^"(.*)"$/,'$1');
}

function processImportFile(file){
  if(!file.name.endsWith('.csv')){ alert('请上传 .csv 文件'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const rows = parseCSV(e.target.result);

      // Detect column mapping — supports both Notion format and generic
      const sample = rows[0]||{};
      const keys = Object.keys(sample);

      // Map: 名称→account, 币种→asset, 数量→amount, 价格→currentPrice, 金额(USD)→currentValue, 备注→note, 类型→accType
      const COL = {
        name:    keys.find(k=>/名称|账户|account/i.test(k))||'名称',
        type:    keys.find(k=>/类型|type/i.test(k))||'类型',
        asset:   keys.find(k=>/币种|资产|asset|coin/i.test(k))||'币种',
        amount:  keys.find(k=>/数量|amount|qty/i.test(k))||'数量',
        price:   keys.find(k=>/^价格$|^price$/i.test(k))||'价格',
        value:   keys.find(k=>/金额|value|USD/i.test(k))||'金额(USD)',
        note:    keys.find(k=>/备注|note|remark/i.test(k))||'备注',
        status:  keys.find(k=>/状态|status/i.test(k))||'状态',
      };

      // Determine account type mapping
      const typeMap = {'交易所':'CEX','链上钱包':'WALLET','美股':'US_STOCK','DEX':'DEX','CEX':'CEX','WALLET':'WALLET'};

      // Collect unique accounts from CSV
      const csvAccounts = {};
      rows.forEach(r=>{
        const name = (r[COL.name]||'').trim();
        if(!name) return;
        const rawType = (r[COL.type]||'').trim();
        const mappedType = typeMap[rawType]||'CEX';
        if(!csvAccounts[name]) csvAccounts[name]={name,rawType,mappedType};
      });

      // Find which accounts are new (not in state)
      const existingNames = state.accounts.map(a=>a.name.toLowerCase());
      const newAccounts = Object.values(csvAccounts).filter(a=>!existingNames.includes(a.name.toLowerCase()));

      // Build positions to import (skip rows with no asset or zero/empty value)
      const toImport = [];
      rows.forEach(r=>{
        const name   = (r[COL.name]||'').trim();
        const asset  = (r[COL.asset]||'').trim().toUpperCase();
        const valRaw = cleanNum(r[COL.value]);
        const amtRaw = cleanNum(r[COL.amount]);
        if(!name||!asset) return;
        // Skip rows with 0 value and 0 amount
        if((+valRaw||0)===0 && (+amtRaw||0)===0) return;
        // Skip Hyena empty row
        if(!asset) return;

        toImport.push({
          _accName: name,
          asset,
          amount:   amtRaw,
          avgCost:  '',
          currentPrice: cleanNum(r[COL.price]),
          currentValue: valRaw,
          note:     (r[COL.note]||'').trim(),
        });
      });

      importParsed = {toImport, newAccounts, csvAccounts, COL};

      // Build preview table
      const prev = toImport.slice(0,5).map(p=>`
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;padding:6px 0;border-bottom:1px solid var(--bdr);font-family:var(--mono)">
          <span style="color:var(--mid)">${esc(p._accName)}</span>
          <span style="color:var(--txt);font-weight:700">${esc(p.asset)}</span>
          <span style="color:var(--mid)">${p.amount||'—'}</span>
          <span style="color:var(--acc)">${p.currentValue?'$'+p.currentValue:'—'}</span>
        </div>`).join('');

      const newAccList = newAccounts.length>0
        ? `<div style="margin-top:6px;font-size:12px;color:var(--mid)">📌 将自动创建 ${newAccounts.length} 个新账户：${newAccounts.map(a=>`<span style="color:var(--txt)">${esc(a.name)}</span>`).join('、')}</div>`
        : '';

      document.getElementById('import-preview').style.display='block';
      document.getElementById('import-preview-content').innerHTML =
        `<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;padding:4px 0;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)">
          <span>账户</span><span>资产</span><span>数量</span><span>价值</span></div>`+prev+
        (toImport.length>5?`<div style="font-size:11px;color:var(--dim);padding-top:6px">…共 ${toImport.length} 条</div>`:'');

      document.getElementById('import-summary').innerHTML =
        `✅ 识别到 <strong style="color:var(--acc)">${toImport.length}</strong> 条持仓记录，来自 <strong style="color:var(--acc)">${Object.keys(csvAccounts).length}</strong> 个账户${newAccList}`;

    }catch(err){
      alert('解析失败：'+err.message+'\n请确认文件是从 Notion 导出的 CSV。');
    }
  };
  reader.readAsText(file, 'utf-8');
}

function doImport(){
  if(!importParsed) return;
  const {toImport, newAccounts, csvAccounts} = importParsed;

  // Create new accounts first
  const accColorPool = ['#F0B90B','#2563EB','#FF007A','#10B981','#E97B2E','#8B5CF6','#06B6D4','#EC4899','#FF4D6A','#00FFA3'];
  let colorIdx = state.accounts.length % accColorPool.length;
  newAccounts.forEach(na=>{
    state.accounts.push({
      id: uid(),
      name: na.name,
      type: na.mappedType,
      color: accColorPool[colorIdx++ % accColorPool.length]
    });
  });

  // Build name→id map
  const nameToId = {};
  state.accounts.forEach(a=>{ nameToId[a.name.toLowerCase()]=a.id; });

  // Add positions
  let added=0, skipped=0;
  toImport.forEach(p=>{
    const accId = nameToId[p._accName.toLowerCase()];
    if(!accId){ skipped++; return; }
    // Check for duplicate (same account + same asset)
    const dup = state.positions.find(x=>x.accountId===accId&&x.asset===p.asset);
    if(dup){ skipped++; return; }
    state.positions.push({
      id: uid(),
      accountId: accId,
      asset: p.asset,
      amount: p.amount,
      avgCost: p.avgCost,
      currentPrice: p.currentPrice,
      currentValue: p.currentValue,
      note: p.note,
    });
    added++;
  });

  save();
  closeModal();
  importParsed = null;
  goTab('positions');
  setTimeout(()=>{
    showModal(`
      <div class="modal-hdr">
        <span class="modal-title">✅ 导入完成</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div style="font-size:15px;color:var(--txt);margin-bottom:16px">
        成功导入 <span style="color:var(--acc);font-weight:800;font-size:22px">${added}</span> 条持仓记录
        ${skipped>0?`<br/><span style="font-size:12px;color:var(--dim)">（${skipped} 条重复或跳过）</span>`:''}
      </div>
      <div style="font-size:13px;color:var(--mid);margin-bottom:18px;line-height:1.7">
        💡 建议接下来：<br/>
        • 在「持仓」页面检查各账户归属是否正确<br/>
        • 补充每条持仓的「均价」以启用盈亏计算<br/>
        • 在「账户」页面调整账户类型和颜色
      </div>
      <button class="btn" onclick="closeModal()">好的，去看看</button>
    `);
  }, 100);
}

const GECKO_IDS = {
  BTC:'bitcoin',ETH:'ethereum',BNB:'binancecoin',SOL:'solana',
  USDT:'tether',USDC:'usd-coin',USDE:'ethena-usde',USDG:'usd-coin',
  'USD1':'usd-coin','USD*':'usd-coin',
  AAVE:'aave',HYPE:'hyperliquid',MNT:'mantle',WETH:'weth',
  LINK:'chainlink',UNI:'uniswap',OP:'optimism',ARB:'arbitrum',
  AVAX:'avalanche-2',MATIC:'matic-network',DOT:'polkadot',
  ADA:'cardano',XRP:'ripple',DOGE:'dogecoin',SHIB:'shiba-inu',
  LTC:'litecoin',BCH:'bitcoin-cash',ATOM:'cosmos',FTM:'fantom',
  NEAR:'near',APT:'aptos',SUI:'sui',INJ:'injective-protocol',
  TIA:'celestia',PYTH:'pyth-network',WIF:'dogwifcoin',
  JUP:'jupiter-exchange-solana',BONK:'bonk',
};

// US stock tickers (will use Yahoo Finance)
const US_STOCK_ACCS = new Set(['US_STOCK']);

async function refreshPrices(){
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  const lbl  = document.getElementById('refresh-label');
  if(btn.disabled) return;
  btn.disabled = true;
  icon.style.display='inline-block';
  icon.style.animation='spin 1s linear infinite';
  lbl.textContent = '刷新中…';

  // Add spin keyframe if not there
  if(!document.getElementById('spin-style')){
    const s=document.createElement('style');
    s.id='spin-style';
    s.textContent='@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
  }

  try {
    // Collect all unique assets from positions
    const assets = [...new Set(state.positions.map(p=>p.asset.toUpperCase()))];

    // Split: crypto vs stock
    const cryptoAssets = assets.filter(a=>GECKO_IDS[a]);
    const stockAssets  = assets.filter(a=>{
      const pos = state.positions.find(p=>p.asset.toUpperCase()===a);
      const acc = pos ? state.accounts.find(x=>x.id===pos.accountId) : null;
      return acc && acc.type==='US_STOCK' && !GECKO_IDS[a];
    });

    const prices = {}; // asset → price

    // ── CoinGecko (free, no key) ──
    if(cryptoAssets.length>0){
      const ids = [...new Set(cryptoAssets.map(a=>GECKO_IDS[a]))].join(',');
      try{
        const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
        if(res.ok){
          const data = await res.json();
          cryptoAssets.forEach(a=>{
            const geckoId = GECKO_IDS[a];
            if(data[geckoId]?.usd) prices[a] = data[geckoId].usd;
          });
        }
      }catch(e){ console.warn('CoinGecko failed',e); }
    }

    // ── Yahoo Finance via allorigins proxy (CORS-free) ──
    if(stockAssets.length>0){
      for(const sym of stockAssets){
        try{
          const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`;
          const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
          const res = await fetch(proxy);
          if(res.ok){
            const wrapper = await res.json();
            const d = JSON.parse(wrapper.contents);
            const p = d?.chart?.result?.[0]?.meta?.regularMarketPrice;
            if(p) prices[sym] = p;
          }
        }catch(e){ console.warn('Yahoo failed for',sym,e); }
      }
    }

    // ── Apply prices ──
    let updated = 0;
    state.positions = state.positions.map(p=>{
      const price = prices[p.asset.toUpperCase()];
      if(price==null) return p;
      const newVal = ((+p.amount||0)*price).toFixed(2);
      updated++;
      return {...p, currentPrice: price.toFixed(price<1?6:2), currentValue: newVal};
    });

    save();
    render();

    // 刷新价格后自动统计理财收益
    runDailyAccrual();

    const missed = assets.filter(a=>prices[a.toUpperCase()]==null);
    lbl.textContent = `已更新 ${updated} 个`;
    icon.style.animation='';
    icon.textContent='✓';
    setTimeout(()=>{ icon.textContent='↻'; lbl.textContent='刷新价格'; btn.disabled=false; },3000);

    if(missed.length>0){
      setTimeout(()=>{
        showModal(`
          <div class="modal-hdr">
            <span class="modal-title">价格刷新结果</span>
            <button class="modal-close" onclick="closeModal()">×</button>
          </div>
          <div style="font-size:14px;color:var(--txt);margin-bottom:12px">✅ 已更新 <strong style="color:var(--acc)">${updated}</strong> 个持仓价格</div>
          ${missed.length>0?`<div style="font-size:13px;color:var(--mid);margin-bottom:8px">⚠️ 以下代币未能自动获取价格，请手动更新：</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">${missed.map(a=>`<span class="tag" style="color:var(--mid);background:var(--bdr)">${esc(a)}</span>`).join('')}</div>
          <div style="font-size:11px;color:var(--dim)">稳定币（USDT/USDC）价格固定为 $1，无需刷新</div>`:''}
          <button class="btn" onclick="closeModal()" style="margin-top:14px">好的</button>
        `);
      },200);
    }

  } catch(e){
    lbl.textContent='刷新失败';
    icon.style.animation='';
    icon.textContent='↻';
    setTimeout(()=>{ lbl.textContent='刷新价格'; btn.disabled=false; },2000);
    alert('价格刷新失败：'+e.message+'\n请检查网络连接。');
  }
}

// ═══════════════════════════════════════════════════════
// FINANCE INCOME CALCULATION
// ═══════════════════════════════════════════════════════
// 实时计算理财收益（不保存到 state，仅用于显示）
function calcCurrentIncome(f){
  if(f.status !== 'ACTIVE') return parseFloat(f.income) || 0;
  if(!f.apy || !f.principal) return parseFloat(f.income) || 0;

  const apy = parseFloat(f.apy);
  if(!apy || apy <= 0) return parseFloat(f.income) || 0;

  const todayStr = today();
  const lastDate = f.lastAccrualDate || f.startDate || todayStr;

  // 计算从上次累积到现在的天数
  const msPerDay = 86400000;
  const days = Math.floor((new Date(todayStr) - new Date(lastDate)) / msPerDay);

  const principal = parseFloat(f.principal) || 0;
  const dailyRate = apy / 100 / 365;
  const earned = days > 0 ? principal * dailyRate * days : 0;

  const prevIncome = parseFloat(f.income) || 0;
  return prevIncome + earned;
}

// ═══════════════════════════════════════════════════════
// DAILY ACCRUAL  —  auto-compound income on page open
// ═══════════════════════════════════════════════════════
function runDailyAccrual(){
  const todayStr = today();
  let anyUpdated = false;
  let totalAccrued = 0; // USD only, for notification
  const coinAccrued = {}; // asset → amount for coin-denominated

  state.finance = state.finance.map(f=>{
    // Only accrue active records with APY and principal
    if(f.status !== 'ACTIVE') return f;
    if(!f.apy || !f.principal) return f;
    const apy = parseFloat(f.apy);
    if(!apy || apy <= 0) return f;

    const lastDate = f.lastAccrualDate || f.startDate || todayStr;
    if(lastDate >= todayStr) return f; // already up to date

    // Calculate days elapsed
    const msPerDay = 86400000;
    const days = Math.floor((new Date(todayStr) - new Date(lastDate)) / msPerDay);
    if(days <= 0) return f;

    const principal = parseFloat(f.principal) || 0;
    const dailyRate = apy / 100 / 365;
    const earned    = principal * dailyRate * days;

    const prevIncome = parseFloat(f.income) || 0;
    const newIncome  = +(prevIncome + earned).toFixed(f.denomination==='COIN' ? 6 : 2);

    anyUpdated = true;
    if(f.denomination === 'COIN'){
      coinAccrued[f.asset] = (coinAccrued[f.asset]||0) + earned;
    } else {
      totalAccrued += earned;
    }

    return {...f, income: String(newIncome), lastAccrualDate: todayStr};
  });

  if(anyUpdated){
    save();
    render();

    // Build notification message
    const lines = [];
    if(totalAccrued > 0) lines.push(`💵 USD 收益 +$${totalAccrued.toFixed(2)}`);
    Object.entries(coinAccrued).forEach(([asset, amt])=>{
      lines.push(`🪙 ${asset} 收益 +${amt.toFixed(6)}`);
    });

    if(lines.length > 0){
      // Show a subtle toast instead of blocking alert
      showToast('📈 理财收益已自动更新\n'+lines.join('\n'));
    }
  }
}

function showToast(msg){
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `
    position:fixed;bottom:80px;right:22px;
    background:#0E1B28;border:1px solid #00FFA344;border-radius:10px;
    padding:12px 16px;font-size:12px;color:#C5D8EE;font-family:'Courier New',monospace;
    line-height:1.7;white-space:pre;z-index:300;
    box-shadow:0 8px 24px #000a;
    animation:fadeInUp .3s ease;
  `;
  if(!document.getElementById('toast-style')){
    const s = document.createElement('style');
    s.id = 'toast-style';
    s.textContent = `@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}`;
    document.head.appendChild(s);
  }
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(()=>t.remove(), 400); }, 4000);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
(async function init(){
  // 优先从云端加载（如果已配置）
  if(hasCF()){
    const ok = await syncFromCloud();
    if(ok){
      updateApiKeyBtn();
      updateCFBtn();
      runDailyAccrual();
      return;
    }
  }
  // 其次尝试本地 API（localhost:3456）
  state = await loadFromAPI();
  // 如果本地 API 也没数据，尝试从 localStorage 恢复
  if(!state.positions?.length && !state.trades?.length){
    try{
      const cached = localStorage.getItem(STORE);
      if(cached){
        const parsed = JSON.parse(cached);
        if(parsed.positions?.length || parsed.trades?.length){
          state = parsed;
        }
      }
    }catch(e){}
  }
  render();
  updateApiKeyBtn();
  updateCFBtn();
  runDailyAccrual();
})();
</script>
