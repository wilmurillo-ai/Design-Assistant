<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黄金监控面板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #0f1117; color: #e0e0e0; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  h1 { text-align: center; padding: 20px 0 10px; font-size: 24px; color: #ffd700; }
  .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }

  /* 价格卡片 */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: #1a1d29; border-radius: 12px; padding: 20px; border: 1px solid #2a2d3a; transition: transform 0.2s; }
  .card:hover { transform: translateY(-2px); }
  .card.gold { border-color: #ffd700; background: linear-gradient(135deg, #1a1d29 0%, #2a2519 100%); }
  .card .name { font-size: 14px; color: #999; margin-bottom: 8px; }
  .card .price { font-size: 32px; font-weight: bold; color: #fff; }
  .card.gold .price { color: #ffd700; }
  .card .change { font-size: 14px; margin-top: 6px; }
  .card .change.up { color: #ef4444; }
  .card .change.down { color: #22c55e; }
  .card .unit { font-size: 13px; color: #666; margin-left: 4px; }
  .card .time { font-size: 11px; color: #555; margin-top: 8px; }
  .card .error-badge { background: #ef4444; color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 4px; }

  /* 图表 */
  .chart-section { margin-bottom: 24px; }
  .chart-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .chart-tab { background: #1a1d29; border: 1px solid #2a2d3a; color: #aaa; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .chart-tab.active { background: #ffd700; color: #000; border-color: #ffd700; font-weight: bold; }
  .chart-box { background: #1a1d29; border-radius: 12px; border: 1px solid #2a2d3a; padding: 16px; height: 400px; }

  /* 报警设置 */
  .alert-section { background: #1a1d29; border-radius: 12px; border: 1px solid #2a2d3a; padding: 24px; }
  .alert-section h2 { font-size: 18px; margin-bottom: 16px; color: #ffd700; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: #888; }
  .form-group select, .form-group input { background: #0f1117; border: 1px solid #2a2d3a; color: #e0e0e0; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
  .form-group input { width: 200px; }
  .form-group select { min-width: 160px; }
  .btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
  .btn-primary { background: #ffd700; color: #000; }
  .btn-primary:hover { background: #e6c200; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-secondary { background: #2a2d3a; color: #e0e0e0; }
  .btn-secondary:hover { background: #3a3d4a; }

  /* webhook配置 */
  .webhook-row { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #2a2d3a; }
  .webhook-row input { flex: 1; min-width: 300px; }

  /* 规则列表 */
  .rules-list { margin-top: 16px; }
  .rule-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #0f1117; border-radius: 8px; margin-bottom: 8px; }
  .rule-info { font-size: 14px; }
  .rule-info .rule-symbol { color: #ffd700; font-weight: bold; }
  .no-rules { text-align: center; color: #555; padding: 20px; font-size: 14px; }

  /* toast */
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }
  .toast.success { background: #22c55e; color: #fff; }
  .toast.error { background: #ef4444; color: #fff; }
</style>
</head>
<body>
<div class="container">
  <h1>黄金监控面板</h1>
  <p class="subtitle">实时监控黄金 · 美元指数 · 原油 | 自动刷新 60s</p>

  <!-- 价格卡片 -->
  <div class="cards" id="priceCards"></div>

  <!-- 图表 -->
  <div class="chart-section">
    <div class="chart-tabs" id="chartTabs"></div>
    <div class="chart-box" id="mainChart"></div>
  </div>

  <!-- 报警设置 -->
  <div class="alert-section">
    <h2>报警设置</h2>

    <div class="webhook-row">
      <div class="form-group" style="flex:1">
        <label>飞书 Webhook URL</label>
        <input type="text" id="webhookUrl" placeholder="https://open.feishu.cn/open-apis/bot/v2/hook/xxx">
      </div>
      <button class="btn btn-secondary" onclick="saveWebhook()">保存</button>
      <button class="btn btn-secondary" onclick="testNotification()">测试通知</button>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>品种</label>
        <select id="alertSymbol">
          <option value="AU9999">中国黄金 Au99.99</option>
          <option value="XAUUSD">国际黄金 XAU/USD</option>
          <option value="USIDX">美元指数 DXY</option>
          <option value="WTI">WTI 原油</option>
        </select>
      </div>
      <div class="form-group">
        <label>条件</label>
        <select id="alertCondition">
          <option value="price_above">价格高于</option>
          <option value="price_below">价格低于</option>
          <option value="change_pct_above">涨幅超过(%)</option>
          <option value="change_pct_below">跌幅超过(%)</option>
        </select>
      </div>
      <div class="form-group">
        <label>阈值</label>
        <input type="number" id="alertThreshold" step="any" placeholder="例如: 680">
      </div>
      <div class="form-group">
        <label>备注</label>
        <input type="text" id="alertNote" placeholder="可选备注">
      </div>
      <button class="btn btn-primary" onclick="addAlert()">添加规则</button>
    </div>

    <div class="rules-list" id="rulesList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SYMBOLS = ['AU9999', 'XAUUSD', 'USIDX', 'WTI'];
const SYMBOL_NAMES = { AU9999: '中国黄金', XAUUSD: '国际黄金', USIDX: '美元指数', WTI: 'WTI原油' };
let currentChart = null;
let currentSymbol = 'AU9999';

// ─── Escape HTML to prevent XSS ───
function escapeHtml(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

// ─── Toast ───
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3000);
}

// ─── 价格卡片 ───
async function loadPrices() {
  try {
    const resp = await fetch('/api/prices');
    const data = await resp.json();
    const container = document.getElementById('priceCards');
    container.innerHTML = data.map((p, i) => {
      const isGold = i === 0;
      const sign = p.change >= 0 ? '+' : '';
      const dir = p.change >= 0 ? 'up' : 'down';
      const errBadge = p.error ? '<span class="error-badge">数据异常</span> ' : '';
      return `<div class="card${isGold ? ' gold' : ''}">
        <div class="name">${errBadge}${escapeHtml(String(p.name))}</div>
        <div class="price">${escapeHtml(String(p.price))}<span class="unit">${escapeHtml(String(p.unit))}</span></div>
        <div class="change ${dir}">${sign}${escapeHtml(String(p.change))} (${sign}${escapeHtml(String(p.change_pct))}%)</div>
        <div class="time">${escapeHtml(String(p.update_time))}</div>
      </div>`;
    }).join('');
  } catch (e) {
    console.error('加载价格失败', e);
  }
}

// ─── 图表 ───
function initChartTabs() {
  const tabs = document.getElementById('chartTabs');
  tabs.innerHTML = SYMBOLS.map(s =>
    `<div class="chart-tab${s === currentSymbol ? ' active' : ''}" onclick="switchChart('${s}')">${escapeHtml(SYMBOL_NAMES[s])}</div>`
  ).join('');
}

async function switchChart(symbol) {
  currentSymbol = symbol;
  initChartTabs();
  await loadChart(symbol);
}

async function loadChart(symbol) {
  try {
    const resp = await fetch(`/api/history/${encodeURIComponent(symbol)}`);
    const data = await resp.json();
    if (!data.length) {
      document.getElementById('mainChart').innerHTML = '<p style="text-align:center;padding-top:180px;color:#555">暂无历史数据</p>';
      return;
    }
    if (!currentChart) {
      currentChart = echarts.init(document.getElementById('mainChart'));
      window.addEventListener('resize', () => currentChart && currentChart.resize());
    }
    const dates = data.map(d => d.date);
    const closes = data.map(d => d.close);
    const kData = data.map(d => [d.open, d.close, d.low, d.high]);

    currentChart.setOption({
      backgroundColor: 'transparent',
      tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
      xAxis: { data: dates, axisLine: { lineStyle: { color: '#333' } }, axisLabel: { color: '#888' } },
      yAxis: {
        scale: true,
        splitLine: { lineStyle: { color: '#1e2030' } },
        axisLine: { lineStyle: { color: '#333' } },
        axisLabel: { color: '#888' },
      },
      series: [
        {
          type: 'candlestick',
          data: kData,
          itemStyle: { color: '#ef4444', color0: '#22c55e', borderColor: '#ef4444', borderColor0: '#22c55e' },
        },
        {
          type: 'line',
          data: closes,
          smooth: true,
          symbol: 'none',
          lineStyle: { color: '#ffd700', width: 1.5 },
        },
      ],
      grid: { left: '8%', right: '4%', top: '8%', bottom: '12%' },
      dataZoom: [{ type: 'inside', start: 0, end: 100 }],
    }, true);
  } catch (e) {
    console.error('加载图表失败', e);
  }
}

// ─── 报警规则 ───
async function loadAlerts() {
  try {
    const resp = await fetch('/api/alerts');
    const data = await resp.json();
    document.getElementById('webhookUrl').value = data.webhook_url || '';
    const list = document.getElementById('rulesList');
    if (!data.alerts.length) {
      list.innerHTML = '<div class="no-rules">暂无报警规则</div>';
      return;
    }
    const condText = { price_above: '价格高于', price_below: '价格低于', change_pct_above: '涨幅超过', change_pct_below: '跌幅超过' };
    const unit = (c) => c.includes('pct') ? '%' : '';
    list.innerHTML = data.alerts.map(r =>
      `<div class="rule-item">
        <span class="rule-info"><span class="rule-symbol">${escapeHtml(SYMBOL_NAMES[r.symbol] || r.symbol)}</span> · ${escapeHtml(condText[r.condition] || r.condition)} ${escapeHtml(String(r.threshold))}${unit(r.condition)} ${r.note ? '· ' + escapeHtml(r.note) : ''}</span>
        <button class="btn btn-danger" onclick="deleteAlert('${escapeHtml(r.id)}')">删除</button>
      </div>`
    ).join('');
  } catch (e) {
    console.error('加载报警规则失败', e);
  }
}

async function addAlert() {
  const symbol = document.getElementById('alertSymbol').value;
  const condition = document.getElementById('alertCondition').value;
  const threshold = parseFloat(document.getElementById('alertThreshold').value);
  const note = document.getElementById('alertNote').value;
  if (isNaN(threshold)) { showToast('请输入有效的阈值', 'error'); return; }
  try {
    const resp = await fetch('/api/alerts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol, condition, threshold, note }),
    });
    const data = await resp.json();
    if (data.ok) { showToast('规则已添加'); loadAlerts(); document.getElementById('alertThreshold').value = ''; document.getElementById('alertNote').value = ''; }
  } catch (e) { showToast('添加失败', 'error'); }
}

async function deleteAlert(id) {
  try {
    await fetch(`/api/alerts/${encodeURIComponent(id)}`, { method: 'DELETE' });
    showToast('规则已删除');
    loadAlerts();
  } catch (e) { showToast('删除失败', 'error'); }
}

async function saveWebhook() {
  const url = document.getElementById('webhookUrl').value.trim();
  try {
    await fetch('/api/webhook', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    showToast('Webhook已保存');
  } catch (e) { showToast('保存失败', 'error'); }
}

async function testNotification() {
  const url = document.getElementById('webhookUrl').value.trim();
  try {
    const resp = await fetch('/api/alerts/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ webhook_url: url }),
    });
    const data = await resp.json();
    showToast(data.message, data.ok ? 'success' : 'error');
  } catch (e) { showToast('测试失败', 'error'); }
}

// ─── 初始化 ───
async function init() {
  await loadPrices();
  initChartTabs();
  await loadChart(currentSymbol);
  await loadAlerts();
  // 每60秒自动刷新价格
  setInterval(async () => {
    await loadPrices();
    await loadChart(currentSymbol);
  }, 60000);
}

init();
</script>
</body>
</html>
